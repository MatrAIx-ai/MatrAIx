  hobbies: '["Golf", "Bowling league", "Community theatre volunteering", "Rotary Club service", "Evening river walks", "Gardening", "Cooking New England cuisine", "Listening to classic rock", "Attending
    high school sports events"]'
  career_goals: Approaching retirement, Derek aims to solidify a legacy of high‑value client partnerships that will sustain the agency's revenue after he steps back. He hopes to transition into a senior
    advisory role where he can coach emerging sales talent and develop structured training programs that reflect his practical, client‑first philosophy. Additionally, he envisions using his sales network
    to support local small businesses in Glastonbury, perhaps through a part‑time consulting boutique. Maintaining financial stability, reducing work‑related stress, and ensuring his contributions enhance
    both the agency and his community are his guiding ambitions.
