  career_goals: Ramon dreams of a future where he can combine his love for building things with helping his community. In the short term, he aims to excel in science and mathematics, earn a spot on his
    high school's robotics team, and obtain a beginner’s coding certification. Looking ahead, he hopes to study civil or environmental engineering, designing sustainable homes and public spaces that benefit
    both his town and the broader world. He also envisions using his bilingual abilities to become a community liaison or educator, bridging cultural gaps and mentoring younger students from similar backgrounds.
    Ramon plans to develop strong study habits and coping strategies now, so he can manage stress and stay focused on his long‑term educational and career ambitions.
