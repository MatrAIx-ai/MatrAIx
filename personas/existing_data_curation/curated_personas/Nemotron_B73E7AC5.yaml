personas:
  professional: Ramon Flores is a budding robotics hobbyist who turns curiosity into LEGO and sensor‑based creations, balances methodical planning with spontaneous coding in Scratch, leverages teamwork
    skills learned on the soccer field, and often worries about meeting project deadlines, resulting in a habit of double‑checking every circuit connection.
  sports: Ramon Flores plays forward for the Eastside Junior Soccer Club, idolizes Lionel Messi, follows the professional team Chicago Fire, blends competitive drive with teamwork, and constantly rehearses
    pre‑game stretches to quell the anxiety that spikes whenever they miss a scoring chance.
  arts: Ramon Flores expresses creativity by sketching comic panels inspired by graphic novels like "Amulet", strums acoustic guitar to classic folk ballads and modern pop hits from Ed Sheeran, and frequently
    sings along to upbeat tracks by a local youth choir during after‑school practice.
  travel: Ramon Flores enjoys planning weekend road trips to nearby national parks such as Zion, packs a meticulous checklist of snacks and gadgets, yet also leaves room for spontaneous detours to quirky
    roadside attractions, and dreams of one day exploring the historic streets of Kyoto with family.
  culinary: Ramon Flores assists in preparing spiced ground‑meat tacos with fresh cilantro, lime, and homemade salsa, loves experimenting by adding diced mango to guacamole, and perfects a chocolate‑cinnamon
    churro recipe using masa harina, melted butter, and a pinch of cayenne for a subtle kick.
  core: Ramon Flores is a curious 12‑year‑old who balances LEGO robotics, soccer, and guitar practice, constantly frets over details, stays up late coding, yet finds calm in family cooking and comic drawing.
background:
  cultural: Ramon is a Mexican‑American growing up in Shawnee, Oklahoma. At home, Spanish is spoken alongside English, and his family maintains Mexican traditions such as celebrating Día de los Muertos,
    cooking dishes like tacos al pastor and tamales, and attending Mass at a local Catholic church. He cherishes strong family ties, often helping with chores and participating in multi‑generational gatherings.
    While he embraces his Mexican heritage, he also identifies with the Midwestern values of community involvement and modesty prevalent in Pottawatomie County. His cultural identity influences his desire
    to be bilingual, to share Mexican folklore with friends, and to serve as a bridge between his heritage and the broader community.
