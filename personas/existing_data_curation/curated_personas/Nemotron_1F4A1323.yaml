personas:
  professional: Maria Pena is a budding illustrator and interactive storyteller who merges love for graphic novels, LEGO building, and Scratch coding to craft vibrant narratives, balancing meticulous planning
    with spontaneous bursts of creativity.
  sports: Maria Pena plays midfield on the River Rangers youth soccer team, attends weekly swimming lessons at the community pool, follows the LA Lakers and the San Diego Wave women's soccer team, and incorporates
    traditional family dance steps into her fitness routine, giving her a blend of team sport and rhythmic movement.
  arts: Maria Pena immerses herself in creating vibrant mural sketches, drawing inspiration from graphic novelists Jen Wang and Marjane Satrapi, the whimsical worlds of Hayao Miyazaki’s Studio Ghibli, and
    the bold patterns of Yayoi Kusama, while blasting a playlist that mixes Bad Bunny, Calle 13, and indie artist Clairo, shaping her artistic identity.
  travel: Maria Pena has explored the Grand Canyon’s red cliffs, visited the Smithsonian museums in Washington D.C., enjoyed the rides at Orlando’s theme parks, dreams of trekking to Machu Picchu’s ancient
    citadel and wandering Berlin’s vibrant street‑art neighborhoods, preferring a mix of organized tours with spontaneous photo‑journalism stops.
  culinary: Maria Pena, a budding home chef, loves whipping up mango‑chili fruit tacos, loading pepperoni pizza with extra cheese, blending strawberry‑banana smoothies, and experimenting with sriracha‑mayo
    drizzles on grilled cheese, often sprinkling colorful edible glitter inspired by her mural designs.
  core: Maria Pena is a curiosity‑driven, color‑obsessed storyteller who balances meticulous planning with spontaneous bursts of creativity, often doodling on homework margins and snack wrappers, while
    sometimes forgetting to tidy her desk.
background:
  cultural: Maria comes from a Salvadoran family that preserves strong cultural ties. At home she speaks Spanish with her parents and grandparents, and English at school and with friends. Her family celebrates
    traditional holidays such as Día de los Faroles and shares dishes like pupusas, tamales, and fresh tropical fruit during gatherings. She participates in the local Latino cultural club at school, learning
    folk dances, marimba rhythms, and the history of El Salvador. Growing up in Lewisville, Texas, Maria blends her Salvadoran heritage with the multicultural environment of Denton County, which enriches
    her artistic expression and worldview.
attributes:
  skills: '["bilingual Spanish/English communication", "drawing and sketching", "digital illustration using kid‑friendly apps", "basic coding with Scratch", "research and critical thinking", "project organization
