  hobbies: '["drawing and sketching", "digital illustration", "reading graphic novels", "listening to Latin pop and cumbia music", "practicing Salvadoran dance moves", "building LEGO models", "coding interactive
    stories in Scratch", "participating in school science club"]'
  career_goals: Maria dreams of turning her love for art and curiosity about the world into a multidisciplinary career. She envisions becoming a graphic designer or visual storyteller who can blend Salvadoran
    cultural motifs with contemporary media. At the same time, she is fascinated by science and hopes one day to work as an environmental researcher or marine biologist focused on coastal ecosystems, inspired
    by stories of El Salvador's coastline. In the near term, she aims to lead a school mural project that celebrates her heritage and to win a science fair with an innovative, art‑infused experiment.
