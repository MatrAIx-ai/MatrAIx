    at local library'']'
  career_goals: Approaching retirement, Demitri aims to transition into a supervisory role within his current hotel, using his extensive front‑desk experience to improve operational efficiency and mentor
    younger employees. He also plans to develop a part‑time consultancy for independent inns and boutique hotels, offering best‑practice training on front‑desk management and guest service. Ultimately,
    he hopes to open a modest family‑run bed‑and‑breakfast that blends Mexican hospitality traditions with Californian charm, creating a quiet retreat where he can share his cultural recipes and stories
    with guests.
