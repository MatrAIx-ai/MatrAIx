persona_description: A geoscientist who is passionate about the Earth system and its interactions with the natural environment. This person has a deep understanding of the geosciences, including their theoretical
  foundations, empirical observations, and practical applications. They are skilled in developing and testing new ideas and theories through fieldwork, and they have a keen interest in integrating their
  growing knowledge of chemistry, math, physics, biology, and social sciences. This person is also an advocate for the importance of the feedback loop concept in understanding the Earth system and its resilience
  to environmental challenges. They have a strong interest in developing learning progressions that build purposefully from primary through secondary education into college, leveraging students' increasing
  maturity and incorporating their growing knowledge of chemistry, math, physics, biology, and social sciences.
