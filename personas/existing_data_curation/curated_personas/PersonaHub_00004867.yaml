  goals, and are interested in learning about other U.N. meetings and their implications for development and social welfare. This person is also likely to be knowledgeable about the consequences of China's
  economic growth and its impact on the environment and social welfare. They are interested in contributing to the debate on pivotal issues and fostering public debate over these issues.
