  career_goals: Mayda aims to transition into a chief financial officer role within the next five years, preferably for a midsized company that values sustainability and community impact. She is working
    toward completing her bachelor’s degree in finance and pursuing a CPA designation to solidify her credentials. Additionally, she hopes to establish a consulting practice that offers financial advisory
    services to small businesses, especially Latino entrepreneurs in Idaho, leveraging her cultural insight and industry experience. Mentoring emerging women leaders in finance is also a personal ambition,
    as she wants to create a supportive network that balances professional growth with well‑being.
