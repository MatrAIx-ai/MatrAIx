personas:
  professional: Mayda Sierra, a senior corporate finance manager with 25 years of experience in financial analysis, cash‑flow forecasting, and strategic planning, leverages their meticulous organization
    and pragmatic curiosity to streamline reporting while confidently leading bilingual teams through assertive yet collaborative negotiations.
  sports: Mayda Sierra, an avid hiker and occasional fisherman on the Spokane River, regularly trails the Selkirk Mountains with the Coeur d’Alene Outdoor Club, roots for the Spokane Chiefs hockey team
    and the Seattle Seahawks, and incorporates weekly yoga sessions into their routine to maintain a balanced fitness regimen.
  arts: Mayda Sierra nurtures their creative side through a historical‑fiction book club where they discuss works by Hilary Mantel, attend performances at the Spokane Civic Theatre, and find solace listening
    to the melodic strains of Andrés Segovia’s classical guitar recordings.
  travel: Mayda Sierra prefers well‑planned road trips to scenic destinations like Yellowstone and the Pacific Coast Highway, balances adventure with comfort by staying at boutique B&Bs, and dreams of exploring
    the vineyards of Oregon’s Willamette Valley and the historic streets of Granada, all while budgeting travel expenses to protect retirement savings.
  culinary: Mayda Sierra expertly prepares traditional tamales and rich mole using masa harina, dried chilies, cacao, and fresh cilantro, while also experimenting with seasonal vegetables from their garden
    to create vibrant, farm‑to‑table meals for family gatherings.
  core: Mayda Sierra blends a high‑stress finance career with a garden‑grown sanctuary, juggling meticulous budgeting and persistent worry while finding balance through hiking, yoga, and spirited cooking
    sessions.
background:
  cultural: Mayda is a first‑generation Mexican‑American whose parents immigrated from Jalisco. Raised in a bilingual household, she speaks fluent Spanish and English, and she actively preserves Mexican
    traditions such as Día de los Muertos altars, celebrating Cinco de Mayo, and cooking family recipes handed down through generations. Living in Rathdrum, Idaho, she blends her Mexican roots with the
    Pacific Northwest lifestyle, participating in local community events while also supporting the growing Latino population in the Spokane metropolitan area. Her cultural identity informs her professional
    ethos, emphasizing family values, community responsibility, and a strong work ethic.
