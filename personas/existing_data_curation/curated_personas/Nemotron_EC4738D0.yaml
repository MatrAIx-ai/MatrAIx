  hobbies: '[''Visiting art museums'', ''Attending theater performances'', ''Reading classic literature'', ''Hiking and nature walks'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Playing board
    games with friends'', ''Cooking comfort food'', ''Volunteering at community center teaching computer basics'', ''Exploring local music venues'']'
  career_goals: Erica aims to advance within the gambling‑security field, seeking a supervisory role within the next three years where she can lead a team, design training programs, and shape compliance
    policies. She plans to obtain a Certified Protection Officer (CPO) credential and eventually pursue a master’s degree in Criminal Justice or Public Administration to broaden her career options. Long‑term,
    she envisions a position that blends security expertise with community education, such as coordinating responsible‑gaming outreach initiatives, while maintaining a stable routine that supports her desire
    for work‑life balance.
