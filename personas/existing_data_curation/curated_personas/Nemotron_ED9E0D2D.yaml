personas:
  professional: Edward Daniels, a 38-year-old computer support specialist, combines methodical troubleshooting across Windows, macOS, and Linux with a passion for scripting automation, and they are actively
    building a roadmap to become an IT Service Manager by earning ITIL Practitioner, CompTIA Network+, and Azure certifications while mentoring junior staff through clear documentation.
  sports: Edward Daniels spends Saturday mornings hiking the Palisades in New Jersey, they are a loyal fan of the New York Giants and the New York Yankees, and they occasionally join a community softball
    league to stay active.
  arts: Edward Daniels captures sunrise vistas over the New Jersey countryside with a DSLR, they study Ansel Adams for technique, unwind by playing strategy board games like Terraforming Mars and Settlers
    of Catan, and they enjoy listening to indie folk artist Bon Iver while editing photos.
  travel: Edward Daniels prefers low-key road trips that combine photography and tech curiosity, they have documented the cliffs of Acadia National Park and the geysers of Yellowstone, they plan a future
    itinerary for Iceland's volcanic landscapes, and they balance travel planning with a strict budget to keep their savings on track.
  culinary: Edward Daniels experiments with sous-vide chicken thighs, a homemade sourdough starter, and a weekly ramen night featuring pork belly, shiitake mushrooms, and miso broth, they relish incorporating
    fresh herbs like cilantro and basil, and they love hosting dinner parties where friends sample their latest dish.
  core: Edward Daniels is a meticulous tech enthusiast who channels worry into mindful routines, leverages his DIY spirit in both hardware builds and kitchen experiments, and quietly plans a future where
    automation and security empower a stress-free support team.
background:
  cultural: 'Edward grew up in a middle‑class, predominantly white suburb of Willingboro, New Jersey, within a family that emphasized education, practical problem solving, and community involvement. His
    cultural upbringing reflects typical East Coast American values: celebrating holidays like Thanksgiving and the Fourth of July, enjoying local sports (especially baseball), and participating in neighborhood
    events such as farmers'' markets and volunteer drives. While his heritage is primarily English‑Irish, he has been exposed to a diverse array of cultural influences through school, local community programs,
    and the tech community, fostering an appreciation for both traditional and contemporary American lifestyles.'
attributes:
  skills: '[''IT support'', ''hardware and software troubleshooting'', ''network diagnostics'', ''remote desktop assistance'', ''ticketing system management (Jira Service Management, ServiceNow)'', ''ITIL
    best practices'', ''documentation and knowledge‑base creation'', ''process improvement'', ''PowerShell scripting'', ''Bash scripting'', ''basic cybersecurity (malware analysis, endpoint protection)'',
    ''virtualization (VMware, Hyper‑V)'', ''cloud service basics (AWS, Azure)'', ''customer service and user training'']'
  hobbies: '[''building and customizing PCs'', ''Raspberry Pi and IoT projects'', ''landscape photography'', ''hiking in New Jersey parks'', ''cooking and experimenting with recipes'', ''board game nights'',
    ''volunteering at community tech workshops'', ''reading mystery novels'', ''gardening'', ''mindfulness meditation'']'
  career_goals: Edward aims to transition from a front‑line support role to a leadership position such as IT Service Manager or Senior Systems Administrator within the next five years. He plans to earn
    ITIL Practitioner, CompTIA Network+, and Microsoft Azure Administrator certifications to bolster his credentials. His long‑term ambition is to spearhead a small, high‑performing support team that implements
    automation and proactive monitoring, reducing incident resolution times and stress for both staff and end‑users. He also harbors an interest in specializing further in cybersecurity, envisioning a future
    where he can integrate security best practices into everyday support operations while maintaining a balanced, low‑stress work environment.
