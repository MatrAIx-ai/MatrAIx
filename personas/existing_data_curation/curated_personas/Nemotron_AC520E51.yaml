  hobbies: '["Woodworking", "Abstract painting", "Digital photography", "Acoustic guitar playing", "Classic car restoration", "Hiking", "Attending local art festivals", "Reading graphic novels", "Science‑fiction
    reading", "Youth mentorship at church"]'
  career_goals: Short‑term, Douglas plans to earn his GED and complete certifications in forklift operation and OSHA safety leadership. He aims to transition into a lead‑hand or production supervisor role
    within the next two years, where he can apply his practical knowledge while mentoring newer workers. In the medium term, he hopes to enroll in an associate‑degree program in industrial technology or
    manufacturing engineering, adding skills like CNC programming and lean‑manufacturing analysis. Ultimately, he envisions either managing a small boutique manufacturing shop that blends functional products
    with artistic design, or starting his own custom‑furniture workshop that leverages his woodworking hobby and design sensibility.
