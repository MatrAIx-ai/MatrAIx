persona_description: A microbiologist or environmental engineer who is interested in studying the microbial populations found in anaerobic swine lagoons. They are likely to be interested in the impact of
  different operating conditions and seasons on the microbial communities and how it affects the treatment of swine manure and other agricultural wastes. They would be interested in the trophic levels and
  species levels of the microbial populations and how they interact with each other and the environment. They would also be interested in the potential for using these microbial populations for bioenergy
  or other applications.
