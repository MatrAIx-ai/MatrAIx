  hobbies: '[''gardening'', ''birdwatching'', ''hiking'', ''quilting'', ''cooking with seasonal produce'', ''reading historical fiction'', ''volunteering at the local library'', ''genealogy research'']'
  career_goals: Although retired from formal employment, Kimberly aims to deepen her involvement in the Omak community. She hopes to lead a project documenting the town’s oral histories, creating a digital
    archive for future generations. She dreams of turning her preserve‑making hobby into a modest online boutique, sharing her recipes with a wider audience. Kimberly also plans to mentor younger volunteers
    at the local library, teaching them both practical skills and the value of curiosity blended with practicality. Travel to nearby national parks for short nature retreats is another personal ambition,
    allowing her to stay physically active and inspire her gardening innovations.
