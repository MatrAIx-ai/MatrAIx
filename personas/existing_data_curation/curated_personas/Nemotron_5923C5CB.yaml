  career_goals: Shatoya aims to transform her culinary passion and organizational experience into a small community‑focused catering service that provides affordable, nutritious meals for seniors at the
    local senior center. She also hopes to become a certified caregiver to formally support her aging parents and nearby neighbors. Additionally, she is interested in mentoring younger women in her church
    about home budgeting and meal planning, and she plans to lead a neighborhood garden project that supplies fresh produce for families.
