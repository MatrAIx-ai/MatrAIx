personas:
  professional: Shatoya Horne, a seasoned community organizer and household manager, blends meticulous budgeting, event coordination, and hands‑on caregiving experience into a budding senior‑catering venture
    while mentoring local women on financial and meal‑planning skills, and they approach every task with a blend of structure and flexibility.
  sports: Shatoya Horne enjoys leisurely walks along the nearby park trails, cheers on the Houston Astros, Rockets, and Texans, and participates in the community’s senior softball league, and they balance
    low‑impact activity with team spirit and social connection.
  arts: Shatoya Horne sings in the church gospel choir, listens to blues legends like B.B. King and modern soul artists such as Leon Bridges, and reads historical fiction like The Warmth of Other Suns,
    allowing music and stories to shape evenings while they weave those narratives into vibrant quilts.
  travel: Shatoya Horne favors road‑trip adventures that blend culinary discovery and heritage, having driven to New Orleans for gumbo and Mardi Gras, planning a future visit to Savannah’s historic district,
    and they manage travel within a modest budget and family responsibilities.
  culinary: Shatoya Horne crafts soul‑food dishes infused with African‑inspired spices—collard greens with smoked turkey, jollof rice, sweet‑potato pie scented with cardamom, and curried black‑eyed peas—while
    their herb garden provides fresh cilantro, thyme, and moringa, and they view the kitchen as a place where tradition meets garden‑fresh creativity.
  core: Shatoya Horne blends practical organization with a warm, community‑centric heart, juggling budgeting, caregiving, and soulful cooking, and they occasionally let quilting projects and spice experiments
    overrun the schedule.
background:
  cultural: Shatoya's cultural identity is rooted in African‑American traditions of the South, shaped by the legacy of the Great Migration and the vibrant Black community of Houston’s Harris County. Growing
    up in a close‑knit church family, she internalized values of mutual support, hospitality, and storytelling. Her culinary preferences reflect soulful Southern cooking enriched with African spices handed
    down from her grandparents. She participates in community celebrations such as Juneteenth, Emancipation Day parades, and local church homecoming festivals, and she values the intergenerational bonds
    that link her family to broader cultural histories.
