personas:
  professional: Jace Lee is an aspiring junior engineer who builds elaborate LEGO constructions and programs Scratch games, channeling their meticulous planning, competitive drive, and love for hands‑on
    problem solving into early engineering projects.
  sports: Jace Lee plays forward for the Maple Grove Youth Soccer Club, pitches for the County Little League baseball team, hikes with the local Scouts troop on weekends, and cheers for the New York Yankees
    and the Los Angeles Lakers, balancing team competition with a love for the outdoors.
  arts: Jace Lee devotes free time to constructing LEGO City and LEGO Technic models, draws inspiration from the cinematic scores of John Williams, the graphic novels of Jeff Smith, and the whimsical animations
    of Pixar’s Toy Story, and often rehearses their own narrated Scratch stories set to background music by Imagine Dragons.
  travel: Jace Lee has camped at Yellowstone National Park, visited the Smithsonian museums in Washington D.C., and dreams of exploring the ancient temples of Kyoto, Japan, preferring family‑oriented road
    trips that blend nature hikes with hands‑on learning experiences.
  culinary: Jace Lee enjoys tossing homemade pepperoni and mushroom pizza, whipping up banana‑mango smoothies with Greek yogurt, and mastering simple grilled cheese sandwiches with sharp cheddar, yet frequently
    snatches extra cookies from the cookie jar when no one watches.
  core: Jace Lee is a methodical, competition‑driven nine‑year‑old who balances a love for LEGO engineering and team sports with a habit of hoarding extra cookies and occasionally neglecting dental floss.
background:
  cultural: Jace was born and raised in Toano, an unincorporated community in James City County, Virginia. He comes from a white, middle‑class family that celebrates typical American holidays—Thanksgiving,
    Independence Day, and Christmas—often adding a local twist, such as attending the annual county fair or visiting nearby historic sites like Jamestown and Williamsburg. His family participates in a local
    Protestant church, where community service and fellowship are emphasized. Growing up near the James River and the historic Shenandoah, Jace has developed an appreciation for outdoor activities, regional
    wildlife, and the colonial heritage of the area. His school environment reflects the suburban‑rural blend of the county, with strong involvement in sports, clubs, and community events, shaping a cultural
    background of Southern hospitality, emphasis on independence, and a shared pride in Virginia's history.
