  career_goals: Jace dreams of turning his love for building and problem‑solving into a future career as an engineer or inventor who creates practical solutions for everyday challenges, such as designing
    a more efficient recycling system for his school or developing educational games. He hopes to lead a robotics or technology team, win science fairs, and one day work as a software developer who builds
    interactive learning tools. His ambition is driven by personal achievement and the desire to combine his organized, methodical approach with his outgoing, collaborative spirit.
