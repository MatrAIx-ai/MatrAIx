  hobbies: '[''Visiting contemporary art galleries'', ''Photography'', ''Indie music concerts'', ''Coding personal web apps'', ''Hiking in local state parks'', ''Reading science fiction'', ''Experimental
    cooking'', ''Board game nights'']'
  career_goals: Timothy aims to establish a boutique management agency that champions emerging artists and athletes with a focus on innovative, tech‑enabled strategies. He envisions expanding his client
    roster beyond the Midwest to a national level, creating a proprietary analytics platform to match talent with opportunities, and eventually mentoring younger managers while maintaining a reputation
    for ethical, results‑oriented representation.
