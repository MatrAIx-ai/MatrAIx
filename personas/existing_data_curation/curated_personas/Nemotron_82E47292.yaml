personas:
  professional: Timothy Cuaresma, a 21‑year‑old talent manager with a STEM‑based bachelor’s degree, leverages data‑driven analytics and basic Python scripts to forecast market trends, negotiate contracts,
    and orchestrate tour schedules for emerging artists, blending meticulous spreadsheet modeling with a flexible, curiosity‑fueled approach that lets them pivot quickly when opportunities arise, and they
    adapt their strategies on the fly.
  sports: Timothy Cuaresma, an avid hiker who joins a local trail‑blazing club and plays pickup basketball on weekends with the Midwest City Hoops crew, roots for the Chicago Bulls and the Chicago Cubs
    while occasionally streaming Chicago White Sox games, and they balance solitary cardio hikes with team‑oriented streetball for both fitness and social connection.
  arts: Timothy Cuaresma spends weekends wandering contemporary art galleries, snapping photographs of vibrant murals by artists like Banksy and Shepard Fairey, and attending indie concerts featuring acts
    such as Tame Impala, Mitski, and local experimental jazz ensembles, letting the visual and auditory experiences feed their curiosity and they often incorporate these inspirations into their emerging
    talent‑management strategies.
  travel: Timothy Cuaresma prefers low‑key, self‑guided trips that blend urban exploration with nature, having trekked the Red River Gorge in Kentucky, documented street art in Berlin, and dreaming of photographing
    the sunrise over the Torres del Paine in Chile, while they budget each journey through a meticulous spreadsheet that balances work commitments and limited student loans.
  culinary: Timothy Cuaresma experiments in the kitchen with fusion dishes like kimchi‑taco sliders, miso‑infused carbonara, and ramen‑style burritos, enjoys sourcing gochujang, fresh basil, and smoked
    paprika at the local farmer’s market, and they often over‑season dishes in the pursuit of bold flavors.
  core: Timothy Cuaresma is a curious, reservation‑steeped 21‑year‑old who blends analytical talent management with a love for indie art, spontaneous hikes, and experimental cooking, and they juggle a disciplined
    budget and occasional insomnia.
background:
  cultural: Timothy grew up in Adrian, Michigan, within a white Midwestern family of Irish‑German descent that values hard work, community involvement, and modesty. The local culture, shaped by small‑town
    traditions, high school sports, and a supportive church community, fostered his reserved nature and appreciation for close‑knit relationships. Exposure to regional festivals and a family emphasis on
    education nurtured his curiosity for art and technology, blending conventional Midwestern values with a progressive outlook on creative industries.
