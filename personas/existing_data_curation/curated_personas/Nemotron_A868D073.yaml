personas:
  professional: Meghan Frazier is a seasoned personal financial planner in the Washington, D.C. metropolitan area, leveraging her deep expertise in retirement and estate planning, tax‑efficient investing,
    and budgeting to translate complex concepts into clear, relatable guidance while nurturing trust through routine‑driven client meetings and culturally resonant workshops.
  sports: Meghan Frazier enjoys cheering on the Washington Capitals during the hockey season, supporting the Washington Commanders in the fall, and participates in a local seniors’ walking club that meets
    thrice weekly along the C&O Canal towpath, while also playing light recreational softball with a Prince George’s County women's league each spring.
  arts: Meghan Frazier sings alto in a dynamic gospel choir that performs classics by Mahalia Jackson and contemporary pieces by Kirk Franklin, joins a book club that explores novels and memoirs chronicling
    the history and culture of her community, and acts in community theater productions of August Wilson’s "Fences" and "A Raisin in the Sun," finding artistic fulfillment in the storytelling traditions
    passed down through generations.
  travel: Meghan Frazier plans her trips with meticulous itineraries, reserving weekends for short, culturally enriching road trips to historic Southern cities such as Charleston and Savannah, and dedicating
    an annual summer vacation to New Orleans for its music and cuisine, while always budgeting a fixed travel allowance and preferring family‑run bed‑and‑breakfasts that offer a personal touch.
  culinary: Meghan Frazier delights in preparing soul‑food classics—shrimp and grits, collard greens simmered with smoked turkey, and sweet potato pie—spiced with fresh basil and thyme from her backyard
    garden, and she balances her culinary passions with a knack for improvising healthier twists, such as swapping traditional lard for olive oil.
  core: Meghan Frazier is a routine‑driven, community‑focused financial mentor who blends disciplined investment strategies with soulful gospel singing, garden‑to‑table cooking, and a steadfast commitment
    to uplifting her neighbors through education and service.
background:
  cultural: Meghan is a lifelong resident of the Washington, D.C. metropolitan area, raised in a close‑knit African‑American family that valued education, community service, and church involvement. Growing
    up during the post‑civil‑rights era in Prince George’s County, she witnessed both the challenges and the resilience of Black neighborhoods, shaping her commitment to economic empowerment. Her cultural
    identity is reflected in her active participation in local churches, her love for gospel music, and her dedication to preserving African‑American history through community events and education. This
    background informs her empathetic approach to financial advising, emphasizing trust, cultural competence, and collective uplift.
attributes:
  skills: '[''Financial Planning'', ''Retirement Planning'', ''Investment Management'', ''Tax-efficient Strategies'', ''Estate Planning'', ''Budgeting and Cash Flow Management'', ''Risk Assessment'', ''Client
    Relationship Management'', ''Financial Literacy Education'', ''Public Speaking'', ''Community Outreach'', ''Cultural Competency'']'
  hobbies: '[''Volunteering for Financial Literacy Workshops'', ''Book Club focusing on African American literature'', ''Gardening'', ''Gospel Choir'', ''Cooking Southern Soul Food'', ''Historical Site
    Visits'', ''Writing Financial Advice Blog'', ''Community Theater Participation'', ''Walking with Senior Groups'', ''Traveling to Heritage Sites'']'
  career_goals: Meghan aims to cement her legacy as a trusted financial mentor within the African‑American community of Prince George’s County. Over the next five years she plans to obtain the Certified
    Financial Planner (CFP) designation, launch a nonprofit program that offers free financial‑literacy workshops to low‑income seniors, publish a guidebook on retirement planning tailored for Black retirees,
    and mentor at least five junior advisors. She also aspires to speak at regional chambers of commerce and community centers, expanding her influence while maintaining a balanced, routine‑oriented work
    schedule that preserves her personal well‑being.
