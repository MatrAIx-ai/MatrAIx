  hobbies: '[''Reading picture books'', ''Drawing and coloring'', ''LEGO building and block play'', ''Bike riding and nature walks'', ''Collecting leaves and bugs'', ''Swimming lessons'', ''Playing simple
    musical keyboard'', ''Group games with classmates'', ''Solitary puzzles and reading'']'
  career_goals: Megan dreams of growing up to help others and explore the natural world. She often talks about becoming a teacher so she can share knowledge and support other children in learning. She also
    imagines caring for animals as a veterinarian, inspired by her love for pets and the outdoors. Occasionally, she mentions wanting to be a scientist or conservationist who discovers new ways to protect
    wildlife. Underlying these ambitions is a practical desire to be reliable, organized, and make a positive impact in her community.
