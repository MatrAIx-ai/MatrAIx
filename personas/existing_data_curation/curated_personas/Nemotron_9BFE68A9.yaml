  career_goals: Brian dreams of a hands‑on career that serves his community. He is drawn to skilled trades such as carpentry or automotive mechanics because they offer practical, routine work he can master,
    and he also admires first‑responder roles like firefighting for their blend of structure and the chance to help others. Occasionally he imagines exploring nature as a park ranger, combining his love
    of the outdoors with a stable, service‑oriented profession.
