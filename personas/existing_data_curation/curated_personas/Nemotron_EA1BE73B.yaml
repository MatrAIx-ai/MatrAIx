  career_goals: Lily aims to move into a supervisory role, such as shift lead or team manager, where she can mentor newer representatives and shape a high‑performing service culture. She plans to earn a
    certification in Customer Experience Management to broaden her expertise. Over the next few years, she hopes to design a training program that boosts call‑handling efficiency and customer satisfaction
    scores, positioning herself as a top performer in her department. After retirement, Lily envisions part‑time consulting for local small businesses, helping them improve their customer interactions while
    continuing her involvement in community volunteer leadership.
