  career_goals: Mariah aims to secure a senior administrative position within a small to medium-sized company or a non‑profit that allows her to leverage her extensive experience while providing a flexible
    schedule. She hopes to mentor junior clerical staff, sharing practical knowledge and fostering a supportive work environment. She also seeks to enhance her digital proficiency by completing a short
    certification in cloud‑based office management (e.g., Google Workspace or Microsoft 365) and to explore remote admin opportunities that would give her more control over work hours. Ultimately, she wants
    to achieve financial stability before retirement, maintain a balanced work‑life rhythm, and possibly transition to a part‑time consulting role where she can advise small businesses on office efficiency.
