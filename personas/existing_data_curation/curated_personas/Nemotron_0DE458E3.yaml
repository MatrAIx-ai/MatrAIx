personas:
  professional: Alexis Coatney, a five‑year‑old aspiring junior scientist, blends relentless curiosity with a surprisingly methodical approach to daily sandbox experiments, explains hypotheses loudly to
    classmates, fiercely competes for the ‘Best Experiment’ badge, and often frets over imperfect results, balancing practical step‑by‑step planning with spontaneous invention.
  sports: Alexis Coatney, an energetic member of the neighborhood ‘Mini Tigers’ soccer squad, idolizes the New York Yankees for their power hitting, mimics Manchester United’s tactical flair during backyard
    matches, and relentlessly pushes for the top scorer spot while loudly directing teammates in a talkative, competitive style.
  arts: Alexis Coatney thrives on staging impromptu puppet shows featuring Sesame Street characters, belts out favorite Taylor Swift kid‑friendly tunes with gusto, spends afternoons drawing crayon masterpieces
    of dinosaurs and unicorns, and constantly seeks applause from peers, channeling their sociable, talkative nature into creative performance.
  travel: Alexis Coatney dreams of a family road‑trip to the Grand Canyon after a recent visit to the local zoo, carefully colors route maps with crayons while anxiously listing essential bedtime storybooks
    for the journey, and balances a love for spontaneous playground adventures with a desire to explore exotic destinations like Paris.
  culinary: Alexis Coatney adores cheesy macaroni, crunchy chicken nuggets, and strawberry‑topped pancakes, proudly helps whisk batter for weekend pancake breakfasts, obsessively arranges fruit into smiley
    faces on plates, and often argues with siblings over the last slice of pizza, reflecting a competitive yet practical palate.
  core: Alexis Coatney is a talkative, fiercely competitive five‑year‑old who balances boundless curiosity with meticulous planning, yet frequently worries about imperfect outcomes and seeks constant validation
    from peers.
background:
  cultural: Alexis comes from a white, middle‑class family in Gloversville, New York. Her family celebrates traditional American holidays such as Thanksgiving and Christmas, with occasional Irish‑American
    customs passed down from grandparents, like St. Patrick’s Day festivities and hearty home‑cooked meals. The tight‑knit community in Fulton County, with its modest suburban vibe and local schools, shapes
    her worldview, encouraging both independence and a strong sense of belonging. Her parents emphasize curiosity through library visits and museum trips while also teaching practical self‑care skills early
    on.
