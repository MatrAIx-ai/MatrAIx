personas:
  professional: Elvira Andrades, an imaginative four‑year‑old who constructs elaborate block cities, draws detailed storyboards of whimsical worlds, and delights in celebrating Día de los Reyes with handcrafted
    decorations, combines a natural curiosity for abstract concepts with a relaxed attitude toward structured lessons, preferring free‑play exploration that fuels their budding creative problem‑solving.
  sports: Elvira Andrades, a lively four‑year‑old who loves sprinting on the playground, participates in the local South Gate Tiger Cubs soccer program, cheers for the Los Angeles Dodgers and Los Angeles
    Lakers, and spends rainy afternoons building forts at home instead of organized team drills.
  arts: Elvira Andrades, a budding artist who fills sketchbooks with bright, folk‑style patterns inspired by cumbia rhythms, marimba melodies, and the festive spirit of Día de los Reyes, mimics the bold
    colors of Frida Kahlo’s paintings, and sings along to songs by Los Hermanos Rosario while crafting paper‑mâché figures.
  travel: Elvira Andrades, an inquisitive traveler who dreams of exploring the ancient ruins of Chichen Itza after fond memories of family trips to Disneyland, Griffith Park, and the beach in Santa Monica,
    and who looks forward to celebrating Día de los Reyes in a distant town, prefers short, family‑guided outings that balance excitement with the security of familiar routines.
  culinary: Elvira Andrades, a tiny food enthusiast who loves the cheesy, corn‑based delight of pupusas, the sweet spice of tamales, eagerly helps mash masa and sprinkle loroco during cooking, and savors
    fresh mango slices with a splash of lime as a favorite snack, especially when these dishes are shared during Día de los Reyes celebrations.
  core: Elvira Andrades, a four‑year‑old dreamer with a vivid imagination, a penchant for bright folk art, and a competitive streak that fuels playful challenges, navigates the world through colorful sketches,
    sticker‑filled piggy banks, and cherished family traditions.
background:
  cultural: Elvira grows up in a Salvadoran household in South Gate, California. At home she hears Spanish, celebrates traditions like Día de los Reyes and family gatherings with pupusas and tamales, and
    enjoys Salvadoran music such as cumbia and marimba rhythms. These cultural touches appear in her artwork through bright colors and folk‑style patterns. The bilingual environment nurtures her early language
    skills and gives her a strong sense of belonging to both her heritage and the diverse community around her.
attributes:
  skills: '["drawing", "imaginary storytelling", "block construction", "basic counting and pattern recognition", "alphabet recognition in English and Spanish", "creative improvisation in role‑play"]'
  hobbies: '["coloring", "building block structures", "reading picture books with abstract themes", "listening to Salvadoran folk music", "exploring backyard for natural shapes", "pretend storytelling with
    dolls"]'
  career_goals: Elvira dreams of becoming an artist who creates bright, whimsical illustrations, and she also imagines herself as an explorer of far‑off worlds, like an astronaut or a designer of imaginary
    universes. She loves the idea of writing her own picture books and hopes someday to win a kids' art contest, using her creativity to stand out and inspire others.
