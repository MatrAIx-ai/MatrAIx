  hobbies: '[''Painting'', ''Sketching'', ''Photography'', ''Knitting'', ''Quilting'', ''Reading mystery novels'', ''Historical non‑fiction'', ''Gardening'', ''Exploring new recipes'', ''Attending community
    theater'', ''Visiting art galleries'', ''Walking nature trails'', ''Listening to jazz and folk music'', ''Volunteering at the library'', ''Leading craft workshops'']'
  career_goals: Shyanne aims to transition to a part‑time schedule that eases her into retirement while still contributing her experience as a mentor and trainer for younger staff. She hopes to earn a supervisory
    certification and deepen her knowledge of hospitality management. Beyond work, she plans to open a modest home studio where she can teach watercolor and acrylic painting to seniors at the local community
    center. She also wishes to volunteer more extensively with art‑focused youth programs, travel to regional art festivals for inspiration, and secure the financial stability needed for a comfortable,
    creative retirement.
