personas:
  professional: A seasoned front‑of‑house hospitality specialist named Shyanne Smith blends decades of fast‑food service mastery with an artist’s eye, using meticulous cash‑handling, inventory control,
    and calm complaint resolution while designing eye‑catching in‑store displays that echo the watercolor landscapes they paint, and now seeks a part‑time supervisory certification to mentor younger staff
    and transition toward a creative retirement.
  sports: A dedicated walker, Shyanne Smith joins the Erie County Senior Walking Club for morning shoreline treks, enjoys occasional pick‑up softball games at the local park, cheers for the Erie SeaWolves
    and Buffalo Bills, and practices gentle yoga twice a week to maintain flexibility and overall fitness.
  arts: Shyanne Smith spends weekends painting watercolors of the rolling hills, attends community theater productions starring local talent, curates a small home gallery of prints by Winslow Homer and
    contemporary folk musician Bob Dylan, and fills their kitchen with the sounds of John Coltrane jazz and classic rock from The Rolling Stones.
  travel: When planning trips, Shyanne Smith prefers relaxed road journeys to regional art festivals such as the Ogunquit Maine Summer Art Festival and the Santa Fe Indian Market, balances travel budgets
    with family visits, and dreams of a week‑long stay in Santa Fe to study Southwestern murals while keeping a modest schedule that fits a part‑time work rhythm.
  culinary: Shyanne Smith cooks with a garden‑fresh repertoire of basil, thyme, and rosemary, enjoys mastering ethnic dishes like Indian chana masala, Mexican mole, and Korean bibimbap, and often experiments
    with herb‑infused vinaigrettes while hosting small potluck evenings for neighbors, though they tend to over‑season sauces in the pursuit of bold flavor.
  core: Shyanne Smith is a community‑focused hospitality veteran turned watercolor mentor, whose love of art, budget‑savvy habits, and gentle health routines are punctuated by a habit of misplacing knitting
    needles right before a workshop.
background:
  cultural: Shyanne grew up in a small, predominantly white community in Erie County, Pennsylvania, with family roots tracing back to German and British ancestry. Her upbringing blended traditional Mid‑Atlantic
    values—hard work, humility, and neighborly support—with an openness to broader cultural experiences. She witnessed the region’s industrial shifts, fostering resilience and a strong sense of community
    responsibility. While she participated in local church activities during her youth, her adult life reflects a more eclectic appreciation for the arts, regional festivals, and diverse ideas. This background
    informs her diligent work ethic, warm hospitality style, and active involvement in local cultural and charitable events.
