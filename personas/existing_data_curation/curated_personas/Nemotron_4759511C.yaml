  career_goals: Isaac hopes to pursue a career in engineering—preferably mechanical or environmental engineering—where he can merge his love of how things work with his desire to create practical, sustainable
    solutions for his community. He aims to attend a STEM‑focused high school, join robotics competitions, and later study at a university known for renewable‑energy research. Long‑term, he envisions designing
    affordable green technologies for rural areas and mentoring younger students in hands‑on science clubs, blending his technical interests with his kindness and commitment to harmony.
