  hobbies: '[''Intramural basketball'', ''Mountain biking'', ''Robotics mentorship'', ''DIY electronics projects'', ''Strategic board games'', ''Landscape photography'', ''Playing electric guitar'', ''Cooking
    for friends'']'
  career_goals: James aims to transition from a senior engineering contributor to a technical leader who shapes product strategy for IoT and sustainable energy solutions. He plans to earn his Professional
    Engineer (PE) license, mentor junior engineers, and eventually launch his own boutique consulting practice focused on energy‑efficient electronics. His competitive drive fuels a desire for industry
    recognition, while his awareness of stress triggers motivates him to adopt better work‑life balance practices and leadership training.
