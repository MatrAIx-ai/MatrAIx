  career_goals: Although retired from the formal workforce, Ricky aims to channel his organizational talent and sociability into leadership roles within local volunteer organizations. He hopes to serve
    on the board of the Lincolnton senior center, develop and run community workshops on home maintenance and financial planning, and mentor younger volunteers. He also plans to complete a short certification
    in community counseling to better support peers dealing with anxiety and emotional distress, while maintaining his own emotional well‑being through regular therapy and self‑care routines.
