  hobbies: '["Hiking", "Nature photography", "Abstract watercolor painting", "Poetry writing", "Reading philosophy", "Attending art exhibitions", "Tai Chi", "Mindfulness meditation", "Cooking Asian‑fusion
    cuisine", "Collecting vintage Chinese ceramics"]'
  career_goals: Jae aims to transition into a senior community liaison role where he can bridge law enforcement with local arts and cultural groups, creating programs that use visual art and storytelling
    to foster trust and reduce tension. He aspires to lead a department mental‑health unit to improve emotional support for officers, drawing on his own experience with anxiety and stress. Over the next
    five years, he plans to develop an arts‑based outreach initiative for at‑risk youth in Palm Springs, mentor a new cohort of officers in culturally sensitive policing, and eventually serve as an advisory
    consultant on policy reform before retirement.
