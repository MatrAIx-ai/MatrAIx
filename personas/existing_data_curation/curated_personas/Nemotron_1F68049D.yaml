  hobbies: '["Book Club", "Community Gardening", "Cultural Center Volunteer (Japanese tea-ceremony and festival organization)", "Cooking Classes (fusion cuisine)", "Tai Chi", "Karaoke", "Volunteer Grant
    Committee for Small Businesses", "Public Lectures on Technology & Sustainability", "Social Dance Classes", "Travel Exploration (Japan & nearby regions)"]'
  career_goals: Although retired from full‑time work, Yumi aims to stay intellectually active and give back to her community. She plans to mentor immigrant‑background entrepreneurs, help establish a scholarship
    fund for local students pursuing business degrees, and co‑lead a senior‑focused entrepreneurship incubator. She also hopes to travel to Japan to explore traditional business practices and deepen her
    cultural roots while learning new technologies like virtual collaboration tools to stay connected with younger mentees. Yumi’s overarching ambition is to create a lasting legacy through knowledge sharing
    and fostering intergenerational collaboration.
