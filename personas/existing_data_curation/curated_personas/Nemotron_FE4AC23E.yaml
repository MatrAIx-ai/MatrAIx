  hobbies: '[''Biking on lakeshore trails'', ''Strategy video games (e.g., Civilization, StarCraft)'', ''Tabletop board games (e.g., Settlers of Catan)'', ''Crossword and Sudoku puzzles'', ''Cooking Vietnamese
    and Asian dishes'', ''Mindfulness meditation'', ''Urban photography'']'
  career_goals: Yeng aims to transition from a frontline clerk to a supervisory or coordinator position within the next two to three years. He plans to earn the APICS Certified in Production and Inventory
    Management (CPIM) credential and complete a Lean Six Sigma Green Belt course to deepen his analytical expertise. By leveraging his curiosity for emerging supply‑chain technologies, he hopes to lead
    initiatives that integrate automation, data‑driven forecasting, and real‑time inventory visibility into his current warehouse. Ultimately, Yeng aspires to become a logistics manager for a regional distribution
    network, where he can shape strategic inventory policies while mentoring junior staff. He also values creating a balanced work environment that mitigates stress, so he intends to champion wellness practices
    and more predictable shift scheduling.
