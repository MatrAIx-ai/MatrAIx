personas:
  professional: A seasoned warehouse logistics specialist, Yeng Xu leverages expertise in Manhattan Associates, SAP, advanced Excel, and basic SQL to diagnose inventory discrepancies, champion lean process
    improvements, and competitively benchmark performance against peers, all while maintaining a methodical yet adaptable work style that balances curiosity with practicality.
  sports: A dedicated cyclist and casual fan, Yeng Xu regularly rides the Minneapolis lakeshore trail with the Twin Cities Biking Club, follows the Minnesota Vikings and Minnesota Timberwolves, and joins
    low‑key pickup basketball games at a community gym, channeling a competitive drive on the bike while preferring small‑group exercise settings.
  arts: A contemplative visual storyteller, Yeng Xu captures minimalist urban and architectural scenes with a DSLR, drawing inspiration from photographers like Andreas Gursky and composers such as Max Richter,
    and unwinds by listening to indie folk acts like Bon Iver and The National, allowing quiet artistic focus to offset workplace stress.
  travel: A meticulous planner, Yeng Xu has explored the Boundary Waters for weekend wilderness immersion, visited Kyoto to soak in its serene gardens, and dreams of trekking the Camino de Santiago, yet
    budgets conservatively, favoring short, low‑cost trips that fit within a tight savings schedule.
  culinary: A budding home chef, Yeng Xu balances methodical recipe execution with experimental flair, frequently perfecting phở broth, bún chả, and Korean bibimbap using fresh herbs like cilantro, Thai
    basil, and galangal, while polishing plating skills inspired by chef Massimo Bottura and indulging in gourmet ramen from a downtown spot on rare treat nights.
  core: Curiosity meets caution in Yeng Xu’s life, as they channel a competitive analytical edge into logistics and puzzles while wrestling with anxiety‑fuelled perfectionism, a love for solitary bike rides,
    and a habit of over‑organizing their kitchen pantry.
background:
  cultural: Yeng is a second‑generation Vietnamese‑American whose parents emigrated from Ho Chi Minh City in the 1990s. Growing up in the diverse neighborhoods of Minneapolis, he was raised with a blend
    of traditional Vietnamese values—respect for elders, emphasis on education, and communal responsibility—and Midwestern American norms, such as punctuality and individualism. At home, the Vietnamese
    language is spoken daily, and he celebrates Lunar New Year (Tet) and Mid‑Autumn Festival with family. His culinary upbringing includes home‑cooked pho, bánh mì, and other regional dishes, which sparked
    his interest in cooking. The immigrant experience instilled a strong work ethic and resilience, influencing his practical approach to career and personal life.
attributes:
