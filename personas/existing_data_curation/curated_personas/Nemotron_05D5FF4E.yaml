  hobbies: '[''Visiting art galleries'', ''Photography'', ''Trivia nights'', ''Board games'', ''Salsa dancing'', ''Group hikes'', ''Volunteer community projects'', ''Reading nonfiction'', ''Digital collage'',
    ''Attending concerts and theater'']'
  career_goals: Anita aims to pursue a bachelor's degree in communications or arts administration within the next two years, with the ambition to work as a marketing coordinator for a regional museum or
    gallery. She hopes to blend her passion for art with her skill set in digital media to develop community outreach programs that make contemporary art accessible to broader audiences. In the longer term,
    she envisions launching an independent art blog and curating pop‑up exhibitions in Tulsa, leveraging her network and competitive drive to become a recognized voice in the local arts scene.
