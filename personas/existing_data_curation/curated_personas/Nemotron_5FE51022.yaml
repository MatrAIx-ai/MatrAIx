  career_goals: Annie aims to become the most trusted financial planner for the Black community in Indianapolis and surrounding areas. She plans to earn the Chartered Financial Analyst (CFA) designation
    to deepen her investment expertise, and eventually launch her own boutique advisory firm focused on serving underserved families. A core ambition is to develop a mentorship program that connects young
    Black professionals with seasoned advisors, fostering generational wealth. She also hopes to author a guide on financial wellness that integrates cultural perspectives on money, and to expand her community
    outreach by partnering with local churches and nonprofits to deliver financial empowerment workshops. Balancing her professional drive with personal well‑being, she seeks to establish routines that
    mitigate stress while maintaining high achievement standards.
