  hobbies: '[''Cooking'', ''Social Networking'', ''Community Volunteering'', ''Hiking'', ''Yoga'', ''Photography'', ''Travel'', ''Karaoke'']'
  career_goals: Tuan aims to expand his company's footprint into key Southeast Asian markets while strengthening its inclusive culture at home. He intends to launch a mentorship pipeline for emerging leaders,
    increase investment in employee well‑being, and position himself for a future board‑level advisory role. Parallel to his corporate aims, he plans to establish a nonprofit focused on community cohesion
    and mental‑health support for immigrants and under‑served populations in the Pacific Northwest.
