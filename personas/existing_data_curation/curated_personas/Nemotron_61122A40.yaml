  career_goals: Teresa aims to deepen her engagement with cultural preservation and community enrichment. Over the next few years she hopes to complete a short‑term certificate in community arts facilitation
    offered by a nearby community college, launch a small oral‑history project collecting stories from elder neighbors, and organize a seasonal community garden that supplies fresh produce for a local food
    bank. She also dreams of hosting quarterly quilting workshops for youth, thereby passing on traditional craft skills while fostering intergenerational connections.
