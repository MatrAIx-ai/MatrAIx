personas:
  professional: Teresa Lee, a 52‑year‑old aspiring community arts facilitator, blends their budgeting expertise, gardening know‑how, and talent for mediating small‑group discussions to coordinate oral‑history
    recordings, seasonal garden donations for the local food bank, and upcoming youth quilting workshops, and they eagerly anticipate formal training in community arts facilitation.
  sports: Teresa Lee stays active by joining the Charleston Senior Walking Club for dawn walks, playing pickleball in the spring at the local community center, occasionally cheering for the Charleston Battery
    soccer team, and they keep fit with weekly yoga classes that balance their love of gentle movement with a disciplined routine.
  arts: Teresa Lee nurtures their artistic soul by painting Lowcountry watercolors inspired by Winslow Homer, immersing themselves in the novels of Toni Morrison and James Baldwin, attending monthly gallery
    openings featuring contemporary Southern artists like Beth Lively, and humming Ella Fitzgerald’s jazz standards while they quilt.
  travel: Teresa Lee prefers slow, culturally rich journeys, having toured Savannah’s historic squares, explored New Orleans’ music neighborhoods, and taken weekend road trips to Asheville’s mountain arts
    scene, while they plan a future pilgrimage to Washington, D.C.’s National Museum of African American History and a relaxed beach getaway in the nearby Outer Banks once family duties allow.
  culinary: Teresa Lee delights in baking soul‑food desserts such as sweet potato pie and peach cobbler while seasonally adding garden‑fresh herbs like basil and thyme to savory dishes, proudly mastering
    tomato bruschetta and hearty gumbo, yet they occasionally over‑sweeten their pies, a quirk they laugh off with extra whipped cream.
  core: Teresa Lee blends a quiet curiosity for art and history with a steadfast dedication to community harmony, juggling budget spreadsheets, garden rows, and quilting needles, all while they secretly
    hoard too many vintage recipe cards.
background:
  cultural: Teresa is an African American woman whose family traces its roots to the historic Gullah/Geechee communities of coastal South Carolina. Growing up in Hemingway, Georgetown County, she was immersed
    in the traditions of Southern Black church life, community gatherings, and folk arts such as quilting and storytelling. Her upbringing emphasized the significance of family, mutual aid, and preserving
    cultural heritage, reflected in the region’s rich history of rice cultivation, Creole cuisine, and oral histories. The local African American culture, blending African, Caribbean, and Southern influences,
    informs her values of harmony, community service, and appreciation for artistic expression.
