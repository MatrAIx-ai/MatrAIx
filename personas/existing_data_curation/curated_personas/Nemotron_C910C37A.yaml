  career_goals: Deborah dreams of a future where she can combine her love for helping others with her organizational strengths. She envisions becoming a teacher or a community program coordinator, roles
    that let her share knowledge, create structured learning environments, and guide peers. She is also fascinated by science and sometimes imagines working as a pediatric doctor, where she can care for
    children while using her practical problem‑solving skills. Ultimately, she hopes to be in a position where she can inspire and support others while staying organized and influential.
