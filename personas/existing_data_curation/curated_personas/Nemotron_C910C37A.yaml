personas:
  professional: Deborah Lee is a budding junior storyteller and tech tinkerer who blends imaginative narrative writing with building basic robots and coding games in Scratch, leveraging their methodical
    planning and love of the spotlight to lead school drama rehearsals and organize creative projects.
  sports: Deborah Lee plays midfielder for the Oak Grove Tigers youth soccer team, enjoys cheering for the national women’s soccer team during the World Cup, and balances seasonal soccer practices with
    weekend family hikes, using their sociable nature to rally teammates and organize post‑game snack swaps.
  arts: Deborah Lee immerses themselves in the arts by performing lead roles in the school drama club’s productions of 'Alice in Wonderland' and 'The Wizard of Oz,' sketching scenes inspired by Mo Willems’
    picture books, and devouring adventure novels by Rick Riordan and J.K. Rowling, while idolizing performers like Lin‑Manuel Miranda for his storytelling flair.
  travel: Deborah Lee dreams of exploring the towering red rocks of Sedona, has already visited the interactive science museum in Chicago and the state park’s butterfly garden, and prefers family road trips
    planned with a detailed itinerary that includes stops at local ice‑cream parlors and ample time for sketch‑book journaling.
  culinary: Deborah Lee loves crafting cheesy quesadillas, banana‑smoothie bowls, and homemade chocolate chip cookies, often assisting in the community kitchen’s lunch prep, and proudly claims a knack for
    decorating cupcakes with sprinkles shaped like tiny robots.
  core: Deborah Lee is a talkative, organized ten‑year‑old who channels curiosity into storytelling, robotics, and drama while battling a steady stream of worries that they soothe with mindfulness breaths
    and friendship bracelets.
background:
  cultural: Deborah grows up in a typical suburban American family of European descent in Clark, New Jersey. Her cultural background blends the values of a middle‑class, white American upbringing—emphasis
    on education, community involvement, and family traditions—with exposure to the diverse ethnic tapestry of Union County. Family celebrations include traditional American holidays such as Thanksgiving
    and Fourth of July, while community events introduce her to a broader multicultural environment, fostering her inclusive and cooperative outlook.
