personas:
  professional: An aspiring junior robotics programmer, Chunyan Jacob blends methodical planning with a love for sci‑fi storytelling, using their organized, reliable nature to design simple games in Python
    and lead the middle‑school robotics club while balancing homework, piano practice, and weekend Chinese language classes.
  sports: A dedicated midfielder for the Valdese Wildcats middle‑school soccer team, Chunyan Jacob also joins the local youth hiking club to trek the Blue Ridge Trail on weekends, cheers on the Carolina
    Hurricanes for their collaborative style, and swims with the community league in summer to round out an athletic routine that mixes team sports, outdoor adventure, and seasonal fitness activities.
  arts: An avid pianist and calligrapher, Chunyan Jacob practices Beethoven’s "Moonlight Sonata" alongside the modern Chinese pop hit "Qing Hua Ci" by Jay Chou, regularly attends heritage school workshops
    to perfect brush strokes of classic poems by Li Bai, and finds inspiration in sci‑fi novels by Isaac Asimov, which fuels their creative coding projects.
  travel: A curious explorer, Chunyan Jacob spends summer weekends hiking Shenandoah National Park and dreams of visiting the Great Wall during the next Lunar New Year, while also hoping to experience the
    cherry blossoms of Kyoto and the bustling night markets of Taipei; they plan trips using a family‑shared calendar, balancing school commitments and a modest travel budget.
  culinary: A budding chef, Chunyan Jacob loves preparing jiaozi (dumplings) and spring rolls with their mother for family celebrations, while also mastering Southern staples like fried chicken, collard
    greens, and peach cobbler, often experimenting by fusing soy‑glazed pork with sweet‑tea barbecue sauce for a playful cross‑cultural twist.
  core: Chunyan Jacob is a methodical 12‑year‑old who balances sci‑fi daydreams with disciplined piano practice, loves coding tiny games, and occasionally over‑organizes school assignments, leaving a trail
    of half‑finished doodles in the margins of notebooks.
background:
  cultural: Chunyan comes from a Chinese‑American family that settled in Valdese, North Carolina. At home, Mandarin is spoken alongside English, and she observes cultural traditions such as Lunar New Year,
    Mid‑Autumn Festival, and the preparation of family‑style meals. She attends a weekend Chinese heritage school where she studies language and cultural arts, fostering a strong connection to her East
    Asian roots. Living in a small Southern town, she also participates in local community events, church activities, and enjoys regional foods, blending her heritage with the Southern culture around her.
