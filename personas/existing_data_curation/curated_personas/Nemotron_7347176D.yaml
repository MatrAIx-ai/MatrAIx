  hobbies: '[''Reading science‑fiction'', ''Hiking in the Blue Ridge Mountains'', ''Playing piano'', ''Chinese calligraphy'', ''Soccer'', ''Cooking family recipes'', ''Coding simple games'', ''Robotics
