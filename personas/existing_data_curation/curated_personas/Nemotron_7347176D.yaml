  career_goals: Chunyan aspires to pursue a career in environmental engineering or renewable‑energy research, combining her love for science with a desire to create practical solutions for her community.
    She plans to join her high‑school STEM club, earn honors in STEM subjects, and eventually attend a university known for engineering and sustainability. She also hopes to mentor younger students, especially
    girls from East‑Asian backgrounds, encouraging them to explore technology and science.
