persona_description: A Welsh historian and genealogist who is interested in the history and genealogy of the Rees and Rhys family names, particularly in their origins in Wales and their migration to America.
  They are also interested in the cultural and social history of the Welsh community in the United States. They have a particular interest in the lives and stories of Welsh immigrants to America in 1867,
  the Enoch Rees family, and the mining and mining families from Wales in America. They are also interested in the history of the Rees name in Germany and Holland, and the origins of the name in Wales.
  They are also interested in the history of the Rees family in the United States, particularly the Rees family of Cilymaenllwyd, the Rees family in Trelech, and the Rees family in Merthyr Tydfil and America.
