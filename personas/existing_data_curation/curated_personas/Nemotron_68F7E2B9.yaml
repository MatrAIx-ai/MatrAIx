personas:
  professional: Zachary Baker leverages their associate's degree in Microsoft Office and hands‑on expertise in woodworking, home repair, and e‑commerce to pursue a home‑based business while seeking a part‑time
    remote project coordination role that blends their organizational knack with a practical mindset.
  sports: Zachary Baker enjoys solo hiking in the Wasatch foothills, participates in occasional weekend trail runs organized by a local outdoors club, roots for the Utah Jazz and follows the Colorado Rockies
    during summer, and they cheer on these teams with modest enthusiasm during game nights.
  arts: Zachary Baker cultivates a love for visual storytelling through trail photography, draws inspiration from Ansel Adams and the folk music of Woody Guthrie, frequently listens to the folk‑rock duo
    Fleet Foxes while woodworking, attends the Salt Lake City Film Society’s documentary screenings when the schedule permits, and they appreciate how these artistic influences enrich their creative projects.
  travel: Zachary Baker prefers low‑key road trips that combine scenic hikes and photography, such as a recent adventure to Moab’s Arches National Park and a weekend getaway to Boise’s urban gardens, often
    planning trips months ahead to align with family schedules and budgeting constraints, and they relish the balance of exploration and relaxation these trips provide.
  culinary: Zachary Baker experiments in the kitchen with home‑brewing infusions, crafting a spiced cherry ale alongside dishes like smoked pork tenderloin with rosemary‑garlic potatoes and a seasonal quinoa‑and‑roasted
    beet salad, though they often over‑season in the quest for bold flavors and enjoy the occasional culinary misstep as a learning experience.
  core: Zachary Baker is a reserved, curiosity‑driven craftsman who balances methodical organization with spontaneous woodworking projects, careful budgeting with occasional indulgences, and a steady commitment
    to health despite the occasional back ache, and they keep a playful sense of humor about their own quirks.
background:
  cultural: Zachary is a 40‑year‑old white American who grew up in the suburban outskirts of Salt Lake City, Utah. His upbringing was shaped by the Intermountain West's blend of a modest, family‑centered
    ethos and a strong connection to the natural landscape. While not a member of the Church of Jesus Christ of Latter‑Day Saints, he was influenced by the region's community values of self‑reliance, punctuality,
    and service, which inform his work ethic and social preferences. His cultural milieu also includes Midwestern family traditions, a respect for practical craftsmanship, and an appreciation for outdoor
    recreation, all of which continue to guide his personal and professional choices.
