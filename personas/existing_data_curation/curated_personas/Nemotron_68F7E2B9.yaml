  career_goals: Zachary aims to transition from his current non‑workforce status to a flexible, home‑based business that leverages his woodworking and e‑commerce experience, with the long‑term goal of generating
    a sustainable supplemental income stream. He also plans to complete a short certification in solar panel installation, reflecting an interest in the growing green energy sector in Utah. While he values
    family time, he aspires to acquire a part‑time remote position in project coordination that allows him to apply his organizational skills, stay engaged intellectually, and eventually achieve financial
    independence for his family.
