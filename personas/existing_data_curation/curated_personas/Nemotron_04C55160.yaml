personas:
  professional: Abigail Morales, a 93‑year‑old community elder and volunteer coordinator at the Pueblo Hispanic Cultural Center, blends her lifelong curiosity, meticulous budgeting skills, and gentle assertiveness
    to translate for families, preserve oral histories, organize folk‑art events, and mentor younger volunteers while staying flexible enough to adapt to the center’s evolving needs.
  sports: Abigail Morales enjoys leisurely walks along the Arkansas River Trail with the Pueblo Seniors Walking Club, follows the Colorado Rockies baseball team and Colorado Springs Switchbacks FC soccer
    club, and occasionally cheers on Pueblo High School basketball games, balancing her desire for low‑impact exercise with her need for modest social interaction.
  arts: Abigail Morales frequently visits the Pueblo Art Center to study Pueblo pottery by artisans such as Laura Zapata and Celia González, draws inspiration from the vibrant colors of Frida Kahlo’s paintings,
    and finds comfort listening to bolero legend José José, mariachi recordings by Mariachi Vargas de Tecalitlán, and Latin jazz trumpeter Arturo Sandoval while crocheting intricate designs for loved ones.
  travel: Abigail Morales prefers short road trips with her spouse to nearby historic sites like Mesa Verde National Park and the Great Sand Dunes, enjoys cultural excursions to Santa Fe, and, when health
    permits, dreams of visiting Guanajuato to explore its famed plazas, all while budgeting travel costs within her modest pension and balancing relaxation with light adventure.
  culinary: Abigail Morales masterfully prepares mole poblano, tamales de carne, and pozole using chilies, fresh cilantro, epazote, and hominy from her garden, adapts recipes with Colorado‑grown potatoes
    and kale, relishes serving these dishes at family gatherings, and occasionally forgets to set the timer, resulting in over‑browned tortilla chips that become a humorous family anecdote.
  core: Abigail Morales, a 93‑year‑old garden‑loving matriarch who blends steadfast tradition with restless curiosity, worries about finances, overcooks on occasion, yet remains the heartbeat of her community
    through storytelling, volunteer leadership, and gentle advocacy.
background:
  cultural: Abigail descends from a Mexican family originally from the state of Michoacán, renowned for its rich culinary and artistic traditions. Bilingual in Spanish and English, she has woven Mexican
    customs—such as Día de los Muertos altar creation, posadas during Christmas, and traditional religious festivals—into her life in Pueblo, Colorado. The vibrant Hispanic community in Pueblo, with its
    blend of Native Puebloan and Latino cultures, has shaped her appreciation for regional pottery and communal celebrations. Her Catholic faith, family-centered values, and commitment to preserving Mexican
    folklore and cuisine reflect a deep connection to her heritage, while her adaptation to American customs showcases a harmonious bicultural identity.
attributes:
  skills: '[''Traditional Mexican cooking'', ''Spanish-English translation'', ''Gardening and horticulture'', ''Storytelling and oral history preservation'', ''Basic digital communication (email, video
