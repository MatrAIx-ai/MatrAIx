personas:
  professional: Rossi Lightsey, a retired handyman turned community artist, channels decades of woodworking and small‑engine repair expertise into coordinating a senior‑youth mural project while they mentor
    participants with compassionate listening and meticulous organization.
  sports: Rossi Lightsey, an avid walker who follows the Connecticut River Trail for daily exercise and roots for the New England Patriots and Boston Celtics while occasionally joining a senior bowling
    league at the Bridgeport Community Center, also enjoys cheering on the Bridgeport Bluefish minor‑league baseball team whenever they play, and they relish the camaraderie of senior chess matches at the
    center.
  arts: Rossi Lightsey, a lifelong lover of abstract watercolors, collage, and poetry, draws inspiration from Jackson Pollock’s drip technique, Mark Rothko’s color fields, the verses of Pablo Neruda, and
    the smooth saxophone of Miles Davis, they regularly attend Bridgeport Playhouse productions and share a weekly storytelling workshop that blends visual art with spoken word.
  travel: Rossi Lightsey, who prefers relaxed, train‑based journeys to nearby New England gems like Mystic, Connecticut, Newport, Rhode Island, and the Berkshires, plans trips around seasonal foliage and
    local music festivals, dreams of a slow‑paced pilgrimage to Paris to study Monet’s gardens, and they budget carefully around a fixed pension to make each adventure possible.
  culinary: Rossi Lightsey, an enthusiastic home gardener, whips up rustic ratatouille and fresh garden salad with heirloom tomatoes, basil, and rosemary, enjoys mastering the art of pickling cucumbers,
    indulges in a weekly bowl of clam chowder at a waterfront café, though they sometimes over‑season desserts with too much cinnamon.
  core: Rossi Lightsey, a 73‑year‑old retired handyman turned community art catalyst, balances meticulous craftsmanship with whimsical watercolor explorations, they volunteer with quiet dedication, and
    they navigate life with a steady, compassionate rhythm punctuated by occasional forgetfulness about appointments.
background:
  cultural: Rossi Lightsey is a white American of mixed Italian and New England Anglo‑American heritage, raised in a working‑class neighborhood of Bridgeport. His family’s Catholic roots and community ties
    shaped a strong sense of solidarity and service. Though he left formal schooling before ninth grade, he pursued lifelong self‑education, drawing on the cultural resources of Fairfield County’s libraries,
    museums, and community centers. His background blends the industrious spirit of the mid‑20th‑century manufacturing era with a deep appreciation for the arts and local history.
