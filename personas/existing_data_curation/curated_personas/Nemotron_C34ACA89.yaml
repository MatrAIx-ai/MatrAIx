  hobbies: '[''Abstract Watercolor Painting'', ''Mixed-Media Collage'', ''Reading Poetry and Philosophy'', ''Walking and Gardening'', ''Attending Community Theater'', ''Listening to Jazz and Blues'', ''Playing
    Chess'', ''Volunteering at Library'']'
  career_goals: Although retired, Rossi aims to leave a lasting creative and social legacy in Bridgeport. He plans to organize a community mural project that engages senior residents and local youth, publish
    a memoir that intertwines his personal story with the cultural history of Fairfield County, and establish a weekly art‑and‑storytelling workshop at the senior center. He also hopes to become an honorary
    member of the Bridgeport Historical Society, contributing his oral histories and archival research.
