  career_goals: Tracy aims to transition from her informal volunteer work into a full‑time role in community development or nonprofit event management. She plans to complete her associate degree in communications,
    earn a certification in project management, and eventually launch a boutique event‑planning business that serves local charities and small businesses. Her ambition is to combine her love for people,
    her organizational strengths, and her creative ideas to create meaningful community experiences while achieving financial stability.
