    and flexible problem solving'']'
  hobbies: '[''Cooking and experimenting with Southern recipes'', ''Hiking and exploring local nature trails'', ''DIY home décor and craft projects'', ''Event and portrait photography'', ''Attending live
    music and local festivals'', ''Reading mystery and thriller novels'', ''Volunteering at community events and church gatherings'', ''Listening to event‑planning and tech podcasts'', ''Practicing yoga
    for stress relief'', ''Traveling to new cities for inspiration'']'
  career_goals: Laura aims to expand her portfolio from local gatherings to regional conferences, eventually launching her own boutique event‑planning firm that emphasizes sustainable, community‑focused
    experiences. She plans to earn the Certified Meeting Professional (CMP) credential and take on leadership roles within the Arkansas chapter of Meeting Professionals International. Over the next five
    years, she hopes to become the director of events for a regional convention center, mentor emerging planners, and innovate hybrid event formats that blend in‑person hospitality with virtual accessibility.
