personas:
  professional: Laura Fist, a 31-year-old meeting, convention, and event planner, leverages her practical curiosity and calm composure to coordinate complex logistics, negotiate vendor contracts, and lead
    on-site staff while leaving room for last-minute creative pivots that keep clients thrilled.
  sports: Laura Fist jogs with the Little Rock Trail Runners club, follows the Arkansas Razorbacks basketball team, and plays pickup volleyball at the community center during the summer, preferring low-key,
    flexible workouts that fit around her event schedule.
  arts: Laura Fist channels her love of candid moments into photography at gatherings, curates playlists featuring indie folk artists like Phoebe Bridgers and classic soul icons like Otis Redding, and draws
    inspiration from visual storyteller Brandon Stanton’s Humans of New York series when designing event décor.
  travel: Laura Fist enjoys planning weekend getaways that balance adventure and relaxation, having hiked the Ozark Trail, explored Asheville’s art scene, and sampled the food markets of New Orleans, and
    dreams of a future trip to the Scottish Highlands to capture misty landscapes for her photo blog, all while keeping travel costs within a modest budget.
  culinary: Laura Fist, an avid home chef, experiments with Southern dishes like buttermilk fried chicken, shrimp and grits, and pimento cheese, blending smoked paprika and fresh herbs, and her cooking
    skill lands her as the unofficial caterer for friends' gatherings, though she sometimes forgets to clean the kitchen after a busy event day.
  core: Laura Fist is a 31-year-old event planner who blends practical curiosity with a laid-back approach, constantly juggling deadlines and spontaneous creativity while quietly obsessing over the perfect
    spice blend.
background:
  cultural: Laura grew up in Warren, Arkansas, a small town where community ties and Southern hospitality are central. Her upbringing emphasized modesty, hard work, and a love for local traditions such
    as county fairs, church gatherings, and family barbecues. These roots fostered a warm, cooperative demeanor and a respect for established customs, while her curiosity was sparked by the diverse groups
    she later served as an event planner. She balances her appreciation for regional heritage—like country music, folklore, and home‑cooked meals—with a forward‑looking mindset that embraces new event technologies
    and broader cultural influences.
attributes:
  skills: '[''Event logistics coordination'', ''Vendor relationship management'', ''Budget planning and cost control'', ''Contract negotiation'', ''Event marketing and social media promotion'', ''On‑site
