  hobbies: '[''drawing'', ''painting'', ''guitar'', ''listening to indie music'', ''bike riding'', ''video gaming'', ''photography'', ''reading sci‑fi/fantasy'', ''creative writing'', ''DIY electronic music'']'
  career_goals: He hopes to attend a college art program to study graphic design or illustration, aiming to become a freelance visual artist or animator who can blend his love for music and storytelling.
    He imagines creating indie game artwork or music videos, traveling to art festivals, while staying flexible in his work schedule. He is open to further exploring web design or multimedia production.
    He wants to someday mentor younger kids in his community through art workshops.
