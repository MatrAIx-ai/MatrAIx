personas:
  professional: Andrew Mosley, a high‑school junior with a budding talent in visual storytelling, combines beginner‑level proficiency in Procreate and Photoshop with a love for acoustic guitar and narrative
    game mods, channeling their curiosity and relaxed approach to projects into freelance illustration concepts that blend music and art.
  sports: Andrew Mosley cycles the rolling countryside around Osceola with the local Osceola Bike Club, cheers for the Orlando City SC during weekend matches, and follows the Orlando Magic, while occasionally
    joining casual pickup soccer games at the community park, preferring low‑key activity over regimented training.
  arts: Andrew Mosley spends afternoons painting twilight farm fields, snapping sunset photos of community gatherings, and listening to indie folk staples like Bon Iver, Fleet Foxes, and The National while
    strumming simple chords on an acoustic guitar, a habit that fuels their sketching of whimsical characters inspired by Studio Ghibli and graphic novels.
  travel: Andrew Mosley loves spontaneous weekend trips to art festivals such as the Wynwood Walls street art fair in Miami, the First Fridays art walk in downtown Orlando, and day‑long hikes in the nearby
    Ocala National Forest, preferring flexible itineraries that allow impromptu photo stops over meticulously booked tours.
  culinary: Andrew Mosley favors quick, creative meals like avocado toast with fresh basil, ramen bowls flavored with miso and soy sauce, and banana‑oat pancakes topped with cinnamon and berries, often
    experimenting with simple kitchen gadgets while relying on pizza delivery for late‑night gaming sessions.
  core: Andrew Mosley is a 16‑year‑old visual dreamer who cycles through art, music, and indie games with a relaxed, slightly disorganized charm, often swapping a sketch for a snack, and dreaming of freelance
    gigs that let them mentor younger creators.
background:
  cultural: Andrew grew up in the small, close‑knit town of Osceola in Clarke County, Iowa, within a predominantly white, Midwestern community that values modesty, self‑reliance, and community involvement.
    His family has roots in generations of small‑farm and small‑town life, with a background of Protestant church attendance and participation in local events such as county fairs and high school sports.
    The region’s open landscapes and agricultural rhythms have shaped his appreciation for nature and the simplicity of rural life, while his exposure to local school art programs and community centers
    has fostered his curiosity about broader artistic and cultural ideas.
