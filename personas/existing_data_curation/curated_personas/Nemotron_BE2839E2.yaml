  hobbies: '[''Bridge'', ''Crossword puzzles'', ''Sudoku'', ''Knitting'', ''Gardening'', ''Genealogical research'', ''Attending library lectures'', ''Volunteer computer tutoring'']'
  career_goals: Although retired from formal employment, Marjan aims to deepen her impact in the local community by expanding the senior‑center’s outreach programs, securing grant funding for a neighborhood
    food‑bank initiative, and completing her associate degree in Business Administration. She also aspires to compile a memoir of her life experiences and the history of her family, with the ambition of
    publishing it for future generations. Maintaining her mental acuity and staying physically active are central to her personal goals, as is gaining recognition as a trusted organizer within Bergen County.
