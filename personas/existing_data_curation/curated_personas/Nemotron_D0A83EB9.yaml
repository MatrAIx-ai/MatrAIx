personas:
  professional: Miguel Sanmartin is a seasoned automotive service technician whose mastery of advanced diagnostics, creative custom paint artistry, and patient mentorship reflects his imaginative curiosity,
    relaxed approach to scheduling, and compassionate commitment to his community.
  sports: Miguel Sanmartin plays midfield for the Davenport Soccer Club, fuels his weekends with weight‑training and community bike rides, and loudly roots for the Chicago Cubs during baseball season while
    also cheering the St. Louis Cardinals in the World Series.
  arts: Miguel Sanmartin paints concept cars with bold hues inspired by Frida Kahlo, sketches late‑night automotive studies while strumming guitar riffs from Carlos Santana and John Mayer in his neighborhood
    band, and he frequents the local art walk to admire works by Diego Rivera and performances by Rodrigo y Gabriela.
  travel: Miguel Sanmartin favors spontaneous road trips in his retro Mustang, dreaming of a cross‑country EV rally through Portland, Seattle, and the Pacific Coast Highway, while cherishing past visits
    to Austin’s live‑music scene, the colorful markets of Oaxaca, and the colonial streets of Guanajuato, all planned on the fly within his modest travel budget.
  culinary: Miguel Sanmartin is a capable home cook who masterfully prepares mole poblano with roasted chiles and chocolate, slow‑cooks tamales stuffed with pork and masa, and whips up fresh guacamole with
    ripe avocados, lime, and jalapeños, often sharing these dishes at neighborhood barbecues where his salsa is the talk of the block.
  core: Miguel Sanmartin fuses his grease‑stained wrench in one hand with a guitar in the other, juggling spontaneous car projects, family cookouts, and lofty boutique‑shop dreams, even as his love of improvisation
    leads him to forget bill payments and leave tools scattered across his garage.
background:
  cultural: Miguel was raised in a bilingual Mexican household, celebrating traditions such as Día de los Muertos, Cinco de Mayo, and holiday family gatherings centered around homemade tacos, tamales, and
    mole. His Mexican heritage informs his strong emphasis on family, community, and hospitality, which he carries into his daily life in Davenport. While embracing Midwestern values of hard work and reliability,
    he also brings a vibrant cultural flair—through music, cuisine, and storytelling—to his social circles and professional interactions.
attributes:
  skills: '[''Automotive diagnostics (OBD‑II, ECU)'', ''Engine rebuilding and performance tuning'', ''Hybrid and electric vehicle systems knowledge'', ''Custom paint and graphic design for cars'', ''Metal
    fabrication and bodywork'', ''Advanced troubleshooting and problem solving'', ''Customer service and communication'', ''Mentoring and training of apprentices'']'
  hobbies: '[''Painting and sketching automotive designs'', ''Car photography'', ''Scale model building'', ''Electric vehicle conversion projects'', ''Attending car shows and meet‑ups'', ''Playing guitar
    in a community band'', ''Cooking Mexican cuisine'', ''Organizing neighborhood barbecues and soccer games'']'
  career_goals: Miguel aims to become an ASE Certified Master Technician within the next two years and transition into a service manager role at his current shop. His long‑term ambition is to open a boutique
    auto shop in Davenport that specializes in eco‑friendly performance upgrades and artistic customizations. He also hopes to launch a community outreach program that provides free automotive training
    to local youth, especially those from underrepresented backgrounds, combining his technical skills with his compassionate drive to help others.
