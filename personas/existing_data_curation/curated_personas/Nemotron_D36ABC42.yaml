  career_goals: Martha envisions a future where she can blend her love for art and technology. In the short term, she aims to secure a spot in her high school's advanced art program and to win a regional
    youth art competition with an original graphic narrative. She also hopes to place in a state-level science fair by developing a project that uses visual design to communicate scientific concepts. Long‑term,
    Martha aspires to study visual storytelling or interactive media at a college such as Rhode Island School of Design or a comparable program, ultimately working as a multidisciplinary creator—perhaps
    as a graphic novelist, multimedia artist, or museum exhibit designer—who can craft immersive experiences that challenge conventional thinking.
