personas:
  professional: Martha Lindsey, a 12‑year‑old aspiring visual storyteller, blends sketching, short‑video editing, and beginner coding to create interactive art pieces that explore speculative narratives,
    though their relaxed attitude toward deadlines sometimes leaves projects half‑finished.
  sports: Martha Lindsey, an avid waterfront cyclist who rides a blue bike along the Boston Harbor, participates in a junior bike‑racing club, engages in strategy‑heavy board‑game battles that they treat
    like mental sport, and passionately supports the Boston Red Sox and New England Revolution, though they tend to avoid formal team sports in favor of solitary or small‑group activities.
  arts: Martha Lindsey, a devoted sketcher of cityscapes and people, spends weekends wandering the Museum of Fine Arts and the Institute of Contemporary Art for inspiration, admires artists such as Yayoi Kusama,
    Banksy, and the surrealist illustrator Shaun Tan, and infuses short videos with synthwave tracks by Com Truise, turning everyday scenes into experimental visual stories.
  travel: Martha Lindsey, a curious explorer of New‑England history, enjoys spontaneous day trips to historic Salem, the Freedom Trail, and the rocky beaches of Cape Cod, dreams of traveling to Tokyo’s
    teamLab Borderless exhibit to experience immersive digital art, and prefers packing a sketchbook and bike over detailed itineraries, allowing flexibility to chase whatever catches their eye.
  culinary: Martha Lindsey, a budding home‑chef, delights in crafting homemade ramen with miso broth, topping it with soft‑boiled eggs and spicy kimchi, bakes brightly frosted cupcakes for board‑game nights,
    and experiments with grilled cheese sandwiches enhanced by jalapeño slices and a drizzle of truffle oil, though they sometimes burn the toast while juggling a sketchbook.
  core: Martha Lindsey, a 12‑year‑old art‑obsessed tech tinkerer, channels a competitive curiosity into sketching, coding interactive pieces, and cycling adventures, while juggling a chaotic allowance budget
    and occasionally misplacing essential items like their inhaler.
background:
  cultural: Martha was born and raised in Revere, Massachusetts, a working‑class coastal city in Suffolk County that sits just north of Boston. Her family is of Irish‑American heritage, and they celebrate
    traditional New England holidays such as Thanksgiving, the Fourth of July, and St. Patrick’s Day, often incorporating community events like the local St. Patrick’s Parade. Growing up near the vibrant
    cultural institutions of Boston, she has been exposed to a wide array of artistic and historical influences, from the colonial history of the region to contemporary museum exhibitions. Her public school
    education emphasizes civic engagement and offers robust arts programs, which have nurtured her curiosity and appreciation for diverse creative expressions. While primarily English‑speaking, she has
    taken introductory Spanish classes at school, reflecting the multicultural environment of the Greater Boston area. This blend of New England traditions, community involvement, and access to urban cultural
    resources shapes Martha’s worldview and artistic sensibility.
