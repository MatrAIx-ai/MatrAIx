persona_description: A PCB design engineer who specializes in optimizing ground planes and minimizing EMI issues in PCB layouts. They are skilled in using split ground planes, bypass capacitors, and minimizing
  trace lengths to achieve optimal electromagnetic interference performance. They are also proficient in using vias and other PCB design techniques to minimize return currents and avoid reflections. They
  have experience in designing high-speed and low-speed circuits, analog and digital components, and have a keen eye for minimizing cross-talk and maximizing trace length. They are known for their attention
  to detail and their ability to create PCB designs that are not only functional but also environmentally friendly.
