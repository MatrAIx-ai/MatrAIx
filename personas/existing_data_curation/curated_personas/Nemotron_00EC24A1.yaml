personas:
  professional: Donald Arcoleo, a 13‑year‑old budding digital illustrator and aspiring concept artist, merges a vivid imagination with disciplined organization to create intricate fan art and sci‑fi storyboards,
    while their competitive edge drives them to master complex strategy‑based video games and perfect LEGO constructions.
  sports: Donald Arcoleo, an energetic participant in the Eastside Hoops Youth Basketball League and a frequent visitor to the neighborhood skate park, channels competitive spirit into daily drills, roots
    for the Los Angeles Lakers, and squeezes in weekend hikes at Green Valley Trail to stay active.
  arts: Donald Arcoleo, an enthusiastic creator who spends evenings crafting digital illustrations in Procreate and devouring graphic novels like Saga, Watchmen, and Scott Pilgrim, finds inspiration in
    the indie sounds of Tame Impala, Phoebe Bridgers, and The Strokes, and channels that eclectic mix into vivid sci‑fi short stories and LEGO sculptures.
  travel: Donald Arcoleo, who prefers a blend of spontaneous local hikes and meticulously planned family trips, has explored the Redwood State Park and the bustling Akihabara district in Tokyo, dreams of
    visiting the Space Center Houston and the Icelandic aurora, and always packs a sketchbook to capture new scenery.
  culinary: Donald Arcoleo, a budding home‑chef with moderate cooking skills, favors bold flavors like spicy kimchi tacos, comforting ramen bowls, and chocolate‑chip pancakes topped with fresh berries,
    often experimenting with matcha‑infused frosting and jalapeño slices, yet sometimes skips meals to stay up late gaming.
  core: Donald Arcoleo, a 13‑year‑old digital dreamer, balances a competitive drive with a vivid imagination, turning stress into art, strategy games, and a relentless chase for novelty, even if it means
    occasional late‑night gaming marathons.
background:
  cultural: He is a White American adolescent raised in the suburban community of Succasunna, New Jersey. His upbringing reflects typical middle‑class values of the region, including a focus on education,
    participation in school extracurricular activities, and engagement with mainstream U.S. culture such as celebrating national holidays (Thanksgiving, Christmas) and enjoying popular media. The local
    environment provides access to community resources like public libraries, sports fields, and art programs, shaping his interests and social experiences.
