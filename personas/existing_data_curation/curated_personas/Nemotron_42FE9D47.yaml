  career_goals: Approaching retirement, William aims to channel his lifelong culinary passion into a small, community‑focused bistro that celebrates Midwestern farm‑to‑table cuisine. He hopes to author
    a cookbook that blends traditional Indiana recipes with artistic plating concepts, preserving regional food heritage for future generations. Additionally, William aspires to mentor aspiring chefs through
    part‑time teaching at the local community college and to occasionally compete in senior culinary contests, keeping his competitive spirit alive while sharing his knowledge.
