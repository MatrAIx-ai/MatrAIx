persona_description: A mathematics teacher who is involved in the implementation of lesson study (LS) as a teaching and learning strategy in Japanese schools. This teacher has a high level of experience
  and expertise in teaching mathematics, and has participated in various LS groups within the school or educational office. They have a strong interest in professional development and are committed to improving
  their teaching skills and knowledge. They are also interested in the impact of LS on their professional development and the impact of LS on students' learning and thinking. They are aware of the importance
  of specifying and allocating enough time for practicing LS and the advantages of doing so. They are open to conducting research to identify key points and practices of LS for the development of teachers'
  skills in understanding and observing classroom practices.
