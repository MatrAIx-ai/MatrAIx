  hobbies: '[''reading mystery novels'', ''solving crosswords and sudoku'', ''gardening'', ''knitting and crocheting'', ''birdwatching'', ''journaling observations'', ''cooking and baking'']'
  career_goals: Courtney aims to transition from her current cashier role to a shift supervisor position within the next 12 months, leveraging her organizational strengths to improve store efficiency. Her
    ultimate ambition is to become a store manager, where she can set performance standards, implement systematic workflow improvements, and lead a team to exceed sales targets. To support this, she plans
    to enroll in a community‑college retail management certificate program that covers operations, staff development, and budgeting. Over the next five years, she hopes to be recognized for measurable gains
    in inventory accuracy and customer satisfaction. Additionally, she envisions eventually launching a small home‑based online shop for handcrafted knit items, applying her disciplined approach to inventory
    control and financial planning.
