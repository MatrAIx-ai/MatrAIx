  career_goals: Although Dawn is only one year old, the traits she displays point toward future ambitions in caring and creative fields. Her deep empathy, desire for harmony, and love of art suggest she
    may someday pursue a career as an early‑child educator, pediatric nurse, or community artist who uses visual and musical expression to bring comfort and joy to others. Her methodical nature hints at
    a future preference for organized environments, such as a classroom or clinic, where she can plan ahead and follow through on commitments.
