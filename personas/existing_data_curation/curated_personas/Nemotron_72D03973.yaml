personas:
  professional: Joseph Whitman is a hands‑on problem solver who is launching a part‑time home‑repair consultancy, leveraging his carpentry, small‑engine repair, and event‑planning expertise to provide structured,
    reliable services while mentoring younger residents through a planned community woodworking studio.
  sports: Joseph Whitman follows the St. Louis Cardinals and the Pittsburgh Steelers, participates in local skeet‑shooting tournaments with the Perry County Outdoor Club, goes ice‑fishing in winter, and
    hunts during the Appalachian season, while playing occasional pick‑up basketball at the community center.
  arts: Joseph Whitman volunteers at the community theater, performing in Neil Simon comedies and organizing set construction, enjoys poker nights where he references classic films like Casablanca, and
    curates historical exhibitions that feature artifacts from local folk traditions, all of which shape his identity as a socially engaged creative.
  travel: Joseph Whitman prefers structured road trips, having mapped out annual visits to the Blue Ridge Parkway, a weekend fishing lodge in the Finger Lakes, and a summer heritage tour of Colonial Williamsburg,
    balancing his love for nature with a desire to explore historical sites.
  culinary: Joseph Whitman loves hearty Mid‑Atlantic fare, regularly cooking fresh trout caught on the lake with lemon‑butter sauce, smoky Kansas City‑style ribs, and homemade cornbread, but admits to over‑seasoning
    his dishes when multitasking between projects.
  core: Joseph Whitman blends a competitive, structured mindset with a love for community, often juggling too many projects while forgetting to relax.
background:
  cultural: Joseph grew up in rural Perry County, Arkansas, immersed in Southern traditions of self‑reliance, neighborly hospitality, and community fellowship. His upbringing emphasized practical skills,
    church involvement, and a love for the outdoors—values that still shape his worldview. He identifies with the regional culture of country music, high school sports enthusiasm, and seasonal agricultural
    cycles, while also appreciating the modest, pragmatic mindset typical of Mid‑South residents. This cultural backdrop informs his preference for structured routines, his competitive spirit in sporting
    activities, and his dedication to helping sustain local community bonds.
