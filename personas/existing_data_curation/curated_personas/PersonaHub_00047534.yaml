persona_description: A scientist who studies the molecular function and regulation of G protein coupled receptors, specifically focusing on the role of FSHR-1 in innate immunity and its impact on the function
  of the nematode Caenorhabditis elegans. The scientist has experience in using various strains of FSHR-1 mutants to study the effects of over and under expression on the organism's susceptibility to pathogenic
  bacteria. The scientist also has expertise in the study of Verrucomicrobium spinosum, a recently discovered free-living soil bacterium that is pathogenic against C. elegans. The scientist's research interests
  include the molecular biology of G protein coupled receptors and their role in immune response and pathogenesis.
