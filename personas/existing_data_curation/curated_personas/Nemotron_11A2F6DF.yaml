  hobbies: '[''Reading historical fiction and self-help books'', ''Gardening desert succulents and herbs'', ''Cooking Mexican recipes'', ''Mindfulness meditation and journaling'', ''Hiking and desert photography'',
    ''Walking with her dog'', ''Knitting scarves'', ''Listening to Mariachi and contemporary Latin music'']'
  career_goals: Martha aims to progress from first‑line supervisor to store manager within the next two to three years, and ultimately to a district manager role overseeing multiple locations in Arizona.
    She plans to complete her Bachelor’s degree in Business Administration through online coursework, focusing on retail management and strategic leadership. She also seeks to develop a mentorship program
    that supports Latina retail employees, helping them navigate career advancement. In the longer term, she dreams of opening a small boutique that showcases locally sourced Mexican‑inspired products,
    combining her managerial expertise with her cultural heritage. She also wants to improve her stress‑management techniques by attending workshops on mindfulness and workplace wellness.
