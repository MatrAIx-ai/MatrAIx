  career_goals: At this stage Rose has no defined career path, but her parents notice her fascination with animals, plants, and how things work. They nurture a hope that she may one day channel her practical
    curiosity and caring nature into a profession that blends structure with exploration—such as a wildlife caretaker, environmental educator, pediatric nurse, or science teacher. Her emerging need for
    routine and her cooperative yet occasionally assertive temperament suggest she would thrive in roles that require both organization and compassionate interaction.
