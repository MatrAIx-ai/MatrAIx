  hobbies: '[''Adult recreational soccer'', ''Live music and concert attendance'', ''Craft brewery tours'', ''Street photography'', ''Trivia nights'', ''Reading about innovation and self‑improvement'',
    ''Cooking Italian cuisine'', ''Hiking in the Laurel Highlands'', ''Community theater improvisation'']'
  career_goals: David aims to translate his outgoing nature and knack for spontaneous coordination into a flexible, community‑focused venture—such as a co‑working and event space that doubles as a hub for
    local sports leagues, trivia nights, and cultural gatherings. He is drawn to entrepreneurship that lets him set his own schedule while still engaging with people daily. In the medium term, he hopes
    to build a reputation as a go‑to consultant for small businesses in Pittsburgh seeking authentic, grassroots marketing strategies, and to develop better self‑management habits that reduce his anxiety
    around deadlines.
