  career_goals: Rocel aims to transition into a nurse manager or clinical educator role where she can design and implement streamlined workflows that enhance patient safety and staff satisfaction. She plans
    to pursue a Master of Science in Nursing (MSN) with a focus on healthcare administration and quality improvement, while obtaining a specialty certification in wound care or oncology. Her ambition is
    to mentor newer nurses, champion evidence‑based practice, and create a supportive environment that balances professional growth with manageable stress levels, allowing her to maintain personal well‑being
    and stability.
