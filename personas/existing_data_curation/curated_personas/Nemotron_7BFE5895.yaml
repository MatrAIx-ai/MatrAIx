personas:
  professional: Rocel Poncedeleon, a 38‑year‑old registered nurse with a STEM bachelor’s degree, combines methodical patient assessments, precise EMR documentation, and a passion for quality‑improvement
    to lead multidisciplinary teams while planning a transition to nurse manager and clinical educator roles.
  sports: Rocel Poncedeleon, a 38‑year‑old health‑care professional, roots for the Houston Astros and Houston Dynamo, joins a weekly walking group at the city park, attends a mid‑week yoga class at the
    community center, and they play on a casual co‑ed softball league with fellow nurses each summer.
  arts: Rocel Poncedeleon, a 38‑year‑old nurse, unwinds by knitting patterned scarves while listening to the soulful vocals of Lila Downs and the piano lullabies of Ludovico Einaudi, devours mystery novels
    by Agatha Christie and historical sagas by Ken Follett, and they regularly attend local art gallery openings featuring Frida Kahlo retrospectives and community theater performances of classic plays
    like 'A Streetcar Named Desire'.
  travel: Rocel Poncedeleon, a 38‑year‑old registered nurse, prefers meticulously planned trips that blend cultural immersion with comfortable accommodations, has explored the historic streets of Oaxaca,
    the vineyards of Portugal’s Douro Valley, and the serene temples of Kyoto, and they dream of a relaxed road‑trip along the Pacific Coast with stops at coastal towns for fresh seafood and beachfront
    yoga sessions.
  culinary: Rocel Poncedeleon, a 38‑year‑old culinary enthusiast, expertly prepares family‑passed tamales, pozole, and enchiladas using fresh garden cilantro, epazote, and roasted ancho chiles, balances
    the meals with homemade salsa verde and a side of roasted sweet potatoes, and they often host neighborhood potlucks where they share their signature mole sauce while occasionally ordering takeout pizza
    on nights when fatigue sets in.
  core: Rocel Poncedeleon, a 38‑year‑old nurse who thrives on routine, juggles meticulous patient care with nightly knitting and weekend cooking marathons, yet they secretly worry about every detail and
    can’t resist a late‑night slice of pepperoni pizza after a long shift.
background:
  cultural: Rocel was raised in a Mexican‑American household in Irving, Texas, speaking both Spanish and English fluently. Her family maintains strong ties to Mexican traditions, celebrating Día de los
    Muertos, Semana Santa, and traditional holidays with extended relatives. Catholic values and a deep respect for family cohesion shape her worldview. She actively participates in local cultural festivals,
    enjoys ranchera and mariachi music, and often shares homemade Mexican cuisine with friends and neighbors. The vibrant Mexican community in Dallas County provides her with a supportive network that reinforces
    her cultural identity while she navigates her professional and personal life.
