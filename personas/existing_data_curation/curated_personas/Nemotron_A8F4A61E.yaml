  career_goals: Irma aims to build a career as a digital marketing strategist for a culturally focused brand, leveraging her bilingual skills and creative flair to craft campaigns that celebrate Latinx
    heritage. In the next three to five years she hopes to secure a role that offers flexibility and creative autonomy, while also developing her project‑management capabilities. Ultimately she envisions
    launching an online boutique that showcases handcrafted accessories made by local Hispanic artisans, combining entrepreneurship with community empowerment.
