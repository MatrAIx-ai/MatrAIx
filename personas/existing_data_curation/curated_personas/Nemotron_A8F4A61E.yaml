personas:
  professional: Irma Rodriguezdiaz, a 22‑year‑old bilingual digital marketing enthusiast, blends their curiosity for emerging trends with a practical knack for rapid tech adoption to craft culturally resonant
    campaigns, yet their spontaneous nature often clashes with tight deadlines, making them rely on improvisational workflow and last‑minute brainstorming.
  sports: Irma Rodriguezdiaz, 22, channels their competitive edge into weekend salsa‑dance marathons and regular hikes with the Dallas Urban Hikers, while cheering for the Dallas Mavericks, the Cowboys,
    and FC Dallas, and they hit the local CrossFit box for spontaneous yet intense workouts.
  arts: Irma Rodriguezdiaz, 22, captures spontaneous moments through street photography and Adobe Photoshop illustrations inspired by the bold colors of Frida Kahlo and the rhythm of Bad Bunny, while unwinding
    to Shakira’s salsa beats and binge‑watching indie films by Guillermo del Toro.
  travel: Irma Rodriguezdiaz, 22, roams from impulsive weekend trips to Texas Hill Country to annual New Orleans Mardi Gras celebrations, dreams of exploring Oaxaca’s bustling markets and Barcelona’s modernist
    architecture, yet budget constraints and a packed class schedule often steer them toward concise, budget‑friendly itineraries.
  culinary: Irma Rodriguezdiaz, 22, experiments with homemade tacos al pastor, smoky chipotle‑infused guacamole, and quick‑cook chilaquiles, balancing their moderate kitchen confidence with a habit of over‑seasoning
    dishes with cilantro, lime, and jalapeño, while occasionally resorting to fast‑food burritos when a deadline looms.
  core: Irma Rodriguezdiaz, 22, is a curiosity‑driven, spontaneously competitive creative who juggles anxiety‑fueled stress with bursts of salsa, digital art, and entrepreneurial dreaming; they wrestle
    with procrastination and a love for last‑minute inspiration.
background:
  cultural: Irma is a second‑generation Hispanic American, raised in a bilingual household in Garland, Texas. Her family traces its roots to Mexico, and Spanish is spoken at home alongside English. She
    grew up immersed in both Mexican traditions—such as Día de los Muertos, Mexican Independence Day celebrations, and family‑centric gatherings—and the multicultural milieu of the Dallas‑County region.
    This dual cultural exposure informs her identity, her love for Latin music and dance, and her desire to uplift her community through creative work.
