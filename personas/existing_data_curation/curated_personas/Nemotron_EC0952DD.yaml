personas:
  professional: Eric Marshall, a budding preschool 'little engineer' who channels his curiosity and practicality into building intricate block structures during free play, balances organized step-by-step
    instructions with spontaneous creativity, and always makes sure to include friends in his projects, showing they value cooperation even at this early stage.
  sports: Eric Marshall, an energetic participant in the neighborhood Kids' Soccer League and after-school swimming lessons at the YMCA, eagerly cheers for the Chicago Cubs on weekends and models his own
    teamwork after their coordinated plays, while balancing his love for organized drills with spontaneous games of tag that satisfy his need for flexible, sociable fun, showing they thrive in group settings.
  arts: Eric Marshall, a lively fan of Sesame Street's music and the whimsical stories of Mo Willems, spends afternoons drawing colorful pictures of his friends, singing along to Raffi's 'Baby Beluga',
    and eagerly participates in kindergarten's dance circle, where their compassionate nature shines as they help shy classmates feel included.
  travel: Eric Marshall, an adventurous traveler who has already explored Disneyland, spent a summer weekend at his grandparents' farm in the countryside, and delighted in a recent beach vacation on the
    Gulf Coast, prefers short, well-planned trips with plenty of familiar faces, yet their curiosity drives them to ask endless questions about each new place, sometimes causing them to feel anxious about
    unfamiliar routines.
  culinary: Eric Marshall, a picky yet surprisingly adventurous eater, loves cheesy macaroni, chicken nuggets dipped in honey mustard, and fresh apple slices, occasionally ventures to try broccoli florets
    seasoned with a sprinkle of parmesan, and delights in strawberry-yogurt smoothies flavored with banana, all while insisting on a strict bedtime snack routine that includes a small glass of milk, showing
    they enjoy comfort foods but welcome occasional new flavors.
  core: Eric Marshall is a vivacious four-year-old whose boundless curiosity, compassionate heart, and occasional worry blend into a charming mix of organized play, cooperative friendships, and a penchant
    for saving coins and snack-time rituals, showing they approach life with both careful planning and heartfelt enthusiasm.
background:
  cultural: Eric comes from a white, Midwestern American family living in Lincoln, Nebraska, with roots in the broader cultural traditions of the region. His family participates in typical Midwestern customs
    such as celebrating Thanksgiving, attending local community festivals, and going to a nearby church on Sundays. He grows up with values of modesty, practicality, cooperation, and community service that
    are common in Nebraska. Family gatherings often feature potluck meals, outdoor activities like hiking or backyard games, and shared storytelling, reinforcing his compassionate and cooperative nature.
attributes:
  skills: '["basic literacy (recognizing letters and simple words)", "early numeracy (counting to ten, recognizing numbers)", "fine motor skills (drawing, cutting with child‑safe scissors, building with
    blocks)", "gross motor skills (running, climbing, jumping)", "social cooperation (sharing, turn‑taking, group play)", "empathy and compassion (comforting friends, offering help)", "following routines
    and self‑care (dressing, hand‑washing, tidying up)", "curiosity‑driven exploration (asking questions, nature collection)", "basic problem‑solving (simple puzzles)", "basic digital interaction (using
    touchscreen educational apps)"]'
  hobbies: '["building with wooden blocks", "drawing and coloring", "listening to and telling stories", "pretend play (firefighter, teacher, doctor)", "group games at the park", "collecting natural items
    (leaves, rocks, sticks)", "simple chores (setting the table, feeding the pet)", "using educational touchscreen apps"]'
  career_goals: Even at four, Eric talks about future roles where he can keep others safe and help them learn. He often says he wants to be a firefighter because he likes the big trucks and rescuing people,
    and he also imagines being a teacher who reads stories and helps friends discover new things. He is attracted to careers that blend caring for others with clear, organized routines, such as a pediatric
    nurse, a community garden caretaker, or a school aide. His overarching ambition is to become a "big helper" who makes people feel safe, happy, and understood.
