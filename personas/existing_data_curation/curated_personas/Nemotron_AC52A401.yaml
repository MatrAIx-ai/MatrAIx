personas:
  professional: Alexandria Sorhage, an inquisitive infant who spends hours exploring cause‑and‑effect toys, already demonstrates the analytical curiosity and meticulous planning that foreshadow a future
    career as a biomedical researcher skilled in systematic experimentation and data organization.
  sports: Alexandria Sorhage, a newborn fan of the City United Youth Academy soccer club, often naps with a soft blanket bearing the team’s logo, and enjoys baby swim classes that introduce her to the rhythmic
    movements of water, laying a foundation for future athletic engagement.
  arts: Alexandria Sorhage delights in the gentle melodies of Mozart’s 'Eine kleine Nachtmusik' during bedtime, responds with bright eye contact to high‑contrast visual art books by illustrator Eric Carle,
    and frequently visits the children's gallery at the metropolitan museum with her parents, shaping her early artistic appreciation.
  travel: Alexandria Sorhage, already taken on weekend trips to her grandparents’ countryside farm and a family vacation to the coastal town of San Diego, cherishes car‑seat views of the ocean and dreams
    of future visits to Kyoto’s bamboo forest and the Smithsonian National Air and Space Museum.
  culinary: Alexandria Sorhage, presently enjoying smooth pureed sweet potatoes, avocado mash, and oatmeal cereal seasoned lightly with cinnamon, shows a preference for sweet, silky textures and relishes
    occasional spoon‑fed carrot purée, while her parents experiment with homemade organic baby biscuits.
  core: Alexandria Sorhage, a newborn bursting with curiosity yet prone to fussiness, balances methodical play with gentle solitude, and already navigates a world of organized routines, cautious worries,
    and emerging sensory delights.
background:
  cultural: Alexandria is raised in a predominantly white, Midwestern setting in Middlebury, Indiana, where community values such as humility, cooperation, and reverence for local traditions shape her worldview.
    Her family’s involvement in church gatherings, county fairs, and school events fosters a deep sense of belonging, while the rural environment nurtures an appreciation for natural rhythms and straightforward,
    honest communication. Exposure to the local library’s children’s programs and regional art festivals encourages her emerging love for creativity, new ideas, and unconventional thinking.
