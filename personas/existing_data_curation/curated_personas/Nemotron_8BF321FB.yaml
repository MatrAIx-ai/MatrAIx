  hobbies: '[''Watercolor painting'', ''Nature photography'', ''Gardening (native Florida plants)'', ''Kayaking'', ''Bird watching'', ''Attending art festivals and gallery openings'', ''Reading philosophy,
    history, and technology articles'', ''Playing chess and poker'', ''Volunteering at community garden'', ''Senior tennis'']'
  career_goals: Although retired from formal employment, Nicholas aims to remain active and purposeful. He hopes to transition his artistic skills into a community presence by organizing and participating
    in local art exhibitions, offering informal workshops for aspiring painters, and curating seasonal art walks in Port Charlotte. He also aspires to mentor younger volunteers at the county historical
    society, sharing his negotiation expertise for fundraising. On a personal level, he seeks to keep his competitive edge sharp by competing in senior chess tournaments and regional poker leagues, while
    maintaining a flexible schedule that allows spontaneous travel to art festivals across Florida.
