  career_goals: Richard dreams of one day combining his love for art and technology. He talks about becoming a video‑game designer or a cartoon illustrator who can create interactive stories. He also imagines
    working as a wildlife photographer or an environmental scientist, exploring the outdoors of Alabama and using his artistic eye to document nature. While his goals are still playful, he frequently expresses
    a desire to invent gadgets that help people and to share his creations at school fairs or local community events.
