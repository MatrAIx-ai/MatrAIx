  career_goals: Yovany’s immediate goal is to earn a promotion to Sergeant within the next 12‑18 months, positioning him to lead a precinct shift and mentor junior officers. Over the next five years he
    aims to complete a bachelor’s degree in criminal justice and obtain advanced certifications in crisis negotiation, forensic analysis, and community liaison work. His long‑term ambition is to rise to
    Lieutenant and eventually Captain, where he can shape department policies that prioritize culturally competent policing and stronger bonds with Gwinnett County’s diverse neighborhoods. He also aspires
    to develop a bilingual community outreach program that reduces language barriers and builds trust between law enforcement and the Hispanic community.
