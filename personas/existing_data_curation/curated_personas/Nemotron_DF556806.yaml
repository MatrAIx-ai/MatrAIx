personas:
  professional: Jamin Sierra, a soon‑to‑be HVAC and electrical apprentice, blends practical DIY know‑how with a curiosity for renewable tech, applying their laid‑back yet hands‑on approach to troubleshooting
    and eco‑friendly home‑repair projects.
  sports: Jamin Sierra roams Colorado’s backcountry on a mountain bike with the Denver Bicycling Club, supports the Denver Broncos and Colorado Avalanche, and in winter switches to snowshoeing on the Front
    Range while keeping a flexible training routine that favors trail rides over rigid gym schedules.
  arts: Jamin Sierra sketches urban wildlife, creates digital art inspired by the surrealism of Alex Ross, strums acoustic renditions of The Strokes and Led Zeppelin at friends’ gatherings, and regularly
    attends Denver’s indie‑music showcases featuring bands like Arcade Fire and local folk singer Jenny Mills.
  travel: Jamin Sierra prefers spontaneous bike‑packing trips over meticulously planned vacations, having already explored Moab’s slick desert trails and dreamed of tackling the Great Divide Mountain Bike
    Route, while budget constraints keep long‑haul flights to occasional weekend escapes to nearby Asheville, NC.
  culinary: Jamin Sierra favors hearty Colorado cuisine, often cooking quinoa‑black bean bowls with roasted sweet potatoes, grilled bison burgers, and a dollop of chimichurri, while their moderate cooking
    skill shines at community‑garden potlucks where they experiment with fresh herbs like cilantro and sage.
  core: Jamin Sierra is a laid‑back bike‑obsessed DIYer who swaps spreadsheets for trail maps, tunes an acoustic guitar while tightening bolts, and never quite masters punctuality, often forgetting appointments
    when the next sunrise callouts.
background:
  cultural: Jamin was raised in Englewood, a suburban community of the Denver metropolitan area, within a predominantly white, middle‑class environment that places a high value on outdoor recreation and
    self‑reliance. His family’s cultural orientation reflects mainstream American traditions—emphasizing modesty, volunteerism, and respect for nature—aligned with Colorado’s strong Rocky‑Mountain lifestyle.
    He grew up attending local schools, participating in community events, and absorbing a blend of regional outdoor ethics and broader national values of individualism and community involvement.
attributes:
  skills: '["Computer troubleshooting", "Bicycle and skateboarding maintenance", "DIY home repairs", "Basic woodworking", "Customer service", "Team collaboration", "Introductory photography"]'
