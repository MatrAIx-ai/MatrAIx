  career_goals: Chelsea aims to graduate high school and secure a part‑time position in hospitality at a local resort or theme‑park, using her social strengths to gain hands‑on guest‑service experience.
    She plans to attend a community‑college program in business administration or tourism management, with a long‑term goal of working in event planning or hotel management where she can blend her love
    of social interaction with practical organization. She also wants to keep options open for digital content creation or youth mentorship, and hopes to travel occasionally to broaden her perspective while
    staying connected to her community.
