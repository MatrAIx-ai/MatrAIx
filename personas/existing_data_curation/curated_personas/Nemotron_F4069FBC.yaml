personas:
  professional: A budding visual artist and drama enthusiast, Sasha Cirone combines sketching, digital illustration, and improv performance to experiment with storytelling, letting their curiosity and flexible
    work style guide collaborative school projects and personal art commissions.
  sports: A skate‑park regular and occasional soccer fan, Sasha Cirone frequents the Lake Norman Skate Plaza, rides a deck emblazoned with a painted sunset, and cheers for the Charlotte Hornets and Carolina
    Hurricanes while they occasionally join a middle‑school co‑ed soccer team.
  arts: A passionate illustrator, Sasha Cirone draws inspiration from graphic novel series like Saga and Monstress, admires creators such as Fiona Staples and Hayao Miyazaki, and they listen to indie pop
    icons like Clairo, Tame Impala, and Phoebe Bridgers during sketch sessions.
  travel: An adventure‑seeking teen, Sasha Cirone loves weekend hikes around the Piedmont region, has camped in the Great Smoky Mountains, day‑tripped to Asheville’s art scene, and they dream of backpacking
    through Kyoto’s historic districts and exploring the coast of Oregon.
  culinary: An experimental home cook, Sasha Cirone often whips up avocado toast topped with feta and chili flakes, mixes berry‑banana smoothies with spinach and almond milk, and they treat themselves to
    sushi rolls featuring tuna, avocado, and pickled ginger while listening to their favorite indie playlists.
  core: Sasha Cirone is a curiosity‑driven teen who juggles spontaneous art bursts, skate‑park antics, and a habit of misplacing school assignments, preferring flexibility over rigid schedules.
background:
  cultural: Sasha is a White American teenager raised in Mooresville, a suburban community in Iredell County, North Carolina. Her upbringing blends traditional Southern values—such as hospitality, community
    involvement, and a close‑knit school environment—with contemporary influences from digital media and a vibrant local arts scene. She attends a public middle school that emphasizes extracurricular participation,
    and she often engages in community events like the county fair, church youth gatherings, and neighborhood clean‑up projects, which shape her compassionate outlook.
attributes:
  skills: '[''Sketching'', ''Digital Illustration'', ''Photo Editing'', ''Empathy and Active Listening'', ''Conflict Mediation'', ''Team Collaboration'', ''Basic Scratch Programming'']'
  hobbies: '[''Drawing'', ''Digital Painting'', ''Skateboarding'', ''Co‑op Video Gaming'', ''Drama Club (Improv)'', ''Hiking'', ''Reading Graphic Novels'', ''Listening to Indie Pop'']'
  career_goals: Sasha dreams of blending her love for art with her desire to help others. She hopes to study visual arts and eventually become an art therapist or community artist who designs murals and
    workshops for local youth. In the short term, she wants to earn a scholarship to a specialized high‑school art program, volunteer with after‑school art clubs, and develop a portfolio that showcases
    her creativity and social impact.
