  hobbies: '[''Gardening'', ''Cooking and food preservation'', ''Reading historical fiction'', ''Genealogy research'', ''Knitting and crocheting'', ''Volunteering (church, Meals on Wheels)'', ''Community
    theater'', ''Birdwatching'', ''Walking and light yoga'', ''Digital photography'']'
  career_goals: Although retired, Shannen aims to deepen her impact in the community and preserve her family’s legacy. She plans to write a memoir that weaves together personal stories and genealogical
    research for future generations. She hopes to expand the local historical society’s genealogy archive by digitizing records and offering workshops for younger residents. Learning digital photography
    is a current ambition, enabling her to document the changing landscape of Shippensburg and share it on community platforms. Shannen also aspires to mentor new volunteers at the church and Meals on Wheels
    program, and she intends to maintain her health through regular walking, light yoga, and participation in a senior wellness group. Finally, she wishes to travel to sites of personal historical significance,
    such as Gettysburg and towns tied to her ancestry.
