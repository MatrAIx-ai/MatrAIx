  career_goals: Jordyn aims to channel her wealth of experience into mentorship, establishing a structured yet flexible apprenticeship program for early‑career analysts in her organization. She aspires
    to develop a flagship predictive model that helps Omaha’s healthcare system allocate resources more efficiently, especially during seasonal surges. Over the next five years, she hopes to transition
    into a strategic advisory role where she can influence regional policy on logistics and sustainability while preserving the creative freedom she values. She also plans to improve her personal organization
    by adopting a lightweight workflow system, publish case studies in industry journals, and speak at Midwestern analytics conferences. Ultimately, she envisions consulting for nonprofit organizations
    to enhance operational efficiency without sacrificing community harmony.
