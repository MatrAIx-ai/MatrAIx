  hobbies: '["Fishing", "Gardening", "Woodworking", "Beach walking and shell collecting", "Reading historical nonfiction", "Classic movies", "Church and community events", "Digital photography", "Attending
    local workshops"]'
  career_goals: While retired, John aims to remain active and purposeful. He plans to continue volunteering at his local senior center and church, mentor younger volunteers, and lead preservation projects
    for the Myrtle Beach coastline. He also aspires to complete a memoir documenting his family's history and the region's cultural changes. Maintaining his health, reducing stress through regular walking
    and mindfulness, and ensuring financial stability for his wife and grandchildren's future remain top priorities.
