personas:
  professional: John Richards, a retired handyman and seasoned community volunteer, channels his carpentry, plumbing, and budgeting acumen into leading coastal preservation projects for the Myrtle Beach
    shoreline, mentoring younger volunteers at the senior center, and coordinating church‑based service initiatives with methodical reliability and a quietly cautious demeanor.
  sports: John Richards is a devoted early‑morning fisherman and active member of the Myrtle Beach Anglers Association, and he regularly watches the Charleston Battery soccer club, the Carolina Panthers
    NFL team, and the Myrtle Beach Pelicans minor league baseball squad, blending his love of the coast with a modest fitness routine of beach walks and light stretching.
  arts: John Richards finds artistic fulfillment in classic cinema—especially the films of John Wayne and Audrey Hepburn—enjoys listening to Jimmy Buffett and Patsy Cline, and pursues digital photography
    of coastal sunsets and shell collections, often admiring the works of Southern folk painter William H. McClure while integrating these influences into his leisurely evenings.
  travel: John Richards prefers carefully planned getaway trips, favoring historic strolls through Charleston’s historic district, weekend drives to Savannah, annual family cruises to Bermuda, and has a
    long‑standing wish to experience New England’s autumn foliage, balancing his love of familiar coastal scenery with occasional spontaneous fishing charters that break his routine.
  culinary: John Richards delights in cooking shrimp and grits, crab cakes with fresh Old Bay seasoning, and collard greens seasoned with smoked ham, drawing on garden harvests of tomatoes, sweet corn,
    and okra, while his modest culinary skill shines brightest when grilling his own catch of redfish on a cedar plank.
  core: John Richards is a meticulous, community‑oriented 68‑year‑old who blends Southern hospitality, a love for coastal traditions, and a cautious, often worrying, drive for stability and purposeful contribution.
background:
  cultural: John is a lifelong resident of the South Carolina Lowcountry. Raised in a middle‑class, white Southern family, he grew up with strong ties to family, church, and community traditions typical
    of the region. He values Southern hospitality, respects the coastal fishing heritage, and participates in local festivals and church activities. His upbringing emphasized responsibility, modesty, and
    a pragmatic approach to life, which continue to shape his outlook.
