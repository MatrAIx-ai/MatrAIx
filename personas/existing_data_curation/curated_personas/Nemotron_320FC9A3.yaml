  hobbies: '[''Painting'', ''Sketching'', ''Reading speculative fiction'', ''Listening to jazz'', ''Playing piano'', ''Gardening'', ''Beach walking'', ''Genealogy research'', ''Volunteering at historical
    society'']'
  career_goals: Dominick hopes to complete his associate degree in liberal arts, to formalize his knowledge and open opportunities for teaching. He aims to curate a solo exhibition of his paintings at the
    Bradenton Museum of Art within the next two years, and to publish a memoir that intertwines his personal history with reflections on African American cultural shifts in the region. He also wishes to
    launch a community mural project in Manatee County, engaging local youth and seniors, and to serve as a senior advisory board member for the county's arts council.
