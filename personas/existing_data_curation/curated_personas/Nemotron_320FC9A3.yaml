personas:
  professional: Dominick Randall, a veteran visual artist and community mentor in his mid‑seventies, blends their acrylic and charcoal expertise with a keen sense of organization and imagination to lead
    senior art workshops, orchestrate local mural projects, and pursue an associate degree in liberal arts.
  sports: Dominick Randall enjoys low‑impact fitness through daily beach walks and participates in the Bradenton Senior Cycling Club, while cheering on the Tampa Bay Rays in baseball and the Miami Heat
    in basketball, and they occasionally join a weekend shuffleboard league at the local community center.
  arts: Dominick Randall immerses themselves in the jazz world, regularly attending performances by the Sun Ra Arkestra tribute band and listening to Miles Davis, while drawing inspiration from painters
    like Georgia O’Keeffe and contemporary sculptor Anish Kapoor for their own abstract canvases.
  travel: Dominick Randall favors thoughtfully planned road trips that balance serene nature stops—like the Everglades and the Blue Ridge Mountains—with visits to vibrant art festivals such as the New Orleans
    Jazz & Heritage Festival, though budget constraints sometimes limit their overseas ambitions beyond a cherished visit to Barcelona’s Picasso Museum.
  culinary: Dominick Randall delights in cooking fresh herb‑infused dishes, often preparing shrimp étouffée with home‑grown basil and thyme, while savoring the occasional seafood paella, yet they admit
    to over‑indulging in sweet pastries at local bakeries during their beach walks.
  core: Dominick Randall, a 75‑year‑old artist‑mentor, channels boundless curiosity into color and community, balances careful budgeting with occasional splurges, and wrestles with chronic aches while they
    never miss a sunrise on the shoreline.
background:
  cultural: Dominick grew up in the segregated South during the 1960s, witnessing the civil‑rights movement firsthand. His family’s traditions blend Southern African‑American church music, storytelling,
    and a strong emphasis on community solidarity. Relocating to Bradenton in his thirties, he became an active participant in local Black cultural institutions, such as the Manatee County African American
    Historical Society and the historic Bethlehem Baptist Church. His cultural identity is informed by the resilience of his ancestors, the rhythms of gospel and jazz, and a deep respect for preserving
    oral histories.
attributes:
