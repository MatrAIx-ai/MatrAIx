personas:
  professional: Julia Jackett, a veteran supervisor in residential elder‑care, channels three decades of hands‑on experience into precise coordination of daily routines, rigorous staff mentorship, and agency‑wide
    quality‑improvement initiatives, while embracing a routine‑driven yet occasionally relaxed approach that tolerates a bit of disorganization, and they often let small details slip in favor of big‑picture
    outcomes.
  sports: Julia Jackett avidly supports the Buffalo Bills and Buffalo Sabres, joins the Sunset Lakes Senior Walking Club for regular low‑impact exercise, prefers seasonal bird‑watching walks along Lake
    Erie over team sports, reflecting a solitary, routine‑oriented fitness mindset, and they often share game insights with fellow walkers during post‑walk coffee.
  arts: Julia Jackett regularly reads early‑20th‑century authors such as Edith Wharton and Willa Cather, enjoys the folk ballads of Joan Baez and the classic crooning of Frank Sinatra, attends community
    productions of Arthur Miller’s 'Death of a Salesman', and they often weave these artistic experiences into monthly book‑club discussions.
  travel: Julia Jackett plans meticulous weekend trips to historic locales like Saratoga Springs, the Finger Lakes, and Niagara Falls, occasionally ventures abroad to England’s Cotswolds for heritage tours,
    favoring small‑group itineraries that balance routine comfort with gentle adventure, and they always carry a notebook to record observations for later storytelling.
  culinary: Julia Jackett finds joy in preparing classic comfort meals such as chicken pot pie with thyme, beef stew seasoned with rosemary, and apple crumble topped with cinnamon, often harvesting fresh
    basil and sage from their herb garden, though they sometimes forget to set a timer and end up with over‑cooked vegetables.
  core: Julia Jackett blends a disciplined elder‑care career with a love for solitary routine, nostalgic literature, and modest comforts, while they occasionally slip into relaxed disorganization and a
    skeptical, competitive streak.
background:
  cultural: Julia was raised in a middle‑class, white, Anglo‑American family in the Buffalo‑Hamburg area of upstate New York. Her upbringing emphasized self‑reliance, community involvement, and the celebration
    of traditional holidays such as Thanksgiving, the Erie County Fair, and seasonal town festivals. These cultural roots fostered a respect for routine, practicality, and the value of close‑knit, small‑group
    connections, which continue to shape her personal and professional life.
attributes:
  skills: '["staff scheduling", "care coordination", "client assessment", "team leadership", "regulatory compliance", "first aid and CPR certification", "training and mentorship", "budget oversight", "quality
