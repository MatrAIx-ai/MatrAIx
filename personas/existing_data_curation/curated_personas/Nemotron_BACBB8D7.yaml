personas:
  professional: Augusto Riviera, a 51‑year‑old home‑care specialist, blends meticulous bilingual caregiving with a competitive drive to earn CNA certification, lead a supervisory team, and eventually launch
    a boutique agency that weaves art‑based wellness programs into senior care.
  sports: Augusto Riviera, a devoted fan of the Miami Heat and Miami Marlins, jogs along the Miami River three times a week, plays tennis twice weekly, and competes in a senior softball league, balancing
    a competitive spirit with low‑impact exercise to protect his knees.
  arts: Augusto Riviera immerses himself in South Florida’s vibrant salsa scene, curates a vintage vinyl collection featuring legends like Celia Cruz and Los Van Van, frequents Wynwood gallery openings
    that showcase contemporary Latin artists, and captures Hialeah’s street life with his Leica, all while devouring biographies of Frida Kahlo for creative inspiration.
  travel: Augusto Riviera enjoys spontaneous weekend drives to the Florida Keys, annual pilgrimages to New Orleans for its music festivals, a cultural immersion trip to Medellín, and is budgeting for a
    future journey to Granada, Spain, blending careful financial planning with a love for rhythm‑filled destinations.
  culinary: Augusto Riviera cooks traditional ropa vieja and experiments with fusion twists like ropa vieja tacos topped with mango salsa, meticulously seasons dishes with achiote and fresh cilantro, expertly
    prepares plantain mofongo, yet his enthusiasm sometimes leads to scorched skillet edges.
  core: Augusto Riviera, 51, is a methodical yet art‑obsessed home‑care professional who balances competitive ambition with a habit of misplacing his prized vinyl records amid relentless sketching sessions.
background:
  cultural: Augusto was born to Cuban parents who emigrated from Havana in the 1970s. He grew up in Hialeah, a city often called 'La capital del pueblo cubano' and was immersed in the rhythms of salsa,
    the aromas of home‑cooked Cuban meals, and the close‑knit family networks that characterize the diaspora. Spanish is his first language; he maintains fluency in English through school and work. He celebrates
    traditional festivals such as Carnaval de la Casa de Cultura, observes Catholic holidays like Semana Santa, and participates in community events at local Cuban cultural centers. His identity blends
    pride in his heritage with an adaptive, American outlook, shaping his caring, community‑oriented approach to personal care.
attributes:
  skills: '[''Assistance with activities of daily living (ADLs)'', ''Mobility and transfer support'', ''Basic vital sign monitoring'', ''Medication reminder and administration assistance'', ''Infection
