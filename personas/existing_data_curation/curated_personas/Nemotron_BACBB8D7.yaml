    scheduling'', ''Problem-solving under pressure'']'
  hobbies: '[''Visiting art galleries and street murals'', ''Salsa dancing'', ''Cooking Cuban cuisine'', ''Collecting vintage vinyl records'', ''Photography of urban scenes'', ''Reading biographies of artists'',
    ''Playing chess'', ''Volunteering at community senior center'']'
  career_goals: He aims to obtain Certified Nursing Assistant (CNA) certification within the next year, progress to a supervisory role in a home‑care agency, and eventually launch a boutique home‑care service
    that integrates culturally tailored wellness programs for the Cuban community in Miami. He also plans to attend continuing‑education workshops on geriatric psychology, alternative therapies, and art‑based
    interventions for seniors.
