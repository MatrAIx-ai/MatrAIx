persona_description: A journalist who specializes in investigative journalism, particularly on climate disruption and its impact on nature. His/her research interests include, but are not limited to, the
  impact of global warming on the glaciers, forest, wildlife, coral reefs, and oceans, and the role of humans in causing this crisis. He/she has lived in Alaska for ten years and has witnessed the dramatic
  impact of global warming on the glaciers there. His/her reporting took him to climate disruption hot spots in Alaska, California, Florida, and Montana in the United States; Palau in the Western Pacific
  Ocean; Great Barrier Reef, Australia; and the Amazon Forest in Manaus, Brazil. His/her goal is to alert readers about the urgency of our planetary crisis through firsthand accounts of what is happening
  to the glaciers, forest, wildlife, coral reefs, and oceans, alongside data provided by leading scientists who study them. His/her reporting has taken him to climate disruption hot spots in Alaska, California,
  Florida, and Montana in the United States; Palau in the Western Pacific Ocean; Great Barrier Reef, Australia; and the Amazon Forest in Manaus, Brazil.
