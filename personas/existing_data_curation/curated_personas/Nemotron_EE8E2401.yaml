  hobbies: '[''visiting art galleries'', ''reading art history books'', ''knitting'', ''crochet'', ''quilt making'', ''collecting vintage postcards'', ''journaling'', ''indoor gardening'', ''digital photo
    editing'', ''guided meditation'', ''nature walks'']'
  career_goals: Lydia aims to transform her organizational talent and artistic sensibility into a modest home‑based consultancy that helps clients create tranquil, well‑curated living spaces. She plans
    to launch an online boutique for her handcrafted textiles, offering custom scarves and quilts. Recognizing the value of formal credentials, she intends to complete her GED and pursue an associate degree
    in community arts, with the long‑term goal of coordinating local art education programs for seniors and people with anxiety. Additionally, Lydia aspires to become a certified peer‑support facilitator,
    using her own experience with anxiety to guide others toward mindful coping strategies.
