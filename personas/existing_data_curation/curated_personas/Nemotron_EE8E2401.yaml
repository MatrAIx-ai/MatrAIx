personas:
  professional: Lydia Boruty, a 37‑year‑old home‑based consultancy aspirant, blends meticulous budgeting, event coordination, and a deep knowledge of Western art history to help clients curate serene living
    spaces, while leveraging their self‑taught photo‑editing and textile craft skills to design personalized décor solutions.
  sports: 'Lydia Boruty, a 37‑year‑old fitness enthusiast, prioritizes tranquil movement: they run the Arkansas River Trail at sunrise, attend weekly yoga at a quiet studio, play recreational pickleball
    at the Tulsa Community Center, and are an avid supporter of the Tulsa Roughnecks (soccer) and the Oklahoma City Thunder (basketball), following each season with measured enthusiasm.'
  arts: Lydia Boruty, an avid curator of personal art spaces, spends quiet mornings wandering Tulsa’s hidden galleries such as the 25th Street Gallery and the Leonardo Museum, devours monographs on artists
    like Agnes Martin, Frida Kahlo, and James Turrell, and channels admiration for musicians like Sufjan Stevens and Nick Cave into a vinyl‑spun soundtrack for their knitting and quilting sessions.
  travel: Lydia Boruty, a meticulous planner with a love for serene escapes, prefers off‑peak trips to contemplative destinations such as Kyoto’s temple gardens, the lavender fields of Provence, and the
    desert landscapes of Sedona, always booking boutique B&Bs that offer quiet study nooks, while balancing these adventures against a modest travel budget and occasional family obligations.
  culinary: Lydia Boruty, an experimental home cook with modest skill, delights in crafting herb‑infused quinoa salads with roasted butternut squash, avocado, and pomegranate seeds, perfecting matcha‑latte
    foam, and baking hand‑stitched themed cupcakes that echo their textile patterns, while reserving indulgence for occasional artisanal dark chocolate from small‑batch makers.
  core: Lydia Boruty, a 37‑year‑old art‑obsessed organizer, turns anxiety into disciplined creativity, curates peaceful spaces, and occasionally sabotages themselves with late‑night yarn binges.
background:
  cultural: Lydia grew up in a modest, white, working‑class family in the Tulsa metropolitan area. Midwestern values of self‑reliance, modesty, and community support were woven into her upbringing, even
    as limited schooling ended before ninth grade. Her parents encouraged curiosity, taking her to local cultural institutions such as the Philbrook Museum of Art and the Tulsa Arts District, fostering
    an early appreciation for visual arts. The blend of Southern hospitality and the independent spirit of the plains informs her preference for orderly, quiet domestic life and her willingness to help
    neighbors while preserving personal boundaries. Her cultural identity is rooted in Tulsa’s neighborly ethos, tempered by a personal drive for artistic learning and emotional self‑care.
