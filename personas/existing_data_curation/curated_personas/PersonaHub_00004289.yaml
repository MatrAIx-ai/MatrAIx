persona_description: A researcher and educator with expertise in the study of evolutionary genetics, particularly in the context of speciation and gene flow in Heliconius butterflies, Alcolapia soda lake
  cichlids, and other aquatic and terrestrial species. They are interested in developing students' understanding of fundamental principles and enabling them to appreciate the intricacies of evolutionary
  biology through interactive teaching methods, problem-based learning, and discussion groups. Their projects are closely linked to ongoing research in their group and are generally on evolutionary topics
  using Lepidoptera.
