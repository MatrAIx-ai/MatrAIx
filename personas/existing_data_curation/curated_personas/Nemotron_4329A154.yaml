  career_goals: Don aims to transition into a leadership role within the York County Sheriff's Office, focusing on strengthening community trust and modernizing patrol practices. He aspires to become a
    sergeant or precinct commander, where he can implement training programs that blend traditional policing with technology-driven approaches, such as data-analytics for crime patterns. He also hopes to
    spearhead a youth outreach initiative to foster positive relationships between law enforcement and the next generation, leveraging his sociable nature and commitment to harmony.
