personas:
  professional: Don Coussa is a seasoned police officer with over 25 years of service, excelling in investigative interviewing, community policing, crisis de‑escalation, and tactical navigation of rural
    environments, and they blend pragmatic curiosity with traditional law‑enforcement values to mentor junior officers and integrate data‑analytics into patrol strategies.
  sports: Don Coussa stays active by snowshoeing on the rugged trails of Maine, fishing with the Maine Amateur Fishing Club year‑round, coaching the Alfred Little‑League baseball team, and cheering on the
    Boston Red Sox, New England Patriots, and Boston Bruins, while they also join community runs and occasional pickup hockey games to maintain fitness.
  arts: Don Coussa enjoys the storytelling of true‑crime books and the soulful melodies of folk artists like Laura Cortney and The Avett Brothers at regional music festivals, while also listening to classic
    rock icons such as Bob Dylan and attending performances at the Portland Stage Company, which together satisfy their love for narrative and community‑centered arts.
  travel: Don Coussa prefers well‑planned road trips that blend outdoor adventure with family time, such as annual drives to Acadia National Park, weekend fishing excursions in Halifax, a commemorative
    visit to Washington D.C.'s monuments, and they dream of witnessing Iceland’s northern lights on a future expedition, all while balancing travel costs with the desire to maintain a stable home base.
  culinary: Don Coussa savors hearty New England cuisine, regularly preparing lobster rolls, baked haddock with lemon, clam chowder, and blueberry pie made with locally foraged wild blueberries, and their
    modest woodworking skills have yielded a reliable cast‑iron skillet and cedar‑plank smoker for cedar‑plank salmon, while they alternate between casual diners, farm‑to‑table restaurants, and the occasional
    indulgence in a classic whoopie pie.
  core: Don Coussa is a steady, community‑focused police veteran who blends traditional values with a curiosity for modern tools, balancing duty, family, and a love for Maine’s outdoors.
background:
  cultural: Don grew up in a small New England town in Maine, steeped in traditional white, working-class values and a strong sense of community. His upbringing emphasized self-reliance, respect for law
    and order, and participation in local institutions such as the church, high school sports, and civic clubs. He maintains a deep connection to Maine’s rural heritage, which influences his appreciation
    for the outdoors, local traditions, and neighborly support. His marriage and long-term residency in Alfred reflect his commitment to family and stability, while his role as a police officer embodies
    a generational commitment to public service.
