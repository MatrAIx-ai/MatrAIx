personas:
  professional: Jelena Barney is a seasoned personal financial advisor with over a decade of experience, known for a methodical approach to comprehensive planning, expert use of MoneyGuidePro and eMoney
    Advisor, and a talent for turning complex investment ideas into clear actions while mentoring junior staff and leading lively financial‑literacy workshops.
  sports: Jelena Barney thrives on energetic group workouts, clocking regular Zumba and spin sessions at the local gym, cheering for the Washington Capitals in hockey and the Washington Nationals in baseball,
    and playing on a community softball league that meets every summer; they balance structured cardio with the camaraderie of team sports, occasionally catching an Old Dominion Monarchs basketball game
    for college spirit.
  arts: Jelena Barney’s artistic life orbits live music, from the Hampton Jazz Festival to intimate R&B gigs featuring artists like H.E.R. and John Legend, while their reading list is filled with contemporary
    fiction by Sally Rooney and Colson Whitehead; they also enjoy occasional trips to the Kennedy Center for theater and dance, and they often practice line‑dance routines at community events.
  travel: Jelena Barney prefers weekend escapes that blend adventure and relaxation, kayaking the Chesapeake Bay on Saturday mornings, planning a road trip to Savannah’s historic squares for a taste of
    Southern charm, and dreaming of a New Orleans jazz pilgrimage; they budget trips carefully, using travel‑reward points and modest savings to stretch their travel fund while still aiming for at least
    two major trips each year.
  culinary: Jelena Barney experiments with Southern comfort dishes such as fried chicken, collard greens, and shrimp‑and‑grits, while honoring Chesapeake Bay flavors with crab cakes and steamed blue crabs,
    seasoning everything with garden‑fresh basil, thyme, and rosemary; they host brunches featuring avocado toast, eggs benedict, and homemade mimosas, showcasing a confident yet playful cooking style that
    reflects both tradition and creativity.
  core: Jelena Barney blends meticulous financial expertise with a sociable, group‑oriented lifestyle, juggling high‑energy fitness, community mentorship, and a love of Southern cuisine while occasionally
    succumbing to impulse stock trades and a stubborn coffee habit.
background:
  cultural: Jelena is an African-American woman rooted in Hampton, Virginia, a city with a rich Black heritage dating back to the historic Hampton Institute. Her grandparents were active participants in
    the civil rights movement, and she grew up attending a historically Black Baptist church where gospel music, storytelling, and community service were central. The legacy of Hampton University's emphasis
    on education and empowerment shaped her belief that financial knowledge is a pathway to generational wealth. Jelena celebrates Southern Black culinary traditions, especially soul food and fresh seafood,
    and regularly takes part in local cultural events such as the Hampton Jazz & Art Festival. She maintains close ties with a supportive extended family network, values intergenerational mentorship, and
    embraces contemporary Black culture through literature, music, and community activism.
attributes:
  skills: '[''Financial planning and wealth management'', ''Retirement and pension strategy'', ''Investment analysis and portfolio construction'', ''Tax planning and optimization'', ''Budgeting and cash-flow
    management'', ''Risk assessment and insurance analysis'', ''Client relationship management'', ''Financial-literacy education and workshop facilitation'', ''Use of financial planning software (MoneyGuidePro,
    eMoney Advisor, Excel)'', ''Compliance and regulatory knowledge (FINRA, SEC)'', ''Public speaking and community outreach'', ''Team leadership and mentorship'']'
  hobbies: '[''Zumba and spin classes'', ''Hip-hop and line-dance'', ''Cooking Southern and seafood dishes'', ''Hosting brunches/dinner parties'', ''Mentoring and financial-literacy workshops at community
    center'', ''Attending jazz and R&B live music events'', ''Reading fiction and personal-development books'', ''Kayaking on Chesapeake Bay'', ''Gardening (herbs and tomatoes)'']'
  career_goals: Jelena aims to earn the Certified Financial Planner (CFP) designation within the next two years and leverage it to become a senior partner at her firm. She aspires to launch a boutique advisory
    practice that specializes in serving African-American families and first-time homebuyers in the Hampton area, providing culturally-relevant financial education. She plans to develop a community-based
    financial-literacy program in partnership with local churches and schools, and hopes to mentor a new generation of Black financial professionals. Long-term, she envisions authoring a guidebook on wealth
    building for underrepresented communities and eventually serving on the Hampton City Council to influence policies that promote economic equity.
