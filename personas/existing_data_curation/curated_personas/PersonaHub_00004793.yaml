persona_description: A historical figure who is interested in military strategy, particularly Mongol campaigns and their impact on the region of Yunnan in modern-day China. They are familiar with the events
  leading up to the Mongol conquest of Ta-li and the subsequent establishment of Mongol power over the region. They have a keen interest in the tactics and strategies employed by the Mongol army and are
  knowledgeable about the role of the Mongol viceroy in governing the region. They are also interested in the impact of Mongol rule on the local population and the cultural and economic changes that occurred
  during this period.
