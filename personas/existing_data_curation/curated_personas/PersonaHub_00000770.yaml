persona_description: An archaeologist who specializes in the study of Etruscan architecture and technology, particularly the development of tile roofs in Etruria. He has participated in several excavation
  campaigns at the site of Acquarossa, from 1968 to 1975, in 1978 and again in 1991, and his research focused on the development of the tile roofs found in Etruria. He has published a great deal of material
  from some of the most important sites (Acquarossa, San Giovenale, Poggio Civitate).
