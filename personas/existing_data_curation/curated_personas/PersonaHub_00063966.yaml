persona_description: A person who is interested in history and the development of the state of Indiana, particularly in the early 19th century. They are likely to be a historian, genealogist, or someone
  who is researching the history of the state of Indiana. They are interested in the early days of settlement, the growth of the town of Centerville, and the publication of the Indiana Gazetteer. They are
  also interested in the geography and natural resources of the state, and how they were used to attract settlers. They may also be interested in the role of printers like John Scott in the dissemination
  of information about the state.
