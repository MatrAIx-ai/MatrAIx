  hobbies: '["Cooking traditional Mexican cuisine", "Gardening (herbs and chilies)", "Listening to norteño and mariachi music", "Walking in Bosque del Apache National Wildlife Refuge", "Knitting and crocheting",
    "Volunteering at community food pantry", "Attending local cultural festivals", "Reading mystery novels"]'
  career_goals: Carolina aims to move from a crew member to a shift supervisor or assistant manager, leveraging her practical experience and curiosity to improve staff scheduling, menu efficiency, and customer
    satisfaction. She also hopes to obtain a certification in hospitality management, which will enable her to eventually open a small family‑run taqueria that showcases traditional recipes from her cultural
    heritage while providing a stable, low‑stress environment for herself and any future employees.
