personas:
  professional: Carolina Antillano, a seasoned front‑of‑house specialist with meticulous cash‑handling and food‑safety expertise, they blend their bilingual fluency and calm conflict‑resolution style with
    a practical curiosity that fuels menu‑efficiency ideas and staff‑training initiatives.
  sports: Carolina Antillano, an outdoor‑enthusiast who favors low‑impact exercise, they take regular walks on the shaded Bosque del Apache trails and belong to the North Texas Trail Runners club, while
    they cheer on the Dallas Mavericks during basketball season and the Dallas Cowboys in football, balancing leisure with modest fitness goals.
  arts: Carolina Antillano, a devoted lover of music and mystery literature, they immerse themselves in the lively strains of Los Tigres del Norte and the classic ballads of Vicente Fernández while unwinding
    with Agatha Christie novels and classic Golden Age films starring María Félix, allowing these artistic experiences to color their evenings.
  travel: Carolina Antillano, a methodical road‑trip planner, they prefer mid‑range journeys that blend cultural immersion and culinary discovery, having explored San Antonio’s historic missions and New
    Mexico’s adobe towns, while they dream of wandering the Andean highlands of Peru to inspire future menu twists.
  culinary: Carolina Antillano, a passionate home cook, they delight in hand‑crafting classic tamales and braised enchiladas, often experimenting with smoked chipotle, fresh cilantro, and garden‑grown oregano
    to add unexpected layers, and they balance this with occasional visits to farm‑to‑table eateries for fresh inspiration.
  core: Carolina Antillano, a meticulous yet curiosity‑driven hospitality veteran, they steady their days with herb‑scented kitchens, woodland walks, and a lingering worry that nudges them to double‑check
    every receipt and recipe alike.
background:
  cultural: Carolina is a second‑generation Mexican‑American raised in Bosque Farms, New Mexico, where Hispanic traditions run deep. She grew up bilingual, celebrating Día de los Muertos, Christmas posadas,
    and local fiestas with her extended family. Her upbringing combined the agrarian rhythms of New Mexico's farming communities with the rich culinary and musical heritage of northern Mexico, shaping her
    values of family, harmony, and community service.
