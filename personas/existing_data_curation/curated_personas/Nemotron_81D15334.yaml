personas:
  professional: Michellemarie Rutz, a 33‑year‑old licensed architect in central Texas, blends methodical BIM expertise with a deep appreciation for regional vernacular, leading multidisciplinary teams to
    deliver sustainable, code‑compliant projects on schedule while quietly insisting on meticulous documentation and decisive client communication.
  sports: Michellemarie Rutz embraces fitness through early‑morning hikes in the Hill Country, weekend intramural soccer with the local women’s club, and cheering for the Dallas Cowboys in fall, the Houston
    Astros during baseball season, and Austin FC whenever the MLS schedule permits, all while tracking mileage with a fitness app to stay accountable.
  arts: Michellemarie Rutz channels her creative side by watercoloring historic Texas courthouses, collecting limited‑edition prints by Georgia O’Keeffe, curating playlists that feature Willie Nelson and
    modern indie folk, and attending quarterly craft fairs where she chats with local woodworkers and potters, often citing Frank Lloyd Wright’s organic architecture as a guiding influence.
  travel: Michellemarie Rutz plans vacations with a spreadsheet itinerary, favoring road‑trip explorations of nearby Hill Country towns and seasonal visits to Santa Fe’s art scene, while dreaming of a sustainable‑design
    tour of Kyoto’s temples and a summer trek through New Zealand’s South Island, always balancing travel costs against her goal of funding future community projects.
  culinary: Michellemarie Rutz, an intermediate home chef, gravitates toward farm‑to‑table meals like grilled quail with rosemary‑infused sweet potatoes, hand‑crafted corn succotash seasoned with jalapeño,
    and indulgent pecan pie for holidays, often sourcing heirloom tomatoes and locally milled flour from her garden’s produce stand and pairing dishes with a glass of Texas Hill Country Viognier.
  core: Michellemarie Rutz is a detail‑obsessed architect who budgets every cent and schedules yoga between site visits, but she occasionally hoards vintage building catalogs and forgets to water her garden.
background:
  cultural: Michellemarie grew up in a close‑knit white, Southern‑Texan family in Burleson County, where community values, modesty, and a strong work ethic were emphasized. She was raised with an appreciation
    for the region's rural heritage, including traditional ranch‑style homes and the crafts of local artisans. Her upbringing blended Southern hospitality with a pragmatic mindset, fostering her preference
    for structure and reliability. While she embraces the cultural norms of small‑town Texas—such as frequent family gatherings, church involvement, and support for local events—her education in a STEM‑focused
    university exposed her to broader architectural movements, allowing her to synthesize regional vernacular with modern, sustainable design principles.
attributes:
  skills: '[''Architectural design'', ''Building information modeling (BIM) with Revit'', ''AutoCAD drafting'', ''SketchUp 3D modeling'', ''Structural analysis fundamentals'', ''Sustainable design and LEED
