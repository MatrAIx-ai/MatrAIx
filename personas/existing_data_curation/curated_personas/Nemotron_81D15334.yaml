    and client communication'']'
  hobbies: '[''Architectural sketching and watercolor studies'', ''Reading non‑fiction (architecture, sustainability, technology)'', ''DIY home improvement projects'', ''Gardening (vegetable and native
    plants)'', ''Yoga for stress management'', ''Hiking in the Texas Hill Country'', ''Volunteering on the local planning commission'', ''Model building (scale architectural models)'', ''Experimenting with
    Tex‑Mex cooking recipes'']'
  career_goals: Michellemarie aims to become a senior project architect within the next three years, overseeing large-scale community projects that integrate sustainable practices and resilient design for
    Texas's varied climate. She plans to obtain the prestigious LEED Accredited Professional credential and eventually pursue an associate principal role, where she can mentor junior architects and shape
    the firm's strategic direction. Long‑term, she aspires to launch her own boutique practice focused on affordable, eco‑friendly housing solutions for rural Texas communities, while publishing case studies
    on modern reinterpretations of regional architectural vernacular.
