personas:
  professional: Wallace Norton, a 60‑year‑old facilities cleaning veteran, leverages three decades of floor‑care mastery, OSHA‑compliant safety leadership, and a budding expertise in eco‑friendly cleaning
    to mentor a small crew and pursue a Certified Professional Cleaner credential while planning a modest community‑focused side cleaning service.
  sports: Wallace Norton enjoys seasonal fishing on the Des Moines River, follows the Iowa Hawkeyes football team, participates in a local Sunday bowling league, and maintains a backyard garden workout
    routine with light gardening and occasional hikes during summer county fairs.
  arts: Wallace Norton indulges his creative side through woodworking birdhouses, building a detailed model train layout, attending county fair craft exhibitions, and listening to folk legends like John
    Prine while admiring Grant Wood’s Regionalist paintings that echo his small‑town roots.
  travel: Wallace Norton prefers low‑key road trips to neighboring state fairs, historic river towns like Dubuque, and occasional visits to the Black Hills, planning trips around off‑season rates and balancing
    his side‑business workload with simple, modest itineraries.
  culinary: Wallace Norton savors hearty Midwestern fare such as pork tenderloin sandwiches, corn chowder, and fresh garden salads, often preparing homemade pickles and using heirloom tomatoes from his
    backyard while relishing a well‑brewed cup of black coffee at the local diner.
  core: Wallace Norton blends quiet curiosity with steadfast practicality, channeling decades of hands‑on expertise into community service, modest financial stewardship, and a steady, low‑key lifestyle
    anchored in seasonal rhythms and gentle hobbies.
background:
  cultural: Wallace is a white Midwesterner raised in a small‑town Iowa environment, likely of German and Scandinavian ancestry common to the region. He grew up in a working‑class household that valued
    hard work, humility, and community service. His cultural identity is shaped by Midwestern traditions such as county fairs, church potlucks, and a deep respect for the land and seasonal cycles. He embraces
    practical faith, self‑reliance, and cooperation, reflecting the region's emphasis on modesty, neighborliness, and resilience.
attributes:
  skills: '[''Commercial floor care (stripping, sealing, waxing)'', ''Restroom sanitation and hygiene'', ''Inventory management of cleaning supplies'', ''Equipment maintenance and troubleshooting'', ''Basic
    plumbing and minor repairs'', ''Safety compliance and OSHA regulations'', ''Scheduling and time management'', ''Team coordination and training'', ''Eco‑friendly cleaning practices'', ''Record‑keeping
    and reporting'']'
  hobbies: '[''Fly fishing'', ''Woodworking'', ''Gardening'', ''Reading non‑fiction (history, DIY)'', ''Model train building'', ''Volunteer work at church/community kitchen'', ''Attending county fairs'',
    ''Classic car shows'', ''Nature walks'', ''Card games with a small group of friends'']'
  career_goals: Wallace aims to transition into a supervisory role within his current facility, seeking to become lead janitorial supervisor and mentor a small crew of cleaners. He plans to earn a Certified
    Professional Cleaner credential with a focus on green cleaning technologies. Over the next few years, he hopes to launch a modest side cleaning service that caters to local churches, community centers,
    and small businesses, providing supplemental income as he approaches retirement. His broader ambition is to ensure a comfortable retirement while continuing to contribute his practical expertise to
    his community.
