persona_description: A scientist and researcher who specializes in the study of subsidence and its causes, particularly in the context of the Mississippi River delta in New Orleans. They have conducted
  comprehensive research to measure and predict future subsidence, and have published findings that are used by decision makers to inform planning and flood response strategies. They have a deep understanding
  of the natural and human-produced processes contributing to subsidence in the region, including groundwater pumping, dewatering, and the impact of levees on sediment supply. They have a passion for improving
  models of subsidence for the Mississippi River Delta and have contributed to the development of improved spatial resolution maps.
