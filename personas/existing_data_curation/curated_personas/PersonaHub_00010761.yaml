persona_description: A researcher and scientist specializing in the field of environmental science, particularly focused on the study of microplastics in the marine environment. They are passionate about
  developing innovative analytical methods to accurately and quantitatively monitor the presence and distribution of microplastics in various marine systems. They are skilled in using Fourier Transform
  Infrared (FT-IR) spectroscopy and FT-IR Imaging for the analysis of microplastics, and have developed a standardized analysis procedure for this purpose. They are also interested in developing holistic
  approaches to understanding the sources and sinks of microplastics in different ecosystems, including estuaries, rivers, and sewage treatment plants.
