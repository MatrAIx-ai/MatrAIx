  hobbies: '["Walking Club", "Book Club", "Mentoring Seniors in Career Development", "Competitive Doubles Tennis", "Yoga", "Mediterranean Cooking", "Gardening", "Crossword Puzzles", "Road Trips along California
    Coast"]'
  career_goals: Christine aims to transition into an HR leadership role within the next three years, targeting a HR Manager or Director position at a mid-size technology firm in the Bay Area. She intends
    to earn her SHRM-CP certification to strengthen her strategic HR credentials and lead initiatives that align talent strategy with business objectives, particularly focusing on employee well‑being, diversity
    and inclusion, and retention of high‑performing staff. Additionally, she seeks to mentor junior HR professionals and implement a structured succession‑planning program for the department.
