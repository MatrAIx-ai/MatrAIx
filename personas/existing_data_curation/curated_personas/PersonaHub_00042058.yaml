  Vietnam, including the development of the Vietnamese language and culture, and the role of women in traditional Vietnamese society. He is likely to have a deep understanding of Vietnamese history, literature,
  and culture, and is skilled in analyzing primary and secondary sources. He is also likely to be knowledgeable in the fields of history, philosophy, and literature.
