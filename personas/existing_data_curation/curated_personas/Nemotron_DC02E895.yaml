personas:
  professional: Mariana Salazar is an aspiring young coder who creates mystery‑driven Scratch games, using their methodical planning and love for storytelling to organize project steps, collaborate with
    soccer teammates, and meet deadlines with reliable precision.
  sports: Mariana Salazar plays forward for a local youth soccer club, follows the Los Angeles FC season, practices drills before school, and models their fitness routine on the disciplined conditioning
    program of the LA Dodgers, balancing team spirit with personal endurance goals.
  arts: Mariana Salazar spends weekends sketching cartoon strips inspired by adventure novels, listens to cumbia tracks by Los Hermanos Flores while baking pupusas, and draws creative energy from Pixar’s Coco
    and the graphic style of Jeff Smith’s bone comics.
  travel: Mariana Salazar dreams of exploring the historic streets of Antigua, Guatemala after a family road trip to the Grand Canyon, prefers detailed itineraries and check‑list planning, and balances
    weekend museum visits with occasional summer drives to Santa Monica’s beach.
  culinary: Mariana Salazar enjoys mastering homemade pupusas with masa, cheese, and curtido, adds a pinch of cumin to their avocado salsa, experiments with sweet churro dough for school bake‑sales, and
    proudly serves friends a side of crunchy plantain chips.
  core: Mariana Salazar blends structured coding, organized soccer drills, and family‑centered pupusa nights into a disciplined yet playful routine, though they sometimes forget to finish bedtime reading.
background:
  cultural: 'Mariana is a first‑generation Salvadoran‑American raised in Studio City. Her parents immigrated from El Salvador, preserving many traditions: speaking Spanish at home, celebrating holidays
    like Día de los Fieles Difuntos, enjoying pupusas, and listening to Salvadoran folk music. Her bilingual upbringing has given her a strong connection to both Salvadoran heritage and American culture,
    influencing her values of family solidarity, community service, and respect for cultural diversity.'
