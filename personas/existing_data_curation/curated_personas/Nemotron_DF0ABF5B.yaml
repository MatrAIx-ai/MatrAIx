  career_goals: Stephen aims to channel his curiosity for art and technology into a future career as a multimedia artist or UX/UI designer. He plans to build a robust portfolio of digital illustrations
    and interactive prototypes, pursue a degree in graphic design or digital media, and eventually contribute to creative projects at local tech startups or cultural institutions in the Lehigh Valley. He
    also hopes to leverage his sensitivity to stress by exploring art‑therapy or counseling pathways so he can help peers navigate emotional challenges.
