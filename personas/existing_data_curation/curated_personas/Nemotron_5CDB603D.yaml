personas:
  professional: Shirley Cunningham, a retired community organizer and event planner, leverages their methodical nature and competitive edge to orchestrate church gatherings, senior center programs, and
    neighborhood festivals, ensuring every detail—down to the playlist of gospel hymns—runs without a hitch.
  sports: Shirley Cunningham, an avid fan of Alabama Crimson Tide football and the Birmingham Barons baseball, joins a gentle walking club at the senior center each morning, enjoys line‑dance evenings to
    stay energetic, and approaches fitness with a competitive streak, always trying to out‑walk her longtime friend in the weekly senior stroll.
  arts: Shirley Cunningham, a lifelong gospel singer in her church choir and a dedicated quilter, draws artistic inspiration from the harmonies of Mahalia Jackson and the color palettes of Aretha Franklin
    album covers, frequently attending performances at the Birmingham Museum of Art and local theater productions like “A Raisin in the Sun,” which enrich her creative outlook.
  travel: Shirley Cunningham, who prefers carefully planned trips, enjoys annual visits to Charleston’s historic waterfront, savors the jazz and Creole cuisine of New Orleans, and dreams of a pilgrimage
    to the civil‑rights landmarks of Montgomery, always booking senior‑friendly tours that fit her budget and allow ample rest between activities.
  culinary: Shirley Cunningham, an accomplished soul‑food cook, perfects classics such as fried catfish, collard greens with smoked turkey, sweet potato pie, and peach cobbler, while experimenting with
    quinoa‑infused cornbread and herb‑marinated tofu for health‑conscious guests, showcasing a blend of tradition and culinary curiosity.
  core: Shirley Cunningham, a 76‑year‑old community pillar, balances relentless curiosity with a pragmatic, detail‑obsessed approach, channeling competitive energy into nurturing traditions, even as worry
    and occasional stubbornness keep them ever‑vigilant.
background:
  cultural: Shirley is an African‑American woman whose roots trace back to the Great Migration, with grandparents who moved from the rural South to Alabama in the early 20th century. Growing up in Eclectic,
    AL, she experienced the legacy of segregation and the empowering civil‑rights movement, which fostered a deep sense of resilience and community pride. Her cultural identity is anchored in the church,
    gospel music, soul food, and the tradition of oral storytelling that preserves family history. Family ties span multiple generations, and she often acts as a cultural conduit, sharing recipes, songs,
    and narratives that celebrate Black Southern heritage. Her background informs her commitment to community service, communal celebration, and the preservation of African‑American history in Elmore County.
