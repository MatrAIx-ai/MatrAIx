  career_goals: Although retired, Shirley aspires to leave a lasting legacy in her community. She aims to mentor younger women in cooking, quilting, and event planning, and hopes to publish a memoir that
    captures the oral histories of African‑American families in Elmore County. She also wants to secure a leadership role on the board of the local senior center, championing programs that promote wellness
    and social connection for older adults. Additionally, she is determined to master more advanced digital tools so she can archive family stories and share them with future generations.
