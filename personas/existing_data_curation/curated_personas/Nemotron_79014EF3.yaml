  career_goals: John aims to translate his practical know‑how into community impact. He plans to volunteer as a mentor for youth interested in trades, join the Oakdale Chamber of Commerce, and eventually
    launch a part‑time advisory service that helps small farms and DIY hobbyists with equipment maintenance and cost management. He also hopes to earn a horticulture certification so he can lead workshops
    in the local community garden, blending his curiosity for new growing techniques with his respect for traditional agricultural practices.
