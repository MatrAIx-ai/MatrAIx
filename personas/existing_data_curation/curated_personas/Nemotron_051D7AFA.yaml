personas:
  professional: Rafael Perdomo, a seasoned advertising sales veteran with three decades of hands‑on experience, blends pragmatic negotiation skills with a curiosity for programmatic media, delivering data‑driven
    insights to clients while mentoring younger agents in Baton Rouge, and they often draw on bilingual fluency to strengthen relationships.
  sports: Rafael Perdomo, an avid supporter of the New Orleans Saints and LSU Tigers, spends weekends fishing with the Baton Rouge Anglers Club and maintains a low‑impact fitness routine of early morning
    walks and occasional yard work, preferring solitary activity over crowded gyms, and they consider fishing their primary form of exercise.
  arts: Rafael Perdomo, an enthusiastic reader of Central American and Southern U.S. history by authors like Howard Zinn and Stephen E. Ambrose, enjoys the rhythmic beats of Honduran punta group Garifuna
    Soukoun and the blues of B.B. King, and competes in weekly chess matches at the local community center, and they find chess a mental sanctuary.
  travel: Rafael Perdomo, who favors low‑key travel, has road‑tripped to New Orleans for its jazz festivals and to Savannah, Georgia to explore historic districts, longs to visit the colonial city of Granada,
    Nicaragua, and hopes to spend a tranquil fishing vacation on Lake Atitlán, Guatemala within their modest retirement budget, and they plan each trip with a detailed itinerary to manage anxiety.
  culinary: Rafael Perdomo, a skilled home chef, regularly prepares baleadas with refried beans, cheese, and fresh cilantro, steams corn tamales wrapped in banana leaves, and simmers a hearty sopa de mariscos
    using shrimp, tomatoes, chilies, and a splash of lime, occasionally blending in Louisiana gumbo spices to create a unique culinary fusion, and they take pride in sharing these meals with family and
    friends.
  core: Rafael Perdomo, a reflective 64‑year‑old advertising veteran, balances curiosity with cautious practicality, finds comfort in solitary puzzles and traditional cooking, yet wrestles with bouts of
    anxiety that drive meticulous habits, and they often channel nervous energy into organized routines.
background:
  cultural: Rafael is a first‑generation American of Honduran descent. His parents immigrated to the United States in the 1960s, settling in Louisiana where they preserved many aspects of their Central
    American culture. Rafael grew up speaking Spanish at home and English at school, celebrating Honduran holidays such as Semana Santa and Día de la Independencia alongside Southern traditions like Mardi Mardi
    and Thanksgiving. He remains active in the local Honduran diaspora, participating in cultural festivals, cheering on the national soccer team, and preparing home‑cooked meals that blend tropical flavors
    with Creole influences. His Catholic faith, strong family ties, and community involvement shape his identity, providing a supportive network that helps him manage his emotional reactivity.
