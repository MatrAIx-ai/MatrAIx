personas:
  professional: Jasmine Long, a budding visual storyteller and junior coder, transforms their organized, methodical nature into detailed LEGO constructions and Scratch animated adventures, while their competitive
    streak drives them to perfect each project and their emotional sensitivity adds depth to their artistic narratives.
  sports: Jasmine Long, a competitive member of the Woodbine Lions Soccer Club who also follows the Baltimore Ravens and the Baltimore Orioles, spends their weekends honing soccer drills, swimming laps
    at the county pool for cardio, and practicing basketball shots inspired by the Washington Wizards, maintaining a methodical training schedule while they sometimes let their strong drive for victory
    outweigh teamwork.
  arts: Jasmine Long, an enthusiastic painter who fills sketchbooks with forest landscapes inspired by Van Gogh's swirling skies and the vivid storytelling of Maya Angelou's poetry, listens to gospel greats
    like Mahalia Jackson and contemporary pop icons such as Beyoncé and Ariana Grande, and regularly performs improvised dance routines to their music for the school art club's showcases, while they eagerly
    share their creations with classmates.
  travel: Jasmine Long, an inquisitive traveler who delights in weekend excursions to the Patapsco River's hidden trails for leaf collecting, cherishes past family trips to historic Annapolis, dreams of
    experiencing the Smithsonian National Museum of History and Culture in Washington, D.C., and plans an eventual summer adventure to the Outer Banks, while they balance budget-friendly outings with parental
    guidance.
  culinary: Jasmine Long, a budding kitchen assistant who loves whisking up sweet-potato mac & cheese, collard greens seasoned with smoked paprika, and banana pudding with crushed graham crackers, experiments
    with fresh basil and mint they pluck from the garden, yet they occasionally over-salt dishes in the pursuit of bold flavors.
  core: Jasmine Long, a meticulous, imagination-driven nine-year-old whose competitive curiosity fuels vibrant art, coding, and community projects, while intense anxiety fuels both creative bursts and occasional
    meltdowns.
background:
  cultural: Jasmine is raised in a close‑knit African American family in Woodbine, Maryland. Her family celebrates cultural traditions such as Juneteenth, church gatherings, and stories passed down from
    grandparents about the local Black history of Maryland. She enjoys soulful cooking at family meals, hears gospel and jazz music at church, and participates in community events at the county’s African
    American heritage center. Her cultural background nurtures her appreciation for storytelling, music, and community solidarity, which influence her artistic interests and desire to give back.
attributes:
  skills: '[''Reading comprehension'', ''Creative writing'', ''Watercolor painting'', ''LEGO building'', ''Basic Scratch programming'', ''Organizational planning'', ''Scientific observation'']'
  hobbies: '[''Drawing and watercolor painting'', ''LEGO building'', ''Scratch programming'', ''Reading mystery books'', ''Listening to music'', ''Exploring nature trails'', ''School art club'', ''Playing
    board games'']'
  career_goals: Jasmine dreams of becoming an environmental artist who illustrates wildlife and natural habitats, using her drawing skills to raise awareness about conservation. She also imagines a future
    as a science communicator who creates engaging educational videos for kids, blending her love for art, storytelling, and basic coding. As she grows older, she hopes to advocate for children's mental
    health, inspired by her own experiences with intense emotions, and to mentor other young artists in her community.
