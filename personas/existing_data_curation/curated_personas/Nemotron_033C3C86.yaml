  career_goals: Ihab aims to lead the development of next‑generation small modular reactors (SMRs) that can provide clean, reliable power for Texas and beyond. Over the next five years he hopes to transition
    into a senior engineering management role where he can influence industry standards and integrate emerging AI‑driven simulation tools into design workflows. He also aspires to become a recognized thought
    leader, contributing to policy discussions on nuclear energy’s role in decarbonization, while mentoring the next generation of engineers and fostering a culture of safety and collaboration.
