personas:
  professional: Eric Freeman is a seasoned database professional who leverages deep expertise in SQL Server, Oracle, and PostgreSQL alongside cloud platforms like AWS RDS and Azure SQL to design high‑performance
    data solutions while quietly channeling his curiosity for emerging lakehouse architectures into a strategic plan to become a lead data architect within three years, mentoring junior engineers with a
    cooperative yet assertive style, yet often navigates his responsibilities with a relaxed, sometimes disorganized, approach that thrives on flexibility and pragmatic execution.
  sports: Eric Freeman jogs regularly along the Wichita Falls lake trail and practices yoga at home for flexibility, while cheering on the Dallas Cowboys, Dallas Mavericks, and Texas Rangers, and occasionally
    joins a local running club that meets on weekends for 5‑k races.
  arts: Eric Freeman immerses himself in science‑fiction literature by authors like Isaac Asimov and N.K. Jemisin, enjoys contemporary non‑fiction from Malcolm Gladwell, collects retro video games featuring
    classics like Super Mario Bros., and listens to synth‑wave and chiptune artists such as Daft Punk and Koji Kondo, letting these creative outlets shape his evenings and book‑club discussions.
  travel: Eric Freeman favors solo road trips with flexible itineraries, having toured Texas landmarks like Big Bend National Park and taken a weekend getaway to Austin's music scene, while dreaming of
    a trip to Cape Canaveral to witness a launch and a future adventure to Japan's Akihabara district to hunt vintage gaming hardware.
  culinary: Eric Freeman enjoys Texas‑style brisket and chili con carne, often experimenting with smoked paprika and jalapeño in his home‑cooked meals, while also assembling custom pizza with mozzarella,
    pepperoni, and pineapple, and he occasionally indulges in sushi rolls featuring avocado and cucumber after a late‑night gaming session.
  core: Eric Freeman is a technically curious yet pragmatically relaxed database specialist who balances late‑night retro gaming with early morning jogs, occasional financial splurges on hardware, and a
    habit of over‑committing to projects while still finding time to mentor and volunteer.
background:
  cultural: Eric grew up in a tight‑knit African American community in Texas, where family ties, church participation, and cultural celebrations such as Juneteenth and Kwanzaa were integral to his upbringing.
    His parents emphasized education and self‑reliance, instilling a strong work ethic and curiosity about the world. Living in Wichita Falls, he navigates the blend of Southern hospitality and the region's
    growing tech scene, often drawing on the resilience and communal support typical of many Black families in the area. He maintains connections with extended relatives across the state, cherishing oral
    histories, soul food traditions, and the role of music—especially jazz and hip‑hop—in expressing cultural identity.
attributes:
  skills: '["SQL Server administration", "Oracle and PostgreSQL database design", "AWS RDS and Azure SQL cloud services", "Performance tuning and query optimization", "Data migration and ETL processes",
    "PowerShell and Python scripting for automation", "Data security and compliance (HIPAA, PCI)", "Scalable data architecture design"]'
  hobbies: '["Reading science fiction and non‑fiction (African American history, technology)", "Retro video gaming and custom PC building", "Jogging and home yoga practice", "Participating in a small local
    book club", "Volunteering to teach computer basics to seniors"]'
  career_goals: Eric aims to transition from a senior database administrator role to a lead data architect position within the next three years, overseeing enterprise‑wide data strategy for a regional tech
    or healthcare firm. He aspires to develop expertise in data lake and lakehouse architectures, integrating AI‑driven analytics while maintaining operational reliability. Long‑term, he envisions launching
    a boutique consultancy that helps small Texas businesses modernize their data infrastructure, leveraging his blend of curiosity for new tech and pragmatic execution. He also seeks mentorship opportunities
    to guide junior engineers, reflecting his cooperative yet assertive leadership style.
