personas:
  professional: Zackery Hartley, a seasoned television and film camera operator and editor with over 15 years of broadcast and independent production experience, blends meticulous technical skill in digital
    cinema, DSLR, and 35mm film with a calm, collaborative demeanor that keeps sets running smoothly while quietly championing visual storytelling.
  sports: Zackery Hartley, a dedicated weekend hiker, belongs to the Austin Hill Country Trail Club, follows the Texas Rangers and Austin FC for occasional fan moments, and uses long treks through the Hill
    Country as their primary form of fitness, shunning team sports in favor of solitary outdoor activity.
  arts: Zackery Hartley cultivates artistic expression through vintage film photography inspired by Ansel Adams, devours literary fiction by James Baldwin and philosophy by Michel Foucault, and spins classic‑rock
    vinyl from The Rolling Stones and Led Zeppelin while analyzing film theory by Laura Mulvey.
  travel: Zackery Hartley pursues flexible, photography‑focused travel, spontaneously road‑tripping to New Mexico’s White Sands and Texas’s Big Bend for mist‑laden landscapes, while dreaming of a future
    expedition to Patagonia’s glaciers to capture remote vistas.
  culinary: Zackery Hartley channels a semi‑professional approach to cooking by slow‑smoking Texas‑style brisket using mesquite wood, perfecting a dry rub of paprika, cumin, and brown sugar, and pairing
    the meals with home‑brewed craft ales brewed from Cascade hops.
  core: Zackery Hartley is a solitary, curiosity‑driven cinematographer who balances methodical craft with relaxed, flexible living, and a penchant for vintage lenses, craft beer, and quiet hill‑country
    hikes.
background:
  cultural: Zackery grew up in a close‑knit white Anglo‑American family in central Texas, where community gatherings, outdoor recreation, and a reverence for local history shaped his worldview. He attended
    public schools in Williamson County and later earned a Bachelor of Arts in Humanities, focusing on literature and media studies, which reinforced his appreciation for storytelling across mediums. The
    Texan values of independence, hospitality, and modesty—combined with his exposure to regional folk music, barbecue traditions, and the natural beauty of the Hill Country—inform both his personal life
    and the authentic, grounded perspective he brings to his work in television and film.
attributes:
  skills: '[''Camera operation (digital cinema, DSLR, 35mm film)'', ''Video editing (Adobe Premiere Pro, DaVinci Resolve, Avid Media Composer)'', ''Lighting design and setup'', ''Color grading and color
    correction'', ''Storyboarding and visual narrative planning'', ''Equipment maintenance and troubleshooting'', ''On‑set crew coordination and collaboration'', ''Audio‑video syncing'', ''Post‑production
    workflow optimization'', ''Archival footage management'']'
  hobbies: '[''Landscape photography (vintage film and digital)'', ''Hiking in the Texas Hill Country'', ''Reading literary fiction, philosophy, and film theory'', ''Birdwatching'', ''Collecting and restoring
    vintage cameras'', ''Homebrewing craft beer'', ''Woodworking (small furniture and decorative pieces)'', ''Listening to classic‑rock vinyl records'', ''Cooking Texas‑style barbecue'']'
  career_goals: Zackery aims to transition from a technical specialist to a creative leader by becoming a director of photography on feature documentaries that explore Texas cultural heritage and natural
    landscapes. He also envisions launching a small independent production company in the Austin‑Elgin corridor, allowing him to choose projects that align with his curiosity for new storytelling methods
    while maintaining the flexibility he values. Mentoring emerging camera operators and editors in the local community is a long‑term ambition, reflecting his cooperative nature and desire to foster harmony
    within the industry.
