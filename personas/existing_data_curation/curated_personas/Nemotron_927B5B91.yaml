personas:
  professional: Candida Delapena, a budding marine science enthusiast, channels her methodical curiosity into building a small Python-coded marine species catalog that logs beach finds and cross-references
    online databases, all while balancing schoolwork with a disciplined schedule.
  sports: Candida Delapena spends her summers paddling a junior kayak in the Gulf and swims on her middle school team, while cheering for the Houston Astros and the Corpus Christi Hooks, and she fits in
    solo beach jogs and occasional beach volleyball games with cousins, preferring low-key activity over organized leagues.
  arts: Candida Delapena finds solace sketching sunrise over the shoreline while listening to mariachi classics by Vicente Fernandez and folk ballads by Lila Downs, and she often studies Frida Kahlo’s self-portraits
    for inspiration, filling her journal margins with doodles of sea turtles and colorful papel picado.
  travel: Candida Delapena prefers thoughtfully planned weekend trips to tide pools at Padre Island and occasional family road trips to San Miguel de Allende, dreaming of a future snorkeling adventure in
    the Galapagos while balancing her school schedule and modest travel fund.
  culinary: Candida Delapena enjoys mastering the art of handmade tamales with her mother, layering masa with pork and roasted chilies, while also experimenting with a pineapple-coconut salsa for grilled
    fish, and she loves adding fresh cilantro and lime for a bright finish on every dish she prepares.
  core: Candida Delapena, a methodical 13-year-old marine enthusiast, blends quiet curiosity with disciplined habits, cataloguing shells by day and coding by night, all while savoring family traditions
    and dreaming of ocean stewardship.
background:
  cultural: Candida comes from a Mexican‑American family deeply rooted in Corpus Christi's vibrant Hispanic community. She speaks Spanish fluently at home, preserving her family's cultural traditions such
    as Día de los Muertos, quinceañera celebrations, and weekly family meals featuring dishes like tamales and pozole. Family bonds (familismo) are central to her upbringing, providing a supportive network
    that encourages her academic pursuits. The coastal Texas environment blends with her Mexican heritage, fostering a unique perspective on marine conservation—she feels a strong responsibility to protect
    the Gulf that sustains both her community's livelihood and cultural identity.
attributes:
  skills: '["Bilingual Spanish-English communication", "Basic Python programming", "Research and data collection (marine biology)", "Time management and organizational planning", "Animal care and grooming",
    "Cooking traditional Mexican dishes", "Creative writing", "Sketching and illustration", "Attention to detail in school projects"]'
  hobbies: '["Reading science and nature books", "Sketching coastal landscapes", "Journaling beach observations", "Coding simple Python games", "Collecting and cataloguing shells", "Cooking traditional
    Mexican dishes with family", "Listening to mariachi and folk music", "Puzzle solving", "Stargazing"]'
  career_goals: Candida aspires to become a marine biologist who studies the Gulf of Mexico's ecosystems and contributes to conservation efforts. She envisions attending a specialized high school program
    in environmental science, followed by a degree in marine biology or coastal ecology. Her long‑term ambition includes developing a citizen‑science app that helps Gulf residents track local wildlife and
    water quality, merging her technical skills with her passion for protecting her community's natural resources. She also keeps an alternate path open to veterinary medicine, reflecting her love for animal
    care.
