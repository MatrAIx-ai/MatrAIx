personas:
  professional: Erika Lanza is a seasoned community-garden coordinator and senior-peer mentor who blends practical horticultural know-how with a curious, detail-oriented approach, meticulously planning
    planting schedules while skeptically vetting new volunteers, and channels her intense emotional reactivity into passionate storytelling about the region’s coal-mining past to inspire younger neighbors.
  sports: Erika Lanza enjoys low-impact fitness through morning garden walks and weekend birdwatching hikes, participates in the Boone County Senior Walking Club, and loyally follows the West Virginia Mountaineers
    football team while cheering for the local high school basketball squad during the winter season.
  arts: Erika Lanza expresses creativity through intricate knitting patterns inspired by traditional Appalachian motifs, finds solace in the lilting sounds of Bill Monroe and Alison Krauss on her local
    radio, and devours historical mystery novels by Lee Smith, while occasionally attending community-center concerts featuring the folk duo The Hillbilly Cats.
  travel: Erika Lanza prefers low-key, budget-friendly road trips that combine scenic drives through the Blue Ridge Parkway with stops at historic farming towns like Galax, Virginia, has already explored
    Asheville, North Carolina’s art districts, and dreams of a gentle pilgrimage to the Great Smoky Mountains, always planning itineraries around her garden schedule and knitting supplies.
  culinary: Erika Lanza cooks hearty Appalachian fare such as skillet cornbread, country ham and beans, and preserves garden tomatoes into tangy salsa, expertly crafting apple butter and pickled cucumbers
    with fresh dill, while her trusty cast-iron pot and a well-worn family recipe notebook guide every meal.
  core: Erika Lanza is a fiercely independent senior whose garden-to-knit rhythm balances meticulous stewardship with occasional anxious over-thinking, turning every daily task into a quiet act of cultural
    preservation.
background:
  cultural: Erika grew up in the Appalachian region of southern West Virginia, an area shaped by a legacy of coal mining, close‑knit family networks, and a strong oral‑storytelling tradition. The community
    places high value on self‑reliance, hospitality, and practical skills such as gardening, cooking, and handcrafts. Religious life, primarily Protestant, centers social gatherings and mutual support.
    While the region has faced economic challenges, there is a deep respect for the land and for preserving cultural heritage through music, folk arts, and intergenerational knowledge sharing. Erika’s identity
    reflects these values, blended with a personal curiosity toward new ideas like sustainable gardening techniques and digital communication.
