  hobbies: '["Gardening", "Knitting", "Cooking regional dishes", "Reading historical fiction", "Birdwatching", "Crossword puzzles", "Journaling", "Attending church socials", "Volunteering at food pantry",
    "Listening to bluegrass music"]'
  career_goals: Erika’s primary ambition is to remain independent and actively engaged in her community. She aims to expand the neighborhood community garden she helps tend and to mentor younger volunteers
    in sustainable gardening and traditional crafts. She hopes to compile a memoir of her family’s experiences in Boone County, preserving local stories for future generations. She also seeks to improve
    her emotional wellbeing by regularly attending a senior support group, learning relaxation techniques, and possibly completing a short certificate in senior peer counseling so she can provide informal
    support to other widows. While she does not intend to return to paid work, she aspires to be recognized as a valued elder resource and to win the annual county craft fair.
