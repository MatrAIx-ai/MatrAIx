  hobbies: '[''Cooking Mexican cuisine'', ''Folk dancing (zapateado and salsa)'', ''Volunteering at health fairs and church events'', ''Gardening'', ''Reading mystery novels'', ''Hiking Hill Country trails'',
    ''Participating in community potlucks'']'
  career_goals: Zarina aims to advance into a senior leadership role such as charge nurse or nurse manager, where she can shape policy and improve patient safety in her county. She plans to complete her
    BSN to strengthen her clinical knowledge and to pursue certification in gerontological nursing, reflecting her desire to serve an aging population. A core ambition is to develop a community‑based health‑promotion
    program that offers preventive screenings and bilingual health education for underserved Mexican‑American residents. She also hopes to establish a peer‑support network for nursing staff to address workplace
    stress and burnout, leveraging her empathy and practical problem‑solving skills.
