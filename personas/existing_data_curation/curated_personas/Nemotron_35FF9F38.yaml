personas:
  professional: Zarina Romero, a seasoned registered nurse with over three decades of rural hospital experience, blends meticulous patient assessment, bilingual communication, and evidence-based practice
    with a natural flair for leading interdisciplinary teams and mentoring peers, all while balancing curiosity for innovation with a pragmatic respect for proven protocols.
  sports: Zarina Romero enjoys weekend hikes along Hill Country trails, participates in a local walking club that meets at the state park, supports the Texas Rangers and Dallas Cowboys, and plays recreational
    softball with the church league, using these activities to stay active and socially connected.
  arts: Zarina Romero immerses themselves in folk-dance nights featuring zapateado and salsa, cherishes the music of classic plena singers and contemporary Latin artists like Carlos Vives, unwinds with
    mystery novels by Agatha Christie, and occasionally attends community theater productions starring local talent.
  travel: Zarina Romero prefers road trips that blend cultural discovery and nature, having explored San Antonio’s historic missions, driven to Oaxaca to study regional cuisine, and frequently visits the
    Hill Country vineyards, yet balances travel ambitions with family responsibilities and a modest travel budget.
  culinary: Zarina Romero expertly prepares tamales, pozole, and mole using home-grown herbs, chilies, and fresh corn masa, delights in crafting homemade salsa verde with tomatillos, and enjoys baking pan
    dulce, often sharing their dishes at potlucks while balancing a kitchen that doubles as a garden test-bed.
  core: Zarina Romero fuses a lifelong nursing career with vibrant community cooking, dancing, and advocacy, driven by a persistent worry that fuels both diligent care and occasional self-critical over-extension.
background:
  cultural: 'Zarina was raised in a Mexican‑American household in Texas, where bilingualism and strong family ties were central. She celebrates traditional holidays such as Día de los Muertos and Cinco
    de Mayo, preserving the music, foods, and rituals of her heritage. Her cultural identity shapes her nursing practice: she routinely uses Spanish to build rapport with patients, respects cultural health
    beliefs, and incorporates community values into care plans. Deeply rooted in the Catholic faith, she actively participates in church festivals and volunteers at parish‑run outreach programs, reflecting
    a communal spirit that blends Mexican customs with Texan hospitality.'
