  hobbies: '[''gardening'', ''knitting'', ''reading historical fiction'', ''experimenting with recipes'', ''volunteering at a food pantry'', ''birdwatching'', ''walking in Forest Park'', ''digital photography'',
    ''playing bridge'', ''attending local theater and jazz concerts'']'
  career_goals: Although retired, Molly aims to channel her curiosity into tangible projects. She plans to compile her family’s stories and photographs into a memoir, learn more advanced digital photography
    to document her garden, and mentor younger volunteers at the senior center. She also hopes to contribute to a local historic preservation initiative, take a short road trip to the Great Smoky Mountains,
    and perhaps enroll in a short community‑college course on horticultural therapy to deepen her gardening expertise while staying mentally active.
