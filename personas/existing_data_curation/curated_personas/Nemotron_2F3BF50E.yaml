personas:
  professional: Sylvia Keane, a veteran front‑of‑house server turned aspiring hospitality manager, leverages their meticulous memory for orders, sharp conflict‑resolution skills, and critical eye for service
    quality to mentor staff while juggling the spontaneous demands of a bustling restaurant.
  sports: Sylvia Keane hikes the Bingham County foothills each weekend, dances line‑dancing at the local western swing club, and cheers for the Idaho Falls Chukars while occasionally joining a community
    senior softball league.
  arts: Sylvia Keane frequents the Idaho Falls Art Museum, sketches exhibits in a pocket watercolor notebook, and draws inspiration from the works of Edward Hopper, contemporary painter Lisa Bradley, and
    the folk songs of Johnny Cash, integrating these influences into their own miniature canvases.
  travel: Sylvia Keane prefers road‑trip itineraries that blend scenic drives through Yellowstone with stops at boutique vineyards in Oregon, meticulously plans accommodations in historic B&Bs, yet leaves
    room for spontaneous detours to roadside farmers’ markets.
  culinary: Sylvia Keane experiments with huckleberry‑infused Thai basil pesto, braised trout with miso‑glazed carrots, and Idaho mashed potatoes seasoned with za’atar, demonstrating a love for marrying
    regional produce with bold global flavors.
  core: Sylvia Keane balances a competitive streak in hospitality with a curious love for watercolor, tiny quirks like over‑watering their wildflowers, and a penchant for splurging on art books despite
    a tightly managed budget.
background:
  cultural: Sylvia comes from a white, Irish‑American family with deep roots in the Mountain West. Raised in a modest, middle‑class household near Idaho Falls, she was taught the values of self‑reliance,
    hard work, and community involvement that are hallmarks of the region’s agricultural and small‑town culture. Her upbringing blended traditional Protestant traditions with a strong appreciation for local
    festivals, such as the Idaho Falls Freedom Festival, and outdoor pursuits like fishing and hiking. While firmly grounded in these Western American customs, Sylvia’s curiosity has led her to embrace
    broader cultural experiences, particularly in visual arts and global cuisines, allowing her to bridge the conventional and the unconventional in both her personal and professional life.
attributes:
  skills: '["Customer service", "Multitasking under pressure", "Order memory recall", "Conflict resolution", "Team training and mentorship", "POS system operation", "Inventory management", "Basic bookkeeping",
    "Art appreciation and terminology", "Community arts event planning", "Spreadsheet and data entry", "Quality assessment and performance feedback"]'
  hobbies: '["Visiting art galleries and museums", "Watercolor painting", "Reading travel memoirs and philosophy", "Gardening (vegetable and flower beds)", "Line dancing", "Board game nights with friends",
    "Cooking and experimenting with new recipes", "Hiking in Idaho’s foothills", "Volunteer work at community center (event coordination)", "Playing crossword puzzles"]'
  career_goals: Sylvia aims to transition from front‑of‑house service to a supervisory role within the next two years, seeking certification in hospitality management to solidify her leadership credentials.
    Long‑term, she dreams of opening a small coffee‑gallery hybrid where locals can gather for live music, art showcases, and community workshops, marrying her love of service with her passion for the arts.
    She also hopes to mentor younger waitstaff, imparting her critical eye for service excellence and encouraging a culture of continuous learning. Additionally, she plans to volunteer as a liaison between
    local restaurants and the Idaho Falls Arts Council, helping to integrate cultural events into the dining scene.
