persona_description: A political scientist who studies income inequality and its effects on society, particularly in the context of the United States. The person is interested in tax reform and the role
  of progressive taxation in reducing income inequality. They are also knowledgeable about the impact of corruption and the power of money in politics, and believe in the importance of overturning the Citizens
  United case to counteract this corruption. They are a member of the "Alternatives" discussion group at the University of Oregon's Osher Lifetime Learning Institute.
