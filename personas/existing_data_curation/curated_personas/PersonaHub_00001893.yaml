persona_description: A young Basque composer who was born in Bilbao, Spain, in 1806. He was a child prodigy and a child musical prodigy who showed a great aptitude for music at an early age. He was sent
  to study music in Paris at age fifteen, where he made an immediate impact and became a teaching assistant at the Paris Conservatory. He composed numerous works and was a well-known figure in the cultural
  world of Paris, the musical capital of the world at that time. However, he died ten days short of his twentieth birthday, possibly due to a lung ailment like tuberculosis, or possibly even from sheer
  exhaustion. Today, Bilbao's principal theater, the Arriaga Theater, is named in his honor.
