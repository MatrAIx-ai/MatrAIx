  hobbies: '[''Reading African American literature'', ''Gardening'', ''Woodworking'', ''Walking in local parks'', ''Listening to jazz'', ''Cooking soul food'', ''Photography'']'
  career_goals: He aims to move into a supervisory role within the county’s social services department, where he can design and lead a senior‑focused mental‑health outreach program. Marcus also wants to
    mentor emerging social workers, secure sustainable funding for community‑based initiatives, and eventually influence local policy to improve resource allocation for underserved populations. Balancing
    these ambitions with his preference for a structured schedule, he plans to attain a certification in advanced case management within the next two years.
