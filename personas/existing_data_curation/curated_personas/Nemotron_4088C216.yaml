  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Fusion cooking (Indian‑Southern cuisine)'', ''Exploring coffee shops and trying new blends'', ''Yoga and mindfulness
    meditation'', ''Reflective journaling'', ''Participating in a small book club'', ''Volunteering at cultural community events'', ''Traveling to experience regional art and food'', ''Listening to podcasts
    on personal development and finance'']'
  career_goals: Pradnya aims to earn her Certified Financial Planner (CFP) designation within the next two years and to deepen her expertise in sustainable and impact investing. She aspires to become a
    senior advisor at her firm, eventually leading a boutique practice that serves the South Asian diaspora and other underserved communities in the Raleigh–Durham area. She envisions creating immersive
    financial‑literacy workshops that blend art, storytelling, and visual media to make complex concepts more accessible. Long‑term, she hopes to author a guidebook on culturally aware wealth building and
    to mentor young women entering the financial services industry.
