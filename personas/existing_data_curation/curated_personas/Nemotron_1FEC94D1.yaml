personas:
  professional: Leonard Ganthier is a budding tech enthusiast who troubleshoots computers and smartphones, assembles custom PC rigs, and runs a modest YouTube channel of game walkthroughs, using his practical
    curiosity to lead peer workshops at school while balancing school responsibilities and his social life.
  sports: Leonard Ganthier dominates pickup basketball at the local Lakeside Park, idolizing the Golden State Warriors and mimicking Steph Curry’s three‑point form, tears down the Bay Area Trail on his
    skateboard with the “Skate Bay” crew, and spends quiet Sunday mornings fishing off Galveston’s pier while catching occasional San Francisco 49ers games on his phone.
  arts: Leonard Ganthier curates his YouTube walkthroughs to the rhythm of classic soul from Marvin Gaye and modern hip‑hop from J. Cole, winds down with sci‑fi graphic novels like ‘Saga’ and ‘Descender’,
    and finds visual inspiration in the cinematography of Ava DuVernay’s music videos and the lyrical flow of Anderson .Paak.
  travel: Leonard Ganthier favors short road trips with his skateboard and fishing rod, having driven the Pacific Coast Highway to Monterey and joined a school exchange program in Tokyo to explore anime
    districts, while dreaming of hiking the Canadian Rockies and attending the Austin SXSW festival for live music and gaming panels.
  culinary: Leonard Ganthier’s palate blends Southern comfort and coastal flavors – he grills blackened catfish with lemon, spikes mac & cheese with sriracha, and assembles shrimp po’boy sandwiches using
    fresh Gulf shrimp, but his cooking remains at a teenage‑beginner level, often relying on YouTube tutorials and occasionally burning the edges when distracted by a gaming stream.
  core: Leonard Ganthier is a practical‑curious 16‑year‑old who balances PC builds, basketball, and anxiety‑driven routines while dreaming of a community workshop that melds mentorship with hands‑on skill
    sharing.
background:
  cultural: Leonard’s identity is shaped by his African‑American heritage within the Gulf Coast region of Texas. He grew up in a close‑knit family that celebrates traditions such as Southern soul food,
    church gatherings, and community barbecues. The local Black community in Dickinson and nearby Galveston has a strong emphasis on mutual support, music, and storytelling, which influence Leonard’s love
    for hip‑hop, gospel, and community service. He also draws on the broader Southern culture—respect for elders, blending culinary flavors like Tex‑Mex and Creole, and a resilient, hopeful outlook that
    informs his personal and career aspirations.
