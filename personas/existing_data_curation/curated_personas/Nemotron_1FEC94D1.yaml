    ''Community clean‑up volunteering'']'
  career_goals: Leonard aims to earn his GED within the next year and enroll in a vocational training program focused on automotive technology or IT support. He hopes to secure an apprenticeship with a
    local garage or a tech repair shop, eventually becoming a certified mechanic or entry‑level network technician. In the longer term, he dreams of opening a community workshop where he can teach other
    teens practical tech and trade skills, while also providing mentorship to help them navigate stress and academic challenges.
