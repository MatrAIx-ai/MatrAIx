persona_description: A climate scientist who specializes in the study of Arctic climate and its interactions with the ocean and atmosphere. This person is interested in understanding the impacts of climate
  change on the Arctic, including changes in sea ice extent, temperature, and circulation patterns. They are particularly interested in the feedback mechanisms that may exacerbate these changes and the
  potential for positive and negative feedbacks to occur on a local scale. They are also interested in the potential for cloud changes to have a positive or negative impact on the Arctic climate system.
  This person is likely to have expertise in sea ice modeling, climate modeling, and climate change research.
