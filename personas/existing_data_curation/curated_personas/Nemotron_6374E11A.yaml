  hobbies: '[''Reading non-fiction'', ''Solving puzzles (Sudoku, logic games)'', ''Hiking'', ''Cycling'', ''Cooking Italian cuisine'', ''Woodworking'', ''Mindfulness meditation'', ''Mentoring at a coding
    club'']'
  career_goals: Ronnie aims to transition into a lead engineering or site reliability role where he can shape technical processes, improve system stability, and mentor junior developers. Over the next five
    years, he plans to earn the AWS Certified Solutions Architect – Professional credential, deepen his expertise in reliability engineering, and spearhead the adoption of robust monitoring and incident‑response
    practices within his team. He also hopes to contribute to an open‑source testing framework that emphasizes clear documentation and repeatable workflows, aligning with his desire to give back to the
    developer community while maintaining a balanced work‑life schedule for his family.
