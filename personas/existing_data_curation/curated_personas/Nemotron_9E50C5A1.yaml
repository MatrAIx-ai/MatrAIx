  career_goals: Auston intends to formalize his practical knowledge by first obtaining a GED, then enrolling in an apprenticeship program for a skilled trade such as electrician or HVAC technician. He envisions
    eventually launching his own handyman service that can provide a reliable income while allowing flexible scheduling to accommodate his family and personal projects. In the longer term, he hopes to purchase
    a small parcel of land to expand his gardening and possibly diversify into small‑scale agritourism, blending his love of the outdoors with entrepreneurship.
