  hobbies: '[''Watercolor Painting'', ''Nature Photography'', ''Strawberry Gardening'', ''Reading Historical Fiction'', ''Art Book Study'', ''Book Club'', ''Chess'', ''Cooking'', ''Farmers Market Visits'',
    ''Community Theater Set Design'', ''Jazz Listening'', ''Classic Rock Vinyl Collection'']'
  career_goals: Although retired, Tony aims to deepen his involvement in the local arts community by volunteering as a docent at the Plant City Museum of History, leading tours that blend his knowledge
    of regional art and local heritage. He plans to complete his associate degree in Business Administration at Hillsborough Community College, focusing on nonprofit management to better support community
    projects. Over the next five years, he hopes to curate an intergenerational art workshop series, mentor emerging artists, and author a memoir reflecting on his life experiences, the evolution of Plant
    City, and the value of lifelong learning.
