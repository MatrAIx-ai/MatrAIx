personas:
  professional: Jennifer Cuthbertson, a Master Pipefitter with over a decade of hands‑on experience, combines meticulous project planning and a knack for interpreting complex engineering drawings to lead
    small crews on high‑pressure steam retrofits while championing female representation in the trades and eyeing a future supervisory role and sustainable contracting firm.
  sports: Jennifer Cuthbertson’s athletic routine blends seasonal outdoor pursuits—cross‑country skiing with the Maine Nordic Ski Club in winter, weekend hikes on the Appalachian Trail, and summer kayaking
    on the Kennebec River—with a loyal following of the Boston Red Sox and Portland Sea Dogs, and she habitually logs her workouts in a digital training log to track progress.
  arts: Jennifer Cuthbertson cultivates her creative side by reading historical mystery novels by authors like C.J. Sansom and Tana French, attending local folk concerts featuring artists such as The Decemberists,
    and drawing inspiration from Shaker furniture designs for her woodworking projects, while occasionally volunteering at the regional historical society’s art exhibitions.
  travel: Jennifer Cuthbertson prefers meticulously planned road trips that balance adventure with routine, having explored the White Mountains' alpine trails, the historic streets of Quebec City, and the
    coastal lighthouses of Acadia National Park, yet she often postpones overseas travel to the Scottish Highlands until her own contracting firm generates steady revenue.
  culinary: Jennifer Cuthbertson enjoys cooking farm‑to‑table meals that showcase her garden’s bounty, frequently whipping up New England clam chowder with fresh clams, rosemary‑infused roasted root vegetables,
    and maple‑glazed salmon, while her skillfully built wooden cutting board and cedar‑plank grill reflect her woodworking prowess.
  core: Jennifer Cuthbertson is a detail‑driven pipefitting veteran who balances a love for structured outdoor routines with a relentless pursuit of sustainable trade mastery, occasionally over‑scheduling
    herself but always pulling through with a toolbox of practicality and purpose.
background:
  cultural: Jennifer grew up in a small coastal community in Maine, where the rhythms of the seasons, a strong sense of self‑reliance, and community interdependence shaped her worldview. Her family has
    deep New England roots, tracing back to English and Irish ancestors who settled the region in the 19th century. The local culture emphasizes practical skills, respect for the natural environment, and
    a modest, egalitarian social fabric. This background reinforced her pragmatic approach to work, her appreciation for hands‑on problem solving, and her commitment to contributing to the community through
    reliable, quality craftsmanship.
attributes:
  skills: '[''Pipefitting'', ''Steam system installation'', ''Welding (SMAW, TIG, MIG)'', ''Blueprint reading'', ''Hydrostatic testing'', ''Code compliance (International Plumbing Code)'', ''Project scheduling
    and cost estimation'', ''Team leadership'', ''Safety management (OSHA 30)'', ''Digital asset tracking'']'
  hobbies: '[''Hiking'', ''Cross‑country skiing'', ''Kayaking'', ''Woodworking'', ''Reading historical mystery novels'', ''Volunteer pipefitting for Habitat for Humanity'', ''Gardening'', ''Women’s trade
    association networking'']'
  career_goals: Jennifer aims to transition from a hands‑on journeyperson to a lead supervisor within her union, eventually obtaining a Master Pipefitter license and the Small Business Owner certification
    to start her own contracting firm focused on sustainable heating solutions for rural Maine. She is passionate about increasing female representation in the trades, so she plans to mentor apprentices
    and develop a local outreach program for high school girls. Over the next five years she hopes to complete a certificate in Construction Management, achieve union leadership, and expand her business
    to include green retrofits for historic homes.
