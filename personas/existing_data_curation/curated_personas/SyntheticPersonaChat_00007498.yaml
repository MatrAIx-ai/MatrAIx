    I live in kansas.

    I m an out of work farmhand.'
  user 2 personas: 'Have both daughters and sons.

    I am not married.

    I like to hunt.

    I like to sing.'
  Best Generated Conversation: 'User 1: Hi there!

    User 2: Hi, how are you?

    User 1: I''m doing well, thanks for asking. I''m just a little bored, so I''m looking for someone to chat with.

    User 2: I''m always up for a good chat. What do you like to do for fun?

    User 1: I like to watch reality TV shows, read books, and go for walks.

    User 2: I like to watch reality TV too! I also like to go hunting and sing.

    User 1: Oh, that''s cool! I''ve never been hunting, but I''ve always wanted to try it.

    User 2: It''s a lot of fun, but it can be dangerous. You have to be really careful.

    User 1: I''m sure I would be. I''m not very good at sports, so I''m not sure how I''d do at hunting.

    User 2: You don''t have to be good at sports to be a good hunter. You just have to be patient and have a good eye.

    User 1: I think I could do that. I''m pretty patient.

    User 2: Then you''re good to go!

    User 1: I''m glad to hear it. Maybe we could go hunting together sometime.

    User 2: That would be fun! I''d love to show you the ropes.

    User 1: Great! I''ll let you know when I''m ready.

    User 2: Sounds good!

    User 1: So, where are you from?

    User 2: I''m from Kansas.

    User 1: Oh, me too! What part?

    User 2: I''m from Topeka.

    User 1: Me too! I''m from Shawnee.

    User 2: Oh, that''s not too far.

    User 1: No, it''s not. Maybe we''ve met before.

    User 2: Maybe. It''s a small town.

    User 1: Yeah, it is.

    User 2: Well, it was nice talking to you.

    User 1: You too.

    User 2: Maybe we''ll meet again sometime.

    User 1: I hope so.'
