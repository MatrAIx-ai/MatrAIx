personas:
  professional: Irving Bunnell is a meticulous dentist who blends their artistic eye and digital CAD/CAM tools to craft precise, aesthetic smiles while juggling a relaxed, sometimes chaotic schedule that
    reflects their love for creative freedom and a boutique studio vision.
  sports: Irving Bunnell enjoys early‑morning fishing on the Pascagoula River, occasional jogging along the riverbank, follows the New Orleans Saints (NFL) and the Mississippi Braves (Double‑A baseball),
    and belongs to the local Pascagoula Rowing Club that meets each spring, a routine they cherish for its blend of competition and solitude.
  arts: Irving Bunnell spends evenings painting Gulf Coast sunrise watercolors reminiscent of Monet, attends blues nights featuring B.B. King tributes at intimate venues, and discusses unconventional scientific
    ideas with friends while listening to John Coltrane, all of which fuel their appreciation for both visual and auditory arts.
  travel: Irving Bunnell prefers low‑key, self‑planned road trips that combine coastal fishing in the Florida Keys, a culinary pilgrimage to New Orleans for authentic gumbo, and occasional weekend getaways
    to the historic French Quarter of Savannah, all while they budget carefully to keep family time prioritized.
  culinary: Irving Bunnell loves cooking Southern and Creole comfort foods—spicy jambalaya with andouille sausage, shrimp étouffée simmered with okra, and collard greens seasoned with smoked ham—showcasing
    a skillful, hands‑on approach in the kitchen that mirrors their dental precision.
  core: Irving Bunnell is a curious, art‑driven dentist who balances a laid‑back, slightly disorganized lifestyle with a relentless competitive streak, a penchant for early‑morning fishing, and a habit
    of tinkering endlessly on vintage motorcycles, and they often channel that energy into both their practice and personal projects.
background:
  cultural: Irving grew up in the Gulf Coast region of Mississippi, shaped by a working‑class Southern upbringing that values self‑reliance, modest hospitality, and a close connection to the outdoors. Raised
    in a predominantly white community, he attended the local high school and later pursued dental education, reflecting the region’s emphasis on upward mobility through professional careers. He and his
    wife are active in a small, loosely affiliated church, which provides community ties while respecting his preference for privacy. The cultural rhythms of Moss Point—fishing festivals, seafood boils,
    and occasional Mardi Gras celebrations—inform his love for coastal life and Southern cuisine. Though rooted in traditional Southern values, his curiosity and appreciation for art drive him toward unconventional
    ideas and experiences, blending regional heritage with a modern, exploratory outlook.
