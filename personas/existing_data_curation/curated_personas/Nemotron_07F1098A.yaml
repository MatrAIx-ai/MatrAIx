  career_goals: Irving aims to transform his practice into a boutique dental studio that emphasizes aesthetic dentistry and personalized patient experiences. Over the next five years, he plans to acquire
    a small space in Moss Point where he can integrate 3‑D printing, AI‑assisted diagnostics, and advanced smile‑design software. He aspires to become a regional authority on the intersection of art and
    dentistry, publishing articles that explore how artistic principles can improve dental outcomes. He also wishes to mentor younger dentists through a part‑time teaching role at the local community college
    and to lead community outreach programs that provide free oral‑health screenings in underserved neighborhoods. Balancing his professional ambitions with flexibility, he intends to schedule his work
    to preserve evenings for his artistic pursuits and family time.
