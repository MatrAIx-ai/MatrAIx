  hobbies: '[''watercolor painting'', ''sketching'', ''nature photography'', ''reading contemporary fiction'', ''art‑history blogging'', ''birdwatching'', ''hiking'', ''keeping a nature journal'', ''listening
    to indie folk music'', ''community art workshops'']'
  career_goals: Brenda aims to advance from laborer to a certified construction manager or building‑technician within the next five years. She plans to enroll in a community‑college construction management
    program while working part‑time to gain supervisory experience. Her long‑term ambition is to merge her practical construction knowledge with her artistic curiosity by specializing in sustainable building
    design and becoming a project lead on eco‑friendly residential projects. She also hopes to travel to study vernacular architecture in different regions, eventually contributing to a portfolio that showcases
    both functional and aesthetic excellence.
