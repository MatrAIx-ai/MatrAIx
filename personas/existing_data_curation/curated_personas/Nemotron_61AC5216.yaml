  hobbies: '[''Walking Club'', ''Food Pantry Volunteering'', ''Cooking & Recipe Experimentation'', ''Backyard Gardening'', ''Mystery Novel Reading'', ''Self‑Help / Anxiety Management Books'', ''High School
    Sports Attendance'', ''Beginner Yoga'']'
  career_goals: Diane aims to move into a supervisory role within the next two years, targeting a shift‑lead or assistant manager position that would allow her to shape store operations and mentor staff.
    She plans to complete a certification in supply‑chain management through a local community college to strengthen her qualifications for long‑term advancement, potentially becoming a store manager or
    a regional inventory coordinator. Alongside these professional goals, Diane is committed to improving her emotional resilience; she regularly attends mindfulness workshops and hopes to lead a peer‑support
    group at work to help colleagues manage workplace stress.
