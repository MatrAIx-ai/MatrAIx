  hobbies: '[''Sketching murals'', ''Visiting art exhibitions'', ''Curating community art shows'', ''Reading contemporary African‑American literature'', ''Poetry writing'', ''Photography'', ''Pick‑up basketball'',
    ''Running along the Pearl River trail'', ''Cooking Southern soul food'', ''Singing in a church choir'']'
  career_goals: Jaquarius aspires to advance to a detective role focused on community‑oriented investigations, and eventually to a lieutenant position where he can shape department policies that prioritize
    collaboration with local cultural institutions. He aims to design and lead a city‑wide arts‑and‑public‑safety outreach program that engages at‑risk youth, reduces tension through creative dialogue,
    and showcases the value of the arts in community resilience. Over the next five years, he also plans to pursue a Master's in Criminal Justice or Public Administration to support his leadership trajectory.
