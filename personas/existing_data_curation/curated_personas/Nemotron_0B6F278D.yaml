  hobbies: '[''Leading community craft circle'', ''Charity hair-cutting fundraisers'', ''Hiking Chequamegon-Nicolet trail'', ''Gardening (native perennials)'', ''Book club (contemporary fiction)'', ''Gentle
    yoga'', ''Baking seasonal pies'']'
  career_goals: Nicole aims to expand her salon into a boutique concept that combines a full-service hair studio with a retail space for eco-friendly hair care products. She plans to earn a Master Cosmetology
    certification and become a certified educator to teach advanced coloring at the local community college. Over the next five years she hopes to open a second location in the nearby city of Superior,
    develop her own line of natural hair care shampoos and conditioners, and take on a leadership role in the Wisconsin Salon Professionals Association. She also wants to mentor at‑risk youths through a
    community apprenticeship program, combining her love of structure with flexibility for the trainees.
