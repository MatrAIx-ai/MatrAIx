persona_description: A cognitive scientist or researcher who is interested in the cognitive science of proverbial wit and wisdom, as well as the study of figurative language and indirect modes of communication.
  They are likely to be familiar with the formal, cultural, and cognitive views of the proverb and have an interest in extending the challenge of proverb cognition by comparing proverb comprehension to
  other forms of figurative language and discussing the implications of cognitive science for the taxonomy of proverbs, proverb comprehension, and the universal vs. culture-specific aspects of proverbs.
  They may also have an interest in child development and brain substrates.
