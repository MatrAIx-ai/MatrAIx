  career_goals: Joyce aims to move into a supervisory role within retail, such as shift manager or assistant store manager, where she can apply her practical knowledge and develop stronger organizational
    skills. She is interested in earning a certification in retail management and possibly completing a GED or community college courses in bookkeeping to broaden her career options. Ultimately, she hopes
    to secure a position that offers more consistent hours and benefits, reducing her stress and providing greater financial stability while still allowing flexibility for her family and personal interests.
