persona_description: A researcher from Cardiff University, specifically from the MRC Centre for Neuropsychiatric Genetics and Genomics and Neuroscience and Mental Health Research Institute, who specializes
  in studying the genetic factors contributing to Alzheimer's disease. The persona's work has focused on identifying specific genes associated with rare forms of Alzheimer's and the common form of the disease,
  and has contributed to the growing body of evidence that Alzheimer's disease is more complex than previously thought. The persona's research has led to the identification of additional eight new genes
  that increase the risk of developing Alzheimer's disease.
