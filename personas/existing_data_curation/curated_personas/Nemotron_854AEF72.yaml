personas:
  professional: Carlos Anguiano, a budding preschool engineer, builds elaborate block towers and sandcastles, channeling a balance of curiosity and practicality while meticulously organizing his toys yet
    staying flexible enough to improvise new designs during play.
  sports: Carlos Anguiano eagerly watches the Seattle Seahawks on Sundays and idolizes quarterback Russell Wilson, while also playing on the Little Sprinters Soccer Club where they practice dribbling and
    score mini‑goals in the neighborhood field.
  arts: Carlos Anguiano sings along to Idina Menzel's 'Let It Go' from Frozen, watches Sesame Street episodes starring Big Bird, and flips through Dr. Seuss picture books, especially The Cat in the Hat,
    weaving these colorful influences into imaginative role‑play.
  travel: Carlos Anguiano has explored the San Diego Zoo, built sandcastles at the beach in Santa Monica, and taken a family road trip to the Grand Canyon, and now dreams of seeing the Eiffel Tower in Paris
    on a future vacation.
  culinary: Carlos Anguiano devours creamy mac and cheese made with sharp cheddar, enjoys dipping chicken nuggets in tangy ketchup, and insists on crunchy apple slices with a sprinkle of cinnamon for snack
    time.
  core: Carlos Anguiano blends boundless curiosity with a tidy playroom, saves coins in a bright piggy bank, keeps eczema moisturized only when reminded, cheers on the Seahawks, sings Frozen tunes, dreams
    of Paris, and refuses broccoli at dinner.
background:
  cultural: Carlos grows up in a bilingual Mexican‑American household, speaking Spanish at home and English at school. He celebrates Día de los Muertos with family altars, enjoys traditional foods like
    tacos and tamales, and participates in community festivals that blend Mexican customs with local Midwestern traditions, reinforcing values of family, harmony, and respect.
