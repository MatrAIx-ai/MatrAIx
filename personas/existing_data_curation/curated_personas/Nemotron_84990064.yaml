personas:
  professional: Cherrie Dillard, a 35-year-old network and systems administrator, combines meticulous troubleshooting of Cisco and Windows/Linux environments, PowerShell and Python automation, and clear
    documentation with a relaxed, flexible planning style, leveraging their collaborative nature to mentor junior staff and pursue CCNP and AWS Solutions Architect certifications for a future senior hybrid-cloud
    architect role.
  sports: Cherrie Dillard stays active by dancing Afro-beat and swing at the Rochester Community Dance Center, joining a Saturday morning recreational soccer league, cheering for the Buffalo Bills, Buffalo
    Sabres, and Rochester Red Wings, and balancing structured workout plans with a flexible, spontaneous approach to fitness that reflects their love of group activities and occasional neglect of routine
    cardio sessions.
  arts: Cherrie Dillard nurtures artistic curiosity by curating movie nights featuring timeless films like 'Casablanca', 'The Godfather', and '12 Angry Men', listening to jazz legends such as Louis Armstrong
    and contemporary soul artists like H.E.R., hosting board-game evenings with titles ranging from Catan to Pandemic, devouring mystery novels by Agatha Christie, and streaming cooperative video games
    with friends, all of which fuel their creative outlook and social bonding.
  travel: Cherrie Dillard prefers relaxed, spur-of-the-moment weekend getaways to nearby destinations like the Finger Lakes and the Adirondack Trail, occasionally planning longer vacations to cities such
    as New Orleans for its culinary scene and Reykjavik for its Northern Lights, balancing a modest travel budget with a love for cultural immersion and a tendency to over-pack itineraries due to lingering
    worry about missing out.
  culinary: Cherrie Dillard showcases a confident kitchen presence by simmering collard greens with smoked turkey, coaxing jambalaya together with Andouille sausage, bell peppers, and Cajun spices, and
    baking sweet potato pie crowned with a flaky crust, often pairing these soulful dishes with homemade cornbread and a chilled glass of sweet tea while sharing recipes with friends.
  core: Cherrie Dillard balances a methodical tech mindset with a love for spontaneous community dance, a lingering anxiety that fuels meticulous budgeting yet sometimes leads to missed appointments, and
    a habit of hoarding board-game manuals for future game nights.
background:
  cultural: Cherrie's cultural identity is rooted in the African‑American community of Rochester, where she grew up attending a historic Black church that emphasized music, fellowship, and social justice.
    Her family places a strong emphasis on storytelling, soul food, and preserving traditions like weekly gospel sing‑alongs. She participates in local Black cultural festivals, supports the Rochester NAACP
    chapter, and mentors youth through the Black Girls Code initiative. These experiences shape her values of cooperation, community uplift, and a resilient optimism that she brings to both her personal
    and professional life.
attributes:
  skills: '[''Network troubleshooting'', ''Server administration (Windows/Linux)'', ''Cisco routing and switching'', ''Firewall configuration and management'', ''Active Directory and identity services'',
