    communication'']'
  hobbies: '[''Afro‑beat dance classes'', ''Board game meet‑ups'', ''Volunteer logistics at Rochester Food Bank'', ''Cooking soul‑food for friends'', ''Hosting movie nights'', ''Reading mystery novels'',
    ''Streaming co‑op multiplayer video games'', ''Attending local jazz concerts'', ''Participating in community tech meetups'']'
  career_goals: Cherrie aims to earn CCNP and AWS Solutions Architect certifications within the next two years, transition into a senior systems engineer role overseeing a small team, and eventually move
    into a hybrid cloud‑architect position that allows her to design resilient infrastructure while mentoring junior staff, especially from underrepresented backgrounds. She also hopes to advocate for inclusive
    hiring practices in IT and create a supportive work environment that balances high performance with wellbeing.
