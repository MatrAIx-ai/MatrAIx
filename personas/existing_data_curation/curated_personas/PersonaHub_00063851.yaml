persona_description: A clinician or educator who is responsible for selecting appropriate assistive technology tools for students with learning disabilities or other special needs. The persona is knowledgeable
  in the field of assistive technology and has experience in identifying and selecting tools that meet the specific learning needs of the students. They are also familiar with the Assistive Technology Tool
  Selection Protocol and the tools and programs that are available for selection. The persona is responsible for using the SETT framework and the Assistive Technology Map to identify the appropriate assistive
  technology tool and program for each student.
