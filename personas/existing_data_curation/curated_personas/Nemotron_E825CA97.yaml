  hobbies: '[''Gardening'', ''Knitting'', ''Reading Historical Fiction'', ''Birdwatching'', ''Cooking Southern Cuisine'', ''Community Volunteering'', ''Church Potlucks'', ''Classic Country Music'', ''Walking
