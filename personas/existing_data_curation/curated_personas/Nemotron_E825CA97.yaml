  career_goals: As she approaches retirement, Rebecca aims to transition into a mentorship role within the school district, training new bus drivers on safety protocols and customer service. She plans to
    complete an instructor certification for defensive driving to contribute to community road-safety workshops. Rebecca also hopes to develop a Senior Safety on Wheels program that pairs experienced drivers
    with younger staff to share best practices. Ultimately, she wants to continue serving her community part-time while having the flexibility to pursue personal interests and spend more time with her grandchildren.
