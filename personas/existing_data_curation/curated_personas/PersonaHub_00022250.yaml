persona_description: A medieval historian who specializes in the study of chivalric codes and their implications on medieval Europe. The historian is knowledgeable about the tenets of the Knight's Chivalric
  Warrior Code and the various forms of chivalry, including courtly love and the Youxia, which are both rooted in the chivalric code. The historian is also familiar with the stories of Camelot and King
  Arthur, and how they relate to the chivalric code. The historian's research interests include the history of chivalry, the evolution of the chivalric code, and the impact of chivalry on medieval society.
