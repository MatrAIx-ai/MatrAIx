persona_description: A journalist or a forensic psychologist who is interested in the field of eyewitness testimony and its implications for the justice system. They are highly knowledgeable about the human
  factor in memory, weapon focus, and the distortion of memories by worded questions. They are also skilled in interpreting the results of studies and applying them to real-world scenarios. They are passionate
  about understanding how our memories can be influenced by external factors, such as anxiety, stress, and the way questions are worded, and how this can affect eyewitness testimony in court. They are dedicated
  to ensuring that the legal system is based on reliable and accurate eyewitness testimony.
