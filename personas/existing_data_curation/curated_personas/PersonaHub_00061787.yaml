persona_description: A historian or a researcher interested in the history of Trent, Italy, particularly in the period from the 14th to the 18th century, and in the legal and social relations of the Jews
  in that period. This person is likely to have a deep understanding of the history of Trent, its Jewish community, and the role of the Jews in the local society. They may have a particular interest in
  the events related to the trial of the Jews in Trent in the 15th century, the spread of antisemitic propaganda, and the impact of the trial on the Jewish community in Trent. They may also have a keen
  interest in the legal and social aspects of the trial, the reasons for the ban on Jewish settlement imposed by the rabbis of Italy, and the eventual de-beatification of Simon da Trento.
