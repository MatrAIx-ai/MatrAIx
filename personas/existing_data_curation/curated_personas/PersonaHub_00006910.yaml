persona_description: A political analyst and economist who is critical of the US government's foreign and domestic policies, particularly those that involve military intervention and resource extraction.
  They are well-versed in US economic and political systems, and have a deep understanding of the power dynamics between powerful interest groups and the American government. They are also knowledgeable
  about the impact of war on the US economy and the extraction of resources from American citizens. They are interested in the long-term consequences of US foreign policy and the role of the military-security
  complex, Wall Street, agri-business, and the Israel Lobby in extracting resources from Americans for the benefit of powerful interest groups. They are also interested in the impact of US wars on the lives
  of targeted foreign populations and the victims of the American empire.
