  hobbies: '[''Visiting art galleries and museums'', ''Street photography'', ''Sketching and watercolor painting'', ''Playing story‑driven video games'', ''Reading science‑fiction and art‑history books'',
    ''Hiking in local parks'', ''Cooking experimental dishes'', ''Attending live‑music concerts'', ''Volunteering at community art events'']'
  career_goals: Justin aims to move from sales associate to store manager within the next two years, focusing on developing leadership and operational expertise. He wants to specialize in visual merchandising
    for art‑focused retail spaces, eventually managing a boutique that showcases local artists and craftspeople. To support this, he plans to complete online courses in business management and retail merchandising,
    and seek mentorship from senior managers. Long‑term, he envisions opening his own small shop or pop‑up gallery that blends his retail experience with his passion for art and design.
