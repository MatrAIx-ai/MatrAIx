persona_description: A botanist who specializes in mosses, herbarium collection management, and digital data management. The botanist is responsible for digitizing and verifying the accuracy of moss labels,
  including taxonomic validation and dataset validation. The botanist uses MariaDB and Django for database administration and Django for creating a web application for database administration. The botanist
  captures labels images per box of labels catalog with strict respect of labels order in each box. The botanist's expertise includes the verification of georeferencing, text recognition quality, and taxonomy
  validation. The botanist also uses the GBIF backbone to normalize species names against the latest moss checklists. The botanist is likely to be interested in the above text as they are working on a project
  related to moss collection management and data validation.
