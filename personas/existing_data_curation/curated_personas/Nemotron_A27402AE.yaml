  hobbies: '[''Reading mystery/adventure books'', ''Drawing comics'', ''LEGO building'', ''Nature walks'', ''Pet grooming and play'', ''Jigsaw puzzles'', ''Small‑group art workshops'']'
  career_goals: Andrea dreams of a future where she can help living things directly. She is fascinated by animals and imagines becoming a veterinarian, drawn to the structured yet compassionate nature of
    the profession. She also expresses interest in science experiments that show immediate results, suggesting a possible ambition to work in a laboratory or as a pediatric nurse where she can combine practical
    problem‑solving with caring for others.
