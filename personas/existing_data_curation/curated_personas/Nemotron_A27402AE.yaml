personas:
  professional: Andrea Curry, a budding junior detective and LEGO architect, channels their love for structured problem‑solving and imaginative building into solving mystery puzzles and constructing intricate
    LEGO cities, and they often spend afternoons arranging bricks by color to satisfy their need for order.
  sports: Andrea Curry enjoys playing forward for the Willow Creek Tigers youth soccer club, follows the River City Runners baseball team, and practices gentle yoga at the community center on weekends,
    preferring low‑key, structured activity over large‑scale events, and they feel most energized after a calm session.
  arts: Andrea Curry draws comic‑style panels inspired by Stan Lee and Raina Telgemeier, delights in watching Pixar’s Inside Out and listening to Disney soundtracks, and regularly shares their creations
    at a small‑group art workshop, blending imagination with a love of structure.
  travel: Andrea Curry loves family road trips to nearby Redwood National Park, has explored the historic monuments of Washington, D.C., and dreams of visiting Kyoto’s bamboo groves and the Louvre in Paris,
    favoring well‑planned nature hikes but occasionally forgetting the packing checklist, and they always keep a sketchbook handy for spontaneous drawings.
  culinary: Andrea Curry enjoys crafting peanut butter‑banana sandwiches, assembling homemade pepperoni pizza with mozzarella, basil and oregano, and baking chocolate chip cookies that sometimes end up
    with extra sprinkles, showing a beginner’s confidence in the kitchen while often over‑seasoning to satisfy their palate, and they delight in tasting each creation before sharing.
  core: Andrea Curry is a quietly curious 10‑year‑old who blends a love for structured LEGO builds with the thrill of mystery novels, thriving on small‑group creativity and a practical yet flexible routine,
    though they often misplace homework when immersed in a puzzle.
background:
  cultural: Andrea grows up in a predominantly White, Midwestern community in Fort Wayne, Indiana. Her family embraces typical Midwestern values such as friendliness, community involvement, and modesty.
    Local traditions like home‑cooked family meals, participation in school events, and celebrations of holidays such as Thanksgiving and Independence Day shape her upbringing. The regional emphasis on
    practicality and self‑reliance reinforces her preference for structured routines while allowing the flexibility she enjoys in everyday life.
attributes:
  skills: '[''Reading comprehension (4th‑grade level)'', ''Basic arithmetic'', ''Puzzle and LEGO building'', ''Elementary Scratch programming'', ''Pet care (cat and dog)'', ''Following and adapting personal
