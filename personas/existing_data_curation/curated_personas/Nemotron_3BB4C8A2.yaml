personas:
  professional: An aspiring visual artist and freelance photographer, James Morse blends their knack for digital composition, community event planning, and storytelling into curated gallery shows while
    they balance a community‑college visual arts program and a modest side business that offers event photography.
  sports: James Morse enjoys weekend hikes in the Blue Ridge foothills, participates in a local ultimate frisbee league, tracks the Carolina Panthers and Asheville Tourists for occasional game‑day outings,
    and they occasionally squeeze in a jog to stay fit while preferring small‑group activities over large stadium crowds.
  arts: James Morse frequents Greenville’s art districts, sketches street murals, curates indie‑rock playlists featuring Arctic Monkeys and Tame Impala while absorbing the work of Ansel Adams, and they
    volunteer to help local nonprofits stage pop‑up exhibitions that celebrate both regional heritage and avant‑garde concepts.
  travel: James Morse prefers spontaneous road trips to nearby Asheville and Nashville, uses a blend of budget planning and last‑minute Airbnb bookings, dreams of exploring the desert art scene in Santa Fe,
    and they balance a love for nature with family expectations to keep travel relatively low‑cost.
  culinary: James Morse relishes Southern staples like shrimp and grits and pimento cheese, experiments with vegan twists on traditional dishes using fresh peaches and kale, cooks a decent batch of homemade
    biscuits on weekends, and they document every meal with a photo on their blog, though they sometimes over‑season their sauces.
  core: James Morse, a 21‑year‑old visual‑arts enthusiast, weaves Southern hospitality, indie music, and trail photography into a life of modest entrepreneurship, occasional budget splurges, and they habitually
    misplace coffee mugs before finding them in their backpack.
background:
  cultural: James grew up in a traditional Southern white family in Greenville, SC, where community gatherings, local church involvement, and Southern hospitality were part of daily life. While he values
    these roots—such as appreciation for regional cuisine, family storytelling, and respect for nature—he also embraces a progressive curiosity that leads him to seek unconventional ideas through art, literature,
    and technology. This blend of cultural heritage and open‑minded exploration shapes his outlook and personal identity.
