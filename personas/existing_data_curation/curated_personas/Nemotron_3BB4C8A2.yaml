  hobbies: '[''visiting art galleries'', ''digital photography'', ''hiking in the Blue Ridge foothills'', ''sketching'', ''playing acoustic guitar'', ''listening to indie/alternative music'', ''reading
    science‑fiction'', ''writing a personal blog on art and tech'', ''attending small creative workshops'']'
  career_goals: James aims to enroll in a community‑college program in visual arts or graphic design within the next year, building a portfolio that blends photography, digital illustration, and storytelling.
    He aspires to secure a freelance or part‑time role assisting local galleries or cultural nonprofits, eventually moving toward a curatorial assistant position where he can merge his love of art, new
    ideas, and community engagement. Parallel to his creative ambitions, he wants to develop a modest side business offering photography services for events and personal branding.
