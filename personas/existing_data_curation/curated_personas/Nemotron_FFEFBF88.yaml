personas:
  professional: Sheila Holland, a retired STEM professional turned community science‑arts liaison, leverages her data‑analysis expertise, meticulous project‑management style, and love of visual storytelling
    to design engaging STEM workshops for middle‑school girls and to serve as a senior docent at the Greensboro Science Center.
  sports: Sheila Holland stays active by walking her garden paths five times a week, participates in the Greensboro Senior Walking Club, attends a senior yoga class at the local community center, and faithfully
    cheers for the Greensboro Grasshoppers baseball team and the Carolina Panthers during the fall season.
  arts: Sheila Holland immerses herself in watercolor painting inspired by native flora, draws inspiration from the works of Georgia O’Keeffe and Claude Monet, enjoys the folk songs of James Taylor, attends
    gallery openings featuring emerging artist Maya Lin, and volunteers as a docent at the Greensboro Museum of Art, often quoting Bob Ross’s ‘happy little accidents’.
  travel: Sheila Holland’s travel style combines detailed itineraries and budget spreadsheets, having visited the Metropolitan Museum of Art in New York, the Getty Center in Los Angeles, and the Asheville
    Art Museum, and she dreams of exploring the Musée d’Orsay in Paris and the Uffizi Gallery in Florence next summer.
  culinary: Sheila Holland, an adventurous home cook, regularly prepares Thai green curry with fresh basil and lemongrass, Ethiopian injera using heirloom teff flour, delicate sushi rolls, and classic Italian
    risotto, while meticulously plating each dish like a miniature watercolor and incorporating heirloom tomatoes from her garden.
  core: Sheila Holland blends scientific precision with artistic flair, organizes community projects with clockwork efficiency, and cannot resist a nightly ritual of decluttering a drawer before bedtime,
    even if it means postponing a dinner out.
background:
  cultural: Sheila’s cultural background is shaped by her upbringing as a White American in the American South. Born in the 1950s in a small North Carolina town, she was raised in a family that valued community
    service, church participation, and a strong work ethic inherited from English and German ancestors who settled the region in the late 1800s. Growing up during the civil‑rights era and the women's educational
    revolution, she pursued a STEM degree at a time when few women of her generation did so, an experience that fostered both independence and a commitment to social equity. While she cherishes Southern
    traditions such as seasonal festivals, regional cuisine, and storytelling, her lifelong curiosity has broadened her perspective through travel, museum visits, and engagement with diverse artistic and
    scientific communities across the country.
