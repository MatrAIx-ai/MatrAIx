  hobbies: '[''Watercolor painting'', ''Visiting art museums and galleries'', ''Birdwatching'', ''Community gardening'', ''Reading historical fiction and popular science'', ''Leading library book-discussion
    groups'', ''Volunteering in community theatre set design'', ''Cooking international cuisine'', ''Attending university public lectures'', ''Home organization projects'']'
  career_goals: Although retired, Sheila aspires to use her expertise to inspire the next generation and enrich her community. She aims to lead STEM outreach workshops for middle-school girls in Greensboro,
    mentoring participants through hands-on projects and career guidance. She seeks a senior docent role at the Greensboro Science Center, where she can blend scientific insight with artistic storytelling
    in exhibit tours. Sheila also plans to author a regional history book that highlights the intersection of local art, science, and personal narratives. Additionally, she hopes to complete a series of
    watercolor paintings for a community gallery show and to travel to major art museums to bring new ideas back home. Her broader ambition is to leave a lasting legacy of organized, compassionate service
    that fuels curiosity.
