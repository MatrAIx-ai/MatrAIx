  career_goals: Julio aims to become a full-stack engineer who builds technology with a social impact. In the next three years he wants to deepen his expertise in cloud-native architectures (AWS or GCP)
    and contribute to open-source projects that support non-profit organisations. He envisions a role where he can lead small, interdisciplinary teams, blending his coding skills with his eye for design
    to create intuitive, inclusive digital products. Ultimately, he hopes to launch or join a startup that leverages data and interactive media to promote community arts, education, or mental-health resources,
    allowing him to align his career with his compassion for helping others while preserving the flexibility he values.
