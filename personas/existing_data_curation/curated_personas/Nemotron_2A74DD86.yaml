  hobbies: '[''Crossword puzzles and Sudoku'', ''Cooking Mexican and fusion cuisine'', ''Gardening (vegetable and herb garden)'', ''Walking/hiking in Galena and surrounding nature trails'', ''Reading non-fiction/self-improvement
    books'', ''Small book club participation'', ''Volunteer administrative support for community events'']'
  career_goals: Maria aims to advance from her current administrative assistant role to an office manager or senior administrative coordinator position within the next three to five years. She plans to
    earn the Certified Administrative Professional (CAP) credential and complete an associate degree in business administration to bolster her qualifications. In the longer term, she envisions launching
    a small consulting firm that helps other Midwest small businesses improve their office efficiency and bilingual communication practices. Alongside professional advancement, she is committed to building
    stronger emotional resilience through stress-management training and mindfulness practice, ensuring she can sustain high performance without compromising her well-being.
