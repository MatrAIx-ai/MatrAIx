personas:
  professional: Maria Solano is an organized administrative specialist who leverages bilingual fluency and Excel wizardry to streamline executive workflows, while their critical eye constantly spots inefficiencies
    and their curiosity drives continuous process improvements.
  sports: Maria Solano enjoys solitary walks along Galena's historic streets and the Apple River Trail, occasionally joining a local hiking group for weekend treks, and they are a dedicated fan of the Chicago
    Cubs, following games on Sundays while maintaining a modest home fitness routine of bodyweight exercises.
  arts: Maria Solano engages with the arts through a weekly non-fiction book club, a love for contemporary folk music such as Lila Downs, and regular visits to the Galena History Museum's rotating exhibitions,
    finding inspiration for both their culinary experiments and office creativity.
  travel: Maria Solano prefers carefully planned road trips that blend natural scenery and cultural experiences, such as a weekend adventure to Badlands National Park followed by a culinary tour of a Gulf
    coast town, budgeting each journey in a spreadsheet and traveling with a small circle of close friends.
  culinary: Maria Solano masterfully prepares classic tamales and mole, infusing them with Midwestern twists like roasted pumpkin and locally sourced apples, while cultivating fresh salsa from garden-grown
    tomatoes, chilies, and cilantro, and occasionally indulges in a slice of Chicago deep-dish pizza for comfort.
  core: Maria Solano is a detail-driven, bilingual office strategist who pairs a love for structured puzzles with culturally blended cooking, all while battling anxiety that fuels meticulous planning and
    occasional self-criticism.
background:
  cultural: Maria was born to Mexican immigrant parents and grew up in a bilingual household that blended Mexican traditions with Midwestern American life. She celebrates Día de los Muertos and Mexican
    holidays, prepares family recipes passed down through generations, and maintains close ties with the local Mexican community in nearby cities. At the same time, she embraces Illinois customs—such as
    participating in county fairs and supporting local farmers’ markets—reflecting the work ethic and community spirit of the Midwest. Her Catholic upbringing influences her values of family loyalty and
    respect for elders, while her day-to-day life in Galena has taught her the practicality and modesty characteristic of small-town American culture.
