personas:
  professional: Sharon Diaz is a curious preschool explorer who leads small group projects in her classroom, turning everyday chores into organized treasure hunts while still leaving room for spontaneous
    play, showcasing their blend of reliability, open‑minded curiosity, and a healthy dose of skepticism that prompts them to double‑check teammates’ plans before diving in.
  sports: Sharon Diaz darts around the local Little Kickers Soccer Club’s mini‑field, emulating the New York Yankees’ shortstop with a plastic glove, idolizes Los Angeles Lakers star LeBron James during
    TV highlight reels, and thrives on competitive drill races while cheering loudly for teammates.
  arts: Sharon Diaz delights in splashing colors on large Crayola paper, re‑creating scenes from Van Gogh’s Starry Night with crayons, sings along to Disney’s Frozen soundtrack, and can recite Dr. Seuss’s
    Green Eggs and Ham, reflecting their love for varied artistic experiences and unconventional imagination.
  travel: Sharon Diaz has already collected stickers from trips to the San Diego Zoo, the sandy shores of Clearwater Beach, a family weekend at Disney World in Orlando, and eagerly plans a future adventure
    to the Grand Canyon, preferring short drives over long flights and always insisting on a window seat for the best view.
  culinary: Sharon Diaz prefers the cheesy stretch of pizza, the crunchy bite of chicken nuggets, the buttery warmth of mac and cheese, and often helps stir peanut butter into a quick banana sandwich, while
    showing a petulant refusal of broccoli and anchovies.
  core: Sharon Diaz is an energetic, art‑loving four‑year‑old who turns everyday chores into organized games, saves allowance with fierce competitiveness, battles mild allergies with routine care, and thrills
    in playful sports and colorful creativity.
background:
  cultural: Sharon grows up in a close‑knit Black family in rural Taylorsville, Mississippi, where community and faith play central roles. Weekly church services, family potlucks, and seasonal festivals
    expose her to gospel choirs, Southern blues, and storytelling traditions passed down from grandparents. Her parents and elders celebrate Southern cuisine, oral histories, and a strong sense of mutual
    support, shaping her appreciation for music, art, and collective gatherings while reinforcing values of resilience and respect.
attributes:
  skills: '[''drawing simple shapes'', ''coloring'', ''stacking blocks'', ''singing nursery rhymes'', ''basic counting (1‑10)'', ''story retelling'', ''sharing and turn‑taking'', ''organizing toys'']'
  hobbies: '[''crayon drawing'', ''finger painting'', ''dancing to gospel and blues music'', ''hide‑and‑seek'', ''picture‑book storytime'', ''backyard exploration'', ''building with blocks'', ''asking why?
    about the world'']'
  career_goals: She loves imagining future roles where she can create and help others, often saying she wants to become an artist who paints big pictures, a teacher who reads stories to friends, or a veterinarian
    who cares for animals. Her competitive streak encourages her to aim to be the best at making new friends and leading group games.
