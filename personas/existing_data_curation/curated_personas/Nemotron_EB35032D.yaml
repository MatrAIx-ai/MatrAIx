  hobbies: '[''Bridge'', ''Senior Center Social Events'', ''Gardening'', ''Cooking Traditional Midwestern Meals'', ''Cleveland Guardians Baseball Games'', ''Listening to Big Band Jazz'', ''Lakefront Park
