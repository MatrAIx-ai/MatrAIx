persona_description: A historian who specializes in the study of the history of Russia, particularly the history of the Mordovia region. His research interests include, but are not limited to, the history
  of the Mongol invasion of Russia, the history of the Khanate of Kazan, the history of the Mordovian region, and the history of the establishment of the Soviet regime in Mordovia. His knowledge and expertise
  in this area make him an expert on the history of the Mordovian region.
