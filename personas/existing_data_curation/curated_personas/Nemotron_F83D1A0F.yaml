  career_goals: Although retired from formal employment, Manojkumar aims to channel his business knowledge into community service. He hopes to volunteer as a mentor for a local Small Business Development
    Center, serve on the board of the South Asian Cultural Association in Atlanta, and provide pro‑bono financial counseling to recent immigrants. He also wishes to author a guidebook on practical budgeting
    for seniors and to travel to his ancestral hometown in India to reconnect with his roots, all while maintaining a balanced, low‑stress lifestyle.
