personas:
  professional: Leatrice Hack, a 12-year-old aspiring youth tech creator, merges meticulous organization with imaginative flair by designing Scratch games, assembling intricate LEGO models, and volunteering
    at the local animal shelter, where they practice systematic problem‑solving while caring for rescued pets.
  sports: Leatrice Hack enjoys weekend birdwatching walks in nearby parks, follows the local junior soccer league’s Springfield Strikers, and cheers for the hometown baseball team, the River City Rapids,
    while occasionally attending after‑school gymnastics classes for flexibility.
  arts: Leatrice Hack spends afternoons drawing detailed wildlife sketches, listening to classical piano pieces by Ludovico Einaudi, and immerses in fantasy worlds through J.K. Rowling’s Harry Potter series
    and Rick Riordan’s Percy Jackson, which shape their creative storytelling in both art and game design.
  travel: Leatrice Hack loves short family road trips to national parks like Great Smoky Mountains, dreams of visiting the Warner Bros. Studio Tour in London to see the Harry Potter sets, and prefers organized
    itineraries that balance nature hikes with museum stops, all while staying within a modest family budget.
  culinary: Leatrice Hack enjoys baking chocolate chip cookies with the family, experiments with simple recipes like banana muffins and animal‑shaped pancake art, and delights in tasting fresh strawberries,
    yet occasionally forgets to clean up the kitchen, leaving a trail of flour.
  core: Leatrice Hack is a detail‑oriented 12‑year‑old who blends structured creativity—building LEGO worlds, coding Scratch games, and caring for animals—while navigating typical teen quirks like pocket‑money
    splurges and occasional kitchen messes.
background:
  cultural: Leatrice was raised in a middle‑class white family in Yonkers, New York, where she has been exposed to the diverse cultural fabric of Westchester County. Her family emphasizes education, community
    service, and participation in local events such as library storytimes, neighborhood clean‑ups, and school multicultural celebrations. She enjoys typical American holidays while also appreciating the
    variety of traditions shared by her peers, fostering a respectful and inclusive outlook.
