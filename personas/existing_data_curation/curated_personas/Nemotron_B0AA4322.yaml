personas:
  professional: An aspiring young coder‑artist, Charles Visco blends their love for drawing cartoons with Scratch animations, organizes weekend LEGO build sessions for their friends, and volunteers at the
    community animal shelter, demonstrating a reliable yet flexible approach to their budding projects.
  sports: A spirited soccer enthusiast, Charles Visco plays forward for the Lawrence County Youth Soccer League, cheerfully dons mismatched socks for luck, follows the local professional football and hockey
    teams on game days, and spends Saturday mornings hiking local trails with the community nature club, balancing competitive play with a love for wildlife observation.
  arts: A vibrant budding artist, Charles Visco spends afternoons sketching cartoon characters reminiscent of classic Looney Tunes, paints serene countryside scenes inspired by Thomas Kinkade, tickles the
    piano keys during church gatherings with hymns and folk tunes from Bill Monroe, and eagerly attends art workshops at the county library where they experiment with watercolor techniques, often finishing
    projects with a signature swirl of glitter.
  travel: A curious explorer, Charles Visco has taken family road trips to the Great Smoky Mountains for weekend camping, visited the Nashville music scene to hear live bluegrass, dreams of experiencing
    Disney World’s Magic Kingdom, and meticulously plans trips using map stickers and a notebook, though they sometimes get restless on long drives and demand frequent snack stops.
  culinary: A budding home chef, Charles Visco enjoys helping prepare classic Southern comfort foods like biscuits with honey butter, chicken fried steak with mashed potatoes, and apple pie with a flaky
    crust, favors the sweet tang of homemade lemonade, and, despite a growing skill set, often over‑savors the spaghetti sauce with too much salt.
  core: Charles Visco is a curious, compassionate ten‑year‑old who merges cartoon drawing with Scratch coding, scores goals on the soccer field, saves diligently while indulging in occasional candy splurges,
    and balances late‑night LEGO builds with a love for nature hikes.
background:
  cultural: Charles grows up in Lawrenceburg, a small town in Lawrence County, Tennessee, where Southern hospitality, close‑knit community ties, and a strong sense of tradition shape his worldview. His
    family has deep roots in the area, with generations involved in local churches, school activities, and community events such as county fairs and craft festivals. The region’s appreciation for folk art,
    country and bluegrass music, and outdoor recreation influences his artistic interests and love for nature. He regularly participates in church youth groups and school programs that emphasize teamwork,
    service, and respect for local heritage.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Creative drawing and painting'', ''Storytelling through visual media'', ''Basic programming with Scratch'', ''Team collaboration and group
