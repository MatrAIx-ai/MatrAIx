  hobbies: '[''Drawing and painting'', ''Building LEGO models'', ''Coding simple games with Scratch'', ''Playing soccer'', ''Hiking and nature exploration'', ''Reading adventure and science‑fiction books'',
    ''Volunteering at the local animal shelter'', ''Playing piano in church'', ''Attending art workshops at the library'']'
  career_goals: Charles dreams of merging his love of art with his desire to help others by becoming a community educator or museum curator who designs interactive exhibitions that spark curiosity in children.
    In the near term, he wants to improve his graphic‑design and robotics skills to create fun learning tools, and he hopes to volunteer in environmental projects that protect the natural beauty of his
    hometown while sharing creative experiences with peers.
