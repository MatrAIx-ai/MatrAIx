  career_goals: Fairuz aims to attain a supervisory foreman role within the next two years, leveraging her extensive field experience to mentor newer operators. She plans to obtain advanced certifications
    in underground utility drilling and safety management, and hopes to eventually develop a community‑focused consulting service that assists local organizations with sustainable earth‑works and garden
    projects. Her long‑term ambition includes establishing an apprenticeship program that provides training opportunities for women and immigrants entering the construction trades.
