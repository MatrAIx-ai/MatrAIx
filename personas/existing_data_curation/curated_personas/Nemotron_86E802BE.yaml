personas:
  professional: Clarence Colston, an 11‑year‑old budding game developer and varsity‑level school basketball player, blends a knack for coding simple Scratch and Roblox games with a competitive drive on
    the court, thriving on the structure of practice schedules while relishing the spotlight of showcasing both digital creations and athletic moves to classmates; they often rehearse explanations of their
    code to peers as if delivering a halftime speech.
  sports: Clarence Colston, a committed member of the local youth basketball club, spends afternoons shooting hoops at the neighborhood park and fervently follows the Los Angeles Lakers and Chicago Bulls,
    debating game strategies with teammates and using structured drills to channel their competitive nature while staying fit; they often organize pick‑up games to satisfy their sociable energy.
  arts: Clarence Colston dives into graphic novels like "Bone" and "Ms. Marvel", syncs to hip‑hop beats from Kendrick Lamar and R&B vibes of Beyoncé, and shines in the church youth choir where their talkative
    confidence fuels passionate performances, making art both a personal outlet and a social stage; they love discussing plot twists with friends after school.
  travel: Clarence Colston dreams of visiting the interactive science exhibits at the Smithsonian in Washington, D.C., relishes family trips to Orlando’s theme parks, and prefers meticulously planned weekend
    getaways that balance adventure with the comfort of familiar friends, often drafting itineraries on Scratch‑styled flowcharts; they frequently ask parents to compare travel costs before confirming a
    destination.
  culinary: Clarence Colston favors pepperoni pizza, chicken nuggets, and homemade strawberry smoothies, occasionally experiments with making nachos topped with jalapeños and cheddar, yet their cooking
    skill caps at microwaving mac and cheese and assembling simple salads, showing a practical yet adventurous palate; they sometimes over‑season their dishes when excited after a big win on the court.
  core: Clarence Colston is an energetic, competitive 11‑year‑old who juggles coding, basketball, and choir while constantly budgeting stress and obsessively tracking every win, loss, and allowance cent,
    and they tend to worry about falling behind.
background:
  cultural: Clarence grew up in a close‑knit African‑American family on the east side of Baltimore. His upbringing is steeped in the city’s rich Black heritage, with regular attendance at a historic Baptist
    church that emphasizes community service and gospel music. Family gatherings celebrate traditions like Juneteenth and soul‑food meals, and his grandparents often share stories of the civil‑rights movement
    in Maryland. He participates in local programs such as the Baltimore City Youth Basketball League and the community center’s after‑school tutoring, which reinforce a sense of pride, resilience, and
    collective responsibility within his cultural community.
attributes:
  skills: '["Organizing school projects and schedules", "Public speaking and presentation", "Basic coding in Scratch", "Video editing for school assignments", "Basketball fundamentals and team tactics",
    "Chess strategy and quick decision-making", "Class monitor responsibilities"]'
  hobbies: '["Basketball (practice and team play)", "Coding and game creation with Scratch and Roblox", "Watching and analyzing sports highlights", "Reading graphic novels", "Listening to hip-hop and R&B
    music", "Singing in the church youth choir"]'
  career_goals: Clarence dreams of turning his love for basketball into a professional career, hoping to earn a scholarship to play at a college and eventually join a major league team. He also envisions
    using his communication strengths to become a sports broadcaster or community youth mentor, where he can inspire other kids in Baltimore. In the longer term, he wants to work with local youth programs
    that combine athletics with academic support, providing structured after-school activities that help kids stay focused and succeed.
