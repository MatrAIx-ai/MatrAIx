  career_goals: Carem aspires to become an elementary school teacher, motivated by her love for helping classmates and creating structured, nurturing learning environments. She envisions designing lesson
    plans that balance clear routines with engaging activities, and she hopes to support children’s emotional wellbeing, drawing on her own sensitivity. She also expresses interest in caring professions
    such as pediatric nursing or veterinary work, reflecting her desire to help others and work with animals in a stable, compassionate setting.
