personas:
  professional: Rebecca Hill is a 43‑year‑old community arts coordinator who leverages their knack for rapid rapport building and visual‑art insight to launch pop‑up markets and lead regional festivals,
    often thriving on the excitement of spontaneous planning while wrestling with tight deadlines and a competitive edge that pushes them to secure high‑profile sponsors.
  sports: Rebecca Hill enjoys kayaking through bayous with the local Houma Paddle Club, follows the New Orleans Saints and LSU Tigers football teams with fervor, and attends occasional New Orleans Pelicans
    games, preferring unstructured, nature‑based activity over formal gym routines.
  arts: Rebecca Hill immerses themselves in the Gulf Coast art scene by curating neighborhood exhibitions, photographing events with a mobile‑app lens, and frequenting live performances by blues legend
    Buddy Guy and Zydeco icon Clifton Chenier, while also sharpening improvisational skills in community‑theater workshops.
  travel: Rebecca Hill favors spontaneous weekend road trips, often heading to historic sites like Avery Island and Grand Isle or exploring cultural hubs such as Savannah, Georgia, balancing a modest travel
    budget with the desire for off‑the‑beaten‑path experiences and occasional splurges on boutique B&B stays.
  culinary: Rebecca Hill expertly prepares traditional gumbo, jambalaya, and étouffée using Andouille sausage, rice, shrimp, and a dark roux, delighting friends at potlucks while experimenting with fresh
    okra and bold spices, yet they sometimes over‑season dishes in a quest for strong flavor and occasionally rely on take‑out when time runs short.
  core: Rebecca Hill is a 43‑year‑old community‑driven art enthusiast whose competitive spark fuels spontaneous festival organization, impromptu road trips, and late‑night gumbo cooking, all while habitually
    misplacing their planner and racing against deadlines.
background:
  cultural: 'Rebecca grew up in Houma, Louisiana, immersed in the Southern Gulf Coast lifestyle. Though she identifies as white, her family and community celebrations centered around Cajun and Creole traditions:
    Mardi Gras parades, communal seafood feasts, and zydeco music. She was raised in a close‑knit, church‑oriented environment that emphasized hospitality, storytelling, and a strong sense of place tied
    to the bayous, marshlands, and fishing culture of Terrebonne Parish. The region’s bilingual (English‑French) heritage subtly shaped her vocabulary and culinary tastes, fostering an appreciation for
    the diversity of local customs while maintaining her own personal identity.'
attributes:
  skills: '[''Interpersonal communication'', ''Event coordination'', ''Art critique and informal curation'', ''Photography'', ''Cajun cooking'', ''Social media content creation'', ''Facilitation of group
    brainstorming'', ''Networking within local arts community'', ''Adaptive problem solving'']'
  hobbies: '[''Visiting art galleries and museums'', ''Zydeco dancing'', ''Cajun cooking'', ''Kayaking and birdwatching in bayous'', ''Community theater improvisation'', ''Reading folklore and mythology'',
    ''Exploring flea markets'', ''Spontaneous road trips'', ''Interior decorating'', ''Live music festivals'']'
  career_goals: Driven by her curiosity and love for the arts, Rebecca aims to complete an associate degree in art history or cultural studies within the next two years. She envisions launching a pop‑up
    art market and community studio that highlights emerging local artists and provides a flexible, collaborative space for workshops. In the longer term, she hopes to become a freelance cultural tour guide
    and consultant for the Terrebonne Parish museum, curating experiential tours that blend art, history, and cuisine. Her competitive streak pushes her to become a recognized organizer of regional festivals,
    leveraging her network to attract sponsors and media attention while maintaining a schedule that allows for spontaneous creative projects.
