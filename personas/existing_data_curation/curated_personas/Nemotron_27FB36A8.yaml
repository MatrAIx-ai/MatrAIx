  career_goals: Joseph is fascinated by how things are built and maintained, and he often talks about designing bridges or playgrounds. He dreams of becoming a civil engineer or architect, seeing these
    careers as ways to combine his love of structure, planning, and helping his community. In the short term, he aims to improve his math scores, complete more advanced LEGO projects, and learn to code
    simple games in Scratch. He hopes that his methodical approach and kindness will allow him to contribute to safe, well‑planned spaces for others.
