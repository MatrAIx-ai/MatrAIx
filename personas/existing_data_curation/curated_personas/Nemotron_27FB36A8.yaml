personas:
  professional: Joseph Coker, an aspiring junior architect, applies the same methodical precision he uses for LEGO building and chess strategy to create elaborate miniature cityscapes, treating each project
    as a blueprint for future design ambitions.
  sports: Joseph Coker plays for the Maplewood Junior Soccer Club’s “Rising Rovers” team, enjoys the predictable weekly practice schedule, and cheers for the nearby professional soccer side, the Metro City
    FC, while preferring the structured drills over spontaneous games.
  arts: Joseph Coker, a budding sketcher, draws simple yet detailed building concepts inspired by the colorful illustrations of Dr. Seuss and the imaginative worlds of Pixar’s “Inside Out”, and sways to
    the upbeat tunes of the band They Might Be Giants while completing puzzles.
  travel: Joseph Coker loves family outings to the nearby state park where he can collect leaves and rocks, dreams of visiting the historic castles of Scotland, and prefers meticulously planned itineraries
    that include a set bedtime and a LEGO‑themed activity at each stop.
  culinary: Joseph Coker enjoys assembling snack platters of cheese cubes, apple slices, and pretzel sticks, helps stir pancake batter under supervision, and delights in the sweet taste of chocolate chip
    cookies shaped like his favorite LEGO bricks.
  core: Joseph Coker, a seven‑year‑old with a love for order, balances meticulous LEGO constructions with a piggy‑bank obsession, yet can get tangled in his own schedule when a sudden rainstorm interrupts
    his planned puzzle session.
background:
  cultural: Joseph was raised in Browns Summit, a suburban community in Guilford County, North Carolina, within a middle‑class white family that values education, community involvement, and Southern hospitality.
    His family attends a local Methodist church where service and fellowship are emphasized, and they regularly take part in regional traditions such as Fourth of July parades, high‑school football games,
    and seasonal harvest festivals. The school curriculum stresses structure, standardized testing, and disciplined study habits, reinforcing his preference for predictability and organization. These cultural
    influences, combined with the supportive, modest environment of his neighborhood, have shaped his cooperative, considerate, and methodical demeanor.
attributes:
  skills: '[''Reading fluently'', ''Basic arithmetic'', ''LEGO building'', ''Following step‑by‑step instructions'', ''Organizing personal space'', ''Basic Scratch programming'', ''Cooperative teamwork in
