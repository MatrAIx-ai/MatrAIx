personas:
  professional: Dominga Garrido, a seasoned equipment operator at a food‑processing plant, melds two decades of high‑speed packaging expertise, bilingual technical fluency, and a curiosity‑driven, cooperative
    mindset to quickly diagnose machine glitches and mentor teammates, though their relaxed approach to planning sometimes leads them to improvise temporary fixes under pressure.
  sports: Dominga Garrido stays active by walking along the Comal River and joining a local walking club that supports the San Antonio Spurs, while they also enjoy watching the Texas Rangers on weekends
    and favor low‑impact, gentle stretching over high‑intensity workouts, reflecting a practical, stress‑relieving approach to fitness.
  arts: Dominga Garrido immerses themselves in Norteño music by listening to Los Tigres del Norte, creates colorful embroidery inspired by Frida Kahlo’s folk motifs, unwinds with nightly telenovelas starring
    Thalía, and regularly volunteers at parish cultural festivals where their love for both traditional rhythms and handcrafted art intertwines with community spirit.
  travel: Dominga Garrido prefers relaxed, culturally rich getaways, often revisiting historic San Antonio missions and planning a pilgrimage to the Basilica of Guadalupe in Mexico City, while they also
    enjoy weekend road trips through the Texas Hill Country wine trail and occasional day trips along the Gulf Coast, balancing modest budgeting with a desire for family‑oriented experiences.
  culinary: Dominga Garrido, an adept home chef, delights in cooking mole poblano with dried chilies, chocolate, garden‑grown tomatoes and cilantro, and lovingly preparing tamales for neighborhood gatherings,
    while they balance their love for robust, spice‑laden meals with occasional indulgences in queso fundido at a local taquería.
  core: Dominga Garrido blends curiosity‑driven practicality with a warm, cooperative spirit, yet lingering anxiety and occasional disorganization cause them to oscillate between meticulous kitchen rituals
    and spontaneous, last‑minute improvisations.
background:
  cultural: Dominga was born in a small town in the state of Jalisco, Mexico, and moved to Texas with her family in her early twenties. She retains strong ties to her Mexican heritage, speaking Spanish
    fluently at home while also being comfortable in English in the workplace and community. Living in New Braunfels, a city known for its blend of German and Hispanic cultures, she participates in local
    celebrations such as Fiesta San Antonio and Cinco de Mayo, while also enjoying regional Texan traditions like river festivals. Her family values emphasize respect, generosity, and close‑knit relationships,
    which shape her cooperative and caring nature. The intergenerational transmission of family recipes, religious practices, and community involvement continues to influence her daily life.
attributes:
  skills: '[''Packaging machine operation'', ''Filling line troubleshooting'', ''Preventive maintenance'', ''Quality control inspection'', ''Bilingual technical communication (English/Spanish)'', ''OSHA
