  career_goals: Prudence dreams of growing up to help people and animals. She often says she wants to become a teacher so she can share stories and guide younger kids, or a veterinarian because she loves
    caring for pets. She also imagines being an artist to express her ideas and bring joy. These aspirations reflect her compassionate nature and curiosity about the world.
