personas:
  professional: A budding junior architect of imagination, Prudence Marino channels their methodical planning and compassionate nature into designing elaborate LEGO fortresses and nature-inspired art projects
    that delight friends and family.
  sports: An enthusiastic little athlete, Prudence Marino plays on the local Little League Tigers baseball team, cheers for the city's junior soccer club the Ravens, and spends Saturday mornings at the
    community pool learning beginner swimming strokes, all while favoring the "Super Mario" themed sports sneakers.
  arts: A creative explorer, Prudence Marino draws inspiration from Eric Carle’s vibrant collages, Beatrix Potter’s gentle animal illustrations, and The Wiggles’ playful melodies while filling sketchbooks
    with detailed animal portraits and singing simple songs during art sessions.
  travel: A curious little explorer, Prudence Marino enjoys family trips to the nearby state forest where they collect leaves and rocks, dreams of hiking the Grand Canyon’s rim, and hopes to one day snorkel
    over the coral reefs of the Great Barrier Reef.
  culinary: A budding kitchen helper, Prudence Marino loves mixing batter for blueberry muffins, decorating homemade pizza with mozzarella and fresh basil, and savoring fruit salads featuring strawberries,
    kiwi, and mango, though they sometimes sneak extra chocolate chips when no one’s looking.
  core: Prudence Marino, a compassionate and organized seven‑year‑old, balances a boundless curiosity for art and nature with occasional worry, meticulous planning, and a secret love for extra chocolate
    chips.
background:
  cultural: Prudence comes from a white, Midwestern American family in Berne, Indiana, a community with strong German heritage and a close‑knit small‑town atmosphere. Her family participates in local church
    activities and community events, emphasizing modesty, hard work, and kindness. The local culture values school involvement, seasonal festivals, and appreciation for arts and crafts, which have nurtured
    her curiosity and artistic interests.
