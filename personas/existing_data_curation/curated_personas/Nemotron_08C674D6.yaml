  career_goals: Brett aims to translate his curiosity and practicality into a career that blends engineering and technology. He plans to enroll in a community college engineering program, earn an associate
    degree in mechanical or electrical engineering, and later pursue a bachelor’s degree. His long‑term ambition is to launch a small business that offers custom automation solutions and tech support for
    local farms and small enterprises in his region. He also hopes to compete in regional coding hackathons and e‑sports tournaments, using those experiences to build credibility and a professional network.
