  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Knitting'', ''Bird-watching'', ''Book club participation'', ''Volunteer work at senior center'', ''Genealogy research'', ''Baking'', ''Walking
    in local parks'']'
  career_goals: Though officially retired, Rebecca aims to keep contributing to education by mentoring new teachers, volunteering as a literacy tutor for adults, and compiling a concise guide on practical
    classroom strategies for small‑community schools. She also hopes to serve on the local school board’s advisory committee to promote inclusive curricula and to lead intergenerational storytelling projects
    that preserve Macomb County’s history for future students.
