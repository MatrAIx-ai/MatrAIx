personas:
  professional: Rebecca Butts, a retired teacher with a graduate business degree, blends decades of classroom pedagogy and pragmatic budgeting to mentor novice educators, lead adult literacy tutoring, and
    draft a concise guide on community‑school collaborations, all while championing inclusive curricula through their advisory role on the local school board.
  sports: Rebecca Butts enjoys early‑morning bird‑watching walks with the senior walking club, follows the Detroit Tigers during baseball season and the Detroit Red Wings in the winter, and participates
    in a gentle chair‑yoga class at the community center to stay limber, finding that these activities fit well with their preference for low‑impact, social exercise.
  arts: Rebecca Butts immerses themselves in historical fiction novels by Philippa Gregory and Ken Follett, listens to the piano works of Frédéric Chopin while knitting, attends the local community theater's
    productions of classic plays like "Our Town", and cherishes folk ballads by The Chieftains during their genealogy research evenings.
  travel: Rebecca Butts favors relaxed, small‑group road trips to nearby historic sites such as Mackinac Island and the Henry Ford Museum, enjoys occasional train journeys to Washington D.C. for archival
    research, and dreams of a guided summer tour of European archives in the region where their ancestors lived, all budgeted within their modest travel fund.
  culinary: Rebecca Butts, an accomplished home cook, often prepares rustic chicken and vegetable stew using tomatoes, carrots, and fresh thyme from their garden, bakes whole‑grain scones with honey and
    butter, and relishes a classic shepherd’s pie layered with mashed potatoes, all seasoned with rosemary and black pepper.
  core: Rebecca Butts balances a love for orderly lesson plans with a delightfully chaotic garden, strings together knitting projects while occasionally misplacing their reading glasses, and finds joy in
    quiet community storytelling circles that echo their lifelong dedication to education.
background:
  cultural: Rebecca was raised in a midwestern white family of German‑Irish ancestry in Michigan. The region’s emphasis on modesty, practicality, and community service shaped her worldview. Growing up during
    the post‑war era, she internalized values of hard work, respect for tradition, and a deep appreciation for seasonal rhythms, all of which continue to influence her teaching philosophy, civic involvement,
    and personal pursuits.
attributes:
  skills: '[''Lesson planning'', ''Curriculum development'', ''Student assessment'', ''Classroom management'', ''Educational technology integration'', ''Budgeting and resource allocation'', ''Project coordination'',
