  career_goals: Looking ahead, Nazlin aims to move into senior executive leadership, such as Director of Scientific Operations or Chief Innovation Officer, where she can shape the strategic direction of
    large‑scale research initiatives. She is passionate about integrating sustainability into scientific research and hopes to champion policies that promote environmentally responsible practices. Over
    the next five years, she plans to lead a flagship interdisciplinary program that bridges biotech discovery with market commercialization, mentor a cohort of emerging women scientists, and possibly launch
    a consultancy that helps research organizations translate scientific breakthroughs into viable business models. She also envisions contributing to community outreach programs that inspire STEM interest
    among South Asian youth in the St. Louis area.
