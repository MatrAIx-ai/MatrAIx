persona_description: A psychologist who specializes in the study of memory and its effects on human behavior, particularly in relation to the formation of memories and the impact of life experiences on
  personal identity. She is particularly interested in the phenomenon of a "reminiscence bump" and the reasons behind it, and how it relates to the formation of long-term memories. Her research interests
  also include the effects of early life experiences on adult life narratives and the role of memories in shaping an individual's identity.
