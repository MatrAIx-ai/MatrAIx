personas:
  professional: Reginald Edwards, a senior full‑stack developer at a tech‑media startup, blends Python, TypeScript, and cloud‑native design with a creative coder’s eye, leading cross‑functional teams while
    championing inclusive, user‑centric products for digital artists.
  sports: Reginald Edwards, an avid member of the Toledo Cycle Collective, cycles 60 miles each weekend, trains for the Cleveland Marathon each spring, enjoys occasional hikes in Maumee Bay State Park,
    and roots for the Cleveland Cavaliers and Cincinnati Bengals while swapping fantasy football tips with teammates.
  arts: Reginald Edwards, a drumming jam‑band member and improv theater enthusiast, curates playlists that blend Miles Davis, Nina Simone, and Kendrick Lamar, documents street‑art nights featuring works
    by Banksy and local muralist Red Street, and creates interactive visualizations with p5.js inspired by the works of Yayoi Kusama.
  travel: Reginald Edwards, a spontaneous traveler who prefers flexible itineraries, has road‑tripped to Chicago for the Luminaria art festival, explored Kyoto’s tea houses, dreams of attending Berlin’s
    Fusion Future conference, and plans a future retreat to the Appalachian Trail for a digital‑detox hackathon.
  culinary: Reginald Edwards, an experimental home chef, loves perfecting Korean kimchi, Ethiopian injera, and Japanese ramen using miso, za’atar, and gochujang, hosts monthly potlucks where friends rate
    their latest fusion dish, and keeps a battered cast‑iron skillet as their prized kitchen tool.
  core: Reginald Edwards, a tech‑savvy creative who juggles code, drums, and community outreach, thrives on flexible schedules, occasionally forgets to file taxes on time, and believes that empathy fuels
    innovation.
background:
  cultural: Reginald grew up in the Midwest as part of an African‑American family with deep roots in the Great Migration era. His upbringing in Toledo exposed him to a vibrant local Black community, church
    gatherings, and cultural events such as the African American Heritage Celebration. Music from gospel, soul, jazz, and hip‑hop formed the soundtrack of his youth, while family traditions around soul
    food and communal meals reinforced values of hospitality and cooperation. He is active in local Black professional networks and mentors young Black students interested in STEM, drawing on his heritage
    to advocate for representation and inclusion in the tech industry. These cultural influences shape his perspective, fueling a commitment to community, artistic expression, and collaborative achievement.
