  career_goals: Reginald aims to progress from senior full‑stack developer to technical lead and eventually engineering manager, shaping product strategy at the intersection of technology and the arts.
    He envisions creating platforms that empower digital artists through generative‑AI tools and immersive experiences, and hopes to launch a startup focused on interactive art installations. He plans to
    earn advanced AWS certifications, contribute to open‑source creative‑coding libraries, and become a speaker on inclusive design and diversity in tech. Mentoring underrepresented students in STEM and
    building collaborative, high‑performing teams are central to his long‑term vision.
