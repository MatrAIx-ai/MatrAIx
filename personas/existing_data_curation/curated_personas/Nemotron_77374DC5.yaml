  hobbies: '["Herb gardening with scheduled care", "Puzzle solving (crosswords, Sudoku, jigsaw)", "Reading historical biographies and popular science", "Traditional Mexican cooking with precise recipes",
    "Bird watching with detailed journal", "Landscape painting using structured technique", "Studying Nahuatl language"]'
  career_goals: Although she is no longer in the formal workforce, Maria aims to leverage her expertise to give back to her community in a structured, measurable way. She plans to develop a bilingual online
    mentorship platform that pairs retired professionals with high‑school students interested in STEM, focusing on clear curricula and progress tracking. She also aspires to complete an advanced data‑science
    certificate to stay current with machine‑learning basics, applying these skills to help local nonprofits analyze program outcomes. A personal ambition is to write a bilingual memoir documenting her
    family's migration story and the evolution of Mexican‑American identity in Orange County, preserving cultural memory for future generations.
