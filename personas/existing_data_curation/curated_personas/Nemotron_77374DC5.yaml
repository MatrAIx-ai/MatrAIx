personas:
  professional: Maria Hurtado leverages her decades-long laboratory and data-analysis expertise to create a bilingual online mentorship platform that pairs retired professionals with high-school STEM students,
    designing meticulous curricula, progress-tracking dashboards in Python and R, and translating all technical guides into clear English and Spanish documentation, and they ensure every module is measurable
    and accessible.
  sports: Maria Hurtado follows the Los Angeles Dodgers and the Lakers, walks with the OC Seniors Striders club three times a week, and attends a gentle tai chi class at the community center to maintain
    flexibility and cardiovascular health, and they relish each quiet stride as a way to clear the mind.
  arts: Maria Hurtado paints methodical landscapes inspired by Claude Monet's layered skies, unwinds to Beethoven's piano sonatas, and revisits classic novels by Jane Austen and Gabriel Garcia Marquez while
    regularly attending community theater productions featuring Meryl Streep's celebrated monologues, and they find the disciplined brush strokes echo their analytical nature.
  travel: Maria Hurtado prefers meticulously planned short trips, enjoying coastal getaways to Santa Barbara and Monterey, and dreams of culturally rich journeys to Kyoto and Barcelona, balancing their
    love of quiet exploration with budget-conscious travel arrangements, and they often draft itineraries on a spreadsheet before booking.
  culinary: Maria Hurtado treats cooking as a precise experiment, measuring each ingredient for heritage dishes such as tamales, mole poblano, and pozole, and experimenting with regional variations by swapping
    dried chilies like ancho and guajillo, adding fresh cilantro, corn masa, and a hint of cacao powder to perfect complex flavors, and they savor the methodical process as much as the final taste.
  core: Maria Hurtado is a disciplined retiree who channels analytical rigor into solitary hobbies—gardening, puzzles, and data projects—while occasionally forgetting to water their succulents after a rainy
    day and losing sleep to late-night jigsaw sessions, and they proudly wear their quirks as badges of focus.
background:
  cultural: Maria is a first‑generation Mexican‑American whose parents emigrated from the state of Jalisco in the early 1960s. She grew up bilingual, celebrating Día de los Muertos, Las Posadas, and other
    Mexican customs while assimilating into Southern California life. Her upbringing emphasized family cohesion, respect for elders, and the value of education, which motivated her pursuit of a STEM degree.
    Living in Buena Park, she remains connected to the vibrant Hispanic community, attending cultural events at the local Mexican cultural center and volunteering as a Spanish‑language STEM mentor. Her
    culinary traditions, storytelling, and occasional visits to family in Mexico reinforce her cultural identity, which she weaves into her personal and community activities.
attributes:
  skills: '["Data analysis (Excel, Google Sheets, Python pandas)", "Statistical analysis (SPSS, R)", "Technical writing and bilingual translation", "Project management and SOP development", "Hardware/software
