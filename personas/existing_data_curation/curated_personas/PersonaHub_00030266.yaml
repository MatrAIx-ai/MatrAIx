persona_description: A mental health professional who is concerned about the potential unintended consequences of changing the definition of grief to depression in the Diagnostic and Statistical Manual
  of Mental Disorders (DSM). The individual has experience with mental health decisions and is hesitant to intervene with treatments that could potentially prolong suffering or be unnecessary. The persona
  is aware of the importance of considering the remaining lifetime of a patient when diagnosing and treating mental health conditions, and is opposed to the proposed change that would allow patients to
  be lumped in with those diagnosed with major depression. The individual is knowledgeable about the scientific research that has failed to prove that grief and major depression are the same, and is concerned
  about the potential consequences of this change on patients.
