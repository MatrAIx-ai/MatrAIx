  hobbies: '[''Cooking Southern and Creole cuisine'', ''River walks and fishing'', ''Church choir and outreach'', ''Yoga and mindfulness meditation'', ''Volunteering at a food bank'', ''Reading mystery
    novels'', ''Attending blues and zydeco concerts'']'
  career_goals: Tika aims to move into a leadership role within her agency, such as Senior Sales Manager or Regional Team Lead, where she can mentor newer agents—especially women of color—while implementing
    more systematic processes to reduce stress and improve efficiency. She plans to earn professional designations like the Chartered Property Casualty Underwriter (CPCU) or Chartered Life Underwriter (CLU)
    to deepen her expertise. Long‑term, she envisions opening her own boutique insurance brokerage that serves the Lake Charles community with personalized, culturally sensitive service, allowing her to
    balance career advancement with family time and community involvement.
