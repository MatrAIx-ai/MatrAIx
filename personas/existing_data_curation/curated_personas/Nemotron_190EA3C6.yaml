  career_goals: Justin aims to formalize his knowledge by obtaining a GED within the next year, which would open pathways to USPS supervisory training. He aspires to become a route manager or a mentor for
    new carriers, leveraging his experience to improve efficiency and foster a supportive team culture. At the same time, he wishes to channel his creative drive into community art projects, such as organizing
    a mural program that celebrates Dominican heritage in local neighborhoods. Maintaining a flexible schedule is important to him, allowing more time for family gatherings, cultural festivals, and his
    personal artistic pursuits.
