  career_goals: Rosemarie aims to obtain her Project Management Professional (PMP) certification within the next year and subsequently transition to a senior program manager role overseeing multi‑disciplinary
    infrastructure projects in California’s Central Valley. She wants to lead larger cross‑functional teams, champion data‑driven decision making, and integrate sustainable practices into project design.
    In the longer term, she aspires to become the director of a Project Management Office (PMO) or launch her own consultancy that helps small agricultural businesses scale operations while maintaining
    rigorous project controls. She also plans to pursue an MBA to deepen her strategic and financial acumen.
