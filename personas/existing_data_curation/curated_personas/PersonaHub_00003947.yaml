persona_description: A historian who specializes in the study of the Crusades and their impact on the history of the Middle East and Europe. His research interests include the causes, outcomes, and lasting
  effects of the Crusades, the role of the papacy in sponsoring the Crusades, and the significance of the Crusades in the history of Christianity and Islam. He is particularly interested in the Crusades
  in the Holy Land, the southern Spain, southern Italy, and Sicily, and the Teutonic Knights expansion of Christian domains in Eastern Europe. He has a deep understanding of the inquisitions and the impact
  of the Crusades on the spread of Christianity in Europe and the Middle East.
