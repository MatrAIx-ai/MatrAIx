personas:
  professional: Brenda Encarnacion, a high‑school junior with a growing digital illustration portfolio, merges a methodical approach to school projects with a curious knack for visual storytelling, and
    spends weekends volunteering at a community center teaching basic art techniques, embodying reliability and a community‑centric ethos.
  sports: Brenda Encarnacion, a fan of the local soccer club Real España, joins a neighborhood pick‑up basketball game after school, jogs through their community while listening to indie tracks, and prefers
    low‑impact activities like yoga to stay flexible, but tends to skip workouts when a new illustration project consumes their time.
  arts: Brenda Encarnacion, a budding digital illustrator who draws inspiration from graphic novelists like Junji Ito and street artists like Banksy, frequents the school book club to discuss sci‑fi narratives,
    playlists with folk singer‑songwriters such as Caifanes, and curates a personal Instagram gallery showcasing their fusion of traditional Honduran motifs with contemporary design.
  travel: Brenda Encarnacion, who loves photographing everyday moments, has taken family road trips to the historic town of Copán and dreams of exploring Mexico City’s vibrant murals, prefers budget‑friendly
    travel using public buses, and plans trips around school breaks, balancing a desire for cultural immersion with limited teen finances.
  culinary: Brenda Encarnacion, an enthusiastic home cook, regularly prepares baleadas with refried beans, cheese, and curtido, experiments with incorporating avocados and plantain chips into traditional
    dishes, and enjoys the aroma of simmering chicken with achiote, while still mastering perfect rice consistency.
  core: Brenda Encarnacion, a meticulous teen storyteller who sketches late into the night, balances a disciplined budget with occasional impulse buys, and quietly mentors younger artists, all while navigating
    the ups and downs of teenage health and a love for community.
background:
  cultural: Brenda is a first‑generation Honduran‑American who grew up in the suburban community of Kingwood, Texas. At home, Spanish is spoken alongside English, and her family maintains many Honduran
    customs such as celebrating cultural festivals, preparing dishes like baleadas and tamalitos, and sharing stories of their heritage. She participates in a local Honduran community association that hosts
    cultural events, fostering a sense of solidarity and respect for elders. While she embraces these traditions, Brenda also feels comfortable navigating mainstream American culture, attending a public
    school, and engaging in neighborhood activities, blending her dual cultural identity into a unique personal perspective.
