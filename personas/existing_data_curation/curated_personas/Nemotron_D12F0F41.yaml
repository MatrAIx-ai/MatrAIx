  career_goals: Brenda aims to complete high school and earn a scholarship to study graphic design or visual communications at a university. She hopes to combine her artistic interests with community outreach
    by creating culturally‑focused art projects and eventually leading workshops that celebrate Honduran heritage. In the longer term she envisions a career that allows her to mentor younger students, preserve
    cultural traditions, and possibly work in a design studio where she can apply her creativity to socially‑impactful initiatives.
