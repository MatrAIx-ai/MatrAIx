persona_description: A musician and composer who is well-versed in the principles and techniques of the Greek and Roman musical scales, as well as the hexachords and clefs. He is also familiar with the
  principles of solmisation and the creation of new musical forms and structures. Guido is a bold and innovative musician who is dedicated to the improvement and development of musical theory and practice.
  He is a skilled teacher and has a deep understanding of the principles of harmony and melody. Guido is also known for his contributions to the field of music theory, particularly his work on the invention
  of the red and yellow lines and the Claves signatæ, and his claims to the invention of the lines and spaces of the stave, the clefs associated with the former, and the Harmonic Hand. Guido's work is highly
  respected and his contributions to the field of music theory are widely recognized.
