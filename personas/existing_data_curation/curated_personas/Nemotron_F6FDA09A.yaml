personas:
  professional: Durwood White is a diligent commercial cleaning technician who leverages his OSHA‑savvy skills in floor care, minor plumbing, and electrical troubleshooting to keep facilities spotless,
    while his methodical nature and sociable charm make him the go‑to mentor for new staff and a reliable scheduler for daily routes.
  sports: Durwood White competes in a community basketball league, regularly joins pick‑up games at the town park, supports the Louisville Cardinals basketball team, follows the Cincinnati Bengals in the
    NFL, and hikes the Appalachian foothills to keep fit during the summer months.
  arts: Durwood White strums acoustic guitar at bluegrass jam sessions, drawing inspiration from Bill Monroe, Alison Krauss, and John Prince, while also enjoying the storytelling of folk‑rock artist Mumford
    & Sons and the cinematic scores of John Williams during quiet evenings.
  travel: Durwood White prefers budget‑friendly road trips, having explored the Great Smoky Mountains, taken a weekend to Nashville for live music, and dreaming of a backpack trek through the Blue Ridge
    Parkway, always planning routes with a mix of hiking and local diners.
  culinary: Durwood White enjoys cooking fresh‑caught trout with lemon‑dill butter, whipping up hearty shrimp and grits, and perfecting a signature apple‑cinnamon pork chili, though they often rely on quick
    fried chicken and a side of coleslaw when short on time.
  core: Durwood White is a structured, community‑oriented 23‑year‑old whose meticulous work ethic coexists with a restless love for music, sport, and the outdoors, even as anxiety and occasional procrastination
    keep them on edge.
background:
  cultural: Durwood was raised in Bulan, a small unincorporated community in Perry County, Kentucky. The region’s Southern Appalachian heritage, with its emphasis on close-knit community ties, church involvement,
    and a strong work ethic, has shaped his values. Family gatherings often featured traditional Southern cooking and bluegrass music, reinforcing his appreciation for local customs. The rural setting fostered
    a practical outlook and familiarity with outdoors activities such as hunting, fishing, and hiking. These cultural influences combine with a modest, self-reliant mindset typical of many families in eastern
    Kentucky.
attributes:
  skills: '[''Commercial floor cleaning'', ''Janitorial equipment maintenance'', ''Basic building repairs'', ''Inventory management'', ''Safety and OSHA compliance'', ''Team coordination'', ''Customer service'']'
