    food bank'']'
  career_goals: Durwood plans to first complete his GED and then enroll in a community college program for facility management or vocational training in building operations. He aims to earn certifications
    such as OSHA 30-hour and the Certified Facility Manager (CFM) designation. In the next five years, he hopes to advance to a supervisory or lead janitor role, overseeing a team and managing larger facilities.
    Long-term, he dreams of starting his own small cleaning business serving the Perry County area, providing stable employment for local residents while achieving financial independence. He also wants
    to develop stress-management skills to maintain his well-being.
