  hobbies: '["Reading nature and science books","Exploring local forests and streams","Collecting rocks, leaves, and insects","Building LEGO models","Playing chess","Writing short stories and journal entries","Coding
    simple games in Scratch","Assisting with the family garden"]'
  career_goals: Jean Mae dreams of becoming a wildlife biologist who can blend her love of nature with practical solutions for conservation. She is motivated to win school science fairs and hopes to lead
    community projects that monitor local streams and protect native species. Her long‑term ambition includes studying at a university with a strong environmental science program, eventually contributing
    to research that balances ecological health with human needs. While still young, she already envisions herself as a future expert who can turn curiosity into tangible, real‑world impact.
