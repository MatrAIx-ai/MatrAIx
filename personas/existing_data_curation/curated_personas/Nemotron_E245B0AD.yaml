personas:
  professional: Jean Beckwith is an aspiring environmental explorer and junior coder who blends a love for nature with building intricate LEGO ecosystems, applying strategic thinking from chess to design
    custom Scratch games that simulate animal habitats, and they keep a meticulous nature journal that reflects an organized yet flexible approach.
  sports: Jean Beckwith is a member of the Grantham Youth Soccer Club and swims on the local community pool team, cheering for the nearby professional football side Leicester City and following the Premier
    League's Manchester United, and they channel competitive energy into weekend matches and practice drills with a focus on strategy and teamwork.
  arts: Jean Beckwith enjoys building LEGO Architecture sets of iconic landmarks, sketching insects in a miniature art journal, listening to the soothing piano works of Yiruma, and watching Laika’s stop‑motion
    film 'Coraline', and they often compose simple digital soundtracks for their Scratch games as a creative outlet.
  travel: Jean Beckwith loves day trips to the Grantham nature reserve and the historic Lincoln Cathedral, dreams of camping in the Lake District and exploring the Scottish Highlands, and they plan a future
    family vacation to Whitby to combine tide‑picking, lighthouse tours, and seaside ice‑cream stops, preferring organized itineraries with plenty of time for nature journaling.
  culinary: Jean Beckwith prefers fresh garden vegetables like carrots and snap peas harvested from the family plot, loves assembling peanut butter‑banana sandwiches, experiments with simple trail‑mix recipes
    featuring dried cranberries and sunflower seeds, and they occasionally indulge in gummy bears as a reward for completed LEGO builds.
  core: Jean Beckwith is a curious, organized ten‑year‑old who turns solitary nature walks into scientific notebooks, channels competitive drive into chess and coding, and balances a frugal allowance with
    a penchant for spontaneous snack raids.
background:
  cultural: Jean Mae grows up in Grantham, a small rural town in Sullivan County, New Hampshire. Her family has deep New England roots, reflecting generations of modest, self‑reliant values typical of the
    region. Local culture emphasizes respect for the changing seasons, outdoor recreation, and community involvement through school events, library programs, and seasonal celebrations such as apple picking
    festivals. The community’s heritage includes Protestant‑Christian traditions and a strong appreciation for public education, which encourages participation in environmental stewardship activities. This
    setting shapes Jean Mae’s connection to nature, her practical outlook, and her balanced blend of curiosity with established local customs.
attributes:
