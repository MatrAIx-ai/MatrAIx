  hobbies: '[''Hosting gatherings'', ''Cooking Spanish cuisine'', ''Flamenco and salsa dancing'', ''Gardening'', ''Yoga'', ''Reading romance and self‑development books'', ''Volunteering at church'', ''Organizing
    community charity events'']'
  career_goals: Olga aims to leverage her organizational talents and cultural heritage into a part‑time home‑based venture, such as offering Spanish cooking classes or catering for local events. She hopes
    to obtain a GED and take community‑college courses in small business management to formalize her skills. In the longer term she envisions becoming an active board member of the local PTA or a community
    cultural liaison, creating regular programs that celebrate Spanish traditions while supporting families in Broomfield. Her primary ambition is to maintain a stable, nurturing environment for her family
    while contributing meaningfully to her community.
