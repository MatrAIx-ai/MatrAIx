personas:
  professional: Olga Reyes, a 36-year-old home‑based entrepreneur in the making, leverages their meticulous organizational skills and flair for community engagement to coordinate neighborhood events and
    plans to launch Spanish cooking classes, combining spreadsheet‑driven budgeting with charismatic public speaking to keep participants on schedule and entertained.
  sports: Olga Reyes, an avid supporter of the Denver Broncos, enjoys cheering at home games while also dancing salsa and flamenco for cardio, participates in a local adult recreational soccer league on
    weekends, and tends to incorporate weekly garden walks as a low‑impact fitness routine that they find soothing.
  arts: Olga Reyes, a passionate flamenco dancer and salsa enthusiast, regularly performs at cultural festivals, admires the guitar work of Paco de Lucía, attends contemporary romance author talks featuring
    Nora Roberts, and finds inspiration in the vibrant colors of Frida Kahlo’s paintings, which they often reference in their own creative expressions.
  travel: Olga Reyes, who dreams of revisiting Barcelona’s La Boqueria market and exploring the Rocky Mountain National Park, prefers carefully planned itineraries that blend culinary tours with family‑friendly
    hikes, yet sometimes postpones international trips due to the cost of maintaining their community responsibilities, which they balance with family life.
  culinary: Olga Reyes, a self‑taught chef specializing in paella, gazpacho, and tortilla española, delights in sourcing saffron and chorizo at local farmers’ markets, hosts elaborate weekend feasts for
    friends, and occasionally burns the rice when juggling a crowded kitchen and a ringing phone, which they find both stressful and exhilarating.
  core: Olga Reyes, a routine‑loving, talkative community hub, balances meticulous planning with spontaneous kitchen experiments, often juggling spreadsheets, salsa steps, and neighborhood gatherings in
    a lively, organized swirl that they proudly orchestrate.
background:
  cultural: Olga’s Spanish heritage plays a central role in her daily life; she celebrates traditional holidays such as Semana Santa, Día de los Reyes, and Christmas with family rituals, décor, and foods.
    She speaks Spanish fluently at home and passes the language and customs to her children. Her values emphasize close family ties, hospitality, and communal responsibility, which she expresses through
    community involvement, sharing cultural dishes, and preserving Spanish music and dance within her Broomfield neighborhood.
