persona_description: A marine biologist who specializes in cetacean research and has expertise in the development and application of acoustic and visual survey methods. They have a strong background in
  computational biology and have written an algorithm called ROCCA to classify and discriminate between five Atlantic delphinid species using passive acoustic data. The researcher has conducted studies
  in the western North Atlantic Ocean and has published results showing regional differences in correct classification rates and unique species characteristics for each species. They are interested in refining
  ROCCA for real-time use in both regions and contributing to improved marine mammal management by enhancing visual abundance studies with acoustic data.
