  career_goals: Jerry aims to advance to a senior leadership position—such as Director of Project Management or Vice President of Operations—overseeing large‑scale construction and hospitality developments
    in the Las Vegas corridor. He plans to obtain a Lean Six Sigma Black Belt, maintain his PMP certification, and become a recognized mentor for emerging project managers. In the long term he envisions
    founding a boutique consulting firm that helps organizations implement disciplined, results‑driven project practices while preserving high standards of efficiency and quality.
