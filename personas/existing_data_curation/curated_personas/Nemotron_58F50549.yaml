  hobbies: '[''Basketball'', ''Community softball league'', ''Fishing'', ''Neighborhood clean‑up volunteering'', ''DIY home improvement'', ''Barbecue grilling'', ''Mystery novels'', ''Classic rock music'']'
  career_goals: Charles aspires to move into a supervisory role within facilities management, aiming to become a facilities supervisor or operations manager within the next five years. He plans to earn
    professional certifications such as the Certified Professional Cleaner (CPC) and the Facility Management Professional (FMP) credential. Long‑term, he hopes to launch his own small cleaning business
    that emphasizes sustainable practices and reliable customer service. In parallel, he seeks to improve his stress‑management skills, establishing a healthier work‑life balance that allows more quality
    time with his wife and family.
