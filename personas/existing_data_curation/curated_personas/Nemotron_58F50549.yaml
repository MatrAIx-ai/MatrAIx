personas:
  professional: Charles Araya, a seasoned building cleaner turned aspiring facilities supervisor, blends practical expertise in floor care, HVAC maintenance, and minor carpentry with a natural knack for
    crew coordination, using their curiosity to pilot green‑clean technologies while staying organized enough to keep a tight schedule and assertively mentor new staff.
  sports: Charles Araya, a regular on the local basketball pick‑up courts and a member of the Defuniak Springs community softball league, cheers for the Tampa Bay Buccaneers on Sundays and follows the Miami
    Heat during the NBA season, often combining game nights with grill‑outs, and they spend early mornings casting lines for snook on the nearby lake during the summer.
  arts: Charles Araya, an avid listener of classic rock legends like Led Zeppelin, The Rolling Stones, and Fleetwood Mac, fills road trips with their anthems while devouring mystery novels by Agatha Christie
    and James Patterson, and they occasionally attend a local community theatre production of "Our Town" to unwind from work stress.
  travel: Charles Araya prefers road‑trip adventures that balance relaxation and activity, having driven the Gulf Coast from Pensacola to the Florida Keys for sunset fishing, explored the historic streets
    of Charleston, and planning a future trek to the Grand Canyon to combine hiking with a chance to photograph sunrise over the cliffs; they favor family‑friendly itineraries but also relish spontaneous
    weekend getaways to nearby lakes.
  culinary: Charles Araya displays a confident hand at the grill, mastering smoked pulled pork, cedar‑plank catfish seasoned with Cajun spice, and classic Southern sides like coleslaw and hushpuppies, while
    their pantry staples include sweet tea, peach cobbler, and a secret dry rub of brown sugar, paprika, and garlic powder, reflecting both comfort‑food roots and an experimental edge with occasional forays
    into grilling vegetables.
  core: Charles Araya is a socially energetic, detail‑oriented cleaning professional who channels curiosity into sustainable practices, worries about stress, but finds balance through community sports,
    BBQs, and weekend fishing.
background:
  cultural: Charles was raised in a middle‑class family in the American South, growing up in a suburban community where hard work, friendliness, and community involvement were core values. His family celebrates
    traditional holidays such as Thanksgiving, Independence Day, and Christmas, often with gatherings that feature home‑cooked meals and outdoor activities. He attends a local non‑denominational church
    with his wife, which reinforces a sense of fellowship and service. The laid‑back, nature‑oriented lifestyle of Defuniak Springs—its small‑town charm, proximity to lakes and the Gulf, and Southern hospitality—shapes
    his outlook, blending a respect for tradition with an openness to new ideas.
attributes:
  skills: '[''Commercial cleaning procedures'', ''Floor care and polishing'', ''Safe chemical handling'', ''Routine HVAC and lighting maintenance'', ''Minor plumbing and carpentry repairs'', ''Inventory
