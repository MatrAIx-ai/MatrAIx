  hobbies: '[''scribbling and drawing with crayons'', ''building block towers'', ''dancing to music'', ''listening to family folk songs'', ''exploring the backyard and garden'', ''being read picture books'',
    ''pretend play with dolls and stuffed animals'']'
  career_goals: Although still a toddler, Dalisay’s imagination already points toward future dreams of becoming a storyteller or visual artist. She loves watching picture books and colorful drawings, and
    she often says she wants to make pictures that make people smile. As she grows, she hopes to explore new ideas, learn to draw more detailed images, and perhaps share stories that blend the cultures
    of her family.
