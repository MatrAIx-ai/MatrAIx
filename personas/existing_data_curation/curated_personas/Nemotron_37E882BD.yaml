  professional: Mariayolanda Duong, a 15‑year‑old high school sophomore, channels their curiosity into a blend of doodling, watercolor, and hip‑hop dance for eye‑catching TikTok shorts, they lean on debate
    club’s quick‑thinking skills while battling procrastination on school assignments.
  sports: Mariayolanda Duong, a 15‑year‑old who thrives on high‑energy movement, they shoot hoops at the community park while cheering for the Los Angeles Lakers, they follow the LA Galaxy’s matches, and
    they play forward for the San Gabriel Soccer Club, though they often skip practice in favor of dance rehearsals.
  arts: Mariayolanda Duong, a 15‑year‑old visual storyteller, they draw inspiration from street muralists like Banksy and Takashi Murakami, they vibrate to indie pop icons such as Clairo and Billie Eilish
    and K‑pop sensations like BTS, they fuse these influences into watercolor pieces that double as TikTok backdrops.
  travel: Mariayolanda Duong, a 15‑year‑old adventure seeker, they favor spontaneous weekend trips to Santa Monica’s boardwalk and Catalina Island’s beaches, they dream of exploring Kyoto’s temples and
    Istanbul’s bazaars, and they often plan trips with friends using a shared Google Doc that they rarely finish before the next school project.
  culinary: Mariayolanda Duong, a 15‑year‑old food enthusiast, they love slurping steaming bowls of pho with rice noodles, cilantro and Thai basil, crunching on bánh mì with charred pork, and digging into
    Korean tteokbokki spiced with gochujang, they often cook these dishes alongside grandparents while remixing flavors in spontaneous kitchen experiments.
  core: Mariayolanda Duong is a socially magnetic, art‑obsessed teen who channels curiosity into spontaneous TikTok creations, competitive debates, and neon‑lit street‑food adventures, they juggle impulsive
    spending and a stubborn battle with acne while staying emotionally steady.
background:
  cultural: Mariayolanda is the daughter of Vietnamese immigrants living in San Gabriel, a hub of Little Saigon culture. Her family maintains traditional customs such as celebrating Tet, making pho and
    bánh mì with her grandparents, and attending events at the Vietnamese Cultural Center. Growing up bilingual, she navigates both Vietnamese and American cultural spheres, blending respect for heritage
    with the diverse influences of Los Angeles. This hybrid upbringing informs her artistic voice, encouraging her to fuse traditional motifs and contemporary aesthetics while staying connected to a tight‑knit
    Southeast Asian community.
