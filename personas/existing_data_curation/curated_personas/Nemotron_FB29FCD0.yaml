personas:
  professional: Jenny Cormier is a detail‑driven operations manager who leverages Six Sigma methodology, strategic planning, and data‑centric budgeting to streamline workflows, while their natural sociability
    and assertiveness enable them to champion cross‑functional teams and resolve conflicts with a pragmatic, yet collaborative, approach.
  sports: Jenny Cormier’s athletic routine combines high‑energy spin classes at a downtown studio, weekly yoga sessions for flexibility, and monthly group hikes on the Appalachian Trail with the Lehigh
    Valley Hiking Club, while they cheer on the Lehigh Valley IronPigs and keep an eye on the Philadelphia Eagles during the football season.
  arts: Jenny Cormier’s cultural calendar is anchored by Bethlehem’s Musikfest, where they dance to performances by The Lumineers and local folk ensemble The Marigolds, while their off‑season evenings are
    filled with listening to the latest album by Hozier, attending a community theater production of ‘A Streetcar Named Desire,’ and curating playlists that blend indie rock with classic singer‑songwriter
    ballads.
  travel: Jenny Cormier plans travel itineraries with spreadsheet precision, favoring weekend road trips to the Pocono Mountains for hiking, occasional city escapes to New York for Broadway shows, and long‑term
    aspirations to explore Nashville’s music scene and the historic streets of Quebec City, often booking group stays through Airbnb to balance adventure with the camaraderie of friends.
  culinary: Jenny Cormier’s kitchen doubles as a culinary lab where they refine family‑style recipes, favoring dishes such as coq au vin, homemade gnocchi with sage butter, and roasted vegetable ratatouille,
    while sourcing fresh herbs, aged cheese, and seasonal produce from local farmer’s markets to impress guests at meticulously crafted dinner parties.
  core: Jenny Cormier is a methodical social catalyst who blends rigorous planning with spontaneous festival feasts, never missing a group workout while occasionally indulging in a last‑minute pastry binge
    that disrupts their carefully balanced budget.
background:
  cultural: Jenny comes from a white, predominantly French‑Canadian family that settled in the Northeastern United States generations ago, with her ancestors branching out into Pennsylvania during the early
    20th century. Growing up in Bethlehem, PA, she was immersed in the region's industrial heritage and close‑knit community values. Her cultural upbringing emphasizes hard work, practicality, and communal
    involvement, reflected in her celebration of traditional holidays like Thanksgiving and Christmas, as well as participation in local events such as the Lehigh Valley's summer festivals. This blend of
    French‑Canadian roots and Pennsylvania upbringing informs her appreciation for both cultural traditions and the collaborative spirit of her hometown.
