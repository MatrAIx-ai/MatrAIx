  career_goals: Jenny aims to advance to a senior management role within the next five years, targeting positions such as Director of Operations or Vice President of Business Development. She plans to pursue
    an MBA to broaden her strategic expertise and to obtain PMP certification to strengthen her project leadership credentials. Long‑term, she envisions launching her own boutique consulting firm focused
    on helping small‑to‑mid‑size businesses optimize their operations, while also serving as a mentor and community advocate for aspiring young professionals in the Lehigh Valley.
