personas:
  professional: Elizabeth Beasley, a retired applied physicist turned community arts‑science facilitator, they leverage their expertise in experimental design, Python‑driven data analysis, CAD apparatus
    construction, and project mentorship to craft interdisciplinary workshops that blend watercolor landscape painting with citizen‑science water‑quality monitoring, all while navigating their intense curiosity
    and occasional anxiety with meticulous yet adaptable planning.
  sports: Elizabeth Beasley actively participates in the Rocky Mountain Hiking Club’s weekend treks, enjoys seasonal cross‑country skiing in the Bridger Range, attends local Stillwater County High School
    basketball games to support the Cowboys, and practices weekly gentle yoga at the community recreation center to maintain flexibility and mental calm.
  arts: Elizabeth Beasley finds artistic inspiration in the luminous watercolors of Thomas Moran, the stark black‑and‑white wildlife photography of Ansel Adams, and the contemplative poetry of Mary Oliver,
    regularly curating small exhibitions of their own landscape paintings and attending intimate readings at the county library where they also share insights on the intersection of art and science.
  travel: Elizabeth Beasley favors meticulously planned trips that balance quiet immersion in nature with artistic discovery, having trekked the backcountry of Yellowstone and the alpine trails of Banff,
    while dreaming of a spring pilgrimage to Kyoto’s historic temples and the vibrant galleries of Florence, all within a modest budget that respects their volunteer commitments.
  culinary: Elizabeth Beasley, an adept home cook with a penchant for hearty Rocky Mountain fare, frequently prepares bison stew seasoned with juniper berries, huckleberry pancakes drizzled with local honey,
    and creamy wild mushroom risotto finished with fresh thyme, while occasionally treating themselves to a glass of aged Pinot Noir during dinner parties.
  core: Elizabeth Beasley blends the analytical mind of a physicist with the soulful eye of a watercolorist, navigating life's anxieties through disciplined art‑science projects, impulsive art‑supply splurges,
    and a steadfast devotion to Montana’s rugged beauty.
background:
  cultural: Elizabeth’s cultural background reflects a blend of Midwestern‑American roots and the rugged, nature‑centered lifestyle of rural Montana. Raised in a family of European‑descended settlers (primarily
    German and British ancestry), she grew up with values of self‑reliance, community cooperation, and respect for the land. Her education at a major research university broadened her outlook, exposing
    her to diverse artistic and intellectual currents, which she later integrated with the frontier ethos of her home region. Living in Fishtail, she participates in county fairs, volunteer fire‑fighter
    drills, and local conservation groups, embodying the region’s mix of practical stewardship and appreciation for the arts.
attributes:
  skills: '[''Data analysis (Python, R)'', ''Experimental design'', ''Scientific writing'', ''Project management'', ''Technical drawing (AutoCAD)'', ''Nature photography'', ''Art curation'', ''Mentoring
    and tutoring'', ''Critical thinking'', ''Problem solving'']'
  hobbies: '[''Landscape watercolor painting'', ''Nature photography'', ''Hiking'', ''Birdwatching'', ''Reading (science‑fiction, philosophy, art history)'', ''Gardening'', ''Knitting'', ''Pottery'', ''Attending
    local poetry readings'', ''Volunteering at community library STEM events'', ''Journaling'']'
  career_goals: Although officially retired, Elizabeth remains driven to intertwine her scientific background with her love of art and the natural world. Her primary ambition is to launch a community program
    that pairs local artists with high‑school students to create interdisciplinary projects centered on environmental stewardship in Stillwater County. She also aims to mentor young women interested in
    STEM through one‑on‑one tutoring and to contribute her research skills to citizen‑science water‑quality monitoring initiatives. Long‑term, Elizabeth hopes to author a reflective memoir that weaves together
    her career in physics, personal journeys through anxiety, and the lessons learned from Montana’s landscape.
