  hobbies: '[''Building blocks (Mega Bloks)'', ''Singing nursery rhymes and hip-hop beats'', ''Dancing'', ''Storytime at the local library'', ''Pretend play with toy cars'', ''Drawing with crayons'', ''Group
    playground games (e.g., Simon Says, tag)'']'
  career_goals: Vincent often talks about building tall towers with his blocks and fixing broken toys, showing an early fascination with construction and problem-solving. He imagines becoming a builder
    or engineer when he grows up, and sometimes says he wants to be a firefighter because he likes helping others and being fast and competitive in games. These ambitions echo his curiosity, practicality,
    and competitive spirit.
