  hobbies: '[''Shoreline Walks'', ''Bird Watching'', ''Reading (Literature and Science)'', ''Watercolor Painting'', ''Gallery Visits'', ''Bridge Playing'', ''Chess'', ''Gardening (Herbs & Wildflowers)'',
