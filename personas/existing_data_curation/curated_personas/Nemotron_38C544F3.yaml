  career_goals: Although retired, Sharon aims to leave a lasting record of Yarmouth's cultural heritage by completing a memoir and a visual history scrapbook that blend personal anecdotes with archival
    photographs. She hopes to mentor a small group of retired teachers, sharing her pedagogical insights and encouraging them to volunteer in local schools. Additionally, she aspires to curate a traveling
    mini‑exhibit of local art for senior centers, bridging her love of art with community service. She also wishes to master a new digital tool—such as using a tablet for digital sketching—to keep her creative
    practice contemporary.
