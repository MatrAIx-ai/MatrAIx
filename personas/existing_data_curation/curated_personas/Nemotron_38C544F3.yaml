personas:
  professional: Sharon Bontrager, a retired elementary teacher and adult literacy specialist, translates their lifelong curiosity and competitive strategic mind into flexible, improvisational community
    workshops, letting the flow of each session dictate its structure while they favor spontaneity over strict scheduling.
  sports: Sharon Bontrager, an avid walker of the Yarmouth shoreline who enjoys low‑impact tai chi at the senior center, follows the Boston Red Sox and the New England Patriots on television while they
    belong to the local walking club and occasionally joins a senior‑friendly pickleball league in the summer.
  arts: Sharon Bontrager, a watercolor painter of coastal scenes, draws inspiration from Winslow Homer and contemporary Maine artist Ashley Long, listens to folk troubadour Joan Baez while they attend intimate
    gallery openings featuring artists like Gretchen McEwen, and often quotes modernist poet T.S. Eliot in their sketchbooks.
  travel: Sharon Bontrager, who prefers leisurely, loosely planned trips, has cherished a sunrise hike in Acadia National Park and a weekend getaway to Lunenburg, Nova Scotia, and hopes to someday explore
    the Scottish Highlands to trace ancestral roots, traveling with a modest budget and a love for quiet coastal towns.
  culinary: Sharon Bontrager, a proficient home cook, delights in preparing New England clam chowder seasoned with thyme and rosemary from their garden, baking blueberry crumble using wild Maine berries,
    and savoring lobster rolls at the local clam shack while they occasionally experiment with herb‑infused olive oil for salad dressings.
  core: Sharon Bontrager, a curious, competitively spirited 91‑year‑old who blends disciplined creativity with a relaxed, occasionally disorganized approach to life, turning every shoreline walk into a
    lesson in art, history, and herb gardening, they cherish quiet moments of reflection while staying keenly observant of the world around them.
background:
  cultural: Sharon hails from a long‑standing Anglo‑American lineage in coastal Maine. Her ancestors were early New England settlers involved in shipbuilding and farming, a heritage reflected in her deep
    appreciation for maritime history and the region's seasonal rhythms. Growing up in Yarmouth, she absorbed the stoic, self‑reliant ethos of rural New England, while the local community’s emphasis on
    volunteerism and preservation of historic town character shaped her commitment to civic engagement. Her educational journey through public schools and the University of Maine reinforced a value for
    lifelong learning, and her cultural identity blends traditional New England modesty with an openness to artistic and intellectual experimentation.
