  hobbies: '[''Reading (African-American literature & self-help)'', ''Journaling'', ''Walking/Hiking on local trails'', ''Yoga'', ''Cooking Southern cuisine'', ''Listening to R&B and gospel music'', ''Exploring
    productivity apps'', ''Basic graphic design with Canva'', ''Volunteering at church outreach programs'']'
  career_goals: Radiance aims to transition from her current secretary role to an office manager or executive assistant position within the next five years, preferably in a community‑focused nonprofit or
    small business that values flexibility and inclusive culture. She plans to complete her bachelor's degree in Business Administration while earning a Certified Administrative Professional (CAP) credential
    to solidify her expertise. Additionally, she hopes to cultivate a niche in virtual assistance and digital workflow optimization, eventually offering freelance support to small teams. Her long‑term ambition
    includes mentoring new administrative staff, leading efficiency initiatives, and balancing professional growth with a schedule that preserves her personal well‑being.
