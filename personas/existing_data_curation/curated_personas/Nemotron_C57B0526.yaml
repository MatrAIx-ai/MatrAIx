  hobbies: '[''Neighborhood book club organizer'', ''Volunteer event coordinator'', ''Group fitness classes (Zumba, water aerobics)'', ''Gardening (vegetables and herbs)'', ''Cooking coastal-inspired meals'',
    ''Reading leadership and personal development books'', ''DIY home improvement projects'']'
  career_goals: Jeanne aims to leverage her extensive supervisory experience to advance to a store manager role within the next 12‑18 months, with a longer‑term goal of moving into a district‑level management
    position or a corporate training specialist role. She plans to complete a bachelor’s degree in Business Administration to complement her associate’s credentials and to enroll in leadership development
    programs offered by her retailer. Jeanne also hopes to design and implement a mentorship program for new hires at her store, fostering a culture of continuous learning and upward mobility for her team.
