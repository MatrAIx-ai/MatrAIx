  hobbies: '[''Skiing'', ''Snowboarding'', ''Hiking'', ''Yoga'', ''Photography'', ''Travel blogging'', ''Journaling'', ''Reading contemporary fiction'', ''Volunteering at community events'', ''Cooking healthy
    meals'', ''Attending food & wine festivals'']'
  career_goals: Stacey aims to leverage her frontline hospitality experience into a management role within the next three years. She plans to complete a degree in Hospitality Management or Business Administration,
    supplementing her practical knowledge with certifications such as ServSafe and TIPS. Her long-term ambition is to become an operations manager at a premier mountain lodge in Park City, where she can
    shape guest experiences, optimize staff workflows, and foster a supportive, high-performing team culture. Additionally, she is interested in developing a small boutique café that focuses on locally
    sourced, health-conscious fare, combining her love for food, community, and entrepreneurship. Her career trajectory reflects a balance of curiosity—exploring new service concepts—and practicality—building
    sustainable operational systems.
