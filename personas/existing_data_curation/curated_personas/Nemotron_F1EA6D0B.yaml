personas:
  professional: Stacey Tucker, a 22‑year‑old ski‑resort waitress, leverages lightning‑fast POS proficiency, meticulous attention to dietary requests, and a calm, collaborative demeanor to keep high‑tempo
    service seamless while mentoring new staff and eyeing a future operations management role, and they consistently exceed performance metrics.
  sports: Stacey Tucker spends weekends carving powder at Park City Mountain, rides with the Park City Snowboard Club, hikes the Wasatch foothills, practices yoga at the local studio, and they root for
    the Utah Jazz while occasionally following the World Cup alpine skiing circuit.
  arts: Stacey Tucker expresses creativity through mountain landscape photography featured on their travel‑food blog, draws inspiration from Ansel Adams and Bon Iver, devours contemporary fiction by Sally
    Rooney, and they attend seasonal art walks and live acoustic sets at the Park City Arts Festival.
  travel: Stacey Tucker meticulously plans weekend escapes to Colorado’s ski resorts and summer hikes in the Canadian Rockies, dreams of trekking the Swiss Alps and exploring Kyoto’s temple gardens, and
    they use a blend of itinerary apps and handwritten journals to balance adventure with their student‑budget constraints.
  culinary: Stacey Tucker crafts health‑focused, seasonal meals like quinoa‑beet salads with locally sourced kale and honey, masters a solid intermediate skill set in the kitchen, frequently hosts dinner
    evenings for friends, and they delight in experimenting with gluten‑free, nutrient‑dense recipes that reflect their love for mountain‑fresh ingredients.
  core: Stacey Tucker blends organized ambition with a laid‑back love of the outdoors, obsessively plans every shift and itinerary, yet they habitually forget to water houseplants, and they always carry
    a reusable water bottle as a silent reminder of their eco‑mindful habit.
background:
  cultural: Stacey was raised in a predominantly white, middle-class family in the Mountain West, where outdoor recreation and a strong sense of community were central to everyday life. Her upbringing emphasized
    self-reliance, education, and volunteerism, values often reflected in the region’s culture of service and neighborliness. Frequent family trips to the nearby ski resorts cultivated an early appreciation
    for winter sports and the tourism economy of places like Park City. While her cultural roots align with broader mainstream American traditions, the local emphasis on nature, hospitality, and cooperative
    community initiatives has shaped her personable, organized, and resilient character.
attributes:
  skills: '[''Customer service'', ''Order taking'', ''POS system operation'', ''Food safety compliance'', ''Schedule coordination'', ''Team communication'', ''Conflict resolution'', ''Multitasking in high-pressure
