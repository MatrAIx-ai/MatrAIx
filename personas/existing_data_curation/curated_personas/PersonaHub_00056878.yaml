persona_description: 'A professor in the field of computer science who specializes in teaching computer programming and computational thinking. She has piloted a new course called Computer Science 10: The
  Beauty and Joy of Computing, which is a lab-based class in which students learn the basics of programming that can be applied to any field of study. The course has received significant recognition since
  its inception and is now being offered as a part of the UC Online Instruction Pilot Project, an initiative designed to integrate online courses for credit in the undergraduate curriculum. The professor
  believes that computer programming is a new form of literacy that may soon join the ranks of reading and writing skills and that it is crucial for people to be not just consumers but producers of their
  futures.'
