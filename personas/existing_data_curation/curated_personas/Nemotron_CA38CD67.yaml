    and cooperation'', ''Adherence to safety and OSHA guidelines'', ''Time management and flexible scheduling'']'
  hobbies: '[''Listening to R&B, soul, and hip‑hop music'', ''Playing pickup basketball at the community park'', ''Following the Miami Heat and NBA games'', ''Cooking Southern and Caribbean-inspired meals'',
    ''Watching movies (comedies and action)'', ''Reading short stories and comic books'', ''Volunteering for church community clean‑up events'']'
  career_goals: Frank aims to advance within the facilities management field. In the short term, he plans to obtain his GED and complete a certification in commercial cleaning or facilities maintenance,
    positioning himself for a lead janitor or crew supervisor role at his current workplace. Over the longer term, he envisions overseeing a team of cleaners, handling scheduling and training, or eventually
    launching his own small cleaning business serving local businesses and residential complexes. He also seeks greater financial stability to support his family and give back more to his community.
