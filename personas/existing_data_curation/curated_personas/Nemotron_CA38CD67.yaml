personas:
  professional: Frank Stafford is a facilities maintenance specialist who leverages their hands‑on cleaning expertise, OSHA know‑how, and strong interpersonal skills to keep building occupants comfortable,
    while their preference for structure balances a habit of occasionally stretching schedules to fit spontaneous community clean‑up projects.
  sports: Frank Stafford enjoys pickup basketball games at the neighborhood park with the South Miami Hoops Club, follows the Miami Heat passionately, occasionally joins the local adult league’s community
    soccer sessions, and they maintain a casual fitness routine that mixes three‑day basketball drills with weekend beach jogs.
  arts: Frank Stafford’s evenings are filled with classic R&B and soulful hip‑hop playlists featuring Marvin Gaye, D'Angelo, A Tribe Called Quest, and Jill Scott, they unwind with comedies like Superbad
    and action blockbusters such as Guardians of the Galaxy, and they dive into comic books ranging from Spider‑Man to the graphic novel Saga, feeding their love of rhythm and storytelling.
  travel: Frank Stafford prefers budget‑friendly road‑trip adventures, having driven to New Orleans for its music and gumbo, snorkeled in the Florida Keys, vacationed in the Dominican Republic’s beaches,
    and they now plan a getaway to Asheville, North Carolina’s craft‑brew scene and hiking trails, using Airbnb and discount flight alerts to stretch their savings.
  culinary: Frank Stafford loves cooking simple yet flavorful Southern and Caribbean dishes like jerk chicken with scotch bonnet peppers, shrimp étouffée seasoned with paprika and okra, collard greens sautéed
    with smoked turkey, and plantain fritters drizzled with honey, often inviting neighbors over for communal feasts seasoned with garlic, coconut milk, and fresh lime.
  core: Frank Stafford blends a structured work ethic with a laid‑back love for basketball, soulful music, and home‑cooked comfort food, navigating life with reliable routines, occasional budgeting slips,
    and they keep a community‑first mindset.
background:
  cultural: Frank is an African‑American from Opa Locka, a community with deep roots in South Florida’s black culture. He grew up attending a local Baptist church where gospel music, fellowship, and community
    service shaped his values of cooperation and harmony. His cultural identity reflects the rich traditions of African‑American music, food, and family gatherings, while also being influenced by the neighboring
    Caribbean and Latino communities that add diverse flavors to local celebrations. Frank takes pride in the resilience and solidarity of his community, often participating in local festivals, church events,
    and neighborhood block parties.
attributes:
  skills: '[''Floor care (sweeping, mopping, carpet cleaning)'', ''Restroom sanitation and restocking'', ''Safe handling and mixing of cleaning chemicals'', ''Operation of industrial cleaning equipment
