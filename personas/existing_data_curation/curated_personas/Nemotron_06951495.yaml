  hobbies: '[''Listening to reggaeton and Latin pop'', ''Sketching and digital illustration'', ''Cooking Guatemalan dishes with family'', ''Photography of street art and local parks'', ''Creating TikTok
    videos about food and culture'', ''Reading graphic novels'', ''Playing mobile puzzle games'']'
  career_goals: Yailyn aims to complete her high school education, possibly through a GED, and then pursue a vocational program in culinary arts. She dreams of opening a small family‑run eatery that serves
    authentic Guatemalan street food in Trenton, providing a gathering place for the local Latino community. In the meantime, she hopes to work part‑time as a kitchen assistant or in a community center,
    using her bilingual skills to help other immigrant teens navigate school resources. Over the long term, she envisions becoming a community outreach coordinator who blends her love for food, culture,
    and helping others.
