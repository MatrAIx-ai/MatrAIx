personas:
  professional: David Todd is a 27‑year‑old diesel‑tech specialist whose hands‑on mastery of J1939 diagnostics, MIG/TIG welding, and hydraulic repairs fuels their ambition to earn ASE certification, launch
    a boutique shop that fuses high‑performance diesel work with custom paint and interior art, and mentor junior mechanics despite a habit of spontaneous project‑hopping that sometimes derails their schedule.
  sports: David Todd enjoys seasonal hunting trips for whitetail deer in the piney woods, early‑morning bass fishing on Lake Sam Rayburn, follows the Dallas Cowboys and the Texas Longhorns football teams
    loyally, hits the gym for occasional weightlifting between truck jobs, and participates in a local car‑club’s weekend rugby scrimmage while preferring the spontaneity of an impromptu pickup basketball
    game at the community center over structured workouts.
  arts: David Todd channels his love for music by playing lead guitar in a community jam band that riffs on Stevie Ray Vaughan and The Black Keys, sketches sweeping Hill Country sunsets in a weathered sketchbook,
    draws inspiration from muralist Jason J. Torres for his truck art projects, and attends the East Texas Music & Arts Festival each spring to soak up performances by Willie Nelson and local folk singers,
    all of which fuel his spontaneous creativity.
  travel: David Todd prefers road‑tripping in his refurbished 1965 Chevrolet C10, has already explored Austin’s live‑music scene, camped under the stars in Big Bend National Park, dreams of a pilgrimage
    to Nashville’s Country Music Hall of Fame, and often books last‑minute Airbnb cabins near Lake Texoma for weekend fishing getaways, balancing a modest travel budget with a penchant for spontaneous detours.
  culinary: David Todd cooks with a seasoned hand, regularly smoking brisket with a tangy mustard glaze and whipping up hearty chili con carne loaded with pinto beans, chipotle peppers, and cumin, enjoys
    grilling the trout he catches on the lake with lemon‑butter sauce, pairs meals with a cold craft IPA from a local brewery, and feels most at home when sharing a plate of homemade cornbread with friends
    at the community center.
  core: David Todd is a spontaneously creative diesel mechanic who juggles grease‑stained hands, a guitar strap, and a restless mind, often trading a deadline for a midnight jam session or a new EV‑conversion
    experiment while battling a chronic worry about unfinished projects.
background:
  cultural: David grew up in Mount Pleasant, a small town in East Texas, within a working‑class white community that values self‑reliance, hospitality, and close‑knit family ties. His family has a tradition
    of hands‑on trades, and he was raised around diesel trucks and farm equipment, which fostered his early interest in mechanics. The local culture—characterized by country music, Friday‑night football,
    church gatherings, and county fairs—shaped his outgoing, sociable demeanor. Though he never completed a formal high‑school diploma, he absorbed practical knowledge through apprenticeships and community
    mentorships. The Texan ethos of “getting the job done” combined with exposure to the region’s burgeoning art scene—such as murals in downtown Mount Pleasant and regional music festivals—has cultivated
    his appreciation for creativity alongside his technical skills.
attributes:
  skills: '[''Diesel engine diagnostics'', ''Heavy vehicle maintenance'', ''Engine overhauls'', ''Fuel system troubleshooting'', ''Emission control system repair'', ''Welding (MIG/TIG)'', ''Hydraulic system
    repair'', ''Electrical wiring and troubleshooting'', ''Use of diagnostic scanners (OBD-II, J1939)'', ''Preventive maintenance planning'', ''Parts inventory management'', ''Custom vehicle modifications'',
    ''Team leadership and training'', ''Problem solving under time pressure'']'
  hobbies: '[''Playing guitar'', ''Attending live music concerts'', ''Sketching and painting'', ''Restoring classic trucks'', ''Participating in car meets'', ''Hunting and fishing'', ''Volunteering at community
    center (bike repair workshops)'', ''Racing video games'', ''Exploring electric vehicle conversions'', ''DIY woodworking projects'']'
  career_goals: David aims to become a master diesel technician with ASE certification and eventually open his own specialty shop that blends high‑performance diesel work with custom aesthetic modifications,
    such as bespoke paint jobs and interior redesigns. He plans to earn a GED and possibly attend a community‑college program in automotive technology to solidify his theoretical knowledge. In the next
    five years, he hopes to lead a team of mechanics at a regional fleet‑service center, develop a reputation for innovative problem‑solving, and launch a weekend “art‑meets‑mechanics” workshop where local
    artists and DIY enthusiasts collaborate on vehicle art projects. He also aspires to improve his time‑management skills, reduce work‑related stress, and achieve a healthier work‑life balance.
