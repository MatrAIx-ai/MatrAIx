persona_description: A researcher at the Berkeley Lab who specializes in the development of organic solar cells, particularly those that are both cheaper and have comparable efficiency to standard solar
  cells. The researcher has created a new type of solar cell made of nanowires consisting of cadmium sulfide with a copper sulfide layer added via solution chemistry, and aims to increase the efficiency
  of these cells by changing the amount of copper sulfide shell material and achieving the ten-percent efficiency needed for commercial viability.
