personas:
  professional: Peter Wadle, a 46‑year‑old master carpenter turned boutique workshop founder, blends traditional joinery with CNC precision, orchestrates projects with meticulous planning, and leverages
    their sociable charisma to win client commissions while competitively outshining local makers.
  sports: Peter Wadle, a dedicated hiker of nearby state parks and a member of the Decatur Trailblazers running club, follows the Atlanta Falcons and Atlanta Braves loyally, and fits in weekly gym sessions
    and weekend climbs to stay fit for the physically demanding carpentry work.
  arts: Peter Wadle channels their abstract imagination through oil paintings inspired by Mark Rothko, acoustic guitar sessions covering Bob Dylan and contemporary folk artists, and photography of downtown
    architecture reminiscent of Edward Hopper, while regularly attending local gallery openings and the Decatur Arts Festival.
  travel: Peter Wadle prefers meticulously planned road trips that blend craft‑related workshops in Asheville, NC and design tours in Copenhagen, while they unwind at lakeside cabins in the Adirondacks
    and dream of a future retreat in the Italian countryside to source sustainable wood.
  culinary: Peter Wadle, an enthusiastic home brewer, enjoys pairing their craft ales with smoky brisket, wood‑fire pizza topped with fresh rosemary and heirloom tomatoes, and often experiments with barrel‑aged
    sauces that feature dark malt and charred onions.
  core: Peter Wadle is a charismatic, methodical carpenter‑artist who balances a competitive drive with a penchant for showmanship, occasionally over‑indulging in vintage tools and craft beer while relentlessly
    pursuing sustainable, abstract design.
background:
  cultural: Peter grew up in Decatur, a Midwestern city rooted in manufacturing and agricultural traditions. His family, of predominantly German‑Irish descent, emphasized hard work, self‑reliance, and community
    involvement, values common in the region. He was raised in a Protestant (Lutheran) household that celebrated modesty and hospitality, which shaped his sociable but measured demeanor. The local arts
    scene—exhibited at the Decatur Cultural Center and annual Riverfest—exposed him early to artistic expression, fostering his imaginative streak. While his upbringing instilled a pragmatic, organized
    approach to life, the blend of Midwestern humility with a curiosity for novelty drives his pursuit of both functional craftsmanship and abstract design.
