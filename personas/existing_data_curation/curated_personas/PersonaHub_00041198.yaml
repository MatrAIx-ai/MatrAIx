persona_description: A prohibition agent from the Prohibition Bureau of the Department of Justice during the Prohibition era in the United States. The agent was known for their fearless nature, their ability
  to infiltrate and dismantle bootlegging operations, and their reputation for not being easily corrupted by alcohol. They were part of the Untouchables and played a significant role in the investigation
  and arrest of Al Capone, earning them the nickname "The Untouchables". Despite their efforts, they were not seen as positive people by the public and were accused of killing innocent bystanders and wire
  tapping phones.
