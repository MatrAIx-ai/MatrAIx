  hobbies: '[''Gardening'', ''Historical fiction reading'', ''Puzzle solving (crosswords, Sudoku)'', ''Cooking Vietnamese cuisine'', ''Volunteer filing and event organization at senior center'', ''Walking
    local trails'']'
  career_goals: Over the next few years, Ngoc aims to transition into a senior billing supervisor role where she can lead a small team, design more efficient posting protocols, and achieve a measurable
    reduction in claim denial rates. She plans to earn the Certified Professional Coder (CPC) credential and to mentor junior colleagues, thereby ensuring the department’s accuracy standards remain high
    even as she approaches retirement. Ultimately, she seeks to secure a stable financial foundation for her family while leaving a legacy of process excellence.
