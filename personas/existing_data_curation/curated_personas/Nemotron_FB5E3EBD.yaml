  career_goals: Kyo aspires to progress into senior operational leadership within the technology sector, aiming to become a Director of Operations or Chief Operating Officer where he can shape large‑scale,
    efficient, and resilient processes. He seeks to lead initiatives that integrate data analytics into everyday decision‑making, mentor emerging engineers, and cultivate a culture of disciplined reliability.
    Over the long term, he also envisions launching a boutique consultancy that helps mid‑size tech firms streamline their workflows and adopt sustainable best practices.
