  hobbies: '[''Social dancing (funk/R&B/hip‑hop)'', ''Cooking Southern soul food'', ''Gardening and urban farming'', ''Participating in community 5K runs'', ''Recreational basketball'', ''Board game nights
    with friends'', ''Yoga and meditation for stress relief'', ''Volunteering at youth mentorship programs'', ''Attending live music and cultural festivals'']'
  career_goals: Marlene aims to advance from first‑line supervisor to store manager within the next two years, then to a district manager role overseeing multiple locations. She envisions creating a regional
    training program that blends her education background with retail best practices, emphasizing both structured learning and on‑the‑fly adaptability. Long‑term, she hopes to launch a consultancy that
    helps retailers develop inclusive, high‑performing teams while also advocating for mental‑health resources and diversity initiatives within the industry.
