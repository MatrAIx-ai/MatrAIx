  career_goals: Mohamed aspires to become a freelance multimedia storyteller who merges his love for visual arts with socially resonant narratives. In the short term, he aims to complete a bachelor’s degree
    in Media Arts or Communications while securing paid freelance gigs in graphic design and video editing to fund his studies and expand his portfolio. Over the next five years, he hopes to launch an independent
    creative collective that produces short films, documentary photography, and social‑media series highlighting underrepresented voices in the African American community. He also envisions partnering with
    local cultural institutions on curatorial projects that challenge conventional narratives and organizing pop‑up exhibitions and community art workshops in Cincinnati. Ultimately, he seeks a sustainable
    career that balances financial independence with a commitment to artistic activism and community empowerment.
