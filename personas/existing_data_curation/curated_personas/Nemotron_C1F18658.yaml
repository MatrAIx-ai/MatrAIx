    pressure", "Adaptability and flexibility", "Art and heritage protection assessment", "Conversational Spanish"]'
  hobbies: '["Visiting art galleries and museums", "Photography (street art and coastal landscapes)", "Watercolor painting", "Hiking coastal trails", "Yoga and meditation", "Reading contemporary fiction,
    philosophy, and true‑crime", "Cooking international recipes", "Attending live music and theater", "Volunteering with youth art programs"]'
  career_goals: Taylor aims to advance to a supervisory role within her municipal protective services department, where she can design and lead training programs that integrate community‑based policing
    with cultural sensitivity. She envisions establishing a specialized unit focused on safeguarding cultural institutions such as museums and historic sites in San Diego County. To support these ambitions,
    she plans to pursue a Master’s degree in Public Administration and eventually mentor younger officers, shaping policy that promotes safety, inclusivity, and respect for the region’s artistic heritage.
