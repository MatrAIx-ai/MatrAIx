personas:
  professional: Taylor Boulet, a seasoned protective service officer in municipal security, leverages crisis‑intervention expertise, first‑responder certification, and a deep cultural competency honed through
    years of art gallery volunteering to design community‑focused training that blends de‑escalation tactics with sensitivity to heritage sites.
  sports: Taylor Boulet enjoys weekend beach volleyball at La Jolla and follows the Los Angeles Dodgers, the San Diego Wave FC, and the LA Galaxy, while also participating in a local yoga studio’s sunrise
    sessions and occasionally running the annual Pacific Coast Marathon.
  arts: Taylor Boulet regularly visits the Museum of Contemporary Art San Diego, attends street‑art tours in the Mission District to study works by Banksy and Shepard Fairey, and lights up evenings with
    live performances by the San Diego Symphony and indie band Tame Impala, drawing inspiration for watercolor cliff scenes.
  travel: Taylor Boulet prefers immersive coastal adventures, having explored the cliffs of Big Surf, the historic streets of Oaxaca, and the cherry‑blossom gardens of Kyoto, and they dream of a road‑trip
    along the Scottish Highlands to photograph ancient castles.
  culinary: Taylor Boulet loves cooking globally‑inspired meals, often whipping up Thai green curry with lemongrass and coconut milk, Mexican chilaquiles topped with crema and avocado, and Japanese ramen
    broth seasoned with miso and kombu, while their kitchen skill sits between confident sautéer and occasional take‑out savior.
  core: Taylor Boulet is a curiosity‑driven protector who blends art appreciation with strategic flexibility, juggling occasional disorganization with a steady commitment to community safety and a habit
    of humming Tame Impala during incident reports.
background:
  cultural: Taylor grew up in a middle‑class suburban setting in Orange County, California, within a family of European descent—primarily German and Irish roots—identifying as white American. Raised in
    the culturally diverse environment of Southern California, she absorbed influences from neighboring Mexican, Asian, and Pacific Islander communities, which deepened her appreciation for varied artistic
    traditions. Her upbringing emphasized education, civic duty, and community service, fostering a blend of traditional American values and progressive, multicultural attitudes that shape her personal
    and professional outlook.
attributes:
  skills: '["Crisis intervention", "De-escalation techniques", "First responder medical aid", "Firearms safety and qualification", "Surveillance and CCTV monitoring", "Incident reporting and documentation",
