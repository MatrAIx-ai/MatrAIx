  career_goals: Although retired, Nancy aims to preserve her family legacy by compiling her favorite recipes into a personal cookbook and writing a memoir that captures her post‑war upbringing and community
    experiences. She aspires to mentor younger volunteers at the local senior center, serve on the borough’s senior advisory board, and continue learning by taking beginner computer classes to stay connected
    with her family. Maintaining physical health through gardening and daily walks is also a priority, as is ensuring her family’s stories and values are passed on to future generations.
