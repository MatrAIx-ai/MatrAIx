  hobbies: '["Sketching", "Digital illustration", "Freestyle rap", "Hip‑hop dance", "Community theater", "Playing basketball", "Bike riding", "Listening to jazz, R&B, and gospel music", "Volunteering at
    the community library", "Creating short videos for TikTok"]'
  career_goals: Lamarcus aspires to channel his love for art and people into a career as a multimedia storyteller and community creative producer. He envisions attending a high‑school arts magnet program,
    then studying graphic design, film, or digital media at a university where he can blend visual art, video, and social advocacy. His long‑term ambition is to lead creative campaigns for non‑profit organizations
    that highlight underrepresented voices in the South, and eventually to host a culturally focused media platform that celebrates Black Southern art, music, and history.
