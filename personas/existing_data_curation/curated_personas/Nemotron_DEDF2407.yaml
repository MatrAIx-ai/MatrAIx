personas:
  professional: Lamarcus Cofield is a teen visual storyteller who blends sketching, digital illustration, freestyle rap, and micro‑theater performance to create community‑focused multimedia projects, leveraging
    their sociable, talkative nature to lead collaborative art‑themed events at the local library.
  sports: Lamarcus Cofield fuels their love for pickup basketball at Tallahassee's Central Park and weekend bike rides through historic neighborhoods, occasionally cheering for the Florida State Seminoles
    while favoring spontaneous, unstructured workouts over regimented training plans.
  arts: Lamarcus Cofield channels their curiosity into sketching downtown vistas, digital illustration on a tablet, freestyle rap battles, hip‑hop dance crews, and community theater improv, drawing inspiration
    from jazz greats like Miles Davis, R&B icons such as Erykah Badu, and gospel champ Kirk Franklin, while curating mixtapes and TikTok showcases that celebrate local art scenes.
  travel: Lamarcus Cofield prefers spontaneous, low‑budget adventures, using their bike to explore Tallahassee's historic districts, dreaming of a weekend trek to New Orleans for its jazz heritage and a
    quick visit to Savannah's cobblestone streets, planning trips on a whim with friends while balancing a limited allowance.
  culinary: Lamarcus Cofield enjoys crafting quick, flavor‑packed meals like shrimp‑and‑grits, a fried chicken sandwich, and fruit‑laden smoothies while sketching, often snacking on spicy peanuts and homemade
    granola bars, and occasionally indulges in local food‑truck tacos such as al pastor, reflecting their love for bold, Southern‑influenced comfort food.
  core: Lamarcus Cofield is a relentlessly curious, socially magnetic teen who merges art, music, and movement into daily expression, remains profoundly calm even amid chaos, yet habitually misplaces sketchbooks
    and forgets homework in favor of impromptu performances.
background:
  cultural: Born and raised in Tallahassee’s vibrant African‑American community, Lamarcus draws on a rich cultural tapestry that blends Southern traditions with contemporary Black urban culture. Family
    gatherings often feature gospel singing and soul food recipes passed down through generations, while neighborhood block parties celebrate Juneteenth, local jazz festivals, and spoken‑word poetry. He
    attends a local church that emphasizes service and uplift, reinforcing his collaborative and considerate nature. The city's legacy of civil‑rights activism and its growing arts scene have shaped his
    appreciation for storytelling as a tool for empowerment, and he frequently participates in community murals and youth art programs that honor his heritage.
attributes:
  skills: '["Verbal communication", "Storytelling", "Graphic illustration", "Digital media editing", "Improvisational performance", "Peer mediation", "Team collaboration", "Basic coding (Scratch)", "Music
