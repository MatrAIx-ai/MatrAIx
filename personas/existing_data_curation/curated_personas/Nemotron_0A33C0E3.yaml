personas:
  professional: Freddie Trammell, a seasoned marine engineer and naval architect, leverages advanced CAD and finite-element analysis to design low-emission autonomous vessels while applying a meticulous
    yet flexible project management style that balances competitive ambition with an artistic eye for hull aesthetics, aiming now for senior leadership as a Chief Naval Architect.
  sports: Freddie Trammell runs ten-kilometer routes through the Flint Hills, hikes the Tallgrass Prairie on weekends, competes in local half-marathons, belongs to the Kansas City Trailblazers Running Club,
    and passionately follows the Kansas City Chiefs and Kansas City Royals, balancing a competitive drive with the personal goal of completing a marathon next year.
  arts: Freddie Trammell channels artistic energy into watercolor maritime scenes reminiscent of Winslow Homer, captures ship silhouettes in the style of Ansel Adams' black-and-white photography, curates
    a small collection of vintage nautical maps, attends Manhattan gallery openings featuring contemporary marine artists such as Maya Lin, and finds solace in listening to Brian Eno's ambient compositions
    while sketching.
  travel: Freddie Trammell plans trips with engineering precision, favoring itineraries that blend coastal exploration - like sailing the Greek Cyclades and photographing historic shipyards in Norway -
    with quiet retreats to the Kansas Flint Hills for weekend hikes, budgeting travel through a dedicated high-yield savings account while occasionally splurging on a boutique yacht charter in the Caribbean.
  culinary: Freddie Trammell enjoys a seafood-centric palate, favoring grilled branzino with lemon-dill sauce, classic bouillabaisse, and sushi rolls featuring ikura and uni, cooks at a moderate level using
    a cast-iron skillet and sous-vide for precision, and often pairs meals with a glass of crisp Albariño while sketching still-life compositions of sea-salted onions.
  core: Freddie Trammell is a 47-year-old marine architect who fuses engineering rigor with watercolor seas, runs the Flint Hills to quell chronic worry, and obsessively tracks both ship designs and stock
    tickers, often sacrificing sleep for a perfect hull curve.
background:
  cultural: Freddie grew up in a modest, agrarian community in central Kansas, shaped by the Midwestern values of self‑reliance, practicality, and community involvement. His family tradition is rooted in
    a Protestant work ethic and seasonal participation in local fairs and county events. While his upbringing emphasized modesty and a strong sense of duty, his career in marine engineering has exposed
    him to international maritime cultures, fostering a respect for diverse customs and global collaboration. Living in Manhattan, Kansas—a college town—has broadened his exposure to academic and artistic
    circles, allowing him to blend his Midwestern heritage with a curiosity for art, new ideas, and unconventional thinking.
attributes:
  skills: '[''Marine structural design'', ''Naval architecture'', ''Hydrodynamic performance analysis'', ''CAD modeling (AutoCAD, Rhino, SolidWorks)'', ''Finite element analysis (ANSYS, NASTRAN)'', ''Ship
    stability and safety assessment'', ''Maritime regulations compliance (IMO, USCG)'', ''Classification society standards (DNV, ABS)'', ''Sustainable ship design (green propulsion, LNG, hydrogen)'', ''Project
    management and budgeting'', ''Risk assessment and mitigation'', ''Technical writing and documentation'', ''Data analysis (MATLAB, Python)'', ''Presentation and communication skills'', ''Aesthetic design
    integration'']'
  hobbies: '[''Watercolor painting of maritime scenes'', ''Scale model ship building'', ''Reading (maritime history, naval engineering, science-fiction)'', ''Chess (competitive)'', ''Long-distance running
    and hiking'', ''Photography (ships, coastal landscapes)'', ''Attending small art gallery openings'', ''Participating in a local engineering‑focused book club'']'
  career_goals: Freddie aims to transition into senior leadership within the marine engineering sector, targeting roles such as Chief Naval Architect or Director of Sustainable Ship Design at a major shipyard
    or consultancy. He aspires to lead cutting‑edge projects that develop low‑emission vessels, autonomous maritime platforms, and innovative hull forms that cut fuel consumption. Parallel to his professional
    ambition, he plans to obtain his Professional Engineer license and a specialization in marine environmental engineering. In the longer term, Freddie envisions establishing his own boutique consulting
    firm that merges technical excellence with artistic ship aesthetics, offering design services to luxury yacht builders and eco‑focused commercial operators. He also seeks to mentor junior engineers,
    sharing his competitive drive while fostering a supportive, low‑stress team culture.
