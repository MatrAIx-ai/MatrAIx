persona_description: A paleoceanographer and palaeoecologist who specializes in the study of the East Antarctic Margin and its marine varves. They are interested in the cryospheric and palaeoceanographic
  changes associated with the rapid retreat of the glacial ice sheet across the Mac.Robertson Shelf. They have a keen interest in understanding the seasonal and long-term information on the cryospheric
  and palaeoceanographic changes associated with the deglaciation in the form of diatom-rich, continuously laminated (varved) sediments from the East Antarctic Margin. They are also interested in assessing
  cryospheric-oceanographic variation and, therefore, the local and regional response to this period of rapid climate change.
