  career_goals: Frank aims to blend his clinical practice with innovative, low‑stress telehealth services that allow him to work from quiet environments. He hopes to lead a small community health initiative
    in Virginia Beach focused on preventative care for chronic conditions, while publishing pragmatic research on patient‑centered protocols. Over the next five years he plans to develop a flexible, technology‑driven
    practice model that prioritizes patient harmony and physician well‑being, and eventually become a mentor for residents who share his preference for thoughtful, solitary work.
