persona_description: A materials scientist who specializes in the study of nanoparticle organization, particularly in the field of polymer ligand-induced autonomous sorting and reversible phase separation
  in binary particle blends. Their research interests include the design and optimization of nanomaterials for various applications, such as sensors, solar panels, and electronic devices. They have developed
  a new approach for controlling the organization of fluorescent particles called quantum materials, which could result in brighter, more energy-efficient television and smartphone screens. Their research
  team plans to explore the organization of new nanoparticle systems, including quantum dot materials, to improve the efficiency of sensors and solar panels.
