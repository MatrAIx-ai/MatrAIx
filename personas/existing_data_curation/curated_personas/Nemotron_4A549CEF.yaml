  hobbies: '["LEGO building and design", "Small‑sided soccer games", "Sticker collecting (space/animals)", "Reading adventure chapter books", "Kids puzzles (simple Sudoku, crosswords)", "Educational videos
    on space and engineering", "Basic block coding (Scratch Jr.)"]'
  career_goals: Javier dreams of becoming an astronaut or aerospace engineer because he loves the precise, step‑by‑step nature of space missions and building rockets. He also imagines designing bridges
    or robots as a civil or mechanical engineer, reflecting his desire to create structured, useful things. His competitive streak leads him to aspire to play soccer in youth leagues and possibly become
    a professional player one day. Additionally, he is determined to master both Spanish and English fully, so he can help his community and bridge cultural gaps.
