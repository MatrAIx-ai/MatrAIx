personas:
  professional: Javier Davila, a budding junior LEGO architect, combines meticulous planning, methodical brick assembly, and nascent Scratch Jr. coding to transform step‑by‑step manuals into original designs,
    thriving on predictable structure while quietly leading small building groups.
  sports: Javier Davila, a focused small‑sided soccer player, dominates the midfield for the Harlingen Youth Soccer Club, idolizes the disciplined play of the Houston Dynamo and cheers for the Houston Astros
    during family gatherings, preferring the predictability of set positions and a competitive edge over cooperative passing drills.
  arts: Javier Davila, a reserved creative, spends evenings arranging space‑themed stickers designed by NASA artist Chris Burleigh, drawing rocket blueprints in the style of Pixar’s Pete Docter, and humming
    classic boleros by Luis Miguel, weaving their love of structure into artistic expression.
  travel: Javier Davila, an organized young explorer, prefers family‑planned road trips to nearby South Padre Island’s beach dunes and the vibrant colors of San Antonio’s River Walk, while dreaming of a
    future excursion to the Space Center in Houston and a cultural visit to Mexico City’s historic plazas, balancing excitement with a clear itinerary.
  culinary: Javier Davila, a meticulous junior chef, loves measuring out corn masa, shredded cheddar, and seasoned ground beef to assemble homemade tacos al pastor, eagerly mixes flour, eggs, and pancetta
    for spaghetti carbonara after watching cooking videos, and proudly assists in drawing up ingredient lists for family tamales, always adhering to the step‑by‑step recipe.
  core: Javier Davila, a methodical 7‑year‑old builder, balances a love for orderly LEGO creations with a competitive spark on the soccer field, obsessively arranging space stickers in alphabetical order
    while occasionally neglecting bedtime for a new puzzle.
background:
  cultural: Javier grows up in a Mexican‑American household in Harlingen, Texas, where Spanish is spoken at home and English at school, giving him a bilingual upbringing. His family celebrates Mexican traditions
    such as Día de los Muertos and Cinco de Mayo, with homemade tamales, tacos, and pique nique gatherings, while also participating in American holidays like Thanksgiving and the Fourth of July. He attends
    a bilingual elementary school that emphasizes both cultures. The close‑knit, family‑oriented community in Cameron County influences his values of reliability and respect for routines, and the border
    region’s mix of cultures exposes him to a blend of Mexican and Texan music, foods, and community events.
attributes:
  skills: '["Reading comprehension (grade 2)", "Basic arithmetic (addition/subtraction)", "Spanish (native speaker)", "English literacy development", "Following multi‑step instructions", "LEGO and puzzle
