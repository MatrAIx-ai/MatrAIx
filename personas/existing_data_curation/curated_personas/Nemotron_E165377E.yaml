personas:
  professional: Felicity Pittman, a veteran mechanical assembler with over 25 years of hands‑on fabrication experience, blends meticulous technical skill in CNC operation and quality inspection with an
    innate curiosity for design, positioning themselves as a pragmatic leader eager to mentor crews and champion visually appealing, functional solutions on the shop floor.
  sports: Felicity Pittman follows the Tampa Bay Buccaneers and the Tampa Bay Lightning with devoted Sunday rituals, they participate in the Lee County Cycling Club's dawn rides and the Cape Coral Paddle
    Club's kayak sessions, and they balance a love for low‑impact fitness like pickleball with occasional strength training to manage osteoarthritis.
  arts: Felicity Pittman immerses themselves in the Cape Coral arts scene, regularly attending gallery openings featuring works by Georgia O'Keeffe reproductions and local muralist Miriam Torres, singing
    at open‑mic nights with a repertoire that includes Bon Iver and Johnny Cash, and performing in community theater productions of Arthur Miller plays, which together nourish their creativity and inform
    their metal‑and‑wood sculptures.
  travel: Felicity Pittman combines spontaneous road trips along the Gulf Coast—such as sunrise drives to the Everglades, weekend getaways to Key West and Savannah—with carefully budgeted cultural tours
    of New Orleans and the historic streets of Barcelona, and they favor modest boutique B&Bs that let them sketch scenery during relaxed evenings.
  culinary: Felicity Pittman, an intermediate home chef, delights in cooking fresh Gulf seafood such as grilled grouper with lemon‑herb butter, shrimp ceviche with lime and mango, and a creamy sea‑scallop
    bisque seasoned with local mangrove salt and fresh basil, and they often pair these dishes with crisp Sauvignon Blanc while entertaining friends at their garden patio.
  core: Felicity Pittman is a pragmatic, curious tinkerer who balances a steady manufacturing career with a thriving side hustle of handcrafted metal‑and‑wood art, all while nurturing community ties through
    theater, birdwatching, and weekend paddle‑boarding—a schedule occasionally thrown off by their habit of midnight sketching sessions.
background:
  cultural: Felicity is a White American who grew up in a modest, working‑class family in the Midwest before relocating to Cape Coral, Florida in her late twenties. Her upbringing emphasized hard work,
    self‑reliance, and community cooperation, values that have guided her throughout her career and personal life. Living in the Gulf Coast region, she embraces the relaxed, outdoor‑oriented lifestyle typical
    of Southwest Florida, while also appreciating the cultural diversity introduced by the area’s tourism and longtime residents. Her divorce and subsequent independence have reinforced her pragmatic outlook
    and her commitment to personal growth and artistic exploration.
attributes:
  skills: '["Mechanical assembly", "Blueprint reading", "Quality inspection", "Hand tool operation", "Power tool operation", "Basic CNC machining", "Troubleshooting equipment", "Woodworking", "Inventory
