  hobbies: '["Art gallery visits", "Painting", "DIY woodworking", "Birdwatching", "Gardening", "Photography", "Cooking seafood", "Community theater", "Volunteering at art fairs"]'
  career_goals: Felicity aims to transition from a line assembler to a supervisory role where she can mentor newer workers and shape production processes. She plans to earn certifications in CNC machining
    and welding within the next two years and to enroll in an industrial design elective at a nearby community college. Parallel to her career progression, she hopes to launch a small side venture producing
    handcrafted metal‑and‑wood art pieces for local markets and online, merging her technical expertise with her love of art. Ultimately, she envisions a future where she can balance a stable supervisory
    position with a thriving creative business, while also giving back to the community through vocational workshops.
