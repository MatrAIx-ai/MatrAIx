  career_goals: Katherine hopes to reenter the workforce part‑time in a role that leverages her sociable nature, such as a community outreach coordinator for a Nashville nonprofit or by launching a home‑based
    catering service that specializes in Southern comfort food. She is also considering obtaining a peer‑support or counseling certificate to formalize her ability to help others manage anxiety. Long‑term,
    she aims to build a flexible, modest income stream that lets her stay socially engaged while preserving the freedom she values.
