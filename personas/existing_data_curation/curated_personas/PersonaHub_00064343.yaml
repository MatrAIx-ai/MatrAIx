  identify objects in the sky, and are familiar with the limitations of detecting small objects that are fast, cold, and emit little radiation. They have a keen interest in studying the dynamics and behavior
  of meteoroids and comets, and are often involved in research and development of new methods for detecting and tracking these objects.
