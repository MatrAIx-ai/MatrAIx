personas:
  professional: Jeannie Anderson, a seasoned engineering technologist with expertise in mechanical‑electrical systems integration, leverages 3D CAD, PLC programming and Python‑based data acquisition to
    lead interdisciplinary prototype teams, infusing abstract art aesthetics into sustainable product designs while mentoring junior staff, and they consistently champion user‑experience in every project.
  sports: Jeannie Anderson, an avid urban hiker on the Potomac Trail and a member of the local DC Hiking Club, squeezes in weekend cycling and occasional 5K runs, cheers for the Washington Capitals and
    Nationals while also playing casual tennis at the community center, and treats fitness as a creative outlet rather than a regimented regimen.
  arts: Jeannie Anderson, an experimental jazz pianist who improvises alongside local musicians and an abstract painter inspired by Kandinsky’s bold geometry, regularly attends contemporary exhibitions
    at the Hirshhorn and the Smithsonian, draws creative cues from Miles Davis and Sun Ra, and collects limited‑edition prints by Anish Kapoor, weaving these artistic influences into every prototype they
    design.
  travel: Jeannie Anderson, who prefers meticulously planned weekend escapes to places like Shenandoah National Park and New Orleans for immersive jazz experiences, also dreams of a sustainable‑design tour
    of Reykjavik and a cultural pilgrimage to Barcelona, balancing adventure with a modest travel budget by using points from a credit‑card rewards program and documenting each trip with drone footage.
  culinary: Jeannie Anderson, an avid home chef who skillfully blends Afro‑Caribbean flavors—crafting dishes such as Jerk‑spiced chicken served over plantain gnocchi and curried goat simmered with coconut
    milk, scotch bonnet pepper, and allspice—enjoys experimenting with sous‑vide and molecular techniques, yet still delights in occasional evenings at the city’s Caribbean food‑truck festivals.
  core: Jeannie Anderson, a 61‑year‑old engineering technologist who fuses mechanical precision with abstract art, channels competitive curiosity into green‑tech innovation while secretly hoarding vintage
    synthesizers and occasionally binge‑watching sci‑fi series late into the night.
background:
  cultural: Jeannie is a second‑generation African American who grew up in the Washington, D.C. region during the post‑civil‑rights era. Her family emphasized education, church‑based community service,
    and cultural pride. She remains active in local Black professional networks, such as the DC chapter of the National Society of Black Engineers, and participates in cultural celebrations like Juneteenth
    and Kwanzaa. Her artistic work often incorporates African motifs, reflecting a deep connection to her heritage. Jeannie balances her professional responsibilities with a close‑knit extended family and
    a vibrant social circle in Arlington and Falls Church, drawing strength from the multicultural tapestry of the area.
attributes:
  skills: '[''Mechanical‑electrical systems integration'', ''SolidWorks 3D CAD modeling'', ''Rapid prototyping (3D printing, CNC)'', ''PLC programming'', ''LabVIEW instrumentation'', ''Python scripting'',
    ''MATLAB signal processing'', ''Statistical process control'', ''Technical writing and documentation'', ''Quality assurance and validation'', ''Project coordination and team leadership'']'
  hobbies: '[''Abstract painting'', ''Experimental jazz piano'', ''Speculative fiction reading'', ''Contemporary art exhibitions'', ''Urban hiking'', ''DIY drone building'', ''STEM volunteer mentorship'',
    ''Afro‑Caribbean fusion cooking'', ''Board gaming'', ''Community gatherings'']'
  career_goals: Jeannie aims to transition into an innovation leadership role within a government‑contracting firm or a technology start‑up focused on sustainable product development in the Washington,
    D.C. metro area. She wants to spearhead interdisciplinary projects that blend engineering rigor with artistic design, especially in green energy and smart‑city solutions. A long‑term ambition is to
    establish a community‑driven makerspace that offers mentorship and hands‑on training for underrepresented youth in STEM. She also seeks professional certification as a Professional Engineering Technologist
    (PE) and hopes to contribute to national standards committees, positioning herself as a thought leader on the intersection of engineering, creativity, and social equity.
