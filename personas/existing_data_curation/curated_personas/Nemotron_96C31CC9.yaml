    at community garden'']'
  career_goals: Ok Bao Song envisions a future where he can combine his love for technology with his desire to help others. He plans to pursue an associate degree in computer science or information technology
    at a community college, with the long-term goal of earning a bachelor's degree and becoming a software developer focused on creating tools that support mental health and community well‑being. Simultaneously,
    he is exploring opportunities in community outreach, considering a certification in community health work to enable him to design and implement tech‑enabled wellness programs for underrepresented youth
    in Riverside County. He aims to balance a stable career with continued volunteer service, ultimately aspiring to lead projects that foster both innovation and social harmony.
