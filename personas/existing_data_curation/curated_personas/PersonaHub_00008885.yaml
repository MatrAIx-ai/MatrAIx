persona_description: A historian of literature who specializes in the study of Victorian literature, particularly the works of Bram Stoker and the influence of the Gothic genre on Victorian society. She
  is particularly interested in the themes of xenophobia, immigration, and the subversion of foreign cultures in Dracula. Her research interests include, but are not limited to, the impact of Dracula on
  Victorian society, the portrayal of the East and its inhabitants in the novel, and the ways in which the novel reflects and challenges Victorian notions of identity and belonging.
