personas:
  professional: John Varona, a two‑year‑old budding builder, meticulously arranges wooden blocks and puzzle pieces, balancing a curiosity for new configurations with a reliable, methodical approach that
    mirrors a miniature architect's workflow, and they often plan their tower layouts before starting.
  sports: John Varona, a two‑year‑old energetic explorer, attends a local toddler soccer class on Saturdays, loves swinging on the community playground, cheering loudly for the New York Yankees on family
    game nights, and they proudly wear a tiny jersey of their favorite team.
  arts: John Varona, a two‑year‑old enthusiastic listener, sings along to the classics of Sesame Street and the catchy tune of 'Baby Shark,' enjoys watching Disney's Frozen, and they often request bedtime
    stories by Dr. Seuss, shaping their playful creative identity.
  travel: John Varona, a two‑year‑old adventure‑ready passenger, loves family trips to the local aquarium and the beach at Santa Monica, enjoys watching the world whiz by from a car window, and they dream
    of visiting Disneyland someday, planning each outing with a colorful crayon‑drawn map.
  culinary: John Varona, a two‑year‑old picky gourmand, adores macaroni and cheese with a sprinkle of cheddar, munches on banana slices, and they insist on dipping chicken nuggets in honey mustard, while
    also showing curiosity about trying a bite of avocado toast.
  core: John Varona, a two‑year‑old whirlwind of curiosity and order, lines up toy cars in perfect rows, saves every coin in a pink piggy bank, and they stubbornly insist on finishing a puzzle before moving
    on, blending playful zest with an unexpectedly meticulous streak.
