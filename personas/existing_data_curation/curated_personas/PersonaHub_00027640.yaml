persona_description: 'James Bailey, an independent scholar who specializes in the impact of electronic computing on the overall history of ideas. He is the author of "After Thought: The Computer Challenge
  to Human Intelligence." Bailey''s expertise lies in the use of visual literacy and the ability to accurately apprehend and communicate parallel realities through visual modes of knowing, as opposed to
  the old sequential concepts of the Gutenberg Era. He is particularly interested in the impact of electronic computing on the overall history of ideas and how it has changed the way young scholars communicate
  and learn. Bailey''s research interests include the use of new electronic tools for expressing knowledge visually, the spread of universal visual literacy, and the ability to understand knowledge in visual
  form.'
