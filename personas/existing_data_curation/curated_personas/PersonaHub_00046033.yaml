persona_description: A public health researcher with expertise in the study of air pollution and its effects on asthmatic children. The researcher is interested in the long-term effects of air pollution
  on asthmatic children's health, the factors that influence their response to air pollution, and the role of other environmental factors such as tobacco smoke and allergens. The researcher is also interested
  in developing exposure models and conducting spatial and temporal analyses to understand the spatial and temporal characteristics of pollution and health effects in Fresno.
