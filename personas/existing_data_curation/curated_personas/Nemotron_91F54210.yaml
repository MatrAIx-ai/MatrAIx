  hobbies: '[''Hiking'', ''Fishing'', ''Gardening'', ''DIY Home Improvement'', ''Crossword Puzzles'', ''Sudoku'', ''Reading Non-fiction'', ''5K Running'', ''Community Potlucks'', ''Board Games'', ''Photography'']'
  career_goals: Grace aims to move into a supervisory role within the next two years, targeting a Customer Service Team Lead position where she can apply her competitive drive to exceed key performance
    indicators. She plans to obtain a Certified Customer Service Professional credential and enroll in an associate degree program in Business Administration to broaden her managerial knowledge. Long‑term,
    she aspires to become a Customer Experience Manager and eventually a Director of Operations for a regional retail chain, overseeing process optimization and staff development while maintaining a focus
    on practical, data‑driven solutions.
