  hobbies: '[''Vegetable gardening'', ''Knitting'', ''Reading historical fiction'', ''Bridge (card game)'', ''Genealogy research'', ''Story‑time volunteering'', ''Crossword puzzles'', ''Quilting'']'
  career_goals: Although retired from full‑time teaching, Jamie remains driven to contribute. She hopes to establish a small scholarship fund in her late husband's name to support aspiring teachers from
    Peoria, and to mentor newly hired teachers through a local educator mentorship program. She also aims to expand her volunteer work by leading a weekly reading circle for elementary students and by developing
    a senior wellness workshop that blends gentle exercise, nutrition education, and stress‑reduction techniques. On a personal level, Jamie plans to complete a memoir documenting her teaching career and
    the changes she has witnessed in Midwestern education, and to maintain a structured daily routine that supports her physical health and emotional well‑being.
