persona_description: A historian who specializes in the study of Islamic history, particularly the period of the Abbasid Caliphate. His research interests include, but are not limited to, the cultural and
  religious influences of the Islamic world, the development of the Abbasid Caliphate, the history of the House of Wisdom, and the role of the sword in Islamic culture. He is particularly interested in
  the interpretations of the name "Dhu-l-Fiqar" and the popular depiction of the sword as a double-pointed scimitar in modern Shia iconography. He is also knowledgeable about the production of swords based
  on the legendary double-pointed design and the use of the sword as an eponym in military contexts.
