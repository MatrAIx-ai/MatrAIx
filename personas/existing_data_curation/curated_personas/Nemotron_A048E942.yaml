  career_goals: Gabriela dreams of a future where she can help others in a stable and caring environment. She imagines becoming a teacher or a pediatric nurse, roles that combine routine with compassion.
    She also expresses interest in working with animals as a veterinarian, seeing it as a way to nurture and protect living beings while maintaining a predictable daily schedule.
