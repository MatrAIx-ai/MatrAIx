personas:
  professional: Gabriela Gonzalez, a budding LEGO architect, channels their love for structure and spontaneous creativity into designing intricate brick models, confidently following step‑by‑step guides
    while inventing whimsical additions that showcase a practical mind paired with an improvisational spark.
  sports: Gabriela Gonzalez rallies behind the Las Vegas Aces while practicing flag football with their neighborhood league, enjoys skating at the community rink during winter, and they channel their energetic
    bursts into dance‑filled warm‑ups, preferring small‑group play over large, noisy crowds.
  arts: Gabriela Gonzalez delights in drawing colorful scenes inspired by the rhythmic beats of salsa music they hear at family gatherings, sings along to songs by Celia Cruz and Ricky Martin, and they
    watch animated classics like 'Moana' and 'Encanto' to fuel their imagination for both art and storytelling.
  travel: Gabriela Gonzalez loves weekend trips to Red Rock Canyon for shell‑collecting adventures, dreams of exploring the historic streets of Old San Juan, and they cherish family vacations to Disneyland
    where they can experience both thrilling rides and the magical parade of lights.
  culinary: Gabriela Gonzalez enjoys helping in the kitchen by stirring arroz con pollo and frying sweet plantain slices, proudly adds a pinch of cumin to their homemade tacos, and they savor cheesy macaroni
    with a side of fresh mango, showcasing a budding palate that balances traditional flavors with kid‑friendly favorites.
  core: Gabriela Gonzalez blends a love for orderly LEGO builds with spontaneous salsa dancing, saves allowance in a piggy bank while occasionally splurging on sweets, and they tackle mild allergies with
    a mix of vigilance and occasional forgetfulness, all wrapped in a compassionate, steady‑hearted personality.
background:
  cultural: Gabriela is a second-generation Cuban‑American growing up in Las Vegas. At home, Spanish is spoken alongside English, and her family preserves Cuban traditions such as preparing arroz con pollo,
    plantains, and sharing music like salsa and rumba during celebrations. She participates in cultural events like Día de la Independencia and enjoys storytelling that reflects Cuban values of community
    and resilience. The multicultural atmosphere of Las Vegas blends with her Cuban heritage, giving her a rich, bicultural identity that influences her language, food preferences, and appreciation for
    rhythmic dance.
