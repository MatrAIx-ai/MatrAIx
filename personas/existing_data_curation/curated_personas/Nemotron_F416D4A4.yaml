  hobbies: '["Hiking", "Mountain Biking", "Kayaking", "Community Murals", "Pop-up Art Exhibitions", "Cultural Travel (Architecture & Folk Art)", "Pottery", "Photography", "Live Music Events", "Craft Beer
    Tasting", "Design Meetups"]'
  career_goals: Heather aims to move into senior creative leadership within the next five years, targeting a role such as associate creative director or founder of a boutique design studio that emphasizes
    sustainable and community‑focused projects. She plans to assemble a multidisciplinary team that integrates environmental design principles and collaborates with local artists and public institutions
    to create impactful public‑art installations in the Pacific Northwest. Additionally, she seeks to mentor emerging designers, publish thought pieces on design strategy, and earn recognition in national
    design competitions, solidifying her reputation as a competitive yet collaborative thought leader.
