personas:
  professional: Heather Whittaker drives senior creative leadership in a boutique design studio, translating her expertise in graphic, UI/UX, and 3D design into sustainable brand narratives while leveraging
    a curious, organized yet competitive mindset to champion community‑focused projects, and they regularly mentor emerging designers.
  sports: Heather Whittaker pursues mountain biking on the Cascade trails, kayaking on the Deschutes River, and weekend hikes, while cheering for the Portland Trail Blazers and Seattle Seahawks, and they
    belong to the Bend Trail Runners club and the Cascade Mountain Bike Club, maintaining a disciplined yet occasionally erratic fitness routine due to workload fluctuations.
  arts: Heather Whittaker curates community murals, leads pop‑up galleries, practices pottery and street photography, draws inspiration from European masters like Caravaggio and contemporary creators such
    as Banksy and Shepard Fairey, and they infuse indigenous motifs responsibly into designs while regularly attending live shows at local brewpubs featuring acts like The Dip and The Blue Ribbons.
  travel: Heather Whittaker explores historic architecture and folk art on trips to Barcelona’s Sagrada Família, the Czech town of Český Krumlov, New Mexico’s Taos Pueblo, and the Norwegian fjords, planning
    trips with a mix of meticulous itineraries and spontaneous detours, and they prioritize sustainable travel options such as train journeys and eco‑lodges.
  culinary: Heather Whittaker enjoys pairing Oregon pinot noir with locally sourced hazelnut‑crusted salmon, loves making sourdough bread with native Oregon wheat, frequently samples craft beers like Deschutes
    Fresh Squeezed IPA, and they often experiment with foraged mushrooms and seasonal herbs in rustic Mediterranean dishes.
  core: Heather Whittaker is a 53‑year‑old design veteran whose relentless curiosity, competitive edge, and community‑first ethos drive sustainable creativity, even as they wrestle with chronic worry and
    occasional stress‑induced burnout.
background:
  cultural: Heather identifies as a white American whose upbringing in a modest Midwestern family exposed her to classic American folk traditions and a strong work ethic. Relocating to Bend, Oregon, she
    embraced the Pacific Northwest’s progressive, nature‑centric culture, integrating its environmental values and outdoor lifestyle into her identity. While respecting the region’s indigenous heritage,
    she responsibly incorporates native artistic motifs into her work and supports local cultural initiatives. Her graduate studies in arts and humanities have given her a broad appreciation for European
    art history and contemporary cultural discourse, shaping a multicultural yet regionally grounded worldview.
