personas:
  professional: Alberto Nunez, a retired handyman turned volunteer cooking mentor, leverages their bilingual fluency and practical know‑how to translate traditional recipes and simple home‑repair guides
    for neighbors, while orchestrating lively domino and card nights at the senior center where their competitive edge and skeptical eye keep events both orderly and spirited.
  sports: Alberto Nunez, a devoted fan of the Chicago Fire and a regular viewer of Liga MX matches, never misses a game, proudly wearing a well‑worn jersey while cheering for their favorite club, maintains
    physical activity with daily neighborhood walks and a weekend senior walking group, and treats dominoes and card games as mental sport, often competing fiercely at the senior center.
  arts: Alberto Nunez, who spends evenings at community salsa and cumbia dance nights, finds rhythm in the music of Celia Cruz and the guitar riffs of Carlos Santana, often humming these tunes while cooking,
    and delights in local folk‑art exhibitions that showcase vibrant murals reminiscent of Diego Rivera’s style, feeding their curiosity for cultural expression.
  travel: Alberto Nunez, an avid weekend traveler, enjoys short trips to New Orleans for its jazz and culinary scene, drives to historic Galena, Illinois for its preserved 19th‑century charm, and dreams
    of exploring the colorful markets of Oaxaca and the colonial plazas of San Miguel de Allende, balancing modest travel budgets with a love for immersive cultural experiences.
  culinary: Alberto Nunez, a seasoned home chef, masterfully prepares tamales, pozole, and chiles rellenos, seasoning them with balcony‑grown chilies, tomatoes, and cilantro while experimenting with smoky
    paprika and pineapple salsa for unexpected twists, and showcases their culinary flair at backyard barbecues where their signature tamale stew and freshly grilled corn steal the spotlight.
  core: Alberto Nunez, a lively 69‑year‑old community chef and handyman, blends a competitive spark with heartfelt hospitality, yet wrestles with bouts of anxiety that color their vibrant social life.
background:
  cultural: Alberto was born to Mexican immigrant parents who settled in Chicago's Pilsen neighborhood, a vibrant enclave of Mexican culture. Raised in a bilingual household, he grew up speaking Spanish
    at home and English at school, absorbing traditions such as celebrating Dia de los Muertos, Mexican Independence Day, and family-centered religious holidays. His upbringing emphasized strong family
    bonds, communal cooking, and music, especially mariachi and norteña. Over the years, he has blended his Mexican roots with Chicago's urban rhythm, adopting local customs while preserving core cultural
    practices. This dual identity fuels his desire to keep Mexican traditions alive in his community, serving as a bridge between older and younger generations of Mexican-American residents.
attributes:
