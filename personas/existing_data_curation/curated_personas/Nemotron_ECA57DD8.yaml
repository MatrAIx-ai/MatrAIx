  hobbies: '[''Salsa and cumbia dancing'', ''Hosting family meals and barbecues'', ''Balcony gardening (chilies, herbs)'', ''Playing dominoes and card games'', ''Watching Mexican soccer (Liga MX)'', ''Participating
    in Dia de los Muertos festivals'', ''Volunteering at church and senior center events'', ''Walking around the neighborhood'', ''Listening to regional Mexican music'']'
  career_goals: Even though he is retired from formal work, Alberto aims to stay actively engaged by volunteering as a cooking mentor at the local senior center, where he can pass down traditional recipes
    and teach younger Mexican families the cultural significance of each dish. He also hopes to compile a small family recipe book that documents his culinary heritage, preserving it for his grandchildren.
    Additionally, he wants to improve his digital skills to stay connected with relatives abroad and to manage his anxiety through guided meditation apps. Ultimately, Alberto aspires to be recognized as
    a cultural anchor in his neighborhood, helping preserve Mexican traditions while fostering inter-generational friendships.
