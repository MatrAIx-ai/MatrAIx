personas:
  professional: A seasoned plumber, pipefitter, and steamfitter named Alberto Cuevas draws on over thirty years of hands‑on work across residential, commercial, and light‑industrial projects, coupling a
    fastidious, organized tool chest with a curious eye for emerging pipe‑fitting technologies, and a competitive ambition to secure a Missouri contractor’s license and become the go‑to specialist for steam‑heating
    retrofits and flood‑control pump repairs, and they plan to mentor the next generation through a union apprenticeship.
  sports: Alberto Cuevas enjoys early‑morning catfish and bass fishing on the Mississippi River, seasonal deer hunting with a tight‑knit local gun club, and follows the St. Louis Cardinals baseball team
    and the Missouri Tigers men’s basketball squad, yet they rarely join organized leagues, preferring solo outdoor challenges that test patience and precision.
  arts: Alberto Cuevas channels their love for tradition and storytelling through acoustic guitar, diligently rehearsing corridos by Vicente Fernández and ballads by Johnny Cash, while also curating a collection
    of vintage hand tools and immersing themselves in technical manuals that feel as artistic as any gallery visit.
  travel: Alberto Cuevas favors low‑key road trips that blend work and leisure, such as a weekend drive to the Hill Country of Texas for deer season, a culinary pilgrimage to Oaxaca for authentic mole recipes,
    and occasional visits to historic river towns like St. Louis and Quincy, often mapping routes that allow a quiet lake stop for fishing along the way.
  culinary: Alberto Cuevas showcases an intermediate cooking skill set by hand‑making masa for tamales, simmering mole poblano with ancho, pasilla, and dark chocolate, preparing chiles en nogada with fresh
    walnuts and pomegranate seeds, and experimenting with locally caught bass in simple citrus‑herb marinades, all while savoring the aromatic blend of cumin, garlic, and epazote.
  core: Alberto Cuevas is a solitary, competitively driven tradesperson who balances meticulous craftsmanship with a restless curiosity for new techniques, often swapping a fishing rod for a woodworking
    bench and a pipe wrench for a guitar pick.
background:
  cultural: Alberto was raised in a Mexican‑American household that preserved many traditions from his parents’ Veracruz roots. He grew up bilingual, speaking Spanish at home and English in school and work,
    and he maintains a strong sense of familismo, honoring family bonds and supporting his extended relatives in the area. He celebrates Día de los Muertos with a modest altar, prepares tamales for festive
    occasions, and enjoys listening to regional mariachi and corridos. Living in Portageville, MO, he has blended his heritage with the Midwestern lifestyle, participating in local church picnics and community
    service while keeping his cultural identity alive through food, music, and occasional visits to nearby Hispanic community events.
attributes:
  skills: '[''Copper and PEX piping installation'', ''PVC and CPVC pipe threading'', ''MIG/TIG welding of steel and stainless-steel pipe'', ''Steam system design, installation and maintenance'', ''Blueprint
    and schematic interpretation'', ''HVAC plumbing connections'', ''Agricultural irrigation system upkeep'', ''Flood-control pump maintenance'', ''OSHA safety compliance'', ''Project estimating and budgeting'',
    ''Team leadership and mentorship'']'
  hobbies: '[''Fishing on the Mississippi River'', ''Deer hunting'', ''Woodworking'', ''Cooking traditional Mexican dishes'', ''Acoustic guitar playing'', ''Collecting vintage hand tools'', ''Reading technical
    manuals on plumbing technologies'', ''Participating in small community gatherings'']'
  career_goals: Alberto aims to formalize his expertise by obtaining a Missouri contractor’s license and expanding his solo trade into a small, reputable plumbing and pipefitting firm that can serve both
    domestic customers and local industrial clients. He is driven to become the go‑to specialist for steam‑heating retrofits and flood‑control pump repairs, positioning himself ahead of regional competitors.
    Over the next five years he plans to earn additional certifications in green‑plumbing technologies, mentor a new apprentice through a union apprenticeship program, and secure a steady income stream
    that will allow him to retire comfortably while still contributing his knowledge to the community.
