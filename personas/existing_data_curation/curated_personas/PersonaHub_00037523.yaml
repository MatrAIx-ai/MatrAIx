persona_description: A historian or military historian who specializes in the Peloponnesian War and the campaigns of Conon, particularly focusing on his role in the naval battles of 406 and 405 BC, his
  strategic decisions, and his impact on the outcome of the war. They are also knowledgeable about the context of the time, including the rivalry between Athens and Sparta, the Persian threat, and the role
  of naval power in the conflict. They are interested in the military tactics, naval strategies, and the personalities of the key figures involved, such as Conon, Pharnabazus, and other Persian commanders.
  They also appreciate the historical significance of the victory at Cnidus and its impact on the future of Greek naval power.
