  hobbies: '[''Hiking in the Chugach Mountains'', ''Landscape photography'', ''Sketching and watercolor painting'', ''Visiting art galleries and Native Alaskan art exhibits'', ''Attending indie music shows'',
    ''Yoga and mindfulness practice'', ''Strategy board games and puzzle solving'', ''Volunteering for community clean‑up projects'']'
  career_goals: Tracy aims to become a licensed Professional Engineer within the next three years and to lead large‑scale, resilient infrastructure projects that address Alaska’s unique environmental challenges.
    She aspires to spearhead a permafrost‑adapted highway or bridge that integrates sustainable materials and artistic elements, reflecting her appreciation for aesthetics. Long‑term, she envisions establishing
    a consultancy focused on climate‑responsive design, mentoring junior engineers, and publishing research on cold‑region civil engineering. Balancing ambition with her need for personal well‑being, she
    plans to incorporate regular stress‑management practices while climbing the professional ladder.
