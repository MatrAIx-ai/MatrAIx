persona_description: A biochemist who specializes in protein folding and structure, particularly in understanding the forces that govern protein folding and the role of carbohydrates in protein modification.
  She is interested in the interactions between charged and polar amino acids on the exterior surfaces of proteins and the role of van der Waals forces in protein folding. She is also interested in the
  covalent conjugation of proteins with carbohydrates and the roles of glycoproteins in blood group specificity. She is knowledgeable about the structure and function of lipoproteins and their role in lipid
  and cholesterol storage and transport in the body.
