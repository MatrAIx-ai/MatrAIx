  hobbies: '[''Tai chi'', ''Mahjong'', ''Cultural festival organization'', ''Cooking traditional Chinese and Hawaiian fusion dishes'', ''Gardening (taro, orchids, hibiscus)'', ''Walking along the shoreline'',
    ''Reading historical novels'', ''Attending community gatherings'']'
  career_goals: Although no longer employed full‑time, Yip Chou Chen remains driven to contribute to his community and family. His primary ambition is to continue volunteering at the Kapolei Senior Center,
    expanding his role to mentor new volunteers and lead intergenerational cultural workshops. He hopes to document his life story and family recipes in a small memoir to pass on to his grandchildren. Additionally,
    he aspires to improve his digital literacy so he can assist his wife and family with online tasks and stay connected with relatives abroad. Maintaining his health through regular tai chi and walking
    is also a personal goal, ensuring he can remain active and reliable for those who rely on him.
