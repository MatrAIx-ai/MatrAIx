  hobbies: '[''Community Theater'', ''Watercolor Painting'', ''Hiking'', ''Kayaking'', ''Gardening'', ''Photography'', ''Book Club'', ''Volunteering with Arts Council'', ''Cooking Seasonal Meals'', ''Board
    Game Nights'']'
  career_goals: Stephanie aims to advance to a Director of Operations role within the next five years, leveraging her engineering background to spearhead sustainability initiatives across her organization.
    She plans to earn an MBA to deepen her strategic acumen and to launch a STEAM outreach program that partners local schools with industry and arts institutions. Mentoring women in STEM and championing
    corporate social responsibility projects that integrate environmental stewardship with community art programs are central to her long‑term vision.
