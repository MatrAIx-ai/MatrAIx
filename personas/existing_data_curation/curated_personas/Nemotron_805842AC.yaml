personas:
  professional: Stephanie Denton is an environmental engineer with a flair for lean Six Sigma, who leverages data-driven process optimization and savvy stakeholder communication to lead cross‑functional
    teams while championing community‑focused sustainability projects that blend science and art.
  sports: Stephanie Denton is a devoted fan of the Green Bay Packers and the Milwaukee Bucks, regularly jogs with the Chippewa Hiking Club in the spring, paddles with the Lake Wissota Kayak Association
    during summer, and embraces a balanced fitness regimen that blends weekend mountain‑bike rides in the Chippewa National Forest with occasional yoga sessions to stay flexible.
  arts: Stephanie Denton actively participates in a community theater troupe, attends weekly watercolor classes where they experiment with techniques inspired by Georgia O'Keeffe, curates photo exhibits
    of Midwestern landscapes reminiscent of Ansel Adams, and volunteers with the Chippewa County Arts Council to organize STEAM events featuring local musicians like the folk duo The Riverstones.
  travel: Stephanie Denton prefers thoughtfully planned road trips that blend outdoor adventure with cultural immersion, having explored the rugged beauty of Yellowstone and the historic streets of Savannah,
    while they dream of kayaking the fjords of Norway and photographing the aurora borealis in Iceland during a future summer sabbatical.
  culinary: Stephanie Denton enjoys cooking seasonal Midwestern dishes such as roasted heirloom carrots with thyme, wild rice pilaf with locally foraged mushrooms, and fresh trout grilled with lemon‑dill
    sauce, demonstrating intermediate culinary skills that combine farm‑to‑table sourcing of corn, maple syrup, and Wisconsin cheese curds with occasional experimental plating inspired by their watercolor
    palette.
  core: Stephanie Denton blends analytical engineering precision with a vibrant artistic soul, juggling data dashboards by day and watercolor palettes by night, while habitually hoarding stray pinecones
    as desk decorations and never missing a Saturday morning hike.
background:
  cultural: Stephanie was born and raised in the Upper Midwest, embodying the practical, community‑oriented values of small‑town Minnesota. Her cultural upbringing emphasizes hard work, humility, and a
    strong sense of local stewardship. While identifying as white Midwestern American, she respects the Indigenous Dakota and Chippewa heritage of the area and actively supports cultural preservation initiatives.
    Her family’s Scandinavian roots contribute to an appreciation for seasonal rhythms and folk traditions, which she weaves into her artistic pursuits and community involvement.
