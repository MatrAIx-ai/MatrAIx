personas:
  professional: Ruben Garcia, a seasoned hospitality and retail manager with 30+ years of experience, excels in team leadership, conflict resolution, and operational planning, using their curiosity‑driven
    practicality and bilingual communication to innovate budgeting processes while maintaining a compassionate, harmonious workplace, and they are known for fostering an inclusive team culture.
  sports: Ruben Garcia, an avid hiker and weekend adventurer, belongs to the Red Rock Canyon Hiking Club, follows the Las Vegas Raiders and Vegas Golden Knights, participates in a local senior soccer league,
    and they keep active by dancing cumbia and salsa at community gatherings, which doubles as cardio exercise.
  arts: Ruben Garcia, a passionate cultural enthusiast, frequently attends live performances by regional bands such as Los Tigres del Norte, jazz ensembles featuring Esperanza Spalding, and community theater
    productions at the Smith Center, and they collect vibrant street murals during city walks, finding inspiration for their own storytelling.
  travel: Ruben Garcia, a seasoned traveler who enjoys both adventure and family relaxation, has explored Oaxaca’s historic markets, hiked the Grand Canyon, taken a road trip to Sedona, and they plan future
    trips to Barcelona’s architecture and the Pacific coast of Costa Rica, preferring itineraries that blend cultural festivals with nature hikes.
  culinary: Ruben Garcia, a competent home chef, regularly prepares mole poblano, carne asada tacos with fresh cilantro and roasted chiles, and cooks herb‑infused pozole using oregano, epazote, and lime,
    while they savor the occasional street‑food taco stand in downtown Las Vegas and host weekend feasts for friends and family.
  core: Ruben Garcia blends thirty years of hospitality leadership with a community‑focused heart, juggling strategic budgeting, health‑aware habits, and a love for vibrant music, flavorful food, and desert
    hikes, all while they stay pragmatically curious and socially energetic.
background:
  cultural: Ruben’s Mexican roots shape many aspects of his life. He grew up celebrating Día de los Muertos, Semana Santa, and Mexican Independence Day, often preparing family recipes passed down through
    generations. Being bilingual, he navigates both Mexican and American cultural norms with ease, fostering a bridge between his extended family in Mexico and his local community in Las Vegas. His upbringing
    emphasized hospitality, respect for elders, and communal support, values he carries into his managerial style and community involvement.
