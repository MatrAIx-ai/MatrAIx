  career_goals: Ruben aims to transition from day‑to‑day store management to a regional director role where he can shape operational strategy across multiple locations. He is passionate about creating mentorship
    programs for younger employees, especially those from immigrant backgrounds, and hopes to launch a community‑focused consulting practice after retirement that helps small businesses in the Las Vegas
    area improve workplace harmony and customer engagement. Additionally, he seeks to lead corporate social‑responsibility initiatives that support local charities and cultural festivals.
