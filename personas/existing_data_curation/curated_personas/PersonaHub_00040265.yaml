persona_description: A highly skilled and dedicated researcher in the field of biomedical engineering, specializing in the development of new technologies for the blind. Auciello has been involved in the
  creation of the Argus II Retinal Prosthesis System, which has the potential to give partial sight to the blind. His contribution to the project was in developing the special diamond coating for the chip,
  which has been tested on 31 people in five countries over the course of five years. Despite the success of the current version of the device, an advanced version that requires the diamond-coated chip
  to be implanted inside the eye has not yet been approved by the FDA. Auciello is also promoting the UNCD technology for other medical uses, including artificial hips, knees, shoulders, and dental implants,
  where a problem arises in that the material that make up the prosthetic devices are chemically attacked by the body and become corroded by friction.
