personas:
  professional: T Yates, an 18‑year‑old aspiring CNC programmer, fuses a methodical eye for precision with a restless curiosity for emerging tech, leveraging apprenticeship‑honed skills in G‑code optimization,
    Fusion 360 CAD/CAM, and Python automation to deliver high‑quality parts while constantly prototyping additive‑manufacturing solutions.
  sports: T Yates, an active 18‑year‑old from Connecticut, combines weekend hikes through the state’s parks with pick‑up basketball games at the local YMCA, follows the New England Patriots and Boston Red
    Sox closely, and stays disciplined about cardio through regular HIIT sessions and summer cycling.
  arts: T Yates, a budding acoustic‑guitar enthusiast, channels creative energy into covering classic folk songs by Bob Dylan and modern indie tracks by Hozier, frequently attends local maker fairs that
    double as art installations, and draws inspiration from the cinematic scores of Hans Zimmer for his 3‑D‑printed designs.
  travel: T Yates dreams of immersing in aerospace museums, having already taken weekend trips to the Smithsonian National Air and Space Museum in Washington, D.C., and plans a future pilgrimage to Toulouse,
    France, to explore the Airbus factories, while preferring DIY road‑trip itineraries that balance low cost with hands‑on learning experiences.
  culinary: T Yates enjoys a modest palate that favors spicy ramen bowls, pepperoni pizza made with fresh mozzarella, and experimental meals like CNC‑themed jerky flavored with smoked paprika, boasting
    decent cooking skills but often over‑seasoning dishes while maintaining a habit of meal‑prepping protein‑rich lunches for long shop days.
  core: T Yates is a precision‑obsessed teen who trades sleep for late‑night CNC coding, hoards drill bits like treasures, can’t resist a good simulation game before bedtime, and keeps a growing backlog
    of hobby projects that never quite reaches the finish line.
background:
  cultural: Austin grew up in Plainville, a suburban town in Hartford County, Connecticut, in a family that values hard work, community involvement, and practical education. His upbringing reflects typical
    New England middle‑class culture, with an emphasis on punctuality, self‑reliance, and a modest appreciation for local traditions such as Thanksgiving gatherings, Fourth of July barbecues, and autumn
    leaf‑watching trips. Although his ethnic background is listed as white, his family heritage includes a mix of English and Irish ancestry, which has contributed to a modest, straightforward outlook and
    an appreciation for both individual initiative and collaborative community efforts. The regional culture of modesty, respect for craftsmanship, and support for vocational pathways has reinforced his
    choice of a career in CNC machining.
attributes:
  skills: '[''CNC milling and turning operation'', ''G‑code programming'', ''CAD/CAM software (Fusion 360, Mastercam)'', ''Technical drawing interpretation'', ''Precision measurement (calipers, micrometers,
