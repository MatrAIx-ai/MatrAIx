    ''Team collaboration and communication'']'
  hobbies: '[''Model airplane building and flying'', ''Arduino and Raspberry Pi electronics projects'', ''3‑D printing and laser cutting'', ''Simulation and strategy video gaming (Factorio, Kerbal Space
    Program, Cities Skylines)'', ''Hiking in Connecticut state parks'', ''Pickup basketball'', ''Playing acoustic guitar'', ''Attending maker fairs and tech workshops'']'
  career_goals: He aims to earn an associate’s degree in manufacturing technology within the next two years and obtain a professional CNC programmer certification. In the medium term, he wants to become
    a senior CNC programmer, leading the programming team for complex aerospace or automotive parts, and to learn advanced additive‑manufacturing processes. Long‑term, he dreams of opening his own small‑scale
    precision machining shop that integrates both subtractive and additive technologies, and to mentor younger apprentices. He also hopes to broaden his engineering knowledge by eventually pursuing a bachelor’s
    degree in mechanical engineering.
