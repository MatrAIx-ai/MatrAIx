persona_description: A medical professional who specializes in diagnosing and treating nail disorders, particularly those related to aging, injury, and poisoning. They are knowledgeable in the diagnostic
  process, including the identification of vertical and horizontal ridges, and are skilled in recognizing the symptoms that indicate serious health conditions. They are also experienced in treating infections,
  including those caused by chemical poisoning, plant toxins, and viruses, and in managing the complications that can arise from untreated nail disorders.
