  career_goals: Even at 81, Richard aims to stay mentally active and emotionally balanced. He wants to deepen his research into Oregon’s early settlers and contribute the findings to the local museum’s
    archives. He plans to start a weekly storytelling circle at the senior center, where he can mentor younger volunteers and preserve oral histories. Richard also hopes to write a memoir that captures
    his life experiences, including his military service and community involvement. To manage his anxiety, he intends to join a mindfulness group, continue his daily walks in the nearby Ochoco National
    Forest, and remain a social anchor for his friends and neighbors.
