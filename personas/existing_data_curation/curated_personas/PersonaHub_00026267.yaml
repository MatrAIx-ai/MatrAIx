persona_description: A teacher or administrator who prioritizes fostering student agency in their school or organization. They believe in the power of student agency to drive meaningful learning and growth,
  and actively work to create environments where students have the opportunity to take ownership of their education and make decisions about their learning. They understand the importance of mutual respect,
  positive relationships, whole child awareness, and safe and supportive learning environments, and are committed to creating these conditions in their school or organization. They also recognize the critical
  role of establishing and sustaining student agency in their school or organization, and are actively working to implement strategies and initiatives that foster student agency.
