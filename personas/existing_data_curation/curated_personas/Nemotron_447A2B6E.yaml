  career_goals: He aims to attend a STEM‑focused high school and eventually earn a degree in computer engineering or robotics, with the long‑term ambition of designing affordable, environmentally friendly
    technology for rural communities. He also dreams of contributing to open‑source projects that help beginners learn to code, and hopes to balance a stable engineering career with occasional independent
    research on wildlife monitoring tools.
