personas:
  professional: Van Duong is a budding electronics tinkerer and junior Python game developer who spends afternoons building LED displays and sensor‑based weather stations, turning curiosity into practical
    projects while thriving in the quiet corners of local parks and managing a loosely scheduled workflow with a relaxed, solitary approach.
  sports: Van Duong follows the Seattle Sounders FC in MLS and cheers for the Seattle Kraken in the NHL, while they occasionally join the Riverbend Riders, a junior cycling club that meets on weekend mornings
    for low‑intensity rides through the city’s parks, preferring solitary, low‑key exercise over team sports.
  arts: Van Duong embraces creative expression by sketching manga characters inspired by My Hero Academia, devouring science‑fiction novels like Frank Herbert's Dune, and listening to the film scores of
    composer Yoko Kanno, while regularly re‑watching Hayao Miyazaki's Studio Ghibli classics such as Spirited Away.
  travel: Van Duong prefers low‑key travel, having explored the serene trails of Redwood National Park and spent a weekend in the historic town of Savannah, and they dream of a solo backpacking adventure
    through the misty highlands of Scotland and a sunrise hike at Machu Picchu, all while budgeting trips through family‑sponsored weekend camping outings.
  culinary: Van Duong contributes to family meals by mastering the preparation of Tong Coc, a sticky‑rice dumpling wrapped in banana leaves, and pho, a fragrant noodle soup flavored with star anise, ginger,
    and fish sauce, showcasing a modest yet enthusiastic cooking ability that blends tradition with a teen’s curiosity for flavors.
  core: Van Duong is a solitary, curious teen who merges electronics tinkering with nature journaling, balancing practical projects and quiet reflection while occasionally slipping into disorganized habits.
background:
  cultural: Van Huu is a second‑generation Vietnamese‑American. At home he speaks both Vietnamese and English, celebrates Tet with family gatherings and traditional foods, and helps his parents maintain
    cultural practices such as ancestor worship and lunar calendar observances. Growing up in Stewartville, MN, he integrates Midwestern values of community volunteering and respect for nature with his
    family’s emphasis on education, hard work, and respect for elders.
