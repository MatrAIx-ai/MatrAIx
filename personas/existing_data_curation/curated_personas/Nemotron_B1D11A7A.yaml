  career_goals: Steven aims to leverage his business degree and extensive retail experience to advance into a supervisory role within the next two years, targeting a floor-supervisor position that will
    allow him to mentor junior staff and oversee store operations. His medium-term goal is to become a store manager, where he can implement data-driven strategies for sales growth and enhance the visual
    presentation of the store using his interest in art and design. Ultimately, Steven envisions opening a boutique gallery-cafe that blends his passion for contemporary art with his entrepreneurial aspirations,
    offering a community space for local artists and culturally diverse cuisine. To support these ambitions, he plans to complete a retail management certification, attend workshops on visual merchandising,
    and network with local art organizations.
