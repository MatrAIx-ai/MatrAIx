persona_description: A research scientist or engineer specializing in solar resource assessment, particularly in developing and refining models and algorithms for estimating, predicting, and forecasting
  the solar resource. They are passionate about understanding the spatial and temporal patterns of irradiance fields and how they affect PV plant output, and are committed to developing techniques and metrics
  to determine the operational value of solar forecasts for utilities. They are also skilled in translating solar resource data into useful information for the development of solar power plants and are
  dedicated to improving methods to accurately measure and estimate solar resource.
