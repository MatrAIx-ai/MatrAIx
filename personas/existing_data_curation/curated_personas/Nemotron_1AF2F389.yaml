  career_goals: Gary aims to transition from line cook to head chef at his current establishment within the next two years, leveraging his deep knowledge of regional ingredients to shape a menu that highlights
    Pennsylvania’s seasonal bounty. He plans to earn a Certified Chef de Cuisine credential to formalize his skill set and eventually publish a modest cookbook focused on wild‑food recipes and practical
    home cooking for the rural Midwest. In the longer term, Gary dreams of opening a small bistro that offers a relaxed, family‑style dining experience, where he can mentor aspiring cooks while maintaining
    the flexible, low‑stress work rhythm he values.
