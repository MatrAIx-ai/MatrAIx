  hobbies: '[''Hiking and cycling'', ''Vietnamese cooking'', ''Youth basketball coaching'', ''Listening to business podcasts'', ''Reading biographies'', ''Drone photography'', ''Participating in Tet festivals'']'
  career_goals: Binh aims to move from first‑line supervision to a regional sales manager role within the next three years, overseeing multiple teams and shaping broader sales strategies. He is interested
    in sharpening his strategic planning and analytical skills, possibly through a part‑time MBA or leadership certification. Long‑term, he envisions either stepping into a director‑level position where
    he can influence product‑market alignment, or launching his own consultancy focused on sales process optimization for small tech firms. He values career stability but also wants the flexibility to balance
    work with personal pursuits, so he prefers a role that offers structured objectives while allowing autonomy in execution.
