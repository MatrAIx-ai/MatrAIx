persona_description: A historian or archaeologist interested in the history and development of ancient Vietnamese cultures, particularly those in the central province of Thanh Hoa, Vietnam. This person
  is likely to be interested in the discovery of the Con Moong Cave, which has been investigated for some years now, and has shown a long period of occupation in Vietnam’s prehistoric periods. The person
  may be particularly interested in the cultural developments associated with many stages of development of ancient Vietnamese in more than ten thousand years, from the Old Stone Age to the Neolithic, from
  hunting and gathering to farming, before the Son Vi to the Son Vi, Hoa Binh culture and Bac Son and Da But cultures.
