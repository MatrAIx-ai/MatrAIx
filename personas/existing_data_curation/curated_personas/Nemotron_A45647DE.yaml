personas:
  professional: John Taylor is an aspiring digital creator, combining hand‑drawn sketches, Minecraft world‑building, and sci‑fi short stories into prototype narratives for school robotics competitions,
    and they prefer flexible, deadline‑light workflows that let imagination run free.
  sports: John Taylor plays midfield for the Knoxville Tigers youth soccer club, cheers for the Tennessee Titans on weekends, and joins a local trail‑running group that meets at the Appalachian trails,
    preferring spontaneous scrimmages over rigid training regimens.
  arts: John Taylor finds inspiration in classic rock album art like Pink Floyd's The Dark Side of the Moon, Appalachian folk tunes by the Carter Family, and visual storytelling from Hayao Miyazaki, channeling
    this blend into daily sketching, digital painting, and weekly contributions to the school drama club’s set design.
  travel: John Taylor loves weekend hikes in the Great Smoky Mountains and plans a future trip to the Harry Potter Studio Tour in London, balancing adventure with family constraints by prioritizing local
    trail explorations and modest day‑trip road trips to neighboring state parks.
  culinary: John Taylor favors quick comfort foods such as pepperoni pizza, homemade trail mix with dried apricots, peanut butter, and pretzels, experiments with simple breakfast burritos, and occasionally
    tries Appalachian honey biscuits, though they admit to a stubborn dislike for leafy greens.
  core: John Taylor is a hyper‑creative 13‑year‑old who merges art, games, and stories with a laid‑back yet impulsive streak, thriving on community projects while navigating a chaotic allowance and the
    occasional ankle sprain.
background:
  cultural: John comes from a white, middle‑class family in Knoxville, Tennessee, where Southern hospitality and community involvement are common values. He grew up attending local school events, high‑school
    football games, and regional festivals that celebrate Appalachian music and crafts. At home, he experiences a blend of traditional Southern customs—like family gatherings and church community—and contemporary
    digital culture, which shapes his outlook, artistic preferences, and collaborative spirit.
attributes:
