  hobbies: '[''Sketching and digital art'', ''Minecraft world building'', ''Creative writing (short stories, sci‑fi, fantasy)'', ''Soccer'', ''School drama club'', ''Robotics club'', ''Hiking in nearby
    nature parks'', ''Listening to music (rock, pop, folk)'', ''Attending local film festivals'']'
  career_goals: He dreams of turning his love for art and technology into a career, aiming to become a multimedia designer or video game developer who creates immersive, story‑rich worlds. He also imagines
    someday using his creativity to produce animated short films or visual effects for movies, and he is open to exploring fields that combine design, programming, and storytelling.
