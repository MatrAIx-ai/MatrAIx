  career_goals: Alex often talks about becoming an astronaut to explore space, an artist to draw big colorful pictures, or a scientist to discover how things work. He is motivated by his love of learning,
    his organized approach to projects, and his desire to help others. He dreams of building inventions, creating art exhibitions, and one day contributing to his community.
