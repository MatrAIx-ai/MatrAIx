personas:
  professional: Alex Jimenez, a 5-year-old aspiring marine explorer, channels disciplined curiosity into cataloguing river stones and drawing detailed sketches of creek life, and they demonstrate early
    organizational skills that promise future success in environmental science.
  sports: Alex Jimenez spends Saturday mornings playing soccer with the Kennewick Rockets youth league, idolizes Seattle Sounders FC and the Vancouver Canucks, and they maintain a disciplined stretching
    routine before recess to stay limber.
  arts: Alex Jimenez passionately draws papel picado patterns during Día de los Muertos crafts, admires the vibrant murals of Diego Rivera, and they eagerly watch animated films by Hayao Miyazaki while
    humming folk songs by Los Lobos.
  travel: Alex Jimenez eagerly anticipates family trips to the Columbia River wetlands for boat rides, has visited the Seattle Space Needle during a weekend getaway, and they dream of exploring the historic
    plazas of Mexico City while saving travel pennies in a small jar.
  culinary: Alex Jimenez loves assembling crunchy tacos with shredded cheese, salsa, and guacamole, proudly helps stir tamale dough, and they occasionally experiment with a mini‑oven to bake cheesy quesadillas,
    preferring bold flavors over bland school lunches.
  core: Alex Jimenez is a meticulous little explorer who balances boundless curiosity with tidy routines, turning every sticker, river stone, and craft into a step toward future discovery, though they sometimes
    stash snacks behind the couch for midnight bites.
background:
  cultural: Alex comes from a Mexican family that celebrates traditions such as Día de los Muertos, Las Posadas, and enjoys Mexican cuisine like tacos, tamales, and guacamole. He speaks both Spanish and
    English at home, learning the languages through stories and songs. Living in Kennewick, Washington, he also experiences Pacific Northwest culture, like attending local fairs and exploring the nearby
    Columbia River. His multicultural environment nurtures a respect for his heritage while fostering curiosity about the broader world.
