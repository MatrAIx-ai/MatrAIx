personas:
  professional: David Reed is a data‑driven retail specialist with a knack for visual merchandising, who leverages advanced Excel, SQL, and POS expertise to boost sales performance, and they aim to transition
    into an assistant store manager role while preparing for a data analytics certification.
  sports: David Reed enjoys weekend hikes in the Columbia River Gorge, follows the Portland Timbers (MLS) and Trail Blazers (NBA) with fervor, participates in a local recreational basketball league, and
    they maintain fitness through low‑impact cardio and occasional 5K road races.
  arts: David Reed spends leisure time exploring the Portland Art Museum and Powell's Books, sketches urban scenes of the Pearl District, curates a personal collection of limited‑edition prints, attends
    indie‑film screenings at the Hollywood Theatre, and they draw inspiration from artists like Edward Hopper, Shepard Fairey, and Yayoi Kusama.
  travel: David Reed favors meticulously planned weekend getaways, alternating between adventure trips such as kayaking in Olympic National Park and cultural excursions to Tokyo's tech museums or Barcelona's
    Gaudí architecture, and they budget travel using a Notion itinerary while balancing work commitments.
  culinary: David Reed enjoys experimenting with moderate‑level cooking, frequently preparing dishes like sourdough avocado toast, ramen with miso broth, and quinoa salads featuring kale and truffle oil,
    and they relish dining at artisan coffee shops for single‑origin espresso while occasionally overbuying artisanal cheeses that expire unnoticed.
  core: David Reed is a 32‑year‑old analytically minded retail pro with a creative spark, who balances detailed data work with artful visual merchandising, and they tend to overthink decisions yet thrive
    on curiosity and DIY tech projects.
background:
  cultural: David was raised in a middle‑class suburban family of German‑Irish heritage in the Washington, D.C. metro area. His upbringing emphasized education, self‑reliance, and community involvement,
    such as volunteering at local fairs. Living in Bowie, Maryland, within the diverse Prince George’s County, he has absorbed a rich mix of African‑American, Latino, and immigrant cultural influences,
    broadening his appreciation for varied artistic expressions and culinary traditions. He celebrates traditional U.S. holidays while also partaking in multicultural events like local Juneteenth festivals,
    reflecting a blend of his European roots and the multicultural environment of his surroundings.
attributes:
