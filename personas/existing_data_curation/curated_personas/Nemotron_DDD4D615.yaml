  hobbies: '[''Visiting art galleries'', ''Sketching and drawing'', ''Photography'', ''Reading non-fiction (technology, design)'', ''Hiking'', ''Playing chess'', ''Arduino electronics projects'', ''Board
    game nights (small groups)'', ''Independent film viewings'']'
  career_goals: David aims to move from a front‑line sales role to a supervisory position, such as assistant store manager, where he can apply his analytical skills to improve store performance and employee
    productivity. In the longer term, he aspires to combine his love of art and technology by becoming a product manager for a tech‑enabled retail brand or opening a boutique that fuses contemporary art
    with curated consumer goods. To support these ambitions, he plans to earn a certification in data analytics, develop leadership competencies, and cultivate stress‑management techniques that will help
    him thrive in higher‑responsibility environments.
