    in local parks'', ''Attending art fairs'', ''Watercolor painting'', ''Organizing potluck events'', ''Senior book club'']'
  career_goals: Gloria hopes to formalize her role as a cultural elder in her community by launching an intergenerational oral‑history project that records the stories of Birmingham's Black residents. She
    dreams of publishing a memoir that captures her experiences from the civil‑rights era to the present, preserving her family’s culinary and artistic traditions. Additionally, she aims to start a small
    home‑based catering service specializing in traditional soul‑food dishes for local churches and senior centers, while continuing to mentor younger volunteers in community service and the arts.
