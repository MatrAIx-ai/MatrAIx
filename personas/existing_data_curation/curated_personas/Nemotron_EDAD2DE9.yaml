  hobbies: '[''Model kit building'', ''Jigsaw puzzles'', ''Fishing'', ''Weight training'', ''Community clean‑up volunteering'', ''Listening to classic rock'', ''Attending local concerts'']'
  career_goals: He aims to advance to a supervisory role within a hospitality or facilities management team, eventually becoming a housekeeping manager or facilities coordinator. He plans to obtain the
    Certified Professional Cleaner (CPC) credential and later complete a bachelor's degree in Hospitality Management to qualify for broader facility management positions. In the longer term, he envisions
    starting his own eco‑friendly cleaning service that emphasizes sustainable practices and reliable customer experiences.
