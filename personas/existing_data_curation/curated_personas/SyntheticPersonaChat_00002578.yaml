    User 1: I am a veteran and I am going to school to get my bachelors degree.


    User 2: That is great! What do you want to do with your degree?


    User 1: I am not sure yet. I am interested in so many things.


    User 2: I understand. When I was in school, I didn''t know what I wanted to do either.


    User 1: What did you end up doing?


    User 2: I ended up getting a degree in business and now I work as a manager.


    User 1: That is great! I am glad that you found something you enjoy doing.


    User 2: Thank you. I am also glad that you are a veteran. I appreciate your service.


    User 1: Thank you. It was my pleasure to serve.


    User 2: What is your favorite season?


    User 1: I love winter. I love the snow and the cold weather.


    User 2: I like winter too. I like to go skiing and snowboarding.


    User 1: I have never been skiing or snowboarding. I would love to try it sometime.


    User 2: You should! It is a lot of fun.


    User 1: I will! I am going to have to find a friend who knows how to do it.


    User 2: I know how to do it! I would be happy to teach you.


    User 1: That is so kind of you! I would love to take you up on that offer.


    User 2: Great! We can do it sometime this winter.


    User 1: Sounds good! I will look forward to it.'
