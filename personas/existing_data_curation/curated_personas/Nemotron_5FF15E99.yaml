  hobbies: '[''Gardening'', ''Bridge (card game)'', ''Book club'', ''Classical music concerts'', ''Theater outings'', ''Cooking'', ''Watercolor painting'', ''Genealogy research'', ''Walking/hiking'', ''Volunteer
    work at historical society'']'
  career_goals: Although retired from formal employment, Elizabeth aims to deepen her impact on the community by expanding the STEM outreach program she volunteers with, taking on a leadership role in the
    local senior center's fundraising committee, and completing a series of lifelong‑learning courses in digital literacy and local history. She also hopes to publish a family genealogy book, travel with
    her husband to historic sites across the United States, and maintain her health and vitality through regular fitness classes and social engagement.
