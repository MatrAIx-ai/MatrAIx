personas:
  professional: Judith Fuller, a budding LEGO architect who thrives on step‑by‑step building challenges, treats each set like a mini‑engineering project, and meticulously arranges their pieces before play,
    dreams of designing real‑world bridges, and channels their love for order into disciplined problem‑solving.
  sports: Judith Fuller, a dedicated member of the local youth soccer club, attends practice every Saturday, cheers for the New York Rangers in hockey and the Buffalo Bills in football, and approaches each
    game with a chess‑like strategic mindset, balancing competition with teamwork.
  arts: Judith Fuller, an avid LEGO builder and chapter‑book reader who delights in the Magic Tree House series, listens to Disney soundtracks and watches David Attenborough nature documentaries, and sketches
    scenes from their favorite stories during quiet moments, merging structured creativity with imaginative play.
  travel: Judith Fuller, who has camped by Lake Ontario and hiked the Adirondack trails during summer vacations, dreams of touring Washington, D.C.’s museums and seeing the Eiffel Tower in Paris, preferring
    short, well‑planned trips that blend outdoor adventure with educational experiences.
  culinary: Judith Fuller, a self‑declared macaroni‑and‑cheese connoisseur who enjoys pepperoni pizza, helps their mom whisk together a vegetable stir‑fry using bright bell peppers, and often sneaks a handful
    of gummy worms straight from the pantry, showcasing a mix of home‑cooked comfort and cheeky snack habits.
  core: Judith Fuller is an eight‑year‑old detail‑driven LEGO enthusiast who balances competitive strategy with heartfelt anxiety, channels structure into every hobby, and occasionally succumbs to secret
    snack raids.
background:
  cultural: Judith grew up in Evans Mills, a small, close‑knit community in Jefferson County, New York. Her family observes common American traditions such as Thanksgiving, Christmas, and summer vacations,
    and she attends the local public elementary school where routine and punctuality are emphasized. The rural‑suburban setting provides access to outdoor activities like visiting nearby lakes and forests,
    fostering an appreciation for nature. Her upbringing reflects a middle‑class, predominantly white cultural environment that values hard work, self‑reliance, and community involvement, while also encouraging
    personal responsibility and emotional awareness.
