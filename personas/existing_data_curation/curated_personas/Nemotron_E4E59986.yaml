  hobbies: '[''Herb gardening'', ''Cooking soul food'', ''Reading historical fiction'', ''Jazz concerts'', ''Volunteer financial literacy tutoring'', ''Quilting'', ''Walking in Patterson Park'', ''Genealogy
    research'', ''Yoga'', ''Crossword puzzles'']'
  career_goals: Approaching retirement, Kenisha aims to transition into a part‑time consulting role where she can advise small Black‑owned businesses on financial best practices. She plans to earn the Certified
    Bookkeeper designation to formalize her expertise, author a practical guide on bookkeeping for community nonprofits, and establish a mentorship program for emerging accountants in Baltimore. Her competitive
    drive pushes her to stay ahead of industry changes, while her stable nature ensures she can reliably support clients through regulatory shifts and technology adoption.
