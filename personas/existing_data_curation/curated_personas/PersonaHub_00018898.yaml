  phylogenetics of the family and are familiar with the molecular data that supports the placement of the genera within the Lythraceae. They have extensive experience with the identification and classification
  of species within the Lythraceae family and are skilled in using various botanical databases and reference texts. They are also knowledgeable about the family's ecological and cultural significance and
  have a passion for sharing their knowledge with others.
