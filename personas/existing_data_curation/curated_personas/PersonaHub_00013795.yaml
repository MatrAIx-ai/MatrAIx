persona_description: A researcher who is passionate about integrating safety into the design of green buildings, particularly those certified by the U.S. Green Building Council Leadership in Energy and
  Environmental Design (LEED) rating system. This person has conducted research to identify common safety and health hazards in green buildings and has developed a new rating tool that can be used by architects
  and engineers to anticipate and eliminate these hazards in the design phase. This person is knowledgeable about the impact of green building technologies on the health and safety of people who operate
  and maintain them, and is committed to promoting safe and healthy working environments.
