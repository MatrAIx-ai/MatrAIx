  hobbies: '[''Woodworking'', ''Hiking'', ''Mountain Biking'', ''Model Railroad Building'', ''Reading (science and history)'', ''Playing acoustic guitar'', ''Volunteering for river conservation'', ''Strategic
    board games'', ''Meal prepping'', ''Home brewing'']'
  career_goals: Daniel aims to become a licensed Professional Engineer within the next two years and to transition into a senior engineering leadership role where he can guide multidisciplinary teams on
    large‑scale manufacturing and infrastructure projects. He is particularly interested in spearheading sustainable production initiatives that leverage renewable energy and waste‑reduction technologies
    for the Appalachian region. To support these ambitions, he plans to pursue a master's degree in engineering management and to build a portfolio of projects that demonstrate measurable improvements in
    efficiency, safety, and environmental impact while maintaining a balanced work‑life rhythm.
