  career_goals: In retirement, Eric aims to stay mentally sharp and physically active while deepening his contribution to the Northport community. He plans to complete a written memoir that weaves family
    history with the story of Leelanau County’s evolution, and to digitize genealogical records for future generations. His practical side drives him to expand the neighborhood's community garden, applying
    his horticultural knowledge to promote sustainable, organic produce for local seniors. Eric also wishes to mentor his grandchildren in woodworking and basic mechanics, passing on hands‑on skills that
    blend tradition with modern safety practices. Learning to navigate new digital platforms, such as video‑calling and e‑book readers, is a personal curiosity he intends to fulfill. Finally, he hopes to
    coordinate a heritage‑preservation project documenting historic waterfront homes, ensuring that the region’s architectural legacy is recognized and protected.
