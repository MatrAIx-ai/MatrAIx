  career_goals: Even in her late eighties, Amy remains ambitious about personal growth and community contribution. She aims to complete a series of watercolor paintings that capture the seasonal rhythms
    of the North Dakota prairie and to exhibit them at the local art center. Amy is working on a memoir that weaves her family's stories with the region's history, intending to self-publish and donate copies
    to the Fargo Heritage Society. She seeks to mentor younger members of the senior center in crafts and oral-history techniques, fostering intergenerational learning. Maintaining her health is a priority;
    she plans to join a walking group, attend weekly senior-center fitness classes, and continue swimming at the community pool. Amy also aspires to organize a collaborative community garden project that
    combines traditional gardening with innovative sustainable methods, showcasing her competitive spirit in friendly gardening contests.
