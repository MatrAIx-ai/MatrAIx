  career_goals: Although retired from formal employment, Ha aims to channel her expertise into volunteer leadership roles. She plans to establish a structured intergenerational art workshop at a local community
    center, where seniors and youth co‑create projects, fostering cultural exchange. She also aspires to curate a traveling exhibition of East Asian diaspora art in San Diego’s museums, leveraging her organizational
    skills to secure funding and partnerships. Additionally, Ha seeks to mentor aspiring volunteers in project management, ensuring the programs she helps launch are sustainable and meet high standards
    of quality.
