personas:
  professional: Ha Park, a 71-year-old retired community organizer, channels meticulous event-planning expertise into leading an intergenerational art workshop at a San Diego community center, where they
    mentor volunteers, oversee budgeting, and ensure every detail meets their exacting standards.
  sports: Ha Park practices Tai Chi each morning in Balboa Park, follows the San Diego Padres avidly, and joins a senior walking group that meets twice weekly along the Sunset Cliffs Trail, balancing low-impact
    exercise with a love for baseball season excitement.
  arts: Ha Park, an avid explorer of San Diego's vibrant art scene, routinely visits the Museum of Contemporary Art San Diego and the Timken Museum of Art, drawing inspiration from artists such as Ai Weiwei
    and Yayoi Kusama, and channels that influence into curating a traveling East Asian diaspora exhibition for local museums.
  travel: Ha Park favors purposeful travel that blends cultural immersion with historical research, having recently explored the colonial architecture of Ensenada, Baja California, and planning a future
    trip to Vancouver's Pacific coast, while managing travel costs within a modest budget and coordinating with volunteer commitments.
  culinary: Ha Park delights in Korean-American fusion cuisine, often preparing kimchi-taco tacos, bulgogi-marinated avocado toast, and gochujang-glazed salmon using fresh herbs like cilantro, mint, and
    sage from their own garden, and enjoys pairing these dishes with locally sourced heirloom tomatoes and basil.
  core: Ha Park melds disciplined organization, calm resilience, and artistic curiosity into a life of volunteer leadership, mindful budgeting, and inventive cooking, all sustained by a daily Tai Chi practice
    and a passion for intergenerational cultural exchange.
background:
  cultural: Ha Park is a Korean‑American who grew up in a bilingual household, preserving many traditions from her family's heritage while embracing the multicultural fabric of Southern California. Her
    cultural identity blends respect for communal values, such as caring for elders and fostering community cohesion, with an openness to new ideas and artistic expression. She participates in local Korean
    cultural festivals, contributes to language preservation initiatives, and values the balance between honoring her roots and exploring diverse cultural experiences.
