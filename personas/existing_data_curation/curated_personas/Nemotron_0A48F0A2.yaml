personas:
  professional: Aleida Montoya, a 26‑year‑old data analyst who blends GIS mapping, statistical modeling in Python and R, and a flair for visual storytelling, channels her curiosity and organized flexibility
    into turning complex environmental datasets into bilingual outreach graphics that delight both scientists and community members, and they thrive on translating technical jargon into accessible narratives.
  sports: Aleida Montoya, a 26‑year‑old outdoor enthusiast who spends weekends hiking Sierra Nevada trails and bird‑watching with the Sierra Nevada Hiking Club, follows the Reno Aces in baseball and the
    Vegas Golden Knights in hockey, occasionally joins a local co‑ed softball league in the summer, and they treat fitness as a relaxed yet regular ritual that balances their solitary creative inclinations.
  arts: Aleida Montoya, a 26‑year‑old watercolorist and digital illustrator who draws inspiration from Frida Kahlo’s vibrant symbolism, the cinematic photography of Ansel Adams, and the lyrical prose of
    Valeria Luiselli, frequently sketches scenes from her Sierra Nevada hikes while listening to Natalia Lafourcade, and they channel this eclectic taste into scientific outreach posters that blend art
    and data.
  travel: Aleida Montoya, a 26‑year‑old traveler who has hiked the backcountry of Yosemite, explored the street markets of Mexico City, and road‑tripped to Lake Tahoe on a shoestring budget, now dreams
    of a culinary pilgrimage to Oaxaca and a photography expedition to Patagonia, and they prefer meticulously planned itineraries balanced with spontaneous detours to capture authentic moments.
  culinary: Aleida Montoya, a 26‑year‑old home cook who blends traditional mole poblano with Nevada pine nuts and foraged sage, crafts chilaquiles topped with locally caught trout, experiments with roasted
    cactus and corn masa, and they relish the creative process of fusing Mexican flavors with western ingredients while still occasionally burning the garlic when multitasking.
  core: Aleida Montoya, a 26‑year‑old curious introvert who seamlessly fuses data science with watercolor art, but can’t resist late‑night coffee binges that sometimes leave them up drafting spontaneous
    sketches, and they often find themselves juggling code and paintbrushes until sunrise.
background:
  cultural: Aleida grew up in a bicultural Mexican‑American household in Nevada. Her parents emigrated from Jalisco, bringing traditions such as Día de los Muertos, quinceañera celebrations, and a love
    for Mexican cuisine. She speaks Spanish fluently and often switches between Spanish and English, especially when explaining technical concepts to family members. Values of family cohesion, respect for
    elders, and community service are central to her identity. Living in Carson City, she balances these traditions with broader American culture, participating in local art fairs, supporting regional environmental
    initiatives, and integrating Mexican artistic motifs into her own creative work.
attributes:
  skills: '["Data analysis (Python/R)", "GIS mapping", "Statistical modeling", "Laboratory techniques (chromatography, microscopy)", "Technical writing", "Bilingual communication (Spanish/English)", "Digital
    illustration", "Photography"]'
  hobbies: '["Watercolor painting", "Digital illustration", "Landscape photography", "Reading science-fiction and Mexican literature", "Hiking and bird‑watching in Sierra Nevada", "Cooking Mexican dishes
    with local ingredients", "Playing acoustic guitar", "Volunteering at the local science museum for children''s workshops"]'
  career_goals: Aleida aims to re‑enter the professional workforce within the next two years, targeting roles that combine her STEM background with her passion for visual storytelling. She plans to enroll
    in a part‑time master’s program in Data Science while supporting her family. In the short term, she seeks a data analyst or environmental consulting position where she can apply GIS and statistical
    modeling to sustainability projects. Long‑term, she hopes to lead community outreach programs that introduce STEM concepts to Mexican‑American youth in Nevada and to create interdisciplinary educational
    content that merges scientific data with compelling visual media.
