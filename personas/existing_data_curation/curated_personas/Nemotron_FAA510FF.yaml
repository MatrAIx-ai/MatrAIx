  hobbies: '[''Reading true‑crime literature'', ''Cooking Puerto Rican cuisine'', ''Street photography'', ''Playing chess'', ''Morning running'', ''Yoga'', ''Salsa dancing (small gatherings)'', ''Watching
    classic detective films'']'
  career_goals: Hector aims to advance to a detective position within the NYPD, focusing on data‑driven crime prevention and community outreach. He plans to complete the department’s advanced investigative
    training and eventually pursue a leadership role such as sergeant or lieutenant, where he can mentor junior officers and champion stress‑management programs for staff. Balancing his curiosity with practicality,
    he hopes to pilot a pilot program that integrates new forensic technologies while ensuring they align with budgetary constraints and community needs. Long‑term, he envisions establishing a specialized
    unit that bridges law enforcement and social services to address the root causes of crime in his Brooklyn neighborhood.
