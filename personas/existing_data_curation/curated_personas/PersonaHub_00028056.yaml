persona_description: A person who is interested in the seasonal movement of herds between fixed summer and winter pastures, the traditions and festivals associated with transhumance, and the cultural significance
  of pastoral life in the Trentino/ Alto Adige region and other regions where this tradition is still present. This person may be a historian, environmental scientist, or someone with a background in animal
  husbandry and rural life. They are likely to be interested in the historical and cultural context of transhumance, as well as the ecological and economic implications of seasonal migrations of livestock.
  They may also be interested in the role of transhumance in the preservation of traditional farming practices and the importance of maintaining the cultural heritage of pastoral communities.
