personas:
  professional: David Boycott is an aspiring junior naturalist and space enthusiast who blends curiosity about the cosmos with a hands‑on approach to building Lego rockets, often balancing imaginative ideas
    with step‑by‑step instructions from picture books, and they apply this mix of wonder and practicality to every classroom project.
  sports: David Boycott is a lively participant in the Sunset Soccer Club’s Saturday morning sessions, idolizing the local professional team the Seattle Sounders while practicing dribbling drills on the
    park field, and they enjoy occasional weekend bike rides as cross‑training for stamina and coordination.
  arts: David Boycott is a budding illustrator who spends afternoons recreating scenes from Dr. Seuss and Eric Carle books with crayons and markers, dancing to The Wiggles’ tunes in the living room, and
    they often turn bedtime stories about planets into colourful drawings that line the hallway wall.
  travel: David Boycott is an eager explorer who loves weekend nature walks in the nearby state park, has visited the city’s science museum and the local aquarium, and they dream of traveling to the Kennedy
    Space Center and the Grand Canyon for hands‑on learning experiences while collecting postcards from each trip.
  culinary: David Boycott is a curious kitchen helper who loves stirring batter for banana muffins, enjoys cheesy macaroni with peas, and prefers bright ingredients like strawberries, carrot sticks, and
    gummy bears, although they occasionally sneak a few extra cookies before dinner and forget to wash their hands afterward.
  core: David Boycott blends an inquisitive mind with a practical streak, building Lego rockets while caring for a scraped elbow, saving coins for stickers, and dancing to The Wiggles, all wrapped in a
    warm, compassionate six‑year‑old’s routine.
background:
  cultural: David comes from a white, middle‑class American family of European ancestry living in New York City. His upbringing reflects core American values—encouraging curiosity, independence, and community
    cooperation. Growing up in a diverse urban environment, he is regularly exposed to a variety of cultures through school, neighborhood festivals, and city events, fostering an inclusive outlook and appreciation
    for different traditions while maintaining his family's cultural roots.
