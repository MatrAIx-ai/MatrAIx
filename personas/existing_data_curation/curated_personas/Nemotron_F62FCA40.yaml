  career_goals: David dreams of a future where he can help others and explore the world. He imagines becoming a veterinarian to care for animals, an astronaut to discover new frontiers, or a teacher to
    share knowledge with younger kids. His strong sense of compassion drives him to pursue any path that lets him make a positive difference and keep harmony around him.
