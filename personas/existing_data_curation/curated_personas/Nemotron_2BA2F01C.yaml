personas:
  professional: A veteran door‑to‑door sales professional with razor‑sharp route planning and bilingual persuasion, Lillian Moreno leverages data‑driven discipline to dominate the Willamette Valley market,
    curates eye‑catching displays, and mentors newcomers with a competitive edge while maintaining emotional steadiness under pressure.
  sports: Enjoying solo walks through Oregon’s vineyards and foothills, Lillian Moreno follows the Portland Trail Blazers and Oregon Ducks, participates in a local senior walking club, and occasionally
    joins a recreational pickleball league for light competition.
  arts: A regular visitor to Newberg’s galleries and small museums, Lillian Moreno studies visual storytelling, weaves the aesthetics into her product displays, practices traditional hand‑knitting patterns
    passed down through generations, and attends folk‑music festivals featuring artists such as Joni Mitchell and Bob Dylan, feeding her curiosity and unconventional thinking.
  travel: Preferring curated itineraries, Lillian Moreno enjoys weekend trips to the Willamette Valley vineyards, road trips to coastal towns like Cannon Beach, and dreams of exploring the art museums of
    Paris and Florence, balancing solitary sketching adventures with periodic family visits.
  culinary: An avid home cook, Lillian Moreno prepares family‑style dishes—slow‑cooked stews, hand‑rolled flatbreads, and spice‑rich sauces—using fresh herbs from her garden and pairs meals with locally
    sourced Willamette Valley wines, while occasionally selling her hand‑knit accessories at community markets.
  core: Lillian Moreno is a disciplined, curiosity‑driven 60‑year‑old vendor who fuses art, heritage, and data into every pursuit, yet often over‑books her schedule and lets a skeptical streak occasionally
    cloud collaborations.
background:
  cultural: Lillian grew up in a bilingual Mexican‑American household where Spanish and English intertwined daily, shaping her fluency and cultural fluency. Family celebrations of Día de los Muertos, quinceañeras,
    and Mexican holidays remain central to her identity, as does the practice of storytelling through food, music, and craft. While residing in Newberg, she blends her Mexican heritage with the Pacific
    Northwest’s outdoorsy lifestyle, participating in local Hispanic community events and sharing traditional recipes with neighbors. Her cultural perspective informs her respectful, yet competitive, approach
    to business and her appreciation for artistic expression across both cultures.
attributes:
  skills: '[''Strategic route planning'', ''Bilingual communication (Spanish/English)'', ''Persuasive sales pitching'', ''Inventory management'', ''Negotiation and deal closing'', ''Data‑driven performance
    tracking'', ''Mobile POS technology proficiency'', ''Creative product display design'', ''Mentoring and peer coaching'', ''Resilience and stress management'']'
  hobbies: '[''Visiting art galleries and museums'', ''Traditional Mexican knitting and crocheting'', ''Cooking Mexican cuisine'', ''Solo hiking and sketching in Oregon vineyards'', ''Attending cultural
    festivals'', ''Listening to folk and traditional music'', ''Reading art‑history and design books'', ''Gardening with native Pacific Northwest plants'']'
  career_goals: Lillian aims to expand her sales territory beyond Newberg, targeting nearby towns in the Willamette Valley to become the region’s top independent vendor. She aspires to launch a small boutique
    stall featuring handcrafted Mexican‑inspired goods, merging her cultural heritage with her love for art and innovative presentation. Additionally, she hopes to formalize a mentorship program for younger
    salespeople, sharing her disciplined methodology and competitive mindset while fostering a supportive network within the local vendor community.
