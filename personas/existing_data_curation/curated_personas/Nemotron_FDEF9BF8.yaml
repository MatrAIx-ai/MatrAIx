  hobbies: '[''Birdwatching'', ''Kayaking'', ''Gardening native plants'', ''Reading classic literature'', ''Watercolor painting'', ''Volunteering at local historical society'', ''Quilting'', ''Theater attendance'',
    ''Cooking local seafood dishes'', ''Poetry writing'']'
  career_goals: Deborah aims to advance to a supervisory position overseeing the surveillance team at her casino, obtaining certification as a Certified Protection Professional (CPP) through ASIS International.
    She plans to develop a formal training program for new officers that integrates both technical skills and humane, culturally aware practices. Long‑term, she hopes to mentor younger staff, contribute
    to community safety workshops in Friday Harbor, and eventually transition to part‑time consulting work that blends her security knowledge with her passion for public education and local heritage preservation.
