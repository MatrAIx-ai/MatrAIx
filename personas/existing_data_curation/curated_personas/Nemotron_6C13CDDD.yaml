  career_goals: Driven by her curiosity and love of art, Kim aims to transform her solo practice into a boutique studio that doubles as a creative hub for Astoria's neighborhood. She plans to launch a line
    of eco-friendly, artist-inspired nail polish shades, host monthly DIY nail-art workshops, and collaborate with local galleries for pop-up events that blend beauty and visual art. Over the next five
    years, she hopes to earn advanced master nail technician certification, expand her client base through targeted social-media campaigns, and eventually mentor aspiring nail artists while maintaining
    the flexible, low-stress schedule that suits her lifestyle.
