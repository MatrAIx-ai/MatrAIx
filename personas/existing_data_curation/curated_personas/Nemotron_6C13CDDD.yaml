personas:
  professional: Kim Mendez, a 37-year-old boutique nail artist in Astoria, blends meticulous hand-care techniques with a keen eye for color theory to craft personalized, eco-friendly nail designs while
    curating seasonal polish collections, running social-media outreach, and orchestrating community art-nail workshops, all while nurturing the dream of a collaborative studio space that doubles as a local
    art hub, and they envision the space serving both clients and local artists alike.
  sports: Kim Mendez, a yoga enthusiast who jogs in Astoria's Socrates Sculpture Park each spring, supports the New York Knicks and Queens FC, and joins weekend pick-up basketball games at a neighborhood
    park, and they treat fitness as a fluid blend of mindfulness and social play rather than strict training regimens.
  arts: Kim Mendez indulges in Astoria's thriving arts scene, regularly viewing indie films at the Museum of the Moving Image, following local muralist projects by artists like Alex Gardner, curating nail-art
    inspired playlists featuring Mitski and Julien Baker, and they draw creative spark from modern painters such as Kehinde Wiley, which collectively shape their aesthetic sensibility.
  travel: Kim Mendez favors spontaneous weekend getaways to the Hudson Valley's farm-to-table retreats and occasional overseas pilgrimages to Florence and Barcelona, seeking artistic inspiration in historic
    piazzas and Mediterranean markets while they balance travel budgets with flexible Airbnb stays and last-minute train tickets.
  culinary: Kim Mendez enjoys sampling Astoria's eclectic bite-scene, from croissant-filled cafés to Middle-Eastern falafel wraps, while also experimenting at home with Mediterranean dishes like hand-rolled
    gnocchi, saffron paella, and vibrant arancini, and they leverage a moderate cooking skill level to blend fresh basil, oregano, and smoked paprika into seasonal meals.
  core: Kim Mendez is a creatively curious nail artist who harmonizes flexible spontaneity, community-centered collaboration, and a penchant for vibrant, eco-friendly color palettes, all while they navigate
    occasional disorganization with good-natured resilience.
background:
  cultural: Kim is a white New Yorker with Southern-European roots - her family background blends Italian and Spanish heritage, reflected in her surname Mendez. Raised in Queens, she grew up amid Astoria's
    multicultural tapestry, absorbing influences from the historic Greek community, vibrant Middle-Eastern bakeries, and a bustling Hispanic enclave. This environment nurtured her appreciation for diverse
    artistic expressions and fostered a collaborative, community-oriented outlook that shapes both her personal life and professional practice.
