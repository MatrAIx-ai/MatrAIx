personas:
  professional: Kevan Phan, a veteran production worker with more than four decades of hands-on equipment operation and safety oversight, blends a practical, efficiency-first mindset with a quiet curiosity
    for new methods, and is now eyeing a supervisory or safety-training role where they can mentor younger staff despite a relaxed, sometimes disorganized approach to paperwork.
  sports: Kevan Phan still laces up sneakers for pick-up basketball games at the local gym, joins weekend fishing and deer-hunting trips, and roots for the regional baseball team the River City Rovers while
    following the state high-school basketball league, balancing a competitive edge on the court with a laid-back approach to outdoor recreation.
  arts: Kevan Phan feeds a creative spark through woodworking projects, intricate beadwork, and evenings at community cultural gatherings where they enjoy folk tunes by artists such as Woody Guthrie, Johnny
    Cash and Brandi Carlile, letting the music inspire their crafts.
  travel: Kevan Phan prefers road-trip adventures to national parks like Yellowstone and the Great Smoky Mountains, often combining fishing lodges and hunting cabins with family visits, and plans trips
    on a flexible schedule that fits their modest retirement budget and occasional spontaneous detours.
  culinary: Kevan Phan's palate favors hearty, smoky dishes such as cedar-plank salmon, wild game stew and homemade cornbread, and they proudly showcase their woodworking skills by crafting cutting boards
    while mastering simple recipes using fresh catch and local herbs like sage and thyme.
  core: Kevan Phan is a pragmatic yet curious elder who balances a competitive edge in group sports with a relaxed, sometimes disorganized lifestyle, channeling hands-on expertise into mentoring, traditional
    crafts and community gatherings.
background:
  cultural: Kevan is a member of the Lakota Nation, raised on the Cheyenne River Indian Reservation near Timber Lake. His upbringing emphasized respect for nature, community reciprocity, and oral tradition.
    He speaks English fluently and knows key Lakota phrases used in ceremonies and daily life. Kevan participates in tribal council meetings, attends annual powwows, and practices traditional crafts such
    as beadwork and storytelling, weaving his cultural heritage into his everyday interactions and future aspirations.
attributes:
  skills: '[''Machinery operation and troubleshooting'', ''Preventive maintenance of production equipment'', ''Quality control and inspection'', ''Safety compliance and training'', ''Inventory management
