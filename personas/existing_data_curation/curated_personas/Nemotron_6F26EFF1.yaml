    production logs'']'
  hobbies: '[''Community powwows'', ''Pick‑up basketball games'', ''Fishing and hunting'', ''Woodworking'', ''Beadwork and traditional crafting'', ''Volunteer mentoring at local youth center'', ''Card games
    and trivia nights'', ''Attending high school sports events'', ''Participating in tribal storytelling circles'']'
  career_goals: Approaching retirement, Kevan aims to transition into a supervisory or safety‑trainer role where he can share his practical knowledge and mentor younger workers, especially those from his
    tribal community. He also hopes to develop a small side venture creating traditional beadwork and handcrafted items, preserving cultural crafts while earning supplemental income. Ultimately, he wants
    to ensure a stable pension and contribute to community projects that blend modern workplace standards with tribal values.
