personas:
  professional: Tafari Jackson is a part-time adjunct adult-education instructor who blends curiosity for innovative pedagogy with a hands-on, practical approach, designing vocational curricula that are
    flexible yet grounded, and uses their relaxed, sometimes disorganized style to adapt spontaneously to students' needs while still delivering clear, culturally competent lessons.
  sports: Tafari Jackson is a community-basketball league player who trains at the St. Charles Rec Center, follows the St. Louis Cardinals and St. Louis City SC avidly, and uses weekend hikes along the
    Katy Trail as a low-key cardio routine that balances social competition with solitary endurance.
  arts: Tafari Jackson is a jazz saxophonist who often jams with local musicians, drawing inspiration from John Coltrane and Kamasi Washington, while indulging in speculative fiction by N. K. Jemisin and
    historical novels by Hilary Mantel, and regularly attends events featuring spoken-word poet Mahogany L. Browne and performances at the St. Louis Repertory Theatre.
  travel: Tafari Jackson is an adventurous road-tripper who prefers spontaneous weekend getaways, having already explored the Ozark mountains, the music scene in New Orleans, and the culinary streets of
    Chicago, and hopes to someday bike along the Pacific Coast Highway while balancing a modest travel budget and occasional family commitments.
  culinary: Tafari Jackson is a home-cooking enthusiast who delights in reimagining soul-food classics like collard greens with smoked kielbasa and baked mac & cheese topped with BBQ-pulled pork, skillfully
    balancing Midwestern ingredients such as cheddar-jazzed cornbread with Southern flavors, though they often indulge in late-night pizza as a guilty-pleasure.
  core: Tafari Jackson is a curious yet laid-back adult-education maker who jams on sax, tends a balcony garden, curls up with speculative fiction, and occasionally forgets to pay the electric bill because
    flexibility beats rigid schedules.
background:
  cultural: Tafari is a second‑generation African American born and raised in Saint Charles, Missouri. His grandparents migrated from the rural South during the Great Migration, bringing with them traditions
    of gospel music, storytelling, and resilient community bonds. Growing up in a church‑centered neighborhood, he internalized values of mutual support and cultural pride. He actively celebrates his heritage
    through participation in local black cultural festivals, incorporates African American history into his teaching, and blends Southern culinary traditions with Midwestern flavors in his home life.
attributes:
  skills: '[''Adult Learning Methodology'', ''Curriculum Design for Foundational Courses'', ''Classroom Management'', ''Cultural Competency'', ''Community Outreach'', ''Mentorship and Academic Advising'',
    ''Digital Literacy Instruction'', ''Public Speaking'', ''Conflict Resolution'', ''Learning Management System (LMS) Proficiency'']'
  hobbies: '[''Jazz Saxophone Improvisation'', ''Cooking Soul Food with Midwestern Influences'', ''Urban Gardening'', ''Hiking the Katy Trail'', ''Reading Speculative Fiction and Historical Novels'', ''Community
    Basketball League'', ''Attending Local Music Festivals'', ''Participating in Black Cultural Events'']'
  career_goals: Tafari aims to solidify his academic credentials by earning a bachelor's degree in Education within the next two years and subsequently a master's in Adult Education. He aspires to transition
    from his current part‑time adjunct role to a full‑time tenure‑track position at a community college, where he can develop flexible, inquiry‑driven curricula that bridge curiosity with real‑world skill
    building. He hopes to create a mentorship program for first‑generation and non‑traditional students in St. Charles, publish research on adaptable teaching methods, and eventually take on a leadership
    role such as department chair or director of a lifelong‑learning center.
