  hobbies: '["Japanese Zen Garden Care","Reading Classic Literature and Poetry","Crossword and Sudoku Puzzles","Calligraphy (Latin and Chữ Nôm)","Birdwatching in Local Nature Preserves","Traditional Vietnamese
