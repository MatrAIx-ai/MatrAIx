  career_goals: In retirement, Minh is dedicated to creating a publicly accessible digital archive that preserves the stories of Southeast Asian immigrants in Pinellas County. He plans to author a memoir
    recounting his family’s migration journey and cultural adaptation. He also aims to develop an intergenerational cooking workshop series to share traditional recipes, continue advanced online coursework
    in Asian art history, and serve as a mentor for volunteer archivists at the local historical society.
