personas:
  professional: Mera Beitler, a mini architect of block cities who spends afternoons constructing whimsical towers with LEGO and craft sticks, turning boundless curiosity into early design skills while
    happily ignoring strict schedules.
  sports: Mera Beitler, a sprightly preschooler who plays in the Bright Stars toddler soccer club, cheers loudly for the Chicago Cubs during family TV nights, and practices mini‑basketball dribbles with
    a plastic hoop in the living room.
  arts: Mera Beitler, a vivid four‑year‑old who loves splashing watercolor on paper, draws inspiration from Dr. Seuss’s quirky illustrations, sings along to Disney’s ‘Let It Go’, and proudly displays a
    crayon collage of swirling abstract shapes on the fridge.
  travel: Mera Beitler, an imaginative explorer who enjoys spontaneous trips to the nearby aquarium, builds sandcastles on Florida’s Gulf Coast beaches during family vacations, and day‑dreams about visiting
    Paris’s Eiffel Tower with a picture book guide.
  culinary: Mera Beitler, a four‑year‑old food enthusiast who adores creamy macaroni cheese, strawberry‑swirled yogurt, and avocado toast with a pinch of sea salt, proudly helps whisk pancake batter yet
    leaves a trail of flour wherever they toddle.
  core: Mera Beitler, a remarkably calm and endlessly curious four‑year‑old who turns everyday chores into imaginative quests, yet often forgets to tidy up their art supplies and leaves crayons scattered.
