  career_goals: Virginia aims to complete her associate degree in Communications and Media Studies and then pursue a role that merges her love for art with community engagement. She envisions working as
    a program coordinator for a local arts non‑profit or a museum education department, where she can design inclusive workshops and public programs. Long‑term, she hopes to obtain a bachelor’s degree in
    Arts Administration and eventually lead a community arts center that champions experimental and interdisciplinary projects, while also mentoring young people from under‑served neighborhoods in Braddock.
