    User 2: Oh, I like to read and watch movies too.

    User 1: That''s great! We have something in common.

    User 2: Yeah, we do.

    User 1: So, what are you looking for in a friend?

    User 2: I''m looking for someone who is fun to be around, who can make me laugh, and who I can be honest with.

    User 1: That sounds good. I''m looking for someone similar.

    User 2: Well, it sounds like we''re a good match.

