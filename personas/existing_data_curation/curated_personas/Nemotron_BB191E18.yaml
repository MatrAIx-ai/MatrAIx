  career_goals: Although retired from formal employment, Terrance aims to leave a lasting legacy in his Chicago neighborhood. He plans to compile a memoir that captures the stories of the South Side’s civil-rights
    era, and to create a modest scholarship for high-school seniors interested in trades. He wishes to expand the community garden he tends, inviting local children to learn sustainable gardening. Serving
    on the board of a neighborhood nonprofit that provides meals for seniors is another goal, as is leading intergenerational storytelling circles that foster harmony and cultural continuity.
