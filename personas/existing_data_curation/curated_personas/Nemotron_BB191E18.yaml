personas:
  professional: Terrance Cropper, a retired handyman and community mentor, blends decades of hands‑on home‑repair expertise, gardening know‑how, and conflict‑mediation skills to act as the neighborhood’s
    trusted go‑to advisor, balancing a practical problem‑solving mindset with a curious interest in documenting local history and organizing intergenerational storytelling circles.
  sports: Terrance Cropper, an avid lakefront walker who joins a senior walking club each spring, follows the Chicago Bulls and the Chicago White Sox for basketball and baseball, participates in a local
    bowling league with his church group, and cheers on the Chicago Bears on Sundays from his living room while enjoying a cup of tea.
  arts: Terrance Cropper, a lifelong lover of blues and jazz, spins Muddy Waters, B.B. King, Louis Armstrong and Ella Fitzgerald on his vintage record player, frequents the historic Kingston Mines club
    for live shows, and contributes his soulful voice to the church choir, allowing the music to shape his evenings and community gatherings.
  travel: Terrance Cropper, preferring low‑key road trips, has visited the civil‑rights landmarks of Birmingham, Alabama, the jazz‑rich streets of New Orleans, and the lakeside towns of Door County, Wisconsin,
    while dreaming of a spring pilgrimage to the Mississippi Delta to trace the roots of the blues that fill his home.
  culinary: Terrance Cropper, a seasoned soul‑food chef, prepares collard greens simmered with smoked turkey, crispy fried chicken seasoned with a pinch of cayenne, sweet‑potato pie, and black‑eyed peas
    with ham hocks, often adding extra hot sauce for good measure, and enjoys sharing these dishes at neighborhood potlucks despite occasionally leaving the stove on too long while humming a blues riff.
  core: Terrance Cropper, a 78‑year‑old retired handyman turned community storyteller, weaves together practical know‑how, blues melodies, garden harvests, and a steadfast commitment to neighborly harmony,
    even if they occasionally forget to turn off the oven while humming a Muddy Waters riff.
background:
  cultural: Terrance grew up as part of Chicago’s African-American community that traces its roots to the Great Migration, when families moved from the rural South in search of industrial jobs. The neighborhood’s
    church, gospel music, and soul-food cooking have shaped his values of solidarity, mutual aid, and respect for elders. He was a teenager during the civil-rights movement, witnessing local activism that
    reinforced his commitment to fairness and community harmony. Chicago’s rich blues and jazz heritage, the tradition of storytelling on porches, and intergenerational mentorship within the black community
    remain central to his identity.
