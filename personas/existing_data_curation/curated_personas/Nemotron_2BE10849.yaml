personas:
  professional: Thomas Sanghavi is an aspiring multimedia creator who blends sketching, digital art, and video editing into self‑produced YouTube shorts, while their love for spontaneous storytelling fuels
    set design work in the school theater, despite a tendency to juggle projects without strict deadlines.
  sports: Thomas Sanghavi pours energy into skateboarding at the local park, cheering for the Chicago Bulls while occasionally joining the school’s intramural soccer team, and they treat each session as
    a creative improv on wheels rather than a regimented workout.
  arts: Thomas Sanghavi immerses themselves in creative expression by sketching comic characters inspired by Studio Ghibli, producing digital collages that echo the style of artist KAWS, performing improv
    scenes at the theater club, and curating interactive installations at community art fairs, all of which shape their identity.
  travel: Thomas Sanghavi favors spontaneous weekend road trips to nearby art festivals in Chicago and day‑long excursions to the Great Lakes, dreaming of a future backpacking tour of Japan’s anime districts,
    and they plan trips on the fly with friends rather than using detailed itineraries.
  culinary: Thomas Sanghavi enjoys devouring pepperoni pizza and ramen while attempting to perfect a homemade sushi roll with avocado and cucumber, often cooking in the school kitchen after theater rehearsals
    and snacking on gummy bears during video editing marathons.
  core: Thomas Sanghavi is a curiosity‑driven teen who channels boundless energy into art, skateboarding, and spontaneous projects, yet wrestles with disorganization, impulsive spending, and the occasional
    late‑night screen‑induced fatigue.
background:
  cultural: Thomas grew up in a middle‑class white family in Madison, Wisconsin, where the city’s vibrant arts scene and progressive community have heavily shaped his worldview. His parents, both university
    alumni, encouraged exploration of cultural institutions such as the Madison Museum of Contemporary Art and local music festivals. The Midwest emphasis on community involvement and environmental stewardship
    is reflected in his participation in neighborhood clean‑up events and his appreciation for locally sourced foods. While primarily influenced by mainstream American culture, exposure to Madison’s diverse
    population has fostered his openness to unconventional ideas and his respect for varied artistic expressions.
