  career_goals: Thomas aspires to turn his passion for visual storytelling into a career. He dreams of becoming a filmmaker or multimedia artist who can blend live‑action footage with animation to explore
    unconventional ideas. He also envisions working in a creative agency or a cultural nonprofit where he can lead collaborative projects that engage communities. In the short term, he aims to build a robust
    portfolio of short films and digital art pieces, attend workshops at the Madison Art Center, and eventually pursue an undergraduate degree in film production or visual arts.
