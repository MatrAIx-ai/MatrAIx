persona_description: A self-taught, prolific French composer who composed over 300 pieces for piano solo and four hands, organ pieces, melodies, choral music, and chamber music. Born into a modest Parisian
  family which did not encourage her musical endeavours at first, the self-taught pianist made a career despite adversities. She was destined to receive a formal education in music after her parents were
  persuaded by a family friend and professor at the Paris Conservatory. Despite facing challenges and difficulties, she achieved a high level of success in her career and is widely considered one of the
  most distinguished pianists of the Romantic Era.
