personas:
  professional: Christian Moore is a budding preschool engineer who loves constructing block towers, balancing curiosity about new shapes with a practical eye for stable structures, and often organizes
    playtime with precision while still leaving room for spontaneous creativity.
  sports: Christian Moore enjoys playing in the neighborhood’s tiny soccer league, cheering for the local minor league baseball team the River Rapids, and practices a daily tricycle ride, balancing a competitive
    urge to win races with a flexible, play‑first attitude.
  arts: Christian Moore is an enthusiastic fan of The Wiggles and the animated series Bluey, loves drawing picture books in a style reminiscent of Dr. Seuss, and often hums the song Baby Shark while coloring,
    showing a quiet but vivid artistic side.
  travel: Christian Moore prefers short family road trips to familiar places like the city zoo and the nearby aquarium, but dreams of a future visit to Disneyland, approaching travel with meticulous packing
    of his favorite plush toy while quietly observing new surroundings.
  culinary: Christian Moore enjoys plain mac and cheese, chicken nuggets with ketchup, apple slices, and likes to help stir pancake batter using a big spoon, yet often refuses vegetables unless they’re
    cut into fun shapes.
  core: Christian Moore blends a toddler’s boundless curiosity with an early knack for organization, competitively racing toy cars while quietly analyzing each track’s layout, and habitually collects shiny
    coins in a piggy bank despite occasional sticky‑fingered snack mishaps.
background:
  cultural: Christian was born and raised in Syracuse, Utah, a small, close-knit town in Davis County. His family is part of the predominantly white, rural Western culture that values self-reliance, community
    service, and modest living. The community's traditions are shaped by the Church of Jesus Christ of Latter-Day Saints, with regular participation in church youth activities, Pioneer Day celebrations,
    and local agricultural fairs. Christian's upbringing includes typical American holidays such as Christmas, Thanksgiving, and Fourth of July, alongside Utah-specific customs such as family hikes in the
    nearby mountains, weekend trips to local farms, and seasonal community clean-up events. This environment nurtures his love for nature, practical chores, and a modest, responsibility-driven worldview.
