personas:
  professional: Tracy Provost, a seasoned kitchen professional at a bustling San Antonio corporate dining facility, leverages two decades of hands‑on culinary expertise—mastering Tex‑Mex comfort food, HACCP
    compliance, and rapid order timing—while balancing a preference for structured processes with a relaxed, adaptable approach to unexpected kitchen challenges, and they often lead shift changes with calm
    authority.
  sports: Tracy Provost follows the San Antonio Spurs and Texas Rangers with loyal enthusiasm, participates in the Hill Country Trail Club for weekend hikes, and occasionally joins a community center basketball
    league, balancing competitive spirit with a preference for relaxed, low‑pressure fitness activities, and they especially love cheering at home games with friends.
  arts: Tracy Provost immerses themselves in Tejano legends like Selena and country icons such as George Strait, frequents live performances at the Pearl Sausage Festival, indulges in mystery novels by
    Sue Grafton, and nurtures a budding painting hobby at the local community center, often drawing inspiration from Frida Kahlo’s vivid color palettes.
  travel: Tracy Provost plans travel around spontaneous road trips to Hill Country vineyards, weekend escapes to Austin’s music scene, annual family pilgrimages to Santa Fe, and a dream Mediterranean tour
    of Barcelona and the Amalfi Coast to source fresh ingredients for future catering menus, and they relish the blend of planned itineraries with the freedom to detour for local culinary discoveries.
  culinary: Tracy Provost, a confident home chef, blends cilantro, oregano, and basil from their balcony garden into inventive dishes like chipotle‑infused lamb kebabs and Mediterranean‑style shrimp tacos,
    while mastering the art of perfect caramelized onions for classic brisket tacos, and they often experiment late into the night, guided by the aroma of sizzling spices.
  core: Tracy Provost is a pragmatic yet adaptable culinary veteran who balances structured kitchen leadership with spontaneous flavor experimentation, all while juggling community service, modest financial
    planning, and a love for Tex‑Mex‑Mediterranean mashups, and they thrive on turning everyday challenges into creative opportunities.
background:
  cultural: Tracy grew up in a middle‑class Anglo‑American family in the suburbs of San Antonio. Her upbringing combined traditional Texas values of self‑reliance, hospitality, and community involvement
    with the multicultural vibrancy of the city. While her family’s heritage is primarily European, daily life exposed her to the region’s strong Hispanic influences—through local festivals like Fiesta
    San Antonio, the prevalence of Tex‑Mex cuisine, and bilingual interactions at work and in the neighbourhood. She identifies with the Southern‑Texan sense of pride in local traditions, enjoys celebrating
    holidays such as Independence Day with barbecues and fireworks, and participates in church‑based community events. This blend of cultural experiences has shaped her appreciation for diverse flavors,
    communal gatherings, and a pragmatic, yet flexible, outlook on life.
attributes:
