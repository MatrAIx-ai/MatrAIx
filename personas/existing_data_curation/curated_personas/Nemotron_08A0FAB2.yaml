  hobbies: '[''Home recipe experimentation (Tex‑Mex fusion)'', ''Balcony herb gardening'', ''Walking along the San Antonio River Walk'', ''Hill Country hiking'', ''Attending live music festivals (Tejano,
    country)'', ''Reading mystery and historical fiction'', ''Volunteering at a local food bank'', ''Beginner painting classes'']'
  career_goals: Tracy aims to translate her extensive hands‑on experience into formal leadership roles within the culinary field. Over the next three years she plans to complete an associate’s degree in
    culinary arts at a local community college and obtain an advanced food‑service management certification. Her short‑term goal is to become a kitchen manager at her current facility, overseeing scheduling,
    budgeting, and menu development. Long‑term, she dreams of launching a weekend catering venture that offers creative Tex‑Mex fusion dishes for local events and corporate functions. She also hopes to
    mentor younger food‑service workers, perhaps by teaching basic food‑safety and cooking classes through community outreach programs.
