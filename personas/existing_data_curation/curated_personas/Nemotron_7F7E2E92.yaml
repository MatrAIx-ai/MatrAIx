  hobbies: '[''Running'', ''Yoga'', ''Hiking'', ''Reading business and self-development books'', ''Cooking and experimenting with recipes'', ''Photography'', ''Strategic board games (e.g., Settlers of Catan)'',
    ''Mentoring through local youth programs'', ''Attending wine tastings at Connecticut vineyards'', ''Visiting local art galleries and cultural events'']'
  career_goals: She aims to progress to a regional sales manager role within the next three years, overseeing a team of reps and expanding the company's market share in New England. Elizabeth plans to deepen
    expertise in sustainable manufacturing solutions, pursue an MBA part-time, and eventually transition into a director-level position where she can shape sales strategy and mentor emerging talent.
