  career_goals: Although retired, Youa aims to stay engaged by mentoring his grandchildren and younger relatives in basic business principles, volunteering occasionally at the local senior center to run
    budgeting workshops, and preserving his cultural heritage through cooking classes for family. He also wishes to maintain his health, keep his daily routines, and ensure his spouse’s comfort and well‑being.
