persona_description: A historian who specializes in the study of Sikkim's history, particularly the period from the reign of ChogyalChakdorNamgyal to the present day. His research interests include, but
  are not limited to, the history of the Tolung Monastery, the invasion of Sikkim by the Nepalis during the late seventeenth century and the early nineteenth century, and the role of the relics in keeping
  them safe. He is well-versed in the history of Sikkim and has conducted extensive research on the Tolung Monastery and the relics.
