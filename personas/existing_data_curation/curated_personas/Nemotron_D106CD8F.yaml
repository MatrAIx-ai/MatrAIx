personas:
  professional: Marcel Hernandez, a 14‑year‑old robotics enthusiast, channels their love for structure and teamwork into building functional Lego Mindstorms creations while tutoring peers in basic programming,
    showcasing a budding engineering mindset.
  sports: Marcel Hernandez, a midfielder for Wheat Ridge United Soccer Club, follows the Denver Broncos and Colorado Avalanche with avid enthusiasm, trains twice weekly, and balances competitive play with
    community tournaments during the spring and fall seasons.
  arts: Marcel Hernandez, an aspiring acoustic guitarist, spends evenings mastering songs by John Mayer and Ed Sheeran while also enjoying the vibrant sounds of Los Tigres del Norte, and they express their
    creativity by designing intricate Minecraft builds that reflect their cultural celebrations.
  travel: Marcel Hernandez, who loves family road trips to the Rocky Mountain National Park and annual visits to Jalisco’s coastal towns, dreams of exploring Tokyo’s Akihabara district and plans to save
    for a summer adventure to the Grand Canyon.
  culinary: Marcel Hernandez, who proudly helps their family prepare tamales, salsa verde, and homemade guacamole, enjoys experimenting with cumin, coriander, and fresh lime in the kitchen, and often practices
    their own recipe for chicken mole while perfecting the art of cooking rice for tortillas.
  core: Marcel Hernandez blends a disciplined, team‑oriented mindset with cultural pride, balancing structured robotics projects, soccer, and guitar practice while meticulously managing their allowance
    and health.
background:
  cultural: Marcel is a second‑generation Mexican‑American raised in Wheat Ridge, Colorado. His parents emigrated from Jalisco, and Spanish is spoken fluently at home, giving him a strong bicultural identity.
    He actively celebrates Día de los Muertos, Cinco de Mayo, and other Hispanic holidays with extended family, and participates in his local Catholic parish. Growing up in a diverse suburban environment,
    he blends Mexican family traditions—such as communal meals and respect for elders—with the broader American cultural norms of the Denver metropolitan area. This fusion shapes his values of family cohesion,
    community service, and cultural pride.
