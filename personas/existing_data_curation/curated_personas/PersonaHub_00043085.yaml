persona_description: Alison Graham, a STEM coordinator at Atkins' Cardiff office, who is passionate about promoting STEM subjects to children at an early age through hands-on activities and outreach programs.
  She aims to encourage children to explore their creativity and problem-solving skills, dispelling gender stereotypes and showing the relevance of STEM subjects to real-life experiences. Her goal is to
  inspire the next generation of engineers by targeting students at a young age and showing the potential of STEM careers.
