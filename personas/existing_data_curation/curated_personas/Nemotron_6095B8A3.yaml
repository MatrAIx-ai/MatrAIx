  career_goals: Brenton aspires to combine his love for art and technology in a career such as architectural design, UI/UX design, or video game development. He plans to attend a university with strong
    programs in both visual arts and computer science, building a robust portfolio of artwork, prototypes, and design projects. He hopes to eventually work on projects that blend aesthetics with functionality,
    improving everyday experiences for people. Because he values compassion and self‑growth, he also envisions mentoring younger students through workshops or after‑school programs, sharing his skills in
    drawing and coding. Managing stress and maintaining a balanced schedule are important goals as he pursues these ambitions.
