persona_description: A researcher interested in fluid dynamics, particularly in the area of flow transitions and low Reynolds number flows. This person is looking for ways to reduce the flow velocity in
  open surface water channels and is interested in using a device to achieve this goal. They are seeking to assess and optimize the flow quality inside the device, including the usable test section length,
  uniformity of velocity profiles, and turbulence intensity. They are interested in using the results of the experiments to demonstrate the high quality low Reynolds number flows created by the device,
  which can be exemplified with the canonical circular cylinder in cross-flow.
