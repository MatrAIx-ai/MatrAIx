  career_goals: Ilene dreams of a future where she can help others directly. She hopes to become a pediatric nurse, caring for children’s health, or an elementary school teacher who creates a supportive
    learning environment. Her love for animals also fuels an interest in working at an animal shelter or becoming a veterinarian. She plans to graduate high school with solid grades, attend a community
    college or university focusing on health sciences or education, and earn the credentials needed to make a positive difference in people’s lives.
