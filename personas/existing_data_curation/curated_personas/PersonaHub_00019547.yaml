persona_description: A mathematics teacher who is experienced in teaching story problems in Math Stories and is skilled in using prompts to support students in reading story problems carefully. They have
  a deep understanding of the types of questions that students should ask themselves during problem-solving and are able to model self-monitoring and reflection to help students develop these skills. They
  are familiar with the WWC's sample list of prompts and are able to adapt them to Math Stories. They are also skilled in using unfamiliar language and context to help students understand problems without
  the need for a teacher or peers.
