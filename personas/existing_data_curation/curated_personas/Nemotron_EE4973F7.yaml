  hobbies: '[''Gardening'', ''Reading'', ''Crossword Puzzles'', ''Quilting'', ''Book Club'', ''Volunteer Work'', ''Walking'', ''Birdwatching'', ''Cooking'']'
  career_goals: As she approaches the final years of her career, Jan aims to institutionalize a mentorship pipeline that prepares younger clergy and lay leaders to continue her community’s educational mission.
    She hopes to expand intergenerational outreach programs that connect seniors with youth, and to secure a permanent endowment for the church’s youth scholarship. Additionally, she aspires to author a
    practical guide on structured religious education that draws on her decades of experience, ensuring her approach to organized, harmonious learning endures.
