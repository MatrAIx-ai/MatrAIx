persona_description: A person who is interested in improving the monitoring and evaluation of water, sanitation, and hygiene (WASH) programs in schools. This person is likely to be a water professional,
  particularly one who is involved in the planning, implementation, or monitoring of WASH programs in schools. This person may be a government official, a non-governmental organization (NGO) worker, or
  a private sector professional. This person is likely to be familiar with the EMIS module and the survey module, as well as the children's monitoring module. This person may also be interested in the training
  manual on mainstreaming gender into WASH programs.
