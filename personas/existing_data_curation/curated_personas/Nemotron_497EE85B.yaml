personas:
  professional: Dalia Morales, a 44-year-old correctional officer at the El Paso County Detention Center, leverages bilingual communication, meticulous report writing, and crisis de-escalation expertise
    while channeling their disciplined, organized nature and curiosity for evidence-based rehabilitation into a drive toward a supervisory role and a bilingual peer-mentoring program.
  sports: Dalia Morales, a 44-year-old fitness-focused officer, combines regular defensive-tactics training, weekend yoga at Anahata Yoga Studio, and evening walks with their dog Luna along the Rio Grande
    trail, and they cheer for the El Paso Chihuahuas baseball team and participate in the local Women's Soccer League.
  arts: Dalia Morales, a 44-year-old lover of storytelling, indulges in true-crime novels by Gillian Flynn, historical biographies by David McCullough, and dances folklorico and salsa to the sounds of Lila
    Downs and Carlos Santana, and they often attend performances at the El Paso Community Theatre.
  travel: Dalia Morales, a 44-year-old adventure-seeker, prefers road trips with Luna to destinations like Santa Fe, the Grand Canyon, and Austin's live-music scene, and they balance meticulous itinerary
    planning with spontaneous detours to local festivals, though budget constraints sometimes limit longer overseas voyages.
  culinary: Dalia Morales, a 44-year-old culinary enthusiast, masters traditional dishes such as mole, tamales, and pozole, regularly cultivates chilies and herbs on their rooftop garden, and they delight
    in sourcing fresh corn, epazote, and ancho chilies from the local farmer's market to infuse meals with authentic flavor.
  core: Dalia Morales, a 44-year-old organized and compassionate correctional officer, balances rigorous duty with vibrant cultural traditions, yet they often wrestle with worry and a penchant for over-committing
    to community service.
background:
  cultural: Dalia is a first‑ or second‑generation Mexican‑American raised in the vibrant border city of El Paso. Her family maintains strong ties to Mexican traditions, celebrating holidays such as Día
    de los Muertos and Las Posadas with food, music, and communal gatherings. Bilingual in Spanish and English, she navigates both cultures fluidly, using language as a bridge in her professional and personal
    life. Catholicism shapes her values of service, compassion, and respect for community, while the close‑knit family structure emphasizes mutual support and responsibility. Growing up near the US‑Mexico
    border has fostered a deep appreciation for bicultural identity, influencing her dedication to fostering understanding and equity within the correctional environment.
attributes:
  skills: '["Inmate supervision", "Conflict de‑escalation", "Crisis intervention", "Report writing", "Record‑keeping", "Firearms proficiency", "Defensive tactics", "First aid/CPR", "Physical fitness training",
    "Bilingual communication (English-Spanish)", "Team coordination", "Security system operation", "Policy compliance", "Rehabilitation program facilitation", "Stress management techniques"]'
  hobbies: '["Cooking traditional Mexican cuisine", "Folklorico and salsa dancing", "Reading true‑crime and historical biographies", "Yoga and journaling for stress relief", "Walking her dog along the Rio
    Grande trail", "Volunteering with youth mentorship programs", "Rooftop gardening (chilies, herbs)", "Attending community festivals and church events"]'
  career_goals: Dalia aims to advance to a supervisory role within the El Paso County Detention Center, such as Shift Supervisor or Lieutenant, within the next three years. She plans to complete a bachelor's
    degree in criminal justice, building on her associate degree, to qualify for leadership training and policy‑development positions. She is pursuing certification as a Crisis Intervention Team (CIT) officer
    and hopes to implement a bilingual peer‑mentoring program that supports inmate mental‑health and reduces recidivism. Long‑term, she envisions contributing to statewide correctional reforms that balance
    security with humane rehabilitation, and she aspires to mentor new officers, sharing her disciplined approach and practical curiosity.
