personas:
  professional: Ari Brooks leverages her hands‑on expertise in concrete pouring, framing and small heavy‑equipment operation, combined with an obsessive eye for detail and a love of sketching, to excel
    as a construction laborer poised to become a forewoman, consistently enforcing OSHA standards and turning design inconsistencies into quick visual solutions.
  sports: Ari Brooks channels her disciplined nature into weekly long runs along the Elizabeth River Trail and a membership in the Portsmouth Runners Club, while cheering on the Washington Capitals in hockey
    and the Norfolk Tides in minor‑league baseball, treating each workout as a data‑driven performance test.
  arts: Ari Brooks spends evenings sketching the colorful waterfront murals and studying works by artists such as Shepard Fairey and Kehinde Wiley, while regularly attending installations at the Virginia
    Museum of Contemporary Art and discussing the latest releases by spoken‑word poet Saul Williams at her book club.
  travel: Ari Brooks prefers meticulously planned weekend getaways that blend architectural sightseeing with budget‑friendly stays, having explored historic streets in Savannah, the waterfront of Baltimore,
    and the modern museums of Washington, D.C., while dreaming of a future solo trip to Barcelona’s Sagrada Família and a design‑focused pilgrimage to Chicago’s Architecture Foundation tour.
  culinary: Ari Brooks enjoys cooking simple, nutrient‑dense meals—often a bowl of shrimp‑and‑grits seasoned with smoked paprika, a side of roasted sweet potatoes, and a fresh kale salad tossed with lemon‑olive
    oil—while occasionally indulging in a barbeque brisket sandwich, and they pride themselves on mastering the perfect espresso pour‑over.
  core: Ari Brooks is a fiercely organized construction laborer who transforms site blueprints into spontaneous sketches, battles anxiety with meditation and runs, and quietly dreams of building affordable
    homes adorned with bold public art.
background:
  cultural: Ari is an African‑American woman who grew up in Portsmouth, Virginia, a city steeped in maritime history and civil‑rights activism. Raised in a close‑knit working‑class family tied to the Norfolk
    Naval Shipyard community, she learned early the values of self‑reliance, perseverance, and community service. Her upbringing included regular attendance at a local church, participation in neighborhood
    block parties, and celebration of traditions such as Juneteenth and soul‑food festivals. These cultural experiences fostered a strong sense of pride in her heritage and an awareness of the city's legacy
    of resilience, which informs both her disciplined work ethic and her desire to give back through construction projects that enhance the community’s visual and social landscape.
attributes:
  skills: '[''Concrete Pouring'', ''Framing'', ''Blueprint Interpretation'', ''OSHA Safety Compliance'', ''Project Scheduling'', ''Tool Maintenance'', ''Material Inventory Management'', ''Team Coordination'',
    ''Problem Solving'', ''Artistic Visualization'', ''Sustainable Building Practices'']'
  hobbies: '[''Sketching waterfront murals and urban landscapes'', ''Reading architecture and design publications'', ''Running along the Elizabeth River Trail'', ''Guided meditation and journaling'', ''DIY
    home‑improvement projects'', ''Participating in a small‑group African‑American literature book club'', ''Volunteering to assist youth with community mural projects'']'
  career_goals: Ari aims to move from laborer to forewoman within three years by completing an OSHA 30‑hour certification and a carpentry apprenticeship, followed by earning a journeyman carpenter license.
    She plans to enroll in a construction management program at a community college to gain formal credentials. Her long‑term ambition is to launch a women‑owned construction firm that specializes in affordable
    housing projects with integrated public‑art installations, allowing her to merge her construction expertise with her love for art. Ari also seeks recognition as a safety leader, targeting a zero‑incident
    record on her sites and earning a regional safety award that underscores her competitive drive and high standards.
