  career_goals: While approaching traditional retirement age, Verna aims to transition into a mentorship role, guiding younger managers in the region and establishing a succession plan for the community
    center she loves. She hopes to expand volunteer-driven health and wellness workshops for seniors, leveraging her organizational expertise to create sustainable programs. Additionally, Verna plans to
    consult part‑time for neighboring small businesses, helping them adopt structured operational practices that improve efficiency and foster a supportive workplace culture.
