  career_goals: Douglas aims to transition from a hands‑on maintenance role to a supervisory position, eventually becoming a Facilities Manager for a mid‑size commercial complex in the Philadelphia region.
    He plans to earn certifications such as Certified Maintenance & Reliability Technician (CMRT) and LEED Green Associate to enhance his credibility and to lead energy‑efficiency upgrades. In the longer
    term, his competitive drive may push him to launch his own small‑scale maintenance contracting business that specializes in environmentally sustainable retrofits for historic properties in Bucks County.
