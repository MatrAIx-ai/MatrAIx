personas:
  professional: Christopher Westmoreland is a budding electronics hobbyist who volunteers at the local library tech help desk, where they translate curiosity into practical troubleshooting, applying their
    knack for building model kits and strategic video games to diagnose issues while maintaining an organized yet flexible work style.
  sports: Christopher Westmoreland is a committed midfielder on the high‑school soccer team, training twice weekly while cheering for Manchester United and following the local MLS club, the City FC, and
    they also enjoy seasonal pickup basketball in winter and weekend fishing trips to Lake Willow for relaxation.
  arts: Christopher Westmoreland immerses themselves in sci‑fi literature, favoring authors like Neal Stephenson and Liu Cixin, while also listening to alternative rock bands such as Muse and attending
    the regional comic‑con where they showcase custom‑painted model kits, blending creative craftsmanship with pop‑culture appreciation.
  travel: Christopher Westmoreland prefers meticulously planned weekend getaways to nearby lakes for fishing expeditions, while dreaming of a summer road trip along the Pacific Coast Highway to explore
    tide pools and the technology museums of San Francisco, balancing school responsibilities and a modest travel budget.
  culinary: Christopher Westmoreland enjoys cooking simple meals like grilled trout with lemon and herbs, often experimenting with homemade spice rubs, while also indulging in pizza topped with pepperoni
    and pineapple, and they have a budding skill for assembling snack‑size model‑themed cupcakes.
  core: Christopher Westmoreland is a fourteen‑year‑old tech‑savvy hobbyist who blends strategic gaming, model‑building precision, and a love of soccer into a pragmatic yet curious outlook, occasionally
    overindulging in gadgets and snack foods while maintaining a steady, organized routine.
background:
  cultural: Christopher grew up in the predominantly white, working‑class community of Beloit, Wisconsin, where Midwestern values of hard work, modesty, and community involvement are central. His family
    has deep roots in the region, reflecting German‑Polish ancestry that influences family gatherings, traditional foods, and holiday celebrations. The small‑city atmosphere, proximity to the Mississippi
    River, and supportive local schools foster an environment that blends traditional values with openness to new ideas, shaping his balanced personality of curiosity and practicality.
