persona_description: A researcher in the field of cardiovascular medicine, particularly focused on the study of left ventricular diastolic function and its relation to pulmonary hypertension. This researcher
  is interested in using novel mapping techniques, such as cardiovascular magnetic resonance (CMR) tissue phase mapping, to investigate the mechanics of left ventricular function in patients with pulmonary
  hypertension. They are interested in the potential clinical implications of their findings, such as predicting functional capacity and clinical worsening, and are seeking to expand the study with more
  patients to validate the technique.
