personas:
  professional: Maurice Hedblom is a 21‑year‑old CNC machining specialist whose day‑to‑day routine blends meticulous blueprint reading, precision measurement, and on‑the‑fly adjustments, while their ambition
    to earn NIMS Level III certification and step into programming reflects a structured career path tempered by a laid‑back attitude toward scheduling.
  sports: On weekends Maurice Hedblom drops into a casual pickup basketball league at Al Lopez Park, roots for the Tampa Bay Buccaneers and Rays, and joins a small Gulf Coast Bass Club where they and a
    close friend chase snook and redfish from the Gulf's mangroves.
  arts: Immersed in the rhythms of Kendrick Lamar, Miles Davis, and Erykah Badu, Maurice Hedblom channels their appreciation for music into the meticulous detailing of their scale model kits, while occasionally
    attending Tampa’s contemporary art exhibits to spark fresh design ideas.
  travel: Preferring a blend of spontaneous road trips and carefully budgeted getaways, Maurice Hedblom has already road‑tripped the Florida Keys and Nashville, dreams of exploring the historic shipyards
    of Bilbao for a machining conference, and balances travel ambitions with their apprenticeship schedule.
  culinary: Maurice Hedblom delights in sinking their teeth into smoked brisket, collard greens seasoned with smoked paprika, and homemade gumbo, often wielding their grill’s hickory chips and experimenting
    with traditional soul‑food spices while occasionally whipping up their own version of tangy BBQ sauce.
  core: Guns blazing with precision in the machine shop yet blissfully disorganized when planning their next fishing trip, Maurice Hedblom merges a hands‑on maker’s mind with a laid‑back love for soulful
    food and solo hobbies.
background:
  cultural: Maurice grew up in the historically Black neighborhoods of Tampa, surrounded by a close‑knit extended family and community. His parents worked in trade jobs, instilling a strong work ethic and
    practical skills from a young age. The local African‑American culture—church gatherings, soul‑food cooking, hip‑hop and R&B music, and community sports—shaped his worldview. He maintains ties to his
    cultural roots through family meals, church events, and local festivals, while also navigating the broader, diverse Tampa environment. This background contributes to his cooperative nature, respect
    for community, and pride in his heritage.
attributes:
  skills: '[''CNC machining'', ''Manual lathe operation'', ''Blueprint reading and GD&T interpretation'', ''Precision measurement (micrometers, calipers, height gauges)'', ''Machine maintenance and troubleshooting'',
    ''Quality inspection and statistical process control'', ''Basic CAD/CAM for part programming'', ''Safety compliance and OSHA standards'', ''Metalworking (milling, turning, drilling)'', ''Basic welding
    (MIG/TIG)'']'
  hobbies: '[''Scale model building (cars, aircraft)'', ''3D printing hobby projects'', ''Fishing on the Gulf Coast'', ''Cooking soul-food and barbecue'', ''Pickup basketball with a small group'', ''Listening
    to hip‑hop, jazz and R&B'', ''Strategic video gaming (e.g., turn‑based strategy)'']'
  career_goals: Maurice aims to earn NIMS Level III certification in CNC machining and transition from operator to CNC programmer within the next three years. He aspires to become a lead machinist or shop‑floor
    supervisor, eventually managing a small precision machining shop that serves aerospace and medical‑device clients. To broaden his expertise, he plans to study additive manufacturing and deepen his CAD/CAM
    proficiency, positioning himself for future technology‑driven roles in advanced manufacturing.
