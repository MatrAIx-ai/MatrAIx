    design basics'', ''Strategic planning and conflict resolution'']'
  hobbies: '[''Gardening (native Virginian plants)'', ''Walking and birdwatching on York River trails'', ''Reading historical biographies and non‑fiction'', ''Genealogical research'', ''Small book‑club
    gatherings'', ''Yoga and meditation for stress relief'', ''Attending intimate wine‑tasting events'', ''Volunteering with local historical preservation society'']'
  career_goals: Brooke aims to elevate her standing as the premier specialist in historic residential properties within Yorktown and the surrounding Tidewater region. She plans to launch a boutique brokerage
    that integrates modern technology with a deep respect for colonial‑era homes, offering curated marketing and restoration consulting services. Over the next five years, she seeks to achieve top‑producer
    status, mentor at least three junior agents, and build a portfolio of renovated historic houses that she can eventually manage as boutique rentals. Long‑term, Brooke envisions transitioning into property
    development focused on adaptive reuse of historic structures, preserving local heritage while generating sustainable income.
