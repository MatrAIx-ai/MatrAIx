    Power BI)'', ''Project Management'', ''Process Improvement (Lean Six Sigma)'', ''Sustainable Procurement'', ''Budgeting'', ''Research & Trend Forecasting'', ''Art Appreciation'', ''Creative Problem
    Solving'']'
  hobbies: '[''Visiting art galleries and museums'', ''Photography (nature and urban)'', ''Reading (historical non-fiction, African American literature)'', ''Gardening (vegetable and ornamental)'', ''Woodworking'',
    ''Playing chess'', ''Listening to jazz and blues'', ''Cooking Southern cuisine'', ''Community volunteering'', ''Attending small live music sessions'']'
  career_goals: Keshun aims to advance to a senior leadership role such as Procurement Director or Head of Strategic Sourcing within the next five years, leveraging his certification goals (CPSM, Lean Six
    Sigma Black Belt) to drive organization‑wide sustainability initiatives. He aspires to establish a supplier‑diversity program that elevates Black‑owned businesses in the Mississippi Delta while mentoring
    emerging procurement professionals. Ultimately, he envisions launching a consultancy that blends supply‑chain efficiency with cultural‑sensitive sourcing strategies, allowing him to contribute his artistic
    curiosity to corporate innovation.
