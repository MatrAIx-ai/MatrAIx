personas:
  professional: Keshun Mcneill, a seasoned strategic sourcing expert with 25 years of experience in supplier relationship management, leverages data‑driven cost analysis, Lean Six Sigma methods, and SAP/Oracle
    ERP proficiency to drive cost efficiencies, while their curiosity and artistic sensibility inspire innovative, sustainability‑focused procurement solutions and a commitment to elevating minority‑owned
    suppliers.
  sports: Keshun Mcneill follows the Mississippi State Bulldogs football team and the New Orleans Saints, participates in a weekly senior walking group at the local park, and plays recreational chess at
    the community center, considering it a low‑impact sport, while occasionally attending Jackson State University basketball games with a small circle of friends.
  arts: Keshun Mcneill frequents the Jackson Museum of Art and the regional heritage museum, curating a personal collection of prints by Jacob Lawrence, Romare Bearden, and contemporary portraitist Kehinde
    Wiley; they immerse themselves in jazz legends like John Coltrane and blues icons such as B.B. King while volunteering to teach art appreciation to youth at their church, and their photography of historic
    downtown Saltillo often mimics the compositional style of Henri Cartier‑Bresson.
  travel: Keshun Mcneill prefers low‑key, culturally rich trips, planning seasonal road trips to destinations like Savannah’s historic squares, New Orleans’ French Quarter, and the vineyards of Napa Valley,
    while budgeting carefully to fund an annual pilgrimage to the Oaxaca crafts market, balancing a love for quiet exploration with the constraints of a demanding senior procurement role.
  culinary: Keshun Mcneill enjoys cooking Southern‑inspired meals such as shrimp and grits, smoked collard greens, and black‑eyed pea jambalaya, often using homegrown tomatoes, okra, and sweet potatoes,
    while experimenting with spice blends featuring smoked paprika, cayenne, and fresh thyme to the backdrop of jazz and blues playlists.
  core: Keshun Mcneill is a meticulous strategic sourcing veteran whose solitary art‑collecting and garden‑tending rituals mask a restless mind that over‑analyzes every purchase, often staying up late worrying
    about the next negotiation.
background:
  cultural: Keshun is a middle‑aged Black man rooted in the cultural tapestry of the Deep South. His family’s lineage traces back to the Great Migration, with grandparents who settled in the Mississippi
    Delta seeking better opportunities. Growing up in a close‑knit Baptist community, he absorbed gospel traditions, oral storytelling, and the resilience embedded in African American Southern culture.
    His marriage and community ties in Saltillo reinforce a sense of stewardship, prompting him to support local Black‑owned enterprises and preserve regional art forms. This heritage informs his professional
    ethos—valuing equity, sustainability, and the intergenerational transmission of cultural knowledge—while his personal pursuits celebrate the rich artistic legacy of his ancestors.
attributes:
