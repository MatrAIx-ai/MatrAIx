personas:
  professional: A meticulous accountant named Si Wan leverages deep expertise in GAAP, audit procedures, and advanced Excel modeling while weaving compassionate client communication and collaborative conflict
    resolution into every financial reporting project.
  sports: An energetic fitness enthusiast named Si Wan dominates group Zumba and spin classes, competes in weekly badminton matches at the Tulsa Badminton Association, roots for the Oklahoma City Thunder
    during NBA season, and volunteers as a youth sports mentor at the local community center.
  arts: An arts‑savvy cultural explorer named Si Wan frequents the Tulsa Performing Arts Center for contemporary dance shows, curates personal playlists featuring Taylor Swift, Sufjan Stevens, and Yo‑Yo Ma,
    and attends monthly indie‑film screenings at the Film Forum, drawing inspiration for her creative cooking.
  travel: An adventurous traveler named Si Wan spends weekends hiking the misty trails of Ouachita National Forest, plans annual pilgrimages to the country of her ancestors to reconnect with family traditions,
    and dreams of exploring the historic streets of Florence while balancing a modest travel budget.
  culinary: A culinary experimenter named Si Wan channels her love for fusion by whisking together ginger‑infused collard greens, soy‑glazed salmon with a corn‑bread crust, and steaming bao buns filled
    with seasoned pork, mastering both QuickBooks for budgeting kitchen supplies and the art of balancing umami with Midwestern heartiness.
  core: Si Wan blends a rigorously structured accounting mind with a vibrant social pulse, turning community volunteerism and daring kitchen mash‑ups into a life where numbers meet nuance, fitness meets
    friendship, and disciplined saving meets occasional indulgence.
background:
  cultural: Si Wan is of East Asian descent, raised in a bilingual household where her parents, immigrants from South Korea, emphasized the values of family harmony, respect, and community service. She
    celebrates cultural traditions such as Lunar New Year and Chuseok, maintains fluency in Korean alongside English, and participates in local Asian cultural festivals in Tulsa. These cultural influences
    shape her compassionate outlook, collaborative spirit, and dedication to helping others, while also informing her appreciation for structured rituals and organized approaches to both professional and
    personal life.
attributes:
