  hobbies: '[''Zumba and spin classes'', ''Badminton with a local club'', ''Volunteering at Tulsa food bank'', ''Youth mentorship outreach'', ''Cooking Asian‑fusion meals'', ''Hiking in Ouachita National
    Forest'', ''Practicing Tai Chi'', ''Traveling to East Asia'']'
  career_goals: Si Wan aims to become a Certified Public Accountant (CPA) within the next two years and progress to a senior auditor or audit manager role at a reputable firm in Oklahoma. She envisions
    leading a team that emphasizes both technical excellence and a supportive, harmonious workplace culture. Long‑term, she aspires to develop a community‑focused financial consulting practice that offers
    pro‑bono financial literacy workshops for immigrant families and non‑profit organizations, leveraging her expertise to help others achieve financial stability.
