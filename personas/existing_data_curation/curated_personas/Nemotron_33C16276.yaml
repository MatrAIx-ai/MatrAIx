  career_goals: Salam aims to complete his associate degree in computer science and transfer to a bachelor's program that emphasizes applied engineering or data science. His short‑term goal is to secure
    an internship with a mid‑west technology firm where he can contribute to real‑world software projects while refining his practical coding skills. Long‑term, he envisions a career as a software engineer
    or data analyst focused on developing reliable, user‑centric solutions for manufacturing or IoT applications. He also aspires to earn industry certifications (e.g., AWS Certified Developer) and eventually
    lead small, methodical development teams that balance innovation with proven processes.
