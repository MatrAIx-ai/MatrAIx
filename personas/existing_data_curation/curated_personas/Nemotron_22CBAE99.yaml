personas:
  professional: Nawal Noel, a 19‑year‑old aspiring agricultural business coordinator, leverages their Excel inventory tracking skills and farm equipment maintenance experience to streamline the family farm’s
    supply chain, while they also volunteer at the local library’s data‑entry desk, applying the same structured planning they practice in their bullet‑journal.
  sports: Nawal Noel, an avid cyclist who rides the Peterson trail network with the local Peterson Trail Riders club, also follows the Iowa Hawkeyes football and the Chicago Cubs baseball teams, and they
    supplement their outdoor rides with occasional recreational volleyball in the fall, always tracking their mileage and heart‑rate in a spreadsheet.
  arts: Nawal Noel, who enjoys capturing sunrise silhouettes over the cornfields with a DSLR inspired by Ansel Adams, spends quiet evenings listening to folk‑rock artists like Sufjan Stevens and Bon Iver,
    reads contemporary fiction such as 'The Night Circus' alongside practical non‑fiction like 'The Checklist Manifesto', and they occasionally attend the county fair’s open‑mic poetry nights, though they
    admit to procrastinating on finishing their own creative writing projects.
  travel: Nawal Noel, who plans all trips with a detailed itinerary in their bullet‑journal, prefers road‑trip adventures that combine visits to nearby agricultural fairs in Des Moines and historic sites
    in Chicago, dreams of studying sustainable farms in the Netherlands, and they occasionally splurge on a weekend getaway to the Great Smoky Mountains, even though their budget limits frequent travel.
  culinary: Nawal Noel, an enthusiastic home cook who experiments with family recipes like buttermilk fried chicken and cornbread, adds fresh garden vegetables such as heirloom tomatoes and roasted carrots
    to hearty stews, enjoys crafting homemade apple pie with a pinch of cinnamon, and they often trade homemade jams with neighbors, though they sometimes forget to clean the kitchen after cooking.
  core: Nawal Noel, a 19‑year‑old planner‑obsessed farm‑rooted pragmatist who never misses a bullet‑journal entry, diligently tracks every task, yet they have a secret habit of binge‑watching true‑crime
    podcasts at midnight and occasionally neglecting their laundry until Sunday night.
background:
  cultural: Nawal grew up in Peterson, a small town in O’Brien County, Iowa, within a predominantly white, Midwestern community. Her family has deep roots in the region’s farming tradition, and she was
    raised with values of hard work, self‑reliance, and community service. The local culture emphasizes modesty, practicality, and close‑knit relationships, often centered around the local church, school
    events, and agricultural fairs. While she identifies with these heartland values, she also embraces modern influences through digital media and education.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Microsoft Office (Word, Excel, PowerPoint)'', ''Data entry'', ''Customer service'', ''Basic agricultural equipment maintenance'', ''First
    Aid and CPR certification'', ''Clear written communication'', ''Problem solving'', ''Team collaboration in small groups'']'
  hobbies: '[''Bullet journaling'', ''Reading (fiction and non‑fiction)'', ''Gardening'', ''Cooking'', ''Knitting'', ''Biking on local trails'', ''Landscape photography'', ''Volunteering at community library'',
    ''Listening to podcasts on agriculture and health'']'
  career_goals: Nawal aims to enroll at a nearby community college to pursue an associate’s degree in agricultural business or health services. She plans to obtain certifications such as a Certified Nursing
    Assistant (CNA) or a heavy‑equipment operator license, which would enable her to secure a stable, structured position in the local healthcare clinic or on a family farm. Long‑term, she hopes to combine
    her organizational strengths and practical knowledge to manage a small agribusiness or serve as a health‑care coordinator, while maintaining a balanced lifestyle close to her community.
