  hobbies: '[''Reading contemporary fiction and poetry (Spanish and English)'', ''Digital and film photography (nature and urban scenes)'', ''Cooking Chilean dishes (empanadas, pastel de choclo, cazuela)'',
    ''Playing acoustic guitar'', ''Mindfulness meditation and gentle yoga'', ''Hiking on Florida coastal trails and state parks'', ''Participating in small art workshops and community cultural events'',
    ''Journaling and creative writing'']'
  career_goals: Felipe aims to re‑enter the workforce by turning his creative passions into a sustainable career. He is working toward a certification in museum education or cultural liaison work so he
    can design and lead small‑scale exhibitions that highlight Latin American art for local schools and community centers. Parallel to that, he plans to develop a modest home‑based catering service specializing
    in Chilean comfort foods, using his culinary skills to bring a taste of his heritage to the Navarre area. He also hopes to build a modest freelance portfolio in graphic design and photography, enabling
    flexible work that accommodates his need for solitude and time to manage stress. Ultimately, he envisions a balanced professional life that allows him to contribute culturally, support his family financially,
    and maintain a healthy work‑life rhythm.
