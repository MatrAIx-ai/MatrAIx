personas:
  professional: Felipe Salgado is a bilingual museum education aspirant who blends self‑taught photography, basic graphic design, and community‑organizing experience to craft intimate exhibitions that showcase
    art from their family's cultural origins for local schools, while simultaneously building a modest home‑based catering service, their methodical yet flexible approach reflecting a reliable but reserved
    nature that prefers small collaborative teams.
  sports: Felipe Salgado enjoys low‑impact fitness, regularly hiking Florida’s coastal trails with the Navarre Trail Runners Club and paddling in the Gulf during summer, while cheering on the Tampa Bay
    Buccaneers, Tampa Bay Rays, and Orlando Magic from their balcony, and occasionally joining community pick‑up soccer games in the cooler months.
  arts: Felipe Salgado immerses themselves in visual and literary arts, photographing everyday moments inspired by Sebastião Salgado, reading contemporary poets such as Ocean Vuong and Valeria Luiselli
    in both Spanish and English, strumming acoustic guitar renditions of Nick Drake and José González, and participating in intimate workshops led by local muralists and poets to refine their storytelling
    craft.
  travel: Felipe Salgado favors thoughtfully planned, low‑key travel experiences, often taking weekend road trips to coastal gems like Key West or historic towns such as Savannah, while dreaming of longer
    adventures to Patagonia and Machu Picchu, balancing a modest travel budget with a desire for authentic immersion over crowded tourism.
  culinary: Felipe Salgado boasts confident culinary skills, regularly preparing traditional comfort foods such as empanadas, pastel de choclo, and cazuela using locally sourced seafood, avocado, and chiltepin,
    while experimenting with fusion twists—like a citrus‑marinated mahi‑mahi empanada—reflecting a love for both heritage and creative flavor pairings.
  core: Felipe Salgado is a quietly contemplative creator who channels chronic worry into meticulous art projects and culinary experiments, yet habitually over‑books their schedule, leaving scant moments
    for restful downtime.
background:
  cultural: Felipe was born and raised in a Chilean‑immigrant family, growing up in a household where Spanish was spoken daily and Chilean traditions—such as celebrating Fiestas Patrias, sharing communal
    meals of empanadas and asado, and listening to folk music like cueca—were central. The family’s Catholic roots and emphasis on close‑knit family bonds shaped his values of hospitality and collective
    well‑being. After moving to the United States as a teenager, he settled in Navarre, Florida, where he blends his South‑American heritage with the coastal Gulf‑Coast culture. He remains active in the
    local Latino community, attends bilingual cultural festivals, and incorporates both Chilean and Floridian culinary influences in his cooking. His dual cultural perspective informs his appreciation for
    art, his desire to act as a cultural bridge, and his comfort navigating both Spanish‑speaking and English‑speaking environments.
attributes:
