persona_description: A concerned individual who is passionate about public health and the dangers of smoking, particularly among young people. This person is aware of the harmful effects of vaping cigarettes
  and is actively advocating for a ban on smoking to protect young people from harm. They are informed about the research and studies conducted by the U.S. National Institute on Substance Abuse and the
  Royal Society, and are aware of the potential long-term side effects of vaping. This person is interested in the regulation of e-cigarettes and is actively seeking ways to reduce the use of e-cigarettes
  among young people. They are aware of the potential harm caused by flavored candies and gums and are actively advocating for the ban on such products.
