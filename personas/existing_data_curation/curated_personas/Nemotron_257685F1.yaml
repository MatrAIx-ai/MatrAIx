  career_goals: Jesse aims to become a senior software engineer within the next three years, focusing on leading development teams that deliver stable, high-quality products. He aspires to take on a technical
    lead role where he can standardize coding practices and improve workflow efficiency. Long-term, he envisions moving into a product management position that leverages his business education, allowing
    him to shape product roadmaps while maintaining a structured, data-driven approach. He also wants to mentor junior developers and foster a collaborative, harmonious work environment that aligns with
    his considerate personality.
