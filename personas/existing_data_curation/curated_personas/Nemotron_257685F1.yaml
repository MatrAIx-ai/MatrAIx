personas:
  professional: Jesse Harris is a full‑stack web developer whose methodical debugging style, business‑analysis acumen, and commitment to agile best practices enable them to build scalable, maintainable
    applications while fostering a collaborative atmosphere for junior teammates.
  sports: Jesse Harris channels their solitary exercise routine into early morning jogs on the Genesee River Trail, tracks progress with a fitness app, supports the Rochester Red Wings and Buffalo Bills
    as a dedicated fan, and they participate in the Rochester Running Club’s weekend group runs.
  arts: Jesse Harris maintains a weekly piano practice schedule that focuses on the works of Beethoven and Chopin, attends occasional performances by the Rochester Philharmonic, enjoys strategic board games
    like Terraforming Mars, and they unwind by listening to folk artist Sufjan Stevens while reading biographies of business leaders.
  travel: Jesse Harris prefers meticulously planned road trips to nature retreats such as the Adirondack Park and Finger Lakes, has visited historic sites like Williamsburg, Virginia, dreams of touring
    Berlin’s WWII museums, and they balance travel ambitions with a modest budget by scheduling weekend getaways and using travel reward points.
  culinary: Jesse Harris enjoys cooking fresh garden harvests into dishes like ratatouille, quinoa‑basil salad, and roasted zucchini, boasts a competent home‑cook skill set focused on seasonal, plant‑forward
    meals, and they occasionally indulge in a slice of New York‑style pizza topped with extra mozzarella during board‑game nights.
  core: Jesse Harris is a calm, routine‑oriented technologist who harmonizes methodical code craftsmanship with a love for gardening, board games, and piano, while they quietly battle a tendency to over‑organize
    their calendar.
background:
  cultural: Jesse grew up in a middle-class, white family in the Rochester, NY area, where community ties and a strong work ethic were emphasized. His family’s roots trace back to the Northeast United States,
    with traditions of attending local events, seasonal festivals, and valuing practicality and modesty. He attended public schools, participated in community sports and church activities, and was taught
    the importance of reliability, cooperation, and harmony. The regional culture of upstate New York, with its blend of industrial heritage and natural surroundings, reinforced his appreciation for routine,
    practicality, and community service.
