  career_goals: Kimberly envisions a future where she can blend her curiosity about science with practical problem‑solving. She aims to become an environmental scientist or biomedical engineer who designs
    sustainable solutions for local farms and healthcare challenges in her community. She also thinks about a role as a science educator, sharing hands‑on experiments with younger students. Her long‑term
    ambition is to lead a collaborative research project that balances innovative ideas with real‑world impact, while still allowing her to mentor peers and stay involved in community service.
