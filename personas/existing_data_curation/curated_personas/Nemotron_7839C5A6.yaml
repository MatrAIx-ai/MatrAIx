personas:
  professional: Kimberly Mcneese is an aspiring junior game developer who creates simple Scratch games for school fundraisers, blending their curiosity for new ideas with a practical, methodical workflow
    and a competitive drive that pushes them to top the class leaderboard.
  sports: Kimberly Mcneese is a defender on the middle school soccer team, follows the Toronto Raptors and Toronto Maple Leafs closely, and competes in local track meets with the Blue Mountain Youth Athletics
    club, combining a competitive spirit with a love for teamwork and community sport.
  arts: Kimberly Mcneese engages in creative expression by coding story-driven Scratch games inspired by Isaac Asimov's sci-fi worlds, crafting friendship bracelets while listening to Taylor Swift and Ludovico
    Einaudi, and practicing beginner piano pieces like Beethoven's Fur Elise, all of which shape a vibrant artistic identity.
  travel: Kimberly Mcneese prefers family road trips that mix hikes on Blue Mountain's scenic trails with weekend visits to Niagara Falls, and dreams of an organized, selfie-filled adventure to Tokyo's
    tech districts and Iceland's geysers, often mapping itineraries in a scrapbook for visual planning.
  culinary: Kimberly Mcneese enjoys baking chocolate-chip cookies with her family, whipping up easy macaroni-and-cheese dinners, and experimenting with homemade pepperoni pizza topped with fresh basil and
    mozzarella, showing a budding kitchen confidence that leans toward sweet treats over spicy flavors.
  core: Kimberly Mcneese is a curiosity-driven, organized twelve-year-old whose competitive spirit fuels her love for coding, soccer, and crafting, yet she sometimes splurges on gadgets and forgets to take
    her allergy medication.
background:
  cultural: Kimberly comes from a white, multi‑generational family with German and Irish roots that settled in the greater Reading area of Berks County. Her family participates in community traditions such
    as the annual Berks County Fair, local church gatherings, and holiday celebrations like Thanksgiving and Christmas. Growing up in Temple, Pennsylvania, she is familiar with the region’s mix of small‑town
    values and agricultural heritage, often hearing stories about the county’s farms and local history. These influences foster a strong sense of community, a respect for hard work, and an appreciation
    for both the practical and imaginative aspects of life.
