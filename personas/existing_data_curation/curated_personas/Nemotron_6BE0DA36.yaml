personas:
  professional: A seasoned residential real-estate specialist with 35 years of DuPage County experience, Kevin Frazier leverages systematic market analysis, a warm but structured client follow-up system,
    and a sprawling network of contractors, and they occasionally rely on spontaneous check-ins that reflect his relaxed approach to obligations.
  sports: Kevin Frazier, an avid golfer at the Oak Brook Country Club and a dedicated member of the Lemont Fishing Club, follows the Chicago Bears, Chicago Cubs, and Chicago White Sox, and they join seasonal
    senior softball leagues, blending his love for low-impact competition with community camaraderie.
  arts: Kevin Frazier, a longtime participant in the local community theater troupe where he designs sets for productions like "Our Town" and occasionally steps onstage, also enjoys listening to Frank Sinatra,
    The Beatles, and contemporary Broadway composer Lin-Manuel Miranda, allowing his creative side to balance his analytical real-estate mindset, and they often share stories and music while cooking for
    family.
  travel: Kevin Frazier prefers moderately planned road trips that combine classic-car shows with historic Midwest tours, having driven the Route 66 corridor from Chicago to Santa Monica and planning a
    future family cruise to New Orleans for its jazz heritage, yet they balance these adventures with a desire to stay close enough for weekend grandchildren visits.
  culinary: Kevin Frazier, a competent home chef, spends Saturday afternoons preparing roast chicken with rosemary, garlic-infused mashed potatoes, and a buttery apple crumble, while they also experiment
    with bourbon-glazed carrots and occasionally treat his grandchildren to homemade chocolate chip cookies, showcasing his love for comforting, family-centered meals.
  core: Kevin Frazier is a socially vibrant, structure-loving real-estate veteran who channels his anxiety into yoga, indulges in classic-car restoration, and balances meticulous market analysis with spontaneous
    check-ins, all while they have a penchant for occasional splurges and a heart for community service.
background:
  cultural: Kevin grew up in the suburban Midwest, raised in a middle‑class white family in the Chicago suburbs. His upbringing reflects classic DuPage County values of hard work, community involvement,
    and modesty. He attended a public high school in the area and obtained his real‑estate license through local apprenticeship programs. The regional culture, with its emphasis on polite interaction, neighborhood
    loyalty, and a blend of traditional and progressive outlooks, has shaped his worldview. He attends a local Protestant church, participates in town festivals, and enjoys the Midwestern tradition of supporting
    local sports teams, especially the Chicago Bears and Cubs.
