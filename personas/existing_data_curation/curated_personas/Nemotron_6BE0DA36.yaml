  career_goals: Kevin aims to transition to a semi‑retirement role where he can act as a senior advisor within his brokerage, focusing on mentoring the next generation of agents and deepening his involvement
    in community‑focused development projects. He intends to expand his boutique brokerage’s footprint by securing a niche in senior‑friendly housing and assisted‑living properties, leveraging his knowledge
    of the local market and his network. Additionally, Kevin plans to build a modest portfolio of rental properties that will provide passive income in retirement, while continuing to host educational workshops
    for local homeowners to demystify the buying and selling process. He also hopes to maintain a balanced work schedule that supports his mental wellbeing, incorporating regular breaks and stress‑management
    practices.
