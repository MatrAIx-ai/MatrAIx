  hobbies: '[''Visiting art galleries and museums'', ''Attending live music and dance events'', ''Salsa and bachata dancing'', ''Cooking Honduran cuisine'', ''Reading literary fiction and poetry'', ''Traveling
    to Central America'', ''Street photography'', ''Yoga and fitness'', ''Volunteering at community arts programs'', ''Hosting cultural discussion circles'']'
  career_goals: Claudia aims to advance to a senior editorial leadership role, eventually becoming a content director for a multicultural media outlet. She aspires to launch a digital magazine that highlights
    Central American art and diaspora voices, and to integrate multimedia storytelling—podcasts, video series, and interactive features—into her editorial repertoire. Pursuing a master's in publishing and
    building a mentorship program for emerging Hispanic writers are also key milestones on her path to shaping inclusive narratives at a national level.
