  career_goals: William aims to re‑enter the workforce in a role that offers clear structure and measurable outcomes, such as a grant‑writer or program coordinator for a regional cultural institution. Over
    the next two years he plans to earn a Project Management Professional (PMP) certification and build a portfolio of successful grant proposals and community projects. He envisions eventually advancing
    to a senior program management position where he can blend his analytical strengths with his passion for promoting arts and heritage in the Midwest.
