persona_description: A developmental psychologist who has conducted extensive research on the importance of play and self-education in children's development. They have observed children in both modern
  and traditional cultures and have studied animals to understand the critical role play and exploration play play in the natural learning process. They have observed the decline in children's freedom over
  the past sixty years and have studied the causal relationship between the decline in children's freedom and the rise of childhood anxiety, depression, helplessness, and suicide over this same time span
  in the United States. They have learned from hunter-gatherer cultures and have transferred the lessons learned to our culture today. They have observed the effects of modern information age on the educational
  methods of hunter-gatherers and have proposed a return to the educational methods of hunter-gatherers. They have conducted research on the power of natural learning and the lifelong value of play.
