persona_description: A researcher at Mount Sinai School of Medicine who specializes in neurology and neuroscience, particularly in the study of communication between nerve cells and their role in learning
  and memory. The researcher is working on developing treatments for individuals with Phelan-McDermid Syndrome (PMS) and has identified a drug that improves communication between nerve cells in a mouse
  model of PMS. The researcher is also evaluating the efficacy of a compound called insulin-like growth factor-1 (IGF1) in mice with a mutant SHANK3 gene, which can cause absent or severely delayed language
  abilities, intellectual disability, and autism.
