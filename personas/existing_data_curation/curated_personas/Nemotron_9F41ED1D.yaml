  career_goals: Although retired, Hina’s personal ambitions focus on maintaining her independence, staying mentally active, and leaving a lasting legacy. She aims to document her family’s recipes and stories
    in a handwritten memoir, teach her great‑grandchildren the art of cooking and knitting, continue learning new digital tools to stay connected with distant relatives, volunteer occasionally at the local
    senior center to lead a small puzzle club, and preserve South Asian cultural traditions within her community in Warren, Michigan.
