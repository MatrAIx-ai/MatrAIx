  career_goals: Looking ahead, Jessicca aims to channel her innate curiosity and practical mindset into a career that blends analytical thinking with tangible outcomes. She envisions becoming a research
    analyst or environmental scientist focused on sustainable solutions for the Upper Midwest, allowing her to work in small, collaborative teams while preserving time for solitary data analysis. Her desire
