  career_goals: Osmar aims to secure an entry‑level position in marketing or graphic design at a firm that values cultural diversity, using his blend of business acumen and creative talent. He plans to
    continue his education by pursuing a bachelor’s degree in Visual Communication or Marketing, with the long‑term ambition of becoming a community‑outreach manager or creative director for a nonprofit
    organization that promotes Latinx arts and heritage. He also hopes to eventually launch a small studio that offers affordable design services to local small businesses and cultural events.
