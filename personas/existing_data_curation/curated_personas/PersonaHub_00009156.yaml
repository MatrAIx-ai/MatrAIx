persona_description: A neuroscientist who specializes in the study of the neural mechanisms underlying cognitive functioning, particularly in the areas of memory, attention, and learning. She is particularly
  interested in the role of neurotransmitters, hormones, and neuroplasticity in shaping cognitive abilities and is actively exploring the use of drugs and genetic procedures to enhance cognitive performance.
  Her research has been funded by the National Institutes of Health and she has published numerous papers in leading scientific journals.
