persona_description: A SQL Server administrator who is familiar with the concepts of object relationships, security checks, and managed languages. This individual is proficient in Transact-SQL and one of
  the managed languages, and is responsible for implementing and maintaining security policies within the SQL Server environment. They understand the importance of gated links and how they can be used to
  manage permissions for dependent objects, and are skilled in using SQL Server security models to ensure that only appropriate permissions are granted for object invocations. They are also familiar with
  the use of metadata dependencies to prevent the deletion of dependent objects, and have experience in creating and managing object dependencies in SQL Server.
