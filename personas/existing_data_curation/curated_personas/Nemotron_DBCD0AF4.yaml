    and contemporary art'']'
  career_goals: Miriam aims to leverage her operational expertise and natural charisma to move into a supervisory role within the next three years, targeting a position such as Office Team Lead or Operations
    Coordinator. She plans to complete her bachelor's degree in Business Administration through online coursework, strengthening her management and process-improvement skills. Long-term, she aspires to
    become an Office Manager who can implement eco-friendly initiatives, streamline workflow through digital solutions, and foster a collaborative office culture. Additionally, she hopes to develop a side
    venture curating pop-up art events in Casselberry, merging her love for art with community engagement.
