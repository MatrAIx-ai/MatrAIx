personas:
  professional: Miriam Tracy is an office operations specialist with expert command of multifunction copiers, document archiving, and Microsoft Office, who leverages their methodical organization and sociable
    charisma to lead training sessions and streamline workflow while eyeing a supervisory role within three years.
  sports: Miriam Tracy is a regular participant in Orlando’s yoga studio, enjoys playing recreational softball on a weekend league, follows the Orlando Magic and Orlando City SC passionately, and joins
    the local running club for Saturday 5K runs through the scenic lakeside trails.
  arts: Miriam Tracy immerses themselves in the Orlando art scene by visiting the Orlando Museum of Art, sketching Florida sunsets, curating street‑photography collections, performing in community theater
    improv workshops, and championing artists like Kehinde Wiley and Yayoi Kusama through their volunteer work at the Casselberry Arts Festival.
  travel: Miriam Tracy plans weekend road trips with a spontaneous flair, often cruising the coastal highways to St. Augustine’s historic district or the arts‑crazed streets of Tampa, while dreaming of
    a springtime pilgrimage to Barcelona’s Gothic Quarter and a desert sunrise in Sedona, balancing travel budgets with occasional splurges on boutique B&Bs.
  culinary: Miriam Tracy delights in exploring Orlando’s eclectic eateries—from savoring the smoky brisket at The Ravenous Pig to digging into fresh sushi rolls at Kabooki—while also experimenting at home
    with Thai green curry, mango sticky rice, and perfecting a watercolor‑inspired avocado toast topped with heirloom tomatoes.
  core: Miriam Tracy blends meticulous office expertise with a boundless creative spark, juggling yoga, watercolor sunsets, and pop‑up art dreams while chatty, organized, and occasionally prone to late‑night
    coffee‑fueled brainstorming.
background:
  cultural: Miriam comes from a middle-class White American background, with family roots in the Midwest and the South. Raised in Florida, she was exposed to the state's blend of Southern hospitality and
    multicultural vibrancy, especially through the tourism-driven arts scene in Central Florida. Her upbringing emphasized community involvement, education, and appreciation for the arts - her parents encouraged
    museum visits and supported her early interest in painting. While culturally American, she embraces the diverse influences around her, including Hispanic and Caribbean festivals that are common in Seminole
    County, and often incorporates this openness into her social and artistic activities.
