  hobbies: '[''LEGO building'', ''Reading adventure books'', ''Playing soccer'', ''Sketching machines and structures'', ''Coding club activities'', ''Puzzle solving'', ''Stamp collecting'']'
  career_goals: Terry imagines a future where he can use his love of order and planning. He dreams of becoming a civil engineer or architect to design buildings and bridges, a firefighter who follows clear
    protocols to protect his community, or a teacher who organizes lessons for young learners. His current ambition is to excel in school science and math so he can pursue these paths.
