personas:
  professional: Terry Trawick, an aspiring LEGO architect and junior coder, merges a methodical mind with a love for step‑by‑step construction, turning complex sets like the LEGO Creator Expert Taj Mahal
    and the LEGO Technic Bugatti Chiron into personal blueprints while applying basic programming logic from their after‑school coding club to automate simple building instructions; they often document
    their designs in a notebook that mirrors a project plan and proudly share the progress with classmates during structured show‑and‑tell sessions.
  sports: Terry Trawick, a dedicated midfielder for the Maple Creek Soccer Club U‑9 team, attends bi‑weekly practices where their methodical nature shines in executing set‑piece drills, while cheering for
    the Premier League side Manchester United and modeling their position discipline after star player Bruno Fernandes; they balance competitive play with organized warm‑up routines and experience occasional
    frustration when a missed practice disrupts their schedule.
  arts: Terry Trawick, an avid sketcher of machines and a fan of Mary Pope Osborne’s Magic Tree House series, spends quiet evenings drawing detailed steam locomotives and futuristic robots, while listening
    to the soundtrack of The LEGO Movie composed by Mark Mothersbaugh and admiring illustrator Chris Riddell’s work; their structured creativity fuels both LEGO builds and school art projects.
  travel: Terry Trawick, a curious traveler who prefers itinerary‑based trips, has explored Legoland California and Yellowstone National Park on family road trips, meticulously checks off museum stops like
    the Children’s Museum of Indianapolis on a printed checklist, and they dream of a future solo backpacking adventure to the Grand Canyon to sketch its geological formations.
  culinary: Terry Trawick, a budding kitchen helper, favors pepperoni pizza, cheesy macaroni, and strawberry‑banana smoothies, enjoys assembling LEGO‑shaped cookie cutters to bake snack‑size brick cookies,
    and they showcase a modest cooking skill level by mastering simple tasks like stirring pancake batter while insisting on precise timing and ingredient measurements to satisfy their orderly palate.
  core: Terry Trawick is a methodical LEGO architect who balances meticulous planning with occasional impulsive candy splurges, thriving on structured soccer drills, quiet sketching sessions, and a well‑labeled
    piggy bank, and they always keep a spare brick for a quick fix.
background:
  cultural: Terry grows up in a middle-class suburban community in Oakland, New Jersey, within Bergen County. His family observes typical American traditions such as Thanksgiving, Fourth of July fireworks,
    Halloween, and holiday celebrations, and may attend a local church. The neighborhood emphasizes school achievement, community safety, organized sports, and respect for rules and schedules, shaping his
    practical and structured outlook.
