  hobbies: '[''Cooking (soul food & Tex-Mex fusion)'', ''Gospel choir'', ''Gardening'', ''Book club (African-American literature)'', ''Hiking'', ''Yoga'', ''Genealogy research'', ''Community volunteering'',
    ''Attending cultural festivals'', ''Quilting'']'
  career_goals: Sylvia's career goal is to leverage her extensive experience to shape a regional training strategy that integrates inclusive, culturally responsive practices and mental-wellness support
    for employees across the U.S.-Mexico border corridor. She aspires to transition into a senior director or consultant role where she can mentor emerging training professionals—especially those from underrepresented
    backgrounds—and design a community learning center that offers free professional development workshops for local residents. Additionally, she intends to author a guidebook on balancing structure with
    flexibility in adult learning, and to serve on corporate DEI advisory boards, ensuring that her legacy reflects both organizational excellence and community uplift.
