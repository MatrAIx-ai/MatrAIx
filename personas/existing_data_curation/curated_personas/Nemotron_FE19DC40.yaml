personas:
  professional: Jenne Watson, a 36‑year‑old vending‑and‑amusement‑machine service technician, blends meticulous mechanical troubleshooting with a pragmatic curiosity, using multimeters, schematics and emerging
    IoT monitoring tools to keep machines humming, while they balance organized route planning with the flexibility to improvise on site, and assert themselves calmly when client expectations tighten.
  sports: Jenne Watson spends Saturday mornings tackling local trails with the Shelbyville Hiking Club, joins the town’s adult softball league during spring, and roots for the Nashville Predators and the
    Tennessee Titans, balancing these pursuits with a modest home‑gym routine of body‑weight circuits that they squeeze in between service calls.
  arts: Jenne Watson unwinds after a service route by diving into Agatha Christie mystery novels, collecting vintage game consoles that echo classic pixel art, hosting a weekly board‑gaming night featuring
    Catan and Ticket to Ride, and humming along to Dolly Parton and The Allman Brothers while they occasionally attend local theater productions at the Shelbyville Playhouse, which inspire a quiet admiration
    for the stage.
  travel: Jenne Watson prefers low‑key road trips that combine hands‑on exploration with scenic rest stops, having driven the Blue Ridge Parkway to photograph antique arcade machines at the Smithsonian’s
    National Museum of American History, taken a weekend getaway to the Grand Canyon, and dreaming of a future tech pilgrimage to Akihabara in Tokyo to hunt rare game consoles, they also balance family
    budgeting constraints while planning each adventure.
  culinary: Jenne Watson enjoys mastering Southern comfort staples like crispy fried chicken with homemade buttermilk gravy, buttery collard greens seasoned with smoked ham hocks, and peach cobbler topped
    with a crunchy oat crumble, while routinely tossing garden‑fresh sweet potatoes and kale into a skillet, occasionally swapping in smoked paprika for a spice kick even when a recipe calls for plain salt,
    and they admit to hoarding specialty screws in the pantry as a quirky storage habit.
  core: Jenne Watson balances the buzz of arcade machines with the scent of rosemary from their garden, methodically solving technical puzzles at work while spontaneously woodworking on weekends, nurturing
    a nostalgic love for vintage tech, and occasionally over‑stocking on specialty fasteners that they never actually need.
background:
  cultural: Jenne grew up in Shelbyville, Kentucky, in a white, middle‑class family rooted in the community’s modest Southern values. Her upbringing emphasized hard work, family cohesion, and a sense of
    responsibility to neighbors. She was raised attending a local Baptist church and celebrating regional traditions such as county fairs, horse shows, and seasonal community gatherings. While honoring
    these traditions, she also embraces modern ideas, staying informed about technological trends and fostering a curiosity that bridges her rural background with contemporary innovation.
attributes:
  skills: '["Mechanical troubleshooting", "Electrical diagnostics", "Preventive maintenance", "Schematic reading", "Firmware updating", "IoT device integration", "Inventory management", "Customer communication",
    "Safety compliance", "Route planning"]'
  hobbies: '["Woodworking", "Gardening", "Restoring vintage game consoles", "Reading technology blogs", "Reading mystery novels", "Cooking Southern dishes", "Hiking local trails", "Attending Shelbyville
    Horse Show", "Volunteering at food pantry", "Playing board games"]'
  career_goals: Jenne aims to become a senior technician and eventually lead a small team that services vending and amusement machines across the region. She plans to obtain industry certifications, such
    as the Vending Machine Service Technician credential, and to deepen her knowledge of IoT-enabled equipment. Longer‑term, she hopes to launch her own service business that combines reliable field work
    with innovative technology solutions, while also mentoring new technicians and participating in professional associations. Balancing her ambition with family life, she seeks a role that offers both
    professional growth and a stable schedule.
