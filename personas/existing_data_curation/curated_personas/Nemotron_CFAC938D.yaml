personas:
  professional: Peggy Rhodes, a 35‑year‑old salon professional, merges her scientific training in trichology with an artistic imagination to execute precision haircuts, advanced color theory, and custom
    eco‑friendly product formulations, while her exacting organization powers flawless appointment scheduling, inventory control, and pioneering AR‑based virtual hair makeovers.
  sports: Peggy Rhodes, an avid Cascades hiker, regularly joins the Seattle Hiking Club for weekend treks, practices Vinyasa yoga at a downtown studio, follows the Seattle Seahawks (NFL) and Seattle Kraken
    (NHL) for seasonal sports excitement, and occasionally competes in a local recreational beach‑volleyball league during summer.
  arts: Peggy Rhodes, whose imaginative side fuels abstract paintings inspired by Jackson Pollock and the lyrical moods of Bon Iver, frequents the Bumbershoot music and arts festival, curates a modest home
    gallery featuring Pacific Northwest artists, and devours speculative fiction novels by N.K. Jemisin during quiet evenings.
  travel: Peggy Rhodes, who balances adventure and relaxation, meticulously plans weekend road trips along the Oregon Coast and hiking escapes to the Canadian Rockies, while dreaming of an immersive cultural
    retreat in Kyoto, Japan, and a sustainable eco‑tour of New Zealand’s South Island.
  culinary: Peggy Rhodes, a moderately skilled home chef, often prepares quinoa Buddha bowls with roasted beets, kale, and tahini dressing, whips up wild mushroom risotto for dinner guests, and treats herself
    to matcha lattes sprinkled with cinnamon, favoring organic, locally sourced ingredients.
  core: Peggy Rhodes blends scientific rigor with artistic flair, turning hair care into a sustainable performance art while juggling meticulous organization, a passion for abstract painting, and a habit
    of over‑booking her calendar.
background:
  cultural: Peggy was raised in a middle‑class family in the Pacific Northwest, where the region’s love for the outdoors, progressive values, and tech‑savvy culture shaped her worldview. As a white American
    with European ancestry, she blends the area’s emphasis on education and environmental stewardship with a community‑oriented spirit, celebrating both traditional holidays and the eclectic cultural scene
    of King County.
attributes:
  skills: '["Precision hair cutting", "Advanced color theory and balayage", "Custom hair product formulation", "Trichology and hair biology", "Digital client consultation and AR styling tools", "Salon management
    and operations", "Inventory and supply chain optimization", "Professional certification in cosmetology and trichology", "Social media branding and marketing", "Customer service excellence"]'
  hobbies: '["Abstract painting", "Cascades hiking and nature walks", "DIY natural hair dye experiments", "Reading science‑fiction novels", "Yoga and mindfulness practice", "Volunteer hair styling workshops",
    "Exploring AR/VR styling technology", "Attending art and music festivals", "Collecting vintage hairstyling tools", "Sustainable living initiatives"]'
  career_goals: Peggy aims to open a boutique salon that fuses science and artistry, develop a proprietary line of eco‑friendly hair care products rooted in her STEM background, obtain advanced certification
    in trichology, and become a speaker and educator at national cosmetology conferences. She also aspires to mentor emerging stylists, champion sustainable beauty practices in the Pacific Northwest, and
    eventually publish a guide on science‑driven hair styling.
