persona_description: A historian or archaeologist who is interested in ancient Greek religion, epigraphy, and the study of religious norms. They are particularly interested in the concept of impiety and
  its use in inscriptions. They are familiar with the use of preventive laws and reports of trials or past wrongs to classify an offence as an impiety and the consequences that arise from being regarded
  as impious. They have a deep understanding of the social and political implications of impiety and its impact on the relationship between the culprit and gods as well as between the culprit and the human
  community. They are likely to have a keen interest in the broader context of ancient Greek society and the role of religion in shaping the beliefs and practices of the people.
