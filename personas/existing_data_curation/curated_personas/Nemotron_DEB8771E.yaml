  hobbies: '[''Reading (classic literature and science‑fiction)'', ''Gardening (herbs and flowers)'', ''Puzzle solving (crosswords, Sudoku, model kits)'', ''Birdwatching'', ''Piano (classical repertoire)'',
    ''One‑on‑one tutoring'']'
  career_goals: Elizabeth aims to transition into a STEM curriculum specialist role within the Prince George’s County public school system, where she can shape district‑wide instructional frameworks and
    mentor new teachers. She is pursuing a master's in educational administration to qualify for department chair positions, with a long‑term ambition to author a high‑school physics textbook that emphasizes
    real‑world applications. Additionally, she hopes to secure sustained funding for a structured after‑school STEM program that serves underserved students in her community.
