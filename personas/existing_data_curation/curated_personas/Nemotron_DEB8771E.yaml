personas:
  professional: Elizabeth Gardner, a veteran high‑school physics teacher who designs data‑driven curricula, enforces laboratory safety, integrates coding simulations, and quietly mentors students through
    one‑on‑one tutoring while leading professional development workshops for peers, brings a calm yet assertive structure to her classroom and the broader school community.
  sports: Elizabeth Gardner, an ardent supporter of the Washington Capitals, Washington Wizards, and Baltimore Ravens, spends her weekends birdwatching at Patuxent Research Refuge and joining a low‑key
    community walking group, preferring solitary fitness activities over team sports.
  arts: Elizabeth Gardner, a devoted reader of Jane Austen, Mary Shelley, and Isaac Asimov, a disciplined pianist mastering Beethoven’s Moonlight Sonata, and a regular patron of the Washington Stage Company’s
    productions, channels her love of order into classic literature and chamber music.
  travel: Elizabeth Gardner, a meticulous planner who has visited Colonial Williamsburg, Boston’s Freedom Trail, and the Cotswolds, and now dreams of a quiet autumn stay in Kyoto, always crafts detailed
    itineraries weeks ahead to ensure low‑stress, culturally enriching travel.
  culinary: Elizabeth Gardner, an intermediate home cook who tends a herb garden to flavor her signature herb‑roasted chicken, rosemary‑infused potatoes, and chamomile tea, enjoys preparing simple, health‑focused
    meals, yet occasionally over‑bakes scones when a new puzzle distracts her.
  core: Elizabeth Gardner, a methodical physics educator who thrives on structured solitude, balances meticulous budgeting with occasional indulgences, monitors her health with precision, and finds comfort
    in quiet hobbies like puzzles, piano, and gardening.
background:
  cultural: Elizabeth was raised in a middle‑class, suburban family in the Mid‑Atlantic region. Her upbringing emphasized the value of education, punctuality, and community involvement, reflecting a traditional
    Anglo‑American cultural heritage. Family traditions include celebrating national holidays and seasonal festivals with modest gatherings, often centered around shared meals. Living in Upper Marlboro,
    she is part of a diverse county where she has developed an appreciation for multicultural perspectives while maintaining her own cultural roots in a predominantly White, American context.
attributes:
  skills: '[''Curriculum development'', ''Instructional design'', ''Data‑driven assessment'', ''Laboratory safety management'', ''Technology integration'', ''Individual student mentorship'', ''Grant writing'',
