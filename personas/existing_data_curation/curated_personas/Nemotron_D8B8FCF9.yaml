personas:
  professional: Kevin Yarbrough leverages front-line casino floor experience - mastering cash handling, electronic transactions, and rapid odds calculations - to pursue a floor-supervisor role while mapping
    a future as a data-driven boutique gaming lounge, and they apply their spontaneous, people-reading style to train new staff on the fly.
  sports: Kevin Yarbrough plays pickup basketball at the local community center, roots for the Detroit Pistons and Lions while cheering the Michigan Wolverines during college seasons, and they keep fitness
    loose with intermittent street-ball sessions and occasional sprint intervals rather than a regimented gym routine.
  arts: Kevin Yarbrough wanders Detroit's vibrant mural corridors, collects limited-edition prints by Shepard Fairey, quotes Banksy in casual conversation, hits open-mic comedy nights to riff on pop-culture,
    and they sketch urban scenes on their phone for spontaneous inspiration.
  travel: Kevin Yarbrough dreams of a road-trip to Las Vegas to study cutting-edge casino floor designs, has taken a budget weekend to Toronto for a gaming industry conference, prefers staying in hostels
    to stretch travel funds, and they favor spontaneous itineraries over rigid plans.
  culinary: Kevin Yarbrough relishes late-night chili cheese fries seasoned with smoked paprika, customizes a classic pork sandwich with pickled onions and jalapenos, and when time allows they experiment
    with a simple ramen-style broth using miso, scallions, and soft-boiled eggs after a night shift.
  core: Kevin Yarbrough blends high-energy social hustle with restless curiosity, swapping calculator tricks for comedy punchlines, while juggling a chaotic schedule that fuels ambition and occasional disorganization.
background:
  cultural: Kevin grew up in the suburban landscape of Sterling Heights, a middle‑class community in Macomb County shaped by Detroit’s automotive legacy and a growing multicultural vibe. His family’s roots
    trace back to Northern European ancestry, typical of many white residents in the area, but he was raised in a household that values hard work, self‑reliance, and community involvement. The legalization
    of casino gambling in Michigan provided a local career path, and the region’s vibrant music and street‑art scenes have sparked his appreciation for contemporary culture. While he embraces Midwest practicality,
    his curiosity pushes him to seek out unconventional artistic and experiential influences beyond the suburbs.
attributes:
  skills: '[''Customer service'', ''Cash handling'', ''Electronic transaction processing'', ''Basic probability and odds calculation'', ''Conflict mediation'', ''Assertive yet cooperative communication'',
    ''Quick learning of gambling software'', ''Aesthetic sense for promotional displays'', ''Adaptability in fast‑changing environments'']'
  hobbies: '[''Pickup basketball'', ''Open‑mic comedy nights'', ''Strategy video games'', ''Exploring street‑art murals'', ''Visiting contemporary art galleries'', ''Podcasts on tech, gambling, and art'',
    ''Sketching urban scenes on a tablet'']'
  career_goals: He aims to move beyond entry‑level floor work and become a floor supervisor within the next two years, overseeing betting operations and training new staff. Recognizing the value of formal
    credentials, he plans to obtain his GED and enroll in a community‑college program in hospitality management or data analytics to transition into a casino operations analyst role. Long‑term, Kevin envisions
    opening his own boutique gaming lounge that blends contemporary art exhibitions with interactive betting experiences, merging his love for art and gambling. He also hopes to travel to major gaming hubs
    like Las Vegas and Atlantic City to study innovative venue concepts.
