persona_description: A law professor who specializes in constitutional law, specifically the interpretation and application of the Fifth Amendment to the US Constitution. He has extensive experience in
  arguing and winning cases before the Supreme Court of the United States, and his expertise is in the areas of marriage equality, civil rights, and the separation of powers. His research interests include
  the history and evolution of marriage laws, the impact of the DOMA on same-sex couples, and the implications of the Supreme Court's decision for federal benefits and obligations.
