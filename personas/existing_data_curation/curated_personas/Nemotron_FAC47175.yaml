  career_goals: He aims to move from store-level supervision to a regional or district management role where he can shape retail strategy across multiple locations. John is particularly interested in pioneering
    experiential store concepts that blend art, music, and Cuban heritage with modern merchandising. He also dreams of eventually opening a boutique that serves as a cultural hub, featuring locally sourced
    Cuban-inspired designs and hosting art workshops. In the near term, he wants to mentor emerging supervisors and lead a pilot program that integrates community art events into the retail environment.
