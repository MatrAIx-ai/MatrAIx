personas:
  professional: John Castillo leverages three decades of frontline retail leadership, bilingual fluency, and an eye for artistic merchandising to coach diverse teams, drive performance by blending visual
    storytelling with shop‑floor data, and pursue a regional management role where they champion experiential store concepts that fuse island rhythms, vintage vinyl, and contemporary design.
  sports: John Castillo stays fit through nightly salsa dancing at the local studio, occasional kick‑ball games with the neighborhood league, and weekly gym visits for light weight training, while cheering
    for the Miami Heat and the Miami Marlins, a balanced approach that satisfies their competitive streak without the rigidity of a structured workout plan.
  arts: John Castillo paints abstract canvases inspired by the island’s neon street colors and the syncopated beats of son, frequents the Wynwood Walls gallery to see works by Wifredo Lam and Jean‑Michel
    Basquiat, curates a vintage vinyl collection featuring Celia Cruz and Buena Vista Social Club, and volunteers at community art workshops, where they channel their curiosity into mentoring emerging creators.
  travel: John Castillo’s travel style blends spontaneous weekend trips to the island to reconnect with family and cultural roots with carefully planned visits to art‑rich cities like Mexico City and Barcelona,
    favoring boutique guesthouses over hotels and seeking immersive experiences such as cooking classes and street‑photography tours, all while balancing a modest budget and occasional work‑related travel
    constraints.
  culinary: John Castillo delights in preparing ropa vieja, plantain tostones, and mojitos for friends, mastering the island’s spice blends and the ritual of brewing sweet espresso‑style coffee, while their
    modest balcony herb garden supplies fresh cilantro and oregano that flavor every dish, though they sometimes over‑season in an artistic quest for boldness.
  core: John Castillo is an imaginative, flexible retail veteran who blends artistic passion with competitive drive, juggling community roots, occasional disorganization, and a love for vibrant culture,
    and they navigate life with a spirited curiosity.
background:
  cultural: John was born to Cuban-immigrant parents and grew up in a vibrant Miami neighborhood where Spanish and English mingled daily. His household celebrated Afro-Cuban traditions—music, dance, and
    culinary rituals—while also valuing the American emphasis on individual ambition. Bilingualism is a core part of his identity, enabling him to bridge cultural gaps in the workplace and community. He
    remains deeply connected to Cuba through family visits, news, and the shared love of tostones, plantains, and the rhythms of son and timba. The blend of Cuban community solidarity and the entrepreneurial
    spirit of South Florida informs his worldview and daily interactions.
