  career_goals: Ricky aims to advance from front‑line support to a supervisory role within the next two years, focusing on team leadership and service quality improvement. He aspires to spearhead a customer
    experience innovation program that blends his analytical skills with his passion for abstract concepts and design thinking. Long‑term, he envisions transitioning into a user experience (UX) research
    or content strategy position, where he can leverage his curiosity for novelty and his creative abilities to shape intuitive, user‑centric products. He also hopes to launch a side venture creating digital
    art and narrative content, merging his professional expertise with his artistic interests.
