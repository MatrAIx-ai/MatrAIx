  career_goals: Travis aims to transition into a part‑time consulting role for local nonprofits, helping them streamline administrative processes and adopt modern digital tools. He plans to earn a Certified
    Administrative Professional (CAP) credential to formalize his expertise. He also wants to lead a senior‑center committee that organizes social and educational events, leveraging his event‑planning skills.
    A long‑term ambition is to document Beaver County’s local history through oral‑history interviews, eventually compiling the stories into a community booklet. He hopes to be recognized for his volunteer
    contributions, perhaps receiving a "Volunteer of the Year" award, which satisfies his competitive drive while keeping him socially engaged.
