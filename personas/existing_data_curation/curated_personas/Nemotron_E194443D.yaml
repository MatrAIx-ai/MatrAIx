  hobbies: '[''Senior Center Activities'', ''Trivia Nights'', ''Community Theater'', ''Walking/Hiking'', ''Photography'', ''Woodworking'', ''Genealogy Research'', ''Bridge Tournaments'', ''Volunteer Library
