personas:
  professional: Elizabeth Johnson, a budding community‑engagement coordinator, leverages her sharp interpersonal skills and budget‑savvy mindset to orchestrate vibrant local events, and they blend pragmatic
    curiosity with a competitive streak to consistently raise the bar for participant experience.
  sports: Elizabeth Johnson dominates the city’s co‑ed volleyball league, energizes each Zumba class, and passionately supports the local basketball team, the RiverCats, while also following the national
    women’s soccer squad.
  arts: Elizabeth Johnson spends weekends crafting DIY décor, draws creative spark from street murals by local artists, unwinds to Leon Bridges and Mitski, and regularly attends readings by personal‑development
    author Brené Brown.
  travel: Elizabeth Johnson prefers spur‑of‑the‑moment road trips to Florida’s Gulf Coast beaches, mixes camping under the stars with occasional boutique hotel stays, and dreams of exploring the historic
    charm of Savannah and the music scene of Austin.
  culinary: Elizabeth Johnson experiments with farm‑to‑table dishes, perfecting citrus‑marinated grilled salmon, roasted beet and goat‑cheese salad, and spiced chickpea tacos, while their kitchen staples
    include a cast‑iron skillet, fresh basil from the garden, and a well‑used garlic press.
  core: Elizabeth Johnson is a sociable, detail‑driven planner who balances competitive event coordination with a love for group fitness, yet habitually leaves half‑finished DIY projects on the coffee table.
background:
  cultural: Elizabeth was raised in a middle‑class suburban family in Pasco County, Florida. Her upbringing reflects a blend of Southern hospitality and the multicultural influences of the Gulf Coast, with
    strong community ties, frequent church involvement, and an appreciation for outdoor leisure activities such as fishing, boating, and beach outings. The local cultural milieu, emphasizing friendliness
    and community service, shapes her values and social outlook.
