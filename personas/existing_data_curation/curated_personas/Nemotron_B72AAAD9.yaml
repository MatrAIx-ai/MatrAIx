  career_goals: She aims to secure a full‑time position in community engagement or event coordination, such as a program assistant at the local community center or a marketing associate for a small business.
    She plans to pursue an associate degree in business administration to broaden her prospects, and ultimately aspires to become a community program manager or launch her own boutique event‑planning venture.
