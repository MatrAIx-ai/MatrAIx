personas:
  professional: Antoine Smith, a budding junior architect in the sandbox, blends curiosity for new towers with a practical habit of using the provided molds, turning every play session into an organized
    yet flexible building exercise.
  sports: Antoine Smith, an enthusiastic member of the local Bumblebee Cubs soccer club and a regular at toddler swimming lessons, loves sprinting across the park and cheering for the Seattle Mariners on
    family TV nights, though they may skip a practice when feeling overwhelmed by anxiety.
  arts: Antoine Smith, a little artist who draws Peppa Pig characters and dances to The Wiggles, enjoys structured coloring books for order but also revels in free‑form finger painting, reflecting a balance
    between organization and imagination.
  travel: Antoine Smith, a weekend explorer who loves trips to the city aquarium and dreams of visiting Disney World, travels with a favored stuffed rabbit for comfort and often needs extra reassurance
    from parents before boarding a plane due to sensitivity to new environments.
  culinary: Antoine Smith, a budding chef who can butter toast and mix peanut butter with banana, favors mac‑and‑cheese, apple slices, and occasional watermelon, yet throws a tantrum if food isn’t cut into
    bite‑size pieces or if an unfamiliar vegetable appears on the plate.
  core: Antoine Smith is a four‑year‑old whose boundless curiosity is tempered by a practical streak, high emotional reactivity, and a habit of balancing structured play with spontaneous imagination.
background:
  cultural: Antoine is raised in a Black family in Fort Lauderdale, Florida, where African‑American traditions blend with the multicultural flavors of South Florida. He participates in church gatherings
    featuring gospel music and lively clapping, enjoys family meals that often include Southern comfort foods and Caribbean‑inspired dishes, and experiences community festivals celebrating music, dance,
    and art. Oral storytelling is a valued family practice that nurtures his imagination, and his close‑knit neighborhood provides ample opportunities for social play while also honoring his need for quiet,
    solitary activities.
attributes:
