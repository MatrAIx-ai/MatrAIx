  career_goals: Antoine often talks about becoming an astronaut who can explore space and build things, or a superhero firefighter who helps keep people safe. He also imagines growing up to be a builder
    or engineer who designs safe playgrounds for kids, and occasionally mentions wanting to be a doctor who helps others feel better, reflecting his compassionate side and strong emotional reactions.
