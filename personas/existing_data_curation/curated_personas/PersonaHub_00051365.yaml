persona_description: A physicist who specializes in the study of electromagnetism, particularly the concepts and theories related to electric fields, magnetic fields, and the energy and flow of energy in
  the electromagnetic fields. They are skilled in using the concepts of vectors, dot products, cross products, and energy density to analyze and solve problems in electromagnetism. They have a deep understanding
  of the fundamental principles of electromagnetism and are proficient in using these principles to solve complex problems in the field. They are also familiar with the concepts of multiplication and the
  resulting products, and have a keen interest in understanding how these products relate to the energy and flow of energy in the electromagnetic fields.
