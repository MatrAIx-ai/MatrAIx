  career_goals: Jessica hopes to transition from frontline cashier duties to a supervisory role where she can mentor new staff and shape a cooperative workplace culture. She plans to complete her associate’s
    degree in business administration at a nearby community college, using flexible evening classes that accommodate her preference for a balanced schedule. In the longer term, she dreams of launching a
    small home‑based craft business—selling hand‑knit items and quilts—allowing her to blend her creative curiosity with practical entrepreneurship. Ultimately, she seeks a career path that offers both
    personal fulfillment and the freedom to maintain her solitary, low‑stress lifestyle.
