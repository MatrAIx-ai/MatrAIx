  hobbies: '[''Traditional Puerto Rican cooking'', ''Coastal gardening'', ''Knitting and crocheting'', ''Reading historical literature and memoirs'', ''Genealogy research'', ''Shoreline walking'', ''Small
    faith‑based study groups'', ''Volunteering at the senior center'', ''Curating family photo albums'']'
  career_goals: Although officially retired, Maria Julia is driven to apply her disciplined organizational talent toward preserving and sharing Puerto Rican cultural heritage. She aspires to establish a
    intergenerational cooking workshop where elders teach traditional recipes to younger residents, fostering community bonds and culinary continuity. She hopes to expand the modest community garden into
    a shared space that supplies fresh produce to low‑income households while serving as a teaching site for sustainable gardening practices. Maria Julia also aims to create a modest archive of oral histories,
    documenting stories of Punta Santiago's older residents, and to mentor a small team of volunteers who can continue the project beyond her own involvement. Her ultimate ambition is to leave a tangible
    legacy of harmony, self‑sufficiency, and cultural pride for future generations.
