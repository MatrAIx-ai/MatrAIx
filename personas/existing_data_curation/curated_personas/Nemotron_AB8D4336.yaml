personas:
  professional: Houston Griggs, a 59‑year‑old retail specialist with a flair for visual storytelling, blends meticulous inventory control and personable salesmanship with his imaginative eye for displays,
    positioning himself as a collaborative leader aspiring to assistant‑manager and eventually store‑manager roles while nurturing a future boutique that celebrates local artisans.
  sports: Houston Griggs, a fan of the Arkansas Razorbacks and the New Orleans Saints, keeps fit through brisk walks around Pine Bluff’s historic districts, weekly low‑impact yoga at the community center,
    and occasional participation in a senior softball league that meets at the local park.
  arts: Houston Griggs channels their creative energy by sketching Pine Bluff’s riverfront, painting acrylic cityscapes, improvising piano pieces inspired by Miles Davis and Aretha Franklin, curating a
    vintage‑vinyl collection that includes Motown classics, and lending a tenor voice to the church choir’s gospel harmonies.
  travel: Houston Griggs, who balances careful budgeting with a love for spontaneous discovery, has road‑tripped to New Orleans for Mardi Gras, explored Savannah’s historic squares, and plans a genealogical
    pilgrimage to England’s archives, all while favoring travel that blends cultural immersion with quiet moments in small‑town cafés.
  culinary: Houston Griggs, an avid gardener of native greens, enjoys cooking Southern comfort foods such as fried catfish, collard greens seasoned with fresh thyme, and buttery cornbread, often experimenting
    with their garden’s harvest while occasionally treating themselves to a local barbecue joint’s smoked brisket.
  core: Houston Griggs is a seasoned retail professional whose imagination fuels a lifelong love of art, vintage music, and community mentorship, even as they occasionally overcommit to volunteer projects
    and delay dental check‑ups.
background:
  cultural: Houston was born and raised in Pine Bluff, Arkansas, within a close‑knit African‑American community that values church, family gatherings, and shared traditions. His grandparents were active
    participants in the civil‑rights movement, instilling a sense of resilience, pride, and responsibility to support neighbors. Growing up, he was surrounded by the sounds of gospel choirs, blues guitar,
    and soulful storytelling, which fostered his love for music and narrative art. Family meals often feature soul‑food recipes passed down through generations, emphasizing communal cooking and celebration.
    He remains connected to local cultural institutions, attending Juneteenth festivities, supporting community murals, and mentoring younger members through church‑based outreach programs. These experiences
    shape his collaborative spirit, respect for heritage, and commitment to fostering harmony within his community.
