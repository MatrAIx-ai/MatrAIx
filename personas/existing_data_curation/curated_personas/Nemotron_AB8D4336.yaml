  career_goals: Houston aims to advance to an assistant manager role within the next two years, eventually becoming a store manager where he can shape the overall customer experience and mentor younger
    staff. He is passionate about leading visual merchandising initiatives that blend artistic flair with sales strategy. Over the longer term, he envisions opening a modest boutique that showcases local
    artisans and his own handmade crafts, providing a platform for community creativity. He also plans to pursue a certificate in retail management and digital marketing to stay current with industry trends,
    while preparing for a comfortable retirement that allows him to devote more time to community art projects and youth mentorship.
