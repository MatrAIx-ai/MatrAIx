  career_goals: Bessie aims to advance to a senior audit manager or partner role within a regional accounting firm while preserving a balanced, low‑stress lifestyle. She plans to complete her CPA certification
    if not already achieved and to develop a mentorship program that supports Black accountants and promotes mental‑well‑being in the workplace. Seeking flexibility, she hopes to negotiate remote or hybrid
    work arrangements that allow her to maintain a quiet, predictable environment at home. Additionally, she aspires to lead community financial‑literacy workshops that empower families in her Oak Park
    neighborhood.
