persona_description: A literary critic who specializes in analyzing the literary works of American authors from the mid-19th century to the early 20th century. Their research interests include the development
  of literary styles, the impact of author's choices on the text, and the analysis of complex ideas and sequences of events in the works. They are particularly interested in the works of American Realists
  and Naturalists, as they draw on the grim realities of life in poor urban areas, bleak, despairing tones, and motifs about the breakdown of traditional values. They are skilled at analyzing the central
  ideas of a text, the impact of the author's choices on the text, and the development of complex ideas and sequences of events.
