  hobbies: '[''Herb Gardening'', ''Cooking Traditional Mexican Dishes'', ''Reading Historical Mystery Novels'', ''Book Club'', ''Volunteer Cooking Instruction'', ''Knitting'', ''Attending Small Community
    Cultural Festivals'', ''Walking Trails'', ''Reflective Journaling'']'
  career_goals: At 60, Gisela aims to transition from managing a single location to influencing operations at a regional level. She plans to earn a Certified Food Safety Manager credential and complete
    an advanced Lean Six Sigma Black Belt certification to spearhead waste‑reduction initiatives across multiple sites. She also envisions mentoring emerging food‑service managers—especially women from
    under‑represented backgrounds—through a structured apprenticeship program she hopes to launch within her company. Long‑term, Gisela dreams of starting her own consulting boutique that helps independent
    restaurants adopt data‑driven, sustainable practices while maintaining the flexibility that keeps her engaged.
