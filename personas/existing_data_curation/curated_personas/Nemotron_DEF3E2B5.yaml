personas:
  professional: Catherine Fuller, a seasoned pipe installation and retrofitting specialist, leverages four decades of MIG/TIG welding, blueprint reading, and OSHA compliance expertise to mentor apprentices
    with calm, resilient authority; they champion energy-efficient upgrades for Bay Area schools and senior centers.
  sports: Catherine Fuller stays fit with early morning walks along the Bay shoreline, participates in the local senior walking club’s seasonal 5K runs, and when the sunshine allows, attends San Francisco
    Giants baseball games and follows the Golden State Warriors from home, all while they prioritize low-impact activities that protect their knees.
  arts: Catherine Fuller finds solace in intimate jazz evenings at the neighborhood café where the smooth trumpet of Miles Davis and the velvety vocals of Ella Fitzgerald set the mood, and they often pair
    those nights with reading World War II sagas by Ken Follett, forging a personal soundtrack for their solitary evenings.
  travel: Catherine Fuller prefers leisurely road trips along California’s coast, stopping at Napa Valley vineyards and the Redwood forests, while dreaming of a relaxed cultural tour of Tuscany’s hill towns;
    they plan trips with flexibility in mind, balancing modest travel funds and occasional joint trips to nearby Marin County with a desire for low-key exploration.
  culinary: Catherine Fuller prepares comforting meals such as chicken pot pie, slow-braised beef stew, and tomato-basil soup, seasoning with fresh basil and thyme harvested from their backyard garden,
    and while they boast solid cooking skills, they occasionally over-salt dishes when distracted by a bridge game.
  core: Catherine Fuller blends a calm, resilient work ethic from decades of pipework with solitary gardening, vintage tool collecting, and late-night jazz, yet they misplace bridge cards and often forget
    to water the tomatoes during busy weeks.
background:
  cultural: Catherine comes from a blue‑collar, working‑class family of German and Irish ancestry in the Pacific Northwest. Raised with the values of self‑reliance, craftsmanship, and community solidarity,
    she identifies strongly with the American trades culture. After moving to El Cerrito, California, she embraced the Bay Area's diverse and progressive environment while retaining her modest, pragmatic
    roots. She is an active member of the local plumber’s union, participates in community clean‑up events, and respects the multicultural tapestry of her neighborhood, blending her traditional heritage
    with the inclusive spirit of the region.
attributes:
  skills: '[''high‑pressure pipe installation'', ''steam system maintenance'', ''MIG/TIG welding'', ''blueprint reading'', ''hydraulic system troubleshooting'', ''OSHA safety compliance'', ''energy‑efficiency
