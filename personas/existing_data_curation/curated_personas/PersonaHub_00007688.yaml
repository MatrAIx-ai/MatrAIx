persona_description: A scientist who studies the distribution patterns of freshwater animals across Europe and their relationships with habitat availability and diversity. This person is likely interested
  in understanding the evolutionary history and dispersal patterns of European lentic and lotic freshwater animals, as well as the potential influence of historical events such as the European glaciations
  and post-glacial recolonization. They are likely to be interested in the use of geographic information systems (GIS) and remote sensing techniques to analyze habitat availability and diversity data, and
  to use statistical models to test hypotheses about the relationships between species richness, habitat availability, and diversity.
