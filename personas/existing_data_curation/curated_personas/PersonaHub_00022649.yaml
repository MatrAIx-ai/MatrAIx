persona_description: A biologist who studies the effects of catch-and-release fishing on marine shiner perches, particularly their performance and hydrodynamics during suction feeding. They are interested
  in the role of hook-induced injuries in the survival and performance of the fishes, and how this practice may contribute to declining fish stocks. They are also interested in the implications of such
  injuries for the welfare of the fishes and the short-term welfare considerations of recreational fishing.
