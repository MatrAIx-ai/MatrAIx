  hobbies: '["Watercolor painting", "Reading magical realism literature", "Gardening", "Yoga", "Knitting", "Cooking Venezuelan cuisine", "Birdwatching", "Volunteering at art therapy workshops", "Walking
    local historic trails"]'
  career_goals: Melina aspires to expand the reach of her innovative, art‑focused early learning programs beyond her current center, eventually establishing a regional coalition of childcare facilities
    that share resources and best practices. She hopes to earn a bachelor's degree in Early Childhood Education to complement her associate's credential and later pursue a master's in Educational Leadership.
    Her long‑term ambition is to become a director of a statewide early learning network, where she can mentor new administrators, advocate for increased funding for arts in education, and author a guidebook
    on integrating imagination and cultural diversity into early childhood curricula.
