personas:
  professional: Melina Pinto, a veteran early childhood education administrator, blends a love of imagination with solid curriculum development, grant writing, and bilingual communication to craft arts‑integrated
    programs, while their penchant for flexibility often leads to a delightfully chaotic schedule that they manage with creative problem‑solving.
  sports: Melina Pinto follows the Nashville Predators in the NHL and the Tennessee Volunteers in college football, participates in a local walking club that explores Wilson County's nature trails, and
    balances a love of birdwatching with occasional community yoga classes as their preferred form of low‑impact exercise.
  arts: Melina Pinto immerses themselves in watercolor painting of Tennessee's rolling hills, finds inspiration in magical realism novels by Gabriel García Márquez and Isabel Allende, volunteers at a children's
    art‑therapy workshop, and keeps a cherished collection of prints by Frida Kahlo and Monet that influence their color palette.
  travel: Melina Pinto prefers relaxed weekend getaways that blend nature and culture, opting for day trips to the Great Smoky Mountains and overnight stays in historic B&Bs in Asheville, while cherishing
    past visits to Cartagena for its coastal charm and dreaming of a future pilgrimage to the Andean highlands to capture new landscapes for their art.
  culinary: Melina Pinto delights in preparing traditional arepas and pabellón criollo, seasoning with garden‑fresh cilantro, cumin, and ripe plantains, and they balance their skillful home cooking with
    occasional experiments using heirloom tomatoes and avocado, though they sometimes over‑salt dishes in moments of distraction.
  core: Melina Pinto fuses a lifelong passion for art and education with a flexible, sometimes chaotic approach to life, channeling their imagination into community‑focused creativity while quietly wrestling
    with worry and occasional disorganization.
background:
  cultural: Melina’s cultural roots are firmly anchored in Venezuelan traditions, shaped by a family that valued storytelling, music, and communal meals. She grew up speaking Spanish at home, celebrating
    festivals like Carnaval and Día de los Muertos with vibrant decorations and traditional foods. After moving to Lebanon, Tennessee, she blended the warmth and hospitality of Southern culture with her
    own Latin American heritage, often hosting potluck gatherings that feature both Southern comfort dishes and Venezuelan specialties. She remains active in the local Venezuelan diaspora, participating
    in cultural festivals, teaching Spanish language classes to children, and sharing Latin American art techniques with community centers. This rich intercultural experience informs her inclusive approach
    to education and her commitment to fostering a sense of belonging for all children under her care.
attributes:
  skills: '["Curriculum development", "Early childhood education administration", "Bilingual communication (Spanish/English)", "Community outreach", "Grant writing", "Conflict resolution", "Creative program
