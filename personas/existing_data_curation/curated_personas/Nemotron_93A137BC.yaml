personas:
  professional: Sharissa Barritt is a clinical laboratory technologist specializing in clinical chemistry, hematology, microbiology, and molecular diagnostics, whose methodical routine and swift troubleshooting
    on Roche Cobas and Abbott Architect analyzers are complemented by a sociable, mentor‑focused style that keeps the lab team cohesive and poised for their upcoming goal of senior technologist and eventual
    lab manager.
  sports: Sharissa Barritt fuels their fitness routine with weekly Zumba classes and lively salsa nights, roots for the Philadelphia Eagles and Phillies on game days, and occasionally joins a neighborhood
    running club for relaxed 5K outings that blend cardio with social camaraderie.
  arts: Sharissa Barritt immerses themselves in Philadelphia’s artistic pulse, frequenting live‑music venues such as the Electric Factory to enjoy indie rock and salsa bands, devouring mystery novels by
    Agatha Christie and Gillian Flynn, and attending indie film screenings of titles like 'Moonlight' and 'Parasite' at local art‑house theaters.
  travel: Sharissa Barritt prefers spontaneous weekend getaways, often wandering through Philadelphia’s historic Old City and Society Hill before hopping an Amtrak train to explore Boston’s Freedom Trail
    or New Orleans’ vibrant music scene, balancing a love for cultural immersion with a modest travel budget.
  culinary: Sharissa Barritt delights in crafting hand‑pressed pupusas and slow‑cooked tamales, skillfully blending masa harina, queso fresco, and roasted chilies, while also experimenting with global flavors
    like Thai basil and Italian focaccia, though they occasionally over‑season a potluck dish when juggling multiple cooking projects.
  core: Sharissa Barritt is a socially vibrant lab technologist who blends a love for rhythmic dance and home‑cooked comfort foods with a routine‑driven work ethic, all while juggling a laid‑back approach
    to budgeting and a tendency to over‑commit socially.
background:
  cultural: Born to Salvadoran immigrants, Sharissa grew up immersed in a close‑knit Salvadoran community in Philadelphia. Her household upheld traditional customs such as celebrating Las Posadas, Día de
    los Muertos, and seasonal family feasts featuring pupusas and tamales. Spanish is spoken fluently at home, a skill she leverages professionally to bridge language gaps for Spanish‑speaking patients.
    The Salvadoran diaspora’s emphasis on family solidarity, hard work, and community service shaped her practical, cooperative outlook and her desire to improve health access for underserved groups. She
    actively participates in local Latino cultural festivals and maintains strong ties to both her heritage and her American upbringing.
attributes:
  skills: '[''Clinical chemistry analysis'', ''Hematology testing'', ''Microbiology specimen processing'', ''Molecular diagnostics (PCR)'', ''Automated analyzer operation (Roche Cobas, Abbott Architect)'',
    ''Quality control and assurance (CLIA compliance)'', ''Laboratory information system (LIS) data entry and troubleshooting'', ''Bilingual communication (Spanish/English) with patients and clinicians'',
    ''Infection control and biosafety procedures'', ''Staff training and mentorship'']'
  hobbies: '[''Salsa and bachata dancing'', ''Cooking Salvadoran cuisine'', ''Volunteering at community health fairs'', ''Exploring Philadelphia neighborhoods with friends'', ''Attending live music events'',
    ''Zumba group fitness classes'', ''Hosting weekend potluck gatherings'', ''Reading mystery novels'', ''Watching indie films'']'
  career_goals: Sharissa aims to advance to a senior technologist or lead technician role within the next three years, pursuing ASCP MLS(ASCP) certification to solidify her credentials. She is passionate
    about deepening her specialization in molecular diagnostics, particularly infectious disease testing, and plans to lead a quality‑improvement project that reduces turnaround times for critical assays.
    Over the longer term, she envisions moving into a laboratory manager position where she can oversee operations, budgeting, and regulatory compliance while still maintaining hands‑on involvement with
    bench work. Additionally, she hopes to develop a community outreach program offering free basic lab screenings and health education to the Salvadoran population in Philadelphia.
