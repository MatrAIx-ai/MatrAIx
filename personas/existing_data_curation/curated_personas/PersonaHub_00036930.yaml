persona_description: A mother who is passionate about promoting physical literacy and encouraging her child to move and play in a safe and positive way from a young age. She values the importance of experiences
  and learning through play and is dedicated to supporting her child's physical and cognitive development. She is aware of the scientific evidence linking early cognitive development to cognitive decline
  and the critical role physical literacy plays in promoting a healthy brain. She is interested in incorporating pedagogical practices into her learning curriculum and encourages children to move through
  play-based activities that engage all five senses and stimulate connections in the brain. She is committed to providing opportunities for her child to create meaningful experiences and grow competent
  and confident in moving and playing.
