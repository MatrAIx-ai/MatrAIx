  hobbies: '[''Playing Basketball'', ''Hip-Hop Dance'', ''Cooking Soul Food'', ''Photography'', ''Reading Contemporary Fiction'', ''Volunteering at Community Workshops'', ''Attending Live Jazz Performances'',
    ''Urban Gardening'']'
  career_goals: Raynard aims to transition from volunteer roles into a full‑time position as a program manager or community organizer for a nonprofit that focuses on youth arts education and cultural empowerment
    in urban settings. He plans to pursue a master's degree in Arts Administration or Social Work to deepen his strategic planning abilities, and eventually hopes to lead a regional initiative that integrates
    arts programming with social services to foster resilient, creative neighborhoods.
