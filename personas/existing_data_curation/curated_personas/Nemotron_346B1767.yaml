personas:
  professional: Emilio Liang, a senior janitorial professional with over twenty years of experience in floor care, chemical safety, and inventory management, applies his organized, methodical mindset and
    curiosity for sustainable solutions to lead green‑cleaning pilots while mentoring new staff with patient assertiveness.
  sports: Emilio Liang keeps fit by hiking the Sierra de Cayey trails three times a month, joining weekend pickup basketball games with his local Caguas community league, and cheering for the Cangrejeros
    de Santurce during the basketball season as well as attending Piratas de Quebradillas baseball games when they play nearby.
  arts: Emilio Liang spends his afternoons sketching the vivid murals of local artist Carlos Hernández in downtown Caguas, plays the cuatro to accompany bomba and plena rhythms at community gatherings,
    and enjoys listening to Bad Bunny, Lucecita Benítez, and classic salsa from Héctor Lavoe while curating a small photo collection of the island’s urban textures.
  travel: Emilio Liang prefers weekend road trips that blend cultural immersion and nature, having explored San Juan’s historic Old Town and the El Yunque rainforest, taken a ferry to Vieques for the bioluminescent
    bay, and dreaming of a future visit to Barcelona’s Gothic Quarter and Kyoto’s historic temples to study sustainable cleaning practices in museums.
  culinary: Emilio Liang enjoys cooking at home, mastering classic arroz con gandules, crispy mofongo, and golden tostones while also experimenting with soy‑ginger stir‑fry using bok choy and shiitake mushrooms,
    and he frequently treats himself to alcapurrias and fresh ceviche at the weekly market, balancing home‑cooked meals with occasional dining at the local seafood restaurant La Cueva.
  core: Emilio Liang is a methodical janitorial veteran who blends an artist’s eye with a green‑cleaning zeal, habitually doodling on work order sheets and never missing a Sunday church service, yet occasionally
    forgets to water his balcony herbs.
background:
  cultural: 'Emilio was born and raised in San Lorenzo, a rural municipality within the Caguas region of Puerto Rico. He grew up in a working‑class family that blended Spanish‑Puerto Rican traditions with
    the legacy of a Chinese immigrant grandmother, a common thread in Puerto Rico’s early 20th‑century Asian diaspora. This mixed heritage shapes his cultural outlook: he celebrates the town’s fiestas patronales,
    attends the annual Carnaval de San Lorenzo, and participates in bomba y plena dancing during community celebrations. He is a practicing Catholic who observes Navidad, Semana Santa, and occasionally
    joins his relatives for Chinese New Year meals, where he helps prepare traditional dishes. Fluent in Spanish and comfortable with English at work, Emilio embraces the island’s love of music, food, and
    art, often visiting local museums, supporting street artists, and contributing to neighborhood improvement projects. His identity reflects a respect for both Puerto Rican communal values—family, resilience,
    and hospitality—and the diligence and respect embedded in his Asian ancestry.'
attributes:
  skills: '[''floor care (stripping, waxing, polishing)'', ''industrial cleaning equipment operation'', ''chemical safety and hazardous material handling'', ''inventory management and vendor negotiation'',
    ''basic plumbing and minor electrical repairs'', ''carpentry and fixture replacement'', ''health and safety auditing'', ''waste segregation and recycling program implementation'', ''staff training and
    mentorship'', ''Spanish and functional English communication'', ''basic drawing'', ''photography'', ''community mural documentation'']'
  hobbies: '[''visiting art galleries and street murals'', ''photography of urban and natural scenes'', ''sketching and basic drawing'', ''painting small acrylic works'', ''playing the cuatro (Puerto Rican
    string instrument)'', ''cooking traditional Puerto Rican cuisine'', ''experimenting with Chinese stir‑fry recipes'', ''hiking in the Sierra de Cayey'', ''maintaining a balcony herb garden'', ''volunteering
    in community clean‑up events'', ''reading about sustainable cleaning technologies'', ''solving puzzles (sudoku, crosswords)'']'
  career_goals: Emilio aims to move from a hands‑on janitorial role into facilities management, with a focus on sustainable operations and support for cultural spaces. He plans to obtain his GED within
    the next year and enroll in certification programs such as OSHA 30‑hour, Certified Professional Cleaner, and Facility Management Professional. His short‑term goal is to lead a green‑cleaning pilot at
    his current building, reducing chemical waste and introducing recycling initiatives. In the long term, he aspires to become a facilities manager for a museum or community art center, and eventually
    launch his own cleaning company that specializes in maintaining galleries, museums, and cultural venues while preserving the integrity of artworks. He also hopes to be recognized by local business associations
    for his contributions to community clean‑up events.
