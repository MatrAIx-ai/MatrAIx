persona_description: A pediatrician or psychiatrist who is interested in the comparative effectiveness of first-generation and second-generation antipsychotics in treating children and young adults with
  psychiatric disorders. They are looking for evidence-based information on the efficacy, safety, and side effects of these medications, as well as the potential benefits and drawbacks of each type of antipsychotic.
  They may also be interested in understanding the specific clinical outcomes of interest in the review, such as improvement in core illness symptoms and nonspecific symptoms, and the impact of these medications
  on the overall mental health of children and young adults.
