personas:
  professional: Marshall Olsen is a data‑driven claims investigator who combines statistical modeling, SQL querying, and Python scripting with deep knowledge of building codes and insurance tools, and their
    organized, curious mindset and sociable communication style make them a persuasive negotiator and a mentor to aspiring STEM students.
  sports: Marshall Olsen competes in Cleveland Hoops, a local adult basketball league, roots for the Cavaliers and Guardians, belongs to the Cuyahoga Valley Hiking Club where they tackle the Ohio & Erie
    Trail each weekend, and squeezes in early‑morning runs on the Towpath Trail to maintain stamina for both the court and the trail.
  arts: Marshall Olsen is a regular at the Cleveland Museum of Art and the contemporary space The Exchange, frequents live shows at Beachland Ballroom featuring acts like The Black Keys, practices street
    photography inspired by Ansel Adams and Vivian Maier capturing the Terminal Tower and forest canopies, and experiments with improv comedy at Cleveland Improv to keep their creative muscles active.
  travel: Marshall Olsen enjoys weekend road trips to Niagara Falls and the Adirondacks, has explored Tokyo on a tech conference where they marveled at Akihabara’s gadget stalls, dreams of chasing the Northern
    Lights in Iceland, and plans future hikes in Patagonia, always booking budget-friendly Airbnb stays and using a points‑reward credit card to stretch travel dollars.
  culinary: Marshall Olsen is an enthusiastic amateur cook who loves perfecting pierogi dumplings, crafting a solid Cleveland‑style pizza with provolone and sausage, brewing espresso with a French press,
    and occasionally whipping up a ramen bowl flavored with miso and sesame‑oil, though they admit to over‑indulging in local craft‑beer flight tastings on Friday nights.
  core: Marshall Olsen is a curiosity‑driven, hyper‑organized claims investigator who balances high‑stakes analytics with weekend basketball, hikes, art‑gallery walks, and a relentless quest to turn stress
    into creative problem‑solving, and they channel their anxiety into disciplined journaling and mindfulness.
background:
  cultural: Marshall grew up in a middle‑class family of Northern European descent in the Greater Cleveland area, where Midwestern values of hard work, community involvement, and modesty were emphasized.
    His parents encouraged both academic achievement and cultural enrichment, leading him to pursue a STEM degree at Case Western Reserve University while also exposing him to the region’s rich artistic
    heritage—such as the Rock and Roll Hall of Fame and Playhouse Square. This blend of technical rigor and appreciation for the arts informs his balanced worldview. As a white American in the Midwest,
    Marshall experiences a sense of cultural familiarity that shapes his interpersonal dynamics, yet he remains consciously inclusive, seeking diverse perspectives in both his professional collaborations
    and personal friendships.
