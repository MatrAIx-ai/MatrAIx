  career_goals: Marshall aims to become a senior claims investigator and later a claims manager within the next five years, focusing on complex property and catastrophe loss portfolios. He plans to obtain
    professional designations such as the Associate in Claims (AIC) and Certified Insurance Professional (CIP) to formalize his expertise. Leveraging his STEM education, he aspires to lead the development
    of data‑driven fraud detection tools and AI‑assisted loss estimation models for his organization. Marshall also envisions presenting at industry conferences, publishing thought‑leadership articles on
    innovative claim resolution, and eventually establishing a boutique consulting firm that advises insurers on risk mitigation and loss control strategies, all while maintaining a high standard of accountability
    and ethical practice.
