  career_goals: Although retired, Joanna aims to deepen her impact on the Klamath Falls community by expanding the art programs at the senior center, mentoring new volunteers, and launching an intergenerational
    mural project that celebrates local heritage. She hopes to enroll in occasional community‑college art classes to refine her watercolor techniques, travel to regional art festivals, and compile a photo‑essay
    book documenting the natural and cultural landscape of Klamath County. Additionally, she aspires to support her grandchildren’s education and maintain a balanced, fulfilling lifestyle that blends creativity,
    social engagement, and personal growth.
