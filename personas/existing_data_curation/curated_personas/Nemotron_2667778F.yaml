personas:
  professional: Joanna Gutierrez is a retired community stalwart who now channels her decades of volunteer coordination, art workshop facilitation, and digital storytelling into expanding senior‑center
    art programs, mentoring volunteers, and launching an intergenerational mural that celebrates Klamath County heritage.
  sports: Joanna Gutierrez regularly joins the Klamath Falls Senior Hiking Club for spring and fall treks, enjoys weekly senior‑friendly tennis matches at the local community center, follows the Portland
    Trail Blazers and the Seattle Seahawks from her living room, and balances her active pursuits with gentle yoga sessions for flexibility.
  arts: Joanna Gutierrez spends afternoons painting Cascadian watercolors inspired by Claude Monet, shaping pottery bowls at the local studio after watching tutorials by Karen Kunc, curating digital photo
    essays of native birds, and volunteering backstage at the Klamath County Performing Arts Center where she admires productions featuring Lin‑Manuel Miranda’s scores.
  travel: Joanna Gutierrez prefers road‑trip itineraries that blend art festivals—like the Bend Art Fair and the Bella Coola Arts Festival—with scenic stops at Crater Lake and the Oregon Coast, planning
    each journey around her grandchildren’s school calendar and a modest travel budget that favors boutique B&Bs over luxury hotels.
  culinary: Joanna Gutierrez delights in cooking international dishes such as Thai green curry, Spanish paella with saffron, and Japanese ramen, often incorporating fresh zucchini, heirloom tomatoes, and
    basil from her garden, while her skill level ranges from confident sautéing to occasional over‑salting on experimental nights.
  core: Joanna Gutierrez is a curiosity‑driven retiree who weaves art, community service, and gentle activism into a life of vibrant creativity, prudent finances, and a habit of over‑buying watercolor paper.
background:
  cultural: Joanna is a White American who was raised in the Pacific Northwest, embodying the region’s blend of independent spirit and close‑knit community values. Growing up in a small‑town environment,
    she developed a deep appreciation for the natural surroundings of Klamath Falls—its mountains, lakes, and forests—which informs both her hobbies and her artistic sensibilities. Her family traditions
    include modest, home‑cooked meals, seasonal celebrations tied to the agricultural calendar, and active participation in local civic events. While she respects the rich Indigenous heritage of the area,
    her cultural identity is also shaped by a background of mid‑20th‑century American values, a lifelong involvement in church and volunteer groups, and a strong belief in lifelong learning and communal
    stewardship.
