  hobbies: '[''Painting'', ''Pottery'', ''Gardening'', ''Birdwatching'', ''Hiking'', ''Reading historical fiction'', ''Cooking international cuisine'', ''Book club'', ''Bridge'', ''Knitting'', ''Theater
