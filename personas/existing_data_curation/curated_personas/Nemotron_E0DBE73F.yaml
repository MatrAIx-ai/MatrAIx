  career_goals: While Aleta values the stability of her current role, she hopes to advance her qualifications in the next few years. She plans to enroll in a nursing‑assistant‑to‑LPN bridge program to earn
    a Licensed Practical Nurse license, with an eye toward a supervisory position as a charge nursing assistant or unit coordinator. Additionally, she aims to obtain a certification in geriatric care and
    to become a mentor for junior staff, sharing her practical knowledge while maintaining a routine work schedule that fits her family life.
