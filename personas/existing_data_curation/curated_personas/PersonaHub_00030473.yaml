persona_description: A conference interpreter who specializes in simultaneous interpreting, particularly in international conferences and summits. The interpreter has experience working in various types
  of interpreting, including consecutive interpretation, liaison interpretation, and the chuchotage method. The interpreter is well-versed in cultural differences and the importance of ensuring the same
  impact as the original discourse. The interpreter is proficient in multiple languages and has a strong understanding of the different types of interpreting, including the pros and cons of each. The interpreter
  is a skilled communicator and has experience in liaising between two speakers who are expressing themselves in different languages. The interpreter is detail-oriented and has a strong attention to detail,
  ensuring that the interpreted discourse has the same impact as the original. The interpreter is also a team player and has experience working in a collaborative environment.
