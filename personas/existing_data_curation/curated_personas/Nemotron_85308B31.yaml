  career_goals: Jose hopes to turn his love for art and community into a future career. He aims to study graphic design or visual arts at a community college while also gaining experience in youth mentorship.
    His long‑term goal is to work with nonprofit organizations that use murals and art workshops to empower at‑risk youth, especially within the Mexican‑American community. He dreams of creating public
    art projects that celebrate his heritage and foster social harmony, and eventually aspires to run a community art center where creativity and cultural exchange help people heal and connect.
