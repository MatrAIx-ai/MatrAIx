personas:
  professional: Jose Espinal is an aspiring visual artist who merges hand‑drawn sketches with vibrant digital illustrations, using their curiosity to experiment with new tools, their relaxed approach to
    deadlines to keep the creative process fluid, and their compassionate nature to collaborate on community art projects for the after‑school program.
  sports: Jose Espinal hits the neighborhood basketball court after school, cheering for the Los Angeles Lakers and Dodgers, rides with the local skate crew Westside Rollers on city streets, and joins weekend
    hikes with friends in the San Bernardino Mountains, favoring a fun‑first, no‑pressure approach to staying active.
  arts: Jose Espinal draws inspiration from indie rock bands like The Strokes, hip‑hop innovators such as Kendrick Lamar, traditional Mexican folk singers like Lila Downs, and visual provocateurs like Banksy,
    weaving these influences into a personal style that blends sketchbook spontaneity with digital experimentation.
  travel: Jose Espinal prefers spontaneous weekend trips, having already explored the Grand Canyon and a family road‑trip to Mexico City, while dreaming of backpacking through Kyoto’s art districts and
    catching a sunrise hike in Patagonia, always balancing limited teen budget with a desire for culturally rich experiences.
  culinary: Jose Espinal enjoys cooking family‑style tamales and pozole, mastering the art of masa dough with corn, chilies, and cilantro, and experiments by adding smoked chipotle to homemade salsas, showcasing
    an intermediate skill level that blends tradition with creative flavor twists.
  core: Jose Espinal is a curious, laid‑back teen who blends sketching, skateboarding, and family cooking into a calm, compassionate routine, often juggling art projects and community volunteer work while
    occasionally forgetting homework deadlines.
background:
  cultural: Jose is a first‑generation Mexican‑American who grew up in a bilingual household in San Bernardino. He celebrates Mexican traditions such as Día de los Muertos, Las Posadas, and family gatherings
    centered around homemade meals. His family's strong sense of “familismo” and respect for cultural heritage influences his compassionate outlook. At the same time, he navigates American teen culture,
    blending Mexican music and cuisine with contemporary pop and street art. This bicultural experience gives him a unique perspective that fuels his artistic expression and his desire to bridge cultural
    gaps in his community.
