  hobbies: '[''Reading historical fiction and business books'', ''Cooking traditional Mexican cuisine'', ''Herb gardening'', ''Hiking in local trails'', ''Yoga and meditation'', ''Listening to Latin music'',
    ''DIY home décor projects'', ''Volunteering at community center'']'
  career_goals: Maria Irene aims to become a store manager within the next two years and eventually advance to a district manager role overseeing multiple locations in Southern California. She plans to
    earn a professional retail‑management certification and enroll in part‑time MBA courses to deepen her strategic expertise. Her long‑term ambition includes launching a boutique that showcases Mexican‑inspired
    fashion and home goods, while also mentoring other Mexican‑American employees and supporting community entrepreneurship. Throughout her career progression, she prioritizes work‑life balance to remain
    present for her husband and future family.
