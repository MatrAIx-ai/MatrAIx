personas:
  professional: Maria Hurtado, a 29‑year‑old retail supervisor in San Diego, merges data‑driven inventory control and visual merchandising with a laid‑back, flexible leadership style, using her bilingual
    fluency and curiosity for new business approaches to mentor a small team while navigating occasional scheduling disarray.
  sports: Maria Hurtado enjoys weekend hikes on San Diego’s backcountry trails, follows the San Diego Padres and the San Diego Wave, and participates in the local San Diego Hiking Club while occasionally
    joining beach‑volleyball pick‑up games.
  arts: Maria Hurtado finds creative solace listening to Latin artists such as Bad Bunny, Rosalía, and Juanes, reading historical fiction by Hilary Mantel, and attending performances at the Old Globe Theatre
    featuring contemporary playwrights, which together shape their cultural identity and leisure time.
  travel: Maria Hurtado prefers flexible, low‑key weekend escapes to nearby wonders like Joshua Tree and Catalina Island, while dreaming of an immersive cultural trip to Oaxaca, Mexico, and they plan each
    adventure with a mix of spontaneous spontaneity and modest budgeting.
  culinary: Maria Hurtado delights in preparing traditional Mexican dishes like mole poblano, tacos al pastor, and fresh guacamole, skillfully using cilantro, epazote, and roasted chilies from their balcony
    herb garden, and they balance home‑cooked meals with occasional visits to local taquerías to explore new flavor twists.
  core: Maria Hurtado blends pragmatic retail leadership with a laid‑back, curiosity‑driven outlook, juggling quiet solo pursuits, community volunteering, and occasional DIY impulsiveness, all while navigating
    a slightly disorganized schedule that keeps life both flexible and charmingly unpredictable.
background:
  cultural: Maria Irene is a first‑generation Mexican‑American who grew up in a bicultural household that valued family, hospitality, and community solidarity. She celebrates Mexican holidays such as Día
    de los Muertos and Christmas with traditional foods and rituals, while also participating in San Diego’s multicultural festivals. Fluent in Spanish, she often incorporates Mexican idioms and cuisine
    into daily life. Her cultural identity informs her collaborative, harmony‑seeking nature at work and her commitment to giving back to the local Mexican‑American community.
attributes:
  skills: '[''Team leadership'', ''Customer service excellence'', ''Inventory control'', ''Sales performance analysis'', ''Staff training and development'', ''Visual merchandising'', ''POS system operation'',
