personas:
  professional: Mark Mayeux, a curious two‑year‑old, explores daily routines as a budding mini‑engineer by building block towers and testing cause‑and‑effect; they balance imaginative play with a pragmatic
    eye for how things fit together.
  sports: Mark Mayeux enjoys toddling around the neighborhood park, chasing a plastic soccer ball with the local toddler soccer group, and loves watching the city’s baseball team from the backyard fence;
    they favor informal, low‑pressure play over organized competition.
  arts: Mark Mayeux delights in drawing wobbly circles with chunky crayons, dancing to the tunes of "Baby Shark" and "The Wheels on the Bus", and watching animated classics like "Moana"; they let these
    experiences shape a budding artistic identity.
  travel: Mark Mayeux has visited the family’s beach cottage on the Gulf Coast, the city zoo, and dreams of going to Disneyland, preferring short car trips with frequent snack breaks; they balance curiosity
    for new sights with a need for familiar routines.
  culinary: Mark Mayeux favors soft macaroni and cheese, banana slices, and chicken nuggets, often sprinkling shredded cheddar on everything, while delighting in messy spoon‑feeding at the highchair; they
    occasionally refuse broccoli, revealing a selective palate.
  core: Mark Mayeux blends a toddler’s boundless curiosity with a surprisingly practical streak, thriving in quiet, solitary play, yet quickly drifting into disorganized mischief when curiosity meets a
    new puzzle; they navigate this duality with a calm, stable demeanor.
background:
  cultural: Mark is raised in a white, Southern‑American family in Jacksonville, Florida. His family’s cultural practices include attending a local Protestant church on Sundays, enjoying Southern comfort
    foods such as biscuits, fried chicken, and fresh fruit, and taking regular trips to nearby beaches and parks. The household emphasizes a relaxed, flexible lifestyle, valuing outdoor play and quiet family
    time, which aligns with Mark’s preference for calm, solitary activities and his easygoing demeanor.
