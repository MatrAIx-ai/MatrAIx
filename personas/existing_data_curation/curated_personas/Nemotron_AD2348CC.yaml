personas:
  professional: Richard Thursby is a security analyst turning into a future security architect, leveraging deep expertise in network hardening, SIEM tuning, and Python automation while their relaxed, curiosity‑driven
    approach helps translate complex threats into clear, actionable guidance for non‑technical teams.
  sports: Richard Thursby dominates Saturday night games with the Saratoga Hoopers intramural basketball team, logs long rides with the Saratoga Spin cycling club, and tackles Adirondack High Peaks hikes,
    all while cheering on the New York Knicks and the Buffalo Bills and tracking workouts on Strava.
  arts: Richard Thursby unwinds by playing Settlers of Catan with friends, capturing mist‑draped Adirondack sunrises in nature photography, devouring sci‑fi epics by Brandon Sanderson and N.K. Jemisin,
    and looping The Strokes and Hans Zimmer scores during late‑night study sessions.
  travel: Richard Thursby prefers spontaneous weekend getaways, having already explored Boston’s historic Freedom Trail, Austin’s live‑music scene, and Washington, D.C.’s Smithsonian museums, while dreaming
    of hiking the Scottish Highlands and photographing the aurora borealis in Norway.
  culinary: Richard Thursby enjoys cooking hearty post‑hike meals such as garlic‑rosemary grilled chicken with quinoa, indulges in classic New York‑style pizza topped with pepperoni and fresh basil, and
    experiments with homemade kombucha using black tea, ginger, and a splash of citrus.
  core: Richard Thursby is a sociable security analyst whose curiosity fuels nightly hackathons, but whose laid‑back, slightly chaotic planning often leads to missed dentist appointments and an ever‑expanding
    collection of board games.
background:
  cultural: 'Richard grew up in Clifton Park, a suburban community in Saratoga County, New York. His family’s roots trace back to European ancestors, primarily Irish and German, and his upbringing reflects
    values common to many middle‑class American families in the region: emphasis on education, community involvement, and a blend of traditional holidays with local multicultural influences. Exposure to
    the broader New York state cultural tapestry through nearby Albany and the greater New York metropolitan area has given him an appreciation for diverse perspectives, while his local community culture
    emphasizes volunteerism, outdoor recreation, and a pragmatic work ethic.'
