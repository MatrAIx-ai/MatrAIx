  career_goals: Richard aims to progress from an analyst role to a senior security architect or lead of a Security Operations Center within the next five years. He plans to obtain advanced certifications
    such as CISSP, CISM, and OSCP while deepening expertise in cloud‑native security and threat intelligence. Combining his technical ambition with a strong desire to give back, he wants to launch a community‑focused
    cybersecurity outreach program that helps local small businesses and schools improve their digital safety. He also envisions contributing to open‑source security tools and eventually taking on a hybrid
    role that merges strategic security leadership with public education initiatives.
