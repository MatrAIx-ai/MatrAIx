persona_description: A Turkish scientist and researcher who specializes in developing microchip technology for cancer diagnosis, particularly using micro-patterned technology on ecological surfaces. Hasırcı
  and Şen aim to sidestep traditional diagnosis systems, such as biopsies, and raise cost-efficiency and decrease diagnosis times. They have already developed a system that can diagnose cancer cells from
  body fluids such as saliva, blood, phlegm, or urine, and have received international recognition for their work, including a published paper in Nature and the ODTÜ Prof. Dr. Mustafa N. Parlar Foundation
  Thesis of the Year Award in November 2016.
