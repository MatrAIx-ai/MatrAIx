  career_goals: Joyce dreams of future jobs that let her keep things organized and help others. She often says she wants to become a teacher so she can set up a tidy classroom and guide friends in learning.
    She also loves animals and imagines herself as a veterinarian, caring for neighborhood pets with a systematic approach. Occasionally she talks about being a soccer coach, where she can combine her love
    of competition with planning practice drills. Though still playful, Joyce’s ambitions reflect her desire for structure, responsibility, and the chance to lead in a supportive way.
