personas:
  professional: Joyce Horne is a budding junior team coordinator who translates her love of structure into organizing impromptu soccer scrimmages and classroom game rotations, displaying early project‑management
    instincts and a competitive edge that drives them to keep scoreboards accurate and teammates on task.
  sports: Joyce Horne is a forward for the Little Lions Soccer Club, regularly participates in tag and relay races at the park, and passionately cheers for Manchester United during family viewing nights,
    reflecting their energetic team spirit and competitive nature.
  arts: Joyce Horne immerses themselves in picture books by Dr. Seuss and the early chapter series "Magic Tree House", crafts friendship bracelets while listening to the whimsical tunes of "The Wiggles",
    and delights in Sunday school choir rehearsals featuring classic hymns, shaping a creative identity that balances structured storytelling with lively, hands‑on expression.
  travel: Joyce Horne loves family road trips to the nearby coastal state park where they collect seashells, recalls a memorable visit to Disneyland where they rode the "it's a small world" attraction,
    and dreams of exploring the Grand Canyon’s rim, preferring organized itineraries with scheduled play breaks over spontaneous wanderings.
  culinary: Joyce Horne savors homemade mac and cheese topped with crisp peas, enjoys fresh strawberries harvested from their garden, and proudly attempts to assemble simple LEGO‑themed snack plates, yet
    often forgets to finish their veggies before reaching for a chocolate treat.
  core: Joyce Horne is a methodical, energetic six‑year‑old who balances a love for structured play and competitive soccer with a penchant for sweet snacks and occasional forgetfulness about bedtime routines.
background:
  cultural: Joyce was raised in Lyman, a small town in Spartanburg County, South Carolina. Her family lives in a close‑knit neighborhood where Southern hospitality and community involvement are everyday
    norms. Weekly church gatherings, Sunday school, and local festivals shape her sense of belonging. Family meals often feature traditional Southern dishes, and she enjoys helping in the kitchen, learning
    recipes passed down through generations. The region’s outdoor culture—playing in the woods, attending high‑school football games with relatives, and exploring nearby farms—instills an appreciation for
    nature and teamwork. Growing up in this environment, Joyce internalizes values of politeness, respect for elders, and a strong work ethic, while also experiencing the freedom to play and explore with
    neighborhood friends.
