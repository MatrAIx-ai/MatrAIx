personas:
  professional: Adelaide Hensley, a veteran residential and commercial cleaning specialist, applies a meticulous, systematic cleaning methodology that spotlights hidden grime and stain removal, yet they
    sometimes let paperwork slip due to their relaxed attitude toward obligations, as they strive toward a team‑lead role and envision launching a modest owner‑operated cleaning service.
  sports: Adelaide Hensley follows college basketball with fervor, cheering for the University of Kentucky Wildcats and reveling in the annual Kentucky Derby's thoroughbred racing, they also belong to a
    low‑impact walking club at their local Baptist church for fitness, and they occasionally attend Louisville Cardinals baseball games during the summer, keeping their athletic involvement casual and seasonal.
  arts: Adelaide Hensley unwinds by savoring classic Southern cinema such as 'Gone with the Wind' and 'To Kill a Mockingbird,' immerses themselves in Agatha Christie mystery novels, and they find comfort
    in the soulful crooning of Patsy Cline and the twang of bluegrass legend Alison Krauss, which together shape a reflective yet slightly skeptical artistic palate.
  travel: Adelaide Hensley prefers meticulously planned, low‑stress road trips—like a leisurely drive through Savannah’s historic district, a weekend excursion along the Kentucky Bourbon Trail, and a nostalgic
    cruise to the Bahamas—yet they balance this gentle adventure spirit with the practical need to protect their schedule and budget, often opting for familiar, family‑friendly destinations.
  culinary: Adelaide Hensley, a confident home cook, delights in simmering herb‑infused tomato basil soup, baking buttery corn‑bread biscuits, and preparing garden‑fresh rosemary‑seasoned chicken thighs,
    while they regularly whip up classic Southern potluck dishes such as deviled eggs and pecan pie for church gatherings, showcasing a love for fresh herbs like basil, thyme, and rosemary.
  core: Adelaide Hensley is a detail‑oriented cleaning veteran who balances a love for solitary knitting, garden‑fresh herbs, and competitive horse‑racing viewership, yet they often let paperwork slip and
    worry excessively about the future.
background:
  cultural: Adelaide was born and raised in the rural outskirts of Lexington, Kentucky, in a modest white working‑class family. Her upbringing was steeped in Southern hospitality, a strong work ethic, and
    the traditions of the Baptist church. The region’s emphasis on self‑reliance and community service shaped her practical outlook and competitive drive. Growing up during the late‑1950s and 1960s, she
    internalized the values of modesty, respect for routine, and pride in manual labor, which continue to influence her approach to work and leisure.
attributes:
  skills: '[''Deep cleaning'', ''Stain removal'', ''Floor care (hardwood, tile, carpet)'', ''Laundry and fabric care'', ''Safe chemical handling'', ''Supply inventory management'', ''Basic appliance maintenance'',
    ''Detail-oriented inspection'']'
  hobbies: '[''Knitting'', ''Gardening (tomatoes, herbs)'', ''Watching classic Southern films'', ''Following the Kentucky Derby'', ''Reading mystery novels'', ''Attending local church potlucks'']'
  career_goals: Adelaide aims to secure a stable, full‑time position that offers predictable hours to reduce stress, while also pursuing a certification in professional cleaning to formalize her expertise.
    She hopes to become a team lead within her cleaning company, mentoring younger staff and establishing a reputation as the go‑to specialist for high‑touch households. In the longer term, she entertains
    the idea of a modest, owner‑operated cleaning service that would give her greater control over scheduling and allow her to earn supplemental income for retirement.
