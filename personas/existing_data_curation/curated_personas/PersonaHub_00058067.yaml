persona_description: Vanessa Moessner, an experienced and passionate science educator who has been teaching homeschool science labs for over a year. She has a background in public high school teaching and
  holds a Master of Science Education degree. She is known for her engaging and interactive teaching style, as well as her ability to inspire and motivate students to explore their interests in science.
  She is interested in increasing student understanding of science concepts and showcasing the fun and exciting nature of science through hands-on experiments and activities. Her goal is to continue exploring
  science topics through her online class and encourage students to work up to their potential and pursue their passions.
