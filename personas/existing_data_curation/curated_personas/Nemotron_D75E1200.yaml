personas:
  professional: Nicholas Thomas is an aspiring multimedia artist who leverages his proficiency in Photoshop, Illustrator, and Procreate to craft intricate concept art while also integrating his storytelling
    chops and basic front‑end web skills to build interactive portfolio experiences, all powered by his sociable, organized yet flexible work style.
  sports: Nicholas Thomas enjoys playing pickup basketball at the Crown Point park, channels his competitive spirit as a fan of the Chicago Bulls and Indianapolis Colts, participates in the local Crown
    Point Hoops Club during summer, and balances his active sessions with occasional jogs along nearby nature trails to clear his mind.
  arts: Nicholas Thomas immerses himself in creative expression by sketching sci‑fi landscapes inspired by H.R. Giger and Miyazaki, strums acoustic guitar while penning lyrics reminiscent of Bon Iver, attends
    improv shows at the Crown Point community theater, and draws narrative cues from speculative authors like Neil Gaiman and N.K. Jemisin.
  travel: Nicholas Thomas favors low‑cost, itinerary‑light trips that blend adventure and art, having explored the vibrant street art of Berlin, the natural splendor of Grand Canyon National Park, and dreaming
    of a future pilgrimage to Kyoto's manga districts, all while budgeting his travel through student discounts and occasional couch‑surfing.
  culinary: Nicholas Thomas enjoys experimenting with comfort food like loaded ramen bowls and homemade gnocchi, boasts a decent skill level in the kitchen where he frequently spices dishes with smoked
    paprika and fresh basil, and loves capturing his culinary creations on his DSLR before sharing them on Instagram.
  core: Nicholas Thomas is a hyper‑creative, socially‑charged 20‑year‑old who balances relentless art‑making with occasional procrastination over coffee, a habit of forgetting to floss, and a penchant for
    turning every life moment into a sketch.
background:
  cultural: 'Nicholas grew up in Crown Point, Indiana, a suburban community in Lake County that embodies a classic Midwestern ethos: friendliness, modesty, and a strong sense of local community. His family
    background is predominantly white, with cultural influences rooted in small‑town American traditions, such as attending high school football games, weekend barbecues, and community fairs. He was raised
    with values of hard work, reliability, and respect for others, but his curiosity and exposure to internet culture have broadened his worldview, introducing him to global artistic trends and diverse
    storytelling styles. While his upbringing emphasized practicality and modest ambition, his personal passion for art and abstract ideas pushes him toward a more expansive, creative identity that blends
    his Midwestern grounding with contemporary cultural currents.'
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator, Procreate)'', ''Creative writing'', ''Basic HTML/CSS/JavaScript'', ''Photography (composition and post‑processing)'',
    ''Public speaking'', ''Team collaboration and event coordination'', ''Research and information synthesis'']'
  hobbies: '[''Sketching and concept art'', ''Playing acoustic guitar'', ''Creative writing (short stories, lyrics)'', ''Reading science‑fiction/fantasy novels'', ''Improv theater participation'', ''Pickup
    basketball'', ''Landscape photography'', ''Visiting art museums and galleries'', ''Narrative video game analysis'']'
  career_goals: Nicholas aspires to enroll in a four‑year program in graphic design or multimedia arts, eventually specializing in concept art and interactive storytelling for video games or immersive media.
    His short‑term goal is to build a professional portfolio that showcases both traditional and digital artwork, complemented by narrative pieces. He hopes to secure an internship at a creative agency
    or a game studio, where he can apply his interdisciplinary skill set. Long‑term, he envisions a role as a senior concept artist or art director, leading a team that brings imaginative worlds to life.
    He also entertains the idea of launching a freelance side hustle creating custom illustrations and visual content for indie creators, leveraging his outgoing personality to network and market his services.
