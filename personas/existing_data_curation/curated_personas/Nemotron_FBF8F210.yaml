personas:
  professional: Jorge Lopez, an 11-year-old aspiring game developer, channels their curiosity and methodical nature into coding simple Scratch games while meticulously documenting each project, balancing
    a love for new ideas with the practical discipline of completing tutorials on schedule, and they often share their progress with classmates during lunch.
  sports: Jorge Lopez, a member of the Pacoima Soccer Club, devotes after‑school hours to soccer drills and weekend matches, idolizes the LA Galaxy and Los Angeles Lakers, and maintains a disciplined fitness
    routine that includes daily footwork exercises, though their competitive nature sometimes fuels frustration when losing a game, and they often replay match highlights in their head to improve strategy.
  arts: Jorge Lopez, an avid comic‑strip drawer and sci‑fi enthusiast, spends evenings listening to regional Mexican bands like Los Tigres del Norte and Banda El Recodo while sketching characters inspired
    by the storytelling of Stan Lee and the visual style of Hideo Mori, and they proudly display their artwork at school art fairs and local community events.
  travel: Jorge Lopez, who loves family road trips, has visited the Grand Canyon and San Diego’s Balboa Park, dreams of exploring Mexico City’s historic center, they prefer meticulously planned itineraries
    using a kid‑friendly travel app, and they balance a craving for adventure with budget constraints that limit trips to weekend getaways.
  culinary: Jorge Lopez, a junior kitchen assistant, helps their mother prepare tacos al pastor, guacamole with fresh avocado and lime, and homemade tamales, enjoys experimenting with spices like chipotle
    and cumin while mastering the art of folding tortillas, and they often trade recipes with friends after school.
  core: Jorge Lopez blends a competitive curiosity with careful organization, excelling at building LEGO masterpieces and coding games while worrying about spilling a single point on the soccer field or
    overspending their allowance, and they secretly hoard extra comic books under their bed.
background:
  cultural: Jorge comes from a Mexican‑American family in Pacoima, where Spanish is spoken at home alongside English. His upbringing includes Catholic traditions, weekly family gatherings, and participation
    in community events like Mexican holidays, neighborhood fiestas, and local youth programs. He values his cultural heritage, often sharing Mexican stories, food, and music with his peers, and he feels
    a strong connection to the vibrant Latino community of Los Angeles.
