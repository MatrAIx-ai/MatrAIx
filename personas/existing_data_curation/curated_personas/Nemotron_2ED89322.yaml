  hobbies: '[''Fly‑fishing'', ''Hiking in the Black Hills'', ''Landscape and cultural event photography'', ''Storytelling and oral history preservation'', ''Cooking traditional Lakota dishes'', ''Woodworking'',
    ''Gardening'', ''Attending powwows'', ''Volunteer mentoring at the local youth center'']'
  career_goals: Approaching retirement, Dylan aims to transition from day‑to‑day management to a senior advisory role where he can mentor the next generation of marketers, especially those from underrepresented
    backgrounds. He hopes to spearhead inclusive branding initiatives that authentically represent Native American perspectives and to develop a consulting practice that supports local small businesses
    in Sioux Falls with affordable, culturally aware marketing strategies. Ultimately, Dylan wants his legacy to reflect a balance of innovative ideas and the timeless values of community harmony.
