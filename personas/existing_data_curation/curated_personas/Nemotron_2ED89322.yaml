personas:
  professional: Dylan Garabito, a seasoned integrated marketing communications strategist, blends 35 years of data‑driven brand building with a relaxed, flexible leadership style, championing culturally
    resonant storytelling while mentoring junior marketers and guiding small Sioux Falls businesses toward inclusive branding, even as his occasional disorganization fuels a spontaneous, creative problem‑solving
    approach.
  sports: Dylan Garabito combines a love for low‑impact outdoor pursuits—fly‑fishing the Missouri River, hiking the Black Hills, and weekly jogs with the Sioux Falls Running Club—with a loyal fandom for
    the Minnesota Vikings and the local Sioux Falls Storm indoor football team, preferring relaxed weekend treks over high‑intensity gym workouts.
  arts: Dylan Garabito nurtures his artistic side by capturing sunrise over the Black Hills with his Nikon DSLR, curating prints by Ansel Adams and Georgia O'Keeffe, listening to the folk songwriting of
    Bob Dylan, and indulging in classic cinema nights featuring Meryl Streep, all of which fuel his own storytelling.
  travel: Dylan Garabito favors flexible, self‑guided road trips that blend scenic photography with cultural immersion, having driven the historic Route 66 to Santa Fe, trekked the Canadian Rockies in Banff,
    and now dreaming of a summer sail along Norway’s fjords with his camera in tow.
  culinary: Dylan Garabito, an adept home cook, loves preparing cedar‑planked trout with a lemon‑herb glaze, hearty bison chili spiced with fire‑roasted chilies, and buttery cornbread from stone‑ground
    cornmeal, often incorporating garden‑grown heirloom tomatoes and wild herbs into his rustic family meals.
  core: Dylan Garabito, a 63‑year‑old marketing veteran and keen storyteller, balances a habit of forgetting appointments with an unshakeable love for sunrise hikes, fly‑fishing, and preserving community
    narratives through lens and cookbook alike, while they casually drift between structured strategies and spontaneous creative sparks.
background:
  cultural: Dylan is a member of the Lakota Nation, raised in a close‑knit family that blended reservation life with the broader Midwestern environment of South Dakota. His upbringing emphasized respect
    for elders, the interconnectedness of people and the land, and the power of oral tradition. While he pursued higher education and a career in mainstream marketing, he maintains fluency in Lakota language
    phrases, participates in tribal ceremonies, and contributes to community events such as powwows and cultural workshops. This heritage informs his worldview, enriching his professional work with a deep
    sense of responsibility toward cultural authenticity and community wellbeing.
attributes:
  skills: '[''Strategic Brand Management'', ''Digital Marketing'', ''Market Research & Consumer Insights'', ''Social Media Strategy'', ''Content Creation'', ''SEO/SEM'', ''Data Analytics'', ''Budget Management'',
