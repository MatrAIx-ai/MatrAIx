persona_description: A professional involved in the field of renewable energy, specifically in the area of PV module monitoring and solar resource assessment. This individual is interested in converting
  PV modules into calibrated, digital PV reference devices and measuring effective irradiance and insolation. They are also interested in reducing operational costs and uncertainty in solar resource data,
  which translates to reduced financial risk and more bankable PV systems. This persona is likely to be interested in the Atonometrics Irradiance Measurement System and its capabilities in measuring effective
  irradiance and insolation, as well as the Soiling Measurement Systems offered by Atonometrics for measuring the effects of PV module soiling on PV power plants.
