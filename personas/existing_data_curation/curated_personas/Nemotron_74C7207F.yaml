personas:
  professional: Robert Banks, a seasoned automotive body repair specialist with four decades of expertise in MIG and TIG welding, blends meticulous craftsmanship with an experimental curiosity for eco‑friendly
    paint systems, while managing their modest shop as a flexible, community‑focused hub where they mentor apprentices and resolve customer conflicts with compassionate communication.
  sports: Robert Banks enjoys early‑morning fishing on Lake Bossier, follows the New Orleans Saints for NFL action, is a regular at the local high‑school football games, and they belong to a weekend softball
    league with fellow car‑enthusiasts, though they prefer the relaxed pace of casting a line over competitive sports.
  arts: Robert Banks immerses themselves in blues and jazz, spinning B.B. King and Miles Davis on their vintage record player while singing in the church choir, and they attend regional art fairs, collecting
    classic automobile posters, which together shape their aesthetic appreciation for soulful improvisation and craftsmanship.
  travel: Robert Banks plans road trips around classic car shows like the Woodward Dream Cruise in Michigan and the Pebble Beach Concours d'Elegance, balances these adventures with budget‑conscious local
    staycations, and they dream of a pilgrimage to the Mercedes‑Benz Museum in Stuttgart, yet their flexible, last‑minute planning style often leaves tickets purchased just days before departure.
  culinary: Robert Banks delights in cooking Southern comfort dishes such as gumbo brimming with okra, shrimp, and andouille sausage, and fried catfish seasoned with Cajun spices, boasting a solid kitchen
    skill set that mixes seasoned grilling techniques with occasional experimental twists like swapping traditional flour for almond meal for a gluten‑free crust, and they often serve these meals at family
    gatherings, turning the kitchen into a communal hub.
  core: Robert Banks is a compassionate, curiosity‑driven auto body veteran who blends eco‑friendly ingenuity with a laid‑back, sometimes disorganized lifestyle, mentoring youth while they worry about finances
    and health, and they find solace in blues, fishing, and Southern cooking.
background:
  cultural: Robert is an African American who grew up in the Shreveport‑Bossier area, where Southern hospitality and church-centered community life shaped his values. His upbringing emphasized resilience,
    family loyalty, and a strong sense of collective responsibility. He participates in local cultural traditions such as Mardi Gras parades and church gatherings, and his home is infused with soul, blues,
    and gospel music. The region's culinary heritage, especially dishes like gumbo and jambalaya, influences his cooking. His cultural identity intertwines with a history of civil‑rights awareness, fostering
    his deep compassion for others and commitment to community service.
attributes:
  skills: '[''Auto body panel replacement'', ''Welding (MIG/TIG)'', ''Dent pulling and paintless dent repair'', ''Custom paint matching'', ''Classic car restoration'', ''Advanced composite material repair'',
