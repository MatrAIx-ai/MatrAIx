persona_description: A birdwatcher who is interested in studying the use and importance of greenspaces for bird species. They are likely to be experienced in bird identification and habitat monitoring,
  and may have a background in ecology or environmental science. They are interested in participating in a collaborative study between the Atlanta Audubon Society and the Nongame Program to understand how
  and when birds use greenspaces and what components of urban greenspaces are most important for these birds. They may be interested in contributing to the study by participating in bird surveys of local
  greenspaces and recording what they find.
