personas:
  professional: Terri Burton, a seasoned computer operator and budding Microsoft Office Specialist, leverages their meticulous attention to detail and calm patience to manage data entry, troubleshoot hardware,
    and lead tech‑literacy workshops for seniors, exemplifying reliability and structured mentorship.
  sports: Terri Burton enjoys low‑impact fitness, walking their golden retriever Max along the Thomasville greenway each morning, occasionally joining the Thomasville Senior Walking Club and cheering on
    the Atlanta Braves during baseball season, preferring steady, predictable activity over high‑intensity sports.
  arts: Terri Burton finds artistic fulfillment in the harmonious blend of the choral hymns sung at their church, the soothing piano arrangements of Ludovico Einaudi, the intricate knitting patterns inspired
    by the textile designs of Mary Walker, and the literary worlds of historical fiction authors like Ken Follett and Ann Richardson, creating a calm yet richly textured personal aesthetic.
  travel: Terri Burton prefers thoughtfully planned, low‑stress travel, often taking weekend road trips to nearby historic towns such as Savannah, Georgia, and to the botanical gardens of Asheville, while
    dreaming of a spring pilgrimage to Kyoto’s cherry‑blossom gardens, always budgeting for modest accommodations and ensuring Max can stay with a trusted neighbor.
  culinary: Terri Burton delights in preparing simple, garden‑fresh meals such as rosemary‑roasted chicken, mixed green salads tossed with lavender‑infused vinaigrette, and buttery scones studded with fresh
    strawberries, relying on their moderate cooking skills to nurture both their palate and their sense of ritual.
  core: Terri Burton, a serenely structured senior, balances a love for orderly rose beds and meticulous knitting with a gentle habit of over‑checking email for spam, embodying calm diligence in every facet
    of life.
background:
  cultural: Terri grew up in the rural outskirts of Randolph County, North Carolina, during the post‑World War II era. Her family’s roots trace back to several generations of small‑farmers and textile‑mill
    workers, instilling a strong work ethic and a reverence for community self‑reliance. As a lifelong resident of the American South, she embraces Southern hospitality, church involvement, and a respect
    for tradition, while also valuing education and progress. Her upbringing in a predominantly white, close‑knit community shaped her cooperative nature and the importance she places on harmony and helping
    neighbors. Though never married, she maintains close ties with extended family and local church groups, reflecting the region’s emphasis on extended family support networks.
attributes:
  skills: '[''Microsoft Office (Word, Excel, PowerPoint)'', ''Data entry and database management'', ''Basic hardware troubleshooting'', ''Email and internet navigation'', ''System backup and file organization'',
