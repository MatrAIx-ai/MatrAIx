  hobbies: '[''Gardening (roses and perennials)'', ''Reading historical fiction and biographies'', ''Walking dog in the local greenway'', ''Knitting and crocheting from patterns'', ''Volunteer tech tutoring
    for seniors'', ''Playing bridge at the community center'', ''Birdwatching in the garden'', ''Singing in the church choir'']'
  career_goals: Although approaching retirement, Terri aims to transition from her current part‑time computer operator role to a mentorship position within her community. She plans to earn a Microsoft Office
    Specialist certification as a personal milestone and to lend credibility when offering free tech‑literacy classes at the local library. Her long‑term ambition is to establish a small volunteer program
    that pairs seniors with volunteers to help them navigate digital services, ensuring her legacy of digital inclusion. She also hopes to maintain a stable supplemental income to support her modest lifestyle
    and to contribute to her church’s charitable fund.
