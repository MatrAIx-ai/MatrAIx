  hobbies: '["Soccer", "Bike riding", "Robotics club", "Adventure book reading", "Gardening", "Karaoke", "Organizing treasure hunts", "Scouting activities"]'
  career_goals: Lester dreams of becoming a wildlife veterinarian or a park ranger so he can protect the animals and natural spaces he loves. He also imagines designing helpful machines, hinting at an interest
    in engineering. In the near term, he aims to earn his next scout badge, lead his class’s science‑fair project, and improve his reading and math to help friends with homework, reflecting his desire to
    be both knowledgeable and supportive.
