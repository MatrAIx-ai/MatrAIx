personas:
  professional: Lester Williamson is a budding robotics enthusiast who applies their curiosity and practical mindset to program block‑based robots, while their sociable and cooperative nature makes them
    a natural team leader in class projects.
  sports: Lester Williamson plays forward for the South Jordan Youth Soccer Club, loves bike rides on the Jordan River Trail, cheers for the Utah Jazz and Real Salt Lake, and uses after‑school pick‑up games
    to stay active and practice teamwork.
  arts: Lester Williamson enjoys humming along to Disney soundtracks like 'Let It Go' by Idina Menzel, practices karaoke with friends singing songs by Taylor Swift, and draws inspiration from lively illustrations
    in adventure books by Roald Dahl, fueling their creative storytelling.
  travel: Lester Williamson recalls family road trips to Zion National Park and a magical weekend at Disneyland, and now dreams of hiking the Grand Canyon and exploring the Rocky Mountains, preferring itineraries
    that blend nature hikes with lively theme‑park stops.
  culinary: Lester Williamson loves helping in the garden and then turning fresh tomatoes into simple spaghetti sauce, enjoys cheesy pepperoni pizza, crunchy baby carrots with hummus, and often asks for
    extra marshmallows in their hot chocolate, though they tend to forget to eat their veggies before dessert.
  core: Lester Williamson is a curious, organized yet flexible 8‑year‑old who balances a love for robotics, soccer, and treasure‑hunt games with a generous spirit, occasional impulse buys, and a habit of
    misplacing their sunscreen.
background:
  cultural: Lester grows up in a suburban, predominantly white community in South Jordan, Utah, where family gatherings, community service through local churches, and outdoor recreation are common. His
    family emphasizes politeness, cooperation, and helping neighbors, reflecting the Intermountain West’s cultural ethos. He participates in local traditions such as holiday lighting displays, community
    potlucks, and visits to the Utah State Fair. School lessons on Ute tribe history and environmental stewardship nurture his respect for both nature and cultural diversity.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Digital literacy", "Simple science experiments", "LEGO building and troubleshooting", "Team coordination", "Outdoor navigation", "Basic first‑aid
