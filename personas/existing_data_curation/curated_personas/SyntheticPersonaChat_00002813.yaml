    User 2: So, what''s your favorite country song?

    User 1: I don''t really have a favorite country song, but I like a lot of songs by Garth Brooks.

    User 2: I like Garth Brooks too! He''s one of my favorite country artists.

    User 1: Me too! He''s so talented.

    User 2: I agree. What other bands do you like?

    User 1: I like a lot of different bands, but I''m a big fan of the Rolling Stones.

    User 2: I love the Rolling Stones! They''re one of my favorite bands too.

    User 1: Me too! They''re so good.

