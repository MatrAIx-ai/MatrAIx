personas:
  professional: Felix Fernandez is a budding LEGO architect who methodically builds intricate structures, applying their natural curiosity and organized nature to turn imagination into tidy brick creations
    while already showing leadership in group play by delegating tasks and ensuring everyone follows the plan
  sports: Felix Fernandez is a lively soccer enthusiast who plays weekly matches with the neighborhood kids on the community field, proudly wearing the blue jersey of the local Sacramento Republic FC youth
    club, and also joins after‑school tag sessions on the river trail, balancing energetic play with a disciplined warm‑up routine
  arts: Felix Fernandez delights in drawing cartoon characters inspired by the whimsical murals seen at the annual Barrio Fiesta, often humming tunes from the Coco soundtrack and the classic folk band Los
    Ángeles Azules, while occasionally performing impromptu dance steps during family gatherings, merging visual creativity with rhythmic expression
  travel: Felix Fernandez loves spontaneous weekend trips to the nearby Sacramento River Trail for bike rides, enjoys the bright lights of San Francisco’s Pier 39, and dreams of exploring the historic streets
    of Old Town San Diego, always packing a small sketchbook for on‑the‑go doodles and a reusable water bottle for eco‑friendly adventures
  culinary: Felix Fernandez prefers hands‑on meals, eagerly helping to assemble homemade tacos with seasoned carne asada, savoring the sweet corn kernels of fresh elote, and licking the sticky salsa from
    their fingers, while also showing a budding curiosity for baking chocolate churros after watching a cooking video
  core: Felix Fernandez is a curious, organized six‑year‑old who balances methodical LEGO building with energetic soccer, vivid imagination with occasional anxiety, and a love for family‑rooted food and
    music, all while navigating the world with a mix of careful planning and spontaneous bursts of fun
background:
  cultural: Felix is raised in a Mexican‑American household in West Sacramento, where Spanish is spoken at home and Mexican traditions are celebrated. His family observes Día de los Muertos, enjoys homemade
    tacos, tamales, and salsa, and participates in local Latino festivals. He learns about Mexican folk stories and music while also being exposed to the diverse cultural landscape of the Bay Area, fostering
    a bilingual identity and strong family ties.
