personas:
  professional: Jumana Liddle, a front‑desk specialist at a boutique hotel, leverages sharp operational expertise with OPERA and Cloudbeds while balancing meticulous organization and spontaneous problem‑solving,
    guiding multilingual guests with calm confidence and assertively mentoring new desk clerks.
  sports: Jumana Liddle embraces the outdoors by tackling Adirondack trail hikes each weekend, participates in a co‑ed softball league, cheers for the Buffalo Bills during football season and the New York
    Knicks in winter, and balances energetic salsa classes with a flexible home‑gym routine.
  arts: Jumana Liddle channels their outgoing spirit into community theater, both onstage and behind the scenes with the Adirondack Players, while practicing salsa to the rhythms of Marc Anthony and Celia Cruz,
    and drawing inspiration from Lin‑Manuel Miranda’s Broadway scores during quiet evenings.
  travel: Jumana Liddle curates immersive trips that blend culinary exploration with cultural immersion, alternating meticulously planned itineraries to Barcelona’s tapas bars and spontaneous weekend getaways
    to Asheville’s farm‑to‑table scene, all while documenting each adventure on a travel blog that fuels their dream of launching a boutique B&B.
  culinary: Jumana Liddle is a confident home cook who experiments weekly with international flavors, mastering dishes like Spanish paella with saffron and chorizo, Mexican mole poblano rich with chilhuacle,
    and classic American apple crumble, while sourcing fresh herbs and locally roasted coffee from upstate farmer’s markets to elevate everyday meals.
  core: Jumana Liddle is a pragmatic yet curious hospitality professional who balances meticulous organization with spontaneous salsa spins, DIY home projects, and a relentless quest for cultural flavors,
    often juggling their ambitions with a habit of late‑night blog edits that blur work‑life boundaries.
background:
  cultural: Jumana was raised in a close‑knit, middle‑class family in upstate New York with English and Irish ancestry. Her upbringing emphasized a strong work ethic, community involvement, and practical
    problem‑solving, values that echo in her professional demeanor. While culturally rooted in traditional American holidays and Protestant community traditions, her daily interactions with a diverse hotel
    clientele have broadened her cultural awareness, fostering a respectful appreciation for various customs and languages. This blend of heritage and inclusive exposure shapes her balanced, pragmatic yet
    curious outlook.
attributes:
  skills: '[''Front‑desk operations'', ''Customer service excellence'', ''Reservation software (OPERA, Cloudbeds)'', ''Billing and invoicing'', ''Conflict resolution'', ''Multilingual communication (English,
    conversational Spanish)'', ''Time management'', ''Multitasking'', ''Problem solving'', ''Group booking coordination'', ''Team mentorship'']'
  hobbies: '[''Salsa dancing'', ''Adirondack hiking'', ''Community theater involvement'', ''Cooking international dishes'', ''Travel blogging'', ''Reading mystery novels'', ''Volunteering at the local food
    bank'', ''DIY home improvement projects'']'
  career_goals: Jumana aims to move from desk clerk to Front Office Supervisor within the next two years, pursuing a Bachelor’s degree in Hospitality Management to deepen her strategic understanding of
    hotel operations. She plans to earn the Certified Hotel Administrator (CHA) credential, positioning herself for eventual roles as Hotel Operations Manager or boutique inn owner. Her long‑term ambition
    is to blend her practical expertise with innovative guest‑experience concepts, eventually opening a small, boutique B&B that reflects her love for community hospitality and personalized service.
