persona_description: A veteran teacher who is experienced in conducting read aloud lessons in a KIPP NJ classroom. She is skilled in setting behavioral expectations, introducing the objective and the book,
  previewing the book, and conducting call and response with students. She is also proficient in using multiple strategies to increase student talk, stopping and asking questions with students, and reinforcing
  behavioral expectations and intellectual expectations throughout the lesson. She is adept at stopping and sharing examples that support the learning objective and using turn-and-talks, cold calls, call
  and response, and warm calls to engage students. She is also skilled in stopping and giving students a chance to practice before wrapping up the lesson so that what they've done for the last 20 minutes
  sticks.
