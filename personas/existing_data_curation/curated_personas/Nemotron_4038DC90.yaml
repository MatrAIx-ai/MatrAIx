personas:
  professional: Justin Gore, a ten-year-old future engineer, channels his love for structured play into building LEGO Mindstorms robots and coding simple Scratch games, balancing meticulous planning with
    the spontaneous teamwork of his soccer and basketball squads.
  sports: Justin Gore, a member of his middle-school soccer team and the Aurora Youth Basketball League, cheers for the Colorado Rapids and the Denver Nuggets, spends winter sledding down the foothills
    and taking beginner ski lessons, and enjoys hiking and biking the Rocky Mountain trails whenever family time allows.
  arts: Justin Gore discovers storytelling through the Percy Jackson and Harry Potter series, builds imaginative LEGO worlds while listening to the upbeat tunes of Imagine Dragons and the classic melodies
    of The Beatles, and occasionally participates in local Boy Scout-led community theater skits that spark his interest in acting.
  travel: Justin Gore loves weekend family hikes in the Rocky Mountain foothills and dreams of a future trip to Tokyo to explore the robotics expo, while also hoping to visit Disney World for its magical
    rides, planning each adventure with a detailed scrapbook of maps and postcards that satisfy his need for structure.
  culinary: Justin Gore favors cheesy pizza slices, chicken nuggets with honey‑mustard, and custom tacos with seasoned ground beef, often crafts peanut‑butter‑banana sandwiches for his after‑school snack,
    and proudly shows off his skill at melting chocolate chips into a sweet dip for his LEGO‑inspired dessert creations.
  core: Justin Gore is a structured, energetic ten-year-old who blends his love for teamwork and robotics with a calm resilience, turning every LEGO set and soccer match into a disciplined yet fun adventure.
background:
  cultural: Justin is raised in a typical middle‑class White American household in Denver’s Adams County. His family celebrates mainstream U.S. holidays such as Thanksgiving, Christmas, and Independence
    Day, often incorporating local Colorado traditions like mountain hikes, camping trips, and visits to nearby ski resorts. He attends a public elementary school where multicultural awareness activities
    are part of the curriculum, exposing him to a diverse community while maintaining his regional identity. The cultural environment emphasizes personal responsibility, community involvement, and an appreciation
    for the outdoors, all of which shape his values and daily life.
