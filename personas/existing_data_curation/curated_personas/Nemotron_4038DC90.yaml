  career_goals: Justin dreams of becoming an engineer who designs safe, practical structures for his community, inspired by his love for building things and his desire for order. He also expresses a strong
    interest in serving others, imagining a future as a firefighter or paramedic where his calm, resilient nature can help people in emergencies. Ultimately, he hopes to combine his technical curiosity
    with his compassion by working in a career that both builds and protects, such as civil or aerospace engineering with opportunities for community outreach.
