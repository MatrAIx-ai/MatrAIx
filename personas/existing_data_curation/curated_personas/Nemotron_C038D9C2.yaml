  career_goals: Dolores aims to transition into a strategic leadership role where she can shape technology policy for public health and social service agencies in the Washington, D.C. metro area. She is
    passionate about creating inclusive digital platforms that address equity gaps, and she plans to spearhead initiatives that integrate data privacy safeguards with community outreach. Over the next five
    years, she hopes to mentor emerging talent from underrepresented backgrounds, launch a nonprofit tech‑education program, and eventually serve as a chief technology officer or senior advisor focused
    on ethical, humane technology deployment.
