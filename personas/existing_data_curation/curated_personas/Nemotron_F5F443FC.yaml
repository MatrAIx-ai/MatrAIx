personas:
  professional: Khaya Davis, a curious three‑year‑old at a multicultural preschool, treats every activity as a mini‑experiment, and they turn art projects into investigative play, using an open‑minded,
    flexible approach to explore new ideas without worrying about strict schedules.
  sports: Khaya Davis loves the vibrant energy of toddler gymnastics and the occasional backyard kickball game, they proudly wear a miniature St. Louis Cardinals cap while watching the team on TV, and they
    are also a budding fan of the St. Louis Blues, often mimicking the players' moves with boundless enthusiasm.
  arts: Khaya Davis, who delights in clapping along to gospel songs at community gatherings and swaying to the jazz of Louis Armstrong at home, often draws colorful music notes in their sketchbooks and
    eagerly watches performances by young dancers like Misty Copeland on family TV.
  travel: Khaya Davis enjoys family road trips to the City Museum and the Gateway Arch, dreams of visiting New Orleans to soak in live jazz and the French Quarter, and looks forward to a future Disney World
    adventure where they can explore magical rides while snacking on churros.
  culinary: Khaya Davis adores creamy mac and cheese, crispy fried chicken nuggets, and sweet potato pie, often helping stir batter with a wooden spoon despite a penchant for splattering flour on the kitchen
    floor, and they relish sipping strawberry‑banana smoothies after meals.
  core: Khaya Davis is a lively three‑year‑old whose boundless curiosity, love for music and art, and occasional competitive streak turn everyday moments into playful experiments, and they often leave a
    trail of glittery stickers in their wake.
background:
  cultural: Khaya is raised in an African‑American family in St. Louis, Missouri. Her parents and grandparents share stories of African heritage and celebrate cultural traditions such as Juneteenth, Kwanzaa,
    and community gospel music. She attends a local preschool that incorporates multicultural lessons, exposing her to the rich history of the St. Louis Black community, including jazz, blues, and local
    festivals. These experiences nurture her appreciation for art, rhythm, and diverse perspectives.
attributes:
  skills: '[''Naming primary colors'', ''Matching basic shapes'', ''Counting up to five'', ''Building block towers'', ''Drawing simple figures'', ''Manipulating play‑dough'', ''Participating in role‑play'',
    ''Following simple instructions'', ''Expressing emotions verbally'']'
  hobbies: '[''Coloring and painting'', ''Play‑dough sculpting'', ''Building with LEGO Duplo'', ''Dancing to children’s music'', ''Exploring nature in parks'', ''Listening to picture books at the library'',
    ''Participating in toddler art classes'', ''Collecting leaves and observing insects'']'
  career_goals: Khaya often talks about becoming an astronaut who explores far‑away planets, an artist who paints giant murals, or a teacher who shares storybooks with younger children. She also loves the
    idea of being a superhero who helps others and enjoys being the leader in group games, reflecting her competitive spirit and desire to make a big impact one day.
