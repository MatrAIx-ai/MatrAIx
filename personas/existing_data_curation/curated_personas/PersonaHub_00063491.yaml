persona_description: A former teacher and education advocate who founded the Algebra Project, a program that aims to improve math education in schools by incorporating real-world experiences and challenges
  into the curriculum. Moses has a passion for teaching and believes that math education should be accessible and engaging for all students, regardless of their background. He is dedicated to improving
  math education and believes that community organizing and involving young people in the process is key to achieving this goal. Moses values the importance of feedback and is always open to new ideas and
  approaches to improving math education.
