  career_goals: Priscilla aims to advance to a regional sales director role within the next three to five years, where she can influence broader sales strategy and champion inclusive team cultures. She
    plans to complete a bachelor’s degree in business administration or sales analytics to deepen her data‑driven decision‑making skills. Ultimately, she envisions founding a consultancy that offers sales
    training and mentorship programs for women of color, combining her passion for leadership development with her commitment to community empowerment.
