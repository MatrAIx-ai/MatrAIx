personas:
  professional: Priscilla Strachan leverages their talent for rallying diverse sales teams with a blend of charismatic public speaking, conflict‑resolution finesse, and a flair for integrating artistic
    creativity into data‑driven strategies, even as their relaxed, sometimes disorganized approach means they prefer fluid planning over rigid roadmaps.
  sports: Priscilla Strachan enjoys the camaraderie of weekend volleyball at a local community center, follows the Baltimore Ravens and Washington Capitals loyally, and they incorporate early‑morning 5K
    runs into their routine, though they often skip the gym in favor of impromptu dance‑filled karaoke nights.
  arts: Priscilla Strachan spends evenings exploring the Baltimore Museum of Art, snapping photographs of street murals in Washington’s U Street corridor, painting acrylic landscapes inspired by Georgia
    O’Keeffe, and attending live shows by indie folk artist Phoebe Bridgers, while they volunteer at the ArtWorks youth program to mentor aspiring creators.
  travel: Priscilla Strachan gravitates toward spontaneous trips to Berlin’s East Side Gallery, Melbourne’s laneway street art, and New Orleans’ jazz districts, often booking last‑minute flights and staying
    in boutique hostels, while they enjoy weekend getaways to Annapolis and Charlottesville to satisfy their love for coastal charm and historic neighborhoods.
  culinary: Priscilla Strachan’s culinary adventures range from crafting Mediterranean mezze platters with homemade hummus and fresh basil to perfecting a Southern shrimp étouffée, experimenting with craft
    cocktails like bourbon‑infused Old Fashioneds, and they host themed dinner parties where guests sample their signature matcha‑green tea panna cotta.
  core: Priscilla Strachan is a charismatic sales leader who fuses artistic flair with data‑driven strategy, thrives on social interaction, embraces flexibility over strict planning, and they occasionally
    let impulsive spending and scattered organization color their vibrant, community‑focused life.
background:
  cultural: Priscilla is a Black woman who grew up in the diverse suburbs of the Washington, D.C. metro area, with strong ties to her African‑American community. She was raised attending church and community
    gatherings where storytelling, music, and activism were integral, shaping her appreciation for Black cultural heritage and social justice. Her family emphasizes education, resilience, and collective
    uplift, which inform her focus on mentoring other women of color. Living in Edgewater, MD, she participates in local Juneteenth celebrations, supports Black‑owned businesses, and stays connected to
    the broader cultural narratives of the Black diaspora.
