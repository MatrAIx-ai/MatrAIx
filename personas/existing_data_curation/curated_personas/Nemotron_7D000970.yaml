  career_goals: Barbara dreams of becoming a teacher or a veterinarian, careers that would let her share her love of learning and care for others. She envisions designing interactive science lessons that
    spark curiosity in future students while keeping the classroom organized and welcoming. In the near term, she wants to be elected student council president, organize school fundraisers, and lead a community
    garden project at her elementary school, applying her methodical planning skills and sociable energy to make a positive impact on her peers and neighborhood.
