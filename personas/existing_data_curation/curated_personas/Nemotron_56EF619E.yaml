personas:
  professional: Edilia Santiago, a 50‑year‑old community organizer with an associate’s in Business Administration, leverages her bilingual fluency and natural people‑connecting talent to design informal
    heritage workshops at the local cultural center, though they often rely on improvisation and occasionally overlook formal planning deadlines.
  sports: Edilia Santiago channels their energy into weekly salsa and folkloric dance sessions at the community studio ‘Ritmo Vivo,’ occasionally joins a walking club that explores the town’s river trail,
    and roots for the local soccer team, the River City FC, cheering loudly from the bleachers during weekend matches.
  arts: Edilia Santiago finds inspiration at the downtown gallery showcasing painter Luis Rojas, frequently sketches the artistry she encounters, enjoys the dramatic flair of the local theater troupe ‘Stagecraft,’
    and they unwind to the soulful voice of world‑music vocalist Lila Downs while leafing through poetry by Octavio Paz.
  travel: Edilia Santiago prefers immersive, culturally rich trips—like a week‑long culinary tour of a highland town celebrated for its bustling markets or a weekend retreat in a colonial city famed for
    its vibrant murals—yet they plan most journeys around family gatherings, often opting for budget‑friendly buses over flights to balance adventure with financial and caregiving responsibilities.
  culinary: Edilia Santiago experiments with traditional dishes such as mole negro, chilaquiles verdes, and slow‑cooked pork shoulder glazed with ancho chilies, often incorporating home‑grown cilantro,
    epazote, and fire‑roasted tomatillos into her recipes, and they delight friends with her signature salsa verde that she perfects for each family celebration.
  core: Edilia Santiago is a vivacious, art‑obsessed community catalyst who loves salsa dancing, spontaneity, and cooking fiery dishes, yet they often wrestle with anxiety and a laissez‑faire approach to
    schedules.
background:
  cultural: Edilia grew up in a Mexican‑American household where Spanish was spoken at home and Mexican holidays like Día de los Muertos, Cinco de Mayo, and Navidad were celebrated with food, music, and
    family rituals. Her parents instilled a strong sense of family cohesion, respect for elders, and Catholic traditions, which she continues to observe through regular church attendance. After moving to
    Franklin, Pennsylvania, she blended her heritage with Appalachian community values, becoming a cultural liaison who introduces Mexican customs to her neighbors while embracing local traditions such
    as county fairs and pumpkin festivals. This bicultural identity shapes her worldview, artistic tastes, and deep commitment to fostering cross‑cultural understanding in her town.
