  hobbies: '[''Attending art exhibits and museums'', ''Sketching and watercolor painting'', ''Cooking traditional Mexican cuisine'', ''Salsa and folkloric dance'', ''Gardening herbs and chilies'', ''Reading
    diverse literature'', ''Volunteering at the local library'', ''Leading community storytelling sessions'', ''Participating in community theater'']'
  career_goals: Though currently not in the formal workforce, Edilia aspires to transform her passion for culture and people into a part‑time role at the local cultural center or a community nonprofit where
    she can design and lead Mexican heritage programs. She is also exploring the possibility of launching a home‑based pop‑up kitchen that offers cooking classes and catered traditional dishes for community
    events. On a personal level, Edilia hopes to complete a short certification in grief counseling to better support friends and neighbors dealing with emotional distress, while continuing to nurture her
    own emotional wellbeing through mindfulness practices.
