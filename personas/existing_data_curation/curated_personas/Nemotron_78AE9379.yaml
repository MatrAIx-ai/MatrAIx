  hobbies: '[''Woodworking and furniture making'', ''Model building (aircraft and engine kits)'', ''Off‑road 4×4 trail riding'', ''Hiking in the Tonto National Forest'', ''Fishing at local lakes'', ''Makerspace
    projects and CNC skill development'', ''Community volunteering (e.g., local school robotics mentorship)'', ''Playing acoustic guitar'']'
  career_goals: He aspires to become a lead CNC supervisor within the next five years, overseeing a team of machinists and driving process improvements. Ultimately, Dylan aims to earn advanced certifications,
    such as CNC Programming Specialist and Six Sigma Green Belt, and eventually open his own precision machining shop that can serve aerospace and custom fabrication markets. He also wants to support his
    family's financial stability, provide a comfortable home, and contribute to the local community by offering apprenticeship opportunities.
