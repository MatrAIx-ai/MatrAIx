personas:
  professional: A 29-year-old CNC machinist named Dylan Moore blends meticulous manual skill with cutting‑edge CNC programming, leading his workshop with lean‑manufacturing discipline while mentoring apprentices
    to meet aerospace tolerances.
  sports: A rugged outdoor enthusiast named Dylan Moore spends weekends hiking Tonto National Forest trails, tuning his 4×4 for off‑road adventures, and cheering on the Arizona Diamondbacks while joining
    a local mountain‑bike club that meets after work.
  arts: An artistic 29‑year‑old named Dylan Moore picks up an acoustic guitar to unwind, strumming classic Neil Young ballads and modern John Mayer riffs, while showcasing his handcrafted furniture at community
    art fairs alongside works inspired by Mid‑Century Modern design.
  travel: A wander‑lustful 29‑year‑old named Dylan Moore plans trips that blend nature and tech, ranging from weekend hikes in Sedona and a fishing camp at Lake Pleasant to annual visits to Germany’s Stuttgart
    for automotive machining tours and a bi‑annual CNC expo in Osaka, always balancing travel costs with the goal of funding his future shop.
  culinary: A hands‑on 29‑year‑old named Dylan Moore enjoys grilling ribeye steaks seasoned with rosemary and garlic, mastering smoked brisket on his backyard pit, and whipping up authentic tacos al pastor
    using pineapple and chipotle, while occasionally experimenting with craft‑beer‑infused marinades.
  core: Dylan Moore, a 29‑year‑old CNC maestro, fuses disciplined precision with a maker’s curiosity, juggling a thriving workshop, off‑road adventures, and weekend strings, all while meticulously budgeting
    for his dream shop and nursing a stubborn lower‑back ache.
background:
  cultural: Dylan grew up in a small, predominantly white, middle‑class town in the American Southwest, where a strong work ethic, self‑reliance, and community ties are core values. His family traditions
    emphasize punctuality, practicality, and the importance of family gatherings. Living in Payson, AZ, he is shaped by the region’s outdoors‑oriented lifestyle, including appreciation for the desert landscape,
    hunting, fishing, and a close‑knit community that often rallies around local events and volunteer initiatives.
attributes:
  skills: '[''CNC programming (G-code)'', ''Manual milling and lathe operation'', ''Blueprint and technical drawing interpretation'', ''Precision measurement (CMM, micrometers, calipers)'', ''Machine maintenance
