    Mitigation'']'
  hobbies: '[''Woodworking and Furniture Restoration'', ''Reading (Historical Biographies & Business Strategy)'', ''Gardening'', ''Hiking (Great Falls and nearby trails)'', ''Scale Model Building (Historic
    Bridges)'', ''DIY Home Improvement Projects'', ''Volunteering with Habitat for Humanity'']'
  career_goals: Approaching retirement, John aims to transition from day‑to‑day supervision to a strategic mentorship role, guiding emerging supervisors through formal apprenticeship programs and safety‑trainer
    certification. He plans to obtain the Certified Construction Manager (CCM) credential to solidify his expertise and position himself as a consultant for sustainable building practices in Montgomery
    County. John also wishes to champion the adoption of Building Information Modeling (BIM) on smaller commercial projects, balancing innovative technology with the practical constraints of local contractors.
    Ultimately, his ambition is to leave a legacy of safer, more efficient job sites while fostering a culture of continuous learning among his crew.
