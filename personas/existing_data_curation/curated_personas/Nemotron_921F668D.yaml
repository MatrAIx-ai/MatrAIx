personas:
  professional: Sasha Hall, a miniature architect of play, methodically builds towering block castles, ensuring each piece fits precisely before inviting a close sibling to share the creation, and they
    delight in novel shapes with the curiosity of an inventor.
  sports: Sasha Hall, a tiny fan of the Dallas Cowboys who enjoys weekly toddler soccer sessions at the local community center's Mini Kick club, loves tossing a soft foam ball in the backyard with dad,
    and they approach fitness with gentle enthusiasm, favoring structured play over large crowds.
  arts: Sasha Hall, who revels in gospel choirs at church and dances to Beyoncé’s upbeat tracks, spends afternoons finger‑painting bright scenes inspired by picture books filled with vibrant street murals,
    and they often hum classic R&B melodies by Marvin Gaye while arranging crayons in meticulous rows.
  travel: Sasha Hall, who loves day trips to the Dallas Arboretum’s flower gardens and eagerly anticipates a family vacation to Disney World in Orlando, prefers stroller‑friendly itineraries with frequent
    snack breaks, and they delight in the tactile sensation of Gulf Coast sand during beach outings.
  culinary: Sasha Hall, a budding foodie who clutches a spoon for mac and cheese smothered in cheddar, delights in sweet potato fries seasoned with a pinch of paprika, and they giggle when offered bite‑size
    collard green nuggets during family meals.
  core: Sasha Hall, an imaginative two‑year‑old with a methodical love for arranging toys, a gentle heart that cherishes small circles, and a quirky habit of collecting every shiny stone they find.
background:
  cultural: Sasha comes from a vibrant African‑American family in Dallas, Texas. Her household celebrates cultural traditions such as Kwanzaa, enjoys soulful gospel music at church, and often listens to
    classic R&B and contemporary hip‑hop with family members. Community events like local parades, jazz concerts, and family picnics in the park provide her with a strong sense of belonging and cultural
    pride. Her parents incorporate stories of Black history and resilience into bedtime reading, fostering an early awareness of her heritage while encouraging empathy and cooperation.
