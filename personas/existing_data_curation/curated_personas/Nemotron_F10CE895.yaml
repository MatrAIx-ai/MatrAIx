personas:
  professional: Harry Garris is a senior network and computer systems administrator turned independent consultant who leverages four decades of LAN/WAN, virtualization, and cloud expertise—paired with a
    pragmatic yet artistically‑inspired problem‑solving style—to advise small businesses and non‑profits on security, mentor junior tech talent, and craft interactive digital installations that marry technology
    with New Mexican desert aesthetics, all while occasionally letting their relaxed approach to deadlines lead to last‑minute, creative improvisations.
  sports: Harry Garris stays active by hiking the Sandia Mountains with the local Sandia Trail Club, cheering on the Albuquerque Isotopes baseball team and New Mexico United soccer club, while occasionally
    joining a community pick‑up basketball game at the public park.
  arts: Harry Garris immerses themselves in Albuquerque’s arts scene, frequenting galleries showcasing the work of painter R. S. Long, attending open‑mic nights featuring folk singer Catherine Andrews,
    filling their evenings with the jazz of Miles Davis and the folk storytelling of Bob Dylan, and expressing their own creativity through watercolor desert landscapes and acoustic guitar renditions at
    family gatherings.
  travel: Harry Garris favors spontaneous weekend getaways that blend photography and cultural immersion, having explored Santa Fe’s historic plaza, the red rock canyons of Sedona, the vibrant streets of
    Kyoto for cherry‑blossom shoots, and dreaming of an Icelandic road trip to capture northern lights over volcanic terrain, all while budgeting within their modest retirement income.
  culinary: Harry Garris delights in cooking authentic New Mexican green chile stew, carne adovada, and roasted enchiladas topped with Hatch chile, demonstrating an intermediate skill level that lets them
    experiment with smoked prunes and roasted corn in their recipes while often indulging in the fresh, smoky flavor of roasted green chile peppers.
  core: Harry Garris is a curiously artistic senior tech consultant who channels their love of desert landscapes, vintage gadgets, and green chile cooking into a flexible, slightly disorganized lifestyle
    that balances community mentorship with spontaneous creative pursuits.
background:
  cultural: Harry grew up in a Midwestern white family where self‑reliance and community service were core values. After a long career in IT, he relocated to Albuquerque, drawn by the Southwest’s unique
    blend of Native American, Hispanic, and contemporary artistic influences. He embraces the region’s open‑air festivals, the distinctive adobe architecture, and the communal spirit of local neighborhoods.
    While maintaining his traditional American roots, Harry has adopted the relaxed pace and vibrant cultural tapestry of New Mexico, often integrating regional art motifs into his personal projects and
    appreciating the diversity of perspectives that shape his community.
attributes:
  skills: '[''Network design and implementation'', ''Server administration (Windows and Linux)'', ''Virtualization (VMware, Hyper‑V)'', ''Cisco routing and switching'', ''Firewall configuration and network
    security'', ''Automation scripting (PowerShell, Bash, Python)'', ''Cloud services (AWS, Azure)'', ''Troubleshooting and root‑cause analysis'', ''Agile project management'', ''Technical mentorship and
    training'', ''UI/UX awareness for system documentation'']'
  hobbies: '[''Visiting art galleries'', ''Painting watercolors'', ''Photography (desert landscapes)'', ''Hiking in the Sandia Mountains'', ''Playing acoustic guitar'', ''Listening to jazz and folk music'',
    ''Reading science‑fiction and biographies'', ''Tinkering with vintage computers'', ''DIY IoT projects'', ''Cooking New Mexican dishes'', ''Volunteering in community tech workshops'']'
  career_goals: As he approaches retirement, Harry aims to shift from full‑time system administration to a flexible consulting role where he can advise small businesses and non‑profits on network security
    and cloud migration. He hopes to mentor the next generation of IT professionals through community college workshops and local maker‑space programs, sharing his love of unconventional problem‑solving.
    Harry also aspires to blend his technical expertise with his artistic side by creating interactive digital installations that showcase New Mexican landscapes. Additionally, he plans to author a blog
    that explores the intersection of technology, art, and the evolving tech culture of the Southwest, while volunteering his time to secure the networks of local cultural organizations.
