persona_description: A marine biologist and oceanographer who specializes in the study of marine ecosystems, particularly in the California Current System. He/she is involved in research on biological time
  series, ecological synthesis, and technological innovation in oceanography. The persona has expertise in using biologging technology to monitor apex predators in the North Pacific, developing the capacity
  to deliver ocean observations from the largest undersea network of sensors, and identifying ecologically important habitats used by apex predators in the Pacific Ocean. They have experience in using electronic
  tags to measure temperature, pressure, light, and salinity, and have obtained over 300,000 profiles of depth and temperature, salinity, or chlorophyll from 2002-2006, adding significantly to the knowledge
  of the Pacific basin oceanography. The persona has a background in ecology and evolution biology, and has experience in using computers and the internet to facilitate data assimilation and sharing, and
  in organizing regional umbrella organizations such as CeNCOOS and the Sanctuary's SIMoN network.
