personas:
  professional: Pablo Vazquez is a 20‑year‑old automotive service technician who merges hands‑on mechanical expertise with a flair for custom paint artistry, using their curious mind and compassionate communication
    to break down complex repairs while often juggling a laid‑back schedule that leaves the workshop a bit untidy.
  sports: Pablo Vazquez enjoys low‑key fitness, often cycling along the Pacific coastline and hitting the gym for short strength sessions, while cheering for the Los Angeles Lakers in basketball, the Dodgers
    in baseball, and occasionally joining a local skate‑boarding club for weekend practice.
  arts: Pablo Vazquez channels creative energy into sketching futuristic car designs inspired by the gritty murals of Banksy and the bold colors of Shepard Fairey, while their playlists weave together Mexican
    folk ballads, Tame Impala’s psychedelic indie rock, and lo‑fi beats from Nujabes to fuel late‑night digital illustration sessions.
  travel: Pablo Vazquez prefers spontaneous road trips on their vintage motorcycle, having captured sunsets from Santa Barbara to Big Sur, while dreaming of a future pilgrimage to Japan’s automotive museums
    in Tokyo and to Germany’s classic car showcases in Munich, balancing wanderlust with a modest student budget.
  culinary: Pablo Vazquez’s culinary repertoire leans toward quick, flavorful meals—spicy tacos al pastor with fresh cilantro and lime, ramen bowls enriched with miso and soft‑boiled eggs, and occasional
    avocado toast drizzled with olive oil—reflecting a modest cooking skill that thrives on bold, aromatic ingredients while they often snack on energy bars during late‑night sketching.
  core: Pablo Vazquez is a creatively restless mechanic‑artist whose relentless curiosity fuels both car paint labs and midnight sketches, yet their tendency toward disorganization and anxiety often leads
    to last‑minute panic and missed deadlines.
background:
  cultural: Raised in a Mexican-American household in San Pedro, Pablo grew up speaking both Spanish and English and celebrates traditions such as Día de los Muertos and quinceañera gatherings with extended
    family. The vibrant Latino community in Los Angeles County has instilled in him a deep appreciation for Mexican cuisine, music, and visual arts, which he often incorporates into his custom paint work.
    While fully integrated into Southern California’s diverse culture, he maintains strong family ties and a sense of responsibility to give back to the community that shaped his identity.
