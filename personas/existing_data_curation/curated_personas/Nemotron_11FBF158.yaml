  hobbies: '[''Sketching and digital illustration of car designs'', ''Custom paint projects on vehicles'', ''Vintage motorcycle restoration'', ''Urban and coastal photography'', ''Racing simulation video
    games'', ''Listening to Mexican folk and indie music'', ''Journaling and meditation for emotional regulation'', ''Small-group car enthusiast meet-ups'', ''Community car maintenance workshops'']'
  career_goals: Pablo aims to earn his ASE master technician certification within the next three years and eventually open a boutique garage that blends high-performance automotive work with artistic customization,
    offering unique paint jobs and body modifications. He envisions providing affordable maintenance services to low-income families in his community, reflecting his compassionate values. While he values
    flexibility, he also wants to develop a structured routine to manage his anxiety and improve productivity. Long-term, he hopes to mentor young apprentices, especially those from underrepresented backgrounds,
    and perhaps pursue a degree in automotive technology or design.
