persona_description: A neurologist or epilepsy specialist who is interested in the study of temporal lobe seizures and their lateralization. They are particularly interested in the role of speech manifestations
  in the lateralization of these seizures and how they can be used as a diagnostic tool. They are likely to have expertise in EEG monitoring, intracarotid amobarbital tests, and the classification of speech
  manifestations. They may also have experience with temporal lobectomy and the use of speech areas in electrical stimulation.
