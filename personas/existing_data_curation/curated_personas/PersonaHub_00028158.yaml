persona_description: A leading economist and banker who collaborated with William Trufant Foster in the 1920s, influential in the United States economy, and had a major impact on Franklin D. Roosevelt's
  policies. Known for his contributions to the underconsumptionist tradition, advocating for similar issues to Keynes such as the paradox of thrift and economic interventionism. His books, Money (1923),
  Profits (1925), Business Without a Buyer (1927), The Road to Plenty (1928), and Progress and Plenty (1930), influenced many policy makers and stood in the shadow of Keynes's The General Theory.
