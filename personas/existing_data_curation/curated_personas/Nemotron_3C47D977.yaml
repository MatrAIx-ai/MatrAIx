  hobbies: '[''Reading technical and non-fiction books'', ''Gardening'', ''Jogging'', ''Yoga'', ''Puzzle solving (Sudoku, crosswords)'', ''Woodworking'', ''Cooking and experimenting with Southern and African-American
    recipes'', ''Listening to jazz and instrumental hip‑hop'', ''Watching documentaries'', ''Home improvement projects'']'
  career_goals: Terez aims to advance from first‑line supervisor to plant manager within the next five years, pursuing certifications such as Six Sigma Black Belt and a completed associate’s degree in Industrial
    Technology. She is driven to lead larger operational units, champion continuous‑improvement initiatives, and implement sustainable automation solutions that balance innovation with cost‑effectiveness.
    Additionally, she hopes to mentor other women of color in manufacturing, fostering a more inclusive leadership pipeline while securing a stable, rewarding career that supports her family.
