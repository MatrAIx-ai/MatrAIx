personas:
  professional: Terez Jackson, a production floor supervisor with a data‑driven, methodical approach, leverages lean manufacturing and safety compliance expertise to optimize processes while critically
    evaluating automation tools before integration, and mentors frontline workers with clear, organized documentation and reliable scheduling.
  sports: Terez Jackson, a solitary jogging enthusiast who logs weekly runs on the local trail network, attends weekday yoga classes at the community center, and supports the River Valley Raptors basketball
    team while participating in a weekend intramural softball league.
  arts: Terez Jackson, an avid listener of instrumental jazz and hip‑hop, often cites Miles Davis, John Coltrane, J Dilla, and The Roots as soundtrack companions while watching engineering documentaries
    narrated by Ken Burns.
  travel: Terez Jackson, a meticulous solo traveler, plans trips around historical and engineering landmarks such as the Smithsonian National Museum of American History, the industrial canals of Bruges,
    and the Toyota Manufacturing Plant in Georgetown, balancing a modest travel budget with a desire for both cultural immersion and intellectual enrichment.
  culinary: Terez Jackson, who enjoys experimenting in the kitchen, frequently prepares Southern‑inspired dishes like shrimp and grits, collard greens braised with smoked paprika, and sweet‑potato pie,
    using fresh garden herbs, okra, and locally sourced buttermilk to elevate flavor while honing an intermediate level of cooking skill.
  core: Terez Jackson blends disciplined curiosity with solitary productivity, channeling a pragmatic, data‑driven mindset into efficient manufacturing leadership, meticulous financial planning, and a quiet,
    focused lifestyle enriched by puzzles, jazz, and home‑grown cooking.
background:
  cultural: Terez is a Black woman raised in the vibrant, multicultural environment of Killeen, Texas, a community shaped by its proximity to Fort Hood and a mix of Southern traditions and African‑American
    heritage. Her family emphasized resilience, education, and community service, often gathering at church for music, fellowship, and civic engagement. Growing up, she observed the intersection of military
    discipline and civilian industry, which informed her practical work ethic. While she values quiet personal time, she remains connected to her cultural roots through music, food, and mentoring younger
    Black professionals in the manufacturing sector, seeking to broaden representation and foster empowerment within her field.
attributes:
  skills: '[''Production line supervision'', ''Process optimization'', ''Lean manufacturing'', ''Quality control'', ''Safety compliance'', ''Equipment troubleshooting'', ''Data analysis'', ''Inventory management'',
