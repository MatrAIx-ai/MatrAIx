personas:
  professional: A budding LEGO architect, Daniel Rodriguez channels his love for step‑by‑step building and improvisation into increasingly complex creations, showcasing meticulous attention to detail and
    a collaborative spirit that mirrors their cooperative personality.
  sports: An enthusiastic youth soccer player, Daniel Rodriguez trains with the Riverside Rangers U‑10 team, idolizes the star forward of the Los Angeles Galaxy, and watches professional matches on weekends,
    balancing structured drills with spontaneous kick‑around games at the neighborhood park.
  arts: A creative storyteller, Daniel Rodriguez devours Spider‑Man comics and Adventure Time graphic novels, enjoys performing traditional folk dances at community events, and looks up to pop icons like
    JoJo Siwa, channeling that inspiration into imaginative LEGO narratives.
  travel: An inquisitive explorer, Daniel Rodriguez loves family road trips to the Grand Canyon and beach outings in San Diego, plans adventures with a scrapbook of laminated maps, prefers destinations
    featuring interactive museums or nature trails, and dreams of visiting Disneyland Paris once their savings grow.
  culinary: A budding junior chef, Daniel Rodriguez helps prepare tacos and guacamole with fresh cilantro, avocado, lime, and cheese, experiments with assembling quesadillas and homemade salsa, and enjoys
    the tactile satisfaction of arranging toppings like a LEGO set, though they sometimes over‑salt the salsa in excitement.
  core: Daniel Rodriguez is a structured LEGO enthusiast who balances soccer, comic books, and folk dance with a knack for saving allowance, yet often forgets homework while obsessively collecting stickers.
background:
  cultural: Daniel is a Mexican‑American raised in Houston’s vibrant, multicultural neighborhood. Spanish is spoken at home, and his family celebrates Mexican traditions such as Día de los Muertos, Cinco
    de Mayo, and holiday feasts featuring tamales and tacos. He attends a bilingual elementary school where lessons integrate both English and Spanish, reinforcing his bicultural identity. Throughout the
    year, Daniel participates in community events at the local Hispanic cultural center, learning traditional music, dance, and crafts. His upbringing blends Mexican values of family cohesion, respect,
    and harmony with the broader American emphasis on independence and personal achievement, shaping his considerate and cooperative nature.
