  career_goals: Inspired by his love for clear routines and helping others, Daniel dreams of becoming a community protector. He imagines himself as a firefighter, drawn to the structured schedules, teamwork,
    and the chance to aid people in emergencies. He also thinks about civil engineering because his fascination with LEGO building sparks curiosity about constructing safe, lasting structures. Occasionally,
    Daniel mentions wanting to be a teacher, seeing the joy in guiding classmates through new topics. Overall, his ambitions focus on roles that blend order, responsibility, and service to his community.
