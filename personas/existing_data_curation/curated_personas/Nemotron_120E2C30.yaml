  career_goals: Jason wants to pursue a career that combines his love of structure, practical problem‑solving, and teamwork. He is aiming to attend a technical college after high school to study automotive
    technology or mechanical engineering, with the long‑term goal of becoming a certified automotive technician and eventually opening his own repair shop. He also sees the possibility of joining the U.S.
    Army’s engineering corps, attracted by the clear hierarchy and disciplined environment. In the meantime, he plans to take on part‑time jobs such as lawn‑mowing or seasonal automotive work to build experience
    and fund his future education.
