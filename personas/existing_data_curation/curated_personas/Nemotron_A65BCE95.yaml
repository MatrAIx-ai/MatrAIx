personas:
  professional: Tam Bhandari, a retired community volunteer, leverages decades of event‑planning expertise, a keen eye for visual arts, and an organized yet flexible approach to lead craft workshops and
    cultural festivals at the senior center, channeling their curiosity and steady reliability into each project.
  sports: Tam Bhandari enjoys daily leisurely walks in Youngstown municipal parks, participates in a senior yoga class at the community center, and is an avid supporter of the Youngstown State Penguins
    baseball team and the Cleveland Browns, viewing these activities as gentle ways to stay active.
  arts: Tam Bhandari immerses themselves in watercolor studies of Claude Monet and Frida Kahlo, attends local gallery openings featuring artists like Maria Hernandez, and listens to recordings of a renowned
    sitar virtuoso and traditional vocalists from their heritage, weaving these influences into their own creative practice.
  travel: Tam Bhandari prefers slow, well‑planned trips, often joining family outings to nearby Cleveland and Columbus for museum weekends, and cherishes a memorable pilgrimage to the tea‑plantation valleys
    of the Himalayas and a leisurely cruise through the Caribbean islands of the Bahamas, balancing relaxation with cultural curiosity.
  culinary: Tam Bhandari delights in cooking, skillfully blending spiced lentil stew with Midwestern cornbread, experimenting with turmeric‑marinated chicken tossed with roasted root vegetables, and perfecting
    a fusion gnocchi dish that incorporates aromatic herbs from their garden, often serving these meals at family gatherings.
  core: Tam Bhandari, an ever‑curious 87‑year‑old, spends mornings tending herbs, afternoons watercoloring park vistas, evenings meticulously cataloguing family stories on a digital photo album, and they
    occasionally forget to water the succulents.
background:
  cultural: Tam was born to South Asian immigrant parents who settled in the Midwest during the 1950s. Her family hails from Nepal (the Bhandari surname is common among Nepali communities) and she grew
    up speaking Nepali at home while receiving her education in English. She celebrated Diwali, Dashain, Tihar, and other cultural festivals, integrating these traditions with Midwestern customs. Her upbringing
    emphasized respect for elders, hospitality, and community service, values she carries into her volunteer work. Over the decades, she has become a bridge between her South Asian heritage and the broader
    Youngstown community, sharing cultural knowledge through food, storytelling, and participation in multicultural events.
