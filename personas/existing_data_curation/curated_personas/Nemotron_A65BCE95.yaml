  hobbies: '["Watercolor painting","Visiting art museums and galleries","Cooking traditional South Asian meals and fusion experiments","Herb and vegetable gardening","Reading historical fiction and artist
    biographies","Listening to classical Indian and Nepali music","Walking in local parks","Volunteering at senior center with craft workshops"]'
  career_goals: Although retired, Tam’s ambitions center on lifelong learning and cultural stewardship. She aims to enroll in a community‑college art history class to deepen her understanding of visual
    art. She plans to master digital photography to document family gatherings and local festivals. Tam aspires to compile a memoir that intertwines her personal history with South Asian heritage, including
    a family recipe book. She hopes to mentor younger volunteers at the senior center, teaching them event organization and cultural storytelling. Maintaining her health and independence so she can continue
    these pursuits is also a core goal.
