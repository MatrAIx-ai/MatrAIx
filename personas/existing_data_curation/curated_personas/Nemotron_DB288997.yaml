  career_goals: Richard aims to build a stable, long‑term career in transportation. In the next few years he plans to obtain a Commercial Driver’s License (CDL) so he can operate larger vehicles and expand
    his driving options. He hopes to save enough to purchase a second car and eventually launch his own small fleet of taxis, providing reliable service to the local community. Alongside his driving ambitions,
    he is interested in taking evening courses in business management at a community college to learn how to run a transportation business effectively. His ultimate goal is financial independence that will
    allow him to support his family and mentor younger neighborhood residents who are interested in similar career paths.
