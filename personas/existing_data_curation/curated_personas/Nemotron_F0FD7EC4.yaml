  career_goals: As she grows, Claudia envisions a future where she can express her love for art and unconventional ideas through a creative career. She aspires to learn to draw and paint, eventually becoming
    a children’s book illustrator or a musician who blends visual and auditory experiences. In the immediate term, her primary goals are to master walking, speak her first meaningful words, and explore
    new artistic activities through play, laying the groundwork for her long‑term creative ambitions.
