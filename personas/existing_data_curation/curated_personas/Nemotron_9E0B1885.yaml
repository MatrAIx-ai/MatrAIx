personas:
  professional: Evelio Rodriguez, a self‑taught full‑stack software developer, leverages a keen eye for UI/UX, fluency in both Spanish and English, and a disciplined yet flexible workflow to transform complex
    problems into clean, maintainable code while mentoring peers in remote teams.
  sports: Evelio Rodriguez follows the Los Angeles Lakers and Dodgers with avid enthusiasm, joins the Altitude Explorers hiking club for weekend solo treks in the Santa Monica Mountains, and squeezes in
    home‑based bodyweight workouts while occasionally playing pickup soccer with a small group of friends.
  arts: Evelio Rodriguez frequents LACMA and the Broad, sketches urban landscapes inspired by the vivid colors of contemporary installations, loses themselves to the improvisations of Miles Davis and the
    storytelling of traditional Latin folk bands, and devotes Friday evenings to acoustic guitar renditions of Django Reinhardt pieces.
  travel: Evelio Rodriguez prefers meticulously planned trips that balance cultural immersion and nature, having trekked the Inca Trail to Machu Picchu, explored Kyoto’s zen gardens, and hiked Patagonia’s
    Torres del Paine, while dreaming of a solo road trip along the Patagonian coastline next summer.
  culinary: Evelio Rodriguez enjoys moderate‑level cooking experiments, often blending chipotle‑miso broth with ramen noodles, seasoning tacos al pastor with pineapple salsa and cilantro, and perfecting
    quinoa salads with lime‑infused avocado, while regularly sourcing fresh chilies and miso from the local farmers market.
  core: Evelio Rodriguez, a solitary yet curiosity‑driven technologist, merges art, code, and mindfulness into a life that balances disciplined productivity with spontaneous creative bursts and occasional
    bouts of procrastination when a new sci‑fi novel arrives.
background:
  cultural: Born to Guatemalan immigrant parents, Evelio grew up in a household where Spanish was spoken daily and family traditions such as Día de los Muertos celebrations and Mayan-inspired handicrafts
    were cherished. Though he left formal schooling early, his family emphasized perseverance, humility, and a love of learning, which motivated his self‑directed path into technology. Living in Van Nuys,
    he stays connected to his heritage through local Latino community events, bilingual volunteer work, and by infusing his software projects with cultural nuances that reflect both his Guatemalan roots
    and his American experience.
attributes:
  skills: '[''Python'', ''JavaScript'', ''Node.js'', ''React'', ''SQL'', ''Linux/Unix'', ''Git'', ''RESTful API design'', ''UI/UX fundamentals'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Sketching'', ''Visiting art galleries'', ''Reading science fiction'', ''Listening to jazz and Latin folk music'', ''Playing acoustic guitar'', ''Hiking in nature'', ''Meditation'', ''Experimental
    cooking'']'
  career_goals: Evelio aims to evolve into a technical lead or solutions architect role where he can mentor younger developers and shape product strategy. He is passionate about building culturally relevant
    tech tools, especially educational platforms that serve the Guatemalan and broader Latinx community. Over the next five years, he plans to contribute to open‑source projects, integrate emerging AI technologies
    into his work, and eventually launch his own consultancy focused on inclusive software design.
