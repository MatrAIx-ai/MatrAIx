    Management'']'
  hobbies: '[''Soccer (community league)'', ''Cooking Mexican cuisine'', ''Barbecue gatherings'', ''Weekly walking club'', ''Gardening'', ''Woodworking'', ''Poker nights'', ''Volunteer work at local church'',
    ''Participating in cultural festivals (Cinco de Mayo, Día de los Muertos)'', ''Fishing at Sacramento River'', ''Attending local high school sports events'', ''Listening to ranchera and mariachi music'']'
  career_goals: Roberto aims to secure a senior advisory role within the next two years, where he can formalize his extensive procedural knowledge into organization‑wide standards. He plans to earn an ITIL
    v4 Foundation certification and a PMP credential to bolster his credibility as a project lead. Ultimately, he wishes to transition into a consultancy focused on the agricultural sector of Yolo County,
    helping local farms and co‑ops modernize their legacy systems while maintaining the reliability he values. In the longer term, he hopes to mentor junior analysts, codify best‑practice templates, and
    establish a legacy of streamlined, low‑risk IT operations that will support his family’s financial security through retirement.
