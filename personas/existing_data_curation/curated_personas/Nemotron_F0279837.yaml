personas:
  professional: Thomas Burgess, a 23‑year‑old aspiring graphic designer, blends a curious eye for visual storytelling with methodical project coordination, delivering polished digital illustrations for
    cultural institutions while they spearhead community art workshops for teens.
  sports: Thomas Burgess hits the trails of nearby state parks for weekend hikes, joins a local running club that trains for spring 5K races, avidly supports the hometown soccer team the River City FC,
    and occasionally tries indoor rock climbing to balance cardio with strength.
  arts: Thomas Burgess roams contemporary galleries for inspiration, sketches works reminiscent of Banksy’s street satire and David Hockney’s vivid palette, curates a personal soundtrack of indie rock bands
    like The Strokes and classic rock legends such as Led Zeppelin, and devours speculative fiction by Neal Stephenson and philosophy podcasts like Philosophy Bites.
  travel: Thomas Burgess plans low‑cost weekend escapades, has captured street art in Berlin, photographed Renaissance masterpieces in Florence, and dreams of attending the MoMA PS1 summer exhibition in
    New York, always balancing a modest travel budget with freelance project deadlines.
  culinary: Thomas Burgess, an above‑average home cook, loves tossing wood‑fire pizza topped with fresh mozzarella, basil, and pepperoni, perfecting pour‑over coffee with a Chemex, and indulging in spicy
    ramen bowls from a beloved local Korean eatery on rainy evenings.
  core: Thomas Burgess is a methodical creative who meticulously budgets, obsessively organizes art projects, and occasionally lets houseplants wilt while they chase the perfect street‑photography shot.
background:
  cultural: Thomas grew up in Sylvania, a suburban community in western Ohio, immersed in Midwestern culture that values modesty, reliability, and community involvement. His family traces its roots to German
    and Irish immigrants who settled in the region in the early 20th century, and family traditions include attending local county fairs, high‑school sports events, and church‑based community service. The
    region’s emphasis on self‑reliance and a strong work ethic, combined with exposure to a growing local arts scene, has shaped his balanced outlook, his appreciation for both practical craftsmanship and
    creative expression, and his cooperative yet assertive demeanor.
