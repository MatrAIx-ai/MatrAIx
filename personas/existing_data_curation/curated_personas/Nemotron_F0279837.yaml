  career_goals: Thomas aims to enroll in a community college program in graphic design or visual communications within the next year. His short‑term goal is to secure a junior designer position at a creative
    agency or cultural institution where he can blend his love for art with community outreach. He plans to build a freelance portfolio of illustration and digital media work, eventually establishing a
    small studio that offers design services and art workshops for local youth. Additionally, he is interested in completing a carpentry apprenticeship to deepen his hands‑on craft abilities, creating a
    versatile career path that balances creative and practical skills.
