  hobbies: '[''Watercolor Painting'', ''Digital Illustration'', ''Poetry Writing'', ''Reading Speculative Fiction and Philosophy'', ''Gardening'', ''Hiking'', ''Birdwatching'', ''Photography'', ''VR Experimentation
    for Educational Prototyping'', ''Volunteer Art‑Therapy Sessions'']'
  career_goals: Although at a senior stage of his career, Nicholas aims to become a recognized thought leader in creative learning design. He plans to spearhead an innovation hub within his organization
    that explores the integration of art, storytelling, and emerging technologies such as VR/AR into employee development. He aspires to publish a series of whitepapers and a book on applying abstract concepts
    to workplace training, and eventually transition to a consultancy practice that partners with nonprofit community groups in the Ozarks to deliver lifelong learning programs for adults seeking personal
    enrichment. He also seeks to mentor younger training professionals, fostering a culture of curiosity and artistic expression in instructional practice.
