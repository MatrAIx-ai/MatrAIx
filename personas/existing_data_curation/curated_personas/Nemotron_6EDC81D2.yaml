  hobbies: '[''hiking in the Sonoran Desert'', ''photographing desert landscapes'', ''woodworking'', ''DIY home renovation projects'', ''playing acoustic guitar'', ''craft beer brewing'', ''reading technical
    manuals on construction and design'', ''volunteering with Habitat for Humanity'']'
  career_goals: Eli aims to launch his own painting and finishing contractor business within the next three years, focusing on high‑end residential projects that incorporate southwestern design elements.
    He plans to obtain certifications in lead‑safe work practices and eco‑friendly painting methods, expand his service offerings to include custom faux finishes, and eventually mentor apprentices through
    a community trade program. Long‑term, he envisions his firm becoming a go‑to partner for boutique remodels and sustainable interior renovations in the Phoenix area.
