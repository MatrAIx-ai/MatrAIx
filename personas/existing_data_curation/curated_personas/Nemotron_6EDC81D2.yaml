personas:
  professional: Eli Darnell is a detail‑driven painting and finishing contractor who leverages expert color theory, meticulous surface preparation, disciplined project scheduling, and eco‑friendly paint
    methods to deliver high‑end southwestern interiors, while their organized, assertive yet cooperative mindset keeps teams on track and clients impressed.
  sports: Eli Darnell, a 26‑year‑old desert‑trained enthusiast, regularly hikes with the Arizona Trailblazers Hiking Club, plays pickup basketball at a community gym while cheering for the Phoenix Suns,
    and follows the Arizona Diamondbacks and Phoenix Rising FC, balancing outdoor endurance with a love for weekend desert trail runs.
  arts: Eli Darnell cultivates creative expression by performing acoustic covers of Joni Mitchell and John Mayer at local open‑mic nights, photographing sunrise over the Sonoran Desert inspired by Albert
    Bierstadt’s landscapes, and admiring the mural work of Jeff Bunker, often integrating those visual motifs into custom faux finishes.
  travel: Eli Darnell’s travel style blends design research and adventure, having driven the Pacific Coast Highway to study coastal palettes, trekked through Sedona’s red rocks for photography, and planning
    a future road‑trip to New Mexico’s historic adobe towns to deepen exposure to Southwestern architecture.
  culinary: Eli Darnell is a competent home chef who perfects chipotle‑glazed chicken tacos with cactus‑pear salsa, brews a crisp IPA using local Arizona hops, and obsessively sharpens their barista skills
    for the perfect pour‑over, while they often pair meals with a craft‑beer flight they brewed themselves.
  core: Eli Darnell blends a fiercely organized work ethic with a desert‑inspired aesthetic, juggling paintbrushes, a guitar, and a home‑brew kettle, all while sprinting up the next mountain trail before
    sunrise.
background:
  cultural: Eli grew up in a suburban neighborhood of Phoenix, Arizona, within a primarily white, middle‑class family with a strong tradition of skilled trades. The Southwest’s desert aesthetic and the
    region’s blend of modern practicality with subtle Mexican influences shaped his appreciation for earthy color palettes and functional design. He values self‑reliance, community involvement, and the
    laid‑back yet industrious spirit of the Arizona desert culture.
attributes:
  skills: '[''surface preparation'', ''paper hanging'', ''drywall finishing'', ''interior painting'', ''decorative painting techniques'', ''color matching'', ''material estimation'', ''budget management'',
