    ''Traveling to professional conferences and cultural festivals'', ''Reading economic non-fiction and popular science'', ''Playing recreational softball in a co-ed league'']'
  career_goals: Mary aims to move into a senior leadership role within the next five years, ideally as chief economist for a regional think tank or senior policy advisor for New York State’s Department
    of Labor. She seeks to shape large-scale economic-development initiatives that blend innovative solutions with proven policy tools, and to influence labor-market and sustainable-growth strategies through
    published research and op-eds. Building on her competitive spirit, she plans to author articles in leading economic journals and become a recognized voice on regional fiscal health. Mary also intends
    to mentor emerging economists, especially women, by establishing a mentorship program and delivering workshops. To align with her preference for flexibility, she is exploring the launch of a boutique
    consulting firm that provides data-driven impact studies for municipalities and non-profits, allowing her to balance ambition with adaptable work arrangements.
