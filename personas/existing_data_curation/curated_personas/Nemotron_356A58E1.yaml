  hobbies: '[''Watercolor painting'', ''Quilting'', ''Cajun cooking'', ''Bird watching'', ''Swamp nature walks'', ''Historical fiction reading'', ''Small‑group book clubs'', ''Attending local music festivals'']'
  career_goals: Juanita hopes to move from cashier to assistant manager within the next two years, using her people‑skills and growing knowledge of store operations to support a more organized work environment
    for her team. Parallel to her retail ambitions, she dreams of launching a modest side business selling hand‑crafted home décor—particularly quilts and painted wooden signs—through a stall at the Saint
    Martinville Farmers Market and eventually an online shop. She plans to enroll in a part‑time community‑college course on small‑business management to build the skills needed for that venture. Long‑term,
    Juanita would like to create a small community space that combines a café with local art exhibits, fostering the same sense of harmony and creativity she values in her daily life.
