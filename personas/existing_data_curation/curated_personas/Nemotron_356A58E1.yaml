personas:
  professional: Juanita Shakespeare, a seasoned retail cashier with twenty years of cash‑handling, POS mastery and a knack for creating harmonious store atmospheres, channels her curiosity and artistic
    eye into arranging merchandise like mini‑exhibits while pursuing an assistant manager role and dreaming of a side venture selling hand‑crafted quilts and painted signs.
  sports: Juanita Shakespeare enjoys low‑impact fitness like early‑morning swamp walks and bird‑watching hikes with the St. Martinville Swamp Watchers Hiking Club, roots for the New Orleans Saints, the
    New Orleans Pelicans, and the LSU Tigers, and occasionally joins a community yoga class, preferring gentle movement over competitive sports.
  arts: Juanita Shakespeare draws inspiration from the watercolor landscapes of John James Audubon, the soulful Cajun accordion sounds of BeauSoleil, the novels of Barbara Kingsolver, and the Broadway performances
    of Audra McDonald, weaving these influences into her own paintings, quilts, and community art projects.
  travel: Juanita Shakespeare prefers spontaneous weekend road trips to nearby natural gems like the Atchafalaya Basin and Natchitoches, while dreaming of cultural pilgrimages to Quebec City’s historic
    neighborhoods and Savannah’s moss‑draped streets, yet limited savings and family responsibilities often keep her travel plans modest and carefully budgeted.
  culinary: Juanita Shakespeare cooks Cajun classics such as gumbo with filé powder, boudin spiced with smoked paprika, and shrimp étouffée brightened with fresh cayenne and dried thyme, confidently tweaking
    spice blends while occasionally over‑seasoning in her quest for bold flavor, and she delights in sampling oysters at local shacks and savoring beignets with chicory coffee.
  core: Juanita Shakespeare is a quietly curious, art‑obsessed cashier who balances a love for solitary creativity with a habit of misplaced receipts and occasional impulse splurges on craft supplies.
background:
  cultural: Juanita was born and raised in Saint Martinville, a small town in Iberia Parish that sits at the heart of Louisiana’s Acadian (Cajun) cultural zone. Though she identifies as white, her family
    lineage traces back to French‑Canadian settlers who arrived in the 18th century, and the community’s Catholic traditions, French language remnants, and vibrant music scene have shaped her worldview.
    Growing up, she absorbed the region’s love of food, storytelling, and communal celebrations such as Mardi Gras and the Courir de Mardi Gras, while also learning the value of hospitality and neighborly
    support that define rural Louisiana life. These cultural currents influence her appreciation for art, her collaborative spirit, and her preference for intimate, harmonious gatherings over large, impersonal
    events.
attributes:
