  hobbies: '[''Desert landscape painting'', ''Visiting Tucson art galleries and museums'', ''Hiking in the Sonoran Desert'', ''Birdwatching'', ''Reading about renewable energy and emerging electrical technologies'',
    ''Cultivating a succulent garden'', ''Cooking Southwest‑inspired dishes'', ''Leading basic home‑wiring safety workshops for seniors'']'
  career_goals: As she approaches retirement age, Nancy aims to transition from full‑time field work to a consultancy that focuses on solar retrofit projects for historic homes in Tucson. She plans to obtain
    her Master Electrician license, develop a mentorship program for women in the electrical trades, and volunteer as a safety trainer for local Habitat for Humanity builds. Additionally, she hopes to author
    a practical guidebook on sustainable wiring practices and stay current with emerging technologies such as energy‑storage systems and smart‑home integration.
