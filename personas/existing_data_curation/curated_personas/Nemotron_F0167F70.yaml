personas:
  professional: Nancy Mallin, a seasoned licensed electrician with over three decades of hands‑on experience, blends their methodical planning and innate curiosity for renewable technology to design solar
    retrofits for historic Tucson homes while mentoring women apprentices and preparing for a Master Electrician certification.
  sports: Nancy Mallin, a member of the Tucson Hiking Club, they spend weekends trekking Sonoran Desert trails and birdwatching, follow the Arizona Diamondbacks baseball season with enthusiasm, participate
    in senior‑friendly yoga classes at the local community center, and occasionally join a pickleball group at the senior center to keep their heart rate up.
  arts: Nancy Mallin, an avid painter of southwestern desert landscapes, they draw inspiration from the works of James Turrell and Frida Kahlo, attend pottery workshops featuring local Pueblo‑style ceramics,
    listen to classical piano recordings by Vladimir Horowitz while sketching, and regularly visit the Tucson Museum of Art to view exhibitions by contemporary indigenous artists.
  travel: Nancy Mallin, who prefers meticulously planned road trips, they enjoy exploring nearby wonders like Saguaro National Park and Sedona’s red rocks, dream of attending the Día de los Muertos celebrations
    in Oaxaca, and envision a relaxed Mediterranean cruise that balances cultural immersion with comfortable accommodations.
  culinary: Nancy Mallin, a culinary enthusiast, they experiment with southwestern dishes such as green chile enchiladas topped with roasted corn salsa, cactus paddle (nopales) salads, and mezcal‑infused
    marinades, while also perfecting a classic Midwestern pot roast for family gatherings, and they tend a thriving succulent garden that supplies fresh herbs for their kitchen.
  core: Nancy Mallin, a methodical desert‑dwelling electrician turned solar consultant, they balance a lifelong curiosity for art with a stubborn habit of double‑checking every circuit breaker before bedtime,
    and often find themselves lost in a new painting while a birdwatching notebook lies unfinished.
background:
  cultural: Nancy is a white Anglo‑American who grew up in the Midwest before moving to Tucson after completing an Associate’s degree in Electrical Technology. Living in the Sonoran desert for nearly five
    decades has woven Mexican‑American culinary flavors, indigenous art motifs, and a strong appreciation for the region’s natural beauty into her cultural identity. She participates in local traditions
    such as the Tucson Gem & Mineral Show, celebrates Hispanic holidays with her family, and respects the Pueblo and Tohono O’odham heritage of the area. Her blend of Midwestern work ethic and Southwestern
    openness to diverse ideas informs both her professional demeanor and personal pursuits.
