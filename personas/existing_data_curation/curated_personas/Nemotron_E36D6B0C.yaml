personas:
  professional: James Greenlee is a budding junior engineer who leverages their love for LEGO constructions and simple robotics kits to design school projects, approaching each task with meticulous planning
    and a balance of inventive curiosity and proven methodologies.
  sports: James Greenlee plays forward for the Riverdale Rangers youth soccer team after school, yet often finds comfort in observing matches of Liverpool FC on television, balancing participation with
    a strategic eye for game tactics.
  arts: James Greenlee channels a love for adventure literature such as the Percy Jackson series and the animated worlds of Hayao Miyazaki by filling sketchbooks with detailed illustrations of imagined
    quests, while also constructing elaborate LEGO sets inspired by the designs of LEGO master builder Nathan Sawaya.
  travel: James Greenlee enjoys weekend family trips to places like Yellowstone National Park and Cannon Beach, often planning routes on a hand‑drawn map and balancing the excitement of new scenery with
    the safety of familiar routines.
  culinary: James Greenlee prefers classic pepperoni pizza with extra mozzarella, homemade mac and cheese flavored with sharp cheddar and a pinch of paprika, and occasionally helps their parent prepare
    chicken tacos using fresh cilantro and lime wedges.
  core: James Greenlee is an organized nine‑year‑old explorer who meticulously plans LEGO builds and school projects, yet their vivid imagination is often shadowed by sudden waves of anxiety that they manage
    through sketching, to‑do lists, and occasional procrastination on chores.
background:
  cultural: James grows up in Palos Hills, a suburban community in Cook County, Illinois, shaped by typical Midwestern values of friendliness, community involvement, and an emphasis on education. His family
    participates in local events such as Fourth of July fireworks, neighborhood block parties, and seasonal festivals at the Palos Community Center. He attends a public elementary school where multicultural
    awareness is promoted through classroom projects and field trips to Chicago museums. While his heritage is white, his upbringing reflects a blend of American suburban traditions and exposure to diverse
    cultures through school and community outreach programs.
