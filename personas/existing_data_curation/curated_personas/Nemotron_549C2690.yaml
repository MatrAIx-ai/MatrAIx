personas:
  professional: Cecil Jones, a 20-year-old aspiring social work student, leverages their natural talent for connecting with people and basic digital media skills to coordinate community art-therapy workshops
    and pop-up studio events, while embracing a laid-back, flexible approach that sometimes leaves their project timelines a bit chaotic, as they prefer spontaneous creativity over strict schedules.
  sports: Cecil Jones, a 20-year-old beach-volleyball enthusiast, regularly joins a casual sand-court league at Suncoast Beach, casually follows the Tampa Bay Buccaneers and the Tampa Bay Rays, and squeezes
    in early-morning runs along the shoreline to stay fit, though they sometimes let spontaneous jam sessions replace a scheduled workout.
  arts: Cecil Jones immerses themselves in the arts by sketching Tampa’s street murals, snapping candid photos of cityscapes, playing acoustic renditions of songs by Bon Iver and Joni Mitchell on the beach,
    attending improv nights featuring local troupe The Skylark Players, and collecting vintage vinyl from artists like The Velvet Underground, all of which fuel their creative problem-solving, and they
    often find inspiration in the eclectic mix of indie documentaries they binge-watch.
  travel: Travel-wise, Cecil Jones prefers spontaneous, low-budget road trips—often hitchhiking down the Gulf Coast to catch a sunrise at Siesta Key, backpacking through Asheville’s art districts, and dreaming
    of a future immersive art tour in Portland, Oregon—while balancing the limited funds of a college student, and they sometimes forget to pack a charger.
  culinary: Cecil Jones, a self-declared foodie, alternates between cooking simple avocado-toast breakfasts and whipping up spicy shrimp tacos with fresh Key Lime mango salsa, while also savoring dusty
    vinyl-era coffee at local cafés and occasionally indulging in homemade mac & cheese with a dash of hot sauce for comfort, and they love discovering new spice blends at farmer’s markets.
  core: Cecil Jones, a 20-year-old social-work hopeful with a magnet for people, an impressive vinyl collection, and a habit of forgetting to charge their phone before a beach impromptu gig, lives at the
    intersection of art, community service, and laid-back spontaneity, and they thrive on turning spontaneous ideas into community projects.
background:
  cultural: Cecil grew up in a middle‑class white family in New Port Richey, Florida. His upbringing reflects a mix of traditional American values and the laid‑back coastal lifestyle of the Gulf Coast.
    He was raised in a Protestant household that emphasized community service, hospitality, and personal freedom. The multicultural environment of Pasco County—shaped by tourism, Southern influences, and
    Latin‑Caribbean neighbors—exposed him to a diverse array of music, cuisine, and artistic expression, fostering his appreciation for varied cultural experiences while maintaining his family’s core values.
