  hobbies: '[''Attending gallery openings and street art tours'', ''Live music events'', ''Sketching cityscapes'', ''Photography'', ''Acoustic guitar playing'', ''Community theater improv'', ''Beach volleyball'',
    ''Volunteering at food bank'', ''After‑school art workshops'', ''Watching indie documentaries'', ''Reading sci‑fi novels'', ''Listening to creativity podcasts'', ''Collecting vintage vinyl records'']'
  career_goals: Cecil aims to turn his love for art and his drive to help others into a career that blends creativity with community service. He plans to enroll in a community college program in Social
    Work with a focus on arts‑based therapy, eventually pursuing a bachelor's degree in Nonprofit Management. His long‑term ambition is to become a program director for a local community arts center, designing
    workshops that use visual and performing arts to empower at‑risk youth and seniors. He also hopes to launch a mobile pop‑up art studio that travels across Pasco County, offering free creative sessions
    and mental‑health resources, allowing him the flexibility and varied experiences he values.
