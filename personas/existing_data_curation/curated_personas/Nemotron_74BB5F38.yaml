  hobbies: '[''Basketball'', ''TikTok content creation'', ''Skateboarding'', ''Video gaming (NBA 2K)'', ''Hip-hop music'', ''Graphic novels'', ''Community volunteering'', ''Cooking with family'', ''Street
    art'']'
  career_goals: Branden dreams of using his voice and media savvy to uplift his neighborhood. He aims to finish high school, earn a scholarship, and study communication or urban studies so he can become
    a community organizer and content creator who highlights youth stories in Brooklyn. He hopes to launch a mentorship program that combines sports, digital storytelling, and academic support for younger
    kids, and envisions a future where he can influence policy that benefits under‑served communities.
