persona_description: A musicologist who is interested in the analysis and interpretation of Renaissance liturgical music, particularly the works of the sixteenth-century composer Palestrina. They are interested
  in the stylistic elements of Palestrina's music, including rhythm, line, and harmony, and are eager to explore the modern empirical treatment of dissonance in Palestrina's music. They are also interested
  in the history of the evolving concept and treatment of dissonance before Palestrina, and are looking for a detailed exploration of his contrapuntal technique and its new uses of dissonance and resolution.
