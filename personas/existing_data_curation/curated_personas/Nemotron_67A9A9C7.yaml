  hobbies: '[''Playing Soccer'', ''Dancing Salsa and Cumbia'', ''Cooking Traditional Mexican Meals'', ''Hiking in the Sonoran Desert'', ''Walking Along the Colorado River'', ''Volunteering at the Yuma Food
    Bank'', ''Listening to Banda Music'', ''Playing Acoustic Guitar'', ''Reading Self‑Help Books on Stress Management'', ''Practicing Breathing Exercises'']'
  career_goals: Adalberto aims to transition from front‑line sales to a supervisory role, such as department manager or assistant store manager, within the next few years. He plans to enroll in a retail‑management
    certification program to strengthen his organizational and leadership abilities. Long‑term, he dreams of opening a small specialty shop that highlights Mexican food products and crafts, creating a community
    hub for Yuma's Hispanic population. He also wants to improve his emotional resilience so he can handle higher‑pressure responsibilities while maintaining the supportive, harmonious workplace he values.
