  career_goals: Although not yet in the workforce, Irene’s budding curiosity and love for art suggest she may aspire to become an artist, teacher, or museum guide as she grows. She often watches parents
    read picture books and enjoys interactive art exhibits, hinting at a future desire to create and share aesthetic experiences. Her balanced temperament leads her to envision a career that allows both
    structured learning and creative freedom, such as a visual arts educator or community program coordinator for children's art workshops.
