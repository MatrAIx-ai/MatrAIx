  career_goals: Although still very young, Cindy shows an emerging fascination with professions that involve structure and caring for others. She often pretends to be a teacher when playing with dolls,
    expresses interest in caring for animals during visits to the local petting zoo, and enjoys building block towers, hinting at a future interest in engineering or design. Her parents nurture these curiosities,
    encouraging preschool programs that develop social skills and logical thinking.
