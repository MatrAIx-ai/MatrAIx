personas:
  professional: Cindy, a two‑year‑old with a fascination for arranging her picture books by color and size, shows early signs of a future career as a pediatric librarian, leveraging her natural organization,
    practicality, and methodical approach to help children discover stories.
  sports: Cindy, a two‑year‑old who loves toddler soccer sessions at the local community field and avidly watches the Washington Capitals, participates in a kids’ hockey clinic each winter and cheerfully
    chants for the Washington Wizards during family game nights.
  arts: Cindy, a two‑year‑old who sings along to The Wiggles, watches Sesame Street, and delights in finger‑painting with washable paints, often mimicking Dr. Seuss’s whimsical characters while proudly
    displaying her latest colorful masterpiece on the fridge.
  travel: Cindy, a two‑year‑old who enjoys family trips to Washington DC’s National Zoo and the beaches of Virginia’s Outer Banks, prefers organized itineraries that include a midday nap and dreams of revisiting
    Disney World’s Magic Kingdom for its fireworks.
  culinary: Cindy, a two‑year‑old who favors bite‑size chicken nuggets, creamy mac and cheese, and banana slices, delights in dipping carrot sticks in ranch dressing, and eagerly helps stir pancake batter
    while stubbornly refusing broccoli.
  core: Cindy, a two‑year‑old with a love for order and routine, spends her days arranging toys, saving marbles, and mastering structured play, balancing bursts of energetic curiosity with calm nap times.
background:
  cultural: Cindy is raised in a white, middle‑class family in Upper Marlboro, Maryland. Her upbringing includes typical American customs such as celebrating holidays like Fourth of July, Thanksgiving,
    and Christmas, and attending a local community church that offers family‑friendly events. The multicultural environment of Prince George’s County exposes her to diverse neighbors, fostering an early
    appreciation for community togetherness while maintaining her family's cultural traditions.
