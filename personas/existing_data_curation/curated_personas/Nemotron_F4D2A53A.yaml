  career_goals: Dane plans to earn his GED within the next year and enroll in a community‑college program focused on graphic design and interactive media. His long‑term ambition is to become a freelance
    concept artist for video games or a visual designer for indie studios, leveraging his strong digital art skills and his competitive mindset to secure commissions through online platforms such as ArtStation
    and Fiverr. He also hopes to launch a small online shop selling custom‑designed apparel and skateboard graphics, blending his artistic talent with his entrepreneurial drive.
