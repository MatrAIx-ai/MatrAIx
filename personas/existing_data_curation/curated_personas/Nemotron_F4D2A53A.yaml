personas:
  professional: Dane Lombardi, a 17‑year‑old aspiring visual designer, blends self‑taught mastery of Photoshop, Illustrator, and Blender with a competitive edge honed in online gaming, channeling meticulous
    project deadlines and a skeptical, results‑driven mindset into freelance concept art and indie game design ambitions.
  sports: Dane Lombardi enjoys skateboarding at the local park, hiking the Finger Lakes hills for sunrise photography, follows the Buffalo Bills and Syracuse Orange for football, roots for the Rochester
    Americans in hockey, and competes in Rocket League and Valorant esports tournaments, balancing physical activity with competitive gaming.
  arts: Dane Lombardi spends weekends sketching Finger Lakes vistas, editing sunrise photos in Lightroom, crafting acoustic guitar songs inspired by Joni Mitchell and Bob Dylan, reading graphic novels like
    Saga and Watchmen, while admiring artists such as Stanley Artgerm Lau and Hayao Miyazaki, which fuels their creative vision for future game concept art.
  travel: Dane Lombardi’s travel style blends local adventure—hiking Ithaca’s waterfalls, photographing Niagara Falls at dawn, and road‑tripping through Vermont’s fall foliage—with a dream to explore Tokyo’s
    Akihabara for anime culture and Paris’s Louvre for classical art, planning trips meticulously on Google Trips while balancing a limited teen budget.
  culinary: Dane Lombardi prefers quick, flavorful meals like avocado toast, spicy ramen bowls, and homemade pizza topped with fresh tomatoes and basil, enjoys experimenting with smoked salmon bagels for
    brunch, and often refuels gaming sessions with energy drinks and protein bars, while occasionally indulging in local farm‑to‑table cheeseburgers during weekend hikes.
  core: Dane Lombardi is a competitively driven teen artist who melds digital illustration, skate culture, and indie game aspirations, balancing meticulous budgeting with occasional splurges, managing minor
    injuries proactively, and pursuing both local adventures and global artistic inspirations.
background:
  cultural: Dane’s family has been part of the Auburn, NY community for several generations, with roots tracing back to Italian immigrants who settled in upstate New York during the early 20th century.
    The Lombardi name reflects that heritage, and family gatherings often feature traditional Italian dishes alongside classic American fare. Growing up in a small‑town, rural environment, he has been shaped
    by the rhythms of the Finger Lakes region—seasonal farming cycles, local fairs, and a close‑knit community ethos. While he is not currently attending school, he remains connected to local cultural institutions
    such as the Auburn Public Library and the Finger Lakes Community College outreach programs, which provide him with resources to pursue his artistic interests. The blend of Italian‑American family traditions,
    the modest, self‑reliant values of upstate New York, and the natural beauty of the surrounding lakes and hills informs his worldview and creative voice.
