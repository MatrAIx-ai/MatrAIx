  hobbies: '["Woodworking", "Chess", "Hiking", "Reading (non-fiction)", "Home Brewing", "Photography", "Volunteering at Food Bank", "Mentoring Students"]'
  career_goals: Trentin aims to become a senior audit manager leading a regional team, obtain his CPA and Certified Internal Auditor (CIA) credentials, and eventually transition into a strategic finance
    leadership role such as CFO. He is passionate about championing the integration of advanced data analytics into audit practices at his firm and envisions launching his own advisory consultancy focused
    on improving financial health for small businesses in upstate New York.
