    and training of new aides'']'
  hobbies: '[''Hiking'', ''Kayaking'', ''Pick-up basketball'', ''Volunteering at senior centers'', ''Gardening'', ''Home brewing'', ''Listening to live music'', ''Reading health technology articles'']'
  career_goals: Jacob aims to deepen his clinical expertise by completing certifications in dementia care and palliative support. In the next few years he hopes to move into a lead aide or supervisory role
    within his agency, where he can oversee a team and develop a community‑focused training program for new personal care aides. Long‑term, he envisions transitioning into case management or care coordination
    for seniors in Thurston County, leveraging his hands‑on experience to design personalized care plans. He is also exploring the possibility of starting a small home‑care business that emphasizes flexible,
    client‑centered scheduling and ongoing professional development for staff.
