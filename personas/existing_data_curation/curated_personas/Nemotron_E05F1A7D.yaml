personas:
  professional: Jacob Jackson is a seasoned personal care aide with 25 years of hands‑on experience, adept at safe patient handling, medication reminders, and meticulous electronic health‑record documentation,
    who blends their curiosity for new caregiving techniques with a practical, flexible approach, often mentoring new aides while staying calm under the unpredictable demands of home‑care.
  sports: Jacob Jackson fuels their love for the outdoors by regularly hiking the Nisqually wetlands and kayaking on Puget Sound, joins the Olympia Community Center’s pick‑up basketball games each week,
    cheers on the Seattle Seahawks and Sounders, and belongs to the local Olympia Outdoors Club, where they value spontaneous group exercise over regimented gym routines.
  arts: Jacob Jackson channels their creative side by home‑brewing seasonal IPAs inspired by local hops while regularly catching live performances by Fleet Foxes at The Evergreen and supporting the Olympia
    Folk Collective’s acoustic nights, and they occasionally volunteer at the Capitol Theater’s community theater productions.
  travel: Jacob Jackson prefers spontaneous weekend road trips, often exploring the San Juan Islands, the Oregon Coast, or a quick ferry ride to Vancouver, while dreaming of a future adventure to Iceland’s
    volcanic landscapes, balancing their love for nature with a modest travel budget and occasional family obligations.
  culinary: Jacob Jackson enjoys cooking with garden‑fresh kale, roasted carrots, and locally sourced Pacific salmon—often preparing dill‑marinated grilled salmon or fish tacos—while pairing meals with
    home‑brewed IPA made from Washington hops and honey, reflecting an intermediate culinary skill set that blends farm‑to‑table cooking with craft‑beer experimentation.
  core: Jacob Jackson is a community‑driven, curiosity‑fuelled caregiver who balances a love for spontaneous hikes and craft‑beer brewing with a habit of misplacing schedules, all while staying calm under
    pressure.
background:
  cultural: Jacob is a white American who grew up in a middle‑class family in the Pacific Northwest. His upbringing emphasized self‑reliance, community service, and a deep respect for the natural environment—values
    that align with the progressive, environmentally conscious culture of Olympia. He participates in local traditions such as community potlucks, regional festivals, and occasional church gatherings, and
    he embraces the diverse, inclusive atmosphere of Thurston County. This cultural blend informs his compassionate approach to caregiving and his commitment to serving clients from a wide range of backgrounds.
attributes:
  skills: '[''Personal hygiene assistance'', ''Mobility support and safe transfers'', ''Medication reminders and vital sign monitoring'', ''Basic wound care and infection control'', ''CPR/AED and first
