  career_goals: John aims to advance into a pharmacy leadership role, such as pharmacy manager or director of clinical services, where he can implement evidence-based protocols and mentor junior staff.
    He is pursuing a residency in pharmacogenomics to specialize in personalized medication management for mental-health patients, a field that aligns with his competitive drive to be a top specialist.
    In the long term, he hopes to open an independent compounding pharmacy focused on tailored therapies, contribute to peer-reviewed research, and become a recognized speaker at regional pharmacy conferences.
