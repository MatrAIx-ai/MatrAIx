personas:
  professional: Corina Ramos, a community health clinic manager with eight years of hands‑on experience, blends meticulous scheduling and budget oversight with a calm, assertive leadership style that leverages
    her emotional awareness to foster staff wellbeing while maintaining strict compliance with health regulations.
  sports: Corina Ramos enjoys sunrise beach walks as her primary cardio routine, participates in a small weekend yoga group, follows the local baseball team Cangrejeros de Santurce, and occasionally joins
    a recreational beach volleyball league in Vega Baja during the summer months.
  arts: Corina Ramos curates a personal library of contemporary island fiction, favoring authors like Mayra Santos‑Febres and Luis Rafael Sánchez while also revisiting classics such as Virginia Woolf; her
    artistic side shines through sunset photography inspired by Ansel Adams and a playlist that alternates between upbeat pop by Ricky Martin and soothing cello pieces by Yo‑Yo Ma.
  travel: Corina Ramos favors low‑key, meticulously planned trips that blend relaxation and cultural immersion, often spending weekend getaways at the serene beaches of Vieques, while dreaming of a future
    solo journey to Barcelona’s Gothic Quarter and a cultural tour of Old San Juan, budgeting each adventure through a dedicated travel spreadsheet.
  culinary: Corina Ramos, an intermediate home chef, delights in crafting traditional arroz con gandules and mofongo but frequently swaps white rice for quinoa and adds avocado and roasted garlic to lighten
    the dishes, while her go‑to pantry staples include plantains, cilantro, lime, and a splash of olive oil.
  core: Corina Ramos balances a meticulously organized professional life with a reflective, solitary nature, yet often wrestles with anxiety‑driven over‑planning and a habit of binge‑reading self‑help books
    late into the night, sacrificing sleep for insight.
background:
  cultural: Corina is a native of Vega Baja, raised in a close‑knit, bilingual household where Spanish and English intertwined in daily life. She grew up celebrating local traditions such as Noche de San
    Juan, parrandas, and the annual Fiesta de la Virgen del Carmen, which reinforced a strong sense of community and family loyalty. Catholic holidays and the island’s musical heritage—especially plena
    and salsa—have shaped her identity. Her upbringing instilled respect for Puerto Rican hospitality, a love for island cuisine, and a commitment to giving back to the neighborhoods that nurtured her.
attributes:
  skills: '[''Healthcare Administration'', ''Staff Scheduling'', ''Budget Management'', ''Regulatory Compliance'', ''Quality Improvement'', ''Patient Flow Optimization'', ''Data Analysis'', ''EMR Navigation'',
    ''Bilingual Communication (Spanish/English)'', ''Conflict Mediation'', ''Team Leadership'', ''Crisis Response'', ''Community Outreach'']'
  hobbies: '[''Reading'', ''Journal Writing'', ''Cooking Traditional Puerto Rican Cuisine'', ''Beach Walks'', ''Yoga'', ''Mindfulness Meditation'', ''Photography'', ''Community Volunteering'']'
  career_goals: Corina aims to earn a bachelor's degree in Health Administration within the next two years and obtain the Certified Medical Manager (CMM) credential. Her long‑term ambition is to become
    Director of Operations for a regional health network that serves the northern coast of Puerto Rico. She plans to spearhead a community mental‑health program that integrates telehealth services for rural
    patients, and to launch staff‑wellness initiatives that reduce burnout and anxiety. Ultimately, she envisions opening a small wellness center in Vega Baja that combines primary care, mental‑health counseling,
    and preventive health workshops.
