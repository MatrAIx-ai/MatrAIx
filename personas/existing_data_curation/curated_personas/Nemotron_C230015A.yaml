  career_goals: Zachary dreams of turning his passion for visual storytelling and technology into a career. He hopes to attend a high school with a strong arts program and later study graphic design, illustration,
    or video-game development at a college. His ultimate ambition is to create immersive digital experiences that combine his drawing skills, coding knowledge, and interest in mental-health themes, perhaps
    as a freelance illustrator or a UI/UX designer for educational games. In the short term, he aims to build a strong portfolio of artwork, learn more advanced programming, and secure a summer internship
    or mentorship with a local artist or game studio to gain real-world experience.
