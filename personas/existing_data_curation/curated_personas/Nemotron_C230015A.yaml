personas:
  professional: Zachary Massanet is a budding interdisciplinary creator who blends sketching, digital illustration, and robotics, spending afternoons in the school art club tinkering with Arduino kits while
    dreaming of a future as a concept artist for indie video games, and they channel their curiosity into experimental design despite often leaving projects half‑finished due to a relaxed attitude toward
    deadlines.
  sports: Zachary Massanet is a casual outdoor enthusiast who hikes the Adirondack foothills on weekends, volunteers as a photographer for the school’s cross‑country team, and they cheer for the New York
    Rangers while occasionally playing pickup soccer with friends, preferring fun over structured training.
  arts: Zachary Massanet is a self‑taught visual storyteller who fills sketchbooks with manga‑inspired panels, experiments with Procreate on a tablet, draws inspiration from artists like Hayao Miyazaki
    and Alex Ross, and they regularly attend local gallery openings and school art club meetings, though they often lose track of deadlines for submissions.
  travel: Zachary Massanet is a wanderlust‑tuned teen who has taken day trips to the historic streets of Albany and a weekend camping adventure in the Catskills, dreams of visiting the neon streets of Tokyo
    and the glaciers of Iceland, and they plan trips with a loose itinerary, preferring spontaneous detours over rigid schedules.
  culinary: Zachary Massanet is a budding home chef who enjoys whipping up simple ramen bowls, perfecting avocado toast, and experimenting with homemade fruit smoothies, often listening to lo‑fi beats while
    they practice guitar, yet they frequently forget to clean up the kitchen, leaving dishes piled up.
  core: Zachary Massanet is a curious, slightly disorganized 14‑year‑old who melds art, tech, and wanderlust, often worrying about deadlines while thriving on creative spontaneity.
background:
  cultural: 'Zachary grew up in Glenmont, a small community in Albany County, New York, within a middle-class White American family. His upbringing reflects the blend of suburban and upstate‑NY cultural
    influences: he celebrates typical American holidays such as Thanksgiving and the Fourth of July, participates in local town events, and occasionally visits regional cultural institutions like the Albany
    Institute of History & Art and the New York State Museum. The area''s seasonal outdoor traditions—leaf-peeping in fall, snow-shoveling and sledding in winter—have shaped his appreciation for nature.
    His school district emphasizes a mix of academic and arts programs, giving him exposure to both core subjects and creative pursuits. While his family''s cultural identity is rooted in mainstream American
    customs, they encourage curiosity, self-expression, and community involvement, which align closely with Zachary''s personality.'
