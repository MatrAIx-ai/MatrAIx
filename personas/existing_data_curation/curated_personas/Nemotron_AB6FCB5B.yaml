  hobbies: '[''Visiting art galleries'', ''Reading art history'', ''Sketching and watercolor painting'', ''Nature walks'', ''Birdwatching'', ''Collecting vintage postcards'', ''Journaling'', ''Meditation'',
    ''Python scripting'']'
  career_goals: Tom aims to advance from his current receptionist role to an office manager or information services supervisor within the next five years, leveraging his organizational strengths and curiosity
    to implement more efficient workflow systems. He also aspires to transition into a position that blends his love for art and information management, such as a collections assistant or archivist at a
    regional museum or historical society. To support this shift, he is pursuing an associate’s degree in Library and Information Science and plans to obtain a professional certification in archival studies.
    Alongside career advancement, Tom seeks to develop coping strategies for his anxiety and emotional reactivity, aiming for a balanced work‑life integration that preserves his solitary preferences while
    allowing room for personal growth.
