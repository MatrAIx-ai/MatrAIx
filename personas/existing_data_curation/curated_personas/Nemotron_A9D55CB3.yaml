personas:
  professional: Kivana Johnson, a seasoned glazier with three decades of residential and commercial glass work experience, blends meticulous craftsmanship with a practical curiosity for energy‑efficient
    glazing; they lead project teams, budget assignments, mentor apprentices, and are actively pursuing a foreperson role and the launch of a small subcontracting firm that specializes in retrofits.
  sports: Kivana Johnson, a Dallas‑area resident who roots for the Dallas Cowboys and the Houston Astros, they stay active through low‑impact community‑center fitness classes, weekly garden‑maintenance
    workouts, and lively swing‑dancing at neighborhood gatherings, while also enjoying occasional bridge nights that double as social exercise.
  arts: Kivana Johnson, a vibrant choir member who sings gospel classics by Shirley Caesar and line‑dances to the soulful grooves of Earth, Wind & Fire, they attend local theater productions of August Wilson
    plays, collect vintage soul‑music vinyls, and incorporate music and performance into every community event they help organize.
  travel: Kivana Johnson, who prefers organized road trips with detailed itineraries to historic Texas sites such as the Alamo and Waco’s Magnolia Market, they occasionally dream of weekend getaways to
    New Orleans’ French Quarter, and balance travel costs by using airline miles for occasional flights to Atlanta to visit family, always packing heirloom seeds from their garden as thoughtful souvenirs.
  culinary: Kivana Johnson, an accomplished home chef who masters soul‑food staples like smoked pork ribs, fried catfish, collard greens seasoned with smoked turkey, and classic Texas brisket on a backyard
    smoker, they delight friends with a famed sweet‑potato casserole, experiment with fresh herbs from their raised‑bed garden, and sometimes over‑spice their chili in pursuit of bold flavor.
  core: Kivana Johnson blends seasoned craftsmanship with community spirit, never misses a choir rehearsal, trades glass for garden soil on weekends, they hoard extra grilling rubs in the garage, and they
    embody a pragmatic curiosity that fuels both career ambitions and a love for soulful gatherings.
background:
  cultural: Kivana’s cultural identity is rooted in the African‑American community of Central Texas, where church, family, and storytelling shape daily life. She blends Southern hospitality with the rich
    traditions of gospel music, soul food, and community service, regularly attending African‑American heritage festivals and supporting local NAACP initiatives. Her upbringing emphasized resilience, cooperation,
    and the importance of giving back, values she carries forward in both her professional and personal circles.
