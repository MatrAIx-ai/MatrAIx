  hobbies: '[''Community choir'', ''Gardening'', ''Cooking Southern comfort food'', ''Bridge (card game)'', ''Line dancing'', ''Historical fiction reading'', ''Volunteer tutoring at local youth center'',
    ''Road trips to historic sites'', ''DIY home improvement projects'', ''Woodworking'']'
  career_goals: Kivana aims to transition from hands‑on glazing to a foreperson role, eventually leading her own small subcontracting firm that specializes in energy‑saving retrofits for Texas homes. She
    is motivated to become a certified glazing inspector and to create mentorship opportunities for women and minority youth entering the trades, while maintaining a balanced life that allows her to stay
    engaged with her family and community.
