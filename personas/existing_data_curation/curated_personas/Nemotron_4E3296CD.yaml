  career_goals: Luis aspires to pursue a career in engineering, particularly civil or environmental engineering, aiming to design sustainable infrastructure for his community in Denver. He hopes to attend
    a high school with strong STEM programs, join robotics or engineering clubs, and eventually earn a scholarship to a university engineering program. He envisions using his technical skills to create
    green spaces and community projects that blend his Mexican heritage with modern design. Additionally, he dreams of mentoring younger students in his neighborhood, sharing his love for coding and building,
    and promoting bilingual education.
