personas:
  professional: Tammy Jones, a 76‑year‑old retired homemaker now serving as a senior‑advocacy leader, channeling her methodical event‑planning, budgeting, and storytelling gifts into spearheading a local
    seniors’ advisory board while their constant worry drives them to double‑check every meeting agenda and community initiative.
  sports: Tammy Jones enjoys gentle walks through the Deltona nature trail during spring, participates in senior‑center line‑dance classes, and faithfully cheers for the Orlando Magic and the Tampa Bay
    Buccaneers, while also holding a regular bridge night that satisfies their love for mental sport.
  arts: Tammy Jones sings in her church choir, drawing inspiration from gospel legends like Mahalia Jackson and contemporary soul icons such as Aretha Franklin, while she also cherishes quilting gatherings
    that showcase the geometric patterns of Romare Bearden’s paintings and enjoys reading poetry by Maya Angelou during her weekly book club.
  travel: Tammy Jones loves organized group tours that trace the civil‑rights trail—from Selma’s historic bridge to Montgomery’s Freedom Rides museum—while also savoring relaxed weekend getaways to St.
    Augustine’s historic district, balancing cultural immersion with the comfort of staying in familiar senior‑friendly hotels.
  culinary: Tammy Jones excels at cooking soul‑warming Southern dishes such as collard greens seasoned with smoked turkey, buttery cornbread, and peach cobbler, often adding a modern twist like quinoa‑infused
    jambalaya, and delights in sharing these meals at potluck gatherings, though she sometimes over‑salts dishes when her worry about flavor perfection kicks in.
  core: Tammy Jones is a diligent, community‑focused elder who blends meticulous organization with a lingering worry, turning every church event, garden harvest, and family story into a testament of resilience
    and hospitality.
background:
  cultural: Tammy is an African‑American woman who grew up in the post‑World War II South, born in Jacksonville, Florida, and raised in a close‑knit Black community that emphasized church, family, and mutual
    support. Her parents were part of the Great Migration, bringing Southern culinary traditions, gospel music, and oral storytelling into her upbringing. Tammy lived through the civil‑rights era, which
    instilled a strong sense of resilience, communal responsibility, and pride in her heritage. In Deltona, she remains an active participant in local African‑American cultural festivals, church events,
    and community service, honoring the values of hospitality, cooperation, and the preservation of Black history.
