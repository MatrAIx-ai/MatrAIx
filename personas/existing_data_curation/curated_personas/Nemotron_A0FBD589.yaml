  hobbies: '[''Church choir'', ''Gardening'', ''Quilting'', ''Bridge (card game)'', ''Bingo'', ''Cooking and baking'', ''Reading historical fiction'', ''Genealogy research'', ''Volunteer work at food banks'',
    ''Walking in local parks'']'
  career_goals: Although retired from formal employment, Tammy aims to deepen her impact as a community mentor and senior‑advocacy leader. She plans to spearhead a local seniors’ advisory board that addresses
    health, transportation, and social‑isolation concerns, while also guiding younger women at her church in leadership and life‑skill workshops. Tammy is eager to expand her genealogical research skills,
    document her family’s oral history, and eventually publish a memoir that preserves her cultural legacy. Maintaining her health, managing stress, and traveling with her husband to historic African‑American
    sites in the South are also top personal ambitions.
