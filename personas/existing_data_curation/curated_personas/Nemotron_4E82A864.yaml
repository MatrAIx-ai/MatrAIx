  arts: Gisella Soto delights in nightly lullabies by Raffi and classic nursery rhymes from Mother Goose, they often babble along with the familiar melodies and occasionally mimic the rhythmic clapping,
    showing a moderate talkativeness while clinging to the same soothing repertoire each evening.
  travel: Gisella Soto has traveled to their grandparents’ countryside farm and a nearby seaside resort, they favor these familiar, low‑stimulus destinations and only occasionally imagine a future visit
    to a theme park, balancing a yearning for new sights with a deep comfort in routine environments.
  culinary: Gisella Soto prefers smooth pureed carrots, mashed sweet potatoes, and banana oatmeal for meals, they consistently request the silver spoon for feeding, and they occasionally resist new textures,
    illustrating a strong inclination toward predictable flavors and a quirky habit of arranging mashed food in neat circles.
  core: Gisella Soto, a one‑year‑old who thrives on predictable routines, worries over small changes, and balances calm curiosity with occasional meltdowns, they embody a unique blend of practicality and
    emotional sensitivity.
