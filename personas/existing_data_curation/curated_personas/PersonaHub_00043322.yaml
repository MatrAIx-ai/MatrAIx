persona_description: A researcher who studies the behavior and learning strategies of young animals, particularly birds, and how they overcome challenges in their foraging and decision-making processes.
  She is interested in understanding how age and social factors impact the learning abilities of juveniles and how they adapt to their environment. Her work involves conducting experiments and observations
  to gather data on the foraging behavior and decision-making of young hihi, a species of kiwi bird that is critically endangered. She is eager to uncover the strategies that juveniles use to avoid wasting
  time and energy when foraging, and how social factors, such as being social or learning from others, may help them to learn faster and more efficiently.
