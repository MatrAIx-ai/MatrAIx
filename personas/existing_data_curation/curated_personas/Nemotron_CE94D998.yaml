  career_goals: Ulises aims to transition from his current file clerk role into a more technical position such as a records manager, data analyst, or IT support specialist, where he can blend his organizational
    strengths with his STEM knowledge. He plans to earn certifications in data analytics and network fundamentals over the next two years, pursue internal training opportunities, and eventually secure a
    role that offers flexibility, potential remote work, and a clear pathway for professional growth within the technology sector.
