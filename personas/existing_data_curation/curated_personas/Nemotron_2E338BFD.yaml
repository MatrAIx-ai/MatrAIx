  hobbies: '["reading picture books", "building blocks", "drawing animals", "outdoor nature walks", "singing songs", "dancing", "interactive educational apps", "baking with family"]'
  career_goals: When asked about the future, Yael often imagines herself as a teacher who can share stories and help friends learn, or as a veterinarian who cares for animals she loves exploring. She also
    talks about being a scientist who discovers how things work, reflecting her curiosity, while her interest in simple cooking hints at a practical, hands‑on ambition to be a baker or chef. These aspirations
    blend her imaginative curiosity with a desire for useful, caring roles.
