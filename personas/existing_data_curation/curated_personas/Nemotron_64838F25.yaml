    ''Mentoring'', ''Accessibility Compliance (ADA)'', ''Site Analysis'', ''Urban Planning'']'
  hobbies: '[''Blues and jazz concerts'', ''Social dancing'', ''Southern cooking with contemporary flair'', ''Urban gardening'', ''Bicycle tours of historic neighborhoods'', ''Volunteering as a mentor in
    youth design workshops'', ''Organizing community book clubs on architecture and social justice'', ''Traveling to architectural landmarks'', ''Writing a design and culture blog'']'
  career_goals: Ericka aims to leverage her senior experience to shape Memphis' built environment through leadership, mentorship, and advocacy for equitable, sustainable design. She aspires to become a
    principal at her current firm or launch her own practice focused on affordable housing, adaptive reuse of historic structures, and integrating Black cultural narratives into architecture. In parallel,
    she seeks to mentor the next generation of Black architects, influence local policy toward inclusive design standards, and champion projects that enhance community resilience and cultural continuity.
