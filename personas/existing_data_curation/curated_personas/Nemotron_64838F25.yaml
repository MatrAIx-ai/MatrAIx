personas:
  professional: Ericka Anderson, a senior architect specializing in sustainable, resilient design and historic preservation, leverages advanced BIM tools and a collaborative, community‑focused mindset to
    turn bold, culturally resonant concepts into buildable realities while balancing meticulous organization with a willingness to adapt on the fly.
  sports: Ericka Anderson cycles the historic Midtown Loop on weekends, jogs with the Memphis Road Runners club during spring, enjoys occasional yoga sessions at the local community center, and passionately
    supports the Memphis Grizzlies and Memphis Redbirds, attending games whenever the schedule permits.
  arts: Ericka Anderson frequents live blues performances by B.B. King tribute bands, jazz sets featuring Wynton Marsalis, and modern‑dance showcases by the Alvin Ailey American Dance Theater, letting these
    artistic experiences inform her design narratives.
  travel: Ericka Anderson plans trips with a mix of detailed itineraries and spontaneous detours, having explored historic neighborhoods in Savannah, the jazz heritage of New Orleans, and the architectural
    marvels of Lisbon, while dreaming of a future immersion in the vernacular architecture of Marrakech.
  culinary: Ericka Anderson delights in cooking Southern‑inspired meals like shrimp and grits with smoked paprika, collard greens tossed with apple cider vinegar, and a herb‑infused honey‑glazed fried chicken,
    using fresh garden herbs and locally sourced produce to add a modern twist to traditional dishes.
  core: Ericka Anderson is a visionary architect who balances meticulous project planning with spontaneous community engagement, channeling a love for blues, gardening, and mentorship into every facet of
    her life, even if it sometimes means overcommitting their calendar.
background:
  cultural: Ericka grew up in South Memphis, a community steeped in African‑American history, civil‑rights activism, and musical heritage. Her family's church played a central role in her upbringing, instilling
    values of community service, cooperation, and resilience. The legacy of Memphis’ civil‑rights movement and the city's blues tradition informs her design sensibility, prompting her to incorporate elements
    of Black cultural expression and Southern hospitality into her projects. She remains connected to her roots through participation in local cultural festivals, mentorship of Black students, and advocacy
    for inclusive urban development that honors both historic Black neighborhoods and contemporary needs.
attributes:
  skills: '[''Architectural Design'', ''BIM Modeling'', ''Sustainable Design'', ''Resilient Design'', ''Historic Preservation'', ''Community‑Centered Planning'', ''Project Management'', ''Construction Documentation'',
