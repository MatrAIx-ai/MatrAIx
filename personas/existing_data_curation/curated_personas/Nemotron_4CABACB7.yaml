personas:
  professional: Marie Ruiz is a data‑driven state legislator with a STEM background, known for meticulous policy analysis, budget oversight, and clear legislative drafting; their methodical, routine‑oriented
    approach and competitive drive have positioned them as a strong candidate for chairing the Colorado House Committee on Science, Technology, and Innovation.
  sports: Marie Ruiz is an avid hiker who follows a set schedule of weekend treks in the Rocky Mountain foothills, supports the Colorado Rockies baseball team, and plays occasional pickup soccer with a
    local community league, balancing a competitive spirit on the field with a routine‑driven commitment to staying fit.
  arts: Marie Ruiz engages with the arts by attending Día de los Muertos performances at the cultural center, collecting traditional folk‑art pottery, listening to classic mariachi recordings and occasional
    jazz from John Coltrane, and participating in a bi‑monthly book club that discusses biographies of scientists like Marie Curie and artists such as Frida Kahlo, using these experiences to unwind after
    legislative sessions.
  travel: Marie Ruiz plans trips with meticulous itineraries, favoring destinations that blend cultural immersion and nature—past visits include a week‑long exploration of historic towns in a southern heritage
    region, a family road trip through Colorado’s national parks, and a scheduled pilgrimage to the historic mission towns of New Mexico, while future dreams involve an organized tour of the Galápagos for
    ecological research.
  culinary: Marie Ruiz is an accomplished home cook who harvests vegetables from a personal garden to craft mole sauce, tamales with masa and roasted chilies, and salsa verde with fresh tomatillos, skillfully
    blending ingredients like epazote, ancho chilies, and dark chocolate, while also using surplus produce to donate to a local food bank.
  core: Marie Ruiz blends a disciplined, data‑driven legislative career with a love for garden‑to‑table cooking, routine hikes, and cultural traditions, all while wrestling with a competitive edge and a
    habit of over‑worrying about every detail.
background:
  cultural: Marie was raised in a bicultural Mexican‑American household in Denver, where Spanish was spoken at home and Mexican traditions were celebrated alongside mainstream American holidays. Her parents,
    immigrants from Jalisco, instilled a strong work ethic, respect for community, and the value of education, which guided her pursuit of a STEM degree. She maintains close ties to the local Hispanic community,
    attending Día de los Muertos vigils, supporting cultural events at La Casa de la Cultura, and advocating for policies that address the needs of immigrant families. While she embraces her heritage, she
    also navigates the practical realities of her role as a legislator, blending cultural empathy with a data‑driven, results‑focused approach.
attributes:
  skills: '[''Policy analysis'', ''Legislative drafting'', ''Data-driven decision making'', ''Budgetary oversight'', ''Stakeholder negotiation'', ''Public speaking'', ''Project management'', ''Environmental
    and energy policy'', ''Science and technology advocacy'', ''Risk assessment'']'
  hobbies: '[''Gardening'', ''Cooking Mexican cuisine'', ''Hiking'', ''Reading historical non-fiction'', ''Book club participation'', ''Crossword puzzles'', ''Knitting'']'
  career_goals: Marie aims to become chair of the Colorado House Committee on Science, Technology, and Innovation within the next three years, allowing her to shape statewide policy on renewable energy,
    broadband access, and STEM education. She seeks to introduce a comprehensive, evidence‑based climate resilience bill that secures funding for community solar projects and supports low‑income neighborhoods.
    Long‑term, she aspires to run for the state senate, leveraging her legislative track record to advocate for Hispanic representation and practical, results‑oriented governance. Additionally, she wishes
    to mentor emerging women leaders from underrepresented backgrounds by establishing a mentorship program within the state legislature.
