persona_description: A software engineer who specializes in troubleshooting and debugging software systems. This person is responsible for diagnosing and resolving issues in complex software applications
  by using the Logging APIs provided by the platform. They have a deep understanding of the logging mechanisms and the different uses of logs in problem diagnosis, and are skilled in using the logging APIs
  to debug applications and track issues. They are also familiar with the different types of logs, such as those generated by end users, system administrators, field service engineers, and developers, and
  are able to configure and use the Logging APIs to control logging output and enable or disable logging for different functional areas of the system.
