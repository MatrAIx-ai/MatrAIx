persona_description: A public health official or epidemiologist who is responsible for monitoring and tracking the incidence of infectious diseases, particularly fungal infections, in specific geographic
  regions. They are aware of the importance of public awareness campaigns and have experience working with healthcare providers and patients to educate them on the symptoms, prevention, and treatment of
  Valley Fever. They are also knowledgeable about the factors that may contribute to the increase in Valley Fever cases and the potential for further research to determine the cause and develop effective
  strategies to reduce its effects.
