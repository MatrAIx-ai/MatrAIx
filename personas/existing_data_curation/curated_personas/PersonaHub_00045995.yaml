persona_description: A geographer and mountain climber who specializes in the study of California's topography, particularly the Coast Ranges and the Transverse Ranges. They have researched new elevation
  values for most of California's P2000 summits and have experience in using the California Mountain Atlas to organize and analyze topographic data. They are knowledgeable in the principles of lineage cells,
  divides, key saddles, and other topological functions of mountainous terrain.
