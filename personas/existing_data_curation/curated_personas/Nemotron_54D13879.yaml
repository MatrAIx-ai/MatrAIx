personas:
  professional: Yuliana Zayas, a 25‑year‑old full‑stack web developer with a strong background in UI/UX design, leverages their detail‑oriented, disciplined approach to lead cross‑functional teams building
    culturally inclusive digital museum experiences, while their curiosity and competitive edge drive innovative, data‑rich interfaces rooted in muralist design principles.
  sports: Yuliana Zayas, who follows the Chicago Bulls and Chicago Cubs avidly, channels their competitive spirit into weekly runs with the Forest Preserve Running Club, regular weekend hikes in the nearby
    preserves, and a disciplined yoga practice at a downtown studio, treating fitness as a structured routine that balances solitary reflection with team camaraderie.
  arts: Yuliana Zayas immerses themselves in Chicago’s independent gallery scene, drawing inspiration from mural legends like Diego Rivera and contemporary artists such as Tania Bruguera, while their soundtrack
    ranges from indie folk band Fleet Foxes to traditional Mexican ensembles like Café Tacvba, and they regularly attend performances by the Chicago Symphony Orchestra and experimental theater productions
    at the Lookingglass Theatre.
  travel: Yuliana Zayas approaches travel with meticulous itineraries, favoring culturally rich urban trips like a weekend in Mexico City’s historic center and a museum‑focused tour of Barcelona, while
    also seeking solitary nature escapes in Patagonia’s Torres del Paine, balancing their modest student‑loan budget with a desire to explore global art capitals.
  culinary: Yuliana Zayas, an adept home cook, frequently prepares traditional Mexican dishes such as mole poblano, chiles en nogada, and handmade corn tamales, relishing the aroma of cacao, dried chilies,
    and fresh masa, while they also experiment with fusion plates that pair Mexican spices with Chicago‑style deep‑dish pizza crusts for friends.
  core: Yuliana Zayas blends a disciplined tech mind with a passionate love for muralist art, turning solitary hikes into data‑driven sketchbooks while fiercely guarding their budget and occasionally over‑curating
    their Spotify playlists.
background:
  cultural: Yuliana was raised in Chicago’s vibrant Pilsen neighborhood by Mexican immigrant parents. Bilingual since childhood, she celebrates Día de los Muertos, quinceañeras, and other Mexican traditions
    with her extended family, both locally and during regular trips to Mexico. The neighborhood’s colorful murals and the legacy of artists like Frida Kahlo and Diego Rivera have deeply shaped her aesthetic
    sensibility. She remains connected to her heritage through community festivals, Mexican culinary practices, and a commitment to foreground Latinx perspectives in her professional work, using her cultural
    roots as a source of inspiration and motivation.
