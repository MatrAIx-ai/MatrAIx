  career_goals: Yuliana aims to become a lead product manager or technical director at a company that creates culturally inclusive digital experiences, ideally within a museum, cultural institution, or
    a start‑up focused on Latinx art platforms. She wants to lead interdisciplinary teams that blend technology, design, and heritage storytelling, and eventually launch her own venture offering interactive
    digital tools for Mexican artists to reach global audiences. To support these ambitions, she plans to earn a master’s degree in Human‑Computer Interaction and publish research on the impact of immersive
    tech on cultural preservation.
