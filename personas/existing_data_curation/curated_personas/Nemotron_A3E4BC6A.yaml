  hobbies: '[''basketball'', ''fishing'', ''car maintenance'', ''church involvement'', ''listening to hip‑hop and classic soul'', ''weight training'', ''video gaming (sports titles)'']'
  career_goals: Jimmy aims to build a stable career in logistics by earning certifications such as Certified Forklift Operator and OSHA Safety Advisor within the next two years. He plans to complete his
    associate degree in Supply Chain Management while continuing to work, eventually moving into a supervisory role as a Warehouse Lead or Safety Coordinator. Long‑term, he envisions becoming a warehouse
    manager where he can apply his methodical approach, calm demeanor, and commitment to safety to improve operational efficiency and mentor new workers.
