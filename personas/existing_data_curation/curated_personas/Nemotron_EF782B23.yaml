  career_goals: Jacob dreams of exploring space as an astronaut and hopes to become a spacecraft engineer who designs practical tools for real‑world problems. He is also passionate about soccer and imagines
    playing at a professional level, while his growing interest in computers fuels an ambition to become a software developer who creates educational games. He aims to maintain his reputation as a reliable,
    high‑achieving student, earn top grades, and join his middle school's robotics club to build functional inventions that blend his curiosity with practicality.
