personas:
  professional: Craig Taylor, a 35‑year‑old STEM tutor and aspiring education leader, blends his curiosity‑driven problem‑solving with a relaxed, flexible teaching style to deliver differentiated math and
    physics lessons through digital platforms, while his occasional disorganization fuels spontaneous, hands‑on experiments that keep students engaged.
  sports: Craig Taylor, an avid basketball enthusiast who routinely plays pickup games at the YMCA while cheering for the NBA’s Miami Heat and the Birmingham Barons, also tackles weekend hikes in the Appalachian
    foothills as a member of the Birmingham Hiking Club, blending casual cardio with occasional home‑based strength routines.
  arts: Craig Taylor immerses himself in classic soul and jazz, spinning vinyl by Marvin Gaye, Aretha Franklin, John Coltrane, and Miles Davis while occasionally attending live performances at Birmingham’s
    Avondale Brewing Company’s jazz nights, using the music as a backdrop for his microcontroller tinkering sessions.
  travel: Craig Taylor prefers low‑key, road‑trip style travel that blends outdoor adventure with cultural immersion, having explored Asheville’s Blue Ridge trails and New Orleans’ music scene, while dreaming
    of a future solo trip to Kyoto’s robotics museums and the Swiss Alps for a high‑altitude hike.
  culinary: Craig Taylor, a competent home cook, relishes preparing Southern soul staples like collard greens seasoned with smoked turkey, slow‑cooked pork ribs glazed with brown sugar and apple cider vinegar,
    and cornbread topped with honey butter, often pairing meals with homemade sweet tea and occasionally experimenting with sous‑vide precision using a microcontroller‑controlled water bath.
  core: Craig Taylor bridges STEM curiosity and Southern hospitality, channeling his laid‑back, sometimes disorganized nature into spontaneous robot builds, community tutoring, and soulful cooking, all
    while never missing a weekend basketball game or a classic jazz record.
background:
  cultural: Craig grew up in the historically black neighborhoods of Birmingham, absorbing the city’s rich legacy of civil‑rights activism and Southern African‑American traditions. His family’s gatherings
    are centered around church, gospel music, and soulful cooking, instilling a strong sense of community responsibility. This cultural foundation shapes his tutoring approach, emphasizing empowerment,
    respect, and representation for black students in STEM. He draws inspiration from local role models and mentors who stress the importance of perseverance and giving back to one’s community.
attributes:
  skills: '[''Mathematics instruction (Algebra, Geometry, Calculus)'', ''Physics tutoring (Mechanics, Electricity & Magnetism)'', ''Python programming'', ''Data analysis with Excel and MATLAB'', ''Curriculum
    design and customization'', ''Differentiated instruction'', ''Online learning platforms (Google Classroom, Zoom)'', ''Educational assessment and feedback'', ''Mentorship of underrepresented students'',
    ''Cross‑cultural communication'', ''Problem‑solving facilitation'']'
  hobbies: '[''DIY electronics and robotics'', ''Playing basketball'', ''Listening to soul and jazz music'', ''Cooking Southern soul food'', ''Volunteer tutoring at community churches'', ''Hiking in the
    Appalachian foothills'', ''Reading popular science books'', ''Board game nights'']'
  career_goals: Craig aspires to transition from private tutoring to a leadership role in STEM outreach, aiming to establish a community learning center in Birmingham that serves low‑income students. He
    plans to earn a Master’s in Education to become a certified teacher and develop after‑school programs that integrate hands‑on experiments with technology. Long‑term, he hopes to influence local education
    policy to reduce achievement gaps and publish a series of accessible STEM guides for parents and caregivers.
