  career_goals: Robbie aims to secure stable, predictable employment that leverages his handyman skills. He plans to obtain his GED within the next year and enroll in a vocational certification program
    for HVAC or electrical work, which would enable him to become a licensed contractor. His intermediate goal is to establish a small side‑business offering home‑repair services to Camden residents, providing
    a reliable income stream while he builds a client base. Long‑term, he hopes to achieve financial independence, secure permanent housing, and become a trusted point of contact for local community‑support
    initiatives.
