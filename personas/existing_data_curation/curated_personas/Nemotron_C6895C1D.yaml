  career_goals: He aims to move into a supervisory role within the next two years, earn a certified food‑safety manager credential, and eventually open a small Vietnamese‑inspired café that doubles as an
    art space for local creators. Minh also hopes to mentor younger employees, develop menu items that reflect his artistic interests, and secure a work‑life balance that reduces his chronic worry and stress.
