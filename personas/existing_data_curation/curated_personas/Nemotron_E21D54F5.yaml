  career_goals: Alice aims to advance to a senior technologist role and eventually become a laboratory manager, leading a high‑performing team that prioritizes patient safety and diagnostic excellence.
    She plans to pursue a master's degree in Clinical Laboratory Sciences and obtain advanced certifications through the American Society for Clinical Pathology to deepen her expertise in molecular diagnostics
    and quality management. Passionate about integrating technology and art, she envisions developing AI‑driven analytics and visual dashboards that simplify complex test results for clinicians and patients
    alike. Additionally, Alice is committed to cultivating a supportive lab culture, mentoring junior staff, and spearheading continuous‑improvement projects that enhance workflow efficiency and reduce
    stress for the entire team.
