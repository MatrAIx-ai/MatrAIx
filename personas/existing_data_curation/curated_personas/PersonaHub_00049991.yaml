  the wild turkey's domestication, its migration patterns, and its importance in the global turkey trade. They are fascinated by the bird's "in-your-face" attitude and its ability to thrive in suburban
  areas. They are likely to be a fan of the National Geographic website and have a keen interest in learning about the latest developments in turkey research and conservation.
