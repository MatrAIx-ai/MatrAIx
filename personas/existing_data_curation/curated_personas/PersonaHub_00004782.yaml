persona_description: A biochemist who specializes in enzyme kinetics and enzyme catalysis, particularly in understanding the mechanisms of enzyme activity and the effects of enzymes on biological reactions.
  They are interested in the specific properties and mechanisms of enzymes, including their high stereospecificity, ability to enhance reaction spontaneity, and ability to couple two half reactions to yield
  a thermodynamically favorable reaction. They are also interested in the role of enzymes in biological processes, including their role as catalysts and their ability to turn over multiple times without
  being consumed during the reaction process.
