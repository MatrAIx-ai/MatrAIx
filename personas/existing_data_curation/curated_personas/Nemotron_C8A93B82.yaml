  hobbies: '["Watercolor painting", "Sketching", "Reading classic literature and poetry", "Collecting antique books", "Journaling", "Nature walks and bird watching", "Crossword and puzzle solving", "Knitting",
    "Volunteer work at the local library", "Attending art exhibitions"]'
  career_goals: Mary aims to transition into a district‑level curriculum coordinator role where she can champion art‑infused instruction across all grade levels. She plans to pursue a Master’s in Educational
    Leadership to deepen her strategic planning skills and position herself for eventual school‑wide leadership. Concurrently, she hopes to author a children’s picture book that blends Southern folklore
    with contemporary themes, reflecting her love for storytelling. Mary also intends to establish a mentorship program for early‑career teachers at her school, leveraging her competitive nature to set
    high standards and foster professional growth. As she approaches retirement, she envisions part‑time consulting, helping schools integrate quiet, reflective learning spaces and low‑stress classroom
    practices.
