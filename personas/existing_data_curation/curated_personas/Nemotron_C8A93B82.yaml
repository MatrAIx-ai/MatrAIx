personas:
  professional: Mary Stork, a veteran elementary and middle‑school teacher with more than 30 years of experience, blends meticulous curriculum design with a competitive drive to embed visual arts into literacy
    lessons, mentors novice teachers through structured workshops, and they leverage Google Classroom and Seesaw to create quiet, reflective learning spaces that mirror their preference for solitude.
  sports: Mary Stork follows the Mississippi State Bulldogs football team and the New Orleans Saints, participates in the Natchez Trace Hikers club for regular bird‑watching walks, enjoys occasional leisurely
    frisbee games at the local park, and they prefer low‑impact activities that align with their quiet, nature‑focused lifestyle.
  arts: Mary Stork paints delicate watercolors of rolling hills and pine‑forested trails inspired by Winslow Homer, listens to classical piano repertoire by Chopin and Debussy while sketching historic Natchez
    Trace architecture, devotes evenings to reading first‑edition works by William Faulkner and Eudora Welty, and they contribute curated art displays at the Tupelo public library.
  travel: Mary Stork plans trips with meticulous lists, favoring serene destinations such as Savannah’s historic squares, Asheville’s mountain art retreats, and Edinburgh’s galleries, while dreaming of
    a plein‑air painting workshop in Paris, and they balance their love of quiet exploration with occasional family‑oriented visits to the Gulf Coast.
  culinary: Mary Stork delights in cooking Southern classics like shrimp and grits seasoned with smoked paprika, collard greens simmered with ham hocks, and lemon shortbread using fresh butter and zest,
    often pairing meals with brewed hibiscus tea and they savor the tactile process of knitting or quilting while the food simmers.
  core: Mary Stork is a detail‑oriented, art‑obsessed educator who channels competitive ambition into quiet, reflective spaces, balances cautious financial planning with occasional book‑collecting splurges,
    and they confront health worries through routine monitoring and journaling.
background:
  cultural: Mary was raised in a small, close‑knit community in northeastern Mississippi, steeped in Southern heritage and Methodist traditions. Her family’s roots trace back to generations of small‑farmers
    who prized self‑reliance, modesty, and a strong sense of community. The region’s rich musical legacy, from blues to early rock ‘n’ roll, alongside a deep appreciation for oral storytelling, nurtured
    her curiosity about the arts. While she values the hospitality and communal gatherings typical of Southern culture, Mary prefers quiet, reflective spaces—a trait nurtured by the tranquil rural landscape
    of Pontotoc County. Her upbringing exposed her to church choirs, local history societies, and community events that celebrated regional customs, all of which inform her teaching style and artistic interests
    while allowing her to approach tradition with an open, unconventional mindset.
attributes:
  skills: '["Lesson planning", "Differentiated instruction", "Literacy development", "Art integration", "Project‑based learning", "Classroom management", "Educational technology (Google Classroom, Seesaw)",
