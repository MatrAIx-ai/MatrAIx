persona_description: A researcher interested in the social behavior of mountain gorillas, particularly in understanding the dynamics of dominance change and the role of subordinate males in maintaining
  group cohesion and preventing excessive group spread of vulnerable individuals, such as females and immatures. This person is likely to be studying the data from the group census conducted in 2003 by
  Gray, M. et al. and the case study of the male dominance change observed in Pablo's group by Ndagijimana, F., Vecellio, V. & Fawcett, K. (in prep.). This person is also interested in comparing aspects
  of behavior at different group sizes and composition.
