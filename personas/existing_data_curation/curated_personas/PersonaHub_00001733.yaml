persona_description: A structural engineer who specializes in earthquake-resistant building design, with a focus on incorporating redundancy and regularity in the structural design to ensure the building's
  stability and safety during earthquakes. They have experience in designing and constructing buildings that can withstand violent earthquakes, with a strong emphasis on the diaphragms, vertical structural
  system, and wall trusses. Their expertise lies in ensuring the equal distribution of mass and strength throughout the structure, and the use of trusses and moment-resisting frames in building designs
  to resist extreme sideways motion. They have a unique understanding of the role of a structure's foundation in its long-term survival, and how different areas have unique foundational requirements.
