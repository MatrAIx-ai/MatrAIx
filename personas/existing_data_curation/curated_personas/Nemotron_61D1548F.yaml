  hobbies: '[''Basketball (street and school)'', ''Skateboarding'', ''Competitive video gaming (Fortnite, Call of Duty)'', ''Creating TikTok videos'', ''Hip‑hop dancing'', ''Listening to rap and R&B'',
    ''Community hang‑outs at local parks'', ''DIY electronics'', ''Reading graphic novels'']'
  career_goals: Samori dreams of turning his love for gaming and content creation into a professional career as a streamer or eSports competitor, hoping to build a personal brand on platforms like Twitch
    and TikTok. At the same time, he wants to earn a basketball scholarship that could open doors to college and possibly a future in sports coaching or sports media. He is also intrigued by the idea of
    developing a simple mobile app that offers coping tools for teens dealing with anxiety, merging his technical curiosity with his personal experience of emotional distress. Ultimately, he seeks a path
    that lets him stay flexible, stay connected with his peers, and make a tangible impact on his community.
