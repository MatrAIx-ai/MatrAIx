  career_goals: Jeannette aims to advance to a senior data analyst or lead data scientist role within a stable organization such as a healthcare system, state agency, or established biotech firm. She is
    pursuing the Certified Analytics Professional designation and plans to deepen her expertise in machine‑learning pipelines that improve operational efficiency. Her goal is to lead a small analytics team,
    establishing clear processes and routine workflows that reduce uncertainty and stress for the group. Over the next five years, she hopes to be recognized as a trusted advisor who bridges technical insights
    with business strategy, while maintaining a healthy work‑life balance and mentoring women entering STEM fields.
