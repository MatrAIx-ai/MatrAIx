personas:
  professional: Jeannette Binette is a data‑driven analyst who leverages Python, R, and Tableau to build reproducible predictive models for healthcare operations, channeling their methodical, routine‑loving
    nature into rigorous documentation while using their outgoing personality to mentor junior analysts and steer cross‑functional projects toward clear, stress‑reducing processes.
  sports: Jeannette Binette competes weekly in a co‑ed volleyball league, practices yoga every Thursday night, hikes the Sudbury River conservation area on weekends, and cheered the Boston Red Sox and New
    England Patriots while rooting for the local Northboro Volleyball Club.
  arts: Jeannette Binette nurtures a love of contemporary literature through a book club that debates novels by Sally Rooney and non‑fiction by Malcolm Gladwell, and relaxes with the indie folk sounds of
    Fleet Foxes, the lyrical piano of Nils Frahm, and occasional late‑night viewings of classic films starring Meryl Streep.
  travel: Jeannette Binette favors meticulously planned weekend getaways to New England coastal towns like Rockport and Newport, balancing structured itineraries with spontaneous beach walks, while dreaming
    of a future road trip along the Pacific Coast Highway after securing a promotion.
  culinary: Jeannette Binette delights in cultivating basil, thyme, and cherry tomatoes in the community garden, then crafting fresh pesto pasta and bright gazpacho bowls, and skillfully navigates a medium‑level
    kitchen repertoire that blends Mediterranean flavors with seasonal New England produce.
  core: Jeannette Binette is a routine‑obsessed data analyst who channels stress into yoga, puzzles, and volleyball, occasionally over‑analyzes expenses, but consistently mentors women in STEM with a dash
    of coffee‑fueled optimism.
background:
  cultural: Jeannette grew up in a middle‑class New England family with deep roots in Massachusetts. Her family, originally of French‑Canadian descent on her father's side, has blended into the broader
    Anglo‑American culture of the region, celebrating holidays like Thanksgiving, Fourth of July, and local traditions such as New England clam bakes. She was raised in a community that values punctuality,
    hard work, and civic involvement, which reinforced her practical and routine‑oriented outlook. Active in her local church and neighborhood association, she embodies the collaborative spirit of Northborough
    while maintaining a respect for the region's educational emphasis and modest, traditional values.
