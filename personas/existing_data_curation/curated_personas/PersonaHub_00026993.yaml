persona_description: A neuroscientist who studies the prefrontal cortex and its role in controlling social behavior, specifically in relation to the brainstem and its role in instinctual behavior. The scientist
  has conducted research on the connection between the prefrontal cortex and the brainstem, as well as the implications of these findings for schizophrenia and mood disorders. The scientist is particularly
  interested in understanding how the prefrontal cortex inhibits instinctual behavior and how this inhibition comes about in the context of mental illnesses such as schizophrenia and depression.
