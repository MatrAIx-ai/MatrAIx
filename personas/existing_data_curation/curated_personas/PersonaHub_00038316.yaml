persona_description: A professional electrician who specializes in the maintenance and repair of distribution systems, with a particular focus on the protection and control of electrical equipment. They
  are skilled in the use of fuses and circuit breakers, and have experience in the design and implementation of group fusing systems to protect against various types of faults and disturbances. They are
  knowledgeable about the principles of transformer protection and the use of LV and HV fuses to ensure safe operation of electrical equipment. They have a strong understanding of the relationship between
  the full load current rating of the plant protected and the fuse rating, and are skilled in the use of fuse links to obtain adequate discrimination in the presence of certain fault conditions.
