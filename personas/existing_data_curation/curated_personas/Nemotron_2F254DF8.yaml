personas:
  professional: Kay Dosreis, a 17‑year‑old budding concept artist, merges watercolor and digital illustration in Procreate with entry‑level Blender 3D modeling to craft speculative visual narratives, while
    their spontaneous curiosity fuels rapid idea generation but often leads to missed deadlines.
  sports: Kay Dosreis, a 17‑year‑old nature enthusiast, hikes with the Cullman Outdoor Club on weekends, follows the Alabama Crimson Tide football season for collegiate rivalry thrills, and casually practices
    yoga in their bedroom to stretch after long drawing sessions.
  arts: Kay Dosreis, a 17‑year‑old visual storyteller, draws inspiration from J. M. W. Turner’s watercolors, Brian Eno’s ambient soundscapes, and Gabriel Rodrigues’s graphic novels, while volunteering at
    the Cullman community art fair and curating a digital portfolio that blends illustration, 3D modeling, and poetic prose.
  travel: Kay Dosreis, a 17‑year‑old stargazer, prefers low‑cost, spontaneous road trips to nearby observatory towns like Flagstaff and Asheville, while dreaming of immersive adventures to Iceland’s Aurora‑lit
    Þingvellir National Park and the Atacama Desert’s crystal‑clear night skies.
  culinary: Kay Dosreis, a 17‑year‑old budding home chef, favors buttery mushroom risotto, hand‑rolled avocado toast with lemon‑infused olive oil, and experimental desserts such as lavender‑infused white
    chocolate mousse, often cooking while listening to folk ballads and ambient playlists.
  core: Kay Dosreis, a 17‑year‑old cosmic dreamer, channels sleepless nights into watercolor constellations, gushes over indie game art, and habitually postpones deadlines to chase the next fleeting spark
    of inspiration.
background:
  cultural: Kay grew up in the rural-suburban setting of Cullman, Alabama, a community known for its Southern hospitality, close-knit family networks, and a blend of traditional folk traditions and modern
    suburban life. Her family often participated in local church gatherings and community events such as county fairs, where she first encountered Appalachian craft motifs that later inspired her artistic
    style. The region's rolling hills, pine forests, and quiet evenings have fostered her love for solitude and reflective day-dreaming. At the same time, access to the internet and online art communities
    provides her with exposure to global artistic movements, allowing her to blend Southern folk aesthetics with contemporary digital art. This cultural mix—rooted in a modest, self-reliant Southern upbringing
    while embracing a broader, internet-fueled creative world—shapes her values of independence, community contribution, and imaginative exploration.
attributes:
  skills: '[''Digital illustration'', ''Watercolor painting'', ''Sketching'', ''Creative writing'', ''Poetry'', ''Science fiction storytelling'', ''Conceptual art'', ''Basic 3D modeling (Blender)'', ''Video
