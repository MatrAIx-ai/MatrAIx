  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Poetry writing'', ''Science fiction short stories'', ''Stargazing'', ''Indie video games'', ''Nature hiking'', ''Collecting vintage books
    and postcards'', ''Community art fair volunteering'']'
  career_goals: Kay aims to build a diverse portfolio that showcases her interdisciplinary approach to visual storytelling, with the goal of enrolling in a Bachelor of Fine Arts program focused on illustration
    and new media. She envisions a career as a concept artist for video games or graphic novels, where she can merge her love for abstract concepts with compelling visuals. In the short term, she plans
    to attend a summer art residency at a nearby university and secure freelance illustration commissions. Long-term, Kay hopes to author and illustrate an original graphic novel series exploring themes
    of imagination, science, and personal growth, and to develop interactive digital experiences that blend narrative, sound, and simple coding.
