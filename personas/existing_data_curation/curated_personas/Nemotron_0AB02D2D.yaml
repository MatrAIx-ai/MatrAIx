personas:
  professional: Tucker Campbell, a budding preschool classroom helper, combines curiosity about how things work with a practical knack for tidying up blocks, making them a reliable little assistant who
    balances imaginative play with following the teacher's routine.
  sports: Tucker Campbell, a spirited member of the Little Tigers Soccer Club, eagerly chants for the Chicago Cubs during family game nights, admires the Chicago Bulls on TV, and balances daily playground
    tag with bike rides, treating exercise as both fun and routine.
  arts: Tucker Campbell, an imaginative little artist, spends afternoons drawing whimsical creatures inspired by Dr. Seuss, sings along to Disney's Let It Go from Frozen, and watches Pixar's Toy Story starring
    Tom Hanks, letting these favorite creators shape their playtime narratives.
  travel: Tucker Campbell, an adventurous family road-trip enthusiast, has enjoyed a magical weekend at Disneyland in California, a sunrise hike at the Grand Canyon, and a sunny beach day in Clearwater,
    Florida, and dreams of visiting Paris to see the Eiffel Tower and taste croissants.
  culinary: Tucker Campbell, a budding kitchen helper, loves scooping cheesy macaroni, dipping chicken nuggets in ketchup, and crafting strawberry-banana smoothies with a mini blender, proudly adding a
    pinch of cinnamon to oatmeal whenever possible.
  core: Tucker Campbell balances boundless curiosity with a surprising penchant for keeping blocks perfectly aligned, often humming while sorting crayons, and occasionally insists on bedtime stories ending
    with a superhero victory.
background:
  cultural: Tucker lives in New Britain, Connecticut, a city with a historic mix of Polish, Italian, and Irish immigrant roots, and a contemporary middle‑class American suburb culture. His family participates
    in typical American traditions such as Thanksgiving and Christmas, attends a local preschool where English‑based early learning is emphasized, and occasionally joins community events at the public library
    and neighborhood park. He is raised with a blend of respect for cultural heritage and the inclusive, child‑friendly community values of New England, which shape his curiosity, practicality, and social
    balance.
