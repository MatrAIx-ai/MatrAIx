personas:
  professional: Charles Catlett, a methodical community organizer and aspiring museum professional, leverages their handyman aptitude, budgeting expertise, and deep love of art history to volunteer as a
    docent at the DuPage Museum of Art while pursuing a GED and a community‑college certificate in museum studies, and they are positioning themselves for a part‑time assistant curator role.
  sports: Charles Catlett, a dedicated member of the local Forest Preserve Hiking Club who enjoys weekend treks through the DuPage woods, is a faithful fan of the Chicago Cubs, Bears and Blackhawks, and
    they maintain moderate fitness through weekly walks, occasional casual softball games, and yoga sessions to counterbalance woodworking strain.
  arts: Charles Catlett, an avid visitor of the Art Institute of Chicago who studies Monet, O'Keeffe, and Edward Hopper, paints watercolor landscapes inspired by Midwestern light, captures candid moments
    with a DSLR camera, and they unwind to Miles Davis jazz and Beethoven symphonies while attending community theater productions.
  travel: Charles Catlett, a planner who enjoys meticulously mapping weekend escapes to the Lake Michigan dunes, occasional trips to Milwaukee’s craft breweries, and dreams of a summer pilgrimage to Paris’s
    Louvre, balances a modest travel budget with a love for spontaneous photo walks in historic neighborhoods, and they often combine practical itinerary apps with pocket‑sized sketchbooks.
  culinary: Charles Catlett, a confident home cook who frequently prepares Chicago‑style deep‑dish pizza, homemade sourdough bread, and garden‑fresh ratatouille, loves experimenting with seasonal herbs
    like basil and rosemary, and they treat each new recipe as a canvas for creative expression.
  core: Charles Catlett, a 51‑year‑old art‑enthusiast handyman, blends meticulous organization with a love for watercolor, woodworking, and community service, but they occasionally hoard spare parts and
    forget to water houseplants.
background:
  cultural: Charles grew up in the lower‑midwest suburb of Chicago, in a working‑class, predominantly white neighborhood. His family traces its roots to German and Irish immigrants who settled in the area
    during the early 20th century. The cultural environment emphasized hard work, modesty, community involvement, and a respect for tradition. Although he left formal schooling early, the local Catholic
    parish and community centers provided informal education and social connections. The multicultural surroundings of DuPage County, with its mix of ethnicities and vibrant arts scene, have broadened his
    perspective and nurtured his curiosity for new ideas and artistic expression. His cultural background blends Midwestern pragmatism with an appreciation for the diverse cultural offerings of the Chicago
    metropolitan area.
