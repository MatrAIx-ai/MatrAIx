    festivals and community projects'']'
  career_goals: Charles aims to formalize his lifelong learning by completing his GED and enrolling in a community college program in art history or museum studies. He hopes to leverage his organizational
    abilities and art knowledge to volunteer as a docent at the nearby DuPage Museum of Art, eventually seeking a part‑time position as an assistant curator or visitor services coordinator. Additionally,
    he dreams of turning his woodworking hobby into a modest side business selling handcrafted furniture or decorative items, providing both creative fulfillment and supplemental income. He also intends
    to improve his digital literacy, acquire certification in basic computer applications, and become a reliable coordinator for neighborhood watch and community garden projects, ensuring his contributions
    strengthen the social fabric of Hanover Park. Financial stability and a sense of purpose after his divorce motivate him to build a balanced routine that includes work, volunteering, and personal enrichment.
