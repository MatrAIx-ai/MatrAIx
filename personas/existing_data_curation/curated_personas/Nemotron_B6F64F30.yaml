personas:
  professional: Gerardo Rosa is a dynamic elementary and middle school teacher who blends bilingual resources, project‑based learning, and interactive tech tools, and they balance a spontaneous, curiosity‑driven
    approach with the practical need for lesson‑planning deadlines.
  sports: Gerardo Rosa enjoys playing weekend recreational soccer with the Chino Hills Strikers, follows the LA Galaxy and Los Angeles Rams, and they stay fit by hiking with the San Bernardino Mountain
    Hiking Club.
  arts: Gerardo Rosa unwinds by strumming an acoustic guitar, crafting folk‑rock songs inspired by José González and Sufjan Stevens, and they indulge in sci‑fi novels by Neal Stephenson and indie films
    directed by Guillermo del Toro.
  travel: Gerardo Rosa prefers spontaneous road trips to nearby desert landscapes like Joshua Tree and the Grand Canyon, but they also dream of a cultural immersion in Oaxaca and a tech‑focused adventure
    in Tokyo, balancing a limited budget with a love for discovery.
  culinary: Gerardo Rosa excels at cooking traditional dishes such as tamales, mole poblano with dried chilies and dark chocolate, and pozole, often experimenting with fusion twists that combine local ingredients
    like avocado and corn masa, while they relish taco‑truck evenings.
  core: Gerardo Rosa is a curious, community‑oriented teacher who balances spontaneous creativity with occasional disorganization, loves soccer and guitar, and they channel cultural roots into vibrant classroom
    and kitchen experiences.
background:
  cultural: Gerardo grew up in a Mexican‑American household in Southern California, where Spanish was spoken at home and family traditions such as Día de los Muertos, quinceañeras, and weekend taco nights
    were central. His parents instilled a strong sense of community, respect for elders, and pride in Mexican cultural heritage. He celebrates both Mexican holidays and American ones, and frequently participates
    in local events like the Chino Hills Mexican Festival. His bicultural identity shapes his teaching philosophy, prompting him to incorporate bilingual resources and culturally relevant examples into
    lessons to reflect the diverse backgrounds of his students.
attributes:
  skills: '[''Classroom management'', ''Lesson planning'', ''Differentiated instruction'', ''Bilingual education (English‑Spanish)'', ''Educational technology integration'', ''Project‑based learning'',
    ''Parent and community outreach'', ''Collaborative problem solving'', ''Assessment design'', ''Flexible improvisational teaching'']'
  hobbies: '[''Soccer'', ''Cooking Mexican cuisine'', ''Hiking'', ''Playing acoustic guitar'', ''Songwriting'', ''Reading science‑fiction'', ''Indie video games'', ''Volunteer tutoring'', ''Attending cultural
    festivals'', ''Nature photography'']'
  career_goals: Gerardo aims to complete his full teaching credential and earn a Master’s in Education within the next three years. He aspires to become a curriculum specialist focusing on bilingual and
    culturally responsive curricula for elementary and middle‑school grades within the San Bernardino County district. He hopes to lead a professional learning community where teachers share innovative
    yet pragmatic teaching methods, and he envisions establishing a community after‑school program that blends academic support with cultural enrichment, allowing him to merge his curiosity for new ideas
    with practical impact on underserved students.
