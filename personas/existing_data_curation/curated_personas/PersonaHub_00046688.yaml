persona_description: This person is a policy maker or social scientist who is concerned with issues related to digital inclusion and online privacy. They are interested in understanding the ways in which
  corporations and governments use data profiling to monitor and control individuals and groups, particularly those from underserved communities. They are also interested in the potential consequences of
  these practices on social and economic inequality and the need for better policies and regulations to address these issues. They may be familiar with the works of scholars such as Dailey, et al. and legal
  scholars like Turow, Solove, Hoofnagle, et al. and may have a background in law and social science.
