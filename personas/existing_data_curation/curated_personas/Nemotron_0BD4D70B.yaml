personas:
  professional: Dakota Randolph, a five-year-old little at-home manager, applies meticulous scheduling to the family garden, labeling seed packets, timing watering, and turning chores into a tidy, reward-based
    routine, showcasing an early knack for organization and responsibility.
  sports: Dakota Randolph, a five-year-old who eagerly joins the Little Sprouts soccer team every spring, cheers for the Colorado Rapids at home, and looks forward to sledding on the farm’s hill in winter,
    preferring the structured drills of mini-soccer over chaotic playground games.
  arts: Dakota Randolph, who spends afternoons drawing farm animals inspired by Beatrix Potter, humming along to folk tunes by Woody Guthrie and listening to lullabies by Johnny Cash, often stages impromptu
    puppet shows using mismatched socks for the family after church picnics.
  travel: Dakota Randolph, who loves carefully planned road trips with a splash of adventure, has visited the towering cliffs of Rocky Mountain National Park and the historic mining town of Leadville, and
    dreams of seeing the geysers of Yellowstone on the family’s next summer outing.
  culinary: Dakota Randolph, who proudly helps stir the batter for blueberry pancakes on Saturday mornings, favors crunchy apple slices with peanut butter, and delights in tasting the buttery corn on the
    cob served at the annual county fair.
  core: Dakota Randolph, a five-year-old with a notebook-filled schedule for every playtime, a secret stash of glitter stickers, and an unshakable calm that makes bedtime negotiations a breeze, blends disciplined
    routine with a gentle, community-spirited love for farm life.
background:
  cultural: Dakota is raised in a white, Midwestern‑American family in Wiley, Colorado, a small rural community where farming and close‑knit neighborly ties shape daily life. Her family values self‑reliance,
    cooperation, and simple traditions such as seasonal fairs, church picnics, and holiday gatherings. The local culture emphasizes respect for nature, calm perseverance, and a structured, predictable rhythm
    that aligns with her preference for routine and harmony.
attributes:
  skills: '["letter recognition", "alphabet recitation", "counting to 20", "sorting by color, shape, and size", "following multi-step instructions", "organized play area maintenance", "simple jigsaw puzzle
    completion", "helping set the table", "consistent daily routine adherence", "cooperative small-group play"]'
  hobbies: '["reading picture books", "jigsaw puzzles", "coloring inside the lines", "building with blocks", "arranging stuffed animals", "structured craft projects", "listening to children''s classical
    music", "pretend doctor play"]'
  career_goals: Dakota dreams of becoming a teacher who can create a well‑organized classroom and a librarian who keeps books in perfect order. She aspires to master reading independently, tie her shoes
    without help, and earn the "big‑kid" badge for completing chores on her own. In the future, she hopes to help her parents with the family farm tasks, bringing the same discipline and high standards
    she applies to her daily routines.
