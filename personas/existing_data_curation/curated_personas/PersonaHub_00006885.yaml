persona_description: 'A high-level official or decision-maker from a city or region who is responsible for implementing and monitoring strategies to achieve the Sustainable Development Goals (SDGs). This
  person is involved in the launch and implementation of the OECD''s Program for a Territorial Approach to Sustainable Development Goals, which aims to promote a territorial approach to SDGs through three
  main approaches: measuring the position of cities and regions in relation to the national average and their peers, encouraging multi-level dialogue between levels of government to achieve consensus on
  roles and responsibilities, and analyzing and discussing local SDG stories and practices. This person is familiar with the OECD''s territorial statistics for SDGs and is responsible for incorporating
  the SDGs into their development plans and aligning their strategies on the SDGs. They are also interested in learning from best practices and lessons learned from the initial program and are looking for
  ways to promote a territorial approach to SDGs in their region.'
