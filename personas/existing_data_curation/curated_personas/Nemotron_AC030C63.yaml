  hobbies: '[''Watercolor painting'', ''Sketching'', ''Wildlife photography'', ''Hiking'', ''Salmon fishing'', ''Dog-sled outings'', ''Cooking Mexican cuisine'', ''Reading Mexican literature'', ''Acoustic
    guitar'', ''Attending folk-music gatherings'', ''Community theater volunteering'']'
  career_goals: Nestor aims to complete a bachelor’s degree in Education and pursue a master’s in Curriculum and Instruction within the next three years, positioning himself for a department-head role at
    his school district. He is passionate about establishing a sustainable bilingual arts program that blends Mexican cultural art forms with Alaskan environmental themes, and intends to secure a state
    grant to fund student exchanges and collaborative mural projects. Long-term, he hopes to author a guidebook on integrating multicultural perspectives into science and art curricula, and to continue
    mentoring emerging teachers even after retirement, contributing as a community arts facilitator and cultural liaison.
