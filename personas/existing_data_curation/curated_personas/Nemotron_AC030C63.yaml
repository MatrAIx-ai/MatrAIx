personas:
  professional: A bilingual secondary educator with three decades of experience, Nestor Fernandez designs culturally resonant, interdisciplinary curricula that weave Día de los Muertos storytelling, Indigenous
    environmental lore, and visual arts into standards‑aligned science and art units, while they mentor new teachers and orchestrate community exhibitions.
  sports: Nestor Fernandez enjoys seasonal outdoor pursuits, trekking the Tanana River trails in summer, ice‑fishing for salmon in winter, and they cheer for the Anchorage Seawolves while participating
    in the local Lamm River Dog‑Sled Club’s weekend outings.
  arts: Nestor Fernandez channels a love of visual storytelling into watercolor scenes of the Tanana River while they practice acoustic guitar to the tunes of José González, attend intimate folk gatherings
    featuring The Silver Sea duo, and they draw inspiration from Frida Kahlo’s vivid murals and Gabriel García Márquez’s magical realism.
  travel: Nestor Fernandez prefers thoughtfully planned trips that blend cultural immersion and natural wonder, such as a winter photography expedition to Tromsø to chase the aurora, a spring pilgrimage
    to San Miguel de Allende to observe Día de los Muertos festivities, and annual summer road trips along Alaska’s coastal highways to fish and hike with family, and they always pack a sketchbook for on‑the‑go
    watercolor studies.
  culinary: Nestor Fernandez is an experienced home cook who balances traditional dishes like tamales with mole sauce, chiles rellenos, and salsa verde alongside Alaskan salmon, incorporating ingredients
    such as smoked trout and spruce tips into fusion recipes like salmon enchiladas, and they relish experimenting with fresh cilantro, lime, and chipotle for layered flavor.
  core: Nestor Fernandez is a methodical, curious educator who blends solitary art practice with community storytelling, habitually over‑organizes lesson plans in color‑coded binders, yet often forgets
    to water houseplants during busy grading periods.
background:
  cultural: Nestor was raised in a Mexican-American family that emphasized bilingualism, traditional celebrations such as Día de los Muertos and Mexican Independence Day, and the rich artistic heritage
    of Mexico. After earning his associate’s degree in education in California, he moved to Alaska, attracted by its natural beauty and the opportunity to bring his cultural perspective to a new community.
    He maintains close ties to his Mexican roots through language, cuisine, and storytelling, while also respecting and learning from Alaska’s Indigenous cultures. This dual cultural awareness informs his
    teaching philosophy, allowing him to create inclusive classroom environments where Mexican, Indigenous, and broader American narratives intersect.
attributes:
  skills: '[''Bilingual Spanish-English'', ''Curriculum development'', ''Lesson planning'', ''Differentiated instruction'', ''Classroom management'', ''Educational technology integration'', ''Cross-cultural
