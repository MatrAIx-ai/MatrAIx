  career_goals: As she approaches retirement, Ashley aims to transition from full-time shop work to a mentorship role, training the next generation of local butchers and preserving traditional cuts. She
    is exploring the possibility of opening a small boutique storefront that focuses on locally sourced, sustainably raised meats and hosts community cooking workshops. Additionally, she intends to obtain
    a state-endorsed meat‑inspector certification to deepen her expertise and contribute to regional food‑safety initiatives.
