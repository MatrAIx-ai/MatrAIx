personas:
  professional: Ashley Plunket, a veteran butcher with four decades of mastery in meat processing, combines meticulous USDA‑compliant knife work, inventory control, and a curiosity for vacuum‑sealing and
    low‑temperature cooking to mentor apprentices while laying the groundwork for a boutique storefront that showcases sustainably sourced, locally raised cuts.
  sports: Ashley Plunket stays active through leisurely hikes along the Allegheny foothills, follows the Pittsburgh Steelers and Pittsburgh Penguins with enthusiastic devotion, and joins the senior center’s
    weekly bowling league, preferring low‑impact exercise to high‑intensity gym routines.
  arts: Ashley Plunket weaves intricate quilts inspired by Agnes Martin’s geometric serenity, lifts the church choir’s harmony with occasional renditions of Gillian Welch’s folk ballads, and debates the
    moral complexities of Hilary Mantel’s historical fiction during Saturday book‑club meetings.
  travel: Ashley Plunket favors short road trips to historic sites such as Gettysburg National Military Park and Shenandoah National Park, dreams of savoring Tuscany’s culinary delights on a future European
    tour, yet usually plans vacations around the senior center’s group travel discounts and a modest retirement budget.
  culinary: Ashley Plunket experiments with home‑cured pork sausage seasoned with fennel seed and smoked paprika, perfects a sweet‑heat barbecue rub for brisket, and sauces garden‑fresh tomatoes with basil,
    oregano, and a splash of red wine to create a rustic marinara that they share at community cooking workshops.
  core: Ashley Plunket balances the precision of a butcher’s blade with the patience of a gardener, mentoring young cutters while secretly hoarding an ever‑growing collection of vintage kitchen knives.
background:
  cultural: Ashley’s roots trace back to generations of European-American families who settled in northwestern Pennsylvania. She is of German‑Irish descent, a heritage reflected in the region’s farming
    traditions, community churches, and the emphasis on self‑reliance. Growing up in rural Crawford County, she was immersed in the county fair culture, family-run farms, and a close‑knit community where
    neighborly support and hard work are valued. Her cultural identity blends the modest, practical Mid‑Atlantic sensibility with a curiosity for preserving culinary traditions and sharing them with the
    younger generation.
