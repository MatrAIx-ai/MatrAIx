  hobbies: '[''Visiting Art Galleries'', ''Reading Fiction and Poetry'', ''Gardening'', ''Knitting'', ''Photography'', ''Listening to Jazz and Folk Music'', ''Attending Community Theater'', ''Book Club
    Participation'', ''Cooking Seasonal Meals'', ''Recording Oral Histories'']'
  career_goals: Although retired, Katelyn aims to stay active in her community through several personal ambitions. She hopes to become a volunteer docent at the Saratoga County Historical Museum, leading
    tours and sharing her love of art and local history. She wants to launch a weekly seniors’ art discussion group that meets in the town library, fostering creative exchange. Katelyn plans to complete
    an online certificate in art history to deepen her knowledge, and she dreams of compiling a memoir that weaves together her life story with oral histories of longtime residents. She also aspires to
    publish a small collection of short stories, travel to major art museums in New York City and Washington, D.C., and help develop a community garden program for seniors in Ballston Spa.
