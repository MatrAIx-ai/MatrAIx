  career_goals: Shirley aims to transition into a senior decision‑strategy role where she can guide large‑scale initiatives for cultural and public‑sector organizations. She plans to complete a bachelor’s
    degree in Applied Mathematics to deepen her technical foundation and pursue professional certification in data analytics. Over the next five years, she hopes to lead multi‑disciplinary teams, develop
    analytics frameworks that support arts funding and community development, and become a recognized speaker at industry conferences on the intersection of data science and creative industries. Mentoring
    emerging analysts and publishing a case‑study on creative problem‑solving in operations research are also key milestones in her career roadmap.
