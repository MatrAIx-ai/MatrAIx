personas:
  professional: Shirley Miller is a senior operations‑research analyst who translates complex linear‑programming models into vivid data stories, leveraging their curious, art‑infused mindset and relaxed,
    flexible work style to drive strategic decisions for cultural institutions.
  sports: Shirley Miller embraces a lively fitness routine that mixes weekly salsa cardio sessions with weekend pick‑up soccer at the Palm Beach Soccer Club, and as a devoted fan they cheer for the Miami
    Heat during NBA season while occasionally catching a Florida Panthers hockey game when the schedule permits.
  arts: Shirley Miller immerses herself in the West Palm Beach arts scene by sketching the Norton Museum's rotating exhibitions, capturing urban street moments à la Henri Cartier‑Bresson with her camera,
    dancing salsa to the rhythms of Celia Cruz, and performing improv sketches inspired by the irreverent satire of Tina Fey, while winding down with contemporary novels by Zadie Smith.
  travel: Shirley Miller prefers spontaneous, weekend‑long escapes that blend nature and culture, often hopping in her car for an impromptu drive to the Everglades or a quick flight to Key West, while dreaming
    of a Mediterranean sabbatical in Barcelona to explore Gaudí’s architecture and local tapas markets, all booked on a mix of last‑minute deals and flexible Airbnb rentals.
  culinary: Shirley Miller, a confident home chef, masterfully prepares Mediterranean staples like moussaka, shakshuka, and herb‑laden falafel using premium olive oil, sumac, and fresh za'atar, while also
    delighting in tasting authentic Greek souvlaki at local eateries and swapping recipes with fellow foodies during weekend cooking classes.
  core: Shirley Miller blends analytical rigor with artistic spontaneity, turning data models into stories while juggling a love for salsa, sketching, and occasional kitchen chaos.
background:
  cultural: Shirley is a White American who grew up in the Midwest before relocating to the coastal community of West Palm Beach, Florida. Her upbringing blended traditional Midwestern values of practicality
    and community with the diverse, multicultural atmosphere of South Florida. The region’s rich arts landscape and international tourism have broadened her worldview, encouraging an eclectic appreciation
    of global cultures while maintaining a strong sense of American identity. She enjoys integrating the relaxed, sunny lifestyle of Palm Beach County with her curiosity for new ideas, which informs both
    her professional approach and personal pursuits.
