personas:
  professional: Jack Hays, a budding block architect, approaches building play with a methodical, organized mindset that mirrors the precision of a future civil engineer.
  sports: Jack Hays eagerly watches the City Ducks, the local minor‑league baseball team, participates in a toddlers' soccer program at Riverside Community Center, and attends a parent‑guided gymnastics
    class where they love mastering the structured routine of a forward roll.
  arts: Jack Hays delights in the bright animation of Pixar’s 'Toy Story', sings along to the upbeat tunes of children's musician Laurie Berkner, and often draws vivid crayon pictures of ocean scenes while
    humming Idina Menzel’s 'Let It Go' from Frozen.
  travel: Jack Hays enjoys family trips to the sunny seaside town of Oceanview, where building sandcastles follows a step‑by‑step routine, dreams of exploring the interactive children's museum in Chicago,
    and is fascinated by tales of the fairytale castles of Bavaria, Germany, hoping to visit them someday.
  culinary: Jack Hays favors soft mac and cheese sprinkled with cheddar, banana slices drizzled with a hint of honey, and steamed carrot sticks, confidently uses a child‑safe spoon to stir a mild tomato
    bisque, and consistently declines any dish containing chili or strong spices.
  core: Jack Hays is a meticulously organized two‑year‑old who thrives on routine, guards a disciplined piggy bank habit, cautiously navigates new experiences, and turns everyday play into a competitive,
    structured adventure.
background:
  cultural: Jack is raised in a Southern white family in Grand Bay, Alabama, where community gatherings, church services, and family meals are central. He hears a gentle Southern accent at home, enjoys
    small‑town festivals, and experiences the warm, relaxed pace of coastal Alabama life.
attributes:
  skills: '["Basic sentence formation (≈200 words)", "Color and shape identification", "Block stacking (up to 6 blocks)", "Self‑feeding with spoon", "Following simple routines", "Toy sorting by type"]'
  hobbies: '["Playing with toy trucks and construction vehicles", "Building block towers", "Listening to picture books", "Dancing to nursery rhymes", "Crayon drawing", "Exploring backyard pond and watching
    wildlife"]'
  career_goals: Jack often talks about becoming a firefighter because he loves the big red trucks, and he dreams of helping people and playing with loud, flashing lights. He also expresses a simple desire
    to be a 'big helper' at home, assisting with chores and caring for his stuffed animals.
