  career_goals: Dean aims to advance to a regional security director role within the next five years, where he can implement a unified security technology platform across multiple sites. He wants to mentor
    emerging supervisors, creating a structured yet flexible training program that balances innovative ideas with tried‑and‑true methods. Long‑term, he envisions launching a boutique consulting firm that
    helps small businesses develop cost‑effective security strategies, allowing him to maintain a balanced lifestyle and stay connected to his community.
