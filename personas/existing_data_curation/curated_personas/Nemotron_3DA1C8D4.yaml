  hobbies: '["Abstract Photography", "Contemporary Art Exploration", "Speculative Fiction Reading", "Tabletop Strategy Games", "Hiking Coastal Trails", "Digital Illustration", "Experimental Cooking", "Vinyl
    Record Collecting", "Bike Maintenance", "Meditative Journaling"]'
  career_goals: James aims to ascend to senior leadership within the logistics sector, targeting roles such as Director of Supply Chain or Vice President of Distribution for a multinational firm. He plans
    to earn an MBA with a focus on supply‑chain strategy and to champion sustainable, technology‑enabled logistics networks that minimize carbon footprints while maximizing efficiency. Competitive by nature,
    he seeks to spearhead high‑visibility projects that position his organization as an industry innovator, and eventually to mentor emerging talent in the field.
