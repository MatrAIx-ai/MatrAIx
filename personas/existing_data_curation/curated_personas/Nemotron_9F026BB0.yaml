personas:
  professional: Danielle Lowe, a budding mini‑engineer in the making, meticulously stacks soft building blocks in perfect rows, exhibiting an early love for organization and a quiet curiosity that presages
    a future career in product design or mechanical engineering.
  sports: Danielle Lowe giggles while watching the Chicago Cubs on a small TV, clutching a miniature foam baseball cap, and they also participate in a parent‑and‑baby swim class at the Riverfront Aquatics
    Club each Tuesday, showing a gentle enthusiasm for team spirit and early physical activity.
  arts: Danielle Lowe delights in the soothing tones of Brahms' Lullaby while scribbling bold, blocky shapes with chunky crayons, often attempting to emulate the vivid color fields of Henri Matisse’s cutouts,
    reflecting their vivid imagination and solitary creative play.
  travel: Danielle Lowe’s travel log features family outings to the Grand Canyon’s rim, a weekend beach stay in Cape Cod, and a brief stop at the Eiffel Tower during a European vacation, illustrating a
    pattern of curated, short‑duration trips that blend adventure with the comfort of familiar caregivers.
  culinary: Danielle Lowe favors smooth, mildly sweet foods such as mashed avocado, sweet‑potato puree, and oatmeal blended with whole‑milk, yet they stubbornly refuse peas and demand their apple sauce
    be served at room temperature, a quirky palate preference that already shows selective taste.
  core: Danielle Lowe, a one‑year‑old with a vivid imagination and a methodical streak, spends hours arranging stuffed animals in tidy rows while whispering gentle stories to invisible friends, embodying
    both curiosity and a calm need for order.
background:
  cultural: Danielle is a Black child growing up in Goldsboro, North Carolina, within a close‑knit Southern African‑American community. Her family participates in local church gatherings where gospel music
    and communal worship are central. Family meals often feature soul‑food traditions such as collard greens, sweet potatoes, and fried chicken, and celebrations include cultural holidays like Juneteenth
    and Kwanzaa. The neighborhood’s extended family network provides a strong sense of belonging, and community events—parades, picnics, and church socials—expose her to storytelling, rhythmic clapping,
    and shared heritage that shape her early worldview.
