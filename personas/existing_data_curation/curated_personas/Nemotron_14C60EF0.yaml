  hobbies: '[''Community Event Hosting'', ''Community Theater'', ''Karaoke'', ''Book Club'', ''Bullet Journaling'', ''Puzzle Solving'', ''Spin Classes'', ''Yoga'', ''River Jogging'', ''Knitting'', ''Experimental
