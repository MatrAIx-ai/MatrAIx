  career_goals: Carla aims to become a certified production planner within the next two years, pursuing APICS CPIM certification and an associate’s degree in supply chain management. She envisions advancing
    to a logistics coordinator role, then transitioning into an operations manager position where she can lead a team, drive on‑time delivery performance, and implement lean initiatives across the facility.
    Long‑term, she aspires to shape strategic supply‑chain decisions and mentor junior staff, building a reputation for reliability and continuous improvement.
