personas:
  professional: Carla Bledsoe thrives as a production planning associate, employing SAP, Microsoft Dynamics, and advanced Excel pivot tables and macros to streamline inventory control and schedule expediting,
    while their methodical, detail‑oriented mindset and natural flair for public speaking make them the go‑to liaison for vendors and cross‑functional teams.
  sports: Carla Bledsoe fuels their fitness regimen with spin classes, sunrise yoga, and long jogging sessions along the Thames River as a member of the Thames River Runners club, cheering on the Boston
    Red Sox and New England Patriots while also following the local New London Rowing Association's regattas.
  arts: Carla Bledsoe channels their sociable energy into the New London Community Playhouse, where they frequently perform in improv evenings and karaoke shows, while dissecting contemporary novels by
    Sally Rooney and Hannah Fry in their book club and unwinding to playlists featuring Taylor Swift, Lin‑Manuel Miranda’s Hamilton soundtrack, and David Bowie.
  travel: Carla Bledsoe meticulously maps each getaway in their bullet‑journal, preferring weekend escapes to nearby historic sites like Mystic Seaport and Boston’s Freedom Trail, while dreaming of sailing
    the Greek Islands and trekking the Oregon Coast once they complete their APICS CPIM certification.
  culinary: Carla Bledsoe experiments in the kitchen with miso‑glazed black cod, avocado‑chocolate mousse, and a maple‑bourbon reduction over New England clam chowder, savoring flavors such as yuzu, smoked
    paprika, and fresh dill while hosting tasting evenings for friends.
  core: Carla Bledsoe is a structure‑loving, gregarious planner who balances methodical work with vibrant social life, often juggling meticulously organized schedules and spontaneous karaoke nights, yet
    habitually misplaces their house keys after late‑night cooking sessions.
background:
  cultural: Carla was raised in a middle‑class New England family of primarily Anglo‑American heritage in New London, Connecticut. Her upbringing emphasized independence, hard work, and community involvement,
    reflecting the region’s maritime legacy and small‑town values. Regular participation in local festivals, such as the New London Oyster Festival, and occasional family outings to coastal areas reinforced
    a connection to the sea and regional traditions. While her family maintains a modest Protestant background, they also value civic engagement, supporting local arts, and fostering inclusive social networks.
