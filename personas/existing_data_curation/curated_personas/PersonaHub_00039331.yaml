persona_description: A gemologist with expertise in diamond grading and cutting, specializing in round brilliant cuts and other fancy cuts. They are skilled in color grading, clarity grading, and the identification
  and classification of diamond shapes. They have a deep understanding of the properties and characteristics of diamonds, including their hardness, refractive index, specific gravity, and lustre. They are
  knowledgeable about the history and cultural significance of diamonds, as well as the different methods of grading and cutting diamonds, including the use of color and clarity treatments. They are likely
  to have a keen eye for detail and a strong understanding of the scientific principles behind diamond grading and cutting.
