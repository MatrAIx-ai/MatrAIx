  hobbies: '[''basketball'', ''soccer'', ''hiking'', ''live music concerts'', ''volunteering at animal shelter'', ''cooking'', ''board game nights'', ''photography'', ''reading non‑fiction'', ''DIY home
    improvement'']'
  career_goals: Michael aims to secure a full‑time role in project coordination or community outreach within a mid‑sized nonprofit or corporate environment, where he can combine his organizational talents
    with his love for teamwork and social impact. Over the next five years he hopes to advance to a program manager or operations manager position, develop deeper expertise in data‑driven project evaluation,
    and eventually lead a community‑focused initiative that fosters local engagement and harmony. He is also open to eventually launching his own small venture—a community hub or co‑working space—that blends
    his practical skills with his sociable personality.
