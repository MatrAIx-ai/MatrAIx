personas:
  professional: Shelbie Kiser, a veteran retail and service sector project manager with three decades of experience, blends meticulous organizational skills with a curiosity for the arts, and they now lead
    cross‑functional teams that embed gallery tours and community‑theatre workshops into corporate social‑responsibility initiatives, balancing structure with creative flexibility while fostering a harmonious
    workplace.
  sports: Shelbie Kiser, an avid line‑dancer and yoga enthusiast, cheers for the Charleston Battery soccer team, joins a community softball league each spring, hikes the trails of Francis Marion National
    Forest on weekends for cardio, and they frequently organize charity walks that combine fitness with local history awareness, reflecting their sociable, outgoing nature and love for group activities.
  arts: Shelbie Kiser, a regular volunteer at the North Charleston history museum and a community‑theater performer, draws inspiration from Tennessee Williams and the folk‑rock sounds of The Avett Brothers,
    curates traveling exhibitions featuring emerging painter Sarah Foster, and they love collaborating with local artisans to blend storytelling and visual art in public spaces, showcasing their curiosity
    and appreciation for new ideas.
  travel: Shelbie Kiser, a passionate explorer of historic locales, returns to Savannah’s riverfront and New Orleans’ French Quarter for preservation tours, dreams of experiencing the Venice Biennale, prefers
    organized group itineraries that weave museum visits with culinary tastings, and they keep a journal of architectural sketches from each trip, balancing their love of structure with spontaneous curiosity.
  culinary: Shelbie Kiser, an enthusiastic Southern cook, harvests heirloom tomatoes and okra from the raised‑bed garden to craft shrimp and grits, collard greens with smoked turkey, and sweet tea scented
    with fresh mint, experiments with Oaxacan spice blends from recent travels, and they often host family potlucks where they meticulously arrange dishes on vintage serving trays, reflecting both their
    organizational flair and playful culinary curiosity.
  core: Shelbie Kiser, a curious, organized, sociable 59‑year‑old, channels a love of art and community into vibrant cultural projects, while they collect vintage tabletopware that sometimes overfills the
    garden shed and nurture a habit of postponing doctor’s appointments until symptoms flare, revealing a quirky blend of meticulousness and occasional procrastination.
background:
  cultural: Shelbie was born and raised in a middle‑class family in the Lowcountry of South Carolina. Growing up during the 1960s and 1970s, she experienced the region’s strong sense of community, the warmth
    of Southern hospitality, and the evolving cultural landscape of Charleston’s historic district. Her family has roots in small‑scale farming and local business, instilling values of hard work and self‑reliance.
    A lifelong member of an Episcopal church, she participates in community service and celebrates regional traditions such as Lowcountry cuisine, Gullah storytelling, and local festivals. While she cherishes
    these Southern influences, her curiosity and openness have led her to embrace diverse artistic expressions and multicultural experiences.
