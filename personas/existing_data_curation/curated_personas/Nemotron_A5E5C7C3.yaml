  career_goals: Shelbie aims to transition into a senior leadership role that blends her managerial expertise with her passion for the arts, such as becoming a Director of Community Engagement for a cultural
    nonprofit or leading corporate social responsibility programs that support local artists. She plans to earn a certification in nonprofit management, expand her network within the Charleston arts community,
    and eventually mentor emerging women leaders in the region. In the longer term, she aspires to serve on the board of a regional museum or arts council, influencing policy and programming that enriches
    the cultural fabric of her community.
