  career_goals: Although currently not employed, Edward aims to leverage his organizational strengths and community mindset by establishing a part‑time consulting service for local small‑business owners,
    offering bookkeeping and process‑improvement advice. He also hopes to expand his volunteer leadership role at the Cadott public library and community center, eventually mentoring younger residents in
    practical skills like gardening and woodworking. On a personal level, he seeks to complete a comprehensive guide to sustainable backyard gardening and to deepen his understanding of regional genealogy.
