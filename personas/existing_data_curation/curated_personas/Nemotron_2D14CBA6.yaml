  career_goals: She aspires to earn her GED and enroll in a community college art program, aiming to become a professional illustrator for children’s books that celebrate Black stories and Southern folklore.
    In the longer term, she hopes to combine her artistic talent with her compassion by working as a youth mentor or art therapist, using creative expression to support teens dealing with anxiety and sadness.
