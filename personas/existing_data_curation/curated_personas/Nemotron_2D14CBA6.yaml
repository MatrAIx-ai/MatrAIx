personas:
  professional: Tracey Jackson is an aspiring children's book illustrator who channels the piney woods of their hometown and the soulful harmonies of church gospel into whimsical watercolor scenes, and
    they balance a vivid imagination with a laid‑back approach to deadlines, often sketching late into the night while juggling school obligations.
  sports: Tracey Jackson enjoys informal morning runs through the pine‑covered trails near Gibsland and cheers for the LSU Tigers football team and the New Orleans Saints, while they occasionally join a
    community youth soccer league that meets after school, preferring low‑key activity over competitive sports.
  arts: Tracey Jackson immerses themselves in creative expression by drawing inspiration from the lyrical storytelling of Maya Angelou, the melodic vibes of H.E.R., and the vibrant brushwork of Faith Ringgold,
    contributing weekly poems to their church's poetry circle and crafting collages from found objects during local art workshops.
  travel: Tracey Jackson dreams of exploring historic sites in Savannah, the jazz lanes of New Orleans, and the art museums of Paris, often planning trips with a scrapbook of pressed pine needles and postcards,
    but limited funds keep most journeys to weekend road trips to nearby state parks.
  culinary: Tracey Jackson loves cooking collard greens seasoned with smoked turkey, simmering gumbo with okra and roux, and baking peach cobbler topped with buttery crumble, showcasing a budding culinary
    skill level that blends family recipes with experimental twists like adding a hint of cinnamon to traditional jambalaya.
  core: Tracey Jackson is a day‑dreaming teen illustrator who balances boundless creativity with anxiety‑driven night‑owl habits, a love for soulful music, and a habit of misplacing art supplies.
background:
  cultural: Tracey grew up in a close‑knit Black family in Gibsland, Louisiana, where church, gospel music, and Southern cooking are core parts of daily life. Family stories about the civil‑rights era and
    local African‑American traditions shape her sense of identity. She participates in community events like Juneteenth celebrations and church picnics, and she often helps prepare dishes such as collard
    greens, gumbo, and peach cobbler. The cultural tapestry of the Deep South—its rhythm, oral storytelling, and resilience—infuses her artistic outlook and provides a steady source of inspiration.
