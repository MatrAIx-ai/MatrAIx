personas:
  professional: Long Vo is a seasoned full-stack software developer who leverages deep expertise in JavaScript, Python, and cloud ecosystems to build scalable products, while their spontaneous curiosity
    drives them to prototype artistic UI experiments and mentor junior teammates in a harmony-focused collaborative environment.
  sports: Long Vo enjoys weekend hikes through the Watchung Mountains, they follow the New York Rangers for ice hockey, run with the local Union Marathon Club, and occasionally join a friendly soccer match
    with the Red Bulls fan group, balancing fitness with a love for community sport gatherings.
  arts: Long Vo frequents contemporary galleries in New York City, drawing inspiration from artists like Ai Weiwei, James Turrell, and Banksy, while practicing digital photography and illustration that
    they share on Instagram, and they regularly attend board-game nights that serve as creative brainstorming sessions.
  travel: Long Vo prefers spontaneous, design-inspired trips, they often jet-setting to Kyoto to explore historic temples during the cherry-blossom season, then hopping to Marrakech for its vibrant souks,
    but typically reserve weekends for short drives to the Hudson Valley's farm-to-table retreats.
  culinary: Long Vo experiments with fusion dishes such as miso-glazed lamb tacos, ramen-infused paella, and bao-styled dumplings filled with Sichuan peppercorn chicken, savoring fresh cilantro, ginger,
    and gochujang, while they host elaborate dinner parties where they showcase both traditional and inventive flavors.
  core: Long Vo blends code and canvas, habitually sketching UI concepts on napkins during board-game nights, yet they often wrestle with deadline anxiety due to their love of spontaneous creative detours.
background:
  cultural: Long comes from an East Asian heritage, raised in a bilingual household where his family's native language and English coexisted. His upbringing emphasized respect for education, collective
    harmony, and close intergenerational ties. He celebrates traditional festivals such as Lunar New Year and Mid‑Autumn Festival, and he incorporates cultural culinary practices into his cooking. Living
    in Union, NJ, he navigates a multicultural environment, integrating his cultural values of cooperation, humility, and community into both his personal life and collaborative work style.
