personas:
  professional: Stephanie Shields is a senior audit specialist at a Milwaukee nonprofit, leveraging her advanced expertise in financial accounting, audit procedures, and data analysis to build meticulous,
    technology-driven workflows, and they use her disciplined, compassionate nature to mentor junior staff and translate complex findings into clear guidance for stakeholders.
  sports: Stephanie Shields enjoys weekend hikes on the Ice Age Trail with the Milwaukee Trail Hikers club, follows the Milwaukee Bucks and Brewers faithfully, and they schedule morning yoga sessions to
    maintain flexibility while occasionally joining a co-ed summer softball league for team camaraderie.
  arts: Stephanie Shields spends her evenings discussing contemporary fiction by authors such as Sally Rooney and Zadie Smith at her book club, attends concerts featuring Sufjan Stevens and Bon Iver when
    they tour the Midwest, and they regularly visit the Milwaukee Art Museum to admire works by Georgia O'Keeffe and local Impressionist painters.
  travel: Stephanie Shields plans meticulously, favoring a mix of short weekend getaways to Door County and Chicago and longer cultural trips to Edinburgh and Iceland, and they balance their love for nature
    with a limited budget that prioritizes off-season travel and utilizes points from a travel rewards credit card.
  culinary: Stephanie Shields, an avid craft-beer connoisseur, often pairs her homemade bratwurst and cheese-curd skillet with locally roasted rosemary potatoes, whips up a quinoa-kale salad with lemon-garlic
    dressing for lunch, and they experiment with seasonal produce from her garden such as heirloom tomatoes and sweet corn.
  core: Stephanie Shields blends razor-sharp organization with a craving for spontaneous craft-beer tastings, often juggling a packed audit schedule while still carving out evenings for crosswords, yoga,
    and a stubborn habit of over-watering her garden, and they never miss a chance to knit a scarf for a charitable drive.
background:
  cultural: Stephanie was raised in Saint Francis, a suburban community in Milwaukee County, in a middle‑class family of German‑Polish descent. The region’s Midwestern values—practicality, punctuality,
    and a strong work ethic—shaped her disciplined approach to both career and life. Growing up in a culturally diverse environment, she was exposed to a blend of Catholic and Lutheran traditions, community
    volunteerism, and a close‑knit neighborhood culture that emphasizes helping neighbors. These influences underpin her compassionate, cooperative nature and her commitment to community service.
