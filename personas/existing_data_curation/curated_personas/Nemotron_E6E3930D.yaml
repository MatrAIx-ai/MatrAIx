  hobbies: '[''Gardening'', ''Yoga'', ''Hiking'', ''Volunteer Tax Assistance'', ''Book Club'', ''Crossword Puzzles'', ''Sudoku'', ''Craft Beer Tasting'', ''Knitting'']'
  career_goals: Stephanie aims to become a Certified Public Accountant and progress to senior audit manager within the next five years, eventually pursuing a CFO role in a mid‑size company or nonprofit
    organization. She seeks to lead audit teams, implement technology‑driven efficiencies, and mentor junior staff. Additionally, she aspires to expand her impact by directing community financial‑literacy
    programs and offering pro‑bono tax assistance to low‑income families in the Milwaukee area.
