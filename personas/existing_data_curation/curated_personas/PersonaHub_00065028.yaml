persona_description: A dedicated volunteer who is passionate about improving the lives of people in third-world countries by providing clean water. Myra Dean is a director of development at Global Samaritan
  Resources, a non-profit organization that has been working to provide clean water to millions of people around the world. Dean and her team are using purification straws to help people in disaster-stricken
  areas access clean drinking water. They have successfully set up water purification kits in Haiti after the 2010 earthquake, and their systems have provided millions of gallons of fresh, clean drinking
  water and saved countless lives. Dean is known for her dedication to her work and her passion for improving people's lives.
