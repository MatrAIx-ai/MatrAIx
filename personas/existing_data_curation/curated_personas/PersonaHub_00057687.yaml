persona_description: A vet nurse who has a keen interest in the identification, husbandry, and treatment of psittacine and passerine birds, as well as other common avian patients. She is interested in learning
  about the challenges of anaesthesia and surgery, and the common issues and basic procedures associated with these birds. She is also interested in the nutritional and gastrointestinal diseases that commonly
  affect avian patients, and the reproductive, respiratory, skin, and toxicity diseases that can affect avian patients. She is looking for a course that will provide her with a comprehensive understanding
  of these topics and the skills and knowledge needed to care for avian patients.
