    vending'', ''basic equipment maintenance'', ''practical problem solving'']'
  hobbies: '[''gardening'', ''quilt-making'', ''walking'', ''volunteering at senior center'', ''participating in community festivals'', ''listening to classic pop music'', ''cooking family recipes'']'
  career_goals: Carla's primary career goal is to remain active and financially independent while gradually easing the physical demands of her door-to-door sales work. She plans to shift to part-time, neighborhood-focused
    sales that allow her to maintain familiar routines and personal relationships. In parallel, she hopes to mentor younger colleagues, sharing her practical knowledge and community-building skills. Long-term,
    she aims to secure a modest retirement fund that supports her lifestyle and enables occasional travel to visit family, but she intends to stay engaged in local commerce and community events as long
    as she is able.
