personas:
  professional: Tracy Enos is a proficient sheet‑metal worker who blends hands‑on craftsmanship with CNC technology, quickly mastering hand‑forming and automated punch‑press techniques while channeling
    their spontaneous curiosity into innovative alloy experiments and using their talkative, collaborative style to mentor apprentices and keep safety standards high despite occasional deadline chaos.
  sports: Tracy Enos pitches in a co‑ed softball league called the Fredericksburg Falcons, hikes the Blue Ridge Mountains each fall, and follows the Washington Capitals and Washington Commanders, training
    with a local gym on off‑season days while treating the soft‑ball schedule as a social rally rather than a strict competition.
  arts: Tracy Enos lights up Friday karaoke nights belting out Beyoncé anthems, improvises with the community‑theater troupe The Improvinators, and sculpts metal pieces inspired by the angular forms of
    David Smith, all while collecting vinyl records from artists like The Strokes and enjoying stand‑up comedy specials by John Mulaney.
  travel: Tracy Enos prefers spontaneous weekend road trips, having driven the Skyline Drive to Shenandoah for a sunrise hike, dreaming of a future trek through the fjords of Norway, while balancing a modest
    student‑loan budget that steers them toward affordable domestic adventures over pricey overseas tours.
  culinary: Tracy Enos experiments with smoky Texas brisket rubs featuring brown sugar, paprika, and cumin, pairs their BBQ creations with local Virginia IPAs like Darkhorse, and casually dabbles in making
    kimchi, all while boasting a functional kitchen that feels more like a workshop than a gourmet studio.
  core: Tracy Enos is a sociable, improvisational sheet‑metal artisan who balances a love for loud karaoke and metal art with a tendency to procrastinate on deadlines and splurge on craft brews.
background:
  cultural: Tracy grew up in Fredericksburg, Virginia, a town steeped in American history and a blend of Southern hospitality and Mid‑Atlantic pragmatism. Her family values a strong work ethic, community
    involvement, and respect for tradition, while also encouraging curiosity and personal expression. She attended a local high school that offered vocational training, which sparked her interest in the
    trades. The region’s close‑knit community, historic festivals, and emphasis on craftsmanship have shaped her appreciation for hands‑on work, collaborative environments, and an openness to new ideas
    within a framework of proven methods.
attributes:
  skills: '[''Sheet metal cutting'', ''Metal bending and forming'', ''MIG/TIG welding'', ''Blueprint reading'', ''CNC punch press operation'', ''Hand tool proficiency'', ''Material selection'', ''Safety
