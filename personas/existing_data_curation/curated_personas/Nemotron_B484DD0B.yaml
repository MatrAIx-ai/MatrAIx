  hobbies: '[''Karaoke and live music'', ''Community theater improv'', ''Softball league'', ''Hiking in Shenandoah'', ''DIY metal art projects'', ''Bike customizing'', ''Cooking and BBQ experimentation'',
    ''Craft brewery tastings'', ''Volunteer mentorship for youth apprentices'', ''Attending trade expos'']'
  career_goals: Tracy aims to earn advanced certifications such as a SME sheet‑metal certification and a welding qualification within the next three years, and to complete an associate’s program in manufacturing
    technology. Her long‑term ambition is to become a forewoman or shop supervisor, leading a diverse team while fostering a supportive, safety‑first culture. Eventually, she hopes to launch her own custom
    metal‑fabrication studio that blends functional structures with artistic metal sculpture, and to serve as a mentor championing more women entering the trades.
