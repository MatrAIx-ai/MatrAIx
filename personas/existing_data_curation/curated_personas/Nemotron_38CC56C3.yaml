personas:
  professional: Marcia Hevia is a bilingual restaurant server in the Rio Grande Valley whose knack for juggling multiple tables, swift POS transactions, and calming upset diners reflects their energetic,
    sociable nature, while a relaxed attitude toward rigid schedules fuels a curiosity‑driven push toward hospitality management and visual‑arts studies.
  sports: Marcia Hevia stays fit by joining high‑energy Zumba classes three times a week, cheering on the Rio Grande Valley FC Toros in the USL Championship, and swapping weekend soccer matches with friends,
    all while embracing a social, flexible approach to exercise.
  arts: Marcia Hevia immerses herself in the regional art scene, sketching vibrant street murals, curating photos of market stalls, and dancing to live sets by Tejano band Los Lobos and cumbia group Grupo Cumbia Nacional
    while drawing inspiration from Frida Kahlo’s bold colors.
  travel: Marcia Hevia prefers spontaneous weekend getaways—last summer they road‑tripped to Austin’s South Congress for live music, they dream of a future cultural immersion tour of Oaxaca’s culinary markets,
    yet their relaxed planning style often leads to last‑minute bookings and occasional budget overruns.
  culinary: Marcia Hevia’s kitchen is a laboratory where they reimagine tacos with mango‑ancho salsa, perfect chorizo tamales, and smoky grilled corn, blending traditional Mexican flavors with daring twists
    while occasionally over‑seasoning in a burst of creative exuberance.
  core: Marcia Hevia is a charismatic, community‑driven hospitality enthusiast whose love for art and lively gatherings is tempered by a carefree knack for misplacing keys and a lingering undercurrent of
    anxiety about the future.
background:
  cultural: Marcia was born and raised in Mission, Texas, a border city where Mexican and American cultures intertwine daily. She grew up in a bilingual household, speaking Spanish with her parents and
    grandparents while using English at school and work. Family gatherings are centered around traditional Mexican cuisine, music, and celebrations such as Día de los Muertos, Cinco de Mayo, and quinceañeras,
    which have instilled in her a deep appreciation for her heritage. The community’s strong sense of collectivism and mutual support shaped her cooperative nature and her desire to contribute to local
    events. At the same time, she has been exposed to U.S. media, education, and the entrepreneurial spirit of the Rio Grande Valley, giving her a bicultural perspective that informs her personal and professional
    aspirations. This blend of Mexican roots and border‑region experiences fuels her love for art, food, and community engagement, and motivates her to bridge cultures through her work and creative pursuits.
