  career_goals: Marcia aims to turn her hands‑on restaurant experience into a pathway toward hospitality leadership and cultural entrepreneurship. In the next year she plans to enroll in a community‑college
    program in hospitality management while taking evening courses in visual arts. Her short‑term goal is to be promoted to shift supervisor, where she can learn scheduling, inventory control, and staff
    mentorship. Long‑term, she dreams of opening a community‑focused café that doubles as a gallery for local Mexican‑American artists, offering a space where patrons can enjoy traditional dishes alongside
    rotating art exhibits. She also hopes to develop strong leadership skills so she can create a supportive, inclusive work environment for future staff, and eventually mentor other young people from her
    neighborhood who share her passion for service and culture.
