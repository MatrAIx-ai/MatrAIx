  hobbies: '[''Yoga'', ''Meditation'', ''Journaling'', ''Cooking'', ''Hiking'', ''Reading mystery novels'', ''Travel photography'', ''Knitting'', ''Watching TV series'', ''Volunteering at community center'']'
  career_goals: Melanie aims to progress to a senior cabin crew or lead flight attendant position within the next three years, where she can mentor new hires and oversee crew scheduling. She plans to obtain
    a certification in aviation safety management and eventually transition to a ground‑based role such as airport customer service manager or airline operations trainer. Balancing her desire for structure
    with the flexibility of airline schedules, she also hopes to complete a bachelor’s degree in aviation management while building a stable family life in the Chicago area.
