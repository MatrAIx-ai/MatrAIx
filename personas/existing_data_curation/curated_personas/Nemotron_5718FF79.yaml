  career_goals: David dreams of combining his love for art and his desire to help others by becoming a community muralist who creates vibrant, story‑filled artwork in public spaces. He is also fascinated
    by the natural world and hopes to study wildlife as a future environmental scientist or wildlife biologist. Occasionally, he imagines designing simple inventions that make everyday life easier for his
    friends, reflecting his early interest in problem‑solving. Ultimately, he sees himself in a role that blends creativity, curiosity, and service to his community.
