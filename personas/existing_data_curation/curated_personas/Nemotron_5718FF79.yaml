personas:
  professional: David Beckman is a budding junior illustrator and novice coder who channels their curiosity for the natural world into detailed watercolor landscapes of Hocking Hills while they collaborate
    on Scratch projects with the school STEM club, blending reliable organization with an open‑minded, adventurous approach to creative problem‑solving.
  sports: David Beckman is an energetic member of the Hocking Hills Hurricanes U‑10 soccer team, who thrives on group games of tag at recess, avidly supports the Ohio State Buckeyes football team and the
    Cincinnati Bengals, tackles fitness with boundless enthusiasm but often forgets to stretch after practice, and values teamwork as an expression of their sociable, cooperative spirit.
  arts: David Beckman is a budding visual storyteller who fills sketchbooks with watercolor renditions of Hocking Hills inspired by Winslow Homer, crafts comic strips that echo Bill Watterson’s Calvin and
    Hobbes, sings in the school choir while admiring the Vienna Boys’ Choir, and practices the recorder to the melodies of Yo‑Yo Ma, all guided by an open‑minded curiosity and a kind, collaborative mindset.
  travel: David Beckman loves weekend hikes through Hocking Hills State Park, day trips to the Columbus Museum of Art and the Cincinnati Zoo, dreams of a family road adventure to Yellowstone National Park,
    plans outings with hand‑drawn maps and a snack‑packed backpack, yet occasionally forgets sunscreen, reflecting their flexible yet organized travel style.
  culinary: David Beckman is an enthusiastic kitchen helper who can whisk together a reliable peanut butter and jelly sandwich, blend a smooth banana‑strawberry smoothie, frequently requests homemade blueberry
    muffins with fresh berries, delights in pepperoni pizza with extra cheese, and enjoys crisp apple slices, though they sometimes over‑salt the popcorn during movie nights, showcasing their experimental
    curiosity mixed with occasional messy habits.
  core: David Beckman is an adventurous, art‑obsessed nine‑year‑old who blends curiosity for nature, a love of storytelling through watercolors and comics, and a sociable, cooperative spirit into a lively,
    slightly messy, yet reliably organized life.
background:
  cultural: David grew up in Lancaster, a small town in Hocking County, Ohio, a region known for its tight‑knit Midwestern values, community festivals, and easy access to the Hocking Hills State Park. His
    family’s heritage reflects the common German‑Irish ancestry of many local white families, influencing holiday traditions, homemade cooking, and a strong emphasis on family gatherings. The community’s
    focus on neighborly support, church involvement, and outdoor recreation shapes his cooperative and sociable nature. Local school programs emphasize arts, teamwork, and experiential learning, reinforcing
    his curiosity about art, science, and new ideas.
