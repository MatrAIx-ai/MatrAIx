  career_goals: Jorge dreams of turning his curiosity into practical impact. He imagines leading a school science club where he can design experiments and guide younger students, and he hopes to become
    a community engineer who creates safe play spaces in the Bronx. He also loves soccer and picture himself on a professional team, using his platform to mentor kids from his neighborhood. Ultimately,
    he wants a career that blends creativity, leadership, and service, whether as an engineer, a teacher, or a professional athlete.
