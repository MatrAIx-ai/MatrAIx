personas:
  professional: Jorge Romero, an enthusiastic 8‑year‑old budding programmer and LEGO architect, blends their curiosity with practicality by turning Scratch game ideas into tangible LEGO mechanisms and eagerly
    shares their creations during school tech clubs.
  sports: Jorge Romero loves pickup soccer games at the neighborhood park, idolizes the city’s professional team Metro United, and plays for the local under‑9 soccer club, always sprinting to the goal with
    the energy of an outgoing teammate.
  arts: Jorge Romero expresses creativity through merengue steps taught by their aunt, sketches lively cartoon characters inspired by Adventure Time and Spider‑Man, and hosts pretend radio shows where they
    imitate favorite voices, all while humming to the upbeat rhythms of Kidz Bop.
  travel: Jorge Romero prefers short family road trips to nearby beaches and the state’s interactive science museum, enjoys planning the itinerary with crayons, and dreams of exploring the dinosaur fossil
    sites at the national park and the bustling streets of Tokyo.
  culinary: Jorge Romero favors cheesy pizza, chicken nuggets, and fruit smoothies, enjoys building snack plates that resemble LEGO structures, and gleefully experiments with mixing diced mango and pineapple
    into a tropical salsa for extra flavor.
  core: Jorge Romero is an outgoing 8‑year‑old who fuses a love for soccer, coding, and LEGO into endless projects, never hesitates to be the centre of attention, and balances a playful curiosity with a
    surprisingly disciplined savings habit.
background:
  cultural: Jorge grows up in a bilingual Dominican household in the Bronx, where Spanish and English flow interchangeably at home and school. Family gatherings often feature traditional dishes like mangú
    and plantains, and the lively rhythms of merengue and bachata fill celebrations, sparking his love for dance. The Bronx's multicultural neighborhoods expose him to hip‑hop, jazz, and Caribbean influences,
    shaping a broad musical palate and a strong sense of community. His parents emphasize respect for Dominican heritage while encouraging participation in local festivals, school cultural events, and community
    service projects, giving him a proud, rooted identity that blends Caribbean traditions with urban New York life.
attributes:
  skills: '["Bilingual communication (English/Spanish)", "Fluent reading comprehension", "Basic arithmetic", "Introductory coding with Scratch", "Collaborative teamwork", "Soccer coordination and dribbling",
