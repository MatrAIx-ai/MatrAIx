persona_description: A researcher and scientist who specializes in the study of muscle function and endurance, particularly the role of the IL-15R-alpha gene in defining the function of fast skeletal muscles.
  They are interested in the molecular and physiological alterations that occur in fast muscles in response to the loss of IL-15R-alpha, as well as the potential for muscle reprogramming to perform better
  at endurance sports. They are also interested in the role of IL-15R-alpha in obesity, diabetes, aging, and muscle diseases, and are working towards developing methods to harness the therapeutic potential
  of it for patients. They are part of a team that has published a study in the Journal of Experimental Biology, and is funded by various organizations including the National Institute of Arthritis and
  Musculoskeletal and Skin Diseases, the National Eye Institute, the National Institute on Aging, and the VA Puget Sound Health Care System.
