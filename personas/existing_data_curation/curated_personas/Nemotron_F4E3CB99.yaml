  career_goals: She plans to complete a Bachelor of Science in Nursing within two years, then pursue a Master’s degree with a focus on nursing informatics or acute care. Her long-term ambition is to become
    a Clinical Nurse Specialist in pediatric oncology, where she can develop interdisciplinary art-therapy programs that address the emotional needs of young patients. She also aims to obtain board certification
    in nursing informatics to lead data-driven quality improvement initiatives and eventually influence health policy on patient-centered care and cultural competency within the Bay Area health system.
