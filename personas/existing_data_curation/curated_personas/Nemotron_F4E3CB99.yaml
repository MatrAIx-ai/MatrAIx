personas:
  professional: Kyung Chang, a registered nurse with a talent for meticulous clinical documentation and bilingual communication, blends artistic visual storytelling into patient education while leading
    quality‑improvement projects, reflecting their imaginative yet methodical nature.
  sports: Kyung Chang maintains a low‑key fitness routine that includes weekly yoga at a quiet studio and weekend hikes with the Bay Trails Club, while cheering for the Golden State Warriors and the San
    Francisco Giants, reflecting their calm, methodical approach to staying active without the pressure of competitive sports.
  arts: Kyung Chang immerses themselves in surreal watercolor landscapes and digital illustrations inspired by Dalí and James Turrell, practices traditional calligraphy as a meditative craft, and finds
    creative fuel in the ambient sounds of Radiohead and Björk while regularly attending exhibitions at the San Francisco Museum of Modern Art.
  travel: Kyung Chang prefers thoughtfully planned, low‑key getaways that balance photography excursions in places like Yosemite and the coastal towns of Big Sur with cultural immersion during a recent
    trip to Kyoto, while dreaming of an upcoming adventure to Iceland’s geothermal caves, all while budgeting within a modest student allowance.
  culinary: Kyung Chang, an intermediate home cook, delights in creating fusion dishes such as kimchi‑fried rice topped with avocado slices and a splash of gochujang, alongside California‑inspired quinoa
    bibimbap bowls featuring roasted sweet potatoes and nori, often sourcing fresh produce at the local farmer’s market and experimenting with seasonal herbs like cilantro and mint.
  core: Kyung Chang is a calm, methodical nursing student who channels an imaginative spirit into watercolor art and fusion cooking, yet secretly hoards stray coffee mugs and occasionally neglects flossing.
background:
  cultural: Kyung U Chang is a second‑generation Korean American raised in a bilingual household in the San Francisco Bay Area. Her parents instilled respect for Korean traditions, language, and communal
    values while encouraging independence and academic achievement typical of American culture. She celebrates Korean holidays such as Seollal and Chuseok, enjoys Korean cuisine, and maintains close ties
    with the local Korean community. At the same time, she embraces the multicultural environment of San Mateo, which informs her culturally competent nursing practice, allowing her to navigate both Korean
    and broader American patient perspectives with sensitivity.
