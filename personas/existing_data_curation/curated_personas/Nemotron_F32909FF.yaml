    and tai chi'', ''Traveling to Southeast Asia'', ''Karaoke nights'', ''Birdwatching in Katy nature preserve'', ''Hosting book club discussions'']'
  career_goals: Nenita aspires to move into a senior leadership role, such as Head Librarian or Director of Community Services, within a regional public library system. She is driven to launch a comprehensive
    digital archive that preserves the histories and stories of the Southeast Asian community in the Greater Houston area. To support this vision, she plans to pursue an MLIS with a focus on digital preservation,
    secure grant funding for multilingual resource initiatives, and establish partnerships with local schools, museums, and cultural organizations. Long‑term, she hopes to mentor the next generation of
    librarians, champion inclusive collection policies, and leave a lasting impact on community access to knowledge and cultural heritage.
