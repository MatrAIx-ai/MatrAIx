personas:
  professional: Sook Yan is a budding marketing communications enthusiast who leverages strong public speaking, Canva design, and meticulous event‑planning skills to craft structured campaigns for school
    clubs and local community events, and they thrive on turning ideas into clear, organized messages.
  sports: Sook Yan competes in the local junior badminton league at the community center, joins the school’s casual ping‑pong club, and passionately supports Liverpool FC in the Premier League, and they
    use the team’s discipline as motivation for personal fitness.
  arts: Sook Yan shines in school drama productions, belts out K‑pop hits like BTS and BLACKPINK during karaoke nights, and creates eye‑catching posters with Canva for club events, and they love the buzz
    of being the focal point of a performance.
  travel: Sook Yan prefers short weekend trips to nearby cultural festivals and dreams of a solo backpacking adventure through Seoul’s K‑pop hotspots and a relaxing surf getaway in Bali, and they meticulously
    plan each itinerary to balance fun and budget.
  culinary: Sook Yan enjoys crafting homemade dumplings (jiaozi) and sizzling stir‑fried bok choy with garlic, while occasionally experimenting with bubble tea recipes featuring fresh fruit boba, and they
    take pride in feeding friends and family during holiday gatherings.
  core: Sook Yan blends a competitive, structure‑driven mindset with a sociable, performance‑loving personality, juggling meticulous budgeting, aggressive gaming tactics, and an ever‑evolving karaoke repertoire,
    and they constantly seek new ways to turn organization into expression.
background:
  cultural: Sook is a second‑generation East Asian American, likely of Chinese or Taiwanese descent. Her family maintains cultural traditions such as celebrating Lunar New Year, preparing mooncakes, and
    attending local Asian community festivals in New Jersey. She is bilingual, comfortable in both English and Mandarin (or Cantonese), and her upbringing emphasizes respect for elders, academic diligence,
    and close family ties, while her social circle reflects a modern, multicultural environment.
