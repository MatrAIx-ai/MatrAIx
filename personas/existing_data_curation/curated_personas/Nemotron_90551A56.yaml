    liaison","Training and mentoring of junior staff"]'
  hobbies: '["Senior book club participation","Community gardening and urban farming","Jazz and blues concert attendance","Church choir singing","Experimental yet budget‑conscious cooking","Volunteer reading
    program at the library","Crossword puzzles and word games","Genealogy research","Dance classes for seniors","Attendance at Chicago cultural festivals"]'
  career_goals: At 73, Monica’s primary career ambition is to transition from full‑time work to a mentorship role, sharing her wealth of practical knowledge with younger colleagues and helping them navigate
    the complexities of production planning. She aims to spearhead a workplace wellness initiative that introduces stress‑management resources and emotional‑support groups, reflecting her own experiences
    with anxiety and intense emotional reactions. Monica also hopes to volunteer her logistics expertise to local community organizations, such as the church food pantry and a neighborhood senior center,
    improving their supply‑chain efficiency. On a personal level, she wants to stay financially independent while gradually reducing her workload, ensuring a smooth and dignified retirement that allows
    her to remain socially engaged and emotionally grounded.
