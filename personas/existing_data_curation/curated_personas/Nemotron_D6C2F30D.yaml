  career_goals: Although retired from formal employment, Janna aims to continue contributing to her community by creating intergenerational educational workshops that blend art appreciation with lifelong
    learning, mentoring new teachers and volunteers, authoring a memoir that reflects on her experiences in education and the arts, and supporting local environmental education initiatives around Lake Tahoe.
    She also hopes to expand her volunteer role at the senior center, designing programs that foster social harmony and personal growth for participants.
