personas:
  professional: Janna Peterson, a retired curriculum designer and lifelong educator, channels her meticulous lesson‑planning skills and compassionate mentorship into intergenerational art workshops and
    community grant writing at the Incline Village senior center, balancing organization with flexibility in each project.
  sports: Janna Peterson enjoys low‑impact fitness through the local senior walking club, seasonal bird‑watching hikes around Lake Tahoe, and occasional ski outings at Heavenly, while cheering for the Vegas
    Golden Knights during hockey season.
  arts: Janna Peterson immerses herself in the arts by painting watercolors of Sierra Nevada vistas, photographing early‑morning mist over the lake, attending performances at the Lake Tahoe Shakespeare
    Festival, and collecting works by Ansel Adams and Georgia O'Keeffe.
  travel: Janna Peterson prefers relaxed road trips, having driven the Pacific Coast Highway to Monterey, trekked the trails of Yosemite, and revisited Washington, D.C.’s historic monuments, while dreaming
    of a future cruise to the Norwegian fjords, always balancing adventure with health considerations.
  culinary: Janna Peterson delights in cooking with fresh, locally sourced ingredients, often preparing grilled trout with lemon‑thyme, wild mushroom risotto, and a classic apple‑cinnamon pie, while occasionally
    experimenting with native sagebrush tea and using heirloom tomatoes from her garden.
  core: Janna Peterson blends curiosity, compassion, and a love of art and nature into a life of gentle activism, occasional forgetfulness, and a steadfast habit of knitting scarves for community fundraisers.
background:
  cultural: Janna grew up in a mid‑20th‑century white, Anglo‑American family in the Midwest, where education, community service, and appreciation for the arts were core values. After moving to the West,
    she settled in Incline Village, Nevada, absorbing the region's deep connection to nature, outdoor recreation, and environmental stewardship. Her cultural heritage blends traditional American middle‑class
    values with the distinctive artistic and ecological sensibilities of the Lake Tahoe community.
