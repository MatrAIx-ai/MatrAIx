  career_goals: Even at 91, Loretta remains driven by the desire to give back. She aims to continue mentoring younger volunteers at the local senior center, sharing her knowledge of community organizing
    and arts appreciation. She hopes to compile her memories into a memoir or oral‑history project that captures the history of her generation for future families. She also aspires to champion a monthly
    intergenerational art workshop, fostering connections between seniors and schoolchildren. Maintaining her health and independence so she can stay active in these pursuits is a top priority. Lastly,
    she wishes to leave a small endowment for a community garden plot to ensure the tradition of gardening continues.
