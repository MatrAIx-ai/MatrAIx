personas:
  professional: Thomas Datz is a budding community organizer and percussionist who applies his love for structure and teamwork to planning after‑school activities at the local community center while keeping
    a meticulous schedule for band rehearsals and school assignments, and they thrive on the predictability of clear agendas and coordinated events.
  sports: Thomas Datz is a versatile athlete who splits time between playing point guard for the Uniondale Middle School basketball team and forward on the local soccer club, cheers on the New York Knicks
    and New York Giants, and maintains a routine of after‑school skate‑board drills to stay fit.
  arts: Thomas Datz contributes driving beats as a percussionist in the school marching band, draws inspiration from drummers like Travis Barker and composers such as John Williams, and relaxes by reading
    graphic novels like "Watchmen" and "Saga" while sketching doodles of their favorite characters.
  travel: Thomas Datz prefers short, well‑planned trips with friends, such as a weekend surf session at Jones Beach, a family road‑trip to Washington, D.C. to tour the Smithsonian, and they dream of visiting
    a historic UK castle during a future spring break, balancing adventure with a modest travel budget.
  culinary: Thomas Datz enjoys cooking simple comfort foods, from perfecting a pepperoni pizza with extra mozzarella to whipping up creamy mac & cheese with a dash of hot sauce, and they love adding chocolate
    chips to homemade brownies as a celebratory treat after a long practice session.
  core: Thomas Datz is a socially energetic teen who balances a love for structured community service, rhythmic percussion, and cautious budgeting while wrestling with frequent worries that fuel an ever‑present
    need for journaling and self‑care.
background:
  cultural: Thomas is a white American raised in Uniondale, a suburb of Long Island, New York. His family’s roots trace back to European immigrants who settled in the Northeast, and he grew up in a middle‑class
    household that values education, community involvement, and personal responsibility. The multicultural environment of Nassau County has exposed him to a variety of cultural celebrations, foods, and
    perspectives, while his own family traditions emphasize holidays such as Thanksgiving, Fourth of July celebrations, and community service.
