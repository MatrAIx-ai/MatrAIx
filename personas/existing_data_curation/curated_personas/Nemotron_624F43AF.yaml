  career_goals: He aims to complete his high school education with a focus on maintaining good grades, then pursue a degree in social work or education to become a youth counselor or teacher. In the short
    term, he plans to join the school's varsity basketball team and take leadership positions in his community club. Long‑term, he hopes to work in a community center or school setting where he can help
    create supportive and structured environments for other adolescents.
