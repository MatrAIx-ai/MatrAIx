  career_goals: William aims to progress to a chief financial officer role within the next 7‑10 years, where he can drive digital transformation and embed resilient, data‑driven processes across the organization.
    He is focused on building a financially stable and adaptable enterprise that balances growth with risk management. Alongside his corporate ambition, he hopes to mentor the next generation of finance
    professionals and eventually launch a boutique consulting practice that helps small businesses in New Jersey achieve financial health and sustainable growth.
