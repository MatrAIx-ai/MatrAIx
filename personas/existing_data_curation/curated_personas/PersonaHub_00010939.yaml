persona_description: A conservation biologist who specializes in the management and conservation of black bears in New Jersey, with a focus on fostering coexistence between bears and humans. They are experienced
  in using an integrated approach to manage the state's black bear population, with a keen understanding of the challenges and opportunities associated with managing a growing and expanding bear population
  in densely populated areas. They have a deep knowledge of the biology, ecology, and behavior of black bears, as well as the social and economic impacts of bear conservation efforts in New Jersey. They
  are committed to promoting scientific research and education on bear management and conservation, and to advocating for the protection and restoration of bear habitats in the state.
