personas:
  professional: Jacob Fields is a seasoned carpenter who blends hands‑on framing, finish carpentry, and blueprint reading with a growing expertise in sustainable design, using their strong communication
    and conflict‑resolution skills to lead small crews while navigating their relaxed, sometimes disorganized approach to project planning.
  sports: Jacob Fields plays midfield for the Golden Gate Strikers in a Bay Area adult soccer league, hikes the Marin hills on weekends, cheers for the Golden State Warriors and San Francisco Giants, and
    incorporates relaxed yoga sessions into their fitness routine to accommodate an unpredictable schedule.
  arts: Jacob Fields frequents neighborhood pubs for live music nights, where they strum acoustic covers of John Mayer and Iron & Wine, collect vinyl from Fleet Foxes and Hozier, and draw inspiration from
    local street murals while shaping wood pieces in their workshop.
  travel: Jacob Fields enjoys spontaneous weekend trips to Napa Valley wineries, has trekked the Redwood National Park, dreams of a carpentry apprenticeship in Kyoto to study traditional joinery, and typically
    books low‑cost flights last‑minute, blending travel with volunteer builds through Habitat for Humanity.
  culinary: Jacob Fields loves crafting wood‑smoked salmon tacos with fresh cilantro, lime, and chipotle, perfects campfire chili con carne in reclaimed cast‑iron cookware, pairs meals with local IPAs like
    Sierra Nevada, and experiments with homemade sourdough and hand‑rolled gnocchi in their kitchen workshop.
  core: Jacob Fields merges a hands‑on passion for sustainable carpentry with an anxiety‑driven need for creative outlets, juggling spontaneous social life, occasional disorganization, and a relentless
    quest for greener building practices.
background:
  cultural: Jacob grew up in Dublin, a suburban community in Contra Costa County, California. His family is primarily of Anglo-American heritage with some Irish ancestry, reflected in his surname and the
    town's name. Raised in a middle-class, working-class environment, he absorbed a blend of West Coast progressive values, an appreciation for outdoor recreation, and a strong local sense of community.
    The proximity to the Bay Area's tech and environmental movements sparked his interest in sustainable building practices, while the region's diverse culinary and cultural scene shaped his sociable, outgoing
    nature. He identifies with a pragmatic, hands-on cultural identity that values craftsmanship, independence, and community involvement.
