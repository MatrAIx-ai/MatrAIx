  hobbies: '[''Recreational Soccer'', ''Hiking'', ''Live Music Events'', ''DIY Furniture Building'', ''Acoustic Guitar'', ''Community Volunteer Construction'', ''Craft Brewery Visits'', ''Camping'', ''Yoga'',
    ''Journaling'']'
  career_goals: Jacob aims to become a master carpenter and eventually launch his own small-scale sustainable construction firm that specializes in custom residential projects using reclaimed and low-impact
    materials. He plans to earn LEED-Green Associate certification and deepen his expertise in energy-efficient building techniques. Over the next five years he hopes to take on a foreman role, mentor apprentices,
    and build a reputation for reliable, high-quality work while preserving a flexible schedule that supports his emotional wellbeing and allows time for personal interests.
