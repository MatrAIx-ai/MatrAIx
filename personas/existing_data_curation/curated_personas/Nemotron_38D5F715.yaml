  career_goals: Audwin dreams of becoming a multimedia creator who can blend music, visual art, and storytelling to inspire his peers. He hopes to produce a community youth show or a YouTube channel where
    he shares rap performances, art tutorials, and local stories. Over the long term, he imagines attending a college program in media arts or communication and eventually working as a content producer,
    youth mentor, or creative director for community projects that celebrate the culture of Pembroke and Robeson County.
