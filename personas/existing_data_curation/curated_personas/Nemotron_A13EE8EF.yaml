  hobbies: '[''Reading science‑fiction novels'', ''Building LEGO Technic and Mindstorms sets'', ''Programming simple games in Python'', ''Playing chess (tournament level)'', ''Competitive real‑time strategy
    video gaming'', ''Swimming at Gulf beaches'', ''Fishing trips with family'', ''Participating in a small after‑school robotics club'']'
  career_goals: Joseph aims to pursue a STEM‑focused high school path that will lead to a career in software engineering or robotics engineering. He hopes to join a competitive robotics team, earn a computer‑science
    scholarship, and ultimately develop video games or autonomous systems. Inspired by his coastal surroundings, he also entertains the idea of working in marine technology or marine engineering, combining
    his love of the Gulf of Mexico with his technical skill set.
