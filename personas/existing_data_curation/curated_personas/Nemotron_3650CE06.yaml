personas:
  professional: George Johnson is a veteran health services administrator who blends a methodical, structured approach to clinic workflow and budgeting with a people‑first flexibility that lets him adapt
    to unexpected challenges at the rural health center where they oversee staff scheduling, EHR optimization, and community outreach programs.
  sports: George Johnson enjoys early‑morning fishing trips on the local reservoir, follows the Atlanta Falcons and the Atlanta Braves on television, and regularly meets the Senior Center Bridge Club for
    competitive bridge sessions, while they also join a seasonal walking group that explores nearby nature trails each spring.
  arts: George Johnson is a soulful choir member at their Baptist church, often humming classic blues tunes by B.B. King, Aretha Franklin, and Otis Redding, and they spend evenings listening to vinyl collections
    of soul legends while devouring biographies of civil‑rights icons such as Martin Luther King Jr. and Rosa Parks.
  travel: George Johnson prefers low‑key road trips to historic towns and national parks, having visited Savannah’s historic district, the Great Smoky Mountains, and the Smithsonian museums in Washington,
    D.C., and they dream of a leisurely cruise along the Mississippi River but keep travel plans modest due to a fixed retirement income.
  culinary: George Johnson delights in cooking traditional Southern soul food, expertly preparing collard greens with smoked turkey, candied yams, and shrimp and grits, while they often over‑season the
    greens with salt and love adding a dash of hot sauce to fried catfish for family gatherings.
  core: George Johnson is a compassionate, structure‑loving health administrator who balances garden solitude with choir harmony, occasionally forgets bill due dates, and channels their love of blues into
    community service.
background:
  cultural: George is an African‑American who grew up in the Deep South during the height of the civil‑rights movement. His family’s roots trace back to sharecropping families in rural Mississippi, and
    the values of perseverance, community, and faith were reinforced by the church and extended family networks. He was raised on Southern soul food, gospel music, and storytelling traditions that emphasize
    respect for elders and collective uplift. Active in the local NAACP chapter and his Baptist congregation, George continues to embody a cultural emphasis on mutual support, civic engagement, and preserving
    the rich heritage of African‑American life in Mississippi.
attributes:
