personas:
  professional: Ryan Landa is a bilingual community outreach coordinator who translates his methodical event‑planning talent and naturally sociable, talkative style into seamless nonprofit projects, seeking
    a structured role that cushions stress, and they thrive on clear timelines and predictable outcomes.
  sports: Ryan Landa is a devoted soccer enthusiast who never misses a Guatemalan national team match, roots for FC Cincinnati and the Columbus Crew, joins a local amateur league on weekends, and hikes
    the Hocking Hills trails as an off‑season fitness ritual, and they relish the camaraderie of team sports and group hikes alike.
  arts: Ryan Landa curates vibrant cultural content on social media, spins salsa and merengue nights to the rhythms of Celia Cruz and Marc Anthony, finds inspiration in the visual storytelling of Guillermo
    del Toro, and they often livestream these performances to engage a wider audience.
  travel: Ryan Landa prefers carefully planned trips that blend adventure and relaxation, having trekked the Great Smoky Mountains, explored the colonial streets of Antigua, and earmarked a future pilgrimage
    to Lake Atitlán to deepen culinary inspiration, and they meticulously map itineraries to avoid last‑minute stress.
  culinary: Ryan Landa prepares moderate‑level Guatemalan classics such as pepian, kak’ik, and chiles rellenos, delighting friends with corn‑based tortillas, fresh plantains, and smoky chayote, while experimenting
    with fusion twists during weekly dinner gatherings, and they view cooking as both a creative outlet and a structured ritual.
  core: Ryan Landa balances a compulsive need for structure with an infectious sociability, turning weekly dinner parties into cultural showcases, yet constantly battles lingering worry that fuels both
    meticulous planning and occasional over‑scheduling, and they often joke that a well‑ordered calendar is their best friend.
background:
  cultural: Ryan grew up in Cincinnati as the son of Guatemalan immigrants. His household was bilingual, speaking Spanish at home and English at school, and he was immersed in both Guatemalan and American
    traditions. He celebrates holidays such as Día de los Muertos, Semana Santa, and Christmas with a blend of cultural practices, remains active in the local Guatemalan community, frequently attends cultural
    festivals and the Guatemalan Catholic church, and frequently shares his heritage through food, storytelling, and community events.
attributes:
  skills: '[''Event Planning'', ''Bilingual Communication (Spanish/English)'', ''Public Speaking'', ''Schedule Management'', ''Customer Service'', ''Basic Accounting'', ''Social Media Management'', ''Handyman
    Skills'', ''Conflict Resolution'']'
  hobbies: '[''Cooking Guatemalan dishes'', ''Hosting dinner gatherings'', ''Watching soccer'', ''Salsa dancing'', ''Hiking'', ''Social media content creation'', ''Mindfulness meditation'', ''Volunteering
    at immigrant support centers'']'
  career_goals: Ryan aims to secure a stable full‑time role where his organizational talent and bilingual abilities are valued, such as a community outreach coordinator or project assistant at a local nonprofit
    or municipal agency. He plans to obtain a project management certification within two years and eventually launch a small catering business that offers authentic Guatemalan cuisine, providing both financial
    independence and a platform to share his cultural heritage. Long‑term, he hopes to work in an environment that offers clear structure, reduces his stress, and allows him to give back to the Guatemalan
    diaspora in Cincinnati.
