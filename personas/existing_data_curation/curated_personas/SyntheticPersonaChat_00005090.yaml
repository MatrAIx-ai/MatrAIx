    User 2: That''s great! I''m glad you enjoy it.

    User 1: Me too! It''s one of my favorite hobbies.

    User 2: Do you have a favorite type of bug?

    User 1: I like beetles the best. They''re so interesting and there are so many different kinds.

    User 2: That''s cool! I''ve never really thought about beetles before.

    User 1: You should! They''re really cool.

    User 2: I will! Thanks for the suggestion.

