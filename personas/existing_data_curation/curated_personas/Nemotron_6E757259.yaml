personas:
  professional: Nelson Love, a three‑year‑old with a love for routine and precise play, demonstrates an organized, methodical approach while assembling LEGO sets, suggesting an early aptitude for a future
    career in engineering or architecture where they will shine with reliability and planning skills.
  sports: Nelson Love dashes around the neighborhood in toddler soccer league drills, proudly wears a miniature Washington Nationals baseball cap, and they enjoy energetic sessions at the local community
    center’s preschool gymnastics class, balancing love for team play with personal fitness routines.
  arts: Nelson Love sings along to gospel classics like 'Take Me to the River' and grooves to Stevie Wonder’s 'Superstition', while they delight in drawing vivid pictures of the family’s Juneteenth celebration,
    a creative outlet that blends musical rhythm with colorful storytelling.
  travel: Nelson Love’s favorite family trip was a short drive to Washington, D.C., where they explored the Smithsonian’s dinosaur exhibit, and they now dream of a future adventure to Disney World in Orlando,
    preferring itineraries that blend familiar routines with a few exciting new stops.
  culinary: Nelson Love prefers creamy mac and cheese, sweet potatoes seasoned with a pinch of cinnamon, and loves stirring the batter for banana pancakes, often requesting extra cheese and they reach for
    sliced apples as a healthy snack after playtime.
  core: Nelson Love, a three‑year‑old driven by routine, sociable energy, and meticulous play, balances community celebrations and careful planning with occasional worries when they face unexpected changes.
background:
  cultural: Nelson is raised in an African‑American family within the diverse community of Burke, Virginia. His family blends Southern Black heritage with suburban influences, celebrating Juneteenth and
    other cultural holidays, attending a historically Black congregation, and listening to soul, gospel, and contemporary R&B music at home. Community involvement includes participation in local NAACP events
    and volunteer activities organized through the church, fostering a strong sense of identity, mutual respect, and communal responsibility.
attributes:
  skills: '[''Independent hand‑washing'', ''Basic potty training'', ''Dressing with minimal assistance'', ''Counting to ten'', ''Color and shape recognition'', ''Following two‑step instructions'', ''Cooperative
    play leadership'', ''Sorting objects by attributes'', ''Reciting short stories'', ''Adhering to daily routines'']'
  hobbies: '[''Storytime at the library'', ''Sing‑along circles at church'', "Playing ''Simon Says''", "Playing ''Duck, Duck, Goose''", ''Building with interlocking blocks'', ''Music and movement class'',
    ''Educational cartoons'']'
  career_goals: Nelson expresses early ambitions that reflect his preference for order and helping others. He often says he wants to be a teacher because he likes to share knowledge and keep a classroom
    organized. He is also fascinated by firefighters, admiring their structured routine and community safety role. Playful moments reveal a desire to become a builder, constructing elaborate block houses
    for his family. These goals illustrate his budding desire to lead, maintain order, and serve his community as he grows.
