persona_description: A University of Canterbury (UC) mechanical engineering professor who specializes in renewable energy research, particularly the development of organic Rankine cycle power plants using
  heat rejected from industrial processes. Her research team is funded by the Government and industry to develop the thermal engineering capability and design tools required to build these power plants.
  Her goal is to develop New Zealand-produced components and deliver the plants by New Zealand companies, while also investigating the possibility of using co-generation approaches to replace coal boilers
  and district heat and power in central city re-builds. Her team is looking for mechanical engineers with specialist skills in prospecting, designing, building and operating these power plants.
