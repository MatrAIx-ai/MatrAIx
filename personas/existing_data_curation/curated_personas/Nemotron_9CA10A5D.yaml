  hobbies: '["Visiting art galleries and museums", "Watercolor painting", "Landscape and street photography", "Reading non‑fiction (psychology, philosophy, emerging ideas)", "Journaling", "Nature walks
    and birdwatching", "Meditation and gentle yoga", "Listening to classical and jazz music", "Cooking experimental recipes", "Attending local theater performances (solo experience)"]'
  career_goals: Phyllis aims to transition into a senior HR leadership role—such as HR Director or Senior HR Business Partner—where she can shape organizational culture to prioritize flexibility, creativity,
    and employee well‑being. She dreams of championing innovative programs that integrate art and mindfulness into the workplace, reducing stress and fostering a quieter, more reflective environment for
    introverted staff. She also plans to earn a SHRM Senior Certified Professional credential and explore a graduate certificate in Organizational Psychology to deepen her strategic expertise, eventually
    offering consulting services to small nonprofits and arts organizations that value a humane, adaptable HR approach.
