personas:
  professional: Phyllis Puerto is a seasoned HR professional with over twenty years of experience in employee relations, talent acquisition, benefits administration, and data‑driven performance management,
    who channels her artistic curiosity and love of solitude into designing quiet, reflective wellness and engagement programs for introverted staff, while her relaxed attitude toward obligations sometimes
    leads her to miss early project deadlines.
  sports: Phyllis Puerto embraces gentle fitness through morning yoga, autumn birdwatching hikes, is a member of the Willow Trail Walkers senior walking club, and finds quiet inspiration watching the River
    City Raptors baseball team during the summer season.
  arts: Phyllis Puerto spends afternoons absorbing Impressionist masterpieces by Claude Monet and contemporary photography by Annie Leibovitz at local galleries, while evenings are filled with listening
    to Lang Lang’s piano recitals and Miles Davis’s smooth jazz, nourishing her introspective spirit.
  travel: Phyllis Puerto favors low‑key, thoughtfully planned getaways, such as weekend stays at a countryside B&B in the Hudson Valley and art‑focused retreats in Provence, France, while dreaming of photographing
    the tranquil rice terraces of Bali.
  culinary: Phyllis Puerto, an adventurous home chef, delights in preparing poached salmon with dill and fennel, mastering risotto with Arborio rice, and experimenting with seasonal farm‑to‑table dishes
    featuring heirloom tomatoes and fresh basil, while also enjoying quiet evenings at a local bistro for a perfectly executed coq au vin.
  core: Phyllis Puerto is a reflective HR strategist who blends artistic curiosity with a love for solitude, often swapping strict schedules for spontaneous watercolor sessions and occasionally letting
    bills slip through the cracks while chasing inner calm.
background:
  cultural: Phyllis is a white American born and raised in the Dallas‑Fort Worth Metroplex, now residing in McKinney, Texas. Her upbringing reflects a blend of traditional Southern hospitality and the entrepreneurial
    spirit of a rapidly growing suburban community. She values privacy, independence, and a deep appreciation for the arts—a trait fostered by regional cultural institutions and the vibrant local art scene.
    While she embraces the collaborative ethos of Texan community life, her introverted nature leads her to seek quiet spaces for reflection and creativity, balancing the collective with personal serenity.
attributes:
  skills: '["Employee Relations", "Talent Acquisition & Recruitment", "Benefits Administration", "Performance Management", "HR Compliance & Policy Development", "Organizational Development", "Conflict Mediation",
