  hobbies: '[''soccer'', ''hip‑hop dance'', ''acoustic guitar'', ''DIY crafts'', ''cooking'', ''church volunteer work'', ''birdwatching'', ''TikTok content creation'', ''bicycle repair'']'
  career_goals: Denise aims to obtain her GED within the next two years and then pursue an apprenticeship in automotive technology or enroll in a culinary program at the nearby community college. She dreams
    of eventually opening a small café that also serves as a community hub where teens can gather, share ideas, and learn practical skills. In the short term, she hopes to secure part‑time work at a local
    garage or restaurant to gain experience, earn her own money, and contribute to her family’s household.
