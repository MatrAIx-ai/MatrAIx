personas:
  professional: Denise Denton is a hands‑on teen who blends practical bike‑repair skills with a budding culinary flair, channeling their spontaneous energy into leading school clubs and community events
    while eyeing an apprenticeship in automotive technology or a culinary program.
  sports: Denise Denton is a dedicated midfielder for the Enterprise Community Soccer Club, a regular hiker with the Enterprise Trails Group, a weekend cyclist who maintains their own bike, and a passionate
    fan of the Alabama Crimson Tide football and the Birmingham Barons baseball teams, often quoting game stats during school breaks.
  arts: Denise Denton expresses creativity by strumming acoustic guitar covers of Taylor Swift and Bob Dylan at family gatherings, choreographing hip‑hop and country dance mash‑ups for TikTok set to Megan
    Thee Stallion and Luke Bryan tracks, crafting friendship bracelets inspired by the works of Maya Angelou, and watching local theatre productions of The Lion King.
  travel: Denise Denton loves weekend road trips to the Great Smoky Mountains, annual family visits to New Orleans for jazz brunches, and dreaming of a future culinary tour of Paris and Tokyo, but balances
    these wanderlust plans with a part‑time job schedule and a limited travel budget.
  culinary: Denise Denton enjoys cooking hearty dishes like spicy chicken tacos with cilantro, garlic‑herb roasted potatoes, and Southern fried catfish, experiments with homemade granola bars and vegan
    quinoa bowls, and confidently follows YouTube tutorials from Binging with Babish while still burning toast occasionally.
  core: Denise Denton is a spontaneously curious teen who juggles bike repairs, soccer, and TikTok dances, often forgetting to organize deadlines but thriving on hands‑on challenges and community buzz.
background:
  cultural: Denise grew up in a white, Southern family in Enterprise, Alabama, where community, hospitality, and church life are central to daily life. Her upbringing blends traditional Southern customs—family
    meals featuring fried chicken, collard greens, and homemade biscuits—with modern influences from digital media and popular music. She values the close‑knit relationships of her small town, respects
    the emphasis on hard work, self‑reliance, and neighborly support, and carries forward the spirit of Southern generosity and pride in local heritage.
attributes:
  skills: '[''basic automotive maintenance'', ''farm animal care'', ''cooking and meal planning'', ''social media communication'', ''public speaking'', ''team sports coordination'', ''event organization'',
