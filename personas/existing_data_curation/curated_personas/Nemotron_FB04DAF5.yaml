  career_goals: Joshua dreams of becoming a pediatrician because he wants to help children stay healthy and appreciates the structured, scientific nature of medicine. He also imagines a future as an aerospace
    engineer, fascinated by airplanes and space while valuing the precise, disciplined work such a career demands. Both aspirations reflect his desire to achieve high standards, contribute to the well‑being
    of others, and work within organized, respected professions.
