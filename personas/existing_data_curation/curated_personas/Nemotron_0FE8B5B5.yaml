  hobbies: '[''Reading (Literary Fiction & Philosophy)'', ''Hiking in the Sonoran Desert'', ''Yoga'', ''Photography'', ''Attending Art Exhibits'', ''Cooking'', ''Volunteer Work at Community Garden'', ''Board
    Game Nights'']'
  career_goals: Alexis aims to transition from her current transitional phase into a role within a nonprofit or cultural organization where she can blend her humanities background with her organizational
    strengths. She aspires to become a program coordinator for arts‑education initiatives that serve under‑represented communities in the Phoenix area. Over the next five years, she plans to pursue a master’s
    degree in public administration or museum studies to deepen her expertise and eventually move into program management or curatorial work. Her long‑term ambition is to lead community‑focused projects
    that promote cultural literacy while maintaining a balanced, structured career path.
