personas:
  professional: Lanny Porter, a veteran market research consultant specializing in advanced statistical analysis, survey design, and data visualization, leverages his calm, skeptical rigor and curiosity
    for art to craft story‑driven insights that help coastal heritage businesses thrive.
  sports: Lanny Porter, an avid sailor and occasional kayaker who joins the local Roanoke Yacht Club, follows the Durham Bulls baseball team and the Carolina Panthers football squad with the same competitive
    spirit he brings to bridge tournaments at the senior center.
  arts: Lanny Porter, a regular at coastal art galleries, craft fairs, and community theater productions, draws inspiration from Ansel Adams’ photography, Georgia O’Keeffe’s paintings, and the music of
    Norah Jones, weaving these artistic influences into his visual storytelling and weekend bridge games.
  travel: Lanny Porter, who prefers slow, well‑planned journeys to historic coastal towns such as Charleston, Savannah, St. Augustine, and Cornwall, blends his love of genealogy and maritime history into
    each trip, often traveling by train to soak in the scenery and avoid the rush of air travel.
  culinary: Lanny Porter, a skilled home chef specializing in fresh seafood, regularly prepares crab boils seasoned with Old Bay, she‑crab soup, and citrus‑marinated oysters, while his occasional over‑use
    of garlic reveals a quirky penchant for bold flavors.
  core: Lanny Porter, a curious and calm 74‑year‑old who blends a competitive spirit with a relaxed, slightly disorganized lifestyle, channels his love of coastal photography, data storytelling, and crab
    boils into a uniquely artistic yet methodical worldview.
background:
  cultural: Lanny is a white male raised in Manteo, a small maritime town on North Carolina's Outer Banks. Born in the post‑World War II era, his upbringing was shaped by a close‑knit community that prized
    Southern hospitality, self‑reliance, and a deep connection to the sea. Local traditions such as crab festivals, community church gatherings, and storytelling about the region’s pirate and Roanoke Island
    heritage are central to his identity. His graduate STEM education introduced a broader national perspective, fostering an openness to new ideas while retaining a reverence for his coastal roots. This
    blend of traditional coastal culture, analytical rigor, and artistic curiosity defines his worldview, influencing both his professional approach and personal passions.
attributes:
  skills: '["Advanced statistical analysis", "Survey design & questionnaire development", "Data visualization (Tableau, Python, PowerBI)", "Market segmentation and consumer behavior modeling", "Competitive
    intelligence and strategic positioning", "Qualitative research synthesis (focus groups, ethnography)", "Cross‑disciplinary integration of art aesthetics into brand storytelling", "Flexible, ad‑hoc project
    execution", "Critical data validation and source skepticism", "Calm decision‑making under pressure", "Executive presentation and storytelling", "Mentorship and knowledge transfer", "Community‑oriented
    market research for tourism"]'
  hobbies: '["Coastal photography", "Sailing on Pamlico Sound", "Birdwatching (esp. ospreys, egrets)", "Historical genealogy research", "Visiting art galleries and local craft fairs", "Playing bridge at
    the senior center", "Gardening (native coastal plants)", "Cooking fresh seafood (crab boils, shrimp)", "Woodworking (building wooden ship models)", "Reading art history and philosophy of science", "Volunteer
    at the Roanoke Island Historical Association"]'
  career_goals: Lanny aims to leave a lasting professional legacy by establishing a boutique consultancy that helps small coastal businesses and heritage‑tourism sites in the Outer Banks leverage data‑driven
    insights while incorporating artistic storytelling. He intends to publish a series of whitepapers on flexible research methodologies for older demographics and champion ethical data practices rooted
    in his skeptical yet rigorous approach. Additionally, he plans to develop a regional mentorship program that pairs experienced analysts with emerging talent, fostering a new generation of market researchers
    who value both analytical rigor and creative expression.
