  career_goals: Jordin aims to be promoted to sergeant within the next three years, where he hopes to influence department policies on officer wellness and community engagement. He aspires to lead a specialized
    unit focused on mental‑health crisis response, integrating his concern for stress and wellbeing into daily policing. Over the longer term, he envisions transitioning to a private security consulting
    role or becoming a trainer for community‑policing programs after retirement, using his extensive experience to promote safer neighborhoods both within Dallas and beyond.
