  career_goals: Ronnie aspires to a career that offers stability, clear structure, and tangible outcomes. He aims to pursue a technical field such as civil or environmental engineering, with a focus on
    designing and maintaining infrastructure that protects the coastal community and the Indian River Lagoon. In the short term, he plans to earn certifications in first aid and lifeguarding, and to join
    a vocational program after high school that provides hands‑on training in engineering technology. Long‑term, he hopes to obtain an associate’s degree, followed by a bachelor’s degree, and eventually
    work on projects like flood‑control systems or sustainable marine habitats. He also values personal growth, so he seeks to develop coping skills that keep stress in check while advancing his professional
    goals.
