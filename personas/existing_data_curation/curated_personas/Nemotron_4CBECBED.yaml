  hobbies: '[''softball'', ''bowling'', ''hiking'', ''fishing'', ''country music'', ''bluegrass'', ''BBQ grilling'', ''community volunteering'', ''dancing'', ''mechanical tinkering'']'
  career_goals: William aims to advance from his current laborer role to a supervisory position, such as shift supervisor or warehouse manager, where he can lead a team and implement process improvements.
    He plans to obtain certifications like Certified Forklift Operator and OSHA safety training to strengthen his qualifications. Over the next several years, he hopes to secure a stable income that will
    allow him to purchase a home in Gatlinburg and build a retirement fund. Ultimately, he envisions either managing a regional distribution center or starting a small, family‑owned logistics service that
    leverages his expertise in material handling and his strong community ties.
