persona_description: A biologist with expertise in salmon conservation and management, specifically in the field of juvenile salmon survival. The individual is part of a team conducting an experimental
  project to increase the survival rates of California's ocean-bound juvenile salmon. The biologist is responsible for collecting data on the success of the project, analyzing the results, and communicating
  with stakeholders. They are also involved in the data collection process, implanting coded wire tags on the fish and tracking their movements.
