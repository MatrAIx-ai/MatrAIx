persona_description: A researcher in the field of stem cell biology, particularly focused on understanding the molecular mechanisms underlying the regulation of pluripotency and the development of neural
  cells. Vivian specializes in studying the signaling molecules Nodal and BMP, which play critical roles in controlling the expression of genes and the differentiation of stem cells into neural cells. He
  is interested in the dynamic nature of these cells and their ability to exhibit different states and behaviors, and is seeking to understand how these differences are established and maintained. Vivian's
  research is based on the use of mouse embryonic stem cells, which he has studied for 25 years and is well-versed in, and he is using induced pluripotent stem cells (iPS cells) to further his studies in
  regenerative medicine.
