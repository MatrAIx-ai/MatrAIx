  career_goals: Although retired, Loan intends to stay intellectually active by mentoring high‑school students in STEM, leading a senior‑center digital‑literacy program, and developing a community garden
    that blends sustainable landscaping with traditional Southeast Asian herbs. She also plans to write a memoir that chronicles her immigrant journey and to advocate for mental‑health resources tailored
    to older adults, leveraging her own experience with anxiety to raise awareness. Continuous learning remains a priority, so she is enrolling in short courses on advanced photography and health‑tech applications.
