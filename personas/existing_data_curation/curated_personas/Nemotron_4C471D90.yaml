personas:
  professional: Tara Stewart is a seasoned interior painter and paperhanger who blends expert color theory with a vivid imagination, delivering bespoke murals and low-VOC finishes while deftly juggling
    meticulous project management and the occasional bout of anxiety-driven perfectionism that they keep under control through disciplined scheduling.
  sports: Tara Stewart enjoys hiking the rugged trails of Pictured Rocks, joining a local adult climbing club at the Upper Peninsula Rock Gym, practicing yoga twice a week, and cheering on the Green Bay
    Packers and Michigan Tech Huskies hockey teams, balancing their love of the outdoors with modest team-spirit enthusiasm, and they often discuss game highlights over coffee after a climb.
  arts: Tara Stewart channels their fascination with sci-fi and folk music into large-scale acrylic abstracts inspired by Lake Superior, citing Agnes Martin and Franz Kline as visual influences while they
    regularly attend folk gatherings featuring Rhiannon Giddens and listen to the 'Stormlight Archive' audiobooks for creative spark.
  travel: Tara Stewart prefers self-planned road trips that blend artistic pilgrimage with geological wonder, having driven the Pacific Coast Highway to photograph sea cliffs, trekked Iceland's basalt formations,
    and planning a future trek through the Scottish Highlands to sketch ancient stone circles, a vision they keep alive in their sketch journal.
  culinary: Tara Stewart delights in cooking with lake-caught whitefish, foraged wild mushrooms, and locally sourced root vegetables, often preparing smoky salmon chowder or roasted beet-infused quinoa
    while experimenting with natural pigments derived from beetroot and turmeric, a practice they enjoy sharing at community potlucks.
  core: Tara Stewart is a 49-year-old imaginative craftsman who balances a diligent work ethic with a restless creative spirit, often wrestling with anxiety-driven perfectionism and a quirky habit of cataloguing
    pine cones for texture ideas, and they constantly seek new ways to blend art with function.
background:
  cultural: Tara grew up in a modest, white Midwestern family in the Upper Peninsula, with deep ties to the region’s Finnish and Irish immigrant heritage. The community’s emphasis on hard work, self‑reliance,
    and respect for the natural environment shaped her practical skills and her appreciation for the rugged landscape that often appears in her art. Local traditions of craftsmanship and seasonal festivals
    reinforced her collaborative spirit while nurturing her independent, inventive side.
attributes:
  skills: '[''Interior Painting'', ''Paper Hanging'', ''Color Consultation'', ''Surface Preparation'', ''Mural Design'', ''Acrylic and Mixed‑Media Painting'', ''Project Management'', ''Client Communication'',
    ''Safety Compliance'']'
  hobbies: '[''Abstract Painting'', ''Sketch Journaling'', ''Hiking'', ''Nature Photography'', ''DIY Home Projects'', ''Sci‑Fi & Fantasy Reading'', ''Folk Music Events'', ''Mindfulness Meditation'']'
  career_goals: Tara aims to transition from a sole‑operator to owning a boutique interior finishing studio that offers bespoke painting, wallpaper, and mural services across the Upper Peninsula. She envisions
    integrating her love of abstract art into commercial projects, creating signature accent walls that become local landmarks. Long‑term, Tara hopes to lead community workshops on sustainable painting
    practices and to showcase a solo gallery exhibition of her personal artwork, merging her trade expertise with her imaginative pursuits. She also plans to obtain certification in low‑VOC, eco‑friendly
    paints to meet growing client demand for greener homes.
