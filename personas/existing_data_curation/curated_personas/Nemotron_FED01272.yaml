personas:
  professional: Ambar Cervantes, a six‑year‑old budding architect, builds towering LEGO structures that blend curiosity with practicality, keeps the bricks neatly sorted yet readily rearranges them during
    collaborative play, and thrives on the energetic, cooperative atmosphere of group activities.
  sports: Ambar Cervantes splashes through the community pool as a member of the Splash Buddies youth swimming club, dashes in games of tag and hide‑and‑seek with the Little Raccoons soccer group, and cheers
    loudly for the regional baseball team, the River Rapids, during weekend family outings.
  arts: Ambar Cervantes fills sketchbooks with bright, sun‑shaped doodles inspired by Frida Kahlo’s bold palette, twirls to lively Cuban salsa beats by Celia Cruz at family gatherings, and eagerly absorbs
    storytime tales narrated by the cheerful voice of Morgan Freeman in library recordings.
  travel: Ambar Cervantes loves weekend nature walks in the nearby Willow Creek Park, enjoys vibrant community festivals in the town square, eagerly anticipates a family road trip to the seaside town of
    Clearwater, and dreams of one day exploring the magic of Disney World with their parents.
  culinary: Ambar Cervantes gleefully helps mix batter for sweet plantain muffins flavored with honey and cinnamon, delights in spoon‑fuls of mango‑coconut salsa after meals, proudly creates colorful fruit
    kabobs with banana, strawberry, and pineapple, though they often forget to wash their hands before a cooking session.
  core: Ambar Cervantes is a bright‑eyed six‑year‑old who balances boundless energy for group games with occasional waves of anxiety, transforms LEGO bricks into tidy towers while humming salsa tunes, and
    can’t resist a fresh batch of plantain muffins.
background:
  cultural: Ambar lives in Tampa’s vibrant Cuban community. She grows up in a bilingual household where Spanish is spoken at home and English at school. Family gatherings feature traditional Cuban foods
    such as arroz con pollo, plantains, and croquetas, and music like salsa and son fills the air. She celebrates Cuban holidays, participates in cultural festivals in Hillsborough County, and learns about
    her heritage through stories from grandparents. The community’s emphasis on family, respect for elders, and sharing has shaped her cooperative nature, while the warmth of Florida’s climate encourages
    outdoor play and spending time at the local park and pool.
attributes:
  skills: '[''Reading simple sentences'', ''Counting to 100'', ''Basic conversational Spanish'', ''English communication'', ''Cooperative play'', ''Sharing and taking turns'', ''Drawing and coloring'',
