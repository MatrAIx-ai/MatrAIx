  hobbies: '[''Playing tag and hide‑and‑seek'', ''Dancing to Cuban music'', ''Drawing and coloring'', ''Building with LEGO bricks'', ''Listening to story time at the library'', ''Swimming'', ''Baking simple
    treats with family'', ''Singing Spanish children’s songs'', ''Nature walks in parks'', ''Attending local Cuban festivals'']'
  career_goals: When she grows up, Ambar often says she wants to be a teacher or a community helper who can speak both Spanish and English. She is fascinated by how people learn and likes the idea of caring
    for other children, so she dreams of becoming a bilingual elementary school teacher or a pediatric nurse. She also enjoys caring for animals and sometimes imagines working as a veterinarian, reflecting
    her kindness and desire to help others.
