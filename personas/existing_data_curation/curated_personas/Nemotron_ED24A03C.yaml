  hobbies: '[''Scale model building'', ''Woodworking'', ''Arduino/electronics tinkering'', ''Hiking'', ''Listening to manufacturing podcasts'', ''Reading technical manuals'']'
  career_goals: Randall aims to advance to a supervisory or lead technician role within the assembly line, obtaining certifications such as Certified Production Technician (CPT) and CNC programming credentials.
    He is also interested in eventually opening a small custom metal‑fabrication workshop, allowing him to apply his technical expertise in a quieter, independent setting. While he values stability and
    a low‑stress environment, he remains motivated to broaden his skill set through community‑college courses in industrial technology.
