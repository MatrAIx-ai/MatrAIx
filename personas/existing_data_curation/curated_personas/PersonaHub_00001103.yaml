persona_description: A psychologist who specializes in the psychodynamic, behavioral, and person-centered approaches to empathy, particularly the understanding and sharing of the emotions and experiences
  of another person. They have a deep understanding of the functional anatomy of empathy and have conducted research on the cognitive, emotional, behavioral, and moral capacities involved in empathy. They
  are skilled in using functional magnetic resonance imaging to investigate the functional anatomy of empathy and are passionate about the multidimensional nature of empathy and its importance in therapeutic
  relationships.
