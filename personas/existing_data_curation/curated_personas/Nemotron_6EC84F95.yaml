personas:
  professional: Marsha Blais is a budding theatrical performer and fledgling stage manager who blends a love for drama club spotlights with the analytical rigor of debate and science fairs, turning curiosity
    into practical backstage solutions while confidently commanding the audience and their peers.
  sports: Marsha Blais enjoys seasonal soccer with the River Valley Girls Soccer Club in the fall, runs cross‑country in spring, hikes local trails with the Saturday Trailblazers club, and roots for the
    Chicago Bulls and the New York Yankees, balancing structured team practice with spontaneous backpacking trips on weekends.
  arts: Marsha Blais channels creative energy into acting, choir, and sketching, often performing show‑tunes from the musical *Mean Girls* and belting out songs by Olivia Rodrigo and Billie Eilish while
    filling sketchbooks with anime‑style doodles and posting heartfelt blog snippets inspired by YA authors like Sarah Davis and Becky Albert.
  travel: Marsha Blais prefers quick weekend getaways to nearby state parks such as Shenandoah for hiking, dreams of exploring the historic streets of Edinburgh during a school exchange, and budgets carefully
    for a future family trip to Disney World, balancing a love for adventure with the financial limits of a teenage allowance.
  culinary: Marsha Blais experiments in the kitchen by baking gluten‑free chocolate chip cookies with almond flour, perfecting a signature matcha‑swirl brownie, and indulging in spicy ramen bowls topped
    with soft‑boiled eggs, though they sometimes over‑season dishes in pursuit of bold flavor and binge‑snack on sugary cereal late at night.
  core: Marsha Blais is a chatty, anxiety‑prone teen who juggles drama‑club spotlights, debate triumphs, and culinary experiments while occasionally over‑committing and worrying about every detail.
background:
  cultural: Marsha grew up in Barberton, Ohio, a small Midwestern city with an industrial legacy and a close‑knit community. Her family identifies as white American, with roots tracing back to French‑Canadian
    ancestors, reflected in occasional French phrases and celebrations like Saint‑Jean‑Baptiste. This blend of Midwestern values—emphasis on hard work, community involvement, and modesty—and French‑Canadian
    cultural touches informs her worldview, giving her a respect for tradition while also fostering an openness to new ideas.
