  hobbies: '[''Drama club acting'', ''Debate team'', ''Choir singing'', ''Blogging/social media'', ''Science fair projects'', ''Volunteer tutoring'', ''Sketching'', ''Reading YA fiction'', ''Minecraft gaming'',
