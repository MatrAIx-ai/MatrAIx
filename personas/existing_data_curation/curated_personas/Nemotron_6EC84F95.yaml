  career_goals: Marsha aspires to combine her love for communication and helping others by pursuing a future in broadcast journalism or public relations, where she can engage audiences and shape stories.
    She also hopes to study psychology or counseling to better understand and support peers dealing with stress and anxiety. In the longer term, she envisions a role that blends media, community outreach,
    and mental‑health advocacy, allowing her to use her sociable nature and practical mindset to make a positive impact.
