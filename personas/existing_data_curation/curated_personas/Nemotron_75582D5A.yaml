  career_goals: Kushagra aims to ascend to a supervisory role within the insurance operations department, targeting a Claims Team Lead or Claims Supervisor position within the next three years. She plans
    to obtain the CPCU (Chartered Property Casualty Underwriter) certification to deepen her underwriting knowledge and enhance her credibility. Leveraging her competitive nature, she seeks to spearhead
    a department‑wide efficiency project, implementing automated claim triage tools to reduce turnaround time. Long‑term, she envisions moving into a managerial capacity overseeing both claims and policy
    processing teams, where she can blend her structured, results‑driven mindset with her talent for motivating and engaging staff.
