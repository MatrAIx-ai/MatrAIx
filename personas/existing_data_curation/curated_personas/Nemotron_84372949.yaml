  career_goals: Dominic aims to transition from front‑line surveillance to a leadership position where he can shape security strategy for large casino or entertainment venues. He plans to earn the Certified
    Protection Professional (CPP) credential, lead a team of surveillance officers, and eventually become a security consultant specializing in gambling‑industry risk analytics. He also envisions developing
    a training program that emphasizes disciplined, data‑focused monitoring techniques for new guards.
