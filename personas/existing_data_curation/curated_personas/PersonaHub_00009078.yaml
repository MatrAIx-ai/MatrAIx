persona_description: A landowner or developer who is interested in creating or conserving wetland, stream, or habitat conservation areas to offset the adverse impacts of their proposed activities or projects.
  They are looking for ways to maintain their property in its current management state while retaining ecological functionality, such as ecosystem services, important to the public interest. They are willing
  to pay a premium for credits to compensate for the loss of habitat and are seeking ways to ensure that the replacement ecological functions supplied by the mitigation credits are equivalent to the loss
  of habitat. They are also interested in the business advantages of mitigation banks, such as the ability to maximize the use of a preferred development site and the reduced permitting time and cost associated
  with purchasing credits from a mitigation bank.
