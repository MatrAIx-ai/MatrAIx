  career_goals: Vilma aims to secure a supervisory position as Lead Building Inspector within the next three years, overseeing a team of inspectors across the Manatí region. She plans to obtain the Certified
    Professional Building Inspector (CPBI) credential to formalize her expertise. Additionally, she wants to mentor younger inspectors—especially women entering the trades—by establishing a monthly training
    workshop at the local community college. Long‑term, she envisions transitioning to a consulting practice that advises small‑scale developers on code compliance and safety, allowing her to preserve her
    routine‑driven work style while contributing to community development. She also hopes to serve on municipal committees that review and update local building regulations, ensuring they reflect practical,
    safety‑first standards.
