personas:
  professional: Vilma Ramos, a seasoned building inspector for the Manatí municipality, leverages her 25‑year expertise in the Puerto Rican Building Code, structural assessments, and digital inspection
    tools to produce concise compliance reports, while their organized yet flexible approach allows them to adapt to unexpected site conditions and mentor junior inspectors.
  sports: Vilma Ramos enjoys early morning beachfront walks with the Vega Baja Joggers Club, follows the Cangrejeros de Santurce baseball team, and adds salsa‑dance fitness sessions to stay active while
    supporting local community wellness initiatives.
  arts: Vilma Ramos embraces the rhythms of salsa and plena, regularly dancing to classics by Celia Cruz and Willie Colón, while unwinding with beloved telenovelas such as ‘María la del Barrio’ and attending
    occasional performances at the community theater that celebrate local storytelling.
  travel: Vilma Ramos prefers organized group trips that blend cultural immersion with beach relaxation, having toured Old San Juan’s historic forts and the bioluminescent bay of Vieques, and now yearns
    for a guided pilgrimage through Cartagena’s colonial streets and the serene shores of Tulum.
  culinary: Vilma Ramos delights in preparing traditional dishes like arroz con gandules, alcapurrias, and pasteles, seasoning them with sofrito, culantro, and adobo, while tending a herb garden of cilantro,
    oregano, and thyme, and occasionally treats friends to a homemade flan topped with caramel.
  core: Vilma Ramos balances a meticulous, routine‑driven work ethic with a lively social calendar, using salsa nights to unwind while quietly battling a tendency to over‑worry about compliance details
    and a habit of double‑checking every report before submission.
background:
  cultural: 'Vilma is a native of Vega Baja in the Manatí municipio, raised in a close‑knit Puerto Rican family that values tradition, community, and Catholic faith. She grew up listening to bomba, plena,
    and salsa rhythms, which fostered her love for dance and communal celebrations. Her bilingual upbringing—speaking Spanish at home and learning English in school—has given her fluency in both languages
    and the ability to navigate diverse social settings. Community ties are strong: she participates in neighborhood patron saint festivals, supports local artisans, and respects the island’s emphasis on
    family and hospitality. These cultural roots shape her practical outlook, her commitment to safety and reliability in her occupation, and her enjoyment of group activities that reinforce social bonds.'
