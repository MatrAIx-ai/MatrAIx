persona_description: A researcher or healthcare professional who is interested in improving CPR rates and outcomes, particularly in high-risk populations such as the elderly, the physically disabled, and
  those who are at risk of cardiac arrest in public places. This person may be familiar with the Danish Resuscitation Council's multi-pronged campaign and the use of automated external defibrillators (AEDs)
  in public places. This person may also be interested in the design of studies like the one conducted by the Danish researchers, which aimed to measure the impact of various CPR initiatives on survival
  rates.
