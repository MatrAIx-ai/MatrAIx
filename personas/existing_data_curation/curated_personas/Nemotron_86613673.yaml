  career_goals: John dreams of a future where he can blend his love for science and helping others. He aspires to become a scientist—perhaps an environmental researcher or a biomedical engineer—so he can
    develop solutions that improve people's health and protect the planet. He also imagines working as a community outreach coordinator or a teacher, where his compassion and cooperative spirit can inspire
    younger students. In the short term, he plans to join his school’s robotics club, volunteer at the local animal shelter, and continue building his coding and leadership skills to prepare for these long‑term
    goals.
