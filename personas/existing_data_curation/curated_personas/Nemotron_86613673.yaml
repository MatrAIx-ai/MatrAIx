personas:
  professional: John Kyle, an aspiring creative technologist, blends a love for storytelling and simple coding, dreaming of designing interactive comic games while sketching ideas during soccer practice,
    and they keep projects grounded with a practical Midwestern mindset despite occasional disorganized workspaces.
  sports: John Kyle kicks a ball for the St. Louis Scott Gallagher U12 soccer team after school, idolizes midfielder Ryan Gauld, cheers for the St. Louis Cardinals at the stadium on weekends, and they sometimes
    bring muddy sneakers into the house, prompting reminders from parents.
  arts: John Kyle dives into the worlds of J.R.R. Tolkien and Rick Riordan, sketches comic strips inspired by Adventure Time, practices keyboard basics playing simple melodies from Hans Zimmer’s film scores,
    and they often listen to Imagine Dragons while drawing, fueling their creative spark.
  travel: John Kyle loves weekend road trips to the Gateway Arch and occasional summer visits to Disney World in Orlando, dreams of hiking the trails of Yellowstone, and they prefer spontaneous stops at
    quirky diners, though they sometimes forget to pack a snack for the journey.
  culinary: John Kyle enjoys classic pepperoni pizza, creamy mac and cheese, and homemade banana smoothies with fresh strawberries, helps their mom stir in cheddar cheese for a perfect grilled cheese, and
    they occasionally burn toast when distracted, turning the kitchen into a comedic arena.
  core: John Kyle is a curious, compassionate 11‑year‑old who blends a love for sci‑fi comics, soccer, and LEGO building with a laid‑back, sometimes messy approach to life, often forgetting where they left
    their sketchbooks while dreaming of designing their own game.
background:
  cultural: John comes from a white, Midwestern American family with roots in German and Irish ancestry. Raised in Saint Louis County, he grew up attending public school and participating in community events
    like St. Louis Cardinals games, local county fairs, and holiday celebrations that blend traditional American customs with family‑specific traditions. His household values Midwestern hospitality, practicality,
    and a strong sense of community, encouraging involvement in neighborhood activities and volunteer work. While his cultural identity reflects mainstream American values, he also appreciates the diverse
    cultural tapestry of the St. Louis region, which broadens his perspective and informs his cooperative outlook.
