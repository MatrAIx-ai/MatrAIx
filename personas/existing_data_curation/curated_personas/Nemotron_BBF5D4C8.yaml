  career_goals: Rex aims to transition into a senior leadership role, such as Director of Project Management or head of a PMO, where he can shape strategic initiatives across multiple business units. He
    seeks to mentor emerging project managers, champion innovative, cross‑disciplinary projects that integrate technology and the arts, and eventually establish a consultancy focused on transformational
    change for cultural institutions in Western New York.
