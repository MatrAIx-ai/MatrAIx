personas:
  professional: Rex Hobbs, a 53‑year‑old project‑management veteran in Western New York, leverages their analytical rigor, agile‑waterfall fluency, and love for the arts to deliver large‑scale cultural‑institution
    initiatives on time and within budget while mentoring emerging PMs and championing innovative, cross‑disciplinary collaborations.
  sports: Rex Hobbs, a devoted tennis enthusiast who practices twice weekly at the Executive Tennis Club of Buffalo and hikes Letchworth State Park each fall, roots for the Buffalo Bills and Sabres, occasionally
    joins a local recreational league for social doubles, and treats fitness as a structured, goal‑oriented routine that balances cardio, flexibility, and team camaraderie.
  arts: Rex Hobbs immerses themselves in Buffalo’s arts world—regularly photographing exhibits at the Albright‑Knox Art Gallery, volunteering at the community theater’s stage crew, attending Shea’s Performing
    Arts Center productions of ‘Hamilton’ and listening to the Buffalo Philharmonic Orchestra—while drawing creative inspiration from Ansel Adams, Monet, and contemporary photographer Cindy Sherman.
  travel: Rex Hobbs approaches travel as a curated cultural expedition, meticulously planning itineraries that blend museum tours, local culinary experiences, and scenic hikes—already having explored New
    York City’s Met, Montreal’s Old Port, Florence’s Uffizi, and Iceland’s Golden Circle, while dreaming of a future trip to Kyoto’s temples and the Scottish Highlands, all while balancing a moderate travel
    budget and a penchant for spontaneous photo walks.
  culinary: Rex Hobbs, an avid food explorer with a decent home‑cooking skill, delights in pairing Buffalo‑style chicken wings with local craft brews, mastering risotto with Arborio rice, saffron, and porcini
    mushrooms, experimenting with homemade sushi rolls featuring nori, sushi‑grade salmon, and wasabi, and regularly ordering Ethiopian injera with spiced lentils, reflecting a palate that craves bold flavors
    and fresh ingredients.
  core: Rex Hobbs is a sociable, detail‑driven project leader who channels their curiosity for art into every facet of life, from orchestrating cross‑disciplinary initiatives to curating museum trips, yet
    habitually overbooks their calendar, leaving little room for downtime.
background:
  cultural: Rex is a white, second‑generation American raised in Buffalo, NY, with roots tracing back to Irish and German immigrant families. He grew up in a working‑class, industrial neighborhood and absorbed
    the region’s resilient, community‑oriented values. The city’s strong arts revitalization, love of sports, and the seasonally harsh climate have shaped his pragmatic yet open‑minded outlook, blending
    a respect for tradition with an appetite for new ideas.
