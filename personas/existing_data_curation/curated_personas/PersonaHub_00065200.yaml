persona_description: A healthcare professional who is concerned about the health and well-being of older adults, particularly those who may be at risk for poor nutrition, weight loss, and weakened immunity
  due to a loss of taste. They are aware of the importance of protecting the sense of taste and have taken steps to do so, including avoiding upper respiratory and middle ear infections, reviewing medications,
  avoiding head injuries, and taking care of dental problems. They are also aware of the potential for exposure to toxic substances that can impair taste and seek medical advice if necessary.
