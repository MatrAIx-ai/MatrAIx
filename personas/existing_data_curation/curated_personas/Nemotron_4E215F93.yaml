  career_goals: Although Lori is currently not in the formal workforce, she aims to deepen her impact in the Simpsonville community. She hopes to secure a seat on the local PTA board and eventually serve
    on the Greenville County Parks and Recreation committee, where she can influence the development of senior‑friendly programs and green spaces. Lori also dreams of turning her love of cooking into a
    modest home‑based catering service for neighborhood events, blending her organizational skills with her passion for Southern cuisine. She plans to enroll in a short digital‑literacy course at the community
    college to stay current with online fundraising tools. Maintaining her health and vitality so she can continue volunteering and perhaps mentor teenage mothers in life‑skill workshops remains a personal
    ambition.
