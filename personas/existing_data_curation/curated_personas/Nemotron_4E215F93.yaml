personas:
  professional: Lori Shankwitz is a seasoned community volunteer who transforms neighborhood gatherings into flawlessly organized affairs, drawing on her keen budgeting mind, love for structure, and competitive
    spirit honed through regional quilting contests, while simultaneously pursuing a seat on the PTA board and a future role on the Greenville County Parks and Recreation committee to champion senior-friendly
    green spaces.
  sports: Lori Shankwitz enjoys weekly walks on the Swamp Rabbit Trail for cardio fitness, faithfully cheers the Greenville Drive minor-league baseball team and the Carolina Panthers, and participates in
    a senior-center bridge league that doubles as a strategic sport, while occasionally joining a local adult softball league for a friendly competitive outlet.
  arts: Lori Shankwitz is an active gospel choir member who delights in singing Mahalia Jackson classics, a competitive quilter inspired by the bold patterns of Faith Ringgold's works, an amateur photographer
    capturing the moss-draped oaks of historic downtown Simpsonville, and a diligent knitter who often hums Dwight Yoakum verses while working on scarves for family members.
  travel: Lori Shankwitz prefers short, road-trip getaways that blend scenic hikes in the Blue Ridge Mountains, beach walks at Myrtle Beach, and cultural stops in Charleston's historic district, planning
    her itineraries with a mix of spontaneous detours for local farmers' markets and careful budgeting to keep trips affordable, while dreaming of a future pilgrimage to the Smithsonian's National Museum
    of American History.
  culinary: Lori Shankwitz loves whipping up classic Southern dishes like shrimp and grits, tomato pie, and collard greens seasoned with home-grown herbs, often experimenting with a dash of smoked paprika
    in her famed peach cobbler, and takes pride in baking pecan-streusel biscuits for church potlucks, though she sometimes over-salts to compensate for the lack of a precise measuring spoon.
  core: Lori Shankwitz blends Southern hospitality with a competitive, detail-oriented streak, turning community events into polished showcases while juggling occasional impulsive décor splurges and a habit
    of humming gospel tunes during every garden chore.
background:
  cultural: Lori grew up in a small town in upstate South Carolina, raised in a close‑knit, middle‑class white family with deep roots in the Baptist church. Her upbringing emphasized Southern hospitality,
    family gatherings, and a strong sense of community responsibility. She enjoys traditional Southern cuisine, folklore, and seasonal festivals like the Upstate Fall Fest. While she respects the region’s
    conservative values, Lori’s outgoing nature leads her to embrace diverse social circles and community initiatives. Her cultural identity blends the warmth of Southern traditions with a modern, competitive
    spirit that drives her involvement in local volunteer leadership.
attributes:
  skills: '[''Event coordination'', ''Culinary arts'', ''Gardening'', ''Home budgeting'', ''Basic computer literacy'', ''Volunteer management'', ''First aid and CPR'', ''Interpersonal communication'']'
  hobbies: '[''Gardening'', ''Cooking and baking'', ''Church choir'', ''Quilting'', ''Bridge (card game)'', ''Walking'', ''Traveling to state parks'', ''Attending community festivals'', ''Nature photography'',
