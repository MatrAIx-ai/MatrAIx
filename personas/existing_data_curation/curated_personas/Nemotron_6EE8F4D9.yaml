personas:
  professional: James Busby, an aspiring junior engineer and budding artist, applies his methodical planning and calm curiosity to design intricate LEGO moving-mechanism models for his school robotics club
    while also sketching detailed nature scenes that reflect his love for order and harmony.
  sports: James Busby, an energetic member of the Overland Park Youth Soccer League who also cheers for the Kansas City Chiefs and the Kansas City Royals, balances his love for soccer drills with routine
    weekend bike rides on local trails and approaches fitness with organized practice sessions while still reveling in the camaraderie of his teammates.
  arts: James Busby, a budding watercolorist who sketches wildlife scenes inspired by the vivid canvases of Claude Monet and the animated adventures of Walt Disney, spends afternoons at the Overland Park
    Art Fair and composes simple piano melodies reminiscent of early Disney scores, allowing his calm curiosity to blend visual and musical storytelling.
  travel: James Busby, whose family road-trip vacations include annual visits to St Louis City Museum and occasional weekend getaways to the Kansas City Zoo, prefers meticulously planned itineraries that
    balance museum exploration with playground time while dreaming of a future adventure to the Grand Canyon's rim and the science museums of Washington DC.
  culinary: James Busby, who loves buttery macaroni-and-cheese, chicken nuggets, and strawberry-banana smoothies, enjoys assembling simple no-cook recipes like DIY trail mix with pretzels, dried fruit,
    and M&Ms, and occasionally tries to whisk together his own pancake batter, though he often forgets to add the sugar, revealing a playful culinary quirk.
  core: James Busby, an eight-year-old whose calm curiosity fuels a meticulous love for LEGO engineering, watercolor nature sketches, and organized soccer play, balances a disciplined savings habit with
    occasional candy splurges, and cherishes community traditions like library reading nights.
background:
  cultural: James is raised in a White, Midwestern American family in Overland Park, Kansas. His household reflects typical suburban values—emphasis on education, community involvement, and polite interpersonal
    conduct. He celebrates national holidays such as Thanksgiving, Independence Day, and seasonal festivals, and participates in school and community events like the local art fair and library reading programs.
    The regional culture, with its mix of modesty, friendliness, and support for extracurricular activities, nurtures his curiosity and his appreciation for both artistic and scientific pursuits.
