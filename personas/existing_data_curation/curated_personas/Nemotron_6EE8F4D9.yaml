  career_goals: James dreams of a future where he can combine his love of art, ideas, and structure. He often says he wants to become a museum exhibit designer or an architect, creating spaces that tell
    stories and inspire curiosity. He also imagines helping younger children discover art and science, so a role as a community arts educator later in life appeals to him. His calm, resilient temperament
    makes him confident that he can pursue long‑term projects and bring people together to achieve shared goals.
