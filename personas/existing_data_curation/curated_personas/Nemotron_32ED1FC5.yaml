  career_goals: Jennifer aims to become a clinical instructor for dental‑hygiene students at a community college, leveraging her practice experience to mentor the next generation. She plans to earn a master's
    degree in public health to design and lead community‑based oral‑health outreach programs that serve underserved families in rural Alabama. Within her current practice, she aspires to take on an office‑manager
    or associate‑director role, where she can implement innovative technologies, streamline workflows, and improve patient care efficiency. Jennifer also hopes to expand her influence beyond the clinic
    by creating educational content—such as a blog or YouTube channel—focused on demystifying dental health and encouraging preventive habits among a broader audience.
