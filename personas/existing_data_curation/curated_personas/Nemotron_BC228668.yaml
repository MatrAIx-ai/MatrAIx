  career_goals: Although she is not currently employed, Jennifer aims to deepen her involvement in community service by obtaining a certified volunteer coordinator credential and leading health‑and‑wellness
    workshops for seniors at the North Las Vegas Community Center. She also hopes to mentor at‑risk youth through after‑school tutoring programs, and to complete a CPR/first‑aid certification to be better
    prepared for emergencies. In the longer term, she envisions helping to organize a cultural heritage festival that highlights Mexican traditions, thereby preserving her family’s legacy while fostering
    intercultural understanding.
