personas:
  professional: Hazem Sneed, a veteran assembler and fabricator with three decades of expertise in welding, CNC programming, and quality inspection, combines a love for structured workflow design with a
    knack for spontaneous troubleshooting, and they channel their talkative, supportive personality into mentoring new hires and leading daily safety huddles while pursuing a lead-supervisor role.
  sports: Hazem Sneed enjoys competitive bowling with the Lions Bowling Club, avidly follows the Minnesota Vikings, Twins, and Wild, spends weekends hunting deer in the Boundary Waters, fishing on Lake
    Mille Lacs, and hiking the forests around Becker, balancing team camaraderie with solo outdoor pursuits.
  arts: Hazem Sneed lights up local karaoke nights with renditions of Bob Dylan and Neil Young, strums acoustic guitar in a neighborhood folk circle, and finds inspiration from classic rock icons like The
    Rolling Stones, weaving music into their social gatherings and hands-on craftsmanship.
  travel: Hazem Sneed prefers spontaneous road trips to the Upper Peninsula, the historic towns of Deadwood, South Dakota, and occasional overseas trips to Munich for classic car shows, often booking last-minute
    deals that fit their flexible schedule and modest consulting income.
  culinary: Hazem Sneed cultivates a small vegetable garden to harvest tomatoes, corn, and zucchini, pairs the fresh produce with grilled trout caught on weekend outings, enjoys smoking venison jerky, and
    occasionally indulges in comfort food like homemade mac and cheese after bowling nights, showcasing a blend of farm-to-table cooking and hearty, comfort-driven meals.
  core: Hazem Sneed blends a methodical, safety-first work ethic with a spontaneous, talkative spirit that fuels community involvement, hands-on hobbies, and an ever-ready karaoke mic, all while juggling
    the occasional impulsive purchase and occasional health neglect.
background:
  cultural: Hazem grew up in rural Becker, Minnesota, in a family with German‑Scandinavian roots. The Midwestern values of hard work, self‑reliance, and community participation shaped his upbringing. He
    was raised attending a local Lutheran church, where he learned the importance of service and fellowship. The region's strong outdoor culture—spending time on lakes, forests, and in the agricultural
    landscape—instilled a respect for nature and seasonal activities like hunting and fishing. His cultural identity blends traditional Midwestern pragmatism with a love for social gatherings and communal
    events that are hallmark to small‑town life in Minnesota.
attributes:
  skills: '[''Technical Drawing Interpretation'', ''MIG/TIG Welding'', ''CNC Machine Operation'', ''Quality Inspection'', ''Mechanical Troubleshooting'', ''Inventory Management'', ''OSHA Safety Compliance'',
    ''Team Training & Mentoring'', ''Process Improvement'', ''Ad‑hoc Problem Solving'']'
  hobbies: '[''Karaoke nights'', ''Acoustic guitar community circle'', ''Bowling league'', ''Volunteer fire department'', ''Hunting and fishing'', ''Woodworking furniture projects'', ''Classic car restoration'',
    ''Gardening'', ''County fair participation'', ''Church potluck events'']'
  career_goals: Hazem aims to move into a lead‑supervisor role within the next three years, leveraging his experience to streamline production processes and mentor the next generation of fabricators. He
    plans to earn an AWS Certified Welder credential and complete a short‑course in lean manufacturing to bring more structured efficiency to his plant. Long‑term, he envisions transitioning to a part‑time
    consulting position for local manufacturers, where he can apply his blend of systematic thinking and spontaneous troubleshooting to improve small‑shop operations while maintaining a flexible schedule
    that supports his community involvement.
