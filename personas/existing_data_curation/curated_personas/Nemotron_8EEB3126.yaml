  hobbies: '[''Reading non-fiction (history, technology)'', ''Watching documentaries'', ''DIY home improvement projects'', ''Cooking traditional Mexican cuisine'', ''Urban gardening'', ''Hiking local trails'',
    ''Photography (urban and nature)'', ''Listening to regional Mexican music'', ''Playing strategy board games with close friends'', ''Journaling and mindfulness practice'']'
  career_goals: Aldo aims to secure a stable, full-time position in logistics, facilities management, or property maintenance where he can leverage his organizational and practical skill set. Over the next
    two years he plans to earn a vocational certification such as Certified Facility Manager, OSHA safety, or HVAC technician, and complete a GED or community-college coursework in business administration.
    His long-term ambition is to advance to a supervisory role, mentoring new staff and contributing to a supportive, low-stress work environment. He also hopes to continue personal development through
    stress-management workshops and possibly a part-time counseling group to address his tendency toward worry.
