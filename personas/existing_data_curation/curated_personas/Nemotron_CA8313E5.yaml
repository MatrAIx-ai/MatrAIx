  career_goals: Thanh aspires to advance to a senior leadership role, such as Director of Service Operations or Head of Client Experience, within a forward‑thinking hospitality or wellness organization.
    She also dreams of launching her own boutique concierge service that blends art, cultural experiences, and personalized care for high‑net‑worth clients. To support these ambitions, she plans to earn
    a Bachelor of Business Administration (or an MBA) part‑time, obtain a Certified Customer Service Manager credential, and mentor emerging women professionals in the service industry.
