personas:
  professional: Adele Carlson is a full‑stack developer specializing in JavaScript, Python, and cloud‑native architecture, who channels her competitive streak into leading hackathons while often juggling
    tasks in a delightfully chaotic way.
  sports: Adele Carlson fuels her high‑energy lifestyle with spin classes, Zumba, and trail runs with the Blue Ridge Trailblazers Running Club, cheering on the Charlotte Hornets and Carolina Panthers, and
    treats each weekend as a mini‑competition to out‑pace her last run.
  arts: Adele Carlson strums acoustic guitar in a community folk ensemble, devotes game nights to strategy titles like Terraforming Mars and Catan, and finds inspiration in artists such as Mumford & Sons,
    Kacey Musgraves, and Bob Dylan, shaping her creative outlet between tech workshops.
  travel: Adele Carlson prefers spontaneous weekend escapes to the Blue Ridge foothills, a culinary tour of Asheville, and has a bucket‑list yearning for Kyoto’s cherry blossoms and Reykjavik’s northern
    lights, balancing limited family commitments with a love for cultural immersion.
  culinary: Adele Carlson, an adept home chef, crafts Southern‑inspired dishes like shrimp‑and‑grits with andouille sausage, collard greens seasoned with smoked paprika, and bourbon‑glazed salmon, pairing
    them with locally sourced wines while experimenting with heirloom vegetable varieties.
  core: Adele Carlson blends competitive curiosity with a relaxed, sometimes chaotic work style, juggling tech leadership ambitions, social pulse, and stress‑wired health habits.
background:
  cultural: 'Adele’s cultural background reflects a blend of her Northern European ancestry and the Southern milieu of Charlotte, North Carolina. Raised in a middle‑class family with Swedish‑American roots,
    she grew up valuing education, self‑reliance, and a pragmatic approach to problem‑solving—traits that echo the Scandinavian work ethic. Relocating to Charlotte in her late twenties, she adopted the
    region’s emphasis on community and hospitality, often engaging in local traditions like barbecue gatherings, college‑football camaraderie, and participation in neighborhood festivals. This hybrid background
    informs her balanced perspective: a curiosity‑driven, competitive mindset tempered by a welcoming, socially‑oriented lifestyle.'
