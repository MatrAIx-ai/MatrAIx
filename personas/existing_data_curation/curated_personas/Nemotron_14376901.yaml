personas:
  professional: Sebastian Cruz, a budding young engineer, channels the precise, step-by-step mindset cultivated by building intricate LEGO models into early robotics hobby projects, where they methodically
    troubleshoot circuits and design simple autonomous vehicles, reflecting their love of structure and creativity.
  sports: Sebastian Cruz enjoys playing soccer with the Desert Foxes youth club, idolizes the Phoenix Suns, and balances weekly practice with weekend trail hikes, approaching fitness with a disciplined
    routine that blends structured drills and spontaneous exploration.
  arts: Sebastian Cruz spends afternoons sketching original cartoon characters inspired by classic animated series like those of Matt Groening, flips through adventure novels by authors such as Rick Riordan
    for visual ideas, and regularly watches performances by the local community theater, letting these creative outlets shape their imaginative worldview.
  travel: Sebastian Cruz loves weekend family road trips to nearby desert landmarks such as Saguaro National Park and dreams of visiting the Grand Canyon and the ancient ruins of Machu Picchu, preferring
    carefully planned itineraries that balance outdoor adventure with restful museum stops while staying within the modest budget set by their parents.
  culinary: Sebastian Cruz enjoys helping prepare family recipes such as chicken tacos al pastor, fresh guacamole with lime and cilantro, and homemade quesadillas, demonstrating a budding cooking skill
    that blends meticulous ingredient measuring with a joyful rhythm of chopping and stirring.
  core: Sebastian Cruz balances a love for meticulous LEGO engineering, calm resilience, and playful curiosity, often forgetting homework in favor of a new building project while reliably keeping their
    soccer cleats neatly organized.
background:
  cultural: Sebastian grows up in a vibrant Mexican‑American household in Rancho Mirage, California. His family celebrates traditions such as Día de los Muertos and holidays like Cinco de Mayo, integrating
    Spanish language, music, and cuisine into daily life. He frequently visits his grandparents, who share stories of Mexico, which deepens his appreciation for his heritage. The community around him includes
    a blend of Mexican cultural events and broader Californian influences, giving Sebastian a bicultural perspective that shapes his values of family, cooperation, and respect for cultural diversity.
