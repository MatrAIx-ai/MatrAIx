persona_description: Dr. William Conner is a scientist who specializes in the study of forest ecology and hydrology, particularly in the context of coastal wetlands and tidal freshwater forested wetlands.
  He is particularly interested in the long-term impacts of disturbance on these ecosystems and the potential effects of sea-level rise. Dr. Conner's research focuses on understanding the ecology and potential
  effects of sea-level rise on these ecosystems and the long-term impacts of disturbance on these systems. His research includes studying the functional ecological attributes of forest transitions to marsh
  in tidal freshwater swamps and the interactions between land use change, sediment loads in streams, channel-floodplain connectivity, and floodplain forest integrity within key river basins. He is also
  interested in the physiology associated with water transport in trees under differing environmental conditions and the specific physiological requirements of trees at different microtopographic and landscape
  positions. Dr. Conner's research has important implications for the sustainability of floodplain forests and the conservation of wildlife, as well as the potential for long-term carbon sequestration.
