  hobbies: '[''Video gaming'', ''Hip‑hop music production'', ''Skateboarding'', ''Basketball'', ''Reading graphic novels'', ''YouTube tutorials on tech and DIY'', ''Journaling'', ''Community volunteer work
    (after‑school tutoring and peer support)'']'
  career_goals: Maurice aims to earn his GED within the next year and then enroll in a community‑college program focused on digital media or audio engineering. He dreams of producing hip‑hop tracks for
    local artists while also developing a modest home studio. Parallel to his creative ambitions, he hopes to secure an apprenticeship in a trade such as carpentry or electrical work, valuing the stability
    and tangible results it offers. Long‑term, Maurice envisions combining his technical skills and his natural empathy by mentoring younger teens in after‑school programs, helping them navigate school,
    mental‑health challenges, and creative expression.
