personas:
  professional: Maurice Frazier, a 17‑year‑old budding digital media enthusiast, channels his curiosity for strategy games and hands‑on tinkering into GarageBand beat‑making and basic woodworking while
    flexibly balancing volunteer peer‑support at the local heritage center with a pragmatic goal of earning a GED and pursuing audio engineering studies alongside a carpentry apprenticeship.
  sports: Maurice Frazier, a skate‑boarding enthusiast who spends weekends at the local skate park and joins pickup basketball games, roots for the Seattle Seahawks and Seattle Kraken, and occasionally
    hikes with the Emerald City Trail Club to stay active.
  arts: Maurice Frazier, who produces hip‑hop beats inspired by Kendrick Lamar and Anderson .Paak while devouring graphic novels like 'Ms. Marvel' and 'Saga,' balances his love for R&B playlists with occasional
    binge‑watching of Jordan Peele films, letting these influences shape his lyrical style.
  travel: Maurice Frazier, who prefers spontaneous weekend getaways over rigid itineraries, often explores the Cascades’ hiking trails, takes short trips to Portland’s indie music scene, and dreams of attending
    a gaming convention in Tokyo to blend his love of tech, culture, and new experiences.
  culinary: Maurice Frazier, a modest home‑cook, loves whipping up soul‑food staples like collard greens with smoked turkey, sweet‑potato mac & cheese, and adding hot sauce to his late‑night ramen, while
    experimenting with fresh basil and cilantro in homemade pizza toppings.
  core: Maurice Frazier, a 17‑year‑old tech‑savvy dreamer, balances restless curiosity with a laid‑back, sometimes disorganized approach, channeling his emotional intensity into beat‑making, skate‑boarding,
    and mentoring peers.
background:
  cultural: Maurice was raised in a Black family that migrated from the Southern United States to Everett, Washington. His household blends soul food traditions, gospel music from his local church, and
    contemporary hip‑hop influences, creating a rich cultural tapestry. Growing up in Snohomish County—a predominantly white region—he has developed a keen awareness of his racial identity and often finds
    community and solidarity through the Evergreen African‑American Heritage Center and neighborhood youth programs. This dual exposure to his heritage and the Pacific Northwest environment shapes his worldview,
    fostering both a strong sense of cultural pride and an adaptable, open‑minded outlook.
attributes:
  skills: '[''Basic computer operation'', ''Internet research'', ''Video game strategy'', ''Basic woodworking'', ''Rap lyric improvisation'', ''Empathy and peer listening'', ''Basic bike maintenance'',
