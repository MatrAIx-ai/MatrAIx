  career_goals: Although officially retired, Giovanni is driven to leave a lasting imprint on his community and family. He aims to compile a family memoir that mixes oral histories with photographs, preserving
    the stories of his parents' migration from Jalisco and the neighborhood’s evolution. He hopes to become a senior mentor at the Gardena Community Center, teaching practical skills like simple home repairs
    and gardening to younger adults, while also leading a weekly support group for widowed seniors dealing with anxiety and grief. Additionally, he is seeking to become proficient in using health‑tracking
    apps to monitor his blood pressure and mental‑wellness, hoping this will enable him to advocate for better senior health services in Los Angeles County.
