  hobbies: '[''Playing with building blocks'', ''Simple jigsaw puzzles'', ''Drawing with crayons'', ''Singing Cuban children’s songs'', ''Dancing to salsa music'', ''Listening to bilingual storybooks'',
    ''Exploring the local park'', ''Sorting shapes and colors'']'
  career_goals: Even at three, Marisela expresses budding ambitions shaped by her curiosity and love for order. She often says she wants to be a teacher who helps children learn, a doctor who fixes people,
    or an architect who designs neat, organized buildings. Her fascination with building blocks and puzzles fuels a desire to create and solve problems, while her competitive nature pushes her to be "the
    best" at these future roles. She also mentions wanting to help her family in the kitchen, hinting at a caring, service‑oriented future. These early aspirations are guided by her practical mindset and
    a wish to bring structure to the world around her.
