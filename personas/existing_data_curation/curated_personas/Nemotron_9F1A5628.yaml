personas:
  professional: A budding architect-in-the-making, Marisela Fitzgerald stacks blocks with meticulous precision, turning imaginative designs into organized constructions, while their curiosity drives them
    to test every piece and their practical streak insists on sturdy foundations, and they double‑check every connection, reflecting a methodical approach even in play.
  sports: Marisela Fitzgerald cheers for the local junior soccer club, the Little Lions, dribbles a mini ball with fierce competitiveness, idolizes the Chicago Sky women's basketball team, enjoys watching
    the Detroit Tigers on weekends, and they practice kicking the ball in the backyard after each game.
  arts: Marisela Fitzgerald delights in coloring books featuring Disney's Moana, sings along to Pharrell Williams' "Happy", and reenacts scenes from the animated series "Bluey" with dramatic flair, they
    also love drawing simple portraits of family members, reflecting a budding love for performance and visual art.
  travel: Marisela Fitzgerald loves family road trips to the nearby lake where they collect seashells, dreams of visiting Disneyland in California, and prefers well‑planned itineraries that include scheduled
    nap times to avoid stress.
  culinary: Marisela Fitzgerald prefers buttery peanut butter and banana sandwiches, enjoys stirring mashed potatoes with a tiny wooden spoon, savors the sweet tang of strawberry yogurt, but occasionally
    refuses broccoli, citing a "green monster" fear, and they relish helping set the table with plastic plates.
  core: Marisela Fitzgerald is a highly organized three‑year‑old with boundless curiosity, a competitive streak, and a tendency to worry; they turn everyday play into meticulously planned adventures while
    hoarding stickers like treasure.
background:
  cultural: Marisela is a Cuban‑American toddler raised in Hialeah, a vibrant Cuban enclave in South Florida. At home, Spanish is spoken alongside English, giving her a bilingual foundation. Family gatherings
    feature traditional Cuban foods such as tostones, arroz con pollo, and pastelitos, and celebrations include Carnaval de la Cultura Cubana and religious holidays rooted in Catholic traditions. Community
    events at local churches and cultural centers expose her to Cuban music, dance, and storytelling. This rich cultural environment nurtures her love of rhythm, community, and family closeness, while also
    reinforcing values of organization, reliability, and a practical approach to daily life.
attributes:
  skills: '[''Stacking blocks'', ''Simple puzzle solving'', ''Drawing basic shapes with crayons'', ''Bilingual language switching (Spanish/English)'', ''Following multi-step instructions'', ''Counting to
