personas:
  professional: Stacy Walsh, an aspiring interactive story developer, blends her love for fantasy novels, LEGO design, and Scratch programming to create whimsical digital narratives that showcase her imaginative
    mind and meticulous organization.
  sports: Stacy Walsh enjoys weekend nature hikes along Lake Champlain, participates in the Burlington Youth Soccer Club, roots for the Boston Red Sox in baseball season, and treats their weekly swim lessons
    like a low‑key fitness routine that balances curiosity with gentle competition.
  arts: Stacy Walsh immerses themselves in the worlds of J.K. Rowling’s wizardry, sketches scenes inspired by Hayao Miyazaki’s animation, plays soft Beethoven piano sonatas while drawing, and collects prints
    by illustrator Mary GrandPré, letting the arts shape their identity and creative play.
  travel: Stacy Walsh prefers low‑key family road trips that combine scenic hikes—like a recent excursion to Acadia National Park—with visits to imaginative museums such as the Museum of Science in Boston,
    balancing a love for exploration with the comfort of familiar routines.
  culinary: Stacy Walsh loves crafting colorful fruit‑and‑veggie snack plates, especially sliced apples with peanut butter and carrot sticks, enjoys making simple stir‑fry bowls with broccoli, bell peppers,
    and soy sauce under parental supervision, and has a guilty pleasure for pepperoni pizza after a long LEGO build.
  core: Stacy Walsh is an imaginative, calm 11‑year‑old who channels curiosity into coding, sketching, puzzles, and nature cataloging, while maintaining quirky budgeting habits and a diligent approach to
    mild allergies.
background:
  cultural: Stacy is a white American raised in West Chazy, a quiet rural community in Clinton County, New York. The town’s landscape of farms, forests, and the nearby Lake Champlain instills a strong connection
    to nature and seasonal rhythms. Her family celebrates traditional holidays like Thanksgiving and Christmas with multi‑generational gatherings, and she often helps with community events such as the annual
    town fair. The local school emphasizes both academic achievement and hands‑on projects, reinforcing her love for independent, creative work. Though her heritage includes typical Northeastern European
    ancestry, her upbringing blends the region’s modest, self‑reliant values with a supportive, close‑knit community atmosphere.
