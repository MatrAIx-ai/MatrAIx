  hobbies: '[''Reading fantasy and science‑fiction books'', ''Sketching and watercolor painting'', ''Building LEGO and paper‑craft models'', ''Coding interactive stories in Scratch'', ''Exploring local
    woods and lakesides'', ''Collecting and cataloguing natural specimens'', ''Journaling imaginative narratives'', ''Playing piano while drawing'', ''Solving puzzles and logic games'']'
  career_goals: Stacy envisions a future where she can merge art and science. She dreams of becoming a concept artist for video games or animated films, designing imaginative environments that feel both
    fantastical and scientifically plausible. She also contemplates a path as a science illustrator or environmental storyteller, using visual media to raise awareness about nature and conservation. To
    reach these goals, she hopes to attend a specialized STEM‑arts high school, study graphic design and environmental science, and eventually work in a collaborative studio that values innovative, interdisciplinary
    creativity.
