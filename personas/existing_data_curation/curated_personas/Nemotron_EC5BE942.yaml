personas:
  professional: Santanna Abdool, a budding LEGO architect who channels her curiosity and practicality into color‑coded, intricate builds, treating each creation like a mini‑project that balances imaginative
    flair with methodical planning, and often organizes her bricks before daringly dismantling them for the next challenge.
  sports: Santanna Abdool, a competitive forward for the neighborhood junior soccer club "Rising Stars," who idolizes the city’s professional team the "River City Rangers," practices dribbling drills after
    school, follows the Rangers’ matches on weekends, and channels her competitive spirit into sprinting sprints at the community park while balancing occasional solo practice sessions for focus.
  arts: Santanna Abdool, a vivid doodler inspired by Eric Carle’s bold palettes and Disney’s animal characters, spends afternoons sketching bright jungle scenes, while she grooves to upbeat R&B tracks by
    Beyoncé and Bruno Mars and uplifting gospel hymns by Kirk Franklin, weaving music into her drawings to give each animal a rhythm of its own.
  travel: Santanna Abdool, an adventurous six‑year‑old who has explored the local zoo, taken a family road trip to the seaside boardwalk, and dreams of visiting Disneyland Paris and the Great Barrier Reef,
    preferring hands‑on experiences like feeding giraffes over long flights, yet occasionally asks her parents to plan a "treasure hunt" itinerary for her next vacation.
  culinary: Santanna Abdool, a self‑appointed junior chef who loves slurping cheesy macaroni, building peanut‑butter‑and‑jelly sandwiches with strawberry jam, mixing fruit salads with mango, kiwi, and blueberry,
    and proudly helps stir chocolate chip pancake batter, though she often sneaks an extra cookie before dinner.
  core: Santanna Abdool, a six‑year‑old whose relentless curiosity and competitive edge drive her to meticulously sort LEGO bricks, sketch animals with vibrant colors, and negotiate allowance savings, all
    while balancing a playful skepticism of others’ motives and a knack for bouncing back from setbacks.
background:
  cultural: Santanna is raised in an African‑American family in Birmingham, Alabama, where community, faith, and family traditions play a central role. She participates in church youth events, celebrates
    Juneteenth with storytelling and music, and enjoys Southern comfort foods like collard greens and cornbread prepared with family recipes. The local Black heritage museums and community festivals expose
    her to black history and artistic expression, shaping her sense of identity and pride.
attributes:
  skills: '[''Reading simple chapter books'', ''Basic addition and subtraction'', ''Using educational tablet apps'', ''LEGO building'', ''Following multi-step snack preparation'', ''Organizing personal
    belongings'']'
  hobbies: '[''Drawing animals'', ''LEGO building'', ''Visiting the library'', ''Playing soccer'', ''Listening to R&B and gospel music'', ''Using kid‑friendly coding apps'']'
  career_goals: Santanna dreams of becoming a scientist who discovers new things about animals, inspired by her love of nature walks in the Birmingham parks and her competitive spirit in school science
    fairs. She also enjoys the idea of teaching younger children, seeing it as a way to share her curiosity and practical problem‑solving skills. While still very young, she often talks about wanting to
    wear a lab coat or a teacher’s badge when she grows up.
