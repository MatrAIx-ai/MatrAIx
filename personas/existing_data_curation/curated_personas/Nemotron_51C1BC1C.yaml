  hobbies: '[''Watercolor painting'', ''Urban photography'', ''Hiking in redwood forests'', ''Reading historical fiction and philosophy'', ''Cooking Vietnamese cuisine'', ''Tai chi practice'', ''Volunteering
    for Vietnamese community cultural events'', ''Attending small art exhibitions'']'
  career_goals: Minh aims to transition into senior leadership as a Chief Compliance Officer, where he can shape enterprise‑wide ethical standards and embed compliance into product development cycles. He
    is particularly interested in leveraging emerging RegTech solutions—such as AI‑driven monitoring and blockchain‑based audit trails—to enhance efficiency and predictive risk management. Over the next
    five years, he plans to obtain the Certified Information Privacy Professional (CIPP/US) and Certified Information Systems Security Professional (CISSP) credentials, publish thought‑leadership articles
    on privacy in the fintech space, and mentor the next generation of compliance professionals, especially those from underrepresented backgrounds.
