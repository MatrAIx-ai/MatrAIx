  hobbies: '[''Reading science‑fiction and adventure books'', ''Building LEGO models'', ''Drawing comic‑style illustrations'', ''Scratch programming'', ''Playing soccer with a small group of friends'',
    ''Exploring nature and collecting insects'', ''Listening to gospel and R&B music'']'
  career_goals: Micheal dreams of becoming a mechanical engineer who designs robots and helpful machines. He aims to excel in math and science throughout elementary school, join a robotics club in middle
    school, and win science fair awards. He also sees himself helping others by eventually teaching STEM subjects, valuing the structure and compassion that come with guiding younger students. His short‑term
    ambition is to maintain high grades, deepen his coding abilities, and explore more complex LEGO building challenges.
