personas:
  professional: A budding junior software creator, Micheal Journey channels their love for sci‑fi adventures and meticulous LEGO building into designing simple games on Scratch, where they ensure each project
    follows a clear plan and their occasional worry drives them to test every bug before sharing.
  sports: A dedicated member of the neighborhood soccer club, Micheal Journey laces up for the Eastside Strikers, enjoys playing as a defensive midfielder, idolizes Lionel Messi’s precise passing, and follows
    the local high school’s varsity games while they balance their preference for small‑group drills over large‑scale scrimmages.
  arts: An imaginative comic‑style illustrator, Micheal Journey sketches superhero adventures inspired by Marvel legends like Stan Lee, syncs their drawing sessions to the soulful rhythms of Aretha Franklin
    and contemporary gospel trio Kirk Franklin, and collects limited‑edition LEGO art sets that double as creative inspiration, while they often hum the melodies as they work.
  travel: A curious explorer, Micheal Journey prefers family‑oriented trips that blend structured itineraries with spontaneous park discoveries, such as weekend visits to the Smithsonian’s National Air
    and Space Museum, a summer road‑trip to the Appalachian Trail’s scenic overlooks, and occasional dreams of traveling to Japan’s Pokémon Center for a sci‑fi pilgrimage, all while they stay within the
    modest budget set by their parents.
  culinary: A budding junior chef, Micheal Journey delights in preparing simple yet comforting dishes like macaroni‑and‑cheese drizzled with extra cheddar, crispy baked chicken tenders seasoned with paprika,
    and sweet potato pies after hearing gospel cooking shows, often experimenting with LEGO‑themed plating to make meals more playful, and they proudly serve their creations to family members.
  core: Micheal Journey is a methodical, sci‑fi‑infused nine‑year‑old who builds LEGO galaxies, codes Scratch games, worries about every detail, and finds solace in gospel music and small‑group soccer,
    while they occasionally get lost in daydreams of interstellar adventures.
background:
  cultural: Micheal is an African‑American boy raised in Covington, Georgia, where Southern culture and Black heritage blend in everyday life. His family participates actively in a local church, celebrating
    holidays such as Juneteenth and Thanksgiving with soul‑food meals, gospel music, and community gatherings. He is exposed to stories of the Great Migration and the civil‑rights legacy of the region,
    and he values the strong sense of community, perseverance, and respect that are central to his cultural upbringing.
