  hobbies: '[''Hiking'', ''Cycling'', ''Spin and Yoga Classes'', ''Craft‑Beer Tastings'', ''Live‑Music Festivals'', ''Fine‑Art Painting (acrylic, watercolor)'', ''Community Mural Volunteering'', ''DIY Home
    Projects'', ''Gardening'', ''Board‑Game Nights'', ''Cooking International Recipes'']'
  career_goals: Elise aims to turn her hands‑on expertise into a fully licensed painting contracting business within the next three years, focusing on sustainable, high‑end residential interiors and artistic
    murals for local businesses. She wants to build a small, flexible crew that can accommodate her love of spontaneity while delivering reliable, high‑quality work. A long‑term ambition is to develop a
    signature decorative‑finish style that blends Colorado mountain motifs with modern color palettes, making her brand recognizable in the Denver‑Metro area. She also hopes to mentor other young women
    entering the trade, offering apprenticeships through community programs. By the time she reaches her early thirties, she envisions a boutique studio that provides both painting services and design consulting,
    giving her creative control and a work schedule that supports her active social life.
