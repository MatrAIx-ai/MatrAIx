personas:
  professional: Mirlene Battle is a budding chess prodigy and community event organizer in training, using their love of structure to master openings and meticulously plan neighborhood block parties.
  sports: Mirlene Battle balances after‑school gymnastics at the local FlexFit club with Saturday dance rehearsals and cheers on the Mississippi State Bulldogs football broadcasts, while they also root
    for the New Orleans Saints and sketch player moves for fun.
  arts: Mirlene Battle fills sketchbooks with comic‑strip style heroes inspired by the vibrant rhythms of Aretha Franklin and Mahalia Jackson, while they attend church gospel performances and trade illustrated
    cards with friends after school.
  travel: Mirlene Battle prefers day‑trip road adventures to nearby Gulf Coast beaches and historic Savannah, dreams of a family vacation to Disney World’s Magic Kingdom, and meticulously maps each itinerary
    around their school calendar and allowance limits.
  culinary: Mirlene Battle delights in soul‑food staples like fried chicken, mac ’n’ cheese, and collard greens, proudly helps their mother stir cornbread batter, and uses pepper jack cheese and hot sauce
    to personalize their favorite peanut butter and jelly sandwiches.
  core: Mirlene Battle is an organized, chatter‑filled ten‑year‑old who dominates chess boards, orchestrates block parties, worries about every detail, and never skips a chance to belt out gospel tunes,
    because they thrive on the buzz of shared excitement.
background:
  cultural: Mirlene is raised in a close-knit African-American family in Hernando, Mississippi, where church, family gatherings, and community events shape daily life. Her family celebrates Southern black
    traditions such as soul-food meals, gospel music, and oral storytelling, and participates in local events like Juneteenth parades, church youth programs, and neighborhood block parties that emphasize
    collective support and cultural pride.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Digital educational platform navigation'', ''Organizing group activities'', ''Public speaking'', ''Strategic game play (chess)'', ''Peer mediation'']'
  hobbies: '[''Reading mystery books'', ''Playing chess'', ''Organizing neighborhood block parties'', ''Attending after-school dance classes'', ''Drawing comic strips'', ''Listening to gospel music'', ''Collecting
    stickers'']'
  career_goals: Mirlene dreams of becoming an elementary school teacher or youth mentor, a role where she can create structured, supportive learning environments and guide younger classmates. She also hopes
    to earn a chess scholarship and eventually work as a community program coordinator who designs organized after-school activities. In the short term, she wants to join the student council, win the school
    spelling bee, and lead a class project that helps classmates manage stress.
