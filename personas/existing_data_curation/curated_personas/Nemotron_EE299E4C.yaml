    technologies"]'
  hobbies: '["Attending Cajun‑Zydeco festivals", "Visiting art museums (e.g., New Orleans Museum of Art)", "Community theater participation (acting & set design)", "Cooking Creole and Southern cuisine",
    "Backyard gardening", "Leading a book club focused on art and poetry", "Participating in group fitness dance classes (Zumba, line dancing)", "Neighborhood block parties and social gatherings"]'
  career_goals: Anna aims to transition into a supervisory role, such as dental office manager, leveraging her extensive hands‑on experience and people‑skills to improve practice efficiency. She is considering
    completing a certification in dental practice management and possibly enrolling in a dental hygiene program to broaden her clinical scope. Long‑term, she envisions opening a community health outreach
    program that provides affordable dental screenings and education in Acadia Parish, blending her competitive drive with her desire to give back.
