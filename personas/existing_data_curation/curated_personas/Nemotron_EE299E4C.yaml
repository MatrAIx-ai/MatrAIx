personas:
  professional: Anna Harris is a seasoned dental assistant with over 20 years of chairside expertise, advanced proficiency in digital patient record systems (Dentrix/Eaglesoft), and a knack for improvising
    efficient clinic workflows, channeling their competitive drive and curiosity about prosthetic aesthetics into a push for a supervisory role as a practice manager.
  sports: Anna Harris stays active through weekly Latin‑dance fitness classes, supports the New Orleans Saints and Pelicans, and jogs with the Bayou Bikram running club on Saturday mornings, preferring
    the camaraderie of group exercise over solitary workouts, and they thrive on the social energy.
  arts: Anna Harris immerses herself in the visual and performing arts by attending the Louisiana Cajun‑Zydeco Festival, exploring contemporary exhibits at the New Orleans Museum of Art, and contributing
    set designs for a community theater group, and they draw inspiration from artists like John A. Walker and musicians such as Trombone Shorty.
  travel: Anna Harris enjoys spontaneous road trips along the Gulf Coast, having explored the historic streets of Savannah and the music scene in Austin, while dreaming of a cultural pilgrimage to New Orleans'
    French Quarter and a weekend getaway to the Swiss Alps, and they plan each adventure with a modest travel budget and a flexible itinerary.
  culinary: Anna Harris is an enthusiastic home cook who crafts Creole classics such as gumbo, jambalaya, and shrimp étouffée using filé powder, andouille sausage, and fresh okra, showcasing a medium skill
    level that shines during neighborhood potlucks and their weekly book‑club dinner, and they relish pairing each dish with a chilled glass of local craft beer.
  core: Anna Harris blends a competitive, art‑loving spirit with a laid‑back, sometimes disorganized approach, driving them to champion community dental health while delighting in dance, festivals, and
    flavorful Creole cooking.
background:
  cultural: Anna grew up in a tight‑knit African‑American community in Jennings, where the cultural fabric weaves together Southern traditions, Creole influences, and the legacy of the Civil Rights movement.
    Family gatherings often feature gospel music, soul food, and storytelling that emphasize resilience and communal support. She identifies strongly with the Black church and its role as a cultural hub,
    while also embracing the region’s Cajun culinary and musical heritage. This blended cultural backdrop informs her values of community service, celebration of art, and a pragmatic optimism in the face
    of challenges.
attributes:
  skills: '["Chairside assistance", "Dental radiography (X-ray imaging)", "Infection control and sterilization", "Dental software (Dentrix, Eaglesoft) data entry", "Oral health education and patient communication",
