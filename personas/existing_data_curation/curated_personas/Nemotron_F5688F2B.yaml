  hobbies: '[''Recreational soccer'', ''Hiking in the Cascades and around Lake Stevens'', ''Playing acoustic guitar'', ''Multiplayer co‑op video gaming'', ''Volunteering at local food banks and community
    clean‑ups'', ''Collecting and restoring vintage radios'', ''Attending Seattle Seahawks games'', ''Exploring new technology gadgets'']'
  career_goals: Donald aims to advance within the public safety communications field over the next five years. He plans to obtain a GED and pursue certification through the National Academy of Dispatchers,
    positioning himself for a senior dispatcher or shift supervisor role at the Everett Police or Fire Department. He is interested in leading initiatives to integrate newer CAD platforms and improve mental‑health
    resources for dispatch staff, drawing on his own experience of coping with high‑stress calls. In the longer term, Donald envisions transitioning into emergency management, where he could apply his practical
    dispatch background to broader community preparedness programs, possibly completing an associate’s degree in Public Safety Administration.
