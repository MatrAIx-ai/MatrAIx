personas:
  professional: Roddy Prieto, an aspiring junior engineer, channels a meticulous love for LEGO construction into mastering structural design principles, sets exacting standards for each build, and they
    frequently mentor playground peers with patient, organized guidance.
  sports: Roddy Prieto, a dedicated member of the community center’s junior soccer team, practices disciplined drills twice a week, idolizes the national soccer squad’s midfielders, and they balance spirited
    play with careful adherence to the team’s structured training schedule, while occasionally worrying about missing a goal.
  arts: Roddy Prieto, an enthusiastic creator, spends evenings assembling intricate LEGO models, completing jigsaw puzzles with precision, drawing detailed space scenes inspired by favorite adventure books,
    and they listen to traditional Andean folk music featuring the charango and quena, which fuels both imaginative play and disciplined artistic practice.
  travel: Roddy Prieto, who prefers well‑planned outings, enjoys family trips to the local science museum, weekend hikes in the nearby national park, and they dream of visiting the International Space Center
    in Houston, balancing curiosity about the cosmos with a comfort in familiar itineraries.
  culinary: Roddy Prieto, who helps prepare family meals, delights in mixing ingredients for quinoa‑based side dishes, assembling handmade empanadas, and tasting sweet corn pudding, while they proudly master
    the art of arranging colorful fruit platters for a structured, tasty presentation.
  core: Roddy Prieto blends a love for structured play, meticulous organization, and gentle empathy into a bright, curious 7‑year‑old who constantly builds, plans, and worries, and they approach each new
    challenge with methodical curiosity.
background:
  cultural: Roddy grows up in a bilingual Peruvian household in North Bergen, New Jersey. His parents maintain Spanish at home, teach him about Peruvian traditions, celebrate festivals like Día de la Canción
    and Inti Raymi, and share foods such as arroz con pollo and cau cau. This cultural immersion combined with a diverse American community fosters his respect for both his heritage and his local environment,
    shaping his values of family, education, and community service.
