  hobbies: '[''Visiting art galleries and museums'', ''Street art tours'', ''Contemporary Latin dance'', ''Cooking Mexican dishes'', ''Volunteering at immigrant support centers'', ''Organizing brunch gatherings'',
    ''Hiking in local parks'', ''Participating in multicultural book clubs'', ''Traveling in Mexico and the Southwestern US'', ''Photography of urban landscapes'']'
  career_goals: Her long‑term ambition is to become a senior category manager for a major national retailer, overseeing a flagship apparel or home‑goods line with an emphasis on sustainable sourcing and
    culturally inclusive designs. In the next five years she aims to lead larger buying teams, develop strategic partnerships with Mexican artisans, and eventually launch her own boutique that blends contemporary
    design with traditional Mexican craftsmanship.
