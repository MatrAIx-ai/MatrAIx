personas:
  professional: Sara Lopez, a 21‑year‑old wholesale and retail buyer, blends meticulous market research and trend forecasting with a curious eye for art and a collaborative, bilingual approach, turning
    their organized reliability and sociable energy into curated merchandise that celebrates diverse cultural narratives.
  sports: Sara Lopez fuels their energetic social spirit by joining a local volleyball league, hitting the yoga studio three times a week, and trekking with the SoCal Trail Club on weekends, all while cheering
    for the LA Lakers and LA Galaxy and tracking workouts with a fitness app.
  arts: Sara Lopez immerses themselves in Los Angeles’ vibrant art scene—regularly exploring the Getty Center, LACMA, street‑art festivals, and dancing to contemporary Latin beats while drawing inspiration
    from artists like Ai Weiwei, Kehinde Wiley, and musician Kamasi Washington, which constantly fuels their creative sensibility and weekend book‑club discussions.
  travel: Sara Lopez blends meticulous planning with spontaneous zest, often mapping weekend hikes to Joshua Tree or coastal brunches in Santa Barbara while reserving funds for dreamed‑away trips to Barcelona’s
    art districts and Seoul’s street‑food markets, balancing adventure with a modest student‑budget mindset.
  culinary: Sara Lopez enjoys an eclectic palate, mastering family‑style tamales and mole at home while also whipping up avocado‑toast with heirloom tomatoes, and they love discovering fresh cilantro, poblano
    peppers, and locally sourced quinoa at LA’s farmers’ markets, often pairing meals with natural wine during their brunch gatherings.
  core: Sara Lopez, a 21‑year‑old arts‑savvy buyer, balances relentless curiosity with organized ambition, but can’t resist late‑night gallery openings and occasionally over‑books social events, leaving
    their planner half‑filled.
background:
  cultural: Sara is a first‑generation Mexican‑American who grew up in Downey, California, in a bilingual household where Spanish and English were spoken interchangeably. Her family maintains strong ties
    to Mexican traditions from the state of Jalisco, celebrating Día de los Muertos, quinceañeras, and other cultural festivals. This heritage shapes her aesthetic preferences, culinary tastes, and a deep
    appreciation for Mexican folk art, which she often incorporates into her personal style and professional projects. At the same time, she embraces the diverse, multicultural environment of Los Angeles
    County, blending her Mexican roots with contemporary Californian influences.
attributes:
  skills: '[''Vendor negotiation'', ''Trend forecasting'', ''Market research'', ''Inventory management'', ''Product selection'', ''Bilingual communication (Spanish/English)'', ''Visual merchandising'',
