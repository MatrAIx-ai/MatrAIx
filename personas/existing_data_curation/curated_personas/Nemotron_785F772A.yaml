  hobbies: '[''watercolor painting'', ''birdwatching'', ''reading speculative fiction'', ''creative writing (poetry and short stories)'', ''digital photography'', ''gardening'', ''knitting'', ''attending
    community theater'', ''participating in local art workshops'', ''volunteering at the library for story-time'']'
  career_goals: Irene hopes to transition from full‑time cashier duties to a part‑time role that leverages her artistic interests, such as assisting with local museum programming or teaching beginner art
    classes at the community center. She also aims to complete a short certificate in digital media design to expand her portfolio and eventually exhibit her watercolor paintings in regional galleries.
    Additionally, she wants to build a small network of fellow creators to collaborate on community art projects that celebrate Kenosha's cultural heritage while supporting her own emotional well‑being.
