personas:
  professional: Robert Wall, an aspiring digital artist and teenage inventor, blends a vivid fantasy imagination with hands‑on Arduino robotics projects, channeling competitive drive into weekly online
    art challenges while keeping a disciplined school schedule that balances sketching, coding, and guitar practice.
  sports: Robert Wall, an avid outdoor enthusiast, hikes the Snake River trails with the Fruitland Youth Hiking Club in the spring, follows the Portland Trail Blazers and the Seattle Seahawks on TV, plays
    on the middle‑school soccer team, and maintains a personal fitness routine of weekend bike rides that satisfy their competitive nature without the pressure of large‑crowd sports.
  arts: Robert Wall, a budding fantasy illustrator and acoustic‑guitar hobbyist, draws inspiration from Hayao Miyazaki’s animated worlds, the lyrical storytelling of Neil Gaiman, and the folk strums of
    Joan Baez, regularly contributes digital sketches to the school’s art showcase, and spends evenings composing short sci‑fi stories that blend visual and literary creativity.
  travel: Robert Wall, a curious teen explorer, spends summer vacations road‑tripping to Boise’s art district and the volcanic landscapes of Yellowstone, dreams of visiting Japan’s Ghibli Museum for a deeper
    dive into animation, prefers meticulously planning hiking routes yet leaves room for spontaneous detours to local county fairs that celebrate the agricultural roots of their hometown.
  culinary: Robert Wall, a self‑taught kitchen experimenter, favors hearty Idaho potato casserole, fresh river trout grilled with lemon and dill, and occasionally experiments with sushi rolls using locally
    sourced avocado and cucumber, while often snacking on chocolate‑milk‑soaked cereal during coding marathons, reflecting a blend of rustic comfort and adventurous palate.
  core: Robert Wall, a fiercely imaginative yet competitively skeptical teen, balances solitary creativity in fantasy art and robotics with a habit of late‑night gaming and occasional over‑indulgence in
    sugary snacks, all while staying reliably organized enough to meet school responsibilities.
background:
  cultural: Robert grew up in Fruitland, Idaho, a small agricultural community in Payette County. His family has deep roots in the Pacific Northwest farming tradition, and his upbringing blends rural values
    of self‑reliance with exposure to the natural landscape of the Snake River Plain. While the town is predominantly white, his school curriculum includes regional Native American history, giving him an
    awareness of the area's indigenous heritage. Community events such as county fairs and high‑school art showcases have fostered his appreciation for both local craftsmanship and broader artistic expression.
attributes:
  skills: '["digital illustration", "sketching", "basic Python programming", "Scratch game development", "acoustic guitar", "chess strategy", "project organization", "creative writing", "model building"]'
  hobbies: '["drawing", "digital art", "creative writing", "Arduino tinkering", "acoustic guitar", "hiking and nature sketching", "online chess competition", "strategy video gaming", "model rocket building"]'
  career_goals: Robert aspires to become a concept artist and video game designer, merging his love for visual art and technology. He hopes to attend a specialized high school for the arts, then study computer
    graphics or interactive media at university. He dreams of creating indie games that explore abstract narratives and, long‑term, aims to work on projects that blend storytelling, art, and interactive
    technology, potentially as a creative director.
