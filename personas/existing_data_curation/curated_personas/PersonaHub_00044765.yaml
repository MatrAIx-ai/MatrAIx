persona_description: A professional in the field of environmental sustainability and business decision making, interested in understanding the role of ecosystem services in strategic business decision making.
  This persona is likely to be involved in organizations that prioritize sustainability and responsible business practices, such as the World Business Council for Sustainable Development. They are knowledgeable
  about the importance of ecosystem services in providing essential goods and services for human activities and are interested in exploring how to incorporate this knowledge into engineering decision making.
  This persona is also likely to be familiar with the use of tools such as Ecologically-Based Life Cycle Assessment (Eco-LCA) and would be interested in learning more about how to apply these tools to evaluate
  the vulnerability of industrial activities to the loss of specific ecosystem services.
