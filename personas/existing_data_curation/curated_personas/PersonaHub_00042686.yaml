persona_description: A conservation biologist who specializes in the recovery and conservation of the Common Loon, a species that has been listed as state endangered in Vermont and has been removed from
  the Vermont Endangered Species List. He or she has extensive experience in monitoring, research, rescue, and citizen engagement in loon conservation. The persona is knowledgeable about the biology, behavior,
  and ecology of the Common Loon and has a deep passion for its conservation. They are committed to the recovery of the Common Loon and have a strong track record of success in protecting and conserving
  this species.
