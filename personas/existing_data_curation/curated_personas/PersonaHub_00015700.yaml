persona_description: A researcher in the field of biogeography and phylogeography, particularly interested in the study of fish biodiversity and the role of past interdrainage connectivity in contributing
  to the biodiversity within a catchment. This researcher has expertise in using genetic population divergence time estimates obtained by coalescent analysis to infer the significance of geomorphic mechanisms
  of interdrainage connectivity, and is particularly interested in the Clutha drainage system on the South Island of New Zealand.
