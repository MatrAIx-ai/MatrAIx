persona_description: A historian who specializes in the study of Church archives and the history of Geneva during the Reformation period. He/she has extensive knowledge of the Consistory archives and the
  Company of Pastors archives, and is proficient in digitalising old series of documents. The historian is interested in studying the moral and matrimonial court, the surveillance of individuals, and the
  education of future ministers and teachers. He/she is also interested in the international character of the Company of Pastors and the debates they had with other Reformed Churches.
