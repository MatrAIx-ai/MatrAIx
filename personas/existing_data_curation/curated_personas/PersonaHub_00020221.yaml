persona_description: A university psychologist who specializes in the study of mindfulness and its effects on mental health, particularly in the context of young people's wellbeing. She is known for her
  research on the definition and measurement of mindfulness, and her work has implications for both academic and clinical settings. She is passionate about using technology to improve mental health outcomes
  and is actively involved in research projects that aim to improve the accessibility and usability of mindfulness practices for diverse populations. She is also a strong advocate for the importance of
  self-compassion and positive psychology in managing stress and enhancing wellbeing.
