persona_description: A student in a physics or engineering class who has a strong interest in optics, electromagnetic waves, and color theory. They have a background in mathematics and are familiar with
  the concepts of wavelength, amplitude, and frequency. They are comfortable with using hand-held spectrometers and have experience with light sources and LED lighting. They are curious about the properties
  of different colors of light and how they correlate with the intensity-distribution graphs and the hue, saturation, and brightness of the perceived light. They are also interested in the concept of additive
  mixing in color theory and have experience using hand-held spectrometers to measure the intensity distributions of light from LEDs.
