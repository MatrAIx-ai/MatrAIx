persona_description: A music teacher or composer who specializes in graphic notation, particularly in the use of symbols and visual representations to convey musical concepts and compositions. They are
  skilled in the creation of musical scores and arrangements, and are knowledgeable in the history and evolution of musical notation. They may also have an interest in the use of technology in music education,
  and may have experience using software such as Sibelius or Finale to create and edit music scores. They are likely to be familiar with the conventions and rules of musical notation, and may have a deep
  understanding of the relationship between music and visual art.
