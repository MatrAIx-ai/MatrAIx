  hobbies: '[''Listening to Jazz and Blues'', ''Attending Mardi Gras and Local Festivals'', ''Cooking Creole and Cajun Cuisine'', ''Playing Pickup Basketball'', ''Fishing on the Bayou'', ''Reading Business
    and Tech Books'', ''Casual Video Gaming'']'
  career_goals: Jataurus aims to advance to a regional sales manager position within the next three to five years, overseeing a larger territory and a team of representatives. He wants to lead the adoption
    of data analytics and digital tools in his sales workflow, earn professional sales certifications such as the Certified Professional Sales Leader credential, and strengthen his strategic planning abilities.
    Long‑term, he envisions launching his own consultancy to help manufacturing firms optimize their sales operations by blending practical experience with innovative solutions.
