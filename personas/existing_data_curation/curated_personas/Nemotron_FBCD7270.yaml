personas:
  professional: Jataurus Reyes is a B2B sales specialist in the wholesale manufacturing arena, leveraging a curious eye for market trends and a pragmatic negotiation style to secure high‑value contracts,
    while their relaxed, flexible approach keeps the sales pipeline fluid and their cooperative yet assertive mentoring energizes junior reps.
  sports: Jataurus Reyes is a regular participant in weekend pickup basketball games at a community center, a devoted fan of the New Orleans Pelicans, and an occasional spectator of the Saints, using these
    experiences to blend competitive edge with a socially driven, relaxed fitness routine.
  arts: Jataurus Reyes finds inspiration in the brass‑heavy sounds of Trombone Shorty, the soulful vocals of Gregory Porter, and the storytelling of August Wilson, regularly attending live sets at Preservation
    Hall and weaving those rhythms into their weekly cooking sessions.
  travel: Jataurus Reyes prefers spontaneous weekend getaways that mix cultural immersion with outdoor adventure, having fished the Mississippi Delta, road‑tripped to Austin for a music festival, and repeatedly
    explored the historic French Quarter, while dreaming of a future culinary pilgrimage to Cartagena, Colombia.
  culinary: Jataurus Reyes is an avid home‑cook who masterfully simmers jambalaya with Andouille sausage, shrimp, and cayenne‑spiced roux, experiments with okra‑filled étouffée, and enjoys occasional fine‑dining
    nights at Cochon, yet still reaches for quick gumbo bowls from a local Cajun kitchen when a client call runs late.
  core: Jataurus Reyes blends a sales‑savvy mind with a love for brass‑band rhythms, cooking spicy gumbo between client calls, and a habit of juggling multiple calendars while habitually forgetting to refill
    the coffee pot.
background:
  cultural: Jataurus is an African American who grew up in New Orleans, a city renowned for its Creole heritage and rich African diasporic culture. He was raised in a tight‑knit community where second‑line
    brass band music, soulful cooking, and neighborhood block parties were a way of life. Family traditions blend church involvement, storytelling, and vibrant celebrations during events like Mardi Gras.
    His worldview reflects the resilience, creativity, and communal spirit of the black community in the Crescent City, shaped by both historic civil‑rights activism and the contemporary multicultural vibrancy
    of his hometown.
attributes:
