    service (wine, cocktails)'', ''Inventory management'', ''Team coordination and shift scheduling'', ''Adaptability under high-pressure environments'']'
  hobbies: '[''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Playing dominoes'', ''Gardening herbs'', ''Attending community festivals'', ''Volunteering at church events'', ''Watching baseball'',
    ''Traveling to Puerto Rico'', ''Reading biographies'', ''Woodworking'']'
  career_goals: Looking ahead, Ovidio aims to transition into a supervisory or assistant-manager role at his current restaurant, leveraging his extensive experience to improve team performance and guest
    satisfaction. He hopes to eventually open a small family-run cafe or food-truck that showcases authentic Puerto Rican street foods, creating a gathering spot for both the local Latino community and
    the broader Mount Holly neighborhood. In parallel, he wishes to mentor younger hospitality workers through a community-college program or local nonprofit, sharing his practical knowledge while staying
    connected to his cultural roots. Financial stability for his retirement and the ability to spend more time visiting family in Puerto Rico are also key motivations driving his career plans.
