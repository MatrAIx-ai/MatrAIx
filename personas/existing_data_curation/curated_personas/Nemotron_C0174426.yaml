personas:
  professional: Ovidio Lago, a seasoned front‑of‑house manager with three decades of restaurant experience, leverages bilingual fluency, meticulous POS expertise, and a calm, pragmatic demeanor to train
    staff, resolve conflicts, and keep service running smoothly during peak rushes.
  sports: Ovidio Lago, an avid baseball enthusiast, follows the New York Yankees and the island’s winter league, cheerfully roots for the local Mount Holly Senior Softball team during summer, and joins
    a community bowling league in the off‑season.
  arts: Ovidio Lago, a lifelong lover of rhythm and storytelling, sways to classic salsa tracks by Celia Cruz and Marc Anthony during weekly dance sessions, enjoys biographies of figures like César Chávez,
    and draws design inspiration from the handcrafted wooden sculptures of local artist Maria Ramirez.
  travel: Ovidio Lago, a seasoned road‑tripper, spends his vacations alternating between family reunions in San Juan, island getaways to Vieques, and day trips to the historic streets of Charleston, while
    dreaming of a culinary pilgrimage to Barcelona’s La Boqueria market and the vibrant festivals of Oaxaca.
  culinary: Ovidio Lago, a confident home chef, expertly prepares arroz con gandules, mofongo stuffed with shrimp, and lechón roasted on a backyard spit, seasoning with adobo, sofrito, and fresh cilantro
    harvested from his patio herb garden, while experimenting with occasional fusion twists like plantain‑based tacos.
  core: Ovidio Lago, a 61‑year‑old bilingual hospitality veteran, blends meticulous organization with spontaneous salsa steps, never misses a domino game, and secretly hoards extra packets of plantain chips
    for late‑night snacking.
background:
  cultural: Born to Puerto Rican parents, Ovidio grew up immersed in the island's vibrant customs, language, and cuisine. He maintains fluency in Spanish and celebrates traditional holidays such as Three
    Kings Day, San Sebastian, and the Feast of St. James. His upbringing emphasized family closeness, hospitality, and community service - values that he carries into his work and daily life in Mount Holly,
    North Carolina. He regularly prepares classic Puerto Rican dishes at home and shares them at neighborhood gatherings, helping to keep his heritage alive within the local Latino diaspora. Ovidio also
    participates in cultural events organized by regional Puerto Rican associations, acting as a bridge between his Caribbean roots and Southern hospitality, and proudly identifies as a Puerto Rican American.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Customer service excellence'', ''POS system operation (Toast, Square)'', ''Cash handling and reconciliation'', ''Food safety and sanitation (ServSafe
