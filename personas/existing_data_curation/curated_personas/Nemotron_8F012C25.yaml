personas:
  professional: Jose Soto, an aspiring game designer and budding digital illustrator, merges curiosity with practicality by crafting intricate strategy puzzles for indie games while they reliably meet school
    deadlines and collaborate with a tight‑knit online community.
  sports: Jose Soto loves swimming at the Hollywood beach, rides a skateboard along the boardwalk, follows the Los Angeles Lakers and LA Dodgers, and they occasionally join a local junior surf club, balancing
    solitary exercise with brief team games.
  arts: Jose Soto channels creativity into sketching cartoons inspired by Matt Groening and digital illustrations set to the beats of Bad Bunny and Travis Scott, while they devour graphic novels like *Saga*
    and *One Piece*, letting the arts shape their downtime.
  travel: Jose Soto prefers short, budget‑friendly trips to coastal spots like Santa Monica and occasional family road‑trips to San Diego, while they dream of a future adventure to Tokyo to explore anime
    culture, balancing careful planning with a spontaneous desire for new visuals.
  culinary: Jose Soto favors bold flavors, often whipping up homemade fish tacos with cilantro, lime, and avocado, indulging in spicy ramen bowls after late‑night gaming, and they treat themselves to bubble
    tea with tapioca pearls during study sessions.
  core: Jose Soto blends a solitary love for strategic games with a vivid creative streak, juggling anxiety‑driven worry and a habit of staying up late to perfect both pixel‑perfect sketches and level designs,
    and they often replay the same game level until it feels flawless.
background:
  cultural: Jose was raised in a close‑knit Puerto Rican family in Hollywood, Florida. At home, Spanish is spoken alongside English, and traditional dishes such as arroz con gandules and pasteles are prepared
    for holidays and family gatherings. He grew up celebrating cultural events like the Puerto Rican Day Parade in nearby Miami and observes customs such as Noche de San Juan, which emphasize community
    and music. The vibrant Caribbean neighborhood of Broward County provides access to Latin music venues, salsa classes, and a network of extended family and friends who reinforce values of hospitality,
    respect for elders, and collective responsibility. These cultural roots shape his bilingual abilities, his love for music and food, and his commitment to helping others in his community.
