  hobbies: '[''Playing strategy video games'', ''Sketching and digital illustration'', ''Listening to reggaeton and Latin music'', ''Skateboarding'', ''Swimming at the beach'', ''Reading graphic novels'',
    ''Volunteering at community youth programs'']'
  career_goals: Jose dreams of completing his high school education and obtaining a GED, after which he plans to enroll in a vocational program in information technology, focusing on network support and
    cybersecurity. He is drawn to roles that combine his technical aptitude with his desire to serve his community, such as working as a bilingual IT help‑desk specialist for a local nonprofit or becoming
    a community outreach coordinator for immigrant families. In the longer term, he hopes to earn a degree in computer science or public administration, allowing him to develop programs that improve digital
    access for underserved youth in Broward County.
