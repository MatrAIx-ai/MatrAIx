  career_goals: Looking ahead, Charlie aims to step into a Director‑of‑IT or senior technology leadership role within a regional government agency or a larger private firm, where he can champion a cloud‑first
    strategy and elevate cybersecurity postures. He plans to obtain advanced certifications such as AWS Solutions Architect and PMP to strengthen his strategic project‑delivery capabilities. A key ambition
    is to formalize a mentorship pipeline that prepares the next generation of IT professionals in Texas City and surrounding areas. Charlie also hopes to lead the development of a comprehensive hurricane‑ready
    disaster‑recovery framework that becomes a model for other coastal organizations, while preserving a work‑life balance that allows him to pursue personal projects as he approaches retirement.
