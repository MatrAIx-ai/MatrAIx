personas:
  professional: Angelica Midgette, an emerging community art curator and freelance illustrator, combines a solid foundation in drawing, painting, and digital illustration with sharp art‑criticism and event‑planning
    skills to champion underrepresented voices, while their relaxed attitude toward deadlines and occasional disorganization fuels spontaneous pop‑up exhibitions that reflect a compassionate yet assertive
    approach to cultural engagement, and they often let inspiration dictate their schedule.
  sports: Angelica Midgette, a casual fitness enthusiast, joins a weekday running club at Millennium Park, practices beginner yoga at a nearby studio to counteract sitting, and they cheer on the Chicago
    Bulls, White Sox, and Blackhawks during games, preferring low‑key activity over competitive sports.
  arts: Angelica Midgette, a devoted participant in Chicago’s art scene, spends weekends exploring exhibitions by contemporary artists such as Yayoi Kusama and Banksy, listening to the soulful sounds of
    Al Green and the improvisational jazz of Miles Davis, and attending intimate spoken‑word performances by poets like Sarah Kay, all of which inform their mixed‑media sketches and photography, and they
    often draw creative energy from these diverse influences.
  travel: Angelica Midgette, an inquisitive traveler on a student budget, plans spontaneous weekend trips to regional art hubs like Detroit’s Museum of Contemporary Art, dreams of a spring pilgrimage to
    Berlin’s vibrant gallery districts, hopes to one day explore the historic temples of Kyoto, and they balance cultural immersion with affordable transportation and modest accommodations.
  culinary: Angelica Midgette, a budding home cook with a love for fresh, plant‑forward meals, often prepares avocado toast topped with heirloom tomatoes and radish, whips up a spicy miso ramen using kombu,
    shiitake mushrooms, and ginger, treats themselves to a slice of classic Chicago‑style deep‑dish pizza loaded with mozzarella and sausage when dining out, and they savor the process of experimenting
    with new flavors.
  core: Angelica Midgette, a 21‑year‑old art‑focused visionary, blends curiosity, relaxed spontaneity, and a quiet determination to turn creative passion into community impact, and they approach life with
    a calm confidence that balances solitude with occasional assertiveness.
background:
  cultural: Angelica is an African-American woman raised in the Chicago metropolitan area, with family roots that trace back to the Southern United States. Her upbringing was infused with Black church traditions,
    gospel music, and storytelling that emphasized resilience and community. Living in Berwyn, she experiences a multicultural environment that blends African-American cultural practices with the diverse
    influences of the broader Chicago region. She actively participates in cultural celebrations such as Juneteenth, Black History Month events, and local art initiatives that highlight Black artists, fostering
    a strong sense of cultural identity and pride.
