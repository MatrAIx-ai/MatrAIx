  career_goals: Angelica aims to complete a bachelor's degree in Art History or Graphic Design within the next few years, leveraging her curiosity and love of unconventional ideas. She envisions working
    as a community art curator for a local nonprofit or museum in Chicago, where she can showcase underrepresented Black artists. In the short term, she plans to build a freelance illustration portfolio
    and launch an online platform that highlights emerging artists from the Midwest. Long-term, she hopes to become an art director for a culturally focused organization, using art as a tool for social
    change and community engagement.
