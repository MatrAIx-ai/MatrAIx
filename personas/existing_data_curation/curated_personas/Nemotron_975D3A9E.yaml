personas:
  professional: William Friebe is a retired community‑college instructor of construction and horticulture who blends hands‑on woodworking, garden stewardship, and a scholarly love of art history into mentorship,
    using their organized yet experimental mindset to guide students and volunteers through projects that marry practicality with aesthetic curiosity.
  sports: William Friebe is a devoted fan of the Texas Rangers and Dallas Cowboys, participates in a senior walking club that meets three times a week at Rockwall Lake, enjoys weekly pickleball matches
    at the local community center, and follows the NBA season to cheer on the Dallas Mavericks, balancing low‑impact activity with their spirited viewing parties.
  arts: William Friebe is an avid watercolorist inspired by Claude Monet and Andrew Wyeth, regularly attends Texas art exhibitions showcasing folk artists such as Mary Wolfe, and relaxes to the sounds of
    jazz legends Miles Davis and John Coltrane as well as classical compositions by Beethoven, intertwining visual and musical arts into their daily routine.
  travel: William Friebe devotes their travel budget to cultural festivals, having journeyed to the International Folk Art Market in Santa Fe and the Day of the Dead celebrations in Oaxaca, while dreaming
    of attending the Gion Matsuri in Kyoto, preferring meticulously planned itineraries that mix scheduled museum tours with spontaneous local food stalls.
  culinary: William Friebe enjoys cooking garden‑fresh tomato‑basil caprese salads, heirloom tomato salsa with jalapeños and cilantro, and mastering classic Texas chile con carne, demonstrating their moderate
    cooking skill that blends home‑grown produce with ingredients such as fresh mozzarella, smoked paprika, and coriander.
  core: William Friebe is a curious, organized octogenarian who merges artistic brushstrokes with woodworking precision, tends a thriving garden, mentors younger volunteers, and balances occasional over‑spending
    on art books with a habit of forgetting to take cholesterol pills.
background:
  cultural: William is a third‑generation Texan of German ancestry. Raised in the post‑war suburbs of the Dallas‑Rockwall area, his family blended traditional German customs—such as Oktoberfest celebrations,
    baking pretzels, and speaking a few German phrases—with Southern hospitality and Methodist church traditions. This cultural mix fostered a strong work ethic, a sense of community responsibility, and
    an openness to new ideas, all of which continue to shape his worldview and interactions.
