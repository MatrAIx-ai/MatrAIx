personas:
  professional: Phoebe Daugherty, an 18‑year‑old associate‑degree student in Business Administration, is channeling their curiosity and pragmatic mindset into a budding career in product management, leveraging
    basic Python data analysis, Photoshop editing, and market‑trend research to build data‑driven proposals for a future sustainable lifestyle brand, while their competitive streak pushes them to out‑perform
    peers even as their relaxed approach to deadlines occasionally leads to late‑night scramble.
  sports: Phoebe Daugherty enjoys solo desert trail hikes with their DSLR, participates in the Arizona Desert Hikers club, follows the Arizona Cardinals (NFL) and Phoenix Suns (NBA) for occasional game
    nights, and occasionally joins a weekend climbing session at a local gym, balancing a love for solitary outdoor fitness with low‑key team sport fandom.
  arts: Phoebe Daugherty immerses themselves in contemporary fantasy and sci‑fi novels by authors like N.K. Jemisin and Brandon Sanderson, curates a digital photography portfolio inspired by Ansel Adams
    and Georgia O'Keeffe, edits images in Photoshop while listening to ambient electronica from Tycho, and occasionally attends indie film screenings and local gallery openings.
  travel: Phoebe Daugherty prefers low‑budget road trips to stark desert locales such as Joshua Tree and Monument Valley, dreams of photographing the aurora borealis in Iceland and exploring Kyoto's tech‑art
    districts, plans itineraries on a spreadsheet, and values solo or small‑group travel that leaves room for spontaneous photography stops.
  culinary: Phoebe Daugherty favors healthy, plant‑based meals like quinoa‑black bean tacos with chipotle lime dressing and avocado toast, enjoys experimenting with prickly pear sorbet and cumin‑spiced
    roasted carrots, and cooks at a beginner level using a cast‑iron skillet and a basic spice rack.
  core: Phoebe Daugherty is a data‑curious, desert‑loving photographer‑entrepreneur‑in‑training whose competitive edge fuels ambitious product ideas, yet their relaxed, occasionally disorganized habits
    and love of solitary hobbies shape a uniquely balanced approach to life.
background:
  cultural: Phoebe grew up in a middle‑class, white family on the suburban edge of Phoenix. Her parents originated from the Midwest, but the desert climate, the vibrant mix of Southwestern and Mexican influences,
    and the region’s independent, self‑reliant ethos have shaped her outlook. She celebrates mainstream American holidays, enjoys local traditions such as summer rooftop barbecues, monsoon‑season festivals,
    and weekend trips to nearby national parks, and she feels a strong connection to the open, rugged landscape that surrounds her city.
attributes:
  skills: '[''Microsoft Word'', ''Microsoft Excel'', ''PowerPoint'', ''Basic Python programming'', ''Digital photography'', ''Graphic design (Canva, basic Photoshop)'', ''DIY home repairs (basic carpentry)'',
    ''Personal budgeting and finance'', ''Research and data gathering'']'
  hobbies: '[''Reading contemporary fantasy and sci‑fi'', ''Desert hiking and landscape photography'', ''Digital photo editing'', ''Competitive online gaming (strategy games)'', ''Journaling and creative
    writing'', ''DIY home‑decor projects'', ''Small‑group board‑game nights'']'
  career_goals: Phoebe plans to complete her associate degree in Business Administration before transferring to a four‑year university for a bachelor’s in Marketing or Entrepreneurship. She aspires to enter
    product management or launch a small, sustainable lifestyle brand focused on eco‑friendly accessories. She values flexible, remote‑friendly roles that let her balance independent projects with occasional
    collaboration, and she aims to develop a reputation for reliable, data‑driven decision‑making while maintaining the freedom to explore new ideas.
