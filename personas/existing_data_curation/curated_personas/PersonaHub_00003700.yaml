persona_description: A climate scientist who specializes in climate modeling, particularly in the development and evaluation of Earth System Models (ESMs) using the EC-Earth climate model. The scientist
  is part of the Bert Bolin Centre for Climate Research and the Rossby Centre at SMHI, and has developed the new next generation of EC-Earth climate model using observations and process models. The scientist's
  research areas include developing and evaluating ESMs to increase confidence in future climate change projections, as well as using EC-Earth for individual research applications involving the majority
  of the staff at their department.
