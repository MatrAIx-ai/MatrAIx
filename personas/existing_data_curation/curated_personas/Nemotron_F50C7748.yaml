  hobbies: '[''Watercolor painting'', ''Digital photography'', ''Visiting art galleries and museums'', ''Reading philosophy and science‑fiction literature'', ''Cycling on local trails'', ''Gardening (herbs
    and native plants)'', ''Attending community theater'', ''Participating in escape‑room puzzles'', ''Curating an Instagram art account'', ''Volunteer storytelling at the local library'']'
  career_goals: Sandra intends to transition back into professional life by securing a position that merges her passion for art with her proven project‑management skills. Over the next five years she aims
    to obtain a certification in arts administration and to take on a role as an arts program coordinator or cultural events manager for a regional museum, community center, or nonprofit. She also aspires
    to develop a freelance portfolio in visual storytelling, offering photography and curated content services to local businesses. Her long‑term ambition is to cultivate a vibrant, inclusive arts scene
    in Southern Illinois, eventually leading a community‑focused cultural initiative that bridges traditional Midwestern values with contemporary creative expressions.
