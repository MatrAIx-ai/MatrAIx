personas:
  professional: Sandra Mosteller, a 33‑year‑old aspiring arts program coordinator, merges their analytical budgeting talent and event‑management experience with a flair for visual storytelling, turning
    community projects into polished exhibitions while their healthy skepticism drives rigorous vetting of proposals.
  sports: Sandra Mosteller, an avid cyclist on Shawnee National Forest trails, they join the Illinois Cycling Club for weekend rides, follow the St. Louis Cardinals for baseball, and complement their high‑energy
    workouts with yoga sessions to counteract lower‑back strain.
  arts: Sandra Mosteller, a watercolor and mixed‑media practitioner, they curate the Instagram account @HiddenArtsIL to spotlight hidden murals and galleries, frequent contemporary art shows in St. Louis
    and Chicago, and draw creative inspiration from the immersive installations of Yayoi Kusama and the narrative film work of Jim Jarmusch.
  travel: Sandra Mosteller, a meticulous yet spontaneous traveler, they plan detailed itineraries for weekend trips to Chicago’s art districts and the desert studios of Taos while also leaving room for
    last‑minute train tickets to explore unexpected cultural festivals.
  culinary: Sandra Mosteller, a herb‑garden enthusiast, they whip up rosemary‑infused grilled chicken with quinoa using home‑grown basil and thyme, frequent the local farmer’s market for seasonal produce,
    and indulge in occasional artisanal cheese boards as a guilty pleasure.
  core: Sandra Mosteller, a 33‑year‑old art‑driven organizer, they channel their curiosity and competitive edge into curating hidden cultural gems, meticulous budgeting, and relentless cycling, all while
    battling mild allergies and a habit of over‑scheduling their inbox.
background:
  cultural: Sandra grew up in a middle‑class, white, Midwestern family in Southern Illinois, where community, modesty, and self‑reliance are deeply valued. Her upbringing in Du Quoin exposed her to a blend
    of traditional farm‑town culture and a modest but growing appreciation for the arts, fostered by local festivals like the Du Quoin State Fair and community theater. While her family’s roots are grounded
    in Protestant (Methodist) traditions, she has always been curious about broader cultural perspectives, leading her to explore international art, avant‑garde literature, and contemporary music. This
    combination of small‑town steadiness and an openness to unconventional ideas shapes her worldview and informs her creative endeavors.
