  career_goals: Even at eight, Tawnia imagines future roles that blend her love of helping others with practical problem‑solving. She dreams of becoming a teacher who can make learning fun, a veterinarian
    who cares for animals, or a community volunteer who organizes neighborhood clean‑ups. She values flexibility, so she plans to explore many interests through school projects, clubs, and hands‑on activities
    before deciding on a specific path.
