persona_description: A Surface Analyst who is interested in understanding and monitoring surface preparation methods, particularly in the aerospace, automotive, electronic, medical device, consumer product
  industries and in a wide range of manufacturing and assembly operations. They are looking for a fast, easy, accurate, and nondestructive instrument for manufacturers with critical surface requirements,
  replacing legacy methods such as dyne and water break tests. They are also interested in studying and comprehending the relationship between a contaminant structure and the effects it can have on a bond,
  and developing more productive monitoring procedures for surface preparation processes.
