    hiking trails in the Blue Ridge foothills"]'
  career_goals: Carroll aims to turn her artistic passions into a sustainable career while preserving the flexibility she values. In the short term she plans to enroll in a community‑college associate program
    in Graphic Design or Visual Arts, leveraging her existing digital illustration skills and expanding her portfolio. She envisions building a freelance brand that offers custom artwork, illustration commissions,
    and boutique merchandise sold through an online store. Long‑term, she hopes to collaborate with indie game studios or creative agencies where she can contribute concept art and visual storytelling,
    and eventually mentor other young artists from her community, combining her competitive drive with a desire to be recognized for innovative, unconventional work.
