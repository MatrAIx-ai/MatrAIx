personas:
  professional: Carroll Brown is an aspiring graphic designer who blends self-taught Procreate and Photoshop expertise with a habit of critically dissecting visual concepts, turning occasional disorganization
    into spontaneous creative bursts that fuel freelance commissions and community art showcases while they aim to break into indie game studios.
  sports: Carroll Brown enjoys weekend hikes through the Blue Ridge foothills and occasional trail runs with a local outdoor club, supports the Carolina Panthers and the Greenville Drive, yet prefers solo
    fitness challenges over team sports, often setting personal mileage goals that they chase with a competitive spirit.
  arts: Carroll Brown immerses themselves in indie and folk sounds from Sufjan Stevens, Bon Iver, and Phoebe Bridgers while frequenting Greenville’s art galleries and community theater productions, channeling
    the vibrant colors of Frida Kahlo and the whimsical line work of Yuko Shimizu into their mixed‑media sketches.
  travel: Carroll Brown favors spontaneous road trips to nearby Asheville and the historic streets of Savannah, dreams of a creative pilgrimage to Paris’s Montmartre district, and balances wanderlust with
    a paycheck‑tight budget by couch‑surfing and using student discounts wherever possible.
  culinary: Carroll Brown’s palate gravitates toward comfort foods like avocado toast with feta, spicy shrimp and grits, and experimental ramen bowls flavored with miso and roasted garlic, while their novice
    cooking skills keep them mostly in the kitchen for quick, ingredient‑driven meals rather than elaborate feasts.
  core: Carroll Brown is a fiercely curious 18‑year‑old artist who turns procrastination into late‑night bursts of creativity, juggling a competitive drive with a laid‑back attitude toward obligations.
background:
  cultural: Carroll grew up in Easley, a small city in Pickens County, South Carolina, within a traditionally white, Southern community. Her family’s roots stretch back several generations in the Upstate
    region, blending Appalachian heritage with the broader cultural tapestry of the American South. She was raised attending a regional Baptist church, where community gatherings and youth group activities
    were central to her social life. Local customs—hospitality, respect for tradition, and a strong sense of neighborhood—shape her worldview, while the nearby cities of Greenville and Spartanburg expose
    her to contemporary arts, music scenes, and progressive youth cultures. This juxtaposition of deep‑seasoned Southern values and modern, eclectic influences informs her openness to new ideas and her
    desire to carve an unconventional path while staying connected to her community’s supportive fabric.
