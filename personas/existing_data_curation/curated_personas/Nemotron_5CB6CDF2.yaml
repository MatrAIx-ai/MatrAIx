  career_goals: Driven by her imaginative outlook, Sandra aims to move beyond first‑line supervision into a store‑manager role within the next two years, and eventually advance to a district‑manager position
    overseeing multiple locations across Los Angeles County. She wants to spearhead experiential‑retail initiatives that blend art, technology, and community engagement, targeting a pilot project that transforms
    a store into a cultural showcase. To support these ambitions, she is pursuing a certified retail‑management program and taking evening classes in visual design. Long‑term, Sandra envisions launching
    her own boutique that curates locally‑made apparel and rotating art installations, creating a space where shoppers encounter novelty and creativity on every visit.
