personas:
  professional: Sandra Leggett, a seasoned retail operations specialist with more than two decades of experience, blends analytical rigor and visual‑merchandising flair to lead front‑line sales teams while
    pioneering art‑centric store concepts that transform aisles into cultural showcases, and they excel at translating complex ideas into actionable guidance for their staff.
  sports: Sandra Leggett enjoys weekend hikes in the Santa Monica Mountains with a local trail‑blazing club, follows the Los Angeles Lakers and LA Galaxy with avid enthusiasm, and they join friends for
    casual beach volleyball games at Santa Monica Beach during the summer.
  arts: Sandra Leggett immerses themselves in Los Angeles’s contemporary art scene—regularly attending exhibitions at The Broad featuring Yayoi Kusama and Jeff Koons, painting acrylic abstracts inspired
    by Mark Rothko, capturing street‑level vignettes with a vintage 35 mm film camera, and frequenting intimate venues to hear live performances by local jazz pianist Nate Wood and indie band Alvvays.
  travel: Sandra Leggett blends meticulous itinerary planning with spur‑of‑the‑moment detours, favoring weekend escapes to Joshua Tree’s desert art installations, longer cultural pilgrimages to Tokyo’s
    Mori Art Museum and Barcelona’s street‑art districts, all while balancing travel costs against the budget for their future boutique.
  culinary: Sandra Leggett, a self‑taught home cook with a penchant for experimental coffee, regularly crafts avocado toast topped with smoked paprika and radish, slow‑roasts rosemary‑infused lamb, and
    experiments with Vietnamese pho broth flavored with star anise, while often seeking out third‑wave coffee shops for pour‑over brews featuring single‑origin beans from Ethiopia.
  core: Sandra Leggett is a 46‑year‑old retail veteran who balances analytical precision with artistic whimsy, turning store aisles into canvases, obsessively cataloguing vintage film shots, and they occasionally
    over‑schedule yoga classes to the point of missing a Friday‑night concert.
background:
  cultural: Born and raised in the Los Angeles metropolitan area to a middle‑class white American family, Sandra grew up amid the city’s diverse cultural mosaic. While her familial traditions reflect mainstream
    Western values of independence, hard work, and self‑reliance, her daily life has been shaped by the West‑Coast emphasis on creativity, environmental consciousness, and progressive social attitudes.
    Regular exposure to the city’s Hispanic, Asian, and African‑American communities has nurtured an inclusive worldview that informs her collaborative leadership style. She identifies strongly with the
    Californian ethos of personal expression and community engagement, which manifests in her professional focus on innovative retail experiences and her personal involvement in local arts initiatives.
