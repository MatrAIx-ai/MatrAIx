    Wellness Programs'']'
  hobbies: '[''gardening'', ''cooking traditional Southeast Asian dishes'', ''reading historical non-fiction'', ''Tai Chi'', ''walking his dog'', ''volunteering at community health fairs'', ''listening
    to jazz and classical music'', ''playing chess'', ''attending cultural festivals'', ''woodworking'']'
  career_goals: Dang aims to transition from managing a single facility to a regional leadership role where he can influence system‑wide practice transformation. He is passionate about introducing evidence‑based
    technology solutions that improve patient outcomes without compromising the practical constraints of budgeting and staffing. A key ambition is to champion mental‑health and stress‑reduction initiatives
    for health‑care workers, turning his personal sensitivity to stress into organizational strength. He also plans to pursue a senior executive health‑administration credential, such as a Master's in Healthcare
    Management, to deepen his strategic expertise and eventually serve as a consultant guiding other health organizations through change.
