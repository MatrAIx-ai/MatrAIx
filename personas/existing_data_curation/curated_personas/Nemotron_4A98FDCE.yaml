  career_goals: Elizabeth aims to transition into a senior director or regional operations role where she can shape large‑scale sustainability initiatives and champion inclusive workplace practices. She
    is passionate about establishing a formal mentorship program for emerging leaders, especially those from underrepresented backgrounds. In the longer term, she envisions launching a small, community‑focused
    Mexican culinary venture that highlights healthy, locally sourced ingredients, allowing her to blend her business acumen with cultural heritage while maintaining a balanced lifestyle in retirement.
