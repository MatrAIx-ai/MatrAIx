personas:
  professional: Elizabeth Florat, a seasoned retail operations leader with over twenty years of experience, harnesses Lean‑Six Sigma expertise, advanced Excel and Power BI analytics, and bilingual Spanish‑English
    communication to foster collaborative, data‑driven teams while championing sustainability and inclusive mentorship.
  sports: Elizabeth Florat sustains her fitness through weekend hikes on Willamette Valley trails with the ‘Valley Trekkers’ club, weekly yoga sessions at a downtown studio, and shows spirited support for
    the Portland Timbers and Oregon Ducks.
  arts: Elizabeth Florat expresses her artistic side through DSLR photography of misty Pacific Northwest forests inspired by Ansel Adams, curates a modest home collection of Frida Kahlo prints, and finds
    auditory comfort in La Santa Cecilia and classic mariachi while discussing biographies of David McCullough and Doris Kearns Goodwin at her book club.
  travel: Elizabeth Florat favors meticulously organized short getaways that blend culinary discovery with nature, such as weekend escapes to the Oregon Coast, wine‑tasting tours in Napa Valley, and annual
    cultural immersions in Oaxaca’s vibrant markets, all while balancing a modest retirement budget and family responsibilities.
  culinary: Elizabeth Florat, an adept home chef, delights in preparing traditional mole, smoky tamales, and stuffed chiles rellenos using Oregon hazelnuts, marionberries, and locally foraged mushrooms,
    marrying the bold flavors of Mexican cuisine with the fresh bounty of her garden.
  core: Elizabeth Florat merges seasoned operational expertise with a gardener’s patience, turning data into sustainable strategies while nurturing a garden of Mexican flavors—though they occasionally forget
    to water succulents when engrossed in spreadsheet analysis.
background:
  cultural: Elizabeth’s family traces its roots to Jalisco, Mexico, where her grandparents immigrated to the United States in the early 1970s. Growing up, she embraced a bicultural household that celebrated
    Mexican holidays such as Día de los Muertos, Las Posadas, and Cinco de Mayo alongside American traditions. Bilingual from childhood, she maintains close ties with extended family in Mexico through regular
    video calls and annual visits, preserving Mexican culinary techniques, folk music, and storytelling. Living in Wilsonville, Oregon, she blends these cultural values of family solidarity, hospitality,
    and respect for community with the Pacific Northwest’s emphasis on outdoor recreation and environmental stewardship.
