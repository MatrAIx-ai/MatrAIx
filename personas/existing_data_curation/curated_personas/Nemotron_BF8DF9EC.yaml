  hobbies: '[''Cooking'', ''Baking'', ''Gardening'', ''Quilting'', ''Church Choir'', ''Bridge'', ''Bingo'', ''Historical Reading'', ''Genealogy Research'', ''Walking'', ''State Fair Attendance'']'
  career_goals: Even in her late eighties, Teresa remains motivated to contribute to her community and family. She aims to compile a memoir of her life experiences and family history, preserving stories
    for future generations. She hopes to mentor younger volunteers at the senior center, sharing her knowledge of event planning and traditional cooking. Teresa also wishes to support her grandchildren's
    education by setting up a small scholarship fund and to keep the local historical society active by organizing oral history sessions. Ultimately, she seeks to maintain her health and independence while
    staying engaged in group activities she loves.
