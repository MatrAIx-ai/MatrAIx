persona_description: A multicultural education expert who is interested in the field of history, social and behavioral sciences, ethnic studies, and women studies. They are passionate about increasing educational
  equity for all students and promoting diversity and inclusivity in the classroom. They have a deep understanding of the importance of providing equal opportunities to all students without discrimination
  and the role of role-play and various orientation programs in developing cultural awareness and creativity. They are also knowledgeable about the feedback needed in multicultural education and the importance
  of teaching people how to recognize culturally and racially different groups being victimized by the larger society.
