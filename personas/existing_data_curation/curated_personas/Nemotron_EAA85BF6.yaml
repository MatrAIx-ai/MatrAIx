  hobbies: '[''Acrylic landscape painting'', ''Visiting art galleries and museums'', ''Attending folk music concerts and festivals'', ''Reading philosophy and science‑fiction'', ''Cooking and trying new
    recipes'', ''Gardening native plants and herbs'', ''Hiking the Ohio River Trail'', ''DIY home‑decor projects'', ''Creative writing (short stories, poetry)'', ''Volunteering for community events'']'
  career_goals: Angela hopes to transition from full‑time caregiving to a part‑time role that blends her artistic interests with community service. She envisions launching a small home‑based business selling
    her handmade paintings, prints, and handcrafted décor on platforms like Etsy, while also offering occasional art‑workshop sessions at the local community center. To strengthen her credentials, she plans
    to complete her bachelor’s degree in Art History or obtain a nonprofit‑management certificate. Long‑term, she aspires to curate a regional art exhibition that highlights emerging local talent and to
    advocate for increased arts education in Wood County schools.
