personas:
  professional: Angela Epley is a community‑focused caregiver transitioning to a part‑time art entrepreneur, channeling her acrylic river landscape paintings, event‑coordination experience at the Parkersburg
    Community Center, and beginner graphic‑design skills into a home‑based Etsy shop and occasional workshops while pursuing an Art History degree.
  sports: Angela Epley enjoys low‑impact fitness by hiking the Ohio River Trail with a local walking club, cheering for the Cincinnati Bengals during football season, and occasionally joining a community
    softball league at the Wood County Parks Department.
  arts: Angela Epley immerses themselves in the regional arts scene, attending folk‑music concerts featuring The Avett Brothers, exploring works by local painter Mary P. Jones at the West Virginia Museum
    of Art, and drawing creative inspiration from Claude Monet’s impressionist landscapes and Annie Leibovitz’s contemporary photography.
  travel: Angela Epley prefers weekend getaways that blend nature and culture, planning spontaneous trips to the nearby Shenandoah Valley for hiking, revisiting Asheville, North Carolina for its craft breweries,
    and dreaming of a spring pilgrimage to the tulip fields of Holland, all while balancing caregiving duties that sometimes limit longer vacations.
  culinary: Angela Epley loves experimenting in the kitchen with farm‑to‑table dishes, frequently cooking herb‑infused roasted chicken, wildflower‑sprinkled salads, and cheddar‑stuffed pierogies, while
    their go‑to pantry staples include fresh basil, local honey, and smoked paprika.
  core: Angela Epley is a 31‑year‑old curious caretaker turned budding art entrepreneur, whose love of river landscapes, flexible schedule, and occasional disorganization fuels a vibrant, community‑centric
    lifestyle.
background:
  cultural: Angela was raised in Parkersburg, West Virginia, in a family with deep Appalachian roots and a blend of German and Irish ancestry. Her upbringing emphasized close‑knit community ties, regular
    participation in church gatherings, and family traditions such as holiday pot‑lucks, quilting, and attending the annual Bridge Day celebration. Exposure to regional folk music, storytelling, and craft
    fairs fostered her appreciation for the arts and collaborative spirit. These cultural influences have shaped her cooperative demeanor, love of shared experiences, and commitment to preserving local
    heritage.
attributes:
  skills: '[''Acrylic painting'', ''Mixed media collage'', ''Digital photography'', ''Event coordination'', ''Group facilitation'', ''Conflict resolution'', ''Household budgeting'', ''Meal planning'', ''Basic
