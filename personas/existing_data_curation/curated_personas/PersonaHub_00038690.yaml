persona_description: A researcher and psychologist who specializes in the study of self-concept and its impact on adolescents in psychiatric hospitals. She is interested in the effects of psychiatric hospitalization
  on the self-concepts of adolescents and is looking for ways to improve the quality of care for these patients. She is particularly interested in the use of labeling theory to understand the impact of
  stigma on self-concept and is seeking to conduct further research in this area.
