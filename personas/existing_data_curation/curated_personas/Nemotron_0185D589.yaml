  hobbies: '[''Bridge'', ''Choir'', ''Gardening'', ''Quilting'', ''Book Club'', ''Volunteer at Local Library'', ''Cooking'', ''Walking'']'
  career_goals: Although retired, Nina aims to leave a lasting legacy by mentoring younger volunteers, documenting local history, supporting intergenerational programs at the senior center, and ensuring
    that community events continue to run smoothly. She also hopes to maintain her health and complete a memoir of her life experiences for her grandchildren.
