persona_description: A member of the Environmental Audit Committee who is passionate about the sustainability of the fashion industry and advocates for a fast fashion tax to address the environmental impact
  of the industry. They are knowledgeable about the insatiable appetite for clothes, the social and environmental price tag of fast fashion, and the urgent need for sustainable fashion initiatives. They
  are also aware of the impact of textile production on the environment, including the production of 1.2bn tonnes of CO2, microplastic waste in the ocean, and extensive water usage in the production of
  clothing. They are committed to pushing for change and are dedicated to promoting sustainable fashion practices.
