  career_goals: Viviana aims to advance to a senior bailiff supervisory role within the Los Angeles County Superior Court, where she can mentor junior staff and shape security policies. She seeks to design
    and lead a specialized training curriculum that integrates her educational expertise with practical courtroom security, ensuring that new bailiffs are prepared for both procedural rigour and emerging
    challenges. Over the next five years, she also plans to pursue certification in corrective services management to broaden her qualifications, and eventually to serve as a court liaison for community
    outreach programs that assist Spanish‑speaking litigants in navigating the legal system.
