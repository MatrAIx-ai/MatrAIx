  hobbies: '[''Live Music Shows'', ''Street Photography'', ''Sketching Urban Scenes'', ''Watching Independent Films'', ''Playing Rhythm‑based Video Games'', ''Exploring Local Art Galleries'', ''Cooking
    Southern Soul Food'', ''Jogging in Arlington Parks'', ''Reading Science Fiction'', ''Personal Blog on Entertainment Experiences'']'
  career_goals: Leon aims to move beyond entry‑level attendant duties and secure a supervisory role within the next two years, eventually becoming an operations manager for a major amusement or event venue
    in the Dallas‑Fort Worth area. To support this trajectory, he plans to complete a bachelor's degree in Hospitality Management or Arts Administration, building on his associate's credential. He is also
    interested in blending his love of art with technology, so he hopes to lead immersive, experience‑focused events that incorporate interactive installations, virtual reality, and live performance. Long‑term,
    Leon envisions founding a community‑driven pop‑up arts space that offers workshops, showcases local talent, and provides flexible employment pathways for young people from underrepresented backgrounds.
