persona_description: A colonial administrator who played a significant role in the development of the Province of Nova Scotia, particularly in the management of the Acadian colony and the acquisition of
  new lands. Temple's tenure as governor of Nova Scotia was marked by challenges and controversies, including disputes over property rights and territorial claims. His efforts to secure a new patent for
  Nova Scotia and his efforts to negotiate with the French government were central to his role as a colonial administrator. Temple's possession of Acadia was short-lived, and he died while still seeking
  compensation for his losses and expenses in the colony. His legacy as a colonial administrator has left a lasting impact on the history of Nova Scotia and the Province of Nova Scotia.
