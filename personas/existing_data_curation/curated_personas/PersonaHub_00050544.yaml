persona_description: A geologist who specializes in the study of rock formations and mineralogy, particularly those related to the orthopyroxene class of minerals, including hypersthene. This person is
  interested in the scientific classification of minerals, their physical properties, and their geological significance. They are likely to be familiar with the formation and composition of hypersthene,
  as well as its associated minerals such as olivine, phlogopite, and enstatite. They may also be interested in the weathering process that produces these minerals, and the contrast in color and texture
  between the mafic minerals and the plagioclase feldspar.
