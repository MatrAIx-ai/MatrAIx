    Latin music (cumbia, boleros)'', ''Watching telenovelas and classic movies'', ''Attending local cultural festivals and fairs'', ''Organizing spontaneous potluck gatherings'']'
  career_goals: Miriam hopes to preserve and share her Honduran heritage by becoming a community culinary mentor. She plans to lead weekly cooking workshops at the local senior center and church, where
    she can teach traditional recipes to younger neighbors and her own grandchildren. She also dreams of compiling a family recipe book that captures the flavors of her upbringing. On the volunteer side,
    she aims to step into a leadership role as a coordinator for her church's outreach programs, helping to organize food drives and social events. Maintaining her health is a priority, so she intends to
    join a walking group and keep her garden flourishing. A personal goal is to travel back to Honduras for a family reunion, bringing authentic ingredients and stories back to her community in Georgia.
