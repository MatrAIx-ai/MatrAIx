    resolution'', ''Team training and mentorship'']'
  hobbies: '[''Church choir singing'', ''Community theater acting'', ''Hosting card games at senior center'', ''Attending Memphis blues and soul concerts'', ''Urban gardening'', ''Southern cooking and BBQ'',
    ''Quilting'', ''Genealogy research'', ''Watching DIY and trade‑skill videos'', ''Mentoring friends in home repairs'']'
  career_goals: Ocela hopes to transition from front‑line repairs to a senior advisory role where she can train the next generation of technicians, especially women and minorities entering the trades. She
    plans to obtain a Certified Maintenance Manager credential and to formalize a mentorship program at her current employer. Over the next few years, she also aspires to launch a small, family‑run home‑repair
    service that emphasizes reliability and community‑focused pricing, giving her greater control over her schedule to reduce stress. Financial security for retirement and the ability to leave a lasting
    legacy of skilled, compassionate workers are central to her long‑term ambitions.
