personas:
  professional: Ocela Kornegay, a veteran maintenance specialist with expertise in plumbing, electrical, HVAC and carpentry, leverages their meticulous organizational skills and sociable confidence to mentor
    junior technicians while navigating the stress of a forthcoming transition to a senior advisory role.
  sports: Ocela Kornegay follows the Memphis Grizzlies and the University of Memphis Tigers, and they participate in a senior walking club at the local park each morning, while occasionally joining a weekend
    pickleball league at the community center.
  arts: Ocela Kornegay sings gospel harmonies with the church choir while relishing the soulful riffs of B.B. King and Aretha Franklin, and they bring that same stage confidence to community theater productions
    of 'A Raisin in the Sun' and local musical revues.
  travel: Ocela Kornegay prefers short road trips—like weekend drives to Clarksdale for a blues festival or a family reunion in Savannah—and they dream of a pilgrimage to the historic sites of Baltimore
    and the music‑filled streets of New Orleans, always balancing travel costs with the desire to share experiences with their church group.
  culinary: Ocela Kornegay flavors their meals with fresh basil, thyme, and rosemary harvested from their urban garden, crafting soul‑food staples such as collard greens seasoned with smoked turkey, shrimp
    gumbo, and fried catfish with a side of pickled okra, while occasionally experimenting with Mediterranean herb‑infused salads.
  core: Ocela Kornegay blends a pragmatic repair‑master’s mind with a chatty, community‑centric heart, juggling a chronic worry‑loop with a relentless curiosity that leads them to fix both broken pipes
    and broken hearts.
background:
  cultural: Ocela is an African‑American woman who grew up in North Memphis, a neighborhood steeped in the legacy of the civil‑rights movement and rich in musical traditions. Her upbringing was centered
    around the Black church, where community, gospel music, and collective support shaped her values. She carries forward the Southern culinary heritage of soul food and Memphis‑style barbecue, often preparing
    meals for family gatherings and church events. The city’s blues scene has influenced her love of live music and storytelling. As a Black woman in a traditionally male‑dominated trade, she has navigated
    systemic challenges with resilience, drawing pride from a lineage of workers who built and maintained their neighborhoods. Her cultural identity emphasizes community solidarity, intergenerational knowledge
    sharing, and a commitment to uplifting others through mentorship and service.
attributes:
  skills: '[''Plumbing repair and installation'', ''Electrical wiring and troubleshooting'', ''HVAC maintenance and servicing'', ''Carpentry and fixture installation'', ''Preventive equipment maintenance'',
