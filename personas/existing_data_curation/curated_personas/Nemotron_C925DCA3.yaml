personas:
  professional: Audrey Blomquist is a surgical technologist who blends meticulous OR expertise with an artistic eye, creating precise instrument sets, documenting procedures, and designing patient-friendly
    medical illustrations while mentoring colleagues and championing an upcoming hospital art‑therapy program.
  sports: Audrey Blomquist tackles the Utah mountains on weekend hikes with the South Jordan Hiking Society, snaps nature photos on a Nikon Z6, follows the Utah Jazz on basketball season, and attends weekly
    yoga classes to balance the high‑impact demands of the OR.
  arts: Audrey Blomquist is an avid watercolorist who studies anatomical illustration for medical clarity, volunteers at art‑therapy workshops, draws inspiration from Albrecht Dürer and contemporary artist
    Marjolein Bastin, and lights up South Jordan community theater stages with performances that echo the energy of Lin‑Manuel Miranda’s 'Hamilton'.
  travel: Audrey Blomquist prefers curated weekend getaways that blend hiking and photography, having trekked the Grand Canyon’s Bright Angel Trail, explored Iceland’s waterfalls for Northern Lights shots,
    and planning a future art pilgrimage to Florence’s Uffizi Gallery, all while balancing a modest travel budget with occasional splurges on boutique hotels.
  culinary: Audrey Blomquist experiments in the kitchen with intermediate skill, regularly cooking dishes like Thai red curry with lemongrass, miso‑glazed black cod, and homemade sourdough bread, favoring
    fresh ingredients such as heirloom tomatoes, shiitake mushrooms, and tahini, while they occasionally over‑season meals in the heat of post‑OP adrenaline.
  core: Audrey Blomquist is a curious, organized, and socially vibrant surgical technologist who channels anxiety into art, theater, and mindfulness, constantly juggling leadership ambitions with a love
    for watercolor and mountain hikes.
background:
  cultural: 'Audrey grew up in a middle‑class, predominantly white suburb of Salt Lake County, where family and community gatherings often centered around local churches and civic events. The region’s blend
    of conservative values and a growing appreciation for the arts has shaped her balanced outlook: she respects tradition and community cohesion while actively seeking unconventional ideas through museum
    visits, independent film screenings, and multicultural cuisine. South Jordan’s strong volunteer culture and emphasis on health and outdoor recreation have encouraged her involvement in community service
    and outdoor hobbies. Though her cultural roots are largely mainstream Utah, she identifies as open‑minded and embraces the diverse artistic and intellectual influences that surround her daily life.'
attributes:
  skills: '[''Surgical instrument assembly and handling'', ''Sterile field setup and maintenance'', ''Patient positioning and pre‑operative preparation'', ''Operative documentation and record‑keeping'',
    ''Operating room inventory management'', ''Team communication and briefing facilitation'', ''Mentoring and training of junior surgical techs'', ''Public speaking and conference presentation'', ''Medical
    illustration for patient education'', ''Mindfulness‑based stress management in high‑pressure settings'']'
  hobbies: '[''Watercolor painting and anatomical sketching'', ''Landscape photography of Utah’s mountains'', ''Hiking in the Wasatch foothills'', ''Participating in community theater productions'', ''Volunteering
    at art‑therapy workshops'', ''Yoga and mindfulness meditation'', ''Cooking experimental international recipes'', ''Attending live music and improv comedy shows'', ''Reading contemporary art books and
    speculative fiction'']'
  career_goals: Audrey aims to progress from a technical role to a leadership position within peri‑operative services. Over the next three years she plans to earn a Bachelor’s degree in Health Sciences
    and obtain Certified Surgical Technologist (CST) and Certified Perioperative Registered Nurse (CPRN) credentials, positioning herself for an OR manager or educator role. She is passionate about integrating
    art into patient care, so she hopes to develop a hospital‑wide art‑therapy initiative that provides visual comfort to surgical patients and supports staff well‑being. Additionally, she aspires to become
    a speaker at national surgical technology conferences, sharing innovative workflow designs and coping strategies for emotionally demanding OR environments.
