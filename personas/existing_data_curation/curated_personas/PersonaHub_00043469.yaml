persona_description: An ethnomusicology researcher with a passion for studying the intersection of race and music, particularly through the lens of rock and electric guitar. They are particularly interested
  in the ways in which air guitar performance can be used as a tool for contesting whiteness and critiquing gender stereotypes, particularly within the context of Asian and Asian American audiences. They
  have conducted extensive field research in Germany, Finland, and the United States since 2009, and their work has been published in Music and the Racial Imagination (2000).
