personas:
  professional: Kevin Brown is a budding robotics hobbyist who builds intricate LEGO creations and codes simple Scratch games, channeling a blend of curiosity and practicality into problem‑solving; they
    stay organized with detailed building plans yet remain flexible enough to improvise when a circuit doesn’t behave as expected, and their cooperative nature makes them a go‑to teammate for school science
    projects.
  sports: Kevin Brown thrives on basketball games with the Cornhusker Youth Club and swings a bat for the local Little League Tigers, while also hiking the Nebraska Sandhills with the Boy Scouts and fishing
    at Lake McConaughy; they balance team practice with solo outdoor adventures, respect the discipline of scheduled drills, yet occasionally skip a weekend run when a new LEGO set arrives.
  arts: Kevin Brown dives into the worlds of science fiction by reading Ender's Game and watching the Star Wars saga, and they find inspiration for their own LEGO narratives from the music of Hans Zimmer
    and the animation of Hayao Miyazaki; they also write short stories in their journal, often illustrating them with drawn insects, making them a quiet but enthusiastic participant in the school art club.
  travel: Kevin Brown prefers hands‑on exploration, planning weekend trips to nearby sand dune parks and weekend camping at the Scotts Bluff National Monument, while daydreaming about a future road trip
    to Yellowstone National Park; they meticulously map fishing spots and pack supplies, though they sometimes abandon a planned hike when a new robotics competition conflicts with family time.
  culinary: Kevin Brown enjoys customizing pizza with pepperoni and pineapple, whipping up simple spaghetti with tomato sauce spiced with basil, and snacking on trail mix featuring almonds, raisins, and
    chocolate chips after a hike; they have started experimenting in the kitchen by building edible 'LEGO' snack towers from pretzel sticks and cheese cubes, though they sometimes forget to wash their hands
    before cooking.
  core: Kevin Brown is a curious, organized teen who balances LEGO building and robotics with a tendency to over‑worry and occasional impulsive spending.
background:
  cultural: 'Kevin grows up in a white, Midwestern family in Hastings, Nebraska. His household reflects typical small-town values: hard work, modesty, community involvement, and a strong sense of self-reliance.
    Family gatherings often center around church events, Thanksgiving dinners, and the annual county fair, where local agriculture and crafts are celebrated. The region''s agricultural backdrop and the
    close-knit school community shape his practical outlook, while school programs and local libraries nurture his curiosity. He identifies with the broader American Midwest culture that balances tradition
    with an openness to new ideas.'
attributes:
  skills: '[''Reading comprehension'', ''Middle school mathematics'', ''Basic computer literacy'', ''Scratch programming'', ''LEGO construction and basic engineering concepts'', ''Organizational skills
    for school projects'', ''Time management'', ''Team collaboration'', ''Empathetic listening'', ''Practical problem-solving'']'
  hobbies: '[''LEGO building and robotics kits'', ''Scratch coding'', ''Reading science-fiction and wildlife books'', ''Journaling'', ''Fishing and hiking'', ''Collecting rocks and insects'', ''Basketball'',
    ''Youth baseball league'']'
  career_goals: Kevin dreams of a future where he combines his love of building things with his desire to help his community. He aims to pursue a STEM-focused high school program and eventually earn a degree
    in engineering, preferably civil or mechanical, to design practical solutions such as efficient irrigation systems for local farms. He also imagines mentoring younger students through a youth robotics
    club, blending his cooperative nature with his technical interests. Academic success, scholarships, and a stable, purpose-driven career are central to his long-term ambition.
