personas:
  professional: Teresa Rosenkrans leverages their disciplined, data‑driven approach as a senior marketing manager, orchestrating integrated campaigns with HubSpot and Marketo while demanding precise ROI
    metrics and mentoring junior staff through structured weekly reviews.
  sports: Teresa Rosenkrans hits the Nashville greenways for early‑morning 5K runs, participates in the Nashville Runners Club’s weekly long‑run sessions, balances cardio with yoga, and roots for the Tennessee
    Titans in football season and the Nashville Predators on the ice.
  arts: Teresa Rosenkrans curates a modest vintage‑vinyl collection featuring Johnny Cash, Emmylou Harris, and Sturgill Simpson, attends weekly live sets at Nashville’s Bluebird Café, and reads biographies
    of historical figures to fuel their appreciation of narrative storytelling.
  travel: Teresa Rosenkrans plans their travel with the same precision they apply to their garden, favoring structured itineraries for weekend getaways to Asheville and Charleston, extended hikes in the
    Great Smoky Mountains, and dreaming of a spring trek through Patagonia and a cultural immersion in Kyoto despite their family’s limited vacation days.
  culinary: Teresa Rosenkrans delights in baking Southern classics such as peach cobbler, buttermilk biscuits, and shrimp‑and‑grits, confidently seasoning each with basil, mint, and rosemary harvested from
    their own vegetable garden.
  core: Teresa Rosenkrans blends relentless organization with early‑morning runs, vintage‑vinyl hunting, and an occasional habit of delaying email replies to savor a fresh batch of biscuits, all while they
    keep a meticulous calendar that never misses a deadline.
background:
  cultural: Teresa is a White American with German and Irish ancestry who grew up in the Midwest before moving to Nashville, Tennessee for her career. Her upbringing combined a pragmatic Midwestern work
    ethic with the warmth and hospitality characteristic of Southern culture. She was raised in a modest Catholic household but now identifies culturally with Protestant traditions common in the region.
    As a divorced professional in her late forties, she values independence, self‑improvement, and community involvement. She participates in the Nashville Marketing Association and local civic groups,
    reflecting a blend of professional ambition and a commitment to the broader community.
attributes:
  skills: '[''Strategic Marketing Planning'', ''Brand Development'', ''Digital Campaign Management'', ''Data Analysis & Reporting'', ''Project Management'', ''Marketing Automation (HubSpot, Marketo)'',
