  hobbies: '[''Gardening'', ''Baking Southern cuisine'', ''Yoga and Pilates'', ''Running/Jogging'', ''Reading historical non‑fiction'', ''Attending live music concerts'', ''Hiking in state parks'', ''Volunteering
    at community food banks'', ''Travel planning'', ''Collecting vintage vinyl records'']'
  career_goals: Teresa aims to advance to a senior director or vice‑presidential role in marketing within the next five years, leading regional strategy and data‑driven initiatives for a national brand.
    She aspires to mentor emerging marketers, champion inclusive and ethical marketing practices, and expand her expertise in emerging digital technologies. After achieving executive leadership experience,
    she envisions launching her own boutique marketing consultancy that helps midsize firms optimize brand positioning and customer engagement. Throughout her career progression, she seeks to maintain a
    balanced workload that respects her need for structured alone time while fostering collaborative leadership.
