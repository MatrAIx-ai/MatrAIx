  hobbies: '[''Surfing'', ''Hiking'', ''Photography'', ''Science Fiction Reading'', ''Acoustic Guitar'', ''STEM Outreach Volunteering'', ''Puzzle Solving (Crosswords, Sudoku, Rubik’s Cube)'', ''Home Brewing'',
    ''Mediterranean Cooking'', ''Book Club Participation'']'
  career_goals: Samuel aims to secure tenure at a four-year university within the next five years, expanding his role from teaching-focused to research-active. He aspires to lead interdisciplinary research
    projects that bridge engineering principles with sustainable technology, obtain external funding from agencies like NSF, and publish peer-reviewed articles and a textbook on applied physics. He also
    seeks to develop innovative, inquiry-based courses that integrate real-world problem solving and to champion diversity, equity, and inclusion initiatives that increase participation of underrepresented
    groups in STEM. Long-term, Samuel envisions establishing a research lab that offers undergraduate students hands-on experience in renewable energy systems.
