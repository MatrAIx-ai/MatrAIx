personas:
  professional: Rosa Guevara, a 25‑year‑old bilingual hospitality specialist, blends fluent Spanish–English communication, POS mastery, and food‑safety expertise with an artist’s eye for table presentation,
    turning every service night into a mini‑gallery while delighting guests with spontaneous upsell chatter, and they thrive on the buzz of a bustling floor.
  sports: Rosa Guevara fuels their love of movement through weekend pick‑up soccer at a local field, avidly follows the Dallas Cowboys and cheers for the Amarillo Sod Poodles while dancing cumbia at community
    festivals, and they keep fit by hiking the Caprock Canyons trail and relish the camaraderie of local fan clubs.
  arts: Rosa Guevara paints vibrant watercolors of street murals, curates folk‑art workshops inspired by intricate papel‑picado, regularly attends live performances ranging from Los Lobos to indie folk
    darling Phoebe Bridgers, draws creative fuel from the rhythmic sway of cumbia and the storytelling brushstrokes of Frida Kahlo, and they often sketch backstage scenes after shows.
  travel: Rosa Guevara balances wanderlust with a modest budget by road‑tripping through Hill Country’s vineyards, spending weekend nights at Austin’s South by Southwest festival, planning a future getaway
    to Oaxaca’s colorful markets, while they keep a travel journal of sketches and recipes collected along the way and share it with friends during weekend potlucks.
  culinary: Rosa Guevara, an intermediate home cook, loves experimenting with chilies, fresh cilantro, and masa to reinvent classic enchiladas suizas and tamales de elote, often pairing them with a homemade
    margarita made from Grand Marnier, occasionally ordering sushi to satisfy a secret craving for raw fish, and they proudly serve their reinterpretations to friends at weekly dinner gatherings.
  core: Rosa Guevara is a vivacious 25‑year‑old who fuses hospitality hustle, artistic flair, and community spirit into every slice of life, even if that means juggling late‑night mural inspiration with
    the occasional missed alarm, and they channel that energy into every interaction.
background:
  cultural: Rosa grew up in a bilingual Mexican-American household in Amarillo, where Spanish was spoken at home and English at school. Her parents emigrated from Jalisco, bringing traditions such as Día
    de los Muertos, quinceañeras, and regional cuisine that she still celebrates with her extended family. Immersed in the vibrant Mexican community of Potter County, she participated in local festivals,
    folk-art workshops, and the annual Mariachi Fiesta. This bicultural upbringing blends Mexican values of family, hospitality, and artistic expression with the open, independent spirit of Texas, shaping
    her identity and outlook.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Customer service", "POS system operation", "Food safety and hygiene compliance", "Multitasking in high-volume settings", "Upselling and menu promotion",
    "Team coordination and conflict resolution", "Creative food plating and presentation", "Basic arithmetic and cash handling", "Social media engagement for restaurant promotions"]'
  hobbies: '["Sketching and watercolor painting", "Cooking Mexican dishes at home", "Attending live music events (mariachi, indie folk)", "Dancing cumbia and salsa", "Volunteering at Mexican cultural festivals",
    "Hiking in the Texas Hill Country", "Photographing street murals", "Exploring local art galleries", "Reading books on art history", "Socializing at coffee shops"]'
  career_goals: Rosa aims to build on her hospitality experience by first earning her GED and completing a certificate program in restaurant management. In the next two years she hopes to be promoted to
    shift supervisor and eventually assistant manager at her current restaurant. Long-term, she dreams of opening a small café-gallery in Amarillo that celebrates Mexican folk art and serves contemporary
    Tex-Mex fare, providing a platform for emerging local artists while creating a community hub.
