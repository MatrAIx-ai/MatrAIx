  career_goals: Miguel aims to open his own flagship restaurant in the Bronx that showcases contemporary Puerto Rican flavors with a farm‑to‑table approach, earn a Michelin star, and become a recognized
    culinary influencer through TV appearances and a signature line of sauces. He also plans to mentor emerging chefs from underrepresented backgrounds while maintaining control over his creative direction.
