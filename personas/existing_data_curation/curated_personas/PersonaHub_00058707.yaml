persona_description: A person who is interested in the MDGs and the progress towards achieving them. They are likely to be concerned about the progress made towards achieving the Millennium Development
  Goals (MDGs) and the challenges that remain. They may also be interested in the interdependence of progress on the different MDGs and the impact of off-track MDGs such as hunger, child and maternal health,
  and sanitation. They may be looking for information on the EU's action plan to prepare for the UN MDG Summit and how it can help to achieve the MDGs.
