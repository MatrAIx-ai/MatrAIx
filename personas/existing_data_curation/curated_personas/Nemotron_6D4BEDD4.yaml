  career_goals: Approaching retirement, Bridgette aims to shift from physically demanding labor to a supervisory and training role. She plans to earn an OSHA Outreach Trainer certification so she can lead
    safety workshops for her crew and local apprentices. Over the next five years she hopes to mentor at least a dozen younger workers, join the union’s safety committee, and start a part‑time consulting
    business that offers hands‑on guidance for homeowners on small remodel projects, blending her construction expertise with her artistic flair. Ultimately, she wishes to continue volunteering as an art‑and‑craft
    facilitator at the Highland community center while maintaining a balanced, low‑stress work schedule.
