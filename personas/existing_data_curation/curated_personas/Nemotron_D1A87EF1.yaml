personas:
  professional: Stephen Shahbazi, a budding teen engineer, channels their love for routine and step‑by‑step instructions into school STEM projects and LEGO builds, where their practical mindset shines even
    as their laid‑back attitude sometimes leaves notebooks a bit messy.
  sports: Stephen Shahbazi rides local bike trails with the Trailblazers Junior Cycling Club, plays occasional soccer matches for the Sierra Rapids Youth Soccer League, and follows professional teams like
    the Seattle Seahawks and the Portland Trail Blazers, blending casual fitness with fan enthusiasm.
  arts: Stephen Shahbazi unwinds by listening to classic rock icons such as Led Zeppelin, The Rolling Stones, and Pink Floyd, while practicing acoustic guitar chords from songs like Wish You Were Here and
    Blackbird, a routine that offers both structure and creative release.
  travel: Stephen Shahbazi enjoys weekend bike excursions to nearby state parks like Yosemite and dreams of visiting Kyoto and the Swiss Alps, but limited family budgets and school commitments shape a travel
    style that favors short, budget‑friendly trips over lengthy vacations.
  culinary: Stephen Shahbazi favors simple, comfort foods like pepperoni pizza, spaghetti bolognese, and grilled cheese made with cheddar and mozzarella, and while their cooking skill is basic, they take
    pride in mastering the perfect cheese melt with parental supervision.
  core: Stephen Shahbazi blends a love for structured creativity with chronic worry, building intricate LEGO sets while fretting over grades, and occasionally forgets to water their plants or finish homework
    until the last minute.
background:
  cultural: Stephen comes from a white, Iranian‑American family that settled in the suburbs of New Jersey. His parents maintain a blend of Persian cultural traditions—such as celebrating Nowruz and enjoying
    Persian cuisine—while also embracing typical American suburban life. Growing up in Montville, a community known for its safe neighborhoods and strong public schools, he has been exposed to both his
    family's heritage and the broader American culture. The family values education, practical skills, and a stable routine, which reflects in Stephen’s everyday habits and future aspirations.
