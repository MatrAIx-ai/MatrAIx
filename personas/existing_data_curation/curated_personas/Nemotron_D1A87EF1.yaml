  career_goals: Stephen hopes to finish high school with a solid GPA and then pursue a technical field that offers a clear career path and stable routine. He is particularly interested in automotive technology
    and aims to earn a certification as an auto technician, eventually working in a reputable garage or dealership. He also entertains a secondary ambition of becoming a civil engineer, which would let
    him design infrastructure while applying his love for practical problem‑solving. In the near term, he wants to join his high school’s robotics club to gain hands‑on engineering experience and to secure
    a summer apprenticeship at a local car repair shop. He values a career that combines reliable schedules with the chance to work with his hands.
