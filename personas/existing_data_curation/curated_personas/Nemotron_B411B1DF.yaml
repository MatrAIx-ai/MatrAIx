personas:
  professional: Mary Pedersen, a diligent middle‑school student with a budding interest in environmental science, channels their exceptional organization and love for routine into meticulously planned science‑fair
    projects and disciplined piano practice, aspiring to become a conservationist.
  sports: Mary Pedersen enjoys skiing on the nearby Evergreen slopes with the local youth ski club, follows the professional ice‑hockey team the Frostbite Flyers, and participates in after‑school track,
    specializing in the 800‑meter run for the Riverdale Middle School Tigers.
  arts: Mary Pedersen, an avid reader of the "Harry Potter" and "Percy Jackson" series, spends three evenings a week mastering piano pieces by Ludwig van Beethoven and Ludovico Einaudi, and regularly attends
    performances by the Meadowstage Players at the community theater.
  travel: Mary Pedersen prefers carefully planned family road trips, having explored Yellowstone National Park on a scheduled itinerary of hikes and wildlife spotting, and now dreams of visiting the historic
    city of Edinburgh to tour the castle and experience the summer arts festival.
  culinary: Mary Pedersen enjoys cooking simple meals like spaghetti bolognese with ground turkey, fresh basil, and cherry tomatoes, delights in baking banana muffins with walnuts, and often forgets to
    set the timer, resulting in occasionally over‑browned edges.
  core: Mary Pedersen is a methodical, quietly ambitious pre‑teen who balances disciplined piano practice, structured garden routines, and a love for puzzle‑solving, all while maintaining a calm, cooperative
    demeanor.
background:
  cultural: Mary Jo is a third‑generation American of Danish descent. Her family has lived in the rural area of Cambridge, Vermont, for several generations, and they maintain a modest, community‑oriented
    lifestyle that values self‑reliance, punctuality, and practical skills. Growing up, she has been exposed to a blend of New England traditions—such as Thanksgiving, local farm fairs, and modest church
    gatherings—and occasional Danish cultural touches, like baking cinnamon‑spiced pastries for holidays and sharing stories from her grandparents about Denmark. The community emphasizes close‑knit neighborly
    support, outdoor recreation, and an appreciation for nature, which shape her values and daily routines.
attributes:
  skills: '[''Organizational planning (maintaining a detailed planner)'', ''Effective note-taking'', ''Time-management'', ''Proficiency with Google Classroom and online research'', ''Pet care (dog feeding
