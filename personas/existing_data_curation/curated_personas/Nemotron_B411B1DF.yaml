  hobbies: '[''Reading (fantasy and adventure series)'', ''Personal journaling'', ''Piano practice (three times per week)'', ''Gardening (planting and maintaining vegetables)'', ''Nature walks in local
    forests'', ''Puzzle solving (Sudoku, crosswords)'', ''Library reading program participation'', ''Skiing (winter sport with small group)'']'
  career_goals: Mary Jo aspires to a career that blends her organizational strengths with her compassion for living things. She dreams of becoming a veterinarian who works in a rural setting, helping farm
    animals and pets alike, and is also drawn to the idea of working as a librarian or archivist where she can organize and preserve information. In the near future, she aims to join her school's science
    club, take advanced biology classes, and continue volunteering at the community library to build relevant experience.
