  career_goals: Looking ahead, Chetra aims to transition from day‑to‑day transaction work to a mentorship and boutique‑brokerage model where she can guide younger agents while preserving a high‑service
    standard for her clientele. She plans to earn the Certified Residential Specialist (CRS) designation and eventually acquire a broker’s license to open a small, family‑run office focused on first‑time
    homebuyers and senior‑downsizing customers in the Ashburn area. Financially, she seeks to build a modest portfolio of rental properties that will generate passive income for her retirement and support
    her children’s education. Balancing ambition with her sensitivity to stress, she prioritizes sustainable growth and a work schedule that allows ample personal downtime.
