personas:
  professional: Carol Cromwell, a 23-year-old claims adjuster in New Hampshire, leverages a humanities-sharp eye for detail and compassionate assertiveness to dissect insurance policies, investigate property
    damage, and craft concise reports, while thriving on the routine of similar claims and occasionally stretching deadlines with flexible, informal planning.
  sports: Carol Cromwell, an avid hiker of the White Mountains and seasonal skier at Bretton Woods, trains with the local White Mountain Hikers club, follows the Boston Red Sox and New England Patriots
    passionately, and spends Saturday mornings playing co-ed softball in the nearby community league.
  arts: Carol Cromwell fills her evenings with classic novels by Jane Austen and Herman Melville, contemporary non-fiction by Malcolm Gladwell, participatory knitting circles, and regular visits to the
    regional theater for productions of Arthur Miller, while humming along to The Avett Brothers and collecting vintage Woolworth's pattern books.
  travel: Carol Cromwell prefers low-key, itinerary-light travel, tackling weekend road trips to Acadia National Park, the historic streets of Boston and Montreal, and spontaneous hikes in the White Mountains,
    while dreaming of a summer backpacking adventure in Iceland's volcanic landscapes and a cultural immersion tour of Kyoto.
  culinary: Carol Cromwell enjoys cooking hearty New England staples like creamy clam chowder, lobster rolls, and maple-glazed pork chops, often sourcing fresh clams from local fisheries and hand-picking
    autumn apples for homemade apple butter, while their medium-level culinary confidence lets them experiment with rye sourdough starters and occasional splurges on sushi rolls at the downtown izakaya.
  core: Carol Cromwell is a routine-loving claims adjuster who channels her worry into meticulous report writing, steadies her finances with conservative investments, battles anxiety with yoga, and finds
    solace in knitting, hiking, and classic literature, often forgetting appointments but never missing a yarn supply sale.
background:
  cultural: Carol comes from a traditional New England white background, raised in a small town in Lebanon, NH. Her family values modesty, self‑reliance, and community involvement, traits common in the
    region’s Anglo‑Saxon heritage. Growing up near the White Mountains, she developed a close connection to nature and seasonal rhythms. Her upbringing blended a respect for practical, everyday responsibilities
    with an appreciation for the arts and humanities, reflected in her bachelor's degree. While she may have been exposed to Protestant cultural traditions, her personal identity is more shaped by local
    customs—such as participation in town meetings, seasonal festivals, and volunteer work at the historical society—than by any specific religious practice.
