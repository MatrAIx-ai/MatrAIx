  hobbies: '[''Hiking'', ''Gardening'', ''Chess'', ''Digital Photography'', ''Genealogy Research'', ''Historical Lecture Series'', ''Volunteer Story‑telling'', ''Reading Historical Non‑fiction'', ''Board
    Games with Grandchildren'']'
  career_goals: Although retired, Eric aims to leave a lasting legacy by mentoring emerging entrepreneurs, contributing his expertise to non‑profit boards, and authoring a memoir that captures lessons from
    his business career and personal life. He also seeks to establish a scholarship fund for undergraduate business students at the University of Utah, ensuring his knowledge and values benefit future generations.
