personas:
  professional: Eric Lee, a retired business executive turned mentor, combines their strategic planning and financial analysis expertise with a pragmatic curiosity for emerging technologies, and they apply
    organized yet flexible problem‑solving to guide emerging entrepreneurs and nonprofit boards.
  sports: Eric Lee, an avid hiker, joins a senior walking club for weekly treks in the Wasatch Mountains, tends to a community garden after a morning stretch, and they support the Utah Jazz and the Utah
    Utes football team, while also participating in a local senior badminton league that balances their love of competition with low‑impact exercise.
  arts: Eric Lee, a budding digital photographer, draws inspiration from Ansel Adams and the Utah Symphony’s performances of Beethoven, frequently visits the Utah Museum of Fine Arts to study works by Georgia
    O’Keeffe, and they enjoy classic western films starring John Wayne during quiet evenings.
  travel: Eric Lee, a landscape‑focused traveler, has explored Zion and Arches National Parks, took a guided tour of Kyoto’s historic temples last year, and they dream of trekking the Scottish Highlands
    with their grandchildren, preferring organized group itineraries that accommodate their health needs.
  culinary: Eric Lee, a modest home chef, often prepares roasted beet and heirloom tomato salad with balsamic glaze, kale quinoa bowls seasoned with garlic and rosemary, and they occasionally treat themselves
    to elk stew at the Red Rock Grill, favoring fresh garden produce and simple, wholesome flavors.
  core: Eric Lee, a ninety‑year‑old strategist with a green thumb, perks up at sunrise hikes, a new camera lens, and a chess puzzle, yet they habitually misplace their reading glasses, forcing them to improvise
    with their phone’s magnifier.
background:
  cultural: Eric was raised in a mid‑western Protestant family that emphasized hard work, community service, and education. After moving to Salt Lake City in his thirties, he embraced the broader Utah culture,
    participating in local civic organizations and respecting the region’s strong sense of community and outdoor lifestyle. His cultural identity blends traditional American values with the collaborative,
    volunteer‑oriented spirit of the Intermountain West.
