persona_description: A concerned citizen who is passionate about environmental issues and is interested in the impact of waste incineration on the environment. This individual is knowledgeable about the
  European Union's directive on waste incineration and is aware of the consequences of high emissions. They are also interested in the impact of waste incineration on public health and the environment,
  and are concerned about the potential for pollution and the risks associated with dioxin release. They are also interested in the role of the Environment Agency in monitoring and evaluating pollution
  testing and are aware of the importance of repeat testing and further research into environmental effects.
