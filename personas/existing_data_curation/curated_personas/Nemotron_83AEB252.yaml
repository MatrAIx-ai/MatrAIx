  career_goals: Although retired from full‑time work, Supreet aims to stay intellectually active by offering selective consulting on sustainable infrastructure projects in the Chicago area, focusing on
    resilience and cost efficiency. He aspires to mentor the next generation of engineers through part‑time workshops at local community colleges and by guiding high‑school students in advanced mathematics
    and engineering fundamentals. He also plans to complete a personal research project documenting the evolution of Chicago's bridge architecture, and to earn a LEED Green Associate credential to keep
    his expertise current. Maintaining a disciplined daily routine and meeting personal milestones in these endeavors align with his preference for structure and his competitive nature.
