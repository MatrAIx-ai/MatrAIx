personas:
  professional: Supreet Mehta, a retired civil and structural engineer, leverages three decades of finite‑element analysis, code compliance, and rigorous budgeting to provide methodical consulting on resilient
    Chicago infrastructure while mentoring junior engineers with a competitive yet detail‑driven approach, and they pride themselves on delivering reliable, code‑compliant designs.
  sports: Supreet Mehta maintains fitness through early‑morning walks along the Chicago Lakefront Trail, competes in the Oak Brook Senior Tennis Club’s weekly round‑robin matches, and they follow the Chicago
    Bears and Chicago Cubs with disciplined game‑day routines, preferring low‑intensity, structured activity over high‑energy sports.
  arts: Supreet Mehta regularly attends Chicago Symphony Orchestra concerts featuring Beethoven and Mahler, enjoys occasional raga performances by sitarist Rahul Sharma, and they find that the precision
    of classical music mirrors their structured mindset.
  travel: Supreet Mehta favors meticulously planned trips, having explored the historic bridges of London’s Thames River and the marble temples of Rajasthan, while dreaming of a disciplined pilgrimage to
    Kyoto during the autumn foliage season, and they always book senior‑friendly itineraries within a strict budget.
  culinary: Supreet Mehta’s culinary routine blends disciplined cooking of Gujarati staples such as undhiyu, dhokla, and hand‑rolled rotis with precise measurement of spices like cumin and fenugreek, and
    they take pride in replicating these dishes for Diwali gatherings while occasionally indulging in an extra serving of sweet jalebi.
  core: Supreet Mehta embodies a structured, solitary intellect who balances meticulous engineering consulting, disciplined finances, and a disciplined garden, all while nurturing a quiet competitive streak
    and a tendency to obsess over spreadsheets, and they often schedule their day down to the minute.
background:
  cultural: Supreet was born in Gujarat, India, to a Hindu family that emphasized education, discipline, and self‑reliance. He immigrated to the United States in the late 1970s and settled in the Chicago
    suburbs, where a vibrant Indian community preserves cultural traditions. He speaks Gujarati and Hindi fluently, though English is his primary language in daily life. He observes major festivals such
    as Diwali, Navratri, and Uttarayan, often preparing traditional foods and participating in modest community gatherings. The cultural values of orderly rituals, respect for elders, and a strong work
    ethic resonate with his practical, structured personality, while his preference for small, close‑knit social circles reflects his reserved nature. His divorce has led him to find balance through solitary
    pursuits and selective community involvement, preserving his cultural identity while adapting to his current life stage.
