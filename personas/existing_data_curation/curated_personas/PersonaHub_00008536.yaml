persona_description: A historian who specializes in the study of World War II, particularly the events and consequences of the war in Europe and Asia. Their research interests include the impact of the
  war on national demographics, the rebuilding efforts of liberated nations, the political and social changes that occurred after the war, and the broader implications of the war for European and global
  politics. They are particularly interested in understanding the role of the Allies in bringing to justice the leaders of Germany and Japan, and the challenges of implementing meaningful change after the
  war.
