  hobbies: '[''Gardening'', ''Reading historical novels'', ''Book club participation'', ''Quilting'', ''Hiking'', ''Cross‑stitch'', ''Volunteer pantry organization'']'
  career_goals: Marlene aims to step into a supervisory role on the plant floor within the next three to five years, leveraging her expertise in lean processes and safety to lead a small team. She plans
    to earn a Lean Six Sigma Green Belt certification and become a certified safety officer, positioning herself for future advancement to Production Manager. Ultimately, she hopes to secure a stable, well‑compensated
    position that provides financial security for her family and allows her to mentor younger workers.
