  career_goals: Shoshana is motivated to transition from store manager to regional operations supervisor, overseeing multiple locations within the county. She aims to formalize her managerial knowledge
    by completing a community college certificate in Business Management, which will supplement her practical experience. Additionally, she is passionate about integrating arts into the everyday shopping
    experience, dreaming of curating rotating local art displays in her stores and establishing a community art fund. She hopes to mentor younger Black women in the area, offering them pathways into management
    roles. A long‑term ambition is to collaborate with a local nonprofit to develop an after‑school art program that merges creativity with entrepreneurship for teens.
