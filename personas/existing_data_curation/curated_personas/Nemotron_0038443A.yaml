  hobbies: '[''Abstract painting'', ''Astrophotography'', ''Scale model rocketry'', ''Reading speculative fiction and philosophy'', ''Chess'', ''Succulent gardening'', ''Community theater participation'',
    ''Exploring virtual‑reality art platforms'', ''STEM tutoring'', ''Traveling to national parks'']'
  career_goals: Although retired from full‑time employment, Charles aims to stay intellectually active by tutoring high‑school and community‑college students in STEM subjects, authoring a memoir that blends
    his engineering career with his love of art, and curating a traveling exhibition of his digital paintings. He also aspires to become an advocate for senior engagement in lifelong learning, organizing
    regular speaker series and art workshops at his Sun City community center, while maintaining a balanced routine to manage stress and preserve his emotional wellbeing.
