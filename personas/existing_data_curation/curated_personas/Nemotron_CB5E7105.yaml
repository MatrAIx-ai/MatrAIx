personas:
  professional: Diana Jaimes is an aspiring junior architect who turns her love for building farm scenes with LEGO bricks into early design practice, using colored pencils and a tablet to sketch layouts
    while thriving on routine and preferring familiar, step‑by‑step projects.
  sports: Diana Jaimes participates in a local youth soccer league on Saturday mornings, enjoys casual bird‑watching hikes along the Skagit River with her parents, and practices a simple stretching routine
    at home that she learned from a cartoon fitness show, preferring low‑key activities over competitive sports.
  arts: Diana Jaimes immerses herself in creative expression by drawing detailed animal illustrations with colored pencils, experimenting with digital art on a tablet, building elaborate LEGO farms, and
    listening to mariachi music while sketching, drawing inspiration from picture books and short chapter stories about families and animals.
  travel: Diana Jaimes loves weekend nature walks along the Skagit River trail, collecting pinecones and spotting birds, and cherishes family trips to nearby farms where she can explore animal pens, while
    dreaming of visiting the Grand Canyon for its vast landscapes and iconic vistas.
  culinary: Diana Jaimes enjoys helping her grandmother mash avocados for guacamole, loves sprinkling lime and sea salt while humming to mariachi tunes, and frequently asks for a tiny slice of cheese quesadilla
    after art sessions, while occasionally forgetting to wash her hands after handling raw ingredients.
  core: Diana Jaimes is a routine‑loving, creatively curious 8‑year‑old who thrives on building LEGO farms, doodling animals, and wandering the Skagit River trail, yet she can be disorganized about her
    allowance and occasional allergy meds, balancing quiet solitary play with moments of assertive cooperation.
background:
  cultural: Diana's family immigrated from Mexico, and she grows up speaking Spanish at home while attending an English‑language school. Mexican traditions, such as celebrating Día de los Muertos, making
    tamales with her grandmother, and listening to regional music, are woven into her daily life. Living in Mount Vernon, Washington, she also enjoys the Pacific Northwest's outdoor culture, blending family
    heritage with local customs. Her bicultural upbringing gives her a strong sense of identity, a love for sharing Mexican food with friends, and an appreciation for the community’s seasonal festivals.
attributes:
  skills: '[''Fluent reading'', ''Basic arithmetic'', ''Spanish‑English bilingual communication'', ''Memorizing daily routines'', ''Basic cooking assistance'', ''Digital drawing'']'
  hobbies: '[''Reading picture books'', ''Drawing and coloring'', ''LEGO building'', ''Nature walks'', ''Helping with cooking'', ''Listening to Mexican music'', ''Playing soccer in small groups'']'
  career_goals: When she thinks about the future, Diana imagines a job that lets her care for living things and work in a predictable environment. She often says she wants to become a veterinarian because
    she loves her hamster and enjoys learning about animal health. She also dreams of one day teaching younger children how to read, hoping to combine her love of books with a stable, community‑focused
    career. Diana believes that by staying curious and practicing her skills now, she can reach those goals.
