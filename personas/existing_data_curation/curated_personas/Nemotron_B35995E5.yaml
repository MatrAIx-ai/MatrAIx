  career_goals: Elizabeth aspires to build a solid academic foundation throughout high school, participating in advanced STEM courses, robotics competitions, and science fairs. She aims to earn a scholarship
    that will enable her to study aerospace engineering or a related field in college, with a long‑term ambition to contribute to space exploration or aerospace technology development. In the near term,
    she hopes to become a senior member of her school's robotics team, lead community service initiatives, and maintain a high GPA to meet competitive college admissions standards.
