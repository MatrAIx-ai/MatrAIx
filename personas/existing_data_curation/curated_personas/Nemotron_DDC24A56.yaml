personas:
  professional: William Jennings, a budding junior technologist who transforms LEGO constructions into prototype inventions, explores simple block-coding games on a tablet, and uses their talkative, competitive
    spirit to lead school tech challenges, balancing organized planning with spontaneous creativity.
  sports: William Jennings, an energetic 7-year-old striker for the Tippecanoe County Jr. Soccer Club who idolizes Lionel Messi, spends Saturday mornings sprinting at the local park, follows the Indiana
    Hoosiers men's soccer team, and channels their competitive drive into scoring goals while occasionally coaching teammates on positioning.
  arts: William Jennings, a creative whirlwind who spends afternoons sketching cartoon heroes like SpongeBob and Ariel, builds intricate LEGO dioramas inspired by Pixar's Toy Story, stages short skits with
    classmates, curates a sticker album featuring BTS and Disney characters, and devours picture books by Eric Carle, letting their boundless curiosity define a vivid artistic identity.
  travel: William Jennings, an adventurous 7-year-old who loves exploring the wooded trails of Tippecanoe County for bugs and rocks, has visited the Indianapolis Children's Museum and the Ohio River's splash
    park, dreams of camping at Yellowstone National Park and riding a carousel at Disneyland, prefers day-trip itineraries planned by their parents but insists on packing their sticker collection for every
    journey.
  culinary: William Jennings, a budding foodie who proudly assembles peanut-butter-and-jelly sandwiches, builds cheesy macaroni towers, helps their mom bake LEGO-shaped sugar cookies with vanilla extract
    and rainbow sprinkles, favors pizza topped with extra pepperoni and cheddar, and occasionally insists on adding a splash of ketchup to their fruit kebabs.
  core: William Jennings, a talkative and fiercely competitive 7-year-old with a boundless curiosity for drawing, LEGO building, and bug-hunting, channels their skeptical edge into strategic games while
    juggling a penchant for sticker-trading and occasional forgetfulness about their glasses.
background:
  cultural: William comes from a white, middle‑class family in Delphi, Indiana, a small town in Tippecanoe County known for its close‑knit community and Midwestern values. His family participates in local
    events like the annual Strawberry Festival and church gatherings, where storytelling and music are celebrated. The region’s emphasis on friendliness, self‑reliance, and a love of outdoor activities
    shapes his outlook, while exposure to school art programs and community sports reinforces his sociable, competitive, and creatively curious personality.
