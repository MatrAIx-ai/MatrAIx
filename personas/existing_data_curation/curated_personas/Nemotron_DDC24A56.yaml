  career_goals: William dreams of becoming an astronaut who sketches the planets he explores, or a movie director who can make his friends laugh on the big screen. He also imagines teaching younger kids
    how to draw and tell stories, merging his love for art, discovery, and being in the spotlight. His competitive streak pushes him to aim for the top spot on his school’s science fair and soccer team.
