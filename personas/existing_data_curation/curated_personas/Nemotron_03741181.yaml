  career_goals: Although she is not currently in the formal workforce, Mary aims to deepen her involvement in community service by taking a leadership role in her local senior center and exploring part‑time
    opportunities as a volunteer coordinator. She hopes to launch a community garden initiative, serve on the board of a neighborhood nonprofit, and develop a weekly intergenerational cooking class that
    combines her love of food with mentorship. Travel with her husband and granddaughter to visit heritage sites in Ireland is also a personal ambition.
