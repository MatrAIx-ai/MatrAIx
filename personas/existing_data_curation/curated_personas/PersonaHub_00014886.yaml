persona_description: A scientist or researcher who specializes in the study of sedimentary rocks and their formation, particularly in the context of amber and its formation. This individual has expertise
  in the identification and classification of clavate structures found in amber, the identification of martesiine bivalves, and the interpretation of the depositional environment in which they formed. They
  have experience in cross-cutting relationships between the clavate structures and inclusions in amber, and have conducted research on the size of pholadid body fossils and their duration of boring activities
  in Burmese amber. They are knowledgeable about the formation of a solid rim around a liquid central volume and the close proximity between the amber-producing trees and a brackish water habitat for the
  bivalves. They have a strong understanding of the importance of pyrite as thin films and crystal groups within Burmese amber, and have conducted research on the duration of boring activities in Burmese
  amber.
