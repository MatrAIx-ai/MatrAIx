personas:
  professional: Nicholas Chennis is a 31‑year‑old creative strategist who merges Adobe‑savvy graphic design, UI/UX prototyping, and community‑focused project management to craft inclusive digital experiences
    while juggling freelance gigs and volunteer art‑program coordination.
  sports: Nicholas Chennis supports the New York Knicks in basketball, cheers for the New York Giants in football, joins a local weekend running club for 5K races, and plays casual ultimate frisbee with
    friends at a community park during summer.
  arts: Nicholas Chennis immerses themselves in abstract painting inspired by Jackson Pollock, captures street moments à la Henri Cartier‑Bresson, performs spoken‑word at open‑mic nights while vibing to
    the improvisations of Miles Davis, Kendrick Lamar, and Fela Kuti, and follows the urban murals of Banksy for fresh visual ideas.
  travel: Nicholas Chennis plans their trips with a tight itinerary, favoring budget‑friendly hostels and public transit, has explored the vibrant markets of Marrakech and the street‑art lanes of Berlin,
    and dreams of a VR‑enhanced cultural tour of Kyoto’s temples once they save enough.
  culinary: Nicholas Chennis experiments in their balcony kitchen, mixing Korean kimchi with Mexican tacos to create kimchi‑taco sliders, perfecting the balance of lemongrass, turmeric, and smoked paprika
    in a signature ginger‑turmeric ramen, yet often forgets to pre‑heat the oven, leading to occasional burnt edges.
  core: Nicholas Chennis is a methodical dreamer who turns abstract ideas into community art while juggling a caffeine habit, overdue library books, and a relentless urge to sketch everything they see.
background:
  cultural: Nicholas is a Black American who grew up in Newark’s historically African‑American neighborhoods, immersed in the city’s rich tradition of gospel music, hip‑hop, and community activism. Family
    gatherings feature Southern soul food and gospel singing, reinforcing a deep connection to his heritage. He regularly participates in local cultural festivals, the Newark Museum’s African diaspora exhibitions,
    and community mural projects that celebrate Black history and resilience. The multicultural tapestry of Newark’s Ironbound and Central Ward neighborhoods has broadened his perspective, and he draws
    inspiration from both his African‑American roots and the diverse urban environment that surrounds him.
