  hobbies: '[''Abstract painting'', ''Street photography'', ''Spoken‑word poetry'', ''Improvisational theater'', ''Live music and DJ events'', ''Board games'', ''Fusion cooking'', ''Urban gardening'', ''Exploring
    AR/VR art experiences'', ''Reading speculative fiction'']'
  career_goals: Nicholas aims to translate his artistic talent and methodical approach into a full‑time role that merges creativity with social impact. His short‑term goal is to complete a bachelor’s degree
    in Fine Arts or Visual Communication while building a robust freelance portfolio of graphic design, illustration, and UI/UX projects. He aspires to secure a position as a UX/UI designer at a tech company
    focused on inclusive design or as a program manager for an arts nonprofit that serves Newark’s underserved youth. Long‑term, he envisions launching his own community‑centered art studio that offers
    workshops, public mural projects, and mentorship programs, positioning himself as a cultural leader in his neighborhood.
