personas:
  professional: Jose Gorin is a 38‑year‑old bilingual middle‑school teacher who blends meticulous lesson planning with creative tech‑enhanced instruction, using mindfulness techniques to foster inclusive
    classrooms while balancing their curiosity for innovative pedagogy with practical curriculum alignment.
  sports: Jose Gorin enjoys solitary hikes in the Blue Ridge Mountains with their local Appalachian Hiking Club, participates in seasonal half‑marathons, follows the Atlanta Braves for baseball and the
    Carolina Hurricanes for hockey, and occasionally joins a community soccer league to stay active.
  arts: Jose Gorin finds creative release on their acoustic guitar, strumming Latin folk tunes by Jorge Drexler and Appalachian folk‑rock by The Avett Brothers, attending live performances at the Asheville
    Music Hall, and actively contributing to a book club that discusses historical fiction and education research.
  travel: Jose Gorin prefers low‑key, nature‑focused trips, having explored the waterfalls of Asheville, the historic streets of Santa Fe, and the culinary markets of Oaxaca, while dreaming of a road‑trip
    through the Great Smoky Mountains with stops at family‑run farms for fresh produce.
  culinary: Jose Gorin is an intermediate home chef who perfects traditional dishes like carnitas tacos and mole poblano while experimenting with Southern twists such as smoked paprika‑infused shrimp and
    grits, favoring ingredients like corn masa, cilantro, and smoked chipotle peppers.
  core: Jose Gorin blends a teacher’s precision with a wanderer’s curiosity, juggling lesson plans, hiking boots, and a skillet, all while battling a tendency to over‑worry and a habit of forgetting to
    water their houseplants.
background:
  cultural: Jose was raised by Mexican immigrant parents and grew up with strong Mexican cultural values such as familismo, respeto, and a love for community celebrations. Bilingual in Spanish and English,
    he regularly incorporates Mexican folklore, traditional songs, and holidays like Día de los Muertos into his classroom to enrich learning. Living in Weaverville, NC, he also embraces Appalachian customs,
    blending his heritage with local culture through food, storytelling, and community service. His cultural background informs his collaborative teaching style, his emphasis on inclusive education, and
    his commitment to fostering cross‑cultural understanding among his students.
attributes:
  skills: '[''Classroom management'', ''Differentiated instruction'', ''Bilingual education (Spanish‑English)'', ''Curriculum development'', ''Technology integration'', ''Assessment and data analysis'',
