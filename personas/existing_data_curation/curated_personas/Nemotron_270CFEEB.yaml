  hobbies: '[''Hiking'', ''Cooking Mexican cuisine'', ''Playing acoustic guitar'', ''Listening to Latin and folk music'', ''Reading historical fiction and education literature'', ''Book club participation'',
    ''Yoga and mindfulness practice'', ''Volunteering at community festivals'', ''Gardening'']'
  career_goals: Jose aims to finish his bachelor's degree in education and obtain full certification within the next two years. He aspires to become a lead teacher and coordinator for the district’s bilingual
    program, mentor new educators, and eventually pursue a master’s in educational leadership to move into school administration. He is passionate about creating a culturally responsive curriculum that
    weaves Mexican heritage and local Appalachian stories, and plans to launch an after‑school literacy program for underserved students. Balancing practicality with curiosity, he seeks professional development
    in educational technology and inclusive pedagogy while maintaining a supportive, well‑organized classroom.
