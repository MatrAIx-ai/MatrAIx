persona_description: A researcher and engineer working on flood resilience and urban planning, focused on developing new tools and strategies to improve flood management and reduce the risk of flooding.
  They are part of the CORFU project, which aims to improve flood management worldwide by understanding and adapting to the varying challenges and solutions in urban flooding in Europe and Asia. The persona
  is skilled in hydraulic modeling, real-time flood forecasting, and understanding the impact of flooding on population health. They are also interested in the development of advanced tools to improve flood
  resilience and have a keen eye for innovation in the field of urban planning.
