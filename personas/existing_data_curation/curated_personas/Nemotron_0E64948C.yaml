  career_goals: Christine aims to turn her outgoing personality and knack for influencing audiences into a career in media and communications. She plans to enroll in a community college program in Marketing
    or Public Relations, with the long‑term goal of becoming a social media manager or brand ambassador for a company that values cultural diversity. She dreams of leading community‑focused campaigns that
    promote Latino heritage and mental‑health awareness, leveraging her personal experience with anxiety to create authentic, supportive content. In the meantime, she hopes to gain internships at local
    marketing agencies or nonprofit outreach departments, building a portfolio of campaigns that showcase her ability to engage diverse audiences and drive measurable results.
