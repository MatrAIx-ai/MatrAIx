personas:
  professional: Christine Ramos is an aspiring social media strategist who leverages her bilingual charisma, debate‑team poise, and love for dance to craft culturally resonant campaigns, while her preference
    for routine clashes with a tendency to improvise on the fly during live content creation, and they often channel the restless energy from anxiety into high‑energy livestreams.
  sports: Christine Ramos is a fan of the Los Angeles Lakers basketball team and the LAFC soccer club, regularly attends local salsa‑dance meet‑ups at the downtown community center, and they incorporate
    quick cardio routines into study breaks to maintain energy for long debate rehearsals.
  arts: Christine Ramos cultivates a vibrant artistic life by dancing to reggaetón hits from Bad Bunny and Shakira, producing reaction videos to teen dramas starring Zendaya and Olivia Rodrigo on TikTok,
    and they curate Instagram reels that blend traditional rhythms with modern pop aesthetics.
  travel: Christine Ramos dreams of a budget‑friendly trip to Oaxaca to explore culinary festivals, has already taken weekend road trips to Santa Barbara’s beaches and the nearby mountain town of Big Bear
    Lake, and they prefer to plan trips with friends using group chats and shared playlists for the journey.
  culinary: Christine Ramos loves cooking aromatic dishes like pepián and kakik, often adding a contemporary twist with avocado crema or quinoa, and they showcase their kitchen experiments—featuring roasted
    chilies, chocolate‑smoked broth, and fresh corn tortillas—on Instagram to inspire followers.
  core: Christine Ramos is a talkative, anxiety‑driven 19‑year‑old who balances structured ambition in media with spontaneous dance sessions, impulsive spending, and a relentless quest to blend cultural
    heritage with modern digital trends, and they constantly juggle intense emotions with a drive for creative expression.
background:
  cultural: Christine is a first‑generation American whose parents emigrated from Guatemala in the early 2000s. Raised in a bilingual household, she grew up speaking Spanish at home and English at school,
    which gave her a fluid cultural identity. Family gatherings are centered around traditional foods, mariachi music, and Catholic holidays such as Día de los Muertos and Semana Santa, events that she
    actively participates in and helps organize. Living in Pleasantville, a predominantly white suburb, she has learned to navigate dual cultural expectations, often serving as a cultural bridge between
    her community and the broader town. Her Guatemalan heritage informs her love for spicy flavors, rhythmic dance, and a strong sense of family solidarity, while also shaping her desire to represent Latino
    voices in her future professional endeavors.
