personas:
  professional: Cassius Mcdonald, a budding LEGO architect who spends afternoons constructing elaborate brick cities while narrating scientific stories, balances curiosity with practical problem‑solving
    and consistently keeps detailed building plans—traits that suggest a future as a civil engineer or product designer, and they delight in sharing their creations with friends at the library storytime.
  sports: Cassius Mcdonald, a mini‑hockey enthusiast who straps on tiny skates for the local youth league and idolizes the New York Islanders, also follows the Albany Great Danes basketball season, enjoys
    cooperative bike rides on the river trail with friends, and they always cheer up teammates after a lost game with a high‑five.
  arts: Cassius Mcdonald, an imaginative drawer who fills sketchbooks with dinosaurs, superheroes, and scenes from picture books like "The Very Hungry Caterpillar" and "Ada Twist, Scientist", loves sharing
    their illustrations during library storytime while also enjoying quiet moments humming Disney soundtracks on a small keyboard, and they often gift hand‑drawn cards to neighbors.
  travel: Cassius Mcdonald, a curious explorer who loves weekend trips to the nearby Adirondack Mountains for leaf‑collecting hikes, annual family visits to the Schenectady Air Show, and dreams of a future
    road trip to Washington, D.C.’s National Air and Space Museum, meticulously helps map the route with crayons yet they remain open to spontaneous detours for a duck pond.
  culinary: Cassius Mcdonald, a budding chef who loves making mac and cheese with extra cheddar, assembling peanut‑butter‑jelly sandwiches shaped like dinosaurs, and eagerly snacking on fresh apple slices
    with caramel dip after a day of LEGO building, often offers extra bites to a younger sibling and they proudly clean up their own dishes despite occasional “messy‑art” spills.
  core: Cassius Mcdonald, a six‑year‑old with boundless curiosity, meticulous LEGO plans, occasional candy‑craving meltdowns, a habit of humming tunes while rescuing stray bugs in the backyard, and a friendly
    tendency to share drawings with anyone who’ll look, and they often turn simple chores into mini‑adventures.
background:
  cultural: Cassius comes from a white, middle‑class family in Schenectady, NY, a city known for its industrial heritage and strong community spirit. His family celebrates classic American holidays—Thanksgiving,
    Christmas, and the Fourth of July—often participating in local traditions such as the Schenectady Air Show and community fairs. Growing up near Albany, he is exposed to the region's historic Dutch colonial
    influences and enjoys seasonal activities common to the Capital Region, like apple picking in the fall and ice skating in winter. The family values education, practicality, and service, reflecting broader
    Northeastern American cultural norms. Cassius also experiences the local youth sports culture, especially hockey, and benefits from the city’s public library programs that foster his love of reading
    and storytelling.
