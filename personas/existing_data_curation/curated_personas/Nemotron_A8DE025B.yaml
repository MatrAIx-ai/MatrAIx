  career_goals: Even at six, Cassius dreams of becoming someone who helps others. He frequently talks about being a teacher to share knowledge, a firefighter to protect his community, and a veterinarian
    to care for animals. He also shows curiosity about building things, imagining a future as an engineer or a construction worker. These ambitions reflect his compassionate nature, practical curiosity,
    and desire to contribute positively to the world around him.
