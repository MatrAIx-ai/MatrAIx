persona_description: 'A linguistics researcher who specializes in comparative studies of education, particularly in the context of transnational migration. Her work focuses on documenting and analyzing
  local communities'' values and priorities in relation to formal and informal education, and expanding the field of rhetoric and composition through the international context. Her research has revealed
  two important findings: migrant students and their families tend to see education as pragmatic, for example, equipping them to read signs in unfamiliar towns, and even serving as a means of defense against
  being cheated.'
