  career_goals: Stephanie plans to complete her GED within the next year and enroll in a community college program in communications or visual arts. Her short-term goal is to secure an internship with a
    local arts nonprofit or a public relations firm to gain professional experience. Long-term, she aspires to become a creative director or outreach coordinator for a cultural institution that connects
    youth with the arts, and to launch her own multimedia platform that showcases emerging artists from Texas and promotes arts education for underserved communities.
