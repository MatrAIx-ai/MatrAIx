personas:
  professional: Stephanie Wiseman, a 17‑year‑old high school senior with a flair for visual storytelling, merges her sketching, digital illustration, and social‑media content creation talents with strong
    public‑speaking and event‑coordination abilities, and they are actively seeking an internship at a local arts nonprofit to launch a career in creative direction.
  sports: Stephanie Wiseman enjoys playing co‑ed soccer with friends on weekends, regularly attends Dallas FC matches to support the local team, and they keep fit by mixing on‑field drills with weekday
    yoga sessions at a community center.
  arts: Stephanie Wiseman immerses herself in the Dallas arts scene by sketching street murals inspired by Banksy, curating playlists featuring Tame Impala and Billie Eilish, quoting poet Ocean Vuong in
    her blog, and they regularly attend open‑mic nights where they share original poetry alongside indie film screenings of Moonlight and Parasite.
  travel: Stephanie Wiseman loves spontaneous road trips to nearby Austin for live music festivals, day‑trips to Waco’s Texas Ranger Museum, and dreams of backpacking through New Orleans for jazz, the art
    galleries of Santa Fe, and eventually exploring the historic streets of Paris while balancing a modest travel budget and school commitments.
  culinary: Stephanie Wiseman frequently samples food‑truck creations like Korean BBQ tacos, mango‑chili elote, and artisanal grilled cheese, enjoys cooking simple dishes such as avocado toast with feta
    and honey, and they experiment with homemade ramen broth using miso, shiitake mushrooms, and soft‑boiled eggs.
  core: Stephanie Wiseman is a curious, sociable teen who channels boundless artistic energy into sketching, digital media, and community events, balancing meticulous organization with a love for spontaneous
    creativity and occasional impulse spending on art‑related treats.
background:
  cultural: Stephanie was raised in the suburban town of Sachse, Texas, within a middle-class, predominantly white family. Her upbringing reflects traditional Texan values—such as a love for outdoor activities,
    community picnics, and country music—while her proximity to the Dallas metropolitan area exposed her to a broader cultural mosaic, including Hispanic, African-American, and Asian influences. This blend
    of local tradition and metropolitan diversity has shaped her open-minded, inclusive perspective, fostering an appreciation for both regional customs and global artistic expressions.
