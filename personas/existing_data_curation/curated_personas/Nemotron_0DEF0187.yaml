  career_goals: Wyvonia aims to re‑enter the professional world by leveraging her business background and creative skill set to launch a boutique consulting practice that supports nonprofit arts organizations
    in the New York‑New Jersey region. She envisions obtaining a certificate in nonprofit leadership within the next two years and building a portfolio of grant proposals and community‑based projects. In
    the longer term, she hopes to mentor other women of color transitioning back into the workforce and to establish a community art center that offers affordable workshops and exhibition space.
