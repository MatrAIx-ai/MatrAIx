personas:
  professional: Elena Wong, a retired senior‑center volunteer, leverages their fluency in Spanish, bookkeeping savvy, and DIY expertise to coordinate intergenerational gardening projects and cultural‑heritage
    workshops, balancing meticulous planning with a flexible, curiosity‑driven approach.
  sports: Elena Wong enjoys leisurely morning walks in Brookside Park, participates in a senior pickleball league, follows the Atlanta Braves and Atlanta Falcons, and attends occasional community walks
    that double as light cardio, prioritizing gentle activity over competitive sports.
  arts: Elena Wong’s artistic life blends crocheting hand‑crafted blankets with a love for mariachi and ranchera music, frequently humming tunes by Vicente Fernández and Lila Downs while cooking, and attending
    local theater productions featuring folk narratives, all of which nurture their storytelling passion.
  travel: Elena Wong prefers short, purposeful trips that blend cultural immersion and relaxation, such as weekend visits to historic Santa Fe, a day tour of Savannah’s historic district, and an annual
    family pilgrimage to the coastal town of Gulf Shores, while dreaming of a road trip along the Blue Ridge Parkway.
  culinary: Elena Wong excels at creating budget‑friendly Oaxacan‑style mole using chilies, epazote, and chocolate, adapts Yucatán cochinita pibil with Southern barbecue techniques, and enjoys experimenting
    with spice blends that feature cumin, paprika, and chipotle while preserving heirloom tomatoes from their garden.
  core: Elena Wong is a pragmatic yet curious community mentor who gardens, crochets, and cooks with disciplined charm, occasionally misplacing their glasses but always remembering the perfect spice ratio
    for a stew.
background:
  cultural: Elena was raised in a Mexican‑American household that celebrated both Mexican traditions and Southern hospitality. Her family observed Día de los Muertos, quinceañeras, and Catholic holidays,
    blending them with local church gatherings in Decatur. Spanish was spoken at home, and she learned to weave Mexican folk stories into everyday conversation. Over the decades, she has integrated Southern
    customs—such as sharing sweet tea and potluck gatherings—into her cultural practice, creating a unique bicultural identity that values family, community harmony, and respect for elders. Her Mexican
    heritage informs her cooking, music preferences, and storytelling, while her life in DeKalb County has fostered a deep connection to the diverse, inclusive spirit of the Atlanta metropolitan area.
attributes:
