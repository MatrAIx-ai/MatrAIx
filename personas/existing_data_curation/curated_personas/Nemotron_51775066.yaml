  hobbies: '[''Tending a vegetable garden'', ''Cooking traditional Mexican dishes'', ''Crocheting blankets and shawls'', ''Listening to mariachi and folk music'', ''Reading local history'', ''Walking in
    neighborhood parks'', ''Participating in community cultural festivals'']'
  career_goals: Although retired from formal employment, Elena aims to formalize her role as a cultural mentor within the Decatur senior community. She plans to compile a family cookbook that blends cherished
    Mexican recipes with the practicalities of Southern cooking, and to lead monthly cooking workshops for seniors and teenagers. Elena also hopes to expand the neighborhood garden into an intergenerational
    learning space, where she can teach gardening, budgeting for food, and share stories of Mexican heritage. In the longer term, she dreams of establishing a small oral‑history archive at the local library
    that captures the experiences of Mexican‑American elders in DeKalb County.
