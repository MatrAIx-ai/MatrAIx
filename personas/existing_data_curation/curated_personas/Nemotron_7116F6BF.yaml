  career_goals: Edward's career aspirations blend his curiosity for how things work with his practical mindset. He hopes to become an engineer, perhaps focusing on sustainable design and community infrastructure,
    or a wildlife biologist/veterinarian who helps protect the horses and natural habitats of the Bluegrass region. He envisions using his calm, problem‑solving nature to develop practical solutions that
    benefit his hometown.
