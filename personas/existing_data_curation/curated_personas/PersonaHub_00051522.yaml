persona_description: A genetic counselor who specializes in the evaluation and interpretation of genetic testing results, particularly for inherited cancer syndromes. They work closely with patients and
  their families to understand the potential risks and benefits of genetic testing, and to help them make informed decisions about their own health and the health of their relatives. They are highly skilled
  in evaluating complex family medical histories and in discussing potential changes to cancer screening and early detection strategies. They are also knowledgeable about the limitations and potential risks
  of genetic testing, and are committed to providing personalized and compassionate care to their patients.
