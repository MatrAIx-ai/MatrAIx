  career_goals: Approaching retirement, Marta aims to leave a lasting imprint on her department by formalizing a mentorship program that prepares the next generation of supervisors. She plans to champion
    a department‑wide digital‑file transition, securing a smoother, paper‑light workflow before she steps back. Marta also hopes to earn a small‑business certification to launch a part‑time consulting practice
    that helps local nonprofits improve their administrative efficiency. Ultimately, she seeks a balanced schedule that allows her to continue contributing her expertise while dedicating more time to community
    volunteering and family.
