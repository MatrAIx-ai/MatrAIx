personas:
  professional: Terry Pean is a seasoned landscaping professional who blends a deep know‑how of Florida turf management and irrigation design with a hands‑on curiosity for sustainable practices, while they
    lead crews with a relaxed, cooperative style despite occasional disorganization.
  sports: Terry Pean lives for the surf and supports the Tampa Bay Lightning in the NHL and the Miami Marlins in MLB, while they also join the Daytona Beach Surf Club’s early‑morning sessions and complement
    beach workouts with occasional strength training at the local gym.
  arts: Terry Pean finds a soundtrack for life in the smooth grooves of Alicia Keys, the rhythmic flow of Kendrick Lamar, classic soul from Marvin Gaye, and the spontaneous improvisations of local jazz
    nights featuring saxophonist Julian Vann, which they share with their spouse during relaxed evenings.
  travel: Terry Pean prefers spontaneous road trips along the Atlantic coast, having already explored Key West, Savannah, and the historic streets of St. Augustine while they dream of a weekend getaway
    to Bermuda’s pink sand beaches, yet they often postpone travel plans to balance budgeting for their future landscaping business.
  culinary: Terry Pean enjoys cooking grilled mahi‑mahi brushed with mango‑habanero glaze, heirloom tomato salads drizzled with basil‑infused olive oil, and soul‑food collard greens seasoned with smoked
    turkey, frequently sourcing fresh catch from the Halifax River and swapping recipes with neighbors during community potlucks, which they consider a cherished weekend ritual.
  core: Terry Pean is a laid‑back, eco‑focused landscaper who balances a love of surf, gardening, and soulful music with a tendency toward anxiety‑driven overthinking, and they often delay paperwork.
background:
  cultural: Terry is an African‑American who grew up in the vibrant black community of Central Florida. His cultural identity is shaped by Southern traditions, the legacy of the civil‑rights movement, and
    the rhythmic influences of R&B and soul music that have long been a staple in his family gatherings. He values church community ties, often participating in Baptist church activities that emphasize
    fellowship and service. Culinary traditions such as soul food and Caribbean-inspired dishes reflect the broader Black diaspora influences common in Florida, and he enjoys cooking dishes like collard
    greens, fried catfish, and jambalaya. Terry’s cultural background also instills a strong sense of resilience and mutual support, which informs his collaborative work style and his dedication to contributing
    positively to his neighborhood through volunteerism.
