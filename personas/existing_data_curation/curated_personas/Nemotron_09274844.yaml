  hobbies: '[''Surfing'', ''Beach walks'', ''Fishing at Halifax River'', ''Home vegetable gardening'', ''Listening to R&B, hip‑hop, and soul music'', ''Attending local jazz nights'', ''Community park clean‑up
    volunteering'', ''Restoring vintage landscaping equipment'']'
  career_goals: Terry aims to transition from a hands‑on worker to a supervisory role within the next three years, seeking a crew lead position that allows him to mentor newer workers while still engaging
    in field work. He plans to earn a Certified Landscape Technician (CLT) credential and eventually obtain his GED to broaden his career options. Long‑term, he dreams of launching a small, family‑run landscaping
    business focused on eco‑friendly designs that serve the Daytona Beach community, providing financial stability for his wife and any future children. He also hopes to develop a network of local suppliers
    to support sustainable sourcing, reflecting his blend of curiosity about new methods and desire for practical, reliable outcomes.
