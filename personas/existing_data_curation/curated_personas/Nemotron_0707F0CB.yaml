personas:
  professional: Jose Castillo is a veteran horticulturist and master carpenter whose methodical record‑keeping and curiosity drive their self‑sufficient farm, while their competitive streak pushes them
    to perfect their coffee shrub for the local garden contest and their preference for solitude leads them to work alone in the field and workshop.
  sports: Jose Castillo follows the local baseball team the San Lorenzo Stars and participates in a senior walking club that meets twice a week at the town square, using these low‑impact activities to stay
    fit while channeling their competitive nature into tracking personal step counts on a simple pedometer and occasionally bragging about out‑pacing younger members.
  arts: Jose Castillo immerses themselves in the sounds of classic boleros like Sabor a Mí by Los Panchos and lively plena such as El Caiman on a vintage radio, while their wood‑carving of small religious
    icons reflects a reverence for tradition and their occasional attendance at community theater showcases of María Teresa all of which shape their identity and provide a quiet escape from routine.
  travel: Jose Castillo prefers meticulously planned day trips to nearby historic towns such as Old San Juan and the coffee‑growing hills of Lares, and dreams of a pilgrimage to the historic mission in
    the Sierra Madre of Mexico, yet their limited mobility and cautious budgeting keep most journeys short, organized, and vehicle‑based rather than adventurous backpacking.
  culinary: Jose Castillo takes pride in cooking lechón with a crisp skin, simmering arroz con gandules seasoned with sofrito, adobo, and green olives, and preparing pernil using a secret family rub, often
    harvesting fresh cilantro, bell peppers, and plantains from their garden to enhance each dish, while their precision in measuring spices mirrors their detailed record‑keeping habits.
  core: Jose Castillo is a solitary, methodical craftsman who balances fierce curiosity with a competitive drive, channels anxiety into exacting garden journals, and clings to tradition through music, cooking,
    and woodworking, all while occasionally hoarding cash and battling emotional storms.
background:
  cultural: Jose is a lifelong resident of San Lorenzo, a rural municipio in the interior of Puerto Rico known for its coffee farms and close‑knit community. His heritage blends Spanish colonial roots,
    African rhythms, and Taíno indigenous influences, reflected in the island’s language, music, and cuisine. He was raised in a devout Catholic household, participating in local festivals such as the Fiesta
    de San Lorenzo and the traditional plena dances. Family ties and respect for elders are central values, and he carries forward the oral traditions of his ancestors through storytelling. The agricultural
    lifestyle of his town has shaped his practical mindset, emphasizing self‑reliance, stewardship of the land, and communal sharing of harvests. These cultural threads inform his daily routines, culinary
    preferences, and his desire to preserve and pass on his community’s legacy.
attributes:
  skills: '[''Horticulture and garden management'', ''Carpentry and woodworking'', ''Small engine repair and maintenance'', ''Traditional Puerto Rican cooking'', ''Meticulous record‑keeping and budgeting'',
