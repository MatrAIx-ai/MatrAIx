  hobbies: '[''Fishing and outdoor grilling'', ''Playing guitar (classic rock)'', ''Homebrewing craft beer'', ''Attending food festivals and live music events'', ''Reading culinary history and technique
    books'', ''Experimenting with new recipes in solitude'', ''Volunteering at food banks'', ''Coaching youth cooking workshops'']'
  career_goals: Randy aims to become an executive chef at a flagship Houston restaurant that blends Southern comfort with contemporary twists, eventually earning a James Beard nomination for his innovative
    menu. He also plans to launch his own flexible‑concept eatery—perhaps a food‑truck or pop‑up series—that lets him experiment with seasonal ingredients while maintaining a predictable work‑life balance
    for his family. Competitive cooking remains a motivator; he hopes to win regional BBQ and chef‑challenge contests and later mentor apprentices through a community culinary program.
