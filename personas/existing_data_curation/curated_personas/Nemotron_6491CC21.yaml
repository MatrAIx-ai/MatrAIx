  hobbies: '["Weightlifting and Cardio Running", "Strategic Video Gaming (FPS & RTS)", "Tabletop Card Games", "Reading Fire Science and Engineering Journals", "DIY Electronics (Arduino, Raspberry Pi)",
    "Cooking Mexican Cuisine", "Volunteering at Community Fire Safety Clinics", "Attending Cultural Celebrations (Día de los Muertos, Mexican Independence Day)"]'
  career_goals: Anthony aims to advance to the rank of fire captain within the next five years, focusing on mastering incident command and earning advanced NFPA certifications. He plans to pursue a master's
    degree in fire protection engineering to deepen his technical knowledge and eventually transition into a fire safety engineering or consulting role where he can develop data‑driven prevention programs.
    Competitive by nature, he seeks recognition as the department’s top performer in safety compliance and hopes to mentor new recruits, instilling his disciplined, routine‑oriented approach.
