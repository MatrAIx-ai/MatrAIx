personas:
  professional: A veteran bilingual educator with three decades of classroom experience, Ashley Lozada designs adaptable curricula, leads professional development, and mentors peers while balancing curiosity-driven
    innovation with pragmatic, data‑driven instruction.
  sports: An enthusiastic supporter of the Bakersfield Condors and a seasonal participant in the local senior soccer league, Ashley Lozada attends weekly home games, cheers for the Los Angeles Dodgers during
    spring training, and enjoys modest trail hikes in the Sierra foothills to keep her fitness steady.
  arts: A culturally attuned arts enthusiast, Ashley Lozada frequently listens to traditional folk singers like Lila Downs, attends the Bakersfield Symphony’s performances of folk‑inspired compositions,
    and discusses the films of Guillermo del Toro in her small book‑club gatherings.
  travel: A meticulous planner, Ashley Lozada has visited Oaxaca City’s historic markets, explored the Oregon Coast’s tide pools, and dreams of trekking Patagonia’s glaciers, always booking early, using
    loyalty points, and balancing adventure with budget considerations.
  culinary: An avid home chef, Ashley Lozada cooks mole poblano with dark chocolate and dried chiles, prepares tamales using fresh corn masa from her garden, and delights in seasoning dishes with epazote
    and cumin, while also experimenting with simple woodworking kitchen tools she builds herself.
  core: Ashley Lozada blends competitive curiosity with disciplined practicality, thriving as a seasoned educator who gardens, solves crosswords, and meticulously plans every aspect of her professional
    and personal life.
background:
  cultural: Ashley’s cultural identity is rooted in her Mexican heritage and the vibrant Latino community of Bakersfield. Bilingual in Spanish and English, she often weaves Mexican folklore, music, and
    familial values into her classroom to create culturally responsive learning experiences. Growing up as a first‑generation college graduate, she values hard work, respect for elders, and the importance
    of education as a path to upward mobility. She actively participates in local Día de los Muertos celebrations and supports community organizations that provide tutoring and resources to immigrant families.
    This cultural lens informs her teaching philosophy, emphasizing inclusivity, community engagement, and a practical yet curious approach to learning.
attributes:
