  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Cooking traditional Mexican dishes'', ''Birdwatching'', ''Hiking in the Sierra foothills'', ''Crossword puzzles'', ''DIY woodworking projects'',
    ''Small-group book clubs'']'
  career_goals: Ashley aims to transition from classroom teaching to a district-level instructional coaching role, where she can shape bilingual curriculum standards across Kern County schools. She is pursuing
    a doctorate in educational leadership to deepen her influence on policy, and she plans to secure a grant to develop a STEM enrichment program for underrepresented Latino students. By publishing a guide
    on culturally responsive teaching and leading state conference workshops, she hopes to leave a lasting legacy that blends practical innovation with proven methods. While she anticipates retiring in
    the next five years, she remains focused on mentoring the next generation of educators.
