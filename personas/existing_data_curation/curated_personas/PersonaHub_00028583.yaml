persona_description: A historian who specializes in the study of labor movements and their impact on society. Their research interests include the evolution of the working class struggle for higher wages
  and the role of trade unions in the context of the U.S. Teamsters strike against UPS. They are interested in understanding the complex interplay between the wages system, profits, and prices of commodities,
  and how the struggle between capital and labor is likely to affect the future of the working class.
