persona_description: A historian who specializes in the study of ancient Egyptian history, particularly the reigns of Mentuhotep II, Sesostris II, and Ahmosis. Their research interests include the political,
  economic, and social developments of ancient Egypt during these periods, as well as the impact of foreign invasions and conquests on the stability and decline of the country. They are also interested
  in the role of the state in regulating trade and controlling foreign trade, and the impact of foreign rule on the culture and society of ancient Egypt.
