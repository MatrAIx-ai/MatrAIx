  hobbies: '[''Acoustic guitar and worship music'', ''Cooking Salvadoran cuisine (pupusas, tamales)'', ''Hiking the Palisades and local trails'', ''Playing basketball'', ''Developing small church apps with
    Python'', ''Reading science-fiction and theological books'', ''Volunteer work at food banks'', ''Youth mentorship through sports and tutoring'']'
  career_goals: Enier aims to complete a Master of Divinity within the next three years, building on his STEM background to develop a ministry that integrates technology and faith. He envisions leading
    a multicultural congregation in the New Jersey area, creating programs that offer STEM tutoring, career counseling, and spiritual guidance for immigrant families. He hopes to become a senior pastor
    who can mentor young leaders, launch a community health and wellness clinic, and publish a series of articles exploring the dialogue between science and theology.
