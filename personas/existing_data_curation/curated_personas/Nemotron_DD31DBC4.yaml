  career_goals: Christopher aims to transition from senior statistician to Director of Analytics within a public‑health agency or a data‑driven nonprofit that serves underserved communities in the Twin
    Cities. He wants to build and mentor a high‑performing analytics team, publish influential research on health disparities, and eventually launch his own consulting practice that helps local governments
    use data to improve equity outcomes. He is also considering a leadership certificate in data science management to solidify his strategic credentials.
