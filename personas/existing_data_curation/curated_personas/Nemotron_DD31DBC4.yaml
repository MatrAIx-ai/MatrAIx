personas:
  professional: Christopher Woods is a senior statistician who uses two decades of expertise in experimental design, multivariate analysis, and predictive modeling—proficient in R, Python, SAS, and SQL—to
    build reproducible analytic pipelines and clear Tableau visualizations for public‑health agencies, channeling their preference for structured rigor while occasionally letting competitive anxiety drive
    last‑minute data sprints.
  sports: Christopher Woods is a regular participant in the Twin Cities’ community basketball league and a dedicated member of the Minneapolis Park & Recreation Soccer Club, cheering for the Minnesota Timberwolves
    in winter and the Minnesota Twins in summer while also following Minnesota United FC, balancing competitive play with weekly hikes in state parks to stay fit.
  arts: Christopher Woods channels their love for group energy into karaoke nights where they belt out Journey’s “Don’t Stop Believin’” and Stevie Wonder’s “Superstition,” while they attend jazz and blues
    festivals headlined by artists like Gregory Porter and Herbie Hancock, letting these soulful sounds shape their weekend social rhythm.
  travel: Christopher Woods prefers spontaneous weekend getaways, often hiking the Boundary Waters Canoe Area or exploring historic Saint Paul neighborhoods, while dreaming of a cultural immersion trip
    to Kyoto’s tea houses and a music pilgrimage to New Orleans’ jazz clubs, balancing a modest travel budget with occasional splurges on airfare for unique music experiences.
  culinary: Christopher Woods is an avid home chef who masters soulful dishes like smoked catfish collard greens and sweet‑potato pie, enjoys experimenting with spices such as smoked paprika, cayenne, and
    fresh thyme, and frequently showcases their culinary creations at family gatherings, though they sometimes over‑season in a burst of creative energy.
  core: Christopher Woods is a data‑driven, sociable problem‑solver who balances structured analytics with spontaneous basketball, karaoke, and soulful cooking, while wrestling with anxiety and occasional
    financial impulsivity.
background:
  cultural: Christopher grew up as an African‑American in the Midwest, with his formative years spent in the Saint Paul area where he was immersed in both the Black church community and the broader multicultural
    fabric of the Twin Cities. The rich traditions of gospel music, community barbecues, and local cultural festivals shaped his sense of identity. As a Black professional in STEM, he navigated predominantly
    white academic and corporate spaces, developing a keen awareness of structural inequities while drawing strength from his family’s resilience and community support networks. His experiences as a separated
    father have deepened his reliance on extended family, church groups, and neighborhood mentors, reinforcing his commitment to give back through data‑driven initiatives that address health and social
    disparities affecting Black residents in Minnesota.
