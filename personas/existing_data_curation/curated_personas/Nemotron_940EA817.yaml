  career_goals: He aims to advance to a senior management role, such as branch manager or regional director, where he can shape lending policies that balance profitability with consumer protection. William
    wants to develop a community financial‑literacy program for Smithtown residents, leveraging his counseling experience to reduce debt cycles. He also plans to earn a Certified Financial Planner (CFP)
    designation to broaden his advisory services.
