persona_description: A historian who specializes in the study of Scottish history, particularly the period from the late sixteenth to the beginning of the eighteenth century. The historian is interested
  in the origins, events, and consequences of the uprising of the Galloway Levellers in 1724, and seeks to clarify the confusion surrounding their actions and responses. They have a strong background in
  land use and land ownership, the plantation of Ulster, and the religious and political conflicts of the later seventeenth century, and are equipped with the necessary knowledge and skills to identify
  and provide a history for the people and places involved, as well as to explore the previously unrecognised connection between late eighteenth century Galloway and the theory and practice of the industrial
  revolution.
