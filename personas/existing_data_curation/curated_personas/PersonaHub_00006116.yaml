persona_description: A scientist who studies the effects of oceanic processes on climate, particularly the impact of the Point Loma kelp forest on the coastal ocean. This scientist is interested in the
  spatial and temporal fluctuations in iodine speciation and their influence on local and regional climate. They are knowledgeable about the relationships between the emission of iodine species and atmospheric
  processes such as ozone destruction and cloud formation, and are interested in how these fluctuations in kelp canopy biomass can be important to local and regional climate.
