personas:
  professional: Carolaine Santiago is a meticulous teaching assistant who leverages bilingual instruction, data‑driven assessment, and a rigorous command of Canvas and Blackboard to craft structured lesson
    plans, and their competitive drive pushes them to publish early and secure a PhD track in Latin American Studies while maintaining a practical, outcomes‑focused approach to academic work.
  sports: Carolaine Santiago hikes the Santa Monica bluffs three times a week, participates in a local weekend running club that trains for 5K races, and seasonally follows the Los Angeles Lakers and the
    LA Galaxy, balancing personal fitness with a modest enthusiasm for professional team sports.
  arts: Carolaine Santiago paints vibrant street scenes in oil, drawing inspiration from the bold lines of Jean‑Michel Basquiat, the vivid color experiments of Yayoi Kusama, and the urban commentary of
    Banksy, while regularly attending gallery openings featuring works by Kehinde Wiley and Olafur Eliasson, and they unwind to the music of Tame Impala and the spoken‑word performances of Sarah Kay.
  travel: Carolaine Santiago plans trips with the same spreadsheet precision they use for lesson plans, preferring weekend getaways to the Santa Barbara vineyards, annual hikes in the Redwood National Park,
    and a long‑awaited cultural immersion trip to the historic streets of Granada, Spain, balancing a modest travel budget with occasional splurges on boutique hostels when a scholarship grant becomes available.
  culinary: Carolaine Santiago whips up hearty pozole rojo with hominy, pork shoulder, and a blend of dried chilies, perfects mole poblano by slow‑roasting nuts, seeds, and chocolate, and experiments with
    tacos al pastor using pineapple‑marinated pork, all while juggling a modest kitchen setup that sometimes leaves the rice slightly overcooked, a quirk they laugh off with a side of fresh salsa verde.
  core: Carolaine Santiago fuses disciplined academic rigor with vivid artistic expression, balancing structured planning, competitive ambition, and a love for community‑focused creativity while occasionally
    over‑committing and battling mild anxiety.
background:
  cultural: Carolaine was raised in a bicultural household in Santa Monica, where her Mexican immigrant parents emphasized Spanish language, family gatherings, and cultural traditions such as Día de los
    Muertos and quinceañera celebrations. She maintains strong ties to her heritage through regular visits to Mexican community festivals, cooking family recipes, and staying connected with a network of
    Mexican‑American peers. This cultural foundation informs her academic interests, community outreach, and commitment to educational equity for Latino students while also shaping her pragmatic, organized
    approach to personal and professional life.
attributes:
  skills: '["Lesson planning", "Curriculum development", "Bilingual instruction (Spanish/English)", "Academic research", "Data analysis for student assessment", "Learning management systems (Canvas, Blackboard)",
    "Workshop facilitation", "Project coordination", "Cross‑cultural communication", "Time management"]'
  hobbies: '["Oil painting", "Reading contemporary Mexican literature", "Hiking", "Yoga", "Cooking traditional Mexican cuisine", "Visiting art galleries", "Spanish‑language book club", "Volunteer tutoring",
    "Photography"]'
  career_goals: Carolaine aims to earn a PhD in Latin American Studies or Comparative Literature within the next five years and secure a tenure‑track professorship focused on Mexican‑American literature
    and cultural studies. She aspires to develop interdisciplinary courses that bridge literature, social justice, and community engagement, publish influential scholarly articles, and lead a department‑wide
    initiative that expands bilingual education programs for underrepresented students. Long‑term, she envisions becoming a department chair who shapes policy toward equity in higher education and mentors
    emerging scholars from Latino backgrounds.
