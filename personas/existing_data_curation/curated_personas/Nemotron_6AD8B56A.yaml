  career_goals: Approaching retirement, Nikhil envisions shifting from an individual contributor to a supervisory role where he can shape the team culture and champion service excellence. He plans to earn
    a certified Customer Service Manager credential and leverage his competitive drive to surpass departmental performance targets. Simultaneously, he is exploring freelance consulting opportunities to
    help small businesses streamline their customer experience processes, applying his blend of curiosity and practicality. He also hopes to complete a bachelor’s degree in Business Administration, formalizing
    the knowledge he has amassed on the job. Ultimately, Nikhil aims to mentor the next generation of representatives and leave a lasting impact on the organization.
