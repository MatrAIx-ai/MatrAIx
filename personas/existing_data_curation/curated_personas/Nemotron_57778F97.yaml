personas:
  professional: Ashley Deguzman, a 16‑year‑old aspiring art therapist, channels their sketching, digital illustration, and volunteer experience at the Montevallo public library into empathetic community‑centered
    projects, balancing meticulous event planning with spontaneous creative sessions.
  sports: Ashley Deguzman enjoys solitary nature walks along the Sipsey Trail and attends a weekend yoga class at the Montevallo Community Center, while cheering on the University of Montevallo Routers
    basketball team and the local Montevallo High School Wildcats football squad during high‑school games.
  arts: Ashley Deguzman immerses themselves in indie folk artists like Sufjan Stevens and Bon Iver, draws inspiration from fantasy novelist Brandon Sanderson and contemporary poet Ocean Vuong, and spends
    evenings practicing acoustic guitar while sketching scenes from the natural world.
  travel: Ashley Deguzman favors low‑budget weekend getaways, having explored the historic streets of Savannah, the art galleries of Birmingham, and the mountain trails of Asheville, all while meticulously
    researching free museum days and budget hostels to stretch a limited teen travel fund.
  culinary: Ashley Deguzman prefers simple, wholesome meals such as avocado toast with lemon zest, homemade lentil soup seasoned with cumin and smoked paprika, and baking occasional apple crumble, using
    fresh basil and cherry tomatoes they harvest from a small backyard garden.
  core: Ashley Deguzman is a quietly intense creative soul whose love for sketching, journaling, and volunteer work coexists with a habit of over‑thinking every detail, from budgeting to brushstroke choices.
background:
  cultural: Ashley was raised in Montevallo, a small, close‑knit community in Shelby County, Alabama. Her family embraces typical Southern traditions—church attendance, Sunday family meals, local festivals,
    and a strong emphasis on hospitality, modesty, and hard work. The town’s tight‑social network fosters a deep sense of responsibility to help neighbors, which aligns with Ashley’s compassionate nature.
    While rooted in these Southern cultural values, Ashley’s curiosity and love for art have led her to explore broader cultural influences online, ranging from contemporary visual arts to indie music scenes.
    This blend of local heritage and global artistic exposure shapes a nuanced identity that honors her community’s traditions while reaching beyond them.
attributes:
  skills: '[''Sketching and drawing'', ''Digital illustration'', ''Creative writing'', ''Photography and photo editing'', ''Community volunteer coordination'', ''Peer counseling and active listening'',
