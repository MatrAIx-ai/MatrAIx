  hobbies: '[''Sketching'', ''Digital illustration'', ''Creative writing (short stories, poetry)'', ''Reading fantasy and contemporary poetry'', ''Journaling for mindfulness'', ''Acoustic guitar playing'',
    ''Nature walks/hiking'', ''Board games with close friends'', ''Volunteering at the local library'', ''Cooking simple meals for family'']'
  career_goals: Ashley plans to obtain her GED within the next year and then enroll in a community‑college program focused on art therapy or social work. Her long‑term ambition is to become a certified
    art therapist or youth counselor, blending her artistic talents with her deep desire to help others and promote emotional well‑being. She dreams of eventually opening a small community art studio in
    Montevallo where she can teach drawing, crafts, and mindfulness‑based art workshops to peers, especially those coping with stress or anxiety. Alongside this, she hopes to travel occasionally to experience
    new art scenes and bring fresh ideas back to her hometown.
