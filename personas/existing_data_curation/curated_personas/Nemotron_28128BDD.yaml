  career_goals: Sixta dreams of becoming a bilingual elementary school teacher who can blend her love for languages, storytelling, and structured lesson plans. She envisions creating a classroom where every
    child feels heard and where cultural celebrations are part of everyday learning. She also hopes to volunteer at community centers to organize youth activities, and occasionally imagines helping animals
    as a future veterinarian, reflecting her practical desire to make a tangible difference.
