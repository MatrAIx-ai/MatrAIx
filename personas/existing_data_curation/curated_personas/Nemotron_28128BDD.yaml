personas:
  professional: A budding game creator, Sixta Carrasco blends their love for Minecraft world-building with early coding skills in Scratch, crafting simple interactive stories while juggling school homework
    and the need to keep their sticker-filled notebook organized.
  sports: A spirited junior soccer enthusiast, Sixta Carrasco plays midfield for the Sunrise Soccer Club in the Saturday kids league, cheers for the city's professional team the River City Tigers, and uses
    their love of rhythmic dancing to improve footwork on the field.
  arts: A vibrant performing-arts aficionado, Sixta Carrasco dazzles friends with salsa and cumbia moves learned at family gatherings, stars in their school drama club's productions of The Wizard of Oz,
    sketches comic strips inspired by Stan Lee's Marvel heroes, and draws creative energy from watching performances by the dance troupe Salsa Kings, listening to the pop hits of Bad Bunny, and admiring
    the animation of Hayao Miyazaki.
  travel: An adventurous young explorer, Sixta Carrasco has toured the nearby historic museum and a weekend beach camp, dreams of visiting the tropical rainforests of Costa Rica, the towering castles of
    Scotland, and a future trip to the Disney World resort, and they meticulously pin each destination on a world map poster in their room.
  culinary: A budding kitchen helper, Sixta Carrasco assists their mother in shaping golden arepas with cheese, loves the sweet contrast of strawberry-filled crepes, experiments with avocado toast for breakfast,
    and often trades homemade chocolate chip cookies with classmates after school.
  core: A lively ten-year-old, Sixta Carrasco balances a vibrant love for dance, coding, and soccer with a quirky habit of collecting stickers for every notebook, a tendency to forget to water houseplants,
    and a relentless drive to be the spotlight's center, all while they proudly claim the title of class entertainer.
background:
  cultural: Sixta's family maintains strong Colombian roots; they speak Spanish at home, celebrate holidays such as Dia de la Independencia and Carnaval de Barranquilla, and enjoy traditional foods like
    empanadas and bandeja paisa. Growing up in Astoria, she blends Colombian customs with the multicultural vibe of Queens, attending local Latin festivals and interacting with a diverse neighborhood. Her
    upbringing values family closeness, respect for elders, and an appreciation for both Colombian and American cultures, shaping her identity as a proud, bilingual child.
