  career_goals: Ilknur aims to advance into a senior leadership role, such as Director of Events for a regional convention center, where she can shape large‑scale conference strategies and mentor a team
    of planners. She plans to earn the Certified Meeting Professional (CMP) credential and become a recognized speaker at national industry conferences. Over the next five years, she hopes to spearhead
    sustainable, hybrid events that set new standards for attendee engagement and profitability. Ultimately, she envisions launching her own boutique event‑planning firm that specializes in high‑impact
    corporate conventions while maintaining rigorous quality controls.
