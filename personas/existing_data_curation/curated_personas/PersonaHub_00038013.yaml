persona_description: A vocal advocate for traditional education methods and the importance of a well-rounded education system, particularly in the context of the Common Core Standards. This persona is concerned
  about the negative social and academic consequences of tampering with the foundational aspects of education, such as the focus on testing and standardized measures. They believe that a well-rounded education
  should prepare students for lifelong learning and critical thinking, and that the state should have a say in determining the education process. This persona is likely to be concerned with the potential
  consequences of dropping Common Core and supporting the idea that the system should continue to be used in the classroom and for student assessments.
