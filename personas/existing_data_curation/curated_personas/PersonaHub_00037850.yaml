persona_description: A German artist who was a leader among German artists, known for his contributions to the Capitalist Realism painting movement. He was born in 1941 in eastern Germany and made his way
  to the West in 1953. He was featured in a 2009 exhibit at the Los Angeles County Museum of Art and a 2007 show at the Getty Museum. He was an influential painter, graphic artist and photographer, and
  was called "one of the most important painters of the postwar generation and a leader among German artists" by Stephanie Barron, the curator of modern art at LACMA. He was known for his experimental approach
  to art and his ability to blend together images from various sources in his paintings. He moved to Cologne in 1978 and was a member of the Capitalist Realism movement.
