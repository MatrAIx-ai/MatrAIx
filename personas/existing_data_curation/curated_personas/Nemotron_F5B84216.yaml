personas:
  professional: An aspiring young engineer, Daniel Simmons spends his afternoons sketching LEGO skyscrapers and leading his friends in methodical building projects, demonstrating they are organized, reliable,
    and thrive on routine while rehearsing leadership skills for future community design work.
  sports: An enthusiastic basketball player, Daniel Simmons competes in the Columbia Youth Hoops Club, idolizes the South Carolina Gamecocks men’s basketball team, follows the Columbia Fireflies baseball
    season, and approaches each practice with the same competitive edge they bring to their LEGO builds.
  arts: A gospel choir enthusiast, Daniel Simmons sings during Sunday church rehearsals, admires the music of Kirk Franklin and Mary Mary, devours adventure and science‑fiction series like "Percy Jackson,"
    and they let their imagination guide storytelling at block parties.
  travel: A curious explorer, Daniel Simmons has visited historic Charleston and Savannah on family trips, dreams of seeing the National Air and Space Museum in Washington, D.C., and prefers itineraries
    that blend guided tours of cultural festivals with relaxed evenings at local ice‑cream parlors, where they can unwind after a busy week.
  culinary: A budding home‑chef, Daniel Simmons enjoys making mac and cheese with extra cheddar and bacon, loves the sweet tang of peach cobbler after church potlucks, and often attempts to recreate their
    favorite LEGO‑inspired snacks using pre‑made dough and colorful sprinkles, showcasing they love blending creativity with food.
  core: Daniel Simmons is a routine‑loving, sociable eight‑year‑old who balances competitive basketball and LEGO engineering with a keen eye on savings, occasional health‑neglect, and a deep love for gospel
    music and community gatherings, all while they worry about staying organized.
background:
  cultural: Daniel grows up in a tight‑knit Black community in Columbia, South Carolina, where family gatherings, church events, and neighborhood block parties are central to daily life. His family places
    a high value on education, respect for elders, and community service, traditions that are reinforced through Sunday school lessons and local cultural festivals. The rich musical heritage of Southern
    gospel and the prominence of basketball in his neighborhood shape his interests, while the emphasis on discipline and perseverance common in his cultural environment fuels his organized and reliable
    nature.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''LEGO construction'', ''Basketball fundamentals'', ''Organizing group activities'', ''Singing in church choir'']'
  hobbies: '[''Playing basketball'', ''Building LEGO sets'', ''Reading adventure books'', ''Singing in church choir'', ''Collecting baseball cards'', ''Participating in school talent shows'']'
  career_goals: Although only eight, Daniel envisions a future where he can combine his love of structure, leadership, and community service. He dreams of becoming a school principal or a youth program
    director, roles that would let him create organized, supportive environments for other kids. He also imagines himself as a professional basketball player who can mentor young athletes, and occasionally
    daydreams about joining the local fire department to serve his neighborhood with the same reliability he shows at school.
