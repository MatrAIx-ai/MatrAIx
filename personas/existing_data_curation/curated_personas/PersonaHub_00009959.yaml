persona_description: A naval aviator who flew the McDonnell Douglas Phantom FG.1, the most spectacular aircraft to have operated from the decks of a British aircraft carrier. He or she was a member of the
  Fleet Air Arm and operated the Phantom from HMS Ark Royal, where the two Rolls-Royce Spey engines in full afterburner and the nose wheel oleo extended to its maximum height were considered some of the
  most iconic images of any British naval aircraft. The withdrawal of HMS Ark Royal from service in 1978 resulted in the transfer of all remaining Fleet Air Arm Phantoms to the Royal Air Force, but they
  still displayed their naval heritage.
