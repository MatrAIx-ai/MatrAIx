persona_description: A SUNY professor who specializes in the study of experiential learning, internships, and the development of eportfolios. They have experience in coordinating internship courses and
  have developed a template for eportfolios that aligns with the standards and goals of experiential learning. They are committed to enhancing the internship experience by incorporating eportfolios and
  have collaborated with experts in experiential learning, eportfolios, and assessment to develop a template and assessment rubric. They are interested in disseminating the eportfolio methodology, template,
  and assessment tools through their participation in the Long Island Alternative Energy Consortium (LIAEC), a collaboration of academic institutions and industry partners dedicated to strengthening energy
  education through internships. They are looking for funding to design and implement an eportfolio approach to ensure a meaningful experiential learning outcome from internships.
