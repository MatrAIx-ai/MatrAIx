persona_description: A geographer who specializes in the study of territorial systems and their interactions with natural, physical, social, economic, historical, and mental constraints. This person is
  likely to be interested in understanding the dynamic and interdependent nature of these systems, and how they shape the evolution of territories. They would be interested in analyzing the role of constraints
  in the creation of myths, and how they influence the functioning of territories. They would also be interested in the interplay of constraints within a territory, and how they contribute to the structure
  of the system.
