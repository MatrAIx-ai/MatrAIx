personas:
  professional: Juan Coto is a budding robotics enthusiast who leverages their love for structure by meticulously building and programming competition-ready bots, yet they stay relaxed about deadlines,
    often juggling club meetings with spontaneous gaming sessions that sharpen their strategic thinking.
  sports: Juan Coto dominates the local park as a forward for the River Walk Rangers soccer club, roots for the LA Galaxy in MLS and the Dallas Cowboys in the NFL, and channels the same competitive drive
    into weekend bike rides along the River Walk while occasionally cheering on their favorite esports teams in Rocket League.
  arts: Juan Coto devours Marvel comic books and graphic novels, binge‑watches Studio Ghibli animated films and the series 'Adventure Time', and channels their creative spark into sketching LEGO designs,
    all while humming along to Imagine Dragons and listening to the melodic beats of Billie Eilish.
  travel: Juan Coto’s travel style mixes family‑friendly road trips to nearby state parks with day‑long bike excursions along the River Walk, while they dream of visiting Disneyland and exploring the ancient
    ruins of Machu Picchu, balancing a modest allowance with a craving for both adventure and relaxation.
  culinary: Juan Coto is a junior kitchen helper who expertly dices fresh cilantro, crushes ripe avocados for guacamole, and assembles sizzling beef tacos and fragrant tamales, showcasing a budding culinary
    skill set that blends family‑recipe tradition with a love for bold, flavorful ingredients.
  core: Juan Coto blends a love for structured robotics and competitive gaming with a laid‑back approach to schedules, a knack for spontaneous taco‑making, and a habit of misplacing the occasional school
    assignment amid weekend bike rides.
background:
  cultural: Juan Miguel was born and raised in San Antonio, Texas, in a Mexican-American family that preserves strong cultural ties to Mexico. At home, Spanish is spoken alongside English, and he celebrates
    Mexican traditions such as Día de los Muertos, Cinco de Mayo, and family gatherings centered on foods like tacos, tamales, and pozole. He attends a bilingual public school, where he experiences a blend
    of Mexican heritage and broader Texan culture. Community events at Market Square and local festivals reinforce his sense of identity, while his daily life reflects a mix of Mexican family values—respect
    for elders, communal support, and celebratory cuisine—and the diverse, multicultural environment of modern San Antonio.
