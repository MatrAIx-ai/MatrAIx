  career_goals: Looking ahead, Juan Miguel aims to combine his competitive drive with his practical talents. In the short term, he wants to become captain of his middle-school soccer team and earn a spot
    on the varsity squad at his high school, ultimately securing an athletic scholarship. He also hopes to win a regional robotics competition, which would open doors to a future in engineering. Long-term,
    he envisions a career that blends sports and technology—either as a sports-technology engineer developing equipment and performance-tracking software, or as a video-game developer creating soccer-themed
    games. He is determined to pursue higher education while maintaining his bilingual advantage, aspiring to be a role model for younger members of his community.
