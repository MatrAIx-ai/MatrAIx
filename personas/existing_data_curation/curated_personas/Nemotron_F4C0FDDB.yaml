  hobbies: '["Fishing", "Community theater", "Playing blues guitar", "Board game nights", "Volunteering at local food bank", "Woodworking", "Hiking in Porcupine Mountains", "Gardening", "Reading technology
    and history books", "Mentoring youth in STEM"]'
  career_goals: At 71, Christopher aims to stay professionally engaged by serving as a senior consultant for regional development initiatives that improve digital connectivity and sustainable tourism in
    Ontonagon County. He plans to mentor a new generation of project managers, especially those from underrepresented backgrounds, through workshops at the local community college. He hopes to author a
    guide titled “Practical Project Management for Small‑Town Teams,” marrying systematic methods with flexible, community‑centric practices. Additionally, he seeks a board position with a local nonprofit
    that supports STEM education for youth, allowing him to blend his expertise with his commitment to harmony and community service.
