  career_goals: Although she is no longer in the formal workforce, Carmaleta’s ambitions center on staying independent, healthy, and connected to her community. She aims to document her family’s recipes
    and oral histories in a small handwritten memoir to pass on to future generations. She hopes to volunteer occasionally at the local senior center, offering cooking demonstrations and helping peers learn
    basic smartphone skills. Additionally, she wishes to continue learning through community college lectures on genealogy and African‑American history, enriching her sense of identity and purpose.
