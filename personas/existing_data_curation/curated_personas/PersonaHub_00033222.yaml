persona_description: A psychologist and neuroscientist who specializes in the study of brain plasticity, particularly the role of the arcuate fasciculus in predicting musical ability. Her research interests
  include the structural and functional properties of the brain, particularly in the context of music learning and rehabilitation. She has conducted research in Barcelona, Spain, using neuroimaging techniques
  to study the relationship between the arcuate fasciculus and musical performance. Her work has been funded by European Regional Development Fund (ERDF) and Auditory Cognitive Neuroscience Network–Erasmus
  Mundus.
