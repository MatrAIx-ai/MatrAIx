personas:
  professional: Michael Britt is a seasoned residential and mixed‑use real‑estate broker who leverages three decades of market‑analysis, valuation, and negotiation expertise to guide clients through California’s
    complex regulations, while mentoring junior agents and maintaining a structured, data‑driven approach that balances diligent organization with the flexibility needed for client relationships.
  sports: Michael Britt enjoys a regular 9‑hole round at the San Jose Country Club each weekday morning, follows the San Jose Sharks with fervent loyalty, supports the San Francisco Giants during the baseball
    season, and belongs to a local hiking group that meets for trail runs in the Santa Cruz Mountains, combining low‑impact cardio with networking on the greens.
  arts: Michael Britt cultivates his creative side by photographing the mid‑century modern façades of the homes he sells, drawing inspiration from Ansel Adams and Edward Hopper, while regularly attending
    performances by the San Jose Symphony and listening to classic folk tunes by Neil Young and Joni Mitchell, which shape his appreciation for nuanced storytelling in both art and real‑estate.
  travel: Michael Britt favors leisurely road trips to nearby wine regions such as Napa and Sonoma, has a bucket‑list destination of the Italian countryside in Tuscany, frequently revisits the historic
    streets of San Francisco for its architecture, and plans quarterly weekend getaways to Yosemite National Park to balance his love of nature with his desire for structured itineraries.
  culinary: Michael Britt relishes farm‑to‑table cuisine, often preparing grilled salmon with dill, roasted heirloom carrots, and a quinoa‑ and avocado salad seasoned with fresh basil and lemon zest, while
    pairing meals with a crisp Sonoma Chardonnay, though he occasionally over‑spices his risotto in an attempt to impress dinner guests.
  core: Michael Britt blends disciplined real‑estate acumen with a garden‑tending habit, a love for modest social gatherings, and a persistent worry that drives meticulous planning, all while allowing himself
    the occasional indulgent golf club purchase.
background:
  cultural: Michael grew up in a middle‑class, white American family of German‑Irish heritage in the Midwest before moving to California in his late twenties to pursue a real‑estate career. He embraces
    mainstream American values—hard work, community service, and family loyalty—while appreciating the cultural diversity of Silicon Valley. His upbringing emphasized punctuality, polite discourse, and
    respect for tradition, which inform his professional conduct and personal interactions. Michael celebrates holidays such as Thanksgiving, Independence Day, and Christmas with his spouse and extended
    family, and he actively participates in local civic groups, reflecting both his heritage and his commitment to the multicultural fabric of Santa Clara.
