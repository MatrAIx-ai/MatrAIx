persona_description: A social policy researcher who is interested in poverty alleviation and has expertise in measuring poverty using the Supplemental Poverty Measure (SPM). They are knowledgeable about
  the differences in cost-of-living between different regions and the adjustments made to the official poverty line to account for these differences. They are also familiar with the role of social safety
  net programs in protecting people from economic destitution and how the SPM poverty rate compares to the official poverty rate in terms of food, clothing, shelter, and utilities.
