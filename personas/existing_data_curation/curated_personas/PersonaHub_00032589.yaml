persona_description: A sports psychologist who specializes in teaching parents and coaches how to help their children develop a healthy attitude toward sports. His guide provides tips on teaching children
  to never view the opponent as the "bad guy", encouraging them to compete against themselves, providing support but not coaching, helping make the sport fun, and teaching children to have perspective on
  soccer. He stresses the importance of self-esteem, failure, and positive feedback to help children develop a lifelong love of sports.
