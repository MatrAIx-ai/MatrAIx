  career_goals: Crystal aims to advance into a supervisory role where she can leverage her organizational strengths and mentoring instincts. In the next two to three years, she plans to become a team lead
    for a customer support unit, overseeing a small group of representatives and ensuring consistent service quality. She also intends to earn a certification in IT Support or Business Analysis to transition
    into a technical solutions specialist position that better aligns with her STEM background. Long‑term, she seeks a stable leadership position that offers predictable hours, opportunities for professional
    development, and the ability to foster a collaborative, supportive workplace culture.
