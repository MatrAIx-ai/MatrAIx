personas:
  professional: Claudia Ortega is a senior development strategist at a major cultural nonprofit, merging her flair for imaginative storytelling with meticulous project management, leveraging bilingual fluency
    to broaden donor bases, and applying her compassionate conflict‑resolution style to nurture lasting donor relationships.
  sports: Claudia Ortega hikes the Santa Monica Mountains with the Santa Monica Hiking Club on Saturday mornings, attends Los Angeles Lakers basketball games and Los Angeles Dodgers baseball outings when
    possible, and blends cardio and culture by joining a community salsa dancing class that doubles as her weekly workout.
  arts: Claudia Ortega devotes evenings to exploring avant‑garde exhibitions at the Getty Center and MOCA, sketches abstract compositions inspired by Yoko Ono, Banksy, and contemporary Mexican muralists,
    and regularly attends theater productions of Lin‑Manuel Miranda's works and Alejandro González Iñárritu's film screenings.
  travel: Claudia Ortega favors immersive cultural travel, having explored Mexico City’s historic center, Kyoto’s temples, and Barcelona’s modernist architecture, she plans a future trip to Oaxaca’s Guelaguetza
    festival, and often takes weekend road trips to Santa Barbara and Joshua Tree while balancing travel costs with her budget.
  culinary: Claudia Ortega embraces cooking traditional Mexican dishes, mastering mole poblano, chiles en nogada, and hand‑made guacamole, using ingredients like fresh chilies, corn masa, and heirloom tomatoes,
    demonstrates a confident yet occasionally over‑zealous seasoning style, and enjoys hosting dinner parties where food becomes a shared artistic experience.
  core: Claudia Ortega fuses a vivid artistic imagination with disciplined fundraising expertise, channels her stress into yoga and salsa, worries about deadlines, yet never skips a weekend art opening.
background:
  cultural: Claudia is a first‑generation Mexican‑American whose family maintains strong ties to Mexican traditions while embracing the multicultural fabric of Los Angeles. She grew up celebrating Día de
    los Muertos, Virgen de Guadalupe festivities, and cooking family recipes, all of which instilled a deep sense of community, familial responsibility, and respect for cultural heritage. Bilingual fluency
    allows her to navigate both English‑dominant professional environments and Spanish‑speaking community networks. Her cultural identity influences her work ethic, collaborative spirit, and passion for
    supporting arts and social causes that honor and uplift the Latinx community.
