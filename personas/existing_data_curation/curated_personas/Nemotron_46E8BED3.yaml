  hobbies: '[''Painting'', ''Visiting Art Galleries'', ''Theater and Live Performances'', ''Reading Contemporary Fiction and Philosophy'', ''Attending Lectures and Workshops'', ''Salsa Dancing'', ''Cooking
    Mexican Cuisine'', ''Community Volunteering'', ''Hiking in the Santa Monica Mountains'', ''Yoga and Meditation'']'
  career_goals: Claudia aims to advance to a senior director role in development for a major cultural nonprofit, such as an art museum or community arts center, where she can lead large-scale, innovative
    fundraising initiatives that integrate technology and immersive experiences. She is committed to mentoring emerging PR professionals, expanding equity-focused donor programs for underrepresented communities,
    and securing sustainable financial resources for artistic and educational projects. Additionally, she plans to pursue a graduate certificate in nonprofit leadership to deepen her strategic impact while
    developing healthier stress-management practices.
