  career_goals: Although retired, David aims to stay actively engaged in his community. He plans to expand his role as a mentor for younger volunteers, document and preserve the history of Columbus through
    a local oral‑history project, and take on a leadership position in the town's senior advisory council. He also hopes to travel to several national parks and historic sites, and eventually compile his
    family’s genealogy into a memoir for future generations.
