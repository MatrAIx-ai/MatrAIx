    [They exchange numbers and then continue walking and talking for a while longer.]


    [They eventually reach the end of the park and say goodbye.]

    User 1: It was nice meeting you, TheBestPlayerNA.

    User 2: It was nice meeting you too, GamerGirl1234.

    User 1: Maybe we can hang out again sometime.

