  hobbies: '[''Reading mystery and historical fiction'', ''Knitting scarves and blankets'', ''Gardening vegetables and herbs'', ''Birdwatching from the backyard'', ''Solving crossword puzzles and sudoku'',
    ''Canning and preserving seasonal produce'', ''DIY home improvement projects'', ''Listening to classic rock and folk music at home'', ''Journaling personal reflections'', ''Experimenting with new recipes'']'
  career_goals: Although not currently part of the formal workforce, Hailey aims to translate her practical expertise into modest, home‑based ventures and personal milestones. She plans to obtain a GED
    to formalize her education, launch a small business selling homemade preserves and handcrafted items, and enter local gardening competitions to test her competitive drive. Hailey also aspires to become
    a trusted community resource for budgeting advice, publish a blog on minimalist home organization, and volunteer as a mentor for at‑risk youth on life‑skills. Learning basic Spanish to communicate with
    her spouse's extended family and achieving greater financial independence through smart savings and investments are additional long‑term goals.
