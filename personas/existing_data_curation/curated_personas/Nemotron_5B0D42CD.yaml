personas:
  professional: Marlena is an aspiring young inventor who builds elaborate LEGO creations, sketches imaginative contraptions, and conducts simple science experiments, channeling their curiosity and practical
    mindset into independent problem-solving while their relaxed, solitary nature steers them away from group projects.
  sports: Marlena is a member of the Sunnyvale Kids Soccer Club, where they compete in Saturday morning practices and love watching the local high school Eagles football team on weekends, preferring short
    bursts of activity over long-duration games.
  arts: Marlena loves drawing animals inspired by Beatrix Potter, humming the catchy tunes of The Wiggles while building LEGO scenes, and is fascinated by Walt Disney's animated movies such as Moana, letting
    those creative influences shape their imaginative play.
  travel: Marlena enjoys weekend trips to nearby state parks such as Redwood Forest where they collect rocks and leaves, dreams of seeing Japan's cherry blossoms in Kyoto, and prefers spontaneous, low-budget
    outings over meticulously planned vacations.
  culinary: Marlena prefers simple comfort foods like cheesy macaroni, peanut butter-jelly sandwiches, and carrot sticks with hummus, can assemble fruit kebabs with grapes, banana slices, and strawberries
    all by themselves, and delights in occasional family pizza nights featuring pepperoni and pineapple.
  core: Marlena is a quietly confident six-year-old who transforms solitary curiosity into elaborate LEGO inventions, competitive puzzles, and meticulous nature collections, while habitually misplacing
    their sketch pencils and tossing away instructions.
background:
  cultural: Marlena was raised in Goshen, Indiana, a small Midwestern community with strong ties to agriculture and local family traditions. Her family background reflects the typical white Midwestern heritage
    of German and Irish ancestry, emphasizing modesty, self‑reliance, and a practical outlook on life. Community events such as county fairs, church gatherings, and school activities shape her sense of
    belonging, yet her preference for solitude leads her to find comfort in the quiet corners of the library, the backyard, and her personal creative projects.
