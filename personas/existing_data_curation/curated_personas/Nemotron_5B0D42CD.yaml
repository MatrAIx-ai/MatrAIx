  career_goals: Marlena imagines a future where she designs her own inventions that help protect the environment, such as a simple water‑filtering device for the garden. She is eager to enter science fairs
    and hopes to win awards for her projects, seeing competition as a way to prove her ideas. Although still very young, she talks about becoming an engineer or inventor who can work independently in a
    quiet lab, turning her curiosity and practical mindset into real‑world solutions.
