  hobbies: '[''Gardening'', ''Vietnamese Cooking'', ''Tai Chi'', ''Hiking'', ''STEM Mentorship Volunteering'', ''Poetry Reading'', ''Analog Photography'', ''Classical Music Listening'', ''Journaling'']'
  career_goals: He aims to become department chair within the next five years, leading a curriculum redesign that embeds interdisciplinary projects linking engineering with sustainability. He aspires to
    secure a federal teaching‑oriented grant to develop an open‑source lab kit for community colleges, publish a textbook on digital signal processing, and expand his mentorship program for first‑generation
    college students. Additionally, he hopes to increase student retention and mental‑health support within his department.
