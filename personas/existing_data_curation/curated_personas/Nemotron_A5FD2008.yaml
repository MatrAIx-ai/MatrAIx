personas:
  professional: Cong Ho, a seasoned electrical engineering professor specializing in circuit design and digital signal processing, leverages meticulous curriculum planning and hands‑on lab modules while
    embracing a flexible teaching style that accommodates unexpected classroom dynamics and prioritizes student mentorship.
  sports: Cong Ho, a 45‑year‑old avid hiker, spends weekends trekking the Watchung Reservation and the Appalachian Trail, occasionally joins community soccer pick‑up games with the local club, and follows
    the New York Giants and New Jersey Devils, using leisurely runs as a stress release.
  arts: Cong Ho, a dedicated participant in community poetry nights and street‑photography excursions, admires the work of Ansel Adams and Vivian Maier, and finds solace listening to piano recordings by
    Ludovico Einaudi and the symphonies of Tchaikovsky.
  travel: Cong Ho, an enthusiastic explorer of natural and cultural sites, has trekked to Ha Long Bay, enjoyed the cherry blossoms in Kyoto, dreams of hiking New Zealand's Southern Alps, and balances travel
    plans with family commitments and a modest travel budget.
  culinary: Cong Ho, an enthusiastic home cook, often prepares phở broth, bánh xèo, and lemongrass‑infused grilled chicken while experimenting with garden‑fresh herbs like cilantro and Thai basil, yet sometimes
    leaves dishes unfinished because of a scattered schedule.
  core: Cong Ho, a compassionate engineering educator and backyard gardener, balances a love for structured mentorship with occasional disorganization, constantly wrestles with worry, and seeks harmony
    through tai chi, vintage photography, and modest culinary experiments.
background:
  cultural: Cong Ho is a first‑generation Vietnamese‑American, raised in a close‑knit immigrant family that emphasized respect for elders, community harmony, and academic achievement. His parents instilled
    values of collectivism, humility, and hard work, while also preserving Vietnamese language and customs through home celebrations, traditional food, and participation in local Vietnamese cultural festivals
    in New Jersey. These cultural roots shape his compassionate teaching style, his dedication to supporting first‑generation students, and his appreciation for structured yet flexible approaches in both
    personal and professional life.
attributes:
  skills: '[''Electrical Engineering'', ''Applied Physics'', ''Curriculum Development'', ''Laboratory Instruction'', ''Educational Technology Integration'', ''Student Mentorship'', ''Grant Writing'', ''Conflict
