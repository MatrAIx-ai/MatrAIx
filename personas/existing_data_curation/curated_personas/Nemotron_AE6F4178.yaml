  career_goals: Rebecca aims to leverage her technical background and supervisory experience to move into a regional retail operations management role within the next three to five years, where she can
    oversee multiple stores and drive large‑scale efficiency initiatives. She aspires to become a subject‑matter expert in data‑driven retail strategy, implementing predictive inventory models and AI‑enabled
    customer‑insight tools. Long‑term, she envisions a senior leadership position—such as Director of Operations or Chief Retail Innovation Officer—where she can shape company‑wide policies that blend operational
    excellence with creative merchandising. She also plans to earn Lean Six Sigma Green Belt certification and complete an MBA with a focus on supply chain analytics to broaden her strategic toolkit.
