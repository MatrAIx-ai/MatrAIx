personas:
  professional: Rebecca Harmon, a 28‑year‑old first‑line retail supervisor at a regional hardware chain, merges her STEM training and Lean Six Sigma mindset with a painter’s eye for visual merchandising,
    using advanced Excel, SQL, and SAP Retail to forecast inventory and streamline staff schedules while curating store displays that echo the soft hues of her watercolor landscapes.
  sports: Rebecca Harmon, a quiet enthusiast of early‑morning trail hikes with the Garden City Trailblazers club, follows the Detroit Tigers at the ballpark during summer, catches Red Wings games occasionally,
    and keeps a low‑key fitness regimen centered on yoga and brisk walks along the Huron River trail.
  arts: Rebecca Harmon, a watercolor aficionado who spends weekends emulating the soft palettes of John Singer Sargent, collects vintage Miles Davis vinyl, and frequents the Detroit Institute of Arts to
    study Diego Rivera’s murals and attend contemporary photography exhibitions, weaving these inspirations into her own visual merchandising concepts.
  travel: Rebecca Harmon, a methodical planner who maps out solo weekend getaways using a spreadsheet, has trekked the Great Lakes shoreline, booked a fall road trip to the Upper Peninsula, and dreams of
    exploring Kyoto’s temple gardens and Iceland’s geothermal lagoons once financially secure.
  culinary: Rebecca Harmon, an amateur chef who cultivates basil, thyme, and lavender in her backyard, enjoys crafting herb‑infused quinoa bowls and perfecting a lemon‑rosemary grilled salmon, while indulging
    in a Saturday ritual of sipping cold brew coffee with a slice of homemade apple‑cinnamon crumble.
  core: Rebecca Harmon, a data‑driven retail leader with a painter’s soul, balances relentless efficiency with solitary creativity, often skipping social gatherings to stay in the studio, and hoards vintage
    jazz records in a closet‑turned‑archive.
background:
  cultural: Rebecca was raised in Garden City, a suburban community in Wayne County, Michigan, surrounded by Midwestern values of hard work, reliability, and modesty. Her white, middle‑class upbringing
    included typical American traditions such as Thanksgiving family gatherings, Fourth of July celebrations, and community festivals. Growing up near Detroit, she was exposed to the region’s industrial
    heritage as well as its vibrant arts scene, which sparked her appreciation for visual art and music. While her community is relatively homogenous, the proximity to Detroit’s diverse population has given
    her an awareness of multicultural influences and a respect for different perspectives. These experiences have shaped a cultural identity that blends practical Midwestern sensibility with a curiosity
    for artistic expression and technological innovation.
