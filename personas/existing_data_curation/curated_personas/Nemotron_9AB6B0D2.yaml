  hobbies: '["Gardening (vegetables and flowers)", "Cooking and baking", "Reading historical fiction", "Volunteering at the local library and senior center", "Walking her dog", "Crocheting and needlework",
    "Visiting local museums and historical sites", "Hiking in nearby state parks", "Yoga and mindfulness practice"]'
  career_goals: Cindy aims to re‑engage with her community through part‑time volunteer leadership, such as helping to plan the annual town fair or assisting at the senior center. She intends to enroll in
    a short digital‑literacy course to boost her confidence with online tools and financial tracking. Long‑term, she hopes to launch a modest home‑based business selling preserves, jams, and baked goods,
    blending her culinary talent with a supplemental income. She also plans to adopt regular low‑stress practices like yoga and mindfulness workshops to better manage her worry and enhance emotional well‑being.
