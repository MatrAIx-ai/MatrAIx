persona_description: A materials engineer with expertise in the selection and evaluation of materials for oxygen systems, focusing on flammability, ignition, and combustion properties. They have a deep
  understanding of the compatibility of materials with cryogenic temperatures, ease of fabrication, assembly, and cleaning. They are familiar with the various factors that affect material selection in oxygen
  systems, including material properties related to design and operating conditions, and the property changes that occur at cryogenic temperatures. They are likely to have a strong background in engineering
  and have a keen interest in ensuring the safety and reliability of oxygen systems.
