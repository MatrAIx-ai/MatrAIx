    leadership and staff training'', ''creative problem solving'']'
  hobbies: '[''visiting art galleries and museums'', ''photography (industrial and nature)'', ''woodworking'', ''Arduino and 3D-printing projects'', ''cycling'', ''hiking in Texas Hill Country'', ''playing
    chess'', ''reading science and technology books'', ''cooking family meals'', ''attending live jazz and blues concerts'']'
  career_goals: Charles aims to advance from his current first-line supervisory role to a plant-manager or senior operations-director position within the next five to seven years. To support this progression,
    he plans to acquire a Lean Six Sigma Black Belt and pursue a Master of Business Administration or a master’s degree in industrial engineering, expanding his strategic and financial expertise. He is
    driven to lead large-scale sustainability and automation initiatives, integrating advanced robotics and IoT technologies while fostering a culture of continuous improvement and employee empowerment.
    Additionally, he seeks opportunities to mentor emerging talent, champion cross-functional collaboration, and apply his appreciation for art and unconventional thinking to innovation projects that differentiate
    his facility in a competitive market.
