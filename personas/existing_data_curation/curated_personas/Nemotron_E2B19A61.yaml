  hobbies: '[''Painting'', ''Photography'', ''Crafting enrichment toys'', ''Gardening native plants'', ''Hiking'', ''Reading poetry and wildlife literature'', ''Yoga'', ''Journaling'', ''Attending community
    art events'', ''Volunteer work at animal rescues'']'
  career_goals: Earnestine aims to deepen her expertise by completing an associate’s program in wildlife rehabilitation and obtaining certification as a wildlife rehabilitator. She hopes to lead an animal
    enrichment program at a larger zoo, develop community education workshops that combine art and conservation, and eventually establish a nonprofit sanctuary focused on rescued native species in Florida.
    She also aspires to use her compassion and creative skills to advocate for animal welfare policies at the state level.
