  hobbies: '[''Reading chapter books'', ''LEGO building and design'', ''Nature walks and rock collecting'', ''Journaling observations'', ''Playing piano'', ''Baking simple recipes'', ''Drawing animals and
    landscapes'', ''Watching educational TV shows'', ''Using kid-friendly coding apps'', ''Small‑group craft projects at school/library'']'
  career_goals: Deborah’s long‑term career ambition is to work with animals, reflecting her love of nature and her practical curiosity about how living beings function. She frequently says she wants to
    become a veterinarian or a wildlife rehabilitator, where she can apply her methodical approach to caring for injured animals. At the same time, she enjoys sharing knowledge, so she also imagines herself
    as an elementary school teacher or a community librarian, helping other children discover books and explore the outdoors. She dreams of designing and building a sustainable treehouse in her backyard
    as a stepping‑stone project, showcasing her blend of creativity and practical planning. Ultimately, Deborah hopes to combine her organizational strengths, compassion, and love of learning into a profession
    that lets her make a tangible difference in her community.
