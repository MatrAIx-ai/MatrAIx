persona_description: A scientist who specializes in the study of ancient human genetics, particularly the relationship between Neanderthals and modern humans. He is a member of the Cambridge University
  team that published the study, which challenges the prevailing view that modern humans replaced Neanderthals with little or no gene flow. He is skeptical of the hybridization theory proposed by his colleague
  David Reich, who is an exponent of this theory. He is interested in the genetic similarities between Neanderthals and modern humans and their possible origin. He is likely to be a researcher in the field
  of human genetics or paleogenetics.
