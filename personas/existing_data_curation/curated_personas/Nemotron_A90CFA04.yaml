  career_goals: Even at three, Alexander is drawn to roles that combine order and caregiving. He often talks about wanting to be a firefighter or a teacher later in life, hoping to keep people safe, guide
    younger children, and maintain a tidy environment. His ambitions reflect a future desire to help his community, organize spaces, and make a positive impact through service.
