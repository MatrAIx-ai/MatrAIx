persona_description: A regulatory professional with expertise in soil and sediment sampling methodologies, specifically in the application of Incremental Sampling Methodology (ISM) for sampling potentially
  contaminated sites. They are interested in improving the reliability and defensibility of sampling data by reducing data variability and are looking for training and guidance on the fundamental concepts
  of soil/contaminant heterogeneity, representative sampling, sampling/laboratory error, and how ISM addresses these concepts. They are also interested in learning about the impact of laboratory processing
  on soil samples and how to evaluate ISM data and make decisions.
