personas:
  professional: Martha Peters, an 81‑year‑old retired horticulturist with a flair for the arts, channels their lifelong curiosity and competitive edge into leading informal watercolor workshops for seniors,
    volunteering as a docent at the local historical society, and compiling an illustrated memoir of their family’s genealogy for the community library.
  sports: Martha Peters stays active by strolling through the local botanical garden five times weekly with the senior walking group, birdsong as their soundtrack, while cheering on the Miami Heat during
    basketball season and the Tampa Bay Buccaneers in fall, and they also participate in low‑key community bridge tournaments that double as mental‑fitness drills.
  arts: Martha Peters blends watercolor depictions of the Florida shoreline with acrylic mixed‑media collages inspired by the bold colors of Georgia O’Keeffe, while their playlist of vintage jazz legends
    like Ella Fitzgerald and Louis Armstrong fuels choir rehearsals of hymns on Sundays, and they collect early‑20th‑century postcards that spark storytelling sessions at the senior center.
  travel: Martha Peters plans their art pilgrimages with a mix of meticulous ticket‑booking for the Met in New York and the Getty in Los Angeles and spontaneous weekend getaways to regional festivals such
    as the Sarasota Art Crawl, often traveling by car with their granddaughter for joint museum tours, while they balance a limited fixed income with budget‑conscious accommodations.
  culinary: Martha Peters delights in whipping up roasted citrus‑glazed carrots and heirloom tomato bruschetta from their garden harvest, perfecting lemon‑infused key lime pie crusts with fresh graham crackers,
    and they enjoy brewing organic Earl Grey tea with a splash of fresh mint, while their modest culinary skill level keeps them to simple, wholesome meals seasoned with rosemary, basil, and a pinch of
    smoked paprika.
  core: Martha Peters, an 81‑year‑old garden‑loving storyteller, balances a fierce competitive streak at bridge and bingo with whimsical spontaneity that leads them to drop by friends for tea, collect vintage
    postcards, and craft watercolor memories, all while they occasionally misplace their glasses and forget appointments.
background:
  cultural: Martha was born in 1944 in a small town in Georgia and grew up during the post-World War II era, absorbing the values of Southern hospitality, self-reliance and a close-knit church community.
    Her family attended a Baptist congregation, where hymns, fellowship and community service became core parts of her upbringing. In the 1960s she moved to central Florida, drawn by the promise of a warmer
    climate and new opportunities. Over the decades she has blended her Southern roots with the eclectic, multicultural vibe of Polk County, where Caribbean and Latin influences subtly color the local cuisine
    and music. She identifies as a white American with a deep respect for traditional family ties, but her lifelong curiosity has led her to embrace a broad range of artistic and cultural experiences, from
    classic American folk art to contemporary international exhibitions.
