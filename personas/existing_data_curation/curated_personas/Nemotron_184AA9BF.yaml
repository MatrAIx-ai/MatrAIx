  career_goals: Even though she is officially retired, Martha aspires to leave a lasting imprint on her community. She plans to compile her memoirs and family history into a small illustrated book that
    can be donated to the local library. She hopes to lead informal art workshops for seniors, sharing her love of painting and craft while encouraging participants to experiment with unconventional techniques.
    Volunteering as a docent at the Auburndale historical society is another ambition, allowing her to blend her research skills with public storytelling. Ultimately, she wants to stay mentally active,
    continue learning about new artistic movements, and travel to at least two major art museums each year – perhaps the Met in New York and the Getty in Los Angeles.
