personas:
  professional: Jonathan Moesle is a seasoned landscaping specialist with over two decades of experience designing drought‑tolerant gardens and hardscapes across the desert Southwest, blending a curiosity
    for native succulents with pragmatic problem‑solving, leading small crews with cooperative encouragement tempered by assertive direction, and they often improvise around tight deadlines due to a spontaneous,
    low‑structure work style.
  sports: Jonathan Moesle plays weekly for a community soccer team called the Desert Strikers, roots for the Vegas Raiders and the Golden Knights, and they maintain their fitness through regular hikes in
    Red Rock Canyon, preferring low‑key, steady activity over high‑intensity gym sessions.
  arts: Jonathan Moesle channels their artistic side through desert landscape photography, drawing inspiration from Ansel Adams and Edward Burtynsky, while they also attend local cultural festivals that
    feature traditional musicians such as Los Lonely Boys and explore vibrant street murals in the Downtown Arts District.
  travel: Jonathan Moesle favors spontaneous weekend getaways to nearby natural wonders like the Grand Canyon, Sedona, and Zion National Park, and they dream of a longer cultural immersion trip to Montevideo,
    balancing travel excitement with a modest budget and family responsibilities.
  culinary: Jonathan Moesle enjoys medium‑skill home cooking, frequently preparing pupusas, yuca frita, and tamales using heirloom vegetables from their garden, relishing ingredients like corn masa, fresh
    chilies, and panela cheese, yet they sometimes overindulge in fried dishes that challenge their health‑conscious aims.
  core: Jonathan Moesle is a pragmatic yet curious desert landscaper who mixes spontaneous creativity, occasional disorganization, and a love for community soccer, photography, and traditional cooking into
    a uniquely balanced life, and they constantly seek harmony between work and personal passions.
background:
  cultural: Jonathan’s Salvadoran heritage shapes his identity and daily life. Raised in a bilingual household, he speaks both Spanish and English fluently and maintains close ties with his extended family
    in El Salvador and the Salvadoran diaspora in Henderson. Family gatherings are marked by traditional music, dance, and foods that he often prepares himself. This cultural background influences his work
    ethic—valuing hard work, loyalty, and community support—and inspires him to incorporate vibrant, tropical plant palettes into his designs when appropriate. He also volunteers with community outreach
    programs that teach basic gardening and landscaping skills to recent immigrant families and local youth.
attributes:
  skills: '[''Plant selection and care'', ''Irrigation design and installation'', ''Hardscape construction (pavers, retaining walls)'', ''Equipment maintenance and repair'', ''Site assessment and soil preparation'',
    ''Project coordination'', ''Client communication'', ''Team leadership'', ''Sustainable landscaping practices'', ''Budget estimation'']'
  hobbies: '[''Backyard gardening'', ''Cooking Salvadoran cuisine'', ''Hiking'', ''Landscape photography'', ''Tool restoration'', ''Community soccer (small group)'', ''Attending local cultural festivals'',
    ''Reading about sustainable horticulture'']'
  career_goals: Jonathan aims to advance to a crew‑supervisor role within his current landscaping firm, eventually launching his own niche business that focuses on drought‑tolerant and native‑plant designs
    for homeowners in the Las Vegas area. He plans to enroll in a horticulture certification program to deepen his expertise in sustainable landscaping and low‑water techniques. Beyond professional growth,
    he wants to mentor younger workers, especially those from the Salvadoran community, and build a stable, family‑supporting income while preserving the flexibility to pursue personal projects and community
    involvement.
