personas:
  professional: Linda Corley, a retired humanities scholar with a knack for archival research and genealogical investigation, channels their methodical precision and love of solitary study into crafting
    a multi-generational family memoir while they volunteer as a docent at the Louisville Museum of History and mentor budding researchers.
  sports: Linda Corley enjoys gentle walks through Cherokee Park as their primary fitness routine, attends Louisville Bats baseball games with their book club friends, and they cheer the Kentucky Wildcats
    during March Madness, preferring low-impact activity over competitive sports.
  arts: Linda Corley immerses themselves in classic jazz by listening to Billie Holiday and Duke Ellington while they read Dickens and Austen, and frequently attends local performances of folk singer Joan
    Baez and the Louisville Symphony, letting the music inspire their intricate knitting patterns and quilting projects.
  travel: Linda Corley plans their travel meticulously, favoring short, restful trips to historic towns like Savannah, Georgia and Williamsburg, Virginia, as well as a well-organized pilgrimage to the Smithsonian
    museums in Washington, D.C., while they dream of a future family-guided tour of the British countryside's literary landmarks.
  culinary: Linda Corley delights in baking traditional Southern pastries such as pecan pie, peach cobbler, and buttery biscuits, often incorporating fresh garden herbs like thyme and rosemary, and their
    competent kitchen skills allow them to host small tea-time gatherings where they serve these treats alongside a cup of Earl Grey.
  core: Linda Corley is a meticulous, curiosity-driven octogenarian who blends scholarly rigor with Southern hospitality, yet they frequently worry about the future, hoard yarn for every season, and record
    each family story with exacting detail for posterity.
background:
  cultural: Linda was born and raised in Louisville, Kentucky, into a family of German‑American ancestry. Growing up during the Great Depression and World War II fostered a strong sense of frugality and
    resilience, while the Southern hospitality and tight‑knit community values of Kentucky shaped her emphasis on kindness, cooperation, and respect for tradition. Her upbringing in a Protestant church
    reinforced a commitment to service and harmony. She proudly embraces Louisville’s cultural heritage—from the iconic Kentucky Derby and horse‑racing lore to the city’s historic architecture—and often
    incorporates local customs into her life, such as cooking bourbon‑infused dishes and attending community festivals. Her graduate education in the arts and humanities deepened her appreciation for literature,
    history, and cultural preservation, aligning with the region’s emphasis on storytelling and memory.
