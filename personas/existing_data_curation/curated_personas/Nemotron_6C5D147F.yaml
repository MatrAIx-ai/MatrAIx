personas:
  professional: Clyde Mack, a seasoned property assessor with over forty years of experience, blends meticulous GIS mapping and financial analysis with a creative, community-focused mindset, and they mentor
    junior appraisers while championing equitable tax practices through clear, data-driven reports and empathetic advocacy.
  sports: Clyde Mack enjoys early-morning fishing on Lake Hancock, keeps fit with low-impact Tai Chi classes at the senior center, follows the Tampa Bay Buccaneers and Orlando Magic with fervor, and they
    volunteer as a scorekeeper for the local community baseball league during spring.
  arts: Clyde Mack frequents the Polk County Art Museum to view exhibitions by artists like Romare Bearden and Jacob Lawrence, spends weekends painting historic homes and photographing street murals, and
    they find inspiration in live performances by blues legend B.B. King and jazz saxophonist Kamasi Washington.
  travel: Clyde Mack prefers thoughtfully planned trips that combine cultural immersion and relaxation, such as a recent road-trip to New Orleans for its jazz heritage, a family visit to Savannah's historic
    district, and a future pilgrimage to the civil-rights Trail in Montgomery, and they balance travel costs with a modest pension.
  culinary: Clyde Mack delights in cooking Southern comfort dishes like shrimp étouffée, collard greens with smoked pork, and cornbread seasoned with jalapeño, often sourcing fresh okra and sweet potatoes
    from their own garden, and they enjoy occasional outings to a downtown soul-food bistro for their signature sweet potato pie.
  core: Clyde Mack is a curious, community-oriented elder who melds analytical rigor with artistic expression, and they navigate anxiety through mindfulness while championing equitable property practices.
background:
  cultural: Clyde is a Black Floridian whose formative years were shaped by the Civil Rights movement in the Deep South. Raised in a close‑knit family that emphasized faith, education, and community service,
    he carries forward traditions of gospel music, Southern cooking, and oral storytelling. He remains deeply connected to Mulberry's African‑American community, actively participating in church events,
    Juneteenth celebrations, and Black History Month programs. His experiences navigating systemic challenges inform his dedication to equitable property assessment and civic advocacy. Proud of his heritage,
    Clyde often shares stories of his ancestors' resilience with his grandchildren, preserving cultural memory while fostering intergenerational bonds.
attributes:
  skills: '[''Property Valuation'', ''GIS Mapping (ArcGIS)'', ''Financial Analysis'', ''Report Writing'', ''Public Speaking'', ''Mentoring'', ''Zoning & Land Use Knowledge'', ''Negotiation'', ''Technology
