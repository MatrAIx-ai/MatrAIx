  hobbies: '[''Visiting art galleries and craft fairs'', ''Watercolor painting'', ''Quilting'', ''Gardening (heirloom tomatoes and herbs)'', ''Home‑canning and recipe experimentation'', ''Hiking Uwharrie
    National Forest trails'', ''Reading historical fiction'', ''Singing in church choir'', ''Volunteering in community events'']'
  career_goals: Debra aims to advance to a supervisory role within her plant, such as shift supervisor or quality assurance lead, where she can apply her methodical mindset to improve process efficiency
    and mentor newer workers. She plans to obtain a Certified Food Safety Manager credential and to lead a lean‑manufacturing initiative that reduces waste. Beyond her career, she hopes to launch a small
    home‑based business selling artisanal preserves and pickles, blending her culinary curiosity with artistic packaging design. She also aspires to volunteer as a facilitator for community art workshops,
    sharing her appreciation for creativity with local youth.
