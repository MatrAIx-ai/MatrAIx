  career_goals: Tyler aims to move from frontline delivery to a logistics coordination role within a technology‑driven transportation firm, where he can apply his analytical background to improve fleet
    efficiency. He plans to earn a professional certification in supply chain management and eventually lead a fleet operations team. Long‑term, he envisions launching his own startup that leverages AI‑based
    route optimization for urban deliveries, merging his curiosity for new ideas with his pragmatic operational experience.
