  career_goals: Ricardo aspires to advance to a senior executive role such as Chief Information Officer or Director of Digital Innovation within the next five years. He aims to lead large‑scale digital
    transformation projects that integrate emerging technologies like AI and IoT, while improving operational efficiency and user experience. Additionally, he plans to complete a bachelor's degree in Business
    Administration to solidify his strategic acumen and eventually launch a consultancy that helps midsize companies bridge technology and creative design.
