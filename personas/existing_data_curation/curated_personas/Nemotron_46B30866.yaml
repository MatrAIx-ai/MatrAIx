personas:
  professional: Ricardo Velasquez, a seasoned IT operations leader with fifteen years steering corporate technology strategy, leverages their curiosity for contemporary art to pioneer creative, user‑centric
    digital solutions while mentoring teams with a blend of disciplined planning and flexible innovation.
  sports: Ricardo Velasquez balances their love for the Detroit Tigers and Detroit Lions with weekly trail runs along the Great Lakes shoreline and membership in the Michigan Shoreline Hikers Club, while
    occasionally joining pickup basketball games at the local community center during summer.
  arts: Ricardo Velasquez, an avid visitor of Grand Rapids' ArtPrize and Detroit Institute of Arts, draws inspiration from Ai Weiwei, Kara Walker, and the immersive installations of Olafur Eliasson, while
    also curating personal photo essays of urban street scenes that echo the mood of Wes Anderson’s cinematography.
  travel: Ricardo Velasquez plans their vacations with a mix of meticulous research and spontaneous detours, favoring weekend hikes on Mackinac Island, a summer road trip through the Porcupine Mountains,
    and longer sojourns to Amsterdam’s canal district and the vibrant street food markets of Mexico City.
  culinary: Ricardo Velasquez experiments in the kitchen by deconstructing classic cochinita pibil into a sous‑vide pork taco topped with chipotle‑infused avocado mousse and pickled red onion, pairing it
    with micro‑green cilantro and achiote‑spiced corn tortillas that showcase their blend of traditional Mexican flavors and modernist techniques.
  core: Ricardo Velasquez is a 42‑year‑old tech strategist whose artistic curiosity fuels a disciplined yet flexible approach to work, finance, and life, marked by a penchant for meticulously budgeted investments,
    occasional health neglect, and a love for hiking, photography, and avant‑garde cuisine.
background:
  cultural: Ricardo was raised in a Mexican immigrant family in the Midwest, maintaining strong ties to his heritage through language, food, and community celebrations. He grew up speaking Spanish at home
    and celebrates holidays like Día de los Muertos and Cinco de Mayo with family and local cultural groups in Westland. His upbringing instilled a deep appreciation for Mexican art, music, and cuisine,
    which he blends with his curiosity for contemporary creative expressions. He remains connected to the Mexican community in Wayne County through volunteer work at cultural events and tutoring bilingual
    youth in basic computer skills.
