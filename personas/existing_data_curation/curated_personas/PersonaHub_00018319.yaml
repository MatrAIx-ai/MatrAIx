persona_description: A gardener who is passionate about growing plants in containers, especially in late winter when the climate is chilly and wet. The gardener has experience with large wooden containers
  like raised beds or wine barrel planters, and prefers to use them for early seeds. The gardener is skilled at preparing the soil, replenishing it with compost, and covering it with a moisture-retaining
  material. The gardener is also experienced in planting seeds, thinning them, and harvesting the plants. The gardener is interested in buying or making mini greenhouses, and is knowledgeable about managing
  the health of plants under mini greenhouses.
