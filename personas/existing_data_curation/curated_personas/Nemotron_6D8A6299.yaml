  career_goals: Andrew aims to become a senior safety engineering leader within the next five years, targeting a Director of Health & Safety role at a major manufacturing firm in the Rust Belt. He plans
    to earn his Professional Engineer (PE) license and achieve a Six Sigma Black Belt to deepen his expertise. Long‑term, he envisions launching a consultancy that helps mid‑size manufacturers transition
    to safer, more sustainable operations. He also seeks to mentor emerging engineers, contribute to industry standards through societies such as ASME and the American Society of Safety Professionals, and
    balance career growth with a strong family life.
