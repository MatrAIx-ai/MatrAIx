personas:
  professional: Andrew Burnette is a methodical industrial engineer specializing in occupational health and safety, leveraging Six Sigma Green Belt expertise, advanced CAD modeling, and Python-driven data
    analysis to drive lean process improvements while leading cross‑functional teams with a pragmatic, deadline‑driven style.
  sports: Andrew Burnette competes in a local recreational basketball league, logs weekly runs for community 5K events, hikes the rugged trails of Ohiopyle State Park each summer, and passionately supports
    the Pittsburgh Steelers, Penguins, and Pirates, often tailgating at Heinz Field and wearing the team colors as a reminder of community pride.
  arts: Andrew Burnette strums acoustic guitar at family gatherings, often playing songs by John Denver, Bruce Springsteen, and Pittsburgh folk singer David Larkin, attends the Pittsburgh Symphony Orchestra’s
    spring concerts, and hosts board‑game nights featuring titles such as Catan and Ticket to Ride, reflecting their blend of musical nostalgia and interactive storytelling.
  travel: Andrew Burnette plans weekend road trips that balance adventure and family time, having explored Ohiopyle’s waterfalls, visited the historic breweries of Cleveland, and dreamed of hiking the Canadian
    Rockies, while their budget‑conscious approach leads them to prioritize off‑season travel deals and use Airbnb for weekend stays.
  culinary: Andrew Burnette loves crafting their own IPAs with Cascade hops, savoring classic Primanti sandwiches piled with coleslaw and french fries, perfecting homemade pepperoni pizza with fresh mozzarella
    and basil, and often experimenting with smoked brisket in their backyard smoker, showcasing their penchant for hearty, flavor‑rich Mid‑Atlantic cuisine.
  core: Andrew Burnette is a pragmatic safety engineer who blends a structured work ethic with a sociable love for football, craft beer, and hands‑on hobbies, while they occasionally overindulge in home‑brewed
    hops and meticulously plan every detail.
background:
  cultural: Andrew was raised in Pittsburgh’s Allegheny County, a city shaped by its steel‑mill legacy and a strong sense of community. His family’s roots trace back to European immigrant neighborhoods,
    fostering an appreciation for hard work, reliability, and local traditions such as the Primanti sandwich and regional festivals. Growing up amidst the city’s transition from heavy industry to tech and
    healthcare, he developed a pragmatic outlook and a commitment to safety and innovation. His cultural influences include a love for the city’s sports teams, participation in neighborhood volunteer events,
    and a balanced emphasis on family stability and social engagement.
