persona_description: A game developer who is passionate about creating indigenous gaming platforms and is dedicated to supporting indigenous education in New Zealand and beyond. The developer is interested
  in using Maori cultural codes and Toi graphics, sounds, characters, tribal tattoos, and indigenous challenges in the game. The developer wants to use Katuku Island as a platform to bring cultural literacy
  to a technological platform that uses Maori Toi graphics, sounds, characters, tribal tattoos, and indigenous challenges. The developer is also interested in collecting quantitative and qualitative data
  to better understand the learning journey and move players forward to create better social and economic outcomes.
