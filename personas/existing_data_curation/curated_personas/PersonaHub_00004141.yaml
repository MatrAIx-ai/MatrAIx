persona_description: A teacher who is experienced in implementing guided reading in upper elementary classrooms. The teacher is skilled in assessing student reading levels, forming flexible reading groups,
  providing individual and group support while reading, and facilitating discussions and writing activities after reading. The teacher is knowledgeable about the features and components of guided reading,
  including the importance of applying focus strategies to the reading process, and the role of other students in independent reading. The teacher is interested in learning more about guided reading and
  has a passion for supporting students in their reading development.
