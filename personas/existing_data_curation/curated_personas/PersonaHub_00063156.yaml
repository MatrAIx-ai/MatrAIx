persona_description: A researcher or public health expert who is interested in the effectiveness of breast cancer screening programs and their impact on mortality statistics. They are likely to be familiar
  with the Oxford region's mortality statistics prior to the implementation of the National Health Service Breast Screening Programme in 1988. They are also aware of the 20% relative reduction in mortality
  from breast cancer in women invited to screening and the need for improvements in treatment and technological advancements in mammographic screening. They are interested in the evaluation of the effectiveness
  of mammographic screening programs and the impact of screening on breast cancer mortality at the population level over an observation period of almost 40 years.
