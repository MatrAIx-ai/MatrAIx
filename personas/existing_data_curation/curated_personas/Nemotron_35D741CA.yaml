personas:
  professional: Jarrett Brown applies five years of CNC machining and programming experience, coupled with a curiosity for emerging manufacturing technologies, to optimize multi‑axis production while fostering
    a collaborative, lean shop floor, and they are actively pursuing senior process engineering credentials and Industry 4.0 certifications to eventually lead a family‑run precision machining shop.
  sports: Jarrett Brown supports the Kansas City Chiefs with regular trips to Arrowhead Stadium, tracks the Missouri Tigers basketball schedule, and participates in the local Clinton Lake anglers' club,
    while also joining a weekend hiking group that explores the Flint Hills prairie trails.
  arts: Jarrett Brown channels his creative energy into custom furniture making, 3D‑printed art pieces, and frequent visits to the Kauffman Center for the Performing Arts to enjoy jazz concerts featuring
    the Mariachi Magnifico ensemble, and they unwind by listening to classic rock icons like The Eagles while polishing new wood projects.
  travel: Jarrett Brown favors road‑trip adventures that blend hands‑on learning with relaxation, having driven to the Missouri Ozarks for trout fishing, trekked Badlands National Park, and dreaming of
    attending the Industry 4.0 expo in Stuttgart and a manufacturing tour at Tokai University in Japan, all while balancing travel costs within the family’s financial plan.
  culinary: Jarrett Brown enjoys moderate cooking skills, often grilling freshly caught catfish with a Kansas City dry rub, smoking brisket ribs using oak planks, and experimenting with spice‑infused wood‑smoked
    vegetables, while savoring craft coffee from a local roastery and treating themselves to a hearty bowl of homemade chili on chilly evenings.
  core: Jarrett Brown is a practical, curiosity‑driven CNC specialist who balances workshop tinkering with community mentorship, family fishing weekends, and a steadfast plan to turn precision machining
    into a family business.
background:
  cultural: Jarrett grew up in a middle‑class, white Midwestern family in the Kansas City metro area. His upbringing emphasized hard work, reliability, and community involvement, common values in the heartland.
    Family gatherings often featured backyard barbecues and local sports talk, reinforcing a sense of regional pride. He identifies with Midwestern cultural norms such as modesty, practicality, and a collaborative
    spirit, which influence both his personal and professional life. He maintains connections to local churches and civic groups, reflecting a tradition of volunteerism and mutual support typical of his
    cultural background.
attributes:
  skills: '[''CNC programming (G‑code)'', ''Operation of 3‑axis and 5‑axis CNC mills and lathes'', ''CAD/CAM software (Fusion 360, Mastercam)'', ''Interpretation of engineering drawings and blueprints'',
    ''Tool selection and setup'', ''Process optimization and tool‑path efficiency'', ''Lean manufacturing and continuous‑improvement practices'', ''Preventative maintenance and troubleshooting'', ''Metallurgy
    basics (material properties, heat‑treatment)'', ''Mentoring and training of junior shop floor staff'']'
  hobbies: '[''Woodworking and furniture making'', ''3D printing and rapid prototyping'', ''Fishing at Clinton Lake'', ''Hiking prairie trails'', ''Attending Kansas City Chiefs football games'', ''Volunteering
    at a community makerspace teaching CNC basics'', ''DIY home improvement projects'', ''Reading technical journals on manufacturing technology'']'
  career_goals: Jarrett aspires to advance from a hands‑on CNC programmer to a senior process engineer or manufacturing supervisor within the next five years. He plans to pursue a bachelor’s degree in manufacturing
    engineering, earn certifications in advanced CNC control (e.g., Siemens Sinumerik) and Industry 4.0 integration, and lead initiatives that introduce automated data collection and predictive maintenance
    on the shop floor. Ultimately, he hopes to combine his technical expertise with his collaborative style by managing a team that delivers high‑quality parts while maintaining a safe, supportive work
    culture. He also entertains the long‑term ambition of opening a small, family‑run precision machining shop that serves local aerospace and medical‑device firms.
