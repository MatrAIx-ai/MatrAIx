  career_goals: Frank aims to translate his analytical abilities into a career in data science or computational biology, ideally within a biotech startup or a research lab that values both practical outcomes
    and innovative thinking. Over the next two to three years he plans to secure an entry‑level data analyst position while preparing for a master’s degree in bioinformatics. He aspires to lead interdisciplinary
    projects that combine data‑driven insights with real‑world health applications, and eventually to mentor junior researchers, balancing his natural curiosity for new methods with a pragmatic focus on
    delivering measurable impact.
