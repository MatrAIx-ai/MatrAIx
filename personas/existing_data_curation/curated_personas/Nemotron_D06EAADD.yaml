personas:
  professional: Frank Deason, a 20‑year‑old undergraduate in a STEM program at the University of Michigan, leverages his proficiency in Python, R, and Arduino prototyping to tackle data‑driven biological
    problems while balancing a methodical, pragmatic approach that keeps projects grounded in real‑world impact.
  sports: Frank Deason, an avid hiker, frequents the Nichols Arboretum and Huron River trails, plays occasional pickup soccer with a campus club, and follows the Michigan Wolverines football and basketball
    teams, while also belonging to a local running group that meets for weekend runs around Ann Arbor.
  arts: Frank Deason, a landscape‑photography enthusiast, spends weekends capturing the fall colors along the Huron River, attends the Ann Arbor Art Fair to admire local painters, reads sci‑fi authors like
    Ted Chiang and Andy Weir, and listens to indie folk artists such as Bon Iver and Phoebe Bridgers while editing photos on a laptop.
  travel: Frank Deason, a budget‑conscious explorer, enjoys spontaneous day trips to nearby Michigan state parks, plans occasional weekend road trips to Chicago and the Upper Peninsula, dreams of backpacking
    through the national parks of the western United States, and uses a mix of travel apps and college student discounts to stretch limited funds.
  culinary: Frank Deason, who prefers simple yet wholesome meals, often cooks quinoa salads with roasted sweet potatoes, avocado, and locally sourced tomatoes from the farmers’ market, enjoys making grilled
    salmon with lemon and a side of German‑style potato salad at home, and occasionally treats himself to a cheese‑curd‑laden burger at a local joint.
  core: Frank Deason, a 20‑year‑old data‑science aspirant from the Midwest, blends quiet curiosity with a down‑to‑earth work ethic, often found coding on a Raspberry Pi while hiking a local trail.
background:
  cultural: Frank grew up in a middle‑class family in the Midwest, with German‑Irish ancestry that emphasized self‑reliance, education, and modest community involvement. The cultural values of practicality
    and humility typical of the region shaped his balanced outlook. Living in Ann Arbor has exposed him to a diverse academic environment at the University of Michigan, fostering an appreciation for cultural
    pluralism while retaining his Midwestern roots. He enjoys local traditions such as the Ann Arbor Art Fair and seasonal farmers’ markets, and he identifies with the region’s blend of earnest work ethic
    and openness to new ideas.
