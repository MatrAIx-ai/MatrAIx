  hobbies: '[''Herb gardening on the balcony'', ''Cooking traditional Mexican dishes at home'', ''Reading historical novels and folk tales (Spanish and English)'', ''Listening to Mexican folk music and
    food‑culture podcasts'', ''Knitting scarves and simple crafts'', ''Gentle hiking on local foothill trails'', ''Watching cooking shows for recipe inspiration'', ''Journaling personal reflections'', ''Participating
    in quiet community potlucks'']'
  career_goals: Karolina aims to expand her role in the kitchen by obtaining a ServSafe food safety certification and taking introductory culinary courses at a local community college. She hopes to transition
    from dishwasher to prep cook, eventually mastering traditional Mexican cooking techniques that she enjoys at home. Long‑term, she envisions starting a small home‑based business selling homemade salsas
    and herb mixes at local farmers' markets, blending her practical kitchen experience with her cultural culinary heritage while maintaining a flexible schedule that allows her to support her family.
