  career_goals: Although officially retired, Lynda aims to expand her impact on the local arts community. She plans to launch an intergenerational art program that pairs seniors with elementary‑school students,
    curate a traveling exhibition of senior artists’ work for community centers across Bexar County, and develop a small online gallery showcasing her own photography and that of fellow retirees. She also
    hopes to write and self‑publish a memoir‑style collection of oral histories from long‑time San Antonio residents, and to mentor younger volunteers in event planning and community outreach. Maintaining
    her emotional health through creative expression and staying physically active are central to her personal ambitions.
