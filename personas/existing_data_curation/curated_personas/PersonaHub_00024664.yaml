  his charitable work and his efforts to help the poor and the marginalized. He was a strong advocate for the principles of science and reason, and he believed that the Church should not intervene in the
  affairs of science. He was also known for his erudition and his love of literature, and he was a frequent visitor to the library of the Holy Office.
