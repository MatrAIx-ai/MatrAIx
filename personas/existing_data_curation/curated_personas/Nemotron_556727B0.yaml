  career_goals: Sylvia hopes to earn her GED within the next year and then enroll in a community-college program that offers a certification in community health work or youth counseling. She is drawn to
    roles that let her merge her love of people with tangible help, such as becoming a peer mentor at a local after-school center or working as a community outreach assistant. In the longer term, she imagines
    launching a small youth-focused event series in New Albany that provides safe, creative spaces for teenagers to explore music, dance, and entrepreneurship. Alongside these goals, she plans to build
    a modest online presence where she shares short, uplifting videos that combine lifestyle tips with messages of resilience, hoping to inspire other teens in her community.
