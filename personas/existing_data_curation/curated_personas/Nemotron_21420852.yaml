  hobbies: '[''Bird watching'', ''Raspberry Pi home lab projects'', ''Personal weather station'', ''Home automation'', ''Non‑fiction reading'', ''Scientific history'', ''Philosophy'', ''Long‑distance cycling'',
    ''Quiet coding meetups'']'
  career_goals: Frank aims to transition into a lead architect role within the next three years, where he can shape the technical direction of large‑scale systems while maintaining a hands‑on coding presence.
    He is interested in deepening his expertise in cloud‑native design and emerging technologies such as machine‑learning pipelines, with the long‑term ambition of spearheading a cross‑functional team that
    builds data‑driven products for the financial services sector. At the same time, he values work‑life balance and seeks positions that allow for remote or hybrid work, giving him the quiet environment
    he thrives in. He also plans to earn an AWS Certified Solutions Architect – Professional certification and to publish a technical article on performance optimization in micro‑services.
