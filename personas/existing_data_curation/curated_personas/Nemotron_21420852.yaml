  skills: '[''Java'', ''Kotlin'', ''Python'', ''Spring Boot'', ''Django'', ''RESTful API design'', ''Micro‑services architecture'', ''AWS'', ''Azure'', ''Docker'', ''Kubernetes'', ''Jenkins'', ''CI/CD'',
