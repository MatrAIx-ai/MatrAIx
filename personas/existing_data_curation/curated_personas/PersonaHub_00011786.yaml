persona_description: A policy analyst who is responsible for developing and implementing strategies to ensure the security and resilience of the nation's energy infrastructure. This person has experience
  working with the Department of Energy and has a deep understanding of the vulnerabilities of the Northeast's energy supply due to its location along U.S. coasts. They are well-versed in the concepts of
  regional refined petroleum product reserves and have experience with emergency withdrawals from the Northeast Home Heating Oil Reserve during major storms like Superstorm Sandy. They are also familiar
  with the Department of Energy's broader commitment to enabling a more secure and resilient energy infrastructure.
