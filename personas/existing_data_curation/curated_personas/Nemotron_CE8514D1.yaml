  hobbies: '[''gardening (native azaleas, hummingbird feeding)'', ''birdwatching'', ''reading historical fiction'', ''genealogy research'', ''quilting'', ''knitting'', ''low‑impact yoga'', ''volunteering
    at community health fairs'', ''small book‑club'']'
  career_goals: In the next few years Jennifer aims to transition from full‑time management to a senior advisory role, where she can mentor upcoming health administrators and guide her organization’s adoption
    of tele‑health services for the aging population of the Lowcountry. She also hopes to champion flexible work policies that reduce staff stress, and to lead a community‑based health education program
    that improves chronic disease management among local seniors. Ultimately, she wants to leave a legacy of compassionate, resilient care delivery that balances innovation with practical sustainability.
