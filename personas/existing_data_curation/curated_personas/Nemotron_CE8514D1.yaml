personas:
  professional: Jennifer Stone, a veteran health services manager with three decades of experience, blends meticulous budgeting and regulatory compliance expertise with a relaxed, improvisational leadership
    style that favors staff wellbeing over rigid planning, while mentoring junior managers and championing tele‑health adoption for aging patients.
  sports: Jennifer Stone enjoys low‑impact fitness, attending weekly yoga classes at the Charleston Community Center, walking with the Lowcountry Nature Walkers club, and cheering for the Charleston Battery
    soccer team and the Carolina Panthers NFL team, while rarely participating in high‑intensity sports.
  arts: Jennifer Stone finds creative solace in quilting, knitting, and reading historical novels by Philippa Gregory and Bernard Cornwell, while also attending occasional performances by the Charleston
    Symphony Orchestra and listening to folk guitarist Doc Watson, which enrich her sense of heritage and relaxation.
  travel: Jennifer Stone prefers thoughtfully planned, low‑stress trips, favoring leisurely visits to historic coastal towns such as Savannah, Georgia, the Cotswold villages of England, and weekend getaways
    to the Great Smoky Mountains, though a dream to explore the gardens of Kyoto remains on their bucket list.
  culinary: Jennifer Stone enjoys cooking garden‑fresh meals, frequently preparing herb‑roasted chicken with a side of sautéed collard greens, peach‑glazed pork tenderloin, and buttermilk biscuits, while
    also indulging in sweet tea made from locally sourced honey; their cooking skill is comfortable, though they sometimes over‑season dishes in their enthusiasm.
  core: Jennifer Stone is a 72‑year‑old health administrator who balances a curiosity for new tech with a laid‑back, sometimes disorganized lifestyle, tending garden azaleas, quilting, and championing flexible
    senior care while worrying about details and occasionally overspending on hobbies.
background:
  cultural: Jennifer grew up in the Lowcountry of South Carolina, immersed in a traditional Southern culture that values hospitality, community service, and church fellowship. She identifies with the gentle
    rhythms of coastal life, enjoys Southern cooking—especially dishes like shrimp and grits and sweet tea—and maintains strong ties to her Methodist congregation. Her upbringing emphasized respect for
    tradition while also experiencing the social changes of the civil‑rights era, shaping a worldview that balances reverence for heritage with a practical curiosity about new ideas.
attributes:
  skills: '[''healthcare administration'', ''staff leadership'', ''budgeting and finance'', ''regulatory compliance (HIPAA, Medicare)'', ''quality improvement'', ''electronic health record (EHR) system
