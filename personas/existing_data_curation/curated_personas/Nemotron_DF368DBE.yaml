personas:
  professional: A budding wildlife researcher, Asherah Stehle spends weekends cataloguing birds in the woods, and they use their meticulous nature journal to record observations while applying problem‑solving
    skills from puzzles to design simple Scratch programs that model local ecosystems.
  sports: A nature‑oriented athlete, Asherah Stehle plays for the Franksville Youth Bird‑watching Club and occasionally joins the community’s co‑ed soccer team, while they cheer for the Green Bay Packers
    on game days and root for the Milwaukee Brewers during the baseball season, preferring low‑key, early‑morning runs through the nearby woods over loud gym classes.
  arts: An introspective artist, Asherah Stehle practices piano softly at home, favoring Debussy’s ‘Clair de Lune’ and Beethoven’s ‘Moonlight Sonata’, they build intricate LEGO mosaics inspired by Monet’s
    Water Lilies, and enjoy quiet evenings watching classic Disney animated films for their storytelling and visual style.
  travel: An organized explorer, Asherah Stehle prefers meticulously planned road trips with their family, having already visited Door County’s lighthouses, Milwaukee’s Lakeshore State Park, and a weekend
    getaway to Chicago’s Field Museum, while they dream of a future summer hike in the Great Smoky Mountains.
  culinary: A budding home chef, Asherah Stehle loves cooking farm‑to‑table meals like roasted beet salad with fresh garden carrots, homemade vegetable soup with thyme and garlic, and occasionally baking
    carrot‑apple muffins, and they often taste their rabbit’s greens for extra inspiration.
  core: Asherah Stehle is a quiet, methodical child whose curiosity about ecosystems fuels meticulous note‑taking, while they are prone to worry, driving careful planning and occasional over‑cautiousness
    that makes them both a reliable helper and a self‑critical perfectionist.
background:
  cultural: Asherah grew up in Franksville, a small community in Racine County, Wisconsin, where Midwestern values of modesty, self‑reliance, and community service are prominent. Her family participates
    in local traditions such as county fairs, seasonal festivals, and volunteer activities at the library and animal shelter. The region’s strong connection to agriculture and the nearby Great Lakes influences
    her appreciation for nature, gardening, and outdoor observation. While her heritage is primarily European‑American, she has been exposed to the area's German and Polish cultural traces, fostering a
    respect for diverse family histories and a balanced, practical outlook on life.
attributes:
  skills: '[''Organizational planning'', ''Advanced reading comprehension'', ''Basic Scratch coding'', ''Peer tutoring'', ''Animal care'', ''Quiet problem solving'']'
  hobbies: '[''Reading non-fiction'', ''Nature journaling'', ''Birdwatching'', ''Gardening'', ''Sketching'', ''Puzzles (jigsaw, Sudoku)'', ''Scratch programming'', ''Playing piano'']'
  career_goals: She dreams of a future where she can combine her compassion with her love of systematic work, aiming to become a veterinarian or a pediatric nurse. She wants a career that lets her help
    both people and animals while applying her scientific curiosity in a practical way. Asherah also imagines studying environmental science to contribute to wildlife conservation, hoping to attend a university
    known for strong STEM and health programs where she can continue her methodical study habits.
