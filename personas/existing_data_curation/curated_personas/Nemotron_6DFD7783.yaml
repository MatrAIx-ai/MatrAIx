  hobbies: '["Watercolor painting", "Art museum and gallery visits", "Book club (historical fiction, poetry, art criticism)", "Genealogy research", "Vegetable gardening", "Bridge (card game)", "Birdwatching",
    "Volunteer computer tutoring for seniors"]'
  career_goals: Although retired from formal employment, Mary aims to leave a lasting cultural imprint on her community. She plans to curate a traveling exhibition showcasing works created by senior artists
    from Hanover and neighboring towns, highlighting both traditional and experimental pieces. She also aspires to compile and self‑publish an oral‑history book that captures stories of longtime residents,
    integrating her genealogical research skills. Mary hopes to secure a modest grant to fund art workshops for teenagers, fostering intergenerational creativity. Continuing her personal learning, she intends
    to enroll in a series of community‑college courses on modern art theory and digital archiving, ensuring her expertise remains current. Ultimately, she seeks to become a trusted mentor and resource for
    both peers and younger community members interested in art, history, and lifelong learning.
