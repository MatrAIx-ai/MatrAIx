persona_description: A scientist who studies the impact of forest harvesting on headwater streams, focusing on quantifying the radiative inputs affecting these systems. This scientist is interested in understanding
  how the removal of tree canopy during timber harvest can lead to increased shortwave radiation reaching the stream surface, and how the recovery of riparian herbaceous vegetation cover may negate this
  effect. They are interested in measuring the contribution of incoming solar and thermal radiation in headwater systems, and analyzing the effect of riparian vegetation shading on stream temperature. The
  scientist is also interested in the role of topographical features, such as bedrock and shape, in determining the character and extent of herbaceous vegetation following harvesting events.
