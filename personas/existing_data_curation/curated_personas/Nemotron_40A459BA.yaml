personas:
  professional: Tyler Combs is a seasoned fast‑food veteran with over three decades of hands‑on service who leverages a culinary arts associate degree, a talent for troubleshooting fryers and point‑of‑sale
    systems, and a calm, personable demeanor to train new staff and keep rush‑hour chaos under control, while their curiosity drives occasional menu experiments and their pragmatic side ensures strict adherence
    to proven procedures, positioning them for a supervisory role and eventual part‑time consulting work.
  sports: Tyler Combs enjoys low‑impact fitness by joining the Sleeping Bear Dunes Trail Club for weekly guided hikes, casting a line on Lake Michigan’s near‑shore waters as a form of active relaxation,
    and cheering on the Detroit Lions during football season while also following the Michigan Wolverines, preferring gentle stretching and weekend fishing over high‑intensity workouts.
  arts: Tyler Combs curates a modest collection of classic vinyl that spins the likes of Bob Dylan, Joni Mitchell, and The Beatles on a vintage turntable, volunteers backstage at the Interlochen community
    theater to support productions such as 'Our Town', and regularly attends folk concerts featuring artists like Gillian Welch and the local Grand Traverse String Band, letting music and stagecraft shape
    their creative downtime.
  travel: Tyler Combs prefers relaxed, self‑driven road trips that combine fishing and scenic hiking, having spent summers angling on the Apostle Islands of Lake Superior and taking weekend getaways to
    Mackinac Island, they dream of a coastal cruise to the Gulf of Mexico to sample fresh seafood, but budget constraints and family commitments keep longer trips occasional and carefully timed around the
    off‑season.
  culinary: Tyler Combs enjoys cooking hearty, home‑cooked meals that showcase garden‑fresh tomatoes and heirloom beans, often preparing a slow‑cooked tomato‑basil pasta sauce, a classic bean chili seasoned
    with smoked paprika, and a perfectly seared Lake Michigan trout brushed with lemon‑herb butter, reflecting their solid culinary arts foundation and a pragmatic, no‑fuss cooking style that favors reliable
    recipes over experimental gastronomy.
  core: Tyler Combs is a pragmatic, curiosity‑driven fast‑food veteran who balances a love of fishing, woodworking, and classic vinyl with a perpetual worry about finances and health, often juggling a relaxed
    approach to obligations with a desire for flexible, low‑stress living.
background:
  cultural: Tyler grew up in a middle‑class, white, Midwestern family in rural Michigan, with ancestry tracing back to German and Finnish settlers who arrived in the Great Lakes region in the early 1900s.
    The values of hard work, self‑reliance, and community involvement are central to his upbringing. He celebrates traditional holidays with his extended family, enjoys local fairs and the annual Interlochen
    Summer Music Festival, and maintains close ties to his church and neighborhood volunteer groups. The cultural emphasis on modesty, practicality, and a love of the outdoors shapes his worldview and daily
    habits.
attributes:
  skills: '[''Customer service'', ''Cash handling'', ''POS system operation'', ''Food safety compliance'', ''Inventory management'', ''Staff training and mentorship'', ''Basic kitchen equipment maintenance'',
