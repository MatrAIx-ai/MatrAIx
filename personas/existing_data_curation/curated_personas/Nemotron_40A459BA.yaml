  hobbies: '[''Fishing'', ''Woodworking'', ''Vinyl record collecting'', ''Community theater backstage work'', ''Crossword puzzles'', ''Listening to folk and classic rock music'', ''Hiking'', ''Gardening'']'
  career_goals: Tyler aims to advance to a supervisory or management role at his restaurant within the next two years, using his extensive experience to lead a team and improve staff retention. He plans
    to obtain a Certified Food Manager credential and complete a short leadership course offered by the Michigan Restaurant Association. Ultimately, he hopes to transition into a part‑time consulting role,
    helping small eateries in Grand Traverse County streamline operations while maintaining a flexible schedule that allows more time for his wife and hobbies. He also wants to build a modest emergency
    fund to reduce the financial stress that often worries him.
