personas:
  professional: Jomar Barrozo, an aspiring senior network architect, transforms enterprise-grade networking projects into visual experiences by blending their Cisco/Juniper expertise, Python automation,
    and a flair for data visualization, all while methodically pursuing CCIE and AWS Solutions Architect certifications to lead AI-driven hybrid-cloud initiatives in the Lehigh Valley.
  sports: Jomar Barrozo, an avid solo hiker, spends weekends trekking the Blue Mountain trails while cheering on the Philadelphia Eagles and Philadelphia Flyers, and occasionally joins a local trail-run
    club for sunrise jogs that satisfy their competitive streak without the social drain of team sports.
  arts: Jomar Barrozo, a creator of generative digital art, draws inspiration from ambient pioneers like Brian Eno and experimental electronic composer Tim Hecker, while devouring speculative fiction by
    Ted Chiang and Octavia Butler, and curates a personal gallery of pixel art and 3D models that blur the line between technology and visual storytelling.
  travel: Jomar Barrozo, a solitary traveler, prefers meticulously planned solo trips to quiet destinations such as Kyoto’s artisan keyboard markets, Iceland’s volcanic landscapes for photography, and the
    Scottish Highlands for hiking, budgeting these adventures through savings and careful use of reward points while avoiding crowded festivals.
  culinary: Jomar Barrozo, an experimental home cook, enjoys crafting ramen broth infused with miso and kombu, experimenting with sous-vide vegetables, and pairing meals with craft coffee brewed from Ethiopian
    beans, yet occasionally orders takeout sushi when a new keyboard build consumes their kitchen time.
  core: Jomar Barrozo is a solitary, imagination-driven network specialist who channels competitive curiosity into artful tech projects, meticulous financial planning, and quiet adventures, while prudently
    managing health quirks and occasional social fatigue.
background:
  cultural: Jomar was raised by Puerto Rican parents who immigrated to Pennsylvania, making him fluent in both Spanish and English. Puerto Rican cultural rhythms—salsa, bomba, and reggaetón—fill his home,
    and family gatherings feature traditional dishes like mofongo and arroz con gandules, which he cooks with pride. He maintains strong ties to the island through virtual community groups, celebrates holidays
    such as Nochebuena and San Juan, and often incorporates Spanish idioms into his daily speech. This heritage fuels his appreciation for vibrant color palettes and rhythmic patterns, influencing both
    his artistic hobbies and his approach to designing network topologies that are both functional and aesthetically harmonious.
attributes:
  skills: '[''Network design'', ''Server administration'', ''Virtualization (VMware/Hyper‑V)'', ''Cloud infrastructure (AWS, Azure)'', ''Cisco and Juniper routing/switching'', ''PowerShell and Python scripting'',
    ''Network security and firewall management'', ''System monitoring (Nagios, Zabbix, Grafana)'', ''Technical documentation'', ''Creative data visualization'']'
  hobbies: '[''Generative digital art'', ''Mechanical keyboard building'', ''Speculative fiction reading and flash fiction writing'', ''Indie narrative-driven video games'', ''Ambient and experimental music
    listening'', ''Raspberry Pi IoT art projects'', ''Solo hiking in the Blue Mountain region'']'
  career_goals: Jomar aims to transition from a hands‑on administrator to a senior network architect who leads cutting‑edge infrastructure projects that blend technical rigor with creative problem solving.
    He is pursuing CCIE and AWS Solutions Architect certifications to validate his expertise. In the next five years, he hopes to spearhead a digital‑transformation initiative for a mid‑size organization
    in the Lehigh Valley, introducing AI‑driven network automation and resilient hybrid‑cloud designs. Ultimately, he envisions launching his own boutique consulting practice that specializes in aesthetically
    driven network solutions for arts‑focused venues and tech startups, while maintaining the independence he values.
