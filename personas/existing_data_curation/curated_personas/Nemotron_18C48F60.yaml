  career_goals: Shahida aims to progress from her current office clerk role to a supervisory or office manager position within the next three to five years, leveraging her extensive administrative experience
    and strong interpersonal skills. She is interested in earning a certification in office administration or event management to formalize her expertise. Long‑term, she envisions combining her love for
    art and community work by taking on a role in a cultural centre or museum where she can coordinate exhibitions, educational programs, and community outreach, while still maintaining a stable income
    to support her family. She also seeks to develop a supportive work environment that allows flexibility, helping her manage her anxiety and maintain her emotional well‑being.
