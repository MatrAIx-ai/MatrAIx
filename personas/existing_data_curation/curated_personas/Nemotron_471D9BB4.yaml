personas:
  professional: Jessica Myers, a meticulous housekeeping professional with a knack for green‑cleaning and digital task‑management, channels their disciplined, detail‑oriented nature into training new staff,
    streamlining schedules, and exceeding client expectations in both residential and boutique hotel settings.
  sports: Jessica Myers stays active by hiking Lake Erie trails, joining a community yoga class, and cheering on the Buffalo Bills and Erie SeaWolves, while they also play on a weekend intramural softball
    league that blends social fun with cardio fitness.
  arts: Jessica Myers expresses creativity through community dance classes and a blog featuring DIY décor, while they unwind listening to folk‑rock artist Brandi Carlile, classic Broadway numbers from the
    original Chicago cast, and attending seasonal fairs that showcase local artisans.
  travel: Jessica Myers prefers budget‑friendly road trips with friends, having already explored the Niagara Falls region and the historic streets of Boston, while they dream of a future solo hike through
    the Appalachian Trail’s Shenandoah segment, balancing adventure with limited student finances.
  culinary: Jessica Myers, an enthusiastic home cook, frequently whips up quick wholesome dishes such as quinoa‑lime salad with roasted sweet potatoes and lemon‑garlic salmon, while they also indulge in
    nostalgic comfort foods like chicken pot pie during family gatherings and savor seasonal farmer‑market finds like fresh apples and heirloom tomatoes.
  core: Jessica Myers blends a relentless love of organization with a contagious social spark, often juggling multiple cleaning schedules while secretly hoarding colorful post‑it notes for later DIY projects.
background:
  cultural: Jessica grew up in Erie County, Pennsylvania, in a middle‑class white American family that values hard work, reliability, and community involvement. Her upbringing reflects the practical, modest
    ethos typical of the Rust Belt region, with strong ties to local traditions such as seasonal fairs, church gatherings, and neighborly support. She embraces the area’s emphasis on self‑reliance and has
    been shaped by a blend of Midwestern and Northeastern cultural norms, including punctuality, straightforward communication, and a deep respect for personal and communal responsibility.
attributes:
  skills: '[''Residential cleaning'', ''Small‑business cleaning'', ''Detailed surface disinfection'', ''Laundry and fabric care'', ''Inventory management'', ''Time management and scheduling'', ''Customer
    service'', ''Team training and supervision'', ''Digital task‑management tools (e.g., Jobber, Housecall Pro)'', ''Green cleaning practices'', ''Health and safety compliance'']'
  hobbies: '[''Community dance classes'', ''Park clean‑up volunteering'', ''Hiking'', ''DIY home‑organization projects'', ''Cooking and baking'', ''Running a DIY‑decor blog'', ''Trivia nights'', ''Road
    trips with friends'', ''Seasonal fairs and community events'']'
  career_goals: Jessica aims to advance to a supervisory housekeeping role in a boutique hotel or upscale residential service within the next three years, and eventually launch her own eco‑friendly cleaning
    business. She plans to earn a Certified Professional Cleaner credential and complete a small‑business management certificate at a local community college. Her long‑term ambition is to set industry standards
    for organized, sustainable cleaning while mentoring other young workers and providing reliable, high‑quality service to her community.
