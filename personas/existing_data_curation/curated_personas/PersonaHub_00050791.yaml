persona_description: A researcher at the Indian Institute of Technology, Gandhinagar who specializes in studying the frequency and impact of extreme weather events in India due to climate change. The researcher
  has conducted a study that quantifies the risk of sequential extreme events like heatwaves and floods in India, and has found that the risk will increase significantly under the warming climate and variability
  in the El Nino-Southern Oscillation pattern. The researcher is likely to be interested in understanding the potential impacts of climate change on India's agricultural production, public health, and infrastructure.
