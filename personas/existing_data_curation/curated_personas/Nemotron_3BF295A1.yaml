  hobbies: '[''Hiking'', ''Kayaking'', ''Photography'', ''Playing guitar'', ''Civil War reenactments'', ''DIY wooden canoe building'', ''Reading popular science'', ''Board games'']'
  career_goals: Philip aims to become the regional director of recreation and tourism for Jefferson County, overseeing multiple historic sites and natural parks. He envisions creating a signature multi‑day
    heritage festival that fuses local history with modern interactive entertainment, expanding immersive technology offerings, and securing sustainable funding through public‑private partnerships. He plans
    to earn the Certified Park & Recreation Executive (CPRE) credential and mentor emerging recreation managers, while championing inclusive programs that promote community well‑being and environmental
    stewardship.
