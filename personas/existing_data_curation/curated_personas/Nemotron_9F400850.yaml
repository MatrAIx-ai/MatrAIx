  hobbies: '["Line dancing", "Senior tennis league", "Book club", "Animal shelter volunteering", "Community garden committee", "Cooking Mexican dishes", "Jigsaw puzzles", "Road‑trip travel with husband",
    "Gentle yoga", "Journaling", "Meditation workshops"]'
  career_goals: Although currently not part of the formal workforce, Kellie aims to channel her organisational talent into leadership roles within Austin’s nonprofit and civic sectors. Over the next five
    years she aspires to become a senior volunteer coordinator for the Austin Area Senior Center, join the board of a community arts organization, and launch a structured community‑garden initiative that
    supplies fresh produce to low‑income neighborhoods. She plans to earn a certificate in gerontology to deepen her expertise in senior services, mentor younger volunteers, and create measurable outcomes
    that satisfy her competitive drive while incorporating mindfulness practices to manage her emotional reactivity.
