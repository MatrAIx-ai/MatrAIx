persona_description: A historian or political scientist who is interested in the study of nationalism, religious conflict, and the construction of German national identity. They are also knowledgeable about
  the political history of Germany and the complex process of nation-building. They appreciate the use of social, cultural, and political history in understanding the division along religious lines in Germany
  and the role of religious conflict in shaping German national identity. They are also interested in the recent historiography of the politics of religion and the use of works in cultural studies to analyze
  religious difference.
