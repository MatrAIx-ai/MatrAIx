  career_goals: Tommy aims to secure a stable, hands‑on technical career within the next two years. He plans to enroll in a community‑college trade program to earn an apprenticeship in electrical work or
    HVAC, obtain relevant certifications, and eventually launch his own home‑repair contracting business serving the rural Midwest. He also hopes to acquire a commercial driver’s license to broaden employment
    options, and eventually purchase additional farmland to expand his family’s agricultural legacy. Providing financial security for his wife and building a reputation for reliability are central to his
    ambition.
