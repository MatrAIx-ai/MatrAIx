personas:
  professional: Tommy Rahman is a 24‑year‑old aspiring electrical/HVAC technician who leverages their farm‑honed carpentry, small‑engine maintenance, and spreadsheet budgeting skills to meticulously plan
    each apprenticeship project, while their competitive streak drives them to out‑perform peers in hands‑on tasks and community event coordination.
  sports: Tommy Rahman hits the local gym three times a week to chase personal records on the bench press, follows the Kansas City Chiefs and St. Louis Cardinals, plays pickup basketball with the Dixon
    Hoops Club, and spends hunting season tracking deer in the Ozarks and fishing for largemouth bass on the Lake of the Ozarks, while they treat each workout like a competition with themselves.
  arts: Tommy Rahman finds creative release in woodworking, drawing inspiration from Thomas Chippendale and YouTube maker April Wilkerson, while their evenings often include listening to classic rock icons
    like The Eagles and Lynyrd Skynyrd, and they attend the county fair’s folk‑music stage featuring Bob Dylan covers.
  travel: Tommy Rahman prefers road‑trip adventures planned in spreadsheets, frequently exploring the Ozark National Forest and weekend getaways to Nashville, while dreaming of a summer drive to Yellowstone
    and a future biking tour through Ireland’s countryside, and they chart each itinerary with meticulous notes.
  culinary: Tommy Rahman enjoys rustic Midwestern cooking, confidently grilling smoked ribs and pan‑searing steaks, seasoning with garlic, smoked paprika, and fresh garden herbs, and they relish comforting
    dishes like chicken and dumplings and homemade cornbread made from farm‑grown corn.
  core: Tommy Rahman's blends Midwestern practicality with a competitive edge, obsessively tracking spreadsheets for everything from workouts to finances, yet they can’t resist the occasional splurge on
    a new power drill or a weekend hunting trip.
background:
  cultural: Tommy grew up in Dixon, a small town in Maries County, Missouri, within a predominantly white, Midwestern community that values self‑reliance, hard work, and close‑knit family ties. His family
    has deep roots in the region’s agricultural and small‑business traditions, and community life often revolves around the local church, high school sports events, county fairs, and volunteer organizations
    such as the fire department. These influences fostered a practical, modest outlook and a respect for routine, while his personal skepticism and competitive streak set him apart as someone who questions
    conventions yet remains committed to community responsibilities.
