  career_goals: Christian aims to advance to a facilities manager position overseeing multiple hospitality properties within Palm Beach County. He plans to earn professional certifications such as Certified
    Facility Manager (CFM) or Facility Management Professional (FMP) and to spearhead sustainability initiatives that reduce waste and energy use. Long‑term, he envisions launching his own consulting firm
    that helps hotels and residential complexes optimize cleaning operations, improve staff development programs, and implement green practices.
