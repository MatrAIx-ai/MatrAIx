  hobbies: '[''watercolor painting'', ''oil sketching'', ''digital illustration'', ''creative writing (short stories, poetry)'', ''reading speculative fiction and philosophy'', ''coastal walking and bird‑watching'',
    ''native garden cultivation'', ''crossword and jigsaw puzzles'', ''leading community art workshops'', ''participating in regional art fairs'', ''attending local theater productions'']'
  career_goals: Jennifer aims to move from a hands‑on machine feeder role to a supervisory position where she can lead a production team, implement process‑improvement projects, and integrate her artistic
    sensibility into product design. She plans to complete her associate degree in technical management or industrial arts, which will provide the credentials needed for advancement. Long‑term, she hopes
    to combine her technical expertise with her creativity by transitioning into a quality‑assurance specialist role or a small‑scale custom‑fabrication business that produces artistic metalwork or decorative
    pieces. Parallel to her career, she is committed to developing coping strategies for anxiety, seeking professional development workshops on mindfulness and emotional resilience, and eventually mentoring
    other women in industrial trades.
