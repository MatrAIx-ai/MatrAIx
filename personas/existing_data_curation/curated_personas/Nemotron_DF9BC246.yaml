  career_goals: Rodriqueze aims to advance from a janitorial role to a supervisory position within the next three years, seeking a facilities manager role in a corporate office or educational institution.
    He plans to earn certifications in OSHA safety, green cleaning, and facilities management, and is considering completing an associate's degree in Business Administration or Facilities Management. Long‑term,
    he dreams of launching his own cleaning company that emphasizes sustainable practices and provides training opportunities for young workers from his community.
