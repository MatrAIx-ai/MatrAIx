  hobbies: '[''Church Choir'', ''Bridge Club'', ''Gardening'', ''Animal Shelter Volunteering'', ''Potluck Dinner Hosting'', ''Historical Fiction Reading'', ''Crocheting'', ''Line Dancing'', ''Gentle Yoga'',
    ''Gratitude Journaling'']'
  career_goals: Although retired from formal employment, Janice aims to deepen her involvement in the local community by leading the town’s annual heritage festival and establishing a mentorship program
    for younger volunteers. She aspires to complete an online certification in nutrition to improve her cooking for family and community gatherings. Additionally, she hopes to publish a collection of memoirs
    recounting life on a Texas farm, and to maintain her health through regular walking and senior fitness classes.
