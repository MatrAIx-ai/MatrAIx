personas:
  professional: Janice Phillips, a retired community organizer in West Texas, leverages her meticulous budgeting skills, event planning experience, and innate sociability to lead the town’s annual heritage
    festival while mentoring younger volunteers, though her critical edge sometimes makes her clash with fellow organizers over details.
  sports: Janice Phillips participates in the local senior walking club, attends weekly low‑impact yoga classes at the community center, and avidly follows the Dallas Cowboys and Texas Rangers, while cheering
    on the high‑school basketball team at the town gym, although she occasionally dismisses competitive league play as too intense for her age.
  arts: Janice Phillips sings in the church choir, line‑dances to the classic country tunes of Willie Nelson and Dolly Parton, crochets patterned blankets while listening to historic novels by Cormac McCarthy,
    and enjoys occasional community theater productions starring local actor James Cowan, reflecting her love for Texas folk culture.
  travel: Janice Phillips prefers road‑tripping in her trusty sedan to historic sites like the Alamo and the national parks of Big Bend, plans itineraries weeks in advance using a travel notebook, enjoys
    weekend visits to New Orleans for jazz and Cajun cuisine, yet she avoids long‑haul flights due to health concerns.
  culinary: Janice Phillips delights in cooking classic Tex‑Mex dishes such as chicken‑fried steak topped with jalapeño‑infused gravy, skillet‑baked cornbread, and pecan pie, skillfully balances flavors
    with fresh garden tomatoes and rosemary, and often experiments with low‑sodium recipes after completing her online nutrition certification, though she occasionally over‑salts her chili in a burst of
    enthusiasm.
  core: Janice Phillips is a detail‑driven, community‑centric retiree whose structured mindset, lively social presence, and occasional bout of worry shape a life dedicated to serving neighbors while meticulously
    balancing health, finances, and tradition.
background:
  cultural: Janice grew up in a traditional white Southern family in West Texas, where community ties, church involvement, and self-reliance were core values. The cultural emphasis on hospitality, modesty,
    and hard work shaped her practical and organized approach to life. Her upbringing in a small-town environment fostered a strong sense of local pride, while her exposure to regional folk music, country
    dancing, and Texas history influences her hobbies and social activities.
attributes:
  skills: '[''Event Coordination'', ''Budgeting and Basic Accounting'', ''Volunteer Management'', ''Microsoft Office (Word, Excel, Outlook)'', ''Community Outreach'', ''Gardening'', ''Home Maintenance'',
