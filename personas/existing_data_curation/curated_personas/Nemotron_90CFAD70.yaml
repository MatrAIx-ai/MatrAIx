personas:
  professional: Jonathan Rizzuto, an eager elementary school student who serves as a junior project coordinator for his Boy Scout troop’s community clean‑up efforts, blends a love of clear structure with
    sociable leadership, reliably organizing LEGO build workshops and campsite preparations while they occasionally worry over perfect outcomes.
  sports: Jonathan Rizzuto plays forward for the Cave Junction Soccer Club’s U‑10 team, devotes his after‑school energy to practicing drills inspired by the Portland Timbers, enjoys weekend hikes in the
    Siskiyou Mountains for cardio, and when the cross‑country season arrives, they tackle long runs with the same practical focus, though occasional frustration shows when games don’t follow the rules.
  arts: Jonathan Rizzuto spends free time watching Pixar’s *Finding Nemo*, listening to The Beatles’ upbeat tracks while building LEGO sets, and flipping through the *Magic Tree House* series, and they
    let these creative worlds reinforce a love for storytelling and spark a habit of drawing scenes in their journal.
  travel: Jonathan Rizzuto enjoys family camping expeditions to nearby Crater Lake and Redwood National Parks, planning each trek with a pocket map and a checklist of wildlife spots, and they dream of future
    adventures to Yellowstone’s geysers and the Canadian Rockies, preferring organized itineraries that balance outdoor discovery with familiar comforts.
  culinary: Jonathan Rizzuto, a budding kitchen helper, can whip up a basic cheese pizza with pepperoni slices, stir a pot of mac and cheese using elbow pasta and cheddar, assemble a peanut‑butter‑jelly
    sandwich, and on camping trips they relish roasting hot dogs and making s’mores with graham crackers, marshmallows, and chocolate squares.
  core: Jonathan Rizzuto blends a love for structured LEGO builds with an easy‑going soccer spirit, habitually worries about perfect outcomes, and they can’t resist squeezing a few extra minutes of video
    game time before bedtime.
background:
  cultural: Jonathan grows up in a typical white, working‑class family in Cave Junction, Oregon. The community places a strong emphasis on outdoor recreation, self‑reliance, and close‑knit neighborly ties.
    He participates in local school events, church youth groups, and the Boy Scouts, which reinforce values of responsibility, teamwork, and service. Family gatherings often feature picnics, camping trips,
    and seasonal festivals that celebrate the Pacific Northwest’s natural heritage, shaping his appreciation for the environment and his sense of civic duty.
attributes:
  skills: '[''following step‑by‑step instructions'', ''LEGO building'', ''basic computer/tablet use'', ''reading fluency'', ''teamwork'', ''communication'', ''environmental awareness'']'
