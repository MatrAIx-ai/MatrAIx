  career_goals: Jonathan dreams of a future where he can combine his love for the outdoors with his desire for a structured, community‑focused role. He frequently talks about becoming a park ranger or a
    wildlife biologist because he enjoys learning about nature and likes the idea of protecting the environment. He also imagines joining the local fire department one day, drawn to the clear responsibilities
    and teamwork involved. His short‑term ambition is to earn the Boy Scouts merit badge for First Aid, a step he sees as preparation for these future careers.
