  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading historical non‑fiction and technical manuals'', ''Fishing'', ''Model car building'', ''Cooking traditional Mexican cuisine'', ''Volunteer equipment
    maintenance'']'
  career_goals: Looking ahead, Mario aims to transition from a frontline cleaner to a supervisory role where he can design efficient cleaning protocols and mentor new staff. He intends to earn a Certified
    Green Cleaner credential to formalize his expertise in sustainable practices, which would also position him to launch a small, family‑run cleaning service focused on environmentally responsible methods
    for local businesses and residential clients. By building a reputation for reliability and quiet professionalism, he hopes to secure a stable income stream that supports his family’s long‑term financial
    security and eventually allows him to reduce his working hours as he approaches retirement.
