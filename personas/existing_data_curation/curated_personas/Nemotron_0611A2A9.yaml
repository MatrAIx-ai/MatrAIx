  hobbies: '[''building sandcastles'', ''playing with building blocks'', ''drawing with crayons'', ''listening to bedtime stories'', ''water play'', ''singing and dancing'', ''playing with other children
    at the park'', ''exploring nature'']'
  career_goals: Although only two years old, Christopher’s play reveals budding aspirations. He is fascinated by the ocean, sea creatures, and beach life, often pretending to be a marine biologist or a
    lifeguard. His love of building sandcastles and stacking blocks hints at a future interest in construction or engineering. Encouraged by his family’s support, he shows an early desire to help others,
    which may evolve into caregiving or community-focused professions.
