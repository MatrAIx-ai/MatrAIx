personas:
  professional: Christopher Johnston, a budding toddler builder who treats his brightly colored block set as a miniature workshop, applies curiosity and practical tinkering to experiment with balance and
    stability, while their relaxed, spontaneous nature means designs often evolve mid‑play and collaborative building sessions with peers keep them socially engaged.
  sports: Christopher Johnston, an energetic participant in the Little Tykes Soccer Club’s spring league and a weekend gymnastics class at the community center, cheers loudly for the Boston Red Sox on TV,
    approaches fitness with boundless enthusiasm, and often requests an extra round of tag before nap time.
  arts: Christopher Johnston, a vivid fan of animated melodies, dances to the ‘Moana’ soundtrack, mimics the puppet characters on ‘Sesame Street’, and spends afternoons drawing crayon dinosaurs inspired
    by Eric Carle’s bold style.
  travel: Christopher Johnston, a curious little explorer who loves spontaneous day trips to the nearby city zoo, the sandy shores of Clearwater Beach, and weekend stays at Grandma’s farm, prefers relaxed
    itineraries that accommodate nap schedules, and dreams of one day riding the roller coasters at Disneyland.
  culinary: Christopher Johnston, a picky but adventurous eater who delights in buttery mac ’n’ cheese, fluffy banana pancakes, and strawberry‑yogurt swirls, loves the crunch of apple slices dipped in peanut
    butter, yet consistently refuses broccoli and has only mastered the art of stirring his own cereal bowl.
  core: Christopher Johnston, a two‑year‑old bundle of curiosity and social energy, balances spontaneous block‑building with occasional messy play, delights in snacks and cuddle‑time, yet often forgets
    to tidy up his toys before bedtime.
background:
  cultural: Christopher is a White American child growing up in Fort Walton Beach, Florida. His cultural environment blends coastal Gulf-side traditions, a strong tourism and marine recreation vibe, and
    a community shaped by the nearby Naval Air Station. He is exposed to Southern hospitality, beach-centered activities, and a diverse mix of families, which influences his love for the ocean, outdoor
    play, and community gatherings.
attributes:
  skills: '[''basic motor coordination'', ''vocabulary of ~200 words'', ''color and shape recognition'', ''simple puzzle solving'', ''basic self-feeding'', ''early social interaction and cooperation'',
