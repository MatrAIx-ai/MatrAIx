  hobbies: '[''Building LEGO and wooden block structures'', ''Interactive storytime and picture books'', ''Dancing to Latin music (reggaeton, salsa)'', ''Group games like hide‑and‑seek and cooperative puzzles'',
    ''Exploring parks and collecting natural items'', ''Simple science experiments (testing toy mechanisms)'']'
  career_goals: Although still in early childhood, Gustavo frequently imagines future roles that combine his curiosity with practicality. He talks about becoming an engineer who designs safe bridges, a
    space explorer who discovers new planets, or a community organizer who plans fun events for his friends. These ambitions highlight his desire to solve problems, lead group activities, and bring order
    to creative projects.
