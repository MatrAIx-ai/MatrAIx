personas:
  professional: Sean Bonner, a 24‑year‑old interior architect in the Charlotte metropolitan area, translates a strong foundation in spatial planning, color theory, and historic context into high‑end residential
    designs, leveraging SketchUp, AutoCAD, Revit, V‑Ray, and Lumion to deliver meticulous 3‑D renderings while their organized, methodical approach ensures reliable timelines, clear client presentations,
    and sustainable material sourcing, and they consistently meet project milestones.
  sports: Sean Bonner, an enthusiastic hiker with the Charlotte Hiking Club, tackles the Piedmont foothills on weekends, attends bi‑weekly yoga classes, cheers for the Charlotte Hornets and Carolina Panthers,
    and joins a recreational soccer league with friends during the summer months, balancing their active lifestyle with a disciplined work schedule, which they consider essential for mental clarity.
  arts: Sean Bonner frequents the Mint Museum to sketch architectural details, draws artistic inspiration from Ansel Adams and Zaha Hadid, curates a personal Instagram feed showcasing modernist interiors,
    enjoys acoustic guitar sessions featuring John Mayer, and restores vintage furniture pieces as functional art installations, reflecting their blend of visual curiosity and hands‑on craftsmanship, a
    process they find deeply rewarding.
  travel: Sean Bonner prefers meticulously planned short trips, has explored Asheville’s historic Biltmore Estate, dreams of wandering the cobblestone streets of Bruges, balances a modest travel budget
    through discount apps, yet occasionally splurges on a boutique stay in Savannah to experience local hospitality and culinary traditions, a choice that reflects their desire to blend comfort with adventure
    and they often document these journeys on a travel blog.
  culinary: Sean Bonner delights in farm‑to‑table cooking, often preparing roasted beet and goat‑cheese salads with heirloom tomatoes, experimenting with homemade sourdough bread, sourcing locally raised
    pork for slow‑cooked pulled‑pork tacos, but frequently skips breakfast due to early design meetings, an oversight they acknowledge and try to fix with a quick espresso and fruit.
  core: Sean Bonner, 24, blends a methodical design mindset with a curious love for vintage restoration, yoga, and strategic finance, while they occasionally overcommit to projects and neglect sleep.
background:
  cultural: 'Sean grew up in a middle‑class family in Waxhaw, North Carolina, a community known for its blend of historic Southern charm and modern growth. His ancestry is primarily of European descent,
    with generations rooted in the Carolinas, which instilled a respect for hospitality, community involvement, and the craftsmanship traditions of the American South. While his upbringing emphasized practicality
    and a close‑knit neighborhood ethos, his bachelor’s degree in the arts and humanities broadened his perspective to include European art history, contemporary cultural theory, and global design movements.
    This dual influence shapes his design sensibility: he often melds the warmth of Southern farmhouse aesthetics with the clean lines and eclectic details inspired by his broader cultural explorations.'
