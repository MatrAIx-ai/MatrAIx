  career_goals: Sean aims to build a distinguished portfolio of high‑end residential projects across the Charlotte metropolitan area within the next five years, leveraging his Southern heritage to create
    spaces that honor local tradition while embracing contemporary aesthetics. He plans to earn LEED Green Associate certification to deepen his expertise in environmentally responsible design. Long‑term,
    Sean envisions launching his own boutique studio that specializes in integrating historic preservation with modern functionality, positioning himself as a thought leader through speaking engagements
    at design conferences and a curated social‑media presence. He also hopes to mentor emerging designers, fostering a collaborative culture that values curiosity and methodological rigor.
