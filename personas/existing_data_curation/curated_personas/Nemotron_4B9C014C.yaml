  hobbies: '["Hiking in the Wasatch Mountains", "Skiing during winter", "Digital photography", "Coding hobby projects (Python, Arduino)", "Reading science-fiction and popular science", "Baking and cooking",
    "Playing acoustic guitar", "Volunteering at the local food bank"]'
  career_goals: Looking ahead, Nicole aims to combine her scientific curiosity with a practical desire to serve her community. She plans to pursue a degree in environmental engineering or civil engineering
    with a focus on sustainable water management and renewable energy solutions for the Intermountain West. In parallel, she is considering obtaining a nursing or EMT certification to remain equipped for
    emergency response work. Her long‑term ambition is to work for a nonprofit or government agency that designs and implements resilient infrastructure projects, allowing her to apply her analytical skills,
    collaborative mindset, and commitment to community well‑being.
