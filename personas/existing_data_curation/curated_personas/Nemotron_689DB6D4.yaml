  career_goals: Though retired from formal employment, Eugenia aims to channel her experience into meaningful community contributions. She aspires to become a mentor for senior citizens in financial literacy
    and home safety, lead a neighborhood community garden, and share her knitting expertise through workshops. She also dreams of compiling a memoir that weaves personal stories with Baltimore’s local history,
    and possibly launching a modest online shop for her handcrafted knit items. Maintaining mental well‑being by reducing worry through regular journaling and mindfulness practices is also a personal ambition.
