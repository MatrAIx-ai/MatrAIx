personas:
  professional: Eugenia Dixon, a retired community volunteer, channels their meticulous budgeting, home‑care expertise, and love of gardening into mentoring seniors in financial literacy and leading a neighborhood
    garden, while their competitive edge from bridge fuels strategic event planning.
  sports: Eugenia Dixon, a devoted member of the Baltimore Senior Walking Club, enjoys early morning walks along the Inner Harbor and occasionally watches the Baltimore Orioles and Maryland Terrapins on
    television, while their competitive spirit surfaces in weekly pickleball matches at the community center, and they relish the occasional victory.
  arts: Eugenia Dixon, an avid reader of historical fiction by authors such as Philippa Gregory and a regular attendee of the Baltimore Museum of Art, treasures knitting as a tactile art form, often recreating
    patterns inspired by William Morris, and they find solace in listening to Nina Simone’s soulful jazz while crocheting.
  travel: Eugenia Dixon, a cautious traveler who favors small‑group tours, has explored historic Williamsburg, the gardens of Versailles, and the cobblestone streets of Edinburgh, while dreaming of a relaxed
    weekend getaway to the Chesapeake Bay’s Eastern Shore, always planning trips around budget constraints and gentle walking itineraries, and they prefer gentle walks over crowded attractions.
  culinary: Eugenia Dixon, a garden‑to‑table enthusiast, delights in cooking fresh tomato‑basil bruschetta, herb‑infused roasted chicken, and classic Baltimore crab cakes, skillfully using basil, thyme,
    and rosemary harvested from their backyard, yet often over‑spices dishes in a quest for bold flavor, and they sometimes end up with a kitchen mishap when the seasoning goes too far.
  core: Eugenian Dixon is a detail‑oriented, worry‑prone senior who blends a love of gardening, strategic games, and community service into a life of quiet competition and thoughtful generosity, and they
    constantly check their budget for any discrepancy.
background:
  cultural: Eugenia was raised in a working‑class white family in Baltimore, with deep roots in the city’s Mid‑Atlantic culture. Her grandparents emigrated from Ireland, and she was brought up in a Catholic
    household that emphasized community service, self‑reliance, and modesty. The blend of Baltimore’s historic neighborhoods, the proximity to the Inner Harbor, and the city’s strong tradition of neighborhood
    associations shaped her appreciation for local heritage and civic involvement. While she identifies with the broader American cultural mosaic, her personal values are closely tied to the pragmatic,
    community‑focused ethos of Baltimore’s older white neighborhoods.
