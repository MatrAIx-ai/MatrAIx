personas:
  professional: Anthony Diaz, a disciplined construction laborer with expertise in framing, masonry, heavy equipment operation and a growing command of BIM, leverages their meticulous planning and curiosity
    for sustainable methods to deliver on‑time projects while mentoring small crews and eyeing a foreman promotion within two years.
  sports: Anthony Diaz plays midfield for the Cape Fear Community Soccer League, organizes nightly pickup basketball games at the Camden County Recreation Center, cheers for the Carolina Hurricanes, the
    NC State Wolfpack, and the Atlanta Braves, and they maintain a disciplined weekly routine of cardio and strength training.
  arts: Anthony Diaz frequents the Cameron Art Museum and the downtown Wilmington mural trail, draws inspiration from the bold colors of Frida Kahlo’s murals and the storytelling of contemporary banda groups
    like Los Cardencheros, immerses themselves in board‑game nights featuring titles such as Terraforming Mars, and sketches public murals that blend classic muralist techniques with modern urban motifs.
  travel: Anthony Diaz prefers short, adventure‑focused road trips, having captured sunrise drone footage over the Outer Banks, explored the historic plazas of Cartagena, Colombia, and planned a future
    pilgrimage to the vibrant markets of Oaxaca, while they balance travel costs with a commitment to supporting their family’s community events back home.
  culinary: Anthony Diaz enjoys mastering traditional dishes such as tamales, pozole, and green mole, seasonally grills fresh coastal shrimp and crab at neighborhood BBQs, experiments with homemade salsa
    verde on their custom cutting board, and slots in quick prep of chilaquiles on weekend mornings before site work begins.
  core: Anthony Diaz merges relentless workplace precision with a vibrant love for mural art and community festivals, channeling their calm competitiveness into both building sturdy homes and crafting colorful
    canvases.
background:
  cultural: Anthony is a first‑generation Mexican‑American who grew up in a bilingual household in coastal North Carolina. His parents emigrated from Mexico, bringing traditions of Mexican cuisine, music
    (banda, mariachi), and celebrations such as Día de los Muertos. He speaks Spanish at home and English at work, weaving both Mexican heritage and Southern hospitality into his daily life. He frequently
    volunteers at local Hispanic community events, helps coordinate cultural festivals in Camden County, and incorporates Mexican mural art aesthetics into his creative hobbies. His strong family ties,
    respect for hard work, and pride in his cultural roots drive his personal and professional aspirations.
attributes:
  skills: '["Framing", "Concrete pouring", "Masonry", "Heavy equipment operation (forklift, excavator)", "Blueprint reading", "OSHA safety compliance", "On‑site logistics and inventory management", "Team
    coordination", "Quality control", "Sustainable building practices", "Basic Building Information Modeling (BIM)"]'
  hobbies: '["Visiting art galleries and murals", "Sketching and painting", "Playing soccer in community leagues", "DIY woodworking and furniture building", "Sustainable home‑improvement projects", "Listening
    to Mexican folk and contemporary music", "Drone photography of construction sites", "Strategic board games (e.g., Settlers of Catan)", "Participating in local festivals and community events"]'
  career_goals: Anthony aims to leverage his disciplined work ethic and curiosity about new technologies to advance into a foreman role within the next two to three years. He plans to earn an OSHA 30‑hour
    certification and pursue a Construction Management certification or associate degree to strengthen his technical knowledge. His long‑term ambition is to start his own contracting firm that blends high‑quality
    craftsmanship with sustainable, aesthetically‑driven design—often incorporating Mexican artistic influences into residential projects for his community in Shawboro and the broader Camden County area.
