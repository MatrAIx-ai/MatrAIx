  career_goals: Xiaozhong aims to translate his self‑taught technical know‑how into a stable, upward‑mobile career. In the short term, he plans to earn his GED and complete a CompTIA A+ certification, positioning
    himself for entry‑level IT support or help‑desk roles within Los Angeles County. He is driven to secure a full‑time position that offers benefits and a clear path for advancement, where his reliability
    and systematic problem‑solving will be recognized. Within five years, he hopes to become a certified network technician (CompTIA Network+) and move into a junior systems administrator role. Simultaneously,
    he is exploring a side hustle repairing and customizing PCs for local gamers, with the long‑term ambition of founding a modest boutique tech‑service business that can provide freelance income and potential
    growth. Achieving these milestones is also tied to his desire for financial independence, which would lessen his stress and allow him to support his family.
