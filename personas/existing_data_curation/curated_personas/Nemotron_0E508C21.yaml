  career_goals: Carolina aims to scale her company’s market share beyond Arizona while embedding sustainable manufacturing practices that align with regional environmental standards. She seeks to launch
    a formal mentorship program for women in leadership within Yavapai County, positioning herself as a catalyst for gender equity in local industry. Over the next five years, she plans to transition from
    day‑to‑day operations to a strategic board role, overseeing multiple community ventures, and eventually establishing a family‑focused charitable foundation that supports education and entrepreneurship
    for high‑school graduates who lack college access.
