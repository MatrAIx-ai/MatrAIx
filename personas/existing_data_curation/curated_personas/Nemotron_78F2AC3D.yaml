  hobbies: '["coloring and drawing","building LEGO or block structures","solving simple jigsaw puzzles","listening to merengue music","helping with cooking (mixing ingredients, setting plates)","caring
    for goldfish"]'
  career_goals: Ruben loves the idea of growing up to help others in a practical, routine‑oriented way. He often says he wants to be a teacher who creates a safe, predictable classroom for young children,
    or a doctor who makes people feel better and keeps families healthy. His ambition is to build harmonious environments where kindness and order are valued.
