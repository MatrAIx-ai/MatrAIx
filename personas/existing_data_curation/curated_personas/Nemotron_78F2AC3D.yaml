personas:
  professional: Ruben Ortega, a kindergarten explorer, thrives on routine and practicality by organizing classroom supplies, following daily schedules, and quietly offering helpful suggestions to peers,
    making them a dependable helper in group projects despite occasional desk disarray.
  sports: Ruben Ortega loves playing soccer with the Little Lions junior team in spring, enjoys splash time at the community pool in summer, and quietly cheers for the Chicago Cubs on TV, preferring short,
    fun games over long competitive matches and practicing simple dribbling drills at home.
  arts: Ruben Ortega delights in drawing bright dinosaurs inspired by Dr. Seuss, sings loudly along with The Wiggles' 'Fruit Salad' during car rides, and watches Disney classics like Moana, often mimicking
    the voice of Maui for fun.
  travel: Ruben Ortega prefers family trips with a predictable itinerary, such as the recent visit to the Grand Canyon, a sunny day at Clearwater Beach, and an overnight stay at Walt Disney World in Orlando,
    always packing their favorite stuffed bear for comfort.
  culinary: Ruben Ortega enjoys simple comfort foods like creamy macaroni and cheese, pepperoni pizza with extra cheese, and banana‑strawberry smoothies, often helping stir batter for pancakes and insisting
    that cheese be the essential topping on everything.
  core: Ruben Ortega is a routine‑loving, compassionate five‑year‑old who quietly organizes playtime, saves spare change in a piggy bank, and sings The Wiggles at bedtime, though they sometimes forget their
    inhaler in the excitement of a game.
background:
  cultural: Ruben grows up in a Dominican household in Freeport, New York. Spanish and English are spoken at home, and he celebrates Dominican holidays such as Navidad, Día de los Reyes, and the local Dominican
    Parade. Family meals often feature mangú, arroz con habichuelas, and empanadas, and he enjoys the warmth of extended family gatherings. He participates in community events at the nearby Dominican cultural
    center, learning traditional dances and hearing folklore from his grandparents, which nurture his sense of belonging and respect for his heritage.
attributes:
  skills: '["following daily routines","basic counting to 20","recognizing letters A–J","drawing simple shapes and coloring","building with blocks or LEGO","helping with simple household chores","expressing
