persona_description: A materials scientist with expertise in the field of tribology, focusing on the development and optimization of tribological coatings for various applications in the oral environment.
  This person is interested in understanding the tribological properties and mechanical properties of diamond-like carbon coatings (DLC) and their influence on the properties of coatings deposited using
  an unbalanced magnetron sputtering system (UBMS). This individual is also interested in studying the tribological properties of plasma sprayed Ni-Mo-Al-Ag-BN composite coatings and their wear tests using
  the Schwingung Reibung and Verschliess (SRV) reciprocating wear tester under dry conditions. This persona is likely to be interested in advancing the understanding of tribological properties and mechanical
  properties of tribological coatings and their applications in the oral environment.
