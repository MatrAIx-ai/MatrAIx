  career_goals: Gregory dreams of a future where he can help his community in a structured and reliable role. He frequently says he wants to become a firefighter because he admires the routine drills, teamwork,
    and the chance to keep people safe. He also imagines working as a police officer or a construction worker, jobs that involve clear schedules, practical tasks, and visible results. His short‑term goal
    is to master kindergarten skills—reading, counting, and following classroom rules—so he can later pursue a vocational path that combines his love for routine, responsibility, and community service.
