personas:
  professional: Lucy Reznik is a 20-year-old tech entrepreneur leading a mental-wellness AI startup, combining full-stack development (Python, JavaScript, SQL) with UX/UI design inspired by visual arts,
    and leveraging strategic planning, agile project management, and high emotional intelligence to align diverse teams and secure investor confidence.
  sports: Lucy Reznik enjoys low-intensity fitness, regularly attending sunrise yoga classes at a community studio in Brooklyn and cycling along the Hudson River Greenway during summer, while cheering for
    the New York Knicks basketball team and the New York Mets baseball club during the respective seasons.
  arts: Lucy Reznik immerses herself in the contemporary art scene by visiting galleries like the Whitney Museum and the MoMA, sketches urban street scenes in a battered sketchbook, and draws inspiration
    from artists such as Yayoi Kusama, musicians like Nils Frahm, and the ambient composer Brian Eno, often blending these influences into her piano improvisations.
  travel: Lucy Reznik favors purposeful travel, planning trips that blend creative workshops with nature hikes, having recently explored the street art of Berlin’s Kreuzberg district and the serene fjords
    of Norway, while dreaming of a future retreat in Kyoto’s Zen gardens to recharge her entrepreneurial spirit.
  culinary: Lucy Reznik prefers simple, health-conscious meals, expertly preparing avocado toast with heirloom tomatoes and poached eggs, savoring Japanese miso soup for its umami depth, and occasionally
    indulging in artisanal dark chocolate truffles while experimenting with matcha latte art at home.
  core: Lucy Reznik is a hyper‑curious, art‑driven code‑slinger whose anxiety fuels relentless ambition, who balances midnight hackathon sprints with sunrise yoga, and who can’t resist a perfect espresso
    before a board meeting.
background:
  cultural: Lucy grew up in Clifton, New Jersey, in a family that values academic achievement and cultural curiosity. Her heritage traces back to Eastern‑European Jewish ancestors, which instilled a respect
    for learning, communal responsibility, and the celebration of holidays such as Hanukkah and Passover alongside mainstream American traditions. Surrounded by the multicultural vibrancy of the New York
    metropolitan area, she was exposed early to museums, theater, and a wide range of cuisines, shaping an inclusive outlook that blends her suburban upbringing with an appreciation for global artistic
    expressions.
