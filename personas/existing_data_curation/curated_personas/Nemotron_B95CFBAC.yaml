  career_goals: She aims to scale her tech startup into a market‑leading platform that leverages AI to personalize mental‑wellness tools, securing Series A funding within the next 18 months and expanding
    to North America and Europe. Lucy also aspires to embed a culture of creativity and empathy, instituting art‑inspired design sprints and employee wellness programs. Long‑term, she envisions transitioning
    to a venture‑building role where she can mentor emerging female founders while pursuing an executive MBA focused on sustainable business practices.
