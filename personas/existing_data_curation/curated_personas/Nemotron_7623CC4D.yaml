  career_goals: Kevin aims to earn the Associate in Claims (AIC) certification within the next 18 months and become a senior adjuster handling property and casualty claims, especially in catastrophic loss
    scenarios. In the medium term (3–5 years), he envisions stepping into a claims manager role where he can lead a team, implement process‑improvement initiatives, and champion mental‑wellness programs
    for adjusters. Long‑term, he aspires to become a director of claims or launch his own consulting firm focused on investigative claim services and risk mitigation, while also pursuing further education
    in business administration to broaden his strategic perspective.
