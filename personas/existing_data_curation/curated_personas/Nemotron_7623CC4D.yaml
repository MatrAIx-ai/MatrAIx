personas:
  professional: Kevin Coleman, a 23‑year‑old claims adjuster at a regional insurer, leverages meticulous investigative analysis and claim evaluation skills while balancing curiosity with practical risk
    assessment, delivering clear documentation via Guidewire and Xactimate, and confidently negotiating with policyholders and attorneys, all while staying adaptable to shifting case demands, and they consistently
    blend empathy with assertiveness.
  sports: Kevin Coleman plays pick‑up basketball at the local community center, cheers for the Carolina Panthers and the Greenville Swamp Rabbits, and they belong to a weekend hiking club that trails Paris
    Mountain State Park, using sport as both social outlet and stress relief.
  arts: Kevin Coleman enjoys listening to R&B artist H.E.R., hip‑hop legend Kendrick Lamar, and gospel choir Kirk Franklin, binge‑watches forensic documentaries such as “The Keepers,” and they devour true‑crime
    books by Michelle McNamara and Ann Rule, finding inspiration for investigative work in the rhythm of music and the suspense of stories.
  travel: Kevin Coleman frequently explores nearby destinations like Charleston’s historic district and Asheville’s art scene, dreams of trekking the Grand Canyon and the vineyards of Tuscany, and they
    prefer to plan trips using a blend of spontaneous day‑trips and meticulously researched itineraries that balance adventure with budget constraints.
  culinary: Kevin Coleman experiments with Southern barbecue, mastering smoked pork shoulder with a hickory rub, sweet‑and‑tangy mustard sauce, and they often pair it with collard greens, cornbread, and
    a splash of bourbon‑infused glaze for family gatherings, while also enjoying the occasional gourmet taco night.
  core: Kevin Coleman is a diligent young adjuster whose curiosity drives meticulous claim work, whose anxiety fuels both mindfulness rituals and occasional impulsive spending, and whose love of basketball,
    true‑crime media, and Southern barbecue shapes a balanced yet restless lifestyle.
background:
  cultural: Raised in Taylors, SC, Kevin grew up in a close‑knit Black community where church, family gatherings, and Southern traditions played a central role. Weekend services at his family's Baptist
    church introduced him to gospel music and a sense of communal support. His grandmother’s stories about the civil‑rights movement and local African‑American heritage sites instilled pride in his roots.
    He embraces Southern hospitality, enjoys cooking and sharing soul food, celebrates Juneteenth, and values the resilience and perseverance that have shaped his identity.
