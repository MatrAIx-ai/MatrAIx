  hobbies: '["coding small projects", "computer hardware tinkering", "playing chess", "reading technical and non‑fiction books", "weight training", "running", "model kit assembly (airplanes, cars)", "strategy
    board games (Settlers of Catan, Risk)", "participating in quiz bowl"]'
  career_goals: Jeffery aims to complete his high‑school education—either by earning a diploma or obtaining a GED—and then pursue a bachelor's degree in computer science or engineering. He is motivated
    to become a software developer or data analyst, focusing on designing reliable, efficient systems for local tech firms or manufacturing companies in the Charlotte‑Concord corridor. In the short term,
    he hopes to secure an internship or apprenticeship that offers hands‑on experience with programming and hardware. Long‑term, he envisions leading technical projects as a senior engineer or project manager,
    leveraging his disciplined, high‑standard approach to ensure on‑time delivery and quality outcomes. As a safety net, he is also considering a skilled‑trade path, such as automotive service technician,
    where his mechanical talents can be applied.
