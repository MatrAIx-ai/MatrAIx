  hobbies: '[''Abstract painting'', ''Sketching and design journaling'', ''Visiting art galleries'', ''Surfing'', ''Beachcombing'', ''Upcycling vintage shoes'', ''Cooking Thai cuisine'', ''Yoga and meditation'',
