personas:
  professional: Perlita Thai, a 28-year-old shoemaker and leather artist, applies advanced hand‑stitching, tooling, embossing, and digital 3D modeling to create limited‑edition footwear that fuses abstract
    art with Southeast Asian motifs, while steering a flexible, collaborative studio vision that balances visionary design with sustainable material sourcing, and they maintain a fluid, improvisational
    workflow that embraces spontaneous inspiration.
  sports: Perlita Thai rides the Atlantic surf breaks with the Virginia Beach Surf Club, practices sunrise yoga at Norfolk’s waterfront park, occasionally joins beach volleyball games with the Chesapeake
    Bay Crew, and they cheer on the Washington Commanders and the Virginia Cavaliers while maintaining a fluid, relaxed approach to fitness.
  arts: Perlita Thai immerses in abstract painting inspired by Hilma af Klint and the kinetic installations of Yayoi Kusama, sketches speculative shoe concepts in a weathered journal during gallery visits,
    curates mood boards from urban texture photographs, and they regularly attend the Norfolk International Jazz Festival, allowing the vibrant art scene to shape their design language.
  travel: Perlita Thai prefers spontaneous, low‑key travel itineraries, having explored Bangkok’s textile markets, Chiang Mai’s traditional craft villages, and Bali’s surf spots, while also taking weekend
    road trips along the Outer Banks; they balance a modest travel budget with a desire to study regional leather techniques, often booking last‑minute flights to feed their curiosity.
  culinary: Perlita Thai enjoys crafting Pad Thai, Tom Yum soup, and mango sticky rice at home, using fresh lemongrass, galangal, kaffir lime leaves, and locally sourced chilies, while experimenting with
    upcycled shoe‑inspired plating presentations, and they often source ingredients from Norfolk’s farmers’ market to keep flavors vibrant.
  core: Perlita Thai blends artistic curiosity with a calm, almost laissez‑faire attitude, turning vintage shoes into sculpted art, sketching in the sand after surf sessions, and they occasionally forget
    deadlines, yet always surfacing with fresh ideas.
background:
  cultural: Perlita is the daughter of Thai immigrants who settled in Virginia Beach, and she grew up bilingual in Thai and English, celebrating Songkran, Loy Krathong, and other Buddhist traditions with
    her family. Her heritage informs her aesthetic, often incorporating Thai ornamental patterns, silk textures, and mythic symbolism into her leather work. She maintains close ties with the local Thai
    community, participates in cultural events at the Southeast Asian Cultural Center, and draws inspiration from the juxtaposition of her Southeast Asian roots and the maritime, multicultural environment
    of the Hampton Roads area.
