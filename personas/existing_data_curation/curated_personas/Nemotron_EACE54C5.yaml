  career_goals: Perlita aims to launch her own artisanal footwear brand that blends contemporary artistic concepts with traditional Southeast Asian motifs, emphasizing sustainable practices and limited‑edition
    pieces. In the next five years she plans to master advanced leather sculpting techniques, expand her line to include custom leather accessories, and open a collaborative studio space in Norfolk where
    she can host workshops and mentor emerging designers. She also hopes to secure a partnership with a niche fashion label to co‑create a capsule collection that showcases her imaginative designs on a
    broader platform.
