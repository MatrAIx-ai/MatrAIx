  hobbies: '[''Home gardening'', ''Fishing'', ''Woodworking'', ''Community volunteering'', ''Farmers market participation'', ''Local softball league'', ''Cooking with fresh produce'', ''Birdwatching'',
    ''Church and community events'']'
  career_goals: Thomas aims to transition from a hands‑on labor role to a supervisory farm‑manager position within the next five years, eventually owning a modest diversified farm that integrates organic
    practices and direct‑to‑consumer sales. He plans to obtain a Certified Crop Advisor (CCA) credential and invest in precision‑agriculture tools to improve yields and sustainability. Additionally, he
    hopes to mentor younger workers through local 4‑H programs and expand the farm’s presence at regional farmers’ markets, securing a stable financial future for his family while preserving the land his
    parents cultivated.
