personas:
  professional: Anna Eqab is a high‑school robotics enthusiast who leverages their methodical planning, competitive spirit, and strong interpersonal skills to lead their team in designing functional prototypes,
    often juggling Python coding, project timelines, and debate practice to showcase a future engineer’s mindset.
  sports: Anna Eqab is a starting midfielder for the City Youth Soccer Club and a 400‑meter sprinter on their high‑school track team, channeling their energetic competitiveness into rigorous training, while
    cheering for the hometown professional soccer team and maintaining a disciplined fitness routine that includes weekend pick‑up games with friends.
  arts: Anna Eqab immerses themselves in science‑fiction novels by Isaac Asimov, binge‑watches the cinematic series 'Blade Runner', collects indie electronic music from Daft Punk, and captures candid moments
    with their hobby camera, often editing photos to reflect the futuristic aesthetic they admire.
  travel: Anna Eqab prefers meticulously planned trips that blend adventure with learning, having organized a family road trip to the Grand Canyon for hiking and star‑gazing, and dreaming of a future student
    exchange in Japan where they can explore robotics labs and neon‑lit cityscapes.
  culinary: Anna Eqab favors high‑protein meals that fuel their athletic schedule, regularly cooking grilled chicken teriyaki with quinoa and avocado, while indulging in pepperoni pizza on game nights and
    experimenting with homemade smoothies featuring blueberries, spinach, and Greek yogurt.
  core: Anna Eqab is a hyper‑organized, competitively driven teen who balances robotics, sports, and puzzles with a penchant for late‑night gaming marathons, and they often over‑schedule every free minute.
background:
  cultural: Anna grew up in Greenville, South Carolina, in a white, middle‑class family that blends traditional Southern values—church attendance, family gatherings and hospitality—with contemporary digital
    influences. Her community emphasizes education, self‑reliance, and involvement in local activities like youth sports leagues and church groups. She resonates with Southern cuisine, music, and a strong
    sense of community while also embracing modern trends through social media and technology.
