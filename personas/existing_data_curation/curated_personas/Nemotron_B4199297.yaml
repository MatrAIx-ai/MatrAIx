  skills: '[''HTML5'', ''CSS3'', ''JavaScript'', ''React'', ''Vue.js'', ''Node.js'', ''PHP'', ''MySQL'', ''WordPress'', ''Joomla'', ''UI/UX design'', ''Responsive design'', ''Web accessibility (WCAG)'',
