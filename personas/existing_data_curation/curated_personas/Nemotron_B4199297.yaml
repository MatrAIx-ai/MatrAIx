  hobbies: '[''Visiting art galleries'', ''Live music concerts'', ''Salsa dancing'', ''Cooking Mexican cuisine'', ''Hiking'', ''Lake kayaking'', ''Tech meetups'', ''Coding mentorship'', ''Digital photography'',
    ''Graphic design'', ''Video gaming'']'
  career_goals: David aims to transition from a hands‑on developer to a technical lead or creative director of a boutique digital agency that blends cutting‑edge technology with artistic expression. He
    dreams of launching his own consultancy that helps local artisans and small businesses build culturally resonant online presences, while also offering mentorship programs for emerging developers from
    underrepresented backgrounds. Over the next five years, he plans to master advanced front‑end frameworks, explore interactive digital installations, and strengthen his project‑management skills to better
    meet deadlines and bring more structured processes to his spontaneous workflow.
