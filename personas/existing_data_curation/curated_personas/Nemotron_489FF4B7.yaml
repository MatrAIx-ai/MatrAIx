  hobbies: '[''community mural painting'', ''soccer league participation'', ''abstract art creation'', ''reading philosophy and contemporary art'', ''volunteering at food pantry'', ''youth mentorship'',
    ''cooking traditional Mexican cuisine'', ''gardening'', ''fishing'', ''attending music concerts'']'
  career_goals: Jorge aims to transition from a hands‑on labor role to a supervisory position, such as warehouse shift lead or logistics coordinator, where he can apply his organizational talents on a larger
    scale. He plans to earn certifications like Certified Forklift Trainer and an OSHA 30‑hour General Industry course to solidify his safety expertise. In the long term, he envisions launching his own
    small moving and storage business that offers affordable services to low‑income families and provides employment opportunities for bilingual workers. He also wishes to integrate his artistic passion
    by establishing employee wellness workshops that include collaborative mural painting and creative problem‑solving sessions, fostering both productivity and community spirit.
