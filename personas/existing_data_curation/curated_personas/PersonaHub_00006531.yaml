persona_description: A television producer who specializes in scheduling and programming, focusing on delivering shows to audiences when they are most likely to want to watch them and delivering audiences
  to advertisers in the composition that makes their advertising most likely to be effective. They are skilled in creating and executing effective scheduling strategies to ensure the success of their shows
  and to build an audience for a new show, retain that audience, or compete with other broadcasters' shows. They are also skilled in managing the scheduling of blocks of complementary programs together,
  using bridging techniques to discourage the audience from changing channels during the "junctions" between specific programs. They may also be skilled in managing the scheduling of programs to avoid disruptions
  with recorders if they are not aware of the scheduling.
