  career_goals: Limay dreams of a future where she can combine her love of learning and helping others. She aspires to become a bilingual elementary teacher or a wildlife biologist, roles that would let
    her share knowledge, protect nature, and support her community. She also imagines caring for animals as a veterinarian, seeing this as a practical way to make a positive impact on both people and pets.
