personas:
  professional: Limay Coronado, a budding comic creator who blends boundless curiosity with practical storytelling, sketches vibrant panels during school breaks, balances new ideas with tried‑and‑true comic
    structures, but often leaves crayons scattered because they favor flexibility over neatness.
  sports: Limay Coronado kicks the soccer ball at the local park with friends, cheers for the city’s youth league team while idolizing the professional club LA Galaxy, enjoys spontaneous games over rigid
    practice schedules, and sometimes misplaces their shin guards in the excitement.
  arts: Limay Coronado immerses themselves in drawing comics, devouring adventure novels in both English and Spanish, and listening to folk tunes from family traditions and pop hits by artists like Lila
    Downs and Shakira, and they channel that eclectic soundtrack into vivid storyboards and character designs.
  travel: Limay Coronado loves spontaneous family trips to coastal beaches where they collect shells, dreams of exploring historic stone cities renowned for vibrant plazas, prefers flexible itineraries
    over strict schedules, and they often pack a sketchbook to capture new scenery.
  culinary: Limay Coronado cooks traditional family dishes with their grandmother, mastering the art of shaping corn masa for tamales and simmering aromatic broth for pozole, enjoys the bright flavor of
    cilantro and chilies, and they proudly serve their creations at school potlucks.
  core: Limay Coronado is a curious, kind nine‑year‑old who turns everyday worries into comic adventures, they save pocket money for LEGO builds, and they find calm in sketching, shell hunting, and family
    cooking.
background:
  cultural: Limay comes from a Mexican‑American family in Brownsville, Texas, a city on the US‑Mexico border. She speaks Spanish at home and English at school, celebrates Día de los Muertos, Las Posadas,
    and other Mexican traditions with her extended family, enjoys foods like tamales and pozole, participates in community fiestas and school cultural events, and values close family ties, respect for elders,
    and bilingual communication.
