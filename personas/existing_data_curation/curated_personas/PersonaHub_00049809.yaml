persona_description: A researcher and advocate for gender equality who specializes in the study of climate change and its impacts on women, particularly in the context of migration. They are interested
  in understanding the burden on women due to climate change, the unequal labor market for women, and the need for support systems to help them cope with the increased workload and risks. They aim to find
  solutions to improve the wellbeing of women in vulnerable communities facing climate-related disasters.
