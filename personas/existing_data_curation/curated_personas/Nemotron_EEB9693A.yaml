personas:
  professional: Roberto Peraza, a 34‑year‑old bilingual litigator in Brooklyn, blends razor‑sharp oral advocacy and negotiation prowess with a spontaneous, talkative style that energizes courtroom arguments
    while his occasional disorganization pushes him to rely on impromptu note‑taking and team support.
  sports: Roberto Peraza, a devoted fan of the Brooklyn Nets and the New York Knicks, joins a local pickup basketball league every Saturday, sweats it out at the community gym for cross‑training, and never
    misses a live stream of his home country’s national soccer matches, rallying friends for spirited view‑parties.
  arts: Roberto Peraza channels his sociable energy into weekly improvisational comedy workshops, jams on the cajón to the rhythms of Celia Cruz and Marc Anthony, and regularly attends performances by the
    Brooklyn Academy of Music featuring artists like Lin‑Manuel Miranda and Amy Schumer.
  travel: Roberto Peraza prefers short, spontaneous getaways to vibrant neighborhoods like Williamsburg or cultural hubs such as Havana, balancing his love for bustling city life with occasional retreats
    to the quieter landscapes of the Catskills for weekend hikes.
  culinary: Roberto Peraza, an enthusiastic home cook, perfects traditional baleadas with refried beans, queso fresco, and homemade curtido, while also experimenting with New York’s multicultural markets
    to blend flavors like plantain chips and avocado in his dishes, though they often forget to clean the kitchen afterward.
  core: Roberto Peraza is a charismatic courtroom firebrand who thrives on social connection, yet battles chronic anxiety, binge‑spends on spontaneous outings, and wrestles with keeping his schedule tidy,
    making them both a magnetic advocate and a well‑meaning, often scattered, planner.
background:
  cultural: Roberto is a first‑generation American whose parents immigrated from Honduras in the early 1990s. Raised in a bilingual household in Queens before moving to Brooklyn, he grew up immersed in
    Honduran traditions – from festive punta music and weekly family meals of pupusas to Catholic celebrations and community patron saint festivals. His cultural identity blends Central American values
    of family cohesion, hospitality, and resilience with the multicultural dynamism of New York City. He remains tightly connected to the Honduran diaspora through local cultural organizations, Spanish‑language
    media, and regular visits to his extended family in Tegucigalpa.
