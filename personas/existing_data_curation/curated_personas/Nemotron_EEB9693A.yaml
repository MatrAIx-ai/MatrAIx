  career_goals: Roberto aims to become a senior partner at his mid‑size Brooklyn firm within the next five years, focusing on immigration and civil rights law to serve the growing Hispanic community. He
    also dreams of launching a nonprofit legal clinic offering pro bono services to low‑income families, and eventually pursuing elected office as a city council member to influence policy on affordable
    housing and immigrant rights. His ambition is tempered by a desire for work‑life balance that allows him to remain present for his wife and to manage his stress.
