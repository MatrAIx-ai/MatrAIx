  hobbies: '[''Salsa dancing'', ''Playing cajón'', ''Pickup basketball'', ''Watching Honduran soccer'', ''Cooking traditional Honduran dishes'', ''Exploring food markets'', ''Improvisational comedy'', ''Reading
