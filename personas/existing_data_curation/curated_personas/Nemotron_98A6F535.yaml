  career_goals: Daniel aims to become the lead Business Education teacher at his school, then advance to a department head role where he can shape district-wide entrepreneurship curricula. Over the next
    five years he plans to earn a certification in Educational Leadership and move into an instructional coaching position focused on integrating arts-based creative thinking into business lessons. Long-term,
    he hopes to launch a nonprofit that provides financial-literacy workshops and mentorship for underserved Black and Latino youth in Queens, and to publish research on the impact of interdisciplinary,
    art-infused business education on student engagement.
