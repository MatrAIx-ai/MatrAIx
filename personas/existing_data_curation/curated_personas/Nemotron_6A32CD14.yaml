  hobbies: '[''Cooking Traditional Mexican Cuisine'', ''Volunteering at Local Community Center'', ''Participating in Cultural Festivals'', ''Gardening Herbs and Chilies'', ''Attending Mariachi Performances
    and Dancing'', ''Playing Dominoes at Church Hall'', ''Bilingual Book Club'', ''Family Karaoke Sessions'', ''Road Trips on Scenic Routes'', ''Spanish‑Language Tutoring for Children'']'
  career_goals: Jessica aims to transition from driver‑sales to a supervisory role within the next three years, aspiring to become a senior driver trainer and eventually a fleet manager for a regional logistics
    company. She plans to obtain advanced certifications such as Hazardous Materials (HAZMAT) and Transportation Safety Management. Long‑term, she envisions launching her own small family‑run transport
    service that leverages her deep knowledge of local routes and her network of customers, providing stable income for her children and supporting her extended family.
