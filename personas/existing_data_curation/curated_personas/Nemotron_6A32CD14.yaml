personas:
  professional: Jessica Merlo is a veteran CDL driver‑sales professional who leverages over 20 years of meticulous route‑planning and vehicle‑maintenance expertise, coupling her practical, routine‑driven
    work ethic with a naturally sociable, talkative demeanor that turns routine deliveries into opportunities for personal connection and client trust, and she now aims to become a senior driver trainer
    and eventual fleet manager.
  sports: Jessica Merlo is a dedicated follower of the River Valley Hawks baseball team and a regular participant in the community center’s Silver Sneakers program, where they attend low‑impact cardio classes
    twice a week to maintain stamina for long hauls, while also enjoying occasional weekend hikes with a friends‑group in the nearby foothills.
  arts: Jessica Merlo is a frequent attendee of live mariachi performances and a passionate dancer at community fiestas, often humming traditional songs while cooking, and they enjoy reading romance novels
    by Nora Roberts and contemporary fiction by Chimamanda Ngozi Adichie during the bilingual book club meetings.
  travel: Jessica Merlo loves planning weekend road trips to nearby winery towns such as Vineland and Cedar Creek, and they keep a bucket‑list destination of the lavender fields of Provence, France, which
    they hope to explore once their own transport service is operational, while balancing travel with family responsibilities and budget constraints.
  culinary: Jessica Merlo is an accomplished home cook who specializes in hand‑rolled tamales stuffed with pork and roasted poblanos, a slow‑cooked mole sauce simmered with dried chilies, chocolate, and
    spices, and they grow their own cilantro, oregano, and jalapeño plants to enhance each dish with fresh, home‑grown flavor.
  core: Jessica Merlo blends a practical, routine‑driven work ethic with lively sociability, turning long hauls into community‑building moments while juggling a passion for traditional cooking, gardening,
    and a dream of running her own transport service.
background:
  cultural: Jessica’s Mexican heritage is a central part of her identity. Born to Mexican immigrant parents, she grew up speaking Spanish at home and celebrating traditions such as Día de los Muertos, Las
    Posadas, and family quinceañeras. Living in Chino Hills, she balances Mexican customs with Southern Californian influences, participating in local festivals and maintaining strong ties with the Mexican‑American
    community. Her Catholic faith, devotion to family, and love for Mexican cuisine shape her daily routines, while her bilingual abilities allow her to serve both English‑ and Spanish‑speaking customers
    with cultural sensitivity.
