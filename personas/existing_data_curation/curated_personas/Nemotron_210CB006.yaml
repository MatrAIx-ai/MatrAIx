  career_goals: Eugene remains motivated to apply his experience toward meaningful community impact as he approaches retirement. He aims to mentor emerging programmers, particularly those from underrepresented
    groups, through workshops at the local community college and informal one-on-one coaching. He is committed to developing a sustainable digital platform that records and teaches the Blackfeet language,
    hoping to launch a pilot app within the next three years. Additionally, Eugene seeks to serve as a technical advisor for his tribal council, helping modernize IT infrastructure while safeguarding cultural
    protocols. By combining his programming expertise with his heritage, he aspires to leave a lasting legacy that supports cultural preservation and empowers the next generation of technologists.
