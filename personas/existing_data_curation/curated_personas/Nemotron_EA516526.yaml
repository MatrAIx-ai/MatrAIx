personas:
  professional: Dewi Slaton, a seasoned bank teller with a talent for meticulous cash handling and fraud detection, leverages their calm, detail‑oriented nature and love of routine to keep branch operations
    running smoothly while quietly mentoring new staff.
  sports: Dewi Slaton, a devoted member of the Green Mountain Hiking Club, enjoys early‑morning birdwatching hikes, quietly supports the Boston Red Sox and New England Patriots, and chooses low‑impact garden‑based
    exercise over high‑intensity sports.
  arts: Dewi Slaton finds solace in the pages of Hilary Mantel’s historical novels and the strains of Beethoven’s Symphony No. 9, often pairing a quiet reading session at the local library with the soothing
    cadence of a Bach piano concerto while crocheting.
  travel: Dewi Slaton prefers meticulously planned, low‑key trips to historic towns such as Bath, England, and the colonial charm of Williamsburg, Virginia, where they can wander museums at a leisurely
    pace and stay in quiet B&Bs that provide a garden to tend.
  culinary: Dewi Slaton enjoys baking crusty sourdough loaves and apple‑cinnamon pies, seasoning them with rosemary and thyme from their own garden, and often pairs meals with a cup of Earl Grey tea.
  core: Dewi Slaton is a calm, detail‑driven teller who finds quiet joy in classic literature, crocheting, and disciplined budgeting, all while tending a modest garden and chasing sunrise birds.
background:
  cultural: Born and raised in Stamford, Vermont, Dewi comes from a lineage of New England families of English descent who have lived in Bennington County for generations. Her upbringing in a small, rural
    community emphasized self-reliance, modesty, and neighborly support. While identifying as white, Dewi’s cultural identity is shaped by the seasonal rhythms of the Vermont countryside, participation
    in the local Congregational church, and a deep appreciation for the region’s historical traditions. These influences foster her values of practicality, kindness, and calm resilience.
attributes:
  skills: '["Cash handling", "Transaction processing", "Reconciliation", "Fraud detection", "Banking software proficiency", "Attention to detail", "Organizational habits", "Customer service", "Basic bookkeeping",
