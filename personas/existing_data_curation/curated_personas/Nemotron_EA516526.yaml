  hobbies: '["Reading historical fiction", "Knitting and crocheting", "Gardening", "Birdwatching", "Walking on nature trails", "Listening to classical music", "Baking"]'
  career_goals: She aims to deepen her expertise in financial operations while maintaining the structured, low-stress environment she values. Over the next few years Dewi hopes to become a senior teller
    or branch operations specialist, where she can oversee transaction accuracy and mentor new staff. She plans to earn a community-college certificate in financial services to formalize her knowledge,
    and she is open to transitioning to a back-office compliance role that offers more solitude and fewer customer interactions. Her long-term ambition is to retire with a sense of financial security and
    having contributed to a reliable, well-run branch.
