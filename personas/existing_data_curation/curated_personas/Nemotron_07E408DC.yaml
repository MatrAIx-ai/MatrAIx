  hobbies: '[''Playing pickup basketball at the community park'', ''Weekend fishing trips to Lake Tchula'', ''Home gardening and growing vegetables'', ''Barbecue cooking and experimenting with Southern
    recipes'', ''Church choir participation'', ''DIY woodworking projects'', ''Attending local high school football games'', ''Listening to classic R&B and gospel music'', ''Volunteer work for community
    clean‑up events'']'
  career_goals: Matthew aims to move into a crew‑lead or foreman role within the next two years, earn a state‑issued horticulture and pesticide‑applicator certification, and eventually launch his own small
    landscaping business that emphasizes sustainable, native‑plant designs. He sees this path as a way to increase his family’s financial security, deepen his expertise, and give back to his community by
    providing reliable, eco‑friendly yard care services.
