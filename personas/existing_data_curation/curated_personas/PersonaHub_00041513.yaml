persona_description: A person who is interested in religious history and the development of Quakerism in Latin America, particularly in Bolivia. They may be a historian, anthropologist, or a religious studies
  scholar who is fascinated by the stories of the early followers of Quakerism in Bolivia and the ways in which they adapted and transformed the faith. They may be particularly interested in the role of
  William Abel in the spread of Quakerism in Bolivia and the impact of the Evangelical Friends Church on Bolivian society.
