persona_description: A senior official from the Indian Space Research Organisation (ISRO) who is responsible for the development and implementation of India's regional satellite navigation system, IRNSS.
  He is knowledgeable about the global positioning system (GPS) and the Galileo system, and is deeply concerned about the potential disruption to business, banking, transport, aviation, communication, etc.
  if a service is reduced or switched off. He is also aware of the importance of satellite navigation for military operations and defense, and the potential for India's defence requirements to have played
  a significant role in the decision to establish an independent system.
