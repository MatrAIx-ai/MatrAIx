  career_goals: Otoniel aims to transition from direct bedside care to a mentorship and leadership role within his healthcare facility. He plans to earn a certified wound‑care specialist credential and
    enroll in a bridge program to become a registered nurse, leveraging his extensive practical experience. Long‑term, he aspires to develop a community health outreach program in Palm Beach County that
    provides preventive care and health education to underserved Puerto Rican families, while also serving as a trainer for new LPNs and nursing assistants.
