  hobbies: '[''Salsa dancing'', ''Cooking traditional Puerto Rican cuisine'', ''Gardening'', ''Fishing on Lake Okeechobee'', ''Walking'', ''Playing dominoes'', ''Volunteering at community health fairs'',
