persona_description: A metallurgist who specializes in hardness testing and the use of specialized indenter tools such as the Knoop indenter. They are skilled in the application of load and indenter combinations
  to determine the Rockwell hardness of materials and are familiar with the various scales and applications of hardness testing. They are also knowledgeable about the limitations and potential issues with
  hardness testing, such as the effects of surface roughness, the thickness of the specimen, and the rate of load application.
