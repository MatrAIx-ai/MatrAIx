personas:
  professional: Suzana Fuller, a 23‑year‑old freelance web‑designer and landscape photographer, blends self‑taught HTML/CSS expertise with a prairie‑inspired visual style, delivering low‑maintenance sites
    for local small businesses while treating each client project as a strategic chess match they relish.
  sports: Suzana Fuller spends her free time trekking the rolling plains with the Burns Flat Trail Club, cheering on the Oklahoma State Cowboys football team from the bleachers, and maintaining fitness
    through solo trail runs and occasional yoga sessions, preferring solitary movement over team sports they rarely join.
  arts: Suzana Fuller immerses herself in contemporary fiction by Sally Rooney, true‑crime podcasts like 'My Favorite Murder', and the stark black‑and‑white landscapes of Ansel Adams, while curating her
    own photo series of Great Plains sunsets and listening to the nostalgic melodies of R.E.M. and Phoebe Bridgers, which they replay during evening editing marathons.
  travel: Suzana Fuller favors low‑key, solo road trips that blend hiking and photography, having explored the Badlands National Park and the rugged canyons of New Mexico, and dreaming of a sunrise shoot
    at Iceland’s Jökulsárlón, all planned with a flexible itinerary that they adjust on the fly to stay within a modest budget.
  culinary: Suzana Fuller enjoys experimenting with southwestern comfort dishes—spicy chicken‑fried steak, black‑bean chili, and rosemary‑infused cornbread—while harvesting fresh tomatoes and herbs from
    her modest garden for home‑cooked meals, though they occasionally burn the edges of a sourdough loaf before realizing the oven’s timer was set wrong.
  core: Suzana Fuller, a 23‑year‑old solitary strategist with a love for prairie hikes and camera clicks, builds freelance websites from her porch, saves diligently for a future bed‑and‑breakfast, and still
    misplaces their keys on a daily basis, a habit they blame on their love of distraction.
background:
  cultural: Suzana grew up in the small‑town environment of Burns Flat, Oklahoma, where Midwestern values of self‑reliance, modesty, and community are deeply ingrained. Her family has roots in both agriculture
    and the regional oil industry, giving her a practical appreciation for hard work and the land. Local cultural touchstones—county fairs, high school football gatherings, and church social events—have
    shaped her sense of belonging, though she now prefers quieter, solitary spaces. The broad, open landscapes of the Great Plains influence her love of hiking and photography, while the region's blend
    of traditional Protestant ethics and a growing awareness of Native American heritage informs her respectful, yet individualistic, worldview.
attributes:
  skills: '["HTML/CSS web design", "WordPress site maintenance", "Digital photo editing (Adobe Lightroom)", "Basic auto maintenance", "Sustainable gardening", "Budgeting and personal finance", "Strategic
    game play (chess)", "DIY home repair"]'
  hobbies: '["Reading contemporary fiction", "Listening to true‑crime podcasts", "Solo hiking", "Landscape photography", "Bird‑watching", "Journaling", "Experimenting with cooking", "Online chess", "DIY
    home improvement projects"]'
  career_goals: Suzana aims to turn her digital skills into a flexible, home‑based freelance business. She envisions offering website setup and maintenance services to small local enterprises while marketing
    her landscape photography through an online portfolio and print sales. In the longer term, she hopes to combine her love of hospitality and rural living by converting a portion of the family property
    into a modest bed‑and‑breakfast, leveraging her budgeting know‑how and personal finance expertise to create a sustainable venture. She values autonomy and seeks a career path that lets her work independently,
    without the constraints of a traditional office schedule.
