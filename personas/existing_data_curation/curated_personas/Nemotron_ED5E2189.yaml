personas:
  professional: Juan Troche, a 20‑year‑old aspiring general contractor, blends hands‑on carpentry mastery with construction‑management studies, and they methodically read blueprints, estimate costs, and
    champion reclaimed‑wood projects while fiercely competing in local craft contests to showcase sustainable design.
  sports: Juan Troche stays active by playing pick‑up soccer at the neighborhood park with the local "Saturday Strikers" crew, cheering the Dallas Cowboys in the NFL season, and they also join a weekend
    ultimate‑Frisbee league, balancing a competitive drive with a social love for team camaraderie.
  arts: Juan Troche finds inspiration at community festivals featuring mariachi bands like Los Camperos and folk singers such as Lila Downs, enjoys streaming classic regional tunes by Antonio Aguilar, and
    they relax to the cinematic scores of Guillermo del Toro while sketching furniture designs.
  travel: Juan Troche prefers road trips that blend adventure and cultural immersion, having explored the historic streets of Oaxaca and the eco‑lodges of Costa Rica, and they dream of a future pilgrimage
    to Barcelona’s modernist architecture to study sustainable design.
  culinary: Juan Troche cooks family recipes with confident flair, mastering tacos al pastor with pineapple‑marinated pork, slow‑cooked tamales wrapped in corn husks, and they experiment with chipotle‑infused
    sauces while using reclaimed‑wood cutting boards they crafted themselves.
  core: Juan Troche is a methodical, socially driven DIY enthusiast who balances fierce competition in carpentry with a love for community sport, and they manage frugal finances while savoring flavorful
    home cooking.
background:
  cultural: Juan was raised in a bilingual Mexican‑American household in the Greater Houston area, speaking Spanish at home and English at school. His parents immigrated from Jalisco, bringing traditions
    such as Día de los Muertos altars, posada celebrations, and a strong emphasis on familismo and collective responsibility. Growing up in New Caney, Texas, Juan has been shaped by both the vibrant Mexican
    community and the wider Texan culture, which fosters a pragmatic work ethic and the value of self‑reliance. These cultural influences inform his approach to carpentry—honoring the craftsmanship of Mexican
    artisans while meeting the practical demands of modern construction.
attributes:
