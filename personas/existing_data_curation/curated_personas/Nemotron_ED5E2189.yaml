  hobbies: '[''soccer'', ''DIY woodworking'', ''cooking Mexican cuisine'', ''listening to mariachi music'', ''attending community festivals'', ''volunteering with Habitat for Humanity'', ''playing video
    games (FIFA)'', ''exploring smart‑home technology'']'
  career_goals: Juan aims to become a licensed general contractor within the next five years, building on his carpentry foundation and completing an associate degree in construction management. He aspires
    to integrate eco‑friendly techniques into custom woodworking projects that reflect his Mexican heritage, eventually opening a boutique workshop that offers sustainably sourced furniture and culturally
    inspired home fixtures. Competitive by nature, he plans to participate in local craft competitions and gain recognition as a master carpenter. He also hopes to mentor younger apprentices and contribute
    to community build‑out programs such as Habitat for Humanity, leveraging his organizational skills to lead collaborative projects.
