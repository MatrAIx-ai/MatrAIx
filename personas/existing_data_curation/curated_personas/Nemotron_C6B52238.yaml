  career_goals: As he approaches retirement age, Joshua aims to transition into a senior information specialist role where he can mentor younger clerks and shape the front‑office operations of Lebanon City
    Hall or the local library. He desires a part‑time or flexible schedule that reduces his anxiety while allowing him to continue contributing to the community. Leveraging his curiosity about art, he plans
    to curate rotating exhibits in public lobbies and lead guided tours of historic sites, integrating cultural programming into his work. Joshua also hopes to earn a basic certification in archival management
    to support local historical preservation initiatives and to volunteer as a peer‑support facilitator for seniors dealing with anxiety and stress.
