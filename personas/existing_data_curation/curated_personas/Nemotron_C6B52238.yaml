personas:
  professional: Joshua Bakhshi leverages three decades of front‑desk expertise at municipal offices, excelling in telephone etiquette, appointment coordination, and meticulous record‑keeping, while their
    curiosity about local art and sociable, outgoing nature drives a collaborative approach that balances strict organization with the flexibility needed to mentor junior clerks and curate community exhibits.
  sports: Joshua Bakhshi enjoys cheering on the St. Louis Cardinals in baseball, the Kansas City Chiefs in football, and the St. Louis Blues in hockey while staying active by walking twice weekly with the
    Lebanon Senior Walking Club along the Osage River and joining the local community center’s senior badminton league each summer.
  arts: Joshua Bakhshi paints tranquil watercolors of Missouri’s rural horizons inspired by Winslow Homer, strums acoustic renditions of Bob Dylan and Gillian Welch at community gatherings, volunteers for
    set design and ushering with the Lebanon Community Theatre, and regularly attends exhibits featuring regional folk artist Jane Smith and Tennessee Williams productions at the Missouri Repertory Theatre.
  travel: Joshua Bakhshi favors modest, well‑planned road trips that blend scenic nature and cultural heritage, having explored the Ozark National Scenic Riverways and the historic streets of Savannah,
    Georgia, while dreaming of a relaxed pilgrimage to New Orleans for its jazz festivals and a gentle cruise along the Canadian Great Lakes, all balanced against a fixed retirement budget.
  culinary: Joshua Bakhshi, an intermediate home cook, delights in preparing Southern‑inspired meals such as pan‑fried catfish with cornbread, heirloom tomato and basil salad drizzled with balsamic reduction,
    and herb‑infused vegetable stew featuring garden‑grown rosemary and sage, while also savouring fresh produce from the local farmer’s market.
  core: Joshua Bakhshi balances a lifelong love for community arts and diligent front‑desk work with a habit of checking emails at midnight, occasional over‑cautious budgeting, and a vibrant anxiety that
    fuels both meticulous record‑keeping and heartfelt watercolor sketches of the Osage River.
background:
  cultural: Joshua is a white Midwestern American whose family traces its roots to early 20th‑century German and Irish immigrants who settled in rural Missouri. Raised in a small town, he internalized the
    region's values of community cohesion, modesty, and self‑reliance. He actively participates in local traditions such as county fairs, church potlucks, and seasonal festivals, while also embracing newer
    cultural expressions introduced through regional art initiatives. His upbringing combined a strong work ethic with an appreciation for practical crafts, music, and the natural environment, shaping an
    open‑minded yet grounded worldview.
