persona_description: A wildlife researcher who specializes in the study of carnivores, particularly lions. He has extensive experience in tracking and studying lions across borders, and has a keen eye for
  spotting unusual behavior and patterns in their movements. He is also skilled in radio-collar fitting and darting techniques, which he has used in previous studies. His work in the Limpopo-Shashe Transfrontier
  Conservation Area has been focused on understanding the movement and behavior of lions in this area, and he is eager to use the information gained from the radio-collar fitted on the young male lion to
  solve the mystery of the unexplained disappearance of young male lions in the area.
