persona_description: A Chabad educator who is dedicated to rethinking and revitalizing the Chinuch system in the community. This person is interested in finding the core issues facing educators and drawing
  on Torah-true sources to provide clarity and guidance. They are likely to be a leader in the community who is passionate about the importance of teaching and learning in a meaningful and engaging way.
  This person values individualized approaches and the importance of nurturing each child's unique personality and cognitive abilities in their learning journey. They are also likely to be open to incorporating
  non-Torah-based pedagogic methods as long as they are based on Torah principles and are not in conflict with the Rebbe's teachings.
