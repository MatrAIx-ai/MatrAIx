  hobbies: '[''Visiting art galleries and museums'', ''Reading contemporary fiction, art history, and social‑justice literature'', ''Sketching and street photography'', ''Bullet journaling and planner organization'',
    ''Cooking soulful Southern‑inspired dishes'', ''Experimenting with plant‑based recipes'', ''Participating in a monthly book club'', ''Volunteering at community youth centers'', ''Attending live music
    and cultural events'', ''Practicing yoga'']'
  career_goals: Tanica aims to advance from a general office clerk to a senior administrative role, such as Office Manager or Administrative Supervisor, within the next five years. She plans to earn an
    associate degree in Business Administration and obtain a Certified Administrative Professional (CAP) credential to strengthen her qualifications. Parallel to her career growth, she aspires to merge
    her passion for the arts with her administrative expertise by eventually working for a cultural institution or museum in Dallas, where she can manage programs, coordinate events, and support community
    outreach. Long‑term, Tanica hopes to mentor younger Black women entering the workforce, sharing her experiences and fostering professional development within her community.
