  hobbies: '["Cartoon drawing", "Minecraft/modding", "Creative writing (fantasy)", "Soccer", "Acoustic guitar", "School drama club (acting)", "Listening to music (reggaeton, cumbia, mariachi)", "Beachcombing",
    "Community festivals (Fiesta de la Gente, Día de los Muertos)"]'
  career_goals: Jonatan dreams of becoming a concept artist and video game designer, creating immersive worlds that blend Mexican folklore with modern sci‑fi aesthetics. He also envisions a future as a
    multimedia storyteller—producing animated shorts, YouTube content, or graphic novels that showcase his imagination. To pursue these goals, he plans to attend an art‑focused high school, build a portfolio,
    and later study visual arts or game development at a university. While he is fascinated by the Gulf Coast’s marine life, he considers integrating environmental themes into his creative projects as a
    possible niche.
