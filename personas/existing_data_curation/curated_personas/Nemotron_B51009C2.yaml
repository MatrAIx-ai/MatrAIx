personas:
  professional: Jonatan Crawford is a budding comic artist and Minecraft world builder whose vivid imagination fuels intricate storytelling, while their relaxed attitude toward deadlines fuels spontaneous
    creative sprints, and their competitive streak pushes them to out‑draw classmates in the school art club.
  sports: Jonatan Crawford plays forward for the Red Dragons youth soccer team at the local park, idolizes the agility of Lionel Messi, follows MLS matches especially the Houston Dynamo, and occasionally
    joins school basketball pick‑ups for extra cardio.
  arts: Jonatan Crawford crafts comic panels inspired by the whimsical humor of 'Adventure Time' and the dynamic layouts of Stan Lee, strums acoustic renditions of Bad Bunny's reggaeton beats and classic
    mariachi tunes, and shines in drama club improv sketches where they channel the quick wit of Deadpool.
  travel: Jonatan Crawford loves weekend trips to the Gulf’s sun‑kissed beaches like Galveston, dreams of backpacking through Barcelona’s Gothic Quarter to soak up street art, and plans a family road‑trip
    to the Grand Canyon, balancing school homework with a limited allowance that steers them toward budget‑friendly hostels and camping.
  culinary: Jonatan Crawford enjoys cooking spicy fish tacos with fresh lime and cilantro, experiments with homemade guacamole and salsa roja while multitasking between Minecraft builds, and despite their
    enthusiasm often ends up burning the grilled cheese sandwich during a hurried snack break.
  core: Jonatan Crawford is a 13‑year‑old imagination powerhouse who blends comic art, Minecraft world‑crafting, and soccer, yet habitually forgets to tidy their room and occasionally splurges on impulse
    purchases.
background:
  cultural: Jonatan comes from a Mexican‑American family in Corpus Christi, where Spanish is spoken at home and family gatherings celebrate traditions such as Día de los Muertos, quinceañeras, and Mexican
    cuisine like tacos al pastor and pozole. He blends the coastal Texan lifestyle—seafood, Gulf festivals, and beach outings—with Mexican cultural values of family unity, respect for elders, and Catholic
    observances. Bilingualism and a vibrant local street‑art scene influence his artistic expression, and folklore figures like La Llorona and charro motifs often appear in his sketches. These blended cultural
    experiences shape his worldview and creative voice.
attributes:
  skills: '["Sketching and drawing", "Storytelling and creative writing", "Basic digital art (Procreate, Krita)", "Introductory coding (Scratch, block programming)", "Acoustic guitar (basic chords)", "Group
