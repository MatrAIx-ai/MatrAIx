persona_description: A historian who specializes in the study of seigneurial agriculture and manorial economics, particularly in Austria during the Early Modern period. They are interested in exploring
  the socio-ecological relations between landlords and peasants, their farms, animals, and fields, and how they interacted with the broader landscape. They are looking for detailed insights into manorial
  resource use and the distribution of central resources within manorial agriculture. They are also interested in using socio-ecological methods to challenge the assumption of agricultural stagnation and
  to fill the blind spot in Austria's agricultural landscape.
