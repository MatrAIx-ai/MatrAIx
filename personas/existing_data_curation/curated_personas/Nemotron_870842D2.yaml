  hobbies: '[''Desert hiking and bird‑watching'', ''Gardening (tomatoes, chilies, herbs)'', ''Reading historical biographies and true‑crime books'', ''Participating in a local book club'', ''Cooking Mexican‑inspired
    cuisine'', ''Playing cards with friends at the senior center'', ''Attending Mesa State Fair'', ''Vintage car restoration'', ''Learning basic conversational Spanish'']'
  career_goals: Michael aims to formalize his extensive experience by earning a Certified Nursing Assistant (CNA) credential within the next year, enhancing his professional credibility and opening pathways
    to supervisory roles. He envisions mentoring junior aides at his agency, developing training modules that blend established care protocols with emerging best practices. Long‑term, he hopes to contribute
    to community elder‑care initiatives in Mesa, perhaps leading volunteer workshops on safe home‑care practices and advocating for resources for underserved seniors. While planning for a gradual transition
    toward part‑time work as he approaches retirement, Michael also wants to ensure his financial stability and maintain the ability to support his spouse.
