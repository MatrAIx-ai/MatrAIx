  hobbies: '["Painting", "Sketching", "Photography", "Visiting art galleries", "Reading contemporary fiction", "Cooking Asian‑Southern fusion dishes", "Gardening", "Karaoke", "Community theater", "Attending
    cultural festivals"]'
  career_goals: Approaching retirement, Wei aims to transition from full‑time retail work to a part‑time consulting role, helping small local businesses improve their customer experience and visual presentation.
    He envisions opening a modest community art shop that doubles as a gallery for local artists, providing a space for cultural exchange. Additionally, Wei wants to volunteer as an art curator at the Ellisville
    public library, mentor younger retail workers, and organize a senior‑citizen social club that blends storytelling, art workshops, and cultural celebrations.
