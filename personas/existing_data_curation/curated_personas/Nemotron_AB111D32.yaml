personas:
  professional: Wei Yamauchi leverages three decades of retail expertise and a natural flair for visual storytelling to help local merchants enhance customer experience and store aesthetics, and they thrive
    as a charismatic event organizer and budding community art shop founder.
  sports: Wei Yamauchi enjoys low‑impact activities like morning walks in the Ellisville park and weekly badminton games at the senior center, follows the Ole Miss Rebels football team and the Jackson Generals
    baseball club with fervor, and they occasionally join a local fishing club for weekend outings.
  arts: Wei Yamauchi immerses themselves in watercolor painting of Mississippi’s river bends, captures candid moments at community festivals with a DSLR, admires the works of Claude Monet, Georgia O'Keeffe,
    and local artist John Doe, and they often curate rotating exhibits at the Jackson Museum of Art.
  travel: Wei Yamauchi prefers relaxed road trips that blend cultural festivals with scenic stops, has visited Savannah’s historic squares, a historic eastern city famed for cherry‑blossom gardens, the
    bustling night markets of Bangkok, and the blues clubs of New Orleans, and they plan future journeys to the Gulf Coast islands for sunrise painting sessions.
  culinary: Wei Yamauchi delights in East‑Western fusion cooking, frequently prepares shrimp and grits glazed with miso‑ginger sauce, lo mein with catfish and collard greens, seasons dishes with gochujang
    and fresh herbs, and they admit to sometimes over‑salting recipes in their enthusiasm.
  core: Wei Yamauchi is a talkative, art‑loving community builder who worries often, balances meticulous financial planning with occasional indulgences, and at 61 is transitioning from retail to consulting
    while dreaming of a neighborhood gallery.
background:
  cultural: Wei is of mixed Chinese‑Japanese descent; his given name "Wei" reflects a Chinese lineage while his family name "Yamauchi" is Japanese. Raised in a bilingual household, he celebrated both Chinese
    New Year and Japanese Obon alongside Southern traditions like Mardi Gras and community potlucks. Fluent in Mandarin, conversational in Japanese, and a native English speaker, Wei blends East Asian values
    of respect for elders and collective harmony with Southern hospitality. This dual cultural foundation informs his appreciation for art, his sociable personality, and his commitment to fostering community
    connections in Ellisville.
attributes:
  skills: '["Customer service", "Sales techniques", "Visual merchandising", "Inventory management", "Cash handling", "Conflict resolution", "Public speaking", "Event organization", "Art appreciation", "Basic
