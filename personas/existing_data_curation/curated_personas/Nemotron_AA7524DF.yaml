    team coordination"]'
  hobbies: '["Hiking in the Blackstone River Valley","Cycling around Worcester County","Home brewing craft beer","Woodworking projects","Hydroponic gardening","Reading science non‑fiction","Crossword puzzles","Cooking
    experimental recipes","Attending local indie concerts","Volunteering at community science outreach events"]'
  career_goals: Hunter aims to become a leading senior research scientist within five years, overseeing a multidisciplinary team focused on developing targeted therapies for genetic disorders. He plans
    to pursue a Ph.D. or equivalent advanced training to broaden his expertise in translational genomics. Long‑term, he aspires to secure independent research funding, possibly as a principal investigator
    at a university or biotech firm, and to translate his discoveries into a spin‑off startup that offers personalized medicine solutions. He values stable, well‑structured career pathways and seeks roles
    that balance rigorous scientific inquiry with opportunities for innovative problem‑solving.
