  career_goals: Although retired from formal employment, David aims to deepen his involvement with volunteer work. He hopes to become a regular mentor at the local senior center, assisting younger retirees
    with life‑skill workshops, and to join the board of the Kannapolis historical society. He also aspires to lead a weekly walking group for seniors, promoting health and social connection. His ambition
    is to leave a lasting positive impact on his community while maintaining a balanced, enjoyable lifestyle.
