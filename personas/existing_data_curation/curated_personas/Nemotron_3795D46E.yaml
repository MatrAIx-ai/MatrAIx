  hobbies: '["Gardening", "Quilting", "Woodworking", "Historical fiction reading", "Walking/Hiking", "Birdwatching", "Volunteer work at senior center", "Book club participation", "Craft fair exhibiting",
    "Cooking/baking"]'
  career_goals: Looking ahead, Clara aims to transition from frontline assembly to a mentorship and quality‑assurance role that leverages her deep experience while reducing physical strain. She plans to
    earn a Lean‑Six Sigma Green Belt and a certificate in additive manufacturing to stay current with emerging technologies. Ultimately, she hopes to become a trusted trainer for new hires, contribute to
    continuous‑improvement projects, and launch a modest side business creating handcrafted wooden home décor, blending her fabrication expertise with her love for woodworking.
