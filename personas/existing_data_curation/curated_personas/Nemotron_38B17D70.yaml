  hobbies: '["gardening", "fishing", "crocheting", "listening to country music", "volunteering at church community events", "watching DIY home-improvement videos", "hiking local trails", "reading mystery
    novels"]'
  career_goals: Megan aims to solidify her role as a go‑to maintenance professional by earning a GED and pursuing certifications in HVAC and electrical work. In the next few years she hopes to become a
    lead maintenance technician or shift supervisor at the local municipal facilities, overseeing a small team and handling the scheduling of preventive maintenance. Long‑term, she dreams of opening her
    own property‑management service that would allow her to apply her practical repair skills while providing more stable hours and financial security. She also wants to develop stronger organizational
    habits to reduce stress and increase reliability.
