personas:
  professional: Megan Robinson is a hands‑on maintenance technician at the municipal complex who leverages her solid carpentry, plumbing, and HVAC skills while balancing a love for structured preventive
    schedules with a flexible, improvisational approach when parts are scarce, often taking the lead on urgent repairs and coordinating teams despite occasional disorganization.
  sports: Megan Robinson stays active by fishing at Bear Creek, jogging through the shaded woods around Haleyville, cheering on the Alabama Crimson Tide football team each fall and attending Birmingham
    Barons baseball games on weekends, while occasionally joining a local women's softball league for casual competition.
  arts: Megan Robinson unwinds by crocheting blankets while listening to classic country icons Dolly Parton and George Strait and Southern rock legends Lynyrd Skynyrd, occasionally attending the local church’s
    choir performances and community theater productions of classic dramas.
  travel: Megan Robinson prefers low‑key road trips with a flexible itinerary, often visiting nearby destinations like the Great Smoky Mountains and Nashville for live music, while dreaming of an extended
    stay in Asheville’s Blue Ridge Mountains to combine hiking with craft workshops.
  culinary: Megan Robinson enjoys cooking with garden‑fresh tomatoes and peppers to make hearty tomato‑pepper stew and skillet‑fried catfish seasoned with cayenne and fresh herbs, favoring home‑cooked Southern
    comfort meals over restaurant dining while occasionally treating herself to a barbecue platter at the local smokehouse.
  core: Megan Robinson balances a practical, tool‑savvy mindset with a love for spontaneous garden projects, but often forgets to file maintenance logs on time, leading to a lingering habit of last‑minute
    scrambling.
background:
  cultural: Megan grew up in a working‑class, White Southern family in Haleyville, a small town in Winston County, Alabama. Her upbringing was steeped in the traditions of Southern hospitality, strong community
    ties, and a modest, self‑reliant ethic. The local Baptist church played a central role in family life, influencing her values of service, neighborliness, and conservatism. Regional culture—such as a
    love for country music, barbecue cuisine, and outdoor activities like hunting and fishing—shapes her everyday preferences. Though she experienced an early divorce, the close‑knit nature of her community
    has provided a support network that reinforces resilience and a sense of belonging.
attributes:
  skills: '["basic carpentry", "plumbing repairs", "electrical troubleshooting", "HVAC maintenance", "preventive maintenance scheduling", "tool inventory management", "safety inspections", "basic computer
