personas:
  professional: Michael Jones is a self‑taught technical support specialist turned aspiring UI/UX designer who leverages his hands‑on hardware repair expertise and vivid digital art skills to craft accessible
    web experiences for small Arkansas businesses, though his spontaneous nature sometimes makes deadline management a challenge.
  sports: Michael Jones enjoys hiking the Ozark foothills and birdwatching on weekends, plays pickup basketball at the local community center, and fervently follows the Arkansas Razorbacks football team
    while occasionally joining a Sunday softball league for fun.
  arts: Michael Jones immerses themselves in digital art inspired by Beeple and classic abstract painters, strums folk and blues tunes on guitar echoing Bill Monroe and B.B. King, and devours speculative
    fiction from Philip K. Dick and Ursula K. Le Guin, all while participating in a small‑town jam circle that blends bluegrass traditions with their own experimental flair.
  travel: Michael Jones prefers low‑key road trips that blend scenic nature with cultural stops, having driven to Austin for live music, explored the historic streets of Savannah, dreamed of chasing the
    northern lights in Iceland, and routinely visits the nearby Hot Springs National Park for weekend rejuvenation.
  culinary: Michael Jones favors Southern comfort food like fried catfish with hush‑puppy biscuits and apple pie baked with locally sourced honey, occasionally experiments with shrimp étouffée and spicy
    jambalaya, and enjoys cooking with fresh garden herbs while treating themselves to sushi rolls on rare indulgent nights.
  core: Michael Jones fuses Arkansas folk roots with a restless digital imagination, building UI prototypes by day, sketching abstract music on guitar by night, juggling a love for comfort food and occasional
    impulse buys, all while habitually losing track of deadlines.
background:
  cultural: Michael grew up in Emerson, a close‑knit community in Columbia County, Arkansas, where Southern hospitality and a strong sense of neighborly support are woven into everyday life. His upbringing
    was shaped by county fairs, church gatherings, and local traditions like bluegrass music and home‑cooked comfort food. While his roots reflect rural American values of self‑reliance and community service,
    Michael’s curiosity and online connections have exposed him to broader artistic and technological cultures, allowing him to blend local sensibilities with global creative influences.
attributes:
  skills: '[''PC hardware repair'', ''Software troubleshooting'', ''Python scripting'', ''JavaScript and web development'', ''Graphic design (Photoshop, Illustrator)'', ''Digital illustration'', ''UI/UX
    mock‑up creation'', ''Technical support and user assistance'', ''Basic 3D modeling (Blender)'']'
  hobbies: '[''Digital illustration and abstract painting'', ''Speculative fiction reading'', ''Hiking and birdwatching in the Ozarks'', ''Playing guitar (folk/blues)'', ''Indie game prototyping'', ''Volunteering
    at community coding club'']'
  career_goals: Michael aims to blend his technical know‑how with his creative passions by transitioning into a freelance UI/UX designer role, focusing on accessible and aesthetically engaging digital experiences
    for small businesses and community organizations in rural Arkansas. He plans to earn a professional certification in user experience design and eventually launch his own boutique digital studio that
    offers web design, branding, and tech tutoring services. A long‑term ambition is to develop a community tech education program that empowers seniors and youth with practical digital skills, fostering
    greater harmony and opportunity in his hometown.
