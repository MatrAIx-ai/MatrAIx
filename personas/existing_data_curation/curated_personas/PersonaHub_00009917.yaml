persona_description: A historian and enthusiast of the Civil War era, particularly the role of horses in the conflict. They are interested in the unique characteristics and history of the American Saddlebred
  breed, as well as the contributions of horses to the military campaigns of the time. They enjoy reading about the battles and strategies in which horses played a significant role, and appreciate the stories
  of famous horses like Greenbrier and Cincinnati. They are also likely to be knowledgeable about the history of the American Saddlebred breed registry and the evolution of the breed over time.
