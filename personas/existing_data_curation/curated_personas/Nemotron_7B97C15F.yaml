  career_goals: Though formal career planning is far beyond his years, Ryan frequently pretends to be a firefighter, doctor, or teacher in his imaginative play, roles that let him help and protect his peers.
    His parents nurture these fantasies, hoping they evolve into a genuine interest in service‑oriented professions such as emergency services, community health, or early childhood education.
