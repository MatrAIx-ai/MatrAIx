personas:
  professional: Ryan Olivier is an enthusiastic mini naturalist who turns backyard desert walks into early science adventures, using their boundless curiosity and practical tinkering to identify cacti and
    collect sand while their relaxed, disorganized play style keeps the experience delightfully open‑ended.
  sports: Ryan Olivier loves sprinting across the local park’s sand pit, kicking a ball with the Peoria Little Cypress Soccer Club’s toddler group, and cheering for the Phoenix Suns during family game nights,
    though their spontaneous nature often leads them to forget sunscreen before outdoor play.
  arts: Ryan Olivier is enchanted by Disney’s Frozen and the catchy rhythm of ‘Baby Shark,’ dances along to the classic ‘The Wheels on the Bus,’ and enjoys simple puppet shows at the Peoria Children’s Museum,
    where their love for storytelling blends with a habit of humming the songs long after the screen goes dark.
  travel: Ryan Olivier’s travel scrapbook of scribbles and stickers reveals a love for desert road trips to the Grand Canyon and Sedona, a dreaming desire to explore San Diego’s Balboa Park, and a preference
    for spontaneous pit stops at local ice‑cream trucks where they eagerly choose a vanilla cone.
  culinary: Ryan Olivier favors cheesy quesadillas with mild salsa, delights in banana pancakes at breakfast, and likes helping stir mashed potatoes in the family kitchen, though they often make a mess
    by dumping whole peas onto the floor during snack time.
  core: Ryan Olivier is a curious, high‑energy two‑year‑old who turns every desert hike into a science experiment, gets easily upset over tiny setbacks, and leaves a trail of toys and crumbs that perfectly
    mirrors their lively but disorganized spirit.
background:
  cultural: 'Ryan is raised in a predominantly white, middle‑class family in Peoria, Arizona, a suburb of Phoenix. His upbringing reflects typical Southwest suburban values: an emphasis on friendliness,
    community involvement, and practical day‑to‑day living. Family outings often involve desert hikes, visits to local parks, and participation in community events that feature regional foods and occasional
    exposure to Native American and Mexican cultural celebrations, adding subtle multicultural textures to his otherwise mainstream American background.'
