personas:
  professional: Carlos Aguilera is a seasoned electrician with deep expertise in residential and commercial wiring who blends his technical mastery of the National Electrical Code with a spontaneous, artist‑engineer
    mindset, creating custom LED installations and pursuing Master Electrician licensure while they envision a boutique firm that couples sustainable power retrofits with community mentorship.
  sports: Carlos Aguilera is an avid hiker of the Columbia River Gorge, a seasonal fan of the Seattle Seahawks and Sounders FC who attends a local adult soccer league on weekends, and they maintain modest
    cardio through sunrise jogs while preferring low‑impact activities to avoid aggravating their back.
  arts: Carlos Aguilera merges his love for light art inspired by James Turrell and Olafur Eliasson with watercolor landscapes reminiscent of Ansel Adams, strums acoustic guitar covers of John Mayer, avidly
    reads the works of Isaac Asimov and Octavia Butler, and they actively participate in community art workshops and festivals that celebrate multicultural expression.
  travel: Carlos Aguilera prefers road trips that blend art and nature, having explored the light festivals of Kyoto, the volcanic landscapes of Iceland, and family gatherings in Oaxaca to sample authentic
    mole, while they are planning future hikes along Patagonia’s Torres del Paine and a pilgrimage to the desert installations of Burning Man.
  culinary: Carlos Aguilera is a proficient home chef who delights in slow‑cooking mole poblano with dried chilies, chocolate, and toasted spices, crafts tender tamales with masa and pork, spices up local
    salmon fillets with cilantro‑lime glaze, and they often pair meals with craft beer while improvising recipes during community potlucks.
  core: Carlos Aguilera is a 44‑year‑old electric‑artisan who fuses circuitry and canvas, wrestles with deadline chaos, and they find calm in sunrise hikes, homemade mole, and mentoring future tradespeople.
background:
  cultural: Carlos was raised in a Mexican‑American household in the Pacific Northwest, where Spanish was spoken at home and Mexican traditions such as Día de los Muertos, quinceañeras, and family‑centered
    celebrations were integral. His parents immigrated from Jalisco, bringing a deep appreciation for craftsmanship, music, and communal solidarity. Growing up in Pasco, WA, he blended this heritage with
    the region’s outdoors‑oriented lifestyle, fostering a respect for both cultural rituals and the natural environment. This bicultural background informs his work ethic, his penchant for integrating vibrant
    Mexican motifs into his lighting designs, and his commitment to serving a diverse community.
attributes:
  skills: '[''Residential wiring'', ''Conduit and cable installation'', ''Circuit troubleshooting'', ''Low‑voltage LED lighting design'', ''Arduino microcontroller programming'', ''Solar panel installation
