  hobbies: '[''Interactive LED sculpture building'', ''Arduino and Raspberry Pi tinkering'', ''Watercolor painting'', ''Photography of nature'', ''Hiking in Columbia River Gorge'', ''Science‑fiction reading'',
    ''Acoustic guitar playing'', ''Cooking Mexican cuisine'', ''Attending cultural festivals'', ''Community art workshops'']'
  career_goals: Carlos aspires to obtain a Master Electrician license within the next two years and eventually launch his own boutique electrical contracting firm that specializes in custom artistic lighting
    and renewable‑energy retrofits for homes and small businesses in the Tri‑Cities region. He plans to pursue certifications in solar photovoltaic systems, low‑voltage art installations, and advanced safety
    standards. In addition, he hopes to mentor apprentices from underrepresented backgrounds, integrating his passion for creativity with a stable, community‑focused career that reduces stress through flexible
    scheduling.
