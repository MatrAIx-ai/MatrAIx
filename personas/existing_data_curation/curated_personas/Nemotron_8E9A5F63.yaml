  hobbies: '[''Hiking'', ''Fishing'', ''Gardening'', ''Cooking'', ''Acoustic guitar'', ''Volunteer tax assistance'', ''Reading self‑help books'', ''Strategy board games'', ''Home‑brewing coffee'', ''Craft
    beer festivals'']'
  career_goals: Antonio aims to become a senior audit manager within the next five years, securing his CPA credential if not already obtained, and leading a high‑performing audit team that emphasizes ethical
    standards and community impact. He aspires to launch a corporate social responsibility initiative that provides free financial‑literacy workshops for local families. Additionally, he seeks personal
    growth through stress‑management training and mindfulness practices to better handle his anxiety and maintain a balanced work‑life harmony.
