  hobbies: '[''Soccer league'', ''Biking'', ''Live music concerts'', ''Volunteer work (food pantry, animal shelter)'', ''Gardening'', ''Coffee shop outings'', ''DIY home improvement'']'
  career_goals: Jessica aims to earn a Certified Transportation Professional (CTP) credential and complete an associate's degree in logistics within the next two years. She aspires to transition from her
    current supervisory role to an operations manager position, where she can implement sustainable, green logistics initiatives for her company. Long‑term, she envisions establishing a mentorship program
    for new supervisors and perhaps consulting on efficiency projects for regional warehouses, all while balancing her career advancement with a healthier work‑life rhythm to reduce stress.
