  career_goals: Julien aims to transition from frontline driving to a supervisory role within the next three years, pursuing a Certified Transportation Professional (CTP) credential and a logistics management
    certification to strengthen his strategic expertise. He envisions becoming a fleet manager where he can mentor younger drivers, implement advanced telematics for safety and efficiency, and refine operational
    processes. Long‑term, Julien aspires to launch a small, family‑owned trucking enterprise that combines reliable freight services with a focus on community employment, leveraging his practical knowledge
    and curiosity about emerging transport technologies while maintaining a stable income for his family.
