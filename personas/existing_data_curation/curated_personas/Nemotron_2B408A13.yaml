  career_goals: Craigory dreams of becoming someone who can combine his love of tech and helping others, such as a software engineer who designs educational games or a community youth mentor who teaches
    coding workshops. He is also fascinated by space exploration, so he imagines a future where he could work as an astronaut or a research scientist studying the stars. In the short term, he wants to earn
    the school’s "Science Fair Champion" title and join the robotics club, seeing these steps as preparation for a career that blends curiosity, practical problem‑solving, and community impact.
