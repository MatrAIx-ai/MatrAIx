personas:
  professional: Craigory Gittens, an aspiring young engineer, translates a curiosity for how things work into constructing elaborate LEGO structures and scripting animated stories on Scratch, approaching
    each project methodically while injecting a dash of creative flair they adore.
  sports: Craigory Gittens, a lively participant in the South Side youth basketball league and an enthusiastic forward for a local soccer club, mirrors the playing style of the Chicago Bulls and Chicago
    Fire while practicing three times a week, they value teamwork and the spirited rivalry that fuels their competitive edge.
  arts: Craigory Gittens, a devoted fan of hip‑hop and R&B icons like Kendrick Lamar and Beyoncé, practices steady drum beats on a practice pad, devours graphic novels such as 'Invincible' and 'Saga,' and
    frequents local community art workshops where they often sketch superhero mash‑ups that blend sci‑fi and action.
  travel: Craigory Gittens, whose weekend adventures include family trips to the Museum of Science and Industry and a day at the Shedd Aquarium, dreams of exploring the Kennedy Space Center in Florida and
    wishes to experience the bustling streets of Tokyo, preferring itineraries rich in interactive exhibits and hands‑on learning they can share with friends.
  culinary: Craigory Gittens, a self‑described 'pizza aficionado', enjoys a perfect slice of deep‑dish pizza topped with pepperoni and extra mozzarella, loves homemade chicken nuggets with a honey‑mustard
    dip, and occasionally helps their mother bake chocolate chip cookies, though they sometimes sneak extra chocolate chips when no one’s looking.
  core: Craigory Gittens balances a Lego‑building genius with a relentless curiosity for coding, yet occasionally forgets to finish school homework when a new video game teaser drops.
background:
  cultural: Craigory comes from an African American family rooted in Chicago’s vibrant South Side community. His household celebrates traditions such as Sunday gospel services, family barbecues featuring
    soul food staples like collard greens and fried chicken, and storytelling sessions where elders share histories of the Great Migration and local civil‑rights milestones. He is proud of his heritage,
    frequently wears clothing that reflects contemporary Black street culture, and enjoys music ranging from classic blues to modern rap. The neighborhood’s emphasis on resilience, mutual support, and academic
    achievement influences his organized, cooperative nature and fuels his aspiration to give back to his community through future technology‑focused mentorship.
