personas:
  professional: Emma Delmont, an aspiring medical records technician who leverages their Excel and Access expertise along with meticulous bookkeeping skills, channels their love for solitude and orderly
    routines into precise health data entry and documentation, ensuring every patient record is flawlessly organized.
  sports: Emma Delmont, a member of the St. Louis Urban Trail Runners club, finds solace in early‑morning jogs along the Mississippi River trail while cheering on the St. Louis Cardinals and Kansas City
    Chiefs, preferring low‑impact cardio over team sports to maintain their structured routine.
  arts: Emma Delmont, an avid fan of Ansel Adams’ black‑and‑white landscapes and Sufjan Stevens’ introspective indie folk, spends weekends editing nature photographs, knitting scarves to the rhythm of classical
    piano playlists, and curating a small collection of modern poetry by Mary Oliver that reflects their introspective nature.
  travel: Emma Delmont, who plans every trip on a spreadsheet, favors budget‑friendly road trips to the Ozark National Forest and weekend retreats in Asheville, while dreaming of a meticulously organized
    spring pilgrimage to Kyoto’s cherry‑blossom gardens that satisfies their love of order.
  culinary: Emma Delmont, a confident sourdough baker, perfects their crust with a blend of rye and spelt flours, enjoys crafting rosemary‑infused focaccia and seasonal ratatouille using garden‑fresh tomatoes,
    zucchini, and bell peppers, and often pairs meals with a glass of cold‑pressed apple cider.
  core: Emma Delmont, a 19‑year‑old perfectionist who thrives on solitary order, balances a love for data‑driven health work with quiet hobbies like gardening and puzzle‑solving, yet occasionally indulges
    in impulsive binge‑watching late at night that disrupts their otherwise regimented schedule.
background:
  cultural: Emma was raised in Iberia, a small town in Miller County, Missouri, embodying classic Midwestern values of modesty, hard work, and community responsibility. Her family participates in local
    traditions such as county fairs, church gatherings (predominantly Protestant), and holiday celebrations like Thanksgiving and Christmas. Growing up in a rural setting, she developed an appreciation
    for agriculture, outdoor recreation, and neighborly cooperation. While primarily identifying with a white Midwestern heritage, she has been exposed to the nearby Hispanic community, picking up a few
    Spanish phrases and an understanding of multicultural influences in the region.
attributes:
  skills: '[''Microsoft Excel'', ''Microsoft Access'', ''Data Entry'', ''Spreadsheet Modeling'', ''Basic Accounting'', ''Financial Record Keeping'', ''Research'', ''Technical Writing'', ''Basic Laboratory
