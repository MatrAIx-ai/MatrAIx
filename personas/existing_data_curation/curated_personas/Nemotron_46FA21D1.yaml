  hobbies: '[''Reading non-fiction'', ''Journaling'', ''Crossword puzzles'', ''Sudoku'', ''Logic games'', ''Vegetable gardening'', ''Baking sourdough bread'', ''Knitting'', ''Birdwatching'', ''Nature photography'',
    ''Listening to productivity podcasts'']'
  career_goals: Emma aims to secure a stable, structured position that allows her to work independently and apply her detail‑oriented skill set. She plans to complete an associate degree in Health Information
    Management and obtain certification as a Medical Records Technician. Long‑term, she envisions advancing into health data analysis or medical coding, seeking a reliable income that supports her personal
    goals and offers the predictability she values. She also hopes to continue professional development through short courses in data analytics and budgeting.
