  career_goals: Mark aims to continue his mail‑carrier role with the same reliability until his planned retirement at age 65, using the next two years to mentor newer carriers in route efficiency and customer
    service. He hopes to contribute to the postal service’s transition to more digital tracking tools by sharing his on‑the‑ground insights. After retirement, he plans to shift to a part‑time volunteer
    coordinator role at a local community center, focusing on senior outreach and art‑program facilitation. He also wants to maintain financial stability for his wife, support her gardening hobby, and travel
    to regional art festivals together.
