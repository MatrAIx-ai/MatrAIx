personas:
  professional: Walter Venuto is a budding junior team captain and aspiring engineer who leads the middle school soccer squad, coordinates Boy Scout service projects, and designs model rockets, using their
    love of structure and practical problem‑solving to keep practices on schedule and troubleshoot launch failures.
  sports: Walter Venuto plays midfield for the Eagle Ridge Middle School soccer team, trains three times a week with the local youth league, cheers for the professional club Coastal City FC, and follows
    the Lakeside Tigers basketball squad, balancing disciplined drills with weekend matches and occasional pickup games at the community park.
  arts: Walter Venuto pours creativity into piano lessons twice weekly, mastering Beethoven’s ‘Für Elise’ and the upbeat ‘Canon in D’ by Pachelbel, delights in the adventure series ‘Percy Jackson’ by Rick
    Riordan, and spends Saturday nights playing Settlers of Catan with friends while admiring Pixar’s animation in ‘Coco’ and the storytelling of Hayao Miyazaki’s ‘Spirited Away.’
  travel: Walter Venuto has already explored the Grand Canyon National Park on a family hike, spent a week camping at the family farm, visited Orlando’s Disney World for a birthday, and dreams of touring
    the Kennedy Space Center in Florida and the historic castles of Edinburgh, preferring organized itineraries with a mix of outdoor adventure and hands‑on learning.
  culinary: Walter Venuto loves helping in the kitchen, especially preparing homemade pizza topped with mozzarella, pepperoni, and fresh basil, stirring a vegetable stew with carrots, potatoes, and tomatoes
    harvested from the garden, and baking banana‑walnut bread, though they often sneak extra cheese when no one’s watching.
  core: Walter Venuto is an organized, energetic 11‑year‑old who balances soccer, piano, rockets, and scouting with a penchant for meticulous budgeting, occasional board‑game binge, and a habit of forgetting
    to take out the trash after a victory.
background:
  cultural: Walter grows up in Kingston, a small town in Ross County, Ohio, within a predominantly white, middle‑class Midwestern community. His family values hard work, community involvement, and modesty,
    frequently attending local church events, town festivals, and county fairs. The cultural rhythm emphasizes school sports, neighborly support, and participation in community service, shaping his appreciation
    for structure, collaboration, and civic responsibility.
