  career_goals: Walter envisions a future where he can serve his community in a structured, teamwork‑focused role. He is drawn to careers like firefighting or policing because they offer clear routines,
    disciplined training, and the opportunity to help others in emergencies. He also feels curious about engineering or automotive mechanics, where his practical problem‑solving skills could be applied.
