personas:
  professional: Ruben Hernandez, a 36‑year‑old community‑focused visual storyteller, blends his bilingual communication, digital photography expertise, and event‑coordination experience to design inclusive
    cultural programs, while his curiosity and balanced organization keep projects both innovative and reliably executed.
  sports: Ruben Hernandez enjoys weekend hikes in Griffith Park and the Santa Monica Mountains, follows the Los Angeles Lakers and LA Galaxy for inspiration, and participates in a local adult recreational
    soccer league, balancing low‑impact cardio with occasional pickup basketball games at a community center.
  arts: Ruben Hernandez immerses himself in Los Angeles’s contemporary art scene, drawing inspiration from artists like Kerry James Marshall, Frida Kahlo’s murals, and the street work of Shepard Fairey,
    while attending talks featuring curator Kristy Edmunds and performing acoustic renditions of indie songs by The National and classic cumbia by Los Ángeles Azules during community workshops.
  travel: Ruben Hernandez prefers thoughtfully planned trips that blend cultural immersion and photography, having explored the historic streets of Oaxaca, the vibrant markets of Medellín, and the coastal
    hikes of Big Sur, while dreaming of a future visit to the Andes to capture mural art in remote villages.
  culinary: Ruben Hernandez, an enthusiastic home chef, masters dishes like pupusas filled with cheese and loroco, yuca frita seasoned with garlic and lime, and experimental fusion tacos that pair traditional
    corn masa with Korean kimchi, showcasing his skillful blend of familiar flavors and adventurous ingredient pairings.
  core: Ruben Hernandez is a curious, organized creative who balances community art projects with gourmet pupusa experiments, often juggling impulsive camera upgrades and occasional late‑night binge‑watching
    of art documentaries.
background:
  cultural: Ruben grew up in a Salvadoran immigrant family in Los Angeles’s Pico‑Union neighborhood, where Spanish was spoken at home and English at school. His parents immigrated from El Salvador in the
    1980s, bringing with them traditions such as celebrating Semana Santa, Día de la Madre, and the annual August festivities honoring San Salvador, as well as the culinary heritage of pupusas, tamales,
    and atole. He participated in community celebrations at the local Salvadoran cultural center, which fostered his appreciation for Salvadoran folk art, especially vibrant mural painting and handcrafted
    textiles. The close‑knit family values emphasized hospitality, respect for elders, and mutual support, shaping his cooperative nature. Ruben remains actively involved in the diaspora community, attending
    church services, volunteering at holiday festivals, and mentoring younger Salvadoran‑Americans. This cultural upbringing informs his artistic sensibility and his desire to promote Salvadoran narratives
    within the broader LA cultural landscape.
