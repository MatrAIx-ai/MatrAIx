  hobbies: '[''Visiting museums and galleries'', ''Street photography'', ''Cooking Salvadoran dishes'', ''Reading art history'', ''Attending art talks and open studios'', ''Playing acoustic guitar'', ''Volunteering
    for youth art workshops'', ''Hiking and sketching in nature'']'
  career_goals: Ruben aspires to transition into a full‑time role in arts administration or cultural programming, ideally within a nonprofit organization that serves the Latin American community in Los
    Angeles. He wants to develop and lead a community art initiative that showcases emerging Salvadoran and broader Latin American artists, providing workshops, gallery exhibitions, and public murals. Over
    the next five years, he plans to enroll in a bachelor’s program in Arts Management or Cultural Studies to deepen his knowledge and credentials. He also envisions launching a small culinary‑cultural
    venture—such as pop‑up pupusa workshops or a mobile food concept—that pairs food with storytelling about Salvadoran heritage. Ultimately, he aims to become a recognized cultural curator and advocate,
    using his skills to bridge art, food, and community empowerment.
