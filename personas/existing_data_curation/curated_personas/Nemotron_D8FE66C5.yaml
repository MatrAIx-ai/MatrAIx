  hobbies: '[''Journaling'', ''Playing soccer in a local league'', ''Fitness training (gym)'', ''Cooking traditional Latin dishes'', ''Building model kits'', ''Reading thriller novels'', ''Listening to
    Latin music'', ''Volunteering at community events'']'
  career_goals: Daniel seeks a full-time role that offers clear expectations and a structured workflow, such as a logistics coordinator, office manager, or junior project analyst. He plans to finish his
    associate’s degree in Business Administration within the next year and to earn a Certified Associate in Project Management (CAPM) credential. Long-term, he aspires to lead a small team, develop efficient
    processes, and achieve financial stability that reduces his anxiety about the future.
