  hobbies: '[''Hip‑hop dance classes'', ''Karaoke nights with friends'', ''Cooking Southern comfort food'', ''Community volunteer work (shelters, church events)'', ''Urban photography'', ''Gym and strength
    training'', ''Attending live music concerts'', ''Exploring new coffee shops'', ''Improv comedy workshops'', ''Visiting art exhibits'']'
  career_goals: Latasha aims to move from laborer to forewoman or site supervisor within the next five years, leveraging her people‑skills to foster inclusive, harmonious work crews. She plans to enroll
    in a part‑time bachelor’s program in construction management while pursuing certifications in OSHA safety and leadership. Long‑term, she dreams of launching a community‑focused construction training
    nonprofit that offers apprenticeships to young Black individuals in Charlotte, helping them gain stable, well‑paid trades careers and promoting affordable housing projects for underserved neighborhoods.
