personas:
  professional: Latasha Paul is a seasoned construction laborer in Charlotte who excels at concrete pouring, framing, and crew coordination, blending hands‑on expertise with a knack for diffusing tension
    and mentoring new workers while juggling a part‑time study in construction management.
  sports: Latasha Paul fuels her fitness routine with strength training at a local gym, plays recreational basketball with the Charlotte Hornets youth league, and follows the Charlotte FC with fervor, balancing
    her physically demanding job with weekend pick‑up games.
  arts: Latasha Paul channels her love for hip‑hop and R&B by dancing at the Beat Lab studio, belting out karaoke classics like Beyoncé’s 'Love on Top', and collecting street‑art photography of Charlotte’s
    historic neighborhoods, while regularly attending live shows featuring artists such as J. Cole and H.E.R.
  travel: Latasha Paul prefers spur‑of‑the‑moment road trips, having explored New Orleans for its music and cuisine, spent a long weekend in Asheville’s artsy mountain town, and often scours Charlotte for
    new coffee roasters, all while budgeting trips around her certification fees.
  culinary: Latasha Paul takes pride in cooking soulful Southern dishes like fried chicken, collard greens, and sweet‑potato pie, perfecting the balance of spices with garlic‑infused collards, and enjoys
    pairing meals with freshly brewed pour‑over coffee from local roasters.
  core: Latasha Paul blends a hands‑on construction swagger with a vibrant social spirit, navigating spontaneous plans and calm resilience while championing community uplift through mentorship and soulful
    flavor.
background:
  cultural: Latasha is a proud African‑American woman raised in Charlotte’s vibrant Black community. Her family’s traditions—Sunday church gatherings, home‑cooked soul food, and neighborhood festivals—have
    shaped her values of compassion, cooperation, and resilience. Growing up in Mecklenburg County, she was influenced by the city’s mix of historic Black neighborhoods like Biddleville and the ongoing
    revitalization efforts, which sparked her interest in building and community improvement. Navigating a male‑dominated construction field, she draws strength from the legacy of Black laborers and tradespeople
    who have contributed to the South’s infrastructure, using her cultural identity to advocate for greater inclusion and mentorship within the industry.
attributes:
  skills: '[''Concrete pouring'', ''Framing and carpentry'', ''Site safety inspection'', ''Basic equipment operation (powertools, small excavators)'', ''Blueprint reading (basic)'', ''Team coordination'',
