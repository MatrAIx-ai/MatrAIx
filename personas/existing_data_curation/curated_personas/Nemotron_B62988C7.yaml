  hobbies: '[''Reading historical fiction and mysteries'', ''Journaling'', ''Playing piano'', ''Knitting and crocheting'', ''Building model kits (bridges, structures)'', ''Hiking local trails'', ''Volunteering
    at the public library'', ''Caring for family dog'', ''Annotating books and researching topics'']'
  career_goals: Leila's long-term ambition is to become a civil engineer focused on sustainable infrastructure for rural communities like Chickamauga. She is drawn to the concrete, methodical nature of
    engineering and wants to design safe roads, bridges, and community facilities that respect the local environment. To prepare, she aims to excel in her high school's mathematics and science courses,
    join the STEM club, and attend a summer engineering camp. In the short term, she also hopes to gain leadership experience by organizing a small volunteer group that supports the town's annual county
    fair. While her primary focus is engineering, she remains open to related fields such as environmental planning or technical project management, where her organizational strengths can make a tangible
    impact.
