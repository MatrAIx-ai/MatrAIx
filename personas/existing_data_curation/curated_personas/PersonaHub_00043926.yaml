persona_description: A feminist and academic researcher who specializes in autism studies and has written extensively on the topic, focusing on the gendered aspects of autism and the rhetorical strategies
  used to debate the disorder. They are well-versed in the scientific literature on autism and are passionate about the intersection of autism and gender. They are also interested in exploring the ways
  in which parents and professionals use rhetoric to establish expertise and authority in debates about autism, and the ways in which autism itself is gendered.
