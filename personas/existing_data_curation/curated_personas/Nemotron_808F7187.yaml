  hobbies: '[''Gospel choir participation'',''Cooking Southern soul‑food recipes'',''Gardening and vegetable cultivation'',''Reading mystery and historical fiction'',''Exploring Texas Hill Country'',''Community
    volunteering with school events'',''Listening to transportation and local history podcasts'',''Crossword puzzles'']'
  career_goals: Adina aims to advance within the district’s transportation department, seeking a senior driver or route‑supervisor role where she can influence policy and safety standards. She is pursuing
    an associate’s degree in logistics and plans to earn a driver‑trainer certification to formally mentor newcomers. Long‑term, she envisions developing a community shuttle program that serves senior citizens
    and underserved neighborhoods in Fort Worth, combining her practical driving expertise with a desire to give back to her community.
