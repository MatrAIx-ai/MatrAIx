  hobbies: '["Abstract watercolor painting", "Scale model house building", "Digital 3D design (SketchUp/Blender)", "Industrial photography", "Architectural history reading", "Sustainable building research",
    "Hiking in the Appalachian foothills", "Gardening", "Genealogy research"]'
  career_goals: Meghan aims to transition from laborer to crew foreman within the next two years, securing NCCER and OSHA certifications to formalize her expertise. She dreams of launching a boutique contracting
    side‑business that specializes in historically sensitive remodels and custom artistic fixtures for homes in Waynesboro, merging her love of novelty and abstract design with the region’s heritage. Long‑term,
    she hopes to mentor younger tradespeople, sharing her critical thinking approach and encouraging them to explore creative solutions in construction.
