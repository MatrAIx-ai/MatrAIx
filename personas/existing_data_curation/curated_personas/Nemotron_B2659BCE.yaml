personas:
  professional: Meghan Lee, a 55‑year‑old construction veteran, blends three decades of concrete pouring, formwork erection, and heavy‑equipment operation with a skeptical, design‑centric mindset, using
    SketchUp and Blender to propose historically sensitive remodels while rigorously enforcing OSHA safety and coordinating crews to meet tight deadlines, and they continuously seek to formalize their expertise
    with NCCER and OSHA certifications.
  sports: Meghan Lee stays fit by tackling the Appalachian foothills with the local Hiking & Conservation Club, joining a weekly functional‑training group to maintain strength for back‑heavy work, cheering
    on the Philadelphia Eagles in the fall and the Phillies during baseball season, and they treat each weekend trek as both cardio and a chance to scout architectural details in the landscape.
  arts: Meghan Lee channels their imagination into abstract watercolor depictions of steel girders and concrete textures, drawing inspiration from Jackson Pollock’s gestural splashes and Gerhard Richter’s
    blurred cityscapes, while their industrial photography echoes Ansel Adams’ mastery of light and shadow, and they regularly exhibit a mixed‑media series at the Waynesboro Community Arts Center.
  travel: Meghan Lee favors purposeful road trips that combine architectural pilgrimage with outdoor respite, having road‑tripped through the historic brick towns of Gettysburg and Harpers Ferry, trekked
    the green roofs of Copenhagen, and planned a future visit to the Renaissance palazzos of Florence, balancing modest travel budgets with their desire to gather design inspiration for their boutique contracting
    venture, and they often sketch concepts on the train ride home.
  culinary: Meghan Lee enjoys farm‑to‑table cooking, often stirring a rustic ratatouille with heirloom zucchini, tomatoes, and fresh basil from their garden, pairing it with a crusty sourdough made from
    locally milled whole‑grain flour, and they consider themselves a confident sauté chef who prefers seasonal, earthy flavors over fast‑food convenience.
  core: Meghan Lee, at 55, merges a construction foreman's precision with an artist’s whimsy, occasionally neglecting paperwork to chase sunrise shots of steel beams, and they keep a secret stash of watercolor
    pencils in their tool belt for spontaneous creativity.
background:
  cultural: Meghan comes from a multi‑generational white family of German and British ancestry typical of Franklin County. Raised in a small‑town environment, she grew up valuing self‑reliance, a strong
    work ethic, and community ties—principles reinforced by local church gatherings, county fairs, and the region’s historic appreciation for craftsmanship. These cultural influences blend practicality
    with a quiet pride in preserving local heritage, a backdrop that informs both her professional dedication and her artistic pursuits.
attributes:
  skills: '["Concrete pouring", "Formwork erection", "Forklift operation", "Backhoe operation", "Blueprint reading", "Construction safety compliance", "Crew coordination", "Problem solving under pressure",
