  hobbies: '[''Gardening'', ''Reading Historical Fiction'', ''Baking'', ''Knitting'', ''Hiking'', ''Book Club'', ''Yoga'', ''Community Library Volunteering'', ''Nature Photography'']'
  career_goals: She aims to earn a master's in educational leadership within the next two years, transition into a curriculum specialist role, and eventually serve as an assistant principal. Brenda also
    hopes to lead district‑wide professional development on inclusive instruction and develop a series of resource guides for literacy across grade levels.
