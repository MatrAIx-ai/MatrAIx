  career_goals: She aims to transition into a director‑level finance role within the next 3‑5 years, positioning herself as a strategic partner in corporate decision‑making. Karen is focused on leading
    a finance transformation initiative that integrates digital tools and analytics to streamline reporting and support growth. She also aspires to mentor emerging finance professionals, championing a culture
    of continuous learning. Long‑term, she envisions establishing a boutique financial advisory firm that offers tailored services to small businesses in Connecticut, emphasizing financial literacy and
    sustainable growth.
