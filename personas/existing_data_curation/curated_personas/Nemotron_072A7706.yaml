  hobbies: '[''Abstract Painting'', ''Reading Speculative Fiction'', ''Visiting Art Galleries'', ''Gardening (Native Ohio Wildflowers)'', ''Digital Fabrication at Makerspace'', ''Woodworking'', ''Music
    Production (Synthesizer)'', ''Volunteer STEM Mentoring'']'
  career_goals: Maureen aims to advance into a senior executive role where she can champion large‑scale digital transformation and sustainability initiatives. She aspires to launch a corporate‑community
    partnership that weaves STEM education with local arts programs, fostering creativity among youth. Over the next five years she plans to lead an innovation lab exploring AI‑driven design and emerging
    technologies, while establishing a consulting practice that guides mid‑size firms in process improvement and creative problem solving. Mentoring the next generation of engineers, particularly women
    and under‑represented groups, remains a core ambition.
