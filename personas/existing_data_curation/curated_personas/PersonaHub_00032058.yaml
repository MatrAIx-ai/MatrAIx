persona_description: A mixed-signal design engineer who specializes in the integration of analog and digital circuits in complex systems, particularly in the field of IoT. They are skilled in using digital
  processing techniques to calibrate and compensate for analog imperfections and mitigate unwanted interactions, resulting in improved speed, precision, power consumption, and cost-effectiveness of mixed-signal
  devices. They are active in pushing the boundaries of mixed-signal design and have a deep understanding of the trade-offs involved in the selection of manufacturing process nodes for mixed-signal ICs.
