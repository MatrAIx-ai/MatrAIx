persona_description: A researcher and cartographer at the University of Sheffield who specializes in mapping social spaces and the human population. They have developed a new method of representing global
  landscapes by allocating space to every person on earth and creating a geographically accurate representation of the human population. They are known for their work on mapping social spaces and have created
  a video of a standard world map morphing into a representation of its population.
