  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Gardening (roses and herbs)'', ''Reading historical fiction and biographies'', ''Volunteer work and art‑therapy facilitation
    at senior center'', ''Birdwatching along the Rock River'', ''Genealogy research'', ''Attending local theater productions'', ''Digital photography'']'
  career_goals: Although Lillie is currently not part of the formal workforce, she aims to deepen her impact in the Quad Cities through volunteer leadership. She hopes to become a docent and program coordinator
    at the local art museum, develop a weekly art discussion circle for seniors, and launch a small grant‑funded community garden project that integrates art and nature. On a personal level, she plans to
    finish a memoir that weaves together her family history, Midwestern upbringing, and reflections on lifelong learning, and to master digital photography so she can document and share local cultural events
    online.
