  career_goals: Rhonda aims to pursue a career that unites her curiosity for science with a desire to make tangible contributions to society. She envisions attending a high school with strong STEM programs,
    eventually studying biomedical engineering or environmental science, where she can design solutions that improve health or sustainability. She is motivated to combine practical skills with innovative
    thinking, and hopes to one day lead projects that address real‑world challenges while mentoring younger students in science and technology.
