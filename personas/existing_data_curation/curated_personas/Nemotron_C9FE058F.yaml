personas:
  professional: Rhonda Cimino is a budding young technologist who channels her curiosity and practicality into leading her middle school science club, where they design simple robotics projects and code
    basic games, balancing creativity with methodical problem‑solving.
  sports: Rhonda Cimino plays midfield for the Springfield Strikers youth soccer club, cheers for the nearby Chicago Fire in MLS, and spends weekend afternoons hiking the Redwood Park trails, blending team
    sport discipline with solo cardio adventures.
  arts: Rhonda Cimino devotes evenings to piano, favoring Beethoven’s “Moonlight Sonata” and Yiruma’s “River Flows in You,” while immersing herself in the worlds of author Brandon Sanderson, artist H.R.
    Giger, and the intricate designs of LEGO Architecture sets, letting those influences shape her creative projects.
  travel: Rhonda Cimino’s travel aspirations include a nostalgic family visit to the Grand Canyon’s rim, an adventurous weekend in Seattle to see the Space Needle and the Museum of Pop Culture, and a dream
    excursion to the Smithsonian’s National Air and Space Museum’s sci‑fi exhibit, balancing love for nature hikes with tech‑culture curiosity.
  culinary: Rhonda Cimino enjoys assembling homemade pizza with fresh mozzarella, basil, pepperoni, and a dash of smoked paprika, while also mastering simple chocolate‑dipped strawberries, reflecting a
    blend of hearty comfort foods and sweet indulgences.
  core: Rhonda Cimino is a curious, organized twelve‑year‑old who balances a relentless love for building, coding, and exploring with a practical streak that keeps their allowance in check, health routine
    disciplined, and creative pursuits thriving despite occasional late‑night gaming marathons.
background:
  cultural: Rhonda was raised in Springfield, Virginia, a suburban community within Fairfax County known for its diverse population and strong emphasis on education. Her family, of white American background
    with European roots, celebrates traditional American holidays while also embracing the multicultural events common in the area, such as cultural festivals and community fairs. Growing up near Washington,
    D.C., she has been exposed to museums, historic sites, and a variety of cultural perspectives, which have broadened her appreciation for both local heritage and global diversity.
