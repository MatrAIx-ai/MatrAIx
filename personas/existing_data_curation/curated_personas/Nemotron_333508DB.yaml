  career_goals: Although retired, Karl is driven to leave a lasting legacy for his community. He aims to compile a comprehensive memoir that intertwines his personal history with the broader narrative of
    Hazard's coal‑mining heritage. He hopes to launch a small oral‑history project that trains local youth to record and preserve stories from the elder generation. Additionally, Karl aspires to complete
    a series of paintings that capture the changing Appalachian landscape, and to organize an annual storytelling festival that celebrates the region’s rich oral traditions.
