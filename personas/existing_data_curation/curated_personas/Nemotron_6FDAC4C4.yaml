  hobbies: '[''Running along the beach'', ''Reading science-fiction and African-American literature'', ''Arduino microcontroller projects'', ''Fishing in Chesapeake Bay'', ''Coastal landscape photography'',
    ''DIY woodworking'', ''Strategy video gaming'', ''Listening to jazz and blues records'']'
  career_goals: Though satisfied with the stability of his current job, Lionel aspires to move into a supervisory or continuous‑improvement role on the shop floor. He plans to obtain a forklift certification
    renewal, complete an OSHA 30‑hour safety course, and enroll part‑time at Tidewater Community College to earn an associate degree in industrial technology. Over the next five years, he hopes to lead
    a shift team, mentor newer employees, and eventually become a process‑improvement specialist who can blend his practical experience with the analytical techniques he explores in his spare time.
