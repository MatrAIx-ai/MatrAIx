    California plants'']'
  career_goals: Kimberly aims to transition from a store‑level role to a regional management position where she can shape retail strategies across multiple locations. She envisions launching a boutique
    that fuses sustainable fashion with Mexican artisan crafts, leveraging her STEM background to create an e‑commerce platform that uses data analytics for personalized shopping experiences. Over the next
    five years she also hopes to mentor emerging retail talent, especially bilingual women, and to collaborate with local art institutions on pop‑up events that celebrate cultural diversity.
