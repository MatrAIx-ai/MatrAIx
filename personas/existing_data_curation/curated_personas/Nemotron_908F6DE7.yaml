personas:
  professional: Kimberly Ruiz is a retail operations leader who blends analytical rigor with a vivid visual sense, using Python scripts to forecast sales and designing culturally resonant store displays
    that highlight vibrant folk art motifs, while mentoring bilingual staff and plotting a regional management path.
  sports: Kimberly Ruiz embraces coastal fitness, hitting the Santa Monica beach for sunrise beach‑volleyball with the local club, hiking the Pacific Coast Trail in the winter, cheering on the LA Galaxy
    soccer team, and squeezing weekly salsa dancing classes for cardio, balancing social activity and personal health.
  arts: Kimberly Ruiz immerses in Santa Monica’s arts circuit, attending First Friday gallery walks to view works by muralist RET, following artists such as Frida Kahlo, Banksy, and textile designer Yolanda López,
    while they frequently experiment with acrylics and DIY papel picado, channeling the vibrancy of holiday feasts into home décor.
  travel: Kimberly Ruiz favors purposeful travel—planning affordable, culturally rich trips with a small group of friends; they have explored Oaxaca’s Day of the Dead celebrations, hiked the Redwoods in
    Northern California, backpacked through Kyoto’s temples, and a future wish list spotlights Patagonia’s glaciers and Zanzibar’s spice markets.
  culinary: Kimberly Ruiz loves to reimagine classic dishes—preparing a smoky mole poblano with dark chocolate and chipotle, rolling hand‑made tamales filled with huitlacoche, grilling fish tacos topped
    with fresh mango salsa; they are a confident home cook who sources fresh market produce, experiments with tequila‑infused desserts, and often hosts dinner nights where every plate bursts with bright
    chilies, corn, and cilantro.
  core: Kimberly Ruiz blends analytical precision with a fearless love of color and community, turning data into vibrant store experiences while juggling midnight art projects, spontaneous salsa nights,
    and a never‑ending list of eco‑friendly ambitions.
background:
  cultural: Kimberly is a Mexican‑American who grew up in a bicultural household in Southern California. She speaks Spanish fluently and celebrates traditions such as Día de los Muertos, quinceañeras, and
    Mexican holiday feasts with her family. Her heritage informs her love for vibrant colors, folk art, and culinary flavors, which she often incorporates into her retail displays and community projects.
    At the same time, living in Santa Monica has shaped her progressive outlook, environmental consciousness, and appreciation for diverse artistic expressions, creating a rich blend of Mexican roots and
    coastal Californian lifestyle.
