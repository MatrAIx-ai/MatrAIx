    ''Apprentice mentorship and training'', ''Smart‑home thermostat integration'', ''Indoor air quality assessment'']'
  hobbies: '[''Photography'', ''Acoustic guitar playing'', ''Community theater sound‑tech support'', ''Woodworking and furniture making'', ''Vintage car restoration'', ''Attending contemporary art exhibits'',
    ''Smart‑home automation projects'', ''Hiking and nature photography'', ''Fishing trips'', ''Neighborhood barbecues and social gatherings'']'
  career_goals: Looking ahead, Shaquille aims to transition from field work to a leadership role by becoming a service manager for a regional HVAC contractor, where he can shape quality standards and drive
    adoption of green technologies. He also hopes to earn advanced certifications in low‑global‑warming‑potential refrigerants and LEED‑related building performance, positioning himself to launch a boutique
    HVAC consultancy that blends technical efficiency with aesthetic design. Over the long term, he envisions teaching a part‑time HVAC course at a local community college, sharing his practical knowledge
    while inspiring the next generation of tradespeople.
