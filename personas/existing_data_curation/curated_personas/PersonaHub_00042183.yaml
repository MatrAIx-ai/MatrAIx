persona_description: A legal scholar who specializes in environmental law and human rights. They are interested in the integration of human rights standards and principles in the rules for implementing
  the Paris Agreement on climate change, and are familiar with the United Nations Special Procedures Mandate Holders and the United Nations Secretary General's report on Gaps in International Environmental
  Law. They are also knowledgeable about environmental rights and the importance of protecting the ecosystems that support food and water security and health for billions of people. They are passionate
  about the importance of environmental rights and are dedicated to fighting for the rights of indigenous and local communities and women environmental defenders.
