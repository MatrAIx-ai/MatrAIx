personas:
  professional: Janeth Landry, a 19-year-old aspiring project coordinator, leverages her meticulous event-planning skills, Microsoft Office mastery, and natural knack for harmonious teamwork to deliver
    well-organized community initiatives while juggling high-school coursework, and they consistently meet high standards.
  sports: Janeth Landry plays recreational volleyball with the Fredericksburg Volleyball Club, avidly follows the Washington Capitals for winter excitement and the Washington Wizards for basketball, and
    they schedule weekly workouts with the same disciplined precision she applies to study group planning.
  arts: Janeth Landry shines on stage in community theater productions of classics like Grease and dances with a local troupe to modern choreography, loves listening to Taylor Swift and the folk sounds
    of local bluegrass bands, and they weave these artistic passions into her social life as essential outlets for creativity.
  travel: Janeth Landry prefers meticulously planned weekend getaways, has already explored historic sites such as Colonial Williamsburg and Washington DC, dreams of a cultural immersion trip to Savannah's
    riverfront, and they balance travel ambitions with a student budget by leveraging discount student travel cards.
  culinary: Janeth Landry enjoys cooking comfort dishes such as fried chicken with a honey glaze, collard greens seasoned with smoked paprika, and sweet potato casserole topped with pecan streusel for her
    friends, experiments with new recipes in her modest kitchen, and they often over-season in enthusiasm, turning meals into communal celebrations.
  core: Janeth Landry is an ultra-organized 19-year-old who thrives on group activities, battles chronic worry by juggling endless to-do lists, and occasionally over-plans social events to the point of
    burnout.
background:
  cultural: Janeth was raised in a middle‑class, predominantly white suburban community in Fredericksburg, Virginia. Her family emphasizes traditional American values such as education, community involvement,
    and a strong work ethic. She grew up attending a local Protestant church, participating in church‑based service projects, and celebrating regional customs like holiday parades and community festivals.
    The Southern hospitality of the area, combined with close‑knit neighborhood ties, has shaped her cooperative, considerate demeanor and her preference for structured, harmonious social environments.
