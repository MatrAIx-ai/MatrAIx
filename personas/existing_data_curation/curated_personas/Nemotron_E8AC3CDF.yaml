  career_goals: Janeth aims to enroll in a community college or university to study business administration or health services management, fields that align with her practical mindset and desire for structured
    career paths. She plans to secure an entry‑level administrative or project coordination role within a local nonprofit, government agency, or healthcare organization in Fredericksburg. Over the next
    five years, she hopes to advance to a project manager position, develop expertise in workflow optimization, and eventually launch her own event‑planning business that leverages her organizational talent
    while providing a supportive, low‑stress work environment.
