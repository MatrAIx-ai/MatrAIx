  career_goals: Dina aims to advance within the insurance industry by earning her Certified Professional Insurance Producer (C.P.) designation and eventually completing a bachelor’s degree in Business Administration
    or Risk Management. Her short-term goal is to become a senior claims analyst, where she can lead a small team and drive efficiency improvements. In the longer term, she is ambitious about transitioning
    into product development for insurance technology, leveraging her imaginative mindset to help design user-friendly claims platforms. Ultimately, she envisions founding a boutique consulting firm that
    offers innovative, client-centric insurance solutions, combining her analytical expertise with her creative vision.
