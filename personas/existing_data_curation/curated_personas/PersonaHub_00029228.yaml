persona_description: A biophysicist and molecular biologist with expertise in the study of protozoan parasites, particularly malaria. They have made significant advances in understanding the complex control
  system of the parasite, which may make it vulnerable to disruption, potentially leading to the development of new antimalaria drugs. They have also contributed to the development of expression chips and
  other tools for tracking gene expression in the parasite.
