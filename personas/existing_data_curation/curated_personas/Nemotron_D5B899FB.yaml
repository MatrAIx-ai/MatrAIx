personas:
  professional: Maria Boudreaux, a senior data scientist at a research university, leverages advanced statistical modeling, machine learning, and computational mathematics to fuse mathematical analytics
    with visual arts, leads interdisciplinary projects, mentors women and underrepresented groups in STEM, and is pursuing a chief data scientist promotion or full professorship within five years.
  sports: Maria Boudreaux, an avid hiker who belongs to the New England Trailblazers club, enjoys seasonal cross‑country skiing in Vermont, follows the Boston Red Sox and Boston Celtics, attends local yoga
    classes, and fits in weekly treadmill intervals to counterbalance a predominantly sedentary work life.
  arts: Maria Boudreaux, an abstract fractal painter inspired by Yayoi Kusama and Brian Eno, regularly exhibits at the Springfield Art Institute, plays Debussy piano nocturnes, participates in a contemporary
    literature book club featuring Margaret Atwood and Ted Chiang, and draws creative energy from museum visits and local gallery openings.
  travel: Maria Boudreaux, an organized traveler who plans trips months ahead using detailed spreadsheets, favors cultural immersion in Kyoto and culinary tours of Provence, enjoys hiking Acadia National
    Park, balances family obligations with solo retreats, and budgets carefully to fund both leisure voyages and mentorship program travel.
  culinary: Maria Boudreaux, an experimental home chef with a solid skill set, loves crafting miso‑glazed salmon with black garlic, perfecting New England clam chowder, creating beet‑infused panna cotta
    with fractal plating, and occasionally over‑seasoning dishes due to her enthusiasm for bold flavors.
  core: Maria Boudreaux, a curious yet rigorously organized mathematician‑artist, channels her love of data and fractals into research, painting, and mentorship, while juggling a tendency to over‑schedule
    and a passion for spontaneous culinary experiments.
background:
  cultural: Maria grew up in a middle‑class New England family with deep roots in the region’s academic and civic traditions. Her heritage includes French‑Acadian (Boudreaux) lineage, which fostered a respect
    for education, self‑reliance, and community service. The cultural milieu of Plainville, Massachusetts—characterized by close‑knit community values, access to museums and colleges, and a blend of traditional
    New England Protestant ethics with an appreciation for the arts—has shaped her balanced worldview, encouraging both rigorous analytical thinking and an openness to artistic expression.
