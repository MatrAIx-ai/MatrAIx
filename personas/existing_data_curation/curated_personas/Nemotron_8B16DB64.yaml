  hobbies: '["Visiting galleries and exhibitions", "Experimental theater outings", "Conceptual photography", "Cooking modern Southeast Asian cuisine", "Blogging about art and culture", "Reading contemporary
    literature and philosophy", "Small‑group book club participation", "Yoga and mindfulness practice", "Volunteering at community art workshops"]'
  career_goals: Nga aims to channel her business acumen and artistic curiosity into a flexible, independent career. Over the next three to five years she plans to launch an e‑commerce platform that curates
    and sells contemporary Southeast Asian visual art and hand‑crafted goods, positioning herself as a cultural bridge between artists and North American collectors. To support this venture she intends
    to complete a short‑course certification in digital marketing and develop a portfolio of at least ten consulting projects for small, minority‑owned businesses seeking market entry strategies. Nga values
    autonomy, so she seeks remote, project‑based work that lets her balance entrepreneurial pursuits with ongoing exploration of new artistic experiences.
