persona_description: A researcher and scientist in the field of cardiovascular medicine, particularly focusing on the study of arrhythmias and the underlying mechanisms leading to sudden cardiac death.
  The individual is likely to be involved in developing new imaging techniques and probes for studying the electrical activity of cells and the cardiac tissue, with a particular emphasis on the ventricles.
  They may also be interested in understanding the genetic and structural factors that contribute to long QT intervals and their potential impact on the risk of sudden cardiac death.
