  career_goals: John dreams of a career that blends practical problem‑solving with a chance to help his community. He is interested in training as a skilled tradesperson—such as an electrician, automotive
    technician, or carpenter—and is also curious about civil engineering, where he could design and build local infrastructure. In the longer term, he imagines becoming a volunteer EMT or rescue worker,
    using his caring nature to support others in emergencies. He plans to attend a technical high school and pursue an apprenticeship after graduation.
