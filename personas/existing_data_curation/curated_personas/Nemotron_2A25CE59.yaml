personas:
  professional: Shaun Frye, a retired building maintenance supervisor turned community handyman, leverages three decades of electrical, plumbing, and carpentry expertise to mentor seniors at the local center
    while coordinating volunteer projects with a meticulous, schedule‑driven approach; they balance practical problem‑solving with a calm, organized demeanor that earns trust from neighbors.
  sports: Shaun Frye, a lifelong fan of the New York Mets and a regular participant in the Staten Island senior bowling league, blends passive spectating of baseball with weekly shoreline walks, occasional
    community fishing outings, and light strength exercises to stay active and maintain joint mobility.
  arts: Shaun Frye, an avid gospel and classic jazz enthusiast, spends evenings listening to Mahalia Jackson and John Coltrane while solving crossword puzzles, frequently attends local church choir performances
    and community lectures on civil‑rights history, and draws inspiration from these artistic experiences for his storytelling volunteer work.
  travel: Shaun Frye, a modest traveler, has visited the historic Sweet Home Farm in the Hudson Valley and dreams of a cultural pilgrimage to New Orleans for its music and cuisine, preferring carefully
    planned trips that fit within a fixed travel budget, limited schedule, and a desire for meaningful, low‑stress experiences.
  culinary: Shaun Frye, a seasoned home cook, delights in reinventing collard greens with a drizzle of lemon‑infused olive oil, preparing black‑eyed pea salad with fresh basil from his balcony garden, and
    experimenting with sweet potato gnocchi, balancing traditional soul‑food flavors with contemporary twists while savoring the aromas of simmering gumbo and baked cornbread.
  core: Shaun Frye blends disciplined practicality with a love for community service, gospel music, and soulful cooking, maintaining a structured routine that balances hands‑on handyman work, health vigilance,
    modest investing, and cultural storytelling.
background:
  cultural: Shaun was born in 1953 in Brooklyn to parents who migrated from the Jim Crawford South during the Great Migration. Growing up in a close‑knit working‑class Black neighborhood, he was immersed
    in the rhythms of gospel music, the communal spirit of church gatherings, and the culinary traditions of Southern soul food blended with New York’s diverse palate. After moving to Staten Island in his
    teens, he became part of the borough’s modest but vibrant African‑American community, participating in local Juneteenth traditions, neighborhood block parties, and cultural advocacy groups such as the
    Staten Island Black Brotherhood. His heritage combines the resilience of post‑war Black America, a respect for family and elders, and a deep appreciation for community storytelling, which informs his
    current volunteer work preserving local Black histories.
