  career_goals: Stephen aims to transition from a laborer role to a supervisory position such as a foreman or logistics coordinator within the next three years. He plans to earn a GED and pursue a certification
    in supply-chain management to broaden his qualifications. Obtaining additional credentials, including a certified occupational safety specialist (COSS) and advanced forklift training, is part of his
    roadmap. Long-term, he hopes to open a small, locally-owned moving and freight business that emphasizes safety, reliability, and community service. Alongside professional advancement, Stephen is committed
    to developing healthier coping strategies for stress, including regular counseling and mindfulness practices, to sustain his well-being and maintain a balanced work-life schedule.
