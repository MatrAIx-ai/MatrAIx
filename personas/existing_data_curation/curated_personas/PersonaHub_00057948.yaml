persona_description: A sociologist who specializes in race relations and demographic studies, particularly focusing on the socioeconomic disparities between Mississippi and Hawaii. The professor has conducted
  research on the history of discrimination in Mississippi and the impact of civil rights movements on ethnic diversity and living standards. He is interested in the cultural and social aspects of race
  relations and the impact of policies and laws on racial equality. The professor is also interested in the U.S. history of migration and immigration and how it shapes everyday life in America.
