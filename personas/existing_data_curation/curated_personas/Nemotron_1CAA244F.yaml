  career_goals: Riley’s primary ambition is to stay healthy and maintain his independence while supporting his wife. He hopes to finish building a small garden shed, document his family’s genealogy for
    future generations, and mentor younger volunteers at the senior center. He also aims to travel with his spouse to visit their grandchildren, attend the annual county fair, and ensure any necessary home
    modifications are completed promptly to keep their home safe and comfortable.
