personas:
  professional: An experienced educator named Stephanie Ellis leverages over three decades of literacy and STEAM expertise, merging curiosity-driven lesson design with methodical classroom management, while
    using Google Classroom and SMART Boards to nurture a supportive, inclusive learning environment that reflects community values and a practical, organized approach.
  sports: An avid sports enthusiast named Stephanie Ellis proudly roots for the Pittsburgh Steelers, follows the Penguins during the winter, cheers on the Pirates in summer, and keeps active by joining
    the Frick Park walking club and a local senior hike group that tackles the Ohiopyle trail each fall.
  arts: A culturally engaged creator named Stephanie Ellis spends weekends at the Pittsburgh Public Theater, enjoys the folk storytelling of August Wilson, quilts inspired by the city’s steel bridges while
    listening to Bob Dylan’s folk classics and the classical piano works of Lang Lang, and regularly discusses contemporary art at the Carnegie Museum’s family programs.
  travel: A thoughtful traveler named Stephanie Ellis prefers well‑planned road trips, revisiting the historic neighborhoods of Boston and the scenic Allegheny River Valley, while dreaming of a pilgrimage
    to Bavaria to trace ancestral recipes and a relaxed cruise through the Caribbean to unwind after her upcoming retirement.
  culinary: A seasoned home cook named Stephanie Ellis excels at preparing pierogi stuffed with sauerkraut and potatoes, German‑style potato salad with fresh dill, and garden‑fresh tomato basil soup, often
    seasoning with thyme and rosemary harvested from her own backyard while occasionally improvising with leftover kale for a hearty stew.
  core: Stephanie Ellis blends disciplined organization with a love for community, nurturing gardens, quilts, and readers alike, yet can’t resist a late‑night episode of Steelers highlights even when a
    bedtime is overdue.
background:
  cultural: Stephanie was raised in a middle‑class working‑family in the suburbs of Pittsburgh, with deep roots in the region’s German‑Irish immigrant heritage. Growing up in the Rust Belt, she internalized
    values of hard work, community solidarity, and appreciation for the city’s industrial history. Her upbringing in a predominantly Protestant, civically engaged environment fostered a strong sense of
    public service and respect for tradition. As a white American from Western Pennsylvania, she identifies with the region’s love of sports, hearty cuisine, and seasonal outdoor activities, while also
    embracing the increasingly diverse cultural fabric of Pittsburgh’s neighborhoods. These cultural influences shape her inclusive teaching philosophy and her commitment to community‑based initiatives.
