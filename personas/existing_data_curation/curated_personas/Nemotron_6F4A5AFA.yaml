personas:
  professional: Maryanne Larkins is a 21‑year‑old residential cleaning specialist who blends a practical curiosity for eco‑friendly products with sharp customer‑service instincts, delivering meticulous
    deep‑cleaning, stain removal, and floor‑care while eyeing a Certified Professional Cleaner credential and a supervisory role within the next few years.
  sports: Maryanne Larkins fuels their energetic lifestyle with thrice‑weekly Zumba classes at Pump Fitness, competitive beach volleyball games with the “Sunset Spikers” at Lake Nona, and avidly follows
    Orlando City SC during the MLS season, always keeping a water bottle and a pair of bright sneakers on hand.
  arts: Maryanne Larkins finds creative release in karaoke evenings at The Rusty Nail, dancing to live performances by The Flaming Orbits at the House of Blues, and crafting DIY wall décor inspired by street‑artist
    Banksy, all while keeping a playlist of Ariana Grande hits for motivation.
  travel: Maryanne Larkins maps out budget‑friendly weekend getaways to Florida hotspots like Key West, St. Augustine, and the Everglades, while dreaming of an eco‑tourism adventure in Costa Rica, preferring
    Airbnb stays and packing a reusable water bottle to stay aligned with their sustainability values.
  culinary: Maryanne Larkins delights in Orlando’s food‑truck offerings, regularly ordering avocado toast with poached egg, chicken shawarma tacos, and refreshing acai bowls, while whipping up quick weeknight
    meals such as lemon‑garlic shrimp pasta and quinoa‑black bean salads, and they often experiment with citrus‑vinegar cleaning hacks that double as salad dressings.
  core: Maryanne Larkins is a 21‑year‑old cleaning enthusiast who mixes eco‑friendly hustle, spontaneous Zumba beats, karaoke mic thrills, and a competitive streak, all while occasionally misplacing their
    planner and forgetting a bill.
background:
  cultural: Maryanne identifies as a White American who grew up in Central Florida. Raised in a working‑class family that emphasized self‑reliance and a strong work ethic, she was shaped by the multicultural,
    tourism‑driven environment of Orlando. This setting exposed her to a blend of cultural influences, from Latin and Caribbean music to a vibrant service‑industry ethos. She celebrates traditional American
    holidays such as Thanksgiving and the Fourth of July while also enjoying Florida’s outdoor lifestyle, including beach outings and local festivals. Her background reflects a blend of mainstream U.S.
    culture with the dynamic, diverse atmosphere of the Orlando region.
attributes:
  skills: '["Residential cleaning", "Deep stain removal", "Floor care (hardwood, tile, carpet)", "Window cleaning", "Eco‑friendly cleaning methods", "Inventory management of cleaning supplies", "Customer
