  hobbies: '["Zumba fitness classes", "Beach volleyball", "DIY home décor projects", "Cooking quick recipes", "Exploring local coffee shops and food trucks", "Karaoke nights and live concerts", "Thrift
    shopping and vintage finds", "Streaming and testing cleaning tutorial videos", "Volunteering at community clean‑up events", "Socializing with friends at local parks"]'
  career_goals: Maryanne aims to become a lead housekeeper or cleaning supervisor within the next few years, earning a professional certification such as Certified Professional Cleaner. She plans to take
    community‑college courses in business management and sustainable practices to support her long‑term goal of launching her own eco‑friendly cleaning service targeting residential and short‑term rental
    markets in Orlando. In the short term, she wants to be recognized as a top performer, earn employee‑of‑the‑month honors, and develop expertise in high‑end and eco‑conscious cleaning. Ultimately, she
    seeks financial independence and the flexibility to set her own schedule while building a reputable brand.
