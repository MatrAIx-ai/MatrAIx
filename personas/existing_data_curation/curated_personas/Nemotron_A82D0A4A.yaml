personas:
  professional: Katherine Roberts, an aspiring preschool class manager, loves orchestrating playtime activities, using their keen curiosity and knack for organization to lead group projects while staying
    flexible enough to incorporate new ideas and adapt to classmates' suggestions.
  sports: Katherine Roberts dashes around the local Tiny Tots Soccer Club fields, proudly wearing a Chicago Cubs jersey and shouting "Go Cubs!" while also attending Little Stars Gym for gymnastics, where
    their competitive drive pushes them to be first on the obstacle course yet they delight in the camaraderie of group play.
  arts: Katherine Roberts immerses themselves in vibrant finger-painting sessions, idolizing the bold colors of Van Gogh's Sunflowers as seen in picture books, singing along to Raffi's "Baby Beluga" and
    Disney's Frozen soundtrack, and eagerly exploring interactive exhibits at the city Children's Museum where they meet costumed characters like Mickey Mouse.
  travel: Katherine Roberts loves family road trips to the nearby aquarium and yearly adventures to Disneyland, dreams of wandering through the historic streets of Paris and exploring Japan's cherry-blossom
    parks, and prefers travel plans that involve short car rides or brief flights accompanied by their cherished stuffed bunny for comfort.
  culinary: Katherine Roberts delights in slurping cheesy macaroni, building mini pizza slices topped with pepperoni and pineapple, and occasionally tries cucumber sushi rolls, although they enthusiastically
    spill juice on the table whenever snack time gets too lively.
  core: Katherine Roberts is a bright, competitive four-year-old who balances their curious creativity with organized group play, a modest saving habit, and occasional resistance to routine.
background:
  cultural: She is raised in a predominantly white, middle‑class family in Plant City, Florida, reflecting a Southern American cultural environment. Her household celebrates holidays such as Christmas,
    Thanksgiving, and Easter, often with church Sunday school involvement. The family participates in local traditions, especially the annual Plant City Strawberry Festival, where she experiences music,
    games, and fruit‑related activities. The warm, humid climate and proximity to orange groves and strawberry fields foster her love for outdoor play. Exposure to the diverse cultural mosaic of Central
    Florida, including neighboring Latino communities, adds a subtle multicultural awareness, though her primary cultural identification aligns with mainstream Anglo‑American customs.
