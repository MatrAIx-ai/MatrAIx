  career_goals: She dreams of growing up to be an artist or illustrator, drawn by her love for color and new ideas, and also entertains the thought of becoming a teacher or scientist to satisfy her curiosity
    and share knowledge. Her competitive streak encourages her to aim to be “the best” painter, the most inventive storyteller, or a top‑class explorer of ideas.
