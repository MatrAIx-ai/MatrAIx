    simple tabla rhythms'', ''Participating in cultural festivals'', ''Nature walks and aquarium visits'']'
  career_goals: Surya dreams of becoming a scientist, fascinated by animals and the ocean, and imagines herself one day as a marine biologist or astronaut. She also aspires to be a teacher who can inspire
    other children to explore and achieve high standards. Her competitive spirit pushes her to aim for top grades, win school science fairs, and eventually lead a student council. Additionally, she hopes
    to develop strategies to manage her strong emotions so she can help peers who feel anxious or sad.
