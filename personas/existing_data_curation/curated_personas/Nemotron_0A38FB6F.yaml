personas:
  professional: A budding young scientist, Surya Idrees, blends a fierce curiosity about space and marine life with meticulous LEGO engineering, channeling a competitive drive into school science club projects
    while they manage intense emotions with a disciplined routine.
  sports: A spirited young athlete, Surya Idrees trains with the local Swim Club Splash Dolphins and plays on the Little Rockets youth soccer team, admires the Los Angeles Dodgers and Chicago Bulls on TV,
    and approaches each practice with a competitive edge, recording their lap times and goal counts in a neat notebook.
  arts: A vivid young creator, Surya Idrees fills sketchbooks with marine‑inspired watercolors reminiscent of Jacques Cousteau, delights in listening to tabla rhythms by Zakir Hussain and the Beatles' Yellow
    Submarine, and they eagerly participate in cultural festivals featuring traditional dance and music, drawing inspiration from both Disney animation and the intricate patterns of mandala art.
  travel: An inquisitive junior explorer, Surya Idrees has already toured the city’s aquarium and a nearby nature reserve, and they now dream of a family trip to the Space Center Houston and the Great Barrier
    Reef, meticulously planning each stop with colorful stickers on a travel map while balancing parental budget limits.
  culinary: A budding kitchen assistant, Surya Idrees loves chopping fresh mango, kiwi, and blueberries for fruit salad, folding golden vegetable samosas with just the right pinch of cumin, and mixing a
    creamy mango lassi with coconut milk, proudly serving their creations at family meals while occasionally sneaking an extra spoonful of sugar.
  core: Surya Idrees is a fiercely curious, hyper‑organized 7‑year‑old who channels competitive energy into LEGO builds and science projects, yet they wrestle with anxious perfectionism that turns a missed
    puzzle piece into a dramatic crisis.
background:
  cultural: Surya comes from a South Asian family that blends traditional customs with life in Raleigh, North Carolina. At home she hears both English and a South Asian language (such as Hindi or Tamil),
    and celebrates festivals like Diwali and Eid with family gatherings, lights, sweets, and traditional music. Her parents emphasize the importance of education, respect for elders, and community involvement,
    often attending events at a local cultural centre. This heritage enriches her daily life through the foods she eats, the stories she hears, and the values of curiosity, discipline, and resilience that
    guide her.
