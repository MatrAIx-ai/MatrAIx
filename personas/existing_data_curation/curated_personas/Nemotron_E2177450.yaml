  career_goals: She aims to attend a high school with a robust arts program and earn a scholarship based on her portfolio. Long‑term, Tania envisions studying museum studies or art history in college, with
    the ambition of curating innovative exhibitions that integrate technology and traditional art. She also considers a career in UI/UX design or creative coding, hoping to craft interactive experiences
    that engage audiences personally. Her competitive streak drives her to seek recognition in art competitions, science fairs, and scholarship contests, and she aspires to become a thought leader at the
    intersection of artistic expression and analytical thinking.
