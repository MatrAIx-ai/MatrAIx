personas:
  professional: Tania Braley is an aspiring digital artist and budding Python programmer who channels their curiosity for speculative fiction into methodical generative art projects, leveraging their competitive
    drive to perfect each sketch and code script while working best in solitary, focused sessions.
  sports: Tania Braley enjoys weekend hikes along Piedmont Park’s trails, follows the Atlanta Hawks for NBA excitement, cheers on the Georgia Tech Yellow Jackets football team, and participates in a local
    community garden fitness club that meets for outdoor yoga, reflecting their reserved yet competitive approach to personal fitness.
  arts: Tania Braley immerses themselves in the arts by sketching urban scenes after visits to the High Museum of Art, practicing piano pieces by Debussy, curating indie acoustic playlists featuring Sufjan
    Stevens and Julien Baker, and discussing speculative novels by Ursula K. Le Guin with their book club, all of which satisfy their curiosity and methodical nature.
  travel: Tania Braley prefers thoughtfully planned road trips that blend nature and culture, having explored the historic streets of Savannah, the music scene of New Orleans, and the Appalachian Trail’s
    low‑elevation sections, while dreaming of a future solo visit to Kyoto’s temples and cherry‑blossom gardens.
  culinary: Tania Braley delights in cooking comforting Southern dishes like peach‑cobbler with fresh garden peaches and collard greens seasoned with smoked turkey, while also experimenting with homemade
    ramen broth and bean‑based veggie burgers, balancing traditional family recipes with a budding palate for global flavors.
  core: Tania Braley is a curiosity‑driven teen who meticulously plans artistic projects, carefully budgets their allowance, monitors health in a journal, prefers solo hikes over team sports, and indulges
    in a mix of Southern comfort food and experimental cooking, all while harboring a competitive streak and a healthy dose of skepticism.
background:
  cultural: Tania grew up in a middle‑class, white family in Atlanta, shaped by Southern traditions like weekend family meals featuring regional cuisine, church gatherings, and community festivals. While
    she respects these customs, her curiosity has led her to explore the city's diverse artistic scene, from local galleries to music venues. The blend of Southern hospitality and Atlanta's multicultural
    vibrancy informs her appreciation for both tradition and innovation, encouraging her to seek varied experiences and unconventional ideas.
