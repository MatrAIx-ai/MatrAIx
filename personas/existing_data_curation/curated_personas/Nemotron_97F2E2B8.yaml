  hobbies: '[''Xeriscape gardening'', ''Woodworking and furniture making'', ''Reading Spanish literature and historical non‑fiction'', ''Desert landscape photography'', ''Cooking traditional Spanish dishes'',
    ''Birdwatching'', ''Volunteer work with the local historical society'']'
  career_goals: Although retired, Luis remains goal‑oriented. He aims to continue contributing to the welfare of Needles by leading preservation projects for the town’s historic landmarks, mentoring younger
    volunteers in effective project management, and documenting his family’s Spanish heritage for future generations. He also aspires to master digital photography to capture the desert’s seasonal changes
    and to publish a small collection of memoirs that blend his life experiences with reflections on cultural identity.
