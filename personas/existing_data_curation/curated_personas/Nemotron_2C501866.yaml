personas:
  professional: Jenna Harper, a retired archivist and genealogist, leverages their meticulous organization and competitive chess mind to curate annual art exhibitions, mentor volunteers, and manage the
    Northumberland Historical Society’s digital preservation projects with disciplined precision.
  sports: Jenna Harper, a devoted supporter of the Philadelphia Eagles and Pittsburgh Steelers, joins the Northumberland senior walking club for brisk morning strolls and participates in gentle tai chi
    classes at the community center, yet avoids high‑impact activities due to knee osteoarthritis, maintaining a competitive edge through senior chess tournaments rather than conventional sports.
  arts: Jenna Harper, a watercolor enthusiast inspired by the pastoral landscapes of Pennsylvania and the works of Andrew Wyeth, spends afternoons painting delicate heirloom roses, frequents the Susquehanna
    Art Museum, and curates community shows that spotlight emerging regional artists while collecting limited‑edition Edward Hopper prints.
  travel: Jenna Harper, an avid traveler with a taste for historic towns, has visited Gettysburg, the Hudson River Valley, and colonial Williamsburg, and dreams of strolling through Kyoto’s gardens, always
    planning trips during off‑peak seasons to stretch their modest travel fund and accommodate their preference for small‑group tours.
  culinary: Jenna Harper, a skilled home cook of traditional Pennsylvania Dutch fare, perfects dishes such as chicken corn soup, shoofly pie, and sauerkraut flavored with caraway seeds, while tending a
    modest herb garden for fresh rosemary and thyme, though they sometimes over‑salt their soups in pursuit of bold flavor.
  core: Jenna Harper, an 81‑year‑old meticulous archivist and watercolorist, balances disciplined organization with a competitive chess spirit, and they nurture both heritage and community while occasionally
    indulging in stubborn over‑planning.
background:
  cultural: Jenna is a White American from Northumberland County, Pennsylvania, a region shaped by its coal‑mining heritage and Pennsylvania Dutch influences. Her ancestry blends German and Scotch‑Irish
    immigrant roots that arrived in the late 19th century. Raised in a modest, rural community, she internalized the Protestant work ethic, self‑reliance, and close‑knit neighborhood values typical of the
    area. Her generation lived through World War II, the post‑war economic boom, and the cultural shifts of the 1960s, experiences that nurtured both a respect for tradition and a curiosity about new ideas,
    art, and varied experiences. These cultural currents have reinforced her preference for small‑group interaction, disciplined organization, and an appreciation for preserving local history.
attributes:
  skills: '["Archival documentation and preservation", "Family genealogy research", "Household budgeting and estate management", "Community event planning and art curation", "Critical art analysis", "Strategic
