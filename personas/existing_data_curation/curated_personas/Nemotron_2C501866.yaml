  hobbies: '["Visiting art galleries and museums", "Watercolor painting", "Family genealogy research", "Garden cultivation (heirloom roses)", "Reading art history and biographies", "Senior‑level chess",
    "Crossword and Sudoku solving", "Attending small lecture series", "Docent volunteering at the historical society", "Cooking Pennsylvania Dutch recipes"]'
  career_goals: Although retired, Jenna remains driven by personal achievement. She aims to complete a comprehensive, multi‑generational family history manuscript that combines narrative storytelling with
    meticulously sourced documents. Jenna plans to curate an annual local art exhibition at the Northumberland Community Center, spotlighting emerging regional artists and integrating educational talks.
    She aspires to develop a series of workshops for seniors on archival preservation, digital scanning, and photo digitization, positioning herself as a resource within the historical society. Additionally,
    Jenna seeks to achieve mastery of photo‑editing software to digitize and share her family’s visual legacy, and to contribute occasional op‑eds to the local newspaper on art, heritage, and community
    topics.
