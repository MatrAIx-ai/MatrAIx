  career_goals: Kawani aims to complete a bachelor’s degree in communications or social work while securing internships in community outreach and event management. She aspires to become a program director
    for a youth‑focused nonprofit, designing inclusive events and mentorship programs that blend creative engagement with practical support. Long‑term, she envisions launching a podcast series that explores
    emerging social trends and personal resilience, and possibly leading a regional network of community centers that champion collaborative problem‑solving and cultural exchange.
