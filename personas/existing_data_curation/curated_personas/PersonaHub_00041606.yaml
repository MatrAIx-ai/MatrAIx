persona_description: A microbiologist who specializes in the study of bacterial infections, particularly typhoid fever and its carrier status. Her research focuses on the development of experimental models
  to understand the mechanisms of chronic asymptomatic carriers and the impact of Salmonella typhi on the immune system. She is interested in understanding the complex interplay between bacteria and the
  host immune system and how this affects the course of disease. Her work has implications for public health and the development of new therapeutic strategies for typhoid fever.
