  career_goals: Regina is fascinated by animals and the natural world, so she often talks about becoming a wildlife biologist or a veterinarian one day. She also enjoys helping classmates understand new
    concepts, which fuels an interest in teaching. Over the next few years, she hopes to join her school’s science club, participate in local nature‑conservation projects, and develop leadership skills
    by organizing group activities for her peers.
