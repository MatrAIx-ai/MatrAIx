personas:
  professional: Regina Ancieta, a budding junior programmer who channels their curiosity and practical problem-solving into simple coding projects on their tablet, thrives on collaborative hackathons with
    friends and often surprises themselves by turning LEGO story ideas into interactive games, even though they sometimes forget to save their work because they value flexibility over strict planning.
  sports: Regina Ancieta, an energetic soccer enthusiast who shines on the community field as a forward for the Merrimack River Kids Soccer Club, cheers passionately for the Boston Red Sox and Boston Celtics,
    and embraces the outdoor adventure club’s weekend hikes, always opting for group games that keep them moving and smiling.
  arts: Regina Ancieta, a creative spirit who loses themselves in adventure novels by Rick Riordan and mysteries by Enid Blyton, builds elaborate LEGO narratives while listening to upbeat pop hits from
    Taylor Swift and Billie Eilish, and loves to dance to Disney soundtracks with friends after school, blending storytelling and rhythm into their playtime.
  travel: Regina Ancieta, an inquisitive traveler who spends weekends exploring the winding trails along the Merrimack River, dreams of visiting the historic Freedom Trail in Boston and the towering castles
    of Scotland, and plans spontaneous road trips with friends whenever school breaks allow, favoring hands-on experiences over rigid itineraries.
  culinary: Regina Ancieta, a budding kitchen experimenter who adores pizza with pepperoni and extra cheese, enjoys crafting homemade mac and cheese with cheddar chunks, and occasionally tries simple sushi
    rolls with avocado and cucumber, yet often forgets to wash their hands before cooking because they rush to join the next game.
  core: Regina Ancieta, a lively 10-year-old who mixes boundless curiosity with laid-back practicality, dives into soccer, LEGO storytelling, and coding while staying calm, kind, and delightfully disorganized,
    and they always bring a positive spark to group activities.
background:
  cultural: Regina comes from a white, middle‑class family rooted in the New England region of the United States. Growing up in Merrimack, New Hampshire, she experiences the seasonal rhythms of New England
    life—sleigh rides and ice skating in winter, leaf‑peeping hikes in autumn, and community gatherings such as town fairs and Fourth of July fireworks. Her family values education, community involvement,
    and outdoor recreation, which shape her practical curiosity and cooperative nature.
