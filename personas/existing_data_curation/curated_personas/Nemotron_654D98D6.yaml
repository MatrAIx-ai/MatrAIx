personas:
  professional: Ivan Montan, a master barber with 25 years of experience, blends precision haircutting with artistic designs inspired by street murals and family independence‑day celebrations, and runs
    a meticulously organized shop that feels like a community hub.
  sports: Ivan Montan plays weekly community soccer matches with the Waterbury Wolves, follows the New England Patriots and New York Yankees closely, attends local fitness classes at the downtown YMCA,
    and maintains a personal routine of morning jogs along the Naugatuck River; they also support the Connecticut Huskies men’s basketball team.
  arts: Ivan Montan frequents the Yale University Art Gallery and hunts street murals in Hartford, drawing creative inspiration for custom hair designs, collects vintage barber snips, listens to classic
    folk strings from Central America alongside modern jazz from Miles Davis and Esperanza Spalding, and admires the works of Frida Kahlo, Jean‑Michel Basquiat, and musician Juan Luis Guerra.
  travel: Ivan Montan prefers short, purposeful trips, planning weekend getaways to New York City’s museum district, a culinary tour of New Orleans, and an annual pilgrimage to San Miguel de Allende, Mexico,
    while dreaming of a cultural immersion visit to Cartagena, Colombia; they balance travel with family responsibilities and a modest travel fund.
  culinary: Ivan Montan cooks traditional dishes like baleadas and tamales every Sunday, perfecting the corn‑tortilla batter, refried beans, cheese, and plantain fillings, while experimenting with mango‑salsa
    toppings, and enjoys occasional brunches at a local café serving avocado toast and artisanal coffee; their cooking skill is advanced, though they sometimes over‑salt in haste.
  core: Ivan Montan is a community‑focused master barber who merges artistic curiosity with rigorous organization, often battling stress‑induced worries while nurturing cultural ties through hair, food,
    and music.
background:
  cultural: Ivan was born to Honduran immigrants and grew up in a bilingual household where Spanish and English blended seamlessly. His family maintains strong ties to Honduran traditions, celebrating holidays
    like Día de la Independencia with homemade foods, music, and dancing. These cultural roots influence his aesthetic sensibilities, leading him to incorporate subtle Central American patterns and colors
    into his haircut designs. Ivan actively engages with the local Hispanic community in Waterbury, participating in cultural events, supporting local businesses, and mentoring youth. While he embraces
    his heritage, he also values the diverse fabric of Connecticut, fostering connections across cultural lines through his barbershop.
attributes:
