  hobbies: '[''visiting art museums'', ''street mural exploration'', ''listening to Honduran folk music and jazz'', ''community soccer games'', ''participating in cultural festivals'', ''cooking traditional
    Honduran cuisine'', ''collecting vintage barber tools'', ''photography'', ''volunteering grooming workshops'']'
  career_goals: Ivan aspires to transform his barbershop into a cultural hub that blends hairstyling with visual art, hosting monthly art showcases and workshops for local youth. He aims to earn a master
    barber certification and eventually open a small barber academy to train aspiring barbers, emphasizing both technical skill and artistic expression. Expanding his clientele beyond Waterbury, Ivan plans
    to develop a brand known for distinctive, culturally inspired designs, while ensuring financial stability for his family. He also hopes to incorporate stress‑reduction initiatives, such as guided relaxation
    sessions, to promote wellbeing for both staff and customers.
