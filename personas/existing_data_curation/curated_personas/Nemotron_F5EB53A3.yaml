  hobbies: '["gardening (vegetables & herbs)", "reading historical fiction", "running club", "volunteering mentorship", "cooking Southern cuisine", "attending gospel concerts", "exploring local farmers''
    markets"]'
  career_goals: Looking ahead, Linda is determined to transition into senior strategic leadership within HR. In the next three to five years she aims to earn the SHRM-SCP credential and deepen her expertise
    in predictive workforce analytics, positioning herself for a Director of Talent Strategy or HR Business Partner role at a regional manufacturing or technology firm. She intends to lead a company-wide
    diversity, equity and inclusion initiative that embeds measurable outcomes, drawing on her personal experience as a Black woman in the South. Long-term, Linda envisions launching a boutique consulting
    practice that offers data-driven HR solutions to small and mid-size businesses across Georgia, helping them build resilient, compliant, and inclusive workplaces while maintaining the flexibility she
    values.
