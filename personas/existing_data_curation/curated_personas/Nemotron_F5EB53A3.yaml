personas:
  professional: Linda, a senior human resources leader with over twenty years of experience, blends their data‑driven expertise in HR analytics, structured recruitment pipelines, and Lean Six Sigma process
    improvement with a pragmatic, flexible attitude that lets them thrive in a dynamic environment while championing equitable workplace policies.
  sports: Linda hits the trails with the Cherokee Trail Runners each Saturday, mixes in early‑morning jogs through the foothills, follows the Atlanta Falcons for football and the Atlanta Hawks for basketball,
    and occasionally joins a community yoga class in the winter to stay limber, using their competitive spirit to push through each session.
  arts: Linda frequently attends gospel concerts featuring Kirk Franklin and Yolanda Adams, curates a personal library of historical fiction by authors like Walter Dean Myers, and enjoys the soulful storytelling
    of Aretha Franklin’s classics, which together fuel their creative spirit and cultural pride, and they often share these inspirations at community gatherings.
  travel: Linda prefers low‑key road trips that combine cultural immersion and natural scenery, having explored New Orleans’ jazz quarter, Charleston’s historic district, and Asheville’s mountain hikes,
    while they plan a future getaway to Savannah’s riverfront to savor its culinary scene.
  culinary: Linda loves to reimagine classic Southern comfort foods—whipping up collard greens seasoned with smoked turkey and a splash of apple cider vinegar, black‑eyed peas simmered with sweet potatoes
    and olive oil, and a whole‑wheat cornbread sweetened with honey—showcasing their intermediate cooking skills and commitment to healthier, flavor‑forward meals, and they often bring these dishes to neighborhood
    potlucks.
  core: Linda is a data‑savvy HR strategist who balances a competitive edge with a deep sense of community, nurturing a backyard garden while they occasionally misplace their keys and skip routine check‑ups.
background:
  cultural: Linda was born and raised in the Greater Atlanta area to a family rooted in the African-American experience of the South. Her grandparents participated in the civil-rights movement of the 1960s,
    imparting a strong sense of community responsibility and resilience that continues to shape her worldview. Growing up in a Baptist church community, she developed an appreciation for gospel music, collective
    worship, and the supportive networks that churches provide. Her family's Southern culinary traditions—soul food dishes like collard greens, black-eyed peas, and cornbread—remain central to family gatherings
    and her own cooking experiments. As a Black woman working in a predominantly white region of Cherokee County, Linda navigates both professional and social spaces with a keen awareness of representation,
    often championing diversity initiatives in her workplace. She actively participates in the local NAACP chapter and attends cultural festivals such as the Juneteenth celebration in nearby Atlanta, where
    she connects with a broader Black diaspora and honors her heritage.
