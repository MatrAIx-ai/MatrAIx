  career_goals: Short‑term, Nanci aims to become an assistant manager at her current retail location within the next 12‑18 months, leveraging her customer‑service expertise and leadership potential. Long‑term,
    she intends to transition into arts administration or community outreach, using her bachelor's degree in humanities and passion for cultural programming to manage exhibitions, educational events, or
    a nonprofit that brings the arts to underserved neighborhoods. She also considers enrolling in a part‑time master's program in arts management to blend practical management experience with her creative
    interests.
