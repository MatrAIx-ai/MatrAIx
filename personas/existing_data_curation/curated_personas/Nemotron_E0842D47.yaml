personas:
  professional: Avel Tran, a seasoned pastor in a Midwestern parish, blends bilingual liturgical leadership with community organizing and mentorship, honoring traditional rites like Tet while integrating
    modern outreach, reflecting their curiosity‑driven yet practical approach to ministry.
  sports: Avel Tran enjoys cheering on the Chicago Cubs and the Chicago Bears, participates in a senior bowling league at the local senior center, and keeps fit through weekly walks with the Waukegan Senior
    Fitness walking group, balancing a love for community sports with a low‑impact exercise routine.
  arts: Avel Tran finds inspiration in the Chicago Symphony Orchestra, frequently sings works by composer John Rutter, enjoys piano improvisations by Keith Jarrett, and watches classic films starring Audrey
    Hepburn during quiet evenings, letting the arts shape their worship and personal reflection.
  travel: Avel Tran prefers well‑planned trips that combine family visits to their ancestral home in Vietnam with cultural pilgrimages like a retreat to the Basilica of Guadalupe in Texas and leisurely
    drives along the Great Lakes shoreline, balancing purposeful travel with relaxation.
  culinary: Avel Tran delights in crafting fusion dishes such as a phở‑inspired chicken pot pie and bánh mì sliders with Wisconsin cheddar, often using garden herbs like basil, cilantro, and rosemary to
    create a herb‑pesto sauce, while occasionally splurging on premium wagyu for special holiday feasts.
  core: Avel Tran balances lifelong devotion to community service with playful culinary curiosity, steadfast faith, and a penchant for over‑scheduling, all tempered by their gentle, sociable nature.
background:
  cultural: Avel is a first‑generation Vietnamese‑American who grew up in a close‑knit immigrant community in the Midwest. His family upheld traditional Vietnamese Catholic practices, celebrating Tet, ancestral
    rites, and Vietnamese feast days while also integrating into American life through holidays like Thanksgiving and Fourth of July. Bilingual in Vietnamese and English, he serves as a cultural bridge,
    often translating for older parishioners and infusing worship with both Asian and Western elements. The surname "Velasco" reflects a later adoption of a Hispanic‑inspired ministerial name, illustrating
    his inclusive approach to spirituality and an openness to diverse cultural expressions within his congregation.
