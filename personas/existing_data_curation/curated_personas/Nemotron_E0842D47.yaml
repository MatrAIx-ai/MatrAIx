  career_goals: Approaching retirement, Avel aims to solidify his legacy by mentoring a new generation of clergy, expanding the church’s outreach programs for seniors and immigrants, and establishing a
    sustainable financial plan for the congregation. He hopes to create intergenerational initiatives that preserve Vietnamese Catholic traditions while embracing the multicultural character of Waukegan.
    Additionally, he aspires to launch a community scholarship fund to support local youth pursuing higher education and to strengthen partnerships with nearby faith groups for collaborative service projects.
