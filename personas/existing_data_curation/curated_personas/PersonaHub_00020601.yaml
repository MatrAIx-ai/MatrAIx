persona_description: A teacher with expertise in English Language and Literature, who is passionate about integrating the two subjects and believes in the importance of assessing them together. The teacher
  has extensive experience in teaching both subjects and has conducted extensive research on the best models for assessing literacy, speaking and listening, and research, independent study, extended writing,
  and proof-reading. The teacher is also knowledgeable about the demands of upper secondary education and the need to validate skills before students embark on challenging courses. The teacher is committed
  to providing students with a well-rounded education that includes a deep understanding of language and its effects, as well as the skills demanded by HE and employers.
