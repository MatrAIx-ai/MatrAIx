persona_description: A scientist who specializes in the study of primate behavior, particularly the hunting and consumption of meat by chimpanzees. Their research interests include, but are not limited
  to, the development of new tools and techniques for studying primate behavior, the evolution of primate behavior, and the cognitive abilities of chimpanzees. They are particularly interested in the use
  of percussive technology by chimpanzees to open food items such as nuts, hard-shelled fruit, and snails, and the development of new tools for studying this behavior. They are also interested in the impact
  of social isolation on the development of primate behavior and the potential for future planning in chimpanzee behavior.
