  hobbies: '[''Reading (non‑fiction economics & psychology)'', ''Personal finance blogging'', ''Hiking (Neuse River Trail)'', ''Gardening'', ''Yoga and meditation'', ''Crossword puzzles'', ''Sudoku'', ''Behind‑the‑scenes
    volunteering at food pantry'']'
  career_goals: Jessica aims to earn her CFA charter within the next three years and progress to a senior investment analyst role focused on sustainable and impact investing. She envisions leading a team
    that integrates rigorous financial performance metrics with social responsibility criteria, eventually shaping the firm’s ESG strategy. Long‑term, she hopes to combine her analytical skills with community
    outreach by developing a financial‑literacy program for underserved youth in eastern North Carolina, leveraging remote work opportunities to balance her preference for solitude with a meaningful, compassionate
    impact.
