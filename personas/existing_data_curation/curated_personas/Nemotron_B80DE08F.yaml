  career_goals: Kimani aspires to earn a scholarship that will allow him to study computer science or mechanical engineering at a university, with the long‑term goal of designing technology that benefits
    his community, such as affordable robotics tools for STEM outreach. He also dreams of continuing his athletic development, aiming for a college basketball opportunity that could open doors to both academic
    and professional pathways. In addition, he hopes to become a mentor for younger students in Murfreesboro, using his blend of curiosity and practicality to guide them toward creative problem solving
    and responsible teamwork.
