personas:
  professional: Kimani Zackery, a budding robotics enthusiast, channels their curiosity and practicality into designing programmable LEGO creations while balancing school assignments and Saturday basketball
    games.
  sports: Kimani Zackery thrives on the basketball court and track field, regularly playing pickup games at the local park, tracking personal bests in sprint drills with a phone app, and cheering for the
    Los Angeles Lakers while competing in the community youth sports league.
  arts: Kimani Zackery curates dynamic playlists featuring Kendrick Lamar, Beyoncé, and Kirk Franklin, shares them during game nights, enjoys re‑reading classic science‑fiction novels by Isaac Asimov for
    creative inspiration, and often analyzes lyric meanings with friends, though they sometimes question the authenticity of mainstream pop trends.
  travel: Kimani Zackery prefers short, well‑planned weekend trips to destinations like the Grand Canyon and Orlando’s Disney World, balancing the excitement of adventure with a practical need to stay within
    a modest family budget, even though they occasionally dream of spontaneous overseas travel.
  culinary: Kimani Zackery favors quick, flavorful meals such as pepperoni pizza, spicy ramen with jalapeños, and homemade mac and cheese, often cooking while listening to hip‑hop beats and experimenting
    with snack‑size LEGO‑inspired fruit skewers, though they sometimes over‑season dishes and leave a mess they rarely clean up without prompting.
  core: Kimani Zackery is a competitive, tech‑savvy teen who blends robotics projects, basketball, and vibrant playlists, yet occasionally lets late‑night gaming and missed dental appointments slip through
    their otherwise organized routine.
background:
  cultural: Kimani is an African‑American teen growing up in Murfreesboro, Tennessee. His family maintains strong ties to their Southern roots, celebrating traditions such as church gatherings, family barbecues,
    and observances of Juneteenth and historically Black holidays. He is influenced by the rich musical legacy of the region, mixing Southern gospel and contemporary hip‑hop in his everyday life. Community
    involvement through local church youth groups and the NAACP youth chapter reinforces a sense of pride in his heritage and a commitment to uplifting peers. While he navigates the broader Southern culture,
    he also embraces the diversity of his neighborhood, blending classic Southern hospitality with the resilience and creativity characteristic of the African‑American experience.
