persona_description: A scientist who specializes in the study of planetary atmospheres and the properties of exoplanets. They have a background in astronomy and have conducted research on the composition
  of exoplanet atmospheres, particularly those with high atmospheric densities. They have expertise in using transit spectroscopy and have published research on the composition of the atmosphere of WASP-12b,
  a gas giant planet with a high atmospheric density. They have made a discovery that the planet is unusually rich in carbon, which could have implications for the formation of other rocky planets in the
  same solar system.
