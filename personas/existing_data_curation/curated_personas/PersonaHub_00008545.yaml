persona_description: A geneticist with a special interest in the study of Gaucher disease, its inheritance patterns, and the impact of mutations on the disease progression. They are interested in understanding
  the genetic mechanisms underlying the disease, the role of autosomal recessive inheritance, and the implications of mutations on the function of glucocerebrosidase enzymes. They are also interested in
  contributing to the Gaucher Registry, which aims to improve the diagnosis and treatment of patients with Gaucher disease.
