  career_goals: Kevin aims to move into a supervisory role within quality assurance, eventually becoming a lead QA analyst or quality manager. He plans to earn an ASQ Certified Quality Engineer (CQE) certification
    and may pursue a bachelor's degree in industrial engineering to deepen his technical expertise. Long‑term, he envisions launching a consulting practice that helps local warehouses and manufacturers
    adopt efficient measurement, documentation, and automation solutions, leveraging his blend of curiosity and practical experience.
