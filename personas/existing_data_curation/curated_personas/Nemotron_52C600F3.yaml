  career_goals: Nathalie aims to transition into a senior sales trainer or team leader role where she can leverage her extensive experience to mentor new sales associates, especially those from bilingual
    backgrounds. She hopes to develop a structured onboarding program that emphasizes both sales efficacy and cultural competency. Additionally, she plans to collaborate with local non‑profits to create
    mentorship pipelines for Hispanic youth interested in business careers. In the long term, she envisions opening a modest community boutique that sells Mexican artisan goods, allowing her to blend her
    sales expertise with cultural advocacy while maintaining a predictable, well‑organized work routine.
