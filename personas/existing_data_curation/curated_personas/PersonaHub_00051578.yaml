persona_description: A healthcare professional who is knowledgeable about palliative care and its role in treating blood cancer patients. They have a PhD in palliative care and have experience working in
  the palliative care service at Royal Brisbane and Women’s Hospital. They are well-versed in the misconceptions surrounding palliative care and are familiar with the services available to patients. They
  are dedicated to providing practical and emotional support to patients and their families, and are skilled in managing physical, emotional, social, cultural, and spiritual problems resulting from a life-threatening
  illness or treatment.
