personas:
  professional: Travis Lyons, a 17‑year‑old aspiring automotive technician, blends his hands‑on prowess in routine car maintenance with a methodical knack for organizing parts inventories and writing Python
    scripts to automate shop paperwork, all while aiming for ASE certification and a future supervisory role in a structured manufacturing environment.
  sports: Travis Lyons follows the Carolina Panthers and the Charlotte Hornets from the comfort of their porch, spends weekends fishing for largemouth bass at Lake Wylie, and maintains a personal fitness
    routine of early morning jogs and occasional weight‑training at a home garage gym, preferring individual over team sports.
  arts: Travis Lyons expresses creativity through meticulous scale‑model assembly while listening to the soothing guitar of John Fahey and the ambient textures of Brian Eno, and they often unwind with classic
    country hits by Dolly Parton and Hank Williams, which echo the storytelling tradition of their hometown gatherings.
  travel: Travis Lyons favors low‑key travel, meticulously planning weekend getaways to places like the Blue Ridge Parkway, the historic streets of Charleston, and the serene trails of Great Smoky Mountains,
    where they can fish, observe nature, and return home refreshed without the stress of crowded tourist hubs.
  culinary: Travis Lyons enjoys the comforting flavors of Southern home cooking, often preparing fried chicken, collard greens, and shrimp‑and‑grits using vegetables from their garden, while their cooking
    skill remains functional rather than flamboyant, preferring straightforward recipes like a simple garden salad or biscuits with honey butter.
  core: Travis Lyons is a methodical teen who finds solace in solitary crafts, structured routines, and quietly reliable ambitions, balancing a love for hands‑on problem‑solving with a penchant for meticulous
    budgeting and modest self‑care.
background:
  cultural: Travis was raised in Fort Mill, a suburban community in York County, South Carolina, where Southern traditions and close‑knit family values shape daily life. His upbringing emphasized practicality,
    self‑reliance, and respect for routine, reflected in family gatherings centered around home‑cooked meals, church events, and local celebrations such as the county fair. While he participates in these
    cultural customs, he gravitates toward the quieter, individualistic side of his environment, preferring personal projects and solitary pursuits over large social gatherings.
