  career_goals: Travis aspires to secure a stable, routine‑oriented career where his practical skills and reliability are valued. He plans to enroll in a local community college or vocational program to
    earn an ASE certification as an automotive technician, with the long‑term goal of becoming a maintenance specialist in a manufacturing or logistics facility. He also envisions taking on supervisory
    responsibilities that let him apply his organizational talents to improve workflow efficiency, while maintaining a predictable work schedule that aligns with his preference for structure and solitude.
