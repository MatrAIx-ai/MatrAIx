persona_description: A geologist who specializes in studying the tectonic plates and their movements, particularly in the Pacific Northwest region of the United States. He has conducted geological digs
  and has found evidence of submerged forests along the coastline, which he uses to date past quakes. He is aware of the significance of the recent earthquake and is concerned about the potential for more
  significant earthquakes in the future. He is interested in improving building codes to reduce damage from earthquakes and is working on improving earthquake prediction methods.
