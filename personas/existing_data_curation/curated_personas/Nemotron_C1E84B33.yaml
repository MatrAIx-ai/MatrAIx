  career_goals: Charlene aims to transition her expertise toward nurturing the next generation of event professionals by offering mentorship workshops at local senior centers and community colleges. She
    hopes to spearhead a yearly arts‑focused festival in Milton that showcases regional artists and integrates sustainable, low‑waste event practices. Additionally, she plans to author a guidebook sharing
    flexible, emotionally resilient event‑management strategies for senior planners, and to establish a scholarship fund for young women pursuing careers in hospitality and event planning. Her overarching
    ambition is to leave a legacy of inclusive, harmonious gatherings that reflect both her artistic curiosity and her commitment to community well‑being.
