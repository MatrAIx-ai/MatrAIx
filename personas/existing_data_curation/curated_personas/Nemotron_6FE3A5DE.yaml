  career_goals: Don dreams of becoming an astronaut who explores space, a firefighter who rescues people, a professional soccer player who wins championships, a video game developer who creates interactive
    worlds, and a marine biologist who studies ocean life. In the short term, he aims to read chapter‑book level stories, improve his dribbling and shooting in youth soccer, win a local spelling bee, and
    complete a challenging LEGO set without step‑by‑step instructions.
