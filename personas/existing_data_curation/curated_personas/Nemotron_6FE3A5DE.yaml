personas:
  professional: Don Lamb, a curious six‑year‑old who builds elaborate LEGO structures and leads friends on the soccer field, blends a love for detailed planning with spontaneous bursts of competition, hinting
    at a future as an inventive engineer who thrives on clear rules but enjoys occasional rule‑bending play when they decide to improvise.
  sports: Don Lamb, an energetic six‑year‑old soccer enthusiast who plays for the neighborhood kids' league and practices swimming at the Sunny Shores Community Pool, cheers for Inter Miami CF and the Florida
    Panthers, proudly wears his tiny Adidas cleats during every after‑school match, and they love to rally teammates with a spirited go‑team chant that showcases their competitive edge.
  arts: Don Lamb, who spends afternoons sketching Spider‑Man and coloring activity books while dancing to Disney soundtracks in group music class, idolizes the vibrant animation of Pixar's Toy Story and
    the upbeat tunes of kid‑friendly pop star JoJo Siwa, and they often daydream about starring in their own superhero comic strip.
  travel: Don Lamb, a beach‑loving explorer who routinely dives into tide pools at Cocoa Beach, dreams of visiting the Kennedy Space Center and Disney World, hopes one day to trek the sand dunes of Morocco's
    Sahara after mastering his LEGO world‑building skills, and they imagine collecting seashells from every shore they visit as a reminder of each adventure.
  culinary: Don Lamb, who favours crunchy chicken nuggets, cheesy mac‑and‑cheese, and mango‑infused smoothies, can whip up a simple fruit salad with a kid‑safe knife but often neglects vegetables, leading
    to frequent broccoli battles with his parents at dinner, and they proudly claim that the sauce on their nuggets is the secret to culinary success.
  core: Don Lamb, a six‑year‑old bundle of competitive spirit and playful curiosity, constantly balances structured LEGO building with spontaneous soccer scrimmages, while a love for dinosaurs, cartoons,
    and sugary snacks fuels both his imaginative worlds and his occasional mess‑making mischief, and they often forget to tidy up before moving on to the next adventure.
background:
  cultural: Don is a white American child raised in a middle‑class family in Saint Petersburg, Florida. His upbringing reflects mainstream Anglo‑American cultural norms, with celebrations of holidays such
    as Thanksgiving, Christmas, and the Fourth of July. The coastal environment influences his love of beach activities, swimming, and marine exploration, while his school and community expose him to a
    diverse, multicultural Florida setting. Family life emphasizes practical values, outdoor recreation, and participation in local youth sports and community events.
