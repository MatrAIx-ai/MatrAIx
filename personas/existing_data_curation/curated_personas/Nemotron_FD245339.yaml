  career_goals: Although retired, Peggy’s current ambitions focus on leaving a lasting personal and cultural legacy. She aims to finish a memoir that weaves together her family’s history with reflections
    on Midwestern art and philosophy, mentor her grandchildren in creative pursuits, and continue expanding the senior-center arts program she helped launch. She also aspires to learn advanced digital illustration
    tools, contribute occasional articles to the local historical society newsletter, and remain an active participant in community-building initiatives.
