    ''Diversity and inclusion advocacy'']'
  hobbies: '[''Visiting art museums'', ''Photography'', ''Cooking traditional Puerto Rican dishes'', ''Traveling'', ''Hiking in Central Florida nature preserves'', ''Reading about business innovation and
    art history'', ''Listening to jazz and salsa music'', ''Participating in community cultural events'', ''Playing chess'', ''Volunteering at local youth mentorship programs'']'
  career_goals: Fernando envisions stepping into a senior executive role such as Vice President of Operations or Chief Operating Officer within a forward‑looking hospitality or multinational organization.
    He aims to lead digital transformation projects that embed AI‑driven analytics, automation, and sustainability into daily operations. A core ambition is to build a pipeline of diverse talent by establishing
    mentorship programs for young professionals, particularly those from Hispanic backgrounds. Long‑term, he hopes to launch his own consultancy focused on operational excellence and cultural integration,
    while also endowing a scholarship that supports Puerto Rican students pursuing business degrees. Throughout his trajectory, he remains committed to driving inclusive, innovative, and resilient operational
    strategies.
