personas:
  professional: Fernando Colonaponte is a seasoned operations leader with over 25 years in hospitality and retail, leveraging Lean Six Sigma Black Belt expertise, ERP implementation skill, and bilingual
    team management to drive cost‑reduction, digital transformation and inclusive culture while methodically planning every initiative to the last detail.
  sports: Fernando Colonaponte follows the Orlando Magic and Orlando City SC, plays weekend golf at the Bay Hill Club, and participates in a local hiking group that tackles the Ocala Trail, balancing moderate
    cardio with a penchant for occasional pickup basketball games.
  arts: 'Fernando Colonaponte spends weekends at the Orlando Museum of Art, collects works by contemporary Latin American artists such: Doris Salcedo and Julio Le Parc, practices street photography of downtown
    murals, and curates playlists featuring Miles Davis, Celia Cruz, and Bomba Estéreo to fuel his creative inspiration.'
  travel: Fernando Colonaponte prefers immersive trips, having trekked the cloud forests of Monteverde, explored the historic streets of Havana, relaxed on the beaches of Punta Cana, and meticulously planned
    each itinerary around local festivals while balancing family responsibilities.
  culinary: Fernando Colonaponte is an avid home chef who expertly prepares dishes like mofongo with plantains, pasteles stuffed with pork and sofrito, and arroz con gandules, favoring fresh cilantro, adobo
    seasoning, and a splash of rum‑infused broth, while experimenting with sous‑vide techniques on weekend evenings.
  core: Fernando Colonaponte blends disciplined operational mastery with a relentless appetite for art, travel, and flavor, habitually snapping photos of receipts for budgeting while never missing a chance
    to debate the latest modern art exhibition.
background:
  cultural: Fernando was born to Puerto Rican parents who immigrated to the United States in the 1970s. Raised in a bilingual household, he grew up speaking Spanish at home while attending English‑language
    schools. Family traditions such as celebrating Nochebuena, preparing lechón, and dancing to bomba and plena remain central to his identity. In Orlando, he is an active member of the Puerto Rican diaspora,
    contributing to annual events like Fiesta Boricua and supporting local cultural centers that promote Hispanic heritage. His Catholic upbringing instilled values of community service and respect for
    elders, which translate into his collaborative leadership style. By intertwining Puerto Rican customs with Floridian life, Fernando maintains a strong sense of cultural pride while fostering inclusive
    connections across diverse communities.
attributes:
  skills: '[''Strategic planning'', ''Process optimization'', ''Lean Six Sigma Black Belt'', ''Budgeting & financial forecasting'', ''ERP implementation (SAP, Oracle NetSuite)'', ''Data analytics (Power
