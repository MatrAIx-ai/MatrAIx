personas:
  professional: Cassandra Mathurin, a retired community event coordinator and volunteer archivist, channels her methodical project‑management expertise and calm, curious demeanor into curating intergenerational
    history workshops, preserving local heritage, and collaborating with the Montgomery Museum of History to develop educational exhibits.
  sports: Cassandra Mathurin enjoys low‑impact morning walks with the Montgomery Senior Fitness Club, follows the Alabama Crimson Tide football season with fervor, and attends occasional Atlanta Braves
    games, while practicing gentle yoga twice a week to keep her osteoarthritis in check.
  arts: Cassandra Mathurin frequents the Montgomery Museum of Fine Arts to study works by Jacob Lawrence and Romare Bearden, delights in live performances of Miles Davis tributes at local jazz clubs, and
    curates community art displays featuring emerging Southern painters, blending her refined visual eye with a lifelong curiosity for both classic and contemporary creation.
  travel: Cassandra Mathurin has visited the historic streets of Charleston, savored the culinary scene of New Orleans' French Quarter, and dreams of exploring the art museums of Paris, yet she prefers
    meticulously planned road trips with her sister that balance cultural immersion and leisurely garden stops.
  culinary: Cassandra Mathurin excels at preparing soul‑food staples like smoked turkey collard greens, shrimp and okra gumbo, and sweet potato casserole, seasoning with fresh thyme, smoked paprika, and
    a splash of hot sauce, while she enjoys experimenting by infusing traditional dishes with unexpected herbs like basil and lemongrass.
  core: Cassandra Mathurin combines a calm, organized mind with a relentless curiosity, turning her love of art, history, and gardening into a purposeful retirement filled with volunteer workshops, quiet
    quilting sessions, and occasional jazz indulgences, even if she sometimes forgets to water her newly planted roses.
background:
  cultural: Cassandra’s cultural identity is rooted in the rich African-American heritage of Montgomery, Alabama. Growing up in a close‑knit church community, she embraced the traditions of gospel music,
    communal meals, and oral storytelling. Her family participated in civil‑rights era events, giving her a deep appreciation for social justice and community activism. She has maintained culinary traditions
    passed down through generations, such as collard greens, sweet potato pie, and fried catfish, while also experimenting with contemporary twists. Cassandra’s involvement in local cultural festivals and
    historic preservation societies reflects her commitment to honoring and sharing the legacy of Black Southern life.
attributes:
  skills: '[''Event Planning'', ''Community Outreach'', ''Archival Research'', ''Genealogy Documentation'', ''Budget Management'', ''Art Curation'', ''Mentorship'', ''Culinary Arts'', ''Quilting'']'
  hobbies: '[''Art Gallery Visits'', ''Jazz Concerts'', ''Gardening'', ''Soul Food Cooking'', ''Genealogy Research'', ''Historical Fiction Reading'', ''Quilting'', ''Crochet'', ''Bridge'']'
  career_goals: Although retired from formal employment, Cassandra is committed to lifelong learning and intends to deepen her expertise in local African-American history by collaborating with the Montgomery
    Museum of History. She aims to author a memoir that intertwines personal narratives with the broader civil‑rights movement, and to develop a series of intergenerational storytelling workshops at the
    community center. Cassandra also aspires to obtain a certification in genealogy, enabling her to assist community members in tracing their ancestry. Ultimately, she hopes to leave a lasting educational
    legacy that preserves Montgomery’s cultural heritage for future generations.
