  career_goals: Lilia aims to transition into a director‑level role or chief financial officer position within the next five years, focusing on embedding sustainable finance initiatives and digital transformation
    across the organization. She plans to mentor emerging female leaders in finance, champion diversity and inclusion, and publish thought‑leadership pieces on the intersection of technology and financial
    stewardship. While preparing for eventual retirement, she wishes to leave a measurable legacy of improved financial performance and a more resilient, forward‑looking finance function.
