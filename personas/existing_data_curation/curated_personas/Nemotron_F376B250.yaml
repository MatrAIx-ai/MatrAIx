    problem solving under pressure"]'
  hobbies: '["Cooking traditional Mexican dishes","Watching soccer (Liga MX and MLS) matches","Restoring a 1970 Chevrolet pickup truck","Fishing trips on Galveston Bay","Playing billiards at a local lounge","Volunteering
    to teach first aid at community centers","Listening to banda and norteño music","Attending family celebrations and cultural holidays"]'
  career_goals: Hector aims to earn a paramedic certification within the next two years, positioning himself for a supervisory role such as lead EMT or shift commander at his agency. He seeks a more predictable
    schedule to balance family life while continuing to serve his community. Long‑term, Hector envisions establishing a small community‑based first‑response service that offers free basic medical care and
    health‑education workshops in underserved Houston neighborhoods, especially targeting Spanish‑speaking residents. He also hopes to mentor younger EMTs and earn recognition as a reliable, practical problem‑solver.
