personas:
  professional: Todd Peter is a meticulous press operator with expertise in offset and digital printing, who leverages their methodical workflow, graphic design know-how, and communal spirit to lead teams,
    troubleshoot press issues, and envision a boutique studio that merges traditional print craftsmanship with experimental art projects for Charleston's creative community, and they mentor junior staff
    with patient enthusiasm.
  sports: Todd Peter paddles with the Charleston Kayak Club on serene marsh mornings, hikes the ACE Basin trails on weekends, and roots for the Carolina Panthers while occasionally joining a beach‑volleyball
    league at Folly Beach, blending low‑key outdoor activity with regional sports fandom, and they relish the sense of community these pursuits foster.
  arts: Todd Peter immerses themselves in Charleston’s vibrant arts scene, volunteering on set design at the local community theater, snapping analog photographs of historic columns, attending Spoleto Festival
    performances by avant‑garde composer Kamasi Washington, and collecting limited‑edition prints by regional painter Willie Bell, all while drawing flash‑fiction inspiration from author NK Jemisin and
    listening to the soulful rhythms of Hurray for the Riff Raff, and they consider each creative encounter a catalyst for their own artistic experiments.
  travel: Todd Peter favours spontaneous road trips along the Blue Ridge Parkway to Asheville’s mountain retreats and curated weekend getaways to Savannah’s historic squares, while dreaming of a summer
    escape to Reykjavik’s midnight sun and an annual pilgrimage to New Orleans for Mardi Gras, balancing a modest travel budget with a yearning for both domestic serenity and international cultural immersion,
    and they meticulously plan each itinerary in a well‑marked notebook.
  culinary: Todd Peter’s palate swings between Lowcountry classics—shrimp and grits seasoned with Old Bay, she‑crab soup, and a side of pimento cheese—and new‑wave dishes like Korean‑inspired tteokbokki
    tacos, a testament to their love of fresh seafood, spice, and occasional kitchen experiments that are punctuated by fast‑food runs when press deadlines loom, and they often pair meals with craft beers
    from Holy City Brewing.
  core: Todd Peter is an imaginative yet methodical 29‑year‑old who transforms the hum of printing presses into artistic possibilities, but their perpetual worry about deadlines often fuels late‑night coffee
    binges and a tendency to over‑schedule their social calendar, and they struggle to unwind after a long shift.
background:
  cultural: Todd was raised in the Lowcountry of South Carolina, where the coastal Charleston heritage and Southern hospitality shaped his worldview. Family gatherings, church community, and local festivals
    instilled a strong sense of community and respect for tradition. At the same time, the vibrant arts scene in historic downtown Charleston exposed him to contemporary music, visual arts, and multicultural
    influences, fueling his imaginative side. His upbringing blends rural Southern values with urban cultural experiences, giving him a nuanced appreciation for both classic Southern customs and modern
    creative expression.
attributes:
  skills: '[''Offset printing'', ''Digital press operation'', ''Color management'', ''Prepress workflow'', ''Graphic design basics (Adobe Photoshop, Illustrator)'', ''Equipment maintenance'', ''Quality
