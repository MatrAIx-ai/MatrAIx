  hobbies: '[''Live music events'', ''Analog photography'', ''Speculative fiction reading'', ''Short flash fiction writing'', ''Board game nights'', ''Hiking and kayaking in the Lowcountry'', ''Community
    theater set design volunteering'']'
  career_goals: Todd aims to advance from press operator to production supervisor within the next three years, eventually taking on a plant manager role where he can shape workflow efficiencies and integrate
    newer digital printing technologies. Long‑term, he dreams of opening a boutique print studio that blends traditional offset techniques with experimental art projects, offering custom limited‑edition
    prints for local artists and designers. He plans to supplement his associate’s degree with certifications in print technology and a part‑time graphic design program to broaden his creative leadership
    capabilities.
