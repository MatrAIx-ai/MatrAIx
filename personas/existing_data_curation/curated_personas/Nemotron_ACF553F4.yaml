  hobbies: '[''Soul‑food cooking'', ''Community gardening'', ''Quilting'', ''Reading (historical biographies, African‑American literature)'', ''Bridge (card game)'', ''Walking along the Maumee River'',
    ''Church choir singing'', ''Senior‑center volunteering'', ''Local history research'', ''Mentoring youth in STEM'']'
  career_goals: Although no longer in the formal workforce, Angel aims to leave a lasting legacy by fostering the next generation of Black engineers and scientists in Toledo. She plans to partner with the
    local library and the community college to establish a free STEM mentorship program for middle‑school girls, especially those from underrepresented backgrounds. Angel also aspires to document oral histories
    of senior members of the African‑American community, compiling them into a digital archive for the Black Historical Society of Lucas County. Additionally, she seeks to expand the senior‑center’s intergenerational
    activities, creating regular workshops that blend practical skills—such as basic home repairs—with cultural storytelling.
