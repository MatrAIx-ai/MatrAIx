personas:
  professional: Angel Eskridge, a retired mechanical engineer who spent three decades at Toledo's Public Works Department, now leverages her methodical CAD design, budget oversight, and regulatory expertise
    to mentor middle‑school girls in STEM, organize senior‑center workshops, and archive oral histories for the local historical society.
  sports: Angel Eskridge enjoys daily walks along the Maumee River, participates in the senior bowling league at the community center, cheerfully follows the Toledo Mud Hens baseball season and the University
    of Toledo Rockets football games, and occasionally joins a low‑impact yoga class for seniors to maintain flexibility.
  arts: Angel Eskridge finds solace in the church choir singing gospel hymns by Mahalia Jackson and Aretha Franklin, attends the annual community theater’s rendition of classic plays, collects records of
    James Brown and Sam Cooke, and spends evenings quilting while listening to the smooth piano of Duke Ellington.
  travel: Angel Eskridge favors short, well‑planned trips with friends from her bridge club, enjoys revisiting heritage sites like the Smithsonian Museum in Washington, D.C., the French Quarter of New Orleans,
    and dreams of a gentle Mississippi River cruise to trace her family’s migration routes, always booking through a trusted senior travel agency and preferring accommodations with easy ground‑level access.
  culinary: Angel Eskridge, a hearty home cook, relishes preparing classic soul‑food staples such as fried catfish, collard greens simmered with smoked turkey, cornbread, and sweet‑potato pie, frequently
    using her seasoned cast‑iron skillet and pantry staples like okra, black‑eyed peas, and molasses, while sharing the bounty at church potlucks and swapping recipes at the senior center.
  core: Angel Eskridge is a methodical, community‑driven elder who blends engineering precision with soulful traditions, relentless routine, and a warm, assertive spirit.
background:
  cultural: Angel was born in 1938 to parents who migrated from the Deep South during the Great Migration, settling in Toledo's historic African‑American neighborhoods. Growing up during segregation and
    the civil‑rights era, she internalized a strong sense of resilience, collective responsibility, and respect for tradition. Her life has been shaped by the Black church, which remains a cornerstone of
    her social network, and by community institutions like the Black Historical Society and local fraternal organizations. Angel’s cultural identity blends Midwestern practicality with the rich oral and
    culinary traditions of African‑American heritage, influencing everything from her methodical approach to problem‑solving to her love of soulful music, storytelling, and intergenerational mentorship.
attributes:
