persona_description: A diplomat who served as the American Minister to Russia, promoting the American revolutionary cause and establishing diplomatic relations between the United States and Russia. He was
  appointed Minister to Russia in 1780, but his credentials were refused by the Russian Government in 1781. He remained in Russia as a private citizen for two years to promote the American cause, and later
  served as Chargé d'Affaires and Consul General at Philadelphia. He presented his credentials to Emperor Alexander I in 1803 and established diplomatic relations between the United States and Russia. He
  was also involved in the establishment of diplomatic relations with other states, such as the British and French. He was a proponent of American independence and a leader in the American diplomatic efforts
  to gain recognition from other European countries.
