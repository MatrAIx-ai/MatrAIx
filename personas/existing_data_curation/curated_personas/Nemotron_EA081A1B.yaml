  hobbies: '[''Fishing'', ''Hiking in the Blue Ridge Mountains'', ''DIY home improvement projects'', ''Woodworking'', ''Classic car restoration'', ''Playing acoustic guitar'', ''Attending local church events'',
    ''Watching Clemson Tigers football'', ''Exploring smart‑home technology'', ''Volunteer community service'']'
  career_goals: Dwight aims to become a master electrician and obtain specialized certifications in renewable energy and smart‑home technologies. He envisions launching his own small contracting business
    that emphasizes sustainable installations, such as solar panels and EV chargers, while providing reliable service to his community. He also hopes to mentor the next generation of tradespeople, maintain
    a healthy work‑life balance for his family, and continue learning about emerging electrical innovations without sacrificing the practical, proven methods that define his work style.
