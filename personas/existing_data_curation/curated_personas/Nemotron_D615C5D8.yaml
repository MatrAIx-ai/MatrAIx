  career_goals: Lalitha aims to ascend to a Director of Clinical Operations role within a regional health system, overseeing multiple facilities and driving system-wide innovation. She seeks to integrate
    cutting‑edge technologies such as AI‑powered predictive analytics to improve patient outcomes and to champion comprehensive staff wellness and mental‑health programs. A strong advocate for equitable,
    culturally competent care, she plans to lead initiatives that reduce disparities and foster inclusive service models. Long‑term, she envisions transitioning into health‑services consulting and serving
    on the board of a non‑profit focused on community health education, while mentoring the next generation of health managers.
