persona_description: A utility executive who is responsible for overseeing the planning and execution of emergency response strategies for a national electricity transmission system. They must be familiar
  with the complex and critical nature of the system, as well as the importance of maintaining a resilient communication network to ensure the safe and timely restoration of power in the event of a Black
  Start scenario. They must also have a deep understanding of the operational processes and protocols involved in restoring power to critical infrastructure and end-users, as well as the ability to make
  informed decisions under pressure.
