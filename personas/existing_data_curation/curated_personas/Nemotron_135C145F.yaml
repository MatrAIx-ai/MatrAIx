personas:
  professional: Arthur Smith, a five-year-old aspiring marine explorer, merges curiosity and practicality by building detailed sand-tide dioramas during solitary beach play, while their relaxed, slightly
    disorganized style means shells are often rearranged without a set plan, hinting at a future career in marine biology.
  sports: Arthur Smith enjoys weekly swim lessons with the Virginia Beach Aquatics club and playful kick-ball with the town's Little League, cheers on the Washington Nationals during game nights, and prefers
    the calm of shallow water and small-group activities over crowded stadiums.
  arts: Arthur Smith spends afternoons drawing vibrant seashell mosaics and singing along to The Wiggles, while spontaneous dance parties in the living room reflect their love of small-group fun and carefree
    imagination.
  travel: Arthur Smith embraces spontaneous family road trips to the Virginia Beach boardwalk for sunrise shell hunts, enjoys occasional weekend visits to the National Mall in Washington, D.C., and dreams
    of a future Disney World adventure, favoring flexible itineraries and the comfort of familiar sand.
  culinary: Arthur Smith prefers creamy macaroni and cheese with extra cheddar, delights in grilled shrimp after beach visits, and loves making peanut-butter and jelly sandwiches, often helping to spread
    the peanut butter with a mismatched wooden spoon.
  core: Arthur Smith is a five-year-old coastal explorer who balances endless curiosity about marine life with a relaxed, occasionally messy approach to play, loves sand-tide projects, piggy-bank savings,
    and soft-cheese snacks, and quietly prefers small-group adventures over loud crowds.
background:
  cultural: Arthur grew up in a suburban neighborhood of Virginia Beach, Virginia, within a contemporary American family of European‑American heritage. His household observes mainstream U.S. holidays such
    as Thanksgiving, Christmas, and the Fourth of July, often celebrating with beach picnics and community events like the Neptune Festival. He attends a local public preschool where he is introduced to
    both academic fundamentals and the coastal culture of the Atlantic shoreline. The family values education, nature, and community cooperation, encouraging his interest in marine life, outdoor play, and
    respectful social interactions.
