  career_goals: At his age, Arthur focuses on gaining confidence in reading and writing his name, and mastering riding his tricycle without assistance. He imagines exploring the ocean as a marine biologist,
    drawn from his love of tide pools and beach outings, while also picturing himself helping others as a friendly guide at a local aquarium or as a future teacher. He approaches these ambitions with a
    relaxed attitude, allowing his interests to evolve naturally rather than adhering to strict timelines.
