  career_goals: Glidys dreams of a future where she can combine her love for structured problem‑solving with technology. She aspires to become a software developer or a data analyst, hoping to design programs
    that solve real‑world challenges. Inspired by her competitive spirit, she wants to earn top honors in school science fairs and coding competitions. While she enjoys the idea of creating games, she also
    envisions a role that allows her to work independently, perhaps in a research lab or a tech startup, where she can apply her analytical skills and bilingual abilities to bridge cultural gaps in technology.
