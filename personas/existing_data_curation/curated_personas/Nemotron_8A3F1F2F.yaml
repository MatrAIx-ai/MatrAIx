personas:
  professional: A budding young engineer named Said Potier constructs intricate LEGO models, applying the same practical curiosity they read about in nonfiction books, and uses their organized yet flexible
    approach to experiment with building techniques while secretly competing with classmates for the most innovative designs.
  sports: Said Potier plays on the local 'Townsville Tigers' youth soccer team, idolizes professional clubs like Manchester United for their strategic play, and balances their competitive drive with occasional
    reluctance to join team drills, preferring solo practice with a ball whenever social interactions feel draining.
  arts: Said Potier channels anxiety into detailed sketches of forest insects and neighborhood scenes, admires the whimsical illustrations of Dr. Seuss and the vibrant colors of Van Gogh’s "Sunflowers",
    and spends free time doodling in a corner of their bedroom, turning art into a calming personal refuge.
  travel: Said Potier enjoys weekend nature walks in the nearby forest, dreams of exploring the Grand Canyon’s rock formations, has visited the nearby state park with their family, and prefers itineraries
    that mix structured museum tours with spontaneous bug‑collecting adventures, all while keeping a travel scrapbook.
  culinary: Said Potier loves the cheesy comfort of macaroni and cheese, delights in building homemade pizza with pepperoni and extra cheese, occasionally sneaks a bite of dark chocolate for a stress‑relief
    treat, yet consistently refuses broccoli, citing its "tree‑like" texture as off‑putting.
  core: Said Potier is a six‑year‑old LEGO architect who balances relentless curiosity with a competitive edge, a tendency to worry about tiny setbacks, and a calm‑seeking refuge in sketching and nature.
background:
  cultural: Said is raised in Graham, a small community in Pierce County, Washington, within a predominantly White, Pacific Northwest environment. His family carries French‑Canadian heritage, reflected
    in his name and occasional French phrases spoken at home, and they celebrate a blend of French familial traditions and typical American holidays. The local culture emphasizes outdoor recreation, environmental
    stewardship, and practical skills like gardening and DIY projects. Said’s upbringing combines this regional love of nature with his family's appreciation for learning and hands‑on activities, fostering
    a balanced outlook that values both curiosity and practicality.
