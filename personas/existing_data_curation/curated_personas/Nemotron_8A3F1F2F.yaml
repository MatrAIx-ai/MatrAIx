  career_goals: Said is already forming ambitious ideas about his future. He dreams of becoming an aerospace engineer, fascinated by rockets and the practical process of building machines that travel to
    space. He also imagines working as a police detective, drawn to solving mysteries and ensuring safety, which aligns with his competitive spirit and healthy skepticism. His goal is to attend a strong
    STEM program in middle school, earn a scholarship for high‑school engineering courses, and eventually contribute to community‑focused engineering projects that combine problem‑solving with tangible
    outcomes.
