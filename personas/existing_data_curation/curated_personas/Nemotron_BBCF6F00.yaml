    ''Process improvement and lean methodology'']'
  hobbies: '[''Salsa dancing'', ''Cooking Salvadoran cuisine'', ''Hiking in the New Jersey Highlands'', ''Volunteering at a Hispanic community center'', ''Playing in a weekend soccer league'', ''Traveling
    to culturally rich destinations'', ''Reading contemporary non‑fiction'', ''Yoga practice'']'
  career_goals: Leyla aspires to advance to a senior cost estimator role within the next three years, followed by a transition into cost management and project leadership. She plans to obtain the AACE Certified
    Cost Professional (CCP) credential and deepen her expertise in sustainable construction cost modeling. Long‑term, she envisions launching a boutique consulting firm that helps small‑to‑mid‑size developers
    incorporate flexible budgeting practices and green building economics, while maintaining a healthy work‑life balance that supports her family and community engagements.
