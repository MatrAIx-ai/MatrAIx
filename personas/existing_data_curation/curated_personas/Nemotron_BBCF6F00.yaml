personas:
  professional: Leyla Landrau, a cost estimator specializing in construction budgets, leverages advanced Excel modeling and industry‑standard estimating software to deliver data‑driven proposals, while
    their curious yet practical mindset drives them to explore emerging cost‑analysis tools yet keep estimates grounded, and their sociable nature helps them negotiate confidently with vendors across bilingual
    settings despite occasionally disorganized workflow.
  sports: Leyla Landrau, an avid participant in a co‑ed soccer league with the North Jersey Strikers and a regular hiker in the New Jersey Highlands, follows the New Jersey Devils and New York Knicks, balancing
    energetic group workouts with the occasional solo jog, while their preference for flexible scheduling means they sometimes skip a training session when a salsa class runs late.
  arts: Leyla Landrau’s artistic side shines at salsa nights where they dance to the rhythms of Celia Cruz and Carlos Vives, enjoy listening to Lin‑Manuel Miranda’s Soundtrack albums, and occasionally attend
    contemporary dance performances at the Joyce Theater, allowing them to weave cultural expression into their social life.
  travel: Leyla Landrau loves traveling to places that blend modern innovation with deep heritage, having already explored Barcelona’s Gaudí architecture, the historic streets of Cartagena, and the tech‑forward
    neighborhoods of Seoul, while dreaming of a sustainable retreat in Kyoto’s bamboo forests, they balance their love for discovery with a modest travel budget that prioritizes group tours with friends.
  culinary: Leyla Landrau cooks at an intermediate skill level, mastering pupusas stuffed with cheese, refried beans, and chicharrón, as well as crispy yuca frita seasoned with lime and garlic, while also
    enjoying experimenting with Mediterranean mezze like hummus and roasted red pepper, often hosting communal meals that showcase fresh cilantro, jalapeños, and tangy salsa verde.
  core: Leyla Landrau blends a curiosity‑driven career in cost estimation with a vibrant social life centered on salsa, soccer, and cooking, navigating life with flexible planning, occasional disorganization,
    and a determined focus on sustainable growth.
background:
  cultural: Leyla was raised in a close‑knit Salvadoran household that emphasized family gatherings, storytelling, and the celebration of holidays like Día de los Farolitos. Bilingual from childhood, she
    comfortably switches between Spanish and English, which enriches her professional interactions and community involvement. While she embraces her Salvadoran roots through food, music, and cultural events,
    she also identifies with the diverse fabric of Bergen County, balancing tradition with the adaptive, eclectic lifestyle of her New Jersey community.
attributes:
  skills: '[''Cost estimating and budgeting'', ''Construction project cost analysis'', ''Advanced Excel and data modeling'', ''ProEst, RSMeans, and Sage Estimating software proficiency'', ''Vendor negotiation
