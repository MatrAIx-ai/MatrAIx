  hobbies: '[''Museum visits'', ''Sketching'', ''Watercolor painting'', ''Photography'', ''Nature walks'', ''Reading contemporary fiction'', ''Journaling'', ''Cooking'', ''Volunteering at art workshops'',
    ''Listening to indie music'']'
  career_goals: Kim aims to enroll in a community-college program in art administration or museum studies while completing a certificate in project management. She hopes to work part-time as a museum docent
    or gallery assistant, eventually moving into a curatorial support role. Long-term, she envisions managing community-based art programs that bring diverse cultural experiences to Indianapolis neighborhoods,
    while also building a stable household with her spouse.
