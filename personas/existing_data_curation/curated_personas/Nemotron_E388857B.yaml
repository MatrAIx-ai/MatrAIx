personas:
  professional: A budding art administrator, Kim Jones leverages their meticulous organizational skills and love for visual storytelling to coordinate community art workshops, digitize exhibition archives,
    and craft engaging social‑media posts for the Indianapolis Museum of Art, all while pursuing a community‑college certificate in project management; they are driven by a curiosity that fuels their curatorial
    aspirations.
  sports: An active weekend explorer, Kim Jones enjoys jogging along the White River State Park trails with the local Indy Runners Club, follows the Indianapolis Colts and Indiana Pacers zealously, occasionally
    joins community yoga classes at a downtown studio, and participates in intramural volleyball during the spring semester; they thrive on the balance of solo runs and team camaraderie.
  arts: A dedicated art enthusiast, Kim Jones spends evenings sketching watercolors inspired by the luminous palettes of Georgia O'Keeffe and the urban narratives of Edward Hopper, frequents the Indianapolis
    Museum of Art to study works by Andy Warhol, curates photo series of downtown street life, and finds solace listening to indie musicians like Phoebe Bridgers while reviewing contemporary fiction by
    Sally Rooney; they channel their curiosity into every brushstroke and click.
  travel: An adventurous budget traveler, Kim Jones prefers weekend road trips to nearby cultural hubs such as Chicago's Art Institute and Nashville's music scene, meticulously plans itineraries using student
    discounts and public transit passes, dreams of a future study‑abroad semester in Florence, and balances the desire for exploration with the financial realities of a part‑time student schedule; they
    often map out routes on a tablet while listening to travel podcasts.
  culinary: A home‑cooking enthusiast, Kim Jones whips up simple yet flavorful meals like lemon‑basil chicken piccata, avocado toast with radish slices, and hearty black‑bean chili, often experimenting
    with fresh basil, garlic, and seasonal vegetables while listening to indie playlists, and occasionally treats the family to a homemade apple crisp for dessert; they keep a notebook of recipe tweaks
    for future family gatherings.
  core: Kim Jones is a curious, organized 19‑year‑old who blends a love for art and community service with a habit of over‑stocking on sketchbooks and a nightly tendency to binge‑edit photos; they balance
    ambition with a playful penchant for perfectionism.
background:
  cultural: Kim grew up in a middle‑class, white family in Indianapolis, absorbing Midwestern values of community, modesty, and practicality. Her upbringing included regular participation in local traditions
    such as Fourth of July parades, county fairs, and holiday celebrations with extended family. Exposure to the city's vibrant arts scene—through school field trips to the Indianapolis Museum of Art and
    the Cultural Trail—shaped her appreciation for diverse artistic expressions while maintaining a strong sense of local identity.
attributes:
  skills: '[''Microsoft Office'', ''Google Workspace'', ''Event planning'', ''Volunteer coordination'', ''Basic photography'', ''Adobe Lightroom'', ''Adobe Photoshop'', ''Art appreciation'', ''Written communication'',
