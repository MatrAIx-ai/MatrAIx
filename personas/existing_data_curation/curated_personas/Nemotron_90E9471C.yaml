personas:
  professional: Mariela Ramos is a detail‑oriented hospitality cleaning specialist who leverages deep‑cleaning expertise, eco‑friendly practices, and an aesthetic eye from their love of art to deliver spotless
    boutique hotel spaces, while using digital scheduling tools and asserting leadership as they prepare for supervisory roles.
  sports: Mariela Ramos enjoys jogging through Central Park in the spring, practices yoga year‑round, follows the New York Knicks and NYCFC for basketball and soccer excitement, and plays in a co‑ed indoor
    soccer league at the Brooklyn Sports Club during the summer.
  arts: Mariela Ramos immerses themselves in New York’s art world, regularly attending openings at the Museum of Modern Art, exploring street murals in Bushwick, and drawing inspiration from artists like
    Kehinde Wiley, Banksy, and Tania Bruguera, while dancing to the rhythms of Juan Luis Guerra and Romeo Santos at local bachata nights.
  travel: Mariela Ramos prefers short, culturally rich getaways, often weekend‑hopping to historic neighborhoods in Washington, D.C., and using budget airlines to visit Cartagena for its vibrant colors
    before planning a longer trek through the Andes to explore art‑laden cities like Bogotá and Quito, all while balancing travel costs with a savings plan for future home ownership.
  culinary: Mariela Ramos delights in cooking Mangú topped with avocado‑lime crema, a quinoa‑infused version of Sancocho, and plantain‑based empanadas seasoned with cumin and cilantro, demonstrating a moderately
    advanced skill set that blends traditional Dominican flavors with contemporary twists and a love for fresh, local ingredients.
  core: Mariela Ramos blends an eye for design with disciplined cleaning expertise, dances bachata after yoga, and methodically saves for a New York condo while nurturing a modest garden of houseplants.
background:
  cultural: As a second‑generation Dominican American growing up in the vibrant neighborhoods of New York City, Mariela carries the island’s rich cultural tapestry into her daily life. Her household was
    steeped in Dominican customs—Spanish was spoken at home, meals centered around yucca, rice, beans, and plantains, and celebrations featured bachata, merengue, and salsa music. Family ties remain strong;
    she frequently sends remittances to relatives in Santo Domingo and participates in community events organized by local Dominican associations. This heritage imbues her with a communal spirit, resilience,
    and a deep appreciation for rhythmic art forms. At the same time, her New York upbringing exposed her to a mosaic of cultures, fostering an openness to diverse artistic expressions and contemporary
    urban lifestyles. Mariela identifies with both her Caribbean roots and the cosmopolitan rhythm of the city, navigating her identity with pride and adaptability.
attributes:
  skills: '[''Deep cleaning'', ''Sanitation standards'', ''Eco‑friendly cleaning techniques'', ''Linen management'', ''Inventory control'', ''Time management and scheduling'', ''Bilingual communication
