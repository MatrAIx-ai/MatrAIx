  hobbies: '[''Visiting museums and galleries'', ''Attending art workshops'', ''Bachata and merengue dancing'', ''Cooking Dominican cuisine'', ''Caring for houseplants'', ''Yoga and mindfulness meditation'',
    ''Reading contemporary fiction and design essays'', ''Participating in a bilingual book club'', ''Volunteering at a community garden'']'
  career_goals: Mariela aspires to advance from a cleaning operative to a supervisory role within a boutique hotel or upscale residential management firm, where she can integrate her eye for design into
    curated cleaning and presentation standards. She plans to obtain certification in hospitality management and eventually enroll in a bachelor’s program in Hospitality or Business Administration to broaden
    her managerial expertise. In the longer term, she envisions launching her own eco‑friendly cleaning service that serves New York’s diverse communities while providing stable income to support her family
    back home. She also hopes to achieve home ownership in the city as a milestone of financial independence.
