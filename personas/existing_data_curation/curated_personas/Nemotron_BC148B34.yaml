personas:
  professional: Pollet Partlow, an inquisitive four‑year‑old who loves building block towers, already shows the balancing act of curiosity and practicality that will one day guide them toward a future career
    in engineering, where they plan to blend creative ideas with proven methods.
  sports: Pollet Partlow, an energetic participant in the local community preschool soccer league, cheers for the nearby MLB team the Chicago Cubs during family outings, and enjoys splash‑time at the neighborhood
    pool, balancing team play with solitary backyard soccer dribbling.
  arts: Pollet Partlow, a little artist who spends afternoons drawing dinosaurs and humming songs from the movie “Moana,” frequently requests the preschool music teacher to lead sing‑along sessions, and
    has a budding admiration for the animated series “Sesame Street,” shaping their playful imagination.
  travel: Pollet Partlow, an adventurous traveler for their age who loves family road trips to the nearby national park where they explore the junior ranger trail, dreams of visiting Disney World, and prefers
    the excitement of a new playground over long flights, yet feels uneasy on crowded airports.
  culinary: Pollet Partlow, a picky eater with a strong affection for cheesy macaroni, peanut butter and jelly sandwiches, and chicken nuggets, yet delights in helping stir batter for banana pancakes, proudly
    adding a sprinkle of cinnamon, while turning their nose up at broccoli.
  core: Pollet Partlow, a four‑year‑old whose boundless curiosity is tempered by a practical streak, who navigates the world with organized spontaneity, expressive emotions, and a habit of counting every
    coin before bedtime.
background:
  cultural: Pollet Michael comes from an African American family rooted in the Jessup, Maryland community. His family celebrates cultural traditions such as music, storytelling, and communal meals, often
    sharing soul and gospel music at home. They attend a local community church that offers youth programs, and participate in family gatherings that emphasize respect for elders and the importance of education.
    The neighborhood’s cultural richness, including local festivals, library storytimes, and community centers, informs his awareness of his heritage and community values. His upbringing blends modern urban
    influences with the warmth of extended family networks.
