  hobbies: '[''fishing'', ''woodworking'', ''vegetable gardening'', ''reading practical manuals'', ''model train building'', ''playing chess'', ''volunteering for tool-safety workshops'']'
  career_goals: William aims to convert his extensive handyman abilities into a modest home‑based service business that provides reliable maintenance and repair work for neighbors, generating a stable supplemental
    income for his family. He plans to obtain an OSHA safety certification and a community‑college certificate in basic construction to formalize his expertise. Long‑term, he hopes to establish a small
    workshop where he can produce handcrafted furniture for sale, secure a comfortable retirement for his wife, and become a trusted mentor to younger members of his community by leading volunteer workshops
    on practical skills and safety.
