personas:
  professional: William Price is a disciplined handyman turning his extensive mechanical and carpentry expertise into a home‑based maintenance service; they meticulously plan each job, budget time and resources
    like a project manager, and prepare to formalize their skills with OSHA certification and a construction certificate.
  sports: William Price is an early‑morning fisherman on the St. Clair River who follows the Detroit Tigers and Detroit Lions religiously, participates in the local amateur fishing club, and plays chess
    competitively at the library, treating each match like a mental sport while skipping traditional gym workouts.
  arts: William Price finds artistic fulfillment in woodworking—crafting furniture and wooden toys inspired by the simple lines of Scandinavian design—while they listen to classic folk singers like Bob
    Dylan, collect model‑train kits featuring vintage locomotives, and watch classic westerns starring John Wayne as a quiet escape after a day of hand‑tool work.
  travel: William Price prefers low‑key, road‑trip adventures that combine fishing excursions to Lake Erie, visits to the Pine Creek woodworking retreat in Michigan’s Upper Peninsula, and occasional weekend
    getaways to nearby Canadian vineyards, and they plan itineraries months in advance to fit their budget and schedule.
  culinary: William Price cooks simple, hearty meals centered on fresh catches of perch, roasted garden vegetables like carrots and zucchini, and homemade whole‑grain bread, seasoning with rosemary, thyme,
    and a dash of smoked paprika, while they habitually brew a strong black coffee to start each early‑morning fishing trip.
  core: William Price is a methodical, solitude‑loving craftsman who transforms routine into reliability, balances a tight budget with occasional indulgences, and quietly mentors others while they never
    let anxiety disrupt their steady rhythm.
background:
  cultural: William grew up in a traditional Midwestern white working‑class family in St. Clair County, Michigan. His parents emphasized discipline, self‑reliance, and community involvement, values that
    remain central to his identity. He attended the local public high school and, after graduating, entered the regional manufacturing workforce before transitioning to a self‑directed handyman path. The
    cultural atmosphere of the area—rooted in modesty, practicality, loyalty to family and church, and a strong work ethic—shapes his worldview. He celebrates typical American holidays with his wife, participates
    in his Lutheran congregation’s events, and maintains a strong sense of belonging to the close‑knit Marysville community.
