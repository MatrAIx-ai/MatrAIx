  career_goals: Although retired from formal employment, Shannon aims to deepen her impact on the local community. She plans to obtain a peer‑support certification so she can mentor other widowed seniors,
    facilitate a weekly garden‑care talk at the community garden, and help new volunteers feel welcome. Shannon also hopes to compile her gardening experiences and family stories into a memoir, possibly
    publishing a short self‑help guide on simple sustainable gardening for beginners. She is eager to learn conversational Spanish to better engage with the diverse neighbors in Carlsbad and as a personal
    enrichment goal. Travel aspirations include visiting the Redwood National and State Parks and taking a leisurely road trip along the Pacific Coast to explore historic lighthouse sites.
