  hobbies: '[''Gardening'', ''Traditional Puerto Rican cooking'', ''Crochet and knitting'', ''Walking on the beach'', ''Latin dance (bomba/plena)'', ''Reading historical fiction'', ''Puzzle solving (crosswords,
