  career_goals: While still working as a data‑entry keyer, Idalmis aims to shift into a senior data coordinator position that allows her to mentor newer staff and design more efficient workflows. She hopes
    to formalize the macro‑based automation she has begun using, present a training program at her workplace, and eventually transition to a part‑time consultancy role helping local non‑profits with data
    organization. Her long‑term ambition is a phased retirement that preserves intellectual engagement but reduces daily stress, allowing more time for community volunteering and her personal interests.
