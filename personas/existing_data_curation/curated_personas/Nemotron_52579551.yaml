personas:
  professional: A veteran higher-education architect, Carolyn Russ leverages her decades of curriculum design expertise, interdisciplinary flair, and compassionate-assertive communication style to mentor
    faculty and champion a cross-disciplinary arts-humanities program, all while meticulously balancing organization with the flexibility needed to incorporate emerging ideas.
  sports: An advocate of gentle fitness, Carolyn Russ joins a senior walking club that meets each Saturday along the nearby lake trail, follows the Minnesota Twins baseball season with weekly game-day gatherings
    at her home, and participates in a community curling league each winter, supplementing these activities with a low-impact chair-yoga routine to ease her arthritis.
  arts: A dedicated creator and connoisseur, Carolyn Russ paints oil landscapes of the Minnesota prairies inspired by Albert Bierstadt, knits intricate Fair Isle scarves while humming Chopin’s Nocturnes,
    interprets Liszt’s Hungarian Rhapsodies on her upright piano, devours the novels of Jane Austen and the philosophy of Immanuel Kant, and regularly visits exhibitions featuring contemporary artists like
    Kehinde Wiley, letting each experience seed her own poetry.
  travel: A reflective wanderer, Carolyn Russ prefers meticulously planned short trips that blend cultural enrichment with comfortable pacing, such as a weekend art tour of the Metropolitan Museum in New
    York, a leisurely river cruise through the Great Lakes to see historic lighthouses in Michigan, and an annual family pilgrimage to Winnipeg for its folk festivals, always traveling with her daughter’s
    assistance and a sketchbook in tow.
  culinary: An experienced home cook, Carolyn Russ enjoys preparing hearty Minnesota wild-rice casserole with sage and dried cranberries, baking almond-crusted apple pie, and experimenting with rosemary-infused
    roasted root vegetables, pairing these meals with a cup of Earl Grey tea; her cooking skill is solidly intermediate, favoring reliable recipes over daring fusion, though she occasionally forgets to
    set the timer, resulting in a burnt crust she jokes about.
  core: Energetic yet worry-prone, Carolyn Russ channels her boundless curiosity into painting, piano, and mentorship, while habitually double-checking her medication list and occasionally misplacing her
    glasses on the kitchen table.
background:
  cultural: Carolyn is a white Midwestern American with German and Scandinavian ancestry, raised near Minneapolis in a Lutheran family that emphasized education, community service, and modest living. The
    cultural values of hard work, humility, and respect for tradition shaped her early life, while the diverse immigrant history of Minnesota fostered an openness to varied perspectives. Seasonal celebrations,
    local folk music, and community gatherings remain meaningful to her, and she continues to honor this heritage by participating in cultural events, supporting regional artists, and nurturing intergenerational
    connections.
