personas:
  professional: Catherine Ray, a budding junior game designer and storyteller, channels her curiosity and spontaneous energy into sketching characters, building simple Scratch games, and improvising narratives
    with her drama club, turning every brainstorm into a vivid, collaborative experiment.
  sports: Catherine Ray plays forward for the Edmond City Soccer Club's under‑12 team, cheers on the Oklahoma City Thunder for basketball, and spends weekends hiking local trails, blending competitive spirit
    with a love for outdoor adventure.
  arts: Catherine Ray fills sketchbooks with watercolor fantasies inspired by J.K. Rowling’s wizarding worlds, stages improvised scenes to the soundtrack of Taylor Swift and Kacey Musgraves, and avidly
    follows the illustrated works of Hayao Miyazaki and the pop‑culture sketches of Becky Cox.
  travel: Catherine Ray prefers spontaneous weekend getaways, often packing a backpack for day trips to the Wichita Mountains for wildlife spotting, while day‑dreaming about future trips to Disney World
    and the Grand Canyon, balancing family budget constraints with a hunger for new scenery.
  culinary: Catherine Ray loves the buttery crunch of chicken nuggets, the tangy zest of pepperoni pizza, and whips up quick fruit smoothies with strawberries and banana, yet frequently forgets to eat a
    balanced lunch after a long art session, relying on snacks from the school cafeteria.
  core: Catherine Ray is a curious, energetic eleven‑year‑old who blends art, code, and sport into spontaneous projects, occasionally loses track of deadlines, but always bounces back with a smile and a
    fresh sketch.
background:
  cultural: Catherine was raised in Edmond, a suburban community in Oklahoma County, where family gatherings often feature barbecue, local sports events, and seasonal county fairs. Her family’s ancestry
    traces back to German and Irish immigrants, and she has grown up surrounded by Midwestern values of community involvement, self‑reliance, and friendliness. The diverse cultural landscape of Oklahoma—including
    Native American art exhibits and the state’s strong music scene—has broadened her appreciation for different artistic expressions, while the local emphasis on school and community sports has reinforced
    her sociable and energetic nature.
