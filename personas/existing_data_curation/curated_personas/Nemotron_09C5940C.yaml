    ''visiting local museums and art galleries'', ''exploring nature trails in Oklahoma'', ''listening to pop and country music'']'
  career_goals: Catherine dreams of turning her love of art and community into a career that lets her share stories with a wide audience. She hopes one day to become a museum curator or documentary filmmaker,
    or perhaps a creative director for youth‑focused media. She also imagines traveling to different places to learn new artistic traditions and using her projects to inspire other kids to think creatively.
