persona_description: A biologist and researcher who specializes in marine conservation and the study of ancient Mediterranean fish species, particularly the dusky grouper. Guidetti and Micheli's research
  focuses on using ancient art and mosaics to assess the historical abundance and recovery of the dusky grouper, and the impact of fishing pressures on the fish's population. They are interested in calibrating
  conservation and management aims using art as a form of information, and their findings have been published in Frontiers in Ecology and the Environment.
