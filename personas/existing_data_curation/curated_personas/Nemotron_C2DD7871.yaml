  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Reading contemporary fiction and poetry'', ''Blogging about art and mental health'', ''Yoga and mindfulness
    meditation'', ''Volunteering at community arts events'', ''Cooking seasonal meals'', ''Tending a balcony garden'']'
  career_goals: Kathaleen aims to complete a bachelor's degree in Art History or Museum Studies within the next two years and then pursue a master's in Museum Administration. She envisions a career as a
    curator or program coordinator for a regional museum or nonprofit arts organization in the Mid‑Atlantic, where she can blend her organizational talents with her passion for art and community outreach.
    Long‑term, she hopes to develop educational programs that make contemporary art accessible to diverse audiences, and she is interested in integrating mental‑health awareness into museum programming
    to support visitors dealing with stress and anxiety. She also aspires to maintain a personal blog that explores the intersection of art, creativity, and emotional well‑being.
