persona_description: A passionate advocate for the revitalization of heritage orchards and cideries, Gary Paul Nabhan is a scholar in residence at Virginia Cider Week and an orchard-keeper of over 70 fruit
  and nut varieties in southern Arizona. He is a visionary entrepreneur who offers hope and inspiration through his independently-owned businesses, Vintage Virginia Apples, Abermarle CiderWorks, and Foggy
  Ridge Cider, which not only provide great tasting, pleasurable, and nutritious products but also offer a sense of community and pride among local residents. Nabhan's work has been honored by Utne Reader,
  and his twenty-five award-winning book titles and articles can be found on his website, www.garynabhan.com.
