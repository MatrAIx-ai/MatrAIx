personas:
  professional: Luis Marte is a community outreach and event‑coordination specialist for a regional arts nonprofit, leveraging bilingual fluency, Canva and Photoshop skills, and a curious, people‑centered
    mindset to design vibrant cultural festivals, though their laid‑back approach sometimes leads to last‑minute scramble when deadlines loom.
  sports: Luis Marte is an avid beach‑volleyball player with the Broward Sand Shapers club, a dedicated follower of the Miami Dolphins and Orlando Magic, and a salsa‑dance enthusiast who treats dancing
    as cardio, though they often skip formal gym workouts in favor of spontaneous late‑night beach jogs.
  arts: Luis Marte immerses themselves in the local arts scene, snapping street‑art photographs of murals by Miami‑based artist Jorge González, curating pop‑up gallery events featuring salsa musicians like
    Marc Anthony and reggaetón star Bad Bunny, while their curiosity fuels weekly visits to the ArtServe Gallery and they enjoy late‑night listening sessions of classic salsa legends like Celia Cruz.
  travel: Luis Marte prefers spontaneous, culturally rich trips, having already explored the historic streets of Old San Juan, the vibrant festivals of Santo Domingo, and the colorful markets of Cartagena,
    while they dream of a future road‑trip along the Florida Keys to capture sunrise murals, always budgeting with flexible hostels and occasional splurges on local culinary tours.
  culinary: Luis Marte enjoys crafting aromatic island dishes such as mofongo stuffed with garlic‑shrimp, arroz con gandules simmered with sofrito, and sweet plantain pasteles, cooking at a moderate skill
    level that blends traditional recipes with fresh cilantro, lime, and adobo, while they also delight in spicy empanadas from a downtown taquería.
  core: Luis Marte is a socially animated cultural connector who balances a love for spontaneous art projects and island‑flavored cooking with a habit of procrastinating appointments, a penchant for late‑night
    salsa, and an undercurrent of worry that drives them to seek calm through yoga.
background:
  cultural: Luis was raised in a Puerto Rican household, absorbing the island’s rich cultural traditions. He is bilingual in Spanish and English and celebrates holidays such as Nochebuena and the Puerto
    Rican Day Parade in Florida, maintaining close ties to an extended family that values music, dance, and communal meals. The rhythms of bomba, plena, and salsa are part of his daily soundtrack, and Caribbean
    cuisine shapes his cooking. Living in Hollywood, FL, he navigates a multicultural environment where Caribbean, Latin American, and Southern influences blend, allowing him to act as a cultural bridge
    between his heritage and the broader Broward County community.
attributes:
  skills: '["Community outreach", "Event planning", "Public speaking", "Social media management", "Basic graphic design (Canva, Photoshop)", "Bilingual communication (Spanish/English)", "Customer service",
    "Team coordination", "Creative brainstorming", "Adaptability", "Basic bookkeeping", "Problem solving"]'
  hobbies: '["Salsa dancing", "Street‑art tours", "Live music concerts", "Beach volleyball", "Photography", "Cooking Puerto Rican dishes", "Yoga and meditation", "Volunteering at community centers", "Traveling
    to Caribbean destinations", "Attending local art festivals"]'
  career_goals: Luis aims to turn his passion for the arts and community engagement into a sustainable career. He seeks a role as a program coordinator or outreach specialist within a cultural nonprofit
    or arts organization where he can curate events, manage volunteer teams, and promote Puerto Rican heritage in Florida. Over the next few years he hopes to build a freelance consultancy that offers social‑media
    marketing and event‑planning services to local artists and small businesses, giving him the flexibility he values while securing financial stability. Ultimately, he envisions creating a small community
    space that hosts art workshops, performances, and cultural gatherings, fostering collaboration and creative expression.
