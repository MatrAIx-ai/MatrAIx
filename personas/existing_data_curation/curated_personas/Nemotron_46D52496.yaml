personas:
  professional: Hong Yen is a budding project coordinator who leverages business administration coursework, bilingual English–Mandarin communication, and meticulous use of Microsoft Office and Google Workspace
    to organize community events, channeling their preference for structure and sociable energy into reliable nonprofit initiatives.
  sports: Hong Yen actively plays basketball at the local gym, competes in an intramural soccer league, trains in Taekwondo with the Rochester Taekwondo Club, supports the Buffalo Bills and Rochester Red
    Wings, and prefers weekend pickup games that blend organized drills with spontaneous play.
  arts: Hong Yen enjoys attending live shows at the Main Street Armory, where they’ve seen performances by Billie Eilish, The Strokes, and local indie band The Outliers, and they frequently capture candid
    event moments with a DSLR, drawing inspiration from street photographer Vivian Maier to fuel their creative expression.
  travel: Hong Yen prefers budget‑friendly road trips, often heading to Niagara Falls or the Adirondack Mountains for weekend hikes, while dreaming of a future backpacking adventure through Seoul and Barcelona,
    balancing careful itinerary planning with the occasional spontaneous detour when time and finances allow.
  culinary: Hong Yen experiments in the kitchen, mastering dishes like miso‑glazed chicken with corn‑bread crumble, kimchi fried rice topped with cheddar, and soy‑braised pork belly paired with maple‑sweet
    potato mash, showcasing an intermediate cooking skill set and a love for blending Asian‑inspired flavors with Midwestern comfort foods.
  core: Hong Yen is a structured yet outgoing 18‑year‑old who channels energetic love of community, sports, and creative fusion into disciplined project work, while balancing a caffeine habit, a tendency
    to over‑schedule, and occasional bouts of video‑game bingeing.
background:
  cultural: Hong is the son of first‑generation immigrants from East Asia who settled in Rochester, Michigan, when he was young. He grew up in a bilingual household, speaking Mandarin at home and English
    at school, and celebrates both traditional holidays such as Lunar New Year and American holidays like Thanksgiving. His parents emphasized diligence, respect for education, and community involvement—values
    that have shaped his practical and cooperative outlook. The blend of East Asian cultural traditions with Midwestern American life has fostered his appreciation for multiculturalism and his desire to
    bridge cultural gaps through both personal hobbies and future professional endeavors.
