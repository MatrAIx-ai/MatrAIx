  hobbies: '[''Basketball'', ''Intramural soccer'', ''Board games'', ''Video gaming'', ''Cooking fusion cuisine'', ''Volunteering at community center'', ''Taekwondo'', ''Photography'', ''Live music concerts'',
    ''Cultural festivals'']'
  career_goals: Hong aims to complete his associate degree in Business Administration and secure an entry‑level role in project management or community outreach within a nonprofit or corporate setting in
    the Rochester area. Over the next five years, he plans to earn a Project Management Professional (PMP) certification and lead initiatives that enhance community engagement and cultural integration.
    Ultimately, he hopes to launch a community‑focused cultural events agency that provides programs for youth and bridges his East Asian heritage with Midwestern community life.
