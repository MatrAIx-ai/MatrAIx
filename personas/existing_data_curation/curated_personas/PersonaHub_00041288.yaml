persona_description: A biologist who studies the behavior and ecology of desert martins, specifically focusing on their nesting behavior, migration patterns, and the factors that influence their breeding
  success. This individual is knowledgeable about the dry conditions in the Sonoran Desert, the importance of rain in supporting the martins' survival, and the unique challenges posed by the unstable saguaros
  in which they nest. They are skilled at using technology to monitor and study the martins, including the use of mirrors to view nests and the creation of a custom tool to check the nest contents.
