  hobbies: '[''Visiting art galleries and museums'', ''Playing acoustic guitar'', ''Digital painting'', ''Hiking'', ''Competitive chess'', ''Board‑game nights'', ''Cooking Tex‑Mex cuisine'', ''Reading nonfiction
    (psychology, innovation, education)'', ''Attending live music events'']'
  career_goals: William aims to earn a Master’s degree in Educational Leadership within the next three years and transition into a department head role, where he can lead curriculum innovation across the
    business studies department. He aspires to design and launch an interdisciplinary entrepreneurship program that blends arts, technology, and finance, and to mentor new teachers in adopting unconventional
    teaching methods. Long‑term, he envisions moving into school administration as an assistant principal, influencing school‑wide policies that promote creative, experiential learning, and ultimately publishing
    a guide on integrating artistic approaches into business education.
