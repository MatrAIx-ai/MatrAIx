personas:
  professional: William Gibson, a 27‑year‑old high school business teacher, blends strong instructional design and data‑driven assessment with arts‑based entrepreneurship projects, leveraging their curiosity
    and competitive drive to innovate curricula while balancing structured lesson plans with spontaneous, creative classroom moments.
  sports: William Gibson enjoys weekend hikes along the Brazos River Bend and long rides with the Austin Biking Club, follows Austin FC and the Texas Rangers loyally, and they balance a competitive edge
    from chess tournaments with a laid‑back approach to seasonal activities like summer mountain biking and winter indoor rock climbing.
  arts: William Gibson frequents the Blanton Museum of Art and local contemporary galleries, draws inspiration from artists like Kehinde Wiley and Banksy for his digital paintings, strums acoustic renditions
    of Janelle Monáe and St. Vincent at open‑mic nights, and they value the Austin‑Denton live‑music scene as a catalyst for their creative teaching methods.
  travel: William Gibson favors spontaneous road‑trips that blend cultural detours—like exploring Marfa’s minimalist art installations and savoring Tex‑Mex in Santa Fe—with occasional overseas trips to
    Lisbon and Kyoto when student‑loan budgeting permits, and they prefer flexible itineraries over rigid tours.
  culinary: William Gibson, an enthusiastic amateur chef, regularly cooks chicken fajitas with smoked chipotle, fresh cilantro, and lime‑marinated carne asada tacos, experiments with homemade guacamole
    featuring ripe avocados and jalapeños, but they occasionally burn the edges of their skillet when distracted by a guitar riff, reflecting a playful yet occasionally careless approach to the kitchen.
  core: William Gibson blends a teacher’s analytical rigor with an artist’s restless curiosity, juggling guitar strings, chess pieces, and lesson plans while they battle a habit of late‑night caffeine binges
    that fuel both creativity and occasional procrastination.
background:
  cultural: Raised in suburban Spring, Texas, William comes from a white Anglo‑American background that blends traditional Southern values—such as hospitality, community involvement, and respect for tradition—with
    a modern openness to new ideas. His family’s middle‑class upbringing emphasized self‑reliance, education, and civic engagement, influencing his commitment to teaching and mentorship. While culturally
    familiar with Texas customs like football fandom and backyard barbecues, he also embraces diverse artistic experiences and progressive educational philosophies, reflecting a balanced, contemporary Texan
    identity.
attributes:
  skills: '[''Curriculum development'', ''Financial literacy instruction'', ''Classroom management'', ''Data-driven assessment'', ''Technology integration (Google Classroom, interactive whiteboards)'',
