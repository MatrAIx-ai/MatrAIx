personas:
  professional: Susan Horton, a retired elementary and middle school teacher, leverages their four decades of experience designing differentiated, art‑infused curricula and their curiosity‑driven, organized
    yet flexible approach to mentor novice educators, champion arts funding, and shape community arts programming through the Lompoc Community Arts Center advisory board.
  sports: Susan Horton follows the San Francisco Giants in baseball and the Golden State Warriors in basketball, joins the Lompoc Senior Walking Club for low‑impact cardio, practices yoga twice weekly at
    the community center, and occasionally paddles a board along the nearby wetlands during summer to stay active.
  arts: Susan Horton channels their artistic curiosity through watercolor landscapes reminiscent of Monet and O'Keeffe, attends productions at the Pacific Conservatory of the Performing Arts featuring performances
    by actors like Meryl Streep, reads novels by Hilary Mantel and contemporary poet Ocean Vuong, and enjoys crafting pottery inspired by the works of Bernard Leach.
  travel: Susan Horton plans their travel around museum and festival itineraries, having recently explored the Getty Center in Los Angeles and the Portland Japanese Garden, while dreaming of a cultural
    pilgrimage to Florence's Uffizi Gallery and the cherry blossoms of Kyoto, balancing careful budgeting with spontaneous weekend road trips along the Pacific Coast Highway.
  culinary: Susan Horton enjoys cooking Mediterranean‑inspired meals such as grilled swordfish with rosemary potatoes and fresh tomato‑caper salad, relishes seasonal produce from their succulents and vegetable
    garden, treasures a well‑made avocado toast with poached egg at their favorite local café, and indulges in occasional fine‑dining experiences featuring California farm‑to‑table dishes like heirloom
    beet risotto.
  core: Susan Horton blends a lifelong curiosity for art and education with a disciplined yet flexible routine, channeling their love of watercolor, gardening, and mentorship while occasionally forgetting
    to water their succulents during rainy weeks.
background:
  cultural: Susan Ann Horton identifies as a white American with deep roots in California's Central Coast region. Growing up in a middle‑class family near the coast, she was shaped by the blend of agricultural
    heritage, a strong community focus, and the liberal, arts‑appreciative atmosphere of Santa Barbara County. The cultural milieu emphasized education, civic participation, and an appreciation for the
    natural landscape—from the vineyards to the coastal dunes. Her lifelong exposure to diverse cultural events, such as local art fairs, Indigenous history programs, and multicultural festivals, has cultivated
    an open‑minded outlook while maintaining a grounded, community‑oriented identity.
