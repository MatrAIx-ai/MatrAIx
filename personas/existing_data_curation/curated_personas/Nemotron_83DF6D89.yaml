  career_goals: Although retired from full‑time teaching, Susan remains committed to advancing quality education in her community. She aims to volunteer as a mentor for early‑career teachers through local
    school districts, contribute to the development of arts‑focused curricula for district-wide adoption, and serve on the advisory board of the Lompoc Community Arts Center. Susan also aspires to write
    a series of reflective essays or a memoir recounting her experiences in education, highlighting the importance of curiosity and creative thinking in the classroom. In the broader sense, she hopes to
    advocate for sustained funding for arts programs in schools and to foster intergenerational learning opportunities that connect seniors with youth.
