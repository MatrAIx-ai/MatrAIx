  hobbies: '[''Fishing'', ''Boating'', ''Hunting'', ''Motorcycling'', ''DIY vehicle restoration'', ''Gardening'', ''Camping'', ''Playing farming simulation video games'', ''Attending community festivals'',
    ''Listening to classic rock music'', ''Photography of rural landscapes'', ''Listening to personal development podcasts'']'
  career_goals: Mathew aims to earn advanced certifications such as a Certified Safety Professional and specialized forklift and tractor operator licenses. He aspires to move into a supervisory role, eventually
    becoming a fleet manager overseeing equipment maintenance and safety programs for a larger agricultural or logistics operation. Long‑term, he envisions launching his own equipment‑rental and maintenance
    business, leveraging his practical expertise while providing stable employment for his community. He also seeks to improve his stress‑management skills by establishing a more predictable work schedule
    and pursuing further education in logistics management.
