  career_goals: Patrick aims to advance into supervisory and management roles within casino security, targeting positions such as Shift Supervisor and eventually Security Operations Manager. He intends
    to obtain Certified Protection Professional (CPP) certification and lead the implementation of advanced analytics for surveillance systems. Mentoring new recruits and establishing higher safety standards
    are key ambitions. Long‑term, he seeks a stable retirement with pension benefits while leaving a legacy of improved security protocols for local gambling venues.
