  hobbies: '[''Woodworking'', ''Model Railroading'', ''Fishing'', ''Gardening'', ''Puzzle Solving'', ''Historical Non-Fiction Reading'', ''Genealogy Research'', ''Financial Literacy Volunteering'']'
  career_goals: Kenneth aims to advance to a senior supervisory position within the accounting department, where he can lead workflow optimization projects and mentor newer staff. He plans to obtain the
    Certified Bookkeeper designation to formalize his expertise and increase credibility with local businesses. Over the next few years, he hopes to transition to part-time consulting, offering financial
    advisory services to community non-profits and small enterprises, allowing him to maintain a structured schedule that helps manage stress while contributing meaningfully to his town.
