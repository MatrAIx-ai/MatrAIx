persona_description: An educational researcher and writer who is interested in the philosophy of adult education, particularly in its theoretical framework and practical implications. They are likely to
  be familiar with the concepts and theories related to epistemology, philosophy of mind, ethics, and social philosophy, and are interested in exploring the different types of value judgements permeating
  educational discourse. They are also interested in the communication of knowledge, the advancement of reason, and the moral education of the adult, and are looking for a philosophical framework to guide
  their practice in this growing area of educational concern.
