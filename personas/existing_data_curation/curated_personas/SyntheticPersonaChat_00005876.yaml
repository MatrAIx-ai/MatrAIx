    User 2: Why''s that?

    User 1: I love the hustle and bustle. I feel like there''s always something going on.

    User 2: I can understand that. I like the peace and quiet of the suburbs.

    User 1: I guess I just need some excitement in my life.

    User 2: Well, you''re definitely not going to find it on a pig farm!

