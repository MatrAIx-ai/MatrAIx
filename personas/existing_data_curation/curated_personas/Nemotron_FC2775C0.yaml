  hobbies: '[''Visiting art galleries and museums'', ''Creating mixed‑media artwork from recyclables'', ''Reading books on science and sustainability'', ''Volunteering for community clean‑up events'', ''Gardening'',
    ''Woodworking'', ''Playing guitar'', ''Attending local theater productions'', ''Researching local history and genealogy'', ''Participating in up‑cycling workshops'']'
  career_goals: John aims to transition into a supervisory or training role within Chicopee's environmental services department, leveraging his extensive field experience to develop innovative recycling
    and waste‑reduction programs. He aspires to lead community education initiatives, such as workshops that turn collected materials into public art installations, and to serve on municipal committees
    shaping zero‑waste policies. In the longer term, he hopes to secure a position that balances his desire for continued public service with reduced physical strain, allowing him to mentor the next generation
    of waste‑management professionals before retirement.
