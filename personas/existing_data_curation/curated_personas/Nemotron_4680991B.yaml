  career_goals: Paul aims to advance from his current clerk role into a supervisory position within the next two years, targeting a Warehouse Supervisor role where he can lead a team and implement lean
    inventory practices. He plans to complete a bachelor’s degree in Supply Chain Management part‑time to broaden his strategic understanding. In the longer term, he aspires to become a Logistics Manager,
    overseeing multiple facilities and driving cost‑saving initiatives. His career ambition is balanced with a desire for stability to support his growing family, and he is motivated to earn certifications
    such as the Certified Supply Chain Professional (CSCP) to strengthen his credentials.
