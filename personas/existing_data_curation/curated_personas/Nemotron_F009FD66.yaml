  career_goals: Although retired, Rahil aims to stay intellectually engaged by volunteering as a STEM mentor at the local community college and serving as an advisor for a regional ASME chapter. He plans
    to compile his decades of engineering experience into a series of how‑to guides and occasional blog posts, using his classic‑car restoration project as a teaching platform for hands‑on learning. Additionally,
    he hopes to maintain his health and mental sharpness by pursuing these scholarly and community‑oriented activities.
