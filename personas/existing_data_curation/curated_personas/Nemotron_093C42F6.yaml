personas:
  professional: Heidi Roper, an aspiring financial analyst, channels their obsessive organization, bullet‑journal discipline, and competitive spirit into mastering Excel‑driven budgeting models, positioning
    themselves to dominate the regional finance scene in Tennessee.
  sports: Heidi Roper enjoys solitary hikes on the rural trails of Middle Tennessee and participates in the local Midtown Runners club for weekend 5K runs, while they cheer for the Nashville Predators in
    hockey and the Tennessee Titans in football, blending personal fitness with team loyalty.
  arts: Heidi Roper curates a quiet evening routine of listening to Ludovico Einaudi’s piano pieces, studying Malcolm Gladwell’s non‑fiction, and reviewing macro photographs of wildflowers inspired by Georgia
    O’Keeffe, and they use art as a contemplative escape that satisfies both curiosity and structure.
  travel: Heidi Roper prefers meticulously planned trips that mix nature and cultural immersion, such as a budget‑friendly road‑trip through the Great Smoky Mountains followed by a weekend in Asheville,
    North Carolina, while they dream of a solo itinerary to Kyoto to capture cherry blossoms in spring.
  culinary: Heidi Roper finds solace in following precise recipes like lemon‑meringue pie and sourdough bread, measuring ingredients to the gram and incorporating fresh rosemary, thyme, and almond flour,
    though they occasionally over‑bake cookies as a minor stress‑relief mishap.
  core: Heidi Roper is a hyper‑organized 18‑year‑old with a competitive edge, a bullet‑journal obsession, a lingering anxiety, and they love solitary, precision‑driven hobbies.
background:
  cultural: Heidi grew up in Eagleville, a small community in Rutherford County, Tennessee, where Southern Appalachian culture blends with contemporary rural life. Her family emphasizes self‑reliance, modesty,
    and community involvement, and she was raised in a Protestant (Baptist) environment that values family gatherings, church activities, and local traditions such as county fairs and high‑school sports.
    While she respects these traditions, her curiosity drives her to explore broader ideas through education and online communities. This background informs her practical approach to goals, her appreciation
    for organized, orderly activities, and her preference for small, trusted social circles.
attributes:
  skills: '[''Project Management'', ''Time Management'', ''Advanced Excel Spreadsheet Analysis'', ''Budgeting and Financial Planning'', ''Research Methodology'', ''Critical Thinking'', ''Basic Python Programming'',
