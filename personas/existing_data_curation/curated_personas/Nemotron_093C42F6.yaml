  hobbies: '[''Reading Non-Fiction'', ''Bullet Journaling'', ''Puzzle Solving (Crossword, Sudoku)'', ''Hiking'', ''Digital Photography'', ''Cooking and Baking'', ''Learning Python'', ''Mindfulness Meditation'',
    ''Volunteering for Tutoring'', ''Small Group Book Club'']'
  career_goals: Heidi aims to complete her Business Administration degree with a concentration in finance, achieve CPA certification, and secure a position as a financial analyst at a regional firm in Tennessee.
    She is driven by a competitive desire to be among the top performers and plans to leverage her organizational expertise to advance to a senior finance or CFO role within a decade. Ultimately, she hopes
    to launch her own consulting practice to help small local businesses with budgeting and financial planning.
