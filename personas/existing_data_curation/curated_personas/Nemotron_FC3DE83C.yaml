personas:
  professional: Ruben Desai, an 8-year-old with a knack for assembling LEGO sets and building model bridges, channels his methodical and organized nature into a budding interest in engineering, often sketching
    precise blueprints for imagined structures and explaining how they work to friends and teachers.
  sports: Ruben Desai, an 8-year-old member of the Greenfield Elementary soccer team, enjoys the structured drills and weekly matches, cheers for the local professional club the City Hawks, and spends his
    free time practicing penalty kicks in the backyard to improve consistency.
  arts: Ruben Desai, an 8-year-old who delights in listening to upbeat local pop hits and energetic Bollywood songs, especially tracks by Arijit Singh and the teenage star Maya, often hums along while reading
    adventure mysteries like 'The Secret of the Lost Island,' and occasionally draws cartoon scenes inspired by the music's rhythm.
  travel: Ruben Desai, an 8-year-old who loves exploring nearby nature trails with his parents, has a budding wish to visit the towering redwoods of California's Muir Woods and the historic forts of Gettysburg,
    and prefers trips that combine a clear itinerary with hands-on activities like building a simple shelter.
  culinary: Ruben Desai, an 8-year-old enthusiastic kitchen helper, enjoys measuring spices for traditional lentil stew and rolling dough for flatbreads, proudly bites into the crispy samosa they helped
    fry, and experiments by adding a pinch of extra cumin to taste.
  core: Ruben Desai, an 8-year-old planner who balances curiosity with caution, builds LEGO skyscrapers, saves spare coins, worries about tiny mishaps, and finds comfort in the rhythm of a soccer drill
    or a familiar song.
background:
  cultural: Ruben was born into a South Asian family that maintains strong cultural ties while living in Prosser, Washington. At home, his parents speak Gujarati and celebrate festivals such as Diwali,
    where they light diyas and share sweets, and Eid, with communal meals. The family places a high value on education, encouraging disciplined study habits and respect for elders. Traditional South Asian
    cuisine, like roti, dal, and biryani, is a regular part of family meals, and he often assists in cooking, learning recipes passed down through generations. While embracing the rural Pacific Northwest
    lifestyle—helping on a nearby farm during harvests and enjoying outdoor activities—Ruben also participates in school events and community programs, blending his cultural heritage with his American surroundings.
