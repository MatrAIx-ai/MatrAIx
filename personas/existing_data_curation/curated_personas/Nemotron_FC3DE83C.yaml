  career_goals: Ruben aspires to become a civil engineer who designs safe bridges and community spaces, inspired by his love for building LEGO structures and his fascination with how roads and buildings
    are constructed. He dreams of studying math and science in school, earning good grades, and eventually working on projects that improve his hometown of Prosser. He also expresses interest in helping
    others by ensuring that public spaces are accessible and well-maintained, reflecting his caring nature.
