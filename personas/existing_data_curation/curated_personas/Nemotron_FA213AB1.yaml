  career_goals: Jennifer aims to transition from being a solo contractor to owning a small, employee‑owned painting company that emphasizes high‑quality workmanship, sustainable materials, and community
    outreach. Over the next five years she plans to earn her Georgia contractor’s license, develop a mentorship program for young tradespeople, and partner with local non‑profits such as Habitat for Humanity
    and senior‑center housing projects to provide free or discounted painting services. She also hopes to specialize in historic restoration painting, preserving the architectural heritage of Austell and
    surrounding neighborhoods, while positioning her business as a trusted resource for both residential and small‑scale commercial clients.
