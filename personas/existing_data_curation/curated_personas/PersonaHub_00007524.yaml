persona_description: An organizer of education workers in higher education in the South who is committed to building a union to fight for social and economic justice for workers in the state's higher education
  institutions. The organizer is skilled in organizing and strategizing, and has experience with organizing workers in K-12 public schools in states that also prohibit public employee collective bargaining.
  The organizer is also knowledgeable about the history of worker education actions in the South and has a background in organizing for social justice issues, including defending the right to a public education
  for children of color, disabled children, rural children, and LGBTQ children. The organizer is currently working on building an effective wall-to-wall union in Mississippi to bring equity and justice
  to workers in the state's higher education institutions.
