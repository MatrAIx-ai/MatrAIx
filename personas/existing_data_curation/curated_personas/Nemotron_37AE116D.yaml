  hobbies: '[''Morning walks'', ''Guitar practice'', ''Personal coding projects'', ''Reading science fiction'', ''Traditional Mexican cooking'', ''Mechanical puzzles'', ''3D printing'', ''Indoor herb gardening'',
    ''Attending cultural festivals'']'
  career_goals: Milagros aims to secure a role that leverages her analytical strengths while allowing her to work independently and maintain a predictable routine. She aspires to become a lead data analyst
    or quality‑assurance specialist in a manufacturing or biotech firm where practical problem‑solving is valued. In the next three to five years, she plans to earn certifications in data science and Six
    Sigma, publish technical reports, and build a reputation for high‑performance metrics. Ultimately, she hopes to transition into a consulting capacity that lets her choose projects, set her own schedule,
    and compete for top‑tier results, all while preserving the solitary work environment she thrives in.
