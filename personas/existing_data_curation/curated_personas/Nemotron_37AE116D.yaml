personas:
  professional: Milagros Barahona, a budding data analyst with strong Python, MATLAB, and statistical modeling skills, blends a routine‑driven work ethic with spontaneous problem‑solving bursts, thriving
    in independent roles that let them troubleshoot hardware‑software blends, conduct PCR‑based data collection, and produce clear bilingual technical documentation.
  sports: Milagros Barahona enjoys solitary fitness routines, logging daily morning walks along the Huron River, joining the Ann Arbor Running Club for occasional 5K races, cheering on the Detroit Lions
    and the Michigan Wolverines, and treating weekend rock‑climbing sessions at a local gym as a practical test of their problem‑solving mindset.
  arts: Milagros Barahona cultivates a quiet creative outlet through acoustic guitar practice, often interpreting pieces by Andrés Segovia and John Williams, while devouring science‑fiction novels by Liu
    Cixin and Octavia Butler, and attending Día de los Muertos exhibitions that inspire them to design 3D‑printed ornaments echoing folk art.
  travel: Milagros Barahona prefers low‑key, self‑planned trips that blend nature and culture, such as weekend hikes in Hocking Hills, a solo summer getaway to explore the historic streets of Oaxaca, and
    a dreamed itinerary for the cherry blossoms of Kyoto, all balanced against a modest student‑budget and a desire to avoid crowded tours.
  culinary: Milagros Barahona is an adept home cook who perfects traditional dishes like enchiladas and tamales, spices them with home‑grown cilantro and oregano from their indoor herb garden, experiments
    with plating techniques inspired by chefs like Massimo Bottura, yet occasionally over‑salts when distracted by a new coding challenge.
  core: Milagros Barahona blends a love for solitary, routine‑bound problem solving with occasional bursts of creative tinkering, juggling data analysis by day, guitar riffs by night, and a persistent habit
    of over‑ordering 3D‑printing filament even when storage space runs low.
background:
  cultural: Milagros is a first‑generation Mexican‑American who grew up speaking Spanish at home and celebrating Mexican holidays such as Día de los Muertos and Las Posadas. Her family emphasized practicality,
    respect for elders, and a strong work ethic, values that align with her STEM education. Living in Ann Arbor, she blends these traditions with Midwestern college‑town culture, participating in local
    Mexican community events, university cultural clubs, and neighborhood festivals. Her cultural heritage influences her love for Mexican cuisine, bilingual communication, and a pragmatic approach to problem‑solving.
attributes:
