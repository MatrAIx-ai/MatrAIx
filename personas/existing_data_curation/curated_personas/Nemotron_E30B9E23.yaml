  hobbies: '[''Basketball'',''Horseback riding'',''4‑H club projects'',''Karaoke'',''Baking'',''Community center hangouts'',''River swimming'',''Attending county fair'',''Social media content creation'']'
  career_goals: Brenda aims to finish her high school education—either by completing her sophomore year or earning a GED—within the next two years. Afterward she plans to pursue an apprenticeship as an
    automotive technician or become a certified nursing assistant, combining her love of hands‑on work with a stable, community‑focused career. Long‑term, she hopes to either open a small auto‑repair shop
    serving local families or work in the Fort Pierre clinic while staying close to her family’s farm. She also wants to remain an active volunteer, helping organize county‑fair events and youth programs
    in her hometown.
