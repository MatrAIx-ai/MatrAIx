personas:
  professional: Raymond Bustamante brings four decades of secondary‑school history teaching to the district, blending meticulous curriculum design, data‑driven assessment, and a relentless drive for interdisciplinary
    STEAM excellence that reflects their calm, competitive nature and deep appreciation for visual arts, even as they fuel late‑night grading sessions with strong coffee.
  sports: Raymond Bustamante spends weekends traversing the Kettle Moraine State Forest trails with the local hiking club, follows the Milwaukee Brewers and Green Bay Packers with fervor, and they fit in
    a weekly tennis match at the community center to stay limber.
  arts: Raymond Bustamante immerses themselves in the visual arts by frequenting the Milwaukee Art Museum and studying works by Georgia O'Keeffe and Paul Klee, while evenings often echo with Beethoven’s
    Ninth Symphony and Miles Davis’s Kind of Blue, and they discuss these influences at a four‑person book club on modern art and critical theory.
  travel: Raymond Bustamante prefers meticulously planned, low‑key getaways that blend art and nature, such as solitary weekend hikes among Door County’s lighthouses and a recent self‑guided study tour
    of the Uffizi Gallery in Florence, Italy, and they schedule trips around off‑season museum exhibitions to keep expenses manageable.
  culinary: Raymond Bustamante enjoys crafting seasonal meals from their modest garden, frequently preparing a roasted beet and goat‑cheese salad, mushroom risotto seasoned with sage, and a weekend tradition
    of grilling corn on the cob with butter and smoked paprika, while they occasionally splurge on a tasting menu at Milwaukee’s Bacchus restaurant.
  core: Raymond Bustamante channels a calm, competitive mind into lifelong learning, weaving art, history, and meticulous craftsmanship into a solitary yet profoundly interdisciplinary life, even if they
    sometimes over‑plan to the point of rigidity.
background:
  cultural: Raymond grew up in a small Midwestern town in Wisconsin, raised in a family of German‑Polish descent that values punctuality, self‑reliance, and community service. He was taught to respect local
    traditions such as seasonal festivals, Lutheran church gatherings, and a strong emphasis on public education. The region’s blend of agricultural life, outdoor recreation, and a modest yet vibrant arts
    scene shaped his appreciation for both nature and cultural expression. His upbringing instilled a pragmatic work ethic combined with an openness to new ideas, which he carries into his teaching and
    personal pursuits.
attributes:
  skills: '["Curriculum design", "Lesson planning", "Differentiated instruction", "Assessment design and data analysis", "Integrating visual arts into humanities", "Project‑based learning", "Educational
