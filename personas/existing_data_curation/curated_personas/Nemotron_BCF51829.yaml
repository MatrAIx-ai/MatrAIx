    management", "Organizational planning"]'
  hobbies: '["Visiting art museums and galleries", "Reading art‑history and philosophy", "Landscape photography", "Hiking and nature walks", "Woodworking (furniture making)", "Gardening", "Playing chess",
    "Small book club (modern art & critical theory)", "Writing educational essays/blog posts", "Listening to classical and jazz music"]'
  career_goals: Raymond aims to become the district’s lead curriculum coordinator for a STEAM integration initiative, guiding teachers across subjects to embed art and technology into core curricula. He
    plans to launch a series of community‑partnered history‑and‑art projects that showcase local heritage while fostering student engagement. Over the next five years he hopes to mentor a cohort of emerging
    teachers, publish a guide on interdisciplinary lesson design, and eventually transition into a consulting role where he can advise multiple districts on evidence‑based curriculum innovation. He also
    envisions receiving a state teaching award for excellence in interdisciplinary education.
