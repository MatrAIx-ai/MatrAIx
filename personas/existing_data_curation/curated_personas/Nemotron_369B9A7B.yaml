  career_goals: Hunter aims to obtain his GED within the next year and enroll in a community‑college program that leads to an Emergency Medical Technician (EMT) certification. His long‑term ambition is
    to work as an EMT or firefighter in the San Diego area, where he can combine his love of routine, hands‑on work and helping others. In parallel, he hopes to start a modest landscaping service that offers
    discounted maintenance for seniors and community centers, allowing him to use his practical skills while providing a reliable, community‑focused income.
