  career_goals: Jennifer hopes to transition into a part‑time store manager role where she can mentor younger staff and implement efficient, data‑driven processes. She aims to lead a small cross‑training
    program that blends traditional retail methods with emerging digital tools, such as online inventory tracking and basic e‑commerce. Long‑term, she dreams of opening a boutique that showcases locally
    made crafts and foods, allowing her to stay connected to the community while applying her retail expertise. She also wishes to serve as a consultant for neighboring small stores, helping them boost
    sales through practical, customer‑focused strategies.
