personas:
  professional: Rodolfo Clarkson is an entry‑level sales associate at a retail store, leveraging fluency in Spanish and English, methodical point‑of‑sale expertise, and a structured, reliable demeanor to
    consistently meet targets, lead team scheduling, and adapt scripted communication to individual customers.
  sports: Rodolfo Clarkson participates in local pickup volleyball leagues, hikes Tahoe’s trail network each weekend, and avidly supports the Reno Aces baseball team and the Vegas Golden Knights hockey
    club, often wearing their jerseys during workouts.
  arts: Rodolfo Clarkson enjoys learning acoustic guitar inspired by Juanes and Ed Sheeran, volunteers at Latin American cultural festivals where they help organize traditional dance performances, and spends
    evenings streaming indie films by Guillermo del Toro.
  travel: Rodolfo Clarkson prefers short, budget‑friendly trips, meticulously planning weekend getaways to Lake Tahoe while dreaming of an immersive cultural tour of Oaxaca and a solo backpacking trek through
    the Andes.
  culinary: Rodolfo Clarkson loves cooking pepian and tamales, mastering the blend of roasted tomatoes, chilies, and plantains, and also experiments with guacamole spiced with chipotle and homemade salsa
    verde, often preparing these dishes for friends during game nights.
  core: Rodolfo Clarkson is a structured yet sociable 19‑year‑old who balances meticulous budgeting, anxiety‑driven stress management, and a love for volleyball, guitar, and cooking traditional dishes while
    chasing a future franchise dream.
background:
  cultural: Rodolfo grew up in a Guatemalan immigrant family in Sparks, where Spanish was spoken at home and traditional values emphasized close family ties, respect for elders, and community support. He
    celebrates holidays like Día de los Muertos and Guatemalan Independence Day with extended family gatherings, music, and food. This bicultural upbringing gives him a strong sense of identity and an ability
    to navigate both Guatemalan and American social norms. He incorporates Guatemalan customs into his daily life—such as preparing home‑cooked meals on weekends and listening to marimba music—while also
    embracing the wider diverse community of Washoe County through school events, local sports, and volunteer work.
attributes:
  skills: '[''Bilingual (Spanish/English)'', ''Customer Service'', ''Sales Negotiation'', ''Inventory Management'', ''Point-of-Sale Systems'', ''Cash Handling'', ''Time Management'', ''Data Entry'', ''Conflict
