  hobbies: '[''Volleyball'', ''Hiking'', ''Cooking Guatemalan Cuisine'', ''Online Multiplayer Gaming'', ''Playing Acoustic Guitar'', ''Community Festival Volunteering'']'
  career_goals: Rodolfo aims to transform his entry‑level sales role into a long‑term career in retail management. In the next two years he plans to earn his GED and enroll in a community‑college business
    administration program. He intends to obtain a Certified Professional Salesperson (CPS) credential, then move into a supervisory position where he can apply his structured planning skills to train new
    staff. Ultimately, his ambition is to open a small convenience‑store franchise that caters to the growing Latino community in the Reno‑Sparks area, providing stable jobs for other young workers like
    himself.
