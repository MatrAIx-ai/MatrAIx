  career_goals: Despite being 62, Michael remains driven to leave a lasting culinary legacy. He aims to open a modest farm‑to‑table bistro that showcases locally sourced produce and highlights his signature
    comfort‑food twists. He also plans to author a cookbook that blends traditional American recipes with his unconventional flavor experiments, documenting the stories behind each dish. Additionally, Michael
    hopes to win a regional chef competition, such as the Sacramento Chef of the Year award, to earn peer recognition and inspire younger cooks through workshops at community kitchens.
