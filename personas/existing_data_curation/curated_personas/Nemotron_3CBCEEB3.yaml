personas:
  professional: Vivian Llanio is a technically proficient environmental engineer who leverages GIS, water resources expertise, and meticulous project management to deliver climate‑resilient infrastructure
    solutions for Los Angeles, while using their polished stakeholder‑engagement skills to translate complex data into actionable community plans.
  sports: Vivian Llanio hits the trails of Griffith Park and the Santa Monica Mountains every Saturday with the local LA Hikers Club, roots for the Los Angeles Dodgers and Lakers, and completes a weekly
    cross‑training routine that incorporates yoga and interval running to stay fit.
  arts: Vivian Llanio enjoys weekend visits to the Getty Center to study vibrant portraits by Frida Kahlo, listens to Carlos Santana’s guitar riffs while cooking, and attends occasional performances by
    the Los Angeles Philharmonic, finding inspiration for both their landscaping designs and technical presentations.
  travel: Vivian Llanio plans trips with a spreadsheet itinerary, favoring eco‑focused adventures like a recent hike through Patagonia’s glaciers and a future wish to explore Iceland’s geothermal sites,
    while balancing budget constraints by using points from a travel rewards credit card for family visits to Santa Barbara.
  culinary: Vivian Llanio is a confident home chef who crafts traditional mole poblano, tamales, and grilled fish tacos using fresh cilantro, ancho chilies, and garden‑grown herbs, and treats each dinner
    party as a meticulously organized event where they showcase both culinary skill and cultural hospitality.
  core: Vivian Llanio blends methodical engineering precision with a love for gardening, traditional family dishes, and community clean‑ups, channeling routine‑driven discipline into both professional projects
    and weekend hobbies, albeit sometimes over‑planning to the point of analysis paralysis.
background:
  cultural: Vivian is a first‑generation Mexican‑American who grew up in a bilingual household in Los Angeles. Her family traditions—celebrating Día de los Muertos, sharing stories of her grandparents'
    hometown, and cooking family recipes—are central to her identity. She actively participates in the local Mexican community, attending cultural festivals and supporting neighborhood initiatives that
    promote environmental stewardship. Her heritage informs her professional perspective, driving her to create equitable, culturally sensitive solutions that address both ecological challenges and the
    needs of immigrant communities.
attributes:
  skills: '[''Water Resources Management'', ''Environmental Impact Assessment'', ''GIS and Spatial Analysis'', ''Regulatory Compliance'', ''Project Management'', ''Data Analysis & Modeling'', ''Technical
    Writing & Reporting'', ''Stakeholder Engagement'']'
  hobbies: '[''Gardening with native plants'', ''Cooking traditional Mexican cuisine'', ''Hiking in Griffith Park and Santa Monica Mountains'', ''Volunteering for community clean‑up events'', ''Reading
    environmental science journals'', ''DIY home improvement projects'']'
  career_goals: Vivian aims to obtain her Professional Engineer (PE) license within the next two years and transition into a senior environmental engineering role where she can lead multidisciplinary sustainability
    projects for the City of Los Angeles. She is passionate about developing climate‑resilient water infrastructure and hopes to spearhead community‑based initiatives that improve air and water quality
    in underserved neighborhoods. Long‑term, she envisions establishing a mentorship program for Latina engineers and influencing municipal policy to integrate greener practices into urban planning.
