  career_goals: George aims to obtain his GED within the next year and enroll in a community college art program to develop a professional portfolio in graphic design and multimedia storytelling. He aspires
    to work as a freelance visual artist or a cultural program coordinator for a local nonprofit, where he can blend his creative passions with community outreach. Ultimately, he seeks a career that offers
    both artistic novelty and a stable income, allowing him to manage his stress and contribute positively to his neighborhood.
