personas:
  professional: George Lee is an emerging multimedia storyteller who leverages his self‑taught skills in abstract painting, digital illustration, and basic web design to craft immersive visual narratives
    for community events, while his meticulous attention to detail and balanced flexibility help him meet deadlines despite occasional anxiety‑driven overthinking.
  sports: George Lee counters studio fatigue by hiking the winding trails of Florence County’s state parks on weekends, joins the Pee Dee Trailblazers running club for early‑morning jogs, and passionately
    roots for the Carolina Panthers in the NFL and the Charlotte Hornets in the NBA.
  arts: George Lee channels his imagination into abstract acrylic canvases inspired by Wassily Kandinsky, experimental bass loops echoing Brian Eno and Thundercat, attends midnight screenings of independent
    films by Jim Jarmusch, and draws lyrical inspiration from poet Rupi Kaul while organizing community art workshops.
  travel: George Lee prefers spur‑of‑the‑moment road trips to nearby Asheville’s folk‑art festivals and weekend camping in the Blue Ridge Mountains, while dreaming of a summer immersion in Berlin’s avant‑garde
    galleries, balancing his student‑budget constraints with a longing for cultural exposure.
  culinary: George Lee enjoys crafting spicy miso ramen at home, savoring fresh avocado‑wrapped sushi rolls with pickled ginger, and seasoning his late‑night snack bowls with turmeric, smoked paprika, and
    dried seaweed, reflecting his eclectic palate and love for bold flavors.
  core: George Lee is a restless creative soul who weaves paint, bass, and poetry while wrestling with anxiety and maintaining a disciplined, budget‑conscious lifestyle.
background:
  cultural: George was raised in a close‑knit African‑American community in Johnsonville, South Carolina, where church gatherings, gospel music, and oral storytelling were central to family life. He grew
    up with a deep appreciation for Southern culinary traditions and the rhythm of blues and R&B, often participating in local festivals and neighborhood barbecues. While navigating the challenges of limited
    formal education and economic resources, he draws strength from the resilience and mutual support characteristic of his community, valuing both cultural pride and the collective effort to uplift one
    another.
