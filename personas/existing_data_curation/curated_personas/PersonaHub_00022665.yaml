persona_description: A public health researcher who specializes in the study of chronic diseases, particularly those related to poor health outcomes in southern states. They have conducted research on factors
  contributing to these outcomes, such as poor lifestyle behaviors, education levels, and access to health care. They have also looked at the root causes of health and illness, including physical and social
  conditions in which people live, such as education levels, access to health care, and air and water quality. They are knowledgeable about the prevalence of infectious diseases, including whooping cough,
  salmonella, and chlamydia, as well as the high rates of injury in the Army basic training across the region. They are aware of the lack of routine health care and the increase in preventable hospitalizations
  that can result from a lack of care. They are also aware of the limited access to care and the funding for public health in the South, particularly in West Virginia, and the uninsured population in Kentucky
  and West Virginia.
