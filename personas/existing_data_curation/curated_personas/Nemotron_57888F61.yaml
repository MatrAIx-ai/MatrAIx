  hobbies: '[''hiking and trail walking'', ''reading science-fiction and medical history'', ''cooking Southern cuisine'', ''playing acoustic guitar'', ''gardening'', ''volunteering at community health fairs'']'
  career_goals: James aims to become a clinical director of a community health center in Gwinnett County, where he can shape patient‑centred care models and mentor younger physicians. He hopes to lead a
    practice‑based research initiative focused on reducing hypertension and diabetes disparities in the local population. Additionally, he is interested in expanding telehealth services to improve access
    for rural patients and advocating for wellness programs that address physician burnout, reflecting his personal experience with stress. Long‑term, he envisions opening a nonprofit clinic that blends
    conventional medicine with community outreach.
