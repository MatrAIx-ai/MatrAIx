personas:
  professional: Terry Rowell, an 83‑year‑old retired long‑haul truck driver, combines five decades of road‑wise logistics, hands‑on vehicle maintenance, and sharp negotiation skills with a relaxed, curiosity‑driven
    approach to mentoring apprentices, often trading seasoned instincts for modern GPS tools while keeping a skeptical eye on newcomers’ motives.
  sports: Terry Rowell, a devoted fan of the Pittsburgh Steelers and Westmoreland High School Tigers football, spends weekday mornings fishing at Lake Glade with the Western Pennsylvania Anglers Club, attends
    senior‑center bowling leagues in the winter, and enjoys tailgating rituals that blend community camaraderie with a competitive spirit.
  arts: Terry Rowell, who grew up on the sounds of country legends like Johnny Cash and Dolly Parton, attends the local church choir, collects classic truck‑show memorabilia as an aesthetic hobby, and indulges
    in live bluegrass at the regional fair, finding creative solace in rhythm and the nostalgic hum of vintage engines.
  travel: Terry Rowell, who favors road‑trip spontaneity over rigid itineraries, has driven his 1975 Kenworth to the Henry Ford Museum in Dearborn and to Niagara Falls, dreams of a coastal cruise along
    the Great Lakes, and typically plans trips around family gatherings and senior‑center events, balancing a modest travel budget with his love for open highways.
  culinary: Terry Rowell, an avid backyard griller, loves smoking brisket with hickory wood, preparing fish tacos from his lake catches, and whipping up homemade apple pie using Granny Smith apples from
    his garden, while his cooking level sits between confident hobbyist and earnest amateur, often seasoning dishes with a secret family barbecue sauce.
  core: Terry Rowell blends old‑school truck‑driver pragmatism with a curious streak, staying socially active, occasionally disorganized, and fiercely competitive, all while battling age‑related aches with
    a steadfast sense of community.
background:
  cultural: Terry grew up in the blue‑collar towns of Westmoreland County, Pennsylvania, a region shaped by the legacy of steel mills and family‑owned trucking firms. His white, working‑class heritage emphasizes
    self‑reliance, community solidarity, and a pragmatic outlook on life. He maintains strong ties to local traditions, such as neighborhood barbecues, church fellowship, and regional sports fandom, while
    also valuing the blend of old‑world work ethic and the openness to modern innovations that his generation has witnessed.
attributes:
  skills: '["Long‑haul and regional truck driving", "Vehicle maintenance and minor repairs", "Route planning with GPS and traditional maps", "Customer service and sales negotiation", "Basic logistics coordination",
    "Use of electronic logging devices and fleet management software", "Problem solving under time pressure"]'
  hobbies: '["Playing bridge and poker with friends", "Fishing at nearby lakes", "Gardening", "Attending church socials and community gatherings", "Volunteering as a driver for senior errands", "Participating
    in classic truck shows", "Keeping up with transportation technology and vintage truck restoration"]'
  career_goals: Although officially retired, Terry aims to stay active in the trucking community by mentoring apprentices and volunteering as a safety trainer at the local senior center. He hopes to share
    his practical knowledge of vehicle care and road etiquette with the next generation, preserving the hands‑on expertise that has defined his career. Terry also aspires to maintain his independence and
    health, taking on occasional deliveries for friends and family to keep his skills sharp while remaining a trusted, reliable presence in his community.
