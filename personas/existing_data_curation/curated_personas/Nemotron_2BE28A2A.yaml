  career_goals: Tracey aims to transition into an HR Director role within the next three years, leveraging her analytical background to drive organization-wide talent strategy and digital transformation
    of HR services. She aspires to champion inclusive workplace cultures, mentor the next generation of HR professionals, and eventually assume a Vice President of Human Resources or Chief HR Officer position
    where she can shape corporate strategy from a people-first perspective. She also plans to obtain a professional HR certification such as SHRM-CP or SHRM-SI and perhaps pursue a master's degree in organizational
    development to deepen her strategic expertise.
