personas:
  professional: Timothy Strickland is a self-taught carpenter and digital designer who leverages their methodical, organized nature to launch a modest home-based business that offers handcrafted wooden
    furniture and bespoke graphic artwork, while also volunteering as an art workshop facilitator at the Whitney community center and planning to earn a GED and a carpentry certification.
  sports: Timothy Strickland follows the Seattle Seahawks and the Seattle Sounders FC, participates in a local adult soccer league on Saturday afternoons, and maintains a routine of early-morning trail
    runs in the Cascades, preferring low-impact, solitary exercise that aligns with their methodical temperament.
  arts: Timothy Strickland spends evenings painting watercolors of Puget Sound sunsets, studies the abstracts of Wassily Kandinsky, captures birdlife with a Nikon D3500 camera, strums acoustic renditions
    of Bob Dylan and Nick Drake, and curates community art exhibits that feature works by Frida Kahlo and contemporary local artists during their volunteer shifts at the library's art program.
  travel: Timothy Strickland plans trips with the precision of a project timeline, favoring low-key nature escapes such as Redwood National Park, a weekend road-trip to Sedona, and a long-awaited backpacking
    adventure in Iceland's Westfjords, while budgeting each journey to ensure financial stability for their home-based woodcraft business.
  culinary: Timothy Strickland approaches cooking as a creative laboratory, often preparing Korean bibimbap with gochujang, Italian risotto with heirloom arborio rice, and experimenting with a rustic sourdough
    starter made from locally sourced wheat, while pairing meals with a modest pour of pinot noir to taste.
  core: Timothy Strickland is a methodical 32-year-old creator who balances solitary artistic pursuits with community-oriented projects, budgets precisely, and occasionally forgets to water succulents despite
    a flourishing garden of ideas.
background:
  cultural: Timothy grew up in the rural setting of Hill County, Texas, within a white, working‑class family that valued self‑reliance, modesty, and community ties. The cultural fabric of Whitney—marked
    by Southern hospitality, church involvement, country music, and communal festivals—instilled in him a respect for tradition and harmony. At the same time, exposure to public libraries and regional art
    fairs sparked a curiosity for broader cultural expressions, encouraging him to seek unconventional ideas beyond his hometown. His marriage adds a layer of family‑centered values typical of Southern
    culture, while his personal interests reflect a blend of local sensibilities and a desire for artistic exploration.
