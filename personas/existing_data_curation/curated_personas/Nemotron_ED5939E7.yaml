  career_goals: Timothy aims to formalize his self‑taught knowledge by obtaining a GED and pursuing a certification in carpentry or digital design. He envisions launching a modest home‑based business that
    offers handcrafted wooden furnishings and personalized graphic artwork for local clients. Additionally, he hopes to contribute to his community by volunteering as an art workshop facilitator at the
    Whitney community center, eventually transitioning to a part‑time instructor role. Long‑term, he aspires to achieve a stable income that allows him to support his family while maintaining the flexibility
    to pursue his creative interests.
