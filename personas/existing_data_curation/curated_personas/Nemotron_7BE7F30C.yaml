  career_goals: He aims to move from a single‑store supervisory role into regional operations, leveraging data‑driven merchandising and technology integration to boost profitability across multiple locations.
    He is interested in spearheading an e‑commerce expansion for his company, applying his STEM background to develop seamless omnichannel experiences. In the longer term, Trenton envisions opening a boutique
    concept store that fuses local art, interactive technology, and curated product lines, allowing him to mentor emerging retail talent while maintaining a healthier work‑life balance and reducing stress.
