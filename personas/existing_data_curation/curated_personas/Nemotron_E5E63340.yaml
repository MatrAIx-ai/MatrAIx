  career_goals: Harshil aims to become a cloud‑native solutions architect within the next five years, deepening his expertise in scalable, resilient systems while maintaining a healthy work‑life balance.
    He plans to earn AWS Solutions Architect and Google Professional Cloud Architect certifications, lead a small team of engineers, and champion inclusive, low‑stress development practices. He also hopes
    to contribute to open‑source projects that improve developer mental‑health tools and eventually mentor junior developers from underrepresented backgrounds.
