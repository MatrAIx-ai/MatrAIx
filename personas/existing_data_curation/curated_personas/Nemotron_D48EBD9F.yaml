  career_goals: Brittany dreams of becoming an artist who paints bright, joyful pictures that make people smile. She also imagines exploring nature like a little scientist, caring for animals, and sharing
    stories as a future teacher or storyteller. Her ambitions are shaped by a love of creativity, curiosity about the world, and a desire to bring happiness to others.
