personas:
  professional: Brittany Hefney, a curious 5‑year‑old who spends afternoons as the classroom art helper, naturally blends their love of new ideas with a spontaneous, hands‑on approach to organizing crayons
    and glue, showing budding project‑management skills despite occasional resistance to strict timelines.
  sports: Brittany Hefney enjoys weekly tumble‑time at the community gymnastics club ‘Tiny Twisters’, dabbles in soccer with the ‘Bumblebee Cubs’, cheers for the local MLB team the Seattle Mariners, and
    they prefer free‑play on the playground over rigid drill structures.
  arts: Brittany Hefney delights in painting rainbows with Crayola paints, sings along to Disney soundtracks like ‘Let It Go’ from Frozen, and watches animated short films by Studio Ghibli, letting those
    vibrant stories shape their imaginative play and storytelling.
  travel: Brittany Hefney loves family road trips to the seaside boardwalk, the magical wonder of Disney World in Florida, and weekend visits to Grandma’s farmhouse, where they eagerly collect seashells
    and sketch the sunset, always opting for unscripted detours over rigid itineraries.
  culinary: Brittany Hefney favors chicken nuggets, mac and cheese, and apple slices, proudly helps stir batter for pancake mornings, and insists on a sprinkle of cinnamon on their oatmeal, while occasionally
    demanding a sugary gummy bear as a treat.
  core: Brittany Hefney is a bright‑eyed five‑year‑old explorer who balances boundless curiosity with a calm resilience, and they often swap structured play for spontaneous art, snack, and adventure experiments.
background:
  cultural: Brittany is an African‑American child raised in Rialto, California. Her family celebrates Black cultural traditions through music, storytelling, and community gatherings. At home she often hears
    soulful jazz, R&B, and hip‑hop, and she participates in local cultural festivals that showcase African‑American art and heritage. Family stories from her grandparents emphasize resilience, community,
    and pride in cultural roots. The multicultural environment of San Bernardino County, combined with strong family ties and a supportive church community, nurtures her appreciation for art, diverse experiences,
    and a sense of belonging.
