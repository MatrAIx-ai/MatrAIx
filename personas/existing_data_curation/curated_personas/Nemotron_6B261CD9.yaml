personas:
  professional: Henry Handa leverages over two decades of hands‑on experience in commercial cleaning and building maintenance to excel in systematic floor care, safety compliance and staff training, while
    they methodical, organized mindset and curiosity about new eco‑friendly techniques drive their ambition to become a facilities manager and later launch a green‑cleaning service.
  sports: Henry Handa finds solace in early‑morning fishing on the Missouri River and plays casual disc‑golf at St. Charles' Riverfront Park while cheering on the St. Louis Cardinals and the St. Louis Blues,
    blending solitary sport with community team spirit.
  arts: Henry Handa immerses themselves in true‑crime literature, devouring books by Ann Rule and Patricia Cornwell, and enjoys catching live sets by acts like The Avett Brothers at the historic Grand Ballroom,
    which satisfy both their analytical mind and occasional craving for social connection.
  travel: Henry Handa prefers low‑key road trips that combine fishing spots and botanical gardens, having driven the scenic route to the Ozark Mountains and planning a future visit to Sedona's red‑rock
    trails, while they keep travel budgets tight to maintain financial stability for their teenage daughter.
  culinary: Henry Handa enjoys cooking simple, garden‑fresh meals such as grilled catfish tacos with cilantro‑lime slaw and tomato‑basil spaghetti, relying on home‑grown herbs like rosemary and thyme, and
    their modest woodworking hobby even extends to crafting a rustic wooden cutting board for the kitchen.
  core: Henry Handa balances a diligent, eco‑focused work ethic with a solitary love of fishing and a persistent undercurrent of anxiety that fuels both meticulous planning and occasional self‑critical
    rumination.
background:
  cultural: Henry grew up in a working‑class, Midwestern family of German‑Irish descent in the St. Louis metropolitan area. His upbringing emphasized practicality, hard work, and community involvement—values
    reflected in his reliable, methodical approach to work. He attended a local public high school and was active in his parish’s youth group, which introduced him to the traditions of small‑town Catholic
    celebrations and seasonal community events. Although he is now divorced, he maintains connections with his extended family and neighbors, often sharing meals and participating in neighborhood clean‑up
    days. The regional culture of modesty, self‑reliance, and respect for routine continues to shape his outlook and daily habits.
attributes:
  skills: '[''Commercial cleaning'', ''Floor stripping and waxing'', ''Custodial chemical management'', ''Industrial equipment operation (auto‑scrubbers, pressure washers)'', ''Basic plumbing and minor
