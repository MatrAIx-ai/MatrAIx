    ''Team training and mentorship'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''Community gardening'', ''Volunteering at food pantry'', ''Reading true‑crime books'', ''Crossword puzzles'', ''Live‑music shows'', ''Guided meditation'', ''Journaling'']'
  career_goals: Henry aims to transition from a front‑line janitor to a supervisory facilities manager within the next three years. He plans to obtain the Certified Professional Cleaner (CPC) credential
    and an OSHA 30‑hour certification to strengthen his qualifications. His long‑term ambition is to open a small, eco‑focused cleaning service that offers green‑cleaning solutions to local businesses in
    St. Charles and surrounding areas. Financial stability and a predictable schedule are important to him as he navigates life after divorce and seeks a more secure future for himself and his teenage daughter.
