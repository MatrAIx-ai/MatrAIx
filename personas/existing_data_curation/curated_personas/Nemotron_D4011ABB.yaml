personas:
  professional: Michelle Watkins is a veteran retail supervisor in the Capital Region who blends meticulous inventory management, data‑driven KPI tracking, and a flair for visual merchandising that draws
    on her love of local art, delivering organized, reliable store operations while assertively coaching staff toward peak performance.
  sports: Michelle Watkins embraces the outdoors by hiking the Adirondack foothills and walking the Albany Pine Bush with the local Adirondack Hiking Club, follows the New York Knicks and New York Giants
    during the season, and fits a weekly yoga class at the community center into her routine to balance strength and flexibility.
  arts: Michelle Watkins frequents the Albany Institute of History & Art and the New York State Museum, paints watercolors of the Hudson Valley inspired by Thomas Cole and Georgia O’Keeffe, and curates
    mixed‑media projects that often incorporate local folk art motifs she discovered at community theater fundraisers.
  travel: Michelle Watkins prefers meticulously planned road trips that combine scenic hiking in the Finger Lakes, cultural festivals in Montreal, and weekend stays at historic B&Bs in Vermont’s fall foliage,
    balancing adventure with her love for quiet evenings in a cozy cottage.
  culinary: Michelle Watkins enjoys crafting herb‑infused ratatouille, rosemary focaccia, and fresh beet salad using thyme and sage from her own garden, hosts intimate dinner gatherings where she experiments
    with Mediterranean flavors, and occasionally indulges in a slice of New York‑style pizza as a nostalgic comfort.
  core: Michelle Watkins is a detail‑oriented retail leader who channels her curiosity for art into vibrant store displays, balances meticulous budgeting with spontaneous garden‑to‑table meals, and never
    misses a chance to sketch a new visual concept on a coffee‑stained napkin.
background:
  cultural: Michelle was raised in a middle‑class white family in the rural‑suburban setting of Berne, New York. Her ancestors are of German and Irish heritage, and she grew up with the values of self‑reliance,
    community involvement, and modesty that characterize many upstate New York families. Local traditions such as autumn harvest festivals, community theater, and support for local artists shaped her appreciation
    for cultural expression. While she identifies with mainstream American cultural norms, her curiosity about diverse artistic perspectives has led her to embrace the multicultural art offerings in nearby
    Albany, blending her small‑town roots with a broader cultural curiosity.
