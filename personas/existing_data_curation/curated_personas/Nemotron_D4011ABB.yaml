  career_goals: Michelle aims to advance to a district‑manager role within the next three to five years, overseeing multiple store locations across upstate New York. To prepare, she plans to complete a
    Retail Management certification at a local community college and enroll in a few online courses on data analytics for retail. She is passionate about integrating community art projects into store environments,
    hoping to launch a regional initiative that partners local artists with retail displays. Long‑term, she envisions opening a boutique that blends curated fashion with gallery‑style exhibits, allowing
    her to combine her supervisory expertise with her love of art and entrepreneurship.
