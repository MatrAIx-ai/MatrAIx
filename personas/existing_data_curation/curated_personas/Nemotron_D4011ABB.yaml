  hobbies: '[''Art gallery visits'', ''Watercolor painting'', ''Mixed‑media art projects'', ''Herb and vegetable gardening'', ''Hiking in the Adirondacks'', ''Nature walks in the Albany Pine Bush'', ''Experimental
