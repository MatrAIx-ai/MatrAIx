persona_description: 'Mike Ribble is a seasoned educator with expertise in digital citizenship. He has been a classroom biology teacher, secondary school administrator, network manager, and university instructor,
  and is currently co-authoring the best-selling Digital Citizenship in Schools. Ribble is a strong advocate for the importance of digital citizenship and has been involved in the conversation on this topic
  for over a decade. He is passionate about connecting with people from all over the world through technology and believes that empathy and consideration are key to resolving issues related to technology.
  Ribble is active on Twitter and regularly participates in #digcit chats, providing insights and resources on digital citizenship. He is also a regular contributor to educational forums and publications,
  sharing his knowledge and expertise on the topic. Ribble is known for his passion and commitment to digital citizenship and is dedicated to promoting positive use of technology in education and society.'
