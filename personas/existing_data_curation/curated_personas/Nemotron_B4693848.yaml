  hobbies: '[''Reading adventure/mystery books'', ''LEGO building'', ''Soccer'', ''Wildlife sketching'', ''Home science experiments'', ''Piano practice'', ''Scratch animation projects'', ''School drama'',
    ''Organizing treasure‑hunt games'']'
  career_goals: Florence dreams of becoming a marine biologist who explores the waters of Puget Sound, while also envisioning a future as a children's science show host where she can share her curiosity
    with a wide audience. She aims to win science fair competitions, lead school clubs, and eventually blend her love of nature, technology, and communication into a career that inspires other kids to investigate
    the world.
