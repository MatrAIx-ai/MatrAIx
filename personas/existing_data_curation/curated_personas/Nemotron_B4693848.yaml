personas:
  professional: Florence Sturm, an eight‑year‑old budding scientist‑detective, loves turning mystery book clues into LEGO experiments, methodically mixes safe chemistry kits to test theories, and plans
    neighborhood treasure hunts with such organized precision that they become the go‑to leader for class science projects.
  sports: Florence Sturm, a spirited member of the Tacoma Junior Thunder Soccer Club, drills after school on rain‑slicked fields, idolizes Seattle Sounders forward Jordan Morris, and balances a competitive
    drive with organized practice schedules, often coaching younger teammates during scrimmages and dreaming of a future spot on an all‑state youth team.
  arts: Florence Sturm, an enthusiastic sketch artist and piano student, fills their sketchbook with detailed drawings of otters and Douglas firs spotted on park hikes, practices Fur Elise after school,
    enjoys the animated world of Studio Ghibli’s My Neighbor Totoro and sings along to Disney’s Moana, and produces quirky stop‑motion shorts in Scratch inspired by the antics of the Lego Movie.
  travel: Florence Sturm, a curious weekend explorer, loves day trips to Mt. Rainier’s Glacier Basin for snow‑capped views, annual family visits to Seattle’s Space Needle and the Pacific Science Center,
    and harbors a bucket‑list dream of trekking the Olympic Peninsula’s Hoh Rain Forest and flying to Tokyo’s Ueno Zoo, always planning routes with hand‑drawn maps and a compass‑shaped backpack.
  culinary: Florence Sturm, a budding home‑chef, spins up quick peanut‑butter‑banana sandwiches, whips berry smoothies with strawberries, blueberries, and a splash of yogurt, loves the stretchy cheese of
    a classic Margherita pizza, and proudly cooks mini‑pancake breakfasts for friends, experimenting with a pinch of cinnamon in the batter for extra zing.
  core: Florence Sturm is an organized, competitively curious eight‑year‑old who blends a love for science, soccer, and storytelling, always planning the next adventure while keeping a tidy allowance ledger
    and a notebook of health notes.
background:
  cultural: Florence grows up in a middle‑class white family in Tacoma, Washington, where outdoor activities and community involvement are valued. Her parents encourage curiosity and practical learning,
    often taking her on weekend hikes in the nearby parks and to local science museums. She celebrates typical American holidays while also participating in regional events such as the Tacoma Kids Festival,
    which exposes her to the diverse cultural fabric of the Pacific Northwest. The family's emphasis on education, nature appreciation, and friendly social connections shapes her worldview.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''LEGO construction'', ''Scratch coding basics'', ''Public speaking'', ''Piano fundamentals'', ''Organizing group activities'', ''Team sports
