persona_description: Katie Paxton is a certified teacher with a Master's Degree in Education focusing on Learning and Technology. She has more than 15 years of classroom experience and has been an online
  instructor since 2003. She also owned and managed a home daycare for five years. Katie is an expert in reading and writing development, with a focus on helping children become literate from the moment
  of birth. She is a skilled educator and has experience working with children of all ages, from infancy to the early school years. Katie has a passion for helping children develop their literacy skills
  and has a unique ability to connect with children through play and everyday routines. She is confident in her ability to guide children's literacy development and is dedicated to seeing even the littlest
  events lead to big steps in reading and writing success.
