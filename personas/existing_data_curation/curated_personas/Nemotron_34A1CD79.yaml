personas:
  professional: Keshea Bynum, a budding teenage robotics enthusiast and self-taught web designer, blends a practical curiosity for Arduino circuitry with meticulous notebook planning, channeling her competitive
    edge into early prototype competitions while preferring solitary brainstorming over group sessions.
  sports: Keshea Bynum, an avid hiker of the Chesapeake Bay shoreline who also jogs with her high-school track club, roots for the Washington Capitals and the Washington Nationals, and pursues fitness with
    a competitive mindset, logging personal bests on a running app while treating yoga classes as a solitary performance practice.
  arts: Keshea Bynum, a quiet sketch artist and nature photographer inspired by Ansel Adams and the speculative worlds of Octavia Butler, fills her sketchbook with meticulous shoreline studies and showcases
    her photos of crabs, dunes, and sunsets in a modest online gallery, often humming to Tori Amos while she draws.
  travel: Keshea Bynum, whose travel style blends meticulous planning with a love for off-beat coastal getaways, has mapped day trips to Annapolis, a weekend bike ride to historic Philadelphia, and dreams
    of photographing Iceland's glacial lagoons once her savings and school schedule finally allow.
  culinary: Keshea Bynum, a health-conscious teen who favors simple, nutrient-dense meals, frequently cooks salmon quinoa bowls with lemon-dill sauce, whips up homemade granola with oats, honey, and toasted
    almonds, and treats a perfectly made avocado toast as the ideal post-yoga breakfast.
  core: Keshea Bynum, a 15-year-old tech-savvy quiet thinker, transforms solitary hikes into detailed sketchbooks, channels skepticism into strategic savings, and occasionally trades late-night gaming for
    a procrastinated homework session.
background:
  cultural: Keshea grew up in Chester, a small community on Maryland’s Eastern Shore, within a multigenerational Black family that places a high value on education, resilience, and mutual support. Her home
    life is anchored by her mother and maternal grandmother, who both emphasize the importance of learning and cultural pride. Family gatherings often feature soulful cooking, stories of the Civil Rights
    era, and celebrations of Juneteenth and Kwanzaa, fostering an awareness of African-American heritage. Attending a predominantly white public school in Queen Anne’s County has given her a nuanced perspective
    on navigating identity, prompting her to seek out Black student clubs and mentorship programs. While she enjoys the close-knit feel of her rural surroundings—fishing on the Chester River, local festivals,
    and church choir participation—she is equally comfortable engaging with global cultures through music, podcasts, and online communities.
