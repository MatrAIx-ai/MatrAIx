  career_goals: Keshea aspires to turn her blend of curiosity and practical problem-solving into a career in biomedical engineering, focusing on designing low-cost medical devices for underserved communities.
    In the short term, she aims to earn a strong academic record, win her high school science fair, and secure a summer internship at a local research lab or a coding boot-camp. She hopes to obtain a full-ride
    scholarship to a university with a robust STEM program, participate in mentorship programs for Black women in tech, and eventually lead a multidisciplinary team that creates tangible health solutions.
