personas:
  professional: Maria Trexler, a seasoned long‑term care LPN with three decades of hands‑on experience, they blend meticulous patient assessments and electronic health‑record mastery with a compassionate,
    collaborative spirit, using their natural love of structure to lead quality‑improvement projects, mentor junior nurses, and pursue a BSN and case‑management certification for a future supervisory role
    in hospice care.
  sports: Maria Trexler tracks the Florida State Seminoles football and basketball teams, plays forward on the Tallahassee Senior Softball League at the Parks and Recreation Center, joins a spring bird‑watching
    walking group at Cascades Park for cardio, complements these activities with their regular Friday yoga class, and they occasionally hit the local country club’s tennis courts for a casual match.
  arts: Maria Trexler channels their creative side through quilting while savoring the gospel harmonies of The Blind Boys of Alabama, the storytelling of historic novelist Philippa Gregory, the classic
    Southern film performances of Meryl Streep, and they frequently attend productions at the Tallahassee Little Theatre, where a framed Andrew Wyeth print graces their living room.
  travel: Maria Trexler plans trips with a detailed itinerary that balances historic exploration and natural scenery, having road‑tripped to Savannah, Charleston, and New Orleans on a weekend getaway, taken
    a guided tour of Colonial Williamsburg, and they now dream of a cultural pilgrimage to Dublin and the Bavarian Alps, while keeping regular weekend retreats to the Ocala National Forest within reach
    of their garden schedule.
  culinary: Maria Trexler, an accomplished home cook, perfects Southern comfort staples such as chicken‑and‑dumplings, shrimp and grits, collard greens simmered with smoked turkey, and peach cobbler, seasoning
    each dish with fresh basil and thyme from their own garden, and they occasionally enjoy a farm‑to‑table dinner at Tallahassee’s Café 1913, though they prefer the predictability of cooking at home.
  core: Maria Trexler is a structure‑loving nurse‑educator who balances a passion for gardening, quilting, and senior care with a habit of hoarding coupons and they occasionally skip their own lunch breaks.
background:
  cultural: Maria was raised in a middle‑class Southern family of German and Irish heritage in the Florida panhandle. Her upbringing emphasized community, hospitality, and a strong work ethic, reinforced
    by regular church involvement and family gatherings featuring traditional Southern cuisine. These cultural roots fostered her practical mindset, respect for structure, and deep commitment to caring
    for others. Living in Tallahassee, she identifies with the region’s mix of academic atmosphere, outdoor recreational culture, and a supportive, close‑knit community.
attributes:
  skills: '[''Patient assessment'', ''Vital signs monitoring'', ''Medication administration'', ''Wound care'', ''Infection control'', ''Care plan development'', ''Electronic health records management'',
    ''Patient education'', ''Team collaboration'', ''Conflict resolution'', ''Quality improvement initiatives'', ''Mentoring and precepting'']'
  hobbies: '[''Gardening'', ''Quilting'', ''Volunteering at senior center'', ''Cooking Southern cuisine'', ''Reading historical fiction'', ''Birdwatching'', ''Yoga'', ''Crossword puzzles'', ''Book club
    participation'']'
  career_goals: Maria aims to advance her credentials by completing a registered‑nurse program and earning a BSN, positioning herself for supervisory or case‑management roles in hospice or geriatric care.
    She intends to obtain certifications in Palliative Care and become a Certified Case Manager, enabling her to advocate more effectively for patients’ end‑of‑life preferences. Additionally, she hopes
    to expand her mentorship of new LPNs and contribute to staff development programs. In the longer term, Maria envisions transitioning to a part‑time clinical educator role that offers a balanced schedule,
    allowing continued community service while enjoying greater personal time.
