personas:
  professional: Hazel Deoliveira is a volunteer‑driven community outreach coordinator who leverages her event‑planning expertise, budget‑management savvy, and warm interpersonal style to mobilize senior‑focused
    nonprofits in Pinellas County, and they balance curiosity for new outreach models with practical, reliable execution.
  sports: On the sports front, Hazel Deoliveira is a devoted fan of the Tampa Bay Buccaneers, the Rays, and the Lightning, enjoys weekend kayaking with the local senior paddling club, and stays active through
    low‑impact yoga at the community center, preferring gentle movement over high‑intensity workouts.
  arts: Artistically, Hazel Deoliveira expresses herself through watercolor seascapes reminiscent of Winslow Homer, quilts inspired by Georgia O'Keeffe’s floral patterns, and they find inspiration listening
    to fado vocalist Mariza and the folk duo The Milk Carton Kids while painting and stitching.
  travel: Travel-wise, Hazel Deoliveira prefers thoughtfully planned trips that combine cultural immersion and volunteer service, having recently explored the historic streets of Savannah, the coastal charm
    of Key West, and dreaming of a culinary tour of the Mediterranean islands of Crete and Malta, all while they balance a modest travel budget and family commitments.
  culinary: Culinary-wise, Hazel Deoliveira showcases a strong command of Mediterranean flavors, regularly preparing bacalhau à brás with salted cod, fragrant ratatouille featuring eggplant and zucchini,
    and almond‑laden pastéis de nata, while their modest kitchen talents shine at potluck gatherings where they share recipes enriched with olive oil, garlic, and fresh herbs.
  core: Hazel Deoliveira blends relentless curiosity for community impact with pragmatic organization, but they habitually misplace gardening gloves, prompting spontaneous barefoot strolls through the flower
    beds.
background:
  cultural: Hazel is a white American whose family lineage includes Portuguese ancestry, reflected in her surname Deoliveira. Growing up in a middle‑class environment in the southeastern United States,
    she experienced a blend of mainstream American cultural values—such as independence, community involvement, and an appreciation for personal freedom—alongside occasional Portuguese family traditions,
    notably culinary practices like preparing bacalhau and celebrating festive gatherings with music and storytelling. Living in Saint Petersburg, Florida, has further broadened her cultural exposure to
    the diverse coastal milieu, including Southern hospitality, the vibrant local arts scene, and the multicultural flavors characteristic of the Gulf Coast. This combination of her European heritage and
    the inclusive, community‑oriented atmosphere of Pinellas County shapes her worldview, fostering an openness to diverse ideas while maintaining a practical, grounded approach to life.
attributes:
  skills: '[''Community event planning'', ''Volunteer coordination'', ''Interpersonal communication'', ''Basic computer and social media proficiency'', ''Budget management for small projects'', ''Gardening
    and horticulture'', ''Cooking and recipe development'', ''Artistic crafts (quilting, crocheting)'', ''Public speaking'', ''Problem solving'']'
  hobbies: '[''Gardening (native Florida plants)'', ''Kayaking on the Gulf'', ''Book club participation'', ''Watercolor painting'', ''Volunteer work at animal shelter'', ''Cooking (Portuguese and Mediterranean
    cuisine)'', ''Senior yoga classes'', ''Local art festivals and crafts fairs'', ''Historical site tours'', ''Quilting and craft projects'']'
  career_goals: Hazel seeks to channel her experience into meaningful local impact rather than conventional employment. Her primary goal is to assume a volunteer leadership role—such as a community outreach
    coordinator or board member—within a nonprofit focused on senior well‑being, environmental stewardship, or arts education in Pinellas County. She is also exploring the possibility of launching a modest
    home‑based venture selling homemade Mediterranean pastries and crafts at local markets. To support these ambitions, Hazel plans to complete her associate degree coursework in Business Administration
    through online classes, attend workshops on nonprofit management, and obtain a certification in community organization. Ultimately, she hopes to be recognized as a reliable catalyst for neighborhood
    initiatives and to mentor younger volunteers.
