  career_goals: William aims to become a master painter and eventually own a boutique home‑finishing and decorative‑painting business in Ann Arbor. He plans to complete OSHA and trade certification courses
    to solidify his credentials, while also taking community‑college art classes to expand his design skills. His long‑term ambition is to blend his love of art with his trade by securing mural commissions
    for local cafés, boutiques, and university buildings, building a high‑end client base through his sociable nature, and mentoring a crew that values flexibility and creativity. He also wants to develop
    a reputation as a trusted consultant for interior designers and architects, ensuring steady income while pursuing his artistic side projects.
