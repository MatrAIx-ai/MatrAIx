personas:
  professional: William Woods, a 22‑year‑old interior painter and aspiring muralist in Ann Arbor, blends meticulous surface preparation with a flair for color, leverages social media to market their services,
    and leads a small crew while pursuing OSHA certification and community‑college art classes.
  sports: William Woods cycles the Huron River trail three times a week with the Ann Arbor Bicycling Club, cheers for the Michigan Wolverines football team on Saturdays, occasionally attends Detroit Tigers
    baseball games, and prefers low‑impact workouts like yoga to balance the physical strain of painting, ensuring they stay limber for ladder jobs.
  arts: William Woods draws inspiration from watercolor masters like John Singer Sargent, street‑art provocateur Banksy, and the atmospheric soundscapes of Bon Iver, regularly performs original songs at
    Ann Arbor’s Blind Pig open‑mic nights, participates in improv workshops at the Ann Arbor Comedy Club, and curates personal sketchbooks filled with mural concepts for local cafés, while they experiment
    with mixed media in their spare time.
  travel: William Woods favors spontaneous weekend road trips, having already explored the vibrant murals of Detroit, the wineries of Traverse City, and a backpacking adventure through New Orleans’ French
    Quarter, while they dream of a spring study tour in Barcelona’s El Raval district to soak up European street‑art culture.
  culinary: William Woods enjoys crafting avocado‑toast brunches topped with smoked salmon and microgreens, whipping up homemade thin‑crust Margherita pizza with fresh basil and buffalo mozzarella, and
    occasionally experiments with kimchi‑infused ramen bowls, all while they boast a solid intermediate cooking skill that balances quick coffee‑shop meals with occasional artistic plating.
  core: William Woods is a talkative, art‑obsessed painter who channels restless creativity into murals, yet often procrastinates on paperwork, battles anxiety, and fuels late‑night coffee‑fueled sketch
    sessions, all while they thrive on social buzz.
background:
  cultural: William grew up in a middle‑class, Midwestern family in the greater Ann Arbor area, where a strong work ethic rooted in Michigan's skilled‑trade traditions intersected with the lively, university‑driven
    arts scene. His upbringing emphasized practical craftsmanship while his teenage years were saturated with visits to local galleries, music venues, and community festivals that nurtured his openness
    to unconventional ideas. Though his ethnic background is White, his cultural influences blend Midwestern pragmatism, a growing appreciation for multicultural artistic expression, and the progressive,
    inclusive ethos of Ann Arbor.
