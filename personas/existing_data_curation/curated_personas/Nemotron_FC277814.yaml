  career_goals: Ginette aims to complete her high school equivalency and pursue a career that fits her love of quiet, structured work environments. She is drawn to roles where she can work independently
    while helping others, such as a veterinary assistant, horticulture specialist, or library aide. In the short term, she plans to obtain certification as a veterinary technician or horticulture professional,
    seeking a calm setting with predictable schedules. Long‑term, she hopes to become a trusted caregiver for animals or plants, maintaining a stable routine that supports her well‑being and allows her
    to contribute meaningfully without excessive social demand.
