  career_goals: Rafael aims to secure a supervisory role in quality assurance within the next three years, leveraging a Six Sigma Green Belt certification he plans to earn. He intends to complete his bachelor’s
    degree in industrial engineering or supply chain management, which will position him for a shift manager or continuous‑improvement specialist role. His long‑term ambition is to lead a cross‑functional
    team that drives efficiency, reduces waste, and maintains the highest product safety standards, while also ensuring a stable income and benefits that support his family’s future.
