  career_goals: Michael dreams of a future where he can blend art and science. He talks about becoming an astronaut who designs the visuals for space missions, an illustrator for scientific textbooks, or
    a young inventor who creates eco‑friendly gadgets. He hopes to keep learning new tools—like 3‑D modeling and robotics—so he can turn his imaginative ideas into real projects. Though he worries about
    making the right choices, Michael is motivated to study hard now, join STEM clubs, and keep practicing his art so his future career can be both creative and impactful.
