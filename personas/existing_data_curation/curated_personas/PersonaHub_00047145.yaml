persona_description: A healthcare professional who is concerned about the increasing obesity crisis in Bolton and is working hard to educate people about weight management, healthy eating, and exercise.
  They are aware of the potential impact of obesity on the NHS and have seen an increase in the number of overweight and obese people in the town. They believe that treating obesity as a medical disease
  and providing support and encouragement to patients is the key to tackling this problem. They are also aware of the rising prevalence of Type 2 diabetes and childhood obesity rates in Bolton.
