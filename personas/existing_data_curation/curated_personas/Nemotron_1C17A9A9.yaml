personas:
  professional: Mitzi Moore, a seasoned computer support specialist with 35 years of troubleshooting hardware and software for corporate and small‑business users, applies their meticulous ITIL‑inspired
    documentation, calm step‑by‑step instruction style, and desire for predictability to create low‑stress, efficient help‑desk environments while mentoring junior technicians.
  sports: Mitzi Moore roots for the Atlanta Falcons in football and the Atlanta Braves in baseball, stays active through weekly nature‑trail walks, a gentle community‑center yoga class, and a low‑impact
    water‑aerobics group that satisfies their love of structured, moderate‑intensity exercise, and they relish the camaraderie of the weekly water‑aerobics class.
  arts: Mitzi Moore finds creative respite in unraveling Agatha Christie mysteries, savoring Doris Kearns Goodwin’s historical narratives, listening to the soulful croons of Patsy Cline and the folk storytelling
    of Rhiannon Giddens, and attending the local community theater’s productions of classic Southern dramas that meld their love of history with performance, while they often discuss the shows over bridge
    games.
  travel: Mitzi Moore favors carefully planned road trips that blend family reunions and heritage exploration, such as their annual pilgrimage to Montgomery, Alabama to trace their ancestors, weekend getaways
    to Savannah’s historic squares, and leisurely drives through the Great Smoky Mountains, where they balance adventure with comfortable lodging.
  culinary: Mitzi Moore, a seasoned home cook, delights in preparing Southern comfort staples like flaky buttermilk biscuits, peach cobbler, and collard greens, while meticulously preserving seasonal harvests
    into strawberry jam and pickled okra, often using heirloom flour and locally sourced honey to add a touch of tradition to their dishes, and they take pride in sharing these foods at community potlucks.
  core: Mitzi Moore blends a love for orderly problem‑solving with community‑focused generosity, balancing meticulous budgeting, precise IT support, and a penchant for Southern cooking, all while wrestling
    with a constant undercurrent of worry that drives their diligent yet slightly anxious approach to life, and they habitually double‑check their work to ensure nothing is overlooked.
background:
  cultural: Mitzi grew up in rural Alabama, where family gatherings, church involvement, and community events formed the core of daily life. Her upbringing emphasized Southern hospitality, practical problem‑solving,
    and a respect for tradition, values she carries into her professional and personal interactions. Attending a state university for a STEM degree broadened her perspective and placed her among a small
    but growing group of women in technology in the region. She remains active in her Methodist congregation, participates in the Covington County Fair, and cherishes holiday traditions such as cooking
    large family meals and sharing stories of local history. Mitzi’s cultural identity blends the steady, community‑oriented ethos of the Deep South with a forward‑looking commitment to lifelong learning,
    technical empowerment, and service to her neighbors.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software installation and configuration'', ''Operating system support (Windows, macOS, Linux)'', ''Network diagnostics and troubleshooting'', ''Remote support
