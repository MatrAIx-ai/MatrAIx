  hobbies: '[''Gardening (vegetables and native wildflowers)'', ''Reading mystery novels and historical nonfiction'', ''Crossword and Sudoku puzzles'', ''Southern cooking and baking (pies, jams, biscuits)'',
    ''Volunteering at a library computer literacy program for seniors'', ''Bridge card game'', ''Yoga for stress relief'', ''Nature walks on local trails'', ''Genealogy research'']'
  career_goals: Mitzi’s career goals focus on creating a more predictable, low‑stress support environment while giving back to her community. She aims to obtain an ITIL v4 Foundation certification within
    the next year to formalize her service‑management practices and to develop a comprehensive internal knowledge base that empowers end users to resolve common issues independently. Mitzi plans to transition
    gradually to a part‑time consulting role, allowing her to mentor junior technicians and lead free computer‑literacy workshops for seniors at the local library. Her long‑term ambition is to secure a
    stable, balanced workload that supports a comfortable retirement, reduces daily stress, and leaves a lasting legacy of technical competence and community service.
