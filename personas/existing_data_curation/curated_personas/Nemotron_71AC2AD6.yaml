  hobbies: '[''Acrylic Painting'', ''Photography'', ''Visiting Art Exhibits'', ''Off‑road Driving Competitions'', ''Gardening'', ''Hiking Canadian River Trails'', ''Reading Historical Biographies'', ''Community
    Art Workshops'', ''Participating in Juneteenth Celebrations'', ''Volunteering at Local Food Bank'']'
  career_goals: Rosa aims to advance into a supervisory role within the operations department, such as Lead Equipment Operator or Safety Coordinator, leveraging her experience to develop and implement safety
    programs and operational efficiencies. She plans to obtain her Certified Maintenance and Reliability Professional (CMRP) certification and eventually transition into a managerial position overseeing
    a fleet of heavy equipment. Long term, she envisions starting her own small logistics and equipment rental business that integrates community outreach and supports local Black‑owned enterprises.
