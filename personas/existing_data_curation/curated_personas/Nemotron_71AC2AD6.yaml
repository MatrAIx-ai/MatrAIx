personas:
  professional: Rosa Barnes is a veteran heavy‑equipment operator and safety trainer who leverages meticulous documentation and a creative, analytical mindset to streamline forklift and tractor workflows
    while eyeing a promotion to Lead Equipment Operator or Safety Coordinator.
  sports: Rosa Barnes fuels their competitive edge by participating in local off‑road driving contests with the Oklahoma Off‑Road Drivers Association, follows the Oklahoma City Thunder and the Oklahoma
    Sooners football team, and hits the Canadian River trails each weekend with the Oklahoma Hiking Club to keep endurance high.
  arts: Rosa Barnes curates a modest collection of folk art, paints vivid acrylic landscapes inspired by Georgia O'Keeffe and Claude Monet, experiments with street photography reminiscent of Vivian Maier,
    and regularly attends traveling exhibits such as the Met’s Impressionist showcase, often quoting favorite lines from classic poetry during gallery tours.
  travel: Rosa Barnes prefers weekend road trips that combine scenic routes and off‑road adventures, planning meticulously with a paper map and GPS, has explored the red rocks of Sedona, the historic streets
    of Santa Fe, and dreams of driving the dunes of Namibia while balancing family obligations.
  culinary: Rosa Barnes enjoys farm‑to‑table cooking, regularly tosses roasted sweet potatoes with smoked paprika, chipotle honey glaze on chicken thighs, and fresh basil from their garden into meals, and
    finds relaxation slicing fresh heirloom tomatoes for a summer gazpacho.
  core: Rosa Barnes blends a competitive, detail‑oriented work ethic with a vibrant love of art and off‑road thrills, balancing disciplined budgeting with occasional splurges, and a practical health routine
    that sometimes slips when work gets busy.
background:
  cultural: Rosa is a Black woman rooted in Oklahoma’s rich African‑American heritage. Her family traces its lineage to the Great Migration and the historic Black communities of the Tulsa Greenwood District.
    She grew up attending a Baptist church where gospel music and communal service were central. Rosa maintains strong ties to Black cultural traditions—celebrating Juneteenth, cooking soul‑food dishes
    like collard greens and cornbread, and participating in local Black history tours. Living in El Reno, she blends this heritage with the Western Oklahoma landscape, embracing both the resilience of her
    community and the outdoorsy spirit of the region.
attributes:
