personas:
  professional: Misael Guarderas, a budding LEGO architect and Scratch coder, channels their boundless curiosity into constructing intricate brick masterpieces and simple video games, yet often lets the
    lack of rigid structure cause school assignments to linger past deadlines.
  sports: Misael Guarderas, a competitive midfielder on the Colton Youth Soccer team, trains with the LA Galaxy Academy's junior program, rides a mountain bike with the San Bernardino Trail Club on weekends,
    and follows both the LA Dodgers and LA Galaxy with fervor, showing their preference for focused practice over large group games.
  arts: Misael Guarderas blends traditional marimba rhythms from family Día de los Muertos celebrations with modern comic book influences, sketching superhero‑styled llamas while listening to Gaby Moreno,
    and collects limited‑edition LEGO Art sets that recreate famous masterpieces, illustrating how cultural melodies and contemporary visuals shape their creative identity.
  travel: Misael Guarderas enjoys spontaneous weekend bike rides to Lake Arrowhead and family outings to Yosemite National Park, dreams of exploring the ancient ruins of their family's homeland on a future
    trip with visiting relatives, and prefers flexible itineraries over rigid schedules, always packing a sketchbook for on‑the‑road inspiration.
  culinary: Misael Guarderas helps prepare chicken tamales and sweet corn pozole for holiday feasts, savors guacamole and pepperoni pizza alike, loves chocolate chip cookies as a treat, and occasionally
    experiments with LEGO‑themed lunchbox meals, though their cooking skills remain at a beginner level.
  core: Misael Guarderas is a calm, curious 10‑year‑old who builds epic LEGO worlds, codes games on a whim, tackles soccer with fierce competition, squirrels allowance in a piggy bank, and mixes family
    traditions with modern hobbies, all while occasionally forgetting to tidy up their scattered bricks.
background:
  cultural: Misael was born to Guatemalan immigrant parents and grew up in a bilingual household in Colton, California. At home, Spanish is spoken daily, and he participates in family traditions such as
    making tamales for holidays, celebrating Día de los Muertos with altars, and attending a local Catholic church that holds services in both languages. The Guatemalan community in Riverside County provides
    him with cultural events, Spanish‑language school programs, and opportunities to connect with relatives who visit from Guatemala, grounding his identity while he navigates a multicultural American environment.
