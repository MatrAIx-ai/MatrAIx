    music'', ''reading science magazines'', ''watching space documentaries'']'
  career_goals: Misael aspires to become a robotics engineer or a video‑game developer who creates tools that blend fun with real‑world utility. He dreams of designing a robot that can help his family with
    everyday chores and hopes to compete in future school robotics contests. Long‑term, he envisions leading his own tech startup that builds practical gadgets for community use, driven by his competitive
    spirit and desire to see ideas work in practice.
