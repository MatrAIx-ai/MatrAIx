personas:
  professional: A seasoned hospitality professional, Alicia Renteria leverages three decades of front‑of‑house experience to orchestrate smooth restaurant floor operations, using bilingual precision and
    a systematic reservation system while training new hosts with an eye for detail and a calm, structured demeanor, despite a tendency to worry about staffing conflicts.
  sports: A moderate fitness enthusiast, Alicia Renteria enjoys early‑morning walks along the Fort Myers Riverwalk and bird‑watching trips to the nearby J.N. Dick Simon Swamp, occasionally joins a community
    softball league in the winter and roots for the Tampa Bay Buccaneers in football and the Miami Heat in basketball, while preferring low‑impact exercise over high‑intensity workouts.
  arts: An avid cultural participant, Alicia Renteria attends local heritage festivals featuring mariachi groups and folkloric dance, finds inspiration in the paintings of Frida Kahlo and the songs of Celia
    Cruz, reads historical fiction by Isabel Allende, and occasionally volunteers at the Fort Myers Community Theatre to help with set design, all of which enrich her sense of identity.
  travel: A structured traveler, Alicia Renteria prefers meticulously planned itineraries, often revisiting her family homestead in the mountains for Día de los Muertos, enjoys annual trips to the historic
    markets of Oaxaca, and explores Florida’s coastal towns like Sanibel Island and Key West for relaxation, balancing her wanderlust with a modest budget and family responsibilities.
  culinary: A culinary enthusiast, Alicia Renteria expertly prepares tamales rellenados with seasoned pork, sweet atol de elote with cinnamon and fresh corn, cultivates herbs like cilantro and epazote in
    her backyard garden, and dreams of serving highland‑style coffee and pan dulce in her future café, focusing on precise recipes while occasionally forgetting to turn off the stove in her rush.
  core: Meticulous yet slightly anxious, 58‑year‑old Alicia Renteria blends structured hospitality expertise with a love for traditional holiday cooking, a habit of over‑checking spreadsheets, and a tendency
    to worry about both guest satisfaction and her own health.
background:
  cultural: Alicia was born in the highlands of Guatemala and grew up in a close-knit family where hospitality and respect for tradition were paramount; Spanish is her first language and she still uses
    native expressions while preparing traditional foods during holidays like Día de los Muertos and Christmas; after moving to Florida in the early 1990s she blended her Guatemalan roots with the multicultural
    environment of Fort Myers, participating in local Hispanic community events and serving as a cultural bridge for tourists and residents alike; her Catholic faith and strong sense of family continue
    to shape her values, and she remains actively involved with a Guatemalan cultural association that celebrates music, dance, and culinary heritage.
attributes:
  skills: '[''Customer service excellence'', ''Bilingual Spanish-English communication'', ''Reservation and seating management (OpenTable, Resy)'', ''Conflict de-escalation and problem-solving'', ''POS
    and cash handling proficiency'', ''Team scheduling and shift coordination'', ''Knowledge of local and Guatemalan cuisine and beverage pairing'', ''Compliance with health, safety, and sanitation regulations'',
    ''Data-driven service flow optimization'', ''Mentoring and training of new front-of-house staff'']'
  hobbies: '[''Cooking Guatemalan dishes'', ''Gardening'', ''Walking along Fort Myers Riverwalk'', ''Bird-watching'', ''Volunteering at senior center (Spanish lessons)'', ''Knitting and crocheting'', ''Reading
    historical fiction'', ''Attending Latin American cultural festivals'']'
  career_goals: Alicia aims to move into a supervisory role within the next two years by earning a Hospitality Management certificate from a local community college; she wants to design and implement a
    structured onboarding program for hosts to reduce turnover and floor stress; her long-term ambition is to open a modest café that showcases Guatemalan coffee, pastries, and traditional dishes, applying
    her meticulous operational style to provide a stable, community-focused workplace.
