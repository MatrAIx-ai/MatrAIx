  career_goals: Peter is still exploring future possibilities, but he dreams of becoming a firefighter because he admires the teamwork, bravery, and community help the role provides. He also imagines playing
    soccer at a high level or eventually creating video games that let other kids explore imaginative worlds. In the short term, he aims to improve his reading level to the next grade, earn a spot as captain
    of his school soccer team, and volunteer for the local fire department's junior explorer program, seeing these steps as building blocks toward his larger aspirations.
