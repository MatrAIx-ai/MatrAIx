personas:
  professional: An aspiring community media host, Henry Dixon leverages their natural flair for public speaking, crowd engagement, and basic digital savvy to deliver lively social‑media content and event
    moderation, while balancing a desire for structured schedules with a flexible, people‑centric approach.
  sports: A locally rooted sports enthusiast, Henry Dixon organizes pickup basketball games at the community park, supports the Baltimore Ravens and Maryland Terrapins, follows the NBA’s Washington Wizards,
    and hikes the Cacapon River trail each spring to stay active and clear their mind.
  arts: A creative‑driven performer, Henry Dixon shines at karaoke nights, participates in improv workshops, produces TikTok sketches, curates playlists featuring Bruce Springsteen and local folk singer
    Liza Anne, and captures atmospheric shots of Appalachian sunsets inspired by true‑crime podcast narratives.
  travel: A weekend‑road‑trip planner, Henry Dixon prefers budget‑friendly drives to nearby state parks like Shenandoah and to Washington, D.C. for cultural festivals, while dreaming of a future cross‑country
    adventure to New Orleans, balancing their travel aspirations with a limited student budget and occasional family obligations.
  culinary: A comfort‑food lover with a budding cooking hobby, Henry Dixon enjoys fried chicken, mac and cheese with jalapeños, and homemade peach cobbler, often experimenting with locally sourced sourdough
    and pepperoni on pizza while sharing recipes on their TikTok channel.
  core: Henry Dixon is a high‑energy, socially magnetic communicator who thrives on spontaneous interaction, wrestles with acute anxiety, and balances a love for impromptu performance with a yearning for
    stable, structured work.
background:
  cultural: Henry grew up in Westernport, Maryland, a small, predominantly white Appalachian‑influenced town in Allegany County. His family is part of the working‑class community that historically centered
    around coal mining and now service industries. He was raised with values of self‑reliance, close‑knit family ties, and community participation, often attending local church gatherings, high school sports
    events, and county fairs. The regional culture, emphasizing modesty, direct communication, and a strong sense of community, has shaped his worldview and social interactions.
attributes:
  skills: '[''Public speaking'', ''Interpersonal communication'', ''Event hosting'', ''Social media content creation'', ''Basic computer troubleshooting'', ''Customer service'', ''Competitive gaming strategy'',
