  hobbies: '[''Karaoke singing'', ''Improv comedy'', ''Online competitive gaming'', ''Basketball'', ''Hiking'', ''Journaling'', ''TikTok content creation'', ''True‑crime podcasts'', ''Photography'', ''Volunteering
    at community events'']'
  career_goals: Henry aims to channel his sociable nature and communication strengths into a career in media or community engagement. He plans to enroll in a local community college's communications program,
    targeting roles such as social media coordinator or radio host for a regional station. He is also considering event planning for local festivals or a sales representative position where his competitive
    drive can be an asset. Ultimately, he seeks a stable job with regular hours that offers both structure and frequent interaction with people, while developing professional coping strategies to manage
    his anxiety and build a reputation as a reliable, high‑energy communicator.
