  hobbies: '[''Art Gallery Visits'', ''Street Photography'', ''Live Music Concerts'', ''Experimental Theater'', ''Creative Cooking'', ''Casual Basketball'', ''Community Art Volunteering'', ''Travel Planning'',
    ''Reading Contemporary Fiction'', ''Indoor Plant Care'']'
  career_goals: Morris aims to transition from his current managerial role to a senior operations or program director position within a cultural nonprofit or community‑focused organization in Norfolk. He
    plans to complete his bachelor's degree in Arts Management or Business Administration within the next three years, while gaining experience in grant writing and strategic partnership building. Long‑term,
    he dreams of launching a community art hub that offers workshops, exhibitions, and mentorship for young Black artists, positioning himself as a champion for inclusive cultural programming.
