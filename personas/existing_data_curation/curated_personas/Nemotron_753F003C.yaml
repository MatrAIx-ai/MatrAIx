personas:
  professional: Shawki Jones, a veteran EMT with over thirty years of service in Flint, pairs methodical protocol expertise with a practical curiosity that fuels their mentorship of new responders, drives
    pursuit of an EMT‑Paramedic credential, and guides ambitions to shape EMS training curricula and community health outreach.
  sports: Shawki Jones, a devoted fan of Detroit’s Lions, Tigers, and Pistons, spends weekends fishing on Lake St. Clair, participates in a senior basketball league at the community center, and volunteers
    with a local charity run that promotes water safety.
  arts: Shawki Jones, an avid collector of vintage R&B and jazz vinyl, frequently spins records by Marvin Gaye, Aretha Franklin, Miles Davis, and John Coltrane while reading medical journals or historical
    biographies, and attends the Detroit Jazz Festival whenever possible, letting the music shape their reflective evenings.
  travel: Shawki Jones, whose travel style balances careful budgeting with a love for heritage, has taken road trips to the Apostle Islands, explored Acadia National Park, and visited Birmingham, Alabama
    to investigate family migration history, while dreaming of an extended stay in New Orleans to soak in its jazz scene.
  culinary: Shawki Jones, a modest home cook, harvests garden tomatoes and peppers to craft fresh bruschetta, hearty chicken gumbo seasoned with smoked paprika, and creamy corn chowder, and pairs meals
    with a bottle of Michigan sweet white wine on quiet evenings.
  core: Shawki Jones, a methodical EMT who blends early‑morning fishing, late‑night jazz, and meticulous mentorship, navigates life with disciplined precision, quiet curiosity, and a subtle flair for adventure.
background:
  cultural: Shawki grew up in a close‑knit African‑American neighborhood in Flint during the 1970s and 80s, a period marked by industrial decline and, later, the water crisis. His family’s church has been
    a cornerstone of community support, instilling in him values of service, resilience, and collective responsibility. He maintains strong ties to the local Black community through participation in the
    Flint Afro‑American Festival, the annual Juneteenth celebration, and mentorship programs for at‑risk youth. Shawki’s cultural identity informs his compassionate yet pragmatic approach to emergency care,
    as he draws on the communal emphasis on mutual aid and the historical legacy of self‑advocacy in navigating systemic challenges.
attributes:
  skills: '["Emergency medical assessment and triage", "Basic Life Support (BLS) certification", "Advanced Cardiovascular Life Support (ACLS) certification", "Trauma care and airway management", "IV insertion
