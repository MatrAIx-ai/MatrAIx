    and inventory management", "Incident reporting and documentation", "Shift scheduling and logistics", "Mentoring and training of new EMTs"]'
  hobbies: '["Fishing on Lake St. Clair", "Home vegetable gardening", "Listening to classic R&B and jazz vinyl records", "Reading medical journals and historical biographies", "Playing chess at the community
    center", "Volunteering as a driver for a church senior‑transport program", "Genealogy research and family history documentation"]'
  career_goals: Approaching retirement, Shawki aims to transition into a senior mentorship or supervisory role within Genesee County EMS, where he can shape training curricula, spearhead community health
    outreach on water safety, and improve coordination between EMS and local hospitals. He also hopes to obtain an EMT‑Paramedic certification to broaden his clinical capabilities, and eventually serve
    as an EMS liaison for the city’s public‑health department, advocating for underserved neighborhoods and contributing to emergency preparedness planning.
