  career_goals: Chelsea dreams of a future where she can blend her love of art, technology, and science. She aspires to become an animator or video game designer who creates interactive stories that teach
    about the natural world, especially marine ecosystems. Influenced by Vallejo’s waterfront, she also imagines studying marine biology or environmental science. She hopes to attend a STEM‑focused high
    school, then a university where she can pursue a double major in digital arts and environmental studies, ultimately creating projects that inspire curiosity and stewardship in others.
