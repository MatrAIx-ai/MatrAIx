personas:
  professional: Chelsea Evans is a budding technologist who merges her love of painting with Scratch programming, crafting animated art projects while leading her school's junior science club; they thrive
    on turning scientific curiosity into creative code.
  sports: Chelsea Evans plays forward for the Vallejo Juniors Soccer Club, cheers on the San Francisco 49ers on Sundays, and they approach each practice with fierce competitiveness, frequently challenging
    teammates to outscore them.
  arts: Chelsea Evans devotes weekends to sketching landscapes inspired by Van Gogh and creating watercolor scenes while listening to Billie Eilish, and they attend the Vallejo Art Museum to admire works
    by Yayoi Kusama, drawing creative energy from those experiences.
  travel: Chelsea Evans enjoys family trips to the Monterey Bay Aquarium and weekend camping at Lake Tahoe, while dreaming of a future adventure to the Great Barrier Reef, preferring hands‑on exploration
    over luxury resorts due to their modest allowance.
  culinary: Chelsea Evans loves pizza topped with extra cheese, builds their own taco al pastor with cilantro and lime, and whips up strawberry‑banana smoothies for after‑school snack, though sometimes
    they forget to clean the dishes afterward.
  core: Chelsea Evans blends a knack for sketching, coding, and soccer into a curious, competitive spirit that fuels relentless doodles, unexpected bug fixes, and a habit of checking the weather for perfect
    soccer practice.
background:
  cultural: Chelsea’s cultural background is rooted in a middle‑class Anglo‑American family. Growing up in Vallejo, a city known for its cultural diversity and proximity to the Bay Area’s tech and maritime
    industries, she has been exposed to a blend of West Coast values, including environmental awareness, artistic expression, and a spirit of innovation. Family traditions include celebrating holidays like
    Thanksgiving and the Fourth of July, while community events and school programs introduce her to multicultural perspectives, shaping her open‑minded outlook.
