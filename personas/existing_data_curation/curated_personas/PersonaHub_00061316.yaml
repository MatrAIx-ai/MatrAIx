persona_description: A national government official in charge of urban development and infrastructure in developing countries, particularly in Africa. This person is responsible for planning and implementing
  sustainable infrastructure projects in secondary cities, aiming to improve economic growth, living standards, and resilience in these areas. They are aware of the challenges faced by secondary cities
  in terms of financing gaps and the need to create opportunities for the future. They are also aware of the importance of supporting the growth of secondary cities and the need to address the negative
  effects of urbanisation on natural ecosystems.
