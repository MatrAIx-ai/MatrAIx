  hobbies: '[''Sketching'', ''Urban Photography'', ''Listening to Indie Music'', ''Reading Science Fiction and Fantasy'', ''Coding Creative Projects'', ''Playing Ukulele'', ''Volunteering at After‑School
    Arts Programs'', ''Visiting Museums and Gallery Exhibitions'', ''Attending Bay Area Cultural Festivals'']'
  career_goals: Stephanie aspires to become a multidisciplinary visual storyteller, aiming for a career that blends illustration, graphic design, and interactive media. In the short term, she plans to build
    a robust portfolio, attend a summer art institute, and enroll in advanced art electives at a specialized high school. Long‑term, she envisions studying visual communications at a university such as
    CalArts or an art‑focused program, eventually working for a design studio or museum where she can create compelling narratives and lead community art outreach initiatives that empower other youth to
    explore creativity.
