personas:
  professional: Stephanie Ross, a budding visual artist and novice coder, merges sketching, street‑photography, and interactive digital art to explore Oakland’s urban vibe, channeling their curiosity and
    balanced organization into meticulously planned yet freely improvised creative projects.
  sports: Stephanie Ross enjoys skateboarding at Lake Merritt in the summer, plays on a community volleyball club after school, and follows the Golden State Warriors and Oakland Athletics, balancing casual
    exercise with occasional competitive matches while preferring low‑pressure, social‑oriented fitness activities.
  arts: Stephanie Ross immerses themselves in the Bay Area’s mural scene, drawing inspiration from artists like Swoon and Shepard Fairey, while listening to indie musicians such as Mitski, Tame Impala,
    and Soccer Mom, and regularly attending gallery openings at SFMOMA and film screenings of Hayao Miyazaki’s works, letting this eclectic mix fuel their sketchbook pages.
  travel: Stephanie Ross prefers weekend getaways that blend outdoor adventure with cultural immersion, spending family trips exploring Yosemite’s granite cliffs, weekend hikes in Marin County, and dreaming
    of a spring trip to Tokyo’s Akihabara district for an anime convention, all planned on a shared Google Sheet while balancing budget constraints with a desire for new experiences.
  culinary: Stephanie Ross enjoys a mix of comfort and experimental foods, frequently making avocado toast with chili flakes, whipping up ramen bowls with miso paste and soft‑boiled eggs, and treating themselves
    to tacos al pastor from a local food truck, while their cooking skills hover at beginner‑intermediate level, often guided by YouTube tutorials.
  core: Stephanie Ross is a curious teen who blends street‑art sketching, indie music, and code‑driven experiments into a steady stream of creative projects, all while juggling school responsibilities,
    occasional procrastination, and a habit of losing track of time when absorbed in art.
background:
  cultural: Stephanie grew up in Oakland, California, within a white middle‑class family that celebrates traditional American holidays such as Thanksgiving and Christmas while also embracing the city’s
    diverse cultural fabric. Her neighborhood’s rich mix of African‑American, Latino, Asian, and LGBTQ+ communities has exposed her to a wide array of artistic styles, cuisines, and social activism. She
    participates in local events like the Oakland Art + Soul Festival and community murals, which have shaped her inclusive worldview and appreciation for varied cultural expressions. Her upbringing balances
    familiar family customs with the progressive, collaborative spirit of the Bay Area.
