personas:
  professional: Oneida Farrell is a seasoned mechanical engineer in Oklahoma's oil‑field services, they wield SolidWorks and AutoCAD to design robust rotating equipment, leading multidisciplinary crews
    with a structured yet sometimes relaxed approach that mirrors their competitive, skeptical mindset and ambition to earn a PE license and drive sustainability initiatives.
  sports: Oneida Farrell follows the Oklahoma City Thunder and the Tulsa Drillers, they participate in a local hiking club that tackles the Arbuckle Mountains each spring, and they spend weekends fishing
    at Lake Murray, balancing a competitive drive with a laid‑back, flexible fitness routine.
  arts: Oneida Farrell unwinds by devouring psychological thrillers by Gillian Flynn and Tana French, they regularly attend country‑rock concerts featuring Chris Stapleton and the local band The Dusty Trail,
    and they appreciate the oil‑field inspired murals at Tulsa's Philbrook Museum, letting their skeptical curiosity fuel a deep appreciation for narrative and music.
  travel: Oneida Farrell prefers self‑planned road trips, they often weekend‑drive to Santa Fe’s art colonies or the Texas Hill Country, while dreaming of a summer hike through Glacier National Park, balancing
    a modest budget with an adventurous spirit but sometimes postpones travel due to work stress.
  culinary: Oneida Farrell enjoys grilling chicken thighs with rosemary and smoked paprika, tossing garden salads made from heirloom tomatoes and cucumbers harvested from their own vegetable patch, and
    indulging in Oklahoma‑style chicken fried steak, yet they have yet to master sourdough baking despite a growing curiosity for bread.
  core: Oneida Farrell is a detail‑driven engineer who channels competitive curiosity into woodworking, trivia, and sustainability projects, yet they balance a love for order with a habit of last‑minute
    improvisation and occasional stress‑induced overthinking.
background:
  cultural: Oneida grew up in a small town near Ardmore, Oklahoma, in a family that valued practical skills and community involvement. Her father worked as an automotive mechanic, which introduced her early
    to hands-on problem solving, while her mother was active in the local church and school PTA, instilling a sense of service and modesty. The regional economy’s ties to the oil industry shaped her career
    choice, and the blend of Southern hospitality and Midwestern work ethic influences her interpersonal style—friendly yet measured, competitive yet collaborative when needed. Her cultural identity is
    rooted in the traditions of small-town Oklahoma, including a love for regional cuisine, country music, and seasonal community fairs, all of which continue to inform her outlook and daily life.
