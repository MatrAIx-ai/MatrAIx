  career_goals: Oneida aims to secure her Professional Engineer (PE) license within the next two years and transition into a senior plant-manager role where she can shape operational strategy for an oil-field
    services facility. She also aspires to spearhead a sustainability initiative that reduces energy consumption on site, and to mentor more women entering technical trades through local STEM outreach.
    In the longer term, she envisions launching a consultancy focused on reliability engineering for mid-size manufacturers, allowing her to balance high-impact work with a more predictable schedule that
    eases her stress.
