  hobbies: '[''Fishing'', ''Deer hunting'', ''Volunteering with Habitat for Humanity'', ''Coaching youth baseball'', ''Woodworking'', ''Weight training'', ''Grilling'', ''Playing cards'', ''Attending local
    fairs and live-music events'', ''Camping trips'']'
  career_goals: Clayton aims to transition from site-level management to a senior regional director role, overseeing multiple large-scale commercial developments across the Dakotas. He is pursuing the Certified
    Construction Manager (CCM) credential and plans to launch his own boutique construction firm focused on sustainable, energy-efficient building practices. Additionally, he hopes to mentor the next generation
    of construction leaders and implement stronger mental-health support structures for his crews to reduce workplace stress.
