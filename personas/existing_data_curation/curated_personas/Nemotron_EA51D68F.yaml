personas:
  professional: Clayton Walla, a veteran construction foreman with two decades of hands‑on experience overseeing multifamily and commercial projects across the Upper Midwest, leverages his methodical scheduling,
    OSHA‑compliant safety culture, and adept vendor negotiation to deliver on‑time, budget‑conscious builds while mentoring junior foremen and championing mental‑health support structures for his crews
    as he pursues a senior regional director role and the Certified Construction Manager credential.
  sports: Clayton Walla, a devoted fan of the South Dakota State Jackrabbits and the Green Bay Packers, spends Saturday mornings coaching the Brookings Youth Baseball League, plays in a local adult softball
    club, maintains a modest weight‑training regimen at the community gym, and fulfills his love of the outdoors through seasonal deer hunting, river fishing on the Big Sioux, and membership in the Brookings
    Sportsmen’s Club.
  arts: Clayton Walla, an avid attendee of Brookings summer fairs, frequently enjoys live performances by folk‑rock groups like the Lone Star Ramblers and classic country legends such as John Denver, Dolly Parton,
    and Neil Young, while his evenings often feature vinyl record sessions, and his woodworking projects double as functional art that he proudly displays in his home.
  travel: Clayton Walla, a methodical planner, prefers weekend road‑trips that blend fishing in Minnesota’s Boundary Waters Canoe Area Wilderness with hunting excursions in Wyoming’s Bighorn Mountains,
    and he dreams of a cross‑country drive to the Oregon Coast to hike the rugged cliffs, always budgeting carefully to accommodate his family’s commitments and his penchant for community events.
  culinary: Clayton Walla, a competent grillmaster, relishes smoking a ribeye steak with hickory chips, preparing cedar‑plank salmon caught from the Big Sioux River, and seasoning venison with juniper berries
    and rosemary for a rustic stew, often pairing his meals with local craft IPAs and serving sides of cornbread and potato salad, though he sometimes over‑salts his dishes in his enthusiasm for bold flavor.
  core: Clayton Walla is a structured yet sociable construction leader who balances meticulous project oversight with a love for outdoor camaraderie, grill‑filled evenings, and a persistent worry that fuels
    his drive for safety and sustainability.
background:
  cultural: Clayton was born and raised near Brookings, South Dakota, into a family of German-Scandinavian ancestry that has lived in the region for several generations. Raised in a Lutheran household,
    he was taught the values of hard work, reliability, and community service, which are hallmarks of the Midwestern cultural ethos. The local culture's emphasis on agriculture, small-town solidarity, and
    outdoor recreation shaped his practical outlook and love for activities like fishing and hunting. While he identifies primarily with mainstream white Midwestern culture, he respects the diverse heritage
    of the region, including the nearby Native American communities, and participates in community events that celebrate this shared history.
attributes:
  skills: '[''Project planning'', ''Budget management'', ''Construction site safety'', ''Blueprint reading'', ''Team leadership'', ''Scheduling (Microsoft Project)'', ''Contract negotiation'', ''Quality
