  hobbies: '["Cooking Peruvian dishes", "Balcony/urban gardening", "Knitting and crochet", "Listening to Andean music and watching telenovelas", "Storytelling and sharing family histories", "Senior yoga
    and salsa dancing", "Crossword puzzles and Sudoku"]'
  career_goals: Although retired, Ana maintains an active personal agenda focused on staying independent, nurturing her cultural roots, and enhancing her emotional wellbeing. She aims to improve her digital
    confidence by learning to use tablets for video chatting and sharing photos with family. She hopes to teach a weekly cooking class at the local senior center, passing on Peruvian recipes to younger
    neighbors and preserving her heritage. Ana also aspires to volunteer as a cultural liaison, helping new Peruvian immigrants navigate services in Miami. Recognizing her heightened emotional sensitivity,
    she plans to attend weekly mindfulness groups and seek supportive counseling to manage anxiety and grief. Ultimately, she wishes to remain a vibrant, engaged member of her community while fostering
    intergenerational connections.
