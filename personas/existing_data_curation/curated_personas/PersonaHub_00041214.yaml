persona_description: A researcher who studies the transmission of respiratory infections and the impact of language on disease spread, particularly focusing on the role of English in the spread of COVID-19.
  They are interested in the relationship between language, vocabulary, and the frequency of certain sounds, as it may influence the likelihood of respiratory diseases being transmitted. They may be a language
  and linguistics expert, or a medical epidemiologist with a background in respiratory disease transmission. They are interested in understanding the factors that contribute to the spread of respiratory
  infections and how language can be leveraged to mitigate the impact of these diseases.
