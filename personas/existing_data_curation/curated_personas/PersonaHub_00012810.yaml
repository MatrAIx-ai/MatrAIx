persona_description: A linguist who specializes in the study of language acquisition and language development, particularly focusing on the use of affixes in forming new words. They have conducted extensive
  research on the phenomenon of back-formation and have found that it is the least preferred method among all L1 groups. They have also noted that the majority of instances of back-formation with -ate come
  from forms ending in -(a)tion, and that learners often consider this affix to be the result of combining -ate + -ion, and back-form by removing the perceived last suffix. The speaker of this text is likely
  a linguist who has conducted research on the use of affixes in forming new words and has found that back-formation is a phenomenon that is not commonly used. They have also found that learners often consider
  the use of -ate as a back-formation method and have noted that this affix is often used to create new words by combining it with -ion.
