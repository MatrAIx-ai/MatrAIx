personas:
  professional: Thomas Dabit is a budding mini‑entrepreneur who runs a sticker shop from the kitchen table, designing whimsical decals with their vivid imagination, cataloguing inventory with surprising
    organization, and reliably delivering them to family members, all while they balance their natural curiosity with a diligent sense of responsibility.
  sports: Thomas Dabit is an energetic preschooler who practices Tuesday‑Thursday mini‑soccer at the local community center, cheers for the hometown baseball team the Chicago Cubs during family game nights,
    enjoys watching the NBA's Los Angeles Lakers on TV, and they balance their love for running around the backyard with occasional meltdowns when a game ends.
  arts: Thomas Dabit is a budding imagineer who adores the whimsical illustrations of Dr Seuss, hums along to Yo‑Yo Ma's cello suites, reenacts scenes from Pixar's Toy Story, and they frequently draw abstract
    shapes inspired by Kandinsky, all of which fuel their nonstop curiosity.
  travel: Thomas Dabit is an adventurous four‑year‑old who loves weekend trips to the nearby aquarium, dreams of exploring the fairy‑tale castles of Disney World, enjoys short car rides to grandma's house
    in the countryside, yet they prefer traveling with a familiar stuffed rabbit for comfort.
  culinary: Thomas Dabit is a picky eater who relishes cheesy macaroni, peanut‑butter‑jelly sandwiches, colorful fruit kebabs with grapes and mango, can surprisingly stir batter for banana pancakes, but
    they stubbornly refuse broccoli and often demand extra dessert.
  core: Thomas Dabit is an imaginative four‑year‑old who balances boundless curiosity with meticulous toy organization, they worry about small uncertainties, and swings between cooperative sharing and assertive
    demands, making every day a blend of wonder and occasional meltdowns.
background:
  cultural: Thomas is raised in a suburban white family in Dayton, Ohio, within a middle-class environment characteristic of the Midwestern United States. He participates in typical local cultural activities
    such as community library storytimes, seasonal festivals, and family celebrations of holidays like Thanksgiving, Christmas, and the Fourth of July. The community values modesty, friendliness, and a
    blend of individual expression and communal responsibility, which shape his early worldview.
