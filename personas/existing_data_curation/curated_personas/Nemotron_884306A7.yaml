  hobbies: '[''Playing soccer'', ''Ballet/dance class'', ''Lego building'', ''Drawing and painting'', ''Reading adventure books'', ''Board games'', ''Baking with family'', ''School choir singing'', ''Church
    community volunteering'', ''Pet rabbit care'']'
  career_goals: Jan dreams of becoming an elementary school teacher where she can create a warm, structured environment that helps children feel safe and supported. She also imagines working with animals
    as a veterinarian, inspired by caring for her pet rabbit, and hopes to combine her love for caring with her knack for organization. In the short term, she looks forward to earning her Girl Scout badges
    and helping out more in her school's library to prepare for a future in education or animal care.
