personas:
  professional: Jan Brunk, a budding junior event coordinator for her school's PTA, combines their love for structure and teamwork to plan bake sales, choir rehearsals, and community service days, while
    their practical focus on immediate details keeps each activity on schedule and their tendency to worry leads them to double-check every checklist.
  sports: Jan Brunk, a lively member of the neighborhood Tigers Soccer Club, plays weekend soccer with enthusiasm, balances agility through after-school ballet class, and roots for the professional City
    Lions football team, while maintaining a disciplined routine that blends structured practice with spontaneous backyard races.
  arts: Jan Brunk, an enthusiastic budding cartoonist, sketches whimsical characters inspired by Disney's Mickey Mouse and Pixar's Toy Story, sings along to school choir renditions of songs by Idina Menzel,
    and delights in watching live ballet performances by the Royal Ballet, weaving these artistic influences into their daily creative play.
  travel: Jan Brunk, a curious traveler at heart, loves family road trips to the nearby lake for camping, cherishes annual visits to Disneyland, and dreams of exploring Tokyo's vibrant neighborhoods, favoring
    itineraries that blend familiar group activities with a touch of adventurous discovery.
  culinary: Jan Brunk, an eager junior baker, enjoys mixing chocolate chips into cookie dough and carefully measuring flour for homemade spaghetti sauce, prefers classic comfort foods like mac and cheese
    and carrot sticks, yet occasionally sneaks extra sprinkles onto cupcakes when no one watches.
  core: Jan Brunk, a meticulous, group-loving seven-year-old who aligns Lego bricks in perfect rows but worries about spilling the milk, turns every activity into a blend of organized fun and cautious curiosity.
background:
  cultural: Jan is a White Southern child raised in the suburban community of Marietta, Georgia, where Southern hospitality and close-knit family ties are everyday norms. Her family regularly attends a
    local Baptist church, participates in community events like the Marietta StreetFest, and celebrates holidays with traditional Southern foods such as fried chicken, sweet tea, and peach cobbler. She
    attends a public elementary school that emphasizes routine, standardized testing, and extracurriculars like sports, arts, and Girl Scouts. Exposure to Southern history through visits to the Marietta
    Museum of History and local historic districts has given her a sense of place, while popular media, Disney movies, and regional cartoons shape her broader cultural outlook.
