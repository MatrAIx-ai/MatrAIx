background:
  cultural: Tewelde is an African‑American raised in Senoia, Georgia, rooted in Southern Black traditions and the vibrant storytelling heritage of the region. He grew up attending local church gatherings,
    family cookouts, and community festivals that blend gospel music, rhythmic dance, and oral history. The nearby film industry and historic Southern landscapes have inspired his appreciation for visual
    narratives. While honoring his cultural lineage, he also draws from contemporary urban art movements, creating a hybrid identity that weaves together ancestral values, Southern hospitality, and modern
    creative expression.
