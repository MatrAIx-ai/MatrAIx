  career_goals: Although retired from the formal workforce, Roberto aims to preserve and share his Salvadoran heritage by curating a small exhibition of local Salvadoran art at his neighborhood community
    center. He hopes to compile a handwritten cookbook of family recipes and stories for his grandchildren, and to mentor younger members of the community in basic cooking and storytelling. He also aspires
    to keep learning new artistic techniques, such as digital photography, to document everyday life in his multicultural Los Angeles neighborhood, and to remain an active, supportive presence in his church
    and senior groups.
