personas:
  professional: Maria Timlin is a humanities graduate student who leverages their knack for schedule‑driven lesson planning, Canvas expertise, and friendly mentorship style to design interdisciplinary literature
    courses that emphasize structured group discussions and predictable classroom rhythms.
  sports: Maria Timlin stays fit by attending three weekly yoga classes, dancing salsa on Thursday evenings, and cheering on the Brooklyn Nets while occasionally joining a community center's pick‑up basketball
    league that satisfies their sociable and energetic nature.
  arts: Maria Timlin immerses themselves in the arts by frequenting live shows at Brooklyn Steel featuring acts like Mitski and The Strokes, exploring contemporary exhibitions at the MoMA, and discussing
    books by Zadie Smith and Chimamanda Adichie with their weekly book club.
  travel: Maria Timlin prefers well‑planned getaways, often spending long weekends on curated tours of historic Boston, weekend trips to the Hudson Valley’s wineries, and dreaming of a spring stroll through
    Barcelona’s Gothic Quarter, all balanced against their modest graduate‑student budget.
  culinary: Maria Timlin enjoys brunch culture, mastering avocado toast with poached eggs, whipping up homemade chilaquiles on lazy Saturdays, and savoring a well‑seasoned mushroom risotto after a night
    at a Brooklyn jazz club, though they sometimes over‑order the artisanal latte and neglect to finish their coffee.
  core: Maria Timlin is a reliably organized, socially driven scholar who thrives on routine, balances academic rigor with lively group activities, and secretly hoards an ever‑growing stack of unread novels.
background:
  cultural: Maria comes from a White, Irish‑American family that grew up in a small Midwestern town. Her upbringing emphasized traditional values such as punctuality, community involvement, and familial
    loyalty. Raised in a modest, middle‑class household, she celebrates holidays like St. Patrick’s Day and Thanksgiving with extended family, reflecting a blend of cultural heritage and American customs.
    Moving to New York for college and her career, she has embraced the city’s cultural diversity, integrating a respect for multicultural perspectives into her teaching while still cherishing her own heritage’s
    emphasis on practicality and routine.
