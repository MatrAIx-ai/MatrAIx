    and Art Gallery Visits'', ''Guided Historical Tours'']'
  career_goals: Maria aims to complete a Master’s degree in Education within the next two years, focusing on instructional design for humanities education. Her long‑term ambition is to secure a full‑time
    lecturer position at a university, where she can design and teach interdisciplinary courses that foster collaborative learning. She also hopes to publish research on the impact of structured group discussions
    on student retention in literature courses. In the medium term, Maria envisions taking on a leadership role such as Director of Undergraduate Studies, allowing her to shape curriculum policy while still
    maintaining close contact with students. She values professional stability, so she seeks positions that offer clear advancement pathways and support work‑life balance.
