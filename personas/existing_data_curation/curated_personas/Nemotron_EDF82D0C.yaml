  career_goals: Vincent dreams of exploring the world in a colorful way. He imagines becoming an astronaut who can see Earth from space, an artist who creates murals that brighten his community, and a veterinarian
    who cares for animals. He also hopes to grow into a teacher who helps other kids feel safe and valued, reflecting his kind, cooperative nature and his desire to make a positive impact.
