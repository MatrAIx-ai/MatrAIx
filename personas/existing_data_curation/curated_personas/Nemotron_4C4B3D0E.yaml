    empathy‑driven support", "Technical documentation and knowledge‑base creation", "Basic graphic design and photo editing (Adobe Photoshop, Canva)", "User training and onboarding", "IT inventory management
    and asset tracking"]'
  hobbies: '["Visiting art galleries and museums", "Watercolor painting", "Digital photography and photo editing", "Italian cooking and baking", "Community theatre acting and backstage work", "Volunteering
    for tech literacy workshops", "Gardening (native Oklahoma plants)", "Hiking in Wichita Mountains", "Reading mystery and historical fiction", "Playing board games with friends", "Yoga and mindfulness
    meditation", "Online learning (art history, emerging technologies)"]'
  career_goals: Rosemarie aims to advance to a senior technical support specialist or team lead role, where she can mentor newer staff and shape support processes. She plans to earn CompTIA Network+ and
    Microsoft Certified Solutions Expert certifications to deepen her networking expertise. Long‑term, she aspires to transition into IT project management, overseeing technology integration for community
    arts programs, or to launch a boutique consultancy that provides tech support and digital media assistance to small businesses and creative professionals in the Lawton area.
