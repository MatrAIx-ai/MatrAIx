  hobbies: '["Cooking family recipes", "Gardening (vegetables, herbs, flowers)", "Quilting and crocheting", "Church choir participation", "Listening to gospel, blues, and soul music", "Reading biographies
    of African‑American figures", "Walking in local parks", "Playing bridge", "Solving crossword puzzles", "Genealogy research"]'
  career_goals: Although retired, Jessie remains eager to make a meaningful impact. She aspires to lead a volunteer mentorship program at the Orangeburg senior center, teaching quilting and crochet techniques
    to younger participants. She plans to document her family’s genealogy and write a memoir that chronicles her experiences from segregation through the civil‑rights era, preserving this history for future
    generations. Jessie also wants to become proficient with a tablet to create digital photo albums for her family, learn to operate a voice‑activated smart speaker for greater accessibility, and maintain
    her health by joining a weekly walking group. Traveling with her husband to visit children, grandchildren, and extended family, especially a reunion in Georgia, is a cherished ambition.
