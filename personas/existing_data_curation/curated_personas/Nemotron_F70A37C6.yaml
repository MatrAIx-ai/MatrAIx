  hobbies: '["Singing & dancing (pop and cumbia)", "Drama club (acting & set design)", "Volunteering (after‑school tutoring, event planning)", "TikTok content creation", "Cooking traditional Salvadoran
    dishes", "Reading YA novels", "Playing soccer with friends"]'
  career_goals: Lucia aspires to become a community health worker or social worker, focusing on supporting immigrant families and youth mental health. She aims to study psychology and public health at a
    university, eventually working for a nonprofit that bridges language barriers and provides counseling services. In the short term, she plans to graduate high school with honors, take advanced courses
    in biology and social sciences, and volunteer at local youth centers to gain hands‑on experience.
