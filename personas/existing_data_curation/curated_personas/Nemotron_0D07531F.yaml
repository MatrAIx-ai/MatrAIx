personas:
  professional: Jonathan Hand, a 46‑year‑old experimental physicist and visual storyteller, leads an interdisciplinary research program at a mid‑west university where they design cutting‑edge laboratory
    instrumentation, develop computational simulations, and curate museum‑style exhibitions that translate complex physical concepts into immersive visual experiences, all while mentoring a diverse cohort
    of graduate students, championing collaborative grant proposals, and letting their curiosity drive unconventional scientific‑art collaborations.
  sports: Jonathan Hand hikes the Flint Hills and Tallgrass Prairie National Preserve nearly every weekend as a member of the Kansas City Hiking Club, volunteers as a trail steward, follows the Kansas City
    Chiefs (NFL) and Sporting Kansas City (MLS) with weekly game viewings, and they occasionally join a local pick‑up basketball league for cardio, balancing solitary reflection with brief social sport
    engagements.
  arts: Jonathan Hand immerses in jazz piano sessions at the On The Spot Café, draws creative fuel from the installations of James Turrell and Anish Kapoor at the Nelson‑Atkins Museum, and they curate interdisciplinary
    exhibitions that blend infrared astrophotography with contemporary sculpture, while still maintaining a habit of doodling scientific diagrams in the margins of poetry books, reflecting their open‑minded
    appreciation for unconventional artistic expression.
  travel: Jonathan Hand plans trips that balance research and recreation, favoring dark‑sky reserves like Cherry Springs State Park for astrophotography, art‑rich cities such as Paris for the Louvre and
    Barcelona for Gaudí, and national parks like Yellowstone for hiking, and they often book flights months in advance but leave room for spontaneous photo excursions, embodying a blend of meticulous planning
    and adventurous flexibility.
  culinary: Jonathan Hand enjoys Kansas City burnt‑end barbecue, experimental vegetable‑based dishes like quinoa‑stuffed bell peppers with smoked Gouda, and an occasional late‑night pepperoni pizza after
    editing night‑sky images, while brewing a cold‑brew coffee that they meticulously measure with a digital scale, and they sometimes over‑salt their soups after a long day in the lab, showcasing a disciplined
    yet indulgent culinary palate.
  core: Jonathan Hand blends scientific rigor with artistic spontaneity, balancing disciplined research with night‑time jazz improvisations, all while they navigate the occasional late‑night coffee binge
    and a penchant for over‑ambitious project scopes.
background:
  cultural: Jonathan was born and raised in Kansas City, Kansas, to a middle‑class family with German‑Irish ancestry. The Midwestern values of modesty, community service, and practical pragmatism shaped
    his early worldview, while his parents' encouragement of both scientific curiosity and artistic exploration fostered a balanced appreciation for the empirical and the aesthetic. Growing up near the
    Nelson‑Atkins Museum, he developed a lifelong affinity for visual arts, and his participation in local youth science clubs nurtured his passion for physics. This blend of regional cultural ethos and
    exposure to diverse intellectual pursuits informs his collaborative, harmony‑seeking personality and his drive to integrate science with cultural expression.
attributes:
  skills: '["Experimental physics", "Computational modeling", "Laser spectroscopy", "Materials characterization", "Monte Carlo simulations", "High‑performance computing", "Data analysis", "Scientific writing",
    "Grant writing", "Public speaking", "Project management", "Art history", "Curatorial practice", "Graphic design", "Science communication"]'
  hobbies: '["Night‑sky and infrared photography", "Jazz piano improvisation", "Hiking in the Flint Hills and Tallgrass Prairie", "Visiting art museums and galleries", "Reading classic literature and speculative
    fiction", "Volunteering for STEM outreach", "Pottery and ceramic glazing"]'
  career_goals: Jonathan aims to establish a tenure‑track position at a research university where he can lead a multidisciplinary laboratory that bridges physical science with the visual arts. He aspires
    to secure major funding for an interactive exhibition series that translates cutting‑edge physics research into immersive artistic experiences for the Kansas City community and beyond. Over the next
    decade, he hopes to publish a seminal monograph on the convergence of scientific inquiry and aesthetic interpretation, mentor graduate students from diverse backgrounds, and become a recognized voice
    in science policy advocating for stronger support of interdisciplinary education and public outreach.
