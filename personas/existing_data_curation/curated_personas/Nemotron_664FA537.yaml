    "Yoga", "Nature walks"]'
  career_goals: Leisha aspires to combine her love of science with her desire to help others. She plans to enroll in a high-school program with strong STEM and health-science offerings, eventually pursuing
    a degree in biomedical science or nursing so she can become a pediatric nurse or, ultimately, a pediatrician. She also dreams of sharing her enthusiasm for learning by volunteering as a mentor for younger
    students in school clubs, keeping her future career grounded in service and community.
