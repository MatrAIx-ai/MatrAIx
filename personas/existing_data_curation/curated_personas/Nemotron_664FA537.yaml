personas:
  professional: Leisha Lann, a budding scientific explorer, leads her middle school science club's weekly experiments, applying the same curiosity-driven practicality she shows in sketching prairie landscapes
    and balancing her classes with volunteer work at the local animal shelter.
  sports: Leisha Lann cheers for the Aledo Bulldogs football team on Friday nights, follows the Dallas Cowboys and Texas Rangers on TV, and plays on a local youth soccer league called the Prairie Pioneers,
    where she balances competitive drills with the same community-spirit she embraces at church picnics.
  arts: Leisha Lann, an avid sketcher and acoustic guitar hobbyist, spends afternoons drawing fantasy characters inspired by Sarah J. Maas's books, strumming covers of Taylor Swift and John Denver, and
    crafting friendship bracelets during classroom free periods, while also attending community-theater summer productions of classic musicals.
  travel: Leisha Lann prefers weekend road trips that combine family barbecues in Austin with a brief hike in the Hill Country, dreams of visiting the Grand Canyon's rim for sunrise, and hopes to one day
    explore the bustling streets of Tokyo, all while adhering to a parents-approved budget and a school-assigned travel-log assignment.
  culinary: Leisha Lann enjoys helping her family grill honey-glazed barbecue chicken and mixing fresh guacamole with ripe avocados and lime, can whip up a simple spaghetti carbonara for friends, yet often
    burns her toast when distracted by sketching, revealing a mix of earnest culinary curiosity and teenage clumsiness.
  core: Leisha Lann is a 13-year-old prairie-raised dreamer who balances fierce curiosity with mild anxiety, turning sketchbooks and guitar strings into quiet escapes while juggling science club experiments,
    community volunteer work, and a cautious allowance budget.
background:
  cultural: Leisha was raised in Aledo, a small town in Parker County, Texas, within a predominantly white, middle-class community. Her family values reflect a blend of Southern hospitality and Midwestern
    modesty, emphasizing community involvement, church attendance, and family gatherings such as weekend barbecues and holiday celebrations. She has been shaped by local traditions like Texas Independence
    Day festivities, school sports culture, and a close connection to the surrounding prairie landscape, while also drawing influence from broader American pop culture through school, media, and online
    platforms.
