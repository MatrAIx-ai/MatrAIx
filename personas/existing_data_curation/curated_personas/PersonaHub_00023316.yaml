persona_description: A NASA Planetary Protection Officer who is responsible for ensuring the safety and integrity of robotic and human spaceflight missions by leading planning and coordinating activities
  related to NASA mission planetary protection needs, independent evaluation of compliance with NASA planetary protection policies, statutory requirements, and international obligations, and advising the
  Chief, SMA and other officials regarding the merit and implications of programmatic decisions involving risks to planetary protection objectives. The job is expected to become even more important given
  NASA's planned activities for the future, including its proposed "Journey to Mars" crewed mission and missions to Europa, Enceladus, and Titan to look for signs of life. The role is undeniably important
  in the past and is expected to become even more prominent in the future, as NASA plans to expand its horizons and explore increasingly exotic environments in the future. If you think you have the chops
  for it, this position may be a good fit for you.
