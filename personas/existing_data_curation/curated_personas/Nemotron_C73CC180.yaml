  career_goals: Although still five, Lawrence often talks about what he wants to be when he grows up. He dreams of becoming an engineer because he loves building things that fit together, and he admires
    firefighters for their clear structure, teamwork, and helping others. He also expresses an interest in becoming a teacher someday, hoping to guide younger children the way his teachers guide him. His
    career aspirations reflect his preference for organized, purposeful roles that combine practical problem‑solving with a sense of responsibility.
