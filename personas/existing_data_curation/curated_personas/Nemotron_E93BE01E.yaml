personas:
  professional: A budding junior scientist, Elizabeth Henderson channels their curiosity and practical mindset into leading their school’s science club, where they blend experimental tinkering with relaxed
    project planning despite a tendency to let loose ends linger.
  sports: Elizabeth Henderson dominates the local youth soccer field with the Hunt County Hurricanes, cheers on the Dallas Cowboys and Dallas Mavericks, and channels that competitive fire into weekly weekend
    matches that blend strategy and speed, all while they rally their teammates with high‑energy encouragement.
  arts: Elizabeth Henderson builds intricate LEGO cityscapes while blasting the pop anthems of Taylor Swift and the country twang of Cody Johnson, and evenings often close with bedtime adventures from Rick
    Riordan’s mythic novels, as they sketch new designs for their next LEGO masterpiece.
  travel: Elizabeth Henderson favors spontaneous family road trips that combine biking along the Texas Hill Country trail with awe‑inspiring stops at the Grand Canyon, though their love for last‑minute
    packing often leaves them scrambling for their favorite LEGO set and a snack.
  culinary: Elizabeth Henderson eagerly devours mac and cheese, pepperoni pizza, and the funnel‑cake‑dusted treats of the Hunt County Fair, and at home they proudly assemble DIY taco kits using cheddar
    cheese, salsa, and seasoned chicken while occasionally burning the toast in their haste.
  core: Elizabeth Henderson is a competitively spirited, curiosity‑driven 10‑year‑old who skates between chaotic energy and practical problem‑solving, often forgetting to tidy up their LEGO creations while
    dreaming up their next soccer victory.
background:
  cultural: Elizabeth is a white Texan raised in the small town of Quinlan, Hunt County. Her family reflects the mix of traditional Southern hospitality and modern rural life common in East‑Central Texas.
    She grew up attending local school events, church gatherings, and county fair celebrations, where country music, barbecue, and community sports are central. The region’s emphasis on self‑reliance and
    practicality shapes her pragmatic outlook, while exposure to national media and technology gives her a contemporary perspective. This blend of small‑town values and modern influences informs her social
    interactions, interests, and aspirations.
