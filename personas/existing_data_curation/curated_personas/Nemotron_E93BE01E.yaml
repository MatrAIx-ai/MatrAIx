  career_goals: Though still in elementary school, Elizabeth already envisions a future where she can combine her curiosity with hands‑on problem solving. In the near term she aims to win the school science
    fair with a project on animal health, become captain of her soccer team, and earn a top spot in a Scratch coding competition. Looking ahead, she aspires to become a veterinarian or wildlife biologist,
    roles that let her care for animals while applying scientific knowledge. Her competitive drive pushes her to seek leadership positions, and her practical mindset ensures she wants to make tangible contributions
    to her community.
