personas:
  professional: Lillian Rosario, an aspiring community liaison and social work student, leverages their bilingual fluency and calm composure in high‑stress scenarios, they coordinate outreach events, design
    graphic campaigns on Canva, and bridge cultural gaps for immigrant‑serving organizations, all while navigating a somewhat disorganized college schedule.
  sports: Lillian Rosario, an energetic dancer and yoga enthusiast, attends weekly salsa and bachata classes at a local studio, they practice Vinyasa flow sessions to stay balanced, and they cheer for the
    New York Knicks and New York City FC while occasionally joining a recreational soccer league on Saturdays.
  arts: Lillian Rosario, a street‑photography hobbyist and avid reader of contemporary multicultural fiction, draws creative fuel from the vibrant portraits of Frida Kahlo, the rhythmic salsa hits of Victor
    Manuelle, and the poetic prose of Ocean Vuong, they regularly share their urban snapshots on Instagram and attend local art openings featuring emerging performers like Lin‑Manuel Miranda.
  travel: Lillian Rosario, who prefers spontaneous and budget‑friendly getaways, has explored the lively streets of New Orleans, the historic boroughs of Boston, and the sun‑kissed beaches of Puerto Rico,
    they dream of backpacking through the Andean highlands while balancing travel around coursework and community commitments.
  culinary: Lillian Rosario, a home‑cooking enthusiast, perfects citrus‑bright shrimp ceviche and golden llapingachos using fresh limes, cilantro, ají, and corn flour, they also experiment with traditional
    fish broth soups like caldo de pescado, often hosting potluck evenings where friends rave about the tangy ceviche and crispy plantain side.
  core: Lillian Rosario, a sociable 24‑year‑old multitasker, balances spontaneous salsa nights and heartfelt volunteer work with a habit of misplacing receipts, they thrive on human connection while navigating
    the chaos of a flexible, disorganized lifestyle.
background:
  cultural: Lillian grew up in a close‑knit Ecuadorian family in Queens Village, where Spanish was spoken at home and traditional celebrations like Carnaval de Guayaquil and Día de los Difuntos were observed
    with music, dance, and family meals. Her parents instilled a respect for both her Andean roots and the diverse cultural tapestry of New York City. She embraces the Ecuadorian values of community solidarity
    and hospitality while also navigating the multicultural dynamics of Queens, allowing her to blend Colombian, Puerto Rican, and other Latin influences into her everyday life.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Interpersonal empathy and active listening'', ''Community event planning and coordination'', ''Basic graphic design (Canva)'', ''Social media content
    creation and management'', ''First aid certification'']'
  hobbies: '[''Salsa and bachata dancing'', ''Cooking Ecuadorian dishes'', ''Attending community festivals and fairs'', ''Volunteering at food banks and shelters'', ''Group yoga classes'', ''Street photography'',
    ''Reading contemporary multicultural fiction'']'
  career_goals: Lillian aims to complete her bachelor's degree in Social Work or Community Development within the next two years, building on her hands‑on volunteer experience. She aspires to work as a
    community liaison for an immigrant‑services organization in New York, where she can advocate for equitable resources and design culturally responsive programs. Long‑term, she envisions founding a nonprofit
    that offers language tutoring, job‑readiness workshops, and mental‑health support for recent Latin American immigrants, blending her practical curiosity with a deep commitment to social harmony.
