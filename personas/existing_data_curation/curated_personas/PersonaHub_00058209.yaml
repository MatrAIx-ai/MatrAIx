persona_description: A criminologist and academic who is passionate about addressing the overcriminalization and overincarceration of First Nations people in Australia. They have a deep understanding of
  the history and current issues surrounding Indigenous justice and have called for a shift in power from government to the community and a redistribution of funding and resources away from punitive systems
  towards social programs. They have a background in criminology and criminal justice and have contributed to previous inquiries such as the Royal Commission into Aboriginal Deaths in Custody and the Australian
  Law Reform Commission report Pathways to Justice. They are aware of the harm caused by policing practices and have made a call for real government support for Aboriginal and Torres Strait Islander peoples'
  calls for self-determination, control and voice, and for significant social and economic investment in their communities.
