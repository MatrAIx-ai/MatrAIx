  career_goals: Maria aspires to pursue a career in wildlife conservation and park stewardship. She plans to graduate high school, attend a community college for an associate's degree in environmental science,
    and then transfer to a four‑year university to earn a bachelor's in wildlife biology. Her ultimate goal is to become a certified wildlife technician or park ranger in the Chattahoochee National Forest,
    where she can combine her love of nature, structured field work, and independent research. She also dreams of supporting herself through freelance nature photography and occasional writing for outdoor
    magazines, allowing her to maintain a flexible yet stable professional life.
