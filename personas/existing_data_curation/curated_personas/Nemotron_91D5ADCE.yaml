personas:
  professional: Maria Newman, a high‑school student with a structured yet flexible mindset, channels their love of solitary study into budding expertise in Python, nature photography, and creative writing,
    preparing for a future as a wildlife technician in the Chattahoochee National Forest.
  sports: Maria Newman, an avid hiker and birdwatcher who spends weekends on trails with the local nature club, also follows the Atlanta Falcons and Atlanta United, occasionally joining the school’s cross‑country
    team for endurance training, displaying a low‑key but consistent approach to fitness.
  arts: Maria Newman, a quiet creative who spends evenings sketching scenes inspired by the works of Brandon Sanderson and N.K. Jemisin, strums an acoustic guitar while listening to Gillian Welch and The
    Avett Brothers, and curates a personal blog featuring their nature photography and short stories.
  travel: Maria Newman, who prefers unstructured weekend getaways over rigid itineraries, often explores nearby state parks such as Cloudland Canyon and dreams of photographing wildlife in Yellowstone and
    Iceland, balancing a modest travel budget with occasional family trips.
  culinary: Maria Newman, a home‑cooking teen who enjoys whipping up herb‑roasted chicken, pesto pasta, and fresh garden salads flavored with rosemary and thyme harvested from their own herb patch, often
    pairs meals with chamomile tea and treats themselves to homemade granola bars after a long hike.
  core: Maria Newman, a solitary nature‑lover with a structured yet easy‑going mind, juggles diligent self‑learning in Python and wildlife photography with occasional procrastination, quirky late‑night
    journaling, and a habit of forgetting to water their herbs during exam weeks.
background:
  cultural: Maria was raised in Gainesville, a small town in Hall County, northern Georgia, within a Southern Appalachian cultural setting. Her family is primarily of English‑Irish descent, with deep regional
    roots that emphasize community, modesty, and a strong connection to the land. She grew up attending a local Methodist church, participating in county fairs, and learning traditional Southern cooking
    from her grandparents. The nearby Blue Ridge Mountains and the Chattahoochee River have fostered her love of nature and outdoor activities. While identifying as white, Maria’s upbringing reflects a
    blend of rural Southern values—hospitality, a solid work ethic, respect for folk music and storytelling, and an appreciation for self‑reliance.
