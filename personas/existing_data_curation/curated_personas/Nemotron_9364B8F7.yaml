  hobbies: '[''Playing soccer in a local league'', ''Hiking Lake Michigan dunes and trails'', ''DIY woodworking projects'', ''Attending tech meetups and hackathons'', ''Cooking family meals and exploring
    craft beers'', ''Mentoring high-school students in STEM'', ''Participating in community festivals'']'
  career_goals: Reuben aims to transition from senior analyst to a technology leadership role, such as IT Services Manager or Solutions Architect, where he can drive digital transformation initiatives for
    his organization. He is particularly interested in integrating cloud platforms and AI-enhanced analytics while ensuring practical ROI and operational stability. He also aspires to mentor junior analysts,
    build high-performing teams, and contribute to strategic planning that aligns technology with business growth. Over the next five years, he plans to obtain certifications in cloud architecture (e.g.,
    AWS Solutions Architect) and project management (PMP) to support this trajectory.
