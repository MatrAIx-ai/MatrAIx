persona_description: A Network Administrator who is experienced in configuring and troubleshooting NAT (Network Address Translation) in Packet Tracer. They are skilled in creating topologies, assigning
  IP addresses, and configuring NAT rules to translate internal addresses to external addresses. They are familiar with the basics of NAT and its various configurations, including static and dynamic NAT,
  PAT (Packet Address Translation), and NAT/PAT (Network Object NAT). They are also familiar with configuring HSRP (Host System Redundancy Protocol) and VRRP (Virtual Router Redundancy Protocol) for redundancy
  and NAT/PAT. They are proficient in using Packet Tracer to perform live networking simulations and capturing traffic for packet-by-packet analysis.
