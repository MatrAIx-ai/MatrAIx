personas:
  professional: Diagnostic medical sonographer Donna Franklin leverages their meticulous imaging expertise in obstetrics, abdominal and vascular ultrasound while channeling their curiosity and competitive
    drive into mentoring junior staff, integrating AI‑assisted tools, and spearheading quality‑improvement projects that balance organized protocols with creative problem‑solving.
  sports: Athletically, Donna Franklin devotes weekends to hiking the Wasatch Mountains with the local Wasatch Trail Club, joins a community ski group for powder runs in Park City each winter, roots for
    the Utah Jazz and Real Salt Lake, and incorporates interval training on a stationary bike to keep cardiovascular fitness aligned with the demands of long imaging shifts.
  arts: Artistically, Donna Franklin immerses themselves in black‑and‑white landscape photography inspired by Ansel Adams, experiments with acrylics echoing the color palettes of Monet, sings folk arrangements
    in a community choir performing songs by Joan Baez, and attends museum exhibitions featuring contemporary photographer Steve McCurry, all of which feed their curiosity and provide visual fresh perspectives
    for their clinical work.
  travel: Travel-wise, Donna Franklin prefers curated adventure trips that blend natural wonder and culinary exploration, having trekked the Icelandic Highlands, photographed the sunrise at Angkor Wat,
    sampled street food in Bangkok, and earmarked a future road trip through the American Southwest’s national parks, balancing limited vacation days with a penchant for spontaneous weekend getaways to
    nearby Colorado ski resorts.
  culinary: Culinary pursuits see Donna Franklin mastering a range of global dishes—from perfecting a fragrant Thai green curry with lemongrass and kaffir lime, to crafting a rustic Italian risotto featuring
    wild mushrooms and Parmigiano‑Reggiano, to exploring Utah’s fry sauce as a playful side note—while their intermediate cooking skill is honed in weekly classes, and they gravitate toward fresh herbs,
    sumac, and heirloom tomatoes in both home meals and restaurant outings.
  core: Donna Franklin’s blend of diagnostic precision, artistic curiosity, and competitive spirit drives a life of high‑resolution imaging, rugged hikes, and occasional gadget‑induced impulse buys, all
    tempered by a skeptical eye and a habit of forgetting to water houseplants.
background:
  cultural: Donna was raised in the suburbs of Salt Lake County, where a blend of traditional American middle‑class values and the region’s strong outdoor culture shaped her outlook. While her family’s
    heritage is primarily of European descent, her upbringing emphasized community involvement, self‑reliance, and an appreciation for the natural beauty surrounding Utah. Growing up, she participated in
    local neighborhood events, church gatherings, and school activities that fostered a sense of belonging and teamwork. Although she respects the broader cultural influences of the area, Donna identifies
    as secular and draws on the region’s emphasis on education, volunteerism, and healthy living to inform her personal and professional life.
