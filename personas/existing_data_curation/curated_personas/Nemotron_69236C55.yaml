    imaging'', ''Mentorship and training of junior sonographers'']'
  hobbies: '[''Hiking in the Wasatch Mountains'', ''Visiting art galleries and museums'', ''Landscape and portrait photography'', ''Acrylic painting'', ''Community choir singing'', ''Monthly book club participation'',
    ''Volunteering at health outreach events'', ''Cooking classes with spouse and friends'', ''Traveling to national parks'', ''DIY home improvement projects'']'
  career_goals: Donna aims to elevate her professional impact by obtaining advanced certifications such as the Registered Diagnostic Medical Sonographer (RDMS) in obstetrics and vascular specialties. She
    envisions stepping into a lead sonographer or clinical educator role within her hospital, where she can design and implement quality‑improvement initiatives, incorporate AI‑assisted imaging tools, and
    spearhead training programs for staff. Long‑term, she is interested in contributing to research on patient‑centered imaging practices and may explore opening a community‑focused imaging consulting service
    that partners with local health fairs and schools to promote early detection and health literacy.
