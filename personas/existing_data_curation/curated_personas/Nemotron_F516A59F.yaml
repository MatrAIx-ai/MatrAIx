  career_goals: Yanisleidy aims to translate her hands‑on experience into a supervisory role within a reputable cleaning company, eventually earning a Certified Professional Cleaner credential. She plans
    to complete a GED program and take an ESL course to improve her English proficiency, which will position her for a team‑lead position. Long‑term, she envisions starting her own small cleaning business
    that can provide stable employment for other women from her community, and she hopes to save enough to purchase a home in San Antonio.
