personas:
  professional: Yanisleidy Rojas, an experienced housekeeping professional with a decade of systematic cleaning and domestic management expertise, leverages bilingual fluency and a calm demeanor to swiftly
    adapt to varied client preferences, preferring structure yet sometimes resisting rigid schedules, which can lead to occasional missed paperwork deadlines as she balances practicality with spontaneous
    flexibility while pursuing a supervisory role and Certified Professional Cleaner credential.
  sports: Yanisleidy Rojas, a walking enthusiast who enjoys brisk weekend routes through Brackenridge Park, follows the San Antonio Spurs and San Antonio FC, and occasionally joins a community soccer league
    on Saturdays, balancing her love of movement with a laid‑back fitness routine that offers both social interaction and solitary time.
  arts: Yanisleidy Rojas, a devoted fan of regional music, regularly listens to mariachi classics by Vicente Fernández and cumbia hits from Los Kumbia Kings while dancing at parish celebrations, and unwinds
    evenings with romance novels by Nicholas Sparks, illustrating how artistic expression weaves into her community‑centered life.
  travel: Yanisleidy Rojas, an adventurous yet budget‑conscious traveler, prefers well‑planned trips that blend cultural immersion with family visits, having explored Oaxaca’s historic markets and the Texas
    Hill Country’s vineyards, and dreams of a pilgrimage to the Basilica of Our Lady of Guadalupe in Mexico City, balancing her desire for discovery with the financial goal of home ownership.
  culinary: Yanisleidy Rojas, an enthusiastic home cook, delights in perfecting traditional dishes like mole poblano and chiles en nogada, experimenting with ingredients such as huitlacoche and toasted
    pepitas to add modern twists, yet occasionally over‑seasones her salsa, showcasing her creative yet sometimes over‑zealous approach to flavor.
  core: Yanisleidy Rojas blends calm resilience with a love for structured routines and spontaneous community celebrations, balancing meticulous domestic work, pragmatic savings, and a penchant for dancing
    to mariachi while occasionally over‑seasoning her salsa and missing dental appointments.
background:
  cultural: Yanisleidy comes from a Mexican‑American background, raised in a close‑knit family that values hard work, respect (respeto), and community. She grew up bilingual, celebrating Día de los Muertos,
    fiestas patrias, and other Mexican traditions while also embracing the vibrant culture of San Antonio’s Mexican community. Her Catholic faith and regular participation in community events provide a
    strong sense of identity and connection to her heritage.
