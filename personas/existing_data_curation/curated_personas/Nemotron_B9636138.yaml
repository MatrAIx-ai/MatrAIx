  career_goals: At 78, Cecia’s ambition centers on staying socially and intellectually engaged. She aims to formalize her informal mentorship by becoming a senior trainer for new stockers, sharing best
    practices in inventory accuracy and customer interaction. She hopes to volunteer as a docent at the local Port of Wilmington museum, using her love of history and art to guide visitors. She also aspires
    to coordinate a quarterly “Art in the Aisle” pop‑up showcase that highlights local artists’ work within the store, merging her professional role with her artistic passion. Long‑term, she wishes to document
    oral histories of longtime Wilmington residents, preserving community memory for future generations while maintaining her health and independence.
