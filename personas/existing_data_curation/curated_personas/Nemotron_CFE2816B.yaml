personas:
  professional: Deborah Hulsey, a senior full‑stack engineer and UI/UX specialist in Dallas, merges JavaScript and Python expertise with a love for generative art to craft immersive digital experiences,
    leveraging her imaginative curiosity and relaxed, flexible work style while assertively guiding interdisciplinary teams toward innovative museum and VR projects.
  sports: Deborah Hulsey enjoys weekend hikes with the Hill Country Trail Club, follows the Dallas Mavericks and Dallas Cowboys for their community spirit, and incorporates occasional yoga and birdwatching
    into her fitness regimen, preferring low‑impact, solitary activities over competitive sports.
  arts: Deborah Hulsey channels her love for speculative fiction by creating watercolor and algorithmic digital pieces inspired by Octavia Butler and Yayoi Kusama, regularly attending intimate gallery openings
    and women‑in‑tech meetups where she shares her piano improvisations and draws creative energy from artists such as Brian Eno and James Turrell.
  travel: Deborah Hulsey plans her trips with a balance of loose itineraries and curated art experiences, having explored the Texas Hill Country, the blue‑stone cliffs of Sedona, and the museums of Barcelona,
    while dreaming of a solo pilgrimage to Kyoto’s tea houses when her volunteer schedule at the senior coding center eases.
  culinary: Deborah Hulsey delights in crafting homemade carne asada tacos and smoky chili rellenos with a signature blend of chipotle, cumin, and fresh epazote, boasting an intermediate cooking skill that
    lets her confidently host intimate dinner parties while constantly refining her spice repertoire.
  core: Deborah Hulsey, a 53‑year‑old code‑savvy artist, stitches algorithms into watercolor, thrives on spontaneous creativity, but habitually misplaces sketchbooks and procrastinates on tax paperwork.
background:
  cultural: Deborah grew up in a middle‑class suburban community near Dallas, where Southern hospitality and a strong sense of community were woven into daily life. Her family valued education and the arts,
    encouraging museum trips, theater outings, and a love of literature from an early age. Attending a liberal arts college reinforced her interdisciplinary mindset, blending critical humanities scholarship
    with early exposure to computer science. Living in Rockwall, Texas, she embraces the blend of modern suburban growth and traditional Texan customs—enjoying regional music, local barbecues, and outdoor
    recreation while maintaining a reflective, intellectually curious outlook. This cultural tapestry informs her balanced approach to collaboration, creativity, and independent work.
