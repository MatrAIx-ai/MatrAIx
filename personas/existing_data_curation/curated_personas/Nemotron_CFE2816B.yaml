  career_goals: Deborah aims to become a technical architect who leads cross‑disciplinary teams at the intersection of software and the arts. She is driven to spearhead projects that produce immersive educational
    tools, interactive museum exhibits, or VR experiences that illuminate humanities content. Over the next few years, she plans to mentor emerging women developers in the Dallas‑Rockwall area, establish
    a local collaborative of technologists and artists, and contribute to open‑source frameworks that support creative coding. Ultimately, she hopes to author a seminal work on digital storytelling that
    merges narrative theory with interactive technology.
