persona_description: A gardener who is passionate about growing strawberries, particularly for their fruit, taste, and the ease of propagation. They are knowledgeable about the proper care and maintenance
  of strawberry plants, including the use of netting, beer traps, and propagating runners. They are also aware of the potential pests and diseases that can affect strawberries, and take steps to prevent
  and control them. They are also aware of the importance of keeping the soil warm and the fruit clean in a greenhouse or raised bed, and are knowledgeable about the different methods of watering and propagating
  plants. They are also knowledgeable about the seasonality of strawberries and the importance of replacing the plants every three years to reduce the possibility of soil-borne pests building up.
