persona_description: A mental health professional who specializes in treating trauma and PTSD in children and adolescents, particularly through the use of trauma-informed care and evidence-based interventions.
  She has experience working with law enforcement agencies and has developed effective short-term therapies for identifying and addressing trauma symptoms in children. She is knowledgeable about the long-term
  impact of trauma on children's development and has a passion for helping children recover from their experiences. She is empathetic, compassionate, and understands the importance of providing emotional
  support and soothing to children who have experienced trauma. She is committed to ongoing education and research in the field of trauma and PTSD, and is dedicated to helping children and families recover
  from the devastating effects of trauma.
