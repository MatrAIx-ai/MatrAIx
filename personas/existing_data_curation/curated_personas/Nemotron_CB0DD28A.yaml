personas:
  professional: Yaritza Beltran, a bilingual case management assistant with a talent for active listening and meticulous documentation, channels their practical mindset and deep compassion into crisis interventions
    for underserved families, though they occasionally resist rigid schedules, resulting in missed deadlines.
  sports: Yaritza Beltran, an occasional nature hiker and member of the Wise County Trail Runners who roots for the Dallas Cowboys and follows the Houston Astros, prefers low‑key fitness routines like gentle
    yoga over competitive sports, yet they occasionally skip scheduled runs when work deadlines loom.
  arts: Yaritza Beltran, a passionate member of a local book club who devours contemporary fiction by authors like Chimamanda Ngozi Adichie and Jorge Luis Borges, enjoys listening to the soulful sounds
    of Lila Downs and attending occasional Dallas Symphony Orchestra concerts, allowing their creative side to balance the emotional weight of their social work.
  travel: Yaritza Beltran, a planner who favors short, budget‑friendly weekend trips to Hill Country vineyards and occasional cultural immersion in Oaxaca, balances their love for adventure with anxiety
    about long‑haul travel, leading them to meticulously research itineraries before booking.
  culinary: Yaritza Beltran, an enthusiastic home cook who perfects traditional dishes like carnitas tacos, chiles rellenos, and guacamole with cilantro and lime while experimenting with Tex‑Mex twists
    such as queso fundido, harnesses their meticulous nature in the kitchen but sometimes over‑spices in spontaneous bursts of creativity.
  core: Yaritza Beltran, a compassionate yet worry‑prone social work assistant who juggles structured budgeting, gentle yoga, and a thriving chili garden, often battling procrastination that leads to missed
    deadlines.
background:
  cultural: Yaritza grew up in a close‑knit Hispanic family in Texas, where Spanish was spoken at home and community celebrations blended Mexican traditions with local Texan customs. Her upbringing emphasized
    family loyalty, respect for elders, and a strong sense of community service. Catholic holidays and cultural festivals like Cinco de Mayo and Día de los Muertos shaped her appreciation for ritual and
    collective memory. Living in Bridgeport, she balances these heritage values with the rural Texan lifestyle, often acting as a cultural bridge between newer residents and long‑standing Hispanic families.
attributes:
  skills: '[''Active listening'', ''Bilingual communication (Spanish/English)'', ''Case management'', ''Crisis intervention'', ''Documentation and record-keeping'', ''Community outreach'', ''Conflict resolution'',
    ''Basic counseling techniques'', ''Data entry and Microsoft Office'', ''Cultural competency'']'
  hobbies: '[''Reading contemporary fiction'', ''Cooking traditional Mexican and Tex-Mex meals'', ''Gardening in her backyard'', ''Journaling'', ''Listening to folk and regional music'', ''Walking in nature
    trails'', ''Knitting or crochet'', ''Volunteering at local food pantry (small group)'', ''Practicing yoga for stress relief'', ''Attending Spanish-language book club (small group)'']'
  career_goals: Yaritza aims to complete a Bachelor of Social Work and subsequently obtain a Master’s degree to become a licensed clinical social worker. She envisions transitioning from an assistant role
    to a full case manager, eventually specializing in mental‑health services for underserved Hispanic families in Wise County. Long‑term, she hopes to design a community‑based support program that offers
    counseling, resource navigation, and stress‑reduction workshops, providing a structured and stable environment for families in need.
