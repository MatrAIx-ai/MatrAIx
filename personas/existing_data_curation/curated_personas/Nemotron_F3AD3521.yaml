personas:
  professional: Carolyn Dew is an aspiring robotics tinkerer who blends a practical love for building LEGO machines with a competitive drive on the soccer field, channeling her curiosity into coding simple
    Arduino projects while preferring a loose schedule over rigid deadlines.
  sports: Carolyn Dew dominates her middle school’s varsity soccer team and plays guard on the basketball squad, practices with the Colorado Rush youth soccer league, cheers for the Colorado Avalanche and
    Denver Broncos, and spends weekends hiking the Rockies to keep her stamina high.
  arts: Carolyn Dew devours sci‑fi and fantasy novels from authors like Brandon Sanderson and JK Rowling, streams the epic scores of Hans Zimmer while building LEGO creations, and often sings along to Imagine
    Dragons and watches Netflix adaptations of her favorite books, shaping her imagination and social conversations.
  travel: Carolyn Dew prefers spur‑of‑the‑moment road trips to nearby natural wonders such as Yellowstone and the Grand Canyon, dreams of visiting the robotics museums of Tokyo and the castles of Scotland,
    and balances her wanderlust with school obligations by planning short, budget‑friendly weekend getaways with her family.
  culinary: Carolyn Dew favors hearty trail‑mix snacks with almonds, dried cranberries, and chocolate chips, loves pizza topped with extra mozzarella and pepperoni, can whip up a simple cheese quesadilla
    with salsa after a hike, and occasionally indulges in s’mores when camping, though she often forgets to finish her homework before dinner.
  core: Carolyn Dew is a fiercely competitive, endlessly curious 11‑year‑old who juggles robotics, sports, and sci‑fi fantasies with a relaxed, sometimes disorganized schedule, and a calm resilience that
    makes setbacks feel like minor blips.
background:
  cultural: Carolyn grew up in Aurora, Colorado, a culturally diverse suburb that blends urban life with easy access to the outdoors. Her family celebrates typical American holidays like Thanksgiving and
    the Fourth of July while also participating in community events that reflect the city’s multicultural mix, including local Hispanic festivals and neighborhood block parties. The Colorado lifestyle—characterized
    by hiking, skiing, and a strong appreciation for nature—has shaped her love for outdoor activities. At home, practical skills such as cooking simple meals and doing DIY projects are valued, reinforcing
    her balanced curiosity and calm, resilient temperament.
