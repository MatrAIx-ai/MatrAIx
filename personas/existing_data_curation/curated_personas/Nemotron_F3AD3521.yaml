  career_goals: Carolyn dreams of a future where she can blend her curiosity with practicality by becoming a mechanical engineer or product designer who creates everyday solutions. She is also intrigued
    by environmental science and hopes to work on sustainable projects that benefit her community. In high school she plans to join robotics competitions and student leadership clubs, aiming to develop
    leadership skills that leverage her calm resilience and competitive drive. Ultimately, she envisions a career that allows her to innovate, collaborate with diverse teams, and make a tangible impact
    on the world.
