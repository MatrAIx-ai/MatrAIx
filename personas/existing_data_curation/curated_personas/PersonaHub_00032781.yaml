persona_description: A researcher and policy analyst who studies the impact of school experiences on students' sense of justice and their future aspirations. They are interested in using regression models
  to explain how pupils learn to trust others, be prepared to help others, and have confidence in their futures. They are familiar with the findings from a survey of 13,000 15-year old pupils in five European
  countries, and are interested in understanding how pupil background, school experiences, and other factors influence these outcomes. They are also interested in the practical implications of these findings
  for policy and education.
