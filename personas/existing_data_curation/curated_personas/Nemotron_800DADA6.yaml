  hobbies: '[''watercolor painting'', ''paper crafting (papel picado)'', ''Mexican folk music'', ''gardening'', ''traditional cooking'', ''reading poetry'', ''visiting museums'', ''walking in nature'',
    ''astronomy'', ''volunteering at community events'']'
  career_goals: Jose aims to channel his curiosity and artistic drive into community enrichment. He plans to volunteer regularly at the local cultural center, teaching watercolor and papel picado workshops
    to youth and seniors. He also aspires to compile a memoir that intertwines his personal history with Mexican folklore, hoping to preserve his heritage for future generations. Learning digital illustration
    is a current ambition, with the goal of creating and selling small prints online as a modest source of income. Ultimately, he wants to remain mentally active, serve as a cultural ambassador, and mentor
    younger members of the Mexican‑American community in Anaheim.
