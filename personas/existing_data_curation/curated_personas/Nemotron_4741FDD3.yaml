  hobbies: '[''Reading Classic Literature'', ''Poetry'', ''Journaling'', ''Knitting'', ''Gardening'', ''Crossword Puzzles'', ''Sudoku'', ''Historical Society Lectures'', ''Mindfulness Meditation'']'
  career_goals: Approaching retirement, Jenna aims to transition into a supervisory or training role where she can shape the next generation of correctional staff. She hopes to lead a shift-supervisor team,
    develop and expand humanities-based rehabilitation programs, and advocate for policies that improve inmate mental-health support. Long-term, she envisions a part-time position as a community-corrections
    liaison or a volunteer counselor at a local reentry nonprofit, using her experience to ease the transition of formerly incarcerated individuals back into society.
