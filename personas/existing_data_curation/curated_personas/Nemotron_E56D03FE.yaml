  hobbies: '[''Football'', ''Basketball'', ''Fishing'', ''Hunting trips with family'', ''Woodworking projects'', ''Playing guitar in church youth band'', ''Reading tech and science articles'', ''Volunteering
    at local food bank'', ''Journaling'', ''Evening nature walks'']'
  career_goals: Omar aspires to complete his high school education through a GED program and then enroll in a community-college trade curriculum, such as HVAC or electrical technology, where he can combine
    his hands-on aptitude with his desire to serve his hometown. His long-term ambition is to become a community-focused service professional—either as a reliable handyman who offers affordable repairs
    to neighbors, or as a certified emergency-medical technician who can respond to health crises in rural Monroe County. Parallel to his technical goals, Omar aims to develop a youth-mentorship initiative
    that equips peers with organizational skills and emotional-wellness tools, reflecting his compassionate drive to foster harmony and support in his community.
