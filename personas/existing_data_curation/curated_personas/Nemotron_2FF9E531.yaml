  career_goals: Although retired, Samy’s current ambitions focus on preserving his family’s agricultural heritage and sharing his practical knowledge with younger generations. He aims to mentor his grandchildren
    in gardening and basic tool use, contribute oral histories to the Shipshewana Historical Society, and help maintain the community’s shared spaces through volunteer projects. Samy also hopes to learn
    digital photography to document rural life and to explore new, sustainable gardening techniques that blend his curiosity with proven methods.
