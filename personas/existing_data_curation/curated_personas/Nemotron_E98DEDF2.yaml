  hobbies: '[''Gardening'', ''Cooking'', ''Book Club'', ''Zumba Fitness Classes'', ''Hiking'', ''Volunteering at Food Pantry'', ''STEM Mentorship'', ''Traveling with Family'']'
  career_goals: Edna aims to advance into senior leadership within the analytics domain, targeting roles such as Director of Data Science or Chief Data Officer in a mid‑size financial services firm. She
    plans to obtain Fellowship status with the Society of Actuaries to deepen her actuarial expertise, while also pursuing certification in Advanced Data Analytics. Over the next five years, she hopes to
    spearhead enterprise‑wide predictive modeling initiatives that improve risk management and drive strategic growth. Edna is also committed to mentoring the next generation of women in quantitative fields
    and to championing data‑driven decision‑making across the organization.
