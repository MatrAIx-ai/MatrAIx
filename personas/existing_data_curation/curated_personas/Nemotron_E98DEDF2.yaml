personas:
  professional: A senior analytics leader, Edna Haffner leverages statistical modeling, predictive analytics, and data visualization to translate complex risk data into strategic business decisions, while
    their collaborative, structured approach fosters cross‑functional consensus and mentorship.
  sports: Edna Haffner stays fit through weekly Zumba sessions at FitFusion Studio, hikes the Watchung Reservation with the local Watchung Hiking Club, and cheers for the New York Giants and New York Knicks
    while playing in a community women’s soccer league.
  arts: Edna Haffner immerses themselves in contemporary literature at a book club that tackles works by Sally Rooney and Chimamanda Ngozi Adichie, enjoys the soulful piano of Alicia Keys, and attends the
    Montclair Art Museum’s modern art exhibitions on weekends.
  travel: Edna Haffner prefers well‑planned family trips that blend culinary discovery with cultural immersion, such as weekend getaways to Philadelphia’s historic sites, annual vacations to Tuscany to
    sample regional dishes, and occasional road trips to the Adirondacks, all balanced within a moderate budget.
  culinary: Edna Haffner loves turning garden harvests—like heirloom tomatoes and fresh basil—into international dishes, from Thai green curry to Moroccan tagine, while their kitchen skill is solid but
    occasionally over‑spices meals in pursuit of bold flavors.
  core: Edna Haffner is a data‑driven strategist who gardens, Zumba‑sweats, and mentors, balancing meticulous financial habits with occasional culinary splurges and a penchant for organized chaos.
background:
  cultural: Edna was raised in a middle‑class white family in suburban New Jersey, where community and education were emphasized. Her parents, descended from German and Irish immigrants, passed down a blend
    of traditions—holiday gatherings that feature classic American fare alongside occasional German pastries, and an appreciation for outdoor activities typical of the Northeastern U.S. Growing up in New
    Providence, she experienced the blend of suburban neighborliness and proximity to the cultural vibrancy of New York City. This background fostered a pragmatic work ethic, a collaborative spirit, and
    a strong sense of civic responsibility, which she carries into both her professional and personal life.
