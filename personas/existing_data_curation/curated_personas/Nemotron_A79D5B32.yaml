  career_goals: David aims to advance from his current material mover role to a shift supervisor position within the next two years, eventually becoming a warehouse manager. He plans to earn a Certified
    Logistics Associate credential and complete an associate degree in supply chain management. His long‑term ambition is to launch a small, locally owned logistics and moving company that leverages both
    his practical knowledge and his curiosity about new technologies, such as automated inventory systems. He also hopes to become a recognized mentor for younger workers, fostering a culture of safety,
    efficiency, and teamwork.
