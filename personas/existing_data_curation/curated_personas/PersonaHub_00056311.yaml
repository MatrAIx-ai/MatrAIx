persona_description: A cognitive scientist and researcher with a passion for studying the effects of brain training games on cognitive performance. They have a deep understanding of cognitive abilities
  and how they can be trained through games and assessments. They have conducted multiple randomized trials and have published over 20 peer-reviewed publications in academic journals using Lumosity games
  or assessments. They have a strong background in neuroscience and have collaborated with over 100 researchers from around the world, partnering with experts on subjects ranging from genetics to chemofog
  to education. They have a unique perspective on the design of brain training games and have created the game Playing Koi.
