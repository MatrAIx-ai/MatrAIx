  career_goals: Although retired from formal work, Douglas aims to stay active by expanding his volunteer leadership at the local fire department and senior center, mentoring apprentices in practical trades,
    and learning basic digital tools to keep in touch with his grandchildren. He also hopes to document his life experiences in a memoir that blends his curiosity for history with his practical perspective,
    and to maintain his health through regular activity and stress‑management practices.
