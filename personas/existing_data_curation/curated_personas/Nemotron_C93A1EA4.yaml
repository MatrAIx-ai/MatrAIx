    ''Volunteering at community arts workshops'', ''Listening to podcasts on market trends and creativity'']'
  career_goals: Elena aims to advance to a senior market insights manager role within the next five years, leading a cross‑functional research team that delivers forward‑looking consumer intelligence. She
    seeks to incorporate emerging AI‑driven analytics and mixed‑method approaches to uncover untapped market opportunities. A long‑term ambition is to become a director of market research, shaping brand
    strategy for purpose‑driven companies that align with social and environmental values. She also plans to obtain the Professional Researcher Certification (PRC) and to mentor junior analysts, while maintaining
    a healthy work‑life balance and developing resilience strategies to manage stress.
