    ''Data storytelling and visualization'', ''Presentation skills'', ''Project management'', ''Stakeholder communication'', ''Empathy-driven collaboration'']'
  hobbies: '[''Visiting local art galleries and museums'', ''Sketching and watercolor painting'', ''Reading non‑fiction on psychology, philosophy, and art history'', ''Participating in a small literary
