personas:
  professional: Teri Hill, a 23‑year‑old muralist and residential painter, leverages a competitive bidding mindset and a relaxed, improvisational workflow to fuse commercial wall‑finishing expertise with
    avant‑garde mixed‑media murals that tell narrative stories on private homes and boutique spaces.
  sports: Teri Hill, who prefers solitary movement over crowded gyms, spends early mornings hiking the Bladen County nature trails, joins a local kayaking club in summer, and supports the Carolina Panthers
    and Charlotte Hornets from a modest fan’s perspective, while incorporating weekly yoga sessions to offset the physical strain of lifting heavy drywall.
  arts: Teri Hill channels an insatiable curiosity into abstract canvas work, drawing inspiration from Mark Rothko, Yayoi Kusama, and the speculative narratives of N. K. Jemisin, while immersing themselves
    in indie folk playlists featuring Fleet Foxes and Joanna Newsom and regularly attending intimate art talks at the Greensboro Museum of Art.
  travel: Teri Hill’s wanderlust blends low‑budget road trips through the Appalachian foothills with a yearning to study fresco techniques in Florence, Italy, prompting frequent weekend escapades to Asheville’s
    craft markets, occasional flights to Portland for its thriving maker scene, and a carefully saved travel fund that balances artistic pilgrimage with a part‑time job’s fluctuating income.
  culinary: Teri Hill, an experimental home cook, favors bold textures and earthy flavors, often crafting roasted beet‑and‑goat‑cheese salads sprinkled with smoked paprika, whipping up caramelized onion‑infused
    flatbreads, and repurposing reclaimed kitchen tools, yet sometimes skips meals while lost in a new mural concept.
  core: Teri Hill is a competitively driven, creatively restless 23‑year‑old muralist who blends disciplined paintcraft with spontaneous mixed‑media experiments, lives on a flexible schedule that occasionally
    borders on chaos, and navigates life with a calm, skeptical, and solitary outlook.
background:
  cultural: She grew up in the rural landscape of Elizabethtown, North Carolina, immersed in the traditions of Bladen County's close‑knit community. Her family background reflects a lineage of skilled tradespeople,
    which fostered an early appreciation for craftsmanship and hands‑on work. Southern hospitality and the region's folk art heritage have shaped her aesthetic sensibilities, while local church gatherings
    and county fairs introduced her to communal storytelling and visual expression. Although she identifies as White American, her cultural experience blends rural Southern values—such as self‑reliance,
    respect for nature, and an informal, reserved demeanor—with contemporary influences from online art communities and modern speculative literature. This mix informs her preference for solitude, small‑group
    collaboration, and the pursuit of innovative, locally‑rooted artistic projects.
attributes:
  skills: '["Wall preparation and priming", "Residential painting", "Faux finish techniques", "Wallpaper hanging and removal", "Color theory and composition", "Abstract mural design", "Mixed‑media surface
    art", "DIY home improvement", "Creative problem‑solving", "Competitive contract bidding", "Customer communication", "Safety compliance"]'
  hobbies: '["Abstract canvas painting", "Nature sketching and photography", "Reading speculative fiction and philosophy", "DIY furniture upcycling", "Community art workshops", "Mentoring apprentices",
    "Listening to indie folk music", "Exploring local nature trails", "Collecting vintage paint swatches", "Playing strategy board games"]'
  career_goals: She aims to transition from routine residential painting to becoming a sought‑after artist‑painter who creates bespoke abstract murals for homes and boutique commercial spaces. Over the
    next five years she plans to build a portfolio of signature large‑scale wall art, secure commissions through competitive bidding, and launch a small studio that offers both painting services and interior
    art consulting. She intends to complete a short‑term certification in historic‑preservation finishes and enroll in evening art‑design courses to refine her conceptual skills. Ultimately, she envisions
    establishing a brand known for innovative, narrative‑driven wall treatments that blend functional painting with original artwork, allowing her the flexibility to choose projects that fuel her curiosity.
