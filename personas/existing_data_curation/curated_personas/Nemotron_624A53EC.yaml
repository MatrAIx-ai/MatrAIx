    and time‑management skills'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Urban and nature photography'', ''Reading contemporary fiction and poetry'', ''Writing poetry and short stories'', ''Yoga
    and meditation'', ''Hiking in the Piedmont trails'', ''Volunteering on community mural projects'', ''Participating in a small book club'', ''Cooking experimental dishes'']'
  career_goals: Edna aims to advance to a supervisory role within the probation department, where she can lead a team in implementing restorative justice and arts‑integrated treatment programs. She intends
    to pursue a master's degree in social work or criminal justice to deepen her clinical expertise and research skills. Long‑term, she envisions influencing state correctional policy, publishing studies
    on the efficacy of creative interventions for offender rehabilitation, and establishing a community reentry center that partners with local arts organizations to support successful transitions.
