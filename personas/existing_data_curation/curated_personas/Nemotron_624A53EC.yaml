personas:
  professional: Edna Quatrini is a meticulous probation officer who leverages her organizational precision, risk‑assessment expertise, and love of the arts to design innovative, arts‑integrated rehabilitation
    programs while fostering compassionate client relationships, and they consistently balance high standards with empathetic support.
  sports: Edna Quatrini balances a love for yoga and weekend hikes with avid support for the Charlotte Hornets and North Carolina State Wolfpack, participates in the Greensboro Trail Runners club for trail
    runs, and they occasionally join a local recreational volleyball league to stay active.
  arts: Edna Quatrini immerses themselves in the visual and performing arts by attending Weatherspoon exhibitions featuring Cindy Sherman, painting watercolors inspired by Georgia O'Keeffe, writing poetry
    after reading Ocean Vuong, enjoying indie theater productions starring emerging talent like John Gallagher, and filling playlists with Sufjan Stevens and St. Vincent.
  travel: Edna Quatrini plans travel with meticulous itineraries and spontaneous artistic detours, favoring short‑term retreats to Asheville’s Blue Ridge vistas, weekend gallery tours in New York City,
    and dreaming of immersive cultural workshops in Oaxaca, Mexico, while budgeting around their modest probation officer salary.
  culinary: Edna Quatrini, an experimental home cook, deftly combines flavors in dishes like quinoa‑stuffed zucchini with miso‑glazed eggplant and kimchi‑infused tacos, sources fresh figs, goat cheese,
    and heirloom tomatoes from the Greensboro farmers market, and they host intimate cooking nights where improvisation meets seasonal inspiration.
  core: Edna Quatrini fuses a disciplined, data‑driven mindset with a restless artistic curiosity, channeling their love for small‑group creativity into structured restorative‑justice initiatives while
    occasionally hoarding vintage watercolor sets and binge‑reading philosophy at 3 a.m.
background:
  cultural: Edna was raised in a middle‑class white family in the Greensboro suburbs, steeped in Southern hospitality, community service, and traditional celebrations like Thanksgiving and Fourth of July
    barbecues. Her parents emphasized education, civic responsibility, and involvement in church‑based outreach, fostering an early sense of stewardship. A liberal arts education broadened her worldview,
    merging her Southern roots with a progressive appreciation for diverse artistic expression and social justice. She maintains strong ties to local cultural institutions, supports regional festivals,
    and participates in multicultural events that reflect Greensboro's evolving community fabric.
attributes:
  skills: '[''Risk assessment and threat analysis'', ''Crisis intervention'', ''Case management and treatment planning'', ''Report writing and documentation'', ''Program development (including arts‑based
