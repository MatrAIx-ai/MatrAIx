persona_description: A Bauhaus-trained designer who is interested in the history and philosophy of modern design, particularly the works of Walter Gropius and Paul Klee. They are also curious about the
  political and social context in which the Bauhaus was founded and operated, and the impact of the movement on the development of modern design. They appreciate the integration of art and technology in
  design, and are interested in the role of education in shaping the development of design. They may also be interested in the personal relationships and conflicts that occurred within the Bauhaus, and
  the legacy of the school in the field of design.
