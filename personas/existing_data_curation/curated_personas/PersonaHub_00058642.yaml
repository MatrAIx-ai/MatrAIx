persona_description: A conservation biologist and environmentalist with a passion for bird conservation, invertebrate conservation, and the protection of endangered species. They have expertise in research,
  publication, and the management of important bird habitats, and have collaborated with institutions such as the Royal Botanic Gardens, Kew and the Zoological Society of London. They are currently working
  on the conservation of the Seychelles kestrel and Seychelles sheath-tailed bat, as well as the establishment and management of the Roche Caiman Bird Sanctuary. They have a special interest in the conservation
  genetics of threatened Seychelles plants and the breeding of threatened species from Fregate island. They have also conducted research on the status of Seychelles invertebrates and the Seychelles Giant
  Tortoise Conservation Project, which aims to rescue and reintroduce two species of tortoise that were thought to have been extinct over 150 years ago.
