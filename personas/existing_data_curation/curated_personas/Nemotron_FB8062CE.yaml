personas:
  professional: Shay Haggett is an aspiring wildlife illustrator and high‑school sophomore who blends detailed bird and insect sketches with a practical, structured approach to school assignments, often
    allocating short, focused drawing sessions between algebra homework while maintaining a loosely organized overall schedule.
  sports: Shay Haggett is an active member of a local junior hiking club, frequently trekking the trails of Hocking Hills State Park and the Red River Gorge, while cheering on the Cincinnati Bengals during
    football season, and they favor solo trail runs for personal fitness over organized team sports.
  arts: Shay Haggett immerses themselves in visual and musical arts, sketching birds in the style of John James Audubon and Charley Harper, mastering acoustic renditions of Bob Dylan and Simon & Garfunkel
    on guitar, and they regularly discuss Agatha Christie mysteries and Isaac Asimov science‑fiction novels with a school book club.
  travel: Shay Haggett prefers low‑key road trips that blend photography and nature, having documented the waterfalls of Hocking Hills, the limestone cliffs of Red River Gorge, and they dream of hiking
    the alpine trails of Banff National Park in Canada, typically planning trips spontaneously rather than months in advance.
  culinary: Shay Haggett often refuels after sketching sessions with homemade granola bars, apple slices dipped in peanut butter, and the occasional pepperoni pizza, and while they can toss together a quick
    baked sweet potato, they rarely venture into complex recipes, favoring simple, comforting bites.
  core: Shay Haggett is a detail‑oriented teen who balances structured drawing and strategic gaming with a relaxed, occasionally disorganized lifestyle, habitually forgetting to water houseplants while
    obsessing over perfect pencil lines.
background:
  cultural: Shay grew up in Minford, a small unincorporated community in Scioto County, Ohio, within a white, middle‑class family that values self‑reliance, community service, and a close connection to
    the land. Her upbringing includes regular attendance at a local Methodist church, participation in school and community events, and helping on a family-owned small farm where she learned practical chores
    early on. The Midwestern culture of modesty, practicality, and neighborly support has shaped her grounded outlook and her preference for stable, hands‑on work. While she enjoys solitude, she also feels
    a strong sense of belonging to the tight‑knit community that emphasizes modest ambition and mutual aid.
attributes:
  skills: '["Basic computer skills (typing, internet research, Microsoft Office)", "Garden and plant care", "Small‑engine maintenance (lawn mower, chainsaw)", "Cooking and meal planning", "Drawing and sketching
    wildlife", "Acoustic guitar playing", "Creative writing (short stories, journaling)"]'
  hobbies: '["Drawing and sketching wildlife", "Playing acoustic guitar (folk and soft rock)", "Reading mystery and science‑fiction novels", "Exploring local trails and nature photography", "Volunteering
    at the Scioto County animal shelter", "Playing strategic video games (e.g., Civilization, StarCraft)", "Participating in a small school book club"]'
  career_goals: Shay hopes to turn her practical skills and love for animals into a career as a veterinary technician or wildlife rehabilitator. She plans to attend a community college after high school,
    study animal health technology, and eventually earn a degree in veterinary science. She also envisions working in sustainable agriculture, helping local farms adopt environmentally friendly practices,
    and possibly running a small organic garden of her own. Her goal is to have a stable, structured career that lets her help animals and the community while allowing for hands‑on, independent work.
