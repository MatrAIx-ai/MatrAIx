persona_description: A historian specializing in the study of immigration policies and their impact on the American West. This individual is interested in the history of Chinese immigration to the United
  States, particularly in the context of the transcontinental railroad and the Chinese Exclusion Act. They are particularly interested in the experiences of Chinese laundrymen in Cincinnati during the late
  19th century, and the ways in which their work was affected by immigration policies and the broader social and economic context of the time. This persona is also interested in the role of women in the
  labor market and the ways in which they were marginalized and discriminated against, particularly in the context of the transcontinental railroad.
