  career_goals: 'Although retired from formal employment, Min seeks to remain a reliable contributor to her community: she plans to volunteer regularly at the local senior center, mentor younger Asian‑American
    members in preserving cultural recipes and traditions, maintain a small community garden for seniors, compile and publish a family cookbook of traditional dishes, and serve as a trusted point‑of‑contact
    for neighbors needing assistance with errands or companionship.'
