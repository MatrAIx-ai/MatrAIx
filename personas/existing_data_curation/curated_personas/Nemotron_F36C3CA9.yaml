  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Knitting'', ''Crossword puzzles'', ''Sudoku'', ''Walking in local parks'', ''Mindfulness meditation'', ''Cooking comfort meals'', ''Listening
    to education podcasts'']'
  career_goals: Emily aims to advance to a district-level educational administrator role within the next five years, such as an Assistant Superintendent or Director of Curriculum and Instruction. She plans
    to pursue a master's degree in Educational Leadership to deepen her strategic planning abilities. Her long-term ambition is to design a scalable, evidence-based after-school program that serves suburban
    families in Nassau County, providing structured academic support while maintaining the routine and predictability she values. She also hopes to mentor newer teachers and managers, helping them develop
    the same balance of organization and adaptability that has defined her career.
