  hobbies: '["Fishing trips with friends", "Local soccer league", "Model ship building", "Volunteer beach clean‑ups", "Blues and folk concerts", "Outdoor BBQ cooking", "Reading DIY and maritime manuals"]'
  career_goals: Colin aims to secure a GED and enroll in a vocational marine‑mechanics program so he can launch his own boat‑repair business. He is motivated to achieve professional credibility by meeting
    high standards, delivering reliable services, and building a reputation that provides financial stability and reduces his chronic stress.
