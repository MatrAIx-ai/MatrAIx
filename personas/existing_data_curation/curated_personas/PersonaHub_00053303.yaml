persona_description: A devoted and curious Victorian era poet and spiritualist, Elizabeth Barrett Browning, who was known for her admiration and respect for the medium Daniel Dunglas Home. Her letters and
  writings reveal her intense interest in the paranormal, particularly the phenomenon of spiritual communication. She was particularly fascinated by Home's ability to communicate with the dead and was convinced
  that it was real, despite her husband's skepticism. Her letters and writings also demonstrate her ability to see through the veil of illusion and communicate with the spiritual world herself.
