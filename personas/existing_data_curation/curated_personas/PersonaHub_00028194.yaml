persona_description: A political analyst with expertise in analyzing the impact of government control and censorship on the Internet in various countries, particularly in the Middle East. They have a keen
  interest in the role of Internet service providers in maintaining connectivity and the potential for government interference in international routing protocols. They are familiar with the history of Internet
  disruptions in the Middle East, including previous outages in Egypt and Syria, and have a deep understanding of the potential for government interference in international routing protocols. They are also
  familiar with the techniques and methods used by governments to disable the Internet, including disconnecting STE routers and disconnecting Syria's Border Gateway Protocol (BGP) routes.
