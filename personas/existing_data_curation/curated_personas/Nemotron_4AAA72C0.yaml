  hobbies: '[''watercolor painting'', ''reading modern philosophy'', ''classical piano playing'', ''botanical garden walks'', ''birdwatching'', ''small book club gatherings'', ''puzzle solving'', ''herb
    garden cultivation'']'
  career_goals: Although retired, Betty remains driven by personal growth. She aspires to publish a memoir that intertwines her family’s story with reflections on art and philosophy, and to release a small
    chapbook of her poetry. Her artistic ambition includes mounting a solo exhibition of her abstract watercolors at the local community center, followed by a collaborative workshop where she mentors emerging
    senior artists. Betty also hopes to master calligraphy and integrate it into her visual art, creating a series that fuses text and image. On a broader scale, she seeks to develop a storytelling program
    for the senior center to help peers share their histories, thereby fostering intergenerational connection and reducing the loneliness she sometimes feels. These goals reflect her desire for creative
    fulfillment, community contribution, and personal well‑being.
