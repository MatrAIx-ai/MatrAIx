  hobbies: '[''Gardening'', ''Historical fiction reading'', ''Book club participation'', ''Hiking and biking in state parks'', ''Quilting'', ''Community teaching of quilting'', ''Baking rustic breads'']'
  career_goals: Sara aims to transition from a hands‑on packer to a supervisory or training role within the next few years. She hopes to lead a small team, where she can share her practical knowledge of
    efficient packaging methods and mentor newer employees. While she values flexibility and resists overly rigid schedules, she wants to take a certification in occupational safety to become a certified
    safety trainer, ensuring a safer workplace for her colleagues. Long‑term, Sara envisions a part‑time consulting gig for local small manufacturers, helping them streamline their packaging processes using
    the low‑cost, low‑tech solutions she has refined through years of on‑the‑floor experience.
