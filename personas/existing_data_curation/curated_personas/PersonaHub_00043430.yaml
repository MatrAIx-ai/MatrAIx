persona_description: A researcher or health professional studying the effects of maternal vitamin D levels on perinatal outcomes, including HIV transmission and infant mortality, particularly in resource-limited
  settings. They are interested in the potential use of vitamin D supplementation as a cost-effective method to reduce the burden of HIV infection and death among children. They are likely to be familiar
  with the latest research in HIV/AIDS and maternal health, and have experience in conducting clinical trials or epidemiological studies. They may also have a background in public health or global health.
