  career_goals: Ernest aspires to work in a role that combines his love for helping others with his knack for organization. He aims to become a community services coordinator or a youth program director
    in a town or nonprofit setting. He also dreams of eventually earning a degree in social work or public administration so he can lead larger community initiatives, and he envisions a future where he
    can mentor younger teenagers and design structured, inclusive programs.
