  career_goals: Marcus aims to transition into a foreman or site safety supervisor role within the next few years, leveraging his on-the-ground experience to guide larger projects. He plans to obtain an
    OSHA authorized trainer certification and eventually launch a small, family-owned contracting business focused on residential renovations and community improvement projects. His long-term ambition is
    to achieve financial stability for retirement while continuing to mentor apprentices and give back through local volunteer construction initiatives.
