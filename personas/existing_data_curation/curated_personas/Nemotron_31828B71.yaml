personas:
  professional: Marcus Mottola is a seasoned construction specialist who leverages three decades of concrete finishing, framing, scaffolding, and heavy‑equipment operation expertise, coupled with a talkative,
    mentor‑oriented leadership style, to keep crews on schedule; they now aim to become a foreman and OSHA‑certified trainer while laying the groundwork for a family‑run renovation business.
  sports: Marcus Mottola is an avid fan of the Tennessee Titans, rarely missing a home game, while also belonging to the Pulaski Rod and Reel Club for seasonal fishing tournaments, participating in annual
    deer hunting through the local Game Wardens association, and keeping fit with weekend hikes on the Natchez Trace; they balance team spirit with outdoor pursuits.
  arts: Marcus Mottola expresses their creative side by playing acoustic guitar to classic country hits from George Strait, Willie Nelson, and Dolly Parton in the Methodist choir, crafting handcrafted furniture
    in the workshop, and attending annual bluegrass festivals that celebrate the region’s folk traditions; they relish the blend of music, woodwork, and community art.
  travel: Marcus Mottola prefers road‑trip adventures that blend outdoor recreation with modest budgeting, having explored the Great Smoky Mountains, spent a weekend at a fishing lodge in northern Alabama,
    and dreaming of a future hunting expedition in the Texas Hill Country, all while planning trips around family commitments and seasonal work schedules; they favor driving over flying for the freedom
    it offers.
  culinary: Marcus Mottola delights in Southern barbecue, expertly smoking ribs and brisket with hickory wood, seasoning with a secret blend of paprika, brown sugar, and cayenne, pairing dishes with homemade
    coleslaw, cornbread, and sweet tea, though they sometimes over‑apply the bourbon glaze in a bid to impress guests at their famed backyard cookouts.
  core: Marcus Mottola is a talkative, community‑focused construction veteran whose practical mindset, love of the outdoors, and generous hospitality shape a disciplined yet occasionally indulgent lifestyle;
    they balance structure with spontaneity in work and leisure.
background:
  cultural: Marcus grew up in Pulaski, a small town in Lincoln County, Tennessee, steeped in Southern Appalachian culture. His family emphasized hard work, self-reliance, and hospitality, values that are
    reflected in his strong sense of community and willingness to help others. He was raised attending a Methodist congregation, where music, fellowship, and service were central. The region's modest, close-knit
    social fabric, love of country music, and reverence for the outdoors have shaped his worldview and daily routines.
