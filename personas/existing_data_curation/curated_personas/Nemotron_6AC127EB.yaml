personas:
  professional: Allison Chung, a 41‑year‑old claims adjuster, appraiser, examiner, and investigator in Maine, combines razor‑sharp analytical skills with deep empathy, turning meticulous property damage
    assessments into clear, fair settlements while mentoring junior adjusters and steering toward a future Claims Manager role.
  sports: Allison Chung stays fit by hiking Acadia National Park’s trails in summer, kayaking the Penobscot River in spring, joining the Bangor Trail Running Club for weekly long runs, cheering on the Boston
    Bruins and New England Patriots, and attending community yoga sessions that soothe her worry‑prone temperament.
  arts: Allison Chung immerses herself in the local art scene, sketching watercolors of Maine’s coastline after visits to the Center for Maine Contemporary Art, drawing inspiration from Andrew Wyeth and
    the folk sounds of The Decemberists, performing in community theater workshops, and curating therapeutic art sessions for claimants recovering from trauma.
  travel: Allison Chung plans her travel with a mix of spontaneous weekend getaways to Bar Harbor, Portland, and the White Mountains, long‑distance road trips along the Atlantic coast, and dream trips to
    the Tuscan countryside, always budgeting carefully to balance her professional responsibilities with her love of exploring new landscapes.
  culinary: Allison Chung enjoys cooking at an intermediate level, favoring lobster rolls, creamy New England clam chowder, and wild blueberry pancakes flavored with fresh maple syrup, often incorporating
    foraged mushrooms and herbs from her hikes into hearty stews, while she delights in farm‑to‑table dining at local eateries.
  core: Allison Chung merges meticulous claims expertise with an artist’s eye, channeling her worry into mindful practices, community service, and a vibrant life painted in watercolor hues and compassionate
    action.
background:
  cultural: Allison is a white New Englander whose family roots trace back to early Irish and English settlers in Maine. Raised in a small coastal town, she grew up valuing self‑reliance, community involvement,
    and an appreciation for the region's maritime heritage. The rugged landscapes and seasonal changes of Penobscot County have shaped her love for outdoor recreation and her respect for local traditions.
    While she identifies with broader American cultural norms, her upbringing instilled a strong sense of civic duty and an openness to diverse ideas—a foundation that fuels her curiosity about art, new
    perspectives, and collaborative problem‑solving.
