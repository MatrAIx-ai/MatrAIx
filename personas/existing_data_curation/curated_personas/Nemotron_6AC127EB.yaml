  hobbies: '[''Visiting local art galleries'', ''Painting watercolors'', ''Hiking the Appalachian Trail and nearby state parks'', ''Kayaking on the Penobscot River'', ''Volunteering at the community shelter'',
    ''Participating in community theater workshops'', ''Reading historical fiction'', ''Practicing yoga and mindfulness'', ''Attending live music events'', ''Gardening'']'
  career_goals: Allison aims to advance into a senior supervisory role within her insurance firm, eventually becoming a Claims Manager where she can mentor junior adjusters and shape best‑practice protocols.
    She plans to earn the CPCU (Chartered Property and Casualty Underwriter) designation to deepen her technical knowledge. Long‑term, she envisions creating a community outreach program that educates Maine
    residents on insurance rights and disaster preparedness, combining her professional expertise with her compassion for helping others. She also hopes to integrate her love of the arts by curating workshops
    that use creative expression as a therapeutic tool for claimants recovering from traumatic losses.
