personas:
  professional: Amy Thomas is a hands‑on carpenter in Chetek who blends meticulous tool mastery— from table saws to hand planes— with a competitive drive that pushes them to outpace local peers, while their
    habit of loosely organizing job schedules often fuels late‑night stress as they strive to meet client deadlines and win regional woodworking contests.
  sports: Amy Thomas charges the mixed‑gender softball league at the Chetek Community Center, cheers for the Milwaukee Brewers and the Wisconsin Timber Rattlers, and volunteers for Habitat for Humanity
    build‑days that double as a cardio workout, while they squeeze in weekend kayak trips on Lake Chetek for low‑impact fitness.
  arts: Amy Thomas tunes into classic rock legends like Bruce Springsteen and country icons such as Garth Brooks while they sandpaper cabinets, attend the annual Chetek Fall Fair to admire local folk art,
    and flip through Fine Homebuilding and This Old House magazines for design inspiration, often quoting Lin‑Manuel Miranda’s lyrics to motivate their crew.
  travel: Amy Thomas prefers road‑trip adventures that balance work and play, taking the family to the Apostle Islands for kayaking in summer, a weekend getaway to Duluth’s lakefront for fresh fish markets,
    and dreaming of a woodworking expo in Milwaukee, yet tight project deadlines and a modest budget keep their vacations short and carefully planned.
  culinary: Amy Thomas whips up simple desserts like apple crumble and chocolate chip cookies for community potlucks, enjoys grilling fresh trout from Lake Chetek with lemon‑butter glaze, and has a modest
    skill level in the kitchen, often relying on pre‑made spice mixes while occasionally over‑salting their dishes when stressed.
  core: Amy Thomas is a competitive, socially‑savvy carpenter who balances a love for hands‑on woodcraft and community leagues with a tendency toward disorganized scheduling, constant worry over deadlines,
    and a sweet tooth for homemade desserts, and they often channel that energy into extra baking for friends.
background:
  cultural: Amy’s cultural background is rooted in the white, working‑class tradition of northern Wisconsin. Her ancestors were German and Scandinavian settlers who arrived in the late 19th century, bringing
    values of hard work, self‑reliance, and modesty. Growing up in the small town of Chetek, she experienced a close‑knit community where church gatherings, county fairs, and lake‑side recreation are central
    to daily life. This Midwestern upbringing emphasizes practicality, craftsmanship, and a strong sense of community responsibility. Though she has less formal education, the regional culture of learning
    by doing and supporting one another has shaped her pragmatic outlook and her commitment to tradespeople and local neighbors.
