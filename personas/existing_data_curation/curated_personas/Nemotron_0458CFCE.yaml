  career_goals: Amy aims to transition from a journeyman carpenter to a small business owner by establishing a custom woodworking shop that serves the Chetek community. She wants to gain formal certification
    through an apprenticeship program to complement her hands‑on experience, and eventually become a foreman leading a crew of apprentices. Her competitive nature fuels a desire to win regional woodworking
    contests and the local home‑improvement showcase. Recognizing her stress‑prone habits, she plans to adopt simple scheduling tools and routine check‑ins to improve organization, hoping to deliver projects
    on time and reduce personal anxiety. Long‑term, she envisions the shop becoming a family‑run legacy that provides stable income for her marriage and offers mentorship to other women entering the trade.
