personas:
  professional: Janette Agosto, a methodical curriculum specialist with a flair for bilingual arts integration, leverages their Spanish‑English fluency and project‑management precision to design culturally
    resonant lesson units while fiercely protecting their schedule and competitively securing grant funding.
  sports: Janette Agosto, an avid supporter of Orlando City SC and the Miami Heat, supplements their competitive spirit with weekly yoga at the Orlando Yoga Collective, a seasonal membership in the Lake
    Nona Racquets tennis league, and occasional 5 k charity runs, preferring structured, low‑impact activities that fit their disciplined schedule.
  arts: Janette Agosto, a dedicated gallery‑hopper who sketches impressions from shows featuring artists like Yayoi Kusama, Kara Walker, and Banksy, channels their love of visual storytelling into street
    photography that captures everyday Orlando moments, and regularly leads community arts workshops inspired by island traditions such as bomba rhythms.
  travel: Janette Agosto, a meticulous planner, prioritizes culturally immersive trips to Old San Juan, Barcelona, and New Orleans, balances limited vacation time with budget‑conscious airfare and a habit
    of journaling each journey, while they dream of a sabbatical to study arts education within vibrant island communities.
  culinary: Janette Agosto, an enthusiastic home chef, perfects classic island dishes such as mofongo, arroz con gandules, and alcapurrias, while experimenting with fusion flavors like miso‑glazed plantains
    and cilantro‑lime avocado salsa, and often stocks their pantry with plantains, sofrito, and fresh cilantro for spontaneous cooking sessions.
  core: Janette Agosto blends disciplined organization with restless curiosity, channeling competitive ambition into arts‑rich education while they juggle stress‑induced worry, a love of solitary sketching,
    and a habit of over‑booking cultural events.
background:
  cultural: Born to Puerto Rican parents, Janette grew up immersed in the island's rich linguistic and artistic traditions, speaking Spanish at home and English at school. Her family celebrated cultural
    customs such as the Parranda during the holidays, the vibrant rhythms of bomba and plena, and the communal preparation of meals like arroz con gandules. After moving to Orlando for her college education,
    she became part of the flourishing Puerto Rican diaspora in Central Florida, maintaining close ties with local community organizations that preserve island heritage. This bicultural experience informs
    her educational perspective, driving her to incorporate Caribbean narratives and bilingual resources into teaching. Janette also identifies with the broader Latino experience in the United States, navigating
    both the opportunities and challenges of representation in the public school system. Her cultural identity serves as a source of pride and a motivating factor in her commitment to empower future generations
    through culturally resonant education.
attributes:
  skills: '[''Bilingual education (Spanish-English)'', ''Curriculum development and arts integration'', ''Lesson planning and assessment design'', ''Educational technology (Google Classroom, Canvas)'',
    ''Classroom management'', ''Project management for community education programs'', ''Grant writing for arts education'', ''Data analysis of student performance'', ''Photography and visual arts for instructional
    use'', ''Public speaking and workshop facilitation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Reading literature and philosophy (including Latin American authors)'', ''Street photography and sketching'', ''Cooking and experimenting with Puerto
    Rican and fusion cuisine'', ''Yoga and guided meditation for stress relief'', ''Journaling and reflective writing'', ''Playing chess and strategic board games'', ''Solving puzzles and crosswords'',
    ''Attending small-group workshops on educational methods'', ''Participating in community cultural festivals'']'
  career_goals: Janette is determined to re-enter the education field in a role that leverages her passion for the arts and her bilingual expertise. In the next two years she plans to earn a master's degree
    in Educational Leadership and obtain certification in Special Education, positioning herself for a curriculum specialist position with the Orange County Public Schools. Her ultimate ambition is to design
    and implement a district‑wide arts‑integration framework that highlights Caribbean cultural narratives, securing grant funding to sustain the program. Parallel to her school‑based career, she aims to
    launch a freelance consulting practice offering bespoke lesson‑plan development and professional‑development workshops for teachers seeking culturally responsive, art‑rich curricula. Her competitive
    drive fuels a goal to become a recognized thought‑leader in arts‑based education, contributing articles to professional journals and presenting at regional conferences.
