  career_goals: Roland intends to leverage his business degree to launch a social enterprise that offers free art and entrepreneurship workshops for underserved youth in Houston. In the short term, he plans
    to secure internships with community-focused non-profits or socially responsible startups to gain hands-on experience in program development and impact measurement. He aims to pursue a master's in social
    entrepreneurship or an MBA with a concentration in nonprofit management within the next two years, eventually positioning himself as a pivot point between the corporate world and community development.
    His long-term ambition is to become a recognized leader who blends profit-driven strategies with cultural empowerment, creating sustainable pathways for artistic and economic growth in his community.
