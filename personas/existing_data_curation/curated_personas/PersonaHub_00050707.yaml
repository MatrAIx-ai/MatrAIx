persona_description: Dr. Gregory A. Fabiano, a professor of psychology at Florida International University and a licensed psychologist, is a fellow of the American Psychological Association Division 16
  and 53. He specializes in evidence-based assessments and treatments for children with ADHD. Dr. Fabiano's work focuses on improving the lives of children through structured remote and hybrid instructional
  strategies, providing more predictability in their lives through structured remote and hybrid instructional strategies, building socio-emotional resiliency, reinforcing positive behavior, and reducing
  learning gaps.
