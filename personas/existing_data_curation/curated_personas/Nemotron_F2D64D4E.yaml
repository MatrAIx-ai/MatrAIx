personas:
  professional: Maria Keith is a seasoned housekeeping professional with extensive knowledge of eco‑friendly cleaning chemicals, meticulous surface care, and household budgeting, and they channel their
    competitive puzzle mindset into streamlining workflows while maintaining a relaxed, flexible schedule.
  sports: Maria Keith follows the Milwaukee Brewers for baseball, cheers on the Green Bay Packers during football season, and they incorporate low‑impact treadmill walks and morning yoga into their fitness
    routine, preferring solitary activity over team sports.
  arts: Maria Keith devotes evenings to unraveling Agatha Christie mysteries and Ken Follett epics, while classic country voices like Johnny Cash, Dolly Parton, and folk storyteller Bob Dylan fill their
    home, and they unwind by knitting scarves patterned after vintage prairie designs.
  travel: Maria Keith prefers low‑stress road trips to nearby state parks such as Door County and Mackinac Island, dreams of seeing the geysers of Yellowstone, and they plan vacations around family gatherings,
    often booking budget‑friendly cabins rather than luxury hotels.
  culinary: Maria Keith excels at Midwestern comfort fare—cooking chicken pot pie, meatloaf with mashed potatoes, and apple crumble—while seasoning dishes with basil and tomatoes harvested from their garden,
    and they relish the ritual of slowly simmering a hearty stew on Sundays.
  core: Maria Keith is a detail‑oriented, puzzle‑loving housekeeper who balances eco‑friendly ambition with a habit of over‑thinking finances and health, often turning solitary hobbies into quiet competitions.
background:
  cultural: Maria grew up in a working‑class White family in the Midwestern town of Hartford City, Indiana, where values such as hard work, modesty, self‑reliance, and community involvement are prized.
    Her upbringing emphasized frugality, practical problem‑solving, and participation in small‑town traditions like Thanksgiving dinners, church socials, and local fairs. While she may have ancestral ties
    to English, German, or Irish heritage, her cultural identity centers on the shared Midwestern ethos of modesty, practicality, and a close‑knit community, which continues to shape her outlook and daily
    habits.
attributes:
  skills: '["Eco-friendly deep cleaning", "Fabric and upholstery care", "Carpet and floor maintenance", "Stain removal techniques", "Household supply budgeting", "Minor home repairs", "Task prioritization
