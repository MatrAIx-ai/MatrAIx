  hobbies: '["Reading mystery novels", "Gardening", "Knitting", "Crossword puzzles", "Sudoku", "Birdwatching", "Cooking comfort meals", "Simple yoga", "Listening to classic country music"]'
  career_goals: Maria aims to advance to a lead housekeeper or supervisory role within her current agency, where she can train new staff and oversee scheduling. Parallel to that, she plans to launch a small
    independent cleaning business that focuses on eco‑friendly services for seniors and families in her community. To support this, she intends to attend community‑college workshops on housekeeping management
    and sustainable cleaning practices, earn relevant certifications, and build a reliable client base. Ultimately, she seeks financial stability for her family, recognition as a dependable professional
    (e.g., Employee of the Month awards), and a comfortable retirement that eases her worries about the future.
