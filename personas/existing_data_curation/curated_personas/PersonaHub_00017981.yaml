persona_description: A team of Boston University students who worked on a project to develop a distributed tracing solution for Ceph, a high-performance distributed storage application, using the open-source
  tracing tool Jaeger. The students designed and implemented a solution using Jaeger and Ceph, deployed a distributed chat application on MOC, and compared the tracing mechanisms of Blkin with Jaeger. They
  aimed to provide a better understanding of the system's behavior and to identify the causes of performance issues. The students were interested in debugging large distributed systems and found Jaeger
  to be an effective solution.
