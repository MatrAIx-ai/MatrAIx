  hobbies: '[''Experimental home cooking'', ''Food photography'', ''Visiting art galleries'', ''Live music concerts'', ''Community theater involvement'', ''Hiking in Columbia River Gorge'', ''Backyard gardening'',
    ''Craft beer brewing'', ''Board gaming'', ''Sci‑fi/fantasy reading'']'
  career_goals: James aims to advance from his current food‑preparation role to a sous‑chef position within the next two years, pursuing an associate degree in culinary arts at a community college and obtaining
    ServSafe certification. His long‑term ambition is to open a small, art‑focused restaurant or pop‑up dining venue in the Canby area that blends visual art installations with experimental cuisine, showcasing
    locally sourced ingredients. He also hopes to develop a food‑blog and eventually publish a cookbook that documents his creative recipes and the stories behind the art that inspires them. Mentoring aspiring
    kitchen staff and fostering a collaborative, inclusive work environment are core to his professional vision.
