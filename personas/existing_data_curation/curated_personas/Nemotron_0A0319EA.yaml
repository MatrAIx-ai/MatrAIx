  hobbies: '[''Home recipe experimentation'', ''Visiting farmers markets'', ''Jazz and blues listening'', ''Playing chess'', ''Volunteering for community cooking classes'', ''Walking/jogging in White River
    State Park'', ''Urban gardening'', ''Woodworking kitchen tools'', ''Attending regional food festivals'', ''Reading culinary literature'']'
  career_goals: Riley aims to ascend to a chef‑de‑cuisine position at a prominent Indianapolis restaurant where he can showcase his innovative yet grounded take on soul food. He aspires to win the Indianapolis
    Culinary Challenge within the next two years, leveraging his competitive spirit. In the medium term, he envisions opening a modest farm‑to‑table eatery that blends Southern heritage with Midwestern
    ingredients, emphasizing sustainability and community engagement. He also hopes to author a cookbook that documents modern soul‑food recipes and to mentor aspiring Black chefs through workshops at the
    local community college.
