  hobbies: '["Oil painting", "Classical piano", "Reading historical biographies", "Hiking and nature walks", "Gardening", "Woodworking", "Cooking and exploring new cuisines", "Traveling", "Photography",
    "Community theater involvement", "Volunteer art‑therapy programs"]'
  career_goals: At this stage, Garrett aims to transition into a medical director role for his community health network, where he can shape strategic initiatives around preventive health and integrated
    care. He plans to develop a regional telemedicine platform that expands access for rural patients, incorporate AI‑driven decision support tools, and lead a mentorship program that guides at least twenty
    resident physicians annually. Additionally, he aspires to author a book on patient‑centered care and contribute to local art‑therapy projects that blend his medical expertise with his love for the arts.
