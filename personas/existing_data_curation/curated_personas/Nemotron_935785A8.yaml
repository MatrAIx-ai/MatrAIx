personas:
  professional: Garrett Rudasill, a board‑certified physician and seasoned clinical leader, blends his expertise in preventive care with his artistic curiosity to mentor residents, drive telemedicine integration,
    and champion quality‑improvement initiatives aimed at holistic community health.
  sports: Garrett Rudasill, an avid hiker who tackles the rolling Hoosier hills with the Indiana Trail Runners club during spring, also follows the Indianapolis Colts, the Chicago Bulls, and the Milwaukee
    Brewers, and spends Saturday mornings playing pick‑up basketball at the local YMCA.
  arts: Garrett Rudasill, who paints oil‑based Midwestern vistas inspired by Grant Wood and Thomas Hart Benton, unwinds at the piano with Beethoven’s Moonlight Sonata and Rachmaninoff’s Prelude in G minor,
    and volunteers in community theater productions of Shakespeare’s *Twelfth Night* while drawing inspiration from actress Meryl Streep’s performances.
  travel: Garrett Rudasill, a meticulous planner who crafts itineraries on a spreadsheet, has photographed the Louvre’s glass pyramid in Paris, trekked the gardens of Kyoto’s Kinkaku‑ji, and hopes to explore
    the art museums of Santa Fe while balancing limited vacation time with family commitments.
  culinary: Garrett Rudasill, who enjoys cooking a wide array of dishes—from a smoky Indiana corn succotash with fresh heirloom tomatoes to Thai green curry featuring kaffir lime leaves, lemongrass, and
    coconut milk—and often experiments with aged balsamic vinegar and locally sourced rosemary, balances his culinary pursuits with a modest habit of snacking on pretzel‑crusted cheese during late‑night
    chart reviews.
  core: Garrett Rudasill, a 56‑year‑old physician‑artist, fuses clinical precision with creative spontaneity, juggling mentorship, painting, and a relentless quest for balanced living—though he sometimes
    neglects his own physiotherapy in favor of late‑night oil‑painting sessions.
background:
  cultural: Garrett was raised in a tight‑knit family of Czech descent in the Anderson area of Indiana, where his grandparents immigrated in the mid‑20th century. The family emphasized community service,
    modesty, and a strong work ethic, values that are hallmarks of Midwestern culture. Regular participation in local cultural festivals, church activities, and community volunteerism shaped his sense of
    responsibility and appreciation for the arts. This blend of Czech heritage and Midwestern upbringing informs his collaborative approach, his commitment to harmonious relationships, and his curiosity
    about new ideas and artistic expression.
attributes:
