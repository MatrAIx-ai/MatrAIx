personas:
  professional: Myeasha Banks, a retired community organizer and neighborhood garden advocate, blends meticulous budgeting with spontaneous drive‑by workshops, applying their practical mindset and competitive
    spirit to mentor seniors and preserve local stories.
  sports: Myeasha Banks enjoys weekly walks with the Pontiac Senior Center’s walking club, follows the Detroit Lions and Tigers with loyal enthusiasm, and competes in a local senior bowling league, combining
    structured activity with the occasional spontaneous road trip to a nearby baseball stadium.
  arts: Myeasha Banks finds artistic fulfillment in singing gospel classics by Mahalia Jackson and Aretha Franklin with her church choir, devouring documentary films such as 'Eyes on the Prize', and quoting
    Langston Hughes during storytelling evenings, allowing their critical eye and competitive streak to shape a discerning appreciation of cultural narratives.
  travel: Myeasha Banks favors spontaneous day‑trips to Michigan’s shoreline towns like Saugatuck, historic Mackinac Island, and the tranquil shores of Lake Huron, while dreaming of a future pilgrimage
    to New Orleans’ French Quarter, balancing careful budget planning with an impulsive love of the open road.
  culinary: Myeasha Banks cooks soul‑food staples such as collard greens, black‑eyed peas, and cornbread, seasoning them with fresh rosemary and thyme from their garden while substituting smoked turkey
    for pork and using low‑sodium broth to honor both family tradition and health‑conscious cooking.
  core: Myeasha Banks is a pragmatic yet spontaneous community stalwart whose competitive edge fuels garden projects, bridge battles, and a lifelong love of gospel, while they balance disciplined budgeting
    with occasional herb indulgences.
background:
  cultural: Born in the late 1940s on Detroit's east side, Myeasha grew up during the height of the civil-rights movement, witnessing both struggle and progress in the African-American community. Her family's
    traditions blend Southern culinary heritage with Midwestern resilience, reflected in the soul-food recipes she preserves. The church has been a central pillar, offering spiritual guidance, community
    activism, and a space for musical expression. Over the decades, Myeasha has participated in local Juneteenth celebrations, historically Black community fairs, and neighborhood mutual-aid networks. Her
    cultural experience is shaped by being a Black woman navigating socioeconomic changes in Pontiac, fostering a deep sense of communal responsibility, pride, and a nuanced perspective on heritage.
