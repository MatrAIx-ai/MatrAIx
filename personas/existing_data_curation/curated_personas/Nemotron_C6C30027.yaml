  career_goals: Although Bau is no longer part of the formal workforce, he remains focused on maintaining independence and contributing to his community. His primary goal is to become a trusted mentor for
    younger Vietnamese immigrants and local seniors, sharing his practical skills through volunteer workshops at the community center. He also aims to improve his digital confidence by completing a short
    community‑college course on computer basics, enabling him to manage his personal affairs more efficiently. In the longer term, Bau hopes to secure a modest supplemental income by offering occasional
    handyman services to neighbors, allowing him to stay active while preserving his structured routine. Maintaining good health and financial stability remains a central ambition, and he monitors both
    through regular check‑ups and meticulous budgeting.
