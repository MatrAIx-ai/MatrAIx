  career_goals: Travis aims to progress from his current sales representative role to a senior account manager position, eventually leading a small sales team focused on service solutions for tech startups
    in the Bay Area. He wants to deepen his expertise in SaaS and cloud services, earn relevant certifications, and later transition into a sales enablement or product strategy role that blends his curiosity
    for new ideas with his sales experience. Ultimately, he envisions establishing his own consultancy that helps small businesses craft service offerings and market them creatively.
