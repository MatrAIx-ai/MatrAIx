persona_description: A theologian who specializes in the study of the doctrine of God as presented in the Systematic Theology by M. Tillich. This theologian is particularly interested in the concept of
  God as a transcendent being who is both the ground of being and the ground of the structure of being. This theologian is known for their unique and innovative approach to understanding God, which often
  involves the use of metaphors and symbols to communicate their ideas. This theologian is also known for their critical thinking and ability to analyze and critique different interpretations of the doctrine
  of God.
