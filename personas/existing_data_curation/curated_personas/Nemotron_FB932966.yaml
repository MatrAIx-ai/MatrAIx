personas:
  professional: Tianna Blumer, a seasoned wholesale and retail buyer, blends a meticulous, data‑driven approach to vendor negotiation, inventory control, and market trend analysis with a pragmatic flexibility
    that helps them manage high emotional reactivity while maintaining structured catalogs and adaptable purchasing plans.
  sports: Tianna Blumer enjoys hiking the Appalachian trails with the local Appalachian Trail Hiking Club and follows the West Virginia Mountaineers football team and the Pittsburgh Steelers, using these
    seasonal outlets to stay active while preferring low‑impact outdoor exercise over organized team sports, which they schedule whenever their mood feels steady.
  arts: Tianna Blumer regularly attends Appalachian‑inspired live‑music venues, where they revel in performances by Old Crow Medicine Show and folk guitarist Molly Tuttle, support local artisans at craft
    fairs, and find occasional escapism in mystery series starring Gillian Anderson.
  travel: Tianna Blumer prefers spontaneous weekend road trips to natural retreats like the Great Smoky Mountains and Shenandoah Valley, while dreaming of a month‑long trek along New Zealand’s Milford Track,
    balancing an appetite for unstructured adventure with careful budgeting and occasional family constraints, which they navigate with a mix of curiosity and caution.
  culinary: Tianna Blumer’s culinary repertoire ranges from West Virginia comfort staples such as pepperoni rolls, cornbread, and braised pork shoulder to experimental dishes like ginger‑infused salmon
    and homemade rosemary focaccia, reflecting their confident home‑cooking skills and love for blending traditional flavors with new ingredients like sweet potatoes and local apples.
  core: Tianna Blumer is a detail‑oriented buyer with a restless heart, whose structured procurement expertise coexists with an anxiety‑driven need for outdoor escape, meditation, and a future boutique
    that champions Appalachian crafts, which they envision as a low‑stress haven.
background:
  cultural: Tianna comes from a white, Appalachian‑influenced background typical of many families in Kanawha County. She was raised with strong community and family ties, an appreciation for regional traditions
    such as church gatherings, local festivals, and home‑cooked meals featuring Appalachian cuisine. While she values the practical, self‑reliant spirit of the area, she also embraces the evolving cultural
    landscape of Charleston, incorporating modern hobbies and professional development into her life.
attributes:
  skills: '[''Vendor Negotiation'', ''Inventory Management'', ''Market Trend Analysis'', ''Purchase Order Processing'', ''Budget Forecasting'', ''Data‑Driven Product Selection'', ''Supply Chain Coordination'',
    ''Customer Relationship Management'', ''Merchandising'', ''Quality Assessment'']'
  hobbies: '[''Hiking in the Appalachian foothills'', ''Gardening'', ''Cooking Appalachian comfort food'', ''Yoga and meditation'', ''Journaling'', ''Reading mystery novels'', ''Knitting'', ''Attending
    local live‑music events and craft fairs'']'
  career_goals: Tianna aims to advance from her current buyer role to a senior purchasing manager position within the next five years, overseeing a larger portfolio of product categories and mentoring junior
    staff. She plans to supplement her high‑school education with a professional certification in procurement (e.g., Certified Professional Purchaser) and occasional business courses at a local community
    college. Long‑term, she envisions opening a boutique shop that showcases locally sourced Appalachian crafts and foods, allowing her to combine her buying expertise with her passion for regional culture
    while providing a more stable, low‑stress environment for her family.
