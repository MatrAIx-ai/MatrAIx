persona_description: A person who is aware of the risks of tick bites and seeks to avoid them by taking preventive measures. This person is likely to be outdoors frequently, particularly during the summer
  months, and is concerned about the spread of diseases caused by ticks. They are likely to be knowledgeable about the symptoms and complications of Lyme disease and other tick-borne illnesses, and are
  aware of the importance of early diagnosis and treatment. They are also likely to be aware of the risks associated with insect repellents and the importance of removing ticks promptly.
