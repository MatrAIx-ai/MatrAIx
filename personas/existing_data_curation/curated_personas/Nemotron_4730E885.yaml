personas:
  professional: Rebecca Graham, a production floor specialist at a Tampa‑area manufacturing plant, combines hands‑on mechanical troubleshooting, basic PLC programming, and lean data analysis with a relaxed,
    team‑oriented demeanor that makes them a natural mentor and conflict‑mediator, and they are actively pursuing a Six Sigma Green Belt to transition into a shift supervisor role.
  sports: Rebecca Graham, a regular at the local beach‑volleyball league and a member of the Hillsborough Kayak Club, squeezes in early‑morning runs while cheering on the Tampa Bay Rays and the Tampa Bay
    Lightning, and they treat fitness as a social playground rather than a strict regimen.
  arts: Rebecca Graham, a karaoke‑enthusiast who thrives on salsa nights, regularly dances to the rhythms of Celia Cruz and the swing melodies of Benny Goodman, enjoys the pop energy of Bruno Mars, and
    finds inspiration in improv sketches from The Second City, and they weave these influences into a vibrant social persona.
  travel: Rebecca Graham, who favors spontaneous road trips over rigid itineraries, often spends weekends exploring the Florida Keys and the Everglades, dreams of a salsa‑filled getaway to Barcelona, and
    balances a modest travel budget with occasional eco‑adventure trips to Costa Rica, and they keep an eye on affordable Airbnb options.
  culinary: Rebecca Graham, an eager home‑cook who can whip up a hearty shrimp‑and‑grits bowl and experiment with mango‑chili salsa, loves Tampa’s eclectic food‑truck scene featuring Korean‑BBQ rice bowls
    and fish tacos, often splurges on avocado toast at local cafés while they occasionally forget to rinse the dishes after late‑night karaoke sessions.
  core: Rebecca Graham blends a restless curiosity for tech tinkering with a laid‑back, sociable vibe, juggling late‑night karaoke marathons, spontaneous beach‑volleyball games, and a habit of misplacing
    their planner, and they dream of leading a sustainable manufacturing floor.
background:
  cultural: Rebecca grew up in suburban Riverview, Florida, in a middle‑class family of mixed Irish and German ancestry. Her upbringing blended Southern hospitality with the laid‑back coastal lifestyle
    of the Tampa Bay area. She celebrates traditional American holidays, enjoys attending Tampa Bay Rays games, and participates in local beach festivals. The multicultural environment of Hillsborough County
    has given her a comfort with diverse perspectives, and she often picks up basic Spanish phrases from community interactions. Her values emphasize community, teamwork, and a balance between practicality
    and curiosity.
