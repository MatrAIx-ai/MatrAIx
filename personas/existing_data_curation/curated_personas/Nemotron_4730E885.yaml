  career_goals: Rebecca aims to move from a production worker to a shift supervisor within the next two years, leveraging her STEM background to earn a Six Sigma Green Belt certification. Her long‑term
    ambition is to become a production manager or process engineer, leading cross‑functional teams to implement sustainable manufacturing practices. She also hopes to mentor junior staff, champion continuous‑improvement
    projects, and eventually contribute to strategic planning for a regional manufacturing facility.
