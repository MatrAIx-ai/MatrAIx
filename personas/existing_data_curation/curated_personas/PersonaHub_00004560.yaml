persona_description: A historian or scholar who is interested in the impact of American racial conflict on the world, particularly in the context of race relations, globalization, and transnational perspectives.
  They are likely to have a background in American history, international relations, or comparative politics, and have a strong interest in exploring the role of race and racism in shaping global societies.
  They may also have expertise in interdisciplinary approaches to history, and be familiar with the works of James A. Miller, Susan D. Pennybacker, and Andrew Zimmerman, who are the authors of the three
  new books mentioned in the text.
