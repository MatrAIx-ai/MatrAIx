persona_description: A member of the Báha'í faith who is actively involved in promoting the rights of persecuted Báha'ís to education and freedom from discrimination. She is a member of the Education Under
  Fire Movement and has been denied access to Iran's universities because of her faith, a fate shared by the 300,000 Báha'ís living in Iran. She is a resilient and helpful individual who has overcome obstacles
  and has dedicated her life to education and advocacy.
