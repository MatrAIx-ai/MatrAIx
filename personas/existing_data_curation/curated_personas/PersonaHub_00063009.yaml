persona_description: A architect who specializes in the design of concert halls and conference centers, particularly those with modular, space-filling facades inspired by the quasi brick. They have a unique
  understanding of the principles behind the quasi brick, including its ability to create a chaotic, unpredictable quality through the use of regularity and irregularity in the modules. They have collaborated
  with Olafur Eliasson and Henning Larsen Architects on the design of Harpa Reykjavik Concert Hall and Conference Centre, bringing their expertise in modular architecture to the project.
