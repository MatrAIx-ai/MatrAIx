  hobbies: '[''Woodworking'', ''Running'', ''Reading historical nonfiction'', ''Jazz and hip‑hop music'', ''Cooking Southern and Caribbean dishes'', ''Basketball (NY Knicks fan)'', ''Golf'', ''Volunteer
    tax‑assistance'', ''Crossword puzzles'', ''Traveling to heritage sites'']'
  career_goals: Timothy aims to advance to a senior leadership role within the Nassau County Department of Taxation, such as Deputy Director of Revenue Services, where he can shape policy and modernize
    collection systems using analytics. He plans to earn a Certified Public Accountant (CPA) credential and a Master’s in Public Administration to broaden his strategic perspective. His long‑term ambition
    is to champion equitable tax policies that reduce disparities in his community, while mentoring the next generation of Black tax professionals and eventually serving on a municipal board or advisory
    council to influence broader fiscal decisions.
