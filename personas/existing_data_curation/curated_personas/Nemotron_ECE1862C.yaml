personas:
  professional: Rebecca Lee is an aspiring young game developer and theater enthusiast who blends their curious love of coding on Scratch with practical project planning, often directing school scenes while
    keeping detailed schedules and ensuring teammates stay on track, and they thrive on the applause that follows each successful performance.
  sports: Rebecca Lee is a lively member of the Turlock United Soccer Club’s U12 team, cheers for the San Francisco 49ers on game days, and spends weekends birdwatching in the nearby San Joaquin River wetlands
    while helping maintain the family garden, and they often feel a surge of excitement when scoring a goal.
  arts: Rebecca Lee is a prolific illustrator who creates elaborate fantasy scenes inspired by John Howe and Hayao Miyazaki, enjoys performing and directing in school theater, and constantly listens to
    the soundtracks of Studio Ghibli films and songs by Taylor Swift for creative inspiration, and they love sharing their artwork with friends during lunch.
  travel: Rebecca Lee loves road‑tripping from Turlock to the Monterey Bay Aquarium and Yosemite National Park, dreams of exploring Kyoto’s Arashiyama bamboo forest and the castles of Scotland, and they
    usually plan trips with a detailed notebook that balances family budget constraints with a craving for adventure.
  culinary: Rebecca Lee prefers homemade pizza topped with garden‑grown basil, chicken teriyaki bowls flavored with ginger and soy, and always finishes meals with a strawberry‑banana smoothie, yet they
    often forget to wash their hands before cooking, a habit their parents gently remind them about.
  core: Rebecca Lee is an endlessly curious 11‑year‑old who mixes theatrical flair, meticulous LEGO building, and a love for coding, yet they wrestle with worry‑induced perfectionism and occasional forgetfulness.
background:
  cultural: Rebecca lives in Turlock, a small city in California’s agriculturally rich Stanislaus County. Her family has deep roots in the Central Valley, with generations who have worked on farms and participated
    in community events like the Turlock Harvest Festival. Growing up in a predominantly white, middle‑class neighborhood, she celebrates typical American holidays and enjoys the close‑knit school community.
    The multicultural atmosphere of the county, including many Spanish‑speaking neighbors and a vibrant farm‑workers culture, has exposed her to diverse perspectives and languages. These experiences foster
    her appreciation for community cooperation, respect for the land, and a curiosity about the natural world that informs her hobbies and future aspirations.
