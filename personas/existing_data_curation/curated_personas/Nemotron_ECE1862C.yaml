  hobbies: '[''reading fantasy novels'', ''drawing and illustration'', ''LEGO building'', ''coding with Scratch'', ''school theater'', ''soccer'', ''birdwatching'', ''gardening'', ''visiting county fairs'',
    ''volunteering at animal shelter'']'
  career_goals: Rebecca dreams of a future where she can combine her love for animals, science, and communication. She imagines becoming a veterinarian who also educates children about animal care, or a
    scientist who works on environmental conservation projects in the Central Valley. Inspired by her talkative nature, she also envisions hosting a youth science show or starting a school podcast to share
    stories and ideas. In the longer term, she hopes to be a community leader who creates programs that help peers manage stress and develop confidence.
