personas:
  professional: Sarah Chestang, a newborn nurtured in a close‑knit community that values routine and hospitality, already shows a practical mindset that foreshadows a future as a church office manager,
    where their organizational talent, gentle assertiveness, and ability to balance communal duties with personal space will thrive.
  sports: Sarah Chestang, though only a newborn, is already swaddled in a miniature Kannapolis Cannon Ballers jersey and joins family weekend rituals of cheering the Carolina Panthers in the fall and attending
    local high‑school football games, planting the seeds of a lifelong love for community sports.
  arts: Sarah Chestang, a newborn cradled to the soothing hymns of a local gospel choir and the classic Southern sounds of Dolly Parton and Alabama Shakes, finds early comfort in melodic storytelling, quietly
    shaping an appreciation for music that may later inspire piano lessons.
  travel: Sarah Chestang, still an infant, has already experienced family road trips to Asheville’s Blue Ridge Mountains and a weekend getaway to Charleston’s historic district, sparking a future desire
    to explore coastal towns and national parks while preferring short, familiar stays over long, unplanned itineraries.
  culinary: Sarah Chestang, a newborn whose early senses are shaped by the aroma of buttery biscuits, fried chicken, and simmering collard greens served at family Sunday dinners, will grow to adore Southern
    comfort cuisine, often insisting on sweet tea and homemade peach cobbler while learning to prepare simple dishes with modest skill.
  core: Sarah Chestang, a newborn raised in a small‑knit town where routine, church gatherings, and Southern comfort foods dominate, already exhibits a tendency to worry excessively, cling to familiar patterns,
    and quietly assert personal boundaries even in early play.
background:
  cultural: Sarah comes from a white Southern background rooted in the small‑city community of Kannapolis, North Carolina. The town’s legacy as a former textile hub and its close‑knit, church‑centered culture
    have shaped her upbringing. Family gatherings, Sunday worship, and community events are central to her life, emphasizing hospitality, modesty, and self‑reliance. The region’s Southern accents, love
    for comfort food, and traditions of home‑grown crafts have fostered her appreciation for routine, practicality, and interpersonal support.
