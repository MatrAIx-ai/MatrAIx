personas:
  professional: John Hunter, a 61‑year‑old network administrator with four decades of experience in Windows Server, Cisco routing, and legacy Unix, leverages his methodical troubleshooting and relaxed,
    routine‑driven style to keep mission‑critical systems humming while mentoring junior staff with plain‑spoken explanations and a knack for turning ad‑hoc tasks into repeatable processes.
  sports: John Hunter, an avid cyclist with the Cascade Cycling Club and a regular participant in Columbia River Gorge hikes, roots for the Portland Timbers and the Trail Blazers, preferring low‑key weekend
    rides over rigorous training regimens, yet occasionally joins a local pickleball league for social competition.
  arts: John Hunter, a frequent patron of McMenamins venues, enjoys live performances by The Decemberists and Sufjan Stevens, collects vintage synthesizer modules, and swoons over the film noir classics
    of Humphrey Bogart, often quoting lines during board‑game nights, reflecting their love for nostalgic yet vibrant cultural experiences.
  travel: John Hunter, who favors spontaneous road trips over meticulously planned itineraries, delights in weekend getaways to the Oregon Coast, annual pilgrimages to Munich’s Oktoberfest to sample regional
    brews, and occasional tech‑conference visits to Seattle, all balanced around a modest travel budget that leaves room for monthly homebrew ingredient orders.
  culinary: John Hunter, a homebrewer turned weekend chef, expertly pairs his seasonal pale ales with cedar‑plank salmon, roasted root vegetables, and locally sourced kale‑and‑quinoa salads, while experimenting
    with heirloom tomatoes and Cascade hops in a modest kitchen that often doubles as a tasting lab for friends.
  core: John Hunter blends a love for routine‑driven tech mastery with a sociable, competitive streak, channeling their 61‑year‑old curiosity into cycling, brewing, vintage electronics, and community mentorship,
    all while occasionally forgetting to file taxes on time.
background:
  cultural: John grew up in a small Midwestern town in the 1950s, raised in a traditional, middle-class family that emphasized hard work, practicality, and community involvement. His parents valued reliability
    and routine, traits that have stayed with him throughout his life. After earning a bachelor’s degree in computer engineering, he moved to the Pacific Northwest in the early 1980s, attracted by the region’s
    emerging tech scene and natural beauty. Over the decades, he has blended his Midwestern work ethic with Portland’s progressive, collaborative culture, becoming an active participant in local civic groups
    and neighborhood events. While he identifies as white and embraces his cultural heritage, he also respects the diversity of his community and seeks to forge inclusive connections through his professional
    and personal activities.
attributes:
