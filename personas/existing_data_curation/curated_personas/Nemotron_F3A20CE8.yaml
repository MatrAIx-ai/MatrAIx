  career_goals: Approaching retirement, John aims to leverage his extensive hands-on experience by transitioning into a consulting role focused on legacy system migration and process standardization for
    local non-profits and small businesses. He hopes to establish a mentorship program within the Portland tech community, guiding younger engineers in practical problem-solving and professional etiquette.
    Additionally, he aspires to become a regular speaker at regional meet-ups, sharing stories of real-world troubleshooting and the value of routine in technology management. While he enjoys the idea of
    scaling back full-time work, he intends to stay engaged enough to keep his network active and continue contributing to his field.
