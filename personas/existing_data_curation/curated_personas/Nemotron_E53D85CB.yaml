  hobbies: '[''Fishing'', ''Kayaking'', ''Reading non-fiction (self‑improvement, history)'', ''DIY home improvement projects'', ''Volunteering at local senior center'', ''Attending community theater'',
    ''Gardening'', ''Local history research'', ''Exploring new tech gadgets'']'
  career_goals: Enos aims to advance to a supervisory or team‑lead position within the next three years, leveraging his reliable performance and curiosity for workflow optimization. He wants to design and
    deliver training programs for new hires, champion the adoption of newer customer‑service technologies, and eventually move into a quality‑assurance or operations‑coordination role. To support these
    ambitions, he plans to earn a Customer Success Management certification and possibly pursue an associate degree in business administration, all while maintaining a stable work‑life balance for his family.
