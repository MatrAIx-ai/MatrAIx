persona_description: A neurologist who specializes in the study of the brain and its functions, particularly in the areas of motor control and neurodevelopment. The individual has conducted research on
  the differences in brain activity and connectivity between children with autism and typically developing children, and has proposed that the cerebellum is compromised in individuals with autism, even
  when they perform a relatively simple motor task. The neurologist is interested in how imaging the brain during the performance of motor tasks may offer a way to diagnose autism earlier and may also help
  researchers find associations between autism and specific genes, as well as how deficits in social and communicative skills arise. The neurologist plans to continue the research, looking at activation
  and connectivity while children are learning.
