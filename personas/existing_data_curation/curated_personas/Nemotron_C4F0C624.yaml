  hobbies: '[''Intramural Basketball'', ''Cooking & Hosting Potlucks'', ''Listening to Afrobeats/R&B/Hip‑hop'', ''Attending Dance Workshops'', ''Youth Mentorship at Church'', ''Biking on Cherokee Park Trails'',
    ''Board‑Game Nights'']'
  career_goals: Mamadou’s primary career goal is to secure a stable, full‑time position that combines his love for routine work with his talent for interacting with people. He is aiming to become a community
    outreach coordinator at a local nonprofit or a logistics assistant in a warehouse, where he can apply his practical skills, dependable work ethic, and collaborative nature. Over the next few years he
    plans to earn a certification in automotive repair to broaden his employability and eventually launch a small mobile car‑service business that offers routine maintenance for neighborhood residents.
    Parallel to this, he hopes to start a weekend food‑truck venture featuring his signature Ghanaian dishes, allowing him to blend his culinary passion with an entrepreneurial venture. Throughout, he wants
    to achieve financial stability, contribute positively to the Louisville community, and build a professional reputation grounded in reliability and service.
