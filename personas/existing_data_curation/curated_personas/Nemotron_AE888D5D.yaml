personas:
  professional: Armand Kellom, a 42‑year‑old art historian and interdisciplinary educator, balances deep expertise in art history with a curiosity‑driven, collaborative teaching style; they design interdisciplinary
    curricula that integrate technology, meet grant deadlines, and nurture community partnerships.
  sports: Armand Kellom, a 42‑year‑old outdoor enthusiast, hikes the coastal trails of Rhode Island most weekends, plays in a local amateur tennis league, and supports the New England Patriots, Boston Red
    Sox, and Boston Celtics, while they occasionally join a community yoga class to balance their sedentary lecturing hours.
  arts: Armand Kellom, a 42‑year‑old watercolorist and pianist, finds inspiration in the coastal palettes of Winslow Homer and the lyrical improvisations of Bill Evans, regularly attends performances by
    the Providence Chamber Music Society, and they curate personal studio sessions that blend classical piano repertoire with spontaneous jazz explorations.
  travel: Armand Kellom, a 42‑year‑old cultural traveler, designs trips around international art festivals, having recently visited the Venice Biennale, the Gwangju Biennale in South Korea, and the Marrakech
    Biennale, while they prefer meticulously planned itineraries that balance gallery tours with culinary workshops and occasional spontaneous hikes in remote locales.
  culinary: Armand Kellom, a 42‑year‑old home chef, experiments with farm‑to‑table cooking, often preparing heirloom tomato ratatouille, miso‑glazed eggplant, and fresh seafood paella using ingredients
    from their organic garden and the local fish market, while they occasionally over‑season dishes with too much rosemary in their quest for bold flavor.
  core: Armand Kellom, a 42‑year‑old scholar‑artist, navigates life with a blend of disciplined curiosity, spontaneous brushstrokes, and a habit of collecting too many art exhibition catalogs that crowd
    their bookshelf; they often find themselves juggling grant proposals while squeezing in a quick piano improvisation.
background:
  cultural: Armand identifies as a white American with deep New England roots; his family lineage traces back to early settlers of Massachusetts, with later Irish and Italian ancestry. Raised in a small
    coastal town in Rhode Island, he was steeped in the region's maritime heritage, community-oriented values, and an emphasis on education. The local folk art traditions and the legacy of New England's
    Puritan work ethic have shaped his appreciation for both historical and contemporary artistic expressions, fostering a collaborative and inclusive worldview.
