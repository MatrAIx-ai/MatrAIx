  career_goals: Jose aims to earn his CPA certification within the next two years and progress to a senior audit manager role at a reputable firm, where he can lead audit teams and shape compliance strategies.
    Long-term, he envisions launching his own boutique accounting practice focused on serving small businesses and cultural nonprofits in Queens, while mentoring younger accountants and offering financial-literacy
    workshops for the Ecuadorian community.
