persona_description: A radiation protection engineer who specializes in assessing and mitigating the effects of non-uniform neutron radiation fields on glove box radiation workers. The engineer is responsible
  for understanding the complex radiation dose estimation process and developing effective strategies to minimize the risks associated with occupational exposure to neutron radiation. They must consider
  various factors such as the type and location of the source material, the position of the dosimeter, and the geometry of the radiation field to accurately estimate the radiation dose received by the worker.
  They must also be able to apply computational and experimental results to make informed decisions and recommendations for improving the safety and efficiency of glove box radiation environments.
