  hobbies: '[''Gardening'', ''Knitting and quilting'', ''Reading historical fiction and biographies'', ''Listening to country and gospel music'', ''Attending church services'', ''Playing bridge and other
    card games'', ''Genealogy research'', ''Journaling and prayer'']'
  career_goals: Although retired, Bridget's ambition is to remain a pillar of support in her community while preserving her own health and emotional well-being. She hopes to expand her volunteer work by
    becoming a certified hospice companion, to mentor younger volunteers at the senior center, and to complete a family history scrapbook that she can share with her descendants. Bridget also aims to maintain
    her independence, stay physically active through gardening and daily walks, and continue learning simple digital tools so she can video-chat with family without anxiety.
