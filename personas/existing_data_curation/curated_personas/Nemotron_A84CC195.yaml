  career_goals: Kung plans to enroll in a community‑college program in engineering technology, concentrating on electrical or mechanical systems, and to obtain industry‑recognized certifications such as
    CompTIA A+ and Cisco CCNA. His short‑term goal is to secure an entry‑level technical support or field‑service apprenticeship that offers structured training and clear advancement pathways. Long‑term,
    he aspires to become a certified field service engineer or IT infrastructure specialist, eventually completing a bachelor’s degree in computer engineering while maintaining a stable, predictable career
    that supports his family and personal growth.
