  hobbies: '["Cooking traditional Salvadoran dishes", "Woodworking projects", "DIY electronics building", "Playing chess", "Watching and playing soccer", "Listening to classic rock and Latin music", "Mindfulness
    meditation", "Attending Salvadoran cultural festivals"]'
  career_goals: Approaching retirement, Dario aims to transition from full-time corporate engineering to running a boutique consultancy that helps emerging startups bring reliable hardware to market, especially
    in renewable-energy applications. He hopes to file a patent on an innovative grid-connected inverter topology he has been refining, and to publish a technical paper on low-cost power-management solutions.
    At the same time he wants to create a more predictable and low-stress work environment that allows him to balance his professional competitiveness with his need for emotional stability.
