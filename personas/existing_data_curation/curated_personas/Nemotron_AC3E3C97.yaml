personas:
  professional: Dario Bernabe, a seasoned electrical and electronics engineer, blends decades of analog and digital circuit design expertise with a bilingual fluency that bridges corporate clients and emerging
    startups, crafting cost‑effective renewable‑energy hardware while mentoring junior engineers, yet they often favor flexible deadlines over rigid schedules, and their competitive drive fuels the ambition
    to launch a boutique consultancy and secure a patent on an innovative grid‑connected inverter topology.
  sports: Dario Bernabe enjoys playing soccer in the local community league affiliated with the South LA Athletic Club, cheerfully watches LA Galaxy matches on weekends, and sharpens strategic thinking
    through regular chess tournaments at the neighborhood community center, balancing competitive enthusiasm with a laid‑back approach to fitness.
  arts: Dario Bernabe immerses themselves in music ranging from classic rock icons like The Rolling Stones and Led Zeppelin to Latin legends such as Celia Cruz, attends folk‑dance gatherings celebrating
    traditional rhythms, and channels creative energy into woodworking projects that echo the craftsmanship of artisans they admire like Gustav Stickley.
  travel: Dario Bernabe prefers purposeful travel that combines family reunions in San Salvador with leisurely road trips along California's Pacific Coast, dreams of exploring Patagonia’s glaciers and Japan’s
    historic temples, and often plans trips on a modest budget, prioritizing cultural immersion over luxury accommodations.
  culinary: Dario Bernabe delights in hand‑crafting pupusas and tamales using masa dough, fresh quesillo, and a hint of achiote, while also mastering a robust barbecued rib recipe and experimenting with
    Mexican street‑taco toppings, reflecting an intermediate cooking skill that blends traditional family flavors with occasional gourmet experimentation.
  core: Dario Bernabe balances meticulous engineering precision with a relaxed, sometimes chaotic lifestyle, leveraging bilingual fluency and cultural traditions to stay grounded while navigating anxiety‑driven
    emotional spikes and a competitive drive that fuels both professional ambition and personal hobbies.
background:
  cultural: Dario is a first-generation Salvadoran American who grew up in Los Angeles’ historic Pico‑Union neighborhood, a hub for the city’s Salvadoran diaspora. He was raised speaking Spanish at home
    and learned English in school, giving him a bilingual fluency that he often uses to bridge cultural gaps at work. Deeply rooted in Catholic traditions, he celebrates holidays such as Semana Santa and
    La Navidad with family gatherings, and he remains closely connected to relatives in El Salvador through regular visits and video calls. He is an active participant in local Salvadoran cultural events—festivals,
    folk‑dance groups, and community soccer leagues—that help preserve his heritage while enriching the multicultural tapestry of Los Angeles.
attributes:
  skills: '["Analog and Digital Circuit Design", "Power Electronics", "Embedded Systems Development", "PCB Layout and Fabrication", "Signal Processing", "Fault Diagnosis and Troubleshooting", "Compliance
