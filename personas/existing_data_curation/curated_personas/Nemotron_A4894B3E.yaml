personas:
  professional: Erika Evans is a computer systems analyst in New York who blends rigorous data modeling, Python automation, and Agile project leadership with a designer’s eye, turning complex business processes
    into elegant, user‑centric architectures while mentoring junior staff and quietly over‑preparing for every stakeholder meeting.
  sports: Erika Evans hikes the Hudson Valley trails with the local Greenridge Trek Club, follows the New York Knicks and New York Rangers loyally, and completes weekly weekend runs with the Brooklyn Road
    Runners, balancing cardio with a love for nature that satisfies their need for solitary recharge.
  arts: Erika Evans explores modern art at MoMA and the Guggenheim, sketches observations in a digital notebook, draws inspiration from artists like Olafur Eliasson and Banksy, and regularly streams indie
    films such as "Moonlight" and "Parasite" while quoting dialogue from Tilda Swinton’s performances.
  travel: Erika Evans prefers meticulously planned weekend escapes to upstate New York’s wineries and long‑haul trips to Mediterranean ports like Santorini and Barcelona, balancing a desire for cultural
    immersion with a modest budget that prioritizes boutique hostels over luxury resorts, and they always pack a portable sketchpad for spontaneous drawing sessions.
  culinary: Erika Evans enjoys cooking Mediterranean‑inspired meals—grilled halloumi with fresh basil, mint pesto pasta, and rosemary‑roasted lamb—often sourcing ingredients from the farmer’s market, while
    their intermediate cooking skills shine in their signature tzatziki dip that they serve to friends during cozy rooftop gatherings.
  core: Erika Evans is a detail‑obsessed systems analyst who combats chronic worry with yoga, herb gardening, and a relentless pursuit of artistic and culinary creativity, even if it sometimes leads to
    late‑night spreadsheet tinkering.
background:
  cultural: Erika grew up in a middle‑class, white suburban family in Westchester County with Ukrainian roots on her father's side; the patronymic "Valentynivna" reflects that heritage. Her family celebrated
    Ukrainian holidays such as Vyshyvanka Day and incorporated traditional foods like borscht and varenyky into family gatherings, while also fully embracing American customs and the diverse cultural landscape
    of nearby New York City. This blend of Eastern European tradition and metropolitan American exposure fostered her appreciation for both classic art forms and innovative, unconventional ideas.
attributes:
  skills: '[''Systems Analysis'', ''Business Process Modeling'', ''SQL'', ''Python Scripting'', ''Data Visualization'', ''Agile Project Management'', ''User Requirements Gathering'', ''Risk Assessment'',
