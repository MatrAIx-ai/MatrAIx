  hobbies: '[''Visiting modern art museums'', ''Digital painting and graphic design'', ''Yoga and mindfulness meditation'', ''Rooftop herb gardening'', ''Hiking in the Hudson Valley'', ''Watching indie
    films'', ''Reading contemporary literature'', ''Cooking Mediterranean cuisine'']'
  career_goals: Erika aims to transition into a senior systems architect role where she can lead large‑scale digital transformation initiatives for enterprises in the New York metropolitan area. She aspires
    to mentor junior analysts, champion user‑centric design, and integrate artistic thinking into technology solutions, such as developing intuitive data storytelling platforms. In the longer term, she
    envisions founding a boutique consultancy that helps organizations blend technical excellence with creative problem‑solving, all while advocating for mental‑health aware workplace practices to mitigate
    stress for herself and her teams.
