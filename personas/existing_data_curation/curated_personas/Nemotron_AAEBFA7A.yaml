  hobbies: '[''Visiting art galleries and murals'', ''Photography'', ''Playing acoustic guitar'', ''Reading (art history, science)'', ''Community volunteer clean-ups'', ''Fishing in the Gulf'', ''Cooking
    seafood dishes'', ''Gardening'', ''DIY home improvement projects'', ''Attending local festivals and block parties'']'
  career_goals: Ethan aims to advance from janitorial work to a facilities manager role, overseeing larger facilities such as museums, cultural centers, or corporate campuses. He plans to earn professional
    certifications (e.g., ISSA Certified Cleaning Manager, CICA) and complete his undergraduate degree in Business Management or Environmental Science. Ultimately, he aspires to launch his own cleaning
    enterprise that emphasizes sustainability, high standards, and a sensitivity to artistic environments, positioning his business as a trusted partner for community institutions and events.
