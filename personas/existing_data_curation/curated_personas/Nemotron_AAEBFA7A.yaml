personas:
  professional: Ethan Broussard is a seasoned facilities specialist who leverages meticulous organizational discipline, green cleaning expertise, and a genuine appreciation for art to keep museum and cultural
    venue spaces pristine while fostering collaborative teams.
  sports: Ethan Broussard enjoys early morning beach runs, weekend fishing charters on the Gulf, follows the Tampa Bay Buccaneers and the local Pensacola Blue Wahoos, and participates in community pick-up
    basketball games at the Baptist church gym, balancing a relaxed fitness routine with occasional competitive spirit.
  arts: Ethan Broussard frequents the Pensacola Museum of Art and the downtown mural trail, admires works by local muralist Ryan McClure and classic paintings by Winslow Homer, and often brings his acoustic
    guitar to open-mic nights at the historic Saenger Theatre, weaving his love of visual and musical arts into daily life.
  travel: Ethan Broussard prefers spontaneous road trips along the Gulf Coast, having explored historic New Orleans, the painted streets of Savannah, and the serene beaches of Gulf Shores, while planning
    annual visits to the Smithsonian museums in Washington, D.C., balancing cultural immersion with family-friendly itineraries.
  culinary: Ethan Broussard relishes cooking blackened red snapper with a Cajun rub, whipping up shrimp etouffee using fresh Gulf shrimp and home-grown thyme, and occasionally experiments with a low-sugar
    banana bread, though he admits to overindulging in fried catfish at local fish fries during festivals.
  core: Ethan Broussard is a community-oriented facilities pro who merges meticulous green-cleaning practices with a love for Gulf art, music, and seafood, while battling occasional budget slip-ups and
    a stubborn habit of late-night guitar sessions.
background:
  cultural: Ethan is a white American with deep Gulf Coast roots, tracing part of his ancestry to French Acadian settlers reflected in his Broussard surname. Raised in Pensacola, he embodies a blend of
    Southern hospitality, military community influences from the nearby naval base, and coastal maritime traditions. His upbringing fostered a strong sense of community, respect for local history, and an
    appreciation for the region’s multicultural arts scene. Ethan participates in a local Baptist congregation, enjoys Gulf‑side cuisine, and values the collaborative spirit characteristic of the Pensacola
    community.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (strip, wax, buff)'', ''Restroom sanitation'', ''HVAC filter replacement'', ''Inventory management'', ''Schedule optimization'', ''Team leadership'', ''Customer
