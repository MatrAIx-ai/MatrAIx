  career_goals: Andrew aims to advance into a senior leadership position, such as Director of Strategic Planning for Maui County, where he can shape data‑driven public policies that balance economic growth
    with environmental stewardship. He seeks to build and mentor a high‑performing analytics team, championing a culture of collaboration and continuous learning. Over the next five years, he plans to spearhead
    county‑wide initiatives that improve tourism sustainability, disaster preparedness, and community well‑being. Ultimately, he envisions establishing his own consulting practice focused on helping local
    organizations integrate analytics with compassionate leadership to drive measurable social impact.
