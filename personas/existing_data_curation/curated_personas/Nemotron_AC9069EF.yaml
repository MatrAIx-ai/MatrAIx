personas:
  professional: Andrew Wheeler is a seasoned management analyst who transforms complex datasets into strategic insights using advanced Excel, Power BI, and SQL, while they methodically plan and empathetically
    communicate to foster cross‑functional collaboration and community‑focused projects.
  sports: Andrew Wheeler is a regular member of the Kihei Beach‑Volleyball League, cheers for the Maui Surf soccer team, and spends weekends hiking Haleakalā trails and snorkeling at Molokini Crater, and
    they use these activities to stay fit and bond with friends.
  arts: Andrew Wheeler relaxes by strumming their ukulele at sunset, regularly attends the Maui Cultural Festival where they enjoy performances by local artists like Jack Johnson and Lei Moe, and they keep
    a collection of Hawaiian‑inspired art that inspires their community work.
  travel: Andrew Wheeler meticulously plans their travel, alternating between weekend getaways to Hana and the upcountry farms of Maui and longer vacations to Kyoto’s temples and New Zealand’s South Island,
    and they balance adventure with moments of quiet reflection on the beach.
  culinary: Andrew Wheeler enjoys cooking Hawaiian‑inspired dishes such as poke bowls with ahi tuna, kalua pork, and lomi salmon, skillfully blending fresh pineapple, macadamia nuts, and sea salt, while
    they experiment with new spice rubs for their weekend barbecues.
  core: Andrew Wheeler blends analytical precision with island‑rooted compassion, turning data into community impact while they juggle a love for the sea, a habit of over‑scheduling, and occasional coffee
    splurges.
background:
  cultural: Andrew is a White American who grew up on the mainland United States before relocating to Maui fifteen years ago for his career. While his heritage reflects mainstream American traditions, his
    decades of residence on the island have deeply immersed him in the local Aloha spirit. He embraces Hawaiian customs such as wearing aloha shirts, participating in community celebrations like Lei Day,
    and learning basic Hawaiian phrases. Andrew respects the concept of ‘ohana’ (family) and integrates the value of collective harmony into both his professional collaborations and personal relationships.
    He actively engages with the multicultural fabric of Wailuku, forging bonds across diverse ethnic groups while maintaining his own cultural identity.
