personas:
  professional: Ronald Lau is a seasoned construction professional with three decades of hands‑on experience in framing, concrete work, and heavy‑equipment operation, whose blend of curiosity for green
    building methods and practical reliability drives him to mentor apprentices, balance organization with flexibility, and assertively pursue a foreman position within two years.
  sports: Ronald Lau stays active by playing third base for the Granite State Softball League, cheering for the New England Patriots on Sunday nights at O’Leary’s Bar, following the Boston Red Sox in spring,
    and complementing his cardio with weekend hikes in the White Mountains.
  arts: Ronald Lau channels his hands‑on curiosity into woodworking projects inspired by Frank Lloyd Wright, unwinds listening to Bruce Springsteen and John Prine, and occasionally enjoys live performances
    at the historic Warren Theatre, where he admires regional playwrights and the landscape paintings of Thomas Cole.
  travel: Ronald Lau prefers road‑trip adventures that blend fishing on Lake Winnipesaukee, hiking the Alpine Loop of the White Mountains, and weekend getaways to Acadia National Park in Maine, while he
    dreams of a future Kenai River fishing expedition in Alaska once his contracting business stabilizes.
  culinary: Ronald Lau enjoys classic New England comfort foods, often grilling cedar‑plank salmon with dill and lemon, savoring lobster rolls with butter‑run butter, and perfecting a hearty beef chili
    packed with kidney beans, smoked paprika, and Worcestershire sauce, all cooked in his trusted cast‑iron skillet.
  core: Ronald Lau is a sociable, hands‑on builder whose curiosity, practical reliability, and occasional anxiety fuel community projects, vintage‑truck restoration, and fervent Patriots fandom, even as
    he battles a habit of over‑committing and skimping on sleep.
background:
  cultural: Ronald grew up in a working‑class family in southern New Hampshire, rooted in the region’s Anglo‑American heritage. The cultural values of self‑reliance, modesty, and community involvement typical
    of New England town life have shaped his worldview. He maintains close ties with his extended family and participates in local civic events, such as town clean‑up days and the annual fall fair. His
    upbringing combined a practical work ethic with a curiosity about new ideas, encouraging lifelong learning through on‑the‑job experience and community‑college courses.
