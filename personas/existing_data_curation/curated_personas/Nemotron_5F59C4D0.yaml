  hobbies: '[''Cooking Puerto Rican Cuisine'', ''Gardening'', ''Morning Jogging'', ''Salsa Dancing'', ''Attending Local Festivals'', ''Volunteering for Youth Education'', ''Reading Mystery Novels'', ''Exploring
    Tech Trends'']'
  career_goals: Enedina aims to advance to a senior regional manager role within the next five years, overseeing multiple sites across the central region of Puerto Rico. She plans to obtain a Project Management
    Professional (PMP) certification to formalize her expertise. Long‑term, she aspires to launch a community‑focused consulting firm that helps local small businesses improve operational efficiency, thereby
    contributing to economic development in Caguas and Cidra. She also seeks to become a mentor for women leaders in her community, fostering a more inclusive workplace culture.
