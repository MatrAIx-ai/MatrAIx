personas:
  professional: Spurgeon Rogers, a retired automotive and small‑engine specialist who channels their hands‑on expertise into woodworking, runs a meticulous checklist‑driven side shop selling handcrafted
    birdhouses and small furniture to neighbors, and mentors DIY enthusiasts with step‑by‑step guidance—all while pursuing a community‑college certificate to formalize their home‑repair knowledge.
  sports: Spurgeon Rogers follows the local high‑school football team, the County Panthers, attending every Friday night game, and supports the regional baseball squad, the River City Reds; they stay active
    by gardening, walking their dog, and occasionally joining a senior‑center shuffleboard league, but they prefer low‑impact exercise that fits their routine.
  arts: Spurgeon Rogers immerses themselves in historical biographies—from Doris Kearns Goodwin to David McCullough—and enjoys the classic folk tunes of Woody Guthrie and the storytelling of actor Morgan
    Freeman, while their model‑train layout becomes a living gallery of miniature art, reflecting their love for precise, hands‑on creativity.
  travel: Spurgeon Rogers prefers road‑trip adventures that blend history and nature, having driven the Blue Ridge Parkway each autumn to photograph the fall foliage, and planning a future visit to Colonial
    Williamsburg to connect with the era of their favorite biographies; they budget carefully, using a spreadsheet to track mileage and lodging costs, and keep trips within a comfortable driving radius
    to avoid the stress of air travel.
  culinary: Spurgeon Rogers delights in garden‑to‑table cooking, turning fresh heirloom tomatoes into sun‑dried snacks and simmering peppers into smoky salsa, while whipping up a Sunday roast with rosemary‑infused
    potatoes; they rate themselves an amateur chef, proud of their signature “tomato‑basil pot pie” but occasionally over‑season a dish, prompting a quick corrective taste test.
  core: Spurgeon Rogers, they are a detail‑obsessed, retired handyman turned meticulous woodworker who balances routine with modest entrepreneurial ambition, all while navigating health worries and a disciplined
    budget.
background:
  cultural: Spurgeon is a white Midwestern American who grew up in rural Indiana, surrounded by farming families and a close‑knit community church. The region’s values of self‑reliance, thrift, and modesty
    shaped his practical outlook. He cherishes Midwestern traditions such as backyard barbecues, attending Hoosier sporting events, and participating in county fairs. His upbringing emphasized hard work,
    independence, and a quiet respect for privacy, which continue to influence his daily life and interactions.
