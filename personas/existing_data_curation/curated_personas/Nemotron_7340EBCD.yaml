personas:
  professional: Mark Shumpert, an aspiring gallery assistant with a knack for digital illustration and social media storytelling, leverages their curiosity and relaxed approach to bring fresh, community-focused
    perspectives to museum programming while often juggling multiple project ideas in a delightfully disorganized yet creative swirl.
  sports: Mark Shumpert cycles the Great Lakes shoreline with the Port Huron Cycling Club in the summer, roots for the Detroit Lions and Red Wings, and rolls out a casual yoga routine at home, valuing flexibility
    over strict training schedules.
  arts: Mark Shumpert, a sketch-loving explorer of Detroit’s indie music scene, frequently attends shows by Sufjan Stevens and The Avett Brothers, draws inspiration from the muralist known as 'The Muralist'
    in local neighborhoods, and curates pop-up exhibitions featuring works by emerging Michigan artists.
  travel: Mark Shumpert prefers spontaneous road trips to art-rich cities like Chicago, New York, and Montreal, balancing a shoestring budget with occasional splurges on boutique hostels, and dreams of
    a summer pilgrimage to the coastal galleries of Norway’s Lofoten islands.
  culinary: Mark Shumpert enjoys cooking simple yet vivid dishes like Great Lakes perch tacos with fresh cilantro and lime, experiments with Detroit-style pizza topped with local cherry peppers, and often
    pairs meals with a cold craft IPA, despite a habit of over-seasoning and forgetting to set the timer.
  core: Mark Shumpert blends artistic curiosity with a laid-back, slightly chaotic lifestyle, constantly chasing inspiration while juggling sketchbooks, camera gear, and the occasional missed deadline.
background:
  cultural: Mark was raised in a middle‑class, white family in Port Huron, Michigan, a city shaped by its Great Lakes heritage and a legacy of manufacturing. His upbringing reflects Midwestern values of
    modesty, community cooperation, and a strong work ethic. He grew up attending local county fairs, community theater productions, and seasonal festivals that celebrate regional art and music. Although
    his family background is primarily Protestant, Mark has been exposed to the cultural diversity of the Detroit‑to‑Canada border area, participating in multicultural food markets and art initiatives that
    emphasize inclusivity and shared regional pride.
