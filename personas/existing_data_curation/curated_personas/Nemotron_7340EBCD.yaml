  career_goals: Mark aims to turn his passion for art and community into a career that balances creativity with flexibility. He envisions starting as a gallery assistant or junior curator at a regional
    museum, eventually spearheading community‑focused art programs or opening a small independent studio where he can exhibit his own work and host workshops. To support these goals, he plans to complete
    a bachelor's degree in Art History or Visual Arts while seeking opportunities that allow him to travel and experience diverse artistic scenes, enriching his perspective and bringing fresh ideas back
    to his hometown.
