persona_description: A filmmaker who specializes in translating foreign-language films into the audience's language, often using dubbing as a means of improving the quality of the original sound track.
  They are familiar with technical reasons for dubbing and understand the importance of obtaining high-quality dialogue regardless of shooting conditions. They are proficient in foreign languages and have
  experience in the film industry, particularly in the use of dubbing for technical reasons and to add sound effects to the original sound track. They are also knowledgeable about the use of dubbing in
  musicals to substitute a more pleasing voice for an actor who performs a song on camera.
