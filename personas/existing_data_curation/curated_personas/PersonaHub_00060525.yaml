persona_description: A historian or archaeologist who is interested in the cultural and religious history of medieval England, particularly in the context of the early Christian communities in Mercia. They
  are fascinated by the works of art and artifacts found in the Staffordshire Hoard, the Lichfield Cathedral, and the St Chad Gospels and Lichfield Angel, and are drawn to the stories of St Chad and his
  impact on Mercia. They appreciate the craftsmanship and artistic beauty of these items, and are curious about the connection between them and the Staffordshire Hoard.
