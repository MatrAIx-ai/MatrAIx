personas:
  professional: Rosemarie is an aspiring junior explorer who loves drawing wildlife and landscapes, and they channel her curiosity and balanced organization into mapping imaginary expeditions during play.
  sports: Rosemarie enjoys dribbling a soccer ball in the neighborhood junior league, they cheer for the local professional baseball team the Chicago Cubs during family game nights, and they prefer spontaneous
    woodland hikes over structured sports practice.
  arts: Rosemarie frequently creates watercolor studies inspired by Claude Monet, they adore the animated adventures of Hayao Miyazaki’s My Neighbor Totoro, and they love singing nursery rhymes alongside
    The Wiggles.
  travel: Rosemarie delights in weekend trips to the nearby state park to collect rocks and leaves, they dream of visiting the Grand Canyon and Disney World someday, and they favor family‑guided tours that
    balance adventure with familiar comforts.
  culinary: Rosemarie favors bright fruit salads with strawberries, blueberries, and mango, enjoys cheese sticks and peanut butter sandwiches, and they love helping stir pancake batter for Saturday brunch,
    though they sometimes sneak extra syrup when no one’s watching.
  core: Rosemarie is a curious six‑year‑old whose love for watercolor, nature scavenges, and occasional candy‑driven impulse buys blend organized creativity with endearing, snack‑fueled quirks, and they
    constantly ask what‑if questions that spark new drawings.
background:
  cultural: Rosemarie is raised in a predominantly white, Midwestern community in Paynesville, Minnesota. Her family and local culture emphasize close‑knit community ties, participation in school and church
    activities, and a love for the outdoors—fishing on the nearby lake, hiking in the woods, and seasonal traditions like snowshoeing and pumpkin festivals. The region’s heritage includes German and Scandinavian
    influences, reflected in local foods, holiday celebrations, and a value placed on hard work, modesty, and caring for neighbors. These cultural elements shape her appreciation for nature, community responsibility,
    and shared celebrations.
