  career_goals: As a six‑year‑old, Rosemarie dreams of becoming an artist who captures the colors of the world and a scientist who discovers how things work. She imagines herself one day teaching other
    children, sharing her love for art, nature, and curiosity. She also mentions a wish to work with animals, inspired by field trips to farms, hoping to be a veterinarian or wildlife caretaker. Her overarching
    ambition is to combine creativity and inquiry to help others explore and appreciate the world.
