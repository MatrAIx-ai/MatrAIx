personas:
  professional: Jerome Sterlin, a 26‑year‑old graphic designer, they leverage mastery of Photoshop, Illustrator, and InDesign to craft polished brand identities and print collateral for emerging local businesses,
    balancing experimental visuals with proven design principles while positioning themselves for a senior role and a future boutique studio.
  sports: Jerome Sterlin, a 26‑year‑old basketball enthusiast, they play weekly pick‑up games at a downtown Indianapolis community gym, follow the Indiana Pacers and Indianapolis Colts, and occasionally
    join a local adult five‑on‑five league as a social outlet and stress reliever.
  arts: Jerome Sterlin, a 26‑year‑old visual creator, they immerse themselves in hip‑hop, jazz, and neo‑soul playlists featuring Kendrick Lamar, Kamasi Washington, and Erykah Badu while sketching on the
    streets of Indianapolis, drawing inspiration from muralists like Banksy and local graffiti crews, and regularly attending intimate design meetups and gallery openings.
  travel: Jerome Sterlin, a 26‑year‑old explorer, they favor short, purpose‑driven trips that blend design research with leisure, having explored the street‑art districts of Detroit, the culinary scene
    of Austin, and the historic architecture of Barcelona, while planning future visits to Mexico City for its vibrant mural culture and the Pacific Northwest for nature retreats.
  culinary: Jerome Sterlin, a 26‑year‑old home cook, they enjoy preparing comfort‑food dishes that echo family traditions, regularly making spiced chicken thighs, smoked collard greens, and candied sweet
    potatoes using smoked paprika, garlic, and brown sugar, and they experiment with plating while occasionally over‑seasoning.
  core: Jerome Sterlin, a 26‑year‑old introverted designer, they balance meticulous work habits with a love for solo creative pursuits, a competitive streak, and a pragmatic approach to finances and health.
background:
  cultural: Jerome grew up in a working‑class African‑American family in Indianapolis, a city shaped by the Great Migration and a strong Midwestern Black community. His parents, originally from the South,
    instilled in him a respect for cultural heritage, storytelling, and resilience. This background informs his visual aesthetic, often incorporating bold colors, rhythmic patterns, and motifs that echo
    African‑American artistic traditions. While he navigates the broader design industry, Jerome stays connected to local Black artists and community initiatives, using his work to celebrate and elevate
    the cultural narratives of his neighborhood.
attributes:
  skills: '["Adobe Photoshop", "Adobe Illustrator", "Adobe InDesign", "Typography", "Brand Identity Design", "Digital Illustration", "Motion Graphics (After Effects)", "Web Design (HTML/CSS basics)", "Print
