  hobbies: '["Digital Illustration", "Street Photography", "Hip‑Hop & Jazz Music", "Reading Design Theory Books", "Playing Basketball in Small Groups", "Cooking Soul‑Food", "Exploring Indianapolis Street
    Art", "Attending Small Design Meetups"]'
  career_goals: Jerome aims to progress from a mid‑level graphic designer to a senior designer within the next three years, focusing on brand strategy for emerging Black‑owned businesses in Indianapolis.
    He aspires to build a robust portfolio that showcases a blend of culturally resonant visual storytelling and commercial effectiveness, eventually launching his own boutique design studio. Long‑term,
    Jerome envisions stepping into a creative director role where he can mentor junior designers, shape agency culture, and earn recognition through industry awards and local arts initiatives.
