  hobbies: '[''drawing and coloring'',''reading picture books'',''nature walks'',''collecting leaves and rocks'',''LEGO building'',''jigsaw puzzles'',''listening to music'',''small group storytime'']'
  career_goals: Darlene dreams of becoming an artist who creates vivid illustrations for storybooks, and she also imagines herself as a scientist exploring nature in the Appalachian hills. She hopes to
    combine her love of art and curiosity by someday working as a museum curator or nature illustrator, where she can share unconventional ideas with others.
