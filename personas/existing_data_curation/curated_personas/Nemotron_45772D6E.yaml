  career_goals: Even at his young age, Javier dreams of a future where he can combine his love of art and curiosity about how things work. He often talks about becoming an artist who paints stories, a scientist
    who discovers new things, or an explorer who travels to exciting places. He aspires to create his own inventions using LEGO and sketches, hoping one day to be a teacher who shares knowledge with other
    kids and a superhero who helps friends solve problems.
