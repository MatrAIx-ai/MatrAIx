  hobbies: '[''salsa dancing'', ''attending art galleries'', ''live jazz and flamenco concerts'', ''cooking Spanish cuisine'', ''making homemade pigments'', ''gardening herbs'', ''woodworking'', ''volunteering
    at science fairs'', ''reading science‑fiction'', ''playing bridge'', ''hiking'']'
  career_goals: As he approaches retirement, Heriberto aims to transition from full‑time research to a mentorship‑focused consultancy, guiding local startups on sustainable material development. He envisions
    establishing a community‑run "Sustainable Materials Innovation Hub" in Chester, offering workshops that merge chemistry with artistic expression. He also dreams of authoring a popular‑science book that
    celebrates the intersection of art and materials science, and hopes to secure a modest grant to develop biodegradable polymer kits for high‑school science labs.
