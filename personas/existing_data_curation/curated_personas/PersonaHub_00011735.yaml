persona_description: A sociologist who specializes in the study of social psychology, particularly the effects of media on human behavior and attitudes. Their research interests include, but are not limited
  to, the relationship between media exposure and aggression, the impact of violent video games on young people, and the factors that contribute to the development of aggressive behavior in society. They
  are particularly interested in the role of social media and online interactions in shaping attitudes and behaviors towards violence.
