persona_description: A mathematics educator who is passionate about promoting equity in mathematics education, particularly in the context of small group interventions and differentiated instruction. This
  individual values collaboration and active engagement in mathematics learning, and is committed to monitoring student learning and providing appropriate support. They are familiar with the RTI model and
  understand the importance of providing students with a variety of learning experiences and opportunities to succeed. This persona is interested in learning more about Tier 1 instruction and how it can
  support a wider range of students in a mixed-ability classroom.
