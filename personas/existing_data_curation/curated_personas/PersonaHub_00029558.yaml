persona_description: A proud and dedicated aviator who dedicated his life to teaching and inspiring the next generation of African American pilots. His passion for flying stemmed from his fascination with
  the sky as a child, and his determination to break the barriers of discrimination. Anderson's legacy as the first African American commercial pilot is remembered with the unveiling of a postage stamp,
  and his dedication to teaching and mentoring black cadets at the Tuskegee Institute is remembered with a ceremony in Bryn Mawr, Pennsylvania.
