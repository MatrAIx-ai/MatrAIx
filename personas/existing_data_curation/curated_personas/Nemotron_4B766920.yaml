personas:
  professional: Jason Hildenbrand, a retired handyman turned senior‑center maestro, leverages decades of plumbing, electrical, and car‑maintenance know‑how to orchestrate bridge tournaments, trivia nights,
    and beach‑cleanup drives, using his talkative, competitive nature to keep volunteers motivated while flexibly adapting plans on the fly.
  sports: Jason Hildenbrand, a steadfast fan of the Miami Dolphins and the Tampa Bay Rays, spends Saturday afternoons at the Oceanview Senior Bowling Alley in a friendly league, rides with the Coastal Seniors
    Cycling Club for short rides along the Atlantic shoreline, and keeps his competitive edge sharp by playing bridge as his mind‑sport.
  arts: Jason Hildenbrand, an avid collector of 1930s RCA radios and a regular at the Seaside Café’s open‑mic nights, revels in the sounds of The Beach Boys, B.B. King, and local folk singer Lila G., often
    taking the mic for karaoke renditions of 'Sweet Caroline' and sharing trivia about vintage broadcast history with his audience.
  travel: Jason Hildenbrand, a spontaneous road‑tripper, packs his vintage VW Beetle for quick getaways to St. Augustine’s historic forts, the quiet streets of Fernandina Beach, and the vibrant nightlife
    of Key West, using his voice‑assistant to locate the best seafood shacks, while keeping a bucket list that includes a nostalgic pilgrimage to Nantucket’s lighthouse.
  culinary: Jason Hildenbrand, a self‑appointed seafood barbecue king, seasons his freshly caught grouper and shrimp with local lemon, garlic, and rosemary before grilling them to a smoky finish, pairs
    them with homemade key‑lime pie and occasional conch fritters, and can coax flavor out of native Floridian greens like saw palmetto and hibiscus in his garden‑to‑table dishes.
  core: Jason Hildenbrand is a talkative, tech‑curious octogenarian who blends hands‑on handyman savvy with a competitive, community‑driven spirit, always ready to host karaoke, bridge tournaments, or a
    beach cleanup while juggling a few forgotten appointments.
background:
  cultural: Jason grew up in a mid-century, working-class white family in the American South, where self-reliance and community gatherings were core values. He was raised in a Christian household that emphasized
    practicality and storytelling around the dinner table. After a lifetime of blue-collar work and raising a family, he retired to Atlantic Beach, Florida, where the coastal lifestyle, Southern hospitality,
    and a vibrant senior community shape his daily life. He blends his Midwestern‑Southern roots with the laid-back beach culture, valuing independence, friendly banter, and a healthy dose of skepticism
    toward flashy trends.
attributes:
  skills: '["Basic plumbing", "Light electrical work", "Car maintenance", "Seafood grilling", "Gardening (native plants)", "Storytelling", "Trivia hosting", "Smart-home device setup", "Community networking"]'
  hobbies: '["Fishing", "Gardening", "Hosting card games (bridge/whist)", "Karaoke hosting", "Live music outings", "Vintage radio collecting", "Exploring smart-home tech", "Beachcombing", "Historical reading",
    "Road trips"]'
  career_goals: Even though he is retired, Jason wants to stay active and influential in his community. He aims to become the go-to organizer for senior-center events, especially bridge tournaments and
    trivia nights, and hopes to win the annual senior bridge championship. He plans to compile and share his life stories in a memoir that preserves local history, and to mentor younger volunteers in practical
    home-repair skills. He also aspires to lead a beach-cleanup initiative, combining his love for the Atlantic shoreline with his competitive spirit to set a record for volunteer hours.
