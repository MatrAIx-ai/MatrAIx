personas:
  professional: Suzzanna Kasanzew, an 81‑year‑old former electrical engineer and data‑analysis specialist, channels their meticulous circuit‑design expertise into bilingual STEM workshops at the local community
    college, where they pragmatically balance rigorous experiment design with the warm storytelling of Día de los Muertos legends to inspire young community members.
  sports: Suzzanna Kasanzew, a lifelong season ticket holder of the Los Angeles Dodgers, enjoys attending games at Dodger Stadium when possible, leads a low‑impact walking group at the Inglewood senior
    center, and occasionally plays senior recreational pickleball at the local community center.
  arts: Suzzanna Kasanzew often immerses themselves in the works of Frida Kahlo and the soulful ballads of Chavela Vargas, practices traditional embroidery while listening to classical guitar, and attends
    local poetry readings where they recite verses honoring Día de los Muertos, finding these artistic rituals a vital counterbalance to their analytical mind.
  travel: Suzzanna Kasanzew prefers carefully planned, low‑stress journeys that blend cultural immersion with family visits, such as the annual pilgrimage to Oaxaca to partake in Day of the Dead celebrations,
    weekend road trips to the Santa Lucia Preserve for birding, and occasional day trips to the Griffith Observatory to revisit the celestial wonders that once inspired their engineering research.
  culinary: Suzzanna Kasanzew tends a vibrant herb garden of epazote, oregano, and fire‑roasted chilies, skillfully crafting mole negro and lime‑bright salsa verde while applying a chemist’s precision to
    balance acidity and umami, and they delight in serving these dishes alongside fresh corn tortillas at family gatherings.
  core: Suzzanna Kasanzew blends a lifelong analytical rigor with a warm reverence for cultural rituals, stubbornly clinging to a nightly crossword habit that sometimes keeps them up past bedtime, and finding
    joy in weaving stories of scientific pioneers into the fragrant steam of their kitchen.
background:
  cultural: Born to Mexican parents who emigrated to the United States, Suzzanna grew up in a bilingual household where Spanish and Mexican customs were central to family life. Her upbringing emphasized
    respect for elders, communal celebrations such as Día de los Muertos and Las Posadas, and the importance of preserving culinary and artistic traditions. Living in Inglewood, she integrated Mexican cultural
    practices with the vibrant multicultural tapestry of Los Angeles County, participating in local Mexican community centers, supporting neighborhood festivals, and advocating for greater representation
    of Latinx voices in STEM education. She remains fluent in both Spanish and English, and often serves as a cultural bridge, translating scientific concepts for Spanish‑speaking families and sharing her
    heritage through storytelling.
attributes:
  skills: '[''Data Analysis'', ''Statistical Modeling'', ''Electrical Circuit Design'', ''Python Programming'', ''MATLAB'', ''Technical Writing'', ''Mentoring'', ''Project Management'', ''Experimental Design'',
    ''Problem Solving'']'
  hobbies: '[''Herb Gardening'', ''Traditional Mexican Cooking'', ''Crossword Puzzles'', ''Chess'', ''Reading Biographies'', ''Folk Dance'', ''Poetry Reading'', ''Embroidery'', ''Ceramic Pottery'', ''Community
    Volunteering'']'
  career_goals: Suzzanna aims to leverage her lifetime of scientific knowledge to inspire younger community members, particularly Latinx youth, by establishing a small‑scale mentorship program. She also
    hopes to contribute to local fundraising for science kits, serve as an advisory board member for the Inglewood community college's STEM outreach, and author a memoir that blends personal history with
    reflections on the evolution of women in STEM. Maintaining her health, staying mentally sharp, and deepening relationships with her grandchildren remain central personal ambitions.
