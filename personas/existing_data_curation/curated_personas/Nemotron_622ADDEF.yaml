personas:
  professional: Detric Wyche, a seasoned casino surveillance officer whose razor‑sharp pattern recognition, technical troubleshooting, and calm de‑escalation style reflect a skeptical and competitive mindset,
    seeks to transition into a supervisory role that merges security expertise with a passion for visual arts.
  sports: Detric Wyche, a regular at the St Louis Community Center's Saturday pick‑up basketball league and an avid supporter of the St Louis Cardinals and St Louis City SC, blends a competitive chess mindset
    with routine cardio workouts at the local gym and occasional pool league play on weekends.
  arts: Detric Wyche, a frequent visitor of the St Louis Art Museum who collects prints by Kehinde Wiley and Jacob Lawrence, immerses themselves in the sounds of Miles Davis, B.B. King, and Nas while capturing
    street scenes with a vintage Leica, and often volunteers to guide youth tours at pop‑up galleries.
  travel: Detric Wyche, a spontaneous weekend explorer who favors short road trips to cultural hotspots like Chicago’s Art Institute, Memphis’s Beale Street, and New Orleans’ French Quarter for its music
    and cuisine, plans trips on a whim using last‑minute flight deals, yet maintains a modest travel budget to save for future security‑consulting investments.
  culinary: Detric Wyche, a self‑taught home chef who prepares soulful dishes such as smoked brisket, collard greens seasoned with smoked paprika, and sweet potato pie while listening to classic hip‑hop,
    balances decent culinary skill with occasional reliance on convenience foods when night shifts run late.
  core: Detric Wyche, a curiosity‑driven security veteran who fuses a love for art, chess, and jazz with a competitive edge, often juggles spontaneous social plans against a lingering habit of forgetting
    deadlines.
background:
  cultural: Detric grew up in the greater St. Louis area, raised in a close‑knit African‑American community that valued family, church, and mutual support. His grandparents were part of the Great Migration,
    moving from the rural South to Missouri in search of industrial work, bringing with them traditions of gospel music, storytelling, and soul‑food cuisine that continue to shape family gatherings. The
    local Black church has been a cornerstone of his upbringing, providing a space for worship, community activism, and cultural celebrations such as Juneteenth and Kwanzaa. He was exposed early to the
    rich musical heritage of the region—blues, jazz, and later hip‑hop—which influenced his taste and his appreciation for improvisation. Detric's working‑class background fostered a strong sense of resilience
    and resourcefulness, while also exposing him to the challenges of systemic inequities. These experiences have instilled in him a deep respect for self‑reliance and a desire to give back, evident in
    his mentorship work. His cultural identity is a blend of Midwestern Black traditions, contemporary urban influences, and the everyday realities of a security professional navigating a diverse, ever‑changing
    environment.
