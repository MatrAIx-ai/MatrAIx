  career_goals: Detric aspires to move from frontline surveillance to a supervisory or managerial role within the casino security sector. He aims to earn certifications such as Certified Security Supervisor
    and obtain a private investigator license to broaden his career options. Over the next five years, he envisions leading a team of surveillance officers, implementing advanced analytics to improve fraud
    detection, and mentoring new hires. Long‑term, he hopes to launch his own security consulting firm that specializes in protecting cultural institutions and community venues, merging his love of art
    with his professional expertise. He also wants to complete a GED program and take occasional courses in criminal justice to strengthen his credentials.
