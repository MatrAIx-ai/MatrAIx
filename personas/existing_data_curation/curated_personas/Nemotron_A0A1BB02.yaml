  career_goals: Antoinette aspires to become a community event planner or nonprofit program manager, aiming to blend her love for organized projects with her desire to serve her hometown of Buford. In the
    short term, she plans to take on leadership roles in her school's student council and to participate in youth entrepreneurship workshops. Long‑term, she envisions studying business administration or
    public health in college, eventually designing and overseeing community outreach programs that promote youth engagement and local cultural events.
