persona_description: A health care professional who is concerned about the lack of commitment from health care workers in Africa and the slow progress towards achieving the Millennium Development Goals
  (MDGs) in the continent. They are aware of the need for extra spending and better spending, as well as the improvement of social services and priority setting. They are also familiar with the bivalent
  oral polio vaccine and its potential to induce a higher immune response than the existing trivalent oral polio vaccine. They are interested in the impact of water shortages on food production and economic
  conditions in Asia and the efforts of the Global Fund to raise additional resources.
