  career_goals: Approaching retirement, Edward aims to transition into a mentorship and patient safety role that leverages his decades of hands‑on experience while reducing the administrative load that
    triggers stress. He hopes to become a preceptor for new nurses, leading small‑group training sessions that emphasize practical, routine‑focused care. Additionally, Edward aspires to contribute to quality‑improvement
    initiatives at his hospital, championing protocols that streamline workflow and enhance patient outcomes without adding unnecessary complexity. Ultimately, he seeks a balanced workload that allows more
    time for personal well‑being and family life.
