  career_goals: Aleyamma aims to transition into a lead engineering role where she can shape product strategy at the intersection of technology and art. She envisions developing AI‑driven creative tools
    that empower artists and designers, and eventually launching her own startup focused on immersive digital experiences. She is committed to fostering diversity in tech, particularly supporting South
    Asian women in STEM, by establishing mentorship programs and speaking at industry events. Long‑term, she aspires to become a thought leader who bridges cutting‑edge engineering with cultural innovation.
