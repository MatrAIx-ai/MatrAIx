personas:
  professional: Maria Perdomo leverages a decade of paralegal expertise in family and civil law, using bilingual fluency and meticulous research skills to streamline case management for a family‑law firm,
    while balancing a relaxed attitude toward strict schedules with a knack for reprioritizing under pressure.
  sports: Maria Perdomo energizes her weekends with high‑intensity Zumba and salsa sessions at the local studio, hikes the San Jacinto Mountains with friends, and cheers for the Los Angeles Dodgers and
    the LA Galaxy, blending personal fitness with loyal fandom for Southern California teams.
  arts: Maria Perdomo immerses herself in vibrant salsa music, regularly attending live performances by artists like Marc Antonio and Shakira at the downtown cultural center, while also appreciating contemporary
    theater productions such as Lin‑Manuel Miranda’s works, letting rhythmic beats and storytelling shape her creative outlet.
  travel: Maria Perdomo prefers purposeful weekend getaways, often exploring nearby mountain retreats like Big Bear or coastal towns such as Santa Barbara, yet dreams of culinary pilgrimages to Oaxaca’s
    bustling markets and the historic streets of Antigua, balancing budget constraints with a love for culturally rich experiences.
  culinary: Maria Perdomo finds joy in crafting traditional tamales and rich mole from scratch, skillfully blending masa, ancho chilies, and dark chocolate, and delights in sharing these dishes at communal
    gatherings after dance classes, showcasing both a high cooking proficiency and a love for communal feasting.
  core: Maria Perdomo is a socially vibrant, structure‑seeking paralegal who balances meticulous legal work with spontaneous dance‑filled weekends, a lingering anxiety, and a habit of juggling financial
    prudence against impulse group spending.
background:
  cultural: Maria is a first-generation Mexican-American who grew up in Hemet, California, in a household where Spanish was spoken daily and Mexican traditions were celebrated year-round. She participates
    in Dia de los Muertos and Dia de la Virgen celebrations, and family gatherings often revolve around shared meals and storytelling. Her bicultural upbringing gives her a strong sense of responsibility
    to support the Latino community, especially in navigating legal and immigration challenges. Bilingual fluency and deep-rooted family values shape her worldview and guide both her professional and personal
    choices.
