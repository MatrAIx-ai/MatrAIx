  career_goals: Maria aims to formalize her expertise by completing an Associate's degree in Paralegal Studies and earning the Certified Paralegal (CP) credential within the next two years. Short-term,
    she wants to move into a senior paralegal or legal case-manager role in a family-law practice that offers a consistent workflow and clear procedural guidelines, which will help reduce her stress. Long-term,
    she envisions leading a bilingual legal resource center in Riverside County that provides free assistance to Mexican-American families navigating immigration, housing, and family-law issues. She also
    plans to develop a mentorship program for other Spanish-speaking legal assistants, combining her cooperative nature with a desire for structured, community-focused impact.
