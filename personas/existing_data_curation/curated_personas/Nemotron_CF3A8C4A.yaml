personas:
  professional: Rossy Betancourt, a retired business administration professional turned community genealogist, blends bilingual fluency, meticulous budgeting, and hands‑on DIY aptitude to craft digital
    family histories and volunteer Spanish‑language story hours, channeling a curiosity‑driven yet relaxed, solitary work style that tolerates occasional disorganization.
  sports: Rossy Betancourt stays fit through daily low‑impact beach walks and seasonal bird‑watching hikes, follows the Carolina Hurricanes for hockey, cheers the Durham Bulls during baseball season, and
    keeps a personal log of steps and heart rate, embodying a competitive streak in personal fitness while preferring solitary activity.
  arts: Rossy Betancourt expresses quiet creativity through landscape photography inspired by Ansel Adams, enjoys the acoustic strings of folk musician Sarah Jarosz, reads the poetry of Pablo Neruda, and
    weaves stories into hand‑stitched quilts, merging a love for visual detail with a solitary, competitive drive to capture perfect moments.
  travel: Rossy Betancourt favors self‑guided, low‑key trips that blend maritime history and nature, planning weekend getaways to Cape Cod’s historic lighthouses, the marshes of Bay of Fundy, and occasional
    overseas visits to Galway’s coastal museums, always packing a camera and traveling on a modest budget that respects their preference for flexibility over rigid itineraries.
  culinary: Rossy Betancourt, a seasoned home chef, reimagines classic arepas, hallacas, and empanadas by incorporating locally sourced shrimp, sweet plantains, garden‑grown cilantro, lime zest, and a pinch
    of smoked paprika, while experimenting with new spice blends and occasionally neglecting to label leftovers, reflecting a practical yet curious culinary mindset.
  core: Rossy Betancourt balances an insatiable curiosity for maritime lore with a solitary, relaxed lifestyle, often misplacing knitting needles yet never missing the sunrise walk along the marshes, embodying
    a pragmatic, competitive spirit tempered by emotional steadiness.
background:
  cultural: Born and raised in a close‑knit Venezuelan family, Rossy grew up celebrating traditional festivals such as Carnaval and Día de los Muertos with vibrant music, dance, and communal meals. Catholic
    rituals and family gatherings shaped her early sense of community. After emigrating to the United States in her early fifties, she settled in Morehead City, NC, where she blended her Latin heritage
    with the coastal Southern lifestyle. She retains strong ties to Venezuelan customs—preparing seasonal dishes, speaking Spanish at home, and preserving oral histories—while embracing local traditions
    like beach walks and community volunteering. Her cultural identity is a tapestry of Venezuelan warmth and the quiet resilience of her new coastal environment.
attributes:
  skills: '[''Bilingual Spanish-English fluency'', ''Traditional Venezuelan cooking'', ''Home gardening and horticulture'', ''Basic DIY home repair'', ''Budgeting and personal finance management'', ''Computer
