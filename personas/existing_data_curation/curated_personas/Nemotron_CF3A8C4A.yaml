  hobbies: '[''Reading historical biographies'', ''Bird watching'', ''Shell collecting on the coast'', ''Landscape photography'', ''Cooking Venezuelan dishes'', ''Knitting and crochet'', ''Gardening'',
    ''Listening to Latin American folk music'', ''Puzzle solving (crosswords, sudoku)'']'
  career_goals: Although retired from formal employment, Rossy aims to remain mentally active and independent. She plans to learn digital genealogy tools to document her family's Venezuelan roots and share
    them with future generations. Rossy hopes to compile a small cookbook of her favorite recipes, blending Venezuelan flavors with coastal North Carolina ingredients, and consider donating it to the local
    library. She also wishes to volunteer occasionally for Spanish‑language story hours at the community center, offering cultural insights to younger immigrants. Maintaining her health through regular
    walks on the beach and staying socially engaged on her own terms remain central to her personal ambitions.
