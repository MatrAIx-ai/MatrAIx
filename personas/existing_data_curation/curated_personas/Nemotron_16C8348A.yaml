  career_goals: She aspires to graduate high school with strong academic performance and earn a scholarship to study bilingual education or social work. Her long-term goal is to become a bilingual elementary
    school teacher or school counselor, helping Spanish-speaking students navigate the U.S. education system while preserving their cultural identity. She also envisions working in community outreach programs
    that provide mentorship and academic support to Latino youth, and she hopes to further develop leadership and organizational skills through college internships and volunteer work.
