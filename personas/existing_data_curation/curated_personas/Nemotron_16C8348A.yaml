personas:
  professional: A structured school environmental club leader, Ana Perezmena leverages their practical organization skills and quiet, cooperative nature to coordinate recycling initiatives, maintain a community
    garden, and mentor younger peers, laying the groundwork for a future in sustainable urban development.
  sports: An active participant in school soccer during the spring and local youth basketball with the Hoops United club in the winter, Ana Perezmena cheers for the city’s River Hawks baseball team and
    the national women's soccer squad, the Falcons, reflecting a balanced enthusiasm for team sports and community competition.
  arts: An imaginative sketcher and watercolor hobbyist, Ana Perezmena fills journal pages with whimsical doodles, paints serene river scenes, curates playlists that blend regional folk singers and pop
    icons like Billie Eilish and Harry Styles, and devours contemporary YA novels by Becky Albertalli and Sarah J. Maas, letting diverse artistic influences shape their creative identity.
  travel: An itinerant planner, Ana Perezmena enjoys well‑organized weekend trips to the nearby coastal town of Sol Bay and annual family excursions to the historic mountain village of Valle Verde, while
    dreaming of backpacking through Machu Picchu and witnessing Kyoto’s cherry‑blossom festivals, balancing a love of nature hikes and cultural tours within a modest teen budget.
  culinary: An enthusiastic home cook, Ana Perezmena expertly prepares family staples such as hand‑rolled corn tortillas, simmered bean stew, and vibrant fruit salsa seasoned with cilantro, chilies, and
    fresh cheese, delighting in experimenting with spice blends while occasionally over‑salting dishes in a hurry.
  core: Structured yet creatively inclined, Ana Perezmena blends diligent budgeting, proactive health habits, community‑focused activism, and a love for sketching and traditional cooking, though they sometimes
    indulge in impulsive novel purchases.
background:
  cultural: Born to Mexican immigrant parents who originated from Jalisco, Ana Patricia grew up in the culturally diverse community of West Valley City, Utah. Her household is bilingual, speaking Spanish
    at home and English at school, and maintains strong ties to Mexican traditions such as Día de los Muertos, quinceañera celebrations, and weekly family meals featuring classic dishes like mole and pozole.
    While the family participates in the local Catholic parish, they also engage with the broader Utah community through neighborhood festivals, volunteer initiatives, and school events. The blend of Mexican
    heritage and the multicultural environment of Salt Lake County shapes her identity, fostering a deep appreciation for both her cultural roots and the inclusive values of her American surroundings.
