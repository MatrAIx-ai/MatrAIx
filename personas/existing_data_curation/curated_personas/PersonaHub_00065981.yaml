persona_description: A researcher who studies language development in children, focusing on the acquisition of grammatical structures and the role of imitation in language learning. The researcher is particularly
  interested in the effects of telegraphic versus grammatically complete prompts on the development of grammatical structures in young children with language delay. The researcher is looking for evidence
  that providing a telegraphic prompt to imitate is not an effective intervention technique and that children are equally likely to respond to a grammatically complete imitation prompt. The researcher is
  also interested in the role of function words in the acquisition of grammatical structures and how including them may encourage children who are developmentally ready to imitate them.
