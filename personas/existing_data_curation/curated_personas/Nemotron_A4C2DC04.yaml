personas:
  professional: Matthew Hewes, a seasoned law‑enforcement officer with nearly three decades of experience, leverages their community policing expertise, crisis‑intervention and de‑escalation skills, and
    educational background to mentor junior officers while balancing their preference for structured procedures with a flexible, hands‑on approach to problem‑solving.
  sports: Matthew Hewes, an avid hiker and weekend fisherman who also plays in a local adult soccer league, supports the Carolina Hurricanes, Durham Bulls, and NC State Wolfpack, and approaches fitness
    with a blend of structured trail workouts and spontaneous outdoor adventures, reflecting their love of both routine and flexibility.
  arts: Matthew Hewes, who balances their rugged hobbies with a deep appreciation for classic rock legends like Led Zeppelin and The Eagles, enjoys true‑crime narratives from authors such as Truman Capote,
    attends community theater productions of classic westerns starring Clint Eastwood, and regularly plays chess at the local community center, using these artistic pursuits to unwind and sharpen their
    strategic thinking.
  travel: Matthew Hewes, a moderate planner who prefers road trips to scenic destinations like the Blue Ridge Parkway, the historic streets of Savannah, and overseas trips to Ireland’s coastal towns for
    fishing, mixes spontaneous detours with a loose itinerary, ensuring family‑friendly visits while satisfying their curiosity for history and nature.
  culinary: Matthew Hewes, a barbecue enthusiast who perfects smoked brisket with hickory wood, experiments with bourbon‑glazed pork ribs, and whips up shrimp‑and‑grits on summer evenings, delights in testing
    new spice rubs and cooking techniques while often over‑indulging in rich sauces that they occasionally regret on their waistline.
  core: Matthew Hewes blends disciplined law‑enforcement leadership with a hands‑on, flexible hobbyist spirit, balancing structured community service, classic car restoration, and outdoor adventures while
    occasionally letting indulgence and a relaxed budgeting style slip through the cracks.
background:
  cultural: Matthew was raised in a small North Carolina town within a working‑class, Protestant (Baptist) family that emphasized community service, modesty, and hospitality. His Southern heritage includes
    an appreciation for local traditions, seasonal festivals, and regional cuisine. He participates regularly in church activities and neighborhood events, reinforcing a strong sense of loyalty to his community.
    While he identifies as white, his cultural influences reflect the values of respect for tradition, support for local sports, and a commitment to fostering harmony within his town and surrounding Wake
    County.
