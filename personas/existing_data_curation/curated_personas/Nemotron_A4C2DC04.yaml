  career_goals: Matthew aims to advance to a supervisory rank such as Sergeant or Lieutenant within the next few years, focusing on leading a community outreach unit. He wants to design and implement a
    mentorship program for new officers, promote policies that strengthen police‑community relations, and eventually transition to a civilian training or liaison role where he can share his expertise with
    both law‑enforcement agencies and local schools. He also envisions contributing to curriculum development for a regional police academy, leveraging his education background to shape future officers.
