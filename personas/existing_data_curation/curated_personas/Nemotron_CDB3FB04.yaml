  career_goals: Mikeshia’s career ambition is to transition from project‑based work to a leadership role where she can shape the strategic direction of a design firm or launch her own boutique studio that
    emphasizes culturally resonant, technology‑driven interiors. She aims to become a recognized authority on integrating sustainable, climate‑responsive solutions in desert environments, and to mentor
    emerging Black designers through workshops and community outreach. Long‑term, she envisions developing a proprietary digital platform that streamlines the client‑designer collaboration process, enabling
    more flexible, real‑time customization while preserving the human‑centered, artistic touch that defines her work.
