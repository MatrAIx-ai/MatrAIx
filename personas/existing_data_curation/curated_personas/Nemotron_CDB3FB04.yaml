personas:
  professional: Mikeshia Richardson is a senior interior designer who leverages 15+ years of experience, a STEM‑based analytical mindset, and mastery of tools like AutoCAD, Revit, Grasshopper, and Python
    automation to craft climate‑responsive, tech‑driven spaces, while their relaxed, flexible work style lets them pivot quickly and champion collaborative solutions.
  sports: Mikeshia Richardson channels their energy into early‑morning desert hikes, weekend paddle‑boarding on the Salt River, and supporting the Phoenix Suns basketball season, while also participating
    in a local adult recreational soccer league that meets in the cooler fall months.
  arts: Mikeshia Richardson immerses themselves in the contemporary art scene, regularly visiting galleries featuring artists like Julie Mehretu, Do Ho Suh, and emerging desert‑landscape painters, curates
    jazz‑infused playlists with Miles Davis and Esperanza Spalding for design presentations, and volunteers on community mural projects that tell local stories through bold color.
  travel: Mikeshia Richardson favors a mix of spontaneous day trips and carefully planned desert getaways, having explored the red rocks of Sedona, the historic adobe town of Taos, and the vibrant markets
    of Marrakech, while they dream of a design‑inspired retreat in the Scottish Highlands where they can study stone masonry.
  culinary: Mikeshia Richardson enjoys crafting globally inspired fusion dishes such as jerk‑spiced plantain gnocchi, roasted cactus with cumin‑lime glaze, and spiced mango sorbet, balancing a modest cooking
    skill that lets them experiment confidently in a modest kitchen, and they often host intimate dinner gatherings where playlists echo their love for jazz and soul.
  core: Mikeshia Richardson blends analytical rigor, desert‑inspired aesthetics, and a laid‑back curiosity into a design career that champions sustainable, tech‑enabled interiors while indulging in spontaneous
    creativity and community storytelling.
background:
  cultural: Mikeshia identifies as a Black woman whose family roots trace back to the Southern United States, and she carries forward a rich cultural heritage that informs both her personal life and professional
    practice. Growing up in a community that celebrated storytelling, music, and visual arts, she developed an early appreciation for the narratives embedded in color, pattern, and space. In Phoenix, she
    actively participates in local Black cultural events such as Juneteenth celebrations, Black Art Expo, and mentorship circles for Black women in design. Her design aesthetic often weaves subtle nods
    to African motifs, Afro‑centric color schemes, and the resilience narratives of Black history, while also embracing the desert’s natural palette. This cultural lens drives her commitment to creating
    inclusive spaces that reflect the identities of diverse occupants and to championing representation within the interior design industry.
