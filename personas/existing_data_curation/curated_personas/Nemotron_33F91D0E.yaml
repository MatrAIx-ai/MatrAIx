  hobbies: '[''Cooking Salvadoran dishes'', ''Church volunteering and festival organization'', ''Zumba fitness classes'', ''Playing soccer in a local league'', ''Gardening'', ''Quilting and textile crafts'',
    ''Spanish literature book club'', ''Community dance nights'']'
  career_goals: Elvia plans to finish her associate degree in Business Administration within the next two years, followed by a certification in Early Childhood Education. She intends to launch a home‑based
    catering service that specializes in authentic Salvadoran dishes, initially serving community events and church functions. Over the next five years, she aims to expand the business into a small catering
    company with a regular client base, hire staff, and secure a commercial kitchen space. Simultaneously, she wants to become a recognized community advocate for immigrant families in Waller County, organizing
    workshops on financial literacy and parenting. Her ultimate ambition is to achieve financial stability for her family, own a modest rental property, and maintain a structured, predictable lifestyle.
