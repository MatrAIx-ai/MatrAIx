personas:
  professional: Elvia Rodriguez is a budding business professional and aspiring early childhood educator who leverages their precise household management skills, bilingual communication, and event coordination
    expertise to run an organized, community‑focused catering startup, while their methodical, routine‑driven mindset and competitive edge keep their deadlines tight and their services consistently on schedule.
  sports: Elvia Rodriguez plays forward on a co‑ed soccer league in Waller County, trains weekly at the local community center’s Zumba classes, roots for the Houston Astros in baseball, the Houston Rockets
    in basketball, and the Houston Texans in football, and approaches fitness with a disciplined schedule but admits to skipping workouts after a stressful week at work.
  arts: Elvia Rodriguez explores creative expression through quilting projects that echo Frida Kahlo’s bold colors, attends local performances of the Houston Ballet, and regularly discusses novels by Isabel
    Allende and Gabriel García Márquez in their book club, while their playlist mixes salsa hits by Celia Cruz with classic folk tunes from Pete Seeger.
  travel: Elvia Rodriguez prefers short, budget‑friendly trips that fit their routine, such as weekend getaways to New Orleans for its music scene, annual family visits to Guatemala’s Lake Atitlán for cultural
    immersion, and occasional pilgrimages to local Texas historic sites, planning every detail in advance but sometimes postponing trips when financial worries arise.
  culinary: Elvia Rodriguez expertly crafts traditional pupusas, hand‑rolled tamales, and crisp yuca frita, seasoning them with fresh cilantro, oregano, and chilies from their garden, while their culinary
    curiosity drives them to experiment with fusion dishes like quinoa‑filled pupusas, though they sometimes over‑spice in an attempt to impress friends at potlucks.
  core: Elvia Rodriguez is a meticulous, community‑oriented 26‑year‑old who balances a love for Salvadoran cooking and quilting with a competitive, routine‑driven streak, a lingering anxiety that fuels
    both their planning precision and occasional stress‑induced insomnia.
background:
  cultural: Elvia is a second‑generation Salvadoran American. Raised in a bilingual household in Texas, she grew up speaking Spanish at home while navigating English‑dominant schools. Her family maintains
    strong ties to Salvadoran traditions, celebrating holidays such as Día de los Farolitos, Semana Santa, and the annual Fiesta Nacional de la Pupusa. She regularly prepares traditional foods for family
    gatherings and participates in local Salvadoran community events in Houston and surrounding areas. Her Catholic faith, inherited from her parents, informs her involvement in church activities. While
    embracing the broader Texan culture, she remains deeply connected to her Salvadoran roots through language, cuisine, music, and a strong emphasis on family cohesion.
attributes:
