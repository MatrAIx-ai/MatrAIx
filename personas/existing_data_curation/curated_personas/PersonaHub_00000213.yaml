persona_description: A researcher or scientist who specializes in environmental health, specifically focusing on the study of emerging contaminants and their effects on the environment. They are interested
  in understanding the biologic, chemical, and hydrologic processes that affect the partitioning of contaminants into various environmental media and the chemical and microbial transformation of these contaminants.
  They are also interested in the emerging chemical and microbial contaminants that pose a significant threat to the environment and are looking for ways to minimize their ecological effects.
