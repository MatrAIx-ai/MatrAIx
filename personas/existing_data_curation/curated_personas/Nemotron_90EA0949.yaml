  hobbies: '[''Woodworking'', ''Model kit building'', ''Fishing'', ''Attending live music'', ''Watching Charlotte Hornets games'', ''Volunteer work at food bank'', ''Home brewing'', ''Reading science fiction'',
    ''Cycling'', ''Home automation projects'']'
  career_goals: Gerald aims to step into a supervisory role within the next three to five years, targeting a shift lead or production manager position. He plans to earn a Certified Maintenance & Reliability
    Technician credential and a Six Sigma Green Belt to solidify his process‑improvement credentials. Long‑term, he envisions spearheading automation upgrades at his plant and, eventually, launching a consulting
    practice that helps small manufacturers adopt lean and digital tools for greater efficiency.
