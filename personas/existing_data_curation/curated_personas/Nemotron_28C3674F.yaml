personas:
  professional: Shawn Davis, a 28-year-old full-stack engineer, blends an imaginative curiosity for abstract visual concepts with disciplined Scrum habits to turn React and Node.js projects into clean,
    interactive experiences, and channels a community-first ethos into mentorship and inclusive product strategy.
  sports: Shawn Davis embraces the outdoors by hitting the trails of the Angeles National Forest in spring, skates at the SoFlo Skate Space with a local crew, follows the Los Angeles Lakers and Dodgers
    avidly, and plays in a weekend pickup basketball league at the community center.
  arts: Shawn Davis channels a love for rhythm and visual storytelling by creating generative art in p5.js inspired by the textures of Miles Davis and the beats of J Dilla, attends live hip-hop shows featuring
    Kendrick Lamar, and curates small exhibitions at local art collectives such as the Downtown LA Art Walk.
  travel: Shawn Davis blends tech-conference excitement with cultural curiosity, traveling to Tokyo for a UI design summit, exploring the historic streets of Savannah, planning a future trip to Ghana to
    connect with family traditions, and frequently road-tripping to Santa Barbara for weekend surf and sunset hikes.
  culinary: Shawn Davis whips up soulful Southern dishes like collard-green mac and cheese, shrimp-and-grits, and smoked-paprika sweet potatoes, sharpening their skills with a cast-iron skillet while experimenting
    with hot-sauce blends, and often hosts potluck gatherings where friends rate the crispness of the cornbread crust.
  core: Shawn Davis is a creatively wired engineer who balances disciplined coding, community mentorship, and late-night jam sessions, all while juggling a side hustle, stubborn insomnia, and a habit of
    over-seasoning everything.
background:
  cultural: Shawn grew up in Lancaster, a diverse suburb of Los Angeles County, in a close‑knit African‑American family with deep roots in the Southern United States. His parents instilled values of community,
    perseverance, and cultural pride, often sharing stories, music, and food from their heritage. Exposure to the vibrant West Coast Black arts scene—from jazz and hip‑hop to spoken‑word poetry—shaped his
    love for rhythm, visual expression, and narrative. As a Black professional in tech, Shawn is aware of the challenges of representation and actively participates in local Black tech meetups, mentorship
    programs, and cultural festivals such as the Los Angeles Black Film Festival. These experiences inform his commitment to create inclusive digital experiences and to give back to his community.
