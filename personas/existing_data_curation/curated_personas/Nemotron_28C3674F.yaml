  skills: '[''JavaScript'', ''React'', ''HTML5'', ''CSS3'', ''Sass'', ''Node.js'', ''Express'', ''Firebase'', ''Git'', ''Docker'', ''p5.js'', ''Processing'', ''Unity'', ''Python'', ''Agile Scrum'', ''UI/UX
    design'', ''Creative coding'', ''Problem solving'']'
  hobbies: '[''Generative art'', ''Digital illustration'', ''Music production'', ''Video games'', ''Science‑fiction literature'', ''Skateboarding'', ''Hiking'', ''Community coding workshops'', ''Cooking
    (Southern cuisine)'', ''Hip‑hop concerts'']'
  career_goals: Shawn aims to become a senior full‑stack engineer within the next three years, focusing on projects that blend technology and art. He plans to earn a bachelor's degree in Computer Science
    through an online program to deepen his theoretical foundation. Long‑term, he envisions founding a creative tech studio that produces interactive installations for public spaces and cultural events,
    while also mentoring Black and Latinx youth interested in coding. He aspires to contribute to open‑source creative‑coding libraries and to take on leadership roles that allow him to shape product strategy
    and foster inclusive team cultures.
