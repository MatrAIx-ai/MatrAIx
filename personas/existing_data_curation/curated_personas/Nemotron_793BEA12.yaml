personas:
  professional: Manuel Garcia, an aspiring junior robot designer at his elementary school’s STEM club, blends his meticulous LEGO building skills with a vivid imagination for folklore‑inspired robots, and
    they channel their calm resilience and balanced organization into collaborative project work.
  sports: Manuel Garcia plays forward on his neighborhood soccer team, cheering on the San Antonio FC kids squad and practicing dribbling drills after school, while they also join a seasonal community baseball
    clinic during summer.
  arts: Manuel Garcia spends afternoons sketching colorful scenes of robots, dinosaurs, and La Llorona legends, listening to mariachi and Norteño tunes while crafting papel picado for family celebrations
    like Día de los Muertos, and they eagerly visit the local mural walk to draw inspiration.
  travel: Manuel Garcia dreams of exploring the Hill Country’s wildflower fields, has already visited the Texas State Capitol with his class, and they hope to accompany their family on a road trip to the
    seaside town where their grandparents host a weekend of music and tamale tasting.
  culinary: Manuel Garcia loves the taste of smoky elote, helps mash avocado for guacamole, enjoys assembling homemade quesadillas with cheese and peppers, and they proudly claim their best dish is the
    tamale they rolled for their family’s Las Posadas gathering, though their kitchen skill is limited to mixing and sprinkling.
  core: Manuel Garcia, a 7‑year‑old with a boundless curiosity for robots and folklore, balances a love for vibrant art, soccer, and family traditions while they calmly manage their allowance and occasional
    allergies.
background:
  cultural: Manuel grows up in a Mexican-American household in San Antonio, where Spanish is spoken alongside English. His family celebrates traditional holidays like Día de los Muertos, Cinco de Mayo,
    and Las Posadas, often involving colorful decorations, homemade tamales, and music. He enjoys learning about Mexican folklore, such as the legends of La Llorona and Aztec heroes, and takes pride in
    the vibrant murals that adorn his neighborhood. The multicultural environment of Bexar County, with its blend of Mexican heritage and Texan influences, shapes his worldview, giving him a strong sense
    of cultural pride and an appreciation for both his family's roots and his broader community.
