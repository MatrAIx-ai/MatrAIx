  career_goals: Manuel dreams of becoming someone who can explore ideas and share them with others. He often talks about wanting to be an astronaut so he can see the stars up close, a museum curator who
    collects and displays art from different cultures, or an artist who paints murals that celebrate his community. He also imagines helping people as a future teacher or doctor, inspired by his calm nature
    and desire to keep others happy and safe. His ambitions are guided by curiosity, a love for art, and a wish to make a positive impact.
