personas:
  professional: Scott Butler is a budding mechanical designer who channels their penchant for structure and precision into building elaborate wooden airplane models and leading their school’s robotics club,
    where their reliable, organized mindset and balanced assertiveness help program Scratch robots for regional competitions.
  sports: Scott Butler plays midfield on their school soccer team, follows Sporting Kansas City in the MLS, and attends a Saturday youth soccer clinic at the community field, where their disciplined training
    and teamwork echo their organized yet flexible personality.
  arts: Scott Butler channels their creative side through intricate LEGO constructions and wooden airplane models, while listening to instrumental scores by Hans Zimmer and the alternative rock band Imagine
    Dragons, blending hands‑on craftsmanship with a keen appreciation for cinematic music.
  travel: Scott Butler enjoys family road trips to Lake Michigan for fishing, weekend excursions to nearby state parks like the Iowa County Forest, and dreams of a future visit to the Smithsonian Institution
    in Washington, D.C., reflecting their love for seasonal outdoor rhythms and curiosity about engineering exhibits.
  culinary: Scott Butler favors hands‑on cooking such as grilling fresh trout with lemon butter and assembling homemade pepperoni pizza topped with basil and mozzarella, showcasing their practical skill
    level and love for simple, farm‑fresh flavors.
  core: Scott Butler is a meticulous teen tinkerer who blends their love for precise model building with disciplined teamwork on the soccer field, navigating life with a practical, goal‑driven mindset and
    a habit of procrastinating on homework for extra LEGO sessions.
background:
  cultural: Scott grows up in Zuni, a small community in Southampton County, Virginia, where his family’s roots trace back several generations of Southern farmers. The local culture emphasizes self‑reliance,
    hard work, and close‑knit community ties. He attends a Baptist church with his family, participating in Sunday services and community events like barn raisings and county fairs. Traditional Southern
    cuisine—such as fried chicken, biscuits, collard greens, and peach cobbler—features regularly at family gatherings. Stories about the region’s agricultural heritage and respect for land stewardship
    are central to his upbringing, shaping his values of responsibility, practicality, and modest ambition.
