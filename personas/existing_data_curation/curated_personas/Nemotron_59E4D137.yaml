  career_goals: Scott aims to pursue a career that blends his practical abilities with a structured work environment. He plans to enroll in a technical high‑school program that focuses on agricultural technology
    and mechanical trades, with the goal of becoming a certified farm equipment technician. In the long term, he hopes to manage his family’s farm, incorporating sustainable practices and modern machinery
    to improve efficiency. Additionally, he is open to joining the U.S. Army’s engineering corps, attracted by its clear hierarchy, disciplined routine, and opportunities for technical training.
