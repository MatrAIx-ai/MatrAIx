personas:
  professional: Angelly Diazrivera is a retired bilingual household manager turned cultural docent who channels their painstaking budgeting skills and electric curiosity for visual art into weekly museum
    tours, senior advisory council planning, and community cooking workshops, balancing a reliable organizational backbone with a flexible, open‑minded approach to new program ideas.
  sports: Angelly Diazrivera enjoys low‑impact exercise such as senior yoga and leisurely walks along the coastal trail, participates in a weekly pickleball game at the East Haven senior center, and remains
    an avid fan of the New York Yankees, cheering each spring season while keeping a modest collection of baseball memorabilia.
  arts: Angelly Diazrivera immerses themselves in artistic expression through watercolor landscapes reminiscent of Monet, singing in the church choir during holiday concerts, attending community theater
    productions featuring classic plays by García Lorca, and collecting prints by Frida Kahlo, which they discuss passionately while guiding friends through gallery openings.
  travel: Angelly Diazrivera favors cultural journeys over resorts, having trekked the colonial streets of Antigua, explored the murals of Mexico City, taken a scenic road trip to the Hudson Valley’s art
    farms, and now dreams of a pilgrimage to Oaxaca’s culinary festivals, all while planning trips meticulously to stay within a fixed travel budget.
  culinary: Angelly Diazrivera delights in preparing peppery pepian, slow‑cooked tamales wrapped in banana leaves, and heirloom tomato salsa with fresh cilantro, often garnishing dishes with marigold petals
    for festive flair, while skillfully kneading dough for corn masa scarves that double as edible art during community cooking workshops.
  core: Angelly Diazrivera is a curiosity‑driven, detail‑obsessed septuagenarian who balances a meticulous budget, artistic passions, and a lingering worry about health, while finding solace in watercolor,
    marimba melodies, and the scent of simmering pepian.
background:
  cultural: Angelly was born in a small highland town in Guatemala to a Catholic family with Maya influences. She grew up speaking Spanish and learning traditional crafts such as weaving and cooking from
    her mother and grandmother. In her early thirties, she immigrated to the United States, eventually settling in East Haven, Connecticut, where she built a life with her husband. She maintains strong
    ties to Guatemalan traditions—preparing holiday foods, honoring Día de los Muertos, and preserving folk stories—while also embracing the multicultural fabric of New Haven County. Her bilingual fluency,
    love of coffee and cacao, and devotion to community service reflect a bridge between her heritage and her adoptive home, allowing her to share the richness of Guatemalan culture with neighbors and younger
    generations.
