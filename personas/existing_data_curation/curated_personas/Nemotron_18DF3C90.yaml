  career_goals: Although retired, Angelly aims to deepen her contribution to the local cultural scene and preserve her heritage for future generations. She plans to volunteer as a cultural docent at the
    nearby museum, lead weekly cooking workshops that teach Guatemalan recipes to neighbors, and compile a memoir of her immigrant journey to share with her grandchildren. Angelly also hopes to learn photo‑editing
    software to document family histories, mentor younger Latina women in her community on budgeting and cultural pride, and participate more actively in the East Haven senior advisory council, where her
    organizational skills can help shape programs for seniors.
