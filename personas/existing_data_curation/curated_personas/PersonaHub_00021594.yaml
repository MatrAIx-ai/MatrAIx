persona_description: A professional in the field of computational fluid dynamics (CFD) who specializes in the optimization of engine geometries through the use of computational models. This person is skilled
  in using CFD software such as CFX to simulate and analyze turbulent flows in complex geometries with moving boundaries, particularly in the context of internal combustion engines. They are also knowledgeable
  about the limitations of traditional Reynolds averaged Navier-Stokes (RANS) simulations and are interested in exploring alternative methods such as large eddy simulation (LES) and hybrid RANS/LES approaches
  to improve the accuracy and efficiency of turbulent flow simulations.
