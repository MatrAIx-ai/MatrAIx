personas:
  professional: A budding digital animator, Miguel Valentin channels curiosity and a love for vivid color palettes into weekly Scratch projects, blending a meticulously organized workflow with spontaneous
    storytelling, while they thrive as the chatterty catalyst during his school theater crew's behind‑the‑scenes planning sessions.
  sports: Miguel Valentin dribbles for the Laredo Stars Junior Soccer Club in the fall and supports the Houston Dynamo during MLS season, channeling his boundless energy into after‑school training while
    they also cheer on the Dallas Cowboys on game days, balancing competitive play with the occasional couch‑potato recovery marathon.
  arts: Miguel Valentin sketches murals inspired by Frida Kahlo’s bold colors and Banksy’s streetwise satire, tunes into J Balvin’s reggaeton beats while drawing panels for his Scratch animations, and they
    swap graphic novel recommendations—like 'Bone' and 'Amulet'—with friends during theater rehearsals, letting each artistic encounter shape their evolving creative voice.
  travel: Miguel Valentin spends school breaks hopping across the Rio Grande to visit grandparents in Nuevo Laredo, exploring the historic River Walk in San Antonio and the Fort Worth county fair, while
    they dream of future trips to Mexico City’s historic center and a cultural exchange program in Barcelona, mapping each journey as a source of fresh storytelling ideas.
  culinary: Miguel Valentin devours tacos al pastor stacked with pineapple, corn‑masa‑based tamales wrapped in banana leaves, and heaps of fresh guacamole sprinkled with cilantro, and they occasionally
    attempt to recreate his grandmother’s mole sauce at home, though their limited kitchen skills often leave the sauce a bit too salty.
  core: Miguel Valentin is a hyper‑curious, talkative 12‑year‑old who sketches on every scrap of paper, worries about perfecting each line, and they can’t resist a midnight snack of chips before bedtime.
background:
  cultural: Born to Mexican immigrant parents in Laredo, Texas, Miguel grows up in a bilingual household where Spanish is spoken at home and English at school. His family honors Mexican traditions such
    as Día de los Muertos, Las Posadas, and Mexican Independence Day, while also taking part in local Texas county fairs and community festivals. He enjoys Mexican cuisine, especially tacos al pastor and
    tamales prepared by his grandmother, and frequently visits relatives across the Rio Grande. The proximity to the U.S.–Mexico border provides Miguel with a unique blend of cultural experiences, exposing
    him to both Mexican heritage and Texan influences. These cultural roots shape his artistic sensibility, language abilities, and strong sense of familismo and community responsibility.
attributes:
  skills: '["Drawing", "Digital illustration", "Bilingual communication (Spanish/English)", "Public speaking", "Team collaboration", "Basic coding (Scratch)", "Organizational planning"]'
  hobbies: '["Sketching and drawing", "Playing soccer with neighborhood friends", "Creating short animations in Scratch", "Listening to regional Mexican music and contemporary pop", "Attending local art
    workshops at the Laredo Public Library", "Reading graphic novels", "Participating in school theater productions"]'
  career_goals: Miguel aspires to turn his love for art and community into a career that celebrates the cultural tapestry of the border region. In the short term, he wants to sharpen his digital illustration
    skills, lead a youth art club at his middle school, and launch a small YouTube channel where he shares art tutorials and interviews local artists. He is drawn to roles such as muralist, graphic designer,
    or visual storyteller who can blend traditional Mexican motifs with contemporary design. Ultimately, Miguel hopes to study graphic design or visual communication in high school and pursue a degree that
    equips him to create public art projects, design promotional material for community events, and perhaps host a regional youth news broadcast that combines his talkative nature with his storytelling
    passion.
