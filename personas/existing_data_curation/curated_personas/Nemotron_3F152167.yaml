  hobbies: '[''Gardening'', ''Cooking (health‑focused recipes)'', ''Birdwatching'', ''Reading historical fiction'', ''Knitting'', ''Bridge (card game)'', ''Volunteer work at senior center'', ''Genealogy
    research'', ''Walking on the beach'', ''Digital photography'']'
  career_goals: Although retired, Lindsay aims to mentor younger volunteers at the senior center, helping them develop organizational skills and community spirit. She plans to document her family’s genealogy
    and write a memoir that captures the changes she’s witnessed over seven decades. Learning digital photography to photograph her garden and local wildlife is a current ambition, as is staying physically
    active through daily walks on the beach and maintaining independence.
