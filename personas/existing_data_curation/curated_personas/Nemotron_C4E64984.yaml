  career_goals: Min Sun aims to enroll in a Computer Science or Data Science bachelor's program at a university in Southern California, with the goal of becoming a software engineer or data analyst at a
    leading technology firm. She seeks a structured career path that offers clear advancement milestones, such as obtaining industry certifications (e.g., AWS, Google Cloud) and eventually leading a development
    team focused on building reliable, user‑centric applications. She is motivated to secure academic scholarships, maintain a top‑tier GPA, and build a portfolio of personal coding projects that demonstrate
    her practical problem‑solving abilities. Long‑term, she hopes to leverage her technical expertise to develop tech solutions that benefit her local Asian‑American community.
