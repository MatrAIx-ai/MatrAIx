personas:
  professional: Min Liu is a disciplined high school senior proficient in Python, SQL, and Excel, who applies analytical problem‑solving and project‑planning rigor to lead their school’s chess club and
    develop data‑visualization side projects, aiming to secure a CS scholarship and later become a software engineer who builds reliable, user‑centric applications.
  sports: Min Liu follows the Los Angeles Lakers and the LA Galaxy, participates in a weekend running group that tackles modest trails in the nearby hills, and maintains a personal fitness routine of three
    weekly cardio sessions to counteract the sedentary nature of coding and piano practice.
  arts: Min Liu enjoys listening to the piano works of Ludovico Einaudi and the ambient tracks of Brian Eno while reading dystopian novels by Margaret Atwood and self‑help titles by James Clear, and occasionally
    attends local theatre productions that explore themes of identity and community, finding that these artistic experiences sharpen their critical thinking.
  travel: Min Liu dreams of a spring road trip to Joshua Tree National Park, values well‑planned itineraries with precise budget spreadsheets, prefers quiet boutique hostels over crowded hotels, and hopes
    to attend a tech conference in San Francisco next summer.
  culinary: Min Liu finds comfort in meticulously preparing homemade dumplings with pork and chive filling, relishes the precise ritual of kneading dough, balances this with occasional experiments making
    avocado toast and matcha lattes, though they sometimes over‑season the broth in pursuit of the perfect flavor.
  core: Min Liu is a highly organized, quietly competitive 19‑year‑old who channels their love for puzzles, piano, and coding into a disciplined pursuit of academic excellence, while juggling anxiety with
    nightly journaling and a habit of over‑thinking every decision.
background:
  cultural: Min Sun is a second‑generation Chinese‑American whose parents immigrated from Mainland China. Growing up in Fullerton, she was raised with a strong emphasis on education, family responsibility,
    and respect for elders—values deeply rooted in Chinese culture. She is fluent in both Mandarin and English, celebrates Chinese New Year and the Mid‑Autumn Festival with her family, and frequently participates
    in local cultural events organized by the Orange County Chinese community. While she embraces American independence and individuality, she also balances these influences with collectivist traditions,
    such as supporting extended family and contributing to community volunteer activities.
