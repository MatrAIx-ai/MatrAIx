personas:
  professional: Jacqueline Potts is a seasoned industrial and refractory machinery mechanic who leverages her meticulous routine, strong communication, and hands‑on expertise in welding, hydraulics, and
    preventive‑maintenance to lead small crews, mentor apprentices, and design systematic maintenance programs as she works toward a senior supervisory role.
  sports: Jacqueline Potts embraces fitness through weekly hikes in the Ozark hills, a Friday night slot in the local bowling league, and cheering for the St. Louis Cardinals, blending social camaraderie
    with personal endurance as part of her routine.
  arts: Jacqueline Potts channels her sociable spirit into karaoke nights, classic rock and country playlists featuring Lynyrd Skynyrd and Dolly Parton, and evenings curled up with mystery authors like
    Agatha Christie, while her DIY woodworking projects let her blend practicality with creative expression.
  travel: Jacqueline Potts prefers short, well‑planned road trips to nearby destinations such as Hot Springs National Park and Nashville, balancing a love for scenic hikes with weekend visits to county
    fairs, all while keeping travel expenses within her modest budget.
  culinary: Jacqueline Potts enjoys cooking comfort foods like fried chicken, shrimp étouffée, and cheesy grits, often incorporating fresh tomatoes, basil, and zucchini from her garden, and experiments
    with Southern twists on classic dishes while maintaining a moderately skilled but enthusiastic kitchen presence.
  core: Jacqueline Potts is a routine‑loving, people‑centered mechanic who balances meticulous work with community potlucks, occasional over‑commitment, and a knack for turning stress into yoga‑powered
    productivity.
background:
  cultural: Jacqueline was raised in Pilot Knob, a small town in Iron County, Missouri, within a close‑knit, predominantly white community rooted in Midwestern values of self‑reliance, modesty, and neighborly
    support. Her family background includes German and Irish ancestry, and she grew up attending a local Methodist church, where community service and fellowship were emphasized. The region’s tradition
    of hands‑on work, county fairs, and strong church involvement shaped her practical outlook, routine‑oriented mindset, and deep commitment to helping others. These cultural influences reinforce her preference
    for structured processes, compassionate collaboration, and active participation in local community life.
attributes:
