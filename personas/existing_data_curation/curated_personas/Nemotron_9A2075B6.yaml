  hobbies: '["Community potluck organization","Volunteer fire department support","Gardening and community garden upkeep","Hiking the Ozark hills","Yoga and mindfulness practice","DIY woodworking and tool
    restoration","Cooking and sharing southern recipes","Bowling league participation","Karaoke and local music events","Reading mystery and thriller novels"]'
  career_goals: Jacqueline aims to move into a senior supervisory role where she can design and oversee systematic maintenance programs for the plant, leveraging her love of routine and organization. She
    plans to obtain certifications such as the Certified Maintenance & Reliability Technician (CMRT) and advanced welding credentials to deepen her technical expertise. A long‑term ambition is to establish
    a mentorship program for new mechanics, fostering a supportive learning environment. She also envisions opening a small independent shop that provides affordable equipment repair services for local
    farms and businesses, allowing her to stay connected to her community while maintaining a balanced work schedule that reduces stress.
