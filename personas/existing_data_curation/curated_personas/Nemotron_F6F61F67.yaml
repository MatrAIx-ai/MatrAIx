personas:
  professional: Matthew Stancil, a 13‑year‑old aspiring comic‑artist and budding game world‑builder, blends his curiosity for storytelling with digital painting on his tablet and Minecraft design, and they
    channel that inventive energy into daily sketches, video edits, and occasional school art projects, often leaving a trail of crayons and unfinished drawings behind.
  sports: Matthew Stancil, a 13‑year‑old adventure enthusiast, spends weekends skateboarding at the downtown skate park with the Austin Youth Skate Crew, hikes the rugged trails around Lake Travis, and
    roots for the Austin FC soccer team while occasionally joining school basketball pick‑up games.
  arts: Matthew Stancil, a 13‑year‑old creative spark, draws comics inspired by Stan Lee’s storytelling, experiments with digital painting on his tablet while listening to Arctic Monkeys, The Strokes, Pink
    Floyd, and David Bowie, and they practice guitar in the evenings, often mimicking riffs from classic rock anthems.
  travel: Matthew Stancil, a 13‑year‑old with a love for spontaneous exploration, often takes weekend road trips with family to Austin’s music festivals, hikes the Texas Hill Country, and dreams of a future
    summer visit to Japan’s Akihabara district to soak up manga culture, preferring flexible itineraries over rigid schedules due to their relaxed attitude toward obligations.
  culinary: Matthew Stancil, a 13‑year‑old budding chef, favors bold flavors like tacos al pastor, cheesy mac and cheese, and garlic‑butter shrimp, enjoys tossing together avocado toast for quick breakfasts,
    and they can reliably follow YouTube tutorials to whisk up simple meals, though they sometimes forget to clean the stovetop afterward.
  core: Matthew Stancil, a 13‑year‑old who flips between comic sketching, Minecraft world‑building, and skateboard tricks, embraces a laid‑back, occasionally chaotic approach to school and life, and they
    never say no to a fresh indie rock riff.
background:
  cultural: 'Matthew grew up in Leander, a suburb of Austin in Travis County, Texas, within a family of European‑American heritage (German‑Italian roots). His upbringing reflects typical Texan suburban
    life: school sports events, community festivals like the Leander Rodeo, and family gatherings that blend church traditions with modern celebrations. While his household maintains a modest, middle‑class
    lifestyle, his exposure to the diverse cultural scene of nearby Austin—live music, street art, and tech start‑ups—feeds his curiosity about unconventional ideas and artistic expression.'
