  career_goals: Matthew hopes to turn his love for art and technology into a career as a multimedia creator, with ambitions to study graphic design or animation in college. He dreams of working on video‑game
    concept art or producing short animated films, but he prefers to keep his path flexible, exploring internships, online courses, and personal projects before committing to a specific major. He also thinks
    about using his artistic skills to raise awareness about environmental issues, reflecting his curiosity about new ideas and social impact.
