  hobbies: '[''Folklórico dance'', ''Salsa/cumbia dancing'', ''Recreational soccer'', ''Hiking in the Texas Hill Country'', ''Photography'', ''Cooking Mexican and Tex‑Mex cuisine'', ''Volunteering at bilingual
