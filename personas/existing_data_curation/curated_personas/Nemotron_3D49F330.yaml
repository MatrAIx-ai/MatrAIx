  career_goals: Raquel aims to advance from an entry‑level management analyst to a senior analytics consultant, eventually leading a cross‑functional data‑strategy team within a major corporation or consulting
    firm. She plans to deepen her technical expertise through a master’s degree in Data Science or an MBA focused on technology management. Her long‑term ambition is to leverage data analytics to drive
    social‑impact projects that support underrepresented communities in Texas, and she hopes to mentor other young Mexican‑American professionals entering STEM fields.
