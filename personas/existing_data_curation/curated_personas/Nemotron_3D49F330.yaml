personas:
  professional: Raquel Delossantos is a junior management analyst who leverages their bilingual fluency and strong analytical toolbox—including Python, R, SQL, and advanced Excel—to translate complex data
    into clear Tableau dashboards for cross‑functional teams, while assertively championing data‑driven recommendations and balancing meticulous organization with the flexibility to pivot on fast‑moving
    projects.
  sports: Raquel Delossantos enjoys Saturday evenings playing midfield for the Hill Country United mixed‑gender soccer club, where they assertively direct passes, cheers on Austin FC and the Dallas Mavericks,
    and keeps fit by hiking the Texas Hill Country trails with friends, combining competitive teamwork with solo endurance workouts.
  arts: Raquel Delossantos dances folklórico in community workshops to the rhythm of Celia Cruz and Los Ángeles Azules, assertively curates a personal photography portfolio of Hill Country landscapes, and
    immerses themselves in sci‑fi podcasts featuring authors like Ann Leckie, blending traditional performance with futuristic storytelling.
  travel: Raquel Delossantos explores weekend road trips to Enchanted Rock and the Austin music scene, assertively plans a backpacking adventure through Patagonia’s glaciers, and dreams of a study‑tour
    to San Miguel de Allende to enrich their cultural and linguistic fluency, balancing budget constraints with a taste for adventure.
  culinary: Raquel Delossantos cooks up chilaquiles with chipotle salsa and tacos al pastor with a Tex‑Mex twist, assertively experiments with fresh corn masa, avocado, and lime, while hosting family feasts
    that showcase their growing skill in balancing authentic flavors with contemporary flair.
  core: Raquel Delossantos is an energetic bilingual analyst who blends data‑driven rigor with a love for dance, soccer, and community cooking, navigating life with organized curiosity, occasional impulsive
    spending, and a habit of snapping hill‑top photos.
background:
  cultural: Raquel grew up in San Antonio’s vibrant Mexican‑American community, where her family celebrated traditions such as Día de los Muertos, Las Posadas, and quinceañeras. Bilingual in Spanish and
    English, she navigated both the rich heritage of her Mexican roots and the broader Texan culture, shaping a plural identity that values family closeness, community solidarity, and respect for elders.
    Her upbringing emphasized the importance of education as a pathway to upward mobility, making her a first‑generation college graduate who feels a strong responsibility to give back. The blend of Mexican
    culinary flavors, Catholic celebrations, and the lively street festivals of San Antonio infuses her worldview, influencing her collaborative style, her love for communal activities, and her desire to
    bridge cultural gaps in professional settings.
