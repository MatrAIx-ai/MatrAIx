persona_description: A researcher and medical scientist who is conducting clinical trials for a new cancer treatment, PV-10. The researcher has expertise in immunotherapies and cancer cell killing agents,
  and is interested in evaluating the efficacy and safety of PV-10 in patients with advanced melanoma. The researcher is conducting the Phase 1 study to assess the safety and effectiveness of PV-10 in injecting
  it into tumors, and is also conducting pre-clinical studies to understand the potential mechanisms of action of PV-10. The researcher is interested in understanding the potential benefits and drawbacks
  of PV-10 in treating melanoma, and is seeking to gather data to support the development of PV-10 as a potential treatment for melanoma.
