personas:
  professional: Johanna Dillon, a retired licensed practical nurse turned senior‑center coordinator, blends three decades of wound‑care expertise with meticulous event planning to lead community health
    workshops, while her Midwestern‑born love of structure and frontier‑spirit drive her assertive yet compassionate mentorship of younger volunteers.
  sports: Johanna Dillon, an avid early‑morning walker on Pryor Creek Trail and seasonal bird‑watcher, supports the Montana Grizzlies football team and the local Sheridan County High School basketball squad,
    participates in the seniors’ walking club at the senior center, and balances her gentle fitness routine with occasional community softball games during the summer fair.
  arts: Johanna Dillon, a dedicated quilter and historical‑fiction enthusiast, crafts patchwork blankets inspired by the patterns of traditional barn quilts while swapping stories with fellow book‑club
    members about novels by Larry McMurtry and Willa Cather, and enjoys the folk tunes of Alison Krauss and the classic country croon of Patsy Cline during her quilting sessions.
  travel: Johanna Dillon, a lover of scenic drives and modest wanderlust, has road‑tripped to Yellowstone and Glacier National Parks, fondly recalls a memorable family vacation to the Grand Canyon, dreams
    of visiting the historic towns of New Orleans and Savannah, and prefers to plan trips well in advance, balancing her budget with senior discounts and staying within a comfortable travel pace.
  culinary: Johanna Dillon, a hearty home‑cooker who grows tomatoes, beans, and basil in her garden, delights in preparing chicken‑and‑dumplings stew and fresh herb‑infused roasted vegetables, while her
    quilting afternoons often end with a generous serving of homemade apple pie, albeit she occasionally relies on a convenient frozen pizza when garden yields run low.
  core: Johanna Dillon embodies the disciplined, community‑centered spirit of a lifelong farm‑raised caregiver, whose love of routine is balanced by a warm sociability, a penchant for coupon clipping, and
    a stubborn habit of forgetting to water her garden when a community event runs late.
background:
  cultural: Johanna’s cultural background is rooted in the Midwestern farming traditions of her German‑American ancestors who settled in North Dakota in the early 20th century. She grew up on a family wheat
    farm, where the values of self‑reliance, hard work, and tight‑knit community were emphasized. After marrying and moving to Raymond, Montana in her thirties, she embraced the rural Western lifestyle,
    participating in local church life (United Methodist) and the Sheridan County fair. She respects the region’s Native American heritage and regularly collaborates with nearby tribal elders on community
    health initiatives. Her identity blends Midwestern pragmatism with Western frontier spirit, manifesting in a strong sense of duty to her neighbors and a deep appreciation for the land.
