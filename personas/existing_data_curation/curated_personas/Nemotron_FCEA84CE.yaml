  hobbies: '[''vegetable gardening'', ''quilting'', ''reading historical fiction'', ''book club participation'', ''bridge'', ''attending county fair and church socials'', ''hiking'', ''birdwatching'', ''cooking'',
    ''volunteering at senior center'']'
  career_goals: Although formally retired, Johanna aims to deepen her involvement in community health by establishing a peer‑support group for older adults in Sheridan County, offering workshops on medication
    safety, nutrition, and fall prevention. She also hopes to mentor younger volunteers and aspiring LPNs through informal apprenticeships at the health center. Over the next few years she plans to secure
    a small grant to expand the senior center’s activity program, ensuring that it remains a hub for social interaction and practical learning. Her broader ambition is to leave a lasting framework that
    helps future generations maintain health, independence, and community connection in rural Montana.
