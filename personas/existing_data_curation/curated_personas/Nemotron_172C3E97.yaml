personas:
  professional: Robert Harris, an aspiring young engineer, channels his curiosity into building elaborate LEGO vehicles and experimenting with Scratch code, blending practical problem‑solving with a relaxed
    attitude toward school projects and occasional disorganization.
  sports: Robert Harris, a member of the Coastal Sharks youth swim team and the Riverbend Bike Club, enjoys casual soccer with the Sunnyvale Tigers, balancing regular swimming laps, weekend bike rides,
    and occasional fishing trips with a love for outdoor activity and a laid‑back approach to competition.
  arts: Robert Harris, a budding visual storyteller, spends afternoons sketching fantastical scenes inspired by Jules Verne novels and the vivid worlds of Studio Ghibli filmmaker Hayao Miyazaki, while his
    playlist often includes upbeat tunes from The Beatles and playful rhythms of The Wiggles.
  travel: Robert Harris loves exploring nearby Sandy Cove Beach and the Redwood Trail, and dreams of snorkeling the Great Barrier Reef in Australia and touring the historic castles of Scotland, reflecting
    a travel style that mixes local adventure with imaginative, far‑flung aspirations.
  culinary: Robert Harris, a self‑appointed kitchen assistant, frequently makes cheesy mac‑and‑cheese with extra cheddar, assembles fish sticks with tartar sauce for family dinners, and crafts banana‑strawberry
    smoothies using fresh strawberries, showing a developing enthusiasm for cooking that mixes simplicity with occasional experimental toppings like crushed pretzels.
  core: Robert Harris, an endlessly curious eight‑year‑old who builds LEGO worlds, codes in Scratch, and explores beaches with a calm, slightly disorganized flair, epitomizes a balance between imagination
    and practicality.
background:
  cultural: 'Robert grows up in a white, middle‑class family in Milton, Florida, a small town on the Gulf Coast of the Florida Panhandle. His household reflects a blend of Southern hospitality and coastal
    living: family meals often feature local seafood like shrimp and grouper, and community events such as Fourth of July parades, church gatherings, and school fairs are common. He attends the local public
    elementary school, where the curriculum emphasizes reading, basic math, and hands‑on science activities. Outside school, his family encourages outdoor exploration, weekend trips to the beach, and participation
    in community programs like the local library’s storytime and the county’s youth nature workshops. These cultural influences shape his appreciation for nature, modest values, and a relaxed, flexible
    outlook on responsibilities.'
