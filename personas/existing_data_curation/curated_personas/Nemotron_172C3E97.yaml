  hobbies: '[''LEGO construction'', ''Beachcombing and nature walks'', ''Shell and rock collecting'', ''Reading adventure/science books'', ''Drawing and sketching'', ''Minecraft and Scratch coding'', ''Swimming
    and biking'', ''Fishing with family'', ''Elementary school science club'']'
  career_goals: Robert dreams of a future where he can blend his love of the outdoors with technology. He aspires to become an astronaut or a marine biologist who uses robotics to explore the deep sea,
    hoping one day to design machines that can study ocean life while also contributing to space missions. He is also fascinated by video‑game design and imagines creating educational games that teach kids
    about wildlife. These goals reflect his practical curiosity—he wants to turn imaginative ideas into real, helpful tools.
