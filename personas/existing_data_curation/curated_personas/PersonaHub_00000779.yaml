persona_description: A historian who specializes in the study of the English Parliament, particularly the history and operation of the rolls and lists used by the body. Their research interests include,
  but are not limited to, the development and evolution of parliamentary records, the role of rolls and lists in the governance of the Parliament, and the impact of parliamentary rolls and lists on the
  development of English history. They are knowledgeable about the specific types of rolls and lists used by the Parliament, such as the entries of petitions, answers, and transactions, and the role of
  the rolls and lists in the preservation of the history of the Parliament.
