personas:
  professional: Cynthia Harkley is an organized dental‑ophthalmic laboratory technician who blends meticulous hand‑wax craftsmanship with digital CAD/CAM workflows, leverages strict ISO 13485 and OSHA compliance,
    and mentors new staff while pursuing CDT certification and a future supervisory role to deliver low‑cost, high‑quality prosthetics for underserved patients.
  sports: Cynthia Harkley enjoys weekend hikes through the Atchafalaya Basin, follows the New Orleans Saints in football and the LSU Tigers in college sports, participates in a local running club that meets
    twice weekly, and maintains a structured fitness regimen of morning yoga and evening brisk walks to counterbalance the sedentary nature of lab work.
  arts: Cynthia Harkley channels creativity into crocheting intricate patterns, sings in her church choir, and finds inspiration from artists such as Beyoncé, Adele, and the Cajun fiddler BeauSoleil, while
    winding down with self‑help titles by Brené Brown and health‑science books by Dr. Michael Greger.
  travel: Cynthia Harkley plans trips with meticulous checklists, preferring short road trips to Gulf Coast cities like New Orleans and Biloxi for their culinary scenes, dreaming of a cultural retreat to
    Asheville’s mountain arts festivals and a research‑focused visit to Berlin’s 3D‑printing hub, all while staying within a modest budget tracked in their journal.
  culinary: Cynthia Harkley cooks Southern comfort meals with precision, perfecting gumbo (okra, andouille sausage, smoked turkey) and collard greens (slow‑cooked with ham hocks), favoring fresh local ingredients
    and occasional Creole twists, and enjoys occasional dining out at the family‑run Mama’s Kitchen for beignets and shrimp po’boys.
  core: Cynthia Harkley is a methodical, compassionate lab technician who balances meticulous craftsmanship with community service, yet often battles stress‑induced worry that fuels both their disciplined
    routines and occasional over‑planning.
background:
  cultural: Cynthia identifies as African‑American and grew up in Lafayette’s close‑knit black community, where Southern hospitality and church life are central. Her family traces its roots to the Great
    Migration, and she was raised on a blend of African‑American traditions—gospel music, soul food, and storytelling—and the distinctive Cajun/Creole culture of Acadiana. Weekly church services, spoken‑word
    poetry nights, and neighborhood block parties have reinforced a strong sense of communal responsibility and resilience. The richness of Louisiana’s culinary heritage, from jambalaya to po’boys, informs
    her love of cooking, while local festivals like the Lafayette Mardi Gras reflect her appreciation for cultural celebration. These experiences have nurtured Cynthia’s compassionate outlook, her appreciation
    for diverse perspectives, and her commitment to giving back to the community that supported her.
attributes:
  skills: '[''Dental prosthetic fabrication (crowns, bridges, dentures)'', ''CAD/CAM design using Exocad/3Shape'', ''Ophthalmic lens grinding and tinting'', ''Quality inspection (microscopy, dimensional
    analysis)'', ''Regulatory compliance (ISO 13485, OSHA)'', ''Laboratory inventory and equipment maintenance'', ''Troubleshooting of CNC milling machines and software'', ''Accurate documentation and patient
    record keeping'', ''Team collaboration and cross‑disciplinary communication'', ''Mentoring and training of new staff'']'
  hobbies: '[''Crocheting and knitting'', ''Journaling and goal tracking'', ''Reading self‑help and health‑science books'', ''Volunteering at community health fairs'', ''Cooking Southern cuisine (gumbo,
    collard greens)'', ''Singing in church choir'', ''Hiking the Atchafalaya Basin trails'', ''Puzzling (crossword and Sudoku)'']'
  career_goals: Cynthia aims to complete her associate degree in dental technology and obtain the Certified Dental Technician (CDT) credential within the next two years. She aspires to move into a supervisory
    or lab‑manager role where she can shape workflow standards, implement digital dentistry initiatives, and mentor junior staff. Long‑term, she envisions opening a small, community‑focused dental‑ophthalmic
    laboratory that serves underserved patients in Lafayette Parish, integrating low‑cost, high‑quality prosthetics. She also hopes to contribute to research on improving material biocompatibility and to
    participate in health‑fair outreach programs that educate residents about oral and visual health. Balancing professional growth with personal well‑being, she plans to develop stress‑management practices
    and maintain a steady work‑life rhythm.
