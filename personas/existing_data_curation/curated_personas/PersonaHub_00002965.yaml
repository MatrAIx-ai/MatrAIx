persona_description: A scientist who is passionate about studying the deep history of the Earth and Antarctica, particularly the changes in the climate and the ice sheets. They are experienced in drilling
  and have a deep understanding of geology and paleoclimate. They are currently working on a US$30 million project called ANDRILL, which aims to drill deep cores beneath one of Antarctica's ice shelves,
  the Ross Ice Shelf. They are a part of the US McMurdo base and are responsible for the drilling process, photographing and analyzing the cores, and packing up the equipment at the end of the drilling
  season.
