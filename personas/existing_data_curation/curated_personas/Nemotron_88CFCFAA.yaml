personas:
  professional: Ana Medina, a budding web developer and math tutor, blends curiosity with practicality by building simple educational websites for her blog and guiding younger students through problem-solving,
    while her organized yet flexible approach lets her juggle coding, tutoring, and schoolwork without missing deadlines.
  sports: Ana Medina, an avid hiker on Lebanon County's Blue Mountain Trail and a seasonal fan of the Philadelphia Eagles and the Philadelphia 76ers, joins the local youth soccer club on weekends, preferring
    low-key team practices over crowded gym sessions, and tracks her steps with a smartwatch to stay balanced.
  arts: Ana Medina, an enthusiastic amateur watercolorist and acoustic-guitar self-teacher, draws inspiration from Vincent van Gogh's brushwork and Joni Mitchell's folk melodies, while also enjoying the
    storytelling of Hayao Miyazaki's Studio Ghibli films and the lyrical depth of Lin-Manuel Miranda's musical theatre, which together shape her creative sketches and original song snippets.
  travel: Ana Medina favors purposeful, low-budget trips that combine cultural immersion with nature, such as her family's weekend road-trip to Washington, D.C., a solo hike through the Shenandoah National
    Park, and her dream of backpacking across the historic towns of the Cotswolds, always planning itineraries with a mix of maps and spontaneous detours.
  culinary: Ana Medina, a modest home cook, favors comforting Italian-American dishes like spaghetti carbonara, homemade banana bread, and stir-fried lo mein, relishes fresh basil, citrus zest, and dark
    chocolate in her pantry, and routinely experiments with watercolor-inspired plating, though she often burns toast when distracted by a new coding project.
  core: Ana Medina is a quietly ambitious 15-year-old who balances scientific curiosity, artistic expression, and disciplined routine, yet she can't resist staying up late scrolling through coding tutorials,
    leaving a half-finished watercolor on her desk.
background:
  cultural: Ana’s cultural background is rooted in her Puerto Rican heritage, which shapes her family life, language, and values. At home, Spanish is spoken alongside English, allowing her to maintain a
    bilingual identity. Family gatherings feature traditional foods such as arroz con gandules, lechón, and pasteles, and celebrations of holidays like Three Kings Day (Día de los Reyes) and Puerto Rico’s
    Independence Day keep her connected to island traditions. Her parents emphasize close‑knit family bonds, respect for elders, and a strong sense of community, often extending support to neighbors and
    the local church. Living in Lebanon, Pennsylvania, Ana blends these cultural influences with small‑town American life, participating in community events at the local library and school while also attending
    occasional Latin dance workshops at a nearby cultural center. This dual exposure fosters a multicultural perspective that she carries into her schoolwork and personal interests.
