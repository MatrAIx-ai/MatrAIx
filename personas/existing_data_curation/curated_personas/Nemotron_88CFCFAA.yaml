  hobbies: '[''Reading science‑fiction and historical biographies'', ''Journaling personal reflections'', ''Drawing and watercolor painting'', ''Playing acoustic guitar'', ''Introductory coding and website
    creation'', ''Tutoring younger students in mathematics'', ''Hiking local nature trails'', ''Creating content for personal blog'']'
  career_goals: Ana aims to build on her curiosity for science and her practical mindset by pursuing a career in biomedical engineering. In the medium term, she plans to graduate high school with a strong
    STEM record, earn a scholarship, and enroll in a university program that merges engineering principles with health‑care applications. She envisions designing affordable medical devices or prosthetics
    that serve under‑represented communities, particularly those with a high Latino population. To reach this goal, she intends to participate in STEM enrichment camps, seek mentorship from professionals,
    and gain hands‑on experience through internships or volunteer work in hospitals or research labs.
