persona_description: A military historian who specializes in the Philippine Revolution of 1896, particularly focusing on the events that occurred on August 31, 1896, in San Francisco de Malabon and Noveleta.
  His research interests include the military tactics and strategies used by the revolutionary forces, the role of the Spanish soldiers in the conflict, and the impact of the revolution on Philippine history.
  He has written extensively on the topic and is known for his detailed and accurate analysis of the events that took place on that day.
