personas:
  professional: Viola Jones is a budding robotics enthusiast who builds LEGO robotics kits and programs Scratch games, channeling her competitive spirit and methodical planning into every circuit she designs,
    while dreaming of one day engineering smart devices that solve real-world puzzles.
  sports: Viola Jones participates in the after‑school swim team at Riverside Middle School and avidly follows the local Major League Baseball franchise, the Chicago Cubs, cheering them during weekend games
    while also keeping a notebook of wildlife sightings during her family hikes, which she treats as her personal field‑research project.
  arts: Viola Jones immerses herself in mystery novels by Agatha Christie, sketches intricate forest scenes inspired by the works of Winslow Homer, and practices piano pieces by Ludwig van Beethoven, finding
    solace in the structured melodies while her competitive edge drives her to perfect every note.
  travel: Viola Jones loves weekend nature walks in the nearby state park, where she catalogs birds and collects pine cones, and dreams of visiting the Redwood National Forest and the historic castles of
    Scotland, planning each trip with a detailed itinerary despite a limited allowance.
  culinary: Viola Jones prefers simple but hearty meals like homemade mac and cheese with a pinch of smoked paprika, enjoys baking chocolate chip cookies using her grandmother’s recipe, and occasionally
    experiments with creating a ‘robotics-themed’ smoothie using blueberries and spinach to fuel her coding sessions.
  core: Viola Jones is a curiosity‑driven yet anxiety‑prone twelve‑year‑old who balances competitive robotics and chess with solitary sketching and piano, meticulously plans everything, but occasionally
    lets emotional spirals disrupt her sleep and budgeting.
background:
  cultural: Viola grows up in a white, Southern family in Hickory, North Carolina. Her household values community church attendance, Southern hospitality, and family gatherings featuring traditional dishes
    like fried chicken and collard greens. She participates in local events such as the Catawba County fair and enjoys Appalachian folk music and storytelling passed down through generations. While she
    embraces modern media and technology, she also respects the region's rural heritage, balancing contemporary interests with the close‑knit, values‑driven culture of her hometown.
attributes:
  skills: '["Time management and planner use", "Reading comprehension", "Creative writing", "Scratch programming", "Intermediate piano playing", "Puzzle solving", "Basic scientific inquiry", "Team collaboration
