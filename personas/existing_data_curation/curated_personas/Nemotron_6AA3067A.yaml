  hobbies: '["Reading mystery novels", "LEGO robotics building", "Piano practice", "Sketching nature", "Daily journaling", "Nature walks", "Science club projects", "Chess and strategic board games"]'
  career_goals: Viola dreams of a future that merges her curiosity with practical problem‑solving. She aspires to become a biomedical engineer or a veterinarian, hoping to develop medical tools that improve
    animal health. She is determined to excel academically, win her middle‑school science fair, and earn a scholarship to a top STEM high school. Long‑term, she envisions leading research projects that
    blend biology and technology while also mentoring younger students in science clubs.
