personas:
  professional: Jose Estebanez is a meticulous mechanical assembler and CNC operator whose precision hand‑tool skills, lean‑manufacturing mindset, and bilingual communication make them a calm, methodical
    leader on the shop floor, and they are actively pursuing Six Sigma Green Belt certification to transition into a production team lead role.
  sports: Jose Estebanez finds solace in solitary outdoor activity, regularly hiking the Blue Ridge foothills and joining a local trail‑running club for early‑morning runs, while cheering quietly for the
    Carolina Panthers on game nights and occasionally participating in a weekend community yoga class to balance the physical demands of their fabrication work.
  arts: Jose Estebanez channels a deep appreciation for storytelling and craftsmanship into watercolor paintings of misty mountain valleys, detailed sketches of historic buildings, and hand‑crafted wooden
    sculptures that echo the motifs of their childhood festivals, drawing inspiration from artists such as Frida Kahlo and Andrew Wyeth, and they follow the work of emerging Southern photographers on Instagram.
  travel: Jose Estebanez prefers off‑season, culturally immersive trips, having trekked the Andes during the quiet months after Carnaval, savored the culinary scene of Oaxaca, and explored the historic
    streets of Seville, while planning future visits to the Scottish Highlands to photograph rugged coastlines, all while balancing travel costs with a strict savings plan.
  culinary: Jose Estebanez delights in cooking hearty traditional dishes like bandeja paisa and sancocho, using fresh vegetables from their garden and premium locally sourced pork, while also mastering
    Southern smoked brisket at family barbecues, and they savor a daily cup of hand‑ground coffee brewed with beans roasted to honor their family’s coffee rituals.
  core: Jose Estebanez is a solitary‑minded, detail‑driven craftsman who blends precise mechanical expertise with artistic curiosity, channeling a quiet determination into both work and personal passions,
    even as they wrestle with occasional worry and a penchant for meticulous planning.
background:
  cultural: José grew up in a Colombian household that valued family cohesion, Catholic traditions, and a deep appreciation for art and music. He speaks Spanish fluently and celebrates Colombian holidays
    such as Carnaval de Barranquilla and Día de la Independencia with traditional foods, music (cumbia, vallenato), and coffee rituals. The Colombian emphasis on craftsmanship and storytelling influences
    his artistic interests. Since relocating to Fort Mill, SC, he has blended these roots with Southern hospitality, participating in the local Latino community while also embracing Southern customs like
    barbecues and outdoor gatherings. His bicultural experience enriches his worldview, informing both his professional approach and personal passions.
attributes:
  skills: '[''Mechanical Assembly'', ''Fabrication & Welding'', ''CNC Machine Operation'', ''Blueprint Reading'', ''Quality Assurance'', ''Lean Manufacturing'', ''Process Optimization'', ''Inventory Management'',
    ''Cost Estimation'', ''Project Scheduling'', ''Safety Compliance'', ''Technical Documentation'', ''Bilingual Communication (Spanish/English)'']'
  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Digital Photography'', ''Woodworking'', ''Philosophy & Mindfulness Reading'', ''Journaling'', ''Cooking Colombian Cuisine'', ''Gardening'', ''Hiking'',
    ''Listening to Classical and Latin Jazz'']'
  career_goals: José aims to move from his current assembler/fabricator role into a supervisory position, such as Production Team Lead or Lean Manufacturing Coordinator, where he can blend his hands‑on
    technical expertise with his business knowledge to drive efficiency and reduce waste. He plans to earn a Six Sigma Green Belt certification and advanced CNC programming credentials within the next two
    years. Long‑term, he dreams of opening a boutique metal‑fabrication workshop that creates custom art pieces inspired by Colombian cultural motifs, providing mentorship to young artisans and offering
    a quiet, fulfillment‑focused work environment for himself and his family.
