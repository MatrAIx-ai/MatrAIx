personas:
  professional: James Jackson, a two‑year‑old who meticulously arranges his building blocks into precise patterns, already shows a budding love for engineering and problem‑solving, balancing imaginative
    play with practical, methodical steps, and they often double‑check each tower for stability before moving on.
  sports: James Jackson, a two‑year‑old who rushes onto the preschool soccer field with enthusiasm and proudly wears a cap of the local Springfield Sox, prefers organized play over chaotic free‑run, yet
    sometimes gets anxious in noisy crowds, and they cheer loudly when their team scores in the background.
  arts: James Jackson, a budding little artist who loves drawing dinosaurs with crayons, sings loudly along to Baby Shark, and insists on arranging his art supplies by color, finds comfort in creative order
    while occasionally demanding extra screen time, and they proudly display their finished drawings on the fridge.
  travel: James Jackson, who delights in stroller walks through the city’s botanical garden and weekend trips to his grandmother’s seaside cottage in Maine, prefers well‑planned outings with familiar faces
    and becomes unsettled in crowded airports, and they often point excitedly at new flowers they see along the way.
  culinary: James Jackson, a picky eater who favors soft mashed sweet potatoes, banana slices, and mild chicken nuggets, insists on using his tiny silver fork for self‑feeding but secretly reaches for a
    hidden piece of chocolate when unsupervised, and they sigh contentedly after each bite of their favorite comfort food.
  core: James Jackson is a meticulously curious two‑year‑old who balances imaginative play with methodical habits, worries over minor setbacks, constantly seeks order in his tiny world, and they often line
    up their toys before bedtime.
background:
  cultural: James is raised in a middle-class white family in Las Vegas, Nevada. His parents are both employed in stable, service-oriented jobs, his mother works as a nurse at a local clinic and his father
    is a maintenance technician at a hotel. The household follows mainstream American customs, celebrating holidays such as Thanksgiving, Christmas, and the Fourth of July, and they often visit local attractions
    like the Discovery Children's Museum and Red Rock Canyon for family outings. Living in a city known for its entertainment industry, James is regularly exposed to bright lights, colorful shows, and a
    diverse culinary scene, which adds a subtle multicultural flavor to his otherwise typical suburban upbringing. The family places a high value on routine, cleanliness, and organized spaces, which mirrors
    James's own methodical temperament.
