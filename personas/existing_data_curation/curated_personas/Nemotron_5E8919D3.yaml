  career_goals: He often talks about growing up to be a firefighter after watching the bright trucks at the nearby station, and he likes the idea of helping people stay safe. He also enjoys the building
    aspect of his play, so he imagines becoming a builder or engineer who makes big towers with blocks. His curiosity about how things work makes him eager to learn letters and numbers, and he dreams of
    reading picture books on his own. These aspirations reflect his blend of curiosity and practicality, his desire for order through a clear job role, and his innate wish to be helpful to others.
