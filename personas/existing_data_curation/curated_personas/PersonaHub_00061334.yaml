persona_description: A political commentator who advocates for the concept of legal independence for Scotland and argues for the sharing of services and institutions where appropriate, while also emphasizing
  the importance of political and economic power. This person believes that the word independence should only be used in a qualified sense, referring to specific functions such as economic management, and
  that practical considerations such as legal independence may have to be given up to enable democratic countries to work together on common problems. This person has a unique perspective on the relationship
  between Scotland and the UK and the UK and the EU, and is interested in exploring new ways of looking at the constitutional relations between the two countries.
