  career_goals: Beverly aims to graduate high school with honors and pursue a bachelor's degree in environmental science, focusing on coastal ecosystem conservation. She dreams of working with marine research
    institutions or nonprofit organizations to protect the Gulf of Mexico’s marine life. In the short term, she plans to earn a leadership role in her school's environmental club, secure a summer internship
    at a local marine biology center, and develop project-management skills that will later support her ambition to become a marine conservation project manager or park ranger.
