personas:
  professional: Beverly Mejia, a budding marine‑science enthusiast, channels her organized, methodical mindset and love for the Gulf Coast’s oceanic ecosystems into meticulous sketching of marine life,
    detailed beach‑cleanup logs, and a summer internship at the local aquarium, where she consistently meets deadlines and thrives in collaborative research projects.
  sports: Beverly Mejia stays active by playing midfield for her middle‑school soccer team, joining a weekend beach‑volleyball club that practices at Pensacola Beach, cheering on the Pensacola Blue Wahoos
    during baseball season and the Miami Dolphins in the fall, while balancing her schedule with a disciplined weekly conditioning routine that blends sprint drills and yoga stretches to maintain stamina.
  arts: Beverly Mejia expresses her creative side through detailed watercolor sketches of turtles and reef fish inspired by the works of marine illustrator Wyland, while she jams to The Beach Boys and Jimmy
    Buffett on a portable speaker during beach trips, binge‑watches sci‑fi series like The Expanse, and participates in the local arts‑and‑crafts fair where she showcases her Minecraft‑themed mini‑sculptures.
  travel: Beverly Mejia loves structured family getaways to Gulf‑side spots such as Destin and the Florida Keys, delighting in snorkeling at the John Pennekamp Reef, while she dreams of a future adventure
    to the Caribbean island of Grand Cayman, planning every itinerary in a detailed travel journal but also leaving room for spontaneous beach clean‑ups during trips.
  culinary: Beverly Mejia enjoys savoring fresh shrimp po’boys drizzled with remoulade and topped with crisp lettuce, relishes homemade fish tacos seasoned with lime, cilantro, and a spicy mango salsa,
    and, though a novice cook, often experiments with tropical smoothies blending pineapple, coconut milk, and chia seeds after school.
  core: Beverly Mejia blends a sunny, structured outlook with an unstoppable social energy, yet occasionally over‑indulges in late‑night Minecraft sessions, forgetting to finish homework until the early
    morning.
background:
  cultural: Beverly comes from a white, middle-class family in Pensacola, Florida, where the Gulf Coast lifestyle and Southern hospitality shape daily life. Growing up near the Naval Air Station and the
    historic downtown, she is accustomed to a community that values both military discipline and neighborly support. The coastal environment fosters a strong appreciation for the ocean, marine wildlife,
    and outdoor recreation, while local schools emphasize academic achievement and civic involvement. Her family’s traditions include seasonal beach trips, participation in community events, and a focus
    on education as a pathway to a stable future.
