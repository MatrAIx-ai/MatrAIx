  hobbies: '[''Woodworking'', ''Vegetable gardening'', ''Model train building'', ''Local history and genealogy research'', ''Reading historical non-fiction'', ''Fishing at the Wapakoneta River'', ''Crossword
    puzzles'', ''Classic car restoration'', ''Collecting vintage radios'']'
  career_goals: Although retired, David aims to preserve his self‑reliance and physical independence for as long as possible. He plans to compile his life stories and practical knowledge into a memoir for
    his grandchildren, ensuring his skills are passed down. He hopes to win a small accolade at the county fair—such as best restored classic car or best pumpkin—reflecting his competitive streak while
    staying grounded in realistic, immediate goals. David also wants to donate a few handcrafted wooden pieces to the local historical society, creating a modest, tangible legacy for his community.
