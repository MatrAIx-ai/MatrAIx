  career_goals: Edward aims to advance within the mental‑health field by earning an associate degree in Psychiatric and Mental Health Nursing and obtaining Certified Psychiatric Technician credentials within
    the next three years. He aspires to become a shift supervisor, overseeing patient care operations and mentoring new aides. Leveraging his artistic curiosity, he plans to launch an art‑therapy outreach
    program that integrates visual arts into patient recovery at his hospital and the wider Cape Girardeau community. Long‑term, Edward envisions moving into facility management as a unit manager while
    continuing to champion creative, patient‑centered interventions.
