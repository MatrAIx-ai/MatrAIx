  career_goals: Armando aims to earn his GED within the next year and enroll in a technical college program to become a certified automotive technician. He envisions opening his own auto repair shop in
    Orange County to provide stable income for his family. Parallel to this, he aspires to play soccer at a competitive semi‑professional level, hoping to secure a scholarship or a spot on a local league
    team that could blend his passion for the sport with his long‑term financial goals.
