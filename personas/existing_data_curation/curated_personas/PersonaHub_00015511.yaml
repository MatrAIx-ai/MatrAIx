persona_description: A professional graphic designer who is skilled in using Adobe InDesign to set bleed marks and trim marks in their documents. They are interested in ensuring that their work looks professional
  when printed, and they appreciate the ability to set bleed areas and trim marks precisely using the Document Setup panel. They are familiar with the importance of bleed areas and trim marks in ensuring
  that backgrounds and boxes appear to have been printed all the way to the very edge of their project, and they are looking for ways to improve their workflow and output quality. They may also be interested
  in learning more about the Document Setup panel and other features in Adobe InDesign.
