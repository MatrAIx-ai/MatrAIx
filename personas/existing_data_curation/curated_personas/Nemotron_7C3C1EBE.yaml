  career_goals: Approaching retirement, Esther aims to transition from full‑time classroom teaching to a mentorship and community‑learning role. She plans to earn a certificate in educational leadership,
    lead a local after‑school enrichment program focused on STEM and arts for underserved students, and develop a reading mentorship network that pairs senior volunteers with elementary readers. She also
    hopes to document and share her hands‑on teaching methods through workshops for neighboring districts, ensuring her practical, curiosity‑driven approach continues to benefit future educators.
