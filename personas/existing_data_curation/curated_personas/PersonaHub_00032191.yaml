persona_description: A SQL developer who specializes in creating and managing SQL operators and their bindings. This person has a deep understanding of the Oracle database and its SQL syntax, and is skilled
  in creating complex and efficient SQL statements. They have experience with overloading operators and their bindings, and are familiar with the Oracle database's implementation types and context clauses.
  They are also proficient in using functions and packages, and are able to create functional implementations and operators that can be used in a variety of SQL statements. This person is likely to be interested
  in the Oracle SQL Reference, and is familiar with the SQL syntax and syntax rules.
