  hobbies: '["Sketching","Digital Painting","Writing Poetry and Short Stories","Reading Fantasy and Speculative Fiction","Improv and Theater Workshops","Playing Narrative‑Driven Indie Video Games","Hiking
    Local Trails and Exploring Murals","Volunteering at Community Library for Teen Art Programs","Curating Music Playlists","DIY Craft Projects"]'
  career_goals: Catheryn aims to complete her GED and enroll in a community‑college program for graphic design or illustration. She dreams of becoming a concept artist for video games or animation, and
    eventually launching a freelance portfolio that lets her merge art with social impact. Her long‑term ambition includes running community art workshops in Decatur to help other teens express themselves
    creatively and cope with stress, while building a sustainable career that balances creative freedom with collaborative projects.
