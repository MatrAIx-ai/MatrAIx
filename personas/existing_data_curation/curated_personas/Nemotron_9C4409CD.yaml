personas:
  professional: Catheryn Cox, an aspiring concept artist still in high school, channels her sketching, digital illustration (Procreate, Canva), and storytelling talents into collaborative teen art workshops,
    turning her relaxed, improvisational nature into spontaneous brainstorming sessions that keep peers engaged and her own portfolio buzzing with experimental character designs.
  sports: Catheryn Cox, a teen who swaps her sketchpad for a basketball during after‑school pick‑up games at Decatur’s Warren Park, follows the Atlanta United soccer team and the Georgia Tech Yellow Jackets
    for seasonal excitement, and joins a weekend trail‑running club that explores the Fernbank Nature Trails to stay active while socializing with friends.
  arts: Catheryn Cox, a 16‑year‑old visual storyteller, immerses herself in the worlds of Studio Ghibli, Hayao Miyazaki, and indie game art by Toby Fox, draws inspiration from musicians like Tame Impala,
    Lizzo, and the haunting scores of Hans Zimmer, and regularly attends improv workshops at the Decatur Arts Center, where she channels the spirit of improvisational legends like Robin Williams into her
    own sketch and narrative projects.
  travel: Catheryn Cox, an adventurous teenager who plans trips on a doodled map in her journal, loves weekend road trips to Savannah’s historic squares, annual visits to Asheville’s art colonies, and dreams
    of a solo journey to Kyoto for anime art immersion, yet balances these wanderlust plans with a family budget that often limits flights to nearby destinations.
  culinary: Catheryn Cox, a budding home‑cook who can whip up a flawless peach cobbler, craft spicy ramen bowls with miso broth, and experiment with oat‑milk latte art on the side, prefers fresh basil,
    smoked paprika, and dark chocolate in her creations, and often threads her love for flavor into art club potlucks where she trades recipes as easily as sketchbooks.
  core: Catheryn Cox, a 16‑year‑old dreamer whose sketchbook is never far from her backpack, fuses Southern hospitality with eclectic indie vibes, juggling midnight gaming marathons, spontaneous art sessions,
    and occasional anxiety‑driven over‑thinking.
background:
  cultural: Catheryn grew up in Decatur, GA, a suburb of Atlanta known for its vibrant arts scene and diverse community. Though her family identifies as white and carries traditional Southern values such
    as hospitality and close‑knit family ties, she has been shaped by the multicultural atmosphere of DeKalb County. Local coffee shops, community murals, and seasonal festivals have exposed her to a blend
    of Southern charm and contemporary urban culture. She occasionally participates in church gatherings with her family, but her personal identity is strongly tied to the creative, progressive vibe of
    her neighborhood and the supportive friendships she has cultivated through school clubs and youth programs.
attributes:
  skills: '["Creative Writing","Sketching and Illustration","Digital Art Basics (Procreate, Canva)","Storyboarding","Group Facilitation","Empathy‑Based Conflict Mediation","Basic Photography","Social Media
