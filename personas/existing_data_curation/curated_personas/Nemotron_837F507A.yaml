  hobbies: '[''Community basketball'', ''Hiking in Shasta-Trinity National Forest'', ''Community gardening'', ''Cooking traditional East Asian cuisine'', ''Volunteering at local food bank'', ''Tai Chi practice'',
    ''DIY woodworking projects'']'
  career_goals: Chong aims to progress to a shift‑supervisor role within the next few years, gaining a Certified Production Technician (CPT) credential and an associate degree in manufacturing technology
    through night courses. He aspires to spearhead process‑improvement projects that reduce waste and increase throughput, eventually transitioning into a production‑manager position. Long‑term, he dreams
    of opening a modest custom‑fabrication workshop that serves local artisans and community projects, allowing him to combine his technical expertise with his desire to help others succeed.
