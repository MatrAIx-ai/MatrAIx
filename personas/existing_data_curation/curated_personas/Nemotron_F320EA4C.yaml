  hobbies: '[''Playing soccer in a local league'', ''Salsa dancing'', ''Cooking Mexican and Tex-Mex cuisine'', ''Fishing at Galveston Bay'', ''Hiking coastal trails'', ''Participating in community festivals'',
    ''Online multiplayer gaming'', ''Reading fantasy literature'', ''Volunteering at a community center'']'
  career_goals: Roberto aims to deepen his impact on curriculum design by pursuing a master's degree in Educational Leadership within the next two years. He envisions transitioning into a curriculum specialist
    role where he can develop flexible, project‑based modules that blend academic rigor with cultural relevance, especially for Mexican‑American students. Long‑term, he aspires to become a school principal
    or district coordinator, championing equitable resources, expanding bilingual programs, and fostering a collaborative culture among staff. He also hopes to mentor more novice teachers and lead professional‑development
    initiatives that emphasize practical, student‑centered strategies.
