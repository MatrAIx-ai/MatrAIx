  hobbies: '[''Abstract Watercolor Painting'', ''Poetry Writing'', ''Classical Piano Playing'', ''Philosophical Reading'', ''Mindfulness Meditation'', ''Herb Gardening'', ''Birdwatching'', ''Solo Art Gallery
    Visits'', ''Experimental Cooking'', ''Virtual Science Lectures'']'
  career_goals: She aims to integrate her love of art and science by establishing a medical humanities fellowship at her institution, publishing interdisciplinary articles that link visual arts to patient
    outcomes, and leading a longitudinal study on physician mental‑health resilience. Over the next five years, she hopes to secure a full professorship, develop a telehealth program serving rural Oklahoma
    communities, and author a reflective memoir that blends clinical anecdotes with poetry. Ultimately, she envisions shaping curricula that embed mindfulness, expressive arts, and empathy training into
    medical education while maintaining a balanced practice that allows solitary creative pursuits.
