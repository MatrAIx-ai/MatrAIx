personas:
  professional: Shirley King, a board‑certified internal medicine physician at the University of Oklahoma College of Medicine, blends rigorous clinical diagnosis with artistic visualizations, employs R
    and SPSS to design interdisciplinary research, mentors residents with deep empathy, and channels their love of solitude into pioneering a medical humanities fellowship that links visual arts to patient
    outcomes.
  sports: Shirley King, a dedicated birdwatcher who rises at dawn to log backyard sightings, complements solitary observation with low‑impact cardio such as weekly Nordic walking, quietly follows the Oklahoma
    City Thunder and the Oklahoma Sooners from home, and occasionally joins community runs organized by the Tulsa Running Club.
  arts: Shirley King, an avid abstract watercolorist inspired by Joan Mitchell and Mark Rothko, composes piano nocturnes reminiscent of Debussy while crafting poetry in the vein of Rilke, and frequently
    visits solo exhibitions at the Philbrook Museum of Art to soak in contemporary visual narratives.
  travel: Shirley King, who favors low‑key reflective getaways, often retreats to the red rock landscapes of Sedona, Arizona for solitary sketching, plans occasional cultural pilgrimages to Vienna for Mozart
    concerts, and sometimes joins literary tours to Florence, balancing travel dreams with a modest retirement budget.
  culinary: Shirley King, an experimental home cook, delights in crafting herb‑infused dishes such as rosemary‑garlic roasted salmon, quinoa salads tossed with fresh mint and pomegranate seeds, and delicate
    lavender‑scented panna cotta, while regularly harvesting basil and sage from their garden to flavor meals.
  core: Shirley King, a solitary physician‑artist, weaves imagination into medicine, pursues quiet creativity, navigates intense emotional fluctuations with mindfulness, and occasionally succumbs to disorganized
    habits.
background:
  cultural: Shirley was raised in a Midwestern small‑town environment in a family with Protestant roots and a strong emphasis on modesty, hard work, and community service. She earned her STEM degree at
    a state university before moving to Norman, Oklahoma, a college town that exposed her to a diverse academic community. Her cultural identity blends traditional Midwestern values—self‑reliance, humility,
    and civic duty—with a progressive, inclusive outlook shaped by her medical career serving patients of varied backgrounds. She participates in broader American cultural traditions while maintaining a
    secular worldview that appreciates cultural diversity and artistic expression.
attributes:
  skills: '[''Clinical Diagnosis'', ''Patient Counseling'', ''Medical Research Design'', ''Statistical Data Analysis'', ''Medical Imaging Interpretation'', ''Medical Writing'', ''Teaching and Mentorship'',
