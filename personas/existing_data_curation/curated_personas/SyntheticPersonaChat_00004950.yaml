    User 2: It''s a lot of work, but it''s also very rewarding. I get to meet a lot of interesting people, and I get to see the city at night.

    User 1: That sounds like a lot of fun. I''m glad you enjoy it.

    User 2: Thanks! I do. So, what do you do for work?

    User 1: I''m a law student during the week, and I tend bar on the weekends.

    User 2: Oh, that sounds like a lot of work too. But it''s also very rewarding, I''m sure.

    User 1: It is. I love meeting new people and helping them have a good time.

    User 2: That''s great. It sounds like you have a lot of interesting things going on in your life.

    User 1: Yeah, I do. I''m really busy, but I''m also very happy.

    User 2: That''s great to hear. I''m glad you''re happy.'
