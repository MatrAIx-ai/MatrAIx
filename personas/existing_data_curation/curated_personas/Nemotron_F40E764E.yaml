  hobbies: '[''Gardening (herbs & vegetables)'', ''Cooking Mexican and fusion cuisine'', ''Sewing and embroidery'', ''Reading historical fiction and biographies'', ''Community theater attendance'', ''Participating
    in cultural festivals (Día de los Muertos, Cinco de Mayo)'', ''Volunteering at adult literacy program'']'
  career_goals: Marlen aims to advance from operator to shift supervisor within the next two years, earning a certification in press technology to deepen her technical expertise. She hopes to lead a small
    team, introduce efficiency projects that cut setup time, and formalize a mentorship program for younger workers. Long-term, she envisions transitioning to a part-time consulting role for local small-business
    printers, allowing her to share her knowledge while reducing workplace stress. She also plans to save enough to support her grandchildren’s education and to volunteer more intensively in community literacy
    programs after retirement.
