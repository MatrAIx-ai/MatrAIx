persona_description: Elizabeth Goldring, a senior fellow at MIT's Center for Advanced Visual Studies, is a researcher and inventor who has dedicated her career to developing innovative technologies for
  people with visual impairments. She is known for her work on the "seeing machine," a portable device that allows some people who are blind or visually challenged to access the Internet, view the face
  of a friend, and much more. Goldring's research has been supported by NASA and MIT, and her work has been featured in MIT's Newsroom.
