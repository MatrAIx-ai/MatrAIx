personas:
  professional: Megan Rodriguez, a seasoned graphic designer with over 35 years of experience in brand identity, packaging, and print media, leverages deep expertise in Adobe Creative Suite, typography,
    and bilingual visual storytelling to mentor emerging designers and help small businesses craft authentic, culturally resonant brands, and they approach each project with a blend of curiosity and practical
    rigor.
  sports: Megan Rodriguez stays active through weekly salsa dancing, weekend hikes with the River Valley Hiking Club, and cheering for the Seattle Sounders during the MLS season, preferring low‑impact cardio
    that aligns with their love of rhythm and nature, and they balance competitive spirit with a sociable approach to group activities.
  arts: Megan Rodriguez, an avid street‑photographer and volunteer art workshop facilitator, draws inspiration from urban muralists like Shepard Fairey, admires the paintings of Frida Kahlo, regularly attends
    live performances by a Celia Cruz tribute band, and they weave these artistic influences into their design work, reflecting a competitive yet collaborative creative mindset.
  travel: Megan Rodriguez prefers immersive cultural trips, often planning voyages around festivals such as the Day of the Dead in Oaxaca, Carnival in Rio de Janeiro, and the jazz heritage tour in New Orleans,
    balancing a modest travel budget with occasional splurges on boutique stays that offer cooking classes, and they seek experiences that blend celebration, community, and personal growth.
  culinary: Megan Rodriguez, an accomplished home chef, delights in preparing island classics like arroz con pollo, mojo‑marinated pork, and plantain tostones, seasons dishes with fresh cilantro, lime,
    and oregano, enjoys hosting family gatherings where they showcase their knack for turning simple pantry staples into festive feasts, and they often experiment with modern plating techniques inspired
    by their design background.
  core: Megan Rodriguez blends a competitive drive with a warm community spirit, channeling curiosity into vibrant design mentorship while habitually over‑scheduling their calendar and sneaking extra salsa
    dancing sessions late into the night.
background:
  cultural: Born to Cuban immigrant parents in Florida, Megan grew up in a bilingual household steeped in the rhythms of Cuban music, the flavors of Caribbean cuisine, and close‑knit family values. She
    celebrates cultural holidays like Carnaval, maintains strong ties with the local Cuban diaspora, and often incorporates vibrant colors, tropical motifs, and traditional patterns into her design work.
    Her Cuban‑American identity informs both her personal life and professional aesthetic, blending heritage with contemporary American influences.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Typography'', ''Layout Design'', ''Brand Identity Development'', ''Packaging Design'', ''Print Production'', ''Digital Illustration'',
    ''Bilingual Communication (English/Spanish)'', ''Project Management'', ''Client Presentation'', ''Cultural Design Integration'']'
  hobbies: '[''Salsa dancing'', ''Cuban cooking'', ''Community art workshops'', ''Gardening'', ''Hiking'', ''Book club'', ''Street photography'', ''Traveling'', ''Live music events'']'
  career_goals: Megan aims to shift toward a mentorship‑focused consultancy, guiding emerging designers and helping small Latinx businesses build authentic visual brands. She plans to launch a boutique
    studio that fuses traditional Cuban aesthetics with modern digital media, author a book on culturally informed design, and become a speaker at industry conferences on diversity and inclusion in design.
