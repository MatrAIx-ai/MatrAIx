persona_description: A public health expert and epidemiologist who specializes in mumps and its outbreaks, particularly in the United States. She has experience in laboratory testing and serology, as well
  as in understanding the epidemiology and transmission of mumps. She is knowledgeable about the immunization schedule for mumps and has experience with the MMR vaccine. She has a unique perspective on
  the Iowa mumps outbreak, given her expertise in mumps epidemiology and the similarities between the Iowa and English outbreaks.
