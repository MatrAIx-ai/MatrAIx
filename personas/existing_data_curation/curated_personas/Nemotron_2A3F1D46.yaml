    analysis'', ''Digital literacy (Microsoft Office, Google Workspace)'']'
  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Sketching rural landscapes'', ''Reading contemporary art books'', ''Listening to innovation podcasts'', ''Journaling personal reflections'',
    ''Yoga'', ''Mindful nature walks'', ''Participating in a small book club'', ''Community volunteering at the food bank'', ''Cooking and baking international recipes'', ''Pottery workshops'']'
  career_goals: In the next two years Margaret aims to move from an individual customer service representative role into a team lead or supervisory position within her current organization. She plans to
    earn the Certified Customer Experience Professional (CCXP) credential and to lead a small group of reps, focusing on improving service quality, developing streamlined scripts, and mentoring new hires.
    Over the longer term, she dreams of transitioning to a Customer Experience Manager role at a larger retail or tech firm where she can combine her business acumen with her passion for visual storytelling,
    perhaps overseeing brand-experience initiatives that integrate art and design into customer communications. To support these ambitions, she intends to complete a business analytics certificate and to
    gain experience in data-driven insight generation, all while maintaining a flexible schedule that accommodates her family life and creative pursuits.
