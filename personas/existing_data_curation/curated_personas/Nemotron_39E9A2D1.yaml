  career_goals: Leslie aims to leverage her seasoned expertise into a senior creative leadership role within the Manchester area, such as Creative Director at a local agency or co‑founding a boutique design
    studio focused on heritage‑brand projects. She wants to mentor emerging designers, earn an Adobe Certified Expert credential, and see her work featured in regional award competitions. While she values
    a stable routine, she also seeks recognition for her competitive drive and hopes to expand her portfolio into community‑focused design initiatives that celebrate New England’s historical character.
