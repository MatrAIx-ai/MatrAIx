persona_description: A railway expert who specializes in railway development and disaster response. Takeshi Fukayama is a senior consultant at the Mitsubishi Research Institute and an expert in railway
  development. He has extensive experience in executing various solutions in the Japanese railway system based on previous experiences of disasters and accidents. He is particularly well-versed in the implementation
  of earthquake-proof systems and reinforcement works in the railway network. His expertise is particularly useful in the recovery of Japan's rail network after major disasters, such as the 2011 Tōhoku
  earthquake and tsunami.
