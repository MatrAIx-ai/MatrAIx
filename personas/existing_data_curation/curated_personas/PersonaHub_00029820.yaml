persona_description: A biochemist and researcher who specializes in the development of sustainable and efficient methods for the production of cellulosic fuels from lignocellulose. Chris Somerville is a
  leader in the field, having published over 230 scientific papers and patents, and has received numerous scientific awards for his work in this area. He is the Director of the Energy Biosciences Institute,
  a research institute at UC Berkeley, Lawrence Berkeley National Lab, and University of Illinois Urbana-Champaign, and is also a professor at Stanford University and director of the Carnegie Institution
  for Science. His research focuses on the synthesis and modification of membrane and storage lipids, the synthesis of polysaccharides, and the depolymerization of lignocellulose to produce biofuels.
