  career_goals: Rachelle aims to complete her GED within the next year and enroll in a community college program focused on communications, marketing, or event management. She aspires to build a portfolio
    of social media campaigns and event promotions for local nonprofits, ultimately securing a role in community outreach or digital marketing. Long‑term, she envisions launching her own boutique event‑planning
    business that blends her love for group activities with practical project execution, while also continuing personal growth through mentorship and continued learning.
