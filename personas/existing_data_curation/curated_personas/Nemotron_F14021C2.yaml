personas:
  professional: Rachelle Byrd, a 17‑year‑old budding community‑outreach strategist, channels their knack for organizing group events and basic graphic design on Canva into crafting vibrant social‑media
    campaigns for local nonprofits while polishing introductory coding skills to build dynamic event‑promotion microsites.
  sports: Rachelle Byrd, an enthusiastic member of the school volleyball team and a regular participant in community hip‑hop dance classes, roots for the Colorado Avalanche and Denver Broncos while hitting
    the foothills for weekend hikes and the nearby slopes for early‑season skiing.
  arts: Rachelle Byrd, who captures Colorado’s alpine vistas through outdoor photography and draws inspiration from Ansel Adams and Kendrick Lamar, spends evenings editing images in Canva, dancing to Doja
    Cat’s beats, and attending local gallery openings featuring the works of Colorado artists like Zach Bagwell.
  travel: Rachelle Byrd, with a weekend‑trip itinerary that includes sunrise hikes in Rocky Mountain National Park, a ski‑day in Aspen, and a dream of exploring Kyoto’s temples, prefers planning routes
    on Google Maps, balancing adventure with modest budget constraints and the occasional family Thanksgiving gathering.
  culinary: Rachelle Byrd, who loves experimenting with quinoa‑spinach salads, Colorado lamb burgers topped with goat cheese, and baking seasonal cranberry‑orange scones, rates their culinary confidence
    as 'intermediate,' yet still relies on YouTube tutorials for perfecting the flaky puff‑pastry crust on a pumpkin pie.
  core: Rachelle Byrd blends relentless curiosity with practical organization, juggling vibrant community projects, a penchant for spontaneous snack runs, and a habit of forgetting to charge their phone
    before school.
background:
  cultural: Rachelle comes from a white, middle‑class American background rooted in the suburban culture of Westminster, Colorado. Her family celebrates traditional holidays such as Thanksgiving and Fourth
    of July barbecues, and participates in a mix of religious and secular gatherings. Growing up in the Denver metro area has provided her access to outdoor recreation like hiking, skiing, and community
    festivals, shaping her appreciation for nature and communal activities. The region’s emphasis on education, volunteerism, and an active lifestyle informs her values, social interactions, and aspirations.
