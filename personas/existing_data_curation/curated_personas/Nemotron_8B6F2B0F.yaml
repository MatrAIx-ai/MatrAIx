personas:
  professional: Dr. Estella Cureton, a board-certified internal medicine physician, leverages rigorous diagnostic reasoning, telehealth expertise, and a deep appreciation for the medical humanities to design
    culturally competent care pathways that close gaps for underserved populations while mentoring trainees in resilience; they blend meticulous clinical standards with a creative, art-inspired problem-solving
    style.
  sports: Estella Cureton, an avid solo walker and yoga enthusiast, belongs to a local walking club that meets weekly in nearby parks, plays recreational tennis at the Riverside Country Club, and follows
    the New York Mets and New York Knicks, cheering quietly from home during games; they prefer low-impact activities that sustain their calm resilience.
  arts: Estella Cureton, a dedicated visual and performing arts aficionado, spends weekends painting abstract canvases inspired by Jackson Pollock, curates street-photography series of urban life, frequents
    contemporary museums featuring works by Yayoi Kusama, and unwinds to the sounds of Miles Davis while rereading Toni Morrison’s novels on the human condition; they view each brushstroke as a diagnostic
    tool for emotional insight.
  travel: Estella Cureton, a solitary explorer who prefers thoughtfully planned itineraries, has already trekked the historic streets of New Orleans for its jazz and cuisine, photographed the marble galleries
    of Florence, and dreams of a quiet retreat in the Japanese countryside to combine tea ceremonies with sketching, all while budgeting trips around a modest family allowance; they often pack a sketchbook
    alongside their camera to capture moments on the fly.
  culinary: Estella Cureton, a passionate home chef, expertly prepares soulful Southern dishes such as shrimp and grits, collard greens, and cornbread, experiments with global flavors like Moroccan spice
    blends, and treats each meal as a canvas, often photographing the plated dishes for her Instagram feed while favoring fresh herbs like thyme and smoked paprika; they consider cooking a meditative practice
    that mirrors their yoga routine.
  core: Estella Cureton blends a calm, resilient temperament with a restless curiosity, channeling her love for art and medicine into innovative patient care, while secretly hoarding vintage jazz vinyls
    and occasionally neglecting dental floss in favor of late-night research reading; they balance meticulous organization with spontaneous creativity.
background:
  cultural: Estella was raised in a close‑knit African‑American family that celebrated church traditions, community activism, and the legacy of the civil‑rights movement. Growing up in New Jersey, she was
    shaped by the rich tapestry of Black cultural institutions in the greater New York area, from jazz clubs to historically Black colleges she visited during her early college years. Her heritage instills
    a strong sense of communal responsibility and resilience, which she channels into her medical practice by advocating for health equity, participating in the National Medical Association, and mentoring
    Black medical students. She honors her roots through culinary traditions, involvement in local cultural festivals, and a lifelong commitment to uplifting her community.
attributes:
  skills: '[''diagnostic reasoning'', ''evidence‑based medicine'', ''chronic disease management'', ''telehealth implementation'', ''health disparities analysis'', ''interdisciplinary collaboration'', ''medical
