  hobbies: '[''painting'', ''art museum visits'', ''photography'', ''gardening'', ''jazz listening'', ''reading literary and medical humanities'', ''yoga/meditation'', ''creative writing'', ''cooking Southern
    cuisine'', ''long nature walks'']'
  career_goals: Dr. Cureton aspires to become a medical director of a community health network in Union County, where she will spearhead programs that reduce cardiovascular and diabetes outcomes among underserved
    Black patients. She is driven to launch a research initiative that investigates the impact of art‑based interventions on patient well‑being, hoping to publish her findings in peer‑reviewed journals.
    Long‑term, she envisions establishing a small private practice that blends conventional medicine with holistic, art‑integrated therapies, while also creating a mentorship pipeline for underrepresented
    students entering the medical profession.
