personas:
  professional: Paula Ohara, an 8‑year‑old aspiring LEGO architect, channels their meticulous organization and love of puzzles into constructing complex builds that rival adult designs, while they compete
    in school contests and keep a tidy inventory of each piece.
  sports: Paula Ohara, a member of the River Rapids youth soccer team and the Skyline Gymnastics Club, spends Saturday mornings practicing drills, avidly follows the national women’s gymnastics team, and
    roots for the city’s major baseball club, the Harbor Hawks, while they keep a seasonal calendar of favorite sports events.
  arts: Paula Ohara, an avid sketcher and museum‑goer, draws inspiration from Dr. Seuss’s playful line work, Yayoi Kusama’s vibrant polka‑dot installations, John Williams’s sweeping orchestral scores, and
    Studio Ghibli’s animated storytelling, and they eagerly incorporate these influences into their own paintings and short stories.
  travel: Paula Ohara, who prefers meticulously planned family trips that balance adventure and artistic inspiration, has explored the Grand Canyon’s vistas, toured London’s Natural History Museum, and
    is eagerly saving for a future pilgrimage to Paris’s Louvre to study the masterpieces up close, while they keep a scrapbook full of sketches from each destination.
  culinary: Paula Ohara, a budding junior chef, delights in crafting buttery macaroni and cheese, assembling avocado sushi rolls, and frosting cupcakes with rainbow sprinkles, often adding a dash of cinnamon
    to their favorite apple pie slices, while they proudly serve their creations to family after a successful art‑inspired dinner.
  core: Paula Ohara blends razor‑sharp organization with boundless curiosity, channeling a competitive spirit into art, puzzles, and LEGO masterpieces while quietly guarding a secret stash of spare change
    for impromptu creative splurges, and they rarely miss a chance to perfect a new technique.
background:
  cultural: Paula was raised in a typical Midwestern American setting in Topeka, Kansas. Her family observes mainstream U.S. holidays and values education, self-discipline, and community involvement. She
    participates in local school events, county fairs, and occasional museum trips, reflecting the cultural norms of a white, middle-class Kansas community.
