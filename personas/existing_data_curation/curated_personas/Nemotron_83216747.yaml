  career_goals: Francisco plans to enroll in a culinary apprenticeship or pastry‑arts program within the next two years to earn a certified pastry chef credential. In the short term, he aims to be promoted
    to bakery manager, taking responsibility for inventory, menu development, and staff scheduling—roles that satisfy his preference for organized, predictable workflows. Long‑term, he dreams of opening
    a community‑focused bakery that blends his family's Mexican recipes with New Mexican flavors, offering workshops that use baking as a therapeutic outlet for teens dealing with anxiety. He also intends
    to pursue stress‑management training, such as mindfulness or counseling workshops, to better handle the emotional intensity that comes with a fast‑paced kitchen environment.
