personas:
  professional: Francisco Cabrera, an 18‑year‑old bakery employee in Albuquerque, blends meticulous recipe scaling and dough fermentation control with a naturally talkative, customer‑focused style, keeping
    production schedules on track while they turn custom pastry orders into friendly conversations.
  sports: Francisco Cabrera, a regular at the neighborhood park, plays Saturday afternoon soccer with the local 'Albuquerque A‑Side' league, cheers for New Mexico United, and follows the Denver Broncos
    for football, while they use the sport as a social outlet to balance bakery work.
  arts: Francisco Cabrera expresses cultural pride through a folklórico dance troupe that performs at community festivals, devours graphic novels like 'Saga' and 'Bone', and draws inspiration from artists
    such as Diego Rivera and musicians like Los Lobos, integrating their visual and musical energy into the bakery décor, while they share these influences with customers.
  travel: Francisco Cabrera’s travel style mixes short road trips with careful budgeting, having toured the New Mexico landscape from Santa Fe’s art scene to the desert vistas of Tucson, and dreaming of
    a culinary pilgrimage to Oaxaca to study traditional mole while they save every extra paycheck.
  culinary: Francisco Cabrera, an enthusiastic home baker, masterfully fuses New Mexican staples like piñón nuts, blue cornmeal, and Hatch green chile into pastries such as chile‑infused conchas and blue‑corn
    cake, while their collection of antique pastry cutters fuels a love for intricate decorative cake work, and they experiment with new flavor pairings whenever inspiration strikes.
  core: Francisco Cabrera is a detail‑obsessed bakery teen who channels anxiety into precision baking, vintage tool collecting, and lively community dance, all while they juggle a budget that fuels their
    pastry dreams.
background:
  cultural: Francisco grew up in a bilingual household in Albuquerque, where his parents run a small family bakery that serves both traditional Mexican pastries and New Mexican staples. He celebrates Mexican
    holidays such as Día de los Muertos and Las Posadas, and he participates in Albuquerque’s local cultural events like the Balloon Fiesta and the annual Fiestas de Santa Fe. His daily life blends Spanish
    and English, and his cooking often features regional ingredients like blue corn, piñón nuts, and Hatch green chile. This mixed cultural heritage, coupled with the close‑knit community of a family‑run
    bakery, instilled in him a strong sense of responsibility, pride in his roots, and a desire to give back through food.
