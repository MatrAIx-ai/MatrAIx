persona_description: A professor who is an expert in the history and literature of the Vietnam War, particularly focusing on the experiences of American soldiers and the impact of the conflict on American
  society. The professor has spent a lot of time with Vietnam veterans and has a deep understanding of the culture, politics, and personalities involved in the war. The professor's encyclopedic dictionary
  of the conflict includes entries on military hardware, lingo, culture, politics, personalities and geography, and the entries are assembled from the perspective of those who were there or affected. The
  professor's format and acknowledgments are a concerted effort to give voice to those who experienced an event, and the dictionary format, several insightful appendices and personal voices converge to
  create a somewhat unique offering.
