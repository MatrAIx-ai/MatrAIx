  hobbies: '[''Garden cultivation (heirloom tomatoes, collards)'', ''Birdwatching'', ''Cooking Southern cuisine'', ''Bridge (card game)'', ''Listening to classic jazz and blues'', ''Genealogy research'',
    ''Historical documentation'', ''Volunteer tutoring'', ''Hiking the Swamp Rabbit Trail'', ''Community theater readings'']'
  career_goals: Even in retirement, Charlie aims to serve as a mentor to younger entrepreneurs in Greenville, offering workshops on practical business fundamentals and disciplined project management. He
    intends to write a memoir that weaves his family’s story with the broader history of the Upstate region, preserving memories for future generations. He hopes to establish a community scholarship fund
    that supports adults pursuing associate degrees, reflecting his belief in lifelong learning. Additionally, Charlie aspires to lead a senior volunteer program that connects retirees with local schools
    for tutoring, historical projects, and cultural exchanges.
