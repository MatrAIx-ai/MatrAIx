personas:
  professional: Stephanie Oliveras, a 61‑year‑old human‑resources veteran in Jacksonville, leverages her pragmatic, detail‑oriented mindset and healthy skepticism to design data‑driven performance‑management
    frameworks, negotiate compensation packages, and lead talent‑acquisition initiatives, all while aggressively pursuing a director role that blends strategic workforce planning with measurable impacts.
  sports: Stephanie Oliveras participates in a weekly beachfront yoga session, cheerfully supports the Jacksonville Jaguars and the Jacksonville Jumbo Shrimp, and joins a senior walking club that meets
    at Riverside Avondale Park, blending low‑impact exercise with seasonal team fandom.
  arts: Stephanie Oliveras indulges in historical fiction by Ken Follett and biographies by Doris Kearns Goodwin, savors the soulful sounds of Aretha Franklin and Dolly Parton, and regularly attends performances
    at the Jacksonville Symphony and community‑theater productions like "The Glass Menagerie".
  travel: Stephanie Oliveras prefers organized, moderate‑priced tours to historically rich destinations such as Savannah, Georgia; Charleston, South Carolina; and a Mediterranean cruise to Italy and Greece,
    balancing her love for cultural immersion with the comfort of a familiar itinerary.
  culinary: Stephanie Oliveras crafts low‑sugar Southern comfort dishes such as baked collard greens seasoned with smoked turkey, sweet‑potato casserole sweetened with a drizzle of maple syrup, and shrimp
    and grits using garden‑fresh okra, proudly sourcing collard greens, black‑eye peas, and fresh herbs from her own vegetable garden.
  core: Stephanie Oliveras is a structured, competitive HR strategist who gardens, cooks low‑sugar Southern meals, leads bridge tournaments, and finds calm in beach yoga, all while juggling a skeptical
    eye for shortcuts and a penchant for meticulous budgeting.
background:
  cultural: Stephanie grew up in a middle‑class white family in Jacksonville, FL, where Southern hospitality and a strong sense of community were integral parts of daily life. Her upbringing emphasized
    self‑reliance, respect for tradition, and active participation in local church activities. Over the decades, she has woven Florida’s coastal culture—such as seafood cuisine, beach recreation, and support
    for regional festivals—into her personal identity while maintaining a pragmatic, structured approach to both work and leisure.
attributes:
  skills: '[''Employee Relations'', ''Talent Acquisition'', ''Performance Management'', ''Compensation & Benefits Design'', ''HR Policy Development'', ''Labor Law Compliance'', ''HRIS Management (Workday,
    ADP)'', ''Training & Development'', ''Conflict Resolution'', ''Data‑Driven Workforce Analytics'', ''Organizational Development'', ''Project Management'']'
  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Southern cooking'', ''Volunteer work at community centers'', ''Beach walking'', ''Yoga'', ''Quilting'', ''Bridge (card game)'', ''Local history
    tours'']'
  career_goals: Stephanie aims to transition into an HR Director role within the next two to three years, where she can shape strategic workforce planning for a growing healthcare or logistics firm in Northeast
    Florida. She plans to earn the SHRM Senior Certified Professional (SHRM‑SCP) credential to reinforce her expertise in aligning HR initiatives with business objectives. Additionally, she is passionate
    about mentoring emerging HR talent, establishing a formal internship pipeline with local community colleges, and launching a company‑wide employee well‑being program that blends structured health metrics
    with flexible work‑life options.
