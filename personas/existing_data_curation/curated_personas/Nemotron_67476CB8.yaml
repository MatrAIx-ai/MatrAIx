  hobbies: '[''Visiting contemporary art galleries and museums'', ''Sketching industrial forms and machinery'', ''Participating in a small-group book club on design and art theory'', ''Cooking traditional
    East Asian dishes'', ''Gardening on her balcony'', ''Attending community maker-space workshops'', ''Collecting vintage industrial tools'', ''Listening to jazz and blues vinyl collections'']'
  career_goals: She aims to become the lead mechanic for her workshop, earning advanced certifications in refractory technology and welding. Long‑term, Nhi envisions opening a small consultancy that offers
    specialized maintenance planning and safety audits for Brooklyn’s manufacturing firms. She also hopes to mentor apprentices, particularly women and immigrants, bridging her practical expertise with
    a commitment to community empowerment.
