personas:
  professional: Nhi Yang, a 48‑year‑old industrial and refractory machinery mechanic in Brooklyn, they combine two decades of hands‑on expertise in heavy‑equipment repair, precise MIG/TIG welding, and hydraulic
    troubleshooting with a methodical, art‑inspired eye for design, driving their ambition to become lead mechanic and eventually launch a consultancy that blends rigorous safety audits with creative equipment
    modifications.
  sports: Nhi Yang, a 48‑year‑old Brooklynite, they keep physically active with early‑morning jogs along the East River, participate in a weekend adult softball league, follow the Brooklyn Nets and New
    York Rangers fervently, and attend weekly indoor rock‑climbing sessions to preserve functional strength needed for their demanding trade.
  arts: Nhi Yang, a 48‑year‑old mechanic and art enthusiast, they spend evenings sketching the geometric lines of industrial machinery, frequent exhibitions by Ai Weiwei, KAWS, and Olafur Eliasson at MoMA
    PS1, and engage in a close‑knit book club that dissects design theory texts by Victor Papanek and Rosalind Krauss, merging technical precision with aesthetic curiosity.
  travel: Nhi Yang, an inquisitive 48‑year‑old professional, they plan trips that blend industrial heritage and artistic immersion, favoring self‑guided tours of Germany’s Ruhr Museum, a hands‑on workshop
    in Osaka’s manufacturing districts, weekend hikes in the Adirondacks, and occasional visits to New York’s historic brownstone neighborhoods, all balanced against a modest travel budget and occasional
    family commitments.
  culinary: Nhi Yang, a 48‑year‑old mechanic and home‑chef, they love preparing hand‑rolled gyoza, fragrant jasmine rice, and fermented kimchi using fresh herbs like cilantro and Thai basil from their balcony
    garden, often experimenting with bold seasoning that sometimes leads to over‑spiced dishes, and they occasionally reward themselves with a glass of craft cider after a long workshop day.
  core: Nhi Yang, a disciplined 48‑year‑old mechanic with a quiet passion for art and design, they fuse precision engineering with creative curiosity, manage a structured yet occasionally indulgent budget,
    uphold a proactive health routine tempered by occasional neglect, and lead a solitary but richly textured life of hobbies and community mentorship.
background:
  cultural: Nhi was born to immigrant parents from a Chinese‑Vietnamese background who settled in Brooklyn. Growing up in a multilingual household, she is fluent in Mandarin and Cantonese, and she embraces
    the cultural values of respect for elders, diligence, and family cohesion. Though her formal education concluded before high school, her family emphasized hands‑on learning and apprenticeships, shaping
    her work ethic. She remains active in local Asian community events, such as Lunar New Year celebrations at the neighborhood temple, while also integrating the diverse, artistic vibe of Brooklyn into
    her personal interests.
