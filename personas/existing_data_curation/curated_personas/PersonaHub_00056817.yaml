persona_description: A historian who specializes in the study of the French Revolution and the Reign of Terror. Their research interests include the causes and effects of the revolution, the role of the
  Committee of Public Safety, and the impact of the Reign of Terror on French society. They are particularly interested in the events leading up to the fall of Robespierre and the subsequent reestablishment
  of the Girondin party. They are also interested in the political and social changes that occurred during this period and how they shaped France's future.
