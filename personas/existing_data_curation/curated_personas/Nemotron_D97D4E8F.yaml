  hobbies: '[''CrossFit'', ''Trail Running'', ''Hiking'', ''Kayaking'', ''Improv Comedy'', ''Fire Safety Workshops'', ''Mentoring Youth'', ''Guitar Playing'', ''Exploring New Technology'', ''Community Events'']'
  career_goals: Kenney aims to complete his associate degree in fire science and obtain advanced certifications such as Fire Officer I and II, as well as specialized training in hazardous materials and
    technical rescue. His short‑term goal is to be promoted to firefighter II and then to a fire apparatus driver/operator. Long‑term, he envisions advancing to a Fire Lieutenant and eventually a Battalion
    Chief, overseeing multiple stations in Fairfax County. He also hopes to become a training officer, leveraging his talkative and engaging personality to mentor new recruits and lead public safety outreach.
    Additionally, Kenney is interested in pursuing a Master’s in Emergency Management to broaden his strategic planning abilities and potentially contribute to regional disaster preparedness initiatives.
