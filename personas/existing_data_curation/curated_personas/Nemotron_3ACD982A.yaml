personas:
  professional: Glenn Watson, a budding LEGO architect, applies their disciplined, detail-oriented mindset and competitive curiosity to construct intricate brick structures that consistently earn top marks
    in classroom design challenges and delight peers during showcase sessions.
  sports: Glenn Watson, who plays forward for the Maple Grove Tigers youth soccer team, idolizes the skill of FC Barcelona's Lionel Messi and cheers for the New York Yankees while maintaining a rigorous
    practice schedule that mirrors their disciplined, achievement-focused mindset.
  arts: Glenn Watson, an avid fan of Dr. Seuss's whimsical storytelling and the energetic tunes of The Wiggles, channels their sociable nature into weekly storytelling performances that weave together scenes
    from The LEGO Movie and adventures of their favorite dinosaur figurine collections, showcasing a blend of imaginative play and an early appreciation for visual and musical arts.
  travel: Glenn Watson, whose travel wishlist includes a family trip to the Natural History Museum in Washington, D.C., a weekend adventure at LEGOLAND Florida, and a future dream to explore the dinosaur
    cliffs of Dinosaur National Monument, plans each outing meticulously, balancing structured itineraries with the excitement of new discovery.
  culinary: Glenn Watson, a budding junior chef, loves assembling mini tuna salads with diced cucumbers, savoring dinosaur-shaped chicken nuggets, and perfecting a family-favorite spaghetti Bolognese, often
    helping stir the sauce under parental supervision while insisting on sprinkling extra Parmesan for that perfect finish.
  core: Glenn Watson is a fiercely organized, curiosity-driven six-year-old who transforms every LEGO brick, soccer match, and storytelling moment into a competitive showcase, all while juggling a disciplined
    allowance plan and a meticulous health routine.
background:
  cultural: Glenn grew up in a predominantly white, working‑class community in Jamestown, NY, where family meals, local church involvement, and town fairs are central to life. His family places a strong
    emphasis on education, personal discipline, and community responsibility, blending Mid‑Atlantic American values of practicality and independence with a supportive, sociable neighborhood culture.
