persona_description: A shelter veterinarian who specializes in the management and control of parvo and panleukopenia outbreaks in shelters. This persona is knowledgeable about the specific challenges and
  control strategies that arise in shelters, including the importance of effective vaccination, accurate diagnosis, isolation, and cleaning and disinfection. They are also aware of the evolving landscape
  of parvo and panleukopenia strains and the need for ongoing research and updates in vaccine protocols. This persona is highly skilled in applying the principles of control and prevention in the shelter
  environment, making them an invaluable resource for shelter staff and veterinarians.
