personas:
  professional: Donald Carmichael is a retired volunteer firefighter and handyman who leverages mechanical troubleshooting, carpentry, and garden management expertise to mentor younger community members,
    and they apply a disciplined, competitive nature to win regional craftsmanship contests and maintain high standards in woodworking projects.
  sports: Donald Carmichael enjoys seasonal hunting, ice‑fishing, and snowmobile riding, follows the New England Patriots for football, the Boston Red Sox for baseball, and they are a member of a local
    4‑H archery club, maintaining fitness through rugged outdoor pursuits rather than organized gym routines.
  arts: Donald Carmichael attends community concerts featuring folk singer Sam Hunt, appreciates the paintings of Winslow Homer, and they indulge in crossword puzzle magazines, while their own creative
    outlet is crafting custom wooden furniture inspired by the craftsmanship of Sam Maloof.
  travel: Donald Carmichael prefers road trips to nearby New Brunswick towns like Fredericton and scenic drives through Acadia National Park, but they dream of a summer fishing lodge in Finnish Lapland,
    balancing careful planning with a modest budget and limited time.
  culinary: Donald Carmichael favors hearty New England fare such as baked potatoes with sour cream, clam chowder, and homemade apple pie, cooks confidently in a modest kitchen using locally sourced potatoes,
    fresh lobster, and New Brunswick maple syrup, and they enjoy occasional potluck gatherings where their signature cedar‑smoked trout takes center stage.
  core: Donald Carmichael is a disciplined, self‑reliant retired craftsman who blends meticulous budgeting, rugged outdoor habits, and a quiet competitive streak into a life rooted in community tradition
    and personal legacy, and they pursue these goals with a pragmatic, structured approach.
background:
  cultural: Donald identifies as a white New Englander, with ancestral ties to Irish and English settlers common in rural Maine. His cultural identity is shaped by the self‑reliance, thrift, and deep respect
    for the natural environment that characterize Aroostook County. The region’s history of potato farming, lumber, and border proximity to Canada influences his values and daily practices. He participates
    in local church life, community events, and traditions such as communal potlucks and seasonal harvest celebrations, embodying the modest, close‑knit spirit of the Fort Fairfield community.
attributes:
  skills: '[''Mechanical repair of small engines'', ''Carpentry and custom woodworking'', ''Basic electrical troubleshooting'', ''Plumbing maintenance'', ''Land and garden management'', ''Financial budgeting
