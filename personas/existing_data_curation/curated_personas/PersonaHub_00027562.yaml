persona_description: A systems engineer with expertise in the design, operation, and maintenance of power transmission and distribution systems. They are responsible for ensuring the safe and reliable operation
  of these critical infrastructure components, particularly in the context of handling high-voltage power lines that transmit electricity from power stations to load centers and large industrial consumers.
  The systems engineer must be able to identify and mitigate faults and failures that could disrupt the transmission of power, such as those caused by lightning strikes, tree branches, or other external
  factors. They must also be able to work with protective relay and fault recorder systems, which use fundamental power frequency signals to isolate and track the faulty line, providing the fault position
  for repair and maintenance. Additionally, the systems engineer must be able to understand and navigate the complex and dynamic nature of power transmission systems, as well as the various factors that
  can affect their performance, such as weather, terrain, and the overall electrical grid.
