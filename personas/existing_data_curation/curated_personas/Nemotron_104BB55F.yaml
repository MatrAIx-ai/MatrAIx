personas:
  professional: Mercy Bustamante is a seasoned kitchen manager with a STEM foundation who leverages her love for routine, calm assertiveness, and analytical mindset to enforce HACCP standards, streamline
    inventory, and coach staff, while occasionally letting paperwork pile up due to her relaxed approach to obligations.
  sports: Mercy Bustamante stays fit by attending gentle yoga classes, walking the Embarcadero and Golden Gate Park trails, occasionally joining a neighborhood recreational soccer league with the Mission
    Mobility Club, and follows the San Francisco Giants and Golden State Warriors for a dose of community spirit.
  arts: Mercy Bustamante enjoys immersing herself in traditional highland folk music performed by local ensembles, attending dance nights featuring criolla rhythms, appreciating the murals of Diego Rivera
    at the Mission Cultural Center, and listening to the soulful jazz of Esperanza Spalding to unwind after long shifts.
  travel: Mercy Bustamante prefers short, purposeful trips that blend culinary discovery with relaxation, such as weekend getaways to the Sierra foothills to forage native potatoes and ají peppers, a nostalgic
    visit to Oaxaca for its market vibrancy, and annual pilgrimages to coastal festivals in the Pacific Northwest, all planned with flexible itineraries that leave room for spontaneous detours.
  culinary: Mercy Bustamante expertly crafts classic dishes like causa limeña with purple potatoes and ají amarillo, a citrusy tiradito with freshly caught Pacific fish, and lomo saltado using locally sourced
    beef, while sprinkling her balcony‑grown cilantro and oregano into every sauce, showcasing a high level of skill that blends traditional techniques with Californian ingredients.
  core: Mercy Bustamante is a detail‑oriented kitchen leader who balances a love for routine with occasional disarray, uses cooking as cultural expression, worries about stress, and channels that energy
    into community‑focused culinary projects.
background:
  cultural: Mercy was born in the Andean highlands of Peru and moved to the United States in her early twenties. She grew up speaking Spanish and maintains fluency, using it daily at home and in the local
    Peruvian community. Her upbringing emphasized family cohesion, Catholic traditions, and a deep respect for regional foods, especially the diverse potatoes and ají peppers native to Peru. In San Francisco,
    she participates in the city’s vibrant Peruvian diaspora, celebrating holidays such as Fiesta de la Vendimia and Día de la Independencia with traditional music, dance, and communal meals. Her cultural
    identity informs both her culinary style and her commitment to preserving Peruvian heritage through food education.
