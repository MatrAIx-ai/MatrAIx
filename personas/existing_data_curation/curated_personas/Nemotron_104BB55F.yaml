    and community events'', ''Walking along the Embarcadero and in Golden Gate Park'' ]'
  career_goals: Mercy aims to obtain a Certified Food Safety Manager credential within the next year, positioning herself for a kitchen manager role at a larger restaurant or institutional food service.
    She wishes to leverage her deep knowledge of Peruvian cuisine to develop a signature menu that can be piloted in a small community-focused café she plans to open in the Mission District. Long-term,
    she hopes to create a culinary apprenticeship program for recent immigrants and low-income youth, sharing both practical kitchen skills and cultural heritage. Additionally, she is committed to improving
    her work-life balance by implementing stress-reduction practices and mentoring younger supervisors to foster a supportive workplace environment.
