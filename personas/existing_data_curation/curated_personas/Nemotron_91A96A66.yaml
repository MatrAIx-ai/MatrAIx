  career_goals: Although approaching retirement, Adrienne aims to transition into a mentorship‑focused role, offering pro‑bono financial counseling to seniors and low‑income residents of Kitsap County.
    She plans to develop a community workshop series on budgeting, retirement planning, and navigating payday‑loan pitfalls, hoping to leave a lasting legacy of financial literacy. Additionally, she aspires
    to author a concise guide on credit health for older adults, drawing on her decades of experience. Finally, she wishes to serve on the advisory board of the local non‑profit credit counseling agency,
    ensuring that its programs remain both practical and innovative.
