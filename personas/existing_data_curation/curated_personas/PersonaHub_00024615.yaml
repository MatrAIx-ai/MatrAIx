persona_description: John Gulliver, a Civil, Environmental, and Geo-Engineering professor who is conducting research to investigate the reduction in road salt application during winter months with permeable
  pavement systems. He is interested in the winter performance of permeable pavements, investigating the temperature profile in the system under various winter conditions, developing a simulation model
  to predict permeable pavement performance, and providing education through webinars, seminars, and online publication.
