  career_goals: Prince aims to transition from frontline courier work to a supervisory or logistics‑coordination role within the next three to five years. He plans to complete his associate degree in supply‑chain
    management while taking night classes, with the long‑term ambition of managing a small fleet of eco‑friendly delivery vehicles that serve underserved neighborhoods in Louisville. He also hopes to mentor
    newer couriers, creating a supportive environment that balances flexibility with reliable service, and eventually launch his own community‑focused delivery startup that emphasizes local employment and
    customer care.
