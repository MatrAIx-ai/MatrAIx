    instructor'', ''Collecting vintage fashion magazines'']'
  career_goals: Sandra aims to transform her home‑based studio into a full‑service boutique in a vibrant Chicago neighborhood, offering custom couture for weddings, cultural celebrations, and everyday wear.
    She plans to launch a line of sustainably sourced, culturally inspired dresses that incorporate African‑American textile motifs. Over the next five years, she hopes to hire two apprentices, create a
    weekly sewing class for youth, and partner with local designers for collaborative collections. Ultimately, she envisions being recognized as a mentor and a cultural artisan who preserves and modernizes
    African‑American dressmaking traditions.
