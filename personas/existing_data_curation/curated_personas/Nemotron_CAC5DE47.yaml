  career_goals: Although retired, Gabriel aims to stay active in his community by volunteering as a handyman for neighbor‑to‑neighbor repairs, leading the senior center’s game nights, and mentoring younger
    volunteers in practical skills. He aspires to complete a memoir of his life experiences to preserve family history and to develop a small side‑business offering occasional home‑maintenance services.
    Maintaining his health, managing his stress, and preserving his independence are top priorities, and he hopes to travel occasionally to visit his children and grandchildren while staying rooted in Noblesville.
