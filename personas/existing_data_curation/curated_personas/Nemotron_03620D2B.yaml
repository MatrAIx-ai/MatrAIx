  career_goals: Paula aims to transition into a senior product leadership role where she can shape inclusive digital experiences for diverse users. Over the next five years she plans to pursue a Master’s
    in Human‑Computer Interaction, lead a cross‑functional design team, and champion accessibility standards within her organization. She also aspires to mentor emerging talent—particularly women and underrepresented
    groups—in tech, and to eventually launch a community‑focused initiative that pairs tech education with local arts programs in Chicago.
