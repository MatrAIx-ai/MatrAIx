personas:
  professional: Paula Gilliam is a UX researcher and front‑end developer who merges rigorous data analysis with a community‑first mindset, leading agile product teams to craft inclusive, accessible digital
    experiences while championing mentorship for women in tech.
  sports: Paula Gilliam is an avid cyclist with the Chicago Cycling Club, a devoted Chicago Bulls fan, and a regular yoga practitioner who values structured workouts and balanced fitness.
  arts: Paula Gilliam immerses themselves in Chicago’s vibrant arts scene, photographing historic architecture, attending Art Institute exhibitions featuring Ai Weiwei, reading contemporary fiction by Sally Rooney,
    and dancing to live shows by Liz Lizzo, all of which shape their creative outlook.
  travel: Paula Gilliam prefers meticulously planned weekend getaways that blend cultural immersion and photography, from wandering the jazz‑filled streets of New Orleans and tasting ramen in Osaka to exploring
    the colorful neighborhoods of Barcelona, while balancing a modest travel budget with occasional spontaneous urban adventures.
  culinary: Paula Gilliam experiments in the kitchen with cross‑cultural dishes such as Korean bibimbap, Mexican al pastor tacos, and a seasonal rosemary‑turmeric vegetable stew, yet they often over‑season
    in pursuit of the perfect flavor balance.
  core: Paula Gilliam’s mix of Midwestern practicality, community spirit, and tech‑savvy creativity makes them a reliable yet adventurous connector who never misses a photo‑op or a chance to mentor the
    next generation.
background:
  cultural: Paula grew up in a middle‑class white family in the Chicago suburbs, with German and Irish ancestry that infused her upbringing with Midwestern values of practicality, reliability, and community
    orientation. Her household emphasized education, cultural appreciation, and civic involvement, which fostered her love of the arts and her commitment to helping others. Living in Chicago’s diverse urban
    environment has broadened her perspective, encouraging her to blend her familial roots with the city’s multicultural vibrancy in both her professional work and personal life.
