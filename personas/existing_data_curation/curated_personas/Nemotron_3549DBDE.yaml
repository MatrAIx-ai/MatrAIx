  hobbies: '["dancing (salsa, reggaetón)", "cooking Puerto Rican dishes", "soccer", "social media content creation", "volunteering at community events", "participating in school clubs and youth groups"]'
  career_goals: Abigail aspires to pursue a career that combines her love for people, her cultural roots, and her practical skills. She dreams of becoming a community outreach coordinator or a bilingual
    health educator, where she can help young people in the Puerto Rican and broader Latino communities of New York access resources and health information. She also considers a future in communications
    or media, possibly creating content that highlights teen experiences and cultural pride. Her long‑term goal is to earn a college degree in public health or communications and use that education to give
    back to her family and neighborhood while maintaining a flexible work schedule that lets her stay involved in the community and family life.
