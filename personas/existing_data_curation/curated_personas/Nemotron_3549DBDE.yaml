personas:
  professional: Abigail Munoz is a high‑school sophomore who blends her love for soccer and digital storytelling to lead the varsity team’s social media presence, using TikTok clips of drills and game highlights
    to rally teammates and inspire younger students.
  sports: Abigail Munoz is a forward on the school’s varsity soccer squad, cheering for the New York Red Bulls and the US women’s national team, and she practices three times a week while also joining a
    local dance club that keeps her footwork sharp.
  arts: Abigail Munoz creates short TikTok dances set to Bad Bunny, Shakira, and classic salsa tracks, performs at the annual island heritage festival in Queens, and draws inspiration from choreographers
    like Luis Salinas, weaving cultural rhythms into modern pop mash‑ups.
  travel: Abigail Munoz dreams of strolling through the historic streets of Old San Juan and soaking up the sun on Rincon’s beaches after school, while she already enjoys weekend trips to New York City’s
    museums and the Queens community festival, balancing family obligations with a desire for independent exploration.
  culinary: Abigail Munoz cooks arroz con gandules, lechón, and dulce de leche flan for family gatherings, proudly mastering the perfect sofrito while occasionally burning the edges of her empanadas when
    she rushes to finish a TikTok edit.
  core: Abigail Munoz is a vibrant teen who juggles soccer, dance, and digital content, always tying community pride to spontaneous creativity and a habit of forgetting to clean up after culinary experiments.
background:
  cultural: Abigail is a second‑generation Puerto Rican growing up in Valley Stream, New York. Her household is bilingual, with Spanish spoken at home and English at school, allowing her to navigate both
    cultures fluently. Family gatherings are centered around music, dance, and food, with traditions such as celebrating Puerto Rican holidays like Three Kings Day and attending the annual Puerto Rican
    Festival in nearby Queens. She attends a local Catholic church where the youth group organizes cultural celebrations and community service. This blend of Caribbean heritage and suburban New York life
    shapes her values of family, community solidarity, and cultural pride, influencing everything from her culinary interests to her desire to help other Latino teens succeed.
