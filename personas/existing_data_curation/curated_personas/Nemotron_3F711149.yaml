personas:
  professional: Fabian Soto, an 88‑year‑old retired mechanical engineer and applied physicist, channels his vivid imagination, talkative charisma, and relaxed attitude toward schedules into leading community
    workshops that blend hands‑on troubleshooting of small‑scale mechanical projects with watercolor illustrations and storytelling, even though occasional disorganization sometimes pushes start times later
    than planned.
  sports: Fabian Soto, an 88‑year‑old community enthusiast, enjoys gentle morning walks with the local senior walking group, participates in weekly salsa dancing lessons at the neighborhood cultural center,
    and faithfully roots for the Riverside Rivercats baseball team while occasionally joining the senior bowling league at the downtown recreation center.
  arts: Fabian Soto, an 88‑year‑old amateur watercolorist and acoustic guitarist, draws inspiration from the abstract canvases of Jackson Pollock, the lyrical poetry of Leonard Cohen, and the melodic folk
    tunes of Bob Dylan, often weaving these influences into his own abstract landscape paintings, short poems that fuse scientific metaphors, and evenings of gentle guitar playing at community gatherings.
  travel: Fabian Soto, an 88‑year‑old avid explorer, prefers leisurely, well‑planned weekend getaways to nearby historic towns like Santa Fe and Tucson's desert landscapes, yet nurtures a lifelong dream
    of witnessing the northern lights over Tromsø, Norway, and has already enjoyed cultural tours of Kyoto's temples and the sun‑kissed plazas of Granada, balancing his love of discovery with careful attention
    to his health and modest travel budget.
  culinary: Fabian Soto, an 88‑year‑old passionate home‑cook, delights in preparing family‑style tamales wrapped in corn husks, seasoning them with fresh cilantro, oregano, and a hint of smoky chipotle,
    while also experimenting with garden‑grown herbs like sage and thyme in aromatic mole sauces and savoring simple meals such as roasted vegetable medleys spiced with cumin and paprika.
  core: Fabian Soto, an 88‑year‑old retired engineer with a boundless imagination, thrives on mingling science and art in community workshops, yet their endearing absent‑mindedness and occasional bouts
    of anxiety often leave them juggling unfinished projects and late‑night poetry sessions.
background:
  cultural: Born to Mexican immigrant parents, Fabian grew up bilingual, speaking Spanish at home while learning English at school. He cherishes the rituals of Día de Los Muertos, the flavors of regional
    Mexican cuisine, and the oral histories passed down through his grandparents. Living in Memphis, Michigan, he has become a bridge between his heritage and the broader Mid‑Midwestern community, volunteering
    at the local Mexican‑American cultural center, organizing bilingual workshops, and sharing traditional music and folklore with neighbors. His identity is a blend of proud Mexican roots, Catholic traditions,
    and the values of community solidarity that he upholds in his daily interactions.
