personas:
  professional: Jung Ho, a veteran stationary engineer and boiler operator with over three decades of hands‑on experience, they leverage meticulous record‑keeping, NFPA 85 compliance, and a methodical troubleshooting
    mindset to lead plant maintenance teams while mentoring apprentices and driving energy‑efficiency retrofits toward a senior facilities management role.
  sports: Jung Ho, a dedicated member of the Hudson Valley Strikers adult soccer league, they attend weekly matches on Saturdays, watch the New York Yankees at Yankee Stadium when possible, hike the Hudson
    Valley trails every month, and belong to a local board‑game club that blends strategic play with social camaraderie.
  arts: Jung Ho, an enthusiastic karaoke participant, they passionately belt out classic K‑pop hits by artists like Psy and BoA during Friday night sessions, enjoy board‑game evenings featuring Settlers
    of Catan and Carcassonne, and occasionally attend off‑Broadway productions that fuse music and storytelling.
  travel: Jung Ho, who balances a busy work schedule with family responsibilities, they prefer weekend getaways to the Hudson Valley and occasional trips to the historic streets of Boston, while dreaming
    of a summer vacation in Jeju Island to explore coastal trails and local festivals, planning each trip with meticulous itineraries and a modest travel budget.
  culinary: Jung Ho, a competent home chef, they frequently prepare kimchi, bulgogi, and japchae using gochujang, sesame oil, and fresh garlic, and enjoy sharing these dishes at neighborhood potlucks, though
    they sometimes over‑spice the kimchi, prompting friendly teasing from friends.
  core: Jung Ho blends precise engineering expertise with an outgoing community spirit, they balance methodical work habits with lively karaoke sessions, strategic board games, and a disciplined yet occasionally
    indulgent approach to finances and health.
background:
  cultural: Jung Im Ho is a first‑generation Korean‑American who grew up in Queens, New York, in a bilingual household that emphasized both Korean traditions and American values. He celebrates major Korean
    holidays such as Seollal and Chuseok, maintains strong ties to the local Korean community through a cultural center and language exchange groups, and frequently participates in community service events
    that bridge his heritage and his New York home. His upbringing instilled a disciplined work ethic, respect for elders, and a communal spirit, all of which inform his collaborative yet assertive approach
    in both professional and personal settings. While never married, he remains close to extended family and often hosts gatherings that blend Korean cuisine with the diverse flavors of his city.
attributes:
  skills: '["Boiler operation and maintenance", "Stationary engineering", "Mechanical troubleshooting", "Preventive maintenance scheduling", "Safety compliance (NFPA, OSHA)", "Technical schematics and P&ID
    interpretation", "Energy efficiency optimization", "Welding (SMAW)", "HVAC system maintenance", "Team leadership and mentorship", "Maintenance documentation and reporting"]'
  hobbies: '["Adult soccer league", "Karaoke nights", "Korean cooking and recipe sharing", "Model train building and maintenance", "Hiking in the Hudson Valley", "Attending Korean cultural festivals", "Watching
    New York Yankees baseball", "Board‑game evenings"]'
  career_goals: Jung aims to transition into a senior facilities management role where he can oversee multiple plant systems across a portfolio of high‑rise buildings in New York City. He plans to earn
    the Certified Plant Engineer (CPE) credential and lead a retrofit program that upgrades aging boilers to low‑NOx, high‑efficiency units. Mentoring is a core ambition; he hopes to formalize an apprenticeship
    pipeline for younger technicians, especially from underrepresented communities. In the longer term, he envisions launching a boutique consulting firm that provides safety audits and energy‑efficiency
    assessments for commercial boiler installations, allowing him to leverage his experience while reducing the physical demands of daily plant work as he approaches retirement.
