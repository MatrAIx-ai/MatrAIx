personas:
  professional: Susan Coston, a budding wildlife sketcher and budding LEGO architect at seven, channels her curiosity and love for solitude into creating detailed animal drawings and miniature LEGO habitats,
    showing early signs of a future career in naturalist illustration.
  sports: Susan Coston enjoys informal park soccer games with the Meadowbrook Kids Soccer Club and cheers on the Los Angeles Dodgers on TV, preferring short bursts of activity over regimented practice and
    often turning a backyard obstacle course into a personal adventure challenge.
  arts: Susan Coston is enchanted by the whimsical illustrations of Beatrix Potter, the melodic swells of Tchaikovsky’s Swan Lake that play during her drawing sessions, and the vibrant street murals she
    discovers on library field trips, often re‑creating these inspirations in watercolor and LEGO dioramas.
  travel: Susan Coston’s travel style blends meticulous map‑reading with spontaneous park expeditions, favoring day trips to the nearby botanical garden and family vacations to Disneyland and the Grand
    Canyon, where she collects pressed leaves as souvenirs to fuel her next sketch.
  culinary: Susan Coston delights in crafting peanut‑butter‑jelly sandwiches with perfectly sliced banana, stirring up simple strawberry shortcake in her mother’s kitchen, and experimenting with rainbow
    fruit salads featuring blueberries, kiwi, and mango, though she often forgets to wash her hands before cooking.
  core: Susan Coston is a calm, curious seven‑year‑old who transforms solitary park wanderings into vivid animal sketches, guards a modest treasure of allowance for art supplies, and navigates life with
    a delightfully disorganized yet resilient spirit.
background:
  cultural: Susan grew up in Shawnee, Kansas, a suburban community in the American Midwest. Her family embraces Midwestern traditions such as community fairs, church‑centered holiday celebrations, and family
    potlucks, valuing modesty and self‑reliance. The region’s focus on outdoor recreation has nurtured her love of nature, while the local library and school art programs have fostered her curiosity about
    art and science. Although her ethnic background is White American, she is exposed to a variety of influences through school projects, community theater, and occasional trips to Kansas City museums.
attributes:
  skills: '[''Creative drawing'', ''Digital sketching'', ''Reading comprehension'', ''Puzzle solving'', ''Logical reasoning'', ''Independent research'', ''Calm conflict mediation'', ''Basic arithmetic'']'
  hobbies: '[''Sketching animals'', ''Watercolor painting'', ''Leaf pressing'', ''Reading adventure books'', ''LEGO building'', ''Jigsaw puzzles'', ''Listening to classical music'', ''Exploring nature in
    parks'', ''Attending library story time'', ''Participating in small art workshops'']'
  career_goals: Susan dreams of becoming a wildlife illustrator, merging her love for animals with her artistic talent. She also imagines a future as a marine biologist or nature photographer, hoping to
    capture the beauty she explores in her backyard. Driven by a competitive spirit, she aims to be recognized for a unique artistic style and aspires to publish a children's book featuring her own illustrations,
    inspiring other kids to appreciate art and the natural world.
