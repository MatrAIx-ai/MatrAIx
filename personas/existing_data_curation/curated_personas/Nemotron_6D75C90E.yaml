personas:
  professional: Alicia Ramos, a kindergarten class organizer who diligently maintains the classroom schedule, assigns duties to peers, and applies their critical, methodical mindset to keep playtime orderly.
  sports: Alicia Ramos plays forward for the Little Lions soccer team, attends weekly gymnastics classes at the community center, and follows the City Hawks basketball team with a structured pre-game warm-up
    routine that satisfies their competitive drive.
  arts: Alicia Ramos loves drawing Sesame Street characters, sings along to Idina Menzel's "Let It Go" from Frozen, and attends weekend art workshops where they meticulously recreate Monet's water lilies
    using child-safe watercolors.
  travel: Alicia Ramos enjoys family road trips that follow a detailed itinerary, cherishes their visits to Legoland California and a beach weekend in Cape Cod, and dreams of visiting the Eiffel Tower in
    Paris next summer.
  culinary: Alicia Ramos prefers macaroni and cheese, peanut butter-banana sandwiches, and strawberry slices, can confidently butter toast on their own, but remains a picky eater who refuses broccoli unless
    it’s shaped like a dinosaur.
  core: Alicia Ramos is a meticulous five-year-old who blends a love for order, competition, and vivid imagination into every playroom, piggy bank, and bedtime story, and they approach each activity with
    methodical enthusiasm.
background:
  cultural: Alicia is raised in a bilingual Spanish‑American household. Her parents regularly celebrate Spanish traditions such as Día de los Reyes and Semana Santa, sharing folkloric music, stories, and
    foods like churros and empanadas. She attends a local preschool in Meridian where English is the primary language, but at home she hears and speaks Spanish, giving her early cultural duality. The family
    balances these traditions with Idaho’s outdoor lifestyle, often taking weekend hikes and exploring the nearby Boise River, which adds a regional touch to her culturally rich upbringing.
attributes:
  skills: '[''following daily routines'', ''letter recognition and name writing'', ''basic counting and simple addition'', ''LEGO building and jigsaw puzzle solving'', ''basic bilingual communication (English
    & Spanish)'']'
  hobbies: '[''building LEGO structures'', ''drawing and coloring'', ''reading picture books with linear narratives'', ''structured games (Simon Says, Memory, board games)'', ''singing Spanish children’s
    songs'', ''helping prepare simple Spanish snacks'']'
  career_goals: 'Even at five, Alicia articulates clear ambitions: she loves the idea of becoming a teacher because she enjoys planning activities, arranging classroom materials, and helping friends follow
    rules. She also dreams of designing and constructing things, imagining herself as a LEGO architect or a young engineer, and she frequently mentions wanting to care for animals, picturing a future as
    a veterinarian. All of these goals reflect her desire for structured, methodical work where she can excel and be recognized for her achievements.'
