personas:
  professional: Yadira Valdes, a four‑year‑old with a keen interest in building puzzles, approaches each play session like a tiny project manager, balancing curiosity about new pieces with the practicality
    of following the step‑by‑step guide from her picture book.
  sports: Yadira Valdes dashes around the preschool soccer field every Tuesday, proudly wears a jersey bearing the number 7 of the local professional soccer team, the LA Galaxy, participates in a toddler
    gymnastics class at the community center, and splashes eagerly during Saturday swim lessons at the neighborhood pool.
  arts: Yadira Valdes delights in finger‑painting bright landscapes while humming the theme from "Frozen" by Idina Menzel, dances to the upbeat tunes of Disney’s "Moana" soundtrack, and enjoys watching
    local children's theater productions starring classic characters like Mickey Mouse.
  travel: Yadira Valdes loves family road trips to the sunny beaches of Florida, weekend explorations of the nearby botanical garden, magical day‑outs at Disneyland, and daydreams about seeing the ancient
    pyramids on a future vacation to Mexico.
  culinary: Yadira Valdes prefers creamy macaroni and cheese with sharp cheddar, loves dipping crunchy carrot sticks into hummus, can assemble a peanut butter and jelly sandwich with a little help, and
    often requests strawberry yogurt for dessert.
  core: Yadira Valdes, an organized four‑year‑old who lines up toys by color and color‑codes storybooks, balances boundless curiosity with a surprisingly practical mindset, and occasionally throws a tantrum
    when snack time is delayed.
background:
  cultural: Raised in a Mexican‑American household in Agoura Hills, Yadira grows up bilingual, hearing Spanish at home and English at preschool. Her family celebrates Mexican traditions such as Día de los
    Muertos, Cinco de Mayo, and family reunions with homemade tacos, tamales, and fruit with chili powder. She participates in local community events, attends a bilingual preschool that incorporates both
    cultures, and enjoys Mexican folk music, stories, and dance. This rich cultural blend shapes her identity, values, and daily experiences.
attributes:
  skills: '[''basic literacy'', ''counting to 20'', ''bilingual communication (English and Spanish)'', ''fine motor coordination (cutting, coloring)'', ''puzzle solving'', ''organizing toys by color and
    size'', ''following multi-step instructions'', ''basic touchscreen interaction'', ''social sharing and turn‑taking'', ''expressing emotions verbally'']'
  hobbies: '[''drawing and coloring'', ''building with LEGO Duplo and wooden blocks'', ''reading picture books'', ''dancing to music'', ''helping in the kitchen'', ''outdoor play at the park'', ''pretend
    play (doctor, teacher)'', ''listening to Spanish stories'', ''collecting natural objects'']'
  career_goals: Yadira imagines a future where she helps others and cares for living things. She dreams of becoming a preschool teacher who creates organized, engaging learning environments, a veterinarian
    who gently cares for pets, and a chef who follows recipes to share tasty Mexican dishes with family. She also hopes to grow a small garden at home, blending her practical side with a love of nature.
    Her ambitions are guided by her organized, compassionate personality and her desire to keep expanding her bilingual abilities.
