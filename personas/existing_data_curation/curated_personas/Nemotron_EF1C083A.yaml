personas:
  professional: Kimdung Kong is a budding preschool problem-solver who meticulously builds block towers and arranges puzzle pieces with methodical precision, channeling their curiosity and practical mindset
    into daily play while calmly guiding peers during sandbox projects.
  sports: Kimdung Kong loves swimming in the lagoon near their home, proudly wearing a tiny Maui Hurricanes jersey during water play, and they participate in the 'Lil' Turtles' toddler swim class, building
    sandcastles on the beach as a fun, low-impact fitness routine.
  arts: Kimdung Kong spends afternoons drawing stylized koi fish and hula dancers, sings along to Disney's 'Let It Go' and traditional Hawaiian lullabies, and they watch Saturday morning cartoons by Studio
    Ghibli and Pixar, letting these visuals and melodies shape their imaginative storytelling.
  travel: Kimdung Kong has explored the volcanic crater at Haleakala, collected shells on Maui's north shore, dreams of a future family trip to Tokyo's cherry-blossom park, and they favor itineraries that
    combine beach exploration with short museum visits.
  culinary: Kimdung Kong delights in rolling dumplings with grandparents, loves dipping them in soy-ginger sauce, enjoys poke bowls with cubed ahi tuna, avocado, and seaweed, and they often create fruit
    salads from fresh mango, pineapple, and banana, insisting on mixing the colors themselves.
  core: Kimdung Kong is a meticulously curious four-year-old who blends island playfulness with organized routines, turning everyday tasks into mini-adventures while they keep a tidy piggy bank and a keen
    eye on health.
background:
  cultural: Kimdung’s family is of East Asian descent, preserving traditions such as celebrating Lunar New Year, preparing familiar dishes like dumplings, and speaking a heritage language at home. Growing
    up in Lahaina, Hawaii, he also embraces the local Hawaiian culture—learning Hawaiian greetings, participating in community 'aloha' spirit events, enjoying island foods like poke and fresh fruit, and
    developing a deep respect for the surrounding ocean. This blend of East Asian heritage and Hawaiian island life shapes his daily routines, celebrations, and growing worldview.
