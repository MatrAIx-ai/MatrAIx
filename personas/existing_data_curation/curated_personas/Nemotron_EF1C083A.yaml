  career_goals: Kimdung often tells his parents he wants to become a marine biologist to study sea turtles and protect Hawaiian reefs, blending his curiosity about ocean life with a practical desire to
    help the environment. He also imagines being a firefighter because he likes clear procedures and the chance to assist others. These aspirations reflect his organized nature, balanced curiosity, and
    compassionate yet self‑directed approach to future roles.
