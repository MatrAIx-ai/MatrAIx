personas:
  professional: John Thomas leverages his bilingual fluency and knack for active listening as a front‑line customer service representative at a Miami tech firm, expertly navigating Salesforce while infusing
    creative problem‑solving inspired by the city’s art scene, and they are actively pursuing a Customer Experience Management certification to step into a team‑lead role that melds service strategy with
    cultural storytelling.
  sports: John Thomas fuels his competitive streak by playing in the South Miami Hoops basketball league, cheering for the Miami Heat during the NBA season, and they supplement their cardio with weekly
    salsa and Afro‑beat dance classes, while occasionally hitting the local gym to strengthen their knees after intense games.
  arts: John Thomas immerses themself in Miami’s vibrant art scene, capturing the city’s multicultural pulse through street photography inspired by the bold murals of local artist Marlon Nieto, attending
    pop‑up exhibitions featuring works by Kehinde Wiley, and they vibe to live performances by artists such as Bad Bunny and Lin‑Manuel Miranda.
  travel: John Thomas prefers spontaneous weekend getaways that blend cultural immersion and visual inspiration, often hopping on a short flight to Havana to explore its historic streets and vibrant music
    scene, while dreaming of attending the Carnival in Salvador, Brazil to photograph the kaleidoscopic celebrations, and they use a mix of Airbnb and couch‑surfing to stay flexible.
  culinary: John Thomas delights in sampling and recreating bold flavors—from savoring a perfectly seasoned jerk chicken at a Little Haiti food fair to cooking their own Cuban sandwich with slow‑roasted
    pork, fresh pickles, and mustard—while their modest kitchen skills let them whip up classic rice‑and‑beans and a refreshing ceviche for friends, and they occasionally indulge in late‑night snacking
    on plantain chips while editing photos.
  core: John Thomas is a culturally attuned, energetic connector who blends artistic curiosity with community service, yet sometimes lets their love for spontaneous experiences derail meticulous planning,
    and they wrestle with occasional procrastination when paperwork piles up.
background:
  cultural: Raised in Miami's richly diverse neighborhoods, John draws on his African‑American heritage and the Afro‑Caribbean influences that permeate the city. Family gatherings often feature a blend
    of soulful music, Caribbean dishes, and community storytelling, reinforcing values of resilience, collaboration, and artistic expression. His bilingual environment and exposure to both Black and Latin
    cultures have shaped a nuanced worldview that celebrates multiculturalism while honoring his roots. John’s cultural identity informs his commitment to community service, creative problem‑solving, and
    fostering inclusive experiences both at work and in his personal life.
attributes:
  skills: '["Customer Service", "Active Listening", "Conflict Resolution", "CRM Software (Salesforce)", "Multilingual Communication (English/Spanish)", "Problem Solving", "Time Management", "Team Collaboration",
