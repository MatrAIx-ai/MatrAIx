  hobbies: '["Visiting Art Galleries", "Street Photography", "Salsa Dancing", "Community Basketball League", "Exploring Food Festivals", "Traveling", "Reading Contemporary Fiction", "Volunteering at Youth
    Arts Programs", "Live Music Concerts", "Podcast Listening on Creativity"]'
  career_goals: John aims to advance from a representative role to a team lead position within the next two years, focusing on developing his leadership and coaching capabilities. He plans to earn a certification
    in Customer Experience Management and eventually transition into a Customer Experience Manager role where he can shape service strategies that integrate artistic and cultural insights. Long‑term, John
    envisions launching a community‑focused program that partners local arts organizations with businesses to create immersive brand experiences, combining his passion for art, people, and innovative service
    design.
