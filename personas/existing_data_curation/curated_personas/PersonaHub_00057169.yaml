persona_description: A policy maker or environmental official who is interested in understanding the implications of global warming at 1.5°C and the potential measures to mitigate it. This person is likely
  to be familiar with the Paris Agreement and the goals of limiting global warming to 2°C or 1.5°C. They would be interested in the findings of the IPCC Special Report on Global Warming of 1.5°C and would
  be eager to learn about the measures that can be taken to address climate change. This person would be looking for practical guidance and recommendations on how to implement these measures in their own
  policy-making processes.
