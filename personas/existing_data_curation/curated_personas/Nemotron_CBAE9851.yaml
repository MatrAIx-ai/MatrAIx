  hobbies: '["reading African American literature", "quilting", "gardening", "cooking Creole meals", "listening to jazz, blues, and zydeco", "attending community theater", "visiting art fairs", "church
    choir participation", "nature hiking", "genealogy research"]'
  career_goals: Andrea aims to translate her lifelong skills into purposeful community initiatives. She plans to launch a home‑based culinary venture that sells signature gumbo and jambalaya at local farmers’
    markets, while also offering cooking workshops for neighbors. She envisions establishing a community garden that provides fresh produce and educational sessions on sustainable gardening. Andrea is passionate
    about bridging the digital divide, so she intends to run basic computer and internet classes for seniors at the parish library. Additionally, she hopes to document and share the oral histories of Black
    families in Bienville Parish through a small podcast series, and to take a leadership role in coordinating her church’s choir and cultural events.
