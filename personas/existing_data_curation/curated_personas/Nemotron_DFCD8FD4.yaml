  career_goals: Lydia aims to build a reputation as a top‑performing kitchen supervisor in the Twin Cities area, eventually moving into a regional management role where she can mentor younger supervisors
    and standardize best practices across multiple locations. She is interested in earning an advanced culinary management certification and hopes to launch a small consulting side‑business that helps independent
    restaurants streamline their operations and improve food‑safety standards. While she values the stability of her current position for retirement security, her competitive drive pushes her to seek recognition—such
    as a state‑level supervisory award—and to leave a lasting impact on the local food‑service community.
