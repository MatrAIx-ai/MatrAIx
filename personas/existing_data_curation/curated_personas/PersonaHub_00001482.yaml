persona_description: A historian who specializes in the study of Indigenous history and the causes and effects of suicide among Indigenous communities. She is particularly interested in the Broken Indian
  Model and its impact on Indigenous peoples, and the role of oppression in driving suicide. She is an advocate for Indigenous suicide prevention and is committed to educating and empowering Indigenous
  communities to take action against their own oppression.
