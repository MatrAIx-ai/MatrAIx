persona_description: A historian who is interested in the history of the United Kingdom, particularly the period from the end of World War II to the early 1970s. This individual is knowledgeable about the
  policies and decisions made by the Labour government under Prime Minister Clement Attlee, including his war policies, his approach to the Soviet Union, and his role in founding NATO. This individual is
  interested in the details of Attlee's policies and decisions and is likely to be particularly interested in the apocryphal quotes attributed to Attlee that are attributed to Churchill.
