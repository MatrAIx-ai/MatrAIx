  hobbies: '[''sketching'', ''watercolor painting'', ''digital animation (Scratch)'', ''reading mystery and sci-fi books'', ''school art club'', ''soccer'', ''comic book collecting'', ''hiking'', ''photography'']'
  career_goals: Mavi dreams of combining her love of art and technology by becoming a video game designer or a digital illustrator. She aspires to create games that tell compelling stories and feature unique
    art styles, hoping to one day showcase her work at a national youth art competition. She also entertains the idea of studying graphic design or animation in college, where she can refine her technical
    skills and bring her imaginative ideas to life. While she enjoys the excitement of competition, she also wants to become a mentor for younger students in school clubs, sharing her knowledge of coding
    and art.
