  career_goals: Andrea often declares that she wants to be a teacher because she enjoys leading pretend lessons and organizing playtime, and she also fantasizes about becoming an architect, eager to design
    the biggest and most stable block towers she can imagine. Her competitive streak pushes her to be the best at these imagined roles, even at this young age.
