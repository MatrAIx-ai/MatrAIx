personas:
  professional: John Cornelius, a seasoned landscape designer with a knack for turning native plant palettes into living watercolor canvases, channels their curious and easy-going temperament into a boutique
    consultancy that crafts eco-friendly gardens, mentors emerging landscapers, and drafts a guidebook—though their habit of misplacing project notes often forces last-minute improvisation.
  sports: John Cornelius stays active through early-morning birdwatching walks, a weekly senior walking club in the Hudson Valley, and friendly pick-up pickleball games with former colleagues, while cheering
    for the New York Mets and keeping an eye on the New York Knicks during the basketball season.
  arts: John Cornelius, an avid watercolorist and nature photographer, draws inspiration from Monet's gardens and the improvisational spirit of Miles Davis, regularly attending local gallery openings and
    swapping stories with fellow art lovers over a glass of pinot noir.
  travel: John Cornelius prefers leisurely weekend road trips that explore historic towns like Woodstock, Saratoga Springs, and the Finger Lakes region, often stopping at local farmers' markets before dreaming
    of a future pilgrimage to Kyoto's zen gardens, a plan tempered by health considerations and a modest travel budget.
  culinary: John Cornelius enjoys cooking seasonal dishes such as herb-marinated grilled trout with lemon-thyme, roasted beet and goat cheese salad featuring heirloom tomatoes, and freshly baked sourdough
    loaf, relying on garden harvests of ramps, kale, and rosemary while often improvising with a pinch of sea salt and a splash of apple cider vinegar.
  core: John Cornelius is a garden-loving, watercolor-painting retiree who trades meticulous plant knowledge for a habit of misplacing tools, worries over every detail, and finds solace in sunrise bird
    calls and the soft brushstrokes of jazz.
background:
  cultural: John grew up in a middle‑class white family on the outskirts of Baltimore, Maryland, before relocating to Otsego County, New York. His upbringing combined Mid‑Atlantic suburban influences with
    the rural traditions of upstate New York. He was exposed to American folk art, community festivals, and a strong work ethic rooted in self‑reliance and neighborly cooperation. These cultural strands
    fostered his appreciation for nature, practical skill‑building, and a curiosity for artistic expression, shaping both his professional path in landscaping and his personal interests in art and community
    engagement.
