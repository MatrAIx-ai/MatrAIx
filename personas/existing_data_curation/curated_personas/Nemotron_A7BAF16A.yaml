  career_goals: As he approaches retirement, John aims to transition from full‑time groundskeeping to a boutique consultancy where he can design small‑scale, eco‑friendly gardens that incorporate art installations.
    He hopes to mentor younger landscapers, share his knowledge of sustainable practices, and perhaps write a guidebook that weaves together horticulture and personal creativity. Balancing health and stress,
    he also seeks a steadier schedule that allows more time for his artistic pursuits while maintaining a modest income.
