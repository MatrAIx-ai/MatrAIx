  hobbies: '[''Soccer'', ''LEGO building and basic robotics'', ''Scratch coding projects'', ''Reading science books'', ''Drawing comic illustrations'', ''Minecraft creative mode'', ''Helping with family
    cooking'']'
  career_goals: Lazaro dreams of turning his curiosity about science and his desire to help others into a future career. He hopes to become a biomedical engineer or a physician who can develop affordable
    health solutions for families in the Rio Grande Valley. In the short term, he aims to maintain high grades in middle school, earn a spot on his school’s robotics team, and win a science‑fair award that
    could fund a scholarship. He also wants to mentor younger kids in his neighborhood by teaching them basic coding and encouraging participation in community projects. By combining his practical mindset
    with inventive ideas, Lazaro plans to pursue a university degree in a health‑related or engineering field and eventually give back to the community that shaped him.
