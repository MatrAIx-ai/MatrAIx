personas:
  professional: Lazaro Ledesma is a budding robotics hobbyist who blends his love of LEGO construction with beginner Scratch programming, turning imaginative designs into simple moving models while eagerly
    documenting his process in a notebook.
  sports: Lazaro Ledesma plays midfield for the Riverside Rovers youth soccer club, enjoys tactical drills with three close friends, and cheers for the professional team the City Hawks during weekend matches,
    balancing regular practice with a love for spontaneous street football.
  arts: Lazaro Ledesma draws comic-style panels inspired by Jim Lee and imagines soundtracks a la Koji Kondo while listening to Imagine Dragons, turning video-game narratives into vivid illustrations that
    they proudly display on their bedroom wall.
  travel: Lazaro Ledesma's travel dreams include camping under the stars at the Grand Canyon, exploring the interactive exhibits at the Smithsonian National Air and Space Museum, and someday visiting the
    Galápagos Islands to see giant tortoises up close, preferring family-planned itineraries that mix adventure with downtime.
  culinary: Lazaro Ledesma helps prepare family meals featuring tacos with grilled carne asada, freshly mashed guacamole made from ripe Hass avocados and chopped jalapeños, and salsa verde, developing a
    practical kitchen skill set while occasionally sneaking extra cheese or forgetting to wash hands before cooking.
  core: Lazaro Ledesma is a curious yet practical 11-year-old who channels a love for building, drawing, and soccer into structured hobbies, balances a modest allowance with occasional splurges, and navigates
    mild health quirks with a blend of independence and parental guidance.
background:
  cultural: Lazaro was born and raised in Harlingen, Texas, a city on the U.S.–Mexico border with a vibrant bicultural community. His parents are Mexican immigrants who preserved their native language,
    customs, and culinary traditions at home. Spanish is spoken daily, while English is used at school and in public life, giving Lazaro fluency in both languages. Family celebrations often feature traditional
    Mexican holidays such as Día de los Muertos and Cinco de Mayo, with homemade tamales, papel picado, and music ranging from norteño to contemporary pop. Attending a local Catholic church provides a sense
    of community and participates in festivals that blend Mexican and Texan influences. This rich cultural environment nurtures his pride in his heritage and shapes his values of family, respect, and community
    involvement.
