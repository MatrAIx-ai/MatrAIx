personas:
  professional: Marlo Thompson, a 37-year-old data-driven marketing strategist, leverages her methodical, organized approach and competitive drive to lead cross-functional teams, master A/B testing, Tableau,
    and AI-enhanced campaign design, while thriving on networking buzz and mentoring emerging talent.
  sports: Marlo Thompson, a dedicated runner, trains for 5K races through the Brookline Road Runners club, squeezes in power yoga sessions at a downtown studio, and roots for the Boston Red Sox and Celtics,
    using sport as both a structured outlet for stress relief and a social arena for networking.
  arts: Marlo Thompson, an avid reader of historical fiction by Hilary Mantel and psychology titles by Malcolm Gladwell, regularly attends Boston Symphony Orchestra performances featuring works by Philip
    Glass, enjoys wine-paired gallery openings showcasing contemporary artist Kehinde Wiley, and finds these cultural experiences a polished counterpoint to her data-driven mindset.
  travel: Marlo Thompson prefers meticulously planned trips, alternating weekend getaways to Cape Cod's vineyards with longer, itinerary-driven journeys to historic European capitals like Florence and Kyoto,
    balancing a love of structured exploration with occasional spontaneous wine-tour detours.
  culinary: Marlo Thompson, a confident home cook, pulls fresh rosemary, thyme, and basil from her herb garden to craft Mediterranean-inspired dishes such as lemon-herb grilled salmon and ratatouille, while
    indulging in upscale wine-pairing dinners featuring aged Malbec and artisanal cheeses.
  core: Marlo Thompson blends data-driven precision with a charismatic, talkative flair, obsessively tracking marketing metrics while secretly hoarding a stash of vintage wine corks for good luck.
background:
  cultural: Marlo grew up in a suburban New England family with Anglo‑American roots, attending public schools in the Boston metropolitan area before earning a bachelor's degree in Computer Science from
    a state university. The region’s emphasis on education, civic engagement, and progressive values shaped her practical, organized outlook. Living in Brookline, an affluent and culturally diverse community,
    she is immersed in a blend of New England traditions, academic culture, and a vibrant professional network. Her upbringing stresses hard work, self‑reliance, and community involvement, which reinforce
    her competitive drive, sociable demeanor, and methodical approach to both work and personal life.
