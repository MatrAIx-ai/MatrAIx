  career_goals: Marlo seeks to advance to a Director of Marketing position within the next three years, focusing on integrating advanced analytics and AI‑driven insights into campaign design. Her long‑term
    ambition is to become a Chief Marketing Officer, leading a global brand strategy that champions data‑informed decision‑making and cultivates high‑performance teams. She also aims to mentor emerging
    marketers, develop a proprietary marketing analytics framework, and share thought leadership through speaking engagements at industry conferences and publishing articles in leading marketing journals.
