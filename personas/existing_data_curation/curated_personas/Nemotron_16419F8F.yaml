personas:
  professional: Daniel Froehlich, an emerging teenage basketball point guard and school theater lead, draws on their love for routine, reliability, and sociable charisma, and they channel it into disciplined
    practice sessions, consistent game strategy, and confident stage performances that keep audiences engaged.
  sports: Daniel Froehlich, a dedicated point guard for their middle school basketball team, avidly follows the New Orleans Pelicans and the St. Rose Red Raiders high‑school football Friday‑night games,
    and they spend weekends fishing in the nearby bayous with the local youth angling club.
  arts: Daniel Froehlich, a drum‑savvy member of the school band and an enthusiastic participant in theater and karaoke clubs, draws inspiration from drummers like Travis Barker, admires performers such
    as Zendaya, and reads graphic novels by Brian K. Vaughan such as 'Saga' and classic superhero comics by Stan Lee, letting these influences shape their energetic stage presence.
  travel: Daniel Froehlich enjoys short family road trips to New Orleans for Mardi Gras parades, weekend fishing outings to the local bayous, and annual visits to Washington, D.C.’s Smithsonian museums,
    and they dream of a future adventure to Yellowstone National Park and a Disney World vacation.
  culinary: Daniel Froehlich, who loves cooking simple but flavorful meals, frequently prepares gumbo with andouille sausage and shrimp for family dinners, flips fluffy pancake stacks with maple syrup on
    Saturday mornings, and adds a splash of hot sauce to po’ boys, showcasing a growing knack for balancing traditional Creole flavors with a teen’s experimental palate, and they often share their creations
    with friends during game nights.
  core: Daniel Froehlich is a routine‑loving, talkative teen who thrives on the buzz of a basketball court, the applause of a stage, and late‑night gaming marathons, yet can’t resist a midnight snack of
    spicy gumbo while occasionally forgetting to bring their inhaler.
background:
  cultural: Daniel grew up in Zachary, Louisiana, a tight‑knit community in East Feliciana Parish where Southern hospitality and family ties are central values. His family participates in local church activities,
    attending a Southern Baptist congregation that emphasizes community service and seasonal traditions such as Mardi Gras celebrations and high school football Friday‑night games. The cultural environment
    blends modern suburban life with long‑standing Southern customs, including an appreciation for regional cuisine like gumbo and po’ boys, and outdoor pursuits such as fishing and exploring nearby bayous.
    Daniel’s upbringing reflects a balance of respect for tradition and openness to contemporary influences, shaped by his school’s focus on academics, extracurricular clubs, and community engagement.
