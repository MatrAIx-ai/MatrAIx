  hobbies: '[''Basketball'', ''Video gaming (Minecraft, Fortnite)'', ''School theater'', ''Karaoke'', ''Drums (school band)'', ''Reading graphic novels'', ''Cooking (family meals)'', ''Community event volunteering'']'
  career_goals: Daniel envisions a future that combines his love for practical problem‑solving with his desire to serve his community. He aims to earn a scholarship to study civil engineering, hoping to
    design safe, reliable infrastructure for small towns like Zachary. Alongside a technical career, he wants to stay involved in youth mentorship by coaching middle‑school basketball or volunteering as
    a peer tutor, allowing him to use his sociable nature and public‑speaking skills. He also entertains a secondary ambition to explore media production, such as creating short educational videos for local
    schools, blending his comfort in the spotlight with his practical mindset.
