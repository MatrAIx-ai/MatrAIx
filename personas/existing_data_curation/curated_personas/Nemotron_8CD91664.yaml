  hobbies: '["senior fitness & dance classes", "bingo and card games", "community gardening (herbs & citrus)", "southern‑Californian cooking & potlucks", "jazz and R&B listening", "live music events", "photography
    of desert landscapes", "local history walking tours", "volunteering at the community center", "traveling to family roots"]'
  career_goals: Though retired, Carlos aims to channel his curiosity and practicality into new forms of contribution. He envisions launching a senior‑led oral‑history project that records the experiences
    of Black residents in the Antelope Valley, partnering with the local library. He also wants to mentor teenage apprentices through a community handyman program, teaching them safe repair techniques.
    Learning digital photography and documenting neighborhood changes is another personal ambition, as is mastering a new musical instrument—the saxophone—to join the church jazz ensemble. Lastly, he hopes
    to travel with his wife to hometowns in the South, connecting with extended family and sharing their stories at community events.
