personas:
  professional: Elizabeth Pagan leverages her physics expertise, strong Python, MATLAB, and LabVIEW skills, and talent for visual storytelling to design and run undergraduate labs, translate complex concepts
    into engaging multimedia, and mentor students, while her curiosity and worry about perfection drive meticulous lesson planning and occasional over‑preparation.
  sports: Elizabeth Pagan hikes the Wasatch Range with a local mountaineering club, practices yoga thrice weekly, follows the Utah Jazz and Real Salt Lake, and belongs to a weekend recreational tennis league,
    balancing active outdoor pursuits with seasonal indoor workouts.
  arts: Elizabeth Pagan sketches Utah mountain vistas in watercolor, draws inspiration from Ansel Adams and Georgia O'Keeffe, attends gallery openings featuring contemporary artist James Turrell, and finds
    solace in listening to the ambient album "Music for Airports" by Brian Eno while painting.
  travel: Elizabeth Pagan enjoys planning immersive trips that blend art and nature, having trekked through Zion and Arches National Parks, explored the museums of Florence, and dreaming of a spring visit
    to Iceland’s aurora‑lit fjords.
  culinary: Elizabeth Pagan favors wholesome Mediterranean meals, often cooking quinoa salads with roasted beets, feta, and pistachios, but admits to an occasional indulgence in Utah’s famous fry sauce
    with frozen mozzarella sticks, and she considers herself a competent home cook but not a pastry chef.
  core: Elizabeth Pagan is a meticulous physics educator who blends scientific rigor with artistic flair, worries about perfection, and finds balance through outdoor hikes, watercolor painting, and mindful
    yoga.
background:
  cultural: Elizabeth was raised in a middle-class family of Northern European descent in the Intermountain West. Growing up in Salt Lake City, she was immersed in a community that values outdoor recreation,
    self-reliance, and a strong civic spirit. While the region has a notable Mormon cultural presence, her household fostered a secular, progressive worldview that emphasized education, curiosity, and cultural
    openness. She draws on the region’s appreciation for nature and public arts, which informs both her personal hobbies and her teaching philosophy.
attributes:
  skills: '[''Physics and mathematics subject proficiency'', ''Laboratory safety and equipment management'', ''Experimental design and troubleshooting'', ''Data analysis using Python, MATLAB, and LabVIEW'',
    ''Instructional design and curriculum development'', ''Academic writing and research documentation'', ''Effective communication and teaching'', ''Visual storytelling and educational multimedia creation'',
    ''Student mentorship and peer support'', ''Use of Learning Management Systems (Canvas, Blackboard)'']'
  hobbies: '[''Sketching and watercolor painting'', ''Hiking in Utah mountain trails'', ''Visiting art museums and galleries'', ''Reading science fiction and philosophy'', ''Listening to podcasts on technology
    and creativity'', ''Practicing yoga and mindfulness meditation'', ''Participating in a book club'', ''Volunteering at community science fairs'', ''Photography of natural landscapes'', ''DIY crafts and
    upcycling projects'']'
  career_goals: She aspires to transition from a teaching assistant to a full-time lecturer or faculty member in a university physics department, where she can shape interdisciplinary STEAM courses that
    weave together scientific rigor with artistic creativity. Elizabeth aims to secure research funding for projects that explore innovative teaching methods and incorporate art-based learning to improve
    student engagement. She is also driven to develop outreach programs that bring science and art together for K-12 students in the Salt Lake community, and ultimately to take on a leadership role in academic
    affairs or curriculum innovation.
