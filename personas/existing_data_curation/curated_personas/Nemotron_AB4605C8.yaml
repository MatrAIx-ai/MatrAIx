personas:
  professional: Susan Mikell, a five‑year‑old preschool “class captain” who organizes daily classroom chores, excels at counting and sorting, and applies their natural discipline and competitive drive to
    help their peers meet high standards in early learning activities.
  sports: Susan Mikell kicks a bright orange soccer ball with the Sedalia Little Strikers club, cheers for the Kansas City Chiefs during weekend family football nights, and insists on a morning stretch
    routine before any outdoor activity, reflecting their love of structure and friendly competition.
  arts: Susan Mikell delights in drawing whimsical characters from The Wiggles, sings along to Sesame Street songs at the local library storytime, and proudly displays a finger‑painting of a red barn, showing
    how community arts events shape their creative outlet.
  travel: Susan Mikell dreams of an annual family trip to the county fair in Sedalia, where they meticulously map out rides and candy stalls, and after school they excitedly plan a future visit to St. Louis’s
    Science Center, balancing their adventurous curiosity with their need for familiar routines.
  culinary: Susan Mikell favors gooey mac and cheese, crunchy chicken nuggets, and the occasional funnel cake from the county fair, can assemble a peanut‑butter‑jelly sandwich all by themselves, yet often
    forgets to eat their vegetables, claiming they’re “boring” compared to sugary treats.
  core: Susan Mikell’s five‑year‑old world revolves around tidy toy chests, allowance spreadsheets, allergy charts, soccer drills, colorful crayons, fair‑ground maps, and a secret stash of extra dessert,
    all driven by a surprising blend of discipline and playful curiosity.
background:
  cultural: Susan was born and raised in Sedalia, Missouri, a small Midwestern town known for its community spirit and annual state fair. Her family reflects typical Midwestern values—punctuality, politeness,
    and an emphasis on hard work and achievement. They attend a local Protestant church, celebrate holidays with family gatherings, and participate in community events such as the county fair and library
    storytimes. This environment reinforces her preference for routine, structured activities, and a competitive yet respectful attitude toward peers.
attributes:
  skills: '[''Organizing toys by category'', ''Following daily routines'', ''Letter recognition and early reading'', ''Counting to 20'', ''Completing simple jigsaw puzzles'', ''Coloring within lines'',
    ''Following multi‑step instructions'', ''Participating in rule‑based games'']'
  hobbies: '[''Building LEGO structures'', ''Coloring books'', ''Jigsaw puzzles'', ''Listening to picture books'', ''Sticker collecting and organizing'', ''Nature walks and leaf sorting'', ''Structured
    preschool circle games'']'
  career_goals: Although only five, Susan already imagines future roles that reflect her love of order and achievement. She often says she wants to become a teacher who can create organized classrooms,
    a librarian who curates books neatly, or an astronaut who follows precise procedures. In the near term, she aspires to win the preschool spelling bee and earn a gold star in her weekly arts‑and‑crafts
    competition, aiming to be recognized as the top performer among her peers.
