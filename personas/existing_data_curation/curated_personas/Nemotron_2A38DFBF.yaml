  hobbies: '[''Visiting art galleries'', ''Sketching'', ''Cooking fusion cuisine'', ''Hiking'', ''Yoga'', ''Playing piano'', ''Reading science-fiction'', ''Volunteer data-literacy mentorship'', ''Attending
    community arts events'']'
  career_goals: Lanh aims to advance into a senior leadership role within data science, such as Director of Analytics or Chief Data Officer, where she can shape data strategy for a health-tech or sustainable-energy
    company. She intends to deepen her expertise in AI ethics and responsible machine learning, earning an advanced certification or a master’s degree in data science if needed. Lanh also aspires to mentor
    women and underrepresented minorities in STEM, establishing a community program that blends data literacy with creative arts workshops. Over the next five years she hopes to lead a cross-disciplinary
    team that delivers predictive solutions for public health challenges, while publishing case studies that highlight the synergy between quantitative rigor and artistic communication.
