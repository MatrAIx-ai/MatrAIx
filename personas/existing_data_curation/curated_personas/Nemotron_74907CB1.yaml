  career_goals: As he approaches retirement, Dakin aims to shift his focus from daily sales quotas to shaping the next generation of sales representatives. He plans to formalize a mentorship program within
    his company, helping junior staff develop the same balance of empathy and practicality that defines his approach. He also hopes to contribute to improving the firm’s overall client satisfaction metrics
    by designing streamlined service‑resolution processes. Outside the workplace, Dakin wishes to allocate more time to community volunteer work, especially assisting senior citizens with navigating utility
    services, and to eventually serve on the advisory board of a local nonprofit focused on senior support.
