personas:
  professional: Ann Mathis, an aspiring teen roboticist and nature illustrator, blends curiosity for engineering with a practical love for sketching, channeling their strategic gaming mindset into building
    simple robotics kits and documenting wildlife during bike rides.
  sports: Ann Mathis, a casual cyclist who rides the Columbia River Trail every weekend and cheers for the Seattle Seahawks and Portland Trail Blazers, also volunteers with the local youth soccer league,
    preferring flexible, low‑pressure fitness over strict training schedules.
  arts: Ann Mathis, an avid sketcher of forest scenes and acoustic guitar player, draws inspiration from fantasy author Brandon Sanderson and folk artist Audre Lorde, often listening to Ed Sheeran while
    baking cupcakes for friends, and they attend the regional art museum's teen workshops whenever possible.
  travel: Ann Mathis, who dreams of exploring the Cascades and wants to visit Japan’s countryside for cherry blossoms, prefers spontaneous weekend road trips to nearby state parks over meticulously planned
    vacations, balancing a love for wildlife photography with limited family budget constraints.
  culinary: Ann Mathis, a budding baker, enjoys experimenting with cocoa‑rich chocolate cupcakes topped with rainbow sprinkles and often adds fresh berries from the farmer’s market, while their cooking
    skills remain beginner‑level, leading to occasional burnt edges and a habit of cleaning up the kitchen only after friends have left.
  core: Ann Mathis, a curious yet laid‑back teen, fuses a love for robotics, nature, and music with a habit of procrastinating on chores, turning spontaneous creativity into heartfelt cupcakes and wildlife
    sketches.
background:
  cultural: Ann Lynn comes from a white, middle‑class family in Kennewick, Washington, a city in the Tri‑Cities region known for its blend of agricultural heritage and growing urban culture. She experiences
    typical Pacific Northwest values such as appreciation for the outdoors, environmental stewardship, and community involvement. Family traditions include celebrating holidays like Thanksgiving and Fourth
    of July barbecues, attending local high‑school sports events, and participating in school and community service activities. The regional emphasis on river activities, farming, and a close‑knit community
    shape her worldview and everyday experiences.
