  career_goals: Ann Lynn hopes to blend her love for animals, the outdoors, and practical problem‑solving into a future career. She dreams of becoming a wildlife rehabilitation specialist or a veterinary
    technician, working with local animal shelters and conservation projects. At the same time, she is intrigued by technology and envisions gaining advanced coding skills to develop tools that assist environmental
    monitoring. Her long‑term ambition is to contribute to her community’s health and sustainability while staying grounded in a stable, service‑oriented profession.
