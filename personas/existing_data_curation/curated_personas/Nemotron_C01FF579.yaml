  career_goals: Nalini aspires to become a visual artist who intertwines South Asian cultural motifs with contemporary styles, hoping to create work that promotes cross‑cultural dialogue and emotional healing.
    She dreams of attending a high‑school art program, earning a scholarship for a fine‑arts degree, and eventually leading community art‑therapy workshops for youth to help them manage stress and express
    emotions. She also envisions using her bilingual skills to teach art in multicultural settings, fostering inclusivity and harmony.
