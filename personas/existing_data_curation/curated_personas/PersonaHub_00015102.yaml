persona_description: A Marxist feminist who specializes in the study of the family, specifically the functions and roles it plays in capitalist society. She believes that the family is a key institution
  in maintaining class inequality and capitalism, and argues that the nuclear family is not the best fit for industrial society due to its functions of socialisation and stabilisation. She supports the
  idea of overthrowing capitalism and creating a classless society where the family performs its functions for the benefit of all members. She is critical of traditional gender roles and argues that women
  have different experiences of the family and need to be able to live separately from men to gain equality.
