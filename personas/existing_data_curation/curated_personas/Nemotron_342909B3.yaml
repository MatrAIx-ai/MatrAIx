  career_goals: Though at 72, Ruben is less driven by traditional career advancement, he remains focused on leaving a lasting documentary record of Holton’s cultural and social fabric. He aims to complete
    a multi‑volume oral‑history series capturing the memories of the town’s elder residents, especially artists, veterans, and long‑time farmers, and to secure these recordings in the Jefferson County historical
    archive. He also aspires to mentor a small cohort of aspiring interviewers through a community‑center workshop, passing on his methodological approach and ethical standards. A personal ambition is to
    publish a memoir that weaves together his most striking interviews with reflections on the evolving Midwestern art scene, thereby cementing his contribution to regional cultural heritage.
