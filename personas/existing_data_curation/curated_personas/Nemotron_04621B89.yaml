  career_goals: Thom’s primary ambition is to leave a lasting legacy that blends his professional expertise with his love of community. He plans to establish a scholarship for local high‑school students
    pursuing STEM studies, author a memoir that documents the evolution of engineering practice and his personal journey, and continue mentoring emerging engineers through informal workshops. He also aims
    to deepen his involvement in senior mental‑health advocacy, using his own experiences with anxiety to develop supportive programs at the senior center. On a personal level, Thom wishes to stay intellectually
    active by learning about artificial‑intelligence applications in health care, travel to historic engineering landmarks across the United States with his wife, and maintain his physical health through
    regular walking and gentle exercise.
