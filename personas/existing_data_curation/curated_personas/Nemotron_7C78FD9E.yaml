personas:
  professional: Alekhya Mehta, a budding digital illustrator, channels her love for manga and sci‑fi storytelling into detailed character sketches, and they balance a practical eye for deadlines with a
    relaxed, often disorganized approach to school projects.
  sports: Alekhya Mehta enjoys weekend bike rides on Cedar Creek trails, occasional youth soccer practice, and cheering on the Dallas Cowboys and Dallas Mavericks, while they favor low‑key, solo fitness
    over organized team sports.
  arts: Alekhya Mehta immerses themselves in manga drawing inspired by Yoshihiro Togashi, listens to indie pop artist Clairo alongside Indian classical flutist Rajat Prasanna, and spends evenings devouring
    sci‑fi novels by N.K. Jemisin, and they let these influences shape their visual storytelling.
  travel: Alekhya Mehta prefers spontaneous weekend road trips to hidden Hill Country vineyards or family‑planned visits to New Delhi’s bustling bazaars, balancing a love for outdoor hiking with a relaxed,
    low‑budget approach to travel while dreaming of attending an anime convention in Tokyo.
  culinary: Alekhya Mehta experiments with moderate cooking skills, whisking together chicken tikka masala and Texas‑style barbecue glaze to create a spicy brisket taco, while they lovingly make mango lassi
    and buttery cornbread on weekends.
  core: Alekhya Mehta is a curious teen who blends manga artistry with Southern spice, thrives on solitary creativity, yet habitually misplaces sketchbooks in their bike basket.
background:
  cultural: Alekhya is a second‑generation Indian‑American whose family originates from the Telugu‑speaking region of Andhra Pradesh. Growing up in Cedar Creek, Texas, she experiences a bicultural environment,
    celebrating Diwali, Holi, and other Indian festivals at home while also partaking in Texan traditions such as community picnics and school events. Her household values respect for elders, multilingual
    communication (English and Hindi/Telugu), and the blending of Indian culinary aromas with Southern flavors. This cultural mosaic influences her worldview, fostering a strong sense of harmony, cooperation,
    and curiosity about diverse peoples and practices.
attributes:
  skills: '[''Basic computer troubleshooting'', ''Graphic design (Canva, Photoshop)'', ''Digital illustration'', ''Bilingual communication (English, Hindi)'', ''Cooking Indian cuisine'', ''Junior‑level
