  hobbies: '[''Sketching and digital illustration'', ''Cooking and experimenting with fusion recipes'', ''Reading science‑fiction novels'', ''Listening to indie and Indian classical music'', ''Hiking local
    nature trails'', ''Journaling and reflective writing'', ''Participating in small cultural gatherings'']'
  career_goals: Alekhya dreams of studying visual communication or user experience design in college, aiming to merge her love for technology, art, and cultural storytelling. She hopes to create inclusive
    digital platforms that highlight diverse narratives and make technology more approachable for younger users, especially those from multicultural backgrounds. In the longer term, she envisions working
    as a UX designer or community outreach coordinator focused on youth empowerment and cultural education. Parallel to this, she is intrigued by culinary arts and imagines blending Indian flavors with
    Texan cuisine in a future culinary venture or community cooking program.
