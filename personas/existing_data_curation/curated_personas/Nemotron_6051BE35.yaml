    (OPERA) proficiency'', ''Stress tolerance and time management'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Watching and discussing soccer (football)'', ''Playing acoustic guitar'', ''Exploring Chicago’s lakefront and urban parks'', ''Attending cultural festivals (Día
    de los Muertos, Mexican Independence Day)'', ''Reading hospitality and self‑improvement books'', ''Volunteering at a community center (bilingual tutoring)'']'
  career_goals: Oscar aims to move from desk clerk to night‑shift supervisor within the next year, then ascend to front desk manager and eventually oversee operations of a mid‑size boutique hotel that celebrates
    Mexican culture. He plans to earn a professional hospitality certification from the American Hotel & Lodging Educational Institute and master advanced property management technologies. In the longer
    term, he hopes to save enough capital and build a small family‑run inn in Chicago’s Little Village neighborhood, offering personalized service to Spanish‑speaking travelers while remaining financially
    stable for his children.
