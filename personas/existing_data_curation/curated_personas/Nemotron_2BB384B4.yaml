personas:
  professional: Scot Giles is a versatile maintenance and repair professional who combines a pragmatic, code‑compliant approach with a curiosity for new tools, excelling at diagnosing mechanical, electrical,
    and plumbing issues in residential and small‑commercial settings, and they aim to become a certified lead technician while leveraging their knack for improvisation when parts are scarce.
  sports: Scot Giles is an avid bass fisherman who spends early mornings on the Choctawhatchee River, follows the Tampa Bay Buccaneers for NFL weekends, maintains a modest fitness regimen through home‑based
    cardio and occasional weight‑lifting at the local Makers' Gym, and they enjoy the occasional friendly competition at the Pensacola Bass Fishing Club.
  arts: Scot Giles finds creative expression through woodworking, admiring the craftsmanship of fine furniture makers such as Thomas Chippendale and modern designers like Charles and Ray Eames, while their
    music taste leans toward classic rock icons such as Led Zeppelin and The Rolling Stones, which they play on a vintage vinyl player during evenings in the workshop.
  travel: Scot Giles prefers low‑key, self‑driven road trips that blend car culture and nature, having driven the classic 1970 Chevrolet Camaro on a weekend pilgrimage to the Detroit Auto Show and a fishing
    outing in the Florida Keys, while they dream of a future Maker Faire visit in Tokyo, reflecting a mix of relaxed planning and a competitive desire to see cutting‑edge tech.
  culinary: Scot Giles enjoys hearty Southern fare, regularly cooking smoked BBQ pork ribs, blackened catfish caught from the river, and cedar‑plank grilled corn, while their cooking skill hovers at an
    intermediate level—adequately confident with a grill and smoker but still learning to perfect a sourdough starter, and they often pair meals with craft beer from local microbreweries.
  core: Scot Giles is a hands‑on problem‑solver who thrives in solitude, balances curiosity with practicality, yet often lets disorganization slip in favor of flexible, competitive hustle, and they sometimes
    miss deadlines because they prioritize tinkering over paperwork.
background:
  cultural: Scot grew up in a working‑class family in the Florida Panhandle, immersed in a Southern culture that values self‑reliance, hard work, and community ties, especially around the military installations
    near Crestview. His upbringing emphasized practical skills over academic pursuits, leading to his early interest in trades. Although he identifies as white and has roots in the local community, he maintains
    a low‑key, reserved demeanor, often preferring solitude or small gatherings over larger social events. His brief stint at a nearby community college studying mechanical technology reflects a balance
    between curiosity and practicality, while his divorce at a young age has reinforced his independent outlook.
attributes:
  skills: '[''General facility maintenance'', ''Electrical troubleshooting'', ''Plumbing repairs'', ''HVAC system maintenance'', ''Carpentry and woodwork'', ''Preventative maintenance scheduling'', ''Blueprint
