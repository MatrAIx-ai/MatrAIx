    solving'', ''Mechanical improvisation'']'
  hobbies: '[''Car restoration projects'', ''Woodworking (furniture, small builds)'', ''Bass fishing in nearby lakes and rivers'', ''Electronics tinkering (Arduino, Raspberry Pi)'', ''DIY home improvement
    projects'', ''Playing building/simulation video games (Minecraft, Factorio)'', ''Attending local maker meetups'', ''Watching technical and nature documentaries'']'
  career_goals: Scot aims to become a certified lead maintenance technician within the next three years, targeting EPA 608 and HVAC certifications as well as OSHA safety training. He envisions moving into
    a supervisory role overseeing a small maintenance crew at a regional facility, potentially linked to the nearby military base. Long‑term, he hopes to launch his own handyman business that offers specialized,
    fast‑response repair services, leveraging his reputation for efficiency and his competitive drive to out‑perform local contractors. He plans to complete an associate degree in facilities management
    to bolster his credentials.
