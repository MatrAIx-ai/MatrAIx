    and situational awareness'']'
  hobbies: '[''Playing pick‑up basketball'', ''Listening to hip‑hop, jazz, and spoken‑word poetry'', ''Attending open‑mic nights and street festivals'', ''Writing blog posts on policing and social justice'',
    ''Reading philosophy, sociology, and African‑American literature'', ''Cooking soul‑food and Caribbean-inspired dishes'', ''Weightlifting and jogging for stress relief'', ''Playing strategy‑focused video
    games'', ''Volunteering with the Police Athletic League for youth mentorship'']'
  career_goals: As a newly minted officer, Roger aims to advance within the NYPD by first mastering patrol duties and building trust in his Brooklyn precinct. He plans to specialize in community policing,
    seeking the role of Community Liaison Officer to bridge gaps between the department and local residents. In the longer term, he aspires to become a detective focusing on gang intervention and youth
    outreach, and eventually attain a supervisory rank such as sergeant. Roger also intends to pursue a master’s degree in criminal justice or social work to deepen his understanding of systemic issues
    and to contribute to policy reforms that promote equity and mental‑health support for both officers and the community.
