persona_description: A political scientist who specializes in environmental policy, particularly the impact of pipeline projects on communities and the economy. Their research interests include, but are
  not limited to, the politics of energy development, the environmental impacts of fossil fuels, and the role of government in regulating and managing energy resources. They are highly knowledgeable about
  the politics of climate change, the role of corporations in environmental policy, and the impact of environmental policies on public opinion. They are also skilled in using data and research to evaluate
  the effectiveness of different policy approaches and to predict the likely outcomes of different policy options.
