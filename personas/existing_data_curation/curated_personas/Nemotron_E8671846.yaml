personas:
  professional: Lorraine Mera, a 25‑year‑old computer‑automated teller and office‑machine repairer, blends disciplined troubleshooting with a community‑focused mindset, delivering meticulous ATM and printer
    repairs while mentoring junior techs and documenting procedures to ensure reliability.
  sports: Lorraine Mera competes on the Independence Spikers volleyball team, hikes with the local Trailblazers Club during summer, and follows the Kansas City Chiefs and St. Louis Cardinals faithfully,
    while maintaining a disciplined fitness routine that includes weekly HIIT classes.
  arts: Lorraine Mera enjoys the indie music of The Strokes and Tame Impala, attends live shows at the St. Louis Fox Theatre, collects graphic novels by Art Spiegelman, and plays acoustic guitar at board‑game
    nights, letting creative expression balance her technical world.
  travel: Lorraine Mera prefers organized weekend road trips to nearby state parks like the Ozarks, dreams of a tech‑focused tour of Tokyo’s Akihabara district, and plans a future summer backpacking adventure
    through the Rocky Mountains, always budgeting travel expenses in advance.
  culinary: Lorraine Mera, an adept home cook, loves crafting a signature mac and cheese with sharp cheddar, bacon, and panko crust, regularly experiments with homemade ramen broth infused with miso and
    kombu, and enjoys grilling seasonal corn on the cob at community potlucks.
  core: Lorraine Mera blends Midwestern practicality with tech curiosity, balancing meticulous work, community‑centric social life, and a competitive edge that drives both her career aspirations and personal
    pursuits.
background:
  cultural: Lorraine grew up in Independence, Missouri, a Midwestern suburb where community ties and a solid work ethic are deeply valued. Her upbringing blended traditional American holidays and local
    customs with exposure to the region’s manufacturing and service‑industry roots. The practical, down‑to‑earth mindset of the Midwest, combined with the diverse clientele she serves in banking and office
    environments, shapes her appreciation for reliability, punctuality, and collaborative community involvement. She identifies with the modest ambition and neighborly spirit characteristic of her cultural
    environment while staying open to new ideas and technologies.
