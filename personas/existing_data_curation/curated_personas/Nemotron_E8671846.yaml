  career_goals: Lorraine aims to become a senior field service engineer within the next three years, gaining certifications such as CompTIA A+, Network+, and the Certified ATM Service Technician credential.
    She is determined to lead a regional service team, reducing average repair turnaround time by 15% and earning recognition as top performer. Ultimately she envisions opening her own boutique service
    company specializing in secure, IoT‑enabled ATM and office‑machine maintenance, while mentoring aspiring technicians through a structured apprenticeship program.
