  hobbies: '[''Community gardening'', ''Reading historical fiction and African‑American literature'', ''Quilting with African motifs'', ''Senior bridge club'', ''Attending jazz and gospel concerts'', ''Cooking
    soul‑food with a modern twist'', ''Traveling to Ghana for ancestry tours'', ''Volunteering as a museum docent'', ''Participating in STEM outreach workshops'', ''Strategic board games'']'
  career_goals: Although retired, Amoy’s ambition centers on fostering the next generation of Black engineers and empowering seniors in her community. She aims to expand the STEM outreach program she volunteers
    with, creating a mentorship pipeline for Black girls interested in engineering. Amoy plans to author a series of children’s books that celebrate Black female engineers, combining storytelling with hands‑on
    activity guides. She also aspires to collaborate with city planners on a senior‑friendly, green‑infrastructure pilot that integrates rain gardens and kinetic pathways, demonstrating how engineering
    can improve quality of life for older adults. Continual learning drives her to explore AI‑enabled traffic management tools, which she hopes to adapt for local community use.
