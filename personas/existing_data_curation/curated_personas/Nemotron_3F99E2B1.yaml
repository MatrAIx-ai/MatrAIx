personas:
  professional: Amoy Profio, a retired civil engineer who now mentors youth and spearheads senior‑friendly green‑infrastructure projects, applies decades of structural analysis, CAD, and GIS expertise together
    with a practical curiosity for AI‑enabled traffic tools to bridge technical innovation and community needs.
  sports: Amoy Profio, an enthusiastic member of the senior bridge club and a regular walker along the Indianapolis Cultural Trail, proudly roots for the Indianapolis Colts and Indiana Pacers, and joins
    a low‑impact senior softball league each spring to stay active.
  arts: Amoy Profio, a devoted patron of the arts, frequently attends jazz performances by Wynton Marsalis and Kamasi Washington, gospel concerts featuring The Blind Boys of Alabama, reads historical fiction
    by authors such as Toni Morrison and Maya Angelou, and expresses creativity through quilting patterns inspired by West African motifs.
  travel: Amoy Profio, who balances meticulous itinerary planning with spontaneous exploration, spends her winters touring the historic forts and coastal villages of Ghana, enjoys weekend getaways to the
    Indiana Dunes, and occasionally joins group tours of U.S. historic sites, all while keeping travel within a modest retirement budget.
  culinary: Amoy Profio, an adept home chef, reimagines classic soul‑food by preparing baked collard greens seasoned with smoked paprika, quinoa‑infused gumbo, and honey‑sweetened sweet potato pie, favoring
    fresh herbs such as thyme and cilantro, and delights in occasional farm‑to‑table meals at local eateries.
  core: Amoy Profio, a 75‑year‑old former engineer who blends garden‑to‑table cooking, bridge tactics, and community mentorship, is known for over‑watering her heirloom tomatoes, losing track of book club
    meeting dates, and a soft spot for late‑night jazz sessions.
background:
  cultural: Amoy is an African‑American woman whose family participated in the Great Migration from the Deep South to Indianapolis in the 1950s, seeking better economic opportunities and civil‑rights progress.
    Growing up during the civil‑rights era, she experienced both the challenges of segregation and the empowerment of community activism. Her mother, a nurse, and her father, a railroad worker, instilled
    values of perseverance, service, and mutual aid. The family’s church on Indiana Avenue served as a cultural hub, where gospel music, oral storytelling, and communal support shaped her worldview. Throughout
    her life, Amoy has remained connected to Indianapolis’s vibrant Black neighborhoods, participating in local festivals, supporting the African‑American Museum, and advocating for equitable urban development.
    Her cultural identity informs her commitment to mentorship, preserving Black history, and celebrating Afro‑centric arts and cuisine.
