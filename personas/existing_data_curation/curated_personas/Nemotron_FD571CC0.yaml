  career_goals: Josué aims to become the leading broker in Orange County’s luxury segment within the next five years, using cutting-edge technology and his artistic sensibility to differentiate his listings.
    He plans to launch a boutique real-estate firm that specializes in multicultural clientele, offering services such as personalized home-staging workshops and virtual tours. Long-term, he envisions expanding
    the firm to neighboring markets, mentoring a new generation of agents, and speaking at industry conferences about the intersection of art, technology, and real-estate. Financial independence and the
    ability to provide generational wealth for his family also drive his ambition to own multiple investment properties.
