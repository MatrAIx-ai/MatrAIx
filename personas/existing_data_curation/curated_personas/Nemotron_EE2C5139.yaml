    for parts hunting'']'
  career_goals: Terry's primary career goal is to transition from general laborer to foreman or site supervisor within the next two to three years, overseeing small crews on residential renovation projects.
    To achieve this, he plans to obtain a Journeyman Carpenter certification, complete advanced OSHA 30‑hour training, and secure a heavy‑equipment operator endorsement. He also intends to formalize his
    knowledge of green building techniques and modular construction, positioning himself as a specialist in energy‑efficient home upgrades. Long‑term, Terry envisions launching his own modest contracting
    business focused on sustainable remodels, providing a stable retirement income while allowing him to work on a flexible schedule that reduces job‑related stress. Additionally, he aims to develop better
    organizational habits and adopt stress‑relief routines to counter his natural tendency toward worry and negative emotions.
