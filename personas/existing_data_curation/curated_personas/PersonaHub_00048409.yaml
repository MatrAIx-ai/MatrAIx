persona_description: Brian Palmer is a social anthropologist and scholar of religion who specializes in the study of civil courage, altruism, and good leadership. He has spent many years studying these
  concepts and has written extensively on the topic. He is known for his courses on civic courage and engagement, which attract large numbers of students. His latest book, "101 historiska hjältar," is based
  on his Harvard courses and explores historical heroes. He is also interested in Swedish conceptions of solidarity and has written a doctoral dissertation on this topic. He is a professor at Uppsala University
  in Sweden and has received awards for his teaching. His latest book, "Global Values 101," is based on his Harvard courses and explores the concept of global values.
