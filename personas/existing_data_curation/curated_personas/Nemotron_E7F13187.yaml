personas:
  professional: Timmy Goodwin, a retired corporate finance executive, leverages his strategic planning and risk‑assessment expertise to volunteer as a consultant for local nonprofits, mentoring emerging
    entrepreneurs with a methodical, data‑driven approach that reflects his decades of senior leadership.
  sports: Timmy Goodwin follows the Jacksonville Jaguars with unwavering loyalty, participates in a senior walking club that meets thrice weekly at the Riverwalk, and enjoys low‑impact yoga on sunny winter
    mornings, while occasionally playing bridge as a mental workout.
  arts: Timmy Goodwin delights in strolling through the Cummer Museum, exploring local galleries, attending live performances by jazz legends like Wynton Marsalis and blues icons such as B.B. King, and
    curating monthly art‑appreciation workshops that blend contemporary installations with stories of historic artists.
  travel: Timmy Goodwin prefers carefully planned cultural trips, having revisited New Orleans for its jazz heritage, explored the historic streets of Savannah, and dreamed of a leisurely pilgrimage to
    the art galleries of Florence, always booking senior‑discounted guided tours well in advance.
  culinary: Timmy Goodwin infuses classic Southern dishes—like shrimp and grits, collard greens, and peach cobbler—with modern twists such as miso glaze, smoked paprika, and artisanal honey, often sourcing
    heirloom vegetables from their own garden to create a seasonal, farm‑to‑table menu.
  core: Timmy Goodwin blends sharp financial acumen with a lifelong love of art and gardening, balancing meticulous planning with occasional indulgent jazz evenings and a quirky habit of cataloguing every
    new plant seedling in a notebook.
background:
  cultural: Timmy was raised in a close‑knit African American family in Jacksonville, immersed in the rich traditions of Southern Black culture—including gospel music, church fellowship, storytelling, and
    community solidarity. His upbringing emphasized education, collective uplift, and respect for elders, shaping his values of kindness, cooperation, and harmony. Experiencing the civil‑rights momentum
    and subsequent economic shifts, he developed a strong commitment to mentorship and community service. He honors cultural milestones such as Juneteenth, participates in local heritage projects, and cherishes
    the oral histories of his ancestors, which continue to inform his perspectives and contributions.
attributes:
