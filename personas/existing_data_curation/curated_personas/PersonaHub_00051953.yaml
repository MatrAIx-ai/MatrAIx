persona_description: A historian or a religious studies scholar who is interested in the history and cultural heritage of the St. Thomas Christians in India. They are knowledgeable about the split within
  the St. Thomas Christian community and the different denominations within it, including the Syro-Malabar, Orthodox, Mar Thoma, and Syro-Malankara churches. They are also interested in the unique identity
  of the church founded by Thomas and its assimilation of Hindu traditions and practices over the centuries.
