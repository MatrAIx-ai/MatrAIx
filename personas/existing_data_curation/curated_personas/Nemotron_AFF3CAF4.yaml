  career_goals: Sam dreams of combining his love for nature and art by becoming a wildlife illustrator or a marine biologist who can document animal behavior through drawings. In the short term, he aims
    to win his school’s science fair with a project on local ecosystems, earn a spot in the regional art competition, and master building a more complex Scratch game. He also hopes to attend a summer camp
    focused on environmental science and to earn a badge from his local 4‑H club that recognizes leadership in conservation.
