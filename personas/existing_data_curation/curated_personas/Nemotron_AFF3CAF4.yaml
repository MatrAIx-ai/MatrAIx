personas:
  professional: Sam Bok combines a budding talent for coding interactive stories in Scratch with a keen eye for sketching animals and landscapes, turning curiosity and organization into early prototypes
    of adventure games that weave fantasy narratives and natural observations, while their open-minded spirit fuels unconventional problem-solving during school tech clubs.
  sports: Sam Bok plays forward for the Howland Hills youth soccer team in the spring, joins a local junior ice-hockey league during the winter, follows the Toronto Maple Leafs and Toronto Raptors avidly
    on game nights, and spends weekends hiking, fishing, and canoeing on nearby streams, preferring active, nature-based exercise over formal gym routines, and they relish the sense of freedom that comes
    with open-air play.
  arts: Sam Bok draws inspiration from wildlife artist John James Audubon and fantasy illustrator John Howe, enjoys listening to acoustic folk songs by John Denver and indie band Vampire Weekend, watches
    Pixar films such as \"Coco\" and Studio Ghibli's \"Princess Mononoke\", and spends free time crafting small wooden carvings and strumming melodic ukulele riffs, letting these artistic influences shape
    both visual and auditory creative expression, and they frequently embed forest scenes into their drawings.
  travel: Sam Bok loves weekend camping trips to Algonquin Provincial Park, has visited Niagara Falls and the historic lighthouse at Point Hope with family, dreams of trekking the towering cliffs of Banff
    National Park, and plans to save allowance for a future summer road-trip along the Pacific Coast, favoring nature-rich destinations where they can sketch, fish, and map out new adventure narratives,
    and they picture themselves camping under the northern lights someday.
  culinary: Sam Bok relishes maple-syrup-glazed pancakes on Saturday mornings, can whip up a simple spaghetti Bolognese using ground turkey, enjoys snacking on carrot sticks with hummus, and is learning
    to sand and varnish wooden spoons and small cutting boards for personal cooking projects, yet they often forget to finish dishes before diving into a Minecraft session, leaving a trail of half-finished
    meals.
  core: Sam Bok is a curious 11-year-old who blends a love for drawing, coding, and the outdoors with a meticulous habit of saving allowance for future Lego projects, while occasionally battling the urge
    to procrastinate on chores, and they frequently escape into imaginative Minecraft worlds to unwind.
background:
  cultural: Sam grows up in a small, close‑knit community in Howland, Maine, where outdoor life and self‑reliance are woven into everyday routines. His family participates in traditional New England activities
    such as maple‑syrup tapping, leaf‑peeping during fall, and community volunteer events like town clean‑ups. The local school emphasizes environmental stewardship, and Sam is involved in the 4‑H club,
    which reflects the region’s agricultural heritage. While his household follows typical New England cultural norms—valuing punctuality, modesty, and a love for nature—Sam’s curiosity pushes him to seek
    diverse ideas through books, digital media, and art, blending local tradition with a broader world view.
