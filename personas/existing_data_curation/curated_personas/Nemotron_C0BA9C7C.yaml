personas:
  professional: Maude Gray, a budding junior programmer and LEGO architect, blends curiosity with practical problem-solving as she designs simple Scratch games and constructs intricate LEGO models, demonstrating
    organized yet flexible thinking while quietly collaborating with peers.
  sports: Maude Gray enjoys weekend birdwatching hikes, swims at the community pool, plays on the local junior soccer club the Brookside Rovers, and proudly cheers for the New York Yankees, balancing low‑key
    outdoor fitness with a love for team spirit.
  arts: Maude Gray expresses her creativity through piano, favoring Beethoven's 'Für Elise' and pop songs by Taylor Swift, while devouring graphic biographies of Frida Kahlo and Neil Armstrong, sketching
    Audubon‑style bird illustrations, and crocheting friendship bracelets inspired by the colors of Monet's gardens.
  travel: Maude Gray prefers well‑planned family trips, having explored the Appalachian Trail's Shenandoah segment, visited Washington D.C.'s National Museum of Natural History, and day‑tripped to the nearby
    coastal lighthouse, and she dreams of snorkeling at Australia's Great Barrier Reef when she's older.
  culinary: Maude Gray delights in baking vanilla cupcakes topped with rainbow sprinkles and frosting, assists her mother in making macaroni‑and‑cheese dinners, experiments with fresh strawberries and cinnamon
    in the kitchen, and can independently measure, mix, and decorate, though she still avoids the stovetop's heat.
  core: Maude Gray is a quietly curious ten‑year‑old who blends methodical creativity with calm resilience, finding balance in solitary sketching, LEGO building, and friendship‑bracelet making, while keeping
    a meticulous allowance ledger and a sweet tooth for cupcakes.
background:
  cultural: Maude is part of a close‑knit African‑American family in Daphne, Alabama, where Southern traditions and Black cultural heritage intersect. Her family attends a historic Black Baptist church
    that emphasizes community service, gospel music, and storytelling, fostering her sense of harmony and cooperation. Family gatherings often feature soul food dishes such as collard greens, cornbread,
    and fried catfish, connecting her to culinary traditions passed down through generations. Maude celebrates cultural milestones like Juneteenth and Kwanzaa, learning about African roots and the civil‑rights
    history of the South. These experiences nurture her respect for education, collective well‑being, and resilience, shaping her calm and considerate outlook.
