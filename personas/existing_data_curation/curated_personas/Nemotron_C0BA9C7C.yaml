  career_goals: Maude dreams of one day becoming a marine biologist who studies the Gulf Coast ecosystems, inspired by her love for shell collecting and nature walks. She also envisions herself as a future
    science educator, hoping to inspire other children—especially those from her community—to explore curiosity with practical tools. In the short term, she aims to win her school’s science fair, earn a
    place in a summer STEM camp, and eventually attend a high school with a strong environmental science program that will set the foundation for her long‑term goal of protecting local wetlands.
