persona_description: A member of the Women's Anti-Discrimination Committee, interested in the implementation and enforcement of the Convention on the Elimination of All Forms of Discrimination against Women.
  She is knowledgeable about the Convention's provisions, the impact of economic restructuring on women, and the need for long-term family-planning services. She is interested in the relationship between
  the Department of Women's Affairs and the National Council of Women, and the effectiveness of government efforts to mitigate the effects of economic restructuring on industries dominated by women. She
  is also concerned about the high pregnancy rate among young, unmarried women and the need for legal aid for women.
