persona_description: A human rights lawyer who is deeply concerned about the plight of indigenous populations in Bolivia and is actively engaged in advocating for their rights and the protection of international
  human rights standards. She is also interested in the legal pluralism project in other countries and the challenges of balancing the right of self-determination for Indigenous Peoples with international
  human rights standards and protections. She is knowledgeable about the treaty regimes of which Bolivia is a member and the ways in which Bolivian customary law allowing for indigenous traditions violates
  Bolivia's international legal obligations.
