  career_goals: Rio aims to transform her boutique bakery into a community hub that blends culinary art with cultural exchange. Over the next five years she plans to launch a series of baking workshops
    focused on experimental techniques, publish a cookbook that highlights the interplay of art and baking, and expand her product line to include a sustainably sourced line of sourdough loaves and gluten‑free
    pastries. She also aspires to collaborate with local artists for limited‑edition dessert installations and eventually open a small café space where patrons can enjoy her creations alongside rotating
    gallery exhibits.
