personas:
  professional: Maria Zamora, a veteran kitchen supervisor with three decades of high‑tempo food‑service leadership, channels her bilingual communication, boundless imagination for recipe innovation, and
    people‑first conflict‑resolution style into a flexible, harmonious work floor where spontaneous culinary experiments keep both staff and diners delighted.
  sports: Maria Zamora stays active through community salsa dancing, weekly walks with a local walking club, and casual tennis matches, while cheering on the Boston Red Sox, New England Patriots, and Providence
    Bruins as her seasonal sports anchors.
  arts: Maria Zamora expresses herself through abstract watercolor paintings and devotes evenings to live jazz sets featuring John Coltrane tributes and Latin legends like Celia Cruz, while her literary
    heart beats for magical‑realism authors such as Gabriel García Márquez and her visual inspirations include Frida Kahlo and Jackson Pollock.
  travel: Maria Zamora favors culinary‑driven travel, alternating between weekend road trips to New England seaside towns like Newport and seasonal escapes to Caribbean islands such as Barbados, all planned
    loosely around food festivals and cultural workshops that fit her flexible budget and love for community connections.
  culinary: Maria Zamora, an adept home chef, fuses traditional staples like mangú and sancocho with New England flavors—think maple‑glazed plantains, lobster‑infused broth, and kale‑studded pumpkin mash—while
    experimenting with ingredients such as thyme, cumin, and fresh shiso to craft dishes that celebrate both heritage and innovation.
  core: Maria Zamora is a 58‑year‑old culinary storyteller whose vibrant imagination, sociable charm, and occasional disorganization blend into a life seasoned with spontaneous kitchen creations, community
    mentorship, and a love for jazz, salsa, and wandering taste buds.
background:
  cultural: Maria was born in the Dominican Republic and moved to Providence, Rhode Island as a young adult. She grew up immersed in Dominican traditions—family gatherings centered around dishes like mangú,
    pasteles en hoja, and sancocho, as well as vibrant music and dance such as merengue and bachata. In Providence, she maintains strong ties to the local Dominican diaspora, participating in festivals,
    church events, and community organizations that celebrate her heritage. Fluent in both Spanish and English, Maria bridges cultural gaps by introducing Caribbean flavors to the New England palate while
    also embracing the coastal and seasonal rhythms of Rhode Island life.
attributes:
  skills: '["People management", "Food safety compliance (ServSafe)", "Creative recipe development", "Bilingual communication (Spanish/English)", "Inventory control", "Menu planning and improvisation",
    "Customer service excellence", "Conflict resolution", "Event coordination for staff and community gatherings", "Mentoring and training of entry‑level staff"]'
  hobbies: '["Experimental fusion cooking", "Abstract watercolor painting", "Merengue and salsa dancing", "Attending jazz and Latin music concerts", "Reading magical‑realism novels", "Storytelling and oral
    history workshops", "Volunteering as a cooking instructor for community youth programs"]'
  career_goals: Maria aims to transition from daily kitchen supervision to a mentorship role where she can share her culinary knowledge and cultural heritage with the next generation of food‑service professionals.
    She is pursuing a culinary certification to formalize her expertise and hopes to launch a small community‑focused pop‑up kitchen that showcases innovative Dominican‑American dishes. Additionally, Maria
    aspires to become a cultural liaison for local restaurants, advising them on authentic Caribbean flavors and hosting occasional cooking workshops for Providence residents.
