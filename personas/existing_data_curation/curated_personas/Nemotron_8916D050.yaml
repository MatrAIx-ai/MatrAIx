  hobbies: '["Visiting art galleries", "Acrylic painting", "Cuban cooking", "Salsa dancing", "Gardening", "Reading historical biographies", "Volunteering at senior community center", "Traveling to cultural
    festivals", "Attending local theater productions", "Learning digital photography"]'
  career_goals: Maria aims to leave a lasting legacy by mentoring the next generation of retail leaders and expanding her influence to a regional supervisory role within the company. She is eager to introduce
    new technologies—such as mobile point‑of‑sale training—and to launch a community‑outreach program that partners the store with local Cuban cultural events. While preparing for a gradual transition toward
    retirement, she seeks to ensure that the store continues to meet high performance standards and that her team feels supported and empowered.
