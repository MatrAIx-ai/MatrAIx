personas:
  professional: Maritza Rangelgarcia, a retired community volunteer, channels their bilingual translation ability, culinary expertise, and hands‑on home‑repair know‑how into teaching cooking and basic first‑aid
    workshops at the senior center, balancing a curious appetite for new techniques with a pragmatic, organized teaching style.
  sports: Maritza Rangelgarcia, a devoted fan of the Los Angeles Dodgers and the LA Galaxy, stays fit by walking with the neighborhood seniors’ walking club, attending weekly aqua‑fit sessions, and tending
    her garden, treating exercise as a social, low‑impact routine rather than competitive sport.
  arts: Maritza Rangelgarcia, an avid listener of Vallenato legends like Jorge Celedón and a lover of classic Golden Age Mexican cinema starring Pedro Infante and María Félix, weaves crocheted blankets
    while humming familiar melodies, allowing the arts to color their evenings.
  travel: Maritza Rangelgarcia, who prefers carefully planned short road trips, enjoys day excursions to the Monterey Bay coastal trail and the gardens of Santa Barbara, and dreams of an organized Mediterranean
    cruise that would let them explore historic ports such as Barcelona and Dubrovnik later in the year.
  culinary: Maritza Rangelgarcia, a seasoned home chef, masterfully prepares aromatic arepas filled with slow‑cooked shredded meat, hearty sancocho brimming with yucca, plantain, and corn, and herb‑infused
    rice, always finishing with fresh cilantro, oregano, and a pinch of achiote, and they delight in sharing these meals at community gatherings.
  core: Maritza Rangelgarcia is a curious yet practical octogenarian who balances a love for heritage recipes and community storytelling with a newfound passion for digital photography, although they occasionally
    forget to water their succulents until the last minute.
background:
  cultural: Maritza was born and raised in the Andean region of Colombia, where family gatherings revolved around shared meals, Catholic celebrations, and communal music. She emigrated to the United States
    in the late 1970s, settling first in the San Fernando Valley before moving to Tujunga. While she has embraced American customs, she maintains strong Colombian ties through language, culinary traditions,
    and participation in local Hispanic cultural events. Her identity reflects a blend of Colombian warmth, Catholic faith, and the pragmatic, community‑focused spirit of a long‑time Californian senior.
attributes:
  skills: '["traditional Colombian cooking", "bilingual Spanish‑English translation", "basic computer and email use", "first aid volunteering", "household budgeting", "herb and flower gardening", "storytelling
    and oral history", "light home‑repair", "knitting and weaving"]'
  hobbies: '["listening to vallenato and cumbia music", "gardening herbs and native flowers", "reading historical fiction", "crossword puzzles", "crocheting blankets for charity", "attending church festivals",
    "watching classic Colombian films", "exploring farmers'' markets"]'
  career_goals: Although retired, Maritza remains goal‑oriented. She aims to compile a written memoir of her family's journey from Colombia to Los Angeles, intertwining recipes, anecdotes, and cultural
    reflections. She also aspires to master digital photography to document community events and her garden’s seasonal changes. Additionally, Maritza hopes to volunteer as a cooking instructor at the senior
    center, teaching younger participants both classic and modern Colombian dishes, and to deepen her proficiency with video‑conferencing tools to stay connected with family abroad.
