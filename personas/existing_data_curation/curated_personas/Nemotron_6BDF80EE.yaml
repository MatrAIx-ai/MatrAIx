personas:
  professional: Katrina Davis, a data‑science enthusiast with a background in computer science and bioengineering, leverages their disciplined, detail‑oriented approach and curiosity for art to craft predictive
    health‑equity models while channeling their competitive edge into mastering Agile workflows and publishing clear visual narratives.
  sports: Katrina Davis, who plays casual tennis with the Shreveport Trailblazers club and follows the New Orleans Saints and Pelicans, incorporates disciplined cardio runs and yoga sessions each week to
    stay fit and channel their competitive drive.
  arts: Katrina Davis, an avid gallery‑hopper who frequently captures exhibition installations in digital sketches, finds inspiration in the experimental jazz of Kamasi Washington, the soulful blues of
    Nina Simone, and the lyrical storytelling of Kendrick Lamar, weaving these influences into their speculative‑fiction short stories.
  travel: Katrina Davis, who budgets carefully yet squeezes in weekend road trips to Austin’s music scene and annual visits to New Orleans for its vibrant art districts, dreams of a solo cultural immersion
    journey to Kyoto’s temples and Iceland’s geothermal landscapes, planning each itinerary with meticulous spreadsheets while leaving room for spontaneous photo‑walks.
  culinary: Katrina Davis, an intermediate home chef who loves whipping up spicy jambalaya with andouille sausage, okra, and red beans, crafts smooth avocado‑lime sushi rolls, and often prepares quick,
    health‑focused quinoa bowls topped with roasted sweet potatoes and kale, balances their culinary experiments with occasional indulgent outings to local jazz‑café brunches.
  core: Katrina Davis, a relentlessly organized data‑driven dreamer who balances a love for speculative sci‑fi worlds with a habit of over‑analyzing every decision, often loses sleep over spreadsheet perfection
    while seeking calm through yoga and jazz.
background:
  cultural: Katrina was raised in a close‑knit African American family in Shreveport, Louisiana, where Southern hospitality and a vibrant Black cultural heritage shaped her worldview. Weekly life centered
    around a historically Black Baptist church, fostering a deep connection to gospel music, community service, and the celebration of traditions such as Juneteenth and Kwanzaa. The rich musical tapestry
    of Northwest Louisiana—blues, jazz, and Cajun rhythms—infused her childhood, while family gatherings featured soul food staples like collard greens, fried chicken, and the occasional gumbo, reflecting
    the region’s Creole influence. Exposure to the local art scene, including the Shreveport Arts Council and nearby museums, nurtured her appreciation for visual expression. These experiences, combined
    with a family emphasis on academic achievement and social uplift, give Katrina a strong sense of identity rooted in both the broader African American diaspora and the unique cultural mosaic of the American
    South.
attributes:
  skills: '["Python programming", "Java development", "MATLAB modeling", "R statistical analysis", "SPSS data analysis", "Tableau data visualization", "Laboratory techniques (PCR, cell culture)", "Scientific
    writing", "Project management (Agile, Kanban)", "Public speaking", "Digital illustration (Adobe Photoshop)"]'
  hobbies: '["Visiting art galleries and museums", "Digital photography", "Sketching and illustration", "Reading science fiction & speculative literature", "Playing chess", "Solving puzzles (Rubik''s Cube,
    Sudoku)", "Attending live jazz and blues concerts", "Cooking Creole and Cajun dishes", "Yoga and mindfulness meditation", "Volunteering for STEM outreach", "Participating in hackathons and coding competitions"]'
  career_goals: Katrina aims to advance her technical expertise by completing a Master’s program in Data Science within the next 18 months, focusing on health‑equity analytics. She plans to secure a data
    analyst role at a regional healthcare organization or a tech firm where she can apply her statistical and programming skills to develop predictive models that improve patient outcomes in underserved
    communities. Over the next five years, she aspires to transition into a senior data scientist position, lead interdisciplinary teams, and publish research on responsible AI in healthcare. Long‑term,
    she envisions founding a startup that creates accessible data‑visualization tools for community health agencies, while mentoring other Black women pursuing STEM careers.
