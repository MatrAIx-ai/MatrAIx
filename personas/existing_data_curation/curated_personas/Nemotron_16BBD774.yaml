  career_goals: Adna imagines a future where he helps others and builds things. He often says he wants to be a teacher because he enjoys sharing stories, a builder who constructs houses like the workers
    he sees in his community, or a veterinarian who cares for animals on the family farm. These ambitions reflect his curiosity about how things work, his practical desire to make a tangible difference,
    and his kind, cooperative nature.
