personas:
  professional: Adna Johnson is a budding junior farmer who loves helping tend a raised‑bed garden, meticulously arranging vegetable seedlings with the same organized, reliable mindset they show when building
    block towers, and they delight in learning both new planting tricks and tried‑and‑true family routines.
  sports: Adna Johnson plays on the Avon Little Kickers soccer team, cheerfully practicing dribbles on the community field, proudly watches the Minnesota Twins on TV while munching peanuts, and they favor
    energetic playground activities like running in the sandpit and climbing the local jungle gym.
  arts: Adna Johnson enjoys dancing to Raffi’s ‘Bananaphone’ and watching Sesame Street’s Elmo, frequently draws colorful pictures of farm animals with crayons, and they adore the simple melodies of Disney’s
    ‘Let It Go’ while splashing paint on large sheets during craft time.
  travel: Adna Johnson loves short family road trips to the Stearns County Fair, weekend visits to Grandma’s farm where they feed calves, and occasional vacations to the Mall of America in Bloomington and
    Disney World in Florida, preferring bright, sensory‑rich destinations that fit within the family’s modest vacation budget.
  culinary: Adna Johnson favors classic kid‑friendly meals like macaroni and cheese, buttery corn on the cob, apple slices with peanut butter, and they savor cinnamon rolls at church potlucks, though they
    can be stubborn about trying broccoli, insisting on a bite‑size ‘cheese‑only’ rule.
  core: Adna Johnson is a curious, orderly toddler who balances a love for structured play and community traditions with occasional stubbornness over vegetables, turning every day into a tidy adventure.
background:
  cultural: Raised in a white, Midwestern family in Avon, Minnesota, Adna’s life is shaped by the region’s agricultural roots and close‑knit community values. His family attends a local Lutheran church,
    celebrates holidays such as Thanksgiving, Christmas, and Independence Day with communal meals, and participates in town events like the Stearns County Fair and summer potlucks. The cultural emphasis
    on politeness, teamwork, modesty, and a strong work ethic informs his organized, reliable, and cooperative personality.
