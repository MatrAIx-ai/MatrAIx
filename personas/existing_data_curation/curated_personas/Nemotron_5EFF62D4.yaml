  hobbies: '[''Cross-country skiing'', ''Hiking'', ''Canoeing'', ''Reading business and technology books'', ''Listening to entrepreneurship podcasts'', ''Cooking (experimenting with recipes)'', ''Volunteering
    at youth entrepreneurship program'', ''Attending Minnesota Twins games'', ''Playing board games'', ''Woodworking'']'
  career_goals: His immediate goal is to secure tenure by publishing in top business education journals and establishing a research agenda around experiential entrepreneurship education. Over the next five
    years, he aims to develop a campus‑linked incubator that provides local startups in Wright County with mentorship, funding workshops, and access to university resources. He plans to complete a doctoral
    program in Business Administration to deepen his scholarly credentials, and eventually move into academic leadership as a program director or dean, where he can shape curricula that integrate community‑based
    learning. He also aspires to serve as a consultant for regional small‑business development agencies, leveraging his practical insight to drive local economic growth.
