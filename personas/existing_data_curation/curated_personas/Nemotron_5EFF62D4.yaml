personas:
  professional: A dedicated business professor, Anthony Moore blends Midwest practicality with academic curiosity, designing experiential entrepreneurship courses that let students build real start‑ups
    while they navigate data analytics in Excel, R, and Tableau, and they bring a collaborative, modest teaching style shaped by community volunteerism.
  sports: A passionate fan of winter sports, Anthony Moore spends weekends cross‑country skiing with the local ski club and kayaking on the St. Croix in summer, they cheer for the Minnesota Twins at Target
    Field and support the Vikings, while they maintain a routine of three weekly runs that balance outdoor enjoyment with a pragmatic fitness plan.
  arts: A devoted appreciator of classic storytelling, Anthony Moore enjoys board‑game nights featuring Settlers of Catan and regularly attends the Minnetonka Community Theatre, they have a soft spot for
    folk singer Bob Dylan, appreciate the cinematic works of the Coen brothers, and occasionally dabble in woodworking to create decorative picture frames.
  travel: A pragmatic explorer, Anthony Moore prefers road‑trip itineraries that mix natural beauty with cultural stops, they have driven the North Shore of Lake Superior, explored Iceland’s volcanic landscapes,
    and dream of hiking Norway’s fjords, while they always budget carefully and plan trips around university breaks.
  culinary: A methodical home cook, Anthony Moore follows structured recipes for classic Midwestern dishes like walleye pan‑fried with herb butter and wild‑rice casserole, they love improvising with locally
    sourced maple syrup, fresh lake fish, and seasonal berries, yet they sometimes forget to defrost meat ahead of time, leading to last‑minute menu changes.
  core: Anthony Moore is a pragmatic dreamer who maps his life like a spreadsheet but still loses track of time carving wooden toys after a perfect snowfall.
background:
  cultural: Anthony grew up in Buffalo, a small town in Wright County, Minnesota. His family traces its roots to German and Scandinavian immigrants, a heritage reflected in the region’s Lutheran church
    traditions and community values of modesty, self‑reliance, and neighborly cooperation—often described as “Minnesota Nice.” The close‑knit environment fostered participation in local events such as county
    fairs, high‑school sports, and volunteer fire‑department activities. This Midwestern upbringing emphasized hard work, practical problem‑solving, and a strong belief in education as a pathway to personal
    and community advancement. These cultural influences shape his collaborative teaching style, his commitment to local economic development, and his balanced approach to curiosity and practicality.
