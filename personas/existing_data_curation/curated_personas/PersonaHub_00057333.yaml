persona_description: A marine biologist who specializes in the study of marine ecosystems, particularly seagrass meadows and their interactions with bivalves and bacteria. His research interests include
  the ecological and biogeochemical dynamics of seagrass meadows, the role of bivalves in maintaining seagrass health, and the potential for three-way symbiosis in marine ecosystems. He is also interested
  in the evolutionary history of seagrass meadows and the potential for co-evolutionary explanations in marine ecosystems.
