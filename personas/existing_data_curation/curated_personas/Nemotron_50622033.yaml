  career_goals: Biancha aims to move into a lead architect role where she can shape technology strategies that enhance community health, education, and cultural programs in Boone County. She wants to champion
    human‑centered design, integrating artistic experiences into digital platforms such as interactive museum exhibits or community learning portals. She plans to earn advanced cloud certifications, deepen
    her leadership capabilities, and spearhead mentorship programs for underrepresented groups in STEM. Ultimately, she envisions founding a nonprofit that offers digital‑literacy workshops and creative
    coding labs for seniors and youth, blending her technical expertise with her passion for compassion and social harmony while also adopting wellness practices to manage her emotional sensitivity.
