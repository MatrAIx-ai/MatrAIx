  career_goals: Jesse aims to transition from retail to a technology‑focused role where he can apply his analytical background, such as a junior data analyst or a UI/UX designer entry‑level position. He
    plans to enroll in a coding bootcamp and earn certifications in Python and user‑experience design within the next year. Long‑term, he envisions a career that blends his love for technical problem‑solving
    with his appreciation for aesthetics, eventually leading a multidisciplinary project team that creates user‑friendly digital products. Balancing stability for his family with creative fulfillment, he
    also hopes to develop enough expertise to mentor other young professionals in the San Joaquin tech community.
