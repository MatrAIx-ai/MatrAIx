persona_description: A scientist who specializes in the study of quantum technology, particularly the development and application of mid-infrared emitters. He has a background in physics and engineering
  and has worked on several projects related to quantum cascade lasers, quantum dots, and mid-infrared sensing. He is interested in the potential of quantum dots as a replacement for quantum cascade lasers
  and has developed a device that uses InAs quantum dots as midinfrared emitters. He is also interested in the design and development of 3-D structures that emit from the surface and are less affected by
  thermal transitions.
