  hobbies: '[''Exploring Contemporary Art Galleries'', ''Improvisational Jazz Piano'', ''Street Photography'', ''Urban Hiking'', ''Experimental Music Shows'', ''Home Brewing Craft Beer'', ''Collecting Vinyl
    Records'', ''Creative Writing'']'
  career_goals: He aims to transition from a senior marketing manager to a chief marketing officer within the next five years, steering a global brand through a digital transformation that fuses technology
    with artistic expression. Brian plans to build a data‑centric creative culture, launch innovative product lines, and establish a personal boutique consultancy focused on helping artistic and lifestyle
    brands break conventional market boundaries. He also aspires to mentor emerging marketers, become a thought leader in unconventional marketing, and eventually author a book that blends marketing strategy
    with creative storytelling.
