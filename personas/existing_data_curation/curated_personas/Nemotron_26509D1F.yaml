personas:
  professional: Dia Dougherty, a 25‑year‑old commercial laundry specialist in Burleson, blends meticulous stain‑removal expertise with a warm, community‑focused customer service style, using their methodical
    process documentation to train teammates while championing low‑chemical, sustainable cleaning practices as a stepping stone toward future supervisory leadership.
  sports: Dia Dougherty, an avid line‑dancer and yoga enthusiast, tracks their fitness through weekly boot‑camp classes at the local community center and supports the Dallas Cowboys and Texas Rangers, while
    also volunteering as a team manager for the Burleson Youth Soccer Club's Saturday matches.
  arts: Dia Dougherty channels their sociable energy into the local theater troupe, starring in community productions of "Grease" and hosting karaoke fundraisers, drawing inspiration from country icons
    like Dolly Parton and the Broadway flair of Lin‑Manuel Miranda, while also curating a small collection of Texas folk art prints at home.
  travel: Dia Dougherty prefers road‑tripping across Texas, having already explored Austin’s live‑music scene, the Hill Country wineries, and the Gulf Coast’s South Padre Island, while dreaming of an eco‑tour
    in Costa Rica and carefully planning each journey with a detailed itinerary to balance budget constraints and family commitments.
  culinary: Dia Dougherty experiments with farm‑to‑table cooking, harvesting basil, thyme, and rosemary from their backyard garden to flavor dishes like chicken‑fried steak with collard greens, brisket
    tacos with cilantro lime sauce, and a weekend batch of kimchi, often sharing these creations at community potlucks.
  core: Dia Dougherty is a charismatic, detail‑oriented community champion who juggles eco‑focused dry‑cleaning ambitions with a penchant for karaoke, herb‑infused cooking, and spontaneous weekend road
    trips, all while occasionally overcommitting to volunteer events.
background:
  cultural: Dia grew up in a small‑town environment in Texas with a blend of Southern hospitality and Midwestern work ethic. Her family values emphasized kindness, cooperation, and community service, often
    through church activities and local volunteer groups. While identifying as White and raised in a Protestant setting, she embraces the diverse cultural fabric of Burleson, participating in community
    festivals, supporting local businesses, and maintaining strong ties with extended family and friends across the region.
