    dry‑cleaning services'']'
  hobbies: '[''Community event planning'', ''Karaoke and line dancing'', ''Local theater participation'', ''Experimenting with new recipes'', ''Gardening and herb cultivation'', ''DIY home improvement projects'',
    ''Yoga and fitness boot camps'']'
  career_goals: Dia aims to advance to a supervisory position within the next two years, overseeing multiple locations and implementing sustainable, low‑chemical cleaning practices. She plans to complete
    an associate degree in business management to strengthen her leadership skills and eventually open her own eco‑friendly boutique dry‑cleaning service that emphasizes community involvement and personalized
    customer experiences.
