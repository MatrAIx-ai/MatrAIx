persona_description: An Australian geodesy researcher with expertise in InSAR (Infrared Synthetic Aperture Radar) interferometry and its applications in monitoring land motion, specifically subsidence in
  the Perth Basin of Western Australia. This researcher has experience working with continuous GPS (Continuous Global Positioning System) and repeat levelling data to establish a holistic monitoring program
  for subsidence. They are currently involved in a DLR (German Space Centre) science project to acquire InSAR images and are processing time series data to analyze subsidence patterns in the northern and
  southern regions of the Perth Basin.
