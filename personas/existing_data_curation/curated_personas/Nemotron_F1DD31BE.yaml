personas:
  professional: Paige Echols, a maintenance technician with expert HVAC, electrical, plumbing, and welding skills, leverages their structured mindset and sociable flair to document work orders meticulously,
    coordinate vendors efficiently, and lead team meetings, positioning themselves for a future supervisory role in facilities management.
  sports: Paige Echols enjoys playing on a local co‑ed softball league, hikes the trails around Carlsbad Caverns for cardio, follows the Dallas Cowboys (NFL), the Texas Rangers (MLB), and supports the New
    Mexico United soccer club, and they balance seasonal training with weekend games while maintaining a practical, injury‑preventive approach.
  arts: Paige Echols actively participates in community theater productions, often taking lead roles in musical revues like "Grease" and "Hamilton," loves karaoke nights belting out Ariana Grande and classic
    rock anthems, and they regularly attend performances by local improv troupes and the occasional Broadway‑style concert by the New Mexico Symphony, which fuels their creative expression.
  travel: Paige Echols prefers road‑trip adventures with friends, meticulously planning itineraries that include hiking the Grand Canyon, exploring the historic streets of Santa Fe, and a weekend getaway
    to Austin’s live‑music scene, yet they balance this with budget constraints by using a mix of Airbnb stays and camping in national parks.
  culinary: Paige Echols enjoys cooking for potluck gatherings, featuring herb‑infused roasted chicken, tomato‑basil pasta, and fresh guacamole made with cilantro and lime, and they skillfully tend a modest
    herb garden producing basil, oregano, and cherry tomatoes that regularly enhance their dishes.
  core: Paige Echols blends a practical, organized work ethic with a love for the spotlight, turning maintenance tasks into community events while juggling a penchant for DIY projects, karaoke, and occasional
    over‑spending on tools.
background:
  cultural: Paige was raised in a modest, middle‑class white family in the Southwest, where self‑reliance and community service were core values. Growing up near Carlsbad, she absorbed the regional blend
    of traditional New Mexican culture—appreciating local cuisine like green chile and participating in town festivals—while maintaining a strong work ethic passed down from generations of tradespeople.
    Her marriage and involvement in a close‑knit church community reinforce her emphasis on harmony, cooperation, and giving back to the area that shaped her practical and sociable outlook.
attributes:
  skills: '["HVAC troubleshooting","Electrical wiring and circuit repair","Plumbing maintenance","Preventive maintenance scheduling","Welding (MIG/TIG)","Heavy equipment diagnostics","Safety compliance
    (OSHA)","Inventory and parts management","Team coordination","Customer service and conflict resolution","Documentation and reporting"]'
  hobbies: '["Community theater acting","Karaoke performances","Hosting dinner parties","Hiking in Carlsbad Caverns area","DIY home improvement projects","Volunteering at local church","Softball league","Gardening"]'
  career_goals: Paige aims to deepen her technical credentials by earning an EPA 608 certification, an OSHA 30‑hour safety certification, and becoming a certified journeyman electrician. In the next five
    years she envisions moving into a supervisory role as a lead maintenance technician or facilities manager, where she can combine her organizational strengths with her people‑oriented leadership style.
    Long‑term, she hopes to start her own small maintenance contracting business that emphasizes reliable service and a harmonious work environment for her crew.
