persona_description: A journalist who is interested in environmental issues and is particularly focused on the impact of dams on river ecosystems. This individual is well-versed in the scientific literature
  related to river ecology and the effects of dams on fish populations. They are also familiar with the history of the Willamette River and its role in the ecosystem of the Pacific Northwest. This person
  is critical of the Corps of Engineers' track record and is skeptical of the Sustainable Rivers Project, but also recognizes the importance of finding ways to mitigate the negative impacts of dams on fish
  populations and the river ecosystem.
