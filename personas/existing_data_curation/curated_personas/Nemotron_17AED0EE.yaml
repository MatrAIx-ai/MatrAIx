personas:
  professional: Sandy Wilson is an aspiring arts‑administration professional who channels her methodical budgeting, event‑coordination expertise, and deep appreciation for visual culture into organizing
    community workshops for local galleries while nurturing a modest online quilt and knitwear business.
  sports: Sandy Wilson enjoys low‑impact fitness, spending Saturday mornings strolling through the Palos Forest Preserve, attending a gentle yoga class at the local community center, and cheering for the
    Chicago Cubs and Chicago Bears from their living room, though they rarely engage in competitive team sports.
  arts: Sandy Wilson spends weekends at the Art Institute of Chicago admiring Monet’s water lilies and the vibrant quilts of Faith Ringgold, while evenings find them knitting to the mellow strums of Joni
    Mitchell and listening to design podcasts featuring architects like Frank Lloyd Wright, merging visual inspiration with tactile creation.
  travel: Sandy Wilson prefers thoughtful, art‑focused trips, often planning weekend escapes to Chicago’s museum district, a restorative visit to the historic gardens of Martha’s Vineyard, and day‑long
    tours of nearby historic towns such as Galena, while dreaming of a future pilgrimage to Florence’s Uffizi Gallery.
  culinary: Sandy Wilson, a confident home cook, blends comfort and world flavors by preparing rosemary‑infused salmon, simmering lentil dal with turmeric, baking cinnamon apple crumble, and experimenting
    with kimchi‑style pickles, all while crafting hand‑knit aprons for their kitchen and sipping garden‑grown mint tea.
  core: Sandy Wilson is a meticulous planner who balances a love for quiet crafting and art immersion with an undercurrent of worry that drives them to double‑check spreadsheets, hoard spare yarn, and schedule
    every minute, even as they quietly nurture a budding side business.
background:
  cultural: Sandy grew up in the suburban Midwest, in a predominantly white, middle‑class neighborhood of Cook County, Illinois. Her family background is rooted in German‑Polish ancestry, with a cultural
    emphasis on hard work, modesty, and community participation. Raised in a Protestant household, she experienced church gatherings that reinforced values of cooperation and service. The diverse cultural
    offerings of nearby Chicago, especially its museums, theatres, and multicultural festivals, have broadened her appreciation for varied artistic traditions beyond her immediate heritage. This blend of
    Midwestern pragmatism and exposure to a wide range of artistic expressions shapes her worldview, encouraging both a respect for tradition and an openness to unconventional ideas.
attributes:
  skills: '[''Household budgeting and financial record-keeping'', ''Meal planning and nutrition management'', ''Event planning for small gatherings'', ''Basic digital literacy (email, spreadsheets, social
