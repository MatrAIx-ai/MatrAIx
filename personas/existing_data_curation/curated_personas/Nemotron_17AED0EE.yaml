    art workshops'', ''Time management and scheduling under pressure'', ''Structured problem solving and stress mitigation'']'
  hobbies: '[''Visiting art museums and galleries'', ''Knitting and crocheting'', ''Quilting and fabric art'', ''Scrapbooking and journaling'', ''Reading art history, poetry, and self‑help literature'',
    ''Gardening and herb cultivation'', ''Cooking and baking experimental dishes'', ''Participating in a small book club'', ''Attending neighborhood craft circles'', ''Listening to podcasts on philosophy,
    design, and creativity'', ''Practicing mindfulness meditation'', ''Walking in local forest preserves'']'
  career_goals: Sandy aims to complete her high‑school equivalency (GED) within the next year, allowing her to enroll in a community‑college certificate program in arts administration or nonprofit management.
    She hopes to translate her love of art and her organizational talent into a part‑time role as a volunteer coordinator or virtual assistant for a local gallery, where she can support exhibitions and
    community outreach. Parallel to this, she is developing a modest home‑based business selling hand‑crafted quilts and knitted accessories through an online marketplace, with the long‑term goal of turning
    it into a steady supplemental income. Sandy also aspires to become certified in respite caregiving, enabling her to combine her caregiving experience with professional opportunities. Throughout these
    pursuits, she seeks to build coping strategies that reduce her stress and foster emotional resilience.
