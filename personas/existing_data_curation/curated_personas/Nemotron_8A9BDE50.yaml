  career_goals: She aspires to become a strategic HR business partner within the next three years, leading employee development and engagement programs. Blanca plans to earn the SHRM-CP certification and
    possibly pursue a master’s degree in Human Resource Management or Organizational Development. Long-term, she envisions directing the HR function for a midsize company, championing diversity, equity,
    and inclusion initiatives that reflect her Mexican-American heritage.
