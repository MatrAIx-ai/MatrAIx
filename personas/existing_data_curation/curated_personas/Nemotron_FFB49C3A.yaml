personas:
  professional: An accomplished customer service specialist, Luis Hernandez leverages bilingual fluency and deep expertise in Salesforce and Zendesk to translate data insights into workflow improvements,
    consistently surpassing KPI targets while maintaining a calm, conflict‑de‑escalation style that fuels their competitive drive toward a team‑lead position and eventual service‑strategy leadership.
  sports: Luis Hernandez follows international soccer, cheering on their favorite national side and tracking FC Dallas in MLS, while also catching Dallas Mavericks basketball games, rooting for the Texas
    Rangers baseball squad, and joining casual pickup basketball matches at the community center on weekends.
  arts: Luis Hernandez unwinds with classic rock from the Rolling Stones, dips into contemporary Latin jazz, frequents the local theater for community productions, and dives into non‑fiction titles by Malcolm
    Gladwell and Walter Isaacson, letting artistic and literary exposure fuel their creative problem‑solving at work.
  travel: Luis Hernandez favors road‑trip adventures that blend spontaneity with family time, often heading to the Texas Hill Country for wine tasting in Fredericksburg, spending lazy weekends fishing on
    Lake Lavon, and dreaming of future journeys to Cartagena’s historic streets, Tokyo’s sushi districts, and Costa Rica’s cloud forests.
  culinary: Luis Hernandez is a confident home cook who masters the art of making pupusas, tamales de elote, and yuca frita, frequently experimenting with unexpected fillings like smoked cheddar and jalapeño,
    and they keep a well‑stocked pantry of masa harina, fresh avocados, chipotle, and a collection of artisanal cheeses for family gatherings.
  core: Luis Hernandez blends a data‑driven, competitive work ethic with a laid‑back DIY hobbyist spirit, balancing meticulous KPI tracking with spontaneous fishing trips, culinary experiments, and a flexible
    yet slightly disorganized approach to planning and finances.
background:
  cultural: Luis grew up in a Salvadoran household where family gatherings, religious holidays, and shared meals were central. He maintains strong ties to his heritage through language, food, and participation
    in the local Salvadoran community in Dallas County. While he has fully embraced Texan customs—like barbecues and football tailgates—he continues to celebrate Salvadoran traditions such as Día de los
    Farolitos and the Feast of Our Lady of Guadalupe. This bicultural experience informs his empathetic communication style, his love for hearty, spice‑infused meals, and his commitment to supporting other
    immigrants as they navigate life in the United States.
attributes:
