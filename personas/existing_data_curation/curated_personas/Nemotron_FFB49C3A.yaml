    Troubleshooting for Customer Issues'']'
  hobbies: '[''Cooking Salvadoran cuisine'',''Watching soccer and NBA games'',''DIY home improvement projects'',''Fishing at Lake Lavon'',''Reading non‑fiction on personal development and tech'',''Volunteering
    at Hispanic resource center'']'
  career_goals: Luis aims to move from a front‑line representative to a team lead within the next 12‑18 months, then progress to a Customer Experience Manager role where he can shape service strategy for
    the entire department. He plans to earn a certification in Service Excellence and a Lean Six Sigma Yellow Belt to support his interest in process improvement. Over the longer term, Luis dreams of opening
    a small family‑owned specialty grocery that highlights Salvadoran foods and community events, while also mentoring younger employees from immigrant backgrounds to help them advance in corporate settings.
