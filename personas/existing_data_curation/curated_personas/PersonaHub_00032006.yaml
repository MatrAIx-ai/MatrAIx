persona_description: A researcher from the University of Missouri School of Medicine who specializes in imaging techniques and lung function studies. The person is interested in developing new imaging techniques
  to improve the treatment of cystic fibrosis and other lung conditions. They have experience with using helium-3 as a contrast agent in MRI and are interested in applying this technique to younger children
  or babies with impaired lung function or other respiratory diseases. The researcher is also interested in the cost-effectiveness of this technique and its potential to aid in the development of new drugs.
