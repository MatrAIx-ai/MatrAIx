  hobbies: '[''Visiting art museums and galleries'', ''Street photography'', ''Salsa dancing'', ''Community cooking classes (Mexican cuisine)'', ''Leading a senior walking group'', ''Volunteering at senior
    center (art workshops)'', ''Attending cultural festivals'', ''Reading about medical imaging innovations'']'
  career_goals: Looking ahead, Felix aims to transition into a senior leadership role within the radiology department, such as Lead Technologist or Imaging Services Coordinator, where he can shape workflow
    efficiencies and champion patient‑centered care. He plans to obtain advanced certifications in CT and MRI to broaden his technical expertise. Felix is also passionate about mentoring the next generation
    of technologists, especially those from underrepresented backgrounds, and hopes to develop a community outreach program that provides low‑cost imaging services and health education to immigrant families
    in East LA. Additionally, he dreams of integrating his love of visual art with radiology by curating an educational exhibit that highlights the aesthetic dimensions of medical imaging.
