personas:
  professional: Shane Cunningham, a retired automotive technician turned master woodworker, leverages decades of hands‑on repair experience and a self‑taught knack for CNC machining to run a community skill‑share
    workshop where they calmly mentor apprentices, blend curiosity with practical problem‑solving, and balance meticulous project planning with the flexibility to improvise when restoring a 1965 Ford Mustang
    for local shows.
  sports: Shane Cunningham enjoys fishing at Lake Norman with the local Lake Norman Fishing Club, rides a road bike with the Concord Bike Club along the North Carolina Canal Trail, and roots for the Charlotte
    Hornets, Carolina Panthers, and the Duke Blue Devils basketball team, blending seasonal outdoor activity with a laid‑back fan enthusiasm.
  arts: Shane Cunningham sings in his church choir, where he often harmonizes classic gospel hymns alongside the mellow tones of Johnny Cash and Bob Dylan, and spends quiet evenings carving wooden tributes
    to his favorite painters like Andrew Wyeth and listening to Beethoven’s Ninth Symphony while sketching ideas for new furniture pieces.
  travel: Shane Cunningham prefers road‑trip adventures in his restored Mustang, having already toured the Blue Ridge Parkway, explored historic Charleston, South Carolina, and taken a weekend getaway to
    Asheville, North Carolina, yet dreams of a future pilgrimage to the vineyards of Napa Valley, balancing a love for local scenery with occasional long‑distance wanderlust within his modest retirement
    budget.
  culinary: Shane Cunningham delights in cooking garden‑fresh tomatoes, sweet potatoes, and rosemary‑infused grilled chicken, often pairing them with classic Southern sides like shrimp and grits, fried
    green tomatoes, and a dash of hot sauce, while his modest woodworking hobby makes him savor the tactile pleasure of chopping herbs on a hand‑carved cutting board he built himself.
  core: Shane Cunningham is a calm, hands‑on retiree who chats with his roses, hoards a secret stash of homemade biscuits for late‑night projects, and marks each season by carving a tiny wooden bird, blending
    practical skill with whimsical quirks.
background:
  cultural: Shane was born and raised in the outskirts of Concord, North Carolina, in a family with deep roots in the Piedmont region. His grandparents were part of the post‑World War II manufacturing boom
    that shaped Cabarrus County's textile and automotive industries. The family values emphasize hospitality, respect for elders, and community involvement, often expressed through church gatherings, potluck
    meals, and participation in local fairs. Shane's upbringing includes a love for country and bluegrass music, an appreciation for Southern comfort foods like fried chicken and collard greens, and pride
    in regional traditions such as the Concord Harvest Festival. This blend of rural customs and evolving industrial heritage fosters a pragmatic, modest worldview that values hard work, self‑reliance,
    and collaborative community spirit.
