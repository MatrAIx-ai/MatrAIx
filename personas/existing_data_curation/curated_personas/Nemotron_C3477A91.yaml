  hobbies: '[''Gardening (vegetables and roses)'', ''Woodworking and furniture making'', ''Classic car restoration and shows'', ''Reading historical non-fiction'', ''Church choir participation'', ''Volunteering
    at community events'', ''Fishing at Lake Norman'', ''Cycling and walking on local trails'']'
  career_goals: Although retired, Shane aims to stay active and purposeful by sharing his knowledge and preserving local history. He plans to launch a small community skill‑share workshop where he mentors
    younger tradespeople in woodworking and basic automotive repair. He also hopes to expand his modest woodworking hobby into a boutique line of handcrafted pieces, with proceeds supporting local charities.
    Shane is interested in documenting oral histories of longtime Concord residents, creating a digital archive for schools and the public library. Maintaining his health through regular cycling, nature
    walks, and gardening remains a personal ambition, as does writing a memoir that captures his life experiences and the evolving culture of Cabarrus County.
