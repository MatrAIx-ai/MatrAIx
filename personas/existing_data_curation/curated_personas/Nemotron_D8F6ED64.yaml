  hobbies: '[''Comic drawing'', ''Digital art creation'', ''Photography (candid and landscape)'', ''Playing acoustic guitar and songwriting'', ''School drama club'', ''Basketball'', ''Social video gaming'',
    ''Reading graphic novels'', ''Blogging about art and culture'']'
  career_goals: Eric aspires to attend a high school with a strong arts program and ultimately pursue a degree in graphic design or film production. He dreams of becoming a creative director or multimedia
    content creator who can blend storytelling with visual art. In the near future, he aims to build a personal portfolio, launch a YouTube channel showcasing his short films and artwork, and eventually
    work on community-oriented media projects that highlight local stories.
