personas:
  professional: Eric Epps, an aspiring digital comic creator and budding content producer, blends hand‑drawn storytelling with Procreate expertise while leveraging their natural curiosity and sociable charisma
    to lead school art projects and host live‑stream art sessions.
  sports: Eric Epps, a point guard on the middle‑school basketball team and a regular at the local YMCA hoops league, follows the Golden State Warriors and enjoys pickup games after school, balancing a
    love for competitive play with occasional missed practice when a comic deadline looms.
  arts: Eric Epps, an avid comic‑book enthusiast, draws weekly strips inspired by "Scott Pilgrim" and "Adventure Time", experiments with digital art tools like Procreate, strums acoustic guitar while writing
    indie‑pop style songs, and brings characters to life on stage through the school drama club, citing artists such as Jim Lee, musician Tame Impala, and actor Tom Holland as creative touchstones.
  travel: Eric Epps dreams of swapping weekend gaming marathons for trips to Tokyo’s Akihabara district to soak in manga culture, while also cherishing road‑trip adventures to nearby national parks and
    annual family visits to the state fair, all while navigating school schedules and a modest family travel budget.
  culinary: Eric Epps enjoys crafting spicy ramen bowls with miso broth, whipping up pepperoni pizza on a home‑made dough, and experimenting with chocolate chip cookie batches, though they often over‑mix
    batter and forget to pre‑heat the oven, leading to quirky kitchen mishaps.
  core: Eric Epps is a socially vibrant 14‑year‑old who channels boundless curiosity into comics, guitar riffs, and basketball, while juggling occasional procrastination, late‑night gaming, and a habit
    of over‑caffeinating during study sessions.
background:
  cultural: Eric grew up in New Springfield, a close‑knit community in Columbiana County, Ohio, where Midwestern values of friendliness, community involvement, and modesty are prominent. His family participates
    in local church youth activities and town events such as the summer fair and high school football games. The small‑town setting fosters a strong sense of belonging and encourages him to explore both
    traditional community activities and emerging creative pursuits, blending local heritage with a curiosity for new artistic ideas.
attributes:
