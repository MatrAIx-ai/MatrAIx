  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Volunteer work at senior center'', ''Quilting'', ''Genealogy research'', ''Crossword puzzles'', ''Cooking Southern recipes'', ''Walking in local
    nature trails'', ''Attending community theater'', ''Participating in garden shows'']'
  career_goals: Victoria aims to transition into a supervisory or office manager role where she can mentor younger staff and streamline office workflows. She also plans to obtain an administrative professional
    certification to formalize her expertise and explore part‑time consulting for small businesses in her community.
