  career_goals: Loe aims to graduate high school with solid grades in math and science, then pursue a technical degree in civil engineering or construction management at a community college or university.
    He envisions designing safe, affordable housing projects that benefit his local community and families like his own. In the long term, he hopes to lead a construction firm that emphasizes sustainable
    building practices and provides apprenticeships for other young people from underrepresented backgrounds. He also dreams of mentoring younger students in school clubs, sharing his practical skills and
    encouraging them to pursue STEM careers.
