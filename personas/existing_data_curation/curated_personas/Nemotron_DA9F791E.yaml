personas:
  professional: Loe Montanez, an aspiring technologist who spends afternoons leading the school robotics club, blends a love for building LEGO and electronic kits with a detail‑orientated, structured mindset,
    reliably coordinating group tasks while navigating the stress of balancing schoolwork and extracurriculars.
  sports: Loe Montanez, a midfielder for the Riverside Rovers community soccer league, thrives on the blend of competition and camaraderie, keeps fit with after‑school jogs and weekend pickup games, and
    roots for the Los Angeles Galaxy, while also dabbling in basketball during the winter season.
  arts: Loe Montanez, an avid guitar hobbyist, practices chords alongside siblings while listening to a blend of regional folk tunes, chart‑topping pop from Shakira, and indie hits by Billie Eilish, and
    regularly attends school art showcases to fuel their creative spark.
  travel: Loe Montanez enjoys budget‑friendly weekend road trips to nearby coastal towns and has already visited the Grand Canyon, while dreaming of exploring the ancient ruins of Tulum and the neon streets
    of Tokyo on a future school exchange, favoring a mix of planned itineraries and spontaneous detours.
  culinary: Loe Montanez, a competent home cook, loves preparing family‑favorite tacos with corn tortillas, seasoned pork, fresh cilantro, and a squeeze of lime, and masterfully assembles tamales using
    masa, rostitas, and a blend of chilies, often experimenting with new spice mixes on weekend gatherings.
  core: Loe Montanez blends a high‑energy love for team sports and robotics with a penchant for tacos, occasional gaming‑induced sleeplessness, and a thoughtful, albeit worry‑prone, outlook on life.
background:
  cultural: Loe comes from a Mexican heritage family that maintains strong ties to its cultural roots while adapting to life in Simpsonville, South Carolina. At home, Spanish is spoken daily, and family
    traditions such as celebrating Día de los Muertos, Mexican Independence Day, and sharing seasonal foods are integral to his upbringing. He attends a local church with a diverse congregation, where bilingual
    services highlight his bicultural identity. The blend of Mexican customs—like respect for family, communal gatherings, and love of music and food—combined with Southern community values of hospitality
    and neighborliness shapes his worldview. Loe embraces both cultures, often acting as a bridge between his peers at school and his family's cultural practices, which enriches his sense of identity and
    community involvement.
