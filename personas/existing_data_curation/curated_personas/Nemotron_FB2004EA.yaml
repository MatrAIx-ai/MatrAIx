  career_goals: Jack aims to complete his bachelor’s degree in occupational therapy within the next two years and become a licensed occupational therapist. He is interested in specializing in neurorehabilitation
    and mental health, seeking to integrate innovative, evidence‑based interventions with practical, client‑centered care. Long‑term, he envisions leading a community‑based clinic in Riverside County offering
    comprehensive rehab services and supportive programs for individuals coping with anxiety and depression, as well as mentoring future therapy assistants and contributing to research on therapeutic approaches
    for emotional resilience.
