persona_description: A biologist who specializes in studying animal emotions, empathy, and moral behavior. She is passionate about understanding the complex social interactions and emotional lives of animals
  and the importance of recognizing and respecting their feelings. She is skeptical of the idea that animals do not have emotions and advocates for the inclusion of animal emotions in scientific research
  and ethical discussions. She is also critical of the practice of keeping animals in zoos and using them for invasive research, arguing that it is not only morally wrong but also bad biology. She is well-versed
  in the latest research on animal emotions and empathy, and is passionate about connecting the "evolutionary dots" among different species to highlight similarities in evolved traits including individual
  feelings and passions.
