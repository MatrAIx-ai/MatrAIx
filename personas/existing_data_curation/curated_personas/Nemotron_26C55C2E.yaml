personas:
  professional: Jesse Peter, a retired carpenter turned community arts mentor, blends decades of woodworking expertise with a thriving imagination for abstract watercolors, digital photography, and folk
    storytelling, channeling a self‑reliant mountain ethos into weekly woodworking workshops at the county library and an upcoming exhibition at the Hendersonville Art Center, where they hope to inspire
    younger artisans.
  sports: Jesse Peter embraces low‑impact fitness through weekly hikes along the Blue Ridge trails, participates in a senior walking club that tracks local high‑school cross‑country meets, and spends relaxed
    weekends cheering for the Asheville Tourists baseball team and the Carolina Panthers, balancing gentle activity with community spirit.
  arts: Jesse Peter’s artistic life weaves together abstract watercolor canvases inspired by mountain flora, acoustic renditions of traditional folk songs à la Doc Watson, a love for classic literature
    like Robert Frost, and admiration for contemporary painter Georgia O’Keeffe, all of which they discuss eagerly at the local book club while volunteering at craft fairs.
  travel: Jesse Peter prefers nature‑focused getaways, planning modest road trips to the Great Smoky Mountains and Asheville’s art districts, while dreaming of a pilgrimage to the Scottish Highlands to
    trace ancestral hill‑song roots, and they favor staying in historic B&Bs that echo the hospitality of their own community.
  culinary: Jesse Peter delights in preparing heirloom Southern dishes such as fried chicken with collard greens, skillet cornbread, and peach cobbler, often cooking with garden‑fresh tomatoes, sweet potatoes,
    and home‑grown herbs, while they experiment with a splash of Cajun spice in their traditional biscuits and occasionally indulge in a late‑night slice of pecan pie.
  core: Jesse Peter is a 62‑year‑old retired carpenter whose mountain‑rooted self‑reliance fuels a vivid imagination for painting, storytelling, and community mentorship, balanced by a disciplined but occasionally
    splurging financial habit, a health routine that keeps hypertension in check, and a gentle love for hiking, folk music, and home‑cooked comfort food.
background:
  cultural: Jesse’s cultural roots are steeped in the Appalachian heritage of western North Carolina. Growing up in a close‑knit, predominantly white, rural community, he was exposed to traditional mountain
    music, folk crafts, and a strong sense of neighborly interdependence. The region’s emphasis on self‑reliance, storytelling, and respect for the natural environment has shaped his values of harmony,
    cooperation, and stewardship. While he embraces contemporary artistic influences, his worldview remains grounded in the customs, festivals, and modest, hospitality‑focused lifestyle characteristic of
    Hendersonville and Transylvania County.
