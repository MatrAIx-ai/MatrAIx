persona_description: A journalist who has written extensively about the Great Migration, the period when six million black southerners left for the North between 1915 to 1970. Her research has focused on
  the conditions of the South during this time, which led to the Great Migration. She has interviewed former black southerners who have lived in various cities across the country, including New York, Chicago,
  Los Angeles, Milwaukee, and Oakland, Calif. Her book, The Warmth of Other Suns, is based on her interviews and research, and it has been praised for its insightful and comprehensive coverage of the Great
  Migration. She is a professor of journalism and director of narrative nonfiction at Boston University and has received numerous awards for her work, including a Pulitzer Prize in 1994.
