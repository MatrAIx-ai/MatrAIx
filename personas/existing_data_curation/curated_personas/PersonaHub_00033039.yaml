persona_description: A person who is passionate about inclusion and wants to create a sports program that accommodates a variety of abilities. They are a physical education teacher and founder of NJAPE.org,
  an organization that provides information and support for the inclusion of kids with disabilities in sports. They believe that the assumption that the majority of individuals possess a far greater skill
  base than the minority (i.e. individuals with special needs) is not true, and that there are many people who just want to have fun and participate in sports. They are interested in finding out about players'
  outside interests and incorporating them into the game, as well as empowering kids to flex their imaginations along with their muscles. They want to consider their program a work in progress and are open
  to feedback and suggestions.
