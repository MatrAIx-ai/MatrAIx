personas:
  professional: An aspiring visual storyteller, Jorge Quintana, channels their curiosity, methodical planning, and sociable energy into comic‑style sketching and digital painting, building a growing online
    portfolio while volunteering at the community center’s art workshops, and they often collaborate with peers to bring fresh characters to life.
  sports: A community‑driven soccer enthusiast, Jorge Quintana, plays forward for Lakeland Youth Soccer Club, follows the Tampa Bay Rowdies and the Tampa Bay Lightning, and they organize weekly pick‑up
    games at the local park to stay active and socially connected.
  arts: A graphic‑novel aficionado, Jorge Quintana, draws inspiration from creators like Brian K. Vaughan, Neil Gaiman, and artist Alex Ross, spends evenings digital‑painting comic panels and humming folk‑rock
    songs tinged with salsa rhythms, they regularly attend mural tours and local art gigs to fuel their creative spark.
  travel: An adventure‑seeking weekend explorer, Jorge Quintana, loves day trips to the Everglades, the historic streets of St. Augustine, and the vibrant murals of Tampa, while dreaming of a cultural immersion
    trip to the Caribbean island where their parents grew up, they plan journeys with a mix of meticulous budgeting and spontaneous last‑minute decisions.
  culinary: A budding home chef, Jorge Quintana, enjoys preparing classic arroz con gandules, pernil, and flan using sofrito, adobo, and caramelized sugar, while also mastering quick pasta carbonara and
    pineapple salsa tacos, they experiment with flavors in their kitchen and often share meals with friends after soccer practice.
  core: Jorge Quintana blends a curious, organized mind with a love for comic art, guitar riffs, and community soccer, though they sometimes lose track of time sketching until sunrise.
background:
  cultural: Jorge grew up in a bilingual Puerto Rican household in Lakeland, where Spanish is spoken at home and English dominates school and community life. His parents immigrated from San Juan and keep
    the island’s traditions alive through celebrations such as Nochebuena, the annual Puerto Rican Day Parade in nearby Tampa, and family cooking nights featuring arroz con gandules, pernil, and flan. He
    regularly visits the local Hispanic community center, where he participates in salsa and bomba dance workshops and helps organize cultural art projects. This blend of island heritage and Floridian upbringing
    gives him a strong sense of pride in his roots while fostering an openness to diverse ideas and artistic expression.
