  career_goals: Jorge aims to enroll in a specialized arts‑focused high‑school program or magnet academy that will let him deepen his digital‑art and coding skills. In the longer term, he envisions earning
    a bachelor’s degree in Graphic Design or Interactive Media, followed by a career as a video‑game animator or creative director for culturally inclusive media projects. His immediate goals include creating
    a polished portfolio of illustrations and short animated clips, winning the Lakeland high‑school art showcase, and securing a mentorship with a local graphic‑design professional who can guide his growth.
