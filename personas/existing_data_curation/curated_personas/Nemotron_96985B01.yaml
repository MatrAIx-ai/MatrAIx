  career_goals: Amber aims to earn her FAA Tower Controller certification and advance to a senior controller position within the next three years, eventually moving into a supervisory or training role where
    she can mentor new controllers and promote a culture of safety and collaboration. She plans to pursue a bachelor's degree in Aviation Management to broaden her expertise and eventually transition into
    airport operations management at a major hub airport. Throughout her career, she is committed to balancing professional growth with personal well‑being, seeking opportunities that allow her to support
    colleagues and foster a harmonious work environment.
