  hobbies: '["Art museum and gallery visits","Rooftop herb and vegetable gardening","Cooking traditional Southeast Asian cuisine","Book club participation (historical fiction & memoirs)","Community theater
    attendance","Journaling and meditation for stress relief","Quilting with culturally inspired patterns"]'
  career_goals: Although retired, Mariel aims to become a mentor for younger volunteers at the local senior center, sharing her event‑planning expertise and cultural knowledge. She hopes to curate a small
    rotating art exhibit that showcases works by senior artists in Salt Lake City, fostering intergenerational dialogue. Mariel also aspires to document her family’s migration story and traditional recipes
    in a handwritten memoir to preserve her heritage for future generations. Finally, she wishes to continue learning about contemporary art trends through community classes and occasional museum tours.
