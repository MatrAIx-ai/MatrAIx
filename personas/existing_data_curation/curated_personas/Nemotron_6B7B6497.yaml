  career_goals: Suzanne aims to advance into senior administrative roles, such as Director of Early Childhood Programs or Assistant Principal, within the next five years. She plans to earn a Master’s degree
    in Educational Leadership to deepen her strategic planning and policy expertise. Her long‑term ambition is to lead a network of high‑quality, equity‑focused childcare centers that employ data‑driven
    practices to improve child outcomes. She is also interested in spearheading initiatives that streamline districtwide administrative workflows and increase family engagement.
