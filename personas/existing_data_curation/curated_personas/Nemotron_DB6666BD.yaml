personas:
  professional: A community‑oriented teen named Linda Kelley, who is juggling their GED studies while training to become a Certified Nursing Assistant and organizing local fairs, leverages their knack for
    communication and hands‑on skills to run a small home‑based baking venture that supplies pastries to senior care facilities and neighborhood events.
  sports: Linda Kelley is a steadfast member of the Corfu Co‑ed Softball Club, cheered on by friends at the town field, follows the Buffalo Bills and New York Knicks on television, and enjoys early‑morning
    trail runs with their dog along nearby Genesee County paths.
  arts: Linda Kelley finds solace in classic rock legends like The Beatles and Fleetwood Mac, strums an acoustic guitar at local coffee‑shop gatherings, and expresses creativity through knitting scarves
    and crocheting blankets for charity, often inspired by the storytelling of folk singer Gillian Welch.
  travel: Linda Kelley prefers short, purposeful road trips that blend relaxation with community connection, such as weekend visits to Niagara Falls State Park, the Adirondack hiking trails, and the historic
    farmstead of nearby Lancaster, while budgeting tightly to keep their lab‑coat‑related savings intact.
  culinary: Linda Kelley delights in baking classic apple pie, chocolate‑chip cookies, and lemon bars using farm‑fresh eggs, butter, and a dash of cinnamon, skillfully balancing a modest kitchen setup with
    the ambition to sell their pastries at the annual Corfu Fair and via online orders.
  core: Linda Kelley is a routine‑loving, sociable teen who blends practical nursing aspirations with a home‑baked business, juggling community events, a love for classic rock, and a disciplined yet laid‑back
    approach to life.
background:
  cultural: Linda grew up in a predominantly white, working‑class community in Corfu, a small hamlet in Genesee County, New York. Her family’s roots trace back to the region’s historic farming and industrial
    immigrant populations, with a blend of Irish and German ancestry. The local culture emphasizes self‑reliance, practicality, and community involvement, often centered around the town’s church, school
    events, and seasonal agricultural fairs. Traditional values such as punctuality, family loyalty, and a strong work ethic are integral to her upbringing.
