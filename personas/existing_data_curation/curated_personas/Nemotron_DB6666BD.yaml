  hobbies: '[''Softball'', ''Cooking and baking family recipes'', ''Community center volunteering'', ''Gardening'', ''Knitting and crocheting'', ''Listening to classic rock and pop music'', ''Coffee shop
    hangouts with friends'', ''Attending local fairs and festivals'', ''Dog walking on local trails'', ''Playing acoustic guitar'']'
  career_goals: Linda plans to complete her high school equivalency (GED) within the next year. After obtaining her GED, she aims to pursue certification as a Certified Nursing Assistant (CNA) so she can
    work at a nearby senior care facility, combining her practical nature with a desire to help her community. In parallel, she aspires to launch a small home‑based baking business, selling homemade pastries
    at local fairs and through online orders. Her long‑term goal is to maintain a stable, routine‑oriented job that offers regular hours and community interaction while allowing the flexibility to run her
    own side business.
