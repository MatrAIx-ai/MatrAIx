  career_goals: At this stage, Deolinda aims to preserve her family’s stories and the neighborhood’s heritage by compiling a memoir and a small oral‑history collection for the Hawthorne historical society.
    She hopes to learn watercolor painting to capture scenes from her garden, and to mentor a few younger volunteers, sharing her gardening tips and craft skills. Additionally, she aspires to organize a
    modest community art exhibit that showcases local seniors’ creations, fostering intergenerational connection.
