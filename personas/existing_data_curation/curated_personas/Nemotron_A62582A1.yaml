  hobbies: '[''sketching'', ''watercolor painting'', ''digital art'', ''ukulele playing'', ''salsa dancing'', ''reading fantasy novels'', ''reading graphic novels'', ''coding games in Scratch'', ''baking
    Puerto Rican treats'', ''biking'', ''volunteering in community art programs'']'
  career_goals: Jennifer dreams of becoming a multimedia storyteller who creates illustrated books and digital comics that celebrate her Puerto Rican roots. She hopes to attend a specialized arts high school,
    then study graphic design and visual communication in college. Long‑term, she envisions using her art to mentor younger kids through after‑school workshops and community projects, blending her love
    of art, technology, and cultural heritage to inspire others.
