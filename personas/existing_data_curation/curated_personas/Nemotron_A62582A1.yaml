personas:
  professional: Jennifer Pimentel, a 12‑year‑old aspiring game developer and multimedia artist, merges hand‑drawn character sketches with watercolor textures and iPad digital painting to prototype whimsical
    adventure games in Scratch, while volunteer‑teaching fellow kids at the community center’s art program.
  sports: Jennifer Pimentel powers through weekend bike rides in Willow Park, belongs to the local youth cycling club "Pedal Pals," and proudly supports the hometown minor‑league baseball team the "Riverside
    Cubs," while occasionally playing pickup soccer with friends.
  arts: 'Jennifer Pimentel admires the whimsical illustrations of Hayao Miyazaki, the vibrant graphic style of Rebecca Sugar, and the soothing ukulele melodies of Israel Kamakawiwo’ole, loves drawing fan‑art
    of characters from "Avatar: The Last Airbender," and dances to reggaeton hits like "Despacito" while strumming their own ukulele.'
  travel: Jennifer Pimentel has visited the sunny beaches of Florida’s Gulf Coast and explored the historic streets of San Juan with family, dreams of strolling through cherry‑blossom avenues in Kyoto during
    spring, and prefers short, family‑oriented road trips that combine nature hikes with museum visits.
  culinary: Jennifer Pimentel experiments with coconut‑frosted cupcake recipes, perfects classic chocolate‑chip cookies, blends tropical fruit smoothies with pineapple and mango, and, at an intermediate
    cooking level, often helps their mom bake treats on weekends.
  core: Jennifer Pimentel is a curious 12‑year‑old who blends art, music, and gaming into a playful, detail‑oriented life, juggling weekly bike rides, cupcake baking, and a budding digital art career while
    occasionally splurging on stickers.
background:
  cultural: Jennifer grows up in a bilingual Puerto Rican household in Yonkers, where Spanish and English are spoken interchangeably. Family traditions include celebrating Puerto Rican holidays such as
    San Juan and Día de la Constitución, sharing meals like arroz con gandules and pasteles, and listening to salsa, bomba, and reggaeton music. She participates in local community events organized by the
    vibrant Puerto Rican diaspora in Westchester County, which reinforce her connection to her island heritage while also exposing her to the multicultural influences of New York City.
attributes:
  skills: '[''drawing'', ''digital illustration'', ''short story writing'', ''basic programming in Scratch'', ''bilingual Spanish-English communication'', ''team collaboration'', ''project organization'',
