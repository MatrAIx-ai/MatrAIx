  hobbies: '[''Video gaming'', ''Fishing'', ''Hiking'', ''DIY woodworking'', ''Tech and logistics podcasts'', ''Strategy board games'', ''Guitar playing'', ''Community volunteering'']'
  career_goals: Dylan aims to advance from his current clerk role to a senior production planner position within the next three to five years. He plans to earn an APICS CPIM certification and complete an
    online bachelor's degree in Supply Chain Management to strengthen his theoretical foundation. Long‑term, he envisions moving into operations management, leading a small team, and eventually consulting
    for midsize manufacturers who value flexible, data‑driven planning. He wants to stay at the intersection of innovative planning tools and practical, on‑the‑ground execution.
