  hobbies: '["Reading historical fiction", "Gardening (roses, native plants)", "Crocheting and quilting", "Cooking Southern comfort foods", "Walking local nature trails", "Participating in a small book
    club", "Volunteering at the community center", "Attending church choir practice"]'
  career_goals: Rosalyn aims to deepen her impact by earning a master’s degree in educational leadership and moving into an administrative role such as department chair or vice‑principal. She plans to launch
    a community literacy initiative that partners local churches and the public library, secure grant funding for STEAM enrichment, and continue mentoring early‑career educators while maintaining a balanced
    work‑life rhythm.
