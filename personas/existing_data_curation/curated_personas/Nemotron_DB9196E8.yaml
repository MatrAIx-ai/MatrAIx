personas:
  professional: Rosalyn Broadway is a veteran secondary‑school teacher who blends rigorous curriculum design with culturally responsive pedagogy and tech tools, mentoring new teachers while orchestrating
    after‑school programs that link classrooms to community partners, all driven by a pragmatic curiosity and a reliable, organized work ethic.
  sports: Rosalyn Broadway enjoys low‑impact fitness, favoring early‑morning walks on Waycross nature trails and weekly yoga sessions at the community center, while cheering on the Atlanta Falcons and Atlanta
    Braves and occasionally participating in a local walking club that meets for charity swims in the summer.
  arts: Rosalyn Broadway finds creative solace in crocheting intricate shawls, quilting heirloom blankets, and reading historical fiction by authors like Philippa Gregory, while also attending performances
    of the Waycross Community Theatre featuring actors such as Sarah Paulson and listening to folk legends like Emmylou Harris during quiet evenings.
  travel: Rosalyn Broadway prefers carefully planned road trips to historic Southern towns such as Savannah, Charleston, and Natchez, and dreams of a pilgrimage to England’s Bath and York to explore Georgian
    architecture, balancing modest travel budgets with occasional family visits to the Grand Canyon for a change of scenery.
  culinary: Rosalyn Broadway excels at Southern comfort cooking, often preparing dishes like buttermilk fried chicken, collard greens simmered with smoked ham hocks, peach cobbler with fresh garden peaches,
    and savoring the aroma of fresh rosemary and thyme from her herb patch.
  core: Rosalyn Broadway is a meticulous educator‑turned‑leader who cultivates community, gardens, and quiet creativity while navigating a balanced, albeit occasionally splurging, approach to life’s routines.
background:
  cultural: Rosalyn’s cultural roots are grounded in the African‑American experience of the Deep South. Raised in a close‑knit Black family in Georgia, she was immersed in church life, storytelling traditions,
    and a strong emphasis on education as a pathway to advancement. Her upbringing instilled a sense of communal responsibility, resilience, and pride in Black heritage, which she weaves into her classroom
    through culturally responsive teaching and community outreach. She values the legacy of Southern Black culture—music, food, and oral history—and draws on these influences to foster a supportive, inclusive
    learning environment for her students.
attributes:
  skills: '["Curriculum development", "Classroom management", "Differentiated instruction", "Culturally responsive pedagogy", "Assessment design", "Technology integration (Google Classroom, SMART Boards)",
