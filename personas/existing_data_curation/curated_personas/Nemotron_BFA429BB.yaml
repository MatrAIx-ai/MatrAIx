  core: Megan Wood, a one-year-old, blends a love for predictable routines with a curious, methodical exploration of the world, often turning everyday play into structured learning moments while occasionally
    resisting new textures and unexpected changes.
background:
  cultural: Megan is a white, middle‑class child raised in Washington, DC. Her family follows mainstream American cultural traditions, celebrating holidays such as Thanksgiving, Christmas, and Independence
