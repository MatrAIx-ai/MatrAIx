  hobbies: '[''Visiting local art galleries and museums'', ''Painting watercolors'', ''DIY home décor crafting'', ''Reading art history and philosophy books'', ''Gardening'', ''Hiking on nearby nature trails'',
    ''Cooking and experimenting with new recipes'', ''Volunteering at the public library’s summer reading program'', ''Participating in community art fairs'']'
  career_goals: Gloria aims to advance into a supervisory role within the retail environment, such as a shift manager or department lead, and eventually obtain a store manager position. To support this,
    she plans to enroll in a community college certificate program in Retail Management or Business Administration. She also hopes to combine her passion for art with her professional experience by overseeing
    visual merchandising for a boutique store or a museum gift shop. Long‑term, Gloria dreams of launching a small side business selling hand‑crafted home‑decor items inspired by local art, while maintaining
    a stable work‑life balance to support her family.
