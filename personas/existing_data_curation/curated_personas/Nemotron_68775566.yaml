personas:
  professional: Eva Oliva, a resident relations specialist in a bustling student housing complex, leverages their keen conflict mediation skills, program development expertise, and artistic curiosity to
    design community‑wide wellness workshops that blend art therapy with mindfulness, while they balance meticulous policy enforcement with flexible, resident‑centered problem solving.
  sports: Eva Oliva stays fit with regular yoga sessions and weekend trail runs, cheers passionately for the River City Rivermen baseball team and the neighboring women's soccer club, the Valley Vixens,
    and they occasionally play pick‑up volleyball at the community center when schedules permit.
  arts: Eva Oliva spends weekends sketching watercolor cityscapes inspired by Claude Monet’s brushwork, strums folk tunes on their acoustic guitar echoing the lyrical style of Leonard Cohen, and they frequent
    the downtown Gallery 12 to admire exhibitions featuring Georgia O’Keeffe and emerging local muralists, integrating these artistic influences into their resident workshop curriculum.
  travel: Eva Oliva prefers intimate, culture‑rich trips, planning their vacations around guided tours of art museums in Oaxaca and Barcelona, weekend escapes to the serene gardens of Kyoto’s Arashiyama
    district, and occasional road trips to the nearby historic town of Marfa, while they balance a modest travel budget with a desire to experience local crafts and music.
  culinary: Eva Oliva delights in preparing traditional Mexican dishes such as mole poblano, chiles en nogada, and fresh cilantro‑sprinkled ceviche, often harvesting oregano, thyme, and basil from their
    backyard herb garden, and they oscillate between enthusiastic home‑cook and occasional perfectionist who can spend hours perfecting the balance of spices.
  core: Eva Oliva blends a compassionate, art‑driven approach to community wellness with a restless creative mind, a habit of over‑packing their schedule, and they tend to retreat into watercolor sketches
    whenever anxiety flares.
background:
  cultural: Eva is a first-generation Mexican-American whose parents immigrated from Jalisco, Mexico. She grew up bilingual, celebrating Día de los Muertos, Mexican Independence Day, and familial traditions
    such as Sunday tamale making, while also adapting to Midwestern values of independence and community involvement. Her Mexican heritage informs her strong sense of family, respect for elders, love of
    vibrant music and food, and a commitment to cultural inclusion, which she weaves into her work and personal life in Kouts, Indiana.
