  career_goals: Eva aims to progress into a supervisory role such as Housing Management Supervisor or Director of Student Services, and eventually earn a bachelor's degree in Social Work or Community Development.
    She wishes to design culturally inclusive wellness programs that use art therapy to support residents' mental health, and to become certified in Mental Health First Aid and Trauma-Informed Care. She
    also hopes to mentor junior advisors and to advocate for policies that improve resident well-being.
