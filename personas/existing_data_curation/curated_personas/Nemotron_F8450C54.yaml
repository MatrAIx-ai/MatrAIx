  career_goals: Michael aims to convert his hands‑on skills into a modest home‑based woodworking studio where he can create and sell handcrafted furniture pieces. He also seeks to volunteer as a docent
    at the Oswego County Historical Society, lead workshops for seniors on basic home‑maintenance, and enroll in a series of art‑history and digital media courses at the local community college to deepen
    his artistic knowledge.
