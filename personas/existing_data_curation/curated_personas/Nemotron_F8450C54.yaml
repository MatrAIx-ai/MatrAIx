personas:
  professional: Michael Plasencia, a 58-year-old woodworking enthusiast, leverages solid practical skills in cabinetry, small-engine repair, and garden maintenance to run a modest home-based studio, while
    their curiosity and love for visual arts drive meticulous, detail-oriented craftsmanship and flexible project management that balances community event organization with personal artistic pursuits.
  sports: Michael Plasencia stays active by hiking the Oswego County trails with the local Oswego Trails Club, casting for trout with the Oswego River Anglers Association, and cheering the Buffalo Bills,
    Buffalo Sabres, and New York Yankees while occasionally joining a senior softball league at their community center.
  arts: Michael Plasencia immerses themselves in regional art galleries, drawing inspiration from Ansel Adams' photography and Georgia O'Keeffe's watercolors, while devouring Walter Benjamin's essays and
    strumming folk classics by Joan Baez and Bob Dylan on their acoustic guitar during informal gatherings.
  travel: Michael Plasencia enjoys weekend road trips to the historic streets of Boston and the covered-bridge villages of Vermont, has ventured to Florence to study Renaissance art, and dreams of a summer
    pilgrimage to Kyoto's traditional carpentry workshops, all while balancing their modest travel budget and occasional health-related travel pacing.
  culinary: Michael Plasencia, a proficient home cook, modernizes New England classics by adding miso to their clam chowder, searing lobster with herb-butter glaze, and perfecting apple crisp with oat-crumb
    topping, while their garden-grown herbs and fresh river-caught trout often feature in their seasonal menus.
  core: Michael Plasencia, a steady yet inquisitive 58-year-old, melds hands-on woodworking with artistic curiosity, balances community leadership with solitary creativity, and navigates life with organized
    flexibility, while they frequently postpone paperwork over coffee.
background:
  cultural: Michael identifies as a White American with deep roots in upstate New York. His family lineage traces back to Irish and German immigrants who settled in Oswego County in the late 19th century.
    Growing up in the small‑town environment of Fulton fostered values of self‑reliance, community involvement, and an appreciation for the region’s natural scenery and its industrial heritage, shaping
    his balanced outlook and curiosity toward diverse experiences.
