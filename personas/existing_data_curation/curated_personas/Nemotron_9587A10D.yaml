personas:
  professional: Evena Fields, a budding robotics enthusiast and thespian, blends their natural curiosity with practical problem-solving, leveraging their Scratch programming skills, LEGO building expertise,
    and stage confidence to lead school technology shows and captivate audiences with dramatic flair.
  sports: Evena Fields, a midfield player on the Aurora Tigers youth soccer squad, commits to thrice-weekly practices, supplements team drills with weekend viewings of the Colorado Rapids (MLS) and Colorado
    Avalanche (NHL) for tactical inspiration, and they mix structured training with spontaneous pick-up games at the local park to stay fit and socially engaged.
  arts: Evena Fields, a committed member of the school theater troupe and church choir, draws creative fuel from Lin-Manuel Miranda’s musical storytelling, the classic piano works of Mozart, and the pop
    energy of Ariana Grande, while idolizing actress Meryl Streep and the animated worlds of Studio Ghibli, and they channel these influences into weekly performances and personal short-story writing.
  travel: Evena Fields, an enthusiastic junior traveler, favors family road trips that combine camping at Yellowstone National Park with museum stops in Denver, dreams of a future Disney World vacation
    in Orlando and a cultural exchange program in Osaka, Japan, and they save for these adventures in a travel jar funded by birthday money and occasional freelance LEGO-building jobs for neighbors.
  culinary: Evena Fields, a budding home chef, loves perfecting their mother’s spaghetti bolognese with fresh basil and oregano, mastering the melt of mozzarella on homemade pepperoni pizza, and crafting
    gooey chocolate-chip brownies with dark cocoa and sea salt, yet they often leave a trail of flour on the kitchen floor and forget to rinse the mixing bowls between recipes.
  core: Evena Fields, the chatty 11-year-old who juggles robotics, theater, soccer, and a secret LEGO stash, navigates life with a blend of curiosity, organized spontaneity, and a habit of turning every
    idle moment into a new project—even if that sometimes leaves a messy kitchen and an unfinished story.
background:
  cultural: Evena comes from an African‑American family rooted in Aurora, Illinois. Her parents are active members of the local Black community, participating in church, cultural festivals such as Juneteenth
    celebrations, and neighborhood service projects. She grew up hearing stories about the Great Migration and the important role of Chicago’s Black neighborhoods, which inform her sense of identity and
    pride. Family traditions blend soulful music, Southern‑style cooking, and Midwestern influences, and she often visits relatives in the Chicago South Side, reinforcing a strong connection to her cultural
    heritage while navigating a diverse suburban environment.
