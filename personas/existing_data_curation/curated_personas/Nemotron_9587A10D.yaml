  hobbies: '[''School theater'', ''Singing in choir'', ''Reading science‑fiction and mystery novels'', ''Creative writing'', ''LEGO building'', ''Scratch programming'', ''Robotics kit assembly'', ''Soccer'',
    ''Piano playing'', ''Cooking family recipes'', ''Volunteering at community center'']'
  career_goals: Evena dreams of combining her love of science with her talent for speaking and teaching. In the short term she wants to lead her school’s robotics team to a regional competition and start
    a peer‑mentoring club that helps younger classmates with reading and basic coding. Over the next decade she envisions becoming a pediatric doctor or a STEM educator who can inspire other children—especially
    those from under‑represented backgrounds—to pursue scientific careers. She also hopes to partner with Aurora community organizations to run after‑school technology workshops and create inclusive learning
    spaces.
