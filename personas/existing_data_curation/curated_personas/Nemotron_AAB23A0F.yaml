personas:
  professional: Mary Jardeleza is an aspiring teen journalist and performer who blends curiosity with practicality, using debate‑honed arguments to craft compelling blog posts about teen life while channeling
    drama club confidence into engaging public‑speaking performances, and balancing a meticulous posting schedule with the flexibility to capture spontaneous school events on camera.
  sports: Mary Jardeleza is an enthusiastic soccer player who competes in the Springfield Youth Soccer League on weekends, proudly dons the colors of the LA Galaxy, follows the U.S. Women's National Team
    closely, and often organizes pick‑up matches with friends after school, balancing competitive drive with a love for casual, social play.
  arts: Mary Jardeleza is a budding performer and photographer who finds inspiration in the musical storytelling of Lin‑Manuel Miranda, the emotive pop of Billie Eilish, and the cinematic flair of Greta
    Gerwig, while their photography style echoes Ansel Adams’ contrast‑rich compositions; they attend local theater productions, capture candid moments at city festivals, and enjoy reading contemporary
    YA novels by authors like John Green and Sarah J. Maas.
  travel: Mary Jardeleza approaches travel with a mix of meticulous planning and spontaneous excitement, using their blog to document weekend getaways to the nearby coastal town of Seaside and annual family
    trips to Yellowstone National Park, while dreaming of a future solo visit to New York City’s Broadway district and a cultural immersion in Kyoto, balancing budget constraints with a thirst for new experiences.
  culinary: Mary Jardeleza enjoys a diverse palate, alternating between comfort foods like pepperoni pizza and homemade mac and cheese and more adventurous dishes such as spicy ramen with gochujang and
    vegan sushi rolls featuring avocado and cucumber; they can whip up quick snack bowls of quinoa, cherry tomatoes, and feta cheese, and often experiment with baking chocolate chip cookies sprinkled with
    flaky sea salt.
  core: Mary Jardeleza is a talkative, curiosity‑driven teen who juggles drama rehearsals, debate tournaments, a lively blog, and soccer matches, often sacrificing sleep for the next spotlight while keeping
    an optimistic, organized hustle.
background:
  cultural: Mary is a White Texan raised in suburban San Antonio, Bexar County. Her family celebrates traditional American holidays like Thanksgiving and Independence Day, while also participating in the
    city’s multicultural celebrations such as Fiesta San Antonio. She grew up in a community that values Southern hospitality, strong family ties, and a blend of urban and suburban lifestyles. Her upbringing
    emphasizes education, community involvement, and respect for the diverse cultural fabric of the region, exposing her to both Anglo‑American traditions and the vibrant multicultural environment of Central
    Texas.
