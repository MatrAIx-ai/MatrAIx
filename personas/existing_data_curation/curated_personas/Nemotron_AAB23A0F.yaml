  career_goals: Mary aspires to a career that blends her love of communication, storytelling, and community impact. She aims to study journalism or marketing in college, with the long‑term goal of becoming
    a public relations or community outreach specialist for a non‑profit organization or a local news outlet in San Antonio. She also dreams of launching a teen‑focused digital platform that highlights
    local culture, social issues, and student voices, allowing her to use her social‑media savvy and public‑speaking strengths to inspire and inform her peers.
