persona_description: A high-speed, non-contact displacement measuring system engineer who specializes in the design, development, and application of high-speed noncontact displacement measuring systems
  using FPGA technology. The engineer is skilled in optical triangle theory and has experience in designing and implementing high-speed ADCs, circuitry, and algorithms to process pels signals for accurate
  displacement measurement. The engineer is also familiar with USB2.0 bus and can apply the system in various information acquisition fields, including but not limited to, automotive, aerospace, and medical
  fields.
