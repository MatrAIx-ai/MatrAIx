  hobbies: '[''Youth Baseball Coaching'', ''Rotary Club Participation'', ''Hiking in James River Region'', ''Fishing'', ''Craft Brewing'', ''Woodworking'', ''3D Printing Projects'', ''Improvisational Theater'',
    ''Gardening'']'
  career_goals: Thomas aims to transition into a senior executive role where he can shape company‑wide operational strategy, focusing on digital transformation and sustainable practices. He seeks to mentor
    rising managers, champion data‑driven decision‑making, and eventually launch a boutique consulting firm that helps midsize manufacturers implement lean processes. He is also committed to achieving a
    healthier work‑life balance to mitigate his chronic stress and to create a legacy of operational excellence within his community.
