  hobbies: '["Abstract painting", "Sculpture with reclaimed wood", "Cooking Mexican cuisine", "Acoustic guitar jam sessions", "Hiking", "Fishing", "Organizing community events", "Reading science‑fiction
    & philosophy", "Playing board games", "Participating in local book clubs"]'
  career_goals: Francisco aims to transform his artistic passion into a community‑driven art studio or cultural center in Pend Oreille County that offers free workshops for children and seniors. He seeks
    to build a freelance portfolio providing custom murals, commissions, and digital design services for local businesses, and to secure part‑time grant funding or a teaching position at a nearby community
    college in visual arts. Ultimately, he envisions becoming a recognized regional artist and cultural bridge between his Mexican heritage and the Pacific Northwest community, fostering inclusive creativity
    and connection.
