personas:
  professional: Francisco Luna is a self‑taught visual artist and community facilitator who channels imaginative mixed‑media paintings and reclaimed‑wood sculptures into free workshops; they rely on a relaxed,
    disorganized planning style that keeps sessions fluid and socially engaging.
  sports: Francisco Luna is a regular hiker and avid fisherman who belongs to the Pend Oreille Hiking Club and cheers on the Seattle Seahawks; they prefer the spontaneity of a sunrise trek over a scheduled
    gym routine.
  arts: Francisco Luna paints abstract forest landscapes inspired by Mark Rothko’s color fields, sculpts reclaimed‑wood installations echoing Anish Kapoor’s forms, strums acoustic guitar at local jam sessions
    alongside folk singer Sarah Jones, and acts in community theater productions; they find each medium a new way to explore ideas discussed in their philosophy book club.
  travel: Francisco Luna favors spontaneous road trips to rugged locales like the San Juan Islands, the Columbia River Gorge, and the Scottish Highlands, often improvising itineraries over a map of National
    Parks; they manage a modest travel fund that limits trips to long weekends but still dream of a trek through Patagonia.
  culinary: Francisco Luna cooks traditional dishes such as tacos al pastor, mole, and tamales for friends, mastering the slow‑cooked pork, chilies, and masa dough while their casual plating reflects an
    abstract artistic sensibility; they love sharing recipes at community potlucks, often staying up late perfecting a new sauce.
  core: Francisco Luna is a free‑spirit artist‑guide who blends nature‑inspired creations with communal gatherings, often forgetting deadlines yet never missing a chance to share music, food, or a story.
background:
  cultural: Francisco is a first‑generation Mexican‑American whose parents emigrated from Jalisco, Mexico. He grew up celebrating Día de los Muertos, quinceañeras, and monthly family gatherings centered
    around home‑cooked meals and traditional music. Although now living in rural Washington, he maintains strong ties to his Mexican roots through language, cuisine, and cultural celebrations, regularly
    hosting workshops on Mexican art and cooking for neighbors. His upbringing emphasized collectivism, respect for elders, and hospitality, values that shape his cooperative nature and his desire to foster
    inclusivity within his community.
