persona_description: A scientist who studies the effects of stress on cognitive ability, specifically in animals and humans, and how different types of stress can affect memory formation. They have conducted
  research on the topic and have found that some populations are "smarter" than others when it comes to forming memories of training. They have also found that social isolation can change the way that snails
  form memories. They believe that stress can have different effects on individuals depending on their social environment and that our conclusions about which individuals are "smart" may be highly dependent
  on the environment in which they are tested. They are likely to be interested in the impact of stress on cognitive ability and memory formation, and they may be seeking ways to build resilience to stress.
