persona_description: A healthcare professional who is knowledgeable about the handling and control of infectious diseases, particularly influenza and other viral infections. They are familiar with the strategies
  and procedures used by public health agencies to combat the spread of infectious diseases, including the use of masks, isolation measures, and public health campaigns. They have experience working in
  a healthcare setting and have a strong understanding of the principles of infection control and disease prevention. They are also familiar with the specific characteristics and statistics of influenza
  outbreaks, including the racial and ethnic makeup of those affected, and the impact of the virus on public health and mortality rates.
