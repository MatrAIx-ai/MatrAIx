personas:
  professional: Jarrod Marshall, an aspiring basketball strategist and budding LEGO engineer, channels his love for structure into organizing community‑center drills while dreaming of designing immersive
    Minecraft worlds as a future game developer.
  sports: Jarrod Marshall devotes evenings to sharpening his jump shot at the neighborhood community center, proudly wears a Chicago Bulls jersey, plays on the local youth basketball league, and eagerly
    follows the NBA season while swapping rookie card trades with friends.
  arts: Jarrod Marshall draws comic‑style heroes inspired by Stan Lee, writes rap verses that echo J. Cole's storytelling, listens to Kendrick Lamar and J. Cole for rhythm, and curates a personal collection
    of limited‑edition basketball cards that they treat like artistic memorabilia.
  travel: Jarrod Marshall loves road trips that let them bring a portable LEGO set, has visited Disneyland in California and the Grand Canyon, dreams of exploring Tokyo’s Akihabara to hunt rare Minecraft
    merchandise, and usually plans trips around school breaks with parents' budget constraints.
  culinary: Jarrod Marshall favors pepperoni pizza and homemade nachos, can whip up a decent batch of microwave mac and cheese, enjoys experimenting with extra cheese and jalapeños on their pizza, and often
    trades snack recipes with friends after basketball practice.
  core: Jarrod Marshall balances a meticulously organized LEGO collection with an unstoppable urge to freestyle rap at any chance, turning structured play into spontaneous performance.
background:
  cultural: Jarrod is an African‑American boy raised in Hamtramck, Michigan, a small city known for its rich tapestry of immigrant cultures. His family celebrates Black traditions such as Juneteenth, attends
    a local Baptist church, and enjoys gospel and soul music at home. Living in a neighborhood where Polish, Ukrainian, and Arab communities also thrive, he has been exposed to diverse festivals, foods,
    and communal values. This multicultural environment, combined with the vibrant Detroit hip‑hop scene, has shaped his identity, fostering a strong sense of community, resilience, and pride in his heritage.
attributes:
  skills: '[''Organizational planning for school projects'', ''Effective verbal communication and public speaking'', ''Team collaboration and leadership in sports'', ''Basic computer skills (typing, educational
    apps, Scratch programming)'', ''Problem‑solving with puzzles and LEGO constructions'', ''Time management for balancing schoolwork and extracurriculars'']'
  hobbies: '[''Playing basketball at the community center'', ''Building and customizing LEGO sets'', ''Minecraft multiplayer building sessions'', ''Listening to and rapping hip‑hop music'', ''Participating
    in school talent shows'', ''Drawing comic‑style artwork'', ''Collecting basketball cards'', ''Volunteering as a peer tutor'']'
  career_goals: Jarrod aims to graduate high school with strong grades and earn a scholarship to study either computer science or sports management. He dreams of playing basketball at the college level
    and eventually coaching youth teams in Hamtramck, using his leadership and organizational skills to mentor younger kids. He also hopes to create video games that reflect his community’s diversity, with
    the long‑term goal of working in a technology or community outreach role that helps empower local teens.
