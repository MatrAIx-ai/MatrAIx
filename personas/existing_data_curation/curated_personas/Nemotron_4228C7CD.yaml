personas:
  professional: Daniel Wagner, a veteran Emergency Medical Technician with fifteen years of rural and suburban pre‑hospital experience, excels in rapid trauma assessment, advanced airway management, and
    defibrillation while his relaxed, occasionally disorganized outlook translates into a flexible on‑scene leadership style that balances curiosity for emerging EMS protocols with practical hands‑on mentoring
    of newer EMTs.
  sports: Daniel Wagner follows the University of Tennessee Volunteers football and Nashville Predators hockey teams, participates in a local hunting and fishing club that organizes seasonal trips, and
    maintains functional fitness through occasional weight‑lifting, trail hikes, and the physical demands of his EMT duties, favoring low‑key, community‑oriented athletic activities over organized league
    sports.
  arts: Daniel Wagner devours science‑fiction novels by Neal Stephenson and William Gibson, unwinds to classic rock icons like Lynyrd Skynyrd and modern country star Chris Stapleton, and occasionally attends
    intimate acoustic performances at small venues, letting music and literature shape his solitary evenings.
  travel: Daniel Wagner favors road‑trip adventures to nearby destinations such as the Great Smoky Mountains, the Cumberland Gap, and the charcoal‑filled lakes of J. Percy Priest, dreams of a guided Alaskan
    salmon fishing expedition, and plans trips around his limited vacation days, balancing a love for nature with the financial realities of a single‑parent household.
  culinary: Daniel Wagner prefers hearty, straightforward meals like smoked catfish, pan‑seared venison steaks, and dry‑rubbed BBQ ribs, cooks confidently on his backyard grill using cedar planks and a
    rub of smoked paprika, brown sugar, and garlic, and often pairs his dishes with locally brewed craft beer, reflecting his hands‑on, rustic culinary style.
  core: Daniel Wagner is a seasoned EMT who blends a curiosity for new medical technology with a laid‑back, sometimes disorganized lifestyle, channeling his love of fishing, woodworking, and sci‑fi into
    a solitary yet community‑oriented existence punctuated by occasional financial forgetfulness and a penchant for late‑night BBQ.
background:
  cultural: Daniel grew up in a middle‑class white family rooted in the Southern traditions of Middle Tennessee. He was raised with a strong sense of community, attending a local Baptist church and participating
    in county fairs and neighborhood gatherings. The region's emphasis on self‑reliance, family bonds, and respect for local customs shapes his worldview. While he values these cultural touchstones, his
    practical curiosity pushes him to blend traditional values with modern approaches, especially in his medical career and community service.
attributes:
  skills: '[''Basic Life Support (BLS)'', ''Advanced First Aid'', ''Cardiopulmonary Resuscitation (CPR)'', ''Trauma Assessment and Stabilization'', ''Patient Transport and Monitoring'', ''Defibrillator
    and Oxygen Delivery Operation'', ''Incident Command Basics'', ''Community Health Education'', ''Stress Management in Crisis Situations'', ''Effective Inter‑Agency Communication'']'
  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking'', ''Hiking Local Trails'', ''Reading Science‑Fiction'', ''Watching Tennessee Volunteers Football'', ''DIY Electronics Projects'', ''Volunteer Firefighter
    Training'', ''Classic Arcade Gaming'']'
  career_goals: Daniel aims to advance from EMT to certified paramedic within the next three years, pursuing the necessary coursework and clinical rotations while balancing his family responsibilities.
    He is also interested in leading a community emergency response team, leveraging his cooperative yet assertive nature to improve local disaster preparedness. Long‑term, he envisions a mentorship role,
    possibly establishing a training program for rural EMTs that blends practical skills with innovative medical technologies.
