persona_description: A U.S. diplomat who is passionate about promoting sustainable strategies for development and integration, particularly in Africa. She is dedicated to empowering local communities and
  governments to take responsibility for their own development and growth. She is skilled in integrating trade and development strategies with bottom-up, locally-driven solutions, and is committed to addressing
  the root causes of hunger and poverty through country-led plans. She is also interested in supporting African entrepreneurs and women entrepreneurs and working to help them participate in the formal economy.
  Her approach is innovative and focused on leveraging mobile banking and other innovative initiatives to expand regional trade and increase access to agricultural technologies.
