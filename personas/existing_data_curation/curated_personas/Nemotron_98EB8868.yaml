personas:
  professional: Zoey Rudow is a 48‑year‑old elementary and middle‑school STEM educator who designs project‑based curricula, mentors novice teachers, and leverages interactive whiteboards and Scratch to
    spark curiosity, all while balancing a relaxed, occasionally disorganized approach that favors flexibility over rigid planning.
  sports: Zoey Rudow spends weekends hiking the Lake Bemidji trails, joins the Northwoods Trailblazers club for seasonal cross‑country skiing, and cheers for the Minnesota Vikings and Timberwolves, while
    occasionally coaching a youth track team at the local school.
  arts: Zoey Rudow captures the quiet majesty of northern woods through photography inspired by Ansel Adams, knits scarves while listening to folk singer John K. Samson, and unwinds with cozy mystery novels
    by Agatha Christie, weaving these artistic threads into their family gatherings.
  travel: Zoey Rudow enjoys low‑key road trips to the Boundary Waters, has a bucket‑list entry for birdwatching in Iceland’s wetlands, and often returns to Minnesota’s lake cabins for weekend retreats,
    favoring nature‑immersive travel over crowded tourist hotspots.
  culinary: Zoey Rudow loves cooking farm‑to‑table meals with produce from their garden, favoring dishes like wild‑rice and mushroom casserole, fresh beet salad with goat cheese, and homemade raspberry
    jam, though they sometimes over‑season while experimenting with heirloom herbs.
  core: Zoey Rudow blends a nurturing educator’s curiosity with a laid‑back, sometimes chaotic lifestyle, effortlessly weaving nature, craft, and community into every facet of life while habitually misplacing
    their favorite knitting needles.
background:
  cultural: Zoey grew up in a middle‑class, predominantly white community in the Upper Midwest. Her family’s roots trace back to German and Scandinavian immigrants, fostering an appreciation for self‑reliance,
    modesty, and community involvement. The regional ethos of “Minnesota nice”—politeness, cooperation, and quiet confidence—mirrors her reserved yet cooperative demeanor. She identifies with the local
    values of outdoor recreation, seasonal celebrations such as winter festivals, and a pragmatic approach to education. Her upbringing emphasized the importance of public schooling and civic participation,
    shaping her lifelong dedication to teaching.
attributes:
  skills: '[''STEM curriculum design'', ''Project‑based learning facilitation'', ''Technology integration (interactive whiteboards, educational apps, Scratch)'', ''Differentiated instruction'', ''Data‑driven
