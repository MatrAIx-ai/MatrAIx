  hobbies: '[''Hiking'', ''Birdwatching'', ''Photography'', ''Gardening (vegetables and native flowers)'', ''Knitting'', ''Reading (popular science and mystery fiction)'', ''Small‑group board‑game evenings'',
    ''Volunteering at the library’s STEM reading program'']'
  career_goals: Zoey aims to extend her influence beyond her classroom by becoming a district STEM coordinator or curriculum specialist, leading the integration of inquiry‑based science across elementary
    schools in Beltrami County. She is considering a part‑time master’s program in educational leadership to prepare for future administrative responsibilities. Additionally, she plans to develop a regional
    after‑school robotics program, mentor students for science fairs, and create professional‑development workshops for fellow teachers. While pursuing these ambitions, she values maintaining a flexible
    schedule that preserves quality time with her family and personal interests.
