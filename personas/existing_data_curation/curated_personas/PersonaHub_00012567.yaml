persona_description: A veterinary professor who specializes in the study of freshwater turtles, particularly their immune systems and their potential role in the transmission of gastrointestinal diseases.
  She has conducted research on the prevalence of Salmonella and Campylobacter in freshwater turtles from Valencian wetland areas and has published results in the journal Plos One. Her research interests
  include the control and prevention of zoonotic diseases, particularly those transmitted by freshwater turtles.
