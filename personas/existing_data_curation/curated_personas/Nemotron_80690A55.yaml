personas:
  professional: Breelle, a 16‑year‑old aspiring IT support specialist, translates the rapid pattern‑recognition and tactical decision‑making honed in League of Legends into efficient troubleshooting of
    hardware and software issues, while their preference for structured checklists keeps their natural disorganization in check as they pursue a vocational program in network technology.
  sports: Breelle, an avid cyclist who rides the Onondaga Lake trail with the Syracuse Bicycling Club during spring and summer, also follows the Syracuse Orange basketball team, the New York Knicks, and
    the Buffalo Bills, blending low‑impact cardio with seasonal fan enthusiasm while keeping a modest home gym setup for core strength.
  arts: 'Breelle, an enthusiastic creator of fan art, routinely sketches scenes from The Expanse and Star Trek: Discovery, streams their own game strategy videos set to a soundtrack of Daft Punk and Tame
    Impala, and attends occasional local comic‑book conventions where they admire the work of artists like Alex Ross.'
  travel: Breelle, a budget‑conscious explorer, has taken weekend trips to New York City and Washington, D.C., dreams of a solo pilgrimage to Tokyo to experience anime culture firsthand, and prefers meticulously
    planned itineraries that still leave room for spontaneous gaming café visits.
  culinary: Breelle, a modest home‑cook, enjoys whipping up pepperoni pizza with extra mozzarella, slurping spicy miso ramen topped with soft‑boiled eggs, and crafting garlic‑butter shrimp while relying
    on staple ingredients like Parmesan, jalapeños, and soy sauce, yet often orders fast‑food delivery after marathon gaming sessions.
  core: Breelle merges a competitive gamer’s analytical mind with hands‑on tech tinkering, disciplined financial habits, and a practical work ethic, all while navigating teenage disorganization and a love
    for solo creativity.
background:
  cultural: Breelle comes from a white, middle‑class family with deep roots in upstate New York, tracing ancestry to Irish and German immigrants who settled the region in the early 1900s. Raised in Liverpool,
    a small suburb of Syracuse, she grew up celebrating typical American holidays – Thanksgiving, Fourth of July, and Christmas – often with a blend of Catholic and Protestant traditions observed by her
    extended family. The community emphasizes self‑reliance, modesty, and a strong work ethic, values that have shaped her practical outlook and desire for independent, stable employment.
attributes:
  skills: '[''basic computer troubleshooting'', ''strategic gaming and quick decision-making'', ''basic carpentry'', ''bike maintenance'', ''analytical problem solving'', ''step-by-step process adherence'']'
  hobbies: '[''competitive multiplayer gaming'', ''PC building and customization'', ''fan-art sketching'', ''logic puzzles'', ''cycling'', ''small gaming meet-ups'']'
  career_goals: She aims to earn her GED within the next year and enroll in a vocational program for computer network technology, with the long-term ambition of becoming an IT support specialist or network
    administrator. At the same time, she wishes to cultivate a side channel on YouTube where she reviews video games and shares gaming strategies, leveraging her competitive edge to build a modest online
    following. She also envisions owning a small side business repairing bicycles and basic electronics for friends and neighbors, combining her hands-on skills with a desire for independent, flexible work.
