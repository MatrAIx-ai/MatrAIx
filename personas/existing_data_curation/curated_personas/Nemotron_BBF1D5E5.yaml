  career_goals: Although retired, Jessica aims to remain active and valuable to her community. She plans to document her family's history in a memoir, mentor new volunteers at the senior center, and continue
    hosting weekly intergenerational gatherings. Maintaining her health and independence, she also seeks to support her grandchildren's education through tutoring and sharing stories, and to contribute
    quilts and garden produce to local charities.
