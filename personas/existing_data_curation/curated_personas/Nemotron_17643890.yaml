  hobbies: '["Visiting art galleries", "Improvisational theater", "Traditional Mexican cooking", "Folkloric dancing", "Gardening", "Traveling to Mexico", "Storytelling sessions", "Volunteer craft workshops",
    "Karaoke hosting", "Collecting Mexican folk art", "Reading about contemporary art movements", "Attending community festivals"]'
  career_goals: Maileen aims to create a community arts workshop for seniors in San Angelo, providing a space for creative expression and cultural exchange. She also hopes to mentor younger Mexican‑American
    artists, document her family's migration story in a memoir, and host a bilingual podcast that explores art, culture, and new ideas. Ultimately, she aspires to be recognized as a cultural ambassador
    who bridges Mexican heritage with the local Texan community.
