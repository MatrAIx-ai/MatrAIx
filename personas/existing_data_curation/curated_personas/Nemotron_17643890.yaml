personas:
  professional: Maileen Rojas, a community arts workshop founder and senior center program coordinator, leverages bilingual fluency, spontaneous event planning, and a competitive edge to negotiate resources,
    while their sociable, talkative nature makes them the charismatic hub of local cultural exchange.
  sports: Maileen Rojas, an enthusiastic fan of the Dallas Cowboys (NFL) and the Texas Rangers (MLB), participates in the San Angelo Senior Walking Club, enjoys weekly folkloric dance sessions for cardio,
    and plays friendly pickleball matches at the local community center, viewing sports both as social gatherings and light exercise.
  arts: Maileen Rojas, an avid supporter of visual and performing arts, regularly visits the San Angelo Museum of Art to study works by Frida Kahlo and Diego Rivera, performs improv with the Living Stage
    Improv troupe, curates pop‑up craft fairs featuring local artist Maria Ortega, and leads karaoke nights that blend storytelling with song.
  travel: Maileen Rojas, a spontaneous traveler who annually revisits Oaxaca and Mexico City to reconnect with family roots, enjoys weekend road trips to Santa Fe's art festivals and the Texas Hill Country’s
    music fairs, and prefers last‑minute bookings that allow flexibility for unexpected pop‑up events.
  culinary: Maileen Rojas, a seasoned home chef who expertly prepares mole poblano, pozole, and chiles en nogada using heirloom chilies, fresh corn, and locally sourced pecans, loves experimenting with
    fusion twists for her senior center potlucks, yet often leaves the kitchen a mess, forgetting to clean up after enthusiastic cooking sessions.
  core: Maileen Rojas channels a competitive, spontaneous spark into every community gathering, turning art, food, and storytelling into lively, inclusive celebrations.
background:
  cultural: Maileen was born to Mexican immigrants from Jalisco who settled in West Texas during the 1960s. She grew up in a bilingual household, celebrating Día de los Muertos, quinceañeras, and local
    Texan rodeo events. Her family preserved strong Catholic traditions and a love for Mexican folk music, cuisine, and artisanal crafts, which she blends with the ranching and frontier culture of San Angelo.
    Identifying as Mexican‑American, she values family, community, and the vibrant artistic legacy of her heritage, and she actively shares these traditions through community events and cultural programming.
attributes:
  skills: '["Interpersonal communication", "Community networking", "Bilingual Spanish-English translation", "Event improvisation", "Cultural programming", "Traditional Mexican cooking", "Storytelling",
