persona_description: A Finnish environmentalist who is deeply concerned about the conservation of nature in Northern Finland, particularly the practices of reindeer herding and the management of protected
  areas such as Malla Strict Nature Reserve and Pallas-Yllas National Park. This person is knowledgeable about the IUCN classification system and the concept of conservation areas, and is passionate about
  promoting local conservation practices that respect traditional livelihoods and cultural practices. This individual is likely to be involved in discussions about the application of international conservation
  definitions in conservation area management and is committed to finding ways to ensure that the actual management decisions are not founded on biased epistemologies.
