personas:
  professional: Ian Mcintyre, a meticulous 19‑year‑old aspiring electrician, leverages their Excel expertise, mechanical aptitude, and fluency in Spanish to coordinate volunteer projects and streamline
    maintenance schedules at the community center, ensuring every task follows a clear, predictable plan.
  sports: Ian Mcintyre, a 19‑year‑old hiking enthusiast, spends weekends trekking the mesas and tall‑grass prairies alone while logging routes in their journal, occasionally joining the Rio Arriba Hiking
    Club for group outings and cheering for New Mexico United in the USL Championship and the Albuquerque Isotopes during their spring and summer seasons.
  arts: Ian Mcintyre, a solitary 19‑year‑old literature aficionado, devotes evenings to annotated readings of Agatha Christie’s “Murder on the Orient Express” and Jane Austen’s “Pride and Prejudice,” while
    winding down with the piano sonatas of Beethoven and the folk melodies of Sufjan Stevens, and they occasionally visit the Española Community Theater to watch productions of classic plays.
  travel: Ian Mcintyre, a methodical 19‑year‑old traveler, plans their trips down to mileage and campsite details, favoring solo hikes in national parks like Grand Canyon and Zion while dreaming of a future
    backpacking adventure through the Patagonian Andes, and they keep a detailed spreadsheet of travel costs to stay within a modest student budget that limits spontaneous vacations.
  culinary: Ian Mcintyre, a 19‑year‑old who values routine in the kitchen, often cooks precise meals such as chicken enchiladas with roasted poblano peppers and freshly ground cumin, meticulously following
    measured recipes in their notebook, but occasionally treats themselves to a slice of New York‑style pizza topped with pepperoni and extra cheese as a reward for completing a demanding project.
  core: Ian Mcintyre, a 19‑year‑old with a meticulous mind, balances a love for solitary order—charting hikes, budgeting in Excel, and assembling model kits—with bouts of anxiety that they combat with daily
    gratitude journaling and occasional late‑night video‑game marathons.
background:
  cultural: Ian grew up in Española, a small town in northern New Mexico where Anglo‑American and Hispanic cultures intertwine. His family, of white Anglo descent, has lived in the Rio Arriba Valley for
    generations, involved in ranching and small‑scale farming. The community’s strong Catholic roots and annual fiestas, combined with a predominantly bilingual environment, gave Ian a familiarity with
    Spanish language and local traditions such as the Fiesta de San Juan. He attended the local high school where he participated in the Future Farmers of America club and the community service program,
    reinforcing a sense of responsibility to his town. The mix of rural work ethic, close‑knit neighborly ties, and exposure to both English‑language and Spanish‑language media shapes his worldview and
    informs his personal values.
attributes:
  skills: '[''Organizational planning'', ''Data entry and spreadsheet management'', ''Basic computer repair'', ''Mechanical maintenance of farm equipment'', ''Conversational Spanish'', ''Project coordination
