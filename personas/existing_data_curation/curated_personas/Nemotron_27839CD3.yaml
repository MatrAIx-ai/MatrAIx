  hobbies: '[''Reading mystery novels'', ''Solo hiking and trail journaling'', ''Strategy video gaming (e.g., Civilization, chess puzzles)'', ''Model kit building (aircraft, cars)'', ''Mindfulness meditation'',
    ''Daily gratitude journaling'', ''Photography of New Mexico landscapes'']'
  career_goals: As a 19‑year‑old who values stability and clear progression, Ian intends to enroll in a community‑college apprenticeship program for electrical or HVAC technology. He aims to earn certifications
    within two years and secure a reliable position with the Rio Arriba County public works department, where he can apply his methodical skills in maintenance and infrastructure projects. Long‑term, he
    hopes to become a licensed electrician, eventually overseeing a small team and contributing to the safety of his hometown. He also wants to develop a personal coping toolkit for his anxiety, planning
    to study mental‑health first‑aid basics so he can support peers facing similar challenges.
