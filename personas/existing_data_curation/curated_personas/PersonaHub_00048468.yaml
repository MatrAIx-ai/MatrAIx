persona_description: A team of researchers from the Faculty of Science and Technology at the University Nova de Lisboa, Portugal, who are working on the "Ambassadors for Biodiversity" project aimed at increasing
  environmental awareness, promoting active participation of the local community, and training change agents through education and awareness campaigns. The team includes researchers from the Department
  of Environmental Engineering Sciences, as well as researchers from the Department of Environmental Sciences and Engineering. They are working on a project funded by a joint venture involving the municipalities
  of Torres Vedras and Lourinhã, and they aim to develop content and awareness actions for the conservation of nature for youth and school communities.
