personas:
  professional: Brigette Batten, a teen aspiring veterinary technician, blends hands‑on animal care with a knack for digital content creation; they apply practical problem‑solving skills and a competitive
    drive to produce engaging DIY pet‑care tutorials while balancing school responsibilities.
  sports: Brigette Batten enjoys weekend hikes along the Appalachian Trail and participates in a local hiking club, while cheering on the Tennessee Titans and the University of Tennessee Volunteers, and
    they balance their love of nature with occasional pickup basketball games that satisfy a competitive spirit.
  arts: Brigette Batten immerses themselves in indie pop artists like The Lumineers and classic country legends such as Dolly Parton, they read YA fantasy from Sarah J. Maas, sketch Appalachian scenery
    in a worn notebook, and practice acoustic guitar, allowing their creative curiosity to color both their online presence and personal downtime.
  travel: Brigette Batten prefers rugged weekend getaways to Shenandoah National Park and planned trips to Asheville’s artsy neighborhoods, dreaming of a future adventure to Edinburgh’s historic festivals,
    and they budget these travels through careful savings and limited parental support.
  culinary: Brigette Batten delights in baking cupcakes topped with fresh berries, vanilla‑bean frosting, and intricate buttercream rosettes, they often experiment with flavors like salted caramel while
    also cooking hearty meals such as chicken fried steak for their siblings, showcasing a blend of youthful creativity and practical home‑cooking skills.
  core: Brigette Batten is a pragmatic yet imaginative teen who balances a competitive edge in gaming and sports with an earnest love for animals, baking, and the Appalachian outdoors, and they navigate
    the quirks of teenage budgeting and occasional sleep deprivation.
background:
  cultural: Brigette grew up in Bristol, Virginia, a city that straddles the border with Tennessee and sits deep within the Appalachian region. Her family’s cultural roots are steeped in Southern and Appalachian
    traditions, including a strong emphasis on family gatherings, church involvement, and community solidarity. She was raised on home‑cooked meals featuring regional favorites like fried chicken, biscuits,
    and collard greens, and she often hears stories about the area's coal‑mining heritage and mountain folklore. While she identifies as white, she values the blend of cultural influences present in her
    town—ranging from Southern hospitality to the resilient, self‑reliant spirit characteristic of Appalachian communities. This background informs her practical outlook, love for outdoor activities, and
    a balanced respect for both new ideas and time‑honored practices.
attributes:
  skills: '["Basic computer literacy (Word, Excel, Google Docs)", "Social media content creation (TikTok editing)", "DIY crafts and simple woodworking", "Basic cooking and meal planning", "Strategic video
