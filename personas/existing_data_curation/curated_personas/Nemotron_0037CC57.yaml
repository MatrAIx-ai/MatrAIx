  hobbies: '["Hiking Appalachian trails", "Reading YA fantasy and sci‑fi", "Listening to indie pop and classic country", "Playing acoustic guitar", "Baking and cupcake decorating", "Competitive video gaming
    (shooters, battle‑royale)", "Sketching and drawing", "Volunteer community clean‑up events"]'
  career_goals: Brigette is determined to finish her high school education by obtaining a GED within the next year. Afterward, she aims to enroll in a community college program focused on veterinary technology,
    motivated by her love for animals and her practical, hands‑on learning style. She also harbors an ambition to grow a small online presence that showcases her cooking tutorials and DIY projects, hoping
    to eventually monetize her content as a side income. In the long term, she envisions balancing a career in animal care with freelance digital content creation, allowing her to merge her practical expertise
    with her creative curiosity.
