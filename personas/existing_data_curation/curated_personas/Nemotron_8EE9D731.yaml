personas:
  professional: Romil Moore is a 19‑year‑old aspiring tradesperson who is pursuing a GED while eyeing an apprenticeship in HVAC or electrical work, and they bring practical car‑maintenance skills, power‑tool
    proficiency, and strong organizational habits to any hands‑on project, making them a reliable crew member in structured work environments.
  sports: Romil Moore, a 19‑year‑old basketball enthusiast, regularly joins pick‑up games at Riverside Park, follows the Los Angeles Lakers avidly, supports the local high‑school team, fishes at Lake Monroe
    during the summer, and is a member of the community’s youth recreation club.
  arts: Romil Moore, a 19‑year‑old music lover, playlists blend hip‑hop tracks by Kendrick Lamar and J. Cole with gospel hymns by Kirk Franklin, they spend evenings playing NBA 2K and strategy titles like
    Civilization VI, and they attend church youth nights where they often sing along to contemporary worship songs, shaping their cultural appreciation and downtime.
  travel: Romil Moore, a 19‑year‑old who balances school and a part‑time job, prefers short road trips to nearby lakes for fishing—like Lake Monroe and the Arkansas River—while dreaming of a spring break
    in New Orleans for its music scene and a future vacation to the Caribbean to combine snorkeling with catch‑and‑release fishing, often planning trips around limited savings and family responsibilities.
  culinary: Romil Moore, a 19‑year‑old home cook, enjoys frying chicken with a seasoned buttermilk batter, simmering collard greens with smoked turkey necks, and perfecting cornbread with honey butter,
    they often experiment with hot sauce and garlic powder while still occasionally over‑salting the greens when multitasking after basketball practice.
  core: Romil Moore is a disciplined 19‑year‑old trades aspirant who balances structured work goals with a love for basketball, gospel‑hip‑hop beats, and Southern comfort food, yet sometimes over‑spends
    on gaming gear and forgets to floss.
background:
  cultural: Romil grew up in Appling, a small town in McDuffie County, Georgia, within a close‑knit African‑American community. His family’s roots trace back to the rural South, where church, family gatherings,
    and community events were central to daily life. He was raised with Southern food traditions, gospel music, and a strong respect for elders. The local culture’s emphasis on self‑reliance, communal support,
    and storytelling shaped his values and day‑to‑day experiences. At the same time, he is influenced by broader contemporary Black youth culture, including hip‑hop, social media, and a desire for upward
    mobility.
attributes:
  skills: '[''Basic automotive maintenance'', ''Lawn care and landscaping'', ''Home repair (basic carpentry, plumbing)'', ''Use of power tools'', ''Digital literacy (social media, basic troubleshooting)'',
