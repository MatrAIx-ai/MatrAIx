  hobbies: '[''Basketball (small‑group pick‑up games)'', ''Hip‑hop and gospel music'', ''Video gaming (strategy & sports games)'', ''Fishing'', ''Cooking Southern cuisine'', ''Church youth activities'',
    ''Reading self‑improvement books'', ''Car tinkering'']'
  career_goals: Romil aims to earn his GED within the next year and then pursue a vocational apprenticeship in HVAC or electrical work, with a long‑term goal of becoming a certified tradesperson. He is
    also considering joining the U.S. Army to gain discipline, benefits, and a clear career pathway. Ultimately, he aspires to secure stable, well‑paid employment, support his family, and eventually start
    his own small home‑service business.
