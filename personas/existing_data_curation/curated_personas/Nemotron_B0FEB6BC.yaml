  career_goals: Robert aims to strengthen his clinical foundation with a Bachelor of Science in Nursing, positioning himself for leadership roles such as charge nurse or unit manager within the next three
    years. He is driven to implement evidence‑based protocols that improve patient outcomes and to develop a mentorship program that supports the professional growth of junior nurses. In the longer term,
    he envisions obtaining a certification in gerontological nursing or case management, and perhaps transitioning to a part‑time educator role at a community college, all while preserving a healthy work‑life
    balance for his family.
