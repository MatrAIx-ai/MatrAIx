  hobbies: '[''Pickup basketball'', ''Gospel and R&B music events'', ''Southern cooking'', ''Gardening'', ''Reading self‑development books'', ''Volunteering and youth mentorship'']'
  career_goals: Dennis aims to re‑enter the workforce by obtaining a certification in community outreach or social services, with a long‑term goal of becoming a community outreach coordinator for a local
    non‑profit in Suffolk. He hopes to leverage his organizing abilities and compassionate nature to create programs that support at‑risk youth and seniors, and eventually to lead a neighborhood resource
    center that offers workshops on digital literacy, financial planning, and health education.
