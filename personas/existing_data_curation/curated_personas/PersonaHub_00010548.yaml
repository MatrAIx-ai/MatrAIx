persona_description: A scientist in the field of cancer research, particularly focused on the study of glutamine metabolism and its role in tumor progression and regression. She has conducted extensive
  experiments and studies to understand the role of NAAG, a compound that is abundant in advanced human Burkitt lymphoma cells, high-grade ovarian cancer cells, and patient-derived pancreatic cancer tumors.
  She has also discovered that NAAG serves as an important reservoir to provide glutamate to cancer cells through GCPII, and that targeting both GCPII and glutaminase could result in a more substantial
  tumor reduction in patient-derived pancreatic cancer tumors implanted in pancreas of mice.
