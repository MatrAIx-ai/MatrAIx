persona_description: A professional urban forest ecosystem assessment consultant who specializes in conducting comprehensive tree inventory surveys, including those in parks and right-of-way areas. They
  have experience working with a variety of stakeholders, including local government officials, community members, and tree care professionals, to gather and analyze data on tree populations, species, condition,
  and location. The consultant is skilled in using various tools and techniques, including aerial photography, LiDAR, and spatial imagery, to assess urban forest ecosystems and provide recommendations for
  management and conservation. They are comfortable working with a range of resources and budgets, and have experience in managing multiple projects simultaneously. The consultant is also familiar with
  the latest developments in urban forest management and ecosystem assessment tools, and is committed to providing high-quality, data-driven insights to support decision-making processes.
