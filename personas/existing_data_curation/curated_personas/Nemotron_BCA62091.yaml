  hobbies: '[''Fishing'', ''Gardening'', ''Reading historical non-fiction'', ''Woodworking'', ''Church volunteer work'', ''Listening to classic soul music'', ''Hiking on local trails'', ''Playing checkers
    in a small group'']'
  career_goals: Alexsus aims to advance within the postal service by earning the Certified Mail Carrier Supervisor credential and moving into a route manager or logistics coordinator role at a regional
    distribution center. He seeks to mentor newer carriers, improve efficiency on his routes, and contribute to policy discussions through his postal union. While focusing on professional growth, he plans
    to secure a stable retirement fund and eventually increase his involvement in community outreach programs, especially those supporting local youth and senior citizens.
