  hobbies: '[''Adult soccer league'', ''Cooking Mexican cuisine'', ''Fishing on the Rio Grande'', ''Volunteer work at local church'', ''Model airplane building'', ''Reading business development books'',
    ''Salsa dancing'', ''Attending community festivals'', ''Morning jogging'', ''Family game nights'']'
  career_goals: Euripides aims to advance to a regional sales manager role within the next three to five years, leveraging his current supervisory experience to oversee multiple teams across the border
    region. He plans to complete a bachelor’s degree in Business Administration and earn a Certified Professional Sales Leader (CPSL) certification to strengthen his credentials. Long‑term, he envisions
    developing a mentorship program for entry‑level sales staff and, eventually, launching his own small logistics or distribution business that serves the cross‑border market, providing a stable future
    for his family.
