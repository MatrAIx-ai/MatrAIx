persona_description: A woman who has experienced physical and/or sexual abuse by an intimate partner, and is actively seeking support, resources, and advocacy for herself and other survivors. She is aware
  of the prevalence and impact of domestic violence, and is committed to raising awareness and advocating for policy changes to address this issue. She is likely to be involved in organizations that support
  women's rights, such as domestic violence shelters, rape crisis centers, and advocacy groups. She may have personal experience with the legal system, having gone through a court case or seeking legal
  assistance for herself or someone else. She is open to learning and seeking out information on the latest research and trends in domestic violence prevention and intervention.
