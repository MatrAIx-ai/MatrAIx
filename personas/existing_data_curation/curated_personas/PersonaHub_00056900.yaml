persona_description: A researcher who specializes in the development and application of technology for the visually impaired, particularly in the field of brain-computer interface. His work has focused
  on the development of the BrainPort V100 system, which allows the visually impaired to receive visual information through the tongue. He is excited to see the technology make it to market and is currently
  working on discovering its potential benefits for individuals with traumatic brain injury and other neurological disorders.
