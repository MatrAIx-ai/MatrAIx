  career_goals: She aims to advance to a senior engineering technologist position where she can lead cross‑functional projects focused on sustainable product design. Over the next five years, Naima plans
    to earn a Professional Engineering Technologist (PE) license, acquire advanced certifications in renewable energy systems, and transition into a project‑management role that balances technical oversight
    with flexible work arrangements. She is passionate about fostering an inclusive workplace, mentoring women and under‑represented groups in STEM, and eventually launching a community makerspace in Westchester
    that offers hands‑on training for local youth.
