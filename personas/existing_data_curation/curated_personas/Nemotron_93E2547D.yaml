personas:
  professional: Naima Sachdeva is a mechanical‑electrical engineering technologist who leverages CAD, CNC, and PLC expertise to drive sustainable product design, while they ensure meticulous documentation
    through a structured mindset and allow flexible, collaborative project leadership thanks to their relaxed approach to deadlines.
  sports: Naima Sachdeva hits the Hudson River Valley trails on weekends with a local hiking club, supports the New York Knicks and New York Giants, and participates in a co‑ed salsa dance league that doubles
    as low‑impact cardio, showing how they blend community spirit with a flexible fitness routine.
  arts: Naima Sachdeva channels a love for Bollywood and salsa through weekly dance classes, curates eclectic playlists featuring A.R. Rahman, Shakira, and local jazz saxophonist Maria Cobo, and regularly
    attends off‑Broadway performances of contemporary Indian‑themed productions, merging cultural rhythm with urban arts appreciation as they enjoy diverse creative expression.
  travel: Naima Sachdeva favors flexible, experience‑rich trips, having trekked the Swiss Alps, explored the markets of Marrakech, and taken spontaneous weekend road‑trips to the Catskills, while they typically
    plan only the flight and leave local itineraries open for serendipitous discovery.
  culinary: Naima Sachdeva is an adept home chef who masters dishes like butter chicken, chana masala, and mango‑lassi using cumin, turmeric, and fresh cilantro, and delights in hosting potluck evenings
    where friends sample fusion plates that blend Indian spices with Mediterranean ingredients, reflecting how they share culinary creativity as they gather community around food.
  core: Naima Sachdeva balances a meticulous engineering mind with a free‑spirited love for dance, potlucks, and spontaneous travel, all while they habitually misplace their keys and juggle a calendar that
    feels both organized and delightfully chaotic.
background:
  cultural: Naima was raised in a middle‑class Indian Punjabi family that emigrated to the United States in the early 1990s. Her household blended traditional values—emphasis on education, respect for elders,
    and collective responsibility—with the multicultural dynamism of suburban New York. She grew up speaking Punjabi at home while mastering English at school, celebrating Diwali, Vaisakhi, and Eid with
    neighbors of diverse faiths. These experiences cultivated a bicultural identity that informs her inclusive outlook, love for communal gatherings, and commitment to giving back to both the South Asian
    diaspora and the broader community.
