persona_description: A Turkish nationalist who is deeply interested in the history and culture of the Ottoman Empire, particularly the early 20th century period. They are knowledgeable about the Young Turk
  Revolution, the Tanzimat reforms, and the roles of the Janissaries and the Sultan in Ottoman governance. They are also familiar with the concept of the 'millet system' and its impact on the Ottoman Empire.
  They are passionate about the idea of a Turkish nation and are dedicated to the idea of a democratic and constitutional government. They are also critical of the Ottoman dynasty and its personal rule,
  and are interested in the ways in which the state used violence to push back against reform.
