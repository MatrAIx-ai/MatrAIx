  hobbies: '[''Fishing'',''Hunting'',''Woodworking'',''Reading historical non‑fiction'',''Target shooting'',''Hiking'',''Motorcycle maintenance'',''Acoustic guitar playing'',''Small‑group fire safety presentations'']'
  career_goals: Dax aims to advance into a senior leadership role within the fire service, targeting a battalion chief position within the next five years and ultimately the fire chief role for the Oxford‑Pontotoc
    region. He plans to complete a bachelor's degree in fire science or public administration to complement his associate's credentials. Dax is also pursuing advanced certification in fire investigation
    and hazardous‑materials response to broaden his expertise. Long‑term, he envisions establishing a fire‑safety consultancy that provides pre‑incident planning and community education to rural fire departments
    across Mississippi, leveraging his competitive drive and deep knowledge of local fire dynamics.
