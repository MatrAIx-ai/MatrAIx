  hobbies: '[''abstract painting'', ''attending indie film screenings'', ''visiting art galleries'', ''participating in South Asian cultural festivals'', ''cooking traditional South Asian cuisine'', ''playing
    cricket'', ''reading science‑fiction novels'', ''listening to tech podcasts'', ''DIY electronics projects'', ''volunteering at neighborhood events'']'
  career_goals: Asif aims to move into a supervisory or management role within the next three to five years, targeting a shift‑lead or production manager position at his current plant. To achieve this,
    he plans to earn a Lean Six Sigma Green Belt certification and complete an associate’s degree in industrial technology at a local community college. He envisions leading a continuous‑improvement team
    that blends his analytical mindset with his creative flair, developing innovative training modules that use visual storytelling. Long‑term, he hopes to leverage his experience to start a small venture
    that combines his passion for design and South Asian cuisine, such as a pop‑up art‑food space that showcases handcrafted décor and authentic dishes.
