  career_goals: Robert aims to transition from frontline support into a strategic IT leadership role within the next five years. He is pursuing ITIL v4 and PMP certifications to lead a regional help‑desk
    team, integrate AI‑driven ticket triage, and develop a self‑service portal that blends functional efficiency with artistic design. He also wishes to mentor junior technicians, launch a small consulting
    practice focused on digital transformation for local small businesses, and contribute to community tech‑education programs. His ambition reflects both his competitive drive and his desire to leave a
    lasting, innovative imprint on the Merrimac tech ecosystem.
