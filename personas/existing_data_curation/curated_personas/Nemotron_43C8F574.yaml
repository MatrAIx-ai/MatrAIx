personas:
  professional: Phuong Sekhri, a seasoned computer support specialist with deep expertise in Windows, macOS, and Linux troubleshooting, leverages PowerShell and Bash automation, ServiceNow and JIRA ticketing,
    and bilingual communication to resolve user issues efficiently while balancing curiosity about emerging tech with a practical, organized approach that keeps the support team humming smoothly.
  sports: Phuong Sekhri, an avid weekend hiker on Red Rock Canyon trails and a regular yoga practitioner, enjoys cheering for the Las Vegas Raiders and Golden Knights, participates in a local running club,
    and maintains a modest home gym for strength training.
  arts: Phuong Sekhri, a board‑game enthusiast who enjoys sci‑fi literature and the ambient soundscapes of Brian Eno, frequently attends screenings of Denis Villeneuve’s films and listens to the cinematic
    scores of Hans Zimmer while occasionally joining local improv sessions.
  travel: Phuong Sekhri, who loves structured travel planning, has explored the Grand Canyon and Sedona on road trips, visited Tokyo and Chiang Mai for culinary immersion, and dreams of trekking the Milford
    Track in New Zealand while balancing trips with a modest family budget.
  culinary: Phuong Sekhri, a confident home cook, prepares aromatic broth‑based pho and sizzling bánh xèo using star anise, ginger, fresh herbs, and rice flour, often experimenting with new toppings while
    preferring casual cooking over fine‑dining experiences.
  core: Phuong Sekhri blends meticulous IT troubleshooting with a love of simmering broth, balances a disciplined work ethic with spontaneous board‑game nights, and occasionally hoards unused PowerShell
    scripts like secret spice jars.
background:
  cultural: Phuong was born to Vietnamese parents and grew up in a household that emphasized respect for elders, community harmony, and the value of education. Although she has lived in the United States
    for most of her adult life, she maintains fluency in Vietnamese and regularly participates in cultural events organized by the Vietnamese community in Clark County. Her cultural heritage informs her
    collaborative, considerate nature—she often seeks consensus and prioritizes the needs of others, both at work and in personal interactions. The blend of Southeast Asian familial values with the dynamic,
    multicultural environment of Las Vegas shapes her balanced outlook, merging curiosity about new ideas with a pragmatic respect for proven practices.
attributes:
  skills: '[''Hardware troubleshooting'', ''Network configuration and troubleshooting'', ''Windows, macOS, and Linux support'', ''Remote desktop assistance'', ''Ticketing system management (ServiceNow,
    JIRA)'', ''Scripting with PowerShell and Bash'', ''Basic cybersecurity practices'', ''ITIL service management fundamentals'', ''Customer service and empathetic communication'', ''Documentation and knowledge‑base
    creation'', ''Bilingual support (English/Vietnamese)'', ''Team training and mentorship'']'
  hobbies: '[''Cooking Vietnamese cuisine (pho, bánh xèo, etc.)'', ''Hiking in Red Rock Canyon'', ''Yoga and mindfulness meditation'', ''DIY IoT and Raspberry Pi projects'', ''Reading science‑fiction and
    technology blogs'', ''Small‑group board‑game gatherings'', ''Volunteering to teach computer basics to seniors'', ''Photography of desert landscapes'', ''Listening to traditional Vietnamese music'']'
  career_goals: Phuong aims to advance into a senior IT service management role where she can lead a small support team and influence service‑delivery processes for a mid‑size organization in the Las Vegas
    area. She plans to obtain certifications such as CompTIA Security+, Cisco CCNA, and ITIL Expert to deepen her technical and managerial expertise. A long‑term ambition is to integrate AI‑driven support
    tools to improve efficiency while maintaining a personal touch for end‑users. She also hopes to mentor more women and Southeast Asian professionals entering the tech field, fostering inclusive workplace
    cultures and offering community workshops on digital literacy.
