  career_goals: Although still young, Jose dreams of a future where he can combine his love for art, helping others, and the environment. He imagines becoming an environmental artist or wildlife conservationist
    who creates murals to raise awareness about protecting nature, or a community teacher who uses creative projects to inspire his classmates. He also expresses excitement about becoming a firefighter
    or a veterinarian, roles that let him directly help people or animals. His overarching ambition is to make a positive impact on his community while continuing to explore new ideas.
