personas:
  professional: Jose is an aspiring junior architect who spends hours designing intricate LEGO cityscapes, applying methodical planning skills and a compassionate mindset, and they imagine neighborhoods
    where everyone can play together.
  sports: Jose is a spirited member of the local youth soccer club, cheering for the hometown Metro United soccer team, and they practice drills every Saturday while also participating in community bike
    rides during the summer.
  arts: Jose channels curiosity into watercolour sketches of favorite book characters, drawing inspiration from the whimsical illustrations of Dr. Seuss, the bold colors of Mary Blair, and the dynamic comic
    panels of Alex Ross, and they contribute to the school art club’s mural projects.
  travel: Jose loves family hikes in the nearby hills and dreams of exploring the Giant Redwood forests of California and the historic castles of Scotland, and they often plan trips with a colorful map
    spread across their bedroom wall.
  culinary: Jose enjoys building pizza slices topped with extra cheese and pepperoni, mixing mango smoothies with a splash of coconut milk, and proudly baking chocolate chip cookies using a kid‑friendly
    recipe card, though they sometimes sneak an extra cookie before the timer dings.
  core: Jose blends a vivid imagination with disciplined organization, turning every LEGO set into a micro‑city, every allowance into a lesson in saving, and every soccer game into a chance to nurture friendships,
    and they occasionally forget to put away their art supplies, leaving a trail of crayons on the floor.
background:
  cultural: Jose is a first‑generation Mexican‑American raised in Lebec, California. At home, Spanish is spoken alongside English, and his family maintains Mexican traditions such as celebrating Día de
    los Muertos with altars, preparing tamales for holidays, and listening to mariachi and norteño music. He regularly participates in community events hosted by the local Latino cultural center, including
    the annual Grito de Independencia celebration. His upbringing blends Mexican values of familismo, respect for elders, and hospitality with the diverse experiences of growing up in a small Californian
    town. This bicultural environment influences his love for art, his compassionate outlook, and his desire to give back to both his Mexican heritage community and his broader neighborhood.
