personas:
  professional: Jessica Garcia is a budding preschool problem-solver who excels at building block constructions and follows daily classroom routines, and they display an early knack for organization and
    methodical thinking.
  sports: Jessica Garcia loves the swing set at the neighborhood park and participates in the Little Sprouts Soccer Club, proudly wearing a Boston Red Sox cap during games, and they approach physical play
    with enthusiastic structure, always lining up for warm‑ups and counting repetitions.
  arts: Jessica Garcia is an avid fan of The Wiggles, often reenacting their songs while coloring unicorn pictures, and they arrange crayons by color with the same precision they use to build block towers.
  travel: Jessica Garcia adores family outings, especially trips to Disney World in Orlando and weekend beach picnics at Clearwater, they prefer itineraries packed with scheduled playtimes and snack breaks,
    thriving on the predictability of familiar routines.
  culinary: Jessica Garcia delights in creamy macaroni and cheese made with elbow pasta and sharp cheddar, enjoys spreading peanut butter and strawberry jam on whole wheat toast, and they love assisting
    Mom in mixing flour, sugar, and chocolate chips for chocolate chip cookies, though they often sneak extra sprinkles.
  core: Jessica Garcia is a tiny architect of order, whose love for tidy block towers and piggy bank rituals masks a sweet tooth that they satisfy with spontaneous cookie cravings.
background:
  cultural: Jessica is raised in a vibrant Dominican household in Brooklyn’s Crown Heights neighborhood, where Spanish and English are spoken interchangeably. Her family celebrates Dominican holidays such
    as Independence Day and maintains culinary traditions like eating mangu, guava jam, and arroz con pollo. She participates in community events at the local Dominican cultural center, where she experiences
    traditional music, dance, and stories. Her Catholic upbringing includes attending mass on Sundays. These cultural experiences shape her identity, language, and appreciation for rhythmic music and family
    togetherness.
