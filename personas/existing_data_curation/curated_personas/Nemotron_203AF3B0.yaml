  career_goals: Though still in early childhood, Jessica shows an interest in future roles that involve helping others and maintaining order. She often says she wants to be a teacher because she enjoys
    sharing stories and organizing classroom activities. She also mentions wanting to become a pediatric nurse or a librarian, reflecting her love for books and caring for children. Her ambitions are shaped
    by her desire for a structured, supportive environment where she can contribute to others' well‑being.
