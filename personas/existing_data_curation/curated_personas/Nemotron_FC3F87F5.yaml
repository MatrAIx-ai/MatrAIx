personas:
  professional: Janet Williams, a seasoned civil engineer with a business degree, merges two decades of structural analysis and water‑resources expertise with a painter’s imagination, leading interdisciplinary
    teams to design sustainable, aesthetically integrated infrastructure while quietly mentoring emerging women engineers and championing municipal policy change.
  sports: Janet Williams, an early‑morning walker and avid birdwatcher, spends her summers kayaking the St. Johns River, joins the River Run Collective senior running club for low‑impact jogs, and quietly
    supports the Jacksonville Jaguars and the local Jacksonville Jumbo Shrimp baseball team, preferring solo endurance activities to crowded gyms.
  arts: Janet Williams, a devoted watercolorist, draws inspiration from J.M.W. Turner’s atmospheric landscapes and Wassily Kandinsky’s abstract geometry, frequents Jacksonville’s Museum of Contemporary
    Art for installations by artists like Yayoi Kusama, and enriches her practice by listening to Philip Glass’s minimalist compositions while sketching architectural forms.
  travel: Janet Williams, a methodical planner, prefers tranquil travel to destinations such as Kyoto’s Zen gardens, the fog‑enshrouded cliffs of the Scottish Highlands, and the historic riverfront of Savannah,
    scheduling trips during shoulder seasons to avoid crowds and allocating a modest budget that balances airfare, boutique eco‑lodges, and occasional art‑focused workshops.
  culinary: Janet Williams, an intermediate home cook, enjoys preparing Gulf shrimp étouffée with fresh herbs from her garden, pairs it with citrus‑infused quinoa salads featuring local heirloom tomatoes,
    and occasionally treats herself to a tasting menu at Jacksonville’s River & Rail, while still maintaining a habit of snacking on plain almonds during design reviews.
  core: Janet Williams, a solitary creative engineer, fills her notebook with sketches while over‑organizing digital project files, habitually loses track of time during abstract art documentaries, and
    has a soft spot for humming ambient soundscapes while running structural calculations.
background:
  cultural: Janet grew up in a suburban white middle‑class family in the American South, absorbing a blend of traditional Southern hospitality, community‑oriented values, and a respect for self‑reliance.
    Living in Jacksonville has reinforced her connection to coastal and riverine ecosystems, influencing both her personal appreciation for nature and her professional commitment to sustainable, site‑specific
    engineering. Her cultural background also includes modest exposure to church community life, which nurtured her cooperative and considerate nature, and an appreciation for regional cuisine and outdoor
    recreation.
attributes:
  skills: '["Structural analysis", "Transportation design", "Water resources engineering", "AutoCAD", "Civil 3D", "GIS", "Project budgeting", "Cost control", "Contract negotiation", "Stakeholder communication",
