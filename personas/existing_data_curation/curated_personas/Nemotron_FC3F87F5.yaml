  hobbies: '["Watercolor painting", "Digital illustration", "Sketching architectural forms", "Reading philosophy and abstract art theory", "Visiting museums and quiet lectures", "Birdwatching", "Gardening",
    "Riverfront walking", "Tutoring community college students in math and engineering"]'
  career_goals: Janet aims to transition into a senior leadership role such as Principal Engineer or Director of Sustainable Infrastructure within a municipal or consulting firm in Jacksonville. She wants
    to spearhead projects that blend architectural aesthetics with resilient, low‑impact engineering, such as green bridges, storm‑water art installations, and pedestrian‑friendly urban spaces. Mentoring
    younger engineers, especially women in STEM, is a priority, as is influencing city policy to adopt innovative, environmentally responsible design standards. Over the next five years, she plans to renew
    her PE license, complete a certification in Sustainable Design, and lead a flagship project that showcases her novel, art‑inspired engineering approach.
