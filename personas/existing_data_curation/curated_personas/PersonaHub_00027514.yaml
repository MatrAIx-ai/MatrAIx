persona_description: A conservation biologist who specializes in the study of monarch butterflies, particularly the Tahiti Monarch. He is involved in the conservation efforts to save the last population
  of the Tahiti Monarch from extinction. His research interests include the impacts of introduced birds on the population, the control of introduced birds, and the establishment of a recovery group. He
  has also been involved in the translocation of young birds to the island of Rimatara, and he is currently working on developing the Operational Plan for the introduction of Monarch to Rimatara island.
