  hobbies: '[''Bowling'', ''Bridge'', ''Gardening'', ''Reading historical nonfiction'', ''Cooking Midwestern cuisine'', ''Church social events'', ''Volunteer work at food pantry'', ''Attending Chicago Cubs
    games'', ''Walking with spouse'']'
  career_goals: Although retired, James is focused on staying active and valuable to his community. His primary ambitions are to maintain his health through regular walks and gardening, continue volunteering
    at the local senior center and food pantry, mentor younger volunteers in practical skills, preserve and share family stories with grandchildren, and take short trips with his wife to places that hold
    personal significance, such as family cabins and historic sites in the Midwest.
