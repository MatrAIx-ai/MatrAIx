personas:
  professional: Sylvester Browne, a two-year-old who already displays an entrepreneurial spark at daycare, meticulously lines up blocks in perfect rows before inviting peers to collaborate, demonstrating
    how they thrive on structure, achievement, and sociable leadership.
  sports: Sylvester Browne, a bundle of kinetic energy, thrives in the Tiny Tots Soccer Club's weekday sessions and jubilantly cheers for the Chicago Cubs during family game nights, while also enjoying
    weekly gymnastics at the community center that satisfies their love of movement.
  arts: Sylvester Browne, an avid fan of animated music, belts out Raffi's 'Baby Beluga', mimics the 'Baby Shark' dance, and eagerly flips through Dr. Seuss picture books, turning bedtime into a lively
    performance that satisfies their sociable and creative side.
  travel: Sylvester Browne, an adventurous little explorer, has already delighted in a family trip to the San Diego Zoo and a magical day at Disneyland, and now dreams of seeing the towering Grand Canyon
    and the bright lights of Paris someday.
  culinary: Sylvester Browne, a picky yet surprisingly adventurous eater, loves soft mashed sweet potatoes, crunchy apple slices, chicken nuggets with a hint of barbecue sauce, and buttery mini pancakes
    drizzled with maple syrup, but stubbornly refuses broccoli, often making a delightful mess while attempting to spread peanut butter on toast.
  core: Sylvester Browne, a meticulously organized two-year-old bursting with sociable energy, thrives on predictable routines, leads playful group activities with assertive charm, yet can erupt into a
    brief tantrum when their structured world is disrupted.
background:
  cultural: Sylvester is raised in an African‑American family in Vail, Arizona, where cultural traditions such as sharing stories, celebrating Juneteenth, listening to gospel and soul music, and cooking
    family recipes are valued. His parents emphasize pride in his heritage and encourage participation in community gatherings that blend African‑American cultural practices with the local Southwest environment.
