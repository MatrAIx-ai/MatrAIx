  career_goals: Looking ahead, Arturo aims to turn his technical aptitude into a career in software development, with a particular focus on cybersecurity or data analysis—fields that promise stable, predictable
    work environments and clear performance metrics. He plans to earn a scholarship to study computer science at a university that offers strong mentorship programs for first‑generation Latino students.
    Arturo also hopes to compete in regional coding competitions and hackathons to demonstrate his competitive drive and build a portfolio that could lead to a summer internship. Long‑term, he envisions
    creating bilingual tools or apps that help other Mexican‑American teens manage anxiety and academic stress, merging his technical skills with his personal experience of emotional reactivity.
