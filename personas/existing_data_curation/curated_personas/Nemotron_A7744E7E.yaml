  career_goals: Although retired, Elissa aims to remain intellectually engaged and socially impactful. She aspires to mentor emerging entrepreneurs in her community, help secure funding for arts programs,
    and document her family's and region's history through a memoir or oral-history project. She also hopes to master digital tools for virtual exhibitions, and travel to at least two major art museums
    each year.
