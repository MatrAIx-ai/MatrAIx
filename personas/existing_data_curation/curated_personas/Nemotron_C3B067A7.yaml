  hobbies: '[''Crocheting'', ''Cooking Puerto Rican dishes'', ''Gardening'', ''Listening to salsa and bolero music'', ''Reading historical novels'', ''Walking lakeside trails'', ''Participating in a senior
    book club'']'
  career_goals: At this stage, Belkis aims to maintain a steady work schedule that supports her household finances while allowing time for personal interests. She hopes to mentor younger cashiers, sharing
    her calm approach to customer service and problem‑solving. Additionally, she plans to transition to a lighter afternoon shift within the next year to free up afternoons for volunteering at her local
    church and assisting her adult children with occasional errands.
