persona_description: A political economist who specializes in the study of the rise of the United States within the world-economy and the causes of its relative decline. He is a professor who emphasizes
  the divergent experiences of different regions within the USA and provides a significant 'new' regional geography, tracing the historical evolution of the world-economy and assessing the contemporary
  impact of the world-economy upon and within it. His guiding politico-economic framework provides a coherent radical perspective within which the author undertakes specific regional and historical analysis.
