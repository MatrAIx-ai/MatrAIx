persona_description: A historian who specializes in the study of Chinese immigration and labor history, particularly the contributions of Chinese immigrants to the construction of the U.S. Transcontinental
  Railroad. Her research interests include the experiences of Chinese immigrants in the United States, the role of labor in shaping Chinese American identity, and the legacy of Chinese laborers in American
  society. She is passionate about the stories of Chinese immigrants and their contributions to American history, and is dedicated to preserving and sharing their stories with the public.
