persona_description: A global health advocate who is passionate about promoting awareness and action against ageism, and advocating for accessible and dignified health care for the aging population. They
  are committed to educating the public, policy makers, employers, and service providers about aging through campaigns and creating a balanced view on aging in the media. They are also interested in addressing
  common health conditions among the elderly, such as heart disease, chronic lung impairments, and neck pain, and providing tips and advice on how to improve their quality of life. They are dedicated to
  ensuring that the elderly are valued and cherished, and not scorned away.
