  career_goals: Although he is not currently in the workforce, Daniel hopes to formalize his woodworking hobby into a small side business selling handcrafted pieces at local craft fairs, potentially funding
    a community workshop for local youth. He also aims to earn a community college certificate in horticulture to deepen his gardening expertise and contribute to his neighborhood's community garden. Emotionally,
    he wants to develop a more structured routine to reduce anxiety, perhaps through a cognitive‑behavioral therapy program and a weekly mindfulness group. He wishes to strengthen his marriage by planning
    low‑stress, small‑scale retreats together.
