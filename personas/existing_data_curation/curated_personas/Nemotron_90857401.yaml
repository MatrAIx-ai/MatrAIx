  career_goals: Brian aims to transition from full-time driving to a mentorship and consulting role within the next two years, using his decades of experience to train new drivers and help small fleets
    improve efficiency. He is exploring the possibility of owning a modest local moving and delivery service that blends his sales background with his driving expertise. Additionally, he wants to solidify
    his retirement plan by investing in a modest retirement account and becoming a certified commercial driver trainer, while maintaining enough flexibility to stay socially active and engaged in community
    events.
