  hobbies: '["Sketching and drawing", "Digital art creation with Procreate", "Street photography", "Visiting art galleries and museums", "Participating in Mexican cultural festivals (e.g., Día de los Muertos,
    Cinco de Mayo)", "Dancing to Latin and traditional Mexican music", "Cooking Mexican dishes", "Reading graphic novels", "Poetry writing", "Volunteering for youth art workshops"]'
  career_goals: Nathaly aims to earn her GED within the next year and enroll in a community‑college program in graphic design or visual communication. Her long‑term ambition is to become a professional
    graphic designer who blends contemporary design with Mexican cultural motifs, eventually working for tourism agencies or cultural institutions in Nevada. She also hopes to organize and curate community
    art exhibitions that celebrate multicultural heritage, and eventually to mentor younger students from similar backgrounds.
