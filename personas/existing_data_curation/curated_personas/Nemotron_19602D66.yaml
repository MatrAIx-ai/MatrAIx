personas:
  professional: Nathaly Negron, a 17-year-old visual artist and budding graphic designer, blends meticulous digital illustration with street-photography-inspired motifs drawn from festive skull art, leveraging
    their organized, methodical planning to lead school art projects and coordinate community workshops.
  sports: Nathaly Negron follows the Vegas Golden Knights and the Las Vegas Raiders with fervor, practices salsa dancing twice weekly for cardio, joins a community park’s Saturday morning jog club during
    winter, and occasionally plays pickup basketball at a local recreation center, reflecting a balanced yet socially oriented fitness routine.
  arts: Nathaly Negron constantly sketches in a battered Moleskine, creates digital illustrations inspired by the vivid colors of Frida Kahlo and the street-wise edge of Banksy, curates Instagram reels
    featuring poetry set to the beats of Bad Bunny and J Balvin, and volunteers to teach kids how to compose graphic novels in the style of Neil Gaiman.
  travel: Nathaly Negron dreams of a weekend road trip to the desert art installations of Sedona, a cultural immersion tour of Oaxaca’s vibrant markets, and a study-abroad stint in Barcelona’s design schools,
    planning each adventure with a spreadsheet of costs while they save a slice of each paycheck for travel.
  culinary: Nathaly Negron loves to perfect homemade tamales, salsas with fresh tomatillos and chilies, and crisp churros, often experimenting with the balance of smoky chipotle and bright lime in their
    kitchen, while they also savor street‑taco runs at local food trucks that serve carne asada al pastor.
  core: Nathaly Negron is a creatively curious, meticulously organized teen who fuses festive visual motifs with digital design, saves diligently for future studies, battles occasional acne and fatigue,
    and balances artistic passion with a love for community-centered fitness and food.
background:
  cultural: Nathaly grew up in a Mexican‑American household where Spanish was spoken daily and family gatherings centered around shared meals, music, and celebrations such as Día de los Muertos and Las
    Posadas. Her parents emphasized the importance of cultural pride, storytelling, and respect for tradition, while also encouraging her curiosity about the broader world. Living in Las Vegas, she experiences
    a blend of Mexican heritage and a multicultural urban environment, giving her a unique perspective that she often reflects in her artwork. Her cultural identity shapes her values of community, hospitality,
    and the vibrant visual aesthetics of Mexican folk art.
attributes:
