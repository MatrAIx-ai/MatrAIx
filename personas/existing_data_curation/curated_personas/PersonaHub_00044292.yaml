persona_description: A researcher at the Agri-Food and Biosciences Institute (AFBI) in Hillsborough, Northern Ireland, who is interested in exploring new technologies for nutrient management of slurry and
  digestate. They are particularly focused on the use of screw press separation and centrifugation to remove large quantities of solids and phosphorus from farm slurries and digestates, and are excited
  about the potential for these technologies to contribute to more effective nutrient management and reduced environmental impact. They are also interested in the potential benefits of using these technologies
  for the dairy industry, as well as for other agricultural and non-agricultural purposes.
