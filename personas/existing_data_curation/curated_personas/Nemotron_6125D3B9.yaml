personas:
  professional: Martin Copeland, a retired electrical and mechanical engineer, channels his systematic problem‑solving and precise woodworking into community STEM workshops for seniors and high‑school students,
    crafting hands‑on projects that blend vintage electronics with modern Python‑driven automation.
  sports: Martin Copeland, a devoted spectator of the Dayton Dragons minor‑league baseball team, also participates in a weekly senior walking club at Riverside Park and occasionally joins a seasonal bird‑watching
    tournament hosted by the state Audubon Society, preferring low‑impact activity over competitive sports.
  arts: Martin Copeland immerses himself in the smooth tones of Miles Davis and the cinematic scores of Ennio Morricone while reading the works of Herman Melville and Charles Dickens, often humming along
    as he fine‑tunes vintage radios in his workshop.
  travel: Martin Copeland prefers leisurely road trips that blend history and nature, having parked his RV at the Gettysburg battlefield and the towering redwoods of Muir Woods, while his bucket list includes
    a spring pilgrimage to the historic castles of Scotland and a quiet week sailing the coastal waters of Maine.
  culinary: Martin Copeland, a competent home cook, delights in turning his garden’s bounty—heirloom tomatoes, sweet corn, and fresh basil—into rustic ratatouille, homemade vegetable soup, and a nightly
    side of pickled cucumbers, while occasionally treating himself to a perfectly seared salmon with a lemon‑dill glaze.
  core: Martin Copeland, a quiet engineer‑turned‑mentor, blends relentless curiosity with a disciplined love for vintage radios, solitary woodworking, and a habit of cataloguing everything—even his garden
    harvests—while occasionally hoarding spare parts that never see the light of day.
background:
  cultural: Martin grew up in post‑World War II suburban Long Island, part of the Baby Boomer generation of white, middle‑class Americans. His upbringing was shaped by the optimism of the space race, a
    strong work ethic, and community values typical of mid‑century Nassau County. He identifies with a Protestant (Presbyterian) cultural tradition, values self‑reliance, civic involvement, and the quiet,
    orderly lifestyle of his Long Island neighborhood.
attributes:
  skills: '["Electrical circuit design", "Analog electronics repair", "Digital home automation", "Precision woodworking", "Technical writing", "Data analysis", "Project planning", "Mentoring junior engineers",
