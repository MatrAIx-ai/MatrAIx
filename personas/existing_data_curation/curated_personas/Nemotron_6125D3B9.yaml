  hobbies: '["Restoring vintage radios", "Model railroad building", "Vegetable gardening", "Birdwatching", "Reading historical non-fiction", "Crossword puzzles", "Stargazing", "Woodworking", "Jazz listening",
    "Classic film appreciation"]'
  career_goals: Although retired from formal employment, Martin aims to channel his expertise into community STEM outreach, developing hands‑on workshops for local high‑school students and seniors, authoring
    a memoir that chronicles the evolution of American engineering from the 1950s onward, and completing a personal project to build a solar‑powered greenhouse that combines his engineering background with
    his love of gardening.
