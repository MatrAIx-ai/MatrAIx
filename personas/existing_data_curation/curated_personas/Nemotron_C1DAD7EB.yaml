personas:
  professional: Jonathan Williams, a budding young scientist who spends afternoons mixing baking soda and vinegar, they balance boundless curiosity with a practical habit of cleaning up their experiment
    stations, and delight in sharing discoveries with classmates during playtime.
  sports: Jonathan Williams, an energetic member of the Tiny Tigers Little League soccer team, they love practicing dribbling after school, proudly wear their favorite New York Knicks jersey during recess,
    and cheerfully follow the Chicago Cubs on weekends with their dad.
  arts: Jonathan Williams, a creative doodler who spends evenings drawing Marvel superheroes and sketching Disney princesses, they frequently hum the catchy tune 'Let It Go' from Frozen while coloring with
    Crayola crayons, and enjoy watching Sesame Street for its lively puppetry.
  travel: Jonathan Williams, an adventurous traveler who has visited the local zoo, the sandy beaches of Gulf Shores, and dreams of riding the roller coasters at Disney World, they love mapping trips with
    stickers on a world map, and prefer outings that mix playground fun with short car rides.
  culinary: Jonathan Williams, a budding chef who can confidently spread peanut butter and jelly on whole‑grain bread, they love the cheesy comfort of mac and cheese, experiment with mixing pineapple chunks
    into yogurt, and often help their mom stir batter for banana pancakes, though they stubbornly refuse broccoli.
  core: Jonathan Williams, a curious yet practical five‑year‑old who balances a love for discovery with a tidy routine, they thrive on group play, and occasionally forget to tidy their toys before bedtime.
background:
  cultural: Jonathan is a white American child raised in Cleveland, Ohio, immersed in Midwestern culture. His family celebrates holidays such as Thanksgiving, Christmas, and the Fourth of July, enjoys outings
    to local landmarks like the Cleveland Metroparks and the Rock & Roll Hall of Fame, and participates in neighborhood events that emphasize kindness, cooperation, and community involvement. He may have
    familial roots in Irish and German ancestry, reflected occasionally in the stories his parents tell and foods shared during family gatherings.
