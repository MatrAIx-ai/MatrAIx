  career_goals: Jonathan dreams of growing up to be a firefighter or an astronaut, inspired by his love of big red trucks and space picture books. He also imagines being a teacher who can share knowledge
    with friends. In the near term, his goal is to become a 'big kid' who reads longer stories, solves more challenging puzzles, and helps his classmates with group projects, reflecting his curiosity, practicality,
    and desire to help others.
