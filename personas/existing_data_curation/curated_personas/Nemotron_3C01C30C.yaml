  career_goals: Maxine often dreams of becoming a teacher who creates a warm, supportive classroom where every child feels heard and can explore new ideas. She also imagines herself as a veterinarian, caring
    for the neighborhood pets and wildlife she loves. Sometimes she pictures being a friendly TV host who tells stories and sings songs to bring joy to other kids. Her ambition is driven by a desire to
    help others, make people feel safe and happy, and use her curiosity to solve everyday problems, especially within her close‑knit community in Piedmont.
