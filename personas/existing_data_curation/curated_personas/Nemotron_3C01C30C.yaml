personas:
  professional: Maxine Porch, a seven‑year‑old budding storyteller, spends hours role‑playing as a teacher, doctor, and TV presenter, turning curiosity into improvised lessons and pretend news segments
    that delight friends and family.
  sports: Maxine Porch sprints around the backyard like a junior explorer, participates in the local youth soccer club “Riverdale Rovers” during the fall, joins a community swimming class in summer, and
    channels boundless energy into dance parties to R&B tunes while occasionally forgetting to stretch.
  arts: Maxine Porch loves to dress up and act out stories, draws colorful characters inspired by their favorite picture books, and grooves to gospel singers like Kirk Franklin, R&B icons such as Beyoncé,
    and children’s tunes from Sesame Street, often performing impromptu concerts for family.
  travel: Maxine Porch dreams of visiting the nearby state park for picnics, the beach for sandcastle contests, and the Kennedy Space Center to see rockets up close, preferring family‑organized trips that
    balance adventure with the comfort of familiar routines, though they sometimes fret about missing a favorite bedtime story on the road.
  culinary: Maxine Porch helps mom make peanut butter‑banana sandwiches, builds fruit kebabs with grapes and strawberries, and proudly pretends to be a chef whipping up mini cheese‑topped pizzas, yet they
    often spill flour during cooking and love sneaking a bite of chocolate chip cookies before dinner.
  core: Maxine Porch is a chatty, imaginative seven‑year‑old who blends boundless curiosity with a relaxed, sometimes messy, approach to rules, thriving on attention while quietly fearing the unknown.
background:
  cultural: Maxine comes from a close‑knit African‑American family that has lived in the Piedmont area for generations. Her parents and grandparents keep alive traditions such as attending a vibrant local
    Baptist church, celebrating Juneteenth and Kwanzaa with soulful music, storytelling, and special dishes like collard greens, cornbread, and sweet‑potato pie. Family gatherings often feature oral histories
    about the civil‑rights movement and the community’s local heritage, fostering a strong sense of pride and belonging. Growing up in Oklahoma County, she experiences a blend of Southern and Midwestern
    influences, from listening to gospel choirs and classic R&B at home to participating in school events that highlight Black history. These cultural threads shape her values of community, harmony, and
    expressive storytelling.
