persona_description: A regulatory authority or scientist who is involved in international harmonization efforts to establish and harmonize validation and regulatory acceptance criteria for toxicological
  test methods. This person is likely to have expertise in international regulatory processes, scientific consensus, and the harmonization of international standards and protocols. They are also interested
  in the development of specific criteria for the validation of alternative toxicity test methods and the establishment of methods to minimize duplication of efforts, to accept each other's peer review
  of validation studies, and to develop collaborations to support other international validation efforts. They are also familiar with the International Conference on Harmonization of Technical Requirements
  for Registration of Pharmaceuticals for Human Use (ICH), the International Cooperation on Harmonization of Technical Requirements for Registration of Veterinary Products (VICH), and the World Health Organization
  (WHO), as well as many national regulatory authorities such as the US Environmental Protection Agency (EPA) and the Japanese National Institute of Health Sciences (NIHS).
