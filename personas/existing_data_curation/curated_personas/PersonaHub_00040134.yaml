persona_description: A conservation biologist who is passionate about the greater bilby, a critically endangered marsupial native to Australia, and is actively involved in research and conservation efforts
  to protect and restore its habitat and populations. They are dedicated to understanding the anti-predator behaviors of the bilby and working towards its recovery, with a particular focus on reducing the
  impact of feral cats and foxes, and the fragmentation of its habitat by land clearing and changed fire regimes. They are also interested in the ecological role of the bilby in restoring soil and regrowth
  of vegetation, and its unique sense of smell and hearing, which they use to find food. They are knowledgeable about the rapid decline in the bilby's range due to feral cats and foxes, and the relative
  of the greater bilby, the lesser bilby, which is now extinct.
