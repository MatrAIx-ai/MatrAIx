  career_goals: Kevin aims to advance from managing a single location to overseeing multiple outlets as a regional operations director within the next five years, focusing on consistent service quality
    and employee well‑being. He intends to implement a structured mentorship program that reduces staff turnover and cultivates a reliable, routine‑oriented culture. Long‑term, he envisions opening a family‑run,
    community‑focused restaurant that showcases classic Midwestern cuisine, using his knowledge of culinary history and his disciplined management style to create a stable, high‑performing business. He
    also hopes to champion mental‑health resources for his staff, turning his own experiences with anxiety into a proactive workplace initiative.
