personas:
  professional: Tara Large, a retired classroom teacher turned community literacy champion, leverages their decades of curriculum design and differentiated instruction expertise with methodical organization
    and a pragmatic curiosity to orchestrate intergenerational workshops, mentor new educators, and lead a regional adult‑literacy initiative, all while radiating the sociable, outgoing energy that keeps
    volunteers engaged.
  sports: Tara Large stays fit by walking the nearby nature trails with their local walking club, cheering on the Mississippi State Bulldogs during college football season and the New Orleans Saints on
    Sundays, and occasionally participates in a senior‑friendly pickleball league at the community center.
  arts: Tara Large nurtures creative expression through a weekly quilting circle where they stitch intricate patterns inspired by classic Southern literature, sings alto in the church choir performing works
    by gospel legends like Mahalia Jackson, and enjoys the historical novels of Philippa Gregory and the paintings of Winslow Homer during quiet evenings.
  travel: Tara Large prefers road‑trip adventures that combine historical sightseeing with gentle relaxation, having visited Charleston’s cobblestone streets and Savannah’s riverfront squares, dreaming
    of a guided genealogy tour of England’s Cotswolds while budgeting each journey with a detailed itinerary and a modest travel fund.
  culinary: Tara Large delights in baking traditional Southern treats such as peach cobbler, buttermilk biscuits, and pecan pie—seasoned just right with a pinch of nutmeg—while also cultivating fresh tomatoes
    and herbs in their garden to enhance home‑cooked gumbo and collard greens, often sharing generous portions at church potlucks.
  core: Tara Large blends methodical organization, boundless curiosity, and community‑centric kindness into a life of lifelong learning, garden‑to‑table cooking, and unwavering dedication to literacy, even
    if they occasionally forget to water a rose bush while jotting down notes for a new memoir.
background:
  cultural: 'Tara Vela Large was born and raised in the Deep South, growing up in a close‑knit white community in Mississippi. Her upbringing was steeped in Southern traditions: church‑centered social life,
    hospitality, a strong emphasis on family ties, and an appreciation for Southern cuisine, gospel music, and storytelling. While she respects the region’s heritage, she also embraces a progressive outlook,
    valuing education, community service, and intergenerational connection. Her cultural identity is reflected in her commitment to local volunteerism, participation in church activities, and preservation
    of regional history.'
attributes:
  skills: '["Curriculum design", "Differentiated instruction", "Student assessment", "Community literacy program coordination", "Volunteer recruitment and management", "Event planning and organization",
    "Public speaking and workshop facilitation", "Mentorship of teachers and volunteers", "Basic computer and digital communication skills", "Conflict resolution and mediation"]'
  hobbies: '["Reading historical fiction and Southern literature", "Gardening (roses and vegetable garden)", "Baking Southern recipes", "Quilting and knitting", "Singing in the church choir", "Volunteering
    as a tutor at the public library", "Genealogy research", "Walking nature trails", "Attending community events and senior fitness classes"]'
  career_goals: In retirement, Tara aims to broaden her impact on the Petal community by leading a regional adult literacy initiative, establishing a mentorship network for new teachers, and preserving
    local history through oral‑history projects. She hopes to develop a series of digital‑storytelling workshops for seniors, author a memoir about her decades of teaching, and continue personal growth
    by taking courses in genealogy and horticulture.
