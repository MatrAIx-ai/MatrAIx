personas:
  professional: Belinda Duncan is a 17‑year‑old high‑school senior who channels her natural knack for people‑talk and hands‑on farm experience into aspiring veterinary assistance work, often organizing
    the school’s 4‑H club events and brainstorming a future community‑focused cooperative while juggling a relaxed, sometimes chaotic, approach to planning.
  sports: Belinda Duncan is an enthusiastic high‑school soccer player who spends weekends sprinting on the school field and joining informal pick‑up games at the local park, while cheering on the Sacramento
    Republic FC and the Sacramento Kings and staying active through weekend hikes along the Sacramento River Trail with friends.
  arts: Belinda Duncan curates mixtapes featuring Taylor Swift, Olivia Rodrigo and Billie Eilish while binge‑watching teen dramas such as Riverdale and Stranger Things, and expresses her visual side through
    photography inspired by Annie Leibovitz, often documenting community events and farm life for her scrapbook pages.
  travel: Belinda Duncan prefers spontaneous road trips that combine a quick dip into nature with a stop at a local farmers market, having already explored the vineyards of Napa and hiked to the rim of
    Yosemite’s Glacier Point, and dreaming of a weekend getaway to Portland’s food carts and the beachside town of Santa Cruz.
  culinary: Belinda Duncan enjoys baking chocolate chip cookies and oatmeal raisin bars for neighbors, while also whipping up quick farm‑fresh salads with heirloom tomatoes, feta, and a drizzle of olive
    oil, and they are particularly fond of classic comfort dishes like fried chicken, mac and cheese, and the occasional homemade taco with fresh cilantro and lime.
  core: Belinda Duncan is a chatty, curiosity‑driven teen who balances a love for community‑centered projects and spontaneous creativity with a habit of forgetting homework assignments until the last minute,
    often juggling a buzzing phone, a camera, and a batch of unsold cookies.
background:
  cultural: Belinda’s cultural background is rooted in a white, working‑class family that has lived in the agricultural heart of Colusa County for generations. Growing up in Williams, a tight‑knit rural
    town, she has been immersed in community traditions such as 4‑H club events, county fairs, and church gatherings that emphasize neighborly support, hard work, and a relaxed, flexible approach to planning.
    The blend of Midwestern values of self‑reliance and the pragmatic, sun‑baked lifestyle of California’s Central Valley shapes her outlook, fostering a balance of curiosity, practicality, and a strong
    sense of community.
