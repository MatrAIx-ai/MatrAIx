personas:
  professional: Shawn Woodell, a 34‑year‑old health technologist who calibrates biomedical equipment, manages data compliance, and drives Lean Six Sigma projects, merges their competitive streak and pragmatic
    mindset to mentor junior staff while occasionally letting their love of flexibility warp strict timelines.
  sports: Shawn Woodell cycles the Flint Hills Nature Trail, hunts with the Johnson County Hunting Association, and follows the Kansas City Chiefs and Royals, blending weekend outdoor competition with occasional
    attendance at local high‑school baseball games.
  arts: Shawn Woodell enjoys classic rock from the Eagles, country storytelling by Willie Nelson, board‑game design by Klaus Teuter, and attends the local community theater’s productions of Midwest‑themed
    plays, letting music and games sharpen their analytical edge.
  travel: Shawn Woodell prefers short‑notice weekend trips to places like Badlands National Park and Lake of the Ozarks, while planning a longer, budget‑focused adventure to Ireland next summer, balancing
    their love of predictable itineraries with occasional spontaneous detours.
  culinary: Shawn Woodell favors Kansas‑style barbecued ribs, baked catfish with corn succotash, and homemade apple pie, cooks with a solid handyman skill set using sweet corn and fresh herbs, and enjoys
    the occasional wild‑game stew after a hunting weekend.
  core: Shawn Woodell merges a competitive, detail‑driven career in health technology with a pragmatic, slightly disorganized lifestyle, where mindfulness battles worry, fishing gear splurges clash with
    budgeting, and a love of community traditions grounds everyday decisions.
background:
  cultural: Shawn grew up in a middle‑class, white family in the Kansas suburbs, where Midwestern values of practicality, self‑reliance, and community service are deeply ingrained. His family emphasized
    steady work ethic, modesty, and participation in local events such as county fairs and volunteer fire‑department drives. While he identifies with broader American culture, his upbringing in Shawnee
    and Johnson County has shaped his preference for predictable routines, modest social interactions, and a pragmatic outlook on life.
attributes:
  skills: '["Medical equipment calibration and maintenance", "Healthcare information systems (EHR) operation", "Regulatory compliance (HIPAA, Joint Commission)", "Project management and scheduling", "Budgeting
    and cost control", "Lean Six Sigma process improvement", "Data analysis and reporting", "Team training and mentorship", "Troubleshooting of biomedical devices", "Certification preparation (RHIT, CHT)"]'
  hobbies: '["Fishing", "Hunting", "Cycling", "Woodworking", "Strategy board games", "Competitive video gaming", "Mindfulness meditation"]'
  career_goals: Shawn aims to transition from a technical specialist role to a leadership position within a hospital’s biomedical engineering department. Over the next five years he plans to obtain a Certified
    Clinical Engineer credential, spearhead a hospital‑wide equipment standardization project, and eventually become a department manager where he can blend his structured planning skills with his desire
    for strategic influence. He also envisions launching a niche consulting service that helps midsize Kansas health facilities optimize technology workflows while maintaining strict regulatory adherence.
