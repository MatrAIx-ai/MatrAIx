  career_goals: James aims to transition from a skilled machinist to a shop foreperson, securing a leadership role where he can shape workflow standards and champion safety culture. He plans to earn an
    advanced CNC certification and a teaching credential to teach technical courses at the local community college or vocational high school. Securing financial stability for retirement while maintaining
    a balanced schedule that reduces stress is a priority. Additionally, he hopes to establish a modest side venture offering custom metal‑fabrication pieces for local artisans and small businesses, allowing
    him to blend his technical skill with community service.
