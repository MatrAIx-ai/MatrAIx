personas:
  professional: Rae Hansen, a detail‑oriented facility cleaning specialist, blends their expertise in commercial chemical safety, inventory management, and basic building systems troubleshooting with a
    competitive drive to win local 'Cleanest Facility' awards and mentor new staff, all while championing eco‑friendly cleaning technologies.
  sports: Rae Hansen, an avid hiker on the Black Warrior River Trail and member of the local Trail Runners club, follows the Atlanta Braves during baseball season, enjoys occasional pickup basketball with
    coworkers, and incorporates weekly morning walks and a seasonal yoga class into a fitness routine that balances competitive edge with restorative downtime.
  arts: Rae Hansen, a devoted member of a community book club, devours mystery novels by Agatha Christie and historical sagas by Hilary Mantel, winds down with classic country hits from Dolly Parton and
    modern storytelling by Jason Aldean, and occasionally attends regional theater productions of 'The Miracle Worker', using these cultural touchstones to fuel both personal reflection and creative problem‑solving.
  travel: Rae Hansen prefers low‑key weekend road trips, having explored the historic streets of Savannah, the mountain vistas of Asheville’s Blue Ridge Parkway, and the vibrant food scene of New Orleans,
    while dreaming of a future pilgrimage to the Great Smoky Mountains and a spring music‑festival getaway to Austin, Texas.
  culinary: Rae Hansen, an enthusiastic home chef, perfects Southern staples like fried green tomatoes, buttery collard greens, and skillet‑cornbread, spices them with garden‑grown thyme, rosemary, and
    a dash of smoked paprika, and enjoys experimenting with a caramelized peach glaze on pork chops, balancing tradition with creative flair.
  core: Rae Hansen blends Southern roots with a relentless curiosity, channeling a competitive streak into meticulous eco‑cleaning practices while habitually reorganizing tools long after the job’s done,
    even if it sometimes delays dinner.
background:
  cultural: Rae grew up in a modest, predominantly white community in Walker County, Alabama, where Southern hospitality, church involvement (Baptist), and a strong work ethic were core values. Her upbringing
    emphasized independence, self‑reliance, and respect for local traditions such as country music, Southern cooking, and community festivals. While she appreciates these cultural roots, her practical curiosity
    leads her to explore new ideas and technologies, especially in her field. This blend of traditional Southern values and an open, competitive mindset shapes her personal and professional outlook.
attributes:
  skills: '[''Commercial cleaning techniques'', ''Safe chemical handling'', ''Inventory management'', ''Quality control and inspections'', ''OSHA safety compliance'', ''Basic plumbing and electrical repairs'',
    ''HVAC troubleshooting basics'', ''Eco‑friendly cleaning solutions'', ''Time management and scheduling'', ''Staff training and mentorship'']'
  hobbies: '[''Reading mystery and historical fiction'', ''Hiking local trails'', ''Gardening (tomatoes, collards, herbs)'', ''Cooking Southern cuisine'', ''Volunteering at animal shelter'', ''Community
    book club participation'', ''DIY home improvement projects'', ''Testing eco‑friendly cleaning products'', ''Nature photography'']'
  career_goals: Rae aims to advance from a janitor to a supervisory role and ultimately become a facility manager for a regional office or educational campus. She plans to earn certifications such as Certified
    Professional Cleaner (CPC) and OSHA Advanced Safety Training. Her competitive drive pushes her to win local "Cleanest Facility" awards and to be recognized for implementing innovative, cost‑saving cleaning
    practices. Long‑term, she contemplates launching her own eco‑focused cleaning service, while completing a bachelor's degree in Business Administration to broaden her managerial expertise.
