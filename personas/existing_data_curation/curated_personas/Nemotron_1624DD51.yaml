personas:
  professional: Soheil Moghadam, a curious 1‑year‑old, delights in dismantling and reassembling shape‑sorter toys and building blocks, balancing a natural urge to explore new configurations with a comfort
    in familiar routines, hinting at an emerging engineering mindset.
  sports: Soheil Moghadam loves crawling across the backyard lawn while the family watches the Detroit Lions on TV, and they also join a local toddler playgroup where they practice mini‑soccer kicks, embodying
    the community spirit of Michigan’s high‑school football culture.
  arts: Soheil Moghadam spends quiet afternoons listening to soft Persian lullabies and classic Disney scores while flipping through bright picture books of gardens and animals, nurturing a gentle appreciation
    for music and visual art that steadies their reserved temperament.
  travel: Soheil Moghadam’s family road trips to Ann Arbor’s university gardens and a weekend visit to Chicago’s Navy Pier fuel a love for small‑scale adventures, while bedtime stories about Nowruz celebrations
    in California plant a budding curiosity for far‑off cultural festivals.
  culinary: Soheil Moghadam enjoys the sweet flavor of sholeh zard (saffron rice pudding) alongside pureed carrots and occasional apple slices, and their growing fascination with textures leads them to
    experiment with finger foods, though they sometimes refuse vegetables with a stubborn grimace.
  core: Soheil Moghadam is a quiet, endlessly curious infant who balances a love for familiar routines with a playful urge to explore, often slipping into spontaneous bursts of imagination while quietly
    observing the world around them.
background:
  cultural: Born to Iranian‑heritage parents who immigrated to the United States, Soheil grew up in a bilingual household where Persian language, music, and customs—such as Nowruz celebrations—were part
    of daily life. At the same time, living in Hickory Corners, Michigan, he absorbed Midwestern values of independence, community involvement, and a close connection to the land. This blend of Iranian
    family traditions and rural American upbringing shapes his worldview, giving him a respect for both cultural heritage and the practical, hands‑on ethic of his surroundings.
