persona_description: A historian who specializes in the study of early European encounters with Native American tribes, particularly the Maliseet and their interactions with white settlers. The historian
  is well-versed in the Treaty of Paris (1763), which ended the French and Indian War, and the subsequent efforts by the British to maintain control over Native American territories. The historian is particularly
  interested in the Maliseet's efforts to assert their rights and protect their territory, particularly in the Upper St. John River valley, and the impact of the arrival of Acadian settlers and the subsequent
  displacement of Native American populations. The historian is also familiar with the Treaty of Ghent (1783), which ended the American Revolutionary War and granted land to Loyalists along the St. John
  River in New Brunswick, and the subsequent impact of these settlements on the Maliseet's territory and way of life. The historian is also interested in the Maliseet's conversion to Roman Catholicism and
  their interactions with the French missionaries and colonial authorities.
