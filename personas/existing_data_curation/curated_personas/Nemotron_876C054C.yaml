personas:
  professional: A retired educator with over three decades of experience in elementary and middle‑school teaching, Sonia Currin blends meticulous curriculum design with spontaneous, hands‑on lessons that
    draw on her love of gardening and storytelling, and now leads intergenerational garden workshops while mentoring novice teachers, despite occasionally wrestling with deadline organization.
  sports: A nature‑loving active senior who combines daily sunrise walks with bird‑watching at the local preserve, Sonia Currin cheerfully supports the Tampa Bay Buccaneers and follows the Florida Gators,
    while also participating in a community senior softball league and a weekly yoga class at the community center, though they rarely stick to a strict training plan.
  arts: A creative spirit who paints Florida wetlands in watercolor, writes short stories and poems, and performs improv with a senior theater troupe, Sonia Currin finds inspiration in the works of Georgia
    O’Keeffe, Bob Ross, and Jimmy Buffett, and regularly attends concerts by the Tampa Bay Symphony, while their occasional forgetfulness leads them to misplace sketchbooks.
  travel: A spontaneous explorer who prefers flexible weekend road trips to places like the Everglades, St. Augustine, and Savannah, Sonia Currin maps out only a rough route before heading out, enjoys staying
    at historic B&Bs and sampling local cuisine, yet they sometimes overpack and rely on last‑minute deals to stay within their modest travel budget.
  culinary: An experimental home cook who transforms garden harvests into dishes such as citrus‑marinated snapper, lavender‑infused vinaigrette on heirloom tomatoes, and roasted okra with smoked paprika,
    Sonia Currin enjoys tinkering with flavors, often improvises recipes on the spot, and occasionally burns the first batch while laughing it off.
  core: A calm, curious senior who merges gardening, storytelling, and spontaneous creativity into a lively retirement, Sonia Currin balances practical budgeting with occasional disorganization, and embraces
    intergenerational learning with boundless enthusiasm.
background:
  cultural: Sonia’s cultural background blends her Midwestern Anglo‑German roots with the sun‑kissed lifestyle of central Florida. Raised in a small Ohio town, she grew up with values of hard work, community
    service, church fellowship, and seasonal celebrations such as county fairs and harvest festivals. After earning her bachelor’s degree in education, she relocated to Lakeland in her early thirties for
    a teaching position, eventually planting deep ties in the local community. Over the years she has woven Midwestern modesty and pragmatism with Florida’s casual emphasis on outdoor recreation, citrus
    harvests, and multicultural festivals. She actively engages with the Lakeland History Museum, supports local senior centers, and continues to celebrate traditional Thanksgiving while also embracing
    the region’s seafood and Caribbean‑influenced culinary traditions.
