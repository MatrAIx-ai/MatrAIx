  career_goals: Although retired from full‑time teaching, Sonia aims to leave a lasting educational legacy in Lakeland. She plans to develop intergenerational learning workshops that pair seniors with schoolchildren
    for joint gardening and storytelling projects. She also hopes to write a memoir chronicling her teaching journey and the evolution of classroom practices over the past four decades. Additionally, Sonia
    is pursuing a horticulture certificate to deepen her garden expertise and aspires to serve on the board of the local library’s literacy program, guiding strategic outreach to underserved neighborhoods.
