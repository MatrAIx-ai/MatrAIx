personas:
  professional: Marcus Simon, a seasoned project manager with over fifteen years of experience leading manufacturing and nonprofit initiatives, blends meticulous Agile and Waterfall planning with a collaborative,
    community-focused mindset rooted in service traditions, consistently delivering high-quality outcomes while adhering to structured routines and flexible problem-solving.
  sports: Marcus Simon, a devoted St Louis Cardinals fan, maintains fitness by joining a Friday night bowling league at Forest Park Lanes, taking regular walks through Forest Park, and playing in a seasonal
    community soccer league, and they relish the camaraderie of team sports.
  arts: Marcus Simon, a weekend pianist, regularly attends live performances at the historic Jazz St Louis club, draws inspiration from Miles Davis, John Coltrane, Nina Simone, and recommends novels by
    James Baldwin and Toni Morrison, and they weave these artistic experiences into their problem-solving and community storytelling.
  travel: Marcus Simon, who prefers meticulously planned trips, enjoys weekend getaways to New Orleans for its vibrant jazz scene, family road trips to the historic monuments of Washington, D.C., and annual
    visits to the scenic Ozark hills, and they balance cultural immersion with the comfort of familiar routines.
  culinary: Marcus Simon, an avid home cook who tends a vegetable garden, delights in preparing soulful dishes such as collard greens slow-cooked with smoked turkey, sweet potato casserole topped with pecans,
    and a hearty gumbo brimming with okra and Andouille sausage, and they relish sharing these meals with family on Sundays.
  core: Marcus Simon, a methodical 40-year-old who blends disciplined project management with a love for jazz, gardening, and soulful cooking, navigates life with steady routines, a habit of humming classic
    blues while reviewing spreadsheets, and they occasionally over-schedule their day.
background:
  cultural: Marcus is a second‑generation African‑American raised in St. Louis County. He grew up immersed in the city’s rich musical heritage, especially jazz and blues, and participated in the local church
    community, which emphasized service and fellowship. His family traditions include celebrating Juneteenth and supporting local civil‑rights initiatives. This cultural grounding informs his collaborative
    work style, his commitment to community‑focused projects, and his appreciation for storytelling and history.
