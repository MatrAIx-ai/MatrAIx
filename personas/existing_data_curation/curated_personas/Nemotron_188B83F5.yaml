  career_goals: Marcus aims to advance to a senior program manager or director of Project Management Office within the next five years, overseeing enterprise-wide initiatives that drive operational efficiency
    and community impact. He plans to obtain PMP and Lean Six Sigma Black Belt certifications, mentor junior project managers, and lead corporate social responsibility projects that align with his commitment
    to community development and employee well‑being.
