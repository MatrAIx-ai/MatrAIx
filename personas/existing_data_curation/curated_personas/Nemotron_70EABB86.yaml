  career_goals: During his retirement, Don aims to deepen his artistic practice by completing a series of thirty watercolor paintings that depict the seasonal changes of the Virginia countryside, with the
    goal of exhibiting them at the regional senior arts showcase. He aspires to publish a chapbook of his poems and reflective essays, capturing his lifelong curiosity about abstract ideas and personal
    history. He plans to expand the local historical archive he helped build, digitizing records for broader access. Additionally, he hopes to mentor at least two emerging artists from the Clark‑Clarksville
    community center, sharing his techniques and encouraging independent creative exploration. Finally, he envisions traveling to the Smithsonian American Art Museum and the National Museum of the American
    Indian to draw inspiration for new works.
