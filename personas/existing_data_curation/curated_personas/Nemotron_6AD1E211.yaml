  career_goals: At 83, Herbert’s ambitions focus on staying mentally sharp, physically active, and socially connected in ways that suit his reserved nature. He aims to complete a written memoir that captures
    his family’s history and local Midwestern heritage, contribute regularly to the Sanford Historical Society, and mentor his grandchildren and neighborhood teens in practical skills such as woodworking
    and basic budgeting. He also aspires to maintain his health through regular walks and a balanced diet, and to support his wife by sharing household responsibilities and planning low‑key family gatherings.
