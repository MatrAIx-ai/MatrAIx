personas:
  professional: John Kee, a retired handyman turned senior‑center volunteer, applies decades of home‑repair and automotive troubleshooting expertise to mentor fellow retirees in DIY projects, balancing
    a pragmatic, hands‑on approach with a relaxed, flexible attitude that lets them adapt to changing group needs without rigid planning.
  sports: John Kee enjoys low‑impact exercise, strolling the Bronx River trail and playing weekly pickleball at the local senior center, while cheering on the New York Knicks in winter and the New York
    Yankees during baseball season, and occasionally joins a community bowling league on Saturdays.
  arts: John Kee finds solace in classic jazz, spinning records by Duke Ellington, Count Basie, and Ella Fitzgerald while photographing street murals and natural scenes during walks, and they occasionally
    attend free community theater performances at the Bronx Museum.
  travel: John Kee dreams of road‑tripping to historic East Coast landmarks such as Philadelphia’s Independence Hall and Boston’s Freedom Trail, preferring flexible itineraries that allow spontaneous stops
    at small towns, but budget considerations often make them postpone trips until a discount airline fare appears.
  culinary: John Kee delights in garden‑to‑table cooking, whipping up a simple pasta sauce with freshly harvested heirloom tomatoes, basil, and garlic, while also perfecting classic comfort foods like chicken
    pot pie and meatloaf—though they occasionally over‑salt a dish when distracted by a jazz tune.
  core: John Kee blends a handyman’s pragmatism with a gardener’s patience, navigating retirement with relaxed curiosity, occasional disorganization, a love for jazz, and a habit of leaving tools scattered
    across the workshop.
background:
  cultural: John is a white male raised in the Bronx during the post-war era. His family background is rooted in the working-class neighborhoods of the borough, with a blend of Irish and Italian heritage
    and a Catholic upbringing. Growing up in a culturally diverse area, he developed an appreciation for the mosaic of traditions that surround him, while his own family emphasized values of hard work,
    community solidarity, and modesty. These influences shape his practical outlook, his love for neighborhood gatherings, and his willingness to adapt to new ideas while respecting established customs.
