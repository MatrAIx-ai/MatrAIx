  career_goals: Although retired, John aims to stay active and purposeful. He plans to expand his volunteer work at the Bronx community center, mentoring younger seniors in DIY projects and basic digital
    literacy. He hopes to travel to historic sites along the East Coast, deepen his knowledge of American history, and perhaps take a short road trip to visit relatives. Maintaining his health through regular
    walks and low-impact exercise is a priority, as is learning a new hobby like photography to capture his neighborhood's changing landscape.
