personas:
  professional: A budding junior coder and LEGO engineer, Franklin Gilchrist channels their curiosity and practicality into building programmable LEGO robots and designing simple Scratch games, balancing
    meticulous planning with the flexibility to tinker when ideas evolve.
  sports: Franklin Gilchrist darts onto the local soccer field for the Lewisburg Youth Soccer Club in the fall, cycles the rugged trails of the Susquehanna River Valley in spring, cheers for the Penn State
    Nittany Lions and the Pittsburgh Steelers, and keeps a balanced fitness routine by mixing team drills with solo hikes in state parks.
  arts: Franklin Gilchrist loses themselves drawing comic‑style heroes inspired by Stan Lee and Jack Kirby, swaps playlists of pop‑rock hits from Taylor Swift, Billie Eilish, and Ed Sheeran while building
    LEGO dioramas, and spends weekends at the Lewisburg Community Center’s art workshops where they experiment with watercolor and digital illustration.
  travel: Franklin Gilchrist prefers action‑packed road trips that blend family bonding with hands‑on discovery, having camped under the stars in Shenandoah National Park, explored the historic streets
    of Philadelphia’s Independence Hall, and dreamed of hiking the Appalachian Trail from the east, all while budgeting trips around school breaks and weekend allowances.
  culinary: Franklin Gilchrist loves cheesy pepperoni pizza, buttery garlic bread, and classic mac and cheese, but also enjoys mixing trail‑mix with almonds, dried cranberries, and the occasional gummy
    beetle from their bug collection, and can proudly claim the title of "official brownie maker" after mastering a simple chocolate chip brownie recipe.
  core: Franklin Gilchrist is an adventurous, organized tinkerer whose love for LEGO, code, and insects fuels a boundless curiosity, even if they sometimes forget their homework for a new game or lose track
    of their soccer cleats.
background:
  cultural: Franklin was raised in a middle‑class, predominantly white family in Lewisburg, Pennsylvania, a small college town with Appalachian roots. The community values education, outdoor recreation,
    and local traditions such as county fairs and community service. His family’s heritage includes German and Irish ancestry, and he has been exposed to both modern suburban life and the rural farming
    landscapes that surround the town, shaping a blend of contemporary and regional cultural influences.
