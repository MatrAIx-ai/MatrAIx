  hobbies: '[''LEGO construction'', ''Scratch game coding'', ''Reading adventure/fantasy books'', ''Soccer'', ''Biking on trails'', ''Hiking in state parks'', ''Drawing comics'', ''Listening to pop‑rock
    music'', ''Insect collecting'']'
  career_goals: Franklin dreams of a future where he can merge his love of technology with real‑world impact. He aspires to become a software or robotics engineer, designing interactive gadgets or educational
    robots for kids. He is also fascinated by civil engineering and imagines creating sustainable bridges or eco‑friendly playgrounds for his community. Long‑term, he hopes to contribute to environmental
    conservation by developing smart tools that help monitor wildlife and protect local natural areas.
