  hobbies: '[''Classic car restoration'', ''Fishing'', ''Woodworking'', ''Attending car shows'', ''Local sports coaching'', ''Barbecue grilling'', ''DIY home improvement'', ''Reading automotive magazines'',
    ''Camping'']'
  career_goals: Turner aims to become a master ASE‑certified technician, adding advanced certifications in hybrid and electric vehicle technology. He aspires to move into a shop management role where he
    can implement systematic workflow improvements and mentor apprentices, sharing his methodical expertise. Long‑term, he envisions opening his own family‑run automotive repair shop that specializes in
    both traditional diesel trucks and emerging electric drivetrains, allowing him to blend his competitive drive with practical entrepreneurship while maintaining a reliable service reputation in Waterloo.
