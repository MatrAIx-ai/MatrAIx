persona_description: A petroleum engineer who works for a major oil company or an independent oil exploration and production company. They are responsible for exploring and drilling for oil and gas, and
  for efficient production. They are employed by the major oil companies and by the hundreds of small, independent oil exploration and production companies. They are also employed by drilling equipment
  manufacturers and suppliers, engineering consulting firms, and independent consulting engineers. They work in California, Louisiana, Oklahoma, and Texas, and overseas for U.S companies and foreign governments.
  They are involved in dirty and sometimes dangerous work, and their assignments can make family life difficult. They have a bachelor's degree in engineering and a graduate degree in engineering is necessary
  for most teaching and research positions and for many management jobs. They are supervised by an experienced engineer or in a company training program until they become acquainted with the requirements
  of a particular company or industry.
