  hobbies: '["woodworking", "metalworking", "fishing", "classic car restoration", "electronics tinkering", "gardening", "watching baseball", "listening to classic rock", "reading war history"]'
  career_goals: At 63, Michael aims to transition into a supervisory or lead‐technician role that allows him to share his practical knowledge while reducing the physical strain of daily machine handling.
    He hopes to earn a shift‑lead position, obtain a formal maintenance certification, and mentor the next generation of operators. Long‑term, he would like to secure a stable retirement by achieving a
    safety‑record award for zero incidents and, if possible, start a small side workshop offering repair services for local farms and hobbyists.
