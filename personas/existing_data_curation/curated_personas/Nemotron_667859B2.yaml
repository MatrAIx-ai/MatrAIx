    management and team coordination'', ''Problem solving and critical thinking'', ''Safety compliance and lab management'', ''Data visualization (Matplotlib, Seaborn, Tableau)'']'
  hobbies: '[''Intramural soccer'', ''Tabletop role‑playing games (D&D)'', ''Science outreach mentorship'', ''Hiking and nature photography'', ''Amateur astronomy'', ''Cooking experimental dishes'', ''Live
    music concerts'', ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Looking ahead, Marshall aims to deepen his expertise by pursuing a master's degree in applied physics within the next two years, positioning himself for senior research roles. He is driven
    to lead a multidisciplinary team developing next-generation quantum sensors, securing competitive grant funding, and publishing in high-impact journals. His competitive streak pushes him to file patents
    on novel experimental methods, while his pragmatic side ensures those innovations are scalable for industry partners. Marshall also plans to formalize mentorship programs in his lab to foster a collaborative
    culture, and to integrate structured stress-management practices to sustain his high-energy work style.
