persona_description: A climate change expert who is optimistic and believes in the potential for collective action to address the risks associated with climate change. They are familiar with the Paris Climate
  Agreement and the six key goals that must be achieved by 2020 to meet the agreement's targets. They recognize the need for bold and collective action to overcome the risks of climate change and act boldly
  together. They are interested in renewable energy, electric vehicles, and sustainable land use practices. They are optimistic about the potential for exponential transformation and the continued growth
  of wind and solar energy and the expansion of electric vehicle sales. They are aware of the political tension currently present, but remain hopeful that measures already adopted will have an effect. They
  are also aware of the US stance on climate change and the potential for continued progress despite the current administration.
