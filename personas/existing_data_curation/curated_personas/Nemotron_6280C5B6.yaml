personas:
  professional: Wilma Garbers, a seasoned IT support specialist with two decades of experience across Windows, macOS, and Linux environments, channels their curiosity and methodical precision into crafting
    clear documentation and leading process‑improvement initiatives, while their organized, reliable nature ensures timely resolution of complex tickets in ServiceNow and JIRA.
  sports: Wilma Garbers stays fit by hiking Umstead State Park trails and joining the Raleigh Bird‑Watchers’ Hiking Group, while cheering for the Carolina Hurricanes in winter and the Carolina Panthers
    in fall, and they occasionally play catch‑up softball with the Oakwood Community League during spring weekends.
  arts: Wilma Garbers intertwines their love for watercolor landscapes with a regular habit of attending Raleigh Community Theatre’s productions of classics like A Streetcar Named Desire, while their artistic
    palate delights in the works of Monet, the lyrical prose of Maya Angelou, and the soulful jazz of Billie Holiday, all of which inform both their creative hobby and their appreciation for cultural history.
  travel: Wilma Garbers prefers thoughtfully planned trips that blend cultural immersion and gentle adventure, having explored the colonial streets of Williamsburg, the art museums of Florence and the Louvre,
    and the Appalachian Trail’s low‑elevation sections, while they dream of a future road‑trip through the blue‑ridge mountains of North Carolina and a leisurely week‑long stay at a vineyard cottage in
    Napa Valley.
  culinary: Wilma Garbers enjoys cooking Southern comfort cuisine with a contemporary twist, often preparing shrimp‑and‑grits with smoked paprika, collard greens sautéed with quinoa and garlic, and sweet
    potato pie spiced with ginger and nutmeg, all while favoring fresh herbs such as basil and thyme that they grow in their own garden.
  core: Wilma Garbers is a methodical tech‑savvy gardener who balances a love for historic literature and watercolor art with a tendency to over‑schedule community commitments, occasionally sacrificing
    sleep for late‑night ticket triage.
background:
  cultural: Wilma grew up in a middle‑class white family in the Mid‑Atlantic region before relocating to Raleigh, North Carolina in her early twenties for work. Her upbringing reflects Southern American
    cultural values of hospitality, community involvement, and self‑reliance, shaped by church participation and a strong emphasis on education. Although she identifies as culturally mainstream American,
    her graduate studies in arts and humanities have instilled a deep appreciation for literature, history, and the visual arts, which she weaves into her personal life and professional perspective.
attributes:
  skills: '["Technical troubleshooting", "Hardware and software support", "Network configuration", "Operating systems (Windows, macOS, Linux)", "Ticketing systems (ServiceNow, JIRA)", "Remote support tools
    (TeamViewer, LogMeIn)", "User training and documentation", "Process improvement", "Project coordination", "Cross‑disciplinary communication", "Digital archiving", "Data backup and recovery"]'
  hobbies: '["Gardening", "Hiking", "Bird‑watching", "Watercolor painting", "Community theater", "Reading historical fiction", "Reading literary nonfiction", "Volunteer tech tutoring", "Cooking", "Knitting"]'
  career_goals: Wilma aims to transition into an IT service management role within the next three years, focusing on building training programs that integrate technology with arts and humanities contexts.
    She aspires to become a senior manager or consultant who can guide non‑profit cultural institutions in digital transformation, enhance accessibility, and develop robust knowledge‑base systems. Additionally,
    she plans to earn certifications such as ITIL and PMP to solidify her leadership credentials and deepen her strategic impact on organizational technology initiatives.
