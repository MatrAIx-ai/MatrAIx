  career_goals: Although retired from formal employment, Erika aims to continue contributing to her community by leading cooking workshops at the local senior center, preserving her cultural heritage for
    younger generations. She plans to compile a family cookbook that documents traditional recipes and stories. Erika also hopes to mentor Mexican‑American youth in the area, helping them navigate bilingual
    education and cultural identity. Finally, she wishes to travel to her ancestral hometown in Mexico for a family reunion and to deepen her connection to her roots.
