persona_description: A person who is concerned about the stigma and shame associated with mental health issues and wants to break free from it. This person may have experienced or witnessed mental health
  issues in themselves or close family members and has a deep understanding of the impact of stigma on mental health. They are motivated to educate others about mental health and the importance of seeking
  help, and they are willing to share their own experiences to help others feel less isolated and ashamed. This person may be a mental health advocate, a therapist, a counselor, or a mental health educator
  who wants to make a difference in the lives of those struggling with mental health issues.
