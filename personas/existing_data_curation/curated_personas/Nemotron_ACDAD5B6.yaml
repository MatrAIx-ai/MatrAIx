    performances'']'
  career_goals: She often says she wants to become a teacher who tells stories, an artist who paints pictures of mountains and animals, or a wildlife explorer who helps protect the animals she loves. Her
    ambition is rooted in her love for learning, sharing ideas, and being a friendly presence for others.
