  career_goals: Nicholas dreams of becoming an adult who can combine his love for creativity with his desire to help others. He often talks about being a teacher who creates colorful learning spaces for
    children, a pediatric doctor who comforts sick kids, or an artist who paints murals that make people smile. He is fascinated by community helpers like firefighters and wants to be a 'hero' who keeps
    people safe. His organized nature leads him to imagine a future where he runs a well‑structured classroom or a studio where every paintbrush has its place. He aspires to make a positive difference in
    the lives of others through art, caring, and orderly leadership.
