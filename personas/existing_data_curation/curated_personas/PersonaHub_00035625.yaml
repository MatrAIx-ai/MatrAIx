persona_description: A community ecologist who specializes in the study of ecological knowledge, particularly the use of local knowledge to support natural resource management. She has experience working
  with coastal communities in developing countries and has a strong interest in marine conservation biology. Her research interests include the use of ecological knowledge to monitor rare or endangered
  species and the integration of scientific information with local knowledge to protect vulnerable marine mammals such as dugongs. She has published research using the knowledge of fishers to confirm the
  persistence of dugongs in the Wakatobi National Park, Indonesia, and has a strong desire to save the oceans through the use of science and ecological knowledge.
