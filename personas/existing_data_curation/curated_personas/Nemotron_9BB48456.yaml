    (BLS) certified'']'
  hobbies: '[''Painting'', ''Photography'', ''Reading speculative fiction'', ''Playing acoustic guitar'', ''Community theater improv'', ''Ballet folklorico dancing'', ''Cooking experimental Mexican cuisine'',
    ''Gardening'', ''Participating in local basketball league'', ''Volunteering in health outreach events'', ''Exploring avant‑garde art installations'']'
  career_goals: Kristian aspires to advance his nursing credentials by completing a Bachelor of Science in Nursing and eventually becoming a Nurse Practitioner specializing in community health. He envisions
    leading a culturally focused health outreach program in San Antonio that blends traditional Mexican healing practices with modern evidence‑based care. Long‑term, he hopes to assume a director‑of‑nursing
    position at a community health center, where he can shape policies that improve access for underserved Hispanic populations. Additionally, he aims to develop an interdisciplinary art‑therapy initiative
    for patients with chronic illnesses, leveraging his passion for creativity to enhance patient well‑being.
