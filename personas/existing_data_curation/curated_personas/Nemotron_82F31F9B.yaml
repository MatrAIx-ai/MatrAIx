  hobbies: '[''Karaoke with friends'', ''Mahjong games at community center'', ''Weekly Tai Chi in Riverside Park'', ''Experimenting with fusion Korean-Chinese cooking'', ''Balcony herb and ornamental gardening'',
    ''Calligraphy practice'', ''Photography walks around Flushing'', ''Knitting and quilting'', ''Exploring new tech apps and video chat'', ''Attending cultural festivals and community events'']'
  career_goals: Even though she is officially retired, Jingmei aims to deepen her impact on the Flushing community. She hopes to launch an intergenerational oral‑history project that records the stories
    of immigrant seniors and shares them in local schools. She aspires to publish a memoir that weaves together her family's migration narrative with reflections on cultural identity. Jingmei also seeks
    to become a senior mentor for new volunteers, offering guidance on cultural sensitivity and event coordination. In addition, she plans to undertake a short certification in gerontology to better advocate
    for age‑friendly public spaces. Her ultimate ambition is to ensure that the rich traditions of both Korean and Chinese heritage are preserved and celebrated for future generations.
