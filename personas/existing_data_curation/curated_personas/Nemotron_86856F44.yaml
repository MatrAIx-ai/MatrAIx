personas:
  professional: Todd Miller, a seasoned postsecondary humanities instructor, designs interdisciplinary curricula that fuse classic literature, cultural theory, and digital media while mentoring students
    with a relaxed yet adaptable style that balances curiosity and practicality, even as they juggle grant proposals and departmental expectations amid occasional disorganized paperwork.
  sports: Todd Miller, a regular at the Bethpage State Park hiking trails and a pick‑up basketball player at the local community center, cheers for the New York Knicks and the New York Rangers, belongs
    to a weekend running club that meets at Flushing Meadow Park, and balances a love of competition with a laid‑back approach to fitness, often opting for a casual game over a structured workout.
  arts: Todd Miller, an improv theater enthusiast who collects vintage vinyl ranging from David Bowie to Sun Ra, curates monthly book‑discussion circles featuring contemporary poets like Ocean Vuong, and
    regularly visits MoMA to admire works by Kehinde Wiley, while they also dabble in street photography inspired by Henri Cartier‑Bresson, weaving these artistic pursuits into their teaching and social
    life.
  travel: Todd Miller, a fan of cultural festivals, has trekked to the Edinburgh Fringe, danced through New Orleans' Mardi Gras, and explored the street food scene of Mexico City, while they plan future
    trips to Kyoto for its tea ceremonies and Reykjavik for its midnight‑sun festivals, preferring a blend of spontaneous city wanderings and carefully scheduled photography workshops.
  culinary: Todd Miller, an adventurous home cook, frequently experiments with Thai green curry, Ethiopian injera seasoned with berbere, and Argentine empanadas, sourcing spices from a local ethnic market,
    enjoys pairing each dish with a carefully selected vinyl record, though they occasionally over‑salt a sauce after a late‑night brainstorming session.
  core: Todd Miller, a sociable 41‑year‑old humanities professor, balances a love for improv theater, pick‑up basketball, global cooking, and vintage vinyl with a relaxed, sometimes disorganized approach
    to work and finances, turning curiosity into collaborative classroom experiences while occasionally forgetting a deadline.
background:
  cultural: Todd grew up in a middle‑class suburban community on Long Island, where a blend of traditional American suburban values and the cultural dynamism of nearby New York City shaped his worldview.
    His upbringing emphasized the importance of education, community involvement, and openness to diverse perspectives. While identifying with a broader white American cultural heritage, he has been influenced
    by the multicultural environment of the greater New York region, fostering a respect for varied artistic and intellectual traditions that he brings into his teaching and personal life.
attributes:
  skills: '[''Curriculum development'', ''Interdisciplinary teaching'', ''Public speaking'', ''Academic advising'', ''Student mentorship'', ''Scholarly research and writing'', ''Grant proposal writing'',
