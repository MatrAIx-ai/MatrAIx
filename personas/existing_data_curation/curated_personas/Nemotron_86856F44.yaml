  hobbies: '[''Pick‑up basketball'', ''Improv theater'', ''Hiking'', ''Contemporary fiction and poetry reading'', ''Book‑discussion gatherings'', ''Experimental cooking'', ''Vinyl record collecting'', ''Traveling
    to cultural festivals'', ''Street photography'']'
  career_goals: Todd aims to achieve tenure within the next three years while expanding his scholarly footprint through a monograph on the intersection of literature and digital culture. He envisions establishing
    a digital humanities lab that offers students hands‑on experience with new media tools. His long‑term ambition includes leading community outreach initiatives that bring humanities education to local
    schools and adult learners, and eventually serving as department chair to shape the strategic direction of the humanities program at his college.
