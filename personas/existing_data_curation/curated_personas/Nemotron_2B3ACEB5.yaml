personas:
  professional: Jaya Rehman, a 32‑year‑old cardiac imaging specialist, blends precise echocardiography expertise with a flair for creative workflow design, leveraging their data‑analysis skills and sociable
    demeanor to streamline cardiac diagnostics while mentoring junior staff.
  sports: Jaya Rehman fuels fitness through regular yoga sessions, joins a weekend basketball league in Queens, follows the New York Knicks and Rangers avidly, and also trains with the local Queens United
    Soccer Club during the spring, balancing competitive spirit with a love for group exercise.
  arts: Jaya Rehman thrives on New York’s art scene, attending openings featuring works by Kehinde Wiley and street pieces by Banksy, reveling in live performances by Kamasi Washington, improvising on stage
    with a local theater troupe, and channeling cultural rhythm through beginner Bollywood dance classes they teach.
  travel: Jaya Rehman prefers a blend of spontaneous weekend getaways and carefully planned art pilgrimages, having explored the vibrant streets of Kingston, Jamaica, the museums of Barcelona, and the temples
    of Kyoto, while dreaming of a future retreat in the Maldives to capture sunrise photography.
  culinary: Jaya Rehman, an adept home chef, whips up inventive fusion meals like tikka‑masala jerk chicken tacos and mango‑coconut lassi, relishes experimenting with spices such as garam masala and all‑spice,
    and often hosts dinner parties where friends sample her creatively plated plates.
  core: Jaya Rehman is a 32‑year‑old cardiac imaging virtuoso who balances meticulous science with vibrant artistry, navigating anxiety with mindfulness while constantly seeking new cultural, culinary,
    and creative adventures.
background:
  cultural: Jaya is a first‑generation American of South Asian descent, with family roots in India. Growing up in the multicultural neighborhood of Jamaica, Queens, she blends Indian traditions—celebrating
    Diwali, Holi, and cooking family recipes—with the diverse cultural fabric of New York City. She speaks fluent English and conversational Hindi, and she participates in both local South Asian community
    events and broader neighborhood activities, fostering a hybrid identity that values heritage while embracing the eclectic influences of her urban environment.
attributes:
  skills: '[''Transthoracic Echocardiography (TTE)'', ''Transesophageal Echocardiography (TEE)'', ''Cardiac Stress Test Administration'', ''Invasive Cardiovascular Catheterization Assistance'', ''Electrocardiogram
    (ECG) Interpretation'', ''Cardiac Imaging Equipment Maintenance'', ''Quality Control and Regulatory Compliance'', ''Statistical Data Analysis (R, Python)'', ''Medical Research and Technical Writing'',
    ''Patient Education and Communication'', ''Team Leadership and Project Management'', ''Creative Workflow Optimization'']'
  hobbies: '[''Visiting art galleries and museums'', ''Live music and theater performances'', ''Fusion cooking (Indian‑Caribbean dishes)'', ''Yoga and mindfulness meditation'', ''Street photography in Queens'',
    ''Improv comedy workshops'', ''Volunteering at community health fairs'', ''Teaching beginner Bollywood dance'', ''Reading modern art literature'', ''Journaling for emotional processing'']'
  career_goals: Jaya aims to become a senior cardiac imaging specialist, obtaining advanced certifications such as Registered Cardiac Sonographer (RCS) and pursuing a master's degree in health informatics
    to blend AI with cardiovascular diagnostics. She aspires to lead a cardiac technology department at a major hospital, develop culturally sensitive screening protocols for South Asian patients, and contribute
    to research on heart disease disparities. Long‑term, she envisions establishing a community outreach program in Queens that educates underserved populations about cardiovascular health, using visually
    engaging resources that reflect her artistic interests.
