  hobbies: '[''drawing and coloring'', ''building LEGO structures'', ''exploring nature in parks and backyard'', ''listening to library storytime'', ''watching science and history cartoons'', ''playing
    soccer and tag with friends'', ''visiting art and natural‑history museums'', ''participating in community festivals'']'
  career_goals: Inspired by his love of space, dinosaurs, and art, Patrick dreams of becoming an astronaut who explores distant planets or a museum curator who creates interactive exhibits. He also imagines
    himself as a teacher who shares exciting stories and hands‑on activities with younger kids. His ambitions reflect a desire to discover new things, create inspiring visual works, and help others learn.
