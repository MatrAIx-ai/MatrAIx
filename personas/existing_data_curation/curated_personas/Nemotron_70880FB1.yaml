  hobbies: '[''Watercolor painting'', ''Sketching plants'', ''Birdwatching'', ''Nature photography'', ''Home vegetable gardening'', ''Canning and preserving'', ''Reading (art history, ecology)'', ''DIY
    sustainable projects'', ''Local art workshops'', ''Walking trails'']'
  career_goals: Jennifer aims to earn a professional horticulture certification and move into a supervisory role within the Sheboygan County Parks Department or a private landscaping firm. In the next five
    years she hopes to launch a boutique eco-landscaping business that specializes in native-plant gardens and incorporates community art installations. She also plans to mentor new entrants to the field,
    advocating for mental-wellness practices that help workers manage stress. Continuing education through online landscape architecture courses is a priority, as is building partnerships with local schools
    for educational garden projects.
