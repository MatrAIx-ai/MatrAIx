personas:
  professional: Jennifer Warner, a 43‑year‑old landscape specialist, blends hands‑on equipment mastery with a horticultural certification pursuit, using their curiosity for native plants and artistic eye
    to design eco‑friendly gardens while assertively leading small crews despite a lingering worry about perfection.
  sports: Jennifer Warner finds fitness in regular hikes along Cedar Grove trails and summer kayaking on Lake Michigan, roots for the Milwaukee Brewers and Green Bay Packers, and joins a local adult cross‑country
    skiing club each winter, preferring low‑impact activities that double as creative brainstorming sessions.
  arts: Jennifer Warner cultivates an artistic side through watercolor studies of wildflowers inspired by Claude Monet, bird photography echoing Ansel Adams, frequent visits to the Sheboygan Art Museum,
    and occasional evenings listening to the piano‑driven ambience of The Piano Guys while sketching garden layouts.
  travel: Jennifer Warner plans their trips with meticulous research, favoring short weekend drives to Midwestern gems like Mackinac Island, Hocking Hills State Park, and the Canadian Shield’s Algonquin
    Provincial Park, but dreams of a spring gardening tour of Kyoto’s historic tea gardens, balancing limited budget constraints with a craving for fresh horticultural inspiration.
  culinary: Jennifer Warner, an intermediate home cook, prefers farm‑to‑table meals featuring heirloom tomatoes, fresh herbs they grow, and seasonal produce, often preparing roasted beet and goat‑cheese
    salads, herb‑infused focaccia, and canning pepper relish to share with neighbors, and they never say no to a slice of homemade apple crumble with nutmeg.
  core: Jennifer Warner, 43, is a detail‑obsessive, nature‑loving landscape designer who merges art and ecology, worries about tiny imperfections, yet finds peace in solitary garden creation and quiet lake
    photography.
background:
  cultural: Jennifer is a third-generation white Midwesterner whose family roots trace back to German and Scandinavian immigrants who settled in Sheboygan County in the early 1900s. She grew up in Cedar
    Grove, a close-knit farming community, attending a Lutheran church and taking part in regional traditions like the cheese festival, county fair, and community potlucks. The cultural emphasis on hard
    work, modesty, and respect for the natural landscape shaped her practical outlook, while her personal curiosity led her to explore broader artistic and ecological ideas beyond her hometown. Her ties
    to local volunteer initiatives, such as the community garden program and the township’s fire department outreach, reflect a strong sense of neighborly responsibility.
