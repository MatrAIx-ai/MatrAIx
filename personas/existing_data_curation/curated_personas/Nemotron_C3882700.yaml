personas:
  professional: Juan Reyes, an aspiring digital illustrator and comic creator who channels a curious, organized mindset into meticulously planned storyboard drafts, balancing schoolwork with weekly art
    club sessions, and approaching each panel with a competitive drive to refine technique.
  sports: Juan Reyes, a competitive midfielder for the Eastside Youth Soccer Club, trains twice a week, cheers for the regional pro team City United FC during the season, and treats each match as a tactical
    puzzle, preferring intense sprint drills over friendly scrimmages.
  arts: Juan Reyes, an avid comic‑style illustrator, draws inspiration from graphic novelists like Alan Moore and Junji Ito, studies street murals by Banksy and Os Gemeos, and attends local gallery openings
    that showcase contemporary Latin American art, blending traditional folklore motifs with modern visual storytelling.
  travel: Juan Reyes, who dreams of exploring vibrant urban art districts, has visited the historic murals of Oaxaca, plans a weekend road trip to the national park in the nearby mountains, and hopes to
    attend a summer art residency in Barcelona to broaden cultural horizons.
  culinary: Juan Reyes, an adventurous teen cook, loves making tacos al pastor with pineapple salsa, perfects homemade churros sprinkled with cinnamon sugar, and experiments with avocado toast topped with
    queso fresco, watching cooking tutorials while humming to Lila Downs and Bad Bunny.
  core: Juan Reyes blends a competitive soccer spirit with a meticulous, curiosity‑driven love for comic art, saving every spare peso for a drawing tablet while navigating teen acne, a love of street murals,
    and a habit of staying up late replaying video game mods.
background:
  cultural: Juan grew up in a Mexican‑American household in Spring, Texas, where Spanish is spoken at home and English at school. His family preserves traditions such as Día de los Muertos, quinceañera
    celebrations, and cooking dishes like tamales and pozole, fostering a strong connection to his Mexican roots. The vibrant murals and public art of nearby Houston have shaped his artistic sensibilities,
    while the multicultural environment of Montgomery County exposes him to a blend of Southern Texan and Hispanic cultures. This hybrid cultural identity informs his language use, artistic style, and community
    involvement, making him both proud of his heritage and eager to share it through his creative work.
