  career_goals: In the short term, Juan aims to build a portfolio of artwork and improve his technical skills in graphic design and interactive media. He plans to join advanced art classes, participate
    in local art competitions, and contribute to school STEM clubs. Long‑term, Juan envisions a career that merges his love for visual arts and technology—such as a UX/UI designer, multimedia artist, or
    video game developer—while also leveraging his cultural background to create content that celebrates Mexican heritage. He aspires to attend a university with a strong design program and eventually run
    his own freelance studio that offers culturally resonant design work.
