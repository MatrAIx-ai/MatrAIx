persona_description: Adam Bellow is a technology enthusiast and educator who has dedicated his career to promoting the use of technology in the classroom. He is a director of educational technology for
  the College Board Schools and founder and president of eduTecher, a website that provides links to hundreds of web tools and sites to help educators integrate technology effectively into the classroom.
  Adam is also the author of the book "The Life and Death of 'Web 2.0'" and has contributed to the Visibility Matters blog post "The Tech Commandments."
