personas:
  professional: Skylar Maynor, a retired homemaker turned senior‑center volunteer coordinator, uses decades of budgeting, scheduling, and interpersonal mediation skills to design intergenerational wellness
    workshops, while they are methodical and kind, ensuring projects stay organized and volunteers feel valued.
  sports: Skylar Maynor stays active through sunrise beach walks, senior dance classes at the community center, and weekly meet‑ups with the local Sunrise Strollers walking club, while they cheer on the
    Jacksonville Jaguars and Tampa Bay Rays on game days, and occasionally play shuffleboard with friends at the senior center.
  arts: Skylar Maynor immerses themselves in historical fiction by authors like Philippa Gregory and Ken Follett, they enjoy folk songs from John Denver and local acoustic performers at the senior center,
    attend community theater productions such as ‘Our Town’, and find inspiration in Georgia O'Keeffe's depictions of desert flora, which influences their knitting patterns and garden designs.
  travel: Skylar Maynor prefers low‑impact, well‑planned trips, having explored historic St. Augustine, Savannah, and a week‑long cruise to the Bahamas, they dream of tracing family roots with a genealogy
    tour of England and Ireland, and they favor staying at charming B&Bs that offer senior discounts and gentle walking tours.
  culinary: Skylar Maynor delights in cooking garden‑fresh meals like cucumber‑tomato salad with basil, grilled shrimp with lemon and garlic, and key‑lime pie made from locally sourced limes, they are an
    adept home cook comfortable with potluck dishes, yet they sometimes over‑season dishes due to a love for bold flavors.
  core: Skylar Maynor blends meticulous planning with gentle curiosity, turning garden rows and knitting needles into community bridges while occasionally hoarding yarn and forgetting to water indoor succulents.
background:
  cultural: Skylar grew up in a mid‑20th‑century white American family rooted in traditional values of hard work, community, and modesty. Raised in a small Midwest town before relocating to Florida in her
    later years, she carries a blend of Midwestern pragmatism and the relaxed, outdoors‑oriented lifestyle of coastal Florida. Her cultural identity includes a Protestant (likely Methodist) upbringing that
    emphasized church involvement and service. Over the decades, she has embraced the multicultural tapestry of New Smyrna Beach, participating in local festivals, supporting the arts, and maintaining a
    respect for the diverse backgrounds of her neighbors while preserving her own heritage of family gatherings, homemade meals, and seasonal holidays.
