  career_goals: Although retired, Skylar aims to continue contributing to her community by expanding her role as a volunteer organizer at the New Smyrna Beach senior center, where she hopes to develop new
    wellness and intergenerational programs. She also wishes to deepen her knowledge of local history and genealogy, planning to join a historical society and possibly author a short memoir of her life
    experiences. Maintaining physical health through regular walks on the beach and staying socially engaged remain central to her personal ambitions.
