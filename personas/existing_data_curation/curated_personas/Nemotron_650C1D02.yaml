personas:
  professional: A seasoned metal fabricator and CNC specialist, Mohammad Ndungu leverages his meticulous welding expertise, blueprint acuity, and habit of structured mentorship to pursue a foreman role
    while completing his Certified Welding Inspector certification.
  sports: A dedicated member of the local gym’s weight‑training club and a weekend participant in the Washington Capitals fan league’s pickup hockey games, Mohammad Ndungu also follows the Washington Wizards,
    watches classic car racing events, and maintains a low‑intensity routine of early morning walks in his garden to stay fit.
  arts: An avid aficionado of classic automobile and vintage aircraft design, Mohammad Ndungu spends evenings listening to the orchestral scores of Ennio Morricone while studying the engineering drawings
    of a 1962 Ferrari 250 GTO and a Spitfire, and occasionally attends the Smithsonian’s American Art Museum exhibit on mid‑century industrial design.
  travel: Preferring meticulously planned trips that blend historical depth with hands‑on experiences, Mohammad Ndungu has toured the aviation museums of Seattle, the car heritage sites of Detroit, and
    recently booked a quiet weekend retreat in Asheville’s Blue Ridge Mountains, all while keeping travel costs in check and avoiding crowded tourist hotspots.
  culinary: A pragmatic home cook, Mohammad Ndungu regularly prepares dishes like ugali with sukuma wiki, spiced grilled chicken marinated in cumin and coriander, and occasional beef stew with root vegetables,
    while often experimenting with resilient herb varieties such as rosemary and thyme from his garden to freshen his meals.
  core: Methodical, curiosity‑driven, and quietly resilient, Mohammad Ndungu blends a disciplined work ethic in metal fabrication with a love for vintage models, meticulous budgeting, and a calm, solitary
    approach to health and leisure.
background:
  cultural: Born to Kenyan parents who immigrated to the United States, Mohammad grew up in Washington, DC's vibrant multicultural neighborhoods. His family blends Kenyan Kikuyu traditions, including Swahili
    greetings and occasional preparation of dishes like ugali and sukuma wiki, with African American cultural influences common to the city. A practicing Muslim, he observes daily prayers and participates
    in community events at the local mosque. This hybrid heritage has instilled in him a deep respect for resilience, self‑reliance, and community mentorship, values he carries into both his professional
    and personal life.
attributes:
  skills: '[''welding (MIG, TIG, stick)'', ''metal fabrication'', ''CNC milling'', ''plastic injection molding'', ''blueprint reading'', ''equipment maintenance and troubleshooting'', ''quality inspection'',
    ''shop floor safety compliance'', ''inventory management'', ''project planning and workflow scheduling'', ''team mentoring'']'
  hobbies: '[''scale model building'', ''vintage electronics tinkering'', ''urban gardening'', ''reading technical manuals and documentaries'', ''small maker‑space meetups'', ''meditation'', ''chess'']'
  career_goals: Mohammad aims to transition from a skilled operator to a supervisory role, leveraging his organized and reliable reputation to become a foreman or workshop manager within the next three
    years. He is pursuing certification as a Certified Welding Inspector (CWI) and plans to complete a short‑term apprenticeship program to formalize his expertise. Long‑term, he hopes to launch a modest,
    owner‑operated custom metal‑work studio that serves local architects and interior designers in Washington, DC, allowing him to blend his curiosity for new design ideas with practical craftsmanship while
    securing financial stability for his post‑divorce life.
