  career_goals: Carlos aspires to earn a scholarship to a university where he can study either computer science or civil engineering, combining his curiosity for technology with his practical, methodical
    mindset. He dreams of designing accessible community spaces or developing mobile applications that support mental health for peers facing anxiety and stress. He also hopes to eventually give back to
    the Cuban-American community in Miami by mentoring younger students and helping his family achieve greater financial stability.
