personas:
  professional: Carlos Vaca, a high‑school tech enthusiast who blends methodical planning with creative flair, applies his budding Python programming and graphic design skills to craft simple games and
    polished class presentations, while reliably leading group projects and documenting every step in his daily journal.
  sports: Carlos Vaca, a passionate after‑school soccer player, coordinates pick‑up games with friends at the local park, follows Inter Miami’s matches religiously, and occasionally trains with his high‑school
    varsity squad, using his organized nature to track personal performance stats on a spreadsheet.
  arts: Carlos Vaca, a budding digital artist and avid reader, spends evenings crafting pixel‑perfect illustrations in Canva inspired by the vibrant rhythms of Bad Bunny and Luis Fonsi, while diving into
    the worlds of Brandon Sanderson and N.K. Jemisin, and curates a personal playlist that fuels his creative process.
  travel: Carlos Vaca, an inquisitive teen traveler, plans weekend getaways with his mom to nearby Florida beaches like Key West and dreams of a future cultural immersion trip to Havana, balancing careful
    budgeting with a love for spontaneous street‑food adventures.
  culinary: Carlos Vaca, an enthusiastic home‑chef, works side‑by‑side with his mother to master dishes such as Ropa Vieja, Tostones, and Lechón Asado, relishing the aroma of slow‑cooked pork and the tang
    of mojo sauce while honing his intermediate knife skills and experimenting with fresh cilantro and lime.
  core: Carlos Vaca, a detail‑driven teen who transforms nervous energy into organized coding projects and daily journaling, yet often stays up late binge‑watching reggaeton videos, sacrificing a solid
    night’s sleep.
background:
  cultural: Carlos was raised in a close‑knit Cuban‑American household in Miami's Little Havana neighborhood. At home, Spanish is spoken daily, and family gatherings are centered around traditional foods
    like ropa vieja and plantains. He participates in cultural celebrations such as Noche de San Juan and Carnaval, and his upbringing emphasizes respect for elders, strong family ties, and community solidarity.
    While attending school, he navigates a bilingual environment that blends his Cuban heritage with broader American influences, shaping his identity as a proud Cuban-American teen.
