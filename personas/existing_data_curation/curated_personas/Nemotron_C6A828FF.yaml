personas:
  professional: Erika Kelley, a retired chemical engineer and former pharmaceutical research scientist, leverages their meticulous analytical chemistry expertise, process‑optimization acumen, and calm problem‑solving
    style to mentor students and guide community projects with a structured, collaborative approach.
  sports: Erika Kelley enjoys daily beachfront walks, follows the Miami Dolphins during football season, and participates in a senior fitness group at the Fort Lauderdale senior center that meets for low‑impact
    water aerobics, reflecting a balanced, community‑oriented approach to staying active.
  arts: Erika Kelley finds creative fulfillment singing Gospel classics by Mahalia Jackson in her church choir, quilting inspired by traditional African‑American patterns, and reading historical fiction
    and African‑American literature by Toni Morrison and James Baldwin, while occasionally dancing to Celia Cruz salsa rhythms.
  travel: Erika Kelley prefers leisurely travel, often taking organized river cruises that explore historic Southern plantations and the literary landmarks of Dublin, and dreams of visiting the serene gardens
    of Kyoto, balancing limited mobility with a curiosity for cultural heritage.
  culinary: Erika Kelley, an accomplished home cook, delights in preparing soul‑food staples like seasoned collard greens, smoked turkey, and sweet potato pie, often incorporating heirloom tomatoes and
    fresh okra from their community garden, and enjoys sharing these meals at potluck gatherings.
  core: Erika Kelley blends a lifelong commitment to scientific rigor with a vibrant community spirit, juggling meticulous data spreadsheets while humming salsa steps, and occasionally hoards extra seed
    packets for future plant swaps.
background:
  cultural: Erika was born in 1941 in Jacksonville, Florida, into a close‑knit African‑American community that emphasized church, family, and mutual support. She attended Florida A&M University, where she
    was one of the few women in a STEM program, and graduated with a degree in chemical engineering. Her upbringing during the civil‑rights movement instilled a strong sense of social responsibility and
    resilience. Throughout her life she has been active in local Black cultural organizations, celebrating Juneteenth, supporting the preservation of African‑American history in Broward County, and participating
    in church‑based service projects. Her family’s roots trace back to the Gullah community of South Carolina, influencing her love for storytelling, traditional cooking, and rhythmic music. Erika identifies
    with Black feminist values and consistently mentors younger Black women pursuing scientific careers.
attributes:
  skills: '["Analytical chemistry", "Process optimization", "Regulatory compliance", "Laboratory safety management", "Curriculum development", "Mentoring", "Public speaking", "Data analysis (Excel, SPSS,
