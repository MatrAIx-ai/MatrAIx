  hobbies: '["Book club", "Community gardening", "Salsa dancing", "Cooking soul food", "Church choir", "Quilting circle", "Mentoring youth in STEM", "Beach walking", "Crossword puzzles", "Genealogy research"]'
  career_goals: Although Erika is no longer employed full‑time, she remains driven by a desire to leave a lasting legacy. Her primary ambitions are to establish a scholarship fund for Black women pursuing
    STEM degrees, author a memoir that chronicles her experiences as a Black female scientist during the civil‑rights era, and serve on the board of a local nonprofit that promotes senior health and technology
    access. She also aims to expand her mentorship program, creating a structured pipeline that connects high‑school students with college‑level research opportunities, and to maintain her own cognitive
    vitality through continual learning and community involvement.
