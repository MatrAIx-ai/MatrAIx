personas:
  professional: Juan Perez, a 59‑year‑old stationary engineer, leverages their meticulous maintenance scheduling, blueprint reading, and safety compliance expertise to lead shift teams with methodical precision,
    while mentoring apprentices and pursuing a Certified Stationary Engineer license to cement their legacy.
  sports: Juan Perez, a devoted baseball fan, roots for the New York Yankees while passionately cheering on the island’s national baseball team during international tournaments, and sustains their physical
    activity by fishing on weekends and joining a local adult softball league each spring.
  arts: Juan Perez enjoys salsa nights where they dance modestly to classic hits by Héctor Lavoe and modern reggaetón tracks by Bad Bunny, and occasionally attends performances at the local community theater,
    especially productions featuring Latin jazz legends like Tito Puente.
  travel: Juan Perez plans their travel meticulously, favoring annual visits to the island’s capital for family celebrations and weekend fishing trips to the Florida Keys, while dreaming of a relaxed road‑trip
    through New England’s coastal towns and a cultural pilgrimage to New York City’s Latin music festivals.
  culinary: Juan Perez, an adept home chef, regularly prepares arroz con gandules, pernil, and sautéed plantains using fresh cilantro and oregano from their garden, while occasionally treating themselves
    to a steak at a local Connecticut steakhouse for a change of pace.
  core: Juan Perez blends a lifetime of disciplined engineering precision with a warm, community‑centered spirit, yet habitually hoards spare‑part leftovers and can’t resist a nightly crossword puzzle before
    bed, a quirk they indulge in each night.
background:
  cultural: Juan’s Puerto Rican heritage remains a central part of his identity, even after many years living in Bridgeport, Connecticut. He grew up in a bilingual household, speaking Spanish at home and
    English at school, and he maintains strong ties with family members in Puerto Rico through regular phone calls and visits. Cultural traditions such as celebrating Three Kings Day, cooking classic island
    dishes, and listening to salsa, plena, and reggaetón music are woven into his daily life. He participates in local Puerto Rican community events, including the annual Fiesta Boricua parade, where he
    helps organize the booth for his neighborhood association. While he is never married, Juan values the close‑knit support network of extended family, cousins, and long‑time friends, and he often gathers
    with them for holiday meals that reinforce communal bonds. His cultural background also instills a strong work ethic and a resilient attitude, traits that have guided his long career as a stationary
    engineer.
attributes:
