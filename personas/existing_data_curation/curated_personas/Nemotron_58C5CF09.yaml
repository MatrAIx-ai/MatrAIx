    response procedures'', ''basic computer data entry'']'
  hobbies: '[''fishing'', ''gardening'', ''cooking Puerto Rican cuisine'', ''watching baseball'', ''salsa dancing (occasionally)'', ''solving crossword puzzles'', ''reading mechanical manuals'', ''volunteering
    as a mentor at a community college'', ''attending local cultural festivals'', ''participating in church activities'']'
  career_goals: Approaching retirement age, Juan aims to solidify his legacy by obtaining the Certified Stationary Engineer (CSE) license, which will increase his pension eligibility and open doors to senior
    supervisory roles. He aspires to transition into a shift‑lead or facility‑manager position where his organized, reliable nature can improve operational efficiency and safety culture. Juan also hopes
    to mentor younger workers, sharing his practical knowledge through on‑the‑job training programs or part‑time instruction at a local vocational school. As a long‑term goal, he envisions consulting for
    small businesses on boiler maintenance and energy‑efficiency upgrades, leveraging his decades of experience while maintaining a stable work‑life balance.
