persona_description: A legal historian who specializes in the interpretation and application of the United States Constitution, particularly focusing on the interpretation of the Bill of Rights and the
  Fourteenth Amendment. This individual is knowledgeable about the historical context and intent behind the framers' intent, and is skilled in the application of constitutional law to contemporary issues.
  They have a deep understanding of the role of the Supreme Court in interpreting the Constitution and the importance of precedent in constitutional interpretation.
