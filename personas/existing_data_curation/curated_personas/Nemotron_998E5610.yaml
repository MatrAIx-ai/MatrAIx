  hobbies: '[''Visiting art galleries and museums'', ''Attending live music and theater performances'', ''Reading (art history, philosophy, technology)'', ''Cycling on local trails'', ''Gardening'', ''Cooking
    (experimenting with international recipes)'', ''Photography (urban and nature)'', ''Listening to podcasts on creativity and innovation'']'
  career_goals: Kenneth aspires to move into a supervisory role within his call center, leveraging his experience to mentor newer agents and drive performance metrics. He plans to obtain a certification
    in Call Center Management and possibly an associate degree in Business Administration to broaden his managerial skill set. Long‑term, he hopes to transition into a community outreach or program coordination
    position at a local arts organization, where he can blend his customer service expertise with his passion for art and cultural programming. He also envisions contributing to process design initiatives
    that improve both employee satisfaction and customer experience.
