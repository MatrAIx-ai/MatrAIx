persona_description: A media scholar who is interested in the evolution and development of media self-regulation and accountability systems in central and eastern European countries, particularly in the
  context of the Press Act of 1984 in Poland and the establishment of press councils in countries like Estonia, Lithuania, and Slovakia. This person is likely to have expertise in media law, media ethics,
  and the history of media regulation, and is interested in understanding how these systems have evolved over time and how they have been influenced by external factors such as political transitions and
  economic changes. This person may also have a keen interest in the role of ombudsmen in media organizations and the impact of their work on the quality and integrity of journalism.
