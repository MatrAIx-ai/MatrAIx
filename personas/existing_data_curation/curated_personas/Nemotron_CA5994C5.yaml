  hobbies: '[''Reading comic books and adventure novels'', ''Building LEGO structures and engineering challenges'', ''Playing Minecraft with a focus on sustainable builds'', ''Collecting and observing insects'',
    ''Sketching cartoons'', ''Participating in small‑group LEGO challenges and library events'']'
  career_goals: Although still exploring possibilities, Keldrick dreams of a future where he can combine his love for discovery with practical impact. He imagines himself as an environmental scientist who
    designs simple devices to monitor local wetlands, or as a technology creator who builds educational games for kids. He is also intrigued by the idea of becoming an astronaut, fascinated by space exploration.
    His ambitions remain flexible; he values the ability to work both independently on projects he designs and collaboratively in small teams that share his curiosity.
