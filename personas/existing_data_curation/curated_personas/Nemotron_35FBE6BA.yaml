  career_goals: Nancy aims to progress into senior leadership within the next five years, targeting a Director or Vice‑President role where she can shape organizational strategy and champion interdisciplinary
    initiatives that merge technology with the arts. She is committed to building a culture of psychological safety, introducing mental‑wellness programs, and expanding mentorship pathways for women and
    underrepresented groups in STEM. To support these ambitions, she plans to pursue an executive MBA and spearhead a community partnership that integrates local arts programs with corporate innovation
    labs.
