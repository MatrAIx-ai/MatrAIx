  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Experimenting with multicultural cooking'', ''Community dance classes'', ''Attending local theater productions'', ''Weekend
    hiking in the Catskills'', ''Volunteering for home organization workshops'', ''Yoga and meditation'', ''Language exchange meetups'', ''Reading about interior design and sustainability'']'
  career_goals: Esther aims to obtain certification in green cleaning and secure a lead housekeeper position at a boutique hotel or upscale private estate within the next two years. She plans to complete
    an associate degree in hospitality management at a local community college, leveraging her curiosity about design and service excellence. Long-term, she aspires to launch her own eco-friendly cleaning
    business that integrates aesthetic consulting, offering clients both spotless environments and tasteful interior arrangements. Her compassionate nature drives her to incorporate community outreach,
    such as free organization workshops for low‑income families, into her future entrepreneurial venture.
