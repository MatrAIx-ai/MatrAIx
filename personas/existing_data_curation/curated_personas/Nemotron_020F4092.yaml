personas:
  professional: Esther Calso, a 25‑year‑old housekeeping professional in the Hudson Valley, blends meticulous deep‑cleaning expertise with an eco‑conscious mindset, leveraging their disciplined scheduling
    skills and compassionate client interaction to consistently exceed standards in boutique hotel settings while dreaming of a future aesthetic consulting venture.
  sports: Esther Calso, a 25‑year‑old who enjoys early‑morning hikes in the Catskills and occasional pick‑up soccer matches at the Hudson Valley FC community field, follows a balanced fitness routine that
    includes yoga sessions at the local studio and jogging to support stamina, while cheering for the New York Knicks and New York Mets, reflecting a seasonal, community‑oriented approach to exercise.
  arts: Esther Calso spends weekends immersing themselves in the Hudson Valley art scene, attending exhibitions featuring works by contemporary painters like Kehinde Wiley and Yayoi Kusama, and they regularly
    practice watercolor techniques inspired by the fluidity of Georgia O'Keeffe’s landscapes, while also supporting local theater productions starring actors such as Lin‑Manuel Miranda, which fuels their
    unconventional creative outlook.
  travel: Esther Calso plans travel with a mix of meticulous itineraries and spontaneous detours, having recently explored the historic streets of Kyoto during a solo art‑focused trip and regularly weekend‑escaping
    to the Adirondack Lake Region for low‑key relaxation, while dreaming of a future eco‑retreat stay in Costa Rica that balances adventure and sustainable living.
  culinary: Esther Calso experiments in the kitchen with multicultural recipes, mastering a vibrant Thai green curry using lemongrass and kaffir lime leaves, a comforting Mexican mole poblano with ancho
    chilies, and a seasonal squash risotto with sage, while they often pair meals with a glass of natural Pinot Noir from the Hudson Valley, reflecting both an adventurous palate and a penchant for locally
    sourced ingredients.
  core: Esther Calso is a detail‑obsessed, art‑loving housekeeper who balances eco‑friendly cleaning with watercolor painting, obsessively organizes every shelf yet occasionally forgets to water houseplants,
    turning disciplined routines into vibrant creativity.
background:
  cultural: Esther is a second-generation Asian-American of Filipino descent, raised in a multicultural household that blends Filipino traditions with broader American customs. At home, Tagalog and English
    were spoken interchangeably, and family celebrations included Christmas, Simbang Gabi, and community gatherings at the local Filipino cultural center. Traditional foods like adobo, lumpia, and pancit
    were staples, reinforcing values of respect, family cohesion, hard work, and communal support. Living in Kingston, NY, she actively participates in both the local Asian community and the wider Ulster
    County cultural scene, which enriches her appreciation for diverse artistic expressions and reinforces her commitment to harmony and cooperation.
attributes:
  skills: '[''Deep cleaning'', ''Laundry and fabric care'', ''Home organization'', ''Time management'', ''Client communication'', ''Bilingual communication (English, Tagalog)'', ''Digital scheduling and
