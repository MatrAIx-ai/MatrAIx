  hobbies: '[''Cooking Mexican cuisine'', ''Reading mystery novels'', ''Desert hiking'', ''Yoga'', ''Sunrise photography'', ''Volunteering at cultural events'']'
  career_goals: Ana Maria aims to move from a single‑store manager role to a district‑level supervisory position within the next five years, overseeing multiple locations and mentoring emerging leaders.
    She plans to complete her GED and pursue an associate degree in business administration to strengthen her strategic planning skills. Long‑term, she hopes to open her own family‑owned retail concept
    that blends Mexican cultural products with the Southwest market, while fostering a supportive, structured work environment for her staff.
