personas:
  professional: An aspiring teen game developer, Chad Hernandez blends a love for strategy video games with hands‑on Raspberry Pi coding and LEGO building, channeling their sociable, talkative nature into
    collaborative school projects and occasional livestreams of quirky gaming clips, while dreaming of turning hobby‑level prototypes into future indie titles.
  sports: An outdoor‑enthusiast, Chad Hernandez spends winter snowshoeing and ice fishing on the frozen Rainy River and summers hiking the nearby woods, while cheering for the Minnesota Vikings in football
    and the Minnesota Twins in baseball, and occasionally joins the school’s intramural soccer team for a social workout.
  arts: A drama‑club enthusiast, Chad Hernandez shines on stage and helps craft elaborate set pieces, while channeling classic rock legends like Queen and contemporary pop icons such as Taylor Swift into
    TikTok skits that blend humor with local spot highlights, and unwinds with the sci‑fi worlds of Isaac Asimov and N.K. Jemisin.
  travel: When planning trips, Chad Hernandez prefers spontaneous weekend drives to nearby national parks like Voyageurs and the historic town of Duluth, yet dreams of a future backpacking adventure across
    Japan’s anime districts and Norway’s midnight‑sun fjords, balancing a love for local nature with wanderlust.
  culinary: A budding home chef, Chad Hernandez loves cooking campfire‑grilled trout with cedar plank seasoning, whipping up cheesy pizza rolls after gaming sessions, and occasionally indulges in spicy
    ramen bowls, while always keeping a stash of gummy bears on hand for quick energy.
  core: Chad Hernandez is a talkative, sociable teen who merges a love for gaming, drama, and outdoor adventures with a carefree approach to planning, occasional financial impulsivity, and a knack for turning
    everyday moments into creative TikTok content.
background:
  cultural: Chad comes from a white, Midwestern family rooted in northern Minnesota’s rural traditions. His ancestry includes German and Swedish heritage, reflected in family customs such as seasonal cooking
    with locally sourced foods and an appreciation for outdoor activities. Growing up in Littlefork, a close-knit community of Koochiching County, he has been shaped by the town’s emphasis on self-reliance,
    community involvement, and modesty. Local life revolves around the high school’s sports events, the county fair, church gatherings, and seasonal pursuits like fishing, hunting, and snow sports. These
    cultural touchstones have fostered a strong sense of belonging, respect for nature, and a collaborative spirit that informs his interactions and values.
