  career_goals: Chad envisions a future where he can blend his love for people and his practical mindset. In the next few years, he aims to secure a leadership role in the high school student council and
    become a key organizer of school events, honing his coordination and communication skills. He is interested in pursuing a degree in communications, education, or community development, with a long-term
    ambition to become a youth counselor, teacher, or community outreach coordinator who can design engaging programs and support his peers. He also keeps an eye on emerging digital media careers and hopes
    to leverage his social-media experience to create content that highlights local culture and youth voices.
