personas:
  professional: An experienced bilingual administrative professional, Aurora Busto excels at juggling calendars, coordinating travel, and training new staff, channeling their love of routine into meticulous
    filing while allowing themselves occasional flexible improvisation that keeps the office humming even when unexpected changes arise.
  sports: Aurora Busto cheered for the Alabama Crimson Tide each fall, joined a modest Saturday walking club with their church group, and occasionally played in a community women's softball league, yet
    they never kept a rigorous gym routine, opting for low‑impact activities that suit their flexible, relaxed approach to fitness.
  arts: Aurora Busto spends evenings knitting cozy blankets while listening to Vicente Fernandez and Jose Jose, attends monthly screenings of classic Mexican cinema like Los Olvidados at the local cultural
    center, reads historical novels about 19th‑century Mexico, and they let these artistic threads weave a sense of continuity between past and present.
  travel: Aurora Busto prefers low‑cost, road‑trip style travel, often driving the family to San Antonio for holidays and spending weekends at Gulf‑Coast beach towns like Gulf Shores, while dreaming of
    a cultural pilgrimage to Oaxaca to explore its markets and historic sites, yet their budget‑conscious nature and work commitments keep long‑haul vacations occasional.
  culinary: Aurora Busto—an intermediate home chef—regularly crafts tamales, pozole, and enchiladas using garden‑grown tomatoes, chilies, and cilantro, swaps in regional twists like smoked paprika, and
    adores savoring fresh salsa verde at family gatherings, while also treating themselves to occasional takeout tacos from the local food truck for a change of pace.
  core: Aurora Busto blends routine‑driven efficiency with a relaxed, sometimes disorganized flair, balancing a meticulous office inbox with occasional impulsive yarn purchases and a habit of postponing
    dentist appointments, which they view as a harmless quirk.
background:
  cultural: 'Aurora was born to Mexican immigrant parents who settled in the southern United States in the early 1970s. Her family hails from the state of Jalisco, and she grew up bilingual, speaking Spanish
    at home and English at school. Mexican traditions remain central to her life: she celebrates Día de los Muertos and Las Posadas with elaborate altars and family gatherings, and she regularly prepares
    festive foods for holidays. Catholicism, inherited from her upbringing, informs her involvement in her local church’s community activities. While she now resides in Decatur, Alabama, Aurora stays connected
    to the Mexican community through the city’s Latino cultural center, where she enjoys sharing stories, music, and cuisine with fellow expatriates. Her cultural identity shapes her values of family solidarity,
    practicality, and a warm, welcoming demeanor toward newcomers.'
attributes:
