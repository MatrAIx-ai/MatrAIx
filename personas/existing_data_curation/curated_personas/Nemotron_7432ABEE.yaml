  career_goals: Aurora aims to transition from her current secretary role to a supervisory position such as Office Manager within the next three to five years. She plans to enroll in evening classes at
    a local community college to earn a Certified Administrative Professional (CAP) credential and a short-term certification in medical office administration, hoping to work in a clinic that serves the
    Hispanic community. Additionally, she hopes to increase her earning potential to provide greater financial security for herself and to eventually invest in a small home-based virtual assistant service,
    offering bilingual administrative support to small businesses in the region. While she values routine and stability, Aurora also wants to cultivate leadership skills that allow her to mentor younger
    staff and contribute to a supportive workplace culture.
