    popular science'', ''Volunteer STEM workshops'']'
  career_goals: Although formally retired, Herman aims to stay intellectually engaged and give back to his community. He hopes to volunteer as a STEM mentor for local middle‑school students, offering hands‑on
    workshops in robotics and basic electronics. He also wants to serve as a consultant for small local manufacturers, providing practical engineering advice on a part‑time basis. Another personal ambition
    is to author a guidebook that shares his practical DIY knowledge for seniors looking to maintain independence. Finally, he aspires to take a leadership role in his neighborhood association, using his
    collaborative style to improve community spaces and organize inclusive events.
