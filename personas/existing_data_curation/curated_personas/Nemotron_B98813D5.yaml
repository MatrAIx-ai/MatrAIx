  hobbies: '["Visiting art galleries", "Street‑art exploration", "Sketching", "Urban photography", "Reading (modern art, philosophy, sci‑fi)", "Listening to indie folk music", "Balcony herb gardening",
    "Small‑group book club", "Art discussion meet‑ups"]'
  career_goals: Joshua hopes to transition from a general clerical role into a position that blends his administrative strengths with his passion for the arts, such as a records manager for a local gallery
    or a community arts program coordinator. He is interested in obtaining a certificate in arts administration or nonprofit management within the next two years to broaden his qualifications. Long‑term,
    he envisions a role that offers flexibility, allowing him to maintain a work‑life rhythm that supports his solitary hobbies while still contributing meaningfully to his community.
