persona_description: A person who is interested in traditional Chinese medicine and is knowledgeable about the liver, specifically its role in protecting the body-mind from external poisons and pathogens,
  as well as its role in detoxification and elimination of metabolic poisons. They are also familiar with the liver's planning capacity and its ability to chemically alter or excrete different hormones.
  They may have a background in biology, especially in the field of pharmacology, and are knowledgeable about liver function and its relationship to various medications. They may also be interested in the
  liver's role in supporting the liver and gallbladder, and in reducing inflammation and supporting tendon and ligament health. They may have a unique understanding of the liver's relationship to the 2nd
  and 3rd metatarsal bones and the spleen, and may have knowledge of the points on the ankle bone that can be used to support the liver.
