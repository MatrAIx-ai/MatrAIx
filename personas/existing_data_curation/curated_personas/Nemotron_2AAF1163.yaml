  hobbies: '["Hiking", "Gardening", "Home brewing", "Reading historical non‑fiction", "Acoustic guitar", "Yoga and meditation", "Animal shelter volunteering", "Book club", "Photography"]'
  career_goals: Alfonso aims to transition into a part‑time consulting role that leverages his business knowledge to help local startups and nonprofit organizations streamline their finances and operations.
    He aspires to eventually launch his own boutique advisory service providing affordable financial planning for small enterprises. Simultaneously, he seeks a stable income source that accommodates his
    need for flexible scheduling, exploring remote bookkeeping or contract project‑management opportunities. He is motivated to engage in work that fosters community harmony and allows him to apply his
    empathetic strengths, such as facilitating conflict‑resolution workshops, and hopes to advocate for workplace mental‑health support based on his own experiences with anxiety.
