personas:
  professional: Leo Delva, a 33‑year‑old master carpenter in Ohio, blends a decade of precise framing, advanced joinery, and blueprint expertise with a structured workflow, delivering sustainable, custom
    furniture projects on time and turning client ideas into practical, handcrafted reality.
  sports: Leo Delva, a devoted Ohio native, supports the Cleveland Browns and Cavaliers, hits the community center for weekly pickup basketball, follows the Cincinnati Reds in the spring, and balances his
    active routine with occasional fishing trips on Lake Erie for quiet reflection.
  arts: Leo Delva enriches his evenings with Miles Davis’s cool jazz, B.B. King’s blues riffs, and Mahalia Jackson’s gospel chants, regularly attending live sets at the local Blue Note club while also appreciating
    the craftsmanship of modern furniture designers like George Nakashima.
  travel: Leo Delva favors carefully planned road trips that blend work and leisure, having explored New Orleans for its jazz legacy, hiked the Great Smoky Mountains, and sourced reclaimed wood in Asheville,
    while dreaming of a sustainable design pilgrimage to Denmark’s Copenhagen and Japan’s Kanazawa.
  culinary: Leo Delva enjoys moderate cooking, often whipping up smoked brisket with a dry rub of paprika and brown sugar, farm‑fresh garden salads with heirloom tomatoes, and roasted sweet potatoes seasoned
    with rosemary, while occasionally treating himself to fish tacos with lime‑marinated cod.
  core: Leo Delva, a calm and methodical carpenter, channels his love for precision into handcrafted furniture, balances a disciplined budget with a splurge for vintage pieces, and steadies his life with
    chess, gardening, and a relentless pursuit of sustainable design—though he often forgets to set an alarm for early mornings.
background:
  cultural: Leo grew up in Youngstown's historically working-class African-American neighborhood, where his family has long been part of the region's labor tradition. The Rust Belt's economic fluctuations
    shaped a strong sense of resilience and community solidarity in him. Church and local community events introduced him to gospel music, storytelling, and a collective ethos of mutual support. He celebrates
    cultural milestones such as Juneteenth and Black History Month, and he stays connected to African-American culinary traditions through family gatherings. His upbringing also exposed him to the diverse
    immigrant populations of Mahoning County, fostering an appreciation for multicultural collaboration, which he brings into his work and volunteer activities.
