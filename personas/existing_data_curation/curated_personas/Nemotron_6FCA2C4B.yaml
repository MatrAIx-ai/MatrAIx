  hobbies: '[''Custom furniture building'', ''Scale model construction'', ''Gardening'', ''Chess'', ''Jazz and blues music'', ''Habitat for Humanity volunteering'', ''Reading African American history'',
    ''Basketball'', ''Fishing'']'
  career_goals: Leo aims to transition from a hired carpenter to the owner-operator of a boutique woodworking studio that specializes in sustainable, handcrafted furniture for the local market. Over the
    next three years, he plans to complete a certification in advanced carpentry, acquire a small commercial workshop space, and build a portfolio of custom pieces that reflect both modern design and traditional
    African-American craftsmanship. He also hopes to mentor apprentices, contribute to Habitat for Humanity projects, and eventually achieve financial stability that allows him to invest in property and
    support his extended family.
