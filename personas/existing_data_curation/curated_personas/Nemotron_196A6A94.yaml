personas:
  professional: Jose Perez, a veteran hardware store sales associate turned community technology mentor, blends persuasive customer‑service skills with hands‑on carpentry know‑how, using his curious yet
    practical mindset to improvise solutions on the fly while often juggling multiple tasks in a delightfully disorganized but charismatic manner.
  sports: Jose Perez enjoys daily walks along the Hudson River, joins a local senior fishing club for weekend trips, plays casual dominoes tournaments that keep his mind sharp, and roots for the New York
    Knicks while occasionally cheering on the nearby Hudson Valley Renegades baseball team.
  arts: Jose Perez immerses himself in lively salsa and plena dance nights, frequently shines as a storyteller at community festivals, reveres the classic sounds of salsa orchestras, and never misses the
    local theater’s summer series featuring timeless productions.
  travel: Jose Perez favors leisurely road trips to coastal towns that echo the island rhythms of his family’s origins, cherishes annual visits to his relatives’ seaside village, and plans weekend getaways
    to New York City’s cultural districts that offer vibrant music and food scenes within his modest travel budget.
  culinary: Jose Perez delights in preparing aromatic arroz con gandules, savory mofongo, and herb‑infused plantain chips from his garden, cooks each dish with a pinch of nostalgia, and loves sharing these
    flavors at his backyard gatherings while occasionally over‑salting to satisfy his love of bold tastes.
  core: Jose Perez is a sociable, easy‑going mentor who blends island‑rooted culinary traditions with hands‑on practical skills, juggling community leadership, modest finances, and health management while
    charming everyone with his storytelling and salsa moves.
background:
  cultural: 'Jose was born and raised in Puerto Rico before moving to the mainland United States as a young adult. His upbringing was steeped in the island’s vibrant cultural traditions: family gatherings
    centered around shared meals, the rhythmic sounds of bomba and plena, and the deep influence of Catholic celebrations. He carries a strong sense of pride in his heritage, often speaking both Spanish
    and English at home and within his community. In Middletown, he blends these Caribbean roots with the values of his adopted hometown, fostering connections across generations and cultural lines while
    preserving the flavors, music, and storytelling traditions of Puerto Rico.'
attributes:
  skills: '["Bilingual Spanish-English communication", "Customer service and sales", "Home repair and basic carpentry", "Automotive maintenance", "Cooking traditional Puerto Rican cuisine", "Event planning
