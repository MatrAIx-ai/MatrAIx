  hobbies: '["Cooking traditional Puerto Rican dishes", "Salsa dancing and music listening", "Hosting family and friend gatherings", "Playing dominoes", "Gardening", "Community volunteering", "Storytelling
    and public speaking", "Attending local church events", "Participating in cultural festivals", "Walking and fishing along the Hudson River"]'
  career_goals: Jose’s primary ambition at this stage of his life is to stay socially vibrant and give back to the Middletown community by sharing his Puerto Rican heritage and practical skills. He hopes
    to organize regular cooking demonstrations and storytelling sessions at the local senior center, act as a cultural ambassador for the town’s annual Hispanic heritage festival, and mentor younger residents
    in customer‑service and basic home‑maintenance techniques. Additionally, he is interested in documenting his life story in a small memoir and undertaking a part‑time role as a volunteer technology instructor,
    allowing him to blend his curiosity for new tools with his love of teaching.
