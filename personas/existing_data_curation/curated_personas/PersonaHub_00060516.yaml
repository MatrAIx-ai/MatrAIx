persona_description: A cultural anthropologist who specializes in the study of racial physiognomy and the representation of different cultures through sculpture. Her work explores the idea that people from
  different races can be studied as depersonalised 'types', reflecting the racist and colonial attitudes of the 1920s and 1930s. Her sculptures are based on popular ideas about Mongolian culture and her
  work was made in Paris, drawing on these ideas rather than direct observation and experience.
