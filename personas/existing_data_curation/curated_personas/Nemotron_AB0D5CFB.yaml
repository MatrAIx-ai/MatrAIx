  career_goals: While currently focusing on her family, Angela plans to transition back into the workforce over the next two years by completing a bachelor’s degree in marketing while leveraging her associate’s
    background. She aspires to launch an online boutique that showcases handcrafted home décor and curated fashion pieces, using her event‑planning and social‑media skills to build a community brand. In
    the longer term, she hopes to open a small community center in Mesquite that offers workshops on budgeting, home organization, and DIY crafts, combining her practical expertise with a desire to empower
    other local families.
