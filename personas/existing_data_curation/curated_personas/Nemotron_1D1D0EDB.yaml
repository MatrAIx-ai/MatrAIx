  hobbies: '[''Reading (historical fiction, travel memoirs)'', ''Photography (urban and coastal scenes)'', ''Beach jogging'', ''Strength training'', ''Cooking traditional Mexican dishes'', ''Competitive
    video gaming (first‑person shooters)'', ''DIY electronics projects (Arduino)'', ''Small‑group soccer games'', ''Listening to regional Mexican music'']'
  career_goals: Cesar aims to transition from front‑line porter work to a supervisory position within hospitality, such as a concierge team lead or front‑desk manager, within the next three years. To achieve
    this, he plans to enroll in a part‑time hospitality management certificate program at Long Beach City College, gain proficiency in advanced reservation and revenue‑management systems, and develop formal
    conflict‑resolution training. He is driven by a competitive desire to be recognized as one of the top performers in guest satisfaction metrics at his current employer, and ultimately hopes to open a
    small boutique guesthouse that blends his Mexican heritage with the laid‑back coastal vibe of Long Beach, offering personalized cultural experiences to travelers.
