  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Birdwatching'', ''Beach walks at sunrise'', ''DIY electronics projects'', ''Science-fiction reading'', ''Chess'', ''Collecting vintage
    postcards'', ''Mindfulness meditation'']'
  career_goals: Ryan aims to progress into a supervisory role within his retail chain, ultimately becoming a store manager where he can integrate data‑driven merchandising and staff training. He plans to
    earn a professional certification in data analytics to strengthen his ability to translate sales metrics into actionable strategies. Long‑term, he envisions opening a small boutique that merges his
    love of contemporary art with cutting‑edge tech gadgets, offering curated experiences for a niche market. Parallel to his career aspirations, he is committed to building resilience through mindfulness
    practices to better manage his anxiety and maintain emotional balance.
