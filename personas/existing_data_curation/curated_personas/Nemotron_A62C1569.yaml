  hobbies: '[''Reading science‑fiction and fantasy novels'', ''Building model kits (rockets, LEGO)'', ''Playing strategy video games'', ''Programming puzzles and coding challenges'', ''Raspberry Pi electronics
    projects'', ''Guitar practice'', ''Hiking in Boise foothills'', ''Fishing in local streams'', ''Bike repair and upgrades'']'
  career_goals: Joseph aims to earn his GED within the next year and then enroll in a community‑college program focused on information technology or a trade apprenticeship in carpentry. His medium‑term
    goal is to combine his tech and hands‑on skills by starting a small business that offers custom gaming PC builds, repairs, and simple wood‑working services for local customers. Ultimately, he dreams
    of developing an indie video game that reflects his strategic thinking and competing in regional hack‑athon contests, leveraging his competitive drive to achieve recognition in both the tech and maker
    communities.
