personas:
  professional: An aspiring tech‑maker, Joseph Lee combines meticulous hardware tinkering with strategic problem‑solving, leveraging their Python scripting and woodworking skills to prototype custom gaming
    PCs while their competitive streak drives them to refine each build for peak performance.
  sports: Joseph Lee enjoys weekend hikes in the Boise Foothills, occasional fly‑fishing in the Boise River, and regular rides with the Boise Valley Cyclists Club, while cheering on the Boise State Broncos
    football team and the Idaho Steelheads hockey squad, and they maintain fitness through a disciplined routine of bodyweight workouts and bike maintenance.
  arts: Joseph Lee channels creative energy through guitar practice, often strumming acoustic renditions of Tame Impala and Daft Punk tracks, while devouring the epic worlds of Brandon Sanderson and N.K.
    Jemisin, and they find inspiration in the cinematic scores of Hans Zimmer and the pixel art of the indie game Hyper Light Drifter.
  travel: Joseph Lee prefers self‑planned, low‑budget adventure trips, mapping each itinerary in a spreadsheet, and has already hiked in Yellowstone National Park and explored Seattle’s tech districts,
    while they dream of a future backpacking journey through Japan’s rural towns to attend indie game expos and sample authentic ramen.
  culinary: Joseph Lee enjoys crafting his own meals, from cooking spicy ramen with sriracha, miso, and soft‑boiled eggs to grilling trout seasoned with lemon and dill, and they proudly bake a simple wood‑fire
    pizza topped with mozzarella, pepperoni, and fresh basil, though they often burn the crust in their rush to test a new game.
  core: Joseph Lee is a pragmatic, curiosity‑driven teen who balances a competitive streak with hands‑on tinkering, preferring solitary projects over social scenes, but occasionally lets a gaming binge
    or burnt pizza reveal a softer, impulsive side that they try to keep hidden.
background:
  cultural: Joseph grew up in a predominantly white, middle‑class neighborhood in Boise, Idaho, where a mix of suburban life and easy access to the outdoors shaped his worldview. His family values self‑reliance,
    practicality, and a modest work ethic, typical of the Intermountain West region. While he absorbed mainstream American cultural influences such as mainstream media, video games, and online communities,
    he also respects the local emphasis on outdoor recreation, community involvement, and a quiet, reserved demeanor. These regional and familial influences combine with his personal curiosity, fostering
    a blend of digital savviness and appreciation for hands‑on, nature‑based activities.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''PC assembly and upgrades'', ''Python scripting'', ''JavaScript basics'', ''Spreadsheet data analysis'', ''Woodworking'', ''Bike repair'', ''First aid'',
