personas:
  professional: Sonia Gomes, a seasoned automotive service technician with four decades of hands‑on experience, balances curiosity with practicality in diagnosing gasoline, diesel, and emerging hybrid powertrains,
    they mentor apprentices with patient, detail‑oriented guidance, and they are channeling that expertise toward establishing a family‑run garage and a mentorship program for women in the trade.
  sports: Sonia Gomes enjoys daily walks along the nearby nature trail and seasonal beach volleyball games with the Toa Alta senior walking club, they proudly follow the Vaqueros de Bayamón basketball team
    and the Gigantes de Carolina baseball squad, and they occasionally join a recreational softball league during the winter months.
  arts: Sonia Gomes fills their leisure time with salsa classics by Héctor Lavoe and the bomba rhythms of Andy Montañez, they enjoy watching films by Jacobo Morales on Sundays, they attend occasional performances
    by the Danza Folklórica group at the community center, and they regularly play dominoes while humming the tunes of El Gran Combo.
  travel: Sonia Gomes prefers relaxed, family‑oriented road trips in their beloved 1970 Chevrolet Chevette, they have explored the historic streets of Old San Juan, trekked the misty trails of El Yunque,
    taken a weekend getaway to the tranquil beaches of Culebra, they plan to visit the colonial town of Guanajuato in Mexico next spring, but they keep travel budgets modest to fund the future family garage.
  culinary: Sonia Gomes, an accomplished home cook, prepares arroz con gandules with sofrito, adobo, and pigeon peas, crafts pasteles wrapped in banana leaves seasoned with recaito and pork, bakes flan
    topped with caramel, they also experiment with mangu topped with caramelized onions, and they grow their own cilantro, oregano, and sweet plantains in a modest herb garden that supplies fresh flavor
    to every meal.
  core: Sonia Gomes blends a lifelong devotion to hands‑on mechanical repair with a heart rooted in community celebrations, seasoning each day with salsa beats, herb‑filled garden moments, and a quiet determination
    to mentor the next generation, even if they sometimes forget to water the seedlings.
background:
  cultural: Sonia’s cultural roots are steeped in the working‑class Puerto Rican tradition of Toa Alta, a town near Bayamón that blends rural customs with urban influences. Raised in a close‑knit family,
    she was immersed in Catholic values, the island’s vibrant Afro‑Caribbean musical rhythms, and a strong sense of comunidad. Spanish is her primary language, and she acquired English through schooling
    and professional interactions, giving her a bilingual perspective. The island’s history of resourcefulness and craftsmanship shaped her practical work ethic and pride in self‑reliance. She honors family
    celebrations such as Navidad, Three Kings Day, and local festivals like Fiesta de la Madre, while also contributing to community initiatives like church food drives. This cultural tapestry informs both
    her professional dedication in the automotive field and her personal life, emphasizing family, respect, and resilience.
attributes:
  skills: '[''Engine diagnostics (OBD-II and manual)'', ''Brake system repair and maintenance'', ''Suspension and steering repair'', ''Electrical system troubleshooting'', ''Preventive maintenance and scheduled
    services'', ''Metalworking and welding (MIG/TIG)'', ''Small engine repair (motorcycles, generators, lawn mowers)'', ''Parts inventory management and ordering'', ''Customer service and bilingual communication
    (Spanish/English)'', ''Mentoring apprentices and junior technicians'', ''Hybrid and electric vehicle basics'', ''Tool maintenance and workshop safety protocols'']'
  hobbies: '[''Cooking traditional Puerto Rican cuisine'', ''Listening to salsa, plena, and bomba music'', ''Gardening (herbs and tropical fruits)'', ''Walking nature trails and beachcombing'', ''Restoring
    classic cars'', ''Reading automotive magazines and historical novels'', ''Playing dominoes with close friends'', ''Attending church services and volunteering'', ''DIY home repairs and woodworking'']'
  career_goals: Approaching retirement, Sonia aims to transition from full‑time repair work to establishing a modest family‑run garage in Toa Alta where she can pass her knowledge to her children and apprentices.
    She plans to earn the ASE Master Technician certification, with a focus on hybrid and electric vehicle servicing, to stay ahead of industry changes. Sonia also hopes to develop a mentorship program
    that encourages more women to enter the automotive trades, partnering with local schools and community centers. Over the next few years she envisions reducing her physically demanding tasks, offering
    consulting on workshop efficiency, and playing a leadership role in a regional automotive association to improve service standards across Puerto Rico.
