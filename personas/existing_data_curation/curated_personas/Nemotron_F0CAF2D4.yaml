personas:
  professional: Lydia Dupee is a licensed practical nurse acclaimed for rapid decision‑making in a busy emergency department, blending a data‑driven curiosity for health informatics with hands‑on compassion,
    though they sometimes miss paperwork deadlines due to their love of spontaneity.
  sports: Lydia Dupee hikes with the Madison County Trailblazers on weekend mornings, participates in the local 5K run series, and cheers for the nearby Omaha Storm Chasers baseball team, but they avoid
    structured gym classes preferring solo cardio on the trail.
  arts: Lydia Dupee finds solace at intimate jazz gigs featuring Kamasi Washington and at soulful gospel gatherings with the Madison County Revival Choir, while late‑night reading sessions of Octavia Butler’s
    novels fuel their creative imagination.
  travel: Lydia Dupee plans low‑key getaways that balance spontaneity and budget, having explored the Blue Ridge Parkway, trekked in Great Smoky Mountains National Park, and dreaming of a culinary pilgrimage
    to New Orleans’ French Quarter, yet they often wait for posted work schedules before booking trips.
  culinary: Lydia Dupee cooks soulful Southern dishes such as smoked collard greens, shrimp and grits, and sweet potato cornbread, experimenting with ingredients like smoked paprika and heirloom tomatoes
    while honing a modest but confident skill in the kitchen, and they relish sharing meals with close friends.
  core: Lydia Dupee is a curious, pragmatic nurse who blends spontaneous self‑care rituals with a disciplined drive to bridge bedside care and health tech, even if they sometimes forget to file expense
    reports on time.
background:
  cultural: Lydia is an African-American woman whose family moved from the Southern United States to the Midwest during her parents' youth. Growing up in a close-knit Black community in nearby Springfield,
    she was shaped by church traditions, soulful music, and a strong emphasis on education and community service. Her cultural heritage influences her commitment to addressing health inequities and her
    appreciation for collective resilience. She balances contemporary Midwestern life with Southern culinary traditions and maintains strong ties to her family's legacy of perseverance and service.
attributes:
  skills: '["Patient assessment", "Medication administration", "Wound care", "IV therapy", "Emergency response", "Health informatics", "Data analysis", "Evidence-based practice", "Patient education", "Community
    health outreach", "Cross-cultural communication", "Infection control", "Basic laboratory testing", "Care coordination", "Critical thinking", "Problem-solving under pressure"]'
  hobbies: '["Reading science-fiction and medical journals", "Gardening", "Hiking local trails", "Cooking Southern and soul-food recipes", "Attending jazz and gospel music events", "Volunteering at community
    health fairs", "Exploring basic Python coding for health data", "Practicing yoga and mindfulness"]'
  career_goals: Lydia aims to advance from licensed practical nurse to registered nurse within the next two years by completing an accelerated RN program, while pursuing certifications in wound care and
    case management. She is drawn to emergency and community health settings, hoping to combine her curiosity for new medical technologies with practical patient care. Long‑term, she envisions obtaining
    a BSN and eventually a master's degree in nursing informatics or public health, positioning herself as a bridge between bedside care and health‑technology innovation. She also aspires to lead community
    health initiatives in Madison County that address health disparities affecting the local Black population, and eventually mentor aspiring LPNs.
