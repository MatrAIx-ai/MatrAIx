personas:
  professional: Mario Bennici, a 35‑year‑old procurement specialist, leverages their strategic sourcing expertise, data‑driven cost analysis, and a painter’s eye for unconventional solutions to negotiate
    sustainable contracts, while their methodical planning and natural charisma keep vendor meetings both efficient and engaging.
  sports: Mario Bennici follows the Oklahoma City Thunder and the Oklahoma Sooners football team with fervor, participates in a local hiking club that tackles the Ouachita foothills each weekend, and spends
    quiet evenings fishing at Lake Thunderbird, preferring low‑impact, community‑oriented recreation over competitive sports.
  arts: Mario Bennici immerses themselves in the regional art scene by collecting abstract works reminiscent of Mark Rothko, attending installations at the Oklahoma City Museum of Art, and performing occasional
    spoken‑word recitals at the local theater, while their own canvases blend bold color blocks with motifs inspired by tribal beadwork.
  travel: Mario Bennici plans trips with the same meticulous spreadsheets used at work, having already toured the historic streets of Santa Fe, the rice terraces of Bali, and the art districts of Berlin,
    and now dreams of attending the Venice Biennale, balancing an appetite for cultural immersion with a modest travel budget that prioritizes family visits.
  culinary: Mario Bennici experiments in the kitchen by mastering dishes like birria tacos, saffron risotto, and Oklahoma‑style chicken fried steak, mixing ingredients such as smoked paprika, fresh basil,
    and locally sourced jalapeños, while their skill level ranges from confident sauté chef to occasional over‑salted experimenter.
  core: Mario Bennici blends a strategic mind with artistic flair, channeling their sociable, compassionate nature into sustainable sourcing, community mentorship, and a never‑ending quest for new flavors
    and colors, even if they sometimes overcommit to social events and forget to log their own expenses.
background:
  cultural: Mario grew up in a mid-western, small-town environment in Oklahoma, shaped by the values of neighborly support, hard work, and modesty. His family’s European ancestry—primarily Italian and German—blended
    with the broader American cultural fabric of the region. The local community’s agricultural roots and the proximity to Native American heritage in Pottawatomie County have given him an appreciation
    for regional history and indigenous art. This background, combined with his exposure to diverse perspectives through education and travel, informs his inclusive outlook and his drive to bridge business
    with cultural expression.
