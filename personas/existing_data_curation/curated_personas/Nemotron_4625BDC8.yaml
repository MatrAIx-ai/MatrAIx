  hobbies: '[''abstract painting'', ''visiting art galleries'', ''attending theater productions'', ''reading philosophy and science fiction'', ''hosting dinner gatherings'', ''leading a book club'', ''volunteering
    as a mentor'', ''hiking'', ''fishing'', ''exploring international cooking'']'
  career_goals: In the next five years Mario aims to move into a senior procurement leadership role, such as Procurement Manager or Director of Supply Chain, where he can shape company-wide sourcing policies.
    He plans to obtain the CPSM certification and an MBA to deepen his strategic expertise. A long-term ambition is to champion sustainable and ethical procurement practices, integrating local Oklahoma
    artisans into the supply chain and eventually launching a consulting boutique that helps small businesses and nonprofits optimize their purchasing while maintaining social responsibility.
