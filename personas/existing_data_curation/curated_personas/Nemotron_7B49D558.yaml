  hobbies: '["Visiting Art Galleries", "Painting", "Community Theatre Volunteering", "Gardening", "Hiking", "Book Club", "Traveling for Cultural Festivals", "Cooking Soul-Food with Modern Twists", "Swing
    and African Dance Classes", "DIY Home-Improvement Projects"]'
  career_goals: Natasha aims to transition into a senior director role overseeing regional community engagement and arts outreach, positioning herself as a catalyst for inclusive cultural programs. She
    plans to expand her organization’s partnership network with schools, nonprofits, and local businesses, and to mentor emerging managers, especially women of color. Long-term she envisions launching a
    social-enterprise that provides arts education and entrepreneurship training for under-served youth in Appalachia and the broader Southern region.
