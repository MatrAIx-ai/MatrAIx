personas:
  professional: Matthew Miles is a 27‑year‑old electrician in Lincoln who blends meticulous adherence to the National Electrical Code with a restless curiosity for emerging green technology, allowing them
    to efficiently troubleshoot complex wiring while they design solar‑powered smart‑home solutions despite occasional bouts of worry.
  sports: Matthew Miles, a 27‑year‑old outdoor enthusiast, spends weekends trekking the Sandhills with the Nebraska Sandhills Hiking Club, roots for the Nebraska Cornhuskers and the Kansas City Chiefs during
    football season, follows the Omaha Storm Chasers for a taste of minor‑league baseball, and they squeeze in occasional pick‑up basketball games at the Lincoln YMCA to stay active.
  arts: Matthew Miles channels his solitary focus into strumming acoustic renditions of John Mayer and Johnny Cash, curates a modest vinyl collection that includes the folk storytelling of Bob Dylan, admires
    Ansel Adams’s landscape photography, and they wind down by devouring non‑fiction titles from Malcolm Gladwell and Yuval Noah Harari, which together shape their reflective yet pragmatic outlook on life.
  travel: Matthew Miles prefers meticulously planned road trips that blend solitary discovery with sustainable travel, having already charted routes to Badlands and Yellowstone for high‑altitude hikes,
    and they dream of a future canoe expedition through the fjords of Iceland while balancing a tight budget and occasional family obligations.
  culinary: Matthew Miles, a capable home cook, often whips up grilled salmon with lemon‑dill glaze, roasted sweet potatoes seasoned with smoked paprika, and a hearty lentil chili peppered with cumin and
    jalapeños, while they experiment with homemade sourdough bread that showcases their patience and love for tactile, hands‑on projects.
  core: Matthew Miles is a methodical electrician who fuels their curiosity with DIY tech projects, battles chronic worry with meticulous planning, and they find solace in quiet guitar chords and sunrise
    hikes.
background:
  cultural: Matthew grew up in the Midwestern heartland of Nebraska, where a blend of agricultural heritage and modest urban life shaped his values. His family, with roots in German and Irish ancestry,
    emphasized hard work, self‑reliance, and community cooperation—principles that remain evident in his courteous, teamwork‑focused demeanor. The local culture of Lincoln and Lancaster County, characterized
    by a pragmatic outlook, strong neighborhood ties, and an appreciation for the outdoors, influences his practical problem‑solving style and his preference for small, close‑knit social circles. While
    he identifies as white American, his cultural identity is grounded in the Midwestern ethos of humility, responsibility, and a quiet respect for both tradition and incremental innovation.
attributes:
  skills: '[''Residential electrical wiring'', ''Commercial electrical wiring'', ''Conduit bending'', ''Blueprint reading'', ''Electrical code compliance (NEC)'', ''Troubleshooting and fault diagnosis'',
    ''Solar panel and renewable energy system installation'', ''EV charger installation'', ''Smart home automation integration'', ''Low‑voltage security and communication systems'', ''Energy efficiency
    auditing'', ''Electrical safety inspections'', ''Use of testing instruments (multimeter, clamp meter)'', ''Basic project management'', ''Customer communication and service'']'
  hobbies: '[''DIY electronics projects'', ''Arduino and Raspberry Pi tinkering'', ''Woodworking'', ''Hiking in the Sandhills'', ''Landscape photography'', ''Reading science and technology non‑fiction'',
    ''Playing acoustic guitar'', ''Puzzle solving (crossword, Sudoku)'', ''Model building (scale models)'', ''Visiting local farmer’s markets'', ''Participating in small community volunteer projects'']'
  career_goals: Matthew aims to earn his journeyman license within the next year and subsequently achieve master electrician status, paving the way to obtain a contractor’s license. He is motivated to specialize
    in sustainable energy projects—particularly solar installations and EV‑charging infrastructure—so that he can lead eco‑focused retrofits for both residential and commercial clients in the Lincoln area.
    Long‑term, he envisions launching his own small‑scale electrical contracting firm that prioritizes energy efficiency and community mentorship, allowing him to train apprentices while maintaining a balanced
    work‑life rhythm that helps manage his natural tendency toward worry and stress.
