personas:
  professional: John Perez, a 43-year-old maintenance specialist with two decades of HVAC, plumbing, electrical, and carpentry expertise, applies a methodical, data-driven approach to preventative schedules
    and meticulous documentation, positioning themselves for a facilities-manager role over a large commercial campus in the Greater New York area.
  sports: John Perez spends Saturdays hiking with the local trail-maintenance crew and fishing with the Hudson River Anglers Association, follows the New York Yankees and Knicks for their competitive edge,
    and maintains fitness through brisk trail walks and occasional home-based weight training.
  arts: John Perez draws artistic inspiration from the functional elegance of George Nakashima’s furniture, the detailed model-train layouts showcased by Ken Brown, and the classic rock of The Rolling Stones,
    often watching engineering documentaries on PBS while listening to vinyl records during woodworking sessions.
  travel: John Perez prefers meticulously planned road trips to national parks like Yellowstone and Acadia, enjoys the solitude of off-season hiking in the Adirondacks, and dreams of traveling to Scandinavia
    to study sustainable architecture, all while balancing travel costs with their disciplined savings plan.
  culinary: John Perez experiments in the kitchen with a methodical precision akin to their woodworking, favoring sous-vide salmon, roasted root vegetables with rosemary, and homemade sourdough, and they
    relish the tactile satisfaction of measuring ingredients to the gram.
  core: John Perez, a meticulous 43-year-old tradesman, blends a love of hands-on engineering with quiet competitiveness, always measuring twice, cutting once, and never missing a scheduled maintenance
    check.
background:
  cultural: John is a white American of Irish‑American descent who grew up in the suburban environment of Danbury, Connecticut. His upbringing reflects the New England values of self‑reliance, pragmatism,
    and a strong work ethic. He identifies with mainstream American cultural norms, emphasizing family stability, community involvement in local town events, and support for high school sports. While his
    surname hints at a multicultural heritage, John’s cultural experience is rooted in the modest, middle‑class traditions of Fairfield County, blending respect for established methods with a personal curiosity
    for new practical ideas.
