  career_goals: John aims to advance from a general maintenance worker to a facilities manager overseeing a large commercial campus in the Greater New York area. He plans to earn an Associate’s degree in
    Facilities Management and obtain certifications such as NATE for HVAC, EPA Universal, and OSHA 30‑hour. Over the next five years, he hopes to lead a maintenance team, implement data‑driven efficiency
    programs, and mentor younger technicians. Long‑term, he considers launching a small independent maintenance consulting business that serves local small‑business owners, leveraging his reputation for
    reliability and practical problem‑solving.
