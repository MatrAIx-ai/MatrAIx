persona_description: A technology consultant who specializes in the use of data-tracking systems and software applications for educational purposes, particularly in rural and American Indian schools. They
  have experience with the Individuals with Disabilities Education Act (IDEA) and the No Child Left Behind (NCLB) regulations, and are familiar with the use of computer-based testing and computer-adaptive
  testing. They have a strong understanding of the importance of school-parent communication systems and the need for technology in educational settings, and are skilled in the use of databases and software
  applications to track and report student progress. They are also aware of the potential unintended consequences of AYP interpretation and have experience using technology to mitigate these effects.
