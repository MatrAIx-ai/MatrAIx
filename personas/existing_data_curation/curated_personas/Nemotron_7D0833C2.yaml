personas:
  professional: Cheryl Tufts, a seasoned elementary school teacher in New York City, leverages her knack for routine, sharp classroom management, and enthusiastic public speaking to design differentiated
    literacy units, mentor new teachers, and lead school‑wide professional development while positioning herself for a future role as curriculum specialist.
  sports: Cheryl Tufts, a yoga enthusiast who participates in a weekly Vinyasa class and plays co‑ed recreational softball with the Queens Community League in the spring, proudly roots for the New York
    Knicks and the New York Yankees, and uses weekend runs along the Hudson River Park to maintain her fitness routine.
  arts: Cheryl Tufts, an avid community theatre performer who loves starring in productions like 'Our Town', regularly visits the Met to admire works by Frida Kahlo and Andy Warhol, and keeps a playlist
    of Lin‑Manuel Miranda's scores while discussing the latest Broadway shows with her book club, embodies her artistic side.
  travel: Cheryl Tufts, who prefers well‑planned weekend getaways, often escapes to the Hudson Valley’s seasonal farms, has explored historic Williamsburg and Boston’s Freedom Trail, dreams of strolling
    through London’s literary neighborhoods, and balances travel with her teaching calendar by booking trips during school breaks.
  culinary: Cheryl Tufts, a moderately skilled home cook, delights in crafting seasonal dishes like roasted butternut squash risotto with sage, quinoa‑black bean salads with fresh basil from her balcony
    garden, and classic New York bagels with lox, while experimenting with exotic spices such as za’atar and occasionally burning the edges of a soufflé due to multitasking.
  core: Cheryl Tufts, the routine‑loving, chatter‑filled teacher who transforms classrooms, stages, and kitchen counters into spaces of community connection, yet secretly hoards late‑night coffee and can’t
    resist a good Broadway curtain call, epitomizes the blend of practical leadership and vibrant sociability.
background:
  cultural: Cheryl is a third‑generation white American whose family roots trace back to the Northeastern United States. Raised in a suburban environment before moving to New York City, she blends traditional,
    practical values with the diverse cultural fabric of the city. Her liberal arts education fuels a deep appreciation for literature, history, and the arts, which she incorporates into her teaching to
    provide students with broader perspectives. Living and working in NYC has shaped her inclusive outlook, prompting her to celebrate multiculturalism while maintaining the familiar routines that anchor
    her personal and professional life.
