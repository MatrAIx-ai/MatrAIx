  career_goals: Cheryl aims to move into a leadership role within her school, such as grade‑level team leader or curriculum specialist, where she can shape instructional practices district‑wide. She plans
    to pursue a Master's in Educational Leadership to position herself for an assistant principal role. Additionally, she hopes to launch a community literacy program that partners local libraries with
    her classroom, and to become a regular presenter at regional teacher conferences, sharing practical, routine‑based strategies for elementary educators.
