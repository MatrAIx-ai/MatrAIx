persona_description: A software developer who is experienced in debugging multi-threaded applications using the Visual Studio 2008 debugger. They have a strong understanding of how to work with threads
  in the debugger and are familiar with the functionality of the Thread Window. They are likely to have built a theory about which threads in an application are causing a problem and have identified a smaller
  sub-set of threads to investigate. They are skilled in using the tooltip call stack provided by the Thread Window and are aware of the Show Threads in Source option that can provide additional insight
  into the execution of other threads.
