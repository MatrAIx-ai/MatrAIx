persona_description: A highly selective and dedicated group of STEM teachers who are recruited by organizations such as Teach For America (TFA) and the National Science Teachers Association (NSTA) to teach
  in high-need urban and rural school districts, particularly in low-income areas where students are poor and academically struggling. These teachers undergo rigorous training and are committed to teaching
  for two years. TFA relies on selective admissions, while NSTA provides scholarships and stipends to STEM majors and professionals to teach in high-need schools. The turnover rate for these teachers is
  high, with many leaving teaching after three years, compared to conventionally trained teachers. However, TFA and NSTA programs have produced successful STEM teachers who have high GPAs, are minorities,
  and take on leadership roles in their schools.
