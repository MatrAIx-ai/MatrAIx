  hobbies: '[''Pick-up basketball and community league play'', ''Attending live music events (jazz, R&B, hip‑hop)'', ''Cooking and hosting soul-food potluck dinners'', ''Weekend fishing trips on Lake Minnetonka'',
    ''Exploring local craft breweries and beer tastings'', ''Watching and tailgating for Minnesota Timberwolves games'', ''Volunteering as a mentor in youth entrepreneurship programs'', ''Reading historical
    non-fiction and contemporary fiction'', ''Participating in occasional improv or community theater workshops'']'
  career_goals: Looking ahead, Anthony aims to transition from a top-performing sales representative to a regional sales manager within the next three to five years, overseeing a team of reps across the
    Upper Midwest. He envisions developing a training program that emphasizes relationship‑first selling and cultural competence, helping newer reps navigate both client expectations and internal processes.
    He also plans to pursue an executive MBA to strengthen his strategic and organizational capabilities, positioning himself for a future director‑level role that can influence product development toward
    sustainable manufacturing. Mentoring younger Black professionals and championing diversity initiatives within his company are also central to his long‑term ambition.
