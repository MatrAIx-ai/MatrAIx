persona_description: A medical engineer who specializes in the development and testing of medical devices and components. They are skilled in utilizing CT scanning technology for inspecting and measuring
  medical products, particularly in the design or production phase. They are adept at comparing one physical part to another to determine where differences may exist, and are proficient in reverse engineering
  or creating exact duplicates of the part using the results of a CT scan. They are also skilled in analyzing and optimizing the design and manufacturing process of objects based on the results of CT scanning.
