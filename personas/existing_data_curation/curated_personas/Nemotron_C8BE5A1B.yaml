  hobbies: '[''Cooking new recipes'', ''Community garden volunteering'', ''Local church choir'', ''Weekend hikes with friends'', ''Board game nights'', ''DIY home décor projects'', ''Attending live music
    events'', ''Reading mystery novels'']'
  career_goals: Glenda aims to move into a shift‑supervisor role within the next two years, supplementing her experience with a food‑service management certificate from a local community college. Long‑term,
    she dreams of becoming a restaurant manager or opening a modest family‑run café that blends classic Midwestern comfort food with occasional international flavors she discovers through her curiosity.
    She plans to balance these career steps with her married life, possibly taking evening classes while maintaining her responsibilities at home.
