  career_goals: Daniel dreams of becoming someone who can combine his love for art and helping others, such as an illustrator who creates books that teach kindness, a teacher who inspires curiosity in classrooms,
    or even an astronaut who explores space and shares the wonder with kids back home. He is open to many possibilities and often mentions wanting to "help people and make cool pictures" as his future job.
