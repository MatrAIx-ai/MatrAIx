  hobbies: '[''Woodworking'', ''Restoring classic cars'', ''Vegetable gardening'', ''Fishing'', ''Local history and genealogy research'', ''Reading historical non-fiction'', ''Playing chess'', ''Volunteer
    work at community library and church'', ''Attending St. Louis Cardinals baseball games'']'
  career_goals: Although officially retired, Shawn intends to deepen his impact on the community by mentoring younger volunteers in preservation projects and launching a small apprenticeship program for
    basic home‑repair skills. He aims to document the agricultural and social history of Camden County in a series of oral‑history recordings, with the goal of publishing a local heritage book. Additionally,
    he plans to expand his woodworking practice into fine furniture making, incorporating sustainable materials and eventually offering bespoke pieces to fund a solar‑panel installation on his home. On
    a personal level, Shawn hopes to travel with his wife to historic sites across the United States and support his grandchildren’s education through scholarships.
