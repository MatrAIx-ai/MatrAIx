    self‑awareness and stress‑management'']'
  hobbies: '[''Hiking and nature photography'', ''DIY home security gadget building'', ''Listening to true‑crime podcasts and reading nonfiction'', ''Yoga, meditation, and journaling'', ''Volunteering at
    local community safety events'', ''Playing strategy and puzzle video games'']'
  career_goals: Carrie aims to deepen her technical expertise by earning certifications such as the Certified Protection Officer (CPO) and completing specialized training in digital forensics and casino
    risk assessment. She hopes to move into a supervisory or lead analyst role, overseeing a team of surveillance officers and shaping security policy. Recognizing the toll her emotional reactivity can
    take, she also intends to champion workplace mental‑health initiatives, establishing peer‑support groups or access to counseling for staff. Long‑term, she envisions becoming a security consultant who
    helps gambling establishments integrate cutting‑edge surveillance technology while ensuring staff well‑being.
