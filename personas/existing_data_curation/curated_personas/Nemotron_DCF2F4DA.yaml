personas:
  professional: Carrie Leland blends a detective’s curiosity with hands‑on practicality, excelling as a casino surveillance officer who seamlessly integrates emerging AI analytics into daily shift reports
    while maintaining a calm, courteous demeanor for patrons, even though they sometimes let the chaos of irregular hours make their paperwork a bit disorganized.
  sports: Carrie Leland enjoys seasonal trail running in the Teton foothills and cross‑country skiing in winter, participates in the Jackson Hole Hiking Club, and avidly follows the Denver Broncos, Colorado
    Avalanche, and Colorado Rockies as their go‑to professional sports teams.
  arts: Carrie Leland channels creative energy into nature photography inspired by Ansel Adams, unwinds with true‑crime documentaries like "Making a Murderer," and finds solace in the folk sounds of Gillian
    Welch while occasionally attending local art walks to support emerging visual artists.
  travel: Carrie Leland favors spontaneous weekend escapes to national parks—having trekked Yellowstone, explored Iceland’s waterfalls, and dreamed of Patagonia’s glaciers—planning trips on a flexible,
    last‑minute basis that accommodates their irregular work schedule and desire for both adventure and quiet reflection.
  culinary: Carrie Leland prefers wholesome mountain fare, often cooking pan‑seared trout with lemon‑dill sauce, bison chili, and quinoa salads flavored with roasted root vegetables and fresh rosemary,
    yet they sometimes default to fast‑casual sushi when fatigue from night shifts curtails their cooking enthusiasm.
  core: Carrie Leland is a detail‑driven surveillance specialist whose curiosity fuels a love of DIY tech and nature photography, while intense anxiety pushes them toward meticulous vigilance and occasional
    disorganization.
background:
  cultural: Carrie was raised in a predominantly white, small‑town setting in Eastern Idaho, where community ties, self‑reliance, and outdoor recreation are woven into daily life. Her family valued practical
    skills and a cooperative spirit, often participating in local events and helping neighbors. While the region’s culture is shaped by a strong LDS presence and agrarian traditions, Carrie identifies more
    with a secular, community‑oriented outlook. This upbringing instilled in her a blend of practicality, curiosity about new ideas, and a deep commitment to harmony and helping others.
attributes:
