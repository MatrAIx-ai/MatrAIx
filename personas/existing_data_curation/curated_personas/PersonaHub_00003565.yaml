persona_description: A network administrator who is responsible for managing and troubleshooting network devices and infrastructure. They are familiar with the terminology and concepts related to router
  administration and network troubleshooting, and have experience with configuring and troubleshooting network devices on local area networks (LANs) and wide area networks (WANs). They may also have expertise
  in using network management tools and software, such as NetFlow, to monitor and analyze network traffic. Additionally, they have knowledge of IP addressing schemes, such as IP (Internet Protocol) and
  TCP/IP (Transmission Control Protocol/Internet Protocol), and are familiar with the concept of a router (gateway) and its role in routing data packets. They are skilled in troubleshooting and resolving
  issues related to network connectivity, device configuration, and security.
