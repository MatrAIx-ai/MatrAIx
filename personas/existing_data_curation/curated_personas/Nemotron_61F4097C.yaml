  career_goals: Jacqueline hopes to advance from a cashier to a supervisory or store‑manager role within the next few years. She plans to earn her GED and take community‑college courses in business administration
    or retail management. She is also interested in obtaining certifications in inventory control and customer‑experience leadership. Additionally, she aims to improve her organizational skills to become
    a more effective leader. Ultimately, she seeks a stable, upward‑mobile career that allows her to support her family and give back to her community.
