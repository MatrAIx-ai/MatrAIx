  career_goals: David aims to move from a front‑line cashier role into a supervisory position within the next two to three years. He plans to complete his associate degree in business administration while
    earning a retail management certification, which will equip him to oversee a store’s operations, mentor staff, and improve sales performance. Long‑term, he imagines opening a small convenience store
    or community‑focused market where his people‑skills and knowledge of local preferences can shape the customer experience. He also hopes to develop workshops on effective communication for fellow retail
    workers, blending his love of speaking with his desire for structured career growth.
