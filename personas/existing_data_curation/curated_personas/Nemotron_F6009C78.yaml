personas:
  professional: Justin Ly is a kindergarten explorer who organizes classroom projects with meticulous precision, turning playtime into structured investigations and proudly presenting findings to curious
    classmates.
  sports: Justin Ly dashes on the soccer field for the ‘Little Lions’ club, idolizes the local professional team the Panthers, and balances high‑energy dribbling sessions with occasional anxious pauses
    when a new drill feels overwhelming.
  arts: Justin Ly delights in finger‑painting vibrant jungles, passionately copies the bold colors of Studio Ghibli’s Totoro posters, and eagerly recites lines from the animated movie Moana during play,
    proudly showing off a crayon‑sketched family portrait to visiting grandparents.
  travel: Justin Ly dreams of future road trips to the Grand Canyon after the family’s successful weekend excursion to Disneyland, eagerly packing a small backpack with favorite stuffed rabbit and a sketchbook,
    yet sometimes worries about leaving the familiar playground behind.
  culinary: Justin Ly prefers buttery macaroni and cheese, chicken nuggets, and bright strawberry slices, occasionally helps whisk pancake batter with measured spoons, though they insist on arranging food
    on plates in perfectly aligned rows, causing occasional mealtime debates.
  core: Justin Ly is a hyper‑curious, organized five‑year‑old who loves being the center of attention, meticulously lines up toys, worries about tiny mishaps, and turns everyday adventures into structured,
    art‑filled stories.
background:
  cultural: Justin is a white child raised in Honokaa, a small town on the Big Island of Hawaii. His family blends mainland American traditions—such as Thanksgiving and Fourth of July celebrations—with
    local Hawaiian culture, participating in island events like makahiki festivals, hula gatherings, and community beach clean‑ups. Growing up near taro fields and the Pacific Ocean, he is regularly exposed
    to Hawaiian language greetings, ukulele music, and a strong community ethos that values respect for nature and collective well‑being.
