personas:
  professional: Drake Durham, an aspiring digital comic creator and junior coder who leads his school's robotics club, channels a curiosity for new ideas and a competitive streak into meticulously illustrated
    webcomics, experimental game prototypes, and perfectly timed code sprints, while balancing a penchant for organization with a willingness to improvise.
  sports: Drake Durham rides the city's downtown skate park with a crew of friends, follows the Los Angeles Clippers for basketball inspiration, and occasionally joins the middle-school's after-school soccer
    practice, channeling a competitive edge into both board tricks and leaderboard scores in local multiplayer shooters.
  arts: Drake Durham expresses creativity through digital comics inspired by Darick Robertson's bold line work, photographs vibrant murals by local street artist 'Mira', riffs on guitar with influences
    ranging from John Mayer to Tash Sultana, and builds intricate LEGO dioramas while listening to the experimental beats of Flying Lotus, all of which shape a distinctly eclectic artistic identity.
  travel: Drake Durham spends weekends mapping the hidden skate spots and graffiti alleys of their hometown, dreams of a future trip to Tokyo's Akihabara for immersive tech culture, yet currently confines
    travel adventures to affordable family road trips to nearby national parks like Yellowstone, balancing a limited allowance with a craving for new visual inspiration.
  culinary: Drake Durham's palate swings between pepperoni pizza with extra mozzarella, spicy ramen brimming with sriracha and soft-boiled eggs, and tacos al pastor topped with pineapple and cilantro, and
    while they claim amateur status in the kitchen, they often assemble homemade sushi rolls using avocado, cucumber, and smoked salmon for friends during after-school hangouts.
  core: Drake Durham is a tech-savvy 13-year-old with a sketchbook always at the ready, a skate deck under one arm, and a habit of over-editing their latest comic panel until the sun sets.
background:
  cultural: Raised in Auburn, a suburb of Seattle in King County, Drake grew up in a predominantly white, middle-class community with strong ties to the Pacific Northwest's outdoors and tech culture. His
    family's European heritage blends with the region's emphasis on environmental awareness, progressive education, and a vibrant local arts scene. He often participates in community events like the Auburn
    Fair and enjoys the diverse cultural influences of nearby Seattle, which shape his open-minded and curiosity-driven outlook.
