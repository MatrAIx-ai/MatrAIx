  career_goals: Jennifer aims to advance into a senior leadership role such as Director of Health Information or Health Information Governance Manager within the next five years. She plans to obtain the
    RHIA certification and lead a regional EHR integration project that leverages AI‑driven data validation. Her ambition includes establishing a mentorship program for junior health informatics staff,
    championing interoperability standards across the hospital network, and shaping policy that balances data security with clinical efficiency. Ultimately, she seeks to leave a lasting impact on patient
    data integrity and organizational performance while maintaining a stable, purposeful career trajectory.
