  hobbies: '[''Drawing and watercolor painting'', ''Reading adventure and nature books'', ''LEGO building'', ''Listening to classical music'', ''Exploring nature (collecting leaves, observing insects)'',
    ''Minecraft creative mode'', ''Mindfulness and deep‑breathing exercises'', ''Journaling'']'
  career_goals: Anthony dreams of becoming a scientific illustrator or wildlife artist who can merge his love for art, nature, and quiet study. He envisions a future where he can spend time in serene environments—like
    a field lab or a museum studio—capturing the beauty of ecosystems while helping to educate others. He also harbors a fascination with space exploration and occasionally imagines himself as an astronaut‑researcher,
    reflecting his curiosity about new ideas and unconventional thinking.
