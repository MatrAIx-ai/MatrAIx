  career_goals: Even though retired, Roy aims to maintain an active, structured routine that balances flexibility with his love of social engagement. His primary goals are to serve as a regular volunteer
    facilitator for the senior center’s activity programs, establish a weekly support group for seniors dealing with anxiety, learn digital photography to document community events, and stay physically
    healthy through low‑impact exercise. He also hopes to complete a personal memoir reflecting on his life’s experiences.
