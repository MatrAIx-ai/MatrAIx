  career_goals: Although retired, Johnah is focused on leaving a lasting legacy in his community. He aims to mentor younger members at the local senior center, develop a small community garden that ties
    together his love for horticulture and food heritage, and document his life story and family genealogy for future generations. He also hopes to serve as an informal advisor to the local labor union,
    share his knowledge of workplace safety, and travel to key sites of African American history across the United States. Maintaining his health, staying active, and ensuring his finances are secure for
    his spouse remain central priorities.
