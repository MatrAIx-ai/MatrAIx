personas:
  professional: Johnah Frank, a retired industrial maintenance supervisor with three decades of hands‑on experience, now channels his methodical expertise into mentoring younger workers, advising the local
    labor union on safety, and overseeing a community garden project, all while applying his curiosity for new tools to improve workflow efficiency.
  sports: Johnah Frank, a devoted fan of the Detroit Tigers and occasional weekend angler on the St. Clair River, balances low‑impact fitness by walking the garden rows and joining a senior‑center walking
    club, while avoiding high‑intensity workouts due to joint stiffness.
  arts: Johnah Frank, an aficionado of classic jazz legends like John Coltrane and blues icons such as B.B. King, finds solace in singing with his church choir and often quotes passages from biographies
    of historical figures during bridge games, while his woodworking displays reflect a respect for craftsmanship akin to mid‑century modern artists.
  travel: Johnah Frank, who dreams of road‑tripping to places like the National Museum of American History in Washington, D.C., the historic Freedom Trail in Boston, and southern historic sites that tell
    complex stories, plans his trips meticulously, balancing a limited travel budget with a desire to experience the narratives he reads about.
  culinary: Johnah Frank, a devoted home‑cook, regularly prepares soul‑food staples such as fried chicken, collard greens simmered with smoked turkey, and sweet potato cornbread, drawing fresh tomatoes
    and herbs from his garden, while occasionally over‑seasoning his gumbo, a quirk his family lovingly teases.
  core: Johnah Frank, a 71‑year‑old retired maintenance supervisor who blends meticulous craftsmanship, community spirit, and a love for nature into a life of gardening, woodworking, and mentorship, all
    while juggling a tendency to splurge on fishing gear and a sweet tooth for soul‑food.
background:
  cultural: Johnah was born in the mid‑1950s and grew up during a pivotal era for civil‑rights activism in the American Midwest. His grandparents were part of the Great Migration, moving from the rural
    South to Michigan in search of industrial work and greater freedom. Raised in a close‑knit, church‑centered family, he internalized values of resilience, community service, and the importance of storytelling.
    Living in St. Clair, a largely white, small‑town environment, he experienced both the challenges of being a minority and the strength of a supportive African‑American community network. These experiences
    shape his appreciation for cultural heritage, his commitment to mentorship, and his love for music, food, and traditions passed down through generations.
