  hobbies: '["Reading contemporary African‑American literature", "Personal journaling", "Volunteer tutoring", "Gardening", "Yoga", "Cooking Southern and African‑inspired meals", "Listening to jazz, R&B,
    and gospel", "Attending community and church events", "Playing strategy board games", "Recreational basketball"]'
  career_goals: Shenna aims to become a district early‑childhood program director within the next five years, leading initiatives that improve access to high‑quality preschool education in rural Georgia.
    She plans to earn a Master’s in Educational Leadership and obtain Child Development Professional certification to strengthen her credibility. Her long‑term ambition is to secure grant funding for a
    community‑based after‑school STEM enrichment center that serves under‑served Black families, while also developing mentorship programs for emerging educators. Balancing her competitive nature, she seeks
    recognition for innovative program outcomes and hopes to influence state policy on early‑education equity.
