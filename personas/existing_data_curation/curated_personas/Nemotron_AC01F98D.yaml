personas:
  professional: Shenna Brown designs and leads early‑childhood education programs, blending rigorous curriculum development, data‑driven evaluation, and grant‑writing prowess with a structured‑yet‑flexible
    mindset that channels her competitive drive into securing resources and pioneering culturally responsive teaching practices.
  sports: Shenna Brown enjoys a lively mix of recreational basketball with the Washington County Women's Hoops League, follows the Atlanta Hawks in the NBA and the Atlanta Braves in the MLB for seasonal
    excitement, practices yoga for flexibility, and occasionally joins community summer softball games that satisfy her competitive edge.
  arts: Shenna Brown immerses herself in the soulful sounds of John Coltrane, the contemporary R&B vibes of H.E.R., and the uplifting gospel of Kirk Franklin, while devouring novels by Toni Morrison and
    James Baldwin and attending local performances by the Southern Roots Gospel Choir, which together shape her creative expression.
  travel: Shenna Brown prefers carefully planned road trips that blend cultural exploration with relaxation, having journeyed to Savannah’s historic squares, New Orleans’ jazz districts, and the coastal
    charm of Charleston, she now dreams of trekking the historic sites of Ghana and exploring the vibrant markets of Marrakech, balancing limited student loan constraints with a desire for immersive experiences.
  culinary: Shenna Brown cooks with confidence, fusing Southern staples like collard greens and fried chicken with African‑inspired spices such as berbere and suya, mastering dishes like jambalaya and sweet‑potato
    brownies, and delights in experimenting with fresh rosemary, smoked paprika, and occasional hot‑sauce drizzles.
  core: Shenna Brown is a fiercely organized yet occasionally scattered early‑education advocate who channels competitive ambition into community grant wins, battles chronic worry with yoga and journaling,
    and can’t resist a late‑night binge of soul playlists while obsessively checking her savings app.
background:
  cultural: Shenna grew up in a tight‑knit Black community in Washington County, Georgia, where church, family gatherings, and local traditions shaped her identity. Her upbringing was steeped in Southern
    African‑American culture—storytelling, gospel music, and cooking dishes like collard greens and fried chicken—while her humanities studies deepened her appreciation of Black history and literature.
    She maintains strong ties to her extended family and participates in community events that celebrate civil‑rights heritage and cultural resilience. This background informs her commitment to fostering
    inclusive, culturally responsive education for the children she serves.
attributes:
  skills: '["Curriculum Development", "Child Development Knowledge", "Program Management", "Budgeting and Financial Planning", "Grant Writing", "Team Leadership", "Conflict Mediation", "Data Analysis",
