personas:
  professional: Kelli Dugas, a 46‑year‑old Certified Registered Nurse Anesthetist, blends an analytical STEM background with fifteen years of high‑stress OR experience to craft evidence‑based perioperative
    protocols, lead quality‑improvement teams, and mentor junior staff, all while positioning themselves for a future Director of Perioperative Services role, and they routinely apply structured checklists
    to keep chaos at bay.
  sports: Kelli Dugas, an avid member of the Washington County Hiking Association, regularly tackles Appalachian Trail sections, supports the Baltimore Ravens (NFL) and Baltimore Orioles (MLB) during season,
    and integrates weekly yoga sessions into their fitness routine to maintain flexibility for long treks, and they often organize group hikes that double as team‑building outings for fellow clinicians.
  arts: 'Kelli Dugas, a community‑choir soprano, finds solace rehearsing works by Mozart and contemporary folk artist Joni Mitchell, attends Washington County Playhouse productions such as ''August: Osage
    County,'' and curates a collection of vintage Bob Dylan vinyl records that accompany their weekly book club discussions, and they occasionally volunteer to lead music workshops for local schools.'
  travel: Kelli Dugas prefers meticulously planned weekend getaways, often driving to Shenandoah National Park for autumn hikes, has explored historic Edinburgh during a solo trip, and dreams of trekking
    New Zealand’s Milford Track once they can carve time out of a packed OR schedule, and they keep a travel journal filled with photos of mountain vistas and café sketches.
  culinary: Kelli Dugas, a self‑described culinary experimenter, often prepares Mediterranean‑style grilled salmon with lemon‑dill sauce, masters a spiced chickpea curry using fresh basil from their garden,
    and delights in baking rosemary‑infused sourdough loaves topped with sea salt after evening yoga, and they regularly host potluck evenings for fellow nurses to share recipes and stress‑relief tips.
  core: Kelli Dugas, a structured yet sociable 46‑year‑old CRNA, balances high‑pressure operating rooms with group hikes, choir rehearsals, meticulous budgeting, and a lingering anxiety that fuels both
    relentless self‑improvement and occasional self‑neglect, and they often find themselves double‑checking everything from medication doses to travel itineraries.
background:
  cultural: Kelli’s cultural background reflects a middle‑class, white, American upbringing in the small‑town environment of Washington County, Pennsylvania. Her family emphasized self‑reliance, education,
    and civic responsibility, rooted in Protestant‑influenced traditions that prized service and compassion. After completing a STEM graduate program at a Pennsylvania university, she attended a CRNA program
    on the West Coast, exposing her to progressive medical cultures. This blend of Appalachian community values and broader national perspectives informs her pragmatic work ethic, collaborative spirit,
    and commitment to both patient care and community engagement.
attributes:
  skills: '[''Advanced Cardiac Life Support (ACLS)'', ''Anesthetic Pharmacology'', ''Airway Management'', ''Regional Anesthesia Techniques'', ''Perioperative Patient Assessment'', ''Critical Care Monitoring'',
    ''Pain Management'', ''Patient Education'', ''Interdisciplinary Team Coordination'', ''Quality Improvement Initiatives'', ''Medical Device Troubleshooting'', ''Data Analysis and Evidence‑Based Practice'',
    ''Teaching and Precepting'', ''Stress Management Strategies'', ''Protocol Development'']'
  hobbies: '[''Hiking Appalachian Trails'', ''Volunteering at Community Health Fairs'', ''Weekly Book Club'', ''Cooking and Baking with Friends'', ''Community Choir Participation'', ''Yoga and Mindfulness
    Practice'', ''Gardening'', ''DIY Home Improvement Projects'', ''Traveling to Historical Sites'', ''Puzzle Solving and Brain Games'']'
  career_goals: Kelli aims to move into a leadership position such as Director of Perioperative Services, where she can shape department policies, mentor staff, and enhance patient safety. She plans to
    pursue a Doctor of Nursing Practice (DNP) focused on perioperative outcomes and to publish research on stress‑reduction strategies for anesthesia teams. Additionally, she seeks to develop community
    outreach programs that educate patients on anesthesia safety and chronic pain management, leveraging her sociable nature to build supportive networks and improve public health awareness.
