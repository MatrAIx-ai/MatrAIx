persona_description: A political scientist who specializes in the study of urban politics and mayoral elections. She has a keen interest in the factors that contribute to the success of black candidates
  in major cities, particularly in the context of mayoral elections. Her research interests include the role of race and ethnicity in political representation and the impact of minority representation on
  the outcomes of elections. She is also interested in the historical context of mayoral elections in major cities and the factors that have shaped the political landscape in these cities.
