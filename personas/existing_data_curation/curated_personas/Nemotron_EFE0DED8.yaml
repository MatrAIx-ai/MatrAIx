  hobbies: '[''Salsa and cumbia dancing'', ''Cooking Mexican cuisine'', ''Zumba fitness classes'', ''Volunteering at food pantry'', ''Hiking in Indiana state parks'', ''Reading mystery novels'', ''Watching
    soccer'', ''Participating in community festivals'', ''DIY home gardening'']'
  career_goals: Moraima aims to become a certified lead technician for large‑scale office equipment, earn CompTIA A+ and specialized service technician certifications, and move into a supervisory role overseeing
    a regional service team. She envisions opening a small, family‑run mobile repair business that serves local businesses and the growing Hispanic community in Northwest Indiana. In the long term, she
    plans to complete an associate degree in electronics engineering technology to broaden her technical expertise and increase her earning potential while maintaining a stable work‑life balance for her
    family.
