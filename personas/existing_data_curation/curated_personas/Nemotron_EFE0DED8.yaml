personas:
  professional: Moraima Martinez is a meticulous field service technician who repairs and calibrates ATMs, office copiers, and printers, drawing on their expertise in reading schematics, diagnosing hardware/software
    failures, and configuring network settings, while their organized, reliability‑driven nature and friendly communication style ensure they meet service deadlines despite occasional anxiety over delayed
    parts.
  sports: Moraima Martinez stays fit through thrice‑weekly Zumba classes, hikes with the local Indiana Trail Club on weekends, cheers for the Chicago Fire FC in MLS matches and the Chicago Bulls during
    NBA season, and occasionally joins a recreational soccer league at the community center.
  arts: Moraima Martinez expresses their artistic side by dancing salsa and cumbia at community festivals, practicing routines set to the vibrant sounds of Celia Cruz, Marc Anthony, and Shakira, and volunteering
    as a stagehand for the regional theater troupe, where they enjoy the collaborative energy.
  travel: Moraima Martinez prefers weekend getaways that blend nature and culture, such as hiking the dunes at Indiana Dunes National Park, exploring the historic streets of New Orleans during Mardi Gras,
    and dreaming of trekking Patagonia’s glaciers on a future long‑term adventure, while relying on meticulous planning apps to keep travel costs within their budget.
  culinary: Moraima Martinez is an avid home cook who enjoys preparing tamales, mole, and pozole, skillfully balancing spices like ancho chilies, cumin, and fresh herbs, and they often host neighborhood
    potlucks where they pair the dishes with homemade salsa verde and refreshing aguas frescas.
  core: Moraima Martinez blends meticulous technical expertise with a vibrant community spirit, juggling structured work routines, spontaneous dance nights, and a habit of over‑checking budgets, all while
    battling a perpetual worry that fuels both their diligence and occasional stress.
background:
  cultural: Moraima is a first‑generation Mexican‑American who grew up bilingual, speaking Spanish at home and English at school. She celebrates Día de los Muertos, Cinco de Mayo, and traditional family
    gatherings with music, altar‑building, and home‑cooked meals. Her Catholic upbringing and close‑knit extended family instilled values of hospitality, respect, and community service. Living in Hammond,
    she blends her Mexican heritage with Midwestern customs, participates in local festivals, supports Hispanic businesses, and fosters cross‑cultural connections through her social activities.
attributes:
  skills: '[''ATM and kiosk repair'', ''Office copier and printer troubleshooting'', ''Electronics diagnostics'', ''Circuit board soldering'', ''Network connectivity troubleshooting'', ''Service software
