  career_goals: Although retired, Carmon aims to leave a tangible legacy in his community. He plans to create a series of hand‑crafted wooden benches for the town park, compile and publish a memoir of local
    history and personal stories, and mentor younger residents in traditional crafts and music. He also hopes to travel to major art museums in Washington, D.C., and New York to deepen his appreciation
    of modern art while promoting Appalachian art through local exhibitions.
