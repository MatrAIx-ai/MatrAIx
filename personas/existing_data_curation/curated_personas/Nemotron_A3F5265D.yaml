  career_goals: Although she is retired from formal employment, Susan sets personal goals that reflect her artistic drive and desire for meaningful connection. She aims to complete a series of abstract
    canvases that explore memory and change, and to exhibit the collection at the local community center or a regional senior art show. She hopes to write and self-publish a memoir that weaves together
    her life in rural North Carolina, her curiosity about art, and the stories of her ancestors. Susan also wishes to establish a weekly small-group art and storytelling circle for seniors, offering a space
    where participants can share ideas and critique each other's work. Learning a new medium, such as collage or mixed-media, is another ambition she has set for the coming year, and she plans to document
    the evolving landscape of Hoke County through a photo-journal project that combines her photography and narrative skills.
