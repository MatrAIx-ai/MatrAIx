personas:
  professional: Susan Jones, a self‑taught abstract painter and speculative writer, channels their vivid imagination into oil canvases that explore memory and change while they adopt a relaxed, occasionally
    disorganized approach to deadlines, turning the weekly art‑and‑storytelling circle into a fluid, improvisational gathering.
  sports: Susan Jones is an avid supporter of the Carolina Panthers, joins the local seniors’ walking club for sunrise strolls through pine‑filled trails, participates in seasonal community garden competitions
    that feel like a gentle sport, and occasionally plays casual pickleball at the community center, all while they keep a cautious eye on overly competitive teammates.
  arts: Susan Jones immerses themselves in the abstract expressionism of Mark Rothko and the lyrical landscapes of Georgia O’Keeffe, listens to Mozart’s string quartets while painting, draws narrative inspiration
    from speculative fiction authors Octavia Butler and Ursula K. Le Guin, and proudly exhibits their work at the Hoke County senior art show, where they cherish intimate critiques from fellow retirees.
  travel: Susan Jones prefers leisurely road trips along the Blue Ridge Parkway, revisits the historic charm of Savannah’s moss‑draped squares, dreams of a quiet literary pilgrimage to Bath, England, and
    balances these wanderlust urges with a limited travel budget that keeps most excursions within a day’s drive of their North Carolina home, while they carefully plan each itinerary to avoid overwhelming
    stress.
  culinary: Susan Jones delights in preparing Southern‑style shrimp and grits seasoned with rosemary from their garden, a caramelized sweet‑potato casserole, and lavender shortbread cookies, often pairing
    meals with homemade hibiscus‑infused iced tea, while they oscillate between confident home chef and occasional experimental mishap when a new spice overwhelms the dish.
  core: Susan Jones is a whimsical, slightly disorganized senior artist who worries about perfecting each brushstroke yet can’t resist splurging on new pigments, finds solace in solitary birdwatching, and
    they habitually forget to water their indoor ferns until the last minute.
background:
  cultural: Susan grew up in the rural outskirts of Hoke County, North Carolina, as part of a white, multi-generational farming family. The Southern Appalachian culture of the area—marked by close-knit
    community ties, church fellowship, and an appreciation for folk traditions—shaped her early years. Her family valued self-reliance, storytelling, and seasonal celebrations that blended Christian rituals
    with local customs. Growing up during the social changes of the 1960s and 1970s, she witnessed shifts in the county's agricultural landscape and the gradual diversification of its population, experiences
    that cultivated both a deep attachment to regional heritage and a measured skepticism toward outside influences. Today, her identity reflects a blend of traditional Southern hospitality, a love for
    the natural world, and a personal quest for artistic novelty.
