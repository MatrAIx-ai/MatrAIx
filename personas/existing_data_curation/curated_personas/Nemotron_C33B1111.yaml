  hobbies: '[''Sketching and drawing'', ''Digital painting (Procreate)'', ''Playing keyboard'', ''Reading fantasy and sci‑fi novels'', ''Watching art tutorials on YouTube'', ''Cooking traditional Mexican
    recipes with family'', ''Exploring local nature trails near Lake County'']'
  career_goals: Carlos aims to merge his love for art and cultural storytelling into a future career, aspiring to become a concept artist for video games, an illustrator of children’s books that celebrate
    Mexican heritage, or a documentary filmmaker preserving folk traditions. He plans to attend an arts‑focused high school, develop a strong portfolio, and eventually study fine arts or visual communication
    at a university where he can further refine his technical and narrative skills.
