personas:
  professional: Carlos Mckenna is an aspiring digital manga artist who blends a love for sci‑fi narratives with a self‑taught mastery of Photoshop and a tablet, channeling their curiosity and preference
    for solitary work into nightly sketch marathons, even as they often let school projects slip because flexibility feels more important than strict deadlines.
  sports: Carlos Mckenna enjoys low‑key weekend hikes along the Great Lakes shoreline for inspiration and follows the Detroit Red Wings fervently on TV, while occasionally playing on the local youth soccer
    league’s midfield squad, though they prefer solo jogging over organized practice.
  arts: Carlos Mckenna is a manga enthusiast who idolizes Osamu Tezuka, Studio Ghibli’s Hayao Miyazaki, and Makoto Shinkai, blends those influences with a penchant for atmospheric fantasy soundtracks by
    Yoko Kanno, and spends hours watching YouTube tutorials to refine line work, finding solace in creating worlds where their quiet nature can speak loudly.
  travel: Carlos Mckenna favors self‑planned, low‑stress trips that combine nature and culture—having camped at Mackinac Island’s shoreline, they dream of a solo pilgrimage to Kyoto’s historic temples to
    study ukiyo‑e art, yet they typically budget trips around family holidays due to their allowance limits.
  culinary: Carlos Mckenna loves helping in the kitchen, especially mastering handmade tamales and salsa fresca, and they experiment with fusion dishes like ramen‑topped nachos, using ingredients like shiitake
    mushrooms and fresh cilantro while their cooking skill remains somewhere between hobbyist and budding home chef.
  core: Carlos Mckenna is a solitary, curious 13‑year‑old who weaves manga storytelling, music, and nature walks into a quietly ambitious routine, often juggling impulse art spends with thoughtful savings,
    and battling seasonal allergies and eye strain with disciplined self‑care.
background:
  cultural: Carlos is a first‑generation Mexican‑American whose parents emigrated from Jalisco. He grows up speaking Spanish at home while attending an English‑language school, giving him bilingual fluency.
    His family celebrates cultural traditions such as Día de los Muertos, Semana Santa, and Mexican holidays, and they often gather around shared meals featuring dishes like tamales and pozole. These cultural
    experiences shape his values of family cohesion, respect for elders, and a deep appreciation for Mexican folklore and art.
