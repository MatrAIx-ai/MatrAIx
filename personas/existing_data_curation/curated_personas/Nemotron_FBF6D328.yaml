  career_goals: Luisa aims to advance to a senior portfolio manager role within the next five years, leading a high‑performing investment team focused on sustainable and impact‑driven assets. She aspires
    to become a subject‑matter expert in integrating fintech innovations with traditional investment strategies, and eventually launch her own boutique fund that leverages data science to identify undervalued
    opportunities in emerging markets. Luisa also intends to mentor Hispanic women entering finance, promoting diversity and inclusion within the industry.
