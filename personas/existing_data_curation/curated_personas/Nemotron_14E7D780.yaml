personas:
  professional: Jomar Sanchez is an 8‑year‑old aspiring engineer who channels their curiosity and practical mindset into building elaborate Lego structures, treating each creation like a mini‑project that
    must meet both imaginative and structural criteria, while also balancing school responsibilities with a reliable habit of tidying up their workshop after play.
  sports: Jomar Sanchez loves playing on the neighborhood youth soccer club, where they idolize the teamwork of FC Barcelona while also cheering for the local high‑school team the Tigers, and they stay
    fit by joining weekend pick‑up games at the park and practicing dribbling drills with a homemade obstacle course.
  arts: Jomar Sanchez channels creative energy into drawing comic strips inspired by artists like Stan Lee and Hayao Miyazaki, swapping sketches with friends after school, and they also enjoy listening
    to the upbeat tunes of Imagine Dragons while building Lego stories that double as visual narratives.
  travel: Jomar Sanchez prefers family road trips to nearby natural sites such as the state park waterfall and occasional beach outings in Costa del Mar, planning adventures with a hand‑drawn map that balances
    excitement with the comfort of familiar routines, and they dream of visiting the historic castles of Europe when old enough.
  culinary: Jomar Sanchez assists in the kitchen by mastering the art of folding pupusas and wrapping tamales, proudly garnishing them with fresh cilantro and cheese, and they also love experimenting with
    making chocolate chip pancakes, though they sometimes forget to rinse the cutting board, leaving a mess that they later clean up with a giggle.
  core: Jomar Sanchez is an endlessly curious 8‑year‑old who builds Lego masterpieces, scores goals on the soccer field, sketches comic heroes, and balances disciplined saving with spontaneous snack raids,
    all while maintaining a calm, resilient vibe that hides their habit of leaving Lego pieces scattered across the living room.
background:
  cultural: Jomar comes from a Salvadoran family that immigrated to Durham, North Carolina, where he was born and raised. He grows up speaking Spanish at home and English at school, giving him a strong
    bilingual foundation. Family gatherings are centered around traditional foods like pupusas, yuca frita, and tamales, and celebrations such as Holy Week processions, Día de los Santos, and Salvadoran
    Independence Day are observed with music, dance, and storytelling. His parents emphasize the values of hard work, community solidarity, and respect for elders, which blend with the diverse, inclusive
    atmosphere of Durham. This dual cultural exposure shapes Jomar's identity, fostering pride in his Salvadoran roots while also embracing the multicultural environment of his hometown.
