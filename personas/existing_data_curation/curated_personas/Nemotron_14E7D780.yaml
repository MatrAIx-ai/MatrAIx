  hobbies: '[''Soccer'', ''Lego construction'', ''Adventure and sci‑fi book reading'', ''Comic drawing'', ''Cooking with family (making pupusas and tamales)'', ''Participating in cultural festivals'']'
  career_goals: Jomar dreams of a future where he can combine his love of people, problem solving, and his cultural roots. He is excited about becoming a community leader who organizes neighborhood events,
    a science explorer who builds inventions that help everyday life, or a soccer coach who mentors younger kids. He hopes to use his bilingual skills to bridge cultural gaps and eventually work in a role
    that supports families like his own, whether as a teacher, a community outreach specialist, or an engineer who designs practical solutions for households.
