  career_goals: Uyen aims to transition from a senior computer systems analyst to a solutions architect or lead analyst role where she can guide cross‑functional teams and embed AI‑driven analytics into
    enterprise processes. She plans to earn an AWS Solutions Architect certification and a PMP credential to strengthen her strategic and project‑management capabilities. While she pursues these milestones,
    she is also focused on establishing a work environment that balances ambitious projects with flexible schedules and remote‑work options, helping her manage stress and maintain personal well‑being.
