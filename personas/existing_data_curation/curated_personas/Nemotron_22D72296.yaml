  career_goals: Justin aims to transition into a senior engineering leadership role where he can shape technical strategy while still staying hands‑on with innovative projects. His medium‑term goal is to
    become an Engineering Manager or Director of Software Development at a mid‑size tech company that values both product impact and employee growth. In the longer term, he aspires to launch his own SaaS
    startup focused on AI‑enhanced workflow automation, leveraging his curiosity for emerging technologies and his practical experience delivering reliable solutions. Along the way, he wants to expand his
    influence in the Kansas City tech ecosystem by organizing conferences, mentoring emerging talent, and championing inclusive, collaborative team cultures.
