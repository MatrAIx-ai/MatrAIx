personas:
  professional: Justin Prenoveau is a full‑stack software developer who blends a pragmatic, test‑driven approach to building scalable React and Node.js applications with a sociable, talkative presence at
    Kansas City tech meetups, mentoring junior engineers and positioning them for senior engineering leadership.
  sports: Justin Prenoveau follows the Kansas City Chiefs and Royals, plays pickup basketball with the Midtown Hoops crew on Friday nights, and hikes the Flint Hills each spring, treating fitness as a social
    outlet that balances their demanding engineering schedule.
  arts: Justin Prenoveau enjoys strumming acoustic guitar to the likes of John Denver and The Avett Brothers, devours classic sci‑fi novels by Isaac Asimov, and regularly hosts board‑game nights featuring
    Settlers of Catan and Dungeons & Dragons, weaving creative expression into family gatherings and community events.
  travel: Justin Prenoveau prefers road‑trip adventures, having explored the Badlands, the Ozarks, and a recent family vacation to Portland, Oregon, while dreaming of a future trip to Kyoto, Japan, and
    meticulously plans each itinerary using airline miles and a modest travel budget.
  culinary: Justin Prenoveau is a grill master who perfects Kansas‑style barbecue—smoked brisket, burnt ends, and dry‑rubbed ribs—using mesquite wood chips and often pairs the meals with homemade coleslaw
    and a chilled bottle of local craft beer, while occasionally over‑smoking meat when too eager to showcase new techniques.
  core: Justin Prenoveau blends a talkative, community‑driven spirit with disciplined engineering practice, a spreadsheet‑obsessed approach to money, a love for BBQ and basketball, and a modest yet adventurous
    travel streak, all punctuated by occasional forgetfulness about flossing.
background:
  cultural: Justin grew up in the Midwest, raised in a small Kansas town where community ties and a strong work ethic were core values. His family celebrated traditional Midwestern holidays with potlucks
    and county fair outings, fostering a sense of belonging and practicality. While he identifies as white and shares many cultural touchstones of the region—such as love for high school football games,
    outdoor recreation, and a modest, down‑to‑earth demeanor—he also embraces the growing diversity of the Kansas City tech scene. His marriage and active involvement in local churches and civic groups
    reflect a commitment to family and community service, influencing his collaborative yet assertive professional style.
