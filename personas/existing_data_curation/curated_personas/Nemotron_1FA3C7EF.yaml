personas:
  professional: Mary Owens is a budding robotics enthusiast who builds and programs small robots for her school club, and they channel their curiosity and practicality through methodical project planning
    and assertive problem‑solving.
  sports: Mary Owens hikes Cedar Hill State Park on weekends, birds, and runs with the middle‑school cross‑country club, cheering the Dallas Mavericks and Dallas Cowboys, while they also participate in
    the school track team to balance outdoor adventure with teamwork.
  arts: Mary Owens practices piano for an hour each day, dances to hip‑hop and R&B hits from artists like Kendrick Lamar, Beyoncé, and Doja Cat, and they devour sci‑fi novels by Isaac Asimov and N.K. Jemisin,
    letting these creative pursuits shape their imaginative problem‑solving.
  travel: Mary Owens prefers short road trips to nearby natural spots like Big Bend State Park and urban outings to Dallas museums, planning each excursion with a hand‑drawn itinerary and they balance the
    thrill of a weekend hike with the budget constraints of a middle‑school allowance.
  culinary: Mary Owens loves cooking with her grandmother, turning classic collard greens into a quinoa‑enhanced side, swapping fried chicken for herb‑crusted baked turkey, and they experiment with sweet‑potato
    mac and cheese while still mastering the perfect scrambled egg.
  core: Mary Owens is a curiosity‑driven teen who balances structured robotics projects with spontaneous hip‑hop dance breaks, saves every spare dime, and they constantly tweak soul‑food recipes into healthier
    versions, all while juggling school, church volunteering, and a secret stash of comic books.
background:
  cultural: Mary Nicole is a Black teen raised in Temple, Texas, where her family’s roots trace back to the Great Migration from the Deep South. Her household blends Southern traditions—Sunday gospel services,
    soul‑food cooking, and storytelling—with contemporary Black youth culture, such as hip‑hop music, social‑media activism, and community events like Juneteenth celebrations. The local church and community
    center provide strong support networks, fostering values of mutual aid, education, and resilience. She is proud of her heritage, often sharing family histories and participating in school projects that
    highlight African‑American contributions to Texas history. These cultural influences shape her sense of identity, her drive to succeed academically, and her commitment to giving back to her community.
