  hobbies: '[''Reading science‑fiction and mystery books'', ''Robotics club and Scratch programming'', ''Piano practice'', ''Hip‑hop and R&B dancing'', ''Cooking family recipes'', ''Hiking and birdwatching
    at local parks'', ''Church youth group volunteering'']'
  career_goals: Mary Nicole aims to earn a scholarship that will let her attend a STEM‑focused high school, where she hopes to join a robotics team and deepen her coding skills. In the long term she envisions
    a career as an environmental engineer or a public health professional, using science to solve practical problems in her community, especially around water quality and pollution in Bell County. She also
    dreams of mentoring younger Black girls who share her curiosity, perhaps by leading after‑school clubs or by speaking at local community events. Her short‑term goals include becoming the student council
    treasurer, completing a summer coding camp, and volunteering at the local health clinic to learn about community health needs.
