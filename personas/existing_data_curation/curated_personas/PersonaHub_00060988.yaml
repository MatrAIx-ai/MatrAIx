persona_description: A researcher interested in the field of physical activity assessment and epidemiology, particularly in the context of physical activity guidelines for Americans. This person is likely
  to be a scientist, researcher, or health professional who is actively involved in the development and implementation of physical activity guidelines and research studies related to physical activity.
  They are likely to be familiar with the concept of physical activity assessment, including the use of wearable monitors, and have expertise in the measurement and analysis of physical activity data. This
  person may have a background in epidemiology, public health, or physical activity research and is likely to be interested in the use of scientific publications and workshops as resources for their research.
