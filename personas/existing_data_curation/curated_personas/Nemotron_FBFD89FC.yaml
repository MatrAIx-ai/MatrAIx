  hobbies: '[''abstract painting'', ''digital illustration'', ''photography'', ''acoustic guitar'', ''improv comedy'', ''board games'', ''hiking'', ''speculative fiction reading'', ''DIY electronics'',
    ''maker space workshops'', ''community volunteering'', ''experimental cooking'']'
  career_goals: Raymond aims to move from the production line to a supervisory role within the next three years, leveraging his blend of technical know-how and creative thinking. He plans to pursue a bachelor's
    degree in Industrial Engineering or Manufacturing Management, with a focus on sustainable production and product design integration. His long-term ambition is to become a production manager who can
    lead lean initiatives while championing innovative product development, possibly guiding cross-functional teams that bridge engineering, design, and marketing. He also envisions eventually launching
    a small-scale, locally sourced craft manufacturing venture that reflects his artistic interests.
