personas:
  professional: Lauren Green, a three-year-old preschooler, shows early fascination with building block construction and a surprising dedication to tidy‑up routines, hinting at a future as an engineer who
    blends curiosity with practicality.
  sports: Lauren Green loves the bright green slide at the community park and pretends to pitch for the Tiny Tots Soccer Club, while cheering for the Chicago Cubs during family baseball evenings and the
    Chicago Bulls on basketball nights, blending active play with fandom.
  arts: Lauren Green delights in the melodic tunes of Raffi and the playful rhythms of The Wiggles, often dancing to 'Baby Beluga' while creating crayon masterpieces inspired by the colorful illustrations
    of Dr. Seuss and the animated adventures of Sesame Street characters.
  travel: Lauren Green enjoys short weekend trips to the nearby zoo where they marvel at giraffes, loves family beach days at the local shoreline, and dreams of visiting Disney World in Florida for its
    magical rides, preferring planned outings with familiar caretakers over spontaneous adventures.
  culinary: Lauren Green prefers mild, comforting foods like macaroni and cheese with cheddar, chicken nuggets, and strawberry‑topped pancakes, can stir a bowl of vanilla yogurt with a plastic spoon under
    supervision, and delights in sprinkling cinnamon on toast for extra flavor.
  core: Lauren Green is a bright, emotionally sensitive three‑year‑old who balances boundless curiosity with tidy habits, yet can melt down over minor setbacks, making them both delightfully inventive and
    occasionally reactive.
background:
  cultural: Lauren is a Black child growing up in Hyattsville, Maryland, within Prince George's County—a region known for its vibrant African American community. Her family and caregivers celebrate cultural
    traditions such as music, storytelling, and community gatherings, including events like Juneteenth and Kwanzaa. She is exposed to children's books featuring Black protagonists, rhythmic music styles
    like R&B, hip‑hop, and gospel, and local community programs that reinforce a strong sense of cultural identity and belonging while navigating contemporary urban life.
