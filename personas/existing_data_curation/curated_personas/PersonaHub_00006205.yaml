persona_description: A UA researcher and professor of chemical and environmental engineering who specializes in the study of semiconductor manufacturing and nanotechnology. He is known for his expertise
  in the use of nanoparticles in semiconductor manufacturing and their potential risks to human health and the environment. His research focuses on the study of engineered nanoparticles, their physical,
  chemical and biological attributes, and their potential effects on human health and the environment. He is a co-author of the widely read research paper on the safety of nanoparticles used in semiconductor
  manufacturing.
