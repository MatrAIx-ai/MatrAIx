persona_description: A historian specializing in the study of the Spanish conquest of the Inca Empire in Peru. Her research focuses on the impact of the Spanish conquest on the region's culture, society,
  and landscape. She is particularly interested in the role of the Spanish conquistadors in shaping the region's physical features, such as the sand ridges along the northern coast. Her expertise includes
  the use of radiocarbon dating to analyze the time periods and events that shaped the region's history.
