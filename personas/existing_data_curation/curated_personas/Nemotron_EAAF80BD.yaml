  career_goals: He wishes to continue contributing to the cultural life of Ellensburg by organizing multicultural art exhibitions, mentoring emerging local artists, and establishing a small community garden
    that also serves as a gathering space for cultural events. He hopes to travel to Spain to deepen his connection to his ancestral roots, document the trip through a photo‑essay and sketches, and perhaps
    compile a cookbook that blends traditional Spanish recipes with local Pacific Northwest ingredients. He also aspires to write a memoir or collection of personal essays reflecting on his life experiences,
    art, and cultural heritage.
