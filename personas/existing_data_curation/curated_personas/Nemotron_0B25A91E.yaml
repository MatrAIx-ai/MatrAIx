personas:
  professional: Luz Santana is a multidisciplinary visual artist who merges mixed‑media murals and AR installations, leveraging Adobe Creative Suite, Procreate, and Blender while curating community‑based
    projects, writing grants, and facilitating bilingual workshops that empower immigrant youth in Queens.
  sports: Luz Santana fuels their energetic lifestyle through weekly salsa dancing, sunrise yoga at Prospect Park, pick‑up basketball games with fellow New York Knicks fans, and avidly follows the New York
    Knicks, Mets, and Rangers, cheering loudly during the playoffs.
  arts: Luz Santana immerses themselves in the art scene by attending gallery openings featuring creators like Kehinde Wiley, Ai Weiwei, and Tschabalala Self, reading magical‑realist novels by Isabel Allende
    and contemporary philosophy by Slavoj Žižek, and curating experimental sound‑scape installations inspired by salsa rhythms and electronic music.
  travel: Luz Santana prefers purposeful travel that blends research and leisure, having explored the street art of Berlin, the vibrant markets of Oaxaca, the historic murals of Buenos Aires, and regularly
    retreats to the Catskills for creative workshops, while budgeting future trips to Kyoto to attend a holographic art festival.
  culinary: Luz Santana delights in cooking traditional family recipes such as corn masa dumplings filled with pork and vegetables, plantain‑and‑yuca stew seasoned with cilantro, lime, and achiote, and
    fragrant coconut rice with black beans, often sourcing fresh cilantro, plantains, and heirloom corn from local farmers’ markets, though they sometimes over‑season in their enthusiasm.
  core: Luz Santana is a calm, fiercely curious artist who balances meticulous project management with boundless imagination, lives impulsively on art supplies, and never lets anxiety shadow their creative
    drive.
background:
  cultural: Luz grew up in a bicultural household where Nicaraguan traditions—folk music, storytelling, and vibrant visual motifs—intersected with the multicultural fabric of New York City. Her parents
    emigrated from Managua, and family gatherings were filled with bomba drums, handcrafted textiles, and discussions of social justice in Central America. This heritage informs her aesthetic, prompting
    her to weave indigenous patterns and historical references into her contemporary work. Living in New York’s diverse Queens community, she actively participates in Latino artist collectives, celebrates
    Día de los Muertos, and uses her bilingual fluency to advocate for immigrant voices in the arts.
