  career_goals: Luz aims to establish herself as a leading multidisciplinary artist who bridges Nicaraguan heritage with contemporary New York art scenes. In the next five years she plans to secure a solo
    exhibition at a prominent gallery, launch a community art space in Queens that offers free workshops for immigrant youth, and obtain a national arts fellowship to develop an immersive AR public art
    series reflecting diaspora stories. Long-term, she envisions curating exhibitions at major museums that highlight Latin American narratives and mentoring emerging artists from underrepresented backgrounds.
