personas:
  professional: Marty Wichmann, a seasoned welder and fabricator in Vancouver, WA, leverages expertise in MIG, TIG, and stick welding along with a vivid imagination to turn technical drawings into functional
    metal art, while their relaxed approach to scheduling lets creativity flow at the cost of occasional deadline slippage.
  sports: Marty Wichmann is a regular at the Vancouver Outriders kayak club, tackles the Cascades' rugged trails each summer, cheers for the Seattle Seahawks on Sundays, and occasionally joins pick-up basketball
    games at a local community center where their competitive edge surfaces.
  arts: Marty Wichmann spends evenings welding kinetic sculptures while riffing on electric guitar to Jimi Hendrix and Daft Punk, hones improv comedy at The Improv Spot, and draws inspiration from the welded
    masterpieces of David Smith and the kinetic installations of Theo Jansen.
  travel: Marty Wichmann favors spontaneous road trips—loading the family van for weekend escapes to Olympic National Park or the coastal town of Cannon Beach, and they dream of a summer pilgrimage to the
    metal-sculpture gardens of Gwangju, South Korea, though budgeting constraints keep the trip on the wishlist.
  culinary: Marty Wichmann loves grilling cedar-plank salmon brushed with honey-mustard, whipping up spicy kimchi-infused ramen on lazy evenings, and concocting homemade copper-brew coffee, yet they often
    skip meal planning, resulting in last‑minute pizza deliveries after late‑night studio sessions.
  core: Marty Wichmann is a 37-year-old calm, competitive welder-artist whose imagination fuels kinetic metal creations, impromptu jam sessions, and spontaneous adventures, even as they juggle a loosely
    organized schedule, occasional fiscal splurges, and a penchant for delayed dental care.
background:
  cultural: Marty grew up in a working‑class white family in the Pacific Northwest, where practicality, self‑reliance, and a strong community ethic are valued. His heritage includes Northern European (Germanic)
    roots, reflected in a cultural appreciation for craftsmanship and sturdy design. The multicultural environment of Vancouver, WA exposed him to a blend of local traditions, folk art festivals, and a
    vibrant maker scene, all of which have shaped his identity as a tradesperson who embraces both the reliability of his cultural background and the novelty of contemporary artistic expression.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Stick welding'', ''Brazing'', ''Soft soldering'', ''Blueprint reading'', ''Custom metal sculpture design'', ''Plasma cutting'', ''Welding safety compliance'',
    ''Equipment troubleshooting'', ''Informal mentorship'']'
  hobbies: '[''Metal sculpting'', ''Kinetic art construction'', ''Handmade jewelry crafting'', ''Playing electric guitar'', ''Improv comedy'', ''Live music attendance'', ''Hiking'', ''Kayaking'', ''Camping'',
    ''DIY electronics'', ''Science‑fiction reading'', ''Community fair volunteering'']'
  career_goals: Marty aims to earn a Certified Master Welder credential and to transform his trade skills into a niche business that blends functional fabrication with artistic metal sculpture. He dreams
    of opening a community workshop studio in the Vancouver area where he can produce bespoke art pieces for local galleries, teach hands‑on classes, and build a reputation as the go‑to metal artist for
    custom installations. His ambition includes expanding his client base beyond industrial work to high‑end interior design projects while maintaining a flexible, creative schedule that lets him explore
    new materials and techniques.
