  hobbies: '[''Historical fiction reading'', ''Calligraphy'', ''Tea ceremony'', ''Indoor gardening'', ''Birdwatching'', ''Crossword puzzles'', ''Traditional cooking'', ''Classical music listening'', ''Volunteer
    mentoring'']'
  career_goals: Although retired, Tu Guo aims to compile a memoir that records her journey from rural China to New York, preserving family history and cultural lessons for her grandchildren. She wishes
    to document her favorite recipes and calligraphy works in a small book to share with the community. Continuing her sense of responsibility, she aspires to mentor younger volunteers at the senior center,
    fostering intergenerational harmony. Maintaining her health and independence remains a priority, and she hopes to support a modest scholarship for a descendant or community youth interested in cultural
    studies.
