personas:
  professional: Fares Worthy is a 16‑year‑old aspiring automotive technician who excels at methodical troubleshooting, enjoys applying their budding woodworking and mechanical repair skills to practical
    projects, and demonstrates a reliable, cooperative work ethic that makes them a valued team member in the school’s robotics club.
  sports: Fares Worthy enjoys hiking the Blue Ridge trails and fishing in nearby streams, stays fit by joining the Roanoke Community Soccer League each fall, and roots for the Washington Nationals in baseball
    and the Carolina Panthers in football, blending personal outdoor activity with fandom for professional teams.
  arts: Fares Worthy channels their love for precision into building scale model aircraft and woodworking projects, often listening to folk‑rock artists like The Avett Brothers and watching classic adventure
    films such as Indiana Jones, which they use as a soothing backdrop to their hands‑on hobby.
  travel: Fares Worthy prefers meticulously planned outdoor getaways, having hiked Shenandoah National Park and camped in the Great Smoky Mountains, while dreaming of tackling Alaska’s Denali and strolling
    through Kyoto’s historic districts, balancing adventure with the modest travel budget of a teenager.
  culinary: Fares Worthy enjoys hearty, practical fare, routinely cooking grilled cheese sandwiches with sharp cheddar, whipping up homemade mac and cheese with elbow pasta and a creamy béchamel, and experimenting
    with smoked hickory ribs seasoned with rosemary and garlic, showcasing a budding culinary skill set focused on comfort foods, and they often share the meals with friends after a day of hiking.
  core: Fares Worthy is a methodical teen who balances hands‑on craftsmanship with a steady, community‑oriented outlook, occasionally indulging in competitive video games while maintaining a tight budget
    and a reliable routine, and they approach each day with quiet confidence.
background:
  cultural: Fares grew up in Candler, a small community in the foothills of the Blue Ridge Mountains of western North Carolina. His family’s roots are tied to the Appalachian and Southern heritage of the
    region, emphasizing self‑reliance, modesty, and close‑knit community ties. Weekly attendance at a local Baptist church, participation in town events such as high school football games and county fairs,
    and family gatherings centered around home‑cooked meals have shaped his values of kindness, cooperation, and harmony. The rural setting has also fostered an appreciation for the outdoors and practical
    trades, reinforcing his preference for structured, hands‑on work.
attributes:
  skills: '[''Basic automotive and bicycle maintenance'', ''Handyman household repairs'', ''Beginner woodworking'', ''Computer troubleshooting'', ''Microsoft Office proficiency'', ''Team collaboration'']'
