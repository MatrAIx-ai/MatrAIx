  hobbies: '[''Cycling'', ''Hiking'', ''Strategy board games'', ''Fantasy football'', ''Puzzle solving (Sudoku, crosswords)'', ''Cooking (recipe‑driven)'', ''DIY woodworking'', ''Yoga for stress management'',
    ''Community health volunteering'', ''Home brewing'']'
  career_goals: Marlon aims to transition into a nurse manager position within the next two years, leveraging his analytical mindset and competitive drive to improve unit performance and patient safety.
    He plans to complete a Master’s in Nursing Administration to solidify his leadership credentials. Long‑term, he aspires to become a Director of Nursing or Chief Nursing Officer, shaping policy and driving
    systematic improvements across the health system while establishing clearer work‑life boundaries to mitigate stress.
