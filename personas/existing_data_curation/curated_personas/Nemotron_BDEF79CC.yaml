  hobbies: '[''Historical nonfiction reading'', ''Philosophy study'', ''Chess'', ''Board games'', ''Woodworking'', ''Photography'', ''Urban gardening'', ''Hiking local trails'', ''Jazz vinyl collecting'',
    ''Cooking'']'
  career_goals: Harry aims to advance to a district manager role within the next three years, overseeing multiple retail locations and driving regional sales excellence. He plans to pursue an advanced retail
    management certification or an MBA to deepen his analytical capabilities. Ultimately, he envisions launching his own boutique retail concept that blends cutting‑edge technology with personalized customer
    experiences, reflecting his competitive drive to be a top performer in the industry while maintaining practical, sustainable operations.
