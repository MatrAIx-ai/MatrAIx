    counseling'', ''Data analysis for patient outcomes'', ''Integration of art therapy into nursing practice'', ''Shift scheduling and workflow optimization'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and journaling'', ''Cooking Mexican dishes with modern twists'', ''Hiking in Texas Hill Country'', ''Yoga and meditation'', ''Playing chess'',
    ''Solving puzzles (e.g., Sudoku, crosswords)'', ''Reading medical journals and art history books'', ''Volunteering at community health fairs'', ''Listening to Mexican folk music'']'
  career_goals: Ines aims to complete her Bachelor of Science in Nursing within the next two years, followed by a Master of Science in Nursing with a focus on Family Nurse Practitioner. She aspires to combine
    clinical expertise with her passion for the arts by establishing an evidence-based art-therapy program in her hospital, and to take on a leadership role as a nurse manager overseeing patient-safety
    and quality-improvement initiatives. Long-term, she envisions opening a community health clinic in Denton County that provides culturally tailored care and health education to Mexican-American families,
    while also mentoring emerging nurses to pursue advanced practice and scholarly research.
