personas:
  professional: Tonya Everson, a seasoned commercial cleaning and building maintenance specialist, blends their curiosity for sustainable technologies with a pragmatic, calm approach, mentoring staff while
    navigating the disorganized chaos of inventory and schedules to deliver reliable, eco‑friendly results.
  sports: Tonya Everson enjoys leisurely walks in Pelham Bay Park, participates in a senior walking club that meets on Saturdays, and cheerfully roots for the New York Yankees and the New York Knicks, while
    occasionally joining a community softball league in the spring.
  arts: Tonya Everson finds solace in classic R&B legends like Aretha Franklin, jazz icons such as Miles Davis, and early hip‑hop pioneers like Grandmaster Flash, frequently singing in their church choir
    and attending the Bronx Museum's monthly jazz nights, all while devouring mystery novels from Agatha Christie to contemporary authors.
  travel: Tonya Everson prefers low‑key, purpose‑driven trips, often taking day trips to the Hudson Valley for farm‑to‑table experiences, while dreaming of a relaxed week in New Orleans to soak up live
    jazz, and they plan most outings spontaneously rather than with rigid itineraries.
  culinary: Tonya Everson delights in cooking soul‑food staples such as collard greens, baked sweet‑potato casserole, and seasoned black‑eyed peas, infusing them with garden‑grown herbs like thyme and rosemary
    for a healthier twist, and they pride themselves on mastering a perfect low‑fat fried‑chicken crust using oat flour.
  core: Tonya Everson blends calm resilience with a competitive edge, turning their love of community, sustainable cleaning, and soulful cooking into a legacy of mentorship and quiet confidence.
background:
  cultural: Tonya’s cultural background is rooted in the rich tapestry of African‑American life in the Bronx. Raised in a close‑knit extended family, she grew up amidst the borough’s vibrant street art,
    hip‑hop beats, and the soulful sounds of gospel and R&B that echoed from local churches. The resilience and communal spirit of her neighborhood shaped her pragmatic worldview, fostering a deep respect
    for hard work and mutual support. Tonya’s family traditions blend Southern culinary influences with Caribbean flavors common in the Bronx’s diverse community, reflecting a culinary heritage passed down
    through generations. She maintains strong connections to the local Black church, where fellowship and activism are intertwined, and she participates in community events such as block parties, cultural
    festivals, and neighborhood clean‑up initiatives. This cultural grounding informs her calm demeanor, her commitment to uplifting others, and her appreciation for both tradition and innovation.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care (stripping, waxing, buffing)'', ''Basic building maintenance'', ''Health and safety compliance (OSHA)'', ''Inventory management of cleaning supplies'',
