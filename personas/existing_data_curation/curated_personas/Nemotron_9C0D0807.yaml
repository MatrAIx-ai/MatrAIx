  hobbies: '[''Soul food cooking'', ''Community gardening'', ''Mystery novels'', ''Church choir participation'', ''Listening to classic R&B and jazz'', ''Walking in Bronx parks'', ''Knitting and crocheting'',
    ''Documentary watching'', ''Neighborhood block parties'', ''Volunteering at community center'']'
  career_goals: While approaching retirement age, Tonya remains ambitious about her professional future. She aims to obtain a Certified Building Maintenance Technician credential and a Green Cleaning Specialist
    certification, positioning herself for a supervisory or facilities coordinator role within a larger property management firm. Tonya also envisions launching a small, community‑focused cleaning service
    that employs and trains younger workers from the Bronx, emphasizing environmentally responsible practices. She hopes to leverage her extensive on‑the‑job experience to mentor the next generation, improve
    workplace safety standards, and secure a stable income that supports her independent lifestyle. Ultimately, Tonya’s goal is to leave a legacy of professionalism, resilience, and community uplift within
    the building services industry.
