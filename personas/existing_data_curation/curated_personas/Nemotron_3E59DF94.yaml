personas:
  professional: Summer Montgomery, an aspiring young naturalist and budding story‑writer, channels their disciplined curiosity into detailed field journals, LEGO‑based experimental models, and Scratch games
    that explore wildlife and space, laying the groundwork for a future career in science communication.
  sports: Summer Montgomery, who prefers solitary fitness, spends weekend mornings cycling the neighborhood trail and evenings jogging through the nearby woods while rooting for the Seattle Mariners and
    keeping a modest membership in the local Junior Rangers hiking club.
  arts: Summer Montgomery, an avid reader of J.K. Rowling and Brandon Sanderson, composes simple piano pieces echoing Yiruma’s calm melodies, folds intricate origami after watching Akira Yoshizawa tutorials,
    and channels their imagination into short stories inspired by the magical worlds of Studio Ghibli’s Spirited Away.
  travel: Summer Montgomery plans family trips with a spreadsheet, favoring quiet nature getaways like a day hike in Acadia National Park and dreaming of a future adventure to Mauna Kea’s summit in Hawaii
    to observe the night sky away from city lights.
  culinary: Summer Montgomery delights in crafting simple, fresh meals such as avocado toast sprinkled with sunflower seeds and honey, whipping up blueberry muffins using garden‑picked berries, and savoring
    a warm bowl of vegetable soup seasoned with thyme and rosemary after a long day of bird‑watching.
  core: Summer Montgomery, a disciplined 10‑year‑old explorer, blends solitary curiosity with meticulous organization, turning every birdwatch, LEGO set, and journal entry into a quiet quest for mastery.
background:
  cultural: Summer is a white American growing up in Cle Elum, a small town nestled in the Cascade Mountains of Washington State. Her family values independence, self‑reliance, and a deep appreciation for
    the outdoors, a common thread in the Pacific Northwest culture. She often participates in community hikes, local library reading programs, and seasonal festivals that celebrate the region’s natural
    beauty. The community emphasizes sustainability and respect for the land, and Summer has learned about the area's Indigenous heritage through school projects that teach about the Yakama and other local
    tribes. Her upbringing blends typical American traditions—holiday celebrations, school events, and Sunday family meals—with a strong connection to the forested landscape that surrounds her home.
