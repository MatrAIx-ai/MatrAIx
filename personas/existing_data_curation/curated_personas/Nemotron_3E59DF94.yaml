  career_goals: Summer dreams of one day becoming an environmental scientist who uses data and technology to protect the forests and rivers of the Pacific Northwest. She aims to attend a STEM‑focused high
    school, earn scholarships, and later study environmental science or computer science at a university. Her short‑term ambition is to lead a school project that monitors local stream health, and she hopes
    to develop coding skills that can analyze ecological data. In the longer term, she envisions working for a research institute or government agency where she can combine her love of nature with her technical
    expertise to design sustainable solutions.
