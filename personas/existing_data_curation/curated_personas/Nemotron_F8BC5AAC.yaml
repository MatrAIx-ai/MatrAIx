  career_goals: Lewis aims to advance from a technical role to a senior specialist position overseeing process development and safety management in the chemical industry. He aspires to lead multidisciplinary
    projects that blend scientific innovation with creative design, such as developing sustainable materials or interactive science‑art exhibits for the community. Over the next five years, he plans to
    earn certifications in industrial hygiene and environmental health, and to enroll in night‑time coursework in green chemistry. Ultimately, Lewis hopes to launch a side venture offering workshops that
    combine chemistry demonstrations with artistic expression, positioning himself as a bridge between industry, education, and the arts.
