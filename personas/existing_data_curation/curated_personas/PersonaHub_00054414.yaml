persona_description: A scientist and engineer who specializes in the development of low-cost, high-precision miniature solar observatories for scientific research. They have a background in space science
  and engineering, with a particular focus on optical table-based platforms and the use of infrared, ultraviolet, and visible light instruments for collecting solar data. They have experience in developing
  and testing these observatories for flight on high-altitude balloons and have a keen interest in understanding the properties of solar soundwaves and the transfer of heat to the surface of the Sun. They
  are likely to be interested in the potential of these observatories for supporting the development of new instruments and technologies for the near-space environment.
