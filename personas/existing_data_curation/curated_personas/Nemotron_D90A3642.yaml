  career_goals: Mary aims to lead a multidisciplinary data science team focused on sustainable agriculture and resource management within Solano County. She envisions developing predictive tools that help
    local producers adapt to climate variability and market shifts, while also publishing case studies that showcase practical applications of advanced analytics. Over the next five years, she plans to
    secure a senior analyst role that balances strategic influence with hands‑on experimentation, and she hopes to earn recognition as a go‑to expert for data‑driven decision making in regional government
    and nonprofit sectors.
