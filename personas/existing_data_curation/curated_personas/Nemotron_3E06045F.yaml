personas:
  professional: Karla Hunter is a facility supervisory specialist who leverages her STEM background and hands‑on housekeeping experience to streamline operations through data‑driven scheduling, lean inventory
    control, and rigorous OSHA/EPA compliance, while her curiosity and love of art inspire her to design aesthetically pleasing, sustainable workspaces and to coach frontline staff with patience and creative
    problem‑solving.
  sports: Karla Hunter spends weekends trekking the Laurel Highlands with her local hiking club, punctuates her routine with early‑morning runs for the community 5K, enjoys occasional weekend camping trips
    that double as digital detoxes, and proudly roots for the Pittsburgh Steelers and Penguins while occasionally joining a casual paddle‑boarding group at a nearby lake.
  arts: Karla Hunter devotes evenings to watercolor painting inspired by Georgia O’Keeffe and Yayoi Kusama, frequents the Corry Art Museum and local galleries to absorb contemporary installations, indulges
    in contemporary fiction by Sally Rooney and Chimamanda Adichie, and curates playlists featuring Sufjan Stephens and Joanna Newsom to accompany her creative sessions.
  travel: Karla Hunter plans trips with spreadsheet precision, favoring short hikes in the Appalachian Trail and cultural immersion weekends in Asheville and Nashville, while her bucket list includes a
    summer itinerary through the Greek islands to sample authentic Mediterranean cuisine and a springtime culinary tour of Japan to master ramen and seasonal sushi, all balanced against a modest travel
    fund and limited vacation days.
  culinary: Karla Hunter is an intermediate home chef who experiments with Mediterranean falafel bowls flavored with sumac and tahini, crafts Thai green curry using lemongrass, galangal, and fresh basil,
    and perfects Japanese ramen broth with kombu and miso, often sourcing ingredients from the community garden where she volunteers and occasionally over‑seasoning dishes when her anxiety spikes.
  core: Karla Hunter is a methodical eco‑enthusiast whose art, anxiety‑management rituals, and ambition to green‑clean facilities intertwine into a uniquely disciplined yet creatively restless life.
background:
  cultural: Karla grew up in a working‑class family in Western Pennsylvania, with deep roots in the region; her ancestors are primarily of German and Irish descent. The local culture emphasizes modesty,
    hard work, and neighborly support. She was raised in a small‑town Catholic parish but now describes herself as spiritual rather than strictly religious. The community’s pride in its industrial heritage
    and recent shift toward service‑oriented economies shaped her practical outlook. These influences foster a strong sense of responsibility toward family, community, and the environment, reflected in
    her collaborative nature and commitment to sustainable practices.
attributes:
  skills: '["Team leadership and staff training", "Scheduling and workforce planning", "Inventory management and budgeting", "OSHA and EPA compliance", "Chemical safety and green cleaning practices", "Data
    analysis and performance reporting", "Lean process improvement", "Equipment maintenance and troubleshooting", "Conflict resolution and communication", "Health and safety training", "Basic facility management
    technology", "Customer service and stakeholder coordination"]'
  hobbies: '["Visiting art galleries and museums", "Watercolor painting", "Reading contemporary fiction and science articles", "Hiking in local state parks", "Camping trips", "Cooking international cuisine",
    "Yoga and meditation", "Journaling", "Volunteering at community garden"]'
  career_goals: Karla aims to move from frontline supervisory duties to a facility manager role overseeing multiple sites. She plans to obtain certifications such as Certified Professional Cleaner (CPC)
    and OSHA Safety Trainer, and to pursue a master’s degree in environmental sustainability or facilities management. Her long‑term ambition is to design and implement a region‑wide green cleaning program
    that reduces chemical use and energy consumption, positioning her organization as a leader in sustainable operations. Eventually, she hopes to consult for other institutions on eco‑friendly housekeeping
    practices.
