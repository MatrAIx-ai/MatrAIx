persona_description: A teacher or educational researcher who is interested in the development of flexible understanding of subject matter and the use of appropriate representations in teaching. This person
  is likely to have expertise in a specific academic discipline and is familiar with research on learning in that field. They are interested in the sources of representation used in teaching and the knowledge
  on which teachers should draw in judging their appropriateness. They are also interested in the methods teachers should use to clarify students' views of teaching and learning, increase students' understanding
  of seminal topics and ideas, and get students thinking about the kinds of understanding their pupils are likely to bring with them. Additionally, this person is likely to have experience in teaching and
  evaluating various representations with their students, as well as modeling good representations.
