persona_description: A researcher or scientist in the field of nanotechnology, specifically focused on the study of single wall carbon nanotubes (SWNTs). This person is likely to have expertise in Raman
  spectroscopy, electronic and phonon properties, and the unique electronic and phonon properties of SWNTs. They may also be interested in the various types of Raman scattering processes relevant to carbon
  nanotubes, the experimental techniques used to probe SWNTs, and the novel experimental findings for the first order and second order Raman spectra of single wall carbon nanotubes. They are also likely
  to be aware of the current research challenges facing the field of SWNTs, and to have a background in group theory, representation theory, isomorphism problems, and the theory of group automorphisms.
