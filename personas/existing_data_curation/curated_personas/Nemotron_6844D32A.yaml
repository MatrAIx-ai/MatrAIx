  career_goals: Although only five, Edgar often talks about future roles where he can help others and use hands‑on problem solving, such as becoming a firefighter, a veterinarian for animals, or an engineer
    who builds things. He expresses a desire to learn how things work and to stay involved in activities that make his community safer and happier.
