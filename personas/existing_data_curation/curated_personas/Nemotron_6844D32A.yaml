personas:
  professional: Edgar Dyer, a budding junior engineer who loves building intricate LEGO bridges while keeping an eye on which pieces will actually hold up, balances curiosity with practicality and often
    forgets to tidy up their workspace, reflecting their relaxed, flexible attitude toward obligations.
  sports: Edgar Dyer, a member of the Sunnyvale T‑ball squad and an enthusiastic fan of the Chicago Cubs, they love spontaneous backyard races and building forts after practice, balancing team play with
    solo play, and they prefer fun over strict training schedules.
  arts: Edgar Dyer, a budding fan of Disney classics who can recite lines from Moana and loves drawing their favorite characters, they often watch performances by The Wiggles and mimic their dances, channeling
    their compassionate nature into collaborative art projects at preschool.
  travel: Edgar Dyer, an adventurous five‑year‑old who has visited their grandparents’ farmhouse in the countryside, enjoyed a family trip to San Diego’s zoo, and dreams of exploring the sand dunes of Dubai,
    they plan trips with parents who favor flexible itineraries over rigid schedules.
  culinary: Edgar Dyer, a picky eater who adores chicken nuggets, mac and cheese, and strawberry yogurt, they can make a peanut butter and jelly sandwich with a little help, prefer crunchy carrot sticks
    over peas, and delight in sprinkling cinnamon on apple slices during snack time.
  core: Edgar Dyer, a curiosity‑driven five‑year‑old who balances practical tinkering with compassionate play, constantly swaps LEGO bricks for shared storytime, yet they often forget to put toys back in
    their bin.
background:
  cultural: Edgar is raised in a predominantly white, middle‑class family in the rural community of Odessa, Washington. His upbringing reflects typical Anglo‑American traditions such as celebrating Thanksgiving,
    Christmas, and 4th of July parades, attending a local preschool that introduces basic multicultural concepts, and participating in community events at the county fair. The Pacific Northwest’s outdoor
    lifestyle, combined with family values of cooperation and helping others, shapes his cultural perspective.
