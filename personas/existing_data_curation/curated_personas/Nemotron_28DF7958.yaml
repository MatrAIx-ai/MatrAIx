personas:
  professional: Welton Taylor, a veteran heavy‑vehicle service technician with more than three decades of hands‑on experience, merges deep diesel‑engine expertise with emerging electric‑truck power‑train
    knowledge, leads small service crews while mentoring junior mechanics, and balances meticulous preventive‑maintenance scheduling with the flexibility to devise unconventional repair solutions when standard
    methods fall short.
  sports: Welton Taylor, a devoted Dallas Cowboys fan who roots for the Dallas Mavericks during basketball season, spends Saturday mornings fishing with the Dallas Anglers Club at Lake Ray Hubbard, and
    leads a walking club that meets at Klyde Warren Park each spring, using his love of the outdoors to stay active.
  arts: Welton Taylor, an avid patron of the Dallas Museum of Art who admires works by Romare Bearden, frequently attends jazz nights featuring the Dallas Jazz Orchestra and blues sets by B.B. King tribute
    bands, joins the local gospel choir to belt out classics by The Blind Boys of Alabama, and captures classic trucks and downtown skylines with his Canon EOS 5D, while playing harmonica in community jam
    sessions.
  travel: Welton Taylor, who prefers road‑trip itineraries over flights, has already cruised the historic streets of New Orleans during Mardi Gras, explored the music scene of Nashville, taken scenic drives
    to Marfa for its desert art installations, and dreams of attending the New Orleans Jazz & Heritage Festival and an art pilgrimage to the Museum of Modern Art in New York, planning each journey around
    his modest retirement budget and occasional family commitments.
  culinary: Welton Taylor, a self‑taught cook who excels at smoking brisket and frying chicken seasoned with a secret blend of cayenne, smoked paprika, and garlic, also crafts collard greens simmered with
    ham hocks and sweet cornbread infused with jalapeños, and while his culinary repertoire shines at community potlucks, he sometimes forgets to let the meat rest, leading to overly juicy slices that slip
    off the plate.
  core: Welton Taylor, a 59‑year‑old heavy‑vehicle wizard who balances a relentless work ethic with a love for harmonica jam sessions, vintage truck restoration, and soulful barbecue, yet habitually checks
    his blood pressure during coffee breaks.
background:
  cultural: Welton grew up in a close-knit African-American neighborhood in Dallas, where church, family gatherings, and community events shaped his identity. The rhythms of gospel music, the flavors of
    soul-food, and the traditions of Juneteenth celebrations are woven into his daily life. His upbringing taught him the value of resilience, mutual support, and pride in his heritage, even as he faced
    the challenges of limited formal education. He remains deeply connected to the local Black community, volunteering at the church, mentoring young people who aspire to trade careers, and preserving cultural
    stories through oral history sessions. This rich cultural grounding informs his curiosity for art, his competitive drive to excel in his trade, and his commitment to giving back to the next generation.
attributes:
  skills: '[''Diesel Engine Diagnostics and Repair'', ''Hydraulic System Maintenance and Repair'', ''Electrical System Troubleshooting (CAN bus, PLC)'', ''Precision MIG/TIG Welding'', ''Preventive Maintenance
    Planning'', ''Technical Blueprint and Schematic Interpretation'', ''Safety and OSHA Compliance'', ''Mobile On-Site Service and Repair'', ''Diagnostic Tool Calibration and Use'', ''Parts Procurement
    and Inventory Management'', ''Mentoring and Training of Junior Technicians'', ''Creative Unconventional Repair Solutions'', ''Knowledge of Emerging Electrified Heavy-Vehicle Technologies'']'
  hobbies: '[''Visiting art galleries and museums'', ''Attending live jazz and blues concerts'', ''Playing harmonica in community jam sessions'', ''Photography of classic trucks and urban scenes'', ''Restoring
    a 1955 Chevrolet C10 truck'', ''Participating in church gospel choir'', ''Mentoring youth in tool use and safety'', ''Fishing trips with friends'', ''Cooking soul-food and Texas barbecue'', ''Attending
    Texas Truck Expo and local car shows'', ''Leading a walking club in Dallas parks'', ''Reading African-American history and cultural literature'']'
  career_goals: Welton's primary ambition is to transition from full-time employment to operating his own mobile heavy-equipment repair service that can service both diesel and the growing fleet of electric
    trucks in the Dallas metro area. He is pursuing Master Technician certification through the National Institute for Automotive Service Excellence and plans to complete a specialized course on electric-vehicle
    power-train maintenance. Alongside his business goals, he aims to become a recognized mentor within the African-American trades community, offering workshops at local community colleges and youth centers.
    He also hopes to be honored by a regional trade association as Technician of the Year and to secure a stable retirement that allows him to travel to art festivals and continue his lifelong learning.
