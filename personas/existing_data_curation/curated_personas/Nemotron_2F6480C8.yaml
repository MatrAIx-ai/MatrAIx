  hobbies: '[''Historical reading'', ''Fishing'', ''Gardening'', ''Model ship building'', ''Chess'', ''Walking'', ''Volunteering'', ''Small group bible study'', ''Classic rock listening'', ''Documentary
    watching'']'
  career_goals: Although retired, Eric aims to stay active and self‑sufficient. He wants to complete a small cedar shed for his garden, document his family’s genealogy for future generations, and mentor
    younger volunteers at the local senior center. He also plans to finalize his estate and advance directives, travel to a few historic Civil War sites, and keep his health stable through regular walking
    and preventive care.
