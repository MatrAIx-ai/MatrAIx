  career_goals: Although no longer seeking formal employment, Santiago remains driven by a desire to leave a lasting legacy for his family and community. He aims to compile a memoir that chronicles his
    immigration journey and the evolution of his family's grocery business, preserving oral histories for future generations. He intends to mentor his grandchildren in basic financial literacy and business
    fundamentals, ensuring they inherit practical knowledge. Santiago also aspires to continue volunteering at the local senior center, offering his expertise in budgeting and grant acquisition to sustain
    community programs. A personal health goal is to maintain his independence by preserving his mobility through gardening and regular walks. Finally, he hopes to organize a small cultural celebration
    at the senior center—perhaps a Dia de los Muertos luncheon—to share Mexican traditions with a broader audience.
