personas:
  professional: Santiago Mendoza, a retired grocery store owner who now serves on the senior center's advisory board, they apply five decades of expertise in accounting, inventory control, and bilingual
    communication while channeling a competitive streak into meticulous budget oversight, yet they maintain a relaxed, occasionally disorganized attitude toward routine tasks and remain skeptical of new
    proposals.
  sports: Santiago Mendoza, a regular at the senior center’s game nights, they avidly follow the Oklahoma City Thunder and the Oklahoma Sooners football teams, enjoy weekly chess and poker bouts as mental
    sport, and maintain light fitness through short walks in the local park to ease joint stiffness.
  arts: Santiago Mendoza, a lifelong fan of classic ranchera, they routinely listen to recordings by Vicente Fernández and the Mariachi Vargas de Tecalitlán, appreciate the paintings of Frida Kahlo, and
    volunteer at community theater productions that showcase traditional folk narratives.
  travel: Santiago Mendoza, who prefers carefully planned, low‑key trips, they have revisited the colonial town of San Miguel de Allende, enjoy weekend drives to the Ozark Highlands, and dream of a pilgrimage
    to the Vatican, all while balancing a modest travel budget and occasional family obligations.
  culinary: Santiago Mendoza, an adept home cook, they delight in preparing tamales, mole, and pozole, meticulously measuring chilies, tomatoes, and coriander, and often garnish dishes with fresh cilantro
    and corn tortillas harvested from their garden.
  core: Santiago Mendoza blends a lifelong penchant for precise bookkeeping with a love for solitary gardening, stubborn competitiveness, and a chronic worry over details, they are a quietly determined
    elder who clings to structure while embracing small comforts.
background:
  cultural: 'Santiago is a first-generation Mexican-American whose parents emigrated from the state of Jalisco in the 1940s. Raised bilingually, he grew up maintaining many Mexican customs—celebrating Dia
    de los Muertos with altars, observing Semana Santa, and preparing regional dishes passed down through generations. Catholic faith has been a central pillar of his life, shaping his values of family
    solidarity, respect for elders, and community service. After relocating to Claremore, Oklahoma, he integrated into a small but close-knit Mexican community while also adapting to Midwestern American
    culture. This bicultural experience informs his identity: he honors Mexican heritage through language, food, music, and festivals, yet embraces the practicality and independence characteristic of his
    adopted hometown. His cultural perspective fosters a healthy skepticism toward institutions, a competitive drive to succeed, and a deep appreciation for preserving his family''s legacy.'
