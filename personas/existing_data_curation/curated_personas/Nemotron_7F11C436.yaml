  hobbies: '[''building block towers'', ''coloring with crayons'', ''singing nursery rhymes'', ''dancing to music'', ''pretend play with dolls and action figures'', ''listening to library storytime'', ''collecting
    leaves and rocks'', ''watching educational TV about history and nature'']'
  career_goals: Delcia frequently declares that she wants to become a teacher or a children's TV host, imagining herself standing in front of a group of kids and sharing stories or songs while receiving
    applause. She also dreams of being a museum guide in Salem, leading tours and explaining historic events, because she loves the idea of captivating an audience. Her competitive streak pushes her to
    envision roles where she can lead games on the playground and be recognized as the 'captain' of her friends' imaginative adventures.
