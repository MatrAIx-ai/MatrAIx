personas:
  professional: Delcia Farrar, a budding sandbox entrepreneur, blends innate curiosity with practical problem‑solving by turning building blocks into tiny start‑ups, and they expertly negotiate play‑time
    deals while delighting the daycare crowd with their charismatic, talkative presence.
  sports: Delcia Farrar, a lively participant in the local toddlers’ soccer club "Little Kicks," harbors a competitive edge that makes them celebrate each goal loudly, proudly sports a miniature Yankees
    cap, and they also splash with glee during weekend visits to the community swimming pool where they race other kids.
  arts: Delcia Farrar, a preschool performer who belts out the songs of Raffi and The Wiggles at family gatherings, fills sketchbooks with vivid crayon drawings of dinosaurs, and they regularly request
    encores of “Let It Go” while modeling after their favorite Disney princess, using the living room as a stage.
  travel: Delcia Farrar, an enthusiastic explorer who loves day trips to the city children’s museum and the nearby sea‑side aquarium, plans each outing with a bright sticker‑filled itinerary, prefers active
    adventures over naps, and they dream of someday visiting the giant ferris wheel in London’s Hyde Park.
  culinary: Delcia Farrar, a picky yet imaginative eater who adores golden cheese pizza slices, dips apple wedges in peanut butter, and they proudly “cook” pretend spaghetti using a plastic pot and wooden
    spoon, often demanding extra sprinkles on their yogurt for texture.
  core: Delcia Farrar, a fiercely curious three‑year‑old with a talkative, competitive streak, flips between playful confidence and sudden waves of anxiety, always demanding the center stage in any activity.
background:
  cultural: Delcia is raised in a white New England family with deep roots in the Salem area. Her parents emphasize community involvement, taking her to local historic sites, maritime festivals, and the
    town’s public library for storytime and early learning programs. They celebrate traditional holidays such as Thanksgiving and the Fourth of July with neighborhood potlucks and parades, fostering a sense
    of shared heritage. Exposure to Salem’s rich colonial history and diverse community events fuels Delcia’s fascination with stories from the past and her desire to share them with others.
