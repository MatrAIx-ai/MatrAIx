personas:
  professional: Anne Timmons, a 20‑year‑old industrial maintenance mechanic in Atlanta, blends deep expertise in welding, CNC calibration, and preventive maintenance with a thriving side studio of metal
    sculpture, mentoring younger colleagues and youth apprentices while chasing ASE Heavy‑Duty and ASME boiler‑maker certifications.
  sports: Anne Timmons, a twenty‑year‑old outdoor enthusiast, hikes Stone Mountain’s rugged trails, cycles the Atlanta BeltLine with the Atlanta Cycling Club, and roots for the Falcons, Hawks, and Atlanta
    United while joining local pickup basketball games whenever her schedule allows.
  arts: Anne Timmons, a twenty‑year‑old art aficionado, spends weekends at the High Museum, scouring Ponce City Market’s murals for inspiration, collects prints by Banksy and Ai Weiwei, and channels that
    energy into crafting metal sculptures that echo the urban grit of street art while attending live shows at the Tabernacle featuring Janelle Monáe.
  travel: Anne Timmons, at twenty, favors spontaneous road trips to nearby Asheville for mountain hikes, weekend stays in Savannah’s historic squares for food market tours, and dreams of the Detroit Metal
    Arts Expo, all while budgeting her travel with a modest student loan repayment plan.
  culinary: Anne Timmons, a twenty‑year‑old culinary explorer, delights in sampling Korean‑style bulgogi tacos, Ethiopian injera with berbere lentils, and Vietnamese pho at Atlanta’s food halls, and in
    her modest kitchen she often welds custom metal spice racks and grills, using smoked paprika, cilantro, and lime zest to season her own barbecued creations.
  core: Anne Timmons, a twenty‑year‑old mechanic‑artist, fuses precise industrial skill with free‑spirited sculpture, thrives on community energy, yet often lets disorganization and late‑night festivals
    derail her budgeting and sleep.
background:
  cultural: Anne grew up in a suburban neighborhood of DeKalb County, Atlanta, where Southern hospitality and community involvement were core values. Her family emphasized hard work; her father worked in
    a local manufacturing plant, which sparked her early interest in machinery. Raised in a culturally diverse city, she was exposed to a blend of Southern traditions, African‑American music, and a burgeoning
    contemporary art scene. This environment fostered her appreciation for both the practical aspects of trades and the creative expression found in street art and music. Anne’s upbringing combined the
    modest, down‑to‑earth ethos of the South with the openness of a metropolitan community, shaping her collaborative spirit and curiosity about new ideas.
