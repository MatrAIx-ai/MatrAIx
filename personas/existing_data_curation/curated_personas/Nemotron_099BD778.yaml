  career_goals: Anne aims to earn industry‑recognized certifications such as ASE Heavy‑Duty and ASME boiler‑maker credentials within the next three years. She hopes to advance to a senior maintenance mechanic
    or foreperson role, leading a crew on a high‑production shop floor. Long‑term, she envisions moving into maintenance management, overseeing scheduling, budgeting, and continuous‑improvement initiatives.
    Parallel to her technical career, Anne wants to develop a side studio where she creates metal art pieces, merging her mechanical expertise with her love of visual art. She also plans to mentor other
    young women interested in trades through local vocational outreach programs.
