  career_goals: Simone dreams of a future where she can combine her love for caring for others and her practical mindset. She often says she wants to become a veterinarian because she enjoys helping animals,
    and she also imagines being an elementary school teacher to share knowledge and keep a classroom organized. Her curiosity about space and engineering leads her to wonder about designing rockets or sustainable
    habitats, but she always ties these ambitions to helping her community and staying organized.
