personas:
  professional: Simone Long, a budding naturalist, uses their love for wildlife adventure books, meticulous LEGO constructions, and detailed journal planning to practice scientific observation and design,
    aspiring to become a wildlife biologist.
  sports: Simone Long, a member of the Green Valley Cubs U10 soccer team, practices weekly drills, cheers for professional club FC Barcelona, and occasionally swims at the local community pool, balancing
    team spirit with personal fitness.
  arts: Simone Long, who draws Audubon‑style bird illustrations, admires Hayao Miyazaki’s animated films, listens to Ludovico Einaudi while practicing piano, and reads the adventure series The Wild Quest
    by Sarah Griffin, weaving artistic appreciation into daily life.
  travel: Simone Long, who frequently explores the nearby Willowbrook nature trail with family, dreams of visiting Yellowstone National Park to see geysers and the Galápagos Islands to study unique wildlife,
    and plans upcoming trips with a mix of detailed itineraries and spontaneous detours.
  culinary: Simone Long, who loves snacking on carrot sticks with hummus, helps bake chocolate chip cookies using real cocoa nibs, and enjoys preparing simple spaghetti with fresh tomato sauce and basil,
    showcasing a budding palate for wholesome, kid‑friendly dishes.
  core: Simone Long is a methodical, curiosity‑driven nine‑year‑old who blends wildlife exploration with LEGO engineering, soccer teamwork, disciplined piano practice, and careful allowance budgeting for
    future nature adventures.
background:
  cultural: Simone is raised in a white, Midwestern family in Plainfield, Indiana, a small‑town community known for its friendly atmosphere and strong neighborhood ties. Her family participates in local
    traditions such as the county fair, community church events, and the Fourth of July parade. They value punctuality, hard work, and helping neighbors, which align with typical Midwestern cultural norms.
    Holiday celebrations like Thanksgiving and Christmas feature family‑cooked meals and shared stories. Simone attends the public elementary school where she is involved in the school choir and a community
    soccer league, reflecting the region’s emphasis on community involvement and extracurricular activities.
