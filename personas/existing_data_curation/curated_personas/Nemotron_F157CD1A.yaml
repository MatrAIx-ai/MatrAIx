  career_goals: Nafisa dreams of a future where she can explore nature and solve practical problems independently. She often talks about becoming a wildlife biologist or an environmental engineer who studies
    local ecosystems and helps farmers use water and soil more efficiently. She also imagines designing simple machines or robots that can assist with everyday chores, blending her curiosity with her organized,
    methodical nature. Because she is sensitive to stress, she envisions a career that offers clear routines and quiet workspaces, such as a research laboratory or a field‑based conservation program, allowing
    her to focus deeply without overwhelming social demands.
