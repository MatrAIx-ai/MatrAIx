  career_goals: William loves creative expression and helping others, so he often says he wants to become a painter who shares bright stories, a scientist who discovers new things, or a community helper
    who makes people smile. He imagines leading art projects for his friends or exploring nature like an explorer, and he looks forward to growing up to share his kindness through these roles.
