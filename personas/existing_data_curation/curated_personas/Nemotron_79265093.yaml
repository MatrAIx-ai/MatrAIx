personas:
  professional: William Mclaurin, a 5‑year‑old future architect in training, meticulously sorts his LEGO bricks by color and size while occasionally daringly mixing hues to create unconventional structures,
    showcasing a balance of organization, curiosity, and reliable attention to responsibility.
  sports: William Mclaurin, a 5‑year‑old with a boundless love for movement, darts around the playground and attends the Little Eagles Soccer Club’s under‑5 sessions while chanting for the Chicago Cubs
    during family game nights, reflecting a playful approach to fitness paired with enthusiastic support for a professional baseball team.
  arts: William Mclaurin, a 5‑year‑old who immerses himself in drawing quirky animals after watching the animated series 'Bluey' and humming along to The Beatles’ 'Yellow Submarine', finds inspiration in
    the whimsical storytelling of these creators, letting art shape his everyday play and conversation.
  travel: William Mclaurin, a 5‑year‑old whose family prefers short, well‑planned road trips, frequently visits the local aquarium and beach, cherishes a yearly weekend getaway to Disney World, and dreams
    of exploring Paris’s Eiffel Tower someday, balancing adventure with the comforts of familiar routines.
  culinary: William Mclaurin, a 5‑year‑old with a palate for buttery mac and cheese, chicken nuggets and strawberry slices, enjoys helping stir batter for banana pancakes and relishes the scent of cinnamon,
    showing budding cooking skills while favoring simple, familiar flavors.
  core: William Mclaurin, a curious five‑year‑old who meticulously lines up his toy cars yet constantly forgets to put them back in order, balances quiet creativity with spontaneous bursts of energy, and
    never misses a chance to explore a new coloring book.
background:
  cultural: William is a Black child growing up in the historic city of Augusta, Georgia. He is part of a close‑knit African‑American family that places strong emphasis on community, faith, and storytelling.
    He attends a local Baptist church where he participates in Sunday school, sings gospel songs, and learns about his heritage. Family gatherings often feature Southern comfort foods like collard greens
    and cornbread, and traditions such as celebrating Juneteenth and listening to oral histories from elders. The neighborhood community center and the Augusta Museum of History provide children’s programs
    that nurture his love for art and learning, reflecting the supportive cultural environment that shapes his outlook.
