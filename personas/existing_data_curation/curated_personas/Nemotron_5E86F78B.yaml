personas:
  professional: Maria Garcia, a seven‑year‑old aspiring team leader, channels her energetic, organized nature into coordinating warm‑up drills for the neighborhood soccer squad while also rehearsing for
    school choir, and they demonstrate how structure and spontaneity coexist in their early ambitions.
  sports: Maria Garcia, a forward for the Little Kickers neighborhood soccer team, also practices Latin dance steps at the community center to improve footwork, idolizes the women's Miami FC squad and cheers
    for the local high school basketball team, and they embrace daily playground games as essential fitness routines.
  arts: Maria Garcia fills sketchbooks with bright, detailed portraits of friends and family, practices salsa moves learned at the community center, sings Disney classics like Let It Go in the school choir,
    and they draw artistic inspiration from Frida Kahlo, Pixar’s Coco, and the lively rhythms of Ricky Martin.
  travel: Maria Garcia enjoys weekend outings to the local farmer’s market and annual city cultural festivals, has visited the beach town of Santa Monica with her family, and dreams of exploring the historic
    streets of Mexico City while preferring well‑planned itineraries overseen by her parents, and they favor structured travel plans over spontaneous detours.
  culinary: Maria Garcia loves helping her mother mash ripe avocados for guacamole, shaping masa into tiny tamales, snacking on corn tortillas with salsa, and proudly showing off her growing skill at arranging
    LEGO bricks into pretend fruit kebabs, reflecting a hands‑on, playful approach to cooking, and they often ask for extra seasoning to experiment.
  core: Maria Garcia blends boundless energy with a love for structure, turning playground games into mini‑projects, saving spare change in a pink piggy bank, and sometimes leaving LEGO pieces scattered
    across the living room floor, which they reluctantly tidy up only after being reminded.
background:
  cultural: Maria comes from a Mexican‑American family that speaks Spanish at home and celebrates traditions such as Día de los Muertos, Navidad, and family birthdays with music, storytelling, and homemade
    foods like tamales, arroz con frijoles, and pastel de tres leches. Her parents value bilingual education, so she attends a bilingual elementary school in Trenton, NJ. The close‑knit family environment,
    community festivals in Mercer County, and the blend of Mexican heritage with the diverse culture of New Jersey shape her identity and daily life.
attributes:
  skills: '["Reading comprehension", "Basic Spanish speaking", "Organizational routines", "Team collaboration", "Simple arithmetic", "Digital literacy (educational apps)", "Leadership in group activities"]'
  hobbies: '["Soccer", "Latin dance", "Drawing", "LEGO building", "Reading adventure books", "Cooking with family", "Attending cultural festivals"]'
  career_goals: Maria loves the idea of helping others learn, so she often says she wants to become a teacher like her favorite elementary school teacher, because she enjoys planning lessons and creating
    a structured classroom. She also shows a tender care for animals, especially her family’s dog, and frequently mentions wanting to be a veterinarian when she grows up. Her goals reflect a blend of her
    love for order, compassion, and working with people and pets.
