personas:
  professional: William Oliver, an 8‑year‑old budding engineer, channels their methodical mind and reliable nature into constructing intricate LEGO creations and leading classroom project groups, demonstrating
    early professional skills in problem‑solving, teamwork, and compassionate collaboration.
  sports: William Oliver, an 8‑year‑old, plays forward for the Farmington Soccer Club’s under‑9 team, loves energetic games of tag during recess, roots for New Mexico United in the USL Championship, and
    joins family hikes that double as informal cross‑training for the upcoming youth baseball season with the local Jacks club.
  arts: William Oliver, an 8‑year‑old, immerses themselves in adventure novels by Enid Blyton, crafts detailed LEGO dioramas while humming the soundtrack of Pixar’s Up, and eagerly attends the local Farmington
    Art Fair where they admire the works of Navajo sand artist Tewazah Huhana, reflecting a creative spirit shaped by storytelling and regional artistic traditions.
  travel: William Oliver, an 8‑year‑old, loves weekend family road trips to the Grand Canyon and annual visits to the Albuquerque International Balloon Fiesta, dreams of exploring the dinosaur fossils at
    Dinosaur National Monument and soon hopes to travel to Disney World in Florida, balancing excitement with their parents’ school‑year calendar and modest travel budget.
  culinary: William Oliver, an 8‑year‑old, enjoys helping prepare cheesy jalapeño nachos with salsa and guacamole, loves the sweet crumbly texture of chocolate‑chip pancakes for breakfast, and proudly builds
    “LEGO‑shaped” pizza slices topped with pepperoni and olives, though they often forget to wash their hands before cooking.
  core: William Oliver, an 8‑year‑old, blends boundless energy and a love for teamwork with a surprisingly orderly mind, but often forgets to put away scattered LEGO bricks after play, turning their neatness
    into a charming, chaotic habit.
background:
  cultural: William comes from a white, middle-class family in Farmington, New Mexico. His upbringing blends typical American traditions—such as celebrating Thanksgiving, Independence Day, and school holidays—with
    the unique cultural tapestry of the Southwest, including exposure to Hispanic and Native American community events, local festivals, and the ranching lifestyle that shapes the region.
