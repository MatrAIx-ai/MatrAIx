personas:
  professional: Dolly Ellison, a retired elementary literacy and math teacher, leverages her methodical curriculum design skills and natural assertiveness to mentor new teachers through a senior‑volunteer
    program while coordinating community oral‑history workshops that blend curiosity with practical project management.
  sports: Dolly Ellison, an enthusiastic member of the Laurens County Trail Club, walks the local nature trails each morning, cheers the Clemson Tigers football team on Saturdays, attends monthly bridge
    sessions to keep her mind sharp, and occasionally joins senior yoga classes at the community center.
  arts: Dolly Ellison, a devoted choir singer, blends gospel hymns by Mahalia Jackson and contemporary spirituals by Mavis Staples into her performances, quilts vibrant blankets inspired by heritage motifs,
    and engages in lively book‑club debates over classics such as "To Kill a Mockingbird" and historical biographies, all of which reflect her love of cultural expression.
  travel: Dolly Ellison, an organized traveler, plans weekend road trips to historic Southern towns such as Savannah and Charleston and a yearly cruise to the Caribbean, while also dreaming of a cultural
    tour of European landmarks like Oxford and the Tuscan countryside, balancing budget constraints with a love for group travel.
  culinary: Dolly Ellison, a Southern‑style cook, delights in simmering collard greens with fresh rosemary from her garden, perfecting fried chicken seasoned with thyme and paprika, and baking peach cobbler
    topped with a drizzle of homemade caramel, though they sometimes over‑salt dishes in enthusiastic bursts of flavor.
  core: Dolly Ellison, a lively 77‑year‑old educator turned community catalyst, blends meticulous planning with a love for gardening, quilting, choir, and mentoring, all while juggling a modest budget,
    health routines, and a penchant for occasional forgetfulness.
background:
  cultural: Dolly’s cultural background is rooted in the African‑American heritage of the Deep South. Born in Savannah, Georgia, she grew up in a close‑knit, church‑centered family that valued faith, education,
    and communal support. Her childhood memories are filled with gospel music, Sunday potlucks, and stories of resilience from elders who lived through segregation and the civil‑rights movement. After moving
    to Alamo in her early twenties, she became an active participant in the local black church, community garden, and the Laurens County African‑American historical preservation efforts. She honors traditions
    such as Southern cooking, oral storytelling, quilting, and Juneteenth celebrations while embracing the evolving cultural tapestry of her multigenerational family.
