  hobbies: '[''Gardening'', ''Quilting'', ''Church choir singing'', ''Book club reading'', ''Genealogy research'', ''Volunteer at historical society'', ''Playing bridge'', ''Cooking Southern cuisine'',
    ''Nature walks'', ''Community festival participation'']'
  career_goals: Although retired, Dolly aims to remain actively engaged in education and her community. She seeks to mentor new teachers through a senior‑volunteer program at the local elementary school,
    lead a multigenerational oral‑history project that records the stories of Alamo’s African‑American families, and finish a memoir that chronicles her experiences from the civil‑rights era to the present.
    Additionally, she hopes to organize an annual cultural heritage festival that celebrates Southern Black traditions and fosters intergenerational learning.
