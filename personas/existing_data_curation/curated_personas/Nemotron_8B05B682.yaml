  hobbies: '[''Fishing'', ''Morning runs along the St. Johns River'', ''Weightlifting'', ''DIY home renovation projects'', ''Listening to classic rock'', ''Reading construction trade magazines'', ''Playing
    strategy video games online'', ''Cooking BBQ for friends'', ''Volunteering with Habitat for Humanity'']'
  career_goals: Arthur aims to advance to a foreman position within the next two to three years by obtaining additional certifications such as OSHA 30‑hour, NCCER Concrete Finishing, and equipment‑operator
    credentials. He plans to pursue a bachelor's degree in construction management to broaden his knowledge of project planning and sustainable building. Long‑term, he aspires to become a site supervisor
    or start his own small contracting firm focused on custom home renovations that incorporate green building techniques. He seeks stable, higher‑paying roles that also allow him to mentor younger workers
    and implement innovative, eco‑friendly construction practices.
