personas:
  professional: Quashawn Marrero, a veteran network and systems administrator with three decades of hands‑on experience, blends deep expertise in BGP, OSPF, VMware, AWS, and PowerShell automation with a
    curious yet pragmatic mindset, often swapping meticulous designs for flexible, budget‑friendly solutions while mentoring junior engineers despite a sometimes disorganized, last‑minute work style.
  sports: Quashawn Marrero plays and coaches in a senior‑friendly basketball league, stands on the sidelines cheering for the Charlotte Hornets, and participates in weekly pick‑leball sessions at the Riverside
    Community Club, while also coaching youth teams at the local church gym.
  arts: Quashawn Marrero sings in his church’s gospel choir, spins Miles Davis, B.B. King, and Aretha Franklin vinyls on weekend listening nights, and escapes into classic science‑fiction novels by Isaac
    Asimov, all of which fuel his creativity in both tech projects and soul‑food experiments.
  travel: Quashawn Marrero prefers road‑trip adventures to cultural festivals in New Orleans, Savannah, and Washington, D.C., balancing his love for music heritage with a modest travel budget that favors
    mid‑week flights and staying with friends rather than luxury hotels.
  culinary: Quashawn Marrero delights in cooking Southern‑style soul food, perfecting collard greens seasoned with smoked paprika, pan‑fried catfish with a crisp cornmeal crust, and sweet potato gumbo,
    while carefully moderating salt to keep his hypertension in check.
  core: Quashawn Marrero is a socially vibrant, tech‑savvy mentor who channels his competitive edge into basketball coaching and network design, wrestles with occasional disorganization and stress‑induced
    worry, yet remains relentlessly curious and pragmatic.
background:
  cultural: Quashawn grew up in Raleigh’s historic Black neighborhoods, where multigenerational ties and church life anchored his identity. His grandparents were part of the Great Migration, bringing Southern
    traditions and a strong work ethic that shaped his family’s emphasis on education and community service. Though his surname hints at Caribbean roots—his mother’s family emigrated from Puerto Rico—his
    primary cultural grounding is the African‑American experience of the American South. He actively participates in local Black professional networks, such as Blacks in Technology, and mentors young Black
    professionals to navigate the predominantly white tech field. Family gatherings feature a blend of Southern comfort foods, Spanish‑influenced dishes, and soulful gospel music, reflecting his rich, hybrid
    heritage.
attributes:
  skills: '[''Network Architecture'', ''Routing and Switching (BGP, OSPF, EIGRP)'', ''Network Security and Firewalls'', ''Virtualization (VMware, Hyper‑V)'', ''Cloud Services (AWS, Azure)'', ''Automation
    Scripting (PowerShell, Python, Bash)'', ''System Administration (Windows Server, Linux)'', ''IT Service Management (ITIL)'', ''Troubleshooting and Performance Optimization'', ''Technical Documentation'',
    ''Mentoring and Training'', ''Project Coordination and Agile Practices'']'
  hobbies: '[''Senior basketball league (player & coach)'', ''Church gospel choir'', ''Local maker‑space meetups and Raspberry Pi tinkering'', ''Gardening'', ''Cooking Southern soul‑food'', ''Listening
    to jazz and blues'', ''Reading science‑fiction'', ''Playing chess'', ''Mentoring youth in coding'', ''Attending African‑American cultural festivals'']'
  career_goals: Quashawn aims to transition from day‑to‑day administration to a strategic advisory role within the next five years. He plans to earn advanced certifications such as Cisco CCNP Enterprise
    and AWS Certified Solutions Architect – Professional, positioning himself as a trusted consultant for local nonprofits and small businesses seeking robust, secure networks. Parallel to this, he wants
    to formalize a mentorship program through the Raleigh chapter of Blacks in Technology, providing hands‑on training and internship pathways for Black youth interested in networking and cybersecurity.
    Ultimately, he envisions a legacy of both technical contributions and a strengthened pipeline of underrepresented talent in the tech industry, while maintaining the flexibility to scale back responsibilities
    as he approaches retirement.
