  career_goals: Although retired from formal employment, Anyssa aims to channel her lifelong love of learning into a series of community‑focused initiatives. She plans to launch a free weekly art‑and‑storytelling
    circle for seniors and youth in West Hollywood, publish a memoir‑style collection of personal essays and poems that explore her cultural heritage, and serve as an advisory board member for a local nonprofit
    that promotes arts education in under‑served schools. She also hopes to enroll in a university‑level philosophy course to satisfy her intellectual curiosity and to become a mentor for aspiring teachers
    from Latino backgrounds.
