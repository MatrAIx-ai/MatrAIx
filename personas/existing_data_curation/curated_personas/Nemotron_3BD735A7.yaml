personas:
  professional: Andrew Greene, a tiny aspiring wildlife guide who leads neighborhood kids on mini nature walks, showcases methodical organization by carrying a pocket-size checklist of leaves and rocks,
    and they love the predictability of starting every walk at the same oak tree at sunrise.
  sports: Andrew Greene, a budding fan of the Portland Timbers and Oregon Ducks, enjoys weekly toddler soccer sessions at the local community center and splashing in the Rogue River during summer, and they
    always wear the same bright red shoes for the routine comfort they provide.
  arts: Andrew Greene, an enthusiastic participant in library story-time where they hear Dr. Seuss and watch Sesame Street clips, loves singing along to Raffi's 'Baby Beluga' and finger-painting scenes
    from the local Art in the Park festival, yet they sometimes lose focus when the music stops.
  travel: Andrew Greene, a curious explorer who has already visited Crater Lake and the Redwood forests with family and dreams of a future trip to Disneyland, prefers short, structured outings with a familiar
    caregiver and they clutch a plush map of Oregon for comfort.
  culinary: Andrew Greene, a picky eater who adores creamy mac and cheese, strawberry slices, and chicken nuggets seasoned with a dash of paprika, can make a simple peanut butter-and-jelly sandwich all
    by themselves, but they stubbornly refuse broccoli even when presented in bite-size florets.
  core: Andrew Greene, a methodical two-year-old who balances a love for nature hikes with sudden bursts of anxiety, insists on the same bedtime routine, and they can spend an entire afternoon arranging
    rocks in perfect rows.
background:
  cultural: Andrew is raised in a white, middle‑class family in Grants Pass, Oregon. His cultural environment blends typical Pacific Northwest values—such as a love for outdoor recreation, respect for nature,
    and community involvement—with broader American traditions. Family life includes celebrating holidays like Thanksgiving, Christmas, and the Fourth of July, as well as participating in local events such
    as the Rogue River Festival and community story‑time sessions at the library. The family emphasizes routine, safety, politeness, and cooperative behavior, while also encouraging him to assert his needs
    in a supportive setting. Seasonal activities—hiking in the Cascade foothills, visiting nearby farms, and exploring the Rogue River—provide rich sensory experiences that shape his curiosity and appreciation
    for the region’s natural landscape.
