  career_goals: Andrew’s emerging ambitions are age‑appropriate and centered on gaining independence and exploring interests. He is eager to master potty training and learn to dress himself with minimal
    assistance. He shows fascination with fire trucks and frequently pretends to be a firefighter, hinting at a future dream of helping others. Starting preschool is a major goal; he looks forward to learning
    to read simple books, singing with peers, and riding a tricycle without training wheels. In the near term, he aims to tell a short story about his day using three‑word sentences, demonstrating his desire
    to communicate more effectively.
