    facilitation'']'
  hobbies: '[''Hiking in the Santa Monica Mountains'', ''Bird watching'', ''Nature photography'', ''Sketching and watercolor painting of landscapes'', ''Attending Chicano mural tours in Los Angeles'', ''Playing
    acoustic guitar'', ''Cooking traditional Mexican cuisine'', ''Volunteering at community gardens'', ''Reading about ecology and conservation'', ''Participating in Día de los Muertos celebrations'']'
  career_goals: Obed aims to advance to a crew‑lead or field‑supervisor role within a regional conservation agency, gaining certifications such as Certified Arborist and Wildland Firefighter in the process.
    He plans to complete his GED and eventually pursue an associate degree in environmental science, with a long‑term ambition to create a community‑based eco‑education program that blends his love of art
    and nature, possibly offering guided nature‑art tours in the local mountains.
