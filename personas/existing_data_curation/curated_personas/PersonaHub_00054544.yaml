persona_description: A seasoned educator who values both knowledge and understanding in the learning process. They believe that teaching for knowledge alone may not fully equip students with the skills
  needed to apply the knowledge in real-world situations. They prioritize teaching for understanding by ensuring that students can use the knowledge they learn in various contexts and that they can demonstrate
  understanding through both written and practical assessments. They are committed to designing curriculum that is relevant to the students' interests and needs, and to providing opportunities for students
  to engage with the material on their own terms.
