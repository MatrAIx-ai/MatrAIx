personas:
  professional: Jovie Abello, a three‑year‑old building‑block aficionado, treats playtime like a micro‑architecture firm, arranging Lego bricks with methodical precision while competing energetically with
    peers to see whose tower reaches higher, and they often celebrate when their design is praised by friends.
  sports: Jovie Abello enthusiastically joins the local toddler soccer class on Saturday mornings, idolizes the nearby professional baseball team the Tigers, loves playing tag in the neighborhood park,
    and they cheer loudly whenever the Tigers score a home run on the television.
  arts: Jovie Abello delights in drawing with Crayola crayons, singing loudly along to Disney’s “Let It Go” from Frozen, watching the animated series Bluey, and they often rehearse the songs in front of
    the mirror, turning each lyric into a mini‑performance.
  travel: Jovie Abello enjoys family trips to the beaches of Florida, explorations of the Monterey Bay Aquarium, looks forward to a planned visit to Disneyland in California next summer, and they love looking
    at picture books about Disneyland before the trip to imagine the rides.
  culinary: Jovie Abello favors spaghetti with meatballs, chicken nuggets, and strawberry yogurt, attempts to stir the pot with a wooden spoon, but they often sneak extra peas when no one is watching, reflecting
    both a budding curiosity in cooking and a mischievous palate.
  core: Jovie Abello is a lively three‑year‑old who craves routine yet revels in spontaneous play, leads group games with a competitive spark, and occasionally throws a tantrum when their predictable world
    is challenged, but they quickly bounce back with a bright smile.
background:
  cultural: Jovie is raised in Thomasville, Georgia, within a Southern, family‑centered environment. Her upbringing includes frequent visits to community events like the Thomas County Fair, church gatherings,
    and family barbecues. The local culture emphasizes hospitality, modesty, and appreciation for outdoor activities, all of which shape her love for group play, routine, and community interaction.
attributes:
  skills: '[''Counting to ten'',''Identifying primary colors'',''Drawing simple shapes'',''Stacking blocks'',''Solving basic puzzles'',''Participating in group games'',''Following daily routines'',''Friendly
    competitive play'']'
  hobbies: '[''Building block towers'',''Dancing to music'',''Drawing and coloring'',''Playing at the park'',''Listening to storytime'',''Group sing‑along games'']'
  career_goals: Even at three, Jovie dreams about the future. She often talks about becoming a teacher because she loves the idea of guiding friends and keeping things organized, and she also imagines being
    a veterinarian to care for animals she sees at the park. Occasionally she mentions wanting to be a race car driver, reflecting her love of fast-paced, competitive play.
