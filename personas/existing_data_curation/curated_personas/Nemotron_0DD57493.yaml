    Relief'',''Reading Contemporary Young Adult Fiction'',''Volunteering in Community Art Workshops'']'
  career_goals: Olga aspires to combine her love for art with her desire to support mental well‑being. Her primary career goal is to become an art therapist, helping adolescents navigate stress and anxiety
    through creative expression. To achieve this, she plans to complete her GED, pursue an associate’s degree in psychology or counseling, and then enroll in a bachelor’s program in art therapy or expressive
    arts. In the interim, she hopes to build a robust portfolio of digital and mixed‑media artwork, secure freelance illustration gigs, and volunteer as an art facilitator at local youth programs. Her long‑term
    ambition includes establishing a community art studio in the Nashville area where therapy, workshops, and exhibitions converge.
