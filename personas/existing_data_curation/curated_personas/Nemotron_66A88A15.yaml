  hobbies: '[''Gardening'', ''Hiking'', ''Listening to science and medical podcasts'', ''Cooking'', ''Yoga'', ''Mindfulness meditation'', ''Volunteer work at the local food pantry'', ''Knitting'']'
  career_goals: Adamarie aims to transition into a leadership role within her hospital, such as charge nurse or nurse manager, where she can guide staff and shape patient-care policies. She intends to earn
    a master's degree in nursing informatics to spearhead digital health initiatives, including expanding telehealth services for the underserved population of Rock County. Long-term, she aspires to become
    a nurse practitioner specializing in chronic disease management, while also establishing a community-based wellness program that integrates mental-health support for both patients and healthcare providers.
