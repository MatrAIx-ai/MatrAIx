personas:
  professional: Adamarie Lepine, a 36‑year‑old registered nurse with a graduate STEM degree, merges analytical curiosity with practical bedside skill to redesign acute‑care workflows and mentor junior staff,
    while they toggle between cooperative teamwork and assertive leadership when patient safety demands it, and their relaxed attitude toward deadlines sometimes results in last‑minute paperwork.
  sports: Adamarie Lepine enjoys solo hikes along the prairie trails, practices yoga twice weekly for stress relief, follows the Minnesota Vikings and Minnesota Twins for NFL and MLB excitement, and occasionally
    joins a co‑ed recreational volleyball league at the community center, though they sometimes decline group outings when they crave alone time.
  arts: Adamarie Lepine unwinds after shifts by listening to folk‑rock singer Gillian Welch, reading popular‑science books by Carl Sagan, and knitting scarves while humming the Broadway classic 'Memory'
    from Cats, which they first heard during a local theater production, using these artistic rituals to balance their analytical mind with emotional nourishment.
  travel: Adamarie Lepine prefers low‑key road trips to nearby natural gems such as Badlands National Park and Minnesota’s North Shore, while dreaming of a summer backpacking adventure through Iceland’s
    geothermal landscapes, yet they often postpone booking due to fluctuating work schedules and a lingering worry about overspending on travel.
  culinary: Adamarie Lepine, a confident home cook, frequently transforms garden harvests into comforting dishes like rosemary‑infused chicken pot pie, creamy beet and goat‑cheese salad, and a signature
    split‑pea soup flavored with smoked ham, while they experiment with new comfort‑food recipes and occasionally over‑salt a stew when distracted by a podcast.
  core: Adamarie Lepine is a curiosity‑driven yet easy‑going nurse who blends data‑centric innovations with garden‑fresh comfort meals, but often misplaces their planner, leading to last‑minute scrambles
    despite their best intentions.
background:
  cultural: Adamarie is a white Minnesotan with French-Canadian roots, reflected in her surname Lepine and family customs such as communal meals and modest celebrations. Raised in a small farming community,
    she embodies the Midwest values of hard work, self-reliance, and strong neighborhood ties. Her upbringing in a predominantly Lutheran environment fostered a sense of service, which she carries into
    her nursing career and community volunteerism. While honoring her heritage, she also respects the diverse cultural fabric of Rock County, including the local Native American history.
