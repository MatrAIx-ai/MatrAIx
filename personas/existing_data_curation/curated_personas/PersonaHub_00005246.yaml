persona_description: A medical doctor who specializes in the treatment and prevention of infectious diseases. They have extensive knowledge and experience in the diagnosis, treatment, and management of
  NTDs and the most dangerous infectious diseases, including Nipah virus, Crimean-Congo haemorrhagic fever, Ebola, Marburg haemorrhagic fevers, Lassa fever, MERS-CoV coronavirus, Nipah virus, Rift Valley
  fever, Zika virus, and "X disease". They are highly skilled in the use of evidence-based medicine and have a strong commitment to public health. They are also familiar with the latest research and developments
  in the field of infectious diseases and are constantly updating their knowledge and skills to provide the best possible care to patients.
