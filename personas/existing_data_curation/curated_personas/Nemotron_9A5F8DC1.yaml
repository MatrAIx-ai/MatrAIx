  hobbies: '[''Attending Mardi Gras festivals'', ''Fishing at Atchafalaya Basin'', ''Cooking Cajun cuisine'', ''Karaoke nights'', ''Improv comedy'', ''Community volunteer park maintenance'', ''Following
    New Orleans Saints'', ''Watching college football'', ''Reading sales books'', ''Listening to business podcasts'']'
  career_goals: He aims to move from a senior sales representative to a regional sales manager within the next three years, overseeing a team of reps and shaping sales strategies for the service portfolio.
    He wants to be recognized as a top revenue generator, develop training programs that emphasize practical, customer‑focused selling, and eventually transition into a director role where he can influence
    company‑wide service offerings. A long‑term ambition is to launch his own consultancy that helps small businesses adopt effective service sales processes, leveraging his experience and network in southwestern
    Louisiana.
