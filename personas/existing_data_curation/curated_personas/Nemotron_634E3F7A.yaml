  hobbies: '[''Abstract painting'', ''Scale model car building'', ''Reading speculative fiction and philosophy'', ''Urban photography'', ''Chess'', ''Cooking traditional Mexican cuisine'', ''Volunteering
    for community automotive workshops'', ''Attending art gallery openings'', ''DIY home improvement projects'']'
  career_goals: Adriana aims to become the lead service manager at a high‑performance dealership where she can spearhead the integration of electric vehicle service protocols. She is pursuing additional
    certifications in autonomous vehicle systems to stay ahead of industry trends. Long‑term, she envisions opening her own boutique garage that specializes in restoring classic cars with modern hybrid
    conversions, offering bespoke design services that reflect her artistic sensibility. She also aspires to develop a training program for women entering the automotive trades, fostering a more inclusive
    workforce while sharing her expertise through workshops and a technical guidebook on advanced diagnostics.
