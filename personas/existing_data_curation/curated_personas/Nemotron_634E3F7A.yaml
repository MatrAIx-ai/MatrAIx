personas:
  professional: Adriana Proenza, a 54-year-old ASE Master Technician, blends methodical diagnostic rigor with a flair for artistic car modifications, leading their team at a high-performance dealership
    while mentoring apprentices and championing the rollout of electric-vehicle service protocols.
  sports: Adriana Proenza follows the Dallas Cowboys and the local FC Dallas soccer team, enjoys the occasional track-day with classic car clubs, and participates in Sunday morning yoga at the community
    center to counterbalance a mostly sedentary work routine, though their competitive spirit sometimes fuels intense debates about race strategies.
  arts: Adriana Proenza channels their abstract imagination onto canvas, producing automotive-themed paintings inspired by Jackson Pollock's drip techniques while capturing Dallas's contrasting skylines
    through black-and-white street photography; they are a regular at the Dallas Museum of Art, especially drawn to exhibitions featuring Frida Kahlo and contemporary kinetic sculptures.
  travel: Adriana Proenza plans meticulous road-trip itineraries that blend automotive pilgrimages like visits to the Henry Ford Museum, the Porsche Museum in Stuttgart, and the Museo del Automóvil in Mexico
    City with cultural stops at local art galleries, prefers EV-compatible routes with charging stations, and occasionally indulges in spontaneous detours to vintage-car fairs.
  culinary: Adriana Proenza excels at homemade mole poblano, chiles en nogada, and slow-cooked carnitas, often adding a modern twist by incorporating smoked paprika and Chihuahuan chilies; their kitchen
    skill is solid though they sometimes let the sauce simmer too long, resulting in a slightly bitter edge, and they love pairing dishes with craft mezcals.
  core: Adriana Proenza fuses precise automotive expertise with boundless artistic imagination, driving toward a hybrid future while meticulously balancing work, creative pursuits, and a relentless quest
    for self-improvement.
background:
  cultural: Adriana was raised in a Mexican‑American household in Dallas, where Spanish and English were spoken interchangeably, fostering bilingual fluency. Family gatherings emphasized culinary traditions,
    music, and storytelling, instilling a deep appreciation for cultural heritage. She celebrates Día de los Muertos and other Mexican holidays, integrating their vibrant colors and symbolism into her creative
    projects. Growing up in a community that values craftsmanship and hard work, she internalized a strong work ethic and a respect for manual skill. While navigating a traditionally male‑dominated field,
    her cultural background gave her resilience and a commitment to pave the way for other women of similar heritage.
attributes:
  skills: '[''ASE Master Technician (Engine Repair)'', ''Hybrid/Electric Vehicle Systems'', ''Advanced OBD‑II Diagnostics'', ''Automotive CAD Design'', ''Technical Documentation and Process Optimization'',
