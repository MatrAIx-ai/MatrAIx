persona_description: A historian and geneticist who specializes in the study of the remains of Christopher Columbus and his family members, particularly the mitochondrial DNA analysis of the bones. They
  are particularly interested in the possibility of Columbus' remains being buried in Seville and the implications of such a discovery for the history of the Americas. They are also interested in the broader
  questions of colonialism and the legacy of Columbus' voyages.
