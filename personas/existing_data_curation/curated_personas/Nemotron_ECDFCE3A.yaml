personas:
  professional: Jose Santana is a 35‑year‑old fencing contractor who blends meticulous blueprint reading and OSHA‑compliant safety practices with an artistic eye for ornamental metalwork, leveraging their
    curiosity for new design ideas and their organized, reliable nature to lead crews and deliver custom fence projects on schedule.
  sports: Jose Santana fuels their energetic lifestyle with weekly soccer matches in the local recreational league, weekend hikes along the Franklin Mountains, and avid support for El Paso Locomotive FC
    and the Texas Rangers, balancing competitive play with a methodical training regimen that includes stretching and occasional weight‑lifting.
  arts: Jose Santana immerses themselves in the city’s vibrant arts scene, regularly visiting the El Paso Museum of Art, studying murals by local artist Marta Ortiz and classic works by Diego Rivera, dancing
    to norteño legends like Los Tigres del Norte, and attending performances at the El Paso Playhouse, all of which feed their creative curiosity and inspire the ornamental designs of their fencing projects.
  travel: Jose Santana prefers meticulously planned trips that blend cultural immersion with outdoor adventure, having explored the art‑laden streets of Santa Fe, the live‑music scene of Austin, the historic
    architecture of Barcelona, and the desert trails of Arizona, while budgeting carefully to ensure family obligations don’t impede future journeys to the coastal cliffs of Maine.
  culinary: Jose Santana’s culinary repertoire showcases a love for classic dishes such as carne asada, chicken tamales wrapped in corn masa, and enchiladas suizas topped with tomatillo salsa, which they
    expertly prepare using a cast‑iron skillet, fresh cilantro, and smoked chipotle, while also experimenting with wood‑fire grilling to impress family gatherings.
  core: Jose Santana is a methodical, art‑driven fencing specialist who balances a toolbox of vintage tools with a playlist of norteño hits, a habit of impulsively buying extra hardware, and a heart set
    on mentoring the next generation of craftsmen.
background:
  cultural: Jose is a first‑generation Mexican‑American raised in a bilingual household in El Paso. His family honors Mexican traditions such as Día de los Muertos, Cinco de Mayo, and Catholic celebrations,
    while also embracing the multicultural fabric of the U.S. Southwest. He speaks fluent Spanish and English, values close family ties, and is active in community events that blend Mexican heritage with
    local Texan influences. This bicultural identity shapes his worldview, work ethic, and his appreciation for art, community service, and collaborative harmony.
