  career_goals: Jose’s long‑term ambition is to launch his own family‑owned fencing company that specializes in custom ornamental designs reflecting his artistic curiosity. He plans to obtain OSHA and welding
    certifications, expand his skill set into advanced metalwork, and mentor apprentices from the local community. Within five years, he aims to secure contracts for residential and commercial projects
    throughout El Paso and the surrounding region, positioning his business as a trusted provider of high‑quality, aesthetically‑driven fencing solutions.
