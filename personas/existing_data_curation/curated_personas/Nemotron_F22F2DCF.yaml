personas:
  professional: Jasmine Barrett is a senior learning experience architect who blends adult learning theory with visual storytelling, leveraging Articulate Storyline and Adobe Captivate to craft culturally
    resonant e‑learning modules; their meticulous project‑management style and data‑driven ROI focus make them a go‑to leader for enterprise talent initiatives, while their assertive yet compassionate communication
    style reflects a deep commitment to inclusive, arts‑infused development.
  sports: Jasmine Barrett is an avid supporter of the St. Louis Cardinals and the St. Louis Blues, regularly attending summer baseball games and winter hockey matches while staying active through a downtown
    yoga studio and the Riverfront Runners club, where they combine disciplined workouts with late‑night post‑run coffee meet‑ups with fellow professionals.
  arts: Jasmine Barrett is a dedicated art aficionado who spends weekends wandering the Saint Louis Art Museum and local street‑art corridors, sketching watercolor scenes of historic neighborhoods, curating
    experimental photography series inspired by Kehinde Wiley's portraiture, and steering a monthly book club where they dissect works by contemporary poets like Claudia Rankine and memoirs such as 'Between
    the World and Me.'
  travel: Jasmine Barrett prefers purposeful travel that blends cultural immersion with artistic discovery, having explored New Orleans during Mardi Gras, attended the Dakar Biennale, and planned a future
    trip to São Paulo’s Afro‑Brazilian festivals, they meticulously curate itineraries that balance modest budgets, limited vacation days, and a yearning for vibrant diaspora celebrations.
  culinary: Jasmine Barrett is a passionate home‑cook who expertly prepares soulful dishes such as shrimp and grits, collard greens seasoned with smoked paprika, and sweet‑potato pie, while seeking out
    family‑run eateries like The Soul Kitchen for their rendition of Jollof rice, reflecting an intermediate culinary skill set that blends traditional flavors with experimental plating.
  core: Jasmine Barrett blends a relentless drive for professional excellence with a deep love for art and community heritage, juggling chronic anxiety and a penchant for over‑booking yoga sessions while
    curating culturally resonant learning experiences.
background:
  cultural: Jasmine is an African‑American woman raised in the historic Central West End neighborhood of St. Louis, where family stories of the civil‑rights era and church community shaped her values of
    resilience, education, and collective uplift. Her parents emphasized the importance of cultural heritage, regularly celebrating Juneteenth, soul food gatherings, and attendance at the Missouri History
    Museum’s African‑American exhibits. She is actively involved in local Black professional networks, such as the St. Louis Black Business Association, and volunteers with the African American Heritage
    Museum. These experiences inform her commitment to culturally responsive training, infusing her work with narratives that honor Black artistic traditions and foster inclusive spaces.
attributes:
