    ''Creative Arts Integration'', ''Organizational Development'', ''Change Management'', ''Budget Management'', ''Conflict Resolution'']'
  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Experimental photography'', ''Reading contemporary fiction and poetry'', ''Leading a book club'', ''Cooking
    soulful cuisine and exploring Black‑owned restaurants'', ''Yoga and mindfulness practice'', ''Attending live music and theater shows'', ''Volunteering for youth arts mentorship'', ''Traveling to cultural
    festivals celebrating the African diaspora'']'
  career_goals: Jasmine aims to rise to a senior leadership role—Director or Vice President of Learning and Development—where she can shape enterprise‑wide talent strategy and champion an innovative, arts‑infused
    learning culture. She intends to expand her expertise by earning an executive MBA and a doctoral credential in Educational Leadership. Her long‑term ambition includes launching a community‑partnered
    arts mentorship program that connects corporate training resources with St. Louis youth, publishing thought‑leadership pieces on culturally responsive learning, and speaking at national conferences
    on the intersection of creativity, DEI, and employee performance.
