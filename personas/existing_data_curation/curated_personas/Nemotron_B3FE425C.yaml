personas:
  professional: Abner Bachman, an aspiring junior game developer, channels their vivid imagination and knack for storytelling into creating whimsical Minecraft mods and Scratch games while enthusiastically
    leading school drama set designs.
  sports: Abner Bachman thrives on the social buzz of weekly pick‑up soccer games with friends at the community park, proudly cheering for the local youth soccer club, the Riverside Rangers, and they occasionally
    tune into the NHL’s Chicago Blackhawks for high‑energy inspiration.
  arts: Abner Bachman immerses themselves in sketching sprawling fantasy maps, practicing keyboard renditions of Yoko Shimomura’s video‑game scores, and drawing inspiration from Studio Ghibli films and
    the surreal art of Alex Ross, and they often share their creations at school art shows.
  travel: Abner Bachman’s travel style blends curiosity and family budgeting, having explored the interactive exhibits at Washington D.C.’s Smithsonian, splurged on a weekend trip to Orlando’s Magic Kingdom,
    and dreaming of a future adventure to Kyoto for its anime heritage and cherry‑blossom festivals, they eagerly map out itineraries using colorful notebooks.
  culinary: Abner Bachman delights in crafting elaborate pizza slices topped with pepperoni and pineapple, mixing up batch chocolate chip cookies, and experimenting with sushi rolls featuring cucumber and
    avocado, and they often negotiate for extra toppings as a reward after completing a Lego build.
  core: Abner Bachman fuses a restless imagination, a love for spotlight moments, and a nervous streak into a twelve‑year‑old who constantly builds, creates, and worries in equal measure, and they never
    miss a chance to share their latest invention with friends.
background:
  cultural: Abner grew up in a middle‑class, white family in Crownsville, Maryland, a suburban community with close ties to the Chesapeake Bay region. His upbringing reflects typical American values of
    education, independence, and community involvement. He participates in local traditions such as Fourth of July fireworks on the bay, school field trips to historic sites in Anne Arundel County, and
    family gatherings centered around holiday meals. The multicultural environment of the broader Baltimore metropolitan area has also exposed him to diverse music, art, and food, shaping his curiosity
    while maintaining his family's regional cultural roots.
