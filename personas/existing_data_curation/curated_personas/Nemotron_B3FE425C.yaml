  career_goals: Abner dreams of turning his love for imagination and abstract thinking into a future career where he can create immersive experiences for others. He envisions becoming a multimedia artist,
    game designer, or animation storyteller, and he hopes to study visual arts and computer science in high school and beyond. He also aspires to lead creative workshops that blend art, technology, and
    storytelling, allowing him to share his enthusiasm for novelty with a wider audience.
