personas:
  professional: Aaron Lively blends six years of full-cycle HR expertise, mastery of Workday and SAP SuccessFactors, and a disciplined, organized approach to craft data‑driven talent acquisition and innovative
    DEI programs that reflect a curiosity for art and a goal to become an HR Business Partner or Director within five years.
  sports: Aaron Lively shows up three evenings a week at the local community basketball league, joins weekend hip‑hop‑contemporary dance workshops for cardio, hikes the Hudson Valley trails each fall, and
    cheers for the New York Knicks, Buffalo Bills, and Albany Patroons while maintaining a disciplined but socially driven fitness routine.
  arts: Aaron Lively immerses themselves in Albany’s bustling arts scene, attending gallery openings at the Albany Museum of Art, snapping urban landscape photos inspired by Vivian Maier, sketching in cafés
    while listening to Miles Davis and spoken‑word poet Saul Williams, and often quoting Samuel Beckett in casual conversation.
  travel: Aaron Lively plans travel with a blend of structured itineraries and spontaneous cultural immersion, having explored New Orleans’ music festivals, the historic streets of Edinburgh, and Mexico City’s
    Day of the Dead celebrations, and now dreams of attending the Harare International Festival of the Arts and hiking the Canadian Rockies while balancing work commitments.
  culinary: Aaron Lively enjoys a mix of farm‑to‑table brunches and home‑cooked meals, favoring avocado toast with smoked paprika, shrimp and grits with fresh thyme, and mastering Thai pho broth, yet admits
    to often ordering takeout sushi after late‑night basketball games due to limited time.
  core: Aaron Lively is a disciplined, socially‑charged HR professional who balances a love for art, urban photography, and community sport with a knack for budgeting, occasional health procrastination,
    and a habit of over‑planning every weekend adventure.
background:
  cultural: Aaron is a second-generation African-American whose family roots trace back to the Southern United States, with grandparents who migrated during the Great Migration. Growing up in Albany, he
    was immersed in a close-knit Black community that emphasized education, collective uplift, and artistic expression. Family gatherings featured gospel music, storytelling, and discussions about civil-rights
    history, shaping his appreciation for cultural heritage and social justice. This background informs his commitment to fostering inclusive workplaces and mentoring young professionals of color. While
    he embraces his African-American identity, he also navigates the broader multicultural fabric of upstate New York, blending traditions from his heritage with the diverse perspectives of the city.
