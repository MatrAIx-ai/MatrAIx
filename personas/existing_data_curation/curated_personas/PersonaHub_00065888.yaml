persona_description: Chris Jones, a Met Office research scientist leading Earth System modelling and climate research, focusing on the interaction between climate and ecosystems, and collaborating with
  scientists from various fields to ensure the model takes into account factors such as vegetation, aerosols, and ocean biology. He is part of the team involved in pan-European research collaboration projects,
  such as COMBINE, EMBRACE, and CARBONES, and is looking to understand which parts of the model need to be enhanced to improve confidence in the future. Chris and his team are also interested in understanding
  how ecosystems are 'committed' to change for decades after climate has stabilised, and how this knowledge can be used to make informed decisions about climate change policies.
