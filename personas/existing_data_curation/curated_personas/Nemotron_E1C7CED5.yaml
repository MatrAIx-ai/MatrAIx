  hobbies: '[''Soccer (community league)'', ''Cooking Mexican cuisine'', ''Listening to regional Mexican music'', ''Car restoration'', ''Custom PC building'', ''Volunteering at church events'', ''Hiking
    in Texas Hill Country'', ''Reading mystery novels'']'
  career_goals: Marco aims to become a master HVAC technician within the next five years, obtaining additional certifications such as NATE (North American Technician Excellence) and pursuing an Associate's
    degree in Building Systems Technology. He envisions eventually moving into a supervisory role or launching his own small HVAC contracting business to provide reliable service to his community. To counter
    his tendency toward stress and worry, he plans to adopt more structured time‑management practices and develop leadership skills that balance his cooperative nature with assertiveness when needed.
