personas:
  professional: Marco Acuna is a 24‑year‑old HVAC technician who relies on systematic checklists and step‑by‑step troubleshooting to install, service, and repair residential climate systems, pairing his
    practical, structure‑oriented mindset with a relaxed attitude toward paperwork that lets him adapt on‑site while using his strong customer‑service skills to clearly explain technical issues, and they
    are now pursuing NATE certification and leadership training to become a master technician and future supervisor.
  sports: Marco Acuna plays midfield for a local community soccer league in Houston, stays fit with weekend runs and occasional weight‑training, cheers on the Houston Dynamo during MLS season and roots
    for the Astros in baseball, while also escaping to solo hikes in the Texas Hill Country to decompress from stress.
  arts: Marco Acuna relaxes by listening to banda and norteño legends such as Los Tigres del Norte and Banda El Recodo while assembling custom PCs, and they unwind with mystery novels by Agatha Christie
    and Gillian Flynn, often attending community‑center live‑music nights that blend rhythm and storytelling.
  travel: Marco Acuna favors short, budget‑friendly road trips that mix adventure and relaxation, having explored the Texas Hill Country and taken a weekend getaway to New Orleans for its music and cuisine,
    while dreaming of a cross‑border road excursion to a vibrant city renowned for historic murals and street tacos and a trek through Colorado’s Rocky Mountains for high‑altitude hiking.
  culinary: Marco Acuna is an enthusiastic home cook who expertly prepares tamales and pozole using freshly ground masa, dried chilies, hominy, and homemade salsa verde, occasionally experiments with fusion
    twists like chipotle‑infused barbecue sauce on grilled carne asada, and they love sampling tacos from local food trucks and upscale Mexican‑inspired restaurants for new ideas.
  core: Marco Acuna is a 24‑year‑old HVAC tech who balances meticulous checklists with a laid‑back approach to paperwork, worries about deadlines yet finds peace in weekend hikes, soccer matches, and cooking
    tamales for family gatherings.
background:
  cultural: Marco grew up in a Mexican‑American household in Houston, immersed in both Mexican traditions and the diverse culture of Texas. He is bilingual in Spanish and English, celebrates Día de los
    Muertos and Mexican Independence Day with family, and participates in Catholic rites such as Christmas posadas. The strong emphasis on family cohesion, hard work, and community support shaped his practical
    work ethic and his desire to give back locally. While he embraces his heritage through food, music, and language, he also identifies with the broader Houston spirit of multiculturalism and resilience.
attributes:
  skills: '[''HVAC system installation'', ''Refrigerant recovery and charging'', ''Electrical troubleshooting'', ''Preventive maintenance scheduling'', ''Blueprint and schematic reading'', ''Customer communication'',
