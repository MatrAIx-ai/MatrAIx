    "Basic first aid and trauma care", "Photography for incident documentation"]'
  hobbies: '["Sketching and acrylic painting", "Street photography", "Attending gallery openings and mural tours", "Live music and jazz festivals", "Community basketball league", "Improv theater participation",
    "Cooking and exploring Southern/Caribbean cuisine", "Volunteer fire safety workshops with artistic activities", "Hiking in nearby parks", "Reading science‑fiction and contemporary non‑fiction"]'
  career_goals: Shawntika aims to advance to the rank of fire captain within the Indianapolis Fire Department, completing the Fire Officer I and II certifications and the National Fire Academy’s leadership
    program. She intends to become a certified fire investigator, combining her analytical mindset with her curiosity for new ideas. Long‑term, she envisions spearheading a city‑wide fire safety education
    initiative that integrates art and storytelling to engage youth in at‑risk neighborhoods. She also hopes to pursue an associate’s degree in fire science or public administration to broaden her impact
    on department policy and community resilience.
