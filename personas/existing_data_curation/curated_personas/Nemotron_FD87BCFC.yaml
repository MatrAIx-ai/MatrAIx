personas:
  professional: Shawntika Jones, a seasoned Indianapolis firefighter with deep expertise in fire suppression, emergency medical services, hazardous‑materials response, and incident command, blends a competitive
    drive and an artist’s eye to lead crews, craft vivid visual after‑action reports, and spearhead community fire‑safety storytelling initiatives as she works toward fire captaincy and fire‑investigator
    certification.
  sports: Shawntika Jones competes in a weekly community basketball league, cheers for the Indiana Pacers at Gainbridge Fieldhouse, supports the Indianapolis Colts, and belongs to the Hoosier Hoops Club,
    using sport as both a competitive outlet and a team‑building rehearsal for fire‑ground coordination.
  arts: Shawntika Jones immerses herself in Indianapolis’s arts scene by attending gallery openings at the Indianapolis Museum of Art, exploring murals by local artist Maggie Codding, snapping street‑art
    photos, sketching urban skylines, and painting acrylic canvases inspired by the vivid colors of Caribbean festivals, while volunteering to teach kids visual storytelling through fire‑safety themes.
  travel: Shawntika Jones prefers weekend road trips that blend cultural immersion and culinary discovery, often planning meticulously‑mapped itineraries to New Orleans for jazz and gumbo, Nashville for
    live songwriting sessions, and a yearly escape to Jamaica to reconnect with Caribbean flavors, all while balancing a modest travel budget and occasional family commitments.
  culinary: Shawntika Jones enjoys cooking Southern comfort dishes like shrimp and grits, collard greens, and sweet potato pie, alongside Caribbean staples such as jerk chicken, plantain mofongo, and ackee
    with saltfish, skillfully balancing a moderate home‑cook proficiency with a willingness to experiment with bold spice blends and fresh, locally‑sourced ingredients.
  core: Shawntika Jones is a fire‑fighting artist who channels a competitive spark into community safety, basketball, improv theater, and a habit of collecting vintage fire helmets while never missing a
    chance to sketch the city’s murals.
background:
  cultural: Shawntika is an African‑American who grew up in a close‑knit, multigenerational family that moved from the rural South to Indianapolis during the Great Migration. Her parents instilled a strong
    sense of community, church involvement, and appreciation for black cultural traditions such as gospel music, soul food, and storytelling. She actively participates in local cultural events like the
    Indianapolis Black Expo, Juneteenth celebrations, and community murals that honor African‑American history. Her heritage informs her commitment to public service, community empowerment, and the use
    of artistic expression as a bridge between generations.
attributes:
  skills: '["Fire suppression and extinguishment", "Emergency medical care (EMT‑B certification)", "Hazardous materials response", "Incident command and decision‑making", "Team leadership and crew coordination",
