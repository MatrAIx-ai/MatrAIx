  career_goals: Priscilla dreams of becoming a children’s author and illustrator, creating picture books that blend imaginative worlds with messages of kindness and resilience. She also hopes to design
    interactive educational games that encourage curiosity in other kids. In the long term, she envisions working as a community arts educator, leading workshops at the local library or community center
    where she can share storytelling and art with younger children in Dillon.
