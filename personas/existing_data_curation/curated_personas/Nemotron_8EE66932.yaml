personas:
  professional: Priscilla Kimbrough is an aspiring story architect who merges her love for fantasy novels and Minecraft world‑building, channeling meticulous organization and boundless imagination to draft
    intricate plot maps and character sketches, while they balance creative chaos with reliable attention to detail.
  sports: Priscilla Kimbrough is a spirited participant in the local U13 soccer league and a devoted fan of the Atlanta Braves, who spends weekend afternoons hiking the nearby fields, tracking leaf changes
    for her nature club, and occasionally skips practice when school worries overwhelm them.
  arts: Priscilla Kimbrough is a dedicated member of her school art club who fills sketchbooks with Harry Potter‑inspired characters while listening to gospel choirs, R&B legends like Beyoncé, and hip‑hop
    beats from Kendrick Lamar, and they cite artistic influences such as Jim Lee, Frida Kahlo, and Studio Ghibli’s Hayao Miyazaki.
  travel: Priscilla Kimbrough is a curious explorer who loves weekend nature walks through nearby fields, dreams of visiting the Smithsonian National Museum of Natural History in Washington, D.C., and the
    Scottish Highlands’ ancient castles, yet they often plan day trips that fit her family’s modest budget and school schedule.
  culinary: Priscilla Kimbrough is an eager kitchen helper who assists her family in preparing fried chicken, collard greens, and sweet cornbread on Sundays, while they also experiment with leaf‑infused
    tea and decorate cupcakes with doodles from their favorite graphic novels.
  core: Priscilla Kimbrough is a 12‑year‑old imagination‑driven dream‑builder who balances meticulous planning with creative chaos, often worrying about school assignments while clutching a sketchbook and
    humming gospel harmonies.
background:
  cultural: Priscilla comes from a close‑knit African‑American family rooted in Dillon, South Carolina. Her upbringing is shaped by church community gatherings, Sunday gospel singing, and family storytelling
    traditions that celebrate resilience and oral history. The local culture of Southern cuisine, such as collard greens and cornbread, is a regular part of her life. She is proud of her community’s history,
    including the rich legacy of Black educators and civil‑rights activists in the region. These cultural influences nurture her love for storytelling, music, and a strong sense of caring for others.
