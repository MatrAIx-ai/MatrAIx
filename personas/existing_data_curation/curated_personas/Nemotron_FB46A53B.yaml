personas:
  professional: Zoila Miranda, a 30‑year‑old industrial truck and tractor operator celebrated for their strict safety adherence and methodical load‑planning, leverages their love of routine and sociable
    nature to coordinate teams, mentor newcomers, and keep warehouse operations running like clockwork.
  sports: Zoila Miranda, a competitive beach‑volleyball and softball league member who trains year‑round for summer tournaments, channels their drive into cheering for the Miami Marlins in baseball season
    and the Miami Heat during basketball playoffs, while balancing intensity with restorative yoga sessions.
  arts: Zoila Miranda, an enthusiastic salsa and bomba dancer who lights up local festivals while listening to the timeless rhythms of Celia Cruz, the vibrant croons of Marc Anthony, and finds mystery solace
    in Agatha Christie’s classic whodunits and Gillian Flynn’s modern thrillers, weaves music and intrigue into their social fabric.
  travel: Zoila Miranda, a planner who prefers structured itineraries blending adventure and family connection, often escapes to coastal getaways like the Florida Keys or Cartagena’s historic old town,
    dreams of exploring Lisbon’s tile‑laden streets, yet balances these trips with budget constraints that keep them closer to regional weekend retreats.
  culinary: Zoila Miranda, a home‑cook who excels at crafting traditional island fare such as mofongo stuffed with pork, arroz con gandules seasoned with sofrito, and pasteles wrapped in banana leaves,
    loves the bright tang of lime, the earthy depth of plantains, and often experiments with fresh cilantro and sweet peppers to add personal flair.
  core: Zoila Miranda combines a steadfast love of routine with an energetic community spirit, thriving on hands‑on work, dance, and pragmatic planning, while their occasional skepticism and habit of over‑committing
    keep life both disciplined and delightfully chaotic.
background:
  cultural: Zoila was raised in Hatillo, a close‑knit municipality on Puerto Rico’s north coast known for its agricultural heritage and festive traditions such as the Festival de la Patilla. Her family
    follows Catholic customs, speaks primarily Spanish, and maintains strong intergenerational ties. The local culture, rich in bomba, plena, and salsa music, influences her social life and celebrations.
    Hatillo’s emphasis on community cooperation and pride in local produce instilled in Zoila a practical, grounded outlook, while the island’s blend of Spanish, African, and Indigenous roots nurtured her
    appreciation for diverse cultural expressions. She identifies strongly with Puerto Rican identity, valuing family, food, and the rhythm of island life.
attributes:
  skills: '["Heavy machinery operation", "Forklift certification", "Tractor operation", "Industrial safety compliance", "Preventive maintenance", "Load planning and inventory control", "Team coordination",
