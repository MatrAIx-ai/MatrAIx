  hobbies: '["Salsa dancing", "Bomba dancing", "Community festivals", "Beach volleyball", "Softball league", "Cooking traditional Puerto Rican dishes", "Yoga classes", "Volunteering at the community center",
    "Gardening", "Mechanical tinkering (small engines)", "Reading mystery novels"]'
  career_goals: Zoila aims to advance within the industrial sector by obtaining a shift supervisor position within the next two years, leveraging her reliability and safety record. She plans to complete
    an associate degree in logistics or industrial engineering to broaden her qualifications, and eventually pursue certification as a Certified Safety Professional. Long‑term, she envisions moving into
    an operations manager role where she can shape workflow efficiencies, mentor a larger team, and advocate for worker safety initiatives. Financial stability and the ability to support family members
    remain central motivations for her career progression.
