  career_goals: Evelyn aims to transition into instructional leadership, first as a department chair and then as a curriculum coordinator for the School District of Philadelphia. She plans to obtain an
    Educational Specialist or Ed.D. focusing on curriculum design and equity, and to spearhead interdisciplinary STEAM initiatives that blend literature with STEM concepts. Long-term, she envisions becoming
    a vice-principal or principal where she can shape school culture, champion data-informed instruction, and mentor staff while maintaining high academic standards.
