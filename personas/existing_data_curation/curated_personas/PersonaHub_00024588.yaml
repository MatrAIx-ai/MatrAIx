persona_description: A researcher studying the factors preventing or enabling the mainstreaming of adaptation options in municipalities, focusing on the impact of climate change on local governance at various
  scales and contexts. This researcher is interested in understanding the role of ecosystem services such as flood, drought, and storm protection in shaping municipal adaptation policies and practices.
  The researcher aims to explore the different classes of ecosystem services that municipalities can contribute to, and how they can be integrated into adaptation strategies. This researcher has a strong
  background in mixed-methods research and is looking for opportunities to apply their knowledge and skills in addressing the urgent need for adaptation to climate change in South Africa.
