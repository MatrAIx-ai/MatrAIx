persona_description: A parent or adult who is interested in developing their children's confidence, social skills, decision-making abilities, and subject matter knowledge through hands-on learning experiences
  and is open to working with youth in their development through a fun and practical, learn-by-doing educational program. They are also interested in working with other interested adults in their community
  and reaching boys and girls through small groups called clubs. They are looking for a family affair where they can learn new things, meet new friends, and have fun. They are open to any youth and adults
  regardless of their background, race, creed, or disability. They are interested in the head, heart, hands, and health aspect of 4-H and want to make it a time for fun, learning, growing, and sharing across
  the Buffalo County community.
