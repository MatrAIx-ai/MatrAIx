    for art preservation'',''cleaning management software proficiency'']'
  hobbies: '[''watercolor painting'',''sketching/drawing'',''reading art history'',''quiet visits to museums and galleries'',''birdwatching'',''nature photography'',''early morning walks in wildlife preserves'',''jigsaw
    puzzles'',''crossword puzzles'',''journaling'',''collecting vintage postcards'']'
  career_goals: Diane aspires to transition from front‑line cleaning to a supervisory role within facility management, ideally in an environment that values art and culture such as a museum or gallery.
    She aims to earn a Certified Facility Manager (CFM) credential and deepen her expertise in sustainable, green cleaning protocols, positioning herself to lead a team that maintains high‑standard, aesthetically
    sensitive spaces. In the longer term, she envisions launching her own boutique cleaning service that caters to upscale residential and cultural venues, integrating her disciplined organization with
    her passion for preserving visual environments.
