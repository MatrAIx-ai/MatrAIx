persona_description: A historian who is interested in the Civil War era and the Reconstruction period in the United States. They are fascinated by the events that occurred in Colfax, Louisiana on April
  13, 1873, and are drawn to the story of the Tademys and the Smiths, two families who struggled to survive and thrive in the aftermath of the violence and discrimination that followed the Civil War. They
  are also interested in the broader issues that the book explores, such as the choices that people must make to claim the legacy of the past and to build a better future.
