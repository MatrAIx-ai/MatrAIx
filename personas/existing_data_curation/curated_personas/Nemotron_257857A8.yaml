  hobbies: '["Fusion Cooking", "Hiking & Landscape Photography", "Strategy Board Games", "Chinese Calligraphy", "Digital Illustration", "Reading Graphic Novels & Sci-Fi", "Language Learning (Korean)", "Indie-Rock
    Drumming", "Narrative RPG Video Games", "Volunteer Coding Workshops"]'
  career_goals: Jie aims to move into a leadership role within his school district, first by becoming the head of the Humanities department and then pursuing a Master's in Educational Leadership. He wants
    to spearhead the development of a culturally responsive curriculum that highlights Asian and Pacific Islander histories, and to collaborate with edtech startups to create interactive learning modules
    for secondary students. Long‑term, he envisions serving as a curriculum specialist at the state level or as a policy advisor for multicultural education initiatives. He also hopes to publish a series
    of classroom resources and possibly a textbook that integrates world literature with modern digital media. His competitive drive pushes him to earn recognized teaching awards and to present at national
    conferences on innovative pedagogy.
