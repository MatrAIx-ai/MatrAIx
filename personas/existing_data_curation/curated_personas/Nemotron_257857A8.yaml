personas:
  professional: Jie Briones, a 28‑year‑old interdisciplinary humanities teacher at a San Jose high school, blends Mandarin‑English bilingual instruction with tech‑driven, project‑based learning and data‑driven
    assessment, championing culturally responsive curricula while juggling a flexible, sometimes chaotic schedule that mirrors their critical, competitive nature.
  sports: Jie Briones, an avid weekend hiker in the Santa Cruz Mountains and a casual fan of the San Jose Sharks and Earthquakes, combines trail workouts with occasional intramural soccer and photo hikes,
    yet often skips scheduled gym days in favor of spontaneous outdoor adventures.
  arts: Jie Briones, a culinary experimentalist who crafts matcha‑infused desserts and spicy ramen tacos, spends evenings practicing Chinese calligraphy, sketching digital illustrations inspired by Studio
    Ghibli, drumming to indie‑rock riffs from The Strokes, and devouring graphic novels like "Saga" and "Monstress," weaving all these passions into a vibrant, competitive creative outlet.
  travel: Jie Briones, who plans trips on a whim using Airbnb and a travel rewards credit card, has trekked Queenstown’s alpine trails in New Zealand, explored Taipei’s night markets, sampled Manila’s street
    food, and now dreams of sipping tea in Kyoto’s historic teahouses and wandering Barcelona’s Gaudí‑styled streets, always blending cultural festivals with outdoor adventure.
  culinary: Jie Briones, an intermediate home chef, routinely whips up spicy ramen tacos with gochujang‑marinated pork, matcha panna cotta, and ube‑infused halo‑halo, perfects mooncakes for Lunar New Year
    celebrations, and insists on sourcing sustainable wagyu beef and fresh herbs from the local farmers’ market for their fusion dishes.
  core: Jie Briones, a competitively curious 28‑year‑old educator, fuses East‑West flavors in the kitchen, swaps lesson plans at the last minute, and channels a skeptical, flexible mindset into both classroom
    innovation and spontaneous midnight gaming marathons.
background:
  cultural: Jie Briones is a second‑generation East Asian American raised in San Jose. His father emigrated from Taiwan and his mother, of Filipino‑Spanish descent (Briones), arrived from Manila, creating
    a multicultural household where Mandarin, Tagalog, and English were spoken. Family traditions such as Lunar New Year celebrations, mooncakes, and the Filipino practice of 'bayanihan' instilled in him
    a deep respect for education and community. Growing up in the diverse Silicon Valley environment, he absorbed a blend of Asian cultural values—emphasis on scholarship and perseverance—and the entrepreneurial,
    tech‑forward mindset of the Bay Area. He frequently participates in local cultural festivals, volunteers at the Chinese Cultural Center, and incorporates both Chinese and Filipino literature into his
    teaching to reflect his heritage and the student body’s diversity.
attributes:
  skills: '["Lesson Planning", "Curriculum Development", "Educational Technology Integration", "Project-Based Learning", "Critical Thinking Facilitation", "Cross-Cultural Communication", "Bilingual Instruction
