  career_goals: Nathan aspires to blend his love for art with his desire to help others, dreaming of a future career as an art therapist or community arts program coordinator. He envisions pursuing higher
    education in visual arts and psychology, eventually designing therapeutic art workshops for at‑risk youth. In the longer term, he hopes to create inclusive public art projects that foster community
    harmony and provide safe creative outlets for teenagers.
