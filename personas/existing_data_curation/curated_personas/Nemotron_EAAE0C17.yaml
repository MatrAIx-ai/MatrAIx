personas:
  professional: Nathan Cotting, a budding teen artist‑coder, blends watercolor painting, digital illustration, and Scratch game development with a methodical planning style, channeling their curiosity and
    compassion into solo projects that often explore fantastical narratives, and they relish the quiet satisfaction of bringing imagined worlds to life.
  sports: Nathan Cotting enjoys casual weekend runs along the nearby wetlands trail, plays on the middle school soccer club as a midfielder, and they root for the Springfield Sluggers baseball team while
    preferring low‑impact activities that fit their reserved, health‑conscious routine.
  arts: Nathan Cotting immerses themselves in creative expression, drawing inspiration from the watercolor mastery of Georgia O’Keeffe, the whimsical animation of Studio Ghibli, the melodic fingerpicking
    of John Mayer, and the epic storytelling of JRR Tolkien, and they often blend sketching, digital art, and acoustic guitar in personal fantasy projects.
  travel: Nathan Cotting favors thoughtfully planned, low‑stress getaways, having visited Yellowstone National Park and the Monterey Bay Aquarium with family, dreaming of exploring the ancient ruins of
    Machu Picchu and the cherry blossoms of Kyoto while balancing school commitments and a modest travel budget, and they seek future trips that blend adventure with quiet reflection.
  culinary: Nathan Cotting enjoys experimenting with simple yet colorful dishes like veggie ramen with miso, homemade avocado toast topped with radish slices, and chocolate chip cookies, boasting a beginner‑level
    cooking skill that leans heavily on YouTube tutorials and a fondness for fresh berries, and they often cook for their family on weekends.
  core: Nathan Cotting, a 13‑year‑old imaginative yet anxious creator, channels curiosity into art, code, and quiet nature‑watching, balancing meticulous budgeting with occasional impulsive splurges, and
    they find solace in solitary pursuits while quietly nurturing a compassionate heart.
background:
  cultural: 'Nathan grew up in a middle‑class white family in Floral City, FL, a tight‑knit community in Citrus County. His upbringing reflects a blend of Floridian‑Southern cultural values: strong community
    bonds, frequent participation in church activities, and a love for outdoor pursuits like fishing, hiking in the nearby wetlands, and weekend barbecues. Family traditions include celebrating Thanksgiving,
    Christmas, and Fourth of July fireworks with extended relatives. The region’s citrus industry and proximity to the Gulf shape his appreciation for nature, while his public school exposes him to a modest
    diversity of cultures, fostering an open yet grounded worldview.'
