persona_description: A medical researcher and scientist who specializes in the field of retinal diseases, particularly those caused by abnormal retinal angiogenesis. He has a long-standing research program
  focused on ways to treat these diseases and has found innovative techniques to target and treat retinal angiogenesis using adult bone marrow stem cells. His work has led to the discovery of a powerful
  inhibitor of angiogenesis that can be used to shut down the formation of new blood vessels in the eye.
