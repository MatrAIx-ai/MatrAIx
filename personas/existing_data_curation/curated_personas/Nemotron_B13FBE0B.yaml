  hobbies: '[''Weekend Hiking in Ozark Trails'', ''Cycling with local club'', ''Community theater acting'', ''Volunteer mentoring at local high school STEM club'', ''Cooking classes focusing on Southern
    cuisine'', ''Yoga for stress management'', ''Gardening'', ''Reading contemporary fiction'', ''Travel planning'']'
  career_goals: Serena aims to advance to a senior operations role, such as Director of Operations or VP of Strategy, where she can spearhead digital transformation initiatives for a mid‑size manufacturing
    firm. She plans to earn an MBA within the next two years to deepen her business acumen, and she hopes to mentor emerging female leaders in STEM while building a reputation for cultivating high‑performing,
    resilient teams.
