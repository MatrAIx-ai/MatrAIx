personas:
  professional: Serena Rogers, a 33‑year‑old operations manager at a mid‑size manufacturing firm, leverages their STEM‑based analytical acumen to turn data into actionable strategies, expertly budgets and
    mitigates risk, and uses their organized, outgoing nature to lead cross‑functional teams, negotiate with stakeholders, and coach employees toward peak performance while constantly balancing curiosity
    with practical execution.
  sports: Serena Rogers fuels their high‑energy lifestyle by tackling the Ozark trail system on weekend hikes, cycling with the local Ozark Pedalers club year‑round, cheering for the St. Louis Cardinals
    in baseball and the Arkansas Razorbacks in basketball, and signing up for seasonal 5 K runs that keep their cardiovascular fitness on point.
  arts: Serena Rogers channels their sociable side into community theater productions of classics like Grease and Les Misérables, draws inspiration from Lin‑Manuel Miranda’s storytelling, regularly attends
    live performances by Dolly Parton and local jazz ensembles, and curates a small home collection of prints by modernist painter Edward Hopper.
  travel: Serena Rogers prefers meticulously planned road trips that blend adventure with relaxation, having logged weekend getaways to the Great Smoky Mountains, a culinary pilgrimage to New Orleans for
    Creole cuisine, and a spring visit to Kyoto to explore historic temples, all while balancing a modest travel budget and occasional family obligations.
  culinary: Serena Rogers enjoys exploring Southern cuisine through dishes like shrimp and grits, fried chicken, collard greens, and pecan pie, frequently seasons their garden‑grown herbs—basil, thyme,
    and rosemary—to elevate home‑cooked meals, and demonstrates a competent intermediate cooking skill set honed in weekly hands‑on classes.
  core: Serena Rogers is a data‑driven operations leader whose disciplined, organized mindset coexists with a high‑energy love for outdoor adventure, community theater, and Southern cooking, while their
    chronic worry fuels meticulous planning and occasional over‑analysis.
background:
  cultural: Serena grew up in a small, close‑knit town in Arkansas, shaped by Southern hospitality, community participation, and a Protestant upbringing. Her white, rural background emphasizes self‑reliance,
    respect for tradition, and a strong sense of duty to family and neighbors. While she embraces those values, her STEM education and professional experience have broadened her worldview, blending practical
    curiosity with a progressive outlook on technology, diversity, and leadership.
attributes:
