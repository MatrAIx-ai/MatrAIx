personas:
  professional: Cody Dunker, a veteran Southern California farmer who blends rigorous rotational grazing and water‑management plans with a knack for spontaneous problem‑solving, leverages his agricultural
    expertise, hands‑on machinery skill, and persuasive grant‑writing to run a thriving mixed‑livestock and specialty‑crop operation while mentoring the next generation of growers.
  sports: Cody Dunker enjoys weekend trail rides with his mare through the San Bernardino foothills, hikes the mountain trails in the cooler months, follows the Los Angeles Dodgers and the LA Rams for baseball
    and football, and belongs to the local equestrian club where he practices dressage twice a month.
  arts: Cody Dunker captures the farm’s seasonal rhythms through crisp black‑and‑white photography displayed at the weekly farmers’ market, reads biographies of pioneering American agrarians like John C.
    Olmstead, and unwinds listening to classic folk singers such as John Denver and Bob Dylan while occasionally tinkering with a vintage wooden bench in his workshop.
  travel: Cody Dunker favors road‑trip explorations, having driven the Pacific Coast Highway to watch the sunrise over Big Sur, trekked Yosemite’s meadows, and plans a future agritourism study tour of Tuscany’s
    vineyards, balancing the desire for adventure with limited time between planting seasons and family obligations.
  culinary: Cody Dunker delights in cooking heirloom tomatoes with fresh basil, smoked figs drizzled with olive oil, and raising a sourdough starter in his farmhouse kitchen, skillfully grilling free‑range
    lamb seasoned with rosemary and sage, yet often forgets to rest the meat after grilling, leading to occasional dry bites.
  core: Cody Dunker is a structured yet impulsive farmer‑entrepreneur who blends rigorous sustainability practices with spontaneous creativity, often juggling meticulous budgets, rugged health routines,
    and a love for photography, all while occasionally splurging on vintage tools and ignoring dentist appointments.
background:
  cultural: Cody's cultural background reflects a blend of traditional American West rural values and a scholarly appreciation for history fostered by his humanities education. Growing up in a multi-generational
    farming family in California, he inherited a strong work ethic, a respect for self-reliance, and a deep connection to the land. His upbringing emphasized community cooperation, stewardship of natural
    resources, and the celebration of seasonal cycles. His academic experiences have broadened his perspective, instilling an awareness of diverse agricultural histories and encouraging an openness to innovative,
    sustainable practices. This hybrid cultural identity shapes his approach to both farm management and community engagement.
