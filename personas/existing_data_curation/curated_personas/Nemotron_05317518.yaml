    ''HVAC system upkeep'', ''Industrial safety compliance (OSHA)'', ''Energy efficiency optimization'', ''Logbook documentation'', ''Team mentorship and training'', ''Basic welding and metal fabrication'',
    ''Self‑taught photography'', ''Artistic visual appreciation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Landscape photography'', ''Reading art history and design literature'', ''Model steam engine building'', ''Woodworking and metal art projects'', ''Gardening
    (vegetable and herb patches)'', ''Fishing at local lakes'', ''Playing acoustic guitar'', ''Volunteering for community mechanical workshops'']'
  career_goals: Approaching retirement, Alan aims to secure an Advanced Boiler Operator certification and transition into a supervisory role that emphasizes safety culture and energy‑saving initiatives
    within his plant. He hopes to formalize his mentorship of younger engineers, develop a small consulting practice focused on low‑cost efficiency upgrades for local businesses, and eventually carve out
    time for a part‑time workshop where he can combine his mechanical know‑how with his interest in metal art and woodworking. Reducing workplace stress and achieving a more flexible schedule are central
    to his vision for the next phase of his career.
