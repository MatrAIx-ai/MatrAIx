personas:
  professional: Alan Hodge, a seasoned boiler and steam turbine specialist with over three decades of hands‑on experience, blends meticulous mechanical expertise with a curiously artistic eye, mentoring
    junior engineers while championing energy‑efficiency upgrades and a relaxed, safety‑first culture as they eye an Advanced Boiler Operator certification and a supervisory role before retirement.
  sports: Alan Hodge enjoys low‑key outdoor recreation, spending weekends fishing at Lake Oconee, joining a small local skeet‑shooting club, and cheering for the Atlanta Falcons and Georgia Bulldogs while
    they occasionally stroll the walking trails of the Blue Ridge Mountains for gentle cardio.
  arts: Alan Hodge, an avid visitor of community museums and galleries, immerses themselves in the works of Ansel Adams, Georgia O'Keeffe, and the industrial design of Paul Rand, while they capture the
    interplay of light and machinery through black‑and‑white photography and strum acoustic renditions of John Fahey on a well‑worn guitar.
  travel: Alan Hodge prefers leisurely road trips that blend photography and history, having explored the historic streets of Savannah, the mountain vistas of Asheville, and the plantation tours of Natchez,
    while they always plan just enough time to set up a portable darkroom at each stop but rarely commit to overly packed itineraries.
  culinary: Alan Hodge enjoys farm‑to‑table cooking, often harvesting tomatoes, sweet corn, and herbs from their modest garden to whip up shrimp‑and‑grits, collard‑green salads, and cedar‑plank salmon caught
    at Lake Oconee, while their woodworking hobby sometimes leads to handcrafted cutting boards that they use as serving trays.
  core: Alan Hodge is a curious, art‑loving boiler veteran who balances meticulous mechanical know‑how with a relaxed, slightly disorganized lifestyle, constantly worrying about details while they find
    peace in solitary pursuits like photography, gardening, and gentle fishing.
background:
  cultural: Alan was raised in a working‑class family in central Georgia, where the rhythms of small‑town life, Southern hospitality, and a strong sense of community shaped his values. His upbringing emphasized
    modesty, self‑reliance, and a respect for tradition, reflected in the region’s folk crafts, country music, and seasonal gatherings like county fairs. While his professional path followed the practical
    trades of his father’s generation, Alan’s natural curiosity led him to appreciate the region’s emerging art scene and to seek out new ideas beyond his immediate surroundings. The blend of rural Southern
    culture and a lifelong exposure to industrial work informs both his pragmatic skill set and his appreciation for creative expression.
attributes:
