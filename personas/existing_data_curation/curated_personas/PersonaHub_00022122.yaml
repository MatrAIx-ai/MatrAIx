persona_description: A linguist who specializes in the study of time and memory, particularly the differences between past and future memories and the process of memory activation. His research interests
  include, but are not limited to, the perception and representation of time, the nature of memory, and the relationship between memory and consciousness. He is interested in understanding how memories
  of the past and future are stored and accessed, and how they are influenced by the present.
