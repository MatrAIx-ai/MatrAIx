  career_goals: He aims to advance to a regional operations manager position within the next three to five years, overseeing multiple locations and driving company‑wide efficiency initiatives. Leveraging
    his STEM background, he plans to implement predictive analytics for demand forecasting and waste reduction. Long‑term, he aspires to become a director of food‑service operations or to launch his own
    data‑centric fast‑casual concept that blends culinary creativity with technology. He seeks measurable performance improvements and intends to pursue an MBA to complement his technical expertise.
