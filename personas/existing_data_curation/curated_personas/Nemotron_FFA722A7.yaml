personas:
  professional: Ashley Wright, an aspiring office manager and data analyst, leverages her Excel expertise and meticulous research skills to streamline small‑scale event logistics, and they approach each
    task with a methodical, deadline‑driven mindset shaped by community volunteer experiences.
  sports: Ashley Wright, an avid hiker who frequents the Hoosier National Forest trails and supports the Indiana Pacers and the local high school football team, drinks water from a reusable bottle during
    weekend runs, and they occasionally join a community college intramural soccer league in the fall.
  arts: Ashley Wright, a dedicated photographer and amateur knitter, captures macro shots of wildflowers and often draws inspiration from the works of Ansel Adams and the folk melodies of Sufjan Stevens,
    and they occasionally attend the Richmond Art Association’s monthly gallery openings.
  travel: Ashley Wright, a meticulous planner who prefers budget‑friendly road trips, maps out weekend getaways to Brown County State Park and has a wish list that includes Yellowstone National Park and
    New Orleans, and they balance adventure with the financial constraints of a student budget.
  culinary: Ashley Wright, a modest home cook who enjoys preparing classic chicken pot pie with a flaky crust, making fresh apple crumble with cinnamon, and they often experiment with heirloom tomatoes
    and locally sourced basil when trying new recipes.
  core: Ashley Wright, a quietly competitive 20‑year‑old, blends Midwestern pragmatism with a solitary curiosity, obsessively tracking every budget line, photo exposure, and hiking mile while occasionally
    indulging in a spontaneous splurge on a new lens.
background:
  cultural: Ashley grew up in Richmond, Indiana, a small Midwestern community where family ties, self‑reliance, and community involvement are emphasized. Her upbringing reflects typical Midwestern values
    such as punctuality, modesty, and a strong work ethic, tempered by the region’s emphasis on civic participation and neighborly support. She celebrates American holidays with family traditions, attended
    a local church growing up, and participates in community events like county fairs and the annual Fourth of July parade. These experiences have shaped her pragmatic outlook while nurturing a quiet curiosity
    about the wider world.
