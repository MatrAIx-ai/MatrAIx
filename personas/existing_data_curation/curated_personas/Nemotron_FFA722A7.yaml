  hobbies: '[''Reading non‑fiction (history, science, self‑improvement)'', ''Journaling'', ''Hiking and nature photography'', ''Portrait photography'', ''Knitting'', ''Basic woodworking'', ''Library volunteer
    work'']'
  career_goals: She intends to enroll in a community college program in business administration or information systems, aiming to become an office manager or data analyst in a stable, mid‑sized organization.
    Ashley values roles that combine systematic problem‑solving with clear procedures. Over the next five years she hopes to gain a certification in bookkeeping or data analytics, secure a full‑time position
    that offers room for advancement, and eventually lead a small team where she can apply her competitive drive and methodical approach to improve operational efficiency.
