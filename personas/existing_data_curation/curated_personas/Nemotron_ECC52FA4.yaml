    ''Urban landscape photography'']'
  career_goals: Vilma aims to transition from her teaching assistant role to a full‑time faculty position, ideally as an adjunct lecturer or tenure‑track associate professor in art history or interdisciplinary
    humanities. She plans to design a signature course that merges contemporary art, cultural theory, and community engagement, and to secure research funding for a study on how local art initiatives impact
    community well‑being. Publishing scholarly articles and a monograph on art and social change is a key ambition. She also aspires to mentor graduate students, lead curriculum innovation initiatives at
    her institution, and potentially complete a PhD in Art History or Cultural Studies to deepen her scholarly impact.
