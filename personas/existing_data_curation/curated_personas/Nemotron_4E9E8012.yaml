personas:
  professional: An experienced retirement historian and community arts coordinator, Soonja Gao leverages meticulous archival research, watercolor and brush calligraphy expertise, and a competitive drive
    for high-quality programming to lead oral history workshops, digitize historic documents, and mentor volunteers at the local historical society.
  sports: An enthusiastic birdwatcher and morning walker, Soonja Gao follows the Sacramento Kings, participates in the local Audubon Society’s bird-count events, joins a low-impact balance class at the
    community center, and maintains a modest fitness routine despite a tendency to skip stretches after long gardening sessions.
  arts: A dedicated watercolorist and calligraphy teacher, Soonja Gao draws inspiration from John Singer Sargent, Claude Monet, and contemporary glass artist Dale Chihuly, frequently visits the Crocker
    Art Museum, and incorporates brush-stroke techniques into both landscape sketches of the Sierra foothills and elegant ink calligraphy demonstrations.
  travel: A methodical cultural explorer, Soonja Gao has toured the granite cliffs of Yosemite, the medieval streets of Bruges, and the historic vineyards of Napa Valley, plans each trip with detailed itineraries
    that prioritize heritage sites and archival research, and balances a modest travel budget with occasional splurges on art-focused workshops abroad.
  culinary: A refined tea ceremony enthusiast and home cook, Soonja Gao brews seasonal black and green teas with fresh ginger and lemongrass, prepares delicate steamed dumplings and broth infused with fermented
    soybeans using herbs like mint and cilantro, and delights in hosting intimate tea-pairing evenings while sometimes over-seasoning dishes in pursuit of perfect flavor balance.
  core: A meticulous, solitary artist with a competitive edge, Soonja Gao blends disciplined archival work, delicate watercolor landscapes, and structured tea rituals while occasionally obsessively cataloguing
    every detail and hesitating to trust others’ intentions.
background:
  cultural: Born to Korean‑Chinese immigrant parents who settled in the Bay Area before moving to rural Placerville, Soonja grew up bilingual in Korean, Mandarin, and English. Her household honored Confucian
    values of respect for elders, education, and community service, while celebrating Lunar New Year, Chuseok, and Mid‑Autumn festivals with traditional foods and rituals. The fusion of Korean and Chinese
    customs gave her a broad perspective on East Asian art and cuisine. Moving to California’s Gold Country introduced her to a more rugged, independent lifestyle, yet she maintained strong ties to the
    local Asian diaspora through the community center and temple. This blend of East Asian heritage and Western frontier sensibility shapes her worldview, artistic preferences, and dedication to preserving
    cultural memory.
attributes:
