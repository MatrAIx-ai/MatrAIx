  hobbies: '["Watercolor painting", "Calligraphy (Korean & Chinese)", "Japanese/Asian garden cultivation", "Birdwatching", "Genealogy research", "Reading art history and memoirs", "Tea ceremony", "Knitting
    & quilting"]'
  career_goals: In retirement, Soonja aims to leave a lasting cultural imprint on her community. She plans to compile and publish a collection of oral histories from immigrant families in El Dorado County,
    creating both a printed volume and an online archive. She aspires to lead a series of seasonal workshops that teach traditional calligraphy and tea ceremony, fostering intergenerational exchange. She
    also wishes to master digital photography and develop a virtual exhibition of her own artwork and local historic sites. Additionally, she hopes to mentor younger volunteers at the historical society,
    passing on her organizational expertise and fostering a competitive spirit for high‑quality programming.
