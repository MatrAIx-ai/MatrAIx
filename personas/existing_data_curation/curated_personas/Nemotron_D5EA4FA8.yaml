  career_goals: Even at a young age, Dominique dreams of turning her vivid imagination into a future career. She often declares that she wants to become an artist who paints bright, abstract worlds, an
    explorer who travels to space, or a storyteller who shares magical tales with friends. She also expresses an emerging desire to help others learn, imagining herself as a teacher or community leader
    who sparks curiosity in other children. Her ambitions blend creativity, novelty, and a competitive drive to excel in whatever path she chooses.
