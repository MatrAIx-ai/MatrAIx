personas:
  professional: Dominique King, an aspiring junior engineer in the sandbox, applies a surprisingly organized approach to building elaborate block towers, channeling a vivid imagination and critical curiosity
    into every make‑believe construction.
  sports: Dominique King, a high‑energy three‑year‑old who dominates the neighborhood playground with the Little Lions Soccer Club, proudly chants for the Metropolis Marvels basketball team during game
    day, and fiercely competes for the top spot on the slide, reflecting a competitive spirit even in group play.
  arts: Dominique King, a whimsical three‑year‑old who splashes bright watercolor onto every paper while belting out hits from The Wiggles and reenacting scenes from Disney's Frozen, adores the bold geometric
    art of Piet Mondrian and the playful verses of Dr. Seuss, weaving music and visual art into daily imagination.
  travel: Dominique King, an adventurous three‑year‑old who gleefully collects seashells on family road trips to Miami's sunny beaches, marvels at the vast colors of the Grand Canyon, and dreams of tasting
    croissants while gazing at the Eiffel Tower in Paris, balancing a love for sensory exploration with imaginative daydreams.
  culinary: Dominique King, a budding food explorer who delights in the cheesy stretch of macaroni and cheese, the sweet crunch of apple slices dipped in peanut butter, the colorful layers of fruit‑filled
    yogurt parfait, and confidently assembles a peanut butter‑banana sandwich with a plastic knife, yet notoriously rejects broccoli at dinner.
  core: Dominique King, a fiercely curious three‑year‑old with a competitive streak, blends vivid imagination with precise organization, hoarding shiny coins while battling stubborn elbow eczema and resisting
    bedtime.
background:
  cultural: Dominique is raised in an African‑American family in Houston's vibrant East End. Her parents celebrate Black cultural traditions such as Juneteenth, Kwanzaa, and regular church gatherings that
    feature gospel music and community potlucks. The multicultural richness of Houston—its diverse food scenes, festivals, and artistic outlets—exposes her to a blend of Southern hospitality and urban diversity.
    Family stories about ancestors and local Black history foster a strong sense of pride, identity, and connection to the broader African‑American community.
