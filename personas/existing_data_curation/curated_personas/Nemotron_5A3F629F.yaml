  career_goals: Stephan dreams of becoming an engineer or scientist who can design solutions that help people and the environment. He is especially interested in civil engineering to design safe community
    structures, or marine biology to protect Florida’s waterways. He aims to keep learning, earn good grades in middle school, join a robotics team, and eventually attend a university where he can turn
    his curiosity into a career that combines practicality with innovative ideas.
