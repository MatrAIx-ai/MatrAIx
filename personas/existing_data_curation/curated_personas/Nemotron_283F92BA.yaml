  hobbies: '[''Gardening'', ''Cooking traditional Mexican cuisine'', ''Hiking'', ''Reading personal development books'', ''Yoga'', ''Volunteering at community events'']'
  career_goals: Denia aims to advance from her current supervisory role to an Office Manager or Operations Manager position within the next three to five years. She plans to complete a bachelor's degree
    in Business Administration to deepen her strategic management knowledge and is interested in earning certifications such as PMP or Lean Six Sigma to bolster her process improvement capabilities. Denia
    also aspires to mentor emerging administrative professionals, implement more efficient departmental systems, and eventually contribute to workforce development initiatives that support the local Hispanic
    community.
