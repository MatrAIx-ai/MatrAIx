personas:
  professional: Susana Cortes, an 83‑year‑old retired community organizer, leverages meticulous event‑planning, bilingual translation, and seasoned budgeting skills to orchestrate the annual cultural festival
    and senior‑center programs, channeling their disciplined nature and sociable energy into every detail while insisting on high standards.
  sports: Susana Cortes, an avid walker who completes daily laps around Prospect Park and enjoys lively salsa sessions at the senior center, supports the New York Knicks and follows the Brooklyn Nets, and
    participates in the Prospect Park Senior Walkers club, balancing their cardiovascular exercise with seasonal dancing.
  arts: Susana Cortes, a devoted patron of the Brooklyn Museum, attends contemporary and historical exhibitions, mentors young crocheters, and immerses themselves in boleros by Los Panchos and the paintings
    of Jean‑Michel Basquiat, letting the arts shape their identity and provide a vibrant outlet for curiosity.
  travel: Susana Cortes, who prefers meticulously planned short trips, enjoys weekend getaways to the historic streets of Old San Juan and the gardens of the Huntington Library, while dreaming of a cultural
    pilgrimage to Granada, Spain, navigating their travel decisions through a balance of curiosity and the constraints of limited mobility and fixed income.
  culinary: Susana Cortes, a seasoned home chef, delights in preparing traditional Caribbean dishes such as arroz con gandules, mofongo, and flan, skillfully using plantains, sofrito, and coconut milk,
    and while they can spend hours perfecting each recipe, they sometimes over‑salt the stew in their enthusiasm.
  core: Susana Cortes is a meticulously organized, socially vibrant octogenarian whose boundless curiosity fuels a lifetime of cultural stewardship, even as they wrestle with chronic worry and a tendency
    to over‑schedule.
background:
  cultural: Susana was born in Puerto Rico and grew up in a close‑knit family that emphasized the island's rich traditions, Catholic faith, and communal solidarity. After moving to Brooklyn, she became
    an active member of the local Puerto Rican diaspora, participating in festivals, the National Puerto Rican Day Parade, and church celebrations. She maintains bilingual fluency, preserving the Spanish
    language through daily conversation and cultural activities. Food, music, and storytelling are central to her identity, and she strives to pass these customs on to younger generations while also embracing
    the multicultural environment of Brooklyn.
