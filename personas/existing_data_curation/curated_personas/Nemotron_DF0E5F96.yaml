  hobbies: '[''Attending Art Exhibitions'', ''Salsa Dancing'', ''Listening to Bolero and Salsa Music'', ''Cooking Traditional Puerto Rican Dishes'', ''Crocheting'', ''Balcony Gardening'', ''Walking in Prospect
    Park'', ''Reading Historical Novels'', ''Participating in Book Clubs'', ''Genealogical Research'', ''Volunteering at Community Center'']'
  career_goals: Although retired, Susana remains driven to leave a lasting legacy. She aims to complete her GED and obtain a community volunteer trainer certification, enabling her to formally mentor new
    volunteers. She wishes to compile and publish oral histories of Puerto Rican elders in Brooklyn, preserving their stories for future generations. Additionally, she hopes to expand the monthly art appreciation
    group she started, ensuring it continues beyond her own involvement, and to secure sustainable funding for the cultural festival so it can thrive for years to come. Her personal ambition also includes
    maintaining her health and independence while staying intellectually active.
