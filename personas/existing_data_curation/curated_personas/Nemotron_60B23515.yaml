personas:
  professional: Guillermo Ugarte is a veteran food‑service operations leader who leverages his STEM training to drive data‑driven efficiency, champion rigorous food safety, and infuse artistic flair into
    menu design and restaurant ambience while mentoring rising restaurateurs in Palm Beach.
  sports: Guillermo Ugarte stays active by dancing salsa, bachata, and merengue three times a week, plays occasional golf at the West Palm Beach Country Club, and roots for the Miami Heat while cheering
    with his senior tennis group on Saturday mornings.
  arts: Guillermo Ugarte regularly visits the Norton Museum of Art, draws inspiration from Frida Kahlo, Yayoi Kusama, and Jean‑Michel Basquiat, and enjoys live Latin dance performances at the Society of
    the Four Arts, integrating visual motifs into his plating concepts.
  travel: Guillermo Ugarte plans immersive culinary trips that blend structured itineraries and spontaneous market visits, having sampled street tacos in Oaxaca, fresh fish markets in Cartagena, and the
    spice bazaars of Marrakech, while his next goal is a relaxed road‑trip along the Gulf Coast of Florida.
  culinary: Guillermo Ugarte’s kitchen experiments merge island spices with Mediterranean techniques, producing dishes like plantain‑coconut risotto with cilantro‑lime sauce and mango‑infused ceviche, while
    his herb garden supplies basil, thyme, ají dulce, and lemongrass for daily cooking.
  core: Guillermo Ugarte is a methodical, art‑loving culinary veteran who juggles data‑driven efficiency with salsa‑driven spontaneity, mentoring the next generation while never missing a chance to garden,
    travel, and blend flavors.
background:
  cultural: Guillermo was raised in a Dominican household where family gatherings centered around hearty meals like mangú, sancocho, and habichuelas guisadas, accompanied by vibrant music and dance. Fluent
    in Spanish and English, he maintains strong ties to the Dominican diaspora community in South Florida, participating in cultural festivals, Carnaval celebrations, and religious traditions. His heritage
    influences his culinary style, emphasizing fresh tropical ingredients, bold flavors, and hospitality, while his life in Palm Beach Gardens blends these roots with the diverse, upscale Floridian environment,
    shaping a unique multicultural identity.
attributes:
