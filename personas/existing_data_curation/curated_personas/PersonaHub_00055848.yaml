persona_description: Paola Branduini, Adjunct Professor at the Politecnico di Milano, Department of Architecture, Built Environment and Construction Engineering, who teaches diverse classes and studios
  on urban and landscape regeneration and landscape as heritage. She is also involved in research on the implementation of an analytical process of inventory and characterisation of Traditional Agrarian
  Landscapes, based on a multidisciplinary and comprehensive multiscale approach and the identification of guidelines for planning and integrated management. Paola's expertise lies in Traditional Italian
  Landscapes, specifically focusing on the conservation and innovation of these landscapes, and her research interests include the protection and enhancement of traditional agro-forestry systems, as well
  as the traditional landscapes generated from such systems.
