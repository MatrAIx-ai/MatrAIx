persona_description: A professional satellite positioning algorithm developer who specializes in shadow-matching algorithms for real-time positioning applications. The algorithm is designed to improve real-time
  efficiency by pre-computing building boundaries and using them to estimate satellite visibility at each candidate position. The algorithm is implemented in a way that trades time and computing power for
  a one-off processing requirement at the server side, allowing for faster positioning of users in real-time environments. The persona is likely to be familiar with satellite positioning technology, shadow-matching
  algorithms, and real-time positioning applications.
