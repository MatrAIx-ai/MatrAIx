    coordination'']'
  hobbies: '[''Visiting art galleries and museums'', ''Salsa dancing'', ''Improv theatre'', ''Reading speculative fiction and philosophy'', ''Cooking Mexican cuisine'', ''Hosting social gatherings'', ''Hiking
