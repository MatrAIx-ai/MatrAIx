  career_goals: Daniela aims to become a senior partner at a major public accounting firm where she can champion innovative audit methodologies that blend technology, data visualization, and cultural insight.
    She also envisions launching her own boutique consultancy that specializes in providing audit and financial advisory services to artistic, entertainment, and nonprofit sectors in Los Angeles. Long‑term,
    she hopes to mentor emerging accountants, develop thought leadership on finance for creative industries, and eventually serve as CFO of a prominent museum or cultural institution, all while preserving
    a balanced, socially vibrant lifestyle.
