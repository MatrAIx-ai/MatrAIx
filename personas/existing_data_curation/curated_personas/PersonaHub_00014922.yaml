persona_description: A professor who specializes in human geography and is particularly concerned about the impact of rising electricity prices on energy poverty in South Eastern Europe. He is a lecturer
  at the University of Birmingham and has expertise in district heating systems, health and environmental concerns related to the use of wood for heating, and the situation in Serbia and Montenegro. He
  is interested in the future of energy policies and the potential solutions to address the problem of energy poverty in the region.
