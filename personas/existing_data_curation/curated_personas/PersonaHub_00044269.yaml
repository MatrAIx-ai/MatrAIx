persona_description: A healthcare professional who specializes in conducting Otoacoustic Emission tests, particularly in newborns and infants for hearing screenings and evaluations. They are skilled in
  the use of handheld screening devices and have a thorough understanding of the diagnostic methods and techniques used to analyze the results. They are also knowledgeable about the potential causes and
  factors that could contribute to a failed test and are able to provide guidance and advice on how to address these issues. They are likely to be familiar with the screening process, the results, and the
  implications of the findings.
