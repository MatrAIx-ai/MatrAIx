  hobbies: '[''Salsa and cumbia dancing'', ''Cooking traditional Latin American and indigenous dishes'', ''Weaving and textile crafts'', ''Mural painting'', ''Volunteering at cultural centers (hair-care
    workshops)'', ''Hiking (Superior Hiking Trail)'', ''Gardening native plants'', ''Reading art-history and indigenous culture books'', ''Watching documentary films'', ''Curating music playlists for salon'']'
  career_goals: Marilena aims to transition from working in a high-traffic salon to owning a boutique studio that blends contemporary hairstyling with the cultural aesthetics of her Latin American indigenous
    heritage. She plans to earn a Master Colorist certification and develop a signature line of natural hair-care products that incorporate traditional Andean and Mesoamerican botanicals. By establishing
    a scholarship program, she hopes to mentor aspiring stylists from under-represented Latino and Indigenous backgrounds. Marilena also envisions serving as a guest lecturer at the local cosmetology school,
    leading workshops on sustainable hair practices, and becoming a recognized voice in the Minnesota beauty community through regular contributions to industry panels and local cultural festivals. While
    pursuing these ambitions, she values maintaining a balanced schedule that allows dedicated time for her family and community involvement.
