personas:
  professional: Bradley Benjamin is a high‑school senior in Greenville who blends a hands‑on knack for fixing small engines and electronics with a deep‑rooted desire to serve the community, dreaming of
    an EMT certification or automotive apprenticeship while already offering weekend bike‑repair help to neighbors, though their loose approach to scheduling sometimes leads to double‑booked appointments.
  sports: Bradley Benjamin enjoys fishing on Lake Hartwell and hiking the Swamp Rabbit Trail, follows the Greenville Drive minor‑league baseball team and the Carolina Panthers, participates in a local pickup
    soccer league on Saturdays, and volunteers as a water‑safety monitor at the community pool, though they rarely commit to organized training, preferring spontaneous outdoor activity.
  arts: Bradley Benjamin spends evenings strumming acoustic guitar to the tunes of Chris Stapleton and Bob Dylan while binge‑watching sci‑fi documentaries and reading Brandon Sanderson novels, attends occasional
    local art fairs featuring folk painters, and follows YouTube channels like Linus Tech Tips for model‑kit building inspiration, yet they often let their guitar case gather dust due to a laid‑back attitude
    toward practice.
  travel: Bradley Benjamin prefers short, budget‑friendly road trips to nearby Charleston’s historic district and the Great Smoky Mountains, dreams of a solo backpacking adventure through Iceland’s volcanic
    landscapes, and plans to combine future service‑business travel with visits to regional animal shelters, though their spontaneous planning sometimes leaves them missing out on limited‑time deals.
  culinary: Bradley Benjamin enjoys experimenting with simple Southern comfort foods such as shrimp and grits, smoked pork shoulder, and homemade banana bread, frequently seasoning meals with fresh garden
    herbs from their small backyard plot, yet they often burn the edges of grilled cheese when distracted by a strategy game.
  core: Bradley Benjamin is a curious, community‑focused teen who balances practical handyman skills with a relaxed, sometimes disorganized lifestyle, channeling compassion into volunteer work while indulging
    in sci‑fi books, guitar riffs, and spontaneous outdoor adventures.
background:
  cultural: Bradley grew up in a predominantly white, working‑class neighborhood of Greenville, South Carolina. His family has deep roots in the area, and the community’s Southern hospitality, church involvement,
    and emphasis on neighborly support have shaped his values. He was raised with a mix of traditional Southern customs—such as weekend barbecues, high school football culture, and country music—alongside
    a strong sense of self‑reliance and community service. The modest, close‑knit environment of Greenville County, combined with exposure to both rural and suburban lifestyles, informs his practical outlook
    and his commitment to helping others in his town.
