  career_goals: Bradley plans to earn his GED within the next year and enroll in a vocational program, either an EMT certification or an automotive technology apprenticeship. His primary ambition is to
    secure a stable job that combines his practical skills with his desire to serve the community, such as working as a first‑responder, a handyman for seniors, or a firefighter. He also hopes to eventually
    start a small, flexible service business—like a mobile bike‑repair or home‑maintenance service—allowing him to maintain a work schedule that supports his personal interests and community involvement.
