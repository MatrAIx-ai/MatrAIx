personas:
  professional: Elliott Baker leverages a decade of hands‑on industrial machinery expertise and lean‑manufacturing acumen to drive precision quality control on the Columbus plant floor, while methodically
    preparing for a shift‑lead role through CNC programming certification and Six Sigma workshops, all underpinned by their organized, mentorship‑focused work ethic.
  sports: Elliott Baker cycles the Scioto River Trail three times a week with the Columbus Cycling Club, roots for the Columbus Crew and the Ohio State Buckeyes during the soccer and football seasons, and
    combines weekend hikes in Hocking Hills with occasional pick‑up basketball games to maintain a balanced, low‑impact fitness routine, while they always keep a water bottle and a basic first‑aid kit in
    their pack.
  arts: Elliott Baker immerses themselves in the Columbus art scene by photographing cityscapes reminiscent of Edward Hopper, studying the work of contemporary photographer Brandon Stanton, curating a personal
    collection of prints by local muralist Maya Lin, and finding creative energy in the music of The National and Sufjan Stevens while mentoring youths at community art workshops.
  travel: Elliott Baker plans their travel itineraries in meticulous Excel sheets, prefers bite‑size adventure trips such as weekend hikes in Hocking Hills and a road‑trip through the Blue Ridge Parkway,
    while earmarking an annual budget for immersive photography excursions like a month‑long trek through Iceland’s volcanic terrain and a tech‑focused cultural tour of Tokyo, balancing their love of nature
    with a curiosity for emerging technologies, and they schedule trips around long weekends to maximize travel.
  culinary: Elliott Baker hones their culinary craft by home‑brewing pale ales flavored with citrus peels and coriander, whipping up wood‑shaved mushroom risotto using locally sourced porcini and fresh
    thyme, and indulging in weekend brunches featuring avocado toast topped with smoked salmon and a side of spice‑rubbed smoked brisket, all while savoring classic Midwestern comfort foods like pork tenderloin
    with apple chutney, and they often experiment with new spice blends inspired by travel.
  core: Elliott Baker is a methodical production veteran with a photographer’s eye, a woodworker’s patience, and a budding home‑brew hobby, who balances strict workplace precision with a spontaneous love
    for city murals and occasional late‑night binge‑reading of sci‑fi classics, and they never miss a shift hand‑over debrief.
background:
  cultural: Elliott’s cultural background reflects a Midwestern upbringing in Columbus, Ohio. Raised in a close‑knit family that values hard work, reliability, and community involvement, he was exposed
    to both the traditional work ethic of central Ohio and the region’s expanding artistic and cultural offerings. Family gatherings often revolve around local festivals, county fairs, and modest celebrations
    that blend European (German and Irish) heritage with contemporary American customs. This blend of pragmatic values and an openness to new ideas informs his approach to both his career and personal life.
