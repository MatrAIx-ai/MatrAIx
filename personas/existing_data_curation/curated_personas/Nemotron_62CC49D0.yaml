  career_goals: Elliott aims to advance from front‑line production work to a supervisory role within the next three years, targeting a shift‑lead position that will allow him to mentor newer employees.
    He plans to earn a certification in CNC programming and attend lean‑six‑sigma workshops to deepen his process‑optimization knowledge. Long‑term, he envisions moving into an operations‑manager capacity
    where he can influence plant-wide efficiency while championing a culture of continuous learning. He also hopes to blend his curiosity for new ideas by participating in cross‑departmental innovation
    projects and supporting local apprenticeship programs.
