personas:
  professional: Clementina Gibson, a seasoned construction professional with three decades of residential and light‑commercial experience, blends meticulous blueprint reading, OSHA safety enforcement, and
    crew coordination into a methodical mentorship and part‑time consulting practice that they use to guide younger workers and small contractors.
  sports: Clementina Gibson, a faithful supporter of the Atlanta Braves and a member of the Monroe County Walking Club, spends their mornings on the local trail, joins seasonal senior softball leagues in
    the summer, and they treat weekend hikes as both low‑impact exercise and a social outlet with fellow retirees.
  arts: Clementina Gibson, an enthusiastic volunteer in their church choir, delights in singing gospel hymns while listening to Aretha Franklin and Mahalia Jackson, and they frequently discuss the novels
    of Alice Walker and the stage productions of August Wilson at their book‑club meetings.
  travel: Clementina Gibson, who prefers organized road trips planned on a spreadsheet, dreams of taking a scenic drive through the Great Smoky Mountains, has already visited Charleston, South Carolina
    for a historic tour, and saves for a family‑friendly cruise to the Bahamas as a relaxing escape from their busy community schedule, and they hope to share the adventure with longtime friends.
  culinary: Clementina Gibson, a confident home cook, often prepares classic Southern fare such as fried catfish, collard greens seasoned with smoked turkey, and homemade biscuits, frequently enhancing
    recipes with basil, thyme, and rosemary harvested from their garden, and they occasionally treat themselves to a locally sourced honey‑glazed peach cobbler.
  core: Clementina Gibson is a detail‑oriented builder‑turned‑mentor who balances a love of gardening, choir singing, and community service with a lingering worry about health and finance, and they have
    a habit of double‑checking every tool inventory before bedtime.
background:
  cultural: Clementina was raised in rural East Tennessee during the 1960s and 70s, a period that fostered strong community ties, self‑reliance, and a respect for tradition. Her white, Southern heritage
    is reflected in her deep involvement with the local church, appreciation for regional culinary customs, and a work ethic shaped by a multigenerational family of laborers. She values hospitality, close
    family relationships, and the collective well‑being of her neighbors in Englewood and the wider Monroe County area.
attributes:
  skills: '[''Concrete finishing'', ''Framing and basic carpentry'', ''Heavy equipment operation'', ''Blueprint reading'', ''OSHA safety compliance'', ''Team coordination'', ''Tool and inventory management'',
