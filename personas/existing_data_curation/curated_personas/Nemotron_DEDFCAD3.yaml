  career_goals: Patricia intends to enroll in a community college program in accounting, aiming to achieve top grades and secure an internship in a local accounting firm. Over the next five years, she plans
    to transfer to a four‑year university to complete a bachelor’s degree in accounting, study for the CPA exam, and obtain certification. She aspires to become a certified public accountant and eventually
    occupy a senior financial analyst or finance manager role where she can design efficient financial controls and lead a team. She values predictable career progression and financial stability, and she
    is motivated to support her family and achieve professional recognition for her competence and reliability.
