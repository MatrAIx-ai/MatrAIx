  career_goals: Although retired, John aims to stay active by preserving Tallahassee’s local history through oral‑history projects, writing a memoir that reflects his life’s lessons, and expanding senior‑center
    programming to include intergenerational workshops. He also hopes to mentor his grandchildren in practical skills and to remain physically healthy through regular walks and gardening.
