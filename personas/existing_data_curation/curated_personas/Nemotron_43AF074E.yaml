  career_goals: Mindy dreams of a future where she can blend her curiosity about living things with her practical problem‑solving. She often says she wants to become a wildlife biologist or a veterinarian,
    hoping to care for animals and study their habitats. In school, she also imagines being a teacher who helps other kids learn to manage their feelings, reflecting her sensitivity to stress. She sets
    small goals—winning the school science fair, leading her soccer team, and organizing a creek clean‑up—to build the skills needed for these larger ambitions.
