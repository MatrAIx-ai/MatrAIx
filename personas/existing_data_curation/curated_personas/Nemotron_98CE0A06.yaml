personas:
  professional: An aspiring home‑based creative entrepreneur, Zoraida Segovia leverages her drawing, painting, embroidery and modest digital literacy to launch a boutique of handmade crafts while navigating
    her relaxed, sometimes disorganized workflow with a flexible, collaborative approach.
  sports: A nature‑loving fitness enthusiast, Zoraida Segovia enjoys weekend hikes in Riverside County, practices sunrise yoga at the local community center, follows the Los Angeles Lakers and LA Galaxy,
    and occasionally joins the Menifee Amateur Running Club for 5K races.
  arts: A devoted art aficionado, Zoraida Segovia absorbs the works of Frida Kahlo, Georgia O'Keeffe, and contemporary muralist Sage Gibson, spends evenings at the Menifee Art Walk, and draws inspiration
    from indie filmmakers Lucrecia Martel and Alejandro González Iñárritu.
  travel: A curious wanderer, Zoraida Segovia prefers low‑key cultural trips, has explored the historic plazas of Oaxaca, trekked through the deserts of Sedona, and dreams of attending the lantern festival
    in Chiang Mai, all while budgeting her travel through a savings jar and planning trips spontaneously around art‑related events.
  culinary: A passionate home cook, Zoraida Segovia expertly prepares mole poblano, chilaquiles verdes, and handmade tamales with fresh corn masa, epazote and ancho chilies, while also experimenting with
    avocado‑lime sorbet and sharing her meals at neighborhood potlucks.
  core: Zoraida Segovia blends a calm, free‑spirited creativity with a habit of unfinished sketchbooks and a love for late‑night rain sounds that fuel her art, making her a gentle but determined cultural
    bridge in her community.
background:
  cultural: Zoraida was raised in a Mexican‑American household where Spanish and English were spoken interchangeably, and family traditions such as Día de los Muertos, quinceañeras, and weekly tamale nights
    shaped her identity. Growing up in Menifee, she blends Mexican heritage with Southern California influences, participating in local cultural events and community organizations that celebrate Mexican
    art, music, and cuisine. Her cultural roots inspire her artistic style, culinary experiments, and her commitment to fostering harmony and cultural awareness within her community.
attributes:
  skills: '["drawing", "painting", "photography", "hand embroidery", "cooking traditional Mexican dishes", "bilingual communication (Spanish/English)", "basic computer skills", "social media content creation",
