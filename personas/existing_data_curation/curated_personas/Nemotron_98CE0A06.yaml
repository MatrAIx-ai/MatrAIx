  hobbies: '["visiting art galleries and museums", "painting and sketching", "DIY crafts and embroidery", "cooking Mexican recipes", "reading about art history and philosophy", "listening to Mexican folk
    and contemporary music", "nature walks in Riverside County", "gardening", "watching indie and foreign films", "participating in community cultural festivals"]'
  career_goals: Zoraida aims to transform her artistic passions into a flexible, home‑based venture. She plans to enroll in a community college art program to refine her techniques and explore art therapy
    concepts. Over the next few years, she hopes to launch an online boutique selling handmade crafts and curated Mexican‑inspired artworks, allowing her to support her family while maintaining a relaxed
    schedule. She also aspires to volunteer as a cultural liaison for local festivals, helping preserve and share Mexican traditions in Menifee, and eventually obtain a certification in community outreach
    or art therapy to combine her creative talents with her supportive nature.
