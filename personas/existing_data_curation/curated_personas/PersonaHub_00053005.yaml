persona_description: A musicologist who specializes in the study of the late works of Franz Schubert, particularly his themes of illness and death in his music. His research interests include the relationship
  between Schubert's health issues and his late musical output, the creative outburst found in his late works, and the spiritual link between illness and musical creativity. He is particularly interested
  in the role of the body in Schubert's music and the impact of illness on his compositional process. He is also interested in the historical context of Schubert's late works and their relation to the ideas
  of Friedrich Nietzsche and Arthur Schopenhauer.
