  career_goals: She aspires to enroll in a specialized arts high school in San Juan, where she can refine her graphic design and concept art skills. Her ultimate ambition is to become a concept artist for
    video games or a freelance illustrator who blends contemporary Puerto Rican motifs with futuristic designs. In parallel, she dreams of launching an online platform that showcases emerging youth artists
    from the island, using her bilingual strengths to reach a broad audience. Winning local art contests and building a strong portfolio are concrete milestones she sets for herself. Long term, she hopes
    to influence cultural representation in mainstream media and perhaps study visual communication at a university.
