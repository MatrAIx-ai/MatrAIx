  hobbies: '[''Sketching'', ''Digital Art'', ''Reading Science-Fiction Novels'', ''Listening to Reggaetón, Plena, and Bomba Music'', ''Salsa Dancing'', ''Ukulele Playing'', ''Hiking and Nature Photography'',
