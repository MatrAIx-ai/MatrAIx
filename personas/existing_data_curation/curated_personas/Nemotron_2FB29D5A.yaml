  career_goals: Although retired, Angel aims to stay actively engaged by expanding her volunteer contributions—she plans to launch a youth STEM mentorship program in Snow Hill, serve as an advisory board
    member for historic preservation projects, and author a memoir that documents her family's legacy on the Eastern Shore. She also wishes to improve her digital photography skills to chronicle the region’s
    changing landscapes, and to ensure her estate and family records are meticulously organized for future generations.
