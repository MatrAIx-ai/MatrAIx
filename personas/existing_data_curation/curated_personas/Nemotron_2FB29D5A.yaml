personas:
  professional: Angel Brickson, a retired civil engineer and former project coordinator for the Maryland Department of Transportation, now leverages their analytical rigor, meticulous budgeting, and technical
    writing skills, and they apply this expertise to manage a community youth STEM mentorship program while serving as the volunteer archivist for the Snow Hill Historical Society.
  sports: Angel Brickson, a devoted fan of the Baltimore Ravens and the Baltimore Orioles, joins the Snow Hill Senior Walking Club for gentle cardio along the Blackwater River each spring, competes in the
    town’s bridge league with a competitive edge, and they enjoy casual lawn bowling in summer as a low-impact way to stay active.
  arts: Angel Brickson, a lifelong lover of classic literature, spends evenings reading Jane Austen and the Brontë sisters, sings traditional hymns by Fanny Crosby in the Methodist choir, stitches intricate
    quilts inspired by historic patterns, and they capture the Eastern Shore’s sunrise in digital photographs, often citing Ansel Adams as a stylistic influence.
  travel: Angel Brickson, who prefers carefully planned road trips over spontaneous flights, reminisces about weekend drives to Colonial Williamsburg and Annapolis, dreams of strolling through Bath, England’s
    Georgian streets, hopes to explore Savannah, Georgia’s riverfront before turning eighty, and they always use a printed itinerary and a trusted GPS to keep each journey on schedule.
  culinary: Angel Brickson, an accomplished home cook, prepares Old Bay-seasoned crab cakes and steamed clams with a splash of white wine, delights in the aroma of fresh thyme and parsley, occasionally
    bakes quince pie for church potlucks, and they rely on a well-worn cast-iron skillet rather than experimenting with new gadgets.
  core: Angel Brickson, a methodical retiree who blends civil‑engineering precision with a love for quilting, birdwatching, and Chesapeake Bay cuisine, approaches every task as a meticulously documented
    chapter in their legacy, even if it means obsessively checking off garden chores twice a day.
background:
  cultural: Angel was raised in a middle‑class, white, multi‑generational family on Maryland’s Eastern Shore. Her ancestors were early English settlers who farmed the Chesapeake region, embedding a deep
    sense of place and tradition. Growing up in a Methodist household, she internalized values of self‑reliance, modesty, punctuality, and community service. Local customs such as seafood cooking, participation
    in county fairs, and the preservation of historic homes have shaped her cultural identity, reinforcing a practical, routine‑oriented outlook that balances respect for tradition with a quiet competitiveness
    in community affairs.
