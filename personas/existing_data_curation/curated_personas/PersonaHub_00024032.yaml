persona_description: A researcher and scientist who specializes in the study of alcohol consumption, particularly the levels and patterns of alcohol usage in non-human primates. They are working on developing
  a diagnostic test for alcohol consumption that would be sensitive and specific enough to be used in public safety, parole conditions, and for determining if a patient may have an alcohol abuse problem.
  They are working with groups around the world and are looking for additional proteins to increase accuracy and provide alternates if some of the initial 17 do not work in humans.
