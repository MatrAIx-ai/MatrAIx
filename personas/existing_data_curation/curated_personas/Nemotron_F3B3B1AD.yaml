personas:
  professional: Mariana Bueso is a seasoned electrical and electronics engineer who excels in analog and digital circuit design, PCB layout, and embedded systems, and leverages their curiosity and relaxed,
    sometimes disorganized work style to champion cross-disciplinary R&D projects that blend sustainable tech with interactive art installations.
  sports: Mariana Bueso enjoys weekend hikes through the Hudson Valley's Catskill trails, maintains a low-key fitness regimen with sunrise yoga, and they root for the New York Knicks while occasionally
    joining a co-ed recreational soccer league at a local park.
  arts: Mariana Bueso extends their creative spark beyond engineering by painting oil canvases inspired by vibrant folk motifs and abstract forms, curating digital illustrations that echo the work of Yayoi
    Kusama and David Hockney, and they regularly showcase interactive art pieces at maker fairs alongside the ambient tracks of Bjork and Nicolas Jaar.
  travel: Mariana Bueso favors spontaneous, budget-friendly escapes, often trekking the misty cliffs of the Scottish Highlands or exploring the street-art corridors of Berlin, while they dream of a month-long
    immersion in the lush valleys of the Pacific Northwest.
  culinary: Mariana Bueso enjoys cooking eclectic meals, frequently whipping up miso-ramen with fresh shiitake, searing salmon tacos topped with mango-chili salsa, and experimenting with spice-laden quinoa
    bowls, yet they often forget to set a timer, leading to the occasional burnt edge.
  core: Mariana Bueso is a curiosity-driven engineer-artist who balances flexible, sometimes chaotic planning with a relentless drive to fuse technology and aesthetics, and they habitually juggle multiple
    side projects while forgetting to finish the ones that start first.
background:
  cultural: Mariana was born to Guatemalan parents and grew up bilingual, fluent in both Spanish and English. Her family maintains strong ties to Guatemalan traditions, celebrating holidays such as Día
    de los Muertos and sharing recipes for dishes like pepian and tamales. This cultural heritage fuels her appreciation for vibrant patterns and storytelling, which she channels into her artistic hobbies
    and design sensibility. Living in New City, NY, she balances her Guatemalan roots with the multicultural fabric of the New York metropolitan area, actively participating in diaspora community events
    and supporting local initiatives that promote Latin American art and STEM education.
attributes:
  skills: '[''Analog circuit design'', ''Digital signal processing'', ''PCB layout'', ''Embedded systems programming (C/C++)'', ''Python scripting for automation'', ''MATLAB data analysis'', ''Power electronics'',
