  hobbies: '[''Oil painting'', ''Digital illustration'', ''Photography'', ''Arduino tinkering and generative art'', ''Hiking in the Hudson Valley'', ''Yoga'', ''Reading science fiction'', ''Small group
    maker meetups'']'
  career_goals: Mariana aspires to transition into a senior R&D leadership role where she can spearhead innovative projects that fuse sustainable technology with artistic experiences, such as smart-home
    installations that respond to ambient art. She aims to mentor emerging female engineers and members of the Guatemalan diaspora, fostering a more inclusive tech community. While valuing flexibility over
    rigid schedules, she seeks a work environment that encourages exploratory thinking, cross‑disciplinary collaboration, and the freedom to experiment with unconventional design solutions. Long‑term, she
    envisions founding a boutique consultancy that offers bespoke electronics solutions for creative industries while maintaining a balanced, flexible lifestyle.
