persona_description: A public health professional who specializes in child and adolescent health and well-being, with a focus on the socioeconomic setting and the impact of economic crises on healthcare
  services for children and their families. They are likely to be familiar with the economic collapse in Iceland and its aftermath, including the impact on the healthcare system, and have expertise in monitoring
  and evaluating the health and well-being of the population. They may also have experience in setting up and overseeing advisory bodies and implementing policies to protect the fundamental and comprehensive
  structure of the welfare and social security system. They are highly knowledgeable about the healthcare services for children and their families, including the implications of cuts in healthcare costs,
  organisational changes, and healthcare insurance. They are also likely to be aware of the importance of monitoring and evaluating the health and well-being of the population in the context of economic
  crises.
