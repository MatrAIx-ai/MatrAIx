    ''Digital transformation and process automation'', ''Tech‑infused art curation'', ''Public speaking and conference facilitation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting and mixed‑media art'', ''Hiking and nature photography'', ''Gardening native Georgia plants'', ''Cooking Southern cuisine with
    fusion elements'', ''Volunteering for digital‑literacy workshops'', ''Attending tech meetups and hackathons'', ''Enjoying music festivals and informal piano playing'', ''Reading science‑fiction and
    speculative non‑fiction'', ''Traveling to historic Southern towns and European destinations'']'
  career_goals: Kathleen aims to spearhead a regional digital‑transformation initiative that modernizes government services and nonprofit operations across North Georgia. She aspires to become a Chief Information
    Officer for a mid‑size organization in the Southeast, where she can shape technology strategy at the executive level. Passionate about community, she plans to launch a hybrid tech‑and‑arts hub in Whitfield
    County that offers workshops, exhibition space, and mentorship programs for underrepresented groups. She also intends to earn CISSP and PMP certifications, publish a guide on integrating creativity
    into IT leadership, and become a recognized speaker advocating sustainable, inclusive technology practices.
