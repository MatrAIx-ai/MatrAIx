  career_goals: Guided by her love for structure and her natural confidence in front of peers, Sino dreams of becoming a kindergarten teacher who can design orderly, fun learning environments and guide
    children through daily routines. She also imagines herself as a veterinarian, caring for animals with compassion while using her organized approach to keep records. Occasionally, she pretends to be
    a TV host or storyteller, enjoying the spotlight and sharing stories with friends. These aspirations reflect her desire to help others, lead groups, and maintain a clear, supportive setting.
