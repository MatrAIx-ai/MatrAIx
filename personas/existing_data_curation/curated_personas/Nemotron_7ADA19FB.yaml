personas:
  professional: Sino Do, a six‑year‑old with a pronounced love for building and organizing, treats LEGO and DUPLO play like a junior architect, sketching designs before constructing intricate structures
    and eagerly sharing the results with classmates.
  sports: Sino Do, a six‑year‑old who thrives on organized playground games, eagerly participates in weekly swim lessons, supports the local minor‑league baseball team the Riverside Rattlers, and attends
    after‑school soccer practice with the community Tigers Club, balancing energetic play with a disciplined approach taught by the swim instructor.
  arts: Sino Do, a six‑year‑old artistic enthusiast, delights in coloring mandala sheets while humming classic children’s songs by 'The Wiggles' and 'Raffi', admires the bright colors of Henri Matisse’s
    cut‑outs, and eagerly watches animated films starring the voice of Tom Hanks, letting these influences shape their own vivid drawings.
  travel: Sino Do, a six‑year‑old adventure seeker, loves weekend trips to the nearby botanical garden and the family’s annual beach vacation in Santa Monica, dreams of exploring the giant panda exhibit
    at the national zoo, and prefers short, well‑planned outings that fit the family’s modest travel budget.
  culinary: Sino Do, a six‑year‑old budding baker, enjoys mixing flour, butter, and chocolate chips to make simple cookies, prefers bright foods like carrot sticks and strawberry yogurt, and shows a particular
    fondness for macaroni‑cheese, often demanding extra cheese grated freshly at the table.
  core: Sino Do, a six‑year‑old with a structured mind and boundless sociability, balances meticulous LEGO building with spontaneous song bursts, saves pennies dutifully yet sometimes hoards shiny stickers,
    and navigates daily routines with an easy‑going confidence that occasionally turns into a chatty, attention‑seeking whirlwind.
background:
  cultural: Sino comes from an East Asian (Chinese-American) family that blends traditional Chinese customs with Southern California life. At home, Mandarin is spoken alongside English, and meals often
    feature dumplings, stir-fried vegetables, and rice, reflecting her heritage. Her parents emphasize education, routine, and respect for elders, values that align with her preference for structure. The
    family celebrates Lunar New Year, the Mid-Autumn Festival, and enjoys cultural activities at the local Chinese community center, where Sino participates in lantern crafts and dragon dances. Living in
    Chino Hills, she also experiences the multicultural environment of the Greater Los Angeles area, attending a diverse preschool that encourages both cultural pride and broader community engagement.
