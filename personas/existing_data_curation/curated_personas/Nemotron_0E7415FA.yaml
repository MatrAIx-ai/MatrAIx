  career_goals: Stephenie aims to transition from a senior designer role to leading a boutique design consultancy that focuses on sustainable product innovation and immersive digital experiences. She is
    driven to win regional and national design competitions, secure patents for novel design solutions, and mentor emerging designers, especially women in tech and design fields. Over the next five years,
    she plans to expand her portfolio into augmented and virtual reality interfaces, collaborate with local manufacturers to bring eco‑friendly products to market, and author a practical guide on integrating
    STEM principles into creative practice. While she values professional achievement, she also seeks a balanced work‑life rhythm that supports her family and community involvement.
