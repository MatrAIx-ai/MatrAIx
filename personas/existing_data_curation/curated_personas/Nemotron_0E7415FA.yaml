personas:
  professional: Stephenie Sharma is a senior multidisciplinary designer whose mastery of UI/UX, product development, and sustainable material prototyping is infused with her habit of sketching in watercolor
    and macro‑photographing textures, yielding data‑driven design solutions that are both aesthetically refined and environmentally conscious.
  sports: Stephenie Sharma stays active by hiking the Blue Ridge trails each weekend, playing competitive doubles tennis at the local country club’s league, and cheering on the Atlanta Braves and Charlotte
    Hornets, while adhering to a disciplined routine of morning stretching and occasional yoga to counterbalance the desk‑bound design work.
  arts: Stephenie Sharma channels her artistic curiosity into watercolor landscapes inspired by Ansel Adams’ black‑and‑white photography, collects prints by Georgia O’Keeffe, and listens to the sitar virtuosity
    of a celebrated maestro while sketching architectural details, allowing cross‑cultural aesthetics to inform her design ethos.
  travel: Stephenie Sharma plans her travel with a blend of purposeful exploration and relaxed retreats, regularly photographing the misty Asheville fall foliage, has ventured to Jaipur during Diwali to
    experience vibrant lantern festivals, and dreams of a future solo trek through the Scottish Highlands, all while balancing a modest travel budget that prioritizes authentic cultural immersion over luxury.
  culinary: Stephenie Sharma experiments in the kitchen by perfecting shrimp‑and‑grits with a dash of smoked paprika, crafting buttery paneer tikka with cumin and garam masala, and often combining regional
    Southern pecan pie with a drizzle of rose‑scented cardamom syrup, showcasing her skillful balance of comfort food and sub‑continental spice palettes.
  core: Stephenie Sharma blends Southern hospitality with subcontinental spice, a methodical design mind with a love of solitary sketching, and a cautious financial eye with a competitive spirit, all while
    navigating mild health concerns and a penchant for weekend mountain hikes.
background:
  cultural: Stephenie grew up in the American South, absorbing the region’s emphasis on community, hospitality, and a strong work ethic. As a white American, her early cultural experiences include Southern
    traditions such as church gatherings, local festivals, and a deep appreciation for regional cuisine. Upon marrying her partner, who is of Indian heritage, she embraced elements of Indian culture—occasionally
    celebrating festivals like Diwali, incorporating aromatic spices into her cooking, and engaging in cross‑cultural family dialogues. This blend of Southern roots and Indian influences enriches her worldview,
    fostering an openness to diverse artistic expressions while maintaining a grounded, methodical approach to life and work.
