  career_goals: Colin dreams of exploring the stars as an astronaut or designing spacecraft as an aerospace engineer, combining his love for science with his artistic imagination to create beautiful, functional
    designs. He also hopes to share his passion for learning by becoming a teacher or mentor for younger students, leading school clubs and community projects. In the short term, he aims to win a school
    science fair, lead his soccer team as captain, and continue developing his art portfolio.
