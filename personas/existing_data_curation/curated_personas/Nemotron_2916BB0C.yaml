personas:
  professional: An aspiring junior game developer, Colin Morris blends their curious mindset and methodical planning into crafting vibrant Scratch animations, they channel their outgoing nature into collaborative
    LEGO builds and school drama productions.
  sports: An energetic soccer enthusiast, Colin Morris plays midfield for the local youth soccer league after school, they cheer for the professional team Manchester United on weekends, practice drills
    with the community center’s indoor futsal club during winter, and dabble in weekend swimming at the municipal pool to stay fit.
  arts: A creative visual storyteller, Colin Morris fills sketchbooks with vibrant watercolors inspired by Van Gogh and Studio Ghibli, they build intricate LEGO dioramas as three‑dimensional art, perform
    in school drama club scenes while humming to Imagine Dragons and Taylor Swift tracks, and spend Saturday afternoons re‑watching classic animated films for inspiration.
  travel: An adventurous weekend explorer, Colin Morris loves mapping out trips to nearby state parks like Shenandoah National Park, they have already visited the interactive science museum in Washington,
    D.C., and dream of seeing the cherry blossoms in Kyoto and the Eiffel Tower in Paris, always packing a small pocket notebook to jot down rocks, leaves, and doodles from each journey.
  culinary: A budding home‑chef, Colin Morris enjoys crafting pepperoni pizza with extra mozzarella, they mix homemade guacamole with fresh lime and cilantro for snack time, experiment with easy spaghetti
    carbonara using pancetta and parmesan, and relish indulging in apple slices dipped in caramel after a long LEGO session.
  core: A curious, organized, and social nine‑year‑old, Colin Morris balances meticulous allowance tracking with spontaneous LEGO marathons, they thrive on creative projects while occasionally forgetting
    to finish bedtime chores.
background:
  cultural: Colin was born and raised in Grand Prairie, Texas, in a middle‑class white family. His upbringing reflects the suburban Texan culture of community involvement, school spirit, and a love for
    outdoor activities. Family traditions include holiday celebrations such as Thanksgiving and Fourth of July barbecues, and he often attends local community events like county fairs and youth sports leagues.
    The region’s emphasis on friendliness and teamwork influences his sociable and cooperative nature, while the diverse school environment has exposed him to a variety of cultural perspectives.
