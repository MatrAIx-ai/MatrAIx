persona_description: Julie Boergers, a psychologist and sleep expert from the Bradley Hasbro Children's Research Center, who recently led a study linking later school start times to improved sleep and mood
  in teens. She is an associate professor at The Warren Alpert Medical School of Brown University, Department of Psychiatry and Human Behavior, and the pediatric sleep disorders clinic at Hasbro Children's
  Hospital. Her research interests include the impact of psychological factors on the growth and development of children and their families, and the development of effective therapies for mental health
  conditions.
