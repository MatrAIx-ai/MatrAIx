personas:
  professional: Hilda Diago is a bilingual nursing assistant in Detroit who combines meticulous vital-sign monitoring and compassionate listening with a spontaneous, curiosity-driven approach to patient
    care, often improvising practical solutions while they struggle to keep paperwork deadlines organized.
  sports: Hilda Diago is a devoted Detroit Lions fan who meets daily at the Riverwalk for walks, attends community salsa-dance classes for cardio, and practices yoga in a senior group at a local gym, while
    they also cheer on the Detroit Tigers during baseball season and occasionally join a neighborhood softball league.
  arts: Hilda Diago immerses themselves in Latin jazz, regularly listening to Celia Cruz, Tito Puente, and Ruben Blades while dancing salsa at community events and singing in a church choir that fuses spiritual
    hymns with Caribbean rhythms, and they find personal inspiration in the storytelling of author Brene Brown.
  travel: Hilda Diago prefers culturally immersive trips, having explored the historic streets of a Caribbean capital and the bustling markets of Cartagena, while they dream of strolling through Barcelona's
    architecture and trekking Costa Rica's cloud forests, often planning journeys around long weekends to minimize disruption to work.
  culinary: Hilda Diago passionately cooks heritage island dishes such as arroz con gandules and pasteles, mastering the use of sofrito, recaito, and plantain dough, while they pair their meals with adobo-marinated
    chicken and savor fresh cilantro and lime, even if they occasionally over-season in moments of stress.
  core: Hilda Diago is a caring, spontaneously curious 40-year-old who blends heartfelt community service with vibrant cultural traditions, yet they wrestle with anxiety and a penchant for last-minute organization.
background:
  cultural: Hilda is a first‑generation Puerto Rican American. She grew up in a bilingual household where Spanish was spoken alongside English, and family gatherings often centered around music, dance,
    and shared meals. Her cultural identity emphasizes strong familial ties, communal support, and a love for vibrant celebrations like La Noche de San Juan. Living in Detroit, she stays connected to the
    island’s diaspora through local cultural festivals, the Puerto Rican community center, and by maintaining traditional culinary practices. Her heritage informs her compassionate approach to care, her
    preference for bilingual communication, and her commitment to supporting other Latino residents in navigating the health‑care system.
attributes:
  skills: '["Patient care and assistance with activities of daily living","Vital signs measurement and basic health assessments","Basic wound care and infection control","Bilingual communication (English
    and Spanish)","Compassionate patient interaction and emotional support","Electronic medical record documentation","Flexibility and adaptability in clinical settings","Knowledge of community health resources"]'
  hobbies: '["Cooking traditional Puerto Rican meals","Salsa dancing and Latin jazz listening","Walking along the Detroit Riverwalk","Balcony herb gardening","Reading psychology and self‑help books","Mindfulness
    meditation and journaling","Volunteering at community health fairs","Singing in a church choir"]'
  career_goals: Hilda aspires to earn a Certified Nursing Assistant (CNA) credential and eventually pursue an associate degree in nursing to become a Licensed Practical Nurse. She is especially interested
    in geriatric and mental‑health care, aiming to specialize in providing culturally sensitive support for older Spanish‑speaking patients. Long‑term, she hopes to lead a patient‑advocacy program that
    educates and empowers the Puerto Rican community in Detroit about preventive health. To achieve these goals, she plans to enroll in flexible, online courses that fit her work schedule while also developing
    stronger organizational habits to reduce stress and improve her emotional well‑being.
