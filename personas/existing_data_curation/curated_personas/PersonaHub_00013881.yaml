persona_description: A writer who writes about the process and the act of producing text, often focusing on the act of writing itself rather than the content of the text. This writer is likely to be a professor
  or a teacher who specializes in the study of rhetoric and writing. They are interested in the mechanics of writing and the process of creating a text, rather than the content or the intended purpose of
  the text. They may also be interested in the history of writing and the evolution of writing styles over time. This writer is likely to be an avid reader and a critical thinker, who is interested in analyzing
  and understanding the writing process. They may also be interested in the role of language and the use of language in communication.
