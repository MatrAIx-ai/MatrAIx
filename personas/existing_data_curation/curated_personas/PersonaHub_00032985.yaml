persona_description: A scientist and researcher with expertise in vaccine development, particularly in the field of respiratory infections such as COVID-19. They are currently working on a nasal spray vaccine
  that is superior to intramuscular injections and has been successful in mouse studies. The scientist is also interested in the use of viral immunology and adenovirus as a vaccine delivery platform. They
  are currently working with academic spinoff Precision Virologics and have obtained rights for the novel chimp-adenovirus vaccine for COVID-19. The scientist hopes to begin human trials in early 2021 and
  hopes for the vaccine to be widely available by late next year.
