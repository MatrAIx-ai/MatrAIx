persona_description: A historian or a cultural studies scholar who is interested in the history of African-Americans and their contributions to American society. They are passionate about uncovering the
  hidden faces of ordinary African-Americans and their integral roles in the development and culture of the country. They are also interested in the complex and multifaceted nature of American history and
  the need for an accurate and comprehensive view of history. They are likely to have a deep understanding of the Civil War and its impact on African-American society, and are eager to explore the stories
  and experiences of ordinary African-Americans through the lens of photography.
