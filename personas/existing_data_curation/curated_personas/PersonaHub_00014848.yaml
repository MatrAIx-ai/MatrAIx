persona_description: A company that specializes in water recycling systems, particularly for vehicle wash facilities. They provide national service in case of breakdowns and offer low-maintenance systems
  that comply with environmental agency requirements. They offer twenty and thirty litres per minute capacities for water recycling, and their sub-categories relate to different options for water capture,
  discharge, and water reclaim, all of which are dependent on the site, conditions, and availability of a foul connection. They offer advice based on E.A. guidelines for the discharge of contaminated water,
  particularly for vehicle wash facilities, and they provide a sketch or outline plan of the site to quote for their water recycling systems.
