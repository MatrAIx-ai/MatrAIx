personas:
  professional: Katherine Lathan is a seasoned restaurant manager with over three decades of hands‑on experience, who balances meticulous budget oversight with a relaxed, improvisational leadership style,
    mentoring staff while curating dining spaces that showcase local art and community gatherings, and they thrive on turning operational challenges into creative opportunities.
  sports: Katherine Lathan is a dedicated member of the Kokomo Trail Walkers, where they enjoy weekly sunrise walks along Wildcat Creek, occasional gentle yoga sessions, and cheer for the Indianapolis Colts
    and Indiana Pacers from the comfort of their backyard, favoring low‑key, routine activity over high‑intensity training.
  arts: Katherine Lathan frequents Kokomo’s intimate galleries, where they admire works by regional painter Emma Babcock and reproductions of Jacob Lawrence’s modernist canvases, and they unwind at neighborhood
    cafés listening to acoustic renditions of Nina Simone’s timeless songs, letting visual and musical art inspire their own culinary experiments.
  travel: Katherine Lathan prefers low‑key, solo or small‑group trips that blend cultural immersion with culinary exploration, having already toured Savannah’s historic squares and the gardens of Versailles,
    and now dreaming of a week‑long culinary pilgrimage to New Orleans and a relaxed weekend in Tuscany, where they plan itineraries loosely to allow spontaneous market visits and cooking class drop‑ins.
  culinary: Katherine Lathan is a culinary storyteller who expertly prepares soul‑food staples such as simmered collard greens and smoked turkey, then reinvents them with global twists like quinoa‑infused
    cornbread, miso‑glazed sweet potatoes, and a fragrant herb blend of basil, thyme, and cilantro harvested from their garden, though they sometimes over‑salt a gumbo when caught up in a new recipe.
  core: Katherine Lathan blends Southern kitchen warmth with a curiosity for global flavors, steering her life with relaxed flexibility, a penchant for community art, and a habit of misplacing the grocery
    list.
background:
  cultural: Katherine was raised in a tight‑knit African‑American family that migrated from the South during the Great Migration, settling first in Indianapolis before moving to Kokomo. Her mother was a
    church pianist and her father a skilled mechanic, both of whom instilled a strong work ethic and a love for soulful music and communal meals. The family’s kitchen was a hub for Sunday gatherings where
    traditional Southern dishes were shared, shaping Katherine’s deep appreciation for food as cultural expression. She remains active in the local Black community, attending Juneteenth celebrations, supporting
    Black‑owned businesses, and contributing to the Kokomo African American Museum’s programming. Her widowed status has reinforced her resilience and commitment to preserving her heritage through mentorship
    and culinary storytelling.
attributes:
