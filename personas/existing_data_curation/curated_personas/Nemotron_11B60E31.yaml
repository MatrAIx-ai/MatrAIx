  hobbies: '["Visiting Local Art Galleries & Museums", "Herb Gardening", "Experimental Home Cooking", "Reading Historical Biographies", "Attending Small Acoustic Concerts", "Community Volunteer Work at
    the Senior Center", "Walking Nature Trails", "Quilting and Textile Arts", "Participating in Cooking Workshops", "Studying Art History"]'
  career_goals: Katherine aims to transition from managing existing establishments to launching her own community‑focused café that doubles as a gallery for emerging local artists. She envisions a menu
    that honors her African‑American culinary roots while integrating nutritious, globally inspired dishes. Long‑term, she hopes to create a mentorship program for young food‑service professionals, especially
    women of color, and to obtain certification in sustainable hospitality practices. She also aspires to serve as a regional consultant, helping other Midwest establishments weave cultural expression into
    their service models.
