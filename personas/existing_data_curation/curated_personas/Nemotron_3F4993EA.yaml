    facilitation'']'
  hobbies: '[''Hiking the Wasatch trails'', ''Volunteer tutoring and community service'', ''Singing in a community choir'', ''Participating in local theater productions'', ''Reading contemporary fiction
    and education literature'', ''Cooking and experimenting with healthy recipes'', ''Maintaining a vegetable garden'', ''Playing intramural volleyball'', ''Attending ed‑tech workshops'']'
  career_goals: Kathryn aims to deepen her expertise by pursuing a master’s degree in Curriculum and Instruction within the next three years, with a focus on integrating technology and SEL into core subjects.
    She aspires to become a lead teacher and mentor for new educators in her district, eventually moving into a curriculum coordinator role where she can design district‑wide interdisciplinary programs.
    Long‑term, she envisions taking on school leadership as an assistant principal, championing community partnerships, and developing outreach initiatives that support early literacy and family engagement
    across Juab County.
