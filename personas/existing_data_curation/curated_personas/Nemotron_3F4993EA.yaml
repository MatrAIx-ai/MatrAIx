personas:
  professional: Kathryn Unal, a 20‑year‑old newly certified elementary and middle school teacher, merges evidence‑based instructional strategies with project‑based technology integration, using their sociable,
    organized, and emotionally stable demeanor to design inclusive, engaging lessons and nurture community partnerships, and they thrive on collaborative planning with fellow teachers.
  sports: Kathryn Unal hikes the Wasatch foothills year‑round, competes in the Juab County intramural volleyball team “Mountain Spikers,” and cheers for the Utah Jazz and Real Salt Lake, blending regular
    outdoor activity with local sports fandom, and they view fitness as a communal ritual.
  arts: Kathryn Unal sings in a community choir, performs in small‑town productions of classics like ‘Our Town,’ and draws creative energy from listening to folk‑rock artists such as The Lumineers, Molly
    Tuttle, and Phoebe Bridgers, and they often use songs as a bridge to connect students to cultural history.
  travel: Kathryn Unal prefers budget‑friendly road trips that mix adventure and relaxation, having driven to Yellowstone and the Grand Canyon, while dreaming of trekking New Zealand’s South Island and
    strolling the historic lanes of Edinburgh on a future spring break, and they carefully map itineraries to balance cost and experience.
  culinary: Kathryn Unal prepares healthy dishes like quinoa‑crusted salmon, roasted vegetable medleys, and kale‑chickpea salads, often using fresh tomatoes and basil from her backyard garden and experimenting
    with turmeric, pomegranate, and other vibrant ingredients, and they love sharing meals with neighbors at potluck gatherings.
  core: Kathryn Unal blends community‑driven service with tech‑savvy teaching, balances meticulous lesson planning with spontaneous volunteer bursts, and they habitually forget to water their garden until
    the last minute.
background:
  cultural: Kathryn was raised in Eureka, a small, predominantly White town in rural Utah. Her upbringing emphasized close‑knit community values, self‑reliance, and a strong sense of service, often expressed
    through church activities, local fairs, and volunteer projects. Family gatherings and church events fostered her sociable nature and commitment to community involvement. The Intermountain West setting
    instilled an appreciation for outdoor recreation and environmental stewardship, while the local emphasis on education and family support shaped her dedication to teaching and lifelong learning.
attributes:
  skills: '[''Classroom management'', ''Lesson planning aligned with state standards'', ''Differentiated instruction'', ''Project‑based learning design'', ''Educational technology integration (Google Workspace,
