  career_goals: Angel aims to graduate high school with top grades in STEM subjects and earn a scholarship to a state university’s engineering program. She hopes to specialize in civil or mechanical engineering,
    focusing on sustainable infrastructure projects that benefit her Midwestern community. In the short term, she plans to compete in regional robotics competitions and secure a summer internship at a local
    engineering firm. Long-term, she envisions becoming a project manager overseeing large-scale construction or transportation initiatives, and possibly pursuing a graduate degree to deepen her expertise.
    She values clear career pathways, structured work environments, and the ability to see tangible results from her efforts.
