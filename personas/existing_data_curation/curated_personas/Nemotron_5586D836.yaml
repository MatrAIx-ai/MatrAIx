personas:
  professional: Angel Wells is an aspiring young engineer who spends weekends constructing LEGO Architecture models and programming a DIY robotics kit, channeling their methodical nature into hands‑on projects,
    and they apply the same structured planning to school assignments and strategic video games like Civilization.
  sports: Angel Wells actively competes on the school track and field team, specializing in the 400‑meter dash and long jump, volunteers as a timekeeper for local youth soccer matches, cheers for the Los
    Angeles Lakers and the New England Patriots, and they treat each training session as a strategic challenge similar to a game of chess.
  arts: Angel Wells immerses in pop and indie music, playlisting artists like Billie Eilish, Tame Impala, and Lorde while building intricate LEGO recreations of famous landmarks, avidly reads mystery novels
    such as The Westing Game, solves Sudoku and crossword puzzles for mental stimulation, and they channel creative expression into illustrated journal entries.
  travel: Angel Wells prefers meticulously planned weekend trips to nearby national parks like Yosemite for hiking, dreams of a future visit to Tokyo’s robotics exhibitions and the Louvre in Paris for art
    inspiration, balances a love of adventure with budget constraints by using student discounts, and they often map itineraries months ahead while leaving a small buffer for spontaneous detours.
  culinary: Angel Wells enjoys a balanced diet that includes pepperoni pizza, homemade sushi rolls with avocado and cucumber, and spicy chicken tacos, demonstrates beginner‑level cooking skills by mastering
    spaghetti carbonara and stir‑fried rice, and they favor fresh ingredients like cherry tomatoes and basil when experimenting in the kitchen.
  core: Angel Wells is a methodical 14‑year‑old who blends structured creativity, competitive sports, and disciplined budgeting, often over‑planning schedules and occasionally sacrificing sleep for LEGO
    builds and puzzle marathons.
background:
  cultural: Angel was raised in Saint Peters, Missouri, a suburban Midwestern community with a predominantly white, middle-class population. Her family places a strong emphasis on education, punctuality,
    and community involvement. She attends a local public middle school where participation in extracurriculars like robotics and sports is encouraged. Seasonal traditions such as Thanksgiving, Fourth of
    July fireworks, and Christmas festivities are central to her family life, as are local events like the St. Charles County fair and youth group activities through her church. The regional culture values
    modesty, hard work, and a collaborative spirit, which shapes Angel’s practical outlook while still allowing space for her competitive nature.
