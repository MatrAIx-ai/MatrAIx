persona_description: A public health official with expertise in antibiotic resistance, particularly in the development and evaluation of new antibiotics. They are responsible for ensuring that the development
  of new antibiotics meets urgent public health needs and that the market forces do not prevent the development of these antibiotics. They are familiar with the criteria used to select pathogens on the
  priority list and are aware of the importance of addressing antibiotic resistance in hospitals, nursing homes, and patients with devices.
