  hobbies: '[''Gardening'', ''Birdwatching'', ''Model train building'', ''Reading historical non-fiction'', ''Bridge (card game)'', ''Volunteering at local library'', ''Attending jazz concerts'', ''Hiking
    in Red Rock Canyon'', ''Digital photography'', ''Cooking'']'
  career_goals: Bernard aims to remain an active contributor to his community by volunteering as a mentor for at‑risk youth and helping to establish an after‑school enrichment program at the local community
    center. He hopes to write a memoir reflecting on his teaching experiences and the evolution of education over his career. He also wants to learn digital photography to document his garden and local
    wildlife, maintain his health through regular walking and gardening, and strengthen intergenerational connections by sharing his knowledge with younger neighbors.
