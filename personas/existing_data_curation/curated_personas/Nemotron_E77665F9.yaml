  career_goals: As she approaches retirement, Kathrina aims to secure a part‑time schedule that reduces physical strain while preserving her income. She hopes to qualify for a shift‑lead or trainer role
    within her current restaurant, which would allow her to share her extensive knowledge with younger staff and earn a modest wage increase. Concurrently, she is saving to purchase a modest cottage in
    a quiet area of Fayetteville and to fund her grandchildren’s educational expenses. She also expresses a wish to enroll in a basic computer literacy class so she can manage her personal finances online
    and perhaps assist neighbors with simple tech tasks.
