personas:
  professional: A seasoned fast‑food service professional, Kathrina Peck leverages three decades of kitchen, cash‑register, and crew‑training expertise to seek a part‑time shift‑lead role where they apply
    a calm, compassionate conflict‑resolution style to balance the unpredictable rush of a high‑volume restaurant while preserving a predictable routine.
  sports: A devoted fan of the Arkansas Razorbacks, Kathrina Peck watches college football every Saturday, participates in the church’s senior walking club that meets twice a week, and prefers gentle stretching
    over high‑impact workouts, reminding them to stay active despite occasional joint aches, and they often log their steps in a notebook.
  arts: An avid lover of classic soul and gospel, Kathrina Peck fills their kitchen with the sounds of Aretha Franklin, Mahalia Jackson, and Al Green while crocheting, they often hum along, enjoy weekly
    choir rehearsals, and relax by binge‑watching dramas like 'Grey's Anatomy' and 'This Is Us' on evenings off.
  travel: A nostalgic road‑tripper, Kathrina Peck has explored the historic streets of Savannah and the blue‑grass hills of Kentucky, dreams of a quiet getaway to Asheville’s mountain cabins, but they plan
    trips carefully around a fixed part‑time schedule and a modest travel fund.
  culinary: A Southern comfort cuisine specialist, Kathrina Peck masterfully prepares fried chicken, buttery biscuits, collard greens, and sweet potato casserole using garden‑fresh okra and herbs, they
    enjoy experimenting with homemade buttermilk brines, and frequently cook for family reunions, though they sometimes over‑salt dishes in pursuit of authentic flavor.
  core: Kathrina Peck is a pragmatic, garden‑loving fast‑food veteran who balances structured work habits with a tender soul for gospel music, family cooking, and quiet moments of worry‑driven caution,
    and they often hum a favorite hymn while tending to their vegetable patch.
background:
  cultural: Kathrina’s life is rooted in the African‑American community of Fayetteville, where church, family, and neighborhood ties play central roles. She grew up during the civil‑rights era, inheriting
    a strong sense of resilience and communal responsibility. Her culinary habits reflect Southern soul‑food traditions, and she maintains cultural celebrations such as Juneteenth and church holidays with
    pride. The local Black church serves as both a spiritual anchor and a social hub, offering support networks that influence her values of mutual aid, respect for elders, and the importance of sharing
    meals.
