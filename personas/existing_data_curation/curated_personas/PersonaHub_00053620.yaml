persona_description: A researcher and archaeologist who is passionate about uncovering the past through the study of shell mounds and their use by ancestral beings. She has a deep interest in the detailed
  analysis of archaeological data and the development of new theories to explain the findings. She is particularly interested in the use of shell mounds as campsites and the seasonal patterns of movement
  of people. She is an expert in shell mounds and shellfish, and is skilled in fieldwork and laboratory analysis. Her research interests also include the study of Aboriginal cultures and the impact of human
  activity on the landscape.
