  hobbies: '["Building LEGO sets", "Solving puzzles (Sudoku, crosswords)", "Playing piano", "Reading nonfiction (space, technology)", "Gardening with structured layouts", "Chess club"]'
  career_goals: Yuriko aspires to pursue a career that blends precision, structure, and measurable outcomes. She dreams of becoming a software engineer or data analyst, motivated by the idea of solving
    complex problems with clear logic. She also envisions a future in robotics engineering or scientific research, where she can apply her methodical approach and competitive drive. In the short term, she
    aims to attend a STEM‑focused middle and high school, participate in coding clubs, and win science fair awards, building a strong academic record that will pave the way for a degree in computer science
    or engineering.
