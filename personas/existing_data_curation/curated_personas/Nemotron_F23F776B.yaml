personas:
  professional: Yuriko Dasani is an aspiring junior engineer who spends weekends constructing intricate LEGO robots, applying the systematic problem‑solving skills honed through puzzles and chess, and channeling
    the disciplined practice routine from piano into meticulous design documentation.
  sports: Yuriko Dasani enjoys swimming at the Palo Alto community pool during summer, follows the San Jose Earthquakes with keen enthusiasm, and participates in a local after‑school gymnastics club that
    satisfies their love for structured routines and precise movements, though they prefer solo practice over large team games.
  arts: Yuriko Dasani immerses themselves in classical piano with a particular admiration for Lang Lang, practices calligraphy during weekend workshops, and finds inspiration in Hiroshige’s ukiyo‑e prints,
    while also devouring nonfiction space books by Carl Sagan, blending disciplined artistic expression with scientific curiosity.
  travel: Yuriko Dasani dreams of visiting the Kennedy Space Center to see launch pads up close, has already taken a family trip to Kyoto during the cherry blossom festival, and prefers meticulously planned
    itineraries that include quiet garden walks and scheduled museum visits, rather than spontaneous travel.
  culinary: Yuriko Dasani loves the comforting taste of miso soup and tuna onigiri, often helps their mother roll sushi while carefully arranging ingredients on a bamboo mat, and takes pride in baking matcha‑flavored
    cupcakes, though they sometimes burn the edges when they rush the oven.
  core: Yuriko Dasani is a methodical nine‑year‑old whose love for routine, precision, and quiet mastery drives their pursuits in puzzles, piano, and meticulous planning, even as they wrestle with occasional
    worry and a penchant for perfection.
background:
  cultural: Yuriko comes from a Japanese‑American family that maintains many traditional customs, such as celebrating Obon, Japanese New Year, and seasonal festivals while also embracing typical American
    holidays. Japanese is spoken at home, and she participates in cultural activities like calligraphy and tea ceremony workshops offered by a local community center. Living in Palo Alto, she is exposed
    to a diverse, tech‑oriented environment, which blends her family's emphasis on disciplined education with the innovative spirit of Silicon Valley.
attributes:
  skills: '["Basic arithmetic", "Reading comprehension", "Elementary science experiments", "Organizing school projects", "Scratch programming", "English fluency", "Conversational Japanese", "Time management",
