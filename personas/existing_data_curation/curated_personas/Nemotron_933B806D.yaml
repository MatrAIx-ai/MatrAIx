personas:
  professional: Mai Liu, a senior wildlife caretaker with fifteen years of hands‑on experience, leverages her meticulous record‑keeping, strict protocol enforcement, and bilingual fluency to lead volunteer
    training and design regulatory‑compliant care plans, channeling her competitive drive for excellence into a structured, results‑oriented sanctuary operation.
  sports: Mai Liu, an avid moderate‑trail hiker, follows meticulously mapped routes in the foothills, tracks elevation gain with a smartwatch, and roots for the Denver Broncos and Colorado Avalanche, while
    occasionally participating in a local weekend running club that values punctuality and personal bests.
  arts: Mai Liu, a dedicated calligrapher and wildlife photographer, practices brushstroke meditation inspired by Wang Xizhi, curates black‑and‑white prints reminiscent of Ansel Adams, and collects vintage
    bird illustration books that inform both her artistic eye and animal‑care expertise.
  travel: Mai Liu, a methodical traveler, crafts detailed itineraries for trips to Rocky Mountain National Park, Yellowstone, and occasional research expeditions to Taiwan’s mountainous reserves, balancing
    adventure with budget constraints by booking early and favoring small‑group guided tours over spontaneous journeys.
  culinary: Mai Liu, a meticulous home chef, follows precise recipes to perfect dishes like mapo tofu, handmade dumplings, and aromatic ginger‑scallion fish, regularly incorporating fresh herbs such as
    cilantro and mint from her native‑plant garden, while timing each step with the same disciplined precision she applies to animal‑care protocols.
  core: Mai Liu blends a fiercely organized, competitive streak with solitary hobbies—hiking, calligraphy, and precise cooking—while her slight coffee‑dependency and occasional reluctance to delegate reveal
    a self‑reliant yet quietly skeptical soul.
background:
  cultural: Mai was raised in a bilingual household by Chinese immigrant parents, where Confucian values of diligence, respect for hierarchy, and communal responsibility were emphasized. She celebrates
    Lunar New Year and other cultural festivals with her family, preserving traditional culinary practices and language use at home. Living in Denver for over two decades, she has blended these cultural
    foundations with a deep appreciation for Colorado's outdoor lifestyle and environmental values, actively participating in local conservation initiatives while maintaining strong ties to the Asian community
    through language exchange groups and cultural events.
attributes:
  skills: '[''Animal husbandry'', ''Wildlife rehabilitation'', ''Health monitoring and disease prevention'', ''Nutrition formulation for captive and rescued animals'', ''Standard operating procedure development'',
    ''Regulatory compliance (USDA, Colorado)'', ''Volunteer recruitment and training'', ''Educational program design'', ''Precise record-keeping and data management'', ''Bilingual communication (Mandarin/English)'']'
  hobbies: '[''Native plant gardening'', ''Moderate‑intensity hiking'', ''Birdwatching'', ''Reading ethology journals'', ''Wildlife photography'', ''Calligraphy'', ''Cooking traditional Chinese cuisine'']'
  career_goals: Mai aspires to move into a senior leadership role overseeing a regional wildlife rehabilitation network in the Rocky Mountain area. She plans to obtain Certified Wildlife Rehabilitator credentials,
    expand the sanctuary's capacity to handle larger numbers of rescue cases, and integrate a formal educational curriculum that partners with local schools and community groups. Her long‑term ambition
    is to establish a self‑sustaining sanctuary that serves as both a high‑standard animal‑care facility and a learning hub for environmental stewardship, positioning Denver as a model for urban wildlife
    conservation.
