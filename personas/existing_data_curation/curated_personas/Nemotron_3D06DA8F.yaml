  hobbies: '[''Woodworking'', ''Classic car restoration'', ''Fishing'', ''DIY home projects'', ''Reading technical magazines'', ''Listening to engineering podcasts'', ''Coaching Little League'', ''Volunteer
    work at food bank'', ''Attending high school football games'']'
  career_goals: Elio aims to move from the production line to a supervisory role within the next three years. He plans to complete an Associate’s degree in Industrial Technology at a community college and
    earn a Six Sigma Green Belt to bolster his credentials. Short‑term, he wants to become a shift lead, overseeing a small team while maintaining his hands‑on involvement with equipment. Long‑term, he
    envisions a plant‑manager position or even launching a small custom‑fabrication shop that would let him blend his mechanical expertise with the entrepreneurial ideas he’s been exploring. All of this
    is balanced with his desire to provide a stable income for his family and secure college funds for his children.
