personas:
  professional: Mariela Flores blends her real‑estate licensing with a creative eye for visual storytelling, using bilingual fluency and street‑art‑inspired staging to attract diverse buyers and close deals
    faster while maintaining a balance of meticulous organization and on‑the‑fly flexibility.
  sports: Mariela Flores competes in an adult beach‑volleyball league at Dockweiler State Beach, follows the Los Angeles Lakers and Los Angeles Dodgers avidly, and dances salsa three nights a week at a
    local studio, channeling a competitive edge into both team sports and social activities.
  arts: Mariela Flores curates a weekly sketch‑journal of LA murals, drawing inspiration from street artists like Banksy, Shepard Fairey, and contemporary Mexican painter Julio Galán, while regularly attending
    openings by collectives such as Proceso at The Broad and shows at the Arts District galleries.
  travel: Mariela Flores mixes spontaneous weekend road trips with meticulous overseas planning, having recently explored Barcelona’s historic neighborhoods, Oaxaca’s culinary scene, and Berlin’s urban
    art districts, all while leveraging a points‑earning travel credit card and balancing family commitments.
  culinary: Mariela Flores enjoys a hybrid palate that oscillates between crafting guacamole‑lime chicken tacos, experimenting with Korean‑Mexican kimchi‑taco fusion, and perfecting avocado toast with smoked
    salmon, skillfully cooking quick chilaquiles for breakfast yet often seeking new Mexican‑fusion eateries in downtown LA.
  core: Mariela Flores is a fiercely competitive, art‑obsessed real‑estate broker who balances disciplined financial habits, a proactive health routine, and a lively social calendar, all while channeling
    creativity into every listing and weekend adventure.
background:
  cultural: Mariela grew up in a Mexican‑American household in the Los Angeles area, speaking Spanish at home and English at school. She celebrates traditions such as Día de los Muertos, quinceañeras, and
    other Mexican holidays while also embracing the multicultural atmosphere of Inglewood. Her bicultural upbringing provides deep cultural competency, allowing her to connect authentically with Hispanic
    clients and navigate broader American markets. She often incorporates Mexican artistic motifs and cultural references into her property presentations, and she remains actively involved in community
    events that highlight Latino heritage.
attributes:
  skills: '[''Residential sales negotiation'', ''Market analysis and property valuation'', ''Bilingual client communication (English/Spanish)'', ''Digital marketing and social media advertising'', ''Staging
