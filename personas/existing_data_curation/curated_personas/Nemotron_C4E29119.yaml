    ''Problem‑solving under pressure'']'
  hobbies: '[''Art gallery and mural tours'', ''Photography (urban and interior)'', ''Salsa dancing'', ''Beach volleyball'', ''Exploring new restaurants (Mexican fusion)'', ''Yoga'', ''Community volunteer
    work in affordable housing'', ''Karaoke nights with friends'', ''Reading behavioral economics and psychology'', ''DIY home staging projects'']'
  career_goals: Mariela aims to become one of the top‑producing brokers in Inglewood and the broader Los Angeles market within the next five years. She plans to earn advanced certifications such as Certified
    Residential Specialist (CRS) and Accredited Buyer’s Representative (ABR). Her long‑term ambition is to launch her own boutique real‑estate agency that integrates art‑focused property presentation, catering
    to culturally diverse clients. She also hopes to mentor new agents, especially those from under‑represented backgrounds, and to become a recognized voice in affordable‑housing advocacy.
