  hobbies: '[''Church choir'', ''Gardening club and county fair contests'', ''Quilting circle'', ''Book club'', ''Bingo and bridge tournaments'', ''Community volunteering (food bank, senior center)'', ''Cooking
    and baking classes'', ''Genealogy research'', ''Walking and nature trail hikes'', ''Senior fitness (water aerobics)'']'
  career_goals: Although retired from formal employment, Dana aims to deepen her impact in the community by continuing as the church treasurer and expanding the local senior garden program, aspiring to
    win the county’s "Best Community Garden" award. She hopes to complete a genealogy certificate at the nearby community college to document her family’s history and share it in a published family memoir.
    Dana also wants to mentor younger volunteers, teaching them organizational best practices and fostering intergenerational connections. Maintaining her health and independence remains a personal priority,
    so she plans to stay active through senior fitness classes and regular health screenings.
