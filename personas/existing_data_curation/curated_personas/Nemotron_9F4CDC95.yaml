personas:
  professional: Sophie Stanley, a 37‑year‑old clinical psychologist specializing in CBT, trauma‑informed care, mindfulness‑based stress reduction, and digital mental‑health tools, blends their Southern‑rooted
    sense of responsibility with a competitive drive to innovate—leveraging data‑driven treatment plans, leading group wellness workshops, and integrating emerging technologies like VR exposure therapy
    while they cautiously vet collaborators due to a lingering skeptical streak.
  sports: Sophie Stanley fuels their fitness routine by conquering the challenging trails of Stone Mountain, participating in a local running club’s seasonal 5K races, practicing weekly yoga, and cheering
    on the Atlanta Falcons, Hawks, and Braves, all while they treat salsa dancing as both a competitive sport and a social outlet.
  arts: Sophie Stanley immerses themselves in Atlanta’s cultural pulse—regularly visiting the High Museum to study works by Kehinde Wiley, attending improv workshops inspired by Tina Fey, curating book‑club
    discussions around contemporary authors like Sally Rooney and Tara Westover, and they unwind to the indie sounds of Phoebe Bridgers and Bon Iver.
  travel: Sophie Stanley prefers purposeful weekend escapes that combine adventure and mindfulness, having trekked the Blue Ridge Parkway, explored Savannah’s historic squares, and now dreaming of a solo
    retreat in Kyoto’s Zen temples, while they balance a modest travel budget with occasional spontaneous trips to New Orleans for jazz and culinary delights.
  culinary: Sophie Stanley, an enthusiastic home chef, crafts Mediterranean‑inspired quinoa bowls with roasted chickpeas, turmeric‑spiced salmon, and fresh basil, experiments with healthier twists on Southern
    staples like baked collard greens and air‑fried fried chicken, and they often host their book club over avocado toast and artisanal cheese boards.
  core: Sophie Stanley is a community‑oriented, data‑driven therapist whose Southern hospitality fuels a competitive drive to innovate mental‑health care, even as they wrestle with high‑octane anxiety and
    an occasional impulsive streak.
background:
  cultural: Sophie was raised in a middle‑class, white family in the suburbs of Atlanta, with deep Southern roots that emphasize hospitality, community, and a strong work ethic. Her ancestry is primarily
    Irish and German, and her upbringing blended traditional Southern customs—like Sunday family meals and church involvement—with the multicultural vibrancy of Atlanta’s urban environment. This background
    fostered a respect for diverse perspectives while grounding her in Southern values of perseverance, personal responsibility, and connection to family and neighbors.
