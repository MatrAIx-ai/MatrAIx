  hobbies: '["Hiking", "Salsa Dancing", "Book Club", "Community Wellness Workshops", "Healthy Cooking", "Yoga", "Mindful Meditation", "Art Museum Visits", "Improv Comedy Workshops", "Traveling", "Technology
    Meetups", "Running"]'
  career_goals: Sophie aims to become a licensed clinical supervisor and open a private practice that specializes in anxiety and trauma treatment for adults and couples in the Atlanta metro area. She aspires
    to integrate technology—such as mobile mood‑tracking apps and virtual‑reality exposure therapy—into her therapeutic repertoire, and to publish research bridging neuroscience and psychotherapy. Over
    the next five years, she plans to earn a certification in EMDR, lead community mental‑health outreach programs, and serve on a local health‑policy advisory board, positioning herself as a thought leader
    who blends scientific rigor with compassionate care.
