personas:
  professional: Justin Keith is a budding young naturalist and aspiring junior coder who weaves their curiosity for wildlife into Scratch programming projects and intricate LEGO ecosystems, balancing imaginative
    ideas with practical building methods, though they often forget to schedule their tasks.
  sports: Justin Keith enjoys weekend hikes with the local Eco‑Club, plays on the Springfield Junior Soccer team, keeps a casual eye on the New York Yankees and Golden State Warriors, and approaches fitness
    through low‑key activities such as biking on nature trails, always favoring small groups over crowded gyms.
  arts: Justin Keith channels their love for fantasy by sketching creatures inspired by J.K. Rowling and Tolkien, listens to Koji Kondo’s ambient soundtracks while building LEGO models, and follows YouTube
    creator Mumbo Jumbo for Minecraft inspiration, weaving these artistic influences into their daily play.
  travel: Justin Keith prefers spontaneous weekend trips to nearby state parks like Yellowstone and the Grand Canyon, has cherished a family vacation exploring the giant sequoias, and dreams of trekking
    through the Amazon rainforest someday, balancing a curious wanderlust with school schedules and parental guidance.
  culinary: Justin Keith favors simple comfort foods such as mac and cheese, strawberry‑banana smoothies, and honey‑glazed carrots, enjoys helping their parents stir‑fry broccoli and bell peppers for dinner,
    and occasionally tries to recreate a fresh garden salad using home‑grown lettuce, though they often neglect to clean the kitchen afterward.
  core: Justin Keith is a nature‑obsessed, low‑key LEGO architect whose boundless curiosity is tempered by a relaxed, sometimes disorganized approach that leads to forgotten homework but fuels imaginative
    ecosystem creations.
background:
  cultural: Justin comes from a middle‑class white family in Gainesville, Florida, a city known for its university influence and proximity to natural springs and wildlife reserves. His upbringing reflects
    a blend of Southern hospitality and a community emphasis on outdoor recreation. Family traditions include celebrating typical American holidays such as Thanksgiving, Christmas, and the Fourth of July,
    often with gatherings that involve shared meals and storytelling. The local culture encourages respect for the environment, which is reinforced through school programs and community events that promote
    conservation and STEM learning. This environment nurtures Justin's curiosity about nature while grounding him in practical, community‑oriented values.
