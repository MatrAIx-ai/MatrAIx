  career_goals: Justin dreams of one day becoming a wildlife biologist or environmental engineer, a career that blends his curiosity about nature with his desire to develop practical solutions for protecting
    local habitats. He is also intrigued by the idea of creating educational video games that teach science concepts, hoping to combine his love for coding and storytelling. At this stage, his ambition
    centers on learning more about Florida's ecosystems, contributing to school eco‑projects, and building the skills that will prepare him for a future in conservation or tech‑focused education.
