    visualization (Power BI, Tableau)", "Change management"]'
  hobbies: '["Seasonal gardening (vegetables and flowers)", "Waterfront walking and birdwatching", "Crossword puzzles and Sudoku", "Home‑automation hobby projects", "Reading historical fiction and nonfiction",
    "Cooking New England seafood recipes", "Volunteer teaching basic computer skills to seniors", "Participating in a bridge club", "Attending local theater performances"]'
  career_goals: While approaching traditional retirement age, Graciela aims to transition into a senior advisory role where she can leverage her decades of experience to guide small‑to‑mid‑size businesses
    in New Bedford and the surrounding region. She seeks to obtain a PMP certification to formalize her project leadership credentials, mentor the next generation of analysts, and eventually establish a
    part‑time consultancy focused on process optimization and legacy system modernization. Community involvement remains a priority, and she hopes to volunteer her expertise to local non‑profits and senior
    centers.
