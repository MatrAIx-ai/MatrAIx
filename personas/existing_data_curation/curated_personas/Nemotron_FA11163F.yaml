personas:
  professional: Graciela Hickey, a seasoned computer systems analyst, leverages a methodical, deadline‑driven approach to dissect complex business problems, craft clear technical requirements, and deliver
    reliable hybrid‑agile solutions while assertively mentoring junior staff and championing process improvement.
  sports: Graciela Hickey starts each day with a brisk walk along the New Bedford waterfront, supports the Boston Red Sox and New England Patriots, participates in a senior sailing club during summer, and
    attends snowshoeing outings in winter, though occasional knee discomfort sometimes curtails her activity.
  arts: Graciela Hickey immerses herself in historical fiction by Hilary Mantel and Ken Follett, attends performances at the New Bedford Whaling Museum’s theater, enjoys John Coltrane’s jazz recordings,
    and regularly plays bridge, finding creative balance between analytical work and artistic appreciation.
  travel: Graciela Hickey prefers meticulously planned trips, has explored Boston’s Freedom Trail, sailed to Martha’s Vineyard, ventured to London’s historic districts, and dreams of a culinary pilgrimage
    through Tuscany’s vineyards while balancing retirement’s budget constraints.
  culinary: Graciela Hickey expertly prepares New England clam chowder, lobster rolls, and baked cod with lemon‑thyme butter, often using fresh herbs from her garden and seasonal oysters, and delights in
    pickling garden vegetables for winter soups.
  core: Graciela Hickey blends disciplined analytical rigor with a love for garden‑fresh seafood, structured travel, and a modest tech gadget obsession that occasionally distracts her from exercise.
background:
  cultural: Graciela hails from a middle‑class New England family with deep roots in the maritime and industrial heritage of coastal Massachusetts. Raised with values of hard work, modesty, and community
    service, she embodies the practical, self‑reliant ethos characteristic of the region. She participates in local traditions such as the New Bedford Whaling Festival, cherishes seasonal seafood cuisine,
    and maintains strong ties to neighborhood volunteer networks. Her cultural outlook blends respect for tradition with an adaptable, forward‑looking mindset shaped by decades of living in a historically
    diverse, yet predominantly white, New Bedford community.
attributes:
  skills: '["Systems analysis and design", "Requirements gathering", "Business process modeling", "Data analysis and reporting", "SQL database management", "Python programming", "Project management (waterfall
