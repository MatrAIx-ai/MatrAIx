personas:
  professional: Milagros Vargas is a budding junior LEGO architect who applies methodical building skills, organized planning, and sociable teamwork to classroom projects, often leading group activities
    with the same structured energy they show on the playground.
  sports: Milagros Vargas plays for the FC Dallas Academy Girls U8 team, enthusiastically practices soccer drills after school, joins playground tag games with boundless energy, and cheers on the Dallas
    Cowboys during family game nights, combining structured practice with spontaneous play.
  arts: Milagros Vargas delights in dancing to lively folk tunes by Lila Downs, creating colorful papel picado for holidays, and getting lost in picture books such as Where the Wild Things Are, shaping
    a creative identity that blends movement, storytelling, and cultural art.
  travel: Milagros Vargas loves planning weekend outings with crayons, eagerly anticipates family trips to the Dallas Arboretum’s blossom garden and the vibrant San Antonio River Walk, and dreams of someday
    visiting Mexico City to see the historic Zócalo, balancing a modest family budget with big imagination.
  culinary: Milagros Vargas enjoys mashing ripe avocados with lime juice and cilantro to make fresh guacamole, helping roll homemade corn tortillas with masa dough, and assembling cheesy quesadillas topped
    with salsa roja, showcasing a budding kitchen confidence centered on bold, fresh flavors.
  core: Milagros Vargas is a meticulously organized seven‑year‑old who channels boundless energy into soccer, LEGO building, and festive dancing, yet sometimes forgets to finish brushing their teeth after
    a candy binge.
background:
  cultural: Milagros comes from a Mexican‑American family that embraces bilingual and bicultural traditions. At home she speaks Spanish, while at school she uses English, allowing her to navigate both cultures
    fluidly. Her family celebrates holidays such as Día de los Muertos, Cinco de Mayo, and Christmas with a blend of Mexican customs and Texan influences, including preparing tamales, pozole, and sharing
    música ranchera. Community events at the local Mexican cultural center in Dallas provide her with a strong sense of belonging and pride in her heritage, while also exposing her to the diverse multicultural
    environment of Dallas County.
