  career_goals: Milagros envisions a future where she helps children learn in structured, engaging environments, so she dreams of becoming a teacher. She is also fascinated by animals and imagines a career
    as a veterinarian, combining her caring nature with her methodical approach. Additionally, she hopes to volunteer at community centers in Dallas, organizing events that celebrate Mexican heritage and
    foster friendship among neighborhood kids.
