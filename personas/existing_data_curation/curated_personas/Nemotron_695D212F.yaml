personas:
  professional: Elliot Coker, a seasoned community handyman and volunteer coordinator, blends meticulous hands-on repair skills with an easygoing, people-first attitude to keep the local church, fairgrounds,
    and neighbors' homes humming, turning every maintenance task into an opportunity for mentorship and fellowship.
  sports: Elliot Coker, an avid weekend softball player for the Stilwell Sluggers, a faithful supporter of the Kansas City Royals and Chiefs, and a casual fisherman who treats the lake as a low-impact cardio
    session, balances leisurely competition with a laid-back exercise routine that favors community over intense training.
  arts: Elliot Coker, a regular karaoke star who belts out classics by Johnny Cash and Dolly Parton, enjoys folk-rock concerts featuring The Avett Brothers, and attends community theater productions starring
    local talent, finding inspiration for garden designs in the pastoral paintings of Claude Monet.
  travel: Elliot Coker, who favors spontaneous road trips to rustic lakes and state parks like Ozark, Yellowstone, and the Great Smoky Mountains, plans travel around the community calendar, often pairing
    fishing adventures with family reunions while keeping costs low by camping under a canvas tent.
  culinary: Elliot Coker, a pragmatic home cook who transforms heirloom tomatoes, basil, and home-grown peppers into fresh garden salads and grilled trout, masters the art of sizable potluck casseroles
    and smoky BBQ ribs, and delights in experimenting with tangy mango salsa for community feasts.
  core: Elliot Coker, a 50-year-old neighborly fixer-upper whose laid-back schedule, habit of misplacing tools, and relentless drive to nurture community connections define a life lived at the intersection
    of practical know-how and heartfelt generosity.
background:
  cultural: Elliot’s cultural background reflects a Midwestern white American upbringing rooted in small‑town values of neighborliness, self‑reliance, and community service. Growing up in Kansas, he was
    exposed to farm‑oriented traditions, church‑centered social life, and a strong emphasis on practical skills passed down through family generations. These influences fostered his appreciation for hands‑on
    work, collaborative problem‑solving, and a calm, resilient demeanor that aligns with the region’s ‘keep‑on‑keeping‑on’ ethos.
