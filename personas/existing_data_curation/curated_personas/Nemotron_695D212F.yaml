    organization'']'
  career_goals: Elliot aims to deepen his role as a community pillar by leading a neighborhood garden initiative and establishing a mentorship program for local teens. He hopes to obtain his GED to formalize
    his education and plans to take a short certification in community mediation. Over the next few years, he envisions running for a seat on the Johnson County school board to influence policies that promote
    inclusive, hands‑on learning experiences. Additionally, he wishes to document the oral histories of Stilwell’s older residents, preserving their stories for future generations.
