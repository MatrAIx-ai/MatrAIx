  hobbies: '[''Fishing'', ''Hunting'', ''DIY home improvement'', ''Truck maintenance'', ''Grilling/barbecue'', ''Watching high school football'', ''Listening to country music'', ''Playing cards'', ''Volunteer
    at food bank'', ''Reading local history'']'
  career_goals: Winston aims to advance from sales associate to shift supervisor within the next two years and ultimately become store manager. He plans to complete an associate degree in business management
    through a local community college, gaining formal leadership and operational skills. His ambition is to lead a team that maintains high customer satisfaction and consistent sales growth, and eventually
    open his own small hardware or general store in Paris, Texas, allowing him to apply his practical retail experience to a business he owns. In the longer term, he wants to secure a stable financial future
    for his family and possibly retire early enough to focus on his hobbies while remaining active in the community.
