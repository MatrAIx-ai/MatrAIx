    equipment maintenance'']'
  hobbies: '[''Walking the Lakefront Trail'', ''Community fitness classes (Zumba, yoga)'', ''Reading African‑American literature'', ''Participating in a book club'', ''Volunteering at church outreach programs'',
    ''Cooking Southern comfort food with modern twists'', ''Hosting potluck gatherings'', ''Attending live blues and jazz performances'', ''Dancing to funk and soul music'', ''Gardening herbs and vegetables'']'
  career_goals: Ariel aims to advance into a supervisory role such as Office Manager or Operations Coordinator within the next three years, where she can lead a team and drive efficiency improvements. She
    plans to obtain the Certified Administrative Professional (CAP) credential and enroll in evening courses to earn a bachelor's degree in Business Administration, focusing on community development. Her
    long‑term ambition is to leverage her administrative expertise and compassionate leadership to become a community liaison for a nonprofit organization that supports under‑served families in Chicago,
    creating programs that combine employment training with social services. She also aspires to mentor younger employees and spearhead workplace diversity and inclusion initiatives.
