persona_description: A researcher at the University of Illinois at Urbana-Champaign who specializes in the development of biological robots using 3D-printed muscles made of lab-grown mouse cells. His research
  focuses on understanding the peripheral nervous system, specifically the study of diseases that affect it, and the development of biological prosthetics. His work is motivated by the limitations of studying
  these diseases in live animals, and he aims to develop systems that can make it easier to study the progression of these diseases in real time. He is also interested in the potential medical applications
  of his research, such as the development of larger, more complex biological prosthetics.
