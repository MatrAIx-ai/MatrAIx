  hobbies: '[''Comic drawing'', ''Listening to indie music'', ''Attending art festivals'', ''Playing collaborative video games (Minecraft, Among Us)'', ''Improvisational theater'', ''Photography of desert
    scenery'', ''Skateboarding'', ''Volunteering at community art workshops'']'
  career_goals: Charles aspires to turn his imagination into a professional career as a multimedia storyteller—ideally as a concept artist, illustrator, or indie game developer. He plans to build a strong
    portfolio through personal projects and community art exhibitions, then enroll in a post‑secondary art program or apprenticeship that values creative flexibility. Long‑term, he hopes to work freelance
    or join a creative studio where he can contribute to video games, animation, or advertising campaigns while also leading community workshops that share his love of art and collaboration.
