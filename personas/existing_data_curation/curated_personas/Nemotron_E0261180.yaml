personas:
  professional: Charles Hudnall, an aspiring multimedia storyteller, leverages their vivid imagination, self‑taught proficiency in Procreate and Photoshop, and collaborative spark from improv theater to
    craft concept art and prototype narrative game levels that echo the open‑space energy of the Arizona desert.
  sports: Charles Hudnall, a frequent skater at Oasis Skate Park who also enjoys casual beach volleyball and tracks the Phoenix Suns and Arizona Diamondbacks, mixes spontaneous desert hikes with impromptu
    skate sessions while rarely adhering to a formal workout schedule.
  arts: Charles Hudnall, a dedicated fan of indie acts like Tame Impala and The Strokes, regularly visits the First Friday Art Walk and local desert photography exhibitions, channels those influences into
    vibrant comic strips and short stories, and occasionally relaxes with binge‑watching animated series for visual inspiration.
  travel: Charles Hudnall, an adventurous teen who favors road trips to nearby destinations such as Sedona’s red rocks and the Grand Canyon, dreams of attending Japan’s Tokyo Game Show, and prefers spontaneous
    planning over rigid itineraries, balancing school commitments with the occasional weekend getaway.
  culinary: Charles Hudnall, a decent home cook who loves whipping up spicy chipotle burritos, fresh guacamole with lime, and experimental desert‑inspired salsas, often cooks late after gaming sessions
    but tends to leave a few dishes in the sink, reflecting a laid‑back kitchen routine.
  core: Charles Hudnall, the free‑spirited 17‑year‑old storyteller who merges desert‑inspired imagination with a laid‑back, collaborative vibe, spends days sketching, skating, gaming, and daydreaming while
    juggling a loosely organized life.
background:
  cultural: Charles grew up in Glendale, Arizona, a suburban enclave within the Phoenix metropolitan area. His family, of white American descent with Midwestern roots, relocated to the Southwest in the
    1990s, bringing a blend of traditional American values and an appreciation for the region's open‑space lifestyle. The desert environment, local art fairs, and multicultural community events have shaped
    his outlook, fostering a love for outdoor activities and a curiosity about diverse cultural expressions. Although his formal schooling has been limited, community libraries, youth centers, and regional
    art programs have provided him with access to creative resources and a supportive social network.
attributes:
