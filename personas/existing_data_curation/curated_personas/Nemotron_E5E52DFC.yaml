personas:
  professional: Brittney Bowman, a 48‑year‑old casino floor associate, blends fast‑paced cash‑handling precision with a warm, mentorship‑focused style, aiming to step up as a shift lead while championing
    community‑service tie‑ins despite her habit of misplacing inventory logs.
  sports: Brittney Bowman, an avid skier and weekend hiker, belongs to the Rocky Mountain Outdoor Club, regularly watches Colorado Avalanche games, anchors her fitness routine with yoga sessions at the
    community center, and occasionally joins a local softball league for a social sprint.
  arts: Brittney Bowman, a frequent attendee of the Telluride Bluegrass Festival and local craft fairs, draws inspiration from folk‑rock acts like The Lumineers and the muralists of Colorado Springs, often
    replicating their color palettes in her DIY home‑decor projects and swapping board‑game strategies over coffee.
  travel: Brittney Bowman prefers impromptu road trips through the Rocky Mountains, recently explored Yellowstone National Park on a weekend getaway, and dreams of a cross‑country drive to the Great Smoky
    Mountains while juggling her volunteer schedule and casino shifts.
  culinary: Brittney Bowman, a self‑taught home chef, frequently whips up Colorado‑style elk chili with fire‑roasted peppers, perfects her sourdough starter for weekend loaves, and adds a pinch of smoked
    paprika to her favorite roasted root‑vegetable medleys.
  core: Brittney Bowman blends a warm, community‑focused spirit with a love for outdoor adventure, juggling a bustling casino floor role, spontaneous creativity, and a habit of misplacing her own keys.
background:
  cultural: Brittney identifies with a blend of Rocky Mountain and mid‑western small‑town American culture. Raised in a modest, predominantly white community in the plains, she later relocated to Black
    Hawk, Colorado, where the tourism and casino economy shapes daily life. The region's emphasis on outdoor recreation, hospitality, and community involvement influences her values of practicality, independence,
    and cooperative spirit. She embraces the local traditions of seasonal festivals, mountain sports, and volunteerism, while maintaining a pragmatic, hands‑on approach to work and life.
attributes:
  skills: '["Customer service", "Cash handling", "POS system operation", "Conflict resolution", "Multitasking in high‑traffic environments", "Basic bookkeeping", "Inventory management", "Event coordination",
