  hobbies: '["Hiking in the Rockies", "Skiing", "Group yoga classes", "Volunteer at the local food bank", "Volunteer at the animal shelter", "Board game nights with friends", "Cooking and experimenting
    with new recipes", "Attending local music festivals", "DIY home décor projects"]'
  career_goals: Brittney aims to move into a supervisory role within the hospitality sector, such as a floor manager or shift lead, where she can combine her operational expertise with her natural compassion
    for staff and guests. She hopes to pursue a certification in hospitality management to formalize her skills and eventually lead community‑focused programs that bridge the casino’s tourism business with
    local charitable efforts. Flexibility remains key, so she seeks a position that offers a balanced schedule to accommodate her volunteer work and personal interests.
