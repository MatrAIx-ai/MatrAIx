persona_description: A computational biologist who specializes in the study of protein structures and their evolutionary relationships. He is working on applying network theory to the task of mapping the
  protein universe, which would help reveal how proteins evolve and are related to one another. His expertise lies in computational biology, protein structure analysis, and evolutionary biology. He has
  a strong background in computational biology and is currently working on a doctoral dissertation that involves low-level optimization of search systems in the field of information retrieval. He has previously
  published two conference papers on the topic and is working on a third paper about dynamic index updates.
