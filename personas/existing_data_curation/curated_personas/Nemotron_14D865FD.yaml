personas:
  professional: Samuel Franklin, a 45‑year‑old licensed journeyman electrician, blends meticulous NEC code expertise with a charismatic, client‑focused style, leading crews, training apprentices, and spearheading
    smart‑home and solar installations while methodically planning each project to meet their master‑electrician goal.
  sports: Samuel Franklin is a devoted fan of the Houston Astros, Texas Rangers, and Houston Texans, joins a local recreational softball league, spends sunrise jogs on Buffalo Bayou, and enjoys weekend
    fishing trips with the Houston Outdoor Anglers Club, preferring low‑impact fitness over high‑intensity training, and they relish the camaraderie of team sports.
  arts: Samuel Franklin lights up community theater stages and karaoke nights, channeling their love for live performance into roles inspired by Lin‑Manuel Miranda’s energy and classic country icons like
    Willie Nelson, while regularly attending concerts featuring Beyoncé and Chris Stapleton, and they thrive on the applause that fuels their sociable spirit.
  travel: Samuel Franklin favors spontaneous road trips to Hill Country’s vineyards, weekend getaways to Austin’s music festivals, and annual pilgrimages to New Orleans for Mardi Gras, while dreaming of
    a future European tour of Barcelona’s architecture and Cork’s culinary scene, constrained by their family commitments and business cash flow.
  culinary: Samuel Franklin is a self‑taught grill master who obsessively perfects Texas‑style smoked brisket, pork ribs using hickory chips, and a signature jalapeño‑cheddar sausage, often pairing their
    creations with homemade coleslaw, pickles, and a side of spicy black‑bean chili.
  core: Samuel Franklin is a socially vibrant, anxiety‑prone electrician who balances meticulous trade expertise with a love for DIY electronics, community performance, and Texas‑style BBQ, all while they
    juggle aspirations for a renewable‑energy contracting firm.
background:
  cultural: Samuel grew up in the suburbs of Houston, Texas, within a white, middle‑class family that valued hard work, self‑reliance, and community involvement. The multicultural fabric of Houston exposed
    him to diverse cuisines, music, and festivals, shaping an open‑minded, socially adaptable outlook. He identifies with Southern hospitality traditions, enjoys regional customs such as backyard gatherings
    and Texas sports, and maintains a strong connection to the local trades community that emphasized practical skill development and mutual support.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical systems'', ''NEC code compliance'', ''Blueprint reading'', ''Troubleshooting and diagnostics'', ''Smart home automation'', ''Solar photovoltaic
    installation'', ''Project management'', ''Team leadership'', ''Client communication'']'
  hobbies: '[''Community theater'', ''Karaoke'', ''DIY electronics'', ''Custom LED lighting projects'', ''Jogging'', ''Yoga'', ''Barbecue cooking'', ''Fishing'', ''Habitat for Humanity volunteering'']'
  career_goals: Samuel aims to achieve master electrician status within the next two years, secure his own electrical contracting license, and expand his business to specialize in renewable‑energy installations
    and home‑automation projects. He is also interested in becoming a certified trainer for apprentices, which would allow him to share his knowledge while building a supportive network. Long‑term, Samuel
    hopes to establish a stable, community‑focused firm that provides reliable services, offers steady employment to local technicians, and gives him the financial security to better manage his anxiety
    and support his separated family.
