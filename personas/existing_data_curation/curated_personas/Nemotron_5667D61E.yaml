  career_goals: Gonzalo dreams of becoming a robotics or mechanical engineer who can design practical, sustainable solutions for his community, especially tools that make everyday life easier for families.
    He hopes to earn a scholarship to a top university with a strong engineering program, while staying fluent in both Spanish and English so he can mentor younger bilingual students. He also wants to continue
    playing soccer at a competitive level, perhaps earning a college scholarship, and he envisions organizing cultural events that celebrate his Mexican heritage, blending technology and tradition to inspire
    peers.
