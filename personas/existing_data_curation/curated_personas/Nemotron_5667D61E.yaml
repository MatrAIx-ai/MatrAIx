personas:
  professional: Gonzalo Hidalgo, a budding robotics and coding enthusiast, combines his curiosity for new tech with a practical, step‑by‑step problem‑solving approach, often leading his middle‑school club
    while ensuring projects stay on schedule.
  sports: Gonzalo Hidalgo thrives on the soccer field as a forward for the Eastside Strikers youth team, cheering for the national under‑17 squad during tournaments, and complements the season with weekend
    bike rides and a budding interest in skateboarding at the local skate park.
  arts: Gonzalo Hidalgo channels his creative energy into comic‑style sketching, drawing inspiration from artists like Stan Lee and anime series such as My Hero Academia, while dancing to reggaeton hits
    from Bad Bunny and pop tracks by Shawn Mendes during family gatherings.
  travel: Gonzalo Hidalgo’s travel style mixes family road trips to nearby beach towns like Puerto Vallarta for sandcastle competitions, adventurous day‑camps at the Sierra Madre national park, and a dream
    itinerary that includes a cultural immersion visit to Oaxaca’s Day of the Dead celebrations and a future trip to Tokyo’s anime districts.
  culinary: Gonzalo Hidalgo enjoys helping in the kitchen, proudly assembling tacos al pastor with fresh cilantro and lime, mastering guacamole with ripe avocados and serrano peppers, and experimenting
    with homemade churros drizzled in chocolate after watching cooking shows.
  core: Gonzalo Hidalgo is a socially‑charged, curious 12‑year‑old who balances building robots with soccer kicks, saves for LEGO while occasionally overspending on gaming, and navigates teenage health
    quirks with a mix of diligence and forgetfulness.
background:
  cultural: Gonzalo comes from a Mexican‑American family rooted in the vibrant Latino community of San Jose. At home, Spanish is spoken alongside English, and family gatherings often revolve around traditional
    Mexican foods, music, and celebrations such as Día de los Muertos and Cinco de Mayo. His parents emphasize values of familismo, respect for elders, and community service, encouraging him to stay connected
    to his cultural heritage while also embracing the diverse, tech‑forward environment of the Bay Area. He regularly attends community events at local cultural centers, where he helps organize activities
    that blend his love of technology with Mexican traditions, fostering a sense of belonging and pride in both cultures.
