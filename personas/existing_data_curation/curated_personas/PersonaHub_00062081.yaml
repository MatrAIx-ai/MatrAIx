persona_description: A historian who specializes in the study of the Civil War era and African-American history, particularly focusing on the experiences of freed slaves during the period of emancipation.
  They are deeply engaged in the project's efforts to interpret and present the documents and essays about the Civil War and Reconstruction era, and they have a keen interest in the use of the project's
  findings in curricula and teaching. They are also a strong advocate for the project's work and the importance of revising precollegiate curricula to better understand the Civil War and the African-American
  experience.
