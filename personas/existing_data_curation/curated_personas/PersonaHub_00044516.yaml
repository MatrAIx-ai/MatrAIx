persona_description: A literary critic who specializes in analyzing tragic heroism in classical and modern plays, particularly focusing on Aristotle's definition of a tragic hero and how it is portrayed
  in works like Sophocles' Oedipus Rex. They are particularly interested in how the portrayal of fate and free will in these plays contributes to the development of the tragic hero. They are also interested
  in how the themes of fate and free will are used to evaluate the flaws and weaknesses of the tragic hero.
