  hobbies: '[''Gardening'', ''Hiking'', ''Reading historical fiction'', ''Baking'', ''Knitting'', ''Birdwatching'', ''Puzzle solving'', ''Volunteering at the library'', ''DIY home projects'']'
  career_goals: Andrea aims to leverage her organized, practical skill set into a part‑time administrative or community‑health role that allows her to stay engaged while maintaining a balanced home life.
    She plans to enroll in a local community college program to earn a certification in health promotion or horticulture, which will empower her to lead neighborhood workshops on sustainable living, budgeting,
    and gardening. Long‑term, she envisions establishing a home‑based consulting service offering personalized budgeting and sustainability guidance to families in her area, while continuing to volunteer
    in small‑group community projects.
