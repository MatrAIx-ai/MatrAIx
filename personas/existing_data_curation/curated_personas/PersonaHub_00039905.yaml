persona_description: A person who is particularly sensitive to the ad hominem fallacy and is skilled in critical thinking. They are aware of the fallacy and can identify it when presented in arguments.
  They are also skilled in assessing arguments based on their merits rather than the person presenting the argument. They are also aware of the fact that the sex or gender of the arguer is not relevant
  to the argument and that the argument should be assessed based on its logical structure and logic. They are also skilled in identifying ad hominem arguments and can tell the difference between acceptable
  and non-acceptable ones.
