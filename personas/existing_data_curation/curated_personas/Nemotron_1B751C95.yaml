  hobbies: '[''Hiking'', ''Competitive tennis'', ''Book club (non-fiction & legal thrillers)'', ''Garden cooking'', ''Volunteer legal‑aid clinic'', ''Craft fairs and quilting'', ''Online legal‑tech workshops'',
    ''Community dinner hosting'']'
  career_goals: Kelly aims to advance to a senior paralegal role within the next three years, where she can oversee a team and shape the firm’s case‑management processes. She plans to earn the NALA Certified
    Paralegal credential and enroll in a part‑time bachelor's program in legal studies to strengthen her theoretical foundation. Ultimately, she envisions launching a boutique legal‑assistance consultancy
    that offers remote support to small‑business owners and community groups in Craig County, leveraging her expertise in technology‑driven workflow optimization. Kelly also seeks to become a mentor for
    junior staff, particularly women who balance professional ambitions with family responsibilities.
