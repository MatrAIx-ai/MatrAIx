persona_description: A city official or planner who is responsible for implementing and overseeing the conversion of streetlights to LED fixtures in their city, with a focus on ensuring the implementation
  is sustainable, effective, and takes into account potential negative effects and solutions. They have a background in urban planning and design, and are familiar with the latest technology and trends
  in lighting and energy efficiency. They prioritize energy savings, environmental impact, and the quality of life for residents and visitors. They are aware of the potential issues with glare, light trespass,
  and the impact on pedestrians, drivers, and bicyclists, and have developed design criteria and recommendations to address these concerns.
