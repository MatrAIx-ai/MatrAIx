persona_description: A field worker who has extensive prior experience conducting semi-structured interviews with rural people in the forest, is well-prepared, shows respect, and remembers that it is the
  fieldworkers who are there to learn from the forest users on how they are using and benefiting from their local forest. They are sensitive to the constraints facing women when undertaking interviews and
  use open-ended questioning style that seeks explanations and opinions rather than yes-or-no-answers. They are also able to use methods properly, such as using maps or aerial photographs to stimulate discussion
  about local forest use, conducting direct observation, and conducting transect walks to link interview information to the specific plot area where the trees have been measured.
