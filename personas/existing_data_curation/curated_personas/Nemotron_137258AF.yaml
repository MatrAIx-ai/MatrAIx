  hobbies: '[''Choir singing'', ''Book club (African-American literature)'', ''Vegetable gardening'', ''Quilting'', ''Digital mentoring at library'', ''Folk festivals'', ''Historical reenactments'', ''Cooking
    traditional Southern dishes'', ''Genealogy research'', ''Community storytelling'']'
  career_goals: Although retired, Shalonda aims to deepen her impact in the Jackson County community. She plans to develop a mentorship program linking high school students with senior volunteers, document
    local Black histories through oral narratives, and publish a collection of recipes and stories celebrating her cultural heritage. She also hopes to master advanced genealogy research, traveling to archives
    in Montgomery and Atlanta to trace her family's roots, and eventually establish a community garden that serves as a living classroom for sustainable practices.
