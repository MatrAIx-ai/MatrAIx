personas:
  professional: Shalonda Howard, a retired community organizer, leverages decades of event‑planning expertise to coordinate intergenerational mentorship programs, manage modest community budgets, and document
    local histories through oral narratives, all while maintaining a methodical, detail‑oriented approach.
  sports: Shalonda Howard, an enthusiastic supporter of the 'New Orleans Saints' and the 'Memphis Grizzlies', participates in a senior walking club that meets three times a week at the community center,
    enjoys low‑impact lawn bowling at the local recreation league, and follows the seasonal baseball schedule of the nearby Jackson County Jays.
  arts: Shalonda Howard, a devoted choir member and quilt enthusiast, finds inspiration in folk singer Gillian Welch, classical cellist Yo‑Yo Ma, and the vibrant paintings of Georgia O'Keeffe, often incorporating
    motifs from these artists into their storytelling sessions and textile designs.
  travel: Shalonda Howard, a deliberate traveler, prefers carefully planned road trips to historic towns such as Savannah, Montgomery, and Atlanta, cherishes weekend stays at the coastal retreat of Charleston,
    and dreams of exploring the ancient libraries of Oxford, England, while budgeting travel expenses through a modest savings plan.
  culinary: Shalonda Howard, an accomplished home cook, blends traditional Southern fare like shrimp and grits, collard greens, and sweet potato casserole with fresh garden herbs, heirloom tomatoes, and
    locally sourced okra, and enjoys experimenting with spice blends while occasionally over‑salting a batch of cornbread.
  core: Shalonda Howard channels organized mentorship, garden stewardship, and storytelling into a vibrant community‑centric life, yet they often lose track of their spectacles and hoard vintage seed packets
    like hidden treasure.
background:
  cultural: Shalonda grew up in the Deep South during the civil rights era, shaping a cultural identity rooted in African‑American traditions of resilience, faith, and communal support. Her family maintains
    strong ties to the Black church, gospel music, and Southern cuisine, passing down recipes and oral histories that celebrate their heritage. She draws on the legacy of community activism in Jackson County,
    integrating values of respect for elders, hospitality, and storytelling into daily life. The region's rich musical and culinary traditions influence her hobbies, while the collective memory of the civil
    rights movement informs her commitment to mentoring younger generations and preserving local Black histories.
attributes:
  skills: '[''Event planning'', ''Community outreach'', ''Budget management'', ''Organic gardening'', ''Southern cooking'', ''Digital literacy tutoring'', ''Mentorship and counseling'', ''Quilting and textile
