personas:
  professional: Pastor Eric Blaha, a 58-year-old church leader, expertly blends meticulous sermon preparation with rigorous budgeting, volunteer coordination, and hands-on carpentry, while leveraging their
    competitive drive to maintain high standards in every ministry program.
  sports: Eric Blaha, a loyal member of their church bowling league who champions the Cleveland Browns and enjoys fishing with the Riverside Anglers, integrates low-impact hiking on local trails into their
    routine, and they use competition as motivation to improve their bowling scores.
  arts: Eric Blaha, an avid listener of classic rock legends like Led Zeppelin and gospel greats such as Mahalia Jackson, spends evenings reading C.S. Lewis and enjoying weekly chess matches at the community
    center, and they often volunteer to build stage sets for the local theater.
  travel: Eric Blaha, a methodical planner, enjoys organized weekend trips to the Great Smoky Mountains and historic sites like Gettysburg, preferring guided group tours with their men's fellowship group
    while balancing a desire for adventure with family and church responsibilities, and they always map out itineraries down to the last mile.
  culinary: Eric Blaha, a competent home cook, frequently prepares hearty vegetable stew with garden tomatoes, rosemary, and thyme, bakes crusty cornbread and apple pie for potluck gatherings, and while
    their timing can be off during busy weeks, they often forget to refrigerate leftovers, though their generous portions foster fellowship.
  core: Eric Blaha, a 58-year-old pastor whose life revolves around meticulous routine, community service, and a competitive spirit in bowling and gardening, battles chronic worry yet channels it into dependable
    leadership and generous potluck hospitality, and they remain the steadfast heart of their congregation.
background:
  cultural: Eric is a lifelong resident of Blossburg, Tioga County, Pennsylvania, raised in a family of German‑American and Irish ancestry typical of the region. He grew up in a Protestant (Methodist) tradition
    that values hard work, self‑reliance, and community service. The Appalachian cultural milieu of his hometown emphasizes close‑knit relationships, modesty, and respect for tradition. Eric’s worldview
    reflects conservative, family‑centered values, regular participation in church and civic events, and a strong sense of duty to preserve the rural heritage of his community.
