  hobbies: '[''Fishing'', ''Beach walks'', ''Woodworking'', ''Home DIY projects'', ''Gardening'', ''Reading historical non‑fiction'', ''Watching baseball'', ''Neighborhood beach clean‑ups'']'
  career_goals: Tony aims to turn his reliable helper experience into a journeyman carpenter certification within the next two years. He plans to complete an apprenticeship program, obtain an OSHA 30‑hour
    certification, and eventually move into a crew foreman role. His longer‑term ambition is to start his own small‑scale renovation business focused on energy‑efficient retrofits and historic home preservation
    on Cape Cod, providing a stable income for his family while maintaining a predictable work schedule.
