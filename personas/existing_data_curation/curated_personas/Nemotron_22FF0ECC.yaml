personas:
  professional: Tony Acosta is a seasoned construction helper on the cusp of journeyman carpenter certification, leveraging their solid grounding in framing, concrete finishing, low-voltage electrical work,
    and plumbing rough-ins, while their preference for structure, meticulous attention to detail, and reserved yet assertive demeanor allow them to keep job sites organized, coordinate material deliveries
    efficiently, and lead small crews with calm reliability.
  sports: Tony Acosta enjoys early-morning beach walks and casual weekend jogs, follows the Boston Red Sox avidly, plays in a local amateur softball league called the Cape Cod Mariners, and belongs to the
    Cape Cod Road Runners club where they log regular mileage to stay fit.
  arts: Tony Acosta finds creative fulfillment in woodworking simple furniture while listening to folk legends like Woody Guthrie and contemporary duo The Lumineers, studies New England painter Andrew Wyeth's
    landscapes, and occasionally attends productions at the Cape Cod Community Theater featuring local talent such as Jane O'Brien.
  travel: Tony Acosta plans trips with spreadsheet precision, favoring road-based getaways to nearby gems like Provincetown, Martha's Vineyard, and Acadia National Park for relaxation, while dreaming of
    a heritage tour of the Cotswolds in England and a culinary escapade to Charleston, South Carolina, all balanced against family responsibilities and a modest travel budget.
  culinary: Tony Acosta prefers hearty New England fare, regularly cooking clam chowder with fresh clams, potatoes, and thyme, mastering lobster rolls with buttered rolls and succulent lobster meat, and
    assembling garden-fresh vegetable medleys of zucchini, heirloom tomatoes, and sweet corn seasoned with rosemary, reflecting a solid but unpretentious home-cooking skill set.
  core: Tony Acosta blends a methodical, hands-on work ethic with a quiet love for sunrise fishing, an obsessive habit of alphabetizing tools, and a reluctant but steadfast commitment to community beach
    clean-ups, all while navigating the practical realities of mid-life career advancement.
background:
  cultural: Tony’s cultural background is rooted in the New England coastal tradition. He comes from a family of several generations of white Anglo‑American workers who have lived in the Cape Cod area,
    blending a modest, hard‑working ethic with a respect for the maritime heritage of the region. The community values of self‑reliance, family, and preserving historic homes shape his outlook, while occasional
    family ties to Irish and English ancestry add a subtle cultural flavor to his holidays and local customs.
attributes:
  skills: '[''Basic carpentry'', ''Concrete mixing and finishing'', ''Framing assistance'', ''Construction site safety compliance'', ''Material handling'', ''Power tool operation'', ''Simple blueprint reading'',
