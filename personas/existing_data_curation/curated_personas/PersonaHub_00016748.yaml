persona_description: A teacher who is dedicated to the process of teaching and learning, focusing on creating engaging and interactive classes that foster critical thinking, communication, collaboration,
  and creativity. They use a variety of assessment techniques to evaluate student progress and understanding, and encourage their students to take ownership of their learning. They have experience in teaching
  English and working in the field of Teacher Education, and have a strong interest in using assessment as a tool to inform teaching and learning. They are currently an academic consultant for Oxford University
  Press and have worked as a Speaking Examiner for the Cambridge University exams.
