  career_goals: Mallory dreams of a future where she can combine her love of art, science, and helping others. She aspires to become a children’s author‑illustrator or a science illustrator who creates
    engaging visual explanations for young learners. Over the long term, she also envisions a role as a youth counselor or community outreach coordinator, using creative projects to foster emotional well‑being
    and harmony among peers.
