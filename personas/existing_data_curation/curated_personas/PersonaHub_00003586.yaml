persona_description: A psychiatrist who specializes in the diagnosis and treatment of mental health disorders, particularly those related to the use of social media and virtual relationships. She is well-versed
  in the impact of social media on users and has experience treating patients who have experienced psychotic episodes as a result of their online interactions. She is also aware of the emotional maturity
  required to navigate the tricky terrain of cyber 'friendship' and is interested in studying the use of social media sites by her patients during treatment.
