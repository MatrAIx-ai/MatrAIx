  career_goals: As he approaches retirement, Victor aims to transition from hands‑on extraction work to a safety consultant role where he can mentor younger workers and contribute to improving industry
    standards. He hopes to design and lead a regional safety training program that emphasizes practical, low‑stress techniques and fosters a supportive team culture. Additionally, he is interested in exploring
    opportunities to apply his practical knowledge to emerging renewable‑energy extraction projects, such as geothermal drilling, where his adaptability and curiosity can add value. Ultimately, Victor wants
    to be remembered as someone who helped make the workplace safer and more harmonious while retaining his love for hands‑on problem solving.
