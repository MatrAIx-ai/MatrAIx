  career_goals: Thien plans to transition from day‑to‑day caretaking to a mentorship and program‑development role within the next few years. He aspires to create a community outreach initiative that integrates
    visual art and animal enrichment, offering workshops for local schools and senior centers. He also seeks certification as a wildlife rehabilitator to expand his expertise with native coastal species.
    Ultimately, he hopes to document his experiences in a memoir that highlights the intersection of culture, art, and animal care, leaving a lasting legacy for future caretakers.
