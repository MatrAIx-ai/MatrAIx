  career_goals: Robert dreams of a future where he can help people and be part of a team. He often says he wants to become a firefighter because he admires their bravery, teamwork, and clear structure.
    He also imagines being a veterinarian, drawn by his love for animals and the practical way he would care for them. As he grows, he hopes to excel in school, join school clubs, and eventually pursue
    a career that blends service, teamwork, and organized responsibilities.
