personas:
  professional: Robert Burke, an 8‑year‑old future engineer-in‑training, leverages their love of structure and reliability to excel in school science projects and intricate LEGO constructions, showcasing
    early analytical thinking, teamwork, and an assertive yet cooperative approach.
  sports: Robert Burke, an 8‑year‑old midfielder for the Buda United Youth Soccer Club, thrives on the regimented drills of the fall season, idolizes Manchester United’s youth academy, and balances enthusiastic
    weekend matches with structured bike rides with friends around the neighborhood.
  arts: Robert Burke, an 8‑year‑old LEGO enthusiast who spends afternoons building elaborate sets while listening to the soundtrack of Disney’s Frozen and rereading adventure series like Harry Potter, often
    draws inspiration from the whimsical animation of Pixar’s Toy Story and the rhythmic beats of Kidz Bop.
  travel: Robert Burke, an 8‑year‑old who enjoys family trips with detailed itineraries—having explored Budapest’s City Park, picnicked by Lake Balaton, and visited the Aquaworld water park—dreams of a
    future vacation to Disney World in Florida and a cultural adventure in Paris to see the Eiffel Tower.
  culinary: Robert Burke, an 8‑year‑old with a budding interest in the kitchen, helps their parents stir spaghetti Bolognese and assemble pepperoni pizza using mozzarella cheese and tomato sauce, favors
    crunchy apple slices and carrot sticks, but occasionally sneaks extra chocolate milk from the fridge.
  core: Robert Burke, an 8‑year‑old who blends a love for structured LEGO engineering with energetic soccer play, meticulously saves allowance for new sets while occasionally barging into candy aisles,
    embodies a reliable yet spirited approach to life.
background:
  cultural: Robert comes from a white, middle‑class family in Buda, Texas, a community that blends suburban life with strong Southern traditions. His family celebrates holidays like Thanksgiving and the
    Fourth of July with backyard barbecues, country music, and local high‑school football games. He attends a local church where community service and fellowship are emphasized. The cultural environment
    values friendly neighborly interaction, respect for routine (e.g., school schedules, community events), and a love for outdoor activities such as baseball, fishing, and biking. This upbringing reinforces
    his sociable nature and his preference for organized, predictable activities.
