  hobbies: '[''Fishing'', ''Hunting'', ''Playing basketball'', ''Building model kits (cars, planes)'', ''Strategy video games (e.g., SimCity, Civilization)'', ''Country and gospel music'', ''DIY home improvement
    projects'', ''Attending church youth group activities'']'
  career_goals: John aims to earn his GED within the next two years and then enroll in a vocational program to obtain an automotive service technician certification. He envisions a career that offers a
    clear routine, dependable income, and a structured path for advancement—such as working as a mechanic at a local dealership or service center. In the longer term, he hopes to open a small auto‑repair
    shop, allowing him to apply his methodical approach and reliability while serving his community. He also contemplates enlisting in the U.S. Army, where his disciplined, routine‑oriented nature would
    be valued.
