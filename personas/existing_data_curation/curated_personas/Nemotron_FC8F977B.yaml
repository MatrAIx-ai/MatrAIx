personas:
  professional: John Pearce, a 17‑year‑old aspiring automotive service technician, channels their love for routine and hands‑on work into a disciplined apprenticeship mindset, methodically practicing oil
    changes, tire rotations, and simple engine diagnostics while planning a future opening of a small auto‑repair shop.
  sports: John Pearce competes in the Riverside Junior Basketball League, wearing the number 12 jersey for the Eagles B‑team, while cheering on the Dallas Cowboys in football, the Dallas Mavericks in basketball,
    and following the Texas Rangers during the baseball season.
  arts: John Pearce’s artistic life revolves around country and gospel sounds, regularly listening to Alan Jackson, Carrie Underwood, and Kirk Franklin on the family truck radio while attending church youth‑group
    sing‑alongs that feature contemporary gospel bands.
  travel: John Pearce prefers structured weekend getaways that blend hunting and fishing, regularly planning trips to the Wyoming Bighorn Mountains for elk, to Maine’s Penobscot River for salmon, and dreaming
    of a future summer adventure in Ontario’s cottage lakes, all booked months in advance using a detailed itinerary spreadsheet.
  culinary: John Pearce enjoys cooking comfort meals like grilled catfish with lemon‑butter, barbecue pork ribs seasoned with smoked paprika, and homemade chili topped with shredded cheddar, often following
    step‑by‑step recipes that mirror their model‑kit assembly approach.
  core: John Pearce is a methodical 17‑year‑old who balances routine‑driven hands‑on projects with a modest social circle, finding order in fishing trips, model kits, and a future as a reliable automotive
    technician while occasionally over‑checking tool inventories.
background:
  cultural: John was raised in a small‑town Southern community in Brandon, Mississippi, within a predominantly white, Protestant (Baptist) environment. His family emphasizes traditional values, self‑reliance,
    and practical work ethic. Church activities and community gatherings play a central role in social life, reinforcing a sense of belonging and shared heritage. Local customs, such as family BBQs, country
    music, and outdoor recreation like fishing and hunting, shape his cultural identity. While he respects the region's traditions, he also seeks personal stability and a clear, practical path forward.
attributes:
  skills: '[''Automotive maintenance'', ''Woodworking and carpentry'', ''Gardening and lawn care'', ''Basic cooking/meal preparation'', ''Computer literacy (Office suite)'', ''Organizational and inventory
