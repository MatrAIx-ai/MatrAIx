  career_goals: Taylor aims to continue growing as a leader within her childcare center, seeking a role as lead teacher or program coordinator where she can design age‑appropriate curricula that blend structure
    with creative play. She hopes to obtain a certification in early childhood education and eventually transition her experience into a small, family‑run daycare that serves a close‑knit community of families,
    allowing her to maintain the intimate, harmonious environment she values.
