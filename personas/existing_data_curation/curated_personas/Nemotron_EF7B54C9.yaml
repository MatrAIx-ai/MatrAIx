personas:
  professional: Taylor Cooper, a seasoned early‑childhood professional, blends a love for routine with a flexible, creative approach to curriculum design, using storytelling, music, and crafts to nurture
    children while navigating occasional disorganization and deadline challenges.
  sports: Taylor Cooper enjoys leisurely walks along Jacksonville’s riverfront, follows the Jacksonville Jaguars and the local Jacksonville Jumbo Shrimp baseball team, and participates in a community garden
    fitness group that meets twice weekly for gentle stretching.
  arts: Taylor Cooper delights in watercolor painting scenes of her garden, knits scarves while listening to folk singers like Joan Baez, and actively contributes her alto voice to her church choir, finding
    artistic expression a soothing counterbalance to her structured work life.
  travel: Taylor Cooper favors low‑key travel to historic towns such as Savannah, Charleston, and St. Augustine, where she explores colonial architecture and local herb markets, planning trips well in advance
    but occasionally booking a spontaneous weekend getaway to a nearby coastal cottage when a quiet break is needed.
  culinary: Taylor Cooper cooks family‑style Southern comfort meals—shrimp and grits, collard greens, and pecan pie—enhanced with fresh herbs from her garden like rosemary and mint, and enjoys perfecting
    her own herb‑infused vinaigrette while occasionally over‑seasoning her dishes in enthusiastic spurts.
  core: Taylor Cooper is a routine‑loving, garden‑tending early‑childhood educator who balances meticulous care for children with occasional spontaneous indulgences, a mild health‑monitoring habit, quiet
    artistic pursuits, and a fondness for historic, low‑key travel.
background:
  cultural: Taylor comes from a middle‑class, Southern‑American background. Raised in a small town in the Florida Panhandle, she grew up with the values of Southern hospitality, a strong sense of community,
    and a Christian upbringing that emphasized service and harmony. Her bachelor’s degree in humanities broadened her appreciation for literature, history, and the arts, which she incorporates into her
    daily life. Living in Jacksonville, she has been exposed to a multicultural environment, yet she maintains traditional family‑centered customs and enjoys sharing Southern cooking and folklore with the
    children she cares for.
