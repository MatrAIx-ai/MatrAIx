  career_goals: Kevin aims to shift from full‑time employment to a boutique consultancy that lets him pick projects aligned with his technical interests, such as high‑performance e‑commerce platforms or
    secure web applications. Over the next five years he hopes to become a recognized authority on web performance and accessibility, authoring a practical guide that merges experimental techniques with
    established standards. He also plans to mentor junior developers in one‑on‑one settings, focusing on critical thinking and disciplined craftsmanship, while maintaining a flexible schedule that minimizes
    stress and accommodates his preference for solitary work.
