  hobbies: '[''Watercolor painting'', ''Sketching (abstract and surreal themes)'', ''Creative writing (short stories and poetry)'', ''Reading speculative fiction and philosophy'', ''Online courses on abstract
    concepts (e.g., quantum theory, modern art)'', ''Bird‑watching at local nature reserves'', ''Herb gardening'', ''Listening to ambient electronic music'', ''Meditation and mindfulness practice'']'
  career_goals: Linda aims to transition into a regional sales director role within the next three years, where she can shape broader commercial strategies and mentor emerging talent. She envisions launching
    a boutique consultancy focused on innovative, creativity‑driven sales training for mid‑size firms, blending her love for novelty with proven sales methodologies. In the longer term, she hopes to author
    a guide on applying abstract thinking to real‑world selling, establishing herself as a thought leader while maintaining a work‑life balance that reduces stress and supports her well‑being.
