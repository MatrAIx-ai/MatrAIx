personas:
  professional: Linda Gilger commands over 25 years of front‑line sales leadership on the Texas Gulf Coast, blending rigorous data analysis with vivid storytelling and abstract conceptual thinking to design
    inventive sales strategies, coach high‑performing teams, and craft compelling visual presentations that win complex deals.
  sports: Linda Gilger favors low‑impact fitness like early‑morning bird‑watching hikes with the Gulf Coast Birdwatchers Club, weekly yoga sessions, and occasional kayaking in the Gulf, while cheering for
    the Houston Astros and supporting the Dallas Cowboys, reflecting a calm yet competitive spirit in personal wellness.
  arts: Linda Gilger spends weekends exploring watercolor abstract compositions inspired by Kandinsky, writes speculative short stories echoing the styles of Ursula K. Le Guin, and curates ambient playlists
    featuring Brian Eno and Aphex Twin to fuel creative flow.
  travel: Linda Gilger prefers solitary, contemplative travel, having trekked the volcanic landscapes of Iceland, wandered the Zen gardens of Kyoto, and explored New Mexico’s desert art colonies, while
    often taking weekend road trips to Texas Hill Country vineyards, balancing a love of discovery with limited time and a modest budget.
  culinary: Linda Gilger cultivates an herb garden of rosemary, basil, and thyme and translates fresh harvests into Mediterranean‑inspired dishes like roasted vegetable quinoa bowls, miso‑infused soups,
    and occasional matcha‑laced desserts, while occasional indulgence includes artisanal cheese plates at local farmers markets.
  core: Linda Gilger merges data‑driven sales expertise with a solitary, abstract artistic soul, turning curiosity into strategic innovation while navigating stress through disciplined meditation and daily
    creative rituals.
background:
  cultural: Linda is a white Texan who grew up in a small community near Houston, steeped in Southern values of independence, self‑reliance, and direct communication. After completing high school in Brazoria
    County, she entered the retail workforce, where she discovered a talent for sales. Her Texan upbringing instilled a strong work ethic and a competitive spirit, which she leverages in her managerial
    role. Although she enjoys traditional Texas comforts—like BBQ and Tex‑Mex cuisine—her personal interests lean toward solitary artistic and intellectual pursuits, reflecting a blend of local cultural
    roots and a uniquely imaginative worldview.
attributes:
  skills: '[''Strategic sales planning'', ''Negotiation and deal closing'', ''Team leadership and development'', ''CRM management (Salesforce)'', ''Data analysis (Excel, Tableau)'', ''Creative storytelling
