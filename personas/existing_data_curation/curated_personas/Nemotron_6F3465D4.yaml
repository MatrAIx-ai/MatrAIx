  hobbies: '[''Fishing'', ''Woodworking'', ''Chess'', ''Reading historical non-fiction'', ''Attending high school football games'', ''Volunteering at community events'', ''Classic car restoration'', ''Gardening'']'
  career_goals: John is driven to climb the corporate ladder. In the next three to five years he aims to move from first‑line supervisor to regional sales manager, overseeing multiple teams across southeastern
    Michigan. He also plans to earn a bachelor’s degree in Business Administration while completing a certification in sales analytics. Ultimately, he hopes to transition into a senior sales director role
    or start his own sales‑performance consulting firm, where he can apply his competitive edge and data‑driven approach on a broader scale.
