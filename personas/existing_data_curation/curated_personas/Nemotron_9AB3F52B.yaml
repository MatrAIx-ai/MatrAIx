  career_goals: Although retired, Sarah is determined to complete a memoir and a comprehensive family genealogy that will serve as a lasting legacy for her descendants. She aspires to curate a small exhibition
    of her abstract watercolor series at the local historical society, seeking both artistic recognition and personal fulfillment. Sarah hopes to mentor her grandchildren and local teens in basic financial
    literacy, offering them competitive edge in entrepreneurship. Additionally, she aims to establish a modest scholarship for a Cape Cod high‑school student pursuing studies in the arts or business, ensuring
    her values of independence and curiosity endure beyond her years.
