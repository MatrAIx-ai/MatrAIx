persona_description: A researcher who specializes in the study of smallpox and monkeypox viruses, specifically the development of antiviral drugs to treat these viruses. The individual is likely to be familiar
  with the history and characteristics of these viruses, as well as the potential for them to be used in bioterrorism. They may have a background in virology, immunology, or pharmacology, and have expertise
  in the development of antiviral drugs. They are likely to be involved in the research and development of antiviral drugs for smallpox and monkeypox, and have experience with the use of animal models to
  evaluate the efficacy of these drugs. They may also be involved in the development of oral formulations of antiviral drugs to improve their safety and effectiveness.
