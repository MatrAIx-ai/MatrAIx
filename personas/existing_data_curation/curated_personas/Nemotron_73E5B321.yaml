  career_goals: Even at nine, Tracy envisions a career that blends curiosity with practical impact. She hopes to become a wildlife veterinarian who investigates animal health while applying hands‑on treatments,
    or an environmental engineer designing tools to help local farms conserve water. She aims to rank among the top students in her school, win at least one science fair, and eventually lead community projects
    that protect the natural habitats around Clovis.
