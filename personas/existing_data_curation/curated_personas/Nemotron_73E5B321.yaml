personas:
  professional: Tracy Capps, a budding young naturalist and LEGO architect, merges a love of creek-side insect hunting with hands-on building projects, turning curiosity into practical problem-solving while
    favoring spontaneous, self-directed experiments over rigid school assignments.
  sports: Tracy Capps plays on the Clovis United U10 soccer team, enjoys bike rides on the Fresno County trail network, follows the Los Angeles Dodgers and the Golden State Warriors on TV, and approaches
    fitness with a competitive edge, preferring short bursts of activity over long-term structured workouts.
  arts: Tracy Capps is an avid comic-book creator who draws characters inspired by the adventures of Rick Riordan and sci-fi tales by Neal Stephenson, listens to Imagine Dragons and watches the animated
    works of Studio Ghibli, and spends weekends sketching in the backyard.
  travel: Tracy Capps dreams of hiking among the giant sequoias in Sequoia National Park after exploring local spots like the San Joaquin River and the nearby Kearney Museum, planning trips around school
    holidays and relying on family road trips rather than air travel.
  culinary: Tracy Capps favors homemade pepperoni pizza topped with fresh basil, makes avocado toast with a sprinkle of chili flakes, enjoys taco bowls with black beans and corn, and can whip up a fruit-banana-strawberry-kale
    smoothie, though their cooking skills are limited to simple, no-cook dishes.
  core: Tracy Capps is a fiercely curious, competitive nine-year-old who prefers solitary nature hunts and LEGO builds over big crowds, yet often neglects organization, overspends on hobbies, and skips
    bedtime routines.
background:
  cultural: Tracy was raised in Clovis, a suburban community in Fresno County, California, where agricultural roots and a family‑oriented lifestyle intersect with the state’s forward‑thinking attitude toward
    technology and the environment. Her white American family values education, self‑reliance, and community involvement, participating in school clubs, local library reading programs, and occasional neighborhood
    clean‑up events. This blend of rural heritage and modern Californian influences shapes her practical outlook and curiosity about the natural world.
attributes:
