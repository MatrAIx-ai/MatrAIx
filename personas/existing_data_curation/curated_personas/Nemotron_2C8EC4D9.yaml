personas:
  professional: Cody Cerbone, a veteran customer service specialist with three decades of experience, leverages their meticulous documentation skills, calm conflict‑resolution style, and curiosity‑driven
    visual problem‑solving to train new hires and streamline workflows within a Salesforce‑powered call center.
  sports: Cody Cerbone stays active by hiking the Huachuca Mountains with a senior trail club, follows the Arizona Diamondbacks, Phoenix Suns, and Arizona Cardinals on game days, and sharpens mental acuity
    through a weekly bridge league, while they keep a light jogging schedule in the cooler months to support joint health.
  arts: Cody Cerbone immerses themselves in the visual arts by attending Tucson’s Museum of Contemporary Art, studying watercolor under local instructor Mary Lou, capturing desert landscapes reminiscent
    of Ansel Adams and Georgia O'Keeffe, and listening to classic rock icons like Bruce Springsteen and country legends such as Dolly Parton while curating community art‑center exhibitions.
  travel: Cody Cerbone prefers well‑planned road trips to western national parks like Grand Canyon, Zion, and Sedona, relishes cultural festivals in Santa Fe and historic towns in Southern Arizona, and
    dreams of an art‑focused pilgrimage to Florence and Kyoto, balancing their love of adventure with a modest travel budget and occasional family commitments.
  culinary: Cody Cerbone enjoys moderate‑skill cooking, often preparing grilled fish tacos with fresh cilantro, roasted poblano peppers, and a squeeze of lime from herbs grown in their community garden,
    while also indulging in classic comfort dishes like meatloaf and pecan pie, and they savor a well‑brewed cup of dark roast coffee during evening watercolor sessions.
  core: Cody Cerbone is a curious, organized senior whose love of art, community service, and meticulous work ethic is balanced by a tendency to worry and occasional impulsive splurges on nostalgic music
    memorabilia.
background:
  cultural: Cody is a white American who grew up in a Midwestern family that relocated to the Southwest during his teens, settling near Fort Huachuca. The military community surrounding the base introduced
    him to a diverse mix of cultures, fostering respect for the region’s Native American and Hispanic artistic traditions. Living in Huachuca City, he embraces the desert lifestyle—hiking, attending local
    fairs, and appreciating Southwest art—while maintaining core values of hard work, self‑reliance, and community service that stem from his family's Midwest roots.
