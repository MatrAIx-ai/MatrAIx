  hobbies: '["Visiting local art galleries and museums", "Watercolor painting", "Landscape photography of the Sonoran desert", "Hiking in the Huachuca Mountains", "Senior bridge club", "Volunteer teaching
    basic computer skills at the community center", "Listening to classic rock and country music", "Reading historical nonfiction about Arizona", "Gardening in a community plot", "Attending county fairs
    and cultural festivals"]'
  career_goals: Cody aims to transition into a supervisory or trainer role within his organization, leveraging his organized work style to develop a mentorship program for new hires. He plans to earn a
    Certified Customer Service Professional credential to formalize his expertise and improve his promotion prospects. Long‑term, he hopes to reduce work‑related stress by moving to a part‑time position
    that allows more time for art‑related volunteer work, such as assisting at the local community art center or coordinating exhibitions. He also envisions mentoring younger employees while gradually preparing
    for a comfortable retirement in Huachuca City.
