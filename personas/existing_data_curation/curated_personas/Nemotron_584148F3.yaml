  career_goals: Peter dreams of becoming a firefighter because he admires the clear structure, teamwork, and the chance to help his community. He also expresses interest in being a teacher, seeing the role
    as a way to create organized learning environments for other children. Both ambitions reflect his desire for responsibility, order, and compassion.
