personas:
  professional: Peter Batiste, a five‑year‑old who runs a meticulously organized sticker‑trading corner at preschool, demonstrates early entrepreneurial flair by cataloguing trades, negotiating with peers,
    and insisting on a tidy inventory, reflecting their preference for structure and sociable energy, and they eagerly share their collection with friends.
  sports: Peter Batiste, a five‑year‑old member of the Sunshine Kids Soccer Club, idolizes the local professional team City FC, eagerly joins weekend pick‑up games, insists on wearing matching shin guards
    for safety, and they channel their energetic, sociable nature into team play while sometimes fretting over missed goals.
  arts: Peter Batiste, a five‑year‑old budding artist, spends afternoons drawing colorful characters inspired by Dr. Seuss and watching Disney movies starring Tom Hanks, proudly displays their crayon murals
    on the refrigerator, and they love showing off each new drawing to classmates, reflecting their love for vivid storytelling and social sharing.
  travel: Peter Batiste, a five‑year‑old avid explorer, has visited the local zoo, the splash‑filled Aquatic Adventure Park, and dreams of a family road trip to Disneyland, prefers carefully planned itineraries
    with frequent snack breaks, and they feel reassured when a familiar stuffed companion travels in their backpack.
  culinary: Peter Batiste, a five‑year‑old picky eater, favors cheese pizza, chicken nuggets, and apple slices, often insists on helping stir the batter for homemade pancakes, yet they have a habit of sneaking
    extra cookie dough when nobody watches, showing their blend of culinary curiosity and occasional indulgence.
  core: Peter Batiste, a five‑year‑old with a love for orderly play, social exuberance, and occasional worry, balances meticulous habits with bursts of energetic camaraderie, often peppered by cheeky snack
    raids and a touch of nail‑biting, and they constantly seek reassurance from caregivers.
background:
  cultural: Peter is an African-American child raised in Lynnwood, Washington, a suburban community with a growing multicultural population. His family maintains cultural ties through music, food, and community
    gatherings; they enjoy listening to a mix of gospel, soul, and contemporary R&B at home, prepare traditional dishes such as collard greens and sweet potato pie for family celebrations, and attend a
    local church that emphasizes community service. He celebrates cultural holidays like Kwanzaa and participates in school activities that highlight Black history, giving him a sense of pride in his heritage
    while also learning from the diverse backgrounds of his friends.
