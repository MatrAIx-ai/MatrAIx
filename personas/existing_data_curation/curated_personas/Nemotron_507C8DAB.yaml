personas:
  professional: Tracy Howe is a personable cashier with a business degree who excels at friendly customer service, meticulous cash handling, and savvy Excel reporting, while quietly cultivating the leadership
    chops and inventory know‑how needed to step into a store‑manager role and eventually launch a community‑focused boutique.
  sports: Tracy Howe energizes themselves by playing third base for the Payette County Pioneers softball league, tackling local hiking trails in the Sawtooth foothills, and rooting for the Boise State Broncos
    football team, and they favor group activities over solitary gym workouts.
  arts: Tracy Howe weaves quilts inspired by William Morris’s bold patterns, and they capture spontaneous street scenes with a smartphone using Lightroom‑style filters, delighting in improv theater classes
    that channel Jim Carrey’s kinetic comedy while their book club often debates the latest novel by Celeste Ng.
  travel: Tracy Howe prefers spur‑of‑the‑moment road trips with their book‑club crew, having recently explored Yellowstone’s geysers and camped near Sun Valley, and they now dream of a spring getaway to
    Tuscany’s vineyards, balancing a modest travel budget with a limited vacation allowance by choosing campgrounds over costly hotels.
  culinary: Tracy Howe enjoys cooking comfort meals like rosemary‑infused chicken pot pie, quinoa‑black bean salad, and seasonal vegetable stew, experimenting with fresh herbs from their community garden
    and often swapping recipes at potluck nights, though they sometimes over‑salt dishes when juggling multiple cooking projects.
  core: Tracy Howe is a sociable, curiosity‑driven community enthusiast who juggles retail ambition, a love for group crafts and sports, and a lingering habit of procrastinating on personal organization,
    and they quietly battle stress‑induced worries.
background:
  cultural: Tracy comes from a white, American background rooted in the rural and small‑town culture of Idaho’s Payette County. Her family has lived in the Pacific Northwest and the Intermountain West for
    several generations, fostering a strong sense of community, self‑reliance, and an appreciation for the outdoors. Local cultural values emphasize neighborly cooperation, modesty, and active participation
    in community events such as county fairs, church gatherings, and volunteer initiatives, all of which have shaped Tracy’s outlook and social habits.
