  career_goals: Tracy aims to transition from her current cashier role into a supervisory or store‑management position within the next few years, leveraging her business degree to lead a small retail team.
    She is interested in learning advanced inventory systems and staff‑training techniques, and she hopes to eventually open a modest community‑focused boutique or coffee shop that emphasizes local products
    and personal interaction. While she values flexibility and a low‑stress environment, she also wants to cultivate stronger organizational habits and stress‑management skills to support her ambitions
    and provide a stable future for her family.
