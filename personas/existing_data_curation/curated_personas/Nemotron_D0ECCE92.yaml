personas:
  professional: Kellie Dowdy is a senior financial analyst who builds intricate Excel and SQL models, conducts rigorous risk assessments, and leverages their structured, detail‑oriented mindset to lead
    cross‑functional projects while managing stress through yoga and meditation.
  sports: Kellie Dowdy regularly hikes the Missouri River trail, practices yoga at a local studio, follows the Great Falls Voyagers baseball team and the Denver Broncos, and is a member of the Great Falls
    Outdoor Club that organizes seasonal group hikes.
  arts: Kellie Dowdy captures Montana’s vast skies through photography inspired by Ansel Adams, enjoys listening to folk singer Gillian Welch and classic rock icons like Bruce Springsteen, and attends the
    annual Great Falls Art Walk to support regional artisans.
  travel: Kellie Dowdy prefers meticulously planned road trips, has explored Yellowstone and Glacier National Parks, dreams of sailing the fjords of Norway, and balances weekend getaways with family responsibilities
    by budgeting travel expenses in advance.
  culinary: Kellie Dowdy cooks farm‑to‑table meals using garden‑grown carrots, potatoes, and kale, excels at making bison stew with locally sourced herbs, favors rye bread and honey, yet occasionally overcooks
    quinoa when juggling a tight schedule.
  core: Kellie Dowdy is a data‑driven finance professional who thrives on structure, balances rigorous budgeting with rugged outdoor pursuits, yet often worries about the next deadline.
background:
  cultural: Kellie was raised in a white, Northern‑European American family in the Upper Midwest before moving to Great Falls, Montana, where she has lived for the past decade. Her upbringing emphasized
    self‑reliance, practicality, and a strong sense of community—values that echo the cultural ethos of the Northern Plains. While her family’s roots include German and Scandinavian heritage, she identifies
    principally with the broader American cultural fabric, embracing the region’s independent spirit and modest, down‑to‑earth lifestyle. She often participates in local celebrations, supports regional
    artisans, and reflects a blend of traditional work ethic with a contemporary, inclusive outlook.
