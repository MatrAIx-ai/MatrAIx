  career_goals: Kellie aims to transition from an individual contributor to a senior leadership role within the next five years, targeting positions such as Finance Manager or Director of Investment Strategy
    at a regional firm. She plans to earn the Chartered Financial Analyst (CFA) designation to deepen her analytical credibility and to lead a cross‑functional team focused on sustainable investment opportunities
    that align with Great Falls' emerging energy sector. Additionally, she aspires to mentor junior analysts, streamline risk‑management processes, and champion data‑driven decision making while maintaining
    a structured work schedule that safeguards her personal well‑being.
