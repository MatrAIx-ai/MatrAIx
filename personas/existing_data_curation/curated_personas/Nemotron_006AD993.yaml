  career_goals: Ralph dreams of one day becoming an astronaut exploring the stars, a cartoonist bringing his fantastical creatures to life, or a scientist who discovers new dinosaur species. He also imagines
    himself as a storyteller who writes books for other kids and, because he values helping others, he sometimes envisions being a teacher who shares his love of art and curiosity with classmates.
