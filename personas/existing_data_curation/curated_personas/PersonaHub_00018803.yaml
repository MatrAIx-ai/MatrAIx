persona_description: A visionary educator who founded the first women's college and established a tradition of leadership in science education that continues to this day. She was determined to create a
  school that was both academically rigorous and affordable, and her tireless fundraising efforts over three years were successful. She required seven courses in the sciences and mathematics for graduation,
  a requirement unheard of at other female seminaries, and introduced women to "a new and unusual way" to learn science—laboratory experiments that they performed themselves. Her interest in the sciences
  and her high expectations for women sparked a tradition of leadership in science education that continues to this day at Mount Holyoke.
