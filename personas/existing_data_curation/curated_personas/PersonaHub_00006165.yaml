persona_description: A photographer who is interested in understanding the fundamental principles of photography, including the sources of noise in images. They are particularly interested in the role of
  quantum mechanics in noise generation and how it affects the signal-to-noise ratio (SNR) in smaller pixel pitches. They are also interested in how ISO settings affect the SNR and how doubling the ISO
  setting leads to a loss of 3dB. They are likely to have a background in physics or electrical engineering and are familiar with the concepts of quantum mechanics, photonics, and signal processing.
