    ''Project budgeting and scheduling'', ''Building‑code compliance'', ''Tool maintenance and safety protocols'', ''Team leadership and apprentice mentoring'', ''Creative problem‑solving'', ''Client communication
    and consultation'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Sketching architectural details'', ''Hiking and nature photography'', ''Reading art history and sustainable design'', ''Mindfulness
    meditation and journaling'', ''Teaching basic woodworking at a community center'', ''Exploring vintage furniture markets'']'
  career_goals: Stephanie aims to transition from on‑site work to establishing a boutique workshop that offers handcrafted furniture and hands‑on classes for adults and youth in her community. She plans
    to obtain a licensed general contractor certificate and pursue certification in sustainable building practices, such as LEED‑qualified construction, to incorporate more eco‑friendly materials into her
    projects. Long‑term, she hopes to serve on the board of the local carpenter’s union to advocate for mental‑health resources for tradespeople, using her own experience with anxiety to shape supportive
    policies.
