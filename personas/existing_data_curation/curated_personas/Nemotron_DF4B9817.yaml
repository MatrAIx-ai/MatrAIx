personas:
  professional: Stephanie Blue, a veteran carpenter with over two decades of experience, combines meticulous blueprint interpretation, advanced joinery techniques, and sustainable material sourcing with
    a curious, art‑inspired mindset that fuels inventive design solutions and empathetic client mentorship, and they often channel client feedback into refined craftsmanship.
  sports: Stephanie Blue stays active by hiking the Columbia River Gorge trails in summer, joining the Oregon Trail Running Club for weekly 5K runs, cheering on the Portland Timbers during the MLS season,
    and they also coach a local youth baseball team’s weekend practice, balancing a love for low‑impact outdoor activity with community sports involvement.
  arts: Stephanie Blue nurtures their artistic soul by sketching historic facades at the Portland Art Museum, drawing inspiration from the watercolors of Georgia O’Keeffe and the wood‑grain studies of David
    Hockney, listening to Joni Mitchell’s folk melodies while painting, and attending independent film screenings featuring Frances McDormand, and they find that these experiences continually enrich their
    woodworking designs.
  travel: Stephanie Blue prefers purpose‑driven weekend getaways that blend nature and craft, such as a recent retreat to Cannon Beach on the Oregon Coast for tide‑inspired woodwork, a spring trip to Kanazawa,
    Japan to study traditional kumiko joinery, and a planned summer expedition to Utah’s national parks, and they organize each trip on a modest budget that balances workshop investments with family time.
  culinary: Stephanie Blue enjoys rustic farm‑to‑table meals, often preparing a rosemary‑infused roasted chicken with heirloom carrots, a wild mushroom and goat‑cheese tart, and a sourdough starter loaf,
    favoring locally sourced produce and occasional cedar‑planked salmon, though they admit a habit of over‑seasoning dishes when stressed.
  core: Stephanie Blue blends a carpenter’s precision with an artist’s curiosity, habitually sketching designs on napkins while wrestling with anxiety that sometimes stalls paperwork, yet they never miss
    a chance to rescue a piece of reclaimed wood for a new project.
background:
  cultural: Stephanie identifies as White with deep roots in the Mid‑Atlantic region; her family lineage traces back to German and Irish immigrants who settled in the Hudson Valley in the early 1900s. Growing
    up in a close‑knit town in Orange County, she was immersed in a culture of self‑reliance, craftsmanship, and community solidarity. The local heritage of historic barn restorations and seasonal fairs
    nurtured her appreciation for traditional woodworking, while her exposure to regional art festivals sparked a lifelong curiosity for unconventional ideas. Her cultural values blend practical, hands‑on
    problem solving with an openness to artistic expression, shaping both her career and personal pursuits.
