    resolution'']'
  hobbies: '[''Basketball'', ''Salsa dancing'', ''Community volunteer fire‑safety demonstrations'', ''Cooking Mexican cuisine'', ''Urban photography'', ''Hiking'', ''Hosting social gatherings'', ''Exploring
    new fire‑safety technologies'']'
  career_goals: Yoel plans to deepen his expertise by earning the Fire Inspector II certification and pursuing a bachelor’s degree in Fire Protection Engineering. He aims to move into a supervisory role
    where he can mentor junior inspectors and design community fire‑prevention programs that integrate technology and culturally responsive outreach. Long‑term, Yoel aspires to become a fire prevention
    officer or fire chief, shaping citywide fire‑safety policies and standards. He also envisions launching a consultancy that helps small businesses and residential complexes implement effective fire‑risk
    mitigation strategies while providing mentorship opportunities for underrepresented youth interested in public safety careers.
