personas:
  professional: Jose Cruz is an aspiring culinary/vocational student who plans to earn a GED and enroll in a community college program, leveraging their hands‑on cooking and automotive maintenance skills
    to secure a routine‑driven line‑cook position at a family‑run taquería while dreaming of one day operating a neighborhood food truck that offers reliable jobs for their relatives.
  sports: Jose Cruz is a committed youth soccer player who joins after‑school matches with the East End United club, cheers for the Houston Dynamo and occasionally watches the Astros on TV, and balances
    fitness with a routine of stretching and weekend pickup games, viewing sports as both social bonding and a stress outlet.
  arts: Jose Cruz enjoys dancing to cumbia and banda at neighborhood fiestas, streams regional Mexican singers like Vicente Fernández and Los Tigres del Norte, regularly watches telenovelas such as La Usurpadora
    with their family, and collects vintage baseball cards featuring legends like Roberto Clemente, finding creative expression in music, dance, and visual memorabilia.
  travel: Jose Cruz has visited their grandparents' hometown in Michoacán, spent summer weekends at Galveston's beach, dreams of exploring Oaxaca's culinary scene and Mexico City's historic center, and
    prefers budget‑friendly road trips with their family that combine cultural immersion and the chance to share their homemade salsa with new friends.
  culinary: Jose Cruz is a budding home chef who skillfully prepares tacos al pastor, guacamole with ripe Hass avocados, and homemade salsa verde, experiments with chiles en nogada during Dia de los Muertos,
    and enjoys cooking alongside their mother while listening to traditional ranchera music, treating each dish as a way to honor family tradition and refine their future food‑truck menu.
  core: Jose Cruz blends routine‑driven practicality with vibrant community ties, channeling their love for cooking, soccer, and family into a future food‑truck dream while managing anxiety through organized
    habits and occasional impulsive baseball‑card splurges.
background:
  cultural: Jose grew up in Houston’s East End within a Mexican‑American household that preserves the customs of his parents’ home state of Michoacán. Spanish is spoken at home, and he celebrates Mexican
    holidays such as Día de los Muertos and Cinco de Mayo with family gatherings, traditional foods, and music. His family practices Catholicism, attending weekly mass and participating in church festivals,
    which reinforce a sense of community and shared values. The principle of "familismo" shapes his priorities, placing family needs above his own, and he respects the elder members of his household. While
    he embraces broader American culture through school and friendships, his identity remains rooted in Mexican traditions, bilingual communication, and active involvement in his local neighborhood.
attributes:
  skills: '["Traditional Mexican cooking (tacos, tamales, salsas)", "Bilingual communication (Spanish & English)", "Basic automotive maintenance (oil change, tire rotation)", "Team sports coordination (soccer)",
    "Customer service in family food stand", "Organizational planning for small events", "Basic computer literacy (email, word processing)", "Social media content creation (short videos)", "First aid basics"]'
  hobbies: '["Playing soccer with friends", "Preparing traditional Mexican dishes with family", "Listening to regional Mexican music", "Dancing at community fiestas", "Gaming (FIFA, multiplayer online)",
    "Volunteering at community center events", "Attending Catholic mass and youth group", "Watching Mexican telenovelas", "Collecting baseball cards", "Sharing short videos on social media"]'
  career_goals: Jose plans to earn his GED within the next year and enroll in a vocational program at Houston Community College, focusing on either culinary arts or automotive technology. He seeks a stable,
    routine‑oriented job that lets him apply his practical skills daily—such as working as a line cook in a family‑run taquería or as an automotive technician at a local garage. In the long term, he hopes
    to open a small Mexican food truck that serves his community while providing dependable employment for his family. He also wants to stay connected to his community by mentoring younger peers in after‑school
    programs and volunteering at local events.
