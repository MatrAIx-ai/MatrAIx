personas:
  professional: Daniel Alb is a disciplined high school sophomore who blends a love for chess strategy with a budding talent for Python, spending evenings coding simple apps while keeping meticulous project
    logs and aiming to develop a tutoring bot for the school’s bilingual library program, which they hope will help peers.
  sports: Daniel Alb anchors the midfield for the Fairfax Youth Soccer Club, idolizing Washington DC United and FC Barcelona, and complements the team’s structured training with weekend runs and a disciplined
    stretching regimen, though they sometimes forgo rest days to finish coding projects.
  arts: Daniel Alb finds solace at the piano, practicing Beethoven’s Moonlight Sonata and contemporary pieces by Ludovico Einaudi, while also indulging in sci‑fi novels like Dune and attending community
    theater productions that echo Carnaval’s vibrant storytelling, a blend that fuels their creative imagination.
  travel: Daniel Alb plans trips with the same precision as a chess opening, favoring family road trips to the Rocky Mountains for hiking and cultural festivals, dreaming of an immersive journey to the
    Andean highlands for a Día de los Muertos celebration, yet they balance the urge to explore with homework deadlines.
  culinary: Daniel Alb enjoys cooking salteñas and api during family gatherings, experimenting with quinoa‑filled empanadas and perfecting a homemade salsa verde, while also mastering simple spaghetti carbonara
    for after‑school meals, though they sometimes forget to clean the kitchen, leaving lingering aromas that blend into their coding sessions.
  core: Daniel Alb is a methodical teen who channels chess‑like precision into coding, piano, and community service, yet wrestles with anxiety‑driven perfectionism and occasional neglect of self‑care.
background:
  cultural: Daniel comes from a Bolivian family that maintains strong ties to its Andean heritage while living in the diverse community of Dunn Loring, VA. At home, Spanish is spoken daily, and traditional
    Bolivian dishes like salteñas and api are prepared for family gatherings, reinforcing his cultural identity. He celebrates cultural events such as Carnaval and Día de los Muertos with his relatives,
    which instills a sense of community and respect for tradition. This multicultural environment, combined with the academic emphasis of his American schooling, shapes Daniel's values of hard work, family
    cohesion, and a desire to contribute positively to both his local and cultural communities.
