  hobbies: '[''Playing chess'', ''Learning Python programming'', ''Reading sci‑fi and engineering books'', ''Playing soccer in a community league'', ''Practicing piano'', ''Volunteering for bilingual story‑time
    at the local library'']'
  career_goals: Daniel aspires to pursue a career in engineering—either software or civil—where his love for structured problem‑solving and precision can be applied. He aims to earn a scholarship to a top
    university, major in a STEM field, and eventually work on projects that improve community infrastructure or develop technology solutions. He also hopes to use his bilingual background to bridge cultural
    gaps in professional settings and maybe mentor younger students from similar backgrounds.
