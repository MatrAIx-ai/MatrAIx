persona_description: A professional educator in Australia who is responsible for implementing and promoting the use of information and communication technology (ICT) in the classroom. This educator is committed
  to ensuring that all learning resources are aligned with the Australian Professional Standards for Teachers (APST) and that ICT is used effectively in teaching and learning. This person is knowledgeable
  about the importance of Knowledge Networking for Educators in meeting professional requirements and is actively involved in the development and implementation of ICT-based learning design. They have a
  deep understanding of the Australian Institute for Teaching and School Leadership's (AITSL) Australian Professional Standards for Teachers and are dedicated to promoting the use of ICT in education to
  enhance student learning and engagement.
