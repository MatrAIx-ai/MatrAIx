  hobbies: '[''Acrylic painting'', ''Visiting art galleries'', ''Community theater'', ''Cooking Mexican cuisine'', ''Hosting dinner gatherings'', ''Zumba classes'', ''Yoga'', ''Spanish‑language book club'',
    ''Volunteer work with immigrant support organizations'', ''Salsa and folklórico dance workshops'']'
  career_goals: In her career, Isabel aims to progress to an HR Business Partner role within two years, then to HR Manager, focusing on building structured yet compassionate employee wellness and DEI frameworks.
    She plans to earn the SHRM‑CP certification, pursue an MBA, and lead organization‑wide initiatives that improve employee engagement and reduce turnover, especially for underrepresented staff.
