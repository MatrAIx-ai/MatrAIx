persona_description: A highly focused and dedicated individual with a passion for logic and mathematics, particularly the philosophy of logic and mathematics. Wittgenstein's single-minded determination
  to live up to his aspiration to accomplish work of genius is evident in his intense preoccupation with questions of logic and his obsession with the development of the picture theory of meaning. His philosophical
  work underwent a profound change during World War I, where he experienced a religious conversion inspired by Leo Tolstoy's The Gospel in Brief, and his surviving manuscripts show that his philosophical
  work underwent a profound change. His perfectionism prevented him from putting any of these ideas in a definitive written form, though he did dictate two series of notes, one to Russell and another to
  G.E. Moore, from which one can gather the broad lines of his thinking.
