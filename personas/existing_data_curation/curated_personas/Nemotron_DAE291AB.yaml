  career_goals: Carmen aims to transition from a local manager to a senior IT leader within the next five years. She plans to earn her GED, complete an associate degree in information technology online,
    and acquire advanced certifications such as CompTIA Security+, Cisco CCNP, and AWS Solutions Architect. Her long‑term ambition is to direct the digital transformation of small businesses in Guernsey
    County, and eventually launch her own consulting firm that helps rural communities adopt modern technology while maintaining cost efficiency.
