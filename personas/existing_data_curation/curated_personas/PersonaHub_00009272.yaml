persona_description: A teacher who emphasizes engagement and requires more from students in their learning process. They have a strong belief in the importance of grades and the impact they have on student
  opportunities to learn. They have a background in teaching at a selective university and have implemented non-grading policies in their classroom to encourage more engagement and participation. They balance
  these policies with other important requirements, such as minimum requirements for course credit and deadlines for revisions. They have a unique understanding of the importance of group theory in mathematics
  and have a passion for teaching and engaging students in the learning process.
