personas:
  professional: Nancy Torres is an organized, bilingual high school junior preparing to earn a GED and enroll in community college, where they plan to study nursing; their meticulous time‑management and
    natural compassion drive them to volunteer in church health outreach, blending practical caregiving with a strong desire for culturally competent service.
  sports: Nancy Torres joins the River Valley Mixed‑Age Soccer Club on weekends, cheering for Los Angeles FC and Chicago Fire FC during the MLS season, and balances their love for the sport with a personal
    fitness routine that includes light jogging and occasional yoga for flexibility.
  arts: Nancy Torres enjoys listening to Latin pop and reggaetón, such as Bad Bunny, J Balvin, and Karol G, while they sketch urban scenes in a sketchbook, often inspired by the vibrant street art of local
    festivals and the rhythmic beats that accompany their drawing sessions.
  travel: Nancy Torres plans weekend getaways with friends to nearby natural spots like the state park's waterfall trails, dreams of exploring Lake Atitlán in Guatemala and the historic streets of Cartagena,
    and uses a detailed travel bullet journal to balance budget constraints with a thirst for cultural immersion.
  culinary: Nancy Torres loves preparing family recipes like bean soup, tamales, and fried plantains, showcasing their skillful use of cilantro, lime, and achiote, and frequently invites neighbors over
    to share the aromas of their kitchen while they experiment with new spice blends.
  core: Nancy Torres is a methodical, bilingual teen who blends structured planning with a lively love for soccer, Latin rhythms, and home‑cooked meals, all while navigating teenage quirks like occasional
    procrastination and a tendency to over‑organize.
background:
  cultural: Nancy was raised in a Honduran immigrant family that relocated to Fontana, California. At home, Spanish is spoken daily, and she celebrates traditional Honduran holidays such as Día de la Independencia
    (September 15) and Semana Santa with family gatherings, traditional foods like baleadas, and music. Her family maintains strong Catholic values and participates in the local parish, where community
    service is emphasized. While she embraces American school culture and popular media, she also retains a deep appreciation for Honduran customs, language, and community solidarity, which influence her
    personal identity and future aspirations.
