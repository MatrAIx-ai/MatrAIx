  hobbies: '[''Bullet journaling'', ''Sudoku and jigsaw puzzles'', ''Cooking Honduran dishes'', ''Listening to Latin pop and reggaetón'', ''Soccer (local league)'', ''Church youth group involvement'', ''Reading
    contemporary YA novels'', ''Sketching and drawing'']'
  career_goals: Nancy plans to earn her GED within the next year and enroll in a community college, aiming for an associate degree in nursing. She aspires to become a registered nurse who can provide culturally
    competent care to underserved families in Fontanawhich often includes bilingual patient communication. In the long term, she hopes to pursue a bachelor's degree in public health and take on leadership
    roles that allow her to develop health outreach programs for the local Latino community.
