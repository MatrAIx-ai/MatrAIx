  hobbies: '[''Softball league participation'', ''Zumba and dance classes'', ''Hiking in state parks'', ''DIY woodworking projects'', ''Community fair volunteering and judging'', ''Cooking experimental
    recipes'', ''Board game nights at local café'', ''Yoga and journaling for stress management'']'
  career_goals: Ginger aims to move into a lead machine‑setter/supervisor role within the next two years, earning a formal CNC programming certification and completing an associate degree in manufacturing
    technology. She wants to spearhead continuous‑improvement projects that reduce waste and boost output efficiency, positioning herself as a top performer in her plant. Long‑term, she envisions launching
    a boutique custom‑furniture workshop that leverages her CNC expertise and hands‑on woodworking skills, allowing her to design and produce high‑end pieces while maintaining a hands‑on, practical approach
    to business.
