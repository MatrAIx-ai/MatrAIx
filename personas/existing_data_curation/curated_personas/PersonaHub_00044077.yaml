persona_description: A team leader and researcher at the National Renewable Energy Laboratory (NREL), a national laboratory focused on renewable energy technologies and research. The individual is leading
  the research and development efforts to develop advanced power electronic components and systems for hybrid, advanced internal combustion, and fuel cell power electronics technologies. They are working
  on thermal management and components and systems research, developing new methods to cool and control insulated gate bipolar transistors (IGBTs) and capacitors used inside motor controllers to improve
  power distribution. The individual is also involved in guiding the PEEM subactivity to reach its goals. They are responsible for coordinating the high-risk enabling technology R&D and ensuring that the
  resulting technologies reside with companies that are willing and able to supply derived products to the automobile companies.
