personas:
  professional: Nellie Caso is a senior visual communication designer who blends graphic, UI/UX, and brand identity work with a deep appreciation for Southern folk art, leveraging Adobe Creative Suite and
    Figma to craft immersive narratives while they orchestrate meticulous project schedules and foster collaborative workshops.
  sports: Nellie Caso fuels their love of the outdoors by hiking the Appalachian foothills on weekends, cheering for the local university's basketball team, and playing casual softball in a community league,
    while they keep a lean fitness routine that balances cardio with restorative yoga.
  arts: Nellie Caso immerses themselves in the arts by painting watercolors of rolling hills, curating vintage finds at local markets, attending blues shows featuring B.B. King covers and indie folk concerts
    by Phoebe Bridgers, and designing costumes for community theater productions, all while they draw inspiration from Georgia O'Keeffe and the Southern Gothic literature of Flannery O'Connor.
  travel: Nellie Caso prefers purposeful road trips that combine design inspiration and cultural immersion—such as a weekend in Asheville’s maker scene, a spring visit to New Orleans for jazz and Creole
    cuisine, and an annual pilgrimage to the Design Futures conference in New York—while they meticulously plan itineraries on a spreadsheet but sometimes indulge in spontaneous detours when a local festival
    catches their eye.
  culinary: Nellie Caso delights in cooking Southern staples like shrimp and grits, fried green tomatoes, and heirloom tomato bruschetta—often harvested from their own garden—while experimenting with fresh
    basil, smoked paprika, and hot sauce, and their kitchen skill ranges from confident sautéing to occasional over‑salting, prompting them to keep a well‑worn cookbook of family recipes at hand.
  core: Nellie Caso is a curiosity‑driven, meticulously organized creative who balances a vibrant social life and a lingering anxiety with daily yoga, spontaneous vintage market finds, and an ever‑growing
    habit of doodling design concepts on napkins, while they also relish leading lively discussions at design meetups.
background:
  cultural: 'Nellie grew up in Owens Cross Roads, a small town in Madison County, Alabama, embedded in a community that values hospitality, storytelling, and a strong sense of place. Her family''s roots
    stretch back generations in the American South, where traditions such as Southern cuisine, folk music, and handcrafted arts like quilting and woodcarving were part of everyday life. While attending
    a regional liberal arts college for an arts-humanities degree, she was exposed to a broad spectrum of cultural narratives, from classical European art to contemporary global design. This blend of Southern
    heritage and academic inquiry shapes her worldview: she cherishes communal bonds and the simplicity of rural life while simultaneously seeking innovative, interdisciplinary expressions in her work.
    Her identity as a white Southern woman informs both her appreciation for regional cultural motifs and her commitment to fostering inclusive, culturally resonant design solutions.'
attributes:
  skills: '[''Graphic design'', ''UI/UX design'', ''Brand identity development'', ''Illustration'', ''Typography'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Figma'', ''Sketch'',
    ''User research'', ''Strategic storytelling'', ''Project management'', ''Public speaking'', ''Community workshop facilitation'', ''Art history knowledge'', ''Mindfulness and stress mitigation'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Exploring art galleries and museums'', ''Visiting vintage markets'', ''Reading design theory and Southern literature'', ''Attending live music concerts'',
    ''Community theater involvement'', ''Cooking Southern cuisine'', ''Gardening'', ''Yoga'', ''Hiking in the Appalachian foothills'', ''Photography'', ''Blogging about design and lifestyle'', ''Volunteering
    at local art festivals'']'
  career_goals: Nellie aims to transition from senior designer to creative director within the next five years, eventually launching her own boutique design studio that merges cutting-edge digital experiences
    with Southern cultural heritage. She envisions leading interdisciplinary teams to create immersive brand experiences, including AR installations for local museums and interactive community campaigns.
    Mentorship is a priority; she wants to develop a structured apprenticeship program for emerging designers in Madison County. Additionally, she aspires to be a sought-after speaker at national design
    conferences, publish a book on the fusion of traditional folk art and contemporary design, and maintain a balanced lifestyle that supports her family and personal well-being.
