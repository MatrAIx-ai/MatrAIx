  career_goals: Even though he is in his mid‑seventies, Murilo aims to stay active in the trade by transitioning to a part‑time consulting role where he can advise small contractors on code compliance and
    safety. He hopes to obtain a master electrician license to formalize his expertise and qualify for higher‑paying consulting gigs. He also wants to continue mentoring apprentices at the local vocational
    school, ensuring the next generation inherits his safety‑first ethos. Beyond work, he plans to secure his retirement savings, maintain his health, and reduce stress by setting a predictable weekly schedule
    that balances work, family visits, and community activities.
