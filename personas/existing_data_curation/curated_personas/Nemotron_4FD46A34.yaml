personas:
  professional: Murilo Ulloa, a 74‑year‑old journeyman electrician with five decades of residential and small‑commercial wiring expertise, now channels his practical, safety‑first mindset into part‑time
    consulting, code‑compliance advising, and mentorship of apprentices, while methodically pursuing a master electrician license to formalize his knowledge.
  sports: Murilo Ulloa follows the Liga MX fervently, cheering for his favorite team during televised matches and supporting the local youth soccer club, while keeping his own fitness modest through weekly
    garden chores and light stretching routines.
  arts: Murilo Ulloa regularly participates in folk dancing at the local community center and delights in live norteño and banda concerts featuring Los Tigres del Norte and Banda El Recodo, transporting
    his sociable energy into rhythmic celebration.
  travel: Murilo Ulloa prefers short, well‑planned road trips to historic missions in South Texas, weekend visits to the Hill Country wineries, and occasional family cruises to the Gulf Coast, balancing
    his love for cultural immersion with a cautious schedule that avoids travel stress.
  culinary: Murilo Ulloa’s kitchen is a hub of aromatic tradition, where he expertly stews pozole, layers enchiladas, and expertly wraps tamales using home‑grown chilies and tomatoes, while his modest culinary
    skill shines in serving these dishes at family celebrations and community potlucks.
  core: Murilo Ulloa blends disciplined craftsmanship with a vibrant social spirit, tackling electrical challenges, community gatherings, and garden chores while navigating a perpetual worry that fuels
    meticulous planning and occasional self‑critique.
background:
  cultural: Murilo was born to Mexican immigrant parents and grew up in the bilingual border town of Brownsville. He speaks fluent Spanish and English, and his identity blends Mexican traditions—such as
    Día de los Muertos, quinceañeras, and Catholic celebrations—with the Texan ranchero lifestyle. He maintains close ties with extended family in both Texas and across the border in Matamoros, often participating
    in community festivals, church events, and family reunions that emphasize hospitality, communal meals, and respect for elders.
