  career_goals: Jay aims to become a senior portfolio manager within the next five years, leading a team that designs data‑driven, low‑volatility investment strategies. He plans to earn the CFA charter
    and pursue a Chartered Financial Analyst designation to deepen his expertise. Over the longer term, he envisions launching a boutique investment advisory firm focused on sustainable, risk‑adjusted returns
    for family offices, leveraging his quantitative background and his desire for thoughtful, client‑centric solutions. He also wants to mentor more junior analysts and contribute to his firm’s knowledge
    base by publishing research on market inefficiencies and responsible investing.
