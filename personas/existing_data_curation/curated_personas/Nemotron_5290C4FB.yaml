  hobbies: '[''Basketball and streetball'', ''Skateboarding'', ''Hip‑hop beat making'', ''Social media content creation'', ''Video gaming (battle‑royale shooters)'', ''Community block parties and sound‑system
    setup'', ''Volunteer tutoring and video‑editing workshops'', ''Street art and mural tagging'', ''Cooking soul‑food with family'']'
  career_goals: Rudolph aims to obtain his GED within the next two years and then enroll in a vocational program for audio production or music technology at a local community college. He wants to master
    industry‑standard software like Ableton Live and Pro Tools so he can produce tracks for emerging Brooklyn hip‑hop artists. Long‑term, he envisions opening a community studio that doubles as a safe space
    for teens to learn music production, skateboarding, and basketball skills. He also hopes to secure a position as an assistant coach for a youth basketball league, blending his love of sport with mentorship.
    These goals provide a clear, structured pathway while leaving room for the creative flexibility he values.
