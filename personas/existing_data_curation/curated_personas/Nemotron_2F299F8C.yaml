personas:
  professional: Victor Castro, a 2‑year‑old who already shows a precocious knack for arranging building blocks in precise configurations, foreshadowing a future in architecture and engineering, and whose
    need for predictability and practical focus make playtime a structured problem‑solving session.
  sports: Victor Castro, a 2‑year‑old who joins a local toddler soccer club called 'Mini Tigers', proudly wears a Manchester United jersey during practice, and enjoys the structured routine of weekly parent‑child
    gymnastics class, yet prefers solitary sandbox play over large group games, revealing a competitive yet solitary sports inclination.
  arts: Victor Castro, a 2‑year‑old who delights in listening to Mozart’s 'Eine kleine Nachtmusik' and Raffi’s 'Baby Beluga', spends hours coloring dinosaur outlines with Crayola crayons while humming 'The
    Wheels on the Bus', showing how classical music and child‑friendly pop culture shape their creative downtime.
  travel: Victor Castro, a 2‑year‑old who has visited the Santa Monica beach and the San Diego Zoo on short car trips, favors predictable itineraries with frequent breaks, feels uneasy on long flights,
    and dreams of a family day at Disneyland, illustrating a travel style that balances curiosity with the need for structure.
  culinary: Victor Castro, a 2‑year‑old picky eater who prefers plain oatmeal, banana slices, shredded chicken, and occasionally assembles a mini fruit salad of strawberries and blueberries, despises peas
    and spicy flavors, and often throws food when textures change unexpectedly, reflecting a cautious palate anchored in simplicity.
  core: Victor Castro, a tidy‑minded 2‑year‑old who organizes toys, saves coins, worries about messes, battles eczema, kicks a soccer ball at 'Mini Tigers', hums Mozart, enjoys brief beach trips, and insists
    on plain oatmeal, balancing order and anxiety in every moment.
background:
  cultural: Victor is a Dominican‑American toddler living in the Jamaica neighborhood of Queens, New York. Raised in a bilingual household, he hears both Spanish and English daily, and his family celebrates
    Dominican traditions such as Día de la Independencia, enjoys dishes like mangú and arroz con habichuelas, and listens to classic merengue and bachata rhythms. The multicultural fabric of Queens provides
    exposure to a variety of cultures, but his family's Dominican roots heavily influence his language, food, music, and early social experiences.
