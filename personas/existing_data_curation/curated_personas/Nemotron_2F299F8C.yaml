  career_goals: While Victor is still very young, his curiosity leans toward roles that offer clear rules and a sense of responsibility. He often talks about wanting to become a firefighter or a police
    officer, professions he sees as structured and helpful. He also shows early interest in teaching, imagining himself helping other children learn new things, reflecting his competitive desire to succeed
    and be recognized for achievements.
