  hobbies: '[''Cooking Mexican cuisine'', ''Gardening (herbs and vegetables)'', ''Folklorico dance classes'', ''Reading historical and mystery novels'', ''Volunteer work at senior centers'', ''Participating
    in book clubs'', ''Crafts (quilting, crocheting)'', ''Family storytelling and oral history'', ''Learning new technology (smartphone, video calls)'', ''Attending community festivals'']'
  career_goals: Although retired, Yan’s ambition is to leave a lasting legacy for her community and family. She aims to document her family’s recipes and oral histories in a published cookbook that blends
    traditional flavors with modern twists, showcasing her curiosity for new ideas while honoring established culinary methods. She also aspires to join the advisory board of the local Mexican Cultural
    Center, helping shape programming that serves both seniors and younger generations. Yan is eager to continue mentoring seniors in digital skills so they can stay connected with their grandchildren,
    and she hopes to organize an annual intergenerational storytelling event that reinforces cultural pride and community cohesion.
