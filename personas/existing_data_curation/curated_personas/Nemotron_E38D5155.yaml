  career_goals: Pat aims to progress to a senior managing editor role at a respected university press or literary journal, where she can shape editorial standards and mentor junior staff. She aspires to
    launch an independent press that highlights emerging New England writers, blending traditional print with innovative digital formats. Pat also plans to obtain professional certification from the American
    Copy Editors Society and to develop a structured editorial training program that reflects her commitment to high‑quality, predictable workflows while maintaining a healthy work‑life balance with her
    family.
