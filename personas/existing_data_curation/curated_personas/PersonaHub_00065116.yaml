persona_description: A wildlife conservationist and environmental activist who has been working for several years in Chhattisgarh, India, specifically in Mahasamund, where she has developed an Early Warning
  System (EWS) to mitigate Human-Elephant Conflict (HEC). Her expertise lies in understanding the dynamics of human-elephant interactions and developing strategies to prevent conflicts. She has conducted
  several sessions with the local communities to raise awareness about the importance of avoiding conflicts with elephants and has successfully radio-collared the matriarch of the herd at Mahasamund. Her
  work has been recognized and appreciated by the Forest Department and the Wildlife SOS organization.
