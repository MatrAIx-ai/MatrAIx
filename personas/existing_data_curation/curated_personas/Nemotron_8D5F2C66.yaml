  career_goals: Although still an infant, Laura’s growing curiosity and love for creative expression hint at future aspirations to become an artist, storyteller, or community facilitator. As she matures,
    she hopes to blend her sociable nature and appreciation for diverse experiences into a career that allows her to inspire others—perhaps as a visual artist who incorporates cultural heritage, a teacher
    who nurtures curiosity, or a community organizer who brings people together for shared art and cultural events.
