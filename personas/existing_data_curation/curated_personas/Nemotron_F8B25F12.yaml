  hobbies: '[''Watercolor painting'', ''Reading literary fiction and poetry'', ''Gardening'', ''Cooking Mexican recipes'', ''Crocheting'', ''Birdwatching'', ''Visiting museums and galleries'', ''Genealogy
    research'']'
  career_goals: Although retired, Lucia’s ambitions focus on personal enrichment and community contribution. She aims to compile a memoir that weaves her Mexican-American heritage with her lifelong love
    of art, to mentor seniors in a weekly art‑making workshop at the community center, and to co‑create a multicultural garden that showcases herbs and flowers used in Mexican cuisine. Additionally, she
    hopes to translate a collection of Mexican folktales for the local library and to curate a small exhibition of senior‑artist works in Gurnee.
