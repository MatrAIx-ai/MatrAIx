personas:
  professional: Matthieu Pratt, an inquisitive one‑year‑old explorer of the sensory world, spends hours pulling apart soft blocks, turning pages of picture books, and listening to classical music, showing
    a natural curiosity and a relaxed, unstructured approach to early learning that hints at a future lifelong habit of open‑minded discovery, and they often prefer solitary play over noisy group activities.
  sports: Matthieu Pratt, a spry infant who loves toddling after soft balls in the backyard and joining parent‑and‑baby swim classes at the neighborhood Aquatic Club, shows budding enthusiasm for the local
    soccer club’s junior mascot and quietly mimics cheers for the city’s major league baseball team during family game nights, and they prefer gentle, stroller‑friendly activities over crowded sports events.
  arts: Matthieu Pratt, an inquisitive infant, delights in the vivid colors of Eric Carle picture books and the soothing strains of Mozart’s piano sonatas, often swaying to the rhythm and attempting early
    scribbles that hint at a lifelong appreciation for visual and auditory arts, and they eagerly explore the textures of finger‑painted canvases during sensory play.
  travel: Matthieu Pratt, a curious one‑year‑old, has already experienced a brief family road‑trip to the coastal beach of San Diego and a weekend visit to a nearby botanical garden, preferring stroller‑friendly
    itineraries that balance gentle exploration with the comfort of familiar caregivers, and they show a sweet fascination with open spaces and colorful flora.
  culinary: Matthieu Pratt, a budding eater at twelve months, shows a penchant for smooth sweet potato puree and banana‑oat cereal while famously making a mess when attempting self‑feeding with tiny forks,
    often refusing the occasional broccoli mash in favor of bright fruit purees, and they can be seen giggling when a spoon of apple sauce lands on their cheek.
  core: Matthieu Pratt, a one‑year‑old explorer with boundless curiosity, relaxed spontaneity, and a quiet, resilient demeanor, constantly experiments with textures, sounds, and colors while making adorable
    messes and cherishing solo play, and they are already mastering the art of calm adaptation to new experiences.
