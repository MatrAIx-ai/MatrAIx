  career_goals: Javier aspires to become a multimedia artist or graphic designer, combining his love for Mexican cultural motifs with modern digital media. He dreams of attending an art-focused high school
    or college, eventually working as a freelance illustrator or art director for culturally driven campaigns. He also hopes to preserve and share his heritage through visual storytelling, possibly creating
    a YouTube channel or digital comic series.
