personas:
  professional: Ronnie Myrick, a 19‑year‑old brand‑strategy enthusiast, blends a solid grounding in core business analysis with an imaginative flair for visual storytelling, delivering data‑driven concepts
    for boutique agencies and thriving in small, flexible teams while they battle occasional deadline‑induced anxiety.
  sports: Ronnie Myrick stays fit by running along Chicago’s lakefront trails at sunrise, joining weekly pick‑up basketball games with friends and cheering for the Chicago Bulls, while they supplement the
    routine with yoga sessions to counterbalance the sedentary nature of their creative work.
  arts: Ronnie Myrick immerses in the arts through sketching cityscapes, curating street‑photography series of Chicago’s architecture, attending intimate gallery shows featuring artists like James Turrell
    and Yayoi Kusama, and drawing inspiration from speculative fiction by Ted Chiang and the experimental beats of Flying Lotus and Aphex Twin, while they constantly seek new visual vocabularies.
  travel: Ronnie Myrick favors spontaneous, budget‑friendly travel, spending weekends exploring Chicago’s Pilsen murals and lakefront cafés, planning annual trips to Berlin’s street‑art festivals, and saving
    for a future solo pilgrimage to Kyoto’s design districts, while they rely on public transit and occasional couch‑surfing to keep expenses low.
  culinary: Ronnie Myrick enjoys crafting vegan ramen bowls with miso‑glazed tofu, perfecting a chewy deep‑dish pizza crust for friends, sampling spicy elote from Chicago street vendors, and sipping espresso
    while they experiment with ingredients like fermented kimchi and turmeric in their modestly adventurous kitchen.
  core: Ronnie Myrick, a 19‑year‑old dreamer, channels intense emotional tides into vivid artwork and brand concepts, thriving on flexibility while they juggle a chaotic schedule and periodic bouts of anxiety.
background:
  cultural: Ronnie grew up in Chicago’s vibrant Black community, drawing on the rich history of the city’s cultural movements—from the Chicago Black Renaissance to the modern hip‑hop and spoken‑word scenes.
    Family gatherings emphasized soul food, gospel music, and storytelling, fostering a deep appreciation for African‑American traditions. He spent his formative years exploring the artistic offerings of
    Bronzeville and Hyde Park, where murals, jazz clubs, and community art centers celebrated Black resilience and creativity. This cultural immersion shaped his worldview, instilling a sense of responsibility
    to uplift Black voices through business and art. Simultaneously, the city’s legacy of activism and entrepreneurship inspired his ambition to blend strategic insight with cultural expression, aiming
    to create platforms that honor his heritage while addressing contemporary social challenges.
attributes:
  skills: '["Strategic Business Planning", "Market Research", "Financial Literacy", "Creative Concept Development", "Digital Media Production", "Social Media Marketing", "Graphic Design Basics", "Trend
    Analysis", "Abstract Thinking", "Empathetic Listening", "Small‑Group Collaboration"]'
  hobbies: '["Sketching and Digital Illustration", "Street Photography", "Visiting Contemporary Art Galleries", "Attending Small‑Scale Poetry Slams", "Reading Speculative Fiction and Philosophy", "Listening
    to Experimental Jazz and Electronic Music", "Creative Writing (short stories, poetry)", "Journaling and Reflective Writing", "Mindfulness Meditation", "Solo Walks in Chicago Lakefront Parks"]'
  career_goals: In the short term, Ronnie aims to secure an entry‑level role or apprenticeship in brand strategy or creative consulting at a boutique agency where he can blend his business acumen with his
    artistic sensibilities. He is particularly interested in positions that value flexibility and allow him to work on small, dynamic teams. Long‑term, he envisions launching his own creative consultancy
    that highlights Black cultural narratives and supports emerging artists in Chicago. His ambition is to become a creative director who leverages data‑driven insights to craft compelling, socially resonant
    brand experiences while maintaining the freedom to explore novel ideas and maintain his personal well‑being.
