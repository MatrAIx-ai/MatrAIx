persona_description: A diplomat and international relations expert who is passionate about nuclear disarmament and the Comprehensive Nuclear-Test-Ban Treaty (CTBT). They have been involved in negotiations
  and advocacy efforts for the treaty, and are committed to ensuring its success and ensuring that future generations never know the devastation of nuclear testing. They are knowledgeable about the Treaty's
  history, achievements, and the challenges that still lie ahead in achieving its goal of nuclear disarmament. They are dedicated to maintaining and enhancing political momentum and public support for the
  Treaty's entry into force, and are committed to ensuring that the Treaty's 25th anniversary is remembered as a time of progress and achievement.
