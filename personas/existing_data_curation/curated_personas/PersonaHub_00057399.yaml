persona_description: Thomas Hoover, the CIO and dean of the library at the University of Louisiana Monroe (ULM), is a visionary leader who believes that virtual reality (VR) has the potential to revolutionize
  higher education. He is a seasoned professional with a deep understanding of the evolving landscape of higher education and the need for institutions to stay ahead of the curve. Hoover is an advocate
  for innovation and is committed to helping ULM establish a solid VR curriculum that can benefit both the students and the institution as a whole. He is a strong believer in the potential of VR to improve
  recruitment, increase grant awards, and provide unique learning experiences for students.
