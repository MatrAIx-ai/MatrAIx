persona_description: An engineer or scientist who is interested in developing and testing thermoelectric modules for electric generators. This person is likely to be familiar with the principles of thermoelectricity
  and its applications in energy generation. They may have experience working with different types of thermoelectric modules, such as single and double modules, and have a keen interest in understanding
  the factors that affect their performance, such as the distance between heat source and load, the number of modules, and the use of heat pipes. This person is likely to be interested in conducting experiments
  to optimize the performance of thermoelectric modules for electric generators.
