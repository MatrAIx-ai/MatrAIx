personas:
  professional: Jackson Langstroth is a 24‑year‑old aspiring journeyman electrician who blends hands‑on woodworking, automotive tinkering, and Arduino hobbyist projects into a growing side business offering
    custom furniture and home‑repair services, all while planning to share DIY tutorials online and mentor local youth.
  sports: Jackson Langstroth enjoys early‑morning fishing on the nearby wetlands, seasonal deer hunting trips with the local sportsmen’s club, weightlifting at the Perquimans Gym, and cheers for the Carolina
    Panthers, the Charlotte Hornets, and the hometown high school baseball team during the spring.
  arts: Jackson Langstroth devotes evenings to competitive first‑person shooter gaming like Call of Duty, watches documentaries from CuriosityStream, attends the Perquimans County Fair to admire folk art,
    and unwinds listening to classic country legends such as Johnny Cash and modern alt‑country like Sturgill Simpson.
  travel: Jackson Langstroth prefers road trips that balance adventure and budget, having explored the Outer Banks and Asheville’s craft breweries, while dreaming of a tech‑focused visit to Seattle’s museum
    of flight and a quiet cabin retreat in the Blue Ridge Mountains.
  culinary: Jackson Langstroth’s palate favors Southern comfort foods like shrimp and grits with fresh local catfish, smoked pork ribs seasoned with brown sugar and paprika, and they often experiment by
    carving a pine‑wood plank to grill a cedar‑infused salmon dish.
  core: Jackson Langstroth blends a curiosity for tech with a hands‑on Southern work ethic, juggling a competitive gaming streak, occasional disorganization, and a habit of over‑investing in tools while
    staying rooted in community traditions.
background:
  cultural: Jackson grew up in Hertford, a small town in Perquimans County, North Carolina, within a close‑knit, predominantly white, Southern community. His family has deep roots in the area, with generations
    involved in farming, woodworking, and small‑scale trade work. He attended the local high school and was active in church youth groups, where values of self‑reliance, hospitality, and respect for tradition
    were emphasized. The regional culture—marked by a slower pace, strong community ties, and an appreciation for practical skills—shapes his outlook, while his curiosity drives him to explore modern technology
    and broader ideas beyond his immediate environment.
attributes:
  skills: '["Automotive maintenance (oil changes, basic diagnostics)", "Handyman repairs (plumbing, carpentry, drywall)", "Woodworking (furniture building, tool use)", "Basic Python scripting and Arduino
    prototyping", "Technical manual interpretation and problem solving"]'
  hobbies: '["Fishing and hunting", "Arduino electronics tinkering", "Python scripting for home automation", "Competitive video gaming (FPS)", "Weightlifting at the local gym", "Watching science and engineering
    documentaries", "Attending county fair and church community events"]'
  career_goals: Jackson aims to translate his practical skill set into a stable, independent career. Over the next two years he plans to enroll in a community college trade program to earn a journeyman
    electrician certification, giving him a marketable credential while preserving his desire for flexibility. Concurrently, he hopes to launch a modest home‑repair and custom‑furniture side business, leveraging
    his woodworking and handyman abilities. Long‑term, he envisions expanding his online presence with DIY tutorials, turning his curiosity for new ideas into a revenue stream, and eventually owning a small
    workshop where he can mentor other local youths interested in trades.
