personas:
  professional: Anita Lightfoot, a therapist who blends rigorous evidence‑based modalities—including CBT, Solution‑Focused Brief Therapy, and Motivational Interviewing—with a trauma‑informed, compassionate
    approach, harnesses her analytical STEM background to interpret assessment data and tailor flexible treatment plans, and consistently balances meticulous documentation with a collaborative, client‑centered
    mindset.
  sports: Anita Lightfoot fuels her love for outdoor movement through weekend hikes on the Cumberland Plateau, participates in the local Cumberland Trail Club’s monthly group treks, practices yoga thrice
    weekly, cheers for the Tennessee Titans and Nashville Predators, and occasionally joins the community’s women’s softball league.
  arts: Anita Lightfoot immerses herself in Southern storytelling by rereading Flannery O’Connor and William Faulkner, performs in a regional community theater where she’s tackled roles in August Wilson’s
    plays, shares knitting projects inspired by the patterns of traditional Appalachian craft, and finds solace listening to folk‑rock artist Sturgill Simpson during quiet evenings.
  travel: Anita Lightfoot plans trips with a mix of quiet escape and purposeful discovery, having hiked the Blue Ridge Parkway and explored Asheville’s art scene, dreaming of visiting Kyoto’s Zen gardens
    while budgeting a modest travel fund, and occasionally postponing longer getaways due to family obligations.
  culinary: Anita Lightfoot enjoys crafting artisan sourdough breads, perfecting recipes that involve a wild‑fermented starter, whole‑wheat flour, rosemary, and sea salt, while also mastering Southern biscuits
    and collard greens, often swapping baked goods with neighbors during her knitting circle gatherings.
  core: Anita Lightfoot is a compassionate therapist who balances data‑driven rigor with creative community‑building, channels curiosity into hiking and baking, and occasionally over‑books her weekend schedule
    in pursuit of purpose.
background:
  cultural: Anita was raised in Gallatin, Tennessee, in a middle‑class white family with deep roots in the American South. Her upbringing was shaped by Southern hospitality, close‑knit family gatherings,
    and active participation in local church and community events, though she now identifies as culturally progressive and is more secular in practice. She draws on a heritage that includes English and
    German ancestry, which is reflected in family traditions such as holiday potlucks and storytelling. Growing up in Sumner County, she developed a strong sense of community responsibility and an appreciation
    for the region’s natural beauty. Her college education introduced her to a broader, more diverse perspective, fostering an openness to new ideas while maintaining the practical, grounded values of her
    Southern background.
