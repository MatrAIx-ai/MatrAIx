    ''Case Documentation'', ''Group Facilitation'', ''Family Counseling'', ''Mindfulness Techniques'', ''Stress Management'', ''Evidence-Based Practice'', ''Data Analysis (SPSS)'', ''Program Evaluation'',
    ''Interdisciplinary Collaboration'', ''Electronic Medical Record (EMR) Management'', ''Ethical Decision-Making'', ''Cultural Competency'']'
  hobbies: '[''Hiking in the Cumberland Plateau'', ''Reading contemporary psychology and self-help books'', ''Gardening'', ''Baking artisan breads'', ''Yoga and mindfulness meditation'', ''Knitting'', ''Volunteering
    at the local animal shelter'', ''Community theater participation'', ''Cooking Southern-style meals'', ''Photography of natural landscapes'']'
  career_goals: Anita aims to become a fully licensed professional counselor in Tennessee within the next two years, pursuing a master's degree in Clinical Mental Health Counseling while completing required
    supervised hours. She plans to specialize in adolescent trauma and to obtain certification in EMDR and family systems therapy. Long‑term, she envisions opening a community‑focused private practice that
    offers affordable telehealth services, conducts outreach workshops in rural Sumner County, and mentors emerging counselors. She is also interested in contributing to research on evidence‑based interventions
    for youth, presenting at regional conferences, and eventually serving on a local mental‑health advisory board to influence policy and resource allocation.
