personas:
  professional: Drew Adger is a budding junior coder who blends a love for Minecraft's redstone circuitry with a practical knack for troubleshooting, channeling their talkative, sociable energy into leading
    the middle‑school debate club while orchestrating collaborative coding projects with friends.
  sports: Drew Adger is a dedicated midfielder on the middle‑school soccer team, spends afternoons sprinting at the local park, follows the U.S. Men’s National Soccer Team and the nearby professional club
    the Portland Timbers for inspiration, and balances a competitive edge with teamwork by organizing weekend pickup games.
  arts: Drew Adger devotes weekend mornings to building LEGO sculptures to the soundtrack of Imagine Dragons and Harry Styles, enjoys reading National Geographic for inspiration, and cites the Pixar animation
    "Inside Out" and the storytelling of author Rick Riordan as creative influences.
  travel: Drew Adger prefers adventurous weekend trips, often camping at the state forest with friends, dreams of hiking the Grand Canyon and exploring the historic streets of Edinburgh, and plans outings
    using colorful map stickers while keeping travel expenses low by sharing rides with family.
  culinary: Drew Adger loves pizza topped with pepperoni and extra mozzarella, experiments with making homemade guacamole for snack time, can whip up a simple spaghetti Bolognese after watching a YouTube
    tutorial, but often forgets to finish vegetables, leading to a habit of snacking on trail mix instead.
  core: Drew Adger is a curious, talkative 12‑year‑old who juggles soccer, coding, and LEGO building, thrives on leading group activities, and occasionally splurges on in‑game purchases while neglecting
    bedtime.
background:
  cultural: Drew was raised in Kingfisher, a small town in north-central Oklahoma with a close-knit community rooted in agricultural and oil-heritage families. His family's Anglo-American background reflects
    generations of Midwestern values—self-reliance, neighborly cooperation, and a strong emphasis on faith and community service. Local traditions such as high-school football games, county fairs, country
    music gatherings, and church youth groups shape his social life, while the region's blend of rural practicality and openness to new technology nurtures his balanced curiosity and pragmatic outlook.
