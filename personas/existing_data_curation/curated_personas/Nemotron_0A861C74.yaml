  hobbies: '[''Fishing'', ''Boating'', ''Golfing'', ''DIY home improvement'', ''Woodworking'', ''Recreational softball'', ''Youth baseball coaching'', ''Classic car restoration'', ''Attending local festivals'',
    ''Watching classic movies'']'
  career_goals: Mark aims to move into a supervisory role within the next two to three years, targeting a certified production supervisor credential and an associate degree in industrial technology. He
    wants to lead a shift crew, spearhead continuous‑improvement projects that raise equipment effectiveness, and eventually qualify for plant‑manager responsibilities or launch a small custom‑fabrication
    shop that offers stable income for his family while preserving the hands‑on work he enjoys. His competitive drive pushes him to exceed production targets and be recognized for operational excellence.
