  hobbies: '["Sketching", "Digital Photography", "Reading (Art History, Philosophy, Psychology)", "Listening to Classical and Ambient Music", "Solo Hiking", "Narrative-Driven Video Games", "Writing Short
    Stories", "Visiting Local Galleries/Museums", "Exploring Basic Graphic Design"]'
  career_goals: John aims to leverage his early supervisory experience into a senior sales management role within the next five years. He is driven to exceed quota targets, implement data‑driven performance
    improvements, and eventually oversee a regional sales operation. Recognizing the value of formal education, he plans to enroll part‑time in a Business Administration program to earn a bachelor's degree,
    with a focus on marketing strategy and organizational behavior. He also hopes to blend his artistic curiosity with his career by designing innovative sales campaigns that incorporate visual storytelling.
    Long‑term, John envisions stepping into a director‑level position where he can shape company culture, mentor emerging talent, and champion a balance of analytical rigor and creative thinking while maintaining
    personal resilience against stress.
