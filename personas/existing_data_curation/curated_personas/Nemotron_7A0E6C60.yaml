personas:
  professional: Lucille Hill, a budding young inventor and coder, channels their curiosity into building intricate LEGO constructs, designing simple Scratch games, and leading small hands‑on projects in
    their after‑school science club, all while applying a practical, step‑by‑step problem‑solving mindset.
  sports: Lucille Hill, who favors low‑pressure play, spends weekends kicking a ball for the Kingwood Soccer Club, swimming laps at the community pool, cheering for the Houston Astros, and occasionally
    joining Girl Scouts hikes, embracing a relaxed yet active approach to fitness.
  arts: Lucille Hill, an avid piano player, fills their sketchbook with imagined gadgets while listening to Billie Eilish and Taylor Swift, and draws inspiration from Pixar’s animated worlds and Studio
    Ghibli’s whimsical storytelling.
  travel: Lucille Hill loves spontaneous family road trips, from exploring San Antonio’s historic missions to touring NASA’s Johnson Space Center, and dreams of a future adventure to Disneyland’s Magic
    Kingdom, always packing a small backpack of rocks and insect nets for on‑the‑go discoveries.
  culinary: Lucille Hill, a budding home chef, favors Tex‑Mex staples like cheese‑filled quesadillas and chicken tacos, whips up strawberry‑banana smoothies, can bake a respectable batch of chocolate chip
    cookies under Mom’s guidance, though they often leave the kitchen counters a little messy.
  core: Lucille Hill is a curious, practical ten‑year‑old who blends spontaneous tinkering with quiet determination, often juggling LEGO bricks, piano keys, and a pocket‑full of rocks while occasionally
    forgetting to tidy up.
background:
  cultural: Lucille is raised in the suburban community of Kingwood, Texas, where Southern hospitality meets the diverse cultural influences of the greater Houston area. Her family emphasizes hard work,
    self‑reliance, and community involvement, often participating in local church events and neighborhood gatherings. While she primarily identifies with a White, middle‑class American heritage, she is
    also exposed to the multicultural fabric of the region, including occasional Spanish language exposure and Tex‑Mex cuisine. This blend of traditional values and openness to new ideas shapes her practical
    yet curious outlook on life.
