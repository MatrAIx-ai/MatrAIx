  career_goals: Lucille dreams of becoming a problem‑solver who can turn ideas into real‑world solutions. She is drawn to fields like robotics, veterinary science, or interactive storytelling, where she
    can combine her love of animals, building things, and creating engaging experiences. Her long‑term goal is to pursue a career that lets her explore curiosity while producing practical, tangible results
    that help others.
