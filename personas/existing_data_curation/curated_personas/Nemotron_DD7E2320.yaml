    ''Conflict Resolution'', ''Assertive Decision‑Making'', ''Creative Sensory Crafting'']'
  hobbies: '[''Reading developmental psychology'', ''Hiking the Palisades Trail'', ''Cycling on local bike paths'', ''Yoga and mindfulness practice'', ''DIY sensory toy crafting'', ''Acoustic guitar playing'',
    ''Cooking healthy meals'', ''Board‑game evenings'', ''Volunteering at library story‑time'']'
  career_goals: Van aims to complete a bachelor's degree in Early Childhood Education within the next two years and obtain the Child Development Associate (CDA) credential. He aspires to progress into a
    supervisory role—such as lead teacher or program director—at a licensed daycare, where he can design and implement an evidence‑based curriculum that blends play‑based learning with measurable outcomes.
    In the longer term, Van hopes to open his own child‑care center that emphasizes holistic development, inclusive practices, and stress‑reduction strategies for both children and staff. He also wishes
    to become a mentor for new childcare providers and advocate for higher standards of early childhood education in his community.
