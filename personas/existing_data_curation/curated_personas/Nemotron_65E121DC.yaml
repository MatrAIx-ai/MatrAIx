personas:
  professional: Ronald Sullivan, a budding technical artist, fuses hand-drawn illustration, digital painting in GIMP, and Python‑driven generative visuals to produce detailed concept art, and they leverage
    their methodical planning and love of solitary work to stay organized and meet tight project deadlines.
  sports: Ronald Sullivan channels their love of the outdoors into solo hikes and trail runs with the Hixton Outdoor Club, and they cheer on the Green Bay Packers in the fall and the Milwaukee Bucks during
    the NBA season for a seasonal sports fix.
  arts: Ronald Sullivan spends evenings sketching the lakeside scenery to the soundtrack of Debussy and Brian Eno, and they draw inspiration from Hayao Miyazaki’s animation and Saul Bass’s graphic design,
    and occasionally visit the Madison Museum of Contemporary Art to admire James Turrell’s light installations.
  travel: Ronald Sullivan prefers meticulously planned road trips to secluded natural spots, having documented sunrise hikes at Michigan’s Pictured Rocks and dreaming of a solo trek across Iceland’s volcanic
    landscapes, and they always balance these adventures with a modest teen budget.
  culinary: Ronald Sullivan enjoys simple, wholesome meals such as grilled salmon with lemon‑dill quinoa, whips up a spinach‑feta omelet for breakfast, and they treat themselves to a handcrafted oat‑milk
    latte with a dash of cinnamon after long art sessions.
  core: Ronald Sullivan is a solitary, methodical teen who hoards sketchbooks and spare resistors, drinks coffee at midnight, and they often lose entire weekends to a single watercolor experiment.
background:
  cultural: Ronald grew up in Hixton, a small town in Jackson County, Wisconsin, where Midwestern rural culture emphasizes self‑reliance, modesty, and close‑knit community ties. His family has deep roots
    in local farming and small‑business trades, fostering a work ethic centered on practicality and responsibility. The region's Lutheran and Catholic traditions influence community values, though Ronald
    prefers private reflection over formal worship. The surrounding natural landscape—dense woodlands, glacial lakes, and changing seasons—shapes his love for solitude and outdoor exploration. Subtle exposure
    to local folk arts, such as quilting patterns and regional music, informs his aesthetic sensibility, while the supportive neighborly network encourages skill‑sharing and cooperative projects.
attributes:
  skills: '[''Sketching'', ''Digital illustration'', ''Woodworking'', ''Basic automotive maintenance'', ''Python programming'', ''Project planning'', ''Photography'']'
  hobbies: '[''Sketching'', ''Watercolor painting'', ''Nature photography'', ''Hiking'', ''Reading science‑fiction'', ''Arduino tinkering'', ''Listening to instrumental music'']'
  career_goals: Ronald plans to earn his GED and enroll in a community‑college program that merges art and technology, such as a certificate in technical illustration, CAD, or game art production. His long‑term
    ambition is to work as a technical artist for a video‑game or simulation studio, allowing him to apply his drawing talent, programming know‑how, and systematic workflow in a quiet, focused environment.
    As a practical backup, he is interested in completing an apprenticeship in automotive mechanics or custom furniture making, providing a stable, hands‑on career that fits his preference for solitary,
    independent work.
