  hobbies: '[''Softball'', ''Hunting'', ''Fishing'', ''Camping'', ''Volunteer work at church'', ''Home improvement projects'', ''Car restoration'', ''Woodworking'', ''Electronics tinkering (Arduino)'',
    ''Attending county fairs'']'
  career_goals: Thomas aims to become a certified CNC programmer and obtain NIMS Level III certifications in machining and welding. Over the next five years, he hopes to advance to a shift supervisor role,
    then move into plant management where he can influence process improvements and integrate emerging technologies such as additive manufacturing. Ultimately, he dreams of opening his own small‑scale machining
    shop that serves local agricultural and manufacturing businesses, combining his practical expertise with his curiosity for new production methods.
