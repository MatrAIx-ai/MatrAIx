persona_description: A healthcare professional who is concerned about the relationship between medication and depression. They are interested in the medical conditions that can lead to depression, as well
  as the medications that may contribute to depression. They are looking for evidence-based information on the association between depression and medication, and are seeking to understand how to treat depression
  in patients who are taking certain medications. They are open to exploring alternative factors that may contribute to depression, such as chronic illness, social factors, and past history with depression.
  They are also interested in the potential for drug-induced depression to be a contributing factor to depression in elderly individuals.
