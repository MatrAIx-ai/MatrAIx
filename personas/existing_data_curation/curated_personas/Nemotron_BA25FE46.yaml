  career_goals: Olga’s primary ambition is to stay healthy, independent, and socially connected as she ages. She hopes to deepen her involvement at the local senior center by teaching a weekly cooking class
    that showcases classic Puerto Rican recipes, thereby preserving her heritage for younger residents. She also plans to complete a short community‑college course on basic computer skills so she can more
    confidently join video calls with her family in Puerto Rico and maintain regular contact with her grandchildren. Maintaining physical well‑being is another goal; she intends to join a low‑impact exercise
    group at the community center and keep up her gardening routine for fresh produce. Additionally, Olga would like to document her family’s recipes and stories in a small memoir, a project that combines
    her love of storytelling with her competitive streak to create a polished, publish‑ready booklet. Finally, she seeks to manage her worry and stress through regular journaling and occasional mindfulness
    workshops offered by the local health clinic.
