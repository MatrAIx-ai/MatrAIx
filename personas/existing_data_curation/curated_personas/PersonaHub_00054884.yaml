persona_description: A historian or archaeologist who specializes in the study of ancient Chinese tombs and their contents, particularly focusing on the burial goods and the games played in them. This individual
  is interested in understanding the cultural and social context of the time and the beliefs and practices of the people during the Eastern Han dynasty. They have a keen interest in the ancient Chinese
  belief that the afterlife was similar to the living world, and how this belief influenced the design and contents of the tombs. They are also likely to be interested in the use of lead glazes in Chinese
  pottery and porcelain, as well as the intricate details of the games played in the tombs.
