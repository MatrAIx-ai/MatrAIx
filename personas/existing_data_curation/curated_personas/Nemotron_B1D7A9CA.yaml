  career_goals: James aims to finish high school and enroll in a vocational program focused on automotive technology or engineering technology. He aspires to earn certification as an automotive technician,
    eventually working for a reputable local dealership or starting his own garage. The structured environment of a skilled trade appeals to his desire for predictability, and he also entertains the possibility
    of a future role in law enforcement or firefighting, where clear protocols and teamwork are essential. In the longer term, James hopes to combine his technical expertise with entrepreneurship, maintaining
    a stable, community‑oriented career.
