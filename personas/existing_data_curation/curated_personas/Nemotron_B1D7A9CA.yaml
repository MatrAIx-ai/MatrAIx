personas:
  professional: An aspiring teen engineer named James Shurling channels a love for structured problem‑solving into hands‑on projects like bike repairs, small engine tinkering, and intricate LEGO builds,
    blending the teamwork he practices on the community basketball court with a methodical, self‑directed learning style that values reliability and clear outcomes.
  sports: James Shurling plays point guard for a local youth basketball league, follows the Cleveland Cavaliers and Cleveland Browns avidly, maintains fitness through scheduled weekend bike rides and hikes
    in Cuyahoga Valley State Park, and approaches each practice as a structured mission that balances teamwork and personal endurance.
  arts: James Shurling spends evenings immersed in the sci‑fi works of Isaac Asimov and Orson Scott Card, streams Hans Zimmer’s cinematic scores while assembling LEGO Star Wars sets, and curates a soundtrack
    of Foo Fighters and classic video‑game music that fuels both his creative builds and strategic gaming sessions.
  travel: James Shurling favors short, self‑planned road trips that blend adventure with a teenage budget, having explored Hocking Hills State Park and the Smithsonian museums in Washington, D.C., while
    dreaming of a future visit to Japan’s Tokyo Game Show to experience cutting‑edge gaming culture.
  culinary: James Shurling is a novice cook who reliably prepares classic pepperoni pizza, mac and cheese with cheddar and mozzarella, and homemade chocolate chip cookies, while also experimenting with
    a grilled‑cheese‑plus‑tomato‑basil twist using fresh basil and heirloom tomatoes from the local farmer’s market.
  core: James Shurling is a structure‑loving teen who balances basketball teamwork with solitary LEGO builds, saves methodically for hobby upgrades, occasionally skips rest for shin‑splint pain, and powers
    late‑night gaming sessions with pizza and a playlist of rock anthems.
background:
  cultural: James grew up in Olmsted Falls, a suburban community in Cuyahoga County, Ohio, within a predominantly white, middle‑class Midwestern setting. His family values emphasize hard work, reliability,
    and community involvement, often expressed through participation in local church events, school functions, and the annual county fair. He identifies with mainstream American cultural norms such as supporting
    the Cleveland Browns and Guardians, valuing independence, and respecting personal space. While his household maintains traditional values, it encourages practical skill development and modest ambition,
    reflecting the region’s blend of individualism and neighborly cooperation.
attributes:
  skills: '[''Basic computer operation (Word, Excel, internet research)'', ''Fundamental mechanical troubleshooting (bicycles, vehicles)'', ''Time management and scheduling'', ''Team collaboration and assertive
