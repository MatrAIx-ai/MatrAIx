personas:
  professional: Levern Kirkey is a 22‑year‑old hands‑on problem solver who combines their automotive curiosity with a budding expertise in electric‑vehicle diagnostics, leveraging disciplined project planning
    and a competitive drive to excel in a community‑college apprenticeship while eyeing a future mobile service business.
  sports: Levern Kirkey is a regular at the neighborhood park where they shoot hoops for the local pickup basketball league, follow the NBA’s Miami Heat, and play for the downtown recreational team "The
    Metro Hoops", while supplementing fitness with weekend runs at the nearby trail, reflecting a competitive edge and need for both social and solo activity.
  arts: Levern Kirkey finds rhythm in early‑evening playlists featuring Kendrick Lamar, J. Cole, and H.E.R., attends the monthly downtown jazz‑blues showcase at the local arts center, and occasionally experiments
    with DIY graffiti art on their garage wall, using it as a creative release after a day’s technical work.
  travel: Levern Kirkey prefers short road trips to Southern culinary towns like Nashville, Savannah, and New Orleans, planning routes on their phone and balancing wanderlust for new flavors with budget
    constraints, while dreaming of a future cross‑country drive to the Pacific Northwest to test the upcoming EV conversion project.
  culinary: Levern Kirkey enjoys cooking budget‑friendly Southern comfort dishes such as shrimp and grits, smoked brisket, and fried catfish, seasoning with smoked paprika, cayenne pepper, and hot sauce,
    and delights in tweaking recipes while keeping a well‑stocked pantry of staples like cornmeal, black‑eyed peas, and fresh herbs.
  core: Levern Kirkey is a practical, competition‑driven tinkerer who blends hands‑on auto work with budget‑savvy cooking and a love for basketball, all while juggling a skeptical yet reliable outlook on
    people and projects.
background:
  cultural: Levern identifies as African‑American and was raised in Garland, Texas, a multicultural suburb of Dallas County. His upbringing blends Southern Texas customs with the rich heritage of the Black
    community—family gatherings centered around soul food, weekly church services, and a deep appreciation for gospel and contemporary Black music. Growing up in a predominantly working‑class neighborhood,
    he learned the value of hard work, self‑reliance, and community solidarity. The local culture, with its emphasis on sports, especially basketball, and a vibrant neighborhood network, has shaped his
    worldview, fostering both a competitive spirit and a supportive attitude toward family and friends.
attributes:
  skills: '[''Automotive maintenance and repair'', ''Basic computer hardware troubleshooting'', ''Microsoft Office proficiency'', ''Budgeting and personal finance management'', ''Project planning and execution'',
    ''Critical thinking and problem solving'', ''Conflict de‑escalation'', ''DIY home improvement'']'
  hobbies: '[''Basketball'', ''DIY electronics projects'', ''Strategy video gaming'', ''Cooking southern comfort food'', ''Listening to hip‑hop and R&B'', ''Attending community events'']'
  career_goals: Levern’s primary career ambition is to obtain a trade certification—preferably as an automotive technician with a focus on electric‑vehicle systems or as a journeyman electrician—so he can
    provide a reliable income for his family. He plans to enroll in a community‑college apprenticeship program within the next year, combining classroom learning with on‑the‑job training. His competitive
    nature fuels a longer‑term goal of launching his own mobile auto‑service business, where he can apply both time‑tested repair methods and the latest diagnostic technologies. He also hopes to continue
    developing his project‑management skills to eventually oversee a small crew, balancing his practical experience with innovative solutions.
