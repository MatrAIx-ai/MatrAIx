  career_goals: Contessa’s primary career ambition is to earn a bachelor’s degree in elementary education and obtain state certification so she can transition from teaching assistant to full‑time classroom
    teacher. She plans to complete her coursework at a nearby community college while maintaining her current job, leveraging her competitive drive to achieve top grades. In the longer term, she hopes to
    become a lead teacher or curriculum coordinator, where she can design structured, practice‑oriented lesson plans that reduce uncertainty for both students and staff. She also aims to obtain a specialization
    in special‑education support, allowing her to create reliable accommodations for diverse learners and further cement her reputation as a dependable educator within the Youngsville school district.
