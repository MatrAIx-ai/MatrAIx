persona_description: A prominent political figure who played a significant role in the growth and survival of Missouri's Normal School system, advocating for its expansion and survival during a time of
  economic hardship. Vandiver is known for his efforts to recruit students and for his advocacy for the preservation of the state's educational system, which led to the coining of the Show Me State phrase.
  His political career, marked by his election to Congress, also reflects his interest in pursuing a career in politics.
