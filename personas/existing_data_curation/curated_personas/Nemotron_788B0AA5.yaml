  career_goals: Israel aspires to advance from the production line to a supervisory position within the next two to three years, aiming to lead a shift and mentor newer workers. He plans to earn his GED
    and enroll in an associate‑degree program in industrial technology at a community college, focusing on lean manufacturing and Six Sigma principles. By obtaining a Yellow Belt certification, he hopes
    to formalize his process‑improvement skills and become a key driver of efficiency initiatives. Long‑term, Israel envisions managing an entire plant or launching a small, locally owned workshop that
    combines his interests in manufacturing and woodworking, while also building the personal resilience needed to handle the pressures of leadership.
