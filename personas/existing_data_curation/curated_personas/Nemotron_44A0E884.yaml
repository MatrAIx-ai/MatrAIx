personas:
  professional: Willie Westbrook is a veteran wood‑sawing machine setter, operator, and tender who leverages his three‑decade mastery of band and circular saws, CNC stations, and lean‑manufacturing principles
    to meticulously calibrate equipment, enforce safety standards, and mentor junior staff, all while applying his methodical, routine‑driven nature to drive efficiency and reliability on the plant floor.
  sports: Willie Westbrook enjoys early‑morning fishing trips on Lake Murray and is a loyal supporter of the Oklahoma City Thunder, attending games with friends and participating in the local fishing club,
    while maintaining a modest fitness routine of weekend walks and light weight‑lifting to keep their back supple for workshop projects.
  arts: Willie Westbrook immerses in classic blues and soul while woodworking, often playing B.B. King, Muddy Waters, and Aretha Franklin, and they regularly attend live gospel performances at the local
    Baptist church and collect biographies of influential leaders for inspiration, blending music and literature into their creative process.
  travel: Willie Westbrook approaches travel with a methodical, road‑trip mindset, planning detailed itineraries for day trips to historic Route 66 towns in Oklahoma, annual fishing excursions to Texas
    Hill Country, and dreaming of a leisurely pilgrimage to the Blue Ridge Parkway once retirement funds permit, balancing modest budget constraints with a desire for relaxed, scenic experiences.
  culinary: Willie Westbrook enjoys hearty Southern comfort food, expertly grilling catfish with a light lemon‑pepper rub, preparing roasted sweet potatoes seasoned with thyme, and growing tomatoes for
    fresh salsa, while their cooking skill sits at an intermediate level, favoring home‑cooked meals over restaurant dining.
  core: Willie Westbrook is a meticulously routine‑driven wood‑processing expert who channels his calm competitiveness into precise machine work, disciplined finances, and a quiet passion for fishing, blues
    music, and handcrafted furniture, all while occasionally neglecting minor health appointments in favor of the next project.
background:
  cultural: Willie Milton Westbrook grew up in the historically African‑American neighborhoods of Oklahoma City, where his grandparents migrated from the rural South during the mid‑20th‑century Great Migration.
    Raised in a close‑knit, faith‑centered family, he attended a local Baptist church that emphasized community service, perseverance, and respect for tradition. The cultural values of resilience and self‑reliance,
    reinforced by the legacy of the Black labor movement in the Midwest, shaped his pragmatic outlook. Music from the blues, gospel, and soul traditions formed the soundtrack of his youth, and family gatherings
    often featured soul‑food dishes such as collard greens, cornbread, and fried catfish. Willie’s identity as a Black tradesman is a source of pride; he views his role in the lumber industry as contributing
    to the economic stability of his community. He actively participates in Juneteenth celebrations and mentors younger African‑American apprentices, hoping to preserve and advance the legacy of Black craftsmanship
    in Oklahoma.
attributes:
