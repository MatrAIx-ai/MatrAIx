  career_goals: Jorge aims to become a senior software engineer within the next three years, leading the design of cloud‑native agritech solutions. He plans to earn AWS Solutions Architect and Certified
    Kubernetes Administrator certifications, contribute to high‑impact open‑source projects, and win regional hackathons to sharpen his competitive edge. In the longer term, he envisions founding a startup
    that leverages AI to optimize irrigation for small farms in California’s Central Valley or stepping into a technical leadership role such as CTO at a midsize tech firm. He sets quarterly milestones,
    seeks mentorship, and balances practical skill development with continual learning of emerging technologies.
