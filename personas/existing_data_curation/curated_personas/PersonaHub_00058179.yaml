persona_description: A person who is interested in social and economic issues, particularly in the context of housing and tenant rights. This individual may have a background in urban planning, sociology,
  or economics, and is familiar with the impact of gentrification and the displacement of working-class communities. They are likely to be active in local community organizations and advocate for the rights
  of renters and tenants. They are passionate about the power of collective struggle and the importance of standing up against predatory landlords and developers. They are also likely to be aware of the
  role of REITs in gentrification and the need for more transparency and accountability in the housing market.
