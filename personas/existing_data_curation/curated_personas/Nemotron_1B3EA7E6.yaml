  hobbies: '[''Sketching'', ''Photography'', ''Hiking'', ''Playing acoustic guitar'', ''Reading speculative fiction'', ''Visiting art galleries'', ''Digital illustration'', ''Board game nights'', ''Exploring
    street murals'', ''DIY crafts'']'
  career_goals: Joseph plans to complete a bachelor's degree in elementary education within the next two years and later pursue a master's focused on curriculum innovation. He aims to become a lead teacher
    or curriculum specialist, designing interdisciplinary, arts‑infused programs for his district. Long‑term, he envisions launching an after‑school community art studio that offers flexible, student‑driven
    projects and supports at‑risk youth, blending his love of art with his commitment to education.
