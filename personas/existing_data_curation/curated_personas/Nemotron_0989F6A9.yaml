    software proficiency'', ''Critical thinking and analytical problem solving'', ''Volunteer program development and mentorship'']'
  hobbies: '[''Visiting contemporary art galleries and museums'', ''Attending indie film screenings and live music performances'', ''Experimenting with new recipes and fusion cooking'', ''Reading philosophy
    and modern science non‑fiction'', ''Practicing yoga and meditation'', ''Solving crossword puzzles and Sudoku'', ''Gardening with succulents and native shrubs'', ''Digital photography of street and nature
    scenes'', ''Volunteering at the local cultural center'', ''Learning pottery and calligraphy'']'
  career_goals: Kyung aims to channel her organizational talents into volunteer leadership for local cultural festivals, develop a series of community cooking workshops that blend traditional Korean dishes
    with Californian ingredients, and mentor emerging Korean‑American entrepreneurs through a senior‑led advisory group. She also plans to deepen her digital media skills to curate an online gallery spotlighting
    under‑represented Asian‑American artists, and pursue lifelong learning courses in art history and horticulture, all while maintaining a balanced lifestyle that supports her health and family.
