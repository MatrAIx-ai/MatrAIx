personas:
  professional: An experienced community event coordinator and retail manager, The Go leverages a sharp eye for budgeting, bilingual communication, and a love of contemporary art to orchestrate cultural
    festivals and pop‑up exhibitions, while their competitive streak pushes them to out‑perform previous events and their skepticism keeps them meticulously vetting vendors.
  sports: The Go enjoys weekend hikes in the Santa Ana foothills, attends weekly yoga classes, supports the Los Angeles Dodgers and the LA Lakers, and participates in a community senior cycling club that
    meets for gentle rides, using these activities to counteract the sedentary demands of event planning.
  arts: The Go frequents LACMA and the Laguna Beach Museum of Art, finds inspiration in installations by Olafur Eliasson and Ai Weiwei, devours indie films by Greta Gerwig and Hayao Miyazaki, and curates
    a personal playlist that mixes Sufjan Stevens, Lykke Li, and traditional folk tunes for creative brainstorming.
  travel: The Go prefers meticulously planned road trips that blend cultural immersion with scenic relaxation, having explored Santa Barbara’s coastline, the desert art installations of Sedona, and the
    historic streets of Lisbon, while dreaming of a future escape to the cherry‑blossom‑laden parks of Washington, D.C., all while balancing workshop budgets and family commitments.
  culinary: The Go, an adept home chef, loves perfecting kimchi fried rice with avocado, gochujang‑glazed short ribs paired with grilled corn, and vegan tacos topped with fermented cabbage, often experimenting
    with ingredients like miso, quinoa, and citrus‑infused sauces to blend comforting traditions with California fresh flavors.
  core: The Go is a curiosity‑driven, detail‑obsessed community catalyst who balances meticulous planning with spontaneous art explorations, all while habitually over‑scheduling and occasionally indulging
    in late‑night snack raids.
background:
  cultural: Kyung is a first‑generation Korean‑American who grew up in a bilingual household in Southern California, where Korean traditions and language were woven into daily life alongside American customs.
    Her family maintains close ties to the local Korean community, participating in church gatherings, cultural festivals, and culinary celebrations that honor heritage while embracing the multicultural
    vibe of Orange County. This bicultural upbringing instilled a deep respect for elderly wisdom and communal responsibility, yet also nurtured an independent curiosity that drives her interest in contemporary
    art, new ideas, and cross‑cultural dialogue. Kyung’s cultural perspective blends Confucian values of diligence and respect with the openness and innovation characteristic of her Californian environment.
attributes:
  skills: '[''Bilingual communication (Korean & English)'', ''Project coordination and community event planning'', ''Financial budgeting and personal finance management'', ''Digital photography and photo
