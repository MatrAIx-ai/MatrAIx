  career_goals: Leonardo already expresses a desire to become a firefighter, eager to wear a helmet and slide down a pole, and he often tells adults he wants to "help people" and "be big". He also shows
    enthusiasm for space, pointing at picture books and saying he wants to "fly to the stars". His short-term ambitions include learning to read simple words, riding a tricycle without training wheels,
    and winning the next block-building contest at preschool. These early aspirations reflect his competitive streak and his love of being recognized.
