  hobbies: '["Oil painting", "Visiting art galleries and museums", "Reading speculative fiction and popular science", "Native plant gardening", "Birdwatching in wetlands", "Yoga and meditation", "Nature
    photography", "Volunteer STEM tutoring for middle‑school students"]'
  career_goals: After a period focusing on family and personal well‑being, Holli aims to re‑enter the professional realm by securing a senior data analyst or environmental consultant role where she can
    leverage her analytical and project‑management expertise. She is also interested in launching a community‑based environmental education nonprofit that blends scientific literacy with creative arts,
    and hopes to publish interdisciplinary articles that explore the intersection of ecology and visual storytelling. Long‑term, she envisions pursuing a PhD in environmental science to deepen her research
    credentials, while mentoring young women in STEM and building a balanced career that supports her mental health.
