personas:
  professional: Holli Sutherland is a senior data analyst and environmental consultant whose quantitative expertise in Python, GIS mapping, and water-quality modeling is paired with a methodical, competitive
    drive and a curiosity for blending scientific rigor with visual storytelling, positioning her to lead multidisciplinary projects while mentoring women in STEM.
  sports: Holli Sutherland is a devoted fan of the LSU Tigers football team and the New Orleans Saints, participates in weekly yoga classes for flexibility, jogs along the Mississippi River levee each sunrise,
    and holds a membership with the Baton Rouge Tennis Club where they compete in friendly doubles matches.
  arts: Holli Sutherland is an oil painter who regularly exhibits at the Shaw Center for the Arts, draws inspiration from the vibrant works of George Rodrigue and the lyrical storytelling of Frida Kahlo,
    and immerses themselves in speculative fiction by authors like N.K. Jemisin and popular science by Elizabeth Kolbert to fuel their creative narratives.
  travel: Holli Sutherland designs travel itineraries on a Trello board, favoring road trips that combine visits to historic New Orleans jazz festivals, weekend bird-watching excursions in the Atchafalaya
    Basin, and occasional overseas pilgrimages to Provence and the Galápagos Islands, balancing a love for adventure with the financial constraints of supporting a growing nonprofit vision.
  culinary: Holli Sutherland's culinary preferences revolve around Creole staples such as shrimp étouffée, jambalaya, and beignets, enhanced by fresh herbs like thyme and sorrel from their own garden, and
    they relish the ritual of pairing each meal with a dash of hot sauce while occasionally over-indulging in homemade pecan pie.
  core: Holli Sutherland blends analytical precision with artistic flair, managing a restless mind through yoga and mindfulness while channeling competitive ambition into environmental consulting, community
    education, and a habit of splurging on paint supplies despite a carefully planned budget.
background:
  cultural: Holli is a white Southern woman who grew up in the Greater Baton Rouge area of Louisiana. Her family has deep roots in the region, where traditions such as attending church services, sharing
    Creole‑influenced family meals, and participating in local festivals like Mardi Gras were part of everyday life. The multicultural tapestry of Baton Rouge, with its French‑Cajun heritage, vibrant music
    scene, and strong emphasis on community, shaped her appreciation for diverse cultural expressions. While she values these Southern customs, she also embraces a contemporary, progressive outlook that
    encourages lifelong learning, artistic exploration, and civic engagement.
attributes:
  skills: '["Python programming", "Statistical data analysis", "GIS mapping", "Environmental risk assessment", "Experimental design", "Technical writing", "Project management", "Graphic design for data
