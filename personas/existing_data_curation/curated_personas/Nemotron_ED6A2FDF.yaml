    orientation'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and digital illustration'', ''Urban photography'', ''Experimental art workshops (e.g., pottery, mixed media)'', ''Reading speculative fiction'',
    ''Listening to world and avant‑garde music'', ''Cooking Honduran cuisine'', ''Yoga and mindfulness practice'', ''Volunteering at cultural festivals'']'
  career_goals: Monserrate aspires to pursue a bachelor's degree in Fine Arts or Visual Communication, followed by a professional role as an art curator or program coordinator for a museum or cultural center
    that highlights Latinx and emerging artists. She aims to build a strong portfolio, secure internships in museum education, and eventually establish a nonprofit art space in New Jersey that fosters community
    engagement through workshops and exhibitions. Long‑term, she envisions earning a master's in Museum Studies to lead larger institutional initiatives.
