  career_goals: William aspires to combine his artistic passion and technical curiosity into a career as a creative technologist or interactive media designer. He dreams of studying graphic design and computer
    science in high school, eventually attending a university where he can specialize in game development, animation, or user‑experience design. He hopes to earn scholarships for his art portfolio and robotics
    achievements, and to win regional competitions that showcase his innovative projects. In the long term, he wants to lead a multidisciplinary studio that creates immersive digital experiences, while
    also mentoring younger students to help them develop both creative and analytical skills. He is determined to channel his competitive spirit into professional excellence and to develop strategies for
    managing stress so he can thrive in fast‑paced creative environments.
