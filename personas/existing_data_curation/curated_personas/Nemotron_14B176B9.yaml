personas:
  professional: William Horning is an aspiring visual storyteller who blends hand‑sketched characters, digital tablet illustrations, and Arduino‑driven LED light displays into cohesive multimedia projects,
    applying their methodical planning, competitive drive, and curiosity for unconventional ideas.
  sports: William Horning plays pick‑up basketball three times a week at Arlington Heights Park as a member of the Chicago Youth Basketball League, roots for the Chicago Bulls and Chicago Bears, and treats
    each game as a chance to test their competitive edge while also using the sport to release built‑up tension.
  arts: William Horning sketches characters inspired by Alan Moore’s dark humor, devours graphic memoirs such as Art Spiegelman’s *Maus*, and fuels their creative sessions with playlists featuring indie
    rock band Vampire Weekend, jazz legend John Coltrane, and electronic duo Daft Punk, while dabbling on guitar chords echoing The Strokes.
  travel: William Horning enjoys weekend road trips to the Milwaukee Art Museum and family vacations to New York City’s Museum of Modern Art, yet dreams of a summer art‑focused adventure in Paris to wander
    the Montmartre streets, balancing a love for cultural immersion with the practical constraints of a busy teen schedule.
  culinary: William Horning prefers classic Chicago deep‑dish pizza, loves crafting homemade chili with kidney beans, jalapeños, and a dash of cocoa, can confidently make a basic grilled cheese, and experiments
    with chia‑seed smoothies for a health‑boosting snack after basketball practice.
  core: William Horning is a curiosity‑driven teen whose competitive streak, methodical mindset, and occasional anxiety fuse art, tech, and debate into a vivid, sometimes stress‑tinged personal narrative.
background:
  cultural: William grew up in the middle‑class suburb of Rolling Meadows, Illinois, a community shaped by the cultural traditions of the Midwest. His family traces its roots to German and Polish immigrants
    who settled in the Chicago area in the early 20th century, and they maintain a blend of customs such as celebrating Oktoberfest with homemade pretzels and attending Polish‑heritage festivals in nearby
    Berwyn. Like many white American families in the region, his household observes the major holidays—Thanksgiving, Christmas, and the Fourth of July—with a focus on community gatherings, backyard barbecues,
    and local fireworks displays. The proximity to Chicago gives him access to the city’s vibrant art scene, from murals in Pilsen to performances by the Chicago Symphony Orchestra, which have broadened
    his artistic perspective. His school emphasizes extracurricular involvement, encouraging participation in sports, arts, and robotics, reflecting the suburb’s value on well‑rounded development and achievement.
    These cultural influences nurture his curiosity, competitive drive, and appreciation for both traditional and contemporary artistic expressions.
