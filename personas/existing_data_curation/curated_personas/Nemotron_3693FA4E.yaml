personas:
  professional: Ingrid Santiago is a seasoned facilities maintenance specialist with fifteen years of hands‑on experience in HVAC, electrical, and plumbing systems, who leverages her methodical, organized
    nature and bilingual communication skills to lead precise preventive‑maintenance schedules while mentoring new technicians and coordinating diverse crews.
  sports: Ingrid Santiago plays midfield for the Sunset Community Soccer League and trains at the local YMCA, while cheering on the Dallas Cowboys and FC Dallas, and she complements her weekly matches with
    salsa and cumbia dance classes that keep her cardiovascular fitness high during the spring and fall seasons.
  arts: Ingrid Santiago’s artistic life revolves around the church choir where she sings works by Andrea Bocelli and Josh Groban, regular salsa nights that feature music by Celia Cruz and Carlos Vives,
    and occasional visits to the Dallas Museum of Art to view contemporary Latin‑American painters, all of which nourish her outgoing spirit and provide a structured outlet for creative expression.
  travel: Ingrid Santiago prefers well‑planned weekend getaways that blend cultural immersion with relaxation, such as a culinary tour of New Orleans’ Creole cuisine, a music‑focused trip to Austin’s South‑by‑Southwest
    festival, and a dream itinerary to Granada, Spain, to experience flamenco and historic palaces, balancing family obligations with a modest travel budget.
  culinary: Ingrid Santiago loves preparing hearty, spice‑rich dishes like pozole, tamales, and chiles rellenos, expertly using corn masa, chipotle peppers, and fresh cilantro, and she balances her cooking
    skill—solid but not professional—by hosting potluck nights where she exchanges recipes and enjoys tasting diverse fare, while also appreciating a occasional fine‑dining experience at a farm‑to‑table
    restaurant.
  core: Ingrid Santiago blends methodical precision with a sociable, competitive edge, juggling a structured maintenance career, disciplined finances, health monitoring, and vibrant community activities,
    all while battling a lingering worry‑prone mindset and an occasional habit of over‑committing to social events.
background:
  cultural: Ingrid was raised in a bicultural Mexican‑American household in Southern California, where Spanish was spoken at home and Mexican customs were woven into daily life. Family gatherings, holiday
    celebrations such as Día de los Muertos and Cinco de Mayo, and regular visits to the local Catholic church have reinforced her strong sense of community and cultural identity. Living in Anaheim, she
    stays connected to the broader Mexican diaspora by attending cultural festivals, supporting local Mexican businesses, and maintaining close ties with extended family in both the United States and Mexico.
    Her bilingual fluency and respect for traditional values shape her interpersonal interactions and community involvement.
attributes:
  skills: '["HVAC maintenance", "Electrical troubleshooting", "Plumbing repairs", "Preventative maintenance planning", "Technical schematics interpretation", "Safety inspections (OSHA/EPA)", "Inventory
    management", "Bilingual communication (Spanish/English)", "Team training and mentorship", "Scheduling and logistics coordination"]'
  hobbies: '["Community soccer league", "Salsa and cumbia dance classes", "Mexican cooking and potluck gatherings", "Community garden volunteering", "Church choir participation", "Guided meditation", "Gratitude
    journaling"]'
  career_goals: Seeking to advance into a supervisory or lead maintenance position within her current facility or a larger property management firm, Ingrid aims to obtain certifications such as the EPA
    Section 608 for refrigerants, an OSHA 30‑hour safety certification, and a Certified Maintenance & Reliability Professional (CMRP) credential. She is pursuing an associate degree in Facilities Management
    to complement her practical experience. In the long term, she aspires to launch her own small maintenance contracting business, giving her greater control over work schedules and the ability to provide
    structured, reliable services to local small‑business owners. Financial stability and predictable work hours are key priorities to support her married life and manage stress.
