persona_description: A group of young researchers who are working together to improve the treatment of acute myeloid leukemia (AML) by developing a nanoparticle-based delivery system that can specifically
  target and destroy cancer cells. The team includes Rudi Fasan, a chemist who discovers and modifies a small-molecule anti-cancer drug derived from a natural plant source related to the magnolia tree,
  Danielle Benoit, an engineer who develops a nano-delivery system that can transcend the barriers that sometimes prevent drugs from reaching their target, and Ben Frisch, a researcher who studies the bone
  marrow environment for clues as to why blood cancers flourish there. The team won a 2016-17 University Research Award to generate data to compete for larger grants from the National Cancer Institute,
  the Leukemia and Lymphoma Society, and the Leukemia Research Foundation.
