personas:
  professional: Jia Bae, a veteran visual designer with two decades of expertise in branding, UI, and print for tourism, channels their competitive, detail‑oriented mindset and relaxed, flexible scheduling
    into bold, culturally nuanced concepts that marry experimental ideas with proven design standards.
  sports: Jia Bae, an avid surfer who catches early‑morning waves at Oahu’s North Shore, regularly hikes the Makapuʻu trail, practices tai chi at Kapiʻolani Park, belongs to the North Shore Surfers club,
    and roots for the Hawaii Rainbow Warriors and the Los Angeles Lakers, approaches fitness with a competitive edge tempered by a relaxed, flexible mindset.
  arts: Jia Bae, a sketch‑loving designer who spins vinyl classics from Miles Davis and John Coltrane while admiring the photographic compositions of Annie Leibovitz and the minimalist typography of Massimo
    Vignelli, blends visual art and music into a personal creative ritual that fuels both work and leisure.
  travel: Jia Bae, a traveler who has explored the historic streets of Kyoto, the bustling markets of Seoul, the scenic Hana Highway on Maui, and dreams of trekking the Great Wall of China, prefers flexible,
    last‑minute itineraries that balance surf sessions, design inspiration, and cultural immersion while keeping travel costs within a modest budget.
  culinary: Jia Bae, an experimental home cook who fuses gochujang‑marinated Mahi Mahi tacos with pineapple salsa and creates kimchi‑poke bowls seasoned with toasted sesame and shiso, demonstrates advanced
    DSLR‑inspired plating skills and delights in sourcing locally grown taro and lemongrass for inventive dishes, yet often forgets to label leftovers, leading to occasional food waste.
  core: Jia Bae is a calm, competitively skeptical 45‑year‑old designer who balances surf‑driven spontaneity with meticulous visual storytelling, yet habitually misplaces project files and forgets routine
    appointments.
background:
  cultural: He is a second‑generation East Asian American of Korean ancestry, raised in a bilingual household that celebrated both Korean traditions and the multicultural spirit of Hawaii. Growing up in
    Honolulu, he absorbed native Hawaiian values of aloha and respect for the land, while his family maintained Lunar New Year celebrations and Korean culinary practices. This blend of heritage informs
    his aesthetic sensibility, leading him to merge minimalist Korean design cues with the vibrant, nature‑inspired palette of the islands. Fluent in English and conversational Korean, he often serves as
    a cultural bridge in collaborative projects involving mainland and Asian partners.
attributes:
  skills: '[''Graphic Design'', ''User Interface (UI) Design'', ''Brand Identity Development'', ''Print Layout and Production'', ''Illustration'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'',
    ''Basic HTML/CSS'', ''User Experience (UX) Research'', ''Motion Graphics (After Effects)'', ''Prototyping and Wireframing'']'
  hobbies: '[''Surfing'', ''Hiking'', ''Landscape Photography'', ''Fusion Cooking (Korean-Hawaiian)'', ''Vinyl Record Collecting'', ''Reading Design & Technology Books'', ''Attending Design Meet-ups'',
    ''Tai Chi'', ''Sketching'', ''Traveling to Asian Cultural Sites'']'
  career_goals: He aims to launch a boutique design studio that specializes in culturally resonant branding for local Hawaiian businesses and Pacific Islander markets, while also pursuing national design
    competitions to showcase his work. He wants to mentor emerging designers, develop a signature style that fuses Korean minimalism with Hawaiian organic motifs, and eventually publish a coffee‑table book
    of his projects. His long‑term ambition includes expanding into product design and experiential installations for cultural festivals, all while maintaining a flexible schedule that lets him balance
    creative spontaneity with practical client deliverables.
