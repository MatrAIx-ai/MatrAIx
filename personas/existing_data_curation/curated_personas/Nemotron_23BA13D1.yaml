personas:
  professional: Michelle Duncan is a warehouse logistics specialist who expertly operates forklifts and pallet jacks, manages inventory via WMS software, and enforces OSHA safety standards, applying her
    detail‑oriented, routine‑loving mindset while flexibly adjusting to shifting schedules to keep the supply chain humming.
  sports: Michelle Duncan stays fit by hiking the Ozark foothills with the Ozark Trailblazers club, playing occasional weekend softball in a local league, and rooting for the St. Louis Cardinals in baseball
    and the Arkansas Razorbacks in college football, preferring low‑impact endurance activities and friendly competition over high‑intensity sports.
  arts: Michelle Duncan finds creative solace in crafting simple furniture and soaking up country‑music hits from Garth Brooks and Carrie Underwood at neighborhood barbecues, while winding down with classic
    mystery novels by Agatha Christie and Dashiell Hammett, letting the mix of hands‑on art and storytelling fuel their practical imagination.
  travel: Michelle Duncan prefers spontaneous weekend road trips to nearby gems like Hot Springs National Park and the Ozark National Forest, occasionally planning longer drives to Nashville for its music
    scene or to the Texas Hill Country for a trucking expo, balancing a modest travel budget with a love for off‑the‑beaten‑path exploration.
  culinary: Michelle Duncan enjoys cooking hearty meals featuring home‑grown sweet potatoes, kale, and heirloom tomatoes, often grilling chicken with roasted root vegetables and cornbread, while their moderate
    cooking skill shines in whipping up DIY BBQ sauces spiced with smoked paprika and chipotle.
  core: Michelle Duncan is a self‑reliant logistics pro who can troubleshoot a forklift and a garden fence in the same afternoon, yet habitually lets their tool‑shopping cart overflow with impulse buys,
    despite a tight budget.
background:
  cultural: Michelle grew up in the rural outskirts of Paragould, Arkansas, in a white, working-class family that valued self-reliance, hard work, and community solidarity. Her upbringing was shaped by
    the Southern agrarian tradition, with strong ties to local churches and school events. The region's pragmatic, down-to-earth culture reinforced her preference for structure and practicality while also
    fostering her flexible, go-with-the-flow attitude toward daily life. Local customs—such as weekend barbecues, support for high-school sports, and an emphasis on neighborly assistance—remain an important
    part of her identity.
attributes:
  skills: '[''forklift operation (certified)'', ''pallet jack handling'', ''inventory control (WMS)'', ''loading and unloading freight'', ''basic equipment maintenance'', ''OSHA safety compliance'', ''time
