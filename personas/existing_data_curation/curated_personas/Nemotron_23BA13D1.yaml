  hobbies: '[''gardening'', ''hiking'', ''DIY woodworking'', ''home-repair projects'', ''reading practical guides'', ''reading mystery novels'', ''attending local country-music barbecues'', ''watching high-school
    football games'']'
  career_goals: Michelle aims to build a more stable career trajectory within the supply-chain sector. Over the next two years she plans to earn a Commercial Driver's License (CDL) and advanced forklift
    certification, positioning herself for a driver-operator role that offers higher pay and more autonomy. She also seeks a supervisory position on her current shift, where she can apply her reliability
    and practical mindset to train new staff and improve workflow efficiency. Long-term, she aspires to own a small regional trucking or logistics service, leveraging her hands-on experience and local network.
