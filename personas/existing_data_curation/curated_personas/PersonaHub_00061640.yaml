persona_description: A researcher and scientist in the field of immunology and dermatology, specializing in the development and testing of novel treatments for atopic dermatitis (AD). Anna-Lena Spetz is
  the lead researcher on the MedON project, which aims to develop a patented molecule that relieves the itching associated with AD. She is a professor at Stockholm University and has extensive experience
  in immunology and dermatology, with a particular focus on the molecular mechanisms underlying the disease. The MedON project is currently working on developing formulations for delivering the molecule
  to the skin, as well as conducting pre-clinical studies and seeking funding for clinical trials.
