persona_description: A public health researcher interested in understanding the dynamics of infectious disease outbreaks, particularly typhoid fever, in a semi-urban setting in the Democratic Republic of
  Congo. This person is interested in mapping hot spots for transmission and assessing the impact of military camps on the spread of the disease. They are particularly interested in understanding the socio-demographic
  characteristics, sanitation practices, and sources of drinking water of individuals who have been infected with typhoid fever. This person is likely to have experience in epidemiological research, microbiological
  analysis, and structured interview questionnaire design. They are also likely to have a background in public health and infectious disease.
