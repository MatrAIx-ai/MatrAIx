persona_description: A neurologist who specializes in the study of the trigeminal nerve and its reflexes, particularly the common examples of referred pain and their associated causes. His research interests
  include, but are not limited to, the pathophysiology of trigeminal neuralgia, the effects of dental caries on trigeminal nerve reflexes, and the clinical management of trigeminal neuralgia. He is also
  interested in the use of imaging techniques, such as MRI, to diagnose and treat trigeminal neuralgia.
