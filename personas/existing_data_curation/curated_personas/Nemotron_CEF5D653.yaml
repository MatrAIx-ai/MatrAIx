personas:
  professional: Dong So is an experienced accountant and auditor who blends a practical, data‑driven approach with a curiosity for emerging fintech, excelling in GAAP, IFRS, Power BI, and automation while
    mentoring junior staff and assertively championing digital transformation within his firm.
  sports: Dong So stays active by playing third base in Milwaukee's community softball league, hiking sections of the Ice Age Trail with the Milwaukee Trailblazers club, cheering the Brewers, Packers, and
    Bucks, and they schedule weekend rides on a vintage road bike during the spring cycling season.
  arts: Dong So fuels their social side through weekly improv workshops with the Milwaukee Improv Troupe, occasional karaoke nights featuring classics like 'Bohemian Rhapsody,' and volunteering as a financial
    advisor for a local nonprofit theater, while they regularly attend concerts by John Legend and the Milwaukee Symphony Orchestra.
  travel: Dong So prefers flexible road trips and curated cultural stops, having explored Portland's craft‑brew scene, hiked the Grand Canyon in spring, attended the Lunar New Year Parade in Seoul, and
    they dream of a summer sailing tour of the Greek islands while balancing budget constraints with family time.
  culinary: Dong So is a confident home chef who regularly grills galbi‑style Korean barbecue, folds pork and vegetable Chinese dumplings with homemade wrappers, and pairs each dish with a thoughtfully
    selected IPA or saison, favoring ingredients like gochujang, sesame oil, and fresh cilantro, while they sometimes over‑season due to an exuberant palate.
  core: Dong So combines a data‑driven audit expertise with a love for community gatherings, a penchant for spontaneous craft‑brew outings, and a relaxed approach to planning that sometimes leaves the laundry
    pile higher than they'd like.
background:
  cultural: Dong So is of East Asian descent, with family roots in South Korea and China. His parents immigrated to the United States in the 1970s, and Dong grew up in the Midwest, blending the values of
    hard work, respect for education, and close‑knit family ties from his heritage with the community‑oriented spirit of Wisconsin. He is bilingual in English and Korean, celebrates Lunar New Year and Chuseok
    with his extended family, and remains active in the local Korean‑American association, where he helps organize cultural events and language classes. This bicultural experience informs his approach to
    teamwork—valuing harmony and consensus while also being comfortable asserting ideas—and fuels his appreciation for both traditional practices and innovative solutions.
attributes:
  skills: '[''Financial statement analysis'', ''Tax preparation'', ''Audit planning and execution'', ''GAAP & IFRS compliance'', ''Data analytics (Excel, Power BI)'', ''Accounting software (QuickBooks,
    SAP, Oracle NetSuite)'', ''Process automation (Alteryx, AI-driven testing)'', ''Client communication'', ''Team mentorship'', ''Risk assessment'', ''Regulatory reporting'']'
  hobbies: '[''Community softball league'', ''Cooking East Asian cuisine'', ''Craft brewery tours'', ''Hiking the Ice Age Trail'', ''Participating in cultural festivals'', ''Financial volunteering for nonprofits'',
    ''Karaoke and improv theater'']'
  career_goals: Dong aims to become a senior manager or partner at his accounting firm within the next five years, leveraging his expertise in technology‑enabled auditing to lead a practice area focused
    on digital transformation. He plans to obtain his Certified Public Accountant (CPA) license (if not already held) and earn a Certified Management Accountant (CMA) designation to broaden his strategic
    finance capabilities. Long‑term, he envisions opening a boutique advisory practice that provides financial planning and forensic accounting services to local nonprofits and small businesses in Ozaukee
    County. He also hopes to mentor the next generation of accountants through the Wisconsin CPA Society and become a speaker on emerging fintech trends at regional conferences.
