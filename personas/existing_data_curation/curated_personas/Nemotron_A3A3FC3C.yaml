  career_goals: Approaching retirement, Sarah aims to secure a part‑time supervisory role that leverages her extensive experience while allowing for a balanced schedule. She plans to earn a certification
    in responsible gambling counseling to transition into a mentorship and advisory capacity, helping younger employees navigate the industry’s challenges. Sarah also hopes to achieve top performance metrics
    in customer satisfaction and cash reconciliation, positioning herself as a go‑to consultant for compliance matters within the casino. In the longer term, she envisions volunteering her expertise at
    community outreach programs focused on senior financial literacy and safe gambling practices.
