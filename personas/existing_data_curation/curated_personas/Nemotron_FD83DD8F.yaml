  career_goals: Janet aims to stage a solo retrospective at a regional gallery in the Hudson Valley within the next five years, accompanied by a limited‑edition art book that documents her explorations
    of abstract concepts. She aspires to establish a collaborative community art space in Putnam County that offers low‑cost studio access and mentorship programs for emerging artists, especially women.
    Continuing her intellectual curiosity, she plans to experiment with unconventional materials such as reclaimed plastics and biodegradable media, seeking to blend environmental awareness with her abstract
    aesthetic. She also hopes to mentor younger artists through informal studio visits and occasional guest lectures at local community centers.
