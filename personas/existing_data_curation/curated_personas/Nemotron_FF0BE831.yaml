  career_goals: Lisa often talks about becoming an artist who paints bright pictures that make people smile, or a teacher who reads stories to younger children. She also dreams of exploring science by discovering
    new insects or caring for animals as a veterinarian. Her aspirations include learning to read all by herself, drawing more complex scenes, and helping friends feel safe when they feel nervous, reflecting
    her blend of creativity, compassion, and desire for personal growth.
