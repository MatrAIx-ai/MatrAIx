personas:
  professional: Lisa Dartt, an aspiring junior scientist who spends afternoons conducting simple kitchen chemistry experiments, applies their natural curiosity and love for new ideas with meticulous cleanup
    routines, yet often frets over spilling liquids, revealing a blend of organized precision and anxious attention to detail.
  sports: Lisa Dartt, a kindergarten soccer enthusiast who proudly wears their local Kids’ Soccer Club jersey during fall practices, loves cheering for the New York Yankees in the spring baseball season,
    and they balance energetic play with occasional fatigue, often needing quiet time after a busy practice.
  arts: Lisa Dartt, a bright‑eyed mini‑artist who adores drawing Mickey Mouse, mimics the colorful brushstrokes of Henri Matisse in picture books, sings along to The Wiggles and Idina Menzel’s ‘Let It Go’,
    and they fill their sketchbook with eclectic doodles that reflect their love for new ideas and unconventional style.
  travel: Lisa Dartt, a wide‑eyed explorer who remembers a family trip to Disney World and a weekend at the beach in Myrtle Beach, dreams of seeing the Eiffel Tower in Paris and the cherry blossoms in Tokyo,
    and prefers short, well‑planned outings that leave room for imaginative play between stops, during which they often ask for a map.
  culinary: Lisa Dartt, a budding kitchen helper who loves mixing banana‑strawberry smoothies, sprinkling shredded cheddar on macaroni and cheese, and arranging colorful fruit kebabs with grapes, strawberries,
    and melon, delights in the tactile feel of dough while they occasionally sneak extra cookies when no one watches.
  core: Lisa Dartt, a curious five‑year‑old who balances meticulous crayon organization with intense bedtime worries, embraces artistic whimsy, and navigates the world with a blend of anxious sensitivity
    and creative daring, often worrying about the next day’s activities and asking themselves countless “what‑ifs” as they plan playtime.
background:
  cultural: Lisa was born into a white family that has lived in Pendleton, Oregon for several generations. The community is centered around agriculture, the annual Pendleton Round-Up, and close ties to
    the nearby Umatilla Indian Reservation, which subtly influences local celebrations and art. Her family emphasizes kindness, hard work, and a love of the outdoors. She attends a preschool that incorporates
    storytelling, art, and nature-based activities, reflecting the broader Pacific Northwest appreciation for creativity and environmental stewardship.
