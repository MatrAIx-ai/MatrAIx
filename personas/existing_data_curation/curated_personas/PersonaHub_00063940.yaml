persona_description: A forest ecologist who specializes in the study of spruce-fir forests in northern Montana and the surrounding ecosystems. She is particularly interested in the interactions between
  tree canopy characteristics, understory vegetation, and major disturbances such as blowdown, insect outbreaks, mixed-severity fire, and stand-replacing fire. She has a strong background in botany, forestry,
  and ecological sciences, and is skilled in conducting research and analyzing data to understand the ecological processes and dynamics of these forests. She is also familiar with the ecological implications
  of climate change and its effects on the spruce-fir forests.
