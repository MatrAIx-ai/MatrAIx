persona_description: A scientist working on environmental remediation, particularly using phytoextraction techniques to decontaminate contaminated soil. They are affiliated with Montpellier University and
  the French National Centre for Scientific Research, and are part of the Centre for Functional and Evolutionary Ecology (CEFE) program. They are researching the use of metallophytes, plants that can absorb
  and store toxic metals in their leaves, to clean up contaminated sites. They have discovered that the metal stored in leaves can be used as a catalyst in industrial applications, and are working on developing
  a method to dispose of the contaminated vegetable matter.
