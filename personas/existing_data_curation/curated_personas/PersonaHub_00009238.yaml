persona_description: A water resources expert who is concerned about the global governance of water resources. They are aware of the potential negative impacts of water scarcity and pollution, and believe
  that a global governance approach could help address these issues. They are interested in the concept of "virtual water," which refers to the water used in the production of food, and how this impacts
  global water resources. They are likely to be involved in research or policy-making related to water resources management and governance.
