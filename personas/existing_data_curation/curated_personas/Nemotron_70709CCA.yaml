personas:
  professional: Steven Richardson is a hands‑on carpenter who blends solid framing expertise with a whimsical flair for folk‑inspired detailing, using a flexible, improvisational workflow that lets their
    curiosity drive client collaborations while sometimes letting paperwork slip through the cracks, and they frequently rely on spontaneous sketches to keep ideas alive.
  sports: Steven Richardson is a weekend angler who casts lines on the Intracoastal Waterway, joins the Wilmington Paddle Club for summer kayaking, roots passionately for the Carolina Hurricanes and Charlotte
    Hornets, and hikes the coastal trail network with the local Outdoor Enthusiasts group, where they find a rhythm that balances relaxation and fitness.
  arts: Steven Richardson is a fixture at the town art co‑op, where they add hand‑painted folk motifs to reclaimed wood under the influence of Rhiannon Giddens’ storytelling songs and The Avett Brothers’
    acoustic tunes, while collaborating on murals that echo the bright palette of Winslow Homer and the kinetic energy of a Banksy stencil.
  travel: Steven Richardson prefers spur‑of‑the‑moment road trips that weave along the Outer Banks, has captured sunrise at Cape Hatteras, trekked the mist‑laden Blue Ridge Parkway in autumn, and dreams
    of a design‑focused pilgrimage to Copenhagen’s Danish Design Museum, all funded through a modest travel savings jar while they budget carefully.
  culinary: Steven Richardson’s palate leans toward low‑country comfort, favoring shrimp and grits seasoned with fresh thyme and smoked paprika, pan‑seared catfish with a side of hushpuppies, and occasional
    wood‑fired pizza topped with heirloom tomatoes and basil, reflecting a functional yet experimental cooking style that they enjoy sharing at community potlucks.
  core: Steven Richardson is a 22‑year‑old carpenter who swaps spreadsheets for splinters, mixes acoustic jam sessions with toolbox tinkering, and, despite a habit of leaving project plans scattered, they
    consistently stitch Southern craft into fresh, eco‑mindful designs.
background:
  cultural: Steven grew up in the close‑knit community of Plymouth, North Carolina, a town steeped in Southern hospitality and maritime heritage. His family has a tradition of woodworking that dates back
    generations, with stories of his grandfather building fishing shacks and boats. The regional culture, with its emphasis on hard work, modesty, and respect for nature, shapes his outlook. He regularly
    partakes in local events such as the Beaufort County Fair and the annual shrimp festival, where he enjoys the blend of Southern cuisine, folk music, and craft demonstrations. These experiences, combined
    with his appreciation for regional folk art and the coastal environment, inform both his personal style and professional ethos.
attributes:
  skills: '[''Residential Framing'', ''Finish Carpentry'', ''Custom Cabinetmaking'', ''Blueprint Reading'', ''Material Estimation'', ''Client Communication'', ''Sustainable Lumber Selection'', ''Basic Electrical
    Wiring'', ''CNC Routing'', ''Furniture Restoration'']'
  hobbies: '[''Sketching furniture designs'', ''Painting reclaimed wood'', ''Coastal hiking and photography'', ''Fishing on Intracoastal Waterway'', ''Participating in community mural projects'', ''Attending
    folk‑music evenings'', ''DIY home‑improvement projects'', ''Learning new woodworking techniques'', ''Playing acoustic guitar'', ''Exploring local art co‑ops'']'
  career_goals: Steven aims to earn his North Carolina Journeyman Carpenter certification within the next two years, then progress to a Master Carpenter designation. He dreams of opening a small boutique
    workshop in Beaufort County where he can design and fabricate custom furniture that blends traditional Southern craftsmanship with contemporary art influences. He also hopes to develop a design‑build
    service that emphasizes environmentally responsible materials and integrates modern technology such as CNC and 3D modeling. In the longer term, he envisions mentoring apprentices and possibly pursuing
    an associate degree in construction management to broaden his project‑leadership capabilities.
