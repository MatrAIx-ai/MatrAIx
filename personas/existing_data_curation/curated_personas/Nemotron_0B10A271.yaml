  hobbies: '[''building custom PCs'', ''playing chess'', ''watching La Liga soccer'', ''hiking in the Appalachian foothills'', ''gaming (strategy and RTS)'', ''photography (landscape)'', ''volunteering
    at a community coding club'', ''weight training'', ''regional eSports tournaments'']'
  career_goals: Juan aims to earn his GED within the next year and then enroll in a community‑college automotive technology program to obtain an ASE certification. His medium‑term ambition is to secure
    a position at a reputable repair shop in Madison County, where he can refine his mechanical skills while saving capital to eventually open a hybrid garage‑and‑custom‑PC shop that services both vehicle
    owners and local gamers. Simultaneously, he plans to achieve a CompTIA A+ certification to expand his IT support capabilities, allowing him to offer freelance tech services to neighbors and small businesses.
    Throughout his career path, Juan seeks financial independence, the opportunity to compete in regional eSports tournaments, and the chance to mentor younger hobbyists in coding and electronics.
