personas:
  professional: An aspiring mini‑architect named Jan Robinson meticulously arranges block towers and sketches simple floor plans on paper, channeling their curiosity and methodical nature into early spatial
    reasoning, while they confidently direct playmates with quiet assurance.
  sports: A playful 3‑year‑old named Jan Robinson delights in preschool soccer at the local community field, proudly wearing the tiny jersey of their hometown baseball team, and also attends a weekly toddler
    gymnastics class, where they balance between energetic jumps and methodical stretches.
  arts: A creative youngster named Jan Robinson swirls watercolor paints and sings along to Raffi and The Beatles, often organizing a tidy collection of coloring books and proudly displaying a hand‑drawn
    picture of a dinosaur, reflecting their love for art and curiosity about new ideas.
  travel: A budding explorer named Jan Robinson enjoys family road trips to the nearby lake and a magical visit to Disney World, where they delight in the bright rides and meticulously collect souvenir
    postcards, balancing the excitement of new sights with the comfort of familiar bedtime routines.
  culinary: A picky little eater named Jan Robinson adores cheesy macaroni, strawberry banana smoothies, and crunchy carrot sticks with hummus, yet they often sneak a bite of chocolate pudding when no one
    is looking, revealing a sweet tooth and a developing palate.
  core: A methodical and curious 3‑year‑old named Jan Robinson neatly stacks blocks, savors sticker trades, battles occasional eczema, and embraces adventure with a side of sugary sneaky bites.
background:
  cultural: Jan comes from a white American family living in Stockton, California, within the diverse San Joaquin County region. Her household celebrates mainstream American holidays such as Thanksgiving
    and Independence Day, while also honoring family traditions rooted in European ancestry, such as baking holiday cookies and sharing multigenerational stories. Growing up in a community with many cultural
    influences, Jan is exposed to varied languages, festivals, and artistic expressions, nurturing her curiosity and appreciation for new ideas and art.
