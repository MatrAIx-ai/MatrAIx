persona_description: A researcher in infectious diseases, particularly in the field of anticoagulation and its effects on the duration of active infection with the SARS-CoV-2 coronavirus. They are interested
  in the use of anticoagulants in the treatment of Covid-19 patients and the potential benefits and risks of their use. They are also interested in the underlying mechanisms of Covid-19-associated coagulopathy
  and the potential causes of the sub-condition. They have a background in virology, immunology, and infectious diseases, and are familiar with the guidelines for the treatment of Covid-19 patients.
