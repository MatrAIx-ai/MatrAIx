persona_description: A researcher in the field of ocean engineering and fluid dynamics, particularly focused on the modeling and simulation of elastic wave propagation in ice shelves. This person is interested
  in understanding the effects of crevasses on the propagation of elastic flexural gravity waves and the thresholds for the emergence of band gaps in the dispersion spectra. They are likely to be interested
  in the application of numerical experiments to study the behavior of elastic waves in ice shelves and the potential implications for ocean engineering and environmental science.
