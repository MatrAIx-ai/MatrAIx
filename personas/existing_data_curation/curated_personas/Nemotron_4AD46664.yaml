personas:
  professional: Raymond Dau, a budding junior architect, spends afternoons constructing elaborate LEGO cities and sketching floor plans, channeling their vivid imagination into early design thinking while
    happily ignoring strict homework schedules.
  sports: Raymond Dau dashes across the grassy fields of the Wilton Community Park, joining the “Wilton Wolves” Mini Soccer team on Saturdays and leading games of tag with their friends, fueling their endless
    energy with a love for outdoor play.
  arts: Raymond Dau is captivated by the bright swirls of Van Gogh’s “Starry Night” and the whimsical worlds of Dr. Seuss, often replicating them with watercolors after Saturday museum workshops at the
    nearby art center, while their playlist of upbeat pop tunes fuels impromptu dance sessions in the living room.
  travel: Raymond Dau’s travel adventures include a family road‑trip to the historic streets of Boston, a day‑long ferry ride to Mystic, Connecticut, and a cherished weekend camping in the woods of the
    Appalachian Trail where they collect pine cones and imagine treasure maps.
  culinary: Raymond Dau’s palate is dominated by cheesy pizza slices, buttery mac and cheese, and their favorite snack—mini turkey and cheese roll‑ups with a dash of honey mustard, which they proudly assemble
    after watching cooking shows on the children’s channel.
  core: Raymond Dau is a six‑year‑old whirlwind of imagination, kindness, and spontaneous creativity, who lives for LEGO adventures, leaf‑collecting expeditions, and the occasional sugary snack, and they
    blissfully ignore the rigid demands of schedules.
background:
  cultural: Raymond is a white American growing up in Wilton, Connecticut, a suburban community in Fairfield County known for its strong emphasis on education, civic involvement, and cultural activities.
    His family celebrates typical American holidays and also incorporates Christian traditions reflected in his name. He is exposed to a mix of New England cultural values—respect for community, participation
    in school and extracurricular programs, and appreciation for the arts through local museums, libraries, and community festivals. The region’s diverse European heritage influences his family’s occasional
    celebrations of cultural foods and stories from ancestors.
