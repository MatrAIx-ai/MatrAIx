personas:
  professional: Ramon Dao, a 36‑year‑old senior automotive technician in the Pacific Northwest, blends a decade of hands‑on engine and hybrid‑system expertise with a relaxed, sometimes chaotic workshop
    layout, aiming for ASE Master Technician certification while steering his team toward greener repair practices.
  sports: Ramon Dao spends weekends hiking the Columbia River Gorge and is a member of the Pacific Northwest Hiking Society, follows the Seattle Seahawks and Seattle Sounders FC, and occasionally rides
    his Suzuki DR‑Z400 on local canyon trails for an adrenaline boost.
  arts: Ramon Dao unwinds to classic rock legends like Led Zeppelin and blues greats such as B.B. King while working on projects, and participates in community gatherings where he shares storytelling and
    traditional drumming, fueling his connection to cultural rhythm.
  travel: Ramon Dao prefers road‑trip adventures, mapping routes that combine scenic Pacific Northwest drives with stops at historic motorcycle museums, yet he dreams of a solo pilgrimage to Japan’s Miyazaki
    for its bike culture and to New Zealand’s South Island for remote trekking, always balancing travel costs against his variable shop income.
  culinary: Ramon Dao experiments in the kitchen with tamales and mole, adjusting chilies, dried ancho, and Mexican chocolate to create layered heat, while his skill level hovers between confident home‑cook
    and budding culinary tinkerer, often pairing his meals with a vinyl record of blues.
  core: Ramon Dao is a curious, solitary tinkerer who channels stress into bike mods, hikes, and hearty cooking, juggling disorganized work habits with a steady drive toward sustainable auto repair and
    personal mastery.
background:
  cultural: 'Ramon’s family traces its roots to a mixed Latin American and indigenous background, with ancestors from the highlands of Guatemala who speak a Mayan language alongside Spanish. Though he was
    raised primarily in the United States, his household kept many traditions alive: celebrating Día de los Muertos with altars, preparing tamales during holidays, and sharing stories of ancestral craftsmanship.
    Growing up in Portland, he blends this heritage with the Pacific Northwest’s multicultural vibe, often attending local Indigenous art festivals and supporting community programs that teach practical
    skills to at‑risk youth. His bilingual abilities and cultural fluency give him a unique perspective that he applies both in his work and personal life.'
attributes:
  skills: '[''Automotive diagnostics (OBD‑II and proprietary systems)'', ''Engine repair (gasoline, diesel, hybrid, electric)'', ''Electrical and electronic systems troubleshooting'', ''Brake and suspension
    repair'', ''Transmission service (manual and automatic)'', ''Welding and metal fabrication'', ''Hybrid/electric vehicle power‑train maintenance'', ''Technical service bulletin interpretation'', ''Customer
    service and communication'', ''Mentoring junior technicians'']'
  hobbies: '[''Motorcycle customization'', ''Hiking in the Columbia River Gorge'', ''Listening to classic rock and blues'', ''Cooking Latin American cuisine'', ''Participating in indigenous cultural events'',
    ''Reading automotive repair manuals'', ''Playing video game racing simulators'']'
  career_goals: Ramon aims to attain ASE Master Technician certification within the next two years, focusing on hybrid and electric vehicle systems to stay ahead of the industry shift toward greener technology.
    He hopes to eventually open a small, community‑oriented shop that offers sustainable auto repair services and provides apprenticeship opportunities for local youth, especially those from underrepresented
    backgrounds. In the short term, he wants to secure a senior technician position where he can lead a team, influence shop processes for greater efficiency, and reduce the stress associated with unpredictable
    workloads by establishing more predictable schedules.
