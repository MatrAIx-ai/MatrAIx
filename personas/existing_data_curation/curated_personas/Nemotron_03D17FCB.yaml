  hobbies: '[''Potluck dinners with friends'', ''Salsa and folkloric dancing'', ''Gardening vegetables and herbs'', ''Attending church services and cultural festivals'', ''Cooking traditional Mexican dishes'',
    ''Reading mystery novels'', ''Watching classic Mexican cinema'', ''Volunteering at the local food bank'']'
  career_goals: Although currently not part of the formal workforce, Daniela is eager to turn her experience into purposeful community leadership. She aims to take on a volunteer coordinator role at the
    Modesto Senior Center, where she can design and run cultural events that celebrate Mexican heritage. She also dreams of launching a modest home‑based catering service that offers authentic Mexican dishes
    for local gatherings, providing both a creative outlet and supplemental income. To solidify her foundation, Daniela plans to enroll in a GED program at the local community college. Long‑term, she hopes
    to mentor other Spanish‑speaking seniors, helping them stay engaged, active, and connected.
