  hobbies: '[''vegetable gardening'', ''reading historical fiction'', ''quilting'', ''birdwatching'', ''walking/hiking'', ''bridge'', ''genealogy research'', ''cooking and canning'', ''digital photography'']'
  career_goals: Emma aims to deepen her personal enrichment and community contribution. She plans to complete a senior digital‑literacy certificate at the local community college, document her family’s
    genealogy into a bound memoir, and launch a small intergenerational garden project at the town community center. Additionally, she seeks to maintain her health and independence, support her husband’s
    activities, and mentor younger volunteers in practical skills.
