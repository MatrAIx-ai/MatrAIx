personas:
  professional: Canaan Sanchez, a 13‑year‑old budding robotics enthusiast, channels their methodical, structure‑loving mindset into designing and programming LEGO‑based robots for school competitions, where
    they lead small‑team projects with meticulous planning and a competitive edge.
  sports: Canaan Sanchez, a member of the River Valley Youth Soccer Club and an avid follower of the Boston Red Sox, balances weekend drills with family fishing trips at Lake Meridian and hikes with the
    local 'Trailblazers' outdoor club, preferring structured practice over large‑scale team events.
  arts: Canaan Sanchez, while building intricate LEGO sculptures, finds artistic inspiration in the electronic scores of Daft Punk and the cinematic compositions of Hans Zimmer, and spends free evenings
    sketching robot designs in the margins of their favorite science magazine, 'Wired'.
  travel: Canaan Sanchez, who dreams of exploring beyond the backyard, has camped in Yosemite National Park, plans future trips to the Kennedy Space Center, and prefers meticulously organized itineraries
    over spontaneous road trips, always packing a spare LEGO set for quiet travel moments.
  culinary: Canaan Sanchez, whose go‑to snack is a homemade cheese quesadilla after a LEGO marathon, enjoys grilling the day‑caught trout from family fishing outings, and experiments with garden‑fresh tomatoes
    in a simple pasta sauce, though they often forget to eat breakfast before school.
  core: Canaan Sanchez is a methodical teen builder with a competitive streak, balancing LEGO mastery, strategic gaming, and disciplined budgeting, while occasionally succumbing to late‑night gaming marathons
    and breakfast neglect.
background:
  cultural: Canaan grew up in Kearney, Nebraska, a small Midwestern town where family, school, and agriculture shape daily life. His upbringing reflects typical Midwestern values such as hard work, reliability,
    modesty, and community involvement. He participates in local events like county fairs and youth clubs, and his family emphasizes practical skill development and self‑reliance. This cultural environment
    reinforces his preference for structure, organization, and modest competition within close‑knit social circles.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Basic computer literacy (Microsoft Office, Python basics)'', ''Logical problem solving'', ''Attention to detail'', ''Model building (LEGO,
    kits)'', ''Basic woodworking'', ''Basic agricultural tasks (garden care, livestock feeding)'']'
  hobbies: '[''LEGO model building'', ''Robotics club projects'', ''Programming (Python basics)'', ''Reading sci‑tech books and magazines'', ''Chess'', ''Competitive strategy video games'', ''Fishing'',
    ''Hiking'', ''Garden/plant care'']'
  career_goals: Canaan is drawn to careers that blend structure, practicality, and tangible outcomes. He aims to become an engineer—specifically civil or agricultural engineering—so he can design efficient
    farm infrastructure and sustainable community projects. In the short term, he plans to excel in mathematics and science courses, earn a place in his high school's robotics and Future Farmers of America
    clubs, and secure a scholarship for a STEM-focused program. His long‑term ambition is to contribute reliable, well‑planned solutions that improve everyday life in his Midwestern community.
