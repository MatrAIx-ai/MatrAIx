  career_goals: Amita aims to progress from her current supervisory role to a senior sales operations manager within the next three to five years, overseeing larger regional teams and shaping data‑driven
    sales strategies. She plans to deepen her analytical expertise by earning a Master’s in Business Analytics or an MBA, with an emphasis on technology management. Long‑term, she envisions launching her
    own consultancy that helps small businesses implement efficient, people‑centric sales processes, especially for organizations seeking to attract and retain talent from diverse cultural backgrounds.
