  hobbies: '[''model railroading'', ''vegetable gardening'', ''historical non‑fiction reading'', ''book‑exchange club'', ''volunteering at community center donation drives'']'
  career_goals: Roger aims to advance within the United States Postal Service by taking on supervisory responsibilities at his regional distribution center. He plans to enroll in night courses for an associate
    degree in logistics or business administration to strengthen his managerial toolkit. His long‑term ambition is to lead a process‑improvement team that implements automation upgrades while preserving
    reliable service for the community. He also hopes to mentor younger employees, fostering a culture of precision and cooperation.
