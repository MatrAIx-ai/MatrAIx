  career_goals: Debra aims to enroll in a community‑college program focused on visual arts and communications, building a professional portfolio that blends her imaginative style with her methodical approach.
    In the short term, she plans to earn certifications in Adobe Illustrator and Photoshop while securing an internship at a local gallery or the Saginaw County library’s arts program. Over the next five
    years, she hopes to transition into a full‑time role as a graphic designer or exhibit coordinator, creating engaging visual content and curated displays that inspire her community. Ultimately, she dreams
    of establishing a community art space in Bridgeport where residents can explore creativity, attend workshops, and showcase local talent.
