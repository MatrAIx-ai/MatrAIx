  hobbies: '[''Hiking and mountain biking'', ''Fishing'', ''Retro video game collecting'', ''Attending arcade meetups'', ''Community event volunteering'', ''Neighborhood barbecues'', ''Men’s choir singing'',
    ''DIY electronics projects'', ''Model kit building'', ''Acoustic guitar playing'']'
  career_goals: David aims to progress from field technician to supervisory leadership within the vending‑machine service industry. In the next five years, he envisions becoming a regional service manager
    overseeing a team of technicians throughout Arizona, establishing standardized maintenance protocols, and improving customer satisfaction metrics. He plans to earn certifications in advanced electronic
    payment systems and IoT‑enabled machine diagnostics, and to complete an associate’s degree in mechatronics or business management. Long‑term, David aspires to launch his own independent vending‑machine
    repair business, leveraging his technical expertise and strong community network to provide reliable, locally focused service.
