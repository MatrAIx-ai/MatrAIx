personas:
  professional: A budding mini-entrepreneur, Donald Nelson dazzles parents with his curiosity about how toys work, pragmatically assembling block structures while casually ignoring the mess they leave behind,
    hinting at a future career in engineering.
  sports: Donald Nelson delights in the local 'Mini Strikers' toddler soccer league, energetically kicking soft balls while rooting for the Chicago Cubs, and also splashes around in the community pool's
    kiddie swim group, where they splash with other toddlers under the watchful eye of coach Mia.
  arts: Donald Nelson enjoys dancing to The Wiggles and singing along with Sesame Street characters, often mimicking the expressive moves of a favorite YouTube performer, while they proudly display crayon
    drawings of Moana and their stuffed unicorn on the refrigerator.
  travel: Donald Nelson has visited Grandma's farm in the countryside, spent a weekend at the local aquarium, and dreams of a family cruise to the Bahamas, preferring spontaneous car rides with a favorite
    stuffed bear over rigid itineraries, while they often chatter excitedly about the next adventure.
  culinary: Donald Nelson is a picky eater who adores banana slices, chicken nuggets, and mac-and-cheese, refuses broccoli at every meal, loves sprinkling shredded cheddar on everything, and they often
    help stir batter with a wooden spoon.
  core: Donald Nelson is a spirited two-year-old whose boundless curiosity, restless energy, and love for spontaneous play coexist with delightfully messy habits and a budding competitive streak, and they
    often surprise adults with strategic block-building.
background:
  cultural: Donald is raised in a white, middle‑class family in Danvers, Massachusetts. His parents follow typical New England cultural practices such as community festivals, seasonal celebrations, and
    early childhood education programs, while also honoring the multicultural heritage reflected in his middle name Mohamed by occasionally sharing Arabic language songs and foods. Growing up in a diverse
    suburban environment, he experiences a blend of American cultural norms and subtle multicultural influences.
attributes:
  skills: '["basic language development (simple sentences)", "color and shape identification", "block stacking", "cause‑and‑effect toy manipulation", "early problem solving", "social interaction and turn‑taking"]'
