  career_goals: Although only two years old, Donald already shows a budding interest in building and exploring; he often mimics construction work and talks about becoming a builder or an astronaut after
    watching related shows. His parents notice his enthusiasm for assembling simple puzzles and using toy tools, indicating a future inclination toward hands‑on, exploratory fields. He has no concrete career
    plan yet, but his curiosity and practical play suggest ambitions that may later develop into engineering, design, or scientific exploration.
