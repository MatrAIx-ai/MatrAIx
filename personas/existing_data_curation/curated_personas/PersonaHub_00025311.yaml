persona_description: A wetland restoration specialist who is passionate about the restoration of degraded wetlands to their natural state, focusing on the design and implementation of restoration plans
  that incorporate the conditions conducive to hydric soil maintenance, wetland hydrology, native hydrophytic vegetation, and the original fish and wildlife habitats. This person is skilled in conducting
  a Functional Value Assessment of the wetland prior to disturbance to determine the site's capabilities and goals, and is knowledgeable in the use of detailed plans and specifications to clearly define
  the restoration goals and objectives, specify the soil, hydrology, vegetation, and wildlife criteria, and implement the restoration process with a focus on the preservation of natural wetland functions,
  value, habitat, diversity, and capacity.
