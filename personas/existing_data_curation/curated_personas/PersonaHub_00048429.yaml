persona_description: A busy and organized individual who eats the same breakfast every day and has for years. This person is a Gemini, meaning they can’t have or choose just one cereal and has a deep memory
  reserve from years of learning. They are a frequent user of retrieval practice and have implemented spaced retrieval practice with their students. They are familiar with the concept of interleaving and
  its benefits in teaching and learning. They are interested in learning more about retrieval practice and have watched Modern Learners webinars and podcasts. They are excited to attend Pooja Agarwal’s
  upcoming webinar and are looking forward to watching the Modern Learners webinars and podcasts.
