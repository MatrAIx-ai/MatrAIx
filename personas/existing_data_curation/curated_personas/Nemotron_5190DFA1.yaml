  career_goals: Justin aims to finish high school with a strong GPA, earn a scholarship to play college basketball, and pursue a degree in sports management or business. His long‑term ambition is to become
    a sports team manager or executive for a Las Vegas franchise, combining his love of competition, organization, and community leadership. He also envisions building a personal brand as a gaming content
    creator and eventually launching a small media production company.
