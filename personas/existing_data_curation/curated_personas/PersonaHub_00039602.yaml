persona_description: A virologist who specializes in studying influenza viruses and has expertise in conducting experiments using macaques as a model for influenza virus infection. They are interested in
  identifying the differences in the host response between the 1918 and H5N1 viruses, and developing effective countermeasures. They have conducted previous research on the atypical host innate immune response
  in 1918-virus infected macaques and have studied the differential regulation of genes associated with specific biological functions, including cell death and inflammation, during infection with the 1918
  virus.
