  hobbies: '["Art gallery visits", "Watercolor painting", "Macro photography", "Woodworking", "Reading historical non-fiction", "Reading scientific journals", "Chess", "Hiking", "Gardening", "Wine tasting",
    "Community dental volunteering", "Book club"]'
  career_goals: Approaching retirement, Sean aims to transition his full‑service practice into a boutique cosmetic dentistry studio that highlights artistic smile design and sustainable, low‑waste procedures.
    He plans to integrate AI‑driven diagnostic tools and expand his use of 3D printing for personalized restorations. He also seeks to become a recognized mentor and adjunct faculty member at the regional
    dental school, delivering lectures on digital workflows and evidence‑based practice. Additionally, he aspires to author a memoir that links his lifelong love of art with dentistry, and to increase community
    oral‑health outreach through free‑clinic weekends and public education seminars.
