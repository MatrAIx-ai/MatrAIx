personas:
  professional: Sean Windom, a seasoned dentist with four decades of clinical experience, blends a meticulous data‑driven mindset and an artistic eye, and they excel in cosmetic dentistry using digital
    smile design, CAD/CAM milling, and 3D printing while mentoring junior colleagues and streamlining practice operations.
  sports: Sean Windom, an avid hiker who tackles the Blue Ridge Trail each spring and a weekend cyclist on the Riverside Loop, follows the River City Sluggers minor‑league baseball team, supports the local
    university’s basketball program, and they keep fit through low‑impact strength training at the senior community gym.
  arts: Sean Windom, a watercolor landscape enthusiast and macro photographer, frequents the downtown Contemporary Art Museum to admire works by Monet, O'Keeffe, and local impressionists, enjoys productions
    by the Curtain Call Players regional theater troupe, and they capture intricate close‑ups of dragonflies and fern fronds with a 100mm macro lens.
  travel: Sean Windom, who prefers curated cultural trips, has explored the Musée du Louvre in Paris, the Uffizi Gallery in Florence, and the vineyards of Rioja, and they plan a road‑trip along the Pacific
    Coast Highway to visit coastal art installations and seaside vineyards.
  culinary: Sean Windom, a garden‑to‑table cook, often prepares roasted beet salad with goat cheese, walnuts, and a balsamic reduction, sears salmon with a rosemary‑lemon glaze, and they enjoy pairing each
    dish with a carefully selected Pinot Noir from their wine‑tasting club.
  core: Sean Windom melds a surgeon’s precision with an artist’s curiosity, channeling that blend into meticulous smile designs, vibrant watercolors, and a habit of sipping wine while obsessively arranging
    garden rows, even though they sometimes overbook appointments and lose track of time when painting.
background:
  cultural: Sean was raised in a small town in southern Wisconsin within a family of German‑Scandinavian descent that values hard work, modesty, and community service. His upbringing in a Lutheran‑influenced
    environment emphasized punctuality, self‑reliance, and a pragmatic outlook, while the region’s strong dairy‑farm heritage fostered an appreciation for nature and seasonal rhythms. Local traditions such
    as the county fair, fish fry gatherings, and volunteer fire‑department events shaped his sense of civic duty. This Midwestern cultural foundation blends with his personal curiosity, allowing him to
    balance a practical, organized professional demeanor with an open‑minded appreciation for art, new ideas, and unconventional thinking.
attributes:
