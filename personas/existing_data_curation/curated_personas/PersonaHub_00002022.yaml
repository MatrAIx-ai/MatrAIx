persona_description: A researcher with a passion for marine ecology, particularly interested in the effects of fishing and associated activities on marine assemblages. They have extensive experience in
  conducting research on prawn trawling, seeding abalone, impacts of fish on the Sydney Rock Oyster industry, and proposing new Ecosystem Based Fishery Management models. Their current research focuses
  on understanding ecological impacts of recreational fishing and developing new knowledge of what happens in marine systems when commercial fishing stops. They are open to working with fishing industry,
  recreational fishers, and conservation bodies to use high-quality science to better understand the links between ecology and fishing.
