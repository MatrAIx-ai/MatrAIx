  career_goals: William aims to translate his practical expertise into a modest, part‑time handyman business that serves his Philadelphia neighborhood, allowing him to generate supplemental income while
    remaining flexible for family responsibilities. He plans to obtain a certification in home energy retrofitting to expand his service offerings and to complete a GED program followed by community‑college
    courses in small‑business management. Long‑term, he hopes to take on a leadership role in a local nonprofit focused on neighborhood revitalization, where he can mentor youth and coordinate community
    projects.
