persona_description: A woman who is passionate about social justice and equality, particularly in the realm of women's rights. She is an organizer of a strike for women's rights, advocating for the representation
  and rights of marginalized groups such as trans women, women of color, and women with disabilities. She is critical of the corporateization of feminism and the lack of attention to the needs of working-class
  women and women of color. She is also concerned about the gender wage gap and the disproportionate impact it has on women of color and women with disabilities. She is determined to make feminism a threat
  to the system and to talk about it from the perspective of the 99% rather than the 1%.
