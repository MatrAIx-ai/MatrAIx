personas:
  professional: Michael Sepe is an aspiring junior game developer who builds simple games in Scratch, blending a love for storytelling with meticulous pixel‑perfect planning, while their natural curiosity
    and balanced approach to organization let them iterate quickly and share prototypes with friends.
  sports: Michael Sepe plays on the U9 Tigers soccer team at the neighborhood park, idolizes the local high‑school soccer star, cheers for the national women's soccer team during televised matches, and
    spends afternoons practicing drills with a battered but beloved soccer ball.
  arts: Michael Sepe sketches characters from favorite adventure novels, draws inspiration from Hayao Miyazaki’s animated worlds and Jeff Smith’s comic style, and strums ukulele chords while learning folk
    melodies passed down by grandparents, often humming verses of traditional songs while sketching.
  travel: Michael Sepe has explored the Redwood trails on a family weekend trip, enjoyed a sunny beach day at Clearwater, and dreams of hiking the ancient ruins of Machu Picchu and snorkeling the Great
    Barrier Reef, favoring trips that mix nature exploration with creative inspiration.
  culinary: Michael Sepe favors homemade pepperoni pizza, cheesy quesadillas, and sparkling fruit smoothies, enjoys assembling colorful fruit kebabs with strawberries, bananas, and mangoes, and can confidently
    make a simple peanut‑butter‑banana sandwich for lunch.
  core: Michael Sepe is a curious nine‑year‑old who balances a love for digital creation, sketching, and soccer with a disciplined approach to money and health, all while humming folk tunes learned from
    grandparents.
background:
  cultural: Michael is a first‑generation American of Honduran descent. At home, his family speaks Spanish and celebrates Honduran holidays such as Día de la Independencia with traditional foods like baleadas
    and plantains. He participates in community events hosted by the local Honduran cultural association in West Valley City, where he learns folk dances and stories. His bilingual environment nurtures
    his appreciation for both Honduran and American artistic traditions, influencing his creative expression and his desire to share his heritage through art.
attributes:
  skills: '["Reading comprehension", "Creative drawing", "Basic Spanish proficiency", "Scratch programming", "LEGO building", "Organizational skills", "Collaborative problem solving", "Attention to detail"]'
  hobbies: '["Drawing and sketching", "Reading adventure books", "Building LEGO models", "Playing soccer in small groups", "Playing the ukulele", "Exploring local parks", "Creating simple Scratch animations"]'
  career_goals: Michael dreams of becoming an environmental illustrator who can combine his love of art with his curiosity about science and nature. He envisions creating drawings and digital artwork that
    raise awareness about the rainforests of Honduras and the ecosystems around Utah. In the longer term, he hopes to study graphic design or animation, allowing him to work independently while still contributing
    to small, collaborative projects that celebrate cultural diversity.
