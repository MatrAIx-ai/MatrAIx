personas:
  professional: Chester Lee, a retired maintenance specialist with deep mechanical repair expertise, now mentors 4‑H teens and plans a consulting side‑business for vintage farm equipment, applying meticulous
    project‑planning and spreadsheet budgeting to every job.
  sports: Chester Lee follows the regional baseball team the River Hawks, cheers for the local high school basketball squad, and spends quiet mornings casting lines on Cedar Lake, preferring low‑impact
    activity to the occasional senior softball league where they sometimes skip practice for gardening chores.
  arts: Chester Lee sings baritone in the town choir, enjoys community‑theater productions of classic plays like "Our Town," and collects folk‑rock records from artists such as John Denver and the Avett
    Brothers, letting these melodies accompany their model‑railroad evenings.
  travel: Chester Lee favors meticulously planned weekend road trips to nearby historic towns like Old Millville and state parks such as Pine Ridge, balancing the desire for scenic birdwatching stops with
    the practical constraints of a modest retirement budget and a spouse who prefers leisurely pacing, while day‑dreaming about a future visit to Kyoto’s zen gardens for horticultural inspiration.
  culinary: Chester Lee's kitchen revolves around fresh garden harvests—often preparing zucchini lasagna, heirloom tomato gazpacho, and preserving pickled cucumbers—though they sometimes over‑salt dishes
    and cling to tried‑and‑true recipes rather than experimenting with exotic cuisines.
  core: Chester Lee blends methodical precision with a calm love of outdoor quiet, turning every hobby from model railroads to vegetable gardening into a structured ritual, even if it means occasionally
    missing a social call to finish a spreadsheet.
background:
  cultural: Chester grew up in Ferryville, a small town in Vernon County, Wisconsin, steeped in the agricultural heritage of the Upper Midwest. His family traces its roots to German and Scandinavian immigrants
    who settled the region in the late 19th century. The community’s values—hard work, modesty, self-reliance, and a strong sense of neighborly responsibility—have shaped his worldview. He was raised in
    a Lutheran household, participating in church and local county-fair traditions that celebrate farming, craftsmanship, and community togetherness.
