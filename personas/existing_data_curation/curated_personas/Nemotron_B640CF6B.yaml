  career_goals: He aims to move from front‑line support into a supervisory role within the next two years, targeting a team lead or call‑center manager position. He plans to earn the Certified Customer
    Service Professional (CCSP) credential and to complete an MBA or a Master’s in Organizational Leadership to broaden his strategic understanding of customer experience. His competitive drive pushes him
    to achieve top‑tier performance scores, develop a company‑wide customer‑experience improvement program, and eventually oversee multiple service locations. In the longer term, he envisions launching
    a consultancy that helps small businesses design effective customer service workflows while leveraging his expertise in process optimization and cultural competency.
