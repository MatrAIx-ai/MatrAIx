  hobbies: '[''Comic‑style drawing'', ''Digital art and portfolio building'', ''Visiting art exhibitions'', ''Listening to salsa and reggaetón'', ''Playing soccer'', ''Salsa dancing'', ''Volunteering at
    community cultural center'', ''Tutoring younger kids in Spanish'']'
  career_goals: Miguel aspires to merge his passion for visual art with technology by pursuing a career in graphic design or multimedia production. He envisions creating culturally resonant visual content
    that highlights Puerto Rican stories and the broader Latinx experience. In the long term, he hopes to earn a scholarship to a specialized high‑school program in visual arts, followed by a BFA or BTech
    in digital media. He also dreams of establishing a community art workshop in Springfield that offers free art classes for youth, fostering creative expression and cultural pride.
