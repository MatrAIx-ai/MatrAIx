personas:
  professional: Miguel Guzman, a 14‑year‑old aspiring comic‑style illustrator, blends meticulous planning with boundless curiosity, using digital art filters to experiment with visual storytelling while
    maintaining a consistently updated online portfolio that showcases their methodical work ethic and collaborative spirit.
  sports: Miguel Guzman plays forward on their neighborhood youth soccer league, idolizes the tactics of FC Barcelona’s Lionel Messi, supports the LA Galaxy as their favorite professional team, and complements
    their games with salsa dancing practice that doubles as cardio, demonstrating a social, energetic, and disciplined approach to fitness.
  arts: Miguel Guzman devotes their free hours to sketching original comic heroes inspired by Osamu Tezuka and Lynda Barry, curates their work on ArtStation while listening to an eclectic playlist of Marc
    Anthony, Bad Bunny, and Arctic Monkeys, and frequently attends mural festivals where they study street art by Banksy and local muralists, merging their curiosity with a love for diverse artistic voices.
  travel: Miguel Guzman dreams of visiting the vibrant street art districts of Barcelona and the bustling galleries of Mexico City, but currently explores regional culture through weekend trips to nearby
    historic towns and annual music festivals, balancing a limited teen budget with a preference for immersive, hands‑on experiences.
  culinary: Miguel Guzman enjoys crafting quick dishes like guacamole, homemade empanadas, and pepperoni pizza, while their favorite comfort foods include tacos al pastor and chicken fajitas, and they often
    experiment with flavor by adding salsa dancing rhythm to their cooking sessions, although they sometimes forget to clean their workspace after meals.
  core: Miguel Guzman is a methodical teen artist who balances a disciplined schedule of digital comic creation with spontaneous salsa dancing, occasional snack‑splurges, and a calm resilience that makes
    them a reliable friend and a curious explorer of both art and life.
background:
  cultural: Miguel is a second‑generation Puerto Rican raised in Springfield, Massachusetts. His household celebrates traditional festivals such as Noche de San Juan and Día de la Constitución, blending
    Puerto Rican customs with New England seasonal activities. He grew up speaking both Spanish and English, which enriches his cultural identity and informs his artistic perspective. Family meals often
    feature dishes like arroz con gandules and alcapurrias, and his parents share stories of life on the island, fostering Miguel's appreciation for his heritage. This bicultural environment, combined with
    exposure to the diverse communities of Hampden County, shapes his worldview and fuels his desire to represent Latino narratives through creative media.
