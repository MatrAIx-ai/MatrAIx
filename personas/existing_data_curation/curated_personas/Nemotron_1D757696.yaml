personas:
  professional: Reyes Herrera, a budding mini‑entrepreneur who runs a meticulously organized lemonade stand at the neighborhood park, tracks inventory in a little notebook, experiments with new fruit‑infused
    recipes while maintaining a practical pricing strategy, and insists on a schedule that balances playtime and business duties, demonstrating the same methodical reliability they show in school projects.
  sports: Reyes Herrera, a lively member of the Fresno Youth Soccer Club’s under‑5 team, dashes across the field with the same competitive spark they bring to board games, idolizes the Fresno State Bulldogs
    baseball team, and attends weekend t‑ball practice with a roster of mini‑jerseys that match their organized approach to training.
  arts: Reyes Herrera loves drawing vibrant sugar‑skull designs for the family’s Día de los Muertos altar, often humming Luis Miguel’s ballads while sketching, and they eagerly join preschool art sessions
    that explore colors inspired by the bright papel picado at local fiestas, occasionally getting paint on their clothes despite careful preparation.
  travel: Reyes Herrera enjoys family road trips to the beach in Santa Barbara and annual visits to Disneyland, eagerly maps out future adventures to the Grand Canyon and the ancient pyramids of Teotihuacan,
    and prefers trips that blend playful attractions with cultural celebrations, even if they sometimes whine about long car rides.
  culinary: Reyes Herrera delights in munching on chicken tinga tacos, guacamole dip with crunchy tortilla chips, and sweet churros topped with cinnamon sugar, tries to help stir salsa with a tiny wooden
    spoon, yet often over‑seasons the mixture, and they proudly claim they can identify the exact spice that makes abuela’s mole special.
  core: Reyes Herrera is a hyper‑organized five‑year‑old who runs a lemonade stand like a tiny CEO, obsessively tracks allowance, worries about the perfect taco, bursts into competitive soccer sprints,
    and decorates sugar‑skull art with fierce concentration, all while their vivid imagination keeps them buzzing.
background:
  cultural: Reyes is raised in a Mexican‑American household in Fresno, California, where Spanish is spoken alongside English. His family emphasizes close‑knit relationships, respect for elders, and participation
    in cultural celebrations such as Día de los Muertos, Cinco de Mayo, and local community fiestas. He grows up enjoying Mexican foods, music, and traditions while also navigating the diverse cultural
    landscape of the Central Valley. This blend of Mexican heritage and Californian environment shapes his identity, encouraging a practical curiosity about both his roots and the broader world.
