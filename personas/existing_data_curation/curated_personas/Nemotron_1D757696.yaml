  career_goals: Reyes dreams of becoming an engineer or inventor who can design toys and tools that help his family and community. He imagines building machines that solve everyday problems, like a robot
    that helps with chores. He also enjoys helping friends learn new games, hinting at a future ambition to be a teacher or youth leader who organizes activities and encourages curiosity. His goal is to
    combine his practical curiosity with his organized approach to create useful solutions while learning strategies to manage stress and stay focused.
