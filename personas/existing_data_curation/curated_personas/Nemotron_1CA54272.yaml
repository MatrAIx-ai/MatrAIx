  career_goals: Marquetta aims to transition from front‑line delivery to a supervisory role within the next three years. She plans to complete a certification in logistics management and obtain a commercial
    driver’s license, positioning herself for a dispatch manager or logistics coordinator position. Her longer‑term ambition is to start a small, community‑focused courier service that offers reliable,
    fair‑priced delivery for local businesses and seniors, allowing her to create a more predictable schedule, provide mentorship, and build a stable income for her family and future retirement.
