personas:
  professional: Biraj Mehta is a budding web developer who builds small, functional websites for school clubs and local friends, leveraging their curiosity for new frameworks while staying practical with
    clean code, and channels their kind, cooperative nature into patient tutoring sessions at the community youth center, though bouts of anxiety sometimes make them double-check every line before publishing.
  sports: Biraj Mehta spends afternoons shooting hoops at the City Youth Basketball Association and eagerly follows the NBA's Los Angeles Lakers, emulating LeBron James's work ethic on the court, while
    using basketball as both a social outlet and a way to blow off steam after school.
  arts: Biraj Mehta channels creative energy into sketching urban scenes inspired by Banksy's street art, crafting digital illustrations with Procreate while listening to John Mayer's acoustic melodies,
    devouring Brandon Sanderson's fantasy epics, and capturing candid street photos reminiscent of Steve McCurry's portraits, which together shape a personal aesthetic that balances imagination with technical
    precision.
  travel: Biraj Mehta dreams of exploring the cherry-blossom avenues of Kyoto after having fallen in love with the misty waterfalls of Yosemite and the vibrant street art of Barcelona, planning trips on
    a low-budget spreadsheet, frequently using Google Flights and travel vlogs for itinerary ideas, but balances adventure with family commitments that sometimes limit long-haul travel.
  culinary: Biraj Mehta delights in mastering family-style spaghetti Bolognese and weekend-only chocolate-chip cookies, skillfully chopping fresh basil, garlic, and tomatoes while experimenting with a pinch
    of smoked paprika in a homemade shakshuka, and often collaborates with parents to perfect the fluffy pancake stack.
  core: Biraj Mehta is a tech-savvy, art-loving teen who balances fierce anxiety with relentless curiosity, juggling guitar strings, code snippets, and basketballs while habitually over-thinking every decision.
background:
  cultural: Biraj was raised in a Bengali‑Muslim household in Windsor Mill, Maryland, where family traditions from Bangladesh are woven into everyday life. He speaks Bengali at home, celebrates Eid with
    communal prayers and festive meals, and participates in cultural events hosted by the local mosque and South Asian community centre. Education is highly valued, and his parents encourage academic excellence
    while also fostering respect for elders and a sense of hospitality. At the same time, Biraj attends a diverse public school, interacts with peers from many backgrounds, and engages in mainstream American
    activities like basketball and volunteering. This bicultural upbringing gives him a strong sense of communal harmony, empathy, and a practical drive to succeed both for himself and his family.
