  career_goals: Biraj aspires to merge his love for technology with his desire to help others manage emotional challenges. He plans to pursue a computer‑science degree with a focus on human‑computer interaction
    and a minor in psychology, aiming to design mobile apps that provide mental‑health support for teenagers. He also hopes to earn a scholarship that will allow him to give back to his community by mentoring
    younger South Asian youth in coding and emotional resilience. In the longer term, he envisions working with non‑profit organizations to create culturally sensitive digital tools that promote well‑being
    while maintaining a stable, practical career path.
