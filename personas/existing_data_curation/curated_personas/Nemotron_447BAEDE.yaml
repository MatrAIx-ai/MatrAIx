  career_goals: Looking ahead, Sonda aims to transition from her current managerial role into a mentorship and advisory position, guiding younger leaders within the city’s recreation department. She hopes
    to spearhead a senior‑focused arts nonprofit that offers workshops in painting, pottery, and digital photography, fostering lifelong learning and mental well‑being among older adults. Additionally,
    she aspires to serve on the board of the local cultural center, influencing policy to expand access to creativity and community engagement across Fremont County.
