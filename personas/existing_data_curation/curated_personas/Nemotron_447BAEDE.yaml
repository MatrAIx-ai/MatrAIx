personas:
  professional: Sonda Rodriguez, a veteran community recreation manager, leverages three decades of strategic planning, grant writing, and team leadership while channeling their vivid imagination into innovative
    senior arts initiatives and harmonious stakeholder collaborations.
  sports: Sonda Rodriguez, an avid hiker with the Sangre de Cristo Foothills Trail Club, maintains a daily walking regimen, practices gentle yoga at the local senior center, and roots for the Colorado Rockies
    in baseball, the Colorado Avalanche in hockey, and the Denver Broncos in football, cheering them at community watch parties during the season.
  arts: Sonda Rodriguez expresses themselves through weekly landscape paintings that echo the color palette of the Arkansas River valley, channeling inspirations from Georgia O'Keeffe and Bob Ross, crafts
    pottery in the style of contemporary ceramicist Wendy Maruyama, participates in community theater productions of Shakespeare, and fills evenings with live performances by folk artists like The Avett
    Brothers and Mexican guitarist Lila Downs, weaving these artistic threads into a vibrant personal identity.
  travel: Sonda Rodriguez, who prefers thoughtfully planned road trips in their reliable SUV, relishes cultural festivals in Santa Fe and music gatherings at Colorado's Garden of the Gods, has captured
    sunrise photographs in Banff, and dreams of trekking to Machu Picchu and wandering the historic streets of Kyoto, balancing adventure with a comfortable pace suited to their seasoned sensibilities.
  culinary: Sonda Rodriguez, an intermediate home chef, delights in simmering Colorado trout with rosemary and sage from their herb garden, prepares vibrant green chile enchiladas topped with cotija cheese,
    brews hibiscus tea infused with locally grown lavender, and often treats themselves to farm-to-table dinners at the historic Ft. Collins Brewing Company, while savoring the occasional slice of tiramisu
    at a downtown theater café.
  core: Sonda Rodriguez, a 60-year-old visionary community leader, weaves imagination into senior arts mentorship while sometimes over-scheduling their calendar, treating each new festival or paint-splatter
    experiment as a fresh chance to inspire and connect.
background:
  cultural: Born and raised in the American West, Sonda identifies as white with deep roots in mid‑western values of self‑reliance and community service. Through marriage to a partner of Hispanic heritage,
    she has embraced Latino traditions, regularly celebrating Día de los Muertos and sharing Mexican culinary practices with her family. Living in Canon City, she is immersed in a multicultural tapestry
    that includes Native American (Ute) influences, frequent participation in local festivals, and a strong appreciation for the frontier spirit of Colorado. This blend of cultures informs her inclusive
    approach to community programming and her commitment to fostering harmony across diverse groups.
