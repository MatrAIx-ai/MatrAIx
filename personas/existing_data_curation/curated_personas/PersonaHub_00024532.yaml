persona_description: A food industry executive who is concerned about ethical practices and the potential for food fraud. They are interested in the impact of legislation on food safety and the role of
  ethics in ensuring ethical conduct along the food supply chain. They are aware of the challenges presented by external social factors and the need for different layers of industry to take an interest
  in its management. They are also aware of the potential consequences of violating trust in the food system and the need to bring together food researchers with experts in ethics, social science, politics,
  and commerce to address these issues.
