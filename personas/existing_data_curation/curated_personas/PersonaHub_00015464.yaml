persona_description: An Ohio State University plant pathologist who specializes in soybean rust and its management. She has extensive experience in researching and developing effective management strategies
  for soybean rust in Ohio and Indiana. Her expertise lies in understanding the disease's symptoms, identifying the appropriate fungicides for control, and advising growers on economic feasibility. She
  is knowledgeable about the different types of fungicides labeled for soybean rust and their efficacy in managing other foliar diseases.
