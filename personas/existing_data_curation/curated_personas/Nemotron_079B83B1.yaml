  career_goals: Andrew aims to progress from his current role as a computer/information systems manager to a senior technology leadership position, such as Director of IT or Chief Technology Officer, within
    the next five to seven years. He is driven to spearhead digital transformation initiatives that blend technology with artistic expression, fostering innovative products that improve user engagement.
    Additionally, he aspires to create a workplace culture that prioritizes mental well‑being, inclusion, and continuous learning, and he is considering launching a side venture that leverages technology
    to support mental‑health resources for young professionals.
