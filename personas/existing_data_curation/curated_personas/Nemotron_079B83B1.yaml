personas:
  professional: Andrew Casey, a 25‑year‑old information systems manager in Georgia, blends his technical acumen in IT infrastructure with a keen eye for user‑experience design, leading cross‑functional
    teams to deliver digital transformation projects that fuse technology and artistic expression while championing mental‑well‑being initiatives in the workplace.
  sports: Andrew Casey enjoys weekend hikes on Sweetwater Creek and participates in a local running club that trains for the Atlanta Marathon, cheers on the Atlanta Falcons and Atlanta Hawks, and joins
    monthly pick‑up soccer games with friends, balancing competitive spirit with a relaxed approach to fitness.
  arts: Andrew Casey immerses himself in the indie folk scene, regularly streaming Sufjan Stevens, Iron & Wine, and Phoebe Bridgers while attending gallery openings that showcase contemporary Southern photographers
    like William Eggleston, and he sharpens his storytelling skills in improv comedy classes at a downtown theater.
  travel: Andrew Casey prefers short road trips to culturally rich cities such as Charleston, Asheville, and New Orleans, while dreaming of a solo backpacking adventure through the Scottish Highlands and
    a future trip to Kyoto to capture sunrise temple photography, always planning itineraries on a tight budget using student‑rate discounts.
  culinary: Andrew Casey enjoys cooking a moderate level of Southern comfort dishes like shrimp and grits and fried chicken seasoned with fresh thyme and cayenne, but also experiments with Korean‑BBQ tacos
    and craft coffee brewing using Ethiopian beans, often sharing his culinary experiments on Instagram Stories.
  core: Andrew Casey, a 25‑year‑old tech manager, balances a restless curiosity for art and innovation with frequent anxiety‑driven splurges and a habit of over‑committing to both work projects and community
    volunteer gigs.
background:
  cultural: Andrew grew up in a middle‑class Southern family in Muscogee County, Georgia, where community ties, Southern hospitality, and a love for regional traditions played a significant role in his
    upbringing. His family emphasized education and civic responsibility, encouraging participation in local events such as RiverFest and volunteering at the public library. While rooted in the values of
    his Southern heritage—respect for neighbors, appreciation for local music and cuisine—his college education in business and exposure to diverse campus cultures broadened his perspective, fostering an
    openness to unconventional ideas and global artistic influences.
