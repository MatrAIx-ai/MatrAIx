personas:
  professional: A bilingual curriculum architect and university faculty leader, Myriam Vasquez designs data‑driven, culturally responsive teacher‑education programs while navigating the pressures of grant
    deadlines and departmental politics, balancing curiosity about innovative pedagogy with pragmatic implementation, and channeling their occasional worry into meticulous planning.
  sports: An active yet schedule‑pressed fitness enthusiast, Myriam Vasquez pedals their bike through Rock Creek Park several times weekly, attends yoga classes for flexibility, and follows DC United soccer
    matches and Washington Nationals baseball games, occasionally joining a local tango dance group that doubles as a low‑impact cardio routine.
  arts: A culturally attuned arts aficionado, Myriam Vasquez devotes evenings to reading contemporary works by writers like Roberto Bolaño and Mariana Enriquez, dancing tango to the evocative strains of
    Astor Piazzolla, and traversing the Smithsonian and National Gallery for modern art exhibitions, while also catching live performances at the Kennedy Center, weaving these experiences into their teaching
    inspiration.
  travel: Myriam Vasquez, a purposeful globetrotter, plans annual journeys that alternate between reconnecting with family in their hometown where tango rhythms echo through the streets and immersive cultural
    trips to Barcelona and Kyoto, using airline miles and a travel rewards credit card while carefully scheduling around grant deadlines and the academic calendar.
  culinary: A passionate home chef, Myriam Vasquez expertly prepares beef empanadas, slow‑roasted asado with homemade chimichurri, and fragrant herb‑infused sauces harvested from their balcony garden, while
    occasionally succumbing to quick‑fix frozen pizzas after late‑night grading sessions.
  core: Myriam Vasquez is a diligent bilingual educator who balances the rhythm of tango with the anxiety of grant deadlines, often forgetting meals during late‑night grading, yet finds calm in nightly
    mindfulness practice.
background:
  cultural: Myriam was born and raised in Buenos Aires, where family gatherings, storytelling, music, and dance were central to daily life. Growing up bilingual, she internalized Argentine values of relational
    warmth, resilience, and a love of the arts. After moving to the United States for graduate studies, she navigated the blend of her Argentine identity with the professional culture of American higher
    education. In Washington, DC, she actively participates in the local Argentine diaspora community, celebrating national holidays, organizing tango events, and sharing Argentine cuisine. Her cultural
    background informs her teaching philosophy, emphasizing culturally responsive pedagogy, multilingual communication, and the inclusion of diverse perspectives in the classroom.
