personas:
  professional: Benito Skarie is a budding robotics enthusiast and junior programmer whose knack for strategic thinking on the soccer field translates into efficient teamwork and rapid problem solving during
    VEX competitions, while they apply a healthy dose of skepticism to double‑check code before each build.
  sports: Benito Skarie, a forward on the middle‑school soccer team, thrives on fast‑paced, strategic play, drills after school with the local youth soccer club, follows the Los Angeles Galaxy and the Golden
    State Warriors for inspiration, and they mix cardio runs with weekend pickup games to stay fit.
  arts: Benito Skarie channels creative energy into building custom LEGO sculptures and enjoys the rhythmic storytelling of Lin‑Manuel Miranda’s Hamilton, the dynamic compositions of Imagine Dragons, and
    the comedic timing of Disney’s animated classics, often while they code.
  travel: Benito Skarie prefers short, adventure‑filled trips that blend cultural immersion and hands‑on experiences, such as a weekend visit to the historic mission in San Antonio, a summer camp in the
    Sierra Nevada, and a future dream of exploring the robotics museums of Tokyo, and they always plan itineraries with a mix of tech workshops and local festivals.
  culinary: Benito Skarie loves cooking tamales and salsa with family, mastering corn masa, pork al pastor, and fresh jalapeños, and they experiment by adding mango chunks to salsa for a sweet twist, though
    they often forget to clean the kitchen afterward.
  core: Benito Skarie is a competitive, tech‑savvy teen who merges soccer strategy with robotics, spends allowances on LEGO and gaming, and can’t resist a late‑night salsa session, even if they leave a
    mess.
background:
  cultural: Benéito is a second‑generation Mexican‑American raised in Redlands, California. At home, Spanish is spoken alongside English, and his family celebrates Mexican holidays such as Día de los Muertos,
    Día de la Independencia, and Las Posadas, often preparing traditional foods and sharing stories of their heritage. He attends a local Catholic parish where gatherings blend Mexican customs with Southern
    Californian influences. The vibrant Mexican community in San Bernardino County provides him with role models in both academic and cultural spheres, reinforcing a strong bicultural identity that informs
    his language skills, culinary interests, and commitment to community service.
attributes:
  skills: '[''basic Python programming'', ''LEGO Mindstorms and VEX robotics construction and programming'', ''Arduino micro‑controller prototyping'', ''Spanish–English bilingual communication'', ''Team
    coordination and peer mentoring'', ''Strategic analysis for soccer gameplay'', ''Basic graphic design using Canva'']'
  hobbies: '[''Soccer (forward position on school team)'', ''Robotics club (LEGO Mindstorms & VEX challenges)'', ''Competitive online strategy gaming'', ''Custom LEGO building and design'', ''Arduino hobby
    projects (sensors, LEDs, simple robots)'', ''Cooking traditional Mexican dishes with family'', ''Volunteering at community cultural festivals'', ''Graphic design for school club posters'']'
  career_goals: Benéito aims to turn his hands‑on curiosity into a career in engineering. He plans to pursue a Bachelor’s degree in mechanical or mechatronics engineering at a university such as Cal Poly
    San Luis Obispo or UC Berkeley, focusing on robotics and sustainable technology. In the short term, he wants to earn certifications in Python and Arduino, win a regional robotics competition, and secure
    a mentorship with a local engineer. Long‑term, he dreams of designing affordable assistive devices and renewable‑energy solutions for underserved communities, leveraging his bilingual background to
    collaborate across cultural contexts and to serve as a bridge between technology and his Mexican‑American community.
