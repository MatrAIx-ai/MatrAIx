  hobbies: '[''gardening'', ''reading historical fiction and biographies'', ''small book club'', ''knitting and quilting'', ''genealogy research'', ''church gospel choir'', ''volunteering at senior center'',
    ''walking in local parks'', ''visiting African‑American art museums'']'
  career_goals: Although retired from formal employment, Samira aims to expand her community impact by mentoring younger volunteers in record‑keeping and event planning, and by documenting oral histories
    of longtime Baltimore residents for the local historical society. She wishes to write a memoir that weaves together her family’s legacy, civil‑rights-era experiences, and culinary traditions, hoping
    it will serve as a resource for future generations. Samira also plans to enhance her digital skills to create an online archive of genealogical records and to learn basic photography to accompany her
    written work. Her overarching ambition is to preserve cultural heritage while fostering intergenerational connections within her small, close‑knit circles.
