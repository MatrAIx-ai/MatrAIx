personas:
  professional: Roger Hodge, a budding toddler engineer who delights in arranging Lego bricks, demonstrates early design instincts, methodically plans miniature structures, balances curiosity with practicality,
    and exhibits an organized, reliable, and assertively cooperative approach that foreshadows a future career in engineering.
  sports: Roger Hodge, a two-year-old who toddles through the Mini Kickers parent-child soccer sessions, eagerly watches the Chicago Cubs on Sunday afternoons, and has a budding fascination with the Los
    Angeles Lakers, blends his love of movement with a methodical habit of lining up his soft balls before play.
  arts: Roger Hodge, a two-year-old who hums Raffi’s 'Baby Beluga' while flipping through Eric Carle’s The Very Hungry Caterpillar, delights in the bright animations of Sesame Street and the playful score
    of Pixar’s Toy Story, letting these colorful narratives shape his daily imagination and early sense of rhythm.
  travel: Roger Hodge, the two-year-old who has already taken a family road trip to the Grand Canyon and a short flight to Disneyland in California, prefers car rides with his favorite blanket, enjoys the
    sensory overload of theme parks but can become overstimulated, and looks forward to a future parents-planned visit to the beaches of Maui.
  culinary: Roger Hodge, a picky two-year-old who regularly devours cheesy macaroni, mashed sweet potatoes, and banana slices, proudly insists on stirring the pancake batter in his Play-Kitchen, favors
    foods with soft textures like avocado mash, and occasionally demands the tiny dinosaur-shaped chicken nuggets his parents prepare.
  core: Roger Hodge is a two-year-old whose toddler curiosity is paired with an unusually methodical streak—lining up blocks before building—while also displaying occasional impulsive assertiveness over
    treats, making his small world a blend of order and playful spontaneity.
background:
  cultural: Roger is raised in a White American family on the suburban edge of Fulshear, Texas, within Fort Bend County. His upbringing blends typical South‑Texas values—friendliness, community orientation,
    and a love for outdoor family activities—with family traditions such as weekend trips to local county fairs, listening to country and folk music, and participation in church‑based gatherings. While
    his immediate cultural exposure is rooted in rural Texan customs, the diverse surrounding community of Fort Bend County also introduces him to a broader array of regional practices and multicultural
    events.
