  career_goals: He aims to channel his business acumen and artistic passion into fostering a vibrant local arts scene. He hopes to mentor budding entrepreneurs, especially those in creative industries,
    and to document his life experiences in a memoir that blends personal narrative with reflections on business and art. He also plans to co‑found a community art collective that offers workshops and exhibition
    space for emerging artists, and to continue learning new artistic techniques such as digital illustration.
