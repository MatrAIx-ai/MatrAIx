  career_goals: Bryan aims to advance to a senior systems analyst or IT architect role within the next five years, focusing on cloud integration and cybersecurity. He plans to earn certifications such as
    AWS Solutions Architect and CISSP to deepen his expertise. He aspires to lead a small, cross‑functional team where he can mentor junior analysts and foster collaborative, low‑stress environments. Ultimately,
    he hopes to become a trusted technology advisor for mid‑size enterprises in the Triangle, helping them streamline operations while maintaining predictable, stable project outcomes.
