personas:
  professional: Myung Yeh is an aspiring digital illustrator‑engineer who blends sketching, graphic‑novel‑style painting, and junior robotics projects, applying a methodical curiosity and organized planning
    to turn school assignments into miniature art‑tech collaborations.
  sports: Myung Yeh occasionally plays on the local youth soccer team, cheers for the hometown Wildcat basketball squad, follows the national soccer side during the World Cup, and balances screen time with
    weekend bike rides through nearby parks.
  arts: Myung Yeh revels in sketching sweeping fantasy scenes, drawing inspiration from graphic‑novel masters like Jim Lee and studio artists such as Fuyumi Saitō, strums acoustic guitar while listening
    to indie rock bands like Arctic Monkeys, and frequents museum exhibitions that showcase both classical oil paintings and contemporary manga art.
  travel: Myung Yeh loves weekend nature walks in the regional state park, dreams of exploring the historic art museums of Florence and the neon‑lit districts of Tokyo, and meticulously plans school trips
    with a checklist of must‑see galleries and a sketchbook ready for on‑the‑go doodles.
  culinary: Myung Yeh helps their family prepare the signature fermented vegetable side dish and hand‑rolled rice rolls, experiments with homemade ramen broth, and can flawlessly assemble a quick stir‑fried
    noodle bowl using soy, sesame oil, and fresh vegetables, while occasionally sneaking a sugary snack after a late‑night drawing session.
  core: Myung Yeh is a curious, organized teen who blends art, robotics, and music into a disciplined yet play‑filled routine, balancing quiet creation with occasional snack‑driven procrastination.
background:
  cultural: Myung is a second‑generation Korean‑American raised in La Puente, California. His household blends traditional Korean values—such as respect for elders, emphasis on education, and celebration
    of holidays like Lunar New Year and Chuseok—with the broader American culture of individuality and community involvement. He speaks both English and Korean fluently, attends weekend Korean language
    school, and enjoys Korean cuisine and pop culture, while also participating in local American traditions and multicultural events. This bicultural upbringing influences his artistic sensibility, his
    collaborative mindset, and his respect for diverse perspectives.
attributes:
  skills: '["Mathematics problem solving", "Scientific inquiry and experimental design", "Digital illustration (Procreate)", "Basic coding (Python, Scratch)", "Project planning and organization", "Bilingual
