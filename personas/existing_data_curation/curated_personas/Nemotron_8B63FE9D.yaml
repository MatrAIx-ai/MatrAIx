  hobbies: '["Sketching and digital painting", "Playing guitar", "Reading sci‑fi and fantasy novels", "Robotics club (Scratch, Arduino)", "Korean language classes", "Cooking traditional Korean dishes",
    "Visiting museums and art galleries", "Nature walks", "Photography"]'
  career_goals: Myung aims to attend a specialized high‑school that blends STEM and the arts, then pursue a college degree in computer science and interactive media. He envisions a career as a UI/UX designer
    or game developer, creating inclusive digital experiences that reflect his appreciation for art and his desire for harmony. Long‑term, he hopes to lead interdisciplinary teams, using his organized approach
    to manage projects that merge technology with cultural storytelling. He also aspires to give back to his community by mentoring younger students in coding and art clubs.
