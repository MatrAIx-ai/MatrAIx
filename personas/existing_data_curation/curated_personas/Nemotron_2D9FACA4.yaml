  hobbies: '[''watercolor painting'', ''quilting'', ''reading historical fiction'', ''reading poetry'', ''documentary watching'', ''vegetable gardening'', ''birdwatching'', ''church book club participation'',
    ''mixed‑media art workshops'']'
  career_goals: Diane aims to advance into a supervisory position such as shift lead or safety trainer, where she can leverage her experience to improve workplace safety and operational efficiency. She
    plans to enroll in a community‑college course on basic computer‑aided design (CAD) to merge her material‑handling expertise with her artistic interests, eventually contributing to small design projects
    like custom shelving or community art installations. Long‑term, she hopes to mentor younger workers and volunteer her organizational skills for the local historical society’s archival and exhibit projects.
