  hobbies: '[''Reading fiction and non‑fiction books'', ''Drawing and sketching nature and beach scenes'', ''Caring for her pet rabbit'', ''Gardening herbs and flowers'', ''Journaling personal reflections'',
    ''Practicing gentle yoga and mindfulness'', ''Baking cookies and simple treats'']'
  career_goals: Linda dreams of becoming a veterinarian who works in a calm, well‑organized small‑animal clinic. She envisions a career that lets her combine her love for routine, hands‑on practical work,
    and deep compassion for living creatures. She hopes to volunteer at local animal shelters throughout high school, earn a scholarship for a veterinary program, and eventually open a modest rescue center
    in Boca Raton where she can provide quiet, attentive care to rescued pets while educating the community about responsible animal stewardship.
