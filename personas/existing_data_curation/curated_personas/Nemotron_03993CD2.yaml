personas:
  professional: Linda Johnston is a budding junior naturalist, a middle school student who volunteers at the local aquarium and spends free time drafting meticulous beach ecosystem sketches; they apply
    their practical curiosity and quiet focus to science projects, yet they often procrastinate on school deadlines, preferring the comfort of their daily routine.
  sports: Linda Johnston is a member of the Coastal Wave Swim Club, where they practice swimming three times a week, they also ride a bike on weekend beach trails, and they cheer for the hometown baseball
    team, the Harbor Hawks, though they rarely join team sports due to a preference for solitary activities.
  arts: Linda Johnston expresses creativity through detailed beach and wildlife sketches inspired by Winslow Homer's marine paintings and Beatrix Potter's delicate animal illustrations; they enjoy listening
    to folk singer John Denver while drawing, and they have a small collection of nature-themed storybooks by author Jane Goodall.
  travel: Linda Johnston loves weekend excursions to the nearby Sandy Cove beach, where they collect shells and photograph tide pools; they have visited the Monterey Bay Aquarium on a school field trip
    and dream of exploring the Great Barrier Reef and Kyoto's bamboo forest during future family vacations, though school schedules limit long trips.
  culinary: Linda Johnston is a budding baker who frequently whips up oatmeal-raisin cookies and honey-butter shortbread to share with family; they season their garden salad with fresh basil and mint from
    their herb patch, and they are comfortable preparing simple dishes like avocado toast with a drizzle of lemon juice, reflecting modest but growing kitchen confidence.
  core: Linda Johnston blends a quiet devotion to nature and routine with a compassionate heart, occasional anxiety, and a tendency to procrastinate, making each day a balance of calm sketches and spontaneous
    cravings for cookies.
background:
  cultural: Linda comes from a white, middle‑class family in the coastal suburb of Boca Raton, Florida. Her upbringing emphasizes traditional values, a stable routine, and community involvement. The family
    often participates in local church activities and neighborhood volunteer events, fostering a sense of responsibility and compassion. They enjoy the quiet, sun‑lit environment of South Florida, with
    frequent family outings to the beach, community parks, and the public library, where Linda has access to a wide range of books and quiet study spaces. This blend of suburban comfort, practical family
    values, and exposure to the coastal natural world shapes her preference for routine, her love of solitary pursuits, and her desire to help others in a tangible, hands‑on way.
