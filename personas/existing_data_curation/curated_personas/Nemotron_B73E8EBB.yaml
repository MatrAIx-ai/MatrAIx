personas:
  professional: Aaron Losada is a teaching assistant who leverages meticulous curriculum support on Canvas and Blackboard while improvising on the fly to resolve classroom disruptions, blending a preference
    for structured lesson plans with a spontaneous knack for conflict mediation.
  sports: Aaron Losada is a weekend hiker of Hocking Hills and a member of the RideFast Columbus cycling club, a fervent supporter of the Columbus Blue Jackets, and prefers solo endurance activities over
    team sports, mixing a competitive streak with a love for solitary fitness.
  arts: Aaron Losada attends improv workshops at The Second City Annex, draws creative fuel from sci‑fi author N.K. Jemisin and indie band Alt‑J, and channels that inspiration into DIY woodworking projects
    and experimental cooking, showcasing how structured craftsmanship merges with spontaneous performance.
  travel: Aaron Losada crafts travel plans that combine a detailed itinerary for a two‑day hike in the Blue Ridge Mountains with flexible detours for local craft breweries, has already visited Asheville’s
    culinary scene and the Appalachian Trail segment in Virginia, and dreams of navigating Tokyo’s tech districts and hidden ramen stalls.
  culinary: Aaron Losada experiments with sous‑vide pork belly, mushroom‑infused risotto, and homemade sourdough, favoring bold flavors like smoked paprika, truffle oil, and fermented kimchi, yet often
    juggles cooking with woodworking, leading to occasional burnt crusts and half‑finished meals.
  core: Aaron Losada is a structured yet spontaneous 31‑year‑old educator who balances meticulous planning with creative improvisation, competitive drive with skeptical caution, and a penchant for geeky
    hobbies and hands‑on craftsmanship.
background:
  cultural: Aaron was raised in Columbus, Ohio, within a middle‑class, primarily white Midwestern family whose ancestry includes German and Irish roots. The regional culture emphasizes practicality, a strong
    work ethic, modesty, and community involvement, all of which have shaped his outlook. He grew up attending local traditions such as Ohio State football tailgates, community festivals, and farmers’ markets,
    and he values straightforward, friendly communication. While he identifies with mainstream American culture, his urban upbringing in Columbus has also exposed him to the city’s growing diversity and
    progressive educational environment.
attributes:
