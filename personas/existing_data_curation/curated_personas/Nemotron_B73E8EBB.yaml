  hobbies: '[''Strategy Video Games'', ''Role‑Playing Games'', ''Science‑Fiction Reading'', ''Hiking (Hocking Hills)'', ''Cycling'', ''Improvisational Theater'', ''DIY Woodworking'', ''Experimental Cooking'']'
  career_goals: Aaron aims to earn a bachelor’s degree in education within the next three years and transition from a teaching assistant to a certified middle‑school teacher, with a focus on inclusive education
    and technology‑enhanced learning. He plans to refine his organizational skills to meet deadlines consistently and seek leadership opportunities, such as leading a tutoring program or coordinating curriculum
    resources. In the longer term, he hopes to become a curriculum coordinator or an educational technology specialist, roles that would let him blend his love for structured planning with his ability to
    innovate on the fly.
