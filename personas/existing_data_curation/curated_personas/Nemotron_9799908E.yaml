  career_goals: Candida aims to finish her high school credits and enroll in a community college program focused on hospitality management or marketing. She envisions a career in event planning or social
    media marketing within Miami's tourism industry, leveraging her outgoing nature and creative skills. In the short term, she hopes to build a personal brand on Instagram, sharing practical lifestyle
    tips and city guides. Long‑term, she aspires to run a boutique event agency that blends organized execution with innovative concepts while mentoring youth in her community.
