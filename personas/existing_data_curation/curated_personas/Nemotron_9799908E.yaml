personas:
  professional: Candida Sox, a 17‑year‑old high‑school senior with a flair for teamwork and a knack for Canva, channels their outgoing nature into planning community beach‑volleyball tournaments and crafting
    Instagram‑ready event promos, balancing creative brainstorming with meticulous budgeting despite occasional bouts of worry about perfection.
  sports: Candida Sox, a 17‑year‑old avid beach‑volleyball player who swings a 2 kg ball with friends at the Miami Beach Volleyball Club, cuts a rug to salsa rhythms at local dance nights, and cheerfully
    supports the Miami Heat and Miami Marlins, balancing competitive spirit with a relaxed, social approach to fitness.
  arts: Candida Sox, a 17‑year‑old creative who curates a visually vibrant Instagram feed inspired by Bad Bunny, Rosalía, and J Balvin, spends afternoons doodling in sketchbooks and hand‑painting phone
    cases, and attends Miami’s Wynwood art walks, using these artistic outlets to channel their outgoing personality and occasional stress.
  travel: Candida Sox, a 17‑year‑old travel enthusiast who maps Instagram‑worthy itineraries across Miami’s Little Havana, Wynwood, and Overtown, has weekend‑escaped to Key West and aspirations to roam
    Barcelona’s Gothic Quarter and Cancun’s beachfront resorts, preferring a blend of budget‑friendly planning and spontaneous detours driven by local food finds.
  culinary: Candida Sox, a 17‑year‑old food lover who savors Cuban sandwiches, spicy tacos al pastor, and fresh mango smoothies while confidently whipping up quick pasta primavera and avocado toast for
    breakfast, delights in customizing phone‑case‑inspired edible designs and views each meal as both a social shareable moment and a practical, budget‑conscious experiment.
  core: Candida Sox, a 17‑year‑old social‑but‑anxious multitasker, balances fierce Instagram branding ambitions with a habit of late‑night snack binges and occasional forgetfulness of homework, channeling
    their boundless energy into beach volleyball, salsa, and DIY design projects.
background:
  cultural: Candida was raised in a white, middle‑class family that moved to Miami when she was five. While her household maintains traditional American customs, the city's vibrant, multicultural atmosphere
    has deeply influenced her. She regularly experiences the blend of Caribbean, Latin, and Southern cultures—listening to reggae and salsa, enjoying Cuban coffee, and celebrating holidays with local twists.
    Through friendships and community involvement, she has picked up conversational Spanish and an appreciation for Miami's street art, beach lifestyle, and diverse culinary scene. This melting‑pot environment
    shapes her open, adaptable cultural identity while she stays connected to her family’s heritage.
