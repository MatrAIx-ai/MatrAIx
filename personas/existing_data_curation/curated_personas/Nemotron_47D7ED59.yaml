  hobbies: '[''Bollywood dance classes'', ''Cooking fusion meals'', ''Gardening'', ''Yoga'', ''Volunteering at health fairs'', ''Book club'', ''Puzzle solving (Sudoku, crosswords)'', ''Walking with family
    dog'', ''Attending cultural festivals'', ''Community choir'']'
  career_goals: Usha aspires to transition into a leadership role within nursing, aiming to become a charge nurse and eventually a nurse manager or clinical educator. She plans to pursue a Master of Science
    in Nursing with a focus on community health or nurse administration, enabling her to design and oversee community outreach programs that address chronic disease management among the South Asian population
    in the Chicago suburbs. Additionally, she is motivated to mentor new nurses, champion patient safety projects, and contribute to evidence‑based practice improvements.
