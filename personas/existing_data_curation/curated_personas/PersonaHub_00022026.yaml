persona_description: A researcher or scientist specializing in the field of environmental toxicology, particularly focusing on the use of micro- and nano-X-ray fluorescence imaging to study the distribution
  of metals within biological systems under various conditions, including the effects of dehydration and cryogenic freezing. This individual is likely to have expertise in X-ray fluorescence analysis, sample
  preparation methods, and the development of dual detector setups for imaging. They are likely to be working on ecotoxicological experiments involving Daphnia magna, a model organism, and are interested
  in the full ecotoxicological experiment, including the potential of dual detector X-ray fluorescence cryotomography and its coupling with laboratory absorption micro-CT.
