  career_goals: Teri aspires to move into senior finance leadership within the public sector, aiming for roles such as Senior Budget Manager or Director of Finance for a school district or municipal agency.
    She plans to earn a Master’s in Public Administration to deepen her policy knowledge. Her long‑term ambition is to shape strategic financial planning that supports equitable education funding while
    mentoring emerging analysts. She also hopes to implement technology‑driven budgeting solutions that increase transparency and community engagement.
