personas:
  professional: Teri Goens is an education‑focused financial analyst who leverages their meticulous budgeting expertise, advanced Power BI and Tableau visualizations, and a knack for leading collaborative
    training sessions to ensure transparent fiscal planning within public‑sector schools, thriving on a structured, achievement‑driven mindset and sociable energy that makes stakeholder meetings feel like
    lively community gatherings.
  sports: Teri Goens is an avid kayaker with the Bayou Teche Paddle Club, a regular attendee of New Orleans Saints games, and a seasonal participant in community yoga and Pilates classes, balancing their
    love of the outdoors with a disciplined fitness routine that includes weekend hikes on local nature trails, and they often track progress with a smartwatch.
  arts: Teri Goens is a frequent visitor to local Zydeco festivals featuring Terrance Simien and Buckwheat Zydeco, a regular patron of the Lafayette art gallery, and an enthusiastic member of a book club
    that discusses contemporary fiction by authors such as Sally Rooney and Jesmyn Ward, their sociable nature making them the lively facilitator of literary debates.
  travel: Teri Goens prefers meticulously planned weekend getaways that blend cultural immersion and outdoor adventure—last year they trekked the Great Smoky Mountains, this summer they paddled the Bay
    of Islands in New Zealand, and they keep a dream list that includes a culinary tour of Oaxaca, Mexico, while balancing a tight public‑sector schedule.
  culinary: Teri Goens is an enthusiastic home‑chef specializing in Cajun and Creole fare, regularly preparing gumbo with okra, andouille sausage, and filé powder, jambalaya with wild rice, and blackened
    catfish, they delight friends with potluck spreads and experiment with fresh shrimp étouffée, while also enjoying occasional fine‑dining experiences at New Orleans’ Coquette.
  core: Teri Goens blends a spreadsheet‑obsessed mind with a party‑host flair, channeling their love for community into meticulously organized potlucks, yet they occasionally forget to unwind, binge‑watching
    financial webinars late into the night.
background:
  cultural: Teri grew up in Lafayette, Louisiana, in a predominantly white, middle‑class family with deep Southern roots. The city’s unique blend of Cajun, Creole, and Acadian traditions influenced her
    appreciation for community gatherings, music, and cuisine. She was raised in a Protestant environment, attending church regularly, which reinforced values of service, humility, and cooperation. Her
    education background reflects a commitment to lifelong learning, and she maintains close ties to local cultural events such as the Festival International and the Cajun Music Festival, which shape her
    social outlook and communal sense of identity.
