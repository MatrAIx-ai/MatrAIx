  hobbies: '[''Cajun/Creole cooking'', ''Book club participation'', ''Volunteer work at Lafayette food bank'', ''Kayaking on Bayou Teche'', ''Hiking nature trails'', ''Yoga and Pilates'', ''Attending zydeco
