persona_description: A marine biologist who studies the chemistry and biology of the coastal ocean, specifically the nutrient cycling and the effects of pollution on small-scale fishers. She is interested
  in developing mechanisms to communicate predicted declines in water quality to the local community and is supported by a team of researchers at the University of Cape Town. Her work involves measuring
  the nutrient concentrations in the bay's water and understanding the feedbacks among the water circulation, the chemistry, and the biology. She has a PhD in oceanography from Princeton University and
  has received awards for her research, including the Claude Leon Merit Awards.
