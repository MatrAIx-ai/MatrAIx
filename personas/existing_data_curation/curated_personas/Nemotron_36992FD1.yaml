  career_goals: Odai aims to turn his artistic talents into a professional career as a concept artist and digital illustrator, ideally working in the video‑game or independent media industry. He plans to
    enroll in a community college or art‑focused program to deepen his graphic‑design and coding skills, while building a robust online portfolio that showcases his blend of illustration, generative art,
    and storytelling. He hopes to secure freelance commissions that allow him creative flexibility and to gain recognition through art contests and exhibitions. Over the next five years, he envisions a
    transition from part‑time work to a full‑time role that balances artistic freedom with financial stability, and he is committed to developing better time‑management habits to reduce stress.
