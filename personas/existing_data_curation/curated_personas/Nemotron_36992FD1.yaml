personas:
  professional: Odai Levy is an aspiring concept artist and digital illustrator who fuses surreal sketching, generative Python scripts, and ambient acoustic guitar soundscapes into speculative visual narratives,
    while often procrastinating on deadlines due to a relaxed attitude toward obligations.
  sports: Odai Levy enjoys casual weekend hikes along the Neuse River trails, plays on a local ultimate frisbee team that practices after school, and roots for the East Carolina Pirates football squad,
    yet often prefers indoor gaming sessions when stress overwhelms them.
  arts: Odai Levy draws creative fuel from surrealists like Dalí, ambient composers such as Brian Eno, and indie game designers like Jenova Chen, spending evenings listening to the soundtrack of 'Journey'
    while sketching dream‑like concept art for speculative worlds.
  travel: Odai Levy favors spontaneous, low‑budget trips that blend natural scenery and cultural curiosity, having trekked the Outer Banks dunes, driven the Blue Ridge Parkway in autumn, and dreaming of
    a future pilgrimage to Kyoto’s bamboo groves to study traditional ink painting.
  culinary: Odai Levy’s culinary habit swings between quick ramen bowls, spicy Korean tteokbokki, and homemade avocado toast with smoked salmon, and they experiment with espresso‑based coffee drinks while
    occasionally burning toast due to absent‑mindedness.
  core: Odai Levy is a 19‑year‑old imaginative wanderer who mixes surreal art, ambient guitar, and speculative storytelling, wrestles with chronic worry, and balances a frugal budget with occasional creative
    splurges.
background:
  cultural: Odai grew up in Washington, a small town in Pitt County, North Carolina, within a predominantly white, Southern community. His family’s roots trace back to generations of local agriculture and
    service‑industry work, and he was raised with values of modesty, hospitality, and a strong sense of community. While he appreciates regional traditions such as Southern cuisine, folk music, and local
    storytelling, his personal interests are heavily shaped by digital culture and global artistic movements accessed through the internet. This blend of Southern upbringing and contemporary artistic exposure
    gives him a unique perspective that combines grounded, down‑to‑earth sensibilities with a drive for imaginative and innovative expression.
