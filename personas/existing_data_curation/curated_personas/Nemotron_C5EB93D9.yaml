  career_goals: Mariela aims to transition into a senior executive role, such as Vice President of Operations, where she can champion flexible work structures and embed creativity into the organization’s
    culture. She is passionate about establishing a regional mentorship program for women and underrepresented groups in STEM, leveraging her network to create internships and scholarships. Additionally,
    she envisions launching a community arts‑and‑technology incubator in Del Rio that merges local cultural heritage with innovative tech solutions, leaving a lasting legacy of empowerment and cross‑disciplinary
    collaboration.
