personas:
  professional: A senior operations strategist named Mariela Quinones leverages two decades of interdisciplinary management experience, advanced data analysis, and bilingual communication to lead agile
    teams, injecting surreal artistic vision into tech projects while they thrive on flexible, loosely structured planning.
  sports: Mariela Quinones enjoys seasonal hiking in the Edwards Plateau and birdwatching with the Del Rio Trail Club, supports the San Antonio Spurs in basketball season and the Houston Astros in baseball,
    and they balance a low‑impact home fitness routine with occasional community yoga sessions.
  arts: Mariela Quinones spends weekends painting surreal landscapes inspired by folk art motifs, drawing influence from Frida Kahlo, Diego Rivera, and Georgia O’Keeffe, while reading speculative fiction
    by Octavia Butler and listening to the experimental sounds of Björk and the folk guitar work of José González, and they attend local poetry slams featuring bilingual verses and performance art.
  travel: Mariela Quinones prefers spontaneous, culturally immersive trips, often booking last‑minute flights to Tuscany to practice Italian, and they also enjoy road trips across Texas to Big Bend National
    Park and annual weekend retreats in Santa Fe, balancing modest budgeting with a desire for artistic inspiration.
  culinary: Mariela Quinones is an avid home chef who skillfully blends Tex‑Mex flavors with global twists—such as cilantro‑lime infused carne asada tacos topped with gochujang‑spiced pico de gallo or a
    rosemary‑scented chocolate churro—favoring fresh ingredients like roasted poblano peppers, carne de res, and heirloom tomatoes, and they regularly experiment in the kitchen while savoring occasional
    nights out at a local farm‑to‑table bistro.
  core: Mariela Quinones blends scientific rigor with vivid imagination, juggling agile leadership, weekend surreal painting, and a habit of forgetting appointments while they always find time for a sunrise
    hike.
background:
  cultural: Mariela is a third‑generation Mexican‑American from Del Rio, Texas, a city that sits on the U.S./Mexico border. She was raised in a bilingual household where Spanish was spoken at home and English
    at school, fostering deep ties to both Mexican and Texan cultures. Family traditions such as Día de los Muertos, Christmas posadas, and local fiestas are central to her identity, as are the values of
    hospitality, respect for elders, and community solidarity. This bicultural upbringing informs her collaborative approach at work, her love of Mexican folk art, and her commitment to giving back to the
    community through mentorship and cultural programs.
