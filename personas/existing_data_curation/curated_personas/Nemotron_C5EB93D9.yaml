  hobbies: '[''Oil painting'', ''Digital illustration'', ''Reading speculative fiction'', ''Bilingual poetry writing'', ''Hiking in the Edwards Plateau'', ''Birdwatching'', ''Cooking Tex‑Mex fusion dishes'',
