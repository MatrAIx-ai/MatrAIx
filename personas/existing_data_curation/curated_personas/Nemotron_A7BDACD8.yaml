personas:
  professional: Michelle Church, a 24‑year‑old data‑visualization specialist‑in‑training, merges Python‑based statistical modeling with oil‑painting‑inspired visual storytelling, channeling their vivid
    imagination and organized workflow into intuitive climate‑tech dashboards while habitually double‑checking designs to soothe their underlying worry and striving to mentor emerging women in STEM.
  sports: Michelle Church spends weekends hiking with the Denver Mountain Club through Rocky Mountain National Park and, in winter, hits Vail’s slopes while cheering on the Denver Broncos, Colorado Avalanche,
    and Colorado Rockies, often planning cardio treks that double as photo expeditions for their next illustration.
  arts: Michelle Church, an avid oil painter and digital illustrator, draws creative fuel from the luminous installations of Olafur Eliasson and the ambient soundscapes of Aphex Twin, curates playlists
    featuring Mitski and Tame Impala during studio hours, and regularly visits Denver’s RedLine Contemporary Art Center and local maker fairs to stay immersed in the indie art scene.
  travel: Michelle Church favors meticulously planned eco‑adventures, having trekked the Rocky Mountains, explored Banff’s glacial valleys, and dreaming of chasing the northern lights in Iceland and cherry
    blossoms in Kyoto, while balancing a modest travel fund with spontaneous weekend road trips to New Mexico’s desert art colonies.
  culinary: Michelle Church’s culinary palate leans toward farm‑to‑table fare, often crafting quinoa‑beet salads with tangy goat cheese, simmering mushroom risotto seasoned with sage, and experimenting
    with spicy homemade kimchi, while their go‑to comfort dish is a steaming bowl of vegan ramen garnished with soft‑boiled eggs.
  core: Michelle Church is a restless dreamer who fuses data science with abstract art, constantly juggling spreadsheets and paintbrushes, yet habitually procrastinates creative projects until midnight,
    feeding their anxiety with caffeine and late‑night sketching marathons.
background:
  cultural: Michelle was raised in a middle‑class white family in the Denver metropolitan area, where outdoor recreation and a progressive, environmentally conscious ethos are central to community life.
    Growing up, family traditions such as holiday gatherings, summer barbecues, and weekend trips to the mountains shaped her appreciation for both communal harmony and individual exploration. Her university
    experience exposed her to a diverse peer group, reinforcing inclusive values and a collaborative spirit. The blend of Colorado’s rugged natural landscape, its forward‑thinking cultural climate, and
    her familial emphasis on kindness and cooperation informs her worldview and personal identity.
attributes:
  skills: '["Python programming", "R statistical analysis", "Data visualization", "Scientific research methods", "Technical writing", "Creative problem solving", "Digital illustration", "Basic UX design",
