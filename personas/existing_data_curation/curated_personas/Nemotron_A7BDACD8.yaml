  hobbies: '["Oil painting", "Digital illustration", "Hiking in the Rockies", "Nature photography", "Reading speculative fiction", "Playing synthesizer", "Short story writing", "Yoga and mindfulness meditation",
    "Attending art galleries", "Visiting maker fairs"]'
  career_goals: Michelle aspires to a career at the intersection of technology, sustainability, and visual storytelling. She aims to become a data visualization specialist or UX researcher for environmental‑tech
    companies, where she can design intuitive interfaces that make climate and renewable‑energy data accessible to diverse audiences. She is considering graduate studies in Human‑Computer Interaction to
    deepen her expertise, while also seeking opportunities that allow her to mentor younger women in STEM. Ultimately, she wants a role that satisfies her intellectual curiosity, lets her channel her artistic
    imagination, and contributes meaningfully to societal and environmental well‑being.
