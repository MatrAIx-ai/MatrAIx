  career_goals: Yin aims to transition into a senior program management role where she can lead multi‑disciplinary, multi‑million‑dollar initiatives that blend technology with artistic expression. She plans
    to earn PMP and Certified Scrum Master credentials, champion inclusive project cultures, and establish herself as a thought leader in integrating creative design into corporate workflows. Long‑term,
    she envisions launching a boutique consultancy that helps organizations embed art‑driven innovation into their project pipelines while mentoring emerging women leaders in the Midwest.
