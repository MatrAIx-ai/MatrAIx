persona_description: A former astronaut who served on the Apollo 15 mission, which was the second manned mission to land on the Moon. The text describes the rocket engine used in the Surveyor lunar landing
  probe, which was developed and built by the Reaction Motors Division of the Thiokol Chemical Corporation. The engine was used to provide propulsion for mid-course trajectory correction maneuvers and attitude
  and velocity control before and during landing. The text also mentions that the Surveyor's main solid-fuel retro rocket provided the primary propulsion during descent to the lunar surface.
