    team'']'
  hobbies: '[''Hiking and nature walks'', ''Visiting art museums and galleries'', ''Reading literary fiction'', ''Journaling and reflective writing'', ''Yoga and meditation'', ''Photography (especially
    architectural)'', ''Cooking seasonal dishes'', ''DIY home décor and crafting'', ''Participating in book clubs'', ''Volunteering at community literacy programs'']'
  career_goals: Manal aims to advance from first‑line supervisor to a facilities manager role within a hospitality or institutional organization, where she can oversee larger operational teams and drive
    strategic initiatives. She intends to earn a Certified Professional Housekeeper credential and pursue a master's degree in facilities management. Long‑term, she envisions establishing her own consulting
    firm that helps businesses implement efficient, environmentally sustainable cleaning processes and staff development programs. She also hopes to mentor emerging supervisors, particularly women, to foster
    inclusive leadership in the industry.
