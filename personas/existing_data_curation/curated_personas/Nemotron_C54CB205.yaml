personas:
  professional: Manal Lieberman, a seasoned housekeeping supervisor in the hospitality sector, leverages meticulous organization, a curiosity for sustainable practices, and assertive yet compassionate leadership
    to streamline operations, train staff, and implement eco‑friendly cleaning initiatives.
  sports: Manal Lieberman hits the Rocky Mountain trails on weekends, runs with the Denver Trail Runners club, supports the Colorado Rockies and the Denver Broncos, and balances a disciplined fitness routine
    with the occasional guilt‑inducing binge‑watch of sports highlights.
  arts: Manal Lieberman, a regular at the Denver Art Museum and local gallery openings, draws inspiration from photographers like Andreas Gursky, devours literary fiction by Jhumpa Lahiri, and collects
    limited‑edition prints from emerging muralists, weaving visual storytelling into daily life.
  travel: Manal Lieberman prefers meticulously planned weekend getaways to mountain resorts like Aspen and cultural city trips to Portland and Kyoto, yet slips into spontaneous day hikes whenever a new
    trail map appears on their phone, balancing a budget‑conscious mindset with a craving for immersive experiences.
  culinary: Manal Lieberman, an intermediate home chef, loves seasonal dishes such as quinoa‑crusted salmon with roasted beet‑goat cheese salad, seasons meals with fresh rosemary and imported olive oil,
    experiments with Mediterranean grain bowls, while often kidnapping leftovers for late‑night snack runs.
  core: Manal Lieberman is a precision‑driven housekeeping leader who channels anxiety into detailed journals, can’t resist a nightly latte, and obsessively aligns hiking routes with sunrise.
background:
  cultural: Manal is a White American with German and Irish ancestry, raised in the Denver metropolitan area. Her upbringing blended a Midwestern work ethic with the progressive, environmentally conscious
    culture of Colorado. Her arts and humanities education fostered an appreciation for diverse artistic traditions and a respectful curiosity toward different cultures, which she brings to her supervisory
    role by promoting inclusive workplace practices. She identifies with contemporary American values of independence, social responsibility, and community engagement, regularly participating in local cultural
    events, sustainability initiatives, and volunteer programs.
attributes:
