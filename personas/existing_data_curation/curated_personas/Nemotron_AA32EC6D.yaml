    ''Safety compliance and OSHA regulations'', ''Client communication and sales presentations'', ''Crew leadership and training'', ''Problem solving and troubleshooting'']'
  hobbies: '[''Playing basketball at local parks'', ''Urban photography (street art and flora)'', ''Grilling and seasonal cooking'', ''DJing at weekend gatherings'', ''Volunteering at community gardens'',
    ''DIY home‑improvement projects'', ''Listening to horticulture podcasts'', ''Attending live indie music shows'', ''Running along the Brooklyn waterfront'']'
  career_goals: Scott aims to advance from a skilled groundskeeping worker to a senior project manager within a large commercial landscaping firm, overseeing multi‑site urban green projects across New York
    City. He plans to attain professional certifications such as the Certified Landscape Professional (CLP) and OSHA safety trainer credentials. Ultimately, he aspires to launch his own eco‑focused landscaping
    business that integrates innovative green‑infrastructure solutions—like rain‑garden installations and low‑impact irrigation—while maintaining the reliable, proven methods that have served his clients
    well. He also hopes to mentor younger workers and contribute to community‑based greening initiatives in Brooklyn.
