personas:
  professional: Scott Simmons is a methodical landscaping project manager who leverages deep horticultural knowledge, precise site assessments, and charismatic client presentations to deliver sustainable
    urban green‑infrastructure projects, while their competitive nature pushes them to hit and surpass performance targets on the road to senior leadership.
  sports: Scott Simmons fuels their competitive edge by playing pickup basketball at Prospect Park, cheering for the Brooklyn Nets and New York Knicks, running the Brooklyn waterfront three times a week,
    and joining a summer adult softball league, all while maintaining a disciplined fitness schedule.
  arts: Scott Simmons captures the vibrant street art of Bushwick with a DSLR, curates eclectic DJ sets that blend Arcade Fire, Tame Impala, and local indie acts, and frequents live shows at Music Hall
    of Williamsburg and Brooklyn Steel, letting the indie music scene sculpt their social identity.
  travel: Scott Simmons enjoys weekend trips to the Hudson Valley’s farm‑to‑table retreats, annual visits to Portland’s garden districts, dreams of touring Copenhagen’s sustainable urban farms, and often
    explores Brooklyn’s historic neighborhoods by bike, blending a love for nature with budget‑conscious planning.
  culinary: Scott Simmons excels at grilling seasonal vegetables like heirloom tomatoes, sweet corn, and rosemary‑infused zucchini, pairs them with homemade chimichurri, masterfully smokes a brisket on
    weekends, and experiments with fermented kimchi, though they sometimes default to take‑out pizza after a long project day.
  core: Scott Simmons is a sociable, detail‑obsessed horticulture professional who channels competitive energy into basketball and DJing, balances disciplined finances with occasional splurges, and blends
    green‑thumb ingenuity with a late‑night pizza habit.
background:
  cultural: Scott was raised in a working‑class, white, Irish‑American family in Brooklyn’s Crown Heights neighborhood. Growing up in a culturally diverse borough, he was exposed to a mix of traditions,
    cuisines, and community activities that broadened his outlook. His family emphasized hard work, reliability, and community involvement—values that underpin his professional ethic. The vibrant urban
    culture of Brooklyn, with its street art, neighborhood festivals, and strong community gardening movement, has shaped his appreciation for both the city’s heritage and its evolving environmental initiatives.
attributes:
  skills: '[''Plant identification and selection'', ''Soil testing and amendment'', ''Irrigation system design and maintenance'', ''Sustainable landscaping practices (e.g., xeriscaping, native planting)'',
