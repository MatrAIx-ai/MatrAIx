personas:
  professional: Kayla Jacobs, a 31‑year‑old construction‑trade helper in Waldo County, blends hands‑on carpentry, blueprint reading, and OSHA‑savvy safety practices with a talkative, team‑motivating style
    that lets them improvise solutions on the fly while eyeing a journeyman certification and a future as a green‑construction foreman.
  sports: Kayla Jacobs spends weekends hiking the coastal trails with the Waldo County Trail Club, paddling the Penobscot River as a member of the Penobscot Kayak Guild, and cheering on the New England
    Patriots and Portland Sea Dogs while occasionally joining a community softball league.
  arts: Kayla Jacobs fuels their love of storytelling through weekly Dungeons & Dragons sessions, while evenings are often spent at The Oxford Union listening to folk acts like The Milk Carton Kids, Sufjan
    Stevens, and the local group The Eastland String Band, and they dabble in acoustic guitar jam sessions at town potlucks.
  travel: Kayla Jacobs prefers spontaneous road‑trip adventures, often packing a kayak for a weekend at Acadia National Park or a night under the stars in Bar Harbor, while dreaming of a spring bike‑tour
    through the coastal villages of Nova Scotia and a summer festival trip to Austin, Texas, balancing these getaways with occasional family obligations and a modest travel budget.
  culinary: Kayla Jacobs enjoys cooking rustic New England fare, from buttery lobster rolls and creamy clam chowder to heirloom tomato and basil salads harvested from their garden, and they relish experimenting
    with pickling cucumbers and fermenting cabbage while sharpening their skillet‑searing skills on weekend barbecues.
  core: Kayla Jacobs blends a curiosity‑driven pragmatism with an easygoing, talkative nature, turning every construction site into a social hub while juggling spontaneous tool splurges, occasional back
    pain, and a relentless love for the outdoors.
background:
  cultural: Kayla grew up in a small New England town in Maine, raised in a predominantly Anglo‑American family with deep roots in the region’s woodworking and fishing traditions. The community’s emphasis
    on self‑reliance, outdoor recreation, and close‑knit social networks shaped her practical, hands‑on outlook and love for local gatherings. While she attended a community college for construction management
    but didn’t complete a degree, she values lifelong learning and stays attuned to emerging building technologies, blending traditional New England work ethic with a forward‑looking curiosity.
attributes:
  skills: '["basic carpentry", "concrete formwork", "power tool operation", "blueprint reading", "OSHA safety compliance", "site cleanup", "material handling", "team coordination", "customer interaction",
    "quick problem solving"]'
  hobbies: '["hiking local trails", "kayaking on the Penobscot River", "participating in community potluck gatherings", "DIY home improvement projects", "volunteering with Habitat for Humanity", "playing
    tabletop role‑playing games", "attending live folk‑music shows", "gardening and growing vegetables"]'
  career_goals: Kayla aims to earn a journeyman carpenter certification within the next three years and eventually move into a foreman or project‑lead role where she can guide crews and make strategic decisions.
    She is interested in sustainable building methods and hopes to become a certified green‑construction specialist, positioning herself as a competitive candidate for larger, environmentally focused projects
    in Maine. Long‑term, she envisions launching a small, community‑oriented construction assistance business that offers flexible staffing for local builders and DIY homeowners, leveraging her people skills
    and reputation as a reliable, adaptable worker.
