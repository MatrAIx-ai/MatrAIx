persona_description: A linguist who specializes in the study of phonetics and phonology, particularly the principles and processes involved in the production, perception, and perception of speech sounds.
  They are proficient in the analysis and interpretation of rime patterns, consonant clusters, and consonant blends, and are skilled in decoding both single-syllable and multi-syllable words. They are also
  knowledgeable about the rules governing the placement of vowels and consonants in words, and how these rules can be applied to the construction of new words. They are adept at identifying and distinguishing
  between different types of consonant clusters and blends, and can use this knowledge to decode words and sentences. They are also familiar with the various phonetic symbols and their corresponding sounds,
  and can use these symbols to aid in the decoding of words.
