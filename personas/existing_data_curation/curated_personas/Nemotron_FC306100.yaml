personas:
  professional: Lechi Edavally, an aspiring teenage digital illustrator and budding UI/UX designer, they blend meticulous project planning with a curious, open‑minded approach to visual storytelling, turning
    school assignments and personal art experiments into a fledgling portfolio that showcases cultural motifs and user‑centric design.
  sports: Lechi Edavally enjoys weekly badminton matches at the community hall, they follow the NBA’s Golden State Warriors and the English Premier League’s Manchester United, and they balance school track
    practice with yoga sessions to stay flexible and relieve screen‑time tension.
  arts: Lechi Edavally immerses themselves in digital illustration, they draw inspiration from Studio Ghibli’s Hayao Miyazaki, Artgerm’s vibrant character art, and indie pop band The 1975, while also devouring
    sci‑fi epics like The Name of the Wind and attending local Diwali and Onam cultural showcases that weave traditional music and dance into their creative palate.
  travel: Lechi Edavally prefers meticulously planned weekend getaways, having explored the backwaters of a coastal town and the historic streets of Kyoto, they now dream of backpacking through the Alps
    and attending a design conference in Berlin, all while negotiating parental curfew constraints and school exam calendars.
  culinary: Lechi Edavally, an enthusiastic home cook, they master medium‑spice Malayalam dishes like appam with coconut‑milk stew and fish molee, experiment with fresh curry leaves, mustard seeds, and
    tamarind, while balancing quick ramen nights and occasional take‑out pizza cravings after long art sessions.
  core: Lechi Edavally is a methodical teen artist who channels curiosity into digital sketches, they save meticulously but splurge on art supplies, battle occasional acne, and blend cultural festivals
    with indie music playlists, all while juggling school, gaming, and family cooking.
background:
  cultural: Lechi comes from a Malayali (Kerala) Indian family that immigrated to the United States. At home, Malayalam is spoken alongside English, and family traditions such as celebrating Onam, Vishu,
    and Diwali are observed. The family maintains strong ties to their cultural heritage through food, music, and community gatherings at the local Hindu temple and cultural association in the Greater Houston
    area. Growing up in Cypress, TX, Lechi blends his South Asian roots with American suburban life, navigating a bicultural identity that influences his artistic expression and worldview.
