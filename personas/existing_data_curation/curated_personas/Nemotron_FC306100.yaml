  career_goals: Lechi aims to complete high school with strong academic performance, then pursue a bachelor's degree in graphic design or user experience (UX) design at a university with a robust art program.
    He hopes to combine his love for cultural storytelling with modern digital media, eventually working as a UI/UX designer or freelance illustrator, creating culturally resonant visual content. In the
    short term, he plans to build a portfolio of artwork and take online courses in design software, while also seeking mentorship opportunities through local art clubs.
