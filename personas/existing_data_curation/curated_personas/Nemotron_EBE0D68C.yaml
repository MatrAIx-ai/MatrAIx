  career_goals: Although retired, Jane aims to channel her technical knowledge and organizational strengths into community service. She plans to develop a local science outreach program for elementary schools
    in Sheboygan, mentor high‑school students interested in engineering, and volunteer as a grant writer for the city’s senior services. Additionally, she aspires to continue lifelong learning through online
    courses in environmental science, and to document her family’s history for the local historical society.
