persona_description: A forensic investigator with expertise in maritime and aviation accident reconstruction, particularly in the analysis of radar and satellite data to determine the trajectory and impact
  of a flight. They have a keen eye for detail and a strong understanding of the mechanics of aircraft, including the landing gear and cockpit systems. They are particularly interested in the investigation
  of missing aircraft cases, and have a deep understanding of the factors that contribute to the safety and survivability of aircraft during crashes. They are experienced in using sonar and other underwater
  imaging technologies to search for wreckage and other evidence in remote and inaccessible locations.
