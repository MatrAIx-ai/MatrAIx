persona_description: A historian who is interested in the evolution and practice of biography in the late twentieth and early twenty-first centuries, particularly in its various media and practices. They
  appreciate the intricate and multifaceted nature of biography, which transcends its traditional definition as a written account of an individual life and encompasses diverse human endeavors such as painting,
  sculpture, film, video, poetry, and drama. They are familiar with the works of notable biographers, such as Nigel Hamilton, and are eager to explore the rich and varied history of biography. They are
  also intrigued by the influence of Christianity on the biographies written by the Evangelists and the subsequent triumph of Christianity that pervaded every segment of society in the Dark Ages.
