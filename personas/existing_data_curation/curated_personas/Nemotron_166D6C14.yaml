  career_goals: Laura dreams of turning her love of art and curiosity about the world into a future career. She hopes to become a children’s book illustrator or a museum curator where she can share art
    with others, and she also imagines herself as a scientist‑astronaut who explores space and discovers new ideas. She often says she wants to "help people understand beautiful things" and to "solve puzzles
    that matter."
