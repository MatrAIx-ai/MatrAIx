  career_goals: He aims to turn his social‑media savvy and love of gaming into a professional career, targeting a role as a digital content creator and influencer for gaming and tech topics. Deyvis hopes
    to build a sizable YouTube/TikTok following, monetize his videos, and eventually launch his own brand of gaming accessories or a small tech repair service for his community. In parallel, he plans to
    finish his high‑school education (or earn a GED) and possibly study communications or computer science, giving him the credentials to work in digital marketing or software development. His competitive
    drive pushes him to participate in regional e‑sports tournaments, hoping to secure sponsorships and turn his hobby into a revenue stream.
