  hobbies: '[''Reading Mexican and Texas history'', ''Playing chess (tournaments)'', ''Gardening (vegetables and roses)'', ''Cooking traditional Mexican dishes with Texan variations'', ''Hill Country hiking
    and birdwatching'', ''Participating in small‑group financial literacy workshops'', ''Solving crosswords and logic puzzles'']'
  career_goals: Approaching retirement, Sebastian aims to transition from day‑to‑day audit work to a senior advisory role where he can leverage his expertise to guide small‑business owners and nonprofit
    boards on financial strategy and risk management. He is pursuing the Certified Management Accountant (CMA) designation to broaden his strategic outlook and intends to champion the adoption of AI‑driven
    analytics within his firm’s audit practice. A competitive professional, he hopes to earn the firm’s 'Auditor of the Year' award and to be recognized as a mentor who shapes the next generation of accountants.
    Ultimately, he wants to secure a comfortable legacy for his family while continuing to contribute his knowledge through community finance workshops.
