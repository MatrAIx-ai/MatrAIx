  career_goals: Kevin aims to advance from his current inspector role to a senior quality‑assurance supervisor position within the next five years. He plans to obtain a Certified Quality Inspector (CQI)
    credential and complete his GED, followed by coursework toward an associate degree in industrial technology. His long‑term ambition is to lead a cross‑functional quality‑improvement team, incorporating
    data‑driven techniques to reduce waste and increase product consistency. He also hopes to mentor junior employees and develop stress‑management skills that enable him to handle the pressures of higher‑level
    responsibilities while maintaining a healthy work‑life balance.
