  hobbies: '[''visiting art galleries'', ''listening to jazz and hip‑hop'', ''sketching and graffiti'', ''digital illustration'', ''creative writing (poetry and rap)'', ''studying African-American history'',
    ''cooking soul food'', ''journaling'', ''reading graphic novels'', ''playing narrative video games'']'
  career_goals: Jacquelyn aspires to turn her passion for visual arts and storytelling into a sustainable career. She plans to build a strong portfolio of murals, illustrations, and short videos that reflect
    African‑American culture and social commentary. In the next few years, she aims to enroll in a community college or art program, secure an apprenticeship with a local muralist, and start a freelance
    graphic‑design gig. Ultimately, she hopes to launch a community arts collective in Kansas City that offers workshops for youth, curates public art projects, and provides a platform for emerging Black
    artists.
