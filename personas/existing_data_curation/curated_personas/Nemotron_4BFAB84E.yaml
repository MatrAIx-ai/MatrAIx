personas:
  professional: Jacquelyn Hall, a 17-year-old visual storyteller, blends charcoal sketches, spray-paint murals, and digital illustrations into short-form TikTok videos, leveraging their collaborative, flexible
    nature to lead community art jams despite a habit of last-minute planning.
  sports: Jacquelyn Hall enjoys pick-up basketball at the local park, follows the Kansas City Chiefs and Royals, and drifts between casual skateboarding sessions and a weekly yoga class, balancing a laid-back
    fitness routine with bursts of competitive energy.
  arts: Jacquelyn Hall immerses themselves in the art world, frequenting the Nelson-Atkins Museum, drawing inspiration from John Coltrane, A Tribe Called Quest, and the street-art provocateur Banksy, while
    curating personal playlists that blend jazz improvisations with hip-hop beats to fuel their poetry and graffiti sessions.
  travel: Jacquelyn Hall prefers spontaneous weekend road trips to culturally rich cities like New Orleans for its jazz heritage and Savannah for its historic squares, often using a budget-tracking app
    to stretch a modest teen allowance while dreaming of a future solo art-residency tour across Europe.
  culinary: Jacquelyn Hall showcases a budding chef’s flair by mastering fried chicken, collard greens, and cornbread, seasoning dishes with smoked paprika and hot sauce, and swapping recipes during neighborhood
    potlucks, yet they sometimes over-salt meals in their enthusiasm for bold flavors.
  core: Jacquelyn Hall is a curious, flexible teen whose artistic drive fuels late-night sketch marathons, impulsive spending on supplies, and a habit of juggling multiple projects with a carefree, slightly
    disorganized flair.
background:
  cultural: Jacquelyn is a Black teenager raised in the vibrant, historically rich neighborhoods of Kansas City, Missouri. Her family roots trace back to the Great Migration, and cultural traditions such
    as church music, soul food cooking, and community gatherings are central to her upbringing. She grew up with the legacy of Kansas City's jazz scene and the city's strong mural movement, which fuel her
    artistic expression. Participation in local events like Juneteenth celebrations, the African‑American Heritage Festival, and youth programs at the Kansas City Public Library have reinforced her sense
    of identity and responsibility to represent her community. The blend of Midwestern values and Black cultural heritage shapes her perspective, driving her curiosity about art, social justice, and communal
    storytelling.
