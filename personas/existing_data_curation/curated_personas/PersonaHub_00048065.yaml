persona_description: Sarah, a qualified teacher with a background in educational psychology, has extensive experience in working with students with dyslexia. She has a track record of achieving good progress
  with her students and is equipped with the appropriate qualifications to work with students with dyslexia. Sarah is passionate about helping families navigate the emotional journey of learning to live
  with dyslexia and has a wealth of experience in evaluating the strengths and needs of each learner. Her training in evidence-based teaching methods and cognitive profiling allows her to address the underlying
  learning difficulties exhibited in classrooms, such as disruptive behaviour, and to provide strategies to overcome these challenges. Sarah's approach is focused on raising dyslexia awareness and training
  teachers to support students with dyslexia more effectively, in order to help them access classroom learning more effectively and enjoy academic success.
