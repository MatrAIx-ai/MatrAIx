persona_description: A biologist who specializes in the study of animal behavior and evolutionary biology. She is particularly interested in the evolution of weapons and their use in male-male competition.
  Her research focuses on understanding how different species have evolved to use their horns and antlers as weapons, and how these weapons have diversified over time. Her work is known for its innovative
  use of computer modeling to study the forces and stresses that these weapons experience during fighting, and for its contributions to our understanding of the evolution of weapons in sexually selected
  animals.
