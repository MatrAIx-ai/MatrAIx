personas:
  professional: Angelie Taylor, a disciplined veteran transit driver in the Atlanta area, applies meticulous route optimization, safety compliance expertise, and a passion for community outreach, and they
    mentor new drivers while crafting training manuals, eyeing a future as a transit operations supervisor championing equitable service for underserved neighborhoods.
  sports: Angelie Taylor follows the Atlanta Hawks and Braves with devoted enthusiasm, fits early morning walks and weekend bike rides into a meticulously planned schedule, and they attend community yoga
    classes to counterbalance the sedentary nature of their transit work.
  arts: Angelie Taylor visits the Atlanta Contemporary and neighborhood galleries, sketches transit scenes, captures sunrise vistas in landscape photography, and they unwind to the timeless sounds of Miles
    Davis, Billie Holiday, and contemporary gospel choirs, drawing creative inspiration from both classic jazz and modern visual art.
  travel: Angelie Taylor plans detailed road trips that weave through historic Savannah, the misty Blue Ridge Mountains of Asheville, and cultural festivals in New Orleans, and they balance a thirst for
    exploration with a careful budget, reserving funds for a coveted pilgrimage to Washington DC's museums.
  culinary: Angelie Taylor cultivates basil, thyme, and okra in a home garden that seasons their Saturday-made gumbo, roasted vegetable medleys, and occasional shrimp and grits, and they enjoy experimenting
    with new recipes while relying on a trusted cast-iron skillet.
  core: Angelie Taylor blends disciplined transit expertise, a curiosity for art, and meticulous budgeting, yet their constant worry fuels nightly journaling and a habit of double-checking schedules even
    at home.
background:
  cultural: Angelie was raised in a close‑knit Black family in the Atlanta metro area, and her cultural identity is deeply rooted in Southern traditions and African‑American heritage. Church life, gospel
    music, and community gatherings have shaped her values of cooperation and service. She regularly celebrates Juneteenth and participates in local Black arts festivals, drawing inspiration from the rich
    history of the civil‑rights movement in Georgia. Family meals feature soul‑food classics such as fried chicken, collard greens, and peach cobbler, reinforcing a sense of belonging. This upbringing instilled
    a strong communal responsibility that informs her dedication to providing safe, reliable transportation for her neighbors and preserving the cultural vibrancy of her community.
attributes:
  skills: '["Commercial Driver''s License (Class B)", "Vehicle inspection and basic maintenance", "Route planning and navigation using GPS", "Passenger safety and emergency response", "Customer service
    and conflict resolution", "Schedule management and punctuality", "Record keeping and mileage logging", "Training and mentorship of new drivers", "Use of transit scheduling and ticketing software", "Knowledge
    of local cultural and tourist sites", "Organizational and time-management skills", "Stress-management and emotional regulation techniques"]'
  hobbies: '["Visiting art galleries and museums", "Painting and sketching", "Landscape photography", "Reading African-American literature and historical fiction", "Listening to jazz, gospel, and soul music",
    "Gardening", "Volunteering for community road safety workshops", "Exploring scenic drives on off-days", "Crossword puzzles and Sudoku", "Journaling and reflective writing", "Listening to mindfulness
    and self-improvement podcasts"]'
  career_goals: Looking ahead, Angelie aims to transition from frontline driving to a leadership role within the transit system. She plans to complete her college degree in transportation management or
    public administration and pursue certification as a senior driver trainer. In the medium term, she hopes to become a transit operations supervisor, where she can influence scheduling efficiency, safety
    protocols, and accessibility initiatives for underserved neighborhoods in Rockdale County. A personal passion project is to integrate local Black art and history into bus shelters and stops, creating
    culturally resonant spaces for riders. Ultimately, Angelie envisions herself as an advocate for equitable transportation policies, using her on‑the‑ground experience and community connections to shape
    a more inclusive public transit network.
