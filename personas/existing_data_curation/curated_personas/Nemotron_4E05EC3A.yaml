personas:
  professional: Thomas is a budding young technologist who, in their spare time, turns the precision of LEGO engineering, the logic of Minecraft builds, and the creativity of Scratch programming into a
    fledgling passion for game design, and they channel their competitive streak and love of structure into meticulous, goal‑oriented projects.
  sports: Thomas trains at the local karate dojo aiming for a brown belt, plays soccer weekly with the U9 Tigers club while idolizing Lionel Messi, and they cheer for the New York Knicks in basketball and
    the Los Angeles Dodgers in baseball, balancing structured practice with spontaneous kick‑around games in the backyard.
  arts: Thomas devotes weekends to building intricate LEGO models inspired by Gaudí’s architecture, binge‑watches Pixar’s "Toy Story" series, listens to Koji Kondo’s video‑game chiptunes, and reads adventure
    novels by Enid Blyton, and they let these artistic influences shape their creative expression.
  travel: Thomas prefers family vacations that blend meticulously planned trips, such as a week at Disney World in Orlando where they map out every ride, with spontaneous weekend camping in nearby state
    parks, and they dream of someday exploring the ancient ruins of Angkor Wat in Cambodia.
  culinary: Thomas favors pizza topped with mozzarella, pepperoni, and extra basil, loves making microwave mac and cheese with a pinch of cheddar, enjoys baking gingerbread cookies with cinnamon and nutmeg
    during holidays, but they consistently refuse dishes containing olives.
  core: Thomas is a methodical, competitive nine‑year‑old who balances solitary LEGO engineering with spirited soccer, channels skepticism into strategic chess moves, and they habitually hoard allowance
    coins like tiny treasures.
background:
  cultural: Thomas grows up in El Cajon, a diverse suburb of San Diego County, within a middle‑class white American family. His household reflects mainstream American cultural norms—celebrating holidays
    such as Thanksgiving and the Fourth of July, enjoying baseball and soccer, and valuing school achievement. The community’s proximity to vibrant Latino cultures introduces him to bilingual signage, tacos,
    and occasional Spanish phrases at school, which he finds interesting, but he primarily identifies with a typical Californian suburban upbringing.
