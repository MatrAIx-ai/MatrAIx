  hobbies: '[''reading mystery books'', ''Magic Tree House series'', ''solving puzzles (Sudoku, jigsaw)'', ''building LEGO sets'', ''playing piano'', ''soccer'', ''science club'', ''gardening with family'',
    ''attending local festivals'', ''stamp collecting'']'
  career_goals: Patricia’s lifelong dream is to work in a role that values order, knowledge, and helping others. She envisions becoming a teacher or librarian, where she can create structured learning environments
    and guide younger children. She also expresses interest in becoming a veterinarian, drawn to the systematic care of animals. Her ambition is to pursue education, continually develop her organizational
    skills, and eventually hold a profession that allows her to build supportive, orderly spaces for the community.
