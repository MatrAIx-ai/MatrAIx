  hobbies: '["Playing soccer with friends", "Competitive online gaming (Fortnite, Rocket League)", "Video creation for TikTok and YouTube", "Skateboarding at the community park", "Cooking traditional Nicaraguan
    dishes with family", "Listening to reggaeton and salsa music", "DIY electronics projects (Arduino)", "Exploring local farms and hiking trails"]'
  career_goals: Mario aspires to channel his curiosity about technology and his practical hands‑on experience into a career that makes everyday life easier for his community. He aims to enroll in a vocational
    program after high school that offers training in computer programming and UI/UX design, with the long‑term goal of becoming a software developer who creates intuitive apps for local businesses and
    agricultural workers. At the same time, he is interested in an apprenticeship in automotive or agricultural equipment technology, allowing him to continue hands‑on problem solving. He hopes to combine
    these pathways, eventually working as a tech specialist who bridges software solutions with field equipment, while also mentoring younger students in STEM clubs. Balancing his competitive drive, he
    wants to achieve leadership positions that let him set goals, track progress, and celebrate successes.
