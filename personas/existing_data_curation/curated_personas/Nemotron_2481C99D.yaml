personas:
  professional: Robert Smith is a 19‑year‑old multimedia design student whose curiosity fuels a freelance blend of graphic design, photography, and web development, all while informally leading campus event
    crews and improvising a charmingly disorganized workflow that ultimately produces vibrant community‑focused art installations.
  sports: Robert Smith enthusiastically supports the Dallas Cowboys and the Dallas Mavericks, joins weekend pick‑up basketball games at the local recreation center, and balances seasonal interests by trail‑running
    along Denton Creek in spring and indoor rock climbing at a community gym during the colder months.
  arts: Robert Smith dives deep into Denton’s indie culture, attending the Arts & Jazz Festival, sketching street murals inspired by Shepard Fairey, devouring graphic novels like ‘Saga’ and ‘Blankets’,
    and drawing creative energy from musicians such as Sufjan Stevens and the local band The Lawrence Arms.
  travel: Robert Smith favors spontaneous road trips, having already explored Austin’s live‑music scene and the Texas Hill Country’s wineries, while dreaming of a cross‑country backpacking adventure to
    Portland’s DIY art districts and diligently budgeting travel with a student‑discount credit card.
  culinary: Robert Smith’s culinary tastes blend Tex‑Mex comfort with experimental flair, regularly ordering breakfast tacos with homemade salsa, sipping sweet tea with a splash of lemonade, and occasionally
    crafting ramen‑inspired avocado toast, though they usually rely on the campus dining hall for most meals due to limited cooking confidence.
  core: Robert Smith is a free‑spirited, art‑obsessed 19‑year‑old who balances a chaotic schedule, modest finances, occasional health neglect, and a love for indie music, coffee, and weekend road trips,
    all rooted in Southern hospitality and a DIY ethos.
background:
  cultural: Raised in Denton, Texas, Robert grew up in a suburban white Texan family with deep roots in the state's Midwestern and Southern traditions. He was exposed to a mix of classic Texas hospitality
    and the progressive, arts‑centric vibe of the university town, fostering an appreciation for both country heritage and indie cultural movements. Local festivals, the university's liberal arts environment,
    and the city's DIY music scene have significantly shaped his worldview and creative expression.
attributes:
  skills: '[''Graphic design (Adobe Photoshop, Illustrator)'', ''Photography'', ''Creative writing'', ''Basic HTML/CSS'', ''Event coordination'', ''Team collaboration'', ''Mixed media experimentation'']'
  hobbies: '[''Attending live music shows'', ''Sketching urban landscapes'', ''Street photography'', ''Playing acoustic guitar'', ''Reading graphic novels'', ''DIY art projects'', ''Volunteering for community
    murals'', ''Visiting coffee shops for people‑watching and journaling'']'
  career_goals: Robert aims to complete a Bachelor of Fine Arts in Multimedia Design while building a freelance portfolio that blends graphic design, illustration, and photography. He dreams of curating
    community art installations in Denton and eventually opening a flexible, artist-run studio space that supports emerging creators. His long‑term ambition is to work in arts administration or as an independent
    creative director, allowing him to stay open to unconventional projects and maintain a lifestyle that values flexibility over rigid schedules.
