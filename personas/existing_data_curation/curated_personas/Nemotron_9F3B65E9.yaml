  hobbies: '[''Blues/jazz concerts'', ''Metal sculpture hobby'', ''Fishing'', ''Basketball'', ''Barbecue cooking'', ''Youth mentorship in trades'', ''Photography'', ''Community art workshops'', ''Reading
    about manufacturing tech'']'
  career_goals: Reginald aims to transition from shop‑floor machinist to shop supervisor within the next two years, pursuing additional certifications such as Advanced CNC Programming and Six Sigma Yellow
    Belt. He dreams of launching a small custom metal‑art studio that serves local businesses and community art projects, merging his technical expertise with his love of visual arts. Long‑term, he hopes
    to become a part‑time instructor at a community college or technical school, sharing his knowledge with the next generation of machinists while securing a stable income that supports his family.
