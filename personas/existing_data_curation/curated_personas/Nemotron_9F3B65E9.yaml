personas:
  professional: Reginald Garner, a veteran CNC machinist with 25 years of hands‑on experience, leverages their meticulous attention to detail and curiosity for emerging manufacturing technologies to excel
    at precision metal fabrication, while their sociable nature makes them a natural trainer and team leader as they pursue a shop‑floor supervisor role.
  sports: Reginald Garner, a weekend basketball enthusiast at the local recreation center who also enjoys casting flies on the nearby river, follows the Memphis Grizzlies and St. Louis Cardinals, and maintains
    a casual fitness regimen that prioritizes team play and leisure fishing over rigorous gym routines.
  arts: Reginald Garner, an avid attendee of blues and jazz concerts featuring the legacy of B.B. King and the modern sounds of the local sextet The River Swing, channels their artistic curiosity into small‑scale
    metal sculptures inspired by the industrial aesthetic of David Smith and the rhythmic improvisation of Miles Davis, while regularly contributing to community art workshops.
  travel: Reginald Garner, who favors low‑key road trips that combine fishing excursions to the Ozark River with cultural stops in New Orleans for jazz festivals, has also explored the historic steel districts
    of Pittsburgh and dreams of touring the industrial museums of Germany’s Ruhr Valley.
  culinary: Reginald Garner, a self‑taught pitmaster who masters slow‑smoked pulled pork, hickory‑rubbed brisket, and tangy coleslaw, delights family gatherings with their signature Carolina‑style BBQ sauce,
    while experimenting with spice blends and occasional gourmet twists like coffee‑rubbed ribs, yet admits to over‑indulging in second helpings.
  core: Reginald Garner, a curious, socially vibrant 47‑year‑old machinist‑artist who balances precision metalwork, community mentorship, and smoky Southern BBQ, lives by the credo that art and engineering
    are two sides of the same forge, even as they occasionally forget to schedule dentist appointments.
background:
  cultural: Reginald grew up in a tight‑knit African‑American community in the rural South, where church, family gatherings, and Southern cooking were central to daily life. He carries the storytelling
    tradition of his grandparents, who migrated from the Deep South during the Great Migration, and he remains connected to the Black church choir that shaped his love of music. His cultural identity is
    reflected in his appreciation for the blues, gospel, and the communal spirit of local festivals like Juneteenth and the Rockingham River Festival. He values perseverance, mutual support, and the legacy
    of Black artisans who blended functionality with artistry, an influence that informs both his work as a machinist and his hobbyist metal‑art projects.
