personas:
  professional: Heather Rhoads, an eight‑year‑old aspiring young programmer and LEGO architect, channels their curiosity and competitive edge into building intricate, algorithmic brick structures while
    solving puzzles on a tablet, balancing meticulous organization with a flair for unconventional design.
  sports: Heather Rhoads, an eight‑year‑old, laces up for the Oakwood Tigers youth soccer team in the fall, practices gymnastics at the downtown junior club, and channels their competitive drive by cheering
    for the Los Angeles Dodgers and the Golden State Warriors during off‑season game nights.
  arts: Heather Rhoads, an eight‑year‑old, spends weekends sketching woodland creatures in the style of Beatrix Potter, losing herself in the vivid panels of Kazu Kibuishi’s Amulet, and winding down to
    Mozart’s Piano Sonata No. 16 and the soothing harp strings of Yo‑Yo Ma, letting these artistic influences guide their own fledgling recorder melodies.
  travel: Heather Rhoads, an eight‑year‑old, loves mapping out family road trips with colored crayons, has explored the nearby pine‑filled state park and the historic lighthouse museum, dreams of visiting
    the giant redwoods of California’s Redwood National Park and the cherry blossoms of Kyoto, and prefers a mix of weekend nature hikes over long‑haul flights because their parents keep vacation time limited.
  culinary: Heather Rhoads, an eight‑year‑old, enjoys assembling crunchy veggie‑loaded mini pizzas with mozzarella, bell peppers, and pineapple, whips up a quick mac‑and‑cheese with a dash of paprika for
    extra flavor, and they love snack‑time strawberry‑banana smoothies blended with Greek yogurt, reflecting a budding but meticulous chef’s palate.
  core: Heather Rhoads is a quietly fierce eight‑year‑old whose competitive streak fuels obsessive LEGO builds, relentless puzzle solving, and a habit of stacking pocket money for future galaxy‑themed projects,
    yet they often forget to pause for snacks when caught in a creative flow.
background:
  cultural: Heather grows up in a middle‑class family in Richmond, Indiana, a small Midwestern community where community ties and modesty are valued. Her family attends local church services and participates
    in town events such as the county fair and library story hours, which have nurtured her appreciation for art and learning. The school curriculum emphasizes both core academics and extracurricular arts,
    giving her exposure to drawing classes and introductory coding clubs. While her cultural environment is primarily white, middle‑American, she encounters broader ideas through books, the internet, and
    occasional visits to nearby museums, shaping a curious yet grounded worldview.
