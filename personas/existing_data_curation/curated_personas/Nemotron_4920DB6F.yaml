personas:
  professional: Emely Picos is a veteran management analyst who leverages three decades of data‑driven insight, expert fluency in Excel, Tableau, Power BI, SAP and Oracle, and a compassionate, bilingual
    communication style to translate complex strategic recommendations into actionable plans for senior leaders, while they mentor junior analysts and champion inclusive, socially responsible initiatives
    across the enterprise.
  sports: Emely Picos follows the Miami Heat and Miami Marlins with avid fandom, attends Saturday night games when possible, participates in a local sunrise beach‑walk club and a senior‑friendly yoga‑and‑pilates
    group, while they occasionally join a recreational volleyball circuit at South Beach, balancing seasonal cardio with low‑impact strength work.
  arts: Emely Picos immerses themselves in Miami’s vibrant arts scene, attending Wynwood gallery openings featuring artists like Carlos Dorr, enjoying jazz evenings with performances by icons such as Diana
    Krall and local saxophonist Carlos Villalobos, and supporting the GALA Hispanic Theatre’s productions, which they credit for nurturing an appreciation of storytelling and cultural dialogue.
  travel: Emely Picos prefers purposeful travel that blends cultural reconnection and relaxation, often planning trips back to their family’s coastal hometown to celebrate holidays, while they also explore
    historic neighborhoods in Cartagena, cruise the Florida Keys for weekend retreats, and keep an eye on a future solo culinary tour of Oaxaca.
  culinary: Emely Picos is a confident home cook who regularly prepares beloved family staples like gallo pinto and citrus‑marinated ceviche, expertly balances flavors with cilantro, lime, and plantain,
    enjoys sourcing fresh seafood at Miami’s fish market, and they delight in sharing generous potluck spreads while occasionally splurging on imported cheeses for their own palate.
  core: Emely Picos blends analytical rigor with heartfelt compassion, pairing meticulous spreadsheet mastery with sunrise beach walks, community mentoring, and a habit of over‑cooking beloved family dishes
    when friends arrive, while they occasionally lose sleep fine‑tuning dashboards.
background:
  cultural: Born on the Pacific coast of Costa Rica, Emely grew up immersed in the ‘pura vida’ ethos that emphasizes optimism, community, and a balanced lifestyle. She moved to Miami in her early twenties,
    where she integrated her Costa Rican heritage with the city’s vibrant multicultural tapestry. Bilingual in Spanish and English, she remains deeply connected to Costa Rican traditions—celebrating national
    holidays, participating in diaspora festivals, and preserving family recipes. Her cultural roots inform her compassionate and cooperative nature, driving her commitment to community service and fostering
    inclusive workplaces within the diverse Miami environment.
attributes:
  skills: '[''Data Analysis'', ''Strategic Planning'', ''Project Management'', ''Business Process Improvement'', ''Stakeholder Communication'', ''Bilingual (Spanish/English)'', ''Change Management'', ''Financial
    Modeling'', ''Risk Assessment'', ''Mentorship'', ''Data Visualization (Tableau, Power BI)'']'
  hobbies: '[''Cooking Costa Rican Cuisine'', ''Gardening'', ''Yoga'', ''Beach Walking'', ''Art Exhibitions'', ''Jazz Concerts'', ''Volunteering (Immigrant Support)'', ''Crocheting'', ''Reading Historical
    Biographies'', ''Travel to Costa Rica'']'
  career_goals: Emely aims to transition into a senior strategic advisory role where she can shape enterprise‑wide initiatives that promote inclusive practices and corporate social responsibility. She aspires
    to mentor the next generation of analysts, champion data‑driven decision making for small businesses—particularly Latino entrepreneurs in Miami—and eventually establish a boutique consulting practice
    focused on sustainable growth strategies for community‑based organizations.
