  career_goals: Iveth aims to advance to a regional sales operations manager role, where she can shape broader strategy and mentor emerging supervisors. She plans to complete a bachelor's degree in business
    administration and earn a certification in data analytics to deepen her analytical capabilities. Over the next five years, she hopes to design and implement a structured mentorship program that reduces
    turnover and raises sales performance across multiple sites. Ultimately, she envisions transitioning into a consulting capacity focused on optimizing sales processes for midsize firms, allowing her
    to leverage her expertise while maintaining a balanced, less stressful work schedule as she approaches retirement.
