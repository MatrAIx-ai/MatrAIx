personas:
  professional: Yesenia Padgett, a 23‑year‑old professional painter, blends meticulous surface preparation and precise color matching with a relaxed approach to deadlines, allowing them to keep crews on
    track while adapting to on‑site changes as they work toward a Certified Professional Painter credential and a future boutique business.
  sports: Yesenia Padgett hikes the Santa Monica Mountains on weekends, occasionally joins a local rock‑climbing meetup, and supports the Los Angeles Lakers and LA Galaxy while they attend pick‑up soccer
    games with friends, balancing a love of outdoor cardio with moderate gym sessions.
  arts: Yesenia Padgett spends weekends sketching in the Arts District, drawing inspiration from street‑artist RETNA, the vibrant murals of Shepard Fairey, and curates a vinyl collection that includes Los
    Lobos, Celso Piña, and classic mariachi recordings, which often serve as the soundtrack for their mural projects.
  travel: Yesenia Padgett prefers spontaneous day trips over elaborate itineraries, often exploring nearby gems like Joshua Tree National Park or the coastal murals of San Diego, while dreaming of a future
    backpacking adventure through Patagonia’s Andes and a culinary tour of Oaxaca, balancing a limited budget with a craving for vibrant culture.
  culinary: Yesenia Padgett, an avid home chef, masters the art of tamales and mole with homemade masa, roasted chiles, and chocolate‑chili blends, frequently pairs their meals with fresh salsa verde and
    artisanal mezcal, and occasionally treats themselves to upscale Mexican‑fusion brunch spots on weekends.
  core: Yesenia Padgett balances a meticulous eye for flawless paint finishes with an impulsive love for hunting rare vinyl records, often juggling color swatches and salsa steps while habitually leaving
    brushes in the sink and forgetting to water houseplants.
background:
  cultural: Yesenia grew up in a Mexican-American household in East Los Angeles, speaking both Spanish and English at home. Her family’s emphasis on hard work, close-knit community ties, and celebration
    of traditions like Día de los Muertos and quinceañeras shaped her collaborative spirit and appreciation for bold colors and patterns. These cultural roots influence her aesthetic choices in both her
    trade work and personal art, while her bicultural experience helps her connect with a diverse client base in Los Angeles.
attributes:
  skills: '[''surface preparation'', ''painting'', ''paper hanging'', ''color matching'', ''basic carpentry'', ''safety compliance'', ''project estimating'', ''customer communication'', ''time management'']'
