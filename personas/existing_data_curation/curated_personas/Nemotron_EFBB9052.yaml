    to regional Mexican music'']'
  career_goals: She aims to earn a Certified Professional Painter credential within the next two years and advance to crew-lead positions on larger residential projects. Long-term, Yesenia plans to launch
    her own boutique painting and paper-hanging business that emphasizes eco-friendly finishes and occasional community mural commissions, giving her the flexibility to balance steady income with creative
    pursuits.
