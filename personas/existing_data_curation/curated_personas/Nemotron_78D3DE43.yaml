  hobbies: '[''Visiting art museums and galleries'', ''Street photography'', ''Playing chess'', ''Competitive video gaming (e‑sports)'', ''Hiking in Texas Hill Country'', ''Cooking experimental meals'',
    ''Reading science fiction novels'', ''Attending community theater performances'', ''DIY home improvement projects'', ''Listening to indie and alternative music'']'
  career_goals: Paul aims to enroll in a local community college to earn a certification as an HVAC technician or a journeyman electrician, fields that are in high demand in Houston. He plans to leverage
    his hands‑on skills to eventually start his own home‑renovation and energy‑efficiency consulting business, providing reliable services to his neighborhood. Parallel to this technical path, he wishes
    to build an online presence for his photography and graphic design work, selling prints and digital assets to generate supplemental income. Ultimately, he aspires to create a stable, upward‑mobile career
    that balances technical proficiency with creative expression, allowing him to support his marriage and future family plans.
