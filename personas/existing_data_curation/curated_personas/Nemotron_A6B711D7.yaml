personas:
  professional: Colin Worthen is a full‑stack software engineer who blends meticulous organization with a curiosity for emerging technologies, delivering scalable web applications, rigorous documentation,
    and systematic mentorship while they pursue a technical lead role and an AWS Solutions Architect certification.
  sports: Colin Worthen plays pickup basketball at the local community center, they cheer for the Houston Rockets and follow the Houston Astros, and in the off‑season they join a weekend intramural soccer
    league while logging runs and bike rides on Strava to maintain fitness.
  arts: Colin Worthen nurtures a love for guitar, they practice indie folk riffs inspired by John Mayer and soulful blues reminiscent of B.B. King, while their street photography draws on the candid style
    of Vivian Maier, and they regularly attend shows by The Suffers and indie film screenings at the Alamo Drafthouse.
  travel: Colin Worthen plans trips with a mix of detailed itineraries and spontaneous exploration, they have visited New Orleans for its music and cuisine, trekked the Texas Hill Country, and dream of
    a tech‑focused cultural tour of Tokyo and a weekend escape to Reykjavik, all while adhering to a modest travel budget.
  culinary: Colin Worthen experiments in the kitchen with Southern‑style gumbo, jambalaya, and collard greens seasoned with smoked paprika and andouille sausage, they are a confident home cook who sources
    fresh okra from local farmers’ markets and often hosts dinner gatherings featuring homemade beignets and spicy shrimp étouffée.
  core: Colin Worthen is a methodical tech enthusiast who balances curiosity with disciplined execution, fuels creativity through guitar and cooking, and champions community mentorship despite an occasional
    espresso‑driven jitter.
background:
  cultural: Colin is an African‑American raised in Houston’s Third Ward, a historically rich Black community known for its strong churches, music, and family networks. Growing up, he attended Sunday services
    that emphasized community service and mutual support, experiences that shaped his cooperative and harmony‑seeking nature. He celebrates cultural traditions such as Juneteenth gatherings, soul food cook‑outs,
    and local jazz and hip‑hop festivals. While he is fully integrated into the multicultural fabric of Houston—drawing influences from the city’s diverse culinary and artistic scenes—his identity remains
    rooted in Black familial values of resilience, uplift, and collective advancement.
