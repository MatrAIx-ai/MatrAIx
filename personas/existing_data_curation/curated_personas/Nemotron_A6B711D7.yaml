  career_goals: Colin aims to become a technical lead within the next three to five years, guiding cross‑functional teams to deliver high‑impact products while championing inclusive engineering practices.
    He plans to earn an AWS Solutions Architect certification and later pursue a master's degree in computer science focused on machine learning, so he can integrate AI capabilities into enterprise solutions
    responsibly. Long‑term, he envisions launching a community‑focused tech startup that provides affordable software tools for local small businesses and mentors underrepresented youth in coding and entrepreneurship.
