persona_description: A cognitive psychologist or a neuroscientist who is interested in studying the mechanisms of memory and perception. They are particularly curious about the way real-world objects are
  represented in the brain and how they are forgotten over time. They are likely to have a background in neuroscience, psychology, and cognitive science. They are interested in studying the role of visual
  memory in perception and how it interacts with other cognitive processes such as attention, perception, and memory. They are also interested in studying the effects of different factors such as age, experience,
  and task demands on memory and perception.
