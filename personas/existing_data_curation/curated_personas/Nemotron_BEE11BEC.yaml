  career_goals: Dominic dreams of becoming a creative problem‑solver who blends art and science—he imagines himself as an inventor‑illustrator who designs futuristic space vehicles and visual stories. He
    also hopes to win science fairs and art contests, reflecting his competitive nature, and imagines a future as a museum curator or young detective who uses evidence to solve mysteries. Ultimately, he
    wants a career where curiosity, evidence, and imagination guide his work.
