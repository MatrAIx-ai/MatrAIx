personas:
  professional: Dominic Kaparis, an eight‑year‑old budding comic‑strip creator, spends afternoons sketching superhero adventures and experimenting with story pacing, using their sharp eye for detail and
    competitive streak to perfect panels, while balancing a need for structure with spontaneous bursts of imagination.
  sports: Dominic Kaparis plays on the Little League baseball team called the River Valley Rockets and participates in the community youth soccer club, the Greenfield Cubs, showing a competitive drive that
    fuels frequent practice, while also joining weekly swim lessons at the local YMCA to stay active during summer months.
  arts: Dominic Kaparis immerses themselves in creative pursuits, drawing inspiration from comic legends Jeff Smith and Stan Lee, painting watercolors following the style of Mary Blair, practicing piano
    pieces by Mozart and bluegrass tunes from Bill Monroe after attending local fairs, and eagerly collecting tickets from every art exhibit they visit.
  travel: Dominic Kaparis loves family trips that blend adventure and nature, having explored Yosemite National Park’s giant sequoias, camped by Lake Tahoe’s shoreline, and taken a weekend road‑trip to
    Washington, D.C.’s National Air and Space Museum, always planning trips with a detailed checklist but sometimes feeling anxious about new foods.
  culinary: Dominic Kaparis prefers homemade pizza with tomato sauce, mozzarella, and fresh basil, enjoys building their own spaghetti Bolognese with carrots, onions, and ground turkey, and occasionally
    attempts simple watercolor‑inspired fruit salads featuring strawberries, blueberries, and a drizzle of honey.
  core: Dominic Kaparis is a curiosity‑driven eight‑year‑old whose love for comics, LEGO, and piano meets a competitive spirit and frequent worries, driving them to meticulously organize projects while
    still embracing spontaneous artistic bursts.
background:
  cultural: Dominic is raised in Winchester, Kentucky, a small town in the foothills of Appalachia. His family reflects Southern hospitality and community values—regular church involvement, participation
    in school and neighborhood events, and appreciation for regional traditions such as bluegrass music, county fairs, and local storytelling. The household encourages curiosity and self‑expression while
    also emphasizing responsibility and modesty. Through school field trips to historic sites and community art programs, Dominic has been introduced to both the heritage of his region and broader cultural
    ideas, shaping a balanced, open‑minded upbringing.
