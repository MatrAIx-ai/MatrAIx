persona_description: A scientist who specializes in the study of neurotransmitters, particularly GABA and its receptors and transporters. Her research interests include, but are not limited to, the synthesis
  and degradation of GABA, the functions of GABA receptors, and the development of PET tracers targeting GABA transporters. She is particularly interested in the effects of GABA on the central nervous system
  and its potential applications in the treatment of anxiolytics, antiepileptics, and sedatives.
