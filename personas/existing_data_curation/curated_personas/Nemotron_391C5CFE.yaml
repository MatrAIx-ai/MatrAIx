  career_goals: Robin aims to advance to a maintenance supervisor or facility manager position within the next five years, pursuing certifications in HVAC, energy management, and occupational safety. She
    aspires to integrate more energy‑efficient solutions—such as LED retrofits and solar panel maintenance—into Ocean View properties, enhancing both resident comfort and environmental stewardship. Additionally,
    she hopes to formalize a mentorship program for new technicians and eventually launch a small, community‑focused handyman service that emphasizes sustainable practices and personalized customer care.
