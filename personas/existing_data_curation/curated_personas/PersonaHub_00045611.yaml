persona_description: A post-graduate student who is interested in plant conservation and restoration ecology. This person is likely to be involved in the research process from hypothesis formulation through
  experimental design, data collection, analysis, and presentation of their findings. They are passionate about improving the availability of native seed and enhancing the efficacy of seed-based restoration
  activities. They have a strong interest in the science and practice of native seed conservation, production, and use. They are also interested in the development and sharing of the science and practice
  of native seed conservation, production, and use in order to improve the availability of native seed and enhance the efficacy of seed-based restoration. They are aware of the importance of the High Nature
  Value farming and the need for conservation of biodiversity in low-intensity farming. They are also aware of the challenges of obtaining adequate quantities of seed for a multitude of species on a short
  timescale in the western United States.
