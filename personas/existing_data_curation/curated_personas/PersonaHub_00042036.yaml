persona_description: A historian or archeologist interested in the cultural and historical context of the Bangakh or Bangash tribe of Afghāns, particularly their contributions to Indian society and their
  connection to the Nawwābs of Farrukhābād. This person is fascinated by the life and works of Khwājah Muḥammad, a Darwesh who lived the life of a religious abuser and followed the tenets of the Chastī
  sect. This person is particularly interested in the mysticisms of the Ṣūfis and the influence of the Arab devotee, Muæīn-ud-Dīn, on the Chastī sect. This person is also interested in the fate and legacy
  of Khwājah Muḥammad, who was sentenced to death but was later pardoned and banished to Arabia.
