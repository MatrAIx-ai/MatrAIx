personas:
  professional: Elizabeth Mckeithan, a licensed physical therapist with eight years of orthopedic and sports rehabilitation experience, blends meticulous manual therapy skills, evidence‑based exercise prescription,
    and charismatic group class leadership to empower patients while mapping out her path toward board certification and a future community wellness clinic.
  sports: Elizabeth Mckeithan, an avid participant in Zumba, yoga, and weekend hikes at Morgan‑Monroe State Forest, cheers for the Indianapolis Colts and the Indiana Pacers, while also coaching a local
    senior‑citizen low‑impact fitness group and maintaining membership in the Greenwood Trail Runners club.
  arts: Elizabeth Mckeithan, a voracious reader of psychology and self‑development titles such as Brené Brown’s *Daring Greatly* and Carol Dweck’s *Mindset*, regularly attends live folk‑rock shows by Mumford
    & Sons and enjoys streaming indie film festivals, allowing the arts to inform her therapeutic storytelling approach.
  travel: Elizabeth Mckeithan, who plans trips that marry cultural immersion with outdoor adventure, has trekked the volcanic trails of Iceland, explored the historic temples of Kyoto while cycling the
    surrounding countryside, and dreams of a spring hike through the Swiss Alps, always booking through a meticulous itinerary on a travel‑planning app.
  culinary: Elizabeth Mckeithan, a self‑described wholesome‑food enthusiast, frequently whips up quinoa‑infused vegetable stir‑fry with turmeric‑ginger glaze, bakes almond‑flour banana bread for friends,
    and experiments with homemade kimchi using Napa cabbage, kale, and gochugaru, showcasing a blend of nutrition science and culinary curiosity.
  core: Elizabeth Mckeithan, a charismatic, methodical physical therapist who balances a love for community wellness with a penchant for relentless scheduling and occasional forgetfulness of personal downtime,
    epitomizes curiosity married to practicality.
background:
  cultural: Elizabeth was raised in a Midwestern white family with roots in German and Irish ancestry. Growing up in Greenwood, Indiana, she internalized the region’s emphasis on community, modesty, and
    hard work, while also celebrating traditional holidays such as Thanksgiving, July Fourth, and family gatherings featuring German-style dishes like bratwurst and apple strudel. She values the blend of
    mainstream American culture with the subtle influence of her heritage, which informs her approachable and cooperative demeanor.
attributes:
  skills: '[''manual therapy'', ''therapeutic exercise design'', ''gait analysis'', ''patient education'', ''clinical documentation'', ''interdisciplinary teamwork'', ''motivational interviewing'', ''group
