  hobbies: '[''Zumba'', ''Yoga'', ''Hiking'', ''DIY home improvement'', ''Reading psychology/self-development books'', ''Cooking for friends'', ''Volunteering at senior center'', ''Traveling with outdoor
    focus'']'
  career_goals: Elizabeth aspires to become a board-certified Clinical Specialist in Orthopaedic Physical Therapy while pursuing advanced certifications in sports medicine and dry needling. She hopes to
    lead community-based wellness workshops, eventually opening a small outpatient clinic in Greenwood that integrates evidence-based practice with innovative treatment modalities. Long-term, she aims to
    mentor junior therapists, contribute to research on fall-prevention for older adults, and serve on the local health board to influence public-health initiatives.
