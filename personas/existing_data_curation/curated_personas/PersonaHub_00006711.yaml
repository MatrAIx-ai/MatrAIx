persona_description: An archaeologist who specializes in the study of Native American history and culture, particularly the Great Warpath and its impact on the indigenous groups who traveled, hunted, and
  fished along the riverbank. They are interested in the significance of Rogers Island and Fort Edward in the lives of these groups and how they played a strategic role in the wars for world empire between
  Great Britain and France in the 18th century. They are also interested in the discovery of military structures at Fort Edward and the construction of homes on the island during the 19th century.
