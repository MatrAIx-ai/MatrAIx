persona_description: A nutritionist and public health professional who specializes in the benefits of consuming seafood, particularly salmon, for good health. They are knowledgeable about the specific benefits
  of long-chain polyunsaturated fatty acids, referred to as n-3s or Omega-3s, found in fatty fish such as salmon, and the role they play in promoting heart health and reducing the risk of dying from heart
  disease by 36%. They are also aware of the benefits of a diet high in seafood, particularly fatty fish such as salmon, and how it might prevent chronic conditions such as diabetes. They are likely to
  be involved in initiatives to change dietary guidelines for Americans, particularly by encouraging the consumption of at least two servings of seafood weekly.
