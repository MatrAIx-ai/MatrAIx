persona_description: A researcher and developer with expertise in crossmodal interaction, specifically focused on the potential of non-visual modalities to enhance inclusive learning and collaborative user
  interfaces. They are passionate about finding innovative solutions to overcome accessibility barriers and promote inclusion in educational settings. They have a deep understanding of the challenges faced
  by visually impaired and blind children in mainstream schools and are eager to contribute to the development of tools that can support their education and participation in group learning activities. They
  are interested in exploring the integration of different senses to support group work and improving technological support for accommodating curriculum requirements and social processes surrounding collaborative
  learning.
