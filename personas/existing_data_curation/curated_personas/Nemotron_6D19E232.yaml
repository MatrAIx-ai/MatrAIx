  hobbies: '[''Reading (non-fiction, economics, history)'', ''Hiking local trails'', ''Fishing'', ''Woodworking'', ''Puzzle solving (crosswords, Sudoku)'', ''Acoustic guitar'', ''Landscape photography'',
    ''Cooking (comfort meals)'', ''Meditation and mindfulness'', ''Learning Python for data analysis'']'
  career_goals: Lonnie aims to become a Certified Public Accountant (CPA) within the next two years and to leverage that credential to transition into a senior audit manager role at a reputable regional
    firm. He envisions leading audit teams on complex engagements while maintaining the low‑stress, quiet work environment that supports his well‑being. In the longer term, he aspires to establish his own
    boutique accounting consultancy that serves small businesses in Western Pennsylvania, offering personalized financial clarity and leveraging his expertise in data automation. Throughout his career progression,
    he plans to continue professional development in forensic accounting and emerging fintech solutions, balancing his curiosity for new methods with the practicality of a stable, client‑focused practice.
