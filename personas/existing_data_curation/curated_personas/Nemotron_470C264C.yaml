  career_goals: Andre dreams of a future where he can help others while working within a clear routine. He is especially drawn to becoming a firefighter because of the teamwork, structured training, and
    community service it offers. He also feels a strong connection to animals and imagines studying to become a veterinarian. To prepare, he plans to maintain strong grades, develop his mechanical skills
    through building projects, and participate in local youth programs that teach leadership and practical trades.
