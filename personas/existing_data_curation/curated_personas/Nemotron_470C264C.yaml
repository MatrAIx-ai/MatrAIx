personas:
  professional: Andre Abbasi, a budding builder, channels their love for detailed LEGO instructions and model airplane projects into meticulous planning and teamwork, and they become a reliable contributor
    to school science fairs and Boy Scout skill badges.
  sports: Andre Abbasi practices basketball with the local youth team, the Riverdale Raptors, cheers for the Chicago Bulls during the NBA season, and they favor the structured routine of scout‑led hikes
    over spontaneous pick‑up games, though they still enjoy the occasional weekend match.
  arts: Andre Abbasi nurtures their creative side through trumpet practice, drawing inspiration from Louis Armstrong and the cinematic scores of John Williams, and they also sketch LEGO builds while enjoying
    Pixar films for visual storytelling.
  travel: Andre Abbasi loves family road trips to nearby streams for fishing and day hikes in Redwood State Park, dreams of seeing the wildlife of Kenya’s Maasai Mara and the historic castles of Scotland,
    and they plan future adventures around school breaks and allowance budgets.
  culinary: Andre Abbasi enjoys easy kitchen projects such as mac and cheese, grilled cheese sandwiches, and baked salmon, favoring cheddar cheese, crispy bacon, and occasionally sneaking extra chocolate
    chips into cookie dough, and they often overindulge in sugary snacks despite trying to balance nutritious meals.
  core: Andre Abbasi is a routine‑loving, detail‑driven 10‑year‑old who balances a passion for LEGO engineering with a secret stash of chocolate chips, and they tend to over‑worry about the smallest setbacks.
background:
  cultural: Andre was raised in Scottsboro, a small town in north‑central Alabama. His family reflects the region’s Southern heritage, emphasizing hospitality, close‑knit community ties, and a practical
    work ethic. He attends a local public elementary school, participates in church youth groups, and spends weekends at family gatherings featuring Southern foods like fried chicken and sweet tea. Outdoor
    pursuits such as fishing, hiking, and occasional hunting trips are common in his community, and local traditions like county fairs and community service projects have reinforced his values of reliability,
    kindness, and respect for routine.
