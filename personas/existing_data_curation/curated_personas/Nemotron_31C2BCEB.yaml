  career_goals: Neysha aims to translate her practical experience into a supervisory role within logistics, targeting a senior fleet coordinator position or launching her own small owner-operator business
    within the next five years. She plans to obtain a certification in transportation management and to build a niche service delivering Cuban specialty foods to restaurants across South Florida. Her competitive
    drive pushes her to achieve top-driver performance metrics and to gain recognition as a reliable, high-volume sales representative. Ultimately, she hopes to secure financial stability that will allow
    her to invest in property and enjoy the flexibility of occasional solo road trips, while maintaining a steady routine.
