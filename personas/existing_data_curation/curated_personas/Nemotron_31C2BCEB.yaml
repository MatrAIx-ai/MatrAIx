personas:
  professional: Neysha Uriarte, a 34‑year‑old commercial driver and sales specialist, leverages a clean Class A CDL, bilingual fluency, and a knack for intuitive route planning to consistently meet high‑volume
    delivery targets, while their love of routine and competitive streak drives them toward a senior fleet coordinator role despite occasional disorganization.
  sports: Neysha Uriarte enjoys low‑key fitness routines such as early‑morning jogs along the Atlantic coast and weekend beach‑volleyball games with a small circle of friends, supports the Miami Heat and
    the Tampa Bay Buccaneers from the comfort of a backyard patio, and belongs to a local cycling club that meets monthly for scenic rides.
  arts: Neysha Uriarte immerses themselves in classic salsa and bolero—spinning tracks by Celia Cruz, Benny Moré, and Luis Miguel—while devouring historical fiction by Cristina García and attending occasional
    performances at the Delray Beach Playhouse, allowing music and literature to anchor their sense of identity.
  travel: Neysha Uriarte prefers solitary or small‑group road trips that start with sunrise drives along Florida’s coastline, includes weekend beachcombing at Delray Beach, and dreams of future visits to
    Havana, Barcelona, and the Dominican Republic, balancing meticulous route planning with a relaxed itinerary that leaves room for spontaneous stops.
  culinary: Neysha Uriarte’s culinary repertoire centers on mastering traditional dishes like ropa vieja, lechón, and yuca con mojo, skillfully blending plantains, citrus zest, and cumin, while their routine
    of weekly grocery trips to local markets fuels a habit of experimenting with family recipes and occasionally swapping flavors with friends at potluck gatherings.
  core: Neysha Uriarte blends a disciplined logistics career with a steadfast love for routine‑driven cooking, navigating life’s twists with calm competitiveness, a touch of skepticism, and occasional disorganized
    moments that keep things interesting for them.
background:
  cultural: Neysha was born to Cuban immigrant parents who settled in South Florida during the 1990s. Growing up in a predominantly Hispanic neighborhood, she was immersed in Cuban customs - Sunday family
    meals, vibrant music, and the Spanish language - while also navigating the broader American culture of Delray Beach. Her upbringing emphasized practicality, hard work, and community solidarity, values
    that remain central to her identity. She maintains strong ties to the Cuban diaspora, celebrating cultural events such as Carnaval de la Calle Ocho and participating in local Afro-Cuban drum circles
    when invited. Bilingualism is a daily part of her life, and she often serves as a cultural bridge between newer Cuban immigrants and the wider business community in Palm Beach County.
