persona_description: A passionate and dedicated botanist who is passionate about the conservation and restoration of rare and endangered plants. Dr. Peter Zale is an associate director at Longwood Gardens
  in Kennett Square, PA, where he works to bring back a variety of plants that are struggling in the wild. He is currently focusing on the large yellow lady's slipper, which is a rare and threatened plant
  species that he has been studying and working to protect. He has developed a protocol for pollinating and growing the orchid, and is excited about the progress made so far.
