  hobbies: '["Reading historical fiction", "Watercolor painting", "Herb and succulent gardening", "Crossword puzzles and Sudoku", "Journaling for self-reflection", "Participating in a small book club",
    "Volunteering at community financial literacy workshops", "Cooking Tex-Mex family recipes"]'
  career_goals: Soraya aims to leverage her disciplined, achievement‑driven mindset to advance from teller to branch manager within the next five years. She plans to complete a bachelor’s degree in Business
    Administration and obtain a Certified Banking Professional credential, positioning herself to lead digital transformation projects that streamline teller operations. Passionate about her community,
    she aspires to develop inclusive banking programs that better serve San Antonio’s Hispanic population and to mentor junior staff, fostering a supportive and high‑performing team environment.
