personas:
  professional: Soraya Rentas, a meticulous bank teller fluent in Spanish and English, blends disciplined cash handling and compliance expertise with a curiosity for digital banking tools, regularly mentors
    new staff while charting a path toward branch management within five years.
  sports: Soraya Rentas, a casual fitness enthusiast, participates in a Saturday morning walking club along the River Walk, cheerfully supports the San Antonio Spurs and San Antonio FC, and schedules brief
    yoga sessions at home to balance anxiety.
  arts: Soraya Rentas, an avid watercolor painter of West Texas vistas, draws inspiration from Georgia O'Keeffe and Frida Kahlo, regularly discusses historical fiction with her book club, and enjoys listening
    to Lila Downs and Carlos Santana while they work on art.
  travel: Soraya Rentas prefers purposeful weekend getaways, often exploring Hill Country vineyards, attending Dia de los Muertos festivities in Nuevo Laredo, and dreaming of a cultural immersion trip to
    Oaxaca, planning each trip with detailed itineraries to manage both budget and time.
  culinary: Soraya Rentas delights in cooking traditional Tex‑Mex dishes such as carne asada tacos, enchiladas verdes, and chiles rellenos, seasoning them with fresh cilantro, epazote and roasted tomatillos,
    and they balance moderate cooking skill with a love for experimenting in their herb garden.
  core: Soraya Rentas, a disciplined yet curious professional, orders her life like a balanced ledger—meticulously managing money, health, and community commitments—while nightly watercolor sessions and
    occasional anxiety spikes reveal a vibrant, if sometimes restless, inner world.
background:
  cultural: Soraya grew up in a Mexican‑American family in San Antonio, where Spanish was spoken at home and English in school. Her upbringing emphasized tight‑knit family bonds, Catholic traditions, and
    community celebration, such as Fiesta San Antonio and Dia de los Muertos. These cultural roots instilled a strong work ethic, respect for communal responsibility, and a desire to give back to the local
    Hispanic community. She often incorporates her heritage into daily life through food, music, and participation in neighborhood events, while navigating the bicultural identity that informs both her
    personal and professional perspectives.
attributes:
  skills: '["Cash handling and verification", "Customer service and relationship building", "Bilingual Spanish-English communication", "Compliance and AML awareness", "Accurate data entry and record keeping",
