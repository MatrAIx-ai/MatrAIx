  hobbies: '[''Sketching'', ''Digital painting'', ''Reading speculative fiction'', ''Indie video games'', ''Nature photography'', ''Hiking'', ''Volunteering at animal shelter'', ''Writing poetry'', ''Attending
    local art workshops'', ''Playing acoustic guitar'']'
  career_goals: William plans to pursue a bachelor's degree in fine arts or art therapy, aiming to merge his creative abilities with his deep compassion for others. In the near term, he will build a professional
    portfolio, secure an internship with a local arts nonprofit, and continue volunteering as a workshop facilitator. His medium-term goal is to earn a certification in art therapy and begin working as
    an art therapist or community arts coordinator, providing therapeutic art sessions in schools and community centers. Ultimately, he hopes to establish a nonprofit art collective in the Providence-North
    Kingstown area that offers free workshops, collaborative installations, and mental-health-focused art programs, eventually taking on a leadership role such as creative director.
