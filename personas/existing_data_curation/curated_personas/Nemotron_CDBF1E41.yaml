  career_goals: Julius aims to graduate high school with strong academic standing and secure a scholarship to a technical or engineering program. He is drawn to fields that combine practicality with community
    impact, such as civil or mechanical engineering, where he can design reliable infrastructure for his neighborhood. In the short term, he plans to join his school's robotics club, deepen his coding skills,
    and continue mentoring younger students through the community center. Long-term, he envisions a career that lets him use his organizational strengths to lead projects that improve everyday life, while
    also serving as a positive role model for other Black youth in Aurora.
