personas:
  professional: Julius Agim is an organized middle-school athlete who leverages his natural leadership to coordinate soccer and basketball practice schedules while honing teamwork skills through cooperative
    video games.
  sports: Julius Agim captains his local Cedar Park Soccer Club and junior basketball team, cheers for professional franchises like the Chicago Bulls and Los Angeles Lakers, and trains year‑round at the
    community center’s gym while participating in seasonal intramural leagues.
  arts: Julius Agim drums in his school band, constantly streams contemporary hip‑hop and R&B artists such as Kendrick Lamar, Anderson .Paak, and H.E.R., and spends evenings sketching album‑cover ideas
    inspired by the visual style of Childish Gambino.
  travel: Julius Agim prefers structured weekend getaways, often exploring nearby Shenandoah National Park or taking family trips to Washington, D.C., following a detailed itinerary that balances adventure
    with the reassurance of familiar routines.
  culinary: Julius Agim enjoys crafting homemade chicken teriyaki tacos, perfecting sautéed bell peppers and onions, and treats himself to gummy bears and popcorn during late‑night gaming sessions.
  core: Julius Agim is a routine‑driven, socially energetic teen who channels his leadership and anxiety into organized sports, collaborative gaming, disciplined journaling, a meticulous allowance plan,
    and a steady rhythm on the drums.
background:
  cultural: Julius comes from a Black family rooted in the African-American heritage of the Midwest, with grandparents who migrated from the Southern United States. Growing up in Aurora, Colorado, he is
    part of a vibrant local Black community that celebrates cultural milestones such as Juneteenth, Kwanzaa, and family gatherings centered around soul food and storytelling. His family attends a historically
    Black Baptist church, where he participates in youth activities and learns the importance of community service. The multicultural environment of Aurora exposes him to diverse perspectives, yet his household
    maintains traditions—regular Sunday services, holiday recipes, and a strong emphasis on education—that shape his identity and values.
