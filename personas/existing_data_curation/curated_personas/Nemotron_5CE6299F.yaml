    tools'']'
  career_goals: Edward aims to become a senior strategic analyst who leads innovation initiatives within his organization, positioning himself as a bridge between data‑driven decision making and creative
    strategy. He plans to formalize his education by earning a GED and pursuing relevant certifications (e.g., Six Sigma Yellow Belt, Data Visualization). Over the next five years, he hopes to design a
    proprietary framework that integrates artistic thinking into management consulting, mentor junior analysts in creative analytical techniques, and eventually launch a boutique consultancy focused on
    helping companies cultivate flexible, imagination‑rich cultures.
