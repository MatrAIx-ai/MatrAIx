  career_goals: Kay Ann aims to spearhead a region‑wide community arts integration program that uses visual and performing arts as therapeutic tools for underserved populations, especially seniors and at‑risk
    youth. She seeks to secure sustainable multi‑year funding through innovative grant proposals and public‑private partnerships. Over the next five years, she hopes to transition into a senior leadership
    role within a collaborative of non‑profits across the Shenandoah Valley, where she can mentor emerging social service professionals and influence policy on flexible service delivery models. She also
    aspires to publish a guide on incorporating arts into community interventions, positioning herself as a thought leader in the field.
