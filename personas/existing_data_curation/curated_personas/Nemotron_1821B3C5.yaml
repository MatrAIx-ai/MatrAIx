  hobbies: '[''Hiking local trails'', ''Cycling around Columbus'', ''Mentoring youth sports leagues'', ''Reading sports psychology books'', ''Experimenting with new cooking recipes'', ''Attending live music
    gigs'', ''Traveling to major sports tournaments'']'
  career_goals: Aaron aims to progress from his current scouting and coaching role to a senior director of scouting for a professional sports organization, where he can integrate advanced analytics with
    traditional scouting methods. In the longer term, he envisions establishing his own sports performance consultancy that partners with collegiate programs and community clubs to design evidence‑based
    training curricula while promoting athlete well‑being.
