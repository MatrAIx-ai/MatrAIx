personas:
  professional: Aaron Brewer, a 38‑year‑old scouting and performance specialist, merges systematic talent evaluation with data analytics, translating strategic concepts into practical coaching routines
    while using their calm, methodical demeanor to lead multidisciplinary scouting teams and mentor youth athletes.
  sports: Aaron Brewer, an avid cyclist and hiker in Ohio, regularly volunteers with the Columbus Youth Soccer League, follows the Cleveland Browns and the Cincinnati Reds, and is a member of the Ohio Trail
    Runners Club, balancing community coaching with personal fitness.
  arts: Aaron Brewer, who enjoys live music, frequently attends shows at Columbus' Express Live featuring acts like The War on Drugs and local folk singer Emily Scott, and draws creative inspiration for
    experimental cooking from the culinary storytelling of Chef Grant Achatz.
  travel: Aaron Brewer, a practical yet curious traveler, often plans weekend escapes to Hocking Hills State Park and oversees detailed itineraries for trips abroad to Reykjavik and the vineyards of Mendoza,
    balancing low‑key outdoor getaways with occasional international adventure.
  culinary: Aaron Brewer, an experimental home‑cook, loves perfecting sous‑vide salmon with sumac and crafting handmade beet‑infused gnocchi topped with sage butter, while also regularly grilling smoky
    brisket seasoned with coffee rubs for friends at potluck gatherings.
  core: Aaron Brewer is a calm, organized 38‑year‑old scout whose curiosity fuels data‑driven coaching, whose sociable spirit shines in community sports mentoring, and whose occasional splurge on concert
    tickets reveals a perfectly balanced blend of practicality and adventure.
background:
  cultural: Aaron was raised in a middle‑class, Midwestern family in Ohio, where community involvement, modesty, and a strong work ethic are core values. His white ethnic background places him within the
    broader cultural traditions of the Midwest, including an appreciation for local sports, church and volunteer gatherings, and a pragmatic approach to problem‑solving. These influences shape his friendly,
    cooperative demeanor and his commitment to contributing positively to both his professional field and his community.
attributes:
  skills: '[''Athlete development'', ''Talent scouting'', ''Strategic game planning'', ''Data-driven performance analysis'', ''Team leadership'', ''Effective communication'', ''Event organization'', ''Business
