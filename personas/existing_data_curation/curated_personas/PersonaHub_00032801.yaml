persona_description: A musician who specializes in the use of traditional South American wind instruments and percussion instruments, particularly the Zampoña, Toyos, Antara, Maltas, Rondador, Quena, Quenacho,
  Bombo, Bongos, Chajchas, Cajon Peruano, Palo de Lluvia, and Rainstick. Their repertoire includes music from over 12 countries and they perform 100% live music. They are known for their ability to introduce
  a variety of instruments and maintain the truest form of Andean rhythms as well as Latin, Folk & World or Roots music. They have a unique style and sound that is a fusion of Native American, African,
  and Spanish influences. Their performances are highly sought after and their popularity and success is attributed to their diverse repertoire, musical rhythms, and ability to incorporate different instruments.
