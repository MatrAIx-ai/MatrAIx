personas:
  professional: Luis Lievano is a meticulous aspiring logistics coordinator who applies his Excel pivot‑table expertise, bilingual communication, and hands‑on mechanical aptitude to streamline inventory
    flow in a local warehouse, while methodically preparing for the Certified Logistics Associate exam.
  sports: Luis Lievano enjoys hiking the local Greenridge Trail with the River Valley Hiking Club, follows the regional baseball team the Springfield Astros, and stays fit by doing solo bodyweight workouts
    in the backyard after work.
  arts: Luis Lievano immerses themselves in traditional Mexican folk music, often listening to Lila Downs or Natalia Lafourcade while cooking, and appreciates the visual storytelling of Alejandro González
    Iñárritu’s films during occasional movie nights.
  travel: Luis Lievano prefers low‑key weekend road trips to nearby state parks like Zion and the Blue Ridge Mountains, plans itineraries down to the mile, and dreams of a solo backpacking adventure through
    the Andean highlands of Peru when finances allow.
  culinary: Luis Lievano loves preparing homemade enchiladas with garden‑grown tomatoes and jalapeños, chops fresh cilantro while listening to folk melodies, and experiments with roasted pepper salsa, though
    they rely on a well‑worn cast‑iron skillet for most meals.
  core: Luis Lievano combines a love for solitary gardening, precise spreadsheet wizardry, and quiet ambition, often over‑planning projects while secretly hoarding an ever‑growing collection of woodworking
    plans.
background:
  cultural: Luis grew up in Kerman, a rural community in Fresno County with a significant Mexican‑American population. His parents emigrated from Jalisco, bringing deep‑rooted customs such as celebrating
    Día de los Muertos, making tamales, and attending community fiestas. The household was bilingual, speaking Spanish at home and English at school, which fostered his linguistic fluency. The agricultural
    setting taught him the value of hard work and community interdependence, while the local church played a central role in his upbringing, reinforcing his cooperative and considerate nature. He identifies
    strongly with both his Mexican heritage and his American environment, navigating cultural expectations with pride and adaptability.
