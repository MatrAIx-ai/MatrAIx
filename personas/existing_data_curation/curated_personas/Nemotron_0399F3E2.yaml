  career_goals: Luis aspires to secure a stable, structured position in logistics or supply chain management within a local warehouse or agricultural distribution center. He plans to earn a Certified Logistics
    Associate credential within the next two years, enabling him to manage inventory, coordinate shipments, and optimize processes. Over the next five years, he hopes to transition into a supervisory role,
    eventually overseeing a team and contributing to operational efficiencies. He also considers pursuing an associate degree in Business Administration to broaden his career options and increase long‑term
    earning potential.
