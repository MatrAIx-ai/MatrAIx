  hobbies: '["Hiking local trails", "Fishing in the Sacramento River", "Reading historical fiction", "Gardening", "DIY home improvement projects", "Playing acoustic guitar", "Volunteering at the community
    center", "Attending local fairs and festivals"]'
  career_goals: George aims to advance to a senior account manager role within the next three years, eventually stepping into a regional sales manager or team‑lead position where he can mentor newer reps
    and refine sales processes. He plans to earn professional sales certifications (e.g., Certified Professional Sales Leader) and deepen his expertise in sales operations. Long‑term, he envisions launching
    a small consulting firm that helps local service businesses improve their sales workflows, while also securing a permanent home in Cottonwood and becoming a trusted resource in his community.
