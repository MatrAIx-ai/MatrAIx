personas:
  professional: George Lee is a dependable sales representative who leverages meticulous CRM management, persuasive negotiation, and a methodical, relationship‑focused approach to consistently exceed targets
    while valuing routine and clear communication.
  sports: George Lee enjoys weekend hikes with the Sacramento Hiking Club, fishing on the Sacramento River, and follows the Sacramento Kings and Sacramento Republic FC, balancing low‑key outdoor activity
    with occasional pick‑up basketball at the community center.
  arts: George Lee finds creative release playing acoustic guitar renditions of John Mayer and Neil Young, devours historical fiction by Ken Follett and classic literature like Tolstoy’s War and Peace,
    and supports the local community theater featuring productions of Our Town.
  travel: George Lee prefers meticulously planned road trips, having explored Yosemite National Park and Lake Tahoe with detailed itineraries, and dreams of a future adventure to New Zealand’s South Island,
    balancing budget constraints with a yearning for natural scenery.
  culinary: George Lee enjoys moderate cooking, often preparing grilled salmon with rosemary and lemon, homemade tomato‑basil sauce for pasta, and a kale‑and‑quinoa salad using herbs harvested from their
    garden, while occasionally treating themselves to a craft brewery’s seasonal IPA.
  core: George Lee is a routine‑driven sales pro who’s meticulous about CRM updates, compulsively checks their garden’s soil moisture each morning, and still forgets to schedule dentist appointments until
    back pain forces a visit.
background:
  cultural: George was raised in Cottonwood, a small town in Tehama County, within a tight‑knit Anglo‑American community that values hard work, self‑reliance, and neighborly cooperation. His family has
    generations of roots in the region, with backgrounds in farming and small‑business ownership, fostering a practical and traditional outlook. He identifies with mainstream rural Californian cultural
    norms, participates in local church gatherings and county events, and holds a respect for the historical heritage of the Upper Sacramento Valley. His humanities education broadened his appreciation
    for literature, history, and cultural continuity, complementing his community‑oriented values.
attributes:
  skills: '["Customer relationship management", "Negotiation", "CRM data entry and maintenance", "Presentation and public speaking", "Time management", "Conflict resolution", "Process optimization", "Written
