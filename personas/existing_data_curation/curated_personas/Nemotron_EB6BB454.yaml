  career_goals: Andrea aims to advance into a leadership role such as department chair or program director within the next five years, where she can shape the college’s teaching philosophy and expand interdisciplinary
    initiatives. She plans to secure a grant to develop a community‑engaged learning program that connects local businesses with students, and to author a textbook on adult learning and practical pedagogy.
    Additionally, she aspires to mentor a cohort of early‑career educators, establishing a supportive network that balances collaborative scholarship with individual autonomy. Her ultimate ambition is to
    leave a legacy of high‑quality, evidence‑based education that bridges innovative ideas with proven methods.
