personas:
  professional: Charles Ellison, a 15‑year‑old teen tinkerer, channels curiosity and practicality into building model rockets, Arduino gadgets, and indie video games; their methodical planning balanced
    with flexible improvisation fuels competitive entries in school science fairs and hackathons, where they rigorously double‑check every circuit and code line.
  sports: Charles Ellison spends weekends shooting hoops at the Lake County park with friends, follows the Cleveland Cavaliers avidly, competes on his middle‑school basketball team, and they add seasonal
    skateboarding at the local skate park to their fitness routine while tracking progress with a smartwatch.
  arts: Charles Ellison captures Lake County’s sunrise over the shoreline with a DSLR, devours sci‑fi novels by authors like Liu Cixin and N.K. Jemisin, composes chiptune background tracks inspired by Yoko
    Shimomura, and they fuel creative sessions with the atmospheric scores of Hans Zimmer and the indie vibes of Tame Impala.
  travel: Charles Ellison prefers adventurous day trips to nearby Cuyahoga Valley National Park for photography, dreams of a summer visit to the Kennedy Space Center’s visitor complex, and they keep a well‑worn
    road‑trip map marked with future goals like Yellowstone and a future trip to Tokyo.
  culinary: Charles Ellison, a budding kitchen experimenter, enjoys whipping up quick ramen with miso paste and sliced pork, perfecting grilled cheese on sourdough with sharp cheddar, and they snack on
    trail‑mix of almonds, dried cranberries, and dark chocolate while tweaking Arduino projects.
  core: Charles Ellison, a 15‑year‑old gadget‑obsessed, competition‑driven teen, balances methodical curiosity with skeptical pragmatism, often pulling all‑nighters to finish a rocket or game while occasionally
    skipping meals and forgetting to stretch their wrists.
background:
  cultural: Charles was raised in a middle‑class, suburban family in Liberty ville, Illinois. His cultural background reflects typical Midwestern American values such as self‑reliance, community engagement,
    and an appreciation for both outdoor recreation and local sports traditions. His family’s ancestry includes German‑American and Irish‑American roots, which influence occasional family customs and holiday
    meals. He participates in community events like the Liberty ville Summer Fest, attends local sporting events supporting Chicago teams, and observes national holidays like Thanksgiving and the Fourth
    of July, blending these traditions with his personal interests in technology and DIY culture.
