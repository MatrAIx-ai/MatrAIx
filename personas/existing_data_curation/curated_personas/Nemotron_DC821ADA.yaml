personas:
  professional: Bennie Brown, a retired community organizer with a knack for budgeting, event planning, and digital documentation, brings her calm resilience and balanced curiosity to the Carthage senior
    center advisory board, where they mentor volunteers and shape programs that blend tradition with modern sustainability.
  sports: Bennie Brown follows the Indianapolis Colts in the fall, cheers for the Indiana Pacers during the basketball season, participates in a senior walking club that meets twice weekly for brisk laps
    around Carthage’s lakefront trail, and they occasionally join the community’s soft‑serve pickleball league at the senior center, balancing passive fandom with light‑intensity activity.
  arts: Bennie Brown fills her home with the warm sounds of Ella Fitzgerald, Louis Armstrong, Mahalia Jackson, and late‑night jazz playlists, joins the church choir rehearsals that render gospel classics
    by Aretha Franklin and Sam Cooke, and they spend quiet evenings stitching intricate quilts inspired by historic textile art while occasionally attending performances at the Carthage Community Theater
    featuring works such as 'A Raisin in the Sun'.
  travel: Bennie Brown prefers well‑planned road trips that blend genealogical pilgrimages with leisurely sightseeing, having driven to the Mississippi Delta to trace their family’s roots, explored the
    jazz history of New Orleans, visited the National Archives in Washington, D.C., and trekked the scenic overlooks of the Great Smoky Mountains, while they still keep a whimsical yearning for a spontaneous
    weekend getaway to the nearby Lake Monroe.
  culinary: Bennie Brown, an accomplished home cook, perfects classic soul‑food staples such as slow‑braised collard greens, buttery cornbread, and honey‑glazed pork roast while experimenting with modern
    twists like smoked paprika‑infused sweet potatoes, homemade hot sauce using jalapeños and fermented carrots, and occasional forays into Ethiopian injera and Creole étouffée, and they proudly share these
    dishes at family gatherings and community potlucks.
  core: Bennie Brown embodies quiet resilience and boundless curiosity, meticulously budgeting and gardening by sunrise, yet they habitually lose their glasses on the porch and can’t resist a second slice
    of pecan pie after dinner.
background:
  cultural: Bennie Nicole Brown is an African‑American woman whose family roots trace back to the Great Migration, when her grandparents moved from the rural South to the Midwest in search of new opportunities.
    Growing up in Indiana, she absorbed the values of her church community – fellowship, music, and service – while also embracing Midwestern traditions of self‑reliance and community stewardship. Family
    gatherings feature storytelling, soulful music, and dishes like collard greens, cornbread, and pork roast, bridging Southern heritage with local ingredients. Bennie’s cultural identity is expressed
    through her active participation in the local Black church, her dedication to preserving family history, and her commitment to fostering intergenerational connections within Carthage’s tight‑knit community.
