  hobbies: '[''Reading non-fiction (economics, technology, personal development)'', ''Crossword puzzles and Sudoku'', ''Gardening'', ''Tai chi practice'', ''Cooking traditional Vietnamese cuisine'', ''Walking
    nature trails (Babler State Park)'', ''Journaling'', ''Data visualization side projects'']'
  career_goals: Thu Y Yan aims to rise to the role of Chief Financial Officer within the next few years, where she can shape the organization’s financial strategy with data‑driven decision making and rigorous
    risk controls. She plans to earn the CFA charter to deepen her expertise, spearhead a company‑wide financial transformation that embeds automated reporting and predictive analytics, and establish clear
    governance frameworks that reduce ambiguity and stress. Beyond the executive ladder, she hopes to leave a measurable legacy of improved profitability and to mentor high‑performing analysts in a discreet,
    results‑focused manner.
