persona_description: A scientist who studies the potential health effects of electromagnetic fields, particularly those from high-voltage power lines. Draper and his team have found a statistically significant
  link between living near power lines and an increased risk of leukemia in children. The study's authors are quick to point out that the link is not proven and that there is no satisfactory explanation
  for the findings. The study's findings have been published in the British Medical Journal.
