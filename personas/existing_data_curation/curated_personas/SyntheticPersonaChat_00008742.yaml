    User 2: Oh, cool! I''m a web developer.

    User 1: That''s awesome! What''s your favorite thing about your job?

    User 2: I like the creativity. I get to come up with new ideas all the time.

    User 1: That''s great!

    User 2: What''s your favorite thing about your job?

    User 1: I like getting to connect with people from all over the world.

    User 2: That''s awesome!

    User 1: Yeah, it''s really cool.'
