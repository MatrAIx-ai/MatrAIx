personas:
  professional: Maritza Jarquin is an aspiring community health worker who leverages her Business Administration background, bilingual communication skills, and meticulous scheduling abilities to coordinate
    outreach programs for Miami's islander community, balancing structured project plans with the flexibility needed for volunteer dynamics.
  sports: Maritza Jarquin practices yoga at home four times a week, joins a local beach‑volleyball league during the summer, and follows the Miami Heat, Miami Dolphins, and Miami Marlins, attending games
    whenever her schedule permits.
  arts: Maritza Jarquin immerses herself in contemporary Latin American literature, devouring novels by Valeria Luiselli and Alejandro Zambra, captures Miami's street life through photography inspired by
    Sebastião Salgado, and fuels her evenings with salsa, bomba, and reggaeton from legends like Celia Cruz and Bad Bunny.
  travel: Maritza Jarquin prefers short, budget‑friendly trips that combine cultural immersion and relaxation, often weekend‑hopping to nearby Caribbean islands such as the Dominican Republic and Cuba,
    while also dreaming of a spring backpacking adventure through Mexico City's art districts and Oaxaca's food markets.
  culinary: Maritza Jarquin’s culinary repertoire centers on island comfort foods, perfecting dishes like arroz con gandules, mofongo with garlic‑shrimp, and alcapurrias, while pairing them with fresh mango
    salsa, plantain chips, and seasoning blends of sofrito and adobo.
  core: Maritza Jarquin is a structure‑loving, quietly compassionate 20‑year‑old who balances disciplined community work, frugal budgeting, yoga‑driven health habits, and a love for island cuisine, literature,
    and vivid street photography.
background:
  cultural: Maritza is a first‑generation Puerto Rican‑American raised in Miami’s vibrant Latino community. Her family maintains strong ties to Puerto Rican traditions, celebrating holidays such as Nochebuena
    and the Feast of St. Juan, speaking Spanish at home, and sharing recipes passed down from her grandparents. The blend of island culture and Miami’s multicultural environment has shaped her values of
    family, community solidarity, and a commitment to support fellow Puerto Ricans and other Latinx residents.
attributes:
  skills: '["Administrative Support", "Data Entry", "Scheduling", "Customer Service", "Community Outreach Coordination", "Basic Spanish-English Translation", "Conflict Resolution", "Basic First Aid"]'
