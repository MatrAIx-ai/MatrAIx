  career_goals: She aims to complete a bachelor’s degree in Public Health or Social Work within the next three years, securing a role as a community health worker or program assistant at a nonprofit serving
    Miami’s Puerto Rican community. Long‑term, she aspires to become a program director, designing culturally relevant health outreach initiatives and mentoring younger volunteers.
