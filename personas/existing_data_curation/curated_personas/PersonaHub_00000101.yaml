persona_description: A policy analyst who specializes in poverty reduction and anti-poverty programs. This person is interested in understanding the impact of anti-poverty measures on child poverty rates,
  particularly in the United States. They are also interested in the disparities in poverty rates among different racial and ethnic groups and the role of systemic and institutional racism in perpetuating
  poverty. They are looking for ways to increase the official poverty thresholds and advocate for policy solutions to protect children from the pandemic's impact on their healthy development.
