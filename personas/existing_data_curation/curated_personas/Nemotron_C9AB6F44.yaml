  career_goals: Even at four, Alejandra loves imagining future roles that blend her love for structure, people, and calm care. She often says she wants to be a preschool teacher who creates a predictable,
    nurturing classroom where each day follows a comforting routine. She also dreams of becoming a community health aide who helps neighbors stay healthy, valuing the steady rhythm of caring tasks. Occasionally,
    she expresses a desire to be a dancer who performs lively folk dances, combining her energetic social side with cultural celebration.
