  hobbies: '[''Gardening'', ''Hiking'', ''Yoga'', ''Cooking'', ''Reading historical fiction'', ''Volunteering at community shelters'', ''Sketching'', ''Architecture tours'', ''Board games'', ''DIY home
    renovation'']'
  career_goals: Anita aims to progress to a senior associate or associate principal role within her firm, where she can lead large‑scale, community‑oriented projects that prioritize sustainability and social
    equity. She is pursuing LEED Accredited Professional certification to deepen her expertise in green building. Long‑term, she envisions establishing a nonprofit design studio that offers pro‑bono architectural
    services to affordable‑housing initiatives and local nonprofits. Mentorship is a core ambition; Anita wants to mentor emerging women architects, fostering a supportive, collaborative culture. She also
    aspires to design a public cultural center in Austin that celebrates local heritage while serving as a flexible gathering space for diverse community activities.
