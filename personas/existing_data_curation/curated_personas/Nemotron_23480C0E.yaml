personas:
  professional: Anita Lewis is a licensed architect who blends rigorous sustainable design, mastery of Revit, AutoCAD and SketchUp, and a compassionate client‑focused approach, leveraging their love for
    structure and flexibility to lead community‑oriented projects while juggling a messy calendar and a penchant for spontaneous sketching.
  sports: Anita Lewis enjoys weekend hikes through the Texas Hill Country, practices yoga twice a week, supports the Austin FC soccer team and the Texas Rangers baseball club, and occasionally joins a local
    adult soccer league while preferring solo trail runs over organized gym workouts.
  arts: Anita Lewis channels creative curiosity into sketching Austin cityscapes, attending architecture tours that showcase the work of Zaha Hadid, indulging in historical fiction by Hilary Mantel, hosting
    board‑game nights featuring Settlers of Catan, and listening to the folk‑rock sounds of St. Vincent, enriching their cultural palate.
  travel: Anita Lewis prefers low‑key, eco‑conscious trips, often planning weekend escapes to Santa Fe for its adobe architecture, taking bus routes to Asheville’s mountain retreats, and dreaming of a sustainable
    volunteer‑design project in Costa Rica, balancing a modest travel budget with a desire for meaningful cultural immersion.
  culinary: Anita Lewis experiments with Tex‑Mex fusion cuisine, regularly preparing chipotle‑lime grilled shrimp tacos with roasted corn salsa and smoked brisket enchiladas topped with queso fresco, drawing
    fresh herbs like cilantro and jalapeños from their garden, while mastering casual plating in a moderately skilled kitchen.
  core: Anita Lewis is a calm, compassionate architect who mixes structured sustainability with spontaneous creativity, balancing professional ambition with a love for gardening, hiking and community service.
background:
  cultural: Anita is a white Anglo‑American who grew up in the suburban outskirts of Austin, Texas. Her family heritage traces back to English and German immigrants, fostering a blend of traditional Midwestern
    values with the vibrant, progressive culture of Austin. She was raised with an appreciation for community gatherings, outdoor recreation, and Texan culinary traditions like barbecue and Tex‑Mex cuisine.
    Her education in the arts and humanities deepened her connection to European literature, art history, and cultural preservation, which she integrates into her professional practice. Living in Austin's
    eclectic environment has further shaped her worldview, emphasizing sustainability, inclusivity, and creative collaboration in both her personal life and architectural work.
