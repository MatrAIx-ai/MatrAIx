personas:
  professional: Catherine Olson, a journeyman plumber/pipefitter/steamfitter in Gaston County, applies meticulous blueprint analysis, OSHA safety oversight, and a collaborative, mentorship‑driven leadership
    style, they coordinate small crews, maintain strict code compliance, and pursue master‑plumber certification while laying the groundwork for their own contracting business.
  sports: Catherine Olson anchors the Gastonia Gears softball team in a co‑ed league, cheers for the Charlotte Hornets and Carolina Panthers, and routinely tackles the Appalachian Trail with the Gaston
    County Hiking Club, embracing an active, community‑oriented fitness routine that complements their love of hands‑on projects.
  arts: Catherine Olson immerses herself in the regional music scene by attending the Mountain Jam and Asheville Folk Festival, where they especially enjoy performances by The Avett Brothers and Rhiannon
    Giddens, while their book club swings from classics like 'To Kill a Mockingbird' to trade publications such as 'Plumbing & Mechanical Magazine,' reflecting a blend of literary curiosity and professional
    passion.
  travel: Catherine Olson plans trips with the same meticulous care as a pipe layout, favoring weekend getaways to the Blue Ridge Parkway, Asheville’s craft breweries, and Savannah’s historic squares, while
    they dream of a summer trek along Scotland’s West Highland Way to combine scenic hiking with cultural immersion.
  culinary: Catherine Olson approaches cooking like a project, meticulously testing Southern comfort‑food recipes such as fried chicken with a buttermilk brine, shrimp and grits seasoned with smoked paprika,
    and pecan pie infused with bourbon, often using their vintage pickup’s portable grill as a makeshift kitchen and keeping detailed notes on ingredient ratios and timing.
  core: Catherine Olson blends a plumber’s precision with a gardener’s patience, constantly juggling a wrench, a cookbook, and a softball bat, while they secretly hoard vintage truck parts and never miss
    a Sunday outreach event, epitomizing organized, sociable resilience.
background:
  cultural: Catherine was raised in a working‑class white family in the Charlotte‑Gaston County region of North Carolina. Her upbringing emphasized hard work, self‑reliance, and community responsibility,
    values reinforced by regular participation in church gatherings and local festivals. Family traditions included hand‑on trades; a close relative worked as a mechanic, which sparked her early interest
    in practical, hands‑on problem solving. She grew up with a deep appreciation for Southern hospitality, regional cuisine like barbecue and biscuits, and the rhythms of country and classic rock music.
    This cultural foundation blends pragmatic Southern sensibility with a strong sense of community, shaping her reliable, organized, and sociable character.
