    testing'', ''hiking'', ''attending music festivals'', ''book club'']'
  career_goals: Catherine aims to achieve master plumber certification within the next three years and eventually launch her own plumbing and steamfitting contracting business focused on residential and
    small‑industrial projects in Gaston County. She aspires to become an active leader within her local union, championing initiatives that support women and under‑represented groups in the trades. To strengthen
    her business acumen, she plans to complete an associate degree in construction management and obtain the Certified Maintenance & Reliability Professional (CMRP) credential. Long‑term, she envisions
    a mentorship program that pairs experienced tradespeople with newcomers, fostering a safe, inclusive, and highly organized workplace culture.
