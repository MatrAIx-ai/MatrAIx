  career_goals: Looking ahead, Thomas aims to step into a sales leadership role within the next five years, first as a senior sales representative and then as a team lead overseeing a small group of reps.
    He aspires to shape the service portfolio by identifying emerging market needs and collaborating with product teams to create new offerings. A long‑term ambition is to become a regional sales director,
    where he can mentor newer representatives, design training programs that emphasize ethical selling and client care, and drive consistent growth across multiple counties. He also envisions eventually
    leveraging his experience to consult for small businesses on building customer‑centric service models.
