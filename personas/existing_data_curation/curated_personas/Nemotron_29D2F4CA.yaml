personas:
  professional: Theresa Mastin, a veteran community organizer at the Toledo Senior Center, blends meticulous event planning, tight budget management, and a competitive drive to secure funding for senior
    programs while mentoring emerging volunteers and spearheading an oral‑history project that captures local narratives, and they consistently honor every deadline they set.
  sports: Theresa Mastin enjoys daily brisk walks along the Maumee River, follows the Toledo Mud Hens baseball season with a keen eye for stats, participates in a senior bridge club that meets twice weekly,
    treating the walks as essential cardio while they channel a competitive edge into their bridge play.
  arts: Theresa Mastin sings gospel hymns in their church choir, spends evenings quilting with friends inspired by historical portrait patterns, and listens to the soulful recordings of Nina Simone, Aretha
    Franklin, and Stevie Wonder, and they find peace in the rhythm of the music, letting these artistic rituals shape their community‑focused identity.
  travel: Theresa Mastin prefers thoughtfully planned road trips to historic Southern towns such as Savannah and Memphis, where they can trace their family’s migration story, while also cherishing weekend
    getaways to the Michigan shoreline, balancing budget constraints with a yearning for cultural immersion.
  culinary: Theresa Mastin crafts classic comfort meals—slow‑braised collard greens, cornbread, and sweet‑potato casserole—using fresh herbs from their garden and seasoning with smoked paprika and a dash
    of hot sauce, confidently navigating both time‑honored recipes and occasional experimental spice blends, and they take pride in sharing each dish with neighbors and family alike.
  core: Theresa Mastin blends meticulous organization with a love for community storytelling, never missing a senior‑center meeting yet secretly hoarding extra biscuits for themselves when no one’s looking,
    and they often joke that the biscuits are their secret energy reserve.
background:
  cultural: Theresa is a first-generation resident of Toledo whose family roots trace back to the Great Migration from the southern United States. Raised in a close-knit African-American neighborhood, she
    was steeped in church life, soul food traditions, and the civil-rights activism of the 1960s. Her cultural identity is expressed through community service, music, storytelling, and a deep respect for
    the resilience of Black families in Ohio.
