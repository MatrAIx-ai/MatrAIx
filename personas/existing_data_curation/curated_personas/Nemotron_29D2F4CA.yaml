  hobbies: '[''Gardening'', ''Choir Singing'', ''Reading Historical Biographies'', ''Knitting'', ''Bingo'', ''Bridge'', ''Walking'', ''Cooking Traditional Recipes'']'
  career_goals: Theresa aims to leverage her experience to serve on the advisory board of the Toledo Senior Center, mentor young volunteers interested in community development, and lead a city-wide oral-history
    project that captures the stories of Black residents in Lucas County. She also hopes to organize a quarterly intergenerational cultural festival that celebrates African-American heritage and fosters
    dialogue between seniors and youth.
