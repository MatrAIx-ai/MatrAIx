persona_description: A global health researcher with expertise in malaria survey design and implementation. This persona is interested in conducting and analyzing malaria indicator surveys, particularly
  those developed by the Roll Back Malaria partnership. They are familiar with the MIS package, which is a stand-alone household survey that collects data on malaria indicators, including all internationally
  recognized indicators. This persona is also interested in the use of biomarker testing for malaria, and has experience with conducting MIS surveys in different countries. They are familiar with the Roll
  Back Malaria partnership's MIS toolkit, which contains guidelines, questionnaires, and manuals for conducting and analyzing MIS surveys. This persona is also interested in the use of standardized malaria
  indicators and the availability of these indicators for nearly 30 countries.
