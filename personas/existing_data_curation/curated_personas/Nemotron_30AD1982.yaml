personas:
  professional: Moises Rosariotorres, an urban and regional planner who pairs GIS wizardry and statistical modeling with a love for community murals, they channel their curiosity and flexible, sometimes
    disorganized, approach into data‑driven designs that embed cultural celebrations into public spaces, even if that means occasionally missing a deadline due to their relaxed attitude toward obligations.
  sports: Moises Rosariotorres, a lifelong fan of the LA Galaxy and Los Angeles Dodgers, hikes the Santa Ana Mountains with the Ramona Trail Hiking Club in the spring and fall, joins a casual winter basketball
    pick‑up league for social fitness, and they practice gentle yoga year‑round to counterbalance their stress‑prone nature.
  arts: Moises Rosariotorres spends weekends wandering street‑art corridors capturing murals by local legend Roma Reyes, sketching cityscapes in his notebook while listening to Los Lobos and Café Tacvba,
    and they devour speculative fiction by Neal Stephenson and Margaret Atwood, letting the blend of visual and literary inspirations shape their design mindset.
  travel: Moises Rosariotorres prefers flexible, culture‑focused trips that blend adventure with relaxation, having explored the historic markets of Oaxaca, the coastal cliffs of Big Sur, and the art galleries
    of Montreal, while they dream of a sunrise hike in the Himalayas that would let them fuse their love of photography and solitude.
  culinary: Moises Rosariotorres, an avid home chef, perfects mole poblano with roasted ancho chilies, cacao, and epazote, crafts hand‑rolled tamales de hoja for family gatherings, experiments with mole‑miso
    fusion tacos, and they delight in sourcing fresh masa harina and heirloom corn at the bustling Saturday farmers market before treating themselves to carnitas tacos at their favorite local taquería.
  core: Moises Rosariotorres, a 37‑year‑old planner whose artistic curiosity coexists with chronic worry, often loses track of meetings while sketching subway scenes, but they find calm in meditation, mole‑making,
    and late‑night hikes.
background:
  cultural: Moises grew up in a Mexican‑American household in the Los Angeles basin, where Spanish was spoken at home and Mexican traditions such as Día de los Muertos, quinceañeras, and family‑centered
    gatherings were integral to his upbringing. His parents instilled a strong sense of community, respect for elders, and pride in Mexican culinary and artistic heritage. Living in Norwalk, a city with
    a vibrant Latino population, he has maintained close ties to cultural organizations that celebrate Mexican art, music, and folklore. This bicultural experience informs his worldview, fostering an appreciation
    for diversity and a commitment to ensuring that planning decisions honor the cultural fabric of the neighborhoods he serves. Moises also draws on his Mexican roots to champion inclusive public spaces
    that reflect the community’s linguistic and cultural identities.
attributes:
  skills: '[''GIS mapping and spatial analysis'', ''Statistical modeling (Python, R)'', ''Urban design and land‑use planning'', ''Transportation planning'', ''Environmental impact assessment'', ''Public
