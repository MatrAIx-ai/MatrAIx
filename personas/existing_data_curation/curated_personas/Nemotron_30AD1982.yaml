    data (maps, infographics)'']'
  hobbies: '[''Urban photography'', ''Sketching cityscapes'', ''Visiting street‑art galleries'', ''Cooking traditional Mexican cuisine'', ''Hiking in the Santa Ana Mountains'', ''Reading speculative fiction
    and urban theory'', ''Meditation and yoga'', ''Participating in community mural projects'', ''Board‑game evenings with close friends'']'
  career_goals: Moises aims to move into a senior leadership role within a regional planning agency where he can shape policies that promote sustainable, equitable, and culturally resonant development across
    Los Angeles County. He envisions launching a cross‑disciplinary initiative that embeds public art, green infrastructure, and affordable housing into the planning process, leveraging his passion for
    unconventional ideas. Over the next five years he hopes to secure a directorship that oversees large‑scale transit‑oriented development projects, mentor junior planners, and publish research on integrating
    cultural heritage into urban design. He also aspires to build a consultancy that offers community‑driven planning services to underserved neighborhoods, while maintaining a balance that allows him flexibility
    to pursue personal interests.
