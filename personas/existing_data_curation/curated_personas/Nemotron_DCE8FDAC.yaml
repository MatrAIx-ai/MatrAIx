  hobbies: '[''Gardening'', ''Church choir singing'', ''Quilting'', ''Listening to classic R&B and gospel music'', ''Volunteering at food pantry'', ''Walking along the St. Johns River'', ''Participating
    in community art projects'', ''Cooking with fresh garden produce'']'
  career_goals: Lelia aims to formalize her hands‑on experience by earning a Certified Nursing Assistant (CNA) credential and later a Home Health Aide certification. She envisions moving into a lead‑assistant
    role where she can mentor new staff and help shape patient‑centered care policies. Long‑term, she hopes to launch a small community‑based health‑education group for seniors, offering workshops on nutrition,
    chronic‑disease management, and social‑activity planning. Continuing education workshops on geriatric psychology and adaptive technologies are also on her radar, reflecting her balance of curiosity
    and practicality.
