personas:
  professional: Lelia Lindsey, a veteran nursing assistant in a bustling outpatient clinic, combines meticulous vital sign monitoring and compassionate patient support with a practical curiosity that drives
    them to master wound‑care basics and streamline documentation, while their cooperative nature makes them the go‑to team player during hectic shifts.
  sports: Lelia Lindsey, a devoted fan of the Jacksonville Jaguars and the Tampa Bay Rays, joins a local senior walking club that meets thrice weekly along the St. Johns River, adds gentle yoga at the community
    center during winter, and participates in a recreational tennis league at the Riverfront Recreation Center.
  arts: Lelia Lindsey, whose heart sings in the church choir, reveres classic R&B legends like Marvin Gaye, Aretha Franklin, and Al Green, often spins their vinyl records on rainy evenings, and helps create
    community murals that celebrate cultural heritage and storytelling, drawing inspiration from artists such as Romare Bearden.
  travel: Lelia Lindsey prefers low‑key road trips to historic Southern towns such as Savannah, Georgia, and Charleston, South Carolina, enjoys occasional weekend getaways to New Orleans for its vibrant
    music scene, but schedules trips around family obligations and a modest travel budget, favoring boutique B&Bs over large resorts.
  culinary: Lelia Lindsey blends garden harvests into meals, expertly preparing okra gumbo seasoned with thyme and cayenne, herb‑roasted chicken flavored with rosemary and basil, and fresh tomato‑basil
    pasta, showing intermediate cooking skill and a penchant for farm‑to‑table dishes that celebrate seasonal produce.
  core: Lelia Lindsey embodies a nurturing, pragmatic spirit—balancing compassionate patient care, garden enthusiasm, gospel harmonies, and a love for classic R&B—while occasionally forgetting to water
    the rosemary and leaving the living‑room lights on.
background:
  cultural: Lelia’s cultural background is rooted in the African‑American community of northeastern Florida. Growing up in a multigenerational household, she learned the importance of faith, familial support,
    and mutual aid. Church has been a central gathering place, shaping her values of compassion, cooperation, and service. She carries the legacy of the civil‑rights era, remembering stories of resilience
    and activism shared by elders, which inform her commitment to advocate for vulnerable patients. Local traditions—such as soul‑food cooking, gospel music, and community festivals—remain integral to her
    identity, providing both comfort and a sense of belonging as she navigates life in Green Cove Springs.
attributes:
  skills: '[''Patient hygiene assistance'', ''Mobility support and safe transfers'', ''Vital signs measurement'', ''Basic wound care'', ''Medication reminder and documentation'', ''Infection control practices'',
