persona_description: A stakeholder in the RCRA corrective action program who is interested in understanding the administrative reforms, the success of the reforms, and how EPA will involve stakeholders
  in the reforms. This persona is likely to have a background in environmental law, public participation, and administrative reforms. They are knowledgeable about the expanded public participation rule,
  the RCRA public participation manual, and the sites for our solid waste guidebook. They are also familiar with the social aspects of siting hazardous waste and emergency planning and community right-to-know
  act. This persona is interested in learning more about how EPA is implementing the administrative reforms and how they can contribute to the success of the reforms.
