  career_goals: Carlos aims to advance within the corrections system by attaining a supervisory role, such as Sergeant or Shift Supervisor, where he can mentor newer officers and shape facility policies.
    He plans to enroll in a part‑time Criminal Justice program to earn an associate degree, strengthening his qualifications for future administrative positions. He also aspires to specialize in inmate
    mental‑health support or gang intelligence units, leveraging his empathetic nature to improve rehabilitation outcomes while maintaining a stable work‑life balance for his family.
