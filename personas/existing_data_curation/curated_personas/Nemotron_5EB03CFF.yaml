  career_goals: Although not currently employed, Thomas aims to deepen his engagement with the community through volunteer work. He plans to become a docent at the local heritage museum, sharing his art
    appreciation and historical knowledge with small visitor groups. He also hopes to launch a modest side business creating handcrafted wooden pieces for friends and neighbors, and to mentor adults in
    skill-building workshops at the community center. A personal ambition is to travel to major art museums in Texas and beyond, enriching his own understanding and bringing fresh ideas back to his hometown.
