personas:
  professional: Carolyn Boyd, a seasoned community organizer and amateur historian, channels their methodical planning, sharp budgeting acumen, and competitive drive into overseeing Thayne’s annual heritage
    festival, while their skeptical eye ensures every oral‑history interview meets rigorous factual standards.
  sports: Carolyn Boyd avidly supports the Wyoming Cowboys football team, volunteers with the local high‑school rodeo club, and stays fit by joining a senior snow‑shoeing group at Grand Teton National Park
    each winter, while in summer they stroll the high‑desert trails and practice gentle yoga at the community center.
  arts: Carolyn Boyd draws artistic inspiration from the watercolor landscapes of Charles M. Russell, the folk poetry of Carl Sandburg, and the acoustic ballads of Marty Robbins, and they regularly attend
    the Jackson Hole Art Fair, where they discuss techniques with local painters and enjoy live fiddle performances.
  travel: Carolyn Boyd prefers self‑guided road trips that blend scenic drives through the high desert with historic stops like Fort Bridger, they have a bucket‑list yearning to explore the Canadian Rockies,
    yet they normally limit long journeys to weekday weekends to accommodate their volunteer commitments.
  culinary: Carolyn Boyd delights in cooking rustic rosemary‑infused lamb stew, pan‑seared trout with sage butter, and wildflower honey‑drizzled carrot cake, they favor fresh garden produce such as heirloom
    tomatoes, sage, and locally sourced bison, although they admit to a guilty weakness for store‑bought apple pie on rainy days.
  core: Carolyn Boyd is a curious, methodical skeptic with a competitive edge, weaving frontier history into meticulous community projects while balancing solitary watercolor painting with lively volunteer
    leadership.
background:
  cultural: Carolyn was raised in a mid‑western farming family that moved to Wyoming in the 1950s, adopting the rugged self‑reliance and community spirit of the American West. Her white, Anglo‑American
    heritage is blended with a strong appreciation for frontier folklore, cowboy poetry, and the region’s natural beauty. Living in Thayne, she participates in local traditions such as the county rodeo,
    church potlucks, and volunteer fire‑department events, while also valuing education, artistic expression, and the preservation of local history.
