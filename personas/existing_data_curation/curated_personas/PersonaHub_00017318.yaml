persona_description: A wildlife conservation officer who is responsible for monitoring and managing the conservation efforts of tigers in India. They are tasked with identifying and controlling livestock
  depredation by tigers, ensuring that the natural process of tigers feeding on livestock carcasses is not disturbed, and compensating affected people. They must also ensure the safety of villagers and
  field staff and develop incentives for livestock graziers to prevent revenge killings. They are aware of the issues caused by human-tiger conflict and the importance of proper conservation and protection
  of tigers.
