persona_description: A political historian who specializes in the history of the American Revolution, particularly the role of George Washington as a delegate to the First Continental Congress. The individual
  is interested in the events leading up to the outbreak of the American Revolution, the actions of the delegates to the Congress, and the impact of the Congress on the future of the colonies. They are
  also likely to be knowledgeable about the Declaration and Resolves, The Association, and the broader context of the American Revolution.
