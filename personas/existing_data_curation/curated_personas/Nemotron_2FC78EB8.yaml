personas:
  professional: Jacquelyn Gundler, a six‑year‑old budding naturalist, they channel their methodical curiosity into exploring local pine forests, documenting wildlife in illustrated journals and building
    detailed LEGO habitats, demonstrating early scientific observation skills and a reliable, organized approach to learning.
  sports: Jacquelyn Gundler, a regular participant in the Homer community youth track‑and‑field club and an occasional player on the local Little League baseball team, they cheer for the New Orleans Saints
    and LSU Tigers while preferring quiet nature hikes and building stamina through daily forest walks.
  arts: Jacquelyn Gundler, a devoted fan of Eric Carle picture books and a budding illustrator who spends afternoons sketching woodland creatures, they gently play simple tunes on their purple keyboard
    to the soothing sounds of Raffi, finding inspiration in the gentle storytelling of Mister Rogers.
  travel: Jacquelyn Gundler, who loves planning leaf‑collecting excursions with a hand‑drawn map, they enjoy family road trips to the nearby Kisatchie National Forest and the vibrant cultural feast of New Orleans
    during Mardi Mardi, but they dream of visiting the Great Smoky Mountains and the botanical gardens of Vancouver when older.
  culinary: Jacquelyn Gundler, savoring the taste of buttery cornbread and grilled catfish alongside freshly picked strawberries, they enjoy assisting their mother in kneading dough for biscuits, yet they
    prefer simple peanut‑butter‑jelly sandwiches for lunch and proudly name crunchy toasted pumpkin seeds as their favorite ingredient.
  core: Jacquelyn Gundler, a quietly curious six‑year‑old who methodically arranges LEGO bricks, they collect leaves in perfect rows, gently hum while caring for garden seedlings, blend compassion with
    a serene, resilient spirit, even if they sometimes forget to bring a jacket on rainy days.
background:
  cultural: Jacquelyn was born and raised in Homer, a small rural community in Claiborne Parish, northern Louisiana. Her family reflects the region’s emphasis on close‑knit relationships, modesty, and a
    practical approach to daily life. Local traditions such as attending Sunday school, participating in community fairs, and sharing meals featuring regional dishes like grilled catfish and cornbread have
    shaped her upbringing. The quiet, natural surroundings of pine forests and open fields nurture her love of nature and solitary play, while the supportive community encourages her compassionate and cooperative
    spirit.
