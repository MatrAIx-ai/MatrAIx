  career_goals: Although still six, Jacquelyn dreams of a future where she can help others and work in a calm, structured environment. She often imagines becoming a veterinarian because of her love for
    animals and her compassionate nature. She also expresses interest in being a librarian, enjoying quiet spaces filled with books, or an environmental scientist who studies nature with curiosity and practicality.
    Her long‑term ambition is to continue learning, stay organized, and use her skills to support her community.
