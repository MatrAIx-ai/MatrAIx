  career_goals: Yen aims to move from a frontline childcare worker to a centre manager within the next three years, leveraging her business degree to improve operational efficiency and program quality.
    She plans to obtain the Certified Childcare Administrator (CCA) credential and eventually open her own boutique daycare that integrates culturally responsive curricula for Southeast Asian families in
    Charlotte. Long‑term, she envisions becoming an advocate for early childhood policy and offering professional development workshops for childcare staff.
