  career_goals: Timmie's immediate goal is to earn top grades in reading and math and secure the class monitor position for the next school year. She also aims to win the school speech contest and lead
    her soccer team as captain. Looking ahead, she aspires to become an elementary school teacher who can design structured, engaging lessons and organize school events, blending her love for routine, organization,
    and being at the center of attention. Additionally, she dreams of one day coordinating community festivals in Sacramento, applying her competitive spirit and sociable nature to plan and execute large‑scale
    events.
