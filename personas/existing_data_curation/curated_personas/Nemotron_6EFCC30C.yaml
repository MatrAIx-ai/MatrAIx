  hobbies: '[''Fly Fishing'', ''Woodworking'', ''Vegetable Gardening'', ''Genealogy Research'', ''Historical Non‑Fiction Reading'', ''Weekly Bible Study Group'', ''Classic Car Restoration'', ''Local History
    Exploration'']'
  career_goals: Approaching retirement, Riley aims to transition into a mentorship role, passing on his practical knowledge to emerging managers within his company and the wider community. He plans to develop
    a part‑time consulting practice focused on streamlining operations for small local businesses, ensuring their long‑term viability. Additionally, he hopes to lead a succession planning project at his
    current organization, securing a smooth handover while preserving his legacy of efficiency and reliability.
