personas:
  professional: Energetic and competitive upholsterer Jorge Cossio leverages their meticulous stitching, fabric pattern expertise, and vibrant island-inspired color palettes to deliver custom furniture
    restorations while cultivating client relationships through their sociable charm and curiosity for unconventional materials.
  sports: Savvy about staying active, Jorge Cossio joins the Jacksonville Beach Volleyball Club for weekend matches, sails with the Fernandina Sailing Association in summer, and fervently supports the Jacksonville
    Jaguars while occasionally playing pickup soccer in the local park.
  arts: An avid patron of the arts, Jorge Cossio frequents the Riverfront Arts Alliance galleries, draws inspiration from the bold murals of local street artist 'Lobo Azul', and channels the rhythmic flair
    of salsa icons like Celia Cruz into their sketching sessions.
  travel: Jorge Cossio prefers a mix of purposeful trips to their family’s island home for cultural immersion and spontaneous road trips along Florida’s Gulf Coast, dreaming of future explorations of Cartagena’s
    colonial waterfront and the vibrant markets of Marrakech.
  culinary: An enthusiastic home chef, Jorge Cossio masters island classics such as mofongo, arroz con gandules, and tostones, skillfully balances bold adobo seasoning with fresh herbs, yet sometimes forgets
    to defrost seafood in time for their impromptu dinner parties.
  core: Jorge Cossio blends a competitive craftsperson’s eye for detail with a vibrant, community‑centered spirit, constantly juggling bold design experiments, savvy finances, and a love for island rhythms,
    even when their relentless curiosity leads to occasional late‑night project overhauls.
background:
  cultural: Jorge’s Puerto Rican heritage is a central thread in his identity. Raised in a bilingual household, he grew up with the island’s rhythms, colors, and culinary traditions, which continue to shape
    his aesthetic choices and daily life. He celebrates cultural festivals such as Noche de San Juan and the Puerto Rican Day Parade in nearby Jacksonville, often wearing traditional attire and sharing
    food with his community. His design sensibility favors bold, vibrant hues and natural textures reminiscent of Caribbean architecture. Fluent in Spanish, he frequently incorporates Spanish phrases in
    conversations and maintains strong ties with relatives in Puerto Rico, visiting them whenever possible. This cultural grounding provides both inspiration for his work and a sense of resilience during
    personal challenges.
