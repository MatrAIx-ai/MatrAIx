  career_goals: Jorge aims to transition from being an employee upholsterer to owning a boutique studio that fuses artistic upholstery with his Puerto Rican cultural roots. He envisions a space where he
    designs and produces one‑of‑a‑kind pieces that feature vibrant Caribbean colors and motifs, while also offering interior‑design consulting for high‑end residential and boutique‑hotel projects. Over
    the next five years he plans to earn a professional certification, mentor at least two apprentices, and host quarterly workshops that blend upholstery techniques with art education. Ultimately, he hopes
    to achieve financial independence, a reputable brand name in North‑Florida’s design scene, and the ability to travel back to Puerto Rico regularly to source inspiration and materials.
