  hobbies: '[''Cooking Ecuadorian cuisine'', ''Gardening'', ''Hiking local trails'', ''Participating in community festivals'', ''Zumba classes'', ''Salsa dancing'', ''Reading historical nonfiction'', ''Volunteering
    at local food bank'']'
  career_goals: Fahima aims to transition from front‑line driving to a supervisory role within her transportation company. She plans to obtain a commercial driver’s license with advanced endorsements and
    complete a certified driver‑trainer program, so she can mentor newer drivers and improve safety standards. Over the next five years she hopes to become a lead dispatcher or fleet operations coordinator,
    leveraging her organizational strengths and technology aptitude. In the longer term, she dreams of launching a small, family‑run transport service that serves the local senior community, combining her
    practical expertise with her desire to give back.
