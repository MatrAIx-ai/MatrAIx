  career_goals: Although retired from formal employment, Miriam aims to expand her impact as a community volunteer. She aspires to lead a senior advisory board for the Sacramento Latino Center, develop
    a small community garden that serves as a cultural gathering space, and author a cookbook that preserves her family's Guatemalan recipes while adapting them for health‑conscious seniors. She also hopes
    to mentor younger members of the Guatemalan diaspora, offering language workshops and cultural storytelling sessions. Her long‑term ambition is to become a recognized elder leader who bridges generations,
    fostering cultural continuity and practical support for older adults in her neighborhood.
