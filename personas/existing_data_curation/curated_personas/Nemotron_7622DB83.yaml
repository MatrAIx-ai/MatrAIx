personas:
  professional: An aspiring young visual storyteller, Sue Carson blends daily sketching, watercolor experiments, and DSLR photography with narrative writing and drama performances, channeling her methodical
    planning and sociable energy into a budding portfolio that aims for a future in illustration and multimedia storytelling.
  sports: A sporty teen enthusiast, Sue Carson plays on her middle‑school soccer team, swims at the local YMCA on weekends, and avidly follows the Chicago Bulls and Chicago Cubs, balancing her love for
    team camaraderie with a personal routine of daily stretching and occasional weekend hikes with friends.
  arts: An emerging creative polymath, Sue Carson immerses herself in daily sketching inspired by Monet’s impressionism, experiments with watercolor palettes echoing Frida Kahlo’s bold hues, studies photography
    techniques of Annie Leibovitz, plays piano pieces by Beethoven and contemporary pop songs by Billie Eilish, and participates in drama productions of “Hamilton” and local youth theater, all of which
    shape her vibrant artistic identity.
  travel: An inquisitive young traveler, Sue Carson has visited the DuPage County Historical Museum, explored Chicago’s Art Institute on school field trips, taken a family road trip to Washington D.C. to
    see the Smithsonian exhibits, and dreams of touring the Louvre in Paris, preferring meticulously planned itineraries that blend cultural exploration with time for sketching on the go.
  culinary: A budding home chef, Sue Carson enjoys whipping up strawberry‑banana smoothies, experimenting with homemade pepperoni pizza dough, and mastering the art of chocolate brownies, while delighting
    in trying eclectic dishes like sushi rolls and kimchi fried rice whenever a family dinner outing permits, though she often forgets to set the timer and ends up with slightly over‑baked treats.
  core: Sue Carson is a curious, organized 13‑year‑old who channels her sociable energy into art, coding, and community volunteering, while battling frequent worries and a habit of staying up late to perfect
    her sketches.
background:
  cultural: Sue grows up in a typical Midwestern white family in Naperville, Illinois. Her household reflects a blend of German and Irish ancestry, with family traditions centered around Thanksgiving, Christmas,
    and church gatherings. Community values such as hard work, politeness, and active participation in local events—like the Naperville Winterfest and the county fair—are integral to her upbringing. Exposure
    to diverse cultures through school and museum programs has broadened her perspective, encouraging her to appreciate art and ideas from many backgrounds while staying rooted in her suburban American
    heritage.
