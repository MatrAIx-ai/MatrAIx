  career_goals: Sue envisions a future where she can combine her artistic passions and organizational strengths. She aspires to study art history and museum studies in college, with the ultimate goal of
    becoming a museum curator or cultural program director who designs engaging exhibitions for young audiences. She also dreams of creating a digital platform that showcases teen‑generated art and storytelling,
    and hopes to one day lead community art initiatives that empower other creative youths.
