personas:
  professional: Paulisa Quang, a senior operations strategist with a STEM graduate background, leverages Six Sigma, ERP implementation, and data‑driven planning to streamline supply chains while weaving
    creative problem‑solving and community‑focused values into corporate culture.
  sports: Paulisa Quang enjoys early‑morning paddleboarding at the Atlantic, plays recreational tennis at the local Palm Beach Gardens Racquet Club, follows the Miami Heat and the Tampa Bay Buccaneers for
    basketball and football, and participates in a community yoga circle that meets twice weekly, using the routine to stay fit and clear the mind.
  arts: Paulisa Quang spends weekends painting abstract canvases inspired by the vibrant hues of local markets, regularly attends jazz performances by the Miami Jazz Society featuring the likes of Wynton
    Marsalis, and finds solace in classical concerts of Yo‑Yo‑Ma, while also curating a personal collection of works by Kehinde Wiley and Amy Sherald that fuel her own artistic pursuits.
  travel: Paulisa Quang plans trips with a blend of meticulous itineraries and spontaneous detours, favoring culturally rich destinations like New Orleans for its music heritage, Havana for its street art,
    Kyoto for its gardens, and the Bahamas for island relaxation, while balancing travel budgets against family commitments.
  culinary: Paulisa Quang, an intermediate home chef, loves fusing Southern comfort foods with island spices, regularly preparing dishes such as jerk‑seasoned collard greens, shrimp and grits with coconut
    milk, sweet potato pie infused with nutmeg, and plantain‑based side plates, often using scotch bonnet pepper, okra, and fresh herbs from her own garden.
  core: Paulisa Quang blends analytical rigor with artistic flair, channeling calm resilience into operational excellence, devoting weekends to paint, plants, and jazz, while occasionally losing track of
    time in a creative flow that leaves her coffee cup perpetually half‑full.
background:
  cultural: Paulisa identifies as Black and carries a rich African diaspora heritage that blends African American traditions with Caribbean influences common in South Florida. Her family background includes
    roots in the Caribbean, fostering fluency in English and conversational Haitian Creole. Growing up, she was immersed in community churches, soul food gatherings, and vibrant cultural festivals that
    emphasized storytelling, music, and collective support. This cultural tapestry instilled values of resilience, mutual aid, and a deep appreciation for artistic expression. Living in Palm Beach Gardens,
    she engages with a multicultural community, drawing inspiration from local Afro‑Caribbean markets, beachside art fairs, and environmental stewardship initiatives that reflect both her cultural pride
    and her commitment to harmony and inclusivity.
