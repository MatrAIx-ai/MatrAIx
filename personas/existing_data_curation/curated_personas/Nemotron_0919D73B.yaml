    Initiatives'', ''Sustainability Integration'', ''Creative Problem‑Solving'']'
  hobbies: '[''Visiting art galleries and museums'', ''Painting (acrylic and watercolor)'', ''Attending live jazz and classical music performances'', ''Reading sci‑fi, leadership, and African diaspora history'',
    ''Cultivating a sustainable tropical garden'', ''Volunteering for local youth arts programs'', ''Practicing yoga and meditation'', ''Traveling to explore diverse cultures'', ''Cooking fusion dishes
    (African‑American, Caribbean, Southern)'', ''Photography of nature and architecture'']'
  career_goals: Paulisa aims to progress to a senior executive role such as Chief Operating Officer within the next five years, where she can champion sustainable operations and embed a culture of empathy
    and artistic expression across the organization. She aspires to lead large‑scale corporate social responsibility programs that expand access to arts education for under‑served youth in South Florida.
    Additionally, she envisions establishing her own consultancy focused on operational excellence, diversity leadership, and community impact, helping mid‑size firms achieve measurable efficiency gains
    while fostering inclusive workplaces. Mentoring the next generation of Black women leaders in STEM and management remains a core, lifelong ambition.
