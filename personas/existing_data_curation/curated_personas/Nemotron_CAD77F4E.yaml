  career_goals: Kristian dreams of a future where he can protect the Pacific Northwest’s ecosystems. He hopes to become a wildlife conservationist or marine biologist, using both fieldwork and data‑analysis
    skills to monitor species health. At the same time, his love for technology fuels an ambition to develop software tools that help environmental scientists track habitat changes. He envisions attending
    a science‑focused high school, then earning a scholarship to the University of Washington for a degree in environmental science or applied engineering. Ultimately, Kristian wants a career that blends
    curiosity‑driven discovery with practical, community‑benefiting outcomes, allowing him to contribute to sustainable solutions while staying organized and dependable.
