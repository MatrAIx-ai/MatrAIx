  hobbies: '[''Woodworking'', ''DIY electronics (Arduino)'', ''Fishing'', ''Gardening'', ''Reading historical non-fiction'', ''Reading popular science'', ''Senior-center chess club'', ''Local choir'', ''Walking
    hikes'', ''3D printing projects'']'
  career_goals: 'He aims to keep his mind active by mentoring high‑school students in STEM through local after‑school programs, sharing his practical engineering experiences, and learning emerging technologies
    like 3D printing and IoT. He also hopes to complete a personal project: building a custom wooden canoe for weekend outings on nearby Lake Kegonsa. Maintaining good health and emotional balance is another
    priority, so he plans to incorporate regular walking, gentle yoga, and mindfulness practices. He envisions staying involved in his community’s rotary club and contributing to small‑scale sustainability
    initiatives.'
