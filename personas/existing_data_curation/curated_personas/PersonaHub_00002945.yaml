persona_description: A researcher and scientist who is interested in the study of climate change, particularly heatwaves and their effects on human life in developed countries. They have a background in
  atmospheric dynamics and have worked with the Bjerknes Centre for Climate Research. They are knowledgeable about the effects of the jet stream on heatwaves and are interested in the ways in which climate
  change is affecting the jet stream. They are also interested in the use of citizen science projects to gather observations and improve weather models.
