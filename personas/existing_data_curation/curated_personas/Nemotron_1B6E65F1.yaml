  career_goals: Approaching retirement, Kimberly aims to transition into an office manager role where she can mentor younger staff and design efficiency workshops for small businesses. She also hopes to
    volunteer her administrative expertise part‑time for a local nonprofit, helping streamline their operations while remaining engaged in the workforce she enjoys.
