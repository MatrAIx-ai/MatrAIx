personas:
  professional: Kimberly Marshall, a veteran administrative assistant turned aspiring office manager, leverages three decades of high‑level organization, bilingual customer service, and pragmatic curiosity
    about new tech to streamline small‑business operations while mentoring younger staff with a balanced mix of supportive guidance and assertive feedback.
  sports: Kimberly Marshall enjoys low‑impact fitness by tending her community garden, participating in a local walking club that meets on Saturday mornings, occasionally joining the senior center’s line‑dancing
    classes, and cheering on the nearby baseball team, the Springfield Isotopes, while also supporting the regional women's college basketball squad.
  arts: Kimberly Marshall expresses her creative side through a church choir where she sings gospel hymns, quilts intricate heritage patterns, devours historical fiction by authors like Philippa Gregory
    and Ken Follett, and attends community theater productions starring local talent such as actress Maya Lin, all of which enrich her sense of identity and leisure.
  travel: Kimberly Marshall’s travel style blends careful planning with spontaneous detours, favoring road trips to historic sites like Savannah’s squares, culinary pilgrimages to Oaxaca for authentic mole,
    and occasional cruises to the Caribbean, all while budgeting travel expenses through senior discounts and a modest travel fund.
  culinary: Kimberly Marshall delights in Southern‑Mexican fusion cuisine, regularly cooking dishes such as chipotle‑glazed collard‑green enchiladas, black‑eyed‑pea gumbo with corn masa, and fresh tomatillo
    salsa using garden‑grown cilantro and jalapeños, and though her cooking skill is intermediate, she often experiments with new spice blends, occasionally resulting in smoky kitchen mishaps.
  core: Kimberly Marshall is a pragmatic yet curious retiree who blends administrative expertise, garden‑inspired culinary experiments, and community volunteerism, while occasionally overcommitting and
    neglecting personal downtime.
background:
  cultural: Kimberly is an African American woman born in the South who moved to El Paso in her early adulthood. She maintains deep ties to Black cultural traditions—gospel music, church community, and
    celebrations like Juneteenth—while also embracing the rich Hispanic influences of her Texas home. Fluent in English and conversational Spanish, she navigates a multicultural environment with pride,
    drawing strength from both her family’s civil‑rights legacy and the vibrant, bilingual community around her.
