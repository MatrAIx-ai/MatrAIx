    community theater'', ''volunteering as docent'', ''writing memoir'']'
  career_goals: Although retired, Franciscus aims to deepen his community impact. He plans to become a regular docent at the Moorestown Historical Society, leading flexible, story‑rich tours that blend
    his love of history and unconventional thinking. He hopes to curate a rotating art exhibit for the local senior center, leveraging his art appreciation and event‑planning skills. He also dreams of teaching
    a beginner’s photography workshop at the community center, sharing his digital skills with peers. Writing a memoir filled with his photographs and reflections on a lifetime of varied experiences is
    another ambition, as is traveling to New York City’s major photography exhibitions to stay inspired. He seeks recognition as a trusted elder volunteer while maintaining a low‑pressure, adaptable schedule
    to manage his natural worry about overcommitment.
