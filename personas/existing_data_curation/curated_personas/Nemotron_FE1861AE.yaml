  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Sketching'', ''Reading art history books'', ''Listening to creativity podcasts'', ''Herb gardening'', ''Walking countryside trails'',
    ''Cooking traditional Polish dishes'', ''Attending local fairs'', ''Volunteering at senior centers'']'
  career_goals: She aims to obtain a certified housekeeping manager credential within the next year to qualify for supervisory positions. In the longer term, Linda hopes to launch a small, flexible cleaning
    and home‑organization business that emphasizes eco‑friendly practices and accommodates her artistic interests. She also aspires to volunteer as an art guide or workshop assistant at local senior community
    centers, merging her love of art with her caregiving experience.
