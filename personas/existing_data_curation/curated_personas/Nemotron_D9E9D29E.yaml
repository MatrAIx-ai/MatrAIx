  hobbies: '["Watercolor Painting", "Visiting Art Galleries", "Reading Art History & Psychology", "Listening to Folk & Classical Music", "Gardening (Native Wildflowers & Vegetables)", "Knitting", "Small
    Book Club Participation", "Volunteer Tutoring (Adult Computer Skills)", "Facilitating Stress‑Management Workshops", "Listening to Educational Podcasts"]'
  career_goals: In the next two to three years, Joanne aims to lead the implementation of a comprehensive employee wellness and mental‑health program at her organization, integrating mindfulness and art‑therapy
    sessions. She aspires to transition into a senior HR business partner role that focuses on strategic workforce planning and cultural transformation, positioning the company as a model of harmonious,
    inclusive workplace in the region. Beyond formal retirement, she hopes to become a part‑time HR consultant and mentor for small businesses in Knox County, sharing best practices on employee engagement
    and conflict mediation while also volunteering to develop career‑readiness workshops for adult learners at the local community center.
