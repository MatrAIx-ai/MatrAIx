personas:
  professional: Joanne Johnson, a seasoned human resources veteran with three decades of experience, designs empathetic, art‑infused wellness initiatives that balance strict compliance with creative conflict‑resolution
    workshops, and they mentor junior staff through gentle, cooperative guidance.
  sports: Joanne Johnson enjoys cheering on the Kentucky Wildcats basketball team and the Eastern Kentucky Colonels football squad while joining a senior walking club for low‑impact hikes along the Daniel
    Boone National Forest trails, and they prefer steady, moderate activity over high‑intensity sports.
  arts: Joanne Johnson spends evenings painting watercolors of rolling Appalachian hills, drawing inspiration from the pastoral works of Andrew Wyeth and the folk melodies of Doc Watson, while attending
    intimate gallery openings in Lexington featuring local artisans and they volunteer to lead watercolor workshops at the community center.
  travel: Joanne Johnson prefers leisurely, scenic road trips along the Blue Ridge Parkway, often stopping at family‑run B&Bs in Asheville and the Shenandoah Valley to explore local craft markets and historic
    sites, and they dream of a future pilgrimage to the Scottish Highlands to trace the storytelling traditions of their ancestors.
  culinary: Joanne Johnson delights in preparing hearty Appalachian fare such as smoked trout, braised collard greens, and fresh cornbread, seasoning dishes with garden‑grown herbs like thyme, rosemary,
    and wild mint, and they occasionally experiment with seasonal pumpkin risotto for holiday gatherings.
  core: Joanne Johnson blends a meticulous HR career with a quiet passion for watercolor, garden‑to‑table cooking, and a habit of over‑thinking that fuels both thoughtful compassion and occasional bouts
    of worry, and they often catalog seed packets while humming old folk tunes.
background:
  cultural: Joanne’s cultural roots are anchored in the Appalachian region of Eastern Kentucky, where her family has lived for generations. Growing up in Manchester, she was immersed in the traditions of
    small‑town hospitality, community cooperation, and a rich oral heritage of folk music and storytelling. The region’s emphasis on self‑reliance and close‑knit relationships shaped her cooperative nature
    and her commitment to harmony in group settings. While she identifies as white, her upbringing in a rural Southern environment has given her a deep appreciation for local crafts such as quilting and
    woodworking, as well as a respect for the natural landscape that informs her love of gardening. The blend of traditional Appalachian values with her educational background has cultivated a perspective
    that balances practicality with curiosity, allowing her to embrace new ideas while honoring the cultural continuity of her community.
attributes:
  skills: '["Employee Relations", "Conflict Resolution", "Talent Acquisition & Recruitment", "Training & Development Design", "Performance Management", "HRIS Administration (ADP Workforce Now, PeopleSoft)",
