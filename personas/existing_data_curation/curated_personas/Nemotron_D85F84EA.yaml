personas:
  professional: Mu Katyal, a three‑year‑old who thrives on structure, spends daily playtime at preschool meticulously arranging wooden blocks into symmetrical towers, treating each layer like a milestone,
    and they eagerly label each block with colored stickers for their small, trusted circle of classmates.
  sports: Mu Katyal, a three‑year‑old, attends the Tiny Tots Soccer Club where structured drills satisfy their love for predictability, they cheer quietly for the local professional team, the City Lions,
    during family game nights, and they save energy for the Saturday mini‑match on the neighborhood field.
  arts: Mu Katyal, a three‑year‑old, immerses themselves in picture books and the playful melodies of The Wiggles, often reenacting songs from their favorite performer, Ryan’s World, and they meticulously
    organize crayons by hue, displaying a miniature gallery of doodles for their parents.
  travel: Mu Katyal, a three‑year‑old, loves short family road trips to the seaside town of Cedar Cove, where they build sandcastles in precise, repeatable patterns, and they keep a tiny map with colour‑coded
    stickers to plan each visit according to their favorite playground schedule.
  culinary: Mu Katyal, a three‑year‑old, favors comfort foods like creamy mac and cheese, insists on peas being cut into perfect circles, they proudly help stir banana pancake batter, though they sometimes
    sneak extra chocolate chips into the mix without permission.
  core: Mu Katyal, a three‑year‑old master of tiny routines, balances a love for order with secret spontaneous giggles, often hiding crayons in unsuspecting pockets and they demand bedtime stories in exact
    three‑minute intervals.
background:
  cultural: Mu is raised in a South Asian household in King City, California. Her family maintains cultural traditions such as celebrating Diwali and Eid, preparing dishes like dal, rice, and rotis, and
