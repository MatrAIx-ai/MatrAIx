  career_goals: Dorothy often imagines a future where she works in a calm, organized environment that lets her work independently. She dreams of becoming a librarian who curates books and creates quiet
    reading corners, or a wildlife biologist who studies animals in the forests of Vermont, allowing her to combine her love of structure, solitude, and the outdoors. She also aspires to be a champion puzzle
    solver, hoping to win school competitions and perhaps one day compete in national puzzle tournaments. These ambitions reflect her desire for predictable routines, competitive achievement, and a comfortable,
    low‑social‑noise workplace.
