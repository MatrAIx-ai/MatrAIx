personas:
  professional: Dorothy Mitchell is an aspiring young naturalist who channels her love for adventure books and woods exploration into detailed field journals, applying a step‑by‑step, structured approach
    reminiscent of LEGO building while thriving on solitary, competitive challenges and occasionally feeling distressed when her meticulous plans are disrupted.
  sports: Dorothy Mitchell participates in the local Portland Rainforest Rangers youth soccer program, enjoys solo swimming laps at the community pool, and cheers for the Portland Timbers and the Seattle
    Seahawks during family game nights, preferring individual practice over team drills.
  arts: Dorothy Mitchell devotes free time to drawing detailed landscapes inspired by Claude Monet’s water lilies, assembling LEGO sculptures while listening to the whimsical music of Eric Carle’s storybooks,
    and winding down with Studio Ghibli movies like My Neighbor Totoro, showing how visual arts shape her identity.
  travel: Dorothy Mitchell has explored the nearby Redwood State Park and dreams of hiking the Grand Canyon, kayaking in the Great Lakes, and discovering the volcanic fields of Hawaii’s Big Island, preferring
    carefully planned day trips with a detailed checklist rather than spontaneous backpacking.
  culinary: Dorothy Mitchell enjoys simple yet hearty meals like extra‑cheesy macaroni, honey‑glazed carrots, and banana pancakes, can confidently spread peanut butter on apple slices, and shows budding
    cooking confidence by assembling snack plates from fresh carrots, grapes, and cheese cubes.
  core: Dorothy Mitchell, a seven‑year‑old puzzle enthusiast, blends a love for solitary structure with intense emotional sensitivity, often retreating into LEGO builds or nature walks to calm their anxiety.
background:
  cultural: Dorothy was raised in Montpelier, Vermont, a small New England capital known for its strong sense of community and connection to the natural landscape. Her family follows typical white American
    customs, celebrating holidays such as Thanksgiving, Christmas, and the state's maple syrup festival, and values modesty, self‑reliance, and respect for privacy. The local culture emphasizes outdoor
    activities like hiking, leaf‑peeping, and wildlife observation, which have nurtured her love for nature. Community events are often low‑key, reinforcing her preference for quiet, structured environments.
    The combination of New England traditions and the region's emphasis on independence shapes Dorothy's worldview and daily life.
