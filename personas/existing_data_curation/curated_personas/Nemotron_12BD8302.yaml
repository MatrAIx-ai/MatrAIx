personas:
  professional: Leonel Irizarry, a seasoned construction professional who blends disciplined project coordination, keen curiosity for sustainable building tech, and bilingual communication into a reliable
    site leader, often becomes the social nucleus of crews and stakeholders alike, and they inspire confidence on every job.
  sports: Leonel Irizarry, an avid weekend soccer player for the Riverside Rovers and a fervent fan of San Antonio FC and the Houston Astros, balances community league matches with early‑morning fishing
    trips on the Rio Grande, using both sports to unwind from work pressures, and they often organize neighborhood tournaments.
  arts: Leonel Irizarry, whose playlist constantly cycles through norteño legends like Los Tigres del Norte and banda icons such as Banda El Recodo, thrives on dancing at local festivals and often hosts
    impromptu karaoke nights, letting music serve as his gateway to community connection, and they love sharing stories of favorite songs.
  travel: Leonel Irizarry, a moderate‑budget traveler who prefers road trips to nearby cultural towns like Santa Fe and San Antonio, dreams of a solo hiking adventure in the Grand Canyon while also planning
    a relaxing family vacation to a coastal resort in Baja, balancing his love for nature with the desire to stay close to his support network, and they meticulously chart each itinerary in a travel journal.
  culinary: Leonel Irizarry, a skilled home cook who perfects hearty dishes such as carnitas, chile relleno, and pozole using fresh corn, chiles, and a dash of epazote, delights friends with weekly potlucks
    and frequently experiments by swapping traditional spices for smoked chipotle or roasted tomatoes, and they consider each shared meal a celebration of community.
  core: Leonel Irizarry, a sociable yet anxiety‑prone builder, channels meticulous organization into both his construction projects and bustling community gatherings while constantly juggling the worry
    of upcoming certifications, and they often rely on coffee to stay alert.
background:
  cultural: Leonel grew up in a bicultural Mexican‑American household near the Texas–Mexico border, speaking Spanish at home and English at school. Family ties and community solidarity are central to his
    identity, shaped by traditions such as Día de los Muertos celebrations, holiday tamales, and weekly gatherings at the local parish. His heritage influences his work ethic, emphasizing respect (respeto)
    and collective responsibility, and he values sharing knowledge with younger community members. While rooted in Mexican cultural values, Leonel navigates both cultures fluently, bridging gaps between
    Spanish‑speaking workers and English‑speaking clients.
