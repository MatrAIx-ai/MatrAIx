  career_goals: Leonel aims to advance from a miscellaneous construction worker to a site supervisor within the next two years, targeting an OSHA 30‑hour certification and a journeyman carpenter license.
    He aspires to develop expertise in sustainable building practices, eventually establishing his own small contracting firm that serves the Mission community with eco‑friendly renovations and new builds.
    Leonel also plans to mentor younger workers, especially those from Mexican‑American backgrounds, and to create a stable financial future for his family while maintaining a healthy work‑life balance.
