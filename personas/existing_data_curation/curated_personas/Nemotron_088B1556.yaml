  career_goals: Pho aims to transition from front‑line sales to a managerial role within the next three years, leveraging her people‑focused strengths to lead a team and shape store strategy. She is interested
    in district or regional management positions that allow her to travel, mentor new associates, and implement innovative, customer‑centric programs. Long‑term, she envisions launching her own boutique
    that blends contemporary fashion with Southeast Asian design elements, using her retail expertise, community network, and social‑media savvy to build a culturally resonant brand.
