persona_description: A healthcare professional with expertise in infectious diseases, particularly in the study of coronaviruses and their transmission. They have a strong understanding of epidemiology,
  particularly in the context of outbreaks and the identification of patient zero. They have experience in tracking the spread of infectious diseases and have a deep knowledge of the MERS-CoV and SARS viruses.
  They are well-versed in the diagnostic methods and treatment protocols used to manage these diseases, and are familiar with the challenges of tracking the origin of infectious diseases. They have a passion
  for public health and are dedicated to preventing and controlling the spread of infectious diseases.
