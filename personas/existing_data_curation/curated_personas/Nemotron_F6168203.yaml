  hobbies: '[''Hiking in the Blue Ridge Mountains'', ''Nature photography'', ''Playing banjo'', ''Reading historical fiction'', ''Collecting antique hand tools'', ''Attending small art exhibitions'', ''Experimenting
    with painting'', ''Gardening'', ''Cooking Appalachian recipes'', ''Volunteering at local craft fairs'']'
  career_goals: Christine aims to transform her freelance woodworking practice into a modest boutique studio that showcases a signature line of sculptural furniture blending functional design with artistic
    expression. She hopes to open a small gallery‑shop in Sparta where she can sell her pieces directly to locals and tourists, and to develop an online presence that generates a steady stream of commission
    work and passive income through limited‑edition releases. Long‑term, she envisions authoring a book on Appalachian woodworking techniques, mentoring aspiring woodworkers in the community, and establishing
    a mentorship program for youth interested in craft trades, thereby securing a sustainable legacy while maintaining creative autonomy.
