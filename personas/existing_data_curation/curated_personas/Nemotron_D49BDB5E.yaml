personas:
  professional: Melissa Alli, an aspiring junior technologist who spends afternoons building LEGO robots and crafting simple Scratch games, channels their meticulous organization and high standards into
    leading their school’s coding club and presenting polished projects at community art workshops.
  sports: Melissa Alli, an enthusiastic member of the local youth soccer team and a regular participant in weekend dance classes at a community studio, cheers for the Minnesota Timberwolves and enjoys nature
    hikes in Minnehaha Park, balancing energetic play with disciplined practice schedules.
  arts: Melissa Alli, a budding illustrator who fills sketchbooks with characters inspired by graphic novels like Amulet and Dog Man, sings in the school choir while listening to Stevie Wonder and Alicia
    Keys, and eagerly attends community art workshops at the heritage museum during Juneteenth festivals.
  travel: Melissa Alli, a curious explorer who plans family weekend trips to the Minneapolis Institute of Art and the Badlands National Park with a tidy checklist, dreams of visiting New Orleans for its
    jazz scene and hopes to see the Louvre in Paris, balancing organized itineraries with spontaneous park adventures.
  culinary: Melissa Alli, a budding kitchen helper who loves whipping up mac‑and‑cheese with a sprinkle of paprika, helping bake sweet potato pie for Juneteenth gatherings, and experimenting with banana
    pudding topped with crunchy pecans, while occasionally sneaking extra grapes from the fruit bowl.
  core: Melissa Alli, an organized, socially vibrant 8‑year‑old who blends a curious love for technology and art with disciplined study habits, energetic group activities, and a habit of meticulously planning
    her playdates and savings.
background:
  cultural: As a Black child growing up in Minneapolis, Melissa is part of a vibrant African American community that values art, music, and cultural heritage. Her family celebrates traditions such as Juneteenth
    gatherings, storytelling evenings featuring African folktales, and cooking soul‑food dishes passed down through generations. She participates in local programs like the African American Heritage Museum
    visits, community jazz workshops, and cultural festivals at the Midtown Global Market. The city’s strong emphasis on arts, activism, and community engagement shapes her worldview, inspiring her to blend
    creativity with a sense of social responsibility.
