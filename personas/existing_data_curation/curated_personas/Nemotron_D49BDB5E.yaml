  career_goals: Melissa dreams of becoming a creative inventor who designs colorful, educational toys that blend art and science. She is fascinated by the idea of being a museum curator who brings together
    community stories and artworks, reflecting her love for new ideas and unconventional thinking. She also imagines a future as a teacher or youth mentor, helping other children explore curiosity and creativity.
    Melissa wants to use her organizational talents to lead community art projects in Minneapolis, such as youth mural initiatives or interactive workshops, and hopes to study both art and STEM fields to
    become a designer‑educator or STEM outreach specialist.
