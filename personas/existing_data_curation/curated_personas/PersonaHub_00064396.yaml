persona_description: A nurse who is experienced in conducting assessments of the ears, nose, and throat in non-critical care settings. This nurse has a thorough understanding of the subtle differences between
  life-threatening conditions and benign ones. She is able to identify the small differences between the symptoms of a sore throat and a runny nose, and determine that the inflammation is probably due to
  the pathogen causing the sore throat rather than throat cancer. This nurse would not need to escalate the assessment to a biopsy or an MRI of the lymph nodes, but would probably perform a simple strep
  test.
