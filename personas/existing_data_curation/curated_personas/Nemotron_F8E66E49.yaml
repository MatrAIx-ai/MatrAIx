personas:
  professional: Michael Mckeithen, a 43‑year‑old network and systems administrator with deep expertise in Cisco, Juniper, VMware, and cloud networking, leverages his meticulous, structure‑preferring mindset
    and competitive edge to design fault‑tolerant architectures while rigorously documenting every change, positioning himself for a senior network architect role.
  sports: Michael Mckeithen, an avid hiker who logs weekly treks with the Hill Country Hiking Club and follows the Austin FC and Dallas Cowboys, balances cardio with occasional weekend pick‑up basketball,
    preferring structured exercise routines over spontaneous workouts.
  arts: Michael Mckeithen, a longtime fan of jazz legends like John Coltrane and Miles Davis and soul icons such as Aretha Franklin and Al Green, regularly attends intimate performances at Austin’s Elephant
    Room, using the music’s improvisational complexity to sharpen his strategic thinking.
  travel: Michael Mckeithen, who meticulously plans trips around tech conferences and scenic hikes, has explored New Orleans for its culinary heritage, trekked the Rocky Mountains, and dreams of a solo
    pilgrimage to Kyoto’s historic tech districts, balancing family responsibilities with a penchant for adventure.
  culinary: Michael Mckeithen, a self‑taught grill master, frequently prepares Texas‑style brisket, smoked ribs with mesquite wood, and experiments with gumbo and jambalaya using okra, andouille sausage,
    and roux, favoring hands‑on cooking that mirrors his detail‑oriented approach to network troubleshooting.
  core: Michael Mckeithen, a 43‑year‑old tech enthusiast, blends a disciplined, competitive work ethic with an occasional over‑indulgence in high‑end PC hardware and a habit of postponing routine medical
    check‑ups.
background:
  cultural: Michael is an African-American who grew up in the Greater Austin region of Texas, where he was immersed in a blend of Southern hospitality and vibrant Black community traditions. His family
    placed a strong emphasis on education and self-reliance, values reinforced by his involvement in the local church and cultural events. As a Black professional in a predominantly white tech field, Michael
    has experienced both the challenges of underrepresentation and the strength of mentorship networks such as the Texas Black Tech Alliance. These experiences shape his commitment to community service,
    especially mentoring younger Black students in STEM, and inform his appreciation for African-American history, soul music, and the supportive atmosphere of his close-knit family and neighborhood.
attributes:
  skills: '[''Cisco Routing & Switching'', ''Juniper Networks Configuration'', ''Windows Server Administration'', ''Linux System Administration'', ''VMware/Hyper-V Virtualization'', ''PowerShell Scripting'',
    ''Bash Scripting'', ''Network Security (firewall, VPN)'', ''Cloud Networking (AWS, Azure)'', ''Troubleshooting & Diagnostics'', ''Capacity Planning & Performance Monitoring'', ''Technical Documentation'',
    ''Vendor Management'']'
  hobbies: '[''Custom PC building'', ''Home lab/network experimentation'', ''Raspberry Pi projects'', ''Reading tech and African-American history books'', ''Hill Country hiking'', ''Barbecue grilling'',
    ''Chess'', ''Jazz and soul music listening'', ''Mentoring high-school students in networking'']'
  career_goals: Michael aims to advance from his current role as a network/computer systems administrator to a senior network architect position within the next five years. He plans to obtain advanced certifications
    such as CCNP and CCIE, deepen his expertise in cloud-based networking, and lead large-scale infrastructure projects. Ultimately, he aspires to transition into an IT management role where he can shape
    technology strategy for his organization while also establishing a consultancy that helps small businesses in the Austin area secure and optimize their networks. Michael also seeks to give back by mentoring
    African-American youth interested in STEM and networking.
