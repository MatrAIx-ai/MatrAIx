personas:
  professional: Ana Pagan is an aspiring graphic storyteller who channels their love for comic book heroes into meticulously planned sketchbooks, balancing a structured storyboard approach with spontaneous
    doodles, and their cooperative nature shines through in the school art club's collaborative projects.
  sports: Ana Pagan follows the Fritch High School Broncos football team and is an avid supporter of the Dallas Cowboys, enjoys casual soccer matches with friends after school, and maintains fitness through
    daily walks with their dog Luna, preferring low‑pressure activity over competitive sports.
  arts: Ana Pagan immerses themselves in creative expression by drawing comic heroes inspired by classic artists, listening to Los Tigres del Norte for folk inspiration, Bad Bunny for reggaeton beats, and
    Taylor Swift for pop melodies, and they regularly attend the local community theater’s youth workshops.
  travel: Ana Pagan dreams of exploring the historic streets of Guanajuato during Día de los Muertos, revisits family gatherings along San Antonio’s River Walk, and looks forward to attending New York Comic
    Con, favoring trips planned with parental guidance that blend cultural immersion with affordable adventure.
  culinary: Ana Pagan enjoys cooking simple family recipes such as chicken tacos with fresh cilantro, lime, and pickled onions, prepares guacamole with ripe avocados and jalapeños, and experiments with
    herb garden harvests like oregano and parsley to flavor homemade quesadillas, showcasing an intermediate cooking skill level.
  core: Ana Pagan is a creative, structure‑loving teen who balances meticulous sketching with spontaneous gaming, worries about responsibilities yet finds comfort in family traditions and art.
background:
  cultural: Ana grows up in a Mexican‑American household in the small town of Fritch, Texas. Spanish is spoken daily at home, and she celebrates Mexican traditions such as Día de los Muertos, Posadas, and
    Navidad with family gatherings, traditional foods, and decorative altars. At the same time, she partakes in Texan community life, attending local school sports events, rodeo fairs, and Thanksgiving
    celebrations. Her family places a strong emphasis on close familial bonds, respect for elders, and blending cultural values, which has given her a deep appreciation for both her Mexican heritage and
    the broader Texan environment.
attributes:
