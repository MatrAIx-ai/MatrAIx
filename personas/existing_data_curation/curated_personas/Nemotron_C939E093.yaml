  hobbies: '["Drawing and sketching", "Playing creative video games (e.g., Minecraft)", "Reading young‑adult novels", "Listening to Mexican folk, reggaeton, and pop music", "Cooking family recipes", "Walking
    and caring for a dog", "Participating in school Spanish club", "Gardening herbs and vegetables"]'
  career_goals: Ana hopes to graduate high school with strong grades and then pursue a degree in education or animal science. She dreams of becoming a bilingual elementary school teacher who weaves Mexican
    stories and cultural lessons into her classroom, or alternatively, working at a local animal shelter as a veterinary assistant. In the meantime she wants to volunteer with youth mentorship programs
    and community health outreach initiatives in her town, helping younger kids feel confident and supported.
