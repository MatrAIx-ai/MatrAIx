persona_description: A geologist who is fascinated by the study of the Colorado Plateau and its geological history, particularly the disruption of the crust during the Laramide Orogeny and the resulting
  erosion and uplift. This person is interested in the complex and varied landscapes of the region, including the formation of the Grand Canyon of the Colorado River, and the preservation of the Early Proterozoic
  gneiss and granite. This person is also interested in the question of how the canyon came to be, and the missing middle that seems to be missing in the geological history of the region.
