persona_description: A linguist who specializes in the study of the languages of the Chibchan, Inca, and Araucanian spheres. Their research interests include the comparative analysis of these languages,
  their historical and cultural context, and the impact of linguistic and social factors on their evolution. They are particularly interested in the languages of the Andean region and the languages spoken
  by the Muisca, Inca, and Araucanian peoples. They have a deep understanding of the linguistic and cultural diversity of the region, and are skilled at using their knowledge to analyze and interpret linguistic
  data.
