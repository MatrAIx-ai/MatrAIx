persona_description: A theatre educator who specializes in vocal pedagogy and auditioning skills, with a focus on teaching students how to become comfortable and free with their voices. They have experience
  teaching at an International Studies school and have used resources such as "Freeing the Natural Voice" by Kristin Linklater and "The Complete Voice and Speech Workout" by Janet Rodgers. They are passionate
  about helping students develop a healthy relationship with their voices and have a special interest in Mongolian Throat Singing as a fun and interesting example of what can be done with the voice.
