  hobbies: '[''Visiting art galleries and museums'', ''Digital painting (Procreate, Blender)'', ''Hiking and trail running in the White Mountains'', ''Photography and photo editing'', ''Reading science‑fiction
    and tech non‑fiction'', ''Participating in hackathons and IoT prototyping'', ''Cooking experimental cuisine'', ''Exploring local craft breweries'', ''Playing strategic board games'', ''Traveling to
    European art capitals'']'
  career_goals: Ashley aims to transition into senior technology leadership within the next three years, targeting a Director of Engineering or VP of Product role where she can shape strategy for cutting‑edge,
    interdisciplinary projects that blend technology with creativity. She is particularly passionate about building AI‑powered tools for artists and is exploring a startup concept that democratizes digital
    art creation. Parallel to her career advancement, she plans to earn advanced cloud certifications (AWS Solutions Architect – Professional, Google Cloud Professional Data Engineer) and to become a regular
    speaker at industry conferences, sharing insights on inclusive team culture and the intersection of art and tech. Mentoring emerging women engineers and fostering a competitive yet collaborative environment
    remain core to her long‑term ambition.
