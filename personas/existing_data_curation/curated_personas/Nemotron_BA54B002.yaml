personas:
  professional: Ashley Cordell, a senior full‑stack software engineer with deep expertise in Python, Java, JavaScript, cloud architecture, and CI/CD pipelines, leverages design thinking and a competitive,
    critical mindset to lead agile Scrum teams, mentor junior developers, and drive inclusive tech solutions that intersect art and AI.
  sports: Ashley Cordell enjoys trail running in the White Mountains and regular hikes, fans the Boston Red Sox and New England Patriots, and belongs to the North Conway Trail Club where they occasionally
    compete in local 10k races while also following the Boston Bruins during hockey season.
  arts: Ashley Cordell immerses in contemporary art by visiting galleries featuring artists like James Turrell and Alyssa Monks, creates digital paintings in Procreate and 3D models in Blender inspired
    by the works of Jackson Pollock, and curates playlists of Fleet Foxes, Phoebe Bridgers, and the modern jazz group Snarky Puppy during studio sessions.
  travel: Ashley Cordell prefers meticulously planned road trips that balance adventure and relaxation, has recently explored Reykjavik’s design scene, dreams of hiking Norway’s Lofoten Islands, and schedules
    weekend getaways to Portland Maine’s seafood shacks while juggling family holiday commitments and a modest travel budget.
  culinary: Ashley Cordell experiments in the kitchen with dishes like miso‑caramel glazed pork belly, wild foraged mushroom risotto, and sourdough focaccia flavored with local maple syrup, often pairing
    meals with craft IPAs from Smuttynose Brewery while occasionally over‑indulging in midnight snack pizza after late‑night coding sprints.
  core: Ashley Cordell is a curiosity‑driven technologist who blends artistic passion with competitive rigor, balancing disciplined work habits with occasional indulgences in craft beer and midnight pizza,
    and never shies away from a challenge.
background:
  cultural: Ashley grew up in a middle‑class New England family of primarily Anglo‑Irish heritage, immersed in the traditions of Concord, New Hampshire. Her upbringing emphasized self‑reliance, education,
    and community involvement, with annual participation in regional events such as the Fall Foliage festivals and local farmers' markets. Family gatherings during Thanksgiving and Christmas reinforced
    a strong sense of familial bonds and seasonal celebration. The region’s rich literary and artistic history, from the Transcendentalist legacy to contemporary indie galleries, nurtured her appreciation
    for both classic and avant‑garde art. While she identifies with mainstream American culture, she also values the progressive, inclusive mindset common in New Hampshire’s tech community, which encourages
    independent thought and competitive excellence.
