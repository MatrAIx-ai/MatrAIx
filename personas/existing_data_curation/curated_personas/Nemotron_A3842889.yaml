personas:
  professional: William Woolf, an emerging builder who loves stacking colorful blocks in perfect rows, exhibits a blend of curiosity for new shapes and practical adherence to familiar patterns, hinting
    at a future career in engineering or architecture; they demonstrate disciplined organization even in play.
  sports: William Woolf, a tiny sports enthusiast who enjoys crawling across the soft sand at Red Rock Canyon and shaking a miniature football during family viewing parties for the Las Vegas Raiders, and
    they belong to a local toddler playgroup that practices basic motor skills at the community pool, blending outdoor adventure with team spirit.
  arts: William Woolf, an early arts aficionado who hums along to Disney’s "Let It Go," giggles at the colorful puppets of Sesame Street, and is mesmerized by the neon silhouettes of Cirque du Soleil performances
    in Las Vegas, they often reach for bright picture books and rhythmic toys that stimulate their developing sense of rhythm and color.
  travel: William Woolf, a wander‑curious toddler who has already taken short trips to Red Rock Canyon, the Hoover Dam, and the Grand Canyon with his family, delights in desert sunrises and now dreams of
    a future visit to Disneyland in Anaheim and a family vacation to Tokyo, they favor trips that blend familiar routines with fresh sensory experiences.
  culinary: William Woolf, a budding palate who prefers smooth mashed sweet potatoes and applesauce yet shows a quirky insistence on biting into the small, crunchy crackers his parents sneak into his snack
    tray, they often demand banana slices cut into perfect rounds and enjoy plain yogurt sprinkled with a dash of cinnamon.
  core: William Woolf, a meticulously organized one‑year‑old who balances boundless curiosity with a persistent worry about routine disruptions, they often arrange his toys into perfect lines while clutching
    his favorite pacifier.
