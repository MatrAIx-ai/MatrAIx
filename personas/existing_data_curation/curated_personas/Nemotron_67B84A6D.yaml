  hobbies: '[''Painting'', ''Visiting Art Galleries'', ''Nature Photography'', ''Hiking'', ''Gardening'', ''Reading (Art History and Business Innovation)'', ''Yoga'', ''Cooking Classes'', ''Community Volunteering
    (Local Library Programs)'']'
  career_goals: Etta aims to advance into a senior executive role, such as Director of Operations, where she can shape organizational culture and champion innovative, socially responsible initiatives. She
    plans to enroll in an executive MBA program to deepen her strategic expertise. Parallel to her corporate ambitions, she aspires to launch a boutique community art space that blends her business experience
    with her passion for the arts, offering curated galleries and hands‑on workshops. She also hopes to mentor emerging women leaders in the region and serve on local economic development boards to contribute
    to the growth of Campbell County.
