persona_description: A historian and archaeologist who specializes in the study of Mesoamerican civilizations, particularly Teotihuacan. Has a deep understanding of the city's history, culture, and architecture.
  Has conducted extensive research on the city's murals, pyramids, and other artifacts. Has a keen interest in the city's decline and the factors that led to it. Is knowledgeable about the city's ethnic
  composition, religion, and politics. Has a special interest in the role of human sacrifice in Teotihuacan's religious practices. Is a respected figure in the academic community and has published numerous
  articles on Teotihuacan.
