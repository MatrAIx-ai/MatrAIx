personas:
  professional: An aspiring young engineer with a love for hands‑on experiments, Fannie Eubanks channels their disciplined, routine‑driven nature into building model bridge kits and leading science club
    projects, always aiming for precise results and top scores in competitions, and they take pride in guiding teammates to achieve shared goals.
  sports: An energetic soccer captain, Fannie Eubanks leads the Middle School Warriors' soccer team, also plays forward for the junior basketball league's Hawks, follows a disciplined practice schedule,
    cheers for the Chicago Fire and Chicago Bulls, and they thrive on competition while balancing team camaraderie.
  arts: An enthusiastic pianist and scrapbooker, Fannie Eubanks charms classmates with piano renditions of Beethoven's Für Elise and Einaudi's Nuvole Bianche, fills creative journals with illustrated reflections,
    they draw inspiration from Maya Angelou's poetry and Frida Kahlo's vibrant paintings, and they often spend evenings arranging scrapbook pages with meticulous precision.
  travel: A curious explorer, Fannie Eubanks plans weekend camping trips to Shenandoah State Park, dreams of visiting the Smithsonian in Washington DC and the magical realms of Disney World, but they balance
    these ambitions with school schedule and family budget, often mapping out routes on a colorful planner to ensure each adventure fits into their routine.
  culinary: A budding home chef, Fannie Eubanks enjoys whipping up classic mac and cheese with extra cheddar, experiments with mini pizzas topped with pepperoni and bell peppers, they can reliably bake
    chocolate chip cookies using their grandma’s secret vanilla‑infused sugar, and they sometimes over‑season dishes in a quest for perfect flavor.
  core: Fannie Eubanks is a fiercely organized, competitive 11‑year‑old who thrives on routine, leads peers in sports and science, yet often battles worry and a skeptical edge, and they channel this energy
    into achieving high standards.
background:
  cultural: Fannie comes from a white, middle-class family rooted in the historically German and Scots-Irish communities of Westmoreland County, Pennsylvania. Growing up in Export, a small town with a strong
    sense of close-knit community and traditional values, she regularly attends a local Lutheran church where family gatherings, Sunday dinners, and community fairs are central to her social life. Her upbringing
    emphasizes practicality, hard work, and respect for local customs such as the annual county fair, Fourth-of-July parades, and holiday traditions. These cultural influences reinforce her preference for
    routine, her disciplined work ethic, and her desire to contribute positively to her hometown.
attributes:
  skills: '["Organized time management", "Meticulous note-taking", "Strong arithmetic and problem-solving", "Basic Scratch programming", "Beginner piano", "Soccer team captain", "Leadership in school group
    projects", "Event planning for Girl Scouts"]'
  hobbies: '["Soccer (team captain)", "Junior basketball league", "Piano lessons", "Science club experiments", "Spelling bee competitions", "Chess tournaments", "Scrapbooking and journaling", "Model bridge
    building", "Volunteering at the local animal shelter"]'
  career_goals: Fannie envisions a future where she combines her love of order, practical problem-solving, and helping others. In the long term she hopes to become a civil engineer who designs safe bridges,
    roads, and community infrastructure for towns like Export, PA, ensuring everything works efficiently. She also dreams of one day serving as a school principal, using her high standards and organizational
    skills to create a disciplined yet supportive learning environment. In the meantime she aims to win a state-level science fair with a project that improves local water quality, and to earn a leadership
    badge in Girl Scouts that emphasizes community service.
