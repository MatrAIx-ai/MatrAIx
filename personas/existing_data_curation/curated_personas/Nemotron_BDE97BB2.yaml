    program development'']'
  hobbies: '[''Visiting local art galleries and folk art fairs'', ''Reading contemporary fiction and non‑fiction on psychology and organizational behavior'', ''Painting acrylics (abstract and landscape)'',
    ''Participating in community theater productions'', ''Gardening (herb and vegetable beds)'', ''Cooking Southern cuisine with creative twists'', ''Exploring independent coffee shops and boutiques in
    nearby towns'', ''Attending live blues and jazz music events'', ''Practicing yoga and mindfulness meditation'', ''Road trips to national parks'']'
  career_goals: In the next few years Jamie aims to earn her SHRM‑SCP certification and move into a senior HR manager role within a midsize regional employer, where she can lead a team that embraces flexible
    work models and data‑informed decision‑making. Long‑term, she envisions becoming an HR director or chief HR officer, driving innovative culture‑shaping strategies that blend traditional Southern hospitality
    with modern, inclusive workplace practices. She also hopes to mentor younger HR professionals in her community and eventually launch a boutique consultancy that helps small businesses in Mississippi
    adopt progressive HR systems.
