personas:
  professional: Jamie Staley, a seasoned HR professional with a decade of talent acquisition and employee relations experience, blends data‑driven analytics, AI‑enhanced recruiting tools, and a skeptical
    eye for motives into flexible, inclusive workforce strategies while occasionally juggling the clutter of a disorganized calendar.
  sports: Jamie Staley enjoys morning jogs with the Jackson Running Club, practices yoga at Riverbend Yoga studio, and roots for the New Orleans Saints, Memphis Grizzlies, and Mississippi State Bulldogs
    while occasionally playing casual softball in a community league.
  arts: Jamie Staley regularly visits galleries showcasing Georgia O'Keeffe‑inspired folk art, sketches scenes from the Mississippi Repertory theater, and finds inspiration in the music of B.B. King and
    Joni Mitchell while devouring contemporary fiction by Ocean Vuong and psychology books by Daniel Kahneman.
  travel: Jamie Staley prefers spontaneous road trips to national parks like Great Smoky Mountains and Acadia, punctuated by stops at independent coffee shops in Asheville and Austin, balancing limited
    budget constraints with a desire for adventure over meticulously planned itineraries.
  culinary: Jamie Staley loves cooking Southern staples such as shrimp and grits and fried chicken, often adding garden‑fresh herbs, miso glaze, and smoked paprika to create inventive twists, while also
    savoring comfort foods like collard greens seasoned with a splash of bourbon.
  core: Jamie Staley is a curiosity‑driven HR strategist who balances herb gardens, data dashboards, and blues nights, often misplacing paperwork but never missing a chance to sprout a new creative employee‑engagement
    idea.
background:
  cultural: Jamie grew up in a tight‑knit, predominantly white community in Jefferson Davis County, Mississippi, where Southern hospitality, church gatherings, and a love of blues music formed the backdrop
    of her childhood. Her family ran a small local business, which sparked her early interest in business and people management. While rooted in traditional Southern values—emphasizing community, sincerity,
    and a relaxed pace—she has also embraced broader cultural currents through art and contemporary ideas, fostering a progressive outlook that balances respect for local customs with a desire for innovation.
    This blend of deep‑Southern heritage and openness to new experiences informs both her personal identity and her professional approach to human resources.
