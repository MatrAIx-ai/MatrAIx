  career_goals: Thurmond often says he wants to become a firefighter because he admires the clear structure, teamwork, and the chance to help his community. He also dreams of being a teacher one day, hoping
    to use his organized approach to help classmates learn. Occasionally, he mentions building his own video games, imagining a future as a software developer where he can create structured, fun experiences
    for other kids. His goals reflect his desire for predictable, purposeful work and his caring nature toward others.
