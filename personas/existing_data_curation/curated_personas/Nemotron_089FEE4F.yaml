  career_goals: Although retired, Joseph aims to leave a lasting legacy in the Harpers Ferry community. He plans to write and self‑publish a book chronicling the town’s artistic heritage, secure funding
    for a small local art center, and mentor younger volunteers in museum practices. He also hopes to curate a rotating exhibit that showcases overlooked regional artists, and to be recognized as a steward
    of the area’s cultural memory.
