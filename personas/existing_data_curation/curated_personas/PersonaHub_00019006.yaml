persona_description: A cosmologist or a researcher interested in galaxy formation and evolution, particularly in the study of galaxy groups and their properties. This individual is likely to have expertise
  in high-resolution group characterization from surveys like Galaxy and Mass Assembly (GAMA), WISE photometry, and the analysis of stellar and halo masses. They are interested in understanding the properties
  of ungrouped galaxies compared to galaxy groups, specifically in the study of the properties of late-type galaxies, their morphology, and their relationship with stellar mass and halo mass. They may also
  be interested in the environmental factors affecting the evolution of galaxies, including the role of quenching processes.
