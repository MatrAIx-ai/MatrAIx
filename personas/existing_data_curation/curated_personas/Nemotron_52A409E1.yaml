personas:
  professional: Francisco Otero, a 2‑year‑old who thrives on routine and loves lining up their toy trucks before a storytelling session, displays an early knack for organization and a love for group activities
    that hints at a future community‑focused profession; they already practice assertiveness by negotiating playtime and show a tender side by comforting peers when upset.
  sports: Francisco Otero, a lively 2‑year‑old who idolizes the Denver Broncos and dreams of cheering at Mile High Stadium, participates in toddler soccer sessions with the Denver Youth Soccer Club and
    enjoys splash‑pad play at City Park, though their attention drifts quickly and they prefer the free‑form energy of a game of tag, and they also love the thrill of scoring a goal in a friendly match.
  arts: Francisco Otero, an enthusiastic toddler who lights up when the family plays the soundtrack of Pixar’s Coco and sings along to Luis Miguel’s ballads, loves mimicking folkloric dance steps from their
    weekend class, and spends afternoons drawing bright marigold petals inspired by the murals of local street artist José Mendoza, though they often leave crayons scattered across the floor.
  travel: Francisco Otero, who has already taken short road trips to Breckenridge’s snowy slopes and to Santa Fe for its vibrant market festival, prefers destinations with quick car rides and frequent stops
    for snacks, and they cherish the sensory excitement of new scents and textures, while dreaming of visiting the beaches of Cancún for the chance to dig in sand.
  culinary: Francisco Otero, who delights in the sweet flavor of cheese‑filled tamales and the creamy texture of guacamole, can wield a plastic fork to scoop churros dusted with cinnamon sugar, yet often
    splatters sauce on the floor in their enthusiastic attempts to feed themselves, and they love watching their parents simmer pozole with hominy, pork, and chilies.
  core: Francisco Otero is a vibrant 2‑year‑old who balances a love for structured play with spontaneous bursts of energy, thrives in communal celebrations, and while they occasionally misplace toys, they
    navigate a worry‑prone temperament with gentle resilience.
background:
  cultural: Francisco is raised in a Mexican‑American household where both Spanish and English are spoken daily. His family celebrates traditional holidays such as Día de los Muertos and Las Posadas, incorporating
    foods like tamales and piñatas into festive gatherings. They participate in local community events in Denver's vibrant Latino community, attending cultural festivals at the Colorado Convention Center
    and taking dance classes that teach folkloric steps. This bicultural environment nurtures his love for music, storytelling, and group celebrations, while also giving him a sense of belonging to both
    his Mexican heritage and his Colorado surroundings.
attributes:
  skills: '["walking and running","basic coordination for throwing and catching","bilingual vocabulary (Spanish and English)","following short two‑step routines","color and shape matching puzzles","social
    turn‑taking play"]'
  hobbies: '["dancing to Latin music","singing nursery rhymes","building block towers","playing at playgrounds","exploring sensory bins (rice, beans, water)","listening to picture books with Mexican folklore"]'
  career_goals: Even at two, Francisco expresses vivid dreams about future roles that involve helping and being around people. He often talks about becoming a firefighter because he loves big trucks and
    rescuing, or a soccer player like the Mexican athletes he sees on TV, reflecting his sociable and energetic personality. He also mentions wanting to be a teacher who can tell stories to other kids,
    showing his emerging desire to guide groups and be assertive in a caring way.
