    and fusion cuisine'', ''practicing yoga'', ''hiking'', ''volunteering for language tutoring and cultural workshops'']'
  career_goals: Maria aims to progress from her current representative role into a supervisory position within the customer‑experience department, eventually becoming a manager who shapes service strategy
    and training programs. She intends to complete her bachelor’s degree in communications or business administration, and to obtain a certification in user‑experience design to bridge her interest in art
    and customer insights. In the longer term, Maria envisions a hybrid role that combines customer advocacy with creative projects—such as leading community‑focused art outreach initiatives for local museums
    or cultural nonprofits—leveraging her curiosity for new ideas and her commitment to harmonious relationships.
