personas:
  professional: Maria Cinti, a 23‑year‑old bilingual customer‑experience representative in Milwaukee, leverages their natural curiosity and strong active‑listening skills with an eye for artistic design
    to solve client issues, consistently exceeds performance metrics, and strategically pursues a supervisory role and a UX design certification to eventually blend customer advocacy with community‑focused
    art outreach.
  sports: Maria Cinti energizes their weekends with hikes through Milwaukee County Park trails as a member of the local Milwaukee Trails Club, balances that with weekly yoga classes, cheers on the Milwaukee
    Brewers in baseball season and the Milwaukee Bucks in basketball, and occasionally joins a recreational softball league to stay active.
  arts: Maria Cinti immerses themselves in Milwaukee’s vibrant art scene, drawing inspiration from the bold colors of Frida Kahlo’s folk paintings and the abstract forms of Georgia O’Keeffe while regularly
    attending exhibitions at the Milwaukee Art Museum, listening to the eclectic sounds of Tame Impala and local indie band The Lively Ones, and sketching watercolor pieces that blend traditional Mexican
    motifs with contemporary design.
  travel: Maria Cinti prefers thoughtfully planned getaways that blend cultural immersion with nature, having explored nearby Chicago’s museum districts and the Great Lakes shoreline, dreaming of a solo
    trip to Oaxaca’s food markets and a weekend art‑focused itinerary in Barcelona, yet they often budget travel around their part‑time work schedule and student loan obligations.
  culinary: Maria Cinti enjoys cooking at an intermediate skill level, frequently preparing homemade tamales, rich mole sauces, and savory chilaquiles using locally sourced Wisconsin cheese, heirloom corn,
    and fresh poblano peppers, while also experimenting with Midwestern twists like adding cheddar‑infused pumpkin puree to mole, and they relish occasional visits to eclectic farm‑to‑table restaurants
    for inspiration.
  core: Maria Cinti is a curious, art‑driven problem‑solver who balances meticulous organization with spontaneous creativity, often juggling a busy customer‑service shift, a watercolor sketchbook, and a
    habit of binge‑listening to design podcasts late into the night, and they thrive on turning feedback into fresh ideas.
background:
  cultural: Maria was raised in a bilingual Mexican‑American household in Milwaukee, where Spanish was spoken at home and English in school. Her parents immigrated from the state of Jalisco, bringing traditions
    such as Día de los Muertos altar‑making, quinceañera celebrations, and a love for mariachi music. These cultural practices have instilled in her a deep appreciation for family, community, and artistic
    expression. Maria participates actively in the local Mexican community, attending events held by Casa Latina and volunteering at cultural festivals that showcase Mexican folk art, dance, and cuisine.
    This blend of Mexican heritage and Midwestern American life shapes her worldview, fostering both pride in her roots and openness to diverse experiences.
