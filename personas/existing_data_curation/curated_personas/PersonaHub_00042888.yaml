persona_description: A computer-aided design (CAD) engineer who specializes in analyzing and optimizing vehicle driveline installations for torsional and inertial problems. They use a calculator to gather
  and analyze data from a vehicle's driveline components, including angles, slopes, and lengths, and determine if the setup poses a problem. They are able to quickly identify and correct problems by adjusting
  the angle of the axle and the driveshaft, and can revise the data and re-analyze the results until they achieve the desired torsional and inertial results.
