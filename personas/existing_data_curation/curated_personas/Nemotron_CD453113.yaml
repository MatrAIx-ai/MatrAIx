  career_goals: Omar aspires to become a civil engineer or an urban planner so he can design safe, sustainable infrastructure for his hometown of San Bernardino. He also dreams of leading youth mentorship
    programs that combine his love for community service and his skill in organizing events. His long‑term ambition is to earn a scholarship to a university where he can study engineering, while continuing
    to give back to his community by volunteering as a tutor and organizing cultural festivals.
