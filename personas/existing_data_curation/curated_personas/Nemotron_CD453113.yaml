personas:
  professional: Omar Aviles, a budding robotics hobbyist who applies their meticulous organization and love for team collaboration to design simple automated contraptions in their school's robotics club,
    often taking the lead in planning meetings and proudly showcasing their projects to classmates.
  sports: Omar Aviles, a passionate midfielder for the San Bernardino Youth Soccer Club who drills at least three times a week, follows LAFC closely, and balances their training with occasional basketball
    games where they root for the Los Angeles Lakers, always ensuring their warm-up routine is methodical and their teammates feel included.
  arts: Omar Aviles, an avid fan of mariachi classics by Vicente Fernández and contemporary pop hits from J Balvin, spends weekends strumming their acoustic guitar, illustrating digital sketches inspired
    by the graphic novel ‘Young Avengers’, and eagerly attends local performances by the community theater's rendition of ‘Coco’, which deepens their love for storytelling.
  travel: Omar Aviles, who prefers well-planned road trips with their family, has explored Lake Arrowhead's pine-filled trails and the bustling streets of San Diego, dreams of spending a summer in a colorful
    city known for its vibrant markets and street festivals, and always maps out itineraries that include a stop at a local taco stand.
  culinary: Omar Aviles, a competent home-chef who loves chopping fresh cilantro, roasting chipotle-marinated pork for tacos al pastor, whisking up tangy salsa verde with tomatillos, and mastering the art
    of fluffy churros topped with cinnamon sugar on their family weekends, often improvises with extra lime for an extra zing.
  core: Omar Aviles, a 13-year-old organized, talkative soccer-player-engineer in the making, blends their love for family-centered traditions with a relentless drive to build, save, and stay on top of
    their game, even if it means sneaking extra video-game time after completing their chores.
background:
  cultural: Omar is a second‑generation Mexican‑American who grew up in a tight‑knit Latino neighborhood of San Bernardino. At home he speaks Spanish with his parents and grandparents, preserving the language
    and traditions of his heritage. He celebrates Día de los Muertos, Mexican Independence Day, and family gatherings centered around food and music. The blend of Mexican cultural values—such as respect
    for family, community cooperation, and hard work—with his American school experience shapes his identity and informs his aspirations.
