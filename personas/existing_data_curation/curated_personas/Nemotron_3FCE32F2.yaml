  career_goals: Shi Mo dreams of becoming a veterinarian because she loves animals and wants to help them stay healthy. She also imagines designing simple tools that make animal care easier, reflecting
    her blend of curiosity and practicality. Occasionally she pictures herself as a teacher, sharing knowledge with other kids and encouraging them to explore the world. Her ambitions are flexible; she
    is open to any path that lets her combine caring for others with creating useful solutions.
