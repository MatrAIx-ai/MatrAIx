personas:
  professional: Shi Mo, an aspiring junior LEGO architect who blends a love for building functional animal habitats with early coding lessons from educational tablet games, channels curiosity and practicality
    into creating miniature farms that spark neighborhood playtime, while their relaxed approach to planning lets imagination run wild.
  sports: Shi Mo, an enthusiastic member of the local youth soccer team and a frequent rider of the Fresno River Park bike trail, cheers for the Fresno State Bulldogs during high school games on television,
    and balances active play with occasional indoor video-game breaks, preferring spontaneous fun over strict training schedules.
  arts: Shi Mo, a budding cartoon illustrator who sketches beloved characters from Disney and Studio Ghibli and adds inventive twists, spends weekends doodling scenes from mystery books, and admires artists
    like Hayao Miyazaki and Jim Henson, channeling their collaborative kindness into sharing drawings with friends.
  travel: Shi Mo, an intrepid explorer of nearby nature trails who dreams of visiting Yosemite's giant sequoias and Disneyland's magical kingdom, plans trips with a blend of spontaneous curiosity and simple
    checklists they draft on sticky notes, often traveling with family on weekend getaways to nearby state parks.
  culinary: Shi Mo, a junior baker who loves measuring chocolate chips, butter, and flour to perfect chocolate chip cookies with their mother, experiments with adding crushed graham crackers for extra crunch,
    and enjoys devouring their creations with a glass of cold milk while occasionally forgetting to clean up the kitchen mess.
  core: Shi Mo, a curious and practical eight-year-old who transforms LEGO bricks, cartoon sketches, and cookie dough into playful projects, balances relaxed planning with a love for harmony, and navigates
    childhood with steady emotional composure.
background:
  cultural: Shi Mo is a first‑generation East Asian (Chinese‑American) raised in Fresno, California. Her household maintains several cultural traditions, such as celebrating Lunar New Year with family gatherings,
    making homemade dumplings, and speaking Mandarin at home. She also practices calligraphy during weekend art sessions, which nurtures her appreciation for visual detail. While deeply rooted in her heritage,
    she is fully integrated into the diverse community of Fresno County, attending a multicultural elementary school and participating in local events like the Fresno County Fair and community garden projects.
    This blend of Chinese cultural values—respect for elders, harmony, and collective well‑being—and American experiences shapes her outlook, fostering both curiosity about the world and a practical, cooperative
    spirit.
