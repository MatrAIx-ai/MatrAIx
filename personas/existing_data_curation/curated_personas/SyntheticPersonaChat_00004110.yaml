    User 1: Oh, that sounds really nice.

    User 2: Thanks! I try to make things that are unique and special.

    User 1: I''m sure they are. I would love to see them sometime.

    User 2: You''re welcome to come to one of my fairs! I''m usually at the one in my town every weekend.

    User 1: I might just do that!

    User 2: Great! I hope to see you there.

    User 1: Me too!

    User 1: So, what do you like to do for fun?

    User 2: I like to go to the movies, read books, and spend time with my friends and family.

    User 1: Oh, that sounds nice. I like to do those things too.

    User 2: We should get together sometime and do something fun!

    User 1: That would be great! I''m free on Saturday.

    User 2: I''m free too! We could go to the movies.

    User 1: Sounds good! I''ll pick you up at 7.

    User 2: Great! See you then!

    User 1: Bye!'
