personas:
  professional: Juan Maldonado, a budding robotics enthusiast at age eleven, channels his love of structure into building intricate LEGO Technic models and programming simple block‑based robots, applying
    his meticulous planning, reliable execution, and assertive teamwork to every project.
  sports: Juan Maldonado, a keen collector of baseball cards, plays on his neighborhood Little League team, the Thunderbolts, avidly follows the Los Angeles Dodgers, and spends weekend afternoons watching
    small‑scale backyard baseball games with his cousins, where he eagerly debates player stats.
  arts: Juan Maldonado, who spends quiet afternoons mastering piano pieces such as Beethoven’s “Für Elise” and playing along to the soundtracks of his favorite graphic novels like “Amulet”, also enjoys
    reading graphic series such as “Ms. Marvel” and “Tintin”, and channels his creative side into designing custom LEGO Technic builds inspired by the intricate art of H.R. Giger.
  travel: Juan Maldonado, who prefers itineraries laid out in printable checklists, enjoys family trips that blend educational stops—like a day at the Smithsonian National Air and Space Museum and a guided
    hike in the Grand Canyon—with opportunities to try local foods, and dreams of visiting the ancient ruins of Machu Picchu to see how ancient engineering compares to his LEGO constructions.
  culinary: Juan Maldonado, who proudly assists his family in preparing traditional tacos with seasoned chicken and hand‑made tamales stuffed with pork, follows each recipe step‑by‑step as if assembling
    a LEGO set, and delights in perfecting the balance of spices in homemade salsa verde, while also experimenting with baking simple chocolate chip cookies on weekends.
  core: Juan Maldonado is an eleven‑year‑old detail‑obsessed builder who balances his love of structured LEGO and robotics projects with a quiet, worry‑prone demeanor that drives meticulous planning in
    every hobby and daily routine.
background:
  cultural: Juan grows up in a Mexican‑American household in Saint Paul. Spanish is spoken at home, and his family celebrates traditions such as Día de los Muertos, Mexican Independence Day, and festive
    meals featuring tacos, tamales, and aguas frescas. He attends a bilingual after‑school program where he learns about Mexican history and folklore. The local Mexican community center hosts cultural workshops
    and soccer games, which he occasionally joins. His upbringing blends Mexican family values of closeness and respect with Minnesota’s emphasis on education and civic involvement, shaping his sense of
    identity and desire to give back to his community.
attributes:
  skills: '["Bilingual (Spanish/English)", "Organizational planning and time management", "Mathematics problem solving", "Basic Scratch coding", "LEGO and model building", "Attention to detail"]'
  hobbies: '["LEGO building", "Robotics club (Scratch/block coding)", "Science and tech reading", "Jigsaw puzzles", "Piano playing", "Cooking Mexican recipes", "Collecting baseball cards"]'
  career_goals: Juan dreams of becoming a civil engineer, designing safe, sustainable infrastructure for his community and emphasizing clear guidelines and stability. He also envisions a future in computer
    science, creating helpful apps that address everyday challenges. He prefers a career that offers clear steps, structured training, and predictable milestones, allowing him to apply his methodical nature.
    He hopes to earn a scholarship, attend university, and eventually work on projects that benefit the Mexican‑American community in Minnesota while maintaining a stable, low‑stress work environment.
