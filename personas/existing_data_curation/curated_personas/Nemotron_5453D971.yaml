  career_goals: Jamal aims to transition from frontline delivery work to a supervisory role within a logistics operation over the next two to three years. He plans to obtain a commercial driver’s license
    (CDL) so he can manage larger vehicles and expand his service area. To strengthen his qualifications, he intends to complete online courses in supply chain management and earn a certification in logistics.
    In the longer term, Jamal hopes to launch his own small courier business focused on serving the rural communities of McCormick County, providing reliable delivery services for local farms and small
    businesses. He is motivated by the desire to create a stable future for his family and to contribute positively to his community through dependable service and occasional volunteer logistics support
    during emergency events.
