persona_description: A pediatric occupational therapist who specializes in working with preschool children with physical disabilities, focusing on proper handling and positioning, communication skills,
  and modifying the environment to make it accessible, safe, and less restrictive. They are familiar with the latest advances in technology and are skilled in adapting the school environment to accommodate
  the needs of students with physical or health impairments. They have experience in providing transportation, physical therapy, occupational therapy, diagnostic services, school health services, counseling,
  and school social work services to students with disabilities. They are aware of the special problems that arise when working with preschool children with physical disabilities, such as proper handling
  and positioning, communication skills, and managing medical emergencies.
