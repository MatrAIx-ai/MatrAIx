personas:
  professional: Mihoko Arun, a 54-year-old community cultural consultant, blends a decade of volunteer event coordination, multilingual translation of oral histories, and meticulous budgeting to design
    heritage-focused workshops, while they comfortably tolerate last-minute schedule shifts thanks to a practical, structure-seeking yet flexible mindset.
  sports: Mihoko Arun follows the New York Mets and the New York Knicks, joins a community salsa dance group for weekly cardio, practices gentle yoga at a local studio, and occasionally plays casual soccer
    with the Queens Community League, preferring low-impact activities that fit their balanced social-alone routine.
  arts: Mihoko Arun immerses themselves in the works of Gabriel García Márquez, Rigoberta Menchú, and contemporary poet Gioconda Belli, attends performances by the Brooklyn Academy of Music, and channels
    their love for indigenous motifs into weekly weaving and embroidery sessions inspired by traditional patterns, while they occasionally indulge in salsa dancing classes as a moving canvas of rhythm.
  travel: Mihoko Arun enjoys purposeful travel that blends cultural immersion and personal research, having explored Oaxaca’s Day of the Dead celebrations, trekked the ruins of Tikal in Guatemala, and taken
    weekend getaways to the Hudson Valley, they favor loosely planned itineraries that leave room for spontaneous market visits and storytelling sessions with locals.
  culinary: Mihoko Arun is an adept home chef who masters mole poblano, hand-made tamales, and quinoa-based salads, regularly sources heirloom chilies from their community garden and markets, and relishes
    pairing dishes with traditional corn-based drinks, though they sometimes forget to defrost the pork for the mole, resulting in last-minute improvisations.
  core: Mihoko Arun, a 54-year-old cultural storyteller and community mentor, blends meticulous project coordination with a love for flexible cooking, spontaneous salsa dancing, and occasional forgetfulness,
    as they weave heritage into everyday life.
background:
  cultural: Mihoko Grace Arun is a first‑generation American whose family lineage intertwines Mexican and Guatemalan ancestry with roots in an Indigenous community—her paternal grandparents hail from a
    Maya‑Lacandon background, while her maternal side traces to a Nahua lineage in central Mexico. Growing up in a bilingual household in Queens, she was immersed in a vibrant mix of Spanish, English, and
    occasional Indigenous language use, shaping her identity as a bridge between cultures. She maintains strong ties to the local Latin American diaspora, participating in cultural associations, celebrating
    traditional holidays such as Día de los Muertos and the Quetzal Festival, and preserving family recipes and oral histories passed down through generations.
attributes:
  skills: '[''Literary analysis'', ''Cultural research'', ''Bilingual communication (English/Spanish)'', ''Indigenous language translation'', ''Community event planning'', ''Project coordination'', ''Budget
    management'', ''Educational material development'', ''Home maintenance'', ''Urban gardening'', ''Traditional cooking'', ''Conflict mediation'', ''Mentoring'']'
  hobbies: '[''Traditional cooking'', ''Community gardening'', ''Reading Latin American literature'', ''Salsa dancing'', ''Yoga'', ''Genealogy research'', ''Journaling'', ''Weaving'', ''Embroidery'']'
  career_goals: Mihoko aims to channel her expertise into preserving and sharing her mixed Latin American‑Indigenous heritage. She plans to author a memoir and a collection of short stories that weave personal
    narratives with traditional folklore, and hopes to collaborate with local museums to develop an exhibit highlighting indigenous contributions in New York's diaspora. She also seeks to formalize a community
    mentorship program for at‑risk youth in Queens, using arts and storytelling as empowerment tools. While she does not intend to reenter full‑time employment, she is open to consulting on cultural projects
    and leading workshops on heritage preservation on a part‑time or volunteer basis.
