persona_description: A healthcare professional who works in the emergency department and is concerned about the mental health of patients during the COVID-19 pandemic. They are aware of the challenges that
  patients with substance use disorders, mental health conditions, or other challenges face in accessing treatment and support. They understand the importance of collaboration and the need for longer-term
  care for vulnerable patients. They are aware of the increased prevalence of mental health issues and substance abuse during the pandemic and are prepared to provide appropriate medical attention while
  also addressing the underlying causes of the patient's mental health issue. They are committed to ensuring that patients receive the care they need and are equipped to handle the challenges of the pandemic.
