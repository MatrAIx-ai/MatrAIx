persona_description: A researcher from the Jaume I University who specializes in the study of work addiction, particularly the development and application of new scales to measure it. They are interested
  in understanding the negative effects of work addiction on individuals' health, happiness, and relationships, and are seeking to develop more effective interventions to help individuals overcome this
  addiction. They are also interested in the potential underlying causes of work addiction, such as financial and family pressures, fear of demanding bosses, and lack of personal affection, and are exploring
  ways to address these causes.
