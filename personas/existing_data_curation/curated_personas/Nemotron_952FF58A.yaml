personas:
  professional: Charlene Hanna, an aspiring set designer and visual storyteller, channels her curiosity and meticulous organization into crafting intricate miniature stage models for her school theater,
    where they balance creative freedom with reliable execution.
  sports: Charlene Hanna enjoys low‑intensity fitness through weekend nature hikes along the Ohio River Trail and after‑school swimming at the community pool, while cheering on the Cincinnati Reds during
    baseball season and the Cleveland Cavaliers in the NBA, and they prefer solo runs over competitive team sports.
  arts: Charlene Hanna immerses themselves in the arts, sketching watercolor landscapes of the Ohio River Valley, listening to indie folk artists such as Bon Iver and instrumental scores by John Williams,
    admiring contemporary watercolorist Yao Cheng, and contributing to the school art club while designing simple set pieces for community theater.
  travel: Charlene Hanna prefers thoughtfully planned weekend getaways to nearby natural retreats like Hocking Hills State Park and day trips to Louisville’s waterfront, but dreams of exploring the historic
    canals of Amsterdam and the misty cliffs of Scotland’s Isle of Skye, balancing a love for quiet nature photography with the budget constraints of a teenage allowance.
  culinary: Charlene Hanna enjoys simple, fresh meals such as garden salads with goat cheese and heirloom tomatoes, perfects a buttery grilled cheese sandwich on sourdough, experiments with raspberry compote
    as a topping, yet their cooking skill remains beginner level and they often rely on quick YouTube tutorials while snacking on trail mix during hikes.
  core: Charlene Hanna is a quietly ambitious teen who blends a love for watercolor and wildlife photography with disciplined savings habits, a penchant for solo hikes, and a habit of juggling school art
    projects while secretly hoarding extra pens for late‑night sketch sessions.
background:
  cultural: Charlene was raised in Little Hocking, a small river‑front community in Washington County, Ohio. Her family's white Midwestern heritage is rooted in values of modesty, self‑reliance, and community
    involvement. Local traditions such as the county fair, church gatherings, and volunteer clean‑up days along the Ohio River have shaped her sense of responsibility and appreciation for the surrounding
    natural landscape. While her upbringing emphasizes practical work ethic and close‑knit family ties, her parents encourage curiosity and artistic expression, allowing her to explore unconventional ideas
    within a supportive small‑town environment.
