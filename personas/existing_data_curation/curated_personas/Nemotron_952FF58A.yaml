  career_goals: Charlene aspires to attend a college program in visual arts or graphic design, aiming to become a concept artist or illustrator for children's books. She also hopes to combine her love of
    art with community service by eventually creating an after‑school art program for students in Little Hocking and neighboring rural areas. In the longer term she envisions working in a museum or cultural
    center where she can curate exhibitions that highlight local history and natural landscapes, while continuing to write and illustrate her own stories.
