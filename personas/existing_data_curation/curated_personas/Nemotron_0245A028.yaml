  hobbies: '[''Reading (self‑help & organizational guides)'', ''Puzzle solving (Sudoku, crosswords)'', ''Gardening (succulents and desert plants)'', ''Cooking and baking (structured recipes)'', ''Volunteer
    work at community shelter'', ''Yoga and meditation'', ''Hiking short trails'', ''DIY home décor projects'', ''Scrapbooking'']'
  career_goals: Milena aims to translate her informal expertise into a professional credential by earning a Certified Professional Organizer (CPO) certification and completing a GED. She envisions launching
    a home‑based consulting service that helps busy families streamline their lives, with a long‑term ambition to expand into workshops and online courses. Additionally, she hopes to take on a part‑time
    role in community outreach, leveraging her organizational talents to support local non‑profits while maintaining a balanced family life.
