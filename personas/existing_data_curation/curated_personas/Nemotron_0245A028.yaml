personas:
  professional: Milena Johnson is a budding certified professional organizer in training, leveraging their household management expertise, meticulous budgeting skills, and natural talent for conflict mediation
    to design streamlined systems for busy families while they also balance part‑time community outreach work.
  sports: Milena Johnson enjoys low‑intensity outdoor activity, trekking the trails of Red Rock Canyon with a local hike club, cheering on the Las Vegas Raiders on Sundays, and following the Vegas Golden
    Knights during the hockey season while they keep a casual membership at a community yoga studio.
  arts: Milena Johnson indulges in structured creativity, participating in a small book club that reads authors like Marie Kondo and David Allen, listening to the soothing folk melodies of Sufjan Stevens
    while scrapbooking, and attending occasional performances by the local symphony orchestra, which they appreciate for the balance of precision and emotion.
  travel: Milena Johnson plans trips with spreadsheet precision, favoring short, curated getaways such as a sunrise hike in Sedona, a culinary weekend in Tuscany to explore lavender‑infused dishes, and
    dreaming of a meticulously organized road trip along the Pacific Coast Highway for future family vacations that they hope to take in the next year.
  culinary: Milena Johnson is a disciplined home chef who follows exact recipes, favoring structured dishes like lemon‑rosemary chicken, almond‑flour crust quiche, and succulent‑infused salads, while meticulously
    measuring ingredients and occasionally experimenting with sous‑vide techniques, yet they sometimes over‑bake brownies when rushing.
  core: Milena Johnson is a spreadsheet‑savvy, solitude‑loving organizer who turns everyday chaos into tidy order, but they can’t resist a late‑night binge of true‑crime podcasts when the to‑do list is
    finally checked.
background:
  cultural: Milena's cultural background reflects mainstream middle‑class American values shaped by a childhood in Nevada's diverse desert environment. As a white American, she grew up with a strong emphasis
    on self‑reliance, hard work, and community service—principles reinforced by her family and local schools. Living in Las Vegas has exposed her to a multicultural tapestry, especially through Hispanic
    and Native American influences present in regional food, festivals, and community initiatives. These experiences have cultivated her appreciation for cultural diversity while reinforcing her cooperative
    and harmonious approach to interpersonal relationships.
attributes:
  skills: '[''Household budgeting'', ''Meal planning and nutrition'', ''Time management'', ''Home organization'', ''Event coordination for small gatherings'', ''Volunteer coordination'', ''Basic first aid'',
