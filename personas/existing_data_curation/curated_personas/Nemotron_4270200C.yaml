personas:
  professional: Susan Duet, a 51‑year‑old customer‑service specialist at a high‑volume call center, leverages her refined communication, conflict‑resolution, and art‑history knowledge to turn routine support
    calls into moments of empathy and creative problem‑solving, while mentoring new hires with an inclusive, compassion‑first mindset.
  sports: Susan Duet, a lifelong Minnesotan, roots for the Minnesota Vikings and the Timberwolves, participates in a local walking club that meets every Saturday at Lake Harriet, and practices yoga four
    times a week to maintain flexibility, preferring gentle cardio over high‑intensity sports.
  arts: Susan Duet channels her love for visual arts through watercolor painting inspired by seeing works by Yayoi Kusama and Mark Rothko at the Walker Art Center, while also savoring live performances
    by Sufjan Stevens and stage productions of Lin‑Manuel Miranda’s Hamilton at the nearby Guthrie Theatre.
  travel: Susan Duet favors culturally immersive trips, such as an annual pilgrimage to the Minnesota State Fair and a weekend getaway to the Duluth Folk Festival, while dreaming of a spring visit to Kyoto’s
    temples and galleries and a summer art tour of Barcelona’s Picasso Museum.
  culinary: Susan Duet enjoys a modest kitchen repertoire, skillfully preparing garden‑fresh ratatouille, gravlax with dill and mustard seeds, and a favorite espresso macchiato, and delights in exploring
    new coffee shops where they sample pour‑over brews made with Ethiopian beans.
  core: Susan Duet blends a compassionate, art‑infused outlook with a habit of worrying over minute details, turning everyday challenges into opportunities for creative empathy while still occasionally
    over‑indulging in coffee shop chatter.
background:
  cultural: Susan grew up in a middle‑class white family in the Twin Cities, with roots tracing back to German and Scandinavian immigrants who settled in Minnesota. The region’s strong community ethos,
    love of the outdoors, and vibrant arts scene shaped her values of cooperation, fairness, and appreciation for creativity. Minneapolis’s cultural diversity and progressive spirit reinforced her open‑mindedness
    and curiosity about new ideas. Family gatherings often featured shared meals and storytelling, fostering her sociable nature and her belief in helping others. This Midwestern cultural background, combined
    with a lifelong exposure to the city’s museums, theaters, and festivals, informs her compassionate outlook and her desire to blend service work with artistic engagement.
