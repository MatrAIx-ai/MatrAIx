  hobbies: '[''Visiting art museums'', ''Watercolor painting'', ''Reading contemporary fiction'', ''Book club'', ''Community theater attendance'', ''Volunteering at senior centers'', ''Gardening'', ''Yoga
    and mindfulness'', ''Exploring coffee shops'', ''Traveling to cultural festivals'']'
  career_goals: Susan aims to move into a supervisory or team‑lead role within the call center, where she can shape a culture of empathy‑driven service and mentor colleagues. She also envisions a transition
    to a position that blends her customer‑service expertise with her passion for the arts, such as a community outreach manager for a local museum or arts nonprofit. To support this, she plans to pursue
    a certificate in nonprofit management or arts administration. Long‑term, Susan hopes to design and lead training programs that integrate art appreciation into customer experience curricula, and eventually
    become a respected voice in fostering inclusive, compassionate service environments.
