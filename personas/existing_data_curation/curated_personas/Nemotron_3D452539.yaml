personas:
  professional: Colin Blas, an emerging infant learner in the realm of early sensorimotor development, they channel their methodical routine-loving nature into systematically exploring toys, building tidy
    block towers, and eagerly sharing newfound discoveries with visiting relatives at the community park.
  sports: Colin Blas, a budding fan of the New York Yankees and the New Jersey Devils, they delight in family outings to the ballpark and arena while participating in a neighborhood 'Little Movers' toddler
    gymnastics class that nurtures their energetic, group‑play preference.
  arts: Colin Blas, whose daily soundtrack features Raffi's 'Baby Beluga' and classic Disney melodies, they eagerly sing along and light up during Sesame Street episodes starring Big Bird, reflecting an
    early love for melodic storytelling and vibrant visual art.
  travel: Colin Blas, who has already explored the nearby Ocean City boardwalk and the festive Macy's Thanksgiving Day Parade in Manhattan, they look forward to a stroller‑friendly summer trip to Disney
    World in Orlando, balancing nap times with sensory‑rich experiences.
  culinary: Colin Blas, who eagerly devours buttery sweet potato puree, smooth applesauce spiced with a pinch of cinnamon, and soft peas topped with a dab of organic cheese, they relish family meals like
    the seasonal roasted turkey with cranberry sauce during Thanksgiving, showing a palate drawn to comforting, mild flavors.
  core: Colin Blas, the punctual 1‑year‑old who insists on a nightly plush bunny ritual before bedtime, they radiate cheerful social energy, organize toys by color, and occasionally throw a fit when routine
    is disrupted.
background:
  cultural: Colin is being raised in a White American family in North Arlington, New Jersey, a suburban community with a blend of middle‑class values and diverse neighboring cultures. His family observes
    traditional American holidays such as Thanksgiving, Christmas, and the Fourth of July, and they emphasize punctuality, friendliness, and active participation in local community events like neighborhood
    clean‑ups and park gatherings. These cultural influences shape his appreciation for routine, social harmony, and collective activities.
