personas:
  professional: Matthew Durkin, a budding junior architect, transforms their love for LEGO city-building into elaborate play structures, employing a methodical, organized mindset and vivid imagination to
    design each brick as part of a larger narrative skyline.
  sports: Matthew Durkin excels at energetic games of tag during recess, participates in an under‑8 soccer league on Saturdays, and cheers for the New York Yankees, combining structured practice with spontaneous
    playground races.
  arts: Matthew Durkin channels their boundless imagination into sketching superheroes and dinosaurs, devours adventure picture books, and listens to John Williams’ film scores, letting the music fuel vivid
    illustrations and storytelling.
  travel: Matthew Durkin delights in family trips to Disney World and Universal Studios, where they explore magical rides and dinosaur attractions, and they daydream about a future excursion to the Jurassic
    Coast in England to hunt real fossils.
  culinary: Matthew Durkin favors pepperoni pizza with extra cheese, loves crunchy carrot sticks dipped in hummus, and often mixes fruit salads with strawberries, blueberries, and mango, eagerly helping
    stir batter for homemade cookies.
  core: Matthew Durkin is an imaginative, organized six‑year‑old who builds LEGO metropolises, sketches daring heroes, saves pocket money for new kits, and balances boundless energy with a calm, kind spirit.
background:
  cultural: Matthew lives in Orlando, a vibrant, multicultural city in Central Florida. His family celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth of July with community
    gatherings, fireworks, and festive meals. Growing up near major theme parks, he is exposed to a blend of entertainment cultures, Disney storytelling, and a lively tourist atmosphere that fuels his love
    for fantasy and group fun. His household reflects a middle‑class suburban upbringing focused on education, outdoor play, and community involvement, while also incorporating occasional visits to local
    cultural festivals and multicultural events that broaden his perspective.
