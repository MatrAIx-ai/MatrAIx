persona_description: A Central Coast First Nations representative who is knowledgeable about the marine spatial planning process and the marine zone types selected for sustainable resource use in their
  territories. This individual is actively involved in the technical review and cost benefit analysis of the Central Coast marine spatial plan and seeks stakeholder support and understanding. They are passionate
  about ensuring the protection of sensitive habitats and the well-being of coastal communities, while promoting sustainable management of marine resources. They have a deep understanding of traditional
  First Nations' family and clan relationships and their connections to place, and are committed to implementing ecosystem-based management and decision-making through marine spatial planning.
