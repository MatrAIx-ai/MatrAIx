  hobbies: '[''Watercolor Painting'', ''Digital Illustration (Procreate)'', ''Reading Speculative Fiction'', ''Book Club Participation'', ''Hiking (Santa Rosa Plateau)'', ''Yoga'', ''Creative Baking'',
    ''Volunteer Storytime at Menifee Library'', ''Virtual Art Exchange with Teachers'']'
  career_goals: Marissa aspires to become a curriculum specialist for her district, designing district‑wide STEAM initiatives that embed art and imagination into core subjects. She plans to pursue a Master's
    in Educational Leadership within the next two years, aiming for a future role as an Instructional Coach or Assistant Principal where she can champion inclusive, creativity‑focused teaching. Additionally,
    she hopes to author a series of multicultural picture books that blend whimsical storytelling with social‑emotional themes, and to launch a community after‑school program that offers creative writing
    and visual arts workshops.
