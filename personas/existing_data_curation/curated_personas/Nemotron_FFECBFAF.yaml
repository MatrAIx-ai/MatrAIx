personas:
  professional: Tracy Smith, a retired community volunteer and former homemaker, leverages her practical, structured mindset and strong budgeting, gardening, and caregiving skills to coordinate church outreach
    programs, yet her relaxed attitude toward strict deadlines sometimes leads to last‑minute scrambling that fuels her anxiety.
  sports: Tracy Smith enjoys leisurely walks along the Vermilion River with the local Vermilion River Walking Club, attends occasional New Orleans Saints games with her church group, and participates in
    a low‑impact senior yoga class, favoring gentle activity over competitive sports.
  arts: Tracy Smith sings in her church choir, reveling in gospel hymns by Mahalia Jackson and blues classics by B.B. King, while her evenings are filled with listening to Creole accordion music and reading
    historical fiction by authors such as Barbara Kingsolver and memoirs of the American South.
  travel: Tracy Smith prefers road trips to nearby cultural festivals like Juneteenth in Baton Rouge and Mardi Gras in New Orleans, cherishes day trips to the historic town of Natchez, and dreams of a relaxed
    getaway to Savannah, Georgia, where she can explore antebellum gardens.
  culinary: Tracy Smith expertly prepares Southern comfort foods and Creole staples, such as shrimp gumbo, jambalaya, collard greens with smoked turkey, and sweet potato pie, delighting in the aroma of
    a well‑made roux, the heat of cayenne pepper, and the crisp bite of fresh okra from her garden.
  core: Tracy Smith is a warm, detail‑oriented retiree who balances a love of structure with a relaxed, sometimes forgetful nature, channeling emotional highs into choir singing, garden stewardship, and
    cooking, while occasionally wrestling with anxiety over health and finances.
background:
  cultural: Tracy is a lifelong resident of Lafayette, Louisiana, where African‑American, Creole, and Cajun cultures intersect. She grew up in a close‑knit Black community, attending a historically Black
    church that shaped her values of hospitality, mutual aid, and storytelling. Her family’s culinary heritage blends Southern soul food with Creole spices, and she has kept oral histories of the civil‑rights
    era and the Great Migration of relatives from rural Mississippi to Louisiana. The local Francophone influence introduced her to Creole language phrases and music, enriching her appreciation for regional
    traditions. Today, she actively participates in community events such as Juneteenth celebrations and church festivals, preserving the cultural tapestry that defines her identity.
