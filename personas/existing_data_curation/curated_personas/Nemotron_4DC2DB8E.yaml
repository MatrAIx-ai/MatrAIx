personas:
  professional: Santresia Reid, a 44‑year‑old senior accountant, merges deep GAAP knowledge and SAP proficiency with Power BI data visualizations to uncover fiscal insights, and leverages their methodical
    planning, competitive edge, and sociable leadership style to spearhead audit initiatives and mentor junior staff, all while maintaining a healthy dose of skepticism toward unchecked assumptions.
  sports: Santresia Reid stays active by leading a weekly Zumba class at a community center, joining a weekend salsa social at a downtown club, cheering on the Tampa Bay Buccaneers in the fall, the Lightning
    during hockey season, and the Rays in summer, and they treat personal fitness as a competitive goal, tracking steps with a smartwatch and aiming to beat their own mileage record in the local running
    group.
  arts: Santresia Reid feeds their love of the arts by attending weekly jazz nights featuring the smooth sounds of Diana Krall, catching soulful performances of Nina Simone tributes, visiting the Tampa
    Museum of Art to admire works by contemporary painters such as Kehinde Wiley, and supporting local theater productions like 'A Raisin in the Sun' that star notable talent such as Viola Davis on tour,
    all of which shape their evenings and inspire their own creative cooking presentations.
  travel: Santresia Reid plans their travels with a blend of meticulous budgeting and spontaneous adventure, favoring culturally rich destinations such as New Orleans for its jazz scene, the historic streets
    of Savannah, a culinary tour of Jamaica’s jerk cuisine, and a dream visit to Barcelona’s art districts, while their family commitments sometimes limit trips to long weekends but never dampen their enthusiasm
    for the next passport stamp.
  culinary: Santresia Reid, an adept home chef, infuses Southern comfort staples like shrimp‑and‑grits, collard greens, and sweet‑potato casserole with Caribbean spices such as allspice and scotch bonnet
    peppers, often hosting dinner parties where they showcase their modern twists on classics alongside craft cocktails featuring locally sourced bourbon, and they relish the occasional upscale dining outing
    at Tampa’s steakhouse to sample dry‑aged ribeye and truffle‑infused fries for inspiration.
  core: Santresia Reid balances a razor‑sharp competitive streak with warm community spirit, meticulously plans every project while occasionally hoarding flashy kitchen gadgets they don’t always use, and
    thrives on lively group gatherings that keep their curiosity and optimism humming.
background:
  cultural: As a Black woman raised in Tampa’s vibrant African‑American community, Santresia’s identity is shaped by Southern Black traditions, church involvement, and close‑knit family ties. She grew up
    attending community gatherings where food, music, and storytelling reinforced a strong sense of belonging. Her cultural heritage includes participation in the local NAACP chapter and the Tampa Bay Black
    Business Association, where she champions economic empowerment and mentorship. She also honors her family’s Caribbean roots—evident in her appreciation for island cuisine and rhythmic dance—blending
    these influences with the broader Southern Black experience to inform her worldview, work ethic, and community engagement.
attributes:
  skills: '["Financial Accounting", "Auditing", "Tax Compliance", "Financial Reporting", "Data Analytics", "Excel Advanced", "ERP Systems (SAP, QuickBooks, NetSuite)", "Internal Controls", "Risk Assessment",
    "Budgeting and Forecasting", "Regulatory Compliance", "Leadership and Team Management", "Process Improvement (Lean, Six Sigma)", "Public Speaking", "Business Process Reengineering"]'
  hobbies: '["Jazz and soul concerts", "Museum and theater visits", "Zumba and salsa dancing", "Cooking Southern comfort food", "Hosting dinner parties", "Reading historical biographies", "Reading contemporary
    fiction", "Following fintech trends", "Volunteering as financial literacy mentor"]'
  career_goals: She aims to progress to a senior finance leadership role within the next five years, targeting positions such as Finance Manager or Director of Audit, with a long‑term ambition of becoming
    a CFO for a mid‑size nonprofit or cultural organization that aligns with her humanities background. To achieve this, she plans to earn her CPA certification (or complete remaining requirements), gain
    deeper experience in forensic accounting and sustainability reporting, and expand her strategic leadership profile by leading cross‑functional projects and mentoring diverse teams. She also seeks a
    seat on professional boards such as the AICPA or local Black Business Chamber to influence industry best practices.
