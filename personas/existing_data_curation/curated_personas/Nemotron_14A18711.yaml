personas:
  professional: Jenny Dupalevich is a seasoned Nurse Practitioner who blends 15 years of advanced assessment expertise with a curiosity‑driven yet practical mindset, leading quality‑improvement projects,
    mentoring nursing students, and expanding telehealth services to bridge rural Colorado’s primary‑care gaps while maintaining the organized flexibility needed to run community health festivals.
  sports: Jenny Dupalevich conquers the Rocky Mountain trails with the Windsor Trail Runners club, dominates weekend mountain‑bike rides with the Front Range MTB Crew, powers through weekly yoga at Aurora
    Flow Studio, and fiercely roots for the Denver Broncos, Colorado Avalanche, and Colorado Rockies, channeling their competitive streak into both solo endurance challenges and lively trivia‑night sports
    debates.
  arts: Jenny Dupalevich curates lively dinner‑party playlists featuring The Lumineers, enjoys the Denver Symphony Orchestra’s seasonal performances, hosts board‑game nights that highlight strategy classics
    like Settlers of Catan, and occasionally tries hand‑pottery at the Windsor Community Art Center, marrying sociable creativity with a skeptical eye for overhyped trends.
  travel: Jenny Dupalevich prefers meticulously planned road‑trip itineraries that still allow spontaneous detours, having hiked Yellowstone’s geysers, kayaked the turquoise waters of Lake Powell, explored
    the historic streets of Santa Fe, and now daydreams about a summer trek across Patagonia’s Torres del Paine, balancing adventure with budget‑conscious choices.
  culinary: Jenny Dupalevich crafts farm‑to‑table meals like roasted beet and goat‑cheese salad, grilled trout with sage butter, quinoa‑stuffed acorn squash drizzled with local honey, and a weekly batch
    of tangy sauerkraut for community potlucks, showcasing a high skill level that sometimes spirals into perfectionist late‑night cooking marathons.
  core: Jenny Dupalevich merges a competitive, curiosity‑driven drive with a warm, community‑first spirit, juggling trail runs, board‑game victories, meticulous budgeting, and occasional sauce‑obsessed
    kitchen marathons that keep their schedule delightfully unpredictable.
background:
  cultural: Jenny grew up in a small Midwestern town in a family with German‑Polish ancestry, embodying classic White American values of hard work, self‑reliance, and community involvement. After moving
    to Colorado for college, she embraced the region's outdoors‑focused lifestyle and the blend of suburban and rural culture of Windsor and the Front Range. Her divorce experience reinforced her independence
    while deepening her commitment to creating supportive community networks. Jenny's practice reflects a culturally inclusive approach, honoring diverse patient backgrounds while integrating local traditions
    such as farmers‑market cooking and community health festivals.
attributes:
  skills: '[''Advanced patient assessment'', ''Primary care and preventive medicine'', ''Chronic disease management (diabetes, hypertension)'', ''Mental health screening and counseling'', ''Prescribing
