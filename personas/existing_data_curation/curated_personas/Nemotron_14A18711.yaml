    team collaboration'', ''Precepting and mentorship of nursing students'', ''Community health outreach and education'']'
  hobbies: '[''Hiking and trail running'', ''Mountain biking'', ''Yoga and group fitness classes'', ''Cooking healthy, seasonal meals'', ''Hosting dinner parties and potlucks'', ''Participating in a trivia
    team'', ''Reading medical and self‑improvement literature'', ''Volunteering at a community garden'', ''Animal shelter volunteer work'', ''Board game nights'', ''Rock climbing'']'
  career_goals: Jenny aims to transition into a leadership role within the next five years, targeting the position of Clinical Director at a community health clinic serving the Front Range. She plans to
    expand telehealth services to reach underserved rural patients and to develop a specialized women's health program that integrates preventive care with holistic wellness. Pursuing board certification
    in psychiatric‑mental health is a priority, as is contributing to research on patient‑centered care models. Jenny also hopes to mentor the next generation of Nurse Practitioners, publish articles in
    professional journals, and influence state health policy to improve access to primary care.
