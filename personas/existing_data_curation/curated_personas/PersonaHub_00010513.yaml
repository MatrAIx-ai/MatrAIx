persona_description: An academic historian who specializes in the intellectual history of the United States, particularly the period from the 19th to the 20th century. She is interested in the complex historical
  process through which American literature overcame its image of aesthetic and historical inferiority to become an important field for academic study and research. Her research focuses on four institutions
  of higher education serving distinct regional, class, race, and gender populations, and she argues that American literature's inferior image arose from its affiliation with non-elite schools, teachers,
  and students, and that it had to overcome this social identity in order to achieve status as serious knowledge. Her revisionary analysis is an important contribution to the intellectual history of the
  United States and will be of interest to anyone studying, teaching, or researching American literature.
