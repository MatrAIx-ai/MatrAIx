  hobbies: '[''Reading (fiction & nonfiction)'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Gardening (herbs & vegetables)'', ''Hiking (Connecticut coastal trails)'', ''Road trips'', ''Photography'',
