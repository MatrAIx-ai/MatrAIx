  career_goals: Millege aims to transition from front‑line sales to a senior leadership role, such as regional sales manager or director, where she can shape team culture around flexibility and well‑being.
    She aspires to become a recognized trainer and mentor, developing curricula that blend cutting‑edge sales technology (e.g., AI‑driven lead scoring) with empathy‑focused client engagement. To support
    this, she plans to earn a sales leadership certification and potentially pursue a Master’s in Organizational Psychology to deepen her understanding of team dynamics and her own emotional reactivity.
    Ultimately, she wants to champion a workplace environment that balances high performance with mental‑health awareness.
