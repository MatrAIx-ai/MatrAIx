  hobbies: '["Fishing", "Nature photography", "Birdwatching", "Woodworking", "Model building", "Reading architectural history", "Volunteer construction (Habitat for Humanity)", "Ice fishing", "Snowshoeing",
    "Attending local music festivals", "Gardening", "Playing harmonica"]'
  career_goals: Although approaching traditional retirement age, Trevor aims to leave a lasting imprint on his community. He plans to design and oversee the construction of a low‑impact, energy‑neutral
    community center on the shores of Long Lake that serves both residents and visitors. He hopes to achieve LEED Platinum certification for this flagship project and use it as a teaching platform for sustainability.
    Trevor also intends to transition into a part‑time adjunct role at a regional technical college, sharing his practical experience with students. Additionally, he aspires to author a memoir that blends
    personal anecdotes with lessons on mid‑century modern architecture, and to serve on the Forest County Planning and Zoning Board to influence responsible development.
