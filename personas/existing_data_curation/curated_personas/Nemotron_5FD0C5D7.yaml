personas:
  professional: Trevor Reese, a veteran architect with over forty years of experience, they blend their curiosity for innovative design with a practical, LEED‑AP‑driven approach, leveraging advanced BIM
    tools and their hands‑on woodworking skill to mentor junior staff while steering community projects toward sustainable, low‑impact outcomes.
  sports: Trevor Reese, an avid outdoorsman, they join the local senior snowshoe club, compete in seasonal ice‑fishing tournaments on Long Lake, and loyally root for the Green Bay Packers in football and
    the Milwaukee Brewers in baseball, while also serving as a volunteer coach for the county’s youth archery program.
  arts: Trevor Reese, a connoisseur of mid‑century modern design, they study the works of Frank Lloyd Wright and Eero Saarinen, capture the changing Wisconsin landscape in the spirit of Ansel Adams, and
    enjoy listening to Bob Dylan while attending the county’s summer folk music festival.
  travel: Trevor Reese, who prefers road trips that blend scenic drives with purposeful stops, they have explored the Upper Peninsula’s rugged coastlines, taken a week‑long photography tour of Iceland’s
    volcanic terrain, and dream of visiting the ancient forests of Japan’s Hokkaido while still budgeting their travel to fund the community center project.
  culinary: Trevor Reese, who delights in cooking fresh‑caught trout grilled on cedar planks with dill and lemon, they savor homemade apple‑cinnamon pie made with orchard‑picked fruit, and occasionally
    experiment with foraging wild mushrooms for a rustic risotto, balancing their love of hearty home‑cooked meals with occasional indulgences at the local craft‑brewery tasting room.
  core: Trevor Reese, a pragmatic yet curious architect‑craftsman, they fuse their love of nature, sustainable design, and hands‑on woodworking into a community‑first ethos, even as they battle occasional
    forgetfulness and a stubborn streak.
background:
  cultural: Trevor grew up in a small town in central Wisconsin to a family of German‑Polish descent. He was raised in a Lutheran tradition that emphasized community service, modesty, and a strong work
    ethic. The cultural fabric of the Upper Midwest—marked by self‑reliance, respect for the land, and a close‑knit neighborhood network—shaped his values. Living near the Northwoods, he developed a reverence
    for the natural environment and a sensitivity to Indigenous place‑names and histories in Forest County. These influences are reflected in his architectural approach, which balances modern design with
    preservation of local heritage.
attributes:
  skills: '["Architectural design", "Sustainable building methods", "Historic preservation", "Building Information Modeling (BIM)", "AutoCAD", "Revit", "Project management", "Cost estimation", "Structural
