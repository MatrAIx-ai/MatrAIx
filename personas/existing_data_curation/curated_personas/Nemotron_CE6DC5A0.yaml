personas:
  professional: Miriam Castrogutierrez, a 37‑year‑old investment analyst at a regional asset‑management firm, blends rigorous quantitative modeling (Excel, VBA, Python, SQL) with bilingual communication
    to translate data into actionable ESG recommendations, thriving on structured projects while energizing meetings with their talkative, collaborative style.
  sports: Miriam Castrogutierrez, a 37‑year‑old outdoor enthusiast, hikes the Sonoran Desert trails with the local Buckeye Trail Club, follows the Arizona Diamondbacks and Phoenix Suns, joins a weekend
    recreational soccer league with the Phoenix Rising FC community team, and balances rigorous cardio sessions with yoga to maintain flexibility.
  arts: Miriam Castrogutierrez cultivates artistic expression by collecting Frida Kahlo‑inspired folk art, attending live performances by Carlos Santana and Lila Downs, leading a Toastmasters chapter to
    hone public speaking, and immersing themselves in cinema classics like 'Como agua para chocolate', which shape their cultural identity and leisure time.
  travel: Miriam Castrogutierrez plans trips with a blend of meticulous itineraries and spontaneous side‑adventures, favoring weekend escapes to Sedona’s red rock canyons, annual pilgrimages to Oaxaca for
    Día de los Muertos celebrations, and a future goal of exploring the historic streets of Granada, Spain, while balancing family commitments and a modest travel budget.
  culinary: Miriam Castrogutierrez, an adept home cook, perfects dishes such as chicken mole poblano, grilled fish tacos with avocado‑lime salsa, and homemade tamales, experimenting with chilies, corn masa,
    and epazote, while occasionally indulging in upscale fusion restaurants for their specialty mezcal‑marinated duck.
  core: Miriam Castrogutierrez is a structured, sociable analyst who channels their love of community, salsa rhythm, and ESG investing into disciplined yet lively pursuits, often juggling meticulous spreadsheets
    with spontaneous family gatherings and the occasional late‑night mezcal toast.
background:
  cultural: Miriam is a first‑generation Mexican‑American whose family maintains strong ties to Mexico’s cultural traditions. She grew up celebrating Día de los Muertos, Semana Santa, and Mexican Independence
    Day, often blending these customs with her life in Arizona. Bilingual in Spanish and English, she values family cohesion, respect for elders, and community service—a reflection of her Mexican heritage.
    Living in Buckeye, a city with a vibrant Hispanic community, she engages with local cultural events, supports Mexican‑owned businesses, and incorporates these influences into her personal and professional
    identity, fostering a multicultural perspective in her analytical work.
attributes:
  skills: '[''Financial Modeling'', ''Quantitative Analysis'', ''Data Visualization (Power BI, Tableau)'', ''Python Programming'', ''SQL Querying'', ''Statistical Analysis'', ''Risk Assessment'', ''Investment
    Research'', ''Excel (Advanced + VBA)'', ''Bilingual Communication (English/Spanish)'', ''Stakeholder Presentation'', ''Negotiation'', ''Project Management'', ''Cross‑functional Collaboration'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Hosting family gatherings'', ''Toastmasters public speaking'', ''Hiking in the Sonoran Desert'', ''Salsa dancing'', ''Volunteering for financial literacy workshops'',
    ''Reading financial news and podcasts'', ''Traveling with family'', ''Collecting Mexican folk art'']'
  career_goals: Miriam aims to leverage her analytical strengths to advance into senior investment roles. In the next two years, she plans to earn the Chartered Financial Analyst (CFA) designation and transition
    to a portfolio manager position with a focus on ESG (environmental, social, governance) investing. She aspires to lead a cross‑functional analytics team, mentor junior analysts—especially women and
    Hispanic professionals—and eventually shape the firm’s overall investment strategy as a Chief Investment Officer. Long‑term, she envisions launching a boutique consultancy that helps small businesses
    in the Southwest access capital markets and integrate sustainable investment practices.
