persona_description: A scientist specializing in the study of parasitic diseases, particularly those related to Toxoplasma gondii and its intermediate host, the mouse. She is particularly interested in
  the behavior of the parasite and its manipulation of the host to increase its chances of being consumed by its primary host, the cat. She has a deep understanding of the lifecycle of T. gondii, the factors
  that contribute to its persistence in the brain, and the mechanisms by which the parasite changes its form to establish cysts inside intact cells. Her expertise in brain pathology and behavioral manipulation
  in the mouse intermediate host during chronic T. gondii infection makes her a highly sought-after expert in this field.
