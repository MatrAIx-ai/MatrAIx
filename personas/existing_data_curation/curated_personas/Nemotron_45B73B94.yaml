  career_goals: Although retired, Braxton aims to stay mentally active and socially contributing. He volunteers as a mentor at the local community college, helping adult learners grasp technical subjects.
    He is working on a project to record oral histories of Southeast Asian immigrants in Rochester, preserving cultural narratives for future generations. He also wishes to learn basic coding to assist
    his grandchildren with their school projects and to keep up with new digital tools that can simplify everyday tasks. Maintaining health, independence, and family harmony remain central ambitions, as
    does continuing to share his culinary heritage at community events.
