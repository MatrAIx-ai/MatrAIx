persona_description: A Peace Corps volunteer who specializes in urban planning and community development, particularly in rural and developing countries. The volunteer has experience working with local
  planners, administrators, and community leaders to address issues such as housing, potable water systems, sewage disposal, zoning, and land-use controls. The volunteer also has experience in conducting
  community assessments, analyzing resources, and providing alternate models if applicable. The volunteer is skilled in creating initiatives for local economic development, developing appropriate environmental
  planning regulations, conducting a community assessment to identify strengths and needs, conducting land-use planning and zoning studies, assisting in planning and implementing affordable services that
  ensure safe drinking water, sanitation systems, and solid waste management, and determining how to use available energy resources. The volunteer has a can-do attitude and is willing to work with their
  hosts to find appropriate solutions, and they have a variety of organizational, communication, and consensus-building skills. The volunteer must have a strong understanding of the cultural views and social
  and political context in which they operate and must be able to adapt to their new environment.
