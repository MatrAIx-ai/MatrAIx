persona_description: A teacher who specializes in teaching reading and writing to children in the age group of 5-10 years old. She has a passion for creating fun and engaging learning experiences for her
  students, using various methods such as word games, cut-and-stick exercises, and writing sentences under pictures. Her expertise lies in teaching children to read and write phonetically and to reinforce
  what they have learned in class 1. She also enjoys incorporating elements of the English language, such as rhyming words, consonant blends, magic e, silent letters, and other spelling joys, into her lessons
  to make them enjoyable for her students.
