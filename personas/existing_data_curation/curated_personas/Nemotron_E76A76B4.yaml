personas:
  professional: Terrel Mangus, a retired university professor of American history now volunteering as a curator at the Putnam County Historical Society, leverages their meticulous organization, competitive
    drive, and insatiable curiosity to spearhead archival preservation projects, author scholarly monographs, and mentor aspiring historians while consistently meeting grant deadlines.
  sports: Terrel Mangus enjoys morning walks with the Cookeville Senior Walking Club, follows the Tennessee Volunteers football team with fervor, watches Nashville Predators hockey games on television,
    and occasionall​y plays a friendly game of chess for mental fitness, while they avoid intense physical training due to knee osteoarthritis.
  arts: Terrel Mangus spends weekends at the Middle Tennessee State University art gallery admiring works by Monet and O’Keeffe, paints Tennessee mountain vistas in watercolor, attends community theater
    productions of Arthur Miller plays, and delights in folk‑music concerts featuring artists like Mike Seeger and Emmylou Harris, which together satisfy their love of visual and performing arts.
  travel: Terrel Mangus prefers meticulously planned road trips to historic sites, having revisited the Civil War battlefields of Gettysburg and the colonial streets of Williamsburg, while dreaming of a
    leisurely cruise along the Mississippi River and a future pilgrimage to the art museums of Florence, and they always budget travel expenses carefully due to fixed retirement income.
  culinary: Terrel Mangus cultivates heirloom tomatoes, sweet corn, and rosemary in a modest garden, then whips up Southern classics such as shrimp and grits, chicken pot pie with a flaky crust, and peach
    cobbler topped with vanilla ice cream, enjoying the tactile process of baking while occasionally over‑salting dishes due to a fondness for bold flavors, and they find great satisfaction in sharing meals
    with neighbors.
  core: Terrel Mangus merges meticulous historical scholarship with a love of watercolor painting, balancing a competitive streak and skeptical outlook with a habit of over‑watering their garden and an
    occasional reluctance to delegate projects.
background:
  cultural: Terrel was born and raised in a small Appalachian community in central Tennessee, descending from Scotch‑Irish farm families who settled the region in the early 19th century. His upbringing
    was steeped in Southern hospitality, church involvement, and a reverence for local traditions such as storytelling, folk music, and community gatherings. A formative scholarship allowed him to attend
    college in Nashville, where exposure to broader artistic and academic circles sparked his lifelong curiosity for art and new ideas. Though he retains a respectful appreciation for his rural roots—favoring
    home‑cooked Southern cuisine and seasonal festivals—his graduate education in the humanities cultivated a more progressive outlook, embracing diverse perspectives and unconventional thinking. This blend
    of traditional Southern values and scholarly openness shapes his identity in Cookeville, where he remains an active participant in both historical preservation efforts and contemporary cultural events.
