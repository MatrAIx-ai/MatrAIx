persona_description: A historian and cartographer, who is fascinated by the extraordinary stories behind maps and their role in shaping history, politics, and culture. Brotton is known for his exploration
  of the development of unique and surprising ways of mapping by different cultures, and his work on the use of maps to exert control over the world. He has a keen interest in the scientific methods of
  map-making during the Enlightenment and the challenges faced by cultures with alternative ways of mapping. His research has led him to study the impact of map-making on European expansion and the consequences
  of British boundaries drawn up in Iraq.
