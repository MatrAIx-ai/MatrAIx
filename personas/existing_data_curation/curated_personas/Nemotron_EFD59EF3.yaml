personas:
  professional: Jessica Owens, a 17‑year‑old aspiring Certified Nursing Assistant, blends solid digital literacy, first‑aid certification, and meticulous time‑management to juggle babysitting, community‑center
    volunteering, and TikTok content creation, all while following a clear, step‑by‑step roadmap toward a stable hospital career.
  sports: Jessica Owens fuels their love of the outdoors by hiking the Front Range trails with the local Front Range Hiking Association during spring and summer, follows the Denver Broncos, Colorado Rockies,
    and Colorado Avalanche for a dose of team spirit, and balances structured weekend workouts—including trail runs and yoga— with spontaneous snowshoeing trips in winter.
  arts: Jessica Owens expresses creativity through sketching in a weathered journal, curating short‑form TikTok videos set to indie pop tracks by Clairo, Tame Impala, and Maggie Rogers, and losing themselves
    in contemporary YA novels such as ‘They Both Die at the End’ and ‘The Hate U Give,’ while attending occasional community concerts that satisfy their social side.
  travel: Jessica Owens prefers carefully planned weekend getaways, often mapping routes to Rocky Mountain National Park, Yellowstone, or a weekend cabin in Colorado’s San Juan Mountains, but also dreams
    of a spring trip to Seattle’s indie music scene, balancing their travel enthusiasm with a tight budget that prioritizes GED prep and family responsibilities.
  culinary: Jessica Owens enjoys simple, nutrient‑dense meals like avocado toast with cherry tomatoes, quinoa‑based veggie bowls, and hearty chili made with ground turkey, often experimenting with fresh
    cilantro, lime, and a dash of smoked paprika while practicing basic cooking techniques learned from family recipes.
  core: Jessica Owens is a structured teen who channels their love for organization into caring for others, balancing meticulous planning with spontaneous hikes, while occasionally procrastinating on paperwork
    and indulging in indie pop binge‑listening.
background:
  cultural: 'Jessica comes from a White, primarily Anglo‑American family that has lived in the Englewood suburb of Denver for generations. Her upbringing reflects typical middle‑class Colorado values: a
    strong emphasis on self‑reliance, education, and community involvement. She participates in local volunteer events, enjoys the outdoors culture common to the Rocky Mountain region, and celebrates mainstream
    American holidays while also observing family traditions passed down from her German and English ancestry.'
attributes:
  skills: '[''Microsoft Office'', ''Google Suite'', ''Social Media Content Creation'', ''Time Management'', ''Basic Cooking'', ''Cash Handling'', ''First Aid'']'
  hobbies: '[''Hiking'', ''Camping'', ''Journaling'', ''Drawing'', ''Reading Young‑Adult Novels'', ''Strategy Video Gaming'', ''Listening to Indie Pop Music'']'
  career_goals: Jessica aims to complete her high‑school education by earning a GED within the next year, then enroll in a community‑college program for a Certified Nursing Assistant credential. She values
    a clear, step‑by‑step career path that offers stability and the chance to help others, aligning with her practical outlook. In the longer term, she hopes to work in a hospital setting, save enough to
    support her family, and possibly explore culinary school as a backup plan if her interests shift toward the food industry.
