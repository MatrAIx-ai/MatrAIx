personas:
  professional: Sharon Jimenez, a ten‑year‑old aspiring young scientist, applies methodical curiosity to their science club projects, and they blend practicality with imagination to design LEGO‑based experiments
    while reliably following through on group tasks and balancing collaborative work with quiet research time.
  sports: Sharon Jimenez, a midfielder for the Riverside Youth Soccer Club who faithfully attends after‑school practices and weekend games, models their training after the fast‑paced play of the U.S. Women’s
    National Team and idolizes forward Alex Morgan, and they also stay active during the winter by joining a community ice‑skating class.
  arts: Sharon Jimenez, who spends afternoons sketching wolves and comic heroes in a notebook inspired by Beatrix Potter’s gentle animal illustrations and Jim Lee’s dynamic panels, devours adventure series
    like the Harry Potter books, and they sing along to the pop melodies of Taylor Swift while baking cupcakes to share at school talent shows, weaving artistic expression into their daily routine.
  travel: Sharon Jimenez, whose family plans summer trips on a colorful spreadsheet, loves exploring national parks like Yosemite for hiking adventures while also dreaming of a future visit to Disney World
    in Orlando, and they balance excitement with the comfort of staying in familiar hotel rooms with their mother and younger brother.
  culinary: Sharon Jimenez, a budding baker who skillfully mixes butter, sugar, and chocolate chips to create chewy chocolate chip cookies and vibrant red‑velvet cupcakes topped with vanilla frosting, enjoys
    experimenting with fresh strawberries and mint in fruit salads, and they eagerly order cheese pizza with pepperoni at weekend family outings, showcasing a sweet‑tooth palate balanced by a growing confidence
    in the kitchen.
  core: Sharon Jimenez, a ten‑year‑old with a meticulous habit of color‑coding their LEGO boxes, a curiosity that fuels endless ‘why’ questions, and a tender heart that volunteers at the animal shelter,
    yet they sometimes forget to finish homework until the last minute.
background:
  cultural: Sharon is raised in a white, middle‑class family in Manassas, Virginia. The suburb blends a comfortable, family‑focused lifestyle with a rich historical backdrop, exposing her to local heritage
    celebrations and community events. She participates in typical American traditions—Thanksgiving, Fourth of July, Halloween—and enjoys regional activities such as visiting nearby historic sites, attending
    community farmer's markets, and taking part in neighborhood block parties that emphasize togetherness and mutual support.
