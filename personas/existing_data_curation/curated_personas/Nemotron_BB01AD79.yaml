  career_goals: Sharon dreams of becoming a pediatric nurse or a science educator, careers that let her combine her compassion for helping others, her fascination with how things work, and her organized,
    methodical approach to learning. In the near term she aims to volunteer at school health fairs, join a junior science mentorship program, and continue developing her leadership skills in class projects.
