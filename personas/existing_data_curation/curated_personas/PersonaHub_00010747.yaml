persona_description: A farmer who specializes in the management and cultivation of livestock, particularly cattle, and has experience in using invasive species such as prickly pear as a source of feed and
  as a tool for land management. He is skilled in the use of chemical treatments and mechanical methods to control the spread of prickly pear, and has developed a unique method of crushing the plant by
  cutting it at the roots and smushing it into green mush. He is known for his expertise in the use of technology, such as the Kactus Kicker and the delta formation, to improve his methods of control. He
  is also known for his close relationship with another farmer, Gary Johnson, who has patented a 500-pound steel plate called a Kactus Kicker.
