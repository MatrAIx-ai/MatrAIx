persona_description: A neurosurgeon who worked at Parkland Memorial Hospital in Dallas, Texas during the assassination of President John F. Kennedy. He was 30 years old at the time and was in his lab across
  the parking lot from the hospital when the news of the shooting reached him. Grossman and his boss, Dr. Kemp Clark, were in the main hospital building when they spotted the emergency room entrance and
  started running towards it. Grossman saw the president's significant head wound and was shocked by the severity of the injury. He was one of the surgeons who examined the wound and did CPR on the president
  after he was declared dead. Grossman has kept his involvement in the assassination a secret for 40 years and has not read the Warren Commission's report until recently.
