  hobbies: '["Reading chapter books", "Building LEGO sets", "Playing piano", "Journaling and planner organization", "Volunteering at local animal shelter", "Participating in Girl Scouts", "Nature walks
    and birdwatching", "Puzzle solving (jigsaw & logic puzzles)", "Swimming", "Crafting (knitting, friendship bracelets)"]'
  career_goals: Penny dreams of a future where she can combine her love of helping others with her knack for creating orderly environments. She hopes to become a pediatric nurse or a teacher, professions
    that let her support children’s health and learning. In the longer term, she envisions studying child development or nursing at college, participating in community health programs, and perhaps leading
    youth mentorship projects in her hometown.
