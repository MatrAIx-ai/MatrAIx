personas:
  professional: Penny Jones, a budding junior planner and avid problem‑solver, channels her love of mystery books and LEGO architecture into school science projects, using her methodical, organized approach
    to lead the Girl Scouts’ community‑service committee.
  sports: Penny Jones, a dedicated member of the community pool’s youth swim squad and a weekend hiker on the Illinois Prairie Path, cheers for the Chicago Cubs while recording her runs in a hand‑drawn
    fitness log, blending competitive spirit with a cooperative, team‑first attitude.
  arts: Penny Jones, an enthusiastic piano student who practices Chopin’s Nocturne Op. 9‑2 and sings along to Taylor Swift’s “Shake It Off,” also crafts intricate LEGO sculptures and decorates her journal
    with doodles inspired by the whimsical illustrations of Dr. Seuss.
  travel: Penny Jones, who loves day‑trips to Starved Rock State Park and the nearby Prairie Nature Preserve, plans future adventures to Washington, D.C., and dreams of seeing the Eiffel Tower, preferring
    structured itineraries that include scheduled wildlife spotting and ample snack breaks.
  culinary: Penny Jones, a budding home chef, favors cheesy macaroni, homemade chicken noodle soup, and banana‑strawberry smoothies, often chopping carrots for a veggie snack while humming her piano practice
    piece.
  core: Penny Jones, an eleven‑year‑old puzzle enthusiast with a knack for over‑organizing her desk and an unshakeable devotion to community service, can spend hours perfecting LEGO builds while occasionally
    piling unfinished homework atop her scrapbook.
background:
  cultural: Penny comes from a white Midwestern family rooted in Huntley, Illinois. Her upbringing reflects the region’s emphasis on community involvement, school participation, and modest family traditions.
    Holidays are celebrated with close family gatherings, and she often attends community events at the local library, church, and park. The values of practicality, cooperation, and respect for neighbors
    that characterize the Midwestern culture are evident in her daily life and outlook.
attributes:
  skills: '["Organizational planning", "Time management", "Academic reading comprehension", "Basic arithmetic", "Empathy and peer support", "Conflict mediation", "Basic first aid", "Digital research", "Event
