persona_description: A conservation biologist who specializes in the study of waterfowl species, specifically those that are most vulnerable to climate change in the central interior of British Columbia.
  They are interested in managing wetlands and conservation efforts to address the differential vulnerabilities of both wetlands and waterfowl species. They have conducted research on the specific impacts
  of climate change on waterfowl species and have developed strategies to address these vulnerabilities. They are also interested in the management of wetlands in the central interior of British Columbia
  to ensure that the impacts of climate change are mitigated and that the entire range of waterfowl species are protected.
