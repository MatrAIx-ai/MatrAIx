personas:
  professional: Maria Flores is a hands‑on engineering technologist in the Bay Area who leverages PLC programming, SolidWorks and AutoCAD design, and Lean Six Sigma analytics to drive sustainable manufacturing
    improvements, balancing a skeptical, competitive drive with a collaborative, bilingual communication style that values both data‑backed rigor and practical reliability as she targets a senior role and
    Six Sigma Black Belt within three years.
  sports: Maria Flores fuels her love for the outdoors by tackling weekly hikes in the Diablo Range with the Diablo Trail Hiking Club, follows the San Francisco Giants and Golden State Warriors avidly,
    and joins a co‑ed recreational soccer league with the Vacaville FC women's team during summer weekends.
  arts: Maria Flores channels her cultural rhythm through salsa dancing at local venues, immerses herself in the speculative worlds of authors like N. K. Jemisin and the cinematic visions of Guillermo del
    Toro, and curates playlists that blend classic Latin‑rock from Carlos Santana with contemporary bands such as Los Lobos for her dinner gatherings.
  travel: Maria Flores alternates weekend getaways to Napa Valley vineyards and annual hikes in Yosemite with long‑term travel dreams of exploring Oaxaca’s Day‑of‑the‑Dead celebrations and attending a technology
    expo in Tokyo, blending relaxation, cultural immersion, and professional curiosity.
  culinary: Maria Flores experiments in her kitchen with modern twists on classic Mexican fare—such as tacos al pastor finished with pineapple foam, mole poblano infused with espresso, and ceviche drizzled
    with mango‑lime vinaigrette—while favoring ingredients like chiles de árbol, epazote, and fresh masa, and she proudly serves these creations at intimate dinner parties for friends.
  core: Maria Flores is a competitive, curious engineering technologist who balances meticulous budgeting with occasional late‑night sci‑fi reading marathons, and whose skeptical eye fuels sustainable innovations
    and salsa‑filled social evenings.
background:
  cultural: Maria’s Mexican heritage is a core part of her identity. Raised in a bilingual household, she celebrates traditional holidays such as Día de los Muertos and Las Posadas, while also embracing
    American customs that reflect her upbringing in California. Family gatherings often center around cooking and storytelling, reinforcing values of community, hard work, and resilience. Her fluency in
    Spanish enables her to stay connected to the local Hispanic community in Vacaville, where she participates in cultural events and supports community outreach programs. This bicultural perspective informs
    her collaborative style—valuing both collective support and the independence needed to navigate professional challenges.
attributes:
  skills: '["CAD (SolidWorks, AutoCAD)", "PLC Programming", "Data Analysis (MATLAB, Python)", "Lean Six Sigma Process Improvement", "Project Coordination", "Bilingual Communication (English/Spanish)", "Technical
