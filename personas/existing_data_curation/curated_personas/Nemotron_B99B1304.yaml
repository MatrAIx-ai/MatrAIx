  hobbies: '["Hiking in the Diablo Range", "Salsa dancing", "Cooking Mexican fusion dishes", "Reading science fiction", "Volunteer STEM mentor for middle‑school students", "Gardening (herb garden)"]'
  career_goals: Maria aims to advance to a senior engineering technologist role within the next three years, positioning herself as a subject‑matter expert in sustainable manufacturing processes. She plans
    to earn Six Sigma Black Belt certification and a Project Management Professional (PMP) credential to lead larger cross‑functional improvement projects. Long‑term, she envisions taking on a managerial
    position where she can mentor Hispanic women entering technical fields, champion diversity initiatives, and possibly launch her own consulting firm focused on lean, green engineering solutions for mid‑size
    manufacturers in the Bay Area.
