  career_goals: Although retired from formal employment, Josefina aims to remain an active cultural leader in her community. She aspires to launch a series of cooking workshops at the local senior center
    to pass down traditional recipes to both seniors and younger families. She hopes to organize a yearly multicultural heritage fair that celebrates Mexican traditions alongside other Latino cultures in
    Rosemead. A personal ambition is to compile her family’s recipes and stories into a small community cookbook, with proceeds supporting scholarship funds for her grandchildren. Josefina also intends
    to serve as a liaison between Mexican immigrant seniors and local health providers, advocating for easier access to services and fostering intergenerational connections.
