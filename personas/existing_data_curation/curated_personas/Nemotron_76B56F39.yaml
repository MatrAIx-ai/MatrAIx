  career_goals: Approaching retirement, Susan aims to solidify her legacy as a dependable leader while gradually scaling back her day‑to‑day responsibilities. She plans to obtain a short certification in
    office management to formalize her existing expertise, then transition into a part‑time advisory role for a local nonprofit or small business, where she can mentor younger supervisors. Her primary ambition
    is to create a smooth, low‑stress work environment for the staff she leaves behind, ensuring they have clear, documented procedures that honor both structure and the flexibility she values. Ultimately,
    she hopes to enjoy a balanced life that still allows her to contribute meaningfully to her community without the pressure of tight deadlines.
