persona_description: A psychologist who specializes in understanding the unconscious mind and how it influences behavior. They are skilled in bringing unconscious conflicts to the surface and helping clients
  make choices that honor their authentic inner self. They are aware of the importance of bringing unconscious needs to the forefront of conversations and avoiding manipulative communication that feeds
  unconscious needs. They are also skilled in facilitating discussions that allow unconscious beliefs and neuroses to bubble to the surface and be discussed consciously.
