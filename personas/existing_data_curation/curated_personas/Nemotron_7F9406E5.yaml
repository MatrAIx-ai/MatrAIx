  hobbies: '[''Shell collecting'',''Tide‑pool exploration'',''Swimming'',''Soccer'',''School science club projects'',''LEGO building with marine themes'',''Reading adventure and nature books'',''Marine‑themed
    drawing and painting'',''Participating in local festivals'',''Church youth group activities'']'
  career_goals: Irene dreams of becoming a marine biologist who studies Gulf Coast ecosystems, especially sea turtles and coral health, so she can protect her local shoreline. She also imagines a future
    as a science teacher, sharing her curiosity about the natural world with younger students. In the meantime, she hopes to lead community beach‑clean‑up events and environmental clubs at school, developing
    leadership experience and a reputation as a proactive community advocate.
