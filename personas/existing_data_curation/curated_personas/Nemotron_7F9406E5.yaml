personas:
  professional: An aspiring marine scientist named Irene Smith channels their curiosity and practicality into leading the school’s tide‑pool exploration project, where they blend organized data‑collection
    methods with creative Lego models of marine ecosystems.
  sports: An energetic team player named Irene Smith shines as a forward on the local youth soccer league, they idolize the New Orleans Saints for their teamwork, and they spend weekends playing beach volleyball
    with friends, treating every sand‑filled game as a chance to hone coordination and endurance.
  arts: A creative enthusiast named Irene Smith fills sketchbooks with detailed drawings of starfish and crabs, collects ocean‑inspired LEGO sets, and eagerly anticipates new episodes of the animated series
    Octonauts, finding inspiration in the vibrant colors of local seafood festivals and the rhythmic chants of church youth choir.
  travel: A curious explorer named Irene Smith loves planning day trips to the nearby shoreline, where they collect shells before dreaming of a future family cruise to the Bahamas, balancing the delight
    of spontaneous beach picnics with the careful budgeting of their allowance.
  culinary: A budding foodie named Irene Smith delights in the crunch of fried catfish and the zest of shrimp po’boys at family gatherings, enjoys helping their parent grind fresh Gulf‑seasoned spices,
    and often experiments with making simple sea‑salt caramel on the kitchen counter, though they sometimes forget to wash their hands after handling raw seafood.
  core: Irene Smith is a ten‑year‑old beach‑loving explorer who mixes scientific curiosity with playful LEGO building, balances a disciplined savings habit with occasional splurges, and tackles life’s waves
    with organized enthusiasm, community spirit, and a habit of forgetting to brush the sand off their shoes.
background:
  cultural: Irene was raised in a white, Southern Gulf‑Coast family in Biloxi, Mississippi. Her community emphasizes hospitality, close family ties, and a deep appreciation for the coastal environment.
    Family traditions include weekend trips to the beach, enjoying local seafood dishes like fried catfish and shrimp, attending church services and youth programs, and taking part in neighborhood events
    such as the Biloxi Mardi Gras parade and local seafood festivals. This cultural setting nurtures her love for marine life, community service, and collaborative activities.
