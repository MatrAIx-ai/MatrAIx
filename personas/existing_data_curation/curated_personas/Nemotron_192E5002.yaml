personas:
  professional: Jin Hsu is a full‑stack developer who leverages Python, JavaScript, React, and Django to create sleek, art‑inspired web experiences; they routinely lead Agile sprint ceremonies, channel
    a keen eye for UI/UX drawn from Brooklyn’s street‑art culture into intuitive product designs, and mentor junior teammates.
  sports: Jin Hsu is a regular participant in Brooklyn’s pick‑up basketball games at the local community center, follows the New York Knicks and Brooklyn Nets for NBA excitement, roots for the New York
    Giants in the fall, and maintains fitness through weekly yoga, occasional 5 K runs in Prospect Park, and a membership in the "Brooklyn B‑Ball League" club, yet they often forget to hydrate during intense
    scrimmages.
  arts: Jin Hsu immerses themselves in Brooklyn’s vibrant street‑art scene, documenting murals by artists like Futura, KAWS, and the Obey Giant, draws digital illustrations inspired by the kinetic style
    of artist James R. Eads, curates personal gallery visits featuring Kehinde Wiley and Ai Weiwei, and enjoys live shows by BADBADNOTGOOD and Flying Lotus, while occasionally staying up late to binge‑watch
    experimental theatre performances on streaming platforms.
  travel: Jin Hsu prefers weekend‑length, budget‑friendly trips that blend cultural immersion and artistic discovery, having explored the street‑art alleys of Berlin, the ramen stalls of Osaka, and the
    vibrant markets of Oaxaca, while dreaming of photographing the neon‑lit murals of Tokyo’s Shibuya and hiking Iceland’s basalt landscapes, though they often delay booking flights due to work‑related
    stress.
  culinary: Jin Hsu experiments with modern Asian‑fusion cuisine at home, frequently preparing dishes like miso‑glazed pork belly with kimchi slaw, yuzu‑infused ramen carbonara, and gochujang‑marinated
    quinoa bowls, proudly sourcing ingredients such as gochujang, miso paste, and black garlic from specialty markets, and hosts weekly dinner gatherings where they showcase their moderate‑to‑high cooking
    skill while occasionally over‑spicing a batch of sushi burritos.
  core: Jin Hsu blends a curiosity for tech and art into a career of building aesthetic web products, balances a playful yet anxiety‑prone personality through meditation, basketball, and experimental cooking,
    and habitually over‑commits to social events while carefully budgeting for future creative ventures.
background:
  cultural: Jin is a second‑generation Taiwanese American raised in a bilingual household that blended traditional East Asian values—respect for family, emphasis on education, and communal harmony—with
    the multicultural dynamism of Brooklyn. He grew up celebrating Lunar New Year and the Mid‑Autumn Festival, speaking Mandarin at home and maintaining connections to Taiwanese culinary traditions through
    weekend market trips and home‑cooked meals. While his heritage informs his sense of responsibility and gratitude, Jin actively embraces the cosmopolitan arts and tech landscape of New York City, integrating
    Eastern cultural sensibilities with Western innovation in both his professional work and personal pursuits.
