  career_goals: Jin aims to progress to a lead engineer or principal architect role within the next five to seven years, where he can steer cross‑functional teams to build innovative, art‑infused digital
    products such as interactive installations, AR experiences, or creative‑tech platforms. He aspires to mentor junior developers, foster collaborative cultures, and contribute to open‑source projects
    that bridge technology and creativity. Long‑term, Jin envisions launching his own startup focused on immersive creative technology solutions, while also deepening expertise in cloud architecture and
    artificial intelligence. Recognizing his sensitivity to stress, he prioritizes work‑life balance and seeks organizations that support mental health and flexible working arrangements.
