  hobbies: '[''Community gardening'', ''Traditional Mexican cooking'', ''Bridge and card games'', ''Latin dance for seniors'', ''Church choir singing'', ''Knitting'', ''Volunteering at food pantry'', ''Organizing
    donation drives'', ''Attending cultural festivals'']'
  career_goals: Although retired, Susana aims to deepen her impact on the local Mexican‑American senior community. She aspires to become the chairperson of the Clovis Senior Center's cultural events committee,
    where she can institutionalize regular celebrations of Mexican holidays and ensure they meet high standards of authenticity and organization. She also plans to launch a mentorship program that pairs
    experienced seniors with younger volunteers to teach cooking, budgeting, and community service skills. Additionally, she hopes to expand the community garden she manages, securing long-term funding
    and introducing an intergenerational horticulture project. Through these goals, she seeks to leave a lasting, orderly legacy that honors her heritage while fostering communal pride.
