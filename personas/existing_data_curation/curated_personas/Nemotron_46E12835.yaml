personas:
  professional: An organized senior volunteer coordinator, Susana Rios leverages their meticulous budgeting and bilingual communication skills to orchestrate monthly cultural celebrations at the local senior
    center, while their competitive edge from bridge games fuels a drive for flawless event execution.
  sports: A dedicated participant in senior fitness, Susana Rios attends a weekly Latin dance class, walks a 2‑mile route with the local seniors’ strolling club, and they fervently cheer for the Fresno
    State Bulldogs and the Golden State Warriors during seasonal broadcasts.
  arts: A passionate community arts enthusiast, Susana Rios sings in the church choir, enjoys the guitar work of Carlos Santana and the vocal stylings of Selena, and they regularly attend performances at
    the regional theater featuring classic plays and contemporary dance.
  travel: An adventurous planner with a fondness for structured itineraries, Susana Rios enjoys weekend trips to Sequoia National Park, schedules annual visits to the historic town of Granada, Spain, and
    they prefer group travel packages that accommodate senior mobility needs.
  culinary: A seasoned home chef, Susana Rios perfects traditional recipes such as tamales, pozole, and mole using fresh chilies, corn masa, and oregano, while also experimenting with modern twists like
    quinoa‑infused salsas and they host monthly cooking workshops for neighbors.
  core: Susana Rios is a disciplined, community‑focused senior whose love of routine is balanced by a competitive bridge streak, a sweet spot for homemade pastries, and they have a habit of double‑checking
    every budget line before signing off.
background:
  cultural: Susana is a first‑generation Mexican American who was born in a small town in Jalisco and moved to California with her family during her early childhood. Her upbringing was steeped in Mexican
    cultural customs, Catholic faith, and a strong sense of family and community responsibility. She celebrates Día de los Muertos, Las Posadas, and Mexican Independence Day with traditional foods, music,
    and rituals. Spanish remains her primary language at home, though she is fluent in English. Growing up in the Central Valley's agricultural milieu, she internalized values of hard work, practicality,
    and respect for tradition, which continue to shape her identity and community involvement in Clovis.
attributes:
  skills: '[''Event planning and coordination'', ''Budgeting and financial record-keeping'', ''Bilingual communication (Spanish/English)'', ''Traditional Mexican cooking'', ''Community gardening'', ''Senior
