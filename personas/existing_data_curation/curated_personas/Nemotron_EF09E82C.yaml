personas:
  professional: Jody Mcgrady is an energetic teenage aspiring event coordinator who leverages their natural charisma and knack for crafting eye‑catching social‑media clips to organize school dances and
    community fairs, while routinely juggling the tension between a love of structure and a spontaneous, sometimes forgetful, planning style.
  sports: Jody Mcgrady is a spirited pickup basketball player who joins weekend games at the local community center, cheers for the hometown Wildcats, and uses the sport as a social outlet while consciously
    avoiding over‑training to keep their worry levels in check.
  arts: Jody Mcgrady expresses creativity through pop‑and‑country dance routines on TikTok, crafting boho‑style jewelry inspired by artists like Taylor Swift and Luke Bryan, and indulging in teen novels
    from authors such as John Green, weaving these influences into their day‑in‑the‑life videos.
  travel: Jody Mcgrady loves weekend road trips to nearby fairs and beach towns, dreams of exploring New York City’s vibrant street art scene, and prefers planning trips with a mix of structured itineraries
    and spontaneous detours that satisfy both their need for predictability and their love of adventure.
  culinary: Jody Mcgrady enjoys whipping up easy family‑favorite dishes like brisket tacos, loaded nachos with homemade guacamole, and smoky barbecue ribs, showcasing their recipes in quick Instagram reels
    while not shying away from occasional late‑night pizza deliveries when cooking fatigue sets in.
  core: Jody Mcgrady is a socially magnetic teen who balances a flair for spontaneous event‑planning and TikTok fame with their lingering worry that fuels both meticulous budgeting and impulsive snack cravings.
background:
  cultural: Jody was raised in Groves, Texas, a close‑knit suburban community in Jefferson County. Her family follows traditional Southern values with a strong emphasis on hospitality, faith, and community
    involvement. Regular family gatherings center around holidays such as Thanksgiving, Christmas, and the Fourth of July, often featuring backyard barbecues, football watch parties, and church socials.
    She grew up listening to a mix of country classics and contemporary pop, and she enjoys local traditions like high‑school football games and county fairs. These cultural influences shape her friendly,
    outgoing nature and her appreciation for collective celebrations while also fostering a desire for stability and routine.
