  career_goals: Jody aims to earn her GED within the next year and then pursue a role in hospitality or event management where her people‑skills and love for organizing gatherings can thrive. She envisions
    working as a front‑desk assistant at a local hotel or as a junior coordinator for community festivals. Long‑term, she hopes to develop a personal brand on social media that shares teen‑focused lifestyle
    tips and coping strategies, eventually turning it into a freelance content‑creation business. She also desires to become a youth mentor, helping peers manage stress and navigate school life.
