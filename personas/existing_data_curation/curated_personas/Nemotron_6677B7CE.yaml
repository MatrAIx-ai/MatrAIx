  hobbies: '[''drama club (acting and stage production)'', ''student council'', ''volunteering at local animal shelter'', ''reading mystery novels'', ''coding simple games in Scratch'', ''baking with family'',
    ''organizing community clean‑up events'', ''playing soccer'']'
  career_goals: Frances envisions a future where she can combine her organizational talent, sociable personality, and deep compassion for helping others. She aspires to pursue a career in community health
    education or youth program leadership, ideally after studying psychology or education at the college level. She dreams of designing and running after‑school mentorship programs that empower peers, coordinating
    health‑awareness workshops for her hometown, and eventually influencing public‑policy initiatives that promote youth well‑being in the Midwest.
