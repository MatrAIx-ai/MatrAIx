personas:
  professional: Frances Alan, an ambitious drama club lead and student council organizer, fuses curiosity with disciplined planning to spearhead community events, acting as the charismatic liaison between
    classmates, teachers, and local nonprofits.
  sports: Frances Alan plays midfield for the Evansville North High School Cougars soccer team, volunteers as a water‑station captain during games, and passionately follows the Indiana Pacers in the NBA
    as well as the Purdue Boilermakers' basketball season.
  arts: Frances Alan, an enthusiastic drama club performer, idolizes Lin‑Manuel Miranda’s storytelling, devours Agatha Christie mystery novels, rehearses scenes from the musical "Hairspray," and frequently
    listens to Indiana indie folk group The Caves while baking cookies for after‑show celebrations.
  travel: Frances Alan enjoys weekend trips to Chicago’s Navy Pier and the limestone wonders of Mammoth Cave, dreams of backpacking through Dublin, Ireland, and balances these adventures with a tight family
    travel budget and school responsibilities.
  culinary: Frances Alan loves baking her family’s signature apple pie and double‑chocolate chip cookies, skillfully mixes fresh garden herbs into homemade chicken pot pie, and often experiments with tangy
    BBQ sauce on pork ribs for neighborhood pot‑luck gatherings.
  core: Frances Alan is a meticulous planner who never skips a Sunday bake‑sale, double‑checks every club schedule, and can debate mystery plot twists louder than any pep rally, yet occasionally overcommits
    and runs on caffeine.
background:
  cultural: 'Frances grew up in Evansville, Indiana, a Midwestern city known for its close‑knit community, modest values, and strong work ethic. Her family reflects typical Midwestern traditions: Sunday
    church attendance, participation in local county fairs, and a deep appreciation for home‑cooked meals and outdoor recreation. The region’s emphasis on community involvement and supportive neighborliness
    has shaped her compassionate outlook and her desire to contribute positively to her surroundings. While her ethnic background is white, she is exposed to the diverse cultural influences of a growing
    city—such as regional music, high school sports culture, and a mix of rural and urban perspectives—that inform her inclusive and collaborative approach.'
attributes:
  skills: '[''public speaking'', ''event planning'', ''peer mediation'', ''academic tutoring (math and science)'', ''digital literacy (basic coding in Scratch)'', ''project management (school club events)'',
