  career_goals: Even at three, Alexandra loves to imagine herself as a teacher or a doctor. She often says she wants to help other children learn new things and stay healthy when she grows up. She also
    dreams of drawing pictures that make people smile and of leading community storytime sessions. Combining her love for organizing toys with her caring nature, she aspires to become a preschool teacher
    or a pediatric nurse who can create safe, structured, and joyful environments for kids.
