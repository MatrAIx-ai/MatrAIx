personas:
  professional: Todd Fernandez is a retail sales associate with a knack for data‑driven merchandising, leveraging their expertise in Shopify, Excel analytics, and bilingual customer service to blend practical
    organization with creative experimentation while asserting leadership when needed.
  sports: Todd Fernandez is a regular participant in Boston Runners Club’s 5K events, a weekend kayaker on the Charles River, and an avid fan of the Boston Red Sox, Boston Celtics, and New England Patriots,
    balancing competitive spirit with low‑key outdoor recreation.
  arts: Todd Fernandez is an acoustic‑guitar enthusiast who spends evenings strumming folk tunes by artists like Fleet Foxes and John Denver, attends Boston Symphony Hall concerts, and devours science‑fiction
    novels by authors such as Ann Leckie, weaving artistic appreciation into their creative downtime.
  travel: Todd Fernandez prefers weekend road trips through New England’s coastal towns and has visited Montreal for its blend of historic architecture and vibrant food scene, while dreaming of trekking
    Patagonia’s Torres del Paine, balancing careful budgeting with a craving for off‑the‑beaten‑path adventure.
  culinary: Todd Fernandez enjoys experimenting in the kitchen, fusing New England clam chowder with a hint of chipotle, perfecting homemade taco al pastor, and mastering the art of mac and cheese while
    often ordering artisanal espresso to accompany their meals.
  core: Todd Fernandez blends pragmatic retail expertise with a curious, DIY‑minded spirit, juggling disciplined budgeting, mild health vigilance, weekend runs, guitar strums, and a love for hybrid comfort‑plus‑spice
    cooking, all punctuated by a tendency to procrastinate on paperwork.
background:
  cultural: Todd grew up in Medford, Massachusetts, a suburban community within the Greater Boston area known for its blend of historic New England values and diverse immigrant influences. Although his
    ethnic background is primarily white, his family carries the Fernandez surname, indicating a Hispanic lineage that adds bilingual and cultural traditions to his upbringing. He was raised in a middle-class
    household that emphasized hard work, education, and community involvement, shaping his pragmatic yet curious outlook. Local traditions such as celebrating Thanksgiving, Fourth of July parades, and occasional
    Latino holidays like Día de los Muertos have given him a hybrid cultural perspective. His exposure to community events, neighborhood sports leagues, and the rich culinary scene of Boston's North End
    further broadened his appreciation for both mainstream American and Latino cultures.
attributes:
  skills: '["Customer Service", "Sales Techniques", "POS System Proficiency (Shopify, Lightspeed)", "Inventory Management", "Visual Merchandising", "Data Analysis (Excel)", "Effective Communication", "Conflict
