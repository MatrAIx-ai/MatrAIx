  hobbies: '["Hiking local trails (Middlesex and Lowell)", "Kayaking on the Charles River", "Cooking (mixing New England and Hispanic recipes)", "Reading (business books and science-fiction)", "Running
    (5K community races)", "Attending community craft fairs", "DIY home improvement projects", "Playing acoustic guitar"]'
  career_goals: Todd aims to advance from his current sales associate role to a store manager position within the next two to three years, leveraging his practical experience and curiosity for data-driven
    retail strategies. He plans to complete a bachelor's degree in Business Administration part-time, focusing on retail operations and digital commerce. In the longer term, he envisions moving into regional
    management or a corporate retail operations role where he can implement technology-enabled improvements such as automated inventory tracking and personalized customer loyalty programs. He also hopes
    to eventually open his own boutique that combines his love for classic craftsmanship with modern, sustainable retail practices, ensuring both financial stability for his family and a meaningful contribution
    to his community.
