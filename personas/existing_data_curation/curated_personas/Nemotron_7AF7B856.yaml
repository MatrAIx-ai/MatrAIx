  hobbies: '["reading historical fiction","genealogy research","book club participation","garden cultivation and competition","birdwatching","quilting and quilt competitions","experimental cooking","sustainable
    living workshops","digital storytelling workshops"]'
  career_goals: Although retired from formal employment, Monica aims to complete a comprehensive memoir of her family's migration story and publish it for her descendants. She also wants to curate a traveling
    exhibit of Belleville's early 20th‑century photographs for the local historical society. Learning to use a tablet for digital storytelling and mentoring younger volunteers in archival techniques are
    key ambitions. Ultimately, she hopes to leave a lasting, practical record of community heritage while staying intellectually active.
