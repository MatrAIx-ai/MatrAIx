  hobbies: '[''Knitting (cable and lace patterns)'', ''Urban container gardening'', ''Crossword puzzles and Sudoku'', ''Reading classic literature and fashion magazines'', ''Listening to jazz and classic
    rock vinyl'', ''Practicing nail art designs for personal enjoyment'', ''Walking in Prospect Park'', ''Attending community art workshops'']'
  career_goals: Annie aims to earn advanced certifications in nail art and health safety to stand out in the competitive Brooklyn market. She aspires to open a modest boutique salon that offers a calm,
    predictable environment focused on high‑quality service for an older clientele. Building on her competitive drive, she wants her salon to be recognized for meticulous standards and personalized care.
    She also hopes to mentor a younger apprentice, passing on her methodical approach and work ethic. Securing stable income and modest retirement savings through her business is a long‑term financial goal.
