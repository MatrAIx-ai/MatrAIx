persona_description: A team of international experts in fisheries management and ecology, who have reviewed and appraised the status of river fisheries, assessment methodology, constraints on development,
  issues and options regarding management and associated problems in both temperate and tropical countries. Their recommendations aim to improve management and provide guidelines for formulating policy,
  planning methodology, and evaluating future activities. Their focus is on assessing fish community structure and dynamics, factors constraining stock recruitment, fish habitat requirements, and impacts
  of water resource schemes on river fisheries. They also address rehabilitation of river fisheries, enhancement of fish stocks, exploitation of stocks, management of migratory fish stocks, conservation
  of endangered species, and integrated river management. Their expertise includes bioeconomic issues, legislation, and multinational management of rivers.
