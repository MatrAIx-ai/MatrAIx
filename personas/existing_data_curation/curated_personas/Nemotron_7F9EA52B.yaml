personas:
  professional: Leslie Bartz is a teenage pianist who blends a disciplined practice routine with a budding talent for organizing school events like the science fair, leveraging the strategic planning skills
    honed in Minecraft and SimCity, and their reliable, structured approach makes them a natural leader in their Girl Scout troop.
  sports: Leslie Bartz embraces outdoor fitness through weekly Hill Country hikes with their Girl Scout troop, follows the Dallas Cowboys and Austin FC as avid fans, and occasionally joins a middle‑school
    cross‑country club, balancing a structured training schedule with a love for exploring nature's trails.
  arts: Leslie Bartz nurtures their artistic side by playing Beethoven sonatas on the piano, capturing Hill Country landscapes through a DSLR reminiscent of Ansel Adams, and devouring tactical adventure
    novels such as The Maze Runner series and the Alex Rider books, which together shape their creative identity.
  travel: Leslie Bartz prefers meticulously planned weekend trips, often exploring nearby Hill Country towns like Fredericksburg and the vibrant streets of Austin, while dreaming of a future backpacking
    adventure through the national parks of Utah and a cultural exchange visit to Edinburgh, Scotland.
  culinary: Leslie Bartz enjoys cooking straightforward meals such as chicken quesadillas with fresh cilantro and lime, perfects raspberry muffins on weekends, and delights in tasting the regional Hill
    Country cheeses and heirloom tomatoes, though they sometimes forget to clean up the kitchen after a baking session.
  core: Leslie Bartz is a meticulously organized teen who balances piano practice, strategic gaming, and Girl Scout leadership, all while sprinkling spontaneous bursts of curiosity into every hobby.
background:
  cultural: Leslie Ann comes from a middle‑class white Texan family with ancestral ties to the Midwest and the South. Growing up in the suburban outskirts of Austin, in Hays County, she experiences a blend
    of traditional Texas culture—BBQ, country music festivals, and community rodeos—and the progressive, artistic vibe of nearby Austin. Her family values education, self‑reliance, and active community
    involvement. She celebrates mainstream American holidays and participates in local events such as the Austin City Limits music festival, county fairs, and volunteer clean‑up days, which reinforce a
    sense of civic responsibility and cultural pride.
