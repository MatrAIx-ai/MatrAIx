  career_goals: Leslie Ann aims to pursue a career in civil engineering, drawn to the field’s emphasis on structure, predictability, and tangible outcomes. She plans to focus on advanced math and science
    classes in high school, join the robotics club, and seek a summer internship or shadowing experience with a local engineering firm. In the longer term, she hopes to earn a bachelor’s degree in civil
    engineering and specialize in sustainable infrastructure projects that improve her community’s resilience.
