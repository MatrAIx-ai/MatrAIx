  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking'', ''Cooking Mexican Cuisine'', ''Listening to Regional Mexican Music'', ''Watching Soccer'', ''Participating in Small Community Gatherings'', ''DIY
    Home Repairs'']'
  career_goals: Pedro aims to advance to a supervisory role within the logistics sector, such as a warehouse lead or shift supervisor, where he can apply his organized and methodical work style to improve
    workflow efficiency. He plans to obtain a certified forklift trainer credential and an OSHA safety certification within the next two years. In the longer term, he hopes to enroll in an associate degree
    program in supply chain management and eventually establish his own small freight‑handling business, providing stable employment for himself and others in the Moville area.
