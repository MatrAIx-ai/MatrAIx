  hobbies: '[''Building block towers'', ''Shape‑sorting toys'', ''Listening to gospel and soul music'', ''Picture‑book storytime with repetitive narratives'', ''Family church gatherings'', ''Exploring the
    local park’s sensory garden'']'
  career_goals: Although still a toddler, Jasmine’s family emphasizes stability and service, shaping nascent aspirations toward future roles that value reliability and compassion. She envisions, as she
    grows, a career that allows her to contribute to her community—potentially as an educator, nurse, or other helping‑profession—where structured environments and caring relationships are central.
