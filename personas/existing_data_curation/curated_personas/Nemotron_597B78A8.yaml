personas:
  professional: Jasmine Whigham, a one-year-old who obsessively arranges blocks by color and shape, displays an emerging knack for methodical organization and a desire for predictable routines that foreshadow
    a future in pediatric occupational therapy where their structured approach and compassionate yet assertive demeanor will guide young patients through therapeutic milestones.
  sports: Jasmine Whigham, a one-year-old who joins a local infant swim class at the Madison County Aquatic Center and delights in watching the Alabama Crimson Tide football games with their family while
    clutching a soft plush of the Huntsville Havoc mascot during weekend matches.
  arts: Jasmine Whigham, a one-year-old who giggles to the soulful hymns of Mahalia Jackson during Sunday services and copies the melodic rhythms of contemporary artist H.E.R. on their toy xylophone, while
    occasionally curling up to watch animated shorts starring Tom Hanks, shaping a budding appreciation for music and storytelling.
  travel: Jasmine Whigham, a one-year-old who has already taken a family road trip to Gulf Shores, Alabama, delighting in sand‑tasting and car‑seat naps, and whose next imagined adventure is a stroller‑friendly
    visit to Disneyland in California, with their parents meticulously planning a predictable itinerary that includes baby‑friendly rest stops and frequent feeding breaks.
  culinary: Jasmine Whigham, a one-year-old who eagerly scoops mashed sweet potatoes seasoned with a pinch of cinnamon and devours soft bites of fried chicken tenderloin, while their family incorporates
    collard greens puree and cornbread crumbs into their meals, reflecting a palate rooted in hearty Southern staples yet limited to smooth textures appropriate for their stage.
  core: Jasmine Whigham, a one-year-old who insists on an exact bedtime ritual, becomes intensely upset when the routine changes, and habitually tosses their favorite rattles in a precise line before re‑sorting
    them, epitomizes a fledgling yet fiercely structured spirit.
background:
  cultural: Jasmine is raised in a Black family in Huntsville, Alabama, where Southern and African‑American traditions intertwine. Her upbringing is steeped in church life, communal meals featuring soul‑food
    staples such as collard greens, fried chicken, and cornbread, and celebrations like Juneteenth and family reunions. The community’s emphasis on strong familial bonds, resilience, music, and cultural
    pride informs her daily experiences and shapes her emerging worldview.
attributes:
  skills: '[''Following simple daily routines'', ''Sorting objects by shape or color'', ''Imitative play with focused attention'', ''Consistent babbling and early word recognition'', ''Self‑soothing through
