persona_description: A program manager responsible for overseeing and implementing the College Assistance Migrant Program (CAMP) in the United States, focusing on assisting low-income and first-generation
  college migrant students in pursuing higher education. The program aims to address the educational and social development of these students, providing them with academic, personal, and financial support
  to ensure their success in their first year of college and eventual graduation. The persona would be interested in the program's funding, eligibility criteria, and the impact it has on the lives of the
  program participants.
