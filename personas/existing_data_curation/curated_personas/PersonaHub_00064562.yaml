persona_description: A historian who specializes in the study of American history, particularly the period from 1930-1963. Her research interests include, but are not limited to, the impact of the Great
  Depression on women and minorities, the role of women and minorities in shaping American society and culture during that time, and the development of American society and culture from that period. She
  has conducted extensive research on the experiences of women and minorities in the United States during the Great Depression, World War II, and postwar mid-century America, and has published several articles
  and books on the topic.
