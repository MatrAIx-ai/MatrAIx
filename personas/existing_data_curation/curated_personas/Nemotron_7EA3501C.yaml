personas:
  professional: Samuel Barrett, a two‑year‑old budding block‑tower architect, demonstrates early project planning and methodical execution whenever they arrange Lego sets into structured masterpieces, satisfying
    their love for predictability and competitive drive.
  sports: Samuel Barrett, a spirited member of the Bright Beginnings T‑Ball club, channels their competitive edge into early baseball drills while proudly waving a miniature Chicago Cubs cap during family
    game nights.
  arts: Samuel Barrett, an enthusiastic fan of nursery‑time melodies, eagerly sings along to Raffi’s ‘Baby Beluga’, mimics Elmo’s giggles from Sesame Street, and proudly displays a collection of The Wiggles
    stickers, all while arranging their wooden puzzle pieces in flawless order.
  travel: Samuel Barrett, who delights in family road trips to the Grand Canyon and beach days at San Diego’s La Jolla, dreams of a future adventure to Kyoto’s cherry‑blossom gardens, yet prefers familiar
    hotels and short drives that fit their predictable routine.
  culinary: Samuel Barrett, a selective eater, devours creamy mac and cheese, bites of banana drizzled with honey, and chicken nuggets cut into perfect squares, while staunchly rejecting broccoli and peas,
    illustrating their need for familiar textures and structured meals.
  core: Samuel Barrett, a two‑year‑old who thrives on routine, builds meticulous block towers, saves every coin in a labeled jar, battles eczema with daily creams, and insists on mac and cheese at every
    meal, all while they quietly but fiercely compete with peers.
background:
