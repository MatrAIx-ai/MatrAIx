  career_goals: Tyrone wants a career that blends his love of people, creativity, and flexibility. He aims to complete a degree in communications or business and work as a community outreach manager or
    digital marketing specialist for local brands. In the long term, he hopes to launch his own street‑wear line and a multimedia platform that highlights Baltimore’s culture, using his networking skills
    to partner with musicians, artists, and entrepreneurs.
