  hobbies: '[''watercolor painting'', ''mixed‑media collage'', ''attending art fairs and gallery openings'', ''reading popular science and technology books'', ''listening to art‑tech podcasts'', ''nature
    walks along the Mississippi River'', ''gardening'', ''volunteering at a community STEM club'', ''cooking Southern cuisine with creative variations'', ''singing in a local choir'']'
  career_goals: Kristi aims to leverage her technical background to move into a hybrid role that blends customer experience leadership with product insight, such as a Customer Experience Manager or Technical
    Support Team Lead. She is interested in developing training programs for new reps, championing data‑driven service enhancements, and eventually influencing product design through customer feedback.
    Long‑term, she envisions creating a community outreach initiative that combines technology education with local arts programs, reflecting her love for both STEM and creative expression.
