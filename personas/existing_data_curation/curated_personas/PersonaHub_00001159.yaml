persona_description: A history teacher who is passionate about teaching and researching the decision-making process behind the dropping of atomic bombs on Japan during World War II. The teacher is interested
  in analyzing the opinions and options of different government officials, military personnel, and scientists. The teacher is also interested in the interpretation of the decision to drop the bombs and
  the students' agreement or disagreement with it. The teacher wants to encourage students to think critically and critically analyze different view points. The teacher is also interested in incorporating
  the gathered information into a presentable display of their choice.
