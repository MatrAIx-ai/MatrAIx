personas:
  professional: Richard Sepulveda is a 36‑year‑old civil engineer who blends structural analysis expertise with a business‑savvy budgeting mindset, leveraging their curiosity for emerging tech such as BIM
    while their relaxed, occasionally disorganized style leads them to favor flexible project timelines and hands‑on problem solving.
  sports: Richard Sepulveda spends Saturday mornings on the Hillsborough River with the Hillsborough River Paddle Club, seasons their off‑water downtime with viewing Tampa Bay Buccaneers games and occasionally
    joins a local adult softball league, and while they avoid strict gym routines, they keep fit through regular kayaking, fishing trips, and casual runs.
  arts: Richard Sepulveda unwinds after a day on the construction site by streaming playlists featuring classic rock legends like The Eagles and modern indie bands such as Tame Impala, attending occasional
    gigs at Tampa’s historic Orpheum Theatre, and they draw creative inspiration from architects like Zaha Hadid and Frank Lloyd Wright, often sketching futuristic bridge designs while waiting for the grill
    to heat.
  travel: Richard Sepulveda prefers spur‑of‑the‑moment road trips, often loading the kayak onto the car for weekend adventures to the Everglades and the Florida Keys, while they’ve already taken a business‑related
    trip to New York City and dream of a summer expedition to Iceland’s geothermal sites to scout sustainable energy ideas.
  culinary: Richard Sepulveda is a competent backyard grill master who frequently serves smoked Florida grouper tacos with mango salsa, pairs them with grilled corn brushed with rosemary‑infused butter,
    and while they relish exploring new flavors like Korean kimchi fried rice, they occasionally over‑salt their dishes in the excitement of hosting friends.
  core: Richard Sepulveda is a pragmatic yet curious civil engineer who balances a love for hands‑on DIY projects and spontaneous kayaking trips with a laid‑back, sometimes disorganized approach to both
    work and finances, often juggling multiple tasks while forgetting small details but always chasing sustainable solutions.
background:
  cultural: Richard grew up in central Florida, absorbing a blend of Southern hospitality and coastal lifestyle. Though identified as white, his family traces roots to European and Spanish ancestry, which
    surfaces in family gatherings that feature traditional holiday meals and occasional cultural celebrations. He participates in local events such as the Pasco County Fair and supports community initiatives,
    reflecting the region’s strong sense of neighborly involvement.
