  career_goals: Richard aims to earn his Professional Engineer (PE) license within the next two years and move into a senior project manager role overseeing large-scale infrastructure projects in Central
    Florida. He is driven to lead multidisciplinary teams, integrate sustainable practices into municipal projects, and eventually launch his own consulting firm that offers cost-effective, environmentally
    responsible engineering solutions.
