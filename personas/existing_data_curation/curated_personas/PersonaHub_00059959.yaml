persona_description: A high-level official from an African country who is responsible for overseeing and implementing the key outcomes of the Algiers Declaration on health research. This official is dedicated
  to ensuring that the potential contribution of health research to achieving the MDGs is delivered, and they are committed to developing their own capacity for setting research priorities, boosting national
  capacities to address ethical dimensions of health research, and encouraging more research collaboration. They are also interested in developing the robust research infrastructure and ensuring that African
  researchers and politicians communicate more effectively.
