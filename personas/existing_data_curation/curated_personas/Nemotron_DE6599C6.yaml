personas:
  professional: Jean Prince is a head cook leading a high‑tempo kitchen in the Detroit area, blending classic American foundations with New American experimentation; they excel at menu development, cost‑effective
    recipe scaling, and staff mentorship, leveraging their assertive‑cooperative style and spontaneous creativity to keep the line dynamic.
  sports: Jean Prince enjoys early morning hikes along Lake St. Clair, holds a membership with the Detroit Area Hikers club, and roots for the Detroit Lions and Pistons, while occasionally joining a community
    yoga class for flexibility and stress relief.
  arts: Jean Prince is a regular at live music venues, dancing to the soulful grooves of Sly and the Family Stone covers and the indie rock of The Detroit Cobras, while winding down with food memoirs by
    Anthony Bourdain and the culinary essays of Michael Ruhlman.
  travel: Jean Prince favors curated culinary road trips, having savored the farm‑to‑table scene at Ann Arbor's Summer Festival and the seafood delights of the New Orleans Wine & Food Experience, and dreams
    of attending the Salon du Chocolat in Paris, always planning trips around festival dates to maximize flavor discoveries.
  culinary: Jean Prince delights in crafting seasonal dishes like pan‑seared whitefish with Michigan cherry glaze and sweet corn risotto, wielding a seasoned chef’s knife with confidence while sourcing
    heirloom tomatoes, wild mushrooms, and locally harvested herbs from Wixom’s farmers markets.
  core: Jean Prince balances a restless curiosity for new flavors with pragmatic kitchen economics, dancing away stress after shifts, but often lets emotional turbulence and a love for spontaneity turn
    budgeting and planning into occasional chaotic loops.
background:
  cultural: Jean Lynne grew up in a white, Midwestern family in Michigan with German and Dutch ancestry, where communal meals and hearty, seasonal dishes were central to family life. The Great Lakes region’s
    emphasis on local produce, seasonal cooking, and community spirit shaped her culinary values. Living in Oakland County, she blends the suburb’s cultural diversity with traditional Midwestern comfort
    foods, fostering a cooking style that honors regional heritage while eagerly experimenting with new ideas.
