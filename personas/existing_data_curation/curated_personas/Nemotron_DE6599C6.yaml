  hobbies: '[''Hosting dinner parties'', ''Exploring farmers markets'', ''Food photography'', ''Hiking'', ''Yoga'', ''Traveling to culinary festivals'', ''Reading food memoirs'', ''Live music and dancing'']'
  career_goals: Jean Lynne aims to open a sustainable bistro in the Detroit metropolitan area that showcases seasonal Michigan produce and blends Midwestern comfort with modern twists. She plans to earn
    a Certified Executive Chef credential, publish a cookbook that reflects her experimental yet practical culinary philosophy, and become a mentor for emerging chefs, especially women navigating high‑pressure
    kitchens. Additionally, she hopes to lead community cooking workshops that address food insecurity and foster local connections.
