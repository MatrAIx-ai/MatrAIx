personas:
  professional: Johnathan Herrera, a retired accounting clerk turned community project coordinator, leverages meticulous bookkeeping, woodworking mastery, and classic car restoration skills to orchestrate
    senior center garden initiatives with the same methodical precision they apply in their furniture workshops.
  sports: Johnathan Herrera cheers on the Kansas City Chiefs and Royals, participates in the Olathe Senior Center's weekly bowling league, and they maintain a gentle fitness routine through garden work
    and a Saturday morning walk with the Sunset Seniors Walking Club.
  arts: Johnathan Herrera sings harmoniously in the church choir, listens to classic rock icons like Led Zeppelin, The Eagles, and Fleetwood Mac while working in the workshop, and they enjoy the paintings
    of Thomas Hart Benton at the Nelson‑Atkins Museum during occasional trips.
  travel: Johnathan Herrera has toured the historic sites of Fort Scott, the Tallgrass Prairie National Preserve, and the Lawrence town square, plans a pilgrimage to the Jefferson Museum in St. Louis, and
    they dream of a leisurely road trip along the Missouri River before their next birthday.
  culinary: Johnathan Herrera favors Midwestern comfort foods such as chicken pot pie, cornbread, and Kansas City‑style ribs, skillfully seasons vegetables from their garden into a signature summer squash
    casserole, and they never skip a slice of homemade apple pie after family gatherings.
  core: Johnathan Herrera is a methodical, garden‑loving carpenter with a soft spot for classic rock and a habit of overwatering plants while they meticulously budget every dollar.
background:
  cultural: Johnathan was raised in a middle‑class, Catholic family in the Kansas suburbs, with a mixed heritage of German, Irish, and distant Spanish ancestry reflected in his surname. Growing up in Olathe,
    he absorbed Midwestern values of hard work, modesty, and community involvement. He celebrates traditional holidays like Thanksgiving and St. Patrick's Day, participates in local fairs and the county's
    agricultural exhibitions, and maintains strong ties to his church and neighborhood. His cultural identity blends the practical, no‑nonsense ethos of the Heartland with a respect for family traditions
    and a love of local history.
attributes:
