  hobbies: '["Gardening", "Woodworking", "Historical Reading", "Classic Car Restoration", "Crossword Puzzles", "Cooking", "Church Choir", "Community Service", "Classic Rock Listening"]'
  career_goals: He aims to stay physically active through gardening and woodworking, to maintain his mental acuity by completing a series of woodworking projects, to document his family's history in a memoir
    for his grandchildren, to continue volunteering at the Olathe Senior Center by coordinating the yearly community garden, and to support his grandchildren's education by offering tutoring and life lessons.
    He also aspires to travel to nearby historic sites in Kansas and Missouri, and to assist his wife in organizing the local church's charity drives.
