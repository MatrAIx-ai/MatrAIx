  career_goals: William envisions a future where he can combine his love for structure, helping others, and being in the spotlight. He dreams of becoming an elementary school teacher or principal, where
    he can create organized learning environments, mentor peers, and lead school‑wide events. He is also intrigued by the idea of working as a community event coordinator or youth program director, roles
    that let him plan activities, foster cooperation, and make a positive impact on his town.
