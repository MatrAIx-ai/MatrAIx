  career_goals: Her goal is to transition her solo carpentry operation into a small, employee‑run workshop that emphasizes sustainable building practices, such as using reclaimed lumber and low‑VOC finishes.
    Jamie aims to acquire LEED‑Green Associate certification within the next two years to broaden her market for eco‑friendly remodels. She also plans to formalize a mentorship program for young women entering
    the trades, partnering with local technical colleges and Habitat for Humanity. Long‑term, she envisions a balanced schedule that allows her to take on select high‑profile residential projects while
    having the flexibility to spend more time with her family and community as she approaches retirement.
