personas:
  professional: Jamie Roy is a seasoned carpenter who merges three decades of hands‑on framing, custom cabinetry, and blueprint interpretation with a meticulous, schedule‑driven workflow—leveraging QuickBooks
    and SketchUp to keep projects on time, negotiating assertively with clients while mentoring apprentices in traditional joinery, and steering the business toward a sustainable workshop model.
  sports: Jamie Roy carves out mornings for hiking the Blue Ridge foothills, participates in a Sunday walkers club that doubles as a social circle, roots for the Carolina Panthers and the Greenville Drive,
    and complements outdoor activity with weekly yoga to ease back tension.
  arts: Jamie Roy lends their alto voice to the church choir, tickles the piano at family gatherings, dives into Agatha Christie and Sue Grafton mysteries at the women’s book club, and frequents the Anderson
    Makerspace and regional craft fairs where they swap woodworking tips with fellow artisans who admire folk musicians like The Avett Brothers and Alison Krauss.
  travel: Jamie Roy prefers road‑trip itineraries that blend work and leisure—spending weekends exploring Asheville’s artisan market, savoring Charleston’s historic waterfront cuisine, and dreaming of a
    future woodworking pilgrimage to Sweden’s timber villages—always planning within a modest family‑centered budget and prioritizing group experiences over solitary adventure.
  culinary: Jamie Roy transforms garden harvests into classic comfort fare—slow‑cooked collard greens, buttery biscuits, shrimp and grits, and a caramel‑pecan pie—cooking at a confident intermediate skill
    level, seasoning dishes with a splash of sweet‑tea glaze, and delighting neighborhood potlucks with their well‑timed, hearty plates.
  core: Jamie Roy is a pragmatic, community‑rooted carpenter who balances structured craftsmanship, choir harmonies, garden‑fresh meals, and a steadfast commitment to mentoring women in the trades.
background:
  cultural: Jamie grew up in a modest town in South Carolina, steeped in the Southern values of hospitality, hard work, and close‑knit community ties. Her family’s tradition of hands‑on craftsmanship—her
    grandfather was a cabinetmaker—instilled an early respect for skilled trades. As a white Southern woman, she values church participation, family gatherings, and regional culinary traditions. The local
    culture’s emphasis on self‑reliance and neighborly support shapes her cooperative yet assertive approach to both work and social life. She also draws pride from being part of a growing cohort of women
    redefining the traditionally male‑dominated carpentry field in the South.
