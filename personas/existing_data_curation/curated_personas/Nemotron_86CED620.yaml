  hobbies: '["Reading speculative fiction", "Sketching abstract drawings", "Digital illustration", "Playing piano", "Photography (landscape, waterfalls)", "Hiking in Jocassee Gorges", "Experimental cooking
    (soul-food fusion)", "Volunteering at Anderson County Library (art & literary events)", "Listening to jazz and blues"]'
  career_goals: Darius aims to move from a general office clerk to an office manager position within the next three years, focusing on obtaining a Certified Administrative Professional (CAP) credential
    to deepen his administrative expertise. He also hopes to blend his creative passions with his work by taking on communications or marketing responsibilities at a community‑focused organization, such
    as a local non‑profit or municipal department. Ultimately, he envisions establishing a weekend art‑and‑storytelling workshop that serves youth in Anderson County, allowing him to use his artistic skills
    to foster imagination and cultural pride.
