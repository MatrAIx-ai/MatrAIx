    User 1: Oh, that''s nice! What are you studying?

    User 2: I''m studying English literature.

    User 1: Oh, that''s cool! I love English literature.

    User 2: Me too! It''s so interesting.

    User 1: I agree. It''s so much fun to learn about different cultures and time periods.

    User 2: Me too! I love learning about the past.

    User 1: So, what do you want to do with your degree?

    User 2: I''m not sure yet. I''m thinking about teaching.

    User 1: Oh, that''s great! I''m sure you''d be a great teacher.

