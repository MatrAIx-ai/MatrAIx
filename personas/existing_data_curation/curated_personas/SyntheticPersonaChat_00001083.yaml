    User 1: So, what are your plans for the future?

    User 2: I''m not sure yet. I''m just taking it one day at a time.

    User 1: That''s a good approach. Just focus on the present and the future will take care of itself.

    User 2: I agree. I''m just trying to enjoy my time in college.

    User 1: That''s the best way to do it!'
