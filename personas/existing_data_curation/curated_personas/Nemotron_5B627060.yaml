  career_goals: Jessica aims to advance to a lead press operator or shift supervisor position within the next three years, obtaining industry certifications in sustainable printing and advanced digital
    workflow. She plans to pursue a bachelor’s degree in printing technology or industrial engineering to broaden her expertise and eventually transition into production management. Long‑term, she dreams
    of launching a small, eco‑focused custom print shop that serves local businesses and community artists, leveraging her knowledge of low‑waste inks and variable‑data printing to differentiate the venture.
