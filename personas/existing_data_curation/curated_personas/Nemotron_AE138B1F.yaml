  hobbies: '[''Art gallery visits'', ''Landscape photography'', ''Desert gardening'', ''Group hikes'', ''Card games'', ''Poker tournaments'', ''Volunteer art walk guide'', ''Cooking and barbecuing'', ''Travel
    to art festivals'', ''Reading contemporary art literature'']'
  career_goals: Norman aims to channel his practical skills into community‑focused initiatives. He plans to launch a neighborhood desert‑garden project that teaches sustainable landscaping to neighbors,
    mentor younger volunteers at the senior center, and enroll in advanced watercolor and modern photography courses at the Mesa Arts Center. He also hopes to write a memoir that weaves his manufacturing
    career, love of the Southwest’s landscape, and lifelong curiosity about art. A long‑term ambition is to attend three major U.S. art festivals—such as the Armory Show in New York, Luminaria in Chicago,
    and the Los Angeles County Museum of Art’s summer exhibition—within the next five years.
