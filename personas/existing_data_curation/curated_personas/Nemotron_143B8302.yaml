personas:
  professional: Amber Lorenz, a budding visual artist and teenage writer, channels her curiosity and kindness into sketching, watercolor, short stories, and poetry, while her relaxed attitude toward obligations
    means she prefers spontaneous creative sessions over rigid schedules.
  sports: Amber Lorenz follows the Milwaukee Bucks and Green Bay Packers with enthusiastic fanfare, participates in the school yoga club for flexibility, and occasionally joins community Zumba classes,
    preferring relaxed, non‑competitive movement over intense sports.
  arts: Amber Lorenz immerses herself in sketching, watercolor, and indie acoustic music, drawing inspiration from artists such as Yayoi Kusama, Phoebe Bridgers, and watercolorist Agnes Cecile, while volunteering
    at local art fairs and curating mini‑exhibitions for her school art club.
  travel: Amber Lorenz enjoys art‑centric trips, having visited the Art Institute of Chicago, spent a weekend exploring Door County’s galleries, and taken a family tour of Paris’s Musée d’Orsay, while dreaming
    of future pilgrimages to Florence’s Renaissance studios and Kyoto’s temple gardens, planning each adventure loosely to leave room for spontaneous sketching sessions.
  culinary: Amber Lorenz favors fresh, colorful meals, often preparing avocado toast topped with radish and feta, crafting vibrant mango‑cucumber sushi rolls, and baking blueberry almond‑flour muffins,
    though she frequently forgets to set a timer, resulting in slightly over‑browned edges.
  core: Amber Lorenz is a curious, art‑driven teen who balances spontaneous creativity with anxiety‑induced worries, thriving in flexible environments and feeding her imagination with indie music, sketchbooks,
    and mindful breathwork.
background:
  cultural: Amber comes from a white, middle‑class family with German and Irish ancestry in Milwaukee, Wisconsin. Growing up in the Midwest, she was raised with values of humility, hard work, and community
    involvement. Milwaukee's vibrant cultural scene—including its renowned museums, music festivals like Summerfest, and neighborhood celebrations such as the Polish Heritage Festival—has nurtured her appreciation
    for art and diverse experiences. Her family’s modest, community‑oriented upbringing emphasizes kindness, cooperation, and a respect for varied perspectives.
