  career_goals: Amber envisions turning her passion for art and storytelling into a career as an illustrator or graphic novelist. She is also intrigued by the idea of becoming an art therapist to help other
    youth cope with stress through creative expression. In the short term, she aims to build a strong portfolio, attend summer art workshops, and explore college programs in visual arts and psychology,
    with an eye toward studying at the Milwaukee Institute of Art & Design.
