personas:
  professional: Bryan Leon, a high‑school sophomore with a knack for DIY electronics, blends their practical, structured mindset with a competitive drive, treating robotics club challenges and school projects
    like strategic games to be won.
  sports: Bryan Leon plays midfield for the Riverside Youth Soccer League, cheers for LA Galaxy and follows the Mexican national team, and spends Saturdays practicing drills with his local club, balancing
    competitive matches with a disciplined training regimen.
  arts: 'Bryan Leon immerses themselves in norteño hits by Los Tigres del Norte and banda rhythms from Banda El Recodo while devouring Marvel graphic novels like "Spider‑Man: Miles Morales" and sci‑fi series
    "Saga", letting the music fuel study sessions and the comics inspire electronic designs.'
  travel: Bryan Leon prefers short, structured road trips to nearby national parks such as Zion and family visits to the historic town of San Miguel de Allende, planning itineraries down to snack stops
    while daydreaming about a future trip to Tokyo's Akihabara for its tech culture.
  culinary: Bryan Leon enjoys crafting simple Mexican street foods at home—like tacos al pastor with pineapple and homemade salsa verde—while occasionally ordering pizza for gaming marathons, and they are
    still mastering the art of perfectly crisping a tortilla.
  core: Bryan Leon is a competitively driven teen who balances soccer, gaming, and tinkering with a structured routine, yet secretly hoards extra controller batteries like treasure.
background:
  cultural: Bryan was born and raised in Utopia, Texas, in a Mexican‑American family that maintains strong ties to Mexican traditions. He grew up bilingual, speaking Spanish at home and English at school.
    Family gatherings often center around Mexican cuisine—tacos, tamales, and pozole—and cultural celebrations like Día de los Muertos and Cinco de Mayo. His upbringing blends Catholic values with a community‑oriented
    mindset common in Mexican neighborhoods. The blend of Mexican heritage and Texan environment informs his identity, food preferences, music taste, and his emphasis on family loyalty.
attributes:
  skills: '[''Bilingual communication (Spanish & English)'', ''Basic computer literacy (Microsoft Office, internet research)'', ''Mechanical aptitude (basic car maintenance)'', ''Strategic video gaming
    (team‑based competitive games)'', ''Organizational and time‑management skills'']'
  hobbies: '[''Soccer (local youth league)'', ''Competitive online gaming (League of Legends, Call of Duty)'', ''DIY electronics projects (Arduino, Raspberry Pi)'', ''Listening to regional Mexican music
    (norteño, banda)'', ''Reading graphic novels'']'
  career_goals: Bryan aims to finish his secondary education by obtaining a GED within the next two years, then enroll in a community college or vocational program focusing on automotive technology or computer
    networking. He is drawn to careers that offer clear progression and tangible outcomes, such as becoming a certified automotive technician, a network support specialist, or, in the longer term, opening
    his own small auto repair shop. He also has an intermittent interest in law enforcement due to the structured environment, but his immediate priority is a skilled trade where his practical abilities
    and competitive mindset can thrive.
