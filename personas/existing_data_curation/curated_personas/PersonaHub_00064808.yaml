persona_description: A scientist who specializes in the study of atmospheric pollutants and their impacts on tree growth. They are particularly interested in the effects of increasing levels of carbon dioxide
  on tree growth and the physiological stress and damage caused by urban airborne pollutants on trees. They are also interested in the potential positive effects of increasing levels of atmospheric ozone
  on birch tree growth and the effects of air pollution on tree growth in urban areas.
