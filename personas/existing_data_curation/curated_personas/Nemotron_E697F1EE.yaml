personas:
  professional: An aspiring coder-storyteller, Alexis Mcgowan merges comic-style illustration with Scratch programming to create interactive narratives, applying their curiosity-driven practicality and
    calm resilience, and they turn classroom STEM concepts into community-focused digital art.
  sports: A committed school soccer midfielder, Alexis Mcgowan also trains with the Champaign Youth Soccer Club, cheers for the Chicago Fire in Major League Soccer, follows the Illinois Fighting Illini
    women's soccer team, and watches Chicago Bulls games on Friday nights, and they balance competitive play with community spirit.
  arts: A budding illustrator and pianist, Alexis Mcgowan draws inspiration from comic legend Stan Lee, practices piano pieces from Mozart's Sonata in C major to gospel anthem 'I Smile' by Kirk Franklin,
    and spends evenings reenacting scenes from Lin-Manuel Miranda's Hamilton, and they channel their storytelling love into both visual and musical forms.
  travel: An enthusiastic explorer, Alexis Mcgowan has visited Chicago's Museum of Science and Industry and Washington, D.C.'s National Museum of African American History and Culture with their family,
    and they dream of hiking the Great Smoky Mountains and experiencing the historic streets of Dublin, Ireland.
  culinary: A curious home chef, Alexis Mcgowan enjoys whipping up spaghetti carbonara with pancetta, eggs, and Parmesan, baking banana nut muffins with walnuts and honey, and snack-time grilled cheese
    using sharp cheddar and ripe tomato slices, and they often add fresh basil for extra flavor.
  core: Alexis Mcgowan blends curiosity and calm resilience into a love for coding, sketching, soccer, and community storytelling, while they occasionally procrastinate chores to finish a comic strip.
background:
  cultural: Alexis comes from a Black family with deep roots in the Midwest, tracing heritage to the American South. Her parents and grandparents emphasize the importance of community, education, and storytelling,
    values that are reinforced through participation in the local African Methodist Episcopal church and annual celebrations such as Juneteenth and Kwanzaa. Living in Champaign, a university town, she benefits
    from exposure to diverse perspectives while also staying connected to a close‑knit neighborhood network that supports academic achievement and cultural pride. These influences shape her worldview, fueling
    a resilient spirit and a commitment to use her talents to uplift her community.
