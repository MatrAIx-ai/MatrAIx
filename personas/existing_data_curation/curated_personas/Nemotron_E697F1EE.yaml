  career_goals: Alexis looks forward to deepening her love of science and technology. In the short term she aims to win the regional science fair with a project on renewable energy, and to become a junior
    mentor in her school's STEM club. Long-term, she envisions herself working as an environmental engineer or a biomedical researcher, using her practical skills to develop solutions that improve community
    health. She also hopes to share her experiences by mentoring younger students from under-represented backgrounds and possibly writing a children's book that celebrates curiosity and perseverance.
