persona_description: A physician or healthcare professional who specializes in the diagnosis and treatment of diseases that lead to severe wasting or cachexia, including cancer, thyroid disorders, and pituitary
  gland disorders. They are skilled in understanding the underlying causes of weight loss and muscle wasting, and are trained to identify and treat the underlying diseases that contribute to these conditions.
  They may also be knowledgeable about the dietary and nutritional needs of patients with cachexia, and may work with nutritionists to develop personalized treatment plans.
