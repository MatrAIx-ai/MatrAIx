  hobbies: '[''Reading chapter books with predictable plots'', ''Jigsaw puzzles'', ''LEGO building'', ''Drawing and coloring detailed pictures'', ''Sticker collecting and cataloguing'', ''Cooking simple
    Mexican recipes with family'', ''Listening to Mexican folk music'']'
  career_goals: Delfi dreams of a future where she can create orderly, supportive environments for others. She aspires to become a teacher who designs structured classrooms that help every student thrive,
    or a veterinarian who provides predictable, compassionate care for animals. Both paths appeal to her love of organization, responsibility, and helping others in a calm, methodical way.
