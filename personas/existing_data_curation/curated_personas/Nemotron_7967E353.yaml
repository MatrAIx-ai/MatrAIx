  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking'', ''Gardening'', ''Bowling (league)'', ''College football fandom'', ''Historical novel reading'', ''Photography'', ''Volunteer work at senior center'',
    ''Road trips to state parks'']'
  career_goals: Jadan aims to earn a shift‑supervisor role within the next two years, gaining certification in postal operations and mentoring newer staff. He values the reliability of his current job as
    a foundation for a comfortable retirement but also hopes to start a modest side venture—like a seasonal lawn‑care service—that lets him apply his practical skills while indulging his spontaneous side.
    Long‑term, he envisions a steady pension, continued community involvement, and the flexibility to pursue personal interests.
