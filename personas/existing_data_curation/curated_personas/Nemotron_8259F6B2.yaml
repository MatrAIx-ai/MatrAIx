personas:
  professional: Nikhil Kapadia, a certified HVAC mechanic in Chicago, combines deep expertise in refrigerant cycle diagnostics, blueprint interpretation, and IoT thermostat integration with a relaxed, flexible
    work style that lets them improvise creative, energy‑efficient solutions on the fly, while their outgoing nature turns technical explanations into friendly client conversations.
  sports: Nikhil Kapadia stays fit by joining pickup cricket games at Grant Park and weekend soccer matches with the Chicago Fire Youth Club, while cheering on the Chicago Bears in football season and the
    Chicago Bulls during winter, and they favor a casual, social workout routine over regimented gym sessions.
  arts: Nikhil Kapadia’s artistic side thrives on wandering the Wynwood‑like Pilsen street‑art alleys to snap murals by Shepard Fairey and local graffiti crews, soaking up contemporary shows at the Museum
    of Contemporary Art featuring works by Yayoi Kusama, and winding down at blues clubs listening to Buddy Guy while dancing to Bollywood beats at community festivals.
  travel: Nikhil Kapadia favors spontaneous weekend getaways, having explored the historic canals of Amsterdam, the vibrant jazz scene of New Orleans, and the mountain trails of Colorado, while dreaming
    of a future eco‑tour of Reykjavik to study geothermal heating and a cultural immersion trip to Kyoto’s tea houses.
  culinary: Nikhil Kapadia loves orchestrating elaborate Gujarati thalis on Saturday evenings—serving undhiyu, khandvi, and jalebi alongside quinoa‑infused salads—while also experimenting with smoked paprika‑marinated
    tofu and locally sourced kale, and they relish occasional indulgences at Chicago’s Girl & the Goat for its pork belly ramen.
  core: Nikhil Kapadia blends a curious eye for art with hands‑on green‑tech ingenuity, juggling buzzing DIY electronics projects, spontaneous street‑art tours, and occasional procrastination on paperwork,
    all while staying socially energized by cricket, music festivals, and cooking marathon thalis.
background:
  cultural: Nikhil is a second‑generation Indian‑American of Gujarati heritage. He grew up in a bilingual household where Hindi and Gujarati were spoken alongside English, and his family celebrates Diwali,
    Navratri, and the Gujarati New Year with traditional foods, music, and community gatherings. The close‑knit Indian diaspora in Chicago’s suburbs and neighborhoods has provided him with a strong sense
    of cultural identity, while the city’s multicultural vibe has exposed him to a wide array of artistic and culinary experiences. This blend of South‑Asian roots and Midwestern urban life shapes his values
    of hospitality, respect for elders, and a collaborative spirit, all of which inform both his professional demeanor and his social pursuits.
attributes:
  skills: '[''HVAC system installation'', ''Refrigeration cycle diagnostics'', ''Electrical wiring and conduit'', ''Blueprint reading'', ''Smart thermostat and IoT integration'', ''Energy efficiency assessment'',
