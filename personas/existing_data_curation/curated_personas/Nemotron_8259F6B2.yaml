  hobbies: '[''Street‑art tours'', ''Contemporary art gallery visits'', ''Cricket and soccer'', ''Gujarati cooking'', ''Live music festivals'', ''Bollywood dance nights'', ''Community volunteering at temple
    events'', ''DIY electronics and solar projects'', ''Socializing with friends in group outings'']'
  career_goals: Nikhil aims to earn NATE Master Technician certification and an EPA universal refrigerant certification within the next two years, positioning himself as a specialist in sustainable HVAC
    solutions. He aspires to lead a project team that retrofits older Chicago apartments with high‑efficiency, smart‑controlled systems, and eventually launch his own boutique contracting firm that blends
    technical excellence with aesthetic design—offering clients customized ventilation solutions that complement modern interior décor. Long‑term, he hopes to become a recognized voice in the city’s green‑building
    community, presenting at industry conferences and mentoring apprentices from diverse backgrounds.
