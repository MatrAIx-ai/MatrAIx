personas:
  professional: Phong Nguyen, a meticulous middle school STEM teacher, blends inquiry‑based curriculum design with hands‑on Arduino projects and bilingual instruction, channeling their organized curiosity
    and community‑first mindset to foster inclusive, data‑driven learning while planning to scale impact as a future district STEM coordinator.
  sports: Phong Nguyen, an avid badminton player at the Little Saigon community center and a seasonal fan of the San Jose Sharks and Earthquakes, blends weekly court drills with weekend hikes in the Santa
    Cruz Mountains to maintain a balanced fitness routine.
  arts: Phong Nguyen, a dedicated photon hunter, spends evenings capturing Golden Gate mist and downtown street life, while unwinding with science‑fiction novels by Liu Cixin and occasional playlists featuring
    Bon Iver and local folk ensembles, letting visual and literary arts shape both lesson plans and personal reflection.
  travel: Phong Nguyen, a methodical planner, favors budget‑conscious road trips along the Pacific Coast Highway to explore coastal towns and national parks, while also dreaming of a spring pilgrimage to
    cherry‑blossom festivals in Japan and reunions in their ancestral hometown in Southeast Asia, balancing detailed itineraries with spontaneous photo stops.
  culinary: Phong Nguyen, a confident home chef, perfects traditional phở broth with star anise, ginger, and fish sauce while experimenting by folding bánh xèo into taco‑style wraps with cilantro, lime,
    and shrimp, relishing both authenticity and creative twists.
  core: Phong Nguyen fuses meticulous lesson planning with hands‑on tech tinkering, seasoned by community‑rooted traditions, weekend hikes, and a habit of double‑checking every grocery receipt for hidden
    sugar.
background:
  cultural: Phong Nguyen is a second‑generation Vietnamese American whose parents immigrated to California in the 1980s. He was raised in San Jose’s Little Saigon neighborhood, where Vietnamese language,
    festivals, and community bonds remain vibrant. The family's emphasis on education, respect for elders, and collective well‑being shaped his values of harmony, cooperation, and lifelong learning. Fluent
    in both Vietnamese and English, Phong routinely incorporates cultural references and bilingual support into his teaching, fostering an inclusive classroom environment. He participates in local cultural
    events such as Tet celebrations and volunteers with Vietnamese community organizations, bridging his heritage with his American identity.
attributes:
  skills: '[''Curriculum Design'', ''Inquiry-Based Learning'', ''STEM Integration'', ''Technology Integration (Google Classroom, Scratch, Python)'', ''Data-Driven Assessment'', ''Differentiated Instruction'',
    ''Bilingual Communication (Vietnamese/English)'', ''Classroom Management'', ''Project Facilitation'', ''Teacher Mentorship'']'
  hobbies: '[''Hiking'', ''Vietnamese Cooking'', ''Arduino/Raspberry Pi Projects'', ''Reading Science Fiction & Popular Science'', ''Badminton'', ''Volunteering for Immigrant Family Support'', ''Photography'']'
  career_goals: Phong is eager to expand his impact beyond his own classroom. In the next five years, he aims to earn a Master's in Educational Leadership and become the district's STEM Coordinator, where
    he will lead curriculum development, professional development workshops, and community outreach programs that increase access to hands‑on engineering experiences for under‑served students. He also plans
    to launch an after‑school robotics club at his school, secure partnerships with local tech companies, and mentor a cohort of new teachers in project‑based methodologies. Ultimately, he aspires to influence
    education policy at the county level to promote equitable STEM opportunities.
