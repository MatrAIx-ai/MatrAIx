    ''Mindful breathing & journaling'']'
  career_goals: Alexander aims to earn his GED within the next year and enroll in a community‑college program focused on graphic design and interactive media. He aspires to combine his artistic sensibilities
    with his technical proficiency to become a UX/UI designer who creates accessible, aesthetically compelling digital experiences. In the longer term, he envisions founding a boutique studio in Brooklyn
    that collaborates with local artists and tech startups, producing visual identities and interactive installations. Driven by high personal standards, he seeks roles that challenge his creativity while
    allowing him to organize and lead projects efficiently.
