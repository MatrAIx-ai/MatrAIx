personas:
  professional: Alexander Hausmann, an aspiring UX/UI designer, leverages their proficiency in Photoshop, Illustrator, and Python to craft accessible, visually striking interfaces while meticulously planning
    each project milestone to meet their high standards.
  sports: Alexander Hausmann, a casual fitness enthusiast, follows the New York Knicks and New York City FC, joins weekly pickup basketball games at a Bushwick community court, practices yoga at a local
    studio during winter, and tracks their steps with a smartwatch, preferring low‑impact cardio over intense gym sessions.
  arts: Alexander Hausmann, a fervent admirer of street art, curates an Instagram feed featuring works by Banksy, Shepard Fairey, and Jean‑Michel Basquiat, draws inspiration from the digital illustrations
    of Loish, listens to Radiohead while sketching, and cites the philosophical writings of Alan Watts and the sci‑fi novels of William Gibson as artistic fuel.
  travel: Alexander Hausmann, an introspective traveler, prefers meticulously planned weekend trips to nearby cultural hotspots like the Brooklyn Museum, the historic streets of Philadelphia, and the vibrant
    murals of Detroit, while dreaming of future solo journeys to Kyoto's temples and Berlin's avant‑garde galleries.
  culinary: Alexander Hausmann, a modest home‑cook, enjoys whipping up avocado toast with smoked salmon, crafting homemade ramen with miso broth and soft‑boiled eggs, and experimenting with quick graphic
    design‑inspired plating of quinoa salads topped with pomegranate seeds, though they often order pizza late at night during project crunch time.
  core: Alexander Hausmann blends disciplined organization with a restless curiosity, channeling a love for street art, code, and mindful routines into a uniquely structured yet creatively adventurous teenage
    life.
background:
  cultural: Alexander grew up in a middle‑class white family of mixed German and Irish heritage in the culturally diverse neighborhoods of Brooklyn, New York. While his household celebrates traditional
    holidays like Christmas and Thanksgiving, his daily life is shaped by the city’s vibrant multicultural scene—gallery openings in Bushwick, indie music venues in Greenpoint, and the eclectic food markets
    of Williamsburg. Exposure to a wide range of artistic expressions and the rhythms of urban life has cultivated his open‑mindedness and appreciation for varied experiences. He speaks English fluently
    and has a basic conversational ability in German from his grandparents.
