personas:
  professional: Thien is an aspiring digital illustrator and indie game creator who channels their disciplined, detail‑oriented mindset into weekly art challenges and prototype jams, constantly refining
    UI layouts and storyboards to compete in school hackathons and online art contests.
  sports: Thien roots for the Vegas Golden Knights and the Las Vegas Raiders, competes in school chess tournaments, regularly joins a local League of Legends youth team for weekend qualifiers, and squeezes
    in quick basketball pick‑up games at the community center to stay physically active.
  arts: Thien draws creative fuel from graphic novels like "Saga" and "Monstress", the neon‑lit installations at the Neon Museum, and the surreal digital canvases of James Jean and Bee the Shooting, often
    merging cyber‑punk aesthetics with traditional calligraphy strokes in their illustrations.
  travel: Thien meticulously plans trips that blend artistic inspiration with adventure, having already visited the Neon Museum and the MoMA in New York, dreaming of a future pilgrimage to Tokyo’s manga
    districts and the Grand Canyon’s sunrise, while balancing a modest allowance and school commitments.
  culinary: Thien enjoys mastering the slow‑simmered broth of pho, layering star anise, ginger, and cinnamon, and expertly folds rice noodles, fresh basil, bean sprouts, and lime wedges, while also experimenting
    with homemade bánh mì and sampling ramen at local eateries.
  core: Thien is a disciplined teen who merges strategic gaming, meticulous illustration, and a love for flavorful pho, all while battling occasional acne flare‑ups and a guilty habit of staying up too
    late polishing pixel art.
background:
  cultural: Thien is a second‑generation Vietnamese American raised in Las Vegas. At home, Vietnamese is spoken and traditions such as Tet, ancestor worship, and family meals featuring pho and banh mi are
    observed. He participates in community events organized by the Vietnamese Association of Nevada and enjoys cultural activities like calligraphy workshops and Lunar New Year festivals. Simultaneously,
    he is immersed in the broader American youth culture of Nevada, attending school clubs, gaming tournaments, and local art exhibitions. This bicultural upbringing blends respect for Vietnamese values
    of family, education, and cultural heritage with the creative, eclectic influences of his metropolitan environment.
