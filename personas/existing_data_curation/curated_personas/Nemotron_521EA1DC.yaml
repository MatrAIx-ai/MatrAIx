  hobbies: '[''Digital illustration'', ''Game prototyping'', ''Competitive chess'', ''E-sports gaming'', ''Reading graphic novels and sci-fi'', ''Visiting art galleries and museums'', ''Vietnamese calligraphy'',
    ''Cooking Vietnamese dishes'', ''Attending community cultural events'']'
  career_goals: Thien aims to attend a specialized STEM‑arts high school, then pursue a college degree that blends computer science with visual arts. He envisions a career as a user‑experience designer
    or concept artist for interactive media, where he can integrate his technical coding skills with his passion for illustration. He also hopes to compete in national coding competitions and build a professional
    portfolio of digital artwork that reflects his Vietnamese heritage. Long‑term, he aspires to launch his own indie game studio that creates culturally‑rich, story‑driven games.
