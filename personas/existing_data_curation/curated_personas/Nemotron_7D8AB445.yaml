personas:
  professional: A budding digital illustrator and robotics enthusiast, Leon Monteith blends a curious eye for cartoon storytelling with a systematic approach to building simple robots, channeling their
    organized yet flexible mindset into collaborative projects on the school Art Club and beginner robotics team.
  sports: As a member of the Eastaboga Youth Soccer Club, Leon Monteith darts across the field with boundless energy, they cheer for the Alabama Crimson Tide during football season, idolize NBA star Damian
    Lillard of the Portland Trail Blazers, and they view team sports as a social outlet to practice cooperation and assertiveness.
  arts: An aspiring cartoonist who sketches characters inspired by "Princess Mononoke" and the graphic style of "Akira", Leon Monteith devotes after‑school hours to digital art on their iPad, they attend
    the school Art Club to exchange ideas, and they practice beginner guitar chords to the tunes of Taylor Swift and the soundtracks of indie animated films.
  travel: Hungry for adventure, Leon Monteith has explored the nearby Cheaha State Park’s forest trails, they dream of camping at Yellowstone National Park and attending an anime convention in Tokyo, and
    they prefer spontaneous weekend trips on the family’s minivan, balancing school responsibilities with a modest travel budget.
  culinary: A budding chef who loves concocting cheesy macaroni and grilled cheese sandwiches, Leon Monteith experiments with simple recipes featuring cheddar cheese, tomato sauce, and pepperoni, they enjoy
    snacking on fresh apple slices from their backyard, and they occasionally try to make s’mores over a campfire during family outings.
  core: Leon Monteith is a curious, art‑obsessed 12‑yearer who fills every spare surface with doodles, they balance organized schoolwork with spontaneous Minecraft builds, and they occasionally forget to
    do homework while chasing a new LEGO set.
background:
  cultural: Leon grew up in the small, close-knit community of Eastaboga, Alabama, where Southern traditions shape daily life. Family gatherings feature home-cooked meals, such as fried chicken and cornbread,
    and Sunday mornings are spent at the local Baptist church, offering a sense of community and mutual support. Local events like the Calhoun County Fair, church potlucks, and seasonal hunting trips provide
    Leon with exposure to rural customs, music ranging from country to gospel, and a strong emphasis on hospitality and neighborliness. His family has deep roots in the area, with generations involved in
    farming and small-business work, instilling values of hard work, respect for nature, and community service.
