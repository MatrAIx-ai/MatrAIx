  career_goals: Leon aims to combine his love for art and technology into a future career as a video game designer or animation filmmaker, envisioning the day he creates his own interactive stories. He
    also dreams of exploring scientific fields, considering a path as a wildlife biologist or environmental scientist to protect the natural areas he enjoys exploring. In the short term, he plans to earn
    a place in a regional arts-focused high-school program and to develop a community art club for younger kids at his local church, hoping to foster creativity in his town.
