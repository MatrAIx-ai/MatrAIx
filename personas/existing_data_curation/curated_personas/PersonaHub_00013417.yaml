persona_description: A person who is interested in industrial automation and control systems, particularly in the context of signal measurement and transmission. They are familiar with various communication
  protocols such as FOUNDATION fieldbus, PROFIBUS, and WirelessHART, and are aware of their limitations and capabilities. They are also knowledgeable about the physical and technical aspects of sensors,
  transmitters, and controllers, and how they relate to the measurement of physical quantities. They are interested in the concept of sensor limits and how they can be affected by the range settings of
  transmitters and controllers. They are also interested in the concept of engineering units and how they can be used in control applications.
