personas:
  professional: Arianne Rose, a budding naturalist and aspiring environmental illustrator, spends afternoons birdwatching along the Kennebec River and translating those observations into detailed sketches,
    while volunteering at the Gardiner public library to hone communication skills and nurture a future in science outreach.
  sports: Arianne Rose enjoys casual weekend hikes with a small circle of friends, occasionally joins the local high school cross‑country club for low‑intensity runs, and prefers the rhythm of walking trails
    along the river to organized team sports, which matches their relaxed approach to fitness.
  arts: Arianne Rose immerses themselves in several creative outlets, strumming acoustic covers of Joni Mitchell and playing original melodies on a worn guitar, sketching birdlife inspired by Audubon, knitting
    patterned scarves reminiscent of folk art, and losing themselves in the worlds of J.K. Rowling and Brandon Sanderson.
  travel: Arianne Rose favors low‑key nature getaways, having explored Acadia National Park and the charming streets of Portland, Maine, while dreaming of backpacking the Scottish Highlands to see castles
    and remote lochs after graduation, always planning trips through school club newsletters rather than expensive agencies.
  culinary: Arianne Rose experiments with simple comfort dishes such as cinnamon‑spiced blueberry muffins, skillet honey‑glazed salmon, and homemade vegetable soup, delighting family with the occasional
    surprise, yet they sometimes forget to clean up the kitchen promptly, leaving a lingering scent of burnt toast.
  core: Arianne Rose balances a quiet curiosity for nature and art with a laid‑back, slightly disorganized lifestyle, turning birdwatching trips into sketchbooks, knitting into friendly gifts, and modest
    savings into occasional crafts sales.
background:
  cultural: 'Arianne comes from a multi‑generational White New England family that has deep roots in the Gardiner area of Maine. Her upbringing reflects the modest, community‑oriented values typical of
    small‑town life in the region: a respect for self‑reliance, strong ties to the natural environment, and participation in local traditions such as town fairs, seasonal festivals, and church gatherings
    at the nearby Protestant congregation. Her family places importance on education, volunteerism, and maintaining harmony within the close‑knit community.'
