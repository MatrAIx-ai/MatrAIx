  career_goals: Arianne aims to combine her love of nature with her practical skill set. In the medium term she plans to complete her high‑school education—potentially via a GED—and pursue an apprenticeship
    in carpentry or a related trade to gain hands‑on experience while supporting herself. Long‑term, she hopes to study environmental science or natural resources management, with the ambition of working
    in forest conservation or sustainable forestry in Maine. She also envisions staying involved in her community by mentoring younger students and contributing to local environmental projects, keeping
    her plans flexible enough to adapt to new opportunities.
