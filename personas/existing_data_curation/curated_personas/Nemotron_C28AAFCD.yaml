  hobbies: '[''Reading African American literature'', ''Watercolor painting'', ''Attending local theater performances'', ''Gardening native California plants'', ''Cooking traditional family recipes'', ''Participating
    in book clubs'', ''Volunteer storytelling sessions'', ''Learning digital photography'', ''Traveling to cultural festivals'', ''Listening to jazz and gospel music'']'
  career_goals: Although retired, Ayesha aims to leave a lasting cultural legacy in Riverside. She plans to author a memoir and compile an oral‑history anthology of Black elders in the region, collaborating
    with the local library. She hopes to serve on the advisory board of the Riverside Museum to help curate exhibitions that highlight African‑American contributions to California. Ayesha also aspires to
    launch a mentorship program that pairs senior volunteers with high‑school artists, and she intends to continue learning new digital photography techniques to document community stories.
