personas:
  professional: Ayesha Gantt, a retired community event planner turned cultural archivist, uses their vivid imagination and organizational flexibility to design intergenerational storytelling festivals,
    mentor emerging artists, and digitize oral histories for the Riverside library while navigating the occasional tech glitch with a spirited laugh.
  sports: Ayesha Gantt, an avid supporter of the Los Angeles Dodgers and Los Angeles Lakers, joins the Riverside senior walking club for morning strolls through the arboretum, attends local high‑school
    volleyball games as a cheerleader, and enjoys occasional pickleball matches at the community center, though they admit to a weakness for staying up late to watch night games.
  arts: Ayesha Gantt, a watercolor enthusiast who paints abstract scenes inspired by Miles Davis and the desert sunrise, regularly attends Riverside’s Art Museum openings, quotes Toni Morrison in their
    journals, and volunteers at a local theater’s backstage crew, while occasionally getting lost in a day‑long gallery crawl that leaves them exhausted but exhilarated.
  travel: Ayesha Gantt, a curious traveler who has explored New Orleans during the Jazz & Heritage Festival, trekked through Joshua Tree’s succulent‑filled canyons, taken weekend trips to Santa Barbara’s
    shoreline, and dreams of visiting Savannah to trace the roots of the Southern culinary traditions that shape their cooking, yet they often pack too many books for the journey.
  culinary: Ayesha Gantt, a soulful cook whose kitchen is perfumed with simmering gumbo, collard greens slow‑cooked with smoked turkey, and sweet potato pie topped with toasted pecans, delights neighbors
    with a weekly potluck, experiments with avocado‑lime glaze for grilled salmon, and occasionally over‑spices a dish when humming gospel choruses.
  core: Ayesha Gantt, a 70‑year‑old storyteller, painter, and community champion, blends Southern traditions with Southern‑California vibrancy, mentoring youth while humming gospel tunes, and unapologetically
    indulges in late‑night jazz and extra‑spicy gumbo.
background:
  cultural: Ayesha is a second‑generation African‑American whose parents migrated from the American South during the Great Migration. Growing up during the Civil Rights era, she experienced both the challenges
    of segregation and the empowerment of community activism. Her cultural identity is rooted in oral storytelling, gospel music, and soulful cuisine, all of which she continues to celebrate. Living in
    Riverside, she has woven Southern Black traditions with the multicultural fabric of Southern California, often engaging in cross‑cultural exchanges with the city’s large Hispanic community while maintaining
    a deep reverence for her own heritage.
