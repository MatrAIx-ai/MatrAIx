personas:
  professional: Susan Stephens leverages her senior full‑stack engineering expertise, machine‑learning research background, and love for generative code to design scalable AI‑driven art platforms, while
    mentoring junior developers with a blend of technical rigor and creative encouragement, even as her relaxed approach to deadlines sometimes leads to last‑minute sprint crunches.
  sports: Susan Stephens enjoys seasonal hiking in the Cascades, joins a local rock‑climbing gym for bouldering sessions, follows the Seattle Seahawks and Seattle Sounders with fervor, and participates
    in a monthly pick‑up volleyball game at the community center, but her competitive streak often turns casual matches into intense score‑keeping battles.
  arts: Susan Stephens immerses herself in the intersection of code and canvas, drawing inspiration from digital pioneers like Refik Anadol and Casey Reas, attending intimate gallery openings featuring
    mixed‑media installations, and playing meditative cello pieces by Yo‑Yo Ma, while also curating a small board‑game group that explores narrative storytelling.
  travel: Susan Stephens prefers meticulously planned yet flexible trips that blend solitude and inspiration, having trekked the misty forests of Iceland’s Snæfellsjökull, explored the art districts of
    Kyoto, and dreaming of a future solo retreat in New Zealand’s Southern Alps where she can prototype immersive AR experiences in remote settings.
  culinary: Susan Stephens favors artisanal Pacific Northwest cuisine, often cooking smoked salmon with dill and pickled wild mushrooms while sipping single‑origin Ethiopian coffee, yet she admits to a
    guilty pleasure of ordering sushi rolls topped with tempura flakes from her favorite downtown spot when work deadlines loom.
  core: Susan Stephens blends high‑tech ambition with a habit of night‑time sketch‑coding, a competitive edge that fuels both code reviews and board‑game nights, and an undercurrent of worry that prompts
    frequent meditation breaks and occasional impulsive spending on creative gear.
background:
  cultural: Susan grew up in a middle-class white family in the Pacific Northwest, with deep roots in the region’s Anglo-American heritage. Her upbringing combined a love for the outdoors—spending weekends
    exploring the rain-soaked forests of Washington—with exposure to the burgeoning tech scene of Seattle and Portland. The local culture’s emphasis on self-reliance and environmental stewardship shaped
    her independent, skeptical outlook. While she values the region’s progressive artistic community, she also carries a subtle appreciation for the classic literature and folk music of her European ancestry,
    which informs her creative sensibilities.
