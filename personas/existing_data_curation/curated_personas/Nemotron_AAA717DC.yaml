  career_goals: She aims to lead a cross-disciplinary team that pioneers interactive AI-driven art platforms, eventually founding a startup that merges computational creativity with immersive experiences.
    Over the next five years, Susan plans to publish research on creative algorithms, become a recognized thought leader at conferences that bridge tech and art, and secure a senior technical leadership
    role that affords her the flexibility to pursue independent projects. She also aspires to mentor more women in tech and promote mental-health-friendly workplace practices, reflecting her own sensitivity
    to stress and competitive drive.
