personas:
  professional: Suzanne Burrus, a seasoned customer service specialist with a talent for empathetic problem solving, blends her clear, friendly communication style and CRM expertise with a practical curiosity
    for new processes, while assertively mentoring peers and pursuing a Certified Customer Service Professional credential to transition into a supervisory role, and they consistently champion a team‑first
    mindset.
  sports: Suzanne Burrus energizes her weekends by leading a Zumba class at the Westchester Community Center, practicing yoga at Sunrise Studio, hiking the Appalachian Trail segments with the Westchester
    Trail Hikers, and cheering for the New York Yankees and Knicks, while also enjoying bridge nights at the local senior center, and they consider staying active a vital part of their balanced lifestyle.
  arts: Suzanne Burrus immerses herself in the arts through an active book club that reads Celeste Ng and Jane Austen, curates dinner‑party playlists ranging from Miles Davis to Adele, and attends monthly
    performances at the Westchester Playhouse, where they especially enjoy contemporary dramas.
  travel: Suzanne Burrus loves traveling with her husband, alternating between meticulously planned week‑long tours of Tuscany’s vineyards and spontaneous weekend escapes to Hudson Valley wineries, always
    seeking a blend of cultural immersion and relaxed leisure within a modest budget, and they relish discovering new destinations together.
  culinary: Suzanne Burrus delights in cooking for friends, mastering dishes like herb‑crusted salmon, roasted vegetable lasagna, and fresh caprese salad, sourcing basil, heirloom tomatoes, and locally
    harvested asparagus from farmers’ markets to elevate her signature dinner soirées, and they take pride in creating a welcoming atmosphere through food.
  core: Suzanne Burrus is a sociable, curiosity‑driven 49‑year‑old who thrives on group activities and flexible schedules, yet they habitually misplace garden tools and procrastinate on filing taxes until
    the deadline looms.
background:
  cultural: Suzanne was raised in a middle‑class, predominantly white suburb of New York, absorbing mainstream American cultural values such as self‑reliance, community involvement, and a strong work ethic.
    Her family traditions include celebrating major U.S. holidays, occasional church attendance, and emphasizing the importance of family gatherings. Living in Scarsdale, an affluent and diverse community,
    she values education, civic engagement, and multicultural awareness, which shape her outlook and interactions.
