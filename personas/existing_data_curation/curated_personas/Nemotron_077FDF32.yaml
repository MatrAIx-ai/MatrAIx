  career_goals: Suzanne aims to move into a supervisory or team‑lead position within the next few years, where she can mentor new representatives and shape the customer experience strategy. She plans to
    obtain a Certified Customer Service Professional credential and consider an associate degree in business administration to broaden her managerial skill set. Long‑term, she hopes to leverage her people‑skills
    into a community outreach or training role that blends her love for social interaction with flexible work arrangements, allowing her to balance career growth with family life.
