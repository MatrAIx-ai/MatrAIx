personas:
  professional: Pedro Jaquez, a middle‑school student who channels his love for constructing LEGO vehicles and mastering Rocket League into an emerging talent for strategic problem‑solving, blends their
    preference for structure with a competitive drive, often leading class group projects while sometimes doubting teammates’ motives and feeling intense anxiety when outcomes are uncertain.
  sports: Pedro Jaquez thrives on after‑school soccer matches in his local youth league, idolizes the LA Galaxy as his professional team, trains three times weekly at the Sunrise Soccer Club, and uses the
    sport’s routine to channel their boundless energy, even as anxiety makes them overthink each play and worry about missing goals.
  arts: Pedro Jaquez spends evenings dancing to Los Tigres del Norte and Lila Downs at community gatherings, collects Fortnite and Rocket League soundtracks on vinyl, and lets the lively rhythms fuel their
    LEGO building sessions, a blend of cultural pride and modern gaming culture that defines their creative outlet.
  travel: Pedro Jaquez prefers family‑planned road trips that mix adventure with familiar comforts, recalling a memorable weekend at the Grand Canyon and dreaming of exploring the historic plazas of Oaxaca
    next summer, while their parents balance travel costs with careful budgeting, allowing them to save for future journeys.
  culinary: Pedro Jaquez loves helping in the kitchen, mastering fresh salsa verde made with tomatillos and jalapeños, assembling street‑style tacos with grilled carne asada, and shaping masa for tamales,
    showcasing a budding chef’s confidence while occasionally over‑seasoning in their eagerness to impress friends.
  core: Pedro Jaquez is a high‑energy 12‑year‑old who balances competitive gaming and meticulous LEGO building with bouts of anxiety that drive them to over‑plan every soccer drill, yet they rarely resist
    a late‑night snack of nachos.
background:
  cultural: Pedro comes from a Mexican‑American family that maintains strong ties to Mexican traditions while adapting to life in East Texas. He speaks Spanish at home with his parents and grandparents
    and uses English at school and with peers, making him comfortably bilingual. He celebrates Día de los Muertos and Cinco de Mayo with family altars, traditional foods, and music. His family attends a
    Catholic parish, where community events reinforce values of respect and hard work. Growing up in Gilmer, he experiences a blend of rural Texan culture—county fairs, high‑school football—and Mexican
    cultural practices, shaping a hybrid identity that values family unity, hospitality, and perseverance.
