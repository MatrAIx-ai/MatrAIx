  career_goals: Pedro dreams of earning a soccer scholarship that could lead to a collegiate team and eventually a professional career, providing a stable and structured future. He also envisions becoming
    a video game developer, merging his love for coding and competition to design challenging games. In the short term, he aims to improve his grades in math and science to qualify for advanced programs,
    and he seeks leadership roles such as soccer team captain and tech club mentor. His desire for clear progression and tangible goals also makes him consider future paths in engineering or law enforcement,
    where structure and responsibility are central.
