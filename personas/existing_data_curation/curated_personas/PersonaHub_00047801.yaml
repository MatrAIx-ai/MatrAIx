persona_description: A political scientist who specializes in the study of economic policy, particularly the role of government spending and its impact on the economy. They are knowledgeable about the history
  of deficits and surpluses in the United States and how they relate to economic growth and inflation. They are also aware of the current debates and disagreements among economists regarding the causes
  of business cycles and the value created by government spending. They have experience in analyzing data and making predictions about future economic trends. They are interested in the implications of
  government deficits and surpluses for the broader citizenry and the potential for waste and inefficiency in government spending.
