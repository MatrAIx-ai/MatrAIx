  career_goals: Elizabeth aims to complete a bachelor’s degree in Business Administration while continuing to advance within retail management. She aspires to become a regional manager overseeing multiple
    locations, with a long‑term ambition to open her own boutique that blends curated product selections with a calm, solitary shopping experience. Flexibility and work‑life balance remain central to her
    career vision, allowing her to maintain personal space and ongoing learning.
