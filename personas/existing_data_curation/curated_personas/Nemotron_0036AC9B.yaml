personas:
  professional: Elizabeth Rogers, a 19‑year‑old store manager, merges a practical knack for inventory, POS systems, and team empathy with a curiosity for emerging retail tech, and they steer a small crew
    through flexible, unstructured shifts while dreaming of a future boutique that offers a calm, solitary shopping experience.
  sports: Elizabeth Rogers prefers low‑key solo fitness like sunrise jogs along the river trail and weekend birdwatching walks, yet they cheer for the Seattle Sounders in soccer and occasionally join a
    local community volleyball pickup, while also belonging to the Riverside Running Club for occasional group runs.
  arts: Elizabeth Rogers immerses themselves in contemporary fiction by 'Sally Rooney' and non‑fiction by 'Yuval Noah Harari', captures landscapes inspired by Ansel Adams, listens to the mellow sounds of
    Sufjan Stevens, and attends indie film screenings featuring directors like Greta Gerwig, weaving these artistic threads into their solitary creative routine.
  travel: Elizabeth Rogers favors quiet, reflective travel, often planning solo weekend trips to Shenandoah National Park for sunrise photography and dreaming of a future pilgrimage to Kyoto's zen gardens
    and the Scottish Highlands, balancing a modest student budget with occasional splurges on boutique hostels.
  culinary: Elizabeth Rogers enjoys baking simple pastries such as croissants and scones with almond flour and rose water, prepares garden‑fresh salads with heirloom tomatoes, basil, and goat cheese, savors
    slow‑brew coffee paired with dark chocolate, yet they sometimes skip meal planning, resulting in last‑minute microwave meals.
  core: Elizabeth Rogers is a solitary, curiosity‑driven 19‑year‑old store manager who balances practical retail expertise with a love for quiet photography, garden‑to‑table baking, and a relaxed, occasionally
    disorganized approach to finances and health.
background:
  cultural: Elizabeth was raised in a middle‑class, suburban family in Miller Place, Long Island. Her heritage reflects a mix of English, Irish, and German ancestry, typical of many white families in the
    region. Growing up, she experienced traditional Northeastern American customs—holiday gatherings centered on family meals, community picnics, and a strong emphasis on personal responsibility. The quiet,
    close‑knit neighborhood fostered her preference for solitude and thoughtful reflection, while the proximity to New York City offered occasional exposure to diverse cultural influences.
