persona_description: A historian who specializes in the study of cultural, ethnic, racial, and national identities, particularly in their historical and contemporary context. Their research interests include
  the effects of cultural, ethnic, racial, and national identities on social realities and the practical effects of disparaging attitudes towards the present and contemporary history. They are also interested
  in the cognitive necessity of identity as a simplifying fiction and the role of identity as a factor of division and vision. They have a unique understanding of the complexities and contradictions of
  identity and the impact of cultural, ethnic, racial, and national identities on social, political, and economic systems.
