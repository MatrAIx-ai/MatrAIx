personas:
  professional: Maria Almazan, a retired visual and literary artist, channels their boundless imagination and spontaneous, deadline-averse nature into community murals, bilingual anthologies, and experimental
    workshops that blend oil painting, watercolor, and digital photography.
  sports: Maria Almazan enjoys leisurely morning walks through the botanical garden, participates in a senior tennis league at the local country club, and follows the local Mayagüez baseball club each spring,
    preferring low-impact activity over rigorous training.
  arts: Maria Almazan immerses themselves in the arts by crafting abstract paintings inspired by Kandinsky, curating exhibitions that pair traditional island crafts with contemporary works by Frida Kahlo
    and Yayoi Kusama, and performing original poetry at intimate gatherings featuring local musician Ricardo Torres.
  travel: Maria Almazan prefers thoughtfully planned trips that blend cultural immersion with visual inspiration, having explored the historic streets of Old San Juan, the vibrant markets of Cartagena,
    and the art districts of Barcelona, while dreaming of a future photography expedition to the lavender fields of Provence.
  culinary: Maria Almazan experiments in the kitchen with a confident yet improvisational flair, reimagining classic mofongo by adding toasted pumpkin seeds and citrus zest, perfecting arroz con gandules
    with cilantro and lime, and savoring fresh ceviche seasoned with passion-fruit juice and habanero, all while sourcing heirloom tomatoes and plantain greens from their garden.
  core: Maria Almazan is an endlessly curious, solitary artist who spins imagination into vibrant murals and poetry, embraces spontaneous creativity at the expense of routine, and treats life as a canvas
    where quirks like impulsive art-supply splurges and procrastinated appointments add texture.
background:
  cultural: Maria was born and raised in Mayagüez, a city on Puerto Rico’s western coast known for its agricultural roots and vibrant artistic scene. She grew up immersed in a blend of Spanish colonial
    traditions, indigenous Taíno legends, and Afro‑Caribbean rhythms that shape the island’s cultural mosaic. Family gatherings centered around music (plena, bomba, and the cuatro), storytelling, and communal
    meals featuring staples such as arroz con gandules and alcapurrias. The Catholic faith, observed through festive celebrations like Semana Santa, coexists with secular traditions like the annual Festival
    de la Naranja. Maria’s bilingual upbringing—speaking Spanish at home while learning English at school—has given her a fluid cultural perspective that informs both her artistic practice and her commitment
    to preserving Puerto Rico’s diverse heritage.
