  hobbies: '[''Gardening and botanical sketching'', ''Painting (oil & watercolor)'', ''Digital photography'', ''Poetry writing'', ''Reading modern literature and art criticism'', ''Innovative cooking'',
    ''Small‑group art discussions'', ''Attending local cultural festivals'']'
  career_goals: Although retired, Maria aims to leave a lasting cultural imprint. She plans to complete a series of large‑scale abstract murals in community spaces across Mayagüez that celebrate the island’s
    Taíno and Afro‑Caribbean heritage. She aspires to publish a bilingual anthology of her poems and family memoirs, preserving personal and communal histories. Maria also hopes to mentor emerging local
    artists through monthly workshops, fostering a spirit of critical inquiry and artistic experimentation. In the coming years, she intends to master advanced digital art tools (e.g., Procreate, Adobe
    Photoshop) to blend traditional painting with new media, and to curate an exhibition that juxtaposes historical artifacts with contemporary interpretations.
