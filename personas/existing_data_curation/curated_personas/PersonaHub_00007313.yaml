persona_description: A mother who is a Type 1 diabetic and has two children with diabetes. She is a positive thinker and advocates for the power of positive thinking in managing diabetes. She is involved
  in the American Diabetes Association's Step Out Walk to Fight Diabetes and is a child ambassador for the local ADA's Tour de Cure ride next May. She is also a participant in the Type 1 Diabetes TrialNet
  at Vanderbilt, a research project that aims to find the causes, prevention, and early treatment of the disease.
