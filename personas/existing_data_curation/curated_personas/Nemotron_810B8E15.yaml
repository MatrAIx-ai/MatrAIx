personas:
  professional: Peter Hines, a playful aspiring veterinarian who spends afternoons in the backyard “clinic” treating stuffed animals, blends boundless curiosity about animal biology with a practical habit
    of using a simple first‑aid kit, and his natural compassion turns every pretend surgery into a cooperative game.
  sports: Peter Hines, a spirited participant in the neighborhood Little League soccer league during spring and the community splash‑pad swimming classes in summer, proudly wears a jersey with his favorite
    number 7 while cheering for the Chicago Cubs on game nights, and treats every practice as a chance to make new friends and stay active.
  arts: Peter Hines, an enthusiastic fan of the animated series Bluey, spends evenings drawing his favorite characters with Crayola crayons while humming the tune of Raffi's 'Baby Beluga' and delightfully
    imitates the dance moves from a kid‑friendly YouTube channel.
  travel: Peter Hines, who dreams of revisiting the local aquarium that sparked his love for marine life and has already taken a family road trip to the Great Smoky Mountains, prefers spontaneous day‑trips
    over meticulously planned vacations, but his parents often guide him using a colorful travel map dotted with stickers of places like Disneyland and the Grand Canyon.
  culinary: Peter Hines, who declares grilled cheese with extra cheddar and a side of apple slices as his ultimate meal, enjoys helping his parent stir mac and cheese while carefully sprinkling a pinch
    of paprika, and delights in trying new foods like sushi rolls (with avocado only) at family celebrations.
  core: Peter Hines balances boundless curiosity and gentle compassion with a disorganized love for spontaneous play, often leaving toys scattered after a day of imaginative vet‑clinic adventures.
background:
  cultural: Peter is raised in Medford, Wisconsin, a small Midwestern town in Marathon County characterized by close‑knit community values and seasonal outdoor activities. His family’s cultural backdrop
    reflects typical white Midwestern American traditions—participation in local fairs, community church gatherings, and seasonal celebrations such as Oktoberfest and county fairs. These influences foster
    a sense of modesty, politeness, and a strong connection to nature and local heritage, shaping his outlook on cooperation, practicality, and community service.
