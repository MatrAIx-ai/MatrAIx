  hobbies: '[''building LEGO® sets'', ''drawing and coloring'', ''nature exploration'', ''collecting leaves and rocks'', ''listening to children’s music'', ''reading picture books'', ''cooperative outdoor
    games'', ''solo sketching'']'
  career_goals: Peter dreams of future roles where he can help others and stay connected to the outdoors. He often talks about becoming a firefighter who rescues people and animals, a veterinarian who cares
    for pets, or a teacher who shares stories and knowledge. His ambitions are shaped by his compassionate nature and desire to maintain harmony, and he envisions a career that blends practical problem‑solving
    with caring for his community.
