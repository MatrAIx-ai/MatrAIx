  career_goals: Though still a toddler, Saara shows interest in caring for others and exploring how things work. She often pretends to be a teacher or doctor, expressing a budding desire to help people
    and learn about the world. Her future aspirations may lean toward professions that combine curiosity, compassion, and practical problem solving, such as a pediatric nurse, early childhood educator,
    or community health worker.
