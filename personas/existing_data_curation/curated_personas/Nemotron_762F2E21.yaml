personas:
  professional: Saara Pillai is a budding little architect who organizes block towers in neat rows yet delights in improvising whimsical bridges, showcasing a balance of curiosity and practicality, reliably
    tidying up after play while occasionally asserting strong preferences for the tallest structure, and often worries about the stability of their creations.
  sports: Saara Pillai is a toddler soccer enthusiast who attends a weekly Preschool Play Soccer program, cheerfully cheering for the local Seattle Seahawks while also enjoying organized water play at the
    community pool, balancing energetic group activities with occasional solitary practice of kicking a ball against the driveway, and they sometimes worry about falling and getting a scrape.
  arts: Saara Pillai is a little artist who loves drawing vibrant dinosaurs with Crayola crayons, often humming along to The Wiggles and quoting Dr. Seuss, proudly showcasing both a well‑worn favorite coloring
    book and a new sketchpad they recently discovered, reflecting their blend of appreciation for familiar creative routines and curiosity for fresh artistic ideas, while they occasionally become upset
    when a drawing is critiqued.
  travel: Saara Pillai is a miniature explorer who has visited the local zoo, the beach of Santa Monica, and recently experienced the bright lights of Disneyland, preferring carefully planned day trips
    with a stroller route map but also delighting in spontaneous puddle splashing along the way, and they sometimes feel anxious about traveling on airplanes and missing their bedtime routine.
  culinary: Saara Pillai is a picky eater who adores creamy mac and cheese and sweet mango slices, occasionally experimenting with bite‑sized broccoli florets after gentle coaxing from a parent, managing
    a delicate balance between their practical love for familiar flavors and a curious willingness to try new textures, though they often worry about food messes.
  core: Saara Pillai is a curious yet practical three‑year‑old who balances order and spontaneity, shows cooperative assertiveness, worries often, and embraces exploration in play, food, and learning.
background:
  cultural: Saara is raised in a South Asian family in Watertown, MA. Her home blends Indian cultural practices—such as speaking Hindi and celebrating Diwali and Holi—with American customs. She is exposed
    to South Asian music, cuisine, and values of family cohesion, while also participating in the local community’s diverse activities. The multicultural environment supports her bilingual development and
    introduces her to a rich tapestry of traditions, food, and festivals.
