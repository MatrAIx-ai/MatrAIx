personas:
  professional: Esther Frazier, a seasoned personal lines insurance specialist, combines meticulous risk assessment, deep regulatory knowledge, and crystal‑clear communication to craft tailored policies
    for families and retirees while methodically mentoring junior agents with a steady, structured hand.
  sports: Esther Frazier enjoys low‑impact fitness, walking the Riverside Park trail with the Jacksonville Senior Strollers club, follows the Jacksonville Jaguars for football, participates in a spring
    senior softball league, and attends weekly gentle yoga sessions at Sunrise Senior Fitness Club to stay flexible.
  arts: Esther Frazier immerses themselves in historical fiction and biographies, discussing works by Ken Follett and Philippa Gregory in a close‑knit book club, enjoys folk‑rock from Alison Krauss, occasionally
    knits while listening to classical piano, and attends the Jacksonville Theatre’s productions such as A Streetcar Named Desire.
  travel: Esther Frazier favors well‑planned, low‑stress itineraries that highlight historic towns and natural beauty, taking weekend road trips to Savannah, Georgia, exploring the Blue Ridge Parkway in
    the fall, and dreaming of a guided tour of England’s Tudor castles, all while balancing a part‑time consulting schedule and a modest travel budget.
  culinary: Esther Frazier delights in cooking Southern comfort dishes like shrimp and grits, fried chicken, and collard greens, often experimenting with seasonal heirloom tomatoes, fresh basil, and locally
    sourced okra, and possesses solid cooking skills that allow them to host cozy dinner gatherings with friends and family.
  core: Esther Frazier blends disciplined professionalism with a quiet love of nature, books, and community service, finding comfort in routine while quietly pushing themselves toward mentorship, lifelong
    learning, and modest culinary adventures.
background:
  cultural: Esther was raised in the American South and embodies many aspects of Southern cultural values, including a strong sense of hospitality, community involvement, and an appreciation for tradition.
    Her family background is rooted in generational ties to Florida's Gulf Coast, where church participation and family gatherings have shaped her worldview. As a white Floridian, she reflects the region's
    blend of coastal leisure and pragmatic work ethic, balancing respect for longstanding customs with the evolving diversity of Jacksonville's urban environment.
attributes:
  skills: '["Life insurance sales", "Health insurance advisory", "Homeowners and renters coverage", "Risk assessment", "Client needs analysis", "Regulatory compliance", "Customer relationship management
