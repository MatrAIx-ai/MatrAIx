    communication"]'
  hobbies: '["Gardening", "Bird watching", "Reading historical fiction", "Knitting", "Volunteer teaching computer basics at senior center", "Small book club participation", "Cooking Southern cuisine", "Gentle
    yoga", "Walking on the beach", "Participating in local historical society events"]'
  career_goals: Esther aims to transition into a senior advisory role within her agency, focusing on mentorship and training of new agents while continuing to serve her established client base. She plans
    to earn the Chartered Life Underwriter (CLU) designation to deepen her technical knowledge and credibility. Over the next five years, she hopes to increase her portfolio of high‑value clients by 20%,
    expand her specialty in serving retirees and small family‑owned businesses, and eventually move into a part‑time consulting capacity that allows her to share best practices across the regional market
    while maintaining a balanced lifestyle.
