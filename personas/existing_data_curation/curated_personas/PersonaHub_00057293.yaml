persona_description: A historian and archaeologist who specializes in the exploration and preservation of historical sites related to the Mormon migration to Utah. They are particularly interested in the
  Ute Crossing and the Mormon Crossing, and have conducted research and written about the history of the region. They are knowledgeable about the logistics of the migration, including the need for a southern
  corridor to approach the land north and south of the Grand Canyon, and the challenges of building a ferry and managing the river banks to support the operation of the ferry. They have a deep appreciation
  for the contributions of Jacob Hamblin and the other pioneers who helped to open up the region for settlement and commerce.
