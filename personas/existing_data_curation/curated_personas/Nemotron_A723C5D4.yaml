personas:
  professional: Rajnish Datta is a high‑school robotics enthusiast who combines practical, hands‑on problem solving with a relaxed attitude toward deadlines, thriving in collaborative club projects while
    often spontaneously taking charge of building simple competition robots for local events.
  sports: Rajnish Datta is an energetic teen who organizes pickup cricket matches at the neighborhood park and plays basketball after school, cheering for the Los Angeles Lakers in the NBA and following
    the Mumbai Indians during cricket season, preferring informal, flexible play over rigid team schedules.
  arts: Rajnish Datta immerses themselves in Bollywood pop and hip‑hop playlists, practices bhangra dance steps with siblings, and draws inspiration from artists such as Badshah, Ariana Grande, and BTS,
    often humming their favorite tracks while tinkering with robotics projects.
  travel: Rajnish Datta favors short, budget‑friendly trips like weekend hikes in the nearby state park and dreams of exploring Tokyo’s Akihabara district, balancing a love for gaming culture with careful
    family budgeting and a desire for new experiences.
  culinary: Rajnish Datta delights in cooking alongside their mother, experimenting with spiced lentil soups, butter chicken, and homemade samosa fillings while mastering a perfect scrambled‑egg breakfast,
    and occasionally treats themselves to a pepperoni pizza after a long gaming session.
  core: Rajnish Datta is a sociable, structure‑oriented teen who blends a passion for robotics, sports, and music with journaling for stress relief, modest saving habits, and a habit of improvising in the
    kitchen.
background:
  cultural: Eighth‑grade Rajnish is a first‑generation American of Indian descent, born to parents who immigrated from West Bengal. At home, he speaks both English and Bengali, and his family maintains
    cultural traditions such as celebrating Diwali and Durga Puja, cooking traditional meals like aloo gobi and fish curry, and attending a local Hindu temple in Raleigh for community events. While growing
    up in Salisbury, he balances the collectivist values emphasized by his family—respect for elders, emphasis on education, and close family ties—with the more individualistic culture of his school and
    peers. This bicultural environment influences his worldview, fueling his desire to create technology that bridges cultural gaps.
