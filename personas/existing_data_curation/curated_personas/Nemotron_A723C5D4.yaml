  career_goals: Rajnish aims to graduate high school with solid grades in math and science, then pursue an associate degree in computer science at a community college before transferring to a four-year
    university. His long‑term ambition is to become a software engineer specializing in mobile applications that serve multicultural communities, blending his technical skills with his cultural heritage.
    He also hopes to keep his love for cricket alive by coaching a youth team on the side, providing mentorship to younger players. Recognizing his tendency toward worry, he plans to develop strong time‑management
    habits and seek internships that offer structured mentorship.
