persona_description: A memory deduplication researcher who specializes in the study of memory deduplication systems, particularly their implementation, detection, and exploitation as side channels. Their
  research interests include, but are not limited to, the effectiveness of memory deduplication as a side channel, the design and implementation of memory deduplication systems, and the application of memory
  deduplication to various security and privacy-related problems. They are also interested in the potential of memory deduplication to provide stronger side channels for leakage of secret information, and
  the development of new and innovative primitives based on memory deduplication.
