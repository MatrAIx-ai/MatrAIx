personas:
  professional: Betty Brewer, a meticulous middle‑school coder who creates educational games on Scratch, volunteers at the county library, and dreams of designing wildlife‑themed apps that blend their love
    of mystery books and birdwatching, demonstrates they plan each project step by step.
  sports: Betty Brewer, a devoted fan of the Chicago Cubs and a member of their school's cross‑country team, enjoys weekend hikes with Girl Scouts, practices basic soccer drills at the community park, and
    they balance their love of nature with a moderate commitment to fitness.
  arts: Betty Brewer, an acoustic‑guitar enthusiast who sketches meadow scenes in watercolor and finds inspiration in folk artists like Mumford & Sons and the lyrical storytelling of Ed Sheeran, regularly
    participates in the local community theater’s youth choir and they blend artistic hobbies with their love of mystery literature.
  travel: Betty Brewer, an organized explorer who plans trips with detailed checklists, loves weekend drives to historic Galena, dreams of a summer road‑trip to Yellowstone National Park, and they cherish
    family outings to the nearby Lake Michigan shoreline during school breaks.
  culinary: Betty Brewer, an intermediate baker who perfects chocolate chip cookies with a secret pinch of sea salt and delights in cooking garden harvests like roasted zucchini and tomato basil pasta,
    often sharing their culinary creations at Girl Scout meetings and neighborhood potlucks, and they enjoy experimenting with seasonal flavors.
  core: Betty Brewer blends Midwestern practicality with boundless curiosity, juggling methodical project‑planning, a disciplined allowance habit, and a love for nature‑inspired art, all while they occasionally
    indulge in sweet treats and spontaneous sketching sessions.
background:
  cultural: 'Betty was raised in a white, Midwestern family in Colchester, Illinois, with deep roots in the region dating back to German and Irish ancestors. Her upbringing reflects classic Midwest values:
    community involvement, modesty, hard work, and a strong sense of neighborliness. Family gatherings often feature church potlucks, Fourth of July picnics, and the annual county fair. These experiences
    have instilled in her a respect for tradition while encouraging curiosity about the wider world.'
