  career_goals: Betty dreams of attending a high school with strong STEM opportunities, eventually earning a degree in environmental science or veterinary technology. She hopes to combine her love for animals,
    nature, and community service by working as a sustainability coordinator for a local farm cooperative, helping her rural town adopt greener practices. She also envisions a future where she can mentor
    younger kids, perhaps as a teacher or youth program leader, reflecting her caring and reliable nature.
