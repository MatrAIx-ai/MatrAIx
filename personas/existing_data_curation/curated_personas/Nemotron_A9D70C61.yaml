background:
  cultural: Shanice is a Black child raised in the close‑knit community of Hampstead, Maryland, within Carroll County. Her family embraces African‑American cultural traditions, celebrating occasions like
    Juneteenth, church gatherings, and soul‑food meals that bring extended family and neighbors together. The local rural‑suburban atmosphere blends Southern Maryland values—such as a strong sense of community,
    outdoor recreation, and family‑centered events—with the rich heritage of Black music, storytelling, and communal support. These cultural influences shape her early experiences, fostering a love for
    group harmony, shared celebrations, and a deep respect for both her roots and her local community.
