  career_goals: Daniel aims to advance to a senior director or vice‑presidential role overseeing operations for a mid‑size, sustainability‑focused company in the Boulder area. He plans to deepen his expertise
    in lean management and obtain a PMP certification within the next two years. His ambition is to lead organization‑wide initiatives that reduce operational waste by at least 15%, improve employee retention
    through structured development programs, and embed reliable, routine‑driven processes that free his team for creative problem‑solving. Balancing his career progression with family stability, he also
    seeks to maintain a predictable work schedule that supports his married life.
