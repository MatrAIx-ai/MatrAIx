  career_goals: Judith aims to secure a stable, upward‑moving career within retail or local government that offers a predictable routine and clear advancement path. Over the next three to five years, she
    plans to complete an associate degree in business administration, qualify for a shift‑lead or assistant manager role at her current store, and eventually become a store manager. She also envisions transitioning
    to a clerical position in the Gallia County administration, where her methodical skills and reliability would support a low‑stress, long‑term employment environment. Financial security and a balanced
    work schedule are key motivators, helping her manage stress and worry.
