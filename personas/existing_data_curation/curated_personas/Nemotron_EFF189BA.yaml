  hobbies: '["Gardening (vegetable and perennial beds)","Reading historical fiction and classic literature","Hiking local trails (Exeter River Trail, Mount Major)","Birdwatching and nature journaling","Knit‑and‑stitch
    group at the community center","Volunteering for library community clean‑up events"]'
  career_goals: Dawn’s primary ambition is to transition from front‑line cleaning to a supervisory role within facilities management, where she can leverage her practical expertise and organizational talent
    to oversee a team of cleaners and coordinate broader building‑maintenance projects. She plans to earn a Certified Professional Cleaner credential and complete the OSHA 30‑hour course to deepen her safety
    knowledge. Over the next five years, Dawn hopes to obtain a bachelor’s degree in Facilities Management, positioning herself for a facilities manager position at a regional office or educational campus.
    Long‑term, she envisions launching a small, environmentally‑focused cleaning consultancy that offers green‑cleaning services to local businesses, allowing her to blend her love of structure with a commitment
    to sustainable practices while providing a stable income for her family.
