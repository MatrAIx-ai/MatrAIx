personas:
  professional: Dawn Sparks, a meticulous facilities specialist with two decades of commercial cleaning expertise, combines her systematic floor‑care mastery, OSHA compliance adherence, and inventory‑control
    precision with a quietly assertive leadership style that thrives on predictable routines and detailed service logs.
  sports: Dawn Sparks, an avid weekend hiker on the Exeter River Trail and member of the Exeter Trail Club, follows the New England Patriots and Boston Celtics for regional pride, and maintains a modest
    fitness regimen of brisk walks, bird‑watching treks, and occasional recreational bowling at the local community center.
  arts: Dawn Sparks, a devoted reader of historical fiction such as Ken Follett and a regular attendee of the Exeter Playhouse's Shakespeare productions, finds solace in classic literature and the soft
    strains of folk singer Joan Baez, which they savor during quiet evenings after a day of structured work.
  travel: Dawn Sparks, a methodical planner who designs detailed itineraries for weekend getaways, relishes short trips to Portland, Maine's lobster shacks and Boston's historic Freedom Trail, while dreaming
    of a heritage tour of Ireland's countryside that they hope to fund through careful budgeting.
  culinary: Dawn Sparks, a competent home cook who favors seasonal New England fare such as clam chowder, roasted root vegetables, and apple crumble, cultivates fresh herbs for their dishes and enjoys kneading
    dough for homemade sourdough, yet admits to over‑salting soups when pressed for time.
  core: Dawn Sparks embodies steadfast practicality, balancing a love for structured routines, historic curiosity, and sustainable living with occasional spontaneous yarn purchases and a habit of neglecting
    minor dental flossing.
background:
  cultural: Dawn is a third‑generation white New Englander whose family has lived in the Exeter area of Rockingham County for over a century, tracing roots back to English and Irish ancestors who settled
    the region in the 1800s. Raised in a modest, Protestant household, she internalized the New England values of self‑reliance, practicality, and community stewardship. The region’s seasonal rhythms—harsh
    winters, vibrant autumn foliage, and crisp summer days—have shaped her appreciation for outdoor activities and seasonal gardening. Attendance at local town meetings and church gatherings reinforced
    a sense of civic responsibility and modest social interaction, aligning with her preference for small, close‑knit groups. Her cultural upbringing emphasizes steady work ethic, respect for procedural
    order, and a quiet but firm approach to problem‑solving, all of which echo the personality traits that define her daily life.
attributes:
  skills: '["Commercial cleaning","Floor care (stripping, waxing, buffing, carpet extraction)","OSHA safety compliance","Hazardous waste handling","Inventory control and procurement","Basic plumbing repairs","Basic
