background:
  cultural: Raised in Thibodaux, Glenda’s cultural background is steeped in Southern Louisiana traditions. She grew up in a predominantly white, Catholic community where French‑Acadian influences mingle
    with broader Southern customs. Family gatherings often feature jambalaya, crawfish boils, and church socials, while seasonal festivals like Mardi Gras and the Assumption Parish Livestock Show play a
    central role in her sense of identity.
