personas:
  professional: Lesly Osorio, a 34‑year‑old secondary‑school teacher, blends vibrant acrylic painting, digital illustration, and bilingual storytelling into interdisciplinary lessons that ignite creativity,
    while her spontaneous, structure‑averse nature sometimes leads to last‑minute lesson tweaks and a lively, improvisational classroom vibe.
  sports: Lesly Osorio is a lively fan of the Metro United soccer club, joins a community adult soccer league each spring, and fuels her fitness through weekly salsa dance classes and weekend trail runs
    along the bayou, occasionally cheering on the local baseball team, the Bay City Mariners.
  arts: Lesly Osorio draws daily inspiration from Frida Kahlo’s bold colors, the atmospheric sketches of Edward Hopper, and the rhythmic poetry of Langston Hughes, while she fills her evenings listening
    to the salsa beats of Eddie Palmieri, the indie vibes of Mitski, and the storytelling of Lin‑Manuel Miranda.
  travel: Lesly Osorio favors spontaneous weekend getaways to the Gulf Coast’s tranquil bayous, dreams of an immersive cultural trek to Antigua, Guatemala, and plans a future art‑focused pilgrimage to Oaxaca’s
    vibrant markets, balancing her wanderlust with a modest travel budget.
  culinary: Lesly Osorio delights in cooking traditional plantain‑based dishes like arroz con plátanos, flavorful tamales seasoned with cumin and cilantro, and refreshing ceviche made with lime and fresh
    fish, showcasing her intermediate cooking skills during lively dinner parties with friends.
  core: Lesly Osorio is a creatively restless educator who flits between impromptu art projects and last‑minute lesson plans, splurges on color pigments, and occasionally forgets to pay the electricity
    bill on time.
background:
  cultural: Lesly is a first‑generation Honduran‑American who grew up in a bilingual household, speaking both Spanish and English. Her family’s traditions—celebrating Honduran holidays, sharing folk music,
    and preparing dishes like baleadas—deeply influence her worldview. She carries a strong sense of community and collectivism, valuing family ties and mutual support. These cultural roots shape her teaching
    philosophy, prompting her to integrate Central American art, stories, and perspectives into the curriculum, and to foster an environment where cultural diversity is celebrated and every student feels
    seen.
