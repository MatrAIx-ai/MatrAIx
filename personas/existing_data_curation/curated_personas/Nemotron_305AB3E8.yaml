  hobbies: '[''Painting'', ''Sketching'', ''Digital illustration'', ''Ukulele playing'', ''Salsa dancing'', ''Reading science fiction'', ''Creative writing'', ''Photography'', ''Cooking traditional Honduran
    dishes'', ''Volunteering at art workshops'', ''Hiking local trails'', ''Attending live music events'']'
  career_goals: Lesly aims to become a lead teacher and curriculum innovator, focusing on arts integration across the district. She plans to earn a teaching credential and eventually a Master’s degree in
    Education to deepen her pedagogical expertise. Her ambition is to develop a district‑wide arts‑infused curriculum that encourages creativity and critical thinking, launch after‑school art programs for
    underserved youth, and eventually establish a community art center that showcases Central American cultural heritage. She also hopes to publish a collection of culturally infused children’s stories
    and gain recognition for pioneering flexible, student‑centered teaching approaches.
