personas:
  professional: Eddie Horcasitas, a budding builder who loves step‑by‑step LEGO projects, imagines a future as a civil engineer, and they apply their methodical, organized mind to construct imagined prairie
    bridges while meticulously following instructions, driven by a need for structure.
  sports: Eddie Horcasitas, an enthusiastic member of the Williston Wolves youth soccer club and the school varsity soccer team, devotes weekend practices to mastering set plays, cheerfully supports Minnesota
    United FC, and they approach each drill with methodical precision, treating workouts like puzzle pieces to be solved.
  arts: Eddie Horcasitas, a budding comic‑strip creator inspired by Mary Pope Osborne’s Magic Tree House and Jeff Smith’s bold line work, spends afternoons sketching prairie adventures while humming the
    Adventure Time theme and they often reenact scenes with their LEGO figures, channeling imagination into vivid panels.
  travel: Eddie Horcasitas, who prefers structured day trips with clear itineraries, has explored Badlands National Park and the historic town of Mandan, and they dream of a future organized adventure to
    the Grand Canyon and the Eiffel Tower, always packing a notebook for sketching landmarks.
  culinary: Eddie Horcasitas, a self‑appointed junior chef, loves assembling peanut butter and honey sandwiches with sliced banana, revels in homemade cheese quesadillas seasoned with cheddar and corn,
    and they proudly garnish creations with a sprinkle of dried cranberries for a dash of color.
  core: Eddie Horcasitas, a meticulous seven‑year‑old who counts each LEGO brick, worries about unfinished projects, and can’t resist organizing their rock collection by size before bedtime, they embody
    a blend of prairie practicality and childlike imagination.
background:
  cultural: Eddie is a white child raised in Williston, North Dakota, a small town shaped by the oil‑industry boom and strong Midwestern values. His family emphasizes hard work, punctuality, and community
    involvement, often attending local church events and county fairs. He grows up surrounded by wide open prairies, a close‑knit neighborhood where neighbors look out for one another, and a school culture
    that values structure, teamwork, and respect for rules.
attributes:
  skills: '[''Reading fluency'', ''Basic arithmetic'', ''Following multi-step instructions'', ''Organizing personal items'', ''LEGO building'', ''Puzzle solving'', ''Digital learning'', ''Household chores
