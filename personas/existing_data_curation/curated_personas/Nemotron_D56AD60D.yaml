  hobbies: '[''Reading chapter books'', ''Building LEGO models'', ''Playing soccer'', ''Drawing comics'', ''Collecting rocks and fossils'', ''Educational video games'', ''Simple cooking (sandwich making)'']'
  career_goals: Eddie is fascinated by how things are built and maintained. He often says he wants to design strong bridges and make big machines work, expressing a desire to become a civil engineer or
    mechanical engineer who contributes to safe roads and sturdy buildings in his community. He also mentions wanting to be a firefighter because he likes clear routines, teamwork, and protecting the town
    he loves. Eddie plans to study hard, improve his problem‑solving skills, and eventually attend a technical college to pursue these goals.
