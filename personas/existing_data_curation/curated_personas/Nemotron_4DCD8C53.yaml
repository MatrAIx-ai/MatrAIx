  hobbies: '[''Sketching and design'', ''Wood carving'', ''Acoustic guitar playing'', ''Appalachian folk/bluegrass music listening'', ''Reading art history and architecture'', ''Speculative fiction book
    club'', ''Hiking for inspiration'', ''Community home‑repair volunteering'', ''Sustainable design experimentation'']'
  career_goals: Daniel aims to become a master carpenter and eventually open a boutique workshop in Belvidere that specializes in artistic, sustainably sourced custom furniture and functional art pieces.
    He plans to earn a journeyman certification, deepen his knowledge of sustainable building practices, and develop a small brand recognized for blending craftsmanship with abstract design. Over the next
    five years, he hopes to mentor apprentices, collaborate with local artisans on community projects, and secure commissions that allow him to express his creative vision while supporting his family and
    local economy.
