personas:
  professional: Daniel Vandiver is a master carpenter in the making, blending precise framing, custom cabinetry, and fine woodcarving with a vivid imagination that drives them to design functional art pieces
    while keeping projects organized and client‑focused.
  sports: Daniel Vandiver enjoys early‑morning hikes along the Oak Ridge trail and seasonal deer hunts with the Moore County Outdoor Club, follows the Tennessee Titans and Nashville Predators passionately,
    and stays fit by participating in a local weekend basketball league at the community center.
  arts: Daniel Vandiver finds inspiration in the bluegrass fiddling of Bill Monroe, the folk storytelling of Gillian Welch, the woodwork of Sam Maloof, and the abstract paintings of Georgia O’Keeffe, often
    sketching designs while listening to these artists and carving small sculptures that echo their aesthetic.
  travel: Daniel Vandiver prefers road trips that blend scenic drives along the Blue Ridge Parkway with stops at local craft fairs, has explored Asheville’s art districts and New Orleans’ music scene, and
    dreams of a pilgrimage to Kyoto’s traditional carpentry workshops, all while budgeting trips through careful planning and seasonal work breaks.
  culinary: Daniel Vandiver loves cooking Southern comfort food such as skillet cornbread with honey butter, smoked brisket glazed with bourbon BBQ sauce, and fresh garden salads featuring heirloom tomatoes
    and mountain herbs, often preparing meals on a cast‑iron skillet and using reclaimed‑wood cutting boards they crafted themselves.
  core: Daniel Vandiver is a quietly ambitious carpenter who turns reclaimed wood into art, balances frugality with occasional splurges on tools, and can’t resist a late‑night jam session, even if it means
    sacrificing a few hours of sleep.
background:
  cultural: Daniel was raised in rural Moore County, Tennessee, within a working‑class white family steeped in Appalachian traditions. His upbringing emphasized self‑reliance, hands‑on craftsmanship, and
    close community bonds. He grew up attending church gatherings that fostered a sense of cooperation and hospitality, and he absorbed regional customs such as bluegrass music, Southern cooking, and outdoor
    pursuits like hunting and fishing. These cultural influences shape his cooperative personality, his appreciation for locally sourced materials, and his desire to contribute to the well‑being of his
    small‑town community.
attributes:
  skills: '[''Structural framing'', ''Finish carpentry'', ''Custom cabinetry'', ''Fine wood carving'', ''Blueprint reading'', ''Design sketching'', ''Basic CAD for woodworking'', ''Power tool operation'',
