personas:
  professional: Carrolyn Weller, a budding junior architect who spends afternoons arranging LEGO sets with both inventive designs and step‑by‑step manuals, they balance curiosity and practicality, yet they
    let their play area become a delightful chaos because they value flexibility over strict organization.
  sports: Carrolyn Weller, a member of the local Little Hawks soccer team and a regular at the community swimming pool, they tackle each game with a competitive spirit, prefer the spontaneity of kick‑ball
    during recess, and enjoy the flexibility of unstructured playground tag more than rigid drills.
  arts: Carrolyn Weller, who dreams of becoming a comic‑book illustrator, they spend weekends finger‑painting scenes from favorite superhero movies and singing along to Disney soundtracks while proudly
    displaying a collection of paper‑cutout stars on their bedroom wall.
  travel: Carrolyn Weller, who loves family road trips to the seaside and has a growing wish list that includes a visit to the Grand Canyon, they prefer the excitement of spontaneous stops at quirky roadside
    attractions over meticulously planned itineraries, yet they often forget to pack their favorite stuffed giraffe.
  culinary: Carrolyn Weller, a self‑declared aficionado of cheesy macaroni, chicken nuggets, and strawberry‑banana smoothies, they enjoy helping their mom whisk pancake batter into dinosaur shapes, though
    they habitually push peas aside unless they’re hidden in a sauce.
  core: Carrolyn Weller is a five‑year‑old explorer who balances boundless curiosity with a love for practical routines, embraces flexible play over tidy order, competes fiercely in games, and they navigate
    health and money matters with a charming blend of caution and occasional forgetfulness.
background:
  cultural: Carrolyn comes from a white, middle‑class family living in Las Vegas, Nevada. Her upbringing mixes typical suburban American traditions—celebrating holidays like Christmas, Thanksgiving, and
    the Fourth of July—with exposure to the city’s multicultural vibe due to tourism. Family outings to local museums, desert hikes, and community events give her a modest awareness of the region’s desert
    heritage and the diverse cultures present in the area, while her home life reflects conventional American values and family routines.
attributes:
  skills: '[''Letter recognition'', ''Counting to 20'', ''Basic writing of her name'', ''Fine‑motor coordination for building with LEGO'', ''Puzzle solving'', ''Pattern observation'', ''Following multi‑step
