  hobbies: '[''LEGO building'', ''Drawing and coloring'', ''Reading picture books'', ''Exploring playgrounds and sand'', ''Playing competitive board games'', ''Pretend role‑play'', ''Listening to audiobooks'',
    ''Puzzles'']'
  career_goals: Though still early, Carrolyn dreams of becoming someone who can both explore ideas and create tangible results. She often says she wants to be an astronaut who builds her own spacecraft,
    a teacher who designs fun learning games, or a veterinarian who helps animals in practical ways. Her ambition leans toward careers that mix curiosity with hands‑on problem solving, and she imagines
    herself leading a team in building or exploring, reflecting her competitive yet collaborative spirit.
