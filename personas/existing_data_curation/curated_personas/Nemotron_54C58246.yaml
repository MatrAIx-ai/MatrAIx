personas:
  professional: Marta Armas, an aspiring young watercolor illustrator who blends folklore‑inspired sketches with simple Scratch animations, applies a methodical, organized approach to turn imaginative ideas
    into polished mini‑projects, and confidently shares their creations with classmates.
  sports: Marta Armas plays forward for the Midville United Youth Soccer club, enjoys cheering on Atlanta United FC during the spring, and spends weekend afternoons bird‑watching at Stone Mountain State
    Park, balancing team sport discipline with solitary nature outings.
  arts: Marta Armas immerses themselves in watercolor painting inspired by folklore, often sketching hummingbirds and mythic creatures while listening to Taylor Swift and the classic folk anthem "La Bamba",
    and they look up to Frida Kahlo’s bold self‑portraits as a creative benchmark.
  travel: Marta Armas plans family trips with meticulous checklists, favoring a blend of adventurous bird‑watching hikes in the Great Smoky Mountains and cultural excursions to Oaxaca’s vibrant Day of the
    Dead celebrations, while dreaming of a future weekend in Paris to sketch the Louvre’s masterpieces.
  culinary: Marta Armas enjoys preparing simple dishes like chicken tacos with fresh cilantro, lime, and roasted chilies, alongside sweet corn tamales, honing beginner‑level cooking skills under their mother’s
    guidance while occasionally experimenting with chilaquiles topped with queso fresco.
  core: Marta Armas is a curious, organized 11‑year‑old who balances vivid imagination with meticulous planning, channeling their love for folklore‑infused art, birdwatching, and soccer into a disciplined
    yet worry‑prone routine that includes a persistent habit of nightly journaling.
background:
  cultural: 'Marta is a Mexican‑American growing up in Midville, Georgia. Her household blends Mexican traditions with Southern community life: she celebrates Día de los Muertos, Cinco de Mayo, and family
    gatherings filled with Mexican cuisine like tacos and tamales. At home, Spanish is spoken alongside English, and she learns about Mexican legends and folklore from her grandparents, which influence
    her artwork. She attends a local church where community values of respect and cooperation are emphasized, and she takes pride in her Latino heritage while also embracing the close‑knit, friendly atmosphere
    of her small Georgian town.'
attributes:
  skills: '[''Bilingual (Spanish/English)'', ''Sketching and watercolor painting'', ''Basic coding in Scratch'', ''Piano basics'', ''Organizational and time‑management skills'', ''Research using library
