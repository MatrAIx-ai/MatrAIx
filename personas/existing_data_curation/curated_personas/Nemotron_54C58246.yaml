  hobbies: '[''Sketching and watercolor painting'', ''Reading fantasy and adventure books'', ''Birdwatching and nature walks'', ''Playing soccer'', ''Practicing Mexican folk dance'', ''Listening to music
    (pop and traditional)'', ''Cooking Mexican recipes with family'', ''Journaling'', ''Coding with Scratch'', ''Solving puzzles and brain teasers'']'
  career_goals: Marta dreams of turning her love for art and science into a career as a wildlife illustrator or a museum curator who highlights Mexican cultural heritage. She also imagines studying environmental
    science to protect ecosystems while sharing them through visual storytelling. In the near future, she plans to join her school’s art club, enter science fairs, and take advanced language classes, hoping
    these experiences will pave the way to a future college program in fine arts or environmental studies.
