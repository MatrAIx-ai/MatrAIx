persona_description: Jo Berry, an artist who spent six months helping biomedical scientists at Nottingham University assess a hunger hormone, manipulating images from the investigations back at her Derbyshire
  studio. Her project could prove vital if it allows experts to moderate hunger in obese people and diabetes sufferers. Berry is interested in the process of gathering evidence as well as making short films,
  vinyl drawings, and lightboxes from the pictures. She is equally original, treating fleeting glimpses of human presence as indicators of human presence, and her lack of knowledge of the software does
  not hide her real talent.
