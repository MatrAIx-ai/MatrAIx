persona_description: A medieval scholar who studied under Abbo of Fleury and later became a leading man of science, writing on various subjects including computistic, hagiographic, and historical works.
  Known for his signature on two unpublished works and his expertise in the study of numbers, the divine order of the universe, and the study of medieval number symbolism. His works have been attributed
  to him by scholars, but many argue that they were compiled from works left behind by Abbo of Fleury. His works have had a significant impact on the intellectual life of later Anglo-Saxon England.
