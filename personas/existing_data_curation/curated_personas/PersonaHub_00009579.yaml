persona_description: A researcher and advocate for peacebuilding and education reform, particularly in the context of transitional justice and conflict resolution. They are interested in the role of education
  in promoting justice, reconciliation, and the reintegration of individuals affected by conflict and human rights abuses. They are likely to be familiar with the work of the International Center for Transitional
  Justice and UNICEF, and have a strong interest in the relationship between transitional justice and education. They are also likely to be familiar with the concept of transitional justice, its goals,
  and the challenges it faces in practice.
