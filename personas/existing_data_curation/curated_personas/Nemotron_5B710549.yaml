personas:
  professional: Diane Jolley, a 35‑year‑old CAD drafter at a Worcester engineering firm, leverages AutoCAD and SolidWorks expertise to deliver precise 2D/3D plans while mentoring junior staff and championing
    sustainable design through BIM‑driven workflows, all with a methodical, community‑focused mindset.
  sports: Diane Jolley, an energetic participant in Worcester United’s co‑ed soccer league, kicks off weekends with matches on crisp fall evenings, supports the New England Patriots on Sundays, cheers the
    Boston Red Sox in summer, hikes Wachusett Mountain each spring for cardio, and attends occasional spin classes at a local gym to round out her fitness routine.
  arts: Diane Jolley, an avid reader in her neighborhood book club, devours contemporary works by Sally Rooney and classics by Jane Austen, enjoys the acoustic folk sounds of the Avett Brothers and the
    indie rock of Phoebe Bridgers, attends seasonal exhibitions at the Worcester Art Museum featuring American realism, and spends Friday nights strategizing over board games like Terraforming Mars with
    friends.
  travel: Diane Jolley, a meticulous planner, prefers road trips that balance historic charm and outdoor adventure, having charted weekend getaways to the White Mountains, a weekend wine tour of the Hudson
    Valley, and a three‑day art‑focused stay in Boston, while dreaming of an eco‑tour of Costa Rica’s rainforests and a spring pilgrimage to Edinburgh’s castle districts, all logged in a spreadsheet with
    budget and mileage columns.
  culinary: Diane Jolley, a competent home cook, delights in simmering a classic New England clam chowder with fresh clams, potatoes, and thyme from her garden, rolls lobster rolls on buttery brioche for
    weekend gatherings, bakes apple‑cinnamon pies with locally harvested orchard apples, and experiments with seasonal salads featuring heirloom tomatoes, basil, and a drizzle of local honey‑infused vinaigrette.
  core: Diane Jolley, a detail‑oriented CAD professional who blends community spirit with a love for soccer, books, and garden‑to‑table cooking, balances meticulous planning with spontaneous board‑game
    fun, all while quietly battling occasional back aches and a penchant for extra espresso.
background:
  cultural: Diane grew up in Worcester, Massachusetts, a city with a rich industrial heritage and a close‑knit New England sensibility. Her family follows a traditional white American upbringing rooted
    in values of hard work, punctuality, and community involvement. Influenced by the region’s emphasis on education and civic participation, she attended a public high school that offered technical electives,
    sparking her interest in drafting. The multicultural fabric of Worcester has also exposed her to diverse perspectives, shaping her cooperative and considerate nature while reinforcing her pride in the
    local history and neighborhood ties.
attributes:
  skills: '[''AutoCAD'', ''SolidWorks'', ''Revit'', ''Technical Drawing'', ''Blueprint Interpretation'', ''Building Code Compliance'', ''Detail Drafting'', ''Project Coordination'', ''Version Control'',
    ''3D Modeling'']'
  hobbies: '[''Community Soccer League'', ''Book Club'', ''DIY Home Improvement'', ''Gardening'', ''Board Game Nights'', ''Volunteer Tutoring in Drafting'', ''Hiking at Wachusett Mountain'']'
  career_goals: Diane aims to advance from a drafter to a senior CAD specialist within the next three years, obtaining BIM (Building Information Modeling) certification and expanding her expertise in sustainable
    design. She aspires to lead a small team of drafters, mentor junior staff, and eventually transition into a project manager role where she can blend her technical skills with her collaborative, people-focused
    strengths. Long-term, she envisions starting her own consulting firm that offers precise drafting services for local construction and renovation projects, emphasizing efficiency and community impact.
