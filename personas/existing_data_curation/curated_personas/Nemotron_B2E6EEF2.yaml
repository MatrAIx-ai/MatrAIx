personas:
  professional: Karen Lee is a senior humanities professor at a coastal university who designs interdisciplinary courses in American literature and cultural history, leverages digital humanities tools,
    excels at grant writing and curriculum development, and channels their disciplined, organized nature and practical curiosity into mentoring first-generation students and leading community outreach projects.
  sports: Karen Lee is a low-impact fitness enthusiast who walks the Battery and trails for cardiovascular health, participates in the Charleston Running Club’s weekend 5K runs, avidly follows the Charleston
    Battery soccer team and the Charleston RiverDogs baseball club, and occasionally joins a community pickleball league to stay socially engaged.
  arts: Karen Lee is an avid lover of Southern literary and artistic heritage, regularly reading Margaret Mitchell and William Faulkner, attending performances by local theater troupe The Charleston Stage,
    listening to James Taylor and the folk duo The Avett Brothers, and collecting prints by artist Ashley Bryan, all of which inform their scholarly work and personal aesthetic.
  travel: Karen Lee is a thoughtful traveler who prefers meticulously planned trips to historic cities such as Savannah, New Orleans, and Asheville, enjoys weekend photo excursions to Charleston’s antebellum
    homes, and dreams of a summer sabbatical exploring the architectural wonders of Barcelona while balancing travel costs against their academic budget.
  culinary: Karen Lee is an enthusiastic home cook who specializes in low-country cuisine, skillfully prepares shrimp and grits, she-crab soup, and oyster po'boys using fresh okra, stone-ground grits, and
    locally sourced seafood, and delights in occasional farm-to-table dinner parties where they experiment with heirloom tomatoes and sweet potatoes.
  core: Karen Lee is a disciplined, curiosity-driven scholar who balances meticulous organization with a love for historic gardens, bird-watching, and occasional indulgence in first-edition novels, while
    quietly battling a fear of public speaking that they mask with thorough lesson plans.
background:
  cultural: Karen was raised in a middle-class white family in the Charleston metropolitan area, steeped in the city’s rich historic and cultural heritage. The Southern emphasis on hospitality, community
    service, and respect for tradition shaped her values of kindness and cooperation. Exposure to the Gullah-geechee cultural legacy and Charleston’s historic architecture sparked her academic interest
    in Southern studies and cultural preservation. Her upbringing combined a strong work ethic and appreciation for both traditional Southern customs and progressive ideas, informing her balanced approach
    to teaching and community engagement.
