  career_goals: She aims to achieve full professorship within the next five years while publishing a monograph on Southern cultural narratives. She seeks to secure a multi-year grant to create a digital
    archive of Charleston’s historic documents and develop a new minor in Southern Studies. Additionally, Karen intends to expand mentorship programs for first-generation college students and earn the university’s
    teaching excellence award.
