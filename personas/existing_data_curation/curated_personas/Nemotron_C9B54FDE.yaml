  hobbies: '["Hiking", "Gardening", "Cooking Mexican/Tex-Mex cuisine", "Yoga", "Journaling", "Reading mystery novels", "DIY electronics projects", "Volunteering at bilingual community center"]'
  career_goals: Melisse aims to move into a supervisory role within the next two years, targeting a shift lead position where she can mentor teammates and spearhead efficiency projects. She plans to earn
    a Certified Production Technician (CPT) credential and complete an associate degree in Industrial Technology, leveraging her competitive drive to become a top-performing leader on the floor. Long‑term,
    she envisions transitioning to a production manager role that balances operational responsibility with a healthier work‑life rhythm, reducing stress while still achieving measurable improvements. Additionally,
    she hopes to channel her cultural roots into a side venture—perhaps a small catering business featuring authentic Mexican‑Tex‑Mex fare—once she attains greater stability at work.
