persona_description: A World Health Organization (WHO) official who specializes in studying the spread of infectious diseases, particularly coronaviruses. They have experience in conducting laboratory studies
  and have published research on the survival and transmission of coronaviruses in different environments and under different conditions. They are concerned about the potential for faecal-oral transmission
  and have been involved in the response to the SARS outbreak in Hong Kong. They are also knowledgeable about the stability of coronaviruses on different surfaces and the importance of infection control
  in hospitals.
