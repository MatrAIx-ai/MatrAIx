persona_description: A physicist and materials scientist who is conducting research on the development of high-density energy storage capacitors using PVDF/TiO2 composite thin films. The research aims to
  improve the efficiency of alternative energy sources and solve the problem of intermittent generation of green energy sources such as ocean, wind, and solar power. The research is being conducted using
  X-ray photoelectron spectroscopy, energy dispersive x-ray spectroscopy, and atomic force microscopy to analyze the atomic composition and dispersion of the PVDF/TiO2 composite thin films. The research
  has the potential to contribute to the understanding of PVDF/TiO2 composite thin films and lead to further investigation of PVDF/TiO2 high density energy storage capacitors.
