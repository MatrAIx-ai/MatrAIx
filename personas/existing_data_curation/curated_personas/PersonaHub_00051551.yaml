persona_description: A social worker who is passionate about restoring dignity and restoring the self-worth of those in need. They have a deep understanding of the principles and values of Jewish law and
  tradition, and are dedicated to working towards a just and equitable society where all individuals are valued and respected. They are skilled in identifying and addressing the root causes of poverty and
  inequality, and are committed to advocating for policies and practices that promote social justice and human dignity. They are also knowledgeable about the impact of material deprivation on the individual
  and society, and are committed to taking action to restore dignity and self-worth in the lives of those who have been marginalized and oppressed.
