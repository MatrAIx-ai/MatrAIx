personas:
  professional: Victoria Curran, a veteran chef transitioning to mentorship, leverages three decades of commercial kitchen expertise to craft art‑inspired dishes, while they channel an imaginative spirit
    and occasional disorganization into flexible workshop schedules and spontaneous menu experiments.
  sports: Victoria Curran, a lifelong fan of the Miami Marlins and a member of the St. Johns River Paddle Club, stays active through weekly paddling outings, casual pickleball matches at the community center,
    and gentle morning walks along the river, favoring low‑impact exercise that respects their age and joint health.
  arts: Victoria Curran, an avid watercolorist, creates abstract river landscapes inspired by Georgia O’Keeffe and Mark Rothko, regularly attends gallery openings showcasing contemporary Southern artists
    like John Stuart, and finds inspiration in folk legends such as Gillian Welch while sketching culinary plating concepts.
  travel: Victoria Curran prefers leisurely, meticulously planned weekend getaways to coastal gems like Key West and historic towns such as Savannah, often traveling by car to savor local food markets,
    while dreaming of a modest pilgrimage to a remote north‑Atlantic fishing village known for its stone‑fired breads and folk music, all within a modest budget.
  culinary: Victoria Curran, an accomplished chef with a garden‑grown herb repertoire, reinvents Floridian classics—such as stone‑crab bisque with heirloom tomato garnish and citrus‑marinated shrimp—treating
    each plate as a canvas where flavor, color, and texture converge, though occasional absent‑mindedness can lead to an over‑salted sauce.
  core: Victoria Curran is a creatively restless 64‑year‑old who blends culinary art with watercolor dreams, obsessively plans garden harvests, worries about every detail, and occasionally lets dishes slip
    into delightful chaos.
background:
  cultural: Victoria is a white Floridian with deep roots in the southeastern United States, tracing part of her ancestry to Irish immigrants who settled in the Gulf Coast region in the early 20th century.
    Growing up in a modest, close‑knit community, she was steeped in Southern hospitality and traditional home‑cooked meals, while also being exposed to the diverse culinary influences of Florida's coastal
    and inland cultures. Her upbringing emphasized self‑reliance, respect for nature, and a reverence for local food traditions, all of which continue to shape her culinary perspective and artistic sensibilities.
