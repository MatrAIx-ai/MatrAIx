persona_description: A researcher who combines interdisciplinary research methods to study the impact of climate change on hydrology and social-ecological systems in rural Alaska. The researcher partners
  with local stakeholders to develop scientific investigations that are relevant to the Alaskan population. The researcher incorporates local knowledge into scientific models to identify social-ecological
  thresholds and develop physically-based numerical models to examine the importance of permafrost degradation in explaining unfrozen river conditions. The researcher uses field mapping and remote sensing
  techniques to map dangerous ice conditions on the Tanana River and demonstrates how collaborations between scientists and local stakeholders can create tools that are useful and relevant for non-academics.
  The researcher concludes that regional-scale adaptations and technological development, such as modeling and remote sensing tools, may help to alleviate the effects of extreme events or unexpected environmental
  conditions driven by climate.
