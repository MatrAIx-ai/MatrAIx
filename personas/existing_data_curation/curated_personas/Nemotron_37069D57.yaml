  career_goals: Marlon aims to transition into a senior regional management role within the next two years, where he can scale his process‑improvement expertise across multiple facilities. He is focused
    on mentoring emerging leaders, establishing a legacy of high‑performance operational standards, and positioning himself for a post‑retirement consulting career that helps other Midwestern firms adopt
    practical, results‑oriented innovations. Additionally, he seeks to spearhead a company‑wide sustainability initiative that aligns with his commitment to long‑term, responsible growth.
