  career_goals: Tara dreams of a future where she can combine her love for animals, the desert environment, and practical problem‑solving. She aspires to become a wildlife biologist or veterinarian who
    studies and protects desert species, envisioning herself one day designing simple tools to help conserve water for plants and animals. While she enjoys solitary research, she also hopes to use her kindness
    to educate younger children about caring for nature, perhaps through community workshops or a future role as a science mentor.
