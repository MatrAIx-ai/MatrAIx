persona_description: A scientist who specializes in the study of freshwater fish, particularly those in California. The scientist has been documenting the biology and status of California fish for the past
  40 years and has expertise in assessing the vulnerability of different species to climate change. The scientist is interested in determining the climate change vulnerability of different species, especially
  those that require cold water, such as salmon and trout, and is looking for a repeatable and rapid method to do so. The scientist has experience in conducting research on the status of fish species, particularly
  those of little economic value, and has a passion for preserving the unique California fish fauna. The scientist is likely to read the study published in the journal PLOS ONE, which assesses the vulnerability
  of different species to climate change and estimates the likelihood of extinction in 100 years.
