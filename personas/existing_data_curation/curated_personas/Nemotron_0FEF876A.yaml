personas:
  professional: Jessica Rogers is a budding sensory explorer who spends each day mastering cause‑and‑effect with stackable blocks, eagerly anticipates the predictable bedtime ritual, and they already show
    a modestly competitive streak when vying for the same rattling toy, reflecting a practical and structured approach to early learning.
  sports: Jessica Rogers enjoys the soft tumble of crawling through the family’s indoor play gym, lights up when the Utah Jazz basketball game plays on the living‑room TV, and they are slated to join a
    parent‑child soccer class at the neighborhood park every summer, blending a love of structured activity with spontaneous outdoor play.
  arts: Jessica Rogers delights in the bright melodies of Raffi’s 'Baby Beluga' and the rhythmic clapping of The Wiggles, often sways in the living‑room while a picture book of Eric Carle's 'The Very Hungry
    Caterpillar' is read aloud, and they relish the occasional flash of animated Disney shorts, weaving music, visual art, and storytelling into their daily routine.
  travel: Jessica Rogers’s tiny travel scrapbook captures stroller‑friendly strolls along Zion National Park’s Riverside Walk, a weekend cabin retreat near Park City where they built snow angels, and they
    dream of one day riding a gondola to the Alpine ridge of Rocky Mountain National Park, reflecting a love of nature guided by family‑centered outings and predictable itineraries.
  culinary: Jessica Rogers prefers smooth sweet‑potato puree, soft apple‑cinnamon oatmeal, and tiny chicken nuggets, often masters the messy spoon‑feeding challenge with enthusiastic peas splatters, and
    they occasionally refuse broccoli in favor of carrot sticks, turning each mealtime into a structured yet adventurous tasting session.
  core: Jessica Rogers is a one‑year‑old whose love of predictable routines fuels a surprisingly competitive edge in toy‑sharing, a penchant for chewing on corded toys, and they display a meticulous approach
    to mastering new skills, all wrapped in a modest, family‑centered charm.
background:
  cultural: Jessica is raised in a white family in Sandy, Utah, a suburban community within Salt Lake County. Her upbringing reflects the Intermountain West's appreciation for outdoor recreation, community
    gatherings, and a family‑centered lifestyle. Local influences include seasonal festivals, visits to nearby national parks, and a cultural emphasis on safety, routine, and personal responsibility, all
    of which shape her practical, structured, and modestly competitive personality.
