  hobbies: '[''Home vegetable gardening'', ''Baking artisan breads and pastries'', ''Crossword puzzles and jigsaw puzzles'', ''Quilting and textile crafts'', ''Volunteering at the local food pantry'', ''Walking
    along the Fox River'', ''Attending church potluck events'']'
  career_goals: Charlene aims to advance to a supervisory role such as Kitchen Manager or Food Service Director within the local school district or community college, where she can implement a farm‑to‑table
    program that showcases locally grown produce. She plans to earn the Certified Dietary Manager (CDM) credential to deepen her expertise in nutrition and dietary care. Over the next few years, she hopes
    to mentor younger kitchen staff, develop a comprehensive food‑safety training curriculum, and eventually transition to part‑time consulting for small restaurants and catering businesses, allowing her
    to share her knowledge while easing into retirement.
