personas:
  professional: Charlene Burks, a seasoned food service professional with ServSafe certification, leverages her meticulous record-keeping and menu-planning expertise to run high-volume kitchen operations
    while nurturing a cooperative team culture.
  sports: Charlene Burks is a faithful supporter of the Green Bay Packers and the Milwaukee Brewers, enjoys weekend walks along the Fox River as her primary fitness routine, and occasionally joins the local
    senior softball league, favoring low-impact activities that fit her structured schedule.
  arts: Charlene Burks participates in a community quilting circle, draws inspiration from the folk patterns of Wisconsin's cheese-cooperatives, and regularly attends performances by the Milwaukee Symphony
    Orchestra, while keeping a collection of Bonnie Raitt vinyls that accompany her evening baking sessions.
  travel: Charlene Burks prefers meticulously planned road trips, often revisiting Door County's orchard festivals and the historic streets of Madison, while dreaming of a culinary pilgrimage to Provence's
    lavender fields, balancing her love of nature with a cautious eye on travel costs and health considerations.
  culinary: Charlene Burks, an adept baker, crafts sourdough loaves infused with locally sourced rosemary, whips up Wisconsin cheddar cheese curds, and perfects her signature apple-cinnamon strudel, while
    experimenting with seasonal garden harvests like heirloom tomatoes and basil to create nutritious, comfort-filled meals.
  core: Charlene Burks is a methodical kitchen veteran who pours precision into every recipe, quietly frets over inventory counts, and secretly hoards extra chocolate chips for late-night snack raids.
background:
  cultural: Charlene was born and raised in Brownsville, Wisconsin, in a family of German‑Polish descent typical of Dodge County. Her upbringing in a predominantly Protestant, close‑knit community emphasized
    hard work, self‑reliance, and mutual support. Local culture celebrated seasonal farming, homemade meals, and community gatherings such as county fairs and church events. Family traditions featured hearty
    Midwestern cuisine—cheese curds, bratwurst, fresh garden produce—and a strong sense of hospitality. These cultural roots shape Charlene's practical outlook, love of food, commitment to community service,
    and appreciation for structured, harmonious environments.
attributes:
  skills: '[''Food safety and sanitation compliance'', ''Menu planning and recipe development'', ''Nutritional analysis and dietary accommodations'', ''Inventory management and cost control'', ''Commercial
