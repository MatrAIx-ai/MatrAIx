  hobbies: '[''Cooking Mexican and fusion dishes'', ''Gardening (herbs and vegetables)'', ''Listening to regional Mexican music'', ''Attending cultural festivals'', ''Reading practical self‑help books'',
    ''Walking in local parks'', ''Yoga'', ''Food blogging on social media'']'
  career_goals: Reyna aims to earn her GED within the next two years and pursue a vocational certificate in culinary arts or hospitality. She envisions securing part‑time work that leverages her bilingual
    abilities, such as a customer‑service role in a Mexican restaurant or a community outreach position with a local nonprofit. Long‑term, she aspires to start a small home‑based catering business or food‑truck
    serving traditional Mexican fare with a modern twist, providing a stable income while maintaining flexibility for family responsibilities.
