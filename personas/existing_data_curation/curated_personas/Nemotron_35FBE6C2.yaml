personas:
  professional: Reyna Menendez, a 21‑year‑old aspiring culinary professional, combines bilingual fluency, practical cooking skills, and reliable organization to excel in part‑time customer service while
    they assertively work toward a GED and culinary certificate.
  sports: Reyna Menendez, a 21‑year‑old fitness enthusiast, enjoys walking in local parks and practicing yoga for balance, joins the Riverfront Runners club for weekend 5K runs, follows the Los Angeles
    Lakers in basketball and the LA Galaxy in soccer, and they occasionally play casual soccer with friends during the spring season.
  arts: Reyna Menendez, a 21‑year‑old cultural aficionado, immerses themselves in regional music by artists such as Lila Downs and Café Tacvba, appreciates the visual storytelling of Frida Kahlo and the
    cinematic flair of Guillermo del Toro, and they channel this artistic inspiration into vibrant food‑focused Instagram posts that blend culinary creativity with visual art.
  travel: Reyna Menendez, a 21‑year‑old budding traveler, prefers low‑budget weekend getaways to nearby cultural hubs such as Santa Barbara and New Orleans, has already explored Oaxaca and Mexico City on
    family trips, and they dream of a future solo adventure to Tokyo and Barcelona once their culinary business provides a steadier income, balancing meticulous itinerary planning with spontaneous street‑food
    excursions.
  culinary: Reyna Menendez, a 21‑year‑old culinary creator, specializes in authentic dishes like mole poblano, chiles en nogada, and carnitas tacos, frequently experiments with fusion twists using ingredients
    such as huitlacoche, smoked paprika, and quinoa, and they meticulously cultivate herbs like cilantro, oregano, and epazote in their modest garden to elevate flavors.
  core: Reyna Menendez, a 21‑year‑old ambitious cook with a penchant for late‑night herb harvesting, balances disciplined GED study with spontaneous culinary experiments, often over‑indulging in trendy
    kitchen gadgets while they manage a modest budget.
background:
  cultural: Reyna is a first‑generation Mexican‑American raised in Springfield, Missouri, within a close‑knit immigrant family that maintains strong ties to Mexican traditions. Spanish is spoken at home,
    while English is used in school and the broader community. Her upbringing emphasized family loyalty, respect for elders, community solidarity, and the celebration of holidays such as Día de los Muertos
    and Cinco de Mayo. She blends these cultural values with Midwestern sensibilities, participating in local community events while preserving her Mexican heritage through food, language, and customs.
