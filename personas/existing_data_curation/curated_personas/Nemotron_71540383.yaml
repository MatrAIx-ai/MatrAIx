personas:
  professional: Jordan Karger, a 69‑year‑old prepress veteran, translates his meticulous eye for color‑management and layout into mentoring younger staff, codifying workflow best practices, and drafting
    a definitive prepress manual while planning a part‑time consultancy that offers efficiency audits to regional print shops.
  sports: Jordan Karger rows his small wooden boat on the lake every Saturday, belongs to the Lakefront Fly‑Fishing Club, follows the Green Bay Packers religiously, often debates the merits of the team’s
    play‑calling with his grandson, and in the cooler months he hits the senior league at the local golf course, where his competitive streak shows during weekly scrambles.
  arts: Jordan Karger spends evenings listening to Johnny Cash, Dolly Parton, and Bob Dylan on his vintage turntable, collects first‑edition printing history tomes, and visits the local community theater
    for folk‑music concerts, while his appreciation for craftsmanship fuels his model railroading hobby, and he occasionally sketches vintage car silhouettes in his spare time.
  travel: Jordan Karger prefers low‑key road trips, mapping routes on a paper atlas, and has driven the historic Route 66 to explore the B&O Railroad Museum in Baltimore and the printing press exhibit at
    the Smithsonian, while dreaming of a pilgrimage to the Great Western Railway’s steam workshops in England, balancing travel with the need to keep an eye on his garden’s planting schedule.
  culinary: Jordan Karger relishes preparing grilled lake trout seasoned with fresh dill, a hearty vegetable stew featuring heirloom carrots, squash, and corn from his own garden, and finishes meals with
    homemade apple cobbler, crediting his love of simple, home‑grown flavors to the country and folk music that shaped his upbringing.
  core: Jordan Karger blends a lifetime of print‑shop precision with a love for solitary crafts, competitive restorations, and quiet contemplation, all while wrestling with lingering financial anxieties
    and a habit of over‑committing to hobby projects.
background:
  cultural: Jordan was raised in a middle‑class white family in suburban Oklahoma City during the 1950s and 60s. His ancestry includes German‑American and Irish‑American roots that settled in the Great
    Plains. He grew up with a strong work ethic, Protestant (Southern Baptist) values, and a community‑oriented yet self‑reliant mindset typical of the Midwest. Local traditions such as college football,
    country music, and the region’s printing industry have shaped his outlook, and his long‑standing marriage reflects the stable, family‑focused commitments common in his cultural environment.
attributes:
  skills: '["Adobe InDesign", "QuarkXPress", "Adobe Photoshop", "PDF/X compliance", "Color management (ICC profiles)", "Prepress workflow automation", "Imagesetter operation", "Press proofing and quality
    control", "Print production troubleshooting", "Typography and layout design", "Basic graphic design principles", "Vendor liaison and job scheduling"]'
  hobbies: '["Model railroading", "Woodworking", "Fishing in nearby lakes", "Reading printing and publishing history", "Solving crossword puzzles and Sudoku", "Classic car restoration", "Listening to country
    and folk music", "Attending small family gatherings", "Gardening (vegetable plots)", "Documenting family genealogy"]'
  career_goals: Approaching retirement, Jordan aims to solidify his legacy by mentoring younger prepress staff, codifying workflow best practices, and authoring a comprehensive manual on prepress processes
    for his company. He also seeks to transition into a part‑time consultancy, offering specialized troubleshooting and efficiency audits to local print shops, while maintaining a steady income to support
    his family and reduce his lingering financial worries.
