  career_goals: Kerrieann aims to advance within the school district's transportation department. In the short term, she plans to obtain a CDL upgrade for larger vehicles and a certification in transportation
    safety management. Over the next five years, she aspires to become a route coordinator or senior driver, eventually moving into a role as a transportation safety trainer or assistant transportation
    director. Her ambition is to implement systematic safety protocols, improve operational efficiency, and mentor a new generation of drivers while securing stable benefits and a predictable career path.
