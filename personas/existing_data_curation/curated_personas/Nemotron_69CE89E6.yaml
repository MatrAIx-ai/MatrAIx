personas:
  professional: Kerrieann Willey, a meticulous school bus driver in Orange County, leverages their Class B CDL and route‑optimization software to keep daily schedules tight, conducts exhaustive safety checks
    before each shift, mentors new drivers with exacting standards, and constantly plans for a future promotion into transportation safety training, reflecting they embody a methodical, safety‑first mindset.
  sports: Kerrieann Willey, who prefers low‑key fitness, they jog along the Pacific coastline at sunrise, participate in a small Orange County walking club, and strictly watch the Los Angeles Lakers in
    winter and the Los Angeles Dodgers in summer, while avoiding crowded gyms, reflecting their solitary yet competitive streak.
  arts: Kerrieann Willey, an avid knitter who follows intricate patterns from Maine Maine, they devour mystery novels by Agatha Christie and Gillian Flynn, enjoy true‑crime podcasts by Sarah Koenig, and
    find solace in the piano compositions of Ludovico Einaudi, weaving these artistic threads into a quiet evening routine.
  travel: Kerrieann Willey, a careful planner, they orchestrate weekend escapes to Joshua Tree and Santa Barbara, meticulously map routes and pack weather‑appropriate gear, dream of a solo pilgrimage to
    the Scottish Highlands but keep that trip on a saved‑for‑later list due to budget constraints, favoring low‑stress, structured travel itineraries over spontaneous adventure.
  culinary: Kerrieann Willey, whose herb garden supplies fresh rosemary, thyme, and mint, they enjoy simple, nutrient‑dense meals like roasted salmon with lemon‑herb glaze, quinoa bowls sprinkled with edible
    purslane, and brew mint‑chocolate hot cocoa, and while their cooking skill is modest, they meticulously follow recipes to ensure each dish meets their exacting standards.
  core: Kerrieann Willey, a 29‑year‑old precision‑driven bus driver, they exhibit a blend of quiet diligence and cautious skepticism, channeling stress into structured puzzles, meticulous knitting, and
    a tight‑budget mindset.
background:
  cultural: Kerrieann grew up in a middle‑class, white, Southern‑California family in Orange County. Her upbringing emphasized hard work, punctuality, and community responsibility. She attended a public
    high school in the area and developed strong ties to local schools and neighborhoods. The cultural environment includes typical American suburban values, participation in holidays such as Thanksgiving
    and the Fourth of July, occasional Protestant church attendance, and a deep appreciation for the safety and well‑being of children in her community.
