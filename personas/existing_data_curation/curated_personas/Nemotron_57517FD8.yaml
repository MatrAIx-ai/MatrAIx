personas:
  professional: Jeremy Prevost, a senior solar photovoltaic installer with a knack for troubleshooting and crew coordination, blends their Midwestern practicality with a curiosity for emerging renewable
    technologies as they work toward NABCEP certification and a future project‑management role overseeing commercial solar and battery installations.
  sports: Jeremy Prevost laces up for the Prairie Wind Soccer Club’s Saturday league, chases the annual deer season with a high‑powered bow, and roots enthusiastically for the Minnesota Vikings and the
    North Dakota State Bison, and they view their weekend bike rides through the prairies as both leisure and low‑key cardio.
  arts: Jeremy Prevost unwinds after a day on the roof by listening to the timeless twang of Johnny Cash and the contemporary storytelling of Sturgill Simpson, attends the Bismarck community theatre’s productions
    of ‘Our Town,’ and occasionally tries their hand at carving wooden spoons while they hum along to folk guitarist John Denver.
  travel: Jeremy Prevost prefers spontaneous road trips across the Great Plains, often camping near Badlands National Park or drifting through the pine‑laden hills of Montana, and they dream of a summer
    getaway to Iceland’s geothermal sites to study renewable tech and a family vacation to the sun‑kissed beaches of Cabo San Lucas.
  culinary: Jeremy Prevost, an avid backyard grill master, relishes smoking pork ribs with a paprika‑brown‑sugar rub, tossing fresh corn and diced potatoes on the grill alongside a side of dill‑infused
    bison burgers, and they occasionally whip up a hearty cabbage stew to serve at community potlucks.
  core: Jeremy Prevost balances a curiosity for solar innovation with a laid‑back, sometimes disorganized lifestyle, trading Saturday soccer matches for weekend hunts, occasionally over‑ordering DIY hardware,
    yet they remain a steadfast community mentor who never skips a tailgate.
background:
  cultural: Jeremy is a white Midwesterner with deep roots in the North Dakota community. His ancestry includes German and Scandinavian (particularly Norwegian) lineage, reflective of the settlement patterns
    in the Bismarck area. Raised in a small town, he was taught the values of hard work, self‑reliance, and neighborly cooperation. Local church gatherings, harvest festivals, and seasonal outdoor pursuits
    have shaped his sense of community. These cultural influences combine with a pragmatic Midwestern outlook, making him both curious about new ideas and grounded in practical, proven methods.
attributes:
  skills: '[''Solar PV system installation'', ''Electrical wiring and conduit work'', ''System design and layout using PV design software'', ''Troubleshooting and performance optimization'', ''Safety compliance
    and OSHA regulations'', ''Team coordination and on‑site supervision'', ''Customer consultation and sales support'', ''Roof safety and fall protection'', ''Basic project budgeting and material estimation'']'
  hobbies: '[''Fishing'', ''Hunting'', ''Camping'', ''Bicycle rides'', ''Community soccer league'', ''Barbecuing and grilling'', ''DIY home‑improvement projects'', ''Woodworking'', ''Attending local fairs
    and rodeos'', ''Volunteer work with Habitat for Humanity'', ''Exploring new renewable‑energy technologies'']'
  career_goals: Jeremy aims to advance from senior installer to a project management role within his solar company, eventually overseeing larger commercial installations and integrating battery storage
    solutions. He plans to earn the NABCEP Certified PV Installation Professional credential to solidify his expertise. In the long term, he hopes to launch his own small contracting business that focuses
    on community‑scale renewable projects and provides mentorship opportunities for younger technicians. Jeremy also envisions becoming an advocate for clean‑energy policies in North Dakota, working with
    local officials and community groups to promote solar adoption in the region.
