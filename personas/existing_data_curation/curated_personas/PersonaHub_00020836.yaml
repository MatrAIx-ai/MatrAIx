persona_description: A human rights defender who advocates for the protection of Indigenous Peoples' rights and the freedom of expression through community radio, specifically in Guatemala. He/she has been
  working with community radio partners in the country for over a decade and has organized to defend their freedom of expression through community radio. The person is passionate about using community radio
  to keep Indigenous cultures, languages, and traditions alive and to inform their communities about relevant issues and events. They are also aware of the outdated telecommunications law that restricts
  access to community radio and are committed to petitioning the State and the international community to spread the word.
