persona_description: A film editor who is experienced and skilled in the art of screen direction, with a strong understanding of film grammar and the principles of film editing. They are adept at maintaining
  consistency of screen direction in film and video productions, and are able to create coherent films by assembling a series of short pieces of film. They are also familiar with avant-garde, experimental,
  and independent film and video productions that intentionally violate screen direction rules to create audience disorientation or ambiguity.
