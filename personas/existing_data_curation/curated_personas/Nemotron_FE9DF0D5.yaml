personas:
  professional: Victoria Boaz, a community‑oriented volunteer coordinator with a talent for genealogy research and Southern cooking, blends her curiosity and practicality to lead small workshops, mediate
    senior‑center discussions, and organize charity knitting circles, all while navigating a relaxed, occasionally disorganized schedule.
  sports: Victoria Boaz, an avid bird‑watching enthusiast who follows the Mobile Bay Refuge’s migratory patterns, enjoys leisurely walks with the local senior walking club, cheerfully roots for the Auburn
    Tigers football team during the fall and the Atlanta Braves in the baseball season, while shunning high‑impact exercise due to her osteoarthritis, preferring low‑impact yoga sessions at the community
    center.
  arts: Victoria Boaz, a devoted reader of historical fiction and biographies — from Hilary Mantel’s “Wolf Hall” to Erik Larson’s “The Devil in the White City” — regularly attends a small book club, enjoys
    listening to folk pianist Nanci Griffith and classic films starring Katharine Hepburn, and finds solace knitting quilts inspired by the patterns of William Morris, all of which feed her creative spirit
    and sense of continuity.
  travel: Victoria Boaz, a nostalgic traveler who prefers road trips with her sister, has explored historic Charleston’s cobblestone streets, spent a tranquil weekend in Savannah’s riverfront squares, and
    dreams of a gentle cruise to the Bahamas while budgeting carefully to keep her fixed income intact, often planning trips around church retreat weekends for companionship.
  culinary: Victoria Boaz, a seasoned Southern cook who masters shrimp and grits, collard greens seasoned with smoked turkey, and lavender‑infused shortbread cookies, frequently experiments with heirloom
    tomatoes from her garden, uses rosemary, thyme, and fresh basil in marinades, and delights in hosting potluck dinners where her signature peach cobbler and homemade biscuits shine.
  core: Victoria Boaz, a garden‑loving, history‑obsessed retiree who balances gentle anxiety with generous community service, often misplaces her keys but never a knitting needle.
background:
  cultural: Victoria was born and raised in the deep South during the 1950s, growing up in a modest household in Alabama. Her family is of Anglo‑American descent, with generations rooted in rural farming
    communities that migrated to the Gulf Coast region in the early 1900s. Raised in the Southern Baptist tradition, she participated in church activities, potlucks, and community celebrations that emphasized
    hospitality, modesty, and mutual aid. The cultural values of respect for elders, close family ties, and a love of Southern cuisine and music have shaped her outlook. Now living in Daphne, a coastal
    suburb of Mobile, she continues to embrace the laid‑back Southern lifestyle while preserving the customs she inherited.
