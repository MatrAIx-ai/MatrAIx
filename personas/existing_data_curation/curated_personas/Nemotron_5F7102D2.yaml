personas:
  professional: An aspiring junior scientist and budding robotics builder, Juan Torresreyes thrives in the school’s science club, channeling their vivid imagination into designing simple LEGO‑based robots
    while balancing the disciplined steps of basic programming with playful experimentation.
  sports: A lively soccer enthusiast, Juan Torresreyes laces up bright blue cleats for the neighborhood youth league’s “Eagles” team, dominates playground tag games with endless energy, and when not playing,
    they cheer for the city’s professional football club, the Tigers, after school.
  arts: An imaginative illustrator, Juan Torresreyes fills sketchbooks with dragons soaring over starlit nebulae while humming cumbia beats mixed with pop hits from Billie Eilish, and occasionally draws
    inspiration from animated series like ‘Adventure Time’, turning their walls into a vivid gallery of fantasy.
  travel: A curious little explorer, Juan Torresreyes spends weekend afternoons wandering the city’s botanical garden and river trail searching for beetles and shiny stones, and dreams of future trips to
    the Grand Canyon and the Smithsonian’s National Air and Space Museum, often telling their friends about the next adventure they hope to undertake.
  culinary: A budding kitchen helper, Juan Torresreyes mixes colorful fruit smoothies with mango, banana, and strawberry, devours pepperoni pizza slices with extra cheese, and occasionally attempts to recreate
    crunchy taco shells they saw on a cooking show, proudly serving their family with a big grin.
  core: Juan Torresreyes, a bright‑eyed 7‑year‑old imagination engine, balances a love for scientific tinkering, vivid art, and energetic play while navigating allowance‑saving, snack‑finding, and occasional
    crumb‑stained sock adventures, and they never miss a chance to dream up a new invention.
background:
  cultural: Juan lives in a bilingual household where Spanish and English are spoken daily. His Colombian heritage is celebrated through family gatherings that feature dishes such as arepas and empanadas,
    music like cumbia and Vallenato, and holidays such as Independence Day (July 20) and Carnaval. These cultural experiences enrich Juan’s imagination and his love for rhythmic music, while his upbringing
    in Califon, NJ exposes him to American school life, community sports, and a diverse peer group.
