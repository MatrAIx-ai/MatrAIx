  career_goals: Juan dreams of becoming an astronaut who explores new worlds, an artist who creates comic books, or an inventor who builds cool gadgets. He is eager to learn more about space, technology,
    and how art can tell stories, hoping that one day he can combine all three passions in a career that lets him keep inventing and sharing ideas.
