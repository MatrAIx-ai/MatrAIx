  career_goals: Phuong dreams of a future where she can combine her love for helping others with her natural affinity for order and structure. She aspires to become a pediatric nurse or a community health
    worker, believing that a caring, organized approach can make a real difference in children's lives. She also imagines one day leading health-education workshops in her neighborhood, ensuring families
    have reliable information and support.
