  hobbies: '[''soccer'', ''model rocketry'', ''wildlife sketching'', ''debate club'', ''peer tutoring'', ''cooking'', ''music listening'', ''dancing'', ''journaling'', ''volunteering at animal shelter'']'
  career_goals: Joy Anne aims to combine her love for biology with a practical career path. She plans to enroll in a technical college to study veterinary technology or biomedical engineering, aspiring
    to work with animal health or develop community health initiatives. In the long term, she envisions becoming a project manager for a regional veterinary clinic or a small biotech startup, where she
    can apply her organized, methodical approach while mentoring younger peers. She also hopes to earn certifications in first aid and animal care to augment her qualifications.
