personas:
  professional: Thomas Cosgriff, a budding junior engineer who channels his love for LEGO robotics and Minecraft architecture into creating real‑world contraptions, balances his curiosity with a methodical
    approach to building and eagerly shares his designs during school projects.
  sports: Thomas Cosgriff, a forward for the local Little Timber Wolves soccer team, trains competitively at Greenfield Park, idolizes the hometown professional club Seattle Sounders FC, and proudly wears
    his team's jersey while tracking his sprint times on a smartwatch.
  arts: Thomas Cosgriff, an enthusiastic participant in school drama who loves being center stage, frequently reenacts scenes from his favorite sci‑fi books, and collects soundtracks from composers like
    C418 and Hans Zimmer to inspire his LEGO storytelling.
  travel: Thomas Cosgriff, an inquisitive traveler who prefers hands‑on experiences, has explored the interactive exhibits at the local science museum, visited Disneyland for its themed rides, and dreams
    of a future family trip to the historic castles of Scotland, balancing his excitement with a detailed itinerary drawn in his notebook.
  culinary: Thomas Cosgriff, a budding chef who favors building his own pizza with pepperoni, olives, and pineapple, enjoys making quick peanut butter‑jelly sandwiches after school, and experiments with
    simple chemistry by creating fizzy soda‑pop using baking soda and vinegar for science fun.
  core: Thomas Cosgriff is a curious, organized, and talkative 7‑year‑old who blends competitive soccer, LEGO robotics, and dramatic flair into a vibrant, methodical life peppered with occasional candy
    splurges.
background:
  cultural: Thomas was raised in a suburban neighborhood of Rockwall, Texas, within a white, middle‑class family that values community, hard work, and family togetherness. His upbringing reflects a blend
    of Southern hospitality—regular family barbecues, celebration of holidays like Thanksgiving and the Fourth of July—and broader American pop culture influences from school and media. He frequently participates
    in local community events, such as the Rockwall County Fair and youth sports leagues, and attends a community church where he engages in age‑appropriate activities. The diverse student body at his elementary
    school exposes him to a variety of cultural perspectives, further shaping his respectful and sociable outlook.
