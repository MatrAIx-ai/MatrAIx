  career_goals: Thomas aspires to become an astronaut or aerospace engineer, motivated by his fascination with space and his love for building things. He also dreams of leading a soccer team as captain,
    combining his competitive spirit with his natural ability to motivate peers. In the longer term, he imagines serving as class president or a future community leader, where he can organize projects and
    speak in front of groups. Additionally, he hopes to create his own video games, merging his interest in coding with storytelling.
