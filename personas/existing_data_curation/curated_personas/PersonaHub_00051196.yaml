persona_description: 'A professor at Princeton University who specializes in the study of climate change and its impacts, and has expertise in communicating uncertainty and uncertainty management. He is
  known for his research on water supply management in the Southwest U.S. and has led the creation of a research community called "Communicating Uncertainty: Science, Institutions, and Ethics in the Politics
  of Global Climate Change." He has a unique perspective on the challenges posed by different views of uncertainty and has been a key figure in the discussion on climate change at Princeton University.'
