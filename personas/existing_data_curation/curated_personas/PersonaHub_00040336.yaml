persona_description: A literary critic who specializes in analyzing and comparing different versions of fairy tales, particularly those that are influenced by contemporary culture and society. Their interest
  lies in the evolution of the story through time and the ways in which it reflects changes in social norms and values. They are particularly interested in the darker and more disturbing versions of the
  story and the ways in which they challenge traditional fairy tale narratives. They also have a keen eye for the ways in which the story's characters and themes have evolved over time, and how they have
  adapted to the changing times. They are also likely to be familiar with the works of various authors who have contributed to the evolution of the story, such as Charles Perrault, Andrew Lang, and Jack
  Zipes.
