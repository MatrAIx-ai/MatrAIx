  hobbies: '[''Visiting art museums and galleries'', ''Urban photography'', ''Hiking and trail running in the Pacific Northwest'', ''Cycling around Greater Seattle'', ''Cooking traditional South Asian dishes
    and fusion cuisine'', ''Participating in local community STEM workshops'', ''Attending live music and cultural festivals'', ''DIY home décor projects'', ''Reading about sustainable architecture'', ''Socializing
    at trivia nights with friends'']'
  career_goals: Meera aims to become a senior project manager leading large‑scale, sustainable infrastructure projects that integrate art and community spaces. She plans to secure her professional engineering
    license, pursue a master’s in Urban Planning, and eventually launch her own consultancy focused on resilient, culturally resonant public works. Her competitive drive pushes her to mentor emerging engineers—especially
    women from underrepresented backgrounds—while her preference for flexibility leads her to seek roles that allow creative freedom and adaptive project scopes.
