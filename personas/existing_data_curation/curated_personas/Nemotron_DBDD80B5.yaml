personas:
  professional: Meera Lee, a Seattle civil engineer specializing in structural analysis and LEED‑certified sustainable design, leverages AutoCAD, Civil 3D, and Revit to transform city projects into community‑centered
    works, while their relaxed, improvisational mindset turns tight deadlines into collaborative creative bursts.
  sports: Meera Lee fuels weekend vigor by mountain biking the Cascades with the Seattle Cycle Club, cheering on the Seahawks during fall football, playing in a co‑ed ultimate‑frisbee league, and attending
    Seattle Sounders matches for a dose of community energy.
  arts: Meera Lee immerses in Seattle’s vibrant art scene, devouring installations at the Seattle Art Museum, drawing inspiration from Yayoi Kusama and local photographer Edward Burtynsky, and caps evenings
    with live shows by Brandi Carlile and The National, weaving these experiences into their design aesthetic.
  travel: Meera Lee favors road‑trip photography getaways, having explored the Pacific Northwest’s Olympic Peninsula, Banff National Park, and a weekend art tour in Portland, while dreaming of trekking
    Patagonia’s Torres del Paine and wandering Barcelona’s Gothic Quarter, often planning trips months in advance to balance budget and work flexibility.
  culinary: Meera Lee experiments in the kitchen with South Asian‑fusion dishes like ginger‑garlic chickpea tikka masala paired with miso‑glazed salmon, rolls homemade naan infused with rosemary, and delights
    in sourcing fresh herbs from Seattle’s Pike Place Market, all while maintaining a decent but improv‑style cooking schedule.
  core: Meera Lee blends a passion for sustainable civil engineering with a love of art, photography, and adventurous cooking, navigating life with a flexible, competitive edge that sometimes leaves bills
    unpaid but always fuels creative community projects.
background:
  cultural: Meera grew up in a South Asian immigrant family, celebrating festivals such as Diwali and Eid while navigating a bicultural identity in the United States. Fluent in English and Hindi, she values
    family cohesion, respect for elders, and the importance of education—principles that shape her professional drive. She remains active in the Seattle South Asian community, attending cultural events,
    supporting local non‑profits, and integrating elements of her heritage into her work, such as incorporating traditional motifs into public‑space designs.
