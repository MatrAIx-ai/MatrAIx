personas:
  professional: Cynthia Shows, a 33‑year‑old laboratory instructor and STEM curriculum developer, leverages expertise in Python, MATLAB, and Tableau to craft hands‑on experiments while using their sociable,
    talkative nature and assertive yet compassionate guidance to foster inclusive classrooms and lively community theater collaborations.
  sports: Cynthia Shows enjoys seasonal hiking in spring and fall, runs with the Farmington Trail Runners club year‑round, and fuels weekend excitement by cheering the Kentucky Wildcats basketball team
    and the Louisville Cardinals football squad, while winter finds them scaling indoor climbing walls at the local gym.
  arts: Cynthia Shows, a dedicated member of the Farmington Community Players, thrives on acting and stage‑craft, drawing inspiration from performers like Meryl Streep and Lin‑Manuel Miranda, while their
    weekly book club fuels a love for contemporary science writers such as Carl Zimmer and Appalachian folklore storytellers like John Jacob Niles, and they regularly attend jazz nights at the regional
    Performing Arts Center.
  travel: Cynthia Shows favors low‑key, nature‑focused travel, spending weekends trekking the Blue Ridge Parkway and venturing to Shenandoah National Park, while longer getaways have taken them to Asheville’s
    vibrant arts scene and to Edinburgh, Scotland for the Fringe Festival, all planned through meticulous budgeting apps that balance their desire for adventure with the need to fund graduate school.
  culinary: Cynthia Shows delights in baking, reimagining classic Appalachian staples like corn pone and apple dumplings by adding quinoa stuffing or matcha‑infused glaze, sourcing heirloom cornmeal and
    locally milled honey, and often sharing the results on a community Instagram page where they tag fellow home chefs.
  core: Cynthia Shows is an energetic, socially‑savvy STEM educator who fuses Appalachian baking traditions with data‑driven teaching, juggling relentless curiosity and a nervous tendency to over‑plan.
background:
  cultural: Cynthia was raised in a middle‑class family in Marion County, West Virginia, where the cultural tapestry blends Appalachian heritage with an appreciation for education. Her family values self‑reliance,
    close community ties, and the storytelling traditions of the region, including folk music and craft. Growing up, she attended local schools that emphasized hands‑on learning, and she was encouraged
    to pursue a STEM path as a means of expanding her opportunities beyond the coal‑mining and farming industries that have historically shaped the area. While she identifies as white American, Cynthia’s
    cultural identity is rooted in the Appalachian emphasis on hospitality, perseverance, and a deep connection to the natural landscape. These influences inform her commitment to making STEM education
    accessible and relevant to rural communities.
