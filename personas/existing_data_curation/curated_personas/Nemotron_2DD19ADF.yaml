  career_goals: Cynthia aims to transition from a teaching assistant role to a full‑time faculty position within the next five years, focusing on developing experiential STEM curricula that bridge theory
    and real‑world application. She plans to pursue a Master’s degree in Science Education to deepen her pedagogical expertise and to qualify for tenure‑track opportunities at regional colleges. Long‑term,
    she aspires to lead a community outreach program that brings STEM experiences to under‑served Appalachian schools, securing grant funding to establish mobile labs and mentorship networks. Cynthia also
    hopes to become a mentor for students navigating academic stress, integrating mental‑health awareness into her teaching practice. Ultimately, she envisions influencing educational policy to support
    equitable STEM opportunities in rural areas.
