  hobbies: '[''Reading mystery novels'', ''Gardening (vegetables)'', ''Cycling on county roads'', ''Community quilting circle'', ''DIY vehicle projects'', ''Fishing on local lakes'', ''Crossword puzzles'',
    ''Cooking new recipes'']'
  career_goals: Kayla aims to advance within the district’s transportation department, aspiring to become a route supervisor or driver trainer where she can mentor new drivers and lead safety‑initiative
    projects. She plans to complete a bachelor’s degree in Transportation Management to qualify for a fleet‑manager role, and she is working toward additional certifications such as Advanced Driver Training
    and Vehicle Inspection Specialist. Long‑term, she hopes to influence district policy on route efficiency and to champion the adoption of eco‑friendly school buses, leveraging her curiosity for new technologies
    while maintaining her record of zero accidents.
