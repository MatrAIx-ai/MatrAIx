  hobbies: '["Sketching", "Watercolor painting", "Reading speculative fiction", "Creative writing (poetry and short stories)", "Photography", "Exploring local nature trails", "Listening to indie folk and
    blues", "Attending small art workshops", "Journaling", "Upcycling vintage clothing", "Puzzle solving"]'
  career_goals: Diane aims to transition from a cashier to a visual merchandiser or boutique manager role where she can blend her retail experience with her love for art and design. She plans to complete
    a bachelor's degree in Fine Arts or Visual Merchandising, develop a curated online shop for her illustrations and handcrafted items, and eventually open a small community‑focused gallery‑café that showcases
    local artists while offering flexible, creative work hours. Her ambition balances professional advancement with personal artistic expression and sustained independence.
