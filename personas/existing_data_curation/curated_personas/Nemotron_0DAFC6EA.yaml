  career_goals: Bethany aims to transition from day‑to‑day classroom assistance to a mentorship and program‑development role within the Gwinnett County school system. She plans to obtain a certification
    in special education to better serve students with diverse learning needs and hopes to design a family‑engagement initiative that strengthens school‑community ties. In the longer term, she envisions
    leading after‑school tutoring programs and possibly authoring a practical guide for teaching assistants that blends proven strategies with innovative, curiosity‑driven approaches.
