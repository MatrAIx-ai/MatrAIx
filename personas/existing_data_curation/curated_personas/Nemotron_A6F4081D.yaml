  career_goals: While not formally employed, Brett aims to volunteer as a guide and mentor at the Portland Art Museum, sharing his self‑taught art knowledge. He also hopes to start a community garden that
    serves as an outdoor gallery for local artists and to write a memoir that captures his curiosity about unconventional ideas and his life in the Pacific Northwest.
