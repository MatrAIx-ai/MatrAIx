    Analytics'', ''Vendor Management'']'
  hobbies: '[''Baking'', ''Gardening'', ''Running'', ''Strategic Board Games'', ''DIY Woodworking'', ''Reading Business & Tech Books'', ''Attending Kentucky Derby Events'', ''Exploring Bourbon Distilleries'',
