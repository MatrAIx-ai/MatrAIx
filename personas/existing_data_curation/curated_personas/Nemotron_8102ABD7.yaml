personas:
  professional: Brittani Bartlett is a seasoned database professional who architects high‑availability Oracle, SQL Server, and PostgreSQL environments with a meticulous, data‑security‑first mindset, translating
    complex technical solutions into clear business insights for finance and healthcare clients, and they channel a competitive drive into delivering on‑time, well‑documented projects while maintaining
    a pragmatic, structured workflow.
  sports: Brittani Bartlett is an avid road‑race runner who has completed the Louisville Marathon and trains with the Louisville Road Runners Club, they cheer for the Louisville Cardinals men's basketball
    team and follow Louisville City FC in the USL, while also enjoying the Kentucky Derby spectacle as a testament to strategic pacing and endurance.
  arts: Brittani Bartlett unwinds by crafting intricate Catan settlements and Terraforming Mars strategies, they regularly attend performances by the Louisville Orchestra, listen to the bluegrass stylings
    of Alison Krauss and classic Southern soul from Otis Redding, and keep a curated collection of books by Malcolm Gladwell and Yuval Noah Harari on their nightstand.
  travel: Brittani Bartlett favors meticulously planned trips that mix culinary exploration and outdoor activity, they have trekked the bourbon trail through Bardstown, savoring distillery tours, taken
    a weekend getaway to Asheville’s Blue Ridge Mountains, and dream of a springtime visit to Kyoto’s cherry blossoms to sketch garden layouts for their own backyard.
  culinary: Brittani Bartlett excels at precision baking, mastering Ukrainian pierogies stuffed with potato and cheddar and golden Southern biscuits with buttermilk, they season dishes with fresh herbs
    from their organic garden like rosemary, thyme, and heirloom tomatoes, and relish pairing homestyle meals with small‑batch Kentucky bourbon glazes.
  core: Brittani Bartlett blends a data‑driven, competitive mindset with a love for marathon‑length runs, board‑game tactics, and perfecting pierogies, while occasionally over‑scheduling their calendar
    and forgetting to unwind.
background:
  cultural: Brittani was raised in Louisville, Kentucky, within a family that blends Ukrainian heritage—passed down through the Petrovych line—with traditional Midwestern Southern culture. Her household
    honors Ukrainian customs such as Orthodox Christmas and homemade pierogi gatherings, while also participating in regional traditions like the Kentucky Derby, bourbon appreciation, and local church activities.
    This dual cultural influence instilled a strong work ethic, respect for education, and a sense of community service, shaping both her personal outlook and professional discipline.
