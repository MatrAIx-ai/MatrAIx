  career_goals: Brittani aims to become a senior data architect leading enterprise‑wide data strategy for a major financial or healthcare organization in the Midwest. She plans to earn advanced certifications
    such as AWS Certified Solutions Architect and Certified Data Management Professional, and to spearhead data‑governance initiatives that increase data quality and regulatory compliance. Over the next
    decade she aspires to transition into a Chief Data Officer role, author thought‑leadership articles, speak at industry conferences, and mentor the next generation of DBAs—all while preserving a balanced
    personal life with her spouse and family.
