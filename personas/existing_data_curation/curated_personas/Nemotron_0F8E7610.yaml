  career_goals: Jose dreams of becoming an architect or urban designer who integrates artistic creativity with thoughtful, community‑focused planning. He envisions designing colorful public spaces that
    reflect Mexican cultural motifs while embracing sustainable practices. He also hopes to mentor younger children in art, perhaps through after‑school workshops or a future role as a community arts coordinator,
    combining his love for creativity, organization, and social connection.
