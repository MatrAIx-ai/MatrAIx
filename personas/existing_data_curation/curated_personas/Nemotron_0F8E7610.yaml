personas:
  professional: Jose Cardella, a budding comic‑book illustrator and LEGO architect, channels a methodical planning style into meticulously storyboarded panels, leverages their sociable charisma to host
    weekly sketch circles at school, and volunteers to help peers craft characters, blending curiosity with a kind, collaborative spirit in every creative project.
  sports: Jose Cardella scores goals as a forward for the Eastside Mini‑Strikers youth soccer team, trains on Tuesdays and Thursdays, idolizes Manchester United’s attacking play, and never misses a weekend
    of watching the World Cup highlights with friends, combining their competitive drive with a love for team camaraderie.
  arts: Jose Cardella spends afternoons drawing comic strips inspired by Stan Lee’s dynamic heroes, animates stop‑motion shorts that echo Miyazaki’s whimsical storytelling, explores local art galleries
    for fresh color palettes, and grooves to a blend of regional folk tunes and The 1975’s pop tracks, letting their curiosity and sociable flair fuel a vibrant artistic identity.
  travel: Jose Cardella approaches family vacations with a detailed checklist, has already visited the Smithsonian National Air and Space Museum, dreams of strolling through the Louvre’s grand halls in
    Paris and snorkeling the Great Barrier Reef, yet often forgets their sketchbook, turning travel moments into spontaneous doodle adventures.
  culinary: Jose Cardella proudly assists in preparing hand‑rolled corn tortillas, fresh salsa verde, and homemade tacos, mixing ingredients while humming contemporary pop hits, but can be distracted by
    LEGO builds, leading to occasional burnt taco shells that become a running joke at family meals.
  core: Jose Cardella is a curious, organized, and talkative ten‑year‑old whose love for comics, soccer, and cooking stitches together a life of creative projects, team spirit, and a dash of mischievous
    snack‑spending.
background:
  cultural: Jose is a Mexican‑American raised in Chino Hills, California, in a bilingual household that celebrates both Mexican traditions and Southern Californian culture. His family observes Día de los
    Muertos and quinceañera customs, shares stories of their heritage, and cooks dishes like tacos al pastor and tamales. This dual cultural immersion influences his artistic style, language use, and community
    values, fostering a strong sense of identity and a desire to share his cultural roots with others.
