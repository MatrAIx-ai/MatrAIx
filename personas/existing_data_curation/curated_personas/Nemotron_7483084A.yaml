  hobbies: '["Listening to R&B and hip‑hop music", "Playing basketball (small pickup games)", "Video gaming (strategy and role‑playing games)", "Sketching and drawing comics", "Journaling", "Cooking simple
    meals for family", "Volunteering at community center", "Reading self‑help and motivational books", "Mindfulness meditation", "Sneaker collecting"]'
  career_goals: His immediate goal is to obtain his GED within the next two years and enroll in a vocational program that leads to a certification as a certified nursing assistant or a community health
    worker. Long‑term, he aspires to work as a peer counselor or youth outreach coordinator, providing support to other adolescents facing emotional distress and helping them develop coping strategies.
    He also hopes to advocate for mental‑health awareness in his North Bergen community, creating structured support groups that blend his love for organization with his compassionate nature. Ultimately,
    he seeks a stable, structured career that offers both personal fulfillment and the opportunity to give back.
