personas:
  professional: Hassan Tarver is an aspiring certified nursing assistant who leverages their empathic listening, peer mediation expertise, and penchant for routine to create orderly, supportive care settings
    for adolescents, reflecting their love for structure and compassion.
  sports: Hassan Tarver enjoys shooting hoops at the local park with a close‑knit group of friends, follows the New York Knicks and the North Bergen High School basketball team, and participates in the
    community center’s weekend pick‑up league, balancing structured workout routines with occasional days of skipping practice due to anxiety spikes.
  arts: Hassan Tarver curates personal playlists featuring R&B artists like H.E.R. and hip‑hop legends such as J. Cole, draws comic‑style sketches inspired by classic superheroes during quiet evenings,
    and reads self‑help books like 'Atomic Habits' and 'The Power of Now' to fuel both creative expression and personal growth.
  travel: Hassan Tarver prefers well‑planned short trips, having explored Brooklyn’s street‑art scene, Washington D.C.’s historic monuments, and dreaming of a future visit to Tokyo’s Akihabara district
    for its gaming culture, always budgeting carefully and using a travel checklist to manage anxiety about unknown environments.
  culinary: Hassan Tarver regularly prepares simple family meals such as garlic‑spiced chicken stir‑fry, cheesy quesadillas, and hearty vegetable soup, enjoys experimenting with fresh basil and jalapeños,
    and relies on YouTube tutorials while occasionally treating themselves to limited‑edition sneaker‑themed snack boxes.
  core: Hassan Tarver is a structured, compassionate teen who balances a love for music, gaming, and community service with a tendency toward anxiety‑driven perfectionism and an occasional sneaker‑obsessed
    spending spree.
background:
  cultural: Hassan is a Black American teenager raised in the diverse, working‑class community of North Bergen, New Jersey. His family's heritage blends African American traditions with Caribbean influences,
    reflected in the music, food, and church life that shape his upbringing. Family gatherings often feature soul food dishes such as collard greens and fried chicken, alongside Caribbean flavors like jerk
    seasoning, underscoring a respect for cultural resilience and communal support. The local African‑American church and community center have been central to his life, reinforcing values of cooperation,
    mutual aid, and compassion. These cultural experiences inform his worldview, motivating his desire to help others while navigating the challenges of adolescence.
attributes:
  skills: '["Basic computer literacy", "Empathetic listening", "Peer conflict mediation", "Small group event organization", "Time management", "Routine adherence", "Basic caregiving", "Cooking and meal
