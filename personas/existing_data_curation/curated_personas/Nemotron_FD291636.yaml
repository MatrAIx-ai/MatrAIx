  hobbies: '["Coastal Gardening","Reading (Classics & Nonfiction)","Book Club Participation","Beach Walking","Yoga","Mediterranean Cooking","Volunteer Work at Community Arts Center"]'
  career_goals: Anna aims to transition into a senior operations leadership role within the next three years, where she can shape strategic initiatives that improve efficiency while embedding sustainability
    practices. She is passionate about mentoring the next generation of women in operations, planning to establish a formal mentorship program at her company. Looking ahead to the pre‑retirement phase,
    she envisions launching a boutique consulting practice that helps small coastal businesses streamline their operations and adopt eco‑friendly processes. Throughout, she seeks to balance career advancement
    with meaningful community involvement, such as volunteering for local non‑profits focused on cultural education.
