  career_goals: His current ambitions revolve around legacy building, mentorship, and maintaining self‑reliance. He plans to finish a written memoir that intertwines his life story with the broader narrative
    of Memphis’s Black community, and to donate the manuscript to the local historical society. He also aims to lead a monthly budgeting workshop at the senior center, teaching peers how to stretch fixed
    incomes and avoid financial stress. To stay independent, he intends to learn to use a tablet for photo archiving, video‑calling his grandchildren, and streaming instructional videos for new DIY projects.
    Finally, he hopes to organize occasional neighborhood gatherings that celebrate blues music and oral history, creating a small but lasting cultural contribution.
