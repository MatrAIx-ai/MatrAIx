  hobbies: '[''Reading mystery novels'', ''Playing piano'', ''Drawing and sketching'', ''Building LEGO sets'', ''Girl Scout projects'', ''Chess'', ''Baking'', ''Nature hikes and exploring local parks'',
    ''Volunteer at library'']'
  career_goals: Sarah aims to pursue a career that blends her love for helping others with her organized, detail‑oriented nature. She dreams of becoming a pediatric nurse or a teacher, where she can care
    for and educate children. She also feels drawn to veterinary work because of her compassion for animals. Long‑term, she hopes to earn a degree in nursing or education and later contribute to community
    health and school programs in her hometown.
