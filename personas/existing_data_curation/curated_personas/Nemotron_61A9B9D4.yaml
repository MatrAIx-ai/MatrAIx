personas:
  professional: Sarah Baum, an aspiring junior mystery writer and meticulous library volunteer, channels her love of detective novels and methodical mindset into cataloging books, planning Girl Scout community
    projects, and drafting intricate plot outlines for her own secret-code-filled stories.
  sports: Sarah Baum, a member of the Pine Creek Cubs junior soccer club and an avid fan of the Seattle Seahawks and the US Women's National Soccer Team, balances structured after-school practices with
    weekend nature hikes organized by her Girl Scout troop, though she occasionally skips the weekly swim session to finish a LEGO build.
  arts: Sarah Baum, a budding pianist who practices scales with the precision of a metronome and sketches whimsical cartoons inspired by the works of Charles Schulz and Studio Ghibli, often spends evenings
    listening to Mozart while doodling mystery-scene panels for her own comic strip.
  travel: Sarah Baum, a meticulous planner who maps out family road trips with color-coded itineraries, dreams of exploring the interactive exhibits at the Smithsonian, hiking the Grand Canyon's South Rim,
    and building a LEGO replica of the Eiffel Tower during a future summer camp in France.
  culinary: Sarah Baum, a modestly skilled baker who delights in whipping up chocolate-chip cookies with a pinch of sea-salt and a dash of cinnamon alongside her mother, also enjoys a carefully measured
    bowl of mac-and-cheese topped with broccoli florets, and meticulously follows recipe cards to avoid over-mixing batter.
  core: Sarah Baum, a detail-oriented 12-year-old with a passion for mysteries, piano, and community service, thrives on structured routines, meticulously plans her projects, yet occasionally lets a cookie-baking
    marathon or a LEGO obsession derail her schedule.
background:
  cultural: Sarah comes from a white, middle‑class family in Conway, Arkansas, within Perry County. Her upbringing reflects Southern values of community, family, and modesty. The family participates in
    church gatherings, attends local fairs, and celebrates holidays with traditional Southern foods. She is immersed in a blend of rural and small‑town culture, appreciating outdoor recreation such as hiking
    and fishing, as well as local music and close‑knit community ties.
attributes:
  skills: '[''Organizational planning'', ''Basic computer literacy (Google Docs, Scratch)'', ''Empathetic peer support'', ''Event coordination (Girl Scouts)'', ''Basic piano playing'', ''Drawing and illustration'',
