  career_goals: By the end of high school, she wants to earn a place on the varsity soccer team, win at least one regional science‑fair award, and join the robotics club. Looking further ahead, Bethany
    envisions a career that lets her merge coding with design—either as a video‑game developer or a software engineer focused on sustainable tech. She aspires to attend a top university in California, such
    as Stanford or Caltech, where she can pursue a double major in Computer Science and Environmental Studies. Her competitive streak drives her to aim for scholarships and internships that demonstrate
    real‑world impact, while her pragmatic side wants a career that offers stable employment and the opportunity to solve everyday problems.
