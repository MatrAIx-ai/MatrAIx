personas:
  professional: Bethany Jackson, an aspiring junior game streamer and content creator, blends competitive multiplayer gaming skill with a natural curiosity for new strategies while keeping a relaxed, often
    disorganized schedule that lets them experiment spontaneously on TikTok tutorials.
  sports: Bethany Jackson fuels their love for soccer by playing forward on the middle school varsity team, cheering for LAFC after games, and hitting the San Gabriel trails on weekends for trail‑running
    drills, while they keep a casual membership at the local community center's indoor climbing wall to balance team sport with solo fitness challenges.
  arts: Bethany Jackson channels their comic‑style doodle habit into weekly sketch sessions inspired by the bold lines of Jim Lee and the dynamic poses of Studio Ghibli’s 'My Neighbor Totoro' characters,
    often posting time‑lapse videos that mash up their art with background tracks from the synth‑wave duo Carpenter Brut.
  travel: Bethany Jackson prefers short, adventurous getaways, having camped at Joshua Tree National Park's hidden valleys and hiked the Redwood forests of Northern California during spring break, while
    day‑dreaming about a future backpack trip through the historic streets of Kyoto to sketch anime‑inspired murals.
  culinary: Bethany Jackson experiments in the kitchen with quick baking projects like matcha‑green tea cupcakes and crispy chicken tenders seasoned with za’atar, boasting a decent skill level that lets
    them follow YouTube step‑by‑step tutorials while secretly adding extra chocolate chips for that extra indulgent crunch.
  core: Bethany Jackson is a competitive teen gamer who balances spontaneous creativity in doodling and LEGO building with a relaxed, sometimes chaotic approach to school and money, often channeling skepticism
    into strategic play while secretly hoarding extra chocolate chips for late‑night snacks.
background:
  cultural: 'Bethany comes from a white, middle‑class family of German‑Irish descent that has lived in the San Dimas suburb for several generations. Her upbringing reflects typical Southern‑California suburban
    culture: school events centered on sports and academic clubs, frequent family outings to local parks, Disneyland, and occasional trips to Los Angeles museums. The family celebrates American holidays—Thanksgiving,
    Fourth of July—and maintains a practical, independent ethos that values education and self‑reliance. Living in Los Angeles County, she is exposed to a culturally diverse community, which subtly influences
    her taste in music, food, and media while she primarily identifies with mainstream American teen culture.'
