    kitchen"]'
  hobbies: '["Herb and vegetable gardening", "Hiking in Long Island nature preserves", "Reading culinary literature and mystery novels", "Volunteering at community food banks", "Knitting and crafting",
    "Attending local farmers’ markets", "Experimenting with infused syrups and flavor extracts", "Food photography", "Listening to classic rock and folk music"]'
  career_goals: Jennifer aims to formalize her expertise with a culinary certification, launch her own boutique bakery in Central Islip that highlights locally sourced, seasonal ingredients, and develop
    a specialty line of gluten-free and dietary-restricted pastries. She envisions expanding into catering for community events, publishing a cookbook that blends traditional Long Island flavors with modern
    techniques, and establishing a mentorship program for aspiring bakers. Long-term, she hopes to become a recognized voice in the regional food scene while maintaining a sustainable, family-friendly business
    model.
