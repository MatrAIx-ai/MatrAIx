personas:
  professional: D Arcemont is a seasoned maintenance veteran who leverages over three decades of hands‑on experience diagnosing mechanical, electrical, and HVAC systems, crafting structured service schedules,
    mentoring apprentices with calm patience, and strategically pursues NATE and Journeyman Electrician certifications to transition into a supervisory and consulting role.
  sports: D Arcemont enjoys weekend fishing trips at Cheney State Park, regularly attends Wichita State Shockers baseball games, rallies behind the Kansas City Chiefs during football season, and participates
    in a local senior softball league, embodying a low‑key but loyal fan spirit while balancing solitary sport with occasional team play.
  arts: D Arcemont finds creative fulfillment in restoring vintage Chevrolet engines and crafting small wooden furniture, while listening to classic folk artists like John Prine and John Denver, and attending
    occasional performances at the Wichita Community Theatre, which together anchor their appreciation for Americana and hands‑on artistry.
  travel: D Arcemont favors road‑trip adventures in the family’s restored Chevrolet, exploring historic rail towns across the Midwest, fishing lodges in the Ozarks, and weekend excursions to Yellowstone,
    preferring thoughtfully planned itineraries that allow spontaneous detours to local fairs and community events.
  culinary: D Arcemont relishes grilling freshly caught catfish with lemon‑garlic butter, simmering hearty beef chili seasoned with cumin and smoked paprika, and baking rustic cornbread using heirloom cornmeal,
    often incorporating garden vegetables like tomatoes, zucchini, and sweet corn into home‑cooked meals.
  core: D Arcemont is a calm, pragmatic maintenance expert who blends hands‑on craftsmanship with a love for quiet fishing, vintage engines, and methodical mentorship, while occasionally letting disorganization
    creep into their finances and health routines.
background:
  cultural: Born and raised in the Kansas heartland, Isaac grew up in a modest, middle‑class family that emphasized Midwestern values of hard work, self‑reliance, and community service. His cultural background
    is anchored in a Protestant tradition, though he is comfortable with a pluralistic community. He attended a local public high school and completed some coursework at Wichita State University before
    entering the trades. The regional influence of agriculture, aviation, and manufacturing has shaped his practical outlook, appreciation for hands‑on problem solving, and commitment to steady, dependable
    work.
attributes:
  skills: '["HVAC system repair", "Electrical wiring and troubleshooting", "Plumbing maintenance", "Preventive maintenance scheduling", "OSHA safety compliance", "Blueprint reading", "Equipment diagnostics",
    "Team coordination", "Apprentice mentorship", "Inventory management"]'
  hobbies: '["Fishing", "Vintage car restoration", "Woodworking", "Reading historical nonfiction", "Community gardening", "Chess", "Attending local baseball games"]'
  career_goals: Isaac aims to become the lead maintenance supervisor for a mid‑size property management firm, earn advanced certifications such as NATE for HVAC and Journeyman Electrician status, and eventually
    transition into consulting or launch his own independent maintenance contracting business before retirement. He also wants to formalize a mentorship program for younger tradespeople and contribute to
    local vocational training initiatives, ensuring the next generation inherits his pragmatic approach to maintenance work.
