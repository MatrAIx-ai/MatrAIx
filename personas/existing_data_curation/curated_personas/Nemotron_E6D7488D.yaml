personas:
  professional: A buoyant aspiring hospitality professional, Bethann Sweatt channels their love of the Lake Worth beach scene into personable front‑desk interactions and leverages their knack for Instagram
    storytelling to boost small‑business social media presence, all while juggling GED studies and battling a habit of misplacing shift schedules.
  sports: An ocean‑enthusiast athlete, Bethann Sweatt devotes weekends to paddleboarding, beach volleyball with the Lake Worth Suns club, and casual swims, while cheering on the Miami Heat and the Tampa
    Bay Rays, and they keep a slightly irregular gym routine that fuels their competitive edge in online gaming.
  arts: A sunset‑chasing Instagram creator, Bethann Sweatt curates vibrant photo feeds of coastal horizons, draws inspiration from indie surf band The Swell and pop icons like Billie Eilish, dives into
    the latest season of "The Bachelor," and reads YA hits like "One of Us Is Lying," all of which shape their DIY jewelry designs and club‑night dance moves.
  travel: A spontaneous weekend wanderer, Bethann Sweatt packs a surfboard for quick road trips to Key West, dreams of surfing Bali’s beaches, and balances limited funds by swapping hostel stays for couch‑surfing
    with friends, while they plot future boutique pop‑up shops in Miami’s Art Deco district.
  culinary: A budding home‑chef with modest skills, Bethann Sweatt whips up grilled fish tacos seasoned with lime and cilantro, blends mango‑coconut smoothies for post‑paddleboard refuel, and experiments
    with reclaimed seashell‑inspired plating, yet often forgets to refrigerate leftovers, leading to occasional food‑safety mishaps.
  core: Bethann Sweatt, a 19‑year‑old beach‑obsessed, Instagram‑savvy dreamer, blends curiosity with a laid‑back, disorganized streak, juggling paddleboarding, DIY crafts, and ambitions of a handcrafted
    boutique while staying competitively sharp in online gaming.
background:
  cultural: Bethann is a white American who grew up in the coastal town of Lake Worth, Florida. Her upbringing reflects a blend of Southern hospitality and the laid‑back beach lifestyle common to Palm Beach
    County. The region’s multicultural atmosphere, with influences from nearby Hispanic and Caribbean communities, has exposed her to diverse music, food, and social norms, though she primarily identifies
    with a mainstream middle‑class Floridian culture that values individual freedom, casual social gatherings, and a strong connection to the ocean.
