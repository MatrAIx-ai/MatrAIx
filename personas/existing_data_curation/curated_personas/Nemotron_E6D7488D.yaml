  hobbies: '[''Beach swimming'', ''Paddleboarding'', ''Sunset photography'', ''Instagram posting'', ''Online competitive gaming'', ''Reality TV watching'', ''Young‑adult fiction reading'', ''Attending local
    concerts'', ''Dancing at clubs'', ''Volunteering at animal shelter'', ''DIY jewelry making'', ''Up‑cycling thrift store finds'']'
  career_goals: Bethann aims to earn her GED within the next year and then pursue a role in the hospitality or tourism sector that leverages her people skills and familiarity with the Lake Worth beach community.
    She is drawn to positions such as a front‑desk associate at a boutique hotel or a social‑media coordinator for a local shop, where she can combine her curiosity for new ideas with practical, on‑the‑job
    learning. In the longer term, she dreams of opening a small online boutique featuring handcrafted beach‑inspired accessories, while continuing to develop her organizational habits and professional expertise.
