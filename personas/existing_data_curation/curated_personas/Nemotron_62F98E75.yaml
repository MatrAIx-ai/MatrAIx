  career_goals: Looking ahead, Gustav aims to transition from a front‑line sales role to a senior managerial position, ideally as a district manager overseeing multiple locations. He wants to incorporate
    his artistic sensibility into store design standards across the chain, making each outlet a more engaging environment for customers. Parallel to this, he envisions establishing a mentorship program
    that pairs seasoned associates with younger staff to preserve institutional knowledge. As he approaches traditional retirement age, Gustav also dreams of opening a small boutique that showcases work
    by local Colorado artists and craftspeople, blending his retail acumen with his passion for the arts. He hopes to volunteer his hospitality expertise with the Denver Art Museum’s community outreach
    initiatives, bridging his career experience with civic contribution.
