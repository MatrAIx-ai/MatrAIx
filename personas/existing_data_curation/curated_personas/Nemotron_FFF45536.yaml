personas:
  professional: Kim Shuford is a retired volunteer archivist and community event coordinator whose meticulous organizational skills and disciplined approach turn every small exhibition at the Seaside Historical
    Society into a precisely curated experience, while their curious nature drives them to integrate oral histories and artistic installations into projects.
  sports: Kim Shuford enjoys low‑impact fitness through daily coastal bluff walks, birdwatching treks with the Monterey Birding Club, and cheering on the San Francisco Giants while attending senior‑friendly
    yoga classes at the local community center, rarely participating in competitive sports.
  arts: Kim Shuford immerses themselves in the arts by reading monographs on Claude Monet and Edward Hopper, attending poetry readings featuring works by Mary Oliver at neighborhood cafés, and volunteering
    as a curator for rotating exhibits at the Monterey Museum of Art, often quoting Maya Angelou to inspire volunteers.
  travel: Kim Shuford prefers carefully planned, low‑stress trips like their annual pilgrimage to the historic Carmel‑by‑the‑Sea lighthouse, a nostalgic road trip along the Pacific Coast Highway, and a
    dream of exploring the gardens of Kyoto’s Arashiyama district, always booking accessible accommodations well in advance.
  culinary: Kim Shuford enjoys cooking coastal California recipes such as Dungeness crab cioppino, rosemary‑infused grilled artichokes, and lime‑marinated avocado salads, often experimenting with locally
    sourced seaweed and heirloom tomatoes while documenting each dish in their daily journal.
  core: Kim Shuford is a detail‑obsessed, curiosity‑driven lifelong learner who channels solitary walks, precise record‑keeping, and occasional over‑indulgence in rare art volumes into a quietly ambitious
    legacy of community preservation, even as worry occasionally shadows their disciplined routine.
background:
  cultural: Kim is a White American whose family roots trace back to the Pacific Northwest and early 20th‑century California settlers. Raised in a small inland town, she moved to Seaside in the 1970s, embracing
    the coastal lifestyle and the region’s rich maritime heritage. Her cultural outlook blends traditional Mid‑American values of self‑reliance and community service with an appreciation for California’s
    diverse artistic scene, including respect for the indigenous Costanoan (Ohlone) cultures of Monterey County. This background informs her disciplined approach to volunteer work, her love for local history,
    and her desire to contribute to the cultural fabric of her seaside community.
attributes:
