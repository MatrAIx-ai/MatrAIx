  hobbies: '["Art History Reading","Museum Visits","Poetry Readings","Genealogical Research","Coastal Birdwatching","Native Succulent Gardening","Knitting","Quilt Making","Cooking Coastal Cuisine","Journaling"]'
  career_goals: Although retired, Kim aims to complete and self‑publish a memoir that interweaves her life story with the changing landscape of the Monterey Coast. She aspires to launch an oral‑history
    project that records the memories of Seaside seniors, preserving them for future generations. Kim hopes to mentor younger volunteers at the local museum, teaching them archival techniques and the importance
    of disciplined record‑keeping. Additionally, she wishes to design a small community garden featuring artistic installations, creating a lasting, collaborative legacy that merges her love of nature,
    art, and community service.
