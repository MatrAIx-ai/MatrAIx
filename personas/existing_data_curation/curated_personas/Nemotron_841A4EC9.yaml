personas:
  professional: Sharon Bolton, a veteran community volunteer and puzzle enthusiast, leverages her meticulous record‑keeping and organizing talents to run the senior center’s weekly crossword club, coordinate
    low‑stress craft workshops, and mentor peers in basic digital skills, all while maintaining a methodical approach that reflects her competitive streak and practical curiosity.
  sports: Sharon Bolton, an avid participant in senior lawn‑bowling and a faithful fan of the local Midwest Hawks baseball team, strolls the community garden paths for gentle exercise, and attends weekly
    low‑impact volleyball sessions at the recreation center, balancing competitive spirit with her age‑appropriate physical limits.
  arts: Sharon Bolton, a devoted admirer of classical piano works like Beethoven’s Moonlight Sonata and 1940s big‑band sounds such as Glenn Miller’s In the Mood, spends her evenings reading biographies
    of historic figures and classic novels by Jane Austen while also appreciating Norman Rockwell’s Americana paintings displayed at the regional museum.
  travel: Sharon Bolton, who favors careful planning over spontaneous trips, enjoys day‑long drives to the historic sites of Colonial Williamsburg and the scenic overlooks of the Great Smoky Mountains,
    holds a wish list that includes a pilgrimage to Ireland to trace her ancestors, and balances her wanderlust with modest travel budgets and family obligations.
  culinary: Sharon Bolton, a Midwestern comfort‑food specialist, regularly bakes apple and cherry pies using fresh herbs from her raised‑bed garden, prepares hearty casseroles and skillet pot roasts with
    sage and thyme, and, despite her seasoned cooking skills, occasionally over‑salts a dish when distracted by a puzzle crossword.
  core: Sharon Bolton, a detail‑obsessed, 95‑year‑old puzzle master, blends relentless curiosity with a pragmatic, sometimes wary outlook, turning solitary hobbies into community stewardship while battling
    a habit of over‑thinking every decision.
background:
  cultural: Sharon was raised in post‑war Indianapolis, a Midwestern city characterized by modesty, self‑reliance, and a strong sense of community. Her upbringing emphasized practical skills, hard work,
    and respectful interaction with neighbors, values she carries forward as a retired high‑school graduate. While culturally identified as white American, she embraces the region’s traditions of seasonal
    cooking, community volunteerism, and a pragmatic approach to everyday challenges. Her background informs her organized, cautious mindset and her appreciation for both new ideas—such as digital tools
    for staying connected—and established methods like handwritten journals and seasonal gardening.
