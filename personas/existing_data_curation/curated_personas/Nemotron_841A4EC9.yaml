  career_goals: Even at 95, Sharon’s ambitions focus on preserving her legacy and staying actively engaged. She aims to compile a comprehensive family history and memoir that blends personal anecdotes with
    genealogical data, ensuring future generations have an organized archive. Sharon also seeks to maintain her cognitive sharpness by leading a weekly puzzle club at the senior center and mentoring younger
    volunteers in budgeting and digital skills. A secondary goal is to sustain her independence by fine‑tuning her health‑tracking routine and gradually learning to use a tablet for video communication
    with distant relatives.
