personas:
  professional: Paola Pou, an aspiring wildlife illustrator, channels their love for detailed animal sketches—especially their cherished rabbit—into a future ambition to create educational picture books,
    combining methodical drawing habits with a relaxed, routine‑focused work style.
  sports: Paola Pou enjoys low‑key physical activity, such as walking along the Monterey shoreline and joining the local junior swimming club, and they cheer on the San Francisco Giants when they catch
    a game on the family TV, preferring solitary enjoyment over organized team sports.
  arts: Paola Pou spends afternoons drawing animals in sketchbooks, listening to gentle folk music by The Milk Carton Kids, and practicing simple guitar chords, finding that these artistic pursuits provide
    a soothing routine that balances a love for quiet storytelling and detailed illustration.
  travel: Paola Pou loves wandering the Monterey shoreline collecting shells and tide‑pool critters, and they dream of exploring the tide pools at Bodega Bay and the coral reefs of Australia's Great Barrier
    Reef, planning trips with careful checklists to maintain a comforting sense of routine.
  culinary: Paola Pou helps their mother measure flour, butter, and sugar for cupcakes, adorning each treat with colorful sprinkles, and they delight in the sweet taste of vanilla frosting while also enjoying
    homemade banana muffins and simple grilled cheese sandwiches.
  core: Paola Pou is a quietly curious nine‑year‑old who blends routine‑loving hobbies like sketching, LEGO building, and cupcake decorating with a gentle, cooperative spirit and a penchant for solitary
    beach walks.
background:
  cultural: Paola grows up in a Mexican‑American household in Monterey, where both Spanish and English are spoken at home. Her grandparents share stories of their hometown in Jalisco, teaching her traditional
    songs, dances, and recipes such as tamales and huaraches. Family celebrations of Día de los Muertos and Mexican Independence Day are important, and she helps decorate the altar with photos and marigolds.
    The coastal environment of Monterey introduces her to Pacific marine life, shaping her love for tide‑pool exploration. Her cultural identity blends Mexican traditions, the close‑knit family values of
    collectivism and harmony, and the laid‑back lifestyle of coastal California.
