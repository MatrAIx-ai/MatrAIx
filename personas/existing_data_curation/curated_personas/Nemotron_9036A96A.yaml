  career_goals: Paola dreams of a future where she can work in a calm, predictable setting while helping others. She is fascinated by animals and imagines becoming a veterinarian, caring for pets and farm
    animals in a routine clinic environment. She also enjoys the idea of teaching younger children, guiding them through daily lessons and reading stories, because she values the stability of a classroom
    schedule. Occasionally, she envisions helping her family run a small kitchen that prepares traditional Mexican dishes, combining her love of cooking with cultural heritage.
