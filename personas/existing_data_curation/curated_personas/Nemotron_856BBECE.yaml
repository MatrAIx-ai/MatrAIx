  hobbies: '[''Reading contemporary fiction'', ''Book club participation'', ''Cooking and baking'', ''Gardening'', ''Community theater'', ''Cycling'', ''Hiking'', ''Day trips to New York City'', ''Podcast
    listening'', ''Journaling'']'
  career_goals: Lisa aims to move into school-wide leadership within the next five years, targeting roles such as Curriculum Coordinator or Elementary School Principal. She plans to earn a Master’s degree
    in Educational Leadership to deepen her expertise in policy implementation and instructional coaching. Lisa wants to champion inclusive, technology-rich classrooms that balance rigorous standards with
    the flexibility needed for diverse learners. She also aspires to lead district-level professional-development sessions on social-emotional learning and innovative instructional strategies. Locally,
    she hopes to launch a community literacy partnership between her school and the Red Bank public library, providing after-school reading programs and family workshops. Throughout her career progression,
    she seeks to maintain a balanced schedule that preserves time for family, personal interests, and spontaneous community involvement.
