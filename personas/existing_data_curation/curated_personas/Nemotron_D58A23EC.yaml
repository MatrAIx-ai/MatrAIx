  hobbies: '[''Vegetable gardening (tomatoes, basil, lavender)'', ''Bird watching on local trails'', ''Reading historical fiction and memoirs'', ''Knitting and crocheting blankets and scarves'', ''Cooking
    traditional Italian dishes'', ''Participating in senior-center book club and card games'', ''Doing crossword puzzles and jigsaw puzzles'', ''Volunteering to teach basic smartphone skills'', ''Attending
    local folk concerts and community events'']'
  career_goals: At 83, Maria’s ambitions are centered on staying mentally sharp, socially connected, and physically active rather than climbing a career ladder. She hopes to compile a memoir of her family’s
    journey from Italy to the Pacific Northwest, preserving stories for future generations. She also aims to expand her role as a "neighborhood anchor" by organizing regular low-key gatherings—garden potlucks,
    book-club meet-ups, and tech-help mornings—so that seniors can share resources and knowledge. Learning a new creative skill, such as watercolor painting, and mastering a simple tablet-based photo-editing
    program are personal goals that feed her curiosity while remaining practical. She intends to maintain her health through gentle hikes and Tai Chi classes, ensuring she can continue her volunteer work
    without strain.
