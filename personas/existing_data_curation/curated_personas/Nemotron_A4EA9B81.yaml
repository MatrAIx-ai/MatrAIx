  hobbies: '["Cooking authentic Mexican dishes (tamales, pozole, salsas, pan dulce)", "Gardening herbs and chilies (cilantro, oregano, assorted peppers)", "Folklórico dance participation and performance",
    "Reading Mexican literature and Latin American novels", "Hiking local parks and trails with family", "Volunteering at community center craft workshops", "Teaching papel picado and traditional embroidery",
    "Maintaining a food blog and Instagram page", "Playing board games and puzzles with family", "Listening to mariachi and regional Mexican music"]'
  career_goals: Esmeralda’s immediate goal is to obtain her GED within the next year, providing a foundation for further education. She plans to enroll in a community‑college associate program in early
    childhood education, aiming to become a certified preschool teacher and bring culturally responsive teaching to local schools. Parallel to her academic pursuits, she intends to launch a small home‑based
    catering service specializing in traditional Mexican cuisine for community events and private gatherings, leveraging her culinary skills and network. Over the next five years, she hopes to transition
    from volunteer roles to a paid position as a community outreach coordinator for a nonprofit serving Hispanic families, where she can apply her event‑planning, bilingual communication, and leadership
    abilities. Additionally, she aspires to mentor other Mexican‑American women seeking education and career advancement, fostering a supportive community.
