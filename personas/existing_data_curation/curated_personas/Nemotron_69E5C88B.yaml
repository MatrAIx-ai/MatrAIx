personas:
  professional: Karina Constantiny is a 12‑year‑old aspiring digital content creator who blends soccer highlights with quick mindfulness tips on TikTok, channeling their energetic, cooperative nature into
    a loosely structured posting schedule that still allows for spontaneous ideas and occasional last‑minute video edits.
  sports: Karina Constantiny plays forward for the Riverside Youth Soccer Club, training three evenings a week after school, cheers for the Los Angeles Galaxy as their favorite pro team, and incorporates
    weekend runs on the nearby forest trail to boost stamina, balancing competitive drive with strong teamwork.
  arts: 'Karina Constantiny thrives on creating short TikTok clips set to songs by Billie Eilish and Bad Bunny, performs traditional folkloric dances with their school dance team, and devours graphic novels
    like ''Ms. Marvel'' and ''Avatar: The Last Airbender,'' often sharing enthusiastic recommendations with friends.'
  travel: Karina Constantiny loves weekend getaways to the Sierra National Forest for clean‑up hikes, dreams of exploring Barcelona’s colorful streets and Machu Picchu’s ancient ruins, and saves allowance
    pocket money for a future family trip abroad while navigating the constraints of a busy school schedule.
  culinary: Karina Constantiny enjoys helping their family cook homemade tacos with fresh corn tortillas, seasoned pork, cilantro, lime, and a tangy salsa, experimenting with chipotle‑infused guacamole
    and occasionally staying up late perfecting arroz con pollo, even if it means rushing through homework afterward.
  core: Karina Constantiny mixes boundless energy and a love for teamwork with a stubborn worry about the unknown, turning everyday soccer drills, dance rehearsals, and TikTok edits into a lively, slightly
    chaotic adventure.
background:
  cultural: 'Karina is a second‑generation Mexican‑American living in Spokane, Washington. Her parents immigrated from Mexico and keep many traditions alive at home, speaking Spanish daily and celebrating
    holidays such as Día de los Muertos, Cinco de Mayo, and Christmas with Mexican customs. She participates in local Mexican cultural festivals, helping to set up booths and share traditional foods with
    the broader community. While she embraces her Mexican heritage—through language, music, dance, and cuisine—she also enjoys the Pacific Northwest lifestyle, including outdoor activities like hiking and
    exploring regional nature. This blend of cultures gives Karina a strong sense of identity: she feels pride in her family’s roots and a desire to bridge her Mexican background with the diverse community
    of Spokane.'
attributes:
  skills: '[''Basic Spanish conversation'', ''Team leadership in group projects'', ''Organizing school events'', ''Elementary math proficiency'', ''Creative writing'', ''Basic digital video editing'', ''Soccer
