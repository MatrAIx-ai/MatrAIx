  hobbies: '[''Soccer'', ''Folkloric dance'', ''Digital video creation (TikTok)'', ''Reading graphic novels'', ''Cooking Mexican cuisine'', ''Environmental club activities'', ''Hiking in local forests'',
    ''Friend group gatherings'', ''Mindfulness practice'']'
  career_goals: Karina dreams of a career that lets her help others while honoring her cultural roots. She hopes to become a bilingual elementary school teacher, focusing on making lessons engaging and
    accessible for students who speak both English and Spanish. She also imagines working as a community health advocate or a pediatric nurse, where her empathy and organizational skills can support families
    in her neighborhood. In the longer term, she sees herself leading cultural workshops that teach Mexican dance and cooking to children in Spokane, blending her love for structure, creativity, and community
    service.
