  career_goals: Maria aims to transition into a technical leadership role where she can shape product strategy at the intersection of technology and art. In the next five years she hopes to become a Lead
    Engineer or Solutions Architect, spearheading projects that leverage AI‑generated creative tools for designers and musicians. She also plans to pursue a part‑time MBA or a certification in Product Management
    to deepen her business acumen. Long‑term, Maria envisions launching her own startup that offers an open‑source platform for interactive digital storytelling, blending her software expertise with her
    love for abstract concepts and novel user experiences. Throughout her career she seeks to maintain a flexible schedule that supports her family life and allows ample time for personal creative pursuits.
