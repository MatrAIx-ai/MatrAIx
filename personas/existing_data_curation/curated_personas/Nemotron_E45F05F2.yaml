personas:
  professional: Eduardo Pichardo is a practical high-school student who blends their natural mechanical aptitude with budding bilingual communication skills, thriving in collaborative projects by fixing
    friends' car issues and building simple circuits while already sketching plans for a future trade career in automotive technology or electrical work.
  sports: Eduardo Pichardo spends evenings scoring goals for a neighborhood soccer squad that idolizes Club América while streaming LA Galaxy matches, and rolls at the city skate-park with a crew called
    the Ramp Runners, balancing competitive play with casual fun.
  arts: Eduardo Pichardo sketches cartoon characters inspired by the exaggerated humor of Matt Groening's 'The Simpsons', fills playlists with Bad Bunny, J Balvin, and Karol G, and devours graphic novels
    like 'Maus', 'Saga', and the Spanish-language series 'El túnel', letting both visual and musical storytelling shape their creative outlook.
  travel: Eduardo Pichardo prefers spontaneous weekend road-trips to nearby state parks for hiking and skateboarding, while day-dreaming about a backpack adventure through Oaxaca’s historic towns and the
    Andes of Peru, and hopes to someday coast-line a cross-country drive from San Diego to Seattle despite family budget constraints.
  culinary: Eduardo Pichardo shows modest kitchen prowess, proudly mastering the layered spice blend of pepian, the meticulous folding of tamales with masa, pork, roasted chilies, and cilantro, and regularly
    experimenting with guajillo and ancho peppers alongside fresh avocado on homemade corn tortillas.
  core: Eduardo Pichardo blends teenage tech enthusiasm with hands-on, community-oriented practicality, juggling gaming marathons and skateboarding thrills while occasionally overlooking homework deadlines,
    yet always finding time to help neighbors with car maintenance and family cooking.
background:
  cultural: Eduardo comes from a Guatemalan immigrant family that maintains a strong Spanish‑speaking household and observes both Ladino and Mayan cultural traditions. Celebrations such as Guatemala’s Independence
    Day on September 15, Christmas posadas, and religious holidays anchor his family’s Catholic practices. Traditional foods like pepian, tamales, and atole are staples at home, reinforcing a close connection
    to his heritage. Living in El Mirage, Arizona, he navigates a blend of Central American Latino culture and the broader Southwest U.S. environment, fostering bilingual proficiency and a sense of community
    among other immigrant families.
