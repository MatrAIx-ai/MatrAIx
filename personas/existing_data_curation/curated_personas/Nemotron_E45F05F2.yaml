  career_goals: Eduardo aims to finish his high school education and enroll in a trade school to study automotive technology or electrical work, fields that align with his hands‑on interests and desire
    for a stable career. He envisions securing a reliable job that will support his family and eventually hopes to open his own small auto repair shop or a food‑truck featuring Guatemalan street foods.
    Additionally, he is interested in using his bilingual abilities to work as a community liaison or interpreter, helping bridge communication between Spanish‑speaking residents and local services.
