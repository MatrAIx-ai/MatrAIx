  hobbies: '[''Community softball league'', ''Bowling'', ''Hiking in Wasatch Mountains'', ''Fly-fishing'', ''Camping'', ''Vintage tractor restoration'', ''Classic pickup restoration'', ''Country music concerts'',
    ''Barbecue cooking'', ''Playing guitar'', ''Open-mic nights'', ''Mentoring high school students in trades'']'
  career_goals: Robert aims to transition from direct equipment operation into a supervisory or safety‑lead role within the next five years. He plans to earn an OSHA Outreach Trainer certification and a
    logistics management credential to broaden his qualifications. He is focused on mentoring younger operators, implementing safety‑culture initiatives, and eventually launching a modest equipment‑rental
    business serving rural Utah, which would provide a more predictable schedule and reduce physical strain while leveraging his industry expertise.
