personas:
  professional: Geneva Dean is a 27‑year‑old technical support specialist who leverages their methodical troubleshooting skills, PowerShell scripting, and knack for clear documentation to resolve hardware
    and network issues for small businesses, while using their collaborative mindset to mentor junior staff and lead community tech‑help workshops.
  sports: Geneva Dean enjoys weekend hikes on the Fort Wayne Nature Trail, participates in the local 5K run club, follows the Fort Wayne Komets hockey team and the Indiana Hoosiers basketball squad, joins
    a community recreational soccer league each summer, and hits the slopes at Paoli Peaks during winter, balancing an active lifestyle with a love for team sports.
  arts: Geneva Dean finds creative release in knitting hand‑crafted blankets while listening to folk‑indie artists like The Lumineers and Bon Iver, attends Indiana Repertory Theatre productions, curates
    a board‑game collection featuring Settlers of Catan and Terraforming Mars, and admires works at the Fort Wayne Museum of Art, weaving cultural heritage celebrations such as Oktoberfest‑inspired crafts
    into their hobby.
  travel: Geneva Dean prefers road‑trip getaways, spending long weekends exploring Chicago’s art districts, camping in Michigan’s Upper Peninsula each summer, dreaming of wandering the Black Forest during
    Oktoberfest and hiking Iceland’s Golden Circle, and carefully budgets travel using points earned from a travel credit card while prioritizing family time.
  culinary: Geneva Dean delights in cooking hearty Midwestern staples like pork tenderloin sandwiches and chicken pot pie, perfects holiday pierogi and Irish stew recipes handed down through family gatherings,
    frequently picks fresh heirloom tomatoes and crunchy kale at the local farmers market to toss into vibrant salads, and treats themselves to a caramel apple pie from the neighborhood bakery on special
    occasions.
  core: Geneva Dean is a detail‑oriented tech support professional who balances a love for methodical problem solving with a restless curiosity, a gentle community spirit, and a habit of over‑thinking that
    fuels both their meticulous work ethic and occasional late‑night worry sessions.
background:
  cultural: Geneva grew up in the Midwestern town of Fort Wayne, Indiana, in a family with German and Irish ancestry that emphasized modesty, hard work, and community involvement. The region’s pragmatic
    culture reinforced her practical outlook and appreciation for reliable, step‑by‑step problem solving. Her upbringing in a close‑knit, predominantly white community fostered a collaborative spirit and
    a strong sense of duty to help neighbors, values she carries into both her professional and personal life. Being married and rooted in this supportive environment gives her a stable base that influences
    her balanced approach to work and leisure.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software installation and updates'', ''Network configuration (Wi‑Fi, LAN)'', ''Ticketing system management'', ''Customer service and communication'', ''Remote
    desktop assistance'', ''Technical documentation and SOP creation'', ''IT asset inventory tracking'', ''Basic PowerShell scripting'', ''End‑user training and onboarding'']'
  hobbies: '[''Hiking'', ''Yoga'', ''Journaling'', ''Knitting'', ''DIY electronics projects'', ''Board‑game nights'', ''Volunteer tech‑help at community center'', ''Reading tech blogs'']'
  career_goals: Geneva aims to obtain CompTIA Network+ and Security+ certifications within the next year, positioning herself for a transition to a systems administrator role. In the longer term she envisions
    leading a small support team at a midsize company, where she can combine her technical expertise with her collaborative, people‑focused style. She also aspires to develop deeper knowledge in cybersecurity
    and cloud services, while maintaining a balanced workload that supports her well‑being and family life.
