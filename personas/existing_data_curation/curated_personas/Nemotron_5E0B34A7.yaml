personas:
  professional: Yamila Germes, an insurance claims analyst in her late twenties, blends meticulous data entry and regulatory expertise with an artistic flair that leads them to redesign policy briefs using
    vibrant visuals, while their bilingual charisma turns routine client interactions into collaborative problem‑solving sessions.
  sports: Yamila Germes stays fit by dancing salsa three nights a week at the community center, cheering on the Puerto Rico Islanders soccer team during the season, and joining a weekend beach volleyball
    league at Condado, while they use a fitness tracker to log cardio sessions and set weekly step goals.
  arts: Yamila Germes immerses themselves in the creative scene, sketching the colorful murals of Old San Juan, drawing inspiration from street artists like Oswaldo Guayasamín, listening to the lyrical
    poetry of Pablo Neruda, and attending live performances by local musicians such as Bad Bunny and Lin‑Manuel Miranda, which fuel their own experimental digital illustrations.
  travel: Yamila Germes loves weekend getaways to Vieques’s bioluminescent bay and dreams of a spring trip to Kyoto’s cherry blossoms, balancing a love for spontaneous island hikes with a meticulous itinerary
    that they plan using a travel‑rewards credit card and a weather‑tracking app.
  culinary: Yamila Germes enjoys cooking homemade mofongo with plantains, chicharrón, and a splash of garlic‑infused olive oil, often experimenting by adding roasted red peppers and cilantro to the classic
    arroz con gandules, while they savor street‑food‑style alcapurrias at local festivals and occasionally order sushi rolls with avocado and jalapeño for a fusion twist.
  core: Yamila Germes, a thirty‑year‑old insurance analyst with a vivid imagination, turns every claim into a story, every dance floor into a stage, and every kitchen into a lab, all while juggling a habit
    of late‑night sketching that sometimes delays their morning coffee.
background:
  cultural: Yamila is a native of San Juan, Puerto Rico, steeped in the island’s vibrant blend of Taino, Spanish, and African heritage. Growing up in a close‑knit family, she internalized the island’s strong
    emphasis on community, hospitality, and celebration. She proudly participates in local traditions such as the Festival de San Sebastián, cherishes the rhythms of bomba, plena, and reggaetón, and enjoys
    the flavors of Puerto Rican cuisine—from street‑side alcapurrias to home‑cooked lechón. Bilingualism is a daily reality; she effortlessly switches between Spanish and English, a skill that enriches
    both her professional interactions and personal relationships. Her cultural identity informs her worldview, fostering a deep appreciation for artistic expression, collective resilience, and the importance
    of preserving cultural narratives within a modern, globalized context.
attributes:
  skills: '["Insurance claims processing", "Policy verification", "Regulatory compliance", "Data entry", "Analytical reasoning", "Bilingual Spanish-English communication", "Customer service", "Conflict
