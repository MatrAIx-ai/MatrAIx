  hobbies: '["Sketching", "Digital illustration", "Poetry writing", "Reading speculative fiction", "Salsa dancing", "Photography of historic neighborhoods", "Exploring food festivals", "Cooking traditional
    Puerto Rican dishes", "Volunteering at insurance literacy workshops", "Participating in book clubs", "Attending live music events", "Social gatherings with friends"]'
  career_goals: Yamila aims to advance within the insurance sector by first becoming a senior claims analyst, where she can mentor junior clerks and lead complex investigations. Her medium‑term goal is
    to step into a supervisory role, overseeing a team of processors and driving efficiency initiatives that blend her analytical rigor with her creative flair for clearer policy communication. Long‑term,
    she envisions pursuing an associate degree in Business Administration or Risk Management to qualify for a managerial position, possibly guiding product development for consumer‑focused insurance packages
    that are both technically sound and culturally resonant. She also hopes to spearhead community outreach programs that educate Puerto Rican households about insurance literacy, leveraging her sociable
    personality and public‑speaking confidence.
