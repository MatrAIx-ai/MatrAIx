personas:
  professional: Javier Tenorio is an aspiring young robotics hobbyist who blends curiosity with practicality by building LEGO robotics kits, programming simple games in Scratch, and eagerly mentoring peers
    in after‑school coding clubs, while staying organized enough to meet project deadlines yet flexible enough to improvise when a piece doesn’t fit.
  sports: Javier Tenorio is a spirited soccer enthusiast who drills dribbling and teamwork on the local park field, proudly wears a jersey of Club América, joins a neighborhood under‑12 league, and balances
    a love for the sport with occasional after‑school yoga stretches to stay limber and avoid injuries.
  arts: Javier Tenorio is a budding illustrator who sketches vivid scenes from folklore, drawing inspiration from artists like Frida Kahlo and comic creators such as Alan Moore, frequently flips through
    graphic novels like "Saga" and "Paper Girls" for creative ideas, and contributes hand‑drawn decorations to the town’s Día de los Muertos altar.
  travel: Javier Tenorio spends summer vacations visiting seaside towns such as Puerto Vallarta with family, dreams of exploring the ancient ruins of Machu Picchu, prefers trips that combine cultural festivals
    and hands‑on activities like building sand sculptures, and usually plans outings with their parents using kid‑friendly travel guides.
  culinary: 'Javier Tenorio loves helping in the kitchen, especially preparing tacos al pastor and handmade tamales with masa, enjoys seasoning dishes with a pinch of cumin and fresh cilantro, can whip
    up a quick quesadilla using leftover cheese, and proudly claims a secret skill: drawing perfect smiley faces on the tortillas.'
  core: Javier Tenorio blends a curious engineering mind with a love for folklore art, balances disciplined saving with occasional comic‑book splurges, stays healthy despite occasional sunscreen forgetfulness,
    dribbles soccer with club pride, and never misses a chance to sprinkle salsa on a fresh taco.
background:
  cultural: Javier grows up in a vibrant Mexican‑American household in Houston, where Spanish is spoken daily and Mexican traditions are celebrated alongside American customs. His family emphasizes respect
    for elders, close‑knit community ties, and pride in cultural heritage, which is reflected in the foods they prepare, the festivals they attend, and the stories passed down from grandparents. He attends
    a bilingual elementary school that incorporates both English and Spanish curricula, and his neighborhood includes other Latino families, creating a supportive environment that blends Mexican cultural
    values with the diverse multicultural landscape of Houston.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Basic Scratch programming", "LEGO robotics construction", "Problem‑solving in math and science", "Organizational skills for schoolwork", "Teamwork
    and leadership in group activities"]'
  hobbies: '["Soccer", "LEGO robotics building", "Scratch programming", "Reading science‑fiction graphic novels", "Drawing and sketching Mexican folklore", "Cooking traditional Mexican dishes with family",
    "Participating in cultural events (e.g., Día de los Muertos)", "After‑school coding club"]'
  career_goals: Javier aspires to become a scientist‑engineer who creates technologies that improve his community, such as developing environmentally friendly solutions or building robots to assist in local
    outreach. He imagines studying engineering or computer science in high school and college, with an eventual goal of working in robotics or renewable energy research. He also dreams of combining his
    love for science with his cultural heritage by contributing to STEM programs for young Mexican‑American students.
