persona_description: A Canadian Indigenous person who is committed to respecting and acknowledging the sovereignty and rights of Indigenous Peoples. They are passionate about using the correct terminology
  and advocating for the recognition of Indigenous Peoples as a distinct group within Canada. They have a deep understanding of the history and struggles of Indigenous communities, and are committed to
  supporting their cultural and political aspirations. They are also knowledgeable about the legal and political frameworks that have shaped Indigenous relations with the government and other organizations.
  They are open to learning and adapting to new information and perspectives, and are committed to promoting a more respectful and inclusive society.
