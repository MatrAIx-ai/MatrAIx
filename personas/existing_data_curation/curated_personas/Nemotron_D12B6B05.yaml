personas:
  professional: Michael Letourneau, a 38‑year‑old registered nurse with a STEM bachelor's, blends acute patient assessment, health informatics, and medical illustration to redesign emergency department
    workflows, while their spontaneous curiosity and competitive drive push them to prototype unconventional tele‑health tools despite occasional missed deadlines.
  sports: Michael Letourneau, 38, fuels their competitive streak on downtown Los Angeles pickup basketball courts and as a seasonal member of the Santa Monica Mountains Trail Club, while cheering the LA Lakers
    and LA Rams on game nights and sneaking in weekend HIIT sessions to offset long ER shifts.
  arts: Michael Letourneau, 38, curates their visual aesthetic through urban photography of LA murals by Shepard Fairey and Banksy, attends contemporary gallery openings featuring Kehinde Wiley, thrives
    in improvisational comedy workshops at the Upright Citizens Brigade, and spins experimental vinyls by Flying Lotus, Janelle Monáe, and David Bowie in their loft.
  travel: Michael Letourneau, 38, prefers last‑minute weekend road trips that blend spontaneous detours through the Santa Monica Mountains with unexpected stays in Portland’s food‑cart scene or the cliffside
    cabins of Big Sur, while ticking off bucket‑list dreams of photographing Kyoto’s backstreets and hiking the desert trails of Joshua Tree.
  culinary: Michael Letourneau, 38, experiments in the kitchen with miso‑glazed black cod accompanied by roasted sunchokes and a quinoa‑kimchi bowl, frequently enrolling in avant‑garde cooking workshops
    where they trade meticulous recipe notes for spontaneous flavor pairings, and still enjoys weekend brunches featuring avocado toast topped with smoked salmon and a side of freshly pressed espresso.
  core: Michael Letourneau, 38, merges a nurse’s precision with a street‑artist’s spontaneity, juggling emergency codes, DIY health‑tech gadgets, and vinyl hunts while battling a chronic habit of over‑booking
    their calendar.
background:
  cultural: Michael is a second‑generation French‑Canadian American raised in the diverse suburbs of Los Angeles. His family’s bilingual heritage introduced him to both English and French cultural traditions,
    fostering an appreciation for multilingual expression. Growing up in Woodland Hills exposed him to a blend of suburban stability and the broader multicultural vibrancy of LA, shaping his progressive
    outlook and openness to unconventional ideas. While his upbringing was rooted in a middle‑class, secular environment, he maintains a respect for the varied ethnic and artistic communities that characterize
    Southern California.
