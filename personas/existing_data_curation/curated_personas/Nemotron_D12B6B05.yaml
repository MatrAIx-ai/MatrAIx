  career_goals: Michael aims to transition into a hybrid role that blends direct patient care with health innovation. He plans to pursue a Nurse Practitioner certification while also earning a certificate
    in clinical informatics, positioning himself to lead tele‑health program development and design evidence‑based digital tools. Over the next five years, he envisions spearheading a pilot project that
    uses medical illustration and interactive media to enhance patient understanding of complex conditions. His competitive drive pushes him to secure research grants and publish on creative approaches
    to nursing practice, ultimately aspiring to a leadership position as a Clinical Nurse Specialist or Director of Nursing Innovation within a progressive health system.
