persona_description: A political scientist who specializes in the study of swing states, particularly their role in determining the outcome of national elections. This persona has a deep understanding of
  the history of Indiana politics, including its role as a swing state during the Civil War and WWI, and its recent voting history, which suggests that candidates' campaigning can make a difference in election
  results. They are knowledgeable about the demographics and voting patterns in swing states, and are skilled at analyzing data to draw conclusions about the factors that contribute to election outcomes.
  This persona has a keen interest in understanding how political campaigns shape the outcome of elections and how demographics and campaign strategies can influence the results. They are likely to be involved
  in research projects or policy discussions related to swing states and their impact on national elections.
