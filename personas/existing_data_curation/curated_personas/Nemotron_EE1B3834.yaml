personas:
  professional: Rabia Anand is a budding creative technologist who delights in combining simple Scratch coding projects with hand‑drawn illustrations, often leading her classroom’s art‑and‑code hour and
    thriving on the applause of peers.
  sports: Rabia Anand roots for the St. Louis Cardinals and the St. Louis Blues, participates in the Ballwin Youth Soccer Association’s U‑6 team as a forward, and attends Tuesday evening gymnastics at the
    St. Louis Community Center, blending family fandom with active play.
  arts: Rabia Anand draws inspiration from the vivid colors of Henri Matisse, the animated charm of Disney’s ‘Frozen’ and ‘Mickey Mouse,’ and the upbeat tunes of Taylor Swift, often turning her living room
    into a makeshift stage for sing‑along performances and sketching sessions that combine whimsical characters with bold palettes.
  travel: Rabia Anand enjoys weekend trips to St. Louis’s Forest Park, the Zoo, and the Art Museum, has taken a family road trip to Chicago’s Museum of Science and Industry, and dreams of exploring Disney
    World in Orlando and the historic castles of Edinburgh, preferring itineraries that mix short drives with hands‑on activities.
  culinary: Rabia Anand savors classic kids’ fare such as cheesy pizza slices, chicken nuggets with ketchup, and strawberry‑topped pancakes, delights in helping Mom whisk together chocolate chip cookie
    dough with mini chocolate chips, and often mixes fresh carrots and ranch dip as a snack, proudly boasting that she can bake a simple sugar cookie with sprinkles all by herself.
  core: Rabia Anand is a vivacious seven‑year‑old who turns every hallway into a stage, hoards stickers in a secret notebook, occasionally forgets to clean up her art supplies, and insists on singing the
    chorus of every song she hears, making her the unstoppable spark of joy in her community.
background:
  cultural: 'Rabia lives in Ballwin, a family‑oriented suburb of St. Louis County, Missouri. Her household reflects typical Midwestern American values: emphasis on school involvement, community activities,
    and family gatherings around holidays such as Thanksgiving and Christmas. The neighborhood is culturally diverse, giving her exposure to a variety of traditions and cuisines. Her family encourages curiosity
    and artistic expression, enrolling her in local art classes, library story times, and community center workshops. While her heritage is identified as white, her surname hints at a multicultural family
    history that adds an extra layer of cultural awareness in her upbringing.'
