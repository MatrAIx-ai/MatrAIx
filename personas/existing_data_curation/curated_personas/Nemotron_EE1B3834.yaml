  career_goals: Rabia dreams of growing up to blend her love of art and people by becoming a children's author‑illustrator or a teacher who uses creative projects to bring classmates together. She also
    imagines performing on stage as a young actress or host of a community art show, hoping to inspire joy and harmony in others. Ultimately, she wants a career that lets her share stories, paint bright
    worlds, and help friends feel included.
