  career_goals: Torry’s immediate goal is to earn his GED within the next year. Afterward, he plans to enroll in a vocational certificate program—preferably in carpentry or horticulture—so he can acquire
    a skilled trade. In the longer term, he aspires to work as a community development coordinator or cultural outreach specialist in Bentonia, using his organizational talent and artistic interests to
    organize art exhibitions, blues music gatherings, and youth mentorship programs. He also hopes to eventually open a small community workshop that combines woodworking classes with art sessions for local
    youth, providing a creative space that celebrates the region’s cultural heritage.
