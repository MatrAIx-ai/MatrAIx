personas:
  professional: Mechanical engineering veteran Quanita Lollis leverages their deep expertise in SolidWorks, AutoCAD, PLC programming, and lean manufacturing to spearhead plant‑wide efficiency initiatives,
    mentor junior staff, and enforce rigorous safety compliance, all while applying a data‑driven, disciplined mindset that balances curiosity for emerging technologies with a practical focus on proven
    methods.
  sports: Low‑impact fitness enthusiast Quanita Lollis walks the river trail five times a week, plays senior tennis at the Plainfield Country Club during summer, follows the Chicago Bulls and Chicago Cubs
    with avid devotion, and volunteers as a robotics mentor for the community center’s after‑school tech‑sports club, all while they champion inclusive mentorship.
  arts: Culturally attuned arts aficionado Quanita Lollis curates a classic soul and jazz vinyl collection featuring Aretha Franklin, Marvin Gaye, John Coltrane, and Miles Davis, practices calligraphy inspired
    by early American manuscripts, and knits intricate shawls while they listen to these timeless melodies.
  travel: Budget‑conscious explorer Quanita Lollis has toured Kyoto’s historic gardens, immersed themselves in New Orleans’ jazz heritage, and plans a future pilgrimage to Barcelona’s modernist architecture,
    while they frequently opt for weekend drives to nearby state parks for quiet reflection.
  culinary: Herb‑savvy home cook Quanita Lollis flavors meals with garden‑fresh rosemary, thyme, and basil, mastering herb‑crusted salmon, lemon‑basil pesto pasta, and soul‑food classics like collard greens
    sautéed with smoked turkey, reflecting a balanced palate that merges health consciousness with nostalgic comfort, and they often pair their dishes with a glass of white wine.
  core: Quanita Lollis is a disciplined, curiosity‑driven engineer who blends meticulous organization with bouts of intense anxiety, finds solace in solitary hobbies, and champions diversity in STEM while
    obsessively tending their herb garden and polishing their vinyl collection.
background:
  cultural: Quanita identifies as African American, with family origins that trace back to the rural South before relocating to the North during the Great Migration. Growing up in Plainfield, she was immersed
    in a vibrant Black community that emphasized church fellowship, gospel music, and collective resilience. These influences have fostered a strong sense of responsibility toward uplifting the next generation,
    shaping her involvement in local civil‑rights commemorations and her interest in preserving Black culinary traditions, particularly soul‑food cooking. Her cultural heritage informs her values of perseverance,
    community service, and pride in her identity.
