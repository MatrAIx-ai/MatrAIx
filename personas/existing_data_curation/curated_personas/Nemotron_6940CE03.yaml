  career_goals: Quanita aims to transition into a strategic advisory role where she can shape plant‑wide efficiency initiatives and champion diversity within technical teams. She plans to earn a Six Sigma
    Black Belt certification, author a practical manual on preventive maintenance for mid‑size manufacturing firms, and establish a mentorship program for Black women entering STEM through the Plainfield
    STEM Outreach partnership. Ultimately, she hopes to retire comfortably while running a boutique consultancy that provides safety‑compliant design audits for local businesses, preserving her legacy of
    high standards and competitive excellence.
