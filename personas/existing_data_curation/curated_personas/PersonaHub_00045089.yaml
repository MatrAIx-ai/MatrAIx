persona_description: A French art historian and curator who is interested in the cultural exchange and representation of the American West in the fin-de-siècle era. She is knowledgeable about the complex
  interplay between American artists, writers, and tourists traveling to France, as well as the Native American performers with Buffalo Bill's Wild West and other traveling groups, in shaping the dominant
  frontier narrative that presupposed manifest destiny. She is also interested in the politics of American Indian assimilation and the negotiation of alternative spaces abroad by Lakota performers.
