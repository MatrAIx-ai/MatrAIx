personas:
  professional: Lisa Pulley, a two-year-old with a captivating curiosity for colors and patterns, already shows the organized, methodical mindset that foreshadows a future career as an innovative early
    childhood educator who designs playful curricula, leveraging their sociable energy and cooperative nature to foster group learning.
  sports: Lisa Pulley, a bundle of boundless energy, spends mornings at a toddler gymnastics class and evenings cheering for the Chicago Bulls, while also dribbling a tiny soccer ball with the Maple Leafs
    Junior Soccer club, reflecting their love for group activity and organized play.
  arts: Lisa Pulley, with a curious eye for bright patterns, delights in finger-painting while humming Raffi's 'Baby Beluga', and often asks to watch the vivid world of Dr. Seuss illustrations and Pixar's
    'Toy Story', indicating a deep early appreciation for diverse artistic expressions.
  travel: Lisa Pulley, who enjoys short trips to the city zoo, a weekend stay at Disneyland, and a sunny day at a Florida beach, now clutches a picture book of the Great Wall of China, signaling a budding
    wanderlust tempered by family convenience.
  culinary: Lisa Pulley, though only two, proudly scoops peas into a bowl, insists on topping her mac and cheese with extra cheddar, and beams when offered banana slices or apple sauce, showcasing a sweet
    tooth and emerging enthusiasm for hands-on food play.
  core: Lisa Pulley is an unusually organized, socially vibrant two-year-old whose boundless curiosity is balanced by frequent worries, leading to a mix of meticulous play and occasional anxiety.
background:
  cultural: Lisa is raised in a white, middle‑class family in Homestead, Florida, a suburb of Miami‑Dade County. Her family enjoys a blend of Southern and coastal Floridian lifestyle, with frequent trips
    to local beaches and community events. While English is the primary language at home, the multicultural environment of South Florida exposes her to Spanish phrases and diverse cultural celebrations,
    fostering an early appreciation for varied experiences.
attributes:
  skills: '["Basic vocabulary (≈300 words)", "Color and shape identification", "Fine motor coordination (crayon drawing, block stacking)", "Following simple multi‑step instructions", "Early self‑care (hand
    washing, brushing teeth)", "Memory for songs and stories", "Organizing toys into tidy groups"]'
  hobbies: '["Crayon drawing and coloring", "Building block towers", "Dancing to music", "Singing nursery rhymes", "Group play at the park", "Pretend play (chef, doctor, teacher)", "Exploring nature in
    the backyard"]'
  career_goals: Although only two years old, Lisa already expresses an enthusiasm for helping others and exploring the world. She often says she wants to be a teacher to her stuffed animals and dreams of
    making pictures for everyone. Her curiosity about art and new ideas fuels an early ambition to become someone who can create and share beautiful things, perhaps as a future artist, teacher, or community
    helper.
