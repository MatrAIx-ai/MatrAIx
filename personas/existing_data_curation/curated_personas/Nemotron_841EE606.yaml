  career_goals: She aims to turn her passion for art and unconventional storytelling into a career as a multimedia artist and creative director. Rosemarie's short‑term goal is to build a strong online portfolio
    and gain admission to a specialized art high school or a university program in visual communication. She envisions creating vibrant digital campaigns, short films, or graphic novels that challenge mainstream
    narratives. Long‑term, she hopes to lead a creative studio that merges community‑driven projects with cutting‑edge design, allowing her to mentor other young creators while staying at the forefront
    of artistic innovation.
