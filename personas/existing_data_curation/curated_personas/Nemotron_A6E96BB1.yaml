personas:
  professional: Neil Vicencio is a veteran operations executive with four decades of experience in lean Six Sigma, process optimization, and strategic planning, who channels his curiosity for art into innovative,
    cost‑effective solutions and mentors emerging managers with a disciplined yet creative approach.
  sports: Neil Vicencio enjoys Saturday‑morning 9‑hole rounds at the Dallas Country Club, follows the Dallas Cowboys and Texas Rangers avidly, and maintains fitness through daily nature walks with the local
    seniors’ walking group, while occasionally joining a veteran’s intramural tennis league each summer.
  arts: Neil Vicencio spends free time exploring the Dallas Museum of Art, attending intimate acoustic sets featuring artists like Gillian Welch and Neko Case, and curates a personal collection of Ansel
    Adams prints that inspire their landscape photography and woodworking designs.
  travel: Neil Vicencio prefers meticulously planned road trips that blend cultural immersion with relaxation, having driven the Hill Country wine trail and undertaken a pilgrimage to Santa Fe’s art scene,
    while their wish list includes a solo winter visit to Kyoto’s Zen gardens and a spring stroll through Florence’s Renaissance galleries.
  culinary: Neil Vicencio is a competent home cook who blends garden‑fresh vegetables into dishes such as roasted zucchini with lemon‑garlic quinoa, enjoys Tex‑Mex staples like smoked brisket tacos with
    jalapeño salsa, and pairs meals with a modest collection of Texas‑grown honey and locally sourced Texas wine.
  core: Neil Vicencio is a competitively minded, art‑obsessed operations veteran who balances meticulous planning with a solitary, stress‑prone lifestyle, often worrying about legacy while indulging in
    quiet walks and handcrafted furniture.
background:
  cultural: Neil grew up in a small‑town Texas environment where community, self‑reliance, and modesty were valued. As a White American with a middle‑class upbringing, he was raised in a Methodist household
    that emphasized responsibility and service. While rooted in Texas traditions—such as Friday night football, barbecue gatherings, and a love for the outdoors—his curiosity and appreciation for art have
    led him to seek broader cultural experiences through travel, museum visits, and support of local artists. This blend of traditional Texan values with an open, exploratory mindset informs his personal
    and professional life.
