  career_goals: Neil aims to cement his legacy by implementing a company‑wide digital transformation that reduces waste and improves sustainability, while mentoring the next generation of managers to adopt
    a balance of disciplined execution and innovative thinking. In the next five years, he hopes to transition into a senior advisory role, consulting on operational excellence for mid‑size manufacturers,
    and to co‑found a small local gallery that showcases emerging artists, merging his managerial expertise with his passion for the arts.
