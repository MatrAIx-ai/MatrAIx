personas:
  professional: Nhon Nguyen, a budding LEGO architect and junior strategy game designer at 11, channels their love of structure and creativity into building intricate LEGO models and devising Minecraft
    redstone contraptions, showcasing practical problem‑solving and meticulous attention to detail, and they often plan each build step by step before starting.
  sports: Nhon Nguyen, a member of the Stockton Junior Soccer Club and avid fan of the San Jose Sharks, spends weekends practicing soccer drills, enjoys climbing a local climbing wall, and follows the Sharks'
    games on TV, preferring structured team sports over large, chaotic gatherings, and they often set personal performance goals for each practice.
  arts: Nhon Nguyen, an enthusiastic comic‑book fan, sketches superhero mash‑ups inspired by Stan Lee’s characters and listens to The Legend of Zelda soundtrack while reading graphic novels like Mighty
    Morphin Power Rangers, merging visual storytelling with strategic gaming aesthetics, and they frequently experiment with new drawing styles after finishing a level in Minecraft.
  travel: Nhon Nguyen, a curious explorer, loves weekend trips to the California Academy of Sciences and a yearly family visit to Yosemite’s giant sequoias, while dreaming of a future journey to cherry‑blossom
    festivals abroad, balancing meticulous planning with a desire for quiet natural immersion, and they keep a travel journal to record each adventure.
  culinary: Nhon Nguyen, a junior kitchen helper, delights in preparing bánh chưng during Tet celebrations, perfecting the balance of glutinous rice, mung beans, and fragrant pandan leaves, while also mastering
    the art of steaming pork belly and experimenting with homemade pho broth seasoned with star anise and cilantro, and they often taste‑test the dishes before serving the family.
  core: Nhon Nguyen blends disciplined structure with inventive imagination, obsessively organizing Lego bricks, saving allowance in a perfect spreadsheet, and worrying over future school projects, all
    while secretly hoarding extra video‑game minutes under the bed, and they frequently check their to‑do list before bedtime.
background:
  cultural: Nhon is a Vietnamese‑American raised in Stockton’s close‑knit Southeast Asian community. At home he speaks Vietnamese with his parents and celebrates Vietnamese holidays such as Tet, where he
    helps prepare traditional foods like bánh chưng. He attends a Saturday Vietnamese language school, fostering a strong connection to his heritage while navigating life in a diverse Californian city.
    The values of family respect, perseverance in education, and community cooperation shape his daily routines and outlook.
