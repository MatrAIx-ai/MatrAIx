personas:
  professional: Jorge Binno, a 27‑year‑old bilingual rideshare driver in Pasadena who leverages meticulous navigation, safety‑first mindset, and a calm conflict‑resolution style to keep shifts efficient,
    while charting a path toward a commercial driver’s license, fleet management, and ultimately launching a community‑oriented taxi fleet.
  sports: Jorge Binno, an eager participant in the Pasadena United pick‑up soccer league who hits the local gym three times a week, follows the Houston Dynamo in MLS and the Houston Texans in the NFL, and
    dedicates evenings to watching international football matches with coworkers.
  arts: Jorge Binno, a spirited salsa and bachata dancer who practices at neighborhood gatherings and fuels their cultural connection by listening to regional Mexican legends like Los Tigres del Norte and
    Banda El Recodo, often weaving musical rhythms into their cooking and community volunteer work.
  travel: Jorge Binno, a self‑styled road‑trip aficionado who has spent weekends exploring the Fiesta San Antonio festivities, cruising along the Gulf Coast to Galveston’s beaches, and dreams of a culinary
    pilgrimage to Oaxaca, prefers DIY itineraries that balance budget constraints with deep cultural immersion.
  culinary: Jorge Binno, a capable home chef who excels at making tamales de puerco, enchiladas verdes, and salsa roja using masa harina, dried chilies, and fresh cilantro, enjoys sharing these dishes at
    community festivals, yet occasionally over‑salts when juggling kitchen prep with late‑night soccer pickups.
  core: Jorge Binno, a 27‑year‑old bilingual driver who channels their love for soccer, salsa, and disciplined planning into a big‑picture dream of running a community‑focused taxi fleet, despite occasional
    stress‑driven overthinking and impulsive gaming splurges.
background:
  cultural: Jorge is a second‑generation Mexican‑American raised in Pasadena, Texas. His family instilled a strong sense of familism, respect for elders, and a work ethic rooted in Mexican traditions. Bilingual
    from childhood, he navigates seamlessly between Spanish and English, preserving cultural customs such as celebrating Día de los Muertos, Cinco de Mayo, and Christmas with a blend of Mexican and Texan
    traditions. Raised in a close‑knit, working‑class neighborhood, he values community solidarity and often participates in local church activities. While embracing the broader Texan culture, he remains
    proud of his Mexican heritage, reflected in his cuisine, music, and festive celebrations.
attributes:
  skills: '[''Route Navigation'', ''Bilingual Communication (Spanish/English)'', ''Customer Service'', ''Vehicle Maintenance'', ''Time Management'', ''Cash Handling'', ''Digital Payment Processing'', ''Conflict
    Resolution'', ''Safety Compliance'', ''Basic First Aid'']'
  hobbies: '[''Pickup Soccer'', ''Salsa Dancing'', ''Cooking Mexican Cuisine'', ''Listening to Regional Mexican Music'', ''Watching Sports'', ''Weight Training'', ''Playing Racing Video Games'', ''Attending
    Community Festivals'', ''Volunteer Work at Local Church'']'
  career_goals: Jorge aims to secure a commercial driver's license so he can transition to larger‑vehicle operations and eventually become a driver trainer or fleet manager. He envisions starting his own
    small taxi or rideshare fleet within the next five years, providing reliable service to his community while achieving greater financial stability. To support this, he plans to enroll in a local community
    college for an associate degree in business management, enhancing his leadership and logistical skills. Ultimately, he wants a more predictable schedule that reduces daily stress and allows him to support
    his family.
