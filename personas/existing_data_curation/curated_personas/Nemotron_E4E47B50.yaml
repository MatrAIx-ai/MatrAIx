personas:
  professional: A methodical aspiring lecturer in higher education, Shaquille Thomas leverages their strong curriculum design and data‑driven instructional skills to craft structured, culturally responsive
    courses while maintaining meticulous organization and clear communication in the classroom.
  sports: Shaquille Thomas is a dedicated trail runner who hits the plains trails around Fargo three times a week, is a member of the Fargo Running Club, and cheers for the Minnesota Vikings and the Fargo
    Moorhead RedHawks during the football and baseball seasons.
  arts: Shaquille Thomas immerses themselves in music, curating playlists featuring Marvin Gaye, Alicia Keys, J Cole, and Kendrick Lamar while practicing piano improvisation on evenings after tutoring,
    and occasionally attends local live‑jazz nights at the historic Fargo Theatre.
  travel: Shaquille Thomas plans structured weekend getaways, favoring road trips to culturally rich cities like New Orleans for its soul‑food heritage and Nashville for its music scene, while keeping travel
    expenses in check by using student discounts and staying in budget‑friendly Airbnbs.
  culinary: Shaquille Thomas enjoys experimenting with Southern soul‑food classics such as fried chicken, collard greens, and cornbread, often incorporating North Dakota honey and locally sourced kale to
    create health‑conscious twists, and they can confidently follow a recipe from a handwritten family cookbook.
  core: Shaquille Thomas blends rigorous organization with creative expression, navigating graduate studies, structured lesson plans, and improvised piano sessions while battling anxiety through disciplined
    routines and occasional coffee‑fuelled spontaneity.
background:
  cultural: Shaquille grew up in a close‑knit African‑American family that emphasized education, church fellowship, and cultural pride. Though his family originated from the Southern United States, they
    relocated to the Midwest, and he now lives in Fargo, where he is part of a small but vibrant Black community. His upbringing instilled a strong sense of resilience and communal responsibility, which
    informs both his teaching philosophy and his extracurricular involvement. He celebrates traditions such as Juneteenth, Black History Month, and family reunions, and he integrates elements of African‑American
    history and contemporary issues into his classroom discussions to foster an inclusive learning environment. He also draws on the rich musical heritage of his culture, using music as a tool for engagement
    and cultural connection.
attributes:
  skills: '[''Instructional design'', ''Curriculum development'', ''Lesson planning'', ''Learning Management Systems (Canvas, Blackboard)'', ''Data-driven student assessment'', ''Classroom management'',
