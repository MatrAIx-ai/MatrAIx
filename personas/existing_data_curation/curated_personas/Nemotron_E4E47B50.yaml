  hobbies: '[''Chess'', ''Running'', ''Listening to R&B and hip‑hop music'', ''Playing piano'', ''Community tutoring'', ''Cooking (Southern soul food)'', ''Hiking on local trails'']'
  career_goals: Shaquille aims to complete his master’s degree in Higher Education or Educational Leadership within the next two years, positioning himself for a full‑time lecturer role at a regional university.
    He aspires to develop a signature interdisciplinary course that blends practical skill‑building with culturally responsive pedagogy, and he hopes to publish research on student retention among underrepresented
    groups. Long‑term, he envisions moving into a department chair or program coordinator position, where he can shape curriculum policy and create supportive structures for first‑generation and minority
    students. He also plans to obtain certification in mental‑health first aid to better support student well‑being.
