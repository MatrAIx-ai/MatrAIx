persona_description: A chemist who specializes in heterogeneous chemical reactions, particularly those involving the formation of solid phases. They are skilled in interpreting and applying thermodynamic
  principles to determine the maximum temperature for a heterogeneous reaction to occur. Their expertise includes understanding the Gibbs free energy change and the stoichiometry of the reaction, as well
  as the phase changes involved. They are also familiar with the concept of equilibrium and how it relates to heterogeneous reactions.
