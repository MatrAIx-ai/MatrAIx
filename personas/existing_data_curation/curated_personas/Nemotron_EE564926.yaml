personas:
  professional: Sirena Kilbury, an aspiring graphic designer and social‑media storyteller, blends bilingual fluency, Canva skill, and a knack for coordinating community events with a curious yet laid‑back
    approach that favors flexible, last‑minute creative solutions while quietly battling the anxiety of meeting deadlines.
  sports: Sirena Kilbury stays loosely active by joining a local co‑ed dance studio that practices salsa and reggaeton routines, occasionally cheering on the Dallas Cowboys on Sundays and the Mavericks
    during the NBA season, while preferring spontaneous weekend bike rides over regimented workouts.
  arts: Sirena Kilbury channels her love for reggaeton icons like Bad Bunny and salsa legends such as Marc Anthony into vibrant digital collages on Canva, while sketching manga‑style heroes from My Hero Academia
    during late‑night study sessions and finding inspiration in the street photography of Austin Mann.
  travel: Sirena Kilbury prefers spontaneous road trips with friends, such as weekend drives to the Hill Country vineyards and flamenco‑themed festivals in New Mexico, while also dreaming of a guided cultural
    tour of Oaxaca's markets once she can afford the airfare, balancing her limited teenage budget with a love for immersive experiences.
  culinary: Sirena Kilbury loves crafting homemade tamales stuffed with smoky pork and masa, hand‑folding empanadas filled with cheese and sweet plantains, and experimenting with fresh cilantro, chipotle
    peppers, and masa harina in her modest kitchen, treating each weekend cooking session as both a therapeutic ritual and a rehearsal for her future pop‑up culinary venture.
  core: Sirena Kilbury is a creatively restless teen who flips between sketching manga heroes and sautéing tamales, juggling a love for flexible spontaneity with a lingering anxiety that fuels both her
    artistic bursts and her occasional procrastination.
background:
  cultural: Sirena comes from a mixed Mexican‑Puerto Rican heritage and grew up in Irving, Texas, where Spanish and English flow together at home. Family gatherings feature menudo, arroz con gandules, and
    the annual celebration of her quinceañera. She participates in local Hispanic festivals, such as Fiesta de la Hispanidad, and observes traditions like Día de los Muertos with homemade ofrendas. Catholic
    holidays are marked, but she also embraces the diverse, secular community life of Dallas County, blending American teenage culture with strong family ties and Latino values of respect, hospitality,
    and community solidarity.
attributes:
  skills: '["Bilingual Spanish‑English (conversational)", "Social media content creation", "Basic graphic design (Canva)", "Cooking traditional Hispanic dishes", "Improvisational drawing and sketching",
    "Basic first aid and CPR", "Event coordination for school/community"]'
  hobbies: '["Listening to Latin music (reggaeton, salsa, Vallenato)", "Dancing at festivals and with friends", "Sketching manga‑style characters", "Digital illustration with Canva", "Urban street photography",
    "Cooking family recipes (tamales, empanadas)", "Journaling for stress management", "Playing video games (The Legend of Zelda, Minecraft)", "DIY upcycling crafts"]'
  career_goals: Sirena hopes to turn her creative interests and community spirit into a career. She aims to study graphic design or visual communications at a community college, with the long‑term goal
    of working as a social‑media manager or visual storyteller for a nonprofit organization that serves the Hispanic community in Dallas County. She also dreams of opening a small culinary pop‑up that modernizes
    traditional family recipes, giving her a stable income while staying connected to her cultural roots. Achieving a scholarship and building a supportive network are central to her plans to manage stress
    and gain independence.
