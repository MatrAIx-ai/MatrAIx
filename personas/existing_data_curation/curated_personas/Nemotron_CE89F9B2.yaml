personas:
  professional: Vernon Greene is a seasoned handyman who leverages his carpentry, auto‑maintenance, and gardening know‑how in a part‑time role at the local hardware store, relying on familiar routines to
    stay productive while occasionally letting a relaxed attitude toward scheduling cause missed appointments, and they assertively negotiate service fees when needed.
  sports: Vernon Greene roots for the Virginia Tech Hokies and the Washington Commanders, watches their games while perfecting his barbecue, and spends his off‑season sailing with the Chesapeake Anglers
    Association, using yard work and occasional weekend bike rides as his primary fitness regimen.
  arts: Vernon Greene fills his garage and garden with classic rock legends like The Rolling Stones and Creedence Clearwater Revival and country icons such as Johnny Cash and Dolly Parton, and he occasionally
    catches live bluegrass sessions at the local tavern, finding that the music sharpens his grilling instincts as much as it soothes his mind.
  travel: Vernon Greene prefers low‑key road trips in his pickup, having already explored the historic streets of Williamsburg, the sandy shores of Virginia Beach, and the fishing villages of the Outer
    Banks, while dreaming of a budget‑friendly week in the Florida Keys to chase tarpon, though he typically avoids expensive flights and plans itineraries only days in advance.
  culinary: Vernon Greene, a self‑taught grillmaster, perfects a hickory‑smoked pork shoulder with a rub of paprika, brown sugar, and mustard, serves it alongside home‑grown tomatoes, corn on the cob, and
    buttery cornbread, and he frequently experiments with a tangy mustard‑vinegar barbecue sauce that he claims beats any store‑bought version.
  core: Vernon Greene is a routine‑driven DIY enthusiast who calms his chronic worry with weekend barbecues and Chesapeake Bay fishing, yet his relaxed attitude toward schedules often leaves him scrambling
    for tools and forgetting appointments.
background:
  cultural: Vernon is a white Southern male raised in the working‑class neighborhoods of Portsmouth, Virginia. His upbringing was shaped by the maritime heritage of the Chesapeake Bay, a strong military
    presence from nearby naval bases, and the close‑knit community of a mid‑size port city. He values traditional Southern hospitality, patriotism, and the practical, down‑to‑earth mindset common among
    his generation. Religious life, particularly Protestant church participation, plays a central role in his family and social circles, reinforcing a sense of duty, community service, and adherence to
    long‑standing customs.
attributes:
  skills: '["Basic Carpentry", "Home Repair", "Automotive Maintenance", "Vegetable Gardening", "Barbecue Grilling", "Fishing", "Basic Computer Use", "Community Volunteering"]'
