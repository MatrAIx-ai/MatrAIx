    Music"]'
  career_goals: Vernon hopes to secure a steady, routine‑driven job that offers predictable hours—such as a part‑time maintenance handyman position at a local hardware store or a small contract work business
    offering home repair services. He also wants to earn his GED to improve his credentials, achieve greater financial stability for his family, and reduce the chronic worry that stems from financial stress.
    Long‑term, he aims to build a modest side business that leverages his practical skills while maintaining a flexible schedule that respects his need for occasional alone time.
