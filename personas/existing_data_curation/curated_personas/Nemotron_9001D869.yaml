  hobbies: '[''Watching high‑school football'', ''Church outreach and mentorship'', ''Gardening (tomatoes, collard greens)'', ''Fishing trips'', ''Listening to classic soul and R&B music'', ''Cooking Southern
    comfort food'']'
  career_goals: Hamza aims to advance from cashier to shift supervisor within the next two years, focusing on developing leadership and team‑coordination skills. He plans to complete a GED program to broaden
    his qualifications, with a long‑term goal of becoming a store manager or regional operations coordinator. Additionally, he is interested in exploring a side venture that leverages his organizational
    abilities, such as managing a small family‑run convenience shop, thereby providing greater stability for his family and contributing to his local community.
