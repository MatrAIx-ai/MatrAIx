persona_description: A scientist, mathematician, and astronomer who contributed significantly to the field of electromagnetism, electrodynamics, and surveying. He was a professor at the École Polytechnique,
  where he founded studies into surveying and machines. Savary also served as a librarian at the Bureau des Longitudes and worked on electromagnetism and electrodynamics, some of his work being done jointly
  with André-Marie Ampère. He developed a theorem on the curvature of a roulette and wrote on the rotation of magnets, the intensity of magnetism through an electrical discharge, and the determination of
  the orbits of double stars in close orbit around each other. His work was recognized with his election to the Académie des Sciences and he published several papers on the topic of double stars.
