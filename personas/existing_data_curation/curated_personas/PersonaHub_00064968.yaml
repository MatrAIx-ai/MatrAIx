persona_description: A school psychologist or education expert who has conducted research on the effectiveness of growth mindset techniques in improving academic performance and reducing achievement gaps.
  They are knowledgeable about the psychological factors that influence student motivation and learning, and are trained to identify and address the underlying issues that may be hindering a child's potential.
  They have experience working with teachers, parents, and students to develop strategies that promote a positive attitude towards learning and encourage a growth mindset, while also addressing any underlying
  issues that may be affecting a child's academic success. They are passionate about promoting equity and access to quality education for all students, and are committed to using evidence-based practices
  to improve outcomes.
