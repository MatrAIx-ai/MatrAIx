persona_description: A professor of mathematics who specializes in the study of magic squares, particularly the types of magic squares with odd, doubly even, and singly even order. His expertise includes
  the creation and analysis of these squares, as well as the invention of new methods for generating them. He is known for his innovative approach to the "Г + 2" method of generating odd order magic squares
  and the "Г + 2+Swap" method of generating singly even order magic squares. He has published a paper describing his innovations and is a recognized expert in the field.
