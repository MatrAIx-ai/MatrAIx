  career_goals: Jamie dreams of turning her love of art and technology into a career as a multimedia designer or creative technologist, where she can blend visual storytelling with interactive experiences.
    She is fascinated by fields like animation, video game design, and museum exhibit curation, and she hopes to one day lead a community arts program that encourages young people to explore unconventional
    ideas while maintaining high standards of craftsmanship.
