personas:
  professional: Jamie Chen, an aspiring digital illustrator at age 11, channels their meticulous organization and competitive drive into creating polished graphic novel character sketches and prototype
    games on Scratch, often leading school art projects with a perfectionist’s eye.
  sports: Jamie Chen competes in the Eastside Strikers youth soccer league, regularly practices with the local community’s after‑school dance crew, and roots for Atlanta United FC, cheering loudly at televised
    matches while keeping a personal goal tally in a worn notebook.
  arts: Jamie Chen devotes afternoons to drawing inspiration from graphic novel masters like Alex Ross, Marjane Satrapi, and Kazuhiro Fujita, admires the cinematic flair of director Hayao Miyazaki, and
    can recite lyrics from Beyoncé’s “Run the World (Girls)” while sketching dynamic panels.
  travel: Jamie Chen dreams of exploring the vibrant streets of New Orleans for its jazz festivals, the historic Savannah squares for their colonial architecture, and the interactive exhibits at the Smithsonian’s
    National Air and Space Museum, often planning trips with a detailed itinerary drawn on graph paper.
  culinary: Jamie Chen helps season spicy jambalaya and sweet plantain fritters during family cooking nights, documents each dish with a phone camera, and experiments with swapping traditional Southern
    collard greens for Caribbean callaloo, always insisting on a pinch of smoked paprika for extra flavor.
  core: Jamie Chen is a hyper‑organized 11‑year‑old creator who mixes competitive drive with artistic curiosity, juggling sketchbooks, soccer cleats, and a worry‑prone mind while secretly hoarding extra
    crayons for midnight doodles.
background:
  cultural: Jamie is a Black youth raised in Homestead, Florida, a community where African American traditions intersect with the diverse Caribbean and Latin cultures of Miami‑Dade County. Her family celebrates
    milestones with gospel music, soul food, and occasional Caribbean dishes, reflecting both her heritage and the multicultural neighborhood. Growing up near vibrant street art and attending local cultural
    festivals has nurtured her appreciation for colorful visual expression. Jamie’s surroundings also expose her to a mix of languages and rhythms, from English to Spanish and Haitian Creole, shaping her
    open‑minded view of art, ideas, and new experiences.
