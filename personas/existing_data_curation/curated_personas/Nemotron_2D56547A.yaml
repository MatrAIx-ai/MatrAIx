  career_goals: Even at three Aimee shows budding ambitions shaped by her curiosity and practicality. She often talks about wanting to become a teacher because she enjoys storytime and helping others learn.
    Visits to the local dog park spark a desire to care for animals, hinting at a future interest in veterinary or wildlife work. She also loves exploring the backyard and imagines herself as an explorer
    or future environmental caretaker, blending her love of discovery with concrete, hands‑on tasks.
