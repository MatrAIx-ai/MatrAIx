personas:
  professional: Aimee Cap, a three‑year‑old who spends mornings at preschool constructing intricate block structures, demonstrates budding engineering instincts by balancing curiosity about new shapes with
    practical, step‑by‑step problem solving, and shows early signs of reliability and organization in their play.
  sports: Aimee Cap, a three‑year‑old enrolled in the Little Tigers Soccer Club’s tots program, loves chasing the orange ball at the community park, enjoys watching the hometown River Runners baseball team
    during family outings, and prefers short, playful bursts of activity over prolonged structured sports, showing they thrive in brief, energetic play sessions.
  arts: Aimee Cap, a three‑year‑old who delights in drawing bright circles and hand‑shaped animals, spends afternoons humming the catchy tunes of Sesame Street and Baby Shark, mimics their favorite character’s
    voice, eagerly watches Pixar’s animated short films for inspiration, and they often ask to join the chorus.
  travel: Aimee Cap, a three‑year‑old who thrills at family road trips to the nearby zoo and sandy beach, travels with a beloved stuffed giraffe, appreciates brief, well‑planned excursions over long journeys,
    and they imagine the wonders of Disneyland.
  culinary: Aimee Cap, a three‑year‑old with a selective palate, adores creamy mac and cheese, banana slices, strawberry‑yogurt parfaits, can spread peanut butter on toast with guidance, loves helping stir
    batter for fluffy pancakes in the kitchen, and they proudly present the finished pancakes.
  core: Aimee Cap, a three‑year‑old who balances curiosity with practical play, meticulously organizes toys, saves pennies in a pink piggy bank, monitors their eczema, and they dream of big adventures while
    staying snug in familiar routines.
background:
  cultural: Aimee is part of a white family that has lived in Pasco, Washington for several generations. The family embraces typical Pacific Northwest middle‑class values, celebrating holidays such as Thanksgiving
    and Fourth of July, taking frequent outings to the Columbia River for picnics and low‑key fishing, and participating in community events like the Pasco Fair. Early education is emphasized through regular
    visits to the local library’s storytime and encouragement of outdoor exploration, shaping her growing sense of identity.
