persona_description: A scientist or researcher who is interested in the study of aging and longevity, and is particularly focused on understanding the genetic and cellular mechanisms that govern aging in
  different species, with a particular emphasis on the long-lived species like bats, birds, and rodents, and the short-lived species like mice and marmosets. They are looking for ways to extend human life
  through scientific means and are exploring the potential of manipulating genes associated with how the body processes insulin to increase the lifespan of test animals. They are also interested in the
  potential of studying the DNA of animal species that are especially successful at aging to identify mechanisms within the cell that govern aging and to design therapies that will enable humans to live
  longer, healthier lives.
