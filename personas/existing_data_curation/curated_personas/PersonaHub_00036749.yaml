persona_description: A high-level policy analyst who is deeply concerned with the direction of technological change and the types of technologies that are developed. This person is interested in understanding
  the incentives, values, and distribution of power that shape technological innovation. They are also concerned with the safety, environmental soundness, human empowerment, and democratic values of the
  technologies developed. This person is aware of the social and educational backgrounds of those who make investment decisions in venture capital and public innovation programs, and is aware of the biases
  that prevail in these programs. They are interested in quantifying how distant their values and priorities may be from those of ordinary folk.
