    blog'', ''Collecting vintage video game cartridges'']'
  career_goals: Alyssa aims to turn her passion for coding and digital art into a remote software development career, ideally focusing on indie game development or interactive creative tools. She plans
    to enroll in a coding bootcamp or community college program to formalize her knowledge, then secure a junior developer position that allows flexible, solitary work. Concurrently, she wants to build
    a freelance portfolio offering illustration and video editing services, eventually establishing an online brand that merges her programming and artistic talents. Long‑term, she envisions launching her
    own indie game studio that creates narrative‑driven experiences for niche audiences, leveraging her competitive drive to win game‑design contests and industry recognition.
