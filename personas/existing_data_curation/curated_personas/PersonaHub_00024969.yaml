persona_description: A professional archaeologist who specializes in the use of 3D laser scanning technologies for site preservation and restoration. They are skilled in converting raw point cloud data
  into accurate 3D models and are familiar with the various methods and applications of 3D scanning technologies. They have a deep understanding of the principles behind laser scanning, including time of
  flight, phase comparison, and triangulation, and are proficient in using software applications to create various deliverables such as CAD document measured drawings, contour maps, 3D models, and animations.
  They are passionate about using 3D scanning technologies to document and record objects, structures, buildings, and topographies, and are dedicated to preserving and restoring historical sites.
