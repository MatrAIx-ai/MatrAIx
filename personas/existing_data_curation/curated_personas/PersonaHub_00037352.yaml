persona_description: A Renaissance-era physician who specialized in the use of chemical remedies and was a proponent of the Paracelsian system of medicine. He was known for his efforts to promote the use
  of chemical medicines in medicine and was involved in legal battles against the medical faculty of Paris. He was also a friend of Thomas Moffett and played a role in the planning of an official pharmacopoeia
  that included a section on chemically-prepared medicines.
