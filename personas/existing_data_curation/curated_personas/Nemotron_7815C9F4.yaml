  hobbies: '[''Minecraft'', ''LEGO building'', ''Basketball'', ''Ukulele playing'', ''Listening to Zydeco music'', ''Reading adventure novels'', ''Fishing in Bayou Teche'', ''School science club'']'
  career_goals: Brian dreams of turning his love for building and problem solving into a career in engineering, ideally robotics or mechanical engineering, where he can design practical devices that help
    people. In the short term, he aims to win his middle school's science fair, join the school robotics club, and improve his basketball skills. Over the next several years, he hopes to attend a high school
    with a strong STEM program and eventually study engineering at a Louisiana university such as LSU. Because he often worries about stress and negative emotions, he also envisions taking on mentorship
    roles to support peers' well‑being, perhaps as a future student advisor or community volunteer.
