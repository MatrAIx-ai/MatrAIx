personas:
  professional: An aspiring young technologist, Brian Newton channels their curiosity and practicality into building intricate Minecraft redstone contraptions and LEGO motorized sets, often leading neighborhood
    club projects while balancing a meticulous planning approach with the flexibility to improvise on the fly.
  sports: A spirited member of the Bayou Youth Basketball League and an avid fisherman along Bayou Teche, Brian Newton roots for the New Orleans Pelicans while cheering on the LSU Tigers during March Madness,
    balancing regular park pick‑up games with weekend swamp hikes to stay fit.
  arts: A budding musician and comic‑book enthusiast, Brian Newton practices the ukulele to the tunes of Clifton Chenier’s Zydeco classics and Taylor Swift’s pop hits, while devouring adventure graphic
    novels by Jeff Smith and sketching LEGO designs inspired by the vivid colors of local Mardi Gras floats.
  travel: A curious explorer, Brian Newton has already camped near the Atchafalaya Basin, visited the historic streets of New Orleans for Mardi Gras, and dreams of road‑tripping to the geysers of Yellowstone
    and the theme parks of Orlando, while balancing school responsibilities and a modest family travel budget.
  culinary: A food‑adventurous youngster, Brian Newton loves the spicy kick of crawfish étouffée, the comforting broth of gumbo packed with okra and andouille sausage, and the sweet, powdered‑sugar dusted
    beignets they sometimes attempt to bake with help from Grandma, often pairing meals with a cold glass of lemonade.
  core: Brian Newton is a socially energetic, detail‑oriented 12‑year‑old who fuses Cajun‑flavored creativity with a perpetual worry‑driven need to track every LEGO piece, gaming achievement, and penny.
background:
  cultural: Brian was born and raised in New Iberia, a small city in St. Martin Parish, Louisiana. His family belongs to the region's white, Southern community with deep ties to the historic Acadian and
    Cajun settlement area. While English is the primary language at home and the family observes a traditional Southern Catholic lifestyle, the local culture—marked by Zydeco music, Cajun cuisine, and vibrant
    community festivals like Mardi Gras—has profoundly shaped his experiences. He regularly joins neighborhood celebrations, enjoys dishes such as gumbo and beignets, and absorbs the friendly, close‑knit
    atmosphere of the Bayou region, which blends Southern hospitality with the rich multicultural heritage of southwestern Louisiana.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Scratch programming'', ''LEGO construction'', ''Team sports (basketball)'', ''Ukulele playing (beginner)'', ''Basic cooking'', ''Collaborative
