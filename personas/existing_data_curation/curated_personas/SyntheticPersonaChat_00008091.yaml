    User 1: So, what do you like to do when you''re not collecting rocks?

    User 2: I love to paint. I''m not very good at it, but I enjoy it.

    User 1: That''s great! I love painting too. I''m not very good at it either, but it''s a lot of fun.

    User 2: I know what you mean! It''s so therapeutic.

    User 1: It is! It''s a great way to relax and destress.

    User 2: It is! I love painting.

    User 1: So, what do you like to paint?

    User 2: I love to paint landscapes. I think they''re so beautiful.

    User 1: Me too! I love painting landscapes.

    User 2: I know what you mean! They''re so peaceful and relaxing.

    User 1: They are! I love painting them.

