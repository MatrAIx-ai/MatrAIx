personas:
  professional: Victoria Hartselle, an avionics technician at a regional MRO, leverages her methodical checklist‑driven workflow and deep schematic‑reading expertise to diagnose and repair complex flight‑control
    systems while they calmly lead small upgrade teams and ensure FAA compliance.
  sports: Victoria Hartselle, an avid solo hiker who maps each trail in Prescott National Forest and practices yoga for flexibility, also follows the Arizona Diamondbacks and Phoenix Suns, and they join
    a local rock‑climbing club during the winter months for cross‑training.
  arts: Victoria Hartselle, a disciplined photographer specializing in desert sunrises and aircraft silhouettes, curates her work on an online portfolio, draws inspiration from Ansel Adams and Sebastião
    Salgado, and they find creative release building intricate model airplanes while listening to Brian Eno’s ambient soundscapes.
  travel: Victoria Hartselle, a meticulous trip planner, prefers week‑long photography expeditions to places like Sedona’s red rocks, Iceland’s glacial vistas, and the Smithsonian National Air and Space
    Museum, always drafting detailed itineraries and budgeting with a spreadsheet, while they balance limited vacation days and student‑loan repayments.
  culinary: Victoria Hartselle enjoys preparing nutrient‑dense meals such as quinoa bowls with roasted vegetables and grilled chicken, whipping up trail‑mixes of almonds, dried apricots, and dark chocolate
    for hikes, and they savor a morning cup of pour‑over coffee with a dash of cinnamon while reviewing flight‑data logs.
  core: Victoria Hartselle is a precision‑driven avionics specialist who blends methodical engineering, solitary creative pursuits, and disciplined wellness into a quietly ambitious lifestyle, and they
    approach every task with a checklist in hand.
background:
  cultural: Victoria identifies as a White American with German‑Irish ancestry, raised in the small‑town environment of Prescott Valley, Arizona. Her upbringing blended Midwestern values of practicality,
    self‑reliance, and community involvement with the outdoors‑oriented lifestyle of the Southwest. She appreciates the region’s desert landscape, seasonal festivals, and close‑knit community events, which
    have shaped her preference for small gatherings and collaborative but structured activities. Victoria’s cultural background emphasizes a strong work ethic, respect for regulatory standards, and an appreciation
    for both individual achievement and communal support.
attributes:
  skills: '[''Avionics troubleshooting'', ''Aircraft communication and navigation system repair'', ''Electrical schematics interpretation'', ''Sensor calibration and testing'', ''FAA regulatory compliance'',
    ''Technical documentation and reporting'', ''Maintenance management software (MRO) operation'', ''Quality control and safety inspection'', ''Project coordination for avionics upgrades'', ''CAD wiring
    layout design'', ''Hands‑on electronics assembly'']'
  hobbies: '[''Hiking and trail planning'', ''Landscape and aircraft photography'', ''Model airplane building'', ''DIY electronics projects (Arduino, Raspberry Pi)'', ''Reading technical non‑fiction and
    science‑fiction'', ''Yoga and meditation'', ''STEM mentorship for high‑school students'', ''Puzzle solving (crossword, sudoku)'']'
  career_goals: Victoria aims to solidify her expertise by earning an FAA Certified Avionics Technician credential and completing her bachelor’s degree in aerospace or electrical engineering. In the next
    five years she hopes to advance to a senior avionics specialist role at a regional maintenance, repair, and overhaul (MRO) facility, where she can lead complex retrofitting projects and mentor junior
    technicians. Long‑term, she envisions moving into avionics design engineering or project management, contributing to the development of next‑generation aircraft systems. She also plans to establish
    a local apprenticeship program to support aspiring technicians in the Prescott Valley area.
