personas:
  professional: Bhumikaben Pruthi, a budding preschool architect, constructs intricate block towers with meticulous planning and a cooperative spirit, merging a vivid curiosity for new designs with practical,
    step‑by‑step building methods.
  sports: Bhumikaben Pruthi, an enthusiastic member of the Junior Tigers preschool soccer club, spends afternoons dribbling at the local field while also cheering for the city’s professional team, the Sharks,
    and enjoys structured playground games that blend quiet focus with bursts of energetic play.
  arts: Bhumikaben Pruthi, a little artist captivated by Disney’s "Let It Go" and Sesame Street’s Elmo, spends quiet afternoons coloring scenes of Mickey Mouse and humming favorite tunes, while also sneaking
    in playful sing‑alongs to kid‑friendly covers by Taylor Swift, weaving music and drawing into their daily routine.
  travel: Bhumikaben Pruthi, a curious explorer who loves short family outings to the city zoo and weekend visits to grandma’s countryside cottage, dreams of one day strolling through Disneyland’s Magic
    Kingdom, favoring carefully planned, low‑stress trips that balance adventure with familiar comforts.
  culinary: Bhumikaben Pruthi, a budding kitchen helper, delights in scooping macaroni‑and‑cheese onto their plate, carefully washing strawberries and sprinkling grated cheese on mini pizzas, and proudly
    arranging forks and napkins at mealtime, showcasing a tidy, methodical love for simple, comforting dishes.
  core: Bhumikaben Pruthi blends childlike wonder with tidy practicality, calmly navigating play, savings, and health with an organized heart and a gentle, cooperative spirit.
background:
  cultural: Bhumikaben comes from a Gujarati‑Indian family that maintains strong cultural ties while living in Buffalo Grove, Illinois. At home, Gujarati and Hindi are spoken alongside English, and family
    gatherings feature traditional foods like dhokla, rotli, and sweets during festivals such as Diwali, Navratri, and Holi. She participates in community events at the local Hindu temple and attends cultural
    classes where she learns simple prayers and dances. This blend of South Asian heritage and Midwestern suburban life shapes her values of hospitality, respect for elders, and a love for communal harmony.
