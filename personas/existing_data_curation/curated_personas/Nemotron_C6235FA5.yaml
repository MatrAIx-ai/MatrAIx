personas:
  professional: Tony Cruz, an aspiring senior engineer specializing in mechanical and electrical design, blends rigorous CAD modeling and clean Python/C++ code with an agile, team‑first leadership style
    that balances inventive curiosity with pragmatic deadlines.
  sports: Tony Cruz, an avid hiker of the Cascades, mountain biker on the Duthie Trail, kayaker on Puget Sound, and regular member of the Seattle Ultimate Club, roots for the Seattle Seahawks, Sounders
    FC, and Kraken while maintaining a weekly cross‑training regimen that blends cardio, strength, and team‑based frisbee drills.
  arts: Tony Cruz, a self‑taught acoustic guitarist who often jams at community gatherings, draws artistic inspiration from folk‑rock acts such as Iron & Wine, The Decemberists, and Joni Mitchell, and enjoys
    immersive indie film festivals featuring works by director Denis Villeneuve.
  travel: Tony Cruz, a budget‑savvy adventure seeker, has backpacked through Yosemite, explored the geothermal wonders of Iceland, and trekked the alpine trails of Banff, and plans a future road‑trip across
    the American Southwest, balancing meticulous itineraries with spontaneous detours.
  culinary: Tony Cruz, an intermediate home cook who favors Pacific Northwest flavors like wild‑caught salmon with maple‑glaze, avocado‑toast topped with lemon‑zest, and hand‑rolled ramen with miso broth,
    regularly experiments with fresh herbs and locally roasted coffee beans while occasionally indulging in craft IPA nights.
  core: Tony Cruz merges a restless engineering curiosity with board‑room poise, channels it into weekend expeditions and garage prototyping, and habitually fuels both pursuits with triple‑espresso shots
    and a lingering habit of forgetting to water houseplants.
background:
  cultural: Tony grew up in Tacoma, Washington, within a culturally diverse yet predominantly white community. His family traces its roots to Northern European (Irish and German) ancestry, with a generational
    blend of modest Catholic traditions and the inclusive, outdoors‑oriented Pacific Northwest lifestyle. This environment fostered a respect for environmental stewardship, a DIY maker ethos, and a community‑focused
    mindset. The regional culture’s emphasis on sustainability, coffeehouse gatherings, and collaborative tech spaces has shaped Tony’s personal values and professional aspirations.
