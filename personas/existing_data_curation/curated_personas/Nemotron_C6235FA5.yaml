  career_goals: Tony aims to become a senior engineer within the next five years, focusing on sustainable product development in the clean‑technology sector. He plans to earn his Professional Engineer (PE)
    license and eventually lead multidisciplinary teams designing energy‑efficient systems for the Pacific Northwest market. While he values practical, results‑oriented work, he also wants to stay at the
    cutting edge by contributing to innovative research projects and possibly pursuing a master's degree in renewable energy engineering. Long‑term, Tony envisions launching his own startup that merges
    his curiosity for new ideas with real‑world engineering solutions that reduce environmental impact.
