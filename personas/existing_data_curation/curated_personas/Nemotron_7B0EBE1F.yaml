personas:
  professional: Armando Bishop is a 17‑year‑old aspiring carpenter and automotive technician who leverages their methodical planning skills, hands‑on experience with woodworking, hobbyist auto maintenance,
    and computer repair to excel in community‑college apprenticeship programs, thriving on clear milestones, detailed checklists, and the predictable rhythm of project work.
  sports: Armando Bishop enjoys solitary fitness pursuits like regular hikes along the Santa Cruz coastal trail network with the Santa Cruz Trail Club, and follows professional sports for structure, rooting
    for the San Jose Earthquakes in MLS, the San Jose Sharks during NHL playoffs, and tuning into Golden State Warriors games for motivational breaks, adhering to a weekly cardio routine that mirrors the
    disciplined cadence of their project checklists.
  arts: Armando Bishop immerses themselves in logical science‑fiction worlds, frequently revisiting works by Isaac Asimov and Arthur C. Clarke, while their creative outlet extends to building scale model
    airplanes inspired by vintage designs, and they unwind listening to Hans Zimmer scores and the electronic stylings of Daft Punk, occasionally attending the annual Santa Cruz Craft Fair to connect with
    fellow makers.
  travel: Armando Bishop approaches travel like a project, drafting detailed itineraries and packing checklists before each trip; they have explored California's coastal gems such as Big Sur and the redwoods
    of Humboldt County, and dream of a future visit to Japan's aviation museums in Tokyo and Osaka, balancing a modest budget with the desire for hands‑on learning experiences.
  culinary: Armando Bishop enjoys cooking practical meals that showcase the fresh herbs from their backyard garden, regularly preparing basil‑pesto spaghetti, rosemary‑infused roasted potatoes, and a hearty
    vegetable stir‑fry featuring bell peppers and snap peas, while also appreciating the simplicity of a classic caprese salad with fresh mozzarella, tomatoes, and basil, and occasionally indulging in homemade
    trail mix with almonds, dried cranberries, and dark chocolate chips.
  core: Armando Bishop is a methodical 17‑year‑old who merges an obsession with checklists and precision into every hobby—from building model planes to budgeting—while quietly navigating life’s structures
    with a reserved yet assertive demeanor.
background:
  cultural: Armando is a white American raised in the coastal community of Santa Cruz, California. His family has a mix of Irish and Italian ancestry and has lived in the Pacific‑Northwest for generations.
    Growing up in an area known for its environmental awareness, he developed an appreciation for nature while his household emphasized self‑reliance, practical skill‑building, and a disciplined work ethic.
    The relaxed local culture contrasts with his personal preference for order and routine, shaping a balanced outlook that values both community responsibility and personal structure.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''Python programming (beginner)'', ''Woodworking and furniture repair'', ''Automotive maintenance basics'', ''Project planning and task scheduling'']'
  hobbies: '[''Model airplane building'', ''Hiking local trails'', ''Reading science fiction'', ''Strategy video games (e.g., Civilization)'', ''DIY woodworking projects'', ''Gardening'']'
  career_goals: Armando plans to obtain his GED within the next year and then enroll in a community‑college apprenticeship program in either carpentry or automotive technology. He seeks a career path that
    offers clear milestones, a predictable schedule, and the chance to apply his systematic problem‑solving approach. In the long term, he aims to become a certified journeyman carpenter or automotive technician
    and eventually open a small workshop where he can manage projects with the structure and reliability he values.
