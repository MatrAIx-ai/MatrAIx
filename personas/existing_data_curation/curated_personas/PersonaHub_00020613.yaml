persona_description: A historian who specializes in the early development of colonial New England, particularly the life and work of Thomas Hooker, the "Father of Connecticut." His research interests include
  the history of the Puritan colony of Connecticut, the life of Thomas Hooker, and the early development of colonial New England. He is particularly interested in the work of Thomas Hooker on Christian
  subjects and his role as a leader of universal Christian suffrage. He is also interested in the life and work of the Hooker family, particularly the Rev. Richard Hooker and the Rev. Thomas Hooker, and
  the genealogy of the Hooker family.
