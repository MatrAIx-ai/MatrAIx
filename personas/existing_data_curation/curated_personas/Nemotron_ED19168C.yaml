personas:
  professional: Jeffery Balde, a budding game designer, channels his love of structure into coding simple games in Scratch while leading his friends in building LEGO challenges, balancing his practical
    mindset with a playful willingness to improvise when plans change, and they often share their creations during after‑school show‑and‑tell.
  sports: Jeffery Balde plays forward for the Fombell Falcons youth soccer team and point guard for the Greenfield Guardians basketball squad, rides his bike with the Fombell Trail Club on weekends, and
    avidly follows the Seattle Sounders FC and Los Angeles Lakers, and they often chant the team slogans during school breaks.
  arts: Jeffery Balde mixes an eclectic soundtrack of Kendrick Lamar, Beyoncé, and Kirk Franklin while sketching comic‑style superheroes inspired by Marvel, collects baseball cards featuring legends like
    Ken Griffey Jr., and sings in his church choir, letting the rhythm fuel their creative bursts.
  travel: Jeffery Balde enjoys family weekend trips to Shenandoah National Park’s scenic trails and a recent adventure to Washington, D.C.’s Smithsonian museums, while dreaming of a future vacation to Disneyland
    where they can combine their love for rides and themed storytelling.
  culinary: Jeffery Balde favors classic kid favorites such as cheese pizza, chicken nuggets with honey mustard, and homemade mac and cheese, often helping his family harvest carrots and tomatoes from the
    garden to sprinkle fresh ingredients into spaghetti Bolognese, and they occasionally experiment with topping the pizza with pineapple for a surprise twist.
  core: Jeffery Balde is a structured yet flexible nine‑year‑old who builds LEGO worlds, codes Scratch games, scores on the soccer field, sings in choir, and saves their allowance for the next big set,
    all while juggling playful spontaneity and occasional forgetfulness.
background:
  cultural: Jeffery is an African‑American boy raised in the small community of Fombell, PA. His family traces its roots to the Southern United States, and they keep cultural traditions alive through Sunday‑day
    worship at a local Baptist church, celebrating holidays such as Juneteenth and cooking soul‑food staples like collard greens, cornbread, and macaroni‑and‑cheese. At school, he learns about African‑American
    history during Black History Month and takes pride in stories of figures like Martin Luther King Jr. and Maya Angelou. In his neighborhood, he enjoys listening to R&B and hip‑hop artists who reflect
    his cultural heritage, while also participating in community events that bring together families of diverse backgrounds. These experiences give him a strong sense of identity and connection to both
    his local rural environment and the broader African‑American community.
attributes:
  skills: '["Reading comprehension (grade‑3 level)", "Basic arithmetic (addition, subtraction, multiplication)", "LEGO and K’Nex building", "Introductory Scratch programming", "Bicycle riding and basic
    bike maintenance", "Team sports basics (soccer, basketball)", "Household chores (pet care, setting table)", "Following structured daily routines"]'
  hobbies: '["Soccer (youth league)", "Basketball (after‑school games)", "LEGO building", "Scratch coding", "Reading adventure and science books", "Minecraft", "Bicycle riding on local trails", "Listening
    to hip‑hop, R&B, and gospel music", "Church youth group activities", "Collecting baseball cards", "Sketching comic‑style drawings"]'
  career_goals: Jeffery dreams of becoming a firefighter, attracted by the clear chain of command, teamwork, and the chance to protect and help his neighbors. He often imagines the structured training,
    the schedule of drills, and the immediacy of the job’s impact, which aligns with his preference for predictable, reality‑based roles. At the same time, his fascination with building and coding sparks
    an ambition to study engineering or computer science in high school, eventually designing safety systems for emergency services. He plans to focus on math and science classes, join a school robotics
    club, and keep his grades strong to keep his future options open.
