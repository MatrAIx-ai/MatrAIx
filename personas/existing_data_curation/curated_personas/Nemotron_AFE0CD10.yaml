personas:
  professional: Myra Corrigan, a veteran hospitality and community services manager with 30 years of experience, blends meticulous project management and budgeting expertise with an imaginative flair for
    event design, using her quiet confidence and collaborative assertiveness to mentor emerging talent and shape a community‑arts hospitality program in Clearwater.
  sports: Myra Corrigan enjoys low‑impact fitness, taking sunrise beach walks with the Clearwater Beach Walkers club and practicing gentle yoga at the local community center, while cheering on the Tampa
    Bay Rays in spring and the Buccaneers in fall, and she prefers walking and swimming over high‑intensity gym routines.
  arts: Myra Corrigan spends afternoons watercolor‑painting the soft Gulf light, draws inspiration from Claude Monet's impressionist palettes, recites poems by Mary Oliver and Rumi at her book club, curates
    a small collection of local photographer Duane Gayle's marine images, and reserves weekends for intimate gallery openings featuring Florida artist Laura Knight.
  travel: Myra Corrigan prefers meticulously planned, small‑group getaways that blend relaxation with artistic inspiration, favoring coastal retreats such as Key West and the Bahamas, seasonal trips to
    the historic streets of Seville for flamenco and architecture, and an aspirational pilgrimage to Kyoto's Zen gardens, all while balancing a modest travel budget that accommodates occasional splurges
    on boutique inns.
  culinary: Myra Corrigan enjoys a farm‑to‑table culinary style, often crafting light grilled grouper with lime‑vervain sauce, tossing fresh herb salads featuring basil, cilantro, and lemon verbena from
    her garden, and occasionally baking key lime pie while experimenting with watercolor‑inspired plating, though she sometimes over‑salts her dishes when experimenting late at night.
  core: Myra Corrigan is a quietly ambitious, art‑infused strategist who blends disciplined management with a love for solitary creativity, balancing meticulous budgets with spontaneous brushstrokes and
    gentle garden reveries.
background:
  cultural: Myra grew up in a middle‑class white family in the Midwest before relocating to the Sunshine State in her thirties, where she embraced the relaxed yet vibrant coastal culture of Clearwater.
    Her upbringing emphasized hard work, self‑reliance, and community involvement, values she carries into her married life and professional role. She maintains a connection to traditional American holidays
    and church gatherings while also appreciating the multicultural tapestry of tourists and residents in Pinellas County, which informs her inclusive approach to community projects and her appreciation
    for diverse artistic expressions.
