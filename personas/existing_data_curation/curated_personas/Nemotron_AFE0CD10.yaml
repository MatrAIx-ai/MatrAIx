  career_goals: Myra aims to transition from day‑to‑day operational oversight to a mentorship‑focused role where she can nurture emerging talent within her organization and the wider Clearwater community.
    She envisions establishing a hybrid community‑arts and hospitality program that provides hands‑on training for young adults while enriching local cultural offerings. In the longer term, she hopes to
    serve as a consultant for small nonprofits, helping them integrate creative experiences into their service models, and to document her insights in a series of reflective essays on leadership and imagination.
