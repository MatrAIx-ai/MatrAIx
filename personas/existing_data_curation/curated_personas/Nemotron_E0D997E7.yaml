  hobbies: '[''Zumba and group fitness'', ''community dance workshops'', ''volunteering at food banks'', ''youth mentorship'', ''live‑music events'', ''cooking Southern and African‑American cuisine'', ''basketball
    pick‑up games'', ''reading personal‑development books'', ''listening to entrepreneurship podcasts'']'
  career_goals: Veronica aims to become a lead machine operator within the next two years, leveraging certification programs such as OSHA Forklift Operator and Certified Production Technician. She plans
    to complete her associate degree in Business Administration while working, positioning herself for a future role as a production supervisor or operations manager. Long‑term, she aspires to transition
    into a logistics coordinator position or to launch a small, community‑focused packaging consultancy that supports local businesses in the Fort Worth area. Mentoring new employees and advocating for
    workplace safety improvements are central to her professional ambitions.
