  hobbies: '[''Basketball'', ''Weight training'', ''Morning jogs'', ''Chess'', ''Reading business strategy books'', ''Self‑improvement literature'', ''Journaling'', ''Guided meditation'', ''Community cooking
    classes'', ''Jazz and spoken‑word events'']'
  career_goals: Carl aims to advance to a senior residential services manager role within the next three years, overseeing multiple housing facilities and shaping operational policies. He plans to obtain
    the Certified Residential Advisor (CRA) credential and later pursue a master's in public administration to deepen his impact on affordable housing initiatives. Ultimately, Carl aspires to become a director
    of community housing programs, where he can design data‑driven strategies that address systemic inequities for low‑income African‑American families in Washington, DC. He also envisions launching a consultancy
    that advises nonprofit housing agencies on efficiency, compliance, and resident well‑being.
