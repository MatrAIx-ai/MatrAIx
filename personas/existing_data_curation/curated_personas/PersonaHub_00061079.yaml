persona_description: A professor who is experienced in teaching and grading papers, with a strong preference for a specific style of formatting print documents. They believe that the typical "school paper"
  design is not particularly readable, easy to use, or likely to teach students anything about good document design and layout. They aim to save their students' eyesight and teach them about the options
  available for formatting documents. They have specific rules for how they want documents formatted, which differ from the typical MLA "school paper" design. They believe that double-spacing makes reading
  tedious and disrupts cohesion, and that extra lines after paragraphs and double-spacing should not be used. They require left-justified text, one space between sentences, no underlining, no ALL CAPS,
  and paragraphs indented.
