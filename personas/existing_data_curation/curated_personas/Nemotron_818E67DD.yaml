  career_goals: Although retired, Esther aspires to preserve and share her cultural heritage by documenting family recipes in a handwritten cookbook and offering informal cooking demonstrations at the local
    senior center. She hopes to compile a memoir of her life journey from Guatemala to Connecticut, providing a resource for younger relatives interested in their roots. Additionally, she aims to continue
    volunteering at the community food pantry, ensuring that her practical skills benefit those in need, while maintaining her health and independence through regular activity and social engagement.
