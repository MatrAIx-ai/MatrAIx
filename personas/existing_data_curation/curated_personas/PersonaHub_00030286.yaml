persona_description: A scientist and researcher who specializes in the study of ocular surgery and cataract management. Dr. Wormstone is particularly interested in the development of better artificial lenses
  and their impact on the prevention of complications such as post-surgical cataract. He leads a team of researchers who are exploring the use of laser surgery to treat post-surgical cataract and the role
  of growth factor inhibitors in preventing cell invasion. The team's work is funded by eye research charity Fight for Sight, and their findings have the potential to improve patient outcomes and reduce
  the economic burden of cataract and post-surgical complications.
