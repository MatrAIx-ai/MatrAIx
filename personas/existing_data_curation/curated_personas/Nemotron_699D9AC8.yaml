personas:
  professional: Johnny Kenner, a 42-year-old Class A CDL driver, leverages his meticulous route-planning, mechanical know-how, and personable sales skills to consistently deliver freight on time across
    the Pacific Northwest, while his curiosity about art drives him to build strong relationships with gallery owners and museum curators.
  sports: Johnny Kenner's fitness routine centers on hiking the Cascades with the Oregon Trail Hikers club in summer, cheering for the Portland Trail Blazers and Timbers, and squeezing in occasional pickup
    basketball games at the local community center.
  arts: Johnny Kenner immerses himself in the Pacific Northwest arts scene by frequenting galleries that showcase Portland painter Christopher Jacobsen, attending indie film screenings of Kelly Reichardt's
    latest work, and curating playlists that blend The Decemberists, Sufjan Stevens, and classic noir soundtracks.
  travel: Johnny Kenner prefers self-driven road trips that blend photography and nature, having mapped routes through Oregon's Columbia River Gorge and Crater Lake, while dreaming of a future adventure
    photographing neon-lit streets in Tokyo and hiking Norway's fjords.
  culinary: Johnny Kenner, an enthusiastic home-brewer and amateur chef, frequently crafts Oregon-style IPAs with Cascade hops and pairs them with grilled cedar-plank salmon, rosemary-roasted potatoes,
    and occasional smoky chipotle chili using locally sourced beans.
  core: Johnny Kenner is a road-savvy logistics pro whose love of neon-sign photography and vintage trucks fuels a restless curiosity, even as he battles a habit of over-packing spare parts and occasionally
    forgetting to change his oil on schedule.
background:
  cultural: Johnny is a white American who grew up in a modest working‑class family in the Pacific Northwest, absorbing the region’s values of self‑reliance, practicality, and respect for the outdoors.
    His experiences as a truck driver have embedded him in a tight‑knit road community that prizes camaraderie, straightforward communication, and hands‑on problem solving. At the same time, living in Salem
    and traveling across Oregon has exposed him to the state’s vibrant arts scene and progressive cultural attitudes, nurturing his curiosity for unconventional ideas and appreciation for visual art. This
    blend of rugged, pragmatic roots and an openness to creative expression shapes his worldview and lifestyle.
attributes:
  skills: '["Long‑haul trucking", "Local route planning", "Vehicle maintenance", "Mechanical troubleshooting", "Safety compliance", "DOT regulations", "Electronic logging device (ELD) operation", "Customer
