  hobbies: '["Road‑trip photography", "Visiting art galleries", "Independent film screenings", "Podcast listening (science, philosophy)", "Hiking in the Cascades", "Camping", "DIY vintage truck restoration",
    "Home brewing", "Cooking experimental recipes", "Collecting vintage trucking memorabilia", "Reading mystery novels", "Woodworking"]'
  career_goals: Johnny aims to earn a hazardous‑materials endorsement and become a certified professional driver trainer within the next two years, positioning himself for a supervisory role such as route
    manager or fleet coordinator. He dreams of eventually launching a boutique carrier that specializes in transporting artwork and cultural artifacts, merging his logistical expertise with his love for
    art. To achieve this, he plans to enroll in a short‑term logistics management course, attend industry trade shows, and build a network of gallery owners and museum curators. He also values a stable
    income that affords him the flexibility to pursue his creative interests and occasional road‑trip photography projects.
