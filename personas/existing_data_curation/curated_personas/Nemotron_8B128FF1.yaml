  career_goals: Although retired from formal employment, Alicia aims to channel her expertise into mentoring youth and adult learners in the Atlanta area, particularly through after‑school STEM workshops
    and intergenerational maker‑space programs. She aspires to publish a series of illustrated essays that weave scientific concepts with abstract art, hoping to make science accessible and inspiring. Alicia
    also plans to curate a community art exhibition that highlights sustainability and local ecology, and she wishes to contribute to curriculum development for a regional museum’s science‑art outreach.
    Her long‑term ambition is to remain a bridge between technical rigor and creative exploration, fostering inclusive spaces where curiosity thrives.
