personas:
  professional: A retired interdisciplinary data scientist and research designer, Alicia Hamlett leverages their Python, MATLAB, and R expertise alongside a vivid abstract‑painting sensibility to mentor
    Atlanta’s middle‑school STEM workshops, translating complex models into vivid visual narratives while maintaining a meticulous yet flexible project‑management style.
  sports: A faithful fan of the Atlanta Braves and Hawks, Alicia Hamlett balances their love of baseball and basketball with a low‑impact fitness routine that includes sunrise walks with the local senior
    walking club, weekly gentle yoga sessions, and occasional senior tennis matches at the Decatur community center.
  arts: A passionate abstract painter and digital illustrator, Alicia Hamlett draws inspiration from the vibrant brushstrokes of Wassily Kandinsky and the improvisational melodies of Miles Davis, often
    spending evenings sketching speculative sci‑fi scenes while they listen to classic blues legends like B.B. King and attend the Atlanta Symphony’s Thursday night chamber concerts.
  travel: An intentional traveler who favors quiet, nature‑focused retreats, Alicia Hamlett prefers meticulously planned week‑long trips to places like the Great Smoky Mountains, the historic squares of
    Savannah, and the Japanese garden in Kyoto, and they budget for off‑peak flights while staying in small boutique B&Bs.
  culinary: A modest home‑chef with a green thumb, Alicia Hamlett delights in crafting herb‑infused quinoa salads with garden‑grown basil, rosemary, and lavender‑honey vinaigrette, while they also perfect
    a Southern‑style shrimp and grits using fresh local shrimp, sweet corn, and a pinch of cayenne, and they occasionally treat themselves to an artisanal cheese board featuring aged cheddar and fig jam.
  core: Alicia Hamlett, a 65‑year‑old retired data analyst turned community mentor, fuses scientific rigor with abstract art, nurtures curiosity in youth while balancing disciplined budgeting, gentle health
    routines, and a soft spot for jazz‑infused evenings on the porch, and they often end the day sketching under the glow of a vintage lamp.
background:
  cultural: Alicia was born and raised in suburban Atlanta during the post‑war era, growing up in a family with Irish‑German ancestry that valued Southern hospitality, community gatherings, and modest religious
    traditions. Her upbringing blended the cultural rhythms of the American South—such as seasonal festivals, home‑cooked meals, and an appreciation for blues and gospel music—with a strong emphasis on
    education and intellectual curiosity fostered by her parents. After earning her STEM graduate degree at a state university, she participated in academic circles that cultivated liberal, progressive
    viewpoints. Today, she identifies with a multicultural Southern identity that honors both her European heritage and the diverse, artistic, and scientific community of modern Atlanta.
