  career_goals: Maureen aims to advance to a regional sales manager role within the next three years, overseeing a team of agents across southeastern Michigan. She plans to earn Certified Insurance Counselor
    (CIC) and Chartered Property Casualty Underwriter (CPCU) designations to deepen her technical knowledge. Leveraging her curiosity for new ideas, she envisions launching a boutique agency that specializes
    in agribusiness and specialty vehicle insurance, integrating digital client portals and data‑driven underwriting. She also aspires to become a speaker at national insurance conferences, sharing insights
    on customer‑centric sales strategies, and to mentor the next generation of high‑performing agents.
