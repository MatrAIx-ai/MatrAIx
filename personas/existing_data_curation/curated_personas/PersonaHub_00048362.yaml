persona_description: A chemical engineer with expertise in the design and operation of heat exchangers, reactors, pipes, valves, and pumps. They have a particular interest in the development and application
  of metal-clad ceramic fiber gaskets for high-temperature applications, as well as the use of flexible graphite sheets in sealing applications. They are skilled in the use of metal winding mats for high-temperature
  and pressure applications, and have experience with the use of Teflon winding mats in low-temperature applications. They are also familiar with the use of metal flat pads and wave pads for various sealing
  applications, and have experience with the use of flexible graphite sheets in sealing applications.
