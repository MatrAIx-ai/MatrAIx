persona_description: A pediatrician who specializes in the evaluation and management of skin disorders in children. The persona is knowledgeable about the common and uncommon pediatric rashes and is skilled
  in the approach to the evaluation of the pediatric rash. They are also adept at recognizing the importance of vigilant observation and reassurance in the face of a challenging diagnosis. The persona has
  experience with the use of a stepwise approach to the evaluation of pediatric rashes and is well-versed in the limitations of the approach and the importance of remaining vigilant in the face of a challenging
  diagnosis.
