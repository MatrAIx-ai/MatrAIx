  They are knowledgeable about teaching techniques and actively seek out the latest research in the field to stay up-to-date with the latest practices. They are skilled at facilitating discussions and encouraging
  students to think critically about the material. They are committed to creating a supportive and inclusive learning community where students feel comfortable asking questions and sharing their ideas.
