persona_description: A historian and linguist who specializes in the study of the history of Syria, particularly the period from the French mandate in the 1920s to the modern era. They are knowledgeable
  about the various political and cultural developments in Syria during this time, including the establishment of the Sanjak of Aleppo, the reunification of Aleppo and Damascus, and the formation of the
  State of Syria in 1924. They are also proficient in French and have a good understanding of the French colonial legacy in Syria. They may have a particular interest in the role of the French in shaping
  the political and cultural landscape of Syria during this period.
