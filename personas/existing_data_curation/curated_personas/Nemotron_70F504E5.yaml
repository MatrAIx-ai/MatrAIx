  hobbies: '[''Painting'', ''Gardening'', ''Bridge'', ''Book club'', ''Hiking'', ''Cooking/Baking'', ''Volunteering at historic museum'', ''Photography workshops'', ''Folk music events'', ''Traveling to
    cultural festivals'']'
  career_goals: Lucy aims to deepen her role as a cultural conduit in Milton by curating a senior‑focused art exhibition series, mentoring younger volunteers at the community center, and authoring a memoir
    that captures her life experiences in mid‑century New England. She aspires to complete a certificate in nonprofit management to enhance her fundraising and advocacy capabilities, and to remain physically
    active through regular participation in the local senior sports league and hiking clubs.
