  hobbies: '["Woodworking and furniture making", "Landscape photography", "Reading art history", "Attending local art museum tours", "Adult painting classes", "Gardening", "Fly-fishing", "Strategic board
    games with friends"]'
  career_goals: Looking ahead, Nathan aims to transition from a hands-on production role to a supervisory position where he can apply his systematic mindset to drive continuous improvement across the plant.
    He is working toward gaining a Certified Production and Inventory Management credential and hopes to lead a cross-functional Kaizen team that reduces waste and improves on-time delivery. Over the next
    five years, he also plans to mentor younger workers, formalize his safety-lead program, and eventually reduce his hours to focus on launching a small side business that sells handcrafted wooden furniture,
    merging his production expertise with his artistic interests. He sees retirement as a phased shift toward community volunteer work with the local historical society and art museum.
