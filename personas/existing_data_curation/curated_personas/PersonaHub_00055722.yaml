persona_description: A philosopher who is interested in the nature of consciousness, sensory experiences, and the limits of our knowledge about our own conscious experience. This person is likely to be
  familiar with the works of Georges Rey, Joseph K. Schear, Gregory M. Nixon, Eric Schwitzgebel, Andy Clark, Peter Carruthers, Eric Schwitzgebel, Robert Schroer, and Eric Schwitzgebel. They are likely to
  be interested in the implications of the argument that normal, sighted people can echolocate, which suggests that our experience of consciousness is not always accurate or reliable. This person may be
  interested in exploring the relationship between sensory experience, self-knowledge, and the nature of reality.
