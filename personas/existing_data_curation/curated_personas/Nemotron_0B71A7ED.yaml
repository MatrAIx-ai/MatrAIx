personas:
  professional: Ever Ayala, a 43‑year‑old surveillance veteran at a major Las Vegas casino resort, they combine razor‑sharp real‑time video analysis with pattern‑recognition expertise; they flag betting
    anomalies while mentoring rookie officers, all with a calm, detail‑oriented demeanor that balances strict protocol with creative problem‑solving.
  sports: Ever Ayala, an avid hiker and yoga enthusiast, they regularly join the Red Rock Canyon Hiking Club for weekend treks, support the Vegas Golden Knights with weekly game viewings, follow the Las
    Vegas Aces in the WNBA, and squeeze in morning jogs with the local running group, balancing cardio with restorative stretch sessions.
  arts: Ever Ayala, a night‑time street photographer fascinated by neon, they spend weekends roaming the Strip to capture glowing signage, study the works of James Turrell and contemporary graffiti artist
    RETNA at the Neon Museum, and draw inspiration from the ambient scores of Brian Eno while curating a personal collection of limited‑edition prints.
  travel: Ever Ayala, who enjoys meticulously planned getaways, they have notebook‑filled itineraries for road trips to Sedona's red canyons, a culinary tour of Oaxaca’s markets, a week‑long photography
    workshop in Tokyo’s Shibuya district, and they dream of a sunrise hike at Machu Picchu, all balanced against family obligations that limit extended absences.
  culinary: Ever Ayala, a home‑cooking enthusiast with a penchant for Mexican flavors, they perfect carnitas tacos with ancho chilies, hand‑roll fresh shrimp ceviche with lime and cilantro, and experiment
    with chipotle‑infused mole sauce, while wielding a high‑end DSLR to photograph each plated dish before sharing it on a private foodie blog.
  core: Ever Ayala, a curious yet competitive security analyst, they fuse a love for neon‑lit photography, strategic card games, and disciplined risk‑assessment into a life lived on the edge of observation
    and creation.
background:
  cultural: Ever was raised by Mexican immigrant parents who settled in Las Vegas after moving from Jalisco. She grew up bilingual, celebrating Día de los Muertos, Cinco de Mayo, and local community festivals
    while also embracing the vibrant multicultural fabric of Nevada. Her family’s emphasis on hard work and respect for community informs her sense of responsibility, and the rich visual traditions of Mexican
    art foster her appreciation for color, symbolism, and storytelling. Though she lives a secular lifestyle, she maintains close ties with the Mexican–American community through church gatherings, cultural
    events, and volunteer work at neighborhood youth programs.
