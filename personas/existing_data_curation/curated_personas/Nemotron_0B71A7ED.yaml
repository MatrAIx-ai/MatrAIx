  career_goals: Ever aspires to advance to a senior surveillance manager role within a major casino resort, overseeing a multidisciplinary team and integrating advanced analytics for fraud detection. She
    plans to obtain a bachelor’s degree in criminal justice and earn certifications in cyber‑security and data analytics, positioning herself to lead the development of a cross-departmental risk‑assessment
    program. In the longer term, she envisions establishing her own security consultancy that tailors surveillance solutions for boutique hospitality venues, while also contributing to community safety
    workshops.
