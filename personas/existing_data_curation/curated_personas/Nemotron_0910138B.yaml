  career_goals: Natalie aspires to pursue a rigorous undergraduate program in computer science or biomedical engineering at a reputable university, aiming to earn a merit‑based scholarship that will allow
    her to focus on innovative health‑technology research. She is motivated to combine her curiosity about how things work with a practical desire to develop tools that improve everyday life, such as wearable
    medical devices. In the long term, she envisions a career that balances technical expertise with opportunities to mentor younger students in STEM, giving back to her East Greenwich community. Her competitive
    nature drives her to seek leadership roles in research labs or tech startups where she can solve complex challenges and make a tangible impact.
