personas:
  professional: Kelvin Waxter is a seasoned business professor who designs structured, community‑oriented curricula for courses like Principles of Management and Small Business Finance, leveraging their
    empathetic, cooperative nature to mentor first‑generation students while occasionally letting their flexible approach cause minor deadline oversights.
  sports: Kelvin Waxter follows the Charleston Battery soccer club and the South Carolina Gamecocks football team, participates in a community senior basketball league, and unwinds with weekly fishing trips
    on Lake Moultrie, using these modest activities to maintain regular, low‑impact fitness.
  arts: Kelvin Waxter regularly listens to the improvisations of John Coltrane, the uplifting hymns of Mahalia Jackson, contemporary R&B of H.E.R., and reads Toni Morrison novels, allowing these artistic
    experiences to shape their reflective evenings.
  travel: Kelvin Waxter prefers contemplative road trips to historic Southern locales such as Savannah’s squares, the Natchez Trace Parkway, and occasional pilgrimages to Washington, D.C., while budgeting
    for modest stays and seeking quiet moments in parks like the Great Smoky Mountains.
  culinary: Kelvin Waxter specializes in cooking shrimp and grits with fresh okra, collard greens simmered with smoked turkey, and a sweet‑potato soufflé that incorporates heirloom corn and tomatoes from
    their own garden, delighting in the soulful flavors of Southern cuisine with occasional modern twists.
  core: Kelvin Waxter is a structured yet flexible educator who channels community pride into mentorship, wrestles daily with worry, and finds calm in jazz, gardening, and solitary walks through Congaree
    National Park.
background:
  cultural: Kelvin was raised in a close‑knit African American community in the Lowcountry of South Carolina, where church, family, and community activism were central to daily life. His parents emphasized
    education as a pathway to upward mobility, and stories of his grandparents' participation in the civil‑rights movement instilled a deep sense of resilience and pride. Southern culinary traditions, gospel
    music, and oral storytelling shaped his cultural identity, and he remains involved in local Juneteenth celebrations and neighborhood economic‑empowerment initiatives. His extended family network and
    long‑standing affiliation with a Baptist congregation provide steady support, while his experience as a Black professional in a predominantly white academic setting fuels his commitment to fostering
    inclusive, culturally responsive learning environments.
attributes:
  skills: '["Business Course Design", "Curriculum Development", "Student Advising", "Instructional Technology (Canvas, Zoom)", "Case Study Facilitation", "Community Project Coordination", "Data Analysis
    (Excel)", "Grant Writing", "Conflict Resolution", "Empathetic Communication"]'
  hobbies: '["Reading (business & historical fiction)", "Jazz and Gospel Music", "Cooking Southern Soul Food", "Gardening", "Fishing", "Walking/Hiking in Nature", "Chess", "Journaling", "Mentoring Youth",
    "Church Small-Group Participation"]'
  career_goals: Kelvin aims to earn a master's degree in education leadership within the next three years to qualify for a tenure‑track promotion and eventually serve as department chair. He aspires to
    develop a community‑anchored entrepreneurship curriculum that equips Black and low‑income students with hands‑on skills for launching local businesses. Securing external grant funding to establish a
    scholarship fund for first‑generation college students is a priority, as is authoring a case‑study‑rich textbook on small‑business finance tailored to the Southern context. Kelvin also seeks to lead
    campus‑wide mental‑health initiatives for students, leveraging his own experience with stress management to create supportive resources and mentorship programs.
