  career_goals: Russell aspires to a career that blends his love of science with helping others. He dreams of becoming a veterinarian or a community health worker who can support the wellbeing of both people
    and animals in his hometown. He also considers studying agricultural science or environmental stewardship to improve local farming practices. In the long term, he wants to develop programs that teach
    middle‑school students coping skills and stress‑management techniques, reflecting his own sensitivity to worry and his desire to promote mental health.
