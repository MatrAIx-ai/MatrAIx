personas:
  professional: A budding young inventor and aspiring engineer, Russell Stewart channels his curiosity and practicality into building LEGO robotics kits, leading his school’s STEM club while dreaming of
    designing eco‑friendly sports equipment, and they balance organized planning with spontaneous tinkering.
  sports: A spirited youth soccer player, Russell Stewart captains the local under‑14 team, idolizes the national men’s soccer squad and follows Liverpool FC, training twice weekly at the community field
    while also joining the neighborhood creek cleanup crew to stay active.
  arts: A creative guitarist in the school band, Russell Stewart writes simple pop‑rock songs inspired by Ed Sheeran and Imagine Dragons, strums acoustic chords after practice, and enjoys sketching LEGO
    creations while binge‑watching the 'Stranger Things' soundtrack for inspiration.
  travel: An adventurous weekend explorer, Russell Stewart loves spontaneous hikes to the nearby creek valley, has camped in Yellowstone National Park with family, and dreams of visiting Kyoto, Japan to
    experience cherry blossoms and a sci‑fi convention in Orlando.
  culinary: A budding home chef, Russell Stewart favors making pepperoni pizza, cheesy quesadillas, and chocolate chip cookies, experimenting with fresh basil and jalapeño toppings, yet they often forget
    to clean up the kitchen after late‑night snack raids.
  core: Russell Stewart is a socially energetic, curiosity‑driven teen who balances practical tinkering with compassionate community service, but sometimes lets worry and video‑game cravings hijack his
    sleep and savings.
background:
  cultural: Russell grew up in a close‑knit, rural community in Ridgely, Tennessee, where Southern hospitality, church involvement, and family ties shape daily life. He has been raised on values of modesty,
    respect for tradition, and a strong sense of community service. Local customs, such as attending church youth gatherings, participating in county fairs, and helping with farm chores, are integral to
    his identity. At the same time, his curiosity drives him to explore ideas beyond his immediate environment, balancing his Southern roots with an openness to new technologies and perspectives.
