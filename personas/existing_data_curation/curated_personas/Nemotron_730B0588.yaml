  professional: Marissa Buchanan, a one-year-old budding explorer of sensory play, demonstrates early problem‑solving skills and a practical curiosity, yet they resist structured routines, turning everyday
    discoveries into spontaneous learning moments.
  sports: Marissa Buchanan enjoys toddler gymnastics classes at the community center and watches the local soccer team, the City FC, from the safety of home, preferring solo play over team drills and they
    occasionally skip scheduled sessions due to their dislike of rigid timetables.
  arts: Marissa Buchanan delights in listening to Raffi's "Baby Beluga", flipping through Dr. Seuss picture books, and creating crayon scribbles, favoring solo artistic expression that satisfies their curiosity
    while they remain skeptical of noisy group sing‑alongs.
  travel: Marissa Buchanan has taken short trips to their grandparents’ countryside farm and a nearby beach resort, favoring unplanned, low‑key outings that let them explore at their own pace, though they
    can become overwhelmed by the bustle of airports, triggering heightened worry.
  culinary: Marissa Buchanan favors pureed carrots, apple sauce, and mashed bananas, occasionally reaching for a chocolate milk treat, while they avoid peanuts due to a mild allergy, and they insist on
    eating with a favorite purple spoon despite occasional messy spills.
  core: Marissa Buchanan, a one‑year‑old explorer, balances curiosity with practicality, resists structure, and often worries, making them a spontaneous yet slightly anxious little adventurer.
background:
