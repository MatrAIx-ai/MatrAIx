persona_description: A historian who specializes in the study of the Hittite civilization, particularly the Old Hittite Kingdom period. Their research interests include the military campaigns of the Great
  King Hattushili I, the successor Murshili's efforts to the south, the fall of Aleppo, the rise of the Mitanni kingdom, and the decline of Hittite power in Anatolia. They are particularly interested in
  the political, social, and cultural aspects of the period, as well as the impact of external factors such as the attacks of marauding Kashkan tribes and the changing political landscape. They are also
  knowledgeable about the geography and topography of the region, and have a deep understanding of the military strategies and tactics employed by the Hittites.
