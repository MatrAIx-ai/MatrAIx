personas:
  professional: Malique Adams is a budding concept artist and interactive media developer who blends self‑taught Python scripting with advanced digital illustration, channeling a competitive edge from gaming
    into tight deadline management and delivering polished storyboards for student game projects.
  sports: Malique Adams dribbles as point guard for the Eastside High School Eagles, practices three after‑school sessions per week, follows the NBA’s Los Angeles Lakers for inspiration, and spends weekends
    playing pick‑up streetball at the community park while streaming weekly strategic gameplay on Twitch.
  arts: Malique Adams draws inspiration from Hayao Miyazaki’s animation, the neon‑lit murals of Banksy, and the lyrical flow of Kendrick Lamar, regularly attending the local art festival where they showcase
    a graphic‑novel‑style illustration series and perform spoken‑word pieces at open‑mic nights.
  travel: Malique Adams plans trips with the precision of a game map, saving for a spring visit to Tokyo’s Akihabara to hunt rare figurines, while also weekend‑hopping to nearby art‑focused cities like
    Portland for its indie gallery scene, balancing travel budgets with school responsibilities.
  culinary: Malique Adams prefers quick‑cook ramen topped with soft‑boiled eggs and sriracha, experiments with making avocado toast artfully plated, and revels in late‑night pizza slices while sketching,
    though they often forget to eat breakfast before early basketball practice.
  core: Malique Adams is a methodical, imagination‑driven teen who channels competitive fire from gaming into art and leadership, yet occasionally lets snack‑induced cravings and late‑night coding marathons
    blur the line between discipline and rebellion.
background:
  cultural: Malique is an African American teenager raised in the vibrant Black community of Fort Worth’s Southside. His family upholds Southern cultural traditions, blending gospel music, soul food, and
    community church gatherings with urban artistic expression such as hip‑hop and street art. He draws inspiration from local Black artists and historical figures, and remains connected to the broader
    heritage of Texas African American resilience, activism, and creativity, which informs his worldview and artistic voice.
