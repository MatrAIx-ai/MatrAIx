  hobbies: '[''sketching'', ''digital art creation'', ''reading speculative fiction'', ''playing multiplayer video games'', ''basketball'', ''freestyle rap'', ''spoken word poetry'', ''street photography'',
    ''coding simple apps'', ''attending art festivals'', ''volunteering as art mentor'']'
  career_goals: He aims to transform his passion for art and technology into a career as a concept artist and interactive media developer. After high school, he plans to enroll in a specialized art‑tech
    magnet program or community college program that focuses on game design and UI/UX. In the long term, he envisions launching his own indie game studio that blends narrative storytelling with innovative
    visual aesthetics. He also wishes to secure a scholarship to attend a university with a strong digital arts department, while mentoring younger students in his community to foster creative expression.
