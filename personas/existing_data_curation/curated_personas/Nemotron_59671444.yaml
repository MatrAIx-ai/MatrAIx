personas:
  professional: Jose Delgado is a procurement and supply‑chain specialist who leverages data‑driven market trend analysis and bilingual communication to negotiate innovative, culturally resonant product
    assortments, balancing meticulous category planning with an imaginative, flexible mindset while remaining competitively focused and slightly skeptical of vendor promises.
  sports: Jose Delgado is a devoted fan of Austin FC and the Dallas Mavericks, channeling his competitive streak into weekend trail runs with the Austin Hiking Club and occasional pickup soccer games, while
    preferring the intimacy of small‑group activities over large stadium crowds.
  arts: Jose Delgado immerses himself in contemporary art by frequenting exhibitions featuring Yayoi Kusama, Banksy, and MoMA installations, reads speculative fiction by Neal Stephenson and Ted Chiang,
    and writes abstract short stories inspired by Philip K Dick, all while dancing salsa to the rhythms of Celia Cruz and listening to Björk for creative fuel.
  travel: Jose Delgado prefers meticulously planned trips that still leave room for artistic spontaneity, having explored Oaxaca’s markets, Barcelona’s modernist architecture, and the Andean trails of Patagonia,
    and now dreaming of a week‑long immersion in Kyoto’s temples and culinary scene.
  culinary: Jose Delgado’s cooking blends his family’s traditional flavors with global twists, such as mango‑lime ceviche with chiles de árbol, kimchi‑taco rolls drizzled with miso‑aioli, and rosemary‑infused
    paella, reflecting an intermediate skill level that thrives on experimental spice pairings and the occasional indulgence at local fusion bistros.
  core: Jose Delgado fuses procurement precision with artistic imagination, balancing a competitive, detail‑oriented career with salsa rhythms, sketchbooks, and sustainable cooking, all while guarding a
    reserved, skeptical outlook that fuels both success and occasional perfectionism.
background:
  cultural: Jose is a first‑generation Hispanic American whose parents emigrated from the Dominican Republic. He grew up in a bilingual household in Orlando, speaking Spanish at home while receiving his
    education in English. He maintains cultural traditions such as celebrating Día de los Muertos, preparing family recipes like sancocho, and attending community festivals in Orange County's vibrant Latino
    community. His upbringing instilled a deep appreciation for rhythmic art forms, vivid colors, and storytelling, influences that shape both his personal hobbies and his professional eye for culturally
    resonant merchandise.
attributes:
  skills: '["Procurement Strategy", "Vendor Negotiation", "Category Management", "Market Trend Forecasting", "Data Analysis (Excel, SQL)", "Inventory Optimization", "Bilingual Communication (English/Spanish)",
