  hobbies: '["Visiting Contemporary Art Galleries", "Sketching/Urban Drawing", "Reading Speculative Fiction and Philosophy", "Creative Writing (Short Stories)", "Salsa Dancing (Small Group Classes)", "Experimenting
    with Fusion Cooking", "Hiking in Central Florida Trails", "Volunteering at Local Art Education Nonprofit"]'
  career_goals: Jose aims to advance to a senior category manager role within the next three to five years, leading a team that drives innovative and culturally resonant assortments. He intends to deepen
    his expertise in global sourcing and sustainability, positioning himself for a future Director of Procurement position at a national retail chain. To solidify his foundation, he plans to complete a
    bachelor's degree in Business Administration while earning relevant certifications in supply‑chain analytics.
