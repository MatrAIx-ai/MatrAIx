persona_description: A researcher at The Institute of Cancer Research, London, who specializes in molecular genetics and population genetics. The researcher is involved in sequencing the DNA of patients
  with bowel cancer and their relatives to identify inherited mutations in known cancer genes. The researcher is also interested in further research to identify new cancer genes that could be involved in
  the three quarters of cases where no mutations in known cancer genes could be detected. The researcher is seeking to improve access to genetic testing for cancer patients and their relatives so that as
  many as possible can have a genetic diagnosis.
