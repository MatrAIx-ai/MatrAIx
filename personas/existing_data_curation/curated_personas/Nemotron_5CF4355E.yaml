personas:
  professional: A community-focused creative strategist, Dalton Harper leverages their digital illustration, graphic design, and event planning expertise to coordinate public art projects and social media
    campaigns for local nonprofits, while they methodically launch a freelance consultancy that merges design with strategic marketing.
  sports: An active outdoor enthusiast, Dalton Harper spends weekends hiking the Superior National Forest and cycling the Intercity Trails with the Midtown Riders club, avidly follows the Minnesota Twins
    and Vikings, and participates in the local 5K charity run supporting youth art programs each spring.
  arts: A dedicated arts aficionado, Dalton Harper frequents the Walker Art Center and the Weisman Art Museum, performs improv at Brave New Works theater, draws inspiration from contemporary artists like
    Yayoi Kusama and local painter Eli Kovar, and curates monthly board‑game nights that double as informal art‑themed gatherings.
  travel: A curious travel photographer, Dalton Harper maps weekend road trips along the North Shore to capture sunrise at Goose Berry Falls, dreams of wandering Barcelona’s Gothic Quarter and Kyoto’s bamboo
    groves, blends spontaneous detours with careful itinerary planning using Google Maps, and balances adventure with a modest travel budget funded by freelance income.
  culinary: A culinary explorer with intermediate cooking skills, Dalton Harper enjoys whipping up pan‑seared salmon with dill, crafting bison burgers topped with caramelized onions, perfecting a sourdough
    starter, and sampling local craft brews such as Surly’s IPAs while they often share farm‑to‑table dishes like wild‑rice soup at community potlucks.
  core: Dalton Harper, a 28‑year‑old creatively driven community builder, balances curiosity‑fuelled art projects, spontaneous board‑game marathons, and weekend hikes while they meticulously manage a growing
    to‑do list and a modest freelance income.
background:
  cultural: Dalton grew up in a predominantly white, Midwestern environment in rural Minnesota, where Lutheran and Scandinavian heritage shaped the community’s values of modesty, self‑reliance, and strong
    civic engagement. The region’s emphasis on outdoor recreation, seasonal festivals, and support for local arts has fostered his appreciation for nature, community collaboration, and diverse forms of
    artistic expression. While rooted in these Midwestern traditions, he actively seeks out new cultural experiences through travel, contemporary art, and progressive social circles.
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Photography'', ''Photo editing (Lightroom)'', ''Social media marketing'', ''Content creation'', ''Event planning'',
