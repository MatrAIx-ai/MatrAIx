  hobbies: '[''Visiting art galleries and museums'', ''Improv theater'', ''Hiking and backpacking'', ''Cycling'', ''Travel photography'', ''Board game nights'', ''Live music concerts'', ''DIY crafts (painting,
    pottery)'', ''Volunteering at community art events'']'
  career_goals: Dalton aims to turn his creative and organizational talents into a career that enriches his community. In the next five years he plans to secure a full‑time role as a program coordinator
    or creative director for a regional arts nonprofit, where he can design public art projects, manage workshops, and mentor emerging artists. He also hopes to launch a freelance graphic‑design and marketing
    consultancy that serves local businesses and cultural organizations, while eventually completing a bachelor’s degree in Arts Administration to deepen his strategic and managerial expertise.
