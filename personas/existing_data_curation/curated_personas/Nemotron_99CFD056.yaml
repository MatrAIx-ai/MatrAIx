personas:
  professional: Lexie Burke is a seasoned HVAC and electrical technician who blends meticulous safety compliance with a cooperative, people‑first management style, mentoring apprentices while juggling a
    love of DIY electronics and a penchant for flexible, sometimes chaotic project planning as they aim for senior supervisory and EMS certification within five years.
  sports: Lexie Burke energizes their weekends with Zumba classes at the community center, cheers on the Cleveland Guardians in spring and the Cleveland Browns in fall, and belongs to a local adult softball
    league that meets on Saturday afternoons while they also tend to their garden as a seasonal low‑impact fitness activity.
  arts: Lexie Burke explores the arts by frequenting the county fair’s folk music tent—often catching The Avett Brothers—watching classic films starring Meryl Streep at the downtown cinema, and humming
    along to Fleetwood Mac while they tinker with electronics, weaving these cultural threads into their community potluck playlists.
  travel: Lexie Burke prefers road‑trip adventures that blend gardening inspiration and tech curiosity, having driven the Lake Erie shoreline to visit Put‑in‑Bounty, weekended in Asheville’s craft‑brew
    scene, and dreaming of an eco‑tour of Denmark’s renewable‑energy farms, all planned loosely with a flexible itinerary that leaves room for spontaneous detours they can embrace on the fly.
  culinary: Lexie Burke’s culinary palate spins around garden‑fresh dishes— they craft rosemary‑infused roasted chicken, zestful lemon‑garlic quinoa, and a signature summer vegetable stew—while also indulging
    in fair‑ground apple pie and potluck classics like macaroni‑and‑cheese, proudly cooking with heirloom tomatoes, fresh basil, and locally sourced honey.
  core: Lexie Burke is a sociable, hands‑on technician with a love for garden‑to‑table cooking, a habit of juggling too many projects at once, and a relaxed, community‑first outlook that sees every challenge
    as a chance for them to mentor and improvise.
background:
  cultural: Lexie was raised in a Midwestern, small‑town setting that values modesty, hard work, and community cohesion. As a White American from Ohio, she embodies the region's traditional friendliness
    and collaborative spirit, often participating in local church events and town festivals. Her upbringing emphasized respect for practical skills and a willingness to help neighbors, shaping her cooperative
    nature and her desire to create harmonious relationships both at work and in her personal life.
attributes:
  skills: '[''HVAC system installation'', ''electrical wiring repair'', ''plumbing maintenance'', ''troubleshooting and diagnostics'', ''equipment calibration'', ''OSHA safety compliance'', ''customer service'',
    ''team coordination'', ''basic carpentry'', ''use of power tools'']'
  hobbies: '[''Community volunteer work'', ''Group fitness (Zumba) classes'', ''Gardening club participation'', ''DIY electronics projects'', ''Attending county fairs'', ''Organizing potluck gatherings'',
    ''Reading home‑repair magazines'', ''Exploring smart‑home technology'']'
  career_goals: While Lexie enjoys the hands‑on nature of her current role, she aspires to advance into a senior supervisory position within the next five years, overseeing a small team of technicians in
    the Lorain County area. She aims to obtain an Energy Management Systems certification and an OSHA Trainer credential, allowing her to lead training workshops for apprentices and promote sustainable
    repair practices. Long‑term, Lexie dreams of co‑founding a family‑run home‑services business with her spouse that emphasizes community outreach, fair pricing, and environmentally friendly solutions,
    leveraging her practical expertise and strong local connections.
