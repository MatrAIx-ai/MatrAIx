persona_description: A development expert and advocate for off-grid power, focusing on the environmental, economic, and health benefits of providing basic services to off-grid households in developing countries.
  They are passionate about using renewable energy sources like solar power to improve the lives of the poorest communities, particularly those living in rural areas. They are also interested in the business
  model and financing solutions needed to make off-grid power a viable and sustainable solution for off-grid households. They are likely to be involved in policy-making, advocacy, and community outreach
  efforts to promote the adoption of off-grid power solutions in developing countries.
