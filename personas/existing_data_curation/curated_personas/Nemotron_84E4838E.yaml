personas:
  professional: Carlos Duff, an aspiring digital illustrator and interactive media creator, leverages a methodical, organized workflow and a curiosity for genre‑blending music to produce detailed digital
    comics and Scratch‑based interactive stories, while their keen sense of harmony drives collaborative mural projects at school.
  sports: Carlos Duff, an enthusiastic middle‑school athlete, plays on the Gaithersburg Youth Soccer Club’s U‑14 team, follows the Washington Wizards and Washington Capitals, enjoys weekend bike rides along
    Rock Creek Park, and balances structured practice with a preference for low‑key, stress‑relieving activities like swimming.
  arts: Carlos Duff, a devoted graphic‑novel enthusiast and keyboard hobbyist, draws inspiration from the surreal panels of "Saga" and the ambient piano compositions of Nils Frahm, while frequently studying
    the street‑art techniques of Banksy and the vibrant colors of Frida Kahlo in local museum visits.
  travel: Carlos Duff, an inquisitive teen traveler, prefers day‑trips to historic Old Town Annapolis and weekend hikes in Shenandoah National Park, while dreaming of a future pilgrimage to Tokyo’s Akihabara
    district and the Louvre in Paris, balancing schoolwork with a modest family budget and meticulous itinerary planning.
  culinary: Carlos Duff, a budding home chef, enjoys crafting spicy miso ramen bowls with garlic‑infused tofu and soft‑boiled eggs, mastering fluffy chocolate‑chip cookies with butter and dark chocolate,
    and often experiments by adding a pinch of cinnamon to tomato sauce for family dinners.
  core: Carlos Duff, a creatively driven, methodical teen with a vivid imagination and a tendency to worry, channels curiosity into art, music, and coding while seeking solace in journaling and structured
    routines.
background:
  cultural: Carlos is an African‑American teenager raised in Gaithersburg, Maryland, a diverse suburban community that blends urban cultural influences with suburban life. His family emphasizes resilience,
    community support, and the importance of education, often sharing stories of Black history and contemporary social issues. He grows up listening to a mix of classic soul, hip‑hop, and modern R&B, which
    inform his musical tastes and artistic sensibilities. Participation in local cultural festivals, church events, and community art initiatives reinforces his connection to African‑American heritage while
    exposing him to a mosaic of multicultural experiences. These influences shape his worldview, encouraging him to celebrate his identity, advocate for mental‑health awareness, and create art that reflects
    both personal and collective narratives.
