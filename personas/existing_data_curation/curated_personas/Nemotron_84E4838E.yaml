  hobbies: '[''Drawing and sketching'', ''Digital art creation'', ''Playing keyboard'', ''Reading science‑fiction graphic novels'', ''Creative writing'', ''Coding with Scratch'', ''Visiting museums and
    galleries'', ''Journaling'', ''School art club'', ''Community mural projects'']'
  career_goals: Carlos dreams of turning his passion for art and technology into a future career as a visual designer or multimedia artist, ideally attending a specialized high school for the arts and later
    pursuing a degree in graphic design or UI/UX. He hopes to build a professional portfolio that blends illustration with interactive media, allowing him to create socially conscious projects that highlight
    community stories and promote mental‑health awareness. Long‑term, he envisions working in a creative studio or as a freelance content creator where he can mentor younger artists from under‑represented
    backgrounds and contribute to community art initiatives in Montgomery County.
