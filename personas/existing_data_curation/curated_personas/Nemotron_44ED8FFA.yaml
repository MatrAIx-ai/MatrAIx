  career_goals: Although retired, Wilburn aims to remain intellectually active by volunteering as a mentor for local high‑school robotics teams, delivering occasional guest lectures on engineering fundamentals
    at the community college, and completing a personal project to retrofit his historic home with energy‑efficient smart systems. He also hopes to publish a series of reflective essays on the evolution
    of engineering practices, and to maintain his health to keep participating in community activities. Balancing his desire for continual learning with his preference for low‑pressure, flexible commitments,
    he seeks to contribute his expertise without the constraints of a formal schedule.
