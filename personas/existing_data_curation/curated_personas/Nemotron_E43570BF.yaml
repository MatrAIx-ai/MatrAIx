  hobbies: '[''Knitting and crocheting'', ''Baking (cookies, pies, brownies)'', ''Journaling'', ''Walking/jogging on local trails'', ''Nature photography'', ''Yoga and mindfulness'', ''Reading young‑adult
    and romance novels'', ''Listening to indie folk music'', ''Playing casual card games (e.g., Uno)'', ''Volunteering at the local animal shelter'']'
  career_goals: Wendy aims to complete her associate degree in business administration, earn a certification in medical billing and coding, and secure a full‑time position as a medical records clerk or
    administrative assistant in a healthcare setting. She values a predictable work schedule, clear procedures, and opportunities for incremental advancement. In the longer term she hopes to become a senior
    office manager where she can mentor newer staff while maintaining a stable, routine‑driven environment.
