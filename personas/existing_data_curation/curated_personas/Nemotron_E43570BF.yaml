personas:
  professional: Wendy Olds, an 18‑year‑old aspiring medical records clerk with a budding certification in medical billing and coding, thrives on repetitive data‑entry tasks and clear step‑by‑step procedures,
    turning their love of routine into meticulous record‑keeping, yet their laid‑back attitude toward deadlines occasionally triggers last‑minute scrambles that leave them anxious.
  sports: Wendy Olds enjoys jogging on the county park’s paved trails, attends a weekly community yoga class, faithfully cheers on the Purdue Boilermakers football team each Saturday, and they occasionally
    join a pickup basketball game at the local recreation center during the summer months.
  arts: Wendy Olds unwinds by knitting colorful scarves while streaming indie folk playlists featuring Sufjan Stevens, Iron & Wine, and The Lumineers, reads contemporary YA romance novels like The Truth
    About Keeping Secrets by Savannah Brown, and they frequently attend the town’s community theater productions of classics such as Our Town to stay connected to local culture.
  travel: Wendy Olds prefers low‑key weekend getaways, often driving to the Indiana Dunes for sunrise photography and a quiet picnic, enjoys occasional trips to Chicago to attend a concert or museum exhibit,
    and they dream of a future backpacking adventure through the Great Smoky Mountains once they can save enough for the journey.
  culinary: Wendy Olds loves baking buttery chocolate‑chip cookies and simmering hearty chicken pot pies flavored with locally grown corn and apples, feels confident preparing comfort meals for family gatherings,
    and while they enjoy the occasional cheat meal of chicken‑fried steak at the local diner, they meticulously follow recipes to maintain consistency.
  core: Wendy Olds balances a deep love for routine and community service with an anxious heart that often spirals into last‑minute panic, compensating through knitting, journaling, and an ever‑spinning
    indie folk soundtrack.
background:
  cultural: Wendy was raised in a small town in Indiana and belongs to a white, Midwestern family that emphasizes hard work, self‑reliance, and community involvement. Her upbringing included regular church
    attendance at a United Methodist congregation, participation in local events such as county fairs and Purdue Boilermakers football games, and family traditions of home‑cooked meals and holiday gatherings.
    While she embraces contemporary digital culture, she retains a practical, down‑to‑earth outlook rooted in Midwestern values.
