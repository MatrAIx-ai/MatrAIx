persona_description: A theologian and scholar who is deeply interested in the history and theology of the Church of England, particularly the Oxford movement that sought to assert the authority of the Roman
  Catholic church in the Anglican church. This individual is knowledgeable about the events and ideas that led to the movement, the key figures involved, and the theological, pastoral, and devotional issues
  that arose as a result. They are also familiar with the works of John Henry Newman, Richard Hurrell Froude, John Keble, and Edward Pusey, and their ideas about the Church of England and its relationship
  to the state.
