  hobbies: '["Bowling league participation", "Community garden volunteering", "Woodworking projects", "Classic‑car club activities", "Church choir singing", "Hiking in state parks", "Reading Midwestern
    historical fiction", "Cooking German‑American family recipes"]'
  career_goals: Although retired from full‑time employment, John aims to deepen his community involvement. He hopes to become a senior mentor for the local community center’s volunteer program, sharing
    his DIY knowledge with younger participants. He aspires to lead the development of a neighborhood garden that supplies fresh produce to seniors and low‑income families. John also wants to learn digital
    photography so he can document the history of Saint Peters and its residents, eventually creating a small online archive. Travel remains a personal ambition; he plans to visit several national parks
    with his wife, combining his love of the outdoors with his desire for new experiences. Maintaining his health through regular walking, yoga, and staying socially active is a core part of his long‑term
    personal goals.
