personas:
  professional: Courtney Lamour is an aspiring elementary educator who leverages a bachelor’s in education and a meticulous, tech‑savvy approach to weave visual arts into interdisciplinary curricula, using
    Google Classroom and digital illustration tools to create inclusive, project‑based lessons, and they quietly champion student voice.
  sports: Courtney Lamour is a quiet fitness enthusiast who jogs the Lakefront Trail solo year‑round, follows the Chicago Bulls and the Chicago Bears for occasional game day motivation, and they participate
    in a community running club that meets monthly for the Chicago Marathon training program.
  arts: Courtney Lamour is a devoted art lover who frequents the Art Institute of Chicago to study works by Kehinde Wiley, Jacob Lawrence, and Kara Walker, captures inspirations through digital sketching
    on an iPad, improvises on piano with a focus on jazz standards like ‘Take the A Train,’ and they lead small‑group workshops that blend art history with hands‑on creation for local youth.
  travel: Courtney Lamour is an introspective traveler who plans low‑cost weekend getaways to Starved Rock State Park and New Orleans for culinary research, prefers solo train journeys that allow journal‑filled
    reflection, and they dream of a summer road trip along the Great River Road to capture both Midwest prairie and Southern riverine landscapes.
  culinary: Courtney Lamour is a budding home chef who blends Southern comfort foods such as shrimp étouffée, collard greens, and cornbread with Chicago twists like adding Italian beef spices to jambalaya,
    cooks at an intermediate skill level using a cast‑iron skillet and a sous‑vide, and they relish experimenting with seasonal produce sourced from the Green City Market.
  core: Courtney Lamour is a quietly curious, impeccably organized 19‑year‑old whose love for art, solitude, and purposeful planning shapes a deliberate, introverted yet deeply engaged approach to life;
    they consistently seek quiet moments to reflect.
background:
  cultural: Courtney grew up in Chicago's historic Bronzeville neighborhood, a vibrant hub of African-American culture and activism. Her family placed a strong emphasis on education, community service,
    and cultural pride, drawing from traditions such as gospel music, spoken-word poetry, and storytelling. Frequent family outings to the Art Institute exposed her early to the works of Black artists like
    Jacob Lawrence and Kerry James Marshall, nurturing her appreciation for visual art as a vehicle for cultural expression. She participates in local Black cultural events, including Juneteenth celebrations
    and community murals, and she values the intergenerational wisdom passed down from grandparents who were involved in civil-rights organizing. This upbringing informs her commitment to incorporating
    Black history and contemporary Black perspectives into her educational practice.
attributes:
  skills: '[''Curriculum Design'', ''Lesson Planning'', ''Classroom Management'', ''Educational Technology Integration'', ''Assessment & Data Analysis'', ''Research Methods'', ''Multicultural Education'',
    ''Project-Based Learning Facilitation'', ''Digital Media Creation'', ''Interpersonal Communication'', ''Conflict Resolution'', ''Time Management'']'
  hobbies: '[''Visiting art museums and galleries'', ''Sketching and digital illustration'', ''Nature walks and journaling'', ''Reading literary fiction and poetry'', ''Playing piano'', ''Cooking Southern-inspired
    dishes'', ''Volunteering art workshops for youth'', ''Photography'', ''Listening to philosophy podcasts'', ''Attending quiet experimental theater performances'']'
  career_goals: Short-term, Courtney aims to obtain her Illinois teaching license and secure a full-time elementary classroom position in Chicago that emphasizes integrated arts instruction and culturally
    responsive pedagogy. Over the next three to five years, she plans to pursue a master's degree in Curriculum and Instruction, focusing on art-based learning and equity-focused curriculum development.
    Ultimately, she aspires to become a district-level curriculum specialist or educational consultant, designing inclusive, art-infused curricula that highlight Black history and contemporary Black creators,
    and to lead professional development workshops that empower fellow teachers to support introverted and diverse learners.
