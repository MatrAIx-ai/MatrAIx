    to seniors'', ''Following tech news'']'
  career_goals: Keith aims to move from a frontline surveillance officer to a supervisory role within the next three years, seeking a position such as Security Operations Supervisor or Casino Surveillance
    Manager. He plans to obtain industry certifications (e.g., CPP – Certified Protection Professional, PCI – Professional Certification in Investigations) and to deepen his cybersecurity knowledge through
    a part‑time master's program. In the long term, he envisions transitioning into a security‑technology analyst role that leverages his STEM background, allowing him to design and implement advanced monitoring
    systems while reducing day‑to‑day stress. He also hopes to mentor new guards, creating a supportive training environment that reflects his cooperative nature.
