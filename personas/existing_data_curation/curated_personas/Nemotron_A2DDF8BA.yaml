personas:
  professional: Keith Welch is a methodical surveillance officer at a bustling casino in Delray, blending their STEM background with meticulous risk assessments, conflict de‑escalation, and detailed incident
    reporting, while nurturing a curiosity for emerging security technology that fuels their ambition to earn a CPP certification and soon lead a security operations team.
  sports: Keith Welch is an avid cyclist on Delray’s beachfront trail, a seasonal surfer who rides the swells with the Delray Beach Surf Club, a dedicated member of the South Florida Cyclists Collective,
    and a loyal fan of the Miami Dolphins, Miami Heat, and Florida Panthers, regularly cheering them on at the Hard Rock Stadium and attending local beach‑volleyball tournaments.
  arts: Keith Welch is a sunset‑obsessed photographer who captures coastal wildlife with a Fujifilm X‑T4, a dedicated reader of science‑fiction authors like Neal Stephenson and non‑fiction technologists
    such as Kevin Kelly, a board‑game enthusiast who hosts monthly game nights featuring titles like Terraforming Mars, and a regular at the Pineapple Grove Arts Festival where they admire works by local
    painter Maya Lin.
  travel: Keith Welch is a beach‑centric traveler who has explored Key West, the Bahamas, and Costa Rica’s Osa Peninsula for surf and wildlife encounters, enjoys weekend getaways to Miami and Charleston,
    dreams of catching waves in Bali and strolling through Kyoto’s tech museums, and prefers a hybrid travel style that mixes detailed itineraries for overseas trips with spontaneous local weekend drives,
    always budgeting carefully to fund their master’s program tuition.
  culinary: Keith Welch is an intermediate home‑cook who loves whipping up grilled mahi‑mahi tacos with mango salsa, enjoys fresh Mediterranean salads topped with feta and olives, frequently orders a perfectly
    balanced poke bowl from a local spot, and treats themselves to a slice of Key Lime Pie at Columbia Café after a long surveillance shift, though they often forget to drink enough water during busy nights.
  core: Keith Welch is a curiosity‑driven, methodical security professional who balances a love for ocean breezes and techno‑savvy ambitions with a tendency to over‑worry and a habit of binge‑watching sci‑fi
    at midnight.
background:
  cultural: Keith grew up in a middle‑class, predominantly white neighborhood in South Florida, where he was exposed to a blend of typical American suburban values and the diverse, multicultural atmosphere
    of Palm Beach County. The region's coastal lifestyle influenced his love for outdoor activities like cycling and surfing, while the tourism‑driven economy introduced him to a wide range of cultural
    perspectives, from Latin American to Caribbean influences. His family emphasized reliability, hard work, and community service, shaping his cooperative and considerate demeanor. Though he identifies
    with mainstream U.S. cultural norms, he remains open to new ideas, reflecting the pragmatic curiosity fostered by his STEM education and the dynamic environment of the local casino industry.
attributes:
