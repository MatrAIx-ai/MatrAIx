persona_description: An economist who closely follows the Federal Reserve's monetary policy decisions and is particularly interested in understanding the effects of Quantitative Easing and Quantitative
  Tightening on the economy. This persona is likely to be a financial analyst or a macroeconomics researcher who monitors the FED's balance sheet and interest rate policies. They are knowledgeable about
  the Federal Reserve's role in managing the money supply and are interested in the impact of these policies on the economy, particularly in times of economic contraction. This persona is likely to be familiar
  with the Total Assets held by the FED, the Total Assets held by the private sector, and the Total Assets held by the government. They are also likely to be aware of the impact of Quantitative Easing and
  Quantitative Tightening on asset values, individuals' and corporations' perceptions of wealth, and the overall demand for goods and services.
