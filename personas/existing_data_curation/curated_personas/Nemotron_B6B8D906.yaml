personas:
  professional: William Dekker, a retired hands‑on technician turned community handyman leader, leverages their carpentry, small‑engine repair, and budgeting expertise to coordinate volunteer repair projects
    for seniors and low‑income families while teaching DIY skills in a modest backyard workshop they built themselves.
  sports: William Dekker follows the Seattle Seahawks and the Seattle Kraken, participates in a local seniors’ walking club that meets weekly on the Stillaguamish River Trail, and they enjoy seasonal fishing
    tournaments on the Stillaguamish River as a relaxed competitive outlet.
  arts: William Dekker enjoys listening to classic‑rock stations featuring Led Zeppelin, Fleetwood Mac, and John Denver, attends monthly nature documentary screenings, and their woodworking projects reflect
    folk‑art influences, often carving birdhouses with motifs inspired by regional Indigenous designs.
  travel: William Dekker prefers road‑tripping to nearby natural treasures, having explored the Hoh Rain Forest on the Olympic Peninsula and the historic mining town of Walla Walla, yet they dream of hiking
    Norway’s fjords to study the timber‑craft traditions that echo their own woodworking practice.
  culinary: William Dekker favors seasonal, farm‑to‑table cooking, frequently preparing roasted salmon with fresh dill, sautéed kale, and heirloom tomatoes harvested from their garden, and they relish baking
    a spiced apple crumble using locally sourced apples and a dash of cinnamon.
  core: William Dekker blends a methodical handyman mindset with a love for nature, balancing community service, woodworking, and classic‑rock devotion, while occasionally neglecting physiotherapy for extra
    fishing time and hoarding vintage tools.
background:
  cultural: William is a white American who has spent most of his life in the Pacific Northwest, specifically in the small‑town setting of Arlington, Washington. His family background includes roots in
    early 20th‑century Midwestern settlers, with some Scandinavian ancestry that influences his appreciation for practical craftsmanship and seasonal cycles. He grew up within a community that values self‑reliance,
    neighborly support, and a modest, hard‑working ethic. While he identifies with mainstream American cultural norms, he also respects the Indigenous heritage of the region and participates in local efforts
    to acknowledge the traditional territories of the Snohomish and Tulalip peoples. This blend of regional, familial, and broader American influences informs his everyday habits, values, and social outlook.
