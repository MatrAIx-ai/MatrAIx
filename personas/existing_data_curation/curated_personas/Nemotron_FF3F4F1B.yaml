personas:
  professional: Kevin Newsome is a retired mechanical engineer whose decades in automotive manufacturing sharpened their CAD and CNC expertise, and they now channel that practical curiosity into mentoring
    robotics clubs, guiding DIY workshops, and designing handcrafted furniture with disciplined project management.
  sports: Kevin Newsome follows the Detroit Tigers and Red Wings, competes in a senior pickleball league, spends Saturdays fishing on Lake St. Clair and weekends hiking the Goodrich trail system, and they
    keep fit through weekly power‑walking, blending competitive spirit with a love for the outdoors.
  arts: Kevin Newsome enjoys the folk storytelling of Bob Dylan, the jazz brilliance of Miles Davis, and the American realism of Grant Wood, often listening to vinyl while hand‑carving furniture, and they
    attend the local community theater’s classic play nights for an occasional cultural fix.
  travel: Kevin Newsome prefers methodical road trips, having already explored the Upper Peninsula’s Pictured Rocks and the historic streets of Quebec City, while dreaming of a cross‑country train journey
    to New Orleans, and they balance adventure with a modest travel budget that leaves room for family visits.
  culinary: Kevin Newsome is a competent home cook who favors smoked trout, homemade rye bread, hearty beef stew with root vegetables, and they experiment with vintage spice blends while grilling corn on
    the cob during summer evenings.
  core: Kevin Newsome blends a competitive engineer’s mind with a carpenter’s patience, often swapping screwdrivers for chess pieces, yet they admit to over‑planning projects and neglecting a regular bedtime,
    reflecting a quirky balance of rigor and relaxation.
background:
  cultural: Kevin grew up in a traditional Midwestern white working-class family in the Detroit metropolitan area. The region's strong ties to the automotive industry and a culture of self-reliance, modesty,
    and community service shaped his values. He was raised with an emphasis on practical education, hard work, and participation in local institutions such as his church, the volunteer fire department,
    and community clubs. These influences, combined with the seasonal rhythms of rural Lapeer County, fostered his appreciation for both innovation and the proven methods of his heritage.
