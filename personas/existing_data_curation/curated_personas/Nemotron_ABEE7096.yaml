  career_goals: Rogelio aims to advance to a senior engineering technologist role where he can lead multidisciplinary R&D projects focused on sustainable manufacturing and smart‑factory solutions. Over
    the next five years he plans to earn certifications such as Certified Manufacturing Technologist (CMfgT) and Certified Reliability Engineer (CRE), and to pursue a master’s degree in Engineering Management
    or Sustainable Engineering to deepen his strategic and leadership capabilities. He envisions leveraging his artistic sensibility to drive human‑centered product design, eventually becoming a technical
    project lead who mentors junior staff while maintaining a balanced schedule that supports his family life.
