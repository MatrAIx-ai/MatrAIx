personas:
  professional: Rogelio Garcia is a seasoned engineering technologist in aerospace manufacturing, blending ten years of expertise in mechanical design, PLC programming, and IoT integration with a keen eye
    for aesthetic detail that transforms functional prototypes into visually striking smart‑factory solutions, and they constantly mentor bilingual teams while pursuing sustainable design leadership.
  sports: Rogelio Garcia fuels their fitness by hiking the cliffs of Torrey Pines, joining the San Diego Run Club for weekend trail runs, cheering for the San Diego Padres in spring and the San Diego Wave
    FC in summer, and they balance solitary surf sessions with occasional pickup soccer games at a local community field.
  arts: Rogelio Garcia spends quiet evenings sketching watercolors inspired by Frida Kahlo’s vivid storytelling and the abstract sculptures of Alexander Calder, attends exhibitions by local Chicano muralists
    at the San Diego Museum of Art, and they regularly capture street photograph motifs reminiscent of Vivian Maier’s candid style.
  travel: Rogelio Garcia favors thoughtfully planned road trips that combine cultural immersion with natural splendor, having explored the historic streets of Oaxaca and the coastal cliffs of Big Sur, while
    dreaming of a future hike through Patagonia’s Torres del Paine when their family schedule permits, and they balance travel costs by swapping houses through a trusted network of fellow makers.
  culinary: Rogelio Garcia delights in crafting authentic mole poblano and hand‑rolled tamales using fresh chiles, corn masa, and a secret blend of spices, and they experiment with modern plating techniques
    learned from chef Enrique Olvera, though they occasionally over‑season meals when caught up in an exciting new project.
  core: Rogelio Garcia is a technically gifted, art‑infused engineer who balances family‑centered traditions with a solitary maker’s curiosity, often juggling midnight coding sessions, spontaneous sketching,
    and a habit of forgetting to water houseplants.
background:
  cultural: Rogelio’s cultural background is rooted in a Mexican‑American family that emigrated to Southern California in the 1970s. Raised in a bilingual household, he celebrates key Mexican traditions
    such as Día de los Muertos, Mexican Independence Day, and the vibrant festivities of Cinco de Mayo with his extended family and the local Chicano community in San Diego. These cultural practices reinforce
    a strong emphasis on family cohesion, respect for elders, and communal support. His heritage also nurtures an appreciation for Mexican folk art—bright colors, intricate patterns, and storytelling—which
    subtly informs his aesthetic sensibility in both his personal art projects and his professional design work. Navigating between Mexican cultural values and the diverse, innovative environment of San
    Diego has given him a flexible worldview that values both tradition and forward‑looking creativity.
