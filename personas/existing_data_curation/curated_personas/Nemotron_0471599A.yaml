  career_goals: Fatima aims to become a senior engineer and eventually a technology lead who builds inclusive, socially impactful products. She plans to deepen her expertise in cloud architecture and AI‑driven
    interfaces, earn certifications such as AWS Solutions Architect, and mentor junior developers—particularly women and under‑represented minorities—in her community. In the long term, she envisions launching
    a SaaS platform that provides affordable coding education to diaspora youth, blending her technical skills with her passion for empowerment and community service.
