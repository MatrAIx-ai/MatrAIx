  career_goals: Although retired, Brooke aspires to broaden the impact of her creative compassion. She plans to launch an arts‑therapy program at the senior center that uses painting and poetry to help
    seniors process stress and grief. She hopes to compile a community scrapbook that preserves personal stories and local folklore, serving as a living archive for future generations. Brooke also dreams
    of authoring a memoir of her life’s imaginative journeys and a small collection of poems. Travel remains a modest ambition—she wishes to visit a few renowned art museums in the Northeast and explore
    the natural beauty of Florida’s coastal preserves. Finally, she aims to mentor younger volunteers, especially those who feel anxious about responsibility, by modeling a gentle, flexible approach to
    service.
