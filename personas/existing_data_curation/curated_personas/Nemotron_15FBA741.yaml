personas:
  professional: Brooke Perez, a retired community volunteer and senior‑center arts facilitator, blends watercolor painting, poetry, and empathetic counseling to create low‑pressure creative workshops, using
    her conflict‑mediation skills to keep senior participants engaged and harmonious while they enjoy a relaxed, flexible schedule.
  sports: Brooke Perez enjoys gentle morning walks with the DeLand senior walking club, supports the Tampa Bay Rays and the Orlando Magic, and participates in a local bird‑watching league that doubles as
    a low‑impact fitness group, preferring seasonal activities like kayaking on the St. Johns River over high‑intensity sports.
  arts: Brooke Perez immerses themselves in the arts by painting watercolor abstractions inspired by Monet and O'Keeffe, reading poetry from Maya Angelou and Rumi, attending performances by the local community
    theater, and enjoying the timeless music of Ella Fitzgerald as well as the Broadway classic "The Sound of Music," which together shape their creative identity.
  travel: Brooke Perez’s travel style is relaxed and purposeful; after exploring Boston’s Museum of Fine Arts and New York’s Metropolitan Museum of Art, they now dream of kayaking through the Everglades
    and visiting the Anhinga Trail in the Florida Keys, planning trips around church holidays and senior‑center events.
  culinary: Brooke Perez enjoys cooking a blend of Southern comfort and Caribbean flavors, often preparing shrimp and grits with a dash of sofrito, black bean and plantain casserole, and fresh citrus‑marinated
    fish tacos, while their garden supplies basil, rosemary, and hibiscus that they incorporate into these dishes.
  core: Brooke Perez is a 76‑year‑old imaginative watercolorist and empathetic volunteer who balances gentle creative pursuits with a tendency to worry and a love for spontaneous, low‑stress living.
background:
  cultural: Brooke grew up in a middle‑class white family in the Midwest, where community involvement, church fellowship, and self‑reliance were core values. Her upbringing emphasized compassionate service
    and modest celebrations of holidays and seasonal milestones. After retiring, she relocated to Deland, Florida, attracted by the warm climate and the close‑knit, welcoming atmosphere of Lake County.
    In her new home, she embraces Southern hospitality and the multicultural flavor of Florida life—sometimes incorporating Cuban and Caribbean-inspired dishes into family meals while maintaining traditional
    holiday gatherings. She remains active in her local church choir, participates in town festivals, and values the blend of her Midwestern roots with the relaxed, diverse rhythms of her Floridian community.
