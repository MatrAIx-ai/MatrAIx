  hobbies: '[''cooking traditional Mexican dishes'', ''listening to Latin music'', ''attending local cultural festivals'', ''guided meditation'', ''journaling'', ''walking in parks'', ''reading self‑help
    books'', ''volunteering at community center'']'
  career_goals: Ines aims to obtain her GED within the next year, followed by a certification as a Home Health Aide or Certified Nursing Assistant, leveraging her caregiving experience. She hopes to secure
    a steady, part‑time role in a local senior center or home‑care agency that offers schedule flexibility, allowing her to maintain her personal time while providing a reliable income. Long‑term, she dreams
    of opening a small, home‑based catering service specializing in family‑style Mexican dishes, which would combine her cooking passion with entrepreneurial independence. She also wishes to develop stronger
    organizational habits to reduce stress and improve her overall well‑being.
