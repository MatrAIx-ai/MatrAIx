  career_goals: Leveraging her practical experience and natural curiosity, Tresa aims to move into a supervisory or management position within the hospitality industry. She plans to earn the Certified Concierge
    Professional credential and enroll in a part‑time master’s program in tourism management. Her long‑term ambition is to launch a boutique concierge service that highlights African American historic sites
    and cultural experiences in Upstate South Carolina, fostering community partnerships and cultural tourism.
