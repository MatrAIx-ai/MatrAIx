personas:
  professional: Tresa Chevalier, a 45‑year‑old concierge specialist with years of front‑line hospitality experience, blends meticulous operational expertise, problem‑solving under pressure, and a storyteller’s
    knack for local history to craft personalized guest experiences, while they balance curiosity with a pragmatic mindset to keep services both innovative and reliably consistent.
  sports: Tresa Chevalier, a regular member of the Greenville Running Club who jogs the Reedy River Trail at sunrise, supports the Carolina Panthers in football, roots for the Clemson Tigers in college
    basketball, and enjoys occasional doubles tennis at the local YMCA, they approach fitness with steady consistency rather than intensity.
  arts: Tresa Chevalier’s cultural palate includes evenings spent reading Toni Morrison and contemporary African‑American authors, listening to Billie Holiday and John Coltrane, attending community theater
    productions by the Upstate Playwrights Ensemble, and sketching park scenes inspired by the works of Georgia O’Keeffe, and they find this artistic immersion enriches their storytelling flair.
  travel: Tresa Chevalier favors carefully plotted weekend road trips to historic locales such as Savannah, Charleston, and Annapolis, while planning longer cultural excursions to New Orleans and Boston’s
    Freedom Trail, and they balance a love for spontaneous discovery with a budget‑savvy approach.
  culinary: Tresa Chevalier, an enthusiastic home cook, perfects Southern‑inspired dishes like shrimp and grits with smoked paprika and collard greens, experiments with spice blends in a signature sweet‑potato
    pie, and frequently dines at farm‑to‑table bistros that showcase seasonal heirloom tomatoes, while they blend tradition with culinary curiosity.
  core: Tresa Chevalier, a 45‑year‑old hospitality professional who blends genealogy research, soulful cooking, and spontaneous road trips with a pragmatic, organized outlook, often forgets to water their
    sketch‑pad plants but never misses a choir rehearsal, and they always keep a spare set of pens in their bag for unexpected note‑taking.
background:
  cultural: Tresa is a second‑generation African American from the Upstate of South Carolina. Raised in a close‑knit family that valued church, oral history, and community service, she grew up immersed
    in Southern Black traditions—gospel music, soul cuisine, and storytelling. She maintains strong ties to local African American heritage organizations and regularly celebrates cultural events such as
    Juneteenth and Black History Month exhibits. Her identity informs her professional ethos of hospitality rooted in respect, empathy, and a desire to showcase the region's rich Black history to visitors.
