personas:
  professional: Len Lemos, a 51‑year‑old facilities maintenance veteran, merges a solid grasp of building systems—electrical, plumbing, HVAC, and carpentry—with a preference for structured preventive‑maintenance
    schedules, while also leaning on a relaxed, improvisational mindset that sometimes leaves paperwork half‑filled; they mentor younger technicians, aim for CMRP and EPA‑608 certifications, and envision
    leading a small team before launching a community‑focused handyman service.
  sports: Len Lemos delights in cheering for the Green Bay Packers, following the Milwaukee Brewers, proudly wearing Wetmore High School Hawks colors at every football and basketball game, and competing
    in the local Saturday night bowling league, where the sport’s social camaraderie matches their outgoing personality.
  arts: Len Lemos channels artistic flair into his woodworking while blasting classic rock legends like The Rolling Stones, Lynyrd Skynyrd, and Johnny Cash, and he unwinds by attending the community theater’s
    productions of “Fiddler on the Roof” and “Our Town,” which feed his appreciation for storytelling and craftsmanship.
  travel: Len Lemos favors low‑key, self‑planned road trips in his restored 1965 Ford pickup, often heading to Pictured Rocks National Lakeshore, Door County, or a weekend on Mackinac Island, and he dreams
    of a cross‑country adventure along the Oregon Coast to experience the Pacific’s rugged beauty.
  culinary: Len Lemos relishes hearty Midwestern fare—grilling fresh walleye caught on the Menominee River with lemon butter, cooking pork chops with apple‑cabbage slaw, and slow‑cooking a bourbon‑glazed
    barbecue rib rack—while he delights in crafting meals over a charcoal grill and topping dishes with locally sourced wild berries and smoked paprika.
  core: Len Lemos is a practical yet easy‑going maintenance expert who balances structured work routines with a love for fishing, DIY projects, classic cars, and community camaraderie, all while occasionally
    juggling disorganization and a penchant for splurging on tools.
background:
  cultural: Len comes from a mid‑western, working‑class American background typical of the Upper Peninsula of Michigan. His family roots trace back to German and Polish immigrants who settled in the region
    in the early 20th century, bringing a strong ethic of hard work, self‑reliance and community involvement. Raised in a small town, Len grew up with a close‑knit family, Catholic traditions, and an appreciation
    for the outdoors—fishing, hunting, and the rugged landscape shaped his worldview. The local culture’s emphasis on practical skills, neighborly help, and regional celebrations like cheese‑curd festivals
    continues to influence his values and daily life.
attributes:
  skills: '[''Electrical troubleshooting'', ''Plumbing repair and maintenance'', ''HVAC system servicing'', ''Carpentry and minor construction'', ''Preventive maintenance scheduling'', ''Reading schematics
    and blueprints'', ''Safety compliance and OSHA training'', ''Inventory management of parts and tools'', ''Operation of forklifts and floor jacks'', ''Small engine repair (generators, lawn mowers)'']'
  hobbies: '[''Fishing'', ''Hunting'', ''Bowling'', ''DIY woodworking'', ''Attending high school sports events'', ''Classic car restoration'', ''Community volunteering'']'
  career_goals: Len aims to move into a supervisory role within the next three years, obtaining certifications such as the Certified Maintenance & Reliability Professional (CMRP) and an EPA 608 certification
    for HVAC work. He wants to lead a small maintenance team, improve preventive maintenance programs, and mentor newer technicians. Over the longer term, he hopes to launch his own handyman and small‑scale
    repair service serving Wetmore and neighboring communities, allowing him more flexibility while still contributing to the local economy. He also plans to secure a pensionable position that will provide
    a comfortable retirement for his family.
