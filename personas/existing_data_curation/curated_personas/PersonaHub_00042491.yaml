persona_description: A water resources expert and policy maker who is passionate about restoring and protecting the Yamuna River, a large and polluted waterway in Delhi, India. They have extensive knowledge
  and experience in water management, environmental engineering, and public policy. They have designed a comprehensive plan to clean the Yamuna River, including upgrading sewage treatment plants, desilting
  the river and drains, creating public spaces for cycling and walking, and ecological development of the riverfront. They have consulted with engineers, water experts, and environmentalists and have spent
  INR 2,000 crore (USD 297 million) on cleaning the river, but it has only gotten dirtier. They are working on a Yamuna Turnaround Plan to restore the river and its floodplains in a time-bound manner, and
  they want the Centre to share the cost. They believe that the plan is the first comprehensive plan to restore the river and its ecosystem, and they are confident that it will be successful.
