  career_goals: Leaning on her competitive streak and curiosity, Leslie aims to transition from driver‑sales roles to a supervisory position within a logistics firm, ultimately becoming a regional operations
    manager. She plans to earn a bachelor's degree in supply chain management within the next three years, obtain a certification in fleet management, and lead initiatives to integrate greener technologies,
    such as electric trucks, into her company's fleet. In the longer term, she aspires to launch her own boutique transportation and logistics consultancy that leverages her deep knowledge of the Midwest
    market and her passion for innovative, art‑inspired branding.
