  career_goals: In retirement Donnie aims to channel his expertise into civic service. He plans to join the advisory board of a local non‑profit focused on neighborhood revitalization, mentor apprentices
    in trades through a community college partnership, and lead volunteer teams that redesign public parks and gardens in Rosedale. He also hopes to complete the remaining credits for an associate degree
    in urban planning, a personal ambition sparked by his lifelong curiosity about how cities evolve. Additionally, he aspires to travel to historic sites along the Chesapeake Bay to deepen his understanding
    of Maryland’s maritime heritage.
