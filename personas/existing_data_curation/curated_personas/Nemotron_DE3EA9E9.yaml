personas:
  professional: Donnie Sims, a seasoned municipal project manager turned civic volunteer, leverages decades of public works expertise to mentor apprentices, advise non‑profit revitalization boards, and
    lead volunteer teams redesigning parks and community gardens with a methodical, community‑focused approach; they balance curiosity for new urban planning ideas with practical, budget‑savvy execution.
  sports: Donnie Sims, a devoted member of the Rosedale Senior Striders walking club, logs regular morning walks along Baltimore’s waterfront; they also cheer for the Baltimore Ravens and Orioles on game
    days and participate in occasional community bridge tournaments as a mental‑sharpness sport, reflecting a balanced blend of low‑impact fitness and local team loyalty.
  arts: Donnie Sims, a folk‑song enthusiast, often sits at a well‑worn upright piano to play tunes by Pete Seeger, Woody Guthrie, and Bob Dylan for friends, attends the Chesapeake Bay Maritime Museum’s
    rotating exhibits; they also enjoy community theater productions featuring classic Americana, weaving a love of storytelling into leisure time.
  travel: Donnie Sims, an organized heritage traveler, prefers meticulously planned road trips to historic Chesapeake Bay sites such as Fort McHenry, Annapolis’s historic district, St. Michaels, and the
    Eastern Shore lighthouses, but they also allow for spontaneous detours to local farmers’ markets and oyster shacks, balancing a love of detailed itineraries with a taste for spontaneous culinary discoveries.
  culinary: Donnie Sims, a self‑taught home chef, excels at preparing Chesapeake‑Bay crab cakes seasoned with Old Bay, steaming fresh oysters with a dash of lemon, and crafting garden‑fresh vegetable ratatouille,
    while their modest cooking skill is punctuated by occasional over‑salting of crab cakes, a habit they attribute to the excitement of feeding large family gatherings.
  core: Donnie Sims blends a lifetime of municipal stewardship with a hands‑on love for gardening, classic‑car restoration, and Chesapeake seafood; they methodically plan every project while occasionally
    indulging in spontaneous crab feasts and skipping a dental appointment.
background:
  cultural: Donnie grew up in suburban Maryland within a middle‑class white family whose ancestry includes German and Irish immigrants who settled in Baltimore in the early 1900s. His upbringing was shaped
    by the Protestant work ethic and the strong community ties of the Rosedale area. He was exposed to the cultural mosaic of Baltimore’s historic neighborhoods, which fostered an appreciation for regional
    traditions such as Chesapeake Bay seafood festivals, crab feasts, and local folk music. While he celebrates mainstream American holidays, he also values the local customs and civic pride that define
    Maryland’s Mid‑Atlantic identity.
