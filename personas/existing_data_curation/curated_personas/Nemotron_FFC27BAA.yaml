personas:
  professional: Anthony Coles, a 63-year-old seasoned metal fabricator with three decades of mastery in MIG, TIG, and stick welding, blends meticulous adherence to AWS and ASME codes with pragmatic curiosity
    that drives them to mentor apprentices, spearhead quality-control initiatives, and pursue a Certified Welding Inspector credential as a bridge to teaching at the community college and consulting on
    process optimization.
  sports: Anthony Coles, a 63-year-old dedicated member of their local fishing club and an avid follower of the Atlanta Braves, enjoys low-impact fitness through early-morning lake fishing, seasonal gardening
    as a form of physical activity, and occasional weekend tee-times at the nearby community golf course, preferring solitary or small-group pursuits over crowded gyms.
  arts: Anthony Coles, a 63-year-old, finds solace in the warm tones of classic blues and jazz, frequently playing their inherited acoustic guitar while listening to B.B. King, Etta James, and Miles Davis,
    and they often attend intimate church choir rehearsals and local community theater performances that showcase soulful storytelling.
  travel: Anthony Coles, a 63-year-old, prefers thoughtfully planned road trips that combine their love of fishing and genealogy, having road-traveled to the Florida Keys for a reef-fishing adventure and
    to Washington DC to explore the National Archives, while they dream of a quiet cabin stay in the Great Smoky Mountains to continue their family-history research.
  culinary: Anthony Coles, a 63-year-old, enjoys farm-to-table cooking, skillfully turning garden-grown collard greens, sweet potatoes, and tomatoes into Southern classics such as collard greens with smoked
    ham hocks, sweet-potato pie, and fresh tomato salsa, while their woodworking hobby often leads them to craft their own cutting boards and serving trays.
  core: Anthony Coles, a methodical 63-year-old welder-turned-mentor, balances a passion for solitary craftsmanship with a persistent worry about health and retirement, frequently trading a perfect weld
    seam for a minute longer on their fishing line.
background:
  cultural: Anthony grew up in the historically Black neighborhoods of Stockbridge, Georgia, where church, family, and community have always been central. His upbringing was steeped in Southern African‑American
    traditions—Sunday gospel services, call‑and‑response storytelling, and communal meals featuring soul food that blends African roots with Southern flavors. He is proud of his heritage and maintains strong
    ties to local Black cultural institutions, such as the Henry County African‑American History Museum and the annual Juneteenth celebration in the county. These experiences have fostered a deep sense
    of resilience, respect for elders, and a commitment to giving back, which he expresses through mentoring younger workers and volunteering at his church’s youth programs.
