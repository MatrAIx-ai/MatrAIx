    copper, alloys)'', ''AWS and ASME code compliance'', ''Welding inspection and non‑destructive testing (NDT)'', ''Quality control and defect detection'', ''Equipment maintenance & troubleshooting'',
    ''Gas flow system calibration'', ''Small‑team leadership & apprentice mentorship'', ''Basic CAD for layout planning'']'
  hobbies: '[''Fishing at Lake McIntosh'', ''Woodworking (furniture making)'', ''Gardening (vegetable garden)'', ''Listening to blues, soul, and jazz music'', ''Playing acoustic guitar'', ''Church fellowship
    and community outreach'', ''Genealogy research'', ''Reading historical biographies'']'
  career_goals: Approaching retirement, Anthony aims to secure his legacy by obtaining a Certified Welding Inspector (CWI) credential and transitioning into a mentorship role at the local community college
    where he can teach the next generation of welders. He also hopes to start a small consulting service for regional manufacturing firms, offering expertise in welding process optimization and safety audits.
    On a personal level, he wants to achieve a smoother work‑life balance that reduces his stress, allowing more time for family and health. He envisions eventually scaling back his hands‑on welding to
    focus on occasional project work, such as restoring vintage metal furniture for community members.
