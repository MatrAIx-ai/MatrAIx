  career_goals: Beatriz aims to channel her curiosity and practicality into a career that blends technology with community impact. In the near term, she plans to deepen her programming knowledge, win a
    regional science‑fair, and take on leadership roles in her school's robotics club. Long‑term, she envisions becoming a software engineer or data analyst who builds tools that support small Latino businesses
    and improves access to bilingual educational resources. She is also drawn to the idea of integrating her love for Mexican cuisine with tech, perhaps developing an app that shares family recipes in an
    interactive format. Her competitive drive fuels her desire to earn scholarships for a top STEM university, where she can later launch a startup that fuses cultural heritage with innovative digital solutions.
