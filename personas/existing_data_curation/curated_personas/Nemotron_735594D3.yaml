personas:
  professional: Beatriz Flores, a budding game developer, channels their curiosity and practical problem‑solving into designing small Scratch games, where their competitive streak pushes them to refine
    mechanics while their relaxed approach lets them experiment without strict deadlines.
  sports: Beatriz Flores, a dedicated member of the Red Oak Youth Soccer Club who idolizes FC Dallas, hones footwork on the field with a competitive edge, while balancing weekly hikes on local trails to
    stay fit and occasionally joining pickup basketball games, illustrating a flexible yet disciplined approach to physical activity.
  arts: Beatriz Flores, an avid digital illustrator who draws bright folk motifs inspired by community festivals, frequently tunes into Billie Eilish and Taylor Swift for musical motivation while following
    DIY tutorials by LaurDIY and emulating the storytelling style of Studio Ghibli in their sketches, weaving together modern pop culture with traditional visual cues.
  travel: Beatriz Flores prefers spontaneous weekend getaways, having already explored the rolling hills of Texas Hill Country and the desert vistas of Big Bend with family, while dreaming of a future trip
    to Tokyo’s Akihabara district to experience its gaming culture, balancing limited allowance with parental support for educational travel.
  culinary: Beatriz Flores, an emerging home chef, deftly prepares tacos al pastor and hand‑rolled tamales each weekend, mastering the marination of pork with pineapple and achiote, while also experimenting
    with avocado‑lime salsa and churro‑style cinnamon sugar for family meals, showcasing both cultural roots and a playful curiosity in the kitchen.
  core: Beatriz Flores, a calm yet competitive 13‑year‑old, juggles soccer, Scratch coding, and vibrant digital art while habitually misplacing their expense ledger and thriving on spontaneous creativity.
background:
  cultural: Beatriz comes from a Mexican‑American family that maintains strong ties to its heritage while embracing the multicultural vibe of the Dallas‑Fort Worth area. Raised in a bilingual home, she
    speaks Spanish with grandparents and extended family, celebrating holidays such as Día de los Muertos, Cinco de Mayo, and Christmas with traditional foods, music, and storytelling. The community in
    Red Oak has a vibrant Hispanic presence, offering her opportunities to attend local cultural festivals, participate in folkloric dance workshops, and help with neighborhood events at the community center.
    Her family’s values emphasize close‑knit relationships, respect for elders, and the importance of education, all of which shape her outlook and daily life.
