  hobbies: '[''Oil Painting'', ''Watercolor Sketching'', ''Speculative Fiction Reading'', ''Creative Writing'', ''Photography'', ''Hiking'', ''Volunteer Mentoring for Adult Learners'', ''Book Club Participation'',
    ''Strategy Board Games'', ''Vegetable Gardening'']'
  career_goals: Driven by her curiosity and desire to make a lasting impact, Lourdes aspires to expand her tutoring practice into a community learning hub that blends arts-infused curricula with evidence-based
    instructional methods. She envisions developing a proprietary instructional framework that helps students connect abstract concepts through creative projects, eventually publishing a guidebook for educators.
    Pursuing a Master's in Educational Leadership, she aims to become a curriculum consultant for regional schools, advocating for inclusive, creativity-centered pedagogy. Long-term, she hopes to mentor
    emerging tutors, secure grant funding for after-school programs in Vandergrift, and achieve financial independence to support herself post-divorce while remaining deeply rooted in her community.
