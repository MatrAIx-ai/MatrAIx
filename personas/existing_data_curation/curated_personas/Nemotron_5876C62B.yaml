  hobbies: '[''K‑pop dance classes'', ''Salsa dancing'', ''Karaoke nights with friends'', ''Cooking Asian fusion dishes'', ''Hiking in the East Bay hills'', ''Yoga and fitness boot‑camps'', ''Reading contemporary
    romance novels'', ''Watching Korean dramas'', ''Volunteering at a community center'', ''Participating in cultural festivals'']'
  career_goals: Chunyi aims to secure a full‑time position as a community outreach specialist or event coordinator with a local non‑profit or municipal agency, leveraging her bilingual skills and talent
    for connecting people. Over the next few years she plans to earn a certification in community health or social services to deepen her expertise. She hopes to lead larger public‑education programs and,
    eventually, launch her own community kitchen that offers cooking workshops and cultural events celebrating East Asian heritage while providing a stable income and flexible schedule.
