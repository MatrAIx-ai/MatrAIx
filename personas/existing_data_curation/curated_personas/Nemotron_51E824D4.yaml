personas:
  professional: Dev Lewis, an aspiring data analyst who combines Python scripting, Excel visualizations, and a gamer‑honed strategic mindset, thrives in entry‑level roles that demand clear processes while
    quietly plotting a future freelance consulting practice for small businesses.
  sports: Dev Lewis, a weightlifting enthusiast and weekend hiker, follows the regional basketball squad the Metro City Titans and the national cricket side the River City Strikers, balancing his competitive
    spirit on the gym floor with casual viewings of televised matches for strategic insight.
  arts: Dev Lewis, an avid street photographer inspired by Henri Cartier‑Bresson and contemporary visual storyteller Murad Osmann, captures candid city moments during his hikes while also enjoying the experimental
    jazz of Kamasi Washington and the cinematic storytelling of director Christopher Nolan.
  travel: Dev Lewis prefers spontaneous, budget‑friendly road trips to nearby mountain trails and weekend festivals, yet he dreams of visiting Kyoto for its cherry blossoms, the Scottish Highlands for rugged
    hikes, and a food‑truck market in Medellín to sample global street cuisines.
  culinary: Dev Lewis experiments with modern twists on classic family recipes, mastering spice‑rich lentil stews, aromatic rice pilafs, and fluffy flatbreads topped with inventive fillings, and he often
    showcases his creations at local pop‑up events during his free evenings.
  core: Dev Lewis blends a competitive gamer’s precision with a laid‑back approach to structure, turning data puzzles into actionable insights while juggling spontaneous cooking experiments, impromptu hikes,
    and a steady stream of tech projects.
background:
  cultural: Dev comes from a South Asian Muslim family that immigrated to the United States in the early 2000s. Raised in the Midwest, he grew up speaking English and Urdu, celebrating Eid al‑Fitr and Diwali
    with his extended family. The household emphasized academic achievement, community responsibility, and respect for cultural traditions, shaping his practical mindset. While he embraces Bloomington’s
    diverse college atmosphere, he stays connected to his heritage through events at the local Islamic Center, volunteering at cultural festivals, and sharing traditional recipes with friends.
