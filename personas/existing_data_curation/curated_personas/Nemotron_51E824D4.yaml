  career_goals: Dev aims to complete a bachelor’s degree in Information Systems and earn industry certifications such as CompTIA Network+ and Google Data Analytics. In the short term, he seeks an entry‑level
    data analyst position that offers clear processes and measurable outcomes. Long term, he plans to launch a freelance consulting service helping small businesses use data to improve operations, while
    also developing a side venture that offers modern South Asian street food at local events. His plan balances a structured career path with the flexibility to pursue entrepreneurial projects.
