  career_goals: Jeffrey aims to re‑enter the education field as a part‑time community education coordinator for Allentown Parks and Recreation, where he can design and lead adult literacy and lifelong‑learning
    programs. He also hopes to volunteer as a mentor for newly certified teachers, contribute to local non‑profits that focus on after‑school enrichment, and eventually launch a small nonprofit that provides
    structured tutoring and enrichment workshops for underserved families in Lehigh County.
