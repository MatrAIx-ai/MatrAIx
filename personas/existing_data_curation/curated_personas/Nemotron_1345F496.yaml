  hobbies: '[''Painting'', ''Ceramic art'', ''Cooking Mexican cuisine'', ''Gardening'', ''Reading historical novels'', ''Walking nature trails'', ''Volunteering at community events'', ''Attending cultural
    festivals'', ''Sketching abstract concepts'', ''Journaling'']'
  career_goals: Paola aims to transition from day‑to‑day material moving to a supervisory or safety‑trainer role within the next two years, where she can share her expertise in safe operations and foster
    a supportive work culture. She also hopes to obtain a certification in occupational health and safety and eventually lead a small community art program that combines her logistics skills with her love
    for creativity, giving local seniors and youth a space to explore painting, ceramics, and other crafts. Long‑term, she envisions a modest home‑based business selling hand‑painted tiles and decorative
    pieces inspired by Mexican motifs, allowing her to honor her heritage while staying active in the community.
