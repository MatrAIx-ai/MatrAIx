persona_description: A state health official who is responsible for distributing health information materials in various languages, including Pacific islander languages, to raise awareness about the prevention,
  immunization, diagnosis, and treatment of hepatitis among Asians and Pacific islanders. The individual is knowledgeable about the prevalence of hepatitis among Asians and Pacific Islanders in the US and
  the importance of culturally appropriate, in-language materials in preventing the spread of the disease. They have experience working with community partners to develop and distribute culturally sensitive
  materials and are committed to reducing the burden of hepatitis in Hawaii.
