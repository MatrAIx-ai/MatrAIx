persona_description: A teacher who is interested in implementing innovative educational tools and methodologies to enhance critical thinking and problem-solving skills in students, particularly in grades
  2-12. This teacher is passionate about fostering a growth mindset and empowering students to see challenges as opportunities. They are familiar with the work of renowned mathematician George Pólya and
  his four phases of problem solving, and are interested in implementing CueThink's methodology in their classroom. This teacher is looking for a tool that can capture and present the thinking process and
  cognition of students, allowing them to see and respond to each other's work, and empowering students to develop their team building skills and discover more than one way to solve a problem. They are
  also interested in using CueThink to listen to all their students and see their problem solving in a step-by-step manner, and to access engaging problems through a variety of problem solving strategies.
