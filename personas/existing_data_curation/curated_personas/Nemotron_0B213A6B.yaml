personas:
  professional: Marion Farmer, a retired community volunteer who thrives on the predictable rhythm of weekly church potlucks and garden harvests, uses their practical budgeting skills and gentle, cooperative
    nature to mentor younger neighbors in traditional cooking, quilting, and oral storytelling.
  sports: Marion Farmer stays active with daily walks around Riverbanks Zoo and Garden, enjoys cheering on the Columbia Fireflies during summer evenings, and follows the South Carolina Gamecocks football
    season from the comfort of their porch.
  arts: Marion Farmer weaves narratives into quilts while listening to Mahalia Jackson’s gospel hymns, finds inspiration in James Baldwin’s soulful novels, and appreciates the classic blues of B.B. King
    during quiet afternoons.
  travel: Marion Farmer prefers low‑key, well‑planned road trips, often driving to family reunions in Savannah and making occasional pilgrimages to Washington, D.C.’s National Museum of American History
    to deepen their love of the past, while dreaming of a gentle river cruise down the Mississippi.
  culinary: Marion Farmer delights in preparing soulful Southern dishes such as collard greens simmered with smoked turkey, shrimp and grits enriched with garden‑fresh corn, and sweet‑potato pie spiced
    with nutmeg, while modestly sharing these meals at community potlucks and family gatherings.
  core: Marion Farmer is a steadfast steward of community traditions, blending quiet garden mornings, heartfelt quilting, and disciplined budgeting into a life anchored by faith, family, and a love for
    soulful Southern cooking.
background:
  cultural: Marion Ruth Farmer is a lifelong resident of Columbia, South Carolina, and identifies as African‑American. She grew up during the civil‑rights era, witnessing the transformation of her community
    and participating in church‑based activism. Her family heritage traces back to the Gullah‑Geechee traditions of the Lowcountry, reflected in her love for soul food, storytelling, and communal gatherings.
    The Baptist church has been a central pillar in her life, offering both spiritual guidance and a network for service. Marion’s cultural identity is expressed through her cooking, which blends Southern
    comfort dishes with African‑American culinary traditions, and through her participation in local Juneteenth celebrations, church choirs, and neighborhood potlucks. She values intergenerational ties,
    preserving family histories, and contributing to the continuity of her community’s cultural legacy.
attributes:
  skills: '[''Home cooking (Southern and soul food)'', ''Vegetable gardening'', ''Knitting, crocheting, and quilting'', ''Oral storytelling and family history preservation'', ''Household budgeting and financial
