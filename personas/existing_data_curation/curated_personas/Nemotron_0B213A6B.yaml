  hobbies: '[''Gardening'', ''Reading historical fiction and biographies'', ''Knitting and quilting'', ''Listening to gospel music'', ''Walking in Riverbanks Zoo and Garden'', ''Small book club meetings'',
    ''Genealogical research'', ''Video chatting with grandchildren'']'
  career_goals: Although retired, Marion seeks to remain a supportive pillar in her community. She hopes to mentor younger women in traditional cooking and craft techniques, pass on her cherished recipe
    collection, and contribute to a community oral‑history project documenting the experiences of African‑American elders in Columbia. She also aspires to learn to use digital tools for video calling and
    photo sharing so she can stay connected with her grandchildren and preserve family moments. Maintaining good health through daily walks, regular medical check‑ups, and a balanced diet is a priority,
    as is continuing her volunteer work at the local food pantry.
