  career_goals: Michele aims to complete her GED within the next year and pursue a vocational certification, such as becoming a Certified Nursing Assistant or enrolling in a hospitality management program
    at a community college. She seeks a stable, people‑focused job that offers a predictable routine and opportunities for social interaction, like working in a local restaurant, hotel front desk, or as
    a community center aide. In the longer term, she hopes to leverage her sociable nature to coordinate regular community events or youth programs, providing both personal fulfillment and financial independence
    while staying connected to her hometown.
