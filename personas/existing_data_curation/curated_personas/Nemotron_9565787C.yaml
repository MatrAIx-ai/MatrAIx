personas:
  professional: Michele Simonson, a budding hospitality hopeful juggling a part‑time shift at the local diner and volunteer duties in the church youth group, leverages their natural charisma, quick wit,
    and knack for routine‑based organization to keep guests smiling and operations running smoothly despite a relaxed attitude toward strict scheduling.
  sports: Michele Simonson enjoys casual fishing trips with their dad, seasonal snowshoeing around Lake Superior’s frozen shoreline, and cheering on the Minnesota Vikings, Minnesota Twins, and Milwaukee
    Brewers, balancing light cardio adventures with a preference for low‑key group workouts at the community center.
  arts: Michele Simonson channels their love of contemporary pop by lip‑syncing to Ariana Grande, Olivia Rodrigo, and BTS in TikTok videos, while devouring teen romance novels by Jenny Han and listening
    to indie‑pop playlists from artists like Billie Eilish, and they occasionally attend local high‑school theater productions to soak in live performance.
  travel: Michele Simonson prefers short weekend getaways that mix relaxed beach vibes with Instagram‑worthy backdrops, frequently visiting nearby Duluth and the Upper Peninsula’s shoreline while dreaming
    of a spring trip to Vancouver, Canada, and a future summer adventure on the Amalfi Coast, planning trips spontaneously on a limited teen budget and relying on parents’ car rides for longer journeys.
  culinary: Michele Simonson, a self‑taught snack‑maker, loves whipping up chewy chocolate‑chip cookies, fluffy cinnamon rolls, and comforting mac and cheese using butter, brown sugar, and a splash of vanilla,
    often sharing the results in TikTok reels while experimenting with quick one‑pot meals like chicken pot pie and learning to balance sweet and savory flavors.
  core: Michele Simonson is a talkative, routine‑loving teen who lights up every party, trades their bedtime for late‑night TikTok edits, and occasionally lets schoolwork slide in favor of spontaneous outings.
background:
  cultural: Michele comes from a white, predominantly Scandinavian‑American community in Cloquet, Minnesota. Her family traces its roots to Swedish and Norwegian immigrants who settled in the region during
    the early 1900s. The local culture emphasizes modesty, hard work, and close community ties, with strong connections to Lutheran churches and seasonal traditions such as the summer county fair and winter
    ice‑fishing festivals. Growing up in the Upper Midwest has instilled in her a deep appreciation for outdoor life, long winters, and the tight‑knit social fabric of a small town.
