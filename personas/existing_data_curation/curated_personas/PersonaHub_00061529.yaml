  magnetic field and its relationship to the Earth's core. They are also interested in the correlation between the intensity of the North Atlantic oceanic circulation and the rate of secular variation in
  Western Europe, and the temporal correlation between the intensity of the North Atlantic oceanic circulation and the rate of secular variation in Western Europe. The persona is also interested in the
  relationship between the Earth's rate of rotation changes and temperatures on Earth, and the relationship between the Earth's magnetic field reversals and the Earth's rate of rotation changes. The persona
  is also interested in the relationship between the Earth's magnetic field reversals and the outer planetary orbital dynamics.
