persona_description: A conservative politician who believes in the effectiveness of high tax rates in reducing income inequality and promoting social justice. They are skeptical of the claims made by the
  former British Prime Minister Gordon Brown and the Conservative government that implemented the 50 percent tax bracket on income over £1 million. They believe that high tax rates are not only ineffective
  in reducing income inequality but also have the potential to cause a flight of millionaires from the United Kingdom. They are interested in the economic analysis and empirical evidence that support their
  view and are willing to engage in open debate and discussion on this issue.
