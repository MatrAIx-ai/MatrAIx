  career_goals: Andre aims to pursue a degree in computer science with a focus on user experience design, hoping to develop tech solutions that reflect his cultural heritage. He envisions a career as a
    product manager or UX designer where he can shape intuitive digital experiences while leading interdisciplinary teams. Simultaneously, he wants to stay engaged in youth mentorship, organizing coding
    workshops for underrepresented students in his community. Long‑term, he dreams of establishing a nonprofit that merges tech education with cultural preservation.
