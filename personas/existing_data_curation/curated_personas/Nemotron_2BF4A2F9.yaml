personas:
  professional: Andre Ceballos, a 14‑year‑old aspiring technologist and digital creator, blends methodical problem‑solving from strategy games with a sociable flair to produce structured YouTube tutorials
    on robotics and digital art, delivering content that reflects both precise planning and crowd‑engaging charisma.
  sports: Andre Ceballos, a dedicated midfielder for the local youth soccer club, drills after school on weekends, cheers on the MLS side LA Galaxy and follows the English Premier League team Manchester
    City, while also channeling competitive energy into League of Legends e‑sports leagues.
  arts: Andre Ceballos, an enthusiastic guitarist who practices classic rock riffs from Jimi Hendrix and modern pop chords from Ed Sheeran, participates in traditional folk dance workshops, draws digital
    art inspired by Beeple’s vibrant style, and curates a YouTube channel that frequently references creators like Mark Rober and Simone Giertz for robotics inspiration.
  travel: Andre Ceballos prefers family‑planned road trips that balance sightseeing with gaming breaks, has explored the Grand Canyon on a school field trip, dreams of visiting Tokyo’s Akihabara district
    to experience cutting‑edge robotics exhibitions, and eagerly anticipates a future summer camp in the Sierra Nevada where they can combine hiking with cultural dance workshops.
  culinary: Andre Ceballos enjoys customizing pepperoni pizza with extra mozzarella, whipping up quick chicken quesadillas flavored with cilantro and jalapeño, and experimenting with homemade sushi rolls
    featuring avocado and cucumber, all while proudly showcasing a modest but growing skill set in the kitchen.
  core: Andre Ceballos, a 14‑year‑old who balances methodical gaming strategy with lively social creativity, never misses a soccer practice, guards a meticulously kept allowance spreadsheet, and can be
    found tinkering with robotics while humming guitar chords during breaks.
background:
  cultural: Andre comes from a mixed Latin American and Indigenous background, with his family tracing its roots to the Mixtec people of Oaxaca, Mexico. Growing up in San Jose, he speaks English at school
    and Spanish at home, and his grandparents occasionally share Mixtec phrases and stories, fostering a sense of cultural pride. He participates in local Día de los Muertos celebrations and traditional
    dance workshops, and his family maintains culinary traditions like making tamales and mole. This bicultural upbringing shapes his values of family solidarity, community involvement, and respect for
    cultural heritage, influencing his desire to blend technology with cultural storytelling.
