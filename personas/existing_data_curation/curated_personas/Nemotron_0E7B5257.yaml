  hobbies: '[''Community basketball league'', ''Karaoke nights'', ''Acoustic guitar playing'', ''Woodworking'', ''Fishing'', ''Hiking'', ''Volunteering at Woodford County Fair'', ''Cooking and sharing recipes
    on social media'', ''Following Chicago Cubs'']'
  career_goals: Raul aims to re-enter the workforce in a role that leverages his strong people skills and love for organized, community-focused activities. He is targeting positions such as community outreach
    coordinator, hospitality manager, or sales representative for a local business. In the next three years, he plans to complete an associate degree in Business Administration or Hospitality Management
    at a nearby community college, obtain certification in event planning, and eventually launch his own small event-planning service that caters to regional festivals and private gatherings. He seeks a
    stable, predictable work schedule that still allows frequent interaction with people and opportunities for advancement.
