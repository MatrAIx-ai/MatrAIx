persona_description: A Project Manager who is familiar with traditional performance measurements for projects, including OTOB (On-Time, On-Budget, and Relative to Plan), and is looking for ways to improve
  their project management practices. They are interested in modern Project methods and techniques, and want to learn about the latest Prince2 manual (2009) and its suggestions for controlling the 7 aspects
  of performance (Time, Cost, Scope, Quality, Risk, Benefits). They want to understand how to break down Cost into Financial and Effort, and how to control Effort more effectively. They also want to learn
  about the latest Agile methods and how to control scope more effectively. They are interested in understanding the concepts and techniques of Quality planning and control, and want to learn about the
  Prince2 product based planning technique. They want to understand the importance of regular risk analysis and how to mitigate risks, and want to learn about the benefits of regular estimates.
