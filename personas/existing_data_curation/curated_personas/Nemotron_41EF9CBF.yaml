personas:
  professional: Juana Seda is a veteran radio and telecommunications technician with more than three decades of experience installing, maintaining, and repairing broadcast equipment, whose innate curiosity
    and talkative, sociable nature turn complex RF schematics into engaging lessons for apprentices while they handle on‑site emergencies with calm improvisation despite a relaxed approach to scheduling.
  sports: Juana Seda spends Saturday mornings hiking the Sonoran Desert with the Desert Trail Walkers, follows the Arizona Diamondbacks with spirited tailgate gatherings, and regularly joins a community
    pickleball league, treating these activities as both exercise and social events they cherish.
  arts: Juana Seda paints vibrant folk‑style murals inspired by the colors of Día de los Muertos and the daring brushwork of Frida Kahlo, dances in a folklorico troupe to the rhythms of classic boleros
    and modern indie artists like Lila Downs, and curates their bilingual radio show with classics such as Chavela Vargas alongside emerging bands like The Strokes, weaving artistic tradition into everyday
    life.
  travel: Juana Seda prefers spontaneous road trips, often loading the family SUV with a cooler and heading from the Sonoran desert to the red rocks of Sedona or the historic plazas of Santa Fe, while dreaming
    of a pilgrimage to the colonial streets of Oaxaca and the vineyards of Napa Valley, balancing a modest retirement budget with occasional splurges on boutique B&Bs.
  culinary: Juana Seda is an adept home chef who meticulously crafts mole using roasted ancho chilies, dark chocolate, and a blend of spices, rolls tamales with masa and pork shoulder for community potlucks,
    and whips up fresh salsa with hand‑picked tomatoes, jalapeños, and cilantro, though on days when their succulent garden demands attention they opt for quick street‑taco take‑out.
  core: Juana Seda blends three decades of radio engineering expertise with a love for desert hikes, bold mural painting, and relentless storytelling, all while juggling a habit of misplacing receipts and
    an unstoppable urge to chat up anyone within earshot.
background:
  cultural: Juana was born to Mexican parents who immigrated to Arizona in the 1970s. Growing up in a bilingual household, she retained strong ties to Mexican traditions, celebrating Día de los Muertos,
    quinceañeras, and festive holidays with family. She incorporated the rich culinary, musical, and artistic heritage of Mexico into her daily life while also embracing the Southwestern desert culture
    of Arizona. Her fluency in Spanish and English allows her to bridge cultural gaps, particularly in her work with a diverse clientele and in her community‑radio programming, which highlights Mexican
    folk music alongside contemporary local artists. Family, community, and a blend of Mexican and desert Southwest identities shape her worldview.
attributes:
  skills: '[''RF system installation'', ''Antenna alignment'', ''Telecommunications equipment repair'', ''Fiber optic splicing'', ''Technical troubleshooting'', ''Interpretation of schematics'', ''FCC compliance'',
    ''Safety and OSHA standards'', ''Customer communication'', ''Team training and mentorship'']'
  hobbies: '[''Community radio hosting'', ''Folklorico dancing'', ''Mural painting'', ''Desert hiking'', ''Succulent gardening'', ''Traditional Mexican cooking'', ''Art exhibit attendance'', ''Tech trend
    reading'', ''Volunteer Spanish mentorship'']'
  career_goals: Juana aspires to become a senior‑level technician and eventually a service manager overseeing a small team of installers and repair specialists. She plans to earn a Certified Fiber Optic
    Technician (CFOT) credential and pursue additional certifications in RF engineering. Long‑term, she hopes to launch a boutique consulting firm that provides technical support for community radio stations
    and helps local artists integrate technology into their work. Mentoring younger women, especially those from Mexican‑American backgrounds, to enter the telecommunications field is a personal ambition
    she is eager to pursue.
