  career_goals: Robin dreams of exploring many careers as she grows, with a particular fascination for roles that combine creativity, learning, and helping others. She envisions becoming a teacher one day,
    inspired by her love for group activities and the joy of sharing knowledge with classmates. At the same time, her appreciation for art fuels an ambition to be an artist or illustrator, while her curiosity
    about nature sparks interest in becoming a scientist or environmental explorer. Ultimately, she aspires to a future where she can inspire curiosity in others, whether in a classroom, a studio, or the
    outdoors.
