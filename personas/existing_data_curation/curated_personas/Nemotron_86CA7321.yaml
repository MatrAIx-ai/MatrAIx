personas:
  professional: Robin White, an imaginative junior scientist who blends a love for sketching wildlife with LEGO engineering to create simple circuit projects for school science fairs, eagerly collaborates
    with classmates and demonstrates a knack for turning curiosity into hands‑on experiments.
  sports: Robin White, an avid fan of the Milwaukee Brewers and Green Bay Packers, plays on the Wausau Youth Soccer Club and participates in the local Little League baseball team, while also embracing seasonal
    snowshoe outings with the community winter sports group, bringing boundless energy to every game and playground tag session.
  arts: Robin White, a budding illustrator who fills sketchbooks with forest scenes inspired by Claude Monet’s water lilies and animal portraits reminiscent of Beatrix Potter, attends library art workshops,
    and sings along to the playful tunes of They Might Be Giants during music class, letting creative imagination color everyday life.
  travel: Robin White, an enthusiastic traveler who treasures family road trips to the North Shore of Lake Superior and summer visits to Door County, and dreams of exploring Yellowstone National Park and
    the Eiffel Tower in Paris, always sketching sticky‑note itineraries and pack‑list reminders before each adventure.
  culinary: Robin White, a self‑proclaimed foodie who swaps leftover cheese curds for extra cheese on their homemade mac and cheese, delights in buttery tarts at the county fair, and loves sprinkling fresh
    blueberries on fluffy pancakes for weekend brunch with family.
  core: Robin White, a curious, nature‑loving 7‑year‑old who balances imaginative LEGO inventions with sketching forests, saves pennies for big toys, and radiates endless energy in school and community
    play, albeit sometimes forgetting homework until the last minute.
background:
  cultural: Robin is raised in a predominantly White, Midwestern family in Wausau, Wisconsin, where community values and a connection to nature are emphasized. Her family likely includes German and Scandinavian
    roots common in the region, celebrating local customs such as county fairs, winter festivals, and strong community involvement through the library and school events. She experiences the rhythms of a
    small-town life, including seasonal activities like snowshoeing in winter and lake swimming in summer, while also being exposed to broader American cultural traditions such as Thanksgiving, Halloween,
    and Christmas.
