  hobbies: '[''Visiting museums and galleries'', ''Watercolor painting'', ''Street photography'', ''Reading philosophical and art literature'', ''Traveling to cultural landmarks'', ''Gardening'', ''Cooking
    international cuisines'', ''Playing chess'', ''Volunteering at a community art center'', ''Listening to jazz and classical music'', ''Mindfulness meditation'']'
  career_goals: Although retired, Calvin aims to leverage his business expertise to mentor emerging entrepreneurs, particularly those in creative fields, through informal workshops at his local community
    center. He also wishes to curate a small traveling art exhibit that blends business insights with artistic expression, showcasing works from regional artists. Managing his anxiety is a personal ambition,
    so he plans to incorporate mindfulness practices into his daily routine and to write a reflective memoir that explores the intersection of business, art, and emotional resilience. Flexibility remains
    key, so he prefers low‑commitment, project‑based engagements rather than formal employment.
