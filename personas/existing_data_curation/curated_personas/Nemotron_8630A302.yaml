personas:
  professional: Michael Oneal is a budding junior engineer who spends their days meticulously assembling LEGO structures; they channel their love of predictability and practical problem‑solving into play,
    and often challenge their peers in friendly build‑off competitions.
  sports: Michael Oneal is a member of the Little Lions Soccer Club, delights in structured spring soccer drills, cheerfully mimics the moves of their favorite professional player Lionel Messi, and proudly
    wears a cap of the Chicago Cubs whenever they watch games on family TV.
  arts: Michael Oneal is an enthusiastic mini‑artist who spends their afternoons drawing vibrant crayon pictures of Van Gogh’s 'Starry Night'; they sing along to Raffi’s 'Baby Beluga' and eagerly watch
    classic animated shorts by Disney, all of which shape their imaginative play.
  travel: Michael Oneal is an inquisitive toddler who loves short road trips to familiar places like the nearby aquarium and the family’s weekend cabin in the mountains; they also dream of a future visit
    to Disneyland Paris after hearing about the magical castle on a bedtime story.
  culinary: Michael Oneal is a picky yet adventurous eater who prefers plain macaroni‑and‑cheese, apple slices, and peanut butter‑jelly sandwiches; they enjoy helping stir batter for banana pancakes with
    a plastic spoon and insist on the exact amount of honey drizzle their mother adds to their toast.
  core: Michael Oneal is a structure‑loving, competitively spirited three‑year‑old; they balance meticulous play with occasional impulsive snack cravings and a habit of color‑coding their toys.
background:
  cultural: Michael grows up in a middle‑class white household in St. Louis County, Missouri, a region known for its Midwestern values of practicality, modesty, and a strong sense of community. His family
    observes traditional American holidays such as Thanksgiving, Independence Day, and Christmas, often incorporating local customs like attending Cardinals baseball games or visiting the Missouri Botanical
    Garden. English is his primary language, and he is exposed to a blend of urban and suburban cultural influences, including the city’s blues music heritage and the region’s emphasis on education and
    self‑reliance. The neighborhood’s diverse background provides him with occasional exposure to other cultures, though his immediate cultural environment remains rooted in typical Midwestern white family
    traditions.
