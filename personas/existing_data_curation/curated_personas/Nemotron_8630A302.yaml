  career_goals: Michael’s curiosity about how things work fuels an early aspiration to become a builder or engineer when he grows up. He enjoys watching construction trucks and loves assembling block structures,
    imagining himself designing bridges or skyscrapers. He also expresses a desire to help others, saying he wants to be a firefighter or a teacher someday, reflecting his competitive drive and practical
    mindset. Although still a toddler, these ambitions are guided by his love for order, problem‑solving, and tangible outcomes.
