  career_goals: Autumn aims to advance to a senior portfolio manager role where she can shape the firm’s ESG investment strategy and champion innovative, culture‑focused asset classes. She plans to earn
    the CFA charter, deepen her expertise in sustainable finance, and eventually move into a chief investment officer position. Additionally, she is passionate about mentoring women entering finance and
    hopes to spearhead a community outreach program that blends financial literacy with arts education.
