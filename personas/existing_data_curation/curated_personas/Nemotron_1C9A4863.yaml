personas:
  professional: Autumn Ruiz, a seasoned financial analyst at a mid‑size investment firm in Coral Springs, leverages their quantitative modeling expertise and charismatic communication to translate macro‑economic
    trends into ESG‑focused portfolio strategies, while mentoring junior analysts and championing gender diversity in finance.
  sports: Autumn Ruiz stays active by playing in a co‑ed beach volleyball league during summer, cheering on the Miami Heat and Tampa Bay Buccaneers, and joining a local running club that meets for sunrise
    jogs along the Intracoastal Waterway, though they sometimes skip workouts when a client presentation looms.
  arts: Autumn Ruiz curates a personal photography collection inspired by the vibrant street art of Wynwood, attends exhibitions featuring works by Banksy and Georgia O’Keeffe, volunteers at a neighborhood
    theater where they rehearse scenes from Hamilton, and finds solace in listening to the soulful rhythms of Celia Cruz and the contemporary jazz of Kamasi Washington.
  travel: Autumn Ruiz prefers meticulously planned cultural trips, having explored the Semana Grande festival in Antigua, the music scene in New Orleans, and a Caribbean cruise to St. Lucia, while future
    bucket‑list destinations include Barcelona’s La Sagrada Familia and the Japanese tea gardens of Kyoto, though family obligations often limit trips to a long weekend.
  culinary: Autumn Ruiz enjoys experimenting with international flavors, frequently preparing dishes like Peruvian ceviche, Spanish paella with saffron, and Jamaican jerk chicken, all while sourcing fresh
    mangoes and avocados from local farmers’ markets and pairing meals with a glass of crisp Albariño.
  core: Autumn Ruiz blends analytical rigor with artistic flair, turning boardroom data into vibrant stories, indulging in spontaneous salsa nights, and occasionally hoarding vintage Polaroid film for their
    ever‑growing photo archive.
background:
  cultural: Autumn grew up in a suburban middle‑class family of European descent in the Sun Belt, where a strong emphasis on education and professional achievement was balanced by a love of outdoor life
    and community gatherings. Relocating to Coral Springs, Florida, she absorbed the region’s multicultural flavor—especially the vibrant Latin and Caribbean influences that permeate South Florida’s food,
    music, and art scenes. This blend of traditional American values and the eclectic cultural tapestry of her adopted home fuels her appreciation for diverse perspectives, her willingness to explore unconventional
    ideas, and her commitment to bridging finance with creative expression.
