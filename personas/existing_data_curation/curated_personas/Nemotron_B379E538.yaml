personas:
  professional: Miguel, age 24, is a meticulous model maker in a Bay Area high‑tech manufacturing firm, leveraging SolidWorks, Fusion 360, and CNC machining to turn precise CAD designs into functional prototypes
    while acting as a collaborative bridge between design engineers and production staff, reflecting their methodical planning and outgoing teamwork style.
  sports: Miguel, age 24, plays midfielder in a local community soccer league, hikes the Santa Cruz Mountains each weekend, and they avidly support the San Jose Earthquakes, the San Francisco Giants, and
    the Golden State Warriors, blending a love for team sports, outdoor adventure, and Bay Area team loyalty.
  arts: Miguel, age 24, channels creative energy through guitar jam sessions that often feature classics by Santana, the modern indie vibes of Tame Impala, and traditional Latin rhythms, while also displaying
    intricately 3D‑printed scale models at maker fairs, and they draw inspiration from the surreal visual style of H.R. Giger.
  travel: Miguel, age 24, prefers meticulously planner‑driven weekend getaways, regularly trekking in Yosemite National Park and exploring the historic streets of San Miguel de Allende, and they dream of
    a future road trip across European automotive museums in Stuttgart and Turin, balancing adventure with a modest travel budget.
  culinary: Miguel, age 24, loves cooking traditional Mexican dishes such as pozole, cochinita pibil, and chiles en nogada, frequently experimenting by fusing them with California ingredients like avocado,
    smoked chipotle, and fresh cilantro, and proudly serves these creations at friends’ gatherings, though they sometimes over‑season with too much chili powder.
  core: Miguel, 24, fuses methodical engineering precision with a vibrant passion for music, cooking, and community, yet they occasionally lose track of sleep after late‑night model‑building marathons.
background:
  cultural: Miguel grew up in a Mexican immigrant family in San Jose, speaking both Spanish and English at home. His upbringing emphasized strong family ties, respect for tradition, and the communal spirit
    of Mexican celebrations like Día de los Muertos, Cinco de Mayo, and Christmas posadas. He attends a local Catholic church and participates in volunteer activities that serve the Latino community. While
    firmly rooted in his Mexican heritage—evident in his love for Mexican cuisine, music, and soccer—Miguel also embraces the innovative, fast‑paced culture of Silicon Valley. This dual identity influences
    his work, blending a reverence for craftsmanship and detail common in Mexican artisan traditions with the cutting‑edge technologies and collaborative mindset of the Bay Area tech scene.
attributes:
  skills: '[''CAD (SolidWorks, Fusion 360, AutoCAD)'', ''CNC machining'', ''3D printing'', ''Technical drawing and blueprint reading'', ''Pattern making for metal and plastic'', ''Material selection and
    specification compliance'', ''Quality assurance and inspection'', ''Project planning and time management'', ''Team collaboration and communication'', ''Basic Python scripting for automation'']'
  hobbies: '[''Playing soccer in a community league'', ''Hiking in the Santa Cruz Mountains'', ''Attending tech meetups and maker fairs'', ''3D printing personal projects'', ''Scale model building of cars
    and aircraft'', ''Cooking traditional Mexican dishes and fusion recipes'', ''Playing guitar and joining music jam sessions'', ''Volunteering at youth robotics workshops'', ''Participating in trivia
    nights and community events'', ''Celebrating Día de los Muertos and other Mexican cultural festivals'']'
  career_goals: Miguel aims to advance to a senior model‑maker role within a high‑tech manufacturing company in the Bay Area, eventually leading a multidisciplinary prototype development team. He plans
    to earn certifications such as Certified SolidWorks Professional and CNC Machining Specialist, while completing his incomplete mechanical engineering coursework through a part‑time program. In the longer
    term, Miguel envisions launching his own boutique prototyping studio focused on sustainable, low‑cost metal and plastic solutions for startups. He also hopes to mentor emerging makers, especially within
    the local Latino community, and to contribute to innovative projects in aerospace or automotive sectors that blend precision engineering with eco‑friendly materials.
