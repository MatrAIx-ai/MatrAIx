    to culturally rich destinations'', ''Photography'']'
  career_goals: Sheila aims to progress into senior operational leadership, targeting roles such as Operations Manager or Director of Business Operations within a mid‑size company or nonprofit focused on
    cultural and creative industries. She plans to deepen her strategic impact by leading digital transformation initiatives that streamline workflows and embed sustainability practices. Pursuing an MBA
    or a specialized certificate in Change Management is on her roadmap to broaden her business acumen. Long‑term, she envisions establishing a consultancy that helps arts organizations and community programs
    achieve operational efficiency while preserving their creative mission, all while maintaining a healthy work‑life balance that respects her need for both collaboration and personal recharge.
