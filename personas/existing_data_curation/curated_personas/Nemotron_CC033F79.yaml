personas:
  professional: Sheila Fellows, a 38‑year‑old operations specialist, leverages her analytical acumen and design‑thinking flair to streamline processes at a mid‑size cultural nonprofit, using NetSuite and
    Tableau while fostering collaborative, low‑conflict team dynamics that reflect her harmony‑driven personality.
  sports: Sheila Fellows, an avid hiker of the Blue Ridge foothills, is a season ticket holder of the Charlotte Hornets, follows the Carolina Panthers, plays recreational tennis at a local club, and joins
    a weekend adult soccer league to stay fit.
  arts: Sheila Fellows fuels her creative soul by painting plein‑air scenes of Freedom Park, volunteering on community mural projects, and drawing inspiration from artists like Georgia O'Keeffe, Kehinde
    Wiley, and the contemporary painter Amy Sherald, while regularly attending Charlotte Symphony concerts and the local book club reading contemporary fiction such as Zadie Smith.
  travel: Sheila Fellows satisfies her wanderlust through curated art‑focused trips to Barcelona’s Picasso Museum, Kyoto’s temple gardens, and New Orleans’ jazz festivals, while also sneaking in spontaneous
    weekend getaways to Asheville’s craft breweries, all planned on a tight schedule that balances work commitments and family gatherings.
  culinary: Sheila Fellows enjoys experimenting with Southern‑inspired cuisine, cooking shrimp and grits enlivened with miso and smoked paprika for friends, mastering Korean bibimbap with gochujang, and
    perfecting a roux‑based gumbo, while their cooking skill sits at an enthusiastic intermediate level.
  core: Sheila Fellows blends analytical precision with artistic curiosity, orchestrating operational efficiency at cultural nonprofits while juggling yoga, mural volunteering, and a love for Southern‑fusion
    dishes, even if they sometimes procrastinate budgeting and skip dentist appointments.
background:
  cultural: Sheila grew up in the suburban neighborhoods of Charlotte, North Carolina, within a predominantly white, middle‑class Southern environment that valued community, hospitality, and a strong work
    ethic. Her family emphasized the importance of education and civic involvement, encouraging participation in local festivals, church gatherings, and volunteer service. While she identifies culturally
    as White American, her appreciation for the region’s diverse heritage—particularly the vibrant African‑American music scene, Latino culinary influences, and burgeoning arts community—has shaped a nuanced,
    inclusive worldview. Her humanities degree from UNC Chapel Hill deepened her exposure to global literature, philosophy, and visual arts, fostering a lifelong curiosity that blends Southern traditions
    with a broader, globally aware perspective.
