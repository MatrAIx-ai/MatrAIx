  Best Generated Conversation: 'User 1: My best friend lives in Japan.

    User 2: Cool! Do you guys talk often?

    User 1: Yeah, we talk about once a week.

    User 2: That''s good.

    User 1: Yeah, it is.

    User 2: I''ve never been to Japan, but I''d love to go someday.

    User 1: You should! It''s a beautiful country.

    User 2: I know, I''ve seen pictures.

    User 1: Yeah, the pictures don''t do it justice.

    User 2: I''m sure they don''t.

    User 1: So, what do you do for fun?

    User 2: I play the piano.

    User 1: Oh, that''s cool. I''ve always wanted to learn to play the piano.

    User 2: It''s a lot of fun.

    User 1: I''m sure it is.

    User 2: I''m learning to play a song by Chopin.

    User 1: Oh, that''s a good choice.

    User 2: Thanks, I think so too.

    User 1: So, do you go to a music school or are you self-taught?

    User 2: I''m self-taught.

    User 1: Wow, that''s impressive.

    User 2: Thanks.

    User 1: So, what''s your favorite song to play?

    User 2: Right now, it''s Chopin''s "Nocturne in E-flat Major, Op. 9, No. 2."

    User 1: Oh, that''s a beautiful piece.

    User 2: Thanks, I think so too.

    User 1: I''m sure you''ll play it beautifully.

    User 2: I hope so.

    User 1: So, what else do you like to do for fun?

    User 2: I like to go to the gym.

    User 1: Oh, that''s cool. I''ve been meaning to start going to the gym.

    User 2: You should! It''s a great way to stay in shape.

    User 1: I know, I know.

    User 2: So, where do you work?

    User 1: I''m a dog walker.

    User 2: Oh, that''s cool. I love dogs.

    User 1: Yeah, they''re the best.

    User 2: I bet you get to see a lot of cute puppies.

    User 1: I do!

    User 2: That sounds like a fun job.

    User 1: It is.

    User 2: So, what do you like to do in your free time?

    User 1: I like to watch movies, go to the gym, and spend time with my family.

    User 2: Oh, that sounds like a lot of fun.

    User 1: It is.

    User 2: So, what are you looking for in a friend?

    User 1: I''m looking for someone who is kind, funny, and intelligent.

    User 2: Oh, that sounds like a great friend.

    User 1: It is.

    User 2: I think I know someone who would be a great friend for you.

    User 1: Oh, really?

    User 2: Yeah, I''ll introduce you to them.'
