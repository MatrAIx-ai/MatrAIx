  hobbies: '["Drawing and coloring", "Playing soccer", "Dancing to Latin music", "LEGO building", "Reading bilingual storybooks", "Singing Spanish nursery rhymes", "Helping with family cooking", "Participating
    in community cultural events"]'
  career_goals: Maria dreams of growing up to help others learn and stay healthy. She imagines becoming a teacher who can guide children in reading and math, or a veterinarian who cares for pets, reflecting
    her love for caring and structured environments. In the short term, she aims to improve her reading fluency, learn to write full sentences, and showcase a dance routine in the school talent show.
