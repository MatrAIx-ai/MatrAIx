personas:
  professional: Maria Brito, a six‑year‑old mini‑architect, channels their love for structure and predictability into constructing intricate LEGO cities, confidently coordinating group play, assigning brick‑building
    roles, and ensuring every piece fits perfectly, and they take pride in seeing the smiles of friends when the design comes together.
  sports: Maria Brito dashes across the park playing soccer with friends, proudly wearing the jersey of the local youth club Little Tigers and cheering for the professional City United FC, while also dancing
    to Latin beats that keep their energy high and their coordination sharp.
  arts: Maria Brito fills sketchbooks with bright animal and family scenes, often inspired by the lively rhythms of Shakira and the classic tunes of Celia Cruz, and they delight in singing Spanish nursery
    rhymes from Dora the Explorer while reenacting the scenes in their drawings.
  travel: Maria Brito enjoys family road trips that pack snacks and games, has explored a nearby countryside farm and a sunny beach town, and they dream of visiting the Eiffel Tower in Paris and the colorful
    streets of Cartagena for new playground adventures.
  culinary: Maria Brito eagerly assists their mother in shaping arepas stuffed with cheese and black beans, delights in tasting mango slices and chocolate milk, and they often hum Spanish nursery rhymes
    while sprinkling cilantro onto the sizzling pan.
  core: Maria Brito is a bright, organized six‑year‑old whose love for LEGO structures, soccer, and Latin music blends with a practical, caring nature, marked by meticulous allowance‑saving, allergy‑watching
    habits, and a habit of ending playtime with sugary treats, and they approach each new activity with infectious enthusiasm.
background:
  cultural: Maria is a first‑generation Venezuelan‑American. At home, Spanish is spoken alongside English, and her family keeps Venezuelan traditions alive by preparing dishes such as arepas, celebrating
    Carnaval with music and dance, and sharing stories from their homeland. Her parents emphasize bilingualism and cultural pride, while she also embraces the community spirit of Lawrenceville, Georgia,
    joining local soccer leagues, attending library reading programs, and taking part in school multicultural celebrations. This blend of Venezuelan warmth and Southern hospitality shapes her identity.
