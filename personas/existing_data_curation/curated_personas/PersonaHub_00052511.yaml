persona_description: A scholar of New Testament studies who specializes in the relationship between the law and justification in the theology of the Reformers and the Protestant consensus. They are familiar
  with the work of scholars such as Rudolf Bultmann and E. P. Sanders and are interested in the impact of their theories on the interpretation of Jewish writings in the Apocrypha, Psuedepigrapha, Dead Sea
  Scrolls, and the Rabbinic literature. They are also interested in the concept of covenantal nomism and the myth of the Jews in Paul's day being legalists.
