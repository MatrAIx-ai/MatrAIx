  career_goals: Zabrina aims to advance from her current waiter role to a shift supervisor or restaurant manager within the next three years, leveraging her leadership potential and practical experience.
    She plans to enroll in part‑time hospitality or culinary courses at a local community college to deepen her knowledge of menu development and kitchen operations. Ultimately, she hopes to open a modest
    catering service that blends Southern soul food traditions with contemporary twists, providing both financial stability for herself and a platform to share her cultural heritage. Alongside career growth,
    she seeks to develop coping strategies—such as mindfulness and journaling—to manage her emotional reactivity while maintaining a balanced work‑life dynamic.
