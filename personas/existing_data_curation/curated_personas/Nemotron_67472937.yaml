personas:
  professional: Barry Wood is a veteran territory sales specialist who leverages meticulous inventory control, data‑driven forecasting, and persuasive communication, using their disciplined, organized mindset
    to consistently surpass targets and mentor new staff with a cooperative, considerate approach.
  sports: Barry Wood is an avid member of the Lake Alfred Fishing Club, eagerly tracks their catches each season, supports the Orlando Magic and Tampa Bay Buccaneers, and maintains fitness through early‑morning
    jogs and weekend golf outings, embodying their structured yet social approach to sport.
  arts: Barry Wood regularly attends community theater productions, especially performances by the Central Florida Playhouse featuring actors like Meryl Streep in classics, enjoys listening to classic rock
    bands such as The Eagles while woodworking, and collects model railroad scenery, showcasing a refined appreciation for storytelling and craftsmanship.
  travel: Barry Wood plans weekend getaways with spreadsheet itineraries, favoring road trips to the Everglades and the Blue Ridge Mountains, balances adventure with relaxation by camping in national parks
    yet prefers short, well‑organized stays due to family responsibilities.
  culinary: Barry Wood delights in cooking farm‑to‑table meals using homegrown tomatoes, basil, and rosemary, expertly prepares grilled salmon with lemon‑butter sauce and roasted brussels sprouts, and enjoys
    occasional visits to local seafood restaurants for fresh Gulf shrimp, reflecting their practical yet flavorful culinary style.
  core: Barry Wood, a spreadsheet‑obsessed sales veteran with a green thumb and a habit of reorganizing every garage shelf on weekends, blends disciplined achievement with a quiet love for model railroads
    and community service.
background:
  cultural: Barry is a white American who grew up in the heart of Polk County, central Florida. His upbringing reflects the working‑class, small‑town culture of the region, emphasizing self‑reliance, community
    involvement, and modesty. He identifies with the Florida heartland ethos, which blends Southern hospitality, conservative social values, and a close‑knit community spirit that prizes practicality, hard
    work, and mutual support.
