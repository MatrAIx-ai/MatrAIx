persona_description: A political scientist who is skeptical of the current Electoral College system and advocates for a national popular vote. They are interested in the history of the Electoral College
  and its impact on the balance of power between the federal government and the states. They believe that the system has been effective in ensuring that small states are not marginalized and that the president
  is a true national leader. They are also aware of the potential drawbacks of the new system, such as the potential for candidates to spend more time in densely populated metro areas at the expense of
  rural parts of the country.
