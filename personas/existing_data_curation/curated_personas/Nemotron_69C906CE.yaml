  hobbies: '[''Visiting art galleries and museums'', ''Cooking traditional Southeast Asian dishes'', ''Herb gardening'', ''Reading poetry and philosophy'', ''Photography of local scenes and cultural events'',
    ''Participating in small literary discussion groups'', ''Mindfulness meditation'', ''Listening to jazz music'']'
  career_goals: Although retired, Thang aspires to leave a lasting cultural legacy. He aims to compile a memoir that weaves his personal journey with the immigrant experience of his generation, complemented
    by a digital archive of family recipes and photographs. He hopes to mentor grandchildren and local youth in cooking and storytelling, and to serve as a cultural ambassador at the nearby senior center,
    organizing occasional art and heritage workshops. Maintaining his mental health remains a key ambition; he plans to continue mindfulness practices to manage anxiety and to stay emotionally resilient.
