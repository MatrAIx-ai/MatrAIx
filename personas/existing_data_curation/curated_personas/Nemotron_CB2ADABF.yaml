personas:
  professional: Mariasocorro Nguyen, a 57-year-old STEAM educator at an elementary/middle school in Philadelphia, leverages their curiosity and organized yet flexible teaching style to design interdisciplinary
    curricula that blend digital coding projects on Scratch with art history explorations, while assertively advocating for culturally responsive practices and mentoring peers toward a district-wide STEM
    coordination role.
  sports: Mariasocorro Nguyen, an avid weekend hiker who frequents Wissahickon Valley Park, participates in a local community dance troupe, practices yoga three times a week, and cheers for the Philadelphia
    Eagles, Flyers, and Phillies while occasionally joining a friendly intramural softball league.
  arts: Mariasocorro Nguyen spends their free afternoons at the Philadelphia Museum of Art and the Barnes Foundation, draws inspiration from Yayoi Kusama’s installations and the street murals of Shepard
    Fairey, curates a personal collection of science‑fiction novels by Octavia Butler and Isaac Asimov, and captures urban landscapes with a Canon EOS, reflecting a blend of visual curiosity and literary
    imagination.
  travel: Mariasocorro Nguyen prefers thoughtfully planned trips that combine cultural immersion—such as a recent week‑long culinary tour of Hoi An’s lantern festivals—with relaxed moments in nature, like
    hiking the Blue Ridge Mountains, and dreams of revisiting Kyoto’s cherry‑blossom gardens while balancing travel costs against a modest retirement budget.
  culinary: Mariasocorro Nguyen, a confident home chef, experiments with traditional pho broth, lemongrass‑infused tofu stir‑fry, and modern bánh mì tacos, favoring fresh herbs like cilantro and Thai basil,
    and enjoys sourcing ingredients at the local farmers’ market to blend aromatic flavors with seasonal produce.
  core: Mariasocorro Nguyen is a curiosity‑driven educator who fuses art, technology, and cultural tradition into vibrant classrooms, balances organized planning with spontaneous creativity, and occasionally
    lets a love of coffee and photography delay bedtime.
background:
  cultural: Mariasocorro is a first‑generation Vietnamese‑American whose family immigrated to the United States in the late 1960s. Raised in Philadelphia’s multicultural neighborhoods, she grew up speaking
    Vietnamese, celebrating Tet, and valuing education and communal responsibility. She integrates these cultural values into her teaching by incorporating Vietnamese stories, music, and art into lessons,
    and remains active in the local Vietnamese community through temple events, language tutoring, and cultural festivals.
