  hobbies: '[''Visiting art museums'', ''Attending Southeast Asian cultural festivals'', ''Cooking Vietnamese cuisine'', ''Gardening'', ''Reading science fiction'', ''Yoga'', ''Participating in community
    dance classes'', ''Photography'', ''DIY electronics and robotics projects'', ''Hiking'', ''Volunteering at local community center'', ''Book club discussions'']'
  career_goals: She aspires to become the district’s STEM coordinator, championing a cohesive STEAM framework across Philadelphia schools. To strengthen her leadership, she plans to earn a master’s degree
    in educational administration while continuing to develop after‑school coding and art clubs that reflect her cultural heritage. Over the next five years, she aims to mentor a new generation of teachers,
    secure sustainable funding for interdisciplinary projects, and eventually transition to a consultancy role that helps schools integrate culturally responsive STEM curricula.
