  career_goals: She aims to continue contributing to her community by mentoring high-school students in STEM, creating a backyard garden program that integrates sustainable engineering principles, and authoring
    a memoir that blends her Mexican heritage with her scientific career. She also hopes to stay current with emerging technologies like AI, take online courses, and volunteer as a board member for a local
    senior center, ensuring that the senior population remains engaged and active.
