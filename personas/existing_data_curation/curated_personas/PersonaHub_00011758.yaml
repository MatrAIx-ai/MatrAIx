persona_description: A historian who specializes in the study of the Celtic Church and its history, particularly focusing on the early Middle Ages and the institutions and customs of the Celtic Christians.
  They have a keen interest in the historical context and the development of the term "Celtic Church" and its usage in academic and popular discourse. They are also knowledgeable about the historical migration
  of the Celtic peoples and the impact of their migrations on the Christian landscape. They have a critical eye for the use of terminology and are interested in exploring alternative terms and strategies
  for describing the Christian communities of the Celtic peoples.
