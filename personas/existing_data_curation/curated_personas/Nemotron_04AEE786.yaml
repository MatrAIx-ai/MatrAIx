  career_goals: Nancy aspires to turn her creative passions into a modest home‑based venture, such as selling handcrafted items and artwork through online platforms like Etsy. She hopes to formally develop
    her volunteer leadership by obtaining a community arts facilitator certification and eventually organizing local art fairs or workshops that foster community cohesion. Additionally, she is interested
    in pursuing adult education courses in visual arts or counseling to deepen her skill set and enhance her ability to support others.
