  hobbies: '[''Gardening'', ''Yoga'', ''Pilates'', ''Reading Historical Biographies'', ''Small‑Group Book Club'', ''Volunteer Food‑Bank Coordination'', ''Beach Walking'', ''Landscape Photography'']'
  career_goals: Victoria aspires to obtain her Certified Public Accountant (CPA) license and advance to a senior audit manager role within her firm, where she can lead multi‑disciplinary audit engagements
    and drive the adoption of innovative analytical tools. Over the next five years she aims to oversee a regional compliance department, champion a culture of continuous improvement, and ultimately position
    herself for a chief financial officer (CFO) track at a mid‑size enterprise. Additionally, she seeks to expand her mentorship program for women entering the accounting profession and to launch a boutique
    consultancy that offers streamlined financial services to community‑based nonprofit organizations.
