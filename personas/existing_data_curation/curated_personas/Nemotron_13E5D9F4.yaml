  hobbies: '[''Karaoke'', ''Fishing'', ''Barbecue Cooking'', ''Attending Football Games'', ''Tailgating'', ''Volunteering at Food Bank'', ''Playing Texas Hold\''em'', ''Listening to Classic Rock and Country
    Music'', ''Reading Detective Novels'', ''Hosting Social Gatherings'']'
  career_goals: In the next few years Anthony aims to move from sales associate to store manager, gaining full responsibility for staffing, budgeting, and merchandising decisions. He plans to enroll in
    evening business courses at Brazosport College to earn an associate degree in Business Administration, which will position him for a regional manager role within the next decade. Long‑term, he envisions
    opening a small independent boutique or convenience store that reflects his love for community interaction and offers a space for local events. Throughout his career progression, he seeks to build a
    loyal customer base and mentor younger sales staff, leveraging his sociable nature and calm demeanor.
