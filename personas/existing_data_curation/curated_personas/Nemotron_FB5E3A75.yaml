  career_goals: Pedro aspires to become an astronaut or a scientist who explores outer space and studies ecosystems like the Costa Rican rainforest. He dreams of designing innovative tools or illustrations
    that combine his love of art and discovery. He also hopes to excel academically, earn a place in a future science camp, and one day contribute to environmental research or space technology.
