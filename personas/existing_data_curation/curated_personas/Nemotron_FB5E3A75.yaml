personas:
  professional: Pedro Perezfernandez is a budding junior architect who transforms LEGO bricks into detailed cityscapes, and they approach each build with meticulous planning, critical analysis, and a quiet
    competitiveness that drives constant refinement.
  sports: Pedro Perezfernandez plays for the Bridgeport United U8 Soccer Club, cheers for the New England Revolution on weekends, and they train methodically after school, preferring small‑sided games where
    their competitive edge can shine and relishing quick sprints that mimic the agile movements of jungle cats they admire.
  arts: Pedro Perezfernandez spends afternoons sketching fantastical landscapes inspired by Hayao Miyazaki and Dr. Seuss, and they unwind by tapping a child‑size djembé to the lively tunes of The Wiggles
    while proudly displaying a growing collection of animal stickers illustrated by Maya Lin.
  travel: Pedro Perezfernandez has explored Connecticut’s coastal beaches in New Haven, trekked the Audubon Society’s bird sanctuary, and taken a family vacation to San José, and they dream of hiking the
    cloud forests of Monteverde and visiting the Kennedy Space Center to see rockets up close.
  culinary: Pedro Perezfernandez loves the hearty flavors of gallo pinto, the comforting melt of cheese‑topped pizza, and the bright zest of mango‑banana smoothies, and they often help whisk together rice
    and beans while sprinkling cilantro, although they sometimes sneak extra crackers during snack time.
  core: Pedro Perezfernandez is a curious, methodical seven‑year‑old who catalogues insects in a notebook, builds towering LEGO structures at night, and habitually forgets to clean up their art supplies,
    believing the mess fuels creativity.
background:
  cultural: Pedro’s family maintains Costa Rican traditions at home, speaking Spanish daily, celebrating holidays such as Semana Santa with traditional meals like gallo pinto, and sharing stories about
    Costa Rica’s rainforests and wildlife. While living in Bridgeport, CT, he also participates in local community events, learns about American customs, and enjoys a bicultural environment that blends
    his Latin American heritage with the diverse influences of his neighborhood.
