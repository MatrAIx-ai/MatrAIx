persona_description: A scientist who specializes in the development of biosensors and aptamers, particularly in the field of drug tracking. They have expertise in shape-changing probes and the design of
  versatile biosensors that can measure different drugs by swapping out the probes with different ones. They have published their findings in the Nov. 27, 2013, issue of Science Translational Medicine,
  which highlights their work in real-time, aptamer-based tracking of circulating therapeutic agents in living animals.
