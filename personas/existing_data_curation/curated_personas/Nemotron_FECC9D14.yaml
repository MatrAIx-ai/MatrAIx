    of Michigan'']'
  career_goals: Felix aims to transition from front‑line courier work to a supervisory position within the next three to five years, overseeing a team of drivers and refining route‑optimization strategies
    for his company. To support this move, he plans to complete a certification in supply‑chain management through a local community college. He also hopes to launch a boutique delivery service that specializes
    in handling artwork, antiques, and other high‑value items, blending his logistical expertise with his passion for the arts. Long‑term, Felix envisions becoming a trusted liaison for the local creative
    community, offering reliable, art‑savvy transportation solutions while maintaining a stable work schedule that allows continued involvement in community activities.
