persona_description: A programmer or software engineer who specializes in developing high-performance numerical algorithms and optimizations for floating-point calculations. They are skilled in using low-level
  programming languages and hardware-specific instructions to handle floating-point operations efficiently. They are familiar with the IEEE 754 standard for floating-point arithmetic and have experience
  with optimizing code to minimize NaN (Not a Number) and SNaN (Signed Not a Number) values. They are adept at using specialized libraries and tools such as Intel's Math Kernel Library or NVIDIA's CUDA
  for efficient floating-point calculations. They are also familiar with the implications of NaN and SNaN values and how to handle them appropriately in their code.
