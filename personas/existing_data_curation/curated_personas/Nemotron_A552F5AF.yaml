  career_goals: Mariahelena dreams of becoming someone who can blend her love for learning with helping others. She aspires to be a teacher or a science educator, envisioning a future where she can share
    knowledge in a supportive, calm classroom environment. She also entertains the idea of working with animals as a veterinarian, drawn by her kindness toward pets. In the short term, she aims to improve
    her academic performance, develop coping strategies for her anxiety, and participate in school clubs that allow her to nurture her curiosity while staying grounded in practical tasks.
