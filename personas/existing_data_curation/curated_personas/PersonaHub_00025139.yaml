persona_description: A neurology professor who specializes in the study of sleep-wake cycles and circadian rhythms. He has conducted research on the relationship between sleep patterns and genetic factors,
  including the discovery of a gene mutation that influences the time of day a person is most likely to die. His findings have implications for understanding the aging process and the development of age-related
  diseases.
