  career_goals: She hopes to move beyond her current cashier role into a supervisory or management position within retail, where she can lead a team and shape store culture. Parallel to that, she dreams
    of merging her passion for art with her people skills by pursuing a community arts coordinator role or working in a gallery, possibly after completing an associate’s degree in arts administration or
    marketing. Ultimately, she envisions a career that lets her curate local art events, support emerging artists, and create inclusive, vibrant spaces while maintaining a flexible schedule that accommodates
    her need for spontaneity and self‑care.
