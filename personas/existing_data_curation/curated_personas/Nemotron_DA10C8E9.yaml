personas:
  professional: Shelley Jeter, a 24‑year‑old front‑line retail associate in Council Bluffs, leverages an instinctive eye for visual aesthetics and a naturally sociable, quick‑thinking style to craft eye‑catching
    merchandise displays, diffuse tense customer moments, and organize pop‑up art showcases, even though her spontaneous streak sometimes leaves her scrambling to meet store deadlines.
  sports: Shelley Jeter, a 24‑year‑old who prefers movement that feels communal, regularly joins the local Saturday night recreational volleyball league, dances at community festivals, and avidly follows
    the Omaha Storm Chasers minor‑league baseball team and the Iowa Hawkeyes football squad, using these activities as both social outlets and stress relievers.
  arts: Shelley Jeter, a 24‑year‑old art enthusiast, spends weekends sketching the riverfront, curating pop‑up exhibits at the Artistry on the River gallery, drawing inspiration from Frida Kahlo’s bold
    colors and Van Gogh’s swirling skies, and frequently attends live indie shows by The Strokes and local folk bands while participating in improv workshops that feed her curiosity and collaborative spirit.
  travel: Shelley Jeter, a 24‑year‑old spontaneous traveler, loves impromptu road trips to nearby cities like Omaha, Des Moines, and Kansas City, dreams of a week‑long art pilgrimage to Santa Fe’s galleries,
    and typically books cheap Airbnb stays using a travel app while juggling her limited savings and desire for flexibility.
  culinary: Shelley Jeter, a 24‑year‑old experimental cook, delights in whipping up spicy ramen bowls with miso‑infused broth, harissa‑spiced tofu, and fresh cilantro, while her penchant for trying obscure
    dishes like kimchi‑pancakes often leads to late‑night kitchen experiments that leave a lingering mess she habitually forgets to clean.
  core: Shelley Jeter, a 24‑year‑old curiously spontaneous soul, blends a love for community art, impulsive spending, intense emotions, and a habit of over‑committing to social events, all while juggling
    a retail job and a dream of shaping vibrant cultural spaces.
background:
  cultural: Shelley grew up in Council Bluffs, a modest Midwestern city in Iowa, where community ties and a straightforward, friendly demeanor are hallmarks of the local culture. Her white, predominantly
    Protestant background exposed her to small‑town values of hard work, modesty, and neighborly support, while her high school offered a modest art program that sparked her curiosity about visual expression.
    The region’s blend of agricultural heritage and river‑front urban life gave her an appreciation for both tradition and the occasional cultural influx from nearby Omaha, fostering an openness to new
    ideas while staying grounded in Midwestern hospitality.
