persona_description: A NASA project manager who oversaw the development and launch of the Delta launch vehicle, ensuring its survival and continued use as an interim launch vehicle until larger, more capable
  launch vehicles were developed. The persona was known for his ability to keep the Delta program alive, challenge his technical staff, and find innovative solutions to extend the flight envelope of the
  vehicle. The persona also had a knack for selling the capabilities of the Delta to NASA management, despite the vehicle's limitations, and was able to persuade them to fly the mission on Delta despite
  the unexpected test failure.
