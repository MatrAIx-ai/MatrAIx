  career_goals: Priya aims to turn her love for storytelling and social interaction into a career in multimedia content creation. In the short term, she wants to launch a YouTube channel that mixes art
    tutorials, personal vlogs, and commentary on emerging trends, building a subscriber base that values authenticity and creativity. She hopes to earn a spot in her high school’s specialized arts program
    and later study communications, visual arts, or film at a university known for its media labs. Long‑term, she envisions working as a creative director or digital strategist for a brand that encourages
    youth expression, or running her own independent production studio that produces web series and digital campaigns. Her competitive nature pushes her to aim for awards in youth media contests and to
    cultivate a personal brand that stands out in a crowded online space.
