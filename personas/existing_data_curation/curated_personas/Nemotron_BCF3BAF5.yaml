    ''Team leadership and mentorship'', ''Parts inventory management'', ''Problem‑solving under time pressure'', ''Continuous learning of emerging aerospace tech'']'
  hobbies: '[''Fishing on the Gulf'', ''Boating and sunrise cruises'', ''Building model aircraft'', ''Attending air shows'', ''Restoring a vintage Chevrolet'', ''Yoga practice'', ''Hiking in DeSoto National
    Forest'', ''Volunteering at STEM outreach camps'']'
  career_goals: Emily aims to move into a lead‑shop foreperson role within the next three years, overseeing a maintenance team at a regional airport. She plans to earn an FAA Aircraft Maintenance Instructor
    rating so she can train the next generation of mechanics, and she is studying for an Avionics Specialist certification to broaden her technical breadth. Long‑term, she dreams of opening her own MRO
    business focused on small business jets and specialty aircraft, leveraging her practical expertise and competitive drive to build a reputation for quality and efficiency.
