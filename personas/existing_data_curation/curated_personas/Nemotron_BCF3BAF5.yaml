personas:
  professional: Emily Grossfeld, a licensed A&P mechanic with a decade of hands‑on aircraft maintenance, blends meticulous safety‑first inspections with a curious drive to adopt composite repair techniques,
    and they lead repair teams while mentoring junior technicians, balancing practical organization with a willingness to explore new aerospace technologies.
  sports: Emily Grossfeld balances fitness with Gulf Coast recreation, kayaking with the Gulf Coast Anglers Club and hiking with the DeSoto Forest Trail Society, while cheering on the New Orleans Saints
    in the fall and the Pelicans in the winter, and they treat weekend fishing trips as both sport and meditation.
  arts: Emily Grossfeld channels her creative side into model aircraft building and vintage Chevrolet restoration while savoring the soulful blues of B.B. King, the folk storytelling of Joan Baez, and the
    indie folk melodies of John Mayer, often listening to these musicians while sketching schematics in the workshop.
  travel: Emily Grossfeld prefers road‑trip adventures in her restored 1965 Chevrolet, charting routes to the historic French Quarter in New Orleans, the sun‑drenched beaches of Destin, Florida, and the
    tranquil islands of the Bahamas, planning trips with a mix of DIY camping and occasional boutique stays, constrained by modest budget and work commitments.
  culinary: Emily Grossfeld enjoys Gulf Coast cuisine, often grilling shrimp po’boys with fresh Gulf shrimp, steaming crab legs seasoned with Old Bay, and crafting a hearty gumbo with roux, while their
    cooking skill is solid enough to smoke fish on weekends but they frequently rely on quick takeout tacos when overtime demands their attention.
  core: Emily Grossfeld is a competitive, safety‑obsessed aircraft mechanic who alternates between meticulous documentation and occasional impulsive vintage car splurges, balancing a love for sunrise boat
    rides with a skeptical eye toward every new process.
background:
  cultural: Emily grew up in a modest, close‑knit community on the Mississippi Gulf Coast, where southern hospitality and a strong work ethic are central values. Her family emphasized self‑reliance, practical
    problem solving, and a respect for tradition, which shaped her pragmatic yet curious outlook. Though she never married, she maintains strong ties with friends and extended family, often gathering for
    seafood dinners and local festivals. The regional culture of fishing, outdoor recreation, and an appreciation for hands‑on trades dovetails with her career in aircraft maintenance, and she identifies
    with both the local southern identity and the broader aviation community that values precision and continual learning.
attributes:
  skills: '[''A&P licensed aircraft mechanic'', ''Airframe structural repair'', ''Engine overhaul and troubleshooting'', ''Avionics diagnostics'', ''Hydraulic and pneumatic system maintenance'', ''Composite
