  career_goals: Approaching retirement, Fabricio aims to transition into a senior advisory and training role within the fire department, where he can design a comprehensive fire‑prevention education program
    for local schools and community centers. He hopes to earn a lifetime‑service award and be recognized for improving departmental safety protocols that reduce stress‑related injuries. Mentoring the next
    generation of firefighters, especially those from Hispanic backgrounds, and contributing his expertise to policy development are central to his ambitions.
