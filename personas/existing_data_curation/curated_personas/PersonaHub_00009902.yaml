persona_description: A systems engineer who specializes in the design and implementation of bootloaders for various devices, including U-Boot and eMMC boot partitions. They are skilled in the development
  of parallel bootloaders and have experience with the eMMC specification version 4.3, which requires 2 separate hardware boot partitions for the bootloader. They are also knowledgeable about the risks
  associated with bricked boards and the limitations of the OTA update process, and have a deep understanding of the Mender Update Module framework, which allows for the support of custom update types through
  a plugin architecture.
