  career_goals: She aims to complete a bachelor's degree in Business Administration with a concentration in Marketing, eventually working as a community outreach manager for a nonprofit or as a regional
    marketing coordinator for a Texas‑based company. In the longer term, she hopes to launch a small event‑planning business that specializes in local festivals and community gatherings, leveraging her
    organizational skills and love for bringing people together.
