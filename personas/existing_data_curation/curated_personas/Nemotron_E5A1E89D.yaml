  hobbies: '[''Volleyball'', ''Dance classes'', ''Community fair volunteering'', ''Hiking in the Texas Hill Country'', ''Photography'', ''Cooking Tex‑Mex dishes'', ''Reading contemporary fiction'', ''Listening
