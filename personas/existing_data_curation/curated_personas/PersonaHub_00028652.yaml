persona_description: A marine biologist who specializes in the study of saltmarsh ecosystems, particularly their composition, productivity, and the interactions between different species. She is particularly
  interested in the impact of human activities on these ecosystems and the mechanisms by which they recover from disturbances. She has a deep understanding of the different types of saltmarshes found in
  the UK and the various factors that influence their composition and productivity. She is also knowledgeable about the role of microalgae and filamentous algae in saltmarsh ecosystems and their contribution
  to net productivity.
