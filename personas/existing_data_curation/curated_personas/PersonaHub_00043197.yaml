persona_description: A birder who enjoys exploring the diverse bird species found in different parts of the world, particularly those in the Western Hemisphere. They are particularly interested in the kingfisher
  species and their unique characteristics such as their crested heads, long, sturdy bills, brightly colored plumage, and the fact that they are primarily found in the Western Hemisphere and only one species
  is found in Washington. They are also interested in the fact that these birds are not found in the Eastern Hemisphere and are more common in other parts of the world. They are passionate about bird watching
  and collecting information on the various kingfisher species, as well as their habitats and behaviors.
