personas:
  professional: Nicolas Martin, a community‑oriented handyman with an associate’s degree in business fundamentals, blends practical troubleshooting, DIY home maintenance, and a natural talent for coordinating
    social events to operate a weekend farmers‑market stall, mentor young adults in trade skills, and work toward restoring a historic farmhouse into a local workshop hub.
  sports: Nicolas Martin plays third base for his community center’s softball league, follows the Atlanta Braves and the Georgia Bulldogs with enthusiasm, spends weekends fishing on nearby lakes and hunting
    with friends, and they stay active by gardening and hiking the nearby Appalachian trails.
  arts: Nicolas Martin sings gospel classics by Mahalia Jackson and contemporary worship songs by Chris Tomlin in his church choir, enjoys listening to folk‑rock icon Alison Krauss for inspiration, and
    they unwind by watching classic Southern movies such as 'The Blind Side' and 'Forrest Gump,' finding the storytelling fuels their creative woodworking projects.
  travel: Nicolas Martin has road‑tripped to the Great Smoky Mountains and explored the historic charms of Savannah, savored the music and cuisine of New Orleans, and they now dream of tracing their genealogy
    in County Cork, Ireland, as well as savoring a culinary tour through Tuscany, Italy.
  culinary: Nicolas Martin specializes in Southern comfort dishes like fried catfish with hush‑puppies, collard greens cooked with smoked ham hocks, and peach cobbler, often preparing meals over a backyard
    smoker while they harvest fresh herbs and vegetables from their garden to add to each potluck.
  core: Nicolas Martin is a pragmatic, socially‑driven handyman who balances a love for community gatherings with a laid‑back approach to planning, occasionally letting tool‑shopping impulses and garden
    overgrowth get the better of them.
background:
  cultural: Nicolas grew up in the rural South of North Carolina, rooted in a traditionally Southern, White, Anglo‑Scots‑Irish heritage. The close‑knit fabric of Cerro Gordo’s small community, the central
    role of the local Baptist church, and the region’s agricultural legacy have shaped his values of hospitality, self‑reliance, and service. Family gatherings, church potlucks, and seasonal festivals are
    core to his cultural identity, as are the oral histories and folk traditions transmitted through generations.
attributes:
  skills: '["Basic mechanical repair", "Small‑scale gardening and horticulture", "DIY home maintenance", "Event coordination", "Customer service", "Conflict mediation", "Basic bookkeeping", "Community outreach"]'
  hobbies: '["Fishing", "Hunting", "Gardening", "Woodworking", "Softball", "Church choir", "Southern cooking", "Genealogy research", "DIY projects"]'
  career_goals: Although not currently employed, Nicolas aims to channel his practical skills and sociable nature into flexible, community‑focused roles. He is interested in volunteering with the local
    food bank, launching a weekend farmers‑market stall featuring produce from his garden, and offering part‑time mentorship to young adults interested in trade skills. Long‑term, he dreams of restoring
    a historic farmhouse to serve as a community hub for workshops, social events, and local gatherings.
