personas:
  professional: Ernesto Reyes is a thirty-six-year-old construction supervisor who expertly merges blueprint interpretation, crew scheduling, budget control and OSHA safety enforcement with bilingual communication
    and a deep appreciation for historic adobe aesthetics, channeling his methodical, competitive nature into leading teams that prioritize heritage-sensitive, sustainable building practices while confidently
    navigating stakeholder dynamics.
  sports: Ernesto Reyes competes as a midfielder for the local Espanola United soccer team in the Santa Fe amateur league, avidly follows New Mexico United in the USL Championship, and regularly hikes the
    Rio Arriba trail as a member of the Rio Arriba Outdoor Club, approaching fitness with the same competitive drive he brings to construction projects while valuing the camaraderie of group outings.
  arts: Ernesto Reyes expresses his artistic side by painting desert light on oversized canvases, capturing adobe facades with a Sony a7R camera, playing flamenco-infused guitar in the community folk band
    Los Rios, curating exhibitions at the Northern New Mexico Museum of Art featuring artists like Georgia O'Keeffe-inspired photographers, and attending gallery openings that celebrate regional heritage.
  travel: Ernesto Reyes plans trips that blend cultural immersion with outdoor adventure, having explored Santa Fe's art festivals, taken a weekend road trip to Seville to study flamenco roots, hiked Patagonia's
    Torres del Paine on a two-week expedition, and routinely earmarks vacation days for both family gatherings and solitary photography excursions in New Mexico's high desert.
  culinary: Ernesto Reyes enjoys cooking intermediate-level Spanish dishes such as saffron-infused paella with chorizo and fresh gazpacho with cucumber and tomatillo, often gathering friends for potluck
    nights where he also experiments with local green chile rellenos, thereby merging his love of traditional flavors with a creative flair for presentation.
  core: Ernesto Reyes, a thirty-six-year-old construction leader and community artist, balances a methodical, competitive work ethic with a restless creative spirit, often over-scheduling social and project
    commitments to the point of occasional sleep loss.
background:
  cultural: Ernesto is a second-generation American of Spanish descent, raised in Española, New Mexico, where Spanish colonial heritage intertwines with Indigenous Pueblo influences. He grew up bilingual,
    speaking Spanish at home and English at school, which gives him a fluid cultural identity that respects both his European roots and the rich mestizo traditions of the Southwest. His family maintains
    Spanish customs—such as celebrating Semana Santa, cooking tapas, and enjoying flamenco music—while also participating in local New Mexican festivities like the Fiesta de Santa Fe and the Rio Arriba
    County Fair. This bicultural upbringing informs his appreciation for adobe architecture, folk art, and community storytelling, and it drives his desire to protect historic neighborhoods through culturally-aware
    construction practices.
attributes:
  skills: '[''Project Management'', ''Construction Site Supervision'', ''Construction Safety Compliance (OSHA)'', ''Blueprint Interpretation'', ''Budgeting and Cost Control'', ''Team Leadership'', ''Conflict
