  hobbies: '[''Painting'', ''Landscape and Urban Photography'', ''Playing Guitar (folk/Spanish styles)'', ''Soccer (local league)'', ''Hiking in the Rio Arriba area'', ''Attending art gallery openings'',
    ''Volunteering at community cultural festivals'', ''Cooking Spanish cuisine'', ''DIY woodworking projects'', ''Reading art theory and architecture books'']'
  career_goals: Ernesto aims to transition from front-line supervision to senior project management within the next five years, securing a PMP certification and advanced LEED credentials to lead large-scale,
    culturally-sensitive developments in northern New Mexico. He dreams of establishing his own consulting firm that specializes in historic preservation and sustainable construction, bridging the gap between
    developers and local heritage groups. In the longer term, he hopes to spearhead a regional initiative that revitalizes adobe homes and other colonial-era structures, positioning himself as a trusted
    liaison who can combine rigorous construction standards with a nuanced understanding of Spanish-Hispanic architectural traditions.
