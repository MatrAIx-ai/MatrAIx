personas:
  professional: An aspiring mystery author, Sarah Bolick channels her love of chapter books and puzzle‑solving into drafting intricate story outlines, and their methodical, routine‑driven nature ensures
    they keep a tidy notebook of plot twists and meet weekly writing club deadlines.
  sports: A dedicated team player, Sarah Bolick practices with the Peoria Youth Soccer Club on Saturday mornings, cheers for the Chicago Cubs during baseball season, and balances active play with quiet
    walks in the community garden, preferring structured drills over spontaneous pick‑up games.
  arts: A devoted fan of classic pop icons such as The Beatles, ABBA, and Madonna, Sarah Bolick spends evenings drawing intricate geometric patterns inspired by M.C. Escher, constructing elaborate LEGO
    models, and curating a sticker album of vintage cartoon characters, which together nurture her creative expression.
  travel: An enthusiastic yet routine‑oriented traveler, Sarah Bolick has visited the Chicago Museum of Science and Industry with her family, delights in the annual Peoria County Fair, and dreams of a carefully
    planned road trip to the Grand Canyon, favoring itineraries that include scheduled museum stops and familiar snack breaks.
  culinary: A budding home‑cook, Sarah Bolick frequently assists with preparing grilled cheese sandwiches, spaghetti with marinara sauce, and fruit salads featuring apples and strawberries, enjoys assembling
    peanut‑butter‑and‑jelly sandwiches, and, while diligent in measuring ingredients, often leaves the kitchen countertop a bit messy after mixing.
  core: Sarah Bolick, an organized, puzzle‑loving 11‑year‑old, balances a love for mysteries and stickers with a quiet, routine‑driven life, occasionally slipping into snack‑induced messes and forgetful
    flossing, yet they always keep a tidy notebook of their adventures.
background:
  cultural: Sarah is raised in a Midwestern white family in Peoria, Illinois. Her upbringing reflects the region’s emphasis on community, modesty, and practicality. She attends a public elementary school,
    participates in local traditions such as the annual county fair and holiday parades, and occasionally goes to a nearby church with her family. The local culture values punctuality, friendliness, and
    close‑knit neighborhoods, shaping her appreciation for routine, cooperation, and small‑group interactions.
