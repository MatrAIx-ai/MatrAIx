  career_goals: Sarah hopes for a stable, routine‑oriented career where she can help others. She is drawn to becoming a teacher because of her love for organized classroom settings and supporting peers.
    She also imagines a future as a librarian, where her passion for books and orderly systems would shine. Additionally, she is curious about working as a veterinary assistant, combining her practical
    mindset with gentle care for animals.
