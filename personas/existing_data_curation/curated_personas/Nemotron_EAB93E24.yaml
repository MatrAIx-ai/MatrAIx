    coordination and community outreach'', ''Social media content posting'', ''Time management and workflow optimization'', ''Process documentation and SOP development'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Hiking local trails'', ''Gardening'', ''Volunteering at the public library'', ''Participating in cultural festivals'', ''Folkloric dance'', ''Reading historical
    fiction'', ''Yoga and mindfulness practice'']'
  career_goals: Rosario aims to advance to an office manager or administrative supervisor role within the next three to five years, obtain a Certified Administrative Professional credential, and eventually
    lead a small team where she can mentor new staff and develop community‑focused programs. She also envisions leveraging her bilingual skills to serve as a liaison between local businesses and the Mexican‑American
    community.
