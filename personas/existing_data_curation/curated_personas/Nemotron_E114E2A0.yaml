personas:
  professional: Joana Carbonell is a budding cartographer and LEGO architect who fuses an imaginative love for fantasy world‑building with methodical planning, crafting intricate paper maps and interactive
    Scratch projects that showcase their attention to detail at school science‑art fairs.
  sports: Joana Carbonell enjoys playing forward on the Greenfield Guardians elementary school soccer team, practices swimming with the Dolphin Swim Club during the summer, and follows professional sports
    teams such as the San Francisco Giants and the Golden State Warriors for inspiration.
  arts: Joana Carbonell spends afternoons sketching elaborate fantasy maps inspired by J.R.R. Tolkien’s Middle‑Earth and the vibrant visuals of Studio Ghibli, while listening to guitar legends like Carlos
    Santana and classical piano works by Ludwig van Beethoven, and they keep a small collection of prints by Frida Kahlo and Yayoi Kusama.
  travel: Joana Carbonell dreams of exploring the ancient ruins of Teotihuacan and stargazing at Chile’s Atacama Desert, yet also plans a family road trip to the Grand Canyon’s South Rim, balancing a love
    for adventure with a modest travel budget that relies on school‑sponsored field trips and saved allowance.
  culinary: Joana Carbonell enjoys helping the family prepare pan de muerto and colorful sugar‑skull cookies during Día de los Muertos, can expertly whisk guacamole with ripe avocados, lime juice, cilantro,
    and a pinch of salt, loves tasting tacos al pastor with pineapple, and they sometimes over‑season dishes with extra chili powder.
  core: Joana Carbonell is a methodical dream‑weaver who maps imaginary continents with LEGO bricks, budgets allowance with precise jar systems, occasionally forgets allergy meds, and fuels their creativity
    with spicy sweets and guitar chords.
background:
  cultural: Joana is raised in a Mexican family living in Fort Stockton, Texas, where Spanish is spoken at home alongside English at school. Family gatherings feature traditional foods such as tamales and
    pozole, and music ranging from mariachi to regional norteño. The desert landscape and ranching heritage of Pecos County influence her artistic palette with earthy tones and desert flora. Local celebrations
    like the Fort Stockton Fiesta blend Mexican and Southwestern traditions, and Joana often incorporates vibrant colors, folkloric symbols, and desert motifs into her artwork, reflecting a rich blend of
    cultural influences.
