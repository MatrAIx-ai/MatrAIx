    stories'', ''small book club participation'', ''basic guitar playing'', ''helping with family cooking'']'
  career_goals: Joana dreams of blending art and science. She aspires to become a multimedia storyteller who creates animated documentaries or educational video games that make complex ideas approachable
    for kids. In the future she hopes to study visual arts and communication, eventually leading community workshops that celebrate Mexican heritage while teaching creativity and curiosity. She also imagines
    designing a local youth art exhibit that highlights desert ecosystems and cultural folklore.
