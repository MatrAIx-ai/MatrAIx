  hobbies: '[''PC building and customization'', ''Strategy video gaming (Civilization VI, Minecraft)'', ''Basketball'', ''Hiking (Eno River State Park)'', ''Fishing'', ''Church youth group participation'',
    ''Community service'', ''Journaling'']'
  career_goals: Warren aims to channel his disciplined work ethic and technical curiosity into a career in engineering. After completing his high school diploma, he plans to enroll in a community college
    program in mechanical engineering, with the long-term goal of transferring to a four-year university such as North Carolina State University. He is particularly interested in automotive and aerospace
    applications, hoping to secure an internship with a local manufacturing firm in the Raleigh-Durham area. In the next five years, he envisions earning a bachelor's degree, obtaining a professional engineering
    license, and eventually working as a design engineer on sustainable transportation projects. He also aspires to develop a side portfolio of personal engineering projects, such as building custom electric
    skateboards and improving home automation systems.
