personas:
  professional: Warren Hart, an aspiring mechanical engineering student, applies his disciplined time‑management, project‑planning expertise, and analytical strengths in mathematics and physics to lead
    robotics club data‑analysis tasks using Python while simultaneously designing small‑scale CAD models for custom electric skateboard prototypes, embodying a balance of curiosity and pragmatic execution,
    and they consistently log progress in Trello.
  sports: Warren Hart, a regular participant in the Raleigh Community Center pickup basketball league and a member of the Raleigh Hiking Club who hikes the Eno River State Park trails each weekend, also
    enjoys weekend fishing trips with their father through the Cape Fear Fly Fishing Association, follows the North Carolina Tar Heels men’s basketball team and the Charlotte Hornets closely, and they balance
    competitive play with a love for the outdoors.
  arts: Warren Hart, who finds inspiration in the orchestral scores of Hans Zimmer and Christopher Tin while gaming, they integrate the rhythmic precision of these compositions into handcrafted wooden models
    inspired by renowned woodworker Tom Silva, attend worship services featuring contemporary Christian artists such as Crowder, and unwind by watching visually striking films by Christopher Nolan, merging
    technical detail with artistic flair.
  travel: Warren Hart, who prefers carefully planned weekend getaways over spontaneous trips, has explored the historic streets of Washington, D.C., hiked the Blue Ridge Mountains near Asheville, and dreams
    of attending the Automotive Engineering Expo in Stuttgart, Germany, while they leverage student discounts, budget‑friendly hostels, and ride‑share apps to stretch a modest travel allowance.
  culinary: Warren Hart, a modest home‑cook with a penchant for Southern comfort food, they master dishes like shrimp and grits seasoned with smoked paprika, garlic, and fresh thyme while also experimenting
    with spicy Thai pad thai featuring rice noodles, tamarind sauce, shrimp, bean sprouts, and crushed peanuts, balancing fast‑food cravings for a cheeseburger with a disciplined habit of meal‑prepping
    on weekends.
  core: Warren Hart is a disciplined, curiosity‑driven tinkerer who meticulously plans every project, occasionally forgoes sleep during late‑night PC builds, and battles a habit of impulsively adding the
    newest GPU to their rig despite a tight budget, which they justify as essential for personal growth.
background:
  cultural: Warren grew up in a middle-class, white family in Sanford, North Carolina, a small-town community with strong Southern traditions. His upbringing was shaped by the values of hard work, modesty,
    and community involvement common in Harnett County. He attended a public high school where football Saturdays, church gatherings, and local festivals like the Sanford Folk Fest were central social events.
    The region's Baptist heritage influenced his participation in the church's youth activities and reinforced a sense of hospitality and respect for tradition. At the same time, growing up in the digital
    age gave him exposure to broader national and global ideas, allowing him to balance his Southern cultural roots with a curiosity for new technologies and perspectives.
attributes:
  skills: '[''Time management'', ''Project planning'', ''Python programming (intermediate)'', ''Microsoft Excel'', ''Basic AutoCAD'', ''Mathematics and physics problem solving'', ''Car maintenance'', ''Woodworking
