personas:
  professional: Caitlin Sanderson, a retired STEM graduate turned community arts mentor, leverages her analytical expertise and love of digital photography to guide volunteer teams in curating exhibition
    data, embraces flexible project timelines, and drafts a memoir that weaves scientific rigor with artistic curiosity, all while fostering a cooperative, kind‑hearted atmosphere.
  sports: Caitlin Sanderson stays active through birdwatching walks with the Midtown Senior Hiking Club, occasional yoga classes, and attending Minnesota Twins baseball games, preferring low‑impact exercise
    that fits her flexible schedule and cooperative spirit.
  arts: Caitlin Sanderson explores the Walker Art Center and Minneapolis Institute of Arts, draws inspiration from contemporary creators such as Kara Walker and Yayoi Kusama, and experiments with AI‑generated
    art platforms to merge her scientific background with visual expression, all while sharing her enthusiasm with fellow volunteers.
  travel: Caitlin Sanderson enjoys spontaneous road trips with her spouse, having driven the North Shore of Lake Superior, explored Mackinac Island’s historic streets, and visited the vineyards of Napa
    Valley, favoring scenic routes that allow for unplanned stops and flexible itineraries.
  culinary: Caitlin Sanderson delights in cooking seasonal dishes like wild‑rice soup, herb‑roasted trout, and apple‑cinnamon pie, using locally sourced ingredients such as sage, juniper berries, and fresh
    berries, while her occasional forgetfulness about thawing meat adds a quirky challenge to her kitchen routine.
  core: Caitlin Sanderson is a curious, lightly‑disorganized 70‑year‑old who fuses scientific precision with artistic wanderlust, nurturing community connections while indulging in spontaneous whims.
background:
  cultural: Caitlin was raised in a predominantly white, Midwestern community in Minnesota, with family roots tracing back to Scandinavian immigrants. Her upbringing in a Lutheran household emphasized community
    service, modesty, and a deep appreciation for nature. The cultural milieu of Minneapolis—its strong public education system, active arts community, and the broader Twin Cities' blend of tradition and
    progressive ideas—has shaped her worldview, merging a practical Midwestern work ethic with an openness to diverse artistic and intellectual expressions.
attributes:
  skills: '[''Data analysis (Excel, R)'', ''Experimental design'', ''Technical writing'', ''Digital photography'', ''Community volunteer coordination'', ''Basic computer literacy instruction'', ''Art exhibition
    curation'', ''Interpersonal communication'', ''Problem solving'']'
  hobbies: '[''Visiting art museums and galleries'', ''Gardening (native wildflowers)'', ''Birdwatching'', ''Digital photography'', ''Reading historical fiction'', ''Playing bridge'', ''Quilting'', ''Spontaneous
    road trips'']'
  career_goals: Although retired, Caitlin remains eager to learn and contribute. She aims to deepen her knowledge of contemporary art and emerging digital creative tools, such as AI‑generated art platforms.
    She plans to mentor younger volunteers in both technology and museum studies, develop a community oral‑history project documenting local artists, and author a memoir that weaves together her scientific
    background and lifelong curiosity. Her overarching ambition is to foster intergenerational connections and enrich the cultural fabric of the Twin Cities.
