personas:
  professional: Olivia Landry, a retired senior‑center program director turned community cultural catalyst, leverages meticulous organizational talent, sharp aesthetic sensibility, and a competitive curiosity
    to curate local art exhibitions, mentor volunteers, and spearhead intergenerational arts projects in Kenyon, and they channel this drive into every community initiative.
  sports: Olivia Landry cheerfully follows the Minnesota Twins and Minnesota Vikings, participates in the Kenyon Senior Walking Club, and enjoys low‑impact cardio sessions at the local community center,
    and they balance a love of team spirit with personal fitness routines suited to their age.
  arts: Olivia Landry indulges in watercolor painting of Midwestern landscapes, frequents the Walker Art Center to study works by Georgia O'Keeffe and Grant Wood, and attends community theater productions
    starring local talent, and they also curate exhibitions that showcase regional artists like Jeff Schlanger, blending critical appreciation with creative support.
  travel: Olivia Landry prefers weekend excursions to nearby art festivals such as Art‑A‑Whirl in Minneapolis and the Grand Marais Art Fair, enjoys train trips to Chicago for museum tours, and dreams of
    a summer visit to New York’s MoMA, and they plan these trips with careful budgeting and often bring a companion from their gardening circle.
  culinary: Olivia Landry delights in preparing farm‑to‑table dishes like wild‑rice pilaf with heirloom carrots, rhubarb crisp, and corn chowder, adeptly using fresh garden harvests and experimenting with
    a sourdough starter, and they frequently share these meals at neighborhood pot‑luck gatherings.
  core: Olivia Landry, a fiercely curious 79‑year‑old, blends competitive bridge tactics with gentle gardening patience, never misses a museum opening, and they hoard postcards from every art festival they
    visit, all while managing a modest retirement budget.
background:
  cultural: Olivia is a lifelong white Midwesterner whose family traces its roots to Scandinavian (predominantly Swedish) and German immigrants who settled in Minnesota in the early 20th century. Raised
    on a modest farm near Rochester, she grew up in a Lutheran household that emphasized community service, humility, and a practical curiosity about the world. Her upbringing immersed her in seasonal traditions
    such as summer barn dances, the state fair, and church potlucks featuring regional staples like hotdish and wild rice. These experiences instilled in her a strong sense of self‑reliance, friendliness,
    and a deep appreciation for the natural landscape and cultural heritage of rural Minnesota.
