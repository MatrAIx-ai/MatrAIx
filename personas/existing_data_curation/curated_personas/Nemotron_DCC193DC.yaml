  career_goals: While retired, Olivia aims to remain an active cultural catalyst in Kenyon. She plans to mentor younger volunteers at the senior center, guide aspiring artists in curating local exhibits,
    and develop a small documentary of the town’s history using her new digital‑photography skills. Olivia also hopes to complete a series of watercolor paintings inspired by Midwestern landscapes and eventually
    publish a family genealogy book that preserves her ancestors’ stories for future generations. Further, she aspires to serve on the board of the Steele County Arts Council, championing intergenerational
    art programs and promoting accessible cultural events for all residents.
