  career_goals: Jerry dreams of becoming an astronaut or an engineer, imagining himself designing rockets and exploring space. He also admires firefighters for their hands‑on problem solving and hopes to
    help others one day. His high standards and competitive spirit drive him to aim for excellence in any future role, and he often talks about leading group projects or building impressive inventions.
