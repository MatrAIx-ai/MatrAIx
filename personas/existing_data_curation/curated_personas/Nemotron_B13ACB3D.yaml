personas:
  professional: Jerry Bennett, a budding junior architect of block towers, applies meticulous organization and disciplined planning to construct intricate LEGO cities, critically evaluates each design to
    outdo peers, and habitually uses a hand‑drawn checklist to ensure every piece meets their high standards.
  sports: Jerry Bennett, a lively member of the Oldtown Little Leaguers baseball club, swings their bat with competitive zeal while idolizing the Baltimore Orioles, and during winter months they lace up
    skates for the Allegany County youth hockey program, eagerly watching the Washington Capitals for inspiration.
  arts: Jerry Bennett, an enthusiastic participant in their church’s Sunday school drama club, loves humming the folk ballads of the Carter Family, sings along to Raffi’s upbeat tunes, and spends afternoons
    drawing scenes inspired by Disney’s Frozen and the animated series Bluey.
  travel: Jerry Bennett, a curious five‑year‑old, enjoys weekend road trips to Assateague Island to chase wild ponies and to Washington, D.C. for museum adventures, while dreaming of a future family vacation
    to Orlando’s Walt Disney World where meeting Mickey Mouse fuels their vivid imagination.
  culinary: Jerry Bennett, a budding kitchen helper who can crack eggs for their favorite blueberry pancakes, adores the comforting taste of mac & cheese with extra cheddar, delights in the tangy crunch
    of fried green tomatoes at the county fair, and frequently demands a side of carrots, insisting they provide superhero strength.
  core: Jerry Bennett, a hyper‑organized five‑year‑old with a competitive streak, obsessively lines up their toy trucks in perfect rows, hoards stickers as trophies, negotiates extra allowance for more
    crayons, and channels boundless energy into leading playground games while fiercely championing the Baltimore Orioles.
background:
  cultural: Jerry is raised in a white, middle‑class family in Oldtown, Maryland, a small community in Allegany County with Appalachian influences. His upbringing includes typical American traditions such
    as celebrating Thanksgiving, the Fourth of July, and attending a local Methodist church. Community events like the county fair and church gatherings emphasize close family ties, outdoor activities,
    and a blend of Appalachian folk music and storytelling, all of which shape his social outlook and values.
