  career_goals: Rodrigo aims to transition from employee to owner by establishing his own painting and paper‑hanging contracting firm within the next three years. He plans to obtain a Missouri contractor’s
    license and secure additional certifications from the American Painting Contractors Association, focusing on eco‑friendly paint application and advanced decorative techniques. His ambition includes
    hiring and mentoring two apprentices, expanding services to include eco‑conscious, low‑VOC paint solutions, and eventually opening a small paint‑supply shop that caters to both professionals and DIY
    homeowners. Financial stability for his wife and children, a strong local reputation for reliability and quality, and a leadership role in the regional painters’ union are also key objectives.
