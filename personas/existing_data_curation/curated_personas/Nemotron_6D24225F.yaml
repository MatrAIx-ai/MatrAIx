  career_goals: Claudia aims to transition into a senior consulting role that emphasizes independent design work on resilient, climate‑adaptive infrastructure, allowing her to focus on solitary tasks while
    contributing to sustainable projects. She seeks to deepen her expertise in coastal engineering, secure her Professional Engineer (PE) license, and develop mentorship programs that support engineers
    dealing with anxiety. Ultimately, she aspires to author a guide on managing engineering projects while maintaining mental well‑being and to influence company policies toward healthier work environments.
