personas:
  professional: Yvonne Abner, a 13‑year‑old aspiring writer and budding amateur botanist, channels their methodical mind and love of solitary reflection into crafting short mystery stories and meticulous
    garden journals, always adhering to a self‑made schedule of daily writing and plant‑care.
  sports: Yvonne Abner participates in the local swimming club and joins the school cross‑country team for practice, cheers for the Mississippi State Bulldogs basketball team and the New Orleans Saints
    on game days, and prefers solo jogging along the nearby woods as their primary fitness outlet.
  arts: Yvonne Abner, an avid reader of Toni Morrison, Agatha Christie, and historical fiction, sketches serene watercolors of the Mississippi delta inspired by Claude Monet, and unwinds to the soulful
    sounds of Aretha Franklin and Marvin Gaye, often humming along while she paints.
  travel: Yvonne Abner enjoys family trips that follow a detailed itinerary, having explored the historic streets of Natchez, Mississippi and the colonial charm of Charleston, South Carolina, while dreaming
    of strolling through the cobblestone alleys of Savannah, Georgia and the grand cathedrals of Paris, yet prefers destinations that offer quiet gardens or libraries for solitary reflection.
  culinary: Yvonne Abner delights in cooking herb‑infused lemon pasta topped with home‑grown basil and thyme, savors a bowl of shrimp gumbo seasoned with okra and a pinch of cayenne, and occasionally treats
    themselves to a slice of rich chocolate cake, always tasting the fresh garden flavors they cultivated themselves.
  core: Energetic yet introverted, Yvonne Abner blends a methodical love for puzzles with a tender, sometimes anxious heart, often losing sleep over unsolved crosswords while hoarding a secret stash of
    scented candles that help calm their nerves.
background:
  cultural: Yvonne comes from a Black Southern family rooted in Covington County, Mississippi. Her upbringing is shaped by the close‑knit community of Prentiss, where church life, family gatherings, and
    shared meals are central. She grew up hearing gospel choirs and the stories of the civil‑rights movement from relatives, fostering a strong sense of identity and resilience. Family traditions include
    cooking Southern comfort foods such as fried catfish, collard greens, and cornbread, as well as seasonal celebrations like Juneteenth and church picnics. Yvonne’s cultural heritage emphasizes respect,
    cooperation, and a collective responsibility to support one another, values she carries into school and her friendships.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Detailed note‑taking'', ''Basic computer proficiency (Word, Excel, online research)'', ''Methodical problem solving (Math, Science)'', ''Empathy
    and active listening'', ''Written communication (Journaling, storytelling)'']'
  hobbies: '[''Reading (mystery, historical fiction, African‑American literature)'', ''Journaling'', ''Watercolor painting and sketching'', ''Gardening (herbs, flowers)'', ''Puzzle solving (crosswords,
    Sudoku, jigsaw puzzles)'', ''Listening to gospel and R&B music'', ''Single‑player puzzle video games'']'
  career_goals: Yvonne aspires to a career that blends structure, solitude, and service to others. She envisions attending a university where she can study library science or education, aiming to become
    a school librarian who curates quiet learning spaces and assists students with research. She also considers a future in child counseling, motivated by her own emotional experiences and desire to help
    peers manage anxiety. In the long term, Yvonne hopes to obtain a bachelor's degree, acquire professional certification in her chosen field, and work in a supportive, organized environment that allows
    her to make a positive impact while maintaining a predictable schedule.
