persona_description: A scientist who has moved frequently between different locations in pursuit of academic and professional opportunities, and whose work has been influential in the fields of medicine
  and technology. The scientist has a keen interest in the diffusion of scientific knowledge across time and space, and has conducted research on the effects of scientific movement on patent activity. The
  scientist is interested in the role of research hubs in fostering productive interactions among researchers and technologists, and has published papers on the topic. The scientist has a strong background
  in the fields of medicine and technology, and has conducted research on the impact of scientific movement on the flow of scientific knowledge. The scientist is interested in the dynamics of knowledge
  around research hubs, and has accumulated a fascinating new dataset that sheds light on the nature of interactions whereby academic researchers learn from each others work.
