  hobbies: '[''Street‑art photography'', ''Attending live music and dance events'', ''Salsa/cumbia dancing'', ''Volunteering at youth art workshops'', ''Cooking Mexican cuisine'', ''Hosting communal gatherings'',
    ''Skateboarding'', ''Multiplayer gaming'', ''Reading speculative fiction and graphic novels'']'
  career_goals: Fabian aspires to build a career that fuses his love for art, community, and communication. In the next three years he plans to complete a bachelor's degree in Arts Management or Communications,
    with a focus on cultural programming. He aims to secure a role as an arts administrator or community outreach coordinator at a museum, cultural center, or nonprofit that serves the Latino community
    in Los Angeles. Long‑term, Fabian envisions launching his own nonprofit arts incubator that provides mentorship, studio space, and exhibition opportunities for underserved Mexican‑American youth. He
    also hopes to develop a digital platform that highlights emerging Chicano artists, leveraging his social media expertise to amplify their voices nationally.
