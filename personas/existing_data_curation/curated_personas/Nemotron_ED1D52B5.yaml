  hobbies: '["listening to nursery rhymes and gospel lullabies","dancing to rhythmic music","peek‑a‑boo and interactive games","exploring tactile toys (soft blocks, sensory balls)","attending baby music
    classes","visiting local parks with family"]'
  career_goals: While still an infant, Samuel’s caregivers have observed his fascination with rhythmic sounds, bright colors, and storytelling. They encourage his natural desire to be the center of attention,
    envisioning future ambitions such as becoming a performer (singer/dancer) or a community educator who can inspire others with his expressive personality. As he grows, these early interests may evolve
    into more defined career goals related to the arts, public speaking, or mentorship.
