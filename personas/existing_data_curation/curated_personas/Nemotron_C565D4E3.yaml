  hobbies: '[''watercolor painting'', ''mixed-media art'', ''reading speculative fiction'', ''book club participation'', ''gardening'', ''cooking'', ''potluck hosting'', ''community theater acting'', ''set
    design'', ''road trips to art festivals'']'
  career_goals: She hopes to establish a small community art studio in Garner where seniors and young people can collaborate on creative projects, and to compile a collection of her own artwork and poems
    into a self‑published book. She also aims to develop a regular mindfulness circle to help others manage stress, reflecting her own desire for emotional balance. In the next few years, she wants to become
    a volunteer docent at the nearby historic museum, sharing local history with visitors, and to mentor a high‑school art class.
