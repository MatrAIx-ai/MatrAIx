personas:
  professional: Jeniene Boyd, a 63‑year‑old visual artist and community facilitator, they blend watercolor and mixed‑media collage in lively workshops, orchestrate low‑pressure art fairs, mentor youth writers,
    and aspire to launch a senior‑youth collaborative studio in Garner while preparing to serve as a docent at the historic museum.
  sports: Jeniene Boyd enjoys gentle morning walks through their native wildflower garden, they follow the Iowa Hawkeyes football team, and occasionally join the local senior softball league, while cheering
    at Iowa Cubs games whenever the team plays in Des Moines.
  arts: Jeniene Boyd frequents the Garner Art Center, they cite watercolor master Mary Whyte and speculative fiction author N.K. Jemisin as inspirations, participate in community theater productions as
    both actor and set designer, and delight in listening to folk singer Gillian Welch while sketching countryside vistas.
  travel: Jeniene Boyd prefers spontaneous day‑trips to regional events such as the Iowa State Fair, Pella Tulip Festival, and Cedar Rapids Art Walk, they dream of a weekend getaway to the Blue Ridge Mountains,
    and always pack a sketchbook to capture new scenery.
  culinary: Jeniene Boyd lovingly prepares family classics like pork tenderloin with apple preserves, cornbread, and wildflower honey‑glazed chicken, they incorporate fresh herbs from their garden into
    salads, and enjoy hosting potluck dinners where they swap recipes with neighbors.
  core: Jeniene Boyd blends a vivid imagination with a relaxed approach, they often lose a paintbrush in their garden while worrying about upcoming deadlines, yet find calm in wildflower patches and community
    laughter.
background:
  cultural: Jeniene grew up in a Midwestern white farming family in Iowa, where community and modesty were core values. Her upbringing emphasized church involvement, hospitality, and a deep connection to
    the land. She carries the traditions of small‑town life—attending local fairs, participating in church choir, and valuing neighborly support—while also embracing a curiosity for broader artistic and
    intellectual experiences. Her cultural identity blends conventional Midwestern values with a personal passion for creativity and lifelong learning.
