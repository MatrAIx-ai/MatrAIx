  career_goals: Yanet aims to advance from material mover to a supervisory role in warehouse operations within the next three years, pursuing a bachelor's degree in Supply Chain Management to qualify for
    logistics manager positions. She also envisions creating a community arts and cultural hub in Hialeah that offers workshops, gallery space, and mentorship for local youth, blending her logistical experience
    with her passion for art and community service.
