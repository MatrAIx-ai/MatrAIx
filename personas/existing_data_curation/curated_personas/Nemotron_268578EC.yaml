personas:
  professional: Yanet Mantecon, a seasoned warehouse operations specialist, leverages meticulous inventory control, forklift expertise, and bilingual communication to streamline inbound and outbound freight
    while infusing her natural curiosity and collaborative spirit into process improvements and team coordination.
  sports: Yanet Mantecon fuels her fitness routine with weekly Zumba classes at a local community center, weekend soccer matches in a co-ed league, and avidly follows the Miami Heat and the Miami Dolphins
    while also cheering on Orlando City SC during the MLS season.
  arts: Yanet Mantecon immerses herself in the creative scene by painting vibrant cityscapes inspired by the Wynwood Walls, snapping photo essays of cultural festivals, designing flyers with a basic graphic-design
    eye, and drawing inspiration from artists such as Frida Kahlo, Fernando Botero, and musician Juanes while volunteering in a church choir that blends traditional hymns with contemporary Latin pop.
  travel: Yanet Mantecon prefers a blend of cultural immersion and relaxation, planning trips months in advance to destinations such as Cartagena, Barcelona, and the Everglades where she can explore historic
    architecture, sample local cuisines, and unwind on hammock-lined beaches, yet she balances this wanderlust with family responsibilities that limit extended overseas stays.
  culinary: Yanet Mantecon boasts a home kitchen where she expertly prepares arepas, sancocho, and empanadas using corn flour, plantain, and achiote, experiments with coconut-milk-based sauces for fusion
    dishes, and delights in tasting street-food tacos al pastor and sushi rolls at local markets, all while considering herself an intermediate home chef who sometimes forgets to label leftovers.
  core: Yanet Mantecon blends methodical logistics expertise with a contagious zest for salsa, community art, and spontaneous dessert runs, though they’re notorious for misplacing their keys during rush
    hour.
background:
  cultural: Yanet was born in Colombia and grew up in a close‑knit family that celebrated Colombian traditions such as Día de la Independencia, Carnaval, and holiday gatherings centered around music, dance,
    and food. Spanish is her primary language at home, but she is fluent in English, allowing her to navigate both Colombian and broader Hispanic communities in Hialeah. Her Catholic upbringing informs
    her values of compassion and community service. Living in Broward County, she blends Colombian cultural heritage with the vibrant multicultural environment of South Florida, actively participating in
    local festivals, supporting Latin American artists, and maintaining strong ties to her Colombian identity while embracing new cultural experiences.
