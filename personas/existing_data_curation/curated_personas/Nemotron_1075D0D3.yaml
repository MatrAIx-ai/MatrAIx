  hobbies: '["Hiking and nature walks", "Woodworking", "Playing piano", "Reading mystery and sci‑fi novels", "Community math tutoring", "Chess", "Bicycle riding", "Cooking family meals", "Attending local
    high school football games", "Puzzle solving", "Gardening"]'
  career_goals: Peter aims to secure a tenure‑track professorship at a regional university, where he can build an interdisciplinary research program that links mathematics with engineering and environmental
    science. Over the next five years, he plans to publish in top-tier journals, obtain a major NSF grant, and mentor graduate and undergraduate students. He also aspires to develop a community outreach
    initiative that brings applied math workshops to local schools and small businesses. Long‑term, he envisions becoming department chair, shaping curriculum to emphasize real‑world problem solving while
    maintaining a healthy work‑life balance for his family.
