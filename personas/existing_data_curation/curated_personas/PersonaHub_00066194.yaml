persona_description: A historian who is interested in the lives of women and their contributions to healing work during the late seventeenth through early nineteenth centuries. This persona is likely to
  have a strong interest in early American history, specifically in the areas of medicine, women's history, and the role of women in society. They are also likely to have a deep understanding of the context
  in which women's healing work took place, including the low literacy rates for women and African Americans at the beginning of the nineteenth century, and the need for skilled healers. This persona is
  also likely to have a keen interest in the experiences of enslaved women and their role in the healing work of their communities.
