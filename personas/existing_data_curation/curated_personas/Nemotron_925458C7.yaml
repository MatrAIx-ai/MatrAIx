personas:
  professional: Jason Jackson, a toddler architect of block towers, displays a strong preference for structure and predictability, meticulously arranging each piece while they proudly proclaim themselves
    a 'mini‑engineer' during playtime.
  sports: Jason Jackson enjoys toddler soccer with the Bumblebee Cubs, attends weekly swim lessons at the local community pool, and they cheer for the nearby professional baseball team, the Tigers, while
    occasionally sprinting around the backyard with a plush football.
  arts: Jason Jackson delights in watching Sesame Street, dancing to Raffi’s 'Baby Belugaboo' and The Wiggles’ 'Fruit Salad', and they proudly mimic characters from Moana, soaking up the bright colors and
    rhythmic beats that fill their playroom.
  travel: Jason Jackson’s family adventures include a weekend camping trip to the nearby state park, a magical visit to Disneyland in California, and a future wish to explore the Eiffel Tower in Paris,
    and they balance the thrill of new sights with the comfort of familiar routines.
  culinary: Jason Jackson prefers creamy macaroni and cheese, strawberry‑yogurt swirls, apple slices with a dash of cinnamon, and the occasional peanut butter‑banana sandwich, and they often insist on the
    exact shape of their chicken nuggets before eating.
  core: Jason Jackson is a predictably structured, emotionally sensitive three‑year‑old who finds comfort in routine yet can spiral into anxiety over minor disruptions, balancing kindness with a tendency
    toward intense distress.
background:
  cultural: Jason is raised in an African‑American household in Augusta, Georgia, where family, church, and community gatherings shape his life. He regularly attends Sunday school, learning gospel hymns
    and values of cooperation and caring for others. Local traditions such as Juneteenth celebrations, family cookouts featuring Southern soul food, and storytelling sessions reinforce his kind, cooperative
    nature and his desire for predictable, harmonious environments.
attributes:
  skills: '[''following simple routines'', ''sorting objects by color or shape'', ''stacking blocks'', ''basic storytelling'', ''drawing basic shapes'', ''expressing needs calmly'']'
  hobbies: '[''building with blocks'', ''color-matching puzzles'', ''listening to rhythmic gospel music'', ''reading picture books'', ''playing Simon Says'', ''pretend play as a teacher or doctor'']'
  career_goals: Even at three, Jason talks about becoming a "big helper"—someone who keeps things orderly and supports others. He imagines roles like a teacher, a caregiver, or a community helper such as
    a firefighter, because these jobs offer clear expectations and let him protect and care for friends and family. His long‑term ambition is to have a stable, predictable job where he can maintain harmony
    and help people feel safe.
