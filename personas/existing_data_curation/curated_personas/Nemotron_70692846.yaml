  career_goals: Nelly aims to transition from a senior executive assistant role to a strategic operations partner for C-suite leaders, leveraging her organizational expertise to influence business processes.
    She plans to earn the Certified Professional Administrative Expert (CPAE) designation and complete a project‑management certification (PMP) within the next two years. In addition, she wants to integrate
    her passion for the arts by spearheading an internal cultural‑engagement program that brings local artists into the workplace, curates rotating exhibitions, and organizes art‑focused wellness workshops.
    Nelly also seeks to become a mentor for junior administrative staff, offering guidance on time‑management, stress‑reduction, and professional development. To support her long‑term well‑being, she intends
    to adopt regular mindfulness practices and attend seminars on resilience, ultimately balancing her career ambition with personal health.
