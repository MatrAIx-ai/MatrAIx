personas:
  professional: Kelly Yip, a 23-year-old administrative assistant at a fast-growing tech startup in Lincoln, they leverage their STEM bachelor’s training to streamline data pipelines, draft technical documentation,
    and coordinate meetings while rapidly mastering new productivity tools, positioning themselves for a future research coordinator role.
  sports: Kelly Yip, a 23-year-old Nebraskan, they jog the Lincoln Parks Trail with a local running club, attend Nebraska Cornhuskers football games on weekends, play recreational volleyball at the community
    center, and follow the Omaha Storm Chasers minor-league baseball team for a dose of hometown sport.
  arts: Kelly Yip, 23, they cultivate creativity by painting prairie sunsets, snapping photos of cornfield horizons, attending monthly gallery openings featuring artists like Shepard Fairey, and winding
    down with indie folk playlists from Bon Iver and The National while sipping matcha lattes.
  travel: Kelly Yip, a 23-year-old adventure-seeker, they prefer weekend road trips to the Badlands and Colorado’s Rocky Mountain trails, budget carefully to stay in affordable Airbnbs, dream of hiking
    Iceland’s glaciers, and occasionally join tech meetups in Seattle when a conference aligns with a vacation.
  culinary: Kelly Yip, 23, they love cooking hearty quinoa-black-bean chili for potlucks, savoring Nebraska pork tenderloin with apple butter glaze, indulging in spontaneous trips to local farmers’ markets
    for heirloom tomatoes, and treating themselves to matcha-infused desserts after long days of data work.
  core: Kelly Yip, a 23-year-old blend of data-driven pragmatism and social spark, they organize their life with color-coded calendars, fuel curiosity through podcasts, and occasionally over-commit to trivia
    nights, leaving a trail of coffee-stained notes and spontaneous group gatherings.
background:
  cultural: Kelly was raised in a middle‑class Midwestern family in Lincoln, Nebraska. Her white Anglo‑German heritage, combined with the inclusive atmosphere of her community, has instilled values of hard
    work, modesty, and cooperation. She embraces Midwestern traditions—celebrating holidays with family gatherings, supporting local farms, and engaging in community events—while staying open to diverse
    perspectives through the university’s multicultural environment.
