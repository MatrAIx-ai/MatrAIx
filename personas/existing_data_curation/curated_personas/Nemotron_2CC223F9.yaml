    for balance and wellness'', ''Exploring local art galleries and museums'']'
  career_goals: Kelly aims to transition from a general administrative role to a specialized position such as research coordinator or office manager within a tech‑focused or scientific organization. She
    plans to earn certifications in office management (CAP) and project coordination, deepen her data‑analysis skills, and eventually lead a multifunctional team. Long‑term, she envisions pursuing an MBA
    or a master’s in health administration to broaden her strategic impact while still leveraging her technical foundation.
