  career_goals: Leedrick aims to shift from daily brokerage to a senior advisory role, focusing on mentoring emerging agents and establishing a boutique consultancy that specializes in sustainable luxury
    homes along the Monterey coast. He plans to author a guide for senior clients navigating high‑end real‑estate transactions, develop a scholarship supporting underrepresented youth entering the real‑estate
    field, and expand his digital footprint through cutting‑edge virtual‑tour technology. Ultimately, he seeks to leave a legacy of ethical, community‑focused practice that honors both tradition and innovation
    in Pebble Beach.
