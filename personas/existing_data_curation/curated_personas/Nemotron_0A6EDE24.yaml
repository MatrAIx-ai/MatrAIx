  career_goals: Brent plans to solidify his foundation with a high‑school equivalency credential within the next twelve months, then enroll in the automotive technology program at Lehigh Carbon Community
    College. He aims to secure an apprenticeship at a local repair shop where he can earn a certified automotive service technician title. Parallel to his formal training, he wants to build a modest side
    business customizing car audio and infotainment systems, leveraging his experience with PC building and electronics. Over the next five years, he envisions expanding this venture to include residential
    electrical work after completing an electrician’s apprenticeship, thereby merging his curiosity for electronics with a reliable, community‑oriented career. Ultimately, Brent hopes to own a small shop
    that offers both mechanical repairs and tech upgrades, providing stable income while staying engaged with the practical problem‑solving he enjoys.
