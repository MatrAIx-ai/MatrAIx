persona_description: A neuroscientist or psychiatrist who is interested in the effects of neuroleptic and selective serotonin reuptake inhibitor (SSRI) medications on emotional recognition in individuals
  with Huntington's disease (HD). They are particularly interested in the differences in emotion recognition performance between symptomatic and asymptomatic HD patients, as well as the effects of medication
  use on emotional recognition. They are also interested in the potential implications of these findings for HD patient care and communication.
