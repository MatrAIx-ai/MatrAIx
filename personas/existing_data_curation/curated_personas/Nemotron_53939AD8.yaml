  hobbies: '["Painting (abstract and mixed media)","Cooking and recipe experimentation","Reading (fiction, philosophy, poetry)","Attending concerts and live performances","Volunteer work at senior centers","Dance
    classes (salsa, contemporary)","Hiking and nature walks","Herb gardening"]'
  career_goals: Arasay aims to deepen her involvement in the local arts community by curating a monthly multicultural art showcase at the Colorado Springs community center and by publishing a collection
    of short stories that weave together Mexican folklore and her experiences in the American Southwest. She hopes to serve as a cultural liaison, fostering connections between Mexican‑American residents
    and broader community groups, and to mentor younger adults interested in art, cooking, and storytelling. Additionally, she aspires to lead a community garden project that integrates herb cultivation
    for culinary use and provides a gathering space for intergenerational learning.
