    Hispanic community'', ''Mentoring and precepting new nurses'']'
  hobbies: '[''Reading historical novels'', ''Gardening (herbs and native plants)'', ''Knitting and crocheting'', ''Traditional Mexican cooking'', ''Birdwatching at Laguna Madre'', ''Walking nature trails'',
    ''Crossword and sudoku puzzles'', ''Gentle yoga and meditation'', ''Listening to regional Mexican folk music'', ''Volunteering at community health fairs (low-key role)'']'
  career_goals: Monica aims to leverage her extensive experience to become a lead nurse for a community outreach program focused on diabetes education for the Hispanic population in Cameron County. She
    is pursuing certification in wound care and geriatric nursing to deepen her expertise. Over the next few years, she hopes to serve as a preceptor for new nurses, champion culturally competent care,
    and transition to a part‑time supervisory role that allows her to maintain a balanced, low‑stress schedule while continuing to provide high‑quality patient care. Additionally, she aspires to develop
    bilingual health education materials and advocate for improved access to preventive services in her community.
