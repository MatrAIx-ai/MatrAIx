  hobbies: '[''Hiking'', ''Gardening'', ''Reading historical non-fiction'', ''Book club participation'', ''Digital photography'', ''Volunteer at public library'', ''Crossword puzzles'', ''Knitting'', ''Genealogy
    research'', ''Community workshops'']'
  career_goals: Looking ahead, Mary aims to transition into a part‑time mentorship and consulting role, sharing her decades of experience with emerging analysts and small local businesses. She hopes to
    establish a community technology resource center in Canton that offers digital literacy workshops for seniors and preserves local historical records through digital archiving. She also plans to earn
    certifications in cloud services and data governance to stay current, while gradually reducing full‑time responsibilities as she approaches retirement, ensuring a smooth knowledge transfer and lasting
    impact on her community.
