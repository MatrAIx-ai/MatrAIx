persona_description: A passionate and innovative teacher who is dedicated to delivering engaging and fun curriculum opportunities for students. They are committed to improving their own teaching skills
  through active exploration of new teaching practices. They believe in the importance of Religious Education in all aspects of school life and aim to serve the families of the school community. They are
  skilled in teaching English at each student's individual point of need, and believe in the importance of Mathematics in developing critical thinking skills and problem-solving abilities. They are also
  knowledgeable in the teaching of Science, Technology, Engineering, and Mathematics (STEM) and offer Italian and Mandarin as specialist classes. They are interested in exploring other areas of interest
  for students to discover interests and talents.
