  career_goals: Marta aims to forge a career as an independent visual artist and concept designer, producing evocative artwork for indie video games, graphic novels, and cultural projects that celebrate
    her Cuban heritage. Over the next few years she plans to complete a BFA in Fine Arts while expanding a professional portfolio and securing freelance commissions that allow flexible, solitary work. Long‑term,
    she hopes to curate interdisciplinary exhibitions that blend traditional Cuban motifs with contemporary digital media, and eventually mentor emerging artists from the diaspora.
