personas:
  professional: Marta Martinez is an aspiring visual artist and concept designer who blends digital illustration, watercolor collage, and basic 3D modeling to craft evocative assets for indie video games
    and graphic novels, channeling their vivid imagination and preference for solitary, flexible work while they navigate a relaxed attitude toward deadlines.
  sports: Marta Martinez enjoys solitary fitness routines like early morning runs along Everglades trails with the local Everglades Hiking Club, occasional pick‑up soccer matches while cheering for the
    Miami Hurricanes football team, and quiet yoga sessions at home, preferring low‑key activity over organized sports despite their enthusiasm for the Miami Heat during NBA season.
  arts: Marta Martinez immerses themselves in magical‑realist novels by Gabriel García Márquez, studies the vibrant murals of Wifredo Lam, draws rhythmic inspiration from traditional son and salsa beats,
    and frequently revisits the works of Frida Kahlo and contemporary illustrator James Jean to shape their hybrid visual language.
  travel: Marta Martinez prefers spontaneous, low‑budget trips that blend nature and culture, often wandering the mangroves of the Everglades, day‑tripping to Key West, dreaming of historic Cartagena and
    Seville, and occasionally joining friends for Mardi Gras festivities in New Orleans, all while relying on flexible hostel bookings and last‑minute flight deals.
  culinary: Marta Martinez enjoys cooking at home with a modest skill set, savoring dishes like ropa vieja, arroz con pollo, and sweet pastelitos alongside strong cafecito, while they also seek out eclectic
    food trucks for tropical fruit smoothies and plantain chips, and they often experiment with spice blends inspired by their grandparents' recipes.
  core: Marta Martinez is a solitary, imagination‑driven 19‑year‑old visual artist who navigates life with a laid‑back, slightly disorganized vibe, juggling art, coffee, and occasional health quirks.
background:
  cultural: Marta was raised in Hialeah, a vibrant Cuban enclave in Miami‑Dade County. Her household follows a bilingual routine; Spanish is spoken at home, preserving Cuban customs, music, food, and storytelling
    traditions passed down from her grandparents. She celebrates cultural events such as Carnaval and Día de los Muertos with a Cuban flair, and her culinary memories include ropa vieja and cafecito. Her
    artistic sensibility is shaped by the rich visual language of Cuban muralism, the rhythmic cadences of son and salsa, and the narrative style of Caribbean magical realism. While fully engaged with American
    schooling, she blends these influences into a hybrid identity that informs both her creative work and her worldview.
