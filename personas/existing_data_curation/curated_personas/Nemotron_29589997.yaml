  hobbies: '[''Gardening'', ''Beach walks'', ''Church choir singing'', ''Bingo hosting'', ''Quilting and crochet'', ''Cooking and preserving'', ''Senior center volunteer activities'', ''Historical society
    tours'']'
  career_goals: Although retired, Dania aims to deepen her impact on the Lake Worth senior community. She plans to become a liaison for the Lake Worth Senior Center, develop a mentorship program that pairs
    new volunteers with experienced seniors, and launch a modest home‑based business selling her homemade preserves and handcrafted quilts. Additionally, she wants to complete a short digital‑literacy course
    to enhance her ability to stay in touch with grandchildren and to manage community newsletters online.
