personas:
  professional: Dania Sanner is a retired home manager turned senior‑center liaison who leverages her organizational talent, budget‑savvy, and volunteer coordination experience to run weekly bingo nights,
    schedule garden‑club events, and mentor new volunteers, all while maintaining a calm, methodical approach.
  sports: Dania Sanner enjoys low‑impact activities, attending Fort Lauderdale Strikers soccer matches with her husband, cheering for the Miami Marlins during spring training, and participating in weekly
    water aerobics at the Lake Worth senior center, while also tending a vegetable garden she likens to her personal “green” league.
  arts: Dania Sanner’s artistic soul shines in the church choir where she sings hymns by Mahalia Jackson and contemporary gospel, she collects quilts by Rosie Lee, enjoys the paintings of Mary Cassatt at
    the Norton Museum, and often watches classic films starring Doris Day on Friday movie nights.
  travel: Dania Sanner prefers organized group trips, having joined a senior tour to Savannah’s historic squares and a cruise to the Bahamas where she relished the pastel‑colored streets of Nassau, while
    she dreams of a road trip down the Pacific Coast to see the redwood forests, always planning itineraries months in advance.
  culinary: Dania Sanner loves cooking family recipes like her grandmother’s chicken and dumplings, preserving peach preserves with a pinch of bourbon, and baking blueberry cobbler with fresh berries from
    her garden, while she carries a playful habit of over‑seasoning her soups with extra pepper.
  core: Dania Sanner blends a steadfast love for community structure with a warm, hospitable spirit, guiding seniors through organized events, managing finances prudently, and sprinkling every day with
    quilting, choir harmonies, and a pinch of peppery humor.
background:
  cultural: Dania grew up in a mid‑Atlantic white family that valued hard work, routine, and community involvement. Her upbringing emphasized modesty, hospitality, and participation in church and local
    civic groups. After moving to Lake Worth Beach, she embraced the relaxed, multicultural atmosphere of coastal Florida while preserving her traditional values. Her cultural identity blends a nostalgic,
    family‑centric background with the vibrant, senior‑friendly lifestyle of Palm Beach County, reflected in her dedication to volunteer service, group gatherings, and maintaining a structured yet warm
    home environment.
