personas:
  professional: Lisa Tegreeny, a 16‑year‑old high‑school junior, blends their vivid imagination with disciplined project‑planning to produce polished digital illustrations and concept sketches, while their
    sociable nature makes them a natural collaborator on school art projects and community theater set designs.
  sports: Lisa Tegreeny, an energetic member of their high‑school cheer squad and avid hiker of the Texas Hill Country, stays fit by attending after‑school dance practice, weekend trail runs, cheering on
    the Austin FC soccer club, and occasionally training with the Georgetown Youth Trail Club for cross‑country endurance.
  arts: Lisa Tegreeny, a prolific sketcher and digital illustrator, draws inspiration from Studio Ghibli’s Hayao Miyazaki, the fantasy realms of J.R.R. Tolkien, and the acoustic melodies of Jack Johnson,
    channeling these influences into original concept art and short stories while assisting with set designs for community theater productions.
  travel: Lisa Tegreeny, a curiosity‑driven teen, organizes weekend road trips to the Hill Country’s Enchanted Rock and dreams of a summer backpacking adventure through Kyoto’s art districts in Japan and
    Utah’s Zion National Park, balancing school commitments with a modest family travel budget.
  culinary: Lisa Tegreeny, an enthusiastic home cook with moderate skill, often whips up avocado‑lime tacos, homemade basil pesto pasta, and dragon‑fruit smoothies, favoring fresh cilantro, jalapeños, and
    locally sourced cheese while occasionally treating friends to a DIY pizza night.
  core: Lisa Tegreeny, a 16‑year‑old visual storyteller, juggles a love for fantasy art with a habit of hoarding sketchbooks, a tendency to procrastinate on schoolwork until midnight, and a relentless drive
    to turn dreams into designs.
background:
  cultural: Lisa grew up in Georgetown, Texas, a suburban community in Williamson County known for its blend of small‑town friendliness and proximity to Austin’s vibrant arts scene. Her family, of Anglo‑American
    descent, emphasizes community involvement, hospitality, and a strong work ethic. She attends a local middle school where group projects and extracurricular clubs are central, and she participates in
    church‑based service activities and town festivals that celebrate Texas traditions such as barbecue, live music, and seasonal parades. This environment nurtures her collaborative spirit, love for group
    activities, and appreciation for both local heritage and contemporary artistic expression.
