  career_goals: Lisa aims to complete her high‑school education and attend an art‑focused college where she can study graphic design, illustration, or interactive media. She dreams of becoming a professional
    concept artist or UX designer, creating visual narratives for video games, films, or digital products. In the long term, she hopes to lead community art workshops in Georgetown and possibly open her
    own studio that integrates art education with local cultural initiatives.
