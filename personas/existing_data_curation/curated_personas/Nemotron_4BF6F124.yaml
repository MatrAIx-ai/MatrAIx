  hobbies: '[''Watercolor painting'', ''Photography (desert landscapes)'', ''Attending art festivals and gallery openings'', ''Cooking (Mexican and Mediterranean cuisine)'', ''Volunteering at community
    garden'', ''Yoga'', ''Salsa dancing'', ''Hiking'', ''Reading contemporary fiction'', ''Listening to art and design podcasts'']'
  career_goals: Anita aims to complete a bachelor's degree in art history or cultural studies, emphasizing community arts programming. She aspires to work as a program coordinator for a local museum, cultural
    center, or nonprofit arts organization in Imperial County, designing workshops and public art projects that engage youth and families. Over the next decade, she hopes to lead the creation of a community
    arts hub that fosters cross‑cultural collaboration and accessible creative education, eventually overseeing a nonprofit that bridges the region's diverse cultural heritage through art.
