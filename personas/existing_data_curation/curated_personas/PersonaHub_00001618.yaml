persona_description: A physics and astronomy professor who specializes in the construction of small molecules from gold, particularly nanoclusters, and their application in increasing solar cell performance
  by more than 10%. He is particularly interested in the potential of solar energy and the need for technological advancement to harness it more efficiently. His research is focused on the use of gold nanoclusters
  to amplify the amount of sunlight going directly into the device, and he is optimistic about the potential of his invention to make solar energy mainstream and competitive with oil.
