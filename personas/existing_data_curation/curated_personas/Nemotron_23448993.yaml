  career_goals: Maria aspires to transition into a technical leadership role where she can shape inclusive engineering cultures and champion mentorship programs. She aims to become a team lead or engineering
    manager who cultivates flexible work practices, allowing her and her colleagues to balance collaboration with focused solo work. Long‑term, Maria envisions launching a community‑focused tech consultancy
    that provides affordable digital solutions to local nonprofits and small businesses in Central Texas, leveraging her coding expertise to drive social impact while maintaining a work‑life rhythm that
    supports her personal well‑being.
