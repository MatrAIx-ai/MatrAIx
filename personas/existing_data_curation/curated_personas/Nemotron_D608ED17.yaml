  hobbies: '["Recreational Basketball", "Weekend Barbecues", "Hiking", "Fishing", "Live Music Concerts", "Road Trips", "Youth Soccer Coaching", "Trivia Nights", "DIY Home Improvement", "Cooking/Grilling",
    "Watching Football (Chicago Bears)"]'
  career_goals: Christopher aims to move into an HR Manager role within the next two to three years, positioning himself as a strategic business partner for his organization. He plans to complete a bachelor’s
    degree in Business Administration or Human Resources to complement his associate’s credential, and to earn SHRM‑CP or SHRM‑SCP certification. His ambition includes designing a company‑wide employee‑engagement
    program that blends structure with flexibility, establishing a mentorship pipeline for new hires, and eventually leading a regional HR team. In the longer term, he envisions launching a boutique HR
    consulting practice that helps small Midwestern firms streamline their workforce processes while fostering a vibrant, people‑first culture.
