persona_description: A historian who is interested in the history of exploration, exploration, and the exploration of the Ohio Valley during the 18th century. They are particularly interested in the life
  and work of Pierre-Joseph Celoron de Blainville, and the efforts made by the French to establish control over the region. They are also interested in the cultural and historical context of the region
  at the time, and how it influenced the development of the region. They are likely to have a deep understanding of the French and Indian War, and the Treaty of Paris that ended French claims on the Ohio
  Valley.
