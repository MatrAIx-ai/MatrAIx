  hobbies: '[''Gardening'', ''Woodworking'', ''Fishing'', ''Cooking traditional Latino dishes'', ''Reading local and migration history'', ''Listening to salsa and bolero music'', ''Playing chess and bridge'',
    ''Volunteering at community garden'']'
  career_goals: Although retired, Dayron’s ambitions focus on lifelong learning and community contribution. He aims to stay physically independent by maintaining his garden and workshop, master new digital
    tools to keep in touch with family, and document his family’s oral histories for future generations. He hopes to mentor younger neighbors in basic DIY repairs and traditional cooking, continue competing
    in local senior chess and shuffleboard tournaments, and volunteer regularly at the community garden to preserve both his cultural and Southern heritage.
