persona_description: A playwright who specializes in Hebrew theatre, particularly in the works of Moshe Shamir and Hanoch Levin. She has a deep understanding of the national and linguistic revival in Israel
  and the relationship between Hebrew theatre and the Zionist enterprise. Her plays often explore themes of national identity, sacrifice, and the hero's journey, and she is known for her ability to create
  characters that resonate with audiences. Her plays have been influential in shaping Israeli theatre and have paved the way for more mature drama in the country.
