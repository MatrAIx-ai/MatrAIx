persona_description: A mathematician and astronomer who is known for his work on the transit of Venus and the study of group theory, particularly subgroup theory and isomorphism problems. He was born in
  Manchester, educated at Manchester Grammar School, and was involved in the astronomy of Johannes Kepler. He was a merchant in Manchester and had a great interest in astronomy, carefully measuring the
  movements of the planets and undertaking precise astronomical calculations. He was a member of the group of astronomers from the north of England, including William Gascoigne, which was Britain's first
  followers of the astronomy of Johannes Kepler. He made significant contributions to the field of astronomy, including the observation and recording of the transit of Venus in 1639, which is now seen as
  the birth of modern astronomy in Britain. He was also interested in the size of the solar system and was the only astronomer to observe, plot, and record the transit of Venus across the Sun.
