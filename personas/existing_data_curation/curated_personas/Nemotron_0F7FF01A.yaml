  career_goals: He aims to turn his self‑built portfolio into a professional career as a multimedia artist and creative director. Over the next few years he plans to enroll in a community‑college program
    or apprenticeship in graphic design or digital media, earn a fine‑arts credential, and secure freelance contracts for illustration, branding, and video production. Long‑term, he hopes to launch a boutique
    agency that supports small New England businesses and to establish an annual street‑art festival in Topsham that showcases local talent. Travel and exposure to global art movements are also central
    to his ambition to keep his work fresh and unconventional.
