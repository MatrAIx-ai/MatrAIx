  hobbies: '[''Plein‑air painting'', ''Sculpting enrichment toys'', ''Acoustic guitar jam sessions'', ''Improvisational theater'', ''Kayaking along the Rhode Island coast'', ''Community gardening'', ''Science‑fiction
    reading'', ''Volunteering at animal rescue events'', ''Attending abstract art galleries'']'
  career_goals: Rolland aims to become a Certified Wildlife Rehabilitation Specialist while developing a regional network of enrichment designers who share his artistic approach to animal welfare. He envisions
    establishing a community‑run sanctuary on the Rhode Island coast that combines wildlife rescue, educational workshops, and public art installations. In the longer term, he hopes to influence state policy
    on animal welfare through advocacy and to mentor the next generation of caretakers, encouraging them to blend compassion with creativity in their work.
