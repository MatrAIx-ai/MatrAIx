personas:
  professional: Rolland Sorel, a 34‑year‑old wildlife caretaker at a New England rehabilitation center, blends technical animal‑care skills with a vivid imagination, designing abstract enrichment toys while
    informally mentoring volunteers, yet often wrestles with deadlines due to a spontaneous work style.
  sports: Rolland Sorel kayaks the Narragansett coastline with the Rhode Island Kayak Club, cheers the Boston Red Sox and Providence Bruins on game nights, participates in weekend beach volleyball matches,
    and attends local yoga sessions to counteract back tension from gardening.
  arts: Rolland Sorel spends Saturday afternoons plein‑air painting New England seascapes reminiscent of Monet, sculpts small enrichment objects inspired by Kandinsky’s abstract forms, strums acoustic guitar
    at informal jam sessions covering John Mayer, and joins an improv troupe that stages satirical sketches at the local community theater.
  travel: Rolland Sorel enjoys spontaneous weekend trips to Block Island and Portland, Maine, while planning a dream expedition to Iceland’s volcanic landscapes for landscape painting and a volunteer wildlife
    rescue tour in the Galápagos, balancing modest travel budgets with occasional splurges on eco‑lodges that support conservation.
  culinary: Rolland Sorel cooks from the garden, favoring ratatouille with heirloom tomatoes, sautéed zucchini with lemon‑thyme, and a vibrant quinoa‑black bean salad, experimenting with fresh herbs like
    basil and oregano, and often prepares fresh carrot sticks and puzzle toys for the animal shelter kitchen.
  core: Rolland Sorel merges relentless creativity with compassionate wildlife care, juggling spontaneous art projects, kayak adventures, and a habit of occasionally misplacing paperwork, all while dreaming
    of a coastal sanctuary that doubles as an open‑air gallery.
background:
  cultural: Rolland grew up in Narragansett, Rhode Island, a town shaped by its maritime heritage and close‑knit New England community. His family, rooted in generations of coastal workers, fostered a deep
    respect for the sea, local wildlife, and seasonal rhythms. Although identified as white, his cultural identity blends classic New England values—self‑reliance, neighborly cooperation, and an appreciation
    for nature’s simplicity—with a touch of Irish ancestry that surfaces in family storytelling and holiday traditions. The region’s emphasis on community involvement, environmental stewardship, and informal
    social gatherings has influenced Rolland’s outgoing personality and his commitment to collaborative, compassionate work.
attributes:
  skills: '[''Animal husbandry'', ''Behavioral observation'', ''Creative enrichment design'', ''Basic wildlife first‑aid'', ''Public education and outreach'', ''Team collaboration'', ''Improvisational problem
