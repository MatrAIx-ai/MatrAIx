  hobbies: '[''Sketching'', ''Digital painting'', ''Analog photography'', ''Reading science-fiction'', ''Maker workshops'', ''Tinkering with vintage electronics'', ''Hiking'', ''Mindfulness journaling'',
    ''Board-game nights'', ''Volunteer electronics recycling'']'
  career_goals: She aims to become a Certified Appliance Service Technician within two years, finish her engineering technology coursework, specialize in energy‑efficient and smart‑appliance repair, and
    eventually launch a boutique, sustainability‑focused repair service that offers personalized documentation and mentorship. Long‑term, she hopes to be recognized as an expert in green appliance maintenance,
    author instructional content, and mentor younger technicians while maintaining a balanced schedule to manage stress.
