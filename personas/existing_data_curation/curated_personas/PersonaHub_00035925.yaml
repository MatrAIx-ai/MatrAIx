persona_description: A historian who is interested in the history of Sarasota, particularly its development during the turn-of-the-century period. They are likely to have a deep understanding of the town's
  transportation history, the impact of the railroad on the town's economy and growth, and the role of the Seaboard Air Line Railway and Atlantic Coast Line Railroad in merging to form the Seaboard Coast
  Line. They are also likely to be knowledgeable about the town's cultural and social history, and the significance of the Seaboard Coast Line station on Main Street.
