personas:
  professional: Corey Mcgorry, a budding game designer at age 12, leverages their disciplined, detail‑oriented nature to craft Scratch‑based puzzle games, meticulously planning each level in a personal
    planner and iterating through systematic debugging sessions, while their reserved demeanor leads them to seek feedback primarily through online forums rather than in‑person presentations.
  sports: Corey Mcgorry, a cautious yet enthusiastic participant in the neighborhood basketball pickup league, follows the Long Island Nets and New York Knicks, schedules weekly practice at the community
    center, values teamwork in the small‑group setting, and supplements on‑court activity with a disciplined home workout routine featuring bodyweight circuits and occasional jogs along the Meadowbrook
    Park trail.
  arts: Corey Mcgorry, a diligent piano student who practices Mozart’s Sonata K 331 alongside a passion for reading Agatha Christie mystery novels, admires the film scores of John Williams and the illustration
    style of Hergé’s Tintin, spends weekends constructing intricate LEGO architectures, and channels their organized mindset into journaling sketches of scenes inspired by their readings.
  travel: Corey Mcgorry, who enjoys planned family getaways, has explored nearby destinations such as Coney Island’s boardwalk, the historic sites of Philadelphia, and a seasonal trip to the Hamptons for
    a Fourth of July fireworks celebration, while dreaming of a future study tour to Washington DC to visit the Smithsonian’s National Air and Space Museum and an international adventure to Paris’s Louvre
    to see the Mona Lisa.
  culinary: Corey Mcgorry, who delights in the comfort of homemade pepperoni pizza, can flawlessly whip up classic mac and cheese using cheddar and elbow pasta, enjoys baking chocolate chip cookies with
    a precise 12‑minute timer, and savors seasonal dishes like pumpkin pie during Thanksgiving, yet often forgets to clean the kitchen counters after cooking, leading to a lingering mess they reluctantly
    address after their piano practice.
  core: Corey Mcgorry, a methodical 12‑year‑old puzzle‑lover, balances a structured love for coding, piano, and LEGO with a habit of over‑organizing spreadsheets and occasional snack‑induced procrastination.
background:
  cultural: Corey comes from a white, middle-class family living in the suburban community of East Meadow, New York. His upbringing reflects typical Long Island values of hard work, education, and community
    involvement. Family traditions include celebrating holidays such as Thanksgiving, Christmas, and the Fourth of July, often with gatherings that emphasize togetherness and respectful behavior. The local
    public school system and community programs have shaped his respect for structure and disciplined achievement.
