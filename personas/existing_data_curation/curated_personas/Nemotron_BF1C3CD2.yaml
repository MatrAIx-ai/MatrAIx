  career_goals: Looking ahead, Michael aims to transition into a mentorship role where he can pass on his decades of OR experience to emerging analysts, particularly within the healthcare and logistics
    sectors that are vital to the Midwest economy. He hopes to lead a series of knowledge‑transfer workshops within his organization and eventually advise small‑to‑mid‑size businesses on data‑driven decision‑making
    through a consultancy arrangement. Michael also aspires to author a practical guide that distills complex OR techniques into accessible tools for non‑technical managers. Balancing these professional
    ambitions with his upcoming retirement plans, he seeks to create a lasting legacy of systematic problem‑solving while preserving more time for family, community service, and personal well‑being.
