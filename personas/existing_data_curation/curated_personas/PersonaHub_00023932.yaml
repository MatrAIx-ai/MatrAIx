persona_description: A biochemist who specializes in the study of carbohydrates and their functions in cells. She is interested in the processes by which cells link monomers together to form polymers and
  the hydrolysis reactions that occur in this process. She is also interested in the role of carbohydrates in the metabolism of lactose and the conversion of cornstarch into high fructose corn syrup. She
  is knowledgeable about the properties and functions of carbohydrates, including their role in storing genetic information, cushioning vital organs, and forming polymers. She is also knowledgeable about
  the digestion of cellulose by microorganisms in the digestive tract of animals.
