  hobbies: '["Watercolor painting", "Community quilting circle", "Hiking in the Appalachian foothills", "Volunteer work with local theater (set design, outreach)", "Book club participation", "Southern cooking
    classes and recipe experimentation", "Farmers’ market visits", "Yoga practice", "Gardening (vegetable patch)", "Playing folk guitar at gatherings"]'
  career_goals: Annette aims to progress from her current representative role to a team lead position within the next two years, focusing on building leadership and coaching capabilities. She plans to acquire
    a Customer Experience Management certification and eventually transition into a customer experience manager role, where she can shape service strategies and improve overall client satisfaction. Parallel
    to her professional growth, she is considering an associate degree in business administration to broaden her managerial skill set. Long‑term, Annette hopes to blend her passion for the arts with her
    customer‑service expertise by moving into a visitor‑services or community‑engagement role at a local museum or cultural center.
