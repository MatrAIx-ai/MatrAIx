  career_goals: Even at three years old, Catherine often imagines future roles that reflect her creative and caring nature. She dreams of becoming a painter who fills the world with bright colors, a storyteller
    who creates magical adventures for friends, or a helper who cares for animals and explores nature. As she grows, she hopes to stay in an environment that nurtures her curiosity, creativity, and kindness.
