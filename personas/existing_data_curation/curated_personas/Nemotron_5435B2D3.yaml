personas:
  professional: Kathy Park, a 19‑year‑old aspiring data analyst, leverages their bachelor’s in STEM, Python expertise, and methodical project planning to transform raw research data into actionable insights
    while balancing the patience learned as a cashier with a keen curiosity for sustainable tech solutions.
  sports: Kathy Park, an enthusiastic hiker with the Eliot Trailheads Club, spends weekends trekking coastal paths and forests, follows the Boston Celtics for basketball inspiration, and maintains fitness
    through a mix of trail runs and occasional indoor rock climbing at the local gym.
  arts: Kathy Park, an avid nature photographer inspired by Ansel Adams and a sci‑fi aficionado who watches Blade Runner 2049 and listens to Sufjan Stevens, regularly visits the Portland Museum of Art and
    organizes board‑game nights featuring titles like Terraforming Mars, weaving visual storytelling into their creative downtime.
  travel: Kathy Park, who loves weekend escapes to Maine’s Acadia National Park and has a bucket‑list spot for Iceland’s geothermal landscapes, prefers road trips with a detailed itinerary, balances adventure
    with a modest travel budget, and often shares travel photos from the Gulf of Maine on social media.
  culinary: Kathy Park, a modest home gardener, frequently cooks roasted root vegetable medleys with thyme and lemon, whips up quick stir‑fry bowls using home‑grown broccoli and tempeh, and treats themselves
    to occasional lobster rolls from a seaside shack, showcasing a blend of farm‑to‑table freshness and classic New England fare.
  core: Kathy Park, a methodical 19‑year‑old data enthusiast, fuses curiosity‑driven hikes, spreadsheet‑obsessed budgeting, late‑night coding, and occasional forgetfulness about watering their basil, yet
    never misses a deadline.
background:
  cultural: Kathy grew up in Eliot, Maine, a tight‑knit New England town with deep maritime and outdoor traditions. Her family traces its roots to several generations of Anglo‑American settlers in the region,
    embodying the local values of self‑reliance, community involvement, and appreciation for the natural environment. This cultural backdrop, combined with the modest, collaborative spirit of small‑town
    Maine, has shaped her practical outlook, love of seasonal outdoor activities, and commitment to contributing positively to her community.
