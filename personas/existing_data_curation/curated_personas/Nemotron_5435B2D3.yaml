  hobbies: '["Hiking", "Nature photography", "Reading science fiction", "Reading popular science", "Python side projects", "Raspberry Pi tinkering", "Board games", "STEM volunteer tutoring", "Gardening"]'
  career_goals: Kathy aims to transition from her part‑time retail position into a data‑focused role that leverages her STEM background. She plans to secure an internship or entry‑level data analyst position
    with a tech or environmental company in New England, followed by a master’s degree in data science or applied engineering. Her long‑term ambition is to become a senior data scientist or product manager
    who can lead interdisciplinary projects that blend practical solutions with innovative technologies, ultimately contributing to sustainable development initiatives in her community.
