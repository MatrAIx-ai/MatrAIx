personas:
  professional: Jan Schurr, an 18‑year‑old varsity volleyball captain and student‑government leader, channels her obsessive organization, Excel‑and‑Python data‑analysis chops, and confident public speaking
    into flawlessly orchestrating campus events and steering group projects toward high‑impact outcomes, all while strategically positioning herself for a logistics internship and a future PMP certification.
  sports: Jan Schurr, a competitive varsity volleyball setter who also rehearses hip‑hop choreography, dedicates her mornings to team drills, spends weekends hiking the Apalachicola trails, cheers for the
    Tampa Bay Buccaneers and the Florida Gators, and logs nightly battles in the online multiplayer arena of Apex Legends to sharpen reflexes.
  arts: Jan Schurr, a hip‑hop dance enthusiast, draws inspiration from Kendrick Lamar and Missy Elliott, curates vibrant Instagram reels featuring campus murals and community festival performances, and
    unwinds by binge‑watching indie films starring Saoirse Ronan.
  travel: Jan Schurr, an adventure‑seeking high school senior, has explored the Everglades, plans a spring‑break road trip to Savannah, daydreams about a summer internship in Chicago’s logistics hub, yet
    balances wanderlust with a tight student budget and looming project deadlines.
  culinary: Jan Schurr, a health‑focused home chef, staples her meals with quinoa‑black‑bean bowls, grilled salmon with mango‑chili salsa, avocado toast, and protein‑packed smoothies, while mastering rapid
    meal‑prep routines that keep her energized for volleyball practice and late‑night study marathons.
  core: Jan Schurr is an ultra‑organized, socially magnetic 18‑year‑old who balances competitive sports, leadership duties, and meticulous budgeting, yet occasionally lets skepticism and perfectionism spark
    burnout.
background:
  cultural: Jan grew up in Milton, a small coastal town in the Florida Panhandle, within a middle‑class family that values Southern hospitality, community service, and a strong work ethic. Her upbringing
    blends traditional Southern customs—frequent church gatherings, family barbecues, and support for local schools—with modern digital culture, reflecting the region’s mix of rural roots and growing tourism
    economy. Exposure to the nearby military community and diverse seasonal visitors has given her a pragmatic, open‑minded outlook while maintaining a deep appreciation for her local heritage.
