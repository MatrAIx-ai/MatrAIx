  career_goals: She plans to complete a Bachelor’s degree in Business Administration with a concentration in Project Management at a nearby university. Jan aims to secure a summer internship in a logistics
    or supply-chain firm where she can apply her organizational expertise, then transition into a junior project coordinator role after graduation. Long-term, she aspires to become a certified Project Management
    Professional (PMP) and lead regional operations for a company that contributes to community development in Northwest Florida.
