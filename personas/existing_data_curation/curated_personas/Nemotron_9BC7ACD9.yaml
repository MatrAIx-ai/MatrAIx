  hobbies: '["Cooking traditional Mexican dishes", "Gardening herbs and vegetables", "Woodworking small projects", "Storytelling at community gatherings", "Listening to regional Mexican music", "Participating
    in local dance events", "Playing Bridge and Poker", "Reading local history and biographies", "Walking in Lehigh Valley parks", "Solving crossword puzzles", "Watching soccer matches", "Attending cultural
    festivals"]'
  career_goals: Even at 85, Santiago aims to stay active, share his heritage, and challenge himself intellectually. His primary goals are to mentor younger volunteers at the local senior center, preserve
    and teach Mexican cooking and Spanish language to new generations, and document his life story in a memoir for his family. He also seeks to maintain his health through daily walks and gardening, compete
    in local trivia and bridge tournaments, and advocate for improved senior services in Bethlehem. By remaining a cultural ambassador and a respected community voice, Santiago hopes to leave a lasting
    legacy of curiosity balanced with practicality.
