persona_description: A researcher and statistician who specializes in the development and application of socioeconomic deprivation indices, particularly the New Zealand Index of Socioeconomic Deprivation
  (NZDep2018). Proficient in using statistical analysis and data interpretation to evaluate the distribution of socioeconomic deprivation throughout New Zealand and to inform resource allocation and planning.
  Has extensive experience in developing and validating socioeconomic indices and has published extensively in the field. Has a keen interest in the social and economic implications of poverty and inequality,
  and in using these indices to promote social justice and equity.
