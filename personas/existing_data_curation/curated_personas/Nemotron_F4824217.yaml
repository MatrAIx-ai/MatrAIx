personas:
  professional: Alexis Tena, a veteran retail strategist with over 35 years of hands‑on experience, applies meticulous inventory control, bilingual customer service, and data‑driven visual merchandising
    to streamline store operations, while quietly mentoring staff and now seeking a part‑time advisory role that respects their preference for low‑stress, solitary work.
  sports: Alexis Tena enjoys solo walking and gentle yoga sessions at the local community center, follows the Texas Rangers baseball team and the West Texas A&M Buffaloes basketball program, and occasionally
    competes in the senior “West Texas Striders” walking club’s weekend strolls.
  arts: Alexis Tena, an avid watercolorist, draws inspiration from Georgia O'Keeffe's desert palette and José Guadalupe Posada's folk prints, curates a personal collection of Mexican alebrijes, reads poetry
    by Emily Dickinson, and frequents low‑key gallery openings such as those at the El Paso Museum of Art to absorb fresh artistic concepts.
  travel: Alexis Tena prefers meticulously planned trips to culturally rich, low‑traffic destinations like Santa Fe, Marfa, and San Miguel de Allende, choosing boutique B&Bs that allow quiet reflection,
    and often travels alone to immerse in local art scenes, while budgeting conservatively to align with a fixed retirement income.
  culinary: Alexis Tena cultivates a small herb garden of cilantro, oregano, and epazote, using the fresh harvest to craft authentic Mexican dishes such as chiles en nogada and pozole, and balances an intermediate
    cooking skill set with a love for tasting traditional regional variations.
  core: Alexis Tena blends disciplined retail expertise with a solitary passion for art, tending meticulous budgets, health routines, and herb gardens while quietly curating a life of thoughtful, low‑stress
    pursuits.
background:
  cultural: Alexis was born in the state of Jalisco, Mexico, and raised in a close‑knit family that celebrated a blend of Mexican traditions and Catholic customs. She moved to Abilene, Texas, with her husband
    in her twenties, where she integrated into the local Hispanic community while also embracing the broader Texan culture. Fluent in both Spanish and English, she maintains strong ties to her heritage
    through cooking family recipes, preserving folk art, and observing holidays such as Día de los Muertos and Cinco de Mayo. Her bicultural background informs her aesthetic preferences, interpersonal style,
    and the value she places on hard work, family solidarity, and quiet personal reflection.
attributes:
  skills: '[''Customer service'', ''Bilingual communication (Spanish/English)'', ''Inventory management'', ''Visual merchandising'', ''Point-of-sale (POS) operation'', ''Cash handling'', ''Record keeping
