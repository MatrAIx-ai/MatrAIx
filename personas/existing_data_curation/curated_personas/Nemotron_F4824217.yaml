  hobbies: '[''Watercolor painting'', ''Collecting Mexican folk art'', ''Photography of West Texas landscapes'', ''Gardening'', ''Cooking traditional Mexican dishes'', ''Reading art history and poetry'',
    ''Attending museum exhibitions alone'', ''Genealogy research'', ''Knitting'', ''Listening to classical music'']'
  career_goals: Alexis aims to transition into a part‑time advisory role where she can apply her deep retail knowledge to help small local businesses improve inventory processes and visual merchandising
    while maintaining a predictable, low‑stress schedule. She hopes to earn a certification in retail management to formalize her expertise and eventually mentor younger employees within her current store,
    preserving high standards of organization. Over the next few years, she also wishes to curate a modest community art exhibit that showcases Mexican folk art, blending her professional discipline with
    her love for culture.
