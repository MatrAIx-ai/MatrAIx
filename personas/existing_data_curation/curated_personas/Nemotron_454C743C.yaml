personas:
  professional: Deja Granville leverages decades of CDL‑driven logistics expertise, precise route‑optimization skills, and a people‑first communication style to transition into a senior trainer role where
    they mentor emerging drivers, champion safety, diversity, and low‑emission fleet policies within Milwaukee’s trucking community.
  sports: Deja Granville is a loyal Milwaukee Bucks fan who regularly attends home games when possible, participates in senior Zumba sessions at the community center, and joins the local senior walking
    club that meets for morning strolls in Grant Park, embodying a moderate yet social approach to fitness.
  arts: Deja Granville immerses themselves in Milwaukee’s cultural pulse—visiting the Milwaukee Art Museum’s current Kerry James Marshall exhibition, performing in a senior choir that sings Maya Angelou
    poems, attending community theatre productions of August Wilson, and shaping clay in weekly pottery classes inspired by Thelonious Monk’s improvisational spirit.
  travel: Deja Granville’s travel style blends leisurely road trips across the Midwest with occasional Caribbean getaways—having explored New Orleans’ music scene, the heritage sites of Kingston, Jamaica,
    and dreaming of a cultural immersion trip to Savannah, Georgia—while always budgeting for senior‑friendly accommodations and family visits.
  culinary: Deja Granville’s kitchen is a vibrant fusion of Caribbean flavors—crafting jerk chicken with scotch bonnet peppers, simmering callaloo with coconut milk, and pairing fresh garden tomatoes with
    plantain fritters—showcasing a confident home‑cook level that delights family gatherings and community potlucks alike.
  core: Deja Granville is a road‑wise, arts‑loving senior who balances a disciplined work ethic with spontaneous pottery splurges and an unshakable habit of humming classic jazz while navigating Milwaukee’s
    streets.
background:
  cultural: Deja was born and raised in Milwaukee’s historic North Division, the daughter of parents who migrated from the Deep South during the Great Migration. Her family’s roots are intertwined with
    the African‑American church, community activism, and a tradition of mutual aid. She grew up celebrating Juneteenth, participating in local black cultural festivals, and listening to jazz, blues, and
    gospel music that shaped her appreciation for the arts. Deja is an active member of a senior African‑American social club and volunteers with the Milwaukee African‑American Historical Society, helping
    preserve oral histories and promote cultural education. Her identity blends Midwestern values of hard work and practicality with the resiliency, creativity, and communal spirit of the black community.
