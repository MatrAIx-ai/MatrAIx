  career_goals: Deja aims to transition from frontline driving to a senior trainer role within her trucking company, where she can teach safety best practices and mentor younger drivers, especially those
    from underrepresented backgrounds. She also aspires to develop a community‑focused delivery service that provides affordable, door‑to‑door grocery and medication transport for seniors in Milwaukee.
    Long‑term, Deja hopes to influence fleet policy toward greener, low‑emission vehicles and to serve on the union’s health‑and‑safety committee, championing both worker welfare and environmental stewardship.
