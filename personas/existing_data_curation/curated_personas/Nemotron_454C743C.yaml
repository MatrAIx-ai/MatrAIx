  hobbies: '[''Visiting Art Museums (Milwaukee Art Museum)'', ''Community Theater & Live Performances'', ''Pottery and Ceramic Arts'', ''Quilting and Textile Crafts'', ''Caribbean & Soul Food Cooking'',
