persona_description: A professional electronics manufacturer who specializes in the production and quality control of transformers. They have extensive knowledge and experience in the manufacturing process
  of transformers, including the production of metal cores, winding of coils, tin soldering, and final examination and packing. They are also familiar with the quality inspection and certification processes
  for electrical products, including input test, output test, protection circuit test, environmental test, aging test, and safety certification. They are highly skilled in wave soldering and reflow soldering
  techniques and have a deep understanding of the manufacturing process of transformers. They are responsible for ensuring the quality and safety of the transformers they produce.
