persona_description: A music teacher who emphasizes the importance of understanding the mechanical aspects of music and the relationship between the musical and the mechanical. The teacher believes in practicing
  mechanics so that students can react musically in the moment of performance. The teacher is aware of the confusion caused by diagrams and prefers visual representations of music. The teacher is skilled
  in analyzing music by observing features and noticing how they are implemented mechanically. The teacher believes that the purpose of the diagrams is to show how a piece of music can be understood as
  doing one thing at a time and that the diagrams should be simple and not complicated. The teacher is flexible and willing to adjust the time signature to accommodate the needs of the students.
