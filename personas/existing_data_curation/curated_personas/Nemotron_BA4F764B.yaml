  career_goals: She aims to pursue a STEM‑focused career that blends her curiosity about the natural world with practical problem‑solving. Her long‑term ambition is to become an environmental engineer or
    wildlife biologist who designs sustainable solutions for rural communities, such as renewable‑energy projects for farms or habitat conservation programs. In the short term, she plans to excel in high
    school science fairs, seek mentorship through the local 4‑H program, and eventually study engineering or biology at a university that emphasizes hands‑on research.
