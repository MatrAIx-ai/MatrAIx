personas:
  professional: Hannah Fridman is an aspiring environmental technologist who combines her love of model airplane construction, Scratch programming, and competitive chess to explore sustainable designs for
    small‑scale agricultural projects, balancing curiosity with the pragmatic traditions of her community.
  sports: Hannah Fridman participates in her middle school cross‑country team, enjoys weekend fishing trips on the nearby creek, and passionately follows the Cleveland Browns and Ohio State Buckeyes, while
    also cheering for the local high school basketball team, embodying a balanced love for personal fitness and community sports spirit.
  arts: Hannah Fridman immerses herself in sci‑fi literature by authors like Andy Weir, delights in bird‑watching to the soundtrack of The Avett Brothers, crafts interactive stories on Scratch, and occasionally
    watches independent films such as "Moonlight", weaving creative expression into her solitary hobbies.
  travel: Hannah Fridman favors short road trips to Hocking Hills State Park and weekend camping in the Appalachian foothills, has visited the Cincinnati Zoo with her family, and dreams of exploring Yellowstone
    National Park and an eventual study abroad experience in Scandinavia, balancing low‑budget adventure with long‑term travel aspirations.
  culinary: Hannah Fridman enjoys helping prepare homemade chicken noodle soup, buttery cornbread, and fresh garden salads featuring heirloom tomatoes and crisp lettuce, while experimenting with a beginner‑level
    chocolate chip cookie recipe that often ends up a bit too chewy, reflecting a growing confidence in family‑centered cooking.
  core: Hannah Fridman is a quiet, curiosity‑driven teen who blends practical small‑town values with competitive spirit, thriving in solitary pursuits like coding and chess while nurturing a love for nature,
    modest finances, and emerging culinary experiments.
background:
  cultural: 'Hannah grows up in a multigenerational, white Midwestern family in Apple Creek, Ohio. Her upbringing reflects the values of small‑town life: a strong sense of community, modesty, and a connection
    to the agricultural landscape. Family traditions include attendance at a local Protestant congregation, participation in county fairs and seasonal harvest festivals, and a shared appreciation for outdoor
    activities such as fishing, hiking, and gardening. These cultural influences shape her practical outlook, respect for established methods, and curiosity about how natural systems work.'
