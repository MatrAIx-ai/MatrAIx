persona_description: A Mexican government official responsible for formulating and coordinating the implementation of national climate change strategies, promoting national climate change research, and
  promoting GHG emission reduction projects. They are part of the Inter-Ministerial Commission on Climate Change (CICC) and have expertise in the development and implementation of climate change policies,
  particularly in the areas of water resources, agriculture, and coastal zones. They have a deep understanding of the impacts of climate change on Mexico and are committed to adapting to these changes.
