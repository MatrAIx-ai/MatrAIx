  hobbies: '[''Desert gardening (cacti & succulents)'', ''Hiking and nature photography'', ''Reading historical fiction and science biographies'', ''Knitting and crochet'', ''Cooking Southwestern cuisine'',
    ''Bridge (card game) at community center'', ''Volunteering at local library literacy program'']'
  career_goals: Although retired from full-time employment, Lisa aims to stay intellectually active and make a tangible impact in her community. She hopes to volunteer as a technical advisor for local sustainability
    initiatives, mentor high-school students in STEM through after-school programs, and occasionally consult for startups focused on renewable energy. She also aspires to complete a series of adult-education
    courses in artificial intelligence to satisfy her curiosity, write a memoir documenting her engineering career, and travel with her husband to national parks across the western United States. Maintaining
    her health and reducing stress remain central to her long-term goals.
