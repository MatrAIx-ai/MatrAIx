personas:
  professional: Lisa Cole, a retired mechanical engineer turned community sustainability advisor, blends their CAD and Python environmental modeling expertise with a methodical problem‑solving style, while
    their relaxed, flexible attitude sometimes leads to missed deadlines but fuels collaborative, creative solutions for local renewable‑energy projects.
  sports: Lisa Cole hikes the Sonoran Desert trails with the Arizona Trails Club several weekends a month, follows the Phoenix Suns basketball and Arizona Diamondbacks baseball seasons, and attends weekly
    beginner yoga classes at the local community center to maintain flexibility, though they often forget to stretch before gardening, leading to occasional back strain.
  arts: Lisa Cole finds artistic inspiration in the watercolor paintings of Georgia O'Keeffe, the folk songs of Joan Baez, and the stark landscape photography of Ansel Adams, often weaving these motifs
    into their crochet projects and regularly attending monthly gallery openings at the Surprise Arts Center.
  travel: Lisa Cole enjoys open‑road road trips, having already explored the Grand Canyon, Zion, and Bryce Canyon, and they hope to add Yellowstone and Glacier National Parks to their bucket list, favoring
    spontaneous day‑by‑day itineraries over rigid schedules while occasionally hesitating to book travel due to health and financial concerns.
  culinary: Lisa Cole delights in preparing Southwestern dishes such as cactus‑infused grilled chicken, mesquite‑flour tortillas, and prickly‑pear salsa, sourcing heirloom chilies, fresh coriander, and
    locally harvested nopales from the Surprise Farmers Market, though their enthusiastic palate sometimes leads them to over‑spice meals.
  core: Lisa Cole is a curiosity‑driven, easy‑going former engineer who balances meticulous problem‑solving with spontaneous creativity, occasional forgetfulness, and a lingering worry about the future,
    and they approach each day with a mix of analytical rigor and relaxed flexibility.
background:
  cultural: Lisa comes from a White, Midwestern American background, with family roots tracing to German and Irish ancestors in Ohio. She grew up with values of self-reliance, community involvement, and
    a pragmatic outlook. Relocating to Surprise, Arizona after retirement, she has embraced the Southwest's cultural tapestry, appreciating the region's Hispanic culinary traditions, desert ecology, and
    community festivals. Her cultural identity blends Midwestern modesty with the open-air, outdoor-oriented lifestyle of the Sun Belt, influencing her interests in gardening, hiking, and local volunteerism.
attributes:
  skills: '[''Mechanical design (CAD)'', ''Environmental and sustainability modeling'', ''Data analysis with Python'', ''Project management'', ''Technical writing and communication'', ''Mentoring and coaching'',
