personas:
  professional: Gayla Gillstrap, a construction site logistics coordinator and hands‑on tradesperson, blends concrete finishing expertise with a keen eye for sustainable design, using SketchUp and AutoCAD
    to propose eco‑friendly solutions while methodically managing crew schedules and material inventories on Southern California job sites.
  sports: Gayla Gillstrap rides the morning swell at Venice Beach and competes in local surf contests with the Pacific Coast Surfers club, while cheering for the Los Angeles Dodgers in spring, the Lakers
    in winter, and the LA Galaxy in fall, and they hit the gym for functional strength training three times a week to stay injury‑proof.
  arts: Gayla Gillstrap fills spare moments sketching downtown LA skylines and painting abstract seascapes inspired by James Turrell’s light work and the bold street graphics of Shepard Fairey, frequently
    attending openings at MOCA and the Getty, where they network with fellow creators and draw influence from the surreal narratives of author N.K. Jemisin.
  travel: Gayla Gillstrap prefers low‑key road trips that blend surf spots and scenic hikes, having already explored Big Sur, Joshua Tree, and a weekend surf retreat in Maui, while dreaming of a week‑long
    art pilgrimage to Barcelona’s Modernist architecture and a sustainable eco‑resort stay in Norway’s fjord region, planning each itinerary around budget constraints and limited vacation days.
  culinary: Gayla Gillstrap enjoys cooking coastal fare like grilled fish tacos with mango salsa, avocado‑lime quinoa bowls, and homemade miso soup, boasts a solid intermediate skill set with a favorite
    battered‑up reclaimed‑wood cutting board, and occasionally indulges in upscale sushi nights at a downtown Omakase restaurant when a project deadline is met.
  core: Gayla Gillstrap is a methodical yet wildly imaginative builder‑artist who balances gritty construction work with sunrise surf sessions, sketchbooks, and eco‑driven ambitions, all while juggling
    budget spreadsheets and a trusty coffee habit that occasionally goes unchecked.
background:
  cultural: Gayla grew up in a middle‑class, white, coastal family in Southern California, where the beach lifestyle and a pragmatic work ethic were core values. Her upbringing blended a respect for self‑reliance,
    typical of the post‑World II suburban American ethos, with an appreciation for the region’s progressive environmental consciousness. She identifies with a West Coast cultural mix that values independence,
    creativity, and community service, and she reflects the region’s blend of laid‑back beach culture and the industrious spirit of the construction trades.
