  career_goals: She aims to leverage her field experience and design curiosity into a supervisory role within the next three years, targeting a construction site supervisor or assistant project manager
    position. She plans to complete an associate’s degree in construction management and obtain certifications such as the Certified Construction Manager (CCM) and LEED Green Associate. Long‑term, she envisions
    launching her own boutique design‑build firm that specializes in eco‑friendly residential projects along the Southern California coast, integrating her artistic flair with practical construction expertise.
