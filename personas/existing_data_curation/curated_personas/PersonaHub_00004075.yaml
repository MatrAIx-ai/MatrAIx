persona_description: A fisheries biologist who studies the interactions between biotic and abiotic factors in streams, with a particular focus on the redband trout population in the Columbia River Basin
  of western North America. This persona is interested in understanding how the characteristics of these streams (e.g., gradient, substrate type, elevation, etc.) affect the distribution and abundance of
  redband trout. They are also interested in the impact of environmental conditions (e.g., summer water temperature, stream order, etc.) on the occurrence and abundance of redband trout, and how these factors
  differ between desert and montane streams.
