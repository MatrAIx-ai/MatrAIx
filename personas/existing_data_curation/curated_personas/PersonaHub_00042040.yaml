  They are experienced in the application of spigot mortar systems in various military contexts, including anti-tank, anti-submarine, and anti-aircraft roles, and have a deep understanding of the psychological
  effects these systems can have on enemy soldiers. Additionally, they are familiar with the history of mortars, including their use in siege warfare and their evolution over time.
