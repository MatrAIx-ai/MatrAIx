  career_goals: Although retired from formal employment, Lisa remains driven to contribute meaningfully in her later years. She aims to mentor her grandchildren and local youth by sharing cooking, gardening,
    and craft skills. Completing a comprehensive family genealogy project is a top priority, preserving stories and photographs for future generations. Lisa also plans to deepen her digital competence,
    learning video editing to create a memoir of her life in the Pacific Northwest. In the community, she hopes to lead a senior gardening club that promotes accessible green spaces, while continuing to
    advocate for neighborhood improvements. Maintaining her health through regular walks, gentle yoga, and stress‑management practices such as journaling and mindfulness is also central to her ambitions.
