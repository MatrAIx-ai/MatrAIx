personas:
  professional: Gabriela Yebra is a budding home-based caterer who blends her culinary expertise in traditional baked breads and her bilingual event-planning talents to organize affordable neighborhood
    celebrations, balancing meticulous budgeting with a flexible, people-centric approach.
  sports: Gabriela Yebra enthusiastically watches soccer matches, especially when cheering for the national team and the local club Atletico, joins a Saturday community pick-up league for casual kick-ball,
    and supports the regional basketball team during the winter season.
  arts: Gabriela Yebra contributes her vibrant voice to the church choir, dances spiritedly to cumbia, norteño, and banda at festivals, stitches embroidered table linens inspired by folk motifs, and finds
    inspiration in the music of Los Tigres del Norte, the paintings of Frida Kahlo, and the films of Guillermo del Toro.
  travel: Gabriela Yebra prefers short road trips to nearby historic towns like San Miguel and cultural hubs such as Oaxaca for weekend market visits, dreams of exploring the street food of Bangkok and
    the arts scene in Barcelona, but plans trips carefully around her family's schedule and modest catering income.
  culinary: Gabriela Yebra excels at crafting authentic salsas, hand-shaping pan de muerto and conchas, experimenting with mole sauces and locally grown chilies, and she regularly hosts tasting evenings
    where friends sample her modern twists on traditional dishes.
  core: Gabriela Yebra is a sociable, curious planner who turns community gatherings into culinary showcases, balances a detailed budget with spontaneous herb-growing experiments, and occasionally forgets
    to water her cilantro while day-dreaming about new recipes.
background:
  cultural: Gabriela is a Mexican-American who grew up in San Benito, a border town in Cameron County where Mexican heritage and Texan influences blend seamlessly. Her family maintains strong Catholic traditions,
    celebrating Día de los Muertos, Mexican Independence Day, and local events such as Charro Days with music, dance, and communal feasts. Bilingual in Spanish and English, she navigates both cultures daily,
    preserving the values of familismo, respeto, and community reciprocity that shape life in the Rio Grande Valley. The aromas of homemade pozole, tamales, and fresh salsas, the rhythm of norteña music,
    and the close-knit social networks of her neighborhood are central to her identity. These cultural roots inform her hospitality, communal spirit, and commitment to helping others.
