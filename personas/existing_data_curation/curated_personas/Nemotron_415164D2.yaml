  hobbies: '[''cooking traditional Mexican dishes'', ''baking sweet breads'', ''herb gardening'', ''cumbia and norteño dancing'', ''church choir participation'', ''volunteering at food pantry'', ''embroidery
    and sewing'', ''watching soccer'', ''attending community festivals and mercados'', ''DIY home improvement projects'', ''exploring new recipes'']'
  career_goals: Gabriela aims to strengthen her family's financial stability by turning her cooking talents into a small home-based catering business that offers affordable Mexican and Tex-Mex meals for
    local events, church gatherings, and neighborhood celebrations. Over the next year she plans to obtain her GED and enroll in a community-college certificate program in culinary arts, followed by a short
    course in small-business management. She also aspires to become a certified community health worker to share nutrition education and health resources with her neighbors, especially fellow mothers. In
    her volunteer life, she hopes to take a leadership role in her church’s outreach programs, coordinating events and workshops that blend cultural traditions with practical life skills.
