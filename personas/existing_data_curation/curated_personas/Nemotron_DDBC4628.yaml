personas:
  professional: Sara Sluder, a senior graphic and UX designer who fuses visual communication expertise with a humanist lens, leads multidisciplinary projects with organized flexibility, facilitates collaborative
    brainstorming, and champions ethical design practices as a stepping stone toward a future creative director role, while they mentor junior designers and advocate inclusive creative processes.
  sports: Sara Sluder, a social fitness enthusiast, joins a weekend community cycling club to explore Indianapolis murals, practices yoga at Flow Studio, follows the Indianapolis Colts and Indiana Pacers
    with fervor, and participates in a recreational indoor volleyball league each summer, while they view physical activity as a communal, energizing ritual.
  arts: Sara Sluder, a devoted visual arts aficionado, frequents the Indianapolis Museum of Art for contemporary exhibitions, draws inspiration from Yayoi Kusama’s immersive installations and local muralist
    B. F. K., curates a personal sketch‑meeting group, and attends live performances by jazz pianist Samul and indie band Vampire Weekend, letting these experiences shape their design aesthetic, while they
    continuously seek fresh visual narratives.
  travel: Sara Sluder, an adventurous planner who blends detailed itineraries with spontaneous detours, has journeyed to Berlin’s street‑art scene, explored Kyoto’s temples for design inspiration, and dreams
    of a color‑rich retreat in Marrakech while they regularly weekend‑hop to Chicago’s design districts and enjoy local Indy farm‑stay getaways for relaxed immersion.
  culinary: Sara Sluder, an intermediate home chef with a flair for global flavors, delights in crafting Korean bibimbap with gochujang, hand‑rolling Italian gnocchi with ricotta and sage, and perfecting
    Ethiopian injera using teff flour, sourcing fresh vegetables from the Indianapolis City Market and pairing dishes with natural wines, while they love hosting themed dinner parties that double as creative
    brainstorming sessions.
  core: Sara Sluder, a relentlessly curious designer balancing organized ambition with a nightly habit of binge‑watching design webinars, lives by a creed of ethical creativity while they occasionally overcaffeinate
    on espresso to fuel weekend sketch marathons and struggle to step away from their laptop before midnight.
background:
  cultural: Sara grew up in a suburban neighborhood on the outskirts of Indianapolis, Indiana, within a middle‑class family that valued education, community involvement, and cultural curiosity. Her white
    ethnic background places her within the broader tapestry of Midwestern American culture, characterized by a blend of practicality, modesty, and a strong sense of local pride. Frequent family trips to
    national art institutions and participation in regional festivals nurtured her appreciation for both classic and contemporary art. The local art scene in Indianapolis, with its museums, galleries, and
    public art projects, has been a formative influence, encouraging her to blend regional craftsmanship traditions with global artistic trends. Sara's humanities education further expanded her cultural
    perspective, fostering an inclusive worldview that celebrates diverse artistic expressions while staying rooted in her Midwestern upbringing.
