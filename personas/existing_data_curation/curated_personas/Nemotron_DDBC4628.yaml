  hobbies: '[''Visiting Art Museums'', ''Exploring Street Murals'', ''Sketching Meet‑ups'', ''Cooking International Recipes'', ''Hosting Dinner Parties'', ''Photography'', ''Live Music Concerts'', ''Yoga'',
    ''Dance Workshops'', ''Volunteer Youth Art Program'', ''Weekend Bike Rides'', ''Travel to Cultural Destinations'', ''Reading Design and Art Theory Books'']'
  career_goals: Sara aims to transition from a senior designer role to a creative director position within the next five years, where she can shape brand narratives and mentor emerging designers. She is
    also passionate about launching a boutique studio that collaborates with local nonprofits and cultural institutions to produce socially responsible design solutions. Long‑term, she envisions herself
    as a thought leader who bridges humanities scholarship and contemporary design, publishing articles on ethical design practices and speaking at industry conferences. Her ambition is balanced with a
    desire to maintain a healthy work‑life integration, allowing time for family and community involvement.
