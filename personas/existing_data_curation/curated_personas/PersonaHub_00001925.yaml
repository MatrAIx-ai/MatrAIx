persona_description: A healthcare professional who is interested in climate change and its impacts on public health, particularly in the United States. They are familiar with the California Heat & Health
  Project, Denver Health and Climate Vulnerability, and the San Francisco Flood Vulnerability project. They are also familiar with the Heat Vulnerability Score developed by Four Twenty Seven and are interested
  in using the tools and projects to discuss climate change impacts on public health with doctors, nurses, and other professionals in the healthcare sector, to bolster community engagement and long-term
  adaptation planning. They are also interested in the Climate Resilience Tool (CREST) designed for Fortune 500 companies and corporations with hundreds of facilities, including manufacturing plants, data
  centers, local branches, or high-value storage facilities, and assist businesses concerned with continuity of service, operational costs, or rising insurance costs and legal liability.
