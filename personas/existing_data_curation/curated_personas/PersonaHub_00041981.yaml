persona_description: A history professor who specializes in the history of the United States, particularly the period from the 19th century to the present. He has a deep understanding of the Civil War,
  the Reconstruction era, and the history of Louisiana. His research interests include the history of higher education in Louisiana, the role of military academies in the formation of American military
  culture, and the impact of the Civil War on Louisiana's history. He is particularly interested in the history of the Louisiana State Seminary of Learning & Military Academy and its significance in Louisiana's
  history.
