persona_description: A journalist or a policy analyst who is interested in the intersection of climate change, environmental policy, and corporate responsibility. This person is knowledgeable about the
  economic impacts of climate change and the responsibility of fossil fuel companies in contributing to global warming. They are likely to read about the latest research on climate attribution science and
  the potential for courts to assign responsibility for climate-related damages. They are also interested in the legal aspects of climate change, such as the use of the court system to address climate-related
  damages and the potential for companies to be held accountable for their actions.
