  hobbies: '[''Painting'', ''Sketching'', ''Speculative Fiction Reading'', ''Poetry Writing'', ''Photography'', ''Piano Playing'', ''Mindfulness Meditation'', ''Yoga'', ''Small‑Group Art Meet‑ups'', ''Local
    Gallery Visits'']'
  career_goals: Rebecca aims to earn a Master of Fine Arts in Visual Arts within the next three years, followed by a role as a curator or exhibitions coordinator at a contemporary art museum in the Dallas‑Fort
    Worth area. She aspires to lead innovative, interdisciplinary showcases that merge digital media with traditional art forms. In the long term, she envisions opening a small independent gallery that
    supports emerging artists and offers curated educational workshops, allowing her to combine her organizational acumen with her passion for novel artistic expression.
