personas:
  professional: Rebecca Seaver, an aspiring curatorial professional, blends her 19‑year‑old visual‑arts background with advanced digital illustration and Adobe expertise, leveraging meticulous project planning
    and scholarly research in art history to craft interdisciplinary exhibition proposals that fuse surreal aesthetics with data‑driven storytelling.
  sports: Rebecca Seaver, a fan of the Dallas Mavericks and Texas Rangers, prefers low‑key physical activity such as sunrise yoga in the backyard and occasional paddleboarding on Lake Ray Roberts, avoiding
    competitive team sports in favor of solitary, contemplative exercise.
  arts: Rebecca Seaver, whose creative practice revolves around abstract painting, sketching, and digital illustration, draws inspiration from artists like Yayoi Kusama and Salvador Dalí, reads speculative
    fiction by Octavia Butler, attends local gallery openings featuring emerging Texas artists, and unwinds by playing Debussy piano pieces.
  travel: Rebecca Seaver, an avid road‑tripper with a modest travel budget, loves weekend getaways to the Texas Hill Country for sunrise photography, dreams of exploring Florence’s Uffizi Gallery and witnessing
    the northern lights in Iceland, and meticulously plans each trip in spreadsheets to fit academic breaks.
  culinary: Rebecca Seaver, who enjoys cooking simple yet flavorful meals, frequently prepares shrimp tacos seasoned with fresh cilantro and lime, experiments with rosemary‑infused focaccia, and occasionally
    attempts a perfect risotto, though she sometimes forgets to set a timer and overcooks the rice.
  core: Rebecca Seaver, a 19‑year‑old visual‑arts prodigy, balances meticulous organization with vivid imagination, channels anxiety into disciplined creative practice, and occasionally splurges on art
    supplies while dreaming of curating avant‑garde exhibitions.
background:
  cultural: Rebecca was raised in Haslet, Texas, a suburban community in Wise County with a blend of traditional Southern hospitality and the modern, multicultural influences of the nearby Dallas‑Fort Worth
    metro area. Her family’s white Anglo‑American heritage includes values of self‑reliance, community involvement, and an appreciation for regional customs such as annual county fairs and local music festivals.
    Exposure to the vibrant Texas art scene, coupled with family traditions of backyard barbecues and church gatherings, has shaped her balanced perspective that honors both her regional roots and broader
    contemporary artistic interests.
attributes:
  skills: '[''Digital Illustration'', ''Graphic Design'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Art History Research'', ''Critical Analysis'', ''Creative Writing'', ''Project Planning'', ''Time
