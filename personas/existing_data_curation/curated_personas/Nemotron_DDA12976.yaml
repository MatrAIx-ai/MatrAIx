  career_goals: Robert aims to move into a supervisory or managerial role within the security field, ideally overseeing a small team in a setting that merges his professional expertise with his love of
    the arts—such as a museum, gallery, or cultural venue. He plans to obtain Certified Protection Professional (CPP) certification and a Master’s degree in Security Management to broaden his strategic
    capabilities. While he wants greater responsibility and a stable career path, he also seeks a work environment that offers predictable schedules and lower high‑stress incidents, allowing him to balance
    his professional ambitions with his need for emotional wellbeing and family time.
