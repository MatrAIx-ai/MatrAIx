persona_description: A speech-language pathologist who is interested in the use of data logging and analysis tools to improve the effectiveness of speech therapy and clinical practice. They are familiar
  with low-tech data collection tools such as observation data collection and have a deep understanding of the importance of high-tech data collection tools. They are also familiar with the Realize Language
  system, a subscription-based online tool for analyzing language data, and have experience using it for trial and initial assessment purposes. They are interested in learning more about data logging and
  analysis tools and have a desire to improve the quality of speech therapy and clinical practice.
