    and conflict resolution'', ''Mentoring and coaching'', ''Design thinking'', ''Visual storytelling'']'
  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Pottery'', ''Cooking fusion South-Asian cuisine'', ''Hosting dinner parties'', ''Toastmasters public speaking'', ''Attending
    tech meetups and hackathons'', ''Yoga and mindfulness meditation'', ''Volunteering to teach computer skills'', ''Traveling and photography'', ''Reading contemporary fiction and design journals'']'
  career_goals: At 62, Rumana seeks to transition from day-to-day analysis to broader advisory and legacy-building roles. She aims to become a senior consultant or executive mentor, guiding emerging analysts
    and senior leaders on data-driven decision making, especially for organizations focused on social impact and cultural inclusion. She aspires to launch a boutique consultancy that blends analytics with
    artistic insight, helping tech firms and nonprofit arts programs use data to amplify community engagement. Rumana also intends to speak at industry conferences, write thought-leadership pieces about
    integrating creativity into analytics, and mentor women and South-Asian professionals in STEM fields. A personal ambition is to secure sufficient financial independence post-separation, allowing her
    to devote part of her time to volunteering at local arts education initiatives and to pursuing a small-scale community art-tech workshop series.
