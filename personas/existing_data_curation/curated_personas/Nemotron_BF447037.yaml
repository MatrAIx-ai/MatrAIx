personas:
  professional: Audrey Marth, a budding early‑childhood explorer who already demonstrates organized play and practical problem‑solving in building block projects, channels their sociable, energetic nature
    into cooperative group activities that hint at a future career in preschool education.
  sports: Audrey Marth, who attends the Matawan Early Movers Swim Club and a weekly parent‑toddler gymnastics class, often cheers for the New York Yankees and the New Jersey Devils, and they proudly display
    a miniature Yankees cap at the park’s miniature baseball game.
  arts: Audrey Marth, a budding fan of bright finger‑painting sessions and animated tunes from Disney’s Frozen, The Wiggles, and Raffi’s “Baby Beluga,” eagerly attends the local library’s storytime where
    they clap along to Sesame Street’s Elmo and sing with their parents in the backyard.
  travel: Audrey Marth, who loves the salty sand of Point Pleasant Beach, enjoys family excursions to the Liberty Science Center and occasional trips to Washington, D.C.’s National Museum of Natural History,
    and dreams of a future visit to Disney World’s Magic Kingdom, always traveling in their stroller with a favorite plush bunny in tow.
  culinary: Audrey Marth, a picky‑but‑curious eater, regularly reaches for creamy mac and cheese, cheese pizza topped with mozzarella and pepperoni, and sweet banana slices sprinkled with a drizzle of honey,
    while proudly smearing a dab of peanut butter on toast to pretend they’re a chef.
  core: Audrey Marth, a two‑year‑old bundle of boundless curiosity and energetic sociability, balances a love for organized play with spontaneous mess‑making, from meticulously lining up toy ducks to gleefully
    splattering finger paint, and they constantly demand extra storytime before bedtime.
background:
