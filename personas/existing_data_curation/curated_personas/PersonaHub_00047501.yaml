persona_description: A data visualization professional who specializes in creating engaging and intuitive visualizations from large amounts of structured data. This individual has expertise in using specialized
  software products and proprietary platforms to transform raw data into infographics, tables, maps, graphs, and other visualizations. They are skilled in creating custom data visualizations for organizations
  such as the Robert Wood Johnson Foundation, the Commonwealth Fund, and the Lucile Packard Foundation for Children's Health, and are able to manage and visualize data through a web-based data management
  system called Velir Datacenter. This professional is highly creative and innovative, able to think outside the box and come up with unique and complex visualizations to enhance the delivery of news and
  information. They are also adept at working closely with clients to determine the best way to present customized data in an engaging and intuitive manner.
