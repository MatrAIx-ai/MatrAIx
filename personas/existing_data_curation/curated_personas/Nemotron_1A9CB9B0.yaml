personas:
  professional: Victor Lewis, an aspiring toddler explorer, spends hours stacking blocks and feeling textures, turning everyday play into informal experiments while maintaining a relaxed, flexible approach
    that embraces spontaneous discovery.
  sports: Victor Lewis, a budding participant in the Kids Splash Club toddler swim sessions and an avid fan of the local Riverside Reds baseball team, delights in gentle splashing during summer pool time
    while clapping enthusiastically when the Reds hit a home run on family TV.
  arts: Victor Lewis enjoys listening to Raffi’s "Baby Beluga", watching Sesame Street featuring Elmo and Cookie Monster, and flipping through a soft book of Eric Carle’s illustrations while humming the
    tunes and coloring with Crayola crayons.
  travel: Victor Lewis, whose family takes leisurely stroller walks to Greenfield Park and recently enjoyed a short road trip to the beach town of Seaside, prefers relaxed, child‑friendly excursions over
    packed itineraries, always packing a favorite plush and a portable crib.
  culinary: Victor Lewis prefers smooth textures such as carrot‑apple puree, avocado mash, and teething biscuits, eagerly reaches for the bright orange sweet‑potato casserole on family dinner plates, yet
    shows a quirky refusal of any dish containing visible peas.
  core: Victor Lewis is a curious one‑year‑old who explores the world by stacking blocks, scattering glittery coins, and humming ragtime tunes, yet stubbornly resists bedtime routines when the neighborhood
    lullaby is too quiet.
background:
  cultural: Victor is a white infant raised in Cordova, a suburban community in Shelby County, Tennessee. His family’s cultural backdrop reflects Southern American traditions, including close‑knit family
    gatherings, church attendance, a love for country and gospel music, and occasional visits to local museums and the Memphis Art Museum. Growing up in this environment, Victor is gently exposed to Southern
    hospitality, community values, and an appreciation for art and music that align with his curious personality.
attributes:
