  hobbies: '[''Hiking Adirondack trails'', ''Community theater involvement'', ''Group salsa and swing dance classes'', ''Gardening'', ''Book club (historical fiction & memoirs)'', ''Volunteering at local
    food bank'', ''Yoga and mindfulness meditation'', ''Cooking classes and recipe experimentation'', ''Traveling to explore regional cultures'', ''DIY home improvement projects'']'
  career_goals: Victoria aims to leverage her curiosity for emerging healthcare technologies by completing a Nurse Practitioner program with a focus on rural primary care. She aspires to become a certified
    clinical educator, mentoring new nurses and championing evidence-based practice in her community hospital. Long-term, she hopes to develop a community health outreach initiative that blends preventive
    care education with telehealth services for seniors in Oneida County. Balancing her desire for professional growth with a need for reduced stress, she also plans to negotiate a more flexible schedule
    that allows time for personal wellness and self-care.
