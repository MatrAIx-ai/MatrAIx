  hobbies: '[''Car tinkering'', ''DIY home projects'', ''Fishing'', ''Hiking'', ''Classic rock music'', ''Movie watching'', ''Target shooting'']'
  career_goals: Mark aims to advance from a laborer to a supervisory role within the logistics sector. He plans to obtain a certified forklift operator credential and complete his GED to qualify for shift‑lead
    positions. Over the next five years, he hopes to become a warehouse supervisor or logistics coordinator, overseeing a small team and optimizing workflow. Long‑term, he envisions starting his own modest
    moving or freight service, leveraging his practical experience and organized approach to build a reliable business.
