  hobbies: '[''Hiking and Nature Photography'', ''Classic Car Restoration'', ''Woodworking'', ''Bluegrass Music and Guitar Playing'', ''Community Volunteering'', ''Genealogy Research'', ''Cooking Southern
    Cuisine'', ''Reading Appalachian History'', ''Mindfulness Journaling'', ''Local Festival Participation'']'
  career_goals: Kyle aims to transition from front‑line concierge work to a senior supervisory position within the next five years, leveraging his experience to shape guest‑experience standards across the
    hotel chain. He plans to earn the Certified Hospitality Supervisor (CHS) credential and lead a training program for new bellhops, embedding his methodical approach and people‑centered style. Ultimately,
    he envisions establishing a small boutique inn or B&B in the scenic foothills of Blount County, where he can curate immersive stays that combine curated hiking excursions, local culinary experiences,
    and personalized service. This long‑term venture reflects his desire to blend practical hospitality management with his love for the region and his curiosity about creating unique guest experiences.
