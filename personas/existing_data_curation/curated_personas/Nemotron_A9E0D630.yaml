personas:
  professional: Racquel Early, a seasoned clinical nurse with deep expertise in acute and wound care, patient education, chronic disease management, and health informatics, channels their curiosity and
    practical mindset into mentoring junior staff, leading quality‑improvement projects, and championing evidence‑based telehealth solutions, all while balancing organized planning with flexible, community‑focused
    leadership.
  sports: Racquel Early stays active through weekly hikes along the Spokane River Gorge, participates in the local Spokane Walking Club, follows the Spokane Chiefs hockey team and the Seattle Seahawks,
    and registers for a spring “senior‑friendly” trail‑running program, blending low‑impact fitness with spirited support for regional sports.
  arts: Racquel Early fuels their love of culture by reading contemporary fiction by Celeste Ng and biographies of social activists, attending folk‑dance evenings featuring musicians like Joan Baez and
    Old Crow Medicine Show, and enjoying performances at the Spokane Civic Theatre, where they often applaud productions of classic American dramas.
  travel: Racquel Early prefers organized group tours that balance adventure and comfort, having explored Yellowstone and Glacier National Parks on road trips, and dreaming of a culinary pilgrimage to Kyoto’s
    traditional tea gardens and Italy’s Tuscan vineyards, while budgeting trips around their senior‑center bridge evenings.
  culinary: Racquel Early, an enthusiastic home cook, delights in mastering global dishes such as Korean bibimbap, Thai green curry, and Mediterranean ratatouille, relies on fresh herbs from their native‑plant
    garden, confidently wields a cast‑iron skillet, yet occasionally forgets to set a timer, leading to slightly over‑cooked vegetables.
  core: Racquel Early is a pragmatic, curiosity‑driven nursing leader who weaves their love of nature, community, and lifelong learning into a vibrant, organized life, even if they sometimes overbook their
    schedule with bridge games and cooking classes.
background:
  cultural: Racquel grew up in the Pacific Northwest, embodying the region's appreciation for nature, self-reliance, and community service. Raised in a middle-class family of European descent, she was taught
    the value of hard work and civic engagement. Her upbringing in a modest suburban setting emphasized inclusivity and volunteerism, which she carries into her nursing practice and community involvement.
    While she identifies with mainstream white American culture, she embraces the diverse, progressive ethos of Spokane County, respecting indigenous heritage and supporting local environmental initiatives.
