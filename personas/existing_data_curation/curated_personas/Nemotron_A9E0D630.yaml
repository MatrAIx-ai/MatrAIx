  hobbies: '[''Hiking'', ''Walking Clubs'', ''Gardening'', ''Community Garden Volunteering'', ''Book Club'', ''Cooking Classes'', ''Folk Dance'', ''Genealogy Research'', ''Bridge Games'', ''Local Theater
    Attendance'']'
  career_goals: Racquel aims to transition into a leadership role within her health system, such as Nurse Manager or Clinical Educator, to influence practice standards and mentor the next generation of
    nurses. She aspires to develop a community-based wellness program for seniors that blends preventive care, technology, and peer support. Additionally, she is pursuing certification in geriatric nursing
    and exploring a part-time faculty position at a nearby community college to teach foundational nursing courses.
