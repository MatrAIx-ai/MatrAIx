personas:
  professional: Juliana Stephens, a 51‑year‑old aspiring museum curator and program director, blends their deep art‑history expertise, meticulous grant‑writing precision, and compassionate mentorship into
    community‑focused exhibitions that celebrate regional heritage while fostering inclusive dialogue.
  sports: Juliana Stephens, an avid member of the Amarillo Trail Walkers hiking club, maintains fitness through daily sunrise walks, weekend tennis at the local community center, and cheering on the Dallas
    Cowboys (NFL) and Texas Tech Red Raiders (college football) during the fall season.
  arts: Juliana Stephens immerses themselves in the visual arts, drawing inspiration from Georgia O'Keeffe's desert canvases and Ansel Adams' black‑and‑white photography while listening to Willie Nelson's
    folk ballads and volunteering at community‑theater productions featuring local actors such as Maya Collins.
  travel: Juliana Stephens prefers meticulously planned road trips, savoring the mix of cultural exploration and quiet solitude through past journeys to the Getty Center in Los Angeles, the Georgia O'Keeffe
    Museum in Santa Fe, and an art‑rich excursion in Florence, Italy, while they dream of a future immersive stay in Kyoto's historic temples.
  culinary: Juliana Stephens enjoys seasonal Southwestern cooking, expertly preparing chicken‑fried steak with jalapeño‑infused gravy, fresh garden salads featuring heirloom tomatoes and prickly pear, and
    occasional indulgence in buttery French croissants from a downtown bakery, though they admit to habitually over‑salting dishes when experimenting with new recipes.
  core: Juliana Stephens is a disciplined, compassionate curator‑in‑training who balances meticulous organization with a love for watercolor skies, relentless curiosity, and a habit of overwatering their
    garden at midnight.
background:
  cultural: Juliana comes from a white Anglo‑American lineage rooted in the Texas Panhandle. Raised in a close‑knit community that values self‑reliance, hospitality, and a deep connection to the land, she
    was exposed early to the pioneering history of the region—ranching, oil booms, and the wide‑open plains. Her family emphasized education and cultural enrichment, frequently traveling to museums in Dallas,
    Austin, and even Europe during college breaks, which fostered her appreciation for both American regional art and broader Western artistic traditions. While she embraces the independent spirit of the
    West, she also carries the warmth and cooperative ethos of Southern hospitality, which shape her compassionate interactions and community‑oriented outlook.
attributes:
  skills: '[''Art historical research'', ''Community program coordination'', ''Grant writing'', ''Event planning'', ''Archival management'', ''Creative writing'', ''Mentoring'', ''Public speaking'', ''Volunteer
