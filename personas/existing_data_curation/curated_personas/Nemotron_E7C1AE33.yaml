  hobbies: '[''Watercolor painting'', ''Literary fiction reading'', ''Poetry writing'', ''Gardening'', ''Birdwatching'', ''Animal shelter volunteering'', ''Community theater participation'', ''Historical
    site exploration'', ''Yoga'', ''Cooking experimental cuisines'']'
  career_goals: Juliana aims to re-enter the workforce on a part‑time or consultancy basis, focusing on roles that merge her love of art with community service. Her primary ambition is to become a curator
    or program director at a local museum or cultural center in Amarillo, where she can design exhibitions that highlight regional history and contemporary art. She also hopes to launch an oral‑history
    project documenting the stories of long‑time residents of the Texas Panhandle, and to secure sustainable funding for arts education initiatives in the local school district. In the longer term, she
    envisions publishing a collection of poetry and essays inspired by her research and life experiences.
