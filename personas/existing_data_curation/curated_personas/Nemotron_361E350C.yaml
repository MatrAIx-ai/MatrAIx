personas:
  professional: Luis Roldan is an aspiring young engineer who channels a methodical love for detailed LEGO construction, jigsaw puzzles, and chess into early experiments with robotics kits, approaching
    every new challenge with a step‑by‑step plan and a quiet confidence.
  sports: Luis Roldan practices soccer on Saturday afternoons with the local youth club, the Tiny Titans, favoring structured drills over free play, cheering for the LA Galaxy as their professional team,
    and using the same strategic mindset they apply to chess to anticipate opponents’ moves.
  arts: Luis Roldan engages with creative expression through building LEGO Architecture sets of the Eiffel Tower, watching Pixar’s Wall‑E, and admiring the illustrations of Dr. Seuss, while they occasionally
    sketch their own LEGO designs in a notebook during quiet moments.
  travel: Luis Roldan loves carefully planned trips such as a family road‑trip to the national science museum, day‑excursions to the local planetarium, and dreams of a virtual tour of Kennedy Space Center,
    preferring itineraries that include hands‑on activities and time for LEGO building breaks.
  culinary: Luis Roldan helps prepare family tacos, carefully arranging the fillings like LEGO bricks, enjoys the taste of fresh cilantro, diced onions, and a squeeze of lime on each bite, and is known
    to over‑season guacamole with extra jalapeño for an extra kick.
  core: Luis Roldan is a detail‑oriented nine‑year‑old who balances methodical LEGO builds with spirited soccer drills, quietly hoards extra candy in their pillowcase, and insists on having a set schedule
    for even the most playful activities.
background:
  cultural: Luis grows up in a Mexican‑American household in Atwater, California. His family maintains Mexican traditions such as celebrating Día de los Muertos, making tamales, and speaking Spanish at
    home, while also embracing the local community’s agricultural roots. He participates in school’s bilingual programs and enjoys both Mexican and American holidays. The close‑knit family values responsibility,
    respect for elders, and community involvement, which shape his daily routines and sense of identity.
