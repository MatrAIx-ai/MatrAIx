  hobbies: '[''LEGO building'', ''Jigsaw puzzles'', ''Chess'', ''Reading adventure/science books'', ''Watching educational videos'', ''Playing soccer'', ''Cooking with family'']'
  career_goals: Luis is fascinated by how things work and dreams of becoming an engineer or a computer programmer who designs games or machines that help people. He also imagines one day joining the community
    as a firefighter or rescue worker, seeing it as a way to protect and support his neighborhood.
