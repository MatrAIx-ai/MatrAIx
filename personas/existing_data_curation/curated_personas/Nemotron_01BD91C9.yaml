personas:
  professional: Alina Jimenez is a bilingual animal welfare specialist who blends meticulous facility management with compassionate community outreach, leveraging their hands‑on caretaking expertise and
    organizational acumen to design low‑stress protocols and educational programs while charting a path toward a supervisory role and eventual sanctuary directorship.
  sports: Alina Jimenez enjoys weekend hikes in the Texas Hill Country with their rescue dog Luna, participates in a local trail‑running club that meets bi‑weekly, and follows the Dallas Cowboys and Dallas
    Mavericks, cheering them on while maintaining a modest home‑gym routine of bodyweight exercises three times a week.
  arts: Alina Jimenez finds creative fulfillment in flamenco dance lessons with their husband, photographing rescued animals for local gallery shows, and immerses themselves in the literary worlds of Cervantes
    and García Márquez, while regularly attending performances by the Dallas Symphony Orchestra and listening to guitarist Paco de Lucía.
  travel: Alina Jimenez prefers well‑planned trips that balance cultural immersion and relaxation, having recently explored Seville’s historic Alcázar and flamenco scene, planning a future wildlife‑focused
    safari in Patagonia, and often opting for short road‑trip getaways to Hill Country wineries with Luna in tow.
  culinary: Alina Jimenez delights in cooking authentic paella with saffron, chorizo, and fresh seafood, prepares chilled gazpacho using heirloom tomatoes and cucumber, and perfects caramel‑topped flan,
    showcasing a moderate skill level that blends traditional techniques with occasional improvisations using locally sourced ingredients.
  core: Alina Jimenez is a structure‑loving, compassion‑driven animal welfare professional who balances meticulous planning with creative outlets like flamenco and photography, while managing anxiety through
    routine yoga and a disciplined financial regimen.
background:
  cultural: Alina is a first‑generation American of Spanish descent. Her parents emigrated from Valencia in the early 1990s, and she grew up in a bilingual household that celebrated Spanish holidays such
    as Semana Santa and the Feast of San Juan. Family meals centered around shared tapas, and Sunday gatherings reinforced the value of comunidad (community). Living in Dallas, she integrates her heritage
    by participating in the local Hispanic cultural festivals, supporting Spanish‑language community groups, and preserving the language through daily conversation with her family. Her cultural upbringing
    emphasized empathy, collective responsibility, and the importance of preserving traditions, all of which shape her compassionate approach to animal welfare and her commitment to community outreach.
attributes:
  skills: '[''Animal husbandry and daily care'', ''Health monitoring and basic veterinary assistance'', ''Behavioral enrichment design'', ''Record‑keeping and regulatory compliance'', ''Inventory and supply
