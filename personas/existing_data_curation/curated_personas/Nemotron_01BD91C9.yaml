    ''Conflict mediation and team cohesion'']'
  hobbies: '[''Reading historical fiction and Spanish literature'', ''Cooking traditional Spanish dishes'', ''Yoga and guided meditation'', ''Vegetable gardening'', ''Hiking with rescue dog'', ''Animal
    photography'', ''Flamenco dance lessons'', ''Volunteering at animal‑rescue events'']'
  career_goals: Alina aims to progress from her current caretaker role to a supervisory position within the next two years, eventually becoming the director of an animal welfare program or sanctuary in
    the Dallas‑Fort Worth area. She plans to obtain Certified Veterinary Technician credentials to deepen her clinical expertise and to complete a professional certification in nonprofit management. Her
    long‑term ambition is to establish a community‑focused sanctuary that rescues farm and companion animals, provides low‑stress rehabilitation, and offers educational workshops for local schools. She
    also hopes to develop a mentorship program for at‑risk youth, using animal care as a pathway to responsibility and emotional well‑being. Balancing her desire for structure, Alina intends to create systematic
    protocols that reduce uncertainty for staff and improve animal welfare outcomes.
