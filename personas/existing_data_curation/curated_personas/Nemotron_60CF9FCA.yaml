personas:
  professional: Ana Cuevas is an aspiring marine explorer who spends their free time cataloguing shells and tide‑pool creatures, merging boundless curiosity with a practical knack for sketching and organizing
    their findings while staying relaxed about strict schedules.
  sports: Ana Cuevas darts through the sand on weekends, joins the school’s after‑school swim club, and they cheer passionately for the local Harbor Hawks baseball team while occasionally participating
    in a junior beach‑volleyball group, all preferring free‑play over structured drills.
  arts: Ana Cuevas channels their creativity into the school art club, crafting vivid sun‑burst collages and drawing beloved comic heroes inspired by Stan Lee, while they hum along to pop sensations like
    Ariana Grande and the classic Disney Frozen soundtrack during weekend family sing‑alongs.
  travel: Ana Cuevas loves spontaneous weekend trips to the nearby sandy shoreline of Santa Cruz, dreams of snorkeling among the coral reefs of the Great Barrier Reef, and they favor building sandcastles
    over packed itineraries, often packing just a swimsuit, a sketchbook, and a handful of seashells.
  culinary: Ana Cuevas loves mixing mashed avocado with lime juice and a pinch of salt to make guacamole, rolling up mini taco shells with shredded cheese and fresh salsa, and they proudly watch the family
    kitchen while declaring themselves the “sauce supervisor” during weekend cooking sessions.
  core: Ana Cuevas is a beach‑obsessed, sketch‑loving eight‑year‑old who balances boundless curiosity with a laid‑back streak, and they often forget homework in exchange for the next tide‑pool adventure
    while hoarding seashells like tiny treasures.
background:
  cultural: Ana comes from a Mexican family that values close‑knit relationships, storytelling, and cultural traditions. At home, Spanish is spoken alongside English, and the family celebrates holidays
    such as Día de los Muertos and Mexican Independence Day with food, music, and decoration. Living in Myrtle Beach exposes her to a coastal Southern culture, where beach outings, seafood, and community
    festivals are common. This blend of Mexican heritage and Southern coastal life shapes her worldview, giving her a rich bilingual environment, an appreciation for diverse cuisines, and an affinity for
    both beach and cultural celebrations.
