  career_goals: Although still young, Ana imagines several possibilities for her future. She dreams of exploring the ocean as a marine biologist, inspired by the beaches near her home. She also envisions
    becoming a teacher who can share both science knowledge and her Mexican heritage with students. Occasionally she imagines opening a community art workshop where children can create and celebrate their
    cultures together.
