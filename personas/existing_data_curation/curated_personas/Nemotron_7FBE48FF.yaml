  hobbies: '[''Hiking along the Mississippi River bluffs'', ''Playing acoustic guitar'', ''Reading contemporary and science fiction'', ''Volunteering at community health fairs'', ''Cooking healthy meals'',
    ''Gardening'']'
  career_goals: Janice aims to complete a physician assistant graduate program within the next two years and obtain national certification. She aspires to specialize in primary care, focusing on underserved
    rural communities in Wisconsin. Long-term, she envisions taking on leadership roles such as a clinical supervisor or educator for aspiring PAs, and eventually contributing to community health initiatives
    that improve access to preventive care in La Crosse County.
