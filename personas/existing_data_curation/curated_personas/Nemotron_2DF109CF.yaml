  hobbies: '["Reading historical fiction", "Listening to documentary podcasts", "Hiking Hill Country trails", "Volunteering at an animal shelter", "Practicing yoga", "Journaling", "Attending live‑music
    shows", "Exploring food‑truck festivals", "Playing acoustic guitar", "Street‑art photography", "Woodworking"]'
  career_goals: Yvonne aims to transition from frontline protective service duties to a leadership role where she can shape policy and training. She plans to earn a Master of Public Administration within
    the next three years, with the goal of becoming a precinct commander or community liaison director in Austin. She is passionate about integrating humanities perspectives into policing, developing community‑based
    violence‑prevention programs, and mentoring new officers. Ultimately, she hopes to influence city‑wide public safety strategy and champion inclusive, evidence‑based practices.
