persona_description: A historian who specializes in the study of the history of North Carolina, particularly focusing on the life and works of Archibald DeBow Murphey. His research interests include the
  life and legacy of Murphey, his contributions to the field of education, and his plans for improving the lives of North Carolina citizens. He is also interested in the political and social changes that
  occurred during Murphey's time, as well as the impact of his ideas on the development of education and the abolition of slavery in the state.
