personas:
  professional: Philip Walton, a three‑year‑old ‘mini‑entrepreneur’ who runs the living‑room sandbox with meticulous block‑building plans, uses a tiny chalkboard to organize trade‑off games, and thrives
    on being the center of attention while negotiating with peers, balances his competitive spirit with a practical curiosity about how things fit together.
  sports: Philip Walton, a three‑year‑old who bounds around the community Tots Soccer Club’s grassy field in the spring, enthusiastically shouts encouragement at the nearby minor‑league baseball team’s
    games, eagerly joins the local preschool gymnastics class each Saturday, and approaches each activity with a competitive spark, often demanding the first turn on the slide while balancing his exuberant
    sociability with a pragmatic need for routine.
  arts: Philip Walton, a three‑year‑old who spends afternoons scribbling bold shapes on the fridge inspired by Eric Carle’s vivid illustrations, sings along to the catchy tunes of Sesame Street and Raffi
    with unbridled enthusiasm, watches Disney's Frozen repeatedly, letting the princesses’ melodies shape his imaginative play, and proudly performs impromptu dance numbers for his family.
  travel: Philip Walton, a three‑year‑old who clings to his mother’s hand on family trips to the nearby Children’s Museum of Indianapolis and enjoys the splashy water features at the local Aquatic Center,
    dreams of a future adventure to Disneyland in California and a vibrant safari at the Serengeti, but prefers short car rides over long flights, balancing his curiosity for new sights with a practical
    need for familiar routines.
  culinary: Philip Walton, a three‑year‑old who enthusiastically devours buttery mini pancakes topped with fresh blueberries, insists on a side of crunchy carrot sticks with ranch dip, proudly mixes his
    own peanut butter and jelly sandwiches in the kitchen, but often throws a tantrum when broccoli appears on his plate, reflecting his talkative, competitive palate and occasional emotional distress over
    unwanted foods.
  core: Philip Walton, a chatty three‑year‑old with boundless curiosity, a competitive streak, and a habit of throwing dramatic meltdowns over misplaced stickers, constantly seeks the spotlight while navigating
    his emotional roller‑coaster.
background:
  cultural: Philip comes from a white, Midwestern family rooted in Steinauer, Nebraska, a small agricultural community in Pawnee County. His family embraces rural values of hard work, neighborliness, and
    community gatherings, often attending church services and participating in local events such as county fairs and potluck meals. These traditions foster a sense of belonging and an appreciation for seasonal
    celebrations, while also exposing Philip to the practical, down-to-earth lifestyle typical of the Nebraska plains.
