  career_goals: Even at a young age, Philip often talks about future roles such as becoming a firefighter because he loves the excitement of helping others, a scientist to explore how things work, or a
    teacher to share knowledge. He enjoys being the center of attention in games, showing competitive eagerness to win races or finish puzzles first, which fuels his ambition to excel in whichever path
    he chooses. His goals are shaped by his sociable nature and a desire for tangible achievements.
