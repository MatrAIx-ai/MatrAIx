  hobbies: '["Abstract Painting", "Acoustic Guitar", "Landscape Photography", "Hiking and Trail Exploration", "Cycling", "Attending Art & Music Festivals", "Board Game Nights with Friends", "Community Theater
    Volunteering", "Organic Gardening", "Experimental Cooking", "Reading Science Fiction & Fantasy"]'
  career_goals: He aims to move into a senior executive role—such as Director of Operations or Vice President of Innovation—where he can shape corporate culture around creativity, sustainability, and employee
    well‑being. In the longer term, Adam hopes to launch a consulting practice that helps midsize companies integrate artistic thinking into their strategy, and to serve as a mentor for emerging leaders
    in the Pacific Northwest.
