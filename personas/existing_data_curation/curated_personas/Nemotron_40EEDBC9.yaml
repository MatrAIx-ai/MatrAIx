personas:
  professional: Adam Everett is an innovative manager at a midsize tech firm whose strategic planning and financial oversight are infused with a painter's imagination, fostering a collaborative, flexible
    work environment while occasionally misplacing meeting notes due to their relaxed approach to deadlines, and they often rely on informal brainstorming sessions to spark fresh ideas.
  sports: Adam Everett fuels their love of the outdoors by hiking the Columbia River Gorge, cycling the Willamette Valley’s country roads, and they join the Oregon Hiking Club, while cheering on the Portland
    Timbers in the fall and the Trail Blazers during NBA season.
  arts: Adam Everett paints abstract canvases inspired by Jackson Pollock, strums acoustic guitar around campfires echoing the folk tunes of Gillian Welch, and captures Oregon’s misty forests in photographs
    reminiscent of Ansel Adams, while they regularly attend community theater productions and board‑game nights that double as social art gatherings.
  travel: Adam Everett prefers spontaneous road trips that blend photography stops in Crater Lake and Oregon’s coastal cliffs with visits to the art galleries of Portland, and they often map out routes
    on a weather‑worn notebook, while dreaming of a future retreat to the lavender fields of Provence to study farm‑to‑table cooking.
  culinary: Adam Everett, an enthusiastic home chef, cultivates heirloom tomatoes, kale, and rosemary in their organic garden to craft seasonal dishes like roasted beet salad with goat cheese, cedar‑plank
    salmon with dill, and sourdough bread infused with fresh rosemary, often pairing meals with locally brewed IPA, and they love experimenting with fermented vegetables for a tangy twist.
  core: Adam Everett is a 50‑year‑old business leader who balances board‑room strategy with brush‑stroke spontaneity, swapping spreadsheets for paint palettes and hiking boots, and they occasionally misplace
    their keys in a canvas‑covered studio.
background:
  cultural: Adam is a White American of Irish‑Scottish descent who grew up in a small town near Portland before moving to Corvallis. The Pacific Northwest’s emphasis on environmental stewardship, outdoor
    recreation, and a vibrant community‑driven arts scene has shaped his values. He embraces progressive, collaborative, and sustainability‑focused ideals while maintaining a practical, self‑reliant work
    ethic inherited from his family’s Midwestern roots. His marriage and long‑standing community ties reinforce his commitment to harmony and cooperative engagement.
attributes:
  skills: '["Strategic Planning", "Team Leadership", "Project Management", "Budgeting & Financial Analysis", "Creative Problem Solving", "Innovation Facilitation", "Cross‑functional Collaboration", "Negotiation",
