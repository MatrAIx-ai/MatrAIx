  career_goals: Sarahjane aims to re‑enter the professional sphere as a freelance consultant for local nonprofits, specializing in grant development and historical documentation. She plans to obtain a certificate
    in nonprofit management to strengthen her expertise and to publish a regional history book that blends scholarly research with personal narratives. Her long‑term ambition includes establishing a modest
    community program that offers creative writing workshops and mindfulness support for adults coping with anxiety, allowing her to balance solitary work with purposeful, small‑scale collaboration while
    achieving financial stability.
