personas:
  professional: Diane Malone, a 19‑year‑old aspiring STEM teacher, blends curiosity‑driven lesson design with pragmatic classroom routines, leveraging her expertise in Scratch coding, interactive whiteboards,
    and data‑informed assessments while they stay calm and solution‑focused under pressure.
  sports: Diane Malone enjoys hiking the rugged trails of Cunningham Falls State Park and jogs with the Carroll County Trailblazers Running Club, while they cheer on the Washington Wizards in basketball
    and the Baltimore Ravens in football, reflecting a balanced love for outdoor activity and local sports fandom.
  arts: Diane Malone nurtures artistic expression through piano recitals featuring the emotive works of Ludovico Einaudi, captures nature photographs inspired by Ansel Adams, and unwinds with board games
    like Pandemic, while they find that music, visual art, and strategic play shape their creative identity.
  travel: Diane Malone prefers road‑trip adventures to nearby state parks such as Shenandoah National Park and plans future solo travel to Kyoto, Japan, balancing a tight student budget with careful itinerary
    planning using Google Trips, while they crave both cultural immersion and natural scenery.
  culinary: Diane Malone enjoys cooking nutritious meals like quinoa bowls with roasted sweet potatoes, kale, and a lemon‑tahini dressing, frequently experimenting with fresh herbs such as basil and cilantro,
    and while they possess modest culinary skill, they relish hosting small potluck dinners for friends after school.
  core: Diane Malone, a 19‑year‑old future STEM leader, blends curiosity with practicality, juggling DIY electronics, piano practice, and meticulous budgeting while they occasionally forget to floss.
background:
  cultural: Diane comes from a white American family with deep roots in the Mid‑Atlantic region, tracing ancestry to Irish and German immigrants who settled in Maryland generations ago. Growing up in Hampstead,
    a close‑knit suburb of Carroll County, she was immersed in a community that values education, volunteerism, and a blend of traditional and progressive attitudes. Family gatherings often featured stories
    of local history, church involvement, and participation in town events, fostering her cooperative and considerate nature. The proximity to both rural landscapes and the Baltimore‑Washington metropolitan
    area exposed her to a modest cultural diversity, encouraging an openness to new ideas while maintaining respect for longstanding community traditions.
attributes:
  skills: '["STEM curriculum design", "Classroom management", "Lesson planning and differentiation", "Educational technology integration", "Basic coding (Scratch)", "Scientific inquiry facilitation", "Mathematics
    instruction", "Assessment creation and data analysis", "Communication and collaboration", "Project‑based learning implementation"]'
  hobbies: '["Reading popular science books", "DIY electronics kits", "Hiking local trails", "Gardening", "Strategic board games", "Volunteering at community library", "Cooking healthy meals", "Playing
    piano", "Photography", "Crafting hands‑on science projects for students"]'
  career_goals: Diane aims to become a lead STEM teacher within the next three years, spearheading the development of interdisciplinary units that connect science, technology, engineering, and mathematics
    across elementary and middle grades. She plans to pursue a master's degree in Education with a focus on curriculum innovation, eventually moving into a district‑wide STEM coordinator role where she
    can mentor new teachers and shape district policy. Long‑term, she envisions founding an after‑school robotics and maker club that provides equitable access to hands‑on engineering experiences for all
    students in Carroll County.
