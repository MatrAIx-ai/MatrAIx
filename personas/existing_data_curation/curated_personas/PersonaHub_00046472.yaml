persona_description: A scientist with expertise in plant virology, particularly focused on the molecular characterization and phylogenetic analysis of sugarcane yellow leaf virus (SCYLV) isolates from China.
  This scientist is responsible for conducting surveys to determine the distribution of SCYLV across five major sugarcane production provinces in China and for the detection and sequencing of the virus'
  complete and partial genomic sequences. They are also involved in the analysis of the genetic diversity and phylogenetic relationships of the virus across China and worldwide.
