personas:
  professional: Jean Coleman, a two-year-old, already shows professional-like curiosity by meticulously arranging building blocks while readily reshuffling them, demonstrating early organizational skill,
    reliability in cleaning up toys, and an unconventional approach to problem-solving through imaginative play.
  sports: Jean Coleman, a two-year-old, loves the local kids' tumble gym's soft-play sessions where they compete to climb the mini wall faster than peers, cheers for the Springfield Little Strikers junior
    soccer team, and eagerly joins seasonal activities like splashing in the summer pool and building snowmen in winter.
  arts: Jean Coleman, a two-year-old, displays a budding artistic palate by drawing bold abstract shapes with Crayola crayons reminiscent of Henri Matisse's cut-outs, humming along to Sesame Street's The
    Count song and dancing to the rhythmic beats of the Disney Junior band.
  travel: Jean Coleman, a curious two-year-old, has explored the Boston Children's Museum's interactive exhibits, built sandcastles on the Cancun beaches, eagerly watched the Eiffel Tower's lights on a
    family photo, and prefers short car rides with a familiar plush bear tucked in the back seat.
  culinary: Jean Coleman, age two, loves mashed avocado with a squeeze of lemon, banana pancakes drizzled with maple syrup, soft cheese cubes, and happily helps stir oatmeal with a wooden spoon, though
    they often toss peas off the bowl when bored.
  core: Jean Coleman, a two-year-old with fierce curiosity, a competitive spark, and a love for bright colors, balances toddler responsibilities with bursts of imagination and occasional meltdowns.
background:
  cultural: Jean is a Black toddler raised in Wichita, Kansas. Her family embraces African American cultural heritage, celebrating traditions such as Juneteenth, family cookouts with soul food, and storytelling
    evenings featuring African‑American folktales. Her home is filled with a mix of gospel, jazz, and contemporary R&B music, and she is introduced to visual arts that reflect African diaspora influences.
    The community’s Midwestern values blend with these cultural practices, providing a warm, inclusive environment that nurtures her curiosity and appreciation for diverse artistic expressions.
