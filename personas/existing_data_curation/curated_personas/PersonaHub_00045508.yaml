persona_description: A former Australian Labor Party leader who served as the Prime Minister of Australia from 1983 to 1991. Known for his ruthless tactics in dealing with opponents, his ability to get
  the best out of people, and his popularity with the Australian people. His prime ministership came to grief over his rivalry with his treasurer, Paul Keating, and the deterioration of Australia's economy,
  culminating in the worst recession since the 1930s. Despite the challenges, Hawke remained a winner, enjoying further victories in 1987 and 1990. His historical reputation has risen as his record has
  been viewed in light of the more modest achievements of every one of his successors. He is survived by his second wife, Blanche d'Alpuget, his children by his first marriage, Susan, Stephen and Rosslyn,
  six grandchildren, as well as great-grandchildren.
