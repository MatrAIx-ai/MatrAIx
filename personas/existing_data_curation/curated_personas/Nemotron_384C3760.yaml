  career_goals: At 92, Chong's primary ambition is to preserve and transmit his business wisdom to his grandchildren and local entrepreneurs. He hopes to author a memoir that chronicles his family's immigrant
    journey and the evolution of suburban small businesses in New Jersey. He also aims to volunteer as a mentor for a handful of community start‑ups, ensuring they avoid costly missteps. Maintaining his
    health to support his wife, remain independent, and enjoy quiet daily life is another central goal. Additionally, he wishes to establish a modest scholarship fund for local students pursuing business
    studies, reflecting his lifelong belief in the value of education.
