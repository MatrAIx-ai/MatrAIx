  career_goals: Pedro aims to stay active and purposeful by volunteering at the local senior center and Mexican cultural association, mentoring younger community members, and organizing a weekly multicultural
    gathering that celebrates Mexican holidays and promotes social harmony. He also seeks to strengthen his financial stability through careful budgeting and to maintain his health with regular walks and
    medical check-ups, while hoping one day to visit his family in Mexico.
