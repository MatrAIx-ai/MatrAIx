    ''Welding and Fabrication'']'
  hobbies: '[''Restoring Classic Cars'', ''DIY Automotive Projects'', ''Hiking in the Santa Cruz Mountains'', ''Racing Simulators'', ''Woodworking'', ''Home Brewing'', ''Attending Car Meets and Motorsports
    Events'', ''Cooking'', ''Listening to Technical Podcasts'']'
  career_goals: Charles aims to achieve ASE Master Technician certification and become a recognized specialist in hybrid and electric vehicle maintenance. Over the next five years, he plans to take on a
    lead technician role, mentoring junior staff and implementing lean workflow practices to improve shop efficiency. Ultimately, he hopes to open his own independent garage that emphasizes sustainable
    automotive services and offers community workshops on vehicle maintenance and environmental stewardship.
