personas:
  professional: Charles Villejoin is a seasoned automotive service technician specializing in hybrid and electric vehicle diagnostics, who leverages a structured, precision‑driven work ethic and calm resilience
    to lead lean workflow initiatives and mentor junior staff, and they are known for turning complex problems into systematic solutions.
  sports: Charles Villejoin stays fit by weekend hikes in the Santa Cruz Mountains, occasional trail runs with the San Jose Striders club, and follows the Golden State Warriors and San Francisco 49ers avidly,
    while they dabble in amateur karting during the summer season.
  arts: Charles Villejoin channels artistic flair through custom woodworking projects and classic‑car restorations while enjoying the gritty blues of Muddy Waters, the cinematic scores of Ennio Morricone,
    and the sleek design aesthetics of Philippe Starck, which together shape their creative downtime.
  travel: Charles Villejoin prefers meticulously planned road trips that combine scenic drives along California’s Highway 1 with visits to automotive museums, such as the Petersen Automotive Museum in Los
    Angeles and the Cité de l’Automobile in Mulhouse, France, and they dream of a future electric‑car road adventure across Norway’s fjord routes.
  culinary: Charles Villejoin, a competent home chef, frequently prepares a grilled ribeye seasoned with rosemary and garlic, pairs it with a side of ratatouille, and enjoys crafting their own hoppy IPA,
    while they indulge in occasional croissants from a local bakery and savor spontaneous taco nights with fresh cilantro and lime.
  core: Charles Villejoin balances a calm, methodical approach to life with a secret obsession for over‑tightening every bolt to the exact torque spec—even if it means spending extra minutes puzzling over
    the perfect espresso shot, and they relish the quiet after a long day in the garage.
background:
  cultural: Charles grew up in a middle‑class suburban family in the Bay Area, where a blend of American and French heritage shaped his cultural outlook. His upbringing in Santa Clara County exposed him
    to a diverse, environmentally conscious community, influencing his appreciation for sustainable practices and his respect for multicultural perspectives. While his primary cultural identity is rooted
    in mainstream American values—hard work, practicality, and community involvement—he also embraces the region's eclectic mix of cuisines, outdoor activities, and tech‑forward mindset.
attributes:
  skills: '[''Automotive Diagnostics'', ''Engine Repair and Rebuilding'', ''Hybrid and Electric Vehicle Maintenance'', ''Brake System Servicing'', ''Transmission Repair'', ''Computerized Diagnostic Software
