personas:
  professional: Jenny Bolt, a teenage visual artist in the making, blends sketching, watercolor, and digital illustration while channeling their curiosity into experimental art projects at the Milwaukee
    Avenue Art District and the Art Institute of Chicago, often collaborating with friends in the school theater club and effortlessly merging visual storytelling with acoustic guitar performances.
  sports: Jenny Bolt enjoys casual basketball pick‑up games with friends, roots for the Chicago Bulls and Chicago Blackhawks, and spends Saturday mornings at the Lake County Strikers youth soccer club,
    favoring social fun over rigorous training while dabbling in skateboarding at the nearby skate park.
  arts: Jenny Bolt draws inspiration from street artists like Banksy and muralist Keith Haring, admires contemporary painters such as Yayoi Kusama and illustrator James Jean, and fills their free hours
    listening to acoustic guitar icons John Mayer and indie folk band Fleet Foxes, often integrating these influences into their own watercolor and digital illustration experiments.
  travel: Jenny Bolt prefers spur‑of‑the‑moment day trips over rigid itineraries, frequently exploring nearby Milwaukee for its vibrant coffee scene, dreaming of a future museum tour of New York’s MoMA
    and Paris’s Louvre, while budgeting modestly by using a teen travel fund and relying on family rideshares for weekend getaways.
  culinary: Jenny Bolt’s palate gravitates toward avocado toast topped with radish, hot ramen bowls, and classic Chicago deep‑dish pizza, and while they can whip up a decent homemade pesto pasta, they most
    enjoy discovering new flavors at Lake County food festivals, especially tasting artisanal matcha lattes and gourmet tacos.
  core: Jenny Bolt is a curiosity‑driven, socially vibrant teen who weaves art, music, and spontaneous adventures into a relaxed but occasionally disorganized lifestyle, always chasing the next creative
    spark.
background:
  cultural: Jenny grew up in Grayslake, a suburban town in Lake County, Illinois, within a predominantly white, middle-class community that reflects a blend of Midwestern values and diverse cultural influences
    from nearby Chicago. Her family's roots trace back to German and Irish ancestry, common in the region, and they observe a mix of Protestant and secular traditions. The community emphasizes friendliness,
    volunteerism, and a strong sense of local pride, which has shaped Jenny's cooperative and considerate demeanor. Proximity to Chicago's vibrant arts scene exposes her to a wide range of artistic styles
    and multicultural events, reinforcing her openness to unconventional ideas and her desire to integrate those influences into her own creative expression.
