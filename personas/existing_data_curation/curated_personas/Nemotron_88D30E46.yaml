  career_goals: Jenny aims to turn her passion for art and community engagement into a career. She intends to attend an arts-focused college where she can study visual communications or multimedia design,
    eventually working as a graphic designer or digital content creator for a nonprofit arts organization. She also dreams of launching her own YouTube channel or online portfolio that showcases tutorials
    and behind-the-scenes looks at local art events. In the longer term, she hopes to lead community art programs that bring together diverse groups in Grayslake and the greater Chicago area, using her
    sociable nature to build inclusive creative spaces.
