  hobbies: '[''visiting galleries and street art tours'', ''reading art history and design books'', ''listening to jazz and blues'', ''community gardening'', ''participating in Scrabble tournaments'', ''mindfulness
    walking'', ''sketching/doodling'']'
  career_goals: She aspires to advance into a supervisory or lead role within the warehouse environment, such as a shift lead or operations coordinator, where she can apply her organizational strengths
    and methodical approach to improve processes. Over the next five years, she hopes to obtain certification as a Certified Forklift Operator and OSHA safety trainer, and eventually mentor more staff.
    She also expresses a long‑term ambition of starting a small consulting service for local businesses that need assistance streamlining their inventory and material handling practices.
