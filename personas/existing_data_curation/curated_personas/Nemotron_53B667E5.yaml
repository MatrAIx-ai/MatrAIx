personas:
  professional: Louisa Finch, a seasoned home‑health aide with a business degree, they blend empathic bedside care with creative problem‑solving, often using watercolor sketches to soothe clients while
    juggling a flexible schedule that sometimes borders on disorganized as they pursue a mentorship role and dream of launching an art‑therapy workshop for seniors.
  sports: Louisa Finch, an enthusiastic member of a local senior walking club, they enjoy leisurely strolls along the Saginaw River in spring, cheer for the Detroit Tigers in baseball and the Grand Rapids
    Griffins in hockey, and occasionally join a weekly chair‑yoga class at the community senior center to stay limber.
  arts: Louisa Finch, an avid watercolor painter and theatergoer, they draw inspiration from the luminous works of Claude Monet and the narrative depth of Ursula K. Le Guin, regularly attend productions
    of “The Glass Menagerie” at the downtown community theater, and find solace sketching Michigan landscapes in the quiet of the Saginaw River’s riverbank.
  travel: Louisa Finch, a spontaneous road‑trip enthusiast, they cherish revisiting Michigan’s Mackinac Island each summer, have explored the historic streets of Charleston, South Carolina, and keep a bucket‑list
    that includes the cherry blossoms of Kyoto, Japan, favoring flexible itineraries that allow impromptu detours to local art fairs and farmers’ markets.
  culinary: Louisa Finch, a modest home cook with a green thumb, they delight in preparing cedar‑plank salmon seasoned with fresh dill and lemon, bake buttermilk pie using locally sourced cherries, and
    frequently experiment with herbal tea blends featuring rosemary, sage, and honey, though their tendency to over‑spice occasionally sends guests reaching for a glass of water.
  core: Louisa Finch, a 69‑year‑old home‑health aide with a watercolor‑splattered notebook, they blend boundless imagination with a gentle, if occasionally chaotic, devotion to nurturing seniors, art, and
    their own curiosity.
background:
  cultural: Louisa was raised in a small Midwestern town in Michigan, where values of hard work, community solidarity, and modesty were emphasized. Her family's Catholic heritage and participation in local
    church events fostered a strong sense of service and respect for tradition. Growing up in the post‑industrial era of the Great Lakes region, she experienced the stability of close‑knit neighborhoods
    alongside cultural shifts toward greater artistic and educational opportunities, shaping her appreciation for both practical caregiving and creative expression.
attributes:
  skills: '[''Patient care (ADLs)'', ''Medication reminder and basic health monitoring'', ''Empathetic communication'', ''Documentation and record keeping'', ''Budgeting and resource allocation'', ''Flexible
