  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading speculative fiction and philosophy'', ''Gardening'', ''Knitting'', ''Volunteer work at senior center'', ''Community theater attendance'', ''Nature
    walks'', ''Visiting art museums'', ''Book club participation'']'
  career_goals: Louisa aims to transition into a part‑time or mentorship role where she can train younger home‑health aides in compassionate communication and client‑centered care. She dreams of launching
    a community workshop that blends art therapy with senior wellness, allowing her to share her artistic passion while supporting local elders. In the longer term, she plans to complete a certificate in
    holistic health and possibly write a memoir reflecting her decades of caring work and love of creativity.
