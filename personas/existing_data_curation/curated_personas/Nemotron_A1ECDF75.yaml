personas:
  professional: David Hadley, a seasoned hairdresser with 15 years of hands‑on experience, blends precision cutting, advanced color techniques, and scalp‑health consultations with a compassionate, organized
    approach to client relationships, leveraging social media and salon scheduling software while methodically planning a boutique salon that fuses Southern hospitality with inclusive styling for natural
    and textured hair.
  sports: David Hadley enjoys weekend fishing on the Alabama River and hiking the trails of Oak Mountain State Park, participates in the Montgomery Hikers Association, follows the Alabama Crimson Tide football
    team and the Montgomery Biscuits minor‑league baseball club, and balances his low‑impact outdoor pursuits with occasional pick‑up basketball games at the local community center.
  arts: David Hadley expresses his creativity through vintage film photography—often shooting with a Leica M3 and developing prints in a home darkroom—while curating salon playlists that weave together
    classics like B.B. King, Etta James, and contemporary R&B from H.E.R. and Leon Bridges, and he regularly attends Montgomery Museum of Fine Arts exhibitions featuring local Southern artists.
  travel: David Hadley prefers road‑trip getaways that blend adventure and relaxation, often spending long weekends exploring historic New Orleans, soaking in the music and cuisine of the French Quarter,
    and he dreams of hiking the Great Smoky Mountains' Appalachian Trail sections, all while keeping travel costs in check through strategic use of reward points and a modest travel budget.
  culinary: David Hadley specializes in Southern comfort staples such as fried chicken, creamy grits, collard greens, and banana pudding, and he frequently experiments with fusion twists—like a gochujang‑glazed
    chicken wing or Cajun‑spiced shrimp jambalaya—using ingredients like smoked paprika, fresh thyme, and locally sourced honey, though he sometimes over‑salts dishes in his zeal to perfect flavor.
  core: David Hadley balances a restless creative curiosity with a steady, compassionate routine, often humming blues while adjusting a vintage camera strap, and occasionally forgets to file receipts until
    the last minute, illustrating a blend of meticulous professionalism and endearing quirks.
background:
  cultural: David was raised in a close‑knit white Southern family in Montgomery, Alabama, where church gatherings, community festivals, and family barbecues shaped his values of hospitality and mutual
    support. Growing up in the Deep South, he absorbed a strong work ethic and a love for storytelling, which now informs his client interactions. His profession exposed him to the rich tapestry of African
    American hair culture, prompting a deep appreciation for diverse aesthetic traditions and a commitment to cultural competence. David actively incorporates Southern charm with an inclusive, collaborative
    approach, honoring both his heritage and the multicultural community he serves.
attributes:
  skills: '[''Precision haircutting'', ''Advanced hair coloring (balayage, ombré, corrective)'', ''Event styling'', ''Scalp health consultation'', ''Client relationship management'', ''Product knowledge
