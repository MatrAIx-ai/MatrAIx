  hobbies: '[''Hair photography'', ''Southern cooking and recipe experimentation'', ''Playlist curation (blues, R&B, soul)'', ''Fishing on the Alabama River'', ''Hiking in state parks'', ''Volunteer grooming
    workshops for seniors'', ''Charity hair‑cut events'']'
  career_goals: David aims to open his own boutique salon in Montgomery that blends Southern hospitality with inclusive styling for a diverse clientele, including services tailored to natural and textured
    hair. He plans to earn industry certifications (e.g., Colorist Mastery, Advanced Texture Training) and eventually become a certified trainer, offering workshops for aspiring stylists in the community.
    David also hopes to partner with local schools for youth mentorship programs, using his compassionate nature to guide at‑risk teens toward career pathways in cosmetology. Long‑term, he envisions a small
    chain of salons that serve as cultural hubs, hosting community events and charity fundraisers.
