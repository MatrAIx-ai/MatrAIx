  hobbies: '[''Abstract watercolor painting'', ''Landscape and abstract photography'', ''Reading speculative fiction and philosophy'', ''Reflective poetry writing'', ''Solo hiking in the Rockies'', ''Gardening'',
    ''Yoga'', ''Small-group book clubs'', ''Visiting local art galleries'', ''Collecting vintage postcards'', ''Volunteering at community art center'']'
  career_goals: Maria aims to transition from a senior analyst role to a strategic innovation leader within a mid-size organization or consulting firm, where she can embed creative problem-solving and abstract
    thinking into core business strategy. She aspires to establish an internal innovation lab that pilots novel business models, mentor junior analysts—especially those with interdisciplinary interests—and
    become a recognized thought-leader on integrating art-inspired methodologies into corporate decision-making. Ultimately, she hopes to author a guidebook on marrying quantitative analysis with imaginative
    exploration, and to work part-time as a consultant for nonprofit arts initiatives.
