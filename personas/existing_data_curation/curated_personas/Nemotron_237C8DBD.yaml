  hobbies: '[''Woodworking'', ''Metal sculpture'', ''Lake fishing'', ''Hunting'', ''Home brewing'', ''Community theater'', ''Model aircraft building'', ''Camping'', ''Snowmobiling'', ''Polish cultural festivals'',
    ''Arduino tinkering'', ''Guitar playing'', ''Reading science fiction'']'
  career_goals: René aspires to advance from the shop floor to a supervisory role, aiming to become a shift foreman within the next three years. He plans to earn a Certified Welder (CWB) credential and
    complete a formal CNC programming certification to expand his technical toolkit. Parallel to his career progression, he dreams of launching a small side business that blends his fabrication expertise
    with his artistic side - creating custom metal furniture and functional art for homes and local businesses. He envisions this venture as a steady supplemental income that could eventually replace his
    full-time assembly job, providing greater flexibility for his family and more creative freedom.
