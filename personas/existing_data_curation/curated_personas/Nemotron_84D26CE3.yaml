personas:
  professional: Connie Gautreaux is a 17‑year‑old aspiring community event coordinator who leverages their natural ease in rallying peers, basic first‑aid certification, and informal experience planning
    beach clean‑ups to lead teen‑focused pop‑up activities while juggling part‑time work at a surf shop.
  sports: Connie Gautreaux is an avid beach‑volleyball and surf enthusiast who trains with the local youth surf club, plays on the high‑school beach‑volleyball team, follows the AVP professional beach‑volleyball
    tour, and regularly watches the Los Angeles Lakers during the NBA season with friends.
  arts: Connie Gautreaux channels creativity through short TikTok dance clips inspired by artists like Doja Cat and Lil Nas X, attends live shows at the coastal amphitheater featuring local indie bands
    such as The Sea Glasss, and devours teen fiction titles like *They Both Die at the End* and *Aristotle and Dante Discover the Secrets of the Universe*, shaping a vibrant, pop‑culture‑infused identity.
  travel: Connie Gautreaux prefers spontaneous weekend road trips to nearby surf towns like Santa Cruz and Malibu, balancing a modest travel fund with a love for budget‑friendly hostels, while dreaming
    of a spring backpacking adventure through the national parks of Utah and Colorado once they finish their GED.
  culinary: Connie Gautreaux enjoys whipping up quick, flavor‑packed meals such as spicy shrimp tacos with fresh cilantro and lime, avocado toast topped with feta and chili flakes, and rainbow smoothie
    bowls featuring frozen berries, chia seeds, and almond milk, showcasing a beginner‑level kitchen confidence that delights their friends at study‑group hangouts.
  core: Connie Gautreaux is a socially‑charged teen who blends structured event planning with a love for spontaneous beach adventures, juggling a modest budget, mild health quirks, and a creative streak
    that fuels their future community‑focused aspirations.
background:
  cultural: Connie comes from a white, middle‑class family with French‑Cajun ancestry that settled in Solana Beach. Growing up near the Pacific Ocean, she has been immersed in the laid‑back Southern‑California
    beach lifestyle, blending a love for outdoor activities with the region’s vibrant arts and community scene. Her family emphasizes kindness, cooperation, and community service, which shape her outlook.
