  hobbies: '[''Beach Volleyball'', ''Surfing'', ''Hip Hop Dance'', ''Attending Local Concerts'', ''Volunteering at Community Clean-ups'', ''Creating TikTok Videos'', ''Cooking for Friends'', ''Hiking Trails'',
    ''Yoga'', ''Crafting DIY Jewelry'']'
  career_goals: In the short term, Connie plans to obtain her GED and complete a certified first‑aid/CPR course while working part‑time at a local surf shop or coffee stand. She aims to gain experience
    in hospitality and event assistance. Long‑term, she aspires to become a community event coordinator or youth program specialist, possibly earning an associate degree in hospitality management or nonprofit
    administration. She envisions organizing beach festivals, teen outreach programs, and wellness workshops that blend structure with the flexibility she enjoys.
