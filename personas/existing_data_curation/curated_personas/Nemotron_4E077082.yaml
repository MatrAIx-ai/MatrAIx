personas:
  professional: An inventive electrical engineer and embedded-systems specialist, Chong Jiang channels curiosity and a practical mindset into leading cross-functional IoT product teams; they thrive on turning
    complex concepts into tangible prototypes while their relaxed planning style and competitive drive keep them ahead of rivals in the maker community.
  sports: A social competitor on the courts, Chong Jiang joins the local rec basketball league at the Watchung Recreation Center, plays doubles badminton at the New Jersey Badminton Club, cheers for the
    New York Knicks and New Jersey Devils, and spends weekend hikes in the Watchung Reservation to recharge; they relish the camaraderie and the chance to unwind after a busy week.
  arts: An enthusiastic karaoke aficionado, Chong Jiang belts out classic rock anthems like Queen's Bohemian Rhapsody and modern pop hits from Taylor Swift, frequently attends indie film screenings at the
    Edison Theatre, and curates board-game nights featuring titles like Terraform Terra and Gloomhaven to blend strategic creativity with social fun; they love the blend of performance and community that
    fuels their energetic spirit.
  travel: A tech-centric explorer, Chong Jiang has trekked to Shenzhen's electronics markets, Bangalore's startup corridors, and Seoul's AI labs, while also favoring weekend getaways to New York City's
    museum districts and the nearby Pine Barren Preserve for a mix of urban stimulation and nature; they plan trips loosely, letting curiosity dictate the itinerary rather than strict schedules.
  culinary: A dedicated home chef, Chong Jiang masters dishes such as Mapo tofu, pan-fried pork dumplings, and ginger-scallion fish, relishes exploring street-food festivals for fresh cilantro and fermented
    black beans, and experiments with sous-vide techniques despite occasional over-spicing caused by their competitive taste-testing with friends; they view each meal as a chance to fuse tradition with
    the excitement of new flavors.
  core: Chong Jiang is a charismatic, competitively driven tech maker who mixes disciplined engineering with a flexible, sometimes messy lifestyle, punctuated by late-night coding, karaoke marathons, and
    a penchant for spicy home-cooked meals; they navigate life with a blend of curiosity, practicality, and a relaxed approach to obligations.
background:
  cultural: Chong comes from a Chinese‑heritage family that emigrated to the United States in the early 1990s. He grew up bilingual, speaking Mandarin at home and English at school, and was raised with
    a strong emphasis on education, respect for elders, and community harmony. Living in Edison, NJ—a hub of Asian culture—he actively participates in Chinese New Year celebrations, Mid‑Autumn festivals,
    and local cultural associations, while also embracing mainstream American customs like sports and neighborhood events. This bicultural experience informs his balanced outlook, blending curiosity about
    new ideas with a pragmatic respect for tradition.
