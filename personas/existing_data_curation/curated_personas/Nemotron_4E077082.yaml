  hobbies: '[''Basketball'', ''Badminton'', ''Board-game nights'', ''Maker meetups'', ''Arduino/Raspberry Pi tinkering'', ''Cooking Chinese cuisine'', ''Hiking'', ''Traveling to tech conferences'', ''STEM
    volunteering'', ''Karaoke'']'
  career_goals: He aims to launch a boutique IoT consultancy that creates affordable smart‑home solutions for small businesses and homeowners, while also building a community makerspace in Edison to mentor
    aspiring engineers. In the medium term, he wants to re‑enter the tech industry as a senior product manager, leveraging his network to drive innovative, user‑centric products. He also aspires to speak
    at regional tech conferences and contribute to open‑source hardware projects.
