  hobbies: '[''Hip‑hop and salsa dancing'', ''Volleyball (recreational league)'', ''Live music concerts'', ''Cooking Caribbean‑inspired meals'', ''Weekend hiking on Long Island trails'', ''Mindfulness yoga'',
    ''Reading speculative fiction'']'
  career_goals: Mila aims to advance to a senior leadership role such as Director of Finance or Chief Financial Officer within the next five years. She plans to earn her CFA designation and pursue a CPA
    certification to deepen her expertise. Her ambition includes leading digital transformation initiatives that integrate AI‑driven analytics into the company’s financial processes. She also hopes to mentor
    emerging black professionals in finance, launch a financial‑literacy program for underserved youth in Suffolk County, and eventually start her own boutique consultancy focused on sustainable investing.
