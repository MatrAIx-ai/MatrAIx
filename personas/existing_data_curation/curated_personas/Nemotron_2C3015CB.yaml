personas:
  professional: Mila Edwards is a financial manager who combines advanced Excel modeling, Power BI visualizations, and Python‑driven analytics to deliver data‑rich forecasts, while their restless curiosity
    about emerging fintech tools meets a practical, occasionally disorganized workflow that thrives in collaborative, high‑energy team environments and sometimes leads to last‑minute deadline scrambles.
  sports: Mila Edwards plays competitive co‑ed volleyball with the Suffolk County Spike Club, hikes the Sunken Meadow State Park trails each weekend, and follows the New York Mets, Knicks, and Islanders,
    seeking camaraderie in team sports while their relaxed scheduling occasionally causes skipped workouts.
  arts: Mila Edwards fuels their social energy by dancing to Bad Bunny and J. Cole at community salsa nights, catching live shows featuring Lizzo and Rosalia, and winding down with speculative fiction novels
    by N.K. Jemisin, letting the rhythms and narratives shape their creative outlook.
  travel: Mila Edwards prefers spontaneous weekend trips to nearby Long Island beaches and hiking spots, has already explored the vibrant street‑food scene of San Juan, Puerto Rico, and now dreams of backpacking
    along Portugal’s coastal towns, balancing a modest travel budget with a love for group tours and cultural immersion.
  culinary: Mila Edwards enjoys experimenting in the kitchen with Caribbean‑inspired jerk chicken, plantain fries, and coconut‑lime rice, skillfully seasoning with allspice, scotch bonnet pepper, and cilantro,
    while regularly scouting New York’s diverse restaurant scene for spicy tacos al pastor and fresh sushi rolls.
  core: Mila Edwards is a curiosity‑driven financial analyst who channels high‑energy social dancing and meticulous data work into fintech projects, yet often scrambles to meet deadlines due to a laid‑back,
    occasionally disorganized approach, coping with lingering anxiety through yoga and mindfulness.
background:
  cultural: Mila grew up in a close‑knit African‑American family in the New York metropolitan area. Her parents emphasized education, community service, and cultural pride, exposing her to Black history,
    church gatherings, and neighborhood festivals. She celebrates traditions such as Juneteenth and family reunions that feature soulful music, storytelling, and Southern cooking. Living in Babylon, she
    bridges her cultural heritage with the diversity of Suffolk County, actively participating in local mentorship programs for Black youth and staying connected to the broader African‑American professional
    network in New York City.
attributes:
  skills: '[''Financial analysis'', ''Budgeting & forecasting'', ''Advanced Excel modeling'', ''Power BI and data visualization'', ''Python for financial data analysis'', ''Risk assessment'', ''Strategic
