data:
  user 1 personas: 'I want to be a movie director when i grow up.

    My dad and i own over 600 movies.

    I play the trumpet.

    I am in my high school band.'
  user 2 personas: 'I once drove a car ! my friend told me what to do while i drove.

    I use a cane to help me get around.

    I am blind.

    I have a job as a dj at a radio station.'
  Best Generated Conversation: 'User 1: What do you do for fun?

    User 2: I DJ at a radio station.

    User 1: That sounds cool! I''m in high school and I play the trumpet in the band.

    User 2: That''s awesome! I used to play the trumpet in high school.

    User 1: Really? That''s cool! What''s your favorite thing to do?

    User 2: I love to read. I''m blind, so I have to have someone read to me.

    User 1: That''s understandable. I love to read too. I like reading about history and science.

    User 2: I love history and science too! I also like reading about psychology.

    User 1: That''s cool! I''ve never been a big fan of psychology. I''m more interested in math and physics.

    User 2: I used to be interested in math and physics, but I got bored with them.

    User 1: That''s fair. They''re not for everyone.

    User 2: What do you want to be when you grow up?

    User 1: I want to be a movie director. I love movies and I think it would be so cool to make one.

    User 2: That''s a great dream! I hope you achieve it.

    User 1: Thanks! I hope so too.

    User 2: So, what kind of movies do you want to make?

    User 1: I want to make all kinds of movies, but I''m especially interested in making comedies and dramas.

    User 2: I love comedies and dramas! I think they''re the best kinds of movies.

    User 1: Me too! I think they''re the most relatable and entertaining.

    User 2: I agree. I''m so glad I met you. We have a lot in common.

    User 1: Me too! I''m glad I met you too.'
