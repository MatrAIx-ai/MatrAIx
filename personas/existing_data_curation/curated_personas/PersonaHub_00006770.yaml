persona_description: A historian who specializes in the study of the Second Great Awakening, particularly the impact of religious revivals on individuals and society in mid-nineteenth-century Western Massachusetts.
  Her research interests include the development of Protestant theology and spirituality during this period, the role of critics of revivalism in shaping American religious culture, and the ways in which
  American Christians took it upon themselves to reform society during the antebellum period. She is particularly interested in the ways in which religious revivals and theologies of the time influenced
  the development of American culture and politics.
