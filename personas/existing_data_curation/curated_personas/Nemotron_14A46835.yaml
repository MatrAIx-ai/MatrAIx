  hobbies: '[''drawing and sketching'', ''building with LEGO and construction toys'', ''reading adventure and science picture books'', ''watching educational videos about dinosaurs, space, and art techniques'',
    ''attending weekly art classes'', ''exploring parks and collecting rocks and leaves'', ''playing piano'', ''coloring in kid-focused adult coloring books'']'
  career_goals: Paul often talks about becoming an astronaut because he loves looking at the night sky and wants to explore space. He also dreams of being an artist who can create pictures that make people
    feel happy and calm. Occasionally he says he would like to be a teacher, helping younger kids learn and feel safe, reflecting his caring nature. Overall his ambitions blend his curiosity about the universe,
    his love for art, and his desire to help others.
