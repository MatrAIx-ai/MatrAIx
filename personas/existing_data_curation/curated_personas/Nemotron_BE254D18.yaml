  career_goals: Edward hopes to complete his high school education or obtain a GED within the next two years, after which he plans to enroll in a vocational program in automotive technology or construction.
    He envisions working as an auto mechanic or a small-scale contractor in Centralia, eventually opening his own garage or home‑repair business that serves the local community. He also aspires to take
    on a leadership role within his high school’s student council or a community youth organization, using his organizational abilities to improve local events and youth services while staying close to
    his family and hometown.
