personas:
  professional: Erik Hackett, a seasoned operations manager with a knack for data-driven decision making and lean-manufacturing, they leverage their pragmatic curiosity and balanced assertiveness to streamline
    multi-site processes, mentor diverse teams, and champion sustainable digital transformations.
  sports: Erik Hackett supports the Kalamazoo Growlers with weekly game attendance; they also join a local adult softball league in spring, hike the nearby Kalamazoo River Valley Trail for cardio, and balance
    their fitness routine with occasional bird-watching walks that double as low-impact exercise.
  arts: Erik Hackett indulges in folk music by Bob Dylan and contemporary indie band The Avett Brothers; they attend regional historical society lectures featuring local author Helen Horn and enjoy community
    theater productions of classic plays like 'Our Town', finding artistic solace after a day of hands-on projects.
  travel: Erik Hackett prefers meticulously planned road trips that blend history and nature; they have driven the Historic Route 66 to Santa Fe for its art scene and dream of a guided eco-tour of the Great
    Barrier Reef, though retirement budgeting keeps most adventures within the Midwest's lakes and state parks.
  culinary: Erik Hackett relishes home-brewed seasonal ales paired with hearty Midwestern fare such as pork tenderloin with apple-cider glaze; they also enjoy cooking classic chicken pot pie with fresh
    garden carrots and thyme, and often experiment with local honey in a signature honey-ginger BBQ sauce.
  core: Erik Hackett, a 53-year-old operations veteran, they balance methodical efficiency with hands-on curiosity, trading spreadsheets for fishing rods on weekends while occasionally letting a perfectionist
    streak spill into over-seasoned home-brews.
background:
  cultural: Erik grew up in the Midwest, rooted in the pragmatic, community‑oriented culture of Michigan’s small‑town and city blend. His white, Midwestern upbringing emphasizes hard work, modesty, and
    self‑reliance, with strong family ties and a respect for local traditions. He values neighborly cooperation, public service, and practical problem‑solving, reflecting the region’s industrial heritage
    and close‑knit community networks. These cultural influences shape his balanced worldview, his steady work ethic, and his commitment to both personal and collective well‑being.
attributes:
  skills: '["Operations Management", "Process Optimization", "Team Leadership", "Budgeting and Financial Planning", "Inventory Control", "Data Analysis (Excel, PowerBI)", "Lean Six Sigma (Green Belt)",
