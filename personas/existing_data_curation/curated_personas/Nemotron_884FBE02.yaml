  hobbies: '["Fishing", "Woodworking", "Gardening", "Home Brewing", "Reading (Technology & History)", "Local History Society Involvement", "Volunteering at Community Food Bank", "Attending Kalamazoo Growlers
    Baseball Games", "DIY Home Improvement Projects", "Birdwatching"]'
  career_goals: Over the next five years Erik aims to advance to a regional management role, overseeing multiple sites and driving a digital transformation initiative that integrates real‑time analytics
    and sustainable production practices. He seeks to mentor the next generation of managers, establishing a formal training program within his company. Simultaneously, he plans to earn an associate degree
    in Business Administration and obtain a Certified Manager (CM) credential, laying the groundwork for a post‑retirement consulting business that helps small Midwestern manufacturers improve efficiency
    and adopt green technologies.
