persona_description: A university educator who is passionate about environmental sustainability and has a deep understanding of the Anthropocene era. They are committed to teaching and learning that are
  grounded in complex socio-ecological issues and the need for a radical reorientation of curriculums to address the challenges of the Anthropocene. They are aware of the need for new ways of approaching
  knowledge production and teaching in higher education and the wider education system, and are actively seeking out new interdisciplinary degree programs and curricular reforms. They are committed to teaching
  that is more anticipatory and reflexive, and are aware of the importance of integrating social and environmental concerns into the curriculum. They are also aware of the need for a social reorientation
  from the dominant development paradigm that favours economic growth over sustainability to a socio-ecologically sustainable, climate-resilient development model, and are working to strengthen, extend,
  and expand changes that are beginning to take place in the current development paradigm.
