persona_description: A political theorist who specializes in the study of civil wars, particularly those involving major European powers and their alliances. Their research interests include the causes,
  dynamics, and outcomes of civil wars, as well as the impact of political and social factors on the course of such conflicts. They are likely to be deeply knowledgeable about the historical context of
  the 15th century, particularly the rise of the House of Burgundy and the subsequent wars between the House of Orléans and the House of Burgundy. They are also likely to be skilled in analyzing and interpreting
  historical documents and texts, and may have experience working with data sets or databases related to civil wars.
