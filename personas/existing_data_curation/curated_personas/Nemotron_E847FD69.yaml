  career_goals: Kenneth aims to advance from first‑line supervisor to senior construction manager overseeing multi‑site commercial projects. He plans to earn a PMP certification and the Certified Construction
    Manager (CCM) credential within the next three years. Long‑term, he envisions launching his own construction firm that emphasizes sustainable building practices and technology integration, such as BIM
    and modular construction. He is driven to consistently exceed profit‑margin targets, mentor emerging supervisors, and be recognized as a top performer in the Boston construction market.
