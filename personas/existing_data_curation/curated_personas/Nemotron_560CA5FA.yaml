  hobbies: '[''Participating in school drama club'', ''Singing karaoke with friends'', ''Learning folklorico dance'', ''Family cooking sessions (making tacos, tamales)'', ''Bullet journaling and planner
    customization'', ''Reading young‑adult novels and science magazines'', ''Building simple robotics projects with Arduino kits'', ''Playing soccer in community league'', ''Volunteering at local cultural
    festivals'']'
  career_goals: Noelia aspires to pursue a career that merges her love for helping others with her bilingual background and organizational talent. She envisions becoming a bilingual school counselor or
    community health outreach coordinator, focusing on youth mental‑health support and academic guidance. To achieve this, she plans to earn a degree in psychology or public health, later adding counseling
    certification. Long‑term, she hopes to create a mentorship program in North Richland Hills that empowers Hispanic teens to navigate school challenges and celebrate their cultural heritage.
