personas:
  professional: Noelia Artola is a budding performer and aspiring engineer who blends her love for drama, karaoke and robotics, using her methodical planning skills to organize school productions and prototype
    simple robots for class competitions while often worrying about perfection.
  sports: Noelia Artola plays forward for the local youth soccer league, follows the regional professional club Los Angeles FC, and supplements training with folklorico dance sessions that keep her flexible,
    while also volunteering as a scoreboard operator during community festivals.
  arts: Noelia Artola dazzles on stage in the school drama club, belts out pop hits by Taylor Swift and classic rancheras during karaoke, studies the choreography of folklorico to remix traditional rhythms,
    and draws inspiration from playwright Lin‑Manuel Miranda and actress Zendaya.
  travel: Noelia Artola dreams of exploring the historic streets of Oaxaca and the bustling markets of Mexico City after a family road‑trip to San Diego, but balances these aspirations with a tight school
    schedule and a modest vacation fund that limits trips to weekend stays at a nearby beach resort.
  culinary: Noelia Artola enjoys cooking tacos al pastor with pineapple, homemade salsa verde, and tamales filled with pork and chilies, experimenting with fresh cilantro and roasted corn, though they sometimes
    over‑season the salsa and burn the tortilla edges during late‑night practice.
  core: Noelia Artola is a vibrant, organized teen who channels her love for performance, robotics, and community into a bustling schedule, yet frequently battles worry and a penchant for late‑night snacks
    that spill over into her studies.
background:
  cultural: Noelia was raised in a Mexican‑American household in North Richland Hills, Texas, where Spanish is spoken at home and English dominates at school. Her family observes Mexican traditions such
    as Día de los Muertos, la Posada during Christmas, and festive gatherings for Cinco de Mayo, often centered around shared meals and music. These cultural experiences fostered a strong sense of familismo
    and community responsibility. Through her grandmother, she learned to prepare classic dishes, and she frequently showcases these recipes at school multicultural events. Living in a vibrant Hispanic
    community, Noelia participates in local church celebrations and neighborhood festivals, blending Mexican heritage with the broader Texan cultural landscape.
