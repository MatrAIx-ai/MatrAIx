  career_goals: Robyn dreams of a future where she can combine her love for animals and her enjoyment of structured environments. She aspires to become a veterinarian, envisioning a career where she can
    care for pets and wildlife in a methodical, science-based setting. She also wonders about being an elementary school teacher, attracted by the idea of guiding younger children through predictable lessons
    and fostering a supportive classroom community. These goals reflect her practical mindset, desire to help others, and appreciation for clear routines.
