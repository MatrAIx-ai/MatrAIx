personas:
  professional: Deion Cherry is a 20‑year‑old insurance associate who leverages natural charisma, a knack for reading client needs, and a love of urban creativity to craft personalized auto, home and life
    policies, and they are already polishing their Salesforce skills while eyeing CPCU and CIC designations.
  sports: Deion Cherry fuels their competitive edge by joining after‑school pickup basketball games at the local gym, cheering on the New York Knicks and Brooklyn Nets, and they also dabble in weekend pickup
    soccer with friends to stay active.
  arts: Deion Cherry immerses themselves in the city’s street‑art scene, snapping photos of murals inspired by Basquiat and Keith Haring, while they frequent live shows featuring J. Cole, H.E.R., and local
    spoken‑word poets at open‑mic nights, letting that energy shape their own improv performances.
  travel: Deion Cherry prefers spontaneous weekend getaways, often hopping on a bus to explore the historic streets of Philadelphia, the vibrant markets of Kingston, Jamaica, or the indie music festivals
    in Austin, Texas, and they budget these trips with a travel fund that sometimes runs low when unexpected gigs arise.
  culinary: Deion Cherry experiments in the kitchen with a medium‑level skill set, blending African‑American soul food and Caribbean flavors in dishes like jerk‑spiced collard greens, sweet potato and plantain
    casserole, and they adore finishing meals with a splash of hot pepper sauce and homemade cornbread.
  core: Deion Cherry is a charismatic, curiosity‑driven 20‑year‑old insurance rookie who juggles street‑art swagger, spontaneous creativity, and a habit of missed deadlines while relentlessly networking
    for future agency ownership.
background:
  cultural: Deion grew up in East Orange, New Jersey, a city with a rich African-American heritage and vibrant urban culture. His family traces its roots to the Great Migration, and the stories of resilience
    and community activism passed down from his grandparents shape his values. The neighborhood’s blend of historic jazz clubs, street art, and community festivals nurtured his appreciation for creativity
    and social connection. He participates in cultural celebrations such as Juneteenth and supports local Black artists, reflecting a deep connection to his African-American identity while also embracing
    the diverse influences of the broader New-York metropolitan area.
