personas:
  professional: Alim Lee, a 14‑year‑old budding digital illustrator, merges hand‑sketched doodles with tablet‑based art to create comic‑style characters for online fan communities, capitalizing on a curious
    mind and flexible schedule while often scrambling to meet community challenges due to a relaxed attitude toward deadlines.
  sports: Alim Lee spends weekends at the town skate park with the local crew Two Wheels, follows the Fayette County Wildcats high‑school football team and the Atlanta Falcons, and occasionally joins a
    community soccer pick‑up league that supports the Atlanta United FC fan group.
  arts: Alim Lee draws inspiration from graphic novels like 'Saga' and 'Ms. Marvel', admires artists such as Kazu Kibuishi and Yoshitaka Amano, listens to hip‑hop legends Kendrick Lamar and J. Cole, jazz
    icons Miles Davis and John Coltrane, and gospel great Mahalia Jackson, while beatboxing and writing original verses during free periods.
  travel: Alim Lee dreams of a road‑trip through the Great Smoky Mountains and a weekend getaway to New Orleans for its music scene, has already explored nearby state parks around Fayette, and hopes to
    someday visit the historic streets of Kyoto and the vibrant murals of Berlin, preferring spontaneous plans over rigid itineraries but constrained by a modest allowance.
  culinary: Alim Lee enjoys helping in the kitchen by mastering Southern comfort dishes like fried chicken, collard greens, and cornbread, experiments with seasoning in homemade mac and cheese, and often
    pairs meals with a side of fresh‑picked strawberries, while occasionally treating themselves to pizza topped with truffle oil.
  core: Alim Lee is a curiosity‑driven teen artist who balances sketch‑filled days, skate‑park hangs, and a lingering worry that fuels both creative bursts and occasional procrastination.
background:
  cultural: Alim grew up in Fayette, Alabama, within a close‑knit African‑American community that blends Southern traditions with Black cultural heritage. His family participates in church events, where
    gospel music and community service shape his values. He celebrates Juneteenth with family gatherings, enjoys soul food staples like collard greens, fried chicken, and cornbread, and is familiar with
    the storytelling traditions of the Black South. Local festivals and the historic civil‑rights legacy of Alabama influence his appreciation for artistic expression as a form of empowerment. Through his
    parents and community elders, Alim inherits a deep respect for resilience, creativity, and the importance of sharing his cultural narrative with broader audiences.
attributes:
  skills: '[''Digital illustration'', ''Sketching'', ''Basic Python scripting'', ''Creative writing'', ''Graphic design with Canva'', ''Collaborative group work'', ''Critical thinking'', ''Empathy and active
    listening'', ''Photography basics'']'
  hobbies: '[''Sketching and digital illustration'', ''Reading graphic novels'', ''Playing Minecraft and Among Us'', ''Listening to hip‑hop, jazz, and gospel'', ''Writing lyrics and beatboxing'', ''Photography
    of local scenery'', ''Attending community art workshops'', ''Skate‑boarding with friends'', ''Cooking Southern meals with family'']'
  career_goals: Alim dreams of turning his love for art and technology into a career as a multimedia designer or concept artist. He hopes to earn a scholarship to a college with a strong fine‑arts program,
    where he can study graphic design, animation, and interactive media. Long‑term, he wants to create inclusive visual content that reflects his Southern Black heritage, perhaps launching a freelance studio
    that works with local musicians and community organizations. He values flexibility, so he envisions a career that lets him set his own schedule, travel for artistic inspiration, and balance creative
    work with time for family and personal reflection.
