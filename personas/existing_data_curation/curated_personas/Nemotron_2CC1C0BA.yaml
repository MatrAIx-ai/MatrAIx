    ''Design Thinking Methodologies'']'
  hobbies: '[''Visiting art galleries'', ''Painting (acrylic)'', ''Landscape photography'', ''Reading (business innovation, art history)'', ''Journaling'', ''Gardening'', ''Cycling'', ''Hiking'', ''Cooking
    (farm-to-table)'', ''Puzzle solving (crosswords, sudoku)'', ''Attending small book clubs'', ''Wine tasting at local vineyards'']'
  career_goals: Angela aims to advance from senior management analyst to a strategic business operations leader within the next five years, targeting roles such as Business Strategy Manager or Director
    of Business Innovation. She plans to earn a Lean Six Sigma Black Belt and an MBA to deepen her expertise in organizational transformation. Long‑term, she envisions launching a boutique consulting practice
    that helps Central Valley agribusinesses integrate data‑driven decision‑making with creative problem‑solving, fostering sustainable growth while maintaining work‑life balance for herself and her family.
