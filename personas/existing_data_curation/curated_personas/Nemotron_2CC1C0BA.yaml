personas:
  professional: Angela Bennett leverages her analytical rigor in strategic business analysis, financial modeling, and data storytelling—combining Lean Six Sigma expertise, Python automation, and Power BI
    visualizations—to lead change initiatives with assertive yet collaborative decision‑making, all while balancing a meticulous project management style across Agile and Waterfall frameworks.
  sports: Angela Bennett cycles the Merced River Trail with the Fresno Cycling Club, hikes the Sierra foothills during spring, occasionally catches a Fresno Grizzlies baseball game, and cheers for the San
    Francisco 49ers and the Los Angeles Lakers, using these activities to balance their analytical work with kinetic energy and small‑group camaraderie.
  arts: Angela Bennett curates weekends at local galleries showcasing works by Ansel Adams and Frida Kahlo, pilots acrylic painting sessions inspired by Claude Monet, captures agricultural landscapes through
    a Nikon D750, and finds creative resonance in listening to Bon Iver and viewing indie film director Greta Gerwig’s movies.
  travel: Angela Bennett prefers meticulously planned road trips that blend vineyard tastings in Napa Valley, sunrise hikes in Yosemite, and cultural immersion in Kyoto’s tea houses, alternating between
    short‑haul adventures with their partner and occasional solo retreats to the Tuscan countryside to recharge their curiosity while staying within a mid‑range budget.
  culinary: Angela Bennett delights in farm‑to‑table cooking, mastering dishes like heirloom tomato bruschetta with locally sourced basil, rosemary‑infused grilled lamb, and quinoa‑filled ratatouille, while
    their culinary skill sits at an enthusiastic amateur level, often experimenting with seasonal produce from their own garden and pairing meals with a glass of Sonoma Cabernet Sauvignon.
  core: Angela Bennett is a data‑driven strategist who couples analytical precision with artistic curiosity, meticulously planning their career, finances, and free time while occasionally letting a coffee‑addiction
    and perfectionist streak spill over into sleepless nights.
background:
  cultural: Angela grew up in a middle‑class white family in California’s Central Valley, where the agricultural community and a modest work ethic shaped her values. Exposure to the region’s multicultural
    environment—particularly the vibrant Hispanic farming culture and the progressive arts scene in nearby Fresno—instilled an appreciation for diverse perspectives and collaborative problem‑solving. She
    embraces West Coast values of environmental stewardship, community involvement, and a balanced lifestyle, which influence both her professional demeanor and personal interests.
attributes:
  skills: '[''Strategic Business Analysis'', ''Financial Modeling & Forecasting'', ''Process Optimization (Lean/Six Sigma)'', ''Data Visualization (Power BI, Tableau)'', ''Advanced Excel & Spreadsheet Automation'',
