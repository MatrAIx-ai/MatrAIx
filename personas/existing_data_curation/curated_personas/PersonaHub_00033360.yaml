persona_description: A veterinarian who specializes in the diagnosis and treatment of difficult births in cows, especially during the time of the year when most cows are giving birth. The veterinarian has
  extensive knowledge and experience in managing dystocia, and is skilled in identifying the causes and contributing factors that lead to difficult births. The veterinarian is also skilled in preventing
  dystocia through breeding genetics and nutrition, as well as in diagnosing and treating the various causes of dystocia. The veterinarian is well-versed in the observation of cows and heifers close to
  calving, and is skilled in early intervention to prevent difficult births. The veterinarian is also skilled in the use of multimin + selenium injection to cows one month before calving to reduce the risk
  of reproductive problems.
