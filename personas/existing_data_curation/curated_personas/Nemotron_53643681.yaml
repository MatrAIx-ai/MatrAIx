  career_goals: Jonathan aims to advance his career by earning a Bachelor’s degree in emergency management and becoming a flight paramedic with a regional air‑medical service. He aspires to take on supervisory
    or training responsibilities within his EMS department, eventually serving as a paramedic instructor and program coordinator. In the longer term, he hopes to develop community outreach initiatives that
    blend medical education with creative‑arts therapies to support trauma survivors and first‑responder wellness, and to influence state‑level EMS policy through advocacy and research.
