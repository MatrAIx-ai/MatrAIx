  hobbies: '[''sketching and watercolor painting'', ''visiting art galleries'', ''reading speculative fiction'', ''playing narrative-driven indie video games'', ''improv comedy workshops'', ''boardwalk
    cycling'', ''photography'', ''volunteering as an art mentor for youth'']'
  career_goals: Anthony aims to advance to an HR manager role within the next three years, focusing on building a culture of creativity and well-being. He plans to earn the SHRM‑CP certification and complete
    his GED, followed by an associate degree in Business Administration. Long-term, he envisions launching a boutique consulting practice that blends traditional HR services with artistic-based team-building
    workshops and experiential learning. He also hopes to mentor younger employees, especially those from non-traditional educational backgrounds.
