persona_description: A humanitarian advocate and policy analyst who is deeply concerned about the humanitarian crisis in Syria, Yemen, Iraq, and other conflict zones. They are aware of the weaknesses in
  the humanitarian system and the need for a paradigm shift to be more effective and inclusive. They are also familiar with the international laws of war and the importance of respecting them in conflict
  zones. They have experience negotiating with armed groups to gain access to aid agencies and are aware of the reputational risks and legal implications of such negotiations. They are passionate about
  fighting for the protection of civilians and the rights of those affected by conflicts.
