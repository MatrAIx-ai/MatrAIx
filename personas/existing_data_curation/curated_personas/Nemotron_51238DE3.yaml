  hobbies: '[''herb gardening'', ''reading culinary literature'', ''watching cooking shows'', ''tai chi'', ''visiting farmers markets'', ''participating in Vietnamese cultural festivals'', ''volunteering
    cooking at local shelter'']'
  career_goals: 'At 60, Phung aims to create a lasting legacy by opening a modest, family‑run bistro in Rancho Santa Margarita that showcases his heritage recipes while providing a stable, low‑stress environment
    for his wife and children. He plans to author a cookbook that documents traditional Vietnamese dishes passed down through his family, and to establish a mentorship program for young chefs from the local
    Southeast Asian community. His goals are practical and structured: achieve financial sustainability, maintain high culinary standards, and reduce workplace stress through clear procedures and balanced
    work‑life boundaries.'
