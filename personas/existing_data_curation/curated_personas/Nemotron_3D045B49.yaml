  career_goals: Ricardo aims to move from machinist to lead machinist or production supervisor within the next five years, seeking formal certification in CNC programming to broaden his technical expertise.
    He dreams of eventually opening a small custom metal‑work studio where he can blend his technical skills with his love for artistic design, creating bespoke sculptures and functional art pieces. Additionally,
    he wants to mentor younger workers from immigrant backgrounds and contribute to community programs that integrate art and manufacturing, helping others see pathways to skilled trades.
