  hobbies: '[''Street art exploration'', ''Metal sculpture crafting'', ''Community soccer'', ''Cooking Salvadoran cuisine'', ''Attending cultural festivals'', ''Dancing (cumbia, salsa)'', ''DIY electronics'',
