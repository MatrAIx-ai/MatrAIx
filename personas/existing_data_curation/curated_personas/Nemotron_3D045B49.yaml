personas:
  professional: Ricardo Matos, a seasoned CNC machinist and precision metal‑fabrication specialist, leverages their curiosity and collaborative spirit, and they mentor junior staff, streamline shop‑floor
    workflows, and integrate emerging manufacturing technologies while maintaining meticulous safety standards.
  sports: Ricardo Matos plays midfield for the community soccer club East LA Rovers, avidly follows LA Galaxy matches, stays fit with weekend pick‑up games and occasional gym workouts, and they cheer on
    the Lakers during basketball season while supporting the Dodgers in the summer.
  arts: Ricardo Matos immerses themselves in Los Angeles’s street‑art corridors, admiring murals by Jorge Gardea and attending gallery openings featuring painters such as Judy Baca, while their playlist
    blends classic rock staples such as The Rolling Stones with cumbia hits from Los Ángeles Azules, fueling the ideas they sketch for metal‑sculpture creations.
  travel: Ricardo Matos balances a love for spontaneous weekend road trips along the Pacific Coast Highway with carefully budgeted annual travel to Oaxaca for its culinary festivals, and they dream of a
    future cultural immersion in Cartagena’s historic old town.
  culinary: Ricardo Matos expertly prepares pupusas stuffed with cheese, loroco, and pork, crafts tender tamales using masa and a secret blend of spices, and they experiment with grilled carne asada seasoned
    with cumin, cilantro, and lime, while also enjoying occasional tacos al pastor from local taquerías.
  core: Ricardo Matos fuses the precision of a machinist with an artist’s imagination, often sketching new sculpture ideas between CNC runs, yet they habitually leave tiny metal shavings on the kitchen
    counter.
background:
  cultural: Ricardo grew up in a Salvadoran immigrant household in Los Angeles, where Spanish, Catholic traditions, and strong family ties shaped his identity. He maintains close connections to the Salvadoran
    community through participation in events such as the annual Fiesta Salvadoreña, sharing traditional foods, and supporting local organizations that assist recent immigrants. His cultural values emphasize
    familismo, respect for elders, and a collaborative spirit, while his immersion in the diverse cultural landscape of Los Angeles has broadened his appreciation for multicultural art, music, and cuisine.
