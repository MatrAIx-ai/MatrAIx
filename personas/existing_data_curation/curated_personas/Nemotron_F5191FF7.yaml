personas:
  professional: Latasha Burton is an aspiring junior artist who channels their curiosity for adventure novels into narrative illustrations, methodically planning each sketch in a dedicated art journal while
    eagerly sharing their creations with classmates and community art festivals, and they often organize mini exhibit displays for friends.
  sports: Latasha Burton is a spirited member of the school soccer team, training three times a week with the Riverside Junior Tigers while rooting for the national women's soccer squad and they balance
    competitive play with enthusiastic participation in after‑school dance warm‑ups.
  arts: Latasha Burton immerses themselves in artistic expression by sketching original fantasy characters inspired by Studio Ghibli, painting delicate watercolors of Monet’s lily pads, exploring Procreate
    on their tablet, and they regularly visit the City Art Museum’s rotating exhibition of contemporary youth art.
  travel: Latasha Burton prefers family‑oriented travel, delighting in weekend road trips to the Grand Canyon’s rim for sunrise sketches, school field trips to the Smithsonian National Air and Space Museum
    in Washington, D.C., dreaming of a future visit to the Louvre in Paris to see the original Mona Lisa, and they often bring a sketchbook to capture every new scene.
  culinary: Latasha Burton enjoys simple yet vibrant meals, favoring homemade mac and cheese with a sprinkle of cheddar, occasionally baking chocolate chip cookies with their parent, and they delight in
    adding fresh strawberries and a dash of lemon zest to yogurt for a bright snack.
  core: Latasha Burton is a methodical, curiosity‑driven ten‑year‑old who balances a tidy art journal with a habit of leaving watercolor stains on the kitchen table, they are always ready to sketch a new
    adventure while keeping a spare pencil tucked behind their ear.
background:
  cultural: Latasha is an African American girl growing up in Winter Haven, Florida. Her family honors Southern African American traditions, including delicious soul food dishes, gospel music, storytelling
    sessions, and observance of Juneteenth and other cultural holidays. The vibrant, lake‑filled environment of Polk County nurtures her love for nature and community art projects, and she often participates
    in neighborhood block parties and local cultural festivals that blend Black heritage with Floridian influences. Her church community and extended family provide strong support, emphasizing cooperation,
    kindness, and a celebration of shared cultural identity.
attributes:
