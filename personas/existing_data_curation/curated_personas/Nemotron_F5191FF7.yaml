  hobbies: '["Sketching", "Watercolor painting", "Using digital drawing apps", "Visiting art museums", "Reading adventure novels", "Playing soccer", "Dancing in school assemblies", "Singing in choir", "Participating
    in school science club", "Volunteering at community events"]'
  career_goals: Latasha dreams of becoming an artist who creates vibrant murals that celebrate her community and cultural heritage, and she also imagines a future as a teacher who inspires children to explore
    both the arts and sciences. She is fascinated by the idea of working in a museum or cultural center where she can curate exhibitions that highlight African American history and local Florida stories,
    and she hopes to combine her love for creativity, education, and community outreach in her future career.
