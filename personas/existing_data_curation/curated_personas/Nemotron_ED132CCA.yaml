personas:
  professional: Luz Baltazar, a bilingual data‑driven news analyst and reporter, blends investigative curiosity with practical workflow tools—Python, GIS, and multimedia design—to produce community‑focused
    stories, even though they often wrestle with tight deadlines due to their spontaneous, flexible style.
  sports: Luz Baltazar fuels their energy by dancing salsa and bachata at local studios, tackling White Mountains trails with the White Mountain Hiking Club, and cheering the New England Patriots and Boston
    Red Sox, and they embody a sociable, competitive spirit in both movement and fandom.
  arts: Luz Baltazar cultivates creative expression through photography for their landscape blog, devouring contemporary fiction by Chimamanda Ngozi Adichie and Marlon James while they listen to salsa legends
    Celia Cruz and modern artist Bad Bunny, weaving artistic appreciation into their daily rhythm.
  travel: Luz Baltazar plans travel with a mix of spontaneous weekend escapes to New England’s coastal towns and carefully saved trips to Barcelona’s salsa festivals and Bali’s yoga retreats, and they balance
    limited budget constraints with a desire for cultural immersion and adventure.
  culinary: Luz Baltazar enjoys cooking island‑inspired dishes like arroz con gandules and lechón, mastering sofrito, pigeon peas, and smoky pork shoulder, while also experimenting with seasonal vegetables
    and craft cocktails, and they showcase intermediate culinary skills and a love for communal meals.
  core: Luz Baltazar is a curious, socially vibrant data journalist who balances spontaneous creativity with a pragmatic drive, all while wrestling with organization, chasing community stories, and dancing
    through life’s rhythms, and they often turn challenges into chances to connect.
background:
  cultural: Luz grew up in a close‑knit Puerto Rican family, celebrating traditions such as Noche Buena, Carnaval, and the music of plena and reggaetón. Bilingual from childhood, she seamlessly navigates
    Spanish and English, using this fluency to bridge Caribbean and New England perspectives. Her heritage instills a strong sense of community, respect for elders, and an appreciation for storytelling
    that honors collective memory. Living in Franklin, MA, she blends her island roots with the region's historic New England values, fostering a unique journalistic voice that highlights both the vibrancy
    of Puerto Rican culture and the concerns of her local community.
attributes:
  skills: '[''Investigative journalism'', ''Data analysis (Python, R)'', ''Statistical modeling'', ''Data visualization (Tableau, PowerBI)'', ''Bilingual reporting (Spanish/English)'', ''Multimedia storytelling'',
    ''Content management systems (WordPress, Drupal)'', ''Fact‑checking and verification'', ''Interview techniques'', ''Social media strategy'', ''Graphic design basics (Canva, Adobe Photoshop)'', ''Video
    editing (Premiere Pro)'', ''GIS mapping for news'']'
  hobbies: '[''Salsa and bachata dancing'', ''Cooking Puerto Rican cuisine'', ''Hiking in New England'', ''Photography'', ''Reading contemporary fiction and nonfiction'', ''Book club participation'', ''Blogging
    about travel and culture'', ''Volunteering at youth media programs'', ''Yoga'', ''Playing acoustic guitar'']'
  career_goals: Luz aims to become a senior investigative journalist who leads high‑impact, data‑driven reporting on political and environmental issues affecting both Puerto Rico and the New England region.
    She plans to produce a documentary series that explores the Puerto Rican diaspora and its contributions, securing awards for in‑depth journalism. In the medium term, she seeks a leadership role such
    as managing editor or editorial director, guiding a newsroom toward innovative, community‑focused storytelling. Luz also intends to pursue a master’s degree in journalism or data science to deepen her
    analytical expertise and eventually launch her own media outlet dedicated to under‑represented voices.
