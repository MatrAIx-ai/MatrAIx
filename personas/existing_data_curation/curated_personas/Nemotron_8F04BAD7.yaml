personas:
  professional: Bonny Handley, a retired educator turned community learning catalyst, leverages their curriculum design expertise, workshop facilitation flair, and natural talkative charm to orchestrate
    intergenerational learning circles at the local center, and they often improvise lesson plans on the fly despite occasional deadline slips.
  sports: Bonny Handley, a member of the Henderson Senior Hiking Club, treks the basalt trails of Red Rock Canyon, follows the Las Vegas Raiders on Sundays, and they supplement their low‑impact cardio with
    weekly yoga and mentally stimulating bridge sessions.
  arts: Bonny Handley, a regular patron of community theater, delights in the plays of Tennessee Williams, admires the paintings of Georgia O’Keeffe, and they fill evenings with classic jazz by Ella Fitzgerald
    while curating a collection of nature photographs that inspire their storytelling.
  travel: Bonny Handley, who loves spontaneous road trips, often drives to the red‑rock vistas of Sedona or the historic streets of Santa Fe, and they dream of a leisurely cruise along the Pacific Northwest
    coast, preferring flexible itineraries over rigid tours.
  culinary: Bonny Handley, an enthusiastic home cook, experiments with Mediterranean fare like grilled bruschetta topped with heirloom tomatoes and feta, masters quinoa‑stuffed bell peppers, and they frequently
    incorporate fresh sunchokes from their desert garden into rustic soups.
  core: Bonny Handley is a vivacious senior blending curiosity‑driven spontaneity with practical community‑building, they thrive on lively conversations, garden‑to‑table recipes, and intergenerational learning,
    while occasionally misplacing their reading glasses and forgetting to file paperwork.
background:
  cultural: Bonny was raised in a Midwestern white family of Irish-German heritage in Ohio, where community gatherings and a respect for practical education were central to daily life. After moving to Henderson,
    Nevada in her early forties, she blended her Midwestern values of hospitality and cooperation with the Southwest’s outdoorsy, laid-back culture, creating a unique mix of hearty, practical curiosity
    and a love for social interaction.
attributes:
  skills: '[''Curriculum development'', ''Adult education facilitation'', ''Public speaking'', ''Community outreach'', ''Conflict resolution'', ''Mentoring'', ''Event planning'', ''Digital literacy tutoring'',
