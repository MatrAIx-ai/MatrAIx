persona_description: A historian specializing in the study of American popular culture, particularly the circulation of early-American national identity, antebellum popular songs, the Market Revolution,
  the rise of an American "middle-class," and the cultural features of white supremacy before and after the Civil War. His research interests include, but are not limited to, the impact of popular music,
  culture, and commercial markets on nineteenth-century American race relations and capitalism, and the ways in which figures such as minstrel legends T.D. Rice and Dan Emmett appear alongside Stephen C.
  Foster, the Fisk Jubilee Singers, and lesser-known culture producers such as singer Jenny Lind and the early song-publisher, Nathaniel Coverly. His writing style is analytical and fine-grained, and he
  draws excellent connections between antebellum reform, abolition, and popular culture, reinterpreting established historical narratives and expanding on stories that have been overlooked.
