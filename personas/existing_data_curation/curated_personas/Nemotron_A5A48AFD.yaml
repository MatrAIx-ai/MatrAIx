personas:
  professional: Lan Yi is a one‑year‑old exploring baby development with an eye for routine, turning diaper changes into a structured ritual and showing early signs of systematic problem‑solving that hint
    at a future career in early childhood education or developmental research, and they already display a calm, cooperative demeanor that will serve them well.
  sports: Lan Yi, still mastering cautious crawls and tentative first steps, delights in weekly baby swim sessions at the Brightwater Aquatics Club and giggles at televised games of the hometown’s professional
    baseball team, the River City Runners, while their parents enroll them in the Little Leapers toddler gymnastics program, allowing them to explore movement within a structured, harmonious routine.
  arts: Lan Yi’s evenings are filled with soothing lullabies by Raffi, gentle classical pieces like Brahms’ Lullaby performed by Yo‑Yo Ma, and the colorful, sing‑along videos of The Wiggles, shaping a calm,
    harmonious early artistic palate that they respond to with contented smiles.
  travel: Lan Yi has already accompanied their family on a weekend beach getaway to Cape Cod and a cozy stay at the grandparents’ countryside farm in Ohio, and they now point eagerly at picture books of
    Paris and the Great Barrier Reef, dreaming of future family adventures beyond the familiar horizon.
  culinary: Lan Yi favors smooth mashed sweet potatoes, ripe banana puree, and warm oatmeal with a dash of cinnamon, happily smashing bright orange carrot sticks on the high‑chair tray, and they delight
    in occasional baby‑friendly avocado toast bites that introduce new textures.
  core: Lan Yi is a routine‑loving, gently reserved one‑year‑old who finds comfort in predictable diaper changes, rattles a silver spoon like a tiny drum, smiles at the world’s simple harmonies, and occasionally
    refuses unfamiliar foods.
background:
  cultural: Lan Yi is raised in an East Asian household that has settled in Hendersonville, Tennessee. Her family blends Korean (or Chinese) cultural traditions with Southern American life. They celebrate
    Lunar New Year with traditional foods, red envelopes, and family storytelling, while also participating in local community events and holidays. Mandarin (or Korean) is spoken alongside English at home,
    and Lan Yi is exposed to cultural arts such as folk songs, calligraphy practice, and family recipes, fostering a strong sense of cultural identity within a small‑town environment.
