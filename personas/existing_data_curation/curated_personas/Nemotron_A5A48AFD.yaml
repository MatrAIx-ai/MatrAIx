  career_goals: Although still a toddler, Lan Yi's emerging values point toward future roles that emphasize care, order, and harmony. She often offers her favorite toy to a peer and enjoys helping adults
    with simple tasks. As she matures, she may aspire to a profession that allows her to nurture others and maintain a structured environment, such as a preschool teacher, child‑care provider, or community
    volunteer focused on supporting families.
