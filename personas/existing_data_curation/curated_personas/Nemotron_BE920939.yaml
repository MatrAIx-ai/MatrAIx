personas:
  professional: Robert West leverages their seasoned coaching and scouting expertise, combining meticulous statistical analysis with a historical appreciation of sport to design routine‑driven training
    programs, positioning themselves for a future head‑coach role at a high‑school or community‑college program.
  sports: Robert West maintains a routine of early‑morning kayaking on the Intracoastal Waterway and weekly volunteer coaching at the Lake Worth Youth Soccer Club, while cheering on the Miami Dolphins,
    Miami Heat, and Miami Marlins, embodying a balanced approach to personal fitness and community sport involvement.
  arts: Robert West indulges in historical non‑fiction by David McCullough and classics like Dickens, complements reading with listening to Johnny Cash and admiring Winslow Homer seascapes at the Boca Raton
    Community Theater, allowing the arts to punctuate their solitary evenings with reflective cultural nourishment.
  travel: Robert West prefers meticulously planned, low‑key getaways that blend fishing in the Everglades, sunset walks in Key West, and historic tours of Charleston and Rome, balancing family commitments
    with a desire for tranquil exploration of coastal and cultural landmarks.
  culinary: Robert West cooks with modest skill, often preparing fresh‑caught snapper grilled with mango salsa, shrimp étouffée seasoned with cayenne, and roasted zucchini from their garden, favoring simple,
    locally sourced ingredients like key lime, cilantro, and heirloom tomatoes.
  core: Robert West is a routine‑driven, quietly analytical coach who balances solitary nature pursuits with community mentorship, occasionally indulging in vintage car nostalgia and a penchant for classic
    literature.
background:
  cultural: Robert comes from a white, middle-class American family with deep roots in the southeastern United States. Raised in Florida, he was influenced by the region's blend of Southern hospitality
    and coastal lifestyle. His upbringing emphasized practical values, community involvement, and a respect for tradition, often reinforced through church gatherings and local events. The arts and humanities
    degree he earned reflects a family appreciation for broad cultural exposure, while his career in coaching aligns with the area's strong sports culture. Robert's cultural identity is shaped by a combination
    of Southern customs, Floridian coastal leisure, and a pragmatic, service-oriented ethos.
