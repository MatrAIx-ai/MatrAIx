persona_description: An art historian who specializes in the study of Renaissance art and architecture, particularly the works of Brunelleschi, Michelangelo, and Palladio. She is interested in the development
  of European architecture during the 1540s and the impact of the book industry on art and architecture. She has a deep knowledge of the art and architecture of Venice, Lyon, Paris, and Basel, and is knowledgeable
  about the publication of illustrated works and scholarly books during this period. She is also interested in the role of women in the development of European art and architecture during this time.
