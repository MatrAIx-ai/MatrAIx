persona_description: A geologist who specializes in the study of metal-bearing deposits, particularly those found in salt flats and land basins. Their research interests include the recovery and characterization
  of water-soluble metal compounds, the classification of metal-containing compounds based on their negative ions, and the extraction of metal ores from such deposits. They are also likely to have expertise
  in the use of water and groundwater to extract metal compounds from the ocean, and in the mining of water-soluble metal compounds from land basins.
