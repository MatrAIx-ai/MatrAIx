personas:
  professional: Weiting Ji, a retired humanities scholar and community cultural curator, blends deep expertise in classical literature, calligraphy, and contemporary art analysis with a disciplined yet
    adaptable work style to orchestrate intergenerational art workshops, while occasionally allowing a perfectionist’s attention to detail to slow final approvals.
  sports: Weiting Ji enjoys low‑impact fitness through weekly Tai Chi sessions with the Bay Area Senior Tai Chi Association, follows the San Francisco Giants (baseball) and San Jose Sharks (hockey) on television,
    participates in a senior chess and mahjong club at the San Jose Public Library, and takes leisurely walks through the Japanese Hill Garden rather than engaging in high‑intensity sports.
  arts: Weiting Ji actively engages with the arts by practicing Chinese brush calligraphy inspired by Wang Xizhi, curating community exhibitions featuring works by Mark Rothko and Yayoi Kusama, attending
    classical piano recitals of Beethoven and jazz concerts featuring John Coltrane, and discussing contemporary art essays by Claire Bishop over mahjong games, revealing a curiosity and appreciation for
    both traditional and avant‑garde expressions.
  travel: Weiting Ji prefers immersive cultural travel, having visited Kyoto’s historic temples, Florence’s Uffizi Gallery, the Gold Rush town of Bodie, California, and plans to explore the Nara National
    Museum and the lavender fields of Provence, always planning itineraries months ahead yet occasionally forgetting to pack a favorite brush set for on‑the‑road sketching.
  culinary: Weiting Ji enjoys a refined palate featuring jasmine tea, freshly steamed dim sum, miso soup, bok choy stir‑fry with garlic and ginger, occasional Peking duck, and delights in preparing traditional
    mooncakes with lotus seed paste, though they sometimes over‑season with ginger and forget to turn off the stove while engrossed in a chess match.
  core: Weiting Ji is a curious, organized retiree who fuses traditional calligraphy with modern art advocacy, balances disciplined routines with occasional indulgences, and thrives on quiet reflection
    and lively social games.
background:
  cultural: Weiting was born in Guangzhou, China, and immigrated to the United States in his early twenties, eventually settling in San Jose, California. Raised in a family that emphasized Confucian values,
    reverence for elders, and the arts—especially calligraphy and classical literature—he integrated these traditions with the multicultural fabric of the Bay Area. Fluent in both Mandarin and English,
    his cultural identity blends East Asian heritage with active American community involvement, reflecting a harmonious synthesis of traditional practices and contemporary civic life.
attributes:
  skills: '[''Chinese classical literature'', ''Calligraphy'', ''Art curation'', ''Bilingual communication (Mandarin/English)'', ''Teaching and mentoring'', ''Event planning'', ''Digital archiving'', ''Volunteer
