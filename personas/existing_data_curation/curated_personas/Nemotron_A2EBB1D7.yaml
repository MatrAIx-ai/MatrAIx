  hobbies: '[''Calligraphy'', ''Brush painting'', ''Walking in gardens'', ''Reading poetry and philosophy'', ''Chess'', ''Mahjong'', ''Museum visits'', ''Classical music and jazz listening'', ''Bonsai gardening'',
    ''Tai Chi'', ''Cultural travel'']'
  career_goals: Although retired, Weiting aims to develop a series of intergenerational art workshops that foster dialogue between seniors and younger artists in the Bay Area. He aspires to author a reflective
    book exploring East‑West artistic exchanges, serve as a senior advisor for the San Jose Museum of Art's community outreach, and lead oral‑history projects preserving Chinese heritage in Santa Clara
    County. Continuing education in contemporary art theory and digital media also features in his lifelong learning plan.
