  career_goals: Samuel dreams of one day playing soccer at the professional level, inspired by both his Mexican heritage and the local Yakima community teams. He also imagines coaching younger kids in his
    neighborhood, merging his competitive spirit with a desire to give back. As a practical backup, he is curious about learning mechanical skills to work on cars or farm equipment, reflecting his hands‑on,
    realistic outlook.
