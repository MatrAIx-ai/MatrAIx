personas:
  professional: Samuel Vides, an aspiring junior soccer strategist and budding LEGO architect, channels their love for clear rules and structured play into organizing team drills and building intricate
    cityscapes, while their competitive streak drives them to constantly refine tactics even as they drift between organized practice and spontaneous improvisation.
  sports: Samuel Vides, a member of the community youth soccer club the Little Stars, devotes afternoons to organized drills and friendly matches, idolizes the local professional team the City United FC,
    and they channel their competitive edge into perfecting set‑piece plays while occasionally skipping warm‑ups in favor of extra video‑game time.
  arts: Samuel Vides, an avid cartoonist who sketches family adventures with a trusty set of colored markers, tunes into folk music featuring accordion and jarana at family gatherings, and draws inspiration
    from classic animator Walt Disney and singer Lila Downs, and they weave those influences into quirky comic strips that blend humor with cultural motifs.
  travel: Samuel Vides, who enjoys weekend trips to the nearby seaside town of Seabreeze and annual visits to the national museum in the capital, dreams of wandering the ancient stone plazas of a historic
    colonial city and the vibrant market streets of a far‑away metropolis, and they plan each outing with a simple checklist that satisfies their need for structure while leaving room for spontaneous games
    with new friends.
  culinary: Samuel Vides, a hands‑on helper in the kitchen, loves assembling homemade tacos with corn tortillas, seasoned pork, fresh cilantro, and a splash of lime, and mastering the art of steaming tamales
    wrapped in banana leaves, while they enjoy a crunchy slice of mango or a bowl of guacamole with tortilla chips as a favorite snack after building LEGO.
  core: Samuel Vides, a structured yet spontaneous nine‑year‑old, blends a love for organized soccer drills and strategic video games with a competitive edge, occasional forgetfulness, and they have a habit
    of turning family festivals into creative cartoon adventures.
background:
  cultural: Samuel’s family maintains strong Mexican cultural ties while living in Yakima’s vibrant Hispanic community. He celebrates Día de los Muertos and Cinco de Mayo with family altars, traditional
    foods, and music, and he is raised bilingual, speaking Spanish at home and English at school. The agricultural surroundings of Yakima expose him to seasonal farm work and a close‑knit neighbor culture
    that values family gatherings, community support, and shared celebrations.
