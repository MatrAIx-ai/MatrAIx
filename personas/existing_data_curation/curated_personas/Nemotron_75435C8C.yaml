  arts: Mattie Gaines enjoys soothing lullabies from Mozart and modern pop hits by Beyoncé, loves colorful picture books like The Very Hungry Caterpillar by Eric Carle, and they often babble along to the
    TV show Sesame Street, shaping a creative identity that blends classic and contemporary influences.
  travel: Mattie Gaines has already embarked on a family road trip to Asheville, North Carolina, visited Grandma's seaside cottage in Cape Cod, and they dream of stroller‑friendly adventures at Disneyland
