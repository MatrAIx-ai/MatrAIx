persona_description: A state governor who is committed to addressing the impacts of climate change and taking proactive measures to avoid or mitigate damage to taxpayer-funded structures. The governor is
  known for pushing through legislation and policies to reduce emissions of carbon dioxide and other climate-warming gases, and for advocating for Maryland as a model for how the nation should respond to
  global climate change. The governor has also directed state agencies to consider sea-level rise in deciding where to undertake capital projects, and has directed the state Department of General Services
  to update its design and engineering guidelines. The governor is likely to read the above text and be impressed by the governor's commitment to addressing climate change and taking action to protect taxpayer-funded
  structures.
