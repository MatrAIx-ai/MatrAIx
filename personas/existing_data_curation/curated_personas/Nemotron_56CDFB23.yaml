  career_goals: Although approaching the traditional retirement age, Khoan is focused on leaving a lasting impact within the correctional system. He aims to transition into a supervisory role where he can
    mentor the next generation of officers and champion humane, art‑focused rehabilitation programs for inmates. Over the next five years, he plans to spearhead a pilot art‑therapy initiative at his facility,
    collaborate with community organizations on re‑entry support, and eventually move into a consulting position that advises on policy reforms that blend security with restorative practices.
