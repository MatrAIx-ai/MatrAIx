  career_goals: Andrew often talks about wanting to become an artist who paints bright pictures, an explorer who discovers new places, or a storyteller who writes books. He imagines being a museum guide,
    a nature ranger, or a teacher who shares his love of art and curiosity with others. He expresses a desire to keep learning, to create and share his ideas, and to help his friends and family through
    kindness and creativity.
