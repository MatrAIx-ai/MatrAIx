  career_goals: Although currently not in the formal workforce, Patrick aims to translate his passion for the arts and community into a part‑time role that allows him to curate local art shows, teach photography
    workshops, and coordinate cultural events in Crawford County. He hopes to complete the remaining credits for his associate degree in liberal arts, which he sees as a stepping stone to becoming a certified
    community arts facilitator. In the longer term, he aspires to start a small non‑profit that provides arts‑based enrichment programs for at‑risk youth, blending his organizational strengths with his
    desire to give back.
