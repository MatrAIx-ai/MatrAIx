persona_description: Bruce Garver, a historian and professor specializing in the history of immigration and settlement in the American Midwest, with a particular focus on the experiences of Czech-Americans
  in Nebraska and the Great Plains states. He has conducted extensive research on the causes of immigration, the demographic changes in American towns and cities, and the establishment of public institutions
  by Czech-Americans. His expertise extends to the family life of new Czech-Americans and aspects of intellectual and cultural life, and he has described the principal public institutions established by
  Czech-Americans, both religious and freethinking.
