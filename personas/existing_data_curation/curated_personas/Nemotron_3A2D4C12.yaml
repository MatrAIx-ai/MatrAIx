  hobbies: '[''rock collecting'', ''insect observation'', ''LEGO building'', ''soccer'', ''reading adventure books'', ''drawing cartoon characters'', ''nature walks'', ''educational tablet games'', ''baking
    with family'']'
  career_goals: David dreams of becoming a veterinarian because he loves animals and wants to use his caring nature to keep them healthy. He is also fascinated by the desert environment around Tucson and
    imagines a future as an environmental scientist who protects local wildlife. While his ideas are big, he remains grounded, hoping to learn practical skills now that will help him support his family
    and community in the future. Sometimes he worries about whether he will be able to achieve these goals, but his willingness to keep trying keeps his ambition alive.
