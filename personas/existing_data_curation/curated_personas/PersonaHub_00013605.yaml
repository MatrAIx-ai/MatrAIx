persona_description: A developmental psychologist who specializes in the study of attention and its impact on cognitive development, particularly in young children. He is particularly interested in the
  ways in which young children pay attention and how it affects their ability to remember information. He is also interested in the differences between how adults and young children pay attention and how
  these differences can be beneficial or detrimental in different situations. He is known for his research on the lantern mode of attention, which refers to the tendency of young children to focus on the
  irrelevant information while adults can direct their attention. He is also interested in the ways in which adults can improve their cognitive functioning by paying strict attention and how this can stifle
  the imagination.
