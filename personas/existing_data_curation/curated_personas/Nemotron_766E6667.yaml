personas:
  professional: Mary Gerblick, a 30-year-old dining room and bar assistant in Dallas, blends a quiet curiosity for food trends with a practical focus on safety and efficiency, mastering POS systems, inventory
    control, and recipe execution while preferring backstage responsibilities and stepping up assertively when the team needs a calm, organized leader.
  sports: Mary Gerblick keeps fit by quietly jogging through Kiest Park and joining the Lone Star Trail Runners club for early-morning runs, while rooting for the Dallas Mavericks in the NBA, the Dallas
    Stars in the NHL, and FC Dallas in MLS, preferring solo, low-key workouts over crowded gyms.
  arts: Mary Gerblick finds artistic solace in the contemporary novels of Sally Rooney, the soothing voice of Norah Jones, the food-culture podcast Gastropod, upcycling glassware inspired by Studio McGee,
    quilting patterns echoing Faith Ringgold’s vibrant storytelling, and photographing local wildflowers with a Canon EOS, mirroring Ansel Adams’ dedication to natural detail.
  travel: Mary Gerblick plans trips with a spontaneous, budget-conscious mindset, favoring weekend getaways to the Texas Hill Country vineyards, a quiet cabin retreat in the Great Smoky Mountains, and the
    minimalist tea houses of Kyoto, while keeping a growing list of off-the-beaten-path spots like Marfa’s art installations for future solo pilgrimages.
  culinary: Mary Gerblick channels their curiosity into the kitchen by mastering herb-infused dishes such as rosemary-lemon roasted chicken, basil-pesto zucchini noodles, and lavender-honey shortbread,
    while crafting DIY cocktails like a sage-gin fizz, always sourcing fresh cilantro, thyme, and heirloom tomatoes from the Dallas Farmers Market.
  core: Mary Gerblick, a 30-year-old hospitality professional, blends quiet curiosity with a love for solitary creativity, juggling a relaxed approach to obligations with a fierce drive to someday run a
    peaceful, plant-filled café.
background:
  cultural: Mary grew up in a middle‑class White family in Texas, absorbing the region’s emphasis on Southern hospitality, modesty, and community. Her upbringing included church gatherings and family meals
    centered around BBQ, Tex‑Mex, and comfort foods. Living in Dallas, she blends traditional Texan values—respect for politeness, hard work, and family—with an appreciation for the city’s diverse culinary
    scene. These cultural influences shape her warm yet reserved demeanor, her love for hearty local cuisine, and her desire to create welcoming, quiet spaces for others.
