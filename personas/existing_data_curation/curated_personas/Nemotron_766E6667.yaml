  hobbies: '[''Reading contemporary fiction'', ''Listening to food and culture podcasts'', ''Indoor herb gardening'', ''Experimenting with new recipes'', ''Hiking in local nature trails'', ''Photography
    of natural scenery'', ''DIY crafts and upcycling'', ''Quilting'']'
  career_goals: Mary aims to move from a support role to a supervisory position within the next two years, targeting a shift‑lead or bar‑manager track at a venue that values a calm, organized environment.
    She plans to earn a Certified Food Safety Manager credential and complete a mixology certification, and eventually pursue a bachelor’s degree in Hospitality Management. Her long‑term ambition is to
    open a small, quiet café or tea house in Dallas that offers a peaceful retreat for solitary patrons while showcasing locally sourced, seasonal dishes.
