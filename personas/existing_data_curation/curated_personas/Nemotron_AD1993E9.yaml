personas:
  professional: Stephanie Lila, a 48‑year‑old aspiring part‑time administrative assistant, leverages their long‑standing skills in budgeting, event coordination, and Excel while thriving on predictable
    tasks, yet occasionally lets their relaxed attitude toward deadlines cause last‑minute scrambling, reflecting a love of routine tempered by a competitive streak to prove themselves.
  sports: Stephanie Lila enjoys brisk morning walks with the Oakwood Senior Walking Club, plays casual tennis at the local community center, and faithfully cheers for the Chicago Cubs in spring, the Chicago
    Bears in fall, and the Chicago Bulls in winter, using these routines to counterbalance their garden labor.
  arts: Stephanie Lila finds solace in quilting while listening to classic country legends like Dolly Parton and Johnny Cash, devours cozy mysteries by Agatha Christie and historical fiction by Hilary Mantel,
    and occasionally attends community theater productions featuring works beloved by Meryl Streep, letting these artistic touches color their routine.
  travel: Stephanie Lila prefers carefully planned weekend getaways, often driving to the historic charm of Charleston, South Carolina, or the vineyards of Napa Valley, while dreaming of a quiet October
    road trip through the New England countryside, balancing their love of relaxation with a modest travel budget.
  culinary: Stephanie Lila, an avid home cook and baker, frequently prepares apple‑cinnamon pie, chicken pot pie with garden‑grown carrots and thyme, and roasted beet salad drizzled with balsamic vinegar,
    showcasing their intermediate culinary skills and love for fresh, seasonal ingredients.
  core: Stephanie Lila, a 48‑year‑old garden‑to‑quilt enthusiast, blends a love of routine with a surprisingly competitive edge that fuels both their meticulous budgeting and their secret habit of binge‑reading
    mystery novels late into the night.
background:
  cultural: Stephanie was raised in a middle‑class, Midwestern white family in Iowa, with deep ties to the agricultural and small‑town community. Her upbringing emphasized self‑reliance, practicality, and
    active participation in her local Protestant church. She identifies with Midwestern cultural norms of modesty, family orientation, and community involvement, and she carries a modest German‑Scandinavian
    heritage common in the region.
attributes:
  skills: '[''Household budgeting'', ''Meal planning & cooking'', ''Basic home repair'', ''Microsoft Word'', ''Microsoft Excel'', ''Event coordination'', ''Garden maintenance'', ''Quilting and knitting'']'
  hobbies: '[''Gardening'', ''Baking pies'', ''Reading mysteries & historical fiction'', ''Quilting and knitting'', ''Church potluck gatherings'', ''Card games'', ''Crossword puzzles'', ''Listening to classic
    country music'']'
  career_goals: Stephanie hopes to re‑enter the workforce in a part‑time administrative or support role that offers a predictable schedule and the flexibility to maintain her home responsibilities. She
    also dreams of turning her quilting hobby into a modest home‑based business, selling handcrafted blankets at local craft fairs. In addition, she aims to expand her volunteer work by leading a community
    garden project and mentoring senior citizens in basic computer skills, using these activities to build confidence and reduce her worry about the future.
