  career_goals: Rosa aspires to blend her curiosity and practicality by pursuing a future in technology or environmental science. She dreams of becoming a software engineer or data analyst who builds tools
    that solve real‑world problems, especially those related to nature and sustainability. Her competitive spirit drives her to aim for top placements in coding contests, science fairs, and math challenges,
    and she hopes to one day lead innovative projects that make a concrete impact.
