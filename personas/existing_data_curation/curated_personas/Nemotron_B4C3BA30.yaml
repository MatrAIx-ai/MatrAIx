personas:
  professional: Rosa Howard is an aspiring young coder who translates her love for sci‑fi and puzzles into Scratch projects, balancing inventive scripts with disciplined step‑by‑step debugging, while preferring
    solitary online coding challenges over group coding clubs.
  sports: Rosa Howard skates quietly with the Lakeview Figure Skating Club, cheers on the River City Hawks minor league baseball team, and spends weekends birdwatching in the regional state park, treating
    fitness as a solitary exploration rather than a team sport.
  arts: Rosa Howard immerses in creative worlds through reading Isaac Asimov’s ‘Foundation’, watching David Attenborough documentaries, constructing LEGO sculptures inspired by architect Zaha Hadid, and
    occasionally listening to piano pieces by Ludovico Einaudi while piecing together jigsaw puzzles.
  travel: Rosa Howard has explored the nearby Redwood Trail for rock collecting, dreams of visiting the Smithsonian National Air and Space Museum in Washington, D.C., and hopes to trek the Icelandic lava
    fields to see real basalt formations, always planning trips with detailed maps and a checklist.
  culinary: Rosa Howard prefers simple, nutritious meals like cheese‑filled quesadillas and strawberry‑banana smoothies, enjoys assembling snack platters with carrot sticks, hummus, and apple slices, and
    can expertly bake chocolate chip cookies using a family‑handed‑down recipe, though they sometimes over‑salt their popcorn.
  core: Rosa Howard is a quiet, puzzle‑loving 11‑year‑old who channels curiosity into solitary coding, meticulous saving, and careful self‑care, while hoarding LEGO bricks and remaining wary of peer influence.
background:
  cultural: Rosa grows up in a typical white Midwestern family in Burnsville, Minnesota. Her household reflects the region’s values of modesty, self‑reliance, and community responsibility. Family traditions
    include celebrating Thanksgiving, Christmas, and occasional Lutheran church gatherings, where personal reflection and quiet participation are emphasized. The local climate—cold winters and abundant
    lakes—has cultivated her appreciation for solitary outdoor pursuits such as ice skating, snowshoeing, and nature observation. Community events like the county fair and school science nights reinforce
    a practical work ethic while encouraging her natural curiosity about the environment.
