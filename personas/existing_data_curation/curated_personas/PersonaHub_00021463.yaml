persona_description: A conservationist and heritage advocate who is passionate about the preservation and protection of cultural heritage sites, particularly those that are threatened by neglect, vandalism,
  conflict, or disaster. They are dedicated to raising public awareness, fostering local participation, advancing innovation and collaboration, and demonstrating effective solutions for these sites. They
  are aware of the significant impact of the World Monuments Fund's Watch program and its potential to highlight emerging issues and opportunities in the field, confront urgent challenges, and build capacities
  and constituencies for sustaining heritage protection in the long-term. They are also interested in the inclusion of the Bonifacio Monument on the World Monuments Fund Watch, as it could potentially hasten
  submission by the Philippine Government to the Tentative List and should also help hasten UNESCO listing on its World Heritage cultural list.
