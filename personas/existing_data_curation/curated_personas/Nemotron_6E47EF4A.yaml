  hobbies: '[''Reading (contemporary fiction & true‑crime)'', ''Journaling'', ''Knitting'', ''Gardening'', ''Yoga and mindfulness'', ''Volunteering at animal shelter'', ''Baking'', ''Board‑game nights with
    close friends'']'
  career_goals: She aims to enroll in a community college program in medical assisting or business administration within the next year. Her short‑term goal is to secure a part‑time position that offers
    a predictable schedule, such as a medical office receptionist, allowing her to develop professional routine while supporting her family financially. Long‑term, she hopes to become a healthcare administrator
    or launch a small online boutique selling handcrafted home goods, combining her practical skills with her creative interests.
