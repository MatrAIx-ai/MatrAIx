  hobbies: '[''Cooking Mexican and Tex‑Mex cuisine'', ''Gardening herbs and vegetables'', ''Fishing in Sam Houston National Forest'', ''Weekend hiking'', ''Reading biographies and self‑help books'', ''Listening
