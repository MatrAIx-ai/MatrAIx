  career_goals: Looking ahead, Ernesto aims to step into a senior operational leadership role, such as regional plant manager, where he can shape strategic direction for multiple facilities. He plans to
    complete his bachelor's degree in Business Administration and earn a Six Sigma Black Belt certification to solidify his expertise. Parallel to career advancement, he is committed to building a workplace
    culture that prioritizes mental health, intending to launch a peer‑support program and incorporate mindfulness practices for his team. Ultimately, he envisions leveraging his experience to consult small‑to‑mid‑size
    manufacturers on sustainable efficiency improvements, providing a flexible career path that balances professional growth with family stability.
