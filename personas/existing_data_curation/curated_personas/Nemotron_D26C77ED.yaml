  career_goals: Teresa aims to advance within the retail sector, targeting a shift‑supervisor role within the next year and a store‑manager position within three years. She plans to enroll in a part‑time
    associate program in business administration to strengthen her managerial knowledge. Long‑term, she envisions overseeing multiple locations as a district manager or opening her own boutique that reflects
    her community’s preferences. She also hopes to mentor junior employees and implement process improvements that enhance store efficiency and customer satisfaction.
