persona_description: A historian or art historian who is interested in the context and implications of the phrase "Man is the measure of all things" in relation to Greek art and religion. They have a deep
  understanding of the Hellenic epoch and its relation to the concept of rationalization. They are familiar with the ideas of Worringer and Lowes Dickinson and can discuss the concept of "Idealism" as practiced
  by the Greeks. They have a particular interest in the relationship between art and religion and how they intersect in the lives of the Greeks. They are also knowledgeable about the Doric column order
  and its relation to the human body.
