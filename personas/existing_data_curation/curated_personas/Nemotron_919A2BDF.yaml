    (art auctions, experiential events)'', ''Negotiation and partnership building'']'
  hobbies: '[''Visiting art galleries and museums'', ''Painting and mixed‑media art'', ''Photography, especially of coastal landscapes'', ''Hiking in the Santa Ynez Mountains'', ''Traveling to culturally
    rich destinations'', ''Cooking and experimenting with Mediterranean and Mexican recipes'', ''Gardening with native Californian plants'', ''Participating in local theater productions'', ''Volunteering
    for community fundraisers and charity events'', ''Attending book clubs and literary discussions'', ''Practicing yoga and mindfulness'', ''Dancing salsa and Latin social dances'']'
  career_goals: Charity aspires to transition into a senior leadership role, such as Director of Development or Chief Advancement Officer, at a nonprofit organization focused on arts, culture, or community
    development. She aims to design and execute groundbreaking, art‑centric fundraising initiatives that attract a diverse donor base and generate significant revenue. Additionally, she seeks to mentor
    emerging public relations and fundraising professionals, particularly women returning to the workforce. Over the next five years, she plans to launch her own boutique consulting practice that offers
    strategic communication and creative fundraising services to small and mid‑size nonprofits across Santa Barbara County. Ultimately, she hopes to establish a lasting legacy by creating an endowment fund
    that supports local artists and cultural programs.
