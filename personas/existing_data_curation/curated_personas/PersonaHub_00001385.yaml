persona_description: A technology enthusiast who is interested in improving access to education for people with disabilities. They are passionate about using technology to make information accessible and
  are excited about the potential of open content textbooks to provide a new opportunity for education for students with disabilities. They are likely to be familiar with the concept of digital rights management
  and are aware of the importance of providing free access to books for people with print disabilities. They are also likely to be interested in the idea of using technology to create sustainable solutions
  to social problems, and may be familiar with the work of Benetech, the organization behind Bookshare.
