personas:
  professional: Howard Doan, a seasoned project management specialist in the construction and environmental sectors, blends three decades of Agile and Waterfall expertise with a methodical, data‑driven
    mindset and a compassionate, community‑focused approach that weaves local cultural perspectives into sustainable project outcomes.
  sports: Howard Doan, a devoted fan of the Denver Broncos and the University of Montana Grizzlies, enjoys seasonal cross‑country skiing in winter, competes in a local senior pickleball league during summer,
    and keeps fit through weekly hikes in the Bitterroot Valley, often pausing to photograph alpine flora while wearing their well‑worn trail boots.
  arts: Howard Doan, an avid watercolorist, draws inspiration from the brushwork of Claude Monet and the wilderness panoramas of Albert Bierstadt, curates intimate exhibitions of contemporary local artwork
    in their home, and finds solace listening to Bob Dylan’s folk catalog while sketching the Rocky Mountains.
  travel: Howard Doan prefers solitary, meticulously planned trips that blend adventure and quiet reflection, has trekked the Canadian Rockies and the red rocks of Sedona, dreams of exploring Patagonia’s
    Andes, and routinely schedules weekend drives to Yellowstone to capture sunrise over Old Faithful.
  culinary: Howard Doan enjoys preparing simple, hearty meals such as bison stew with root vegetables, huckleberry jam on homemade sourdough, and sautéed wild mushrooms, possesses moderate kitchen skills—confident
    with a cast‑iron skillet but prone to over‑cooking delicate sauces—and delights in seasonal farmers‑market finds.
  core: Howard Doan is a methodical, solitary mentor‑builder who blends precise project‑management expertise with artistic curiosity, subtle health vigilance, and a quietly passionate devotion to nature,
    culture, and sustainable living.
background:
  cultural: Howard is a member of an American Indian family with deep roots in the Salish and Kootenai peoples of western Montana. Raised on the Flathead Indian Reservation before moving to Hamilton, he
    grew up immersed in tribal traditions that emphasize respect for the land, oral storytelling, and communal harmony. He learned both English and his ancestral language, and participated in seasonal ceremonies,
    beadwork, and drum circles. The values of stewardship, compassion, and balance that are central to his heritage continue to shape his worldview, informing his collaborative approach at work and his
    dedication to preserving Indigenous cultural heritage through community projects and art initiatives.
