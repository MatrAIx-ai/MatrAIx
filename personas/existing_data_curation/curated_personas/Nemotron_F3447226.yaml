  career_goals: Although retired from formal employment, Irvin is driven to channel his imagination and social energy into community enrichment. He aims to establish an intergenerational art program at
    the Gardena Community Center that pairs seniors with local youth to create collaborative murals and storytelling projects. He also aspires to curate a traveling exhibition of his abstract works that
    highlights Black artistic perspectives and to author a memoir that weaves together his personal history with the broader narrative of the civil‑rights era in Los Angeles. Additionally, Irvin hopes to
    mentor emerging Black artists, advocate for mental‑health resources for seniors, and organize annual cultural festivals that celebrate African‑American heritage in the region.
