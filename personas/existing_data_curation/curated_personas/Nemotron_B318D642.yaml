  hobbies: '[''Visiting Art Galleries'', ''Museum Tours'', ''Sketching Urban Scenes'', ''Digital Photography'', ''Reading Art and Philosophy Books'', ''Cooking Chinese and Fusion Cuisine'', ''Listening
    to Indie/Ambient Music'', ''Walking Along Quincy Waterfront'', ''Small Book Club Discussions'', ''Community Art Workshops'']'
  career_goals: Xuan aims to advance into a supervisory role within public transportation, eventually becoming a logistics or operations manager who can integrate sustainable transit solutions and improve
    rider experience. He plans to pursue a bachelor's degree in transportation planning or urban logistics while gaining certifications in safety management. Long‑term, he hopes to blend his artistic sensibility
    with his professional expertise to design user‑friendly, aesthetically pleasing transit environments and contribute to community‑focused mobility projects.
