  career_goals: Cheng aims to move into a supervisory role within the next two years, targeting a team lead or quality‑assurance specialist position. He plans to complete a bachelor's degree in business
    administration and obtain formal leadership training to strengthen his organizational skills. Over the long term, he aspires to become a customer experience manager for a technology firm, shaping service
    strategies and mentoring staff, while also nurturing a side venture—a pop‑up café that blends modern Chinese fusion cuisine with community‑focused events.
