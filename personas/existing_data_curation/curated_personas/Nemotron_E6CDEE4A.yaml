personas:
  professional: Cheng Yang is a bilingual customer support specialist who leverages their natural improvisational flair and empathy to resolve issues in real time, while meticulously tracking metrics in
    Zendesk and Salesforce as they eye a supervisory role within two years.
  sports: Cheng Yang fuels their competitive streak by playing in a local adult soccer league and joining pickup basketball games on the East Bay, cheering for the Golden State Warriors and San Francisco
    Giants while maintaining a weekly jogging routine along the Bay Trail.
  arts: Cheng Yang channels their outgoing nature into weekend karaoke sessions where they belt out Mandarin classics by Jay Chou and Teresa Teng alongside English anthems from Adele and Queen, using the
    experience to unwind after a busy work week.
  travel: Cheng Yang prefers short, spontaneous road trips to nearby gems like Napa Valley and Yosemite, while also dreaming of a cultural immersion tour of Tokyo’s street food markets and the historic
    neighborhoods of Lisbon, balancing travel plans with a modest budget and a full work schedule.
  culinary: Cheng Yang, an enthusiastic home chef, experiments with modern twists such as mapo tofu ramen and char siu bao filled with goat cheese, sourcing fresh herbs, heirloom tomatoes, and Sichuan peppercorns
    from Bay Area farmers’ markets, though they often over‑season the dishes in pursuit of bold flavor.
  core: Cheng Yang blends a love for high‑energy team sports and karaoke with a meticulous, data‑driven approach to customer support, while juggling an impulsive appetite for gourmet ingredients and a recurring
    struggle to lock down strict deadlines.
background:
  cultural: Cheng was born to first‑generation Chinese immigrants who settled in the San Francisco Bay Area. Raised in a bilingual household, he celebrated Lunar New Year, the Mid‑Autumn Festival, and other
    traditional customs while also integrating into mainstream American culture through school and community life. This bicultural upbringing instilled values of familial respect, community harmony, and
    collective responsibility, which shape his considerate nature and emphasis on teamwork. He maintains close ties with his extended family, participates in local Chinese cultural associations, and embraces
    the multicultural environment of San Leandro.
