persona_description: A historical figure from the Holy Roman Empire, known for their expertise in the law, politics, and governance during the later Middle Ages. They were a member of the Aulic Council,
  a court council in the Holy Roman Empire, and were responsible for administering the Empire's affairs. They were paid by the Emperor and composed of a president, vice-president, vice-chancellor, and 18
  councilors, all of whom were chosen and paid by the Emperor. The council's decisions were made by a majority vote, but in case of split votes, the president could break the tie or choose to refer the
  matter to the Emperor. The seat of the council was at the Imperial residence in Vienna, and it was dissolved when the Emperor died.
