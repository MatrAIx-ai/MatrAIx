  career_goals: Marlon aims to advance to a senior media collections specialist role within the New York Public Library system, eventually becoming a digital preservation manager overseeing large‑scale
    digitization projects. He plans to pursue a Master’s in Library and Information Science to deepen his expertise and to lead community outreach programs that increase digital literacy and equitable access
    to information for underserved neighborhoods in Brooklyn. Long‑term, he envisions spearheading innovative platforms that integrate STEM resources into public library services, fostering partnerships
    with local schools, tech hubs, and cultural institutions, while championing representation of Black scholars and creators in the library’s collections.
