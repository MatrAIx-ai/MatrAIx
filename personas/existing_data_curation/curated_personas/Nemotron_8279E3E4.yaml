personas:
  professional: Marlon Martin is a library science specialist at the New York Public Library, leveraging meticulous cataloging, Python‑driven metadata analysis, and assertive project management to spearhead
    digitization initiatives while they maintain high standards of digital preservation.
  sports: Marlon Martin runs three times weekly with the New York Road Runners, follows the New York Knicks and New York Yankees as their favorite professional teams, and joins seasonal pick‑up basketball
    games at a community center during winter, blending structured cardio with team sport camaraderie while they stay fit.
  arts: Marlon Martin curates street‑photography showcases of Brooklyn murals, attends spoken‑word open mic nights featuring artists like Saul Williams and Kendrick Lamar, and studies the work of photographer
    Vivian Maier, allowing these creative influences to shape both their personal aesthetic and library programming.
  travel: Marlon Martin plans weekend getaways with meticulous itineraries, favoring hikes in the Adirondacks, day trips to historic Philadelphia, and dreams of a cultural immersion in New Orleans for its
    jazz scene, while they occasionally save for a future adventure to Jamaica to explore Caribbean culinary roots.
  culinary: Marlon Martin enjoys experimenting in the kitchen at an intermediate level, mastering dishes like jerk chicken, shrimp and grits, and sweet potato pie, using bold ingredients such as scotch
    bonnet peppers, smoked paprika, and okra to fuse Caribbean flavors with Southern comfort food, and they often document the process with detailed notes for future refinement.
  core: Marlon Martin is a hyper‑organized 22‑year‑old library science enthusiast who channels curiosity into meticulous digitization work, runs three times a week, devours contemporary literature, cooks
    bold Caribbean dishes, and occasionally hoards vintage chess pieces while they juggle an ever‑growing spreadsheet of life.
background:
  cultural: Marlon is an African‑American raised in Brooklyn’s vibrant, multicultural neighborhoods. His family maintains connections to Caribbean heritage, celebrating traditions such as Juneteenth, Kwanzaa,
    and Caribbean holiday gatherings. Growing up in a community-rich environment, he was exposed to a blend of Black cultural expression—from gospel music and hip‑hop to the literary works of authors like
    Toni Morrison and Colson Whitehead. This background informs his commitment to social equity, the preservation of Black oral histories, and the inclusion of diverse voices in library collections. Marlon’s
    cultural identity also shapes his community involvement, as he volunteers with local youth programs and curates events that highlight Black artists and innovators.
