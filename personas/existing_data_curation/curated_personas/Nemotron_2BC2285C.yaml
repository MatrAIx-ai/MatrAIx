  hobbies: '[''Painting folk‑art inspired murals'',''Pottery and ceramic crafts'',''Traditional Mexican cooking'',''Gardening (heirloom vegetables and native flowers)'',''Acoustic guitar and singing corridos'',''Community
    theater acting and hosting'',''Reading biographies and cultural history'',''Attending local art festivals'',''Storytelling and oral history collection'']'
  career_goals: Although retired from formal employment, Sergio aims to deepen his impact as a cultural mentor. He plans to compile a memoir that weaves together his family’s migration story, Mexican folklore,
    and the evolution of the Idalou community. He also hopes to launch a monthly “Cultural Heritage” series at the local senior center, featuring guest speakers, art demonstrations, and cooking classes.
    In the longer term, he envisions collaborating with the Lubbock County historical society to preserve oral histories of Mexican‑American residents and perhaps curate a small community exhibit on regional
    folk art.
