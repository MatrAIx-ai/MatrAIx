personas:
  professional: Sergio Mejia, a retired farm equipment mechanic turned cultural mentor, leverages his hands‑on technical expertise, bilingual fluency and methodical planning to lead community workshops
    on traditional cooking, woodworking, and mural painting, while captivating senior‑center audiences with folklore storytelling.
  sports: Sergio Mejia enjoys low‑impact fitness through daily walks in the Texas wildflower garden, cheers passionately for the Texas Tech Red Raiders football team, and participates in the senior league’s
    weekly shuffleboard matches at the local community center, mixing gentle competition with social camaraderie.
  arts: Sergio Mejia immerses himself in artistic expression by painting vivid murals inspired by folk motifs, crafting pottery under the guidance of a local artisan, playing acoustic guitar and singing
    corridos at community theater productions, and drawing inspiration from artists like Frida Kahlo and Diego Rivera.
  travel: Sergio Mejia prefers meticulously planned road trips that combine cultural festivals with family visits, having explored Austin’s live‑music scene, Santa Fe’s art galleries, and the historic town
    of San Antonio’s Fiesta, while dreaming of a future pilgrimage to Oaxaca to study traditional mole recipes.
  culinary: Sergio Mejia’s cooking repertoire features labor‑intensive tamales, smoky mole made with roasted chilies, and fresh salsa al fresco, prepared with heirloom tomatoes, dried ancho chilies, and
    a pinch of epazote, showcasing a high level of culinary skill that turns family gatherings into flavorful celebrations.
  core: Sergio Mejia is a curious, organized, and gregarious 65‑year‑old cultural steward who blends hands‑on mechanical know‑how with vibrant artistic pursuits, often overcommitting to community projects
    while humming corridos and juggling a modest yet generous financial approach.
background:
  cultural: Sergio was born to Mexican immigrant parents and grew up in a bicultural household in the Texas Panhandle. He was raised speaking Spanish at home while attending English‑language schools, giving
    him a deep fluency in both cultures. Catholic traditions, celebrations such as Día de los Muertos and Cinco de Mayo, and the rich culinary heritage of his family have shaped his identity. Living in
    Idalou, he bridges rural Texas values with Mexican‑American customs, often serving as a cultural liaison between older and newer generations in the community.
attributes:
  skills: '[''Bilingual Spanish‑English communication'',''Automotive and small‑engine repair'',''Community event planning and coordination'',''Public speaking and storytelling'',''Traditional Mexican cooking'',''Woodworking
