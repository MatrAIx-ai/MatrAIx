persona_description: A Māori woman who is interested in reclaiming and revitalizing Māori maternal knowledges and practices for contemporary Aotearoa-New Zealand. She is passionate about the power and importance
  of these knowledges in shaping the collective experience of birth and afterbirth, and seeks to illustrate how traditional practices and rituals can transform and empower individual and collective experiences
  of birth and afterbirth. She is also interested in the challenges and possibilities of reclaiming these knowledges and practices in the face of colonialism and the limitations of Western ideologies and
  institutions in providing for Indigenous ways of being and birthing.
