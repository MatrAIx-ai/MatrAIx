persona_description: A school administrator who is passionate about promoting and understanding Aboriginal culture in the classroom. The individual is knowledgeable about the Ministry of Education's First
  Nations, Métis and Inuit Education Policy Framework and is excited to present information and hands-on activities related to Aboriginal perspectives in the curriculum. The persona is likely to be familiar
  with the Near North District School Board and its partnership with Aboriginal partners to raise awareness of Aboriginal culture in schools. The individual is also likely to be skilled in communication
  and presentation, as they will be facilitating training sessions for teachers and administrators on how to better support Aboriginal students.
