  career_goals: Rafael aims to move into a supervisory role within the bank, such as senior teller lead or branch assistant manager, where he can mentor younger colleagues and shape customer service standards.
    Over the next three to five years he hopes to lead the bank’s community outreach program, delivering financial‑literacy workshops for seniors and local small‑business owners in Sherborn. In the longer
    term, he envisions a semi‑retirement phase where he consults part‑time for local businesses, leveraging his business degree and banking experience while maintaining a stable, predictable schedule.
