personas:
  professional: Andrea Habtemariam, an 86‑year‑old community steward, leverages decades of meticulous organization, budgeting, and event coordination to run her church’s outreach programs, senior‑center
    workshops, and neighborhood garden gatherings, all while bringing a warm, sociable energy that makes every volunteer feel valued.
  sports: Andrea Habtemariam enjoys leisurely strolls through Fort Wayne’s Lakeside and Beutter Parks, participates in the senior walking club’s twice‑weekly meet‑ups, and follows the Fort Wayne Mad Ants
    basketball games on TV, cheering with the same enthusiasm they bring to bingo nights.
  arts: Andrea Habtemariam expresses creativity through choir singing—favoring gospel hymns by Mahalia Jackson—quilting, embroidery, and a book‑club love of classic literature, often attending the Fort
    Wayne Museum of Art’s senior tours to admire Monet and local painters.
  travel: Andrea Habtemariam prefers relaxed, organized trips with family or senior travel groups, having visited nearby Chicago’s museums, taken a river cruise on the Ohio, and dreaming of a gentle pilgrimage
    to the Grand Canyon’s rim, always planning itineraries months ahead and packing a spare pair of glasses.
  culinary: Andrea Habtemariam delights in preparing fragrant heritage stews, tangy flatbreads, and classic Midwestern comfort foods like pot roast, using fresh herbs from her garden, a well‑worn cast‑iron
    pot, and occasionally over‑seasoning with a secret spice blend that friends both love and tease her about.
  core: Andrea Habtemariam blends regimented organization, warm sociability, and a love for heritage cooking and community storytelling into a vibrant, active senior life that balances meticulous budgeting
    with occasional indulgences in quilting marathons and garden escapades.
background:
  cultural: Andrea is a Black woman of Ethiopian descent, reflected in her surname Habtemariam, who has lived most of her adult life in Fort Wayne, Indiana. She blends the rich traditions of Ethiopian culture—such
    as celebrating Enkutatash, cooking injera, and speaking Amharic—with the African-American community customs of church fellowship, gospel music, and local civic engagement. Her upbringing during the
    civil‑rights era and later involvement in church and neighborhood groups have shaped a deep sense of community, intergenerational responsibility, and cultural pride.
