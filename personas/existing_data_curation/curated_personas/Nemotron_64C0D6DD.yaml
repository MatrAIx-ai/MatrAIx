  hobbies: '[''Gardening'', ''Quilting'', ''Cooking Ethiopian cuisine'', ''Church choir singing'', ''Senior center bingo'', ''Book club'', ''Walking'', ''Storytelling'']'
  career_goals: Andrea’s foremost ambition is to continue supporting her family and local community by sharing her cultural heritage, mentoring younger relatives, and volunteering at her church’s outreach
    programs. She hopes to stay physically and mentally active, preserve traditional Ethiopian customs through cooking and storytelling, and document her life experiences in a memoir for future generations.
