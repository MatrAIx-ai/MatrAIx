persona_description: A high-level official or representative from a government, international organization, or civil society organization who is responsible for coordinating and advancing the United Nations'
  Education for All (EFA) initiative. This individual is involved in the global, regional, and national level coordination mechanisms of UNESCO and plays a key role in ensuring that the six EFA goals are
  achieved through deepening partnerships, building consensus, and harmonizing the contribution and participation of all stakeholders. This persona has expertise in EFA and is actively involved in the High-Level
  Group, Working Group, International Advisory Panel, Collective Consultation of NGOs, and E-9 Initiative. They have a deep understanding of the challenges and opportunities related to EFA and are committed
  to using their expertise to drive progress towards the goal of universal primary education for all children.
