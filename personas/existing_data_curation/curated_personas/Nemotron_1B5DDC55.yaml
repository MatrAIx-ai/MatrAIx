personas:
  professional: Jessy Little, a retired research engineer, leverages decades of data‑analysis, experimental design, and technical writing expertise to mentor high school robotics teams, organize museum
    science outreach events, and craft clear, accessible explanations for seniors learning emerging technologies; they navigate a relaxed, sometimes disorganized schedule that reflects a curiosity‑practical
    balance and a competitive drive to make an impact.
  sports: Jessy Little energizes weekly Zumba sessions at the local community center, follows the Columbus Blue Jackets and Cincinnati Reds with avid enthusiasm, participates in a senior softball league
    through the Columbus Parks and Recreation club, and they tackle fitness with a competitive spirit that fuels their love for friendly board‑game tournaments.
  arts: Jessy Little attends productions at the historic Ohio Theatre, especially musical revues like 'Hamilton' and community pantomimes, enjoys ukulele renditions of Jason Mraz songs, curates board‑game
    nights featuring titles such as 'Catan', and they find inspiration in Monet's Water Lilies and the storytelling of The Avett Brothers, weaving these artistic experiences into their social gatherings.
  travel: Jessy Little travels with a close circle of friends, preferring organized road‑trips to Hocking Hills State Park, cultural excursions to Savannah, Georgia, and European city tours of Barcelona
    and Dublin; they meticulously plan itineraries on spreadsheets but also leave room for spontaneous detours, balancing budget constraints with a desire for enriching experiences.
  culinary: Jessy Little enjoys cooking simple, health‑focused meals such as roasted cauliflower quinoa bowls with fresh basil, shrimp scampi with lemon zest, and banana bread spiced with cinnamon; they
    experiment with ingredients like smoked paprika and ginger, and they often host potluck evenings where friends share dishes inspired by their urban gardening harvest.
  core: Jessy Little is a curious, practical retiree who blends competitive zeal with a relaxed, sociable lifestyle; they channel engineering precision into mentoring, community events, and a zest for Zumba,
    travel, and ukulele tunes, all while navigating occasional disorganization and a healthy skepticism of others' motives.
background:
  cultural: Jessy comes from a Midwestern white family with German‑Italian ancestry, raised in small towns in Ohio before moving to Columbus for university. Her upbringing emphasized community involvement,
    modesty, and a strong work ethic typical of the Midwest, while her college years at Ohio State introduced her to a more diverse and progressive environment. She identifies with the practical, neighborly
    values of the region and enjoys participating in local festivals, farmer’s markets, and volunteer initiatives that celebrate Columbus’s blend of Midwestern heritage and growing cultural diversity.
attributes:
  skills: '[''Data analysis'', ''Statistical modeling'', ''Experimental design'', ''Technical writing'', ''Laboratory instrumentation'', ''Software troubleshooting'', ''Mentoring'', ''Public speaking'',
    ''Event coordination'', ''Community outreach'']'
  hobbies: '[''Book club'', ''Trivia nights'', ''Zumba dancing'', ''Urban gardening'', ''DIY home automation'', ''Ukulele playing'', ''Theater outings'', ''Traveling with friends'', ''Board game tournaments'']'
  career_goals: Although retired, Jessy aims to stay actively involved in the STEM community by volunteering as a mentor for local high school robotics teams, organizing science outreach events at the Columbus
    museum, and developing workshops that introduce seniors to emerging technologies. She also hopes to author a memoir reflecting on her engineering career to inspire women in STEM and is exploring part‑time
    consulting opportunities that leverage her expertise in data‑driven decision making for nonprofit organizations.
