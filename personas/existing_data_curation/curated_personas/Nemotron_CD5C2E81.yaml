  hobbies: '[''Baking'', ''Herb gardening'', ''Yoga'', ''Meditation'', ''Journaling'', ''Reading mystery novels'', ''Puzzle solving'', ''Attending farmers markets'', ''Watching cooking competitions'', ''Running'']'
  career_goals: Brandy aims to earn a culinary certification within the next year to formalize her expertise and qualify for higher positions. She aspires to become a sous‑chef within two years, then advance
    to head chef, overseeing a kitchen where structured workflows and predictable schedules are prioritized. Long‑term, she dreams of opening a modest bistro in Westfield that offers a farm‑to‑table menu
    emphasizing consistency and seasonal produce. She also plans to compete in regional cooking contests to benchmark her skills and gain recognition for her competitive edge.
