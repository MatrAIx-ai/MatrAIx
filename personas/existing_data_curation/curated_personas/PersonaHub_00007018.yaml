persona_description: A critical thinker who is skeptical of the idea that stereotyping is necessary or not at all. They believe that stereotypes can be helpful but can also be harmful, and they are aware
  of how their own cultural backgrounds, experiences, attitudes, values, and biases influence psychological processes. They are also aware of the obstacles that make cultural competence difficult to implement
  and achieve, such as the lack of cultural competence for being unreachable and the implication of cultural competence being privileging group characteristics over individuality. They are also aware of
  the common confusion between the words "stereotypes" and "copy and paste," and they are skeptical of the popular opinion that apologizing makes up for the inaccuracy.
