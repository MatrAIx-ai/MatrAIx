persona_description: A global advocate for women's rights and empowerment, who is dedicated to supporting women and girls in their pursuit of education, health care, and career opportunities. The persona
  is likely to be a member of the American Association of University Women (AAUW) and has a strong interest in international work, having given fellowships to more than 3,000 women scholars from 134 countries
  and sent delegations of AAUW members to three continents to learn about the unique challenges in specific countries. The persona is also likely to be a vocal advocate for women's rights and has a special
  interest in the intersection of international work with world history, having established the International Federation of University Women to promote peace and understanding among women in different countries
  following World War I.
