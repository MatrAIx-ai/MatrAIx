  career_goals: Antoinette aims to deepen her artistic practice and share her knowledge with her community. She plans to complete a series of abstract watercolor paintings for a senior art exhibit at the
    local community center, write and self‑publish a memoir that weaves family genealogy with reflections on the cultural shifts she has witnessed, and launch a mentorship program that pairs senior artists
    with younger participants. She also aspires to learn a new instrument, the harp, and to travel to European art capitals to study Renaissance and modern abstract works firsthand.
