  career_goals: Nidia aims to elevate her career from a clerical accounting role to a senior auditing or supervisory position within the next five years, with the ultimate goal of earning her Certified
    Public Accountant (CPA) credential. She plans to enroll in a bachelor’s accounting program to meet licensing prerequisites, and she is eager to specialize in forensic accounting and data‑analytics integration
    to improve fraud detection for midsize firms. Long‑term, she envisions launching a boutique consulting practice that offers culturally‑aware bookkeeping and financial advisory services to Latinx entrepreneurs
    in the Bay Area, combining her competitive drive with her commitment to community empowerment.
