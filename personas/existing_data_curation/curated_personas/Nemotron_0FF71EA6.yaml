  career_goals: Ethel aims to create a community legacy book that captures the stories, art, and memories of Perham’s seniors, and to organize an annual inter‑generational art fair that showcases local
    creativity. She hopes to mentor younger neighbors in quilting and storytelling, and to advocate for expanded senior programs at the town’s community center. Ultimately, she wishes to be remembered as
    a bridge between past and present, keeping the town’s cultural heritage alive for future generations.
