personas:
  professional: Ethel Diaz, a 75-year-old community storyteller and volunteer coordinator in Perham, blends her watercolor talent, oral history expertise, and natural sociability to lead senior‑center workshops,
    inter‑generational art fairs, and storytelling circles, though her spontaneous nature sometimes leaves event timelines a bit fluid.
  sports: Ethel Diaz enjoys low‑impact fitness by walking the lakeshore with binoculars for birdwatching, participates in the Perham Senior Softball league, and avidly follows the Minnesota Vikings, Minnesota
    Twins, Minnesota Timberwolves, and Minnesota Wild, often cheering on Saturday games with the local community center’s TV lounge.
  arts: Ethel Diaz immerses herself in the arts through watercolor river abstractions inspired by Georgia O'Keeffe, collage work echoing Mark Rothko’s color fields, and quilting sessions that honor Midwest
    folk traditions, while she regularly quotes Maya Angelou and treasures performances by the local symphony orchestra.
  travel: Ethel Diaz favors relaxed, organized road trips with her church choir to nearby state parks like Itasca and Voyageurs, cherishes her past weekend getaway to Chicago’s Art Institute, dreams of
    a pilgrimage to New York’s Metropolitan Museum to see the American Wing, and always packs a thermos of hot apple cider for the journey.
  culinary: Ethel Diaz delights in cooking Midwestern comfort food such as honey‑glazed ham, tater‑tot casserole, and fresh corn succotash harvested from her garden, often adding wild sage and locally milled
    cornmeal to her recipes while she knits and chats with neighbors over a steaming bowl of chicken‑pot pie.
  core: Ethel Diaz is a vibrant, community‑centric elder whose boundless curiosity fuels a life of art, storytelling, and generous chaos, even if occasional forgetfulness and a penchant for spontaneous
    deadlines keep her days delightfully unpredictable.
background:
  cultural: Ethel grew up in Perham, Minnesota, a small town shaped by German and Scandinavian immigrant roots and a strong Protestant community. Raised during the Great Depression and World War II, she
    internalized Midwestern values of self‑reliance, hospitality, and collective responsibility. Her family traditions include Lutheran church gatherings, community potlucks, and seasonal festivals that
    celebrate the region’s agricultural heritage. These cultural influences have fostered her deep connection to community, love of nature, and commitment to preserving local history.
