personas:
  professional: Brenda Sayers, a retired mechanical engineer and project manager, now channels their process‑optimization expertise into designing a STEM outreach program for middle‑school girls while meticulously
    drafting grant proposals and board reports with the same precision that defined their career.
  sports: Brenda Sayers enjoys low‑impact exercise through weekly nature walks with the local Audubon Society bird‑watching group and follows the Kansas City Royals, attending spring training games when
    their schedule permits, while also competing in senior bridge tournaments that satisfy their competitive streak.
  arts: Brenda Sayers expresses creativity through intricate geometric quilting inspired by the works of Anni Albers, plays bridge at the county historical society’s weekly game night, and finds solace
    listening to Yo‑Yo Ma’s cello suites while researching family histories.
  travel: Brenda Sayers prefers structured travel itineraries, having organized a genealogical tour of ancestral towns in County Galway, Ireland, and a weekend retreat at the historic Hot Springs, Arkansas,
    balancing their love for heritage sites with their need for predictable schedules.
  culinary: Brenda Sayers excels at precise baking, regularly crafting lemon‑curd tartlets using a digital scale and exact measurements, while their favorite savory dish is a classic chicken pot pie seasoned
    with thyme and sage, often prepared from recipes by Julia Child.
  core: Brenda Sayers blends disciplined engineering rigor with a competitive love for puzzles, quilting, and community service, all while obsessively tracking details from budgets to bird sightings.
background:
  cultural: Brenda grew up in the Midwestern United States, immersed in the values of modesty, hard work, and community responsibility common to Indiana’s small‑town culture. Her white, Protestant‑rooted
    upbringing emphasized self‑reliance, punctuality, and a respect for tradition, which are reflected in her organized lifestyle and dedication to local volunteerism. She maintains strong ties to the Wakarusa
    area, participating in county fairs, church gatherings, and neighborhood improvement projects that celebrate the region’s agricultural heritage.
attributes:
  skills: '[''Mechanical Engineering'', ''Project Management'', ''Process Optimization'', ''Data Analysis'', ''Technical Writing'', ''Quality Assurance'', ''Budget Management'', ''CAD (AutoCAD, SolidWorks)'',
