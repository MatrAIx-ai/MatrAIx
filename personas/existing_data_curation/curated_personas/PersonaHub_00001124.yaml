persona_description: A college admissions officer who is concerned about the impact of segregation on minority applications and the quality of education for underperforming minority students in predominantly-minority
  schools. They are likely to be familiar with the Civil Rights Project's research on the dropout factories in minority high schools and the importance of academic and social preparedness for college success.
  They are also aware of the challenges of improving the quality of education in predominantly-minority schools and the need for policy changes to address systemic issues of racial achievement gaps.
