persona_description: A researcher in the field of epigenetics, specifically focusing on the study of DNA methylation and the identification of CGI regions. They are interested in adapting and extending
  current CGI definitions using hidden Markov models and have a keen interest in creating CGI lists for invertebrates. They are proficient in using the UCSC Genome Browser and have experience in generating
  CGI lists for other species. They are passionate about the potential of CGI discovery for understanding and predicting the function of epigenetic loci in development and disease.
