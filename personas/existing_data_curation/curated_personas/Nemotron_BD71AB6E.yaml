  hobbies: '[''Attending local art exhibitions and supporting regional artists'', ''Participating in community trivia and poker nights'', ''Fishing and outdoor recreation in the Upper Peninsula'', ''Road
    trips to cultural and historic sites'', ''Restoring a vintage Chevrolet Impala'', ''Gardening and DIY home improvement'', ''Cooking and exploring new culinary recipes'', ''Volunteering at town festivals
    and charity events'']'
  career_goals: At 59, Tristan is looking toward a capstone role that leverages his experience while allowing him to explore broader interests. He aims to transition into a district or regional management
    position overseeing multiple stores in the Great Lakes region, where he can champion innovative store designs that integrate local art and culture. He also hopes to mentor a new generation of retail
    leaders through a structured apprenticeship program he plans to develop with his current employer. In the longer term, Tristan envisions consulting for small independent boutiques, helping them adopt
    modern inventory and digital marketing strategies while preserving the community‑focused shopping experience he values.
