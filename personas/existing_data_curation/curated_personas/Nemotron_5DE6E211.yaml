  hobbies: '[''Salsa dancing'', ''Traditional Mexican cooking'', ''Hiking in the Columbia River Gorge'', ''Digital photography workshops'', ''Data visualization learning'', ''Quilting'', ''Crossword puzzles'',
    ''Volunteering at a local food bank'', ''Spanish‑language book club'', ''Community cultural festivals'']'
  career_goals: Nereida aims to transition from a clerical role to a senior accounting coordinator or small‑business consultant within the next three to five years. She plans to earn the Certified Bookkeeper
    designation and complete a CPA preparatory course to deepen her regulatory knowledge. Leveraging her curiosity for new technologies, she intends to integrate data‑analysis tools such as Power BI into
    her workflow, thereby offering more strategic insights to employers. Additionally, she hopes to mentor junior staff, develop a training program for best‑practice bookkeeping in the local Mexican‑American
    business community, and eventually work part‑time as a trusted financial advisor for small enterprises, ensuring a stable and fulfilling retirement.
