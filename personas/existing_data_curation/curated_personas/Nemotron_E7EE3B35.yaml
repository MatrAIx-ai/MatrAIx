    community theater'']'
  career_goals: Although retired from formal employment, Zandra aims to cement her legacy as a cultural bridge in the Billerica community. She plans to organize a traveling exhibit of her abstract works
    that highlights Colombian motifs, publish a memoir that intertwines her life story with Colombian folklore, and author a children’s picture book illustrating traditional tales. Additionally, she aspires
    to lead regular art‑therapy workshops at the local senior center, mentor emerging artists from diverse backgrounds, and arrange a cultural exchange trip to Medellín to deepen her connection to her heritage.
