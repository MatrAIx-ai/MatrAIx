  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Quilting'', ''Cooking Southern dishes'', ''Puzzling (crosswords, jigsaw)'', ''Walking in local parks'', ''Birdwatching'', ''Church choir participation'']'
  career_goals: Although retired from formal employment, Gabrielle is determined to leave a lasting imprint on her community and family. She aspires to compile a memoir of her life’s stories and the oral
    histories of older African‑American residents of Meridianville, preserving them for future generations. She also hopes to expand the neighborhood garden she started, turning it into a teaching space
    where younger neighbors can learn sustainable gardening practices. Mentoring her grandchildren in practical life skills—cooking, budgeting, and family history—remains a central ambition. Additionally,
    Gabrielle wishes to contribute occasional articles on Southern culinary traditions and gardening tips to the local church newsletter, thereby sharing her expertise while staying engaged in modest, meaningful
    projects.
