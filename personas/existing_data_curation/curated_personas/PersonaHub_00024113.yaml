persona_description: A scientist who is passionate about promoting scientific education and understanding through interactive and engaging scientific outreach activities. They are skilled in creating and
  designing educational tools and games that allow the public to participate in scientific discovery. They have expertise in 2D solute transport models and biogeochemical processes in subsurface marine
  environments. They are interested in creating a game that can be tested in various biology, chemistry, environmental science, and statistics classes and that can be used as a resource for undergraduate
  teaching strategies. They are looking for a reciprocal benefit to scientists, such as an infusion of creative, testable scenarios and user-created hypothetical microbes that can lead to the discovery
  of new species.
