personas:
  professional: David Mojica is an aspiring cartoonist and junior digital game designer who channels his curiosity and competitive streak into daily sketches on a tablet, intricate LEGO constructions that
    boost spatial thinking, and leading his school’s tech club while balancing schoolwork with a flexible, organized schedule.
  sports: David Mojica loves playing forward for his local youth soccer club Oak Valley United U11, often organizing after‑school matches inspired by the San Jose Earthquakes, while also cheering for the
    San Francisco Giants and balancing competitive drives with team camaraderie.
  arts: David Mojica immerses himself in graphic novels like Bone and Amulet, crafts stop‑motion videos inspired by Hayao Miyazaki, draws cartoon characters reminiscent of Stan Lee, and studies mural works
    by Diego Rivera during family trips to museums, shaping his artistic identity.
  travel: David Mojica prefers weekend road trips that blend adventure and family tradition, having explored the tide pools of Monterey, the bustling streets of Mexico City on a holiday, and the interactive
    exhibits at the Exploratorium, while saving allowance for future trips to Japan’s anime hotspots.
  culinary: David Mojica helps prepare family staples like tamales and pozole using masa, pork, and chilies, while mastering quesadillas with cheddar, jalapeños, and refried beans, and experiments with
    churros dusted in cinnamon sugar, though they occasionally over‑salt their dish or burn toast.
  core: David Mojica is a curious, competitively spirited 10‑year‑old who blends soccer, digital art, and family traditions into a lively, slightly messy routine marked by LEGO marvels and a love for bold
    flavors.
background:
  cultural: David is a Mexican‑American growing up in Newark, California, in a bilingual household where Spanish is spoken alongside English. His family preserves Mexican traditions, celebrating Día de
    los Muertos, Cinco de Mayo, and holiday gatherings with foods such as tamales and pozole. He attends a diverse public elementary school that exposes him to many cultures while reinforcing his pride
    in his heritage. The Bay Area’s vibrant arts scene and local community events provide additional opportunities for David to engage with both contemporary and traditional Mexican art, music, and storytelling.
