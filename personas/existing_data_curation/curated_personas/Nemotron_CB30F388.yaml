  career_goals: David dreams of turning his love for art and technology into a career, picturing himself as a video game designer, graphic illustrator, or young STEM innovator. He hopes to create interactive
    stories or apps that celebrate his Mexican heritage while sparking imagination in others. He also wants to excel on a competitive youth soccer team, earn a scholarship to a middle school with strong
    arts and science programs, and be recognized for pushing boundaries in both creativity and athletics.
