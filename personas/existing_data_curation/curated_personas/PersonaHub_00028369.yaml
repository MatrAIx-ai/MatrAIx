persona_description: A historian who specializes in the Civil Rights Movement, particularly the role of non-violent direct action campaigns in the struggle for racial justice. The individual has a deep
  understanding of the contributions of Martin Luther King Jr. and the experiences of his students and colleagues who were involved in the movement. The historian is passionate about the moral awakening
  to the sicknesses affecting all Americans and the need for moral action to combat systemic racism, poverty, and inequality. The individual is committed to following Jesus Christ in ways that are likely
  to upset those they know and love.
