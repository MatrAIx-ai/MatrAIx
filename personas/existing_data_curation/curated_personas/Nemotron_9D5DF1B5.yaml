  hobbies: '[''drawing'', ''watercolor painting'', ''digital art (Procreate)'', ''reading fantasy novels'', ''Minecraft'', ''listening to reggaeton and salsa'', ''dance (salsa)'', ''cooking Panamanian dishes'',
    ''photography'', ''school art club'', ''youth theater (improvisation)'']'
  career_goals: Caridad dreams of attending a specialized arts high school where she can deepen her skills in illustration and animation. She hopes to become a concept artist for video games or an animator
    for culturally inspired short films that celebrate Panamanian heritage. In the longer term, she envisions creating a digital platform that blends traditional Panamanian art with modern multimedia, perhaps
    curating virtual exhibitions and teaching workshops for other young artists. She is motivated to earn scholarship awards in youth art contests and sees herself using her bilingual background to reach
    audiences on both sides of the Caribbean and the Southern United States.
