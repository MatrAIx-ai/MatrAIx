personas:
  professional: Caridad Sanchez is an aspiring junior illustrator who mixes watercolor and digital techniques to design fantasy landscapes for school projects and local theater posters, and they channel
    a curious, competitive spirit while often battling disorganization, missed deadlines, and a mild skepticism of peer feedback.
  sports: Caridad Sanchez backs Manchester United and the Los Angeles Lakers, plays forward for the Lakeview Youth Soccer Club, and boosts cardio with a weekly hip‑hop dance class, though they occasionally
    skip practice when a new sketching challenge demands all their focus, reflecting their competitive drive over cooperative play.
  arts: Caridad Sanchez pours heart into watercolor and digital art, drawing inspiration from Hayao Miyazaki's animated realms and Frida Kahlo's bold colors, and they dance to Bad Bunny's reggaeton, sing
    along with Ariana Grande's pop hits, and revel in improv performances with the community youth theater, using each medium to channel a spontaneous, competitive energy while occasionally doubting the
    sincerity of audience applause.
  travel: Caridad Sanchez loves weekend road trips to the nearby coastal town of Playa Verde, where sea‑foam hues fill their sketchbook, recalls a school‑organized field trip to Orlando’s theme parks that
    sparked a fascination with immersive worlds, and dreams of a future adventure to Tokyo’s Akihabara district, all while balancing a modest family budget, school responsibilities, and a wary eye toward
    overly glossy travel ads, and they plan each trip with a hand‑drawn itinerary.
  culinary: Caridad Sanchez whips up aromatic sancocho with chicken, yucca, and corn, rolls buttery beef‑filled empanadas sprinkled with pepper flakes, and experiments with mango‑lime salsa and dark chocolate
    brownies spiked with a pinch of cinnamon, proudly documenting both triumphs and kitchen mishaps on a growing vlog, and they often laugh at their own culinary missteps.
  core: Caridad Sanchez is a color‑obsessed twelve‑year‑old who blends fantasy art with pop beats, races against deadlines with a competitive spark, and they often lose track of chores while chasing the
    next vivid sketch.
background:
  cultural: Caridad is a first‑generation Panamanian‑American. Her parents immigrated from Panama and raised her in a bilingual home, so she speaks Spanish at home and English at school. She celebrates
    Panamanian holidays such as Independence Day on November 3rd and enjoys annual family gatherings for the Pollera Festival, where traditional dances and music are featured. Her family keeps Panamanian
    culinary traditions alive, preparing foods like sancocho, tamales, and plum pudding. Living in Summerville, South Carolina, Caridad also embraces Southern customs—king cake at Mardi Gras, community
    barbecues, and school events—creating a hybrid cultural identity that blends Caribbean rhythms with Southern hospitality.
