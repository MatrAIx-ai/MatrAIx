personas:
  professional: Fen Kim is an organized community event coordinator and aspiring virtual cooking instructor who leverages meticulous time‑blocking, bilingual translation, and home‑automation expertise to
    orchestrate church gatherings, neighborhood potlucks, and soon‑to‑launch online kimchi‑making workshops, though they often over‑schedule themselves and feel unsettled when a plan slips.
  sports: Fen Kim enjoys low‑impact fitness, doing sunrise yoga at the nearby park, walking their dog on 5‑kilometer loops through local trails, cheering the Los Angeles Dodgers and the Lakers on game nights,
    and occasionally joining a community softball league for casual competition.
  arts: Fen Kim delights in cultural performance arts, regularly attending West Covina Playhouse productions, listening to Yo‑Yo Ma’s cello suites, savoring the dynamic rhythms of a traditional percussion
    ensemble, and curating a vinyl collection that spans Beethoven symphonies to indie folk duo The Lumineers, all of which inform their DIY home‑decor aesthetic.
  travel: Fen Kim prefers thoughtfully planned trips, having explored the historic tea gardens of Kyoto, the bustling night markets of Taipei, and weekend road‑trips to the vineyards of Santa Barbara, while
    dreaming of a culinary pilgrimage to the fermentation‑rich regions of northern Italy and attending a spring cultural festival in Seoul.
  culinary: Fen Kim excels at crafting fermented cabbage dishes, meticulously layering spices and salt to perfect the balance of tang and crunch, shapes sweet rice cake desserts with glutinous rice flour
    and honey, transforms garden‑grown radishes and carrots into fresh pickles, and occasionally over‑saltes a batch of kimchi, prompting them to start a habit of measuring salt by weight.
  core: Fen Kim is a disciplined community organizer and budding virtual chef who balances a love for fermented foods, garden‑grown produce, and meticulous planning with a lingering anxiety that fuels both
    productivity and occasional over‑commitment.
background:
  cultural: Fen is a second‑generation Korean American who grew up in the vibrant Korean community of Los Angeles County. Her family maintains strong ties to Korean traditions, language, and values of hard
    work and respect, while also embracing the multicultural environment of Southern California. She regularly participates in Korean church activities, celebrates holidays such as Chuseok and Seollal,
    and balances these cultural practices with her American upbringing, giving her a bicultural perspective that informs both her personal life and community involvement.
attributes:
  skills: '[''Household budgeting'', ''Time‑blocking and schedule coordination'', ''Event planning and community coordination'', ''Korean‑English translation'', ''Basic computer troubleshooting'', ''Digital
    photo and document organization'', ''Home‑automation setup'', ''Korean culinary expertise (baking and fermentation)'', ''Youth tutoring and mentorship'']'
  hobbies: '[''Preparing traditional Korean dishes'', ''Urban gardening'', ''Yoga and mindfulness meditation'', ''Journaling and self‑reflection'', ''Reading self‑help books'', ''Attending Korean cultural
    festivals'', ''Walking in local parks'', ''DIY home décor projects'']'
  career_goals: Fen aims to turn her passion for Korean cooking into a sustainable home‑based business by offering virtual cooking classes and selling handcrafted Korean desserts online. She also plans
    to obtain a Professional Home Organizer certification, allowing her to provide structured decluttering services to families in West Covina. Long‑term, she hopes to become a trusted community resource,
    bridging cultural gaps through language assistance and volunteer coordination, while maintaining a flexible schedule that accommodates her family responsibilities.
