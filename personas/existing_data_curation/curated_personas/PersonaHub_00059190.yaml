persona_description: A Navy Geospatial Specialist who is responsible for the planning, maintenance, operation, and protection of Navy shore installations through the use of Geographic Information Systems
  (GIS). They are skilled in using modern geospatial data collection techniques, such as GPS, high-resolution satellite imagery, and LIDAR, to develop and maintain electronic maps. They also work closely
  with Emergency Responders to help protect Navy facilities and personnel through the use of Computer Aided Dispatch systems.
