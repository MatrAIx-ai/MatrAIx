  hobbies: '[''Fishing at Lake Sinclair'', ''Woodworking and furniture making'', ''Gardening'', ''Church community service'', ''Organizing family barbecues'', ''Listening to classic R&B and collecting vinyl
    records'', ''Pickup basketball games'']'
  career_goals: Clyde aims to earn an associate degree in industrial technology and acquire certifications such as the Certified Valve Technician (CVT) and IEC 61508 functional safety certification. In
    the next five years, he hopes to move into a senior technician role, eventually becoming a maintenance supervisor or a small business owner offering specialized valve services to regional manufacturing
    plants. He also wants to mentor apprentices and contribute to the local trade school program.
