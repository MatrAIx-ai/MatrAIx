persona_description: A figure of national studies who specializes in early childhood education and development, particularly the importance of good quality provision for young children and their families.
  She is a proponent of the Every Child Matters Change for Children 2004 and the Certain Start enterprise, and is committed to ensuring that all children have access to high-quality early education and
  childcare services. She is also knowledgeable about the issues surrounding child protection and the importance of staff communication and cooperation between different systems in the welfare and education
  sectors.
