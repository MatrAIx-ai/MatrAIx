personas:
  professional: Ethan Wu, a veteran event manager with over two decades of experience, blends meticulous budget stewardship and vendor negotiation with a curious eye for sustainable hybrid formats, using
    their practical detail‑orientation and outgoing energy to craft inclusive conventions that balance logistics and creative flair.
  sports: Ethan Wu, an avid outdoor enthusiast, spends weekends tackling Ozark Trail hikes with the local Trail Running Club, follows the St. Louis Cardinals in baseball and the Kansas City Chiefs in football,
    and blends their sociable energy into weekly Saturday morning spin classes at the community gym, treating fitness as a social ritual rather than a solitary chore.
  arts: Ethan Wu, a regular at regional music festivals, revels in folk‑rock performances by The Avett Brothers and blues sets by local legend Jim Glover, participates in community theater productions of
    Arthur Miller’s ‘The Crucible,’ and hones improv skills at the Springfield Improv Society, all of which shape their identity as a culturally curious event creator.
  travel: Ethan Wu, who plans trips with a detailed spreadsheet to balance cost and inspiration, has explored the Austin SXSW festival and the New Orleans Mardi Gras for event ideas, enjoys weekend getaways
    to the Ozark National Forest, and dreams of attending the Kyoto Gion Matsuri in Japan to study sustainable festival logistics, often booking flights months ahead to secure early‑bird rates.
  culinary: Ethan Wu, an enthusiastic home chef, frequently hosts dinner parties featuring Missouri trout almondine, smoked pork shoulder burnt ends, and a side of sauerkraut infused with caraway seeds,
    while they skillfully season with fresh rosemary, thyme, and a dash of smoked paprika, reflecting a love for hearty Midwestern flavors blended with old‑world comfort food traditions.
  core: Ethan Wu, a 46‑year‑old event veteran who balances a meticulous planner’s spreadsheet mindset with a spontaneous love for vintage postcard hunting, is known for the habit of rehearsing speech openings
    in the shower and for occasionally over‑booking themselves at community improv nights.
background:
  cultural: Ethan grew up in a small Midwestern town near Jefferson City, steeped in the values of community involvement, practicality, and quiet perseverance that characterize much of Missouri’s white,
    European‑ancestry population. His family’s heritage includes German and Irish roots, which have shaped his appreciation for folk traditions, regional cuisine, and local festivities such as the Missouri
    State Fair. A liberal arts education broadened his perspective, fostering an interest in cultural diversity that now informs his work in crafting inclusive events. His divorce has given him a reflective
    outlook on personal relationships, further emphasizing his balanced, compassionate yet self‑interested approach to both his personal and professional life.
attributes:
  skills: '["Event logistics coordination", "Budget planning and financial oversight", "Vendor sourcing and negotiation", "Program design and content curation", "Team leadership and staff management", "Crisis
