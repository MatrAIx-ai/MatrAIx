    programming", "Contract negotiation and legal compliance", "Data analysis of attendee feedback"]'
  hobbies: '["Hiking in the Ozark foothills", "Cooking and hosting dinner parties", "Attending live music concerts and festivals", "Participating in community theater and improv", "Volunteering for charitable
    fundraisers", "Toastmasters public speaking club", "Collecting vintage postcards", "Traveling to cultural and arts festivals", "Gardening", "Playing board games with friends"]'
  career_goals: Ethan aims to move into a senior leadership role within a national professional association or to launch his own boutique event consultancy that specializes in sustainable, hybrid experiences.
    He seeks recognition as an authority on event sustainability and technology integration, and he hopes to mentor emerging planners through workshops and scholarships. Over the next five years, he plans
    to spearhead statewide conventions that showcase Missouri’s cultural assets while expanding his portfolio to include international trade shows that combine practical logistics with creative programming.
