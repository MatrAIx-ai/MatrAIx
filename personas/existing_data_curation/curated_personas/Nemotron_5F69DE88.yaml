personas:
  professional: Brad Eastburn, a three‑year‑old preschooler, demonstrates early engineering instincts by meticulously building tower structures from interlocking blocks, organizing each set by color and
    size, and eagerly helping classmates solve simple puzzles, which reflects a budding talent for systematic problem‑solving and compassionate teamwork in which they thrive.
  sports: Brad Eastburn, a three‑year‑old, participates in toddler soccer sessions at the neighborhood community center, enjoys watching the Metro City Hawks basketball team on Saturday mornings, practices
    basic gymnastics moves at a local kids’ gym where they admire the team's star gymnast, and proudly wears a miniature team jersey to school, blending organized play with budding sports fandom.
  arts: Brad Eastburn, a three‑year‑old, delights in singing along to The Wiggles and Sesame Street melodies, paints vibrant pictures of Peppa Pig and Disney’s Frozen characters during art time, and loves
    dancing to the rhythmic beats of Ryan’s World videos, weaving a colorful tapestry of early artistic exploration in which they immerse themselves.
  travel: Brad Eastburn, a three‑year‑old, has splashed in the warm sands of Clearwater Beach, marveled at geysers in Yellowstone National Park with a family‑friendly guidebook, and dreams of a future visit
    to Disneyland in California, favoring trips that mix hands‑on activities like building sandcastles with the comfort of familiar bedtime stories on the road, where they eagerly explore new surroundings.
  culinary: Brad Eastburn, a three‑year‑old, prefers chewy macaroni and cheese with sharp cheddar, loves dipping crisp apple slices into smooth peanut butter, can confidently stir batter for banana pancakes
    using a wooden spoon under adult supervision, yet remains reluctant to try broccoli or green beans at the dinner table, even though they occasionally sample a bite when encouraged.
  core: Brad Eastburn, a three‑year‑old whose curiosity is paired with a surprisingly disciplined routine, meticulously organizes toys by size, saves coins with methodical precision, helps peers during
    playtime, and occasionally throws a brief tantrum when a beloved puzzle piece disappears, though they quickly regain composure.
background:
  cultural: Brad comes from a white American family residing in Calabasas, California, an affluent suburban enclave within Los Angeles County. His upbringing blends classic suburban middle‑class values—emphasis
    on education, community involvement, and organized family routines—with exposure to the broader cultural diversity of the Los Angeles region. Family life encourages a balance of structured activities,
    outdoor recreation, and free play, fostering both practicality and curiosity.
