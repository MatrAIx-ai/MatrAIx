persona_description: A scientist who specializes in the study of microbial communities and their interactions with the environment, with a particular interest in methane production and its impact on global
  carbon storage. She is conducting research on the complex interrelationships between methanogens and other bacteria, and the role of methanogenesis in the global cycles. She is aware of the potential
  dangers of attempting to manipulate these microorganisms and the importance of respecting their subjects. She is also aware of the recent discoveries about the activities of methanogens in coal mines,
  landfills, and other sources of organic matter, and the potential dangers of their release into the atmosphere. She is concerned about the rising death toll from methane-related accidents, and the potential
  consequences of global warming. She is interested in the communication of these microorganisms to humans, and the need to learn their language and listen to their warnings.
