persona_description: A medical professional who specializes in the diagnosis and treatment of hand and wrist disorders, with a particular focus on the hand specialist who is knowledgeable in the use of
  X-rays, scans, blood tests, and EMGs to make a diagnosis and recommend appropriate treatment options. They have experience with non-operative treatments such as activity modification, painkillers, and
  splints, as well as understanding the importance of non-invasive treatment options and the potential for long-term benefits. They are also familiar with the use of long-acting steroids for injection into
  the joint at the bottom of the thumb, which can provide some significant benefit for patients with certain conditions.
