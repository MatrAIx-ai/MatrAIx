personas:
  professional: Lazaro Argueta, an 18‑year‑old aspiring graphic designer, blends meticulous organization with spontaneous creativity as they juggle freelance digital illustration projects, coordinate modest
    community art events, and prepare to enroll in a community‑college design program, all while leveraging bilingual communication to translate visual concepts across English and Spanish audiences.
  sports: Lazaro Argueta enjoys casual weekend pick‑up basketball at a local park, follows Orlando City SC for soccer thrills, and uses occasional jogs along Lake Tohopekaliga as a meditative way to recharge
    between art projects, preferring low‑key physical activity over organized team sports.
  arts: Lazaro Argueta immerses themselves in creative expression by sketching daily, crafting digital illustrations influenced by artists like Frida Kahlo and Banksy, capturing street moments with a Nikon
    camera for Instagram, playing acoustic guitar to the rhythms of Los Gaiteros de San Jacinto, and attending local gallery openings featuring emerging talent whose work echoes his cultural roots.
  travel: Lazaro Argueta dreams of backpacking through Medellín’s murals and Cartagena’s historic streets while also enjoying short road trips to Miami Beach and New York’s Museum of Modern Art, planning
    trips with a blend of meticulous itinerary spreadsheets and spontaneous photo‑journalistic detours, all within a student‑budget framework.
  culinary: Lazaro Argueta cooks intermediate‑level traditional dishes like arepas, sancocho, and empanadas for family gatherings, experimenting with fresh cilantro, plantains, and a hint of cumin while
    listening to Colombian cumbia, and occasionally fuses these flavors with Mexican tacos for a creative culinary twist.
  core: Lazaro Argueta is a quietly driven visual storyteller who balances disciplined organization with spontaneous artistic exploration, often found sketching between freelance gigs and late‑night guitar
    sessions, yet habitually forgets to back up their digital work.
background:
  cultural: Lazaro was raised in a Colombian immigrant household in Kissimmee, Florida. His parents emigrated from the Antioquia region, bringing with them traditions such as family meals centered around
    bandeja paisa, celebrations of Carnaval de Barranquilla, and the use of Spanish as the primary language at home. He grew up bilingual, attending a local public high school while maintaining strong ties
    to Colombian cultural practices, including coffee rituals, salsa dancing at community events, and observing Colombian holidays like Día de la Independencia. This bicultural environment has fostered
    a deep appreciation for both his heritage and the diverse multicultural landscape of Central Florida, influencing his artistic sensibilities and professional aspirations.
attributes:
  skills: '[''Spanish‑English bilingual communication'', ''Digital illustration (Adobe Photoshop, Illustrator)'', ''Photography composition and editing (Lightroom)'', ''Basic web design (HTML, CSS)'', ''Research
    and information synthesis'', ''Small‑scale event planning and coordination'', ''Assertive collaborative teamwork'', ''Self‑directed learning and problem solving'']'
  hobbies: '[''Sketching and digital illustration'', ''Street photography'', ''Listening to eclectic world music'', ''Reading contemporary graphic novels'', ''Exploring local art galleries'', ''Cooking
    Colombian dishes'', ''Playing acoustic guitar'', ''Journaling ideas and sketches'']'
  career_goals: Lazaro plans to enroll in a community college program in graphic design, later transferring to a four‑year university to earn a bachelor's degree in visual communication. He aims to blend
    his Colombian cultural heritage with contemporary digital media, eventually working as a visual storyteller for museums or cultural institutions that highlight Latin American art. In the long term,
    he hopes to establish his own boutique studio that produces community‑focused murals, branding, and multimedia projects, and to travel back to Colombia to collaborate with local artists and document
    regional artistic practices.
