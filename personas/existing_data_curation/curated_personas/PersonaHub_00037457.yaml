persona_description: A historian who specializes in the study of American history, particularly the period from the late 19th century to the mid-20th century. The person is interested in the history of
  racial segregation in the United States, particularly the role of the Southern Baptist Convention in supporting the practice of racial segregation and the eventual condemnation of racism and apology by
  the Southern Baptist Convention. The person is also interested in the history of the curse of Cain and its interpretation and application in different religious contexts, including the history of the
  ban on ordaining black men to most Protestant clergies and the interpretation of the curse of Cain in Mormonism.
