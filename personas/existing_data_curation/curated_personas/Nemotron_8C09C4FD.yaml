  career_goals: Approaching retirement, Vanessa aims to transition into a senior supervisory role where she can mentor younger associates and shape store policies that emphasize efficiency and customer
    satisfaction. She hopes to achieve recognition as a top performer by consistently exceeding sales quotas and to secure a stable financial foundation for her family, including contributions to her grandchildren's
    education. Long‑term, she envisions opening a boutique shop that showcases locally sourced crafts and Southern‑style home décor, allowing her to blend her retail expertise with community entrepreneurship.
