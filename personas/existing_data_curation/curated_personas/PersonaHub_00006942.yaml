persona_description: A neuroscientist and geneticist who specializes in the study of autism and gastrointestinal disorders, particularly the relationship between genetic risk for autism and co-occurring
  GI dysfunction. The researcher has conducted a study that brings together genetic risk for autism and co-occurring GI disorders in a way that provides a biologically plausible explanation for why they
  are seen together so often. The study aims to understand the complex genetic risks for autism and identify different subgroups of individuals who have autism spectrum disorder. The researcher is likely
  to be interested in understanding the underlying mechanisms of autism and gastrointestinal disorders and developing personalized treatments for individuals with co-occurring GI dysfunction and autism.
