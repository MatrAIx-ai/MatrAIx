  career_goals: Although retired, Kimberly remains driven to leave a lasting legacy. She plans to finish a memoir that weaves together her family’s immigrant roots, local history, and personal reflections,
    and she hopes to publish a community‑wide recipe book featuring dishes from generations of Ohio families. She also seeks to mentor younger volunteers at the senior center, support local art exhibitions,
    and continue her lifelong learning through workshops on art history and creative writing.
