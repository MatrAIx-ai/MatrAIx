personas:
  professional: Elliot Sales is an aspiring young engineer who spends weekends constructing intricate LEGO mechanisms and drawing detailed schematics, applying a critical and competitive edge to each project
    while responsibly juggling school assignments and community chores such as Sunday school preparations.
  sports: Elliot Sales is a devoted fan of the Ellis County High School Cougars football team, cheering from the bleachers at Friday night games and mimicking quarterback celebrations, while also playing
    forward for the Ellis County Youth Soccer Club, keeping a schedule of weekend bike rides that double as informal cardio, and following the Houston Astros and Dallas Cowboys on TV, often debating game
    statistics with his older sibling.
  arts: Elliot Sales channels his curiosity into daily sketchbooks, filling pages with detailed LEGO designs and imaginative alien landscapes inspired by his favorite sci‑fi novels, and his visits to the
    county art museum spark a fascination with Van Gogh’s swirls and the vibrant murals of local Hispanic artists; his playlists blend George Strait’s country ballads with Kidz Bop versions of classic rock,
    shaping his eclectic artistic identity.
  travel: Elliot Sales approaches travel as a series of family road‑trip adventures, relishing long drives to Hill Country’s McKinney Falls State Park for treasure‑hunt hikes with his magnifying glass,
    weekend outings to the San Antonio River Walk for tacos and river‑side ice cream, and scheduled visits to Space Center Houston where he watches astronaut documentaries, while dreaming of a future family
    vacation to the Grand Canyon’s rim to sketch sunrise vistas.
  culinary: Elliot Sales delights in the smoky aroma of Texas‑style brisket and the zest of chicken fajitas seasoned with cumin and cilantro, often pairing these with baked beans, while his snack repertoire
    includes chocolate‑chip cookies and gummy bears; at home he proudly assists his mother in assembling nachos topped with jalapeños, shredded cheddar, and a dollop of sour cream, though he occasionally
    over‑salts his creations in his quest for bold flavor.
  core: Elliot Sales is a curious, solo‑play enthusiast who balances meticulous LEGO engineering with a competitive spark, a piggy‑bank savings habit, mild allergies, Friday‑night football fandom, eclectic
    arts taste, family road‑trip wanderlust, and a budding love for smoky BBQ and tacos.
background:
  cultural: Elliot grew up in Italy, Texas, a small town in Ellis County where community life revolves around school events, county fairs, and local church gatherings. His family is Anglo‑American with
    deep roots in the region, upholding values of self‑reliance, modesty, and respect for tradition. The cultural environment blends classic Texas customs—such as high‑school football games, country music,
    and barbecue—with exposure to the diverse Texan mosaic, including Hispanic culinary influences and the close‑knit nature of rural community life. This setting nurtures Elliot’s curiosity while reinforcing
    a sense of independence and personal responsibility.
