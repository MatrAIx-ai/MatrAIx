  career_goals: Although still young, Elliot dreams of a future where he can blend his love for art and science. He aspires to become an inventor or engineer who designs innovative gadgets, a video-game
    creator who brings his own characters to life, an astronaut exploring space, or a wildlife illustrator capturing nature on paper. His primary ambition is to create things that surprise and inspire others.
