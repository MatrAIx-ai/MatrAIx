  career_goals: Annia aims to translate her humanities background into a career that combines cultural advocacy with community engagement. In the short term, she seeks an entry-level position at a local
    museum or cultural nonprofit in Madison, where she can assist with curatorial projects, educational outreach, and exhibit planning. She hopes to develop expertise in collection management and public
    programming, eventually moving into a curatorial or program director role. Long‑term, she is considering a master's degree in museum studies or public humanities to deepen her scholarly foundation and
    increase her impact. She values a workplace that offers clear structures and expectations but also grants flexibility for creative initiatives, enabling her to balance personal growth with community
    service.
