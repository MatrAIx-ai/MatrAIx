personas:
  professional: A diligent museum aspirant, Annia West leverages her strong written communication, research expertise, and practical project management skills to support curatorial projects and educational
    outreach at a Madison cultural nonprofit, thriving on the clear structure of museum workflows while flexibly adapting to creative initiatives.
  sports: An occasional fitness enthusiast, Annia West practices beginner‑level yoga at Madison Yoga Studio twice a week, joins the university’s intramural frisbee team during fall, and roots for the Wisconsin
    Badgers men’s basketball and women's volleyball teams, blending low‑intensity exercise with supportive sports fandom.
  arts: A devoted arts aficionado, Annia West frequents the Madison Museum of Contemporary Art’s rotating exhibitions, attends poetry readings at the Overture Center for the Arts, enjoys indie film screenings
    at State Street Cinema, and draws inspiration from watercolorists like Winslow Homer and contemporary musician Sufjan Stevens.
  travel: A budget‑savvy explorer, Annia West takes weekend train trips to Chicago’s Art Institute, plans a solo cultural retreat to Asheville’s River Arts District, and dreams of a future study tour of
    European museums in Paris and London, preferring mixed‑city itineraries that combine art immersion with affordable hostel stays.
  culinary: An experimental home cook, Annia West enjoys crafting avocado toast with heirloom tomatoes, whipping up hand‑made gnocchi topped with locally sourced cheese curds, and savoring spicy fish tacos
    while pairing meals with single‑origin Ethiopian coffee, yet often forgets to grocery‑shop, relying on pantry staples and last‑minute campus cafeteria meals.
  core: An organized yet laid‑back cultural advocate, Annia West juggles meticulous museum research with spontaneous watercolor sessions, hoards vintage postcards, procrastinates on admin tasks, and thrives
    on balancing structured career goals with creative freedom.
background:
  cultural: Annia was raised in a middle‑class, white Midwestern family in the Madison area, where community involvement and education were emphasized. Her family values include a strong work ethic, respect
    for tradition, and appreciation for the region’s natural environment, reflected in frequent weekend trips to the nearby lakes and state parks. Influenced by the liberal‑leaning cultural climate of Madison,
    she grew up attending local theater productions, museum events, and community festivals, fostering a deep appreciation for the arts and public dialogue. While her cultural heritage aligns with broader
    American middle‑class norms, she also embraces the progressive, inclusive atmosphere of the city, participating in diverse cultural activities and community service.
