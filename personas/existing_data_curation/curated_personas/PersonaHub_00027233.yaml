persona_description: A member of the Rockefeller Foundation's social science staff who conducted research into behavioral and attitude changes of groups, held key positions on major national boards, and
  was heavily involved in the Anglo-American establishment. He was involved in refining and perfecting the art of indoctrination through his studies, and his findings were later used to promote fear and
  control through the use of media and propaganda. His research on communication and attitude change was important for the American educational system and the promotion of good citizenship, and he was awarded
  a substantial grant by the Rockefeller Foundation in 1954 to support his research.
