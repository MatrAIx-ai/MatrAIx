  hobbies: '["Basketball", "Sketching and digital illustration", "Scratch coding", "Baking cupcakes", "Nature walks and birdwatching", "Reading mystery novels", "Listening to R&B/gospel music", "Participating
    in church choir", "Community clean‑up volunteering"]'
  career_goals: Sharon dreams of turning her love of animals and her scientific curiosity into a career as a veterinarian, ideally one who works with both farm animals and wildlife in rural Alabama. She
    sees this path as both practical—offering a stable income—and fulfilling, allowing her to apply the hands‑on skills she's been developing. In the short term, she hopes to win her middle school's science
    fair with a project on local water quality, earn a spot on the varsity basketball team, and secure a scholarship that can support her education. Her competitive nature fuels a desire to be at the top
    of her class, while her pragmatic side keeps her focused on concrete steps like maintaining good grades, staying involved in community service, and building a solid portfolio of science projects. She
    also envisions mentoring younger kids in her neighborhood, sharing both her curiosity and practical know‑how.
