personas:
  professional: Sharon Williams is a budding game developer who creates small Scratch games, blending their curious eye for puzzles with a practical knack for turning ideas into playable logic, while their
    relaxed approach to deadlines often leads to spontaneous, iterative updates.
  sports: Sharon Williams drills at the community center’s youth basketball league, the Eastside Hoops Club, where they embrace fast‑paced competition, while cheering on the hometown NBA team, the Golden
    State Warriors, during the season and occasionally joining weekend soccer pick‑ups with the junior Falcons.
  arts: Sharon Williams fills sketchbooks with woodland scenes inspired by the atmospheric illustrations of Hayao Miyazaki and the bold line work of modern comic artist Jim Lee, while their digital art
    on the tablet echoes the vivid colors of Billie Eilish’s music videos, and they practice vocal harmonies in church choir singing classics by Whitney Houston and contemporary hits by Beyoncé.
  travel: Sharon Williams enjoys spontaneous weekend road trips to nearby state parks such as Shenandoah, where they combine birdwatching with family camping, while dreaming of a future summer adventure
    to the historic streets of London and a science‑focused visit to the Smithsonian in Washington DC, balancing their love of exploration with a relaxed, last‑minute planning style.
  culinary: Sharon Williams is an enthusiastic junior baker who perfects classic vanilla cupcakes topped with buttercream frosting while daringly experimenting with matcha‑green tea and salted caramel swirl
    fillings, often using fresh local strawberries and a dash of cinnamon from the pantry, yet they sometimes over‑mix batter in their rush to impress friends.
  core: Sharon Williams is a curious, competitively driven 12‑year‑old who balances a love for puzzles, basketball, and baking with a habit of over‑committing to projects while often forgetting to clean
    up their sketchbooks, giving them a charmingly chaotic vibe.
background:
  cultural: Sharon comes from a close‑knit African‑American family that has lived in Ashford, Alabama for several generations. Her grandparents were active in the civil‑rights movement and passed down stories
    of resilience and community solidarity. The family is deeply rooted in the local Baptist church, where they gather for worship, choir rehearsals, and community events. Soul food and Southern cooking
    are central to family gatherings, with dishes like collard greens, fried chicken, and cornbread reflecting both cultural heritage and regional flavors. Sharon celebrates Juneteenth and Black History
    Month with school projects and family storytelling, which reinforce her awareness of her cultural identity. The blended influence of Southern hospitality, church community, and a strong emphasis on
    education shapes her outlook, encouraging both curiosity about the wider world and a practical approach to achieving her personal goals.
attributes:
  skills: '["Reading comprehension", "Basic scientific experimentation", "Scratch programming", "Sketching and illustration", "Basketball (point guard)", "Baking and cooking", "Community clean‑up organizing",
