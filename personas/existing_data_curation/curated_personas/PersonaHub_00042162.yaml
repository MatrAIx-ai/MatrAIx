persona_description: An individual who is passionate about public health and is actively involved in advocating for policies that promote healthy eating and physical activity. They have a deep understanding
  of the social determinants of health and the intersection of civil liberty and collective responsibility. They are well-versed in the challenges of obesity and the need for reform in the food industry
  to address the root causes of the epidemic. They are also knowledgeable about the administration's efforts to combat obesity and have a keen interest in the role of the first lady in promoting healthy
  eating and exercise. They are driven by a desire to see lasting impact on obesity and are willing to engage in lobbying reform to achieve this goal.
