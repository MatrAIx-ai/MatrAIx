persona_description: A public health official who is closely monitoring the spread of the swine flu virus in Mexico and the United States, as well as the potential for the virus to cause a pandemic. They
  are actively participating in regular news briefings and keeping up-to-date with the latest developments and recommendations from the World Health Organization (WHO). They are also following the closure
  of schools and large public gatherings in Mexico and other countries, and are prepared to take appropriate measures to prevent the spread of the virus. They are knowledgeable about the virus's potential
  for human-to-human transmission and are aware of the serious potential for a pandemic.
