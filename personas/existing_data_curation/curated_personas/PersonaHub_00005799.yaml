persona_description: A public health advocate who specializes in investigating and preventing child abuse and neglect. They have extensive experience in working with low-income families who cannot afford
  treatment for their traumatized children and have a deep understanding of the financial and emotional costs of ignoring the trauma. They are passionate about providing free and accessible treatment to
  all children who are affected by abuse and neglect, and are committed to reducing the likelihood of future abuse and trauma. They have a strong belief in the power of intervention and treatment to help
  children recover from trauma and lead healthy, fulfilling lives.
