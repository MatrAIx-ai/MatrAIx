personas:
  professional: Steven Smith, a 17‑year‑old aspiring UI/UX designer, blends self‑taught Photoshop and GIMP skills with basic Python coding to craft interactive concept sketches, meticulously organizes freelance
    commissions in a digital task‑manager, and balances the quiet focus of solitary sketching with occasional collaborative critique sessions.
  sports: Steven Smith follows the Cleveland Browns, the Columbus Blue Jackets, and the Columbus Crew, prefers solitary low‑impact exercise, joins the Scioto Mile running club for early‑morning jogs, and
    maintains a modest home gym for bodyweight workouts.
  arts: Steven Smith curates ambient playlists featuring Brian Eno, Aphex Twin, and local experimental duo Neon Flux, immerses in visual installations by James Turrell at the Columbus Museum of Art, sketches
    in the style of David Hockney on weekends, and occasionally performs poetry at open‑mic nights in the Ohio Theatre.
  travel: Steven Smith, who favors solo trips planned on a tight budget, has explored Chicago and Nashville on weekend train rides, dreams of wandering Kyoto’s neon streets and New Zealand’s fjords, and
    records his journeys in a travel journal that blends cityscape sketches with reflective prose.
  culinary: Steven Smith, an intermediate home cook, favors quick‑fix meals like ramen topped with a soft‑boiled egg and homemade cheeseburger sliders, experiments with matcha‑flavored desserts and aromatic
    cold‑brew coffee, and occasionally tackles weekend baking projects inspired by graphic‑design patterns.
  core: Steven Smith is a quietly curious 17‑year‑old who channels solitary artistic exploration into digital design while juggling modest finances, occasional health quirks, and a penchant for ambient
    soundtracks and solo travel.
background:
  cultural: Steven grew up in Columbus, Ohio, within a predominantly white, middle‑class neighborhood typical of the Midwest. His upbringing was shaped by the region’s emphasis on self‑reliance, modesty,
    and community involvement, such as frequent visits to the local public library and participation in neighborhood clean‑up events. Exposure to the Columbus Museum of Art, the Ohio Theatre, and the city’s
    vibrant indie music scene sparked his early interest in visual and auditory arts. While his family’s religious practices are loosely affiliated with Protestant traditions, Steven’s personal identity
    leans more toward secular, introspective values common among contemporary American youth. He also identifies with digital subcultures found online, which influence his taste in music, art, and humor.
attributes:
  skills: '["Digital illustration", "Photo editing", "Basic Python programming", "HTML/CSS", "Creative writing (poetry, flash fiction)", "DIY electronics repair", "Project organization with digital tools",
