  hobbies: '["Sketching and drawing", "Digital painting", "Science‑fiction and philosophical reading", "Urban photography", "Puzzle video games", "Experimental music listening", "Nature walks and park strolling",
    "Journaling"]'
  career_goals: Steven intends to convert his artistic and technical talents into a sustainable career path that allows for independence and creative freedom. In the next two years he plans to earn his
    GED and enroll in a community‑college program focused on graphic design or interactive media. He aims to build a strong online portfolio of digital art, concept sketches, and short narrative pieces,
    seek freelance commissions, and eventually secure a junior role as a UI/UX designer or concept artist at a small studio. He also dreams of publishing a self‑illustrated graphic novella and, long‑term,
    establishing a personal brand that blends visual art with storytelling.
