personas:
  professional: Cathy Patterson, a 24‑year‑old CNC technician and metal‑fabrication enthusiast, leverages her solid mechanical assembly background, precision welding skills, and vivid imagination to drive
    continuous improvement on the production floor while mentoring peers and sketching innovative design concepts for future art‑focused product lines.
  sports: Cathy Patterson energizes her weekends as a starter on the Wichita Wingers volleyball team, follows the Kansas City Chiefs and the Kansas City Royals with fervor, and balances competition with
    camaraderie by leading a local hiking club that tackles the Flint Hills each spring.
  arts: Cathy Patterson channels her imagination into acrylic cityscapes inspired by Edward Hopper, digital illustrations echoing the bold lines of Studio Ghibli, and metal sculptures that nod to the kinetic
    works of Alexander Calder, while regularly attending Wichita’s ArtLyfe gallery openings and drawing inspiration from the street art of Banksy.
  travel: Cathy Patterson plans trips with a blend of spontaneity and structure, opting for weekend road trips to artistic hubs like Austin’s South Congress and the historic murals of Santa Fe, while saving
    for a future adventure to the industrial marvels of Rotterdam’s port district where she can sketch modern infrastructure.
  culinary: Cathy Patterson, a confident home cook, favors smoky Kansas City burnt ends, experimental miso ramen with homemade noodles, and frequently adds fresh herbs like cilantro and rosemary to her
    dishes, while exploring farmers‑market finds for seasonal vegetable medleys that fuel her active lifestyle.
  core: Cathy Patterson is a competitive, creatively wired 24‑year‑old who balances metal‑shop precision with vibrant art, often juggling late‑night sketch sessions, volleyball drills, and a habit of over‑committing
    to every project that sparks her curiosity.
background:
  cultural: Cathy grew up in Gardner, a small city in Miami County, Kansas, a region characterized by Midwestern values of modesty, hard work, and close‑knit community ties. Her family is of European descent,
    and she was raised in a predominantly white, middle‑class environment with strong ties to local churches and school activities. The agricultural and manufacturing heritage of the area instilled in her
    a practical work ethic, while the nearby Wichita arts scene exposed her to visual arts and maker culture. Gardner’s community events—county fairs, high‑school sports, and volunteer drives—shaped her
    sociable, outgoing demeanor. Though her formal education concluded with high school, she benefitted from community‑college outreach programs that sparked her curiosity about technology and design. This
    blend of traditional Midwestern upbringing and emerging creative interests informs her identity, balancing practical reliability with a yearning for novelty and artistic expression.
attributes:
