  hobbies: '[''Painting'', ''Acrylic sketching'', ''Digital illustration'', ''Metal art projects'', ''Volleyball'', ''Board gaming'', ''Hiking'', ''Live music concerts'', ''Photography'']'
  career_goals: She aims to leverage her practical experience into a supervisory role within the manufacturing sector, such as shift supervisor or production lead, while pursuing technical certifications
    (e.g., CNC programming, AWS welding). Over the next few years, she plans to enroll in an associate degree program in Industrial Technology to broaden her engineering knowledge. Cathy also harbors a
    long-term ambition to merge her artistic side with her fabrication skills by launching a custom metal-art studio that creates functional sculptures and furniture for local clients. Her competitive nature
    fuels a desire to be recognized as a top performer on the production floor and eventually transition into product design or process engineering.
