personas:
  professional: Andrew Rhee, a budding junior architect in the sandbox, builds intricate LEGO castles with meticulous plans that satisfy their love for structure while occasionally abandoning the blueprint
    for spontaneous tower‑building, reflecting a practical yet relaxed approach to work and a competitive streak that drives them to out‑design classmates.
  sports: Andrew Rhee, an enthusiastic member of the local kids' soccer league, idolizes Lionel Messi and follows FC Barcelona, while also cheering for the Chicago Cubs during baseball season and practicing
    drills with the Little Rockets club, combining a competitive drive with a structured practice schedule that still leaves room for spontaneous playground games.
  arts: Andrew Rhee, a budding artist who loves drawing superhero comics with a rainbow of crayons and singing along to The Wiggles, frequently watches Pixar movies like Toy Story and mimics Moana’s dance
    moves, balancing a methodical organization of art supplies with free‑spirited performance and a critical eye for detail.
  travel: Andrew Rhee, a curious traveler who has visited Disneyland in California and the Grand Canyon on family road trips, dreams of seeing cherry blossoms in Kyoto, prefers a printed itinerary for predictability
    yet delights in spontaneous ice‑cream stops, blending a need for structure with a love of flexible adventure.
  culinary: Andrew Rhee, a picky eater who adores macaroni and cheese with extra cheddar, chicken nuggets with honey‑mustard, and fresh apple slices, can whip up banana smoothies using banana, milk, and
    honey but often spills the blender, showing a practical palate tempered by messy enthusiasm and a selective yet occasionally adventurous taste.
  core: Andrew Rhee, a structured yet flexible five‑year‑old who balances meticulous allowance‑saving with impulsive candy cravings, competitive sandbox battles, and occasional worry‑filled tummy aches,
    epitomizes a paradoxical blend of order, curiosity, and sensitivity.
background:
  cultural: Andrew was raised in Newport News, Virginia, in a predominantly white American household. His family observes typical American holidays such as Thanksgiving, Christmas, and the Fourth of July,
    and they occasionally attend community events and church gatherings that reflect the local cultural mix. Growing up near the Chesapeake Bay, he has a subtle fascination with ships, naval history, and
    coastal life, which blends with his broader interest in exploration and structure.
