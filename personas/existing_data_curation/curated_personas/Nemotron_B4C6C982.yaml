  career_goals: Matthew aspires to transition from a front‑line representative to a supervisory role within the next three years. He plans to earn his GED and complete a Customer Service Management certification
    to strengthen his credentials. Ultimately, he aims to become a Customer Service Team Lead, then a regional Operations Manager, where he can design structured training programs that balance clear procedures
    with the flexibility needed for real‑time problem solving. He also hopes to reduce his work‑related anxiety by cultivating better stress‑management techniques and securing a role that offers a more
    predictable schedule, allowing him to spend quality time with his family and pursue his community interests.
