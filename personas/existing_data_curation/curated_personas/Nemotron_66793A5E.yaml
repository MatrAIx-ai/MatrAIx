  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Group fitness classes (Zumba)'', ''Hiking in the foothills'', ''Volunteering at the food bank'', ''Live music events'', ''Reading
    contemporary fiction'', ''Photography'', ''Community theater workshops'']'
  career_goals: Shirley aims to advance within the banking sector by first earning a Certified Teller designation and then moving into a lead‑teller or assistant branch manager role at her Nampa branch.
    She plans to enroll in part‑time courses toward an associate degree in Business Administration to strengthen her financial knowledge. Long‑term, she hopes to combine her love of art and finance by managing
    financial operations for a local nonprofit arts organization or a museum gift shop, leveraging her customer‑service expertise and community‑building skills.
