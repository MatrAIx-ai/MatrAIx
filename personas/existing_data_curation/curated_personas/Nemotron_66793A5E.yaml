personas:
  professional: Shirley Heath is a bank teller at the Nampa branch who leverages their meticulous cash‑handling expertise, strong interpersonal communication, and curiosity‑driven problem‑solving to streamline
    transactions and mentor colleagues while pursuing a Certified Teller credential and aiming for a lead‑teller or assistant branch manager role.
  sports: Shirley Heath energizes their week with Zumba classes at Fitness Revolution, hikes the Owyhee foothills as a member of the Canyon Trails Hiking Club, and cheers on the Boise State Broncos football
    team and the Idaho Steelheads ice‑hockey squad while occasionally shooting baskets at the local community center.
  arts: Shirley Heath immerses themselves in the local art scene by attending openings at the Hoffmann Gallery, photographing sunrise vistas during hikes, creating delicate watercolors of Idaho wildflowers,
    devouring contemporary fiction by Sally Rooney, and enjoying live shows by the folk duo The Dusty Roads at the historic Orpheum Theatre.
  travel: Shirley Heath favors weekend getaways to the Sun Valley ski resort and the vibrant streets of Portland, plans trips with meticulously organized spreadsheets, balances a modest travel budget against
    a desire for adventure, and dreams of exploring Santa Fe's art districts before saving enough for a cross‑country road trip.
  culinary: Shirley Heath loves cooking quick Mediterranean dishes like grilled salmon with dill and quinoa salad, experiments with huckleberry jam in pastries, frequents the local Bean Roasters for pour‑over
    coffee, and treats themselves to pepperoni pizza on movie nights despite a general avoidance of fast food.
  core: Shirley Heath blends a curiosity for art with a disciplined finance mindset, juggling Zumba, watercolor, and spreadsheets while occasionally neglecting flossing and indulging in late‑night pizza.
background:
  cultural: Shirley grew up in a middle‑class, white American family in the Intermountain West, with deep roots in the small‑town community of Nampa, Idaho. Her upbringing emphasized hard work, community
    responsibility, and a love for the outdoors, reflected in family trips to the nearby Snake River Canyon and local fairs. While her cultural foundation is grounded in traditional American values, her
    curiosity has led her to embrace diverse artistic expressions and contemporary ideas, fostering an appreciation for both the region’s heritage and the broader cultural landscape.
