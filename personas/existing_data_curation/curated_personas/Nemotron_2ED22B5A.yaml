personas:
  professional: Felicia Long, an imaginative preschooler who loves building block towers and dreams of becoming an architect, combines their natural curiosity with a knack for organizing tidy play spaces
    into a budding professional mindset.
  sports: Felicia Long, a lively participant in the neighborhood toddler soccer program and a dedicated fan of the local baseball team the Springfield Sluggers, spends weekends at the park swinging a plastic
    bat and practicing basic drills with the Little Explorers club.
  arts: Felicia Long, a curious little artist, delights in finger painting bright watercolors, eagerly collects stickers of characters like Sesame Street's Elmo and Disney's Moana, and enjoys listening
    to Raffi's 'Baby Beluga' while drawing imaginative scenes.
  travel: Felicia Long, an enthusiastic traveler, loves weekend trips to the nearby lake where they build sandcastles, dreams of visiting Disney World in Florida and has already explored the children's
    museum in their city, preferring short car rides with packed snacks over long flights.
  culinary: Felicia Long, a picky eater with a sweet tooth, favors mac and cheese, peanut butter and jelly sandwiches, and strawberry slices, but proudly helps stir batter for homemade pancakes and insists
    on sprinkling extra cinnamon on their oatmeal.
  core: Felicia Long blends boundless curiosity, a love for tidy creativity, and a gentle, reliable nature into a delightful four‑year‑old who balances play, learning, and occasional mischief with a sunny
    optimism.
background:
  cultural: Felicia is raised in a middle‑class white family in Richmond, Virginia. Her family celebrates Southern traditions such as Thanksgiving, Fourth of July fireworks, and local community events like
    visits to the Science Museum of Virginia and the Richmond Botanical Gardens. She experiences a blend of Southern hospitality, community kindness, and the diverse cultural heritage of Richmond, which
    fuels her curiosity about art, history, and the natural world.
