  career_goals: Felicia often imagines becoming an artist who paints bright pictures, a teacher who reads stories to little kids, a scientist who discovers new things, or a dancer who performs on stage.
    Her aspirations focus on creativity, helping others, and exploring new ideas, reflecting her love of art and unconventional thinking.
