  hobbies: '[''Fishing'', ''Deer hunting'', ''Woodworking'', ''Gardening'', ''Cooking traditional Midwestern recipes'', ''Local history research'', ''Volunteer work at the senior center'', ''Attending church
    socials'', ''Road trips to Upper Peninsula scenic spots'', ''Model boat building'']'
  career_goals: Although officially retired, Donald aims to stay useful and engaged in his community. He plans to volunteer as a mentor for the local high‑school vocational program, teaching basic carpentry
    and engine maintenance to students interested in trades. He also hopes to document and preserve the traditional hunting and fishing practices of Presque Isle County by writing a simple handbook for
    newcomers. Maintaining his health is a priority, so he has set a goal of regular walking and a weekly fishing trip to keep active. Donald would like to establish a modest, routine of leading a monthly
    workshop at the senior center on simple home repairs, balancing his desire for routine with the occasional spontaneity of adjusting the topics based on participants’ needs. He also aspires to complete
    a short community‑college course in woodworking design, allowing him to produce a few custom pieces for extra income.
