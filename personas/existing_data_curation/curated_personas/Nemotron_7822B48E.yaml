personas:
  professional: Donald Rowell, a retired rural handyman and small‑engine specialist, leverages his lifelong mastery of carpentry, generator repair, and seasonal home upkeep to mentor high‑school vocational
    students and lead monthly senior‑center workshops, blending his love of routine with occasional spur‑of‑the‑moment project improvisations.
  sports: Donald Rowell enjoys seasonal sport fishing on Lake Huron, participates in the local Huron Lake Fishing Club, follows the Detroit Tigers baseball season, watches the Detroit Lions on Sundays,
    and occasionally joins a senior bowling league that meets at the Presque Isle community center.
  arts: Donald Rowell cultivates a quiet appreciation for Midwestern folk art, collecting vintage prints by Grant Wood, plays Bob Dylan records on his porch while woodworking, and showcases his own nature
    photography of Upper Peninsula waterfalls at the senior center’s monthly art show.
  travel: Donald Rowell embarks on spontaneous weekend drives to Upper Peninsula gems like Pictured Rocks and Tahquamenon Falls, while his long‑standing dream is to explore the Scottish Highlands, a trip
    he hopes to fund after completing his woodworking handbook.
  culinary: Donald Rowell delights in cooking classic Midwestern pot roast with carrots, potatoes, and rosemary, preparing fresh walleye fry seasoned with lemon, dill, and Old Bay, and baking apple crumble
    using orchard‑picked apples, all of which he proudly serves at church potlucks.
  core: Donald Rowell blends steadfast routine with occasional spur‑of‑the‑moment adventures, preferring a well‑kept ledger but often forgetting to file it, and balances a hearty love of woodworking with
    the habit of leaving half‑finished projects scattered around his garage.
background:
  cultural: Donald comes from a longstanding White, largely German‑Scandinavian lineage typical of Michigan’s Upper Peninsula. Raised in a close‑knit rural community, he inherited values of self‑reliance,
    practicality, and respect for the natural environment. Family stories emphasize hard work on the land, humility, and mutual support among neighbors. He grew up attending a Lutheran church, which reinforced
    a tradition of community service and modest celebration of holidays such as Thanksgiving, Independence Day, and St. John’s Day, a regional festivity tied to the outdoors. The local "Yooper" dialect
    and a love for lake‑front life have shaped his identity, and he takes pride in preserving the region’s hunting, fishing, and woodworking customs for future generations.
