persona_description: A historian who specializes in the study of ancient Near Eastern religions, particularly the Canaanite and Israelite belief systems. Their research interests include the rituals and
  practices of human sacrifice, particularly among the Israelites, and the impact of these practices on the development of Jewish and Christian religions. They are also interested in the political and social
  contexts in which these practices occurred, as well as the social and cultural transformations that occurred as a result of them.
