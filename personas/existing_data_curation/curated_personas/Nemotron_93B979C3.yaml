personas:
  professional: Edgar Rodriguez, a 32‑year‑old IT support specialist, merges hands‑on troubleshooting with a methodical documentation habit, using PowerShell scripts to automate ticket resolutions while
    still tinkering with Arduino projects after work, and they plan to leverage this blend of curiosity and practicality to earn a senior systems administrator role within three years.
  sports: Edgar Rodriguez rides the Pacific waves each sunrise, plays midfield for the local Southern California Amateur Soccer Club, and they cheer for the LA Galaxy, while also hitting the coastal trail
    for weekend hikes with their wife, using a GoPro to capture their surf takes and often ending the day with a post‑match taco feast.
  arts: Edgar Rodriguez immerses themselves in sci‑fi literature, regularly quoting passages from The Expanse, enjoys listening to classic rock icons like The Rolling Stones alongside regional folk duos
    such as Los Tigres del Norte, and they attend the annual Día de los Muertos art exhibit at the local community center where handmade papel picado installations spark their own DIY lighting projects.
  travel: Edgar Rodriguez favors coastal road trips, having driven the Pacific Coast Highway to Big Sur and explored the Yucatán's cenotes, they dream of a future family vacation to Japan's tech districts
    and Oaxaca’s culinary markets, and they meticulously plan itineraries on a spreadsheet while leaving room for spontaneous surf stops.
  culinary: Edgar Rodriguez cooks family‑style chilaquiles with fresh salsa verde, grills corn on the cob slathered in mayo, cotija and chili powder for weekend barbecues, and they experiment with a fusion
    mole‑mac and cheese, proudly showcasing their intermediate skill set while occasionally burning the bottom of a tortilla when multitasking between a coding session and the stove.
  core: Edgar Rodriguez, a 32‑year‑old surf‑loving tech wizard, blends family‑centric traditions, relentless curiosity, and a penchant for late‑night gaming, while often forgetting to file taxes on time
    and over‑stocking on custom‑PC parts.
background:
  cultural: Edgar's cultural background is rooted in his Mexican heritage while growing up in the vibrant, bicultural environment of Southern California. He is bilingual, speaking both Spanish and English
    fluently, and maintains strong family ties, regularly celebrating Mexican holidays such as Día de los Muertos, Cinco de Mayo, and the Día de la Independencia with traditional foods, music, and community
    gatherings. He participates in local Mexican-American cultural events and contributes to community organizations that support Spanish‑language education and cultural preservation. His identity reflects
    a balance between Mexican values of family, respect, and community, and the Californian coastal lifestyle that emphasizes outdoor recreation and individuality.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software installation and configuration'', ''Network troubleshooting (TCP/IP, Wi-Fi, VPN)'', ''Operating systems support (Windows, macOS, Linux)'', ''Help desk
    ticket management (ServiceNow)'', ''Customer service and communication'', ''Technical documentation and knowledge base creation'', ''Remote support tools (TeamViewer, Remote Desktop)'', ''Scripting
    (PowerShell, Bash)'', ''Basic cybersecurity practices'', ''Virtualization (VMware, Hyper‑V)'', ''Cloud services basics (Azure, AWS)'']'
  hobbies: '[''Surfing'', ''Coastal hiking'', ''Custom PC building'', ''Arduino and Raspberry Pi projects'', ''Playing soccer'', ''Cooking Mexican cuisine'', ''Reading tech blogs and sci‑fi novels'', ''Strategy
    video gaming'', ''Volunteering in community tech workshops'', ''Attending cultural festivals'']'
  career_goals: 'Edgar aims to transition from a support specialist role into a senior systems administrator position within the next three years, obtaining certifications such as CompTIA Network+, Security+,
    and Microsoft Certified: Modern Desktop Administrator. He aspires to lead an IT team, streamline support processes, and introduce self‑service portals to improve response times. Long‑term, he envisions
    specializing in cloud infrastructure or cybersecurity, possibly earning a Cisco CCNA and an AWS Solutions Architect certification, while balancing his professional growth with family responsibilities.
    He also contemplates launching a side consultancy focused on small‑business tech support.'
