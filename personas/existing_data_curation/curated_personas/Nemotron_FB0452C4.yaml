personas:
  professional: Julieta Benitezcruz is a dedicated janitorial professional in Albuquerque who blends bilingual communication, OSHA‑approved safety expertise, and a budding curiosity for eco‑friendly products;
    they reliably manage floor care, minor repairs, and waste segregation while pragmatically pursuing Certified Professional Cleaner and OSHA 30‑hour credentials to transition into a supervisory role.
  sports: Julieta Benitezcruz fuels her fitness routine with weekend hikes up the Sandia Mountains, membership in the Albuquerque Trail Runners club, a loyal following of the New Mexico State Aggies football
    team and the Albuquerque Isotopes baseball club, and they also squeeze in occasional yoga sessions to stay flexible.
  arts: Julieta Benitezcruz expresses her creative side through desert photography captured with a Canon EOS R, a love for Frida Kahlo’s vivid paintings, listening to the folk‑rock band Los Lobos, and volunteering
    at the annual Día de los Muertos celebration where they help craft altars and traditional papel picado.
  travel: Julieta Benitezcruz prefers road‑trip adventures across the Southwest, having explored Santa Fe’s art districts, the red rocks of Sedona, and the canyons of Canyonlands, while dreaming of an eco‑tourism
    stint in Oaxaca to deepen her culinary roots, and they usually plan these trips through a mix of spontaneous detours and careful budgeting.
  culinary: Julieta Benitezcruz delights in cooking authentic tamales and mole poblano using home‑grown herbs and chilies from her balcony, pairs them with fresh corn tortillas and homemade salsa verde,
    and they occasionally treat themselves to a late‑night taco stand, though they admit to over‑seasoning dishes when experimenting with new spice blends.
  core: Julieta Benitezcruz is a pragmatic dreamer who balances green‑cleaning ambition, budget‑savvy habits, yoga‑fueled resilience, and a love for desert hikes, while they also have a stubborn tendency
    to over‑season every dish.
background:
  cultural: Julieta’s Mexican heritage is a central part of her identity. She grew up in a bilingual household in Albuquerque, celebrating holidays like Día de los Muertos, Las Posadas, and quinceañeras
    with family and the local Mexican‑American community. Spanish is spoken at home, and she maintains close ties with relatives in Mexico through regular video calls and visits. The values of familismo,
    respect for elders, and a strong work ethic were reinforced by her community, shaping her reliable and compassionate approach to work. She blends Mexican culinary traditions with New Mexico’s Southwestern
    flavors, and she participates in cultural events at the local community center, preserving her heritage while adapting to the broader American context.
attributes:
  skills: '[''Floor care and maintenance'', ''Restroom sanitation'', ''Basic building repairs (lighting, plumbing, HVAC filter replacement)'', ''Chemical safety and OSHA compliance'', ''Inventory management'',
    ''Bilingual communication (Spanish/English)'', ''Customer service and tenant interaction'', ''Time management and digital scheduling'', ''Use of modern cleaning equipment (auto‑scrubbers, electrostatic
    sprayers)'', ''Sustainable/green cleaning practices'']'
  hobbies: '[''Cooking traditional Mexican dishes'', ''Hiking in the Sandia Mountains'', ''Photography'', ''Balcony gardening'', ''Reading sustainable living and DIY books'', ''Community volunteering (Día
    de los Muertos events)'', ''Yoga'', ''Listening to regional Mexican music'']'
  career_goals: Julieta wants to move from frontline cleaning to a supervisory role in facilities management. She plans to earn a Certified Professional Cleaner credential and an OSHA 30‑hour safety certification
    within the next year. Over the next three to five years, she aims to become a lead janitorial supervisor, overseeing a small team, designing efficient cleaning schedules, and introducing eco‑friendly
    practices across the property. She also hopes to complete a bachelor’s degree in facilities management part‑time, which could open opportunities in property management or starting her own green‑cleaning
    business focused on serving local schools and community centers.
