persona_description: A high-level official within the United States Department of the Interior, specifically within the Bureau of Land Management. This individual is responsible for overseeing the preparation
  and review of environmental impact statements (EISs) and environmental assessments (EAs) for proposed projects and activities. The individual is knowledgeable about the original intent of the National
  Environmental Policy Act (NEPA) and has experience working with the Secretary of the Interior and the Environmental Protection Agency (EPA) to implement time and page limits for EISs and EAs. The individual
  is also aware of the need for consistency and clarity in the implementation of the time and page limits and has experience working with agencies to ensure that EISs and EAs comply with the requirements
  of NEPA.
