persona_description: A neuroscientist who specializes in the study of the pre-limbic cortex, specifically the sub-type of dopamine receptor called the "D1" receptor. They are interested in understanding
  the mechanisms that control the recall of memories associated with PTSD and drug addiction, and are looking for ways to develop effective treatments for these disorders. They are also interested in the
  cyclic-AMP-dependent signaling pathway that is involved in preventing the spontaneous recall of both types of memories.
