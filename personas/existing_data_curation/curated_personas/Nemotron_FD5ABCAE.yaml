    (Spanish/English)'', ''Record‑keeping and audit preparation'', ''Process improvement'', ''Staff training and mentorship'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Reading Latin American literature'', ''Cooking Mexican cuisine'', ''Gardening'', ''Nature walks'', ''Volunteer work at Mexican
    cultural center'']'
  career_goals: Esperanza’s immediate goal is to earn the Certified Payroll Professional (CPP) designation within the next two years, positioning herself for a senior payroll supervisor role either at her
    current employer or a larger regional firm. She also aims to broaden her skill set into human resources, focusing on benefits administration, to transition into an HR generalist position. Long‑term,
    she envisions launching a freelance bookkeeping and payroll consultancy that serves small Mexican‑owned businesses in Tuscaloosa, providing culturally aware financial support while mentoring emerging
    professionals from similar backgrounds.
