personas:
  professional: Marinella Perezcortes, a UI/UX designer specializing in high‑fidelity prototyping with Figma and Adobe XD, leverages her meticulous organization and competitive drive to deliver pixel‑perfect,
    accessible interfaces while constantly exploring emerging AR/VR tech to keep her work cutting‑edge.
  sports: Marinella Perezcortes, a weekend hiker on Box Springs Mountain and a member of the Riverside Outdoor Club’s intramural volleyball team, maintains fitness through high‑intensity interval training,
    follows the Los Angeles Dodgers and LA Lakers loyally, and enjoys salsa dancing classes for cardio.
  arts: Marinella Perezcortes, an avid gallery‑hopper and street‑art explorer, draws creative fuel from photographer Alex Webb, musicians J Balvin and Billie Eilish, and visual artist Ai Weiwei, channeling
    that inspiration into her own digital illustrations and daily photography blog.
  travel: Marinella Perezcortes plans trips with meticulous spreadsheets but leaves room for spontaneous detours, frequently escapes on weekend road trips to Santa Fe and Southern California desert towns,
    and dreams of a future cultural immersion in Tokyo’s tech art scene.
  culinary: Marinella Perezcortes, a confident home cook, delights in preparing tamales and mole with rich masa, dried chilies, and cacao, often experimenting with fusion twists like kimchi‑infused tacos,
    while she also seeks out artisanal mezcal and fresh market ingredients for her gatherings.
  core: Marinella Perezcortes is a curiosity‑driven, hyper‑organized 22‑year‑old who blends competitive ambition with a love for vibrant art, spontaneous hikes, and late‑night coding marathons, even if
    she sometimes burns the midnight oil to the detriment of sleep.
background:
  cultural: Marinella is a second‑generation Mexican‑American raised in Moreno Valley, California. She grew up bilingual, speaking both Spanish and English at home, and celebrated Mexican traditions such
    as Día de los Muertos, Cinco de Mayo, and family gatherings centered around homemade cuisine. Her Mexican heritage informs her aesthetic sensibility, favoring bold colors, intricate patterns, and storytelling
    elements in her designs. She remains connected to her community through local cultural organizations, youth mentorship programs, and participation in regional festivals, while also navigating the diverse,
    multicultural environment of Southern California.
