  skills: '[''UI/UX design'', ''User research'', ''Design thinking'', ''Wireframing'', ''Prototyping'', ''Responsive web design'', ''HTML/CSS'', ''JavaScript basics'', ''Figma'', ''Adobe XD'', ''Adobe Photoshop'',
    ''Adobe Illustrator'', ''Typography'', ''Color theory'', ''Accessibility standards'', ''Brand identity design'', ''Agile workflow'', ''Project management (Trello, Jira)'']'
  hobbies: '[''Visiting art galleries'', ''Street‑art tours'', ''Indie music concerts'', ''Mexican folk dance'', ''Salsa dancing'', ''Cooking traditional Mexican cuisine'', ''Exploring AR/VR technology'',
    ''Participating in hackathons'', ''Design meetups'', ''Hiking (Box Springs Mountain)'', ''Volunteering at cultural festivals'', ''Photography blogging'']'
  career_goals: Marinella aims to become a senior lead product designer within the next five years, directing cross‑functional teams to craft inclusive digital experiences for multicultural audiences. She
    plans to complete her bachelor's degree in Interaction Design while building a portfolio that highlights culturally resonant interfaces for bilingual users. Ultimately, she envisions launching her own
    design consultancy that merges Mexican artistic heritage with cutting‑edge technology, speaking at design conferences, and mentoring emerging designers from underrepresented backgrounds.
