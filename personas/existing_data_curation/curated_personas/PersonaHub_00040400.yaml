persona_description: A musicologist who specializes in the study of guitar music, particularly the differences between popular and erudite guitar players. His research interests include the history and
  evolution of guitar music, the development of technical solutions and pedagogic orientation in popular guitar playing, and the differences between rhythmic approaches that feed on tempo stability and
  those that are developed through the expression of time variation. He is interested in the intersection between music and social context, particularly in the role of the popular guitar player in Brazilian
  society.
