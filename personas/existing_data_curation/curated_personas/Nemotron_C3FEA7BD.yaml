    Campaign Development'']'
  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Street‑art walks in Brooklyn'', ''Photography (urban and documentary)'', ''Book club participation'', ''Yoga and dance fitness classes'',
    ''Cooking and hosting potluck dinners'', ''Volunteering as a museum docent'', ''Travel to culturally rich destinations'', ''Attending live music and improv comedy shows'', ''Community theater involvement'']'
  career_goals: She aims to transition into senior communications leadership within the cultural sector, hoping to become Communications Director for a museum or arts nonprofit in New York. She wants to
    lead a team that shapes inclusive, original narratives and amplifies under‑represented voices. Over the next five years, she plans to earn a Master’s in Strategic Communication or an MBA part‑time to
    deepen her strategic planning capabilities. She also dreams of launching a boutique PR consultancy focused on helping emerging artists and community organizations tell their stories. Meanwhile, she
    hopes to mentor junior PR staff and champion work‑life flexibility, reflecting her own values.
