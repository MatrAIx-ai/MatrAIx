personas:
  professional: Phillip Hutchinson, a retired high school English teacher in Oconee County, leverages three decades of literary expertise, creative‑writing mentorship, and community outreach to digitize
    oral histories and curate intergenerational storytelling workshops.
  sports: Phillip Hutchinson enjoys leisurely walks with the Blue Ridge Senior Hikers club, follows the Clemson Tigers football team and the Carolina Panthers, and tunes into the Atlanta Braves broadcasts,
    while his only regular exercise is a daily mountain trail stroll that doubles as birdwatching.
  arts: Phillip Hutchinson spends afternoons listening to the soulful strains of B.B. King, the improvisations of Miles Davis, and uplifting gospel hymns, paints watercolors of the Blue Ridge peaks in the
    style of Winslow Homer, and reads poetry by Langston Hughes and Maya Angelou, finding each artistic encounter a thread in his personal narrative.
  travel: Phillip Hutchinson prefers slow, purposeful road trips that combine heritage sites with natural beauty, such as a weeklong stay in Asheville exploring the River Arts District, a scenic drive to
    Savannah’s historic squares for genealogy research, and annual pilgrimages to the Great Smoky Mountains for birdwatching, always staying in family‑run B&Bs and budgeting his travel with a modest savings
    fund.
  culinary: Phillip Hutchinson favors Southern comfort food, often cooking collard greens seasoned with smoked turkey, rye‑smoked catfish, and peach cobbler topped with fresh garden‑grown berries, while
    his kitchen also produces a hearty gumbo with okra and andouille sausage, and he balances these indulgences with a daily sweet tea made from locally sourced loose leaf tea.
  core: Phillip Hutchinson, an 83‑year‑old steward of local memory, blends a quiet, reflective demeanor with a stubborn insistence on preserving every story—whether through handwritten notes, watercolor
    brushstrokes, or late‑night recording sessions.
background:
  cultural: Born in 1942 in a segregated South Carolina town, Phillip grew up under Jim Crow and later took part in the Civil Rights Movement, assisting voter registration drives in the 1960s. His upbringing
    was rooted in the African‑American church, where gospel music, oral storytelling, and strong family ties shaped his values. He embodies the Upstate South Carolina black heritage that blends Appalachian
    folk traditions with Southern black culture, reflected in his love of blues, jazz, Southern cuisine, and community activism. Phillip remains active in his local Baptist congregation and volunteers with
    the Oconee County historical society, helping preserve the stories and history of his generation.
