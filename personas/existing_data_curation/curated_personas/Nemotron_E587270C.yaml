  hobbies: '[''Reading classic literature'', ''Poetry writing'', ''Watercolor painting'', ''Nature walks and birdwatching'', ''Chess'', ''Jazz and gospel listening'', ''Genealogy research'', ''Gardening'',
    ''Church choir participation'', ''Volunteer storytelling'']'
  career_goals: Although retired, Phillip’s ambitions focus on preserving cultural memory and sharing his creativity. He plans to compile a memoir and a collection of oral histories from the African‑American
    elders of Seneca, produce a small gallery of his watercolor paintings inspired by the Blue Ridge landscape, and launch an intergenerational storytelling workshop at the local library. He also aims to
    mentor his grandchildren in writing and encourage their pursuit of higher education, while learning digital archiving techniques to safeguard the stories he records.
