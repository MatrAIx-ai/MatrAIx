persona_description: A German city or municipal official responsible for developing and implementing clean air and action plans, specifically focusing on low emission zones (LEZ), urban and regional planning
  measures, and public transport policies. This individual is knowledgeable about EU Community law, German environmental regulations, and the implementation of urban and regional planning measures to reduce
  air pollution. They have experience in developing and maintaining LEZs, ring roads, and urban logistics centers, as well as integrating ecological requirements into public transport services. They are
  also familiar with the German Federal Environment Agency's website for accessing and updating information on LEZs.
