persona_description: A maritime historian who is interested in the history and culture of maritime disasters, particularly those involving women and children. They are fascinated by the differences between
  the two ships involved in the disaster and the survival rates of the passengers. They are also interested in the societal implications of the "woman and children first" rule and how it has evolved over
  time. They are likely to be interested in the survival rates of the passengers on the Concordia and how they compare to those on other ships that have experienced similar disasters.
