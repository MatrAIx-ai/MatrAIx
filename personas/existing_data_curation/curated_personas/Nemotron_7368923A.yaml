personas:
  professional: Erica Vigille, a retired biomedical engineer with a knack for translating complex science into community storytelling, channels their experimental design expertise, R and Python fluency,
    and grant‑writing savvy into vibrant science‑art workshops at the local museum, where their relaxed planning style fosters creative spontaneity while mentoring emerging women scientists.
  sports: Erica Vigille stays active through morning walks in historic Harrisburg neighborhoods, occasional yoga classes at the community center, and cheering on the Philadelphia Eagles and the Harrisburg
    Senators while they join a senior softball league that meets every summer.
  arts: Erica Vigille immerses themselves in the arts by frequenting the Susquehanna Art Museum, attending jazz concerts featuring legends like Miles Davis and contemporary soul shows by artists such as
    Leon Bridges, participating in local theatre productions, and capturing the interplay of light and texture in their own photography inspired by Ansel Adams.
  travel: Erica Vigille prefers curated cultural tours, having explored the Renaissance galleries of Florence, the tea houses of Kyoto, and the historic streets of Savannah, while planning a future road
    trip through the Great Smoky Mountains to combine their love of nature, photography, and culinary sampling of Appalachian cuisine.
  culinary: Erica Vigille, an enthusiastic home chef, blends heirloom vegetables from their garden into global dishes like Moroccan tagine with preserved lemons, Japanese miso‑glazed salmon, and Italian
    ratatouille, skillfully using fresh basil, sumac, and smoked paprika, and they often host potluck evenings where friends sample their experimental fusion plates.
  core: Erica Vigille is a curiosity‑driven, sociable retiree who weaves science, art, and community into every facet of life, even if occasional forgetfulness about appointments keeps their schedule intriguingly
    unpredictable.
background:
  cultural: Erica is an African‑American woman whose family roots trace back to the Great Migration from the rural South to Pennsylvania in the 1940s. Growing up during the civil‑rights era, she was inspired
    by community activists and the rich traditions of gospel, blues, and soul music that shaped her household. Her cultural identity emphasizes resilience, communal support, and a deep appreciation for
    storytelling through both spoken word and visual art. In Harrisburg, she actively participates in the Pennsylvania African American Museum’s programs, the annual African Heritage Festival, and her local
    church’s outreach initiatives. These experiences have reinforced her commitment to nurturing harmony, celebrating Black artistic contributions, and championing educational equity within her community.
attributes:
  skills: '[''Experimental design'', ''Statistical analysis (R, Python)'', ''Scientific writing and grant preparation'', ''Mentoring and tutoring'', ''Science communication and public speaking'', ''Community
    outreach program development'', ''Interdisciplinary collaboration between science and art'', ''Event facilitation and group dynamics'', ''Conflict resolution'', ''Cultural competency'', ''Laboratory
    techniques (microscopy, flow cytometry)'', ''Flexible project coordination'']'
  hobbies: '[''Visiting art galleries and museums'', ''Attending live jazz and soul concerts'', ''Participating in community theater'', ''Traveling to cultural heritage sites'', ''Senior book club membership'',
    ''Gardening (heirloom vegetables)'', ''Cooking and experimenting with global cuisines'', ''Volunteer science outreach at local schools'', ''Photography of nature and cultural events'', ''Quilting and
    textile arts'', ''Walking tours of historic Harrisburg neighborhoods'', ''Learning digital storytelling tools'']'
  career_goals: Although retired from formal employment, Erica’s ambition is to leave a lasting legacy by empowering the next generation of Black women in STEM. She plans to launch a mentorship fellowship
    that pairs senior scientists with high‑school students in the Harrisburg area, and to co‑curate a travelling exhibition that showcases the intersection of scientific discovery and African‑American artistic
    expression. She also hopes to author a memoir reflecting on her journey through academia, civil‑rights activism, and the arts, with the goal of inspiring resilience and curiosity. Continuing her lifelong
    learning, Erica aims to deepen her knowledge of emerging digital storytelling tools to expand the reach of her community workshops.
