  hobbies: '["Reading (historical non‑fiction, contemporary fiction)","Vegetable gardening","Knitting and quilting","Community theater (set design, backstage coordination)","Book club participation","Genealogy
    research","Birdwatching","Visiting regional arts festivals"]'
  career_goals: Although retired from full‑time teaching, Lynnette aims to remain an active contributor to her community by mentoring new teachers, leading intergenerational learning workshops, and supporting
    literacy programs at the local library. She aspires to develop a small nonprofit focused on after‑school tutoring for underserved youth, leveraging her organizational skills to secure funding and build
    sustainable partnerships. Personal ambitions also include completing a memoir that chronicles her teaching journey and the evolution of education over the past five decades, and to travel with her spouse
    to historic sites across the United States.
