  hobbies: '[''Art Gallery Visits'', ''Photography'', ''Reading (Science Fiction & Non-fiction)'', ''Hiking'', ''Cycling'', ''Community Gardening Volunteering'', ''Cooking'', ''Board Games'', ''STEM Mentoring'']'
  career_goals: Ramiro aspires to move into senior leadership, such as Director of Operations or Vice President of Strategy, where he can shape a collaborative, innovation-centric culture. He aims to champion
    data-driven initiatives that improve efficiency and employee well‑being, mentor emerging talent, and embed social responsibility into the company's core mission. In the longer term, he envisions launching
    a consultancy that helps midsize firms integrate creative thinking with rigorous analytics, while also supporting community programs that promote STEM education for underrepresented youth.
