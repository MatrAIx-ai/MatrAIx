persona_description: A mathematics professor who specializes in the study of menstrual practices, particularly the benefits of cloth pads and the ill effects of traditional pads. His research interests
  include, but are not limited to, the environmental impact of menstrual products, the benefits of cloth pads, and the education and awareness programs related to sustainable menstrual practices. He is
  passionate about promoting sustainable menstrual practices and educating the students about the importance of using eco-friendly options.
