persona_description: A climate campaigner who is concerned about the carbon footprint of biomass energy and is advocating for a shift towards sustainable UK feedstocks and continued investment in different
  types of renewable energy. They are also critical of the Government's subsidization of burning whole trees in coal power stations and are calling for an end to the fiction that burning wood is carbon
  free. They believe that using sustainable biomass to produce electricity can only release carbon which was absorbed while the biomass was growing and is part of a closed cycle, but importing and processing
  the wood would not damage the climate.
