persona_description: A pediatrician who specializes in the treatment of acute otitis media in children. She/he is knowledgeable about the management of uncomplicated acute otitis media, the accuracy of
  diagnosis, and the effectiveness of different treatments. The persona has conducted a meta-analysis of six key questions related to the diagnosis, microbial epidemiology, effectiveness of treatment options,
  and adverse effects of available treatment options. The persona is interested in the impact of the widespread use of the 7-valent pneumococcal conjugate vaccine on the accuracy of diagnosis, the effect
  of the vaccine on the microbial epidemiology of acute otitis media, and the effectiveness of different treatments. The persona is also interested in the adverse effects of available treatment options.
