  career_goals: Carlos aspires to transition into a chief financial officer role within a mid‑sized enterprise that values innovative financial leadership. He aims to launch a boutique consultancy that
    blends creative thinking with rigorous accounting practices, offering services in AI‑enhanced audit methodologies and sustainable finance strategy. Additionally, he seeks to become a thought leader
    by publishing articles on the intersection of art, abstraction, and finance, and by establishing a community program in Overland Park that provides financial‑literacy workshops with a focus on creativity
    and critical thinking. Serving on corporate boards and mentoring the next generation of accountants are also long‑term ambitions.
