persona_description: A neuroscientist who specializes in the study of neuronal function, particularly the morphological basis of neuronal activity and the interactions between neurons and their environment.
  The persona is interested in unraveling the variety of neuronal circuits and their interactions with peripheral sensors and effector organs, and is particularly focused on the study of morphological plasticity
  of dendritic spines and axonal arbors. The persona is driven by a passion for advancing our understanding of the nervous system and has made significant contributions to the field through their research
  on the anatomy of neurons and glia, particularly in the context of FGF receptor signaling and receptor tyrosine kinase trafficking.
