persona_description: A researcher or pediatrician who is interested in the development of young girls and the impact of obesity on physical maturation. They are particularly interested in the study of puberty
  and its relation to body weight and are looking for evidence to support the idea that obesity is driving a trend toward earlier puberty in girls. They are also interested in the link between body fat
  and puberty and are looking for evidence to support the idea that obesity is leading to earlier puberty in girls.
