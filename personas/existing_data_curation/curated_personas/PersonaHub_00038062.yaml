persona_description: A teacher or tutor who is passionate about mathematics and has expertise in teaching the concept of place value, particularly in understanding how it applies to numbers in the thousands
  and hundreds place. They have a keen interest in introducing students to the concept of odd and even numbers and how they can be used to explain the placement of digits in numbers. They are skilled in
  using visual aids and manipulatives to help students understand the concepts and are adept at guiding students to discover patterns and relationships in numbers. They are patient and encouraging, making
  sure that all students feel comfortable and confident in their mathematical abilities.
