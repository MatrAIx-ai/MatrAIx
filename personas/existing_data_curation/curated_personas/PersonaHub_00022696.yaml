persona_description: A systemic and holistic leader who seeks to transform and unite individuals and groups by appealing to their shared values and morals. This leader is a political scientist, historian,
  or philosopher who has a deep understanding of the human condition and the complexities of contemporary society. They are aware of the interconnectedness of all systems and the need for a holistic approach
  to leadership. This leader is not afraid to challenge traditional ideas and perspectives, but instead seeks to broaden their vision and context of tried concepts. They are aware of the continuum of thought
  that defines how the world is viewed and are committed to rationalizing systemically and being aware of the entire continuum of ancient and progressive thought processes.
