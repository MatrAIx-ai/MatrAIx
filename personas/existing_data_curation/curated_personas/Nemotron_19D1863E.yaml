  hobbies: '[''Traditional South Asian cooking'', ''Backyard vegetable gardening'', ''Watching classic Bollywood movies'', ''Knitting and crocheting'', ''Crossword puzzles'', ''Participating in community
    cultural events'', ''Storytelling in Hindi/Urdu'', ''Volunteering at senior center'']'
  career_goals: Vidya aims to retain a steady, part-time housekeeping position that respects her health and daily routine while allowing her to continue earning a reliable income. She hopes to be promoted
    to a lead or supervisory role where she can mentor newer staff and share her extensive practical knowledge. Long-term, she wishes to launch a small, family-run cleaning service serving the South Asian
    community in Milpitas. Additionally, she seeks to save enough to support her grandchildren's education and ensure a comfortable retirement.
