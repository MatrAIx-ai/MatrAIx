personas:
  professional: Vidya Ahmed, a seasoned housekeeping specialist with over five decades of experience, combines meticulous deep‑cleaning expertise, bilingual communication and a warm, chatty demeanor to
    become the go‑to caretaker for families and small businesses, while aspiring to mentor newcomers and eventually launch a community‑focused cleaning service.
  sports: Vidya Ahmed enjoys low‑impact fitness through daily morning walks with the Milpitas Senior Walking Club, occasional yoga classes at the community center, cheerfully follows the San Jose Sharks
    hockey team and the Golden State Warriors, and participates in a seasonal pickleball league for seniors during the spring.
  arts: Vidya Ahmed spends her evenings watching classic Bollywood films like Sholay and Mughal‑e‑Azam, listening to the timeless melodies of Lata Mangeshkar and Kishore Kumar, knitting scarves while humming
    familiar Bollywood tunes, and attending Hindi/Urdu storytelling circles where she often shares anecdotes from her own life.
  travel: Vidya Ahmed prefers structured, short‑duration trips such as a yearly family getaway to Monterey, a weekend retreat at Lake Tahoe, and a nostalgic pilgrimage to the historic spice market of Marrakech,
    always planning itineraries months in advance while balancing her modest retirement budget.
  culinary: Vidya Ahmed delights in preparing aromatic dishes like chicken biryani, dal tadka, and samosa‑filled pastries, using cumin, turmeric, cardamom, and fresh cilantro from her backyard garden, while
    expertly balancing flavors for festive family gatherings and community potlucks, and she loves sharing the recipes in handwritten notes to friends.
  core: Vidya Ahmed blends steadfast routine, talkative charm, and a meticulous work ethic into a life of service, lingering over spices, crossword clues, and community chatter, even as worry occasionally
    nudges her toward late‑night tea and extra savings.
background:
  cultural: Vidya was born in a rural community in India and grew up in a close-knit joint family that emphasized hospitality, respect for elders, and religious practice. After marrying a partner with a
    Muslim background, she integrated both Hindu and Muslim traditions into her household. She migrated to the United States in the early 1990s and settled in Milpitas, California, where she remains active
    in the local South Asian diaspora, attending Diwali and Eid celebrations, visiting the nearby temple and mosque, and maintaining fluency in both English and Hindi/Urdu. Her cultural identity is rooted
    in South Asian traditions, family values, and a strong sense of community.
attributes:
  skills: '[''Deep cleaning'', ''Laundry and ironing'', ''Meal preparation (South Asian cuisine)'', ''Bilingual communication (English, Hindi/Urdu)'', ''Time management and scheduling'', ''Household inventory
