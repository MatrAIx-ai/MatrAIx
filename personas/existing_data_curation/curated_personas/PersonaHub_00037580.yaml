persona_description: A professional with expertise in the field of project management, specifically in the planning and execution of large-scale projects. This person is likely to be involved in the development
  and implementation of project plans, overseeing the activities involved in the project, and ensuring compliance with relevant legislation and standards. They may also have experience in the industry context,
  understanding the various industries and their respective challenges and opportunities. The person is likely to be familiar with the Disability Discrimination Act (DDA) and its implications for employment,
  goods and services, education, and transport. They may have experience with the Equality Act and its related legislation. They may also have experience with the Metabolist movement in architecture and
  its impact on the field. The person is likely to be involved in the research and analysis of buildings, including the use of primary sources and the development of new skills. They may be involved in
  the design and construction of buildings, including the use of advanced technologies and materials. They may be involved in the management of projects, including the identification of risks and the implementation
  of risk management strategies. They may also be involved in the development of new building codes and standards, including the use of BREEAM and other related certifications. They may have experience
  with the management of projects, including the identification of stakeholders and the development of stakeholder management strategies. They may also have experience with the management of projects, including
  the development of project management methodologies and tools.
