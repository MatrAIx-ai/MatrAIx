  career_goals: Brandon hopes to pursue a career that blends his artistic talents with his desire to help others. He envisions studying graphic design or multimedia art in college, eventually working as
    a visual storyteller for socially impactful projects. He is also intrigued by art therapy and would like to obtain a degree in psychology or counseling to use creative expression as a tool for mental
    health support. Long‑term, he aims to develop inclusive video games that explore abstract concepts and promote empathy, while also contributing to community youth art programs in Louisiana.
