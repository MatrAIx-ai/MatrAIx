personas:
  professional: Brandon Webb, an aspiring junior digital illustrator and budding storyteller, blends their talent for watercolor and tablet art with a meticulous yet flexible work ethic, using their curiosity
    and compassion to create inclusive characters for school projects and community library murals, and they often collaborate with classmates to bring stories to life.
  sports: Brandon Webb participates in the school’s soccer team and the community’s junior track club, roots for the Los Angeles Lakers in basketball and the New York Yankees in baseball, and balances competitive
    practice with casual skateboarding at the local park, even though they sometimes prefer quiet bike rides over intense drills.
  arts: Brandon Webb explores watercolor techniques inspired by Yuko Shimizu, follows digital artist Ross Tran for tutorials, strums acoustic renditions of Billie Eilish and Ed Sheeran on guitar, draws
    creative energy from the novels of Neil Gaiman and the films of Guillermo del Toro, and they often blend these influences into hybrid art projects.
  travel: Brandon Webb enjoys weekend road trips to nearby state parks such as Zion and has a bucket‑list dream of exploring Kyoto’s temples and Iceland’s aurora borealis, planning each adventure with a
    mix of parental guidance and their own sketchbook‑filled itineraries, and they imagine capturing sunrise over Kyoto’s historic shrines.
  culinary: Brandon Webb loves devouring pepperoni pizza and sushi rolls, but also experiments in the kitchen by whipping up beginner‑level spaghetti carbonara with pancetta, fresh basil, and Parmesan,
    often adding a splash of soy sauce for a fusion twist, while they sometimes forget to clean the pan, leading to lingering kitchen chaos.
  core: Brandon Webb is a highly imaginative yet worry‑laden teen who channels stress into vivid sketches, often losing track of homework while they obsessively rearrange their art supplies and snack stash.
background:
  cultural: Brandon is a white teenage boy raised in Baker, Louisiana, a suburb of East Baton Rouge Parish. His family embodies many Southern values such as hospitality, modesty, and a strong sense of community.
    He attends a local Baptist church where he participates in youth group activities and seasonal celebrations like Christmas pageants and Easter services. The regional culture influences his palate through
    de‑foe cuisine, including gumbo, jambalaya, and po’ boys, while he also enjoys classic Southern pastimes like Friday night high‑school football games and local fairs. At the same time, his exposure
    to the internet and online creative communities provides a global artistic perspective, allowing him to blend traditional Southern roots with contemporary digital culture.
