personas:
  professional: Benjamin Holt, a 2‑year‑old, delights in being the unofficial toy manager at preschool, using a natural knack for arranging blocks and plushies into orderly rows while eagerly rallying peers
    for group games, reflecting a blend of practical structure and outgoing energy.
  sports: Benjamin Holt, a 2‑year‑old, gleefully waves a Seattle Mariners cap while toddling through the Little Sprouts Kids Soccer Club’s mini‑training sessions, and claps along to Seattle Sounders highlights
    on TV, combining natural high energy with a budding love for coordinated group play.
  arts: Benjamin Holt, a 2‑year‑old, can’t resist dancing to the Disney classic Let It Go from Frozen, giggling at Sesame Street’s Elmo, and eagerly pointing out the whimsical illustrations in Eric Carle’s
    The Very Hungry Caterpillar, underscoring how music and vivid visuals shape their daily play.
  travel: Benjamin Holt, a 2‑year‑old, eagerly anticipates weekend outings to the San Diego Zoo and an upcoming trip to Disneyland, while dreaming about the bright lights of the Eiffel Tower after bedtime
    stories, showcasing a mix of sensory‑rich immediate adventures and a budding curiosity for far‑flung wonders.
  culinary: Benjamin Holt, a 2‑year‑old, adores creamy macaroni‑and‑cheese sprinkled with cheddar, reaches for soft banana slices and peanut‑butter toast, and proudly attempts to stir a bowl of strawberry‑yogurt
    with a tiny plastic spoon, reflecting a developing palate and hands‑on curiosity.
  core: Benjamin Holt, a 2‑year‑old, balances a hearty love for structured play with endless bursts of social energy, yet habitually clings to a favorite blue stuffed rabbit, refusing to part with it even
    at bedtime.
background:
  cultural: Benjamin comes from a suburban White American family in Collegeville, Pennsylvania. His household celebrates mainstream U.S. holidays such as Thanksgiving, Christmas, and the Fourth of July,
    often with predictable rituals like family meals and seasonal decorations. The family values community involvement and punctuality; they attend a local church on Sundays and participate in neighborhood
    block parties. His parents’ ancestry includes German and Irish roots, which occasionally appears in family meals (e.g., pretzels, apple pie) and stories about heritage. The cultural environment emphasizes
    order, routine, and social interaction, aligning with Benjamin’s preference for structure and his outgoing personality.
