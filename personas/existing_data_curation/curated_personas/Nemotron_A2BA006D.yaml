  hobbies: '[''Garden care (tropical vegetables & herbs)'', ''Home cooking (Korean & Hawaiian fusion)'', ''Crocheting & knitting'', ''Listening to Korean folk & Hawaiian music'', ''Reading historical novels'',
    ''Beach walks'', ''Volunteering (cooking workshops)'']'
  career_goals: Even at 93, Moon Hee Do remains purposeful about the legacy she leaves. Her primary ambition is to preserve and pass on her family's culinary heritage by compiling a handwritten cookbook
    of favorite recipes for grandchildren and future generations. She aims to continue volunteering at the community senior center, offering weekly cooking workshops that teach both Korean and Hawaiian
    techniques to seniors and their families. She hopes to act as a cultural bridge, organizing small gatherings during Chuseok and Lunar New Year that invite neighbors of diverse backgrounds, fostering
    mutual respect and understanding. Maintaining her health and independence is also a key goal, so she incorporates daily walks on the nearby beach and gentle yoga to stay active.
