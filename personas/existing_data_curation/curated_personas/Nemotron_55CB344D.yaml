personas:
  professional: Betty Gordon, a registered nurse known for blending clinical expertise with creative problem‑solving, excels at patient assessment, IV therapy, and wound care while integrating art‑based
    coping techniques into care plans and advocating for health‑equity initiatives within her hospital.
  sports: Betty Gordon enjoys low‑impact fitness, jogging on the Anacostia River Trail and practicing gentle yoga while cheering on the Washington Capitals and occasionally joining a community recreational
    volleyball league on weekends.
  arts: Betty Gordon expresses her creative spirit through watercolor sketches of historic neighborhoods, captures street scenes with a Canon EOS, and finds inspiration in the jazz of Miles Davis, the soul
    of Nina Simone, and the narrative paintings of Jacob Lawrence.
  travel: Betty Gordon’s travel style blends purposeful work trips with personal wanderlust, having completed travel‑nurse assignments in New Orleans and Chicago while dreaming of a cultural pilgrimage
    to Kyoto’s temples and a soul‑refreshing hike in the Blue Ridge Mountains of North Carolina.
  culinary: Betty Gordon experiments in the kitchen by reimagining Southern staples such as gumbo with fresh okra, collard greens simmered with smoked turkey, and sweet potato pie spiced with ginger and
    nutmeg while listening to gospel playlists for rhythm.
  core: Betty Gordon is a curious, solitary nurse‑artist who blends clinical care with creative therapy, navigates finances with occasional chaos, and channels her community‑rooted advocacy into every facet
    of a balanced, yet spontaneously organized life.
background:
  cultural: Betty grew up in District Heights, a close‑knit suburb of Prince George’s County with a vibrant African‑American community. Her family’s roots trace back to the Carolinas, and cultural traditions
    such as storytelling, church gatherings, and celebrations of Juneteenth and Kwanzaa were a staple of her upbringing. The local emphasis on community activism and health equity shaped her early interest
    in nursing, and she often volunteers at neighborhood health fairs that address disparities in chronic disease outcomes. Exposure to the rich artistic scene of the Washington, D.C. area—street murals,
    jazz clubs, and historic museums—fueled her appreciation for visual and musical arts, which she now weaves into her professional life. While she values the collective strength of her community, she
    also cherishes quiet moments for personal reflection and creative expression.
