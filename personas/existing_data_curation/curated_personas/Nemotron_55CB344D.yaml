  hobbies: '[''Sketching'', ''Watercolor Painting'', ''Photography'', ''Reading Fiction and Health Policy Articles'', ''Visiting Art Galleries and Museums'', ''Listening to Jazz, Soul and Gospel Music'',
    ''Cooking Experimental Soul Food'', ''Meditation'', ''Gentle Yoga'', ''Hiking on Local Trails'']'
  career_goals: Betty aims to deepen her nursing expertise while preserving the flexibility she values. Over the next five years she plans to earn a Bachelor of Science in Nursing, obtain certification
    in Art Therapy or Creative Arts in Healthcare, and develop a hospital‑based art‑based wellness program for patients recovering from surgery or chronic illness. She also aspires to take on a charge‑nurse
    or clinical educator role that lets her mentor colleagues and champion health‑equity initiatives for the African‑American community in Prince George’s County. Additionally, she is exploring travel‑nurse
    assignments that offer varied clinical experiences and the chance to explore new regions.
