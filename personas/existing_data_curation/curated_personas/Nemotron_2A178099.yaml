    planning'', ''Community building and consensus facilitation'', ''Cost‑control and ROI analysis'', ''Strategic sustainability initiatives'']'
  hobbies: '[''Vegetable gardening'', ''Woodworking and furniture restoration'', ''Fishing on the Delaware River'', ''Volunteering at a community food pantry'', ''Participation in the local historical society'',
    ''Reading nonfiction (science, engineering, history)'', ''Playing chess at the town club'']'
  career_goals: Brian aims to transition into a regional portfolio leadership role within the next five years, overseeing multiple community associations across the Mid‑Atlantic. He is committed to championing
    sustainable property practices, targeting certifications such as LEED for existing buildings and expanding green retrofits across his managed assets. Brian also seeks to obtain the Certified Community
    Association Manager (CCAM) designation and to mentor emerging property managers through a formal apprenticeship program at his firm. By the time he approaches retirement, he envisions launching a boutique
    consulting practice that helps small‑town homeowners’ associations adopt technology‑enabled governance and energy‑efficiency solutions.
