  hobbies: '[''Hiking'', ''Fishing'', ''DIY Home Improvement'', ''Strategy Video Gaming'', ''Attending Community Events'', ''Listening to Classic Rock and Country Music'']'
  career_goals: Scott aims to become a licensed real‑estate broker within the next two years and eventually earn the Certified Property Manager (CPM) designation. His ambition is to expand his portfolio
    from single‑family homes to multifamily and mixed‑use developments, with a long‑term goal of founding his own property‑management firm focused on sustainable, technology‑driven communities. He also
    plans to pursue a bachelor’s degree in Business Administration or Real Estate Development to complement his associate degree and to position himself for a regional management role overseeing multiple
    community associations across the Southeast.
