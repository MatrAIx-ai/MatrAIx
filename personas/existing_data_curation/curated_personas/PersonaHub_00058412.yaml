persona_description: A community leader who is passionate about promoting public health and safety, particularly during extreme heat events. This person is knowledgeable about the effects of urban heat
  islands and the importance of community cooling and hydration centers. They are also aware of the need to protect energy and water systems, as well as vulnerable infrastructure. They are dedicated to
  reducing traffic congestion and implementing load restrictions to mitigate the effects of extreme heat on public health. They are interested in learning about the actions communities can take before a
  heat wave and are looking for ways to improve their community's ability to cope with extreme heat.
