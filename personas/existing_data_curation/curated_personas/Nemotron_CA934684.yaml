personas:
  professional: John Boquet, a 47‑year‑old handyman‑turned‑entrepreneur, leverages his seasoned automotive and carpentry expertise, spreadsheet‑driven budgeting, and reputation for on‑time delivery to launch
    a modest home‑improvement side business while pursuing HVAC certification and volunteer firefighter status.
  sports: John Boquet spends his weekends hunting white‑tailed deer in the fall, casting trout lines on the local river during summer, honing his aim at the county target‑shooting range, and avidly follows
    the nearby minor‑league baseball club, the Springfield Cardinals, while occasionally joining a community softball squad.
  arts: John Boquet unwinds by listening to classic country legends like Johnny Cash and folk rocker Bob Dylan, visits local fairs where the blue‑grass band The Creekside Ramblers play, and occasionally
    sketches vintage‑car designs on scrap wood, an outlet that blends his love for history with hands‑on creativity.
  travel: John Boquet prefers practical road trips that combine his hunting hobby with history, such as weekend drives to the Gettysburg battlefield in Pennsylvania and a summer cabin in Maine’s Acadia
    National Park, while dreaming of a dedicated pilgrimage to Normandy’s D‑Day beaches in France when his schedule allows.
  culinary: John Boquet favors hearty, down‑to‑earth fare—smoked venison stew seasoned with rosemary and thyme, a classic Southern BBQ brisket rubbed with paprika and brown sugar, and weekend fish‑and‑chips
    made from his freshly caught trout—cooking with a level‑2 grill and a cast‑iron skillet he built himself.
  core: John Boquet is a methodical, competition‑driven DIY enthusiast who balances community service with a love of vintage cars, hunting, and meticulous budgeting, yet occasionally lets a stubborn streak
    push them into late‑night tool chases.
background:
  cultural: Raised in rural Lincoln County, Oklahoma, John grew up in a close‑knit white community that prized self‑reliance, hard work, and family ties. His family’s roots trace back to German and Irish
    settlers who valued practical skills and church involvement. He attends a local Baptist congregation, participates in regional traditions such as county fairs and community service, and aligns with
    conservative Midwestern values that emphasize responsibility, modesty, and a pragmatic outlook on life.
attributes:
  skills: '[''Automotive Repair'', ''Small‑Engine Maintenance'', ''Basic Carpentry'', ''Home Renovation'', ''Property Maintenance'', ''Budget Management'', ''Logistical Coordination'', ''Spreadsheet Proficiency'']'
  hobbies: '[''Hunting'', ''Fishing'', ''Woodworking'', ''Classic Car Restoration'', ''Target Shooting'', ''County Fair Attendance'', ''Volunteer Fire Department Activities'', ''Historical Nonfiction Reading'']'
  career_goals: John aims to channel his practical skills into a modest home‑improvement side business, obtain a certification in HVAC or small‑engine technology to re‑enter the workforce part‑time, and
    become a certified volunteer firefighter. He also hopes to mentor younger community members in DIY projects, secure financial stability for his family, and eventually transition into a semi‑retired
    role that balances income generation with community service.
