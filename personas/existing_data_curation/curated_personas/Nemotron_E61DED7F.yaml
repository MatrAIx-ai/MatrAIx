personas:
  professional: Jimmie Harris, a veteran cost estimator with over four decades of experience in commercial and infrastructure budgeting across the Mid‑Atlantic, blends a rigorously data‑driven methodology
    with a willingness to improvise on the fly, and they now mentor junior estimators while preparing to launch a part‑time consulting practice that captures their competitive drive and love for structured
    problem solving.
  sports: Jimmie Harris balances a love of low‑impact exercise with passionate fandom, rising before sunrise to cast a fly on the Patapsco River for hours, joining a senior walking club on weekends, and
    cheering for the Baltimore Ravens, the Baltimore Orioles, and the Washington Capitals; they occasionally play informal chess‑themed team events that they consider a mental sport, but they admit to letting
    their competitive nature sometimes outweigh the enjoyment of leisurely activity.
  arts: Jimmie Harris weaves artistic appreciation into daily life, crafting custom furniture that echoes the clean lines of mid‑century modern design while listening to the folk storytelling of Johnny
    Cash and the lyrical poetry of Bob Dylan, attending local historical reenactments and the occasional community theater production of "The Crucible", and they keep a small collection of Winslow Homer
    prints that inspire their woodworking motifs.
  travel: Jimmie Harris favors historically rich destinations that combine careful planning with spontaneous side trips, having road‑tripped the Blue Ridge Parkway, explored Colonial Williamsburg, toured
    Gettysburg’s battlefield, and spent a week in Edinburgh to trace Civil War connections in Scottish archives; they prefer modest accommodations and a detailed itinerary but often allow a few unplanned
    stops to sample local eateries, all while balancing a modest travel budget and family obligations.
  culinary: Jimmie Harris enjoys a palate rooted in Mid‑Atlantic flavors, regularly preparing Maryland crab cakes seasoned with Old Bay, grilling trout on cedar planks brushed with lemon‑dill butter, and
    baking sourdough bread that showcases their precise measurement skills; they relish a side of collard greens cooked with smoked turkey and often finish meals with a glass of dry sherry, yet they admit
    to occasionally over‑salting dishes when caught up in the excitement of a new woodworking project.
  core: Jimmie Harris is a meticulous cost‑estimator‑turned‑woodworker who still counts screws like line items, channeling a competitive streak into chess and fly‑fishing, while balancing a love for structure
    with spur‑of‑the‑moment creativity, and they occasionally let perfectionism delay finishing a project.
background:
  cultural: Jimmie was raised in a middle‑class, white family in Baltimore County during the 1960s and 70s. His parents, of English‑Irish ancestry, emphasized self‑reliance, hard work, and community service.
    He attended public schools and earned a STEM bachelor’s degree at a state university. The region's mix of suburban stability and proximity to Baltimore’s industrial heritage fostered a pragmatic outlook,
    valuing both tradition and innovation. His cultural upbringing prizes independence, punctuality, and a modest, no‑nonsense approach to life, while also encouraging participation in local civic activities
    and lifelong learning.
attributes:
  skills: '[''Construction cost estimating'', ''Quantitative analysis'', ''Project budgeting'', ''Blueprint reading'', ''Advanced Excel modeling'', ''Cost‑estimating software (RSMeans, Sage)'', ''Risk assessment'',
    ''Negotiation'', ''Process optimization'', ''Mentoring junior staff'', ''Critical data review'']'
  hobbies: '[''Woodworking'', ''Fly fishing'', ''Local history research and presentations'', ''Chess'', ''Model airplane building'', ''Gardening'', ''Volunteer budgeting workshops'']'
  career_goals: Approaching retirement, Jimmie aims to transition from full‑time estimating to a part‑time consulting role where he can mentor the next generation of cost professionals and share his extensive
    knowledge through workshops and authored guides. He hopes to publish a practical handbook on cost‑estimating best practices that blends structured methodologies with flexible, on‑the‑spot problem solving.
    Additionally, he aspires to earn recognition from professional societies such as the Association for the Advancement of Cost Engineering, reflecting his competitive spirit and desire to leave a lasting
    legacy in the field.
