personas:
  professional: Jalen Conner, a 42-year-old museum professional, they merge graduate business training with meticulous archival expertise, steering collection management, digital migration, and narrative-driven
    exhibition design while applying competitive, data-oriented budgeting and grant-writing strategies to secure sustainable funding for community-focused programming.
  sports: Jalen Conner, an energetic community basketball player for the Prince George’s Hoops league, they also jog three times weekly with the Capitol Run Club, passionately follow the Washington Wizards,
    Washington Capitals, and DC United, and channel competitive drive into seasonal pick-up games and charity tournaments that blend fitness with neighborhood outreach.
  arts: Jalen Conner, a museum curator, they weave their love of John Coltrane’s A Love Supreme, the National Symphony Orchestra’s performances, and Viola Davis’s film roles into public programming that
    celebrates local gospel choirs, spoken-word poets, and the vibrant storytelling traditions that echo church gatherings and barbershop dialogues.
  travel: Jalen Conner, a methodical traveler, they plan detailed itineraries for historic pilgrimages to sites like the Natchez Trace Parkway, spend months researching archival material in Savannah’s historic
    district, and annually explore Accra, Ghana to trace genealogical roots, all while balancing travel costs with family responsibilities and grant-related budgeting constraints.
  culinary: Jalen Conner, an avid home chef, they perfect soulful dishes such as collard greens simmered with smoked turkey, sweet potato pie, and shrimp and grits, source heirloom produce from the local
    community garden, experiment with sous-vide techniques for weekend brunches, and occasionally overindulge in fried chicken during family reunions, showcasing both culinary pride and a penchant for indulgent
    comfort food.
  core: Jalen Conner is a structured, sociable museum leader, they channel competitive ambition into community storytelling, mitigate stress through running and basketball, and balance meticulous budgeting
    with a love for hearty soul food.
background:
  cultural: Jalen is an African American raised in Prince George's County, a region steeped in Black history and community activism. His grandparents migrated from the rural South during the Great Migration,
    bringing stories of resilience and civil‑rights engagement that shaped his family values. Growing up, he was immersed in church gatherings, barbershop discussions, and local cultural festivals that
    celebrated African American art, music, and cuisine. This heritage fuels his dedication to preserving Black historical narratives and fostering cultural pride through his museum work.
