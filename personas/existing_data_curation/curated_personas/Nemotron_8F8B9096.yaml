  career_goals: Jalen aims to rise to a senior curatorial leadership role, ultimately becoming the director of a regional museum that foregrounds African American history and culture. He plans to expand
    the institution’s digital archives, making primary sources accessible to scholars and community members alike. Securing multi‑year grants for traveling exhibitions and sustainability initiatives is
    a priority, as is developing mentorship programs that open museum careers to underrepresented youth. He also wants to champion collaborative projects with local schools and cultural organizations, positioning
    the museum as a central hub for community learning and pride.
