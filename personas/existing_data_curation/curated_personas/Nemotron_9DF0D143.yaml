personas:
  professional: Sarah Pollock is an organized 8‑year‑old student who excels at storytelling, LEGO construction, and disciplined piano practice, channeling their love of structure into school projects, Girl
    Scout badge plans, and early leadership roles in classroom group work.
  sports: Sarah Pollock loves structured play, spending weekends on the field with the Maryville Youth Soccer Club— the Maryville Mavericks—while cheering for the Nashville Predators and the Tennessee Titans,
    and they follow a simple fitness routine of daily nature hikes and weekly basketball practice that satisfies their need for clear rules and measurable progress.
  arts: Sarah Pollock expresses creativity through piano lessons of Beethoven’s 'Für Elise' and singing along to Disney’s Frozen soundtrack featuring Idina Menzel, while also collecting stickers of Taylor
    Swift and Lin‑Manuel Miranda and spending free time drawing detailed sketches of the Great Smoky Mountains that they proudly display on their bedroom wall.
  travel: Sarah Pollock prefers family‑guided trips that blend adventure with comfortable routines, often planning hikes in the Great Smoky Mountains with a printable checklist, dreaming of future visits
    to Washington, D.C.’s museums and Disney World’s Magic Kingdom, and they rely on a modest travel savings jar funded by birthday money to make each trip possible.
  culinary: Sarah Pollock enjoys hearty Southern flavors like fried chicken, mac and cheese, and peach cobbler, often helping to stir homemade chocolate‑chip cookie dough with raisins and oatmeal and prides
    themselves on perfectly buttering a biscuit, while they also love swapping snacks with friends at school, especially gummy bears and apple slices.
  core: Sarah Pollock is a meticulous 8‑year‑old who turns every activity into a checklist, occasionally loses track of time daydreaming about dragons while they hoard crayons like treasure.
background:
  cultural: Sarah comes from a white, Southern family rooted in Maryville, Tennessee. Her upbringing reflects the close‑knit small‑town atmosphere of Blount County, where community events like the county
    fair, church gatherings, and family barbecues are a regular part of life. She often visits the nearby Great Smoky Mountains with her family, fostering an appreciation for the natural landscape of the
    region. Local traditions such as celebrating holidays with hearty Southern foods and attending Sunday services at her church shape her values of community, responsibility, and modest ambition. Although
    she is influenced by these regional customs, Sarah’s personality adds a disciplined, organized perspective to her everyday experiences.
attributes:
  skills: '[''Fluent reading (grade‑level)'', ''Basic arithmetic (addition, subtraction, multiplication)'', ''Organizing personal space and schedule'', ''Following multi‑step instructions'', ''Basic computer
    navigation (mouse, keyboard, educational software)'', ''Puzzle solving (jigsaw, logic puzzles)'']'
  hobbies: '[''Reading adventure books'', ''Lego building'', ''Outdoor nature walks and birdwatching'', ''Girl Scouts badge activities'', ''Piano lessons'', ''Playing organized games with clear rules'']'
  career_goals: Sarah often talks about what she wants to be when she grows up. She is most drawn to becoming a veterinarian because she loves animals, enjoys caring for them, and appreciates the clear
    routines and responsibilities the job entails. She also imagines herself as a teacher who can create structured learning environments for younger kids, or as a scientist working in a lab where experiments
    follow precise steps. Her long‑term ambition is to pursue a career that combines her love of living things with her natural desire for organization, achievement, and predictable outcomes.
