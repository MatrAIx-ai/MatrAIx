  hobbies: '[''Gardening (herbs, vegetables, flowers)'', ''Birdwatching and nature walks'', ''Reading classic literature and biographies'', ''Quilting with systematic patterns'', ''Knitting with charted
    designs'', ''Genealogy research'', ''Baking bread'', ''Quiet choir singing at church'']'
  career_goals: Although Marcia is no longer part of the formal workforce, she aims to stay physically independent and healthy, preserve her family’s legacy by compiling recipes, stories, and a memoir for
    future generations, mentor younger community members in quilting and sewing, expand the local garden club’s educational programs, and continue volunteering at the senior center and library where she
    can apply her organizational talents. She also aspires to create a small community archive of local history, ensuring that the heritage of Lebanon, MO, is documented and celebrated.
