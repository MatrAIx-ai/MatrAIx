personas:
  professional: Arturo Alonso is an aspiring architect and story‑crafter who transforms LEGO sets into imagined cityscapes, using the logic of model kits and the imagination of fantasy graphic novels to
    design miniature worlds, while balancing a natural desire for structure with a delightfully scattered approach that keeps his notebooks a charming mess.
  sports: Arturo Alonso enjoys leisurely hikes along the winding paths of Hyde Park and participates in a community youth soccer program with the Riverview Junior Rangers, cheering for Arsenal FC on weekends,
    but prefers the quiet of nature over high‑intensity competition, often opting for a solitary jog rather than a team workout.
  arts: Arturo Alonso immerses themselves in the world of visual storytelling, sketching cartoon characters inspired by Osamu Tezuka and creating nature studies while listening to the soothing piano of
    Ludovico Einaudi; they devour graphic novels such as "Bone" and "Amulet" and spend Saturday afternoons at the local kids' art club, where their imagination fuels both elaborate LEGO dioramas and hand‑drawn
    comic strips.
  travel: Arturo Alonso loves low‑key family outings that blend exploration with comfort, having trekked the historic corridors of the Tower of London and day‑tripped to the seaside town of Brighton; they
    dream of hiking the misty trails of the Lake District and visiting the Louvre in Paris, but they favor meticulous itinerary maps drawn on paper over spontaneous trips, often worrying about missing schoolwork.
  culinary: Arturo Alonso prefers simple, handheld meals that keep their hands free for building, favoring cheese‑laden pizza slices, a classic peanut butter and apple combo, and the occasional homemade
    granola bar made with oats, honey, and raisins, while their budding kitchen confidence is evident in their ability to whisk together scrambled eggs with a pinch of cheddar.
  core: Arturo Alonso is a quietly curious 10‑year‑old who builds fantastical LEGO worlds, sketches solitary nature scenes, and navigates a gentle anxiety that fuels both meticulous planning and a love
    for solitary adventures.
background:
  cultural: Arturo comes from a Mexican‑American family that speaks Spanish at home and celebrates traditional holidays such as Día de los Muertos, Cinco de Mayo, and Christmas with Mexican customs. While
    living in rural Utah, he blends his Latino heritage with the local ranching culture, often helping his family prepare meals like tamales or enchiladas and attending local community events. His family
    places a high value on close‑knit relationships, respect for elders, and the sharing of cultural stories and music.
