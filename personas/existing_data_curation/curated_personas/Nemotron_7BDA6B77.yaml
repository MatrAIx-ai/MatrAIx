  career_goals: Arturo dreams of becoming an engineer or a software developer so he can design tools and structures that make everyday life more organized and peaceful. He is fascinated by how things work
    and hopes to create sustainable, quiet spaces for his community. He also imagines helping others by building educational apps that teach kids math and science in a fun, structured way.
