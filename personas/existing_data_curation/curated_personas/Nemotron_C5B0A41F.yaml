  career_goals: Jonah aims to transition from an individual sales representative to a senior sales manager or regional trainer within the next three years, where he can mentor younger reps and shape sales
    strategies. He is focused on achieving a stable, commission‑driven income that will secure his retirement while allowing him a flexible schedule to reduce stress. He also aspires to develop a consultancy
    niche that helps small manufacturers modernize their sales processes, blending his practical experience with his curiosity for new sales technologies. Ultimately, Jonah wants to leave a legacy of balanced,
    ethical sales practices that prioritize both client success and personal well‑being.
