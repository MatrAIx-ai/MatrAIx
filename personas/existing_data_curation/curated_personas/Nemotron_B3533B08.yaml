personas:
  professional: Yen Dong, an 11‑year‑old budding digital artist and aspiring game developer, channels their methodical planning and love of storytelling into creating simple games on Scratch, while their
    sociable, talkative personality makes them a natural leader in school art clubs.
  sports: Yen Dong plays forward for the Miami Fusion Youth Soccer Club, cheerfully follows the Miami Heat and Inter Miami CF, and spends summer weekends at the Everglades for kayaking, all while using
    a colorful fitness tracker to log weekly mile goals and indulging in occasional friendly basketball shoot‑outs at the neighborhood park.
  arts: Yen Dong, an enthusiastic sketcher of Miami’s skyline, devotes free time to digital painting with Procreate, revels in graphic novels like 'Dog Man' and 'Adventure Time', and regularly attends exhibitions
    at the Pérez Art Museum Miami, drawing inspiration from street‑artist Banksy and animator Hayao Miyazaki.
  travel: Yen Dong dreams of snorkeling in the Florida Keys, has already explored Little Havana’s salsa festivals and the Everglades National Park, and keeps a decorated scrapbook of tickets from a family
    weekend trip to Washington, D.C., while planning a future visit to a lantern festival in Taiwan to practice calligraphy with local artists.
  culinary: Yen Dong loves munching on homemade dumplings and fried rice during Lunar New Year, eagerly helps their parents craft Cuban sandwiches and mango smoothies on weekends, and proudly boasts a growing
    skill at stir‑frying shrimp with garlic and chilies, though they sometimes over‑season their experiments.
  core: Yen Dong blends meticulous planning with a boundless curiosity, leading school art projects, juggling soccer practice and calligraphy, while occasionally forgetting homework in the excitement of
    a new graphic novel release.
background:
  cultural: Yen comes from an East Asian family, likely Chinese, and is raised in a bilingual household in Miami, Florida. At home, she observes traditional celebrations such as Lunar New Year, enjoys family
    meals featuring classic Asian dishes, and practices Mandarin language skills. Living in Miami exposes her to a vibrant, multicultural environment—Latin music, Caribbean cuisine, and diverse community
    festivals—shaping a hybrid cultural identity that values both her ancestral traditions and the dynamic, inclusive spirit of her city.
attributes:
  skills: '[''Digital illustration'', ''Traditional drawing'', ''Basic Scratch programming'', ''Public speaking'', ''Event planning'', ''Bilingual communication (English & Mandarin)'']'
