    at community events'']'
  career_goals: Yen aspires to become a visual storyteller who blends art and technology to share diverse cultural narratives. She dreams of studying graphic design or animation, creating her own comic
    series, and eventually leading community art workshops that celebrate both her East Asian heritage and Miami's multicultural vibe. Her long‑term ambition is to use her creative talents to inspire peers
    and foster cross‑cultural understanding.
