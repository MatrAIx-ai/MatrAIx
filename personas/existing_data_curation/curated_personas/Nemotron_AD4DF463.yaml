  hobbies: '[''drawing with crayons and markers'', ''listening to and singing children’s songs'', ''dancing to music'', ''preschool art and movement classes'', ''collecting leaves and watching butterflies'',
    ''building sandcastles'', ''storytime in English and Spanish'', ''make‑believe play with peers'', ''organizing group projects'']'
  career_goals: Even at four, Adriana dreams about future roles that combine her love of art, helping others, and caring for living things. She often says she wants to become a teacher so she can share
    books and crafts with friends, an artist who creates colorful paintings, or a veterinarian to look after animals. She also expresses a wish to travel and explore new places, reflecting her curiosity.
    Alongside these ambitions, she hopes to learn simple breathing exercises to calm herself when she feels worried or stressed.
