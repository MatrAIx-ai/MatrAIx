personas:
  professional: Adriana Urrego, a four-year-old preschool project manager, loves organizing block-building sessions, leads the classroom’s mini-science fair, and implements step-by-step plans for every
    group activity, turning curiosity into tiny experiments while they occasionally fret over misplaced crayons.
  sports: Adriana Urrego darts around the local community center's toddler soccer program, proudly wears the Little Leaguers jersey, chants for the New York Yankees during family game nights, participates
    in weekly parent-guided dance classes, and they insist on a post-play water break to calm occasional worries about staying hydrated.
  arts: Adriana Urrego spends afternoons finger-painting with Crayola colors, delights in the whimsical world of Sesame Street's Elmo, can recite the chorus of Let It Go from Disney's Frozen, admires the
    bright abstract shapes of Joan Miró in a children's art book, and they channel their curiosity into vibrant creations, often humming tunes as they work.
  travel: Adriana Urrego loved the short road trip to the nearby aquarium in Monterey, now dreams of visiting the towering Eiffel Tower in Paris, prefers meticulously planned itineraries with snack breaks,
    but they sometimes feel uneasy boarding a plane, leading their parents to pack her favorite stuffed rabbit for comfort.
  culinary: Adriana Urrego enjoys helping stir batter for banana muffins, loves the sweet aroma of cinnamon rolls topped with powdered sugar, insists on adding a pinch of chocolate chips to her mac and
    cheese, proudly identifies spaghetti with meatballs as her favorite dish, and they often request extra grated Parmesan on the side.
  core: Adriana Urrego is a bright, methodical four-year-old who transforms everyday play into organized experiments, hoards stickers like treasure, worries about lost crayons, and they constantly seek
    new colors, sounds, and friends to explore.
background:
  cultural: Adriana is raised in a Mexican‑American household in Panama City, Florida. Spanish is spoken at home, and she celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo, and family
    gatherings featuring tacos, tamales, and aguas frescas. Her family maintains ties to Mexican cultural music and dance, and she occasionally attends community dances where she learns folkloric steps.
    At the same time, she participates in local Florida customs, like beach outings and pumpkin patches, blending both her Mexican heritage and her Floridian environment into a vibrant, bilingual upbringing.
attributes:
  skills: '[''counting to twenty'', ''recognizing shapes and colors'', ''letter identification in Spanish and English'', ''drawing simple pictures'', ''using safety scissors'', ''building block structures'',
