  career_goals: Narayan plans to enroll in a community‑college associate program in Computer Science, aiming to transfer to a four‑year university and become a software engineer. He is attracted to entry‑level
    developer or IT support roles that provide clear, structured tasks and allow him to collaborate with teammates, which satisfies his desire for predictability and his cooperative nature. To manage financial
    stress, he intends to earn a web‑development certification so he can take on freelance projects for local South‑Asian businesses, giving him a flexible schedule and a way to support his family. In the
    long term, he hopes to combine his technical skills with community service, perhaps by teaching coding workshops at local cultural centers or creating user‑friendly tech solutions for non‑profits.
