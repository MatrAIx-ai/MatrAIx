persona_description: A researcher and policy advocate who specializes in the impact of COVID-19 on women workers in the horticulture sector, focusing on their social, economic, and psychological impacts.
  They are knowledgeable about the current situation in the horticulture sector, the policies, legal, and advocacy actions recommended by the study, and the role of civil society organizations in responding
  to the situation. They are skilled in conducting research, analyzing data, and presenting findings in a clear and concise manner. They are passionate about promoting gender equality and social justice,
  and are committed to advocating for the rights of women workers in the horticulture sector.
