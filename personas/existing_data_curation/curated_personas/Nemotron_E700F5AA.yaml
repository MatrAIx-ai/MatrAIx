personas:
  professional: Gabriel Perezgarcia, a senior project manager with a knack for orchestrating complex technical and infrastructure initiatives, leverages Agile, Lean Six Sigma, and advanced data‑visualization
    tools to keep budgets and timelines razor‑sharp—while their competitive drive and love of public speaking turn every stakeholder meeting into a strategic performance.
  sports: Gabriel Perezgarcia, a devoted soccer enthusiast, coaches the Kingsmen Youth League on Saturdays, cheers for D.C. United and keeps a close eye on Ecuador’s national team during World Cup qualifiers,
    and fits early‑morning trail runs into the week while sporting the official caps of both his favorite MLS side and the local community club.
  arts: Gabriel Perezgarcia, an avid acoustic‑guitar player, performs at neighborhood open‑mic nights covering Rodrigo y Gabriela and Neil Young, indulges in live shows featuring local folk groups like
    The Duhks, and curates his urban photography collection with images of the Capitol’s marble columns and Georgetown’s brick alleys, all of which feed his creative outlet between project deadlines.
  travel: Gabriel Perezgarcia, an adventurous planner, has trekked the Andes of Quito, explored the historic streets of Cartagena, hiked the Blue Ridge Mountains and regularly escapes to the Chesapeake
    Bay for weekend kayaking, while dreaming of a future road‑trip across Patagonia’s glaciers and a cultural immersion in Japan’s Kyoto temples.
  culinary: Gabriel Perezgarcia, a culinary enthusiast, delights in preparing ceviche, empanadas de queso, and arroz con menestra for family gatherings, masters the perfect chimichurri‑marinated steak on
    his grill, and pairs these dishes with an occasional craft IPA brewed from locally sourced hops, though he often under‑estimates the simmer time for his signature salsa verde.
  core: Gabriel Perezgarcia blends meticulous project leadership with a gregarious, talk‑filled presence, a competitive edge, and a habit of over‑scheduling, while secretly battling a sweet‑tooth craving
    that leads to late‑night snacking despite a strict health regimen.
background:
  cultural: Gabriel was born to Ecuadorian immigrant parents who settled in Miami before moving to the DC Metro area when he was a teenager. He grew up bilingual, speaking Spanish at home while attending
    English-language schools, giving him a deep appreciation for both Ecuadorian traditions—such as Carnaval, traditional music, and family communal meals—and American values of individualism and civic
    engagement. His heritage instilled a strong sense of family loyalty, respect for elders, and community service, which he carries into his professional life through collaborative leadership and mentorship.
    He remains active in the Ecuadorian diaspora, participating in cultural festivals, supporting new immigrants, and maintaining ties with relatives in Quito and Guayaquil.
