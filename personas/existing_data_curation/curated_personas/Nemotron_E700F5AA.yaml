  career_goals: He aims to transition into a senior strategic role, such as Director of Project Management Office (PMO) or Program Director, overseeing multi-year, multimillion-dollar initiatives that integrate
    emerging technologies like AI-driven analytics. He plans to earn the Program Management Professional (PgMP) and Certified Scrum Professional credentials, expand his influence by speaking at industry
    conferences, publishing case studies, and mentoring emerging project managers, especially from underrepresented backgrounds. Over the next five years, he envisions establishing a consultancy that helps
    organizations adopt agile-lean practices while fostering inclusive, high-performing project teams.
