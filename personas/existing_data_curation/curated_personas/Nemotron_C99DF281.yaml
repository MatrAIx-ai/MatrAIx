  career_goals: Hilda aims to transition into a senior creative leadership role within the next five years, ideally as an art director or lead UX designer at an agency that values data-driven storytelling.
    She hopes to mentor junior designers, spearhead cross-disciplinary projects that blend environmental data with visual communication, and eventually launch a boutique studio that offers sustainable branding
    services to local marine-conservation nonprofits. Balancing curiosity for emerging design tools with a pragmatic focus on client outcomes, she seeks positions that allow her to maintain a stable work-life
    rhythm while continuing to expand her technical repertoire.
