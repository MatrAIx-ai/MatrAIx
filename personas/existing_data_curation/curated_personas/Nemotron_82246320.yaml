personas:
  professional: Anthony Mueller is a veteran food‑service professional with over three decades of hands‑on experience in commercial kitchens, and they leverage their ServSafe certification, meticulous inventory
    control, and methodical staff training to maintain consistent quality while quietly pursuing a kitchen manager role to embed sustainable, farm‑to‑table practices.
  sports: Anthony Mueller is a loyal fan of the Dallas Cowboys and Houston Astros, participates in a local fishing club that meets at the Guadalupe River, and they play occasional weekend rounds of golf
    at the Schertz Country Club, preferring low‑impact, solitary exercise over crowded gyms.
  arts: Anthony Mueller finds creative escape in classic Western films, enjoys the storytelling of Willie Nelson and George Strait, attends community theater productions like "The Best Little Whorehouse
    in Texas," and they devour historical biographies by authors such as David McCullough, weaving these influences into a quiet appreciation for the arts.
  travel: Anthony Mueller favors road‑trip getaways across Texas, regularly revisiting Hill Country towns like Lockhart and Luling for their famed barbecues, dreams of a guided fishing expedition on the
    Colorado River’s high desert canyons, and they plan a cultural pilgrimage to Marfa’s contemporary art installations, all while balancing travel with family and budget constraints.
  culinary: Anthony Mueller is a barbecue enthusiast who perfects Texas‑style brisket with mesquite wood, crafts signature rubs of smoked paprika, brown sugar, garlic, and onion, seasons home‑grown tomatoes
    and peppers into fresh side dishes, volunteers their culinary expertise at the local food bank, yet they occasionally over‑season to the point of masking subtle flavors.
  core: Anthony Mueller is a methodical, reserved culinary veteran whose quiet curiosity fuels a devotion to Texas‑style barbecue, meticulous kitchen operations, and a balanced life of fishing, gardening,
    and community service, and they temper this dedication with occasional splurges on grill gear.
background:
  cultural: Anthony was born and raised in the suburban outskirts of Schertz, Texas, into a family of German‑American heritage that values hard work, self‑reliance, and community. Growing up in a predominantly
    white, middle‑class neighborhood, he absorbed the Southern hospitality and Texas culinary traditions—especially barbecue, Tex‑Mex, and comfort food. His upbringing was shaped by a close‑knit Protestant
    church, which reinforced a strong sense of family, modesty, and service. While he respects the multicultural fabric of Texas, his identity remains rooted in the conservative, family‑oriented values
    typical of his community. The region's emphasis on practical skills and modest ambition has guided both his career in food preparation and his personal interests.
attributes:
  skills: '[''Grilling and baking techniques'', ''Food safety compliance (ServSafe certified)'', ''Menu planning and development'', ''Inventory management and cost control'', ''Recipe standardization'',
