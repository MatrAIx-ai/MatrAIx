personas:
  professional: Janele Cheely, a 19‑year‑old warehouse associate in Knoxville, blends solid material‑handling expertise—from OSHA‑certified forklift operation to inventory cycle counts—with an insatiable
    curiosity that drives them to tinker with equipment fixes and explore logistics theory, positioning them for a swift rise to shift‑lead supervision.
  sports: Janele Cheely, a fitness‑mindful Knoxville native, follows the Tennessee Volunteers football and the local Knoxville Ice Bears hockey teams, participates in the Ijams Nature Center hiking club
    on weekends, and squeezes in weight‑training sessions at the community gym to stay strong for demanding warehouse work.
  arts: Janele Cheely, an avid lover of neo‑soul and modern jazz, regularly streams Erykah Badu, Kamasi Washington, and Robert Glasper at after‑school volunteer sessions, while losing themselves in science‑fiction
    novels by Neal Stephenson and mystery thrillers by Gillian Flynn, and occasionally experiments with smartphone editing to turn wildlife photos into visual poetry.
  travel: Janele Cheely, whose wanderlust balances weekend road trips to Asheville’s Blue Ridge trails and a bucket‑list desire to photograph Icelandic puffins, plans a future study‑abroad semester in Kyoto
    to explore Japanese culinary traditions, all while budgeting travel expenses through a dedicated trip fund.
  culinary: Janele Cheely, a budding home chef, perfects Southern comfort staples like collard greens seasoned with smoked paprika and sweet‑potato casserole topped with a drizzle of maple‑infused bourbon,
    while constantly searching online for exotic spice blends such as sumac and berbere to reinvent classic dishes.
  core: Janele Cheely, a solitary yet curious 19‑year‑old, merges warehouse grit with artistic flair, budgeting prudently while chasing wildlife photography, late‑night jam sessions, and dreams of running
    a community‑focused freight business.
background:
  cultural: Janele grew up in a close‑knit African‑American family in the Southside of Knoxville, where church gatherings, family meals, and community events have shaped her values. Her heritage blends
    the rich traditions of Southern Black culture—such as gospel music, storytelling, and a deep respect for elders—with the broader Appalachian influences of her hometown. She draws strength from the legacy
    of civil‑rights activism in Tennessee, and she feels a responsibility to give back to the neighborhood that supported her upbringing. While she embraces contemporary music and fashion, she also loves
    passing down recipes and customs from her grandparents, keeping her cultural roots alive in everyday life.
attributes:
  skills: '["Material handling and pallet jack operation","OSHA‑certified forklift operation","Inventory organization and cycle counting","Basic warehouse management software (Excel, handheld scanners)","Mechanical
    troubleshooting of loading equipment","Teamwork and safety communication","Time‑management and shift scheduling"]'
  hobbies: '["Nature walks and wildlife photography","Reading science‑fiction and mystery novels","Cooking Southern comfort food with creative twists","Attending small local jam sessions (neo‑soul, jazz)","Volunteering
    at an after‑school program (math and computer tutoring)"]'
  career_goals: Janele aims to obtain a professional forklift certification and then move into a supervisory role as a warehouse shift lead within the next two years. She plans to enroll in a community‑college
    logistics program to earn an associate degree in supply‑chain management, which will position her for a future transition to a logistics coordinator position. Long‑term, she hopes to combine her hands‑on
    experience with formal training to eventually manage a small freight‑service business that serves local businesses in Knoxville while providing stable employment for her family and community.
