  career_goals: Short‑term, Edner aims to earn OSHA and advanced forklift certifications, cross‑train in inventory management, and move into a lead material‑mover role within the next year. He hopes to
    become a shift supervisor within two to three years, leveraging his organizational strengths and compassionate leadership style. Long‑term, he envisions a warehouse manager position or a logistics coordinator
    role that allows him to design more efficient, worker‑friendly processes. Ultimately, he dreams of launching a small community‑focused moving or delivery service that can provide reliable jobs and support
    local charitable initiatives.
