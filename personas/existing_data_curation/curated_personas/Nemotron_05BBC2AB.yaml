personas:
  professional: Alia Coney, a 25‑year‑old computer systems analyst in the Bronx, merges rigorous data modeling, Python automation, and Tableau dashboard design with a spontaneous, visual‑first mindset,
    and they turn complex business workflows into colorful, user‑friendly wireframes often sketched on a tablet mid‑meeting.
  sports: Alia Coney enjoys early‑morning runs through Pelham Bay Park, participates in a co‑ed kick‑boxing class at the Bronx Community Gym, and fervently supports the New York Yankees, New York Knicks,
    and New York Giants, and they use a fitness tracker to log steps and weekend hikes in the Hudson Valley.
  arts: Alia Coney is a regular at the Bronx Museum of the Arts, draws inspiration from muralists like Banksy and JR, creates digital illustrations on Procreate that blend urban motifs with Afro‑Caribbean
    patterns, and they curate vinyl playlists featuring Miles Davis, Marvin Gaye, and Kendrick Lamar to fuel their creative sessions.
  travel: Alia Coney prefers spontaneous weekend trips, often hopping on the Metro‑North to explore the Hudson Valley or catching affordable flights to Caribbean islands such as Jamaica and Puerto Rico
    to sample local cuisine, and they dream of an extended art‑focused tour of Lisbon’s vibrant street‑art districts.
  culinary: Alia Coney, an enthusiastic home cook, masters jerk chicken with fiery Scotch bonnet pepper and fragrant rice‑and‑peas, experiments with fusion dishes like kimchi‑infused plantain chips and
    mango‑coconut salsa, and they delight in discovering food trucks offering empanadas, bao buns, and specialty coffee.
  core: Alia Coney is a creatively driven systems analyst who navigates the Bronx’s art‑filled streets with spontaneous energy, balances intense bouts of anxiety with daily meditation, a love for vinyl
    jazz, and a habit of sketching every mural they pass.
background:
  cultural: Alia is a second‑generation African‑American born and raised in the Bronx, with her mother’s family tracing roots to Jamaica and her father’s lineage to the southern United States. Growing up
    in a predominantly Black and Caribbean‑rich community, she was immersed in a mix of cultural traditions—Sunday gospel services at her local church, family gatherings centered around soulful food, and
    the rhythmic beats of reggae, dancehall, and hip‑hop that echo through the borough’s streets. The Bronx’s storied history of artistic expression, from graffiti murals to the birth of hip‑hop, shaped
    her appreciation for visual and musical art forms. She actively participates in community events such as the annual Bronx Caribbean Festival and Juneteenth celebrations, and volunteers with local youth
    programs that promote STEM education for Black students. Alia’s heritage informs her drive to create inclusive tech solutions that reflect the diversity of her neighborhood, and she proudly identifies
    as a Black woman in technology, using her background as a source of strength and motivation.
attributes:
  skills: '[''System analysis and workflow mapping'', ''Requirements gathering and user story creation'', ''SQL database design and management'', ''Python scripting for automation'', ''PowerShell system
    administration'', ''Data visualization with Tableau and Power BI'', ''Network troubleshooting and basic Cisco configuration'', ''Cybersecurity awareness and vulnerability scanning'', ''UI/UX wireframing
    and design thinking'', ''Stakeholder communication and conflict mediation'', ''Cultural competency in tech solutions'', ''Flexible Kanban project management'']'
  hobbies: '[''Visiting the Bronx Museum of the Arts and street‑mural tours'', ''Digital illustration with Procreate'', ''Urban photography'', ''Creative writing and personal journaling'', ''Listening to
    jazz, soul, and hip‑hop vinyl'', ''Cooking Caribbean and fusion dishes'', ''Mentoring youth through library coding workshops'', ''Attending cultural festivals (Juneteenth, Puerto Rican Day Parade, Caribbean
    Carnival)'', ''Spontaneous neighborhood walks and food‑truck explorations'', ''Mindfulness meditation and yoga'']'
  career_goals: Alia aims to deepen her technical expertise while merging her love for art and community impact. In the next two years she plans to earn the AWS Solutions Architect Associate certification
    and complete a bachelor’s degree in information systems, using her associate credits. She also intends to secure a senior systems analyst role that lets her lead cross‑functional projects focused on
    AI‑driven analytics for local public‑service agencies. A key ambition is to launch a mentorship program that connects Black high‑school students in the Bronx with tech internships, leveraging her own
    journey as a role model. Long‑term, Alia envisions becoming a solutions architect or product manager who spearheads socially‑focused tech products, such as an AR experience that brings Bronx street‑art
    stories to life. She hopes to speak at industry conferences about the intersection of technology, creativity, and Black cultural identity, and eventually start a venture that uses interactive media
    to empower underrepresented communities.
