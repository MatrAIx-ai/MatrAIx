personas:
  professional: David Coss is a data-driven business analyst who leverages advanced Excel, SQL, and Power BI to turn complex datasets into strategic insights, while their competitive edge and skeptical
    mindset push them to rigorously question assumptions and deliver actionable recommendations in fast‑moving cross‑functional projects.
  sports: David Coss is an avid intramural basketball point guard and soccer winger in the Bethpage community league, a devoted fan of the New York Knicks, New York Giants, and Long Island Nets, and they
    channel their competitive drive into coaching a youth soccer program while keeping fit through weekly pickup games and occasional weekend hikes.
  arts: David Coss enjoys immersing themselves in the local arts scene, from cheering on The Strokes at Brooklyn venues and discovering indie folk acts like The Lumineers at the neighborhood brewery, to
    winding down with strategy‑heavy board games such as Settlers of Catan and binge‑watching critically acclaimed series like "Succession," all of which fuel their creative problem‑solving at work.
  travel: David Coss balances a love for spontaneous weekend road trips to nearby spots like the Hamptons and a meticulous plan for international adventures, having already explored Dublin during St. Patrick’s
    celebrations and Rome for authentic Italian cuisine, they now aspire to visit Tokyo’s Akihabara district to experience cutting‑edge tech and gaming culture.
  culinary: David Coss is a self‑taught home chef who often crafts a classic pepperoni pizza topped with fresh mozzarella, basil, and a drizzle of olive oil, and they also indulge in comfort foods like
    shepherd’s pie and experiment with sushi rolls featuring tuna, avocado, and spicy mayo, reflecting a palate that blends suburban comfort with adventurous flavors.
  core: David Coss is a competitively driven data analyst who balances a thorough analytical approach with a penchant for high‑stakes trivia, pizza nights, and an ever‑present undercurrent of anxiety that
    fuels both their meticulous work ethic and occasional over‑thinking.
background:
  cultural: David was raised in a middle‑class, white family on Long Island, where suburban values of hard work, punctuality, and community involvement were emphasized. His family’s heritage includes Irish
    and Italian roots, reflected in occasional celebrations of St. Patrick’s Day and traditional Italian holiday meals. Growing up near New York City exposed him to a diverse cultural tapestry, fostering
    an appreciation for varied perspectives while maintaining the close‑knit, neighborly spirit of Bethpage. This blend of suburban stability and metropolitan openness shapes his outlook on collaboration,
    competition, and personal ambition.
