  career_goals: David aims to become a senior management analyst within the next five years, overseeing enterprise‑wide strategic initiatives and mentoring junior analysts. He plans to earn a professional
    certification such as PMP or CFA and eventually pursue an MBA to broaden his strategic perspective. His long‑term ambition is to transition into a director‑level role where he can shape corporate strategy
    through data‑driven decision‑making, lead high‑impact projects, and establish a reputation for competitive excellence in benchmarking and risk assessment. He also hopes to develop expertise in predictive
    analytics and machine learning to stay ahead of emerging business trends.
