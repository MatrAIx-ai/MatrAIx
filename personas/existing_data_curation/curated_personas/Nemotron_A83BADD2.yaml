  hobbies: '[''Reading theology'', ''Reading business books'', ''Gardening'', ''Fishing'', ''Woodworking'', ''Small Bible study groups'', ''Listening to country music'', ''Watching classic western films'']'
  career_goals: Manuel aims to strengthen the spiritual and operational health of his congregation, develop a robust lay‑leadership program, expand community‑service initiatives, and eventually serve as
    a regional pastor or denominational resource leader, while maintaining a sustainable financial model for his church.
