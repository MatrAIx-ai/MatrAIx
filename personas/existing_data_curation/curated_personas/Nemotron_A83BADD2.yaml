personas:
  professional: Manuel Damico, a senior pastor who blends sermon preparation, biblical counseling, and strategic church administration, leverages their methodical, routine‑driven mindset to orchestrate
    weekly ministries while fostering lay‑leadership through disciplined small‑group facilitation.
  sports: Manuel Damico, an avid weekend fisherman and member of the Eastside Fly‑Fishing Club, follows the San Antonio Spurs and Dallas Cowboys, and joins a local senior softball league each spring to
    stay active.
  arts: Manuel Damico, a country‑music aficionado who streams Garth Brooks and Johnny Cash, regularly watches classic westerns starring John Wayne and enjoys occasional gospel choir performances at nearby
    churches.
  travel: Manuel Damico, who prefers low‑key pilgrimages and family‑friendly road trips, has explored the Hill Country vineyards of Texas, visited historic Williamsburg, and dreams of a reflective retreat
    in the Scottish Highlands and a pilgrimage to Jerusalem.
  culinary: Manuel Damico, a modest home‑cook, favors hearty dishes like chili con carne, grilled trout with rosemary, and cornbread, and delights in preparing fresh garden salads featuring heirloom tomatoes
    and crisp cucumbers.
  core: Manuel Damico, a routine‑loving pastor who balances meticulous church stewardship with simple pleasures like fishing, classic westerns, and homemade chili, navigates life with quiet reliability
    and a few stubborn budgeting quirks.
background:
  cultural: Manuel was raised in a middle‑class, Anglo‑American family in West Texas, where values of self‑reliance, community service, and traditional Protestant faith were emphasized. His upbringing combined
    elements of Southern hospitality, local agricultural roots, and a strong emphasis on practicality and routine, which continue to shape his worldview and ministry.
