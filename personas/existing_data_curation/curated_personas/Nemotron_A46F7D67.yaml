  hobbies: '[''drawing'', ''LEGO building'', ''listening to music'', ''reading picture books'', ''nature walks'', ''pretend play'', ''watching educational cartoons'', ''simple video games'']'
  career_goals: Ramakrishna dreams of becoming an astronaut who can draw pictures of planets, a painter who creates bright murals, or a scientist who discovers new things. He also imagines teaching younger
    children one day, sharing his love for stories and art. He wants to keep exploring new ideas, stay flexible in his learning, and grow in an environment where he feels safe and supported while pursuing
    these curious ambitions.
