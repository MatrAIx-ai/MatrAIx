persona_description: A researcher at the Centre for Cellular and Molecular Biology (CCMB) in Hyderabad, India, who is conducting a study to assess how long and far the coronavirus can stay in air from an
  infected person. The study aims to strengthen the safety of health workers by understanding the transmission of the virus in the environment. The scientist is interested in the factors that affect the
  spread of the virus and is conducting experiments to determine the distance and duration of its presence in the air. The study is part of the Council of Scientific and Industrial Research (CSIR) and is
  aimed at understanding the criteria for wearing masks and social distancing. The scientist is highly specialized in the field of modern biology and is conducting experiments to understand the transmission
  of the virus in the environment.
