  career_goals: Frank aims to progress to a senior full‑stack developer role within the next two years, eventually moving into a technical lead or architecture position at a defense‑contracting or mid‑size
    software firm in the Fayetteville area. He wants to mentor junior developers, shape product road‑maps that prioritize reliability and practicality, and obtain an AWS Solutions Architect certification
    to broaden his cloud expertise. Leveraging his outgoing personality, he hopes to speak at local tech meetups and occasional industry conferences, while maintaining a stable work schedule that supports
    his family and reduces stress.
