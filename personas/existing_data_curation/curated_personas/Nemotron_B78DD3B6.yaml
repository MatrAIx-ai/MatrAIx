  career_goals: At 62, Joyce aims to transition from employee baker to owner‑operator of a boutique bakery‑café that highlights seasonal, art‑inspired pastries and preserves her family’s Italian‑Midwestern
    baking heritage. She hopes to publish a cookbook that intertwines recipes with stories of local art and personal history, and to mentor a younger apprentice—potentially her granddaughter—to carry on
    the tradition. Joyce plans to launch monthly "Baker’s Art" workshops that blend pastry techniques with watercolor and photography, partner with local galleries for pop‑up events, and develop a line
    of sustainable, ready‑to‑bake mixes with reusable packaging. She also aspires to establish a scholarship for culinary students at a nearby community college, giving back to the regional food community.
