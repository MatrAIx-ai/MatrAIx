personas:
  professional: Amelia Belen, a veteran applied mathematician with three decades of experience in statistical modeling and quality control for healthcare research, they leverage their methodical mindset,
    bilingual fluency, and love of structured creativity to mentor junior analysts and spearhead data integrity initiatives.
  sports: Amelia Belen, an avid walker who logs daily routes through Hermann Park, is a season ticket holder for the Houston Astros, follows the Houston Dynamo, and occasionally joins a senior tennis league
    at a community center, balancing low‑impact activity with spirited fandom and often cheering loudly when they catch a home run.
  arts: Amelia Belen, a devoted reader of historical fiction and regular participant in a local book club, finds artistic inspiration in the murals of Diego Rivera and the soulfulness of mariachi music,
    often sharing what they learn with friends over potluck gatherings.
  travel: Amelia Belen, a meticulous planner, enjoys cultural trips such as revisiting family towns in Oaxaca, exploring the historic missions of San Antonio, and taking occasional river cruises on the
    Mississippi, always balancing enriching experiences with a sensible travel budget, and they relish the spontaneous conversations that arise when navigating unfamiliar streets.
  culinary: Amelia Belen, a passionate home cook, cultivates tomatoes, cilantro, and chilies in their vegetable garden to craft authentic dishes like enchiladas verdes, pozole rojo, and mole poblano, skillfully
    blending tradition with experimental twists like adding roasted pumpkin to salsa fresca, and they never miss an opportunity to share a freshly prepared taco with friends.
  core: Amelia Belen, a detail‑obsessed mentor‑in‑training, balances rigorous statistical work with garden‑fresh cooking, community volunteering, and a penchant for hoarding crossword puzzles that they
    never seem to finish.
background:
  cultural: Amelia grew up in a bilingual Mexican‑American household in Houston, where Spanish and English were spoken interchangeably. Her family celebrates Mexican traditions such as Día de los Muertos,
    Las Posadas, and quinceañeras, while also participating in Texas‑style festivities like Cinco de Mayo parades and local rodeos. Her Catholic upbringing has instilled a strong sense of community service
    and familial responsibility. The vibrant Hispanic community of Houston has provided Amelia with a rich network of cultural events, food markets, and mutual‑support groups, influencing her values of
    cooperation, respect for elders, and the importance of sharing cultural heritage with younger generations.
attributes:
  skills: '[''Statistical modeling'', ''Data analysis with R and SAS'', ''Excel advanced functions'', ''Quality control and regulatory compliance'', ''Process optimization'', ''Technical writing and documentation'',
    ''Project planning and timeline management'', ''Team training and mentorship'', ''Bilingual communication (Spanish/English)'', ''Problem solving in scientific contexts'']'
  hobbies: '[''Gardening'', ''Traditional Mexican cooking'', ''Church volunteer work'', ''Reading historical fiction'', ''Puzzles (sudoku, crossword)'', ''Walking in Hermann Park'', ''Family gatherings'',
    ''Handcrafts (crochet)'']'
  career_goals: Amelia aims to transition into a mentorship-focused role over the next few years, guiding emerging analysts and supporting the professional development of Latinx students interested in STEM.
    She plans to obtain a certified data science credential to stay current with modern analytical techniques and to lead a cross‑departmental initiative that improves data integrity in clinical research.
    In the long term, she hopes to volunteer as a consultant for community health projects, applying her analytical expertise to address health disparities in the Houston area.
