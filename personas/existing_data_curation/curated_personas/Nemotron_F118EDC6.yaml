personas:
  professional: Gabriel Wilson is a budding programmer who creates Scratch games and solves Python puzzles, channeling his love of order into meticulous code reviews and competitive online challenges.
  sports: Gabriel Wilson runs a set five‑kilometer route each morning, logs times in a digital logbook, participates in the local middle school cross‑country club, follows the Boston Red Sox for their analytical
    approach to the game, and occasionally joins a weekend chess‑themed fitness meetup that blends mental and physical agility.
  arts: Gabriel Wilson spends weekend evenings listening to Hans Zimmer soundtracks while sketching futuristic cityscapes inspired by the biographies of engineers, curates a personal playlist that includes
    Daft Punk and Nujabes, and attends the occasional school art show to appreciate abstract paintings by Hilma af Klint.
  travel: Gabriel Wilson plans trips on a spreadsheet, favoring itineraries that balance museum visits—like the Smithsonian Air and Space Museum—and hands‑on tech workshops, has explored Washington D.C.
    and the Grand Canyon, and dreams of a future excursion to Silicon Valley and Tokyo’s Akihabara district.
  culinary: Gabriel Wilson prefers precise, modular meals such as a build‑your‑own sushi bowl with rice, avocado, and tuna, whips up a perfectly timed pancake stack on weekends, and snacks on measured portions
    of trail mix, though they sometimes neglect breakfast when a coding sprint runs late.
  core: Gabriel Wilson is a methodical teen who fuses a love of structured coding and disciplined fitness with a calm, competitive edge, occasionally forgetting to eat when absorbed in a puzzle but always
    returning to a well‑ordered routine.
background:
  cultural: Gabriel is a Black teenager raised in Omaha's North Omaha community, where church and local cultural events play important roles in family life. His family emphasizes education, resilience,
    and cultural pride, celebrating traditions such as Kwanzaa and participating in Black History Month programs at the Omaha Community Center and the Henry Doorly Zoo's exhibitions. He benefits from mentorship
    through the Omaha Community Academy's STEM initiative and the local chapter of 100 Black Men, which connect him with Black professionals in engineering and technology. Inspired by African‑American pioneers
    like Dr. Mae Jemison and Dr. George Washington Carver, Gabriel sees disciplined pursuit of knowledge as a heritage of perseverance. These cultural influences reinforce his calm, organized demeanor and
    his ambition to succeed in structured, innovative fields.
attributes:
  skills: '[''Strategic planning'', ''Organizational task management'', ''Middle school mathematics'', ''Basic Python programming'', ''LEGO Mindstorms robotics'', ''Chess strategy'', ''Spreadsheet data
    analysis'', ''Technical reading comprehension'']'
  hobbies: '[''Chess'', ''LEGO robotics building'', ''Basic coding (Python/Scratch)'', ''Reading technical biographies'', ''Running'', ''One-on-one tutoring'', ''Tech news following'']'
  career_goals: Gabriel aims to attend a STEM‑focused high school and later earn a degree in Computer Engineering or Mechanical Engineering. He envisions a career designing autonomous systems or working
    on robotics research at a national laboratory or space agency, where his methodical approach and calm resilience can thrive. He also sees the possibility of a data‑analysis role that leverages his analytical
    mindset. Gabriel is motivated to secure scholarships, become a role model for other Black youth in Omaha, and eventually mentor younger students pursuing similar paths.
