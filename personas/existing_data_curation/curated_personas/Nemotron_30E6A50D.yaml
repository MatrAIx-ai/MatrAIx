personas:
  professional: Berkeley Robison, a 29‑year‑old metal fabricator and CNC operator, blends five years of hands‑on expertise in CNC milling, MIG/TIG welding, and plastic injection molding with a preference
    for solitary, structured work, allowing them to swiftly troubleshoot tool‑setup issues and assertively champion safety while maintaining a relaxed attitude toward scheduling.
  sports: Berkeley Robison, a 29‑year‑old outdoor enthusiast, spends weekends hiking the Ozark foothills with the local Ozark Trail Association and fishing at Lake of the Ozarks, follows the St. Louis Cardinals
    (MLB) and Kansas City Chiefs (NFL) loyally, and they maintain fitness through solo trail runs and occasional strength training at the community gym, preferring low‑key, solitary activity over team sports.
  arts: Berkeley Robison, a 29‑year‑old hobbyist model builder, finds artistic inspiration in the intricate locomotive designs of Sir Nigel Gresley and the cinematic craftsmanship of filmmaker Christopher
    Nolan, and they unwind by knitting simple scarves while listening to instrumental folk guitarist Andy McKee, and watches classic documentaries on industrial design starring David Macaulay to fuel their
    creative vision.
  travel: Berkeley Robison, a 29‑year‑old precision‑focused traveler, prefers meticulously planned road trips to nearby natural sites like the Grand Canyon and Shenandoah National Park, while they dream
    of an autonomous solo adventure to Japan’s Nagoya industrial districts to observe high‑precision machining, balancing a love of quiet exploration with a modest travel budget that prioritizes off‑season
    visits.
  culinary: Berkeley Robison, a 29‑year‑old garden‑to‑table cook, enjoys preparing simple yet hearty meals such as grilled trout with fresh dill, roasted beet and goat‑cheese salad, and homemade sourdough
    bread, skillfully using vegetables from their modest garden and favoring ingredients like rosemary, garlic, and locally sourced honey, while they occasionally treat themselves to a spare‑time indulgence
    of artisanal smoked brisket at a regional barbecue joint.
  core: Berkeley Robison, a 29‑year‑old CNC specialist, blends a love of solitary precision work with a relaxed approach to scheduling, a habit of occasional tool‑splurges, and they maintain a steadfast
    commitment to safety and self‑reliance.
background:
  cultural: Berkeley grew up in a working‑class, white family in the rural outskirts of Jonesboro, Arkansas. Her community values hard work, self‑reliance, and neighborly support, which shaped her practical,
    no‑nonsense outlook. While attending the local high school, she participated in vocational shop classes that sparked her interest in metalwork. The region’s Southern Baptist traditions and small‑town
    customs fostered a sense of modesty and respect for tradition, yet she maintains an independent mindset, preferring quiet, solitary pursuits over large social gatherings. Her cultural heritage emphasizes
    reliability, humility, and pride in craftsmanship.
attributes:
  skills: '[''CNC milling'', ''CNC turning'', ''MIG/TIG welding'', ''Blueprint reading'', ''Plastic injection molding operation'', ''Equipment maintenance'', ''Troubleshooting mechanical systems'', ''OSHA
    safety compliance'', ''Basic CAD/CAM (Fusion 360)'', ''Quality control inspection'']'
  hobbies: '[''Scale model building'', ''Fishing'', ''Hiking'', ''Vegetable gardening'', ''Technical non-fiction reading'', ''Manufacturing documentaries'', ''DIY fabrication podcasts'', ''Knitting'']'
  career_goals: Berkeley aims to advance from line operator to lead machinist and eventually supervisory roles within her plant. She plans to earn a CNC programmer certification and complete an apprenticeship
    in industrial maintenance to broaden her technical expertise. Long‑term, she envisions opening a small custom‑fabrication shop that allows her to design and produce unique metal‑art pieces while maintaining
    a flexible schedule that respects her preference for solitary work. She also hopes to mentor new hires, sharing her hands‑on knowledge in a supportive yet independent environment.
