personas:
  professional: Brian Kudasz, an aspiring young designer, spends afternoons turning LEGO bricks into imaginative inventions and sketching superhero concepts, harnessing their boundless curiosity and preference
    for flexible, unstructured play to experiment with engineering principles even without formal instruction.
  sports: Brian Kudasz, a member of the Westside Youth Soccer Club, loves playing as a midfielder, idolizes FC Barcelona and Lionel Messi, and watches live matches of the local high school baseball team,
    the Eagles, while also enjoying weekend park runs for fun.
  arts: 'Brian Kudasz, a budding illustrator, fills sketchbooks with superhero sketches inspired by Marvel''s Spider‑Man, DC''s Batman, and the whimsical creatures of Studio Ghibli''s Totoro, listening
    to upbeat tracks by Imagine Dragons and solo piano arrangements from Yiruma while drawing; they also binge‑watch animated series like Avatar: The Last Airbender for creative inspiration.'
  travel: Brian Kudasz, an eager explorer, has visited the local science museum in Chicago and a weekend camping trip to Yosemite National Park where they used a small telescope to gaze at Orion; they dream
    of traveling to the Kennedy Space Center in Florida and the historic castles of Scotland, especially Edinburgh.
  culinary: Brian Kudasz, a picky‑but‑curious eater, favors pizza topped with pepperoni and extra cheese, but also enjoys helping their mother make macaroni and cheese with a secret sprinkle of cheddar
    and breadcrumbs; they love snacking on carrot sticks with hummus, blueberries, and the occasional chocolate chip cookie, and they have a habit of overindulging in sugary cereal before bed.
  core: Brian Kudasz, an eight‑year‑old dreamer, fuses boundless imagination with a love for LEGO, superheroes, and night‑sky stargazing, while juggling a chaotic schedule, a sweet tooth, and the occasional
    allergic sneeze.
background:
  cultural: Brian grew up in Cypress, a suburban community in Harris County, Texas, where his family lives in a middle‑class neighborhood surrounded by residential streets, parks, and nearby urban amenities.
    His cultural upbringing reflects mainstream American values, with celebrations of holidays such as Thanksgiving, Christmas, and the Fourth of July, as well as participation in school events and community
    sports. While his household is predominantly of European‑American heritage, the diverse fabric of the Greater Houston area has exposed him to a variety of cuisines, languages, and cultural festivals,
    fostering an openness to different perspectives. His parents emphasize kindness, cooperation, and curiosity, encouraging him to explore both the outdoors of Texas and the imaginative worlds of books
    and games.
attributes:
  skills: '["drawing and illustration", "creative storytelling", "LEGO building and spatial reasoning", "basic programming with Scratch", "reading comprehension of fantasy and science topics", "problem
