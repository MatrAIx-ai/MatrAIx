  hobbies: '["drawing and sketching", "LEGO building", "reading fantasy and science books", "storytelling", "exploring nature and stargazing", "playing soccer", "creative video gaming (Minecraft)", "listening
    to music while drawing"]'
  career_goals: Brian dreams of combining his love for imagination and science in a future career. He envisions becoming a children's book author and illustrator, creating vibrant stories that teach kids
    about space, nature, and invention. He also enjoys the idea of designing video games or interactive experiences where players can explore new worlds, and hopes to study robotics or engineering so he
    can build the tools that make those worlds possible. Above all, he wants a career that lets him share his curiosity and kindness with others.
