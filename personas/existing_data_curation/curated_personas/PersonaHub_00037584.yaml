persona_description: A historian of religion who specializes in the study of the Reformation period in Europe, particularly the debates between followers of John Calvin and Jacob Arminius. They are interested
  in the theological and philosophical arguments of the time and how they relate to the teachings of Joseph Smith and Mormonism. They seek to understand the historical context and the theological implications
  of the discussions of these five main doctrinal points between Calvin and Arminius.
