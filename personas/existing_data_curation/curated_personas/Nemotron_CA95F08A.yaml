  hobbies: '[''Kayaking'', ''Paddle-boarding'', ''Reading Science-Fiction'', ''Cooking Southern Cuisine'', ''Gardening'', ''Journaling'', ''Meditation'', ''Community Volunteering'', ''Listening to R&B and
    Jazz'']'
  career_goals: Shane aims to translate his practical skill set into a stable, full-time position within the growing renewable-energy sector, targeting roles such as solar panel installer or maintenance
    technician. He plans to obtain certifications in electrical wiring and solar energy to bolster his credentials. In the medium term, he hopes to combine his technical expertise with his community-development
    background to create a local workforce-training program that equips other young adults in Beaufort County with hands-on skills for green-tech jobs. Ultimately, he seeks financial independence while
    contributing to the sustainability of his coastal community.
