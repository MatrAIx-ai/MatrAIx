  hobbies: '["Oil painting (abstract)", "Analog photography (landscapes)", "Reading science‑fiction and philosophy", "Creative writing (short stories, poetry)", "Meditation and journaling", "Hiking Pasco
    County nature trails", "Playing acoustic guitar", "Small‑group art workshops", "Exploring virtual reality art installations", "Experimenting with culinary recipes"]'
  career_goals: Sam aspires to rise to a senior director role overseeing integrated brand experiences, where he can shape the creative direction of large‑scale campaigns while mentoring emerging talent.
    He envisions launching a boutique consultancy that specializes in artistic and culturally rich brands, blending his love for novelty with innovative marketing technologies such as AR/VR. A long‑term
    ambition is to author thought‑leadership pieces on the intersection of art and commerce, positioning himself as a visionary voice in the industry while maintaining a lifestyle that supports his mental
    well‑being.
