personas:
  professional: Dawn Thompson, an aspiring visual storyteller and junior game developer, channels fierce imagination into drawing fantasy creatures and coding Scratch animations, while their relaxed, disorganized
    approach lets ideas flow freely without strict deadlines, and their competitive streak fuels the drive to perfect every comic panel.
  sports: Dawn Thompson, a member of the local community center's after‑school soccer club and a fan of the Philadelphia Eagles and Phillies, enjoys weekly pick‑up basketball games with a small group of
    friends, approaches fitness with a playful, competitive spirit, and prefers seasonal activities like ice‑skating in winter over large team sports.
  arts: Dawn Thompson, a budding illustrator who fills sketchbooks with dragons and characters inspired by J.K. Rowling and Rick Riordan, spends evenings practicing piano pieces by Beethoven and Tchaikovsky,
    frequents the Philadelphia Museum of Art to study works by Van Gogh and Monet, and channels that artistic fervor into creating stop‑motion LEGO animations, all of which shape a vivid personal identity.
  travel: Dawn Thompson, who loves spontaneous weekend trips to the historic streets of Old City Philadelphia and annual family vacations to Washington, D.C.’s Smithsonian museums, dreams of exploring the
    Wizarding World at Warner Bros. Studio in London, and prefers flexible itineraries that allow time for night‑sky stargazing with their handheld telescope.
  culinary: Dawn Thompson, whose favorite meals include cheesy pizza, homemade mac and cheese, and occasional sushi rolls after a visit to Chinatown, enjoys helping Mom whisk together chocolate chip cookies
    while listening to piano practice, and often snacks on carrot sticks while sketching, though sometimes forgets to eat a proper lunch during long LEGO sessions.
  core: Dawn Thompson, an imaginative eight‑year‑old with a competitive edge, balances a love for fantasy art, LEGO building, and stargazing with a laid‑back, somewhat disorganized routine, a habit of forgetting
    to log allowance spendings, and a preference for quiet, small‑group adventures.
background:
  cultural: Dawn grew up in a middle‑class family in Philadelphia, Pennsylvania. Her upbringing reflects typical American cultural influences—celebrating holidays like Thanksgiving and the Fourth of July,
    attending public school, and engaging with the city’s rich historical sites. She often visits the Philadelphia Museum of Art and the Franklin Institute, which have nurtured her love for art and science.
    While her ethnic background is white, her family’s roots trace back to a blend of European ancestries common in the region, and she is exposed to the diverse, multicultural environment of the city.
