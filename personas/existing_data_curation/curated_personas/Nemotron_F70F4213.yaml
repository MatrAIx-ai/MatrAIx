  career_goals: Although still in elementary school, Dawn envisions a future where she creates worlds for others to explore. She wishes to become a children’s book author and illustrator, bringing her imaginative
    characters to life. She is also fascinated by space and hopes to be an astronaut‑scientist who discovers new planets. Additionally, she dreams of designing video games that blend storytelling and art.
    Her competitive streak drives her to be recognized as the best at her crafts and to win school art and science competitions.
