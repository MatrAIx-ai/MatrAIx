  hobbies: '[''hiking'', ''nature photography'', ''birdwatching'', ''acoustic guitar'', ''gardening'', ''cooking with fresh produce'', ''DIY woodworking'', ''volunteering at community garden'', ''reading
    environmental science'', ''keeping a nature journal'']'
  career_goals: Safaa aims to earn a bachelor's degree in Landscape Architecture within the next three years, followed by professional certification as a Certified Landscape Technician (CLT) and eventually
    a licensed landscape architect. He envisions opening his own eco‑focused landscaping firm in Grand Traverse County that specializes in low‑maintenance, pollinator‑friendly designs for homeowners and
    small businesses. He also hopes to lead community‑based green‑space projects, such as revitalizing local parks and creating educational gardens, and to mentor new entrants to the trade.
