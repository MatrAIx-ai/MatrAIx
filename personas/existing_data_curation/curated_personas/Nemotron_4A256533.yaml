personas:
  professional: Safaa Verbois is a methodical landscape specialist who blends commercial and residential design expertise with sustainable irrigation, integrated pest management, and entry‑level CAD drafting;
    their calm demeanor and organized planning keep teams coordinated and projects on schedule while delivering pollinator‑friendly spaces.
  sports: Safaa Verbois stays active through regular hikes on the Sleeping Bear dunes, runs with the Traverse City Trail‑Running Club, follows the Chicago Cubs and the local Traverse City Pit Spitters,
    and volunteers as a seasonal youth soccer coach, balancing solo outdoor pursuits with occasional team sports.
  arts: Safaa Verbois captures the Great Lakes shoreline through photography, strums acoustic covers of Sufjan Stevens and Iron & Wine, hand‑crafts wooden garden benches, and draws creative inspiration
    from Ansel Adams’ black‑and‑white prints and the folk art exhibits at the Dennos Museum Center.
  travel: Safaa Verbois adopts a budget‑friendly travel style, planning weekend road trips to Acadia National Park, Door County, and the Upper Peninsula’s cherry orchards, preferring campgrounds and DIY
    itineraries, while dreaming of a summer backpacking adventure across Iceland’s volcanic landscapes.
  culinary: Safaa Verbois enjoys garden‑to‑table cooking, frequently preparing dishes such as beet‑and‑goat‑cheese salad, rosemary‑roasted carrots, and fresh herb pesto pasta using heirloom tomatoes, basil,
    and other produce from their own garden, and has cultivated intermediate skills in sautéing, baking, and fermenting sourdough starter.
  core: Safaa Verbois blends calm practicality with boundless curiosity, turning each hike, garden, and sketch into a stepping stone toward an eco‑conscious landscaping legacy.
background:
  cultural: Safaa grew up in a middle‑class family in Traverse City with deep Midwestern roots and a touch of French‑Canadian heritage from his paternal line. He was raised with the region’s hallmark values
    of hard work, politeness, and community involvement, which are reflected in his cooperative nature. Seasonal local traditions, such as the Cherry Festival and community clean‑up days, are part of his
    upbringing. While he primarily identifies with the broader American Midwest culture, occasional family gatherings feature French‑Canadian dishes and a casual familiarity with French phrases, giving
    him a modest multicultural perspective that enriches his appreciation for diverse horticultural practices.
attributes:
  skills: '[''landscape design'', ''plant identification'', ''soil testing'', ''integrated pest management'', ''irrigation system installation'', ''maintenance equipment operation'', ''project planning
