  career_goals: Aurora aspires to pursue a career that combines her love for structure, problem-solving, and helping others. She aims to study engineering—specifically civil or environmental engineering—so
    she can design safe, sustainable spaces for her community. She also envisions eventually becoming a mentor for younger students, sharing her organizational strategies and bilingual skills. Aurora is
    determined to attend a university with strong STEM programs, secure scholarships, and later work on public-infrastructure projects that benefit the Latino neighborhoods of Los Angeles County.
