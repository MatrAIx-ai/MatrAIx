personas:
  professional: Aurora Dejesus is a budding junior robotics enthusiast who translates their methodical LEGO‑building expertise into designing, programming, and testing simple classroom robots, always recording
    each iteration in a meticulously organized notebook.
  sports: Aurora Dejesus enjoys structured activity through their school’s after‑school gymnastics club, following precise routines, and proudly supports the local minor‑league baseball team, the River
    Valley Falcons, while also staying active in community dance classes that blend traditional folk steps with modern moves.
  arts: Aurora Dejesus expresses their love for mystery and science by sketching detective board layouts and drawing portraits of famous scientists, while participation in community folk dance performances
    fuels an admiration for performers such as Misty Copeland and musicians like Billie Eilish.
  travel: Aurora Dejesus dreams of visiting the interactive science museum in Chicago and the historic LEGO factory in Billund, Denmark, plans each trip with a detailed checklist, saves allowance accordingly,
    and also hopes to explore nearby national parks during school breaks.
  culinary: Aurora Dejesus finds comfort in helping prepare tamales on weekends, mastering the precise measurement of masa, pork, and chilies, often experimenting by adding a pinch of cumin to the filling,
    yet occasionally forgets to scrub the countertop after cooking.
  core: Aurora Dejesus is a detail‑oriented 12‑year‑old who balances precise LEGO engineering, cautious budgeting, meticulous health monitoring, structured gymnastics, creative storytelling, systematic
    travel planning, and methodical cooking, all while wrestling with a tendency to over‑worry.
background:
  cultural: Aurora was born and raised in Covina, a city with a vibrant Mexican-American community. Her household blends Mexican traditions with Southern California life. She speaks Spanish fluently at
    home and English at school, allowing her to navigate both cultures. Family gatherings revolve around shared meals, especially on holidays like Día de los Muertos, Mexican Independence Day, and quinceañera
    celebrations. Catholic rituals and community events at the local parish reinforce a sense of belonging. Aurora’s parents emphasize respect for elders, hard work, and education, values that shape her
    organized and responsible nature. She participates in cultural clubs at school that promote Latino heritage, and she cherishes the music, dance, and cuisine of her heritage while also engaging with
    broader American pop culture.
