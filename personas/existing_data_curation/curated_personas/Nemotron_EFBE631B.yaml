personas:
  professional: A diligent young builder, Aviance Ford channels their methodical mindset into constructing intricate LEGO sets, keeping meticulous journals for school projects, and leading small group story‑writing
    activities at their elementary classroom, always ensuring tasks follow clear instructions.
  sports: A keen young athlete, Aviance Ford participates in the neighborhood Little Dolphins swim club and plays on the third‑grade soccer team that practices under the guidance of the Miami Hurricanes
    youth program, preferring the structured drills and small‑team camaraderie over large crowds.
  arts: A creative storyteller, Aviance Ford sketches detailed comic panels inspired by Mo Willems' humor, sings gospel hymns during Sunday church choir, and practices recorder pieces by Ella Fitzgerald
    and Lin‑Manuel Miranda, blending classic tunes with their own imaginative narratives.
  travel: An organized explorer, Aviance Ford loves weekend trips to the nearby Everglades where they follow a checklist of wildlife sightings, dreams of visiting the Kennedy Space Center in Florida, and
    keeps a travel journal with doodles of palm trees and rockets.
  culinary: A budding home chef, Aviance Ford delights in helping prepare collard greens and plantain fritters at family gatherings, enjoys making peanut butter and banana sandwiches for lunch, and experiments
    with melted cheese on homemade pizza, always insisting on adding a pinch of oregano for extra flavor.
  core: Aviance Ford is a structured, quiet nine‑year‑old who journals daily, builds LEGO with exacting precision, tends a goldfish with diligent care, and balances a love for gospel music with a habit
    of occasionally forgetting to water their fish.
background:
  cultural: Aviance is raised in a Black family in Miami, where African‑American traditions blend with vibrant Afro‑Caribbean influences from the local community. Family gatherings often include soulful
    gospel music, stories of heritage, and dishes like collard greens and plantains. She attends a neighborhood church that emphasizes community service and harmony, and she celebrates cultural holidays
    such as Juneteenth and Kwanzaa with meaningful rituals. The multicultural atmosphere of Miami‑Dade County exposes her to diverse art, music, and food, shaping a strong sense of identity and pride in
    her cultural roots.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Organizational skills'', ''LEGO building'', ''Scrapbooking'', ''Basic Scratch programming'']'
