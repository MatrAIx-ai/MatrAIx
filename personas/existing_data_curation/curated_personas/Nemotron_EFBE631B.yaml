  career_goals: Even at nine, Aviance dreams of a career that lets her help others in a structured way. She imagines becoming a teacher or a school librarian, where she can organize learning materials and
    create a calm, predictable environment for younger kids. She also thinks about becoming a pediatric nurse or a community health volunteer, motivated by her caring nature and desire to support the well‑being
    of children in her neighborhood.
