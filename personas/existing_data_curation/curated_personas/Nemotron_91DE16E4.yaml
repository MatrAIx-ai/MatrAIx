personas:
  professional: Desire Burns is a seasoned small-engine mechanic and vocational educator who blends meticulous diagnostic expertise with a gregarious, workshop-classroom style, turning every repair into
    a teach-and-learn moment for apprentices and customers alike.
  sports: Desire Burns is an avid supporter of the Green Bay Packers, follows the Milwaukee Brewers during baseball season, hikes with the North Shore Trail Club on weekends, and balances fitness by fishing
    on the Wisconsin River and doing occasional woodworking drills for arm strength.
  arts: Desire Burns shines on the community theater stage and dominates karaoke nights with renditions of Dolly Parton, Neil Diamond, and Sufjan Stevens, drawing inspiration from the storytelling of Arlo
    Guthrie and the vibrant performances of the Wisconsin Symphony Orchestra.
  travel: Desire Burns prefers modest road-trip adventures, having explored the Apostle Islands and Door County on kayak-filled weekends, dreaming of a Pacific Northwest hiking tour while balancing a busy
    workshop schedule and a modest travel budget.
  culinary: Desire Burns delights in crafting fresh cheese curds, whipping up herb-infused roasted potatoes, bratwurst with sauerkraut, and strawberry-basil summer salads, often seasoning with Wisconsin
    cheddar and home-grown basil and thyme.
  core: Desire Burns is a talkative, community-centric mechanic-mentor who gardens, sings karaoke, and occasionally overbooks themselves with workshops and potluck events, turning every task into a chance
    to teach and connect.
background:
  cultural: Desire grew up in a middle‑class White family of German‑Polish descent in central Wisconsin, where Midwestern values of hard work, modesty, and community cooperation are deeply ingrained. Her
    upbringing emphasized church involvement, seasonal outdoor activities, and a strong sense of neighborly responsibility. The local culture—cheese curds, snowmobiling, and a love for the Packers—has shaped
    her social life and recreational preferences. At the same time, her bachelor's degree in education reflects a broader commitment to lifelong learning and civic engagement, allowing her to blend traditional
    regional pragmatism with an outward‑looking curiosity about new ideas and teaching methods.
attributes:
  skills: '[''Small‑engine diagnosis and repair'', ''Engine rebuild and tune‑up'', ''Use of digital diagnostic equipment'', ''Parts inventory management'', ''Technical instruction and mentorship'', ''Customer
    communication and service'', ''Workshop safety protocols'', ''Problem‑solving and troubleshooting'']'
  hobbies: '[''Community pot‑luck hosting'', ''Local theater participation'', ''Gardening and sustainable food cultivation'', ''Hiking and nature walks'', ''Fishing on the Wisconsin River'', ''Green Bay
    Packers fan activities'', ''4‑H youth engine‑maintenance mentorship'', ''Homemade cheese curd making'', ''Karaoke and music nights'', ''Woodworking and DIY home projects'']'
  career_goals: Desire aims to expand her current role into a community‑focused small‑engine repair shop that also serves as a learning hub for local youth and adult apprentices. She plans to obtain ASE
    certification for small engines and a state teaching credential in vocational education, enabling her to teach part‑time at a nearby technical college. Over the next five years, she hopes to launch
    a series of hands‑on workshops that blend her mechanical expertise with her passion for education, fostering a supportive environment where practical skills are shared and local businesses thrive. Ultimately,
    she envisions becoming a recognized mentor in the region, known for bridging practical trade work with collaborative learning.
