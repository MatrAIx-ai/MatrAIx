  career_goals: Although retired from formal employment, Jacynth’s ambitions center on deepening her artistic legacy and enriching her community. She aims to complete a memoir that weaves together her family’s
    Southern roots with her lifelong fascination for mythology and abstract art. She also hopes to curate a traveling exhibition of local seniors’ artworks, fostering intergenerational dialogue. Volunteering
    as a writing workshop facilitator at the Scottsboro senior center is a priority, and she envisions collaborating with the local historical society to produce illustrated pamphlets about Jackson County’s
    cultural heritage.
