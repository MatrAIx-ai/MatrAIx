  career_goals: Mae aims to earn her Wisconsin teaching certificate within the next year, followed by a Master’s in Special Education. She plans to transition from teaching assistant to lead classroom teacher
    in an inclusive elementary setting, where she can apply her structured approach to curriculum delivery and student support. In the medium term, she seeks certification in data‑driven instruction and
    conflict resolution to become a curriculum coordinator, designing evidence‑based programs for early literacy and mental‑health awareness. Her long‑term ambition is to influence district policy on inclusive
    education and systematic stress‑reduction practices, ensuring that both students and staff can thrive in predictable, supportive environments.
