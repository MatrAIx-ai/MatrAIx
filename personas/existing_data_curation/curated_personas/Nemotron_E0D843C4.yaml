personas:
  professional: Mae Haman, a 32‑year‑old teaching assistant in Milwaukee public schools, leverages their meticulous lesson‑planning, data‑driven behavior management, and differentiated instruction expertise
    to craft predictable, inclusive classrooms that mirror their love of structure and quiet dedication to student well‑being.
  sports: Mae Haman, who enjoys low‑key fitness, hikes the trails of Milwaukee County Parks with the Milwaukee Hikers Club in spring and participates in a gentle winter Pilates class, while faithfully cheering
    the Milwaukee Bucks, Brewers, and Packers as their hometown sports teams.
  arts: Mae Haman finds creative balance through urban photography of Milwaukee’s Art Deco architecture, drawing inspiration from Vivian Maier and Edward Hopper, while also attending the Milwaukee Symphony
    Orchestra’s performances of Mahler and enjoying historical novels by Philippa Gregory in quiet evenings.
  travel: Mae Haman’s travel style blends meticulous planning with a preference for tranquil, short‑duration trips, such as weekend stays in Door County’s quiet lighthouses, a solo exploration of Savannah’s
    historic squares, and a long‑awaited study tour of Rome’s ancient ruins, all organized within a modest budget.
  culinary: Mae Haman enjoys preparing precise recipes like beet and goat‑cheese salad, rosemary‑infused chicken pot pie, and home‑baked rye bread using a sourdough starter, relishes buttery croissants
    on library volunteer mornings, and relies on measured ingredients and recipe cards to satisfy their detail‑oriented cooking style.
  core: Mae Haman weaves a life of structured ambition and quiet kindness, but anxiety often knots their schedule, and an occasional yarn‑shop splurge shows a sweet spot for indulgence.
background:
  cultural: Mae was raised on Milwaukee’s east side in a family with German‑Polish heritage, reflecting the immigrant roots common in Wisconsin. The Midwestern values of hard work, modesty, and community
    involvement were central to her upbringing. Family traditions include celebrating German holidays such as Oktoberfest and participating in local events like Summerfest. Growing up in a predominantly
    Catholic neighborhood, she was taught the importance of service, which inspired her volunteer work with literacy programs. The blend of these cultural influences and the progressive education environment
    of the state shaped her commitment to inclusive schooling and collaborative problem‑solving.
