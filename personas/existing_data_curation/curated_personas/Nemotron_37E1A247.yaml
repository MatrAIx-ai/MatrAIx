    and parts management", "Emerging fintech technology awareness"]'
  hobbies: '["Beach volleyball", "Hiking (e.g., Blue Sky Ecological Reserve)", "Arduino and DIY electronics projects", "Drone piloting", "Tech meetups and networking events", "Science‑fiction reading",
