personas:
  professional: Winston Stapleton blends hands‑on mechanical expertise with electronic troubleshooting to keep ATMs humming, using schematics and diagnostic software while coaching junior techs and championing
    compliance, all with a calm, improvisational style that values flexible problem‑solving over rigid protocols.
  sports: Winston Stapleton dominates the local beach volleyball scene with the Poway Sand Smash Club, hits the trails with the San Diego Hiking Society for weekend treks, and cheers loudly for the San
    Diego Padres, while their relaxed attitude means they skip formal gym routines in favor of spontaneous group games.
  arts: Winston Stapleton fuels their imagination with classic sci‑fi novels by Isaac Asimov and contemporary works by Ann Leckie, grooves to Tame Impala and local indie band The Mysterious, attends the
    San Diego Film Festival each spring, and enjoys podcasts like Wired Tech in Two and Reply All for creative inspiration.
  travel: Winston Stapleton plans trips on a whim, favoring adventure over itinerary, having already explored the volcanic landscapes of Iceland, the cherry blossoms of Kyoto, and the desert trails of Joshua
    Tree, while dreaming of a road‑trip through New Zealand’s South Island once their savings allow.
  culinary: Winston Stapleton’s cooking style is enthusiastic but experimental, whipping up grilled fish tacos with fresh cilantro and lime, quinoa‑and‑roasted‑beet salads seasoned with feta and pistachios,
    and occasional ramen bowls infused with miso, all sourced from the weekly Poway farmers market.
  core: Winston Stapleton is a calm, curious tech fixer who thrives on spontaneous group sports, impulsive gadget tinkering, and occasional bill‑misses, all while politely juggling a chaotic schedule with
    a smile.
background:
  cultural: Winston was raised in a middle‑class, predominantly white suburban community in Southern California, where a blend of laid‑back West Coast lifestyle and a strong emphasis on practical skills
    shaped his outlook. Growing up in the 1980s and ’90s, he experienced the early rise of personal computing and ATMs, sparking a lasting curiosity for technology. His family values teamwork, modesty,
    and community involvement, which align with the cooperative and harmonious traits he exhibits. Living in Poway, a city known for its strong sense of neighborhood, outdoor recreation, and proximity to
    the larger San Diego tech corridor, Winston’s cultural influences combine Californian casualness, an appreciation for the outdoors, and an awareness of the region’s tech‑driven economy.
attributes:
