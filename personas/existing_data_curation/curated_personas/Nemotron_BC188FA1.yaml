personas:
  professional: Amanda Leboeuf leverages her meticulous organizational skills, fluency in Microsoft Office and Google Workspace, and a competitive eye for detail to excel in coordinating schedules, maintaining
    precise records, and designing visual assets with Canva, and they view this disciplined foundation as a stepping stone toward a future operations manager role in regional logistics.
  sports: Amanda Leboeuf stays active with weekend hikes through the rural trails around Sparta, participates in the local Sparta Spinners Hiking Club, practices yoga at the Grand Rapids Gold fitness studio,
    follows the Grand Rapids Griffins for hockey and the Detroit Lions for football, occasionally joins a seasonal recreational softball league in spring, and they balance solitary fitness routines with
    light team competition.
  arts: Amanda Leboeuf immerses herself in contemporary art by frequenting the Grand Rapids Art Museum and virtual exhibitions featuring artists like Yayoi Kusama and Banksy, sketches and paints inspired
    scenes in a homemade studio, curates photography portfolios edited in Lightroom, draws creative inspiration from podcasts such as The Philosopher’s Zone and book club discussions about Malcolm Gladwell,
    and they blend visual storytelling with curated vintage décor ideas for their future boutique.
  travel: Amanda Leboeuf prefers meticulously planned road trips that combine artistic inspiration and nature, having explored the Upper Peninsula’s Porcupine Mountains, captured sunrise over Lake Michigan’s
    dunes, and dreamed of future trips to Kyoto for its traditional gardens and Reykjavik for its vibrant art scene, all while budgeting travel expenses through a spreadsheet and they prioritize off‑peak
    seasons to stretch savings.
  culinary: Amanda Leboeuf enjoys experimental cooking, mastering precise techniques such as sous‑vide salmon, perfecting a classic ratatouille with fresh tomatoes and eggplant, and baking sourdough loaves
    enriched with wild‑foraged herbs, while savoring occasional indulgence of rich dark‑chocolate ganache truffles, and they frequently document their dishes with stylized photography before sharing them
    in their online art‑print boutique.
  core: Amanda Leboeuf blends relentless organization with boundless curiosity, turning solitary art‑making and meticulous budgeting into a competitive edge, yet they occasionally let perfectionism delay
    personal health check‑ups.
background:
  cultural: Amanda grew up in Sparta, Illinois, within a white, Midwestern community that values self‑reliance, neighborly support, and modesty. Her family traces its roots to French‑Canadian ancestors,
    which influences her occasional interest in French cuisine and occasional exposure to French language at family gatherings. The small‑town environment has fostered a strong sense of local heritage,
    community involvement, and appreciation for regional arts and history, all of which shape her worldview and personal pursuits.
attributes:
  skills: '[''Organizational Management'', ''Schedule Coordination'', ''Microsoft Office Suite'', ''Google Workspace'', ''Basic Graphic Design (Canva)'', ''Photography and Photo Editing'', ''Research and
    Information Synthesis'', ''Customer Service'']'
  hobbies: '[''Visiting Art Galleries'', ''Sketching and Painting'', ''Photography and Photo Editing'', ''Listening to Philosophy and Science Podcasts'', ''Reading Nonfiction'', ''Experimenting with Cooking
    Recipes'', ''Community Book Club'', ''Trivia Competitions'']'
  career_goals: Amanda aims to secure an entry‑level office administration position in a small business or regional logistics hub, leveraging her disciplined work style and attention to detail. She plans
    to pursue an associate degree in Business Administration or a certification in Office Management within the next two years, with the long‑term ambition of advancing to an operations manager role. Parallel
    to her professional trajectory, she hopes to build a side venture that sells her own art prints and curated vintage décor, eventually opening a boutique‑gallery space that blends her love of art with
    her entrepreneurial drive.
