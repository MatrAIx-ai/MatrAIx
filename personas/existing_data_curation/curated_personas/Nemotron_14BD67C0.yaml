  hobbies: '[''Reading mystery and non-fiction books'', ''Journaling'', ''Gardening native desert plants'', ''Cooking traditional Mexican dishes'', ''Hiking local trails'', ''Crocheting'', ''Participating
    in small community gatherings'', ''Online courses in anatomy or Spanish literature'', ''Solving puzzles and crosswords'']'
  career_goals: She aims to obtain CNA certification within the next year and eventually enroll in an LPN program at a community college, seeking a supervisory role as lead nursing assistant. Darys wants
    to specialize in geriatric care to provide higher-quality support for elderly patients, and she plans to develop a small health-education outreach for her community. Financial stability and the ability
    to support her growing family drive her ambition, while she also seeks strategies to manage her stress and maintain work-life balance.
