  career_goals: Omar aims to transform his practical knowledge and artistic passion into a community‑focused venture. He hopes to open a modest workshop space in Miami’s Little Haiti district where locals
    can learn basic home‑repair skills, engage in art‑making sessions, and participate in guided tours that celebrate the city’s Latino heritage. He also aspires to volunteer as a cultural liaison for a
    local nonprofit, offering bilingual support and curating pop‑up exhibitions that showcase emerging Honduran artists. While he is not seeking a full‑time job, Omar wants his endeavor to provide a platform
    for mentorship, allow him to stay competitively engaged through teaching, and keep him connected to his roots while giving back to the neighborhood he calls home.
