  career_goals: Dustin aims to turn his hands‑on abilities into a career. In the near term, he wants to earn a part‑time position at the neighborhood auto shop to deepen his automotive repair skills and
    work toward an entry‑level certification in automotive technology. He also hopes to create a simple video game as a personal project, blending his coding curiosity with his love of gaming. Long‑term,
    Dustin envisions either becoming a certified automotive technician who eventually runs his own small repair shop, or pursuing a college degree in mechanical engineering or computer science to design
    advanced vehicle systems. He sees sports scholarships as a possible path to fund further education, and he is determined to stay disciplined and competitive in both his studies and extracurricular pursuits.
