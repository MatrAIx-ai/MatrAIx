personas:
  professional: Dustin Gregg, an aspiring teen engineer, blends hands‑on tinkering with disciplined school projects, using their curiosity and practical mindset to design custom bike upgrades, RC car mods,
    and woodworking pieces while reliably meeting deadlines and balancing teamwork with a healthy dose of healthy skepticism.
  sports: Dustin Gregg stars as a guard for Riverside High School varsity basketball team, follows the Los Angeles Lakers and the Milwaukee Bucks for inspiration, and they join the local bike club’s weekend
    rides, blending competitive drive with a balanced fitness routine.
  arts: Dustin Gregg, artistically inclined, draws inspiration from the musical scores of Hans Zimmer, the cinematic world of the Marvel Cinematic Universe, and the woodworking tutorials of Matthias Wandel,
    often sketching designs for new projects while streaming indie game soundtracks from artists like Daft Punk as a backdrop to their creative sessions.
  travel: Dustin Gregg, travel‑curious, has camped in Yosemite National Park, taken a weekend road trip to the Grand Canyon, and dreams of visiting Japan’s Akihabara district to explore cutting‑edge tech
    and gaming culture, preferring self‑planned itineraries that mix adventure hiking with occasional video‑game conventions, all within a modest family budget.
  culinary: Dustin Gregg, an eager but somewhat impatient home chef, frequently whips up grilled chicken tacos with fresh cilantro, lime, and homemade corn tortillas, enjoys the smoky flavor of a DIY backyard
    barbecue ribs, yet still indulges in late‑night pizza deliveries, while experimenting with a spicy kimchi fried rice recipe that reflects their love for bold flavors and hands‑on experimentation.
  core: Dustin Gregg is a pragmatic teen tinkerer whose competitive streak, skeptical edge, and relentless curiosity drive them to blend sports, tech, and DIY projects into a uniquely hands‑on, slightly
    impatient, yet reliably organized lifestyle.
background:
  cultural: Dustin grew up in Union City, a small borough in Crawford County, Pennsylvania. His family roots trace back to Mid‑Atlantic working‑class traditions, with both parents involved in local trades
    and community activities. The town’s close‑knit atmosphere, emphasis on self‑reliance, and strong high‑school sports culture have shaped his values of responsibility, competition, and community involvement.
    Local churches and town events, such as fairs and volunteer clean‑up days, provided a sense of shared purpose, while the surrounding farmland and nearby state parks fostered an appreciation for the
    outdoors and hands‑on work. This blend of rural Pennsylvania heritage and contemporary teenage interests informs Dustin’s outlook and daily life.
