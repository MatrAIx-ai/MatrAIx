  career_goals: Tul dreams of a future where she can combine her love for art, storytelling, and helping others. She imagines becoming a children's book author and illustrator, creating colorful stories
    that teach kindness and cultural understanding. She also hopes to volunteer in community programs that bring art and reading to younger children, and she is curious about pursuing a career in education
    or child advocacy as she grows older.
