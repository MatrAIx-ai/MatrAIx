personas:
  professional: Jorge Ibanez, a budding 5‑year‑old engineer, constructs intricate LEGO cityscapes with precise ordering while they occasionally let spontaneous bursts of imagination topple their neat layouts,
    revealing a love of structure paired with a playful resistance to rigid routines.
  sports: Jorge Ibanez, a 5‑year‑old, thrives on tee‑ball with the local Cochise County Cubs, chants for the Arizona Diamondbacks during weekend game viewings, and they participate in a junior desert‑scout
    hiking club that blends light trail runs with nature study.
  arts: Jorge Ibanez, a 5‑year‑old, channels their creativity by drawing desert sunsets and flamenco dancers, delights in listening to Paco de Lucía’s lively guitar and Sesame Street’s catchy tunes, and
    they love attending the town’s summer puppet theater starring local performers.
  travel: Jorge Ibanez, a 5‑year‑old, has already explored the Grand Canyon on a family road trip and flown to Barcelona for a cultural visit, now dreaming of a desert camping adventure under the stars,
    while their travel plans always hinge on their parents’ military schedule and limited vacation days.
  culinary: Jorge Ibanez, a 5‑year‑old, adores the bold flavors of saffron‑infused paella with chorizo, crisp tacos al pastor topped with fresh cilantro, and sweet churros dusted with cinnamon, and they
    proudly assemble their own mini‑tacos at the kitchen counter, though they often get distracted by cartoons and forget to wash their hands before eating.
  core: Jorge Ibanez, a bright yet anxious 5‑year‑old who blends festive family traditions with desert adventures, loves building orderly LEGO worlds but can burst into spontaneous play, clings to bedtime
    routines while secretly craving late‑night stargazing, and they navigate their day with a mix of careful planning and delightful improvisation.
background:
  cultural: Jorge comes from a Spanish family that relocated to the United States when his father took a position at the Fort Huachuca military installation. At home, Spanish is spoken daily, and the family
    celebrates traditional Spanish holidays such as Día de los Reyes and Semana Santa, while also participating in American traditions like Fourth of July fireworks. The blend of Mediterranean cuisine from
    his parents—paella, tapas, and churros—mixes with Southwestern flavors like tacos and quesadillas that he enjoys at local community gatherings. Growing up in Cochise County, he is exposed to the desert
    landscape, Native American cultural sites, and a diverse community of military families, which broadens his perspective while maintaining strong ties to his Spanish heritage.
