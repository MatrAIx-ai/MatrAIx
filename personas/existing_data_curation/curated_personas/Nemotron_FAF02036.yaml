  career_goals: Jorge dreams of a future where he can help others and work as part of a team, so he often says he wants to become a firefighter or a rescue worker who protects people and animals. He also
    loves rockets and stars, and occasionally imagines being an astronaut, reflecting his fascination with structured training and adventurous exploration. Growing up near Fort Huachuca, he admires the
    discipline of the military and sometimes envisions a career in the armed services, while his love for building things points toward a possible future in engineering or construction. He sees these ambitions
    as ways to combine his compassionate side with a desire for clear, organized paths.
