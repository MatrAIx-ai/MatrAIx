  hobbies: '[''gardening'', ''knitting'', ''cooking family recipes'', ''reading historical fiction'', ''walking in local parks'', ''watching classic rock concerts'', ''volunteering at the food pantry'',
    ''DIY home repairs'']'
  career_goals: Johana aims to build on her hands‑on experience by obtaining a formal forklift certification and a certification in hazardous material handling, positioning herself for a lead‑hand or shift‑supervisor
    role that offers a more predictable schedule. She hopes to mentor newer workers, fostering a collaborative and safe work culture, while also saving for a comfortable retirement that allows more time
    for her family and personal interests. Long‑term, she dreams of gradually transitioning to a part‑time consulting role in workplace safety or starting a small home‑based venture selling homemade preserves,
    leveraging her culinary hobby.
