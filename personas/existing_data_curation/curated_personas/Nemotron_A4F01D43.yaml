    and sensitivity'', ''Team coordination and mentorship'']'
  hobbies: '[''Watercolor painting'', ''Sketching abstract cityscapes'', ''Visiting art museums'', ''Poetry reading and writing'', ''Playing ukulele'', ''Urban walking and historical exploration'', ''Yoga
    practice'', ''Strategic board games (e.g., Go, Terraforming Mars)'', ''Volunteer work with crisis hotlines'', ''Reading modern philosophy and speculative fiction'']'
  career_goals: Dorothy aims to deepen her expertise in emergency communications while moving toward leadership roles. In the next two years she plans to obtain the National Emergency Number Association
    (NENA) Certified Telecommunicator designation and an Emergency Medical Dispatcher certification. She also wants to mentor new call‑takers and develop a training module that integrates creative storytelling
    to improve situational awareness. Within five years she envisions becoming a senior dispatcher supervisor, overseeing shift scheduling, quality assurance, and protocol development for the Baltimore
    County 911 system. Ultimately, Dorothy aspires to transition into emergency management or public safety policy, possibly earning a Master’s in Public Administration or Emergency Management, and to contribute
    to community resilience initiatives that blend her artistic perspective with data‑driven response strategies.
