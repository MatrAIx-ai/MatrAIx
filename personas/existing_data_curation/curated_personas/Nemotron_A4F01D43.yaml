personas:
  professional: Dorothy Horan is a 28‑year‑old emergency communications specialist who blends rapid, empathetic call triage with GIS mapping expertise and a habit of weaving gentle storytelling into dispatch
    protocols, positioning themselves for a future supervisory role while constantly hunting for data patterns to improve response efficiency.
  sports: Dorothy Horan is a committed member of a local rowing club on the Patapsco River, a season ticket holder for the Baltimore Ravens, a faithful follower of the Orioles, and joins neighborhood pickup
    basketball games on weekends, balancing water‑based endurance training with the adrenaline of football Sundays.
  arts: Dorothy Horan spends evenings painting delicate watercolor harbor scenes inspired by Winslow Homer, strumming the ukulele to folk tunes by The Dubliners, attending poetry readings featuring Ocean
    Vuong, and curating limited‑edition prints by Kara Walker, all of which feed their creative spirit and inform the compassionate tone they bring to 911 calls.
  travel: Dorothy Horan prefers thoughtfully planned weekend getaways to historic waterfront towns like Charleston, South Carolina, and Annapolis, dreams of a cultural pilgrimage to Galway, Ireland to trace
    familial narratives, and balances these aspirations with budget‑friendly day trips to Baltimore’s Inner Harbor museums and occasional spontaneous road trips along the Blue Ridge Parkway.
  culinary: Dorothy Horan’s palate gravitates toward Chesapeake Bay crab cakes seasoned with Old Bay, herb‑infused salmon with dill and lemon, and comforting bowls of Japanese ramen, while their cooking
    skill sits at an intermediate level—frequenting farmers’ markets for fresh basil, thyme, and heirloom tomatoes to elevate weeknight stir‑fries and occasionally attempting homemade soda bread with rye
    flour.
  core: Creative, meticulous, and quietly quirky, Dorothy Horan steadies frantic 911 calls with a calm voice, doodles tiny sketches in the margins of call logs, and can’t resist a late‑night board‑game
    session even when an early shift looms.
background:
  cultural: Dorothy’s family roots trace back to Irish immigrants who settled in the Baltimore region during the early 20th century, giving her a strong Irish‑American heritage that she celebrates during
    St. Patrick’s Day and through familial storytelling traditions. Growing up in Dundalk, a historically working‑class suburb with close ties to the maritime and steel industries, she was immersed in a
    community that values public service, neighborly solidarity, and resilience. The cultural mosaic of Baltimore—its African‑American neighborhoods, vibrant immigrant enclaves, and rich artistic scene—has
    shaped Dorothy’s inclusive worldview and cultural sensitivity. Though she identifies as white, she actively engages with diverse community events and embraces the city’s blend of historic tradition
    and contemporary progressive values, which informs both her professional ethos in public safety and her personal appreciation for the arts.
attributes:
  skills: '[''Crisis communication'', ''Active listening'', ''De‑escalation techniques'', ''Computer‑Aided Dispatch (CAD) operation'', ''Emergency Medical Dispatch (EMD) certification'', ''GIS and spatial
