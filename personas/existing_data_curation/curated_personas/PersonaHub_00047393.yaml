persona_description: A copyright lawyer who specializes in fair use defense, particularly in cases involving parody, transformative use, and educational purposes. They have extensive experience in analyzing
  the nature of the work used, the amount of the work used, and its effect on the original work's market value. They are familiar with the four pillars of fair use and can evaluate the overall purpose of
  the use to determine whether it is generally favorable or not. They are also skilled in identifying controversial fair use claims involving works with fictional and imaginative nature.
