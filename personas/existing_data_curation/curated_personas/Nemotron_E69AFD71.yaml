  hobbies: '[''Landscape photography'', ''Watercolor painting'', ''Woodworking'', ''Model train building'', ''Hiking'', ''Fishing'', ''Art history reading'', ''Genealogy research'', ''Journaling'', ''Community
    book club'']'
  career_goals: Approaching retirement, John aims to transition from full-time driving to a mentorship and safety-supervisor role within his company, pursuing a Certified Transportation Safety Professional
    (CTSP) credential. He hopes to develop a driver-training program that emphasizes stress-management techniques for younger operators. Concurrently, John envisions launching a small community art space
    in Narrows where local artists can exhibit work and conduct workshops, blending his love for art with his organizational talent. He also aspires to volunteer as a historical docent, sharing the Appalachian
    heritage of Giles County with visitors.
