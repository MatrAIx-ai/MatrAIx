persona_description: An agricultural scientist who is conducting research on the effects of different rootstocks and irrigation systems on the growth, yield, and quality of apple fruit. Specifically, the
  scientist is studying the impact of drip and microjet sprinkler irrigation systems on the water use, tree growth, yield, and harvest-time fruit quality attributes of 'Pacific Gala' apple during the period
  of 2004-07. The scientist is also investigating the mineral nutrient concentrations in the leaves and fruit of the apple trees during the same period.
