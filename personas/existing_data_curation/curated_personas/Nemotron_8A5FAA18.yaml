personas:
  professional: Carlos Vega, an aspiring visual communicator in Dallas‑Fort Worth, blends their digital illustration, street photography, and bilingual storytelling skills to design culturally resonant
    campaigns while habitually double‑checking project deadlines due to lingering worry.
  sports: Carlos Vega spends weekends at the downtown skate park perfecting new tricks, follows the Dallas Mavericks for NBA excitement and the Dallas Cowboys for football thrills, and they occasionally
    join a local ultimate frisbee league to balance high‑energy skate sessions with team‑sport camaraderie.
  arts: Carlos Vega immerses themselves in the Dallas art scene by photographing vibrant murals, sketching inspirations from street artists like Shepard Fairey, attending indie concerts by Tame Impala at
    The Kessler Theater, and volunteering to curate pop‑up exhibitions that celebrate Spanish‑influenced cultural narratives.
  travel: Carlos Vega prefers spontaneous road trips over rigid itineraries, frequently drives to Austin for live‑music festivals, visits Santa Fe for art fairs, and dreams of a study‑abroad stint in Barcelona's
    El Raval district, while budget constraints keep international travel occasional.
  culinary: Carlos Vega enjoys cooking paella with saffron, chorizo, and fresh seafood, experiments with fusion dishes like taco‑styled patatas bravas, and often brings homemade empanadas to community festival
    tables, though they sometimes over‑salt recipes in their enthusiasm.
  core: Carlos Vega is a curiosity‑driven night‑owl creative who balances disciplined project planning with impulsive art‑spending, battles anxiety with yoga, and fuels marathon skate sessions with endless
    cups of espresso.
background:
  cultural: Carlos grew up in a bilingual Spanish‑English household in Frisco, Texas. His parents, originally from Spain, kept traditions such as celebrating Semana Santa, Día de los Reyes, and preparing
    tapas and paella at family gatherings. Fluent in both languages, he feels a strong connection to Spanish literature, flamenco rhythms, and the vibrant Hispanic community of the Dallas‑Fort Worth metroplex.
    This bicultural upbringing shapes his artistic sensibility, his appreciation for diverse perspectives, and his commitment to fostering cultural harmony.
attributes:
  skills: '[''Digital illustration'', ''Photography'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Basic video editing'', ''Bilingual Spanish-English communication'', ''Public speaking'', ''Event
