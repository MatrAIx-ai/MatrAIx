  hobbies: '[''Visiting art galleries and museums'', ''Street photography'', ''Playing acoustic guitar'', ''Skateboarding'', ''Reading contemporary fiction and philosophy'', ''Cooking traditional Spanish
    dishes'', ''Volunteering at community cultural events'', ''Attending live music and theatre performances'']'
  career_goals: Carlos aims to complete a bachelor's degree in Visual Communications or Multimedia Arts, building a portfolio that merges contemporary design with his Spanish heritage. He aspires to become
    a creative director or community arts coordinator in the Dallas‑Fort Worth area, leading culturally resonant campaigns and public art projects that foster inclusion and dialogue. He is motivated to
    develop expertise in brand storytelling, digital media strategy, and cultural programming, while also learning stress‑management techniques to sustain his creative drive.
