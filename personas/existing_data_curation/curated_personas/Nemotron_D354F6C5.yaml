personas:
  professional: Ora Saintpreux, a budding junior engineer who loves constructing LEGO replicas of real‑world structures, blends their curious imagination with a disciplined, detail‑oriented approach to
    problem‑solving.
  sports: Ora Saintpreux, a member of the Sacramento Youth Soccer Club and an enthusiastic participant in community Afro‑Caribbean dance workshops, supports the Sacramento Kings and Oakland Athletics, and
    balances competitive board‑game strategy with active play in the local riverside park where they practice sprint drills.
  arts: Ora Saintpreux, an avid sketcher and budding coder, fills their sketchbook with fantastical scenes inspired by J.K. Rowling and C.S. Lewis, programs simple animations in Scratch, dances to the vibrant
    beats of Celia Cruz and modern pop tunes like Maroon 5, and celebrates storytelling through weekly bedtime reads of Norse myth collections.
  travel: Ora Saintpreux, who loves structured day trips, has logged leaf‑collecting expeditions at the Sacramento River, enjoyed family weekend getaways to Lake Tahoe and Yosemite, dreams of visiting Tokyo’s
    Akihabara district to explore technology exhibits, and plans their future trips with detailed checklists to avoid unexpected detours.
  culinary: Ora Saintpreux, a self‑proclaimed snack architect, prefers peanut‑butter‑jelly sandwiches, mac and cheese, and fruit‑laden yogurt parfaits, creates their own no‑bake energy bars using oats,
    honey, and dried mango, and sometimes resists trying steamed broccoli, insisting on a drizzle of cheese.
  core: Ora Saintpreux, an organized and competitive 8‑year‑old, blends their love for LEGO engineering, puzzle solving, and rhythmic dance with a disciplined routine, often balancing curiosity with a skeptical
    eye toward shortcuts.
background:
  cultural: Ora is a Black child of Haitian descent living in Sacramento, California. Her family maintains Haitian traditions such as celebrating Haitian Heritage Month, speaking French‑Creole at home,
    and enjoying dishes like griot and pain patate during family gatherings. At the same time, she is immersed in the diverse cultural fabric of Sacramento, participating in local school events, community
    art programs, and multicultural festivals. This blend of Haitian heritage and American upbringing gives Ora a rich perspective on identity, community, and resilience, influencing her curiosity about
    the world and her desire to contribute positively to both her cultural community and her broader neighborhood.
