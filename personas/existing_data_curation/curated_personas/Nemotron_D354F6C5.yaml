  hobbies: '[''Reading (Fantasy & Science)'', ''LEGO Building'', ''Nature Exploration (Sacramento River Parks)'', ''Puzzle Solving (Kid‑Friendly Sudoku)'', ''Board Games (Chess, Checkers)'', ''Drawing and
