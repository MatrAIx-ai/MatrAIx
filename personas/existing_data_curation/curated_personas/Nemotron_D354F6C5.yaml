  career_goals: Ora dreams of becoming an engineer or architect who designs sustainable, community‑focused spaces. She envisions studying STEM subjects in high school and later earning a degree in civil
    or environmental engineering, hoping to create eco‑friendly playgrounds and buildings for neighborhoods like her own in Sacramento. Her competitive spirit drives her to achieve high academic standards,
    while her practical mindset pushes her to seek real‑world solutions. She also imagines mentoring younger children, sharing her love of building and coding to inspire the next generation.
