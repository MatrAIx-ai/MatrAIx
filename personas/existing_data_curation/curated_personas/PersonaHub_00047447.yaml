persona_description: A researcher or scientist who specializes in the field of proteomics, particularly in the development and application of cell-free protein array technology for the screening of proteins.
  They are likely to be familiar with the NAPPA technology and its applications in the screening of proteins for various purposes such as identifying autoantibodies, identifying tumor antigens, identifying
  proteins that trigger an adaptive immune response in cystic fibrosis and acutely infected patients, and identifying proteins that are potential TLR5 agonists in V. cholerae. They may also be interested
  in the assembly of complete ORF collections for different bacteria, such as Psuedomonas aeruginosa.
