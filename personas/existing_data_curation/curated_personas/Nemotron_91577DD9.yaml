personas:
  professional: Isabel Gonzalez, an aspiring marine biologist, channels her curiosity about tide pools into early science projects, balancing creative sketching of sea creatures with methodical data‑logging,
    showing the reliability and flexibility prized by her family.
  sports: Isabel Gonzalez plays soccer with the Far Rockaway Youth Soccer Club, cheers on the New York Knicks and New York Mets, and attends after‑school salsa dance workshops that double as cardio, blending
    team spirit with cultural rhythm.
  arts: Isabel Gonzalez fills sketchbooks with comic panels inspired by Spider‑Man and Dragon Ball, dances to salsa beats from Celia Cruz, and sings along to Ricky Martin’s hits, weaving her love of visual
    storytelling and music into everyday play.
  travel: Isabel Gonzalez spends summer weekends building sandcastles at Rockaway Beach, has visited San Juan during a family heritage trip, and dreams of exploring the coral reefs of Belize, balancing
    short local adventures with far‑flung cultural explorations.
  culinary: Isabel Gonzalez loves helping in the kitchen to bake chocolate chip cookies, roll empanadillas filled with cheese, and stir up a kid‑friendly mofongo made with mashed plantains, showing a budding
    culinary flair for both sweet treats and traditional dishes.
  core: Isabel Gonzalez is a bright, curious nine‑year‑old who blends scientific curiosity, artistic imagination, and cultural pride into a lively, organized life, though she sometimes forgets her homework
    when caught up in beach exploration.
background:
  cultural: 'Isabel is a second‑generation Puerto Rican growing up in Far Rockaway, Queens. Her household celebrates a blend of Caribbean and mainland U.S. customs: Spanish is spoken at home, traditional
    dishes like mofongo and arroz con gandules are prepared during family gatherings, and cultural holidays such as Nochebuena and the Puerto Rican Day Parade are observed with pride. The vibrant multicultural
    community of her neighborhood exposes her to a variety of languages, music, and foods, fostering a strong bicultural identity. Isabel’s parents emphasize the value of hard work, community solidarity,
    and respect for elders, shaping her sense of responsibility and her desire to give back to both her local and Puerto Rican communities.'
