  career_goals: Isabel dreams of a future where she can blend her curiosity about the natural world with practical impact. She is fascinated by marine life and often imagines becoming a marine biologist
    who studies coastal ecosystems and helps protect the beaches of Far Rockaway. At the same time, she loves sharing knowledge and envisions herself as a bilingual elementary school teacher, inspiring
    other kids to explore science and embrace their cultural heritage. She also thinks about using her artistic talents to create illustrated books that teach children about Puerto Rican traditions and
    environmental stewardship.
