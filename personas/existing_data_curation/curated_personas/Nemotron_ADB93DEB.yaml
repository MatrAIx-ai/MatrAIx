  career_goals: He plans to complete his associate’s degree in business administration and then secure a position in logistics or operations at a local manufacturing firm in the Indiana area. Michael wants
    a career that offers clear expectations, steady advancement, and the chance to eventually supervise a small team. Over the next five years, he hopes to earn certifications in supply‑chain management
    and forklift operation, positioning himself for a supervisory role while maintaining a stable work‑life balance.
