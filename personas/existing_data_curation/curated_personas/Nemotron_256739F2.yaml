personas:
  professional: Cory Hunt, an aspiring community outreach coordinator, blends self‑taught expertise in local cultural history with a natural talent for rallying neighbors into impromptu street festivals,
    using a practical, hands‑on mindset and a warm, cooperative demeanor even as they wrestle with occasional disorganization and worry about meeting deadlines.
  sports: Cory Hunt, a regular at the historic Lakeview basketball court where they join the Crescent City Hoopers pickup league, follows the New Orleans Pelicans and the Saints avidly, and spikes their
    heart rate by playing street basketball three times a week, especially during the summer league season.
  arts: Cory Hunt, who immerses themselves in second‑line brass bands and underground hip‑hop, frequently cites Wynton Marsalis, Trombone Shorty, and The Roots as musical inspirations, attends local gallery
    openings featuring the colorful murals of the Marigny, and channels that energy into spontaneous drum circles with friends.
  travel: Cory Hunt, who prefers spontaneous road trips over rigid itineraries, has explored the culinary streets of Savannah, the jazz clubs of New Orleans, the coastal breezes of Key West, and dreams
    of wandering the historic alleys of Barcelona while balancing limited savings and family responsibilities.
  culinary: Cory Hunt, an enthusiastic home cook, perfects a signature gumbo packed with andouille sausage, okra, and a splash of filé powder, experiments with blackened catfish tacos, and regularly tweaks
    a jambalaya recipe by adding smoked paprika and fresh cilantro, all while juggling a modest kitchen setup.
  core: Cory Hunt, a charismatic street‑savvy planner who worries about the future yet lives fully in the moment, balances impromptu music jams with an ever‑growing list of unfinished to‑dos.
background:
  cultural: Cory grew up in the Treme neighborhood, a historic African‑American enclave in New Orleans known for its deep roots in jazz, gospel, and Mardi Gras Indian traditions. His family life was shaped
    by close‑knit community ties, church gatherings, and the rhythmic cadence of second‑line parades that passed through the streets each weekend. The rich tapestry of Creole cuisine, spoken Creole French
    phrases, and oral storytelling passed down from elders gave him a strong sense of place and identity. While navigating the challenges of an incomplete formal education, Cory has absorbed the resilience
    and creativity that characterize the city’s Black culture, drawing on the legacy of civil‑rights activism, music innovation, and communal solidarity that continue to define New Orleans today.
attributes:
  skills: '[''Interpersonal communication'', ''Informal event coordination'', ''Local cultural knowledge'', ''Improvisational drumming'', ''Creole cooking basics'', ''Conflict mediation'', ''Digital literacy
