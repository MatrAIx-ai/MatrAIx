  hobbies: '[''Attending live jazz and brass band performances'', ''Second‑line dancing'', ''Playing drums in informal jam sessions'', ''Experimenting with Creole and Cajun recipes'', ''Street basketball'',
    ''Urban photography'', ''Exploring historic neighborhoods'', ''Reading African American history'', ''Volunteering at community youth centers'', ''Creating mixtapes of local music'']'
  career_goals: Cory aims to obtain his GED within the next year, seeing formal education as a stepping stone toward greater stability. He hopes to leverage his community connections and natural charisma
    to secure a role as a community outreach coordinator for a nonprofit that focuses on youth mentorship and cultural preservation in New Orleans. Long‑term, he dreams of opening a modest food cart that
    serves his signature gumbo and jambalaya, blending his love of Creole cooking with entrepreneurship. Alongside professional aspirations, Cory wants to develop structured coping strategies—such as regular
    mindfulness practice and counseling—to manage his tendency toward worry and stress, ultimately achieving a more balanced and financially secure life.
