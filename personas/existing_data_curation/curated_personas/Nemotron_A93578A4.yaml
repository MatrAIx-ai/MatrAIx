  hobbies: '[''Woodworking'', ''DIY home improvement'', ''Fishing'', ''Car maintenance'', ''Grilling'', ''Watching football'', ''Reading trade magazines'', ''Volunteer work at Habitat for Humanity'']'
  career_goals: Allen aims to advance from crew member to foreman within the next three years, earning industry certifications such as the Spray Foam Contractor Certification and a Construction Management
    certificate to bolster his credentials. He is working toward leading his own small insulation contracting team, focusing on efficiency, safety, and high‑quality workmanship to build a reputation for
    reliable service in the Cherry Hill area. Financially, his goal is to secure enough income to fund his children's college education and eventually retire with a modest but comfortable nest egg.
