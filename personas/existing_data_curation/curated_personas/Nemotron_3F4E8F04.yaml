  career_goals: Thomas aims to transition from a crew member to a foreman and eventually launch his own boutique landscaping firm that specializes in sustainable, art‑inspired residential projects. He plans
    to earn a Certified Landscape Professional credential and deepen his knowledge of eco‑friendly practices such as native‑plant restoration and smart‑irrigation technologies. Over the next five years,
    he hopes to secure contracts for community beautification projects in Gary, mentor younger workers, and build a reputation for blending functional groundskeeping with creative design. Financial independence
    and the ability to provide a stable future for his children remain central motivations.
