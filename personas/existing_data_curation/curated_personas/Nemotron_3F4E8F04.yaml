personas:
  professional: Thomas Francois, a 48‑year‑old veteran of Midwest landscaping, blends rigorous project budgeting and crew coordination with a keen eye for artistic garden installations, using hand‑sketches
    and simple CAD to turn client visions into sustainable, art‑inspired outdoor spaces while eyeing a foreman role and eventual boutique firm, and they balance meticulous planning with on‑site improvisation.
  sports: Thomas Francois, a regular on his neighborhood basketball league and a member of the local Midwest Hoops Association, fuels his fitness routine with early‑morning jogs, weekend pick‑up games,
    and loyal viewership of the Chicago Bulls, Bears, and Cubs, while also coaching teen players at the community garden’s after‑school sports program, and they relish the competitive spirit of the court
    as a critical outlet for stress relief.
  arts: Thomas Francois, an avid patron of the Art Institute of Chicago and frequent participant in street‑mural tours, draws creative inspiration from the works of Jean‑Michèle Basquiat, Banksy, and the
    soulful saxophone riffs of Miles Davis, channeling that aesthetic into his garden sketches and DIY woodworking projects, and they often reference favorite tracks from classic soul legends like Aretha
    Franklin while sketching new designs.
  travel: Thomas Francois prefers road‑trip adventures that blend nature and culture, having explored Mackinac Island for its historic gardens, New Orleans for its jazz‑filled alleyways, and Asheville’s
    mountain retreats, while meticulously planning future trips to Bali’s eco‑resorts to scout sustainable landscaping ideas, all within the constraints of family time and a modest travel budget, and they
    treat each journey as a field study for innovative design concepts.
  culinary: Thomas Francois, a self‑taught grill master, delights friends with Southern‑style barbecue—slow‑smoked brisket seasoned with hickory chips, smoked paprika, and a dash of bourbon—while experimenting
    with global flavors like Korean gochujang‑marinated ribs and Mediterranean herb‑infused grilled vegetables at the city’s multicultural festivals, and they proudly claim that the secret to a perfect
    rub lies in balancing sweet, smoky, and spicy notes.
  core: Thomas Francois is a competitively spirited, art‑obsessed landscaper who balances meticulous project planning with spontaneous DIY creations, yet can’t resist a late‑night jazz club or an extra
    slice of barbecue, even if it means a few extra pounds, and they often find themselves negotiating between their disciplined work ethic and their love for carefree weekend fun.
background:
  cultural: Thomas grew up in a close‑knit African‑American community in Gary, Indiana, where his grandparents were part of the Great Migration that moved from the South to the Midwest seeking industrial
    jobs. Family gatherings centered around church, soul food, and storytelling, instilling a deep sense of resilience and community pride. The city’s rich tradition of blues, jazz, and gospel music shaped
    his musical tastes, while local murals and historic preservation projects sparked his appreciation for visual art. Though he never pursued formal higher education, Thomas carries forward the values
    of hard work, solidarity, and cultural expression. He also embraces his Haitian heritage—reflected in occasional celebrations of Kompa music and dishes like griot—which adds a Caribbean layer to his
    cultural identity.
