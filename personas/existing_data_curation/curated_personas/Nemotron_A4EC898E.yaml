  career_goals: Corey aims to earn his GED within the next year and then pursue a trade certification in carpentry or HVAC that will combine his hands‑on skills with a reliable income. At the same time,
    he plans to develop a modest freelance photography and artwork business, selling prints and custom pieces through local cafés and online. This hybrid approach will give him the flexibility to spend
    time with his spouse, continue artistic projects, and contribute to the Norfolk community.
