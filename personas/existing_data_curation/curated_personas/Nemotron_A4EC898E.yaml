personas:
  professional: Corey Rodriguez, an aspiring freelance photographer and budding carpenter, merges a curious eye for Norfolk’s streets with a laid‑back, improvisational work style; they leverage Lightroom,
    Photoshop, and hands‑on repair skills to deliver vibrant cityscape prints and reliable home‑improvement services, all while embracing flexible, semi‑organized project schedules.
  sports: Corey Rodriguez enjoys casual beach jogs with the Norfolk Runners club and follows the Norfolk Tides for baseball, the Washington Capitals for hockey, and the DC United for soccer, preferring
    low‑key, flexible workouts over strict gym regimens while occasionally joining community pick‑up basketball games in the summer.
  arts: Corey Rodriguez dives into the gritty street photography inspired by Gregory Crewdson’s cinematic style, paints cityscapes echoing Edward Hopper’s use of light, and strums acoustic renditions of
    Iron & Wine during quiet evenings, while regularly attending live gigs by indie acts such as Local Natives and improv shows featuring The Richmond Improv troupe.
  travel: Corey Rodriguez favors spontaneous weekend getaways over rigid itineraries, often escaping to the Outer Banks for surf‑side sunsets, dreaming of a future trip to Lisbon’s pastel‑colored streets,
    and balancing limited funds by swapping house‑sitting gigs in nearby towns.
  culinary: Corey Rodriguez, a self‑taught home chef, experiments with Southern‑inspired dishes like shrimp étouffée seasoned with creole paprika and fresh okra, often improvising a honey‑gochujang glaze
    for grilled vegetables, and enjoys casual dining at Norfolk’s waterfront eateries while regularly sourcing heirloom tomatoes and heirloom corn at the local farmers market.
  core: Corey Rodriguez is a free‑spirited visual storyteller who thrives on late‑night photo walks, deliberately leaves their calendar blank for creative spontaneity, and habitually misplaces their paintbrushes
    in junk drawers while still delivering vibrant city‑scape prints.
background:
  cultural: Corey grew up as a White American in the coastal city of Norfolk, Virginia, where the naval presence and maritime heritage shape the local culture. His upbringing blended Southern hospitality
    and a respect for community harmony with exposure to a diverse population and an emerging arts scene. He values the practical, down‑to‑earth work ethic common in the region while also embracing the
    progressive, experimental spirit of the city’s galleries and music venues. These influences inform his balanced outlook, his love for both traditional Southern cooking and contemporary artistic expression.
