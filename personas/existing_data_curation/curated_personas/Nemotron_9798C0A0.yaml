personas:
  professional: A data‑driven health services leader, Angela Shafer leverages her STEM background and operational expertise to streamline hospital departments, champion patient‑safety initiatives, embed
    emerging digital health technologies, and mentor future administrators; they are celebrated for balancing analytical rigor with compassionate leadership.
  sports: An enthusiastic outdoor participant and devoted sports fan, Angela Shafer regularly hikes the Great Allegheny Passage with the Pittsburgh Trail Club, follows the Steelers, Penguins, and Pirates,
    attends weekly yoga sessions at the community center for flexibility, and plays midfield on a senior co‑ed softball team each summer; they schedule all activities in a quarterly planner to keep a balanced
    fitness routine.
  arts: A passionate arts patron, Angela Shafer attends jazz performances by the Pittsburgh Jazz Orchestra and Wynton Marsalis, joins a historical nonfiction book club discussing Doris Kearns Goodwin, creates
    intricate quilts inspired by Mary Schafer’s patterns, and captures black‑and‑white landscapes reminiscent of Ansel Adams through photography; they often hum the melodies they heard at concerts while
    stitching, a quirk that sparks creativity.
  travel: A meticulous but adventure‑gleeful traveler, Angela Shafer has completed weekend road trips along the Great Allegheny Passage, explored historic Boston and Dublin, and is mapping a spring itinerary
    through the Scottish Highlands to tour medieval castles and whisky distilleries, balancing the airfare and lodging costs with modest contributions from hospital bonuses; they favor pre‑booked itineraries
    with a few “free” days for spontaneous detours.
  culinary: A garden‑to‑table culinary enthusiast, Angela Shafer harvests tomatoes, zucchini, basil, and kale from her backyard plot and transforms them into dishes like roasted beet and goat‑cheese salad,
    quinoa‑stuffed bell peppers with feta, and herb‑chimichurri grilled salmon, while occasionally treating themselves to a slice of Pittsburgh’s famed pepperoni pizza; they experiment with seasonal herbs
    but admit to over‑salting occasionally when tasting sauces.
  core: Angela Shafer blends rigorous strategic precision with organized creativity—crafting efficient hospital operations, meticulous quilts, and well‑planned hikes—while maintaining a low‑risk financial
    discipline, a habit of humming jazz in spreadsheets, and a gentle tendency to over‑schedule her calendar.
background:
  cultural: Angela is a White American raised in the Greater Pittsburgh area, with family roots tracing back to German and Irish ancestry. She grew up in a middle‑class household that prized education,
    self‑reliance, and community service. The region’s transition from steel manufacturing to a hub for healthcare and technology has shaped her pragmatic outlook, emphasizing efficiency, collaborative
    problem‑solving, and a commitment to improving public health for her community.
