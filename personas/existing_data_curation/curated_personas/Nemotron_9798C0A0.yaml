  hobbies: '[''Gardening'', ''Hiking on the Great Allegheny Passage'', ''Reading historical non-fiction'', ''Attending jazz concerts'', ''Book club'', ''Volunteering for health literacy workshops'', ''Quilting'',
    ''Photography'', ''Yoga'']'
  career_goals: Angela aims to advance to a senior executive role, such as Chief Operating Officer, within a leading health system in the Pittsburgh region. She is driven to spearhead system‑wide quality
    and safety programs, integrate emerging digital health technologies, and expand community outreach to improve health equity. Additionally, she seeks to mentor emerging health administrators, pursue
    an executive certification, and contribute as an adjunct faculty member at a local university, sharing her practical knowledge while maintaining a balanced workload.
