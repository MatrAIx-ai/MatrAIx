persona_description: Alfred Fischer was a German architect who was born in Stuttgart in 1881 and died in 1950. He studied architecture at the Stuttgart Technical University of Architecture under Professor
  Theodor Fischer and later worked as an assistant for the urban design consultant Ludwig Hoffmann and Paul Schultze-Naumburg. He became a teacher at the College of Arts and Crafts in Düsseldorf and led
  the Essen Arts and Crafts School from 1911 to 1933. He was awarded a professorship in 1921 and an Engineering doctorate from the Hannover Technical University in 1929. He was a member of the German Architects
  Federation and an executive member of the Deutscher Werkbund. He worked freelance as an architect and also worked as an advocate of modern architecture and modern training concepts. He experienced difficulties
  with the school after the change of power in 1933 to the Nazis, but he was given time off and soon after moved into premature retirement. He left Essen and moved to Murnau. He left a legacy of acknowledged
  contributions to industrial culture and numerous buildings, important examples of regional architectural history in the Ruhrgebiet.
