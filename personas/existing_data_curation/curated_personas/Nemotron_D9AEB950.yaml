  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Creative writing'', ''Poetry'', ''Reading speculative fiction'', ''Philosophy'', ''Food photography'', ''Experimental cooking'', ''Nature
    hikes'', ''Ambient music listening'', ''Local art workshops'', ''Journaling'']'
  career_goals: She plans to deepen her hospitality knowledge by earning a culinary arts diploma and a ServSafe Manager certification within the next two years. While gaining experience, Victoria aims to
    advance to a regional management role where she can influence menu development and champion innovative, art‑inspired dining experiences. Ultimately, she dreams of opening her own boutique café that
    doubles as a small gallery, offering experimental cuisine that reflects her love for abstract art and novelty, and she hopes to share her culinary creations through a food‑style blog and occasional
    writing for local magazines.
