  career_goals: Robert aims to transition from full‑time floor work to a part‑time mentorship and consulting role within the next two years, using his STEM background to help the store adopt newer technologies
    such as AI‑driven inventory tools. He hopes to develop a structured training program for junior sales associates, leveraging his balance of organization and flexibility. While he values job stability,
    he also dreams of eventually opening a small hobby‑shop focused on woodworking tools and classic car parts, allowing him to combine his technical interests with community service by offering workshops
    for local seniors.
