  career_goals: Sofia dreams of working with animals and hopes to become a veterinarian or wildlife conservationist, inspired by the rabbits and birds she often sees in the neighborhood. She also enjoys
    helping classmates understand new ideas, so she envisions herself as a teacher one day, sharing her love of reading and science. In the short term, she wants to keep her grades high, join the school
    science club, and volunteer at the local animal shelter to gain hands‑on experience.
