personas:
  professional: Sofia Lopez is a budding young architect who merges her curiosity for adventure stories with practical Lego engineering; they meticulously plan intricate structures while staying flexible
    enough to improvise when pieces don’t fit, and they collaborate cheerfully with classmates, always prioritizing group harmony.
  sports: Sofia Lopez kicks the ball for the Riverbend Rovers youth soccer club after school, modeling teamwork by passing to teammates before making daring shots; they channel the enthusiasm of their favorite
    professional squads—the U.S. Women’s National Team and San Antonio FC—while keeping a modest collection of team stickers in their backpack.
  arts: Sofia Lopez fills sketchbooks with lively cartoons inspired by Rebecca Sugar’s expressive characters and Kazu Kibuishi’s adventurous panels, while they weave colorful papel picado for family celebrations
    and dance energetically to the cumbia rhythms of Los Ángeles Azules and the folk melodies of Simon & Garfunkel, blending visual and musical creativity into everyday play.
  travel: Sofia Lopez explores local green spaces like the San Antonio Botanical Garden and weekend trips to Big Bend National Park, where they curate rock and leaf collections, and they dream of future
    adventures to the ancient citadel of Machu Picchu and the coral reefs of the Great Barrier Reef, a travel appetite balanced by their parents’ careful budgeting and organized itineraries.
  culinary: Sofia Lopez loves to assist in the kitchen by mashing ripe avocados, chopping cilantro, and squeezing fresh lime for guacamole, warming corn masa to roll homemade tortillas, and they proudly
    assemble quick quesadillas topped with melted cheese and salsa, turning each culinary moment into a playful lesson in flavor and tradition.
  core: Sofia Lopez is a bright, organized 9‑year‑old whose curiosity for adventure fuels their Lego inventions, soccer kicks, and artistic doodles, while they display a compassionate nature and an occasional
    habit of leaving stray Lego bricks on the floor, keeping life ever‑interesting.
background:
  cultural: Sofia comes from a Mexican‑American family that blends traditions from both cultures. She celebrates Dia de los Muertos and Cinco de Mayo with her grandparents, enjoys homemade tacos, tamales,
    and family stories told in Spanish. Bilingual at home, she balances Mexican cultural values of family respect and community with the friendly, neighborly spirit of Mead, Oklahoma. This multicultural
    upbringing influences her love for music, food, and community service.
