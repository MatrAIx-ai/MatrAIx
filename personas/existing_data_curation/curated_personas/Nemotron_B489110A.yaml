  career_goals: Todd aims to stay intellectually engaged by pursuing lifelong learning, mentoring younger professionals, contributing to community education initiatives, and creating a personal anthology
    of his scientific and artistic reflections. He hopes to author a book that interweaves his experiences in research, art, and personal growth, and to volunteer as a STEM outreach mentor at local schools.
    Additionally, he seeks to manage his stress through mindfulness and balanced activity, ensuring his well‑being while making a meaningful impact.
