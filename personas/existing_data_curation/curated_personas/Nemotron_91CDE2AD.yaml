  career_goals: Tariq aims to expand his current role as a painter/paperhanger into a small, family‑owned interior finishing contracting business that specializes in eco‑friendly and historic‑preservation
    projects. Over the next five years, he plans to earn Certified Wall and Ceiling Finisher (CWF) credentials, deepen his knowledge of decorative plaster work, and build a reliable client base in the greater
    New Jersey area. He also hopes to mentor apprentices, ensuring precision and craftsmanship are passed on, while maintaining a work schedule that supports his family's need for stability and quiet evenings
    together.
