  hobbies: '[''walking'', ''birdwatching'', ''knitting'', ''reading historical fiction'', ''cooking and preserving'', ''church volunteer work'', ''listening to big band music'', ''gardening'']'
  career_goals: At 86, Diana’s ambition is to maintain her independence and continue contributing to her community in ways that fit her strengths. She hopes to keep her garden thriving, share her recipes
    and preserving techniques with younger neighbors, and mentor volunteers at the local senior center. She also wishes to document family stories for her grandchildren, ensuring that her heritage and the
    history of Moses Lake are preserved.
