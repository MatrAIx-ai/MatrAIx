  career_goals: Hattie aims to formalize her logistics expertise by obtaining a supply‑chain management certificate from a local community college and maintaining her forklift certification. In the next
    three to five years she hopes to advance to a warehouse supervisor or logistics coordinator role where she can design efficient workflows and mentor new hires. Long‑term, she envisions merging her operational
    skill set with her passion for the arts—perhaps by overseeing collection logistics for a museum or cultural institution, or by managing the distribution side of a community art space. She also dreams
    of establishing a small studio where she can host quiet, invitation‑only art workshops for fellow introverts.
