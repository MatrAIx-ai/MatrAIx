personas:
  professional: Justin Chevalier is a seasoned retail associate with strong customer‑service and POS expertise, who leverages their practical problem‑solving and calm conflict resolution to mentor teammates
    while eyeing a shift‑supervisor role that balances leadership ambitions with a flexible schedule.
  sports: Justin Chevalier hones fitness through weekend hikes on the rugged nearby mountain range and occasional fly‑fishing trips, while cheering the local minor‑league baseball club the River Runners
    and joining a community‑gym pickup basketball crew each summer.
  arts: Justin Chevalier finds creative solace in woodworking and a keen appreciation for Americana folk music, regularly listening to "John Denver" and "Alison Krauss", attending Ken Burns documentary
    screenings, and collecting vintage National Geographic issues.
  travel: Justin Chevalier prefers low‑key road trips that blend nature and family time, having explored the alpine valleys of Patagonia and the historic frontier ghost towns of the high plains, yet they
    favor spur‑of‑the‑moment weekend getaways over costly overseas cruises.
  culinary: Justin Chevalier, an amateur chef, delights in cooking hearty farm‑to‑table meals such as rosemary‑roasted chicken with root vegetables, fresh trout grilled with lemon‑dill butter, and a summer
    garden salad tossed with heirloom tomatoes, while occasionally treating themselves to a steakhouse ribeye when a promotion rolls around.
  core: Justin Chevalier blends quiet curiosity with rugged practicality, juggling a love for solitary hikes, DIY woodworking, and a habit of misplacing their keys in the garden while still dreaming of
    managing a community‑focused outdoor‑gear shop.
background:
  cultural: Justin grew up in the small-town environment of south-central Idaho, where self-reliance, practicality, and community ties are valued. His family background is rooted in the agricultural and
    ranching traditions of the region, with a cultural emphasis on hard work, modesty, and a love of the outdoors. Having attended high school locally, he reflects the idioms and values of the broader American
    West—respect for individual freedom, a straightforward communication style, and a balanced appreciation of both traditional customs and new ideas.
