  career_goals: Justin aims to advance within the retail sector by becoming a shift supervisor or store manager, seeking responsibilities that allow him to mentor new staff while preserving a flexible schedule.
    He also contemplates attending evening courses in business management to develop leadership skills, and at the longer term he dreams of opening a small outdoor-gear shop that aligns with his love for
    nature and community involvement.
