  hobbies: '[''Reading classic literature'', ''Attending local theater performances'', ''Gardening (flowers and vegetables)'', ''Knitting and crocheting'', ''Walking and birdwatching in Forest Park'', ''Listening
    to jazz and folk music'', ''Cooking family recipes'', ''Participating in a book club'', ''Genealogy research'', ''Crossword puzzles'', ''Volunteering at the public library'']'
  career_goals: At this stage Kathryn’s ambitions centre on personal enrichment and community contribution rather than professional advancement. She hopes to complete a memoir that captures her family’s
    story and the cultural history of Portland, and to organize an oral‑history project that records the memories of fellow seniors. She aims to continue volunteering as a reading mentor at the local library,
    to support the neighborhood garden, and to learn digital photography to document her garden and community events. Maintaining her health, independence, and a steady routine are also important goals.
