  career_goals: Although retired, Philip aims to continue contributing to his community. He hopes to mentor seniors in digital literacy, curate a small exhibit on Knox County’s industrial history at the
    local museum, and write a memoir that weaves together his experiences with the town’s cultural changes. He also aspires to learn advanced digital photography to document local festivals, and to travel
    to a few art museums in the Midwest he has long wanted to see.
