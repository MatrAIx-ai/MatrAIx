persona_description: A health services researcher who is interested in understanding the history and impact of health services research, particularly in the United States. This individual is likely to have
  a background in health services research and has an interest in the use of methods from other disciplines in this field. They may have experience with analyzing data in Excel and have a desire to learn
  more about the impact of sociologists and psychologists on health services research. They are interested in understanding the changes in health services over time and how these changes have affected the
  provision of health services.
