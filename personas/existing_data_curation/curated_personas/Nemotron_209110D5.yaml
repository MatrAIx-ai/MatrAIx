  career_goals: Ingrid aims to secure a stable, entry‑level administrative or bookkeeping position within a small to mid‑size company in the Dallas area, where routine tasks and clear procedures are valued.
    She plans to build on her associate degree by mastering office‑management software and gaining experience in accounts payable/receivable. Over the next five years, she hopes to earn a bachelor’s degree
    in Business Administration part‑time, advance to an office manager role, and eventually supervise a small team, while maintaining a predictable work schedule that aligns with her preference for routine
    and reliability.
