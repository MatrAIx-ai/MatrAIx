  hobbies: '[''Reading (self‑help, mystery novels)'', ''Journaling'', ''Knitting'', ''Indoor gardening'', ''Cooking simple recipes'', ''Walking in local parks'', ''Listening to podcasts (business, self‑improvement)'',
