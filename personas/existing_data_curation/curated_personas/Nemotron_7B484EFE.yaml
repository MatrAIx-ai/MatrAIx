personas:
  professional: Annette Pope is a master carpenter with over three decades of residential construction experience in Madison County, known for their meticulous blueprint reading, strict adherence to building
    codes, and a methodical project‑scheduling style that mirrors a love of routine; they lead crews with quiet authority, mentor apprentices—especially women—by offering step‑by‑step guidance, and balance
    assertive client communication with a deep sense of reliability that has earned a reputation for delivering high‑quality custom cabinetry and furniture on time, every time.
  sports: Annette Pope supports the Alabama Crimson Tide football team and cheerfully follows the Huntsville Havoc hockey games, while their own athletic pursuits consist of early‑morning walks on the local
    trail for birdwatching, participation in the senior softball league at the community center, and a gentle stretching regimen that helps mitigate stiffness from years of carpentry; they value the routine
    of a weekly walking club, but when a big game coincides with a workshop deadline, they may skip the walk, feeling a twinge of guilt.
  arts: Annette Pope expresses their artistic side through soulful participation in their church choir, where they often sing hymns popularized by Mahalia Jackson, and through evenings spent quilting with
    patterns reminiscent of traditional Southern textiles; they have a deep appreciation for blues legends like B.B. King, enjoy reading Agatha Christie mystery novels on the porch, and regularly visit
    the local art fair to view folk‑art pieces, allowing the rhythm of gospel and the colors of handcrafted quilts to inform their design aesthetic in custom furniture.
  travel: Annette Pope prefers organized road trips that blend family visits, cultural immersion, and a touch of adventure, having recently taken a weekend pilgrimage to New Orleans to sample jambalaya
    and listen to live jazz, a scenic drive along the Blue Ridge Parkway to photograph fall foliage, and a short group tour of Washington, D.C.’s historical museums with their church fellowship; they plan
    to one day see the Grand Canyon, but they always book accommodations in advance and adhere to a fixed itinerary, feeling uneasy about spontaneous travel.
  culinary: Annette Pope’s kitchen is a sanctuary where they prepare soul‑food staples such as fried chicken, collard greens cooked with smoked turkey, cornbread, shrimp and grits, and a sweet potato casserole,
    often seasoning dishes with basil, thyme, and parsley harvested from their herb garden; they are an accomplished baker, famed for pecan pie and peach cobbler at family gatherings, though their habit
    of losing track of time while sanding wood sometimes leads to over‑browned pies—a quirky reminder of their intertwined love for craftsmanship and cooking.
  core: Annette Pope is a meticulous master carpenter whose routine‑driven life intertwines gospel choir singing, garden‑fresh soul‑food cooking, careful budgeting, and a steadfast commitment to mentoring
    women in a traditionally male trade, all while quietly wrestling with health worries.
background:
  cultural: Annette was born and raised in Madison County, Alabama, within a close‑knit African‑American community that values church fellowship, family solidarity, and self‑reliance. Her father was a carpenter
    and her mother a seamstress, and she grew up watching the hands‑on craftsmanship that shaped both her home and her identity. The traditions of Southern Black culture—gospel music, soul‑food cooking,
    and church service—have been central to her life. As one of the few Black women in a traditionally male‑dominated trade, Annette faced occasional bias but earned respect through her reliability and
    high‑quality work. She remains active in the local NAACP chapter, participates in community festivals celebrating African‑American heritage, and mentors younger members of her community, keeping the
    legacy of craftsmanship and cultural pride alive.
