  hobbies: '[''Gardening (vegetables & herbs)'', ''Cooking Southern cuisine'', ''Baking pies and desserts'', ''Listening to gospel and blues music'', ''Quilting and sewing'', ''Building birdhouses'', ''Birdwatching'',
    ''Church choir participation'', ''Volunteering teaching woodworking'', ''Reading mystery novels'', ''Reading biographies'']'
  career_goals: Looking ahead, Annette aims to transform her decades‑long practice into a modest, family‑run workshop that produces custom furniture for the Madison community while maintaining a limited
    number of selective carpentry contracts for steady income. She plans to obtain an official journeyman certification and a small‑business licence to formalize her operation, and to mentor two to three
    apprentices, with a focus on bringing more Black women into the trade. Annette also hopes to document her traditional Southern carpentry techniques in a concise guidebook, and to collaborate with local
    churches and community groups on renovation projects that strengthen neighborhood ties.
