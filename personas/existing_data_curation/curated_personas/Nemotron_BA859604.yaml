  hobbies: '[''Reading contemporary fiction'', ''Hiking along Lake Erie'', ''Yoga and mindfulness meditation'', ''Cooking and baking'', ''Scrapbooking'', ''Learning basic Spanish'', ''Volunteering at a
    local animal shelter'']'
  career_goals: Ghada aims to advance from her current secretary role to an office manager position within the next five years. To achieve this, she plans to complete a Certified Administrative Professional
    (CAP) credential and enroll in a bachelor's program in Business Administration, building on her some college coursework in business and psychology. She is eager to develop stronger leadership and project‑coordination
    skills, and to gain experience in team supervision and budgeting. Additionally, she wants to integrate mental‑health awareness training into her professional toolkit, so she can support colleagues and
    improve workplace well‑being while managing her own emotional reactivity.
