  career_goals: Although retired from formal employment, Luan remains goal‑oriented. She aims to attain a nonprofit financial management certification so she can volunteer as the treasurer for a local cultural
    organization, ensuring its resources are managed with the same precision she applied in her career. She also hopes to launch a modest home‑based culinary venture that offers traditional Vietnamese dishes
    to her neighborhood, combining her love of cooking with her entrepreneurial spirit. Finally, Luan aspires to mentor emerging Vietnamese‑American women entering the business world, providing them with
    structured guidance and practical insights.
