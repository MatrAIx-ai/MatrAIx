  hobbies: '["Painting and sketching","Visiting art museums and galleries","Reading art history and biographies","Journaling","Indoor herb gardening","Quiet nature walks in Lincoln parks","Listening to
    instrumental/classical music","Volunteering for community art workshops"]'
  career_goals: Andrea aims to translate her customer-service expertise into a leadership or training role where she can mentor new representatives and design compassionate communication protocols. She
    plans to pursue a bachelor's degree in psychology or communications to deepen her understanding of human behavior, which will support a future as a Customer Experience Manager or Training Facilitator.
    Long-term, she hopes to combine her love of art with community service by directing outreach programs for local museums or cultural centers, creating inclusive art-education workshops for underserved
    neighborhoods.
