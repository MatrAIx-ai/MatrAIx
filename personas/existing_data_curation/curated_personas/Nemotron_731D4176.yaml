personas:
  professional: Andrea Scott transforms her extensive front‑line customer service experience into a mentorship mindset, using active listening, empathy, and an eye for aesthetic detail to train new reps,
    design compassionate communication protocols, and craft visually engaging instructional guides.
  sports: Andrea Scott stays fit by attending a weekly sunrise yoga class at the Lincoln Community Center, joining the Nebraska Running Club for the spring 5K series, and cheering on the Nebraska Cornhuskers
    football team, while they prefer low‑impact cardio like brisk park walks over high‑intensity gym workouts.
  arts: Andrea Scott immerses herself in the art world by painting Nebraska landscapes in watercolor, studying the works of Georgia O'Keeffe and Monet, regularly visiting the Sheldon Museum of Art and local
    galleries, and they unwind to instrumental composers such as Max Richter and Ólafur Arnalds.
  travel: Andrea Scott prefers solitary, museum‑focused trips, having explored the Art Institute of Chicago, the Metropolitan Museum of Art in New York, and a cultural weekend in Florence to see the Uffizi,
    while they dream of a quiet pilgrimage to Kyoto’s temples, planning each itinerary with a detailed journal and budgeting for moderate airfare and modest accommodations.
  culinary: Andrea Scott enjoys cooking simple, herb‑infused meals like lemon‑rosemary grilled chicken, basil pesto pasta, and quinoa salads with cilantro and lime, showcasing a moderate skill level in
    the kitchen, and they treat themselves to a slice of deep‑dish pizza on rare cheat‑day evenings.
  core: Andrea Scott blends a solitary artistic soul with a compassionate, detail‑oriented service mindset, balancing disciplined finances and health routines while quietly nurturing community‑focused ambitions.
background:
  cultural: Andrea's cultural background reflects a Midwestern white American upbringing in Nebraska. Her family's heritage is largely of German and English ancestry, common to the region, and she was raised
    with values of modesty, self-reliance, and community responsibility. The Midwestern emphasis on politeness, hard work, and neighborly help shaped her compassionate and cooperative nature. Growing up
    in Lincoln's suburban environment, she experienced a blend of small-town sensibility and access to cultural institutions such as local museums and theaters, fostering her appreciation for art while
    reinforcing a preference for quiet, reflective spaces.
attributes:
