persona_description: A collaborative educator who has experience revisiting established unit of inquiry and using technology to create practical resources for students. They are inspired by Leigh Ann's
  blog post and use 3D grids to present views of 3D shapes. They are interested in bringing math to the forefront of their unit of inquiry and have found direct relevance in their unit by using a solar
  powered fan cap and a card clapper. They are an international teacher collaborating, exploring, and sharing ideas with others, like themselves, for their collective professional development and enjoyment
  of learning and teaching.
