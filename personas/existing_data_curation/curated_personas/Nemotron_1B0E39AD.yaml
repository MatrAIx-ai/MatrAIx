personas:
  professional: Almita Echols, a seasoned physical therapist with over two decades of clinical expertise in biomechanics and manual therapy, blends a curiosity for emerging wearable tech and virtual‑rehab
    platforms with a practical, patient‑centered approach that honors community storytelling traditions and culturally sensitive communication, while leading wellness workshops, mentoring junior clinicians,
    and championing equity in access to rehabilitation services.
  sports: Almita Echols, an enthusiastic Zumba and swing dancer, spends weekends hiking the trails of Shenandoah National Park, follows the Washington Commanders in the fall and the Lynchburg Hillcats baseball
    team in the summer, and participates in a local walking club that meets every Saturday morning for a mile‑long circuit around the city’s historic district.
  arts: Almita Echols, a vibrant community‑theater performer and karaoke host, delights in bringing classic swing numbers by the Glenn Miller Orchestra to life, sings soulful renditions of Stevie Wonder’s
    ballads at church events, and finds literary escape in contemporary Southern fiction that explores intergenerational storytelling, often sharing book club insights over homemade collard‑green biscuits.
  travel: Almita Echols, an adventure‑seeking yet budget‑conscious traveler, has explored Savannah’s historic squares, soaked in the jazz scene of New Orleans during Mardi Gras, trekked the Appalachian
    Trail’s Blue Ridge segment, and dreams of a restorative retreat in the Great Smoky Mountains while balancing family responsibilities and her clinic schedule.
  culinary: Almita Echols, a soulful kitchen experimenter, cooks family‑style dishes like smoked turkey collard greens, baked sweet‑potato casserole, and heirloom‑tomato gumbo, seasoning with garlic, smoked
    paprika, and fresh thyme, while frequently swapping deep‑fried sides for roasted alternatives to keep her meals both comforting and heart‑healthy.
  core: Almita Echols, a charismatic therapist with a love for dance, garden, and community storytelling, balances curiosity for cutting‑edge rehab tech with a relaxed, people‑first mindset that sometimes
    leads to charming disorganization.
background:
  cultural: Almita grew up in a close-knit African-American family in the South, where church, storytelling, and communal meals were central to daily life. She attended a Historically Black College and
    University for her undergraduate studies, which deepened her appreciation for Black heritage and the importance of representation in health professions. Living in Lynchburg, she remains active in the
    local Black community, celebrating Juneteenth, supporting Black-owned businesses, and participating in the Virginia University of Lynchburg alumni network. Her cultural identity informs her practice;
    she routinely incorporates culturally sensitive communication, acknowledges traditional health beliefs, and advocates for equity in access to rehabilitation services. Almita also collaborates with local
    churches and community centers to provide free wellness workshops, reflecting the collective spirit of her cultural background.
attributes:
  skills: '[''Musculoskeletal assessment'', ''Neurological rehabilitation'', ''Manual therapy'', ''Therapeutic exercise prescription'', ''Gait analysis'', ''Pain management'', ''Patient education and counseling'',
