    practice'', ''Mentoring and clinical instruction'', ''Leadership in clinic operations'']'
  hobbies: '[''Community theater acting'', ''Karaoke nights'', ''Zumba and swing dancing'', ''Backyard gardening'', ''Cooking soul food with healthful twists'', ''Reading African-American contemporary literature'',
    ''Hiking in Shenandoah National Park'', ''Yoga and mindfulness practice'', ''Volunteering at local health fairs'', ''Mentoring high-school students in STEM'', ''Church choir participation'']'
  career_goals: Almita aims to expand her impact beyond the clinic by pursuing a Doctorate in Physical Therapy (DPT) focused on health-disparities research, and obtaining a board-certified specialty in
    sports or neurological rehabilitation. She envisions opening a community-based wellness center in Campbell County that offers low-cost rehab services, culturally tailored fitness programs, and tele-health
    outreach for underserved neighborhoods. Additionally, she seeks to become a clinical educator at a local university, mentor Black women entering the health-sciences, and serve on the board of the National
    Black Physical Therapy Association to advocate for equitable care policies. Long-term, she hopes to author a guidebook on integrating technology with culturally competent physical therapy practice.
