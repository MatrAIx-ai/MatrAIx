persona_description: A California-based water utility manager who is responsible for managing the energy and water demands of their organization. They are tasked with ensuring that the organization is energy-efficient
  and minimizing its greenhouse gas emissions. They are aware of the significant energy requirements of groundwater pumping and irrigation, and are seeking ways to reduce these demands while maintaining
  a sustainable water supply. They are actively exploring and implementing strategies to better understand the energy intensity of their water system, identify potential improvements, and manage peak energy
  demand and related expenses during dry conditions.
