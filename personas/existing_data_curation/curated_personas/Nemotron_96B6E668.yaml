  hobbies: '[''Hiking in desert trails'', ''DIY home improvement projects'', ''Cactus and succulent gardening'', ''Classic rock music'', ''Photography of desert landscapes'', ''Reading non‑fiction (history,
    self‑improvement)'', ''Cooking barbecue'', ''Volunteering at local community center'']'
  career_goals: Lance aims to re‑enter the workforce in a role that offers clear structure and predictability, such as facilities management, logistics coordination, or a supervisory position in a small
    contracting firm. He is also exploring the possibility of launching a modest handyman business that capitalizes on his repair and DIY expertise, seeking to obtain any necessary trade certifications
    (e.g., HVAC or contractor license) to solidify his credibility. His long‑term ambition is to achieve financial stability, build a consistent client base, and maintain a balanced lifestyle that allows
    time for his personal interests while providing reliable income.
