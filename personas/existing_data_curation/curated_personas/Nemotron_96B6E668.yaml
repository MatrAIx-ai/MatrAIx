personas:
  professional: Lance Stone, a 48‑year‑old aspiring facilities manager, channels his practical mindset, meticulous budgeting, and conflict‑resolution expertise into keeping small‑scale projects on schedule
    and harmonious, while his love for structure drives his methodical approach to logistics and inventory control.
  sports: Lance Stone stays fit by tackling desert hikes near Surprise, is a member of the Desert Trail Riders club, roots for the Arizona Cardinals and Phoenix Suns, and joins pick‑up basketball games
    at the local community center whenever the schedule permits.
  arts: Lance Stone unwinds to classic‑rock icons like Led Zeppelin and The Rolling Stones, spends weekends photographing the sun‑baked Sonoran desert with his Nikon D850, admires Ansel Adams’ black‑and‑white
    landscapes, and occasionally attends photography workshops featuring desert‑focused artists like Peter Lik.
  travel: Lance Stone prefers meticulously planned road trips that blend adventure with comfort, often exploring nearby desert marvels such as Sedona, Monument Valley, and the Grand Canyon, while dreaming
    of a future summer journey to Kyoto’s zen gardens and the historic streets of Barcelona.
  culinary: Lance Stone enjoys hearty southwestern fare, frequently grilling ribeye steaks seasoned with smoked paprika and cumin, whipping up cactus‑flower tacos garnished with fresh cilantro and lime,
    and showcasing his intermediate cooking prowess by perfecting a slow‑cooked brisket in a cast‑iron skillet.
  core: Lance Stone, a 48‑year‑old desert‑hiking handyman, balances a love for orderly projects with spontaneous classic‑rock karaoke in the garage, yet can’t resist buying extra car parts even when his
    budget is tight.
background:
  cultural: Lance grew up in a small Midwestern town, absorbing a work‑ethic focused on reliability, modesty, and community cooperation. After moving to Arizona in his thirties, he embraced the Southwestern
    lifestyle, developing an appreciation for the desert environment, outdoor recreation, and regional traditions. While identifying as part of the broader white American cultural milieu, his values blend
    Midwestern practicality with a Southwestern fondness for outdoor activities and community involvement. This cultural mix informs his pragmatic outlook, cooperative nature, and desire for harmonious,
    structured living.
attributes:
  skills: '[''Project coordination'', ''Logistical planning'', ''Inventory management'', ''Basic accounting'', ''Mechanical repairs'', ''Facility maintenance'', ''Customer service'', ''Conflict resolution'',
