  hobbies: '[''Reading historical biographies'', ''Gardening (vegetable/flower)'', ''Model train building'', ''Listening to jazz and blues music'', ''Church fellowship and volunteering'', ''Walking in Fairground
    Park'', ''Chess'', ''Cooking traditional Southern dishes'', ''Woodworking (small projects)'']'
  career_goals: Approaching traditional retirement age, Mohammed aims to remain an active contributor by transitioning to a part‑time advisory role within his company or at local nonprofits. He hopes to
    mentor younger inventory clerks, codify his decades‑long knowledge into a concise handbook, and receive formal acknowledgment for his years of reliable service. Simultaneously, he seeks to secure a
    stable pension, allocate time to support his grandchildren’s education, and continue his volunteer logistics work for the church’s food pantry.
