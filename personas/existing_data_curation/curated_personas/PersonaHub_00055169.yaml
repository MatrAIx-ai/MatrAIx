persona_description: A sawyer or a woodworker who specializes in the process of converting off-cut and short-length timbers into usable timber products, and who is interested in the technical aspects of
  joining these pieces together. This person is likely to be interested in learning about the process of finger-jointing and the benefits of using this technique for increasing the recovery rate of sawn
  timber. This person may also be interested in the different products that can be made from finger-jointed timber, such as profiles of general moulding and laminated beams, and the factors that contribute
  to the premium pricing of this type of timber.
