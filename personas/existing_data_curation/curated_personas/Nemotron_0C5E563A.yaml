personas:
  professional: Matthew Coakley, a 15-year-old aspiring software developer and debate enthusiast, channels his meticulous organization, practical curiosity, and talkative charisma into designing polished
    indie games, leading research for school debate rounds, and orchestrating the technical backstage crew for the theater program.
  sports: Matthew Coakley, a midfield player for the Greenwood Youth Soccer Club, combines his disciplined training routine with a love for teamwork, regularly watches Seattle Sounders FC matches for tactical
    inspiration, and balances competitive play with weekend pick-up games that satisfy his sociable nature.
  arts: Matthew Coakley, an enthusiastic member of the school theater troupe, draws creative fuel from Lin-Manuel Miranda's musical storytelling, Isaac Asimov's science-fiction narratives, and Christopher
    Nolan's cinematic twists, often quoting lines from Hamilton or Star Wars during rehearsals to energize fellow cast members.
  travel: Matthew Coakley, who has already explored Yellowstone National Park and the Smithsonian Institution with his family, dreams of attending a manga convention in Tokyo and chasing the Northern Lights
    in Reykjavik, favoring meticulously planned itineraries that balance adventure with budget-friendly hostel stays.
  culinary: Matthew Coakley, an aspiring home chef, favors spicy ramen with sriracha, tacos al pastor topped with fresh cilantro and lime, and homemade mac and cheese, often experimenting with cheddar cheese
    and avocado to perfect comfort-food twists while occasionally burning the garlic when multitasking between coding and cooking.
  core: Matthew Coakley is a hyper-organized teen who juggles debate, theater, coding, and soccer with relentless curiosity, a habit of over-scheduling, and a tendency to talk through every solution—even
    when the answer is already clear.
background:
  cultural: Matthew comes from a white, middle‑class family rooted in the suburban‑rural mix of Petersburg and Chesterfield County, Virginia. His upbringing reflects Southern hospitality, with family gatherings
    centered around shared meals and community events such as county fairs and church socials. He has grown up attending a local public middle school where regional history and respect for tradition are
    emphasized. These cultural experiences have reinforced his cooperative nature, value for community harmony, and a pragmatic outlook that balances curiosity about new ideas with an appreciation for established
    customs.
