  career_goals: Matthew dreams of a career that blends his love for people, organization, and practical problem‑solving. He aims to pursue a degree in engineering or communications and ultimately work as
    a project manager for a technology firm or as a community outreach director for a nonprofit. He is determined to earn a scholarship to a reputable university, develop a strong professional network,
    and eventually launch an initiative that promotes STEM education in underserved schools across Virginia.
