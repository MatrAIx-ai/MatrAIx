  career_goals: Emilia aspires to transform her passion for art into a flexible, part‑time career that allows her to stay home with her family while contributing to the cultural scene. She plans to develop
    a bilingual blog and podcast that highlights overlooked Chilean and Latin American artists, eventually publishing a curated guidebook on South American modern art. Her longer‑term ambition is to secure
    a freelance curatorial consultancy role with regional museums or galleries, and to possibly pursue a Master’s degree in Arts Administration or Art Therapy to broaden her professional options.
