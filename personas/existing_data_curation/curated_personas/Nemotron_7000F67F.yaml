personas:
  professional: Emilia Altamirano, a freelance curatorial consultant and bilingual art blogger, leverages deep expertise in Latin American modernism, watercolor illustration, and relaxed, improvisational
    work habits to produce insightful guidebooks, podcasts, and community art events from their home studio while maintaining flexible scheduling for family life.
  sports: Emilia Altamirano, a casual runner who signs up for 5‑k events on Carrollton’s trails, harbors a quiet devotion to FC Dallas and the Dallas Stars, and occasionally joins a weekend yoga class to
    maintain flexibility, preferring solitary morning jogs over team sports while balancing their schedule around family commitments.
  arts: Emilia Altamirano, an avid watercolorist and analog street photographer, curates their blog with reflections on exhibitions featuring Frida Kahlo, Joaquín Torres García, and contemporary Latin American
    poet Pablo Neruda, while drawing creative energy from the modernist works of Wifredo Lam and the vibrant murals of local Carrollton artists.
  travel: Emilia Altamirano, a solo traveler drawn to art‑laden neighborhoods, has wandered the colorful graffiti‑streets of Valparaíso, explored Buenos Aires’ historic San Telmo district, and plans a cultural
    immersion trip to Lisbon to practice Portuguese, favoring flexible itineraries and boutique guesthouses over regimented tours while managing their travel budget with careful planning.
  culinary: Emilia Altamirano, a home cook who recreates traditional dishes such as pastel de choclo (sweet corn casserole), empanadas de pino (beef‑pepper filling), and a slow‑simmered cazuela with aji
    amarillo, while also experimenting with Portuguese feijoada, delights in mixing cumin and oregano, yet often leaves the kitchen a mess and forgets to refrigerate leftovers promptly, a quirky habit they
    attribute to their love of painting.
  core: Emilia Altamirano, a quietly curious 28‑year‑old art enthusiast, balances solitary creativity with a flexible freelance career, a habit of lingering over tea while scrolling through poetry, and
    a penchant for disorganized yet batch‑productive work habits that reflect their improvisational spirit.
background:
  cultural: Emilia was born and raised in Santiago, Chile, where she grew up immersed in the rich literary and artistic traditions of the country. Her family celebrated Chilean holidays such as Fiestas
    Patrias with música cueca and traditional foods like empanadas and asado. She carries a strong affinity for the poetry of Pablo Neruda and Gabriela Mistral, and maintains a close connection to Chilean
    visual art movements, especially the works of the Grupo Signo and contemporary muralists. After moving to Texas in her early twenties, she blended her heritage with the suburban culture of Carrollton,
    joining local art circles while preserving her bilingual identity. This bicultural experience informs her appreciation for cross‑cultural dialogue, and she often incorporates Chilean motifs into her
    artwork and community projects.
