  career_goals: Over the next five years, Carlos aims to advance to a senior consulting role, such as Director of Strategy or Operations Excellence, where he can lead large-scale transformation projects
    for mid-size enterprises. He plans to earn a PMP certification and a Six Sigma Black Belt to deepen his methodological toolkit, and he is considering a part-time MBA to broaden his strategic perspective.
    Ultimately, Carlos envisions stepping into a C-suite position—Chief Strategy Officer or Vice President of Business Development—while also mentoring emerging Puerto Rican professionals and possibly launching
    a boutique consultancy that focuses on culturally informed operational solutions.
