personas:
  professional: Carlos Rodriguezplaza, a management analyst with advanced Excel, SQL, and Power BI prowess, leverages their methodical, data‑driven mindset and bilingual fluency to guide mid‑size firms
    through structured process improvements while balancing their natural sociability with a calm, resilient demeanor.
  sports: Carlos Rodriguezplaza stars as a midfielder for the Connecticut Premier Soccer League while cheering on the New England Patriots and Boston Red Sox, regularly hikes Talcott Mountain State Park,
    and belongs to a local running club that meets every Saturday morning.
  arts: Carlos Rodriguezplaza nurtures their creative side by attending weekly salsa nights to the rhythms of Marc Antonio and Celia Cruz, curating board‑game evenings featuring titles like Catan and Terraforming Mars,
    and savoring live jazz sessions at a downtown venue, all of which reinforce their outgoing, community‑driven spirit.
  travel: Carlos Rodriguezplaza favors well‑planned trips that blend cultural immersion and relaxation, having explored San Juan’s historic Old Town, trekked the volcanic landscapes of St. Kitts, and earmarked
    Lisbon for its fado music scene, while balancing family visits with budget‑savvy bookings through their meticulous spreadsheet itineraries.
  culinary: Carlos Rodriguezplaza’s weekend kitchen is a shrine to traditional island flavors, expertly preparing arroz con gandules, lechón seasoned with adobo, and tostones, while experimenting with homemade
    sofrito and fresh cilantro, though their habit of over‑seasoning sometimes leaves their palate tingling.
  core: Carlos Rodriguezplaza is a data‑driven strategist who balances disciplined structure with sociable energy, channeling their calm resilience into community‑focused projects, spirited soccer matches,
    and vibrant salsa nights.
background:
  cultural: Carlos was raised in a bilingual household where Puerto Rican customs were woven into everyday life. He grew up celebrating Nochebuena, Three Kings Day, and the vibrant festivals of San Juan,
    often sharing these traditions with friends in Connecticut. His family’s emphasis on hard work, close-knit relationships, and community service has shaped his collaborative work style and his commitment
    to giving back. While he has fully integrated into the New England environment—enjoying the changing seasons and local community activities—he maintains strong ties to his heritage through food, music,
    language, and participation in the nearby Puerto Rican diaspora network. This blend of island roots and mainland experiences informs his worldview, giving him a unique perspective on diversity, resilience,
    and adaptability.
