  career_goals: He aims to leverage his hospitality experience into a managerial role within the next three years, pursuing an associate degree in Hospitality Management at the nearby community college.
    Simultaneously, he dreams of opening a small coffee‑shop‑gallery hybrid that showcases local artists, provides a welcoming space for community events, and offers a modest menu of artisanal coffee and
    pastries. To support this vision, he plans to earn a food safety certification and develop a portfolio of his own artwork, hoping to freelance as an illustrator for regional businesses.
