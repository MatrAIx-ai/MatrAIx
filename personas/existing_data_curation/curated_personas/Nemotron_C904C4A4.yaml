personas:
  professional: Jared Wise, a 25‑year‑old hospitality specialist with sharp organizational instincts and a knack for calming high‑pressure dining floors, leverages conversational Spanish and budding graphic‑design
    talent to train staff, streamline inventory, and produce eye‑catching promotional visuals, all while positioning themselves for a managerial promotion within three years, and they keep a vigilant eye
    on cash flow to ensure the shift from server to manager is financially sustainable.
  sports: Jared Wise channels their love of the outdoors into weekend hikes throughout the Baraboo Range, cheers the Milwaukee Bucks each basketball season, joins a local recreational soccer league in spring,
    and volunteers as a stagehand for Reedsburg Community Theatre, keeping them physically active and socially engaged—a routine they prioritize even when anxiety spikes.
  arts: Jared Wise blends visual and musical arts by painting acrylic landscapes inspired by Wisconsin murals, strumming acoustic renditions of Bon Iver and John Prine at Reedsburg open‑mic nights, and
    curating board‑game evenings featuring Terraformers and Gloomhaven, while occasionally designing flyers for the community theatre—a creative outlet they cherish despite occasional perfectionist tendencies.
  travel: Jared Wise prefers spontaneous weekend road trips to Upper Peninsula shorelines and Door County cherry orchards, while dreaming of a solo trek through the Pacific Northwest’s Olympic National
    Park, balancing travel costs with a part‑time gig and a modest travel fund—a travel style they adopt to satisfy curiosity without overextending finances.
  culinary: Jared Wise enjoys crafting home‑brewed pale ales flavored with grapefruit zest, brewing a daily pour‑over using Ethiopian Yirgacheffe beans, and experimenting with sourdough starter recipes
    that feature locally sourced rye and honey, yet they often neglect proper nutrition in favor of late‑night cheese plates and coffee‑filled evenings—a habit they hope to moderate as they plan their coffee‑shop‑gallery.
  core: Jared Wise is a curiosity‑driven hospitality whiz who juggles bar‑brewing experiments, acrylic canvases, and anxiety‑fueled late‑night coffee, always seeking community connection while battling
    impulsive spending and occasional overcommitment, a balancing act they embrace with a self‑aware grin.
background:
  cultural: Jared grew up in a middle‑class, predominantly white community in Reedsburg, Wisconsin, where Midwestern values of hard work, modesty, and neighborly support are deeply ingrained. His family’s
    ancestry blends Italian and German roots, reflected in family gatherings centered around homemade pasta, sausages, and cheese‑making traditions. Attending local high school events, Catholic church services,
    and county fairs shaped his sense of community. The region’s strong brewing culture, love of outdoor recreation, and appreciation for small‑town arts scenes continue to influence his interests and social
    life.
