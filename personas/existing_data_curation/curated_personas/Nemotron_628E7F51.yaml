personas:
  professional: Teronica Shaw, an 11‑year‑old budding naturalist, blends her love of rocks, leaves, and insects with a knack for DIY fort construction, turning every backyard expedition into a mini‑field
    study; their competitive streak fuels a drive to document findings meticulously, while their spontaneous nature means they often improvise data‑collection methods that surprise even their science‑club
    peers.
  sports: Teronica Shaw shoots hoops at the Midtown Recreation Center’s after‑school Hoops Club, where they compete in the under‑12 league and idolize the NBA’s Los Angeles Lakers while cheering for the
    local youth team, the Riverdale Raptors; during summer they swap the basketball for casual skateboarding at the nearby skatepark and follow the WNBA’s Seattle Storm for inspiration, balancing their
    competitive drive with a love for team camaraderie.
  arts: 'Teronica Shaw spends afternoons sketching original comic panels in a battered journal, drawing inspiration from graphic novelists Raina Telgemeier and manga creator Akira Toriyama, while their
    playlist loops contemporary R&B artists like SZA and hip‑hop stars such as Drake; they also binge‑read the sci‑fi series ''Star Wars: Galactic Chronicles'' and watch animated films by Studio Ghibli,
    letting these influences bleed into their character designs and fueling their creative outlet during stressful study sessions.'
  travel: Teronica Shaw dreams of trading her park trail maps for the sprawling trails of Yellowstone National Park and the neon‑lit streets of Tokyo’s Pokémon Center, but until then they spend weekends
    on spontaneous family road trips to the nearby state forest and weekend hikes at the local botanical garden; their travel style blends a love for nature exploration with a desire to discover pop‑culture
    landmarks, though limited allowance often confines their adventures to day‑trips rather than overnight stays.
  culinary: Teronica Shaw’s snack repertoire includes peanut butter‑banana sandwiches, homemade trail mix with almonds, dried mango, and chocolate chips, and an occasional slice of pepperoni pizza, while
    they enjoy experimenting with simple smoothies blending strawberries, Greek yogurt, and honey; their cooking skill hovers at 'enthusiastic beginner', as they can whip up a quick microwave mug cake but
    still rely on their mom for proper oven baking, and they often add a dash of hot sauce to test bold flavors during fort‑building picnics.
  core: Teronica Shaw is a curious, competitively‑driven 11‑year‑old who balances spontaneous DIY adventures with a persistent worry about meeting expectations, and they channel that anxiety into sketch‑filled
    journals and endless nature hunts.
background:
  cultural: Teronica is part of a close‑knit African‑American family in Harrisburg, Pennsylvania. Her parents and grandparents stress the importance of education, community service, and cultural pride.
    She often hears stories about the Civil Rights Movement from her grandparents and celebrates Juneteenth with family gatherings that feature soul food, music, and storytelling. She is involved in a local
    church youth group that organizes neighborhood clean‑up projects and mentorship programs. The diverse community around her exposes her to a blend of cultural expressions—from gospel choirs at church
    to contemporary hip‑hop at school events—helping her feel a strong connection to her heritage while pursuing her interests in STEM and the arts.
attributes:
  skills: '[''Hands‑on science experiments'', ''Basic Scratch programming'', ''Strategic board and video game playing'', ''Sketching and comic illustration'', ''Public speaking for class presentations'',
