  hobbies: '[''Exploring local parks and nature trails'', ''Collecting rocks, leaves, and insects'', ''Building forts and DIY projects with friends'', ''Playing strategy video games (Minecraft, Pokémon)'',
    ''Reading graphic novels and sci‑fi books'', ''Sketching comics and character designs'', ''Basketball at the community center'', ''Listening to contemporary R&B and hip‑hop music'', ''Journaling for
    stress relief'', ''Participating in school science club'']'
  career_goals: Teronica dreams of combining her love for animals and technology by becoming a biomedical engineer or veterinarian who designs innovative medical devices. She aims to strengthen her study
    habits and organizational skills so she can qualify for a specialized STEM magnet program in middle school and eventually compete in science fairs. Her ambition includes earning a scholarship to support
    her education and serving as a role model for other Black girls interested in STEM, showing that curiosity and practical problem‑solving can lead to meaningful careers.
