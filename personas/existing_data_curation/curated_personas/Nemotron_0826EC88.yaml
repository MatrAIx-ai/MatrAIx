personas:
  professional: Jose Moctezuma, a 26‑year‑old live‑event technical specialist, they blend their STEM background with a flair for on‑stage audio‑visual rigging, using methodical project planning and bilingual
    communication to troubleshoot shows while eyeing a senior event technology manager role that integrates AR/VR experiences.
  sports: Jose Moctezuma enjoys hiking the Blue Ridge foothills on weekends, they play pickup soccer with the Raleigh Knights club, and they root for the Carolina Hurricanes, often catching games at local
    sports bars after a long day of event setup.
  arts: Jose Moctezuma is a regular at Durham’s Art Walk, they are a fan of the indie band Local Natives, they frequent performances at the Carolina Theatre, and they nurture their own creative outlet by
    playing guitar to songs by Carlos Vives and dancing salsa at monthly Latin nights.
  travel: Jose Moctezuma prefers spontaneous weekend road trips, they have explored Asheville’s craft breweries and the historic streets of Savannah, they dream of a cultural immersion trip to Cartagena,
    and they balance travel plans around a demanding event schedule and limited vacation days.
  culinary: Jose Moctezuma loves cooking traditional dishes like sancocho, mangu, and tostones, they season them with cilantro, plantains, and achiote, and they often host community potlucks where they
    pair the meals with homemade guava jam and a side of avocado salad.
  core: Jose Moctezuma is a curious, organized social hub, they merge tech expertise with artistic passions, balancing meticulous event logistics with spontaneous salsa spins and a penchant for late‑night
    coding jams.
background:
  cultural: Jose grew up in a bilingual household where Spanish and English were spoken interchangeably, preserving strong ties to his Dominican heritage. He celebrates Dominican holidays such as Independence
    Day and Carnaval, and actively participates in local Dominican community events in Wake County. His cultural identity influences his musical tastes—bachata, merengue, and salsa—and informs his appreciation
    for vibrant visual arts. Jose’s upbringing instilled values of hospitality, family cohesion, and respect for tradition, which he brings to his work by fostering inclusive, culturally resonant entertainment
    experiences.
