  career_goals: Jose aims to transition from front‑line entertainment attendant roles to a senior event technology manager, overseeing the integration of cutting‑edge tech solutions in large‑scale productions.
    He plans to obtain certifications such as Certified Technology Specialist (CTS) and pursue advanced training in immersive media (AR/VR) to create innovative audience experiences. In the long term, he
    aspires to start his own boutique production company that highlights multicultural performances, especially celebrating Latin American arts, while mentoring young talent from underrepresented backgrounds.
