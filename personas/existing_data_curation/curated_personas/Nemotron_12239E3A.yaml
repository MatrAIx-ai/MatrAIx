    ''Cross-cultural Collaboration'', ''Data-driven Decision Making'', ''Event Coordination'', ''Research and Trend Analysis'', ''Conflict Resolution'', ''Performance Metrics Monitoring'']'
  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Reading Latin American Literature'', ''Cooking Salvadoran Cuisine'', ''Nature Walks'', ''Book Club Participation'', ''Listening to Classical
    and World Music'', ''Volunteering at Youth Art Workshops'', ''Traveling to Cultural Sites'', ''Spanish Language Practice'']'
  career_goals: Karen aims to advance into senior leadership of a regional cultural institution, such as becoming the Director of a museum or nonprofit arts organization that serves the DC metropolitan
    area. She plans to launch a community art center that highlights Salvadoran and broader Central American artists, fostering inclusive programming and mentorship for emerging creators. To support these
    objectives, she intends to pursue a fellowship in arts administration and acquire executive‑level training in nonprofit management. Her long‑term ambition is to shape policy that expands arts access
    for underserved populations while preserving and celebrating her cultural heritage.
