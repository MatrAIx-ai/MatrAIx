personas:
  professional: Karen Colon, a senior arts program director in the DC metro area, leverages her strategic planning acumen, bilingual outreach skills, and grant‑writing expertise to design inclusive exhibitions
    that amplify under‑represented artists, and they ensure every project meets tight performance metrics and deadlines.
  sports: Karen Colon enjoys solitary sunrise walks along the Potomac River, competes in a local 5K walking club, follows the Washington Capitals hockey team and the DC United soccer club for inspiration,
    they also participate in a community Pilates class at the Alexandria Recreation Center to maintain flexibility.
  arts: Karen Colon curates intimate gallery shows featuring contemporary and folk‑inspired watercolors, volunteers at youth art workshops, reads the works of Gabriel García Márquez and Isabel Allende to
    fuel her creative storytelling, they listen to a rotating playlist of Beethoven, John Coltrane, and Afro‑Cuban jazz while practicing Spanish conversation.
  travel: Karen Colon prefers thoughtfully planned cultural journeys, taking weekend trips to historic St. Augustine, a yearly pilgrimage to Oaxaca to explore traditional cuisine and artisan markets, and
    a recent solo adventure to Barcelona to study Gaudí’s architecture, they balance a modest travel budget with family commitments.
  culinary: Karen Colon excels at cooking handmade pupusas stuffed with cheese and loroco, slow‑roasts yuca with crispy chicharrón, and experiments with fresh cilantro, plantain, and chipotle in her kitchen,
    they often host small dinner gatherings where they showcase these dishes alongside locally sourced salads, though they sometimes forget to eat breakfast when deadlines loom.
  core: Karen Colon blends disciplined program leadership with a quiet, competitive love for watercolors, community arts, and culturally rich cooking, they channel their skeptical edge into a relentless
    pursuit of excellence.
background:
  cultural: Karen’s Salvadoran heritage is a cornerstone of her identity. Raised in a bilingual household, she grew up celebrating festivals such as Las Posadas and the Feast of the Virgin of Guadelupe,
    which infused her with a deep appreciation for communal art, music, and culinary traditions. Her family’s migration story—relocating to the United States during the civil war—instilled in her a strong
    sense of resilience and a commitment to preserving cultural memory. Living in Alexandria, she actively engages with the local Salvadoran diaspora through community events, cultural workshops, and Spanish‑language
    advocacy. This background informs her professional focus on inclusive arts programming and her personal passion for sharing Salvadoran stories through food, visual art, and storytelling.
attributes:
