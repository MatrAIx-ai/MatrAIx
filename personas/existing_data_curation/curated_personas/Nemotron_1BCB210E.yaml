  hobbies: '[''Gardening'', ''Traditional Mexican cooking'', ''Crocheting'', ''Crossword puzzles'', ''Listening to classic Latin music'', ''Attending church bible study'']'
  career_goals: Esther aims to deepen her expertise by obtaining an OSHA certification and a formal facility‑maintenance training credential, which would qualify her for a lead‑janitor or maintenance supervisor
    role at her current workplace. She also hopes to mentor newer staff, sharing her organized approach and fostering a cooperative team environment. While she values job stability for her family, she envisions
    a gradual transition toward part‑time work so she can spend more time with her grandchildren, and ultimately plans a modest retirement that still allows her to contribute to community volunteer projects.
