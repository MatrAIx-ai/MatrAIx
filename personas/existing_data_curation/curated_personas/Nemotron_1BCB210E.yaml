personas:
  professional: Esther Rosales is a seasoned facility‑maintenance specialist with expert knowledge of floor care, chemical safety, and inventory management, whose methodical, OSHA‑compliant work style and
    bilingual communication make them a reliable pillar in their building’s daily operations and a mentor for newer staff.
  sports: Esther Rosales enjoys watching the local high school Tigers basketball team and the city’s minor‑league baseball club, attends games with a modest seat near the concession stand, and stays active
    through daily walks in the community garden and a weekly senior‑friendly tai chi class at the church hall.
  arts: Esther Rosales finds solace in classic boleros by Lucho Gatica on the evenings radio, dedicates weekends to crocheting intricate blankets for charity, and occasionally joins a small book club that
    discusses poetry by celebrated lyricists, allowing the arts to weave quietly into their routine.
  travel: Esther Rosales prefers structured road trips with detailed itineraries, has explored the rugged landscapes of the Grand Canyon and the historic charm of Santa Fe, and dreams of a gentle retreat
    to the seaside town of Bar Harbor where they can garden on a quiet porch.
  culinary: Esther Rosales lovingly prepares tamales and pozole using home‑grown herbs, fresh tomatoes, and hominy, perfects the smoky depth of chilies in a weekend batch of mole, and delights in sharing
    the fragrant, spice‑laden meals with family while also experimenting with churro‑style desserts flavored with cinnamon and piloncillo.
  core: Esther Rosales is an organized, caring caretaker who blends methodical work habits, family‑centric cooking, and community service, all while wrestling with a persistent worry that fuels both their
    diligence and occasional over‑scrupulousness.
background:
  cultural: Esther was born to Mexican parents and grew up in a bicultural environment on the U.S.–Mexico border. She is fluent in Spanish and English and maintains strong ties to Mexican traditions, such
    as celebrating Día de los Muertos with altars at home and preparing family recipes passed down through generations. Her Catholic upbringing influences her values of humility, respect, and service to
    others, which she expresses through community volunteer work and her willingness to help neighbors. Living in Laredo, she embodies the warm, family‑centered spirit of the region while navigating the
    practical realities of a working‑class life.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care'', ''Chemical safety handling'', ''Safety inspections'', ''Inventory management'', ''Minor repairs'', ''Bilingual communication (Spanish/English)'', ''Customer
