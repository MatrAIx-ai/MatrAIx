persona_description: An engineer who specializes in radio frequency engineering, specifically in the design and operation of single-sideband radio frequency phase-shift networks. They have experience in
  designing and building stable components, and are skilled in the use of precision audio phase-shift networks to hold an angular accuracy to considerably less than 1°. They are familiar with the operation
  of AM transmitters and have experience in converting an existing AM transmitter to single-sideband type transmission. They have a deep understanding of the principles of single-sideband generation and
  have designed and built systems that yield a constant r.f. 90° phase-shift between the two output r.f. voltages for varying frequency input but the two amplitudes of the individual outputs vary in direct
  proportion to the operating frequency. They are skilled in the use of vacuum-tube and gaseous-tube type voltage regulation to stabilize the screen voltage applied to the transmitter output tube. They
  are also familiar with the concept of group theory and have experience in the study of subgroups and isomorphisms.
