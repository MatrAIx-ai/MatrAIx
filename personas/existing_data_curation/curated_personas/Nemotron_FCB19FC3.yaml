  hobbies: '["Gardening", "Quilting", "Reading historical fiction", "Genealogy research", "Bridge", "Chess", "Volunteer museum guiding", "Historic preservation studies", "Cooking traditional Southern dishes",
    "Walking in local parks"]'
  career_goals: Although retired from formal employment, Bianca is driven to leverage her expertise to shape the next generation of engineers, especially Black women and girls in the Richmond area. She
    aims to expand the STEM mentorship program she helped found, secure endowments for scholarships, and author a memoir that chronicles her journey through the civil‑rights era into a STEM career. Additionally,
    she plans to pursue a certification in historic preservation to combine her love of local history with her analytical skills, and she remains committed to maintaining her health and independence through
    regular physical activity.
