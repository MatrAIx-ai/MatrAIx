personas:
  professional: Manuel Cordova, a 20‑year‑old pharmacy technician in Spokane, blends meticulous prescription verification and compounding expertise with a vivid imagination, using bilingual communication
    and creative problem‑solving to make medication counseling feel like an artful conversation.
  sports: Manuel Cordova enjoys hiking the Cascades with the local outdoor club, follows the Seattle Seahawks and the Washington Capitals loyally, and plays casual Saturday soccer in a community league,
    balancing cardio hikes with short bursts of soccer drills to stay fit while still finding time for solitary trail contemplation.
  arts: Manuel Cordova channels his love for speculative fiction into digital illustrations that merge sci‑fi motifs with traditional folklore, frequently cites the surreal brushwork of Salvador Dalí and
    the ambient soundscapes of Brian Eno as inspirations, and spends Friday nights at the Spokane Art Walk listening to indie folk guitarist Iron & Wine.
  travel: Manuel Cordova prefers low‑cost, itinerary‑free road trips that let him photograph misty coastal forests, has already driven the Pacific Coast Highway to Cannon Beach, plans a backpacking adventure
    through the Canadian Rockies, and dreams of exploring the vibrant markets of Oaxaca to taste authentic street foods.
  culinary: Manuel Cordova, a self‑taught home cook, loves perfecting arepas and empanadas with fresh panela cheese and roasted corn, experiments with spice blends like cumin and achiote, and balances his
    meals with a habit of sipping herbal tea while sketching new recipe ideas at the kitchen table.
  core: Manuel Cordova is a 20‑year‑old pharmacy tech whose life is a blend of meticulous medication care, boundless artistic imagination, and a penchant for hiking solo trails while dreaming of a future
    pharmacy that feels like an art gallery.
background:
  cultural: Manuel grew up in a Colombian household, where Spanish was spoken at home and family gatherings featured traditional music like cumbia and vallenato, as well as dishes such as bandeja paisa
    and sancocho. His family moved to Spokane when he was a teenager, and he has blended Colombian customs—celebrating Colombia’s Independence Day and Semana Santa—with American holidays and the outdoor
    lifestyle of the Pacific Northwest. Fluent in both Spanish and English, he often serves as a cultural bridge for the growing Colombian diaspora in Spokane, advocating for culturally competent health
    care and preserving his heritage through food, language, and community events.
attributes:
  skills: '[''Prescription verification'', ''Medication counseling'', ''Pharmacy inventory management'', ''Compounding sterile preparations'', ''Bilingual communication (Spanish/English)'', ''Basic pharmacology
    knowledge'', ''Patient education'', ''Health informatics basics'', ''Creative problem solving'', ''Digital illustration'']'
  hobbies: '[''Digital illustration'', ''Abstract painting'', ''Poetry writing'', ''Science-fiction reading'', ''Landscape photography'', ''Acoustic guitar'', ''Colombian cooking'', ''Salsa dancing'', ''Hiking
    in the Cascades'']'
  career_goals: Manuel aims to enroll in a pre-pharmacy program and ultimately earn a Pharm.D. so he can become a licensed pharmacist. He seeks a clinical pharmacy specialization, with a long-term ambition
    to open a culturally inclusive community pharmacy that integrates health education, art installations, and technology-enabled medication adherence tools. He is also interested in contributing to research
    on novel drug delivery systems that improve treatment outcomes for underserved populations, especially Spanish-speaking patients.
