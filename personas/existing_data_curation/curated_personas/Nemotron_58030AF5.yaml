personas:
  professional: Cathy Tabana, a 35-year-old police officer in Kenosha, blends a decade of community policing expertise, crisis-intervention and de-escalation skills with a restless curiosity for art and
    humanity, using a flexible, occasionally disorganized scheduling style to launch creative outreach projects while they simultaneously navigate paperwork with compassionate assertiveness.
  sports: Cathy Tabana, a 35-year-old Kenosha resident, stays fit by practicing yoga at the local community studio, joining the Kenosha Hiking Club for weekend shoreline treks, cheering the Milwaukee Brewers,
    Green Bay Packers, and Milwaukee Bucks, and they occasionally play pickup basketball at the YMCA during summer.
  arts: Cathy Tabana, 35, immerses themselves in the arts by frequenting the Milwaukee Art Museum to study Edward Hopper’s urban scenes, photographing street murals inspired by Banksy, attending community
    theater productions of August Wilson’s ‘Fences’, and listening to Nina Simone and Leon Bridwell while they curate a personal photo series that echoes the soulful vibe of Ansel Adams’ landscapes.
  travel: Cathy Tabana, a 35-year-old explorer, prefers spontaneous road trips that whisk them from Kenosha’s Lake Michigan shoreline to Door County’s lighthouse towns, while they dream of wandering the
    colorful street-art districts of Berlin, the tea houses of Kyoto, and the dramatic fjords of Iceland on a future overseas adventure.
  culinary: Cathy Tabana, age 35, enjoys cooking classic comfort dishes often described as soul food, like smoky BBQ pork ribs, collard greens simmered with smoked turkey, and buttery cornbread, yet they
    also experiment with global flavors by whipping up a kimchi fried rice with gochujang and a fresh Mediterranean chickpea salad dotted with olives and feta.
  core: Cathy Tabana is an emotionally expressive, art-obsessed police officer who balances crisis de-escalation with impromptu hikes, can be forgetful about paperwork yet never misplaces a camera lens
    cap, and they channel anxiety into creative pursuits while occasionally splurging on spontaneous road-trip snacks.
background:
  cultural: Cathy identifies as African American and was raised in a close-knit Black community in the Milwaukee metropolitan area before moving to Kenosha. Her family's roots trace back to the Great Migration,
    with grandparents who settled in the Midwest from the rural South. Growing up, she was immersed in the cultural traditions of gospel music, soul food, and storytelling that emphasized resilience and
    communal support. The church played a central role in her upbringing, fostering a strong sense of service and social justice. These cultural influences shaped her decision to join law enforcement and
    her commitment to bridge gaps between the police and the Black community. Cathy actively participates in local NAACP events, supports Black-owned businesses, and incorporates her heritage into community
    outreach through art and mentorship.
