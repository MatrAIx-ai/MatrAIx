  hobbies: '[''Visiting art galleries and museums'', ''Community theater attendance'', ''Photography (urban and nature)'', ''Hiking and exploring Lake Michigan shoreline'', ''Reading (fiction, true-crime,
    psychology)'', ''Yoga and mindfulness meditation'', ''Spontaneous road trips'', ''Mentoring youth in art programs'', ''Cooking soul food and experimenting with recipes'']'
  career_goals: Cathy aspires to rise to a supervisory position within the Kenosha Police Department, targeting a promotion to Sergeant or Detective in the Community Services Unit. She plans to complete
    her bachelor's degree in criminal justice, which will qualify her for leadership exams. Her long-term ambition is to establish a police-led community arts outreach program that uses creative workshops
    to build trust between law enforcement and residents, especially youth. She also seeks certification as a crisis intervention team member and a peer-support facilitator to help colleagues manage stress
    and emotional well-being.
