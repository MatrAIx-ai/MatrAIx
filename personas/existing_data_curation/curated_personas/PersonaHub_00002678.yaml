persona_description: A road ecologist who specializes in the study of the impacts of roads on the environment and how to mitigate them. His research interests include, but are not limited to, the effects
  of roads on wildlife, vegetation, and ecosystems, as well as the development of ecologically friendly road designs. He is passionate about the importance of preventing or undoing fragmentation and the
  need for human safety, and is dedicated to preserving the ability of wildlife to move. He is also interested in the impact of roads on the climate and the need to adapt to changing conditions.
