  hobbies: '[''Community dance classes'', ''Bridge club'', ''Food bank volunteering'', ''Hiking in Yellowstone'', ''Birdwatching'', ''Knitting and crochet'', ''Baking Midwest recipes'', ''Reading historical
    fiction'', ''Historical society participation'', ''Digital photography'']'
  career_goals: Selena aims to transition from full‑time cashier duties to a part‑time mentor role, formally training junior staff across the regional store network. She plans to complete an online certification
    in accounting fundamentals to deepen her financial expertise and eventually volunteer as a financial‑literacy instructor at the local senior center. Maintaining steady income for retirement, she also
    hopes to launch a modest home‑based craft boutique selling knitted goods, leveraging her love of knitting and community connections.
