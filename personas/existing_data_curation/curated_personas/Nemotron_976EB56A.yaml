personas:
  professional: Selena Weinstein, a seasoned retail cashier turned mentor, harnesses her deep POS expertise, meticulous inventory tracking, and calm conflict‑de‑escalation skills to train junior staff across
    the regional network, blending her curiosity for emerging retail tech with practical, organized learning modules.
  sports: Selena Weinstein hikes the Yellowstone and local wetlands with the Billings Community Hiking Club, leans on weekly community dance classes for cardio, follows the Billings Mustangs baseball team
    and the Montana Grizzlies football squad, and joins a senior cross‑country skiing group each winter to stay fit.
  arts: Selena Weinstein captures Yellowstone vistas with a DSLR inspired by Ansel Adams, enjoys folk legends like Bob Dylan and modern banjo virtuoso Molly Tuttle, reads historical fiction by Hilary Mantel
    and Ken Follett, and participates in the Alberta Bair Theater's classic play productions, weaving art into her daily rhythm.
  travel: Selena Weinstein prefers road‑trip itineraries that blend adventure with comfort, having explored Yellowstone, Glacier National Park, and Crater Lake, while eyeing a future pilgrimage to Banff,
    Canada and the historic streets of Salem, Massachusetts, always booking senior discounts and balancing travel costs with her modest retirement budget.
  culinary: Selena Weinstein bakes Midwestern staples like chicken pot pie and apple dumplings, experiments with sous‑vide salmon seasoned with fresh dill and huckleberries harvested during hikes, and delights
    in crafting sourdough loaves using local wheat flour and wild mushroom foraging, showcasing her evolving kitchen curiosity.
  core: Selena Weinstein fuses retail mastery, community spirit, and a love for the outdoors into a calm, organized yet adaptable lifestyle that balances mentorship, craft entrepreneurship, and perpetual
    curiosity.
background:
  cultural: Selena grew up in a Midwestern small‑town family with Protestant roots, carrying forward a blend of traditional American work ethic and frontier independence typical of Montana culture. Her
    upbringing emphasized community involvement, self‑reliance, and respect for the natural environment. After moving to Billings for work and attending some college, she embraced the region’s blend of
    rugged outdoorsmanship and growing urban community life. Her divorce in her early fifties reinforced her independent outlook while deepening her commitment to local friendships and civic participation.
attributes:
  skills: '[''Point‑of‑sale operation'', ''Cash handling and reconciliation'', ''Customer service and conflict de‑escalation'', ''Inventory management'', ''Shift scheduling and time management'', ''Basic
