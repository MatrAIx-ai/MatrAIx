  career_goals: 'Although retired from formal employment, Chloe aims to deepen her impact as a community elder by establishing an intergenerational mentorship program for youth in Prince William County,
    creating a scholarship fund for Black students pursuing higher education, and curating a digital archive of African American history in Woodbridge. She also aspires to become a certified senior advocate,
    influencing local policy to improve services for older adults, and to continue learning emerging technologies to stay connected with her family and community.

