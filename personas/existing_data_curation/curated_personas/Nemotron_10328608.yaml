  career_goals: Leng dreams of exploring many possibilities in the future, especially in STEM fields. He imagines becoming a scientist‑engineer who designs helpful robots or a video‑game creator whose stories
    inspire other kids. At the same time, he values practicality and community, so he also thinks about helping others as a teacher or volunteer. His goals reflect a balance between curiosity, a desire
    to make tangible contributions, and the flexibility to follow evolving interests.
