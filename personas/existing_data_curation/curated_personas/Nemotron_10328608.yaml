personas:
  professional: Leng Teng, an eight‑year‑old budding game designer and LEGO architect, channels a practical curiosity into building intricate brick constructions and scripting simple Scratch Jr. animations;
    they often lead peers with an easygoing assertiveness while shunning strict schedules.
  sports: Leng Teng, a member of the neighborhood under‑8 soccer club, dazzles teammates with spontaneous dribbling drills, looks up to Manchester United for inspiration, and swaps sweaty soccer shoes for
    winter sledding on snowy weekends; they balance team play with personal fun, though their sports bag often ends up in disarray.
  arts: Leng Teng fuels a love for cartoon art by sketching characters inspired by Stan Lee and Hayao Miyazaki, binge‑watching Pixar movies like Toy Story for visual cues, and remixing comic panels into
    Scratch Jr. storyboards; they turn evenings into mini‑animation workshops, even if crayons and sketchpads litter the living room.
  travel: Leng Teng enjoys family‑guided road trips to nearby historic towns, cherishes a memorable visit to Disneyland Paris that sparked a yearning for more adventure, and dreams of seeing Japan’s cherry
    blossom festivals; they rely on parents’ planning while keeping a doodle‑filled travel journal of imagined itineraries.
  culinary: Leng Teng’s kitchen adventures range from mastering the folds of traditional pork‑and‑cabbage dumplings seasoned with ginger and soy sauce to daringly tossing spaghetti with tomato‑basil sauce;
    they display a beginner’s enthusiasm that often leaves flour‑covered countertops and an occasional over‑spilled pot of broth.
  core: Leng Teng is a curious LEGO architect who scores goals on the soccer field, sketches comic heroes in spare minutes, hoards a secret stash of comic books, and habitually leaves crayons and building
    pieces scattered across the living room.
background:
  cultural: Leng Teng is a second‑generation East Asian American of Chinese heritage. At home, Mandarin (or Cantonese) is spoken alongside English, and family traditions such as celebrating Lunar New Year
    and preparing dumplings are central to his cultural experience. Growing up in Whittier, CA, he blends these traditions with the diverse, multicultural environment of Southern California, gaining exposure
    to a variety of cultures while maintaining a strong connection to his family's values of education, respect for elders, and community.
