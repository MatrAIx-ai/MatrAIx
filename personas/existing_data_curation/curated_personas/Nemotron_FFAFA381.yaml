personas:
  professional: Ellen Eversole is a lab‑technician hopeful who leans on their Excel and R expertise to keep data tidy, thrives in routine‑driven quality‑control tasks, and brings a meticulous, hands‑on
    mindset from gardening and woodworking to troubleshooting small electronic devices.
  sports: Ellen Eversole is a weekend birdwatcher who frequents the local nature trail, occasionally joins the community's gentle‑hike club, keeps a soft spot for the regional soccer team the River City
    FC, and practices light yoga at home to counterbalance sedentary lab work.
  arts: Ellen Eversole finds creative release in knitting soft scarves while listening to ambient recordings by Brian Eno, admires Ansel Adams' black‑and‑white landscapes, and enjoys the occasional indie
    documentary about astronomy by Carl Sagan, weaving those inspirations into meticulous DIY electronics projects.
  travel: Ellen Eversole prefers low‑key, nature‑focused trips, having visited the nearby botanical garden in spring, taken a weekend getaway to the Appalachian Trail, and dreaming of Iceland's aurora borealis
    while budgeting each journey around their modest savings.
  culinary: Ellen Eversole loves harvesting home‑grown tomatoes for fresh bruschetta, crafts herb‑infused olive oil for salads, and is a competent, if occasionally forgetful, cook who often juggles a simmering
    pot while knitting on the kitchen counter.
  core: Ellen Eversole is a methodical, routine‑loving lab aspirant who balances quiet solitude with a touch of anxiety, tending gardens, data sheets, and yarn alike, while meticulously budgeting every
    penny.
background:
  cultural: Ellen grew up in Harrodsburg, a small town in Washington County, Kentucky, where community ties and traditional Southern hospitality shape daily life. Her family has deep roots in the region’s
    agricultural history, and local customs such as county fairs, bluegrass gatherings, and church‑based service projects have influenced her values of practicality, self‑reliance, and modesty. Though she
    embraces modern scientific pursuits, she also appreciates the region’s emphasis on close‑knit relationships and a steady, familiar pace of life.
attributes:
  skills: '[''Data analysis (Excel, R)'', ''Laboratory techniques (PCR, spectrophotometry)'', ''Basic Python programming'', ''Technical writing'', ''Hardware troubleshooting'', ''DIY electronics'', ''Precision
    woodworking'', ''Gardening'']'
  hobbies: '[''Gardening'', ''Birdwatching'', ''Nature journaling'', ''Reading popular science'', ''Science podcasts'', ''Knitting'', ''DIY electronics kits'', ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Ellen seeks a stable, routine‑oriented position where she can apply her analytical skills without excessive pressure. Her short‑term goal is to secure a laboratory technician or quality‑control
    role at a local manufacturing plant or university research lab, environments that offer predictable daily tasks. Long‑term, she hopes to earn certifications in industrial safety or environmental monitoring,
    allowing her to advance to a supervisory role that still values methodical work and community consistency.
