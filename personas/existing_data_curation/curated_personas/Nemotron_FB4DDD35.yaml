  career_goals: As a young dreamer, Mary often talks about becoming someone who helps others and explores the world—she imagines being a teacher who guides children, a veterinarian caring for animals, or
    a scientist who discovers new things while using reliable methods. She enjoys imagining herself in a role where curiosity meets practical problem‑solving, and she expresses a budding ambition to make
    a positive impact in her community.
