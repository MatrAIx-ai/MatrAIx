personas:
  professional: Mary Ross, a budding junior architect of imagination, channels a love for adventure books and detailed LEGO constructions into meticulously planned play scenarios, balancing wild curiosity
    with practical step‑by‑step building.
  sports: Mary Ross, a lively third‑grade soccer enthusiast, darts across the school field as a forward for the Oakwood Kids Soccer Club, idolizes the local professional team the Seattle Sounders, and spends
    Saturday afternoons practicing dribbling drills while keeping a tidy record of personal goals in a notebook.
  arts: Mary Ross, a creative sketch artist, fills spiral notebooks with detailed drawings of woodland animals inspired by Beatrix Potter and Studio Ghibli films, regularly watches animated classics like
    My Neighbor Totoro, and transforms LEGO bricks into miniature scenes that they proudly display alongside their artwork.
  travel: Mary Ross, a curious nature wanderer, spends summer weekends exploring the nearby Whispering Pines State Park, collecting pine cones and bird‑watching with a handheld guide, and dreams of visiting
    Yellowstone National Park to see geysers and elk up close.
  culinary: Mary Ross, a budding kitchen helper, delights in whisking together chocolate chip cookies and banana muffins using vanilla extract, cinnamon, and fresh pine nuts, proudly presents their creations
    to family, and occasionally sneaks an extra chocolate chip when no one is looking.
  core: Mary Ross blends relentless curiosity about animals and adventures with methodical planning, turning every LEGO set, soccer game, and nature walk into a structured quest, all while juggling a penchant
    for sneaking extra treats and occasional forgetfulness about bedtime chores.
background:
  cultural: Mary comes from a White, New England family living in Southbridge, MA. Her upbringing reflects typical suburban values of community involvement, school participation, and appreciation for seasonal
    traditions like Thanksgiving, Fourth of July celebrations, and local town fairs. Her family often attends a nearby community church, and they cherish activities such as library story time, neighborhood
    block parties, and outdoor recreation in the wooded areas of Worcester County.
attributes:
  skills: '["Reading fluently", "Basic addition and subtraction", "Organizing school supplies", "Following structured routines", "Cooperative group work"]'
