  career_goals: Shivani aims to transition into a senior leadership role where she can steer interdisciplinary projects that blend cutting‑edge engineering with immersive art experiences. Over the next
    five years she envisions becoming an engineering manager or director of innovation at a forward‑thinking tech firm in Austin, championing sustainable product development and inclusive team culture.
    She also aspires to mentor emerging engineers, particularly women and South Asian professionals, and to speak at industry conferences about the synergy between technology, design, and community impact.
    In the longer term, she considers launching her own startup that creates interactive installations for public spaces.
