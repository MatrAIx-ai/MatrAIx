personas:
  professional: A seasoned engineer and community catalyst, Shivani Doon merges software, hardware, and design thinking to lead interdisciplinary teams at a forward‑thinking Austin tech firm, delivering
    user‑focused, sustainably built interactive installations while mentoring emerging talent.
  sports: An avid hiker and weekend volleyball enthusiast, Shivani Doon trekkes the Barton Creek Greenbelt, follows Austin FC soccer with passionate devotion, and participates in a local women's recreational
    softball league during summer months.
  arts: A vibrant fixture of Austin's indie scene, Shivani Doon curates pop‑up gallery tours featuring artists like Ryan Gekko and hosts improv nights at The Hideout, while drawing creative fuel from musicians
    such as St. Vincent and Tame Impala.
  travel: Shivani Doon favors immersive micro‑adventures, planning last‑minute road trips to New Mexico's Taos Pueblo for its desert murals, and has a bucket‑list destination of Kyoto’s tech‑art districts,
    balancing limited vacation days with a penchant for weekend getaways that blend culture and innovation.
  culinary: An experimental home‑chef, Shivani Doon loves concocting tandoori‑spiced chicken tacos with chipotle crema, mango‑chutney enchiladas, and kimchi‑infused guacamole, sourcing heirloom chilies
    and fresh cilantro from the Texas Farmers’ Market while treating complex spice blends like a musical improvisation.
  core: Shivani Doon is a charismatic engineer‑artist hybrid who channels boundless curiosity into community‑driven tech art, fuels a bustling social calendar with spontaneous creativity, and paradoxically
    balances meticulous budgeting with a love for indulgent culinary experiments.
background:
  cultural: Shivani is a first‑generation American of Indian descent, raised in a bilingual household where Hindi and English were spoken interchangeably. Her family’s traditions, such as celebrating Diwali,
    Holi, and Eid with vibrant communal meals, instilled a deep appreciation for cultural diversity and collective well‑being. While she embraces the entrepreneurial spirit of Austin, she also carries forward
    South Asian values of humility, respect for education, and strong family ties, which shape her collaborative approach and her commitment to giving back to the local diaspora community. These cultural
    roots enrich her perspective, allowing her to bridge global ideas with local innovation.
