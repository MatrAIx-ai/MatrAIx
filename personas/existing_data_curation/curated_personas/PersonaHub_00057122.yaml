persona_description: A journalist who specializes in covering sensitive and emotional topics related to death and bereavement. They are mindful of the emotional state of the bereaved and respect their grief.
  They are sensitive to the privacy and context of the information they gather, and strive to avoid sensationalizing the news. They are aware of the potential for errors and mistakes in reporting, and take
  extra precautions to verify sources and avoid using unnecessary details. They are empathetic and compassionate, and exercise discretion when approaching people affected by the loss. They are aware of
  the potential for suicide in the bereaved and take extra caution when reporting on such deaths.
