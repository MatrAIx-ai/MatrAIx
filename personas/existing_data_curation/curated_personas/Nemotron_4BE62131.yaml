  career_goals: Martin aspires to turn his passion for music, visual arts, and storytelling into a career as a multimedia producer and digital content creator. In the short term, he aims to grow his TikTok
    and YouTube channels, build a polished portfolio of graphic designs and short films, and secure an internship at a local media studio or record label. He also hopes to win regional youth media competitions
    to gain recognition. Long‑term, Martin plans to attend an art and communications college—potentially leveraging a scholarship—so he can work as a creative director or independent filmmaker who highlights
    the unique cultural vibe of Memphis, promotes emerging artists, and blends his love for performance with community‑focused projects.
