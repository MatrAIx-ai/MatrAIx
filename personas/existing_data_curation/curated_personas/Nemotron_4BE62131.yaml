personas:
  professional: Martin Potter is a teen multimedia creator who blends charismatic public speaking, self‑taught graphic design, and a skeptical eye to craft TikTok videos that showcase Memphis’s live blues
    and street art while they meticulously organize community jam sessions.
  sports: Martin Potter dominates the neighborhood basketball court after school, idolizes the Memphis Grizzlies and the University of Memphis Tigers, plays in a community center league that mimics the
    fast‑break style of the pros, and they use daily pick‑up games as both a competitive outlet and a social ritual.
  arts: Martin Potter curates a vinyl collection featuring B.B. King, Al Green, and contemporary hip‑hop producer Madlib, sketches graffiti‑inspired murals echoing the bold lines of Banksy, and they produce
    TikTok edits set to soulful tracks by Aretha Franklin and modern beats from Anderson .Paak, turning every creative impulse into a visual narrative.
  travel: Martin Potter has road‑tripped to Nashville’s music row and New Orleans’ French Quarter, dreams of a summer art‑tour in Austin’s street‑art districts and a future study‑abroad stint in Berlin’s
    vibrant mural scene, but budget constraints keep most trips short and spontaneous, and they often plan itineraries on a shoestring spreadsheet.
  culinary: Martin Potter’s palate is dominated by Memphis‑style dry‑rub ribs, pulled pork sandwiches, and collard greens, they can grill a decent pork chop on the family barbecue, but their cooking skill
    tops out at perfecting sweet‑tea‑infused ice cream and assembling take‑out fried chicken with hot‑sauce on the side, reflecting a love for bold flavors but a limited culinary repertoire.
  core: Martin Potter is a socially magnetic teen who channels competitive energy into basketball, video gaming, and multimedia storytelling, while they juggle anxiety‑driven overthinking, impulsive vinyl
    collecting, and a relentless drive to turn Memphis’s cultural pulse into a future career.
background:
  cultural: Martin grew up in a white, middle‑class family in Memphis, Tennessee. His cultural environment blends Southern traditions—church gatherings, family barbecues, and storytelling—with the dynamic
    urban backdrop of Memphis, renowned for its blues heritage, soul music, and civil‑rights legacy. Exposure to Beale Street’s live music venues, community festivals, and the city’s multicultural neighborhoods
    has broadened his perspective and fueled his curiosity about unconventional ideas. His family values emphasize hospitality, self‑reliance, and an appreciation for artistic expression, while the city’s
    diverse cultural tapestry has shaped his sociable, competitive, and slightly skeptical personality.
