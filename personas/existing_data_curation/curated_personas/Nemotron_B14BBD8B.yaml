  career_goals: At 55, Louis aims to transition from day‑to‑day audit work to a senior advisory role where he can shape the strategic direction of client organizations. He hopes to earn his Certified Public
    Accountant (CPA) designation if not already held, and to obtain a Certified Management Accountant (CMA) credential to broaden his consulting capabilities. Louis envisions becoming a trusted mentor within
    his firm, leading a small team focused on serving Chicago’s small‑business and non‑profit sectors. Long‑term, he is interested in establishing his own boutique consulting practice that offers affordable
    financial guidance to community organizations, leveraging his extensive network and reputation for reliability and empathy.
