personas:
  professional: Sinead Twitty is an emerging youth organizer who volunteers at the local community center, coordinating basketball pick‑up games, leading art workshops, and using their curiosity and practical
    mindset to develop inclusive events that bridge cultural gaps in a small‑town setting.
  sports: Sinead Twitty is a passionate high school basketball player who idolizes the University of Wyoming Cowboys and the Denver Nuggets, participates in the Laramie Wolves girls’ basketball club, and
    hikes the nearby Granary Ridge for cardio, blending team spirit with rugged outdoor fitness.
  arts: Sinead Twitty channels their love for R&B and hip‑hop by dancing to Beyoncé and H.E.R. tracks, drawing comic‑strip style illustrations inspired by Scott McCloud, and attending local performances
    by the Wyoming Youth Choir, weaving music and art into their daily creative expression.
  travel: Sinead Twitty dreams of exploring the geysers of Yellowstone, the basalt columns of Iceland, and the bustling streets of New York City, while their recent family road‑trip to the Grand Tetons
    sparked a love for scenic hikes and spontaneous photo‑journalism.
  culinary: Sinead Twitty delights in baking sweet potato casserole and peach cobbler with their mother, perfecting the balance of cinnamon and nutmeg, while also experimenting with homemade pizza topped
    with fresh mozzarella and basil, showcasing a growing kitchen confidence.
  core: Sinead Twitty is a socially vibrant teen who blends spontaneous creativity with a heart for community, juggling basketball, comic art, and a love for gospel‑infused R&B while navigating the challenges
    of teenage organization.
background:
  cultural: Sinead grows up in a close‑knit Black family that blends African‑American traditions with the rugged, outdoor lifestyle of rural Wyoming. Her family places a strong emphasis on faith, music,
    and storytelling, often gathering around church youth events and family celebrations that feature gospel and contemporary R&B. As one of the few Black students in her school, she navigates a unique
    cultural space, drawing strength from her heritage while building bridges with her predominantly white peers. This dual perspective fuels her compassion, her desire to promote inclusion, and her pride
    in representing Black excellence in a small‑town setting.
