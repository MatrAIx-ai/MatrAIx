    meals'', ''Creating digital content for friends'']'
  career_goals: Sinead dreams of becoming an elementary school teacher or a youth outreach coordinator, roles where she can combine her love for helping others with her talent for inspiring group harmony.
    She plans to finish high school with strong grades, earn a scholarship for a degree in education or social work, and eventually launch a mentorship program for Black and other under‑represented youth
    in rural Wyoming. Her long‑term ambition is to be a role model who encourages her community to value diversity and collective support.
