  hobbies: '[''Beach volleyball'', ''Sailing'', ''Trivia nights'', ''Golf league'', ''Robotics mentorship'', ''Charity fundraising'', ''Classic car restoration'', ''Reading business and technology books'',
    ''Attending local music festivals'']'
  career_goals: Looking ahead, Matthew aims to transition into a senior advisory or director‑level role where he can shape large‑scale digital transformation initiatives, particularly for public‑sector
    organizations in the San Diego region. He wants to lead a multi‑year enterprise system modernization project that sets measurable performance benchmarks, publish case studies on best‑practice migration
    strategies, and become a recognized speaker at industry conferences. In the longer term, he envisions establishing a boutique consultancy that helps midsize firms upgrade legacy infrastructure while
    maintaining rigorous governance and cost‑control.
