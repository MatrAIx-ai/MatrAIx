  career_goals: Even at two, Raul often talks about becoming a "builder" or a "helper" when he grows up, reflecting his desire to create, organize, and support others. He enjoys pretending to fix toys,
    arranging blocks into mini‑structures, and caring for stuffed animals, hinting at aspirations toward building, teaching, or caregiving roles. His parents nurture these ambitions by providing building
    kits, access to music classes, and storytime sessions that feature characters who solve problems and help their communities.
