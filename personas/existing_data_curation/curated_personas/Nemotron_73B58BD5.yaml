personas:
  professional: Raul Whalum, a budding botanist in the making, channels their curiosity and methodical nature into sorting leaves and arranging toy lab equipment, while their gentle kindness ensures they
    share discoveries with peers.
  sports: Raul Whalum, an energetic toddler, loves to zip down the slide at the neighborhood park, participates in a toddler soccer class at the local recreation center, and proudly wears a tiny cap bearing
    the logo of the Chicago Cubs, showing their budding team spirit and love for active play.
  arts: Raul Whalum, a colorful little creator, delights in finger-painting vibrant scenes inspired by Van Gogh's Sunflowers, dances to the jazzy rhythms of Ella Fitzgerald, and watches Disney's Moana on
    repeat, letting imaginative narratives fuel their curiosity and appreciation for diverse art forms.
  travel: Raul Whalum, a wide-eyed explorer, enjoys family road trips to the sandy shores of Florida, the bustling streets of New York City where they spot the Statue of Liberty, and dreams of seeing the
    Eiffel Tower in Paris, often clutching a tiny travel-themed plush for comfort.
  culinary: Raul Whalum, a budding foodie with a selective palate, loves chicken nuggets with honey-mustard dip, devours strawberry-yogurt parfaits, proudly makes a banana mash with a plastic spoon, and
    occasionally rejects peas with a determined grimace.
  core: Raul Whalum, a curious, organized, and gentle two-year-old, balances a love for art, saving coins, and playful exploration while navigating toddler challenges with a touch of stubbornness and endless
    wonder.
background:
  cultural: Raul is raised in a warm African‑American family in Seattle’s King County, where his parents blend cultural heritage with the city’s progressive atmosphere. Home life includes sharing soulful
    jazz and R&B music, celebrating Juneteenth and family storytelling nights, and participating in community events at the local cultural center that highlight African‑American art and history. Seattle’s
    emphasis on inclusivity exposes Raul to multicultural preschool programs, outdoor nature activities in the Pacific Northwest, and diverse artistic experiences that shape his appreciation for varied
    perspectives while keeping his African‑American roots central to his identity.
