persona_description: A researcher at New York University's Steinhardt School of Culture, Education, and Human Development who specializes in the study of early environmental and caregiving adversity, particularly
  toxic stress, and its impact on parenting and children's development. They are currently conducting an ACF-funded study to implement and evaluate an intervention, Attachment and Biobehavioral Catch-up
  (ABC), which has been shown to promote children's attachment to their primary caregivers and to diminish toxic stress. The study will include 160 families living in poverty and participating in the federal
  Early Head Start program, and will determine if the ABC intervention is effective with caregivers and in reducing toxic stress in their young children.
