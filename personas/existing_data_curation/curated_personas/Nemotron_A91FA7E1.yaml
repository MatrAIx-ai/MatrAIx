personas:
  professional: Barbara Petty, a veteran community volunteer and aspiring senior advisory board member, channels her practical home‑maintenance know‑how, event‑coordination talent from church potlucks,
    and keen listening skills into structured senior‑center programs while allowing the occasional spontaneous oral‑history storytelling session to flourish, reflecting her blend of a love for predictability
    and a willingness to improvise.
  sports: Barbara Petty enjoys leisurely hikes on the nearby Appalachian trail segments, participates in a local walking club that meets twice a week, avidly follows the West Virginia Mountaineers football
    team, and treats bridge tournaments with her friends as a mental‑sport workout that keeps her mind sharp.
  arts: Barbara Petty immerses herself in Appalachian folk culture by knitting scarves to patterns from Mary Turner, quilting heirloom blankets while listening to Doc Watson’s classic recordings, and reading
    historical novels by Denise Giardina that transport her to the region’s past, occasionally attending the local craft fair to showcase her work.
  travel: Barbara Petty prefers well‑planned road trips to historic destinations such as Shenandoah National Park, Lexington’s historic downtown, and the Monticello estate, but also enjoys spontaneous detours
    to local festivals in nearby towns, balancing her love for structured itineraries with occasional spur‑of‑the‑moment explorations.
  culinary: Barbara Petty cooks her family’s signature pepperoni casserole—layered potatoes, cheddar, and garden tomatoes—alongside fresh collard greens simmered with smoked ham hocks, bakes apple crumble
    using orchard‑picked apples, and delights in experimenting with new herb blends, though she sometimes forgets to refrigerate leftovers, leading to a few spoiled meals.
  core: Barbara Petty is a garden‑loving, quilt‑crafting community mentor who thrives on routine yet occasionally embraces spontaneous creativity, juggling her love for heritage with a habit of misplacing
    her glasses.
background:
  cultural: Barbara was raised in a small, tight‑knit Appalachian community in Fayette County, West Virginia. Her family’s roots trace back to Scots‑Irish settlers who arrived in the region in the 19th
    century. The culture emphasized self‑reliance, a strong work ethic, and close family and church ties. Growing up, she attended a local public school, later taking some college courses at a nearby community
    college. The area’s folk music, storytelling traditions, and Methodist (later Baptist) worship have shaped her values of cooperation, humility, and community service.
