  career_goals: At 72, Barbara’s primary ambition is to stay engaged and independent within her Oak Hill community. She aims to continue volunteering at the senior center, mentor younger volunteers, and
    help preserve local history by contributing oral histories to the county archive. She hopes to finish a memoir of her life in rural West Virginia, maintain her health through regular walking and gardening,
    and possibly take a leadership role on the local senior advisory board.
