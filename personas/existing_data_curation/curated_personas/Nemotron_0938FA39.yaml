  hobbies: '[''Watercolor Painting'', ''Acoustic Guitar'', ''Hiking'', ''Science-Fiction Reading'', ''Makerspace Projects'', ''Community Theater'', ''Mentoring Youth Robotics'', ''Board Games'', ''Trivia
    Nights'', ''Ultimate Frisbee'', ''Gallery Visits'', ''Cooking Experiments'']'
  career_goals: Guy aims to secure a tenured position within the next three years, positioning himself as a leader in interdisciplinary STEM education. He plans to develop a flagship course that merges
    scientific inquiry with visual arts and digital fabrication, and to establish a collaborative research center that partners with local museums, tech startups, and K-12 schools. He seeks to obtain external
    funding for state-of-the-art lab spaces, publish a textbook on creative STEM pedagogy, and influence Delaware’s higher-education policy to support inclusive, experiential learning. In parallel, he wants
    to cultivate a supportive departmental culture that promotes faculty wellbeing, recognizing his own sensitivity to stress and his commitment to teamwork.
