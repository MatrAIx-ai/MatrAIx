personas:
  professional: Guy Riles is a tenured‑track applied mathematics and physics professor who blends rigorous data‑analysis (Python, MATLAB) with interdisciplinary curriculum design, using their curious, organized
    yet flexible mindset to craft courses that fuse watercolor landscape painting and digital fabrication, while their sensitivity to stress drives them to champion collaborative, low‑pressure classroom
    environments.
  sports: Guy Riles hikes the Brandywine Trail with a local outdoor club, plays ultimate frisbee on Thursday evenings with a community league, and loyally follows the Philadelphia Eagles, the Delaware Blue
    Hens basketball team, and the New York Knicks, balancing structured workouts with spontaneous weekend bike rides, and they often organize group rides after matches.
  arts: Guy Riles attends weekly gallery openings featuring contemporary watercolorists like Jane Doe, supports community theater productions such as a local rendition of *Our Town*, jams acoustic guitar
    sessions playing Bob Dylan and John Mayer, and paints tranquil river scenes inspired by Claude Monet, weaving these artistic pursuits into their teaching philosophy, and they frequently incorporate
    these experiences into lesson plans.
  travel: Guy Riles enjoys curated weekend getaways to historic Philadelphia museums, a yearly autumn road‑trip along the Blue Ridge Parkway, a summer art‑focused retreat in Santa Fe, and dreams of a spring
    visit to Kyoto’s temple gardens, always balancing travel costs with a pending tenure‑track grant deadline, and they also seek low‑key cultural festivals that align with their academic calendar.
  culinary: Guy Riles, a competent home cook, favors fresh seafood like seared scallops with lemon butter, crafts hearty vegetable stews with seasonal pumpkins, regularly prepares avocado‑lime sushi rolls,
    and delights in savoring a well‑made espresso while sketching watercolor, though they often skip meals during grading marathons.
  core: Guy Riles is a curiosity‑driven professor who channels their artistic flair and stress‑prone nature into interdisciplinary STEM teaching, while juggling a cautious financial outlook, occasional
    health neglect, and a bustling social life centered around music, hikes, and community arts, and they constantly seek balance amid the demands of tenure.
background:
  cultural: Guy grew up in a middle-class family in the Mid-Atlantic region, with roots in English, Irish, and German ancestry. The cultural milieu of New Castle County—marked by historic colonial heritage,
    a blend of urban and suburban influences, and a strong emphasis on education and community involvement—shaped his outward-looking yet collaborative outlook. He internalized the American values of individual
    curiosity and civic responsibility, while also appreciating the region’s diverse artistic traditions, from folk music to contemporary visual arts. His upbringing in a predominantly white, but increasingly
    multicultural, environment fostered an appreciation for varied perspectives and a commitment to creating inclusive learning spaces.
attributes:
  skills: '[''Applied Mathematics'', ''Physics'', ''Curriculum Design'', ''Interdisciplinary Teaching'', ''Data Analysis (Python, R, MATLAB)'', ''Laboratory Management'', ''Grant Writing'', ''Mentoring
