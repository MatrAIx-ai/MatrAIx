  career_goals: Jose aims to move into a supervisory role within the next two to three years, overseeing a team of warehouse staff and taking responsibility for overall logistics efficiency. He plans to
    obtain a Certified in Production and Inventory Management (CPIM) credential and eventually pursue a Certified Supply Chain Professional (CSCP) designation to broaden his strategic perspective. Long‑term,
    he envisions leveraging his hands‑on experience to become a logistics coordinator for a regional distribution center, where he can implement technology‑driven process improvements and mentor younger
    workers. Financially, he hopes to increase his earnings to provide greater stability for his children and afford occasional trips back to Puerto Rico to visit extended family.
