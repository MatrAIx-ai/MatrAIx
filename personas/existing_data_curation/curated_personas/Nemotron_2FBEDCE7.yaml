personas:
  professional: Jose Arroyo blends twelve years of hands‑on warehouse logistics with a growing fluency in digital RFID tagging, using their relaxed yet competitive mindset to consistently exceed performance
    metrics, though they sometimes misplace paperwork during a busy shift.
  sports: Jose Arroyo fishes Lake Tohopekaliga at sunrise, roots for the New York Mets and follows Orlando City SC, plays occasional weekend softball with the Orlando Suits, and despite a laid‑back attitude
    toward scheduled workouts, they squeeze in quick cardio sessions after shifts to stay active.
  arts: Jose Arroyo dances salsa to the lively beats of Marc Anthony and Celia Cruz at community nights, channels a competitive edge into racing simulators like iRacing, occasionally curates playlists of
    Latin jazz for their cooking sessions, and unwinds with classic Hollywood movies on Friday nights, while they savor the rhythmic blend of music and motorsports.
  travel: Jose Arroyo prefers spontaneous weekend road trips to the Florida Keys or the Everglades, yet they set aside a modest vacation budget each year for a family flight to San Juan, balancing a flexible
    travel style with the goal of maintaining financial stability.
  culinary: Jose Arroyo showcases culinary pride by perfecting mofongo with garlic‑infused plantains, simmering arroz con gandules with sofrito and pigeon peas, hand‑rolling pasteles stuffed with seasoned
    pork, and pairing each feast with a chilled passion‑fruit juice, though they sometimes over‑salt dishes to satisfy a lingering salty craving.
  core: Jose Arroyo is a practical, curiosity‑driven warehouse veteran who competes in restoring a 1972 Chevrolet Nova, masters island‑style cooking, and seeks sunrise fishing escapes, all while they navigate
    a laid‑back planning approach that often leaves them scrambling at the last minute.
background:
  cultural: Jose is a first‑generation Puerto Rican American who grew up in a bilingual household where Spanish and English were spoken interchangeably. Family gatherings, holiday celebrations like Navidad
    and the San Juan festival, and the rhythms of salsa, plena, and reggaetón remain central to his identity. He maintains strong ties to the local Puerto Rican community in Osceola County, attending cultural
    festivals, supporting Puerto Rican businesses, and participating in church activities that emphasize family and mutual support. His heritage instills a deep respect for hard work, a love of food and
    music, and a sense of perseverance that guides both his professional life and personal relationships.
