persona_description: A research scientist with expertise in glaciology and climate change, particularly focused on understanding the response of ice shelves to environmental changes and the impact of these
  changes on global climate patterns. This individual has conducted extensive fieldwork in the Antarctic region and has experience working with international interdisciplinary teams to address significant
  regional problems with global change implications. The research location of the LARISSA project, the Larsen B Ice Shelf embayment, is of particular interest to this scientist, as it has seen significant
  changes in the past decade and has a section of the ice shelf remaining in the south. This scientist is likely to be interested in the deployment of an ice-penetrating radar and GPS survey of a potential
  deep ice core site on the Antarctic Peninsula to measure ice thickness, topography, and accumulation variations across a ~8 km x 8 km site.
