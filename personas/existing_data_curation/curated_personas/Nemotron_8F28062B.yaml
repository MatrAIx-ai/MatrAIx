  hobbies: '["Vegetable gardening", "Reading historical non-fiction", "Crossword puzzles", "Woodworking", "Tinkering with vintage electronics", "Small local history talks", "Chess", "Classic rock listening",
    "Spontaneous road trips"]'
  career_goals: 'Although retired from formal employment, Justin aims to stay intellectually active by volunteering as a mentor for the local high‑school robotics club and contributing occasional technical
    articles to community newsletters that discuss the impact of emerging technologies on everyday life. He hopes to complete a memoir chronicling his engineering experiences and the evolution of the industry,
    which he plans to donate to a regional university archive. Travel remains a modest ambition: he wants to take short, spontaneous road trips with his wife to historic engineering landmarks and natural
    sites in the Northeast. Additionally, he is working to establish a small scholarship fund for under‑represented students pursuing STEM degrees, hoping to leave a tangible legacy for future generations.'
