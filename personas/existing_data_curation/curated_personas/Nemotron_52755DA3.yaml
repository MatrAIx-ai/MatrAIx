  hobbies: '[''Abstract painting'', ''Coastal photography'', ''Reading speculative fiction'', ''Philosophy'', ''Acoustic guitar playing'', ''Small‑group board games'', ''Volunteer art workshops'', ''Exploring
    local culinary scene'', ''Beach walking and kayaking'', ''Collecting vintage vinyl records'']'
  career_goals: Michelle aims to move from first‑line supervision to a regional sales manager role where she can shape broader sales strategies and foster a culture of innovative thinking. She aspires to
    develop a boutique consulting practice that blends creative arts techniques with sales training, helping companies and underrepresented sales teams unlock novel approaches to client engagement. Long‑term,
    she hopes to mentor emerging female and Hispanic sales professionals, championing diversity and introducing mentorship programs that emphasize both analytical rigor and artistic imagination.
