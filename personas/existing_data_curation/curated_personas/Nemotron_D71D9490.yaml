personas:
  professional: A community‑focused counselor, Daisy Wheeler leverages their active listening and crisis‑intervention expertise to build trust with rural clients while meticulously coordinating local resources,
    and they blend curiosity about new therapeutic models with a practical, methodical approach to case documentation.
  sports: An outdoor enthusiast, Daisy Wheeler hikes the rolling hills of Knott County every weekend, follows the Kentucky Wildcats basketball team, and they occasionally join the local 4‑H running club
    for a community 5K, while they keep a modest membership at the county recreation center for yoga.
  arts: A dedicated folk musician and craftsperson, Daisy Wheeler plays the fiddle at church gatherings and community festivals, drawing inspiration from the Carter Family and Alison Krauss, while they
    unwind with mystery novels by Agatha Christie and knit intricate quilts featuring traditional Appalachian patterns.
  travel: A purposeful traveler, Daisy Wheeler enjoys short road trips to explore the Blue Ridge Parkway and Shenandoah National Park, has visited Asheville’s craft markets, and they dream of a cultural
    exchange tour of the Scottish Highlands to trace Celtic roots in Appalachian music.
  culinary: A garden‑to‑table foodie, Daisy Wheeler cultivates tomatoes, beans, and collard greens and uses them to prepare classic dishes like cornbread‑topped chicken pot pie, heirloom tomato salad with
    basil, and an herb‑infused mountain stew, while they relish the occasional slice of locally baked apple pie.
  core: Daisy Wheeler is a methodical, community‑centered counselor who balances a love for Appalachian fiddle music, quilting, and hiking with disciplined financial habits and a proactive health routine,
    all while nurturing a quiet curiosity about new therapeutic techniques.
background:
  cultural: Daisy comes from a multi-generational Appalachian family in Knott County, Kentucky. Her upbringing was shaped by close-knit community values, church involvement, and a strong sense of self-reliance.
    The region’s folk traditions, storytelling, and emphasis on mutual aid influence her compassionate outlook and her dedication to serving neighbors. While she identifies as white American, she respects
    the cultural nuances of rural Kentucky, including dialect, music, and the historical challenges faced by coal-mining communities, which inform her culturally responsive counseling practice.
attributes:
  skills: '[''Active Listening'', ''Empathetic Communication'', ''Crisis Intervention'', ''Motivational Interviewing'', ''Case Management'', ''Community Resource Navigation'', ''Group Facilitation'', ''Individual
    Care Planning'', ''Documentation and Record-Keeping'', ''Cultural Competency in Appalachian Context'']'
  hobbies: '[''Gardening'', ''Hiking'', ''Fiddle Playing'', ''Quilting'', ''Knitting'', ''Reading Mystery Novels'', ''Genealogy Research'', ''Volunteering at Food Pantry'', ''Participating in 4-H Events'']'
  career_goals: Daisy aims to earn a bachelor's degree in social work within the next three years, followed by a master's in counseling to become a licensed professional counselor. She wants to develop
    a rural youth mental health outreach program that integrates school counseling with community services, and to train peer mentors to address substance-use concerns. Long-term, she envisions becoming
    a supervisory counselor, guiding new staff and expanding evidence-based practices throughout Knott County while maintaining her deep ties to the local community.
