    for fitness services"]'
  hobbies: '["Gardening and herb cultivation","Reading historical fiction and wellness books","Light hiking and birdwatching","Kayaking on nearby lakes","Gentle home yoga practice","Knitting and crafting","Volunteering
    at the local senior center","Cooking healthy meals for community events"]'
  career_goals: Sheree aims to expand her impact in the Addison community by establishing a boutique wellness studio that offers low‑impact group classes and personalized training for seniors and adults
    seeking a flexible schedule. She plans to earn the ACSM Certified Exercise Physiologist credential and become a certified senior‑fitness specialist. Over the next five years, she hopes to mentor younger
    trainers, develop a series of community health workshops, and author a guidebook on maintaining mobility and balance in later life, all while maintaining a work‑life rhythm that respects her need for
    structure and occasional solitude.
