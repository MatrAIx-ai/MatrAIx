personas:
  professional: Oscar Estrada is a seasoned machinist with over three decades of expertise in CNC and manual machining, fluent in blueprint interpretation and CAD/CAM, who leverages a pragmatic curiosity
    to experiment with cutting parameters while mentoring junior staff, and they are eyeing a lead supervisor role to blend data‑driven Six Sigma improvements with hands‑on craftsmanship.
  sports: Oscar Estrada is a member of the Riverside Kickball League, plays forward for the Eastside Strikers community soccer team, and cheers on the hometown Bakersfield Bees baseball squad, channeling
    their competitive streak into weekend matches while using salsa dancing nights as a rhythmic warm‑up, and they relish the camaraderie of team sports despite occasional skepticism about teammates' commitments.
  arts: Oscar Estrada enjoys salsa dancing nights at the local cultural center, frequently spins classic Latin tracks by Celia Cruz and Marc Anthony, and attends live performances by the downtown orchestra
    Los Ritmos de la Plaza, which satisfy their sociable side and love for rhythmic expression, and they often critique the choreography with a competitive eye.
  travel: Oscar Estrada loves weekend road trips to cultural festivals, such as the Dia de los Muertos parade in Santa Fe and the historic streets of Oaxaca, while dreaming of a future vacation to Barcelona’s
    Gaudí landmarks, but they tend to postpone detailed itinerary planning until the last minute, reflecting a relaxed approach that sometimes fuels travel‑related stress.
  culinary: Oscar Estrada favors cooking traditional dishes like tamales, chiles rellenos, and carne asada tacos, meticulously seasoning with fresh cilantro, lime, and chipotle, yet they oscillate between
    precise 3D‑printed garnish molds and occasional over‑salted sauces when a new car project distracts them, showcasing both their hands‑on ingenuity and occasional kitchen disorganization.
  core: Oscar Estrada is a curiosity‑driven machinist who balances hands‑on expertise, sociable energy, and a competitive edge with occasional disorganization and a tendency toward stress‑induced worry,
    and they constantly seek ways to merge new technology with time‑tested craftsmanship.
background:
  cultural: Oscar traces his roots to a Mexican immigrant family that settled in the Boston suburbs in the 1970s. Raised in a bilingual household, he grew up speaking both Spanish and English, celebrating
    Día de los Muertos, Cinco de Mayo, and quinceañeras with extended family. The strong emphasis on hard work, familial responsibility, and community solidarity shaped his values. In Framingham, he is
    an active member of a local Hispanic cultural association, where he volunteers at youth mentorship programs and helps organize traditional music and dance events. His cultural identity blends the pride
    of his Mexican heritage with the practical, industrious spirit of New England.
