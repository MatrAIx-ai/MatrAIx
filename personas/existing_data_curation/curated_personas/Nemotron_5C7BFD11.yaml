  career_goals: Oscar aims to advance from his current machinist role to a lead supervisor position where he can oversee production flow and mentor a larger team. He is pursuing a CNC Operator certification
    and plans to obtain a Six Sigma Green Belt to bring data‑driven process improvements to his shop. Long‑term, he dreams of opening a small, family‑run machine shop that blends traditional hand‑crafting
    with modern CNC technology, allowing him to apply his curiosity about new methods while preserving practical, hands‑on expertise. He also wants to achieve a work‑life balance that reduces stress for
    his family, so he is working on developing better personal organization habits.
