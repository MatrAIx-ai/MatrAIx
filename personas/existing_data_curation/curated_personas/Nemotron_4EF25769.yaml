personas:
  professional: Rodrigo Nunez, a diligent municipal clerk in Ponce, leverages bilingual fluency and expert data‑entry skills to streamline licensing workflows while they quietly plan a citywide digitization
    overhaul that could cut processing times by half.
  sports: Rodrigo Nunez, an avid weekend hiker on the Cerro de la Luna trail, cheers for the Leones de Ponce baseball team, follows FC Ponce’s matches, and they belong to the local “Cerro Club” running
    group that meets for early‑morning jogs.
  arts: Rodrigo Nunez, a quiet guitar‑ist, finds inspiration in the Bomba rhythms of Rafael Cortijo, the poetic novels of Luis Rafael Sánchez, and the striking colonial‑architecture photography of Fernando
    Llamas, they weave these influences into their own acoustic sessions and weekend photo walks.
  travel: Rodrigo Nunez, a meticulous planner, prefers short, well‑researched trips to historic towns like Old San Juan and Cartagena, Colombia, yet they dream of a longer cultural immersion in Cádiz, Spain,
    balancing their limited budget with a love for colonial architecture and seaside walks.
  culinary: Rodrigo Nunez, a competent home cook, delights in preparing arroz con gandules, mofongo with chicharrón, and pasteles seasoned with sofrito, plantains, and adobo, while they proudly source ripe
    plantains and fresh cilantro from the local Mercado de Santa Ana.
  core: Rodrigo Nunez blends methodical precision with quiet curiosity, turning routine municipal work into a pathway for community‑focused innovation while they nurture a solitary yet richly cultural life.
background:
  cultural: Rodrigo was raised in a middle‑class family in Ponce, a city celebrated for its vibrant arts scene, historic plazas, and deep-rooted traditions such as the annual Carnaval Ponceño. He grew up
    bilingual, navigating both Spanish‑dominant community life and English‑based academic environments, which cultivated a flexible cultural identity. Family gatherings often featured traditional dishes
    like arroz con gandules and música bomba, reinforcing his connection to Afro‑Caribbean rhythms. His Catholic upbringing emphasized respect for elders and communal responsibility, while local festivals
    and the city's architectural heritage nurtured his appreciation for Puerto Rican history and pride in his island heritage.
attributes:
  skills: '["Bilingual Communication (Spanish/English)", "Document Management and Archiving", "Data Entry and Database Navigation", "Office Software Proficiency (MS Office, Google Workspace)", "Legal Procedural
