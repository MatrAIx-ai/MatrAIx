    Regulatory Constraints"]'
  hobbies: '["Reading historical fiction (Puerto Rican history)", "Acoustic guitar playing", "Hiking local trails (Cerro de la Luna, etc.)", "Journaling and reflective writing", "Puzzle solving (crosswords,
    Sudoku)", "Cooking traditional Puerto Rican cuisine", "Photography of colonial architecture", "Intimate salsa dancing with close friends"]'
  career_goals: Rodrigo aims to complete a bachelor's degree in Public Administration within the next three years, leveraging his current experience to qualify for a senior clerk or supervisory position
    within the Ponce municipal government. He aspires to lead a digitization initiative that modernizes the city’s licensing and record‑keeping systems, reducing processing times and improving public access.
    Long‑term, he envisions a career path toward municipal management, possibly pursuing a master's in Public Policy, where he can influence community development projects while maintaining a balance between
    practical solutions and innovative ideas.
