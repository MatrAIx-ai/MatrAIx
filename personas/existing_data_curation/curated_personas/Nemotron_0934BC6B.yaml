personas:
  professional: Carol Hanzo is a 21-year-old part-time quality assurance specialist who blends meticulous manual testing with a creative, exploratory approach to automation using Python, Selenium, and Cypress,
    often switching between test case notebooks and sketchpads, and aims to become a senior QA lead who builds AI-assisted testing frameworks while championing user-centric design in a flexible, low-stress
    environment.
  sports: Carol Hanzo stays active primarily through solo weekend hikes across the Sonoran desert and weekly yoga sessions, while also rooting for the Phoenix Suns and joining a small community running
    group that meets on Saturday mornings for 5K routes around the city park.
  arts: Carol Hanzo immerses herself in creative expression by sketching desert vistas, crafting digital illustrations inspired by the works of Olafur Eliasson and Banksy, attending indie music shows featuring
    Tame Impala and Sufjan Stevens, and devouring science-fiction novels by N.K. Jemisin, all of which shape her artistic identity.
  travel: Carol Hanzo favors spontaneous, low-budget travel that blends her love for desert photography with cultural curiosity, having trekked the red rocks of Sedona and the stark dunes of Joshua Tree,
    while dreaming of immersing herself in the neon streets of Tokyo and the dramatic fjords of New Zealand's South Island, preferring flexible itineraries over strict schedules.
  culinary: Carol Hanzo enjoys a modest but eclectic palate, often whipping up spicy chickpea tacos topped with cilantro-lime crema, avocado toast sprinkled with radish and feta, and a carefully brewed
    matcha latte, while occasionally treating herself to Thai takeout after a long hike.
  core: Carol Hanzo is a curious, art-driven QA enthusiast who balances intense emotional waves with a love for solitary sketching, spontaneous hikes, and low-key indie shows, all while navigating a flexible
    yet sometimes disorganized lifestyle.
background:
  cultural: Carol identifies as White of mixed English and German heritage, raised in a middle‑class family in the Phoenix metropolitan area. Growing up in Arizona exposed her to a culturally diverse environment,
    with frequent community events that celebrated Hispanic, Native American, and Southwestern traditions. While she primarily embraces mainstream American values—individualism, self‑reliance, and a strong
    work ethic—she also appreciates the region's rich artistic scene and the inclusive ethos of the tech community in Chandler. Her family encouraged curiosity, education, and community service, shaping
    her supportive and cooperative personality.
attributes:
  skills: '[''Manual testing'', ''Automated testing (Selenium, Cypress)'', ''Test case design'', ''Exploratory testing'', ''Bug tracking (Jira)'', ''API testing (Postman)'', ''Performance testing (JMeter)'',
    ''Scripting in Python'', ''CI/CD pipeline integration'', ''Agile Scrum participation'', ''UX/UI usability testing'', ''Documentation and reporting'']'
  hobbies: '[''Sketching and pencil drawing'', ''Digital illustration'', ''Photography (urban and nature)'', ''Visiting art galleries and museums'', ''Reading science fiction and fantasy'', ''Playing the
    acoustic guitar'', ''Listening to indie music'', ''Hiking in the Sonoran Desert'', ''Meditation and yoga'', ''Attending small tech meetups (software testing)'', ''Journaling'']'
  career_goals: Carol aims to become a senior QA engineer who leads a small, collaborative testing team focused on innovative, user‑centric products. She plans to deepen her expertise in test automation,
    obtain ISTQB and CSQA certifications, and eventually develop AI‑assisted testing frameworks that enable more creative, edge‑case exploration. In the longer term, she hopes to transition into a quality
    advocacy role where she can mentor junior testers, shape product quality strategies, and influence design decisions. A supportive work environment that values mental‑health resources is a key factor
    in her career planning.
