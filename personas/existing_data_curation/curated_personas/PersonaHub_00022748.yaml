persona_description: A teacher who uses technology to enhance learning, particularly in the flipped classroom model. They are proficient in recording and uploading lectures, using software like Camtasia
  and PowerPoint, and have experience with interactive activities like roleplays and simulations. They are familiar with USF policy on instructional materials and accommodations, and are interested in creating
  captions for videos to provide accessibility for all students. They are also knowledgeable about tools like Screencast-o-Matic and Jing, and are looking for innovative ways to structure activities in
  a flipped classroom.
