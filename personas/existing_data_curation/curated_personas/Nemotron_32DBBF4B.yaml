personas:
  professional: Kim Mathews is a commercially trained cleaning and facilities technician whose practical curiosity drives her to integrate green cleaning methods, meticulous safety logs, and assertive yet
    supportive team training into daily operations.
  sports: Kim Mathews hikes the Appalachian foothills every Saturday, participates in a local church softball league, practices gentle yoga twice a week, and roots for the Birmingham Barons and the Alabama
    Crimson Tide, combining low‑impact exercise with community camaraderie.
  arts: Kim Mathews unwinds with mystery novels by C.J. Sansom, historical fiction by Philippa Gregory, and enjoys the soulful folk sounds of The Lumineers, the gospel harmonies of the local choir, and
    classic Southern films like 'To Kill a Mockingbird' on occasional movie nights.
  travel: Kim Mathews prefers weekend road trips to nearby Asheville, NC, and the Blue Ridge Parkway, dreams of an eco‑friendly stay in Costa Rica’s Monteverde cloud forest, and plans each trip with a spreadsheet
    that balances budget, time off, and opportunities for bird‑watching.
  culinary: Kim Mathews loves cooking Southern comfort dishes such as shrimp and grits, fried green tomatoes, and collard greens seasoned with garden‑grown rosemary and thyme, enjoys experimenting with
    low‑waste prep, yet admits to a guilty love for pecan pie from the local bakery.
  core: Kim Mathews blends a quiet, solitary nature with a hands‑on curiosity for sustainable cleaning, quietly champions fair wages, and balances modest living with a love for homemade Southern food and
    the Appalachian outdoors.
background:
  cultural: Kim was raised in Ashville, a small town in St. Clair County, Alabama, within a predominantly white, working‑class community. Her family placed a high value on reliability, modesty, and community
    involvement, often participating in local church gatherings and town events. Southern hospitality and an appreciation for the natural environment—such as the nearby foothills and rural landscapes—shaped
    her outlook. While she honors these traditions, her practical curiosity drives her to embrace new ideas, especially about sustainability and personal development.
attributes:
  skills: '[''Commercial cleaning'', ''Floor care'', ''Green cleaning practices'', ''Chemical safety'', ''Inventory management'', ''Minor plumbing repairs'', ''Electrical fixture replacement'', ''Equipment
    operation (floor scrubbers, pressure washers)'', ''Documentation and reporting'', ''Staff training and supervision'']'
  hobbies: '[''Reading mystery novels'', ''Gardening'', ''Hiking local trails'', ''DIY home improvement projects'', ''Listening to sustainability podcasts'', ''Cooking Southern dishes'', ''Birdwatching'',
    ''Yoga'']'
  career_goals: Kim aims to move from a building‑cleaner role to a supervisory position within the next two years, obtaining a certification in facilities management and OSHA safety. She hopes to lead a
    team, introduce more sustainable cleaning protocols, and eventually become a facility manager for a larger complex or regional office. Long‑term, she envisions opening her own environmentally‑focused
    cleaning service, leveraging her practical knowledge and curiosity about new cleaning technologies. She also wants to advocate for better wages and benefits for cleaning staff, using her cooperative
    nature to build consensus.
