  career_goals: Salvador aims to become a principal investigator leading an interdisciplinary research group within the next five years, securing large federal and industry grants to develop scalable nanomaterial
    technologies for renewable energy storage. He aspires to a tenure-track faculty position at a research university that values both high-impact science and community outreach, where he can mentor Latinx
    students and promote diversity in STEM. Long-term, he envisions establishing a collaborative hub that bridges academia, industry, and the local Mexican-American community to accelerate technology transfer
    while fostering inclusive innovation.
