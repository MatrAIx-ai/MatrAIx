  hobbies: '[''Reading science‑fiction'', ''Nature book reading'', ''Exploring local trails'', ''Bird‑watching'', ''Stargazing'', ''Aurora observation'', ''Fishing'', ''LEGO building'', ''Model rocket construction'',
    ''Scratch programming'', ''Sketching wildlife'', ''Creative writing'']'
  career_goals: James hopes to pursue a career that merges his love of technology with his passion for the natural world. He aims to attend a STEM‑focused high school and later study environmental science
    or computer science at a university, with the long‑term goal of becoming a wildlife biologist who uses data analysis tools, or a software engineer developing monitoring applications for Arctic ecosystems.
    He dreams of contributing to conservation projects in Alaska and possibly working remotely from the wilderness.
