  hobbies: '[''Reading contemporary fiction'', ''Gardening'', ''Cooking and baking'', ''Mindful yoga'', ''Photography'', ''Knitting'', ''Volunteering at base events'', ''Nature walks'', ''Podcast listening'',
    ''Book club participation'']'
  career_goals: Kami aims to transition back into the workforce in a role that leverages her compassion and organizational strengths, such as a community outreach specialist for military families or a family
    support counselor. She is interested in obtaining certification as a peer support specialist and eventually leading a program that provides mental‑health resources on base. In the medium term, she hopes
    to launch a small home‑based tutoring service for children of service members, allowing her to balance family responsibilities with professional growth.
