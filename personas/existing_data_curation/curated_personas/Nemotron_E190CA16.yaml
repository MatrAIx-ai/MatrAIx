personas:
  professional: Kami Berdahl is an aspiring community outreach specialist for military families, leveraging their strong active‑listening and conflict‑resolution skills, meticulous event‑coordination experience,
    and compassionate nature to design supportive programs, while navigating a personal tension between a love of structure and occasional spontaneous bursts that sometimes delay project deadlines.
  sports: Kami Berdahl enjoys low‑impact fitness, regularly participating in base yoga classes, weekend nature walks around the installation, and cheering for the Dallas Cowboys and the local women's soccer
    club, while occasionally neglecting formal exercise plans due to their spontaneous scheduling habits.
  arts: Kami Berdahl finds creative refuge in contemporary fiction—favoring authors like Brit Bennett and Celeste Ng—knitting hand‑crafted scarves, capturing candid snapshots of base life with a vintage
    Canon, and attending local indie‑music shows featuring artists such as Hozier and Phoebe Briggs, though they often rush through reading to accommodate volunteer duties.
  travel: Kami Berdahl prefers short, well‑planned family trips that blend relaxation with nature, having recently visited Nashville for its music scene, day‑tripping to the Hill Country for wildflower
    hikes, and dreaming of a future coastal retreat in Maine, while always budgeting meticulously to fit their modest service‑family allowance.
  culinary: Kami Berdahl experiments with Texan‑Southern comfort food, mastering dishes like smoked brisket with pimento cheese gratin, collard‑green‑studded jambalaya, and buttery pecan pie, while their
    moderate baking skill means they occasionally over‑salt desserts, yet they cherish the communal meals that bring their small circle of friends together.
  core: Kami Berdahl is a compassionate, detail‑oriented community builder whose quiet resilience is balanced by a habit of over‑worrying and occasional deadline‑dodging, channeling that tension into thoughtful
    support for military families.
background:
  cultural: Kami is a white American raised in a small Midwestern town where community and church played central roles. After marrying a service member, she moved to Dyess Air Force Base in Texas, immersing
    herself in the military spouse culture that values service, resilience, and close‑knit support networks. Her upbringing blends traditional American holidays and values with the regional influences of
    Texas—appreciation for country music, regional cuisine, and outdoor activities. This combination shapes her practical outlook, strong sense of duty, and compassionate approach to helping others.
