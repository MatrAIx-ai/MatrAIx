  career_goals: Eugene dreams of becoming an engineer or inventor who creates practical solutions for everyday problems. He is fascinated by robotics and hopes to design and build a competition-ready robot
    for a future middle-school robotics league. His competitive streak drives him to aim for top placements in school science fairs and coding contests. Long-term, he imagines working on projects that blend
    his curiosity about how things work with a desire to make a tangible impact, such as developing assistive technology or sustainable engineering solutions.
