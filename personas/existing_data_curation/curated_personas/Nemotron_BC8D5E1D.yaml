  hobbies: '[''Birdwatching'', ''Hiking and nature walks'', ''Gardening (vegetables and native plants)'', ''Reading mystery and historical fiction'', ''Knitting and crochet'', ''Cooking healthy home‑cooked
    meals'', ''Participating in a small book club'', ''Volunteering at community events'', ''Photography of local wildlife'']'
  career_goals: Melissa aims to move into a supervisory role where she can mentor a larger crew and shape cleaning policies for a regional facilities network. She plans to earn a Green Cleaning Certification
    and an OSHA 30‑hour safety credential to strengthen her expertise. In the longer term, she dreams of launching a small, locally‑owned cleaning business that focuses on sustainable practices for schools
    and community centers in Tulare County, while also offering apprenticeship opportunities for younger workers.
