  career_goals: Although retired from formal employment, Martha remains driven to leave a lasting cultural imprint on her community. She aims to launch a senior‑led oral‑history project documenting Sarasota’s
    mid‑20th‑century evolution, secure funding for a local arts scholarship, and publish a memoir interweaving personal narrative with regional history. She also hopes to mentor emerging artists and historians,
    and to become a recognized advisor for the city’s cultural council. Her competitive streak propels her to win local senior bridge tournaments, thereby raising visibility for the senior center’s programs.
