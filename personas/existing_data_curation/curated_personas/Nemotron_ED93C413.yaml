personas:
  professional: A curious and organized four-year-old named Lauraashley Peterson loves to explore simple science experiments with building blocks and consistently leads her preschool’s “Discovery Corner,”
    where she methodically arranges materials and encourages peers to join in group projects.
  sports: Energetic four-year-old Lauraashley Peterson dabbles in the Bakersfield Cougars’ tiny soccer program, loves chasing the ball after recess, proudly wears a Los Angeles Dodgers cap on game days,
    and also joins a weekly dance class that blends rhythmic clapping from family gatherings with basic gymnastics, though they occasionally forget to tie their shoelaces properly.
  arts: Lauraashley Peterson, a budding little artist, spends afternoons drawing vibrant scenes of church choirs and collard‑green pots while humming gospel tunes and dancing to Beyoncé’s “Love on Top,”
    and they adore watching Disney’s “Moana” for its island rhythms, even if they sometimes get sticky crayons on their hands.
  travel: Four‑year‑old Lauraashley Peterson enjoys family road trips to the coastal dunes of Santa Barbara, weekend visits to the grandparents’ farm in the Central Valley where they chase butterflies,
    and dreaming of a future adventure to Disneyland, though they sometimes get fussy on long car rides and demand their favorite snack.
  culinary: Lauraashley Peterson loves helping to stir sweet potato mash and bake cornbread with her grandmother, delights in munching mac ’n’ cheese and chicken nuggets, and is fearless when tasting new
    veggies like roasted carrots, yet they often get crumbs on their shirt and need reminders to wash their hands afterward.
  core: Lauraashley Peterson is a spirited four‑year‑old who blends curiosity, organization, and community‑centered joy into every game, snack, and story, even if they sometimes lose their socks in the
    laundry.
background:
  cultural: Lauraashley is an African American child raised in Bakersfield, California. Her family maintains cultural traditions such as Sunday church services with gospel music, celebrating Juneteenth,
    cooking soul‑food dishes like collard greens, cornbread, and sweet potatoes with her grandmother, and participating in the Bakersfield Black History Celebration. She is exposed to African American storytelling,
    rhythm, and dance, and often hears family members use gentle forms of African American Vernacular English. The family values education, community service, and cultural pride, providing her with a strong
    sense of identity that blends her heritage with the diverse West Coast environment.
