  career_goals: Even at four, Lauraashley imagines a future where she can help others and stay organized. She often says she wants to become a teacher who reads stories to kids, a doctor who makes people
    feel better, or a dancer who performs on stage. She aspires to graduate high school, attend college, and work in a community‑focused role such as a pediatric nurse or a preschool educator, always keeping
    her love for routine and caring for others at the core of her ambitions.
