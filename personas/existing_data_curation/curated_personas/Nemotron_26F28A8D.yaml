  hobbies: '[''Soccer'', ''Basketball'', ''Skateboarding'', ''Hiking in the Blue Ridge Mountains'', ''Multiplayer video gaming (Fortnite)'', ''Creating short TikTok videos'', ''Playing acoustic guitar'',
    ''Attending folk music festivals'', ''Volunteering for community clean‑up'', ''Drawing comics'']'
  career_goals: Sanford hopes to turn his love for community and hands‑on work into a career that blends service with outdoor activity. He is interested in becoming a firefighter or emergency‑medical technician,
    or perhaps a park ranger who can lead youth groups on hikes. He also dreams of creating a YouTube channel that showcases Appalachian music and nature, merging his media skills with his cultural roots.
