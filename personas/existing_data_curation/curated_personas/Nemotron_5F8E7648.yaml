personas:
  professional: A seasoned fabricator and aspiring metal artist, Mattie Duarte blends a decade of precision assembly expertise with an imaginative drive for abstract forms, thriving on flexible shop‑floor
    schedules, mentoring junior assemblers, and channeling their critical eye into innovative CNC‑crafted sculptures that push beyond routine production.
  sports: A solitary hiker and casual baseball enthusiast, Mattie Duarte hikes the trails of Sleeping Giant State Park every weekend, joins a small local running club for weekend jogs, and catches select
    Hartford Yard Goats games, preferring low‑key physical activity over team sports while they keep a modest collection of vintage hand tools as a reminder of the region’s industrial past.
  arts: An avant‑garde art aficionado, Mattie Duarte immerses themselves in abstract painting, metal sculpture, and urban decay photography, drawing inspiration from artists like Yayoi Kusama, Agnes Martin,
    and the soundscapes of Aphex Twin, and frequents the Wadsworth Atheneum and local craft fairs to stay attuned to emerging creative trends that fuel their competitive edge.
  travel: A spontaneous road‑tripper with a taste for cultural immersion, Mattie Duarte prefers flexible, last‑minute itineraries that blend New England’s autumn foliage drives with occasional overseas
    pilgrimages to Lisbon’s historic neighborhoods to sample feijoada and pastel de nata, and they dream of attending the Venice Biennale to scout avant‑garde installations.
  culinary: A nostalgic home‑cook who celebrates Portuguese‑American flavors, Mattie Duarte regularly prepares feijoada with smoked chorizo, caramelized pastel de nata for dessert, and seasonal New England
    clam chowder, while their experimental side leads them to fuse metal‑inspired plating techniques, though they often forget to refrigerate leftovers, resulting in occasional food‑safety mishaps.
  core: A 46‑year‑old imagination‑driven metal sculptor, Mattie Duarte balances precise fabrication skill with a restless creative spirit, yet they wrestle with chronic worry and a penchant for spontaneous,
    low‑stress work rhythms.
background:
  cultural: Mattie grew up in a suburban New England environment in Bristol, Connecticut, within a family that traces its roots to Portuguese ancestry. The cultural backdrop blends traditional American
    values of self‑reliance, modesty, and community involvement with Portuguese culinary traditions celebrated at family gatherings, such as feijoada and pastel de nata. Proximity to Hartford’s industrial
    heritage shaped her practical outlook and interest in fabrication, while the region’s support for local arts exposed her to gallery scenes and craft fairs, nurturing her artistic curiosity.
attributes:
  skills: '[''precision assembly'', ''technical drawing interpretation'', ''hand and power tool proficiency'', ''basic welding'', ''CNC operation'', ''material improvisation'', ''custom metal art creation'',
    ''quality inspection'', ''troubleshooting and problem solving'', ''process improvement suggestion'']'
  hobbies: '[''abstract painting'', ''metal sculpture crafting'', ''sketching and doodling'', ''reading speculative fiction'', ''listening to avant‑garde music'', ''DIY electronics projects'', ''hiking
    nature trails'', ''photography of urban decay'', ''collecting vintage hand tools'', ''visiting small art galleries'']'
  career_goals: Mattie's career ambition is to transition from routine assembly work to a role that blends her technical fabrication expertise with her artistic imagination. She plans to obtain CNC machining
    certification and develop a portfolio of bespoke metal artworks, aiming eventually to launch a small boutique studio in the Hartford region. Additionally, she seeks a supervisory position where she
    can mentor junior assemblers, champion process innovations, and shape projects with greater creative freedom, while maintaining a work environment that respects her preference for flexible, low‑stress
    schedules.
