  career_goals: Although Jackie is only two, she already shows budding aspirations shaped by her environment. She often talks about being a teacher when she sees adults reading storybooks, imagines helping
    animals like a vet while playing with stuffed pets, and expresses delight in exploring the backyard as a nature explorer. These early ambitions reflect her curiosity, practical mindset, and desire to
    contribute to small groups while maintaining a comfortable, solitary comfort zone.
