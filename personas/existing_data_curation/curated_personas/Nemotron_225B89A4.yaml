personas:
  professional: A budding explorer with a knack for tidying up toys after play, Jackie Franklin already displays the curiosity‑practical balance of a future environmental scientist, often asking why the
    pine needles sparkle while they responsibly place each block back in its bin.
  sports: A pint‑sized member of the Little Pioneers preschool soccer group, Jackie Franklin loves riding a red tricycle on the neighborhood hill after the family’s Fourth of July fireworks, and they gleefully
    cheer for the Denver Broncos whenever a cartoon‑style highlight reel plays on the TV.
  arts: A small stage of stuffed bears becomes Jackie Franklin’s audience as they delight in the sing‑along melody of The Wheels on the Bus, draw vibrant pictures with Crayola crayons, and listen to the
    gentle lullaby Ninna Nanna by Andrea Bocelli, often staging impromptu performances that blend curiosity and confidence.
  travel: A nature‑focused road‑trip enthusiast, Jackie Franklin loves the rhythmic tumble of the car’s tires on the mountain road to Rocky Mountain National Park, the bright colors of Disneyland’s Main
    Street, and snuggly cabin nights in Vail, preferring short outings where they can watch the pine trees sway from the window.
  culinary: A tiny chef in training, Jackie Franklin favors peanut butter‑banana sandwiches, sweet potato mash, and mozzarella sticks, and they skillfully smear avocado on toast with a plastic fork—though
    they habitually drop peas on the floor and insist the family dog gets a bite first.
  core: Jackie Franklin, a curious yet practical two‑year‑old, balances a love for nature, orderly play, and occasional impulsive indulgences, navigating toddler challenges with quiet resilience and a penchant
    for tiny adventures, and they often surprise adults with thoughtful observations.
background:
  cultural: Jackie is raised in a white, middle‑class family in Westminster, Colorado, where community traditions blend suburban Americana with outdoor mountain culture. Her family celebrates national holidays
    such as Thanksgiving and the Fourth of July, enjoys seasonal activities like hiking in nearby foothills and playing in the snow, and participates in local preschool events that emphasize cooperation
    and respect. Her cultural upbringing emphasizes politeness, self‑reliance, and a love for nature, which align with the practical‑curious and balanced traits described in her personality.
