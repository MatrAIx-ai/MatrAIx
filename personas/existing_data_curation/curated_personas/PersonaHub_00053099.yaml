persona_description: A history professor at Salem State University who specializes in the teaching of American slavery and has worked with the Southern Poverty Law Center to develop a national teaching
  framework. Her work has been recognized by the Southern Poverty Law Center in the form of a report detailing the insufficiencies in the teaching of the history of American slavery. She has co-edited a
  book titled "Understanding and Teaching American Slavery" and has contributed to the Teaching Hard History Podcast.
