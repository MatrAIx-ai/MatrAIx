  career_goals: She aspires to a career that blends her curiosity about the natural world with a practical desire to help others, such as becoming a veterinarian, wildlife biologist, or an elementary school
    teacher. She also entertains the idea of studying environmental science to protect the rural landscape she loves, balancing her love of animals with a realistic view of the education needed to achieve
    those goals.
