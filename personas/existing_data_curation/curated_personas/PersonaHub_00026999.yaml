persona_description: A scientist at Virginia Tech who specializes in robotics and automation, particularly in the development and application of autonomous robots in various fields such as ocean monitoring
  and marine disaster cleanup. They are particularly interested in the use of robots for reconnaissance missions and have received funding from the Office of Naval Research to develop Cryo, a large, battery-powered
  jellyfish robot that uses energy-efficient undulations to move its bulk and has applications ranging from monitoring the ocean to cleaning up marine disasters. They are currently working on making Cryo
  suitable for deployment in the open ocean and may one day shed light on complex matters of international intrigue with their autonomous jellyfish robot.
