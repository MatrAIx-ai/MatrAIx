personas:
  professional: Jerry Detweiler is a detail‑oriented building cleaner who leverages their mastery of floor‑care chemistry, routine maintenance tasks, and strict OSHA compliance to ensure pristine facilities,
    while eyeing a Certified Professional Cleaner credential and future supervisory duties that will let them streamline schedules and train newcomers with a methodical, no‑nonsense approach.
  sports: Jerry Detweiler spends early mornings casting lines on the Weeki Wachee River, is a member of the Spring Hill Anglers Club, and follows the Tampa Bay Rays and Tampa Bay Lightning passionately,
    occasionally joining a weekend pick‑up basketball league at the community center to stay active.
  arts: Jerry Detweiler unwinds to classic rock legends like The Eagles and country icons such as Alan Jackson, and they spend evenings assembling model airplane kits of the Boeing 707 and classic car replicas,
    appreciating the precise craftsmanship as a form of creative expression.
  travel: Jerry Detweiler prefers low‑key, meticulously planned trips, such as weekend road trips to the Florida Keys for deep‑sea fishing and a self‑guided tour of historic St. Augustine, and they dream
    of a summer fly‑fishing expedition in Iceland, saving carefully to balance adventure with their modest budget.
  culinary: Jerry Detweiler enjoys simple, hearty meals like grilled catfish seasoned with lemon and cayenne, fish tacos topped with fresh cilantro and lime, and they often cook stovetop mac and cheese
    with cheddar and breadcrumbs, favoring straightforward recipes that mirror their organized approach.
  core: Jerry Detweiler is a routine‑driven, solitary competitor who balances early‑morning fishing, precise model‑building, and disciplined work habits with a stubborn streak for efficiency and a hidden
    penchant for occasional late‑night gaming marathons.
background:
  cultural: Jerry grew up in a middle‑class, working‑family environment in the Tampa Bay area, where a strong work ethic and practical values are emphasized. His upbringing reflects typical Floridian Gulf
    Coast culture, with a blend of suburban stability and a modest appreciation for outdoor recreation such as fishing and boating. While his ethnic background is white, his family traditions include a
    respect for punctuality, responsibility, and community involvement through local service projects. These cultural influences, combined with the laid‑back yet industrious atmosphere of Port Richey, shape
    his pragmatic outlook and preference for routine.
attributes:
  skills: '[''General custodial cleaning'',''Floor care (stripping, waxing, polishing)'',''Carpet extraction and stain removal'',''Basic building maintenance (light repairs, HVAC filter replacement)'',''Safe
    handling of cleaning chemicals (OSHA compliance)'',''Time management and schedule adherence'',''Attention to detail'',''Inventory management'',''Basic computer proficiency (work order systems)'']'
  hobbies: '[''Fishing in the Weeki Wachee River'',''Model kit building (airplanes, classic cars)'',''Competitive online first‑person shooter gaming'',''Reading practical DIY and self‑improvement books'',''Listening
    to classic rock and country music'']'
  career_goals: Jerry seeks steady advancement within the facilities management sector. Over the next few years he aims to obtain a Certified Professional Cleaner (CPC) credential and complete an introductory
    facilities management course at a community college. His long‑term ambition is to move into a supervisory role, such as shift lead or facilities supervisor, where he can apply his organizational strengths
    to optimize cleaning schedules and train new staff. Eventually, he hopes to leverage his experience and practical mindset to start a small, locally‑focused cleaning service that prioritizes reliability
    and high‑quality workmanship.
