  career_goals: John dreams of becoming a game designer who builds immersive, imaginative worlds or an author‑illustrator of fantasy books that capture his love for art and storytelling. He is also fascinated
    by space, hoping someday to explore the cosmos as an astronaut or work on astrophysics research, blending his curiosity for novel ideas with creative expression.
