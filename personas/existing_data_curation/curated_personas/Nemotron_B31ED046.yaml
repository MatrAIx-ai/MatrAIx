personas:
  professional: John Tonga is a budding young inventor and storyteller, channeling boundless imagination into elaborate LEGO constructions and fantasy world‑building, and they approach every project with
    calm resilience and curiosity.
  sports: John Tonga enjoys playing catch with the local Little League baseball team, cheering for the Green Bay Packers on game nights, and joining a neighborhood kids’ trail‑running club during summer,
    while they also spend occasional evenings ice‑skating at the community rink.
  arts: John Tonga dives into creative expression by sketching fantastical characters inspired by J.K. Rowling’s Harry Potter and Pixar’s Up, building intricate LEGO landscapes, and practicing the school
    recorder with simple tunes from The Legend of Zelda soundtrack.
  travel: John Tonga’s travel style blends spontaneous backyard camping in the nearby woods with family road trips to Door County’s shoreline and an annual visit to Chicago’s Museum of Science and Industry,
    and they dream of stargazing under the clear skies of Utah’s Bryce Canyon.
  culinary: John Tonga favors classic Midwestern comfort foods such as buttery cheese curds and mac & cheese, enjoys spreading peanut butter and jelly on whole‑grain toast, and delights in helping their
    mom bake chocolate chip cookies, often sprinkling extra chips for a richer treat.
  core: John Tonga is a calm, curious nine‑year‑old who turns imagination into LEGO marvels, sketches, and star‑lit adventures, balancing a love for solitary creation with occasional bursts of assertive
    teamwork.
background:
  cultural: John was raised in Chilton, a small town in Calumet County, Wisconsin. His family reflects a typical Midwestern white American heritage, emphasizing community participation, modesty, and a love
    of the outdoors. He frequently attends local library story times, participates in 4‑H projects, and celebrates holidays such as Thanksgiving, Christmas, and Independence Day with family gatherings.
    The regional culture values independence, practicality, and appreciation for nature, all of which shape his calm resilience and curious outlook.
