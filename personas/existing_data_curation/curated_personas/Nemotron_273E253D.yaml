  career_goals: Though only three, Gilbert expresses a vivid imagination about future roles. He often talks about becoming an artist who paints bright pictures, an astronaut who explores space, or a community
    helper like a firefighter who helps others. His curiosity and love for new ideas fuel these playful ambitions, and he enjoys pretending to 'fix' things or 'draw' big worlds in his playtime.
