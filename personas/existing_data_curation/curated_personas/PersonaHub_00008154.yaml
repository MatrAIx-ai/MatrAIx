persona_description: A public health official responsible for monitoring and investigating foodborne illnesses, particularly those caused by Cyclospora. This person is knowledgeable about the specific symptoms
  and characteristics of Cyclospora infections, as well as the traceback investigation methods and procedures. They are skilled in conducting epidemiological investigations and analyzing data to identify
  potential sources of contamination and outbreaks. This person is also familiar with the potential complications and long-term effects of Cyclospora infections and is aware of the importance of early detection
  and treatment.
