personas:
  professional: Shoua Leung, a 12‑year‑old budding robotics enthusiast, channels their love for routine and teamwork into building programmable bots with the school’s robotics club, often taking the lead
    in structuring project timelines while keeping a relaxed, flexible approach to deadlines.
  sports: Shoua Leung dashes between practices at the Bright Horizons Badminton Club and weekly matches with the Riverbank Tigers Youth Soccer Team, cheers on the Metro City Eagles during baseball season,
    and they treat fitness as a social ritual, blending structured drills with impromptu kick‑around games after school.
  arts: Shoua Leung devotes daily minutes to piano, drawing inspiration from virtuosos like Lang Lang and composers such as Yiruma, while they unwind with the whimsical storytelling of Studio Ghibli films
    and the collaborative adventures of Minecraft with classmates, reflecting a balanced blend of structured creativity and social play.
  travel: Shoua Leung enjoys short family road trips to nearby nature parks and city festivals, has already explored the interactive exhibits at the Regional Science Museum, and dreams of attending the
    cherry‑blossom celebrations in Kyoto next spring, balancing travel excitement with the practical limits of a school calendar and parental budget.
  culinary: Shoua Leung delights in following family recipes to bake moon‑shaped sesame pastries and buttery egg tarts, skillfully mixes glutinous rice flour with red bean paste during weekend baking sessions,
    but often leaves a flour‑dusty trail on the kitchen counter and forgets to wash the mixing bowls promptly.
  core: Shoua Leung, a 12‑year‑old who blends a love for routine with a social spark, thrives on structured robotics projects, impromptu soccer matches, and baking family treats, yet can be forgetful about
    chores and impulsively splurges on the latest video games.
background:
  cultural: Shoua comes from an East Asian family—her parents immigrated from Hong Kong and maintain bilingual households where Cantonese and Mandarin are spoken alongside English. The family emphasizes
    respect for elders, academic dedication, and communal harmony. Celebrations such as Lunar New Year, Mid‑Autumn Festival, and weekly family meals reinforce cultural traditions. Living in Irvine’s vibrant
    Asian community provides her with access to cultural schools, specialty markets, and community centers that support her heritage while blending with the multicultural environment of Southern California.
