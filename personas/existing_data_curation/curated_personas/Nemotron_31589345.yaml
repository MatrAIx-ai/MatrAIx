  hobbies: '[''Sketching people in cafés'', ''Street photography on bike rides'', ''Collecting and reading graphic novels'', ''Mixed‑media collage'', ''Basic 2‑D animation'', ''Creative writing (short stories,
    poetry)'', ''Exploring community murals and galleries'', ''Attending open‑mic poetry nights'', ''Volunteering at local library Storytime'', ''Listening to indie/alternative music while creating'']'
  career_goals: Inspired by her love of visual storytelling, Valerie aspires to combine art and technology in a career that allows her to shape immersive experiences. In the near term she hopes to enroll
    in a specialized arts magnet high school in the Research Triangle, where she can deepen her illustration and animation skills. Long‑term, she dreams of becoming a multimedia artist or creative director,
    producing graphic novels, interactive digital installations, or indie video games that invite audiences to view the world through fresh, unconventional lenses. She also envisions traveling to diverse
    cultural hubs, gathering inspiration, and eventually mentoring other young creators who share her spontaneous, curiosity‑driven spirit.
