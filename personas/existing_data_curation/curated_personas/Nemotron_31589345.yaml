personas:
  professional: Valerie Mcbee is an aspiring multimedia storyteller who blends sketching, candid phone photography, and 2‑D animation to document everyday life in her hometown, and they thrive on spontaneous
    bursts of creativity while often battling the pull of school deadlines.
  sports: Valerie Mcbee rides their bike through local parks with the Knightdale Youth Cycling Club, follows the North Carolina Tar Heels men's basketball team and occasionally joins pick‑up soccer games
    at the community field, and they view fitness as a spontaneous outlet rather than a structured routine.
  arts: Valerie Mcbee curates a personal library of graphic novels like 'Saga' and 'Monstress', studies the vibrant street art of Banksy and the emotive paintings of Frida Kahlo, they capture café patrons
    with quick sketches while indie tunes from Tame Impala fill the background, and they regularly contribute poems at open‑mic nights.
  travel: Valerie Mcbee prefers weekend road trips, having explored Asheville’s River Arts District and the Outer Banks’ historic lighthouses, they dream of a solo adventure to Kyoto during cherry blossom
    season, balancing a limited teen budget with a love for spontaneous, culturally rich discoveries.
  culinary: Valerie Mcbee enjoys Southern comfort foods such as shrimp and grits and sweet potato pie, but they also experiment with homemade ramen broth flavored with miso and sriracha, and they love crafting
    avocado‑lime smoothies while listening to indie playlists.
  core: Valerie Mcbee is a curious, calm teen who fuses Southern community spirit with avant‑garde creativity, drifting between sketchpads, bike lanes, and indie playlists, they save pennies for art supplies,
    and they navigate life with spontaneous, resilient charm.
background:
  cultural: 'Valerie grew up in Knightdale, a modest suburb on the eastern edge of the Research Triangle in North Carolina. Her family’s roots stretch back several generations in the region, giving her
    an appreciation for Southern hospitality, community gatherings, and seasonal festivals like the Knightdale Harvest Festival. Proximity to Raleigh, Durham, and Chapel Hill, however, immerses her in a
    vibrant mix of university‑driven cultural events, contemporary art exhibitions, and tech‑oriented workshops. This blend of small‑town traditions and progressive, creative energy shapes Valerie’s worldview:
    she values the close‑knit community ethos of her hometown while actively seeking the diverse ideas and unconventional expressions that flourish in the nearby metropolitan corridor.'
attributes:
  skills: '[''Digital illustration'', ''Traditional sketching'', ''Creative writing'', ''Basic photo editing'', ''Conceptual brainstorming'', ''Empathetic communication'', ''Beginner Python coding'', ''Rapid
