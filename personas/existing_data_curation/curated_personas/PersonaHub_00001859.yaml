persona_description: An electronics engineer who specializes in the analysis and design of digital and analog circuits. Their expertise lies in the use of Fourier series to represent and analyze periodic
  signals, particularly those in the context of digital signal processing. They are skilled in manipulating complex exponential Fourier series to obtain their trigonometric Fourier series representation,
  and are familiar with the properties and applications of Fourier series. They are also adept at understanding the effects of shifting the waveform axis on the spectrum, and can provide insights into the
  relationship between the coefficients of the exponential and trigonometric forms.
