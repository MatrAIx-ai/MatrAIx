personas:
  professional: Miriam Goddard is a seasoned hazardous‑materials removal specialist who leverages their methodical, curiosity‑driven approach to enforce OSHA and EPA standards, mentor crews, and work toward
    becoming a CSP‑certified HAZWOPER trainer and eventually leading a boutique safety consulting firm.
  sports: Miriam Goddard keeps fit by jogging along the Brooklyn waterfront with the East River Runners club during spring, joining a co‑ed recreational soccer league that competes in the New York City
    Adult Soccer Association, and staying loyal to the New York Knicks and New York Mets as their preferred weekend sports viewing.
  arts: Miriam Goddard channels curiosity into street photography, capturing the bold murals of the Bushwick Collective and gritty industrial vistas of Brooklyn while listening to haunting regional folk
    ballads and contemporary jazz by Kamasi Washington, which together shape their creative evenings.
  travel: Miriam Goddard prefers meticulously planned short trips that blend cultural depth and environmental mindfulness, having explored the historic canals of Venice, sampled artisanal cheese markets
    in Asturias, hiked the Adirondack High Peaks solo, and now eyeing a sustainable eco‑tour of the Galápagos Islands.
  culinary: Miriam Goddard, an adept home chef, routinely prepares slow‑cooked carnitas infused with orange zest, smoked chipotle, and dried ancho, experiments with mole sauces using toasted pumpkin seeds
    and chocolate, and frequently hosts tasting evenings pairing these dishes with locally sourced corn tortillas and handcrafted mezcal while playing a curated playlist of regional folk tunes.
  core: Miriam Goddard is a methodical, curiosity‑driven safety specialist who balances a disciplined work ethic with a secret love for late‑night model kit marathons, a tendency to schedule every minute
    of their day, and an occasional reluctance to answer phone calls during focused photography sessions.
background:
  cultural: Miriam’s cultural roots are Mexican; her parents emigrated from the state of Michoacán before she was born, and Spanish was spoken at home alongside English. She grew up celebrating Día de los
    Muertos and other Mexican holidays, preserving family recipes and folklore. Living in Brooklyn’s diverse Kings County, she blends these traditions with the rhythm of city life—frequenting local taquerías,
    participating in neighborhood festivals, and maintaining ties with the Mexican diaspora community. While she respects her heritage’s emphasis on family and hard work, Miriam’s pragmatic outlook leads
    her to adapt customs to her urban lifestyle, such as hosting modest family gatherings in her apartment and integrating Mexican culinary techniques into her daily meals.
attributes:
  skills: '[''Hazardous waste identification'', ''OSHA/Hazwoper compliance'', ''PPE selection and usage'', ''Negative‑pressure containment operation'', ''Air monitoring and sampling'', ''Decontamination
    and spill response'', ''Site risk assessment'', ''Safety documentation and reporting'', ''Training and mentorship'', ''Logistical planning for removal projects'', ''Problem‑solving under pressure'',
    ''Regulatory research'']'
  hobbies: '[''Model kit building'', ''Street photography'', ''Balcony gardening'', ''Mexican cooking'', ''Small‑group community clean‑ups'', ''Sustainability workshops'']'
  career_goals: Miriam aims to advance from field operative to a supervisory and instructional role within the environmental safety sector. In the next five years she plans to obtain her Certified Safety
    Professional (CSP) credential and become a lead HAZWOPER trainer, overseeing certification programs for new crews. Long‑term, she envisions founding a boutique consulting firm that advises small‑scale
    construction firms in Brooklyn on safe hazardous‑material handling and sustainability practices, allowing her to combine her practical expertise with her competitive drive to shape industry standards.
