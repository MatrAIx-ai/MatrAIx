personas:
  professional: Elizabeth Kennedy, a seasoned sales manager turned mentor, leverages her strategic planning acumen, Salesforce expertise, and deep knowledge of the luxury art market to design boutique training
    programs that blend ethical selling with emerging digital tools.
  sports: Elizabeth Kennedy, a member of the San Diego Country Club’s senior golf league, enjoys weekend rounds on the 9‑hole course, follows the Los Angeles Lakers and San Diego Padres passionately, and
    practices gentle yoga three times a week to stay limber.
  arts: Elizabeth Kennedy, an avid collector of contemporary works, regularly attends exhibitions featuring artists like Yayoi Kusama, Jeff Koons, Tadao Ando, and Georgia O’Keeffe, and captures the interplay
    of light and form in architectural photography.
  travel: Elizabeth Kennedy, who curates cultural pilgrimages, has explored the Uffizi in Florence, the Gion district in Kyoto, and the Pueblo art scene in Santa Fe, and now dreams of strolling through
    the Marrakech medina and the galleries of Paris’s Le Marais.
  culinary: Elizabeth Kennedy, a wine enthusiast with a modest culinary flair, enjoys pairing Pinot Noir with mushroom risotto, savoring fresh sashimi with wasabi, and sprinkling native rosemary and sage
    over roasted cauliflower in her garden‑inspired kitchen.
  core: Elizabeth Kennedy, a curious yet reserved 62‑year‑old, blends disciplined sales expertise with a love for art, travel, and mindfulness, all while indulging in occasional impulsive print purchases
    and a penchant for perfecting her garden’s native flora.
background:
  cultural: Elizabeth grew up in a mid‑western, middle‑class white family during the post‑war era, absorbing traditional American values of hard work and community service. Relocating to Los Angeles in
    her 30s, she embraced the West Coast's vibrant arts scene and progressive business culture. Her marriage and long‑term residence in Beverly Hills have immersed her in a multicultural, affluent environment
    where philanthropy and cultural patronage are highly valued. She identifies with a blend of classic American upbringing and the sophisticated, art‑focused lifestyle of Southern California, which informs
    both her professional approach and personal passions.
