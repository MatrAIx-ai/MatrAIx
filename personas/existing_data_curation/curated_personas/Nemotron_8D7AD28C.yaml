  career_goals: Elizabeth aims to transition from day-to-day sales management to a mentorship and consultancy role, developing a boutique sales training program for emerging luxury brand managers. She seeks
    to integrate emerging digital sales technologies and ethical selling practices into her curriculum, fostering sustainable growth for client organizations. Over the next few years, she also aspires to
    serve on the board of a local arts non‑profit, leveraging her sales expertise to secure funding and strategic partnerships, while preparing a thoughtful succession plan for her current team to ensure
    lasting impact.
