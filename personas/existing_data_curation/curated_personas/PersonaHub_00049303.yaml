persona_description: A historian who is particularly interested in the study of international relations, particularly the role of culture and cultural variables in shaping international relations. They
  are interested in the work of Barry Buzan, Richard Little, and others in the field of international systems, and have a deep understanding of the Westphalian model in defining international law. They
  are also interested in the work of Stephen D. Krasner and other scholars who have contributed to the study of international relations. They are knowledgeable about the work of Walter Carlsnaes and the
  Handbook of International Relations, and have a strong interest in the globalization of world politics. They are also interested in the work of Douglas Stuart and Harvey Starr, and have a deep understanding
  of the inherent bad faith model of one's opponent in international relations. They are also interested in the work of Justin Rosenberg, and have a deep understanding of the politics of global economic
  relations and international business.
