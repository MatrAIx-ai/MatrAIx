  career_goals: In retirement, Robert aims to document the local history of Norristown, create a digital archive of photographs and oral histories, and publish a memoir that weaves his family's Greek roots
    with his American experience. He seeks to mentor youth interested in history, lead workshops at the public library, and support preservation projects through the Norristown Historical Society. He also
    plans to enroll in occasional courses on digital archiving and advanced genealogy, and to serve on the board of a cultural organization that promotes Greek heritage in the community.
