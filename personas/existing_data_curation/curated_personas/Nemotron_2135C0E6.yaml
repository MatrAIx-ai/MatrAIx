  hobbies: '[''Gardening'', ''Quilting'', ''Home cooking'', ''Reading classic mystery novels'', ''Crossword puzzles'', ''Volunteering at church food pantry'', ''Attending community fairs'']'
  career_goals: Kay aims to advance within the hospitality industry by first becoming a shift supervisor and then a restaurant manager at her current establishment. She hopes to leverage her practical approach
    and organizational strengths to improve operational efficiency and staff performance. In the longer term, she envisions opening a small family‑run diner that emphasizes reliable service and classic
    Southern comfort food, offering a stable, routine-oriented environment for her community. To support these ambitions, she plans to complete a bachelor's degree in business administration through evening
    classes and obtain a ServSafe manager certification.
