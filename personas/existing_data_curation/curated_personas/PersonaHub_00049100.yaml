persona_description: A WHO technical lead for the coronavirus response, Maria Van Kerkhove, who has been working tirelessly to raise the alarm about the pandemic and provide guidance and support to countries
  around the world. She has extensive experience dealing with previous infectious outbreaks and has led successful responses in countries like South Korea and Japan. Van Kerkhove's work has helped to keep
  the pandemic under control and has led to a better understanding of the virus and its transmission. She has been recognized for her efforts and has been named one of the most influential people in global
  health by Time magazine.
