    Mexican culinary techniques'', ''Creative writing and memoir composition'']'
  hobbies: '[''Reading Mexican literature and poetry'', ''Gardening (chiles, herbs, native desert plants)'', ''Traditional Mexican cooking'', ''Attending and participating in cultural festivals'', ''Walking/hiking
    local trails and photographing nature'', ''Volunteering at the community library'', ''Crossword puzzles and word games'', ''Documentary film watching (history, nature)'', ''Learning basic digital archiving
    tools'']'
  career_goals: Esteban hopes to finish a memoir that weaves his personal memories with the broader story of Mexican immigrants in the American West, and to organize an oral-history project that records
    the stories of older Mexican-American residents in Grand Junction. He aims to continue mentoring high-school and community-college students interested in cultural studies, sharing his research methods
    and bilingual skills. Maintaining his health and mental sharpness is a top priority, so he plans to stay active through regular walks, balanced nutrition, and stress-relief practices, while also learning
    emerging digital tools that can enhance his preservation work.
