  career_goals: Looking ahead, Austin aims to move into a supervisory role, such as Night Manager or Head Concierge, where he can shape service standards and mentor a larger team. He plans to obtain a Certified
    Hospitality Supervisor credential and eventually pursue a regional manager position within a hotel chain, leveraging his deep knowledge of Marietta’s tourism assets. His competitive drive pushes him
    to improve guest satisfaction scores and implement efficiency upgrades in baggage handling. In the longer term, Austin envisions launching a boutique concierge and local tour service that showcases
    the Ohio River’s heritage, combining his expertise with his passion for community engagement.
