  career_goals: Claudia aims to secure a part‑time remote administrative position that offers stability while allowing flexibility for personal projects. She plans to obtain a bookkeeping certification
    to increase her employability and eventually transition into a role coordinating community‑center activities in Idabel. Simultaneously, she wishes to launch a small home‑based culinary venture offering
    healthy Southern comfort foods, leveraging her cooking skills and love for local ingredients. Long‑term, she hopes to blend paid work with volunteer counseling, using her empathy and lived experience
    to support others facing stress and life transitions.
