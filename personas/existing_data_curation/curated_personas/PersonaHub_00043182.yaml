persona_description: A pediatric urologist who specializes in the diagnosis and treatment of urinary tract infections in children. They are experienced in the use of imaging studies such as fluoroscopic
  voiding cystourethrography and nuclear cystography to evaluate the upper urinary tract and diagnose VUR. They are also knowledgeable in the grading of VUR and the management of children with VUR, including
  the use of prophylactic antibiotics, periodic radiologic evaluation, and the possibility of surgical intervention in select cases.
