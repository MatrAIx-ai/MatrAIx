persona_description: A professional who is responsible for creating and presenting tables in their work. This person is skilled in creating tables that are clear, easy to understand, and visually appealing.
  They are familiar with the APA style guidelines for table formatting and have experience creating tables for reports, presentations, and publications. This person is detail-oriented and ensures that the
  table is well-organized, with clear headings, labels, and formatting. They are also aware of the importance of keeping tables lean and efficient, without cluttering them with unnecessary information.
