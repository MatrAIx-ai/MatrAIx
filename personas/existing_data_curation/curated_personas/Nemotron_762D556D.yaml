  hobbies: '[''Salsa dancing'', ''Cooking traditional Mexican cuisine'', ''Hiking in the Sonoran Desert'', ''Volunteering at community center (English‑Spanish workshops)'', ''Attending art exhibitions and
    theater performances'', ''Reading historical fiction'', ''Practicing yoga'', ''Gardening'']'
  career_goals: Yanira aims to advance to a senior management analyst position and eventually become a director of strategic initiatives, shaping organization‑wide data‑driven decision making. Over the
    next two years she plans to earn a PMP certification, begin a part‑time MBA program to deepen her business acumen, and obtain an advanced analytics certification. She also wants to create a mentorship
    program for emerging Latina professionals in the Phoenix area and develop a structured work‑life balance framework to reduce stress while supporting her family.
