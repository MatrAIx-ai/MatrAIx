personas:
  professional: Mirta Exposito, a retired bilingual educator known for methodical curriculum design, now volunteers as a mentor for novice teachers while spearheading a community‑garden project that blends
    nutrition education with heritage herb cultivation, and they plan to expand their impact through digital storytelling workshops for adult learners.
  sports: Mirta Exposito enjoys low‑impact cardio through weekly hikes on the Wasatch trails, follows the Utah Jazz for a touch of excitement, participates in a senior walking club that meets at the local
    park, and favours the occasional friendly game of shuffleboard at the community center.
  arts: Mirta Exposito immerses themselves in historical fiction by Hilary Mantel and poetry by Pablo Neruda, leads a small bilingual book club where they often knit scarves while discussing Isabel Allende’s
    narratives, and they revere the paintings of Frida Kahlo for their vivid storytelling of cultural roots.
  travel: Mirta Exposito dreams of traveling to the historic Alhambra in Granada, the vibrant markets of Oaxaca, and the serene trails of Banff National Park, but they currently limit trips to weekend getaways
    in nearby Utah’s red‑rock canyons, balancing their love of exploration with a modest retirement budget.
  culinary: Mirta Exposito delights in preparing tamales and pozole using heritage corn masa, smoky ancho chilies, and fresh epazote from their garden, while they experiment with heirloom tomatoes in gazpacho,
    and they enjoy moderating their spice tolerance by pairing dishes with homemade agua fresca infused with hibiscus.
  core: Mirta Exposito blends disciplined project management with a quiet, curiosity‑driven love of heritage foods, literature, and community service, often forgetting to water their plants while remembering
    every grant deadline.
background:
  cultural: Mirta was raised in a Mexican‑American household that maintained strong ties to the traditions of her parents' home region. She grew up bilingual, speaking Spanish at home and English at school,
    and celebrated holidays such as Día de los Muertos and Las Posadas with family gatherings. After moving to Salt Lake City, she became active in the city's Latino community, attending cultural festivals,
    supporting local Hispanic advocacy groups, and sharing her culinary heritage with neighbors. Her cultural identity blends the values of family solidarity, respect for tradition, and a commitment to
    community service.
