  hobbies: '[''Gardening'', ''Reading historical fiction and poetry'', ''Small book club participation'', ''Knitting'', ''Hiking in the Wasatch Mountains'', ''Cooking traditional Latino dishes'', ''Volunteer
    language tutoring'']'
  career_goals: Although retired from formal teaching, Mirta aims to volunteer as a mentor for novice teachers, lead bilingual literacy workshops for adults, and serve on the board of a local Latino cultural
    organization. She aspires to develop a community‑garden project that integrates educational components on nutrition and heritage crops, and to complete a series of online courses in digital storytelling
    to preserve her family's oral histories.
