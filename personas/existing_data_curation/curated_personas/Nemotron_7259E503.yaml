  hobbies: '[''Digital Comic Creation'', ''Dungeons & Dragons'', ''Soccer'', ''Hiking in Pilot Mountain State Park'', ''LEGO Building'', ''Photography'', ''Science Fiction Reading'', ''Junior Coding Club
    (Scratch)'', ''Band (Drums)'']'
  career_goals: Building on his blend of artistic vision and structured thinking, George aspires to become a multimedia artist and designer, ultimately crafting immersive experiences for video games or
    virtual reality. He aims to attend a rigorous STEM‑arts magnet high school, win regional art competitions, and secure a scholarship to study animation, game design, or architecture at a top university.
    He also hopes to lead a youth creativity studio in his community, mentoring other kids in digital storytelling and collaborative projects. His long‑term ambition is to combine his love of abstract concepts
    and social collaboration to create interactive art installations that engage audiences and inspire curiosity.
