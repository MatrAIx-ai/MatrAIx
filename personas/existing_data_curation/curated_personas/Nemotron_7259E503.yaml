personas:
  professional: George Reddy, a 12‑year‑old digital storyteller, blends imaginative comic‑making with disciplined Scratch programming, designing quests for his D&D group while coordinating school coding
    workshops, showing how his organized creativity fuels early tech‑savvy leadership.
  sports: George Reddy scores goals for the Pilot Mountain Pioneers youth soccer team, follows Charlotte FC for inspiration, and spends weekends hiking the trails of Pilot Mountain State Park to stay fit,
    balancing competitive play with a love for the outdoors.
  arts: George Reddy channels a love for bluegrass jams at family barbecues into drumming for the school band while sketching digital comics inspired by Neil Gaiman, animating short clips with a style reminiscent
    of Hayao Miyazaki, and building intricate LEGO models that reflect a blend of Appalachian folk art and sci‑fi aesthetics.
  travel: George Reddy prefers road trips with his family, having explored the rugged beauty of Shenandoah National Park and the historic streets of Washington, D.C., and dreams of attending the Asheville
    Fall Arts & Crafts Festival and New York’s Comic‑Con, planning each adventure on a simple spreadsheet that satisfies his organized nature while fitting a modest allowance budget.
  culinary: George Reddy enjoys the smoky tang of backyard barbecue pulled pork, the crisp sweetness of apple‑cinnamon pie from the local Apple Festival, and the comfort of cheesy homemade mac & cheese,
    often helping his parents whip up cornbread and experimenting with sushi rolls after watching cooking videos, displaying a budding intermediate cooking skill.
  core: George Reddy is a 12‑year‑old imagination‑driven tech artist who balances disciplined project planning with a love for soccer, drumming, and spontaneous late‑night comic sketches, occasionally neglecting
    sleep for creative bursts.
background:
  cultural: George comes from a white, Southern‑Appalachian family that has lived in the Pilot Mountain area of North Carolina for several generations. The community values close‑knit family ties, hospitality,
    and a deep connection to the surrounding mountains and forests. Local traditions such as bluegrass music, backyard barbecues, and church gatherings shape his social life, and seasonal events like the
    annual Apple Festival reinforce a sense of place. This environment nurtures his appreciation for the outdoors, collaborative community projects, and the blend of modest rural roots with an openness
    to new ideas and technologies.
attributes:
  skills: '[''Creative Writing'', ''Digital Illustration'', ''Scratch Programming'', ''Student Council Leadership'', ''Event Planning'', ''Soccer Team Collaboration'', ''Public Speaking'', ''LEGO Model
