  career_goals: Although retired from formal employment, Carrie aims to deepen her impact in her community by leading a neighborhood garden program, mentoring younger volunteers in event planning and craft
    skills, and completing a comprehensive family genealogy project that she can share at local heritage events. She also hopes to travel to North Carolina State Parks to document flora and fauna through
    photography, and to organize a small annual fundraiser for the local church's outreach programs.
