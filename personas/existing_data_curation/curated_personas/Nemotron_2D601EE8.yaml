personas:
  professional: Jewell Prevost, a seasoned journeyman electrician in the Niagara region, combines deep mastery of the National Electrical Code and OSHA safety with a methodical project‑planning style and
    a competitive drive that makes them a natural leader of crews, an effective trainer of apprentices, and a persuasive communicator with clients on complex industrial installations.
  sports: Jewell Prevost competes weekly in a local bowling league, cheering on the Buffalo Bills and Buffalo Sabres, joins seasonal hikes along the Niagara River with a community climbing club, and follows
    a structured fitness routine that blends weekend treks with occasional strength training at the gym, reflecting their outgoing yet competitively disciplined nature.
  arts: Jewell Prevost channels creative energy into woodworking projects inspired by the craftsmanship of William Morris, enjoys listening to folk legends like Bob Dylan and The Avett Brothers, and attends
    monthly performances at the North Tonawanda Community Theatre, where they find the blend of tactile art and live storytelling essential to their balanced life.
  travel: Jewell Prevost prefers meticulously planned road trips, having explored the Adirondack Mountains and Niagara Falls extensively, while also dreaming of a cultural immersion tour of Kyoto, Japan,
    balancing a love for local nature with occasional overseas culinary adventures within a moderate budget, and they always craft detailed itineraries ahead of time.
  culinary: Jewell Prevost excels at structured meal‑prep, regularly cooking batch‑style grilled salmon with a lemon‑dill glaze, roasted sweet potatoes and broccoli, and a quinoa salad tossed with feta,
    olive oil, and fresh basil, reflecting an organized palate that favors nutrient‑dense, easily portioned dishes, and they meticulously label each container for the week ahead.
  core: Jewell Prevost is a detail‑driven electrician who mixes competitive ambition with a love for community bowling, yet they can’t resist a weekly power‑tool splurge and the occasional missed physiotherapy
    appointment.
background:
  cultural: Jewell grew up in a working‑class, White American family in upstate New York, where the values of hard work, reliability, and community involvement were deeply ingrained. The industrial heritage
    of the Niagara County area, with its strong labor‑union presence and emphasis on skilled trades, shaped her pragmatic outlook and pride in the electrician profession. Family gatherings often featured
    traditional American dishes and local festivals, reinforcing a sense of regional identity. Her cultural background combines the Mid‑Atlantic work ethic with the close‑knit, neighborly spirit of the
    North Tonawanda community, fostering a balance between self‑reliance and sociability.
attributes:
  skills: '[''Electrical system installation'', ''Industrial wiring'', ''National Electrical Code (NEC) compliance'', ''Blueprint reading and schematics interpretation'', ''Troubleshooting and diagnostics'',
    ''Project planning and scheduling'', ''Team leadership and crew supervision'', ''Safety training and OSHA compliance'', ''Technical mentorship and apprentice training'', ''Customer service and client
    communication'', ''Renewable energy system installation'', ''EV charging station setup'']'
  hobbies: '[''Bowling league'', ''Community volunteer work (electrical safety workshops)'', ''DIY home improvement and woodworking projects'', ''Hiking and nature walks along the Niagara River'', ''Fishing
    trips'', ''Reading technical journals and trade magazines'', ''Cooking and meal preparation'', ''Mentoring apprentices in the trade'']'
  career_goals: Jewell aims to leverage her extensive hands‑on experience into a senior supervisory role such as Master Electrician or Foreman within the next five years, overseeing large‑scale industrial
    projects in the Niagara region. She plans to obtain her Master Electrician license and earn additional certifications in renewable‑energy technologies to diversify her expertise. Long‑term, she aspires
    to start her own contracting business that emphasizes rigorous safety standards, reliable project delivery, and mentorship of young tradespeople. Her competitive drive pushes her to be recognized as
    a leading expert in electrical installations for manufacturing facilities and to contribute to local trade‑union training programs.
