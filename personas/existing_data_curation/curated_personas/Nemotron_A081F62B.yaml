personas:
  professional: Inez Johnson is a budding art historian and cultural researcher who combines digital illustration skills with rigorous archival research, using their calm, curious nature and spontaneous
    flexibility to design immersive pop‑up exhibitions and community workshops that amplify the voices of under‑represented creators.
  sports: Inez Johnson enjoys low‑impact fitness, favoring daily yoga and occasional pickup soccer with a local Ann Arbor women's league, while cheering on the University of Michigan Wolverines football
    and the Detroit Tigers baseball teams, and they occasionally volunteer as a timekeeper for community running events.
  arts: Inez Johnson immerses themselves in visual and literary arts, drawing inspiration from contemporary creators such as Kehinde Wiley, Yinka Shonibare, and musician Kamasi Washington, while participating
    in intimate open‑mic poetry nights and curating small campus displays that blend watercolor, digital illustration, and archival research.
  travel: Inez Johnson prefers thoughtfully curated, culturally rich trips, having explored New York's museum corridor, Chicago's art districts, and a weekend pilgrimage to New Orleans for its jazz heritage,
    while dreaming of a future study tour to Accra and a serene retreat in Kyoto, balancing spontaneous day‑trips with modest student‑budget travel planning.
  culinary: Inez Johnson delights in preparing simple yet vibrant dishes such as avocado toast with za’atar, miso‑ramen bowls, and homemade mango‑ginger smoothies, enjoys sourcing fresh produce for their
    balcony garden, and frequents local coffee shops for lavender lattes, though they occasionally forget to defrost frozen meals and rely on take‑out pizza as a quick fix.
  core: Inez Johnson navigates life with a serene curiosity, blending artistic ambition, spontaneous spontaneity, and a gentle dedication to community while occasionally battling disorganization and a sweet‑tooth
    habit.
background:
  cultural: Inez is a second-generation African American whose parents emigrated from southwestern Nigeria, specifically the Yoruba cultural region. Her given middle name, Adefunke, reflects a family tradition
    of Yoruba naming that honors joy and gratitude. Growing up in Ann Arbor, she has been immersed in both Midwestern American culture and vibrant West African customs. Family gatherings often feature traditional
    Nigerian dishes such as jollof rice and pounded yam, Yoruba music, and storytelling, while holidays like Juneteenth and Black History Month are celebrated with community events. She actively participates
    in the University of Michigan's African Student Association and the local Black Student Union, which have reinforced her bicultural identity. This blend of African heritage and African-American experiences
    informs her artistic sensibilities and her commitment to representing under-represented voices.
attributes:
  skills: '[''digital illustration'', ''mixed-media art'', ''cultural research'', ''critical art analysis'', ''academic writing'', ''basic video editing'', ''social media content creation'', ''event facilitation'',
    ''conflict mediation'', ''empathy and active listening'', ''mindfulness practice'']'
  hobbies: '[''visiting art galleries and museums'', ''sketching and watercolor painting'', ''digital illustration'', ''reading African diaspora literature'', ''attending intimate live-music and poetry
    events'', ''yoga and meditation'', ''balcony gardening'', ''collecting vintage postcards'', ''volunteering at community cultural festivals'', ''exploring local coffee shops'', ''learning Yoruba language'']'
  career_goals: Inez aims to translate her artistic talent and cultural research into a career that bridges creative expression with community empowerment. In the short term, she plans to complete a bachelor's
    degree in Art History and African American Studies, while curating small exhibitions of emerging Black and African artists on campus. She hopes to secure an internship at a museum or cultural nonprofit
    where she can assist with exhibition design, educational programming, and outreach. Long-term, Inez envisions herself working as a curator or arts program coordinator at a major institution, or launching
    her own community-focused art space that provides mentorship and platforms for under-represented creators. She is also interested in developing a digital archive that documents contemporary African
    diaspora art and making it accessible to scholars and the public.
