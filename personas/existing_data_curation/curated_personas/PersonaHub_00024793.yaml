persona_description: A highly motivated and dedicated individual who has always had a passion for engineering and its applications. They are a recent graduate of the Bachelor of Engineering program at the
  University of Auckland and have since completed a Masters and PhD in Aerospace Engineering from MIT. Their research projects have focused on developing computer models of how astronauts move in zero gravity
  and have led them to meet astronauts and fly on NASA's zero-gravity aircraft. Despite not being chosen for NASA astronaut selection, their goal to become an astronaut has led them to an engineering and
  teaching career that they love. They have a unique perspective on the importance of engineering in addressing global challenges such as climate change, poverty, and health, and have shared this message
  through their experiences and research.
