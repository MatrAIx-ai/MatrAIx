personas:
  professional: Sandra Brunson, a retired home‑management guru, uses her lifelong cooking, budgeting, and community‑event coordination skills to mentor younger volunteers at the senior center, blending
    practical thrift with warm Southern hospitality.
  sports: Sandra Brunson enjoys leisurely walks along the Ozark foothills, participates in the senior center’s weekly shuffleboard league, and passionately follows the Arkansas Razorbacks football team,
    cheering from her living room while wrapped in a hand‑knit scarf.
  arts: Sandra Brunson finds artistic fulfillment humming in the church choir, knitting intricate patterns while listening to gospel legends like the Gaither Vocal Band, and losing herself in historical
    fiction by Philippa Gregory and the local Arkansas history exhibits at the Little Rock Museum.
  travel: Sandra Brunson prefers low‑key, budget‑friendly road trips, often revisiting cherished Southern spots such as Hot Springs, Arkansas, and the historic streets of Savannah, Georgia, while dreaming
    of a quiet pilgrimage to the Blue Ridge Mountains.
  culinary: Sandra Brunson delights in preparing Southern comfort meals like buttery cornbread, fried catfish with hush‑puppies, and simmered collard greens, skillfully canning peach preserves and dill
    pickles, and never misses adding a pinch of fresh thyme from her garden to every stew.
  core: Sandra Brunson, the 79‑year‑old garden‑loving choir member, balances frugal thrift with a heart full of worry, clings to coupon collections, and occasionally forgets to refill prescriptions until
    a friendly reminder.
background:
  cultural: Sandra grew up in a small farming community in Arkansas during the mid-20th century, shaped by Southern hospitality, a strong Methodist church presence, and a close-knit family culture. Her
    heritage traces back to English and Scots-Irish settlers, reflected in family traditions of home-cooked meals, seasonal celebrations, and storytelling. The values of self-reliance, thrift, and community
    support learned in her childhood continue to influence her daily life and interactions.
attributes:
  skills: '[''Traditional Southern cooking'',''Food preservation'',''Household budgeting'',''Vegetable gardening'',''Community event coordination'',''Knitting and crochet instruction'',''Basic first-aid'',''Genealogy
