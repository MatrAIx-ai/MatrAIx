  hobbies: '[''Gardening'',''Knitting'',''Baking and food preservation'',''Reading historical fiction'',''Church choir participation'',''Birdwatching'',''Walking in nature'',''Genealogy research'',''Volunteering
    at senior center'']'
  career_goals: Although no longer in the formal workforce, Sandra aims to stay active and useful in her community. She hopes to mentor younger volunteers at the senior center, document and share her family's
    recipes and stories in a small memoir, and continue supporting her grandchildren's education through tutoring and occasional childcare. Maintaining her health and independence is a top priority, so
    she sets modest fitness goals like walking five miles a week and practices relaxation techniques to manage her worry.
