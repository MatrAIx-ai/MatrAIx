  hobbies: '["Visiting art galleries and museums", "Acrylic painting", "Digital photography", "Playing volleyball", "Attending live music concerts", "Listening to podcasts (science, philosophy)", "Volunteering
    at community center", "Hiking local trails", "Salsa dancing", "Exploring international cooking"]'
  career_goals: Julia aims to pursue a bachelor's degree in communications, visual arts, or marketing, with the long‑term goal of becoming a creative director or brand strategist for a cultural institution.
    She hopes to leverage her event‑planning experience to launch her own boutique agency that designs immersive art‑focused community events. Competitive and ambitious, she seeks leadership roles that
    allow her to shape innovative campaigns, develop collaborative teams, and bring unconventional ideas to mainstream audiences while maintaining organizational excellence.
