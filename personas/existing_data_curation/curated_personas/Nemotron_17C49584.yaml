personas:
  professional: Julia Gagnon, a 21‑year‑old communications student with a flair for visual storytelling, blends her strong interpersonal skills, meticulous event coordination experience, and a healthy dose
    of skeptical ambition to design immersive art‑focused community campaigns that push conventional brands into fresh, socially engaged territory.
  sports: Julia Gagnon, who competes weekly with the Brookfield Co‑ed Volleyball Club, complements her on‑court competition with early‑morning hill runs and avidly follows the Boston Celtics and Boston
    Bruins, channeling her competitive drive into both her sport and her fan experience.
  arts: Julia Gagnon fuels her creative soul by frequenting local galleries, drawing inspiration from Monet’s pastel landscapes and Yayoi Kusama’s bold color bursts for her acrylic paintings, while her
    digital photography echoes Vivian Maier’s candid street moments and her concert outings regularly feature folk‑indie artists like Sufjan Stevens, Phoebe Bridgers, and The Staves.
  travel: Julia Gagnon prefers low‑key backpacking with flexible itineraries, using budget platforms like Couchsurfing to explore art‑rich cities such as Portland’s indie music scene, Berlin’s vibrant street
    murals, and Florence’s Renaissance museums, all while keeping travel costs in check by off‑season booking and a modest travel fund.
  culinary: Julia Gagnon experiments in a modest kitchen, mastering Thai green curry with lemongrass, coconut milk, and kaffir lime leaves, Italian squid ink risotto seasoned with fresh parsley, and Japanese
    miso ramen topped with soft‑boiled eggs, while savoring farm‑to‑table dishes that highlight seasonal vegetables and aromatic herbs like basil and cilantro.
  core: Julia Gagnon blends a competitive, detail‑oriented mindset with a boundless curiosity for art and culture, often juggling event planning, varsity‑level volleyball, and spontaneous culinary experiments,
    yet she can’t resist last‑minute concert tickets that occasionally upset her lean budget.
background:
  cultural: Julia grew up in Greenbrier, Tennessee, a close‑knit community in Davidson County steeped in Southern Appalachian traditions. Her family emphasizes hospitality, self‑reliance, and a strong sense
    of community, with regular involvement in church gatherings and local festivals that celebrate regional music and folklore. While rooted in these Southern values, she is also exposed to broader cultural
    influences through school arts programs, digital media, and her own curiosity about new ideas, giving her a balanced perspective that blends local heritage with contemporary artistic interests.
attributes:
  skills: '["Communication", "Event planning", "Graphic design (Canva/Adobe Spark)", "Digital photography", "Public speaking", "Team leadership", "Social media management", "Time management", "Research",
