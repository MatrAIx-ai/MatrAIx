persona_description: A teacher who specializes in teaching reading and writing skills to struggling readers, particularly those from economically disadvantaged backgrounds. She has conducted studies on
  the impact of closed-captioning on reading skills and has successfully implemented the SLS project in India and Gujarat. She has also conducted a year-long study on the impact of SLS on children's TV
  and has found that it contributes significantly to reading skills.
