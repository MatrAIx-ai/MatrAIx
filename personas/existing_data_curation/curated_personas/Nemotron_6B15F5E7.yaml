personas:
  professional: Nathan Freeman is an aspiring automotive technician whose hands‑on skill with oil changes, tire rotations, and minor engine troubleshooting, combined with a calm mediating nature and love
    for step‑by‑step model building, translates into a methodical yet adaptable approach to workshop tasks, and they often volunteer to coordinate group projects at community events.
  sports: Nathan Freeman shoots hoops at the Wentzville rec center, follows the St. Louis Cardinals for baseball, the St. Louis Blues for hockey, and occasionally joins the St. Charles Cyclones recreational
    basketball league, and they balance casual pickup games with a disciplined routine that reflects their love of community sport.
  arts: Nathan Freeman streams classic rock legends like Led Zeppelin, country icons such as Johnny Cash, and modern pop stars like Ariana Grande while building model airplanes, a blend that fuels their
    creativity and gives them a soundtrack for both study sessions and weekend garage projects, and they find inspiration in the musical storytelling of these artists.
  travel: Nathan Freeman prefers road‑trip adventures that mix a quick stop at the Iowa State Fair with a weekend camping at the Ozark Mountains, planning trips on a loose spreadsheet and budgeting carefully,
    and they dream of finally driving to Detroit’s Motor City museum to see classic car exhibits.
  culinary: Nathan Freeman favors hearty Midwestern fare, regularly whipping up burgers with smoked cheddar, St. Louis‑style pizza topped with pork sausage, and chili cheese fries, while their cooking skill
    stays at the confident home‑cook level, and they often experiment with BBQ rubs and hot sauce in pursuit of the perfect flavor punch.
  core: Nathan Freeman is a practical, community‑oriented teen who balances a love for cars, video games, and classic tunes with a messy workspace, budget‑conscious spending, and a habit of procrastinating
    on paperwork, while they keep a laid‑back attitude toward strict schedules.
background:
  cultural: Nathan grew up in a white, middle‑class family in Wentzville, Missouri, a suburb of St. Charles County known for its small‑town feel and strong community ties. His upbringing was shaped by the
    local public school system and regular participation in church activities, reflecting the region’s predominantly Protestant values. Community events such as high‑school sports games, county fairs, and
    neighborhood gatherings are central to his cultural experience. The Midwestern ethos of practicality, modesty, and neighborly cooperation influences his outlook, while the area's blend of suburban convenience
    and nearby agricultural roots provides a backdrop of both structured routine and openness to flexible, hands‑on work.
attributes:
  skills: '["Basic automotive maintenance", "Hand tool repair", "Computer literacy (Windows, basic troubleshooting)", "Social mediation", "Team collaboration", "Simple cooking", "Event organization"]'
  hobbies: '["Video gaming (shooters and strategy)", "Model kit building", "Pickup basketball", "Listening to music (classic rock, country, pop)", "Volunteering at community events"]'
  career_goals: Nathan aims to earn his GED within the next two years and then enroll in an automotive technology program at a community college or trade school. He hopes to secure an apprenticeship at
    a local auto repair shop, where he can deepen his mechanical skills and eventually become a certified technician. Long‑term, he dreams of managing a small garage or starting his own mobile car‑service
    business, appreciating the structured work environment and the opportunity to serve his community. He also keeps an open mind about joining the U.S. Army, attracted by its clear hierarchy and training
    opportunities.
