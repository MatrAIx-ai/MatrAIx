persona_description: An engineer with expertise in the field of thermodynamics, particularly in the design and analysis of oscillating-wave thermodynamic devices for both acoustic power amplification and
  heat pumping. They are particularly interested in the effects of nonlinear flow resistance on the stability of these devices, and how they can be mitigated through the use of thermocouples to detect and
  correct for deviations from transverse temperature uniformity in the regenerator. They are likely to be involved in the design and testing of these devices, as well as the interpretation and analysis
  of experimental data obtained with specialized thermocouple-built orifice pulse tube refrigerators.
