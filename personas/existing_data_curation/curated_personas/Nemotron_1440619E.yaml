  career_goals: As he approaches retirement, Michael aims to transition into a part‑time mentorship and community‑liaison role within the USPS, using his natural sociability to bridge the post office with
    local residents. He hopes to formalize a volunteer program for senior citizens that leverages his mail‑delivery routes to deliver groceries and prescriptions. He also aspires to document the oral histories
    of longtime neighbors and publish a small collection of stories about life along the streets of Las Cruces, preserving local heritage.
