personas:
  professional: Mahogany Robinson, an aspiring visual communications student and freelance illustrator, leverages their meticulous project management and solitary work style to produce minimalist digital
    artwork while rigorously researching design contexts, balancing their curiosity for new ideas with a critical, methodical approach, and they consistently set strict deadlines to stay on track.
  sports: Mahogany Robinson, who prefers solitary exercise, follows the Orlando Magic and the Tampa Bay Lightning for background entertainment while completing early morning runs with the Longwood Trail
    Runners club and practices yoga twice weekly, reserving occasional indoor rock‑climbing sessions for a focused, low‑social‑pressure workout, and they view each session as a mental reset.
  arts: Mahogany Robinson, a digital illustrator drawn to minimalist aesthetics, immerses themselves in the works of James R. Eads, Yayoi Kusama, and photographer Ansel Adams, tunes into Sufjan Stevens
    and Björk while sketching, and they attend off‑peak gallery openings featuring contemporary Black literature‑inspired installations, citing their critical eye and solitary nature as artistic fuel.
  travel: Mahogany Robinson, a budget‑conscious explorer, plans trips with meticulous spreadsheets, favors quiet nature retreats like Florida’s Ocala National Forest and cultural excursions such as a weekend
    in New York’s Museum Mile, and they dream of a solo study‑tour in Paris to visit the Louvre and a two‑week immersion in Kyoto’s contemporary art scene.
  culinary: Mahogany Robinson, a novice home chef, favors minimalist, plant‑forward meals like avocado‑toast with poached egg, quinoa salads tossed with lemon‑zest and roasted chickpeas, and occasionally
    treats themselves to sushi rolls featuring tuna, cucumber, and wasabi, while they savor a meticulously brewed pour‑over coffee made with Ethiopian beans.
  core: Mahogany Robinson, an introspective 18‑year‑old designer, balances relentless curiosity with chronic worry, thrives in solitary creativity, and they can’t resist checking their phone for chess puzzles
    during every coffee break.
background:
  cultural: Mahogany grew up in Longwood, Florida, within a close‑knit African American family that blends Southern traditions with Caribbean influences from her mother’s Jamaican heritage. Her upbringing
    included church gatherings, soul food cooking, and storytelling sessions that emphasized resilience and community. She’s been shaped by the vibrant multicultural environment of Seminole County, attending
    local festivals celebrating Black history and art, and by the presence of Afro‑centric literary and musical circles in the Orlando area. These cultural experiences inform her appreciation for Black
    artistic expression, her commitment to social awareness, and her desire to contribute to a more inclusive cultural narrative.
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Photography'', ''Art history knowledge'', ''Critical analysis'', ''Research methodology'', ''Academic writing'',
    ''Project management'', ''Time management'', ''Data analysis (Excel, SPSS)'', ''Basic Python programming'']'
  hobbies: '[''Digital illustration'', ''Museum and gallery visits (quiet hours)'', ''Landscape photography'', ''Reading philosophy and art criticism'', ''Reading Black literature'', ''Online chess'', ''Yoga
    and meditation'', ''Journaling'', ''Python generative art'', ''Solo community art workshops'']'
  career_goals: Mahogany aims to complete a bachelor's degree in Visual Communications or Graphic Design while building a professional portfolio that showcases her minimalist digital artwork. She plans
    to secure a remote freelance illustration contract and later a full‑time role as a UX/UI designer or art director at a cultural institution that values thoughtful, research‑driven design. Long‑term,
    she hopes to author articles on contemporary Black art and curate exhibitions that highlight under‑represented voices, leveraging her critical eye and methodical approach to make an impact in the art
    world.
