  states in plants. They may have conducted research on late-flowering mutants and ecotypes in Arabidopsis, and may have a keen interest in identifying additional FLC-like genes in the Arabidopsis genome.
  They may also be involved in the development of new methods or technologies for studying flowering time regulation in plants.
