persona_description: A political scientist who advocates for the reform of the US political system to address the issue of partisanship and the dominance of one party within Congress. This person believes
  that removing the partisan power imbalance within Congress will curb partisanship more effectively than any other reform proposed, and has proposed an amendment to the US Constitution to address this
  issue. This person is likely to be knowledgeable about the political process, the history of the US Constitution, and the theory of government. They are interested in the impact of partisanship on the
  functioning of government and the effectiveness of proposed reforms. They are also likely to be aware of the importance of public campaign finance and electoral protections in addressing partisanship.
