  user 1 personas: 'My lifes goal is to be the worlds foremost encyclopedia salesman.

    I am a traveling encyclopedia salesman.

    I work at the gas station as a part time job.

    I once saw peyton manning at the grocery store.

    My hobbies include rock collecting and making macaroni art.'
  user 2 personas: 'I run two miles everyday.

    I played football in college.

    I have been married for five years.

    I work at a candy store.'
  Best Generated Conversation: 'User 1: Hi there!

    User 2: Hello!

    User 1: What do you do for fun?

    User 2: I run two miles every day.

    User 1: That''s impressive! I used to run, but I don''t do it much anymore.

    User 2: You should get back into it! It''s a great way to stay in shape.

    User 1: I know, I know. I''ll try to start again soon.

    User 2: Good!

    User 1: So, what else do you like to do?

    User 2: I work at a candy store.

    User 1: Oh, that sounds fun! Do you get to eat all the candy you want?

    User 2: I do, but I don''t like to eat too much candy. I try to stay in shape.

    User 1: That''s smart.

    User 2: Thanks.

    User 1: So, do you have any hobbies?

    User 2: I like to play video games.

    User 1: Me too! What kind of games do you like to play?

    User 2: I like to play all kinds of games, but I mostly play role-playing games.

    User 1: Those are great! I love role-playing games.

    User 2: Me too!

    User 1: So, what''s your favorite role-playing game?

    User 2: My favorite role-playing game is Dungeons and Dragons.

    User 1: That''s a great game! I''ve always wanted to play, but I''ve never had anyone to play with.

    User 2: You should! It''s a lot of fun.

    User 1: Maybe I will.

    User 2: Good!

    User 1: So, what else do you like to do?

    User 2: I also like to read.

    User 1: Me too! What kind of books do you like to read?

    User 2: I like to read all kinds of books, but I mostly read fantasy and science fiction.

    User 1: Those are great! I love fantasy and science fiction too.

    User 2: Me too!

    User 1: So, what''s your favorite fantasy or science fiction book?

    User 2: My favorite fantasy book is The Lord of the Rings.

    User 1: That''s a great book! I''ve read it twice.

    User 2: Me too! It''s so good.

    User 1: So, what''s your favorite science fiction book?

    User 2: My favorite science fiction book is The Hitchhiker''s Guide to the Galaxy.

    User 1: That''s a great book too! I''ve read it three times.

    User 2: Me too! It''s so funny.

    User 1: So, what do you like about fantasy and science fiction?

    User 2: I like the imagination and the creativity. I like the idea of being able to explore different worlds and different possibilities.

    User 1: I agree! Fantasy and science fiction are so much fun.

    User 2: Me too'
