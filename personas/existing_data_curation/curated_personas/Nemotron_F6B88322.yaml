personas:
  professional: Jorge Trejo, a retired strategic business planner with a graduate business education, channels decades of expertise in market analysis, change management, and operational efficiency into
    mentoring emerging entrepreneurs and serving on a local arts council, blending methodical organization with a curiosity for unconventional ideas.
  sports: Jorge Trejo enjoys low‑impact fitness through weekly walks in the local park, participates in a senior bowling league, and follows the Washington Commanders in football and the Washington Capitals
    in hockey, while occasionally cheering on the Virginia Cavalier basketball team during March Madness.
  arts: Jorge Trejo, a frequent visitor of the Virginia Museum of Fine Arts and intimate gallery openings, draws inspiration from the brushwork of Claude Monet, the bold colors of Frida Kahlo, and the lyrical
    guitar of Andrés Segovia, while volunteering as a guest curator for community art projects.
  travel: Jorge Trejo prefers thoughtfully planned trips that balance family visits in Florida with leisurely drives through the Shenandoah Valley, and he savors occasional journeys to an ancestral Caribbean
    island where he reconnects with his roots.
  culinary: Jorge Trejo delights in preparing ropa vieja, slowly simmered shredded beef with tomatoes, bell peppers, and cumin, and brewing a rich dark coffee using freshly ground beans, while also cultivating
    herbs like cilantro and oregano in his garden to season his meals.
  core: Jorge Trejo blends meticulous business acumen, a quiet love for watercolor landscapes, and a deep commitment to community mentorship, all tempered by a habit of postponing medical check‑ups when
    a new art exhibit beckons.
background:
  cultural: Jorge was born in Havana, Cuba, and emigrated to the United States with his family in the early 1970s. He grew up immersed in Cuban traditions such as música son, vibrant family gatherings,
    and a strong emphasis on hospitality and mutual support. While adapting to life in Virginia, he retained his Spanish language proficiency and continued practicing Catholic traditions, celebrating holidays
    like Nochebuena with authentic Cuban foods. His cultural identity blends a deep respect for his Cuban roots with the community‑oriented values of his adopted hometown, informing his approach to relationships,
    community service, and artistic appreciation.
