  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Cooking Cuban cuisine'', ''Gardening'', ''Playing chess'', ''Mentoring young entrepreneurs'', ''Traveling to family in Florida'', ''Participating
    in community arts projects'']'
  career_goals: Although retired, Jorge aims to leverage his experience by mentoring emerging entrepreneurs in the York County area, particularly those from Hispanic backgrounds. He aspires to establish
    a small scholarship fund for Cuban‑American students pursuing business studies and to volunteer as a board member for the local arts council, helping to integrate art appreciation into community development.
    He also hopes to document his personal and professional journey in a memoir that highlights the intersection of Cuban heritage and American entrepreneurship.
