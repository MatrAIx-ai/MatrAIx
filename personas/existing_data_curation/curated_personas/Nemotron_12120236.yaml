  career_goals: Phuong aims to transition from a frontline sales associate to a leadership role within the next three years, targeting a store manager position where she can shape the customer experience
    and drive sales performance. She aspires to incorporate her artistic sensibility into the visual identity of the store, possibly spearheading a regional visual merchandising program. Long-term, she
    envisions opening a boutique that fuses Southeast Asian craftsmanship with contemporary design, creating a cultural hub for Houston’s diverse community. To support these ambitions, she plans to enroll
    in a retail management certification and to expand her network through local business associations. Phuong also seeks to leverage her bilingual skills to develop targeted marketing campaigns for the
    Vietnamese diaspora, aiming to become a recognized top performer and mentor within the organization.
