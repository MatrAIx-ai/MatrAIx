  hobbies: '[''Tech meetups'', ''Hackathons'', ''Volleyball'', ''Weekend road trips'', ''Live music festivals'', ''Board games'', ''Improv comedy'', ''Cooking (southern cuisine)'', ''Hiking'']'
  career_goals: In the next five years, Virginia aims to become a lead engineer or technical manager, spearheading the development of scalable web platforms that deliver immediate user value. She is driven
    to earn recognition as a top performer in her company, win regional hackathons, and contribute to high‑impact open‑source projects. Long‑term, she envisions launching her own SaaS startup that solves
    a concrete problem for small businesses in her community, merging her practical problem‑solving skills with her desire for competitive achievement.
