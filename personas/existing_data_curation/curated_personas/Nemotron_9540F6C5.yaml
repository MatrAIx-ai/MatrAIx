personas:
  professional: Virginia Havas is a full‑stack web developer who leverages a practical, structured coding approach while thriving in fast‑paced hackathon environments, excelling at rapid prototyping, pair
    programming, and leading small agile teams, but they often underestimate deadlines due to a relaxed attitude toward strict planning.
  sports: Virginia Havas plays intramural volleyball with the Charlottesville Vixens club, follows the Washington Commanders, Washington Capitals, and DC United, and regularly joins pick‑up basketball games
    on campus, balancing a competitive drive to improve personal stats with a laid‑back approach to scheduling and team commitments, and they often volunteer to organize practice sessions.
  arts: Virginia Havas attends live music festivals featuring Lizzo, Vampire Weekend, and Tyler, the Creator, participates in improv comedy workshops at the DC Improv, and enjoys streaming series starring
    Phoebe Waller‑Bridge, using these creative outlets to balance the logical intensity of software development, and they often discuss the shows with fellow meetup attendees.
  travel: Virginia Havas favors spontaneous weekend road trips exploring historic towns such as Williamsburg, Charlottesville, and Shenandoah Valley, while dreaming of a summer backpacking adventure through
    Lisbon and Porto in Portugal, planning trips on the fly with a mix of Google Maps and last‑minute AirBnB deals, constrained by a modest student budget, and they usually draft itineraries just the night
    before departure.
  culinary: Virginia Havas experiments with southern‑style dishes like shrimp and grits, fried chicken with hot sauce, and collard greens sautéed in smoked turkey broth, often sourcing fresh okra and cornmeal
    at local farmers’ markets, yet their cooking skill level oscillates between enthusiastic amateur and occasional kitchen disaster due to over‑ambitious spice blends, and they occasionally burn the edges
    of a skillet while trying a new hot sauce.
  core: Virginia Havas is a competitively driven full‑stack developer who thrives on hackathons, volleyball spikes, and impulsive road trips, but they have a relaxed approach to planning and occasionally
    neglect health check‑ups, revealing a paradox of structure and spontaneity.
background:
  cultural: Virginia grew up in a suburban community in Hanover County, Virginia, shaped by Southern hospitality, a strong sense of community, and a blend of traditional values with modern tech culture.
    Her family’s middle‑class background emphasized education and practical skills, encouraging her pursuit of STEM. While rooted in the cultural nuances of the American South—such as an appreciation for
    local history, regional cuisine, and community events—she also embraces progressive ideas through her involvement in the region’s growing tech scene and advocacy for diversity in technology.
