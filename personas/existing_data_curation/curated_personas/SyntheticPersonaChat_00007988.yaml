data:
  user 1 personas: 'I do not like when people get too close to me.

    I do not like being asked a lot of questions.

    I love the forest.

    I have a shopping addiction.

    I think about food a lot.'
  user 2 personas: 'I am a painter.

    My wife hates me , she thinks i am lazy and poor.

    I won a lottery 6 years ago but nobody knows.

    I paint organic scenes with pretty trees.

    I live a lie.'
  Best Generated Conversation: 'User 1: Hi there!

    User 2: Hello!

    User 1: What do you like to do for fun?

    User 2: I love to paint.

    User 1: Oh, that''s cool! What kind of things do you paint?

    User 2: I paint organic scenes with pretty trees.

    User 1: That sounds really nice. I love nature.

    User 2: Me too! It''s so peaceful and relaxing.

    User 1: Do you ever paint outside?

    User 2: I do sometimes, but I don''t like it when people watch me.

    User 1: I understand. I like to be alone when I''m painting too.

    User 2: What do you do for fun?

    User 1: I like to go shopping.

    User 2: Oh, that''s fun! Do you have a favorite store?

    User 1: I like to go to the mall. I like to see all the different stores and try on clothes.

    User 2: I like to go to the mall too, but I don''t like to try on clothes. I''m always worried about people looking at me.

    User 1: I know what you mean. I''m not very good at shopping, but I love it anyway.

    User 2: Me too! It''s a lot of fun to just browse the stores and see what you can find.

    User 1: I agree! I''m glad we both enjoy shopping.

    User 2: Me too! It''s always nice to find something new to wear.'
