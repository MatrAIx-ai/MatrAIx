  career_goals: Looking ahead, Anthony aims to ascend to a regional director role where he can shape multi‑state sales operations and mentor the next generation of sales leaders. He is passionate about
    integrating digital tools and analytics to accelerate growth, and he envisions establishing a formal mentorship program that emphasizes inclusive leadership and community outreach. Over the next five
    years, he also hopes to contribute to local economic development by consulting for small Black‑owned businesses in the Atlanta metro area, leveraging his network to foster entrepreneurship and job creation.
