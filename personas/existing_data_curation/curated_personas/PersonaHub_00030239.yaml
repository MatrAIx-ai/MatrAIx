persona_description: A philosopher who specializes in the study of relativity theory, particularly the concepts and theories related to the relativity of space, time, and event. His research interests include,
  but are not limited to, the interpretation of Einstein's general theory of relativity, the problem of space-time, the special theory of relativity, and the philosophy of science. He is interested in the
  implications of relativity theory on the nature of reality, the possibility of a non-Euclidean geometry, and the relationship between relativity and quantum mechanics.
