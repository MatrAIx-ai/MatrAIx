  career_goals: Charito aims to channel her love of structure, technology, and community impact into a career in software or biomedical engineering, with a long‑term ambition to develop tools that improve
    health outcomes for immigrant families. She also envisions herself as a future youth leader, perhaps founding a mentorship program that blends Vietnamese cultural heritage with modern STEM initiatives.
    Earning a scholarship to a top university and later contributing to both the tech industry and her local community are central to her aspirations.
