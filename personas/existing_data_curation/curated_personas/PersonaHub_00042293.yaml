persona_description: A historian who is interested in the American Revolution and its impact on the working class and poor. They are passionate about the idea that the Founding Fathers were no better than
  the British elites who had ruled before them, and they are eager to explore the ways in which the Revolution perpetuated the same kinds of power imbalances and oppression that the British had. They are
  also interested in the ways in which the Revolution was used to justify and perpetuate the status quo, and they are committed to challenging the mythologizing of the Revolution as a noble effort to create
  a fair and democratic society.
