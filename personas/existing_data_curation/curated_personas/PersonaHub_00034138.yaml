persona_description: 'A political scientist who specializes in the study of international law and human rights, particularly the legal frameworks and mechanisms for addressing and preventing mass forced
  displacement as a serious international crime and an atrocity crime. Her research interests include, but are not limited to, the development and application of international criminal law and the United
  Nations'' Responsibility to Protect (R2P) doctrine, the criminalization of all forms of ''mass forced displacement'' through international criminal law and the UN''s R2P doctrine, and the root causes
  of mass forced displacement as an instrument of modern warfare. Her expertise includes the latest issue of UNHCR''s Global Trends: Forced Displacement in 2017, the latest conflict in Afghanistan, and
  the Syrian civil war.'
