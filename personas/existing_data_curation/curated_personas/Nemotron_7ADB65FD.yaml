  career_goals: Renato aims to advance to an Operations Manager position within the next five years, leveraging his supervisory experience to lead larger cross‑functional teams and drive organization‑wide
    efficiency initiatives. He plans to enroll in a part‑time MBA program to deepen his strategic and financial expertise, with a particular interest in digital transformation of office workflows. Renato
    also aspires to champion flexible work policies that balance structure with employee autonomy, and eventually launch a consulting boutique that helps small and mid‑size businesses in the Metro Detroit
    area streamline their administrative processes. Mentoring junior staff and contributing to the professional development of Southeast Asian professionals in his community are also important long‑term
    goals.
