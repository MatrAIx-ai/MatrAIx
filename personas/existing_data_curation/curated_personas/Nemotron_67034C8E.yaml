personas:
  professional: Samaria Bess, a 29‑year‑old data visualization designer, blends Python‑driven statistical modeling with Adobe Illustrator art direction to turn complex scientific data into interactive museum
    exhibits, leveraging their curiosity and a balanced mix of organization and flexibility; they juggle multidisciplinary teams and tight project deadlines with ease.
  sports: Samaria Bess stays active through weekend hikes with the Cuyamaca Trail Club, regular surf sessions at La Jolla Shores, and seasonal volleyball with the San Diego Wave fans' recreational league,
    all while they cheer on the Padres and track the Gulls' home games as part of their community‑spirit fitness routine.
  arts: Samaria Bess channels a love for color and narrative into watercolor cityscapes inspired by Georgia O'Keeffe’s bold palettes, captures street vibes with a camera echoing the gritty style of Banksy,
    and they find rhythm in live shows ranging from Joni Mitchell folk sets at local cafés to the experimental electronic beats of Flying Lotus.
  travel: Samaria Bess curates travel itineraries that blend spontaneous road trips along the Pacific Coast Highway, meticulously planned cultural immersions in Oaxaca’s vibrant festivals, and occasional
    weekend escapes to the desert splendors of Joshua Tree, all while they balance a modest travel budget with a desire for occasional luxury stays at boutique eco‑lodges.
  culinary: Samaria Bess enjoys experimenting in the kitchen, perfecting California‑style fish tacos with grilled mahi‑mahi, avocado‑lime crema, and fresh cilantro, while they occasionally whip up mole‑inspired
    ramen broth that fuses ancho chilies, sesame oil, and ramen noodles, showcasing a confident but sometimes overly ambitious approach to fusion cooking.
  core: Samaria Bess is a curiosity‑driven data storyteller who swaps a midnight espresso for a last‑minute pottery glaze, hoards stray feathers for art projects, and they chronically forget to water houseplants
    despite a meticulous project calendar.
background:
  cultural: Samaria is a white American who grew up in Southern California, immersed in an environment that blends a laid-back coastal lifestyle with a fast-moving tech ecosystem. The multicultural fabric
    of El Cajon and the greater San Diego County—particularly the strong Mexican-American presence—has shaped her appreciation for diverse cultural expressions and given her functional Spanish language
    skills. Her family emphasized higher education and encouraged exploration of both analytical and creative interests, fostering her balanced worldview. The region’s emphasis on outdoor recreation, community
    festivals, and progressive social values informs her open-mindedness, collaborative spirit, and commitment to lifelong learning.
attributes:
  skills: '[''Python programming'', ''R programming'', ''Data analysis (Pandas, NumPy)'', ''Statistical modeling'', ''Data visualization (Matplotlib, Tableau)'', ''Laboratory techniques (PCR, gel electrophoresis)'',
    ''Scientific writing'', ''Project management'', ''Design thinking'', ''User experience research'', ''Graphic design (Adobe Illustrator)'', ''Digital illustration'', ''Public speaking'', ''Conversational
    Spanish'', ''Problem solving'', ''Critical thinking'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Photography'', ''Hiking (Cuyamaca, Anza-Borrego)'', ''Visiting art galleries'', ''Reading science-fiction'', ''Podcast listening (tech & culture)'',
    ''Cooking fusion recipes'', ''Pottery workshops'', ''Volunteer science outreach'', ''Live music concerts'']'
  career_goals: Samaria aims to bridge her technical training with her passion for art and communication by entering a role that blends data science, visual storytelling, and user-experience research. In
    the next two years she plans to complete a professional certificate in UX design and build a portfolio of data-driven visual projects that communicate scientific concepts to broader audiences. She envisions
    working as a science communication specialist or a data visualization designer for a museum, biotech firm, or tech startup, where she can shape interactive exhibits or educational platforms. Long-term,
    she hopes to earn a master's degree in Human-Computer Interaction, lead interdisciplinary teams, and mentor emerging talent, while maintaining a flexible schedule that allows continued personal artistic
    practice and community involvement.
