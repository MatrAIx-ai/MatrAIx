personas:
  professional: Stephen Mcclelland, a 47‑year‑old commercial truck driver with over twenty years of long‑haul route planning, safety compliance, and hands‑on mechanical repairs, leverages his practical
    mindset and structured approach to logistics software to smoothly transition toward owning and operating his own truck while negotiating freight terms with confidence.
  sports: Stephen Mcclelland follows NASCAR fervently, rooting for drivers like Kyle Busch, supports the Los Angeles Rams and Dodgers seasonally, and participates in a local fishing club while occasionally
    joining a weekend 5K run organized by the San Bernardino community recreation league.
  arts: Stephen Mcclelland channels his creative side through classic‑car restoration and hand‑crafted wooden furniture, while regularly attending the Fontana Community Theatre’s productions of classics
    like "The Music Man," and he enjoys listening to The Eagles, Johnny Cash, and historical documentary series on PBS.
  travel: Stephen Mcclelland prefers road‑trip adventures, planning meticulous routes for weekend camping escapes to the San Bernardino mountains, has visited Yellowstone National Park, dreams of driving
    his future truck along historic Route 66 to the Grand Canyon, and balances travel with family obligations.
  culinary: Stephen Mcclelland favors hearty, smoky flavors, expertly grilling BBQ ribs with hickory wood chips and smoked paprika, cooking chicken pot pie on a portable stove during camping trips, and
    enjoys classic diner breakfasts like pancakes topped with maple syrup, reflecting his moderate cooking skill and love for comfort food.
  core: Stephen Mcclelland blends a methodical road‑warrior mentality with a passion for classic cars, careful financial planning, and Saturday‑night NASCAR marathons, all while managing a stubborn back
    and an occasional sweet‑tooth indulgence.
background:
  cultural: Stephen grew up in a working‑class, white, middle‑American family that relocated to Southern California during his youth. His upbringing emphasized hard work, self‑reliance, and community involvement.
    Influenced by the local trucker culture of the Inland Empire, he values practical skills, punctuality, and family loyalty, while also embracing Southern Californian leisure activities such as outdoor
    camping and motorsport fandom.
attributes:
  skills: '["Commercial driving (Class A CDL)", "Route planning and logistics", "Vehicle maintenance and minor repairs", "Safety compliance and DOT regulations", "Customer service and negotiating freight
    contracts", "Logistics software (e.g., McLeod, KeepTruckin)", "Time management and schedule coordination", "Basic bookkeeping and expense tracking"]'
  hobbies: '["DIY automotive projects", "Woodworking", "Motorsports (NASCAR) fan", "Camping and fishing", "Community events (Fontana Fair)", "Reading truck maintenance guides", "Historical documentaries"]'
  career_goals: Stephen wants to transition from being a company driver to an owner‑operator, acquiring his own truck within the next two years. He plans to obtain a hazmat endorsement and advanced safety
    certifications to expand the types of freight he can haul. In the longer term, he aims to move into a logistics management role, overseeing route dispatch and driver training, while building a stable
    retirement fund for his family.
