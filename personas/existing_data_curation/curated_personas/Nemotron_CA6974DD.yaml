personas:
  professional: Diana Bozarth, an aspiring manufacturing supervisor, combines hands‑on CNC machining expertise with a knack for lean‑process optimization, delivering on‑time production while mentoring peers
    and championing sustainable, robot‑integrated workflows.
  sports: Diana Bozarth stays active by cycling with the Austin Cycling Club, hiking the Hill Country trails on weekends, and cheering for Austin FC during MLS season, while also squeezing in yoga sessions
    to balance her core strength.
  arts: Diana Bozarth finds creative release strumming acoustic renditions of St. Vincent’s songs at local open‑mic nights, soaking up the eclectic sounds of The Black Angels at Stubb’s, and diving into
    contemporary sci‑fi by Ann Leckie and N.K. Jemisin to fuel her curiosity about emerging tech.
  travel: Diana Bozarth enjoys weekend road trips to the Texas Hill Country’s wineries and day‑trips to New Braunfels for tubing, while dreaming of a spring pilgrimage to Japan’s Akihabara district to explore
    robotics museums and sample ramen in Osaka.
  culinary: Diana Bozarth thrives on cooking open‑air grilled chicken tacos with smoky paprika, fresh cilantro, and lime, while perfecting quinoa‑black bean salads with avocado, and treats herself to occasional
    brunch at local food trucks serving beet‑infused chilaquiles.
  core: Diana Bozarth balances a pragmatic drive for manufacturing excellence with a love for woodcraft, often staying up late fiddling with CNC code while neglecting a regular sleep schedule, and can’t
    resist collecting vintage guitar pedals despite a modest budget.
background:
  cultural: Diana was raised in a middle‑class, predominantly Anglo‑American household in Central Texas, where values of hard work, community service, and self‑reliance were emphasized. Growing up near
    Austin, she has been exposed to the city’s eclectic cultural mix—its indie music scene, tech start‑up culture, and progressive social outlook—while still maintaining ties to traditional Texan customs
    such as family barbecues and outdoor recreation. This blend of mainstream American upbringing and the vibrant, inclusive atmosphere of Austin shapes her pragmatic yet open‑minded worldview.
attributes:
  skills: '[''Blueprint reading'', ''CNC machine operation'', ''Manual machining'', ''Basic PLC programming'', ''Quality inspection'', ''Lean manufacturing'', ''Safety compliance'', ''Basic CAD modeling
    (SolidWorks)'', ''Troubleshooting equipment'', ''Team collaboration'']'
  hobbies: '[''Hiking in the Texas Hill Country'', ''Cycling around Lady Bird Lake'', ''Yoga'', ''Woodworking'', ''Volunteering at food banks'', ''Habitat for Humanity builds'', ''Playing acoustic guitar'',
    ''Attending live‑music shows in Austin'', ''Reading science‑fiction'']'
  career_goals: Diana aims to transition from front‑line assembly to a supervisory or technical specialist role within the next five years. She plans to complete her associate's degree in Manufacturing
    Technology and earn certifications such as Certified Production Technician (CPT) and Certified Manufacturing Technologist (CMfgT). Long‑term, she hopes to lead a continuous‑improvement team that implements
    sustainable manufacturing practices, integrates robotics into the production line, and mentors new workers, especially women entering trades. She also envisions contributing to community STEM outreach
    programs in Austin.
