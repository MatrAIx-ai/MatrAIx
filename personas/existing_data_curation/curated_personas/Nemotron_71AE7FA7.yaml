personas:
  professional: Ceila Soza, an 81‑year‑old self‑taught abstract painter, leverages their bilingual fluency to serve as a cultural liaison at community gatherings while assertively weaving vibrant motifs
    from their Central American heritage into modern oil canvases and sharing culinary traditions through workshops, embodying their imaginative curiosity and relaxed approach to obligations.
  sports: Ceila Soza regularly joins the Whittier Senior Strollers walking club for leisurely neighborhood strolls, enjoys quiet solo walks through historic streets, attends gentle yoga classes at the senior
    center to stay limber, and follows the Los Angeles Dodgers and Los Angeles Lakers from home, favoring low‑impact, social exercise over competitive sport.
  arts: Ceila Soza spends afternoons at LACMA admiring the abstract works of Georgia O’Keeffe and the vibrant paintings of Frida Kahlo, listens to Latin jazz legends like Tito Puente and the bossa nova
    rhythms of Antonio Carlos Jobim while reciting Pablo Neruda’s poetry and pondering Simone de Beauvoir’s existential essays, and actively participates in senior‑center art workshops to refine their oil
    techniques, reflecting their intellectually curious nature.
  travel: Ceila Soza prefers reflective travel, having taken a memorable week‑long road trip along California’s Pacific Coast Highway and a cultural immersion visit to the colonial town of Granada, and
    now dreams of returning to the lakeside region of their birthplace to document family recipes, favoring flexible itineraries over rigid schedules while balancing modest savings with the support of grandchildren
    for the journey.
  culinary: Ceila Soza expertly prepares nacatamales—corn masa spiced with annatto, layered with pork, plantain, and potatoes—and vigorón, a dish of boiled yuca topped with crisp chicharrón and tangy cabbage
    slaw, seasoning both with fresh cilantro, oregano, and lime zest harvested from their garden, and delights in sharing these fragrant meals at family gatherings.
  core: Ceila Soza is an 81‑year‑old abstract painter and storyteller who blends vibrant homeland motifs with modern art, lives spontaneously, tends to misplace their knitting needles, and balances creative
    curiosity with occasional forgetfulness about health routines.
background:
  cultural: Ceila was born in León, Nicaragua, and immigrated to the United States with her family in the early 1960s, settling first in Los Angeles before moving to Whittier. Her upbringing was steeped
    in Nicaraguan cultural traditions—Spanish language, Catholic rituals, and a rich culinary heritage featuring dishes such as gallo pinto, nacatamales, and bijes. Over the decades, she has become an informal
    cultural bridge in her community, sharing folkloric stories, organizing small celebrations of Nicaraguan Independence Day, and preserving the Spanish dialect of her generation. Her identity is shaped
    by a blend of Nicaraguan roots and Southern Californian influences, reflecting a resilient immigrant narrative.
