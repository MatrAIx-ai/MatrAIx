  hobbies: '["abstract painting", "reading poetry and philosophy", "floral gardening", "cooking Nicaraguan dishes", "listening to Latin jazz", "knitting scarves", "senior‑center art workshops", "storytelling
    circles", "museum visits", "walking historic Whittier streets"]'
  career_goals: Ceila aspires to finish a personal series of abstract paintings inspired by the colors of her childhood in Nicaragua, and to compile her recollections into a modest memoir that preserves
    the immigrant experience for her grandchildren. She hopes to curate an intergenerational exhibition at the Whittier Community Center that blends her artworks with pieces by local youth, fostering cultural
    exchange. Additionally, she wishes to learn basic digital illustration on a tablet so she can archive family photographs and stories online. A cherished long‑term ambition is to travel back to Nicaragua,
    reconnect with relatives, and document traditional recipes and craft techniques for future generations.
