persona_description: A geologist who specializes in the study of coastal erosion and sediment release in the Laptev Sea. This person has a deep understanding of the complex processes involved in coastal
  development, including the formation of coastlines, the behavior of ice, and the impact of thermal abrasion. They are particularly interested in the relationship between coastal erosion rates and the
  release of sediment to the Arctic Ocean, and have conducted research on the use of satellite imagery to measure and compare the length of coastlines. They have a strong background in the use of satellite
  imagery and have likely used the Landsat and Corona datasets to analyze the shoreline length of the Lena Delta and the Bykovsky Peninsula.
