  hobbies: '[''Sketching'', ''Watercolor painting'', ''Reading science fiction and philosophy'', ''Hiking in the Rockies'', ''Nature photography'', ''Playing acoustic guitar'', ''Board games (strategic
    and abstract)'', ''Model bus restoration'', ''Creative writing (short stories)'', ''Listening to eclectic music'', ''Attending local art workshops'', ''Watching indie films'']'
  career_goals: He aspires to transition into a senior driver or driver‑trainer role within the district, mentoring new drivers and developing safety workshops that incorporate his knack for storytelling.
    Karan hopes to earn a Certified Driver Trainer certification and eventually coordinate the school’s transportation safety curriculum. Parallel to his professional path, he envisions dedicating more
    time to his artistic passions—organizing community art projects for students, contributing a weekly "Bus Adventures" column to the school newsletter, and eventually exhibiting his watercolor paintings
    locally. He also aims to adopt stress‑management practices, such as mindfulness classes, to reduce his tendency toward worry and improve his overall well‑being. Finally, he dreams of a gradual transition
    toward part‑time work so he can focus on writing children’s stories inspired by his daily bus experiences.
