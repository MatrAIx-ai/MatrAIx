personas:
  professional: Adam Evans, a three‑year‑old budding engineer, spends afternoons meticulously constructing sandcastles and block towers on the beach, showcasing an early talent for planning, organization,
    and a love of systematic problem‑solving.
  sports: Adam Evans cheers with gusto for the Miami Dolphins, splash‑tests in a toddler swim class at the Palm Beach Aquatics Center, participates in tiny soccer drills with the Palm Beach Mini‑Kick Club,
    and eagerly anticipates the summer sand volleyball tournament on their local beach.
  arts: Adam Evans immerses themselves in imaginative play inspired by Disney’s “Moana,” sings along to Sesame Street tunes, and proudly displays crayon sketches of beach sunsets, often gravitating toward
    colors reminiscent of sunrise and sunset palettes.
  travel: Adam Evans delights in family road trips to the Everglades for sunset boat rides, relishes the excitement of a weekend getaway to Disney World in Orlando, and dreams of a future adventure to the
    Bahamas’ crystal‑clear waters.
  culinary: Adam Evans prefers bite‑size chicken nuggets, strawberry‑banana smoothies, and creamy mac and cheese, often practicing ‘cooking’ with plastic utensils in a play kitchen, while insisting on a
    sprinkle of shredded cheddar on everything.
  core: Adam Evans is an energetic, beach‑loving toddler who thrives on routine, demonstrates a precocious talent for building orderly structures, and balances impulse‑driven snack cravings with a budding
    habit of saving coins.
background:
  cultural: Adam is a white American toddler raised in West Palm Beach, Florida. His family’s traditions blend classic Southern‑Midwestern values—such as punctuality, community gatherings, and holiday celebrations
    like Thanksgiving and Christmas—with the sun‑filled beach culture of South Florida. He often experiences multicultural community events at local parks and enjoys beach outings with his parents, which
    shape his early worldview.
attributes:
  skills: '[''basic speech and full‑sentence language'', ''color and shape identification'', ''counting to ten'', ''stacking and sorting blocks'', ''following simple daily routines'', ''imitating adult
    tasks in pretend play'', ''basic self‑care activities like hand‑washing'', ''organized toy arrangement'']'
  hobbies: '[''building block towers'', ''simple puzzles'', ''storytime listening'', ''sing‑along songs'', ''pretend cooking'', ''playing with toy cars'', ''drawing with crayons'', ''playground activities'',
    ''water play at the pool'', ''interactive group games'']'
  career_goals: Adam loves watching firefighters and teachers, and he often says he wants to become a 'big helper' who keeps things organized and safe. He dreams of being a firefighter who follows clear
    routines, helps people, and works with a team, reflecting his desire for structure, practicality, and social interaction.
