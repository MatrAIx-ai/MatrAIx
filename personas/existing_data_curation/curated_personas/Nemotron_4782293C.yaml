personas:
  professional: Tammy Rakestraw, a 62‑year‑old veterinarian with 35 years of small‑ and large‑animal practice, combines surgical precision, diagnostic imaging expertise, and a methodical, mentor‑focused
    mindset, and they guide younger veterinarians while expanding free vaccination clinics and livestock health programs.
  sports: Tammy Rakestraw enjoys early‑morning prairie hikes along the Big Sioux River, participates in the Sioux Falls senior walking club, follows the Sioux Falls Storm indoor football team and the South
    Dakota State Jackrabbits, and they maintain a low‑impact fitness routine that blends bird‑watching walks with light strength exercises.
  arts: Tammy Rakestraw finds creative fulfillment in quilting intricate folk‑style patterns inspired by Grandma Moses, attends the Sioux Falls Sculpture Walk, and they relax to the music of John Denver
    and the Avett Brothers while occasionally watching classic Meryl Streep films.
  travel: Tammy Rakestraw prefers well‑planned road trips to natural wonders such as Badlands National Park and Apostle Islands, enjoys weekend getaways to historic Mackinac Island, and they dream of a
    leisurely European tour of medieval cathedrals, all balanced against a fixed retirement budget and a desire for low‑stress itineraries.
  culinary: Tammy Rakestraw prepares hearty Midwestern dishes—like chicken pot pie, cornbread, and skillet pork chops—using home‑grown heirloom tomatoes, fresh basil, and backyard beans, and they preserve
    seasonal harvests into jams, pickles, and fermented sauces, reflecting their practical yet adventurous palate.
  core: Tammy Rakestraw, a methodical veterinarian‑turned‑mentor, blends meticulous garden science with quilting precision, balances community service with quiet nature walks, and they sometimes forget
    their own health appointments while never missing a vaccination clinic.
background:
  cultural: Tammy was raised in a Midwestern, white, working‑class family in South Dakota, where values of self‑reliance, community service, and practicality are deeply embedded. Her upbringing in the Lutheran
    tradition emphasized modesty, cooperation, and stewardship of the land. The region’s agricultural heritage and close‑knit small‑town culture have shaped her respect for hard work, neighborly support,
    and appreciation for the natural rhythms of the plains. These cultural influences, combined with her scientific education, give her a balanced perspective that values both evidence‑based practice and
    community well‑being.
attributes:
  skills: '[''Veterinary Medicine'', ''Small Animal Surgery'', ''Large Animal Care'', ''Diagnostic Imaging (Radiography, Ultrasound)'', ''Laboratory Diagnostics'', ''Preventive Care'', ''Practice Management'',
