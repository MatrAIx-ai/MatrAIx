  hobbies: '[''Gardening'', ''Quilting'', ''Birdwatching'', ''Hiking'', ''Reading Historical Nonfiction'', ''Volunteering at Animal Shelter'', ''Cooking Midwestern Cuisine'', ''Preserving/Canning'']'
  career_goals: Approaching retirement, Tammy intends to shift from full‑time clinical work to a mentorship and advisory role. She plans to establish a local internship program for veterinary students,
    expand free vaccination clinics for low‑income pet owners, and partner with the county agricultural extension service to raise livestock health standards. Additionally, she aspires to author a practical
    guide on geriatric pet care, sharing her extensive knowledge with both professionals and pet owners.
