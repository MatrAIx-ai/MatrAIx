persona_description: A historian who specializes in the study of African American community life in Los Angeles during the 20th century. The person is interested in the emergence of African American funeral
  homes as a business in urban America, the role of the funeral director in the community, and the architectural design of the Angelus Funeral Home. They appreciate the historical significance of the building
  and the potential for preservation and rehabilitation to make it a cornerstone of the African American community.
