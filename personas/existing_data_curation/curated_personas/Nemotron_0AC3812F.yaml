personas:
  professional: Iris Jackson is a detail‑oriented teen organizer who channels her love of routine and competitive drive into planning school events, cheer squad schedules, and community‑center fundraisers,
    showcasing that they methodically communicate and reliably follow through while eyeing a future in nonprofit administration.
  sports: Iris Jackson channels her competitive spirit on the soccer field for the Riverdale Community Center Soccer Club and as a varsity cheerleader, rooting for the Chicago Fire FC and regularly attending
    their matches, while they adhere to a regimented fitness routine that mixes cardio drills, strength conditioning, and weekly schedule check‑ins.
  arts: Iris Jackson blends her love of performance and sweet creativity by starring in community theater productions of \"Grease\" and \"Hairspray\", baking chocolate‑cream cupcakes for fundraisers inspired
    by favorite flavors, and they unwind with competitive video games while listening to Lin‑Manuel Miranda’s scores and Taylor Swift’s latest album.
  travel: Iris Jackson prefers meticulously planned weekend getaways, often charting trips to New York City’s Broadway district or Orlando’s Disney World using a spreadsheet itinerary, balancing a modest
    savings pool with school‑approved travel grants, and they dream of a solo backpacking adventure across the Canadian Rockies once finances allow.
  culinary: Iris Jackson’s culinary niche centers on baking indulgent treats like red‑velvet cupcakes topped with cream‑cheese frosting and double‑chocolate brownies, leveraging a modest pantry stocked
    with cocoa powder, vanilla extract, and powdered sugar, and they experiment with seasonal fruit fillings for school fundraisers to keep the menu fresh.
  core: Iris Jackson is a hyper‑organized teen who can juggle a cheer routine, a soccer schedule, and a baking timer simultaneously, yet habitually stays up until 2 am mastering video‑game strategies, often
    forgetting that they set an alarm.
background:
  cultural: Iris grew up in Albuquerque, New Mexico, in a family with deep Anglo‑American roots that values hard work, self‑reliance, and community involvement. Her upbringing blends traditional American
    customs—such as celebrating Thanksgiving and Fourth of July—with the unique regional culture of the Southwest, including participation in the Albuquerque International Balloon Fiesta and appreciation
    for New Mexican cuisine like green chile. Her family is active in a local Methodist church, which reinforces a routine‑oriented, service‑focused lifestyle.
attributes:
  skills: '[''Event coordination'', ''Time management'', ''Effective communication'', ''Basic cooking and baking'', ''Social media management'', ''Basic car maintenance'', ''Budgeting'', ''Team leadership'']'
  hobbies: '[''Cheerleading'', ''Soccer'', ''Community theater'', ''Baking'', ''Volunteer tutoring'', ''Competitive video gaming'', ''Organizing community meet-ups'']'
  career_goals: Iris plans to complete her high‑school equivalency (GED) within the next twelve months, then enroll in a community‑college program in business administration or office management. She aims
    to secure an entry‑level administrative role at a local nonprofit or small business where she can apply her organizational talents. Over the next five years she hopes to advance to a supervisory position
    or launch her own community‑focused event‑planning boutique, leveraging her networking skills and competitive drive.
