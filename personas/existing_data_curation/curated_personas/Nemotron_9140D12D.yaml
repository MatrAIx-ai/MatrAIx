  career_goals: Gregory aims to finish middle school with strong grades and earn a spot on his high school's robotics team. His long-term ambition is to study mechanical engineering or computer science,
    with a particular interest in designing bridges or creating educational video games that combine his love for structure and creativity. He hopes to secure a summer internship at a local engineering
    firm or a tech startup, and eventually contribute to projects that improve his hometown of Portsmouth. Along the way, he plans to continue developing his programming skills and maintain a disciplined
    study routine.
