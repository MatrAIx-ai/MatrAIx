personas:
  professional: Gregory Marotta, a budding technologist, enjoys building robots in the school robotics club, designing Scratch games and experimenting with Arduino circuits, and brings their organized,
    methodical approach to every project, ensuring each step is documented meticulously.
  sports: Gregory Marotta, a member of the Portsmouth Youth Soccer League who admires the New England Revolution and the Boston Bruins, spends Saturday mornings at practices, enjoys occasional weekend hikes
    along the Seacoast Trail, and keeps a notebook of personal fitness goals, though they sometimes skip conditioning drills after long study sessions.
  arts: Gregory Marotta, a dedicated piano student, practices Beethoven’s Moonlight Sonata and Mozart’s Piano Concerto No. 21, enjoys reading mystery novels by Agatha Christie, and watches classic films
    starring Audrey Hepburn, all of which fuel their appreciation for narrative structure and melodic precision.
  travel: Gregory Marotta, who has explored the historic harbor of Portsmouth and hiked Acadia National Park, dreams of visiting the ancient ruins of Rome and the bustling streets of Tokyo, preferring carefully
    planned itineraries that balance educational tours with time for sketching seaside vistas, yet sometimes procrastinates on booking trips due to school workload.
  culinary: Gregory Marotta, who loves cooking spaghetti carbonara with pancetta, pecorino, and a dash of pepper, also enjoys making homemade margherita pizza with fresh mozzarella and basil, and frequently
    experiments with baking cookies topped with chocolate chips, though they occasionally burn the edges when multitasking with homework.
  core: Gregory Marotta blends a methodical love for building and music with a quiet curiosity, often losing track of time in model ship projects while hoarding spare change for LEGO sets, and secretly
    indulges in late-night gaming marathons despite a strict bedtime.
background:
  cultural: Gregory is a second-generation Italian-American growing up in Portsmouth, New Hampshire. His family maintains Italian traditions such as Sunday pasta dinners, Christmas feasts with panettone,
    and regular visits to a local Catholic church, while also embracing the broader New England culture of community involvement and self-reliance. The coastal setting and Portsmouth's historic maritime
    heritage inspire his interest in model ships and harbor walks. He attends the public middle school in Rockingham County, where emphasis on practical education and civic participation aligns with his
    pragmatic personality. His cultural upbringing blends Italian family values of loyalty and hospitality with the independent, structured ethos typical of New England.
