  hobbies: '[''Fishing'', ''Hunting'', ''Model train building'', ''Woodworking and furniture making'', ''Gardening'', ''Reading historical biographies'', ''Volunteer treasurer for community park board'',
    ''Attending church seniors’ luncheon'']'
  career_goals: Although retired, William’s ambitions focus on preserving his independence, staying physically active, and leaving a tangible legacy for his family and community. He plans to compile a memoir
    of his life on the Texas farm, documenting changes in agriculture and local history, and to share this knowledge through workshops at the community center. He also aims to continue his volunteer service
    as treasurer for the local park board, ensuring fiscal responsibility, and to mentor younger participants in regional 4‑H livestock competitions.
