  career_goals: Samuel aims to transition from academia to industry by securing an entry‑level data engineering or product development role within a technology or manufacturing firm that values innovative
    problem‑solving and provides a supportive environment. He plans to leverage his programming and analytics skills to improve operational efficiency and develop sustainable solutions for the Upstate New
    York region. In parallel, he is considering pursuing a master’s degree in applied data science to deepen his expertise. His competitive drive pushes him to assume leadership responsibilities early,
    while his awareness of stress leads him to seek roles with clear expectations and work‑life balance.
