  hobbies: '["Hiking and trail exploring", "Birdwatching", "Nature photography", "Reading science‑fiction & philosophy", "Acoustic guitar playing", "Community volunteering (soup kitchen, hospice)", "Gardening",
    "Woodworking projects"]'
  career_goals: Peter aims to secure a stable, community‑focused career that lets him combine his practical abilities with his desire to help others. Over the next few years he plans to enroll in the local
    community college for an associate degree in Emergency Medical Services or Environmental Science, eventually working as an EMT or a park ranger in the White Mountains. He also hopes to obtain a technical
    certification in HVAC or small‑engine repair so he can offer affordable maintenance services and mentorship to younger locals. Long‑term, he envisions establishing a small business that provides equipment
    repair and hands‑on workshops, reinforcing his commitment to community harmony and personal growth.
