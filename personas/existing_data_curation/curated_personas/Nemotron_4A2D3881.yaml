personas:
  professional: Peter Burregi is a budding handyman‑technician who blends his knack for small‑engine repair and basic woodworking with a deep commitment to community service, aspiring to transition into
    an EMT or park ranger role while occasionally leading neighborhood clean‑up workshops.
  sports: Peter Burregi enjoys low‑key physical activity, favoring solo hikes through the White‑Mountain woods where they track bird species, and occasionally joins a community softball league that plays
    for the local YMCA, but they rarely engage in high‑intensity gym workouts.
  arts: Peter Burregi finds creative release behind the lens of a DSLR, capturing sunrise over the hills and woodland wildlife, and they unwind with acoustic guitar sessions at home, often listening to
    folk artists like Gillian Welch and indie‑rock band The War on Drugs.
  travel: Peter Burregi prefers spontaneous weekend drives to nearby nature spots such as Acadia National Park and the Kancamagus Highway, seeking quiet camping experiences over elaborate itineraries, though
    a future dream includes a backpacking trek through the Canadian Rockies.
  culinary: Peter Burregi loves cooking farm‑to‑table meals, regularly preparing herb‑infused vegetable stews and fresh garden salads featuring basil, thyme, and locally sourced kale, but their culinary
    skill is limited to simple recipes and they often rely on take‑out pizza when feeling overwhelmed.
  core: Peter Burregi is a 23‑year‑old nature‑obsessed handyman with a compassionate heart, a habit of procrastinating on paperwork, and an enduring love for birdwatching, guitar strings, and community
    service.
background:
  cultural: Peter grew up in a white, working‑class family in rural Hebron, NH, where New England’s seasonal rhythm and close‑knit community shaped his worldview. Family gatherings were modest, often centered
    around pot‑luck meals, church activities, and town events like the annual maple‑syrup festival. The region’s cultural emphasis on self‑reliance, neighborly assistance, and quiet humility fostered his
    practical curiosity and cooperative nature. Though he did not pursue higher education, local public schools encouraged hands‑on learning, reinforcing his appreciation for the outdoors, modest living,
    and civic participation. He identifies with the broader American ethos of individual freedom tempered by a strong sense of local responsibility.
attributes:
  skills: '["Basic computer & internet navigation", "Small engine repair (lawn mowers, snowblowers)", "Woodworking & furniture restoration", "First Aid & CPR certification", "Empathetic listening & peer
