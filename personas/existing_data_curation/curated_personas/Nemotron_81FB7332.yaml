personas:
  professional: Maya Kim, a curious 2‑year‑old, transforms everyday play into a mini‑studio by meticulously arranging blocks by color, weaving spontaneous stories with stuffed animals, and eagerly taking
    on the "helper" role during family chores, which they execute with a blend of careful organization and spontaneous imagination, revealing early signs of a future creative problem‑solver.
  sports: Maya Kim, an energetic participant in the Tiny Tigers toddler soccer program, proudly waves a foam Seattle Seahawks banner during practice and often mimics the cheers of the professional football
    team, reflecting how they love group activity and early team spirit.
  arts: Maya Kim, an avid admirer of Eric Carle’s vivid illustrations, hums along to Raffi’s "Baby Beluga," giggles at Sesame Street’s Elmo, and turns storytime into a sensory adventure that shapes how
    they express creativity.
  travel: Maya Kim enjoys short family road trips to the nearby zoo and sunny beach, is fascinated by the colorful fish at the aquarium, and dreams of one day riding a carousel at Disneyland and seeing
    the towering redwoods, preferring familiar routines over long flights because they become anxious in crowded airports.
  culinary: Maya Kim, a picky yet adventurous eater, delights in creamy mac and cheese, sweet banana slices, and soft carrot sticks, often assists Mom in stirring pancake batter with a tiny wooden spoon,
    and occasionally smears peanut butter on toast with more gusto than they show during nap time.
  core: Maya Kim, a bright‑eyed 2‑year‑old who constantly asks "why?" and meticulously sorts blocks by hue, bursts into spontaneous dance when music plays, yet they clutch their stuffed rabbit tightly whenever
    the world gets too loud.
background:
  cultural: Maya’s family maintains a strong connection to their American Indian heritage, drawing from the traditions of the Seminole Nation in Florida. Though she lives in Valrico, she participates in
    community gatherings where elders share stories, drumming circles, and traditional crafts such as beadwork. The household incorporates native language phrases and celebrates seasonal events, blending
    these cultural practices with the broader Floridian environment and fostering a sense of identity and pride.
