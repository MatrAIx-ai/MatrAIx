  career_goals: At two years old, Maya’s aspirations are expressed through imaginative play. She often pretends to be a teacher guiding her stuffed animals, loves drawing pictures for family members, and
    shows affection for animals, suggesting a budding interest in caring and creative roles. Her caregivers see early signs of a future goal to become a preschool teacher, an artist, or a wildlife caretaker,
    reflecting her love for learning, art, and helping others.
