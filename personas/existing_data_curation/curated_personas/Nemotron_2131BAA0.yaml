personas:
  professional: Shabrii Snow, a budding world‑builder, channels their imagination into constructing elaborate block kingdoms and drafting fantastical storyboards, already showing the strategic planning
    of a future game designer despite a delightfully messy workspace; they often rearrange pieces mid‑play, embracing the chaos.
  sports: Shabrii Snow loves joining the neighborhood 'Little Explorers' nature club for weekly bug hunts and also cheers for the local minor‑league baseball team, the River City Rivermen, while practicing
    running drills at the community playground; they compete eagerly in tag games, often insisting on new rules and a competitive edge.
  arts: Shabrii Snow spends afternoons drawing dragons inspired by the vibrant colors of Hayao Miyazaki’s 'Spirited Away' and dancing to gospel legends like Mahalia Jackson and blues icons such as B.B.
    King, often recreating their rhythms on a toy keyboard; they relish the blend of visual and musical storytelling.
  travel: Shabrii Snow prefers spontaneous backyard expeditions over rigid itineraries, yet they have already visited the Children’s Museum of Indianapolis and the planetarium at the local library, and
    they dream of spotting the Northern Lights in Iceland someday.
  culinary: Shabrii Snow loves devouring creamy mac and cheese, slurping strawberry smoothies, and occasionally attempting to sprinkle extra cheese on homemade mini‑pizzas, yet they often leave a trail
    of flour on the kitchen floor, a testament to their enthusiastic but messy cooking style.
  core: Shabrii Snow is a six‑year‑old imagination engine who builds block kingdoms, sketches cosmic tales, and competes fiercely in games, all while they navigate the world with a relaxed, slightly skeptical
    grin.
background:
  cultural: Shabrii grows up in a close‑knit African‑American family in Tupelo, Mississippi. Her parents and grandparents share stories of Southern heritage, blending church gospel traditions, local blues
    rhythms, and community celebrations like Juneteenth and family potlucks featuring collard greens and cornbread. The neighborhood church and community center provide after‑school arts and STEM enrichment,
    reinforcing the value of creativity, perseverance, and respectful dialogue. These cultural influences nurture her love for music, storytelling, and curiosity about the wider world while grounding her
    in the supportive bonds of her extended family.
attributes:
  skills: '[''Early reading and story retelling'', ''Imaginative storytelling with toys'', ''Basic drawing and coloring'', ''Puzzle solving and pattern recognition'', ''Building with LEGO or magnetic blocks'']'
  hobbies: '[''Drawing and coloring'', ''Building with LEGO or magnetic tiles'', ''Inventing stories for toys'', ''Listening to gospel and blues music'', ''Exploring nature and stargazing'', ''Playing competitive
    board games'']'
  career_goals: Although still young, Shabrii dreams of becoming a creator who blends art and discovery – she imagines herself as an astronaut‑artist who paints the stars, a comic‑book illustrator whose
    heroes solve mysteries, or a future scientist who invents new games. Her competitive streak pushes her to be the first to finish a puzzle or win a spelling contest, and she sees those achievements as
    stepping stones toward a career where she can explore new ideas and share them with others.
