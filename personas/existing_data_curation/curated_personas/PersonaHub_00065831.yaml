persona_description: A science educator who believes in the importance of integrating scientific and thinking skills into the teaching-learning approach in the science curriculum, and who views the philosophy
  of the Integrated Curriculum for Secondary School (ICSS) or Kurikulum Baru Sekolah Menengah (KBSM) science as good for ensuring a scientist who is not only good in the field but also knows the limit of
  science in understanding phenomena and knowing science to know God as well. The science curriculum is to educate science for all and not specifically to train students to be scientists. The educator is
  aware of the challenges in relating previous chapter from the next, and believes that teachers should be more effort or perhaps in some cases, failure, among teachers to relate previous chapter from the
  next caused students to perceive knowledge as detached instead of connected and complete.
