personas:
  professional: James Parkinson is a Midwestern‑based versatile designer who blends strong visual communication, typography, and branding expertise with a UI/UX toolkit, leveraging their humanities‑derived
    critical lens and competitive streak to deliver culturally resonant work, yet they often improvise workflow at the expense of strict deadlines.
  sports: James Parkinson satisfies their competitive streak and love of the outdoors by hiking the Wisconsin bluffs and cross‑country skiing the Driftless Area in winter, kayaking with the Mississippi
    River Kayak Club, cheering the Green Bay Packers and Milwaukee Bucks, and joining a seasonal ultimate‑frisbee league, though they prefer spontaneous, self‑directed workouts over rigid gym schedules.
  arts: James Parkinson cultivates their creative side through black‑and‑white landscape photography inspired by Ansel Adams and candid street work echoing Dorothea Lange, while their playlists swing from
    Sufjan Stevens and Fleet Foxes to contemporary podcasts featuring design theorist Ellen Lupton, and their evenings often involve dissecting the narrative layers of novels by Margaret Atwood and the
    visual satire of Barbara Kruger.
  travel: James Parkinson prefers a hybrid travel approach—booking flights to Reykjavik after weeks of reading guidebooks, yet leaving most of their Icelandic itinerary open for spontaneous hikes and camping,
    and they’ve already chalked up a weekend road trip through Door County, with future aspirations to trek Patagonia’s Torres del Paine and explore Copenhagen’s design festivals.
  culinary: James Parkinson, a competent home cook, whips up Midwest comforts such as bratwurst with sauerkraut and cheese curds, alongside more adventurous dishes like wild‑rice and mushroom risotto or
    citrus‑marinated fish tacos, favoring fresh rosemary, smoked paprika, and local apples, while indulging their palate with occasional craft‑beer pairings and a penchant for weekend brunch pancakes drenched
    in maple syrup.
  core: James Parkinson channels their Midwestern practicality and restless curiosity into a design career marked by bold visual work, a frugal yet occasionally splurging financial habit, a self‑managed
    anxiety routine, outdoor‑first fitness, a love of nuanced art, spontaneous travel, and a culinary palate that swings between comfort and exploration—plus a habit of late‑night gaming marathons that
    sometimes wreck their schedule.
background:
  cultural: James grew up in Onalaska, Wisconsin, a small Midwestern town shaped by German, Scandinavian, and Irish immigrant heritage. The region's emphasis on community, modesty, and a strong work ethic
    influenced his practical side, while the proximity to natural landscapes fostered a love for the outdoors. Raised in a Protestant household that valued education and independent thought, he pursued
    a bachelor's degree in the humanities, which deepened his appreciation for cultural history and critical analysis. This blend of Midwestern roots, immigrant cultural influences, and a humanities education
    informs both his design aesthetic and his personal worldview.
attributes:
  skills: '["Adobe Photoshop", "Adobe Illustrator", "Adobe InDesign", "Figma", "Sketch", "User Interface (UI) Design", "User Experience (UX) Research", "Typography", "Brand Identity Development", "Print
    Design", "Digital Illustration", "Prototyping", "Color Theory", "Visual Storytelling", "Concept Ideation", "Critical Analysis", "Competitive Benchmarking"]'
  hobbies: '["Hiking in the Wisconsin bluffs", "Kayaking on the Mississippi River", "Landscape and street photography", "Playing competitive indie video games", "Participating in board game nights", "Sketching
    and doodling", "Reading contemporary fiction and philosophy", "Attending local art gallery openings", "Listening to podcasts on psychology and design criticism", "Journaling for stress management",
    "DIY woodworking projects"]'
  career_goals: James aims to become a recognized senior designer or creative director within the Midwest design community, leveraging his unique blend of curiosity and practicality. He aspires to launch
    a boutique studio focused on sustainable branding for local businesses, while also seeking opportunities to win regional design awards (e.g., AIGA Midwest). To manage his tendency toward missed deadlines,
    he plans to adopt structured project management tools and mentor younger designers, turning his competitive drive into collaborative leadership. Ultimately, he wants his work to be both culturally relevant
    to the Upper Midwest and innovative enough to attract national clients.
