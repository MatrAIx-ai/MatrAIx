personas:
  professional: Monica Mason is a seasoned home‑health aide in her mid‑40s who blends a practical, evidence‑based caregiving style with genuine curiosity, and they are actively working toward a CNA credential
    and a future supervisory role that lets them mentor newer aides while championing patient‑centered plans.
  sports: Monica Mason enjoys cheering on the New Orleans Saints and the Pelicans, participates in a weekly community softball league with the East Jefferson Parish Women’s Softball Club, and they take
    advantage of early‑morning walks along the Atchafalaya Basin Trail to stay fit.
  arts: Monica Mason is an avid reader of mystery novels by Tana French, a fan of classic country singer Dolly Parton and local Zydeco musician Clifton Chenier, and they frequently attend the Louisiana
    Folk Festival where they watch folk art demonstrations and documentary screenings.
  travel: Monica Mason prefers road‑trip adventures to nearby Gulf Coast towns like Galveston and Mobile, while dreaming of a fall visit to Savannah’s historic squares and a weekend getaway to the Blue
    Ridge Mountains, and they always plan itineraries around family gatherings and budget constraints.
  culinary: Monica Mason loves cooking Southern comfort foods such as shrimp étouffée, jambalaya, and red beans and rice using herbs from her own garden—especially thyme, basil, and cayenne pepper—and they
    also perfect a sweet pecan pie that they serve at church potlucks.
  core: Monica Mason balances a caring, community‑focused spirit with a tendency toward anxiety‑driven overthinking, a love for home‑grown flavors, and a habit of misplacing schedules, yet they still find
    time to knit gifts for each of their patients.
background:
  cultural: Monica’s cultural background is rooted in the Southern United States, specifically the rural community of Welsh, Louisiana, within Jefferson Davis Parish. As a white, working‑class family member,
    she grew up with traditional Southern values of hospitality, modesty, and strong community ties, often centered around the local Protestant church. The region’s Cajun and Creole influences are reflected
    in her appreciation for local cuisine and occasional use of regional expressions. Her upbringing emphasized self‑reliance, respect for elders, and a pragmatic approach to life, shaping her caring and
    cooperative nature.
