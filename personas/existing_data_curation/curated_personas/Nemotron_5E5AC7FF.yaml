  career_goals: Monica aims to advance her caregiving career by earning a Certified Nursing Assistant (CNA) credential and obtaining specialized training in geriatric and dementia care. She envisions moving
    into a supervisory or case-manager role within a home-health agency, where she can mentor new aides and help shape patient-centered care plans. In parallel, she aspires to develop stronger organizational
    and self-care habits to manage her anxiety, planning to attend workshops on stress management and time-management. Ultimately, she hopes to launch a small, flexible home-care service that offers personalized
    support to elderly clients in her community.
