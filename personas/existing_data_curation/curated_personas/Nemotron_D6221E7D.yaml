  career_goals: Jon dreams of becoming an environmental scientist who explores forests and designs ways to protect wildlife, inspired by his love of Portland's parks. He also enjoys the idea of being a
    firefighter, valuing the practical aspect of helping others in emergencies. His curiosity leads him to be fascinated by space, and he sometimes imagines being an astronaut, combining exploration with
    problem-solving. He envisions a future where he can use his organized, practical mindset to tackle real-world challenges.
