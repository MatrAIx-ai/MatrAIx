personas:
  professional: Jon Field, a budding LEGO builder, demonstrates early engineering instincts, using structured curiosity and practical reliability to design complex vehicle models, and dreams of becoming
    a future architect or engineer.
  sports: Jon Field kicks the ball with gusto in his community soccer program, proudly wears the Little Lions club shirt, and after games rallies with his family to watch the Detroit Tigers, while also
    attempting basic basketball drills at the local park.
  arts: Jon Field animates his own comic strips inspired by the adventurous style of Jeff Smith's 'Bone', sings along to Disney soundtracks like 'Let It Go', and delights in watching Pixar short films,
    especially those featuring the whimsical music of Randy Newman.
  travel: Jon Field dreams of exploring the towering red rocks of the Grand Canyon, enjoys revisiting the magic of Disneyland in California with his family, and plans to collect leaves from the ancient
    forests of Japan's Yakushima Island on his next school break.
  culinary: Jon Field favors crunchy carrot sticks, cheesy pizza bites, and homemade spaghetti with hidden zucchini ribbons, can follow simple recipes on his kid‑friendly kitchen station, and often insists
    on adding extra sprinkles to his fruit smoothies.
  core: Jon Field blends a meticulous love for LEGO architecture with a boundless curiosity for nature, yet can't resist snacking on sugary cereal late at night before bedtime.
background:
  cultural: Jon grows up in a predominantly white, middle-class family in Portland, Oregon, where the community emphasizes environmental stewardship, outdoor recreation, and progressive social values. His
    parents encourage curiosity, hands-on learning, and respect for diverse cultures, often taking him to multicultural festivals and library story times that feature stories from different backgrounds.
    The local culture of biking, hiking, and support for the arts shapes his outlook, blending a traditional American upbringing with the city's forward-thinking, eco-centric spirit.
