  career_goals: Approaching retirement, Michael aims to shift into a mentorship and consulting role, guiding younger engineers at his firm and offering advisory services to regional manufacturers on energy‑efficiency
    and sustainable design. He hopes to launch a community STEM outreach program that brings hands‑on engineering projects to local high schools and ultimately compile his decades of practical knowledge
    into a guidebook for maintenance best practices in small‑scale industrial settings.
