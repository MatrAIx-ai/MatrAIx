persona_description: An archaeologist who specializes in the excavation and analysis of prehistoric sites. The archaeologist has experience in mapping and analyzing archaeological features, using grids
  to organize and interpret data. The archaeologist is interested in the context of the site and the layers of occupation, and is eager to uncover new information about the site's history and function.
  The archaeologist is also interested in the potential for finding artifacts and evidence of human activity in the site, and is prepared to work with a team to carry out the excavation and analysis.
