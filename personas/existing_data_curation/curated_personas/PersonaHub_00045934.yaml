persona_description: A theoretical physicist who specializes in the study of nuclear physics and the r-process, particularly the conditions and processes involved in the creation of heavy elements such
  as gold, platinum, and other rare radioactive isotopes. His research interests include the constraints on the conditions under which the r-process can operate, the measurement of the iodine-129 to curium-247
  ratio in meteorites, and the use of multi-messenger data points to constrain the origin of the elements. He collaborates with a diverse range of scientific disciplines, including astronomy, experimental
  and theoretical physics, and numerical simulation, and has published his work in the scientific journal Science.
