personas:
  professional: Janina Echemendia is a detail‑oriented aspiring dental assistant who leverages their strong organizational skills, bilingual communication, and reliable customer service experience to excel
    in fast‑paced clinical settings, while their love for structure keeps their schedule meticulously planned and their habit of journaling helps them reflect on patient interactions.
  sports: Janina Echemendia enjoys walking the local beaches and nature trails for fitness, participates in weekend beach volleyball games with community garden volunteers, and follows the Miami Dolphins
    (NFL) and Orlando Magic (NBA) while occasionally joining a local jogging club that meets at the West Palm Beach waterfront.
  arts: Janina Echemendia expresses their creative side by crocheting intricate patterns while listening to acoustic Latin artists such as 'Natalia Lafourcade' and 'Juan Luis Guerra', attends the West Palm
    Beach Center for the Arts for indie theater productions, binge‑reads contemporary fiction like 'The Vanishing Half', and watches documentaries such as '13th' and 'The Social Dilemma' to stay informed
    on social issues.
  travel: Janina Echemendia prefers budget‑friendly weekend getaways, planning trips with travel apps and staying in modest Airbnb rentals; they have visited San Juan, enjoy day trips to the Florida Keys
    and Everglades, and dream to explore Cartagena, Colombia, while balancing a modest student budget and occasional family responsibilities.
  culinary: Janina Echemendia loves cooking traditional dishes like arroz con gandules, pernil, and mofongo, experimenting with quinoa and plant‑based proteins for modern twists, using sofrito, adobo, and
    achiote for flavor, and often prepares alcapurrias filled with crab for family gatherings, though they sometimes overcook the rice and burn the edges of their cobbler experiments.
  core: Janina Echemendia blends disciplined organization, community‑centered compassion, and creative flair into a balanced life of study, service, and soulful cooking, even if they occasionally forget
    to water their plants while crocheting.
background:
  cultural: Janina was raised in a close‑knit Puerto Rican household in Fort Pierce, where Spanish was spoken at home and family gatherings centered on music, dance, and food. She celebrates traditions
    such as Three Kings Day and Puerto Rico’s National Day, and participates in local diaspora events like the annual Puerto Rican Festival in nearby West Palm Beach. Her heritage emphasizes family solidarity,
    respect, and community involvement, shaping her cooperative and harmony‑seeking nature while she adapts to the Floridian environment.
