  hobbies: '[''Crocheting'', ''Beach walking and nature hikes'', ''Journaling'', ''Cooking Puerto Rican cuisine'', ''Community garden volunteering'', ''Reading contemporary fiction'', ''Documentary watching'']'
  career_goals: Janina aims to enroll in a community‑college program to become a dental assistant or health‑care administrative professional, seeking a stable and structured career that allows her to support
    her family. She plans to earn an associate degree in health sciences and eventually transition into patient care or health education. Additionally, she hopes to obtain a culinary certification to launch
    a small catering venture focused on modern twists of Puerto Rican cuisine.
