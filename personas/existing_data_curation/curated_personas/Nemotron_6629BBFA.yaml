personas:
  professional: Marlon Ussin is a freelance multimedia storyteller who blends graphic design, video production, and digital illustration using Adobe Creative Suite and basic web tools to craft community-focused
    narratives, letting their boundless imagination and relaxed approach to deadlines drive bold, improvisational campaigns for local nonprofits and small businesses.
  sports: Marlon Ussin follows the New Orleans Saints and the LSU Tigers with fervor, participates in a community basketball league at the Bogalusa Recreation Center, hikes the local bayou trails every
    weekend with a small crew, and squeezes in occasional pick-up volleyball games at the town’s park, preferring low-pressure, socially engaging activities over solo gym sessions, and they relish the camaraderie
    of team sports.
  arts: Marlon Ussin is a visual and spoken-word artist who channels the blues of B.B. King, the poetry of Langston Hughes, and the avant-garde cinema of Barry Jenkins into acrylic murals, street-level
    photography, and nightly open-mic performances, constantly curating a blend of Southern rhythm and sci-fi imagination that defines their creative identity.
  travel: Marlon Ussin prefers road-trip adventures that combine cultural immersion and river scenery, having road-tripped to New Orleans for its jazz heritage, explored the historic streets of Savannah,
    and taken a weekend kayak journey through the Atchafalaya Basin, while dreaming of a future solo art retreat in Oaxaca, Mexico, despite a modest travel budget that forces careful planning, and they
    often map out routes on a handwritten notebook.
  culinary: Marlon Ussin loves the bold flavors of gumbo, jambalaya, and beignets, frequently cooking with okra, Andouille sausage, and cayenne pepper, yet their culinary skill hovers at enthusiastic amateur
    level, leading them to experiment with fusion dishes like Creole-spiced ramen while often ordering takeout after late-night studio sessions.
  core: Marlon Ussin is a restless 24-year-old creator who transforms riverbanks into canvases, thrives on spontaneous collaborations, yet habitually procrastinates on invoices, forgets to water houseplants,
    and they often lose track of time when immersed in a new project.
background:
  cultural: Marlon grew up in the historically Black neighborhoods of Bogalusa, Louisiana, a small city with deep Southern roots and a legacy of civil‑rights activism. His family’s traditions blend African‑American
    church culture—gospel music, Sunday potlucks, and oral storytelling—with the region’s Creole and Cajun influences, especially in cuisine and rhythm. Raised on blues, jazz, and early‑2000s hip‑hop, these
    musical styles shaped his artistic voice and love for improvisation. The close‑knit community emphasized resilience, collective support, and pride in local heritage, encouraging Marlon to celebrate
    his identity through art. He frequently references the city’s river folklore and the legacy of local civil‑rights leaders in his work, aiming to preserve and reinterpret the cultural narratives of the
    Black South for younger generations.
