  career_goals: Marlon aims to transform his creative passions into a sustainable career. In the short term, he plans to secure freelance multimedia projects that allow him to blend graphic design, video
    production, and storytelling for local businesses and nonprofit organizations. Over the next three to five years, he intends to complete a bachelor’s degree in Visual Arts or Communication, earn certifications
    in UX/UI design, and obtain a role as a creative coordinator at a regional cultural center where he can curate exhibitions and lead youth art programs. Ultimately, he aspires to launch his own boutique
    agency focused on community‑driven branding, produce large‑scale public murals across the South, and organize an annual Bogalusa Creative Festival that showcases emerging Black artists and celebrates
    Southern cultural heritage.
