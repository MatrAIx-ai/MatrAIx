personas:
  professional: Etoile Roby, an 88‑year‑old retired community coordinator, channels their methodical organization and insatiable curiosity about local history into orchestrating senior‑center events, guiding
    genealogy workshops, and documenting Baltimore’s heritage through a memoir and public talks.
  sports: Etoile Roby is a devoted fan of the Baltimore Orioles in spring and the Ravens in fall, following games from their porch while maintaining fitness through gentle tai chi and participating in a
    neighborhood walking group that meets twice a week.
  arts: Etoile Roby, a watercolor painter, captures the Chesapeake shoreline in pastel hues inspired by Claude Monet, while evenings are filled with the smooth sounds of Louis Armstrong and Ella Fitzgerald
    and they frequently reference the poetry of Emily Dickinson and Robert Frost during their community storytelling circles.
  travel: Etoile Roby prefers thoughtfully planned, low‑stress journeys, cherishing past visits to Annapolis’s historic harbor, Savannah’s riverfront squares, and Washington, D.C.’s museums, and they now
    dream of a leisurely Danube river cruise that combines gentle sightseeing with onboard lectures on maritime history.
  culinary: Etoile Roby, an accomplished home chef, expertly prepares Southern comfort staples such as buttery cornbread, slow‑cooked collard greens, and Chesapeake Bay crab cakes seasoned with home‑grown
    basil and thyme, often pairing meals with sweet tea and delighting in weekly trips to the local farmers’ market for fresh produce, and they take pride in serving these dishes to friends and neighbors
    during intimate gatherings.
  core: Etoile Roby, an 88‑year‑old archivist of memories, merges solitary curiosity with meticulous organization, and they find solace in watercolor sunsets, tai chi serenity, and a quirky habit of knitting
    an extra scarf for every crossword puzzle completed.
background:
  cultural: Etoile Louise Roby is an African‑American woman whose roots run deep in Baltimore County's Black community. Raised in a close‑knit family, she grew up with the church, soul food, and the storytelling
    traditions that preserve family history. The cultural fabric of Sparrows Point—once a steel‑town with a vibrant Black workforce—shaped her appreciation for resilience, community solidarity, and the
    value of hard work. Her culinary style blends Southern comfort dishes with Chesapeake Bay seafood, reflecting both regional and cultural influences. Throughout her life, she has participated in local
    cultural events such as Juneteenth celebrations, the Maryland Historical Society's African‑American heritage programs, and neighborhood arts workshops, fostering a lifelong curiosity for art, history,
    and new ideas.
attributes:
  skills: '["Southern comfort cooking & Chesapeake Bay seafood recipes", "Sewing and quilting", "Event coordination and schedule planning", "Budget management for community projects", "Local Baltimore history
    research and genealogy", "Basic digital literacy (email, video calls, online banking)", "Art appreciation and museum guidance", "Storytelling and oral history documentation"]'
  hobbies: '["Reading historical fiction, poetry, and African‑American biographies", "Watercolor painting of gardens and waterfront scenes", "Herb and flower gardening", "Birdwatching from the porch", "Listening
    to jazz, blues, and gospel music", "Knitting scarves and crocheting blankets for charity", "Crossword puzzles and brain teasers", "Attending church services and choir rehearsals"]'
  career_goals: Although retired, Etoile is motivated to keep her mind active and her legacy vibrant. She aims to finish a memoir that weaves personal memories with the broader history of Baltimore's Black
    community, and to compile a family genealogy archive for future generations. She also hopes to mentor a few younger neighbors at the senior center, teaching sewing, cooking, and research skills. Maintaining
    her health, she plans to attend weekly tai chi classes and keep her gardening plots thriving. Ultimately, she wants her contributions to preserve cultural heritage and inspire curiosity in others.
