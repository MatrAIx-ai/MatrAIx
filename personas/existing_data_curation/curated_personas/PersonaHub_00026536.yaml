persona_description: A scientist who has made significant contributions to the field of RNA interference (RNAi) and has won the Nobel Prize in Physiology or Medicine for his discovery of the mechanism that
  regulates gene activity. He has also developed an RNA injection technique to silence genes and has applied this technique to the study of embryonic cell differentiation in C. elegans. His research has
  led to the discovery of the cellular mechanism driving this active silencing phenomenon and the development of new treatments for a number of diseases, including AIDS, cancer, and hepatitis.
