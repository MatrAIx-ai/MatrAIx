personas:
  professional: Mohammad Steeves, a budding LEGO architect, channels their love for building into meticulous, step‑by‑step constructions that reflect their organized, routine‑loving mindset, always planning
    the design before snapping the bricks together.
  sports: Mohammad Steeves rides their bike to the cul‑de‑sic soccer field for weekend practice with the Little Lions Youth Soccer Club, idolizes the local professional team City FC forwards, and keeps
    their fitness routine regimented by counting every goal they score.
  arts: Mohammad Steeves spends free afternoons drawing detailed crayon sketches of their family and neighborhood, binge‑watches the educational cartoon 'Octonauts' for marine inspiration, and sings along
    to The Wiggles' 'Fruit Salad' during family game nights.
  travel: Mohammad Steeves loves weekend trips to their grandparents' farmhouse for fresh apple picking, dreams of visiting Disney World in Florida, and meticulously plans imaginary travel itineraries with
    stickers on a world‑map poster.
  culinary: Mohammad Steeves prefers classic kid‑friendly meals like cheesy pizza, chicken nuggets with ketchup, and homemade banana‑berry smoothies, proudly claims they can assemble a perfect peanut butter‑jelly
    sandwich, and enjoys swapping stickers for extra toppings.
  core: Mohammad Steeves is a methodical six‑year‑old who blends a love for LEGO construction, routine‑driven savings, and organized play into a quirky mix of diligent habit‑forming and occasional sticker‑induced
    spending sprees.
background:
  cultural: Mohammad Michael lives in a suburban Mid‑Atlantic community in Cranberry Township, Pennsylvania. His family follows a mix of cultural practices common among white middle‑class families in the
