persona_description: A 62-year-old male with a history of smoking and past cavitary tuberculosis, recently receiving cytostatic therapy for acute myeloblastic leukaemia. He is currently experiencing shortness
  of breath and has been diagnosed with cavitary lesions in the lungs, with tubular eukaryotic septated hyphae and conidia with spores. The biopsy specimen shows septated hyphae with conidia, and the organism
  has been identified as a fungus. The disease is likely systemic, affecting the lungs, and the organism has septated hyphae with conidia. There are no other possibilities for the disease.
