personas:
  professional: A seasoned retail cashier with over thirty years of hands‑on experience, Alejandro Campuzano excels at precise cash handling, bilingual customer service, and inventory tracking, and channels
    his structured practicality and calm resilience into mentoring new staff while eyeing a shift‑lead supervisory role.
  sports: Alejandro Campuzano follows Charlotte FC and the local Charlotte Independence while passionately rooting for the national soccer team of his homeland, enjoys watching matches during community
    TV nights, and stays active through low‑impact park walks and weekly dominoes gatherings that double as social exercise.
  arts: Alejandro Campuzano delights in Latin rhythms, frequently dancing to songs by Juan Luis Guerra, Marc Anthony, and Shakira at senior dance classes, and regularly attends local Hispanic cultural performances
    showcasing folkloric music and step‑dance, which enrich his sense of identity.
  travel: Alejandro Campuzano prefers relaxed, family‑oriented trips, planning road‑ready getaways to coastal towns like Key West and historic cities such as San Miguel de Allende, while dreaming of attending
    the vibrant Carnival in his hometown’s city, balancing budget constraints with a love for cultural immersion.
  culinary: Alejandro Campuzano enjoys preparing traditional dishes like baleadas, tamales, and yuca frita, skillfully seasoning them with onions, cilantro, and ripe plantains, and is experimenting with
    a modestly ambitious side kiosk that offers these snacks at local festivals.
  core: Alejandro Campuzano is a sociable, structure‑loving retiree who blends cash‑register precision with community‑center charisma, often juggling a love for dominoes, soccer, and cooking while occasionally
    forgetting to file that one overdue tax form.
background:
  cultural: Alejandro was born and raised in Honduras before immigrating to the United States as a young adult. He carries deep-rooted Hispanic cultural values, including strong family ties, respect for
    elders, and a Catholic upbringing that influences his community involvement. He celebrates Honduran traditions such as Independence Day, La Ceiba's Carnival, and seasonal holidays with vibrant food,
    music, and dance. In Charlotte, he actively participates in local Hispanic associations, helping preserve his heritage while integrating into the broader American culture, and he often serves as a cultural
    bridge for newer immigrants in his neighborhood.
