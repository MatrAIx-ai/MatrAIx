  career_goals: Alejandro aims to transition from a front‑line cashier to a supervisory role, such as shift lead or assistant store manager, where he can apply his practical experience and mentor younger
    colleagues. He plans to enroll in short‑term management workshops offered by his employer to strengthen leadership skills. In the longer term, he hopes to secure a part‑time position that balances income
    stability with flexibility, allowing him to pursue community projects or a modest side venture—perhaps a small kiosk selling traditional Honduran snacks at local festivals—while still staying connected
    to the workforce he values.
