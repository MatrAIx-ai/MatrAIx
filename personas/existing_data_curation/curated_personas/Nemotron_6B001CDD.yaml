    Office proficiency'']'
  hobbies: '[''Hiking in Redwood forests'', ''Bird-watching'', ''Reading (science fiction, history)'', ''Woodworking'', ''Scale model building'', ''Cooking (structured recipes)'', ''Single-player puzzle/strategy
    video games'', ''Listening to medical and true crime podcasts'', ''Small community book club'', ''Gardening'']'
  career_goals: Gabriel aims to earn the Certified Medical Transcriptionist credential and advance to a senior or lead transcriptionist role within his organization, where he can mentor newer staff and
    shape quality‑control processes. He is also exploring a transition into medical coding and health information management to broaden his skill set and increase his earning potential. In the longer term,
    Gabriel hopes to establish a boutique freelance transcription service that specializes in high‑complexity specialties such as oncology and cardiology, allowing him to work remotely while maintaining
    a predictable schedule.
