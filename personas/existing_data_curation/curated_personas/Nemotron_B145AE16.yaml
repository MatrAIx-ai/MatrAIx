  career_goals: Looking ahead, Asghar dreams of a career that combines his caring personality with his interest in science and problem‑solving. He often talks about becoming a pediatrician or a biomedical
    engineer, motivated by the desire to help others and create useful tools. He also imagines working in technology, perhaps designing educational software that makes learning fun for kids like himself.
    While his ambitions are lofty, he sometimes worries about meeting his family’s high expectations and the effort required, yet his practical side keeps him focused on steady progress through school and
    extracurricular learning.
