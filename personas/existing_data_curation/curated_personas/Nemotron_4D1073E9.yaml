personas:
  professional: Jose Soledad, a seasoned industrial boiler specialist, leverages their expertise in ASME‑compliant maintenance, water‑chemistry analysis, and PLC programming to lead shift teams with a structured,
    cost‑saving mindset while mentoring junior technicians toward predictive‑maintenance goals.
  sports: Jose Soledad, a devoted fisherman at the Guadalupe River and member of the local Anglers Association, also hikes the Hill Country trails on weekends, follows the Texas Rangers, Dallas Cowboys,
    and San Antonio Spurs, and plays occasional pickup soccer with a community center team to stay active.
  arts: Jose Soledad finds creative release by strumming a guitar at Tejano and Texas country music gatherings, admiring artists like Pat Green, George Strait, and the Texas Playboys, while devouring historical
    novels from authors such as Cormac McCarthy and reading technical manuals that fuel their analytical side.
  travel: Jose Soledad prefers meticulously planned road trips, having explored the Texas Hill Country wineries, the historic Alamo in San Antonio, and a weekend fishing retreat in New Mexico, while dreaming
    of a future pilgrimage to the vineyards of Mendoza, Argentina, though work schedules often limit travel time.
  culinary: Jose Soledad cooks with a confident hand, regularly preparing carnitas tacos, chiles rellenos, and pozole for friends, expertly using chipotle, cumin, and fresh corn masa, while also mastering
    Texas‑style brisket rubs that blend smoked paprika, brown sugar, and black pepper.
  core: Jose Soledad blends technical rigor with hands‑on hobbies, juggling boiler engineering, woodworking, and community teaching while battling stress‑driven health concerns and a meticulous, budget‑conscious
    lifestyle.
background:
  cultural: Jose was raised in a close‑knit Mexican‑American family in San Antonio, where he grew up bilingual in Spanish and English. He celebrates Dia de los Muertos and other Mexican traditions while
    also embracing Texan customs, such as participating in local festivals and enjoying Tex‑Mex cuisine. His Catholic faith and family gatherings instilled values of hard work, respect for elders, and community
    service. These cultural influences shape his pride in his heritage, his love for Mexican food and music, and his commitment to supporting the local Mexican community.
attributes:
  skills: '["Boiler operation", "Preventive maintenance", "Industrial HVAC systems", "Troubleshooting and diagnostics", "ASME code compliance", "OSHA safety protocols", "Blueprint reading", "Basic PLC programming",
    "Water treatment management", "Team leadership", "Shift scheduling"]'
  hobbies: '["Woodworking", "Fishing", "Cooking Mexican cuisine", "Attending Tejano music events", "Playing guitar", "Reading technical and historical books", "Volunteering for youth STEM programs", "Hiking",
    "Gardening"]'
  career_goals: Jose aims to advance to a senior plant engineer or maintenance supervisor role within the next five years, obtaining a Professional Engineer (PE) license and specialized certifications such
    as Certified Plant Engineer (CPE). He wants to lead the implementation of predictive maintenance technologies using IoT sensors to reduce downtime and stress associated with emergency repairs. Long‑term,
    he envisions starting his own small engineering consultancy to help local manufacturers improve operational efficiency while maintaining a predictable work schedule that supports his mental well‑being.
