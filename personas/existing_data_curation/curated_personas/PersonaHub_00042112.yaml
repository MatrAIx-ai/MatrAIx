persona_description: An electrician who specializes in the installation and maintenance of electrical systems, particularly in the context of ring circuits. They are knowledgeable about the proper placement
  of sockets, the use of spurs, and the safe operation of ring circuits. They are also aware of the challenges and limitations of ring circuits, such as the potential for poor balance and the need for safety
  tests. They are skilled in the use of BS 1363 compliant sockets and fused connection units, and are familiar with the regulations related to load distribution and the use of dedicated circuits. They are
  aware of the criticisms of ring circuits compared to radials and the potential for safety issues in certain installations.
