personas:
  professional: Sharon Mcnab, a two‑year‑old who loves to host impromptu “gallery openings” in the living room, uses a mismatched assortment of crayons, stickers, and construction paper to showcase experimental
    art, showing early signs of a future creative professional who values flexibility over strict planning and thrives on the applause of family members.
  sports: Sharon Mcnab, a two‑year‑old who attends toddler soccer sessions at the community park and splashes enthusiastically in a local kids’ swim class, proudly chants for the Chicago Cubs while fiercely
    competing to be the first to climb the climbing wall.
  arts: Sharon Mcnab, a two‑year‑old enchanted by the vivid murals in children’s books and the lively tunes of Disney soundtracks, often imitates the brush strokes of Van Gogh’s “Starry Night” with finger
    paints, and is fascinated by the animated performances of The Wiggles.
  travel: Sharon Mcnab, a two‑year‑old who has already enjoyed a family road trip to the Grand Canyon and a weekend stay at a seaside resort in Myrtle Beach, dreams of visiting the colorful LegoLand in
    Denmark and loves the routine of packing with her favorite stuffed giraffe for every journey.
  culinary: Sharon Mcnab, a two‑year‑old with a selective palate that cherishes pureed sweet potatoes, banana slices, and cheese cubes, can expertly spread peanut butter on toast but stubbornly refuses
    broccoli, often negotiating extra dessert in exchange for finishing meals.
  core: Sharon Mcnab, a wildly curious two‑year‑old who craves the spotlight, thrives on artistic experimentation, competitively dismantles puzzles, yet worries about losing her favorite toys and leaves
    a trail of crayons in every room.
background:
  cultural: Sharon grows up in South Portland, Maine, a coastal New England community with a strong heritage of modesty, community involvement, and a close connection to the sea. Her white, middle‑class
    family participates in seasonal traditions such as spring festivals, fresh‑seafood meals, and local library events. The region’s emphasis on outdoor activities, maritime history, and supportive neighborhood
    networks shapes her appreciation for nature, seasonal crafts, and communal storytelling, while also reinforcing cultural expectations of politeness, resilience, and a love for shared experiences.
attributes:
  skills: '[''walking independently'', ''running short distances'', ''climbing stairs'', ''stacking blocks'', ''crayon drawing'', ''basic color and shape recognition'', ''simple sentence formation'', ''storytelling
