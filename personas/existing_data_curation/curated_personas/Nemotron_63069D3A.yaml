  hobbies: '[''crayon drawing'', ''finger painting'', ''making paper collages'', ''listening to children’s songs'', ''dancing'', ''group storytime at the library'', ''collecting shells at the beach'', ''building
    sandcastles'', ''pretend kitchen role‑play'', ''mini stage performances'']'
  career_goals: Even at two, Sharon loves to imagine future roles. She often declares she wants to be a "teacher" because she enjoys showing her toys to other kids, a "painter" to keep creating bright pictures,
    and a "performer" who can stand in front of friends and family to make them laugh. Her ambitions are fueled by her love of attention, her competitive streak when building the tallest block tower, and
    her desire to be admired, so she seeks opportunities to lead playtime and receive praise. Though still playful, she expresses an early aspiration toward creative, people‑focused fields where she can
    share art and stories.
