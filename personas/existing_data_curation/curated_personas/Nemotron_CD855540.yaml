    maintenance'', ''Regulatory compliance (USDA, Ohio Dept. of Agriculture)'', ''Small‑scale agritourism planning'']'
  hobbies: '[''Backyard vegetable gardening'', ''Canning and preserving'', ''Quilting'', ''Birdwatching'', ''Reading historical fiction'', ''Crossword puzzles and Sudoku'', ''Walking nature trails'', ''Cooking
    traditional Midwestern dishes'']'
  career_goals: Approaching retirement, Jan Ann’s primary goal is to secure the long‑term viability of the family farm and ensure a smooth transition to her children and grandchildren. She aims to increase
    efficiency by integrating modest precision‑farm tools—such as soil moisture sensors and a solar‑powered water pump—to cut labor and utility costs. Diversifying income is also a priority; she plans to
    expand the on‑farm market stand, launch a modest Community Supported Agriculture (CSA) program, and occasionally host farm‑tour days for local schools. While competitive in seeking the best market prices,
    she remains cautious and skeptical of new partnerships, preferring to vet opportunities thoroughly to protect the farm’s legacy. Personal health and stress reduction are also part of her ambition, as
    she seeks a balanced workload that allows her to enjoy her later years without undue worry.
