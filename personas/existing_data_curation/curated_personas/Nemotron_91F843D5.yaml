  career_goals: David’s overarching goal is to create a meaningful legacy for his family and the local Puerto Rican community in York County. He plans to compile a memoir—filled with photographs, anecdotes,
    and family genealogy—that preserves his cultural heritage and the story of his migration to the American South. He aspires to mentor younger volunteers at the senior center, teaching practical trade
    skills and encouraging curiosity about the arts. Within the next two years, he hopes to travel back to Puerto Rico to reconnect with relatives, attend the San Sebastián Street Festival, and document
    traditional culinary techniques. He also aims to secure a stable financial cushion for his wife, ensure their home remains in good repair, and continue contributing as an advisor for community art projects
    and cultural events.
