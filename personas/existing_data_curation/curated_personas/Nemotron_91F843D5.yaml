personas:
  professional: David Perezrodriguez, a retired maintenance supervisor with 35 years of hands‑on experience in carpentry, plumbing and electrical troubleshooting, now channels their practical problem‑solving
    and organizational skills into coordinating senior‑center art workshops, community event planning, and volunteer translation services, blending a curious, open‑minded approach with a reliable, assertive
    leadership style.
  sports: David Perezrodriguez enjoys watching the Carolina Panthers and the Greenville Drive while playing weekly pickleball at the York County senior recreation center, and they cheer for the local bowling
    league’s senior team, balancing a love of community sports with a low‑impact fitness routine that keeps them energetic for dance events.
  arts: David Perezrodriguez immerses themselves in the works of Frida Kahlo, Diego Rivera, and contemporary island painter José Campeche, while frequently listening to Celia Cruz, Tito Puente, and Miles
    Davis, and leads senior‑center discussion circles that explore the intersection of jazz improvisation and Latin rhythm, reflecting their curiosity and appreciation for vibrant artistic expression.
  travel: David Perezrodriguez plans trips that blend purposeful family reunions with cultural exploration, having already visited New Orleans for its jazz scene and now eagerly anticipating a pilgrimage
    to the San Sebastián Street Festival, while they prefer to book travel well in advance to accommodate their modest budget and health considerations.
  culinary: David Perezrodriguez delights in preparing arroz con gandules, pernil, and tembleque, often infusing Southern touches like smoked paprika or collard greens, and they tend a patio garden of basil,
    oregano, and tomatoes that flavors their sofrito, while their occasional habit of over‑salting dishes reveals a passionate, sometimes impatient, kitchen style.
  core: David Perezrodriguez is a socially vibrant, worry‑prone retiree who blends practical trade skills with a fervent love of art, music, and cooking, using their curiosity to mentor others while occasionally
    letting stress drive a tendency to overcommit.
background:
  cultural: David was born to Puerto Rican parents who settled in the United States during the 1950s. He grew up speaking Spanish at home and was immersed in the island’s rich traditions of music, dance,
    and cuisine. The family’s Catholic faith shaped many holidays, with celebrations of Christmas, Three Kings’ Day, and the Feast of Saint John (Noche de San Juan) marking his calendar. After relocating
    to South Carolina in his early thirties, David blended his Caribbean heritage with Southern hospitality, becoming an active member of the local Latino cultural association. He regularly shares Puerto
    Rican recipes, teaches traditional dances, and participates in cultural festivals that highlight the island’s history. His bilingualism and deep sense of familismo inform his strong commitment to family,
    community, and preserving his cultural legacy for future generations.
