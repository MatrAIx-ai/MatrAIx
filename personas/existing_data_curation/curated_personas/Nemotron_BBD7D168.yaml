  hobbies: '[''woodworking'', ''bass fishing'', ''model diesel engine building'', ''chess'', ''church music ministry'', ''DIY home improvement projects'']'
  career_goals: Shedrick aims to advance into a maintenance supervisory role within the next three years, securing certifications such as ASE and a specialized refractory technology credential. He plans
    to lead a small team, implement data‑driven maintenance strategies, and reduce equipment downtime for his plant. Long‑term, he envisions opening a boutique contract maintenance shop serving the manufacturing
    corridor of southern Georgia, allowing him to combine his technical expertise with entrepreneurial ambitions while maintaining a predictable schedule for his family.
