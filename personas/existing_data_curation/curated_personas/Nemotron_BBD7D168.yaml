personas:
  professional: Shedrick Boatmon, a meticulous industrial maintenance technician specializing in hydraulic and pneumatic systems and refractory machinery, leverages precision welding, CNC calibration, and
    rigorous OSHA‑compliant record‑keeping to keep plant equipment humming, while eyeing a supervisory role within three years that will let they implement data‑driven maintenance strategies, earn ASE and
    refractory technology certifications, and eventually launch a boutique contract maintenance shop serving southern Georgia’s manufacturing corridor.
  sports: Shedrick Boatmon, a devoted bass fisherman, spends early mornings casting from Georgia’s tranquil ponds, competes in the local Georgia Bass Anglers Club tournaments, they follow the Atlanta Braves
    with a modest season ticket, and occasionally joins a weekend weight‑lifting group at the community recreation center to stay fit.
  arts: Shedrick Boatmon, a choir member who sings tenor in his church’s music ministry, finds solace in gospel hymns by Mahalia Jackson and the storytelling of folk legend John Prine, while they enjoy
    listening to the blues‑infused guitar work of Stevie Ray Vaughan during model diesel engine sessions, and they treat their woodworking projects as functional art, often finishing pieces with hand‑carved
    inlays inspired by the natural grain.
  travel: Shedrick Boatmon, a weekend road‑tripper, has mapped out day‑long getaways to the Great Smoky Mountains for hiking and fishing, dreams of a guided fly‑fishing expedition in Alaska’s remote rivers,
    and they schedule occasional trips to Nashville to catch live songwriting sessions, all while balancing a tight work schedule and a modest travel budget.
  culinary: Shedrick Boatmon, a self‑taught grill master, prefers cooking his fresh‑caught bass on cedar planks brushed with lemon‑herb butter, they pair it with collard greens seasoned with smoked paprika,
    and occasionally experiment with a low‑and‑slow smoked pork shoulder that features a rub of brown sugar, garlic, and rosemary, reflecting their love for Southern comfort flavors and hands‑on cooking.
  core: Shedrick Boatmon blends a methodical, worry‑prone mindset with a love for solitary craftsmanship, quiet fishing, and disciplined work routines, while they quietly battle skepticism and occasional
    over‑cautiousness.
background:
  cultural: Shedrick is an African‑American raised in Lee County, Georgia, where his family’s roots trace back to the post‑civil‑rights era in the rural South. The close‑knit community, church involvement,
    and a family tradition of skilled trades have shaped his work ethic and sense of responsibility. He grew up listening to gospel music, attending church potlucks, and learning the value of self‑reliance
    and mutual aid from neighbors. These cultural influences inform his preference for structure, his commitment to providing for his married partner and future children, and his participation in community
    service projects that emphasize practical help over rhetoric.
attributes:
  skills: '[''hydraulic system troubleshooting'', ''pneumatic system repair'', ''MIG/TIG welding'', ''technical schematic interpretation'', ''preventive maintenance scheduling'', ''CNC machine setup and
