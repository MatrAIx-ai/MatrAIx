personas:
  professional: Ronnie Buggage is a retired literary scholar and archivist whose meticulous project‑management skills, disciplined work ethic, and vivid imagination drive the curation of regional history
    exhibits, community writing workshops, and a forthcoming memoir that intertwines personal narrative with Southern heritage.
  sports: Ronnie Buggage enjoys low‑impact fitness through early morning walks along the Congaree River trail, occasional senior‑league tennis matches at the Columbia Country Club, and follows the Columbia
    Fireflies and Clemson Tigers, while also participating in the Columbia Senior Cyclists club for gentle weekend rides.
  arts: Ronnie Buggage is an avid watercolorist and calligrapher who draws inspiration from the brushwork of Winslow Homer and the lyrical flow of John Steinbeck’s prose, spends evenings listening to Miles Davis,
    Ella Fitzgerald, and Mahalia Jackson, and curates photo essays that capture sunrise shadows over historic neighborhoods, often citing the works of Ansel Adams and contemporary photographer Sally Mann.
  travel: Ronnie Buggage favors thoughtfully planned journeys that blend quiet reflection with cultural immersion, having revisited Charleston’s historic district and Asheville’s Blue Ridge vistas, and
    dreaming of a scholarly pilgrimage to Dublin’s literary pubs and Kyoto’s temple gardens, all while balancing travel costs against the modest scholarship fund they administer.
  culinary: Ronnie Buggage delights in Southern comfort cuisine, regularly preparing shrimp and grits with locally sourced Gulf shrimp, collard greens simmered with smoked turkey, and cornbread baked with
    stone‑ground cornmeal, while their modest cooking skill is complemented by a penchant for sourcing heirloom tomatoes, okra, and fresh herbs for seasonal salads.
  core: Ronnie Buggage is a contemplative archivist‑poet whose disciplined solitude fuels a lifelong quest to weave personal memory into regional history, even as worry and occasional neglect of self‑care
    linger like unfinished brushstrokes.
background:
  cultural: Ronnie is an African‑American man whose life is rooted in the rich cultural tapestry of the South. Born and raised in Lexington County, he grew up hearing stories of the civil‑rights era from
    his parents and grandparents, who migrated from the rural Delta during the Great Migration. The church, gospel music, and community gatherings have shaped his values of resilience, collective uplift,
    and reverence for storytelling. He actively participates in the Columbia African‑American Historical Society, celebrates traditional Gullah cuisine during holidays, and draws inspiration from Black
    literary icons such as Langston Hughes, Zora Neale Hurston, and contemporary Southern poets. His marriage provides a supportive partnership that honors both his personal ambitions and his dedication
    to preserving and advancing Black cultural heritage.
attributes:
  skills: '["Literary analysis", "Historical research", "Creative writing", "Project management", "Archival preservation", "Community workshop facilitation", "Mentoring", "Budget planning", "Watercolor
