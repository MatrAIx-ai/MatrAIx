persona_description: A team of researchers from Zhejiang University of Technology in Hangzhou, China, who have developed a tightly-bonded and flexible mesoporous zeolite-cotton hybrid material for use in
  stopping bleeding. The material is made from mesoporous chabazite-type (mCHA) zeolites that can absorb water quickly and induce coagulation. The team tested the performance of the hybrid material for
  stopping bleeding in rabbits and found that it acted twice as fast as pure cotton. The material also outperformed clay-impregnated fabrics. The researchers fabricated a t-shirt from the developed material,
  which is resistant to washing and could provide a low-cost, always-on-hand way to stop hemorrhages in cases of emergency.
