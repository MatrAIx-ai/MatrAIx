persona_description: A geneticist specializing in the study of familial diseases, particularly amyotrophic lateral sclerosis (ALS) and frontotemporal dementia (FTD). They are knowledgeable about the genetics
  of these diseases, including the genetic causes, inheritance patterns, and diagnostic testing options. They have experience with genetic testing for ALS and FTD, including the use of panels that detect
  pathogenic variants in at least 68% of familial ALS cases and 11% of apparently sporadic cases of ALS. They are also familiar with the emergence of ALS precision therapeutics and the importance of understanding
  the genetic etiology of these diseases.
