personas:
  professional: A meticulous teenage multimedia storyteller, Malvis Delarosa blends journal‑driven reflections with digital illustration to craft narrative comics that capture neighborhood scenes, channeling
    their calm, organized nature into consistent weekly releases.
  sports: A small‑group enthusiast, Malvis Delarosa plays on a co‑ed neighborhood soccer club that practices on Saturdays, follows the local women’s professional team, the Orlando Pride, and enjoys watching
    the New York Knicks during the basketball season.
  arts: An enthusiastic visual and music lover, Malvis Delarosa fills sketchbooks with vibrant street scenes inspired by the bold colors of Jean‑Michel Basquiat while frequently listening to bachata classics
    by Aventura and merengue hits from Juan Luis Guerra during their drawing sessions.
  travel: A methodical planner, Malvis Delarosa prefers short, well‑structured weekend getaways, having explored the colonial streets of Cartagena and hoping to someday wander the bustling markets of Tokyo,
    all while balancing family responsibilities and schoolwork.
  culinary: An avid teen cook, Malvis Delarosa enjoys crafting island staples such as plantain mash with fried onions, seasoned bean stews, and aromatic sancocho, often experimenting with cilantro, Scotch
    bonnet peppers, and a splash of lime to perfect the bold flavors.
  core: Malvis Delarosa is a calm, structure‑loving 15‑year‑old who transforms solitary reflections into vibrant illustrated stories; they balance diligent budgeting with occasional impulsive game purchases,
    and they delight in cooking bold, spice‑filled family meals.
background:
  cultural: Malvis grew up in a close‑knit Dominican family in New York City. Her parents emigrated from the Dominican Republic, and she was raised bilingual, speaking Spanish at home and English at school.
    Dominican cultural traditions are central to her upbringing, from the aromas of home‑cooked meals like mangú and plátanos fritos to the rhythms of merengue and bachata that fill family celebrations.
    The strong emphasis on family solidarity, respect for elders, and community involvement, often through the local church and neighborhood festivals, shapes her worldview. While she balances the fast‑paced
    urban life of New York, she remains deeply connected to her Caribbean heritage, carrying its values of resilience, hospitality, and pride in her identity.
attributes:
  skills: '[''Bilingual communication (Spanish & English)'', ''Time management and organization'', ''Basic computer skills (Microsoft Office)'', ''Cooking traditional Dominican cuisine'', ''Leadership in
