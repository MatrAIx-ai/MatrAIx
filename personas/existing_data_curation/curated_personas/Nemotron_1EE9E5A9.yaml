  hobbies: '[''Reading contemporary fiction'', ''Journaling and creative writing'', ''Sketching and digital illustration'', ''Cooking Dominican dishes'', ''Listening to merengue and bachata music'', ''Playing
    puzzle video games'', ''Participating in a school cultural club'', ''Volunteering at a community youth program'']'
  career_goals: Malvis aims to enroll in a specialized high school with a health sciences track, securing a scholarship to pursue a nursing degree. She envisions working as a registered nurse in a community
    health center serving immigrant and low‑income families in the Bronx or her neighborhood, eventually advancing to a nurse manager role. She also hopes to mentor younger students from Dominican backgrounds,
    sharing her experience and encouraging them to pursue higher education.
