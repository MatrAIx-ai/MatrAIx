persona_description: A scientist who specializes in climate change studies, focusing on understanding the effects of anthropogenic forcings on the Hadley circulation. They are particularly interested in
  the role of greenhouse gases, stratospheric ozone depletion, and anthropogenic aerosols in causing poleward expansion of the Hadley circulation, and how this expansion is affected by future climate projections.
  They have a strong background in using simulations from CMIP5 to analyze and interpret the results.
