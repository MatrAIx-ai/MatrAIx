personas:
  professional: Jelani Smalls, a seasoned Southern kitchen veteran with three decades of large‑scale batch cooking, food‑safety compliance, and cost‑effective recipe development, blends their pragmatic,
    efficiency‑first mindset with a quiet curiosity that drives them to mentor junior staff while keeping a calm composure even during high‑pressure service rushes.
  sports: Jelani Smalls follows the Atlanta Falcons and the New Orleans Pelicans with unwavering loyalty, spends Saturday mornings fishing at Lake Martin as a member of the local Anglers’ Club, and participates
    in a low‑key community bowling league that provides gentle exercise without the pressure of competitive sports.
  arts: Jelani Smalls relaxes to the smooth sounds of Miles Davis and the soulful vocals of Mahalia Jackson, collects vintage jazz LPs, occasionally visits regional folk art exhibitions featuring the works
    of James Jean, and volunteers to organize music nights at the church community kitchen where they blend rhythm with recipes.
  travel: Jelani Smalls prefers solo, low‑key road trips to historically rich Southern towns like Savannah, Charleston, and Natchez, where they can explore antebellum architecture and local food markets,
    while dreaming of a future culinary pilgrimage to Bologna, Italy, yet constraints of family commitments keep most journeys within a day's drive.
  culinary: Jelani Smalls delights in crafting modern twists on classic Southern comfort dishes—such as collard‑green‑infused shrimp étouffée with fresh thyme from their herb garden and heirloom tomato
    bisque—leveraging their masterful knife work and precise batch cooking skills while modestly sharing these creations with church volunteers.
  core: Jelani Smalls, a quietly curious and remarkably calm 51‑year‑old chef, balances disciplined practicality with a penchant for solitary hobbies, occasional disorganization, and a habit of misplacing
    kitchen tools while never losing a smile under pressure.
background:
  cultural: Jelani grew up in a close‑knit African‑American community in the Lowcountry of South Carolina, where food, faith, and family were central to daily life. He was raised on soul food staples—collard
    greens, fried fish, cornbread, and sweet tea—cooked in a tradition that honors both African roots and Southern hospitality. The Black church has been a cornerstone of his upbringing, fostering a sense
    of resilience, mutual support, and community service. These cultural influences shape his cooking philosophy, which emphasizes soulful flavors, communal sharing, and respect for the elders who passed
    down recipes. His identity is also informed by the broader Southern Black experience of navigating economic challenges with creativity and perseverance.
attributes:
  skills: '[''Food safety and sanitation'', ''Advanced knife skills'', ''Batch cooking and recipe scaling'', ''Menu planning and costing'', ''Inventory management'', ''Staff training and mentorship'', ''Equipment
