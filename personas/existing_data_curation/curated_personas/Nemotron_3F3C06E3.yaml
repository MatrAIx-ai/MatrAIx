  hobbies: '[''Herb gardening'', ''Reading historical nonfiction'', ''Listening to gospel and jazz music'', ''Fishing'', ''Woodworking'', ''Volunteer cooking at community kitchen'', ''Exploring African‑American
    heritage'']'
  career_goals: Jelani aims to transition into a kitchen manager role where he can blend his extensive hands‑on experience with his interest in mentoring the next generation of cooks. He plans to complete
    his associate degree in culinary arts, earn a certified food safety manager credential, and eventually launch a small, community‑focused catering venture that highlights modern takes on classic Southern
    comfort food. While he values stability and flexibility, his long‑term ambition includes giving back to local food‑security programs by offering workshops on nutrition and affordable cooking for the
    neighborhood.
