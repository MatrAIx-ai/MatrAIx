personas:
  professional: Mary Wolven, an aspiring sustainability project manager, leverages her solid grounding in research methods, Excel data modeling, and public‑speaking confidence to translate scientific findings
    into actionable community programs, while her balanced curiosity‑practicality and disciplined flexibility keep projects both innovative and on schedule.
  sports: Mary Wolven combines a love for alpine skiing at Sun Valley Resort in winter and rugged trail hiking in the Sawtooth Mountains during summer with a fan loyalty to the Boise State Broncos football
    team and the Portland Trail Blazers, while she participates in the local Sawtooth Outdoor Club’s weekly trail runs and occasionally joins a community snow‑shoeing league.
  arts: Mary Wolven channels her creative energy into wildlife photography inspired by the works of Ansel Adams, strums acoustic renditions of John Denver and Mumford & Sons on her guitar, devours contemporary
    poetry from Rupi Kaur and classic verses by Maya Angelou, and designs eye‑catching event flyers using Canva that echo the rustic aesthetic of her mountain surroundings.
  travel: Mary Wolven plans her travel around a blend of structured budgeting spreadsheets and spontaneous weekend drives, having already trekked the geothermal wonders of Yellowstone, explored Banff’s
    turquoise lakes, and dreaming of photographing Iceland’s auroras and Patagonia’s glaciers, all while keeping an eye on student loan constraints that guide her to prioritize affordable, nature‑focused
    adventures.
  culinary: Mary Wolven favors cooking nutrient‑dense meals like grilled salmon seasoned with fresh rosemary and lemon, homemade quinoa salads tossed with roasted sweet potatoes and feta, and assembling
    trail‑ready snack packs of almonds, dried cranberries, and dark chocolate, while she occasionally indulges in a steaming bowl of ramen after late‑night study marathons.
  core: Mary Wolven is a methodical outdoors enthusiast who balances meticulous data‑driven planning with spontaneous mountain escapades, and occasionally forgets to floss between hikes.
background:
  cultural: Mary was raised in a white, middle-class family in the Intermountain West, with deep roots in the region's pioneer heritage. Her family's cultural identity blends Midwestern European ancestry
    (German, English, and Swedish) with the community values prevalent in Rexburg, Idaho—emphasis on family, education, and service. Growing up in a predominantly LDS environment, she regularly participated
    in church service projects, community potlucks, and local traditions such as Pioneer Day celebrations. This background fostered a strong sense of self-reliance, respect for nature, and a commitment
    to helping others, while also encouraging openness to new ideas through her academic pursuits.
attributes:
  skills: '[''Research and Writing'', ''Data Analysis (Excel, SPSS)'', ''Public Speaking'', ''Project Coordination'', ''Team Collaboration'', ''Conflict Mediation'', ''Time Management'', ''Basic Graphic
    Design (Canva)'']'
  hobbies: '[''Hiking'', ''Skiing'', ''Wildlife Photography'', ''Reading (Popular Science, Historical Fiction, Poetry)'', ''Acoustic Guitar'', ''Knitting'', ''Volunteering at Animal Shelter'']'
  career_goals: Mary aims to complete a bachelor's degree in Environmental Science with a minor in Business Administration within the next two years. She envisions a career that merges her love for the
    outdoors with her practical mindset, aspiring to work as a sustainability project manager for a regional non-profit or a government agency focused on natural resource conservation. In the long term,
    she hopes to lead community outreach programs that educate youth about environmental stewardship while also pursuing a master's degree in Public Policy to enhance her advocacy impact. Her ambition is
    to balance meaningful contribution to her community with stable, growth-oriented professional development.
