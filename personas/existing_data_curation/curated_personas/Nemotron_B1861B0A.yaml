  hobbies: '[''Fishing at Lake Gaston'', ''Hunting'', ''Attending high school football games'', ''Working on and restoring trucks/cars'', ''Playing video games (simulation and strategy)'', ''Listening to
    classic rock and country music'', ''Participating in community fairs and events'', ''Cooking barbecue and grilling'', ''Volunteer work at local church'']'
  career_goals: Joseph aims to advance within the manufacturing sector by first obtaining a certified forklift and OSHA safety qualification, then moving into a shift supervisor role within the next two
    to three years. He plans to enroll part‑time at a community college to study industrial technology, with the long‑term ambition of becoming a production manager or plant supervisor. Ultimately, he hopes
    to secure a stable, well‑paid position that offers benefits and the opportunity to stay rooted in his hometown while providing for his future family.
