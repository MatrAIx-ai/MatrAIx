persona_description: A historian who specializes in the study of African history, specifically focusing on the impact of the Arab slave trade on the Arab population of Yemen and the East African coast.
  Their research interests include the dynamics of gender and conquest, the history of the Arab slave trade, and the role of the Arab merchants in the slave trade. They are particularly interested in the
  evidence of female-mediated gene flow and the genetic findings that demonstrate the existence of African women in the Arab population for several thousand years.
