persona_description: A New Zealand environmentalist who is interested in the reform of natural resource management law and the principles it embodies, including sustainability, the precautionary principle,
  and user pays. They are likely to be knowledgeable about New Zealand's environmental legislation, including the Resource Management Act 1991 and Crown Minerals Act, and have a deep understanding of the
  principles of sustainable management and the importance of user responsibility in resource management. They are also likely to be familiar with the concepts of environmental impact assessments and the
  use of economic instruments to manage fisheries resources, and may have experience in advocating for the implementation of these principles in policy and practice.
