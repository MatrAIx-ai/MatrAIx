  career_goals: Looking ahead, Janet aims to transition into a part‑time consultancy role where she can share her wealth of administrative knowledge with small businesses and nonprofit organizations in
    Indianapolis. She plans to earn the Certified Administrative Professional (CAP) credential to formalize her expertise. Additionally, Janet hopes to serve as a volunteer coordinator for a local community
    health center, using her event‑planning and people‑skills to organize health fairs and outreach programs. Maintaining a balanced, low‑stress workload is a priority, so she seeks opportunities that allow
    her to continue mentoring younger staff while preserving her own well‑being.
