personas:
  professional: Janet Diab, a seasoned office administrator with over four decades of experience, leverages their expert calendar management, travel coordination, and advanced Microsoft Office and Google
    Workspace skills to mentor junior staff and streamline nonprofit operations, while balancing a curiosity for new cloud‑based tools with a practical, detail‑oriented approach that ensures reliable implementation.
  sports: Janet Diab, an avid supporter of Indianapolis’s sports culture, faithfully attends Indianapolis Colts football games, follows the Indiana Pacers basketball season, cheers for the Indianapolis
    Indians minor‑league baseball team, participates in a senior bridge league at the community center, and joins a weekly walking group at the White River State Park to stay active, though they occasionally
    skip workouts when knee pain flares.
  arts: Janet Diab, an enthusiastic community‑theater participant, regularly performs in local productions of classic plays like "Our Town," enjoys concerts by the Indianapolis Symphony Orchestra featuring
    violinist Midori, delights in the folk songs of Joan Baez and the poetry readings of Maya Angelou at the library, and nurtures their creative side through quilting circles that celebrate the patterns
    of American folk art.
  travel: Janet Diab prefers short, well‑planned road trips with their adult children, exploring historic Midwest sites such as the Henry Ford Museum in Dearborn, the Indiana State Capitol in Indianapolis,
    and the historic battlefields of Gettysburg, while also dreaming of a cultural vacation to Edinburgh’s Old Town and a relaxing beach getaway to Myrtle Beach, South Carolina, balancing adventure with
    budget‑conscious planning.
  culinary: Janet Diab, an avid home gardener and lifelong learner in the kitchen, loves preparing garden‑fresh vegetable stew with carrots, potatoes, and kale, baking a classic chicken pot pie seasoned
    with thyme and rosemary, and mastering Southern comfort dishes like fried catfish and collard greens in community‑center cooking classes, while they occasionally indulge in a sweet apple crisp topped
    with a crunchy oat crumble.
  core: Janet Diab blends a warm, talkative community spirit with meticulous organization, balancing curiosity for new ideas against a practical, low‑stress lifestyle, while habitually worrying about health
    and finances yet finding joy in theater, gardening, and family road trips.
background:
  cultural: Janet grew up in a small town in central Indiana, immersed in a Midwestern white American culture that prizes community involvement, modesty, and a strong work ethic. Her family attended a Protestant
    church, instilling values of service, hospitality, and civic responsibility. The regional emphasis on neighborliness and practical problem‑solving shaped her pragmatic outlook, while local traditions—such
    as community fairs, church potlucks, and high school sports—fostered her sociable and talkative personality. These cultural influences continue to inform her dedication to helping others, her commitment
    to lifelong learning, and her deep appreciation for the close‑knit community of Indianapolis.
