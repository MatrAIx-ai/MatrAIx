persona_description: A multidisciplinary team of engineers, architects, and geologists from Nepal, with expertise in seismic safety assessment, risk management, and building construction. This team is tasked
  with developing a comprehensive scheme for enhancing the seismic safety and resilience of school buildings in Nepal, with a focus on developing a smart diagnostics expert system app for reliable pre-
  and post-earthquake structural inspection, identifying buildings with minor-to moderate damage that can be substantially improved with innovative yet simple measures, and testing innovative repair and
  retrofit techniques to assess and optimize their efficiency. They will work with the local partners in Nepal to design a realistic testing campaign tailored to the construction characteristics of school
  buildings in Nepal, and develop a comprehensive post-quake vulnerability assessment accounting for regional materials and employing micro- and meso-fragility modelling for informed decision-making during
  the post-earthquake response, recovery and mitigation phases. They will also develop an innovative concept of seismic isolation using natural materials and a tablet app for reliable diagnostics of post-quake
  structural health based on the spectral-based FAST algorithm.
