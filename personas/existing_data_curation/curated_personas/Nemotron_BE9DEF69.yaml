  hobbies: '[''open-mic participation'', ''yoga and mindfulness meditation'', ''journaling'', ''reading classic literature and poetry'', ''cooking Tex-Mex comfort food'', ''herb gardening'', ''attending
    live concerts'', ''volunteering music workshops'']'
  career_goals: Bettie aims to transform her steady local presence into a sustainable professional trajectory. Over the next two years she plans to record and release a polished EP that showcases her traditional
    singer‑songwriter style while incorporating subtle modern production. She seeks a recurring residency at a well‑established Austin venue, providing a reliable weekly performance slot that feeds her
    love of routine. At the same time, she is targeting regional festivals and opening slots for nationally touring folk acts to elevate her profile. Long‑term, she aspires to sign with an independent label
    that respects artistic integrity, to tour the Southwest on a structured schedule, and eventually mentor younger musicians in a community education program—balancing her competitive drive with a desire
    to give back.
