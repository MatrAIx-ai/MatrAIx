personas:
  professional: Bettie Roberts, a 31‑year‑old singer‑songwriter in Austin, blends disciplined gig logistics with heartfelt folk‑rock performances, channeling literary‑inspired lyrics into intimate shows
    while rigorously planning set‑lists, sound checks, and social‑media promotion to uphold their reputation for reliability.
  sports: Bettie Roberts stays active through regular yoga classes and weekend pickup basketball games at the local community center, cheers for Austin FC in MLS matches, follows the Texas Longhorns football
    season with fierce loyalty, participates in a seasonal running club that tackles the Hill Country trail routes each spring, and they often log mileage in a fitness app to stay accountable.
  arts: Bettie Roberts immerses themselves in the poetry of Walt Whitman and the melodies of Bob Dylan and Gillian Welch, frequents the Austin Playhouse for contemporary theater, curates a modest vinyl
    collection featuring Joni Joplin and Townes Van Zandt, volunteers to organize open‑mic nights that spotlight emerging folk talent, and they often attend gallery openings at The Contemporary Austin.
  travel: Bettie Roberts prefers meticulously planned road trips that balance performance opportunities with cultural immersion, having toured Nashville’s songwriter cafés, explored Santa Fe’s art markets,
    dreamed of a spring pilgrimage to Oaxaca’s gastronomic scene, and they eagerly anticipate a future Southwest tour that strings together festival dates across Texas, New Mexico, and Arizona.
  culinary: Bettie Roberts delights in cooking comforting Tex‑Mex dishes such as chicken enchiladas with homemade salsa verde, shrimp tacos topped with fresh cilantro and lime, and cilantro‑lime rice, often
    harvesting basil, oregano, and thyme from their balcony herb garden to add aromatic depth to each meal shared at weekly dinner gatherings with friends, and they often pair the dishes with a chilled
    margarita.
  core: Bettie Roberts is a disciplined yet soulful Austin musician who harnesses routine‑driven ambition, community‑focused generosity, and a love for Tex‑Mex comfort food, and they navigate a persistent
    undercurrent of anxiety and competitive drive.
background:
  cultural: Bettie grew up in a middle‑class white family in suburban Texas, where country and folk music were staples of household gatherings. Her parents encouraged practical skills and a respect for
    tradition, values that shaped her straightforward, routine‑oriented outlook. She earned a Bachelor of Arts in Humanities at a liberal‑arts college in Austin, where she deepened her appreciation for
    American literary and musical heritage. Living in Austin—a city celebrated for its vibrant live‑music scene—has allowed her to blend her traditional roots with contemporary indie‑folk influences while
    maintaining a pragmatic approach to building a music career.
attributes:
  skills: '[''vocal performance'', ''acoustic guitar'', ''piano accompaniment'', ''songwriting'', ''music theory and arrangement'', ''digital audio workstation (Logic Pro X, Ableton Live)'', ''live-performance
