  career_goals: Guided by her innate imagination and love for novelty, Pauline aspires—once she reaches school age—to cultivate a career in the creative arts, such as visual illustration, design, or community‑based
    cultural programming, where she can blend artistic innovation with leadership and make an impact on her community.
