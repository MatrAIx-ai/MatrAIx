  hobbies: '[''Hiking coastal trails'', ''Yoga'', ''Reading contemporary fiction and psychology'', ''Volunteering at animal shelter'', ''Mediterranean cooking'', ''Nature photography'', ''Book club participation'',
    ''Handmade greeting card crafting'']'
  career_goals: Judith aims to turn her passion for helping others into a professional career in social services. She plans to complete a bachelor's degree in social work or community health, obtain a Licensed
    Clinical Social Worker credential, and secure a role as a community program manager for a nonprofit focused on mental health and youth empowerment. In the near term, she seeks a part-time internship
    or entry-level case management position while earning certifications in trauma-informed care. Long-term, she envisions establishing a community resource hub in Mission Viejo that offers workshops on
    wellness, financial literacy, and volunteer opportunities.
