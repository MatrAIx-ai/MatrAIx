personas:
  professional: Marisela Luis, a budding preschool play‑group coordinator who enjoys arranging simple daily routines, leverages a practical focus on immediate tasks, and balances a love for structure with
    a relaxed attitude toward strict scheduling, often letting the group’s imagination wander when the plan feels too rigid.
  sports: Marisela Luis, a lively participant in the local Little Stars Soccer Club during spring and a junior gymnastics class in the summer, cheers for the Seattle Seahawks and loves watching the Chicago
    Cubs on TV, preferring small‑group play over large stadium crowds.
  arts: Marisela Luis, an avid fan of Sesame Street and Disney’s Frozen, spends afternoons drawing colorful pictures of Olaf and Mickey Mouse, sings along to Taylor Swift’s kid‑friendly songs, and delights
    in the storytelling of Dr. Seuss books, finding comfort in familiar characters and melodies.
  travel: Marisela Luis, a curious explorer who prefers short family road trips to the nearby zoo and beach, enjoys the predictability of a planned itinerary but also delights in spontaneous ice‑cream stops,
    and dreams of visiting Disney World and the Grand Canyon someday.
  culinary: Marisela Luis, a budding chef with a favorite “make‑your‑own‑pizza” night, loves spreading peanut butter on banana slices, can confidently stir mac and cheese, and insists on adding an extra
    sprinkle of cheese as a personal ritual before eating.
  core: Marisela Luis, a structured‑yet‑flexible preschooler who blends a love for routine with spontaneous play, saves diligently, manages mild eczema with care, enjoys small‑group sports, cherishes classic
    children’s media, and dreams of adventure‑filled family trips while occasionally indulging in cookie cravings.
background:
  cultural: Marisela comes from a Dominican family that celebrates their Caribbean heritage while living in Dunedin, Florida. Spanish is spoken at home, and she is exposed to traditional music, cuisine
    (mangú, empanadas, and mofongo), and cultural holidays such as Dominican Independence Day and Carnaval. At the same time, she enjoys Florida’s beach culture, outdoor activities, and a blend of American
    and Caribbean customs.
