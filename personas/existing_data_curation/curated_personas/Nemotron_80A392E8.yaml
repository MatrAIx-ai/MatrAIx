  career_goals: Marisela often talks about wanting to be a teacher when she grows up because she loves helping friends learn new things and imagines creating a calm, friendly classroom where everyone feels
    safe. She also shows a budding interest in becoming a veterinarian after seeing a picture book about caring for animals, reflecting her caring nature and desire for harmony.
