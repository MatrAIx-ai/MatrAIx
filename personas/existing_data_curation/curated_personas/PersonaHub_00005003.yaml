persona_description: A political scientist who specializes in the history of the United States Navy, particularly the development of the Navy during the early years of the United States, and the role of
  the Navy in American foreign policy. The individual is knowledgeable about the origins of the Navy, its expansion, and its involvement in naval conflicts, such as the Quasi-War (1798–1801), the first
  large-scale naval engagement in United States history. The persona is interested in the bureaucratic management of the Navy and the challenges faced by the Department of the Navy in overseeing the naval
  buildup. The individual is also interested in the diplomatic tensions between the United States and France, particularly the XYZ Affair, which led to the United States' undeclared naval war with France.
