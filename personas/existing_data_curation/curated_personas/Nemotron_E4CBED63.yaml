  career_goals: Bichlien plans to earn her Certified Public Accountant (CPA) license within the next two years and advance to a senior auditor role. She aspires to lead audit teams that specialize in technology-driven
    assurance and sustainability reporting, eventually moving into audit management and finance leadership positions such as Finance Director or CFO. She is passionate about mentoring junior accountants,
    integrating data analytics into audit processes, and championing ethical, innovative financial stewardship within her firm.
