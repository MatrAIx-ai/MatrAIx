    ''Business analysis and budgeting basics'']'
  hobbies: '[''Reading historical fiction and psychology'', ''Coffee brewing and tasting'', ''Cooking Vietnamese and Filipino dishes'', ''Hiking local Cascades trails'', ''Nature photography'', ''Mindfulness
    journaling'', ''Yoga'', ''Language learning (Vietnamese, Tagalog)'']'
  career_goals: Hoang aims to transition from a frontline representative to a Customer Experience Manager within the next three to five years, leveraging his business degree to shape service strategy and
    team culture. He plans to earn a Certified Customer Experience Professional (CCEP) credential and pursue a project management certification to strengthen his leadership toolkit. In the longer term,
    he envisions a hybrid role that bridges customer insights with product development, perhaps as a product manager for a tech firm that values user‑centric design. Throughout this trajectory, Hoang seeks
    a work environment that offers clear expectations, supportive mentorship, and a healthy work‑life balance to mitigate his stress sensitivity.
