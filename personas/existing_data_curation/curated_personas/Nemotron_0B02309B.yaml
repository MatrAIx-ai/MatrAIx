    concepts'']'
  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Street photography'', ''Reading contemporary fiction and philosophy'', ''Yoga and guided meditation'', ''Cooking
    experimental dishes'', ''Hiking in Wissahickon Valley'', ''Participating in a small book club'', ''Listening to jazz and indie music'', ''Volunteering at community art workshops for youth'']'
  career_goals: James is determined to advance his career in healthcare by first earning a Certified Nursing Assistant (CNA) credential, then completing an LPN program, and eventually pursuing an Associate’s
    Degree in Nursing (ADN) to become a Registered Nurse. He is especially drawn to mental‑health and palliative‑care settings where he can blend his clinical expertise with his interest in art therapy,
    aiming to develop patient‑centered programs that use creative expression to alleviate anxiety and improve well‑being. In the short term, he wants to secure a role in a community health organization
    in Philadelphia that values interdisciplinary collaboration. Long‑term, he aspires to be a patient advocate and possibly a coordinator of a hospital‑based art‑therapy initiative, while also mastering
    stress‑management strategies to sustain his own emotional health.
