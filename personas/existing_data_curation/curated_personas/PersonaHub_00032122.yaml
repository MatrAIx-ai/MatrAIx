persona_description: A professional traffic safety researcher or policy maker who is interested in identifying and addressing the most critical traffic safety issues on the roads. This individual may be
  involved in regulatory and consumer initiatives, cost-benefit analyses of traffic safety initiatives, and is aware of the limitations of the National Automotive Sampling System (NASS) General Estimates
  System (GES) in capturing all traffic accidents, especially those involving minor property damage and no significant personal injury. The persona is likely to be familiar with the National Highway Traffic
  Safety Administration (NHTSA) and the U.S. Department of Transportation, as well as the purpose and limitations of the GES in identifying traffic safety problem areas and providing a basis for regulatory
  and consumer initiatives.
