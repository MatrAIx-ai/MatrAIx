  career_goals: Although retired, Umar aims to stay mentally active and socially useful. He plans to serve as an advisory mentor for the local Chamber of Commerce’s small‑business program, offering practical
    guidance to budding entrepreneurs. He also hopes to document his family’s history in a memoir, combining his curiosity for the past with his practical writing skills. To manage his anxiety, he intends
    to enroll in a short online course on digital photography, allowing him to explore a new creative outlet while maintaining a structured learning schedule. Continuing to support his wife’s community
    projects and ensuring the family’s financial stability remain central ambitions.
