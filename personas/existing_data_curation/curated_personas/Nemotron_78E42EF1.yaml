  hobbies: '[''Gardening and horticulture'',''Southern cooking and recipe sharing'',''Book club participation'',''Genealogy and family history research'',''Quilting and knitting circles'',''Crossword puzzles
    and brain games'',''Attending live bluegrass and music concerts'',''Traveling to new destinations during layovers'',''Volunteering at the local senior center'',''Participating in community theater or
    storytelling events'']'
  career_goals: Angela aims to transition from frontline flight service to a mentorship and safety advisory role before fully retiring. She aspires to develop a comprehensive training curriculum for cabin
    crew that emphasizes emergency preparedness and passenger well‑being, and to serve as a consultant for regional airlines seeking to improve service standards. Additionally, she hopes to author a memoir
    sharing insights on airline life and the value of empathy in high‑stress environments. Locally, she plans to volunteer as a youth aviation mentor through a community‑college program in Hickory, fostering
    curiosity about flight in the next generation.
