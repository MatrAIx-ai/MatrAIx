persona_description: A rail engineer who specializes in the design and development of railway power electronics systems, with a focus on ensuring electromagnetic compatibility (EMC) and the efficient use
  of space. They are skilled in using ANSYS tools to simulate the use cases of power electronics, check if they meet the performance standards, and develop cost-effective virtual EMC design processes. They
  are familiar with the latest advancements in power electronics and are able to integrate innovative technologies to minimize the size and weight of power electronics components.
