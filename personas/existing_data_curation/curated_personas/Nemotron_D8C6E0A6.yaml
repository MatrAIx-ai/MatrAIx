personas:
  professional: Fabrice Lewis, a seasoned commercial cleaning professional, leverages deep practical knowledge of floor care, chemical safety, and minor repairs to mentor junior staff while championing
    eco‑friendly solutions, embodying a blend of curiosity for new technologies and a pragmatic focus on reliable results.
  sports: Fabrice Lewis, an avid supporter of the New Orleans Saints and Pelicans, spends his weekends fishing with the Lakeside Anglers Club, playing casual softball in a church league, and taking occasional
    walks along the riverbank, favoring low‑impact activities that suit his relaxed, flexible fitness routine.
  arts: Fabrice Lewis channels his love for the blues through nightly sessions on his vintage acoustic guitar, drawing inspiration from B.B. King and Stevie Ray Vaughan, while lending his voice to a church
    gospel choir that often performs works by Mahalia Jackson, and he regularly attends the New Orleans Jazz & Heritage Festival to soak in live music.
  travel: Fabrice Lewis plans trips around community events, having explored Savannah’s historic squares, Nashville’s music scene, and a memorable weekend in Quebec City to experience its French‑influenced
    charm, while dreaming of a future road‑trip along the Pacific Coast to fish at pristine seaside coves.
  culinary: Fabrice Lewis, a confident home cook, perfects Southern soul dishes such as gumbo with Andouille sausage, shrimp étouffée, and collard greens seasoned with smoked paprika, often sourcing fresh
    okra and sweet potatoes from his own garden to create hearty family meals.
  core: Fabrice Lewis balances a laid‑back, slightly disorganized lifestyle with a deep curiosity for hands‑on work—whether restoring his vintage Chevrolet, tending his garden, or tinkering with eco‑cleaning
    tech—while never missing a Sunday gospel rehearsal.
background:
  cultural: Fabrice is an African American who grew up in rural Louisiana, deeply rooted in the region’s blend of Southern and Creole traditions. His upbringing was steeped in church life, gospel music,
    and community gatherings that emphasized family ties and mutual support. He carries the legacy of his ancestors' stories of resilience and the civil‑rights era, which inform his cooperative yet assertive
    demeanor. Cuisine, storytelling, and the rhythms of blues and jazz shape his daily life, and he proudly participates in local celebrations such as Mardi Gras parades and church festivals that reflect
    the rich cultural tapestry of his hometown.
