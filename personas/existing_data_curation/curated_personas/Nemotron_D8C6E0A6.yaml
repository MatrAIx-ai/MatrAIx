  hobbies: '[''Gardening'', ''Fishing'', ''Playing guitar (blues)'', ''Cooking Southern soul food'', ''Church choir participation'', ''Attending local cultural festivals'', ''Reading Louisiana history'',
    ''Volunteer tutoring at community center'', ''Classic car restoration'']'
  career_goals: Fabrice aims to move into a supervisory role within the facilities department, overseeing a team of cleaners and coordinating maintenance schedules. He is working toward obtaining a certified
    facilities manager credential and hopes to eventually launch a small, community‑focused cleaning business that offers green services to local businesses and churches. While he values financial security
    for his family, he also wants to maintain a flexible schedule that allows him to pursue his hobbies and stay connected with his community.
