  career_goals: In retirement, Phillip aims to deepen his impact on the Sun Prairie community by expanding the neighborhood garden, documenting the town’s agricultural heritage, and mentoring younger volunteers.
    He hopes to publish a memoir of his life on the farm, learn new sustainable gardening techniques, and continue supporting his grandchildren’s education through tutoring and shared projects.
