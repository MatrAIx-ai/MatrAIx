  hobbies: '[''Birdwatching'', ''Fishing'', ''Hiking'', ''Woodworking'', ''Gardening'', ''Community Theater'', ''Local History Club'', ''Cooking'', ''Bridge'', ''Folk Music'', ''Senior Center Dance Nights'']'
  career_goals: Although retired, Daniel is intent on remaining an active pillar of the Klamath Falls community. He aims to expand the local senior‑center mentorship program, lead and grow the neighborhood
    community garden, and organize intergenerational storytelling workshops that capture the region’s history. He also hopes to serve as an advisor on the city’s aging‑population outreach council and eventually
    compile his memories and lessons into a memoir that can inspire younger residents.
