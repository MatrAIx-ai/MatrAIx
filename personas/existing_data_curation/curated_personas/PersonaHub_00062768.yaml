persona_description: A Nuu-chah-nulth chief and research liaison who specializes in the principles of Tsawalk, a Nuu-chah-nulth worldview that emphasizes the interconnectedness of all living things and
  the need for respect and recognition of indigenous rights. He is an associate adjunct professor at the University of Victoria and a research liaison at the University of Manitoba. His work focuses on
  bringing greater harmony and recognition to the world, particularly in the context of environmental and political crises faced by indigenous peoples.
