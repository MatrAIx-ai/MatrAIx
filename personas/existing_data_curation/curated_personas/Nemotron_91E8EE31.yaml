  hobbies: '[''Gardening'', ''Hiking the Yauco mountains'', ''Salsa dancing'', ''Playing dominoes'', ''Folk painting'', ''Woodworking'', ''Cooking Puerto Rican cuisine'', ''Volunteering for community murals'',
    ''Reading local history'', ''Landscape photography'']'
  career_goals: Richar aims to transition from full‑time contracting to a mentor‑coach role, training a new generation of painters and paper‑hangers in Yauco. He wishes to document and revive traditional
    Puerto Rican wall‑painting techniques through community workshops and occasional commissioned murals that celebrate local history. Maintaining a modest income to support his health and travel to visit
    family on the mainland remains a priority. He also hopes to establish a small legacy fund that sponsors apprentices from low‑income backgrounds.
