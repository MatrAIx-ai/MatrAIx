  career_goals: Although retired, Aurea aims to leave a lasting legacy by documenting her family’s migration story in a bilingual memoir, mentoring young Latina students interested in STEM, and establishing
    a scholarship fund for underrepresented engineers at her alma mater. She also hopes to expand the senior-center computer-literacy workshop, increase participation in the Greenport Historical Society’s
    preservation efforts, and support the creation of a community food co-op that highlights Colombian culinary traditions.
