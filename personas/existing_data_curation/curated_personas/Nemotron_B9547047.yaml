personas:
  professional: Aurea Salamanca, a retired civil engineer with a graduate degree in mechanical engineering, applies her analytical expertise and methodical project‑management style to coordinate historic
    preservation projects, teach computer literacy to seniors, and mentor aspiring engineers from underrepresented groups, balancing pragmatic problem‑solving with a warm, collaborative community spirit.
  sports: Aurea Salamanca enjoys low‑impact activities such as early‑morning birdwatching walks along the Long Island marshes, weekly salsa sessions at the Greenport community center, and cheering on the
    New York Mets and Long Island Ducks while being a member of the Greenport Senior Fitness Club.
  arts: Aurea Salamanca nurtures a love for the arts through regular attendance at the local theater to see productions like "A Streetcar Named Desire" starring Karen Allen, listening to classic jazz albums
    by Miles Davis, and discussing novels such as "One Hundred Years of Solitude" in the bilingual book club, all of which enrich their cultural perspective.
  travel: Aurea Salamanca prefers leisurely travel, planning trips with family or friends that blend comfortable accommodations with cultural discovery, such as touring historic coastal towns like Mystic,
    Connecticut and making a nostalgic pilgrimage to the Andean highlands of Ecuador where they savor the origins of ajiaco, all while balancing limited mobility and a modest budget.
  culinary: Aurea Salamanca delights in preparing traditional dishes such as ajiaco, golden‑fried empanadas, and creamy natilla, using fresh herbs like cilantro and oregano, and they experiment with compost‑rich
    soil to grow their own potatoes, corn, and plantains, yet they sometimes over‑salt the stew in their enthusiasm for bold flavors.
  core: Aurea Salamanca blends engineering precision with a gardener’s patience, turning every community project into a well‑tended garden of knowledge, while habitually humming old folk tunes and occasionally
    misplacing their reading glasses.
background:
  cultural: Aurea was born in Medellín, Colombia, in 1937 and grew up during a period of rapid urban change. Her family emphasized Catholic traditions, communal celebrations like Carnaval, and a deep appreciation
    for Colombian music and cuisine. She earned a scholarship to study engineering in Bogotá before moving to the United States in 1965 after marrying a fellow engineer. Settling in New York, she retained
    strong ties to her heritage by celebrating Día de los Muertos, preparing family recipes, speaking Spanish at home, and participating in local Colombian cultural festivals. Her bicultural identity is
    reflected in her role as a cultural liaison, sharing Colombian stories and customs with her Greenport community while embracing American customs such as volunteering at the local library and attending
    town meetings.
