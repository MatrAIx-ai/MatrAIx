personas:
  professional: Mark Belanger, a 28-year-old retail veteran with eight years in Homestead, blends his curiosity for design with methodical inventory control to drive sales, uses his talkative flair to train
    new staff and delight customers, and is actively pursuing a store‑manager role while working toward a Business Administration degree to eventually launch his own art‑focused boutique.
  sports: Mark Belanger, a dedicated runner and weight‑lifting enthusiast, belongs to the Homestead Cross‑Training Club, enjoys Saturday long runs as stress relief, and passionately supports the Pittsburgh
    Steelers, Penguins, and Pirates, using game nights as social bonding opportunities with his improv troupe friends.
  arts: Mark Belanger, a frequent visitor to the Carnegie Museum of Art and active member of a local improv troupe, captures urban aesthetics with his street photography, draws inspiration from contemporary
    photographer Andreas Gursky and the comedic timing of The Second City, and regularly watches independent films by directors like Kelly Reichardt while listening to design podcasts such as Design Matters.
  travel: Mark Belanger plans his weekend road trips with a blend of spontaneous detours and a modest travel budget, recently journeyed along the Blue Ridge Parkway to Asheville, NC to explore Appalachian
    craft markets, and dreams of a future drive to the Olympic Peninsula in Washington to photograph coastal fog and coastal art installations.
  culinary: Mark Belanger prefers hearty Pennsylvania fare such as pepperoni pizza and pierogies, enjoys experimenting with truffle‑infused mushroom risotto at home, and often pairs his meals with craft
    beers from local breweries like Church Brew Works while occasionally indulging in homemade avocado toast with smoked salmon.
  core: Mark Belanger is a socially magnetic, design‑obsessed retail professional who channels curiosity and competition into art, improv, and relentless self‑improvement, all while battling chronic worry
    and occasional back pain.
background:
  cultural: Mark comes from a white, working‑class background typical of the Homestead area in Allegheny County, a region historically shaped by the steel industry and subsequent economic transition. His
    family roots likely trace back to European immigrants who settled in the Pittsburgh area, fostering a cultural environment that values hard work, self‑reliance, and community solidarity. Growing up
    near the river, he was exposed to the city’s evolving arts scene, from murals in post‑industrial neighborhoods to the vibrant cultural institutions of downtown Pittsburgh. This mix of Mid‑Western pragmatism
    and growing appreciation for contemporary art informs his worldview, balancing practical ambition with an open‑minded curiosity.
