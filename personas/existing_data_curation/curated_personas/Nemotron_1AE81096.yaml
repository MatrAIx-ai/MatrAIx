  career_goals: Within the next two years, Mark aims to secure a store manager position at a regional retail chain, using his organized approach and competitive drive to exceed sales targets. He plans to
    earn a bachelor's degree in Business Administration while building a network of mentors in merchandising and operations. Over a longer horizon, he aspires to launch his own boutique that blends his
    love for art and design with curated retail experiences, positioning himself as a thought leader in niche retail spaces. His ambition also includes developing and leading training programs for sales
    teams and eventually moving into regional district management, where he can influence strategy and drive performance across multiple locations.
