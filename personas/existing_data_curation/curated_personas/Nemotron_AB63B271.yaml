personas:
  professional: Jude Horne, a five‑year‑old budding builder, channels curiosity and practicality into erecting intricate LEGO structures while they tolerate the occasional chaos of scattered bricks because
    they value flexibility over strict order.
  sports: Jude Horne, a five‑year‑old enrolled in the Little Stars Soccer Club, loves cheering for the Chicago Cubs during weekend broadcasts, idolizes Lionel Messi, but they often opt for quiet solo dribbling
    sessions over noisy team drills, reflecting their reserved yet assertive nature.
  arts: Jude Horne, a five‑year‑old storybook lover, spends afternoons drawing Pixar characters like Woody and Buzz Lightyear while listening to Idina Menzel’s "Let It Go" from Frozen; they prefer solitary
    sketching over group art activities, illustrating their gentle curiosity and introverted streak.
  travel: Jude Horne, a five‑year‑old who has visited Grandma’s farm in Oregon and watched fireworks at a nearby lake, dreams of a future trip to Disneyland in Anaheim, favors short car rides with a familiar
    adult and a stuffed lion for comfort, and they often bring a travel‑size snack box to ease anxiety about new places.
  culinary: Jude Horne, a five‑year‑old who delights in cheesy macaroni, banana slices, and peanut‑free jelly‑sandwiches, can independently spread jam on toast, yet they consistently refuse broccoli and
    green peas, demanding extra cheese on nearly every meal.
  core: Jude Horne, a five‑year‑old curious builder with a disorganized piggy bank, battles allergies, enjoys solo soccer drills, draws Pixar heroes, craves comfort foods, and worries about bedtime routines,
    crafting a uniquely thoughtful yet slightly anxious outlook on life.
background:
  cultural: Jude comes from an African‑American family rooted in Dallas, Texas. His parents celebrate traditional Southern and Black cultural practices—attending a local Baptist church, sharing soul‑food
    meals like fried chicken, collard greens, and cornbread, and participating in community events such as neighborhood block parties and Juneteenth celebrations. The household enjoys gospel singing, call‑and‑response
    storytelling, and contemporary R&B and hip‑hop that reflect both the city’s urban vibe and their heritage. These influences shape Jude’s values of community, resilience, and a love for music and storytelling.
