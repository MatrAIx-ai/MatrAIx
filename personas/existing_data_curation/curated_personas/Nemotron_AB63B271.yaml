  career_goals: Even though he is only five, Jude already talks about wanting to become a builder—he imagines designing things that help his family and friends. He dreams of being an engineer who creates
    bridges or a firefighter who rescues animals, reflecting his blend of curiosity about how things work and a practical desire to make a difference. He also enjoys helping his older siblings with chores,
    hinting at an early ambition to be helpful and reliable.
