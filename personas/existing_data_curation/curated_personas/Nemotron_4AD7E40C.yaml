  career_goals: He aspires to pursue a career that blends his love for hands‑on creation with helping others, such as a biomedical engineer or a community‑focused technologist. In the short term, he aims
    to join a high‑school robotics team, excel in science competitions, and develop leadership skills through student council, ultimately working toward a college degree in engineering or health sciences.
