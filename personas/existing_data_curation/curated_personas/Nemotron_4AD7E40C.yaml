personas:
  professional: John Coats, a 14‑year‑old middle‑school student in Granby, balances a pragmatic love of problem‑solving with boundless curiosity by leading the robotics club in building a functional line‑following
    robot while also starring in the school drama’s spring musical, and they apply the same organized‑yet‑flexible mindset to every project, often improvising when a circuit fails.
  sports: John Coats plays forward for the Granby Thunder soccer team and guards for the school basketball squad, spends afternoons at the local skate park perfecting tricks, roots for the New England Revolution
    in MLS and the Boston Celtics in the NBA, and they also volunteer as a referee for the town’s youth baseball league during the summer fair season.
  arts: John Coats sketches manga inspired by Naruto and My Hero Academia, strums acoustic renditions of Billie Eilish and Ed Sheeran on their guitar, auditions enthusiastically for the school drama club’s
    production of A Midsummer Night’s Dream, and they regularly cite Studio Ghibli’s storytelling and Taylor Swift’s lyricism as creative touchstones.
  travel: John Coats dreams of wandering Tokyo’s Akihabara district to immerse themselves in manga culture, yet their current travel log features weekend family hikes in the White Mountains, a day trip
    to Cape Cod’s Nickerson State Park for swimming, and annual school field trips to Boston’s Museum of Science, all planned around a modest allowance and parental permissions, and they eagerly anticipate
    saving enough for a future overseas trip.
  culinary: John Coats enjoys classic New England blueberry pancakes drizzled with maple syrup for breakfast, loves whipping up a quick mac‑and‑cheese with sharp cheddar, experiments with homemade sushi
    rolls featuring cucumber and avocado after watching online tutorials, and they treat themselves to a slice of pepperoni pizza after a long skate session.
  core: John Coats is a high‑energy teen who blends a love for robotics, manga, and music with a sensitive anxiety that drives both meticulous planning and spontaneous creativity in school, sports, and
    friendships, and they often channel that energy into collaborative projects.
background:
  cultural: John grew up in Granby, a rural‑suburban community in Hampshire County, Massachusetts. His family’s heritage includes English and Irish roots, and they observe typical New England customs—celebrating
    holidays like Thanksgiving and Fourth of July with community gatherings, attending local church services, and participating in town events such as the annual summer fair. The region’s emphasis on education,
    civic engagement, and outdoor recreation shapes his worldview.
