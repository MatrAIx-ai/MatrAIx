persona_description: A renowned Japanese Zen Buddhist monk and scholar, known for his extensive writings on Zen Buddhism, particularly his Shōbōgenzō, which is considered a cornerstone of Japanese Zen literature.
  He founded the Sōtō Zen school and played a significant role in the growth and development of the Sōtō Zen community. His works, including the Shōbōgenzō, were highly influential in shaping the religious
  and philosophical beliefs of the Japanese people. Dōgen's death was largely unknown to the public, but his disciples compiled his Chinese-language compositions into the Eihei kōroku, which contains sermons,
  lectures, and verse organized into sections from Kōshōji, Daibutsuji, and Eiheiji.
