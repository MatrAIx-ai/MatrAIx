  career_goals: Looking ahead, Joseph aims to transition into a senior director role where he can oversee large, multi‑phase public infrastructure projects that incorporate sustainable design principles.
    He plans to earn his LEED Accredited Professional credential and pursue PMP certification to deepen his expertise in green building and project management. As he approaches retirement age, he also envisions
    establishing a boutique consulting firm that offers mentorship to emerging construction managers and provides advisory services on safety compliance and cost‑efficient project delivery for local developers.
    Ultimately, he hopes to leave a legacy of well‑executed, community‑focused projects that enhance the built environment of Southern California.
