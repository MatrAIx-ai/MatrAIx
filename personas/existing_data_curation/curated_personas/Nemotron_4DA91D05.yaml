personas:
  professional: A seasoned IT support specialist, Victoria Koon leverages two decades of hardware diagnostics, OS configuration, and Active Directory management to deliver meticulous ticket resolution,
    while her systematic mindset and curiosity drive her to continually refine support workflows and mentor junior staff.
  sports: An avid weekend jogger and member of the Seattle Hiking & Running Club, Victoria Koon cheers for the Seattle Seahawks and Seattle Sounders FC, seasons her fitness routine with early‑morning trail
    runs captured through her camera lens, participates in community kayaking in summer, and swaps snowshoeing for indoor yoga during the Pacific Northwest winters.
  arts: A dedicated photography enthusiast, Victoria Koon draws inspiration from Ansel Adams and Paul Nicklen for her nature shots, finds solace in the piano works of Ludovico Einaudi, regularly attends
    local gallery openings featuring contemporary artist Maya Lin, and indulges in classic films starring Meryl Streep and modern thrillers by Christopher Nolan.
  travel: A meticulous trip planner, Victoria Koon maps out her weekend escapes to the Columbia River Gorge and annual overseas journeys to Kyoto, Japan, using detailed spreadsheets and the same disciplined
    approach she applies to IT ticketing, while her love of structured itineraries balances a spontaneous desire to explore Iceland’s Golden Circle during a long‑sought sabbatical.
  culinary: A garden‑to‑table chef, Victoria Koon crafts seasonal meals such as heirloom tomato gazpacho, rosemary‑infused grilled zucchini with quinoa, and miso‑glazed salmon using fresh basil, garlic,
    and locally sourced vegetables, balancing her modest cooking confidence with occasional experimental forays into homemade sourdough that sometimes turn out overly sour.
  core: Victoria Koon channels her love of order into both her meticulously organized vegetable garden and endless crossword puzzles, yet she admits a guilty pleasure of binge‑watching tech unboxing videos
    well past midnight, often sacrificing sleep for the next breakthrough gadget.
background:
  cultural: Victoria was raised in Grand Prairie, Texas, in a middle-class family with deep roots in the American South and Midwest. Her upbringing emphasized hard work, self-reliance, and community involvement,
    values that blend Southern hospitality with the pragmatic, forward-looking mindset common in Texas. While she identifies as white, she grew up in a culturally diverse suburb, which fostered an appreciation
    for different perspectives and a cooperative attitude toward neighbors. These cultural influences, combined with her practical curiosity, shape her professional discipline and her dedication to helping
    others.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software installation and configuration'', ''Network diagnostics'', ''Active Directory management'', ''Ticketing system administration (ServiceNow, Zendesk)'',
