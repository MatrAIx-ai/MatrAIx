    scripting (PowerShell, Bash)'']'
  hobbies: '[''Gardening'', ''Cooking and baking'', ''Reading technology and science non-fiction'', ''Puzzle solving (crosswords, sudoku)'', ''Photography'', ''Volunteering at community tech-literacy programs'',
    ''DIY home improvement projects'', ''Family road trips'', ''Walking local nature trails'']'
  career_goals: Victoria aims to advance to a senior IT support or team-lead role within the next three years, leveraging her organizational strengths to improve support workflows and response times. She
    plans to earn CompTIA Security+ and Cisco CCNA certifications to broaden her expertise in networking and cybersecurity. Long-term, she envisions moving into an IT manager position where she can mentor
    a larger team, develop a company-wide knowledge base, and lead initiatives that enhance digital literacy for employees and the broader community.
