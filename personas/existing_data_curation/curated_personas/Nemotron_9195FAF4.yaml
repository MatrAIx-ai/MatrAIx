  career_goals: Bernard aims to complete his bachelor's degree in mechanical engineering within the next two years and obtain an Engineer-in-Training (EIT) certification. He aspires to work for a regional
    manufacturing firm in the Atlanta corridor where he can apply his design and machining skills while enjoying a stable, structured environment. Long‑term, he hopes to earn his Professional Engineer (PE)
    license, lead a small engineering team on product development projects, and eventually launch a side venture offering custom CNC‑fabricated parts for hobbyists and local businesses, balancing the security
    of a full‑time job with entrepreneurial flexibility.
