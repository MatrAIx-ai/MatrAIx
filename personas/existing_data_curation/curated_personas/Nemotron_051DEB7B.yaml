  hobbies: '[''Reading contemporary young adult novels'', ''Journaling and creative writing'', ''Sketching and watercolor painting'', ''Baking simple desserts'', ''Volunteering at the local animal shelter'',
    ''Walking in local parks and nature trails'', ''Listening to indie folk music'', ''Casual photography with smartphone'']'
  career_goals: Simran aims to earn her GED within the next year and then enroll in a community‑college program that prepares her for a career in nursing or social work. She is interested in becoming a
    certified nursing assistant (CNA) or a community health worker so she can provide direct support to underserved families in her area. In the longer term, she hopes to work in a clinic or youth outreach
    center where she can combine her compassion, organizational abilities, and desire for a stable, predictable work environment. She also plans to continue volunteering while she studies, building experience
    that will help her transition into a full‑time helping profession.
