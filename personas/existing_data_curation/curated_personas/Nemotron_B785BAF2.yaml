  career_goals: Although retired, Monica remains driven to contribute to her community and to continue personal growth. She aims to expand the local historical society’s archive by digitizing and curating
    town records, and to publish a memoir that weaves her family’s genealogy with regional history. She hopes to mentor younger volunteers, especially women interested in archival work and crafts, and to
    enroll in lifelong‑learning courses at Carleton College focused on art history and creative writing. Maintaining her health, managing stress, and keeping an orderly, purposeful daily routine are also
    central to her ambitions.
