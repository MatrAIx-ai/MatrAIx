  career_goals: As he approaches retirement, Joseph aims to transition into a foreman or site supervisor role where he can formally lead crews and pass on his hands-on knowledge. He plans to earn an OSHA
    30-hour certification and a small-business license to eventually start a boutique remodeling service focused on energy-efficient upgrades for local homeowners. He also hopes to be recognized by his
    union for outstanding safety records and to mentor the next generation of laborers in Camden County.
