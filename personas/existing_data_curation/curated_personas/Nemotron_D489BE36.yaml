  hobbies: '[''Street‑art photography'', ''Sketching'', ''Gallery visits'', ''Jazz and hip‑hop listening'', ''Cooking Caribbean cuisine'', ''Urban balcony gardening'', ''Reading urban culture literature'',
    ''Participating in a small book club'', ''Volunteering at community art workshops'']'
  career_goals: Octabius aims to advance from his current sales associate role to a store manager position within the next two years, followed by a district‑manager role overseeing multiple locations in
    the New York area. He plans to earn a retail‑management certification and eventually launch his own boutique that blends fashion retail with gallery‑style art exhibitions, spotlighting works by Black
    and African‑Diaspora artists. His long‑term ambition is to create a community hub where shoppers and art‑enthusiasts can converge, offering mentorship programs for young people entering the retail and
    creative industries.
