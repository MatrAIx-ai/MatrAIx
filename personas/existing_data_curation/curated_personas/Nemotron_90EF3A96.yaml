personas:
  professional: Lommie Wade is a seasoned financial strategist with three decades of experience in hospitality and tourism, blending rigorous budgeting, AI‑driven predictive analytics, and blockchain‑based
    transaction tracking, while mentoring junior staff and championing inclusive, ethical finance practices; they translate complex data into clear narratives for executives and board members.
  sports: Lommie Wade organizes weekly basketball games at the community center and joins a Saturday morning golf league at the Orlando Country Club, cheering for the Orlando Magic and Orlando City SC while
    fitting in morning jogs along Lake Eola during the cooler months, and they maintain a casual running routine in the fall.
  arts: Lommie Wade is a regular at downtown gallery openings, especially those featuring works by local painter Maya Collins, and they never miss a Wynton Marsalis jazz concert or a community theater production
    of A Raisin in the Sun, drawing inspiration for their own fusion recipes and weekend social gatherings.
  travel: Lommie Wade prefers thoughtfully planned trips that balance cultural immersion with relaxation, taking yearly weekend getaways to the Florida Keys, annual visits to New Orleans for its music and
    cuisine, and dreaming of a springtime stroll through Savannah’s historic squares, all while budgeting for family tickets to the Orlando Museum of Art’s special exhibitions.
  culinary: Lommie Wade experiments with soul‑food foundations like collard greens and sweet potatoes, spicing them with Caribbean heat from Scotch bonnet peppers and allspice, creating dishes such as jerk‑seasoned
    shrimp and grits, plantain‑infused gumbo, and sweet potato pie with coconut milk.
  core: Lommie Wade blends analytical rigor with artistic curiosity, juggling a demanding finance career, community mentorship, and a restless palate, all while battling occasional stress‑induced insomnia
    and a habit of over‑scheduling social events.
background:
  cultural: Lommie’s identity as a Black man who grew up in the culturally vibrant neighborhoods of Orlando informs his worldview and community involvement. He maintains strong ties to the city’s historic
    African‑American churches and is an active participant in annual events such as the Orlando Black History Month Celebration and the annual Juneteenth festival. His family traditions include sharing
    stories of the Great Migration and celebrating where his ancestors settled in the South. These cultural roots inspire his commitment to mentorship, financial empowerment, and preserving the artistic
    heritage of Orlando’s Black community.
