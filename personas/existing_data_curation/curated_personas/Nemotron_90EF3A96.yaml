  hobbies: '[''Visiting Art Galleries and Museums'', ''Listening to Jazz and Live Music'', ''Community Theater Participation'', ''Basketball (League Play)'', ''Golf'', ''Cooking Fusion Cuisine'', ''Volunteering
    as a Financial Coach'', ''Mindfulness Meditation'', ''Traveling to Cultural Festivals'']'
  career_goals: Lommie aims to transition into a senior executive role, such as Chief Financial Officer, where he can shape the financial strategy of a mid‑size organization while championing diversity
    and ethical finance practices. He is committed to building a legacy of financial literacy within his community, planning to launch a mentorship program that pairs experienced finance professionals with
    young Black adults in Orlando. Additionally, he seeks to spearhead sustainability‑focused budgeting initiatives that align corporate profitability with social and environmental responsibility. Over
    the next five years, he also hopes to obtain a professional certification (e.g., CPA) to formalize his expertise and broaden his influence in industry circles.
