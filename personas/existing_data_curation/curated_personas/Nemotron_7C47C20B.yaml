    and yoga'']'
  career_goals: Troy aims to become a senior partner at his firm and to establish a dedicated boutique practice focused on art law, cultural heritage protection, and social justice. He is committed to expanding
    his firm’s pro bono program for artists and nonprofit organizations, influencing Connecticut state legislation on cultural preservation, and mentoring younger lawyers. Over the next decade, he envisions
    publishing a scholarly book on law and the arts, teaching part‑time at a law school, and possibly serving as a state judge who can champion equitable access to legal resources.
