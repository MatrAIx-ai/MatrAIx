    Sites"]'
  career_goals: Although retired from formal employment, Katie aims to continue shaping her community by mentoring emerging entrepreneurs, serving on the board of a regional development coalition, and establishing
    a modest scholarship fund for local high‑school students interested in business studies. She also desires to author a memoir that weaves together her family’s Lowcountry heritage and lessons learned
    from decades of practical business experience, preserving a legacy for her grandchildren.
