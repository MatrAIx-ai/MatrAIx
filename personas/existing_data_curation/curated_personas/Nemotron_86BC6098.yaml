personas:
  professional: A retired business graduate, Katie Loyde leverages decades of financial planning and nonprofit leadership to mentor budding entrepreneurs, serve on a regional development coalition board,
    and shape community projects with a pragmatic, data-driven approach that balances curiosity and caution, and they apply meticulous spreadsheet modeling to every decision.
  sports: Katie Loyde follows the local minor league baseball team, the Charleston RiverDogs, participates in a senior walking club that meets on Saturday mornings, and occasionally plays a friendly round
    of golf at the historic Oyster Creek Golf Club, though they prefer watching the game from their porch rather than attending large crowds.
  arts: Katie Loyde expresses creativity through quilting blocks inspired by the region's natural motifs, attends intimate performances by the Charleston Symphony Orchestra featuring works by William Grant
    Still, and collects the folk prints of Southern artist Howard Finster, while they keep a well-worn copy of a Zora Neale Hurston biography on their nightstand for inspiration.
  travel: Katie Loyde enjoys carefully planned, small-group trips to historic Southern sites such as the Savannah Historic District and Natchez, Mississippi, where they relish walking tours of antebellum
    architecture, and they dream of a leisurely cruise along the Gulf Coast to see the Gulf Islands National Seashore before they settle into quiet evenings at home.
  culinary: Katie Loyde delights in preparing Lowcountry staples like shrimp and grits, crab soup with fresh garden herbs, and collard greens simmered with smoked ham hocks, skillfully blending traditional
    recipes with seasonal vegetables from their own garden, though they occasionally over-salt dishes when experimenting with new spice blends.
  core: Katie Loyde is a pragmatic, curiosity-driven retiree who blends Southern hospitality with sharp financial acumen, nurturing community growth while savoring quiet moments in the garden and in the
    pages of history, and they approach each task with a measured blend of caution and optimism.
background:
  cultural: Katie was raised in the rural Lowcountry of South Carolina, rooted in a white Anglo‑American family with generations of ties to the area. Her upbringing reflects traditional Southern values—strong
    church involvement (Methodist), hospitality, modesty, and an emphasis on hard work and self‑reliance. While she cherishes these customs, her graduate business education and lifelong curiosity have broadened
    her perspective, allowing her to blend respect for heritage with openness to new ideas. This cultural mix informs her community engagement, her preference for intimate gatherings, and her balanced,
    pragmatic outlook on life.
attributes:
  skills: '["Financial Planning", "Budgeting", "Strategic Decision‑Making", "Project Management", "Nonprofit Governance", "Mentoring", "Microsoft Office Suite", "QuickBooks", "Genealogical Research"]'
