  career_goals: James aims to move into a supervisory role within his call‑center, targeting a team lead or shift manager position within the next two to three years. He plans to earn a customer‑experience
    certification (CCXP) to bolster his credentials and improve his ability to coach new agents. Long‑term, he hopes to balance the stability of a structured schedule with the flexibility to launch a part‑time
    handyman or small auto‑repair business that leverages his practical, hands‑on skills and offers more control over his work hours, helping to reduce his anxiety about job security.
