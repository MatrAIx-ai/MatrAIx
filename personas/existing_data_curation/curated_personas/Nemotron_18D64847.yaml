  career_goals: Jose dreams of turning his love for art into a future career, hoping one day to become an illustrator or animator who can bring stories to life. He is also intrigued by technology and imagines
    creating video games or interactive apps that blend his drawings with coding. Beyond art, he aspires to travel, especially to Mexico, to experience new cultures firsthand, and someday to share his passion
    with others by teaching art workshops in his community.
