personas:
  professional: Jose Patino is an aspiring cartoonist and LEGO architect who blends imaginative storytelling with meticulous construction, channeling their curiosity and balanced organization into early
    creative projects, and they eagerly share new sketches with friends.
  sports: Jose Patino is an enthusiastic member of the local youth soccer league, cheering for the regional professional team the River City FC while training twice a week at the community field, and they
    dream of playing in a championship tournament.
  arts: Jose Patino devotes free time to drawing comics inspired by Bill Watterson and Mo Willems, painting vivid imaginary scenes, and assembling intricate LEGO sculptures, all while listening to traditional
    folk tunes and pop artists like Billie Eilish and Bad Bunny, and they often incorporate music rhythms into their drawings.
  travel: Jose Patino loves weekend road trips to the nearby state park for hiking and stargazing, and they fantasize about a future family vacation to Tokyo to explore anime culture and historic temples.
  culinary: Jose Patino helps prepare tacos with seasoned beef, fresh guacamole, and crunchy salsa, experimenting with cilantro, lime, and jalapeño flavors while delighting in the hands‑on process of cooking
    with family, and they sometimes sneak extra guacamole onto their plate.
  core: Jose Patino is a curious, organized ten‑year‑old who balances art, LEGO building, and soccer with a friendly, slightly messy habit of forgetting chores, and they often brighten the room with spontaneous
    doodles.
background:
  cultural: Jose’s family hails from the state of Jalisco in Mexico, and they keep many traditions alive in their home in Blue Springs. Spanish is spoken daily alongside English, giving him a bilingual
    environment that enriches his cultural perspective. He participates in celebrations such as Día de los Muertos and enjoys Mexican holidays, music, and cuisine, especially dishes like tamales and pozole
    prepared by his grandparents. Through community events at the local Mexican cultural center and visits to relatives in Texas, Jose balances his Mexican heritage with his Midwestern upbringing, fostering
    a strong sense of identity and appreciation for diversity.
