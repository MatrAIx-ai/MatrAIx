  career_goals: Carmen dreams of growing up to be someone who helps others and shares her love for learning. She often talks about becoming a teacher who can make stories come alive for kids, a veterinarian
    who cares for neighborhood animals, or a dancer who can combine Mexican folk rhythms with modern moves. She also imagines cooking in a kitchen where she can blend family recipes with new flavors. These
    aspirations reflect her kindness, love for teamwork, and curiosity about both people and the world around her.
