personas:
  professional: Carmen Pagan is an aspiring junior soccer captain for her neighborhood after‑school league, where their energetic, sociable nature and practical curiosity help them devise quick game strategies
    and keep teammates motivated, even though they often shrug off strict rules in favor of spontaneous fun.
  sports: Carmen Pagan loves playing forward in the Sunset Park Soccer Club, models their moves after the LA Galaxy and the U.S. women's national team, and balances energetic pickup games with occasional
    skateboarding in summer while also joining the community's kid‑friendly baseball tee‑ball league in spring.
  arts: Carmen Pagan spends afternoons sketching vibrant geometric designs reminiscent of folk art, frequently humming traditional folk melodies while belting out kid‑friendly pop hits, and delights in
    collecting stickers of beloved cartoon characters, which they weave into creative collages.
  travel: Carmen Pagan enjoys weekend road trips with family to places like the Grand Canyon and nearby state parks, where they explore trails and collect rocks, and dreams of a future adventure to Disneyland
    in California, preferring hands‑on exploration over long flights and often packing their favorite stickers for the journey.
  culinary: Carmen Pagan loves helping their mother bake chewy chocolate‑chip cookies and hand‑press fresh corn tortillas, delights in spreading guacamole made from ripe avocados, and often adds colorful
    sprinkles to finished treats, showing an eager, if sometimes messy, kitchen enthusiasm.
  core: Carmen Pagan is an energetic 8‑year‑old who blends a love of soccer, artistic flair, and folk music with a habit of misplacing stickers and occasionally forgetting an inhaler at the park.
background:
  cultural: Carmen grows up in a bilingual Mexican‑American household in Hemet, California. Spanish fills her home and family gatherings, while English is used at school and in the wider community. She
    celebrates Día de los Muertos and other Mexican holidays with homemade altars, traditional foods, and music, fostering a strong sense of heritage. Her family often cooks dishes like tacos, enchiladas,
    and tamales, and she helps prepare them, learning the cultural stories behind each recipe. The local Hispanic community center offers dance classes, Spanish story time, and cultural festivals, which
    Carmen attends with friends, reinforcing her connection to her roots while also embracing the diverse environment of Riverside County.
