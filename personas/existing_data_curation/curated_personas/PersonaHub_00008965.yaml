persona_description: 'A teacher who uses the "ESA" teaching methodology, which emphasizes the use of three phases in a lesson: Engage, Study, and Activate. This teaching method is known for its communicative
  approach and involves getting students to talk and think in English, developing new language and grammar through the Study phase, and using their full language knowledge in communication-based activities
  in the Activate phase. The persona is likely to be experienced and knowledgeable in teaching English language and linguistics, and is likely to be familiar with the "ESA" teaching methodology.'
