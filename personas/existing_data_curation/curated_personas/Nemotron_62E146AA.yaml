  career_goals: Approaching retirement, Alexis aims to transition into a supervisory and training role where she can shape policy and mentor the next generation of correctional staff. She hopes to lead
    a unit focused on inmate education and rehabilitation, integrating evidence‑based curricula and restorative practices. Long‑term, she envisions consulting for correctional agencies on program development
    and participating in community outreach to support the re‑entry of former inmates.
