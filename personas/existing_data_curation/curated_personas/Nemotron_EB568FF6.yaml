  hobbies: '[''pickup basketball'', ''fishing'', ''hunting'', ''DIY home improvement'', ''grilling'', ''classic‑rock concerts'', ''church volunteer work'']'
  career_goals: Aaron aims to move from laborer to crew foreman within the next three years, completing an OSHA 30‑hour certification and an NCCER carpentry credential. He hopes to enroll part‑time in a
    construction‑management program at a nearby community college, eventually qualifying to oversee larger projects and possibly launch his own subcontracting firm with his wife.
