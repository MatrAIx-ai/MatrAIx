personas:
  professional: Aaron Winters, a 25‑year‑old construction laborer with hands‑on expertise in framing, drywall, and concrete, leverages his methodical, safety‑first mindset and outgoing nature to coordinate
    crews, conduct quality inspections, and pave a clear path toward a foreman role and eventually his own subcontracting firm.
  sports: Aaron Winters hits the local recreation center for pickup basketball with the Charlotte Hornets fan club, joins his friends for weekend fishing on Lake Wylie and deer hunting trips, and supports
    the Carolina Panthers while maintaining a personal fitness routine of early‑morning runs and occasional weight‑lifting at the community gym.
  arts: Aaron Winters unwinds by attending classic‑rock concerts featuring Led Zeppelin tributes and The Rolling Stones tribute bands, curates a vinyl collection of Fleetwood Mac and Pink Floyd, and occasionally
    helps his church’s youth group stage a community theatre production of Godspell.
  travel: Aaron Winters loves short road trips to Asheville’s Blue Ridge hikes and Charleston’s historic waterfront, dreams of a summer fishing charter in Alaska’s Kenai River, and plans a future cultural
    getaway to Barcelona to explore its architecture while balancing his modest budget and weekend work schedule.
  culinary: Aaron Winters is a backyard grill master who perfects hickory‑smoked pork ribs with a bourbon glaze, enjoys experimenting with shrimp skewers seasoned with lemon‑garlic and cilantro, and frequently
    hosts neighborhood potlucks featuring homemade coleslaw and cornbread, although he admits to overusing salt when excitement builds.
  core: Aaron Winters blends a competitive, structure‑driven work ethic with a sociable love for group sports, grilling, and DIY projects, balancing meticulous budgeting with occasional splurges, all while
    navigating the occasional back ache and a skeptical eye toward others' motives.
background:
  cultural: Aaron was raised in the Upstate region of South Carolina, absorbing a Southern cultural outlook that values family, community, and outdoor recreation. His family’s traditions include church
    involvement (Baptist), Sunday‑day barbecues, and a respect for local heritage. These influences shape his practical work ethic, sociable nature, and appreciation for teamwork.
attributes:
  skills: '[''power‑tool operation'', ''concrete forming'', ''framing'', ''drywall installation'', ''basic masonry'', ''OSHA safety compliance'', ''blueprint reading'', ''material logistics'', ''equipment
