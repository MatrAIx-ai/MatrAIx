personas:
  professional: Alayna Hinkley is a customer‑service representative who leverages her empathetic listening, Canva‑savvy graphic designs, and love of storytelling to craft engaging brand messages, and they
    envision a future PR role that merges community outreach with creative advocacy.
  sports: Alayna Hinkley enjoys weekend hikes with the Jackson Outdoor Adventure Club, follows the Jackson State Tigers football and Mississippi Braves baseball teams, plays pick‑up basketball at the community
    center, and they sneak in sunrise yoga at Riverside Park during the cooler months.
  arts: Alayna Hinkley creates watercolors inspired by Van Gogh’s swirling colors, crafts digital illustrations echoing Studio Ghibli’s whimsical aesthetic, writes poetry reminiscent of Rupi Kaur’s concise
    style, and they regularly attend live jazz sessions featuring John Coltrane tributes at The Blue Note while sipping espresso.
  travel: Alayna Hinkley prefers spontaneous road trips, often exploring historic Natchez, savoring the music scene in New Orleans, and dreaming of chasing the aurora borealis over Tromsø, Norway, while
    they balance a modest travel budget with occasional weekend getaways alongside friends.
  culinary: Alayna Hinkley loves brewing pour‑over coffee with Ethiopian beans, assembling avocado toast topped with feta and radish, cooking spicy kimchi fried rice, and they treat themselves to raspberry‑filled
    macarons from the downtown patisserie, showcasing a confident home‑chef skill level.
  core: Alayna Hinkley is an imaginative, socially‑driven 20‑year‑old who blends artistic hobbies with a compassionate customer‑service career, often juggling spontaneous creativity, budget‑tight finances,
    and a habit of over‑committing to community projects, and they occasionally forget to pay a bill on time.
background:
  cultural: Alayna grew up in Jackson, Mississippi, within a white Southern family that values hospitality, community ties, and a strong sense of place. She was raised on local traditions such as Sunday
    family meals featuring fried chicken, collard greens, and cornbread, and holiday gatherings that blend Southern comfort food with church fellowship. The city’s rich blues heritage and vibrant African‑American
    cultural scene have shaped her appreciation for music, storytelling, and community activism. She also participates in regional celebrations like the Natchez Pilgrimage and the Mississippi State Fair,
    which reinforce a blend of Southern pride and openness to diverse cultural expressions.
attributes:
  skills: '[''Customer service communication'', ''Active listening'', ''Empathy'', ''Conflict de‑escalation'', ''Problem‑solving'', ''CRM software proficiency'', ''Multitasking'', ''Basic graphic design'',
