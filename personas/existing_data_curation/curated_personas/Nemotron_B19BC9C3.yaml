  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Creative writing (short stories, poetry)'', ''Exploring coffee shops'', ''Attending live music (blues, jazz)'', ''Improv comedy workshops'',
    ''Board‑game nights'', ''Group hikes'', ''Volunteering at animal shelter'', ''Reading speculative fiction'', ''Listening to philosophy podcasts'', ''Stargazing'']'
  career_goals: Alayna aims to build on her customer‑service foundation by pursuing an associate’s degree in communications or marketing, followed by a bachelor’s in public relations or community development.
    She wants to earn certifications in customer experience management and conflict resolution. In the medium term, she envisions moving into a community outreach coordinator role at a non‑profit or a brand
    experience manager position where she can blend her people‑skills, creativity, and desire to help others. Long‑term, she hopes to launch her own community‑focused art and mentorship program for youth
    in Jackson, combining her love of art, storytelling, and service.
