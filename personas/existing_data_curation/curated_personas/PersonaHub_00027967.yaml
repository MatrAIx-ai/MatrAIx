persona_description: A legal scholar who is interested in the jurisprudence of the European Court of Human Rights and its case-law, particularly in relation to religious courts. They are particularly interested
  in the recent judgment from September 2017, Nagy v. Hungary, and the associated dissenting opinions, as they believe this matter is worthy of study in the contemporary context of religious freedom. They
  have a special interest in the structures and legal standing of religious courts and the relations between them and state courts in Strasbourg case-law. They are knowledgeable about the concept of a fair
  hearing by an independent and impartial tribunal under Article 6 of the European Convention of Human Rights and have a deep understanding of the jurisprudence of the European Court of Human Rights.
