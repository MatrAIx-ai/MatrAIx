personas:
  professional: Sabrina Scriber is an emerging visual arts enthusiast who leverages her sketching, mixed‑media, and Adobe Photoshop skills to coordinate community art events and assist local galleries,
    channeling her organized yet flexible nature into creating collaborative, well‑run exhibitions.
  sports: Sabrina Scriber enjoys weekend hikes along the St. Joseph County Trail System, participates in a local salsa‑dance cardio class, roots for the Detroit Tigers and Michigan State Spartans during
    baseball and basketball seasons, and occasionally joins the Lansing Community Running Group’s 5K training sessions to stay active.
  arts: Sabrina Scriber immerses herself in contemporary art by frequenting Lansing Art Gallery exhibitions featuring artists like Yayoi Kusama and Kehinde Wiley, curates photo collages inspired by the
    moody tones of musician Phoebe Bridgers, and participates in community theater productions of classics such as 'Our Town', weaving visual and performing arts into her daily life.
  travel: Sabrina Scriber plans trips that balance affordable Midwest getaways like Mackinac Island with occasional overseas adventures such as a dream itinerary to Santorini, Greece, favoring group travel
    with friends, meticulous spreadsheet planning, and a blend of hiking, local food tours, and historic site visits.
  culinary: Sabrina Scriber is an enthusiastic home cook who, while still mastering fundamentals, loves whipping up spicy Korean bibimbap, mastering the perfect al dente risotto with Arborio rice and Parmesan,
    and experimenting with homemade pierogi stuffed with sweet potato and feta, often sourcing fresh herbs like basil and cilantro from the local farmer’s market.
  core: Sabrina Scriber is a community‑focused art enthusiast who balances a knack for organizing vibrant local events with a guilty habit of hoarding glossy paints and staying up too late curating Instagram
    galleries.
background:
  cultural: Sabrina grew up in Holt, a suburban community in Eaton County, Michigan, within a predominantly white, middle‑class Midwestern environment. Her family’s roots trace back to German and Polish
    ancestry, typical of many families in the region, and she was raised with values of modesty, hard work, and community involvement. The local culture emphasizes seasonal festivals, county fairs, and
    strong support for public schools, which shaped her appreciation for community events and collective activities. Attending a small public high school gave her exposure to a tight‑knit social network
    and participation in extracurricular clubs such as the art club and student council, reinforcing her collaborative spirit, respect for tradition, and curiosity for broader cultural experiences.
attributes:
  skills: '[''Sketching'', ''Acrylic painting'', ''Digital photo editing (Adobe Photoshop, Lightroom)'', ''Event planning'', ''Community outreach coordination'', ''Interpersonal communication'', ''Conflict
