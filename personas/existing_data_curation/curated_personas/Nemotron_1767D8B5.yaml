  hobbies: '[''Visiting art galleries and museums'', ''Sketching and acrylic painting'', ''Photography (candid and landscape)'', ''Mixed-media collage'', ''Community theater participation'', ''Salsa and
    modern dance classes'', ''Hiking local trails'', ''Reading contemporary fiction'', ''Book club discussions'', ''Cooking international recipes'', ''Attending live music concerts'']'
  career_goals: Sabrina aims to pursue higher education in visual arts or communications, targeting a bachelor's degree in Fine Arts or Graphic Design at a local community college or Michigan State University.
    She envisions a career that merges her artistic passions with community engagement, such as working as a gallery assistant, an art program coordinator for a nonprofit, or a junior graphic designer in
    a marketing agency. In the long term, she dreams of establishing a community art space in Holt that offers workshops, exhibition opportunities, and collaborative projects, fostering creativity and social
    connection among residents. She also hopes to develop a portfolio that showcases her mixed‑media art and photography, eventually freelancing for local businesses.
