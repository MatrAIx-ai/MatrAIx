personas:
  professional: Lesly Gilbert, a meticulous psychiatric nurse candidate, blends crisis de-escalation, electronic health record documentation, health informatics, and CBT group facilitation expertise with
    a competitive edge that drives them to champion data-backed treatment pathways while scrutinizing untested innovations.
  sports: Lesly Gilbert tackles the rugged trails of the Blue Ridge Mountains with the Blue Ridge Hiking Club in spring, practices Vinyasa yoga at the Asheville Yoga Collective year-round, cheers for the
    Carolina Panthers and Charlotte Hornets, and they rally with the Asheville City SC fan group for weekend soccer matches, treating fitness as both personal challenge and social bonding.
  arts: Lesly Gilbert curates a vintage vinyl collection featuring Tame Impala, Janelle Monáe, and Bjork, immerses themselves in indie concerts at the Grey Eagle, devours speculative novels by N.K. Jemisin
    and Haruki Murakami, and they channel rhythmic energy into community drum circles that celebrate African-derived musical traditions, letting these artistic pursuits shape their evenings and inspire
    their therapeutic work.
  travel: Lesly Gilbert maps out weekend getaways to the Great Smoky Mountains and Asheville's vibrant art districts with meticulous spreadsheets, dreams of extended stays in Iceland's geothermal landscapes
    and Kyoto's Zen gardens, and they balance adventure with a modest travel budget that favors hostels, Airbnb cabins, and occasional splurges on guided hikes.
  culinary: Lesly Gilbert transforms community garden harvests into Southern-inspired meals - spicy shrimp and grits with roasted corn salsa, bourbon-glazed BBQ chicken, and a ginger-infused peach cobbler
    - marrying smoked paprika, kale, and okra with modern plating flair, and they delight in experimenting with new twists on classic collard greens.
  core: Lesly Gilbert fuses data-driven precision with a vibrant social pulse, juggling meticulous clinical research, weekend drum circles, and a habit of over-organizing playlists while they occasionally
    forget to prioritize sleep.
background:
  cultural: Lesly grew up in a close‑knit Black community in the American South, shaped by family traditions of church involvement, storytelling, and communal support. Attending a historically Black high
    school encouraged her pursuit of STEM, leading to her graduate degree. In Asheville, she actively participates in local Black cultural festivals, supports Black‑owned businesses, and mentors younger
    Black students interested in health sciences. Her identity informs a deep commitment to culturally responsive mental health care, often integrating African American cultural strengths—such as music,
    spirituality, and communal resilience—into therapeutic practices.
attributes:
  skills: '[''Psychiatric patient assessment'', ''Crisis de‑escalation'', ''Therapeutic support'', ''Clinical documentation (EMR)'', ''Data analysis for patient outcomes'', ''Medication administration'',
    ''Mental status examination'', ''CBT facilitation'', ''Neuropsychological testing'', ''Health informatics'', ''Group therapy facilitation'', ''Community mental health outreach'']'
  hobbies: '[''Hiking in the Blue Ridge Mountains'', ''Yoga'', ''Drum circles and African American music'', ''Cooking Southern cuisine'', ''Reading speculative fiction'', ''Volunteering at community garden'',
    ''Organizing game nights'', ''Attending dance socials'', ''Collecting vintage vinyl records'', ''Going to indie music concerts'']'
  career_goals: Lesly aims to earn a master’s degree in psychiatric nursing to become a Psychiatric Nurse Practitioner within five years, focusing on integrating technology into mental health care. She
    aspires to lead a community mental health program in Asheville, develop evidence‑based treatment protocols, and conduct research on culturally responsive interventions for underserved Black populations.
    She also seeks certification as a Certified Psychiatric Rehabilitation Practitioner and hopes to mentor other Black women entering STEM and mental health fields.
