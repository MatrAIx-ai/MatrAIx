  career_goals: Although not formally employed, Tatijana aspires to become a recognized local historian in Marblehead. She plans to author a book on the town’s maritime heritage and to curate a permanent
    exhibit at the historical society. She also aims to launch a community garden that highlights native coastal flora, serving both educational and conservation purposes. Mentoring younger volunteers and
    leading a small oral‑history project are central to her ambition to preserve and share regional stories. On a personal level, she seeks to complete and publish her memoir, reflecting her life’s curiosity
    and practical insights.
