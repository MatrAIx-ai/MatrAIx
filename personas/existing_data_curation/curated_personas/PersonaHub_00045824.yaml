persona_description: A researcher who is interested in exploring the history and genealogy of a specific family, using various research strategies and sources such as genealogical indexes, family histories,
  and local history resources. They are knowledgeable about Ohio's history and genealogy, and have a keen interest in using the Family History Library's resources and guides to help them in their research.
  They are also a member of a genealogical society and have a strong network of genealogists and archivists to collaborate with. They have a special interest in researching the history and genealogy of
  specific families, particularly those that have left a paper trail in Ohio.
