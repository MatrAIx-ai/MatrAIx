personas:
  professional: Camille Hunter, a budding community helper, channels their disciplined organization and sociable energy into leading neighborhood clean‑up games, meticulously planning activities with clear
    goals, encouraging teamwork, and proudly earning a 'Super Helper' badge from the local community center.
  sports: Camille Hunter, an enthusiastic participant in the Neighborhood Kids Soccer Club, channels their energetic sociability into weekly games, practices disciplined drills with a precision reminiscent
    of professional Manchester United midfielders, and avidly follows the season of the local professional soccer team, City United FC, cheering loudly from the sidelines.
  arts: Camille Hunter, a lively arts enthusiast, blends disciplined choreography from their weekly ballet class with a love for Disney soundtrack staples like Idina Menzel's 'Let It Go' and the animated
    adventures of Moana, while also channeling imagination into elaborate LEGO sculptures that mirror the colorful worlds of Pixar's 'Toy Story' and the rhythmic chants of their church choir.
  travel: Camille Hunter, a curious little explorer, prefers short, well‑planned trips that balance structured activities—such as a guided dinosaur exhibit at the Natural History Museum—with playful downtime
    at the nearby splash park, and while they have already enjoyed a family weekend at the San Diego Zoo, they dream of a future adventure to Disneyland Resort in Anaheim.
  culinary: Camille Hunter, a budding foodie, relishes the creamy comfort of homemade mac and cheese made with sharp cheddar and elbow pasta, delights in assembling peanut‑butter‑and‑jelly sandwiches with
    grape jelly, and occasionally assists in baking chocolate‑chip cookies, proudly sprinkling extra chocolate chips for a sweet finish.
  core: Camille Hunter, a hyper‑organized six‑year‑old with a boundless love for group play, balances meticulous LEGO building with occasional snack‑time forgetfulness, embodying a spirited mix of discipline,
    compassion, and relentless curiosity.
background:
  cultural: Camille is raised in an African American family in Carrollton, Texas. Her household values education, church involvement, and community service. Family traditions include celebrating Juneteenth
    and Kwanzaa, sharing soul food dishes like collard greens and cornbread, listening to gospel and R&B music, and participating in local festivals and church events. These Southern‑Texan and urban Dallas
    influences shape her sense of identity, emphasizing togetherness, storytelling, and a strong commitment to helping others.
