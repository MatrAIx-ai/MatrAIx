persona_description: A surveyor or geodesist who specializes in vertical accuracy control and surface leveling. They are responsible for ensuring the accuracy and precision of elevations taken at surveying
  sites, using the geoid as the reference datum and leveling techniques to achieve vertical control. This persona is likely to be interested in precision engineering, geodesy, and surveying techniques.
  They may work in various industries, including construction, civil engineering, and surveying, where they are responsible for ensuring the accuracy of elevations and the accuracy of the overall survey.
  They may also be interested in advancements in surveying technology and the latest techniques for achieving vertical control.
