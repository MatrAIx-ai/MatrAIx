persona_description: A researcher from Deakin University's Centre for Integrative Ecology, who specializes in the study of the impact of environmental stress on the development of songbirds. Her research
  focuses on the mechanisms of development, particularly the prenatal acoustic environment, and how it impacts the development of birds in a warming climate. She has conducted extensive research on the
  ability of embryonic hearing to adapt to post-hatching conditions and the implications of this for the survival of songbirds in a changing environment.
