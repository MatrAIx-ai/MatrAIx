  hobbies: '[''Gardening'', ''Cooking Southern comfort food'', ''Knitting'', ''Church choir singing'', ''Crossword puzzles'', ''Reading historical biographies'', ''Walking in local parks'', ''Volunteering
    at community events'', ''Listening to gospel music'']'
  career_goals: She aims to attain the Project Management Professional (PMP) certification within the next year, positioning herself for senior project manager roles in county infrastructure projects. She
    also wishes to mentor younger employees, especially women of color, and lead community development initiatives that improve local public services. In the longer term, she envisions transitioning to
    a part‑time consulting role that allows flexible hours while still contributing her expertise to nonprofit organizations in Rutherford County.
