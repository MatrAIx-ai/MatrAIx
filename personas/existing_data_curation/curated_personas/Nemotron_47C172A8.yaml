personas:
  professional: Katina Harris, a seasoned public‑sector project manager, leverages meticulous planning, Microsoft Project expertise, and compassionate mediation to keep county infrastructure initiatives
    on schedule while they nurture junior staff and champion community‑focused outcomes.
  sports: Katina Harris enjoys low‑impact fitness, joining the local walking club that meets for sunrise strolls at Percy Warner Park, cheering on the Tennessee Titans on Sundays and the Nashville Predators
    during hockey season, while occasionally they play pickleball at the county recreation center.
  arts: Katina Harris finds solace in gospel music, regularly performing hymns by Mahalia Jackson and Aretha Franklin with her Baptist choir, while also knitting patterned blankets inspired by the vibrant
    quilts of the Southern folk art tradition and attending community theater productions starring local actors like Michael S. Davis, and they relish the way these creative outlets reinforce their sense
    of belonging.
  travel: Katina Harris prefers purposeful travel, planning weekend road trips to historic towns such as Savannah and Asheville for garden tours and culinary workshops, while dreaming of a relaxed cultural
    immersion in Charleston's historic district, all balanced against a modest travel budget and family commitments, and they often book trips well in advance to minimize anxiety.
  culinary: Katina Harris, an accomplished home cook, blends garden harvests of tomatoes, collard greens, and sweet potatoes into classic Southern staples like fried chicken, smoked turkey collard greens,
    and buttery cornbread, while occasionally they experiment with spice rubs and host potluck gatherings featuring their famed peach cobbler.
  core: Katina Harris, a detail‑driven project leader with a green thumb and gospel‑soul heart, balances structured routines with creative comforts, yet they wrestle with anxiety that colors both work and
    personal life.
background:
  cultural: Katina was born and raised in Lebanon, Tennessee, into a close‑knit African‑American family that has lived in the region for generations. Her upbringing was shaped by the church, family gatherings,
    and the traditions of the Southern Black community, where storytelling, music, and mutual support are central. Her grandparents were part of the Great Migration wave that settled in Middle Tennessee,
    bringing with them a strong work ethic and a commitment to education, even though formal higher education opportunities were limited in her youth. The local Black church has been a cornerstone of her
    cultural identity, providing spiritual guidance, social networks, and avenues for community service. She carries forward culinary traditions such as collard greens, cornbread, and fried chicken, as
    well as a love for gospel music and Southern hospitality. While she embraces modern professional practices, she also honors the communal values of respect for elders, resilience, and collective uplift
    that have defined her community.
attributes:
  skills: '[''Project planning'', ''Budget management'', ''Risk assessment'', ''Stakeholder communication'', ''Team coordination'', ''Microsoft Project'', ''Asana'', ''Report writing'', ''Office administration'',
