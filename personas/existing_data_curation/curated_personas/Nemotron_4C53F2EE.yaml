  hobbies: '[''Abstract Painting'', ''Visiting Contemporary Art Galleries'', ''Reading Science Fiction'', ''Improvisational Theatre'', ''Playing Strategy Board Games'', ''Cooking Experimental Cuisine'',
    ''Hiking in Michigan’s State Parks'', ''Listening to Jazz and Hip‑Hop'', ''Digital Photography'', ''Community Mentorship'']'
  career_goals: Charlie aims to ascend into senior operational leadership, ultimately stepping into a Director of Operations or Chief Operating Officer role where he can champion the integration of creative
    innovation with operational excellence. He plans to earn an MBA with a focus on strategic management, complementing his technical expertise with executive‑level business acumen. Over the next five years,
    he hopes to spearhead a company‑wide digital transformation initiative that leverages AI and automation to cut cycle times by at least 20%. Parallel to his corporate ambitions, he dreams of launching
    a boutique consultancy that helps midsize firms embed design‑thinking into their process‑improvement projects, positioning himself as a thought leader who bridges art and business. Driven by a competitive
    streak, he is determined to earn industry recognitions such as the Lean Enterprise Award and to mentor emerging Black professionals in operations, giving back to the community that shaped his resilience.
