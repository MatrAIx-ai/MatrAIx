persona_description: A historian who specializes in the study of medieval siege warfare and siege engines, particularly the counterweight trebuchet. Her research interests include the design, construction,
  use, and decline of the counterweight trebuchet in medieval Europe, as well as the role of Muslim engineers in the use of the trebuchet in Southeast Asia. She is particularly interested in the differences
  between the counterweight trebuchet and the traction trebuchet, and how they were used in medieval siege warfare.
