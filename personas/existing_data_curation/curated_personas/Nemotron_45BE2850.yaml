  career_goals: He aims to pursue a technical career that leverages his love for building and problem solving. In the short term, he plans to enroll in a community‑college engineering program, focusing
    on mechanical or electrical engineering, and to earn certifications in computer hardware repair and renewable‑energy installation. Long‑term, he hopes to work as a design engineer for sustainable technology,
    perhaps developing solar‑powered IoT devices for rural communities, and eventually run his own small engineering consultancy.
