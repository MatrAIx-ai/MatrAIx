personas:
  professional: Charles Mamak, a 16‑year‑old aspiring design engineer, merges a methodical, detail‑oriented mindset with hands‑on skills in Python scripting, Arduino and Raspberry Pi prototyping, and precise
    woodworking, positioning them to excel in future mechanical or electrical engineering studies.
  sports: Charles Mamak enjoys solitary fitness activities like trail‑running along the Richmond Hill parks and weekend cycling, follows the Toronto Maple Leafs in hockey and the Toronto Raptors in basketball,
    and participates in a local youth bike‑repair club, preferring structured, low‑key workouts over team sports.
  arts: Charles Mamak immerses themselves in classic science‑fiction works by Isaac Asimov and Andy Weir, curates a playlist featuring progressive rock icons like Rush and ambient composer Ólafur Arnalds,
    and spends weekends capturing bird photography inspired by Ansel Adams, letting these artistic influences shape their design aesthetic.
  travel: Charles Mamak plans trips with engineering precision, having hiked Algonquin Provincial Park for bird‑watching, dreaming of studying geothermal energy in Iceland and robotics in Japan, saving
    for each journey in a dedicated travel jar and comparing flight costs in a spreadsheet, though they sometimes postpone trips to purchase new hardware components.
  culinary: Charles Mamak prefers efficient, protein‑rich meals such as miso ramen with sliced pork, rosemary‑infused sourdough bread, and garlic‑roasted chicken thighs, often cooking in bulk to free up
    time for projects, and they experiment with precise French‑press coffee brewing using fine‑ground beans, yet they tend to skip vegetables when debugging code.
  core: Charles Mamak is a methodical teen engineer who channels solitary curiosity into coding, hardware tinkering, and precise hobbies, balancing meticulous planning with occasional gadget splurges and
    a quiet passion for bird‑watching photography.
background:
  cultural: Charles grew up in Richmond Hill, a small town in Bryan County, Georgia, steeped in Southern culture. His family is part of a multigenerational white community where church attendance, family
    gatherings, and a strong sense of neighborly responsibility are common. The region’s outdoors‑oriented lifestyle – fishing, hiking, and an appreciation for the local pine forests – has shaped his love
    for solitary nature activities. Local customs such as Southern hospitality and a practical work ethic influence his organized, reliable nature. While he respects the traditions of his community, he
    also seeks to blend them with modern, technology‑driven interests, reflecting a balance between cultural roots and his personal curiosity.
