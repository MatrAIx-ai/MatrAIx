  career_goals: Rajesh aims to enroll in a computer‑science bachelor’s program at a university in the Washington, D.C. metropolitan area, focusing on software engineering and data science. During his studies
    he plans to secure a remote internship where he can apply his coding and data‑analysis skills to real‑world projects. After graduation, he aspires to work as a remote software engineer at a company
    that values flexible work schedules and encourages continuous learning. In the longer term, he hopes to design and release an open‑source application that helps students organize their academic tasks
    and personal finances, combining his technical expertise with his desire to support his community.
