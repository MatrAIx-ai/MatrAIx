    evaluation of educational resources'']'
  hobbies: '[''Sketching and drawing'', ''Digital illustration'', ''Reading speculative fiction and poetry'', ''Visiting art galleries and museums'', ''Participating in community art workshops'', ''Playing
    strategic board games'', ''Experimenting with creative cooking'', ''Hiking and kayaking in local nature preserves'']'
  career_goals: She aims to complete a Bachelor’s degree in Early Childhood Education within the next two years, obtain certification as a Child Development Associate, and ultimately advance to a director
    role at a progressive preschool or community learning center. Stephanie also envisions establishing her own interdisciplinary educational studio that integrates art, technology, and inquiry‑based learning,
    positioning herself as an innovator in early childhood pedagogy.
