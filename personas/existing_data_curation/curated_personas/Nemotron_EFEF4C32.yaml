    "Leadership in Department and School Committees", "Grant Writing for STEM Programs", "Extracurricular Program Coordination (Robotics Club, Science Olympiad)"]'
  hobbies: '["Hiking in New England Trail Networks", "Amateur Astronomy and Stargazing Sessions", "Community Theater Volunteering (Stage Design and Acting)", "Running and 5K Races", "Yoga and Mindfulness
    Practice", "Organic Gardening", "Seasonal Cooking with Home-grown Produce", "Reading Science Fiction and Educational Non-Fiction", "DIY Electronics and Maker Projects (Arduino, Raspberry Pi)", "Traveling
    to Historical Sites in New England"]'
  career_goals: Angela’s next career milestones focus on expanding her impact beyond the classroom. She aims to become the head of the science department at her school, where she can shape the curriculum
    and mentor faculty. In the longer term, she envisions taking on a district-wide STEM leadership role, developing cohesive science programs for multiple schools, and establishing partnerships with local
    universities and businesses for student internships and community projects. To support these goals, Angela plans to earn an Ed.D. in Curriculum and Instruction, publish a resource guide on integrating
    inquiry labs in secondary education, and present her work at regional and national education conferences. She is also committed to advancing equity in STEM by creating outreach initiatives for underrepresented
    students in the community.
