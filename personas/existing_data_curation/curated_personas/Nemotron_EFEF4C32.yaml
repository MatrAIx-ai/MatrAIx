personas:
  professional: Angela Miller, a veteran high school science teacher, leverages her biology and chemistry expertise, meticulous curriculum design, and outgoing leadership to spearhead inquiry-based labs
    while mentoring colleagues and pursuing an Ed.D.
  sports: Angela Miller competes in the town’s 5K runs with the New England Runners Club, practices Vinyasa yoga at the local studio, and enjoys seasonal hiking the Blue Hills, while cheering on the Boston
    Red Sox and New England Patriots.
  arts: Angela Miller contributes stage designs to the community theater, occasionally performs in educational plays, and draws artistic inspiration from Lin‑Manuel Miranda’s musicals, Maya Angelou’s poetry,
    and the classic film Dead Poets Society.
  travel: Angela Miller plans family road trips to historic New England sites like Plymouth, Salem, and Newport, while also dreaming of a summer camping adventure in Acadia National Park, balancing detailed
    itineraries with spontaneous stargazing stops.
  culinary: Angela Miller cultivates a vegetable plot and transforms harvests into seasonal dishes such as heirloom tomato ratatouille, roasted beet and goat cheese salad, and kale pesto pasta, seasoning
    with fresh rosemary and thyme, though she sometimes over‑salts in enthusiasm.
  core: Angela Miller is a methodical, community‑oriented science educator whose curiosity fuels hands‑on teaching, garden‑to‑table cooking, and nightly stargazing, balanced by disciplined budgeting and
    a penchant for spontaneous outdoor adventures.
background:
  cultural: Angela was raised in a middle-class suburban family in the Greater Boston area, where the region’s historic emphasis on education, civic responsibility, and self-reliance shaped her values.
    Her family’s ancestry is primarily of English and Irish descent, and she grew up participating in community traditions such as town meetings, local fairs, and seasonal holidays that celebrate New England’s
    cultural heritage. The multicultural fabric of North Andover, with its mix of long-standing families and newer immigrant populations, fostered in her a respect for diversity and an interest in inclusive
    practices. Though she was exposed to a moderate Protestant upbringing, she now identifies as spiritually agnostic, focusing instead on community service and lifelong learning as guiding principles.
    This blend of New England pragmatism, progressive community values, and a personal commitment to education informs both her teaching philosophy and her engagement in local initiatives.
attributes:
  skills: '["Biology and Chemistry Content Knowledge", "Inquiry-Based Laboratory Design", "Curriculum Development and Mapping", "Differentiated Instruction", "Formative and Summative Assessment Strategies",
