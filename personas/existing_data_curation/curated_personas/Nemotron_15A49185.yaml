  career_goals: Tabitha envisions a future where her curiosity and practicality converge. She dreams of becoming an environmental scientist or biomedical engineer, developing tangible solutions that protect
    ecosystems or improve children's health. She also entertains the idea of a STEM teaching career, hoping to inspire younger students the way her teachers have inspired her. In the near term, she aims
    to excel in high school, secure a spot in a competitive STEM program, and take on leadership roles in extracurricular clubs. Long‑term, she aspires to attend a top university, earn a degree in environmental
    science or biomedical engineering, and contribute to community‑focused research or advocacy projects.
