personas:
  professional: Tabitha Curtis, a budding young robotics enthusiast who blends curiosity with practicality, channels her knack for organization and flexible thinking into designing LEGO Mindstorms projects
    for her middle school’s robotics club, often taking the lead in team brainstorming while ensuring deadlines are met.
  sports: Tabitha Curtis, an avid defender on the Silver Spring United youth soccer team who also follows the Washington Commanders and DC United, mixes weekly park hikes in Glen and Rock Creek with spontaneous
    basketball pick‑ups, and maintains a habit of stretching after each game to keep her legs agile.
  arts: Tabitha Curtis, a theater‑in‑the‑making who delights in acting and backstage set design, draws inspiration from the musical "Hamilton," immerses herself in graphic novels by Neil Gaiman, and dances
    to the pop beats of Ariana Grande and BTS while crafting friendship bracelets inspired by K‑pop aesthetics.
  travel: Tabitha Curtis, a weekend explorer who prefers day‑trips over long flights, has hiked the Shenandoah Skyline and toured the Smithsonian museums in Washington, D.C., and dreams of a family road‑trip
    to the Grand Canyon, balancing school commitments with limited vacation days.
  culinary: Tabitha Curtis, a budding home chef who loves whipping up pepperoni pizza with extra mozzarella, mastering the perfect scrambled eggs with cheddar and avocado, and swapping recipes for spicy
    ramen bowls at school potlucks, often snacking on trail mix during robotics sessions.
  core: Tabitha Curtis blends a restless curiosity with practical organization, turning Minecraft worlds into engineering sketches, juggling soccer drills and theater rehearsals, while occasionally staying
    up too late and forgetting to do laundry.
background:
  cultural: Tabitha is a white American teenager raised in Silver Spring, MD, a culturally diverse suburb of Washington, DC. Her family embodies a middle‑class suburban life, celebrating traditional American
    holidays like Thanksgiving, Christmas, and Fourth of July with family gatherings and community events. She attends a public middle school in Montgomery County, where daily interaction with peers from
    various ethnic and cultural backgrounds nurtures an inclusive outlook. Through local community centers and summer programs, she has been exposed to multicultural festivals, music, and foods, broadening
    her appreciation for diversity. While her everyday life reflects mainstream U.S. customs—English spoken at home, participation in school sports and clubs—her environment encourages curiosity about other
    cultures and a respect for different perspectives.
