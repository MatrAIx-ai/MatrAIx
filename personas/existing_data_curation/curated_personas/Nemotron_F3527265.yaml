personas:
  professional: Roy Stock is a community‑focused visual arts enthusiast who leverages carpentry, digital photography, and event‑planning abilities to assist local galleries, run art‑talk gatherings, and
    volunteer in theater set design while pursuing an Arts Administration certificate.
  sports: Roy Stock enjoys seasonal hiking along the Mokelumne River, belongs to the Central Valley Hiking Club, follows the Oakland Athletics in baseball and the Golden State Warriors in basketball, and
    incorporates weekly jogs and monthly community soccer pick‑ups to stay active.
  arts: Roy Stock immerses themselves in visual arts, drawing inspiration from Ansel Adams and Ai Weiwei, plays acoustic Joni Mitchell covers on the porch, volunteers for set design and improv performances
    at the local community theater, and regularly curates informal art‑talk gatherings featuring local painters and poets.
  travel: Roy Stock favors spontaneous weekend road trips that blend nature and culture, often exploring the Sacramento Delta wetlands, hiking Yosemite’s cliffs, tasting wines in Napa, and dreaming of an
    Andalusian cultural immersion tour, while budgeting travel costs through a dedicated savings envelope.
  culinary: Roy Stock experiments with fusion cuisine, frequently preparing fish tacos with mango‑jalapeño salsa, miso‑glazed quinoa bowls, and rosemary‑infused paella, showcasing solid amateur cooking
    skills and a love for fresh avocado, cilantro, and smoked paprika.
  core: Roy Stock is a curious, organized 35‑year‑old who balances solitary art contemplation with community‑centric projects, habitually drinks late‑night coffee, occasionally procrastinates on paperwork,
    and relentlessly pursues creative expression.
background:
  cultural: 'Roy James Stock grew up in a working‑class, white family with Irish and Italian ancestry in Stockton, California. His parents were involved in local small‑business and agricultural supply work,
    which gave him a deep appreciation for the Central Valley’s farming heritage and the steady, community‑oriented values of his upbringing. Living in a city known for its cultural diversity, he was exposed
    early to Spanish‑speaking neighbors, Hispanic festivals, and a range of culinary traditions, fostering an inclusive outlook. This blend of Midwestern family roots, agricultural realism, and the multicultural
    tapestry of the Bay Area’s periphery shapes his worldview: he values tradition, cooperation, and the exchange of new ideas, especially through the arts.'
attributes:
  skills: '[''Basic carpentry'', ''Home repair'', ''Digital photography'', ''Adobe Lightroom editing'', ''Adobe Photoshop basics'', ''Event planning'', ''Volunteer coordination'', ''Conversational Spanish'',
