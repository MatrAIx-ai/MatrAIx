  hobbies: '[''Visiting art galleries and museums'', ''Landscape photography'', ''Hiking along the Mokelumne River and Delta wetlands'', ''Reading contemporary fiction and art theory'', ''Playing acoustic
    guitar'', ''Experimenting with fusion cooking'', ''Volunteering for community theater set design'', ''Organizing informal art‑talk gatherings'']'
  career_goals: Roy is determined to turn his curiosity and practical skills into a sustainable career. His short‑term goal is to earn a GED and enroll in a community‑college certificate program in Arts
    Administration or Museum Studies, which will provide the credentials he currently lacks. He hopes to secure a part‑time position as a gallery assistant or cultural‑program aide in the Stockton area,
    where he can combine his love of art with his organizational strengths. Over the next five years, he plans to develop a modest freelance photography portfolio, sell prints online, and eventually launch
    a small community‑focused art space that hosts exhibitions, workshops, and local‑artist meetups, allowing him to maintain a balanced lifestyle while contributing to his neighborhood.
