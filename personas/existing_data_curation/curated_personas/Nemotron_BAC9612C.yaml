  career_goals: Travis aims to formalize his education by earning a GED within the next twelve months, then securing an apprenticeship in automotive technology or electrical work. He plans to leverage his
    methodical problem‑solving skills to become a certified technician and eventually launch a small independent repair service—either focusing on computer hardware or automotive services—where he can apply
    his competitive drive to build a reputation for reliability and precision. He also hopes to continue expanding his technical knowledge, possibly obtaining certifications such as CompTIA A+ or ASE.
