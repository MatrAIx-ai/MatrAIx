personas:
  professional: Travis Rosario, a 19‑year‑old aspiring automotive and electronics technician, leverages their methodical troubleshooting skills, Excel data‑analysis, and Python automation to excel in part‑time
    repair gigs and plans to secure an apprenticeship, applying a competitive drive to build a reputation for precision.
  sports: Travis Rosario follows the Boston Red Sox, participates in the local Millyard Trail Runners club for solo hikes on the Pembroke trails, and occasionally joins pick‑up basketball games at the community
    center to stay fit, balancing competitive spirit with solitary exercise.
  arts: Travis Rosario enjoys assembling historic vehicle model kits, listening to progressive rock icons like Pink Floyd and the orchestral soundtrack of Civilization VI, and watching BBC engineering documentaries,
    finding these artistic pursuits a quiet complement to their analytical mind.
  travel: Travis Rosario prefers low‑key, self‑planned road trips that double as research excursions, having driven to Detroit to explore automotive museums and to Gloucester for a maritime model‑building
    convention, while dreaming of a future visit to Munich’s Deutsches Museum.
  culinary: Travis Rosario is a pragmatic home‑cooker who often meal‑preps simple dishes like chicken‑and‑rice bowls, homemade ramen with pork belly, and grilled cheese with tomato soup, favoring ingredients
    such as rice, soy sauce, and smoked cheddar, while occasionally indulging in craft coffee from local roasters.
  core: Travis Rosario, a 19‑year‑old tech‑savvy introvert, blends relentless curiosity with meticulous practicality, turning solitary hobbies into disciplined skill‑building while maintaining a calm, competitive
    edge.
background:
  cultural: Travis grew up in Manchester, New Hampshire, a city with a strong working‑class heritage and a blend of traditional New England values. His family background is typical of many white residents
    in the region, with roots in Irish and Italian immigrant communities that emphasize self‑reliance, modesty, and community solidarity. The local public schools and community youth programs introduced
    him to practical vocational skills, reinforcing the region’s pragmatic outlook. The cultural emphasis on independence, thriftiness, and quiet competence aligns with his reserved, methodical personality
    and his preference for small‑group interactions over large social gatherings.
