persona_description: A communication specialist or speech-language pathologist who works with individuals with aphasia, focusing on supporting conversation and connecting with people through various communication
  strategies. They are knowledgeable about the challenges and strategies involved in accessing conversation and connections for individuals with aphasia, and have experience in implementing these strategies
  in real-world settings. They are skilled in writing, drawing, and using visual strategies to organize conversations, and are familiar with the work of Joanne P Lasker and Kathryn L Garrett, who have contributed
  to the field of communication for individuals with aphasia. They are passionate about improving communication outcomes for individuals with aphasia through the use of evidence-based practices and are
  committed to advancing knowledge and understanding in the field.
