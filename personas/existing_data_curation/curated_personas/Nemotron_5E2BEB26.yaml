personas:
  professional: Edward Acosta, a 26-year-old aspiring master carpenter, merges hands-on framing expertise, CAD-assisted design, and a passion for sustainable building while channeling their competitive
    drive and sociable leadership into organizing flexible crew schedules and pursuing journeyman certification.
  sports: Edward Acosta stays athletically engaged by captaining the Waukesha Flyers ultimate-frisbee squad, playing forward for the Waukesha United amateur soccer league, and regularly cheering on the
    Milwaukee Brewers and Green Bay Packers at County Stadium and Lambeau Field, reflecting their competitive spirit and preference for high-energy, team-oriented workouts.
  arts: Edward Acosta expresses their artistic side by strumming acoustic renditions of John Mayer and The Avett Brothers at neighborhood barbecues, attending the Milwaukee Art Museum's rotating modern
    art exhibitions, and catching performances by the Milwaukee Repertory Theater's productions of Lin-Manuel Miranda's Hamilton, aligning their sociable nature with a love for live music and visual storytelling.
  travel: Edward Acosta favors impromptu weekend road trips to Door County's cherry-blossom trails and the Upper Peninsula's rustic hikes, dreams of an eco-focused adventure exploring Iceland's geothermal
    fields and Portugal's Algarve coastline, and always budgets carefully to ensure their growing remodeling business stays financially stable.
  culinary: Edward Acosta enjoys cooking rustic dishes such as smoked bratwurst with sauerkraut, hand-rolled sourdough bread, and a seasonal roasted veggie lasagna made with heirloom tomatoes, while also
    indulging in Milwaukee's classic fish fry of battered cod and cheese curds, showcasing their hands-on craftsmanship both on the job site and in the kitchen.
  core: Edward Acosta is a competitively driven carpenter who balances meticulous tool organization with spontaneous weekend hikes, yet can't resist grabbing an extra Brewers ticket even when their budget
    warns against it.
background:
  cultural: Edward grew up in Waukesha, Wisconsin, in a family of German‑Polish descent that reflects the region's Midwestern heritage. The community’s emphasis on hard work, self‑reliance, and neighborly
    support shaped his values. He was raised with modest, Lutheran‑influenced traditions and participated in local festivals such as the Waukesha County Fair. This mix of rural craftsmanship and suburban
    community life informs his practical outlook, his appreciation for both tradition and incremental innovation, and his strong sense of belonging to the local Midwestern culture.
attributes:
  skills: '["Framing","Finish Carpentry","Blueprint Reading","Tool Maintenance","Project Estimation","Safety Compliance","Basic CAD","Custom Furniture Design","Team Leadership","Problem Solving"]'
