    Games"]'
  career_goals: Edward aims to achieve journeyman certification within the next year and then become a certified master carpenter. He plans to launch his own residential remodeling and custom‑furniture
    business in the Greater Milwaukee area, with a strong emphasis on eco‑friendly building practices and energy‑efficient materials. To support this, he intends to earn a Project Management Professional
    (PMP) credential and deepen his knowledge of green construction. His competitive drive pushes him to become a recognized top contractor in Waukesha County, and he hopes to mentor apprentices, passing
    on his blend of practical skill and innovative curiosity.
