personas:
  professional: Victor White is a senior facilities maintenance supervisor who blends hands‑on expertise in HVAC, plumbing, and electrical systems with meticulous planning, calm crisis management, and talkative,
    team‑centric leadership, and they ensure multiple Central Florida service sites run safely and efficiently.
  sports: Victor White competes in the Orlando Neighborhood Basketball League, lifts at the YMCA, jogs the West Orange Trail three times a week, and proudly follows the Orlando Magic, Tampa Bay Lightning,
    and Orlando City SC, cheering loudly at every home game.
  arts: Victor White attends live shows ranging from Kamasi Washington’s jazz ensembles to Kendrick Lamar’s hip‑hop concerts, curates BBQ playlists featuring Earth, Wind & Fire and John Coltrane, and regularly
    visits the Orlando Museum of Art for rotating contemporary exhibits.
  travel: Victor White plans trips with meticulous checklists via TripIt, enjoys weekend road trips to the Florida Keys and Savannah’s historic district, seeks adventure through hiking in Asheville’s Blue
    Ridge Mountains, and dreams of a future tech‑culture tour of Kyoto and Berlin.
  culinary: Victor White is a competent grill master who perfects a coffee‑rubbed ribeye, crafts quinoa‑black bean tacos with fresh cilantro and lime, sauces burgers with mango‑salsa, and occasionally delights
    in sushi rolls at a downtown Orlando Japanese bistro.
  core: Victor White balances relentless curiosity with methodical calm, talks the ears off anyone at community BBQs, rarely feels anxiety, yet secretly hoards spare light‑bulb packs for every emergency.
background:
  cultural: Victor was raised in a close‑knit African‑American family in Central Florida, where church, family gatherings, and community events were central to his upbringing. He grew up attending a historically
    Black church that emphasized service, fellowship, and cultural pride, celebrating milestones such as Juneteenth and Black History Month with music, storytelling, and cuisine that blend Southern and
    Caribbean flavors. These experiences instilled in him a strong sense of responsibility to uplift his community, a respect for tradition, and an appreciation for the resilience and creativity of Black
    culture in the U.S. While he embraces modern influences, Victor remains connected to his roots through regular involvement in local community service, mentorship programs, and cultural celebrations.
attributes:
  skills: '["Mechanical Troubleshooting", "HVAC System Maintenance", "Electrical Installation Supervision", "Plumbing Repair Oversight", "Team Leadership", "Project Scheduling", "Safety and Compliance Management",
    "Inventory and Asset Management", "Quality Assurance and Process Optimization", "Conflict Resolution and Mediation", "Technical Training and Mentorship", "Smart Building Technology Integration", "Emergency
    Response Management"]'
  hobbies: '["Basketball (recreational league)", "DIY smart-home projects", "Live music concerts (jazz, hip-hop, R&B)", "Hosting barbecues and game nights", "Weightlifting and jogging", "Youth STEM mentorship",
    "Exploring emerging tech (IoT, renewable energy)"]'
  career_goals: Victor aims to become a regional operations manager within the next five years, overseeing multiple service sites across Central Florida. He plans to complete his associate degree in Mechanical
    Technology and earn certifications such as Certified Maintenance & Reliability Technician (CMRT) and Project Management Professional (PMP). He also aspires to launch a mentorship program for underrepresented
    youth interested in trades, leveraging his network and experience to create apprenticeship pathways. Long‑term, he envisions establishing his own contracting firm that combines high‑quality mechanical
    services with a culture of collaboration, continuous learning, and community involvement.
