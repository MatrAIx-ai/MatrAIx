  career_goals: Yaimis aspires to combine her curiosity about how things work with a practical desire to help others by pursuing a career in biomedical engineering. In the short term, she aims to excel
    in high‑school science and math courses, win awards in robotics competitions, and secure a scholarship to a university known for engineering. Long‑term, she hopes to develop affordable medical devices
    that serve underserved Latino communities and to mentor younger students from similar backgrounds. She also keeps an open mind about exploring culinary arts as a way to preserve and share her Mexican
    heritage.
