personas:
  professional: Yaimis Feliciano, a 14‑year‑old aspiring robotics engineer, blends strategic video‑game tactics with hands‑on problem solving in her school’s robotics club, where her competitive edge drives
    her to prototype autonomous soccer bots while balancing schoolwork with a practical, curiosity‑fueled mindset.
  sports: Yaimis Feliciano plays midfield for the Stockton Raiders youth soccer team, trains twice weekly at the local field, follows the San Jose Earthquakes and FC Barcelona for tactical inspiration,
    and incorporates cardio drills from her robotics club’s team‑building sessions, showcasing a competitive drive and organized approach to fitness.
  arts: Yaimis Feliciano creates vibrant digital illustrations on Procreate inspired by the bright colors of Día de los Muertos, sketches fan art of Bad Bunny and J Balvin while listening to reggaeton,
    and spends evenings reading YA novels like 'Six of Crows,' letting the blend of music, art, and literature shape her creative identity.
  travel: Yaimis Feliciano prefers short road trips with her family, revisiting Lake Tahoe’s ski slopes in winter and exploring the historic streets of San Antonio in summer, while dreaming of a future
    backpacking adventure through Oaxaca’s markets, balancing structured itineraries with spontaneous detours.
  culinary: Yaimis Feliciano enjoys experimenting with family recipes such as carne asada tacos, chilaquiles, and homemade guacamole, using fresh cilantro and roasted peppers, while mastering the art of
    plating her creations on Instagram‑ready bowls, though she occasionally over‑salts dishes when distracted by video games.
  core: Yaimis Feliciano, a bustling 14‑year‑old competitive soccer player and digital artist, channels a curious yet practical mindset into strategic gaming, robotics, and Latin beats, all while juggling
    a snack‑filled study schedule and a habit of procrastinating on chores.
background:
  cultural: Yaimis is a Mexican‑American growing up in Stockton’s vibrant Latino community. She speaks Spanish at home and English at school, and her family maintains traditions such as celebrating Día
    de los Muertos, cooking tamales, and emphasizing close family ties (familismo). She participates in local Hispanic events, volunteers at community centers, and blends Mexican cultural values of respect
    and community with mainstream American influences, giving her a bicultural perspective that shapes her daily life and future aspirations.
