personas:
  professional: Yulisa Acostaperez leverages a blend of business strategy acumen and on‑the‑ground product demonstration skills to craft vibrant brand narratives, using her fluency in Spanish and English,
    public speaking flair, and energetic style to engage diverse audiences and drive sales, while her relaxed attitude toward strict deadlines sometimes leads to last‑minute pivots.
  sports: Yulisa Acostaperez embraces the Colorado outdoors by hiking the Flatirons, practicing sunrise yoga at Boulder Creek, and joining a local weekend camping group, while cheering for the Denver Broncos
    and Colorado Rockies, and using salsa dancing as a cardio workout that satisfies her energetic, social nature.
  arts: Yulisa Acostaperez expresses creativity through salsa and cumbia dancing at Latin‑American nights, curates playlists featuring Shakira, Carlos Vives, and Celia Cruz, admires the photography of Steve
    McCurry, and dabbles in basic graphic design for social‑media campaigns, letting rhythmic movement and vibrant visuals shape her personal brand.
  travel: Yulisa Acostaperez plans trips with a mix of meticulous photo‑journalism itineraries and spontaneous detours, having trekked the Andes near Bogotá, explored the historic streets of Cartagena,
    and camped in Rocky Mountain National Park, while dreaming of photographing the aurora borealis in Iceland and attending the Rio Carnival.
  culinary: Yulisa Acostaperez delights in cooking arepas with fresh corn masa, chicharrón, and avocado, perfecting the layered flavors of bandeja paisa, and experimenting with coq au vin for friends, possessing
    a confident home‑cook skill level that blends traditional techniques with occasional daring twists like quinoa‑infused empanadas.
  core: Yulisa Acostaperez is an exuberant, socially magnetic strategist who channels curiosity into brand storytelling, yet wrestles with anxiety‑driven impulsivity and a charming disorganization that
    fuels both her creative spark and occasional last‑minute scramble.
background:
  cultural: Yulisa was raised in a close‑knit Colombian family where music, food, and communal celebrations were central to daily life. She grew up listening to vallenato and cumbia, learning to prepare
    family recipes, and speaking Spanish at home, while also navigating the broader Colombian social fabric that values hospitality and personal connections. Since relocating to Boulder, she blends her
    Colombian warmth and collectivist values with the city's emphasis on outdoor recreation, sustainability, and diverse cultural expression, often acting as a cultural bridge by sharing Latin‑American
    traditions with her Colorado community.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Public speaking'', ''Product demonstration'', ''Brand storytelling'', ''Sales and negotiation'', ''Event planning and coordination'', ''Social
