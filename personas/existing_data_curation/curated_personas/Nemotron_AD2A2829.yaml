  hobbies: '[''Salsa and cumbia dancing'', ''Cooking Colombian cuisine'', ''Hiking in the Rockies'', ''Yoga and mindfulness practice'', ''Travel and cultural exploration'', ''Photography'', ''Participating
    in community festivals'', ''Group board‑game evenings'', ''Volunteering at local arts events'']'
  career_goals: Yulisa aims to move into a senior brand‑ambassador or regional marketing manager role for a lifestyle or consumer‑goods company, leveraging her on‑ground experience to shape national campaigns.
    She also envisions launching a boutique consultancy that trains product demonstrators and integrates Colombian cultural storytelling into sustainable brand narratives. Long‑term, she hopes to mentor
    younger professionals, especially women from multicultural backgrounds, and to develop a community‑focused workshop space in Boulder that merges fashion, wellness, and cultural expression.
