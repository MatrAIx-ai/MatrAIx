  career_goals: Nicole aims to turn her love of art and people into a career in arts administration or cultural event management. In the short term she plans to enroll in a community college program in
    communications or museum studies, secure an internship at the Walker Art Center or a local gallery, and build a portfolio of curated pop‑up events and social media campaigns. Her mid‑term goal is to
    obtain a full‑time position as an assistant curator or program coordinator for a regional museum or nonprofit arts organization. Long‑term she aspires to lead an independent community art space in Saint
    Paul, directing exhibitions, educational programs, and outreach initiatives that blend unconventional ideas with organized execution.
