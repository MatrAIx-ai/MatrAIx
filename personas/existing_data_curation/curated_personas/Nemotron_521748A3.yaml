personas:
  professional: Nicole Wiley, an aspiring arts administrator with a knack for strategic networking and meticulous event planning, channels their curiosity and competitive drive into curating pop‑up exhibitions
    and dynamic social‑media campaigns that blend unconventional concepts with organized execution.
  sports: Nicole Wiley maintains an active lifestyle by hiking the North Shore of Lake Superior and exploring Minnesota state parks on weekends, joining the Twin Cities Trailblazers running club for seasonal
    trail races, attending Minnesota Wild NHL games for a communal sports vibe, and regularly taking salsa and swing dance classes that double as cardio workouts.
  arts: Nicole Wiley immerses themselves in Saint Paul’s vibrant arts scene, sketching installations at the Walker Art Center, photographing street murals inspired by artists like Yayoi Kusama and local
    painter Alex Tunturi, attending indie shows featuring Sufjan Stevens and Hippo Campus, and volunteering at community theater productions of contemporary playwrights such as Sarah Ruhl.
  travel: Nicole Wiley prefers budget‑friendly, meticulously planned city getaways, having explored the indie music scene in Austin, the historic streets of New Orleans, and the scenic fjords of Iceland’s
    Golden Circle, while dreaming of a future art‑focused road trip across the American Southwest’s national parks.
  culinary: Nicole Wiley enjoys moderate cooking experiments, often whipping up vegan jackfruit tacos with avocado lime crema, sautéed seasonal mushrooms on a bed of wild rice, and perfecting a classic
    coq au vin for friends, while also indulging in brunches of avocado toast topped with radish and poached eggs at local cafés, and curating Instagram‑ready food photography with vivid cilantro and chili
    oil accents.
  core: Nicole Wiley is a socially energized, art‑obsessed strategist who balances competitive ambition with a spontaneous love for late‑night gallery hops and occasional over‑caffeinated brainstorming
    sessions.
background:
  cultural: Nicole grew up in the suburbs of Saint Paul, Minnesota, in a middle‑class, predominantly white community that reflects typical Midwestern values such as reliability, modesty, and community involvement.
    Her family background includes Scandinavian and German immigrant influences common in the region, reflected in seasonal traditions like ice‑fishing, summer lake festivals, and a love for local farmers
    markets. While she identifies with broader American popular culture, she also embraces the region's appreciation for the outdoors, winter activities, and the vibrant local arts scene. This cultural
    mix informs her open‑minded curiosity, her organized yet flexible approach to life, and her sociable, competitive spirit.
