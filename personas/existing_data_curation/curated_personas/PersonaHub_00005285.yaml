persona_description: A historian and archivist interested in the history and development of higher education in the American colonies, particularly the establishment of the College of William and Mary in
  Virginia and its subsequent growth and changes. This persona is interested in the details of the college's founding, its endowments, its educational programs, and its connection to the Episcopal Church.
  They are also interested in the college's history and its impact on American higher education.
