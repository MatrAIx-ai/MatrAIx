personas:
  professional: Keith Bordeaux is a hands‑on AV technician at a regional entertainment venue who combines a love of tinkering with custom PC rigs and a pragmatic, on‑the‑fly problem‑solving style, and is
    actively pursuing a Certified Technology Specialist credential while eyeing a supervisory role that lets them design the technical schedule for concerts and community events.
  sports: Keith Bordeaux follows the St. Louis Cardinals and the St. Louis Blues with a loyal but solitary fanhood, often watching games alone on a custom‑built PC rig, while joining the Ozark Trail Club
    for weekend hikes and occasionally casting a line at the St. Francis River, and they keep a low‑key routine of body‑weight workouts in their garage.
  arts: Keith Bordeaux immerses themselves in sci‑fi and fantasy literature, favoring authors like Neal Stephenson, N.K. Jemisin, and Brandon Sanderson, while indulging in strategy video games such as Civilization VI
    and XCOM 2, and they regularly listen to tech podcasts hosted by Linus Tech Tips and a favorite storytelling playlist featuring the band Nine Inch Nails.
  travel: Keith Bordeaux prefers solitary, low‑key adventures, having hiked the Ozark Trail, explored the Great Smoky Mountains, and taken a weekend road‑trip to the Canadian Rockies, while dreaming of
    a future solo trek through Patagonia and favoring DIY planning over packaged tours.
  culinary: Keith Bordeaux enjoys cooking hearty meals like smoked catfish, grilled ribeye with rosemary, and chili mac using fresh herbs and locally sourced bourbon‑infused BBQ sauce, and they experiment
    with building a custom spicy rub while occasionally treating themselves to a craft brewery’s seasonal IPA.
  core: Keith Bordeaux is a solitary, curiosity‑driven AV specialist who balances hands‑on tinkering with a competitive streak, yet battles chronic anxiety and a habit of last‑minute budgeting.
background:
  cultural: Keith grew up in a working‑class white family in rural southeastern Missouri, where community events like county fairs, high‑school sports, and church gatherings shaped his early years. The
    region’s Midwest values of self‑reliance, modesty, and practicality are still evident in his outlook. While he maintains a quiet, solitary lifestyle, he retains a connection to local traditions—such
    as attending the annual St. Francois County fair and supporting local diners—reflecting a blend of rural Midwestern culture and an individualistic, curiosity‑driven personality.
attributes:
  skills: '[''AV equipment troubleshooting'', ''Audio mixing console operation'', ''Basic electrical wiring and fixture repair'', ''Inventory control and stock rotation'', ''Cash register operation and
    reconciliation'', ''Safety compliance and incident response'', ''Independent problem solving'', ''Rapid learning of new tech platforms'']'
  hobbies: '[''Building custom PC rigs'', ''Reading science fiction & fantasy novels'', ''Hiking Ozark Trail'', ''Fishing at St. Francois River'', ''Strategy video gaming (e.g., Civilization)'', ''Listening
    to technology and true‑crime podcasts'', ''Journaling'']'
  career_goals: Keith aims to move from a front‑line attendant role to a supervisory position overseeing venue operations, eventually becoming a manager who designs and runs the technical schedule for concerts
    and community events. He plans to earn a Certified Technology Specialist (CTS) credential to formalize his knowledge and to build a small freelance service offering AV setup for local weddings and fairs.
    Stability and predictable income are important to alleviate his stress, so he also hopes to negotiate a more regular shift pattern that allows him to maintain his solitary work style while still advancing
    his career.
