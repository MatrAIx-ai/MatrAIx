  career_goals: Christina is focused on advancing to senior operational management within a technology‑driven organization. She aims to become an Operations Manager or Director of Administrative Services,
    overseeing larger multi‑site teams and shaping strategic initiatives that enhance productivity and employee experience. She plans to supplement her STEM graduate degree with an MBA or relevant certifications
    (e.g., PMP, Certified Administrative Professional) to broaden her strategic and financial acumen. A long‑term ambition is to champion diversity and inclusion programs, mentor emerging female leaders,
    and lead organization‑wide change projects that integrate data‑driven process automation.
