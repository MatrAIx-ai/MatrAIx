personas:
  professional: Christina Chiurliza fuses her STEM foundation with deep administrative experience to lead multi‑site tech operations, deploying Lean Six Sigma, workflow automation, and data‑driven performance
    dashboards while championing diversity initiatives and maintaining a disciplined, results‑focused culture.
  sports: Christina Chiurliza energizes herself by salsa dancing three nights a week at a local club, conquering the Santa Cruz Mountains' rugged trails on weekends, and cheering for the San Francisco Giants
    and Golden State Warriors, while also maintaining a consistent yoga practice to support flexibility.
  arts: Christina Chiurliza immerses herself in the rhythms of Celia Cruz, the modern pop of Rosalia, and the classical guitar of Joaquín Rodrigo, often attending live performances at the San Francisco
    Symphony and curating a small collection of flamenco artwork that decorates her home.
  travel: Christina Chiurliza plans her trips with meticulous itineraries, favoring cultural immersion in Barcelona's Gothic Quarter, wine tours in Napa Valley, and volunteer‑focused stays in rural Guatemala,
    balancing adventure with budget‑conscious choices.
  culinary: Christina Chiurliza cultivates a hobby of recreating traditional Spanish dishes such as paella Valenciana, gazpacho, and tortilla española, skillfully blending saffron and smoked chorizo, and
    hosts monthly dinner parties where she showcases these flavors to friends and family.
  core: Christina Chiurliza is a data‑driven, competitively spirited organizer who channels her sociable energy into salsa, hiking, and meticulously planned dinner gatherings, yet often sacrifices sleep
    to perfect every spreadsheet.
background:
  cultural: Christina’s cultural background is rooted in her Spanish heritage, which she celebrates through language, cuisine, and community. Raised in a bilingual household in California, she grew up speaking
    both Spanish and English, and maintains a strong connection to family traditions such as weekly shared meals and annual celebrations of Spanish holidays like Día de los Reyes and Semana Santa. She actively
    participates in local Spanish cultural events, supporting organizations that promote Spanish arts and music. While embracing these traditions, she also integrates the innovative, fast‑paced environment
    of Silicon Valley, balancing respect for her roots with a forward‑looking, tech‑savvy perspective.
