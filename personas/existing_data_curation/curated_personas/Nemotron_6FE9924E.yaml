  hobbies: '["watercolor painting", "chess", "reading speculative fiction", "philosophy", "vegetable gardening", "volunteering at a community shelter", "photography", "birdwatching"]'
  career_goals: Norris hopes to transition into a consulting role that allows him to share his decades of experience with new detectives and reform community‑policing strategies in DeSoto County. He aspires
    to develop a mentorship program focusing on mental‑health awareness for officers, drawing on his sensitivity to stress. Before fully retiring, he aims to author a series of case studies that blend investigative
    technique with creative problem‑solving, and to advise local government on policies that promote harmony between law enforcement and the community.
