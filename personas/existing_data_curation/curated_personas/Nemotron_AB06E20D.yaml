  hobbies: '[''Painting (folk and abstract)'', ''Digital illustration'', ''Live music attendance'', ''Salsa dancing'', ''Youth art mentorship'', ''Group hiking'', ''Escape‑room puzzles'', ''Exploring culinary
    fusion'', ''Tech trend reading'', ''Community cultural events'']'
  career_goals: Lorena aims to complete her bachelor's degree in Accounting or Business Administration within the next two years and pursue CPA certification. Her medium‑term goal is to become a billing
    manager or financial analyst at a healthcare organization, where she can combine her analytical skills with her creative problem‑solving abilities. Long‑term, she envisions launching a consulting firm
    that helps small Mexican‑American businesses streamline their finances while offering workshops on financial literacy for the Hispanic community in Houston. She is also interested in further developing
    expertise in data analytics and emerging fintech tools.
