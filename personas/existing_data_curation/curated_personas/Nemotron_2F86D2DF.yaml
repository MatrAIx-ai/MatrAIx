personas:
  professional: Jose Simmons is a highly skilled structural metal fabricator who blends meticulous blueprint reading and advanced welding techniques with a naturally sociable leadership style, routinely
    training apprentices, mediating workplace conflicts, and envisioning sustainable community projects while balancing curiosity for new metal technologies with the practical need for safety compliance.
  sports: Jose Simmons fuels their competitive spirit as an avid Ohio State Buckeyes football fan who tailgates with friends, joins a local hiking club for weekend trail runs on Oak Hill, and participates
    in a Friday night recreational basketball league, though they often skip workouts after a demanding shift at the shop.
  arts: Jose Simmons channels their love for the spotlight into acoustic guitar sessions inspired by John Mayer and Mumford & Sons, sings baritone harmonies in the Columbus Community Choir, and crafts metal
    art pieces for local festivals, but they sometimes forget to practice because their social calendar fills up.
  travel: Jose Simmons prefers road‑trip adventures that combine fishing in the Scioto River with weekend getaways to Hocking Hills and occasional pilgrimages to the Mackinac Island music festival, while
    dreaming of a future overseas expedition to Patagonia’s trout rivers and the aurora‑lit skies of Iceland.
  culinary: Jose Simmons enjoys cooking smoked trout with fresh corn and rosemary, whipping up hearty BBQ brisket ribs for community potlucks, and experimenting with homemade fish tacos topped with jalapeño
    slaw, though they often reward a long workday with a fast‑food burger and fries.
  core: Jose Simmons is a calm, talkative metalworker who harmonizes his love for crafting, community, and the outdoors with a practical drive toward leadership and sustainable projects, all while occasionally
    indulging in fast‑food comfort.
background:
  cultural: Jose grew up in the Midwestern town of Amanda, Ohio, where values of hard work, humility, and community involvement are deeply embedded. His family has a long tradition of trade work, with grandparents
    who were machinists in Ohio's manufacturing sector. He was raised in a close-knit, predominantly white community that celebrates local customs such as county fairs, Fourth of July parades, and seasonal
    potlucks. Church gatherings and volunteer service have played a central role in his upbringing, fostering his compassionate and cooperative nature. This regional culture of reliability, practicality,
    and neighborly support shapes his worldview, while his curiosity about new technologies pushes him to blend traditional craftsmanship with modern innovation.
