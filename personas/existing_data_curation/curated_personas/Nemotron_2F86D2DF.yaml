  career_goals: Jose aims to advance to a foreman or shop supervisor role within the next three years, obtaining AWS Certified Welder and CNC Machinist certifications to solidify his technical credentials.
    He aspires to lead larger, more complex construction projects and eventually launch his own small metal fabrication business focused on sustainable, locally sourced projects such as community park sculptures
    and energy-efficient structural components. Jose also hopes to mentor younger workers in his community, fostering a collaborative and supportive workplace culture, and plans to pursue an associate degree
    in industrial technology to broaden his engineering knowledge.
