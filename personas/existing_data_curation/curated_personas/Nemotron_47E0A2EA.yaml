personas:
  professional: Marc Moore, a retired marine‑supply shop owner turned community mentor, blends his hands‑on carpentry, boat‑restoration, and small‑engine repair expertise with a methodical business sense,
    using a skeptical yet curious approach to guide younger apprentices while volunteering at the senior center and historical society.
  sports: Marc Moore enjoys early‑morning kayak trips on Coos Bay, follows the Oregon State Beavers football team and the Portland Timbers soccer club, and regularly participates in the Coos Bay Senior
    Fitness Center’s low‑impact exercise classes while maintaining a competitive edge in the local senior chess club, blending aquatic activity with a quiet devotion to team sports.
  arts: Marc Moore frequently attends performances at the Coos Bay Little Theatre, admires the historical novels of Bernard Cornwell, enjoys classic folk songs by Woody Guthrie and piano works of Irving
    Berlin, and keeps a meticulous bird‑call journal inspired by John James Audubon’s illustrations, letting the arts shape both leisure and creative woodworking designs.
  travel: Marc Moore prefers relaxed, self‑planned road trips along the Oregon Coast, relishes annual visits to historic Astoria and the Oregon Dunes, has recently explored the maritime heritage of Vancouver,
    Canada, and dreams of photographing Norway’s fjords, always traveling with his grandchildren in a modest travel trailer while carefully budgeting each journey.
  culinary: Marc Moore delights in cooking fresh Dungeness crab with garlic, butter, and Old Bay, prepares hearty vegetable stew using kale, carrots, and locally grown potatoes from his garden, and occasionally
    savors a slice of homemade apple‑cinnamon pie, reflecting a moderate cooking skill set that balances traditional coastal flavors with garden‑fresh produce.
  core: Marc Moore, an 89‑year‑old former marine‑supply shop owner, marries a competitive curiosity with practical craftsmanship, a love of coastal traditions, and a disciplined, slightly skeptical outlook
    that fuels daily routines from fishing at dawn to mentoring youth.
background:
  cultural: Marc is a white American of mixed English and Scandinavian ancestry, raised in the coastal towns of western Oregon. His upbringing was steeped in Pacific Northwest values of self‑reliance, respect
    for the natural environment, and a strong sense of community. He grew up during the post‑war era, witnessing the timber and fishing industries shape the region's identity, which fostered his practical
    work ethic and appreciation for both tradition and innovation. Today, he participates in local heritage festivals, supports the annual salmon run celebrations, and maintains ties to a Baptist church
    that emphasizes service and stewardship.
