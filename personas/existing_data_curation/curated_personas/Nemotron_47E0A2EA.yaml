  hobbies: '[''Coastal Fishing'', ''Woodworking'', ''Boat Restoration'', ''Birdwatching'', ''Senior Chess Club'', ''Historical Fiction Reading'', ''Community Theater Attendance'', ''Vegetable Gardening'',
    ''Digital Photography'', ''Memoir Writing'']'
  career_goals: Marc's primary ambition is to remain a vital part of the Coos Bay community by mentoring younger residents in practical trades and local history. He aims to complete a memoir that captures
    the changing face of the Pacific Northwest, learn to use digital photography and basic video editing to document his stories, and guide his grandchildren in sustainable fishing practices. Though retired,
    he aspires to stay physically active through regular kayaking trips and to maintain his independent living by keeping his home in top condition.
