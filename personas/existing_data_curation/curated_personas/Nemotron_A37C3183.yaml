personas:
  professional: Eliodoro Salinas is a budding young strategist who transforms their love for structured recreation into meticulous LEGO architectural builds and strategic chess play, consistently applying
    methodical planning, competitive drive, and calm resilience to solve complex puzzles.
  sports: Eliodoro Salinas is a dedicated member of the River Rapids Youth Swim Team, adhering to a strict training schedule, cheering for the local baseball club the Springfield Lions, and following the
    international soccer team FC Barcelona for tactical inspiration.
  arts: Eliodoro Salinas immerses themselves in creative expression through LEGO Mindstorms robotics projects, Minecraft building challenges, and a love for the orchestral scores of Hans Zimmer and the
    animated adventures of Pixar, often drawing inspiration from the geometric designs of architect Zaha Hadid.
  travel: Eliodoro Salinas enjoys weekend excursions to the nearby Redwood National Park for hiking, family beach trips to Pacific Coast Shores, and dreams of exploring the historic castles of Scotland
    and the colorful world of Legoland Denmark, always planning trips with detailed itineraries and a modest travel budget.
  culinary: Eliodoro Salinas prefers simple yet flavorful meals like pepperoni pizza, spaghetti bolognese with fresh tomatoes and basil, and banana‑mango smoothies, can assemble a basic sandwich and bake
    cupcakes with parental guidance, and delights in choosing crunchy carrots and sliced apples as snack staples.
  core: Eliodoro Salinas is a calm, methodical nine‑year‑old who balances a fierce competitive streak with a love for structured play, often hoarding LEGO bricks in their room and occasionally neglecting
    to reply to friends’ messages.
background:
  cultural: Eliodoro comes from a Spanish family; his parents emigrated from Spain and preserve traditional customs at home. He grows up bilingual, speaking Spanish with his family and English at school.
    At home, he celebrates Spanish holidays such as Día de los Reyes and Semana Santa, enjoying homemade paella, churros, and other regional dishes. Living in Bradenton, Florida, he also participates in
    local Hispanic community events and is exposed to coastal Florida culture, which fuels his interest in marine environments and adds a blend of Mediterranean and Floridian influences to his upbringing.
