  hobbies: '[''Reading contemporary fiction'', ''Gardening'', ''Puzzle solving (Sudoku, crosswords)'', ''Volunteer coding mentor for local after‑school program'', ''Yoga and meditation'', ''Listening to
    jazz and R&B music'', ''Cooking family meals'', ''Small book club gatherings'']'
  career_goals: Kimberly aims to transition from senior software engineer to a tech‑lead or engineering manager role where she can shape product strategy and foster inclusive team cultures. She is pursuing
    AWS Solutions Architect certification and a part‑time MBA to broaden her strategic perspective. Her long‑term ambition is to lead initiatives that develop technology solutions for underserved communities,
    especially educational tools for Black youth in the Midwest. Balancing professional growth with personal well‑being, she seeks a role that offers structured processes, clear milestones, and the flexibility
    to maintain a healthy work‑life balance.
