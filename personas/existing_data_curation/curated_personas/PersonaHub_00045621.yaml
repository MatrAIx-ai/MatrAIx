persona_description: A wildlife researcher and ecologist who is conducting a study on the survival of wild turkeys in northern Minnesota. The study aims to determine the range and population of wild turkeys
  and to assess their ability to expand their population into northern Minnesota. The researcher is using radio transmitters to track the birds and is collaborating with the Minnesota Department of Natural
  Resources, the National Wild Turkey Federation, and the Mille Lacs and Fond du Lac bands of the Ojibwe tribe to collect data. The study is expected to last for at least three years and will cost about
  $100,000. The researcher is interested in understanding the factors that affect the survival of wild turkeys in northern Minnesota and the potential benefits of their expansion into this region.
