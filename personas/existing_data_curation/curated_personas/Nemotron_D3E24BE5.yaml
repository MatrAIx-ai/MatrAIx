  hobbies: '[''Book club'', ''Bridge (senior league)'', ''Chess'', ''Trivia night'', ''Walking group'', ''Community gardening'', ''Genealogy research'', ''Theater outings'', ''DIY home improvement'', ''Neighborhood
    event organization'']'
  career_goals: Although retired from full‑time employment, John intends to channel his organizational talent and academic passion into volunteer leadership roles. He aims to serve on the board of the local
    historical society, mentor high‑school students in writing, and pursue a self‑directed study of archival preservation. He also hopes to publish a memoir that reflects on his life’s lessons and achieve
    recognition as a competitive bridge player in senior tournaments. Maintaining his health through a structured exercise routine and reducing anxiety by establishing predictable daily schedules are personal
    priorities.
