personas:
  professional: Francis Grier, a 45-year-old diesel mechanic with ASE Master Technician aspirations, blends technical mastery of heavy‑vehicle systems with an artist’s eye for detail, mentoring apprentices
    while dreaming of opening a boutique low‑emission service shop that reflects his love for custom restoration and a flexible work‑life balance.
  sports: Francis Grier spends weekends fishing for trout on Lake Cadillac, hiking the forest trails of northern Michigan, and cheering for the Detroit Tigers and Michigan State Spartans, while belonging
    to a local fishing club and a casual hiking group that meets monthly to explore new routes.
  arts: Francis Grier channels his creative spirit into oil‑painting Upper Peninsula landscapes, capturing the light with a DSLR camera inspired by Ansel Adams, strumming acoustic guitar to the sounds of
    Jimi Hendrix and Miles Davis, and designing theatrical lighting for community productions, often citing van Gogh’s bold colors and Bob Ross’s soothing technique as artistic touchstones.
  travel: Francis Grier prefers spontaneous road trips on his restored vintage motorcycle, charting routes through Michigan’s Upper Peninsula, the Great Lakes shoreline, and occasional detours to Portland’s
    bike scene, while dreaming of Scandinavian fjord tours and a cultural immersion in Kyoto’s motorcycle heritage, balancing his wanderlust with the family’s budget constraints.
  culinary: Francis Grier enjoys cooking hearty trout al forno with fresh rosemary and thyme after a day on the lake, pairs it with locally sourced cheese curds and craft beer, and experiments with DIY
    sous‑vide temperature control using Arduino, while still relying on quick skillet meals when a shop emergency calls.
  core: Francis Grier is a technically skilled diesel specialist who fuses his love for art, vintage motorcycles, and nature into a uniquely relaxed yet worry‑prone life, constantly juggling shop ambitions
    with creative hobbies and occasional bouts of disorganization.
background:
  cultural: Francis grew up in a small, middle-class family in northern Michigan, with roots tracing back to German and Polish immigrants who settled the region in the early 20th century. Immersed in the
    automotive heritage of the Great Lakes, he was surrounded by the sounds of diesel trucks and the rhythm of local manufacturing. The community emphasized self-reliance, mutual aid, and a pragmatic work
    ethic, values he carries into his professional life. He participates in regional traditions such as county fairs, enjoys local foods like cherry pie, and remains involved with his hometown church and
    volunteer fire department, reflecting a strong sense of Midwestern community solidarity.
attributes:
  skills: '[''Diesel engine diagnostics'', ''Heavy-duty brake repair'', ''Hydraulic system maintenance'', ''Emission control system calibration'', ''Computerized diagnostic software (Delphi, JPRO)'', ''Welding
