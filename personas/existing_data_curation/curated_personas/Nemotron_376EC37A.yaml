  hobbies: '[''Oil painting'', ''Landscape photography'', ''Acoustic guitar'', ''Fishing'', ''Hiking'', ''Vintage motorcycle restoration'', ''Community theater lighting design'', ''Science-fiction reading'',
    ''DIY electronics tinkering'', ''Attending art fairs'']'
  career_goals: Francis aims to transition from employee to owner-operator by opening a boutique diesel-service shop that specializes in low-emission upgrades and custom restoration for small fleets in
    northern Michigan. He plans to achieve ASE Master Technician certification within the next two years, complete a small-business management course at a community college, and secure a modest SBA loan
    to fund his shop. Long-term, he aspires to teach advanced diesel technology at a regional technical institute, allowing him to share his practical knowledge while reducing the physical stress of daily
    shop work. Throughout these pursuits he seeks a steadier work–life balance that eases his worry and stress.
