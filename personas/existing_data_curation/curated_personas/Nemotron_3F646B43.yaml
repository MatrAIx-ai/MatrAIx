  hobbies: '[''Abstract painting'', ''Acoustic guitar'', ''Photography'', ''Hiking with mindfulness'', ''Reading contemporary art and psychology'', ''Cooking healthy international cuisine'', ''Volunteer
    fitness workshops'', ''Attending local open‑mic nights'']'
  career_goals: David aims to earn senior certifications from the American Council on Exercise and the National Academy of Sports Medicine within the next two years, followed by opening a boutique studio
    in Glasgow that offers hybrid workouts merging fitness, dance, and visual art. He aspires to create a signature “Creative Conditioning” class series and develop a companion mobile app that uses gamified
    challenges to keep participants engaged. Long‑term, he envisions becoming a regional health ambassador, leading community wellness initiatives, and publishing a guide on integrating artistic expression
    into functional training.
