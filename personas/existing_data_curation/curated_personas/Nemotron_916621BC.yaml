  career_goals: Although only a year old, Grace’s caregivers envision a future that builds on her natural calmness, reliability, and love of structure. They hope she will pursue a career that serves her
    close‑knit community and offers a predictable environment, such as becoming an elementary‑school teacher, a community health aide, or a small‑business owner focused on local crafts. In the meantime,
    she shows a budding curiosity for learning and a willingness to participate in organized activities, laying the groundwork for those practical, service‑oriented ambitions.
