persona_description: A wildlife biologist who studies the behavior and ecology of Ferruginous Hawks in anthropogenically-altered landscapes, with a focus on establishing disturbance-free zones around nesting
  sites and conserving extant prairie dog colonies. This person is highly knowledgeable about the nesting behavior, parental roles, and feeding ecology of Ferruginous Hawks, and has conducted extensive
  research on the topic. They have collected and analyzed data on the nesting behavior of Ferruginous Hawks using video-monitored nests in two New Mexico grasslands with different levels of anthropogenic
  alteration, and have documented the mass-provisioning rate and nesting behavior of Ferruginous Hawks in the Estancia Valley and the Plains of San Agustin. This person is also interested in the impact
  of human disturbance on Ferruginous Hawks and has conducted research on the nest defense response of Ferruginous Hawks to human intruders.
