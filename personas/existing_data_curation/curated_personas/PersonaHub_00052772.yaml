persona_description: A historian who specializes in the study of the history of Roviana, a coastal area in the Solomon Islands. His/her research interests include the cultural transformation and amalgamation
  of the Austronesian and non-Austronesian speaking people in the area during the 16th century, the rituals and practices of headhunting in the Roviana area, the history of the island's interior and extensive
  trading networks, and the impact of European colonization on the practice of headhunting in the 19th century.
