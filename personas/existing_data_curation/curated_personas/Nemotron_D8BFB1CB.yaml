personas:
  professional: Kristyn Willms is a senior nuclear safety analyst specializing in reactor core design, thermal-hydraulics modeling with RELAP5 and TRACE, and rigorous probabilistic risk assessments, who
    leverages their meticulous, structured mindset and competitive skepticism to drive safety innovations while mentoring cross-functional teams.
  sports: Kristyn Willms paddles her kayak on Prior Lake each summer, joins the Twin Cities Women's Running Club for disciplined half-marathon training, hikes with local volunteer trail groups in the fall,
    and roots for the Minnesota Twins and the Minnesota Timberwolves while scheduling her workouts around the Vikings' Sunday games.
  arts: Kristyn Willms performs with the Prior Lake Community Theater, delighting audiences in productions of Arthur Miller's 'The Crucible' alongside local actors such as Michael Cormier, while unwinding
    with mystery novels by Gillian Flynn and listening to the haunting vocals of Adele and the piano improvisations of Oscar Peterson, a blend that satisfies both their competitive storytelling streak and
    love for theatrical immersion.
  travel: Kristyn Willms meticulously plans weekend getaways using detailed spreadsheets, favoring canoe trips to the Boundary Waters and wine tours of the Hudson River Valley, while dreaming of a summer
    adventure hiking the Swiss Alps and exploring the historic streets of Kyoto, balancing adventure with budget and family time.
  culinary: Kristyn Willms, an accomplished home chef, crafts elaborate dishes such as coq au vin with terroir-grown mushrooms, pan-seared duck breast glazed with cherry-balsamic reduction, and truffle-infused
    risotto, pairing each with carefully selected Pinot Noir or a bold Zinfandel, and takes pride in sourcing organics from the local farmer's market.
  core: Kristyn Willms combines a fierce analytical drive with an outgoing, community-focused spirit, juggling high-stakes nuclear safety work, marathon training, and meticulous wine-paired cooking while
    wrestling with chronic worry that fuels both their meticulous planning and occasional over-indulgent splurges.
background:
  cultural: Kristyn grew up in suburban Minnesota within a family of German‑Scandinavian ancestry, a heritage common in the Upper Midwest. Her upbringing emphasized Midwestern values of hard work, practicality,
    modesty, and community responsibility. Family traditions included Thanksgiving feasts, Fourth of July celebrations, and occasional observances of Scandinavian holidays such as Midsommar, reflecting
    her ancestors' cultural roots. The emphasis on education and civic engagement shaped her disciplined, structure‑oriented mindset, while the close‑knit community of Prior Lake fostered her sociable,
    outgoing demeanor. Her marriage and active participation in local organizations further reinforce a cultural identity centered on collaboration, reliability, and a balanced respect for both tradition
    and innovation.
attributes:
  skills: '["Nuclear reactor safety analysis", "Thermal‑hydraulics modeling (RELAP5, TRACE)", "Radiation shielding design", "Probabilistic risk assessment", "Regulatory compliance (NRC, ASME codes)", "Project
    management and documentation", "Technical writing for safety reports", "Data analysis (Python, MATLAB)", "Emergency response planning", "Mentoring and team leadership", "Critical thinking and skeptical
    evaluation", "Public speaking and community outreach"]'
  hobbies: '["Kayaking on Minnesota lakes", "Group hiking with volunteer clubs", "Community theater acting", "Competitive board gaming", "Half‑marathon training with a women’s running club", "Yoga and mindfulness
    meditation", "Cooking and wine tasting with family", "DIY home improvement projects", "Reading mystery and thriller novels", "Mentoring youth in STEM programs"]'
  career_goals: Kristyn aims to advance into senior technical leadership, ultimately overseeing an entire nuclear power facility or leading a pioneering small modular reactor (SMR) project. She plans to
    earn a Project Management Professional (PMP) certification and pursue a master's degree in engineering management to strengthen her strategic and budgetary oversight abilities. Kristyn is also committed
    to shaping industry standards by contributing to NRC advisory panels and championing safety innovation. In parallel, she aspires to mentor the next generation of women engineers, increase representation
    in nuclear science, and achieve a balanced work‑life rhythm that mitigates her natural tendency toward stress and worry.
