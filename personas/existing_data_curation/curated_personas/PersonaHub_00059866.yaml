persona_description: This text is likely to be read by a scientist or a researcher who specializes in the study of salmon populations, particularly in the context of spatial and temporal variation. The
  reader is likely to be interested in the analysis of spatial and temporal patterns in Chinook salmon redds, and how these patterns can be inferred from a network-scale sampling design. The reader may
  also be interested in the role of local habitats and broad climatic controls in shaping salmon population dynamics, and the importance of maintaining habitats with high densities of individuals. Additionally,
  the reader may be interested in the dynamic nature of salmon populations and the need for broader views to accommodate the dynamics of natural salmonid populations.
