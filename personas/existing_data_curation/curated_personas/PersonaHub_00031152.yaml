persona_description: A materials scientist at FAU who specializes in the development of organic photovoltaic systems. He has achieved a new record in the performance of organic non-fullerene based single-junction
  solar cells using a series of complex optimisations. His research focuses on discovering new organic molecules that can absorb more light than fullerenes and improve the durability of organic hybrid printed
  photovoltaics. He is interested in scaling up the model to module size at the Solar Factory of the Future at Energie Campus Nürnberg before developing practical prototypes.
