personas:
  professional: Maria Jose is a budding creator who already demonstrates strong organizational habits by arranging building blocks into towering castles, while their boundless curiosity lets them re‑imagine
    each structure on the fly, hinting at a future career in architecture or design.
  sports: Maria Jose loves joining the toddlers’ soccer program at the community centre, proudly sports a miniature Denver Broncos cap while watching games on weekend TV, and spends afternoons chasing a
    squeaky ball in the backyard with enthusiastic gusto.
  arts: Maria Jose is captivated by the colorful illustrations of Eric Carle, hums along to Raffi’s classic children’s songs, and engages in finger‑painting sessions that blur the line between play and
    creation, often producing abstract swirls reminiscent of cloud patterns.
  travel: Maria Jose enjoys weekend outings to the nearby aquarium and community park, has a treasured stone from the local beach, and daydreams about someday seeing the towering Eiffel Tower in France
    on a family vacation.
  culinary: Maria Jose savors the creamy mashed bananas mixed with a dash of cinnamon, delights in dipping strawberry yogurt into soft cheese cubes, yet frequently refuses green beans and negotiates for
    goldfish crackers as their only snack.
  core: Maria Jose blends boundless imagination with surprising organization, routinely arranging stuffed animals by size while daydreaming about distant galaxies, and occasionally negotiates bedtime extensions
    by sacrificing a favorite plush toy.
background:
  cultural: Maria is raised in a Mexican-American household in Houston, Texas. Spanish is spoken at home alongside English, and she participates in cultural traditions such as celebrating Día de los Muertos
    and enjoying Mexican cuisine like tacos and tamales. Her family embraces both Mexican heritage and the multicultural environment of Houston, fostering a bilingual and bicultural identity.
