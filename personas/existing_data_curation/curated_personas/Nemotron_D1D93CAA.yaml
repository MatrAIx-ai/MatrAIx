  hobbies: '[''Sketching'', ''Photography'', ''Reading contemporary fiction and poetry'', ''Acoustic guitar playing'', ''Hiking'', ''Mindfulness meditation'', ''Journaling'', ''Cooking experiments'', ''Attending
    art exhibitions and indie film screenings'']'
  career_goals: Percy aims to turn his artistic passions into a career that balances flexibility with meaningful impact. He plans to complete his bachelor's degree in Art History or Museum Studies and eventually
    pursue a master's in Museum Education. His goal is to work as a museum education coordinator or community outreach curator, designing inclusive programs that use art to support mental well‑being. In
    parallel, he hopes to develop a freelance illustration portfolio, offering low‑stress, project‑based work for local publications and small businesses. Percy also intends to refine his organizational
    habits through personal development courses, ensuring he can meet the responsibilities of future roles while maintaining creative freedom.
