personas:
  professional: Percy Hill is an emerging museum education enthusiast who blends a budding art‑history background, digital illustration, photography, and community facilitation skills into inclusive program
    design, while they wrestle with occasional disorganization typical of a 20‑year‑old student.
  sports: Percy Hill enjoys hiking the Bluegrass trails with the local Bluegrass Trail Club, follows the University of Kentucky Wildcats basketball team and the Lexington Legends minor‑league baseball club,
    and maintains a low‑key fitness routine that mixes weekend trail runs with occasional yoga sessions, though they rarely push themselves beyond a comfortable pace.
  arts: Percy Hill immerses themselves in Lexington’s art scene by frequenting galleries featuring works by local contemporary artists like Mary Beth Heaton, attending indie film screenings of directors
    such as Greta Gerwig, and drawing inspiration from musicians like Bon Iver and Sufjan Stevens, while they also compose acoustic guitar songs and sketch urban landscapes in their sketchbook.
  travel: Percy Hill prefers budget‑friendly, art‑centric getaways, having explored New York City’s Museum Mile, Chicago’s Art Institute, and a weekend road trip to the Great Smoky Mountains, while they
    dream of a spring trip to Paris’s Louvre and Tokyo’s contemporary galleries, planning each adventure on a spreadsheet but often getting sidetracked by anxiety over expenses.
  culinary: Percy Hill experiments in a modest kitchen by whipping up bourbon‑glazed chicken, mastering plant‑based shepherd’s pie with rosemary and thyme, and perfecting ramen broth, balancing their love
    for farm‑to‑table ingredients with occasional indulgence in local gastropubs serving bourbon‑infused peach cobbler, and they often share the results with friends at informal tasting sessions.
  core: Percy Hill, a 20‑year‑old Kentucky‑rooted art lover, juggles sketchbooks, anxiety, and a chronic habit of forgetting bills, while they dream of curating inclusive museum experiences.
background:
  cultural: Percy grew up in a predominantly white, middle‑class family in Lexington, Kentucky, with deep roots in the region’s European immigrant heritage, including Irish and German ancestry. His upbringing
    blended traditional Southern values—hospitality, respect for community, and an appreciation for local history—with exposure to the vibrant arts scene at the University of Kentucky. He was raised on
    classic Southern folk and bluegrass music, often attending local festivals, yet his college experiences broadened his cultural palate to include contemporary global art and literature. This mix of traditional
    regional culture and progressive artistic influences shapes his worldview, fostering both a reverence for local heritage and an openness to new ideas.
