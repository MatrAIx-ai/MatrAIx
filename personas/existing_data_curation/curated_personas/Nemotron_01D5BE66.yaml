personas:
  professional: Thoa Nguyen, a 22‑year‑old budding electrical engineer, combines a hands‑on curiosity for Arduino, Raspberry Pi, and drone hardware with a practical drive toward power‑electronics and sustainable
    IoT solutions, thriving in small collaborative teams where they document designs meticulously while keeping a flexible, low‑stress workflow.
  sports: Thoa Nguyen, a 22‑year‑old outdoor enthusiast, spends weekends hiking the trails of Bolsa Flora, follows the San Jose Earthquakes for MLS excitement, occasionally join a casual community soccer
    pick‑up at the nearby park, and prefers low‑intensity cardio over gym routines, using their drone‑flyer meetups as a quirky way to stay active.
  arts: Thoa Nguyen, a 22‑year‑old lover of nostalgic tech, curates a collection of vintage transistor radios while listening to Vietnamese folk legends like Trịnh Công Sơn and indie sci‑fi soundtracks
    by Vangelis, enjoys indie science‑fiction films such as Primer and Moon, and occasionally sketches circuit diagrams that double as abstract art, all of which shape their quiet yet imaginative leisure
    time.
  travel: Thoa Nguyen, a 22‑year‑old budding engineer, plans low‑budget, tech‑focused trips that blend maker‑culture pilgrimages to Tokyo’s Akihabara, Berlin’s hacklabs, and sustainable‑design tours in
    Copenhagen, while keeping a flexible itinerary that leaves room for occasional spontaneous weekend getaways to nearby national parks, all balanced against a modest student‑friendly budget.
  culinary: Thoa Nguyen, a 22‑year‑old kitchen tinkerer, proudly masters beef phở with star‑anise, ginger, and rice noodles, crafts bánh mì using crusty baguettes, pâté, pickled daikon, and cilantro while
    humming Vietnamese folk tunes, and experiments with fusion twists like adding smoked tofu to ramen, reflecting a moderate cooking skill that blends tradition with playful innovation.
  core: Thoa Nguyen, a 22‑year‑old electronics hobbyist, balances a love for tinkering and quiet reflection with a laid‑back, slightly disorganized lifestyle that fuels creative DIY projects, occasional
    caffeine‑driven late‑night gaming, and a gentle drive to turn hobby kits into affordable community tech solutions.
background:
  cultural: Thoa is a second‑generation Vietnamese American, growing up in the vibrant Southeast Asian community of Orange County, California. At home he was raised bilingual, learning Vietnamese from his
    parents while navigating American culture at school. Family gatherings often revolve around traditional celebrations such as Tết, where he helps prepare holiday foods and participates in cultural rituals
    that emphasize respect for elders and community harmony. This blend of collectivist values and the individualistic environment of the United States has shaped his considerate and cooperative demeanor.
    He regularly visits local Vietnamese markets for fresh ingredients, attends community events at the Little Saigon cultural center, and maintains close ties with extended family, balancing these cultural
    roots with the diverse, tech‑focused lifestyle of Buena Park.
attributes:
  skills: '[''Analog circuit design'', ''Digital logic troubleshooting'', ''PCB layout (KiCad/Eagle)'', ''Soldering and prototyping'', ''Embedded programming (C, Arduino, Python)'', ''Microcontroller selection
    (STM32, ESP32)'', ''Power electronics basics (DC‑DC converters)'', ''LTspice circuit simulation'', ''Electrical safety standards (NEC, UL)'', ''Technical documentation and schematic reading'']'
  hobbies: '[''DIY electronics and Arduino projects'', ''Building and flying hobby drones'', ''Hiking in local parks (e.g., Bolsa Flora)'', ''Cooking Vietnamese cuisine'', ''Listening to traditional Vietnamese
    music'', ''Playing strategy video games (e.g., Civilization)'', ''Reading science‑fiction novels'', ''Attending small maker‑space meetups'', ''Watching indie sci‑fi movies'', ''Collecting vintage transistor
    radios'']'
  career_goals: Thoa aims to deepen his expertise in power electronics and sustainable energy solutions while working toward becoming a licensed Professional Engineer within the next five to seven years.
    He plans to earn certifications such as IPC PCB Designer and a basic PLC programming credential to broaden his technical toolkit. Although he prefers flexible, hands‑on learning over formal academic
    routes, he is open to completing a part‑time associate degree in electrical engineering to solidify his foundation. In the medium term, he hopes to join a small, collaborative engineering team that
    values teamwork and harmony, eventually taking on a technical lead role where he can mentor junior engineers and guide the development of low‑cost IoT devices for community use. Long‑term, he envisions
    launching a side venture that offers DIY electronic kits tailored for beginners, merging his curiosity with practical, socially‑beneficial outcomes.
