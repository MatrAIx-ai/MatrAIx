  hobbies: '[''Museum visits'', ''Historical fiction reading'', ''Birdwatching'', ''Gardening'', ''Quilting'', ''Digital photography'', ''Local theatre attendance'', ''Community lecture series'']'
  career_goals: She aims to document and preserve local Cape Cod history through a memoir and a series of community workshops, to mentor younger volunteers in organizing cultural events, and to complete
    a short course in digital photography to enhance her contributions to the Cotuit Art Society. Additionally, she hopes to spearhead an intergenerational art exhibition that bridges seniors and teens,
    and to remain physically active through daily walks and gardening.
