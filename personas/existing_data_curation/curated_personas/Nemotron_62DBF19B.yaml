personas:
  professional: Tiffany Imbert, a 79‑year‑old heritage advocate and volunteer coordinator for the Cotuit Art Society, blends meticulous budgeting, event‑planning expertise, and a skeptical yet curious eye
    for authentic narratives to craft unforgettable community exhibitions, and they mentor younger volunteers with methodical precision.
  sports: Tiffany Imbert, an avid walker who joins the Cotuit shoreline strolling club for daily sunrise walks and birdwatching, tracks steps with a fitness tracker, enjoys seasonal pickleball at the community
    center, and they cheer on the Boston Red Sox, New England Patriots, and Boston Celtics on game days.
  arts: Tiffany Imbert, a devoted patron of the visual and performing arts, spends weekends at the Cape Cod Museum of Art absorbing Monet’s pastel impressions, collects Ansel Adams black‑and‑white prints
    to inspire their digital photography, attends productions starring veteran actor David Morse at the Cape Cod Playhouse, and they weave those influences into their quilting designs, often echoing motifs
    from Winslow Homer’s maritime scenes.
  travel: Tiffany Imbert, an intentional traveler, carefully maps out heritage‑focused trips such as a week‑long tour of historic Bath, England and a leisurely cruise to the Azores, while also cherishing
    familiar getaways to Martha’s Vineyard and Provincetown, preferring guided small‑group tours that balance comfort with cultural immersion, and they always allocate a modest portion of their savings
    for a single‑use travel credit card to capture occasional flight deals.
  culinary: Tiffany Imbert, an accomplished home cook, prepares New England clam chowder with freshly shucked harbor clams, seasons garden‑grown heirloom tomatoes in a summer caprese salad, bakes pumpkin‑spice
    scones using locally milled whole‑grain flour, and they relish occasional evenings at the upscale Cape Cod restaurant L’Andana for a surf‑and‑turf tasting menu featuring black cod and rosemary‑infused
    lamb.
  core: Tiffany Imbert, at 79, blends a fierce curiosity for Cape Cod’s hidden histories with methodical skepticism, catalogues every bird sighting on sticky notes, hoards vintage quilting patterns they
    seldom finish, and they never miss the weekly community lecture series, even when fatigue sets in.
background:
  cultural: Tiffany was born and raised in the New England region, growing up in a middle-class white family with deep Anglo-American roots in Massachusetts. She spent much of her life on Cape Cod, absorbing
    the maritime heritage, seasonal festivals, and community-centered culture of Barnstable County. Her upbringing was shaped by a Protestant New England tradition, but she also embraced the diverse artistic
    and academic influences of the broader Boston area. The close-knit nature of Cotuit, with its historic lighthouse, summer colonies, and vibrant local arts scene, informs her values of community service,
    self-reliance, and appreciation for the region's natural beauty.
attributes:
