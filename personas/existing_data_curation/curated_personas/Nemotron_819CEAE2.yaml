  career_goals: After completing high school, Javier aims to enroll in a vocational program for automotive technology, with the long‑term goal of becoming a certified automotive technician at a reputable
    shop in Orange County. He also dreams of helping his family expand their small taquería, eventually taking on a managerial role that blends his technical know‑how with his culinary skills. In the short
