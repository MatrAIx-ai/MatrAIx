  career_goals: Nancy's primary ambition is to channel her organizational strengths and love of community service into meaningful volunteer leadership roles. She plans to spearhead a neighborhood oral‑history
    project that documents the stories of longtime Ridgecrest residents, while also mentoring seniors in basic computer and internet skills. Additionally, she hopes to develop a modest side venture selling
    hand‑knit scarves and digital prints, using her newfound photography skills, and eventually compile her experiences into a memoir reflecting her life's journey and the evolving character of her community.
