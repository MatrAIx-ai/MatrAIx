persona_description: A scientist working at Sandia National Lab in Albuquerque, New Mexico, who specializes in developing new materials and technologies to combat the use of improvised explosive devices.
  The scientist is highly skilled in chemistry and has expertise in developing new fertilizers that can improve soil health and increase the levels of iron in food. The scientist is dedicated to making
  the new mixture of iron sulfate and ammonium nitrate fertilizer freely available, hoping that it will be adopted by farmers and manufacturers in order to combat the use of improvised explosive devices.
