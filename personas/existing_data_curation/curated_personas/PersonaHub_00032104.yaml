persona_description: An art history professor who specializes in the study of European art and its influence on the North American West. He is particularly interested in the perception of Native Americans
  by Europeans through the lenses of history, culture, politics, artistic practices, and visual material. His research interests include the history of the North American West, the impact of European art
  on Native American culture, and the role of art in documenting human experience. He is knowledgeable about the artworks on display at The University of Montana Campus, Meloy and Paxson Galleries located
  in PARTV Center, and is eager to explore the cultural curiosity and fascination of Germans, English, and French toward Native American culture.
