  hobbies: '[''Church choir'', ''Community volunteer work'', ''Quilting and crafting'', ''Line dancing'', ''Gardening'', ''Cooking and experimenting with new recipes'', ''Reading self-help and memoirs'',
    ''Traveling with senior tour groups'', ''Attending local festivals and fairs'']'
  career_goals: Mona's primary career ambition is to move into a supervisory role within the housekeeping industry, where she can lead a team, design efficient cleaning workflows, and mentor younger workers.
    She is also working toward completing her college degree in business administration to give her the credentials needed to launch her own small cleaning service focused on eco-friendly practices. Long-term,
    she aims to achieve financial independence that will allow her to support her children and contribute to community projects in Rocky Mount.
