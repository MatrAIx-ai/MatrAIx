personas:
  professional: Mona Mills, a veteran housekeeping specialist with over three decades of experience, leverages their meticulous attention to detail, eco-friendly cleaning expertise, and strong time-management
    skills to oversee complex residential and commercial cleaning schedules while training new staff in safety and customer service, all with an eye toward a future supervisory role.
  sports: Mona Mills, an avid supporter of the Charlotte Hornets and Carolina Panthers, participates in a local church walking club, enjoys line-dancing at community festivals as their cardio workout, and
    spends Sunday afternoons cheering on the UNC Tar Heels basketball team with their friends.
  arts: Mona Mills channels their love of soulful melodies through their role in the church choir, often singing classics by Aretha Franklin and modern gospel tracks by Kirk Franklin, while also showcasing
    their creative side in a neighborhood quilting circle that draws inspiration from the vibrant storytelling traditions of Southern folk art.
  travel: Mona Mills prefers organized senior-tour packages that combine cultural immersion with comfortable pacing, having recently explored New Orleans’ Mardi Gras festivities, Savannah’s historic squares,
    and Washington, D.C.’s national monuments, while they dream of a leisurely drive along the Blue Ridge Parkway to soak in the fall colors.
  culinary: Mona Mills enjoys crafting soul-food dishes such as collard greens simmered with smoked turkey, sweet-potato pie spiced with nutmeg, and shrimp-and-grits enriched with fresh garden herbs, often
    experimenting with healthier twists like quinoa-based stuffing while still honoring traditional flavors, and they share these meals at community potlucks.
  core: Mona Mills fuses Southern hospitality with eco-conscious efficiency, leading a disciplined yet socially vibrant life that balances meticulous work, community singing, and a penchant for budgeting,
    and they maintain a healthy skepticism of shortcuts.
background:
  cultural: Mona's cultural background is rooted in African-American traditions of the American South. Growing up in North Carolina, she was shaped by the close-knit church community, soulful music, and
    Southern hospitality that value family, mutual support, and perseverance. Her everyday life reflects a blend of historic Southern customs such as home-cooked soul food, storytelling, and community gatherings
    with contemporary influences from modern media and eco-conscious living. Mona's identity is also informed by the rich legacy of Black resilience and creativity in the region, which she honors through
    her work ethic, community involvement, and pride in her heritage.
attributes:
