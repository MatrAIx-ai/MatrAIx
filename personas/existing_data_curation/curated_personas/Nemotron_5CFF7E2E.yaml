  career_goals: Although only three, Monica frequently imagines future roles during play. She expresses a desire to become a teacher who organizes classroom activities and helps other children learn, reflecting
    her love for structure and harmony. She also shows an interest in caregiving professions, such as a nurse or daycare aide, because she enjoys comforting others and ensuring everyone feels safe. Occasionally,
    she pretends to be a librarian, arranging books and guiding friends to stories, aligning with her organizational instincts. These aspirations are framed in the context of caring for peers and maintaining
    orderly, supportive environments.
