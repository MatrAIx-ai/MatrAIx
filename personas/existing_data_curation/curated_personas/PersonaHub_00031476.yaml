persona_description: A retired historian who has a deep interest in military history and specifically in the preservation and interpretation of historic fortifications. They have a vast knowledge of Victorian
  fortification and artillery, and have contributed significantly to the research and restoration of the Palmerston Forts Society's property, Fort Nelson. They are passionate about sharing their expertise
  and knowledge with others and have formed the Portsdown Artillery Volunteers, accurately representing garrison artillery. They are interested in joining the Palmerston Forts Society or the Portsdown Artillery
  Volunteers and have a strong interest in Victorian fortification and artillery.
