  hobbies: '["Visiting art galleries and museum exhibitions", "Amateur photography (river and street scenes)", "Cooking Salvadoran cuisine", "Vintage motorcycle restoration", "Model car building", "Fishing
    on the St. Clair River", "Reading art history and biographies", "Volunteering at cultural festivals"]'
  career_goals: Salvador aims to transition from frontline courier work to a supervisory logistics or operations manager role within a regional delivery firm, leveraging his organizational discipline and
    high standards. He envisions launching a boutique courier service that specializes in transporting artwork, antiques, and cultural items, merging his curiosity for art with his expertise in careful
    handling. Mentoring younger drivers, promoting safety protocols, and championing efficiency are key ambitions. Within the next five years, he seeks a schedule that reduces physical strain and stress,
    providing greater stability for his family and supporting a comfortable retirement while staying actively involved in the local arts community.
