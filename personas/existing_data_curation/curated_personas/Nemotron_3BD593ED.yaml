  hobbies: '[''Cooking Mexican dishes'', ''Experimenting with fusion recipes'', ''Hiking in the Hudson Valley'', ''Yoga and meditation'', ''Reading contemporary fiction'', ''Journaling'', ''Salsa dancing'',
