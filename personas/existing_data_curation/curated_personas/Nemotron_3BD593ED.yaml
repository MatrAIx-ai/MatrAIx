personas:
  professional: Zeida Zambrana is a quantitative analyst at a mid‑size investment firm who leverages Python, R, and advanced Excel to build predictive models for sustainable tech‑focused portfolios, blending
    their curiosity for new data sources with a practical, detail‑oriented approach while leading cross‑functional projects with a collaborative yet assertive style.
  sports: Zeida Zambrana enjoys weekend hikes on Hudson Valley trails and practices yoga twice a week at a local studio, follows the New York Knicks and New York Rangers as a fan, and participates in a
    casual salsa‑dance fitness class that doubles as cardio, though they often skip scheduled gym sessions when work feels overwhelming.
  arts: Zeida Zambrana attends live jazz sessions at the Village Vanguard, dances salsa at community events, and reads contemporary fiction authors like Tana French and mystery series by Karin Slaughter,
    while also hosting board‑game nights that feature titles such as Catan and Azul, balancing their social energy with moments of quiet reflection.
  travel: Zeida Zambrana plans spontaneous trips that blend work and leisure, favoring visits to their family's hometown to reconnect and explore emerging markets, while also dreaming of backpacking through
    Patagonia's steppe and taking weekend getaways to the Finger Lakes for wine tasting, always juggling budget constraints with a craving for cultural immersion.
  culinary: Zeida Zambrana cooks tamales and mole with a modern twist using ingredients like chipotle‑infused maple syrup and avocado crema, experiments with fusion recipes that merge those flavors with
    New York deli staples, often improvising on the fly despite occasionally forgetting to prep ingredients ahead of time.
  core: Zeida Zambrana is a data‑driven finance professional who fuses cultural cuisine with city flavors, hikes to unwind, juggles anxiety with meditation, and balances curiosity with a laid‑back, sometimes
    disorganized, approach to life.
background:
  cultural: Zeida was raised in a Mexican‑American household where family gatherings, música ranchera, and celebrations such as Día de los Muertos and Las Posadas were central to her upbringing. She grew
    up bilingual, speaking Spanish at home and English at school, which gave her a deep appreciation for both cultures. The values of collectivism, resilience, and respect for tradition she inherited shape
    her interpersonal style and her desire to give back to the community, evident in her volunteer work at local cultural festivals. Her Mexican heritage also fuels her professional interest in cross‑border
    investments and emerging market dynamics, allowing her to bridge cultural insights with financial analysis.
