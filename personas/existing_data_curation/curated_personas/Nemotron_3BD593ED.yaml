  career_goals: She aims to earn the Chartered Financial Analyst (CFA) designation within the next two years and to advance to a senior portfolio manager role focusing on sustainable and technology‑driven
    investments. Zeida dreams of leading an ESG‑focused investment team where she can shape strategy and mentor junior analysts. In the longer term, she envisions launching a boutique advisory firm that
    serves Latin American investors seeking exposure to U.S. markets, leveraging her cultural insight and technical expertise. Throughout her career, she prioritizes flexible work arrangements that allow
    her to balance professional growth with personal wellbeing.
