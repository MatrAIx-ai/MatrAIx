    and zydeco music'', ''Spontaneous road trips'', ''Attending church and community festivals'']'
  career_goals: Martha aims to move into a supervisory or lead position within the store, where she can mentor new hires and shape a supportive team culture. She plans to enroll in evening courses on supply‑chain
    fundamentals or retail management at a nearby community college to strengthen her leadership credentials. Long‑term, she hopes to combine her love of community service and commerce by opening a small
    neighborhood market that emphasizes locally sourced produce and a friendly, inclusive shopping experience.
