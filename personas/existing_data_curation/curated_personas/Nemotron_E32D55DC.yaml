personas:
  professional: Martha Rodgers is a skilled stocker and order filler who blends hands‑on logistics expertise with a natural knack for mentoring, using barcode scanners and inventory software to keep shelves
    stocked while often improvising schedule‑bending shortcuts that reflect their spontaneous, curiosity‑driven work style.
  sports: Martha Rodgers follows the New Orleans Saints and the local Shreveport Mudbugs, participates in a Saturday morning walking club through the piney woods, and occasionally joins a recreational softball
    league, using these activities to balance their love of community and spontaneous exercise.
  arts: Martha Rodgers finds inspiration in classic rock legends like Bruce Springsteen and zydeco icons such as Clifton Chenier while quilting and crocheting, devotes evenings to mystery novels by Tana
    French and historical sagas by Ken Follett, and regularly attends community festivals showcasing regional musicians and folk artists.
  travel: Martha Rodgers prefers spontaneous, budget‑friendly day trips in a trusty pickup to piney‑wood hideaways, historic towns like Natchitoches and Natchez, and occasional weekend getaways to New Orleans
    for its food and music, always planning on the fly and packing a picnic from the garden.
  culinary: Martha Rodgers expertly cooks Southern comfort dishes such as jambalaya, shrimp étouffée, collard greens, and cornbread, often seasoning with homemade hot sauce and fresh tomatoes grown in their
    garden, and enjoys experimenting with Creole twists while hosting friends for informal potlucks.
  core: Martha Rodgers is a community‑oriented, curious pragmatist who balances spontaneous generosity with occasional disorganization, turning a love of gardening, food, and music into a vibrant, if sometimes
    chaotic, life.
background:
  cultural: Martha grew up in Shreveport, Louisiana, in a working‑class white Southern family with deep ties to local church life and community traditions. The region’s blend of Southern hospitality, Cajun
    and Creole culinary influences, and a strong emphasis on family and neighborly support shaped her values of cooperation, compassion, and practical resilience. Her high‑school education emphasized vocational
    skills, reinforcing a pragmatic approach to work while her upbringing encouraged curiosity about the wider world and openness to new ideas.
