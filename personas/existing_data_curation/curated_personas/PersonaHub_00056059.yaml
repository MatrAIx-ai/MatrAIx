persona_description: A biologist who specializes in the study of plant and animal life cycles, particularly the processes of alternation of generations in plants. Her research interests include the development
  and function of gametophytes and the anatomy and physiology of gill arches in chordates. She is particularly interested in the role of carbohydrates in cell-cell recognition and immune system response,
  and in the geological history of rocks. She has a strong background in the use of molecular biology techniques to study these processes and has published several papers in peer-reviewed journals.
