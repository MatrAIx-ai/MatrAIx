personas:
  professional: Maya Wright is a procurement specialist who leverages strategic sourcing, data-driven cost analysis, and rigorous vendor due‑diligence to drive savings, while her natural skepticism and
    competitive drive keep her constantly questioning proposals and seeking innovative, sustainable solutions.
  sports: Maya Wright is a regular participant in local 5K races, a member of the Newport News Runners Club, and a yoga enthusiast who balances high-intensity cardio with flexibility training, and they
    cheer on the Washington Commanders, the Washington Wizards, and the Norfolk Tides whenever possible.
  arts: Maya Wright frequently attends live R&B shows featuring artists such as H.E.R. and Anderson .Paak, explores the Virginia Museum of Contemporary Art’s rotating exhibitions, and immerses themselves
    in weekend art festivals celebrating street murals and spoken-word poetry.
  travel: Maya Wright prefers short, purposeful getaways—spending long weekends exploring historic Williamsburg, the sun-kissed Outer Banks, or the vibrant food scene of New Orleans—while planning trips
    with a mix of budget accommodations and occasional splurges on boutique hotels when a cultural event aligns with their schedule.
  culinary: Maya Wright’s kitchen experiments blend Southern comfort flavors with global twists, like miso-glazed fried chicken, collard greens sautéed with smoked paprika and ginger, and sweet-potato biscuits
    infused with jalapeño, often featuring ingredients such as gochujang, black garlic, and fresh buttermilk.
  core: Maya Wright is a data-driven procurement professional whose competitive edge, skeptical mind, and habit of worrying transform into disciplined mindfulness, marathon-training, and a relentless pursuit
    of culinary innovation.
background:
  cultural: Maya was raised in a close‑knit Black family in Newport News, Virginia, where church, community, and extended family gatherings shaped her values of resilience, mutual support, and pride in
    her heritage. She grew up listening to gospel and R&B, participating in local cultural festivals, and learning traditional Southern cooking from her grandparents. This background instilled a strong
    sense of responsibility to uplift her community, which she expresses through mentorship and involvement in local Black professional networks. Maya’s cultural identity influences her professional ethos—a
    commitment to ethical sourcing, support for minority‑owned suppliers, and a dedication to creating opportunities for underrepresented groups within the supply‑chain field.
attributes:
  skills: '[''Strategic Sourcing'', ''Vendor Negotiation'', ''Cost Analysis'', ''Supply Chain Management'', ''Contract Management'', ''Data Analysis (Excel, PowerBI)'', ''ERP Systems (SAP, Oracle)'', ''Risk
    Assessment'', ''Sustainable Procurement'', ''Project Management'', ''Market Research'']'
  hobbies: '[''Cooking (Southern and soul‑food)'', ''Reading (business, technology, self‑help)'', ''Running'', ''Yoga'', ''Mindfulness meditation'', ''Mentoring young Black women'', ''Attending live R&B
    concerts'', ''Visiting art festivals'', ''Journaling'']'
  career_goals: Maya aims to earn the Certified Professional in Supply Management (CPSM) credential within the next year to formalize her expertise. In the medium term, she aspires to advance to a senior
    purchasing manager role where she can lead a cross‑functional team, champion data‑centric procurement strategies, and embed sustainability criteria into the company’s supply chain. Long‑term, Maya envisions
    becoming a director of procurement or launching her own consultancy focused on ethical sourcing and supply‑chain resilience for minority‑owned businesses, leveraging her competitive drive to set industry
    benchmarks while mentoring the next generation of Black procurement professionals.
