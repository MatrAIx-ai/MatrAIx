personas:
  professional: Linda Coates, a retired technical writer and data analyst turned community program architect, combines their methodical planning, strong analytical research skills, and love of art–science
    integration to design grant‑winning after‑school curricula and traveling exhibitions that blend scientific inquiry with regional folk art.
  sports: Linda Coates enjoys weekend hikes along the Ozark trails, participates in a local senior walking club, occasionally practices gentle yoga, and they cheer for the St. Louis Cardinals and the Kansas
    City Chiefs while seldom playing organized team sports.
  arts: Linda Coates spends afternoons curating watercolor scenes inspired by Monet and Ansel Adams, leads digital photography workshops at the community center, quilts intricate patterns reminiscent of
    Grandma Moses, and they regularly attend choir rehearsals featuring Handel’s Messiah and contemporary choral groups such as the Choral Arts Society.
  travel: Linda Coates plans trips with the precision of a grant application, having already visited the Metropolitan Museum of Art in New York, the Uffizi Gallery in Florence, and Yellowstone National
    Park, and they dream of exploring the Louvre in Paris and the rugged landscapes of Glacier National Park once their after‑school program is fully funded.
  culinary: Linda Coates delights in garden‑to‑table cooking, frequently preparing ratatouille with heirloom tomatoes, quinoa salads tossed with fresh basil, and baking apple‑cinnamon pies, though they
    have a habit of over‑salting soups when distracted by a new photography idea.
  core: Linda Coates blends analytical rigor with creative curiosity, meticulously planning community projects while indulging in watercolor, hiking, and a love of regional history, and they occasionally
    lose track of time over a new quilt pattern, forgetting to water their plants.
background:
  cultural: Linda was raised in a close‑knit, white, Christian family in Nixa, Missouri, embodying Midwestern values of hospitality, community service, and modesty. Her upbringing in Christian County emphasized
    church participation, county fairs, and a strong work ethic. She identifies with the cultural traditions of the Ozarks, including an appreciation for folk art, country music, and outdoor recreation.
    These influences shape her sense of identity, her love for community involvement, and her respect for both scientific inquiry and artistic expression.
attributes:
  skills: '[''Analytical research'', ''Technical writing'', ''Data analysis (Excel, SPSS)'', ''Project coordination'', ''Grant writing'', ''Budget management'', ''Event planning'', ''Digital photography'',
    ''Art curation'', ''STEM tutoring'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Digital photography'', ''Gardening (native plants)'', ''Quilting'', ''Reading historical fiction'', ''Reading popular science'',
    ''Hiking'', ''Volunteering at community center'', ''Leading art‑science workshops'', ''Singing in church choir'', ''Attending local history talks'']'
  career_goals: Though retired from formal employment, Linda aims to deepen her community impact by launching a multidisciplinary after‑school program that integrates scientific inquiry with visual arts,
    securing funding through grant writing and partnering with local schools and her church. She also aspires to curate a traveling exhibition that showcases regional scientific contributions alongside
    folk art, and hopes to author a memoir reflecting her lifelong love of learning and her small‑town roots. Personal ambitions include traveling to major art museums and exploring national parks.
