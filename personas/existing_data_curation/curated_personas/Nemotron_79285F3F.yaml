  career_goals: Nicole dreams of a future where she can combine her love for animals and science by becoming a veterinarian or a wildlife rehabilitator. She also imagines helping people by pursuing a career
    in pediatric nursing or child psychology, fields that let her use her caring nature and problem‑solving skills. Ultimately, she wants a career that lets her make a practical, positive impact on her
    community while satisfying her curiosity about how the world works.
