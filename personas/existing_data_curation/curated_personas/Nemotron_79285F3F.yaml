personas:
  professional: Nicole Easton is a budding student scientist who channels their curiosity and practicality into detailed science kit experiments, keeping meticulously organized notebooks while allowing
    room for improvisation when a trial goes off‑track, and they balance collaborative class projects with quiet reflection to perfect their methods.
  sports: Nicole Easton plays forward on the Maple Town Tigers U12 soccer team, hikes with the Junior Adventure Club on weekends, and they cheer for the Seattle Seahawks while also enjoying swimming at
    the community pool, balancing their love for outdoor activity with school responsibilities.
  arts: Nicole Easton expresses themselves through piano, favoring Yiruma’s "River Flows in You" and practicing Disney’s "Let It Go," while sketching cartoons of forest scenes inspired by the works of Dr.
    Seuss and listening to the folk storytelling of Taylor Swift’s "Folklore" album during quiet evenings.
  travel: Nicole Easton loves family road trips to the Redwood National Forest and has a wish list that includes a school field trip to the Harry Potter Studio Tour in England and a summer visit to the
    Grand Canyon, and they prefer itineraries that blend adventure hiking with time for reading under the stars.
  culinary: Nicole Easton enjoys helping in the garden and often cooks simple meals like vegetable stir‑fry with fresh basil and cherry tomatoes, bakes carrot muffins with grated ginger, and they treat
    themselves to grilled cheese on sourdough topped with apple slices, showing a growing confidence in the kitchen.
  core: Nicole Easton is a curious, organized 11‑year‑old who balances scientific experiments, piano practice, and garden chores while they wrestle with a streak of worry that fuels both meticulous planning
    and occasional over‑thinking of everyday choices.
background:
  cultural: Nicole is African‑American and grew up in a close‑knit Black community in Lexington, Georgia. Her family celebrates Southern traditions such as gospel music, church fellowship, soul‑food meals
    like collard greens, fried chicken, and cornbread, and cultural holidays like Juneteenth. Stories of the civil‑rights movement passed down from grandparents shape her sense of resilience and social
    responsibility. The blend of rural Southern life and a supportive African‑American heritage influences her values of kindness, cooperation, and a strong connection to community and family.
