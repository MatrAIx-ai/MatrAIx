  development of neoliberalism and its implementation in various countries around the world, and how it has impacted various sectors such as the financial sector and the real sector. This person is also
  likely to have a strong understanding of the impact of neoliberalism on international relations, particularly in the context of free trade and the opening of foreign markets.
