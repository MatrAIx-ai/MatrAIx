personas:
  professional: Rafael Zaragoza, a 20‑year‑old metal‑fabrication apprentice, leverages MIG/TIG welding, basic CNC milling, and self‑taught Fusion 360 CAD to craft custom motorcycle parts and scale model
    kits, balancing a curiosity‑driven experimental streak with a practical focus on safety and teamwork, even as his spontaneous nature sometimes clashes with project deadlines.
  sports: Rafael Zaragoza, a 20‑year‑old desert‑raised enthusiast, fuels his fitness by hiking hidden Arizona trails near Camelback Mountain, cheering on the Arizona Cardinals and Phoenix Suns on game days,
    and riding with a local motorcycle club on weekends, while avoiding organized team sports due to a preference for solitary activity.
  arts: Rafael Zaragoza, a 20‑year‑old creative tinkerer, blends regional folk motifs and indie rock playlists while hand‑painting motorcycle parts, captures stark desert landscapes with his Canon EOS 5D,
    and draws inspiration from photographers like Ansel Adams and musicians such as Radiohead, shaping a unique aesthetic across his projects.
  travel: Rafael Zaragoza, a 20‑year‑old wanderer, prefers low‑cost, self‑planned road trips that mix solitary desert hikes in Sedona, weekend camping at the Grand Canyon, and occasional city visits to
    Los Angeles for music shows, while dreaming of a cross‑border ride through Baja when his finances improve.
  culinary: Rafael Zaragoza, a 20‑year‑old kitchen experimenter, excels at preparing tacos al pastor using homemade achiote paste and rich mole negro made with roasted chilies and almonds, often improvising
    fusion dishes like mole‑glazed shrimp tacos, and delights in sharing these meals with a close circle of friends.
  core: Rafael Zaragoza, a 20‑year‑old welding enthusiast who intertwines Mexican folk art with desert metalwork, drifts between spontaneous creative bursts and a chaotic schedule yet always makes time
    for perfectly seasoned tacos al pastor with friends.
background:
  cultural: Rafael was raised in a Mexican‑American household in Phoenix, where Spanish and English flow interchangeably at home. His family emphasizes respeto, comunidad, and the pride of skilled craftsmanship,
    values that echo in his meticulous work as a fabricator. He grew up helping his grandparents in their kitchen, learning to prepare homemade tamales and salsa, and he regularly participates in local
    celebrations such as Día de los Muertos and the annual Mexican cultural festival at the Arizona State Fair. This blend of Mexican traditions and the diverse, sun‑rich environment of the Southwest shapes
    his worldview, his love for hands‑on creation, and his commitment to supporting his community.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Sheet metal fabrication'', ''CNC milling operation'', ''Plastic injection molding'', ''Blueprint reading'', ''Tool maintenance'', ''Safety compliance'', ''Basic
    CAD (Fusion 360)'', ''Equipment troubleshooting'']'
  hobbies: '[''Model kit building'', ''Woodworking'', ''Motorcycle customization'', ''Listening to music (regional Mexican, indie rock)'', ''Video gaming (single‑player adventure)'', ''Reading science‑fiction
    novels'', ''Desert hiking'', ''Photography of desert landscapes'', ''Cooking traditional Mexican dishes'']'
  career_goals: Rafael aims to complete his GED within the next year and obtain a certified welder credential (AWS). He wants to deepen his CNC programming skills to transition from manual operation to
    designing and producing parts, especially for solar‑panel mounting systems that are growing in Arizona. In the longer term, he envisions opening a small, family‑run metal‑fabrication studio that blends
    Mexican decorative motifs with modern, eco‑friendly designs. He also hopes to improve his time‑management abilities so he can meet project deadlines and take on larger, more complex commissions.
