  career_goals: Virginia aims to re‑enter the workforce in a part‑time or flexible role that aligns with her passion for sustainability and community building. She is working toward a certification in horticulture
    so she can lead a community‑garden program or serve as a sustainability coordinator for a local nonprofit. Long‑term, she dreams of launching a small boutique that sells home‑grown herbs, handcrafted
    teas, and eco‑friendly goods, allowing her to blend her business training with her love for organic living while maintaining a schedule that respects her need for flexibility and personal time.
