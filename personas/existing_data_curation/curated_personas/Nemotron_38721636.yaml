  hobbies: '[''Watercolor painting'', ''Photography'', ''Hiking'', ''Reading contemporary fiction'', ''Cooking'', ''Knitting'', ''Attending live music events'', ''Exploring local art galleries'']'
  career_goals: Tonda aims to advance from her current inspector role to a senior quality assurance specialist or production supervisor position within the next five years. She plans to earn an associate
    degree in industrial technology or a certification in Six Sigma, enabling her to lead larger quality initiatives and drive efficiency in the oil‑field equipment manufacturing sector. Ultimately, she
    hopes to blend her analytical strengths with her creative side by spearheading innovative process‑design projects, possibly integrating artistic design thinking into product development.
