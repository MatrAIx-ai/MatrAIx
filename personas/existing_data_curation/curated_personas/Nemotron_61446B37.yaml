  hobbies: '["Cuban salsa dancing", "Cooking traditional Cuban dishes", "Beach volleyball", "Paddleboarding", "Group fitness classes (Zumba, HIIT)", "Volunteering at local community outreach programs",
    "Attending cultural festivals", "Reading marketing and tech literature", "Traveling", "Photography"]'
  career_goals: Ana aims to step into a senior leadership role, such as Director of Marketing Insights, where she can shape integrated marketing strategies for multicultural audiences across the Southeast.
    She aspires to lead a high‑performing research team, mentor emerging analysts, and champion data‑driven decision‑making at the executive level. In the long term, she envisions launching her own consultancy
    focused on Latin American market entry and culturally resonant branding, positioning herself as a thought leader in multicultural consumer behavior and speaking at industry conferences.
