  hobbies: '[''Woodworking'', ''Classic Car Restoration'', ''Golf'', ''Fly Fishing'', ''Reading Non-Fiction'', ''Puzzle Solving'', ''Target Shooting'']'
  career_goals: Over the next five years, Evan aims to secure his Professional Engineer (PE) licensure and pursue a state architecture license to strengthen his technical authority. He envisions rising
    to a regional director position, overseeing multiple project teams across the Southeast, and championing innovative, sustainable design solutions that meet or exceed LEED Platinum standards. He also
    aspires to mentor the next generation of engineers, publish case studies on efficient construction practices, and eventually launch his own boutique consultancy focused on resilient infrastructure in
    rural communities.
