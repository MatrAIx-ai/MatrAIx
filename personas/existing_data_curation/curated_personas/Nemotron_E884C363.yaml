personas:
  professional: Evan Mahram is a senior architecture engineer who merges advanced CAD and BIM expertise with rigorous project management, and they channel their methodical, competitive drive into delivering
    LEED Platinum‑level designs while mentoring junior staff.
  sports: Evan Mahram enjoys playing 18‑hole golf at Belle Meade Country Club where they compete in a local league, follows the Nashville Predators and Tennessee Titans for seasonal excitement, and spends
    spring weekends fly‑fishing the Duck River, balancing competitive sport with tranquil outdoor pursuits.
  arts: Evan Mahram draws creative inspiration from Frank Lloyd Wright’s architecture, listens to Yo‑Yo Ma’s cello suites while assembling mechanical model kits, and attends regional art exhibitions featuring
    Ansel Adams photography, integrating artistic appreciation into both their professional designs and personal hobbies.
  travel: Evan Mahram prefers meticulously planned road trips to historic towns like Asheville and Charleston, values the blend of cultural heritage and sustainable architecture, dreams of visiting Sweden’s
    eco‑friendly building sites and Japan’s traditional woodworking workshops, yet balances travel ambitions with family responsibilities and project deadlines.
  culinary: Evan Mahram enjoys grilling cedar‑plank trout and smoking brisket in a custom‑built smoker, pairs meals with a splash of Tennessee bourbon, and experiments with rosemary, thyme, and smoked paprika,
    but often orders sushi from their favorite downtown spot after late nights due to time constraints.
  core: Evan Mahram is a competitively driven, methodical architect‑engineer who channels his love for precision into sustainable design, classic cars, and disciplined financial planning, while balancing
    quiet moments on the river and occasional bouts of overwork.
background:
  cultural: Evan was raised in the Upper South, growing up in a small community near Memphis before moving to Shiloh, Tennessee. His upbringing reflects a blend of traditional Southern values—strong emphasis
    on family, church involvement, and community service—and a pragmatic, hardworking middle‑class ethic shaped by his parents’ background in manufacturing. The region’s close‑knit social fabric and appreciation
    for self‑reliance have fostered his reliability and competitive spirit. While he identifies with broader American cultural norms, he maintains a connection to Appalachian customs, such as local festivals,
    high‑school football culture, and a respect for the natural landscape that informs his interest in sustainable building.
