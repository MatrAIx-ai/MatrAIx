personas:
  professional: Everardo Santiago is a budding project management specialist who channels their curiosity into data‑driven insights, balances practical budget monitoring with flexible Agile tactics, and
    uses their bilingual edge and skeptical contract negotiations to keep cross‑border teams on schedule while juggling Gantt charts, Trello boards, and an emerging Python automation toolkit.
  sports: Everardo Santiago fuels their competitive streak on the soccer field with weekly pick‑up games at the local park, follows the Indianapolis Colts in football and the Indiana Pacers in basketball,
    tracks FC Cincinnati in MLS, and adds endurance to their routine by cycling the Ohio River Trail each weekend, often timing their rides against personal bests.
  arts: Everardo Santiago immerses in a blend of reggaetón from Bad Bunny, vallenato classics by Carlos Vives, indie rock vibes of Tame Impala, and cumbia rhythms at local festivals, while escaping into
    sci‑fi short stories by Ted Chiang and N.K. Jemisin, shaping a creative outlet that fuels both their cooking experiments and strategic gaming sessions.
  travel: Everardo Santiago prefers low‑budget, spur‑of‑the‑moment road trips that blend cultural immersion with adventure, having already explored the historic streets of Cartagena, trekked to Machu Picchu,
    and enjoyed the lively venues of New Orleans, while dreaming of a future trek along the Appalachian Trail to balance their love of nature with their competitive wanderlust.
  culinary: Everardo Santiago delights in cooking traditional dishes such as bandeja paisa and crisp arepas for friends, skillfully combining beans, pork chicharrón, avocado, corn masa, and cheese, while
    experimenting with modern twists like smoked paprika, often spicing a bit too aggressively, and they rely on reggaetón playlists to keep the kitchen lively.
  core: Everardo Santiago is a curiosity‑driven, bilingual project planner who balances competitive ambition with a laid‑back, sometimes disorganized lifestyle, they fuel themselves with nightly meditations,
    soccer pick‑ups, and a penchant for late‑night gaming marathons.
background:
  cultural: Evernardo was born to Colombian parents who immigrated from Medellín and grew up in the Midwest suburb of Jeffersonville, Indiana. At home, Spanish was the primary language, and family gatherings
    were marked by traditional music, dancing, and foods such as empanadas and tamales. He celebrated Colombian holidays like Día de la Independencia and the Día de los Reyes alongside typical American
    festivities, creating a blended cultural identity. His upbringing taught him the Colombian values of close family ties, hospitality, and respect for elders, while his schooling and work experience in
    Indiana instilled a Midwestern work ethic and a practical, straightforward communication style. As a bilingual professional, he often acts as a cultural bridge in his workplace, helping Spanish‑speaking
    vendors and colleagues navigate U.S. business practices. He remains connected to his heritage through regular participation in local Latinx community events, support for a Colombian soccer fan club,
    and by sharing homemade dishes with friends.
attributes:
  skills: '[''Project scheduling and Gantt chart creation (MS Project)'', ''Task board management (Trello, Asana)'', ''Budget monitoring and cost tracking'', ''Risk identification and mitigation planning'',
    ''Bilingual communication (Spanish/English) for stakeholder liaison'', ''Agile Scrum fundamentals and sprint facilitation'', ''Data visualization with Excel and Tableau'', ''Basic Python scripting for
    automation'', ''Vendor negotiation and contract analysis'']'
  hobbies: '[''Playing soccer'', ''Cooking Colombian cuisine'', ''Cycling along local trails'', ''Strategy video gaming'', ''Listening to reggaetón, vallenato, and indie rock'', ''Attending Latino cultural
    festivals'', ''Reading science‑fiction'', ''Following tech podcasts'', ''Guided meditation for stress relief'']'
  career_goals: Evernardo aims to obtain his Project Management Professional (PMP) certification within the next 18 months and to transition from his current specialist role to a senior project manager
    position managing multi‑disciplinary, cross‑border projects. He envisions leading a program that integrates emerging technologies—such as AI‑assisted scheduling and IoT‑enabled site monitoring—into
    construction or tech‑deployment initiatives. In five years he hopes to be a program‑manager or PMO director for a multinational firm where he can leverage his Colombian heritage to coordinate teams
    across Latin America and the United States. He also wants to develop stronger personal organization habits, perhaps through formal training in time‑management and stress‑reduction techniques, so he
    can handle higher‑stakes responsibilities without compromising his well‑being.
