  hobbies: '[''competitive multiplayer gaming (e.g., League of Legends, Valorant)'', ''building and customizing personal PC rigs'', ''writing small scripts and game mods'', ''reading science‑fiction novels
    and tech articles'', ''playing basketball at community courts'', ''hiking local trails in Riverside County'', ''digital illustration and graphic design'']'
  career_goals: Loc aims to enroll in a community college program in computer science or electrical engineering within the next year, leveraging his self‑taught skills to earn scholarships and internships.
    His long‑term ambition is to become a software developer or hardware engineer who can create practical tech solutions, possibly launching his own startup focused on affordable DIY electronics kits.
    He seeks a career that marries his curiosity for emerging technologies with stable, real‑world impact, and he plans to build a professional portfolio through freelance projects and open‑source contributions.
