persona_description: A cardiologist who specializes in the study of the cardiac conduction system, particularly the role of the SA node and its impact on heart rate and rhythm. They are knowledgeable about
  the mechanics of the heart, the function of the AV node, and the role of the purkinje fibers in the heart's contraction. They are also skilled in interpreting electrocardiograms (ECGs) and understanding
  the signs and symptoms of cardiac disorders.
