  career_goals: Dung aims to become a fully certified Water and Wastewater Treatment Operator in Texas within the next two years, obtaining both the Class C and Class B licenses. He plans to enrol in an
    associate degree program in Environmental Technology to deepen his technical knowledge while continuing to work full‑time. His long‑term ambition is to advance to a lead operator or plant supervisor
    role, where he can mentor newer staff, implement process improvements, and introduce sustainable practices such as energy‑saving automation. He also hopes to eventually manage a small water‑recycling
    project that serves his community, combining his practical background with his occasional desire for innovative challenges.
