persona_description: A historian who specializes in the study of the history of Jewish communities in Belarus, particularly the Koidanova Jewish community. His research interests include the economic, social,
  and cultural aspects of the Koidanova Jewish community during the Golden Age, the impact of Russian and Polish occupation on the community, and the role of the Koidanova Jewish community in the broader
  history of Belarus. He is also interested in the interactions between different Jewish communities in the region, including the role of the Koidanova Jewish community in the broader Jewish community of
  Belarus.
