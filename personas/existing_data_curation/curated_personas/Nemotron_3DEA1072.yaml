personas:
  professional: Zulma Ramirez is a preschool‑aged aspiring scientist who spends afternoons turning the backyard into a makeshift lab, asking endless 'why' questions and sketching colorful diagrams of insects,
    all while happily forgetting to put their toys away because they value the freedom to explore over strict tidy‑up rules.
  sports: Zulma Ramirez dabbles in preschool soccer with the Tiny Tigers, enjoys splash‑time swimming at the community pool, and prefers informal tag games over organized leagues, cheering quietly for the
    local baseball team, the City Hawks, while they wear a mismatched pair of brightly colored socks for good luck.
  arts: Zulma Ramirez delights in drawing whimsical animals inspired by Dr. Seuss, sings along to the upbeat tunes of The Wiggles during playtime, and regularly watches the animated series Bluey, letting
    the vibrant storytelling shape their imaginative narratives.
  travel: Zulma Ramirez adores spontaneous family road trips to the seaside town of Sunny Bay, where they collect seashells and build sandcastles, and they dream of one day exploring the magical castles
    of Disneyland Paris, though they prefer short trips over long, scheduled vacations.
  culinary: Zulma Ramirez favors creamy macaroni and cheese, strawberry‑banana smoothies, and the occasional peanut butter & jelly sandwich, proudly helping stir pancake batter despite making a mess, and
    they eagerly request extra sprinkles on cupcakes after a successful art project.
  core: Zulma Ramirez is a curious five‑year‑old who turns everyday moments into mini‑adventures, thrives in quiet solitary play, yet often leaves a trail of crayons and stickers wherever they roam.
background:
  cultural: Zulma grows up in a Mexican‑American household in San Andreas, California. Spanish is spoken at home alongside English, and she participates in cultural traditions such as making sugar‑skull
    crafts for Día de los Muertos, helping her family prepare tacos and tamales, and celebrating Mexican holidays with music, dancing, and storytelling. Her family’s values of kindness, cooperation, and
    respect for elders are reinforced through weekly gatherings and community events at the local church and cultural center, shaping her sense of identity and her appreciation for both Mexican heritage
    and the rural Californian environment.
