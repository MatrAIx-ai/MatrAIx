personas:
  professional: Stephanie Zinke, a 33‑year‑old business scholar transitioning from teaching assistant to full‑time lecturer, leverages her strong curriculum development, data analysis, and multimedia facilitation
    skills together with a vivid imagination and sociable, talkative nature to transform conventional business courses into interactive storytelling workshops that inspire creative entrepreneurship.
  sports: Stephanie Zinke, a 33‑year‑old yoga devotee, mixes sunrise sessions at the Nashville Yoga Collective with weekly kick‑boxing at Life Fitness, roots for the Tennessee Titans on Sundays, follows
    the Nashville Predators’ ice‑hockey season, and joins the Midtown Run Club’s Saturday morning jogs through Centennial Park.
  arts: Stephanie Zinke, an avid watercolor painter, draws inspiration from Georgia O’Keeffe’s bold hues while humming to Brandi Carlile’s folk‑rock, performs improv at Nashville’s Dynamic Theater, and
    loses herself in speculative fiction by N.K. Jemisin, weaving these influences into her visual storytelling.
  travel: Stephanie Zinke prefers curated artistic escapes, routinely planning weekend road trips to Asheville’s mountain galleries and Savannah’s historic squares, while dreaming of a month‑long creative
    residency in Kyoto, Japan, though budget constraints often limit her to spontaneous, low‑cost stays in eclectic Nashville neighborhoods.
  culinary: Stephanie Zinke, a moderately skilled experimental cook, loves pairing miso‑glazed eggplant with black garlic and smoked paprika, whips up ghost‑pepper ramen for a fiery brunch, and regularly
    savors Nashville’s hot chicken while seeking out seasonal farmers’‑market heirloom tomatoes for her watercolor‑inspired plating.
  core: Stephanie Zinke blends a restless imagination with a knack for turning business theory into vivid art, yet frequently battles anxiety that fuels both hyper‑creativity and occasional overcommitment
    to too many projects.
background:
  cultural: Stephanie grew up in a middle‑class white family in the American Midwest before moving to Nashville. She identifies with Southern hospitality and the eclectic, creative spirit of Nashville,
    blending traditional American values with a progressive appreciation for the arts, music, and cultural diversity.
attributes:
  skills: '[''Instructional facilitation'', ''Curriculum development'', ''Data analysis (Excel, SPSS)'', ''Public speaking'', ''Interpersonal communication'', ''Creative multimedia design'', ''Business
    concept tutoring (marketing, finance, entrepreneurship)'', ''Project management'', ''Research assistance'', ''Conflict resolution'']'
  hobbies: '[''Watercolor painting'', ''Improv theater'', ''Live music attendance'', ''Yoga and mindfulness'', ''Speculative fiction reading'', ''Experimental cooking'', ''Volunteering at community art
    workshops'', ''Traveling to art festivals'']'
  career_goals: Stephanie aims to transition from teaching assistant to full‑time lecturer and eventually earn a Ph.D. in Business Administration or Education, focusing on innovative teaching methods that
    blend creativity with business strategy. She envisions creating a signature course on creative entrepreneurship, publishing research on pedagogy, and possibly launching a consultancy that helps businesses
    incorporate artistic thinking into their operations.
