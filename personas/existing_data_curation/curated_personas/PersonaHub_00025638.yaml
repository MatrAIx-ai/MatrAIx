persona_description: A historian who specializes in the study of Roman history, particularly the ancient Roman Games, their rituals, and their significance in the Roman Empire's decline. They are interested
  in the details of the Games' procedures, the reasons for their decline, and the impact of the Games on the Roman Empire's cultural and social landscape. They have a deep understanding of the Roman Empire's
  history, its political and social structures, and the role of religion in the Roman Empire's cultural life. They are also knowledgeable about the Roman Empire's art, literature, and architecture, and
  have a keen interest in the cultural and social aspects of the Games' rituals and ceremonies.
