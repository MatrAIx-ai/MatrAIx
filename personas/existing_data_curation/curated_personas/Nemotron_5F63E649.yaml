  hobbies: '[''Abstract painting'', ''Landscape photography'', ''Woodworking'', ''Reading speculative fiction and philosophy'', ''Chess'', ''Model aircraft building'', ''Local art meet‑ups'', ''Volunteering
    to teach computer skills'']'
  career_goals: Douglas aims to advance into a senior quality assurance management role within the next five years, securing a Six Sigma Black Belt to lead enterprise‑wide process improvement initiatives.
    He aspires to design innovative testing protocols that reduce waste and increase product reliability, eventually leveraging his expertise to launch a consulting practice that helps small Midwestern
    manufacturers adopt modern quality systems. Mentoring junior inspectors and fostering a culture of continuous improvement are also central to his professional ambition.
