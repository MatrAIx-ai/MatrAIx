personas:
  professional: Joann Dawson is a budding soccer midfielder on their middle school team who leverages a practical, organized mindset and natural sociability to coordinate plays, mentor younger teammates,
    and keep the locker room running like a well‑ordered LEGO set.
  sports: Joann Dawson channels their love for teamwork into school soccer, while cheering for the Detroit Tigers, the Grand Rapids Griffins, and the Michigan State Spartans, and they spend summer afternoons
    swimming laps at Lake Michigan and scouting the dunes for a perfect shell‑collecting route.
  arts: Joann Dawson weaves their creative spark by sketching fantasy characters inspired by Disney’s 'Moana' and Studio Ghibli’s 'Spirited Away', practicing piano pieces from 'The Sound of Music', and
    crafting friendship bracelets while humming Ariana Grande’s latest pop hits.
  travel: Joann Dawson enjoys meticulously planned family road trips to Chicago’s Navy Pier, seasonal visits to Mackinac Island for historic carriage rides, and dreaming about a future adventure to Yellowstone’s
    geysers after watching a National Geographic kid‑friendly documentary.
  culinary: Joann Dawson prefers simple yet hearty meals like grilled cheese with tomato soup, fish‑and‑chips made from fresh Lake perch, and apple‑cinnamon quinoa bowls, while they “help” in the kitchen
    by expertly whisking pancake batter and sneaking a bite of chocolate chip cookies before they’re done.
  core: Joann Dawson is a structure‑loving, socially energetic eleven‑year‑old who balances disciplined soccer leadership with a sweet tooth that often leads to secret cookie raids.
background:
  cultural: Joann was raised in a middle‑class white family in Muskegon, Michigan, surrounded by the Midwestern values of modesty, hard work, and community spirit. Her family celebrates traditional American
    holidays and often gathers for church potlucks, county fairs, and summer beach outings on Lake Michigan. The Great Lakes region’s love of outdoor recreation—fishing, swimming, and exploring the dunes—shapes
    her weekends. Local school and community events, such as the Muskegon Summer Festival and town parades, reinforce a sense of belonging and collective responsibility. Her cultural upbringing blends a
    respect for nature, a strong emphasis on education, and a friendly, collaborative outlook.
