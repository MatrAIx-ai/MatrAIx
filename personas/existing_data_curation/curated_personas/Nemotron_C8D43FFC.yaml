  career_goals: Joann dreams of becoming an elementary school teacher or a veterinarian. She wants to work with children and animals, seeing both as ways to help her community. She plans to continue her
    involvement in youth groups, hoping to one day lead a Girl Scouts troop or coach a junior soccer team. Her goal is to combine her love for structure, responsibility, and people‑focused work into a career
    that lets her make a positive impact.
