personas:
  professional: John Stafford is an aspiring game developer who builds simple games in Python, designs intricate LEGO models, and volunteers at the library, leveraging their love of structure to create
    clear code while embracing the flexibility of creative problem‑solving, despite occasional procrastination on school projects.
  sports: John Stafford is a casual member of the local hiking club, fishes at the nearby lake on weekends, supports the Detroit Lions and the Seattle Kraken, and prefers low‑intensity outdoor activities
    over organized team sports, though they occasionally join school basketball pick‑ups for social interaction.
  arts: John Stafford immerses themselves in fantasy and sci‑fi novels by authors like Brandon Sanderson and Liu Cixin, listens to orchestral scores from John Williams, creates elaborate LEGO sculptures
    reminiscent of dioramas, and enjoys the visual storytelling of indie games such as Stardew Valley.
  travel: John Stafford favors short, spontaneous road trips to state parks like Shenandoah, dreams of visiting the Tolkien‑inspired landscapes of New Zealand, plans trips around affordable bus fares and
    a parental allowance, yet hesitates to travel far without a clear itinerary, preferring flexible, low‑stress getaways.
  culinary: John Stafford enjoys cooking simple comfort foods such as spaghetti carbonara, grilled cheese with cheddar, and homemade trail mix of almonds, pretzels, and dried cranberries, often experimenting
    with extra ingredients like garlic powder while occasionally neglecting balanced nutrition due to late‑night snack cravings.
  core: John Stafford blends a love for structured creativity with a laid‑back, worry‑prone teen life, juggling coding, LEGO builds, and fantasy reads while navigating impulsive spending, anxiety, and a
    penchant for spontaneous outdoor escapades.
background:
  cultural: John grew up in Monticello, a predominantly white, middle‑class community in Wright County, Minnesota. The local culture blends a strong agricultural heritage with small‑town Midwestern values
    such as modesty, self‑reliance, and a courteous, cooperative demeanor often described as "Minnesota nice." He attends the public school system, participates in community fairs, church gatherings, and
    youth activities that emphasize togetherness and mutual support. Family traditions include celebrating holidays like Thanksgiving, Christmas, and Fourth of July, as well as engaging in seasonal outdoor
    activities such as hunting, fishing, and snow sports. This environment has shaped his pragmatic outlook, his emphasis on harmony, and his preference for predictable routines within a flexible, community‑oriented
    setting.
