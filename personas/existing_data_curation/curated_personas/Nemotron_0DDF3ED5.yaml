  career_goals: John aims for a stable, hands‑on career that blends his love of practical work with a supportive community role. He is interested in becoming an automotive or farm‑equipment technician after
    high school, planning to earn certifications through a vocational program or community college. He also sees a possible path in IT support, where he could help local businesses and neighbors with technology
    issues. His long‑term goal is to secure a predictable schedule that lets him continue contributing to his community while maintaining a comfortable work‑life balance.
