  hobbies: '["Walking along the Potomac River", "Gardening", "Cooking Southern cuisine", "Listening to jazz and soul music", "Reading biographies of African‑American leaders", "Watching historical documentaries",
    "Playing bridge", "Visiting family in the South"]'
  career_goals: Although retired, Will aims to stay actively engaged in his community. He plans to compile a memoir of his family's migration story and the civil‑rights era experiences of Prince George’s
    County, preserving these histories for future generations. He hopes to expand his mentorship role by leading a weekly intergenerational storytelling circle at the local senior center, and to assist
    the church in establishing a community garden that provides fresh produce for food‑insecure families. Will also aspires to maintain his health through regular walking and low‑impact exercise, ensuring
    he can continue contributing his calm, resilient presence to those around him.
