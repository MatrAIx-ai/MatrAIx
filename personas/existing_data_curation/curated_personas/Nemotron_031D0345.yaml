personas:
  professional: Will Stallworth, a retired handyman turned volunteer treasurer, blends his practical home‑repair expertise with a meticulous eye for budgetary detail, guiding church outreach funds and neighborhood
    projects with calm, cooperative leadership while occasionally abandoning rigid plans for on‑the‑spot improvisation; they pride themselves on structuring community events yet often opt for spontaneous,
    flexible solutions when unexpected challenges arise.
  sports: Will Stallworth follows the Washington Commanders with faithful enthusiasm, never missing a Sunday game on TV, and supports the Washington Capitals during the hockey season, while they also participate
    in the senior center’s weekly low‑impact walking group along the river and play occasional Saturday bowling at the local alley; their fitness routine relies on daily walks and gentle stretching, yet
    they indulge in marathon viewings of classic baseball games on lazy afternoons.
  arts: Will Stallworth, an avid listener of jazz legends like John Coltrane and Miles Davis, soul icons such as Aretha Franklin, and classic R&B from Marvin Gaye, curates playlists for church gatherings
    and shares favorite tracks with friends; they devour biographies of leaders like John Lewis, regularly watch documentaries like 'Eyes on the Prize,' and attend free concerts at the nearby Kennedy Center,
    letting the music and stories shape their evenings.
  travel: Will Stallworth enjoys road‑trip visits to siblings in Birmingham, Alabama, and extended family in Savannah, Georgia, savoring Southern cooking and the warmth of hometown reunions; they keep a
    travel notebook with wishes to explore New Orleans for its jazz scene, the Blue Ridge Mountains for tranquil hikes, and the historic streets of Savannah for its porch‑side tea, preferring relaxed itineraries
    over rushed flights.
  culinary: Will Stallworth loves to blend Southern comfort staples—fried catfish, collard greens, and buttery cornbread—with healthier, modern twists, such as quinoa‑studded collard greens, low‑sodium
    gumbo flavored with garden tomatoes, and a kale‑sweet‑potato casserole; they tend the vegetable garden for fresh produce, experiment with heirloom recipes from grandparents, and regularly share the
    inventive dishes at church potlucks, though they sometimes over‑season with sweet tea glaze.
  core: Will Stallworth, a 77‑year‑old garden‑loving storyteller, balances calm, community‑first leadership with spontaneous splurges on vintage music, all while walking daily, tending vegetables, and sharing
    soulful jazz with friends.
background:
  cultural: Will is an African‑American who grew up during the tail end of segregation and came of age amidst the civil‑rights movement. His grandparents migrated from the Deep South to the Washington,
    D.C., metropolitan area during the Great Migration, bringing with them traditions of church fellowship, communal support, and a deep respect for education. Living in Fort Washington, Prince George’s
    County—a historically Black suburb known for its tight‑knit community and strong church presence—has reinforced his values of harmony, cooperation, and resilience. Will’s cultural identity is shaped
    by a blend of Southern heritage, Mid‑Atlantic urban influences, and a lifelong commitment to preserving and sharing the stories of his community.
attributes:
  skills: '["Home repair and maintenance", "Personal finance and budgeting", "Community outreach coordination", "Conflict mediation and counseling", "Basic computer literacy", "Gardening and horticulture",
