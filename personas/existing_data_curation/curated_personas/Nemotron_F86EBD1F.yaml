  career_goals: At 62, Ka Sade envisions establishing a small boutique studio where she can produce limited‑edition furniture that blends functional design with African‑American artistic heritage. She aims
    to formalize a community carpentry program that offers free workshops to local youth and seniors, preserving traditional woodworking techniques while encouraging innovation. Additionally, she hopes
    to document her life’s craft journey through a memoir and a series of public art pieces that celebrate her cultural roots and the Pineville community. Her ultimate ambition is to leave a lasting legacy
    of skilled craftsmanship, creative expression, and community empowerment.
