personas:
  professional: Trevor Reddick, a 22‑year‑old aspiring HVAC apprentice, applies a meticulous troubleshooting mindset and a competitive edge to master each certification milestone, while they coordinate
    hands‑on repairs and project tasks with reliable, detail‑oriented precision.
  sports: Trevor Reddick channels their competitive nature onto the courts of the Durham Community Center’s pickup basketball league, supports the Charlotte Hornets in the NBA, and follows the local Durham
    Bulls baseball team for a relaxed off‑season pastime.
  arts: Trevor Reddick’s auditory taste blends jazz legends like John Coltrane and Miles Davis with classic hip‑hop icons such as A Tribe Called Quest and Nas, while evenings are spent turning the pages
    of biographies about innovators, which fuels their creative problem‑solving mindset.
  travel: Trevor Reddick favors meticulously planned road trips that combine tech conventions—like Austin’s Computex—and cultural stops such as New Orleans for jazz, though apprenticeship responsibilities
    often limit travel to weekend getaways within the Southeast.
  culinary: Trevor Reddick cooks with pragmatic confidence, frequently preparing spicy ramen bowls, skillet‑seared steak tacos, and quick brisket‑style sandwiches, yet they habitually reward late‑night
    PC builds with ordering loaded nachos from the neighborhood taquería.
  core: Trevor Reddick is a methodical, competition‑driven 22‑year‑old who balances solitary tech tinkering with fast‑paced basketball, tight‑budget finances, and a disciplined quest for practical independence.
background:
  cultural: Trevor grew up in Durham’s historically Black West End, where community ties, church involvement, and family resilience shaped his outlook. He was raised on stories of the city’s civil‑rights
    legacy and the entrepreneurial spirit of local Black business owners. These influences, combined with regular attendance at a Baptist youth fellowship and exposure to HBCU events at nearby North Carolina
    Central University, inform his sense of identity, responsibility to his neighborhood, and appreciation for African‑American cultural expression.
attributes:
  skills: '["computer troubleshooting", "basic automotive repair", "handyman/DIY projects", "personal budgeting", "project planning", "strategic gaming"]'
  hobbies: '["building gaming PCs", "pickup basketball", "listening to jazz and classic hip‑hop", "reading biographies of African-American innovators", "chess puzzles", "DIY home-repair projects"]'
  career_goals: Trevor aims to secure a trade apprenticeship—preferably in electrical or HVAC work—so he can work in a stable, predictable environment while earning a recognized certification. Over the
    next five years, he hopes to become a licensed technician, later opening his own small auto‑repair shop that will serve his Durham neighborhood. His long‑term ambition is to achieve financial independence
    and become a mentor for younger residents seeking a clear career path.
