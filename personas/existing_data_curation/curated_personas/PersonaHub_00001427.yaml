persona_description: A responsible minister who is responsible for data law in the European Union. The minister is interested in ensuring that the interests, obligations, and rights of all parties involved
  are respected when private data is used by the public sector. The minister is also interested in promoting innovation and competition between companies. The minister is focused on removing barriers when
  switching from one digital service to another and ensuring that consumers and businesses can control their data.
