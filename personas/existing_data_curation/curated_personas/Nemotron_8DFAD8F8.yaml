personas:
  professional: Susan Tellini, a seasoned IT support specialist with three decades of hands‑on experience, blends her practical, cost‑effective troubleshooting with a curious drive for new tools, delivering
    patient, assertive guidance while mentoring colleagues and building a comprehensive knowledge base for her department.
  sports: Susan Tellini enjoys low‑impact fitness through weekly walks on the scenic York County trails and participates in a senior softball league, while cheering on the Philadelphia Phillies in baseball
    and the Pittsburgh Steelers in football, balancing her love of community sport with her need for gentle exercise.
  arts: Susan Tellini weaves her artistic spirit into knitting and quilting projects while savoring historical fiction by Philippa Gregory, listening to the soothing piano compositions of Ludovico Einaudi,
    and regularly attending productions at the York Community Theatre such as 'Our Town'.
  travel: Susan Tellini prefers relaxed, well‑planned weekend getaways to historic small towns like Lancaster, Pennsylvania and the coastal charm of St. Michaels, Maryland, while dreaming of a longer road
    trip along the Blue Ridge Parkway to explore the Shenandoah Valley’s vineyards.
  culinary: Susan Tellini, a confident home cook, delights in preparing herb‑infused roasted chicken with rosemary and thyme, crafting rose‑petal jam from her garden, and enjoying comforting dishes such
    as chicken pot pie and classic Italian minestrone.
  core: Susan Tellini, a meticulous yet curious tech veteran, finds serenity in roses, quilts, and crosswords, but often battles a lingering worry that fuels both her careful budgeting and her occasional
    over‑checking of email at night.
background:
  cultural: Susan is a third‑generation Italian‑American born and raised in the rural outskirts of York County, Pennsylvania. Her family’s heritage, reflected in the Tellini surname, has instilled a strong
    sense of familial loyalty, work ethic, and appreciation for traditional celebrations, especially around holidays like Christmas and the Feast of St. Joseph. Raised in a modest, middle‑class household,
    she attended local public schools and earned a high school diploma before entering the workforce. The community’s close‑knit nature, combined with its Protestant‑Catholic blend, shaped her values of
    service, modesty, and civic involvement. She and her husband have lived in Spring Grove for over three decades, actively participating in the town’s volunteer fire department events, church gatherings,
    and local heritage festivals.
