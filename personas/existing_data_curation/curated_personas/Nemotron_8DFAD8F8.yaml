  hobbies: '[''Rose Gardening'', ''Knitting'', ''Community Volunteering (Senior Tech Literacy)'', ''Birdwatching'', ''Historical Fiction Reading'', ''Walking Trails'', ''Puzzle Solving (Crosswords, Sudoku)'']'
  career_goals: Approaching retirement, Susan aims to transition into a senior mentorship role where she can codify her knowledge into a comprehensive knowledge base for her department. She plans to obtain
    CompTIA Network+ certification to formalize her networking skills and to lead a quarterly workshop for colleagues and community members on digital safety for seniors. Long‑term, she envisions part‑time
    consulting for local non‑profits, helping them maintain affordable technology infrastructure while preserving a balanced, low‑stress work schedule.
