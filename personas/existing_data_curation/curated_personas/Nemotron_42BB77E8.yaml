personas:
  professional: Hieu Tran, a 15‑year‑old budding software creator, transforms curiosity into disciplined projects by coding small games, assembling Arduino kits, and solving LeetCode puzzles, all while
    meticulously logging progress and offering supportive feedback in an online coding community.
  sports: Hieu Tran, preferring solitary exercise, swims laps at the Riverbend Aquatics youth club each morning, follows the NBA’s Golden State Warriors for inspiration, and occasionally joins a weekend
    cycling group despite feeling drained by large social gatherings.
  arts: Hieu Tran, during quiet evenings, creates digital pixel art inspired by the ethereal worlds of Makoto Shinkai and the bold compositions of Beeple, while listening to ambient scores by Ryuichi Sakamoto
    and revisiting Studio Ghibli classics for visual storytelling cues.
  travel: Hieu Tran, an introspective traveler, carefully plans low‑key weekend getaways to serene natural spots like Redwood National Park and dreams of wandering Kyoto’s bamboo groves, balancing a limited
    allowance with a yearning for calm, unhurried experiences.
  culinary: Hieu Tran, after school, often helps prepare a family broth noodle soup brimming with rice noodles, fresh cilantro and basil, thinly sliced pork, alongside crisp rice‑paper rolls filled with
    shrimp, carrots, and mint, and on quiet weekends they experiment with chocolate chip cookies enriched with dark chocolate chunks and a pinch of sea salt.
  core: Hieu Tran, a methodical 15‑year‑old tech enthusiast, balances solitary curiosity with quiet altruism, channeling precision into coding, electronic tinkering, and mindful self‑care, while occasionally
    succumbing to screen‑induced procrastination.
background:
  cultural: Hieu is the son of Vietnamese immigrants who settled in Las Vegas. He grew up bilingual, speaking Vietnamese at home and English at school, and celebrates Vietnamese traditions such as Tet and
    the Mid‑Autumn Festival alongside typical American holidays. His family places a strong emphasis on education, respect for elders, and communal harmony, which influences his considerate and cooperative
    demeanor. Living in the multicultural environment of Las Vegas, he has been exposed to a mix of Asian and Western cultures, shaping a hybrid identity that values both his heritage and his American upbringing.
