    meals"]'
  career_goals: Hieu aspires to become a software engineer or robotics specialist, aiming to develop practical technology solutions that improve everyday life for his community. He wants to attend a STEM‑focused
    high school, earn a scholarship, and eventually study computer science at a top university. He hopes to create apps or devices that help Vietnamese immigrant families stay connected and access services,
    and he also intends to mentor younger students in coding through community workshops, reflecting his cooperative nature.
