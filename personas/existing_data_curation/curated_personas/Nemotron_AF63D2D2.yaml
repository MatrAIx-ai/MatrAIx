  hobbies: '[''Abstract painting'', ''Analog photography'', ''Philosophy reading'', ''Speculative fiction'', ''Puzzle solving'', ''Chess'', ''Experimental jazz listening'', ''Gallery visits'', ''Miniature
    gardening'']'
  career_goals: Rick aspires to transform his artistic passions into a modest but sustainable livelihood. He aims to complete a cohesive portfolio of abstract paintings and photographic series that can
    be exhibited in small galleries around Los Angeles. He hopes to self‑publish a graphic novel that merges his love of speculative fiction with his visual style. To gain regular income and community connection,
    Rick plans to teach occasional workshops at a local community art center and launch an online shop selling limited‑edition prints and handcrafted collages. Underpinning these ambitions is a personal
    goal to achieve greater emotional stability by establishing a predictable routine, securing part‑time work that respects his need for solitude, and building a supportive network of like‑minded creators.
