  hobbies: '[''Intramural basketball'', ''Ultimate frisbee'', ''Live music concerts'', ''Weekly board‑game nights'', ''Volunteer tutoring'', ''Hiking in Hoosier National Forest'', ''Community theater set
    design'']'
  career_goals: Edward aims to complete his bachelor's degree in Education within the next two years and obtain full teacher certification. In the medium term, he hopes to become a curriculum specialist
    for his district, designing interdisciplinary units that blend academic content with community service. Long‑term, he envisions serving as an instructional coach or assistant principal, shaping a school
    culture that values inclusive, student‑centered learning while preserving the predictable structures he values. He also plans to launch an after‑school mentorship program that connects high‑school students
    with local businesses and organizations.
