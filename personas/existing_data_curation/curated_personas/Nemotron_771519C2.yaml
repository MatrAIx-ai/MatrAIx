personas:
  professional: Tonya Dawkins, a 17‑year‑old high‑school senior with hands‑on experience caring for horses, maintaining farm equipment, and organizing community potlucks, is preparing to enter a veterinary
    assistant apprenticeship where their practical skill set, love for routine tasks, and friendly demeanor make them a dependable, if occasionally disorganized, team member, and they quickly earn the trust
    of both animals and coworkers.
  sports: Tonya Dawkins enjoys horseback riding on Bear Lake County trails, runs cross‑country for the local high school during the fall season, and cheers for the Idaho State Bengals and the Utah Jazz,
    blending structured cardio with spontaneous weekend hikes, and they relish the camaraderie of team practices.
  arts: Tonya Dawkins finds inspiration in folk music by Brandi Carlile and The Avett Brothers, indie films such as 'Moonrise Kingdom' and 'Lady Bird,' and they channel that creative spark into journaling
    and handcrafted gifts often adorned with quotes from Greta Gerwig’s movies.
  travel: Tonya Dawkins prefers low‑key road trips to nearby natural wonders like Yellowstone and the Sawtooth Mountains, planning itineraries on a spreadsheet while dreaming of a future backpacking trek
    through New Zealand’s fjords once their finances allow, and they keep a travel journal of each stop.
  culinary: Tonya Dawkins delights in baking double‑crust apple pies flavored with cinnamon and oatmeal raisin cookies, while also preparing hearty vegetable stews using home‑grown carrots, potatoes, and
    rosemary, showcasing a blend of rustic home cooking and refined pastry skills, and they often experiment with seasonal produce from their garden.
  core: Tonya Dawkins balances a love for predictable farm routines with an impulsive sweet‑tooth, a habit of forgetting appointments, and a steadfast commitment to nurturing community ties through handmade
    gifts and volunteer work, and they often leave a trail of crumbs from unfinished baking projects.
background:
  cultural: Tonya comes from a multigenerational white family that has lived in rural Idaho for several decades, with ancestral roots in Midwestern farming communities. Her upbringing emphasized self‑reliance,
    practical skills, and strong community ties. She was raised attending a local Methodist church, celebrating traditional American holidays with family potlucks, seasonal festivals, and community service
    projects. This cultural backdrop fosters a sense of modesty, cooperation, and a deep appreciation for the outdoors, which shape her values, interests, and future aspirations.
attributes:
  skills: '[''Animal care'', ''Farm equipment maintenance'', ''Gardening'', ''Cooking and baking'', ''Knitting and crochet'', ''Basic computer literacy'', ''First aid (CPR)'', ''Community event coordination'']'
  hobbies: '[''Horseback riding'', ''Hiking'', ''Gardening'', ''Baking'', ''Knitting'', ''Animal shelter volunteering'', ''Listening to folk music'', ''Indie film watching'', ''Journaling'', ''Community
    potluck participation'']'
  career_goals: Tonya plans to earn her GED within the next year and then enroll in a vocational program at a nearby community college, focusing on veterinary assistance or horticulture. Her short‑term
    goal is to secure a position as a veterinary assistant or farmhand on a local ranch, where she can apply her animal‑care skills in a structured environment. Long‑term, she envisions managing a small,
    sustainable livestock operation on family land, complemented by a side business selling homemade crafts and preserves at regional farmers' markets. This blend of stable, predictable work and flexible,
    creative entrepreneurship aligns with her desire for both structure and adaptability.
