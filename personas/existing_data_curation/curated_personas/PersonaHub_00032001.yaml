persona_description: A multimedia artist who explores the intersections of culture, politics, and identity through a range of media including painting, sculpture, and installation. Komar is known for his
  collaboration with artist Alex Melamid as the artistic duo Komar and Melamid, and for his work that often explores ideological and aesthetic dualities, including the lines between Soviet Russia and the
  United States during the Cold War. His work is informed by his experiences as a half-Russian and half-American artist, and he has used his art to reflect on the complex relationships between nations and
  their visual representations of themselves.
