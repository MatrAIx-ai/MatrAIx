personas:
  professional: Esperanza Perez, a veteran home economist and community caretaker, blends meticulous household budgeting, garden stewardship, and bilingual support to run senior‑center cooking workshops,
    coordinate church cultural events, and mentor volunteers, all while weaving spontaneous salsa dances into her routine to keep the neighborhood lively.
  sports: Esperanza Perez enjoys low‑impact morning walks through the neighborhood park, attends a weekly senior yoga class at the community center, plays in a casual church softball league, and faithfully
    follows the Colorado Rockies, cheering on game days with a thermos of tea.
  arts: Esperanza Perez finds comfort in the warm brass of classic son and bolero records by Celia Cruz and Benny Moré, sings with the church choir, devours historical novels by Ken Follett and Isabel Allende,
    and admires the vibrant paintings of Frida Kahlo, letting these artistic threads color her daily life.
  travel: Esperanza Perez prefers leisurely road trips planned around a daily schedule, often driving to nearby attractions like Rocky Mountain National Park and the Denver Botanic Gardens, cherishes spontaneous
    weekend visits from grandchildren in Florida, and longs for a guided cultural tour of the historic Old Town of a Caribbean island she explored as a child, though budgeting constraints keep the trip
    on hold.
  culinary: Esperanza Perez excels at preparing aromatic braised beef with cumin, sour orange juice, and fresh cilantro, simmered black beans seasoned with garlic and bay leaf, and sweet fried plantains
    drizzled with honey, expertly using garden‑grown herbs while occasionally over‑cooking a casserole when distracted by a phone call.
  core: Esperanza Perez is a structured yet spontaneous 82‑year‑old home economist who nurtures her community through garden‑fresh meals, heartfelt knitting, and occasional salsa twists, all while juggling
    gentle worries and a penchant for handwritten budgets.
background:
  cultural: Esperanza was born in Santiago de Cuba and immigrated to the United States as a teenager in the early 1960s, joining a close‑knit Cuban diaspora community in Georgia. Her upbringing was steeped
    in Catholic traditions, family‑centered celebrations, and the vibrant rhythms of Afro‑Cuban music. She carries forward the flavors of her homeland—ropa vieja, arroz con pollo, plantains, and café con
    leche—into her daily cooking, while also preserving Spanish language fluency. In Douglasville, she actively participates in Hispanic cultural festivals, helps organize Cuban Heritage Day events, and
    serves as a cultural bridge for younger generations eager to connect with their roots.
