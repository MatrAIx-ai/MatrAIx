  career_goals: Although retired, Esperanza’s ambitions focus on personal fulfillment and community contribution. She aims to preserve and share her Cuban heritage by teaching cooking workshops at the local
    senior center, to compile a memoir documenting her family’s migration story, and to mentor younger volunteers in compassionate elder care. She also wishes to stay healthy and tech‑savvy, learning to
    use a tablet for daily medication reminders and video chats with her grandchildren, while advocating for better support services for seniors in Douglas County.
