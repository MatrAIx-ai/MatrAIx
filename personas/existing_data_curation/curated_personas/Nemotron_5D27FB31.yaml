personas:
  professional: Lourdes Bernal is an aspiring junior scientist in her school's science club, merging her methodical curiosity with practical problem‑solving, and she often leads group experiments with an
    organized, compassionate style.
  sports: Lourdes Bernal plays forward for her school soccer team, trains with a local youth league, joins the ice‑skating club during winter, and cheers for FC Barcelona's women's team and the Chicago
    Blackhawks, embracing teamwork, friendly competition, and seasonal outdoor fun.
  arts: Lourdes Bernal practices the Sanjuanito dance at cultural events, crafts friendship bracelets, draws lively cartoons inspired by Disney and Studio Ghibli, reads adventure novels by Rick Riordan
    and mystery books by Agatha Christie, and enjoys listening to Taylor Swift and traditional folk tunes.
  travel: Lourdes Bernal has explored the snowy slopes of Colorado on a family ski trip, wandered the historic streets of San Francisco, and dreams of seeing the northern lights in Iceland, preferring organized
    itineraries that mix adventure, learning, and time with friends.
  culinary: Lourdes Bernal loves helping bake chocolate brownies, making cheese‑filled empanadas, and flipping fluffy pancakes topped with fresh strawberries, but she often forgets to wash the dishes afterward,
    leaving a trail of crumbs as proof of her culinary enthusiasm.
  core: Lourdes Bernal is an energetic, organized 11‑year‑old who balances soccer, dancing, and science projects, worries over every detail, and secretly hoards extra comic books in her backpack.
background:
  cultural: Lourdes comes from a first‑generation Ecuadorian family that preserves strong cultural traditions at home. Spanish is spoken daily, and the family celebrates festivals such as Carnaval, Semana
    Santa, and Día de los Muertos, often preparing dishes like ceviche, fanesca, and empanadas. Her parents encourage listening to Ecuadorian music (pasillo, charango) and participating in community events
    like the Minneapolis Ecuadorian Cultural Fair. While growing up in Hennepin County, she blends her Latin American roots with Midwestern American customs, navigating school life in English while maintaining
    her bilingual identity. She experiences the contrast of warm Ecuadorian heritage with the cold Minnesota winters, fostering adaptability and a broader cultural perspective.
attributes:
  skills: '[''Bilingual communication (English/Spanish)'', ''Organizational planning for schoolwork and projects'', ''Elementary mathematics proficiency'', ''Reading comprehension'', ''Introductory coding
    with Scratch'', ''Peer mediation and emotional support'', ''Leadership in group activities'', ''Artistic drawing and crafts'', ''Digital literacy (educational apps, basic Microsoft Office)'']'
  hobbies: '[''Soccer and school sports'', ''Traditional Ecuadorian dance (Sanjuanito)'', ''Crafting (friendship bracelets, drawing, painting)'', ''Bilingual reading (adventure and mystery books)'', ''Winter
    activities (ice skating, snow forts, sledding)'', ''School science club and hands‑on experiments'']'
  career_goals: Lourdes dreams of becoming a community health advocate or pediatric nurse, motivated by her deep desire to help others and maintain harmony. She also envisions herself as a future teacher
    who can inspire bilingual students and bridge cultural understanding. In the longer term, she is fascinated by environmental science and hopes to study sustainable practices that benefit both her Ecuadorian
    heritage and her local community in Minneapolis. She aspires to lead youth initiatives that combine her organizational strengths with her compassionate outlook.
