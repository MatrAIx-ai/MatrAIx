    graphic editing and digital creativity'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Reading nonfiction on science and art'', ''Experimenting with international cooking'', ''Birdwatching and nature walks along
    the Mississippi River'', ''Meditation and journaling'', ''Volunteering teaching digital literacy to seniors'', ''Photography (urban and nature)'', ''Attending tech meetups and workshops'', ''Listening
    to jazz and folk music'', ''Playing the ukulele'']'
  career_goals: Looking ahead, Laura plans to formalize her expertise with industry certifications such as CompTIA Network+ and ITIL Service Management. She hopes to transition into a mentorship role within
    her organization, guiding junior technicians and fostering a supportive team culture. Passionate about community impact, she aims to launch a neighborhood‑based tech‑support outreach program that offers
    free digital‑literacy classes and personalized assistance to Saint Paul’s senior residents. Laura also envisions consulting on accessibility‑focused technology solutions for older adults, helping local
    nonprofits design user‑friendly digital platforms. To balance her desire for flexibility with her wellbeing, she seeks a part‑time or remote arrangement that allows her to continue her artistic pursuits
    and manage stress through mindfulness practices. Ultimately, she wants to leave a legacy of compassionate technical support that bridges the gap between technology and the people who need it most.
