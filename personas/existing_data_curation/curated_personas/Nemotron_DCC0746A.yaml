  hobbies: '["Gardening (blueberries, seasonal vegetables)", "Reading historical fiction and mystery novels", "Birdwatching", "Knitting and quilting", "Crossword and jigsaw puzzles", "Genealogy research",
    "Cooking and preserving family recipes", "Meditation and deep‑breathing exercises", "Journaling"]'
  career_goals: Although retired from formal employment, Rachael aims to deepen her contributions to the community by leading a local gardening club that shares sustainable practices and seasonal planting
    guides. She wishes to compile a family memoir and a small cookbook that preserves her heritage recipes and gardening tips. Rachael plans to enroll in a community‑college horticulture workshop to formalize
    her practical knowledge. She also hopes to become a mentor for younger volunteers at the senior center, offering organizational support and emotional listening. Maintaining her health and emotional
    wellbeing through regular mindfulness practice remains a central personal ambition.
