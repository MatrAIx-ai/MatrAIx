persona_description: A researcher from Australia, Denmark, and China who specializes in the development and demonstration of high-speed optical networking solutions. The researcher has expertise in the
  use of photonic integrated circuits, laser light, and exotic materials like arsenic trisulfide (As2S3) for achieving terabit-per-second Ethernet over fiber-optic cables. The researcher's work has led
  to the development of a photonic integrated circuit that uses lasers and light in the same way conventional electronic integrated circuits use electrons and transistors, and has demonstrated the feasibility
  of terabit-per-second Ethernet over fiber-optic cables. The researcher's work has also led to the development of a photonic integrated circuit that uses lasers and light for switching signals and a form
  of exotic material type, chalcogenide, for achieving high-speed optical networking solutions.
