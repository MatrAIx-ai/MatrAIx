personas:
  professional: Armstrong Dejesus, a senior technology strategist and full‑stack architect, leverages his innate curiosity and artistic sensibility to design scalable cloud solutions that fuse rigorous
    data analysis with immersive user experiences, while his disciplined yet flexible approach keeps cross‑functional teams aligned and open to unconventional ideas.
  sports: Armstrong Dejesus, a member of the Miami Yacht Club, spends weekends sailing the Intracoastal Waterway and snorkeling in the Florida Keys, participates in a seasonal beach volleyball league during
    summer, and avidly follows the Miami Marlins and Inter Miami CF, using these athletic pursuits to balance solitary reflection with community camaraderie.
  arts: Armstrong Dejesus, an avid creator of acrylic canvases and street‑level photographer, draws inspiration from the vibrant abstractions of Yayoi Kusama and the urban narratives of Sebastião Saldanha,
    while their acoustic guitar sessions weave the lyrical storytelling of Joan Baez with the rhythmic pulse of Jorge Drexler, embodying a life where technology and art intersect.
  travel: Armstrong Dejesus prefers immersive voyages that blend sea‑borne adventure and cultural discovery, having sailed the Florida Keys, snorkeled the Bahamas, explored the colonial streets of Granada,
    Nicaragua, and now dreams of attending the immersive art festival in Barcelona while balancing family commitments and a modest travel budget.
  culinary: Armstrong Dejesus, an enthusiastic home‑chef, regularly prepares Nicaraguan classics such as gallo pinto, vigorón, and nacatamales—rich with beans, plantains, yucca, and achiote—while also experimenting
    with fresh Gulf‑stream shrimp ceviche seasoned with lime, cilantro, and jalapeño, showcasing an intermediate culinary skill set that delights their circle of friends.
  core: Armstrong Dejesus sails through life guided by a data‑driven compass, yet often steers into spontaneous VR art installations, late‑night guitar riffs, and generous home‑cooked meals, all while battling
    a habit of over‑caffeinating that fuels both creativity and occasional jittery moments.
background:
  cultural: Armstrong was born to Nicaraguan parents and spent his early childhood in Managua before moving to the United States in his teens. He grew up bilingual, preserving Spanish language fluency and
    deep-rooted Catholic traditions while adapting to American cultural norms. Nicaraguan heritage is central to his identity—he celebrates La Purísima, participates in community festivals, and maintains
    strong ties to the Central American diaspora in Fort Lauderdale. His cuisine, music, and storytelling reflect a blend of classic Nicaraguan values (family cohesion, respect, and hospitality) with the
    eclectic, multicultural vibe of South Florida.
