  career_goals: Armstrong aims to transition into a senior technology leadership role, such as Chief Technology Officer or VP of Digital Innovation, where he can shape enterprise‑wide tech strategy while
    fostering an environment that values artistic expression and unconventional ideas. He is also interested in launching a boutique consultancy that helps small businesses in South Florida integrate immersive
    digital art experiences and AI‑driven marketing. Mentoring emerging tech talent, especially from underrepresented backgrounds, is a personal priority, as is contributing to community tech education
    programs.
