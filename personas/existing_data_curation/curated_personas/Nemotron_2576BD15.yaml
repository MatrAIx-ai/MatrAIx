personas:
  professional: A hands‑on warehouse operative named Joey Restina channels practical curiosity and OSHA‑sharp safety instincts into optimizing forklift routes, inventory logs, and team communication, and
    they are actively pursuing an associate degree in supply‑chain management to step into a supervisory role.
  sports: A community‑spirited fan named Joey Restina balances organized cheering for the Riverdale Raiders high‑school football team and the Capital City Cubs with flexible weekend hikes on local trails,
    using the physical activity to decompress after warehouse shifts.
  arts: A classic‑rock aficionado named Joey Restina fills evenings with Led Zeppelin, Pink Floyd, and AC/DC, captures sunrise over pine forests with a DSLR inspired by Ansel Adams, and attends occasional
    local gigs to satisfy their cooperative, team‑oriented side.
  travel: An adventurous planner named Joey Restina maps out road‑trip itineraries to Yellowstone, the Oregon Coast, and a fishing lodge in the Adirondacks, blending organized packing lists with the flexibility
    to detour for spontaneous photo ops.
  culinary: A grill‑master at heart named Joey Restina follows organized recipes for smoked ribs, cedar‑plank salmon, and homemade chili, seasoning with rosemary, smoked paprika, and jalapeños, but they
    occasionally indulge in takeout after late shifts, balancing practicality with the pleasure of classic‑rock playlists while cooking.
  core: A pragmatic, outdoors‑loving warehouse veteran named Joey Restina balances meticulous safety standards with a love for classic cars, photography, and a modest yet occasionally indulgent lifestyle.
background:
  cultural: Joey grew up in South Bend, Indiana, in a working‑class family with German and Irish roots. The Midwestern environment emphasized practicality, hard work, and community. Family gatherings often
    featured traditional dishes and a modest, down‑to‑earth outlook. He was raised with values of reliability, friendliness, and respect for labor, shaped by the region’s industrial heritage and close‑knit
    neighborhoods. These cultural influences reinforce his cooperative spirit and balanced approach to work and leisure.
attributes:
  skills: '[''Forklift operation'', ''Pallet jack handling'', ''Inventory management'', ''Warehouse safety compliance'', ''Basic mechanical troubleshooting'', ''Logistics coordination'', ''Heavy equipment
    maintenance'', ''Team communication'', ''Process optimization'', ''Adherence to OSHA regulations'']'
  hobbies: '[''Fishing'', ''Hiking'', ''Classic car restoration'', ''DIY home improvement'', ''Volunteering at food bank'', ''Strategy video games'', ''Classic rock music'', ''Attending local football games'',
    ''Nature photography'', ''Learning basic coding (Python)'']'
  career_goals: Joey aims to move from a laborer role into a supervisory position within the next few years. He plans to complete an associate degree in supply chain management and earn certifications in
    forklift operation and OSHA safety. His long‑term ambition is to become a warehouse manager or logistics supervisor, eventually overseeing a team that implements efficiency projects. He also entertains
    the idea of starting a small freight or moving business that leverages his practical expertise and community connections.
