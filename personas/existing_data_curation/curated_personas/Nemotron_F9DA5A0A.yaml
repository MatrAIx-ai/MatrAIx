  hobbies: '[''Hiking'', ''Cooking'', ''Board games'', ''Basketball'', ''Live music'', ''Community volunteering'', ''Traveling'', ''Hosting dinner parties'']'
  career_goals: William aims to complete his Bachelor of Business Administration within the next two years and earn a project‑management certification (PMP). He aspires to advance to an operations director
    or senior manager position within a regional retail or hospitality chain, where he can shape large‑scale initiatives and mentor emerging talent. Long‑term, he envisions launching a consultancy that
    helps small businesses streamline their operations and improve employee engagement, while also serving as a volunteer mentor in local leadership development programs.
