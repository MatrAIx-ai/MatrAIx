  career_goals: 'Allison aspires to become a wildlife biologist or environmental scientist, aiming to combine her curiosity about the natural world with her disciplined, results‑oriented work style. She
    dreams of leading a high school science fair project, earning top grades in STEM subjects, and eventually contributing to conservation research that protects local Minnesota habitats. Her ambition is
    grounded in a practical plan: maintaining academic excellence, participating in robotics and science clubs, and gaining mentorship from teachers and community scientists.'
