personas:
  professional: Allison Woodall, a budding junior scientist and LEGO architect, channels their love for biology and block‑based coding into methodical experiments and intricate builds, and they demonstrate
    disciplined curiosity and a knack for organizing complex projects even in school science fairs.
  sports: Allison Woodall enjoys participating in the local youth soccer league and weekend family canoe trips, proudly cheers for the Minnesota Twins and Vikings, and they hold a seasonal membership with
    the Burnsville community swimming pool, though they prefer observing rather than competing in large crowds.
  arts: Allison Woodall immerses themselves in science‑fiction novels by Isaac Asimov, practices origami inspired by Japanese master Robert J. Lang, and they delight in listening to the soundtrack of the
    Pixar film 'Coco' and the pop band Imagine Dragons, letting these creative influences shape their journaling and LEGO creations.
  travel: Allison Woodall dreams of a winter camping adventure in the Boundary Waters Canoe Area, has already explored the Mall of America and a weekend trip to Chicago’s Museum of Science and Industry,
    and they prefer meticulously planned itineraries that balance nature hikes with museum visits, though they sometimes get impatient on long car rides.
  culinary: Allison Woodall loves helping their family bake classic chocolate chip cookies and simple raspberry lemon bars, skillfully measures ingredients with a kitchen scale, and they have a particular
    fondness for the crisp flavor of fresh Minnesota wild blueberries in pancakes.
  core: Allison Woodall is a disciplined young explorer who catalogues bird calls, engineers sprawling LEGO cities, saves every allowance penny, and they occasionally neglect bedtime brushing in favor of
    a final puzzle piece.
background:
  cultural: Allison comes from a white, Midwestern American background growing up in Burnsville, Minnesota. Her family embraces typical regional values such as community involvement, a strong work ethic,
    and appreciation for the outdoors. Seasonal activities like fishing, camping, and attending the local county fair are common, as are celebrations of holidays like Thanksgiving, Christmas, and Fourth
    of July. The suburban environment, combined with supportive public schools in the Burnsville‑Eagan‑Savage district, has fostered a blend of practical sensibility and curiosity. Her cultural upbringing
    emphasizes education, punctuality, and polite social interaction, which complement her reserved yet assertive personality.
