  hobbies: '[''reading science & technology non-fiction'', ''watching documentaries'', ''strategic video gaming (e.g., Civilization, Starcraft)'', ''bicycle repair and customization'', ''chess (online and
    local club)'', ''church youth fellowship'', ''personal finance budgeting'', ''basic Python scripting for personal use'']'
  career_goals: Bobbie aims to first secure a GED within the next year, then enroll in a community-college program offering an associate degree in automotive technology or computer science, depending on
    which path aligns with his emerging interests. He aspires to obtain an apprenticeship with a local auto repair shop, where he can blend his mechanical aptitude with his growing coding skills to innovate
    diagnostic processes. In the longer term, he envisions either becoming a certified automotive technician who incorporates software tools into routine servicing, or transitioning to a junior software
    developer role focused on productivity applications. Throughout his career journey, he is determined to maintain the disciplined work ethic that has helped him meet high standards, and he hopes to achieve
    financial independence that will allow him to support his family and contribute to his community.
