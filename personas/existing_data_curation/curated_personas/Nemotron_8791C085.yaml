personas:
  professional: Jose Reyes is a high‑school sophomore who channels a passion for strategic video games, LEGO building, and model kits into an emerging talent for game design and mechanical prototyping,
    applying their practical, organized mindset to school projects while balancing a busy extracurricular schedule.
  sports: Jose Reyes spends Saturday afternoons playing forward in the city youth soccer league, cheers for Club América and Los Angeles FC during the MLS season, and drops into the Westside Skate Club
    after school to refine tricks on the concrete bowl, treating fitness as a balance between structured team drills and spontaneous skate sessions.
  arts: Jose Reyes channels their love of regional Mexican music—spinning hits from Los Tigres del Norte and Banda El Recodo—into sketching comic‑book heroes reminiscent of Stan Lee’s creations while binge‑watching
    superhero series starring Tom Hiddleston and attending local art fairs to expand their palette, making drawing a vital outlet for their emotions.
  travel: Jose Reyes prefers weekend road‑trips with family that blend relaxation and new experiences—like the coastal drive to San Diego’s Balboa Park, a summer visit to Mexico City’s historic Zócalo,
    and a school‑organized excursion to the Grand Canyon—while maintaining a modest travel journal to plan future solo backpacking to Kyoto once they save enough.
  culinary: Jose Reyes, a budding home cook, frequently helps prepare family classics such as tacos al pastor with marinated pork, fresh cilantro, pineapple, and chipotle‑infused salsa while experimenting
    with layered nachos using corn tortillas, shredded cheese, and jalapeños, balancing modest culinary confidence with occasional burnt popcorn mishaps.
  core: Jose Reyes is a disciplined yet anxious teen who juggles strategic video games, LEGO building, and skateboarding, obsessively journals to tame anxiety, and sneaks midnight snacks despite a self‑imposed
    budget.
background:
  cultural: Jose is a Mexican-American growing up in Converse, Texas, within Bexar County's vibrant borderland culture. He is bilingual, speaking Spanish at home and English at school, and practices Catholic
    traditions with his family. He participates in cultural celebrations such as Cinco de Mayo, Día de los Muertos, and local festivals that blend Mexican heritage with Tex-Mex influences. Family ties,
    respect for elders, and community involvement are central to his identity, shaping his values, food preferences, music tastes, and social interactions.
