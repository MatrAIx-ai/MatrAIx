  hobbies: '[''Strategic video gaming (team-based games)'', ''Building LEGO sets and model kits'', ''Skateboarding with friends'', ''Playing and watching soccer'', ''Listening to regional Mexican music'',
    ''Cooking traditional Mexican dishes'', ''Sketching comic characters'', ''Journaling for emotional regulation'']'
  career_goals: Jose aims to complete his high school education, either by graduating in time or earning a GED, so he can enroll in a vocational training program. He is interested in pursuing a stable,
    structured career such as an electrician, automotive technician, or a role in public service like a police officer or firefighter. He also considers joining the U.S. Army to gain discipline and a clear
    career path. Ultimately, he seeks financial security, a predictable work environment, and the ability to support his family and give back to his community.
