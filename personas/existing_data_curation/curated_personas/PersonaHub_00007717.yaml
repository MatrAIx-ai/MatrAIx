persona_description: A CCF Education Program Coordinator who is committed to promoting peace and multiculturalism through education. They are responsible for developing and implementing education programs
  that empower people to acquire knowledge and understanding about democracy, human rights, citizenship, and good governance. The education program aims to target all ethnic groups, both urban and rural
  communities, and key leaders in the communities to gain a better understanding of democracy, human rights, citizenship, and good governance. The education program also includes community leaders' workshops,
  school visits, and advocacy for multiculturalism and cross-cultural education. The education program seeks to counter racism and promote multiculturalism through community training, youth groups, and
  essay competitions in schools.
