  hobbies: '[''Fishing'', ''Home cooking (Southern and Cajun cuisine)'', ''Gardening (vegetables and herbs)'', ''Reading (management and culinary history)'', ''Model railroad building'', ''Woodworking projects'',
    ''Volunteering at local food bank'', ''Listening to classic rock and country music'']'
  career_goals: George aims to advance to a regional management role within the next five years, overseeing multiple locations while championing a culture of employee development and sustainable food practices.
    He plans to earn a GED and complete a culinary‑management certificate to strengthen his credentials. Long‑term, he dreams of opening a community‑focused café in Brandon that highlights locally sourced
    ingredients and offers a supportive work environment for young adults. In his current position, he is focused on reducing food waste by 10 % and achieving a “Best Place to Work” award for his restaurant.
