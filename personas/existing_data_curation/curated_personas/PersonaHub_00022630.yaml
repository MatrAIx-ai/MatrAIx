persona_description: A patient with Carney complex, a highly penetrant disorder that is inherited in an autosomal dominant manner. The patient is likely to be a young adult female with a family history
  of the condition. She may have a history of atypical pigmentation or myxomas of the skin, testicular tumors, and breast myxomatosis. She may also have a history of Cushing's syndrome and PPNAD, and may
  have been diagnosed with PPNAD biochemically using Liddle's test. The patient may be seeking treatment options for her condition, such as adrenalectomy, and may be interested in learning more about the
  underlying causes of her condition and the potential risks and benefits of various treatments.
