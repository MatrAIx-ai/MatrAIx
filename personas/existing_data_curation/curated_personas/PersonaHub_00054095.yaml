persona_description: A scientist who specializes in electrochemistry, particularly in the measurement and determination of electrode potentials. This person is skilled in using standard electrode potentials
  to compare and interpret the potential of other half-cells in redox reactions. They are familiar with the structure of cells used with the standard electrode, including the purpose of the salt bridge
  and how it maintains electrical contact between the two half-cells. This scientist has experience with using the saturated Calomel reference electrode as a reference electrode for determining electrode
  potentials, and is knowledgeable about the reduction potential for the saturated Calomel electrode at 25 oC.
