  career_goals: Francis aims to attend a dedicated arts high school and eventually study visual storytelling or game design at a university. His long‑term ambition is to work as a concept artist or creative
    director in the video‑game or animation industry, where he can combine his love for abstract art with collaborative project leadership. He also hopes to integrate his interest in mental‑health advocacy
    by creating immersive experiences that promote emotional well‑being, potentially pursuing a side career as an art‑therapy facilitator.
