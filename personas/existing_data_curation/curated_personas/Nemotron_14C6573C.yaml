personas:
  professional: Francis Cohen, an aspiring game designer, blends their love for sketching, LEGO engineering, and storytelling into early prototypes on a graphics tablet, approaching each project with meticulous
    planning, methodical execution, and an energetic drive to collaborate with peers.
  sports: Francis Cohen, a regular at Lancaster’s skate plaza, thrills on a pressed-steel skateboard while cheering for the Los Angeles Lakers (NBA) and LA Galaxy (MLS), and joins the school's intramural
    soccer team each spring, combining a social, energetic approach to fitness with a love for both individual and team sports.
  arts: Francis Cohen, a sketch-obsessed drama club member, spends afternoons drawing elaborate fantasy environments inspired by Makoto Shinkai and Hayao Miyazaki, designs theatrical set pieces that echo
    the modernist installations at LACMA, and unwinds listening to Tame Impala and Phoebe Bridgers, weaving visual storytelling with an indie-music soundtrack.
  travel: Francis Cohen, whose family road trips alternate between weekend hikes in Yosemite National Park and annual visits to San Diego’s Balboa Park, dreams of exploring Tokyo’s Akihabara district for
    its anime culture, planning each journey with a mix of meticulous budgeting and a spontaneous desire for immersive, culturally-rich experiences.
  culinary: Francis Cohen, a budding teen chef, whips up quick miso ramen with sliced pork and scallions, crafts pepperoni pizza topped with fresh basil and mozzarella, and bakes crispy latkes and jelly-filled
    sufganiyot during Hanukkah, often over-salting the sauce but delighting in experimenting with bold flavors.
  core: Francis Cohen, a hyper-creative fourteen-year-old who meticulously plans epic Minecraft builds while battling chronic worry that fuels frequent procrastination, often doodles storyboards on their
    skateboard deck during practice breaks.
background:
  cultural: Francis was raised in a suburban neighborhood of Lancaster, CA, within a middle‑class family that blends typical Southern‑California suburban life with elements of his family's cultural heritage.
    While his household observes some Jewish traditions such as celebrating holidays like Passover and Hanukkah, his everyday environment reflects the diverse cultural tapestry of Los Angeles County—participating
    in community events, school programs, and regional festivals. The proximity to the wider Los Angeles arts scene provides him access to museums, galleries, and after‑school creative workshops, shaping
    his artistic outlook.
