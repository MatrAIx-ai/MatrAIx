persona_description: A Coptic Christian woman activist and academic who is passionate about fighting against the practice of female genital mutilation, a violation of human rights that is tied to the patriarchal
  tradition in Egypt. She is dedicated to educating the public about the health risks of the practice and advocating for its abolition, despite resistance from conservative religious groups. Her work has
  led to the institution of a general ban on the practice in Egypt and the decline of its support within society. She is also a vocal advocate for the human right of bodily integrity and the empowerment
  of women.
