    lectures'']'
  career_goals: Although retired, Debra remains forward‑looking. She plans to complete the bachelor's degree she began years ago, focusing on American history with a concentration on New England maritime
    heritage. She aims to compile and publish a detailed family genealogy that connects personal narratives to broader regional stories. Beyond personal scholarship, she hopes to launch a community art
    and history program in Topsham that pairs seniors with schoolchildren for collaborative quilting projects and oral‑history recordings, fostering intergenerational learning and preserving local culture.
