persona_description: A professional electronics engineer who works with single-ended and differential inputs in analog-to-digital converters (ADCs). They understand the principles of common mode and common
  mode range in signal processing and have experience in designing and troubleshooting systems with ground offsets. They are familiar with the limitations of common mode voltage and the importance of isolating
  the signal source from the device ground to avoid potential errors. They are also skilled in interpreting system diagrams and understanding the impact of common mode voltages on the measurement accuracy
  of ADCs.
