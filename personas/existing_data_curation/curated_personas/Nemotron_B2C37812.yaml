  career_goals: Brenda aims to become a senior HR business partner or HR manager within the next five years, securing SHRM‑CP (or PHR) certification and pursuing a master’s in Organizational Development.
    She hopes to lead the design of a holistic employee‑experience program that weaves art‑based activities, mental‑wellness resources, and inclusive culture initiatives together. Long‑term, she envisions
    establishing a mentorship and community‑outreach framework that links her company with local arts organizations and youth programs, positioning the firm as a cultural hub in the Central Valley.
