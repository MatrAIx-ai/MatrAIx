  career_goals: Phyllis is motivated to re‑enter the workforce in a flexible, home‑based capacity that aligns with her spontaneous nature. She plans to obtain her GED within the next year and enroll in
    a short‑term digital marketing certificate to acquire e‑commerce skills. Her ultimate ambition is to launch a modest Etsy shop featuring handcrafted desert‑inspired décor and upcycled furniture, leveraging
    her DIY and gardening expertise. As her business grows, she hopes to expand into freelance interior‑design consulting for low‑maintenance homes in the Southwest. Concurrently, she seeks to develop stronger
    organizational habits through online productivity courses, enabling her to meet deadlines while preserving her creative flexibility.
