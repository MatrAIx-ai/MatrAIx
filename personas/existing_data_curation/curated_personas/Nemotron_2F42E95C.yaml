  career_goals: Victoria’s primary ambition is to advance into a senior technology leadership role, such as Director of Engineering or Chief Technology Officer, where she can shape product strategy, champion
    inclusive engineering practices, and mentor diverse talent. She also aspires to spearhead innovative projects that fuse technology with the arts—like immersive AR experiences for museums—and to obtain
    advanced certifications (AWS Solutions Architect, PMP). Additionally, she plans to expand her community impact by leading coding mentorship programs for under‑represented youth.
