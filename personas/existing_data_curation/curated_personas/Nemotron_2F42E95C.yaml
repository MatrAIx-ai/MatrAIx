personas:
  professional: Victoria Gibbs leverages their seasoned full‑stack expertise in Python, JavaScript, and AWS to architect scalable, user‑centric platforms, while their curiosity and inclusive leadership
    style drive cross‑functional teams toward innovative, arts‑focused AR experiences, blending rigorous agile processes with flexible creative brainstorming.
  sports: Victoria Gibbs enjoys weekend hikes through the Skokie Forest Preserve as a member of the North Shore Trail Club, follows the Chicago Cubs and Bears for game‑day camaraderie, and fits regular
    yoga sessions at a local studio into their schedule, balancing outdoor endurance with community‑center fitness.
  arts: Victoria Gibbs immerses themselves in Chicago’s vibrant art scene—visiting the Art Institute, creating watercolors inspired by Georgia O’Keeffe, curating urban photography in the style of Vivian Maier,
    and discussing contemporary fiction by Sally Rooney at their book club—fashioning a creative lens that informs both personal expression and professional empathy.
  travel: Victoria Gibbs crafts travel itineraries that weave together art‑rich city escapes and tech conferences, having explored Paris’s museum corridors, Kyoto’s historic temples, and New York’s startup
    hubs, while dreaming of a month‑long artistic retreat in Marrakech’s Medina, favoring detailed planning tempered with spontaneous photo walks.
  culinary: Victoria Gibbs, an enthusiastic home chef, regularly whips up Korean bibimbap using garden‑grown lettuce, seasons Indian butter chicken with fresh garam masala, and prepares Mediterranean falafel
    infused with sumac, constantly experimenting with global flavors while perfecting their vegetable garden harvests for fresh ingredients.
  core: Victoria Gibbs is a curiosity‑driven tech leader who fuses art and code, schedules every minute yet occasionally lets their garden wilt, and can be found sketching railway stations between sprint
    reviews.
background:
  cultural: Victoria grew up in a middle‑class suburb of Chicago with German‑Irish heritage, immersed in Midwestern values of community, reliability, and curiosity. Her family emphasized education and the
    arts, encouraging museum visits and music. She celebrates traditional American holidays alongside cultural festivals such as St. Patrick’s Day and local Oktoberfest events. Active in community organizations,
    she regularly engages with the Chicago art community and local volunteer initiatives, reflecting a blend of mainstream American culture and a deep appreciation for diverse artistic expressions.
