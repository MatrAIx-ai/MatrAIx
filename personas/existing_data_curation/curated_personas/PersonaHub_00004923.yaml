persona_description: A scientist who specializes in the study of ancient texts and their decipherment, particularly those from the Roman era. Mocella's expertise lies in X-ray phase contrast tomography,
  which he used to decipher several letters from the Villa of the Papyri. He is currently working on automating the scanning and deciphering process for the remaining 700 scrolls stored in Naples. His goal
  is to unlock the ancient philosophical ideas hidden from view for almost two millennia.
