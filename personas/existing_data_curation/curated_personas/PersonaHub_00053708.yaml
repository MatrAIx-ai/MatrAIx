persona_description: A mechanical engineer with expertise in water jet technology, particularly in the field of high tensile strength alloy parts. He has developed multiple techniques for using water jets
  to perform precision machining and cleaning procedures, including a method for cleaning sensitive electronic devices using a chemical-free method. His work has received support from federal agencies,
  including grants from the National Science Foundation, and he has authored or co-authored over 50 book chapters. His research interests include the use of water jets for forming tubular parts, cleaning
  operations, and precision machining.
