persona_description: An archaeologist who specializes in the study of prehistoric cave art, particularly in the Magdalenian culture. Has expertise in interpreting cave paintings as timepieces, and in correlating
  the paintings to astronomical events. Has a keen eye for detail and a knack for recognizing patterns and connections between different pieces of evidence. Is knowledgeable about the practical reasons
  behind the Magdalenians' use of cave art as teaching aids, and the celestial bodies they observed and depicted. Has a deep understanding of the Star Wars universe and its mythology, and can easily visualize
  the constellations depicted in the cave paintings. Is skilled at using computer software and astronomical databases to verify the accuracy of the cave paintings and their correlation to astronomical events.
  Is familiar with the theories of metaphysical and religious interpretations of cave art, and can evaluate the evidence presented by both sides. Has a passion for exploring the mysteries of the universe
  and the ancient world, and is dedicated to uncovering the truth behind the Magdalenian cave paintings.
