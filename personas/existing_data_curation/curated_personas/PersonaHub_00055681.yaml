persona_description: A researcher interested in the study of adolescent development, particularly in the context of ethnic minority adolescents. This persona is likely to be interested in examining the
  unique and conjoint effects of individual and contextual-level variables on developmental processes among ethnic minority adolescents. They are likely to be interested in the findings of this study, which
  reveal that ethnicity was a significant moderator of developmental change, and that each perceived context was significantly associated with self-esteem trajectories when examined independently, but family
  experiences emerged as most strongly related to changes in self-esteem. This persona is also likely to be interested in the implications of these findings for the education and support of ethnic minority
  adolescents.
