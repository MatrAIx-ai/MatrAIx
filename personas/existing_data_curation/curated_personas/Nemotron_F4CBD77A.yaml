personas:
  professional: Jami Simonds, a budding junior architect who builds intricate LEGO creations, applies a practical, detail‑oriented mindset to problem‑solving and often volunteers to lead small group projects
    in class, balancing organization with a lively, cooperative spirit.
  sports: Jami Simonds, a spirited member of a local youth soccer league affiliated with the FC Dallas Academy program, loves sprinting in spring track events, cheers for the Dallas Cowboys and the Dallas
    Mavericks, and balances structured practice with spontaneous foot‑races during recess.
  arts: Jami Simonds, an enthusiastic choir singer who idolizes the soundtrack of animated films like Moana, enjoys coloring scenes of Texas blue‑bonnet skies after admiring the illustrations of Mary GrandPré,
    and creates LEGO mosaics inspired by favorite pop artists such as Taylor Swift.
  travel: Jami Simonds dreams of visiting the Grand Canyon’s bright red cliffs after family road trips to the Dallas Zoo and a spring weekend camping in the Texas Hill Country, preferring trips that blend
    outdoor exploration with structured itineraries and plenty of time for sticker‑collecting souvenirs.
  culinary: Jami Simonds, a confident sandwich maker who excels at spreading peanut butter evenly, adores mac‑and‑cheese with a pinch of paprika, and frequently adds crunchy carrot sticks or dinosaur‑shaped
    fruit gummies to their plate, often helping their parents stir pancake batter on weekend mornings.
  core: Jami Simonds is a structured, energetic 7‑year‑old who balances meticulous LEGO engineering with lively soccer games, loves organizing stickers, and approaches life with a pragmatic yet playful
    spark.
background:
  cultural: Jami grows up in a White American family in Dallas, Texas, where Southern hospitality meets Midwestern practicality. Her family participates in local traditions such as Fourth of July fireworks,
    backyard barbecues, and annual trips to the Dallas Arboretum. She attends a public elementary school that celebrates multicultural events, giving her exposure to a variety of foods, music, and holiday
    customs. The community emphasizes friendliness, punctuality, and collective responsibility, shaping Jami’s cooperative yet assertive outlook. Her cultural environment encourages both structured learning
    and lively group activities, complementing her personality traits.
