  career_goals: Jami dreams of a future where she can combine her love of helping others, her enjoyment of structured environments, and her sociable nature. She often says she wants to become a teacher
    so she can work with kids and organize fun learning activities, or a veterinarian because she adores animals and likes the idea of caring for them in a systematic way. She also enjoys imagining herself
    as a community event leader, planning school fairs and neighborhood clean‑ups.
