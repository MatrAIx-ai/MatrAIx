  career_goals: Lisa dreams of a future where she can blend her love of helping others with her practical mindset. She envisions becoming a veterinarian to care for animals, or a teacher to guide younger
    students and foster a supportive classroom environment. She is also intrigued by environmental science and hopes to work in conservation or community planning, promoting sustainable practices in her
    hometown. Ultimately, Lisa aims for a career that lets her make a tangible, positive impact on people, animals, and the local environment.
