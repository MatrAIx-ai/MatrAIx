  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Digital photography'', ''Sailing'', ''Fishing'', ''Vegetable gardening'', ''Reading science and philosophy'', ''Playing chess'',
    ''Volunteer docent work'', ''Attending live music events'']'
  career_goals: Although retired, Charles aims to leave a lasting impact on his community by mentoring senior volunteers, documenting local art history, and creating a small oral‑history archive for Tampa's
    senior citizens. He aspires to continue learning—especially in emerging technologies like digital archiving—so he can help preserve stories and artworks for future generations. He also hopes to author
    a memoir that weaves together his technical career, love of art, and lifelong curiosity about new ideas.
