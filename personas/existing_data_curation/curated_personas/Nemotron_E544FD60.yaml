personas:
  professional: Charles Eller, a retired engineer turned community archivist, merges their STEM analytical precision with a passion for art by leading senior volunteers, digitizing Tampa’s senior oral histories,
    curating small local exhibitions, and delivering charismatic docent tours—all while applying their hands‑on DIY skills in woodworking and basic programming to keep the projects running smoothly.
  sports: Charles Eller stays active through weekly sailing outings with the Tampa Bay Yacht Club, participates in morning walking groups at the senior center, practices low‑impact yoga for seniors, and
    is an avid fan of the Tampa Bay Buccaneers, Lightning, and Rays, often attending games when their schedule permits.
  arts: Charles Eller devotes their free time to painting tranquil watercolors of the Gulf Coast, curating community art exhibits featuring local talent like John Kingston, volunteering as a docent at the
    Tampa Museum of Art where they share insights on Monet and Ansel Adams, and enjoying live jazz performances by the Al Bizz Hall Band at the historic Straz Center.
  travel: Charles Eller prefers thoughtful travel, planning road trips to historic sites such as St. Augustine and Savannah, embarking on occasional cruise voyages to the Caribbean, and dreaming of a leisurely
    pilgrimage through the Italian Amalfi Coast, all while balancing their senior‑center commitments and limited mobility.
  culinary: Charles Eller delights in cooking fresh Gulf shrimp scampi with locally grown basil from their patio garden, savoring Key lime pie at the seaside café Café Café, and occasionally indulging in
    a Cuban sandwich from a neighborhood deli, though they sometimes forget to turn off the stovetop after a lively storytelling session.
  core: Charles Eller blends analytical rigor with artistic curiosity, guiding seniors in preserving Tampa’s cultural heritage while sailing, painting, and occasionally forgetting the oven knob.
background:
  cultural: Charles grew up in post‑war America in a middle‑class family with Germanic roots, embodying many traditional Midwestern values of self‑reliance and community involvement. Relocating to Tampa
    later in life exposed him to the city's blend of Southern hospitality, coastal lifestyle, and diverse cultural festivals. His upbringing emphasized education, curiosity, and civic duty, which today
    manifest in his voluntary work, appreciation for both technical and artistic endeavors, and active participation in local cultural events.
