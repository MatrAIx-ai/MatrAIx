  hobbies: '[''Reading (historical fiction and self‑improvement)'', ''Herb Gardening'', ''Walking nature trails'', ''Snorkeling'', ''Fishing'', ''Cooking Puerto Rican cuisine'', ''Crocheting'', ''Attending
