  career_goals: Carmen aims to advance from her current receptionist role to an office manager or community liaison position within the local government or a tourism agency. To achieve this, she plans to
    earn her GED and pursue a certificate in office administration or hospitality management at a nearby community college. She also hopes to develop leadership skills through on‑the‑job training, eventually
    supervising a small front‑desk team and coordinating community outreach programs for seniors and new residents. Financial stability and the ability to give back to her close‑knit community are central
    to her long‑term ambitions.
