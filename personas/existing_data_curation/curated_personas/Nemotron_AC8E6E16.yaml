personas:
  professional: Luis Mugnier, a 45‑year‑old sales manager with a humanities background, blends storytelling, design‑thinking, and a people‑first leadership style to craft compelling client narratives and
    lead multidisciplinary teams toward innovative revenue growth.
  sports: Luis Mugnier, a 45‑year‑old outdoor enthusiast, spends mornings sprinting the Wasatch Trail Runners’ routes, weekends mountain biking with the Utah Mountain Bikers Association, and evenings cheering
    on the Utah Jazz while occasionally joining a local pickup soccer league in the fall, all while favoring adventure‑based fitness over rigid gym schedules.
  arts: Luis Mugnier, a 45‑year‑old lover of the arts, frequents Salt Lake City galleries showcasing works by Ansel Adams and James C. Christensen, paints impressionistic landscapes inspired by Van Gogh’s
    brushstrokes, strums an acoustic guitar at improvised jam nights covering Bob Dylan and Joni Mitchell, and devotes evenings to speculative fiction by Neal Stephenson and poetry by Ocean Vuong, all of
    which shape his storytelling flair.
  travel: Luis Mugnier, a 45‑year‑old cultural explorer, prefers loosely planned, month‑long excursions to art‑rich cities such as Barcelona, Kyoto, and Marrakech, punctuated by spontaneous weekend road
    trips to nearby Sedona and Moab, balancing his love of new cuisines and galleries with a family‑friendly calendar that leaves room for occasional solo retreats to recharge.
  culinary: Luis Mugnier, a 45‑year‑old experimental home chef, enjoys crafting dishes like miso‑glazed Utah trout, roasted beet and goat‑cheese salads with sumac, and lamb tagine spiced with ras el hanout,
    while also savoring street‑food tacos in Mexico City and meticulously sourcing fresh herbs for his weekend culinary experiments.
  core: Luis Mugnier, a 45‑year‑old sales leader, balances a love for spontaneous creativity with a habit of forgetting to file paperwork on time, turning everyday life into a vibrant collage of art, adventure,
    and people‑focused storytelling.
background:
  cultural: Luis was raised in the American West, growing up in Utah's family‑oriented and community‑driven environment. His white, middle‑class background aligns with mainstream contemporary American cultural
    norms, emphasizing self‑reliance, practicality, and a strong work ethic. The regional culture, marked by a close connection to the outdoors and values of cooperation and service—often associated with
    the Church of Jesus Christ of Latter‑day Saints—has shaped his collaborative and considerate demeanor. His humanities education introduced him to European literary and artistic traditions, fostering
    an appreciation for abstract ideas and creativity that influences both his personal interests and professional approach.
attributes:
