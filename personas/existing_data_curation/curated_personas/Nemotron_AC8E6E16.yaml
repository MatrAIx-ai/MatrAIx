  hobbies: '[''Visiting art galleries and museums'', ''Painting and digital photography'', ''Reading speculative fiction, philosophy, and modern poetry'', ''Improv theater and acoustic guitar playing'',
    ''Hiking, mountain biking, and trail running'', ''Hosting board game and trivia nights'', ''Experimental cooking'', ''Traveling to explore art and culture'']'
  career_goals: He aims to transition from managing a single sales team to overseeing a regional sales division, positioning himself for a director‑level role within the next three years. In the medium
    term, Luis plans to design and implement a sales training program that integrates design‑thinking and creative storytelling, helping his organization differentiate in emerging markets. Ultimately, he
    envisions launching his own consultancy that partners with artistic and tech‑driven companies to develop innovative go‑to‑market strategies, while also mentoring the next generation of sales leaders.
    Throughout his career progression, he seeks to maintain a flexible schedule that supports his family life and personal creative pursuits.
