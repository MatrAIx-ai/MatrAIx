  career_goals: Though she is currently not in the formal workforce, Uzma aims to channel her expertise into part‑time consulting for local small businesses, focusing on streamlining operations and implementing
    data‑driven decision making. She also plans to launch a free monthly STEM workshop series at the Edison public library, targeting middle‑school girls, and hopes to assume a leadership role within the
    local volunteer network. To stay current, she intends to earn a professional certification in data science within the next two years and eventually serve on the board of a regional nonprofit that promotes
    STEM education.
