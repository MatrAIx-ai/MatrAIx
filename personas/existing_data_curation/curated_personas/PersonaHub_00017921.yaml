persona_description: Annie Kidder, executive director of People for Education, an advocacy and research group that advocates for more emphasis on reading for joy and less emphasis on standardized test scores
  in schools. She is a seasoned education advocate and researcher who has worked on several initiatives aimed at improving student outcomes, particularly in the area of reading. Kidder is known for her
  expertise in the field of reading and her belief that reading for joy is a crucial component of a well-rounded education. She is a strong advocate for the importance of reading for pleasure and the need
  for schools to prioritize it.
