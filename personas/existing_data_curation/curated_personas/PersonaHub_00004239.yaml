persona_description: A Ph.D. candidate in Classical Art & Archaeology at the University of Virginia, R. Benjamin Gorham, who is interested in the digital reconstruction of archaeological sites, particularly
  at the ancient Graeco-Roman city of Morgantina, Sicily. He has experience using GIS, drones, and photogrammetry during his summer excavations in Morgantina and wants to experiment with 3D printing his
  models. He is passionate about preserving every season's results in a physical form, creating a permanent physical record of his project which would otherwise be partially lost every time his season concludes
  for the summer.
