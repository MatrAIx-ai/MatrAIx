personas:
  professional: Lissette Laubach, a seasoned early childhood educator, blends watercolor‑inspired lesson designs with Montessori and Reggio Emilia philosophies, using their vivid imagination to craft flexible,
    arts‑integrated curricula while navigating classroom chaos with a relaxed, occasionally disorganized style that still asserts compassionate leadership.
  sports: Lissette Laubach embraces low‑impact fitness by hiking the Allegheny foothills most weekends, joining a local senior walking club, cheering for the Pittsburgh Steelers during football season,
    and opting for pottery classes as active recreation rather than rigid gym schedules.
  arts: Lissette Laubach immerses herself in the arts through watercolor landscapes inspired by Winslow Homer, sketching scenes from community theater productions, devouring speculative fiction by Octavia
    Butler and Neil Gaiman, and regularly volunteering at regional craft fairs while listening to folk‑rock playlists featuring The Avett Brothers and local fiddlers.
  travel: Lissette Laubach prefers relaxed, road‑trip style travel, spontaneously mapping weekend getaways to the Catskills or the Ohio River Valley, dreaming of a longer trek through the Scottish Highlands
    to sketch lochs, and balancing budget constraints by staying at family‑run B&Bs rather than pricey hotels.
  culinary: Lissette Laubach, a competent home cook, delights in seasonal kitchen experiments such as beet‑goat cheese salads, mushroom risotto scented with fresh thyme, and crafting her own apple butter
    from heirloom apples, while still savoring classic Pennsylvania Dutch chicken pot pie and indulging in occasional artisanal cheese boards featuring locally sourced cheddar and blue cheese.
  core: Lissette Laubach channels boundless imagination into teaching and art, yet habitually misplaces keys in sketchbooks and relies on a mountain of sticky notes to keep track of deadlines.
background:
  cultural: Lissette grew up in a small‑town setting in western Pennsylvania, absorbing the region’s blend of Mid‑Atlantic and Appalachian cultural influences. Her upbringing emphasized community involvement,
    respect for nature, and a practical, down‑to‑earth work ethic. Family traditions include seasonal community gatherings, local craft fairs, and a love for regional music and storytelling. While identifying
    as white, she values the inclusive spirit of her hometown, drawing on its emphasis on mutual support and lifelong learning to shape her educational philosophy.
