  hobbies: '[''Watercolor painting'', ''Sketching'', ''Pottery'', ''Reading speculative fiction and poetry'', ''Gardening'', ''Hiking'', ''Attending local art fairs'', ''Crafting'', ''Journaling'', ''Experimenting
    with new recipes'', ''Board game nights'', ''Community theater volunteering'']'
  career_goals: Lissette aims to transition from classroom teaching to a leadership role where she can influence district‑wide early education practices. She aspires to become a curriculum coordinator or
    instructional coach, championing innovative, arts‑rich programs that nurture curiosity and creativity. Over the next few years, she plans to earn a master's degree in early childhood education or educational
    leadership, develop a community outreach initiative that offers creative workshops for parents, and eventually author a children’s book that celebrates imagination and resilience.
