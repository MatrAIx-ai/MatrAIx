  career_goals: Elizabeth aims to pursue a career that blends her passion for art, research, and thoughtful curation. She hopes to study art history and museum studies at a liberal‑arts college, eventually
    working as an art curator or archival specialist in a regional museum where she can design innovative, contemplative exhibitions. In the shorter term, she intends to build a robust digital portfolio,
    secure internships or volunteer roles at local galleries, and apply for scholarships that support emerging artists. She also dreams of creating an online platform that showcases under‑recognized contemporary
    artists, allowing her to combine her organizational talents with her love for unconventional ideas.
