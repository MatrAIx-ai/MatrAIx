personas:
  professional: Elizabeth Mcdermott, a high‑school student who blends watercolor landscapes, poetry, and Python‑generated visual art, is building a portfolio for a future in interdisciplinary digital arts
    while methodically honing her sketching technique and coding skills.
  sports: Elizabeth Mcdermott, a quiet trail‑hiker on weekends along Sandusky Bay, enjoys solitary jogging and is a member of the school's cross‑country team, while cheering for the Cleveland Guardians
    and following the Cleveland Browns' season with measured enthusiasm.
  arts: Elizabeth Mcdermott, an avid creator who fills sketchbooks with Monet‑inspired watercolors, composes piano pieces while listening to Max Richter, and draws inspiration from artists like Agnes Martin
    and poet Mary Oliver, frequently visits the local art museum's teen workshops.
  travel: Elizabeth Mcdermott, who prefers low‑key nature retreats, has explored the Hocking Hills State Park and a weekend trip to Niagara Falls, and dreams of photographing the misty cliffs of the Scottish
    Highlands while budgeting carefully for future solo travel.
  culinary: Elizabeth Mcdermott, a modest home‑cook, loves preparing avocado toast with lemon zest, experimenting with herb‑infused olive oil for salads, and baking shortbread cookies while often snacking
    on fresh strawberries during late‑night study sessions.
  core: Elizabeth Mcdermott, a solitary 15‑year‑old art‑tech hybrid, balances meticulous planning with curiosity, turning quiet walks and piano practice into a palette of creative projects while occasionally
    slipping into procrastination over chores.
background:
  cultural: Elizabeth was raised in Fremont, a small Midwestern town in northwest Ohio, where the community is largely composed of families of German, Irish, and broader European ancestry. Her upbringing
    reflects the region’s modest, self‑reliant values and an emphasis on community involvement through school events, local fairs, and church gatherings. While these traditions fostered a respect for hard
    work and reliability—traits that reinforce her organized nature—Elizabeth’s parents also encouraged participation in the school’s art program and provided access to the public library’s resources, nurturing
    her curiosity and appreciation for diverse artistic perspectives. This blend of Midwestern cultural stability and support for creative exploration shapes her worldview and aspirations.
