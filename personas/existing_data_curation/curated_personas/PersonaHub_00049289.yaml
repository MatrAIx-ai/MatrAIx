persona_description: A Nashville civic leader who is passionate about urban design and has a deep understanding of the principles and goals of the Nashville Plan. They have a track record of successfully
  implementing successful comprehensive plans in other cities and are interested in using the Nashville Plan as a model for development in the city. They are committed to education and action programs that
  establish broad awareness of the Plan and position it in the forefront of Nashville development. They are skilled in modifying existing public policies that would obstruct the Plan and establishing new
  ones that would further Plan goals. They have a keen understanding of the complexities of public policies and the need for effective politicking to implement the Plan. They are also knowledgeable about
  the Tennessee Department of Transportation's Long Range Transportation Plan and how it will have a major impact on patterns of growth and development. They have a strong interest in design guidelines
  for selected areas, master plans for downtown parking and civic space, traffic calming of streets that need it, the integration of affordable housing into new residential development, and the incorporation
  of public art in individual civic and private development projects.
