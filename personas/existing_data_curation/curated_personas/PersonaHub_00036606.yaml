persona_description: A botanist or a researcher in the field of plant biology, particularly focused on the effects of UV-B radiation on plant growth and reproduction. This individual is likely to be interested
  in studying the relationship between UV-B radiation and the flowering traits of various plant species, including the effects on nectar and pollen production, floral traits that link plant pollination
  with bee host preference, host fidelity and larval development, and the potential harm of intensified UV-B radiation on floral resources used by bees. They may also be interested in understanding the
  impact of UV-B radiation on the reproductive success of pollinators and the ability of plants to attract and retain pollinators.
