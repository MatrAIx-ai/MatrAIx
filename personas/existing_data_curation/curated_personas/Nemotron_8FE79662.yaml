  hobbies: '[''Gardening'', ''Quilting'', ''Bridge (card game)'', ''Church choir'', ''Library volunteering'', ''Canoeing'', ''Birdwatching'', ''Reading historical fiction'']'
  career_goals: Although retired from formal employment, Leslie aims to deepen her impact on Fairgrove by leading the senior center’s activity program, establishing a community garden that provides fresh
    produce for local families, and documenting the town’s oral history for a future archive. She also hopes to travel to Michigan’s Upper Peninsula and attend a regional heritage conference to share her
    experiences with other senior volunteers.
