personas:
  professional: Tracy Melin is an enthusiastic elementary student who thrives as a collaborative project leader in class, using their sociable nature and practical focus to keep group activities organized
    while embracing enough flexibility to let peers explore creative ideas.
  sports: Tracy Melin enjoys weekly soccer matches with the Little Kickers youth club and often chants team cheers for the Chicago Cubs during family baseball outings, and they eagerly build snow forts
    in winter while valuing staying active through after‑school dance classes that double as cardio exercise.
  arts: Tracy Melin finds creative joy in splashing paint while channeling the whimsical style of Mary Blair, dancing to choreographies inspired by Misty Copeland's ballet performances, singing along to
    favorite Disney soundtrack songs such as 'Let It Go' from Frozen, and they craft gifts inspired by Martha Stewart's DIY tutorials.
  travel: Tracy Melin eagerly anticipates family road trips that combine nature hikes in Yellowstone National Park and thrilling visits to Disneyland, while they dream of a future adventure to the historic
    streets of Edinburgh and the beaches of Maui.
  culinary: Tracy Melin relishes pizza topped with pepperoni and extra cheese, potato‑shaped chicken nuggets, creamy macaroni and cheese, and they proudly mix banana‑strawberry smoothies with honey, often
    attempting to bake chocolate chip cookies using vanilla extract and butter under parental supervision.
  core: Tracy Melin is a bubbly, group‑oriented eight‑year‑old who balances a love for structured teamwork with spontaneous bursts of creativity, while they occasionally misplace their inhaler and splurge
    on glitter stickers.
background:
  cultural: Tracy grows up in a middle‑class white family in Medfield, Massachusetts, a suburb known for its strong community ties and New England traditions. Her family attends a local church and participates
    in town events such as the Fourth of July parade, Thanksgiving turkey dinners, and holiday light displays. The school emphasizes inclusive values and community service, which reinforce Tracy’s cooperative
    nature. Seasonal outings like leaf‑picking in autumn, visiting pumpkin patches, and sledding in winter are regular family activities that shape her cultural experiences.
