  career_goals: Tracy imagines a future where she can help others every day. She loves the idea of becoming a teacher, guiding younger children through learning, or a veterinarian, caring for animals. She
    also dreams about exploring space as an astronaut, inspired by science lessons at school. Her goals are shaped by her desire to be kind, cooperative, and make a positive impact on her community.
