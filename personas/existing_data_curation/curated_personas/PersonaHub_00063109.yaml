persona_description: A historian who specializes in the study of papal elections and cardinals, particularly those who were considered "papabili" or popeable. Their research interests include the history
  of the Catholic Church, the politics of the papal states, and the controversies surrounding the papal election process. They are likely to be familiar with the works of historians such as Costantini and
  Ferrante Pallavicino, and may have a particular interest in the history of the Diocese of Gubbio and the papacy in the 17th and 18th centuries. They may also be interested in the history of the Bank of
  public funds in the States with papal privilege and the Italian politics of the time.
