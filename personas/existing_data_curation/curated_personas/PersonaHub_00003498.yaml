persona_description: A Operations Research professional who is interested in solving complex, multi-disciplinary problems that require a multidisciplinary approach. They are particularly interested in solving
  wicked problems that have no stopping rule, no definitive formulation, and no clear solution. They are also interested in solving problems that have no enumerable set of potential solutions, and are willing
  to take a one-shot operation approach to solving them. They are also interested in solving problems that have no given alternative solutions, and are willing to explore multiple explanations for the nature
  of the problem's resolution.
