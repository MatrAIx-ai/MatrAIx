  hobbies: '[''Cricket'', ''Cooking South Asian cuisine'', ''Hiking'', ''Strategy video games'', ''Reading business and tech articles'', ''Mindfulness meditation'', ''Listening to music (Bollywood, classic
    rock)'', ''Photography'']'
  career_goals: Mohammad aims to move from his current supervisory role into an operations‑management position within the next three to five years, targeting a certification such as PMP or Lean Six Sigma
    to bolster his project‑leadership credentials. He plans to enroll in a part‑time MBA program to deepen strategic thinking and eventually lead a department that blends administrative efficiency with
    business development. Parallel to his professional climb, he is committed to developing stronger organizational habits and stress‑management techniques so he can sustain high performance without compromising
    his well‑being.
