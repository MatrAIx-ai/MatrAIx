personas:
  professional: Mohammad Aujla, a 26‑year‑old office administration supervisor, blends a practical knack for workflow automation with a curiosity for emerging productivity tools, leading front‑line teams
    through schedule juggling, QuickBooks budgeting, and ad‑hoc data‑analysis scripts while keeping morale high despite a habit of occasional disorganization.
  sports: Mohammad Aujla hits the pitch every Saturday with the Worcester County South Asian Cricket Club, hikes the rolling trails of the local countryside for cardio, and follows the Worcester Railers
    in the ECHL as well as the Boston Red Sox, channeling a competitive spirit into both team sports and personal fitness.
  arts: Mohammad Aujla curates a soundtrack of A.R. Rahman's Bollywood hits and classic rock legends like Led Zeppelin while capturing urban and nature scenes through a DSLR, finding creative release in
    both visual composition and the strategic immersion of video games such as Civilization VI.
  travel: Mohammad Aujla prefers spontaneous weekend getaways, often biking to nearby Boston for arts festivals or hiking the Blue Hills, while dreaming of a meticulously planned summer trek through the
    Swiss Alps and a cultural immersion trip to Kyoto, balancing a modest travel budget with a love for both adventure and relaxation.
  culinary: Mohammad Aujla enjoys mastering buttery chicken tikka masala and sarson da saag at home, often experimenting with fusion twists like masala‑infused tacos, and delights in sourcing fresh cilantro,
    garam masala, and ghee at the farmer’s market, though they sometimes over‑spice dishes in the quest for bold flavor.
  core: Mohammad Aujla is a competitively driven yet flexible 26‑year‑old who channels curiosity into workflow hacks, mindfulness into stress relief, and a love for cricket, cooking, and creative tech into
    a uniquely balanced, though occasionally disorganized, life.
background:
  cultural: Mohammad is a second‑generation South Asian American of Punjabi heritage, raised in a bilingual household where Punjabi and English were spoken interchangeably. His family celebrates cultural
    milestones such as Diwali, Eid, and Vaisakhi, and he participates in community events at the local gurdwara and cultural festivals in the Boston area. He grew up valuing education, hard work, and respect
    for elders, core tenets of his family's collectivist background, while also embracing the individualistic, flexible mindset of his American environment. This blend informs his approach to work, community,
    and personal life, allowing him to bridge traditional values with contemporary American culture.
attributes:
  skills: '[''Office administration'', ''Team supervision'', ''Process optimization'', ''Budget tracking'', ''Microsoft Office Suite'', ''QuickBooks'', ''Conflict resolution'', ''Data analysis'', ''Scheduling'',
