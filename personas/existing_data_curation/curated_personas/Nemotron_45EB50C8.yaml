personas:
  professional: Logan Georgiana, a 29‑year‑old modular home installation specialist, blends a hands‑on mastery of blueprint reading, power‑tool operation, and OSHA compliance with a pragmatic yet occasionally
    lax approach to planning, seeking a supervisory role that lets them mentor apprentices while paving the way toward a sustainable tiny‑home venture.
  sports: Logan Georgiana is an avid hiker with the Harpers Ferry Hiking Club, a seasonal kayaker with the Potomac Kayakers, and a casual runner who logs weekend miles on the Appalachian Trail; they root
    for the West Virginia Mountaineers football team and cheer on the Washington Capitals during hockey season, while preferring low‑impact, nature‑based fitness over a structured gym routine.
  arts: Logan Georgiana channels creative energy through woodworking small furniture pieces, shooting black‑and‑white photos of historic towns, and soaking up live folk performances by The Avett Brothers
    at local festivals, while their bookshelf is dotted with photo essays by Steve McCurry and they often hum to the sounds of classic American singer‑songwriter Bob Dylan.
  travel: Logan Georgiana favors spontaneous, budget‑conscious road trips, often packing a camp stove for weekend hikes in Shenandoah National Park or a quick detour to Asheville’s art scene, and while
    they’ve already trekked the historic districts of Savannah and the coastal cliffs of Acadia, they dream of kayaking the glacial lagoons of Iceland during the next summer break.
  culinary: Logan Georgiana enjoys a practical, comfort‑food palate—fire‑grilling pulled pork sandwiches with tangy coleslaw, experimenting with a home‑brew IPA that features Cascade hops and orange zest,
    and whipping up a weekend batch of sourdough starter to bake crusty loaves topped with rosemary and sea salt, all while modestly mastering the art of skillet‑seared trout with lemon‑butter.
  core: Logan Georgiana is a hands‑on modular‑construction specialist who balances rugged outdoor pursuits, creative woodworking, and a laid‑back, slightly chaotic approach to life while quietly building
    a sustainable tiny‑home future.
background:
  cultural: Logan was raised in a close‑knit, predominantly white Appalachian community near Harpers Ferry, West Virginia. His family has a multigenerational tradition of building and trade work, instilling
    a strong work ethic, self‑reliance, and respect for craftsmanship. He grew up attending a local Protestant church, where community service and fellowship were emphasized. The historic significance of
    the Harpers Ferry area sparked his interest in American history, while the surrounding mountains nurtured an appreciation for outdoor recreation and environmental stewardship. These cultural influences
    shape his values of practicality, community cooperation, and a balanced respect for tradition and progress.
attributes:
  skills: '[''Manufactured home installation'', ''Blueprint reading'', ''Local building code compliance'', ''Electrical wiring'', ''Basic plumbing'', ''HVAC connections'', ''Power tool operation'', ''Site
    preparation and foundation anchoring'', ''Project scheduling and coordination'', ''Customer communication'', ''OSHA safety compliance'', ''Troubleshooting and repairs'']'
  hobbies: '[''Hiking'', ''Kayaking'', ''Woodworking'', ''Home brewing'', ''Photography'', ''Attending local music festivals'', ''Community potlucks'', ''Reading about construction and Appalachian history'']'
  career_goals: Logan aims to earn advanced certification in modular construction and eventually launch his own small‑scale installation business that can offer flexible scheduling while maintaining high
    standards of quality and safety. In the short term, he seeks a supervisory role that lets him blend structured project management with hands‑on problem solving, allowing him to mentor apprentices and
    shape efficient workflows. Long‑term, he envisions expanding into sustainable tiny‑home projects that combine his practical expertise with a growing market for eco‑friendly, affordable housing.
