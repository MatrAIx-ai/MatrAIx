  career_goals: Idalberto aims to enroll in a community college program in Business Administration or Hospitality Management within the next year. He plans to secure a part‑time position in a hotel or resort
    front desk to gain hands‑on experience in guest services. Over the next five years, he envisions progressing to a supervisory role, such as Guest Services Supervisor, while completing an associate’s
    degree and eventually a bachelor's degree. He also hopes to develop stress‑management techniques and perhaps start a small catering side business that blends his cultural culinary interests with his
    organizational talent. Ultimately, he seeks a career that balances structured responsibilities with frequent social interaction.
