persona_description: A geologist and environmental scientist who specializes in the study of paleokarst and mineralogy. She is particularly interested in the distribution and formation of minerals in underground
  environments, and how past conditions may have favored mineral formation. She is skilled in using Geographic Information System (GIS) software to create computerized maps and analyze data. Her research
  interests also include the study of green clay and its role in the precipitation of minerals.
