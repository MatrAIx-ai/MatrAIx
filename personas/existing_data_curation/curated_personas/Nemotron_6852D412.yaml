  hobbies: '[''Gardening'', ''Traditional Mexican cooking'', ''Reading historical biographies'', ''Puzzle solving'', ''Yoga'', ''Volunteer English tutoring'', ''Attending cultural festivals'']'
  career_goals: Nubia aims to advance into a supervisory or security management role within the gambling industry, seeking certifications such as Certified Protection Professional (CPP) and specialized
    training in advanced surveillance analytics. She hopes to mentor junior officers, particularly those from underrepresented Latino backgrounds, and to contribute to the development of more equitable
    workplace policies. Long‑term, she envisions establishing a consultancy that advises entertainment venues on integrating culturally aware security practices while maintaining high operational standards.
