  career_goals: Vidalina dreams of turning her love for art and Puerto Rican culture into a career as a visual storyteller. She hopes to finish high school with a portfolio that earns her a scholarship
    to study graphic design or fine arts at a university in San Juan. Long‑term, she envisions working as a graphic designer for local tourism agencies, creating vibrant campaigns that showcase the heritage
    of San Germán and Mayagüez. She also aspires to curate community exhibitions that celebrate island folklore, and to run youth art workshops that encourage other kids to explore creative expression while
    honoring their cultural roots.
