personas:
  professional: Jeremy Clasen, a retired regional manufacturing and retail executive, leverages their three decades of business management expertise—particularly in strategic planning, Lean-driven process
    optimization, and advanced financial forecasting using Excel and QuickBooks—to methodically mentor local entrepreneurs, applying their preference for structure and competitive edge to drive measurable
    improvements.
  sports: Jeremy Clasen stays fit through daily low-impact walks with the Eau Claire Senior Walking Club, while their competitive spirit finds an outlet in rooting for the Green Bay Packers during the NFL
    season and the Wisconsin Badgers during collegiate basketball, though they avoid high-intensity sports due to their knee osteoarthritis.
  arts: Jeremy Clasen indulges their love for Midwestern heritage by devouring the works of historian David McCullough, listening to folk ballads by Pete Seeger, admiring Grant Wood’s regionalist paintings,
    and occasionally attending productions at the Eau Claire Community Theatre featuring classic films starring Tom Hanks.
  travel: Jeremy Clasen plans their trips with spreadsheet precision, favoring modest historically rich weekend getaways such as the Wisconsin State Historical Museum in Madison, a pilgrimage to the Oberlin
    College historic campus, and a leisurely drive through Door County’s lighthouse trail, while they budget carefully to keep their scholarship fund intact.
  culinary: Jeremy Clasen, an adept home cook, transforms their garden’s heirloom tomatoes and bush beans into rustic tomato-basil soup and slow-cooked white-bean chili, often pairing the meals with freshly
    caught trout grilled over a reclaimed-wood smoker, while they prefer simple wholesome dishes over fancy restaurant fare.
  core: Jeremy Clasen blends a lifelong devotion to order and methodical improvement with a quiet love for solitary pursuits, from fishing at sunrise to meticulously logging garden yields, all while maintaining
    a skeptical eye on new trends and a stubborn habit of re-reading their favorite World War II biographies.
background:
  cultural: Jeremy grew up in a traditional Midwestern household in Wisconsin, rooted in a family of German‑Scandinavian ancestry. Raised in a Protestant (Lutheran) community, he internalized values of
    self-reliance, modesty, and community service typical of the region. His cultural life centers on local traditions such as county fairs, church gatherings, and family celebrations of holidays like Thanksgiving
    and Fourth of July. He maintains a strong sense of place tied to the lakes and forests of Dunn County and respects the practical, down-to-earth ethos of his community.
