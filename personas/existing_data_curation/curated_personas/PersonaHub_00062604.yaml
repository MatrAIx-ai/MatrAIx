persona_description: A food industry expert and advocate for private regulation in the food industry, with a particular focus on the kosher certification system and its impact on the industry. They have
  a deep understanding of the mechanics of the system, its standards, and the actors involved, and are passionate about the transformation of the industry from a notorious racketeering and price fixing
  industry to a model of success for private regulation. They have a unique perspective on the role of private regulation in improving food safety and organic product labeling, and are interested in the
  latest controversies in the field. They have a keen interest in the history and religious practice of the kosher certification system, and are knowledgeable about the development of the Kof-K kosher certification
  system, as well as the hiring of Harvey Senter to provide kosher certification for Howard Johnson's ice cream.
