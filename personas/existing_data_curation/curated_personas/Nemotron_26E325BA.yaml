  hobbies: '[''building LEGO models'', ''Scratch coding and game design'', ''playing soccer'', ''dancing to salsa and reggaeton'', ''collecting shells and marine artifacts'', ''reading mystery novels'',
    ''drawing comic strips'', ''helping in the kitchen with Puerto Rican recipes'']'
  career_goals: Marilyn dreams of turning her love of building things and solving puzzles into a future career in engineering or technology. She imagines herself designing sustainable structures for coastal
    communities, perhaps as a civil engineer who protects the Gulf Coast from storms. At the same time, her competitive spirit on the soccer field fuels an ambition to earn a sports scholarship and continue
    playing at the collegiate level. She also envisions preserving her cultural heritage by becoming a chef who blends modern cooking techniques with traditional Puerto Rican flavors. Overall, she aims
    for a career that combines practical problem‑solving, creativity, and a chance to give back to both her local and Puerto Rican communities.
