personas:
  professional: Marilyn Guerrero, a budding LEGO architect and junior coder who blends curiosity with a practical mindset, thrives on designing custom builds and simple games while maintaining a relaxed,
    flexible approach to school assignments that sometimes leaves their desk a bit chaotic.
  sports: Marilyn Guerrero, a competitive youth soccer player for the Biloxi Hurricanes club, trains after school with a focus on winning, follows professional teams like Miami FC and the New England Revolution
    for inspiration, and channels their competitive streak into both drills and weekend matches, while occasionally neglecting stretching routines.
  arts: Marilyn Guerrero, an enthusiastic dancer and comic-strip creator who grooves to salsa legends like Celia Cruz and reggaeton hits from Bad Bunny, spends evenings drawing adventure panels featuring
    marine creatures, and channels their curiosity into storytelling, though they sometimes skip art class to tinker with LEGO.
  travel: Marilyn Guerrero, a curious traveler who loves beachcombing for shells on Gulf Coast trips, has visited an island with family for Three Kings Day celebrations, dreams of snorkeling in Aruba's
    reefs, and prefers spontaneous road trips over rigid itineraries, often packing a small bag of LEGO bricks for the journey.
  culinary: Marilyn Guerrero, a budding home chef who delights in making plantain mash and crispy tostones with grandma, mixes it with a love for pepperoni pizza and macaroni-and-cheese, and enjoys experimenting
    with garlic, lime, and cilantro in dishes, though they sometimes forget to clean the kitchen after cooking.
  core: Marilyn Guerrero, an inquisitive 11-year-old LEGO builder and coder whose competitive spirit drives soccer success, balances cultural celebrations and spontaneous creativity with a laid-back approach
    to chores and budgeting, while occasionally leaving a trail of unfinished projects.
background:
  cultural: Marilyn comes from a proud Puerto Rican family that maintains strong ties to its island roots while living in Biloxi, Mississippi. At home, Spanish is spoken alongside English, and family meals
    often feature traditional dishes like mofongo, arroz con gandules, and tostones. She celebrates cultural holidays such as Three Kings Day and Puerto Rico’s Fiesta de San Juan with music, dancing, and
    storytelling. The blend of Caribbean rhythms and Southern hospitality shapes her identity, giving her a unique perspective on community and resilience. Her grandparents often share stories of life in
    Puerto Rico, instilling a sense of cultural pride that she carries into school projects, community events, and her everyday interactions.
attributes:
