persona_description: A cardiologist who specializes in the diagnosis and treatment of cardiomyopathies, particularly nonischemic cardiomyopathy. The cardiologist is well-versed in the various causes and
  types of nonischemic cardiomyopathy, including dilated cardiomyopathy, hypertrophic cardiomyopathy, and restrictive cardiomyopathy. The cardiologist is also knowledgeable about the risk factors and complications
  associated with nonischemic cardiomyopathy, including heart failure, arrhythmia, and sudden cardiac death. The cardiologist is interested in joining the Doctors Lounge online medical community to share
  knowledge and expertise with other medical professionals and patients.
