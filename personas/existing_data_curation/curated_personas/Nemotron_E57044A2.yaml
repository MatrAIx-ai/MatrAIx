personas:
  professional: Margot Guerrero is a senior data architect who leverages expert relational and NoSQL database design, cloud expertise on AWS and Azure, and a human‑centered, art‑inspired mindset to craft
    elegant, secure data solutions while balancing meticulous organization with a willingness to explore unconventional approaches, even as occasional worries push her to double‑check every detail.
  sports: Margot Guerrero hikes weekly with the City Hills Hiking Club, plays casual Saturday soccer with the River City FC women’s league, supports the local professional soccer team the River City FC,
    and reserves winter months for indoor climbing at the Skyline Climbing Gym, balancing fitness with social connection.
  arts: Margot Guerrero frequents contemporary art galleries, sketches scenes inspired by Frida Kahlo, Diego Rivera, and Ai Weiwei, experiments with oil painting in the style of modern abstraction, and
    engages in a book club that discusses works by Isabel Allende, Jorge Luis Borges, and Octavio Paz, letting these artistic dialogues fuel both her creative outlet and professional storytelling.
  travel: Margot Guerrero plans culturally immersive trips using reward points, has visited Oaxaca, Mexico, Machu Picchu, Peru, and Barcelona, Spain, seeks future adventures in Angkor Wat, Cambodia and
    Florence, Italy, and prefers a mix of guided tours for historical sites and spontaneous local market explorations, all while budgeting for modest accommodations.
  culinary: Margot Guerrero enjoys cooking traditional corn‑based tamales, slow‑cooked pepian, and spicy chiles rellenos, often incorporating roasted chilies, fresh cilantro, and dark chocolate, while experimenting
    with sous‑vide techniques and occasional fusion twists, showcasing a modest yet confident kitchen skill set.
  core: Margot Guerrero blends a data‑driven career with a vibrant love for art, mindful rituals, and a touch of anxiety, creating a uniquely balanced yet occasionally over‑thinking life rhythm.
background:
  cultural: Raised in a multilingual household, Margot speaks both Spanish and English fluently and maintains strong ties to her Guatemalan heritage. Family celebrations of holidays such as Día de los Muertos
    and Semana Santa reinforce her appreciation for ritual, storytelling, and community. She actively engages with the Guatemalan diaspora in the Washington, D.C. area, supporting cultural events, traditional
    music, and culinary gatherings. This blend of Central American roots and American upbringing informs her worldview, fostering a deep respect for cultural preservation and a desire to leverage technology
    to safeguard and share the art and history of her community.
