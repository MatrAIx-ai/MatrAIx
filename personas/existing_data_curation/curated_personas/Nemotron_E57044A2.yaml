    for Personal Projects'']'
  career_goals: Margot aims to become a senior data architect leading strategic data initiatives for cultural heritage institutions, where she can merge her technical expertise with her passion for the
    arts. She aspires to mentor junior DBAs, champion diversity and inclusion within tech teams, and speak at conferences on the intersection of data engineering and cultural preservation. By pursuing advanced
    cloud certifications and exploring AI‑driven data pipelines, she hopes to design innovative, scalable solutions that enable museums and nonprofit archives to digitize and share their collections globally
    while maintaining rigorous data integrity and security.
