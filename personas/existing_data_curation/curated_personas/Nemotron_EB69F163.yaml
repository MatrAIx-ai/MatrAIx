  hobbies: '[''Gardening'', ''Quilting'', ''Crossword puzzles'', ''Jigsaw puzzles'', ''Historical fiction reading'', ''Genealogy research'', ''Church choir participation'', ''Walking nature trails'', ''Cooking
    Southern cuisine'']'
  career_goals: Regina aims to obtain a Microsoft Office Specialist certification within the next year to qualify for a data quality control role within her organization. She aspires to transition into
    a supervisory position where she can oversee a small team of entry clerks, implement process improvements, and mentor newer staff. Additionally, she is considering enrolling in a part‑time community
    college office administration program to broaden her technical knowledge and ensure a stable, predictable career path as she approaches retirement, while preserving a work schedule that allows time
    for family and personal interests.
