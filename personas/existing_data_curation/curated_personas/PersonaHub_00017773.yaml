persona_description: A researcher and advocate for the rights of disabled children, focusing on the protection and safety of these vulnerable individuals. They have a deep understanding of the challenges
  faced by disabled children, including barriers to accessing support services, the impact of specific impairments on their ability to seek help, and the importance of personal safety skills and peer support
  in reducing bullying and enabling children to make informed decisions. They are committed to sharing and building on existing knowledge and good practice to ensure equal protection for disabled children
  and promote safe and accessible services.
