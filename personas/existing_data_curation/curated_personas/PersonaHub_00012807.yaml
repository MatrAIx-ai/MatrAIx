persona_description: A woman who is passionate about environmental issues and is actively involved in scientific research. She is interested in the state of the marine environment and how harmful chemicals
  and plastics are impacting it. She is a founder of eXXpedition, a team of women sailing around Britain to sample the UK’s waters for micro plastic and chemicals. She is a scientist and environmental activist
  who is using a range of surveying tools to sample the water, sediment, and air for plastics and toxic substances. She is a founder of Kids Against Plastic and eXXpedition Round Britain partners. She is
  also a member of the eXXpedition crew and is carrying out 15 scientific experiments while on their Round Britain voyage this summer.
