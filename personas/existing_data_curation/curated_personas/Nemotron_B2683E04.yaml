  hobbies: '["Abstract painting", "Digital photography", "Reading speculative fiction and philosophy", "Star gazing in local parks", "Solo hiking on nature trails", "Cooking traditional Mexican dishes with
    experimental twists", "Meditation and journaling", "DIY electronics projects", "Listening to avant‑garde music", "Playing solo tabletop RPGs"]'
  career_goals: Juan aims to earn his CPA credential within the next two years and eventually pursue the CFA designation to deepen his expertise in investment analysis. He aspires to transition into a senior
    finance leadership role, such as CFO, at a regional firm where he can influence strategic growth and integrate innovative financial technologies. In the longer term, Juan envisions launching a boutique
    consultancy that offers culturally attuned financial advisory services to Hispanic‑owned businesses in Florida, combining his creative problem‑solving aptitude with his community roots. He also seeks
    to develop a user‑friendly financial literacy platform that blends gamified learning with practical budgeting tools, hoping to empower individuals who, like himself, value flexibility and novel approaches
    to personal finance.
