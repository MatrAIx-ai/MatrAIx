  career_goals: Lindsay aims to transition into a technology leadership role—such as Lead Engineer or Software Architecture Manager—within the next three to five years. She plans to obtain advanced cloud
    certifications (e.g., AWS Certified Solutions Architect) and pursue an executive education program that blends technical strategy with business acumen. Her long‑term ambition is to shape the architecture
    of large‑scale, user‑centric platforms while championing inclusive hiring practices and continuous learning cultures. Ultimately, she hopes to launch a SaaS product focused on mental‑health and stress‑management
    tools, aligning her personal sensitivity to stress with her professional impact. Throughout her career progression, she seeks a balance between ambitious growth and sustainable work‑life integration.
