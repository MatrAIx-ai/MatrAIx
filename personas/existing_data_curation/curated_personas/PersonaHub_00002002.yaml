persona_description: A historian or conservationist interested in the history and preservation of English landscape gardens, particularly those created by Charles Bridgeman and William Kent. They are knowledgeable
  about the development of the English Landscape Garden and its influence on British landscape gardening, and are interested in the preservation of Rousham, Oxfordshire, as a historic garden. They are likely
  to be interested in the details of Bridgeman's work at Rousham, his contribution to the movement towards less formal gardens, and the preservation of the garden's features and mood.
