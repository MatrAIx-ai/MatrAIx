  hobbies: '[''LEGO building and model kits'', ''Puzzle solving'', ''Coloring and mandala drawing'', ''Journaling (drawing & writing)'', ''Reading (Magic Tree House series in English & Spanish)'', ''Helping
    with Mexican cooking (tacos, salsa)'', ''Soccer practice'', ''School choir singing'', ''Nature walks & shell collecting'', ''Educational video games with clear rules'']'
  career_goals: She dreams of becoming someone who helps others in a predictable and caring environment. She is fascinated by teachers who guide students through stories, and she often says she wants to
    be a teacher someday. She also loves animals and imagines working as a veterinarian where she can care for pets and farm animals. Because she enjoys building and organizing, she sometimes imagines designing
    playgrounds or creating safe, well-planned spaces, like an architect or a community planner. She aspires to a career that combines her love for structure, kindness, and her bicultural heritage, perhaps
    as a bilingual educator or a cultural liaison who helps children from Mexican families feel welcomed.
