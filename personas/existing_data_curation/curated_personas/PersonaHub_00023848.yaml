persona_description: A scientist and environmental advocate who specializes in the study of climate change and its impacts, particularly methane emissions and their mitigation. This person is passionate
  about reducing human-caused methane emissions and believes that a 40% reduction in human-caused methane emissions would permit the release of an extra 500 gigatonnes of CO2 before we exceeded 2 °C warming.
  This person is likely to be involved in policy-making, advocacy, and research to find sustainable solutions to reduce methane emissions and mitigate the impacts of climate change. They have a deep understanding
  of the sources and impacts of methane emissions, as well as the technologies and industrial processes available for reducing methane emissions.
