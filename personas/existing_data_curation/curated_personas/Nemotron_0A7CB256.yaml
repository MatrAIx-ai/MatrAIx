personas:
  professional: John Yaney, a 43‑year‑old Certified Financial Planner, blends two decades of retirement‑planning expertise with a down‑to‑earth, organized workflow and a keen curiosity for fintech, offering
    Creek County clients pragmatic yet forward‑thinking advice while maintaining a calm, assertive presence.
  sports: John Yaney spends his Saturdays cheering for the Oklahoma Sooners and the Dallas Cowboys, tracks the Oklahoma City Thunder’s season, keeps fit by hunting deer in the pine woods, fishing on Lake
    Keystone, and joining the local Creek County Bass Club’s catch‑and‑release tournaments.
  arts: John Yaney unwinds by strumming acoustic versions of John Denver and Willie Nelson for family gatherings, reads biographies of Abraham Lincoln and Warren Buffett, and occasionally enjoys a community‑theater
    staging of ‘Our Town’ at the Beggs Cultural Center.
  travel: John Yaney prefers road‑trip planning with a flexible itinerary, often visits Nashville for live music, dreams of a summer fishing expedition to Yellowstone’s rivers, and balances his love of
    adventure with budget‑conscious stays at family‑run motels near Lake of the Ozarks.
  culinary: John Yaney relishes grilling smoked brisket and smoked paprika‑rubbed catfish caught at Lake Keystone, crafts hearty chicken‑fried steak with homemade gravy, and enjoys experimenting with fresh
    herbs like rosemary while modestly rating his cooking skills at “competent but never gourmet.”
  core: John Yaney embodies a calm, pragmatic Midwestern work ethic, merging a love of hands‑on problem solving—from restoring his vintage Chevrolet to guiding retirees’ portfolios—with a quiet curiosity
    that fuels both his fintech interests and weekend outdoor pursuits.
background:
  cultural: John was raised in Beggs, a small town in Creek County, Oklahoma, within a family of German‑Irish descent that valued hard work, self‑reliance, and community service. The Midwestern hospitality
    of his upbringing taught him to be courteous and cooperative, while the region’s strong church presence (he attends a local Baptist congregation) reinforced a compassionate yet pragmatic worldview.
    Growing up around agriculture and oil‑field workers gave him an appreciation for practical, down‑to‑earth problem‑solving, which he carries into his advisory work. The close‑knit nature of rural Oklahoma
    life has shaped his calm demeanor, resilience during economic swings, and his commitment to giving back through local schools and civic groups.
attributes:
  skills: '[''Financial planning'', ''Retirement strategy development'', ''Investment portfolio management'', ''Tax‑efficient investment planning'', ''Risk assessment and mitigation'', ''Cash flow and budgeting
    analysis'', ''Insurance needs analysis'', ''Client relationship management'', ''Regulatory compliance'', ''Use of financial planning software (MoneyGuidePro, eMoney)'', ''Fintech and robo‑advisor integration'']'
  hobbies: '[''Fishing'', ''Deer hunting'', ''Classic truck restoration'', ''Acoustic guitar playing'', ''Reading historical biographies'', ''Attending high‑school football games'', ''Community financial‑literacy
    volunteering'', ''Nature hiking'']'
  career_goals: John aims to expand his practice into a boutique advisory firm serving Creek County and the surrounding region, focusing on retirees and small‑business owners. He plans to deepen his expertise
    in sustainable investments and fintech platforms to offer diversified, forward‑thinking strategies while preserving a personal, calm advisory presence. He intends to earn additional credentials such
    as the Chartered Financial Analyst (CFA) and Certified Investment Management Analyst (CIMA) designations. A long‑term ambition is to launch a community financial‑literacy program in local schools and
    churches, cementing his role as a trusted, resilient advisor. Eventually, he envisions transitioning to a mentorship role for younger advisors while maintaining a modest, well‑served client portfolio.
