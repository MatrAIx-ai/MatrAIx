personas:
  professional: Minnie Fuller, a seasoned bailiff with over a decade of courtroom security management experience, leverages meticulous planning, advanced case‑management software, and conflict‑de‑escalation
    expertise to safeguard judges and jurors while also training new staff and championing community outreach, all driven by their curious, organized, and sociable nature.
  sports: Minnie Fuller, an energetic runner, joins the Durham Trailblazers running club for weekly 5K races, hikes the Eno River trails on weekends, supports the Durham Bulls baseball team and the Duke
    Blue Devils basketball squad, and balances a love of competition with a laid‑back approach to group fitness.
  arts: Minnie Fuller, a vibrant participant in Durham’s cultural scene, paints watercolor interpretations of local murals, attends live jazz performances by artists like Kamasi Washington and classic R&B
    shows featuring Anita Baker, and curates informal book clubs that discuss contemporary literature by authors such as N.K. Jemisin and Colson Whitehead.
  travel: Minnie Fuller, a curious explorer, prefers short‑haul road trips to nearby cities like Asheville and Charleston, has a bucket‑list destination of Marrakech for its spice markets, and balances
    a modest travel budget with occasional splurges on cultural festivals, always planning itineraries that include local art galleries and outdoor hikes.
  culinary: Minnie Fuller, an adventurous home chef, experiments with Southern‑African fusion dishes like jollof‑spiced collard‑green mac & cheese and berbere‑seasoned shrimp and grits, favors ingredients
    such as sweet potatoes, okra, smoked paprika, and harissa, and enjoys hosting dinner parties where occasional over‑spicing becomes a running joke among friends.
  core: Minnie Fuller, a 41‑year‑old bailiff who blends a disciplined, data‑driven work ethic with a lively love for art, music, running, and experimental cooking, navigates life with curiosity, organized
    planning, sociable energy, and a habit of occasionally over‑committing to community events.
background:
  cultural: Minnie identifies as African-American and was raised in Durham's historic Hayti neighborhood, where the legacy of the civil-rights era remains a daily influence. Family traditions rooted in
    church, gospel music, and community gatherings have shaped her values of resilience, mutual support, and social responsibility. She remains actively involved with local Black cultural organizations,
    attending Juneteenth celebrations, supporting Black artists, and participating in initiatives that preserve Durham's Black heritage. Her upbringing in the South blends with a contemporary urban perspective,
    informing her appreciation for both traditional Southern customs and progressive, inclusive dialogue.
