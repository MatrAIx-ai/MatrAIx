    programs'', ''Exploring Black history sites in Durham'', ''Hosting book clubs or podcast listening groups with friends'']'
  career_goals: Seeking to broaden her impact on the justice system, Minnie aims to advance to a supervisory chief bailiff position where she can lead department-wide initiatives. She plans to obtain a
    Master's in Criminal Justice and certification in Court Security Management to deepen her expertise. A key ambition is to spearhead the integration of digital evidence workflows and data-driven decision-making
    tools within the Durham court system, improving efficiency and transparency. Minnie also aspires to develop a mentorship program for aspiring Black women in law-enforcement and STEM fields, fostering
    diversity and community engagement. Long-term, she envisions contributing to policy reforms that prioritize humane bailiff practices and strengthen court-community relations.
