    bailiffs'', ''Public speaking and courtroom communication'', ''Community outreach coordination'', ''Digital evidence technology handling'']'
  hobbies: '[''Visiting local art galleries and museums'', ''Painting and sketching'', ''Attending live jazz and R&B concerts'', ''Running and participating in community 5K races'', ''Hiking in nearby parks
