personas:
  professional: Charles Broussard, a 40‑year‑old project manager and emerging nonprofit leader, blends their expertise in cross‑functional coordination and agile‑waterfall hybrid planning with a curiosity‑driven,
    people‑first approach, often improvising structures to keep teams motivated even when deadlines threaten their spontaneous nature.
  sports: Charles Broussard follows the Birmingham Barons and Birmingham Legion FC with fervor, and they spend Saturday mornings jogging with the Birmingham Trail Runners club, using those runs to clear
    their mind before the week’s project meetings.
  arts: Charles Broussard immerses themselves in Birmingham’s art scene, regularly attending openings at the Birmingham Museum of Art featuring works by photographer Carrie Mae Weems, catching live sets
    by St. Paul and the Broken Bones, and supporting productions at the Alabama Shakespeare Festival, where they also network with emerging artists.
  travel: Charles Broussard prefers spontaneous road trips that combine historic towns like Natchez, Mississippi, and scenic hikes in the Great Smoky Mountains; they plan loosely around a digital itinerary
    while saving for a longer cultural immersion in Oaxaca, Mexico.
  culinary: Charles Broussard experiments in their kitchen with Southern staples such as shrimp and grits and global twists like gochujang‑marinated pork belly, often incorporating fresh herbs like tarragon
    and locally sourced collard greens into their weeknight meals, and they relish sharing the results with friends at casual gatherings.
  core: Charles Broussard is a curiosity‑driven project leader who balances spontaneous art‑centric indulgences with a compassionate, people‑first ethos, yet they often wrestle with self‑imposed deadlines
    and a habit of over‑booking their calendar.
background:
  cultural: Charles grew up in the deep South, raised in a close-knit, middle-class family in Alabama. His upbringing blended traditional Southern hospitality, Christian community values, and a strong sense
    of regional pride with an openness to diverse cultural experiences. While identifying as white, he actively seeks out and appreciates the multifaceted cultural tapestry of Birmingham—its historic roots,
    African-American heritage, and growing artistic movements—informing both his personal outlook and professional collaborations.
attributes:
  skills: '[''Project Planning'', ''Budget Management'', ''Risk Assessment'', ''Stakeholder Communication'', ''Agile & Waterfall Methodologies'', ''Team Facilitation'', ''Conflict Mediation'', ''Process
    Improvement'', ''Creative Problem Solving'', ''Community Engagement'']'
  hobbies: '[''Art Gallery Visits'', ''Live Music & Theater'', ''Photography'', ''Spontaneous Road Trips'', ''Cooking & Culinary Exploration'', ''Community Volunteering'', ''Mentoring Youth'', ''Meditation'']'
  career_goals: Charles aims to transition into a senior leadership role where he can shape large-scale, community-focused initiatives that blend infrastructure development with cultural enrichment. He
    envisions becoming a director of a nonprofit or public-private partnership that leverages his project management expertise to launch arts-based revitalization projects in Birmingham. Long-term, he hopes
    to mentor emerging project managers, champion innovative, flexible work practices, and influence policy that supports harmonious, inclusive community growth.
