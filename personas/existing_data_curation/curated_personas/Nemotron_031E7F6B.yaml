  career_goals: Carl hopes to translate his artistic curiosity and people‑centered strengths into a meaningful career. He plans to enroll in a community college program for arts administration or museum
    studies, aiming to become a community arts coordinator or museum educator in San Diego County. He also dreams of building a modest freelance portfolio of photography and content creation to supplement
    a part‑time role that offers flexible hours, allowing him to maintain his mental‑wellness practices while contributing to local cultural initiatives.
