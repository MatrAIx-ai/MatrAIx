  career_goals: Jennifer is eager to pursue a career that blends scientific curiosity with practical impact. She envisions attending a STEM-focused high school program, later studying biomedical engineering
    or environmental science at a university. Her long‑term ambition is to develop technologies that improve public health or protect ecosystems. In the short term, she aims to win her middle school science
    fair, master Python programming, and secure a volunteer position at a local health clinic. She also hopes to use her communication strengths to create science‑focused videos or articles that make complex
    ideas accessible to peers.
