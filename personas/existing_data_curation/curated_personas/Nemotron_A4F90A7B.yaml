personas:
  professional: Jennifer Angelle, a 13‑year‑old robotics enthusiast, blends their curiosity for new tech with a practical penchant for step‑by‑step problem solving, leading their school's Scratch game‑building
    sessions while reliably meeting project deadlines and confidently asserting ideas during robotic competitions.
  sports: Jennifer Angelle, a midfield star on their middle school soccer team and enthusiastic member of the Santa Susana Youth Soccer Club, roots for Los Angeles FC in the MLS, follows LA Galaxy's matches
    on TV, and spends Saturday mornings hiking the Santa Susana Mountains, where they often challenge themselves with steep trail climbs.
  arts: Jennifer Angelle channels their love for sci‑fi narratives into sketching futuristic characters inspired by Hayao Miyazaki's animation and borrowing storytelling techniques from Ursula K. Le Guin,
    while listening to Billie Eilish's ethereal pop as they write short stories in their journal and experiment with digital illustrations on Procreate.
  travel: Jennifer Angelle satisfies their wanderlust by weekend trips to the Santa Susana Mountains and family outings to Disneyland and Santa Barbara, and they dream of a future backpacking adventure
    through Japan's Kyoto and Tokyo to explore anime museums and cherry‑blossom festivals.
  culinary: Jennifer Angelle balances a love for cheesy margherita pizza and homemade California roll sushi with a budding skill for baking fudgy brownies and blending banana‑strawberry smoothies with almond
    milk and honey, often packing a custom trail‑mix of peanuts, dried cranberries, and dark chocolate chips for their hikes, which they proudly share with fellow clubmates.
  core: Jennifer Angelle, a 13‑year‑old who toggles between building Scratch games and scouting mountain trails, thrives on curiosity tempered by a practical streak, yet they often forget to water their
    houseplants and leave unfinished sketches on their desk.
background:
  cultural: Jennifer grew up in Porter Ranch, an affluent suburban community in Los Angeles County, where her family reflects a typical middle‑class white American upbringing. The environment emphasizes
    education, community involvement, and outdoor recreation, providing her access to well‑maintained parks, libraries, and extracurricular programs. While her family's cultural traditions include celebrating
    holidays such as Thanksgiving, Christmas, and Fourth of July with family gatherings and community events, living in the diverse Southern California region has also exposed her to a variety of cultural
    perspectives. This blend of suburban American values and exposure to multicultural influences shapes her open‑minded yet individually driven outlook.
