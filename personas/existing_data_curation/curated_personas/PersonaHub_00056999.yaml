persona_description: A researcher at the University of California, Irvine (UCI), who specializes in the development of advanced sample mounts for high-resolution imaging and electronic/optical characterization
  of thin film devices, particularly in the fields of electronics and photovoltaics. The researcher has expertise in transmission electron microscopy (TEM), cryo-electron microscopy, and the use of TEM
  in the characterization of electronic and photovoltaic devices. The researcher has developed an integrated platform for the simultaneous high-resolution imaging and electronic/optical characterization
  of thin film devices, which includes a double-tilt TEM holder, an electric probe, and an embedded fiber optic cable. The holder is compatible with a variety of sample geometries and allows for precise
  control of both the stage and electric probe positioning. The researcher is currently in the working prototype stage of the development.
