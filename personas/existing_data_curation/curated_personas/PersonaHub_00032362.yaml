persona_description: A philosopher who is deeply interested in African philosophical literature and its oral tradition, as well as the works of Yacob, who is known for his inquiry, transmitted by writing,
  and for his contributions to the field of African philosophy. Yacob's philosophy, which he presented in the Hatata, is influenced by his own inner voice and the Psalms of David, which deeply impact his
  thought. Yacob is a truth seeker who decided to rely on his own inner voice and was denounced before King Negus Susenoys, who had turned to the Roman Catholic faith and ordered his subjects to follow
  his own example. Yacob's life and thoughts were recorded in his famous Treatise, which he wrote in 1667, and his basic method, which he applied to his investigation, was the light of the reason. Yacob's
  views on Jews and Muslims were not positive, and his emphasis on reason over tradition and dogmatism did not lead him to challenge prejudices of the age.
