personas:
  professional: Eugenio Ruiz is a budding engineer who constructs intricate LEGO models with meticulous planning and a competitive spark, channeling their curiosity and methodical reliability into school
    science fairs and daily problem‑solving tasks.
  sports: Eugenio Ruiz plays forward for the Little Hawks youth soccer club, thrives in small‑sided matches on the neighborhood field, idolizes the regional professional team Thunder FC, and approaches
    each game with a strategic, competitive mindset that mirrors their methodical nature.
  arts: Eugenio Ruiz draws vibrant scenes from traditional folklore, often inspired by the works of celebrated muralist Diego Rivera, immerses themselves in the melodies of folk singer Lila Downs while
    listening with family, and devours adventure comics such as Kazu Kibuishi’s Amulet, weaving these artistic influences into a burgeoning creative identity.
  travel: Eugenio Ruiz prefers well‑planned family trips, relishes weekend visits to the local history museum and the coastal town’s beach, dreams of exploring the ancient pyramids of Teotihuacan and the
    bustling streets of Oaxaca, and hopes to someday see the Eiffel Tower in Paris, all while balancing school schedules and a modest travel budget.
  culinary: Eugenio Ruiz enjoys helping his grandmother prepare simple dishes like corn tortillas, guacamole with fresh cilantro, and sweet churros, delights in the taste of homemade salsa roja, and has
    begun experimenting with adding a pinch of cheese to their own breakfast eggs, showcasing a developing culinary curiosity grounded in family tradition.
  core: Eugenio Ruiz is a methodical LEGO builder and competitive soccer enthusiast who balances a vivid imagination with a cautious, worry‑prone heart, often over‑planning adventures while they quietly
    fear the unknown.
background:
  cultural: Eugenio lives in a Mexican‑American household in San Pablo, California. His family maintains strong ties to Mexican heritage through daily bilingual communication, weekend gatherings that feature
    tamales and pozole, and celebrations of Día de los Muertos and Cinco de Mayo. He learns cultural stories from his grandparents, respects the value of family loyalty, and incorporates Mexican artistic
    motifs into his drawings. While fully immersed in the local community and school culture, his upbringing blends both Mexican traditions and American influences, shaping a bicultural identity.
