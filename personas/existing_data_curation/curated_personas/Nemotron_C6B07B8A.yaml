  career_goals: Looking ahead, Esther aims to transition into a shift‑lead or supervisory position where she can formalize her mentoring role and champion workplace safety initiatives. She is interested
    in earning a basic logistics certification (such as the Certified Logistics Associate) to deepen her technical knowledge and perhaps move toward inventory planning. Financially, she plans to secure
    a stable retirement fund while maintaining a healthy work‑life balance that allows her to continue volunteering in her community. Personal growth goals include learning more about modern warehouse software
    to stay current with industry trends.
