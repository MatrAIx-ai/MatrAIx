  hobbies: '["Vegetable Gardening", "Whole‑Grain Bread Baking", "Reading Historical Fiction", "Knitting", "Walking on Truman Lake Trail", "Volunteer Health Fair Assistance", "Carthage Historical Society
    Involvement", "Community Choir Participation", "Crossword and Jigsaw Puzzles"]'
  career_goals: Sunshine aims to solidify her legacy by establishing a permanent community‑garden partnership that offers hands‑on low‑sugar cooking classes, continuing volunteer nutrition counseling at
    the Jasper County senior center, and writing a monthly column for the local newspaper focused on practical nutrition for older adults. She also seeks a seat on the Jasper County Health Advisory Board
    to help shape policies that promote healthy aging, and she wants to mentor emerging dietitians in Missouri through structured apprenticeship programs.
