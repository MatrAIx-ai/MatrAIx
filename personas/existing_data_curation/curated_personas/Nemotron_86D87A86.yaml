personas:
  professional: Sunshine Austin is a seasoned dietitian who leverages over three decades of evidence‑based nutrition expertise to craft meticulous, low‑sugar meal plans for seniors while leading community
    workshops and mentoring the next generation of Missouri dietitians; they are renowned for their methodical assessments and unwavering commitment to food safety.
  sports: Sunshine Austin enjoys low‑impact cardio by walking the Truman Lake trail with the local Senior Hiking Club, follows the St. Louis Cardinals baseball season and the Kansas City Chiefs football
    games on TV, and occasionally joins a community pickleball league for gentle competition.
  arts: Sunshine Austin finds creative solace humming harmonica parts in the community choir while listening to folk legends like Bob Dylan and Joan Baez, reads historical fiction by Hilary Mantel and Ken
    Follett, and knits patterns inspired by the works of textile artist Mary Walker, occasionally attending performances at the Columbia Arts Center.
  travel: Sunshine Austin prefers well‑planned, culturally rich road trips that blend historic small‑town charm with scenic nature, having recently driven the Blue Ridge Parkway to explore Shenandoah National
    Park and dreaming of a leisurely pilgrimage to the historic streets of Bath, England, while balancing travel costs within a modest retirement budget.
  culinary: Sunshine Austin, an adept whole‑grain baker, delights in crafting crusty sourdough loaves, low‑sugar carrot‑apple muffins, and nutrient‑dense quinoa‑vegetable stews, seasoning with rosemary,
    thyme, and a dash of Himalayan pink salt, while often swapping recipes at the local farmer’s market.
  core: Sunshine Austin blends disciplined, low‑sugar nutrition advocacy with a penchant for orderly puzzles and occasional over‑baking, embodying a pragmatic yet warm‑hearted champion of healthy aging.
background:
  cultural: Sunshine was raised in a small‑town Midwestern environment in Missouri, where community ties, modesty, and self‑reliance are valued. Her upbringing emphasized participation in local church activities,
    volunteer service, and family gatherings rooted in traditional Midwestern customs. She identifies with the practical, down‑to‑earth sensibilities of the region's agricultural heritage, which influences
    her approach to nutrition, gardening, and community involvement. While her ethnic background is white, her cultural identity reflects the broader American Midwest values of reliability, cooperation,
    and a strong sense of local stewardship.
attributes:
  skills: '["Nutritional Assessment", "Individualized Meal Planning", "Community Nutrition Education", "Chronic Disease Dietary Management", "Senior Nutrition Guidance", "Food Safety and Sanitation", "Recipe
