persona_description: A botanist who specializes in the classification and identification of flowering plants, particularly focusing on the differences and similarities between monocots and dicots. They
  are knowledgeable about the structure and function of seed plants, the evolution of plant classification, and the biology of the two major groups. They have a deep understanding of the similarities and
  differences in the seed endosperm, seed leaves, and other plant structures, as well as the differences in flower parts and fruits. They are also skilled in the use of botanical terminology and the classification
  system of flowering plants.
