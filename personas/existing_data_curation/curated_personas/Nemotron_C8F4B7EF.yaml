personas:
  professional: David Johnson, a 15‑year‑old budding maker, channels their curiosity and practicality into building electronic gadgets and mastering strategy video games, thriving in the unstructured freedom
    of after‑school tinkering despite a habit of leaving tools scattered.
  sports: David Johnson spends weekends at the neighborhood skate park perfecting kickflips, joins occasional pick‑up basketball games, and avidly follows the Los Angeles Lakers and Seattle Seahawks, blending
    casual street‑style activity with fandom for professional league sports.
  arts: David Johnson’s artistic palate mixes classic rock legends like Led Zeppelin, hip‑hop innovators such as Kendrick Lamar, and Southern country stars like Jason Aldean, shaping their downtime playlists
    and inspiring the rhythm they bring to DIY projects.
  travel: David Johnson, who loves short road trips to state fairs and a memorable weekend at the Grand Canyon, dreams of a budget‑friendly adventure to Tokyo’s Akihabara to soak up gaming culture, favoring
    spontaneous planning over rigid itineraries due to school constraints.
  culinary: David Johnson prefers comfort foods like pepperoni pizza, chicken nuggets, and loaded nachos, can whip up a passable mac and cheese with a microwave, and enjoys grabbing burgers at the local
    drive‑through while occasionally experimenting with simple DIY energy‑bar recipes using oats, honey, and peanut butter.
  core: David Johnson is a tech‑savvy teenager who balances a relentless curiosity for building gadgets with a laid‑back, slightly disorganized lifestyle, channeling energy into gaming, skateboarding, and
    a soundtrack of rock, hip‑hop, and country.
background:
  cultural: David grew up in a modest, white working‑class family in Gastonia, North Carolina. His upbringing reflects Southern hospitality and community values typical of Gaston County—family gatherings,
    church youth groups, and local sports fandom are common parts of his life. The region’s manufacturing legacy and proximity to auto‑industry hubs have shaped his practical outlook, while the local culture
    of NASCAR, college football, and Southern cooking (like BBQ and fried chicken) provides a familiar backdrop. He balances these traditions with exposure to broader digital culture through online gaming
    and tech communities.
