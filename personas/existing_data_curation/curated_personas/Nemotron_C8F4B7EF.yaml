  career_goals: David aims to turn his practical curiosity into a skilled trade. He wants to earn a high‑school equivalency credential and then enroll in an automotive technology program at a local community
    college or secure an apprenticeship at a Gastonia auto shop. He also dreams of eventually opening a small garage where he can offer repair services and maybe dabble in custom electronics projects for
    friends. While he values hands‑on work, he keeps the door open for further study in engineering if his interests evolve, blending his love for tinkering with a stable, long‑term career path.
