  hobbies: '[''Woodworking'', ''Painting'', ''Art Museum Visits'', ''Reading Art History'', ''Gardening'', ''Birdwatching'', ''Walking Trails'', ''Volunteer Teaching Crafts'', ''Listening to Jazz'', ''Collecting
    Antiques'']'
  career_goals: Although retired, Ashby aims to leave a lasting legacy by mentoring younger artisans in his community, establishing a modest workshop space where he can teach woodworking and basic home‑repair
    skills. He also hopes to compile a memoir that weaves together his personal history with the cultural evolution of Norwood, and to curate a rotating art display at the local senior center that highlights
    works by emerging local artists. Ensuring his wife’s comfort and maintaining financial stability for his grandchildren are also central to his long‑term ambitions.
