  skills: '[''Carpentry'', ''Cabinet Making'', ''Furniture Restoration'', ''Basic Electrical Work'', ''Basic Plumbing'', ''Project Planning'', ''Budget Management'', ''Volunteer Coordination'', ''Art Curation'',
