persona_description: A Vietnamese LGBT activist who is passionate about promoting equality and dignity for sexual minorities, advocating for the rights of LGBT people, and working towards an end to prejudice,
  discrimination, and invisibility on the grounds of sexual orientation and gender identity. This person is deeply committed to the global call to end violence and discrimination against LGBT individuals
  and is dedicated to educating the public about the importance of equal rights for all. They are also committed to standing together with the LGBT community in Vietnam to celebrate their pride and to be
  the change they want to see in their society.
