personas:
  professional: Angelica Lema, a seasoned assembler and fabricator at a Texas plant, blends bilingual communication, MIG welding, blueprint reading, and a relaxed yet decisive leadership style to mentor
    crews, troubleshoot production hiccups, and champion safety while targeting a shift‑supervisor promotion within two years.
  sports: Angelica Lema follows the Houston Astros and Dallas Mavericks passionately, plays pick‑up soccer on Sundays with a community league, practices functional fitness at the local gym, and proudly
    cheers for the Rio Grande Valley Vipers during the spring, reflecting her energetic social nature and love for seasonal team spirit.
  arts: Angelica Lema immerses herself in vibrant cultural expression, leading community mural projects inspired by the work of Diego Rivera, crafting traditional piñatas and papel picado for festivals,
    and finds inspiration in the music of Celia Cruz, Los Tigres del Norte, and contemporary designer Jonathan Adler, while flipping through Print Magazine for fresh ideas.
  travel: Angelica Lema prefers a blend of spontaneous road trips and curated cultural visits, routinely exploring the historic River Walk in San Antonio, the art‑rich neighborhoods of Mexico City, the
    scenic vistas of Big Bend National Park, and dreams of attending the Día de los Muertos celebrations in Oaxaca, balancing family commitments with occasional solo weekend getaways.
  culinary: Angelica Lema delights in cooking bold Tex‑Mex fare, regularly preparing chile rellenos, carne asada tacos with fresh cilantro and tomatillo salsa, simmering homemade mole using poblano peppers
    and chocolate, and she lovingly tends a small herb garden to harvest oregano, cumin, and spicy jalapeños for her dishes.
  core: Angelica Lema mixes a relaxed approach to deadlines with a fierce curiosity, turning spare moments into impromptu art projects while juggling welding manuals, garden herbs, and weekend market stalls.
background:
  cultural: Angelica grew up in Mission, Texas, a border town steeped in a blend of Mexican and American traditions. Bilingual and bicultural, she celebrates holidays like Día de los Muertos and Fiesta
    de la Ciudad, participates in local church gatherings, and maintains strong family ties. The rich tapestry of Hispanic music, cuisine, and folk art in Hidalgo County shapes her worldview, embedding
    a deep respect for community, perseverance, and creative expression in both her personal and professional life.
attributes:
  skills: '[''assembly line operation'', ''basic MIG welding'', ''hand and power tools proficiency'', ''blueprint and schematic reading'', ''quality control inspection'', ''troubleshooting and repair'',
    ''inventory management'', ''workplace safety compliance'', ''bilingual communication (Spanish/English)'', ''team collaboration'', ''on-the-fly problem solving'', ''leadership and training of new hires'']'
  hobbies: '[''community mural painting'', ''handcrafting traditional Mexican crafts (piñatas, papel picado)'', ''Latin dance (cumbia, salsa)'', ''attending local festivals and cultural events'', ''exploring
    Tex-Mex cuisine'', ''reading art and design magazines'', ''gardening'']'
  career_goals: Angelica aims to move into a shift‑supervisor role within the next two years, leveraging her experience and natural leadership to streamline workflow and mentor newer workers. She plans
    to earn a forklift certification and complete her GED, followed by a short technical certificate in CNC machining to broaden her expertise. Long‑term, she dreams of opening a small workshop where she
    can blend her fabrication skills with her love for art, creating custom furniture and handcrafted décor that reflect her Hispanic heritage and contemporary design ideas.
