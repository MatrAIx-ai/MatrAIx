persona_description: A geologist who is interested in the study of river erosion and the formation of waterfalls. They are particularly interested in the Lower Ordovician slates and their relationship to
  the River Twiss and the formation of Pecca Falls. They are knowledgeable about the steep angle of dip in the slates and the resulting series of steps and pools developed in the softer slates. They are
  also interested in the physical and chemical processes that contribute to the formation of waterfalls and the role of these falls in the local ecosystem.
