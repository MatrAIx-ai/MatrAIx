  career_goals: Margaret aims to advance from first‑line supervisor to store manager within the next two years, leveraging her analytical skill set to improve store profitability and employee satisfaction.
    She plans to pursue an MBA focused on operations management while gaining experience in e‑commerce integration. In the longer term, she aspires to become a regional operations manager or retail business
    analyst for a technology‑focused retailer, where she can drive data‑centric strategies and mentor diverse teams. She also hopes to develop a mentorship program that supports entry‑level employees, especially
    those from underrepresented backgrounds, fostering a collaborative and inclusive workplace culture.
