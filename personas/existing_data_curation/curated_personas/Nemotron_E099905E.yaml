personas:
  professional: Samir Cruz is a casino surveillance officer who expertly operates Genetec and Axis systems, produces meticulous incident reports, and leverages their organized, methodical nature and sociable
    demeanor to de‑escalate conflicts and train new guards, all while channeling a curiosity for emerging AI monitoring tools into daily operations.
  sports: Samir Cruz plays midfield for the Queens United Soccer Club, participates in the neighborhood 5‑a‑side league every Saturday, follows the New York Knicks and New York City FC closely, and complements
    team sport with regular strength training at the Astoria gym, balancing competitive play with community camaraderie.
  arts: Samir Cruz is an avid street photographer who captures the vibrant murals of Queens, frequents the Queens Museum and local galleries, draws inspiration from artists like Banksy, Basquiat, and Frida
    Kahlo, and expresses creativity through salsa dancing and weekend workshops blending visual art with safety education.
  travel: Samir Cruz prefers meticulously planned weekend getaways to the Hudson Valley’s wineries, dreams of a cultural immersion tour of Barcelona during La Mercè festival, and balances a love for both
    urban festivals and nature hikes with limited vacation days and a modest travel budget.
  culinary: Samir Cruz enjoys cooking ceviche with fresh ají amarillo and lime, perfects llapingachos topped with cheese, experiments with cumin and cilantro in fusion dishes, and showcases a moderate cooking
    skill level that shines during family gatherings and casual dinner parties with friends.
  core: Samir Cruz merges a methodical security career with a vibrant love for street art, spicy home‑cooked meals, and community service, navigating stress through yoga while chasing ambitious professional
    certifications.
background:
  cultural: Samir was raised in a bilingual household by Ecuadorian parents who emigrated from Quito. Spanish is spoken at home, and he celebrates traditional holidays such as Día de los Difuntos and Carnaval
    with family gatherings and traditional dishes. While maintaining these roots, he has been shaped by the multicultural environment of South Richmond Hill, where he interacts with neighbors from a wide
    range of backgrounds. This blend of Ecuadorian heritage and Queens’ diversity informs his appreciation for varied artistic expressions, his commitment to community service, and his ability to navigate
    both Spanish‑speaking and English‑speaking contexts with ease.
attributes:
  skills: '[''CCTV operation and monitoring'', ''Threat assessment and risk analysis'', ''Incident reporting and documentation'', ''Conflict de-escalation and negotiation'', ''Physical security patrols
