  hobbies: '[''Photography'', ''Visiting art galleries and street murals'', ''Cooking Ecuadorian cuisine'', ''Playing soccer in community leagues'', ''Salsa dancing'', ''Yoga and meditation for stress management'',
    ''Reading crime fiction and security podcasts'', ''Listening to technology and investigative podcasts'', ''Volunteering in community safety programs'', ''Hiking in local parks such as Forest Park'']'
  career_goals: Samir aims to move from a frontline guard to a supervisory position within the casino security department. He plans to earn the Certified Protection Professional (CPP) credential and a specialized
    Certified Surveillance Officer certification, and to complete an associate degree in criminal justice. Over the next five years he hopes to lead a team of surveillance officers, design training programs
    that incorporate the latest AI‑driven monitoring tools, and eventually transition into a security consulting role for gambling venues. Parallel to his professional path, he wants to deepen his knowledge
    of risk management and possibly start a weekend community art workshop that blends his passion for visual arts with safety education.
