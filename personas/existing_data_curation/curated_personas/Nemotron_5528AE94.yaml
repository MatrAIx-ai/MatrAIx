  hobbies: '[''visiting art galleries'', ''sketching'', ''photography'', ''hiking'', ''biking the Bay Trail'', ''cooking diverse cuisines'', ''attending live music shows'', ''volunteering at community garden'',
    ''DIY upcycling projects'', ''participating in art workshops'']'
  career_goals: Patricia aims to advance from a laborer to a supervisory or logistics coordinator role within the next five years. She plans to leverage her some-college coursework in business and logistics
    to earn a certification in supply chain management. Long-term, she hopes to specialize in art logistics, helping galleries and museums transport works safely, and eventually start her own boutique moving
    service that emphasizes eco-friendly practices and community mentorship.
