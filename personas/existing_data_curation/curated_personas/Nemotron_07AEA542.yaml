  hobbies: '[''Abstract Painting'', ''Mixed Media Art'', ''Creative Writing (Poetry & Short Stories)'', ''Reading Science Fiction & Fantasy'', ''Jazz Music Appreciation'', ''Community Gardening'', ''Cooking
    & Exploring New Cuisines'', ''Walking in Natural Settings'', ''Senior Dance Classes'', ''Volunteer STEM Outreach'']'
  career_goals: Rosa's current ambitions focus on lifelong learning, community impact, and creative expression. She aims to master digital photography and expand her mixed-media techniques, culminating
    in a traveling exhibition that fuses art and scientific concepts. She plans to author a memoir that intertwines her experiences as a Black woman in STEM with her artistic journey, and to develop a mentorship
    program for under-represented youth in the DeKalb County school system. Additionally, she hopes to continue volunteering at local senior centers, lead interdisciplinary workshops, and travel to national
    art and science festivals.
