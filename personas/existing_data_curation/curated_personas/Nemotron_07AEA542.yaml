personas:
  professional: Rosa Bickham, a veteran environmental researcher with a graduate degree in STEM, channels analytical expertise and a love for abstract art into interdisciplinary workshops that fuse data
    visualization, digital illustration, and community mentorship, embodying a career that bridges science and creativity, and they thrive on collaborative learning.
  sports: Rosa Bickham, an avid walker and senior dance enthusiast, joins the Stone Mountain Trail Walkers club for year‑round hikes, supports the Atlanta Hawks and Atlanta Falcons as a dedicated fan, and
    spends cool evenings cheering on Atlanta United FC, while they also participate in a local Silver Sneakers program that blends low‑impact cardio and balance exercises.
  arts: Rosa Bickham, whose evenings are filled with vibrant abstract canvases inspired by Jackson Pollock and Georgia O'Keeffe, a love for jazz legends like Miles Davis and Wynton Marsalis, and regular
    visits to the Atlanta Shakespeare Company’s productions, channels their poetic voice into short stories that echo the speculative worlds of Ursula Le Guin and Neil Gaiman.
  travel: Rosa Bickham, a purposeful yet flexible traveler, has trekked the Blue Ridge Mountains and toured Stone Mountain Park, attended the annual Atlanta Dogwood Festival and the MoMA’s contemporary
    art exhibition in New York, and dreams of exploring the Louvre in Paris and the Miraikan museum in Tokyo while they carefully balance their modest retirement budget with occasional splurges on science
    festivals like Ars Electronica in Austria.
  culinary: Rosa Bickham, an adventurous home chef, whips up their signature shrimp‑and‑grits seasoned with smoked paprika, experiments with Thai green curry featuring roasted sweet potatoes and fresh lemongrass,
    and perfects a lemon‑blueberry cheesecake, all while favoring ingredients like heirloom tomatoes, fresh basil, and a pinch of saffron to add color and depth to meals.
  core: Rosa Bickham, a free‑spirited septuagenarian who blends scientific rigor with abstract art, wanders through jazz clubs, forgets to water their garden on rainy days, and habitually misplaces their
    glasses on the canvas, yet they always find a way to turn chaos into creativity.
background:
  cultural: Rosa was born and raised in Lithonia, Georgia, a suburb of Atlanta with a strong African-American community. Growing up during the civil-rights era, she witnessed the transformation of the South
    and the rise of Black empowerment movements, which instilled in her a deep sense of resilience and pride. Her family's traditions blend Southern hospitality, soulful church music, and a love of storytelling,
    all of which have shaped her expressive personality. As a Black woman who pursued a graduate degree in STEM, she has navigated both gender and racial barriers, informing her commitment to mentor younger
    generations. She remains connected to her cultural roots through participation in local church events, community festivals celebrating African-American heritage, and intergenerational gatherings that
    honor family history.
attributes:
  skills: '[''Data Analysis'', ''Scientific Research'', ''Environmental Science'', ''Computer Literacy'', ''Python Programming'', ''Public Speaking'', ''Community Workshop Facilitation'', ''Visual Arts
