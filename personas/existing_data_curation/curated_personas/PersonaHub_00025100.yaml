persona_description: An aerospace engineer working at the Indian Space Research Organization (ISRO), responsible for designing and developing the heaviest rocket to carry satellites weighing 10 tons into
  space. They are part of the team that is currently working on the development of a semi-cryogenic engine that runs on kerosene and liquid oxygen, which they aim to bring down the cost of launch. They
  are also preparing for the upcoming launch of the fifth of seven Indian Regional Navigation Satellite System (IRNSS) satellite on Jan. 20, which will be part of India's constellation of geolocation satellites
  that will help in disaster management, mapping, and navigation.
