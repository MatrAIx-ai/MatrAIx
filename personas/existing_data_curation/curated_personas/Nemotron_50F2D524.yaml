    ''Eco-friendly paint application'', ''Project planning and workflow management'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museums'', ''Reading historical fiction'', ''Restoring vintage motorcycles'', ''Gardening'', ''Volunteer teaching basic automotive maintenance'',
    ''Birdwatching'', ''Knitting'', ''Puzzle solving (jigsaw, crosswords)'', ''Cooking experimental recipes'']'
  career_goals: Maryann aims to transform her shop into a benchmark for quality and innovation in central Pennsylvania, earning certifications from major OEMs and the Society of Collision Repair Specialists.
    She plans to integrate advanced composite-repair techniques and environmentally friendly paint processes, positioning the business as a leader in sustainable auto body work. Long-term, she hopes to
    author a guide on artistic automotive painting, develop a scholarship for women entering the trade, and teach part-time at the local community college.
