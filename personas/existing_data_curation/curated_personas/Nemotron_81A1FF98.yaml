personas:
  professional: Rodolfo Garcia is a methodical computer support specialist who leverages their strong communication and empathetic conflict‑resolution skills to write crystal‑clear knowledge‑base articles,
    automate routine tasks with PowerShell and Bash, keep ServiceNow tickets meticulously organized under ITIL best practices, mentor new hires, and pursue senior support engineer and boutique consultancy
    ambitions.
  sports: Rodolfo Garcia anchors the midfield in a local Austin community soccer league, fervently supports Austin FC during MLS season, and joins a weekend hiking club that tackles the Texas Hill Country
    trails around Fredericksburg, balancing high‑energy team sport with solitary nature workouts.
  arts: Rodolfo Garcia immerses themselves in Austin’s vibrant live‑music scene, frequently catching Latin‑infused sets by Silvana Estrada, indie rock shows featuring Tame Impala, and occasional poetry
    slams at the Elephant Room, while also indulging in sci‑fi podcasts and collecting vintage comic art to recharge their sociable spirit after demanding tech days.
  travel: Rodolfo Garcia prefers weekend getaways that blend adventure and relaxation, such as hiking the Enchanted Rock loops in Texas Hill Country, exploring San Antonio’s River Walk, dreaming of a cultural
    immersion trip to Cusco to trace ancient roots, and scheduling trips around their work calendar to avoid ticket‑spike periods.
  culinary: Rodolfo Garcia loves perfecting traditional dishes like ceviche with fresh lime, ají amarillo, and cilantro, lomo saltado sizzling with beef, onion, tomato, and soy sauce, and causa layered
    with avocado and tuna, often hosting potluck nights for friends while experimenting with artisanal coffee beans from local roasters such as Summer Moon.
  core: Rodolfo Garcia is a structured, socially energized tech professional who balances meticulous work habits with a love for soccer, spicy cuisine, and constant self‑improvement, yet wrestles with anxiety
    that fuels both their ambition and occasional over‑commitment.
background:
  cultural: Rodolfo was raised in a bilingual household in Texas, the son of Peruvian immigrants who moved from Lima to the United States. At home, Spanish is spoken daily, and family gatherings feature
    traditional music, dances, and dishes that keep his heritage alive. He celebrates Peruvian holidays such as Inti Raymi and Día de la Canción, and participates in Austin’s annual PerúFest, where he volunteers
    to showcase Peruvian culture. While deeply connected to his roots, Rodolfo also embraces Texan customs—enjoying barbecue, attending county fairs, and supporting his local community. This blend of Peruvian
    and Texan influences shapes his worldview, culinary tastes, and social interactions, giving him a multicultural perspective that he often shares with friends and colleagues.
attributes:
  skills: '["Hardware diagnostics", "Software installation & configuration", "Operating system support (Windows, macOS, Linux)", "Network connectivity troubleshooting", "VPN setup and management", "Remote
    desktop assistance (TeamViewer, AnyDesk)", "Ticketing system management (ServiceNow)", "Technical documentation and knowledge‑base creation", "Customer communication and conflict resolution", "Scripting
    and automation (PowerShell, Bash)", "ITIL Service Management practices", "CompTIA A+ and Network+ certifications", "Microsoft Modern Desktop Administrator certification"]'
  hobbies: '["Community soccer league", "Cooking Peruvian cuisine", "Hiking in Texas Hill Country", "Attending live music concerts (Latin & indie)", "Online multiplayer gaming (League of Legends)", "Tech
    meetups and networking events", "Volunteer coding workshops for youth", "Reading science‑fiction literature", "Exploring coffee shops", "Yoga and mindfulness practice"]'
  career_goals: Rodolfo aims to move from a Tier‑1 support role to a Tier‑2 and eventually senior support engineer position within the next three years, gaining deeper exposure to systems administration
    and network engineering. He plans to obtain ITIL Foundation, Cisco CCNA, and PMP certifications to broaden his managerial qualifications. His medium‑term goal is to become a Service Desk Manager, leading
    a team of technicians while instituting process improvements that reduce ticket resolution times and improve user satisfaction. Long‑term, Rodolfo envisions launching his own boutique IT consultancy
    that provides proactive support and cybersecurity basics to small businesses in the Austin–Pflugerville area, allowing him to combine his technical expertise with his passion for mentoring and community
    outreach. Throughout his career progression, he seeks a work environment that offers clear structure and predictable workflows to help manage his stress‑prone nature.
