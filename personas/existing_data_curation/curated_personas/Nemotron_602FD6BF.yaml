  career_goals: Kaiko’s primary ambition is to leave a lasting legacy that intertwines her business acumen with the artistic spirit of New Orleans. She aims to compile an oral‑history anthology of elder
    Black residents, preserving stories of resilience, music, and cuisine for future generations. Simultaneously, she plans to mentor a cohort of young Black entrepreneurs through a structured apprenticeship
    program that blends practical business training with creative thinking. Kaiko also envisions curating a traveling pop‑up exhibition that showcases abstract works by local seniors, fostering intergenerational
    dialogue. Finally, she hopes to establish a modest scholarship fund to support students pursuing studies in cultural entrepreneurship, ensuring that her compassion and self‑interest are balanced by
    tangible community investment.
