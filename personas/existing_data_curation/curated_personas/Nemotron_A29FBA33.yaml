  career_goals: Although currently not in the formal workforce, Douglas aims to leverage his creative and interpersonal strengths to re‑enter the labor market in a flexible, part‑time capacity. He envisions
    building a freelance photography business focused on local events, beach portrait sessions, and community art projects, while also volunteering to teach basic photography and art appreciation at the
    Pompano Beach community center. He hopes to eventually secure a position as a program coordinator for a regional arts nonprofit, where he can blend his love of art, his spontaneous organizational style,
    and his skill at fostering collaboration. To support these ambitions, he plans to enroll in a short‑term certificate program in visual arts and digital media, and to expand his portfolio through regular
    exhibitions at local cafés and pop‑up galleries.
