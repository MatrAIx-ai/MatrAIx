  hobbies: '[''Cooking Mexican cuisine'',''Gardening'',''Hiking the Oregon trails'',''Reading historical novels'',''Practicing yoga'',''Volunteering at cultural festivals'',''Organizing community events'']'
  career_goals: Caridad aims to earn the SHRM‑CP certification within the next year and move into an HR manager role at a midsized organization where she can design inclusive policies and employee wellness
    programs. She also hopes to mentor junior HR staff and later develop a community outreach program that supports immigrant workers in the Salem area, aligning her professional growth with her cultural
    roots and desire for meaningful impact.
