  hobbies: '[''Sketching (watercolor)'', ''Visiting art galleries'', ''Reading scientific and health‑tech journals'', ''Hiking'', ''Fishing'', ''Cycling'', ''Playing acoustic guitar'', ''Volunteering at
    health fairs'', ''Meditation'']'
  career_goals: Larry aims to secure full licensure as a Doctor of Chiropractic by completing any remaining accreditation requirements and earning a high‑school equivalency credential. He plans to open
    his own boutique chiropractic practice in State Center, integrating holistic services such as yoga, mindfulness, and community‑based art therapy. Over the next five years, he hopes to obtain a sports‑chiropractic
    certification, become a recognized health advocate in Story County, and develop outreach programs that combine physical wellness with creative expression for schools and senior centers. His organized
    nature drives him to implement efficient practice management systems, while his curiosity fuels a commitment to lifelong learning and evidence‑based care.
