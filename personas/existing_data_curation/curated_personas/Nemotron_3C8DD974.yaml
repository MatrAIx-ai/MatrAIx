personas:
  professional: Larry Speaks, a 23-year-old aspiring chiropractor, blends meticulous musculoskeletal assessment and manual spinal manipulation with a painterly eye for clinic aesthetics, resulting in a
    practice that feels both scientifically rigorous and soothingly artistic.
  sports: Larry Speaks cycles with the Story County Gravel Club, hikes the Loess Hills in the spring, and roots for the Iowa Hawkeyes football team, while also participating in a weekend intramural soccer
    league that satisfies their love for seasonal, community-oriented fitness.
  arts: Larry Speaks sketches watercolor landscapes inspired by Grant Wood and Claude Monet, performs acoustic guitar covers of Bob Dylan and Neil Young at local open-mic nights, and volunteers at the Des
    Moines Art Center's youth workshops, letting the works of Van Gogh and contemporary Iowa artists shape their creative identity.
  travel: Larry Speaks prefers low-key road trips to Cedar Rapids and the Nebraska sand dunes, dreams of a Kyoto spring pilgrimage to photograph cherry-blossom temples, and plans future hikes in New Zealand’s
    Fiordland, balancing careful budgeting with an adventurous ear for off-beat destinations.
  culinary: Larry Speaks enjoys cooking farm-fresh corn chowder and grilled trout with thyme and lemon, has an intermediate skill level with a cast-iron skillet, and delights in savoring a well-crafted
    cheese-and-apple tart while occasionally indulging in an over-spiced buffalo wing challenge at the local bar.
  core: Larry Speaks is a detail-oriented chiropractic student who merges a love for art with community health, yet can’t resist late-night gaming marathons and the occasional impulse purchase of obscure
    art supplies.
background:
  cultural: Larry was raised in a modest, white, Midwestern family in rural Iowa, where community ties, hard work, and self‑reliance are core values. His upbringing on a family farm instilled an appreciation
    for land, nature, and seasonal rhythms. The local church and school events fostered a sense of collective responsibility and cooperation, while the region's modest arts initiatives sparked his early
    interest in visual art. Growing up in Story County exposed him to a blend of agricultural heritage and small‑town cultural life, shaping a worldview that balances traditional Midwestern pragmatism with
    an openness to unconventional ideas and creative expression.
attributes:
  skills: '[''Spinal manipulation'', ''Musculoskeletal assessment'', ''Patient education and communication'', ''Clinic administration'', ''Insurance billing'', ''Health informatics'', ''Continuing education
