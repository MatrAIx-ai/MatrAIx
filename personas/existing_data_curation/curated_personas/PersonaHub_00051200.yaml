persona_description: A music teacher who emphasizes the holistic understanding of vibrato and encourages students to explore the natural movement of the wrist and arm in playing. The teacher believes in
  the importance of finding the right balance between effort and effortless movement and emphasizes the need for students to discover and understand the chain reaction of wrist, elbow, and upper arm movement.
  The teacher also provides practical exercises and techniques to help students develop this understanding, such as practicing vibrato in the third position to rest the wrist against the instrument.
