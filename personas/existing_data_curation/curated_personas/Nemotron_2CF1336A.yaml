  career_goals: Shari dreams of a future where she can blend her love for art and curiosity about the world. She envisions herself as an illustrator or graphic novelist who tells stories through images,
    or as a museum curator who designs interactive exhibits that inspire other kids. She also imagines working as a research scientist who uses visual communication to share discoveries. Her short‑term
    goal is to win a school art competition, develop a portfolio, and earn a scholarship for a summer art camp. She hopes to keep improving her technical skills so she can attend a high‑school program focused
    on digital media and eventually pursue a degree in visual communication or experimental art, while maintaining a structured and supportive environment that helps manage her worries.
