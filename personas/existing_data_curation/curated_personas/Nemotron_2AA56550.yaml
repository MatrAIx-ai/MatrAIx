  hobbies: '[''Gardening'', ''Birdwatching'', ''Local History Research'', ''Genealogy'', ''Woodworking'', ''Classic Car Restoration'', ''Small-Group Book Club'', ''Volunteer Mentoring for Youth Entrepreneurs'',
    ''Nature Walks'', ''Reading Non-Fiction'']'
  career_goals: As he approaches the later stage of his career, Charles aims to transition into a senior advisory role where he can shape the organization’s long‑term strategy and mentor emerging leaders.
    He wants to spearhead a succession‑planning initiative to ensure a smooth leadership transition, expand the company's corporate social responsibility programs, and eventually serve on the board of a
    local nonprofit focused on community development. He also hopes to share his accumulated knowledge by consulting for small businesses in Campbell County, helping them adopt sustainable and efficient
    practices.
