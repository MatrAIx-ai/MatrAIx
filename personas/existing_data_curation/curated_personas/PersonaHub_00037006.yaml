persona_description: A researcher studying the relationship between video games and attention deficit hyperactivity disorder (ADHD) in adolescents. This researcher is interested in the impact of excessive
  video game use on academic and social functioning, and the potential negative effects on scholastic performance. They are particularly interested in identifying the specific components of the Conners'
  Parent Rating Scale (CPRS) that are associated with video game use and its effects on ADHD symptoms.
