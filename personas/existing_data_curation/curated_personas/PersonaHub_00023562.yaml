persona_description: A historian interested in the history of the Western Ghats and its impact on the region, particularly in the context of natural disasters such as the Salaulim flood. This person is
  fascinated by the story of the village of Curdi, its decline, and its eventual return to the surface every year in May. They are curious about the history of the Salaulim river and its role in shaping
  the village, and the state's first dam, which submerged the village. They are also interested in the socio-economic changes that occurred in the village and the cultural impact it had on the surrounding
  area.
