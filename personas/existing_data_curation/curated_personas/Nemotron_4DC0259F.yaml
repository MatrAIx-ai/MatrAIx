  career_goals: Harriett aims to transition from day‑to‑day management to a mentorship and consultancy role, leveraging her decades of experience to coach emerging sales leaders in the Arkansas Delta and
    beyond. She plans to launch a part‑time sales consultancy that helps small‑to‑mid‑size regional businesses adopt data‑driven sales strategies, while also writing a guidebook on balancing curiosity with
    pragmatic sales tactics. Although she looks forward to a phased retirement, she remains determined to leave a measurable uplift in her current company's market share and to be recognized as a champion
    of ethical, high‑performance sales culture.
