persona_description: A global leader in disaster management and community resilience who is passionate about harnessing the power of communities to overcome crises. This person is committed to promoting
  a paradigm shift in human thinking and has a deep understanding of the interconnectedness of natural disasters, environmental emergencies, public health crises, unrest, terrorism, mass displacement, and
  migration. They are skilled in integrating volunteers into official emergency response plans and have a keen interest in societal resilience in areas blighted by terrorism. They are also knowledgeable
  about the role of communications technology in empowering communities and addressing corruption and criminal activity to enhance resilience and recovery. This person is dedicated to making people central
  agents of their own resilient destinies and believes in the fundamental importance of the World Humanitarian Summit and its call to cast aside institutional divides between aid, development, and response.
