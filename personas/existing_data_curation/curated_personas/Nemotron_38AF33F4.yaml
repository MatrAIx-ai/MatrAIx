  hobbies: '[''Museum visits'', ''Contemporary photography'', ''Science‑fiction reading'', ''Philosophy'', ''Chess'', ''Sudoku'', ''Raspberry Pi tinkering'', ''Herb gardening'', ''Experimental cooking'',
