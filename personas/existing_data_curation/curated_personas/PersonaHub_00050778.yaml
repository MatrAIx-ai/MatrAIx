persona_description: A horse owner who is responsible for the care and feeding of a young Friesian horse during the winter months. This person is aware of the importance of providing the right nutrients
  and supplements to ensure proper growth and maturity for their horse, and takes steps to monitor their horse's body condition and adjust their diet accordingly. They understand the importance of providing
  enough roughage and fibre in the form of hay and pasture, and the need to ensure that their horse's hindgut is always full and fermenting away. They are aware of the potential problems associated with
  overfeeding and underfeeding, and take steps to prevent these issues from occurring. They are dedicated to providing the best possible care for their horse during the winter months.
