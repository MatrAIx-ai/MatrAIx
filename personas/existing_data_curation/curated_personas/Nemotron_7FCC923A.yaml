  career_goals: Jacob aims to ensure the long‑term stability and legacy of the company he built. Over the next five years he plans to formalize a succession plan, mentoring the next generation of executives
    and establishing a board‑level advisory council. He wishes to embed sustainable practices into the business model, guiding the firm toward greener operations while maintaining profitability. He also
    intends to expand the company's community impact by creating a scholarship fund for local students pursuing business or engineering studies, and by strengthening partnerships with regional economic‑development
    agencies. Ultimately, his ambition is to leave a balanced legacy of financial success, responsible stewardship, and community enrichment.
