persona_description: A health expert who monitors and analyzes public health data, particularly focusing on COVID-19 trends and its impact on Australia and other countries. They are interested in understanding
  the long-term effects of COVID-19, including the prevalence of long COVID and its symptoms, and the potential risk factors associated with emerging zoonotic coronaviruses. They are also interested in
  the role of the nose and saliva in fighting off COVID-19 strains and the potential differences in their effectiveness.
