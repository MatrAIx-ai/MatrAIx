  hobbies: '[''basketball'', ''playing guitar'', ''team-based video games'', ''volunteering at local food bank'', ''model kit building'', ''hiking'', ''watching NFL games'']'
  career_goals: Richard plans to earn his GED within the next year and then pursue an associate degree in criminal justice or public safety at a community college. His long-term ambition is to become a
    police officer or community safety officer, where he can apply his reliable, methodical nature and his desire to help others. He also hopes to take on mentorship roles for at-risk youth and eventually
    move into a supervisory position within law enforcement.
