  hobbies: '[''Driving for pleasure (road trips)'', ''Car maintenance and DIY repairs'', ''Listening to regional Mexican music'', ''Fishing in Lake Mead'', ''Cooking traditional Mexican dishes'', ''Watching
    classic movies'', ''Reading historical biographies'', ''Exploring desert hiking trails'', ''Attending small local cultural events'', ''Collecting model trucks'']'
  career_goals: Enrique aims to transition from employee driver to owner‑operator of a small fleet focused on reliable last‑mile delivery in the Las Vegas area. He plans to obtain a Commercial Driver’s
    License with a hazardous‑materials endorsement and secure a business license within two years. By building a reputation for punctual, courteous service, he hopes to secure contracts with local restaurants
    and supply companies, especially those serving the Latino community. Parallel to entrepreneurship, he wants to develop leadership skills to mentor new drivers, using his competitive drive to foster
    a disciplined, safety‑first culture.
