personas:
  professional: Justin Brown is an aspiring game developer who mixes Scratch coding, LEGO building, and strategic gaming with the competitive drive learned on the basketball court, but they often let their
    spontaneous nature cause missed deadlines and messy project files.
  sports: Justin Brown spikes the ball for the South Hill Youth Basketball League, chants the Washington Wizards highlights during games and dreams of joining the Virginia Tech Hokies mascot squad, yet
    their spontaneous nature leads them to occasionally skip practice in favor of building LEGO towers, and they maintain a competitive but sometimes inconsistent approach to fitness.
  arts: Justin Brown sketches original comic strips inspired by Spider-Man and Adventure Time, devours graphic novels by Frank Miller, spins Hip-Hop beats from Kendrick Lamar and R&B melodies of Beyoncé
    while coding in Scratch, and they idolize Maya Angelou's spoken-word performances for the way they blend rhythm with storytelling.
  travel: Justin Brown prefers spontaneous weekend getaways—like the family’s annual hike through Kingsville Forest and a sunny day at Virginia Beach—while dreaming of a future trip to New York City’s Times
    Square and the historic sites of Washington, D.C., though they rely on school field trips and parents' planning rather than independent travel itineraries because of a modest allowance.
  culinary: Justin Brown gravitates toward crispy fried chicken, buttery collard greens, and sweet-potato pie at family gatherings, enjoys crafting homemade pizza with extra mozzarella and pepperoni, proudly
    messes up the perfect ratio when making mac & cheese but treats each kitchen experiment as a new LEGO build, and they secretly hoard garlic powder and smoked paprika for the next snack creation.
  core: Justin Brown is an 11-year-old tech tinkerer whose competitive fire drives basketball and game-development, while a spontaneous streak and occasional skepticism turn organization into a chaotic
    playground of missed deadlines and impulsive snack raids, and they often juggle projects with the energy of a video-game character.
background:
  cultural: Justin is part of an African‑American family rooted in South Hill, Virginia. His household maintains traditions from the Black community, such as attending a historically Black church where
    gospel music and community service are emphasized. Family gatherings often feature soul‑food dishes like fried chicken, collard greens, and sweet potato pie, reflecting cultural heritage. He has participated
    in local Juneteenth celebrations and school programs that teach the history of African‑Americans in the region, fostering a strong sense of pride and identity. His parents stress the importance of education,
    resilience, and giving back, encouraging him to become a positive role model for younger kids in the neighborhood.
attributes:
  skills: '[''Mathematics (multiplication, fractions)'', ''Reading comprehension'', ''LEGO building and basic robotics'', ''Scratch programming'', ''Basketball'', ''Strategic video gaming'']'
  hobbies: '[''Basketball'', ''Video gaming (Minecraft, Fortnite)'', ''LEGO construction'', ''Scratch coding'', ''Reading adventure novels'', ''Hip‑hop and R&B music'', ''Drawing comic strips'', ''Nature
    walks'']'
  career_goals: Justin dreams of a future where he can blend his love for technology and sports. He aspires to become a software developer who designs educational video games that make science fun for kids,
    while also pursuing a path that could lead to a basketball scholarship and possibly a professional athletic career. He hopes to attend a strong high school, earn a college degree in computer science
    or engineering, and later give back to his community by mentoring younger students and creating tech programs in local schools.
