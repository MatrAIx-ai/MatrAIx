personas:
  professional: Herminio Chica, a retired handyman and neighborhood advisor, leverages their practical carpentry and budgeting skills to volunteer at the senior center—teaching cooking classes and mediating
    informal disputes—while navigating a spontaneous dislike for rigid schedules alongside a strong preference for familiar routines.
  sports: Herminio Chica follows the Miami Heat and the Orlando Magic in basketball, roots for the Miami Marlins in baseball, never misses a televised match of Club América, and balances these viewings
    with weekly domino sessions at the community center as their primary form of social sport.
  arts: Herminio Chica finds solace in the melodies of Celia Cruz, the timeless boleros of Armando Manzanero, and the vibrant films of Pedro Almodóvar, often sharing these cultural touchstones during family
    gatherings and community festivals, and they cherish how the music and cinema echo the stories of their past.
  travel: Herminio Chica prefers low‑key road trips with a printed itinerary, enjoys revisiting the historic streets of Havana and the beaches of Key West, and dreams of a leisurely cruise to Barcelona,
    though anxiety sometimes limits spontaneous travel plans, and they often double‑check reservations before setting off.
  culinary: Herminio Chica, an accomplished home cook, delights in preparing ropa vieja, arroz con pollo, and picadillo with freshly harvested cilantro and bell peppers, often seasoning with cumin and garlic,
    while occasionally over‑indulging in late‑night coffee and sweet empanadas, and they take pride in passing recipes to younger relatives.
  core: Herminio Chica is a routine‑loving yet whimsically spontaneous 66‑year‑old who finds comfort in dominoes, family recipes, and community stories, but battles daily waves of anxiety that sometimes
    derail their otherwise steady rhythm.
background:
  cultural: Herminio's identity is deeply rooted in Cuban culture, shaped by his upbringing in a Cuban immigrant family that settled in Hialeah, Florida—a hub for the Cuban diaspora. He grew up speaking
    Spanish at home, celebrating Cuban holidays such as Carnaval, and observing Catholic traditions that still guide his values. The community's emphasis on family loyalty, respect for elders, and the preservation
    of culinary and musical traditions has guided his daily life. While he has adapted to life in the United States, his routines—cooking family dishes, listening to Cuban radio, and attending local cultural
    events—reflect a blend of nostalgia for his homeland and active participation in the vibrant Cuban‑American community of Broward County.
attributes:
