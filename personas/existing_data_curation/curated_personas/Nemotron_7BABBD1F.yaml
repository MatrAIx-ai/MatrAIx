  hobbies: '["Cooking traditional Cuban meals", "Playing dominoes with neighbors", "Walking in local parks and garden care", "Listening to Cuban music and radio", "Watching soccer matches on Spanish channels",
    "Attending church services", "Participating in community festivals", "Storytelling and sharing personal history", "Reading family photographs and letters"]'
  career_goals: Although retired from formal employment, Herminio aims to remain an active pillar of his community. He aspires to volunteer regularly at the local senior center, teaching cooking classes
    that showcase Cuban cuisine. He hopes to become a mentor for younger Cuban-Americans, guiding them in preserving cultural traditions while navigating life in the United States. He also wishes to improve
    his English proficiency to better assist non‑Spanish‑speaking neighbors. Beyond community service, his personal ambition is to maintain a stable routine that reduces his anxiety, allowing him to enjoy
    his daily life with less emotional distress.
