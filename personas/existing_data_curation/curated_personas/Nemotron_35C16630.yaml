personas:
  professional: A budding illustrator named Anh Chuong, who blends watercolor, digital art, and calligraphy, leverages their curiosity and balanced organization to create interactive storyboards in Scratch
    while collaborating responsibly with peers on school art projects, and they consistently refine their technique through self-directed practice.
  sports: An active team player named Anh Chuong enjoys playing midfield for the local youth soccer club Boca Raton FC, follows the Orlando City SC season with enthusiastic support, swims at the community
    pool during summer, and they incorporate weekend bike rides on Florida's nature trails to stay fit.
  arts: An avid art aficionado named Anh Chuong draws inspiration from Studio Ghibli's Hayao Miyazaki, the vibrant panels of graphic novelist Marjane Satrapi, and museum exhibitions at the Perez Art Museum
    Miami, regularly practices calligraphy in English and their heritage language, and they spend free evenings sketching fanart while listening to a blend of contemporary pop and traditional lantern-festival
    melodies.
  travel: A curious explorer named Anh Chuong plans trips that balance cultural immersion and nature, having visited the lantern-lit streets of Kyoto during its autumn festival, trekked the Everglades'
    mangrove trails, dreams of attending a spring lantern celebration in Taiwan, and they prefer budget-friendly travel with family, often using a detailed itinerary crossword puzzle to map routes.
  culinary: A budding home chef named Anh Chuong enjoys mastering family's traditional spring rolls, pho broth, and banana flower salad, frequently experiments with watercolor-inspired plating using fresh
    herbs like cilantro and basil, follows simple recipes on YouTube while adding personal doodles to the margin, and they occasionally over-season dishes when excited about new flavors.
  core: A creative, organized, and socially attuned thirteen-year-old named Anh Chuong channels boundless curiosity into art, balances disciplined practice with spontaneous play, and they occasionally forget
    chores in favor of late-night sketch marathons.
background:
  cultural: Anh is a second‑generation Southeast Asian American, with parents who immigrated from Vietnam. She grows up in a bilingual household, speaking Vietnamese at home while using English at school.
    Her family celebrates traditional holidays such as Tet (Lunar New Year) and the Mid‑Autumn Festival, preserving cultural customs, food, and music. At the same time, she is immersed in the multicultural
    environment of Milton, Florida, which encourages openness to diverse ideas and experiences. The blend of Vietnamese family values—respect for elders, community solidarity, and a strong emphasis on education—and
    the inclusive, artistic community of her hometown shapes her worldview and personal aspirations.
