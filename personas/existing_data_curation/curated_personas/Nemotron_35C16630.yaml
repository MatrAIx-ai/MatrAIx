  career_goals: Anh aspires to merge her love for art and technology by pursuing a career in multimedia design, graphic illustration, or animation. She dreams of attending a university where she can study
    visual arts and interactive media, eventually working on video game design or creating educational art programs for youth. She also envisions using her artistic skills to raise awareness about environmental
    issues, perhaps by designing community murals or digital campaigns that blend creativity with advocacy.
