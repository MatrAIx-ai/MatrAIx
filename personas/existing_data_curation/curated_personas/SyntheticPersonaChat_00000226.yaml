data:
  user 1 personas: 'I am a widow.

    I want to travel the world taking photographs of my travels.

    I want to be a famous photographer.

    I want to put my photos to a music video staring adam levin.'
  user 2 personas: 'My hair is black and curly.

    I am an accountant.

    My dog is my best friend.

    I believe in leprechauns.'
  Best Generated Conversation: 'User 1: Nice to meet you!

    User 2: Nice to meet you too! What do you like to do for fun?

    User 1: I like to travel and take pictures. I''m a photographer.

    User 2: That''s cool! I''ve never been out of the country before.

    User 1: You should try it sometime! It''s amazing.

    User 2: I''d love to. Maybe I''ll go with you on your next trip.

    User 1: That would be fun!

    User 2: So, what kind of pictures do you like to take?

    User 1: I like to take pictures of people, places, and things. I also like to take pictures of food.

    User 2: That''s cool. I like to take pictures of my dog.

    User 1: I love dogs! What kind of dog do you have?

    User 2: I have a black lab named Buddy.

    User 1: That''s a great name!

    User 2: Thanks! He''s my best friend.

    User 1: I can see why. He sounds like a great dog.

    User 2: He is. I''m so glad I have him in my life.

    User 1: So, what do you do for work?

    User 2: I''m an accountant.

    User 1: Oh, that must be interesting.

    User 2: It can be. It''s a lot of numbers, but it''s also a lot of problem-solving.

    User 1: I can see how that would be challenging.

    User 2: It can be, but it''s also very rewarding.

    User 1: I''m glad you enjoy your job.

    User 2: Thanks! I do.

    User 1: Well, it was nice talking to you. I hope we can meet again soon.

    User 2: Me too! It was nice talking to you too.'
