  hobbies: '[''home brewing'', ''fishing'', ''woodworking'', ''playing acoustic guitar'', ''community volunteering'', ''genealogy research'', ''attending craft‑beer festivals'', ''local music scene'']'
  career_goals: Peter aims to transition from bar back-of-house operations to a managerial role within the next two years, eventually opening his own brewpub that blends his love for classic Midwestern
    hospitality with innovative craft cocktails. He plans to earn a certified mixology credential, deepen his knowledge of brewing techniques, and build a loyal local following through community events.
    Long‑term, he hopes to become a recognized mentor in the regional hospitality scene, hosting workshops and contributing to local tourism initiatives.
