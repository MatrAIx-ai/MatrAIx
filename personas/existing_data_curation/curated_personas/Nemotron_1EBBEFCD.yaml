personas:
  professional: Peter Boros is a seasoned bar manager whose meticulous inventory tracking, knack for reading patrons, and flair for crafting seasonal cocktails reflect his organized curiosity and sociable
    energy, positioning him for a future brewpub venture.
  sports: Peter Boros enjoys casual weekend softball with his community league, frequents the Fox River Anglers Association for seasonal fishing trips, follows the Milwaukee Brewers, Green Bay Packers,
    and Milwaukee Bucks avidly, and they keep fit with morning jogs along the riverbank and occasional yoga classes.
  arts: Peter Boros channels his creative side by playing acoustic guitar at town gatherings, covering songs by Neil Young, Gillian Welch, and The Luminaries, and they regularly attend the regional craft‑beer
    festival’s live‑music stages featuring folk acts like Sarah Jarosz and The Milk Carton Kids.
  travel: Peter Boros prefers meticulously planned road trips that blend brewery tours with scenic fishing spots, having explored Belgium’s Bruges for its Trappist ales, taken a weekend to Portland, Oregon’s
    hop‑centric scene, and dreaming of a summer retreat in Colorado’s Rocky Mountain streams, all while balancing the costs against his bar’s financial goals.
  culinary: Peter Boros, a competent home‑chef, frequently experiments with hop‑infused marinades for grilled salmon, crafts hearty barley‑and‑root vegetable stews, and relishes classic Midwestern fare
    like cheese curds, bratwurst, and apple‑cider‑glazed pork ribs, often pairing his meals with his own seasonal ales.
  core: Peter Boros blends methodical mixology with a restless curiosity, obsessively cataloguing each brew experiment while occasionally over‑scheduling community events, resulting in late‑night work stress
    that fuels both their creative spark and anxiety.
background:
  cultural: Peter grew up in Kiel, Wisconsin, a small town in Calumet County with a strong German‑American heritage. His family has roots in farming and small‑business ownership dating back several generations,
    shaping a work ethic centered on reliability, modesty, and community service. He was raised in a predominantly Protestant environment, attending the local public high school where he participated in
    community events and sports. The cultural emphasis on hospitality and convivial gatherings has deeply influenced his career as a bartender and his love for local traditions.
