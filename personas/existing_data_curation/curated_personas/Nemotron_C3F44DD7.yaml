  hobbies: '[''Hiking'', ''Yoga'', ''Mediterranean cooking'', ''Reading non‑fiction (economics, psychology, education)'', ''Gardening'', ''Volunteering for youth mentorship'', ''Book club participation'',
    ''Photography of local nature'', ''Wine tasting at nearby vineyards'', ''Organizing community workshops'']'
  career_goals: Michelle aims to become the Head of the Business Studies Department within the next three years, leading the creation of a school‑wide entrepreneurship incubator that partners with local
    startups. She also aspires to earn a certification in instructional leadership, contribute to a state‑level curriculum framework, and eventually author a practical guide for high‑school teachers on
    integrating real‑world business projects into the classroom.
