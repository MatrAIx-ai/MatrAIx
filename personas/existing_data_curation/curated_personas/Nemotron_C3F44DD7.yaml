personas:
  professional: Michelle Sandbach, a veteran secondary-school business teacher, combines rigorous curriculum development with project‑based entrepreneurship incubators, leveraging data‑driven instruction
    and Google Classroom to turn classroom ideas into real‑world startup experiences.
  sports: Michelle Sandbach hits the coastal trails of Ventura County with the Ventura Hiking Club, follows the LA Dodgers and LA Lakers faithfully, practices yoga three times a week for balance, and joins
    a local weekend volleyball league to stay active during the summer.
  arts: Michelle Sandbach immerses themselves in the arts by attending the Ventura County Cultural Arts Center’s monthly jazz nights featuring Miles Davis standards, collecting prints by contemporary artist
    Yayoi Kusama, and binge‑watching Greta Gerwig’s films for inspiration in storytelling.
  travel: Michelle Sandbach prefers meticulously planned trips that blend learning and leisure, having explored the ancient ruins of Athens for culinary research, trekked the Milford Track in New Zealand
    for adventure, and dreams of a future sailing tour of the Greek islands to deepen their Mediterranean cooking repertoire.
  culinary: Michelle Sandbach enjoys experimenting with Mediterranean flavors, whipping up dishes like grilled lamb with rosemary, orzo salad with sun‑dried tomatoes, and chickpea falafel, while tending
    an herb garden that supplies fresh basil and oregano for their weekend dinner parties.
  core: Michelle Sandbach is a highly organized educator who balances data‑driven teaching, strategic investing, disciplined health habits, and a love for hiking, yoga, and Mediterranean cooking, all with
    a pragmatic curiosity and occasional over‑commitment to extracurricular projects.
background:
  cultural: Michelle grew up in a middle‑class, predominantly Anglo‑American family in Southern California, where values such as hard work, self‑reliance, and community involvement were emphasized. Her
    upbringing combined the West Coast appreciation for outdoor activity and environmental stewardship with a pragmatic, achievement‑oriented mindset typical of an American business‑educated background.
    This cultural blend informs her teaching philosophy, her commitment to local community service, and her balanced approach to curiosity and practicality.
attributes:
  skills: '[''Curriculum development'', ''Lesson planning'', ''Project‑based learning'', ''Financial literacy instruction'', ''Entrepreneurship education'', ''Data‑driven instruction'', ''Classroom management'',
