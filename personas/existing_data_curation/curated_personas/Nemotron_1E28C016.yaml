  career_goals: Jordan aims to earn his Licensed Professional Counselor (LPC) credential and become a supervisory counselor within the next five years. He plans to spearhead a community‑based stress‑reduction
    program in San Diego, integrate digital health tools into his practice, and publish research on the efficacy of routine‑oriented therapeutic approaches for clients with high anxiety. He also hopes to
    mentor junior counselors and eventually open a private practice focused on evidence‑based group therapy.
