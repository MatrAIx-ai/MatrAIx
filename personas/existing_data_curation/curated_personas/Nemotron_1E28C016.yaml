personas:
  professional: Jordan Henegar is a licensed mental‑health counselor who blends evidence‑based CBT and DBT with a data‑driven mindset, using their analytical background to design community stress‑reduction
    programs, lead structured group therapy sessions, and manage crisis interventions, all while maintaining a reliable routine and an outgoing, collaborative style that thrives on fostering supportive
    networks.
  sports: Jordan Henegar is a dedicated member of the Torrey Pines Beach Volleyball Club, a regular attendee of San Diego Padres games, and an occasional participant in the San Diego Running Club’s weekend
    5K runs, balancing a love for team camaraderie with a structured weekly fitness routine that includes sunrise hikes along the coastal trails.
  arts: Jordan Henegar is an avid board‑game enthusiast who hosts weekly game nights featuring titles such as Terraforming Mars, Gloomhaven, and Catan, while also frequenting live‑music venues in the Gaslamp
    Quarter to enjoy performances by The Growlers, John Mayer, and local jazz ensembles, weaving artistic appreciation into their sociable calendar.
  travel: Jordan Henegar prefers meticulously planned trips that blend adventure with relaxation, having road‑tripped the Pacific Coast Highway to explore Big Sur and Catalina Island, traveled to Kyoto
    for its historic temples and to Dublin for its lively pubs, and now dreaming of an organized expedition to the fjords of Norway and the geothermal wonders of Iceland.
  culinary: Jordan Henegar enjoys cooking and home‑brewing on weekends, experimenting with hop varieties like Citra and Mosaic to craft a citrus‑forward IPA while perfecting fish tacos with fresh mahi‑mahi,
    mango salsa, and lime‑infused avocado crema, and they often pair their meals with a pint of their own brew.
  core: Jordan Henegar is a routine‑oriented, community‑focused counselor who balances rigorous data‑backed therapy with a lively social life centered on beach volleyball, board games, and craft beer, all
    while coping with a persistent undercurrent of anxiety.
background:
  cultural: Jordan is a white American with German‑Irish ancestry who grew up in a suburban Midwestern town before relocating to San Diego for college and his career. His upbringing emphasized practicality,
    a strong work ethic, and community service, values that continue to shape his counseling philosophy. Living in the culturally diverse coastal city, he embraces inclusive, multicultural perspectives
    while maintaining a traditional, family‑centered outlook.
