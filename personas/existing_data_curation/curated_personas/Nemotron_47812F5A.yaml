personas:
  professional: Ruby Howell is a retired community organizer who now channels their meticulous eye and imaginative spirit into preserving oral histories, designing intricate quilts, and mentoring youth
    in sustainable gardening, all while coordinating intergenerational storytelling events with calm precision.
  sports: Ruby Howell loyally follows the Atlanta Braves and the Atlanta Falcons, attends the occasional local high school basketball game at the community center, and participates in a weekly senior walking
    group that meets at the nearby park, while also serving as a scorekeeper for the church’s senior softball league.
  arts: Ruby Howell is a devoted watercolorist who captures lilac blossoms and garden vistas on paper, an inventive quilt maker whose fabrics echo gospel choir banners, and an avid listener of Ella Fitzgerald,
    Miles Davis, and contemporary vocalist John Legend, frequently reading poetry by Maya Angelou and visiting local galleries showcasing African‑Diaspora artists.
  travel: Ruby Howell delights in weekend road trips to historic Southern towns like Savannah and Charleston, has ventured to Ghana to trace ancestral roots, and dreams of touring the National Museum of
    African Art in Washington, D.C., always packing a cooler of homemade collard‑green stew and a gospel playlist for the journey.
  culinary: Ruby Howell’s kitchen is a sanctuary of soul food where they expertly prepare slow‑cooked pork collard greens, sweet‑potato pie, and black‑eyed pea jambalaya seasoned with fresh garden herbs
    and smoked paprika, cooking for church potlucks and occasionally indulging in a generous slice of pecan pie after a long day of gardening.
  core: Ruby Howell blends quiet resilience, artistic curiosity, and community devotion into a life rich with gardening, quilting, storytelling, gospel melodies, and soul‑food comforts.
background:
  cultural: 'Ruby Emani Howell is an African‑American woman whose life has been shaped by the rich cultural tapestry of the South. Born in the late 1940s, she grew up in Georgia during the era of segregation
    and the Civil Rights Movement, experiences that instilled in her a deep appreciation for community solidarity and social justice. Her family’s traditions are rooted in Southern Black heritage: gospel
    music resonated from the church choir, storytelling evenings preserved ancestral memories, and the art of quilting provided both functional craft and a canvas for creative expression. Culinary practices—soul
    food recipes passed down through generations—reflect a blend of African, Caribbean, and Southern influences. Ruby’s upbringing emphasized respect for elders, mutual support, and a resilient optimism
    that helped her navigate adversity with calm composure. While she embraces the local customs of Stockbridge and Clayton County, she also explores broader African‑Diaspora connections through literature,
    music, and genealogy, honoring the legacy of her ancestors while contributing to the cultural continuity of her community.'
attributes:
  skills: '[''Oral history documentation'', ''Quilt design and fabrication'', ''Community garden planning'', ''Traditional Southern cooking'', ''Genealogical research'', ''Volunteer coordination'', ''Digital
