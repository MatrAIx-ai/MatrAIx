  hobbies: '[''Reading historical fiction and poetry'', ''Watercolor painting'', ''Quilt making'', ''Gardening'', ''Cooking family recipes'', ''Listening to gospel and jazz music'', ''Writing memoirs and
    poetry'', ''Stargazing'', ''Walking nature trails'', ''Attending local history talks'']'
  career_goals: Although retired from formal employment, Ruby’s ambitions focus on cultural preservation and community enrichment. She intends to compile a comprehensive memoir that weaves together her
    family’s genealogy, oral histories, and personal reflections, and to publish it as a resource for future generations. Ruby hopes to expand the community garden she helped start, turning it into a teaching
    space where seniors and teens can learn sustainable gardening together. She also plans to organize an annual intergenerational storytelling series at the local community center, inviting elders to share
    narratives that celebrate Black heritage in Stockbridge. Additionally, Ruby aspires to curate a small exhibition of her quilts and watercolors, highlighting the fusion of traditional Southern craft
    with abstract artistic expression. Through these projects, she aims to foster a sense of continuity, harmony, and pride within her neighborhood.
