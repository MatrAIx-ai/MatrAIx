persona_description: A teacher who is interested in comparing the English mastery of monolingual and bilingual students, specifically in the context of the English National Exam and TOEFL test. The teacher
  is looking for insights on the consistency of the results and the influence of non-formal education on the English mastery of these students. The teacher is also interested in predicting the potential
  challenges that bilingual students might face in learning a new language, such as Japanese, and taking steps to address these challenges. The teacher has a particular interest in the Japanese Department
  at the university and is eager to use the data from the English proficiency tests to help the students in their language learning journey.
