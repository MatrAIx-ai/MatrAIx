  hobbies: '[''Woodworking'', ''Metal sculpture'', ''Photography'', ''Fishing'', ''Hiking'', ''Community theater set building'', ''Reading biographies of inventors and artists'', ''Attending metal art exhibitions'']'
  career_goals: Ray aspires to earn the American Welding Society Certified Welder (CW) and Certified Fabricator (CF) credentials within the next two years, positioning himself for a foreman or lead welder
    role at the regional manufacturing plant. He also dreams of launching a side studio where he can blend his technical skill with his artistic curiosity, offering bespoke metal art commissions for businesses
    and public spaces in Dinwiddie County. Mentorship is a key ambition; Ray hopes to develop a small apprenticeship program for local youth, teaching both the trade fundamentals and the value of creative
    problem‑solving. Ultimately, he envisions his work contributing to the revitalization of historic structures in Blackstone while fostering a culture of safety, precision, and artistic expression in
    the local trades community.
