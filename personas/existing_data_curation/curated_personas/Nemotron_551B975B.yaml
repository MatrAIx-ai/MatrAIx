personas:
  professional: Jeanne Brown, a 73‑year‑old former school secretary turned senior‑center volunteer coordinator, channels their meticulous record‑keeping, budget‑savvy, and gentle mediation skills into leading
    genealogy and budgeting workshops that blend practical instruction with historical curiosity for fellow seniors, and they relish the chance to share knowledge.
  sports: Jeanne Brown, a 73‑year‑old, stays active with gentle yoga sessions at the Mishawaka senior center and brisk walks along the St. Joseph River, while rooting for the Indianapolis Colts and the
    Chicago Cubs during their respective seasons and occasionally joining the River Stroll walking club, and they cherish the sense of community these activities bring.
  arts: Jeanne Brown, a 73‑year‑old, immerses themselves in historical fiction by authors such as Ken Follett and Philippa Gregory, shares lively discussions at their local book club, and finds solace in
    the folk harmonies of The Wailin' Jennys and the timeless piano works of Debussy, shaping a reflective yet community‑oriented artistic sensibility, and they often weave literary references into their
    genealogy presentations.
  travel: Jeanne Brown, a 73‑year‑old, prefers thoughtful road trips that blend family visits with heritage tourism, such as yearly trips to their grandchildren in Indianapolis and weekend pilgrimages to
    the Ohio River Valley’s historic river towns, while dreaming of a carefully planned summer tour of the genealogical archives in Dublin, Ireland, and they meticulously map each itinerary to balance comfort
    and curiosity.
  culinary: Jeanne Brown, a 73‑year‑old, cultivates a garden of heirloom tomatoes, kale, and rosemary, which they transform into rustic tomato bisque, herb‑infused roasted chicken, and seasonal preserves
    like apple butter and dill pickles, reflecting a confident home‑cooking style that balances classic Midwestern comfort with a touch of culinary experimentation, and they take pride in sharing jars of
    preserves with neighbors.
  core: Jeanne Brown, a 73‑year‑old retired secretary who juggles an encyclopedic genealogy hobby with a habit of forgetting to water the roses until the last minute, embodies a curious yet pragmatic spirit
    that finds joy in community service, pantry‑preserving, and gentle meditation, and they often surprise friends with unexpected insights from obscure archives.
background:
  cultural: Jeanne was raised in a modest, middle‑class family in the Midwest, with German and Irish ancestry typical of many Indiana residents. Growing up in the 1950s and 60s, she experienced a community
    centered on church, school, and local industry, where values of self‑reliance, neighborliness, and modesty were emphasized. She attended public schools in Mishawaka and later pursued some college coursework
    in business administration at a nearby community college. The cultural tapestry of Mishawaka – a blend of industrial heritage, German‑American traditions, and strong small‑town civic engagement – has
    shaped her practical outlook, her respect for tradition, and her willingness to explore new ideas through community programs, library events, and heritage festivals.
