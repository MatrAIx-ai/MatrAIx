  hobbies: '[''Reading historical fiction'', ''Genealogy research'', ''Gardening'', ''Knitting and crocheting'', ''Cooking and preserving'', ''Walking along the St. Joseph River'', ''Gentle yoga'', ''Book
    club participation'', ''Volunteer tutoring'', ''Attending heritage festivals'']'
  career_goals: Jeanne aims to stay mentally and physically engaged while contributing her experience to the Mishawaka community. She hopes to expand her volunteer role at the senior center by leading workshops
    on budgeting, simple cooking, and genealogy for fellow seniors. She also plans to complete a written family memoir that combines recipes, anecdotes, and a brief local‑history narrative, which she intends
    to share at the community library. Maintaining her health through regular walks, gentle yoga, and routine medical care is a priority, as is staying independent in her home. Jeanne remains open to occasional
    travel to visit her grandchildren and to attend regional heritage festivals that deepen her understanding of Midwestern culture.
