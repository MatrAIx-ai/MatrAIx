  hobbies: '[''drawing with crayons'', ''building block towers'', ''listening to music and dancing'', ''exploring backyard nature'', ''reading interactive picture books'', ''watching animated cartoons'']'
  career_goals: At two years old, Dominga does not yet have concrete career aspirations. However, the strong curiosity she displays, her delight in creating visual marks, and her enjoyment of storytelling
    through picture books suggest a nascent interest in creative fields such as visual arts, music, or early childhood education. Her early drive to master new tasks and achieve independence points toward
    future ambition to become a skilled practitioner in areas that allow her to explore ideas and express herself.
