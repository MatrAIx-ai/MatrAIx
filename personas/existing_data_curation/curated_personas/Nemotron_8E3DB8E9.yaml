personas:
  professional: Dominga Turcios, a curious 2-year-old who treats every block tower and picture book as a mini-project, balances a love of organized play with spontaneous creative bursts, reliably tidies
    up after each session while loudly critiquing the colors in their storybooks, and often competes with peers over who can stack the tallest tower, all while worrying about any misplaced piece, and they
    never shy away from a new puzzle.
  sports: Dominga Turcios, a toddler who passionately follows FC Barcelona's matches on family TV, participates in a weekday toddler gymnastics class at the Little Tigers Club, competes eagerly in the weekly
    sandbox sprint races, and blunts any disappointment in a loss by retreating to a quiet corner with a beloved stuffed rabbit, while they cheer loudly each time their favorite team scores.
  arts: Dominga Turcios, a 2-year-old who delights in the melodic cello of Yo-Yo Ma, the whimsical tunes of The Wheels on the Bus, and the vibrant colors of Disney's Moana, spends afternoons finger-painting
    abstract shapes, and often critiques the too many blues in their own artwork while humming the chorus of Let It Go, and they proudly display each masterpiece on the fridge.
  travel: Dominga Turcios, a budding explorer who adores family trips to the local zoo's panda exhibit, dreams of tasting croissants beneath the Eiffel Tower, and insists on packing a tiny travel pillow
    for the long car rides to Grandma's house in the countryside, all while their parents balance the itinerary with their short attention span, and they excitedly point out every new sign along the way.
  culinary: Dominga Turcios, a picky 2-year-old who loves mashed avocado with a pinch of lemon, devours banana slices and occasional cheesy spaghetti, but firmly rejects peas, often demanding the crunchy
    texture of crackers and insisting on a splash of ketchup for any bite, turning mealtime into a negotiation of flavors, and they proudly claim the title of 'taste tester' in the household.
  core: Dominga Turcios, a curious yet worry-prone 2-year-old who balances meticulous play with spontaneous creativity, competes fiercely over tiny treasures, and navigates the world with a mix of critical
    skepticism and affectionate imagination, and they often wonder why the sand feels different from the grass.
background:
  cultural: Dominga grows up in a bilingual Mexican-American household in Clovis, California. Spanish is spoken daily alongside English, and family life is infused with Mexican traditions such as celebrating
    Día de los Muertos with altars, enjoying festive foods like tamales and quesadillas, and listening to mariachi and ranchera music. Community events in Fresno County, including Cinco de Mayo parades
    and local cultural festivals, reinforce her connection to her heritage. These cultural practices shape her early experiences, language development, and appreciation for art and music.
