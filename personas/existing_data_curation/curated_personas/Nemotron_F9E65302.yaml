personas:
  professional: Ricky Ehmann, a high school sophomore aspiring mechanical engineer, channels their love for routine into the school robotics club where they meticulously draft schematics for model aircraft,
    troubleshoot wiring, and lead weekly build sessions, demonstrating reliability, methodical planning, and an energetic collaborative spirit.
  sports: Ricky Ehmann, a midfielder for the Painesville Youth Soccer Club and a left‑field pitcher for the local Little League team, follows a strict practice schedule, logs performance stats in a spreadsheet,
    and cheers for the Cleveland Guardians, Cleveland Browns, and Ohio State Buckeyes, embodying a methodical yet energetic approach to fitness.
  arts: Ricky Ehmann, an avid model‑airplane builder who frequents the community maker space on Saturdays, also immerses themselves in classic rock by listening to Led Zeppelin and The Beatles while sketching
    new designs, and occasionally attends concerts by the Cuyahoga Valley Youth Orchestra, blending hands‑on creation with musical inspiration.
  travel: Ricky Ehmann, a weekend hiker who explores Cuyahoga Valley National Park’s trails and dreams of a spring road trip to Niagara Falls, plans outings with printed checklists, prefers family‑oriented
    itineraries over spontaneous trips, and hopes to one day camp along the Appalachian Trail for a disciplined summer adventure.
  culinary: Ricky Ehmann, who favors hearty Midwestern dishes such as chicken tenders, homemade mac and cheese, and a slice of deep‑dish pizza topped with pepperoni and peppers, enjoys cooking spaghetti
    with Cincinnati chili for church potlucks, and often crafts snack platters shaped like aircraft silhouettes, reflecting both comfort‑food loyalty and a quirky creative flair.
  core: Ricky Ehmann is a routine‑loving teen who blends meticulous model‑building, organized sports, and anxious introspection into a life of structured creativity and reliable community involvement.
background:
  cultural: Ricky grew up in Painesville, a small Midwestern city in Geauga County, Ohio. The community is characterized by traditional values, tight‑knit neighborhoods, and a strong work ethic typical
    of the region’s largely working‑class, white population. His family has deep roots in the area, often participating in church activities, local fairs, and seasonal community events. The cultural environment
    emphasizes practicality, reliability, and modesty, shaping his preference for routine, his organized approach to life, and his desire to contribute to the community.
