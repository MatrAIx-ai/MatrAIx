  career_goals: Ricky plans to complete his high school education and enroll in a vocational trade program, targeting a certification as an electrician or HVAC technician. He is drawn to careers that combine
    hands‑on work with clear routines and teamwork, and he hopes to eventually open a small family‑run home‑repair business in Painesville. In parallel, he is interested in volunteering with the local fire
    department to gain experience in emergency response and community service, aligning his practical skills with his desire to contribute to his town.
