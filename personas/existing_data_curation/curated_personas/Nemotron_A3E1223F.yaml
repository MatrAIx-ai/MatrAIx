  hobbies: '[''Visiting art galleries and museums'', ''Reading (art history, philosophy, regional biographies)'', ''Photography'', ''Gardening'', ''Woodworking'', ''Listening to classical and jazz music'',
    ''Writing/journaling'', ''Small‑group book or art discussions'', ''Walking/hiking in local parks'', ''Cooking'', ''Road trips to state parks'']'
  career_goals: Although retired from formal employment, Stephen aims to stay mentally active and give back to his community. He plans to volunteer as a docent at the Madison Museum of Contemporary Art,
    leading small‑group tours that blend his love of art with his talent for clear, patient explanation. He also hopes to mentor local high‑school students interested in woodworking and local history through
    a community‑center program. Stephen is working on a memoir that weaves together his life experiences, his travels, and reflections on the evolving cultural landscape of Madison. Additionally, he hopes
    to attend occasional university lectures on art theory and philosophy to keep his curiosity sharp, while maintaining a steady routine of gardening and walking to support his wellbeing.
