personas:
  professional: Ericka Thomas is a charismatic marketing student who leverages their strong communication skills and quick learning of digital tools to lead campus clubs, plan pop‑up events, and craft data‑driven
    social media campaigns, while often battling procrastination and last‑minute deadline scrambles.
  sports: Ericka Thomas enjoys competitive pick‑up basketball games at the local community center, cheers for the Dallas Mavericks and Dallas Cowboys, and participates in a weekend intramural league, viewing
    sports both as a social outlet and a way to channel their competitive drive.
  arts: Ericka Thomas immerses themselves in Dallas’s live‑music scene, regularly attends shows by indie band The Liminals, takes improv comedy workshops at the Dallas Comedy House, captures street‑art
    photos inspired by Shepard Fairey, and listens to a rotating playlist of Tame Impala and Kendrick Lamar while editing content.
  travel: Ericka Thomas prefers spontaneous weekend road trips to nearby cities like Austin, Fort Worth, and Oklahoma City, often booking budget Airbnb stays, exploring local food scenes and snapping urban
    photography, balancing a love for adventure with a limited student travel budget.
  culinary: Ericka Thomas is a self‑described foodie who chases Dallas food trucks serving brisket tacos, kimchi‑topped fries, and pho bowls, enjoys cooking medium‑spicy shrimp tacos at home with fresh
    cilantro and lime, and can be found debating the perfect level of heat in a salsa for hours.
  core: Ericka Thomas is a 20‑year‑old community‑focused marketing enthusiast who blends restless curiosity, competitive energy, and occasional procrastination into a vibrant, fast‑paced lifestyle.
background:
  cultural: Ericka is a Black woman raised in Dallas, deeply connected to the city’s vibrant African‑American community. She grew up attending church gatherings, family reunions, and local festivals that
    celebrate Southern Black culture, including soul music, barbecue, and spoken‑word poetry. She participates in community activism around educational equity and social justice, often collaborating with
    local HBCU alumni networks. Her cultural identity informs her passion for uplifting other young Black professionals and preserving the collective history of her neighborhood.
