personas:
  professional: Raquel Robinson, a four‑year‑old budding nature explorer, treats backyard adventures like a field study, using their curiosity and practicality to catalog insects while their talkative,
    sociable nature makes them the enthusiastic leader in group play.
  sports: Raquel Robinson, a four‑year‑old enrolled in the Newberg Youth Soccer program, dashes across the field with boundless energy, models their cheers after the Portland Timbers and the Oregon Ducks,
    and treats daily backyard tag sessions as their favorite cardio routine, even if they sometimes forget their raincoat.
  arts: Raquel Robinson, a four‑year‑old who sings along to Raffi’s “Baby Beluga” and dances to The Wiggles, loves drawing bright pictures of forest animals after watching “Frozen,” and eagerly attends
    the Newberg community theater’s “Storytime in the Park” events, delighting in the colorful costumes of local performers.
  travel: Raquel Robinson, a four‑year‑old adventure‑curious traveler, loves family trips to Cannon Beach’s tide pools and weekend visits to Crater Lake’s snow‑capped rim, dreams of seeing Disneyland’s
    fireworks, and prefers spontaneous “let’s explore” outings over rigid itineraries, though they sometimes get sleepy on long car rides.
  culinary: Raquel Robinson, a four‑year‑old budding kitchen helper, adores buttery mac and cheese, crunchy chicken nuggets, and strawberry‑banana smoothies, proudly scoops flour into their mixing bowl
    and sprinkles shredded cheddar on top, while they insist on adding bright red apple slices to their lunchbox for extra crunch.
  core: Raquel Robinson, a four‑year‑old whirlwind of curiosity and chatter, thrives on backyard expeditions, collects glitter stickers like treasure, and habitually forgets to put away toys, turning every
    room into a lively, albeit slightly chaotic, playground.
background:
  cultural: Raquel is raised in a white, middle‑class family in Newberg, Oregon, a town known for its agricultural roots and close‑knit community. Her family values cooperation, kindness, and a connection
    to the outdoors, often participating in local farmers' markets, community festivals, and church gatherings. The Pacific Northwest’s emphasis on nature and sustainability influences her love for backyard
    explorations and respect for the environment.
