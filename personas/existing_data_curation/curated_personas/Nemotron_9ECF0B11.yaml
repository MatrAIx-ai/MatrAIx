  career_goals: Even at four, Raquel imagines herself helping others and exploring the world. She frequently says she wants to be a teacher who makes learning fun, a veterinarian who cares for animals,
    and a storyteller who shares adventures. She also dreams of becoming an artist who paints colorful pictures, reflecting her blend of practicality and imagination.
