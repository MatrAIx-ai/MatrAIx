personas:
  professional: Edward Peloquin, a retired rural craftsman turned community historian, blends carpentry expertise, mechanical know‑how, and meticulous organization to mentor teens in hands‑on trades while
    preserving Jourdanton’s oral histories, and they take pride in sharing stories that link past and present.
  sports: Edward Peloquin enjoys gentle sunrise walks along the Nueces River, competes in a senior softball league through the Jourdanton Community Sports Club, and loyally supports the Dallas Cowboys in
    football season, the Houston Astros in baseball, and the San Antonio Spurs in basketball, occasionally attending local rodeo shows as a spectator, and they value staying active for both health and social
    connection.
  arts: Edward Peloquin spends evenings listening to Willie Nelson’s classic country ballads, and they often quote lines from John Wayne’s westerns like True Grit, while dabbling in watercolor landscapes
    inspired by Bob Ross’s technique.
  travel: Edward Peloquin prefers low‑key road trips, having driven to the San Antonio River Walk and the Hill Country town of Fredericksburg, they dream of a guided tour of the Alamo and a pilgrimage to
    Washington, D.C.’s National Archives, yet usually limit travel to weekend visits to neighboring campsites along the Nueces River where they can fish and garden.
  culinary: Edward Peloquin, an accomplished home chef, masters Texas‑style barbecue by slow‑smoking brisket over mesquite wood and prepares hearty Tex‑Mex dishes like chicken fajitas with fresh cilantro,
    lime, and jalapeño, while they casually garnish meals with homemade pickles and a dash of smoky paprika, yet they sometimes over‑salt the chili during enthusiastic cooking sessions.
  core: Edward Peloquin is a quiet 79‑year‑old who blends a lifelong love of hands‑on craft with a keen curiosity for local history, spends hours tending his garden, occasionally forgets to take their blood
    pressure medication after a day of woodworking, and they delight in sharing stories over church potlucks.
background:
  cultural: Edward is a lifelong resident of Jourdanton, Texas, born into a family with deep Anglo‑American and German roots typical of Atascosa County. He was raised in a close‑knit, predominantly Protestant
    (Southern Baptist) community where self‑reliance, hard work, and neighborly support were core values. The local culture, with its blend of rural ranching traditions, modest hospitality, and respect
    for heritage, has shaped his outlook and everyday practices.
