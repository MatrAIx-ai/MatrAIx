  hobbies: '[''Woodworking'', ''Fishing'', ''Gardening'', ''Reading non-fiction (history, technology)'', ''Chess'', ''Small book club'', ''Precision shooting'', ''Youth mentorship (one-on-one)'']'
  career_goals: Demetrice aims to advance to a senior leadership role such as Senior Sales Manager or Branch Manager, achieving Top Producer status within his region. He plans to earn professional designations
    like the Chartered Property Casualty Underwriter (CPCU) and Certified Insurance Counselor (CIC) to deepen his expertise. By building a niche portfolio focused on small‑business and commercial risk coverage,
    he intends to mentor the next generation of agents and eventually transition to a consulting position or launch his own boutique brokerage, securing a financially comfortable retirement while maintaining
    a competitive edge.
