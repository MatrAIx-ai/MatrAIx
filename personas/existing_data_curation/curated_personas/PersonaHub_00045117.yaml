persona_description: A microbiologist with expertise in studying the genetics and molecular biology of Escherichia coli O157:H7, specifically focusing on the regulation of curli fimbriae production and
  the impact of environmental and host stress on pathogen variants. They have conducted research on the genome instability of E. coli O157:H7 and have investigated bacterial communities in biofilms, biofilm
  producers, and outbreaks. They have also worked on studies of norovirus biology on produce, aerosol transport of bacteria from concentrated animal feeding operations, and the relationship between the
  size of particles and the level of natural contamination in soil samples.
