  hobbies: '[''Painting'', ''Museum Visits'', ''Literature/Book Club'', ''Yoga'', ''Mindfulness Meditation'', ''Balcony Gardening'', ''Community Art Workshops'', ''Travel to Cultural Festivals'', ''Cooking
    Traditional African‑American Dishes'', ''Photography'']'
  career_goals: Maritha aims to transition into a leadership role within her school, such as department chair or curriculum coordinator, where she can champion inclusive, art‑infused curricula and mentor
    emerging educators. She hopes to design a school‑wide experiential learning program that partners with local museums and cultural centers, expanding students' exposure to varied artistic and historical
    perspectives. Over the next five years, she also aspires to complete a master's degree in Educational Leadership to strengthen her administrative capabilities. In the longer term, she envisions retiring
    from full‑time teaching to volunteer as a community arts facilitator, organizing workshops for youth in underserved neighborhoods.
