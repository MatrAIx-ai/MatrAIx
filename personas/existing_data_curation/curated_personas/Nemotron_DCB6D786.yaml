personas:
  professional: Maritha Bain is a seasoned middle‑school educator who weaves art, history, and community narratives into interdisciplinary curricula, leverages restorative practices for classroom management,
    mentors new teachers, and champions flexible, experience‑based learning while juggling a relaxed approach to administrative deadlines.
  sports: Maritha Bain enjoys casual fitness through weekly yoga sessions, walks along the Hudson River with her local walking club, follows the New York Knicks and the Brooklyn Nets for basketball inspiration,
    and participates in a community softball league on summer weekends, though she often forgets to bring proper shoes.
  arts: Maritha Bain spends weekends painting acrylics and watercolors inspired by Monet and Renoir, draws creative concepts from visits to the Metropolitan Museum of Art and the Newark Museum, engages
    in a book club that discusses authors like Yaa Gyasi, Jesmyn Ward, and Colson Whitehead, and volunteers to lead art workshops for children, infusing gospel‑soul rhythms and Caribbean color palettes
    into her projects.
  travel: Maritha Bain favors culturally immersive trips, planning relaxed itineraries to attend reggae festivals in Kingston, explore historic sites in Accra, and visit the annual Caribbean carnival in
    Trinidad, while also treasuring short weekend getaways to upstate New York vineyards, all balanced with a flexible budget and a penchant for spontaneous detours.
  culinary: Maritha Bain loves cooking dishes that echo her family's island roots, frequently preparing jerk‑seasoned chicken, plantain fufu with aromatic thyme and allspice, and a fresh garden herb salad
    featuring basil and cilantro, while also experimenting with Mediterranean olive oil‑based sauces for her weekend painting sessions.
  core: Maritha Bain blends an artist’s curiosity with a laid‑back, slightly disorganized lifestyle, championing community‑focused education, spontaneous cultural travel, and mindful self‑care despite a
    tendency to worry.
background:
  cultural: Maritha identifies as African‑American, with family roots tracing back to the Caribbean island of Jamaica, where her grandparents immigrated to the United States in the 1960s. Growing up in
    Newark, she was immersed in the vibrant Black cultural scene, attending church services that emphasized gospel music, community service, and storytelling. These experiences fostered a deep appreciation
    for African‑American history, oral tradition, and artistic expression, which she weaves into her teaching. Living now in Cliffside Park, she remains active in the local Black community, participating
    in cultural heritage events, supporting Black‑owned businesses, and mentoring youth through after‑school programs. Her cultural identity informs her commitment to equity, representation, and celebrating
    diverse narratives within the classroom.
attributes:
  skills: '[''Curriculum Development'', ''Interdisciplinary Teaching'', ''Differentiated Instruction'', ''Classroom Management'', ''Restorative Practices'', ''Mentorship'', ''Community Partnerships'', ''Technology
