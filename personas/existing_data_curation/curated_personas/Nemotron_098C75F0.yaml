personas:
  professional: Andrew Paschal is a retired plant maintenance supervisor who now dedicates his meticulous engineering background to preserving local history through genealogy and community projects, applying
    systematic planning, detailed record-keeping, and hands-on problem solving to every endeavor, and they frequently mentor younger relatives in woodworking and basic home maintenance.
  sports: Andrew Paschal supports the Carolina Panthers and the North Carolina Tar Heels, participates in a senior bridge league at the community center, walks daily in his garden and along the local park
    for moderate exercise, and they treat the bridge competition as a strategic sport while staying wary of over-exertion due to joint pain.
  arts: Andrew Paschal sings in his church's gospel choir, drawing inspiration from Mahalia Jackson and the Rev. James Cleveland, enjoys listening to classic gospel recordings, reads biographical works
    on civil-rights leaders, and they find that these artistic experiences reinforce their sense of heritage and provide a calming counterbalance to daily worries.
  travel: Andrew Paschal prefers short, well-planned road trips to scenic destinations like the Blue Ridge Parkway, Asheville's historic downtown, the Savannah waterfront, and Washington, D.C.'s monuments,
    often traveling with grandchildren in a comfortable, leisurely style that balances curiosity with the need for rest, and they relish the occasional train journey that offers a slower pace.
  culinary: Andrew Paschal delights in cooking garden-fresh Southern comfort dishes such as roasted tomatoes, collard greens seasoned with smoked ham hocks, cornbread, sweet potato casserole, and occasionally
    a gumbo-inspired seafood stew, and they proudly grow many of the key ingredients in their own vegetable garden, though they sometimes forget to season to taste when tired.
  core: Andrew Paschal is a methodical, community-focused elder whose curiosity drives meticulous genealogy, gospel singing, and garden stewardship, while a competitive streak in bridge and a tendency toward
    worry keep them both disciplined and slightly skeptical.
background:
  cultural: Andrew was raised in a Black community in central North Carolina during the civil‑rights era, where church, family, and mutual support were pillars of daily life. The values of resilience, self‑reliance,
    and community service shaped his outlook. He continues to attend a historically Black Baptist congregation, where the tradition of gospel music and fellowship remains central. His cultural identity
    informs his dedication to preserving family stories, contributing to local heritage initiatives, and mentoring younger generations, reflecting a deep sense of continuity and pride in his Southern Black
    heritage.
attributes:
