  career_goals: Although no longer in the formal workforce, Andrew aims to stay intellectually active and socially valuable. He plans to complete a comprehensive oral history of his family that can be donated
    to the local historical society, improve his digital fluency to keep in touch with grandchildren, and mentor younger relatives in practical skills such as woodworking and basic home maintenance. He
    also aspires to maintain his independence through regular health‑focused routines and to be recognized within his senior center for his reliable contributions to community projects.
