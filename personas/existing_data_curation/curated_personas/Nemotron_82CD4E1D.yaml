personas:
  professional: Rebecca Miller is a senior compliance officer who leverages their deep regulatory expertise and an artist’s imagination to craft agile, technology‑enabled risk frameworks, and they guide
    cross‑functional teams with relaxed confidence while juggling a habit of leaving folders slightly disorganized.
  sports: Rebecca Miller hits the Cascades with the Everett Hiking Club each fall, paddles the Puget Sound on weekends, and cheers for the Seattle Sounders FC and Seattle Seahawks while they keep a relaxed
    weekly schedule that favors outdoor enjoyment over rigid gym routines.
  arts: Rebecca Miller immerses themselves in abstract watercolor, photographing misty evergreens, visits the Seattle Art Museum to study works by Mark Rothko and Georgia O'Keeffe, attends readings at local
    cafés featuring poets like Ocean Vuong, and they often cite Bon Iver and Fleet Foxes as the soundtrack to their creative process.
  travel: Rebecca Miller favors loosely planned journeys that blend wilderness adventure with cultural immersion, having trekked Iceland’s waterfalls, explored Kyoto’s temples, and taken weekend road trips
    to the Oregon Coast, they balance a love for spontaneous detours with a modest travel budget constrained by professional commitments.
  culinary: Rebecca Miller experiments in the kitchen by fusing miso‑glazed salmon with pomegranate glaze, spiced lentil stew seasoned with za’atar, and rosemary‑scented sourdough, they enjoy sourcing wild
    mushrooms at farmers markets and relish the occasional indulgence of a decadent dark‑chocolate tart.
  core: Rebecca Miller is a 50‑year‑old compliance strategist who merges their love of abstract art, nature, and tech‑driven risk management into a flexible, creative approach to life, punctuated by a habit
    of misplaced paperwork and a penchant for midnight watercolor sessions.
background:
  cultural: Rebecca grew up in a middle-class family in the Greater Seattle area, where the Pacific Northwest's blend of environmental consciousness, independent thinking, and a vibrant arts scene shaped
    her worldview. Her upbringing emphasized education, self-reliance, and community involvement, leading her to support local farmers markets, volunteer with regional conservation projects, and participate
    in Everett's cultural events. While identifying as white American, she values the region's multicultural fabric and often incorporates diverse perspectives into her compliance work. The local culture's
    appreciation for nature, creativity, and progressive values continues to inform her professional ethos and personal interests.
