  hobbies: '[''Abstract watercolor painting'',''Photography'',''Hiking in the Cascades'',''Kayaking on Puget Sound'',''Visiting art galleries and theater performances'',''Reading contemporary fiction and
    philosophy'',''Writing poetry'',''Exploring emerging technology trends'',''Practicing yoga and meditation'',''Cooking experimental dishes'']'
  career_goals: Rebecca aims to transition from a senior compliance officer to a director-level role where she can shape an organization’s compliance culture through innovative, technology-enabled frameworks.
    She is pursuing certifications such as the Certified Regulatory Compliance Manager (CRCM) and exploring AI-driven RegTech solutions to create agile, risk-based compliance programs that adapt to rapid
    regulatory change. Her ambition includes mentoring emerging compliance professionals, influencing industry standards through participation in professional associations, and championing a corporate ethos
    that balances ethical rigor with creative flexibility. She also values maintaining a work-life balance that preserves her capacity for artistic exploration and outdoor recreation.
