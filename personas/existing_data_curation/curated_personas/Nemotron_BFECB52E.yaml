personas:
  professional: Johnny Evans, a 33‑year‑old business‑savvy arts enthusiast, leverages his financial analysis, strategic planning, and project‑management expertise to design inclusive museum programs while
    infusing Southern hospitality and Caribbean rhythm into community outreach, balancing meticulous organization with spontaneous creative flair and energizing cross‑functional teams with his sociable,
    kind nature.
  sports: Johnny Evans, a 33‑year‑old basketball aficionado, guards for the Cranford Hoops league every Thursday night, cheers on the New York Knicks and occasional Brooklyn Nets games, joins a springtime
    community soccer pickup at Rahway Park, and treats his fitness routine as a social ritual, even if he occasionally skips post‑game stretching.
  arts: Johnny Evans, a 33‑year‑old cultural explorer, curates pop‑up exhibitions inspired by the vivid murals of Shepard Fairey, immerses himself in Hozier’s soulful concerts at the Prudential Center,
    performs in improv comedy nights at the Coney Island Playhouse, mentors youth in art workshops at the Newark Museum, and captures candid portraits of Elmora’s eclectic streets, all while channeling
    Caribbean beats into his visual storytelling.
  travel: Johnny Evans, a 33‑year‑old travel enthusiast, blends meticulous itineraries with spur‑of‑the‑moment street‑art hunts, has explored the historic charm of Charleston, the jazz‑laden lanes of New
    Orleans, the Caribbean vibrancy of Havana, and dreams of cycling through Amsterdam’s canals, while balancing family commitments and a modest travel budget that still allows weekend getaways to the Hudson
    Valley.
  culinary: Johnny Evans, a 33‑year‑old culinary experimenter, whips up everything from smoky jerk chicken with Scotch bonnet pepper and coconut milk to Southern‑style collard greens, red beans and rice,
    and homemade sourdough, delights friends with spicy mango salsa, frequents a downtown rooftop ramen spot, yet often over‑seasones with hot sauce, sparking late‑night heartburn that disrupts his otherwise
    disciplined diet.
  core: Johnny Evans, a 33‑year‑old curiosity‑driven connector, fuses strategic business acumen with a love for art, community, and bold flavors, juggling project deadlines while occasionally losing track
    of time in an impromptu street‑art photo chase.
background:
  cultural: Johnny is a Black American whose family roots extend to the Southern United States and the Caribbean. Raised in a multicultural suburb of New Jersey, he grew up with a blend of Southern hospitality,
    Caribbean rhythms, and the vibrant tapestry of the Greater New York area. His upbringing included active participation in his local church and celebrations of African‑American heritage events such as
    Juneteenth and Black History Month. Music, storytelling, and community service are integral to his identity, and he incorporates these traditions into daily life through food, family gatherings, and
    involvement in local cultural festivals. Johnny remains mindful of social‑justice issues and strives to uplift his community through both his professional ambitions and volunteer activities.
attributes:
  skills: '[''Financial analysis'', ''Strategic planning'', ''Marketing and sales'', ''Project management'', ''Client relationship management'', ''Event planning'', ''Community outreach'', ''Art appreciation
    and basic curation'', ''Social media management'', ''Data visualization (Excel/Tableau)'', ''Adaptability and problem solving'']'
  hobbies: '[''Visiting museums and galleries'', ''Attending live music and theater performances'', ''Participating in community basketball league'', ''Cooking and experimenting with global cuisines'',
    ''Photography'', ''Traveling to explore new neighborhoods and cultural sites'', ''Reading contemporary fiction and business leadership books'', ''Volunteering at youth art workshops'']'
  career_goals: Johnny aims to re‑enter the workforce by merging his business acumen with his passion for the arts. He aspires to secure a role as program coordinator or community engagement manager at
    a local museum or arts nonprofit, where he can design inclusive cultural events and support emerging artists. In the longer term, he envisions launching his own social‑enterprise that creates pop‑up
    art markets and workshops, generating both economic opportunities for creators and enriching experiences for the Cranford community. He plans to augment his qualifications with a certificate in arts
    management while ensuring a stable income that supports his married life and allows for a healthy work‑life balance.
