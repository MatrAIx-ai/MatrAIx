personas:
  professional: Billy Ridgeway, a seasoned facilities caretaker with decades of hands‑on experience in floor care, chemical safety, and basic plumbing, is leveraging their curiosity and practical mindset
    to step into a lead custodian role where they can mentor younger staff while championing green‑cleaning initiatives across Manistee County's historic properties.
  sports: Billy Ridgeway, an avid hobbyist fisherman and trail‑hiker, spends summer mornings casting on the Manistee River, joins the local senior softball league at the community park, and faithfully cheers
    the Detroit Tigers and Detroit Lions while they maintain a relaxed, low‑impact fitness routine that includes weekly walks and occasional cross‑country skiing in winter.
  arts: Billy Ridgeway expresses artistry through restoring vintage wooden chairs, curating his garage as a classic‑rock sanctuary that spins The Rolling Stones, Led Zeppelin, and Jimi Hendrix, while they
    regularly attend Manistee County historical society talks and occasional folk‑music evenings featuring local troubadour Sam Hawkins.
  travel: Billy Ridgeway prefers leisurely road trips that blend history and nature, having driven the historic Route 66 for a weekend adventure and planning a spring visit to Mackinac Island’s Victorian
    charm as well as a fishing expedition to Canada’s Lake of the Woods, while they map routes on paper maps and leave room for spontaneous detours.
  culinary: Billy Ridgeway, a competent home cook, tends a vegetable garden that yields heirloom tomatoes and sweet corn, regularly whipping up grilled trout with lemon‑dill sauce, corn succotash, and rustic
    apple pie, while they occasionally indulge in a local diner’s fish‑and‑chips for a nostalgic comfort‑food break.
  core: Billy Ridgeway, a curious yet laid‑back handyman‑turned‑mentor, balances a love of classic rock, vintage furniture restoration, and sustainable cleaning with a habit of misplacing workshop tools,
    and they have a soft spot for spontaneous fishing trips.
background:
  cultural: Billy grew up in a small Midwestern town in Michigan, immersed in the region's blue‑collar work ethic and community‑oriented values. His family’s modest, Protestant background emphasized practicality,
    self‑reliance, and modesty. The Great Lakes culture—marked by seasonal outdoor activities, straightforward communication, and a respect for hard work—shapes his worldview. Though never married, he maintains
    strong ties to local traditions, town festivals, and the informal network of neighbors who share a collective sense of responsibility for keeping their town clean and welcoming.
