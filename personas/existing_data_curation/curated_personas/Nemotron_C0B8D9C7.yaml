  career_goals: At 60, Billy aims to transition from a front‑line janitor to a lead custodian role where he can mentor younger staff and oversee the implementation of green‑cleaning initiatives across local
    facilities. He hopes to earn a certification in environmentally responsible cleaning and eventually consult part‑time for small businesses seeking to reduce their ecological footprint. In the longer
    term, he envisions starting a modest side business offering specialized deep‑cleaning services for historic buildings in Manistee County, blending his practical skills with his enduring curiosity about
    preservation.
