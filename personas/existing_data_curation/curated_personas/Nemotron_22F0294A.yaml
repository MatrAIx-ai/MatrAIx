  career_goals: Alexander aspires to attain a stable, practical career that leverages his hands‑on abilities and disciplined work ethic. His primary goal is to earn a GED and enroll in a vocational training
    program to become a certified HVAC technician or electrician, fields that offer clear advancement paths and reliable income. He also considers enlisting in the U.S. Army as an logistics specialist,
    seeing it as an opportunity to develop further discipline, serve his community, and secure benefits for future education. Ultimately, he aims to achieve financial independence, support his family, and
    eventually give back by mentoring younger peers in his neighborhood.
