    ''participating in church choir and community potluck gatherings'']'
  career_goals: Looking ahead, Cynthia aims to transition into a mentorship and consultancy role where she can share her wealth of experience with emerging food‑service professionals. She plans to pursue
    a bachelor's degree in hospitality management to deepen her strategic perspective and to obtain advanced certifications in sustainable sourcing and waste reduction. Cynthia also dreams of opening a
    boutique café that highlights locally grown produce, particularly strawberries and fresh herbs, and hopes to lead a regional sustainability initiative within her current organization before gradually
    moving into semi‑retirement.
