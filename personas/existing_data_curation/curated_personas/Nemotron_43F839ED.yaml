  hobbies: '[''Gardening'', ''Cooking Puerto Rican cuisine'', ''Listening to Latin music'', ''Knitting'', ''Crossword puzzles'', ''Walking nature trails'', ''Reading historical fiction'', ''Volunteer tutoring
    Spanish'', ''Attending community festivals'']'
  career_goals: Looking ahead, Victoria aims to transition into a part‑time mentorship role where she can share her extensive front‑desk knowledge with younger staff while easing into retirement. She hopes
    to obtain a short‑term certification in office administration to broaden her skill set and possibly take on occasional duties as a community liaison for Spanish‑speaking residents. Additionally, she
    envisions volunteering at the local senior center to guide seniors through paperwork and digital services, using her practical experience to give back to the community she treasures.
