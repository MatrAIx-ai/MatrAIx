  career_goals: Deven aims to transition from employee to owner‑operator by establishing a small, boutique painting contractor that focuses on sustainable, low‑VOC finishes and historic‑preservation projects
    in the Fairfax County area. He plans to obtain advanced certifications in green building painting and lead‑safe work practices, positioning his business as a go‑to for environmentally conscious homeowners.
    Over the next five years, he hopes to mentor apprentices, eventually moving into a supervisory and estimating role that leverages his practical expertise while allowing him to maintain a flexible schedule
    that accommodates his preference for solitary work and family time. Financial stability for his family and the ability to choose projects that align with his curiosity about new painting technologies
    are central to his ambitions.
