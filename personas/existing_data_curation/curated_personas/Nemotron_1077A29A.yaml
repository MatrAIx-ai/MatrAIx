  hobbies: '[''Fishing'', ''Beach walking'', ''Woodworking'', ''Cooking traditional Mexican cuisine'', ''Reading historical biographies'', ''Community first‑aid volunteer work'', ''Gardening'']'
  career_goals: Looking ahead, Alcides aims to achieve paramedic certification within the next two years, positioning himself for a senior field role that still respects his need for routine and predictable
    schedules. He aspires to become a field training officer, where he can mentor younger EMTs and embed his practical, safety‑first mindset into the department’s culture. Long‑term, he envisions a supervisory
    or EMS quality‑assurance position that allows him to refine protocols, improve response efficiency, and contribute to community emergency‑preparedness programs while maintaining a balanced work‑life
    schedule for his family.
