persona_description: A Perl developer who is familiar with the language's threading mechanisms, particularly the interpreter threads (ithreads). They have experience with the limitations and advantages
  of ithreads, as well as other threading solutions in Perl, such as the Coro module and dynamic programming languages. They are interested in finding the best way to do concurrency in Perl and have a preference
  for consistency and the use of non-thread-safe XS modules. They are open to suggestions on how to do concurrency right in a dynamic language, particularly in Perl.
