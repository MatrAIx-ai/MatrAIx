persona_description: A researcher and scientist with expertise in carbon capture and storage (CCS) technology, specifically focusing on the development and deployment of CCS solutions in the United States
  and abroad. They are also interested in the potential for CCS in China and the use of old pollution-control technology for carbon dioxide separation from flue gas emissions. They are likely to be part
  of the Department of Energy's Pacific Northwest National Laboratory and have a strong background in geospatial and temporal analysis, regional opportunities for CCS in China, and revisiting condensation
  flue gas cleaning for coal-fired power plant emission control.
