  hobbies: '[''Motorcycle restoration'', ''Woodworking'', ''Cooking (experimental soul‑food recipes)'', ''Jazz and R&B listening'', ''Recreational basketball'', ''Hiking'', ''Science‑fiction reading'',
    ''Community volunteering (youth mechanics workshops)'']'
  career_goals: Antonio aims to transition from production worker to shift supervisor within the next two years, leveraging his hands‑on expertise and leadership style. He plans to earn a Six Sigma Green
    Belt certification to lead continuous‑improvement projects that boost efficiency and product quality. Long‑term, he envisions a plant‑manager role where he can shape a collaborative, inclusive work
    culture. In parallel, he is exploring the idea of launching a small consulting firm that helps local manufacturers adopt flexible, lean processes, combining his curiosity for new methods with practical
    implementation skills.
