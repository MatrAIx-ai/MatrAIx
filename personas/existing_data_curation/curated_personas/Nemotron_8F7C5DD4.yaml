  hobbies: '["Fishing on Lake Buchanan","Fly tying","Woodworking and furniture building","Classic Chevrolet truck restoration","Reading Texas frontier history","Gardening","Volunteering at community center
    events","Barbecue grilling for family gatherings","Hiking in Hill Country trails","Listening to classic rock on vinyl"]'
  career_goals: Nicholas aims to transition from managing a single facility to a regional operations leadership role, where he can drive cross-site efficiency initiatives and mentor emerging managers. He
    plans to achieve a Six Sigma Black Belt certification within the next two years and to spearhead the adoption of sustainable practices—such as energy-efficient equipment and waste-reduction programs—across
    the company's Texas operations. Long-term, he envisions establishing a boutique consulting firm that helps small manufacturers adopt lean processes, allowing him to share his practical knowledge while
    maintaining a balanced work-life schedule with his family.
