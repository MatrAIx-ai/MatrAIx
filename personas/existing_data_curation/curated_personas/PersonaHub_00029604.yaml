persona_description: A scientist and inventor who made significant contributions to the development of the telegraph, including the invention of the Morse code and the concept of instantaneous communication.
  He was a professor at New York University, ran for mayor of New York City, and petitioned Congress for funding to build a proof-of-concept system. Morse's life and work were celebrated by Congress with
  a memorial resolution praising his contribution to modern communications.
