  career_goals: William aims to combine his love for hands‑on work with an interest in technology by pursuing a career in agricultural technology or equipment mechanics. He plans to enroll in his high‑school’s
    agricultural program, earn certifications in farm equipment maintenance, and eventually study agricultural engineering or mechanic technology at a community college. In the long term he hopes to become
    a skilled farm equipment technician who can design and maintain efficient irrigation systems, and possibly integrate automated solutions to improve productivity for local growers.
