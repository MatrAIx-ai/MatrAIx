personas:
  professional: William Morenoortiz is a junior‑high student who volunteers after school on his family’s farm, gaining hands‑on experience in sustainable agriculture and crop rotation, applying his practical,
    structure‑oriented mindset and strategic planning skills honed from video games, though they sometimes let a laid‑back attitude cause missed homework deadlines.
  sports: William Morenoortiz plays midfield for the Earlimart Youth Soccer Club, follows the LA Galaxy and the Los Angeles Rams for inspiration, enjoys weekend runs through nearby wetlands for cardio,
    and they balance competitive practice with a relaxed attitude toward fitness, sometimes forgetting to stretch after games.
  arts: William Morenoortiz sketches comic‑style superheroes influenced by Jack Kirby and Stan Lee, listens to Banda El Recodo and Los Tigres del Norte while practicing guitar chords, and they attend the
    annual community Día de los Muertos art exhibit, where they often stay late polishing their drawings.
  travel: William Morenoortiz loves weekend road trips to the nearby wetlands of Kern River Preserve and occasional family vacations to the historic streets of Guanajuato, prefers spontaneous itineraries
    over strict planning, and they dream of backpacking through the Sierra Madre mountains to explore remote birdwatching spots.
  culinary: William Morenoortiz enjoys helping prepare tacos al pastor with pineapple, fresh mango salsa, and homemade guacamole, can expertly dice cilantro and lime wedges, yet they often forget to clean
    the kitchen after cooking and favor ordering pizza on busy school nights.
  core: William Morenoortiz is a practical teen who blends farm‑grown responsibility with a love for strategy games, soccer, and comic art, but they’re notorious for scrambling last‑minute on school projects
    and leaving a trail of half‑finished sketches everywhere.
background:
  cultural: William grew up in a Mexican‑American household in Earlimart, a farming community in Tulare County. His family maintains strong ties to Mexican cultural traditions, celebrating events such as
    Día de los Muertos and Cinco de Mayo, and speaking Spanish at home while also using English at school and in the broader community. The agricultural lifestyle of the region has shaped his daily routine,
    fostering a deep respect for hard work, family responsibility, and community cooperation. These cultural influences blend with the multicultural environment of the Central Valley, giving William a bicultural
    identity that values both his Mexican heritage and his American upbringing.
