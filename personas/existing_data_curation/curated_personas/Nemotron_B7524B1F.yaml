personas:
  professional: Dora Alfonso is a disciplined and compassionate secondary school teacher who leverages data-driven assessment, restorative classroom practices, and bilingual communication to craft differentiated
    curricula for English language learners, mentors new staff, builds community partnerships, and they channel their organized curiosity into a clear path toward school leadership.
  sports: Dora Alfonso pursues a blend of outdoor adventure and community sports, regularly hiking the Trabuco Canyon trails with the Canyon Trails Hiking Club, practicing salsa and folkloric dance at the
    local community center, and cheering on the Los Angeles Lakers and LAFC while they participate in a weekend yoga class at Zen Flow Studio.
  arts: Dora Alfonso’s artistic life revolves around salsa and folkloric dance performances, weekend visits to galleries featuring the works of Georgia O'Keeffe and concerts by Yo‑Yo Ma, and an avid reading
    habit that includes contemporary novels by Marilynne Robinson and educational research articles, all of which they channel into creative teaching methods.
  travel: Dora Alfonso prefers nature‑focused getaways, meticulously planning weekend escapes to Big Bear Lake and annual trips to Kyoto for its gardens, while they budget for occasional cultural festivals
    in Costa Rica and savor roadside vineyards in Tuscany, balancing adventure with family commitments.
  culinary: Dora Alfonso delights in preparing heirloom recipes such as slow‑braised pork shoulder with roasted chilies, herb‑infused corn tortilla tostadas, and a fusion mole ramen, frequently experimenting
    with fresh herbs from their garden and sourcing produce at farmers' markets, while their cooking skill ranges from confident home chef to occasional over‑spicing mishap.
  core: Dora Alfonso blends disciplined leadership with a vibrant love for community, nature, and creative expression, turning curiosity into practical action while maintaining calm resilience.
background:
  cultural: Dora is a Mexican‑American who grew up in a bicultural Southern California household, fluent in both Spanish and English. She maintains strong ties to Mexican traditions such as Día de los Muertos,
    quinceañeras, and family gatherings, and she incorporates these cultural narratives into her teaching to foster respect and community. Active in a local Mexican cultural association, she participates
    in festivals, shares music and stories, and emphasizes values of familismo and respeto in both her classroom and her broader community involvement.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Classroom Management'', ''Bilingual Education'', ''Educational Technology Integration'', ''Data-Driven Assessment'', ''Mentorship
    & Teacher Coaching'', ''Community Outreach'', ''Project-Based Learning'', ''Restorative Practices'']'
  hobbies: '[''Hiking'', ''Mexican Cooking'', ''Salsa Dancing'', ''Community Volunteering'', ''Yoga and Meditation'', ''Gardening'', ''Reading'']'
  career_goals: Dora aims to step into a school leadership role, such as Assistant Principal or Department Chair, where she can shape district‑wide culturally responsive curricula. She plans to secure grant
    funding for after‑school STEM and arts programs that celebrate Mexican heritage, and to establish a mentorship network for early‑career teachers from underrepresented backgrounds. Long‑term, she hopes
    to publish resources on bilingual instruction and become an educational consultant helping schools embed multicultural pedagogy.
