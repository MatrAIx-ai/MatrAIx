personas:
  professional: Cynthia Plummer, a 60‑year‑old veteran elementary and middle‑school teacher transitioning to a STEAM curriculum consultant, leverages her boundless imagination and knack for interdisciplinary
    design to craft project‑based learning experiences that blend robotics, watercolor art, and storytelling, even if her relaxed attitude toward deadlines sometimes leads to last‑minute revisions.
  sports: Cynthia Plummer is a devoted fan of the Boston Red Sox and the New England Patriots, yet she channels most of her energy into seasonal hikes with the Litchfield County Trails Club and weekly gentle
    yoga at the community center, choosing nature over competitive sports.
  arts: Cynthia Plummer fills her days with watercolor studies inspired by Georgia O'Keeffe, curates collages from found objects while listening to Joni Mitchell, and volunteers at the Litchfield Playhouse,
    where her improvisational piano sessions echo the avant‑garde spirit of Philip Glass.
  travel: Cynthia Plummer prefers leisurely road trips across New England, having trekked the White Mountains of New Hampshire and explored the historic streets of Salem, while dreaming of a future artist‑inspired
    pilgrimage to Florence, Italy, though she often books flights at the last minute, reflecting her flexible yet occasionally disorganized travel planning.
  culinary: Cynthia Plummer, an enthusiastic home cook, cultivates rosemary, thyme, and sage in her herb garden to flavor rustic New England clam chowder, homemade quinoa salads, and occasional lavender
    lattes, though she sometimes forgets to defrost ingredients, leading to improvised pantry meals.
  core: Cynthia Plummer is a 60‑year‑old imaginative educator who blends science and art in daily experiments, embraces spontaneous creativity, yet habitually misplaces her keys and relies on coffee to
    jump‑start her scattered schedule.
background:
  cultural: Cynthia was born and raised in a small New England town in Connecticut within a middle‑class, white family of English and Irish ancestry. The region’s cultural emphasis on self‑reliance, community
    service, and public education shaped her values and career choice. She has been active in local civic events, town festivals, and the regional arts council, reflecting New England’s tradition of civic
    participation and modesty. Seasonal outdoor activities such as leaf‑peeping in autumn and apple picking in fall are integral to her lifestyle, while her progressive stance on inclusive education demonstrates
    the evolving, forward‑looking aspect of her cultural identity.
