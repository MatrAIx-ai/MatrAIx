    ''Inclusive classroom practices'', ''Creative problem‑solving'']'
  hobbies: '[''Watercolor painting'', ''Abstract collage art'', ''Photography of New England landscapes'', ''Hiking in Litchfield County'', ''Reading speculative fiction'', ''Piano improvisation'', ''Herb
    gardening'', ''Volunteer work at the town library'', ''Community‑theater attendance'', ''DIY crafts (pottery, quilting, upcycling)'', ''Leading a weekend science club'']'
  career_goals: Cynthia aims to transition from full‑time teaching within the next two to three years while maintaining a flexible schedule as a curriculum consultant specializing in STEAM integration.
    She plans to lead a regional makerspace network that supports after‑school programs, co‑author a series of children’s books that blend scientific concepts with imaginative storytelling, and establish
    a peer‑learning community to mentor early‑career teachers. Her long‑term ambition is to influence district‑wide instructional practices by championing interdisciplinary, inquiry‑driven learning while
    preserving the flexibility and creative freedom she values.
