persona_description: A global citizen advocate who believes in the transformative power of education to build peaceful and sustainable societies, create global citizens for human flourishing, and address
  the demographic and societal challenges of the 21st century. They are passionate about using recent advances in neuroscience to redesign education to promote lifelong learning, critical consciousness,
  social and emotional learning, and pro-social behavior, and believe that education based on this approach can contribute to the achievement of the Sustainable Development Goals (SDGs) and the United Nations'
  Agenda 2030. They are committed to promoting a more interconnected, diverse, and compassionate world, and are willing to challenge the narrow political and economic agendas of countries to achieve this
  goal.
