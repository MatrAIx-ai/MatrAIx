personas:
  professional: Andre Supplice is a veteran plumber‑pipefitter who blends three decades of hands‑on trade mastery with a STEM‑level grasp of fluid dynamics, using their curiosity for emerging smart‑home
    tech and practical mindset to lead complex commercial projects, mentor apprentices, and pursue master pipefitter certification as a springboard toward a green‑focused consulting boutique.
  sports: Andre Supplice is a devoted St. Louis Cardinals fan who spends Sunday afternoons at the ballpark, plays third base for the Golden Age Senior Softball Club, and keeps active with occasional fishing
    excursions on the Mississippi River, while balancing a moderate fitness routine that includes light weight training after games.
  arts: Andre Supplice finds rhythm in the blues and jazz reverberating from the historic Cherokee Jazz Club, where they regularly enjoy recordings by B.B. King and Miles Davis, and they also attend community
    theater productions, believing that live music and performance fuel their creative problem‑solving on the job.
  travel: Andre Supplice favors road trips that blend relaxation and discovery, such as weekend drives to Natchez for river fishing, annual pilgrimages to New Orleans for the Jazz & Heritage Festival, and
    occasional family visits to the Grand Canyon, planning each itinerary around budget-friendly lodging and the availability of local BBQ joints.
  culinary: Andre Supplice cooks Southern barbecue with a seasoned smoker, perfecting dishes like smoked brisket, pulled pork ribs, and collard greens seasoned with garden‑fresh herbs, and they relish pairing
    their meals with homemade cornbread, a dash of hot sauce, and a side of fresh tomato salsa harvested from their own garden.
  core: Andre Supplice blends a lifelong love of pipes, blues, and baseball into a community‑centered, tech‑savvy lifestyle, always juggling a spare wrench, a baseball cap, and a smoker, even if they sometimes
    stay up late tweaking smart‑home water alerts.
background:
  cultural: Andre grew up in the historic African-American neighborhoods of North St. Louis, where family trades and church life shaped his values. His parents emphasized education and skilled craftsmanship,
    encouraging him to pursue a STEM degree while honoring the legacy of Black tradespeople who built the city’s infrastructure. The cultural rhythm of blues, soul food, and community gatherings remains
    integral to his identity. He remains connected to the city’s Black heritage through participation in local festivals, mentorship programs that support Black youth entering the trades, and by sharing
    stories of resilience from the civil‑rights era. This blend of Midwestern pragmatism and rich African-American cultural traditions informs both his professional ethos and his vibrant social life.
attributes:
  skills: '[''Pipefitting'', ''Steamfitting'', ''Welding (MIG/TIG/Stick)'', ''Blueprint reading'', ''Fluid dynamics analysis'', ''Thermodynamics'', ''Building code compliance'', ''Safety inspections'',
    ''BIM/AutoCAD Plant 3D'', ''Project scheduling'', ''Budget management'', ''Team leadership'', ''Apprentice mentorship'', ''Smart-home plumbing integration'', ''Energy-efficient system design'']'
  hobbies: '[''Church community service'', ''Senior softball league'', ''St. Louis Cardinals games'', ''Blues and jazz concerts'', ''Barbecue cooking'', ''Fishing on the Mississippi River'', ''Gardening'',
    ''DIY smart-home projects'', ''Reading technical journals'', ''Volunteering at local vocational schools'']'
  career_goals: While approaching retirement, Andre aims to earn master pipefitter certification and transition into a consulting role where he can advise on large‑scale commercial and industrial projects.
    He hopes to launch a boutique plumbing firm that specializes in green, water‑conserving installations for community centers and local schools. Mentoring the next generation of Black tradespeople is
    a core ambition; he plans to partner with a vocational school to develop a scholarship program. Additionally, Andre aspires to serve on his union’s leadership board to advocate for safety standards
    and career development opportunities for older workers.
