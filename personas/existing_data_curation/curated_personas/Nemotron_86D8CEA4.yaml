personas:
  professional: A budding junior naturalist with a practical mindset, Michael melds their curiosity for adventure and science-fiction novels with hands‑on exploration, cataloguing rocks and sketching wildlife
    during family hikes while also organizing LEGO builds like mini‑research projects.
  sports: An enthusiastic young equestrian and nature enthusiast, Michael rides at the nearby stable on Saturdays, cheers for the regional minor‑league baseball team the Springfield Thunderbirds, and joins
    a community soccer club, the Riverdale Rangers, after school, balancing active play with the methodical focus they bring to LEGO constructions.
  arts: A creative digital builder and animal sketcher, Michael spends afternoons designing elaborate structures in Minecraft and Roblox while also drawing detailed animals inspired by the works of Hayao
    Miyazaki and LEGO master builder Nathan Sawaya, they bridge virtual imagination with real‑world artistry.
  travel: An inquisitive family explorer, Michael has trekked the Blue Ridge Mountains, dreams of witnessing Yellowstone’s geysers erupt, and saves for a summer road trip to the Grand Canyon, preferring
    itineraries that combine guided tours with ample free time for rock‑collecting adventures where they can explore at their own pace.
  culinary: A budding junior chef with a sweet tooth, Michael loves helping their dad roll pepperoni pizza with mozzarella and tomato sauce, snacks on carrot sticks with ranch dip, experiments with campfire‑toasted
    marshmallows, and often whips up a cheesy scrambled‑egg breakfast using cheddar and butter, while they occasionally demand a second slice of chocolate chip cookie.
  core: Michael is a curious, organized ten‑year‑old who balances adventure with practicality, turning every hike into a learning quest while they still cherish LEGO builds and video‑game creativity.
background:
  cultural: Michael grows up in Lingle, a small town in Goshen County, Wyoming, where the cultural backdrop blends traditional Western ranching heritage with close-knit community values. His family's lifestyle
    reflects a mix of agricultural work, participation in county fairs and rodeos, and a strong emphasis on self-reliance, respect for the land, and cooperative community spirit. The local culture, steeped
    in American rural traditions and a modest Christian upbringing, shapes his sense of responsibility, love for the outdoors, and appreciation for both tradition and new ideas.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Basic computer literacy'', ''Animal care'', ''Light farm chores'', ''LEGO building'', ''Problem solving'']'
