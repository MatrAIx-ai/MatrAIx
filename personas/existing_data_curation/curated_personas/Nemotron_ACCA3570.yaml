    teaching'']'
  hobbies: '[''Watercolor painting'', ''Community theater acting'', ''Hiking in the Appalachians'', ''Photography'', ''Reading contemporary fiction'', ''Book club participation'', ''Volunteer work at local
    food pantry'', ''Gardening'', ''Cooking Southern cuisine'', ''Acoustic guitar jam sessions'']'
  career_goals: Ashley aims to earn a formal teaching certification and advance to a lead teacher or curriculum specialist role focused on arts‑infused interdisciplinary programs. She dreams of establishing
    a district‑wide initiative that pairs creative expression with social‑emotional learning, expanding after‑school arts workshops for underserved students. Long‑term, she envisions transitioning into
    school administration to shape inclusive policies and broaden community partnerships across White County schools.
