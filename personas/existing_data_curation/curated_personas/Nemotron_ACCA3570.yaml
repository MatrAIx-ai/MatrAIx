personas:
  professional: Ashley Salla, a 27‑year‑old secondary‑school English teacher, blends classic literature with watercolor‑based project learning, using digital tools to craft flexible, arts‑infused lessons
    while fostering a compassionate, community‑oriented classroom climate.
  sports: Ashley Salla, a 27‑year‑old hiker and community‑theater enthusiast, spends Saturdays tackling Appalachian trail sections with a local outdoor club, cheers for the Tennessee Titans and Nashville
    Predators, and squeezes in yoga classes to keep flexible, preferring group activities over solitary gym sessions.
  arts: Ashley Salla, an avid watercolorist and community‑theater actor, draws inspiration from folk musician Doc Watson and painter Georgia O’Keeffe, captures Appalachian festivals through photography,
    and fuels her book club discussions with works by Toni Morrison and Gabriel García Márquez, weaving these artistic threads into her classroom.
  travel: Ashley Salla favors spontaneous weekend getaways, using credit‑card points to camp in the Great Smoky Mountains, dreaming of a spring road trip to Asheville’s Blue Ridge Parkway and a summer music‑festival
    pilgrimage to New Orleans, all while balancing a modest teaching salary and a desire to stay close to family.
  culinary: Ashley Salla loves cooking Southern comfort food—perfecting fried chicken, collard greens sautéed with smoked turkey, and buttery biscuits—while experimenting with a dash of chipotle in traditional
    shrimp and grits, and they often host potluck dinners where they showcase their garden’s fresh sweet potatoes and heirloom tomatoes.
  core: Ashley Salla, a 27‑year‑old teacher, turns every lesson into a watercolor‑splash of creativity, forgets to file taxes on time, and can never resist a good potluck.
background:
  cultural: Raised in Sparta, Tennessee, Ashley grew up in a close‑knit white Southern community where hospitality, church involvement, and a strong sense of local history are valued. Her family’s traditions
    of community service and storytelling shaped her compassionate outlook, while exposure to regional folk music, Appalachian crafts, and Southern culinary heritage deepened her appreciation for cultural
    expression. Though rooted in these Southern influences, she remains open to diverse perspectives, integrating them into her teaching and personal life.
