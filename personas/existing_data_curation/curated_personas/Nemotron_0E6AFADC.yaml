  hobbies: '[''Bowling league'', ''Co‑ed softball'', ''Hiking in Ocala National Forest'', ''Habitat for Humanity volunteer'', ''DIY home renovation'', ''Woodworking'', ''Fishing'', ''Crossword puzzles'',
    ''Cooking'']'
  career_goals: Amanda aims to become a senior foreman and eventually a superintendent within her union, obtaining a Journeyman Pipefitter certification and OSHA 30‑hour safety certification along the way.
    She plans to complete a bachelor's degree in Construction Management through evening classes to qualify for managerial positions. Long‑term, she aspires to launch her own women‑focused plumbing and
    pipefitting contracting firm that emphasizes sustainable technologies such as solar‑thermal water heating, and she wants to become a certified trainer for the Plumbers & Pipefitters Local 364 apprenticeship
    program to increase female representation in the trade.
