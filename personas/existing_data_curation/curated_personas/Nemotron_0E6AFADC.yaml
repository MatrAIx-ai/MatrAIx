personas:
  professional: Amanda Strothman, a 35‑year‑old pipefitter/steamfitter with AutoCAD expertise, leads on‑site crews through meticulous pipe layout design, welding, and safety compliance while mentoring apprentices,
    embodying a structured yet competitive drive to ascend to senior foreman and eventually launch a women‑focused sustainable plumbing firm, and they relish the challenge of balancing precision with people‑management.
  sports: Amanda Strothman fuels her competitive spirit by playing co‑ed softball on weekends, bowling in the local league, hiking the Ocala trails, cheering for the Orlando Magic and Tampa Bay Buccaneers,
    and maintains a weekly cross‑training routine at the community gym to stay fit for the physically demanding pipefitting job, and they thrive on the camaraderie and challenge of team sports.
  arts: Amanda Strothman unwinds by listening to classic Southern rock from The Allman Brothers and contemporary country hits by Dolly Parton, enjoys weekend movie nights featuring Melissa McCarthy’s comedies,
    and reads the occasional Southern Gothic novel, integrating these cultural touchstones into her social gatherings, and they often share playlists and film recommendations with friends.
  travel: Amanda Strothman prefers meticulously planned road trips that blend outdoor adventure with cultural stops, having trekked the Great Smoky Mountains, explored New Orleans’ culinary scene, and kayaked
    in Costa Rica, while dreaming of hiking the Inca Trail in Peru and soaking in Iceland’s geothermal pools, and they meticulously map each itinerary to maximize both relaxation and exploration.
  culinary: Amanda Strothman, an avid home‑cook, excels at whipping up Southern‑style comfort dishes like crispy fried chicken, creamy collard greens, buttery cornbread, and shrimp‑and‑grits, often seasoning
    her catches of catfish with cayenne and lemon before grilling them for friends and family gatherings, and they love to experiment with spice rubs while sharing meals as a way to bond.
  core: Amanda Strothman balances a disciplined, safety‑first work ethic with a contagious, competitive energy that fuels her love for team sports, hands‑on DIY projects, and a relentless drive to break
    gender barriers in a traditionally male trade, and they consistently channel that drive into mentoring and community service.
background:
  cultural: Amanda grew up in a middle‑class white family in central Florida, where Southern hospitality and the state’s outdoor lifestyle shaped her worldview. Her parents worked in construction trades,
    encouraging an early interest in hands‑on work. She attended a local community college, beginning formal training in pipefitting before joining the Plumbers & Pipefitters Local 364 union. The community’s
    emphasis on self‑reliance, teamwork, and respect for the environment fostered her practical outlook, while active participation in church and neighborhood events reinforced her sociable, outgoing demeanor.
