persona_description: A Dene writer and storyteller who has experienced the impact of residential schools on their community and culture. They have a deep understanding of the stories and experiences of
  the generations who attended residential schools, and have dedicated their writing to sharing these stories with others. They have a passion for education and are committed to using their writing to raise
  awareness about the importance of respecting and preserving Indigenous cultures and histories. They have a unique and personal perspective on the effects of residential schools, and are committed to using
  their writing to educate and inspire others to learn about the history and ongoing impacts of these institutions.
