personas:
  professional: Samuel Smith is a budding game developer who uses Python to script simple chess-inspired puzzles, channels his meticulous planning into detailed game design documents, and lets his vivid
    imagination drive the narrative art, all while maintaining a disciplined work routine despite his tendency toward self-criticism.
  sports: Samuel Smith prefers low-key physical activities like weekend skateboarding at the local skate park, occasional intramural soccer with friends, and follows the New England Patriots and Hartford
    Wolf Pack avidly, yet treats fitness as a secondary chore, often opting for a brisk walk after coding marathons to clear their mind.
  arts: Samuel Smith immerses themselves in the world of speculative illustration, drawing inspiration from the surreal graphics of H.R. Giger, the animated storytelling of Hayao Miyazaki, the instrumental
    scores of Max Richter, and the classic noir aesthetics of vintage Batman comics, while regularly visiting the Wadsworth Atheneum for exhibits and participating in a community youth art workshop to showcase
    their digital paintings.
  travel: Samuel Smith dreams of a road trip down Route 66 after saving up for a family-friendly RV adventure, has already taken weekend trips to Boston’s Museum of Fine Arts and New York City’s comic book
    stores, and hopes to attend the 2025 San Diego Comic-Con to meet creators, balancing their wanderlust with school commitments and a limited budget.
  culinary: Samuel Smith enjoys crafting simple comfort dishes like creamy mac and cheese with breadcrumb topping, experimenting with homemade ramen broth flavored with miso and shiitake mushrooms, and
    occasionally attempts elaborate desserts such as pumpkin pie spiced with ginger, but often burns the toast when staying up late, revealing a comedic lack of kitchen timing.
  core: Samuel Smith is a thoughtful teen who channels boundless imagination into code and sketchbooks, wrestles with chronic worry, and occasionally forgets to eat while chasing artistic perfection.
background:
  cultural: Samuel was raised in a middle‑class, white family in East Hartford, Connecticut, a suburb with a mix of historic New England roots and a diverse, working‑class community. His family celebrates
    traditional American holidays such as Thanksgiving and Christmas, and they place a strong emphasis on education, self‑reliance, and personal responsibility. Growing up in Hartford County, Samuel has
    been exposed to the region's cultural heritage, including local museums, public libraries, and community art programs, which have nurtured his artistic interests. While his household maintains conventional
    values, his parents encourage curiosity and support his involvement in creative and academic pursuits, providing him with access to drawing supplies, a modest computer for coding, and a supportive environment
    that balances independence with familial guidance.
