  career_goals: Samuel aspires to merge his artistic vision with technology, aiming to become a concept artist or visual designer for video games and interactive media. He dreams of attending a specialized
    high school for the arts, followed by a college program in graphic design or digital illustration, where he can refine his technical skills and develop a professional portfolio. In the longer term,
    he hopes to launch his own indie game studio, producing narrative‑driven games that blend striking visual storytelling with innovative gameplay mechanics. He also considers a parallel path in scientific
    illustration, where his love for abstract concepts and precision could contribute to educational materials and research publications.
