persona_description: A scientist researching the effects of environmental stressors on plankton populations, specifically focusing on the Antarctic and Subantarctic regions. The scientist is interested
  in studying the trophic webs of these regions, particularly the contrast between classic and microbial trophic webs, as well as the carbon fluxes through the pelagic food webs and to the deep-sea. The
  scientist has a deep understanding of the impacts of global change on these regions and is actively seeking to understand how these impacts affect the populations of plankton.
