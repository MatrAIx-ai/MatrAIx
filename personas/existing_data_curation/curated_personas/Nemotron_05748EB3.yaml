  hobbies: '["Hiking in the Rockies", "Wildlife photography", "Reading historical non‑fiction", "Volunteering at the local animal shelter", "Gardening", "Home brewing craft beer", "Quiet yoga practice"]'
  career_goals: Ana aims to transition from a first‑line supervisor to a regional operations manager within the next five years, overseeing multiple stores and standardizing best practices across locations.
    She plans to earn a certification in Retail Management and Data Analytics to deepen her expertise in data‑focused retail strategies. Long‑term, she aspires to lead initiatives that integrate sustainable
    inventory practices and enhance employee well‑being, combining her structured leadership style with her compassionate commitment to team harmony.
