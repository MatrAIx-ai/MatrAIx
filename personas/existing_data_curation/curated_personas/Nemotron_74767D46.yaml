  career_goals: She dreams of a future where she can combine her love for animals, her interest in science, and her desire to help others. At present, she imagines becoming a veterinarian, caring for pets
    and wildlife. She also expresses interest in becoming a teacher or a community youth leader, where she can use her sociable, cooperative nature to support classmates. Ultimately, she hopes to work in
    a field that lets her explore new ideas while making a positive, practical impact on people and the environment.
