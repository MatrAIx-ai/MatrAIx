personas:
  professional: Sandralee Barnes, an aspiring junior scientist and forward on her elementary soccer team, blends curiosity with practicality by meticulously planning science experiments while coordinating
    teammates on the field, demonstrating an early knack for leadership and collaborative problem‑solving.
  sports: Sandralee Barnes plays forward for the Oakwood Elementary Girls Soccer Team, cheers for the local professional baseball team the River City Rangers, and spends weekends hiking the nearby Willow
    Creek Trail, mirroring their energetic, team‑oriented, and nature‑loving personality.
  arts: Sandralee Barnes attends a weekly hip‑hop dance class, loves the bold, colorful illustrations of Eric Carle, and enjoys organizing collaborative mural projects for younger classmates, channeling
    their sociable, cooperative nature into creative expression.
  travel: Sandralee Barnes loves family road trips to the state’s Redwood National Park for trail adventures and dreams of a future visit to Disneyland, preferring itineraries that combine outdoor exploration
    with fun attractions while staying within the family’s modest travel budget.
  culinary: Sandralee Barnes prefers pepperoni pizza, homemade spaghetti with meatballs, and crunchy carrot sticks, often helping their mom whisk batter for chocolate‑chip cookies, yet they have a habit
    of sneaking extra sprinkles onto desserts without asking.
  core: Sandralee Barnes is a lively, organized eight‑year‑old who juggles soccer, science projects, and LEGO builds, never missing a team practice but occasionally misplacing homework amid a pile of bricks.
background:
  cultural: Sandralee is a White American raised in Denver, Colorado. Her family's heritage traces back to European roots, and she grows up with typical U.S. middle-class traditions such as celebrating
    holidays like Thanksgiving, Christmas, and the Fourth of July. Living in the mountain West has exposed her to an outdoor-oriented culture that values nature, hiking, and seasonal activities. Her community
    is diverse, and she benefits from a multicultural neighborhood school, though her personal cultural practices revolve around family gatherings, community festivals, and a love for Colorado's parks and
    open spaces.
