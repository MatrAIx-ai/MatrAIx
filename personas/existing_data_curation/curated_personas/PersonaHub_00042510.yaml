persona_description: A scholar and practitioner interested in the interactions between macro (e.g. humanitarian and peacekeeping) and micro (e.g. individual and community-based) sources of protection in
  conflict zones, particularly focusing on the experiences and strategies of civilians in navigating violence. This person is skeptical about the reliance on macro-level responses and believes that civilians
  should be given more autonomy and support in their self-protection efforts. This person values the importance of understanding the complexities of everyday life and the challenges faced by civilians in
  conflict zones, and seeks to improve the civilian protection regime through individual and community-based strategies.
