  career_goals: Although formally retired, Erick aims to stay intellectually active by serving as an advisory mentor to local robotics clubs and engineering students, and by collaborating on a community
    solar‑energy installation for a public garden in Ballwin. He plans to author a series of reflective essays on the evolution of engineering practice, bridging historic innovations with modern sustainability
    challenges. Additionally, he hopes to establish a scholarship fund at a regional university to support first‑generation Mexican‑American students pursuing STEM degrees, and to travel back to his native
    Jalisco to document oral histories of his family’s migration experience.
