  career_goals: He envisions a future as a civil engineer or robotics programmer, drawn to building structured solutions and working with technology. Matthew also feels a deep desire to serve his community,
    imagining a role where he can mentor younger kids and help improve neighborhood safety and opportunities. Over the next few years, his ambition is to excel in STEM subjects, join the school’s robotics
    club, and develop leadership skills that will prepare him for a career that blends technology innovation with community service.
