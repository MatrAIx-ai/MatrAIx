personas:
  professional: Matthew Jenkins is an aspiring junior robotics enthusiast who delights in designing simple machines with LEGO; they channel their organized, sociable nature into leading group projects and
    ensuring every step is meticulously planned.
  sports: Matthew Jenkins is an enthusiastic member of the local Peewee basketball league who idolizes the Washington Wizards, practices three times a week at the community center; they also volunteer as
    a team captain to organize drills and promote teamwork.
  arts: Matthew Jenkins is a vibrant choir singer at his church, where he performs gospel classics and beloved soul tunes alongside favorite artists like Marvin Gaye and H.E.R.; they also enjoy hip‑hop
    beats from Kendrick Lamar during homework breaks.
  travel: Matthew Jenkins is a curious traveler who loves family trips to Washington, DC’s monuments, Disney World’s Magic Kingdom, and weekend outings to Baltimore’s Inner Harbor; they prefer itineraries
    that blend structured sightseeing with spontaneous playground explorations.
  culinary: Matthew Jenkins is a budding home‑chef who loves whipping up mac and cheese and banana bread with his mom, scoops up chicken wings seasoned with a hint of smoky paprika; they always add a side
    of fresh mango slices for a sweet finish.
  core: Matthew Jenkins blends a love for orderly planning with boundless energy, making them the go‑to organizer of neighborhood block parties who never misses a beat on the basketball court or in the
    choir, even if they sometimes lose their favorite LEGO piece under the couch.
background:
  cultural: Matthew comes from an African‑American family rooted in Prince George’s County, a community known for its vibrant Black culture, strong church ties, and emphasis on family and neighborhood cohesion.
    Family gatherings often feature shared meals, storytelling, and music that reflect generations of cultural heritage. He participates in local cultural festivals and church activities, where traditions
    such as gospel singing, dance, and community service are celebrated. This background nurtures his sense of responsibility toward others, his love for rhythm and music, and his pride in contributing
    positively to his neighborhood.
