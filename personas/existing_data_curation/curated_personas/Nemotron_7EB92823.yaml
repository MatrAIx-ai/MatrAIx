  career_goals: Although currently not part of the formal workforce, Edward aims to channel his practical expertise into community service. He aspires to establish a volunteer workshop at a local community
    center where he can mentor youth and adults in hands‑on skills such as woodworking and basic home repairs. He also hopes to launch a modest side business offering affordable handyman services to seniors
    in East Baton Rouge Parish, allowing him to maintain financial independence while giving back. Long‑term, Edward dreams of authoring a guidebook that blends his practical knowledge with reflections
    on sustainable living in the Gulf South.
