  career_goals: Although retired, David remains driven by personal projects. He aims to complete a series of twelve large‑scale watercolors that chronicle the seasonal changes along Saginaw Bay, and to
    self‑publish a memoir that intertwines his life story with philosophical reflections on aging and curiosity. He aspires to mentor a few interested teenagers in model shipbuilding through a community
    workshop, and to organize a modest local exhibition showcasing his paintings and the work of his mentees. Embracing his love of novelty, David has set a goal to learn basic Python programming to create
    algorithmic art pieces that merge his analytical side with his artistic passions.
