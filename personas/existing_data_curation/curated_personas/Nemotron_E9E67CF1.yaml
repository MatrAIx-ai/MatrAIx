  hobbies: '[''Reading (historical nonfiction, classic literature, self-help)'', ''Journaling'', ''Nature walks & birdwatching'', ''Photography'', ''Herb gardening & succulent care'', ''Cooking Tex-Mex
    & baking'', ''Knitting'', ''Jigsaw puzzles'', ''Meditation/Yoga'']'
  career_goals: Ellen aims to channel her research abilities and love of solitary work into a flexible, remote position that lets her maintain a low‑stress lifestyle. Over the next two years she plans to
    complete a certification in Content Writing and build a portfolio of articles on local history, gardening, and wellness. Simultaneously, she hopes to pursue a bachelor's degree in Psychology part‑time,
    with the long‑term ambition of becoming a certified mental‑health peer supporter and offering informal counseling to friends and community members. She also envisions eventually turning her herb garden
    into a small home‑based micro‑business, selling potted herbs and homemade spice blends online.
