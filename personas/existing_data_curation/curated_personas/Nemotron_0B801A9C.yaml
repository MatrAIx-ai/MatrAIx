personas:
  professional: Maria Resto, a 19‑year‑old aspiring community health worker, blends meticulous organization and dependable problem‑solving with a competitive drive to lead school health fairs, while their
    natural skepticism pushes them to verify every protocol before implementation.
  sports: Maria Resto, a committed member of the Santa Isabel Lady Spikers volleyball squad, balances a competitive edge with disciplined training sessions that they schedule like a spreadsheet, while cheering
    for the Cangrejeros de Santurce during baseball season, yet occasional anxiety spikes cause them to miss a practice or two.
  arts: Maria Resto, an avid fan of salsa legend Marc Anthony and bomba pioneer Bomba y Plena Ensemble, spends evenings dancing to plena and bomba rhythms while also enjoying occasional streaming of Ricky
    Martin’s pop hits, and they keep a scrapbook of concert flyers as a reminder of the vibrant cultural scene that fuels their creative spark.
  travel: Maria Resto, an organized traveler who plans each trip in a detailed Excel itinerary, prefers weekend escapes to nearby coastal gems such as Culebra and Vieques for hiking, dreams of exploring
    Cartagena’s historic streets and Gran Canaria’s beaches, but balances these adventures with a modest student budget that often forces them to seek volunteer‑exchange programs instead of costly airfare.
  culinary: Maria Resto, a skilled home cook, delights in preparing traditional dishes like arroz con gandules, alcapurrias, and coquito using aromatic sofrito, ripe plantains, and a pinch of adobo, and
    they often host neighborhood gatherings where the scent of their mofongo draws friends and family alike.
  core: Maria Resto, a 19‑year‑old who thrives on routine yet fuels evenings with salsa spins, channels a competitive streak into community health projects while silently battling chronic worry, and can’t
    resist devouring a late‑night slice of alcapurrias when a deadline looms.
background:
  cultural: Maria was born and raised in Santa Isabel, Puerto Rico, a close‑knit coastal community known for its sugarcane heritage and lively local festivals such as the Fiesta de la Parroquia. She comes
    from a family that values Catholic traditions, respect for elders, and strong community bonds. Family gatherings often feature traditional foods like lechón asado, arroz con gandules, and coquito, and
    the house is filled with music ranging from bomba and plena to modern reggaetón. Maria’s upbringing emphasized helping neighbors, participating in town parades, and preserving cultural customs, shaping
    her sense of identity and her desire to give back to her community.
