  hobbies: '[''Salsa and merengue dancing'', ''Volleyball'', ''Cooking traditional Puerto Rican dishes'', ''Coastal hiking'', ''Listening to plena and bomba music'', ''Journaling'', ''Volunteer tutoring'']'
  career_goals: Maria aims to pursue a stable, community‑focused career that blends her love for routine with her sociable nature. She plans to enroll in a community college program for nursing or health
    promotion, with the long‑term goal of becoming a community health worker or registered nurse serving Santa Isabel. She also envisions opening a small family‑run bakery or café after gaining experience,
    allowing her to share her culinary talents while maintaining the reliable, practical work environment she values.
