persona_description: A historian who specializes in the study of ancient Brittany, particularly the history and archaeology of the region. She has a deep interest in the发掘和分析的细节，包括石棺的结构、年代、用途和文化意义，以及它与古代文化和宗教信仰的联系。她对古迹的保护和修复工作有着浓厚的兴趣，并且热衷于探索和恢复古迹的原始面貌。
