persona_description: A professor of history who specializes in the study of African American women's history and religion. Her research focuses on the intersection between religion, civil rights, and women's
  rights in American history. She has spent more than a decade researching her book, which narrates the religious commitment and community activism of African American women from the time of slavery up
  to the present. Her research has been groundbreaking and has opened new avenues for research based on previously unexamined sources. She is known for her expertise in the history of African American women
  and religion and has made significant contributions to the field.
