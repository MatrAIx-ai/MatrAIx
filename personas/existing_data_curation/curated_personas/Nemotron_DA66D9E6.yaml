  hobbies: '[''Community theatre'', ''Abstract painting'', ''Photography'', ''Hiking in the San Bernardino Mountains'', ''Playing tennis'', ''Cooking and hosting dinner gatherings'', ''Reading speculative
    fiction and marketing psychology'', ''Attending live music concerts'', ''Volunteering at local festivals'', ''Collecting vintage vinyl records'']'
  career_goals: Looking ahead, Patrick aims to transition from corporate analysis to a consultative role that serves small and medium‑sized businesses in the Fontana area. He plans to launch a boutique
    consulting practice that offers affordable market insight and creative branding workshops. Mentorship is a key ambition; he wants to train the next generation of analysts through informal apprenticeships
    and community seminars. Additionally, he hopes to author a guidebook on applying imaginative thinking to market research, leaving a lasting legacy of both expertise and encouragement for lifelong learning.
