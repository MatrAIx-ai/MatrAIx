  hobbies: '[''Gardening (vegetables and flowers)'', ''Knitting, quilting and crochet'', ''Church fellowship and gospel singing'', ''Reading historical fiction and biographies'', ''Crossword puzzles and
    sudoku'', ''Listening to classic blues and gospel music'', ''Participating in small senior‑center craft workshops'']'
  career_goals: 'Although retired from formal employment, Jacqueline’s ambitions focus on legacy and service. She aims to compile a memoir that records her life story, her family’s migration journey, and
    the cultural traditions she has preserved, hoping it will become a resource for future generations. She also aspires to expand the senior‑center knitting circle she leads, inviting a few neighborhood
    youth to learn the craft and thereby fostering intergenerational bonds. Keeping her health stable is a personal priority: she plans to maintain a daily walking routine and attend regular check‑ups to
    stay independent. Finally, she wishes to deepen her digital fluency so she can assist her grandchildren with school projects and stay actively involved in online community forums for seniors.'
