personas:
  professional: Jacqueline Keith is a retired caregiver and community steward whose seasoned knack for organization and gentle flexibility shines as they coordinate church charity drives, lead a senior
    gardening group, and mentor youth in quilting, blending curiosity for new digital tools with time‑tested practical wisdom.
  sports: Jacqueline Keith enjoys low‑impact fitness through a daily sunrise walk in their garden, participates in the senior yoga class at the community center, and faithfully cheers for the local minor
    league baseball team, the River City Runners, often attending games with a pocket‑sized program and a homemade snack.
  arts: Jacqueline Keith finds joy in gospel choir rehearsals that feature songs by Mahalia Jackson and contemporary spirituals, spends afternoons listening to classic blues legends like B.B. King and Robert
    Johnson while knitting, and channels their artistic flair into quilting patterns inspired by historic textile motifs.
  travel: Jacqueline Keith prefers short, well‑planned road trips to historic river towns such as Natchez and Savannah, enjoys visiting family in neighboring states during off‑peak seasons, and dreams of
    a gentle river cruise along the Mississippi once their health permits, balancing their wanderlust with the comfort of a familiar routine.
  culinary: Jacqueline Keith excels at preparing classic Southern comfort dishes, especially collard greens simmered with smoked ham hocks, flaky buttermilk biscuits, and sweet potato pie, often adjusting
    recipes to reduce sodium while preserving rich flavors, and they delight in sharing home‑cooked meals at church potlucks and family gatherings.
  core: Jacqueline Keith, a 96‑year‑old garden‑loving quilt‑maker and memoirist, melds steadfast routine with quiet curiosity, navigating daily worries through gospel music, community service, and a disciplined
    blend of tradition and modest digital exploration.
background:
  cultural: Jacqueline’s cultural identity is rooted in the African‑American experience of the 20th century. Her parents were part of the Great Migration, moving from the rural South to upstate New York
    in search of industrial work and better educational opportunities. This history instilled in her a deep respect for perseverance, community solidarity, and the role of the church as a cultural anchor.
    Family oral traditions, gospel music, and seasonal cooking have been central to her upbringing, reinforcing a sense of belonging and continuity. In Lewiston, she is an active member of a close‑knit
    Black community that values mutual aid, storytelling, and intergenerational mentorship. Her cultural background informs her values of hospitality, collective responsibility, and the preservation of
    heritage, which she expresses through her cooking, crafts, and dedication to documenting family histories.
