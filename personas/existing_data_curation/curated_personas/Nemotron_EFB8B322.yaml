personas:
  professional: Young Jalili, a 64‑year‑old senior project manager, blends Waterfall rigor with Agile flexibility, harnesses Power BI and Jira to visualize complex timelines, and infuses design‑thinking
    inspired by Durham’s art community into cross‑functional teams, mentoring emerging managers with a skeptical yet fair eye while steering community‑development initiatives toward creative, inclusive
    outcomes; they are known for building high‑performing teams that balance structure with artistic curiosity.
  sports: Young Jalili follows the Durham Bulls baseball team and the Carolina Hurricanes hockey club, joins the local Durham Tennis Club for weekly matches, hikes the Eno River Trail each spring, and maintains
    a moderate fitness routine that balances competitive chess strategy with occasional cycling rides; they view physical activity as a structured yet enjoyable counterbalance to their project‑driven schedule.
  arts: Young Jalili immerses themselves in Durham’s vibrant arts scene, curating a modest collection that includes paintings by Ai Weiwei and Kerry James Marshall, attending nightly productions at the
    Durham Playhouse featuring actors such as John Stadler, and listening to music by Miles Davis and Sufjan Stevens, and they let these visual and auditory experiences shape their design‑thinking approach
    in professional projects.
  travel: Young Jalili prefers thoughtfully curated cultural trips, balancing weekend escapes to Asheville’s Blue Ridge Mountains with longer journeys to Kyoto’s historic temples, the Amalfi Coast’s cliffside
    villages, and the deserts of Oman, and they plan itineraries using a blend of travel‑agent expertise and meticulous personal research to capture photographic opportunities while budgeting conservatively
    to fund both artistic pursuits and family visits.
  culinary: Young Jalili enjoys cooking at an advanced level, often preparing a fragrant lamb shank braised with garam masala, pomegranate molasses, and fresh cilantro, alongside a Southern‑inspired smoked
    collard greens salad tossed with toasted pecans and a dash of maple‑soy glaze, and they experiment with fusion techniques that blend family traditions with local North‑Carolina ingredients such as sweet
    potatoes and smoked pork.
  core: Young Jalili balances meticulous project oversight with a restless artistic curiosity, swapping spreadsheets for a camera lens at sunset, occasionally forgetting to water their garden while chasing
    the perfect photograph, and they habitually negotiate every art purchase down to the last dollar.
background:
  cultural: Born to South Asian parents who immigrated to the United States in the 1970s, Asim grew up balancing the values of filial respect, community service, and a strong emphasis on education with
    the broader American cultural milieu. He is fluent in English and Urdu, and he regularly participates in the local South Asian association, helping organize cultural festivals that showcase music, dance,
    and visual arts. His heritage informs his collaborative style — prioritizing consensus, hospitality, and a holistic view of success — while his long residence in Durham has immersed him in a diverse,
    academically vibrant environment. This blend of South Asian familial traditions and Southern U.S. community engagement shapes his worldview, work ethic, and his passion for integrating cultural expression
    into professional projects.
