  career_goals: He aspires to transition from direct delivery to a strategic advisory role within the next three years, where he can mentor emerging project managers and influence organizational culture
    toward creativity and inclusivity. He aims to lead large‑scale community development initiatives in Durham that combine infrastructure improvement with public art and cultural enrichment, leveraging
    his project expertise and artistic appreciation. He also hopes to author a guidebook on integrating design‑thinking into traditional project management, deliver keynote talks at regional conferences,
    and eventually serve on a nonprofit board that supports South Asian diaspora cultural programs.
