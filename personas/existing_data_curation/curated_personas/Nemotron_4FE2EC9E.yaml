  hobbies: '["Softball (team sport)", "Salsa dancing", "Volunteer coordinating library programs", "Baking and cooking", "Gardening", "Hiking (Rocky Fork State Park)", "DIY home décor", "Reading contemporary
    fiction", "Church youth outreach"]'
  career_goals: Elaine aims to secure a full‑time administrative or program‑coordination position within a community‑focused organization, such as a regional health clinic, nonprofit, or municipal department.
    She plans to complete her associate’s degree in Business Administration within the next year, then pursue certification in project management to enhance her qualifications. Her long‑term ambition is
    to advance to an office manager or senior program coordinator role where she can design and oversee initiatives that improve local services. Elaine values a workplace that offers clear structure, predictable
    routines, and supportive mentorship, which she believes will help her manage stress while allowing her to contribute her organizational strengths and sociable energy.
