  hobbies: '["Cooking", "Barbecue Grilling", "Woodworking", "Hunting", "Fishing", "Gardening", "Reading Historical Non-Fiction", "Volunteering at Community Food Bank", "Watching Oklahoma City Thunder Basketball",
    "Home Improvement Projects"]'
  career_goals: Robert aims to progress from managing a single location to overseeing multiple sites as a regional food‑service director within the next five years. He plans to obtain a Certified Hospitality
    Administrator credential and pursue a master's degree in Hospitality Management to deepen his strategic expertise. Long‑term, he envisions launching a consulting firm that helps schools and community
    centers optimize their nutrition programs, leveraging his education background and managerial experience. Throughout his career growth, he seeks roles that provide clear performance metrics, stable
    work‑life balance for his family, and opportunities to mentor emerging managers.
