  career_goals: Gabriela aspires to move into senior executive leadership—ideally as a Chief Operating Officer for a large health system—where she can drive system‑wide innovation, integrate AI‑enhanced
    patient engagement tools, and champion equity initiatives for underserved Hispanic communities. She plans to complete her bachelor’s degree in health administration and obtain an MBA, while earning
    professional certifications such as CCHP and Lean Six Sigma Black Belt. Her long‑term ambition includes establishing a mentorship program for Mexican‑American women in health‑care management and publishing
    a guide on culturally competent operational best practices.
