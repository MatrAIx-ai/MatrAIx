personas:
  professional: Carrie Whaley is a cardiovascular technologist whose exacting attention to echocardiography detail, calm assistance during cardiac catheterizations, and improv‑honed confidence enable them
    to thrive in high‑stress environments while spearheading data‑driven quality‑improvement initiatives.
  sports: Carrie Whaley leads the Lake St. Clair Runners club, competes in local 5K races, hikes the Lake St. Clair trail every weekend, and supports the Detroit Lions, Detroit Tigers, and Detroit Pistons
    while also coaching a recreational volleyball team at the community center.
  arts: Carrie Whaley shines on stage with the Detroit Improv Collective, channeling quick‑wit inspired by Tina Fey and Key & Peele into weekly sketches, and regularly attends performances at the Fox Theatre
    and concerts featuring local jazz saxophonist Michael Miller.
  travel: Carrie Whaley curates a Midwest travel scrapbook filled with road trips to Mackinac Island, the Badlands, and Chicago’s Art Institute, and dreams of trekking Norway’s fjords and exploring New
    Zealand’s South Island, balancing budget‑friendly getaways with occasional splurges on boutique lodges.
  culinary: Carrie Whaley favors nutrient‑dense meals like grilled salmon with quinoa and kale, avocado toast topped with smoked salmon, and a weekly indulgence of Detroit‑style pizza, while meal‑prepping
    on Sundays and experimenting with seasonal farm‑fresh berries and dark chocolate for desserts.
  core: Carrie Whaley blends a surgeon’s precision with an improv performer’s flair, turning each cardiac procedure into an organized showcase, even if it means a perpetual coffee cup pile on the night
    shift.
background:
  cultural: Carrie grew up in a middle‑class Midwestern family in Macomb County, with ancestral roots in German and Irish immigration. Her upbringing emphasized community involvement, punctuality, and a
    strong work ethic typical of the region’s cultural values. She was raised attending local church events and school activities that fostered teamwork and volunteerism. These Midwestern sensibilities,
    combined with a familial appreciation for education and practical problem‑solving, shape her balanced approach to professionalism, compassion, and personal ambition.
attributes:
  skills: '[''Echocardiography operation'', ''Cardiac catheterization assistance'', ''ECG interpretation'', ''Stress‑test administration'', ''Patient monitoring and education'', ''Medical equipment maintenance'',
