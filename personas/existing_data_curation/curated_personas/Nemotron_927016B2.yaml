  hobbies: '[''Volunteering at community health fairs'', ''Improvisational theater'', ''Leading a weekly running club'', ''Hiking local trails'', ''Travel scrapbook curation'', ''Listening to science podcasts'',
    ''Hosting a medical‑history book club'']'
  career_goals: Driven by her achievement‑oriented mindset, Carrie aims to earn the Registered Vascular Technologist (RVT) certification within the next two years and progress to a senior technologist or
    team‑lead role at her hospital. She envisions spearheading quality‑improvement projects that streamline cardiovascular testing workflows and reduce patient wait times. Long‑term, she aspires to pursue
    a master’s degree in health informatics to integrate data‑driven solutions into cardiac care and become a recognized speaker at national cardiovascular conferences, contributing to best‑practice guidelines.
