personas:
  professional: Todd Ritcey, an aspiring junior game developer who blends their love of environmental science and LEGO engineering to prototype educational Scratch games about Lake Michigan ecosystems,
    applying both their curiosity for new ideas and their practical focus on functional, testable code.
  sports: Todd Ritcey, a forward on their local youth hockey league and a regular at Muskegon’s skate park, fervently supports the Detroit Red Wings and follows the Detroit Tigers, while they also participate
    in seasonal roller‑blading clubs at the dunes during summer.
  arts: Todd Ritcey, an avid LEGO builder and comic‑book sketcher who draws inspiration from Stan Lee’s dynamic panels and the whimsical storytelling of Pixar’s Toy Story, spends weekends replicating scenes
    from Percy Jackson in miniature form, and they curate a personal collection of vintage superhero comics.
  travel: Todd Ritcey, a nature‑curious explorer who has camped at Sleeping Bear Dunes, road‑tripped to Chicago’s Museum of Science and Industry, and dreamed of kayaking the Apostle Islands, prefers meticulously
    planned family trips that mix outdoor adventure with educational stops, yet they often feel anxious about packing too much gear.
  culinary: Todd Ritcey, a budding kitchen helper who proudly grills their own catfish fillets from Lake Michigan alongside their dad, fixes a quick pepperoni pizza with extra cheese after skate sessions,
    and occasionally experiments with DIY mac and cheese topped with crunchy bacon bits, though they sometimes forget to clean up the mess, leaving sticky footprints on the kitchen floor.
  core: Todd Ritcey, a curious 11‑year‑old who juggles LEGO engineering, hockey, and coding while they battle occasional worry spells, and who can’t resist a good comic book binge and an extra slice of
    pizza.
background:
  cultural: 'Todd was born and raised in Muskegon, a small city on Michigan''s western shoreline. His family is of German-American and Irish-American ancestry, reflecting the broader settlement patterns
    of the Midwest. Growing up, he has been immersed in typical Midwestern values: a strong work ethic, politeness, community involvement, and an appreciation for the outdoors. The Great Lakes shape much
    of his daily life—family outings often involve boat rides, fishing, and beach activities. Local traditions such as Friday night high-school sports, county fairs, and holiday gatherings (Thanksgiving
    dinner with roasted turkey, pumpkin pie, and an emphasis on gratitude) form a core part of his upbringing. His parents emphasize the importance of education, respect for neighbors, and contributing
    to community service projects, which align with his cooperative yet occasionally assertive personality.'
attributes:
  skills: '[''Scratch programming'', ''Basic Python concepts'', ''LEGO Technic building'', ''Reading comprehension'', ''Math problem solving'', ''Team hockey'', ''Comic drawing'', ''Basic keyboard playing'']'
  hobbies: '[''Hockey'', ''Fishing'', ''LEGO building'', ''Scratch coding'', ''Reading science-fiction'', ''Comic drawing'', ''Exploring dunes and nature trails'', ''Skateboarding'']'
  career_goals: Looking ahead, Todd hopes to combine his curiosity about how things work with his desire for a practical, hands-on career. He dreams of becoming a mechanical engineer who designs eco-friendly
    boats or water-related technologies, inspired by the Great Lakes that border his hometown. He also imagines studying marine biology to understand lake ecosystems. In the short term, he aims to join
    his school's robotics club, earn a badge in the Boy Scouts, excel in science fairs, and keep his grades high so he can attend a reputable high school that offers strong STEM programs. He sees himself
    eventually attending a university in Michigan or the Midwest to pursue an engineering degree, with a long-term goal of contributing to sustainable water resource projects that benefit his community.
