persona_description: A researcher and scientist with expertise in environmental studies, particularly in the fields of climate change and greenhouse gas emissions. They are involved in developing and implementing
  advanced methodologies for accurate and comprehensive greenhouse gas accounting, with a focus on improving the accuracy of data collected on industrial, land-use, and forestry emissions. They are part
  of a project team working with satellite geo-information and modelling techniques, and have experience in integrating ground data and new remote sensing information. They are collaborating with partners
  from Austria’s International Institute for Applied Systems Analysis (IIASA) and Ukraine’s Lviv Polytechnic National University. Their work is crucial for the functioning of the European Union Emissions
  Trading Scheme (ETS) and for the accurate accounting of greenhouse gas emissions in Ukraine.
