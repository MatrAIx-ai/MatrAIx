persona_description: A historian or archaeologist who is fascinated by ancient empires and their coinage, particularly those of the Roman Empire. They are deeply curious about the craftsmanship and historical
  context of these coins and are interested in learning more about the lives and legacies of the emperors who minted them. They appreciate the beauty and symbolism of these coins as a representation of
  the power and influence of the Roman Empire and are drawn to the intricate details and craftsmanship that are often found on ancient coins. They are also likely to be interested in the broader historical
  context of the Roman Empire and the events that led up to the reign of Aurelian, the emperor depicted on the coin.
