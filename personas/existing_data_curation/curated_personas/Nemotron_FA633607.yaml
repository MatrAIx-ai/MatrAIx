  career_goals: Arnaldo aims to advance to a senior program manager role within the next three years, leading larger, multi‑departmental initiatives that drive operational efficiency for regional organizations.
    He plans to earn his PMP certification and deepen his expertise in Agile transformation to guide companies through digital modernization. Long‑term, he envisions establishing his own consultancy focused
    on helping small businesses in rural Oklahoma adopt best‑practice project management and sustainable growth strategies. He also aspires to mentor emerging project managers, contribute to local economic
    development, and serve on the board of a community development organization.
