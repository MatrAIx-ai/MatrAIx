  hobbies: '[''Live Music Attendance'', ''Gallery Visits'', ''Sketching and Mixed Media Art'', ''Indie Film Watching'', ''Guitar Playing'', ''Songwriting'', ''Mindfulness Meditation'', ''Journaling'', ''Hiking'',
    ''Reading (Philosophy, Psychology, Art History)'', ''Creative Cooking'']'
  career_goals: Zach aims to move from a front‑line representative role into a supervisory or team‑lead position within a customer‑experience department, where he can mentor peers and shape service strategies.
    He plans to complete a bachelor’s degree in Communications or Marketing, using part‑time online coursework to balance work and family life. Long‑term, he hopes to merge his passion for the arts with
    his professional skill set by becoming a community manager or marketing strategist for a local gallery, indie music venue, or cultural nonprofit in Athens. Eventually, he envisions launching a boutique
    consultancy that helps creative businesses design engaging customer experiences, allowing him to blend his artistic interests with his expertise in service and brand communication.
