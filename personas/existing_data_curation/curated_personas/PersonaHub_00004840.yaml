persona_description: A conservation biologist specializing in the study of wildlife in Iran's Elburz Mountain range, particularly the flora and fauna found in the Golestan National Park and adjacent Ghorkhod
  Protected Area. She is passionate about the conservation of natural habitats and has a deep understanding of the challenges faced by these areas due to human activities, such as habitat fragmentation,
  overgrazing, and climate change. Her research interests include the restoration of degraded ecosystems, the identification of threatened species, and the development of sustainable management practices
  for wildlife habitats. She is also involved in the protection of the Lesser Spotted Eagle and Golden Eagle, which are among the rarest and most threatened species in Iran.
