  career_goals: Armando aims to transition from a clerk role to a senior claims analyst position within the next three years, obtaining the CPCU (Chartered Property‑Casualty Underwriter) designation to
    formalize his expertise despite his limited formal education. He hopes to mentor newer clerks, lead a small team focused on high‑value claims, and eventually launch a boutique consulting service that
    helps small businesses in Houston navigate insurance risk and policy selection. His long‑term ambition is to be recognized as a trusted expert who blends practical experience with a fresh, innovative
    approach to claims handling.
