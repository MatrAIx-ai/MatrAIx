persona_description: A teacher who is responsible for providing comprehensive, scientifically based reading instruction to students in a classroom setting. The teacher is expected to use a variety of instructional
  strategies and tools to assess and evaluate student reading progress, and to design and implement interventions to help students of all ages and proficiency levels improve their reading skills. The teacher
  is also encouraged to use strategies that teach reading and writing in the students' native language and English at the same time, and to use fluency, phonemic awareness, and phonics instruction to help
  students become more proficient readers. The teacher is expected to be knowledgeable about the latest research in reading instruction and to be able to integrate this knowledge into their teaching practice.
