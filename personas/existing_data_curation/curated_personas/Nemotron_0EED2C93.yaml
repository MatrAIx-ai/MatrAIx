  career_goals: Anadelia aims to complete her bachelor's degree—potentially in Business Administration or Early Childhood Education—to open pathways into roles that leverage her bilingual and interpersonal
    strengths, such as a community liaison for a nonprofit serving Hispanic families in the Houston area. In the near term, she plans to obtain a culinary certification and launch a modest home-based catering
    service featuring authentic Colombian cuisine, blending her love of cooking with entrepreneurial aspirations. Over the next five years, she envisions balancing a rewarding career with her family life
    while contributing to the cultural vitality of the local Colombian community.
