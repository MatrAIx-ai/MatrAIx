personas:
  professional: Anadelia Ortiz, 24, is a bilingual event‑planner‑in‑training who applies their curiosity for community storytelling with practical budgeting and marketing know‑how, orchestrating nonprofit
    gatherings while balancing a thriving social life.
  sports: Anadelia Ortiz stays fit by hiking Brazos Bend State Park’s trails, joining the local sunrise run club, dancing salsa and bachata weekly, and cheering for their favorite national soccer team and
    the Houston Dynamo during MLS season, blending their competitive spirit with community camaraderie.
  arts: Anadelia Ortiz expresses their creativity through salsa and bachata nights, captures candid moments with a vintage Nikon at family gatherings, devours contemporary fiction like Sally Rooney’s "Normal
    People," and follows musicians such as Bad Bunny and classic crooner Frank Sinatra, weaving diverse influences into their artistic identity.
  travel: Anadelia Ortiz prefers budget‑friendly road trips that mix nature and culture, having explored the historic streets of Lisbon, the bustling markets of Marrakech, and weekend hikes in Texas Hill
    Country, all planned with a flexible itinerary that leaves room for spontaneous photo‑ops, reflecting their love of adaptable adventure.
  culinary: Anadelia Ortiz’s kitchen revolves around mastering arepas, sancocho, and empanadas, seasoning with achiote, guasca, and fresh cilantro, while they balance a home‑catering side hustle with late‑night
    experiments that sometimes leave a lingering scent of cumin on their sofa.
  core: Anadelia Ortiz is a sociable 24‑year‑old planner who dances, cooks, and photographs their way through life, juggling tight budgets and spontaneous cravings, all while habitually misplacing their
    favorite coffee mug.
background:
  cultural: Born into a Colombian family, Anadelia grew up speaking Spanish at home while navigating an English-dominant environment in Texas. Her upbringing emphasized close family ties, hospitality, and
    the vibrant traditions of Colombia, such as music, dance, and festive meals during holidays like Día de la Independencia (July 20) and Navidad. In Sugar Land, she blends these roots with the multicultural
    fabric of the community, participating in local Hispanic celebrations, maintaining connections with relatives in Colombia through regular visits and video calls, and preserving the values of respect,
    cooperation, and community service inherited from her heritage.
