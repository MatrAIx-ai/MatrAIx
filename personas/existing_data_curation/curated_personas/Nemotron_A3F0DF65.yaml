  hobbies: '[''Crossword puzzles'', ''Sudoku'', ''Jigsaw puzzles'', ''Strategy board games (Chess, Settlers of Catan)'', ''Running (5K training)'', ''Reading non‑fiction (business, psychology, true‑crime)'',
    ''Personal journaling'', ''Budgeting and financial planning'', ''Baking'', ''Urban photography'']'
  career_goals: Amber aims to progress from her current surveillance officer position to a shift supervisor role within the next two years, followed by a promotion to security manager at a regional casino.
    She plans to earn the Certified Protection Professional (CPP) credential and specialized gaming compliance certifications to strengthen her expertise. Long‑term, Amber envisions transitioning into corporate
    risk and compliance, leveraging her business background to become a director of security strategy for a hospitality or entertainment group. She is also motivated to mentor new guards, implement data‑driven
    efficiency improvements, and lead initiatives that enhance overall safety and operational integrity.
