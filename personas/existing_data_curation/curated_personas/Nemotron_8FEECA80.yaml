  career_goals: Larry dreams of becoming a multimedia artist who can blend storytelling with technology, envisioning a future as an animator or video game designer. He is also fascinated by architecture
    and hopes to study engineering to design innovative, sustainable spaces. In the short term, he aims to produce an animated short film for his school’s art showcase, win a regional science fair with
    a robotics project, and secure a spot at a specialized STEM‑arts magnet high school. He plans to build a strong portfolio of artwork and coding projects to apply for scholarships and internships that
    will guide him toward his creative‑technical career path.
