personas:
  professional: Donne Mixon, a veteran mobile equipment mechanic with three decades of hands‑on experience, blends methodical diagnostics and inventory mastery with an abstract artistic flair, delivering
    custom paint finishes and inventive solutions while mentoring apprentices and aiming for Master Mechanic certification and a future shop‑manager role.
  sports: Donne Mixon, an avid supporter of the local minor‑league baseball team and a weekend participant in a senior softball league, channels mechanical enthusiasm into a membership with the town’s classic‑car
    rally club, regularly attending the annual vintage truck show and cheering for the regional soccer team, the Highlanders.
  arts: Donne Mixon, whose oil‑painting studio is filled with abstract canvases inspired by gears and vines, draws artistic inspiration from Jackson Pollock, Hokusai’s wave motifs, and the kinetic sculptures
    of Alexander Calder, while also curating a personal collection of sci‑fi graphic novels and attending monthly maker‑fair workshops to exchange ideas with fellow creators.
  travel: Donne Mixon, a road‑trip aficionado, plans detailed itineraries that combine visits to automotive museums such as the Henry Ford Museum, Maker Faire events in San Francisco, and tranquil garden
    retreats in the Pacific Northwest, favoring a vintage RV conversion for weekend getaways while staying within a moderate budget.
  culinary: Donne Mixon, an enthusiastic garden‑to‑table cook, savors seasonal grilled vegetable medleys, herb‑infused olive oil drizzles, and the occasional smoked brisket, experimenting with flavors as
    meticulously as they do with oil paints, and keeps a well‑stocked spice rack featuring smoked paprika, cumin, and fresh basil.
  core: Donne Mixon, a 56‑year‑old mechanic‑artist, engineers eco‑friendly retrofits by day, paints abstract gear‑landscapes by night, and balances meticulous budgeting with occasional indulgences, all
    while wrestling with a chronic worry streak and a passion for mentoring the next generation.
background:
  cultural: Donne grew up in a middle‑class, white American family in the suburbs of Long Island, with roots tracing back to Irish and English ancestry common in the Northeastern United States. Her upbringing
    emphasized hard work, self‑reliance, and community involvement, values that were reinforced by the tight‑knit neighborhoods of Suffolk County. While she celebrates traditional American holidays such
    as Thanksgiving and the Fourth of July, she has also been exposed to the cultural diversity of the greater New York area, fostering an appreciation for varied perspectives. This blend of regional heritage
    and exposure to a multicultural environment has shaped a pragmatic yet open‑minded outlook, allowing her to balance the practicality of her trade with a genuine curiosity for artistic and abstract pursuits.
attributes:
  skills: '[''Vehicle diagnostics'', ''Hydraulic system repair'', ''Pneumatic system troubleshooting'', ''Electrical wiring and control module repair'', ''Preventive maintenance planning'', ''Technical
    documentation'', ''Parts inventory management'', ''Workshop safety compliance'', ''Custom automotive painting'', ''Apprentice mentoring'']'
  hobbies: '[''Oil painting'', ''Sketching mechanical designs'', ''Model kit building'', ''Reading science‑fiction novels'', ''Gardening'', ''Volunteer teaching at vocational school'', ''Attending maker
    fairs and community art workshops'']'
  career_goals: Donne aims to achieve Master Mechanic certification and transition into a lead shop manager role within the next two years, overseeing a team of technicians and implementing streamlined
    maintenance workflows. She is passionate about incorporating emerging eco‑friendly technologies into mobile equipment repair, such as electric power‑train retrofits. Long‑term, she envisions launching
    a boutique side business that offers artistic customizations for commercial vehicles, merging her mechanical expertise with her love of art. Additionally, she hopes to develop a community outreach program
    that provides hands‑on training for youth interested in trades, allowing her to pass on her knowledge while fostering the next generation of skilled mechanics.
