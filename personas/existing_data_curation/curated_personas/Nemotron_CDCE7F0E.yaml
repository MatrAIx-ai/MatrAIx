  career_goals: Jacqueline aims to advance to a regional sales manager position within the next three to five years, where she can lead larger teams and shape salesstrategy across multiple markets. She
    plans to enroll in an MBA program focused on Operations Management to deepen her business acumen and to lead cross‑functional initiatives that streamline processes and improve customer satisfaction.
    Additionally, she aspires to become a mentor for emerging sales professionals, champion diversity and inclusion initiatives within her organization, and eventually influence corporate policy to support
    equitable career development for underrepresented groups.
