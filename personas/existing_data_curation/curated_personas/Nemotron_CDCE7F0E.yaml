personas:
  professional: Jacqueline Treadwell is a strategic sales planner for a non‑retail service firm who leverages Salesforce, Power BI, and a meticulously organized workflow to turn data into quarterly revenue
    targets, while balancing a methodical, results‑driven style with an empathetic, coaching‑focused leadership approach.
  sports: Jacqueline Treadwell tracks her fitness through morning yoga and Pilates sessions, plays in a local co‑ed recreational softball league during spring, runs the 5 K charity race with the city’s
    chapter of the Running Club, and tunes into the Atlanta Falcons and the Chicago Bulls as her go‑to professional teams for weekend viewing parties with close friends.
  arts: Jacqueline Treadwell sings alto in her church choir, devotes evenings to reading Toni Morrison, Zora Neale Hurston, and Jesmyn Ward, enjoys the jazz stylings of Nina Simone and the soulful gospel
    of Andra Day, and attends quarterly performances at the local symphony where she especially loves the works of composition by John Williams.
  travel: Jacqueline Treadwell prefers meticulously planned trips that blend historic immersion with quiet relaxation, having spent long weekends exploring the cobblestone streets of Savannah, the antebellum
    homes of Charleston, and the tea fields of Kyoto, while her bucket list includes a solo pilgrimage to the civil‑rights historic sites of Birmingham and a wellness retreat in the Finger Lakes.
  culinary: Jacqueline Treadwell’s kitchen revolves around soul‑food staples like smoked turkey collard greens, sweet‑potato casserole, and shrimp and grits, which she prepares with fresh herbs from her
    modest garden—basil, thyme, and cilantro—while she experiments with spice blends of smoked paprika and cayenne, and she delights in sharing these dishes over candlelit dinners with a circle of close
    friends.
  core: Jacqueline Treadwell blends drill‑sergeant precision in her sales career with a quiet love for soulful music, historic literature, and meticulously organized self‑care rituals, often juggling spreadsheets,
    yoga mats, and crossword puzzles in equal measure, while occasionally indulging in late‑night meals that derail her otherwise disciplined routine.
background:
  cultural: Jacqueline is a Black woman raised in Warner Robins, Georgia, a community shaped by the nearby Robins Air Force Base and a strong Southern tradition. Her family’s roots trace back to the civil‑rights
    era, instilling a deep sense of pride in African‑American history and resilience. Growing up, she experienced a blend of Southern hospitality, church‑centered community life, and the discipline associated
    with a military‑influenced environment. These experiences fostered an appreciation for storytelling, gospel and jazz music, soul‑food cuisine, and intergenerational gatherings. Jacqueline actively participates
    in local Black cultural organizations, values the transmission of heritage through mentoring and community service, and navigates her identity with both Southern warmth and a keen awareness of the racial
    dynamics that shape her world.
