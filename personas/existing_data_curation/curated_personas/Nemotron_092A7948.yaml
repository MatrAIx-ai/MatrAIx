  career_goals: Although retired, Jacqueline is focused on building a lasting legacy for her community and family. She aims to compile and publish a family cookbook that weaves together recipes with stories
    of her ancestors, serve as a senior advisor on health and wellness for the Roanoke local government, train as a certified hospice volunteer, and teach quilting workshops at the community center. Additionally,
    she hopes to become a featured speaker for the Roanoke African‑American Heritage Society and mentor emerging leaders within her church outreach programs.
