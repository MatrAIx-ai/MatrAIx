personas:
  professional: Jacqueline Spann, a retired community liaison turned senior health advisor, applies her meticulous budgeting, event‑planning expertise and competitive drive to organize wellness workshops
    and mentor emerging leaders, while her cautious skepticism keeps her projects grounded in realistic outcomes.
  sports: Jacqueline Spann favors gentle morning walks in Shenandoah Valley parks, participates in the Roanoke Valley senior walking club, and keeps an eye on the Washington Nationals baseball season, cheering
    loudly during games at the local sports bar while debating statistics with bridge partners.
  arts: Jacqueline Spann weaves stories into vibrant quilts inspired by Gee’s Bend masters while listening to Mahalia Jackson and Louis Armstrong, attends monthly church choir rehearsals performing classic
    gospel hymns, and finds solace in the novels of Toni Morrison and the poetry of Maya Angelou.
  travel: Jacqueline Spann enjoys carefully planned road trips to historic Southern sites like Savannah and Charleston, cherishes annual pilgrimages to Washington, D.C.’s National Museum of Civil Rights
    History, and dreams of a leisurely cruise to Ghana to trace her family’s migration roots, though health worries often delay her departure.
  culinary: Jacqueline Spann, an accomplished soul‑food cook, perfects collard greens simmered with smoked turkey, sweet‑potato pie spiced with cinnamon, and gumbo rich with okra and andouille, and she
    meticulously documents each recipe and the accompanying family stories in a leather‑bound notebook, yet she occasionally burns the cornbread crust when rushing between garden chores.
  core: Jacqueline Spann blends relentless curiosity with disciplined pragmatism, channeling a competitive edge and a touch of lingering worry into a life of community service, quilting, and preserving
    family recipes for future generations.
background:
  cultural: Jacqueline’s cultural background is rooted in the African‑American experience of the American South. Born and raised in Virginia during the desegregation era, she grew up in a close‑knit Black
    community where church, family, and food were central pillars. Her family’s oral history traces back to ancestors who migrated from the rural South during the Great Migration, and she maintains traditions
    of soul‑food cooking, storytelling, and participation in local celebrations such as Juneteenth and the annual Roanoke Black Heritage Festival. She values the communal support of the Black church, intergenerational
    family bonds, and the preservation of Southern Black cultural practices.
