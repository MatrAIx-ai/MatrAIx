  career_goals: Allen dreams of becoming a scientist‑inventor who can merge his love of art and abstract ideas. He imagines himself exploring space as an astronaut or astrophysicist, designing innovative
    tools that help people understand complex concepts, and later illustrating those ideas in children’s books. His long‑term ambition is to create visual narratives that inspire other quiet, curious minds
    to explore science and creativity.
