personas:
  professional: Katharine Wehr, a dedicated teaching assistant at a Butler County elementary school, combines her love of routine with a pragmatic approach to lesson planning, effortlessly managing gradebooks,
    Google Classroom, and differentiation for special‑needs learners while flexibly stepping in when classroom chaos erupts.
  sports: Katharine Wehr, an avid member of the local prairie‑trail hiking club and occasional yoga practitioner, roots for the Kansas City Chiefs and the Kansas City Royals, and prefers low‑impact weekend
    runs over competitive sports, embracing community fitness events that fit her routine‑driven yet flexible lifestyle.
  arts: Katharine Wehr, a quiet creative who knits and quilts while listening to Bob Dylan and Joan Baez, finds inspiration in classic folk tunes and the narrative depth of historical fiction, often attending
    the small‑town community theater’s productions of classic plays like "Our Town" and collecting vintage folk vinyl.
  travel: Katharine Wehr, a weekend‑trip planner who favors short, road‑trip getaways to places like the Tallgrass Prairie Preserve and the historic town of Santa Fe, balances her love of structured itineraries
    with spontaneous detours to farmers‑markets, and dreams of a longer cultural tour of New England’s colonial sites when finances allow.
  culinary: Katharine Wehr, a home chef who perfects sourdough rye using wild‑foraged rosemary and fresh garden vegetables, enjoys roasting beet and carrot salads with goat cheese, and treats herself to
    occasional farm‑to‑table dinners featuring locally raised pork and heirloom tomatoes.
  core: Katharine Wehr is a routine‑loving educator who couples practical garden‑to‑bread rituals with a flexible, easy‑going approach to finances and self‑care, balancing community service, quiet creativity,
    and occasional impulsive indulgences.
background:
  cultural: Katharine was raised in the heart of rural Kansas, where Midwestern values of practicality, self‑reliance, and community stewardship shape daily life. Her family’s cultural roots trace back
    to German and English settlers who arrived in the Great Plains in the late 1800s, a heritage reflected in seasonal traditions such as homemade preserves, farmhouse gatherings, and a strong work ethic.
    Growing up in Leon and the broader Butler County area, she has been immersed in a close‑knit community centered around the local church, school events, and county fairs. This background reinforces her
    preference for routine, modesty, and a collaborative spirit, while also encouraging a respect for education and service to others.
attributes:
  skills: '[''Lesson planning'', ''Classroom management'', ''Student tutoring'', ''Grading and assessment'', ''Curriculum support'', ''Special education accommodations'', ''Instructional technology (Google
