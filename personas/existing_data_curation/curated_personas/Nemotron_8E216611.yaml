  hobbies: '[''Gardening'', ''Sourdough baking'', ''Quilting'', ''Reading historical fiction'', ''Volunteering at the public library'', ''Attending church potlucks'', ''Hiking prairie trails'', ''Yoga'',
    ''Crocheting'']'
  career_goals: Katharine aims to transition from her teaching‑assistant role to a fully certified elementary teacher within the next two to three years. She plans to obtain her state teaching license and
    an endorsement in special education to broaden her instructional repertoire. Long‑term, she envisions taking on a lead teacher position or becoming a curriculum coordinator for the Butler County school
    district, where she can design practical, routine‑driven lesson plans that serve diverse learners. She also hopes to mentor new teaching assistants, sharing her pragmatic classroom strategies and fostering
    a supportive, collaborative school culture.
