personas:
  professional: Mitchell Lattimore, a 13‑year‑old budding technologist, combines a love for structured teamwork on the school soccer field and marching band drumline with a knack for designing simple robots
    in the local robotics club, making them a natural future engineer who thrives on clear rules and collaborative problem‑solving.
  sports: Mitchell Lattimore, a midfielder on the Maryland Heights Soccer Club, follows the St. Louis City SC and the St. Louis Cardinals, and spends weekends hiking the Ozark trails to keep fit while balancing
    school responsibilities.
  arts: Mitchell Lattimore drums in the school marching band, devours graphic novels such as *Naruto* and *Adventure Time*, and streams music from Imagine Dragons and the *Minecraft* soundtrack, shaping
    a rhythmic creativity that fuels their storytelling.
  travel: Mitchell Lattimore loves family road trips to Meramec State Park for weekend hikes, dreams of exploring Disney World in Florida and the historic streets of Prague, and prefers planning itineraries
    that blend scheduled stops with spontaneous detours while staying within a modest budget.
  culinary: Mitchell Lattimore favors St. Louis‑style pizza topped with Provel cheese, mixes hot sauce into mac and cheese, enjoys cooking simple pancakes from a YouTube tutorial, and often adds peanut
    butter to smoothies for extra protein.
  core: Mitchell Lattimore is a structure‑loving, team‑focused 13‑year‑old who balances soccer, drums, robotics, and video games, with a penchant for over‑planning, occasional snack‑sprees, and late‑night
    LEGO sessions.
background:
  cultural: Mitchell was raised in Maryland Heights, a suburban community in St. Louis County, Missouri. His family reflects the typical Midwestern middle‑class upbringing, with an emphasis on community
    involvement, school activities, and practical values. He attends a public elementary school that encourages participation in sports, music, and STEM clubs. Local traditions such as cheering on the St. Louis
    Cardinals, celebrating holidays with church gatherings, and attending county fairs are part of his life. This environment nurtures his reliable, cooperative nature and his appreciation for organized
    group activities.
