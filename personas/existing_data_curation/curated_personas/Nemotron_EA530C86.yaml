  career_goals: Mitchell dreams of graduating high school with a strong emphasis on science and math, then pursuing a degree in civil engineering so he can design safe, functional community spaces like
    parks and bike lanes. He also entertains the idea of becoming a high school science teacher, where he could combine his love for structured learning with his desire to help others succeed. In the shorter
    term, he aims to become a team captain on his soccer team and take on a leadership role in his school's robotics club, building experience in teamwork and problem‑solving.
