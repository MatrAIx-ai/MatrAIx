  career_goals: Shane aims to turn his hands-on abilities into a stable career. He is exploring apprenticeships in electrical or HVAC trades that combine his love of practical problem solving with a clear
    path to certification. Simultaneously, he is considering a part-time associate degree in computer networking at a local community college, hoping to qualify for entry-level IT support roles. His long-term
    ambition is to secure a job that offers a mix of field work and occasional office tasks, allowing him to stay active, maintain flexibility, and keep learning new technologies. He also hopes to eventually
    start a side business offering affordable tech repair services to his community.
