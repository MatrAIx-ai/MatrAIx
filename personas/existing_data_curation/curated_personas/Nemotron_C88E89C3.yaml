personas:
  professional: Shane Long is a budding trades enthusiast who merges hands‑on experience repairing radios and custom‑building PCs with a growing knowledge of electrical and HVAC systems, using their curiosity‑driven
    yet pragmatic approach to quickly diagnose problems and explain solutions to friends, positioning them for a future apprenticeship and an entry‑level IT support role.
  sports: Shane Long enjoys skateboarding at the local Boston skate park, follows the New England Revolution and Boston Bruins, and frequently joins friends for weekend hikes along the coastal trails of
    Cape Cod during the summer.
  arts: Shane Long frequents intimate Boston venues like The Middle East, plays acoustic guitar to classic rock staples such as Led Zeppelin and Fleetwood Mac, and streams live concerts of The Black Keys,
    drawing inspiration from their gritty, analog sound for personal music sessions.
  travel: Shane Long prefers spontaneous road trips along the New England coastline, especially the lighthouse‑lined cliffs of Acadia National Park and the historic streets of Providence, while dreaming
    of a future backpacking adventure through the Scottish Highlands to experience rugged landscapes similar to their hometown trails.
  culinary: Shane Long loves crafting homemade pizza with a crisp thin crust, topping it with pepperoni, fresh mozzarella, and a drizzle of garlic‑infused olive oil, often experimenting with smoked gouda
    and jalapeños for a spicy twist, and also enjoys classic Boston clam chowder on a chilly weekend.
  core: Shane Long is a curiosity‑driven tinkerer who balances a love for hands‑on tech repair with a laid‑back, slightly chaotic lifestyle, often swapping late‑night gaming marathons for impromptu skate
    sessions and occasional pizza‑induced procrastination.
background:
  cultural: Shane grew up in Lynn, Massachusetts, a city with a strong New England working-class identity and a mix of cultural influences. His family traces roots to Irish and English heritage, and he
    was raised with traditions such as celebrating St. Patrick's Day and a strong emphasis on community. The local public school environment exposed him to a diverse peer group, fostering an appreciation
    for different perspectives while maintaining a suburban American cultural outlook. He identifies with the regional sports culture - rooting for the Boston Red Sox, New England Patriots, and attending
    local high school events - while also valuing the neighborhood's emphasis on self-reliance and mutual support.
