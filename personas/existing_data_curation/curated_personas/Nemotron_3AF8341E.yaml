  hobbies: '[''Bowling league'', ''Recreational softball'', ''Classic car restoration'', ''Historical society volunteering'', ''Hiking the Allegheny trail system'', ''Local pub trivia nights'', ''Business
    strategy workshops'', ''Mentoring at Boys & Girls Club'']'
  career_goals: Joshua aims to move into a supervisory role within the next two years, targeting a Customer Service Team Lead position at the regional level. He plans to earn a Certified Customer Service
    Professional (CCSP) credential and spearhead a project that reduces average handling time by 15 percent through refined workflow procedures. In the longer term, he envisions launching a boutique consulting
    practice that helps small businesses in rural Pennsylvania streamline their customer service operations, leveraging his practical, data‑driven approach and competitive drive for excellence.
