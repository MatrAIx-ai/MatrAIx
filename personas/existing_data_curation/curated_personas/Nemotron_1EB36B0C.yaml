  career_goals: Daniel hopes to formalize his education by earning a GED and taking evening courses in business management and visual arts at a nearby community college. Within his current employer he aims
    to move into a supervisory role, eventually becoming a store manager. His longer‑term ambition is to open a small boutique‑café that doubles as an art gallery, showcasing work by local artisans and
    providing a community gathering space. He also wants to mentor younger coworkers, sharing his customer‑service expertise and encouraging them to pursue their own creative interests.
