personas:
  professional: Thomas Stroud is an aspiring junior game developer who uses Scratch to craft simple, logic‑driven games, applying their methodical, organized approach that stems from a love of building
    LEGO models and exploring science club projects.
  sports: Thomas Stroud is a dedicated member of the Riverdale Rovers junior soccer team who practices twice weekly, enjoys weekend hikes on nearby trail loops, and cheers for the national soccer squad,
    balancing competitive play with a love for outdoor exploration.
  arts: Thomas Stroud channels their creative spark by sketching original comic strips inspired by classic superheroes from Stan Lee, practicing piano pieces by Yiruma, and immersing themselves in adventure
    novels by Jules Verne, showcasing a blend of visual and musical artistry.
  travel: Thomas Stroud plans family weekend getaways to nearby state parks such as Pine Ridge, dreams of exploring the Smithsonian Air and Space Museum in Washington, D.C., and eagerly collects travel
    postcards, favoring well‑structured itineraries over spontaneous trips.
  culinary: Thomas Stroud favors homemade pizza with pepperoni and olives, enjoys cooking simple spaghetti Bolognese and chocolate chip pancakes, often whipping up fruit smoothies with bananas and strawberries,
    and proudly boasts a growing repertoire of easy DIY recipes honed through weekend kitchen experiments.
  core: Thomas Stroud is a methodical, curiosity‑driven 11‑year‑old who balances coding, LEGO building, and comic art, yet secretly hoards stickers and sometimes streams video games late into the night,
    revealing a playful yet disciplined personality.
background:
  cultural: Thomas grows up in a suburban middle‑class family in Escondido, California. His cultural background is rooted in mainstream American traditions, with influences from the diverse Southern California
    environment. He celebrates holidays such as Thanksgiving, Christmas, and the Fourth of July, and enjoys local community events. The proximity to the Pacific coast and nearby natural parks fosters an
    appreciation for outdoor activities and environmental stewardship. While his family’s heritage is primarily European‑American, the multicultural surroundings of San Diego County have introduced him
    to a variety of culinary foods and cultural festivals, shaping a balanced, inclusive outlook.
