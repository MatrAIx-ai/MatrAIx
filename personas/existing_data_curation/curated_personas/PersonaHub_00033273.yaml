persona_description: A researcher or engineer who specializes in the field of microscopy and optical imaging. They are interested in developing and improving illumination systems for microscopes, particularly
  those that use the Koehler-Illumination principle. They are familiar with the technical aspects of optics, particularly the principles of refraction, dispersion, and aberrations. They are also familiar
  with the applications of Koehler-Illuminations in various fields such as biology, chemistry, and physics. They are interested in optimizing the performance of Koehler-Illumination systems for specific
  applications, such as back-lighting for specimens in microscopy. They are also interested in understanding the limits of the Koehler-Illumination principle and developing new approaches to improve its
  performance.
