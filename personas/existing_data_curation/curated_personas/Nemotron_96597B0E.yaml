  hobbies: '[''Watercolor Painting'', ''Visiting Art Galleries and Museums'', ''Community Theater'', ''Gardening'', ''Hiking in Riverside County'', ''Cooking International Cuisine'', ''Reading Contemporary
    Fiction'', ''Reading Business Leadership Books'', ''Bridge Club'', ''Volunteering for Local Arts Programs'']'
  career_goals: Brianna aims to advance to a plant manager or operations director role within the next few years, focusing on implementing sustainable manufacturing practices and expanding employee development
    programs. She aspires to obtain Six Sigma Black Belt certification and become a recognized speaker at industry conferences, sharing insights on inclusive leadership and integrating artistic creativity
    into production environments. In the longer term, she envisions mentoring the next generation of supervisors and potentially consulting for small manufacturers in the Riverside region.
