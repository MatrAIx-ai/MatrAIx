  career_goals: Charlie aims to finish high school with strong grades and earn a certification in emergency medical services, with the long-term goal of becoming an EMT or firefighter in Montgomery County.
    He is drawn to the structured, team-oriented environment of emergency services, where his calm resilience and practical mindset can help his community. He also hopes to study at a community college
    for a degree in public safety or criminal justice, and eventually take on a leadership role within the local fire department or a community outreach program.
