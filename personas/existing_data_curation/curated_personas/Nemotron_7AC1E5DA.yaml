personas:
  professional: Brent Pratt is a seasoned restaurant server turned shift supervisor who leverages three decades of precise order accuracy, cash handling, and strict food safety adherence to create a predictably
    smooth dining floor, while their practical, structured mindset translates into calm conflict resolution and a no‑nonsense training style for new hires, and they consistently enforce a calm, orderly
    atmosphere during busy shifts.
  sports: Brent Pratt is a devoted fan of the New Orleans Saints and the Mississippi State Bulldogs, spends Friday evenings cheering on the local high school football team while maintaining personal fitness
    through early‑morning walks, weekend fishing trips on Lake Washington, and a membership in the county’s senior bowling league, and they treat each game as a chance to test their competitive spirit in
    friendly wagers.
  arts: Brent Pratt finds comfort in gospel hymns by the Blind Boys of Alabama, classic country anthems from Garth Brooks and Dolly Parton, and the storytelling of Southern historian Shelby Foote, and they
    occasionally attend community theater productions starring regional talent like Billy Earl, letting their competitive nature shine in bridge tournaments after the shows.
  travel: Brent Pratt enjoys low‑key road trips that blend Southern culinary stops—such as the oyster shacks of New Orleans, barbecue joints in Austin, and historic mansions in Charleston—with a dream of
    a springtime rail journey through the Blue Ridge Mountains and a future Caribbean cruise, and they meticulously plan itineraries to balance adventure with the budget constraints of a soon‑to‑retire
    lifestyle.
  culinary: Brent Pratt, a confident home chef, delights in perfecting classic Southern dishes such as fried catfish with a crispy cornmeal crust, collard greens simmered with smoked ham hocks, and buttery
    cornbread, often incorporating garden‑grown tomatoes, okra, and sweet potatoes, and they occasionally compare their results with upscale farm‑to‑table restaurants to refine flavor profiles.
  core: Brent Pratt is a structured, worry‑prone veteran server who balances a love of predictable routines with a competitive streak in bridge, a secret habit of humming gospel refrains while polishing
    silverware, and they never miss a chance to double‑check the day’s receipts before leaving work.
background:
  cultural: Brent grew up in rural Mississippi, steeped in a culture of Southern hospitality, tight‑knit community ties, and traditional values. His family background is rooted in small‑town farm life,
    where a practical work ethic, self‑reliance, and respect for routine were emphasized. As a white Mississippian, he retains an appreciation for regional cuisine, gospel and country music, and the seasonal
    rhythms of agricultural life. These cultural influences shape his straightforward communication style, his comfort with structure, and his preference for fostering a welcoming yet orderly atmosphere
    for both colleagues and patrons.
attributes:
  skills: '[''Customer service'', ''Food safety and sanitation'', ''Point-of-sale (POS) operation'', ''Cash handling'', ''Order accuracy'', ''Time management'', ''Team coordination'', ''Conflict resolution'',
    ''Basic inventory tracking'', ''Practical problem solving'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''Southern cooking'', ''Reading historical nonfiction'', ''Playing cards (bridge/poker)'', ''Watching high school football'', ''Gardening'', ''Volunteer work at
    local community center'']'
  career_goals: Brent aims to solidify his role as a reliable shift supervisor at his current restaurant, taking on responsibilities for training new hires and overseeing nightly operations. He wants to
    create a more structured work environment that reduces the stress often experienced by frontline staff, reflecting his preference for predictability. While prioritizing long‑term stability and health
    benefits as he approaches retirement, he also harbors a long‑term dream of opening a modest family‑style café featuring classic Southern dishes, provided it can be managed within a predictable schedule.
    In the near term, his primary ambition is to secure consistent part‑time work that offers reliable income and the peace of mind needed to manage his health and personal finances.
