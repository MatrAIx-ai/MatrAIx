persona_description: A Carnegie Mellon University architecture student who is interested in green building design and sustainable architecture. She is a fan of using plants to improve indoor air quality
  and reduce the need for mechanical filtration. Her project involves designing an airport terminal extension that uses aeroponic plants to filter and clean the polluted outdoor air before it enters the
  indoor ventilation system. She is scheduled to propose her idea to the architecture firm of SOM (Skidmore, Owings, and Merrill) who designed JFK's T4 Terminal Extension.
