persona_description: A clinical toxicologist at the Joint Pathology Center in Maryland, specializing in the study of metal toxicity and its effects on veterans with shrapnel embedded in their bodies. She
  is responsible for monitoring the health of veterans who have been exposed to shrapnel and identifying any potential adverse health effects. Her group's research involves reanalyzing urine samples from
  shrapnel victims to detect high metal concentrations and corresponding health issues. If a certain metal increases to potentially toxic levels or if X-rays reveal that fragments are dissolving, she will
  suggest that the patient consult a surgeon to determine the benefits of removal outweighing the risks.
