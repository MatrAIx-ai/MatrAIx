personas:
  professional: Amelina Rodriguez blends two decades of retail and warehouse expertise with an artistic eye, excelling at inventory control, bilingual communication, and curating aesthetically pleasing
    product displays, while pursuing a supervisory role and a supply‑chain certification to eventually manage a museum gift shop.
  sports: Amelina Rodriguez enjoys low‑impact fitness through beach walks, weekly salsa sessions, and cheering for the Miami Heat and Miami Marlins, while occasionally joining a local beach‑volleyball league
    that meets on Saturday mornings.
  arts: Amelina Rodriguez immerses herself in West Palm Beach’s creative pulse, attending Norton Museum exhibitions, photographing vibrant murals by local artist Carlos Arrieta, volunteering at a community
    center to teach children basic drawing, and drawing inspiration from Frida Kahlo’s bold colors and contemporary novelist Sally Rooney’s narrative style, while they nurture a personal collection of vintage
    prints.
  travel: Amelina Rodriguez prefers spontaneous, culturally rich getaways, having explored San Juan’s historic plazas, the art districts of Barcelona, and the desert landscapes of Santa Fe, while planning
    future trips to Oaxaca’s culinary festivals with a flexible itinerary that leaves room for unexpected street‑art discoveries.
  culinary: Amelina Rodriguez delights in cooking classic arroz con gandules, mofongo, and pastelón, infusing each dish with homemade sofrito, while also experimenting with vegan plant‑based twists, and
    they love hosting dinner parties where friends savor dishes seasoned with adobo, cilantro, and a splash of lime.
  core: Amelina Rodriguez is a steady‑hearted, art‑loving inventory pro who trades meticulous stock‑taking for spontaneous creativity, often juggling spreadsheets and salsa steps with equal enthusiasm.
background:
  cultural: Amelina is a first-generation Puerto Rican American who grew up in a bilingual household, speaking Spanish with her family while mastering English in school. Puerto Rican traditions such as
    celebrating Noche de San Juan, listening to plena and bomba music, and cooking meals like mofongo and arroz con gandules remain central to her identity. After moving to West Palm Beach, she became part
    of a vibrant Hispanic community that celebrates Puerto Rican heritage through festivals, parades, and cultural centers. Her upbringing emphasized family cohesion, respect for elders, and a strong work
    ethic, which she carries into her professional life. The island's colorful art and craft traditions inspire her aesthetic sensibilities and her involvement in local arts initiatives.
