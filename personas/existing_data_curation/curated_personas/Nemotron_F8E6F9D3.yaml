  career_goals: Amelina aims to advance to a supervisory or inventory-manager position within her current organization, pursuing a certification in supply-chain management to strengthen her credentials.
    Over the next few years she hopes to combine her logistical expertise with her passion for the arts by transitioning into a role at a museum gift shop or an art-gallery retail space, where she can curate
    displays and manage inventory of artistic merchandise. She also plans to develop a small side business selling handcrafted Puerto Rican-inspired décor items, using online platforms to generate supplemental
    income and preserve her cultural heritage. Long-term, she seeks financial stability for retirement while staying engaged in community art programs.
