personas:
  professional: Brian Blackmon, a 24‑year‑old front‑of‑house specialist, blends swift menu memorization, calm high‑volume service, and assertive conflict resolution with a practical curiosity that keeps
    him polishing his skills in cocktail pairing and bar etiquette, all while eyeing a supervisory shift‑lead role at his restaurant.
  sports: Brian Blackmon, a committed pick‑up basketball player at the Joliet recreation center and a seasonal fan of the Chicago Bulls and Bears, joins the local adult league on Saturdays, follows the
    NBA schedule religiously, and keeps fit with regular bike rides along the Illinois & Michigan Canal trail.
  arts: Brian Blackmon, an avid rhythm‑guitar hobbyist, enjoys strumming along to John Mayer and Gary Clark Jr. while occasionally attending live shows at the Joliet Arts Center, and his true‑crime podcast
    playlists feature hosts like Sarah Koenig and history chats by Dan Carlin, shaping his evenings with a blend of mystery and musical inspiration.
  travel: Brian Blackmon prefers spontaneous road trips within the Midwest, frequently visiting the Indiana Dunes for a beach escape, planning annual pilgrimages to Portland’s craft‑beer scene, and dreaming
    of a future backpack adventure through the Scottish Highlands, all balanced against his limited budget and occasional work shifts.
  culinary: Brian Blackmon loves cooking classic Midwestern comfort dishes such as Chicago‑style deep‑dish pizza topped with mozzarella, smoked sausage and hot sauce, a hearty baked mac and cheese infused
    with cheddar and jalapeños, and he experiments with pairing these meals with IPAs from County Line Brewing, showcasing his growing culinary confidence.
  core: Brian Blackmon is a 24‑year‑old hospitality enthusiast who balances a love for craft beers and backyard basketball with a laid‑back, sometimes chaotic approach to planning, and his quirks include
    binge‑listening to true‑crime podcasts at midnight and forgetting to schedule dentist appointments.
background:
  cultural: Brian was raised in a working‑class family in Joliet, Illinois. His parents worked in manufacturing and construction, and he attended local public schools before entering the workforce directly
    after high school. The Midwestern environment instilled a practical work ethic, straightforward communication style, and a strong sense of community. He grew up with regional traditions such as Friday
    night high‑school football, Chicago‑style pizza and hot dogs, and seasonal county fairs. While identifying as culturally American with Midwestern roots, he also appreciates the growing diversity of
    the greater Chicago area, which influences his open‑minded curiosity about different foods, cultures, and perspectives.
