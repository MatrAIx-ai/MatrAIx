  hobbies: '[''Craft beer tasting'', ''Podcast listening'', ''Pick‑up basketball'', ''Motorcycle maintenance'', ''Home cooking'', ''Guitar playing'', ''Science‑fiction reading'', ''Bike riding'']'
  career_goals: Brian plans to earn his GED within the next year and enroll in a culinary arts certificate program to deepen his technical skills. In the short term, he aims to secure a supervisory position
    such as shift lead or assistant manager at his current restaurant, leveraging his practical experience and people‑skills. Long‑term, he dreams of opening a small neighborhood café that offers craft
    coffee, local brews, and comfort food, blending his interest in hospitality, beverage knowledge, and community building. He also hopes to obtain a certified cicerone credential to specialize in beer
    selection and service.
