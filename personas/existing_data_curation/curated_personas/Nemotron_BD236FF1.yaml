personas:
  professional: A seasoned community organizer, Paulina Edwards leverages decades of budgeting expertise, spreadsheet fluency, and volunteer coordination skills to lead the seniors' activity committee,
    orchestrate seasonal festivals, and mentor younger volunteers, and they apply a reliable, routine-driven approach that reflects their practical and sociable nature.
  sports: A lifelong fan of the Texas A&M Aggies football team, Paulina Edwards never skips the homecoming game, cheers the Houston Astros during spring training, joins the senior center's weekly softball
    league, and they complement their routine with gentle bird-watching walks that serve as low-intensity exercise.
  arts: An avid quilter and choir member, Paulina Edwards spends Saturday mornings stitching traditional Texan patchwork while humming gospel hymns, loses herself in historical fiction by Philippa Gregory,
    relaxes to the smooth vocals of Patsy Cline and the classic ballads of Willie Nelson, and they find comfort in the creative rhythm that ties community and personal expression together.
  travel: A nostalgic road-tripper, Paulina Edwards prefers meticulously planned drives through the Texas Hill Country to Fredericksburg's wineries, annual family trips to New Orleans for Mardi Gras, occasional
    visits to Savannah's historic squares, and they dream of a leisurely Gulf Coast cruise while staying within a comfortable driving radius to suit their health.
  culinary: A dedicated Southern cook, Paulina Edwards expertly smokes brisket with a paprika-brown sugar rub, bakes buttery pecan pie using locally harvested pecans, transforms garden tomatoes, green beans,
    and fresh herbs into hearty collard greens and roasted vegetable medleys, and they always serve each dish with a glass of sweet tea.
  core: Paulina Edwards blends Southern hospitality with meticulous budgeting, turning community events into seamless celebrations while never missing a quilting circle or a slice of their famed pecan pie,
    and they remain a warm, organized presence in every gathering.
background:
  cultural: Paulina is a white American who grew up in central Texas and has spent most of her adult life in College Station. Her cultural identity blends Southern hospitality, a strong sense of family,
    and an attachment to community institutions like the local church and Texas A&M traditions. She values practicality, modesty, and the preservation of regional customs, such as honoring holidays with
    homemade meals and participating in community service.
attributes:
  skills: '[''Budgeting and financial management'',''Community event planning'',''Meal planning and large-scale cooking'',''Gardening and horticulture'',''Quilting and sewing'',''Basic computer literacy
