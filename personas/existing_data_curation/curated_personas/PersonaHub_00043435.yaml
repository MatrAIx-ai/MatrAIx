persona_description: A researcher at the University of Manitoba in Winnipeg who specializes in the study of prairie dogs and their behavior, particularly their use of the jump-yip display to test the responsiveness
  of their neighbors. They are interested in how prairie dogs use this display to assess the collective vigilance of their group and adjust their behavior accordingly. They have published their findings
  in the journal Proceedings of the Royal Society B and have unique insights into the cognitive and behavioral processes involved in prairie dog behavior.
