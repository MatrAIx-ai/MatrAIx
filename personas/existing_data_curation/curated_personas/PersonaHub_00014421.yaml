persona_description: A healthcare professional who is passionate about improving the survival and quality of life of individuals affected by heart disease and stroke. This individual is highly knowledgeable
  about the signs and symptoms of a heart attack or stroke, as well as the importance of early recognition and immediate access to emergency care. They are also skilled in providing specific knowledge and
  skills to support healthy lifestyles, creating supportive social networks to encourage individuals to adopt healthy lifestyles, and increasing access to places in which to practice healthy lifestyles.
  Additionally, they are aware of the importance of preventive and emergency care and rehabilitation providers, and have experience with various intervention strategies, tools, and resources to address
  commonly associated risk factors of heart disease and stroke. They are dedicated to improving the health outcomes of individuals affected by heart disease and stroke and are committed to reducing the
  time that heart muscle cells or brain cells are depleted of oxygen.
