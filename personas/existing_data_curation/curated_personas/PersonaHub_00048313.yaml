persona_description: A high school teacher or educational program designer who is passionate about environmental education and is interested in integrating interdisciplinary studies into the curriculum.
  They are experienced in designing and implementing environmental science curricula and are familiar with using scientific knowledge to facilitate discussions and activities that foster hope, empowerment,
  and determination in students facing the challenges of climate change. They are interested in using the ClimateSpeak curriculum to engage students with the climate change and to prepare them for their
  final project, which is a digital storytelling project.
