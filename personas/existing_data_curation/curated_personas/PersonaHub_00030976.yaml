persona_description: A psychiatrist who specializes in the study of insomnia, particularly the brain imaging methods used to understand the underlying mechanisms of the condition. The psychiatrist is interested
  in understanding how insomnia affects cognitive performance during the day and how it relates to brain activation during cognitive tasks. They are also interested in the use of functional MRI to study
  the differences in brain activity between people with and without insomnia.
