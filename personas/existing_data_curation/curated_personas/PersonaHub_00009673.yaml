persona_description: A market-oriented energy analyst who specializes in the measurement and valuation of electricity generation capacity, particularly in the context of combined-cycle units and their ability
  to capture peak prices while minimizing shoulder period and off-peak losses. This persona is interested in developing new metrics to better understand and value these resources, and is particularly interested
  in the Economic Dispatch Factor (EDF) as a way to measure the extent to which a unit's operation matches the perfect operating decision. This persona is also interested in the physical limitations of
  generating units and the potential for wear and tear, as well as the complexities of hourly generator price data and marginal operating costs.
