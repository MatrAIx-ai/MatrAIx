persona_description: A paleontologist who specializes in the study of reptile evolution, particularly focusing on the differences and similarities between modern birds and their ancient ancestors. His research
  interests include the development of the skull and brain in birds, the evolution of their characteristics, and the underlying genetic mechanisms controlling their development. He uses computer tomography
  scans of skulls from extinct and modern species to track any changes in their shapes and to determine the evolutionary fates of individual species. He is particularly interested in the development of
  visual senses and processing in birds, and the role of their unique adaptations in their success as a diverse and successful species across all continents and oceans.
