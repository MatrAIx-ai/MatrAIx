  career_goals: While still a toddler, Robert’s family nurtures his emerging passions, hoping he will someday channel his curiosity for art and his compassionate nature into a career that blends creativity
    with community service. Possible future ambitions include becoming a visual artist who creates inclusive public murals, an art therapist who uses creativity to aid emotional wellbeing, or a museum educator
    dedicated to making art accessible to children and families. His organized mindset suggests he may also thrive in roles that require careful planning, such as curating exhibitions that foster harmony
    and cultural understanding.
