persona_description: Layla McCay, Director of the Centre for Urban Design and Mental Health, is an expert in urban design and mental health, who has spoken at the World Health Organization's 9th Global
  Health Promotion Conference in Shanghai. She is interested in the potential of designing the built environment to promote and support good mental health, and has presented the Mind the GAPS framework
  to assess the basic impact of urban design policies on mental health. She is known for her work on the importance of access to nature, strong social networks, sleep, security, privacy, and other protective
  factors for good mental health, and how the city can lead to happier, healthier citizens with increased education, employment, health, and economic potential.
