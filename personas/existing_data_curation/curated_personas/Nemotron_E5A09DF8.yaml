personas:
  professional: Todd Cornelison is a 26‑year‑old fiber‑optic technician who blends hands‑on wiring expertise with a maker‑mindset, aiming for CFOT certification and a future supervisory role while channeling
    a competitive edge into meticulous field work and innovative, art‑inspired infrastructure solutions.
  sports: Todd Cornelison enjoys weekend hikes along the Missouri River and early‑morning fishing trips, plays pickup basketball at the local community center, and avidly follows the St. Louis Cardinals,
    St. Louis Blues, and St. Louis City SC, often wearing their jerseys while on the trail.
  arts: Todd Cornelison immerses themselves in the St. Louis Art Museum’s modern collection, seeks out vibrant street‑art murals by local creators, captures urban‑tech juxtaposition through photography,
    and draws creative inspiration from artists like Andy Warhol, Banksy, and the ambient sounds of Radiohead.
  travel: Todd Cornelison prefers spontaneous, budget‑friendly road trips that blend nature and tech, having explored Nashville’s music scene, Austin’s maker community, and Portland’s food trucks, while
    dreaming of a future adventure to Iceland’s geothermal springs and Kyoto’s historic temples.
  culinary: Todd Cornelison relishes St. Louis‑style BBQ ribs, fresh‑caught river fish tacos seasoned with cilantro and lime, and experiments with sous‑vide cooking using a Raspberry Pi controller, often
    pairing meals with local craft beers and a dash of smoked paprika.
  core: Todd Cornelison is a technically savvy, art‑curious 26‑year‑old fiber‑optic technician whose competitive drive fuels both meticulous field work and nightly gaming marathons, while their emotional
    intensity fuels a relentless quest for balance between solitude and social collaboration, often manifesting in impulsive gadget purchases and occasional anxiety‑driven spending splurges.
background:
  cultural: Todd grew up in a middle‑class, Midwestern family in the St. Louis suburbs, absorbing the region’s blend of practicality, independence, and community orientation. His upbringing emphasized a
    strong work ethic, self‑reliance, and modesty, while exposure to the city’s cultural institutions sparked an early appreciation for visual arts and diverse ideas. Though he identifies as culturally
    American with predominantly Anglo‑American roots, his experiences in Ballwin and the broader St. Louis area have given him a nuanced view of both suburban life and urban creativity, shaping his outlook
    toward balancing reliable craftsmanship with innovative, sometimes unconventional, thinking.
attributes:
  skills: '[''Fiber‑optic splicing'', ''Copper cable termination'', ''Telecommunications line installation'', ''Field troubleshooting'', ''Use of OTDR and testing equipment'', ''Reading technical schematics'',
    ''OSHA safety compliance'', ''Electrical safety'', ''Basic networking concepts (Ethernet, DOCSIS, FTTH)'', ''Power‑tool operation'', ''Critical problem solving'', ''Adaptability to new technologies'']'
  hobbies: '[''Urban photography'', ''Visiting art museums and street‑art tours'', ''Arduino and Raspberry Pi tinkering'', ''Competitive video gaming'', ''Strategic board games'', ''Hiking'', ''Fishing'',
    ''Maker‑space projects'', ''Tech meetups on 5G and smart‑city tech'']'
  career_goals: Todd aims to earn Certified Fiber Optic Technician (CFOT) credentials within the next year and leverage that qualification to become a lead installer on large‑scale fiber deployments in
    the St. Louis metro area. He envisions moving into a supervisory role where he can mentor newer technicians while shaping installation best practices. Long‑term, he aspires to transition toward network
    design and project management, perhaps completing an associate degree in electrical‑engineering technology to broaden his technical expertise. He also hopes to start a small contracting business that
    integrates sustainable installation methods with an eye for aesthetic integration of infrastructure into community spaces, reflecting his appreciation for art and unconventional solutions.
