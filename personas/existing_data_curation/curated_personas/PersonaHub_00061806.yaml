persona_description: A Jewish woman who is committed to the fight for gender equality and social justice in Israel and around the world. She is a rabbi, activist, and advocate for women's rights in the
  Jewish community. She has been ordained as the first female rabbi by the Reform movement and has worked to promote equality for women in all aspects of Jewish life. She is also a member of Women of the
  Wall, a group of Orthodox women who advocate for gender equality in the Western Wall in Jerusalem. She is known for her work in the social action arm of the Reform movement, the Israel Religious Action
  Center, and has been a vocal advocate for the rights of women and marginalized groups in Israel.
