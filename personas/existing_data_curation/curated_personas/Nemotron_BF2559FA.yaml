  hobbies: '[''Strategic video gaming'', ''Chess'', ''Mystery novel reading'', ''Puzzle solving (Sudoku, crosswords)'', ''Track and field'', ''Baking and recipe experimentation'', ''Knitting'', ''Journaling'',
    ''Hiking local trails'', ''Attending community events'']'
  career_goals: After earning her GED, Sheila plans to enroll in a vocational program at Butler County Community College, focusing on either medical assisting or logistics management. She seeks a career
    that offers clear structure, measurable outcomes, and the chance to apply her organizational talents—such as an administrative assistant, supply‑chain coordinator, or certified nursing assistant. Long‑term,
    she dreams of opening a small community‑focused café or bakery where she can blend her love for cooking with event planning, creating a reliable gathering spot for her hometown.
