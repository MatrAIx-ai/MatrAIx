  hobbies: '[''strategy video gaming (Minecraft, Civilization, Pokémon)'', ''building LEGO Technic models'', ''assembling Arduino electronics kits'', ''cooking Indian meals for family'', ''listening to
    Bollywood and contemporary music'', ''journaling for emotional processing'', ''guided meditation using apps'', ''participating in a school coding club'', ''playing pick‑up soccer'']'
  career_goals: He is driven by his desire for predictable, structured work environments, aims to complete his high school equivalency (GED) within the next two years and then pursue industry‑recognized
    IT certifications such as CompTIA A+ and Network+. He hopes to secure an entry‑level position in computer hardware support or help‑desk services, where clear procedures and defined responsibilities
    match his organizational strengths. Over time, he plans to advance to roles like network administrator or junior software developer, continuing self‑directed learning in coding and system management.
    Parallel to his technical aspirations, he nurtures a secondary ambition to refine his cooking skills enough to contribute part‑time in a family‑run Indian restaurant, merging his cultural heritage with
    reliable employment.
