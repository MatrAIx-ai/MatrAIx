personas:
  professional: Ramjeet Sankuratri is a budding IT support enthusiast who relies on their love for detailed manuals and methodical troubleshooting, turning the step-by-step logic of LEGO Technic and strategy
    games into precise hardware diagnostics and help-desk solutions.
  sports: Ramjeet Sankuratri enjoys pick-up soccer games at Freedom Park with friends, follows the Charlotte Hornets and Carolina Panthers closely, and holds a season ticket for Charlotte FC, balancing
    competitive play with a preference for structured team drills.
  arts: Ramjeet Sankuratri immerses themselves in Bollywood soundtracks and contemporary Hindi pop from artists like Arijit Singh and A.R. Rahman, often rewinding classic films by Rajkumar Hirani for inspiration
    while also channeling creativity into building intricate LEGO Technic models.
  travel: Ramjeet Sankuratri prefers well-planned weekend trips, has explored nearby Asheville and Washington, D.C., dreams of visiting Delhi and the historic temples of Punjab, and balances wanderlust
    with the practical constraints of a high-school schedule and family responsibilities.
  culinary: Ramjeet Sankuratri enjoys crafting traditional dishes such as roti, dal, butter chicken, and vegetable biryani, skillfully balancing spices like cumin, garam masala, and turmeric, while experimenting
    with modern twists during family Diwali feasts.
  core: Ramjeet Sankuratri is a meticulous, anxiety-prone teen who blends a love for structured tech support, methodical cooking, and Bollywood rhythms into a life guided by routine, responsibility, and
    occasional bursts of creative spontaneity.
background:
  cultural: Ramjeet is a second‑generation South Asian American of Indian descent, with his parents originally from the northern states of Punjab and Uttar Pradesh. The family settled in Charlotte, North
    Carolina, where a growing Indian community offers cultural and religious gathering places like temples and cultural centers. At home, Hindi and Punjabi are spoken alongside English, and the family observes
    Hindu festivals—Diwali, Holi, Navratri—through traditional rituals, special meals, and community celebrations. He attends weekend language classes to maintain his heritage languages and occasionally
    participates in community events such as Bengali cultural fairs and South Asian youth leadership programs. These cultural ties influence his culinary interests, his appreciation for Bollywood music
    and cinema, and his sense of familial duty, all of which shape his identity in the multicultural environment of Charlotte.
