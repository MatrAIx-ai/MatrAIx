persona_description: A political scientist who specializes in the study of American political institutions, particularly the role of government spending and defense budgets in shaping American society.
  His research interests include, but are not limited to, the impact of government policies on economic growth, the relationship between government spending and the American consumer, and the political
  motivations behind government spending decisions. He is particularly interested in the ways in which government policies and spending decisions have influenced American society and politics over the past
  century.
