  career_goals: In the next two years Alejandro aims to step into a senior sales representative role, taking greater responsibility for key accounts and mentoring junior reps. His medium‑term ambition is
    to become a regional sales manager, leading a team of representatives across Southern California and driving the launch of eco‑friendly product lines for his company. Ultimately, he envisions founding
    his own distribution firm that bridges Mexican manufacturers with U.S. markets, leveraging his bilingual skills and cultural insight. To support these goals, he plans to pursue an MBA focused on supply‑chain
    management and strategic leadership.
