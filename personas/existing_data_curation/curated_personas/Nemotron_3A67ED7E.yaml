personas:
  professional: Christine Brooks, a 36‑year‑old special‑education teacher in Milton, blends evidence‑based IEP design with Southern hospitality, using their pragmatic curiosity to innovate inclusive curricula
    while fostering collaborative teamwork throughout the school community; they are known for turning data into actionable strategies that benefit both students and colleagues.
  sports: Christine Brooks paddles the Gulf intracoastal waterway with the Milton Paddle Club, plays catch‑up softball in a neighborhood league, practices daily yoga, and roots for the Florida Gators and
    Tampa Bay Rays, treating each season as a chance to blend low‑impact fitness with hometown pride; they also schedule weekly kayak outings to stay active and connected to the water.
  arts: Christine Brooks sketches watercolor vistas of the coastal dunes, devours Hilary Mantel’s historical novels, attends productions at the Gulf Breeze Playhouse, and they find inspiration in the sounds
    of Jimmy Buffett and Debussy’s "Clair de Lune," weaving these artistic threads into their weekend relaxation rituals.
  travel: Christine Brooks plans trips with a blend of itinerary and spontaneity, favoring Mediterranean getaways to the Greek islands and Tuscany for culinary research while also taking weekend road trips
    to historic St. Augustine and Savannah for their rich southern charm, balancing family budgeting with a thirst for cultural immersion; they keep a travel journal to capture each experience.
  culinary: Christine Brooks, an avid home cook, experiments with Mediterranean fare, perfecting dishes such as Greek avgolemono soup, shrimp scampi with fresh Gulf shrimp, and quinoa tabbouleh seasoned
    with mint, oregano, and pomegranate seeds, while still honoring occasional Southern shrimp and grits for family gatherings, and they love to host tasting nights where friends sample their latest creations.
  core: Balancing Southern hospitality with methodical curiosity, Christine Brooks orchestrates inclusive classrooms, saves diligently, navigates health with yoga, packs a kayak for weekend paddles, paints
    watercolors of tide‑lined marshes, and despite a habit of buying too many board games they never forget the extra cup of coffee before a faculty meeting.
background:
  cultural: Christine grew up in a middle‑class, white Southern‑American family in the Florida Panhandle, where community ties, modest religious traditions, and a respect for both heritage and progress
    were emphasized. Her upbringing blended Southern hospitality with a practical work ethic, encouraging curiosity about the wider world while valuing established customs. Living in Milton, she interacts
    daily with a diverse student population, which has deepened her appreciation for multicultural perspectives and reinforced her commitment to inclusive education. This cultural mix shapes her balanced
    outlook—honoring tradition and family while embracing new ideas and collaborative growth.
attributes:
  skills: '[''Individualized Education Program (IEP) development and implementation'', ''Differentiated instruction and curriculum adaptation'', ''Positive behavior support and classroom management'', ''Collaborative
    problem solving with multidisciplinary teams'', ''Parent and caregiver communication and partnership building'', ''Assistive technology integration (e.g., speech‑to‑text, augmentative communication
    devices)'', ''Literacy and language development strategies for diverse learners'', ''Data‑driven assessment and progress monitoring'', ''Professional development facilitation for staff'', ''Community
    resource networking and advocacy'']'
  hobbies: '[''Reading historical fiction and biographies'', ''Gardening (vegetable and native‑flower garden)'', ''Kayaking on coastal waterways'', ''Volunteering at a local literacy program'', ''Watercolor
    painting'', ''Cooking Mediterranean‑style family meals'', ''Yoga and mindfulness practice'', ''Board‑game nights with friends and spouse'']'
  career_goals: She aims to earn a Master’s degree in Special Education within the next two years, positioning herself for a future role as an Inclusion Coordinator or Special‑Education Department Lead
    at her district. Christine also aspires to design a district‑wide professional‑development program focused on inclusive instructional strategies, expand community partnership networks for students with
    disabilities, and eventually mentor new teachers through a dedicated teacher‑leadership cohort. Long‑term, she envisions contributing to state policy discussions on equitable special‑education funding
    and advocacy.
