    museum'']'
  career_goals: Yukiko aims to advance to a senior director role overseeing a portfolio of community‑focused projects within a public agency or nonprofit cultural organization in the Baltimore region. She
    plans to obtain PMP certification, lead larger, multi‑year initiatives that integrate arts and heritage preservation, and mentor emerging project managers, especially women of color. Over the long term,
    she envisions establishing a boutique consultancy that helps cultural institutions improve operational efficiency while honoring traditional practices.
