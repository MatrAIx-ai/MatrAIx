personas:
  professional: Bernice Mahon is a meticulous operations research analyst whose expertise in linear programming, stochastic simulation, and data visualization drives her to rigorously test assumptions,
    tackle complex supply‑chain puzzles, and, within five years, lead a cross‑functional team toward machine‑learning‑augmented optimization solutions at a Fortune 500 firm.
  sports: Bernice Mahon is a dedicated trail runner who logs weekly miles through the dunes of Indiana, participates in the local Hoosier Runners Club, and follows the Chicago Bulls and Indianapolis Colts
    for their strategic playmaking, while using chess‑style mental drills to stay sharp.
  arts: Bernice Mahon curates a personal collection of contemporary photography featuring works by Andreas Gursky and Cindy Sherman, sketches urban scenes in a pocket notebook, and draws inspiration from
    the immersive installations of Yayoi Kusama during her frequent visits to the Indianapolis Museum of Art.
  travel: Bernice Mahon plans meticulously for solo trips, having explored the minimalist architecture of Kyoto and the stark landscapes of Iceland, while prioritizing art‑centric itineraries that balance
    budget constraints with the occasional splurge on a design‑focused boutique hotel in Barcelona.
  culinary: Bernice Mahon experiments with molecular gastronomy at home, mastering sous‑vide salmon, spherified balsamic reductions, and crafting a ramen broth infused with miso and truffle oil, while favoring
    ingredients like matcha powder, smoked paprika, and fresh heirloom tomatoes.
  core: Bernice Mahon is a curiosity‑driven, solitary puzzle‑solver who hoards art prints, over‑optimizes coffee orders, and wrestles with occasional perfectionist paralysis that can delay project deadlines.
background:
  cultural: Bernice grew up in a middle‑class suburban environment in the Chicago metropolitan area, rooted in Midwestern American values of hard work, self‑reliance, and community involvement. Her family
    background is of European descent, with traditions that include celebrating holidays like Thanksgiving and Christmas with close family gatherings, attending local community events, and an emphasis on
    education. The region’s cultural diversity has exposed her to a rich arts scene, fostering her appreciation for visual arts and encouraging her curiosity about new ideas.
attributes:
  skills: '["Mathematical modeling", "Linear & integer programming", "Stochastic simulation", "Optimization", "Python (NumPy, pandas, SciPy, PuLP)", "R", "SQL", "Data visualization (Tableau, Power BI)",
    "Statistical analysis", "Time-series forecasting", "Data cleaning & validation", "Project planning & workflow optimization", "Critical evaluation of assumptions", "Technical communication"]'
  hobbies: '["Visiting art museums and galleries", "Sketching and drawing", "Photography of architecture and nature", "Solving puzzles (Sudoku, crosswords)", "Playing chess online", "Reading science-fiction
    and modern literary fiction", "Trail running at Indiana Dunes", "Yoga for mindfulness", "Experimental cooking", "Listening to philosophy and technology podcasts"]'
  career_goals: Bernice aims to advance to a senior operations research analyst role within the next five years, leading small cross‑functional teams that tackle high‑impact supply chain and logistics challenges.
    She intends to deepen her expertise in machine‑learning‑augmented optimization, publish case studies in professional journals, and earn a master's degree in data science or an INFORMS certification.
    In the longer term, she aspires to become a director of analytics, shape strategic decision‑making at a Fortune 500 company, and possibly launch her own boutique consultancy focused on innovative, data‑driven
    solutions.
