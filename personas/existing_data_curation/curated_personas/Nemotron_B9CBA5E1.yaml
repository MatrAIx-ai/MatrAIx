  career_goals: Although retired from formal teaching, Alina is eager to remain an active contributor to her community. She aims to expand the senior‑student mentorship program at the local elementary school,
    offering guidance and life‑skill workshops. She also hopes to document and share the oral histories of longtime Lincoln City residents, preserving the town’s heritage for future generations. Traveling
    to nearby national parks and participating in coastal conservation projects are personal ambitions that align with her love of nature and community stewardship.
