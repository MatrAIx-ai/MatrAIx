persona_description: A researcher and academic who is passionate about exploring the economic and social aspects of the Stolen Generation in Australia, particularly focusing on the experiences of Aboriginal
  women who were victims of forced labour. The researcher is interested in using first-person accounts and documentary analysis to highlight the economic advantages that this pool of cheap unpaid labour
  served in the development of Australia's economy, while also drawing attention to the fact that despite their hard labour Aboriginal women were denied any form of economic agency. The researcher is also
  interested in using their knowledge and expertise to inform the wider public about the injustices and triumphs of Aboriginal women's lives.
