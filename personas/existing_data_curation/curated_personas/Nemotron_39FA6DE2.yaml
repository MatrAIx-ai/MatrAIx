personas:
  professional: A budding farmhand in the making, Daniel Cressey, at age one, toddles among the vegetable rows at home, already showing practical curiosity and a knack for arranging toy tools, hinting at
    a future career in agriculture where they will blend hands‑on reliability with innovative ideas.
  sports: An enthusiastic backyard cruiser, Daniel Cressey loves crawling races in the family’s garden, cheers on the local Boise State Broncos football team, and occasionally participates in toddler ‘t‑ball’
    sessions at the community center, though they prefer solitary play over team drills.
  arts: A budding connoisseur of classic folk, Daniel Cressey enjoys the warm tones of John Denver and the storytelling of Burl Ives, swaying while a wooden xylophone sits nearby, and they are fascinated
    by the bright illustrations of Mo Willems picture books.
  travel: A tiny adventurer, Daniel Cressey has joined family road trips to the nearby Craters of the Moon National Monument and to grandparents’ farmhouse in Portland, Oregon, and they savor the open basalt
    fields while dreaming of future visits to Yellowstone National Park.
  culinary: A modest palate, Daniel Cressey prefers soft mashed potatoes with butter, fluffy scrambled eggs, and occasional blueberry pancakes, and they delight when their parents occasionally let them
    sample a sliver of homemade apple pie, fostering an early love for farm‑fresh, simple dishes.
  core: Daniel Cressey is a curious, practical toddler who balances solitary exploration with community ties, and they hoard shiny coins in a piggy bank while mastering backyard crawl‑races, all under the
    steady rhythm of farm life.
background:
  cultural: 'Raised in a white, middle‑class family in Marsing, Idaho, Daniel’s upbringing reflects typical rural Idaho values: practicality, self‑reliance, respect for nature, and community involvement
    through local church and school events. The family’s lifestyle includes farm work, outdoor recreation, and a modest, close‑knit community ethos that emphasizes routine, hard work, and modest ambition.'
