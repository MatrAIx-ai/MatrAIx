persona_description: A professional who works in the field of emergency response and disaster management, specifically in the detection and management of radiation hazards. This person is highly skilled
  in using Thermo Scientific radiation detection and measurement systems to identify, monitor, and mitigate radiation threats in critical infrastructure and environments. They have experience in conducting
  radiation surveys, monitoring environmental radiation levels, and providing post-incident support to military, civil defense, and other industries that work with sources of radiation. They are also familiar
  with the advanced technology, planning tools, and instruments available to first responders, firefighters, law enforcement, military, and government agencies to aid in the detection of radioactive materials
  and the identification of chemicals, narcotics, and explosive threats.
