  career_goals: Even in his centenarian years, Antorius remains driven to leave a lasting legacy. He aims to complete a memoir that weaves his personal history with the broader African‑American and Caribbean
    narrative, launch an oral‑history project to capture the stories of senior residents in Willingboro, and mentor local youth through art workshops and storytelling circles. He also hopes to support the
    creation of a small scholarship fund for aspiring artists from under‑represented backgrounds and to stay physically active by participating in community walks and dance socials.
