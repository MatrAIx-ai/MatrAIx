personas:
  professional: Felita Baba, a 28‑year‑old front‑of‑house specialist at a bustling Allentown bistro, blends meticulous service skills and a keen eye for visual presentation to mentor new staff, orchestrate
    pop‑up art nights for local creators, and pursue a supervisory role while they complete hospitality certifications.
  sports: Felita Baba enjoys jogging along the Lehigh Parkway in spring, joins a local co‑ed softball league each summer, follows the Lehigh Valley Phantoms and Philadelphia Eagles with avid enthusiasm,
    and they balance a modest weekly yoga routine with the competitive edge honed during trivia night battles.
  arts: Felita Baba frequents the Allentown Art Museum and independent galleries, sketches watercolor studies of street murals inspired by artists like Banksy and local painter Ron Stokol, curates at pop‑up
    coffee‑gallery events featuring works by emerging regional talent, and they indulge in indie film screenings of the Duplass Brothers and concerts by Phoebe Bridgers and The National.
  travel: Felita Baba prefers short, well‑planned road trips that blend cultural immersion and culinary discovery, having explored the historic streets of Philadelphia, the craft‑brew scene in Asheville,
    the mural‑rich neighborhoods of Detroit, and dreaming of a weekend art retreat in Dublin, all while they balance a modest travel budget and occasional work‑related time constraints.
  culinary: Felita Baba is a self‑taught coffee aficionado who experiments with pour‑over and Aeropress methods, delights in crafting brunch dishes like avocado toast with poached eggs and smoked salmon,
    cooks comfort meals such as rosemary‑scented roasted chicken, hearty mushroom risotto, and occasional Irish stew for friends, while they occasionally over‑season sauces in a quest for bold flavor.
  core: Felita Baba blends a relentless curiosity for art and coffee culture with a competitive, anxiety‑prone personality, turning detailed observations into curated experiences while they juggle the pressure
    of aspiring entrepreneurship.
background:
  cultural: Felita was raised in a middle‑class white family in Allentown, Pennsylvania, with ancestral roots in German and Irish immigrant communities. The Lehigh Valley’s mix of industrial history and
    a thriving arts scene shaped her appreciation for both diligent work and creative expression. She grew up participating in community events at local churches, public parks, and neighborhood fairs, where
    her family emphasized education, self‑reliance, and active involvement in the community. This upbringing fostered a pragmatic, open‑minded outlook that blends mainstream American values with a regional
    pride in supporting local artists, small businesses, and cultural initiatives.
attributes:
  skills: '[''Customer service'', ''Multitasking'', ''POS system operation'', ''Food safety compliance (ServSafe)'', ''Menu knowledge of Lehigh Valley cuisine'', ''Event coordination'', ''Basic art curation'',
    ''Conflict resolution'', ''Time management'', ''Critical thinking'', ''Competitive performance tracking'']'
  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Attending indie film screenings and live music'', ''Exploring new restaurants and coffee brewing'', ''Reading
    contemporary fiction and philosophy'', ''Yoga and meditation'', ''Journaling'', ''Crossword puzzles and Sudoku'', ''Trivia nights'', ''Board game gatherings'']'
  career_goals: Felita aims to move from waitstaff to a supervisory role within the next two years, eventually becoming a restaurant manager or the owner of a boutique café that doubles as a gallery space.
    She plans to complete her associate degree in hospitality management while earning certifications such as ServSafe and an introductory sommelier course. Long‑term, she envisions opening a community‑focused
    coffee shop/gallery in Allentown where she can curate local artists, host cultural workshops, and create an environment that blends her love of art with innovative dining experiences. To support these
    ambitions, she seeks mentorship in leadership, plans to attend hospitality‑focused workshops, and is considering a part‑time MBA in hospitality entrepreneurship.
