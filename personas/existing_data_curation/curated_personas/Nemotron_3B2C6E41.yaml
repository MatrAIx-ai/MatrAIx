  hobbies: '[''Arduino tinkering and DIY electronics'', ''Automotive restoration projects'', ''Reading nonfiction (tech, history)'', ''Hiking in rural Alabama'', ''Bass fishing at local lakes'', ''Strategy
    board games (e.g., Settlers of Catan)'', ''Online competitive shooter gaming'']'
  career_goals: Austin intends to complete his associate’s degree in applied technology within the next two years and then pursue a bachelor’s in mechanical engineering or computer engineering, depending
    on which field aligns better with emerging opportunities. His long‑term ambition is to launch a small, locally‑focused tech‑repair and custom‑fabrication shop that blends his love for hands‑on problem
    solving with the latest digital tools. He hopes to build a reputation for reliable, innovative solutions while maintaining the flexibility to explore side projects and freelance consulting work.
