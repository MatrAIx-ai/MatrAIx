personas:
  professional: Austin Kraft, an aspiring mechanical‑electronics hybrid technician with a knack for troubleshooting vintage car engines and programming Arduino prototypes, they channel their curiosity‑driven
    yet laid‑back attitude into hands‑on projects that blend old‑school craftsmanship with modern digital tools.
  sports: Austin Kraft, a dedicated fan of the Alabama Crimson Tide football squad and the Birmingham Barons baseball team, they spend Saturday mornings casting lines at Lake Martin and join the Shelby
    County Trails Club for rugged hikes, preferring low‑key endurance activities over organized gym sessions.
  arts: Austin Kraft, who unwinds after a day of tinkering by listening to Jason Isbell’s Americana ballads, the classic rock of Lynyrd Skynyrd, and the jazz improvisations of Miles Davis, they occasionally
    attend local community theater productions and sharpen strategic thinking through board‑game nights with friends.
  travel: Austin Kraft, an avid road‑trip enthusiast on a college budget, has explored the historic streets of Savannah, the music scene of Nashville, and the scenic Blue Ridge Parkway, while they dream
    of a solo bike ride through the Appalachian Trail and a weekend getaway to the Gulf Coast’s Gulf Shores.
  culinary: Austin Kraft, a modest home chef who favors Southern comfort fare like smoked pulled pork sandwiches, shrimp‑and‑grits, and baked collard greens seasoned with smoked paprika and fresh garlic,
    they enjoy grilling fresh‑caught catfish on weekends and occasionally experiment with DIY hot‑sauce infusions.
  core: Austin Kraft is a solitary tinkerer whose blend of curiosity, laid‑back flexibility, and competitive edge drives a love for hands‑on problem solving, even if they occasionally lapse into disorganization
    and procrastination.
background:
  cultural: Austin grew up in Montevallo, Alabama, a small college town with deep Southern roots. His family background is typical of white, middle‑class households in the region, emphasizing self‑reliance,
    modesty, and community involvement through local churches and neighborhood events. While he respects local traditions, his exposure to the university environment has broadened his outlook, allowing
    him to blend the measured conservatism of his upbringing with an openness to new ideas and technologies.
