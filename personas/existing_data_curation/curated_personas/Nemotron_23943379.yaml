  career_goals: Looking ahead, Donna aims to transition into a senior leadership role within the regional healthcare system, targeting the position of Director of Nutrition Services for Cape Cod Healthcare.
    She plans to develop and launch a data‑driven preventive nutrition program focused on the growing senior population of Barnstable County, integrating local seafood and farm‑fresh produce into evidence‑based
    dietary guidelines. To broaden her impact, she intends to earn a Master’s in Public Health with a concentration in community nutrition, author a guidebook on sustainable seafood nutrition for Cape Cod
    residents, and present her research at national dietetic conferences. Donna also seeks to mentor emerging dietitians through adjunct teaching at Cape Cod Community College and to expand her private
    practice to include tele‑health counseling for weight‑management and chronic‑disease patients, positioning herself as a recognized expert in both clinical and community nutrition on the Cape.
