  hobbies: '[''Robotics projects (Arduino, Raspberry Pi)'', ''Hiking and nature photography'', ''Strategic video games'', ''Board game nights'', ''STEM outreach volunteering'', ''Reading science-fiction'',
    ''Playing acoustic guitar'']'
  career_goals: Gerald aims to secure an entry‑level position in data analytics or engineering where he can apply his analytical skills to real‑world problems while continuing to learn new technologies.
    He is considering pursuing a master’s degree in Data Science or Applied Engineering within the next two years to deepen his expertise and increase his career flexibility. Long‑term, Gerald hopes to
    contribute to sustainable technology initiatives in the Atlanta metropolitan area, potentially leading projects that blend data‑driven insights with engineering solutions. He values workplaces that
    foster mentorship, collaborative culture, and clear pathways for professional growth, allowing him to balance ambition with his need for a supportive environment that mitigates stress.
