personas:
  professional: A budding data analyst, Gerald Cromie leverages his Python, Pandas, and SolidWorks expertise to turn raw sensor data into actionable insights, while his habit of double‑checking every line
    of code and his desire for collaborative, low‑stress environments make him a meticulous yet approachable team member.
  sports: A weekend hiker, Gerald Cromie spends Saturday mornings on the Chattahoochee River trails with the Georgia Tech Outdoor Club, roots for the Atlanta Falcons during football season, and joins informal
    pick‑up basketball games at the campus rec center to stay fit, balancing his love of nature with the camaraderie of local sports.
  arts: When not debugging code, Gerald Cromie unwinds by strumming acoustic guitar to Southern folk tunes by The Chicks and John Prine, browsing graphic novels by Neil Gaiman, and attending indie film
    screenings at the historic Rialto theater, letting eclectic arts shape his creative outlook.
  travel: An adventurous planner, Gerald Cromie prefers weekend road trips to nearby Asheville for mountain hikes and Charleston for historic brunches, while dreaming of a summer backpacking stint in Patagonia
    after graduating, always booking budget‑friendly Airbnbs and using a spreadsheet to track mileage.
  culinary: A self‑taught cook, Gerald Cromie frequently whips up crispy fried chicken with a side of collard greens, experiments with shrimp‑and‑grits, and indulges in homemade sushi rolls featuring avocado,
    cucumber, and wasabi, often pairing meals with a cold sweet tea brewed from fresh Georgia peaches.
  core: Gerald Cromie is a meticulously curious 20‑year‑old tech tinkerer who balances a quiet love for Southern folk melodies and mountain hikes with a restless habit of late‑night gaming and a tendency
    to over‑worry about every project deadline.
background:
  cultural: Gerald grew up in a middle‑class family in Roswell, Georgia, within a culturally Southern environment that values hospitality, community involvement, and modesty. His family celebrates traditional
    Southern holidays and participates in local events such as high‑school football games and community fairs, while also encouraging curiosity and academic achievement. Exposure to both the suburban culture
    of Cobb County and the diverse student body at his university has given Gerald a balanced perspective, blending respect for his regional roots with an openness to broader cultural experiences.
