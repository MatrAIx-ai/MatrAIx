  skills: '[''Python programming'', ''Data analysis (Pandas, NumPy)'', ''Statistical modeling (R, MATLAB)'', ''CAD design (SolidWorks)'', ''3D printing'', ''Circuit prototyping'', ''Laboratory experimental
