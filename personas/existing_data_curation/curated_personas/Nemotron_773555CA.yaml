personas:
  professional: Marilyn Mccormick, a budding teenage technologist, merges curiosity and practicality by designing Arduino‑driven sensors for local trail monitoring, while they keep a tidy project notebook,
    meet school deadlines with reliable punctuality, yet sometimes procrastinate on polishing the final presentation, letting their reserved nature thrive in solo coding sessions.
  sports: Marilyn Mccormick, an avid hiker and member of the Sandia Trail Club, spends weekends scaling desert mesas while cheering for the Albuquerque Isotopes and New Mexico United, prefers low‑impact
    cardio over team sports, maintains fitness through regular uphill treks, often forgets to pack enough water but compensates by stopping at natural springs, and they document their routes in a GPS app
    with meticulous notes.
  arts: Marilyn Mccormick, a reflective songwriter, strums acoustic renditions of Joni Mitchell and Bob Dylan while sketching desert panoramas in a field journal, finds artistic inspiration in the poetry
    of Emily Dickinson and fantasy worlds of Sarah J. Maas, occasionally delays sharing their original songs out of shy modesty, and they channel their cooperative spirit into occasional school talent shows.
  travel: Marilyn Mccormick, a nature‑focused traveler, plans meticulous day‑hike itineraries to places like Grand Canyon and Sedona, dreams of backpacking the fjords of Iceland, balances love of solitude
    with family trips to historic Santa Fe, tends to overpack trail snacks but later marvels at the simplicity of desert nights, and they keep a travel journal to capture each solitary moment.
  culinary: Marilyn Mccormick, a budding home cook, favors spicy green chile stew, makes custom trail‑mix granola bars with pumpkin seeds and dried apricots, experiments with avocado toast topped with feta
    and lime, yet they admit to rely on instant ramen during late‑night study marathons, and they occasionally burn toast while daydreaming about new song lyrics.
  core: Marilyn Mccormick, a solitary‑creative teen, blends practical tech tinkering with artistic wanderlust, quietly excels in school and hikes, yet they occasionally succumb to impulsive gadget purchases
    and late‑night ramen binges.
background:
  cultural: Marilyn comes from a white, Anglo‑American family that has lived in Albuquerque for several generations. Growing up in the high desert of New Mexico, she has been exposed to the region's unique
    blend of Southwestern culture, including Native American art, Spanish colonial history, and local culinary traditions such as green chile cuisine. Family celebrations often incorporate Fourth of July
    fireworks and community festivals like the Albuquerque International Balloon Fiesta, where she appreciates the communal spirit while preferring smaller, more intimate gatherings. This multicultural
    environment has fostered her respect for diverse perspectives while grounding her in the values of her own cultural heritage.
