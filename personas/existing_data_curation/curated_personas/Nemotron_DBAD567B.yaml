  career_goals: Tyrone aims to advance from EMT to certified Paramedic within the next two years, pursuing additional coursework and hands‑on training. He envisions taking on a supervisory role in the Monroe
    EMS department, where he can mentor junior responders and improve response protocols. Passionate about integrating his love for art and community, he plans to develop a health‑and‑wellness outreach
    program that uses visual and performing arts as therapeutic tools for trauma survivors. Long‑term, he aspires to become a regional EMS liaison, bridging emergency services with local cultural institutions
    and public health initiatives to foster holistic community resilience.
