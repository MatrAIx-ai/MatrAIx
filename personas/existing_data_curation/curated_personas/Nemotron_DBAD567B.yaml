personas:
  professional: Tyrone Booth, a seasoned EMT with ACLS certification, leads community first‑aid workshops and is on track to earn a paramedic license, leveraging their flair for public speaking and love
    of the arts to design trauma‑recovery programs that incorporate visual storytelling.
  sports: Tyrone Booth, who jogs the Oconee River Trail each sunrise and joins the Monroe Community Center's pickup basketball league every Thursday, roots for the Atlanta Falcons on weekends and follows
    the Atlanta Hawks, while they mix high‑intensity interval runs with casual river‑side jogging to keep their heart health in check.
  arts: Tyrone Booth, an avid gallery‑hopper and street‑mural photographer who frequently captures moments at the Monroe Playhouse's seasonal productions and curates playlists featuring Leon Bridges, Erykah Badu,
    and Gregory Porter, sees art as both a personal sanctuary and a communal bridge that fuels their outreach workshops.
  travel: Tyrone Booth prefers modest, itinerary‑free road trips that blend photography and food, such as weekend drives to Asheville's Blue Ridge Parkway and annual visits to New Orleans for its jazz scene,
    while they dream of a summer pilgrimage to Provence's lavender fields and the historic markets of Marrakech to harvest new culinary ideas.
  culinary: Tyrone Booth, a moderate home cook who loves re‑imagining Southern soul classics—think collard greens spiced with smoked paprika, shrimp‑and‑grits topped with gochujang‑marinated prawns, and
    fried chicken glazed with honey‑chipotle—frequently samples new dishes at regional food festivals while they never miss the annual barbecue showdown at the Monroe Fairgrounds.
  core: Tyrone Booth, a talkative EMT who merges their love of street‑mural photography with a fierce commitment to community health, often overbooks their calendar with workshops and concerts but never
    misses a chance to snap a candid moment of everyday resilience.
background:
  cultural: Tyrone grew up in a close‑knit African‑American community in Monroe, Georgia, where church, family gatherings, and Southern hospitality shaped his worldview. He was raised on the traditions
    of Gospel music, soul food, and storytelling that celebrate resilience and communal support. His family’s involvement in local church activities instilled a strong sense of service, which later guided
    his career choice in emergency medical services. Through participation in community events like Juneteenth celebrations, Black History Month showcases, and local barbecues, Tyrone maintains deep ties
    to his cultural heritage. He draws upon this background to connect empathetically with patients from diverse backgrounds, and he often incorporates elements of his cultural experience—such as music
    and visual art—into community health outreach programs.
