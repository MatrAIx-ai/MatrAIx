  career_goals: Although retired from formal employment, Wanda aims to deepen her legacy by leading community workshops that teach traditional Mexican cooking techniques and preserve family recipes. She
    plans to compile a bilingual memoir that intertwines personal history with cultural stories, fostering intergenerational connection. Additionally, she seeks to advocate for senior wellness programs
    in Albuquerque, volunteer as a mentor for younger community members, and enroll in online courses on nutrition and digital storytelling to satisfy her curiosity and maintain personal growth.
