personas:
  professional: Wanda Aguilargonzalez, a retired community organizer who now leads bilingual workshops on traditional cooking, they blend methodical event‑planning expertise, meticulous recipe documentation,
    and assertive yet compassionate leadership to create class experiences that feel both ceremonial and precisely organized.
  sports: Wanda Aguilargonzalez enjoys light gardening as functional exercise, they participate in a senior walking club that meets three times a week, volunteer as a scorekeeper for local baseball games
    featuring the Albuquerque Isotopes, and stay faithful to the UNM Lobos basketball team, preferring low‑impact activities that align with their joint comfort.
  arts: Wanda Aguilargonzalez spends evenings crocheting intricate shawls while listening to folk ensembles featuring violin and accordion, they attend Frida Kahlo exhibitions, read historical novels by
    Isabel Allende, and contribute to local cultural festivals where they help curate traditional music performances by groups such as Los Camperos.
  travel: Wanda Aguilargonzalez favors short road trips to Santa Fe’s art markets, pilgrimage visits to their family roots in Jalisco for seasonal celebrations, they dream about exploring Oaxaca’s culinary
    scene, and plan a relaxing getaway to the vineyards of Napa Valley, balancing travel desires with their modest budget and senior health considerations.
  culinary: Wanda Aguilargonzalez crafts authentic pozole using heirloom corn and dried chilies, experiments with rosemary‑infused roasted corn, perfects tamales wrapped in banana leaves, records each variation
    in a leather‑bound notebook, and delights in teaching the nuanced balance of smoky ancho and bright chilhuacle in their signature mole.
  core: Wanda Aguilargonzalez is a disciplined, detail‑obsessed elder whose love for gardening, cooking, and community service coexists with bouts of anxiety that fuel both their meticulousness and occasional
    over‑commitment.
background:
  cultural: Wanda’s Mexican heritage is rooted in her family’s origins in Jalisco, where Catholic celebrations, mariachi music, and communal cooking shaped her early life. Growing up in Albuquerque’s vibrant
    Hispanic enclave, she seamlessly blends Mexican traditions with New Mexican influences, maintaining fluency in both Spanish and English. Her cultural identity is expressed through preserved family recipes,
    participation in religious ceremonies, and a strong commitment to extended family ties. She honors the values of respect, hospitality, and perseverance, while also adapting to the multicultural fabric
    of the Southwest as she shares her knowledge with neighbors and future generations.
