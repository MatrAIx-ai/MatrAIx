personas:
  professional: Everett Bowens is an aspiring business analyst who leverages strong financial‑analysis, strategic‑planning, and data‑visualization skills in Excel and Tableau while balancing curiosity for
    new methods with a practical, organized approach to project management, making them both reliable and adaptable in fast‑paced corporate environments.
  sports: Everett Bowens spends weekends shooting hoops at the McDonough community court, where they mentor middle‑schoolers as a member of the local ‘McDonough Hoopsters’ club, while cheering for the Atlanta
    Hawks in the NBA and joining the occasional fan rally for the Atlanta Falcons during football season.
  arts: Everett Bowens curates eclectic playlists that weave together Kendrick Lamar’s modern hip‑hop, Miles Davis’s timeless jazz, and Aretha Franklin’s soulful classics, and they often spin vinyl as a
    hobbyist DJ at house parties while proudly quoting scenes from ‘Black Panther’ starring Chadwick Boseman.
  travel: Everett Bowens prefers budget‑friendly road trips that blend cultural immersion with local cuisine, having explored New Orleans’ jazz districts and the historic neighborhoods of Savannah, while
    dreaming of a future weekend getaway to Charleston’s waterfront and a spring break adventure in the Caribbean’s vibrant islands.
  culinary: Everett Bowens, a self‑taught home chef, masters their grandmother’s fried chicken seasoned with smoked paprika and buttermilk, whips up collard greens simmered with ham hocks and a dash of
    apple cider vinegar, and occasionally experiments with hot‑sauce‑glazed shrimp tacos, always ensuring a side of buttery cornbread for balance.
  core: Everett Bowens balances razor‑sharp financial curiosity with a heart for community uplift, often staying up late refining budget models, neglecting sleep, and occasionally over‑seasoning dishes
    in an earnest quest for the perfect flavor.
background:
  cultural: Everett is an African‑American raised in Mcdonough, GA, where Southern traditions and a tight‑knit community shape his worldview. He grew up attending a historically Black church that emphasized
    service, resilience, and collective progress, values that continue to influence his personal and professional aspirations. Family gatherings feature soulful music, storytelling, and home‑cooked meals,
    reinforcing a sense of cultural pride and continuity. The civil‑rights legacy of the region, combined with the vibrant local arts scene, has nurtured his appreciation for both heritage and innovation.
    Everett’s upbringing in a predominantly Black neighborhood has also exposed him to the challenges and strengths of his community, fueling his desire to contribute to economic empowerment and social
    uplift in Henry County.
attributes:
  skills: '[''Financial analysis'', ''Strategic planning'', ''Market research'', ''Digital marketing'', ''Project management'', ''Data visualization (Excel, Tableau)'', ''Public speaking'', ''Negotiation'',
    ''Microsoft Office Suite'', ''Basic Python scripting'']'
  hobbies: '[''Basketball (playing and mentoring)'', ''DJing and music curation'', ''Cooking Southern cuisine'', ''Reading business and personal‑development books'', ''Volunteering as a tutor'', ''Hiking
    local trails'', ''Street photography'']'
  career_goals: Everett aims to secure a management‑trainee position at a regional firm where he can apply his analytical skills while learning the operational nuances of a larger organization. He is also
    drawn to entrepreneurship and hopes to launch a consulting startup that assists small businesses in Henry County with financial planning and digital marketing, thereby giving back to his community.
    In the longer term, Everett plans to pursue an MBA to deepen his strategic expertise and expand his professional network, with the eventual goal of taking on a leadership role that bridges corporate
    success and community development.
