persona_description: A forestry scientist who specializes in the study of alpine krummholz, a unique and fragile community found in the Adirondack Mountains of New York. His research interests include the
  long-term effects of atmospheric deposition, climate change, and extreme budworm outbreaks on alpine krummholz occurrences, and the management of the community to maintain its regeneration and protect
  it from further degradation. He is also interested in the classification and documentation of alpine krummholz, as well as the search for large sites in excellent to good condition. He is dedicated to
  preserving this unique and fragile community for future generations.
