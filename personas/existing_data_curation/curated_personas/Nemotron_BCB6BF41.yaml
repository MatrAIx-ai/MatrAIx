  hobbies: '[''LEGO Technic building'', ''Chess playing'', ''Robotics club participation'', ''Traditional drum practice'', ''Beadwork'', ''Hiking and nature observation'', ''Reading nonfiction about ecology
    and Native American history'', ''Strategy video gaming (e.g., Civilization)'']'
  career_goals: Henry aims to pursue a career that combines his analytical mind with a clear, step‑by‑step framework, such as environmental engineering, civil engineering, or computer science. He is especially
    motivated to work on water‑quality and sustainable infrastructure projects that benefit the lakes of Minnesota and the tribal lands of the Ojibwe Nation. He envisions attending a university with a strong
    engineering program—perhaps the University of Minnesota—while continuing to study Ojibwe language and traditions. In the long term, he hopes to return to his community to lead projects that protect
    natural resources and promote cultural preservation.
