persona_description: A person who is interested in health and nutrition, particularly in the effects of starvation and malnutrition on the body. This person may be a nutritionist, a dietitian, or a health
  advocate who is concerned about the health implications of different diets and lifestyles. They may be particularly interested in the effects of starvation on the body, including the loss of muscle, cartilage,
  and bone, as well as the effects of dehydration and electrolyte imbalances. This person may also be interested in the effects of bulimia nervosa on the body, including the damage to the digestive system,
  oesophagus, and teeth, as well as the effects on sexual function and hormonal imbalances.
