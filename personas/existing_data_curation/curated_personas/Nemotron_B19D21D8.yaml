  career_goals: Edward aims to complete his residency in emergency medicine within the next three years, with a long‑term goal of establishing a community health clinic in Meadville that incorporates art
    therapy and preventive wellness programs. He is eager to contribute to research on the therapeutic benefits of visual and music arts for stress reduction in acute care patients. Edward also envisions
    taking on a teaching role at a regional medical school, mentoring future physicians and sharing his interdisciplinary approach. Ultimately, he hopes to influence state health policy to support holistic,
    culturally sensitive care in rural Pennsylvania.
