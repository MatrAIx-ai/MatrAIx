personas:
  professional: Clea Bentley, a veteran community volunteer now aspiring senior‑advocacy coordinator, leverages empathetic mediation, event planning, and low‑income budgeting expertise to design intergenerational
    mentorships, balancing curiosity for fresh ideas with a practical, organized approach while often worrying about every detail being right for the seniors they serve.
  sports: Clea Bentley stays active with weekly strolls through Flushing Meadows, occasional shuffleboard matches at the Queens senior center, and passionate support for the New York Mets, Knicks, and Rangers,
    cheerfully joining neighbors for spring baseball and winter hockey games.
  arts: Clea Bentley weaves vibrant quilts inspired by island motifs while singing in the church choir, devours historical fiction by Ken Follett and Philippa Gregory, and draws inspiration from the rhythms
    of Bob Marley, the improvisations of Miles Davis and Ella Fitzgerald, and the storytelling of local folk artist Maria Hernandez.
  travel: Clea Bentley favors modest, well‑planned trips that blend adventure and comfort, often joining senior group tours to historic Savannah, taking short flights to Caribbean island getaways like Barbados
    for family reunions, and dreaming of a leisurely road‑trip along the Blue Ridge Parkway once finances allow.
  culinary: Clea Bentley delights in preparing aromatic oxtail stew, callaloo, and rice‑and‑peas spiced with scotch bonnet peppers and coconut milk, confidently baking fresh cornbread for community potlucks
    while experimenting with modern twists like mango salsa to enliven classic flavors.
  core: Clea Bentley, a compassionate community elder, channels meticulous planning into lively bingo nights, soulful choir singing, and vibrant quilting, even as a lingering worry about the future compels
    them to double‑check every bill, recipe, and medication schedule.
background:
  cultural: Clea is a Black American with deep roots in the Caribbean diaspora of Queens, reflecting a blend of African‑American and Jamaican cultural traditions. Growing up in Jamaica, Queens, she was
    immersed in the rhythms of reggae, the flavors of island cooking, and the close‑knit community life centered around churches and neighborhood block parties. Her cultural identity informs her love of
    food, music, storytelling, and her commitment to communal support, while also shaping her perspective on resilience and collective well‑being.
attributes:
  skills: '[''Community resource navigation'', ''Elder care and companionship'', ''Caribbean cuisine cooking'', ''Event planning and coordination'', ''Basic computer literacy (email, social media)'', ''Conflict
