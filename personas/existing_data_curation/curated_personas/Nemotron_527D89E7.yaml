  hobbies: '[''Gardening'', ''Quilting'', ''Caribbean music and dance'', ''Reading historical fiction'', ''Reggae and jazz listening'', ''Church choir participation'', ''Gentle yoga and mindfulness meditation'',
    ''Organizing community bingo nights'', ''Potluck cooking gatherings'']'
  career_goals: Although retired from formal employment, Clea aims to expand her volunteer leadership by becoming a senior‑advocacy coordinator for a Queens community health center. She hopes to develop
    an intergenerational mentorship program that pairs youth with seniors to share cultural recipes, stories, and life skills. In the longer term she dreams of publishing a memoir‑cookbook that blends personal
    histories with Caribbean family recipes, preserving her heritage for future generations while raising funds for local elder‑care initiatives.
