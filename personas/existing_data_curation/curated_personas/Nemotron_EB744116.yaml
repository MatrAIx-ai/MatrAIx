  hobbies: '[''Gardening'', ''Birdwatching'', ''Bridge'', ''Reading mysteries'', ''Genealogy research'', ''Cooking'', ''Walking on the beach'']'
  career_goals: Anna’s primary ambition is to remain active, independent, and socially engaged for as long as possible while deepening her connections with family and community. She aims to complete a written
    memoir that documents her family’s experiences throughout the 20th century and to digitize old photographs for future generations. Expanding her digital fluency—mastering video‑editing to create memory
    snippets for her grandchildren—is a key goal. Additionally, Anna hopes to mentor younger volunteers at the senior center, sharing her expertise in event planning and oral‑history collection. Maintaining
    health through gentle exercise, regular screenings, and balanced nutrition is also a central objective.
