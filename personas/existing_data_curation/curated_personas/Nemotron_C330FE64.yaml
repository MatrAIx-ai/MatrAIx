personas:
  professional: Nhu Cornelius, a senior land surveying technician with three decades of expertise in total stations, GNSS, UAV mapping, and GIS platforms like ArcGIS Pro and QGIS, they leverage their methodical,
    data-driven mindset and competitive drive to lead precise mapping projects while mentoring junior staff and pursuing a Professional Land Surveyor license and PMP certification.
  sports: Nhu Cornelius, an avid hiker of the Cascade foothills, regular kayaker on Lake Washington, and competitive midfielder for the Kirkland Co-ed Soccer League, they train with the Cascade Climbers
    club and root for the Seattle Seahawks and Seattle Sounders, channeling their structured, goal-oriented mindset into both weekend adventures and match play.
  arts: Nhu Cornelius, a landscape photographer who captures the misty Pacific Northwest forests with a Sony a7R IV and enjoys the folk harmonies of Fleet Foxes and the cinematic world of Denis Villeneuve,
    they frequently showcase images at local art walks and host board-game nights featuring strategy titles like Terraforming Mars, reflecting a blend of visual precision and social creativity.
  travel: Nhu Cornelius, a meticulous planner who favors self-guided road trips that combine hiking in Olympic National Park, kayaking in the San Juan Islands, and occasional overseas treks to Norway's
    fjords and New Zealand's South Island, they balance a love of nature with a modest budget and a desire to visit friends in Vancouver.
  culinary: Nhu Cornelius, a home-brew enthusiast who meticulously crafts amber ales using Cascade hops and locally sourced honey, they pair their brews with grilled salmon, huckleberry cheesecake, and
    rosemary-infused roasted potatoes, and while their cooking skill is solid at the grill, they occasionally over-hop their beers during late-night experiments.
  core: Nhu Cornelius, a 55-year-old surveyor who balances a love of precise data and competitive sports with a penchant for over-hopping craft beers and a skeptical eye toward anything unstructured, they
    navigate life as a series of well-mapped adventures.
background:
  cultural: Albert grew up in the Pacific Northwest in a traditionally white, middle‑class family with deep roots in the region’s logging and early tech boom. His marriage to a Vietnamese‑American partner
    introduced a blended cultural environment; family gatherings feature both classic American barbecues and Vietnamese dishes like phở and bánh mì. This bicultural household has fostered an appreciation
    for diverse perspectives while reinforcing the Pacific Northwest’s values of environmental stewardship, self‑reliance, and community engagement. Albert identifies with the regional culture of coffeehouse
    discussions, outdoor recreation, and a pragmatic, problem‑solving ethos, all of which shape his personal and professional life.
