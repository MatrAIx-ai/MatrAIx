    nights'', ''Landscape photography'', ''Cycling on regional bike paths'', ''Reading historical non‑fiction'']'
  career_goals: At 55, Albert aims to transition from a senior field technician to a strategic leader within the surveying industry. He plans to earn his Professional Land Surveyor (PLS) license and a Project
    Management Professional (PMP) certification, positioning himself to lead large‑scale infrastructure mapping projects for regional transportation or renewable‑energy initiatives. Albert also hopes to
    mentor the next generation of surveyors, establishing a formal apprenticeship program at his firm. Over the next five years, he envisions launching a boutique consulting practice that offers precision
    geospatial services for sustainable development, while gaining recognition through speaking engagements at GIS conferences and publishing case studies on innovative mapping workflows.
