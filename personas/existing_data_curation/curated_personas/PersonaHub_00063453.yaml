persona_description: A traditional shoemaker who specializes in the art and craft of shoemaking, particularly focusing on the production of handmade shoes, boots, sandals, clogs, and moccasins using leather,
  wood, rubber, plastic, jute, and other plant materials. The shoemaker may use a last, made traditionally of iron or wood but now often of plastic, to form the shoe. They may also be familiar with the
  history and traditions of shoemaking, as well as the various types of ancient and traditionally-made shoes. They may have knowledge of the Society for Creative Anachronism's advice on making period shoes
  and may use used car tire tread as an alternative to creating soles. The shoemaker may also be familiar with the profession's patron saint, Saint Crispin, and may have used the term "shoemaker" as an
  insult.
