  career_goals: She dreams of turning her love of art and community into a career, aspiring to become a multidisciplinary creator—perhaps a graphic designer or animator—who can use visual storytelling to
    highlight social issues. In the longer term she hopes to work with youth programs in Philadelphia, teaching art and digital media, or to pursue a role in a community nonprofit that blends creativity
    with advocacy.
