personas:
  professional: Jasmene Middlebrooks, an aspiring cartoonist and budding animator, channels youthful curiosity and disciplined sketches into daily art practice using a tablet and watercolors while balancing
    schoolwork and community art workshops.
  sports: Jasmene Middlebrooks, an energetic participant in their community’s youth basketball league, practices three days a week at the local park, roots for the Philadelphia 76ers and occasionally watches
    the Philadelphia Union soccer matches, and mixes in dance club workouts to stay agile on the court.
  arts: Jasmene Middlebrooks, a dedicated art enthusiast who sketches cartoons inspired by Bill Watterson’s Calvin and Hobbes, experiments with watercolor like Winslow Homer, animates short clips using
    Procreate, follows the cinematic storytelling of Hayao Miyazaki, and regularly attends the Philadelphia Museum of Art’s “Kids Create” workshops, infusing each project with a love for vibrant visual
    narratives.
  travel: Jasmene Middlebrooks, a curious traveler who enjoys short family road trips to historic Philadelphia sites like Independence Hall and the Liberty Bell, dreams of exploring the Smithsonian Air and Space
    Museum in Washington, D.C., plans itineraries on a colorful wall map, and balances weekend adventures with school assignments and after‑school art projects.
  culinary: Jasmene Middlebrooks, a budding foodie who favors homemade pepperoni pizza with extra mozzarella, bakes chocolate chip cookies loaded with dark chocolate chunks, experiments with simple berry
    parfaits inspired by watercolor palettes, and often helps their parent whisk up cinnamon‑nutmeg pancakes on weekend mornings.
  core: Jasmene Middlebrooks, a creative, sociable twelve‑year‑old who blends cartoons, basketball, and community art into a spirited, organized yet occasionally impulsive life, navigating challenges with
    kindness, curiosity, and a hint of procrastination.
background:
  cultural: Jasmene is an African‑American girl raised in the vibrant neighborhoods of Philadelphia. She is immersed in the city's rich Black cultural heritage—listening to hip‑hop and jazz, celebrating
    events like the African American Museum's youth workshops, participating in church choirs, and engaging with community programs that emphasize empowerment, storytelling, and artistic expression within
    the Black diaspora. Her family traditions include cooking soul food with her grandparents, attending local festivals such as the Odunde Festival, and sharing stories of African ancestry that shape her
    sense of identity and community responsibility.
