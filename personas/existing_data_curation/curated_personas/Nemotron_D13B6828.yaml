  career_goals: Deborah aims to advance to a senior accounting or office manager position within the next five years, leveraging her practical experience and interpersonal strengths. She plans to obtain
    the Certified Bookkeeper designation and deepen her expertise in payroll compliance and tax filing. Long‑term, she envisions launching a small bookkeeping consultancy serving local entrepreneurs, allowing
    her to combine her love for community interaction with a flexible schedule that supports her family life. Enhancing her organizational habits and leadership confidence are key personal development goals
    she hopes to achieve through targeted training and mentorship.
