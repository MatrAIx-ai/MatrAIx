  sports: Doris Ratliffe delights in parent‑child gymnastics classes at the community center and eagerly watches the hometown baseball team, the River City Raccoons, cheering during games, while also enjoying
    seasonal splash‑pad play in the summer.
  arts: Doris Ratliffe dances to The Wiggles, hums along with Raffi's 'Baby Beluga', and gets lost in the vivid illustrations of Dr. Seuss, often joining lively group sing‑alongs at the daycare.
  travel: Doris Ratliffe loves short family road trips to the local zoo and park, has a bright-eyed wish to visit Disney World, prefers familiar routines but shows excitement for new playgrounds when they
    appear.
  culinary: Doris Ratliffe favors soft mashed sweet potatoes, ripe banana slices, and occasional chicken nuggets, refuses broccoli, and delights in the smooth texture of pureed peas.
  core: Doris Ratliffe blends calm resilience with an outgoing love for group play, balancing predictable routines with spontaneous fun, while occasionally forgetting to finish a snack before darting off
    to the next adventure.
