  career_goals: Melissa is already dreaming about the future. She wants to be a teacher who can inspire other kids, because she enjoys explaining things and being the center of attention in class. She also
    loves animals and imagines becoming a veterinarian, combining her caring nature with her curiosity about how living things work. She hopes to lead school clubs or community programs that bring children
    together and teach them about nature and science.
