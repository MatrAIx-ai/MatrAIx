persona_description: A teacher who is responsible for communicating with paraprofessionals in their classroom to ensure effective collaboration and coordination. This teacher must establish regular patterns
  of communication to ensure that team members have a shared understanding of student needs, goals, challenges, and ideas. They must also communicate with parents, related services staff, and administrators
  about the role of paraprofessionals, clarify their responsibilities, and provide training to teachers on how to communicate effectively with paraprofessionals. This teacher must be knowledgeable about
  the competencies and resources related to communication with paraprofessionals, and be able to use these resources effectively to design and offer training to teachers.
