personas:
  professional: Algen Yi is a 22‑year‑old full‑stack developer who blends a humanities perspective with clean Python and React code, crafting user‑centered designs for social‑impact platforms while mentoring
    junior coders at a community center, and often balances curiosity‑driven experiments with the practical need to ship functional prototypes on tight agile sprints despite a tendency to overrun deadlines.
  sports: Algen Yi follows the Houston Astros and Dallas Cowboys with fervor, plays pick‑up basketball at the local YMCA, is a member of the Beaumont Soccer Club’s weekend league, and enjoys hiking the
    Sam Houston National Forest as a low‑key cardio alternative, balancing team spirit with solo outdoor pursuits.
  arts: Algen Yi plays saxophone in a downtown jazz ensemble that riffs on the works of John Coltrane and Kamasi Washington, photographs street life à la Gordon Parks with a Nikon DSLR, and dives into indie
    narrative‑driven games like “Oxenfree” and “What Remains of Edith Finch,” while drawing creative inspiration from the poetry of Octavia Butler and the visual storytelling of Spike Lee.
  travel: Algen Yi loves short road trips to Gulf Coast gems like Galveston and New Orleans for live jazz, has trekked the Piney Woods of East Texas, dreams of exploring the cultural archives of Dakar,
    Senegal, and meticulously plans each journey with a mix of spontaneous detours and budget‑friendly Airbnb stays, though a student budget sometimes limits travel duration.
  culinary: Algen Yi delights in cooking Southern soul food classics such as shrimp and grits, collard greens seasoned with smoked paprika, and peach cobbler, often sourcing fresh okra from the local farmer’s
    market, and experiments with a sweet‑and‑spicy glaze for barbecued ribs while sharing meals with friends over a backdrop of classic Motown playlists.
  core: Algen Yi merges a tech‑savvy, socially conscious mindset with a love for jazz, cooking, and spontaneous creativity, even if they occasionally let deadlines slip and forget to log every expense.
background:
  cultural: Algen grew up in Beaumont, Texas, within a close‑knit African‑American family that emphasized community, faith, and storytelling. His upbringing was shaped by the rich Gulf Coast Black culture—church
    choir singing, soul food gatherings, and local festivals like Juneteenth and the Beaumont Jazz & Blues Festival. He was exposed early to African‑American literature, hip‑hop, and jazz, which inform
    his creative sensibilities. The region’s history of civil‑rights activism and a strong emphasis on education inspired his commitment to using technology to uplift underrepresented voices. While he values
    his Southern roots, he also embraces the broader diaspora through online communities, music, and collaborative art projects.
attributes:
  skills: '[''Python'', ''JavaScript'', ''React'', ''Node.js'', ''HTML/CSS'', ''User Experience (UX) Design'', ''Data Visualization'', ''Agile Scrum'', ''Technical Writing'', ''Cross-cultural Communication'']'
  hobbies: '[''Reading speculative fiction'', ''Playing indie video games'', ''Saxophone performance'', ''Street photography'', ''Cooking Southern cuisine'', ''Mentoring youth in coding'', ''Attending Juneteenth
    festivals'', ''Hiking in Sam Houston National Forest'']'
  career_goals: Algen aims to become a senior full‑stack engineer who leads projects that intersect technology with social impact, particularly in education and cultural preservation. Over the next five
    years he plans to deepen his expertise in AI‑driven user experiences, earn a certification in Human‑Computer Interaction, and contribute to open‑source tools that improve accessibility for underrepresented
    communities. He also aspires to mentor Black youth in STEM, eventually launching a community‑focused startup that offers affordable, culturally relevant learning platforms.
