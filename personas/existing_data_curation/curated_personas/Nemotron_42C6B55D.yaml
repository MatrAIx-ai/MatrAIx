  hobbies: '["Golf", "Woodworking", "Historical Non-fiction Reading", "Chess", "Finance Committee Volunteering at Local Baptist Church", "Hiking", "Nature Photography", "Southern BBQ Cooking", "Fishing",
    "Attending Charlotte Knights Baseball Games"]'
  career_goals: His primary career ambition is to become a Certified Public Accountant (CPA) within the next two years and leverage that credential to move into a senior auditor or financial controller
    role at a mid‑size manufacturing firm in the Charlotte metropolitan area. Charles aims to lead audit teams, streamline audit methodologies, and eventually pursue partnership in a regional public‑accounting
    practice. He also aspires to develop a niche consulting practice focused on financial compliance for local small‑business owners, blending his competitive drive with his desire for long‑term stability.
