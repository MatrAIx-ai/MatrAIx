personas:
  professional: Martha Marquez is a veteran social worker with fifteen years of experience in case management for immigrant families, who blends her curiosity for innovative trauma‑informed practices with
    a pragmatic, data‑driven approach to grant writing, program development, and advocacy, while confidently asserting herself in boardrooms and keeping project timelines organized yet flexible.
  sports: Martha Marquez satisfies her love for the outdoors by hiking the Texas Hill Country with a local trail club, joining a weekend running group for 5‑k races, and following Austin FC in Major League
    Soccer, while occasionally playing recreational volleyball at the community garden’s weekend gatherings.
  arts: Martha Marquez channels her creative side through street‑level photography inspired by Henri Cartier‑Bresson, regularly volunteers as a docent at the Blanton Museum of Art, and immerses herself
    in Austin’s multicultural festivals where she enjoys live performances by Tejano‑style bands and indie folk artist Sufjan Stevens.
  travel: Martha Marquez prefers road‑trip adventures that blend planning with spontaneity, having explored the wineries of Fredericksburg, the desert scenery of New Mexico’s White Sands, and the historic
    town of Antigua in Guatemala, while she dreams of a future retreat in the cloud forests of Costa Rica to study local healing traditions.
  culinary: Martha Marquez is an enthusiastic home cook who, at an intermediate skill level, regularly prepares dishes such as baleadas, sopa de frijoles con plátano, and pollo a la plancha with cilantro‑lime
    salsa, delights in grilling Texas‑style brisket on weekends, and sources fresh herbs, plantains, and ripe mangoes from the community garden for her meals.
  core: Martha Marquez balances a pragmatic, data‑driven social work career with a zest for hiking, photography, and cooking traditional dishes, all while staying financially savvy, health‑conscious, and
    occasionally guilty of late‑night coffee and unfinished grant drafts.
background:
  cultural: Martha was born to Honduran parents who immigrated to the United States when she was a child. She grew up bilingual, steeped in the Catholic traditions, folk music, and culinary customs of Honduras
    while also absorbing the diverse Latino culture of Austin. Her family celebrates Honduran holidays such as Día de la Independencia with traditional foods and music, and she maintains close ties to a
    network of Honduran immigrants in the city. This bicultural perspective informs her professional practice, allowing her to navigate the nuances of Hispanic identity in Texas and advocate effectively
    for her community.
