  hobbies: '[''Hiking in the Texas Hill Country'', ''Cooking traditional Honduran dishes'', ''Yoga'', ''Reading historical fiction'', ''Community gardening'', ''Photography'', ''Attending cultural festivals'']'
  career_goals: Martha aims to transition into a senior leadership role within a nonprofit serving Central American immigrants, such as becoming a program director or senior policy advocate. She plans to
    pursue an MSW or a specialized certification in trauma‑informed practice to deepen her expertise. Over the next five years, she hopes to design and launch a culturally tailored mental‑health hub in
    Austin that integrates traditional Honduran healing practices with evidence‑based therapy, and to influence local policy to increase resources for immigrant families.
