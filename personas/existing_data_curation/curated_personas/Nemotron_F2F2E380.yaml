personas:
  professional: Denise Stevens, a teen aspiring healthcare administrator, leverages her methodical planning, reliable caretaking, and DIY problem‑solving skills to coordinate community health events while
    skeptically evaluating proposals to ensure practicality.
  sports: Denise Stevens splits her athletic energy between sprinting in her high school track team, competitive pick‑up basketball at the Screven County park, and cheering for the Atlanta Hawks and Georgia
    Bulldogs, approaching fitness with a disciplined training schedule that mirrors her organized academic routine.
  arts: Denise Stevens immerses herself in R&B and gospel sounds from artists such as H.E.R. and Kirk Franklin, while her personal journal reflects the narrative style of contemporary YA author Becky Albertalli
    and her church youth choir experience fuels a budding love of vocal harmony.
  travel: Denise Stevens prefers budget‑friendly, well‑planned trips, dreaming of a weekend road‑trip to Savannah's historic district and a summer volunteer‑service stint in New Orleans, balancing her wish
    for cultural immersion with her family's modest travel budget.
  culinary: Denise Stevens enjoys cooking Southern comfort staples such as fried chicken, collard greens, and honey‑glazed sweet potatoes, confidently mastering a skillet‑seared pork chop while also savoring
    the occasional fast‑food pizza slice as a guilty‑pleasure indulgence.
  core: Denise Stevens is a meticulous teen whose love of planning and community service is paired with a skeptical edge that makes them double‑check every promise, a habit that sometimes slows spontaneous
    fun but fuels her drive toward a future in public health.
background:
  cultural: Denise is a Black teenager raised in Sylvania, Georgia, deeply rooted in the Southern African‑American cultural tradition. Her family places strong emphasis on church involvement, gospel music,
    and communal support, which have shaped her values of reliability and service. She grew up attending family gatherings that feature soul food cooking and storytelling, preserving a rich heritage of
    oral history. The legacy of the civil rights movement in the region and the resilience of her community inform her competitive spirit and her desire to contribute positively to her neighborhood. Denise’s
    cultural background also includes exposure to African‑American literature and media that inspire her curiosity and practical aspirations.
attributes:
  skills: '[''organizational planning'', ''basic computer literacy (word processing, spreadsheets, social media management)'', ''DIY home repair and sewing'', ''cooking traditional Southern soul food'',
    ''caretaking and tutoring'', ''track and field sprinting'', ''critical thinking'']'
  hobbies: '[''reading young adult fiction and biographies'', ''church youth choir'', ''basketball and community park games'', ''DIY crafts and bike repair'', ''listening to R&B and gospel music'', ''journaling'',
    ''volunteering at community center'']'
  career_goals: Denise aims to leverage her organizational talent and community focus to pursue a career in healthcare administration or public health, hoping to improve access to medical services in rural
    Screven County. She plans to attend a community college after obtaining her GED, study health sciences, and eventually work as a medical office manager or health outreach coordinator. In the longer
    term, she envisions starting a community health initiative that combines health education with wellness programs for youths. Her competitive drive also fuels an ambition to earn scholarships based on
    extracurricular achievements.
