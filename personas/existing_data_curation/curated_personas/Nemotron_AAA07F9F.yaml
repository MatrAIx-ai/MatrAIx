  career_goals: Alan dreams of becoming an engineer or astronaut who designs inventions that help his community, inspired by his love of building and space. He also imagines himself as a future fire captain,
    valuing the practical, lifesaving aspect of the role. While still young, he sets short‑term goals to win school science fairs, lead his soccer team as captain, and master more advanced coding projects,
    showing his blend of curiosity, practicality, and competitive ambition.
