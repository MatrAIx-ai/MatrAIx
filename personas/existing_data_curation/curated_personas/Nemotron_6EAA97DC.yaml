  career_goals: Christopher is focused on advancing into a senior supervisory role within the nursing support team, where he can leverage his extensive experience to mentor younger assistants and improve
    care protocols. He intends to obtain a Certified Nursing Assistant (CNA) credential and is exploring part‑time coursework toward a Licensed Practical Nurse (LPN) qualification. Additionally, he hopes
    to lead community health outreach programs in Claremont, providing education on preventive care and chronic‑disease management for seniors and underserved residents.
