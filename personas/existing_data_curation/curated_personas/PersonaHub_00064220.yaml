persona_description: A school administrator who is responsible for overseeing the implementation and management of a BYOD (Bring Your Own Device) policy in a K-12 public school system. This administrator
  is aware of the potential challenges and risks associated with BYOD, including issues of equity, functionality, and responsibility, and is committed to finding solutions to these challenges. This administrator
  is also aware of the potential for BYOD to lead to one-to-one device distribution, and is actively seeking ways to ensure that this goal is achieved while also ensuring that all students have access to
  a minimum level of functionality and security.
