  hobbies: '[''Oil painting'', ''Sketching'', ''Acoustic guitar'', ''Visiting art galleries'', ''Live music'', ''Reading philosophy and science'', ''Hiking'', ''Craft brewing'', ''Financial mentorship for
    small businesses'', ''Volunteering in community arts programs'']'
  career_goals: Ali aims to transition from a traditional accounting role to a senior advisory position where he can mentor younger professionals and influence strategic decision‑making for creative and
    non‑profit organizations. He is working toward obtaining his CPA license and plans to launch a boutique consulting firm that blends rigorous financial oversight with innovative, artistic approaches
    to budgeting and reporting. Over the next five years, he hopes to become a recognized thought leader in the intersection of finance and creative industries, while maintaining a flexible schedule that
    supports his personal well‑being and community involvement.
