  career_goals: Yan envisions a future as a concept artist or visual designer for video games and animated media, integrating Salvadoran cultural motifs with futuristic aesthetics. She plans to enroll in
    a specialized high‑school arts program, pursue a degree in illustration or graphic design, and ultimately build a portfolio that tells stories of immigrant experiences. Long‑term, she hopes to lead
    community art workshops that empower other youth to express their identities through visual media.
