personas:
  professional: Yan Quiles, a budding visual storyteller who weaves watercolor and digital painting into short, sci‑fi inspired narratives, leverages their boundless imagination and love for novelty to
    excel in spontaneous online art challenges while favoring flexible, unstructured project timelines over strict planning, and they thrive when collaborating with a tight‑knit group of peers who value
    creative risk‑taking.
  sports: Yan Quiles keeps a casual relationship with sports, joining occasional pick‑up soccer games with friends after school, cheering for the Los Angeles Galaxy in MLS and the Chicago Bulls during the
    NBA season, while they prefer low‑key activities like yoga and daily stretching to maintain flexibility rather than committing to organized team sports.
  arts: Yan Quiles cultivates a rich artistic life by sketching daily in a notebook, experimenting with watercolor and digital tools to illustrate short sci‑fi stories, curating playlists that blend Tame Impala,
    M83, and Café Tacvba, and drawing inspiration from graphic novels such as Saga, The Sandman, and Monstress, while they participate in weekly online art challenges that sharpen their visual storytelling.
  travel: Yan Quiles approaches travel as a creative escape, favoring spontaneous weekend road trips to nearby mural‑covered neighborhoods and family visits to their grandparents’ hometown in Central America,
    while they dream of a spring study‑abroad adventure in Barcelona to soak in Gaudí’s architecture and the city’s vibrant street‑art scene, balancing a limited teenage budget with occasional fund‑raising
    gigs for art supplies.
  culinary: Yan Quiles delights in helping prepare family staples like pupusas and tamales—mastering masa harina dough, layering cheese and savory fillings, and steaming them to perfection—while also experimenting
    with avocado toast topped with cotija cheese, smoked paprika, and a drizzle of hot sauce, and they showcase a solid kitchen skill set that blends tradition with youthful culinary curiosity.
  core: Yan Quiles is a 14‑year‑old imagination‑driven visual storyteller who balances spontaneous creativity with occasional disorganization, turning art, music, and family heritage into a uniquely vibrant
    worldview, and they approach each day with quiet curiosity.
background:
  cultural: Yan is a first‑generation Salvadoran American raised in Panorama City, Los Angeles County. At home, Spanish is spoken regularly, and her family celebrates Salvadoran holidays like Día de los
    Fieles Difuntos and the Fiesta de San Salvador. The vibrant colors and folk art traditions of El Salvador inspire her own artistic style, leading her to incorporate tropical motifs and symbolic patterns
    into her work. Growing up amidst a multicultural Los Angeles environment, Yan balances a strong sense of cultural identity with openness to diverse influences, fostering both pride in her heritage and
    curiosity about the wider world.
