persona_description: A QUT senior research fellow who specializes in dermatology research, particularly in the use of technology to improve early detection and treatment of skin cancer. She is currently
  trialing a new device called the HandyScope that allows individuals to scan their own skin, take photos, record data, and send it to health professionals for quick feedback. If successful, the HandyScope
  could revolutionize health care and enhance early detection of skin cancer.
