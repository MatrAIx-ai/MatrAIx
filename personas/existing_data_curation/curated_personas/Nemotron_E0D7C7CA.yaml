  professional: Jose Maderatorres is a three‑year‑old who treats his building‑block sessions like a tiny engineering lab, methodically sorting each piece by shape and size and quietly taking charge of their
    small group’s play, reflecting their love of routine and practical problem‑solving.
  sports: Jose Maderatorres is a three‑year‑old who loves climbing the low rope net at the neighborhood playground, participates in the Tiny Tots Soccer Club every Saturday, and quietly cheers for the local
    Major League Baseball team, the Chicago Cubs, during family game nights.
  arts: Jose Maderatorres is a three‑year‑old who delights in singing along to Raffi's 'Baby Beluga', mimics the dance moves from the animated series 'Bluey', and prefers drawing simple house pictures with
    crayons, reflecting their practical yet imaginative side.
  travel: Jose Maderatorres is a three‑year‑old who enjoys short family road trips to the nearby aquarium, the sandy beach of Santa Monica, and a weekend stay at a grandma’s cottage where the predictable
    schedule of meals and nap times makes them feel safe and happy.
  culinary: Jose Maderatorres is a three‑year‑old who loves creamy mac and cheese, crunchy apple slices, and the occasional bite of mango, often insisting on serving their food on a divided plate to keep
    flavors separate, a habit illustrating their need for order.
  core: Jose Maderatorres is a three‑year‑old who thrives on routine, organizes their toys by color, and quietly navigates big‑group settings with a soothing grin, yet can turn dramatically stubborn when
    their snack preferences are challenged.
background:
