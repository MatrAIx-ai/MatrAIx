  career_goals: Jeremy aims to transition from full‑time employment to a part‑time consultancy role where he can apply his extensive knowledge to help small businesses modernize legacy systems. He aspires
    to mentor the next generation of programmers through workshops at the local senior tech club and by contributing to open‑source projects focused on accessibility. Additionally, he hopes to author a
    memoir of his experiences in the tech industry, sharing lessons learned about balancing structure with flexibility in software development.
