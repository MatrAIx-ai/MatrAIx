personas:
  professional: Dottie Ferguson, a tiny community helper, spends playtime coordinating block towers and assigning roles to stuffed animals, showing methodical planning and reliability that hint at a future
    in early childhood education.
  sports: Dottie Ferguson, a lively participant in the Columbia Community Center's Tiny Tots Gymnastics class, loves climbing the foam mountain and chasing the orange ball during preschool soccer, while
    cheering on the St. Louis Cardinals whenever a game plays on the family TV.
  arts: Dottie Ferguson, an enthusiastic mini-artist, spends afternoons scribbling with Crayola crayons, dancing to Raffi’s Baby Beluga, and reenacting favorite storybook scenes from The Very Hungry Caterpillar,
    letting music and illustration shape their vibrant play world.
  travel: Dottie Ferguson, a curious explorer, delights in weekend trips to the Saint Louis Zoo and the annual Fourth of July fireworks at Lake of the Ozarks, while daydreaming about a future family adventure
    to Disneyland’s Fantasyland.
  culinary: Dottie Ferguson, a picky but adventurous eater, adores smooth mac and cheese, sweet apple slices, and the occasional bite of avocado toast, proudly using a child-sized plastic fork to scoop
    up the colorful mash of peas and carrots.
  core: Dottie Ferguson is a methodical, sociable toddler who balances an insatiable curiosity with a knack for orderly play, a pocket-sized savings habit, and a love for glitter stickers.
background:
  cultural: Dottie is raised in a predominantly white, middle‑class family in Columbia, Missouri. Her household participates in typical Midwestern traditions, celebrating holidays like Thanksgiving and
    Fourth of July with family gatherings and community events. She attends a local preschool where multicultural awareness is introduced through books and songs, while her family values neighborly cooperation
    and community involvement, often visiting the nearby library and church for group activities.
