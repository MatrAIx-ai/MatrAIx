  career_goals: Although still very young, Dottie loves to mimic the adults around her and often says she wants to "help other kids" and "be a teacher" when she grows up. She frequently pretends to organize
    her stuffed animals, showing an early interest in nurturing and guiding peers. Her ambitions are expressed through playful statements about learning to read, drawing pictures for friends, and caring
    for her family's garden, reflecting a blend of curiosity and practical intent.
