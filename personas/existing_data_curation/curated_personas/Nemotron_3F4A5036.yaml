personas:
  professional: Erika Velez, a seasoned agricultural data analyst with three decades of experience, leverages their meticulous statistical and GIS expertise in R and Python to design predictive models for
    crop resilience while coordinating interdisciplinary teams, balancing their scientific curiosity with the practical constraints of rural farming communities.
  sports: Erika Velez, a dedicated member of the local senior walking group, enjoys early-morning walks along the prairie trails that border their town, roots for the Nebraska Cornhuskers football team
    each fall, and pitches in the community softball league, balancing their modest fitness routine with a low-key love of watching the Chicago Cubs on television during the summer.
  arts: Erika Velez finds creative solace in classic boleros by José José and Lucho Gatica while curating a modest collection of vintage folk art, and they actively contribute to their women’s book club
    discussions of nonfiction works by Rachel Carson and Amartya Sen, blending literary curiosity with a deep appreciation for music that evokes family gatherings.
  travel: Erika Velez prefers thoughtfully planned road trips that combine agricultural heritage with cultural immersion, such as their recent week-long journey through California’s Central Valley visiting
    farm co-ops and a small pueblo in New Mexico for Día de los Muertos celebrations, while budgeting for future visits to the Great Plains’ prairie preserves and the historic vineyards of Oregon.
  culinary: Erika Velez, an adept home chef, spends weekends perfecting tamales and empanadas layered with masa harina, Oaxaca cheese, and roasted chilies, while also experimenting with heirloom tomato
    sauces enriched with basil and roasted corn, and they relish sharing these dishes at church potlucks, though they occasionally over-spice in a bout of enthusiastic nostalgia.
  core: Erika Velez blends analytical rigor with a love for prairie gardening, traditional family cooking, and quiet reflection, navigating age-related health concerns and financial prudence while nurturing
    community ties through mentorship and modest indulgences.
background:
  cultural: Erika is a second‑generation Hispanic American; her parents emigrated from central Mexico in the 1970s and maintained a bilingual household where Spanish was spoken alongside English. Growing
    up in Columbus, NE, she balanced the customs of her Mexican heritage—such as celebrating Día de los Muertos with altars and cooking family recipes—with the values of rural Midwestern life, including
    community self‑reliance and church involvement. Her cultural identity influences her commitment to family, the importance she places on communal food traditions, and her desire to give back to the local
    Hispanic community through mentorship and outreach programs.
