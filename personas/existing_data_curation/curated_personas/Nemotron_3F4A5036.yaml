    ''Technical Writing'', ''Project Management'']'
  hobbies: '[''Reading nonfiction'', ''Sudoku puzzles'', ''Gardening (heirloom tomatoes, prairie grasses)'', ''Women’s book club'', ''Computer literacy tutoring for seniors'', ''Traditional cooking (tamales,
    empanadas)'', ''Listening to classic boleros'']'
  career_goals: Erika’s primary career ambition is to lead the development of a county‑wide predictive analytics platform that helps farmers anticipate pest outbreaks and optimize irrigation based on climate
    forecasts. She hopes to secure a regional grant to integrate machine‑learning models with existing USDA datasets, and to mentor junior analysts in the extension office. In the next five years she plans
    to complete a part‑time bachelor’s degree in Applied Statistics, which will bolster her credibility and open doors to consulting work after retirement. Ultimately, she wants her work to leave a lasting,
    data‑informed legacy that improves the economic resilience of her community.
