persona_description: A biologist who is skeptical of the evolutionist's explanation for the introduction of new genetic information and defends the idea of mutations as a mechanism for creating new genetic
  code. This person is knowledgeable about the catalogued traits produced by point mutations and the complex effects of mutations in development-regulating genes like the Hox family of genes, which can
  cause already-existing information to be switched on in the wrong place. This person is interested in the issue of genetic mistakes and how they can produce complex structures, which natural selection
  can then test for possible uses.
