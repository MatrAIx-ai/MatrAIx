  career_goals: Joseph aims to transition into a regional sales management role where he can mentor younger representatives and shape sales strategy for his company’s expanding market in the Mountain West.
    He is also exploring the possibility of launching his own niche distribution business focused on sustainable building materials, leveraging his extensive network of manufacturers and contractors. Long‑term,
    he hopes to achieve financial security that allows for early retirement while remaining active in community leadership and industry consulting, using his practical expertise to help local businesses
    grow.
