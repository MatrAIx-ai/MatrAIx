personas:
  professional: Joseph Lee, a veteran wholesale and manufacturing sales representative with 25 years of B2B relationship‑building, data‑driven market analysis, and high‑stakes contract negotiation, channels
    their competitive edge and love of structure into consistently exceeding quota while mentoring junior reps in a methodical, detail‑oriented manner.
  sports: Joseph Lee, an avid outdoorsman who spends weekends fly‑fishing the Clark Fork, hunting elk in the Selkirk Mountains, and hiking the foothills, they also coach youth soccer for the Coeur d'Alene
    Tigers and bowl with the Kootenai County League, while cheering for the Seattle Seahawks and the Idaho Vandals football team, and blend their competitive spirit with community camaraderie.
  arts: Joseph Lee, who restores 1965 Ford Mustangs at weekend garage meet‑ups, they find solace in the gritty storytelling of Bruce Springsteen and Johnny Cash, frequent the Coeur d'Alene Community Theatre
    for live plays, and devour self‑help titles like Resilience by Eric Greitens, letting music and storytelling balance their pragmatic outlook.
  travel: Joseph Lee, a methodical road‑trip planner, they treasure drives through Glacier and Yellowstone National Parks, weekend escapes to Portland’s food scene, annual visits to Seattle’s Pike Place
    Market, and dream of a guided trout‑fishing expedition in New Zealand’s South Island, yet keep travel budgets tight to protect retirement savings.
  culinary: Joseph Lee, a competent home cook who favors hearty dishes like cedar‑plank salmon, venison chili, and Idaho baked potatoes smothered in sour cream and chives, they relish crafting their own
    BBQ rub for weekend grill sessions, yet occasionally succumb to late‑night fast‑food cravings after a long hunting trip.
  core: Joseph Lee, a structured, competitive sales veteran who wrestles with intense anxiety, they find solace in vintage car restoration, mindfulness meditation, and occasional late‑night fast‑food binges,
    while skeptically guarding their finances and nurturing their community roots.
background:
  cultural: Joseph grew up in a small farming community in northern Idaho, raised in a white American family with Irish and German ancestry. His upbringing emphasized self‑reliance, hard work, and close‑knit
    community values common to the rural Pacific Northwest. He celebrates traditional American holidays such as Independence Day and Thanksgiving with local potlucks, and he participates in regional events
    like the Kootenai County fair. The cultural norm of respecting the land and preserving natural resources shaped his love for outdoor activities. While his background aligns with mainstream American
    cultural practices, his experiences as a widower and his involvement in support groups have broadened his perspective on community care and emotional well‑being.
