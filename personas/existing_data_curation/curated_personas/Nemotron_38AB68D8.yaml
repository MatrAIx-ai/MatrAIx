personas:
  professional: Timothy Dunson is a teaching assistant in the humanities who blends rigorous scholarly research with practical curriculum design, leveraging NVivo, Zotero, and Canvas to build inclusive,
    community‑engaged courses while mentoring diverse students and balancing curiosity with reliable organization.
  sports: Timothy Dunson channels energetic sociability into weekly pickup basketball at the Cedar River community center, cheering for the Portland Trail Blazers and the Seattle Storm, while also hiking
    the Cedar River trails in spring and joining the local Cedar River Hoops Club for seasonal tournaments.
  arts: Timothy Dunson immerses themselves in live jazz and hip‑hop shows featuring artists like John Coltrane, Kendrick Lamar, and Nina Simone, curates book reviews for a literary blog on contemporary
    authors such as Zadie Smith and Chimamanda Ngozi Adichie, and draws inspiration from visual storytellers like Gordon Parks for their nature photography.
  travel: Timothy Dunson prefers purposeful travel that blends adventure with cultural immersion, planning trips around historic neighborhoods in New Orleans, hiking the Grand Canyon’s South Rim, and attending
    a literary festival in Edinburgh, while balancing a modest travel budget with occasional weekend getaways to nearby state parks.
  culinary: Timothy Dunson delights in cooking soul‑food classics like fried chicken, collard greens, cornbread, and sweet potato pie, experimenting with spice blends such as smoked paprika and cayenne,
    while hosting communal meals that feature homemade mac and cheese and seasonal farm‑to‑table vegetables.
  core: Timothy Dunson is a 45‑year‑old educator‑mentor who fuses scholarly curiosity with community‑centered energy, balancing disciplined budgeting and health monitoring with a love for basketball, jazz,
    soulful cooking, and storytelling through photography, even if they sometimes forget dentist appointments.
background:
  cultural: Timothy identifies as African American and grew up in the Seattle metropolitan area, where he was part of a close-knit Black community that values resilience, education, and cultural expression.
    His family traces its roots to the Great Migration, with grandparents who settled in the Pacific Northwest seeking industrial work and civil-rights activism. He was raised with Southern culinary traditions,
    gospel music, and a strong emphasis on community service. This cultural heritage informs his worldview and teaching philosophy, as he strives to bring African American literary and historical perspectives
    into the classroom, celebrate Black culture through community events, and mentor students from underrepresented backgrounds. He actively participates in local chapters of organizations such as the NAACP
    and the Black History Association of Washington, staying connected to broader cultural and social-justice movements.
attributes:
  skills: '[''Instructional design'', ''Discussion facilitation'', ''Academic coaching'', ''Literature review'', ''Primary source analysis'', ''Qualitative data analysis (NVivo)'', ''Citation management
    (Zotero)'', ''Learning Management System (Canvas) administration'', ''Student mentorship'', ''Conflict mediation'', ''Multimedia integration'', ''Community-based project development'']'
  hobbies: '[''Pickup basketball'', ''Live jazz and hip-hop concerts'', ''Community festivals'', ''Reading historical non-fiction'', ''Reading contemporary African American literature'', ''Writing book
    reviews for a literary blog'', ''Cooking soul-food'', ''Hiking Cedar River trails'', ''Nature photography'', ''Mentoring high-school students'']'
  career_goals: Timothy aims to transition from his current teaching-assistant role to a full-time lecturer or adjunct professor position, pursuing a master's degree in education or a PhD in African American
    literature to deepen his scholarly expertise. He plans to develop a signature course on Black literary voices, secure grant funding for community-engaged learning projects, and publish research on the
    intersection of digital media and humanities pedagogy. His ambition also includes establishing a mentorship program for underrepresented students, becoming a department curriculum coordinator, and contributing
    to the creation of inclusive curricula that reflect diverse cultural perspectives while maintaining practical, measurable outcomes for student success.
