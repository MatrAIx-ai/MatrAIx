persona_description: A scientist who specializes in the study of human evolution, particularly the interbreeding events between humans and Neanderthals. This persona is interested in the genetic and evolutionary
  aspects of human history and the potential implications of these events on modern humans. They are knowledgeable about the Neanderthal genome project and the evidence for human Neanderthal interbreeding,
  and are interested in the potential for peaceful exchanges and other explanations for the interbreeding events. They may also be interested in the physical and behavioral characteristics of Neanderthals
  and the potential for these to be passed down to modern humans.
