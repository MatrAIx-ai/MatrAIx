personas:
  professional: An experienced tax specialist driven by curiosity and practicality, Sharday Holder blends meticulous record‑keeping with a relaxed scheduling style to demystify federal and Wisconsin tax
    codes for individuals and small businesses, while they lead community workshops and chart a path toward CPA certification and a boutique consultancy that serves low‑income families.
  sports: A lively participant in Zumba and hip‑hop dance, Sharday Holder also roots for the Milwaukee Bucks and follows the Brewers, regularly attending weekend training sessions at their local dance studio
    and they join a community running club that meets at Lakeshore State Park.
  arts: An avid attendee of Milwaukee’s blues, jazz, and soul scene, Sharday Holder regularly enjoys live sets by artists like Buddy Guy, Robert Glasper, and Leon Bridges, and they channel that inspiration
    into their own home playlists while organizing board‑game nights that double as impromptu cultural exchanges.
  travel: An adventurous planner who prefers group trips with friends, Sharday Holder has explored Chicago’s deep‑dish pizza tour, the historic streets of New Orleans for its jazz heritage, and the serene
    wineries of Door County, and they always balance travel cost with their commitment to funding free‑tax‑clinics back home.
  culinary: An enthusiastic home chef, Sharday Holder often whips up soul‑food staples like jambalaya, baked mac & cheese, and herb‑infused grilled chicken using basil and tomatoes from their balcony garden,
    and they delight guests at their weekly potluck gatherings while occasionally over‑seasoning in their quest for bold flavors.
  core: A compassionate, socially‑charged tax professional who blends a love for dance, music, and community service with a laid‑back approach to planning, Sharday Holder channels curiosity into empowering
    low‑income families while they navigate occasional disorganization with humor.
background:
  cultural: Sharday is a Black woman who grew up in Milwaukee’s historically African‑American neighborhoods. Her family traces its roots to the Great Migration, bringing a legacy of resilience and community
    solidarity. She maintains strong ties to the local Black church, which instilled values of compassion, service, and collective uplift. Milwaukee’s vibrant cultural scene—especially its blues, jazz,
    and festivals like Juneteenth—has shaped her appreciation for music and communal celebration. These cultural influences inform her dedication to helping others, her collaborative work style, and her
    commitment to fostering financial literacy within the African‑American community.
attributes:
  skills: '["Tax preparation and filing", "Understanding of federal and state tax regulations", "Financial recordkeeping and analysis", "Client relationship management", "Proficiency with tax software (TurboTax,
    QuickBooks, Excel)", "Business consulting for small enterprises", "Community financial education workshops", "Problem solving and analytical reasoning", "Cultural competence and empathetic communication"]'
  hobbies: '["Group dance classes (Zumba, hip‑hop)", "Volunteer tax assistance at community centers", "Cooking and hosting potluck gatherings", "Exploring Milwaukee’s music scene (blues, jazz, soul)", "Gardening
    on the family balcony", "Reading non‑fiction on personal finance and leadership", "Participating in local African‑American cultural festivals", "Board game nights with friends"]'
  career_goals: Sharday aims to earn her Certified Public Accountant (CPA) designation within the next two years, positioning herself for a senior tax advisor role at a regional firm. Long‑term, she envisions
    launching her own boutique tax consultancy that specializes in serving low‑income families and minority‑owned small businesses in Milwaukee. She also wants to expand her community outreach by establishing
    a seasonal free‑tax‑clinic and mentoring junior tax preparers, especially women of color, to foster greater financial empowerment in her community.
