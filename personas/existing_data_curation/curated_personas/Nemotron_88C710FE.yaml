personas:
  professional: Marilyn Ong, a 14‑year‑old budding visual artist and set‑design enthusiast, channels their curiosity and organized creativity into sketching, watercolor, and digital illustrations for friends’
    social‑media pages while balancing school responsibilities with a collaborative spirit in their drama club’s production team.
  sports: Marilyn Ong enjoys playing recreational soccer with friends at the local community field, follows the Philadelphia Eagles and Penn State Nittany Lions fervently, and when not on the pitch, they
    cheer for the Harrisburg Stampede indoor football team alongside their peers.
  arts: Marilyn Ong immerses themselves in the Harrisburg art scene, drawing inspiration from watercolorist John Singer Sargent, digital illustrator Loish, and the cinematic worlds of Studio Ghibli, while
    they also frequent indie concerts by Ed Sheeran and John Mayer to fuel their acoustic guitar sessions.
  travel: Marilyn Ong loves weekend road trips to Gettysburg’s historic battlefield and Lancaster’s farmers‑market, dreams of exploring New York City’s Broadway shows and the Louvre in Paris, and prefers
    planning their itineraries with friends using collaborative Google Docs despite a modest travel budget.
  culinary: Marilyn Ong relishes crafting avocado toast with a squeeze of lemon, indulging in pepperoni pizza topped with fresh basil, and experimenting with homemade strawberry shortcake, though their
    cooking skills remain at a confident intermediate level as they occasionally burn the edges of their cupcakes.
  core: Marilyn Ong is a creatively curious teen who balances a love for art and music with social excitement, yet wrestles with worry‑driven anxiety that colors their daily routine.
background:
  cultural: Marilyn grew up in a middle-class, predominantly white suburb of Harrisburg, Pennsylvania. Her family’s cultural background reflects typical Mid-Atlantic American values, emphasizing education,
    community involvement, and individual expression. She is influenced by the region’s rich historical heritage and the vibrant local arts scene, often attending community festivals and museum events.
    While her ethnic identity is white, she is exposed to a diverse mix of cultures through school and community programs, fostering an appreciation for different perspectives and artistic traditions.
