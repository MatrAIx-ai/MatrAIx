  hobbies: '[''Sketching'', ''Watercolor Painting'', ''Digital Illustration'', ''Visiting Art Museums'', ''Reading Fantasy Novels'', ''Playing Acoustic Guitar'', ''Journaling'', ''Drama Club (Set and Costume
    Design)'', ''Organizing Movie Nights'']'
  career_goals: Marilyn aspires to turn her passion for art and communication into a career that blends creativity with social impact. She aims to attend a high school with a strong visual-arts program,
    later pursue a Bachelor of Fine Arts in Graphic Design or Art Therapy, and eventually work as a visual communicator for nonprofit organizations or as an art therapist helping youths manage stress. In
    the short term, she plans to build a portfolio of her artwork, volunteer as a peer mentor, and participate in community art projects to gain experience.
