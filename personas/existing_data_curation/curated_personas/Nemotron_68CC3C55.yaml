  hobbies: '[''Reading non‑fiction (economics, technology, biographies)'', ''Chess puzzles'', ''Hiking in the Appalachian foothills'', ''Yoga practice'', ''Cooking modern South Asian cuisine'', ''STEM mentorship
    volunteering'', ''Attending cultural gatherings at community center'', ''Jazz and classical music listening'', ''Photography of nature and cityscapes'', ''DIY home improvement projects'']'
  career_goals: Tarun aims to advance to a senior portfolio manager role where he can lead a research team focused on emerging‑market and ESG investment strategies. He plans to complete the CFA charter
    to deepen his expertise in investment analysis. In the longer term, he envisions developing a fintech platform that automates risk analytics for institutional investors and eventually launching his
    own boutique advisory firm to serve high‑net‑worth clients, while continuing to mentor the next generation of analysts.
