  career_goals: Ashley's primary career ambition is to transition her freelance work into a stable, full-time role at a regional marketing firm or nonprofit where she can lead design projects and mentor
    junior staff. She aims to earn an Adobe Certified Expert credential within the next year, expand her portfolio to include community-focused branding, and eventually launch a boutique design studio that
    serves local small businesses while preserving her work‑life balance. She also hopes to teach introductory graphic design workshops at the local community college to share her practical experience.
