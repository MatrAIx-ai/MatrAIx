personas:
  professional: Ashley Speziale is a seasoned graphic designer with three decades of experience, mastering the Adobe Creative Suite and thriving on methodical, client‑focused workflows, and aims to transition
    their freelance practice to a full‑time role at a regional nonprofit where they can lead community branding projects and mentor junior designers.
  sports: Ashley Speziale enjoys low‑impact exercise by regularly walking the nearby Appalachian foothills trails, cheering on the Atlanta Braves and Georgia Bulldogs, and playing in a local women’s softball
    league each summer, balancing community spirit with personal fitness.
  arts: Ashley Speziale is an active participant in the town’s community theatre, performing in seasonal productions such as Our Town, while also leading a quilting circle that celebrates Southern patterns,
    photographing the Appalachian foothills in the style of N. C. Wyeth, and attending weekly art walks where they admire works by Georgia O’Keeffe and listen to Alabama Shakes.
  travel: Ashley Speziale prefers relaxed weekend road trips that blend scenic drives along the Blue Ridge Parkway with visits to historic towns like Savannah and Asheville, and dreams of a summer pilgrimage
    to the Great Smoky Mountains National Park, always planning trips around the school calendar and budgeting for family‑friendly lodging.
  culinary: Ashley Speziale delights in cooking Southern comfort dishes—such as shrimp and grits, fried chicken, and peach cobbler—using fresh vegetables from their garden, a well‑seasoned cast‑iron skillet,
    and a secret blend of rosemary, thyme, and a pinch of cayenne, while occasionally experimenting with modern plating for local dinner parties.
  core: Ashley Speziale blends meticulous design expertise with warm Southern hospitality, turning community values into visual stories while juggling a structured work ethic, a love for collective arts,
    and a garden‑fueled approach to life.
background:
  cultural: Ashley was born and raised in a small town in northern Georgia, growing up in a predominantly white, Southern-heritage community. Her upbringing emphasized hospitality, strong family ties, and
    active participation in the local church and civic groups. The regional culture of modesty, practicality, and community service shaped her values and work ethic. She incorporates Southern aesthetics—such
    as warm color palettes and natural textures—into her design work, and she stays connected to local traditions through events like county fairs, church gatherings, and community art projects.
