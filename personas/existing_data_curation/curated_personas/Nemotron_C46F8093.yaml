personas:
  professional: Griselda Marin is an aspiring young storyteller who fills sketchbooks with cartoon characters, improvises mini‑plays for family, and channels that spontaneous imagination into early prototypes
    for a future career in illustration.
  sports: Griselda Marin enjoys sprinting along the park trail, joining the Harlingen Little League Tigers for weekend baseball practice, cheering on the Houston Astros, and dancing to rhythm games as a
    playful way to stay fit.
  arts: Griselda Marin spends afternoons mixing watercolor pigments to paint whimsical animal scenes, sketches comic strips inspired by the works of Dr. Seuss and Hayao Miyazaki, and sings along to Shakira
    and Selena while rhythm‑gaming, letting those musical icons fuel her creative bursts.
  travel: Griselda Marin dreams of exploring the sandy dunes of Big Bend National Park, collecting seashells on South Padre Island, and someday visiting the bustling theme parks of Orlando, all while packing
    a small notebook to sketch new landscapes.
  culinary: Griselda Marin loves helping their mom roll mini quesadillas filled with melted cheese and chopped spinach, snacking on fresh mango slices seasoned with a pinch of lime, and occasionally trying
    to recreate the vivid colors of a rainbow fruit salad after watching cooking shows.
  core: Griselda Marin is a curiosity‑driven eight‑year‑old who blends art, music, and nature into a lively, slightly disorganized world where sketchbooks, candy jars, and backyard adventures coexist.
background:
  cultural: Griselda grows up in a bilingual Mexican‑American household in Harlingen, Texas, near the U.S.-Mexico border. Spanish is spoken at home, and she celebrates traditions such as Día de los Muertos,
    Cinco de Mayo, and family gatherings that feature tacos, tamales, and festive music. Her extended family emphasizes kindness, cooperation, and respect for elders, values that echo in her cooperative
    nature. Community events in Cameron County, like local parades and school cultural fairs, expose her to a vibrant blend of Texan and Latino customs. This cultural richness fuels her appreciation for
    art, storytelling, and the communal spirit she seeks to nurture in her future aspirations.
attributes:
  skills: '[''Reading fluently (2nd‑grade level)'', ''Basic addition and subtraction'', ''Bilingual communication (English/Spanish)'', ''Creative drawing and painting'', ''Storytelling and imaginative play'',
    ''Collaborative problem‑solving (LEGO, group games)'', ''Basic digital literacy (educational tablet apps)'']'
  hobbies: '[''Drawing and watercolor painting'', ''Crafting with recycled materials'', ''Reading picture books and storytelling'', ''Exploring local parks and nature collection'', ''Dancing and singing
    to Latin music'', ''Educational tablet games (science and digital art)'', ''Collaborative pretend play and fort building'']'
  career_goals: Griselda imagines a future where she can combine her love of art, learning, and caring for others. She dreams of becoming a muralist who paints bright community art projects that celebrate
    her Hispanic heritage, a teacher who shares stories and encourages curiosity in a classroom, or a wildlife photographer who captures the animals she discovers on local nature walks. She also thinks
    about helping animals as a veterinarian. Her ambitions are guided by her desire to bring joy, harmony, and new ideas to the people around her.
