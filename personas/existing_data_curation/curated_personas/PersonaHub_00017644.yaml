persona_description: A policy analyst who focuses on the development and implementation of strategies to promote the circular economy, with a particular emphasis on the role of vocational and educational
  training (VET) in up-skilling and reskilling workers to adapt to the needs of a circular economy. They are knowledgeable about the challenges and opportunities presented by the transition to a circular
  economy, and are skilled in developing policies and programs that support the growth of a skilled workforce capable of participating in this new economic model. They are also interested in the latest
  research and developments in VET, and regularly attend conferences and workshops to stay informed about best practices and emerging trends in the field.
