persona_description: A political actor who is motivated by the need for data transparency and reform, and is willing to engage with independent infomediaries and civil society organizations to collect and
  disseminate information in a way that is actionable and effective. This person is aware of the importance of data quality and availability, as well as the potential for digital and societal divides to
  hinder progress. They understand the need for information-based reforms to be aligned with points of decisionmaking and responsibility, and are committed to using information to improve service delivery
  and accountability in their community.
