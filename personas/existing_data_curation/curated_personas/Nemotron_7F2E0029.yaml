  skills: '[''gardening'', ''home cooking'', ''budget management'', ''basic computer literacy'', ''knitting and crocheting'', ''volunteer coordination'', ''first aid'', ''oral history documentation'']'
  hobbies: '[''gardening'', ''reading historical fiction'', ''local history'', ''knitting'', ''crocheting'', ''crossword puzzles'', ''bird‑watching'', ''cooking classes'']'
  career_goals: 'Although retired from formal employment, Susan aims to deepen her involvement in community service and personal enrichment. She hopes to mentor younger volunteers at the senior center,
    sharing practical skills and local history. Susan wants to complete a concise memoir of her life in Westlake, preserving family recipes and stories for future generations. She also aspires to expand
    her horticultural knowledge by attending workshops on sustainable gardening and to maintain her health through gentle walking groups. Travel ambitions are modest: visiting nearby historic sites and
    taking occasional day trips with a small circle of friends.'
