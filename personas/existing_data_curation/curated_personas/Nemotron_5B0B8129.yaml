  hobbies: '["Gardening","Quilting and needlework","Cooking and baking","Reading mystery novels","Hiking","Volunteer work at church food pantry","Nature photography","DIY home improvement"]'
  career_goals: Mary aims to return to the workforce in a part‑time administrative or office manager role that leverages her organizational talents while allowing flexibility for family responsibilities.
    She plans to complete her associate degree in Business Administration through online courses, and she is considering starting a small home‑based online shop selling handmade quilts and garden produce.
    Long‑term, she hopes to become a community outreach coordinator for Miller County, facilitating programs that support families and local agriculture.
