personas:
  professional: Mary Taylor, a 28‑year‑old organized part‑time office manager‑to‑be, leverages their Excel budgeting expertise and event‑coordination experience to keep a small home office running smoothly
    while juggling volunteer scheduling and planning a future community outreach coordinator role in Miller County.
  sports: Mary Taylor, a 28‑year‑old enthusiastic weekend hiker on the Ozark trails and a devoted fan of the Arkansas Razorbacks football team, stays active by joining the Miller County Trail Riders club
    for monthly hikes, while also cheering on the St. Louis Cardinals during baseball season.
  arts: Mary Taylor, a 28‑year‑old devoted quilt maker inspired by folk artist Grandma Moses and the storytelling songs of Dolly Parton, spends evenings capturing the local landscape in nature photographs
    reminiscent of Ansel Adams and unwinds with mystery novels by Agatha Christie.
  travel: Mary Taylor, a 28‑year‑old who prefers carefully planned road trips that blend relaxation with adventure, has explored the hot springs of Arkansas and the historic streets of Charleston, South
    Carolina, and dreams of a summer escape to the Texas Hill Country while keeping travel costs within a modest budget.
  culinary: Mary Taylor, a 28‑year‑old seasoned home cook, whips up Southern comfort classics such as fried chicken with buttermilk biscuits, collard greens scented with smoked turkey, and tomato‑infused
    shrimp étouffée using heirloom tomatoes from their garden, while also perfecting pickled cucumbers and a peach cobbler for neighborhood gatherings.
  core: Mary Taylor, a 28‑year‑old structured yet community‑oriented soul, balances meticulous budgeting with a spontaneous love for gardening and quilting, though they sometimes forget to water their own
    plants when caught up in spreadsheets.
background:
  cultural: Mary Gail grew up in a traditional Southern white family in Arkansas, attending a Baptist church and participating in community events such as county fairs and church picnics. Her upbringing
    emphasized hospitality, self‑reliance, and strong family ties. While she attended a nearby community college, she maintained close connections to her rural roots, valuing the slower pace, neighborly
    support, and respect for nature that characterize life in Miller County.
attributes:
  skills: '["Household management","Budget planning","Scheduling and calendar coordination","Microsoft Office (Excel, Outlook)","Gardening","Basic carpentry and home repairs","First aid and CPR certification","Volunteer
