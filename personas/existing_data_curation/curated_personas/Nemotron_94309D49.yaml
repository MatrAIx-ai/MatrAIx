personas:
  professional: Seok is an aspiring game designer who channels the curiosity and practicality of their Minecraft and Nintendo adventures into creating intricate digital structures and experimenting with
    programmable LEGO sets.
  sports: Seok is a member of the Riverside Junior Soccer Club, enjoys weekly matches with friends, and roots for the internationally‑followed FC Barcelona, often mirroring their tactical play on the field.
  arts: Seok immerses themselves in graphic novels like 'One Piece' and 'My Hero Academia,' draws anime‑style characters inspired by Makoto Shinkai, and listens to the eclectic tunes of indie pop artist
    Billie Eilish while occasionally humming family‑taught traditional songs.
  travel: Seok loves exploring nearby nature trails such as the Blue Hills State Park, has visited the bustling city of Seoul’s palace grounds, and dreams of traveling to Legoland Denmark and the cherry‑blossom
    festivals of Japan’s Kyoto.
  culinary: Seok delights in bold flavors, frequently requesting kimchi fried rice, spicy tteokbokki, and homemade ramen, yet their cooking skill hovers at the level of assembling instant noodles and occasionally
    burning toast during snack experiments.
  core: Seok is a curious, flexible builder who blends virtual block worlds, soccer energy, and graphic‑novel flair while navigating a laid‑back, occasionally disorganized lifestyle.
background:
  cultural: Seok is a Korean‑American born to parents who emigrated from South Korea in the early 2000s. At home, the family observes Korean customs such as celebrating Chuseok and Lunar New Year, cooking
    dishes like kimchi and bibimbap, and speaking Korean. His upbringing in Bakersfield, California, exposes him to the diverse agricultural community of Kern County, where he often visits local farms and
    farmer markets. This blend of East Asian heritage and Central Valley American life shapes his worldview, encouraging respect for both traditional Korean values—especially the emphasis on education and
    family—and the practical, flexible mindset common in his local environment.
attributes:
  skills: '[''Scratch programming'', ''Basic LEGO Mindstorms robotics'', ''Intermediate English reading and writing'', ''Basic conversational Korean'', ''Soccer fundamentals'', ''Team collaboration'']'
  hobbies: '[''Playing Minecraft'', ''Building LEGO sets'', ''Playing soccer'', ''Reading graphic novels'', ''Sketching anime characters'', ''Exploring local hiking trails'', ''Learning Korean language'']'
  career_goals: Seok dreams of turning his love for games and technology into a future career. He hopes to study computer science in high school and eventually become a video game developer or software
    engineer, creating interactive experiences that blend storytelling with problem‑solving. At the same time, his fascination with animals and nature makes him consider a path in wildlife biology or veterinary
    science, especially with a focus on sustainable farming practices common in his community. He wants to keep his options open, aiming for a STEM‑focused education that allows him to explore both creative
    and scientific avenues.
