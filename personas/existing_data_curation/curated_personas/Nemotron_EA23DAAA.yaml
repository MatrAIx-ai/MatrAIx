  career_goals: Approaching retirement, Calen hopes to shift to a part‑time building caretaker role that offers flexibility to manage his health and stress levels. He aims to become a mentor for younger
    janitorial staff, sharing his decades of practical knowledge and encouraging the adoption of greener cleaning practices. He also dreams of volunteering as a docent at the nearby York County History
    Center, where he can blend his love of art, history, and community service. Ultimately, he seeks a low‑stress, stable position that allows him to devote more time to personal art pursuits while maintaining
    financial security.
