  career_goals: Jin aspires to transition from a pure development role to a product‑lead position where he can merge technology with artistic storytelling. Within the next five years, he aims to become
    a technical lead or product architect for a company that values innovative user experiences, such as a creative tech startup or a media‑focused platform. He also hopes to launch a side project that
    blends interactive software with visual art, potentially exploring AR/VR installations. To support these ambitions, he plans to deepen his expertise in human‑centered design, acquire certifications
    in cloud architecture, and improve his project‑management discipline to better meet deadlines. Ultimately, he envisions mentoring junior developers and fostering interdisciplinary collaboration between
    engineers, designers, and artists.
