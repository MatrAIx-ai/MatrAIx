personas:
  professional: Jin Cao, a 31‑year‑old full‑stack developer proficient in JavaScript frameworks, Python back‑ends, and cloud orchestration, they draw on their spontaneous curiosity and collaborative spirit
    to rapidly prototype and design user‑centred interfaces, thriving in hackathon‑style sprints but sometimes missing strict deadlines.
  sports: Jin Cao, a 31‑year‑old outdoor enthusiast, stays active by hiking the Middlesex Fells on weekends, playing soccer with a local amateur league that celebrates Boston Celtics victories, they cheer
    for the Red Sox and Bruins, and occasionally join the Boston Athletic Association’s weekly runs, though their spontaneous schedule sometimes leads to missed gym sessions.
  arts: Jin Cao, a 31‑year‑old creative technologist, immerses themselves in Boston’s contemporary art scene, regularly attending exhibitions featuring Kehinde Wiley and local muralist Biko, they catch
    experimental theater productions at the American Repertory Theater, strum rhythm guitar to the sounds of Bon Iver and Tame Impala, and sharpen improv skills at the Improv Asylum, all of which fuel their
    visual storytelling in software projects.
  travel: Jin Cao, a 31‑year‑old adventurer, prefers spontaneous weekend getaways to New England’s coastal towns like Portland, Maine, they’ve explored Kyoto during cherry‑blossom season and plan a future
    trek to Iceland’s waterfalls, balancing their love for impulsive discovery with budget‑conscious saving for larger expeditions.
  culinary: Jin Cao, a 31‑year‑old home‑chef, enjoys crafting fusion dishes such as soy‑glazed salmon with maple‑syrup glaze, lobster dumplings seasoned with gochujang, and char siu pork tossed with local
    apples and fresh dill, they also hunt Boston night markets for hand‑rolled bao with aged cheddar, while their occasional over‑spicing reveals a playful but imperfect palate.
  core: Jin Cao, a curious 31‑year‑old developer who blends art and tech, thrives on spontaneous creativity, occasionally drops the ball on deadlines, and they fuel life with coffee, guitar riffs, and a
    stubborn habit of stashing spare change for future AR experiments.
background:
  cultural: 'Jin comes from a mixed Chinese heritage; his parents emigrated from the coastal Guangdong region, bringing with them a strong emphasis on education, familial responsibility, and respect for
    tradition. Growing up in a bilingual household, he celebrated Lunar New Year with family gatherings, traditional dishes, and cultural performances, while also navigating the multicultural environment
    of the Boston metro area. This dual exposure fostered a nuanced worldview: he values the meticulous work ethic and community orientation from his Chinese background, yet embraces the openness, individualism,
    and eclectic artistic scenes of New England. He maintains ties to his heritage by participating in local Chinese cultural festivals, attending calligraphy workshops, and cooking classic Cantonese dishes,
    while also integrating these influences into his creative pursuits and collaborative work style.'
