  hobbies: '[''Hiking'', ''Street Photography'', ''Cooking Experiments'', ''Art Gallery Visits'', ''Live Music Shows'', ''Book Club'', ''Yoga'', ''Meditation'', ''Road Trips'', ''Vintage Market Hunting'',
    ''DIY Home‑Decor'', ''Community Garden Volunteering'']'
  career_goals: She aims to progress to a Director of Procurement role within the next five years, overseeing a global sourcing network and embedding sustainability into purchasing decisions. She hopes
    to spearhead a vendor diversity program, integrate advanced analytics for predictive spend forecasting, and mentor emerging women professionals in supply chain. Long‑term, she envisions launching her
    own consulting boutique focused on ethical sourcing and process optimization, while maintaining a balanced lifestyle that allows time for personal creative pursuits.
