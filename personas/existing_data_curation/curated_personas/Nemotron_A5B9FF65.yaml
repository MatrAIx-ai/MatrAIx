personas:
  professional: Oliver Pedesclaux, an 8‑year‑old budding inventor, blends their love of adventure books and LEGO engineering to construct intricate sci‑fantasy structures, they apply early coding concepts
    from educational games, and they navigate school projects with a practical, hands‑on mindset while collaborating compassionately with peers.
  sports: Oliver Pedesclaux, an 8‑year‑old soccer enthusiast, plays midfield for their school’s Greenfield Tigers youth team, idolizes the skill of Lionel Messi, and supplements their weekend matches with
    community clean‑up jogs through the local park, showing a love for both organized sport and informal fitness.
  arts: Oliver Pedesclaux, an 8‑year‑old budding cartoonist, sketches lively comic strips of their friends inspired by Dav Pilkey’s ‘Captain Underpants’ and Eiichiro Oda’s ‘One Piece’, while their evenings
    are filled with re‑watching Pixar’s ‘Toy Story’ and humming the tunes of The Beatles.
  travel: Oliver Pedesclaux, an 8‑year‑old nature explorer, has hiked the Redwood Trail in the nearby state park and visited the Grand Canyon on a family road trip, and they dream of backpacking through
    the castles of Scotland, preferring spontaneous, low‑budget adventures over meticulously planned vacations.
  culinary: Oliver Pedesclaux, an 8‑year‑old food fan, delights in building cheesy pepperoni pizza slices topped with fresh basil, whipping up strawberry‑banana smoothies with a splash of almond milk, and
    proudly crafting LEGO‑shaped pancakes on weekend mornings, though they often forget to wash their plates afterward.
  core: Oliver Pedesclaux, an 8‑year‑old adventure‑loving LEGO architect with a heart for community clean‑ups, balances spontaneous curiosity with a relaxed, sometimes messy, approach to schoolwork and
    savings.
background:
  cultural: Oliver is raised in a suburban Midwestern setting in New Baltimore, Michigan. His family participates in community traditions such as Fourth of July parades, local farmers' markets, and school-led
    service projects. He attends a public elementary school that emphasizes hands-on learning, outdoor exploration, and collaborative projects. The cultural atmosphere combines a practical, down-to-earth
    work ethic with a supportive, neighborly spirit, reflecting the broader values of the Great Lakes region.
