    at community theater'']'
  career_goals: Leveraging her experience, Miriam aims to transition into a senior operations leadership role within the next three years, such as Director of Operations for a mid‑size regional enterprise
    or a consultancy focused on operational excellence for small businesses in the Finger Lakes area. She aspires to spearhead sustainability and digital transformation projects that embed eco‑friendly
    practices and automation into core processes. Mentorship is a priority; she wants to champion women in STEM and business operations through formal mentoring programs at local colleges and community
    organizations. In the longer term, she envisions establishing her own boutique operations consulting firm that serves family‑owned businesses in Tompkins County, helping them scale responsibly.
