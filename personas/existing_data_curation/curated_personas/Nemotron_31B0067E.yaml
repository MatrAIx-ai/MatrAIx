personas:
  professional: Leone Poland, a seasoned facilities maintenance specialist with three decades of cross‑disciplinary expertise in mechanical, electrical, carpentry, plumbing, and HVAC systems, delivers predictive
    maintenance schedules and mentors apprentices with a calm, methodical demeanor and strict adherence to building codes and energy‑efficiency standards, and they now aim to transition into a strategic,
    sustainability‑focused facilities‑management position.
  sports: Leone Poland, an avid outdoor enthusiast who channels his love for structured physical activity into weekly cross‑country ski sessions on the Bread Loaf Trail during winter and springtime hikes
    up Mount Mansfield, participates in the Addison County Community Running Club for trail runs, regularly plays pickup basketball at the Middlebury recreation center, and loyally follows the Boston Red Sox,
    New England Patriots, and the Vermont Lake Monsters while they maintain a disciplined fitness routine that balances endurance training with occasional strength‑building sessions at a local gym.
  arts: Leone Poland, who finds creative release in playing acoustic guitar at informal folk music gatherings where they often cover songs by Bob Dylan, Joan Baez, and The Milk Carton Kids, complements
    the musical outlet with a keen eye for landscape photography inspired by Ansel Adams and Edward Weston, and nurtures their appreciation for the arts by regularly attending performances at the Middlebury
    College Auditorium featuring folk artists like Sarah Jarosz and reading classic literature such as Thoreau’s Walden during quiet evenings.
  travel: Leone Poland, who prefers meticulously planned road trips that blend adventure with relaxation, spends summer weekends exploring New England gems like Acadia National Park and the historic towns
    of Stowe and Burlington, dreams of a winter pilgrimage to Reykjavik to chase the Northern Lights, lists a future spring itinerary to Kyoto for its seasonal cherry blossoms, and balances these wanderlust
    aspirations with a modest travel budget that prioritizes off‑season airfare deals and stays at family‑run B&Bs.
  culinary: Leone Poland, a competent home cook who favors locally sourced, seasonal ingredients and delights in preparing herb‑roasted root vegetable stew with carrots, parsnips, and turnips, maple‑glazed
    salmon brushed with Vermont maple syrup, and creamy wild mushroom risotto finished with fresh sage and local goat cheese, approaches each meal as a practical experiment in green cooking, yet occasionally
    forgets to taste‑test until the final plating, resulting in occasional over‑salting.
  core: Leone Poland, a 52‑year‑old Vermont‑based maintenance veteran who blends methodical precision with quiet compassion, channels his love for structure into sustainable repairs, hikes, and folk music,
    but is notorious for over‑stocking his workshop with duplicate tools and for humming tunelessly while photographing sunsets.
background:
  cultural: Leone grew up in a modest, white New England family with deep roots in rural Vermont and a hint of Polish ancestry reflected in his surname. Raised on a small farm near Bennington, he learned
    the values of self‑reliance, hard work, and community cooperation that are hallmarks of the region. Living in Middlebury, he embraces the town’s blend of academic vibrancy and agrarian traditions, regularly
    attending farmers’ markets, supporting local craftspeople, and respecting the area's Abenaki heritage. His cultural identity is shaped by seasonal cycles, a respect for nature, and a pragmatic, compassionate
    outlook that emphasizes helping neighbors and maintaining harmony.
attributes:
  skills: '[''Carpentry'', ''Plumbing'', ''Electrical wiring and troubleshooting'', ''HVAC maintenance'', ''Preventive maintenance planning'', ''Building code compliance'', ''Energy efficiency retrofitting'',
