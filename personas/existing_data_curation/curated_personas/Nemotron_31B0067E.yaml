  hobbies: '[''Hiking'', ''Cross-country skiing'', ''Snowshoeing'', ''Woodworking'', ''Landscape photography'', ''Volunteer work at Middlebury Food Bank'', ''Community garden plot'', ''Acoustic folk music
    jam sessions'', ''Cooking with local produce'', ''Reading practical manuals and classic literature'']'
  career_goals: Leone aims to transition from a front‑line repair role to a strategic facilities‑management position within the next five years. He plans to earn a Certified Energy Manager (CEM) credential
    and to lead a sustainability retrofit program for the town of Middlebury and its schools. He also hopes to formalize a mentorship apprenticeship program for younger workers in Addison County, passing
    on his practical knowledge while fostering a cooperative workplace culture. Ultimately, he envisions establishing a small, community‑focused maintenance firm that specializes in eco‑friendly repairs
    and provides pro‑bono support for local nonprofits.
