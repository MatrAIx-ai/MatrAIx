  hobbies: '[''Cooking traditional Dominican dishes'', ''Dancing (merengue and bachata)'', ''Gardening'', ''Reading romance novels'', ''Volunteering at the senior center'', ''Walking her dog'', ''Listening
    to Latin music'', ''Attending church gatherings'', ''Participating in cultural festivals'', ''DIY home crafts'']'
  career_goals: Nora aims to move from a general clerk role into a supervisory position, such as Office Manager or Administrative Team Lead, where she can mentor newer staff and shape office routines. She
    plans to complete her GED and pursue a Certified Administrative Professional (CAP) credential to solidify her qualifications. Long‑term, she hopes to combine her administrative expertise with her love
    of community by becoming a liaison for a local senior or cultural center, helping bridge services between the Dominican community and broader township resources. Additionally, she dreams of launching
    a modest home‑based catering service featuring traditional Dominican dishes, providing both a creative outlet and supplemental income.
