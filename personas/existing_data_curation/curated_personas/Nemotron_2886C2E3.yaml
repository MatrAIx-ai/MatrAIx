  career_goals: Eugene aims to complete a bachelor’s degree in Visual Arts or Interactive Media, build a professional portfolio that merges art and technology, secure an internship at a forward‑thinking
    design studio, and eventually become a creative director or UX/UI designer who crafts inclusive digital experiences. He also hopes to mentor younger artists from his community and contribute to culturally
    resonant projects.
