personas:
  professional: Karla Nyack is a retired senior analyst for a state water‑resource agency who leverages three decades of environmental engineering expertise—GIS mapping, statistical modeling, grant writing,
    and community‑based monitoring—to design a sustainable community garden, mentor Black high‑school girls in STEM, and coordinate interdisciplinary projects with their methodical, organized, and calm‑under‑pressure
    approach.
  sports: Karla Nyack enjoys early‑morning birdwatching walks that serve as low‑impact cardio, occasionally joins a senior softball league at the local park, roots for the Virginia Tech Hokies football
    team, and attends gentle yoga classes twice weekly at the community center.
  arts: Karla Nyack spends evenings in a small book club dissecting historical biographies, delights in listening to folk‑rock artists like the Avett Brothers and classic singer‑songwriters such as Joan
    Baez, and regularly attends performances at the Danville Community Theater, especially productions of August Wilson’s plays.
  travel: Karla Nyack plans trips with a researcher’s eye, favoring meticulously charted itineraries that include historic African‑American sites such as the Frederick Douglass National Historic Site and
    the Harriet Tubman Underground Railroad Visitor Center, alongside coastal visits to Savannah, Georgia and a recent weekend getaway to Asheville, North Carolina, where they relish mountain scenery.
  culinary: Karla Nyack experiments with Southern comfort dishes infused with global twists—cooking collard greens in miso broth, spicing shrimp and grits with Thai red curry, and perfecting a low‑sugar
    pecan pie using coconut sugar and almond flour—all while proudly harvesting fresh herbs from their garden for each recipe.
  core: Karla Nyack blends a lifelong dedication to environmental science with a passion for gardening, history, and community mentorship, balancing meticulous organization with quiet curiosity, and occasionally
    forgets to water their indoor succulents amid a busy schedule.
background:
  cultural: Karla was born and raised in Danville, Virginia, within a close‑knit African‑American community that emphasized education, church, and family. Her parents, both teachers, encouraged curiosity
    and academic achievement, leading her to pursue a STEM degree at a historically Black university. Growing up during the latter years of the civil‑rights movement, she witnessed the power of collective
    action and developed a strong sense of responsibility to give back. The traditions of Southern hospitality, gospel music, and soul cuisine remain central to her identity, as does the oral tradition
    of storytelling she learned from her grandparents. She maintains ties with local Black women’s clubs and the NAACP chapter, and draws inspiration from prominent African‑American scientists and environmentalists.
    Her cultural heritage informs her commitment to community service, mentorship of under‑represented youth, and the celebration of Black history and resilience.
attributes:
  skills: '["Data analysis (Python, R)", "Statistical modeling", "GIS mapping", "Water‑quality testing", "Technical writing", "Grant proposal writing", "Project management", "Interdisciplinary team coordination",
    "Curriculum development", "Mentoring and tutoring", "Community program coordination", "Organizational planning", "Budgeting and resource allocation"]'
  hobbies: '["Vegetable gardening", "Reading historical and scientific non‑fiction", "Genealogy research", "Birdwatching", "Puzzle solving (crossword, sudoku)", "Cooking Southern‑inspired dishes with global
    twists", "Volunteer tutoring in local after‑school STEM program", "Participating in a small book club"]'
  career_goals: Karla remains passionate about leveraging her expertise to benefit her community. She aims to establish a sustainable community garden that incorporates rainwater harvesting and native plantings,
    serve as senior advisor for the local after‑school STEM outreach program, and mentor a cohort of Black high‑school girls interested in environmental sciences. She also hopes to author a guidebook on
    practical water conservation for rural households and to travel to historic sites significant to African‑American heritage in the eastern United States. Her long‑term ambition is to leave a lasting
    legacy of increased STEM representation and environmental stewardship within Pittsylvania County.
