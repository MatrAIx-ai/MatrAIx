personas:
  professional: Daniel Hampton, a 25‑year‑old journeyman‑in‑training plumber and pipefitter, blends rigorous blueprint reading, MIG/TIG welding, and OSHA‑compliant safety practices with a curiosity for
    green‑building technologies as they work toward a Journeyman Pipefitter certification and dream of leading an eco‑focused union crew in Seattle.
  sports: Daniel Hampton, an avid member of the Seattle City Basketball League, devotes Saturday mornings to hiking the Cascade foothills, roots for the Seattle Seahawks, and stays fit with a mix of pick‑up
    basketball games, trail runs, and occasional indoor climbing at Vertical Generation, while they balance their love of competition with a laid‑back attitude toward scheduling.
  arts: Daniel Hampton fuels their love of live music by catching hip‑hop shows at The Crocodile featuring Anderson .Paak and jazz nights with Kamasi Washington at Neumos, while they also host board‑game
    gatherings that showcase titles like Terraforming Mars and Gloomhaven.
  travel: Daniel Hampton prefers spontaneous road trips over meticulous itineraries, having already explored the Oregon Coast, hiked the Alpine Lakes Wilderness, and planning a future visit to Kyoto to
    study Japanese sustainable architecture and onsen culture, while they savor the freedom of an unplanned adventure.
  culinary: Daniel Hampton brings a modern twist to Southern comfort food, regularly cooking shrimp‑and‑grits with smoked paprika, collard greens sautéed with kale, and finishing dishes with a dash of hot
    sauce, while they also perfect pour‑over coffee using beans from Stumptown and experiment with DIY home‑brew kombucha.
  core: Daniel Hampton is a socially vibrant plumber whose love of basketball, Southern cooking, and green‑tech ambitions collide with a laid‑back, sometimes disorganized approach to life, while they constantly
    chase the next creative project.
background:
  cultural: Daniel grew up in Seattle’s Rainier Valley, a historically diverse neighborhood with a strong African‑American community. His family traces its roots to the Southern United States, where traditions
    of gospel music, soul food, and community solidarity were passed down through generations. He regularly attends a local Black church, participates in community events like Juneteenth celebrations, and
    stays connected with Seattle’s broader Black cultural scene through the NAACP and Black History Month initiatives. While rooted in his African‑American heritage, Daniel also embraces the multicultural
    fabric of Seattle, forging friendships across Asian, Latino, and Pacific Islander communities, which enriches his perspective on both his trade and personal life.
attributes:
  skills: '["Plumbing installation and repair","Pipefitting (hydraulic, gas, steam)","Steam system maintenance","Blueprint and schematic reading","Welding (MIG/TIG) and brazing","Leak detection (ultrasonic,
    gas sniffers)","Safety compliance (OSHA, confined‑space)","Customer communication and service","Team collaboration and crew coordination","Basic mechanical troubleshooting","Use of power and hand tools"]'
  hobbies: '["Recreational basketball league","Hiking in the Cascades and local trails","Cooking (Southern and contemporary fusion)","Live music concerts (hip‑hop, jazz, funk)","Board‑game and video‑game
    nights with friends","Volunteer mentorship for aspiring tradespeople","DIY home‑automation and solar water‑heating projects","Exploring Seattle coffee shops and food trucks"]'
  career_goals: Daniel aims to earn his Journeyman Pipefitter certification within the next two years and, subsequently, achieve Master Plumber licensure. He is pursuing additional coursework toward an
    associate degree in Construction Management to blend his practical trade skills with project leadership. Long‑term, he aspires to become a foreman for a union crew on major Seattle infrastructure projects,
    such as water main upgrades or transit system HVAC installations. Eventually, Daniel envisions launching his own environmentally‑focused plumbing and steamfitting business that specializes in energy‑efficient
    water heating and low‑VOC piping solutions, while also mentoring apprentices from underrepresented backgrounds.
