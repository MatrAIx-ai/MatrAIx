    load calculations'']'
  hobbies: '[''Desert gardening'', ''Quilting'', ''Gospel choir participation'', ''Cooking soul‑food meals'', ''Community mentorship for youth'', ''Reading mystery novels'', ''Hiking in Arizona nature preserves'',
    ''Watching Arizona Cardinals football'', ''Listening to R&B and jazz music'', ''DIY home improvement projects'']'
  career_goals: She aims to achieve master electrician status and obtain a contractor’s license so she can launch a small, women‑owned electrical firm that emphasizes sustainable installations and provides
    paid apprenticeships for under‑represented youth. Natalie also wants to serve on her local union’s diversity committee, advocate for mental‑health awareness among tradespeople, and secure a comfortable
    retirement that allows more time for family and community service.
