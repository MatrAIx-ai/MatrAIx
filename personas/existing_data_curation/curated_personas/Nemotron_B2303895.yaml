personas:
  professional: Natalie Bacon is a veteran journeyman electrician with three decades of residential, commercial, and industrial wiring expertise, leveraging meticulous blueprint reading, load calculations,
    and NEC compliance, while applying a cooperative, harmony‑focused leadership style that balances their preference for structure with a flexible, on‑site problem‑solving mindset.
  sports: Natalie Bacon is a loyal Arizona Cardinals fan who also hikes Camelback Mountain with a senior walking club, joins a winter pickleball league at the community center, and occasionally watches
    Phoenix Suns games on television when the weather makes outdoor activity too hot.
  arts: Natalie Bacon creates colorful quilts while singing gospel hymns in their church choir, and their music library spins classic R&B legends like Aretha Franklin and Marvin Gaye alongside jazz icons
    such as John Coltrane and Miles Davis, reflecting a lifelong passion for soulful, improvisational sound.
  travel: Natalie Bacon favors low‑key road trips to desert destinations like Sedona and the Grand Canyon, plans itineraries with detailed checklists yet remains open to spontaneous detours, and dreams
    of a guided cultural tour of Lisbon’s historic neighborhoods when retirement grants more leisurely travel time.
  culinary: Natalie Bacon is a confident home chef who prepares soul‑food staples such as fried chicken, collard greens simmered with smoked turkey, and sweet‑potato pie, while also experimenting with Southwestern
    twists like cactus‑infused salsa and prickly‑pear glaze on grilled vegetables.
  core: Natalie Bacon blends a pragmatic electrician’s precision with a warm, community‑oriented spirit, juggling exacting wiring tasks and spontaneous gospel rehearsals while worrying a bit too much about
    deadlines and the next bill.
background:
  cultural: Natalie grew up in a close‑knit African‑American neighborhood in Phoenix, where church, family, and community events shaped her identity. Her parents were part of the Great Migration, and she
    inherited a strong sense of resilience and pride. She celebrates Juneteenth, Black History Month, and local cultural festivals, and she carries forward traditions of storytelling, gospel music, and
    soul‑food cooking. As a black woman in a male‑dominated trade, she has faced bias but draws strength from her heritage and from networks of mentors and peers who share her cultural roots.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical systems'', ''Industrial motor controls'', ''Solar photovoltaic installation'', ''Energy-efficient lighting retrofits'', ''NEC code compliance'',
