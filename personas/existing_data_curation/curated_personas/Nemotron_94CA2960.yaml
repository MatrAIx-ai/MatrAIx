personas:
  professional: A veteran facilities supervisor with a STEM background, Arlene Doss blends meticulous safety protocols, green cleaning innovations, and an artistic sensibility to optimize campus environments
    while nurturing a collaborative, mentorship-driven team.
  sports: An enthusiastic low‑impact fitness fan, Arlene Doss enjoys weekly tai‑chi classes, gentle Bayou trail walks, follows the New Orleans Saints and Pelicans with fervor, and rides with the local Senior
    Cyclists Club, balancing gentle exercise with spirited fandom.
  arts: An avid patron of the arts, Arlene Doss paints watercolor landscapes inspired by Winslow Homer, frequents the Ogden Museum to admire contemporary Louisiana artists like Kara Walker, sings gospel
    standards of Mahalia Jackson in the church choir, and regularly attends community theater productions featuring local talent such as Jeremy Rouse.
  travel: Arlene Doss prefers curated weekend getaways to historic sites like Natchitoches, the French Quarter, and Savannah, while dreaming of a cultural pilgrimage to Quebec City’s Old Town and the botanical
    gardens of Kyoto, planning trips with careful budgeting and a love for leisurely explorations.
  culinary: An adept home cook, Arlene Doss blends fresh garden herbs such as thyme, rosemary, and lemon balm into classic Creole dishes like shrimp étouffée and jambalaya, enjoys perfecting watercolor‑inspired
    plating, and treats herself to occasional fine dining at Commander’s Palace for their iconic turtle soup.
  core: Arlene Doss, a meticulous facilities maestro with a watercolor‑splattered apron, balances green‑cleaning ambitions with a sweet tooth for holiday pecan pie, and sometimes forgets to water their
    succulents amid a bustling schedule.
background:
  cultural: Arlene was raised in a white, Southern Catholic family in the Baton Rouge region. She grew up with traditional Louisiana customs, including the celebration of Mardi Gras, a love for Cajun and
    Creole cuisine, and an emphasis on community and hospitality. Her upbringing blended church involvement, Southern etiquette, and an appreciation for the natural environment of the Mississippi River
    delta. This cultural foundation shapes her values of kindness, cooperation, and respect for heritage while still encouraging curiosity and openness to new ideas.
