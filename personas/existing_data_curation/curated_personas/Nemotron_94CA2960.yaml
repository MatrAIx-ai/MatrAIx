  career_goals: Arlene aims to move into a supervisory facilities-management role where she can apply her analytical background to improve operational efficiency and sustainability. She hopes to lead a
    team, develop greener cleaning practices, and create mentorship programs for younger staff. Additionally, she plans to earn certifications in green cleaning and occupational safety, and eventually start
    a small consulting service for local schools and churches on maintaining safe, aesthetically pleasing environments.
