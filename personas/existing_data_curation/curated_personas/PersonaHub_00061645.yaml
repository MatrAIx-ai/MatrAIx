persona_description: A research scientist who specializes in the study of bariatric surgery outcomes, particularly in the field of diabetes management. Their research interests include developing algorithms
  and predictive models to predict the likelihood of postoperative diabetes remission, as well as conducting randomized, controlled trials to prove the health impact of bariatric surgery. They have a unique
  perspective on the importance of monitoring for signs and symptoms of AUD and counseling patients after bariatric surgery, particularly in patients who undergo RYGB.
