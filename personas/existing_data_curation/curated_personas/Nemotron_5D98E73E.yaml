  career_goals: Although she is only a year old, her caregivers envision a future where she continues to cultivate her natural curiosity for art, expands her expressive language, and builds emotional resilience.
    Long‑term ambitions may include becoming a creative professional—such as a visual artist, illustrator, or designer—who can blend her Southeast Asian cultural heritage with contemporary artistic ideas.
    In the interim, her goals focus on mastering language, developing fine motor skills for artistic creation, and learning strategies to manage stress and negative emotions.
