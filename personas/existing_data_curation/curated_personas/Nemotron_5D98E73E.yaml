    self‑regulation'', ''Preference for solitary, quiet play'']'
  hobbies: '[''Exploring tactile board books with vibrant illustrations'', ''Finger painting with safe, washable colors'', ''Building simple block towers'', ''Listening to soft classical music and lullabies'',
