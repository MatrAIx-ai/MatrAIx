  hobbies: '["Drawing and Sketching", "Digital Illustration", "LEGO Architecture", "Reading Science Fiction", "Coding Simple Games", "Playing Violin", "School Art Club", "Nature Hiking", "Journaling", "Chess"]'
  career_goals: Roman aspires to channel his love for art, science, and purposeful design into a future career as an architect or sustainable community planner. He aims to attend a university with strong
    engineering and design programs, earn scholarships through academic excellence, and eventually design public spaces that inspire creativity while respecting the environment. He also hopes to mentor
    younger students, sharing his organizational strategies and encouraging curiosity.
