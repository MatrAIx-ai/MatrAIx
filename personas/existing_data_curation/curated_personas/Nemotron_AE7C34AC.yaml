personas:
  professional: Roman Robertson, an aspiring architectural illustrator and budding game developer, leverages their meticulous organization and curiosity to craft detailed building sketches, LEGO models,
    and Scratch games that consistently meet self‑imposed high standards.
  sports: Roman Robertson, a weekend hiker on the Ozark foothills who also participates in the middle school cross‑country team, balances a love for nature with a casual fanhood for the St. Louis Cardinals
    and the Arkansas Razorbacks, preferring low‑impact exercise over competitive sports.
  arts: Roman Robertson, an avid sketcher and violinist, draws inspiration from the architectural precision of Mies van der Rohe, the cinematic worlds of Hayao Miyazaki, and the melodic intricacies of Johann
    Sebastian Bach, channeling this blend into intricate LEGO models and Scratch game narratives.
  travel: Roman Robertson, who prefers meticulously planned weekend trips with family, has explored the Grand Canyon and the historic streets of Savannah, and dreams of touring Barcelona’s modernist architecture
    and Kyoto’s Zen gardens as a future source of artistic inspiration.
  culinary: Roman Robertson, a budding home chef who can confidently whip up pepperoni pizza and basic ramen bowls, enjoys experimenting with fresh basil, mozzarella, and nori, while often sketching the
    dishes before tasting them, though they sometimes over‑season their sauces in pursuit of bold flavors.
  core: Roman Robertson is a disciplined, curiosity‑driven 12‑year‑old who balances meticulous architectural sketches and LEGO creations with a love for violin and hiking, yet habitually forgets to water
    their houseplants.
background:
  cultural: Roman was raised in Kirksville, a small Midwestern town in Missouri, where community ties and modest, hard‑working values are central. His family’s heritage includes German and Irish roots common
    in the region, and he grew up attending local church services and community festivals that celebrate agricultural seasons and local history. The presence of Truman State University and A.T. Still University
    in town exposes him to academic and cultural events, reinforcing his appreciation for learning and the arts.
attributes:
