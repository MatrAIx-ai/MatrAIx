  hobbies: '[''Soccer (Fútbol)'', ''Playing Video Games (especially FIFA)'', ''Cooking Mexican cuisine'', ''Truck modification/tinkering'', ''Listening to regional Mexican music'', ''Community volunteering'',
    ''Fishing'', ''Hiking in the Ozarks'', ''Attending local festivals and cultural events'']'
  career_goals: Jose aims to secure a full commercial driver’s license and transition to over‑the‑road trucking, gaining long‑haul experience while maintaining a strong safety record. Over the next five
    years he plans to complete an associate degree in transportation or business logistics at a community college, qualify for a logistics coordinator role, and eventually move into dispatch management.
    Parallel to his driving career, he wants to expand his sales skills into a managerial position in automotive or equipment sales. Ultimately, Jose envisions owning a small fleet of trucks or a locally
    based moving service, allowing him to combine his driving expertise, logistical knowledge, and customer‑focused approach while providing stable employment for future family plans.
