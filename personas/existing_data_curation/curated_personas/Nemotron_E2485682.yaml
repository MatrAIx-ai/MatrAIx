  career_goals: Shawn aims to master basic reading and counting by the time he starts kindergarten, nurture his love for drawing, and explore the world through hands‑on experiences. He dreams of becoming
    someone who can create and build—perhaps an architect, engineer, or artist—combining his love for structured problem solving with creative expression. In the near term, he is eager to learn to read
    simple books, count objects, and experiment with building blocks to construct more complex structures.
