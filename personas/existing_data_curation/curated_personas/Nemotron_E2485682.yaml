personas:
  professional: Shawn Regev, a three-year-old with a budding fascination for building block structures, applies methodical precision and a competitive streak to assembling towering castles, already dreaming
    of a future as a civil engineer.
  sports: Shawn Regev enjoys weekly preschool soccer sessions and follows the local MLB team, the Chicago Cubs, cheering loudly whenever a home run is hit on the family TV, but prefers solo backyard sprints
    over crowded playground games.
  arts: Shawn Regev delights in drawing colorful pictures inspired by Dr. Seuss books and humming along to The Wiggles, while also being fascinated by the tactile patterns of Van Gogh's 'Starry Night' prints
    on their bedroom wall, shaping a quiet but vivid artistic imagination.
  travel: Shawn Regev loves exploratory trips to the nearby zoo, where they meticulously count each animal species, and dreams of a future family vacation to Disney World in Orlando, balancing a love for
    structured itineraries with the thrill of new scenery.
  culinary: Shawn Regev favors bite‑size meals like chicken nuggets, mac and cheese, and sliced strawberries, showing a particular affection for crunchy carrot sticks dipped in ranch and often insists on
    assembling their own snack plates, reflecting their methodical yet playful approach to food.
  core: Shawn Regev is a methodical, curious three‑year‑old who builds block towers with competitive gusto, saves sticker coins in a piggy bank, and navigates toddler life with steady composure and a quietly
    skeptical eye.
background:
  cultural: Shawn was raised in the small town of Sidon, Mississippi, within a family that reflects the rural Southern culture of the Mississippi Delta. His household observes Christian traditions; Sundays
    begin with a service at the local Baptist church followed by a family brunch. Community life includes church picnics, fishing outings, and seasonal festivals that shape his early experiences. He is
    exposed to the region’s musical heritage, hearing gospel choir rehearsals, country songs, and occasional blues on the radio, which fuels his interest in rhythm and melody. Family meals often feature
    classic Southern dishes such as fried catfish, collard greens, and cornbread, providing a taste of local culinary tradition. While his ancestry is rooted in European origins, growing up in the Delta
    imparts a blend of Southern hospitality, a deep respect for the land, and a familiarity with the cultural rhythms of the area.
