  hobbies: '[''Cooking and experimenting with southern/soul food recipes'', ''Knitting and crocheting'', ''Yoga and meditation'', ''Journaling'', ''Attending live music events (R&B, hip‑hop)'', ''Volunteering
    at local food banks'', ''Reading contemporary fiction'', ''Exploring art galleries and museums'', ''Hiking in Cedar Ridge Park'', ''Participating in Juneteenth and other cultural celebrations'']'
  career_goals: Helen aims to translate her practical skill set into a stable, full‑time role that balances clear structure with the flexibility she values. Over the next year she plans to complete her
    associate degree in Business Administration and obtain a certification in Community Health Work, positioning herself for entry‑level positions such as Community Outreach Coordinator or Program Assistant
    at a nonprofit or city health department. She envisions advancing to a program manager role within five years, where she can design and oversee initiatives that address local health disparities and
    economic empowerment. Additionally, Helen hopes to launch a modest side business offering catered Southern‑style meals for community events, allowing her to merge her culinary passion with entrepreneurship
    while maintaining a work‑life balance.
