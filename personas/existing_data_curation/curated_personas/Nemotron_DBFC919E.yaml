  career_goals: Michael dreams of combining his love for science and art in a future career. He hopes to become an astronaut or marine biologist who explores the depths of the ocean and outer space, while
    also designing vibrant exhibits or murals that educate the public about those worlds. In the short term, he aims to win his school's science fair with a marine‑biology project and to earn a badge in
    his community art program. Long‑term, he envisions a role as a museum or aquarium curator, where his organizational skills, artistic talent, and curiosity for new ideas can create immersive, unconventional
    learning experiences for visitors of all ages.
