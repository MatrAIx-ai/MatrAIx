  hobbies: '[''Hiking in the Sonoran Desert'', ''Gardening (native succulents)'', ''Cooking Southwestern dishes'', ''Reading non‑fiction (business, psychology)'', ''Yoga'', ''Volunteering at community job
    fairs'', ''Strategic board games (e.g., Settlers of Catan)'']'
  career_goals: Patricia aims to advance to an HR Director role within the next five to seven years, leveraging her practical expertise to drive organization‑wide talent strategies. She plans to earn the
    SHRM‑Senior Certified Professional (SHRM‑SCP) credential and later complete a bachelor’s degree in Business Administration to complement her experience. Her ambition includes championing data‑centric
    HR analytics, launching inclusive diversity initiatives that reflect the multicultural fabric of Maricopa County, and mentoring emerging HR professionals to build a high‑performing, resilient workforce.
