persona_description: A researcher in the field of pharmacology, particularly focused on studying the effects of tobacco smoke on the heart. The researcher is interested in the cellular changes that occur
  in response to ambient tobacco smoke exposure in heart tissue, and the potential implications for arrhythmias and sudden cardiac death. The researcher is likely to be working with a team of investigators
  at UC Davis Health, including Chao-Yin Chen and Kent Pinkerton, and is supported by grants from the National Institutes of Health. The researcher is likely to be conducting research in the area of environmental
  health, and is interested in understanding the health effects of unintended exposures to second-hand tobacco smoke.
