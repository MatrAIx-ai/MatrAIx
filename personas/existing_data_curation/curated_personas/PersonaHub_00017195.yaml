persona_description: A professional with expertise in educational psychology who specializes in conducting assessments for the diagnosis of specific learning difficulties, speech and language disorders,
  attention deficit disorders, dyspraxia, and developmental coordination disorders. They are skilled in meeting with parents to discuss concerns and early developmental history, conducting comprehensive
  cognitive assessments, evaluating reading, spelling, and mathematics skills, and providing detailed reports outlining the outcomes of the testing. They also offer advice to parents and teachers on teaching
  and learning strategies, and may provide recommendations for additional support under Department of Education guidelines.
