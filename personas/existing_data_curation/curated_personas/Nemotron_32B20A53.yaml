personas:
  professional: Tien Qiu, a bright two‑year‑old who spends hours stacking colorful blocks and sorting toy cars by size, already shows early engineering curiosity, a penchant for orderly play balanced by
    a willingness to experiment with new shapes, and delights in sharing discoveries with peers and caregivers alike, often seeing that they clap with excitement when a tower stays upright.
  sports: Tien Qiu, a playful toddler who cheers on Manchester United during family game nights, attends a local under‑two soccer Little Kickers class, they love splashing in the community pool’s shallow
    area, and often pretends to be a mini‑athlete while racing their siblings at the park’s tiny track.
  arts: Tien Qiu, a curious two‑year‑old who adores the bright animations of Disney's Frozen, they hum along with Yo‑Yo Ma's soothing cello pieces, and spends rainy afternoons finger‑painting with primary
    colors while proudly displaying their masterpieces on the fridge.
  travel: Tien Qiu, a tiny adventurer who has explored the city zoo’s panda exhibit, delighted in a weekend trip to Santa Monica Beach building sandcastles, dreams of visiting the vibrant underwater world
    at the Singapore Aquarium on the next family vacation, and they squeal with delight at the thought of seeing colorful fish up close.
  culinary: Tien Qiu, a budding food explorer who loves the cheesy stretch of macaroni and cheese, the sweet crunch of banana slices, insists on helping stir the orange carrot‑hummus dip with a plastic
    spoon, often demanding extra sprinkles on their yogurt, and they proudly show off the finished snack to anyone nearby.
  core: Tien Qiu, a two‑year‑old bundle of curiosity who balances orderly block building with spontaneous art splashes, saves coins like a mini‑banker, spreads kindness through gentle hugs and shared toys,
    and they radiate joy in every new discovery.
background:
  cultural: Tien is an East Asian child of Chinese heritage growing up in Colorado Springs, Colorado. His home environment blends Mandarin Chinese and English, with his family celebrating traditional holidays
    such as Lunar New Year, the Mid‑Autumn Festival, and teaching him simple Chinese songs and stories. He participates in a local early‑learning center that incorporates multicultural curricula, exposing
    him to diverse art forms, music, and celebrations. This dual exposure fosters a strong sense of cultural pride while helping him feel integrated into the broader Colorado community.
