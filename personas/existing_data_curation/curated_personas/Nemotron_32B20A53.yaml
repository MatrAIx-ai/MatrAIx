  career_goals: Although still a toddler, Tien’s parents nurture his love for discovery and creativity, encouraging aspirations that blend art and exploration. He often talks about wanting to "draw many
    pictures" and "play with big machines." As he grows, his family envisions him pursuing a career that lets him create and solve problems—such as an architect, product designer, or environmental researcher—allowing
    him to channel his curiosity, appreciation for varied experiences, and desire to help others.
