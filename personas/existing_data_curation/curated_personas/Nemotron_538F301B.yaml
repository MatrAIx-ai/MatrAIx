personas:
  professional: A budding LEGO architect, Nader Parker, designs intricate brick towers inspired by fantasy creatures, applying methodical planning and a reliable work ethic, while they occasionally worry
    about missed deadlines.
  sports: A lively soccer enthusiast, Nader Parker, plays midfield for the Riverdale Rovers U10 team, emulating the tactics of the professional City Eagles, and trains with friends after school, though
    they sometimes skip warm-ups because they're eager to jump into the game.
  arts: A creative illustrator, Nader Parker, draws dragons and mythical beasts inspired by the artwork of Hayao Miyazaki and the storytelling of J.K. Rowling, while listening to the orchestral scores of
    John Williams and playing simple melodies on a toy keyboard, yet they often stay up late sketching, which makes them groggy for school.
  travel: An adventurous explorer, Nader Parker, enjoys weekend hikes in Redwood State Park and beach trips to Santa Cruz Boardwalk, dreams of visiting the Grand Canyon and the Smithsonian, but they rely
    on parents for travel plans and sometimes feel nervous about new environments.
  culinary: A budding food enthusiast, Nader Parker, loves the smoky flavor of grilled chicken wings, the crunch of corn on the cob at family barbecues, can assemble a simple cheese quesadilla with minimal
    supervision, yet they often forget to brush their teeth after indulging in gummy bears.
  core: A meticulous yet worry-prone nine-year-old, Nader Parker blends a love for fantasy art, organized LEGO building, and sociable soccer play with a tendency to overthink and stay up late sketching,
    and they frequently seek reassurance from peers.
background:
  cultural: Nader grew up in Birmingham, Alabama, in a Southern white family with deep community ties. He attends a local public elementary school where he learns about regional history, including the civil‑rights
    legacy of the city. Family traditions include Sunday church services, seasonal barbecues, and community celebrations like the Birmingham Heritage Festival. He enjoys Southern cuisine such as fried chicken
    and biscuits, but also loves the diverse foods and pop‑culture influences of modern America. His upbringing blends a respect for Southern hospitality and politeness with a curiosity for broader ideas
    through school and media.
