  hobbies: '["Solving math puzzles", "Building robotics kits", "Competitive online chess", "Reading science fiction and popular science", "Listening to music (Puerto Rican, instrumental video-game soundtracks)",
    "Cooking traditional Puerto Rican dishes", "Nature walks and sketching"]'
  career_goals: Rafael dreams of becoming a software engineer or data scientist, careers that let him work independently on complex problems. He aims to attend a strong STEM high school, earn scholarships,
    and eventually study computer science or engineering at a university. He also hopes to develop his own mobile apps that help other kids learn math in a fun, structured way.
