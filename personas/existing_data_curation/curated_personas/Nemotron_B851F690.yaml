personas:
  professional: Rafael Amill is an aspiring young robotics builder who programs and assembles small autonomous vehicles using Arduino and LEGO Education kits, channeling their meticulous organization and
    competitive edge into detailed project logs and leaderboard rankings on online robotics challenges.
  sports: Rafael Amill follows the Boston Red Sox (MLB) and Boston Celtics (NBA), and cheered for the Providence Friars soccer team, while personally maintaining a membership in the Cumberland Aquatic Club
    where they swim disciplined lap sets three times a week, and they add a weekly jog along the Blackstone River Trail to their fitness routine, treating physical training as a methodical personal challenge.
  arts: Rafael Amill immerses themselves in classic island folk music by Bobby Capó and Rafael Hernández, pairs it with instrumental video‑game soundtracks from Nobuo Uematsu and Koji Kondo, and reads science‑fiction
    novels by Isaac Asimov and Arthur C. Clarke, shaping a rich interior world that fuels their late‑night chess simulations and creative problem‑solving.
  travel: Rafael Amill plans trips with the same precision as their robotics schematics, allocating savings for a summer visit to the Caribbean island of Puerto Rico to explore Old San Juan’s historic forts,
    while also dreaming of a future journey to the Swiss Alps for mountain hikes and a science‑museum tour in London, balancing family budget constraints with a desire for cultural immersion.
  culinary: Rafael Amill loves cooking traditional dishes such as mofongo made with green plantains and garlic‑infused sofrito, arroz con gandules seasoned with pigeon peas and ají dulce, and pastelón layered
    with sweet plantains, approaching each recipe with a scientist’s measured precision, yet occasionally over‑salting the sofrito when excited by new flavors.
  core: Rafael Amill is a quietly fierce 12‑year‑old strategist who blends a love for solitary puzzles with disciplined routines, navigating life with meticulous planning, a skeptical eye, and a dash of
    culinary curiosity.
background:
  cultural: Rafael is a second‑generation Puerto Rican growing up in Cumberland, Rhode Island. He speaks Spanish at home and celebrates Puerto Rican traditions such as Noche Buena, Three Kings’ Day, and
    the annual Puerto Rican heritage parade in Providence. He enjoys the island’s cuisine, especially mofongo and arroz con gandules, and learns about Puerto Rican history and folklore from his grandparents.
    While living in a predominantly New England environment, his family maintains strong cultural ties through community gatherings, bilingual education, and regular visits to Puerto Rico.
attributes:
  skills: '["Mathematics (algebra, geometry)", "Basic programming (Scratch, introductory Python)", "Bilingual fluency in Spanish and English", "Strategic chess playing", "Organizational planning and time
