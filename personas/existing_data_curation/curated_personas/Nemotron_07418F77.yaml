personas:
  professional: A veteran qualitative researcher, Katrina Goodwin channels over thirty years of interview mastery—spanning face‑to‑face, telephone, and focus‑group formats—into methodical, schedule‑driven
    projects, using Qualtrics and SurveyMonkey with meticulous note‑taking, while they rely on their cooperative, routine‑loving personality to build rapport and ensure data confidentiality for community
    narratives.
  sports: Katrina Goodwin stays active by walking the lake‑front trails of Lake Merritt with the East Bay Walkers Club, they catch weekend games of the Golden State Warriors and the San Francisco Giants
    as fan rituals, and they join a senior pickleball league at the community center each spring.
  arts: Katrina Goodwin cultivates her creative side through nightly vinyl sessions featuring Miles Davis and Ella Fitzgerald, they knit and quilt to patterns inspired by folk art, read Agatha Christie
    mysteries under a lamp, and lend a warm alto voice to the church choir’s renditions of traditional hymns.
  travel: Katrina Goodwin prefers carefully planned getaways, strolling the vineyards of Napa Valley on weekend excursions, hiking the granite cliffs of Yosemite with a detailed itinerary, and they dream
    of a slow‑paced cultural tour of Paris and Kyoto that balances comfort, senior‑friendly accommodations, and budget‑friendly travel options.
  culinary: Katrina Goodwin delights in cooking hearty family comfort foods—such as chicken pot pie with rosemary‑infused crust, slow‑braised beef stew loaded with garden carrots and potatoes, and classic
    New England clam chowder—while they skillfully incorporate fresh vegetables from their plot and enjoy pairing meals with a glass of Cabernet Sauvignon.
  core: Katrina Goodwin blends disciplined routine with community spirit, weaving interviews, knitting, and jazz into a steady rhythm that keeps them organized, compassionate, and they are occasionally
    reluctant to stray from familiar yarn colors.
background:
  cultural: Katrina grew up in a middle-class, predominantly white neighborhood in the East Bay, where her family emphasized hard work, reliability, and involvement in the local community. Her upbringing
    combined Midwestern values of modesty and practicality with the progressive, culturally diverse atmosphere of the Bay Area. Although she identifies as White American, years of living and working in
    Oakland have given her a deep respect for the city’s multicultural fabric, shaping a worldview that values harmony, pragmatic service, and an appreciation for the varied traditions of her neighbors.
attributes:
  skills: '["Active listening", "Structured interviewing", "Rapport building", "Meticulous note-taking", "Transcription", "Data accuracy and confidentiality", "Interview software (Qualtrics and SurveyMonkey)",
