  career_goals: Looking ahead, Katrina aims to transition into a senior mentorship role within the next three years, where she can oversee interview training, develop best-practice guidelines, and mentor
    the next generation of interviewers. She hopes to collaborate with local nonprofit organizations to design interview protocols that preserve community narratives, and she plans to author a concise handbook
    on practical interviewing techniques for use by practitioners in the Bay Area. While she values stability, she also seeks to ensure a smooth succession plan for her team as she approaches retirement,
    preserving the reliable and harmonious work environment she has cultivated.
