    and Team Development'', ''Negotiation and Lease Administration'']'
  hobbies: '[''Reading African-American literature and urban history'', ''Visiting art galleries and museums'', ''Community theater participation'', ''Rooftop gardening and urban farming'', ''Cooking soul
    food with modern twists'', ''Listening to jazz, neo-soul, and attending live music events'', ''Yoga and mindfulness practice'', ''Nature walks and trail hiking'', ''Volunteering with historic preservation
    societies'', ''Spontaneous weekend road trips exploring architecture and cuisine'', ''Hosting neighborhood potluck gatherings'', ''Attending cultural festivals and Juneteenth celebrations'']'
  career_goals: Yulonda aims to become a senior director of community association management for a regional real‑estate firm in the Midwest, leading initiatives that integrate sustainability, smart‑technology,
    and inclusive community engagement. She plans to earn the Certified Property Manager (CPM) credential and a real‑estate broker license, and to launch a mentorship program for Black women entering the
    property sector. Long‑term, she envisions founding her own boutique property‑management consultancy that focuses on affordable housing, historic preservation in Columbus’s Black neighborhoods, and empowerment
    of local residents, while maintaining a balanced life that honors family and personal well‑being.
