personas:
  professional: Yulonda Sellers is a community association manager in Columbus who blends meticulous budgeting and fair‑housing compliance with a historian’s eye for cultural programming, and they use their
    spontaneous curiosity to pilot sustainable smart‑building projects while sometimes wrestling with tight deadlines.
  sports: Yulonda Sellers enjoys early‑morning jogs along the Olentangy Trail, follows the Ohio State Buckeyes football season religiously, plays occasional recreational volleyball with the Columbus Women’s
    Sports Club, and they also attend Columbus Crew soccer matches to mix community spirit with cardio.
  arts: Yulonda Sellers immerses themselves in jazz nights featuring the smooth saxophone of Kamasi Washington, attends neo‑soul showcases by H.E.R., curates community‑theater pieces that reinterpret classic
    diaspora narratives, and they collect works by contemporary painter Kehinde Wiley to inspire their own newsletters.
  travel: Yulonda Sellers prefers spontaneous road trips along the historic Route 66, has a bucket‑list of weekend getaways to Asheville’s Blue Ridge Mountains and the cultural festivals of New Orleans,
    and they balance this wanderlust with family responsibilities, often booking budget‑friendly Airbnb stays that allow space for their rooftop garden hobbies.
  culinary: Yulonda Sellers, a confident home chef, blends soul‑food staples like collard greens and smoked turkey with contemporary twists such as quinoa‑infused jambalaya, frequently seasons dishes with
    fresh basil and citrus herbs harvested from their rooftop garden, and they delight in dinner parties where guests sample mini‑gumbo cupcakes.
  core: Yulonda Sellers is a culturally‑driven community strategist who balances a love for heritage‑rich gatherings with impulsive splurges on art, a habit of missing deadlines despite meticulous budgeting,
    and a steadfast belief that gardens can nurture both food and community, and they often schedule spontaneous garden workshops to bring neighbors together.
background:
  cultural: Yulonda is an African‑American woman rooted in the Midwest. Her family traces its lineage to the Great Migration, with grandparents who moved from the Southern United States to Ohio in the 1960s
    seeking industrial opportunities. Raised in Dayton’s historic Black neighborhoods, she was immersed in church community, gospel music, and civic activism. After earning her graduate degree in arts and
    humanities, she settled in Columbus, where she actively supports the Bronzeville district’s cultural renaissance and Black‑owned businesses. Her education deepened her appreciation for African‑American
    artistic expression, which she weaves into her professional life by championing inclusive community programs and celebrating cultural milestones such as Juneteenth and Black History Month. Yulonda balances
    traditional values of family, faith, and community service with modern aspirations, using her platform to uplift Black voices within the real‑estate sector.
