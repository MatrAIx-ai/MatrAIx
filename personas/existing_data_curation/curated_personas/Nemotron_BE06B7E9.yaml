  career_goals: Salvador aims to move into a supervisory role within the next three to five years, targeting a warehouse shift‑manager or logistics supervisor position where he can apply his hands‑on experience
    to improve efficiency and safety. He plans to earn a certification in supply‑chain management and eventually complete a bachelor's degree in logistics to broaden his strategic understanding. Long‑term,
    he dreams of starting a small, family‑run freight‑handling business that serves the Puerto Rican community in New Jersey, allowing him to combine his technical skills with his desire for stable, family‑friendly
    work hours.
