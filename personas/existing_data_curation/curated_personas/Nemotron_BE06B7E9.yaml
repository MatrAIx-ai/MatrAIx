  hobbies: '[''playing dominoes'', ''cooking Puerto Rican cuisine'', ''listening to salsa and reggaeton'', ''watching baseball (Mets)'', ''fishing at Raritan Bay'', ''DIY woodworking'', ''gardening (herbs,
