personas:
  professional: Irma Haifa is an aspiring young game developer who blends graphic-novel storytelling with Scratch coding, turning vivid sketches into interactive adventures while navigating school projects
    with a laid-back, improvisational approach.
  sports: Irma Haifa drifts between playing soccer with the local Kids on the Field club and hiking the wooded trails of Cook County's forest preserves, cheering on the Chicago Cubs in summer and the Chicago
    Fire youth academy in fall, and they enjoy Saturday morning bike rides with friends to stay active.
  arts: Irma Haifa immerses themselves in the vibrant world of graphic novels, sketching scenes inspired by creators such as Marjane Satrapi and Jeff Smith, while practicing piano pieces by Yann Tiersen
    and learning traditional folk songs and salsa steps with family during weekend gatherings, and they often attend local museum workshops to fuel their creative spark.
  travel: Irma Haifa balances a love for spontaneous day trips to Chicago's museums and lakefront parks with family vacations to the sunny Gulf Coast of Florida, where they explore coastal boardwalks and
    collect shells for sketch ideas, preferring flexible itineraries that leave room for impromptu art sessions, and they dream of hiking the Grand Canyon someday.
  culinary: Irma Haifa delights in baking guava-filled pastelitos, mastering the crisp pastry dough after several attempts, while also whipping up simple rice-and-bean meals and caramelized plátanos maduros,
    and they love topping a quick pizza with fresh basil, though they sometimes leave a trail of flour on the kitchen counter.
  core: Irma Haifa is a curious 12-year-old who fuses graphic-novel art with Scratch coding, bakes pastelitos for friends, dances salsa at family gatherings, and navigates a delightfully messy schedule
    with easy-going resilience.
background:
  cultural: Irma is a second‑generation Cuban‑American raised in Park Ridge, Illinois. Her parents emigrated from Cuba in the early 2000s, bringing with them traditions of music, dance, and cuisine that
    remain central to family life. At home, Spanish is spoken alongside English, and family celebrations often feature classic dishes like ropa vieja and plátanos maduros. Growing up in a diverse suburb,
    Irma blends Cuban cultural values—such as close family ties and respect for elders—with the openness and community involvement typical of the Midwest. She participates in local cultural festivals, where
    she proudly shares Cuban art and food, and she appreciates the way her heritage enriches her perspective on the world.
