  career_goals: Irma dreams of turning her love of art into a future career as a visual artist or graphic designer, perhaps one day curating exhibitions that celebrate multicultural stories. She imagines
    attending a high school with a strong STEAM program, then studying fine arts or media design in college. She also hopes to become a cultural ambassador, using her bilingual skills to share Cuban heritage
    through artwork, community workshops, and digital media.
