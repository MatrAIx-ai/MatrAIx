  hobbies: '[''Reading historical non-fiction'', ''Crossword puzzles'', ''Sudoku'', ''DIY woodworking'', ''Cooking Mexican cuisine'', ''Early morning jogging'', ''Personal finance investing'', ''Python
    automation scripting'', ''Strategy video games (single player)'']'
  career_goals: Alberto aims to leverage his current clerk role into a senior billing specialist or financial operations analyst position within the next three years. He plans to earn a professional certification
    such as Certified Billing and Collections Specialist (CBCS) or pursue the CPA credential, while developing automation skills in Python to streamline repetitive posting tasks. In the longer term, he
    envisions either leading a small team of clerks or establishing his own freelance invoicing consultancy serving local businesses in Charlotte, allowing him to control his schedule and remain in a quiet
    work environment.
