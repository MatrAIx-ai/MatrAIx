    "Attending small poetry readings", "Playing ukulele"]'
  career_goals: Amanda plans to complete a Bachelor of Fine Arts with a focus on illustration and visual storytelling. She aims to build a professional portfolio that blends traditional drawing with digital
    media, eventually working as a freelance illustrator for indie publishing houses and game studios. She is also interested in pursuing a curatorial internship at the nearby Detroit Institute of Arts,
    hoping to combine her research skills with a passion for making art accessible to community audiences. Long‑term, she envisions establishing a small collaborative studio in Taylor that offers workshops
    for youth, promoting creative expression while sustaining a modest independent practice.
