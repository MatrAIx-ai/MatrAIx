personas:
  professional: Amanda Esquenazi is an aspiring freelance illustrator who blends traditional watercolor sketches with digital tools like Procreate and Illustrator, and they leverage their strong research
    skills to craft narrative‑driven art for indie publishers while balancing disciplined project timelines with a flexible, curiosity‑driven workflow.
  sports: Amanda Esquenazi rides a vintage hybrid bike through Taylor’s parks with the local Taylor Cyclists club, attends weekend yoga classes at a community center, roots for the Detroit Pistons and the
    Michigan Wolverines, and they prefer solitary, low‑impact workouts over team sports, reflecting a reserved yet health‑conscious lifestyle.
  arts: Amanda Esquenazi spends weekends wandering the Detroit Institute of Arts, drawing inspiration from contemporary artists like Kehinde Wiley and illustrator Kelsey Montague, curates a personal Instagram
    feed of watercolors and mixed‑media pieces, and they find solace in listening to indie folk musicians such as Sufjan Stevens while attending intimate poetry readings at the Union Bar.
  travel: Amanda Esquenazi plans budget‑friendly trips using student discounts, has explored art festivals in Ann Arbor and Chicago, dreams of studying Renaissance frescoes in Florence during a future summer
    program, and they prefer traveling with a sketchbook in hand to capture spontaneous street scenes.
  culinary: Amanda Esquenazi enjoys experimenting in the kitchen by fusing family holiday recipes with global flavors, such as making beet‑infused gnocchi with a miso‑butter sauce, favors fresh basil, sumac,
    and saffron as signature ingredients, and they balance intermediate cooking skills with a habit of over‑seasoning dishes when trying new techniques.
  core: Amanda Esquenazi blends quiet curiosity with disciplined creativity, juggling sketchbooks, budgeting spreadsheets, and late‑night coffee runs that often end in unfinished watercolors, and they constantly
    chase the next inspiration.
background:
  cultural: Amanda grew up in Taylor, a Detroit suburb in Wayne County, Michigan, surrounded by a middle‑class, predominantly white community with roots in the region's industrial heritage. Her family’s
    cultural influences include Midwestern values of modesty, self‑reliance, and community involvement, combined with occasional celebrations of her Italian ancestry, like cooking family recipes during
    holidays. The proximity to Detroit exposed her to the city's rich musical legacy—Motown, jazz, and a vibrant indie scene—while local community centers offered art programs that nurtured her curiosity.
    This blend of suburban stability, regional artistic vibrancy, and familial traditions shapes her worldview and creative sensibilities.
