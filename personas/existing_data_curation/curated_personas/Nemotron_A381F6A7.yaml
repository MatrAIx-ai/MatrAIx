personas:
  professional: Ana Cantalapiedra is a budding classroom helper who transforms recess into an organized yet playful routine, skillfully coordinating tag games with clear rules while allowing spontaneous
    laughs, and they reliably keep peers engaged and the play area tidy.
  sports: Ana Cantalapiedra dashes across the playground playing tag and kicks a ball for the Little Sprouts FC youth soccer club, while proudly wearing a cap of the River City Bears whenever the professional
    baseball team plays on TV, and they thrive on the blend of teamwork and friendly competition.
  arts: Ana Cantalapiedra twirls to the rhythmic beats of traditional folkloric dances, fills sketchbooks with vivid crayon portraits of family and their cat Pepita, and eagerly attends library storytime
    sessions featuring Dr. Seuss and Sesame Street characters, and they find creative expression a daily source of joy.
  travel: Ana Cantalapiedra enjoys weekend trips to the city’s Children’s Museum and the nearby zoo, loves summer outings at Sunshine Bay beach, and dreams of exploring the towering cliffs of Grand Canyon
    National Park, and they cherish family adventures that blend familiar routines with new discoveries.
  culinary: Ana Cantalapiedra delights in crunching on carrot sticks, savoring cheesy quesadillas filled with melted cheddar and sautéed bell peppers, helps wash bright red tomatoes, crisp lettuce, and
    juicy strawberries, and proudly claims a budding chef badge for mastering the simple art of stirring guacamole with avocado, lime, and a pinch of salt.
  core: Ana Cantalapiedra is a lively, routine‑loving six‑year‑old who balances structured play with spontaneous joy, often swapping crayons for a dancing step, and has a sweet habit of hiding glitter stickers
    in their piggy bank.
background:
  cultural: Ana Lucia comes from a Mexican‑heritage family that has lived in McAllen, Texas for generations. She grows up speaking both Spanish and English, celebrating traditions such as Día de los Muertos,
    Las Posadas, and family gatherings centered around Mexican cuisine. Her parents emphasize the importance of community, respect for elders, and maintaining cultural roots while navigating life in a border
    city. The blend of Mexican customs and Texan influences shapes her worldview, encouraging a strong sense of family, hospitality, and practical values.
attributes:
  skills: '["Reading simple words", "Counting to 20", "Basic Spanish-English bilingual communication", "Drawing and coloring", "Singing traditional songs", "Following routines", "Organizing toys", "Cooperative
