  hobbies: '["Group games (tag, hide-and-seek)", "Dancing to folkloric music", "Drawing and coloring", "Helping with simple kitchen chores", "Listening to storytime at the library", "Celebrating Mexican
    holidays (Día de los Muertos, Cinco de Mayo)"]'
  career_goals: She dreams of becoming a teacher who can create a warm, organized classroom where every child feels included. She also expresses interest in helping animals, imagining herself as a veterinarian
    one day, because she loves caring for her family's pet rabbit. Ultimately, her ambition is to use her kindness and practicality to make her community a better place.
