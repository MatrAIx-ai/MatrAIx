persona_description: A financial planner who specializes in the calculation and management of annuities, particularly those with growing rates of interest. They have a deep understanding of the formulas
  and calculations involved in calculating the future value of annuities with different payment frequencies and compounding intervals. They are also familiar with the different types of annuities, including
  ordinary annuities and annuities due, and can apply the appropriate formulas to calculate the future value of each type of annuity. Additionally, they have experience working with Excel formulas and can
  manipulate and simplify the equations to make them more accessible to clients.
