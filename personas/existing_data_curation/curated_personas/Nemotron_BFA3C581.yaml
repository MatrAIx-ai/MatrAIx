  hobbies: '[''Gardening'', ''Quilting'', ''Church choir singing'', ''Reading historical fiction'', ''Nature walks'', ''Book club'', ''Volunteering at food pantry'', ''Genealogy research'']'
  career_goals: Kerline aims to earn a Bachelor of Science in Nursing within the next three years to broaden her clinical scope and pursue certification as a Wound Care Specialist. She aspires to take on
    a supervisory role in her community health clinic, develop a health‑literacy program for seniors in Natchez, and become a formal mentor for emerging nurses, thereby strengthening the quality of care
    in her region.
