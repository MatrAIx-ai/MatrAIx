personas:
  professional: Kerline Easter, a seasoned LPN in a rural Mississippi clinic, combines three decades of hands‑on patient assessment, wound care, chronic disease management, and health education with a curiosity‑driven
    commitment to evidence‑based practice, mentoring newer staff while balancing organized protocols with practical flexibility.
  sports: Kerline Easter enjoys low‑impact fitness through daily walks along the Mississippi River trail, participates in the Natchez Nature Walkers club, and backs the Mississippi State Bulldogs football
    team during the fall season, while occasionally joining a local senior softball league for social exercise.
  arts: Kerline Easter finds artistic fulfillment quilting folk‑inspired patterns while listening to gospel legends such as Mahalia Jackson, revels in her church choir’s renditions of hymns by Thomas A.
    Dorsey, and immerses herself in historical fiction by Philippa Gregory and the dramatic works of August Wilson.
  travel: Kerline Easter prefers thoughtfully planned, low‑key travel itineraries that blend heritage and nature; she has explored the historic streets of Charleston, the riverfront of New Orleans, and
    the blue‑grass scenery of Asheville, and she dreams of a pilgrimage to the Civil War battlefields of Gettysburg and a quiet retreat at the Great Smoky Mountains National Park.
  culinary: Kerline Easter, an adept home chef, transforms classic Southern comfort meals—such as skillet‑fried catfish with a corn‑bread crust, collard greens simmered with smoked turkey, and sweet potato
    casserole—into healthier versions by substituting low‑fat dairy, incorporating heirloom tomatoes, fresh okra, and garden‑grown sweet corn, and she delights in sharing her dishes at church potlucks.
  core: Kerline Easter is a diligent, garden‑loving nurse who balances a methodical work ethic with a quiet curiosity, often humming hymns while quilting, yet habitually forgets to water her tomatoes on
    rainy days.
background:
  cultural: Kerline was raised in a close‑knit African‑American community in Natchez, where church life, family gatherings, and Southern culinary traditions shaped her identity. Her grandparents lived through
    the Jim Crow era and the civil‑rights movement, instilling values of resilience, communal support, and storytelling. These cultural roots influence her compassionate nursing practice, her love for gospel
    music, and her active participation in community events such as Juneteenth celebrations and church service projects.
