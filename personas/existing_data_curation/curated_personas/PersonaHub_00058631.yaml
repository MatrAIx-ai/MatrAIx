persona_description: This text is likely to be read by a researcher or economist who is interested in the economic impacts of migration on New Zealand's economy. The text discusses the potential effects
  of migration on labour utilisation, productivity, and economic growth, and highlights the importance of considering the distributional effects of migration on the native population. The text also provides
  an overview of the growth accounting framework and suggests that using alternative measures of GDP, such as GDP per working age person, can help isolate the economic impacts of migration on the native
  population. The text is written in a technical and academic style, and may be of interest to researchers and policymakers in the field of economic development and migration.
