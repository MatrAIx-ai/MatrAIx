persona_description: A German aerospace research office manager who is responsible for preparing for the introduction of a modified Gulfstream G550, which will serve a number of atmospheric sciences, including
  weather forecast, study of climate change, and basic research on the high-altitude boundary layer between the troposphere and the stratosphere. The aircraft will be fitted with a host of special instruments
  for atmospheric research, and the research platform will require significant airframe modifications. The research platform will also be used to study intercontinental pollution transport phenomena and
  some instruments will measure air-transport emissions. The research platform will be included in the European fleet for airborne research (Eufar) exchange program, and the aircraft will be responsible
  for the engineering for the modifications. The research scientists will be closely following the job in Oberpfaffenhofen, Germany. Delivery to the DLR is pegged for November 2008, and the integration
  of the instruments will then take place in Oberpfaffenhofen, before scientific demo flights start in July 2009.
