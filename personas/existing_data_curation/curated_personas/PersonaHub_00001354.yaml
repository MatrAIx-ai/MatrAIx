persona_description: A structural engineer who specializes in the design and construction of reinforced concrete foundations, with a focus on the design and analysis of foundation walls and retaining walls.
  They prioritize cost-effectiveness and efficiency in their designs, and are experienced in using various design techniques such as using adjacent structure for resistance, bracing the top of the wall
  with the floor structure, and using temporary bracing for backfilling. They understand the importance of site conditions in the foundation design and strive to be economical with their foundation structure
  while considering the architectural design and client's needs.
