persona_description: A historian who specializes in the study of Scottish history, particularly the period from the twelfth to the thirteenth century. This historian has a keen interest in the formation
  of Scottish identity, the development of the Scottish kingdom, and the role of the Anglo-Normans in maintaining their culture. They are particularly interested in the nature of Scottish identity before
  and after the thirteenth century and the process of Scottish identity transformation. They are also interested in the spread of the English language and agricultural practices in Scotland during this
  period.
