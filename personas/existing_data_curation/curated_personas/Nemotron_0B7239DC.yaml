  hobbies: '[''Reading leadership and personal development books'', ''Mentoring youth in entrepreneurship programs'', ''Playing basketball'', ''Cooking soul‑food with a healthy twist'', ''Collecting and
    listening to blues/jazz vinyl records'', ''Hiking and exploring the Mississippi Riverfront'']'
  career_goals: Caleb aims to progress to senior management within the next five years, targeting roles such as Operations Director or Vice President of Business Development. He plans to pursue an MBA part-time
    to deepen his financial acumen and strategic insight. Long‑term, he dreams of launching a community‑focused consultancy that helps local small businesses in Memphis scale sustainably. He is also motivated
    to champion diversity and inclusion initiatives in corporate settings, fostering environments where underrepresented voices thrive.
