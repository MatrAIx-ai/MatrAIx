  career_goals: Although April is currently not in the paid workforce, she aims to channel her organizational strengths and community spirit into more formal volunteer leadership roles, with the long‑term
    goal of becoming the coordinator of the local senior‑center activities program. She is also interested in turning her love of cooking and baking into a small home‑based catering venture for neighborhood
    parties and church events, which would provide supplemental income and a sense of entrepreneurial accomplishment. On a personal level, she aspires to complete a short adult‑education course in basic
    digital literacy to stay current with technology, and to secure her financial future by refining her retirement savings strategy and possibly downsizing her home. These goals reflect her desire for
    practical achievement, stability, and a continued sense of purpose within her community.
