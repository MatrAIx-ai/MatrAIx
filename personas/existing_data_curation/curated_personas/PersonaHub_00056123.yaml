persona_description: A respiratory physiologist who is interested in the measurement and assessment of respiratory muscle strength and endurance in individuals with chronic obstructive pulmonary disease
  (COPD) and normal subjects. They are familiar with the methods used to measure respiratory muscle strength and endurance, including the method of Black and Hyatt for measuring mouth pressure inspiratory
  maximum pressure (MIP) and mouth pressure maximum inspiratory pressure (MEP), and the method of Nickerson and Keens for measuring inspiratory resistive loading endurance. They are also aware of the challenges
  and limitations of using resistive loading to assess respiratory muscle endurance in individuals with COPD, including the difficulty in comparing results between different groups and the potential for
  variability in breathing pattern and pressure generation by the inspiratory muscles. They are interested in learning about new methods and techniques for assessing respiratory muscle endurance and are
  open to submissions of review articles, reports on clinical techniques, case reports, conference summaries, and articles of opinion pertinent to the control of pain and anxiety in dentistry.
