personas:
  professional: Jeannette Garcia is a seasoned nursing assistant with 35 years of experience in long‑term and acute‑care settings, recognized for their meticulous vital‑sign monitoring, evidence‑based wound‑care
    techniques, and methodical documentation, and they bring a skeptical, competitive edge to workflow improvements and mentorship initiatives.
  sports: Jeannette Garcia enjoys low‑impact cardio, regularly walking the scenic trails of Daley Ranch with their husband, follows the San Francisco Giants and occasionally attends Golden State Warriors
    games, and is a member of the Danville Trail Runners club, which helps them manage osteoarthritis while staying active.
  arts: Jeannette Garcia finds solace in historical novels by Hilary Mantel and Ken Follett, and enriches their leisure time by listening to Beethoven's Symphony No. 9, attending performances by the San
    Jose Chamber Orchestra, and watching classic films starring Meryl Streep.
  travel: Jeannette Garcia prefers purposeful travel, meticulously planning day trips to historic towns like Monterey and Sonoma, dreaming of a guided tour of England's Tudor sites, yet typically opts for
    budget‑friendly road excursions with their husband due to a fixed retirement income and a desire for low‑stress itineraries.
  culinary: Jeannette Garcia delights in preparing nutritionally balanced meals such as herb‑roasted chicken seasoned with garden‑grown rosemary and thyme, quinoa Mediterranean salads with cucumbers and
    feta, and lentil soup flavored with cumin and basil, and while they consider themselves a competent home chef, they occasionally over‑salt dishes in pursuit of bold flavor.
  core: Jeannette Garcia, a 60‑year‑old methodical caregiver, channels their curiosity and competitive streak into precise gardening, puzzle‑solving, and quality‑focused nursing, yet they habitually ruminate
    over minute details and feel heightened stress when routines are disrupted.
background:
  cultural: Jeannette was raised in a middle-class Anglo-American family in the Central Valley of California, where values such as self-reliance, hard work, and practicality were emphasized. Moving to Escondido
    in her thirties immersed her in Southern California’s multicultural environment, prompting her to respect diverse cultural perspectives while maintaining her methodical, organized approach. Her cultural
    identity blends traditional American independence with the community-oriented, health-focused ethos of the San Diego region, shaping a pragmatic yet curious outlook on life and work.
attributes:
  skills: '[''Patient Care'', ''Vital Signs Monitoring'', ''Mobility Assistance'', ''Wound Care'', ''Medication Support'', ''Infection Control'', ''Electronic Health Record Documentation'', ''Shift Scheduling'',
