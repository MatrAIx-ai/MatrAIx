  hobbies: '[''Historical Fiction Reading'', ''Medical Journal Reading'', ''Gardening'', ''Crossword Puzzles'', ''Sudoku'', ''Walking Trails at Daley Ranch'', ''Healthy Cooking'', ''Volunteering at Senior
    Center'', ''Medical Technology Webinars'']'
  career_goals: Jeannette’s immediate goal is to advance into a lead nursing-assistant or unit-supervisor position, leveraging her organized, reliable reputation to streamline workflow and enhance patient
    safety. She plans to finish her associate-degree in nursing to become a licensed practical nurse, a step that aligns with her competitive drive to attain higher professional credentials. She also aims
    to design a mentorship program that teaches new aides evidence-based techniques and critical evaluation of protocols, and to earn recognitions such as Employee of the Month for her contribution to quality
    improvement. Reducing workplace stress for herself and her team by implementing efficient scheduling and stress-management practices is another long-term ambition.
