personas:
  professional: Jeanette Kalinowski, a retired data analyst turned community STEM‑arts mentor, leverages her Python and statistical modeling expertise to design interdisciplinary workshops that blend coding
    with watercolor exhibitions, all while captivating senior audiences with her talkative, stage‑ready presence.
  sports: Jeanette Kalinowski enjoys low‑impact activities such as birdwatching walks around Lake Granbury, gentle hikes in Big Bend National Park, and a weekly senior swim class, while cheering for the
    Dallas Mavericks and Texas Rangers whenever she catches a game on TV.
  arts: Jeanette Kalinowski paints delicate watercolors inspired by Monet and Frida Kahlo, curates mini‑exhibits at the Granbury Art Center, regularly attends regional gallery openings, and finds solace
    in the jazz of John Coltrane and the flamenco guitar of Paco de Lucía while knitting between brushstrokes.
  travel: Jeanette Kalinowski favors short, well‑planned excursions to national parks like Guadalupe Mountains, using senior discounts and a meticulous itinerary that leaves room for spontaneous birdwatching
    stops, while dreaming of a future trip to the vineyards of Tuscany.
  culinary: Jeanette Kalinowski experiments with bold Tex‑Mex dishes such as chipotle‑infused enchiladas, homemade salsa verde, and fresh cilantro‑lime guacamole, often incorporating herbs from her windowsill
    garden, though she occasionally forgets to turn off the stove while engrossed in a documentary.
  core: Jeanette Kalinowski is a talkative, curious 73‑year‑old who fuses art and science in community workshops, balances careful budgeting with artistic splurges, wrestles with anxiety, and thrives on
    social connection through birdwatching, painting, and mentoring.
background:
  cultural: Jeanette’s cultural background is a blend of Eastern European (Polish) ancestry and the Southern Texas milieu of Granbury. Raised in a family that prized education, hard work, and community
    service, she grew up celebrating traditional Polish holidays such as pierogi making while also embracing the values of Southern hospitality and church involvement. This hybrid heritage fostered a respect
    for both individual achievement and collective harmony, shaping her identity as a white American who values lifelong learning, volunteerism, and an appreciation for the arts and sciences embedded within
    her tight‑knit local community.
