  career_goals: Although retired from formal employment, Jeanette is committed to lifelong learning and community contribution. She aims to mentor younger professionals and hobbyists through a local STEM‑Arts
    mentorship program, volunteer as a docent and tech‑club facilitator at the Granbury Public Library, and contribute occasional articles on science and art to the regional newspaper. She also seeks to
    develop a small intergenerational workshop series that blends basic coding with creative projects, promote mental‑health awareness within senior circles, and continue expanding her knowledge in emerging
    fields such as artificial intelligence and digital media.
