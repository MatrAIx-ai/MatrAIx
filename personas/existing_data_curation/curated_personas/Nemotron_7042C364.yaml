personas:
  professional: Reda Jones, a veteran carpenter with three decades of experience, blends meticulous joinery expertise and a curiosity for sustainable building with a relaxed, flexible work style, often
    mentoring apprentices in their modest workshop while occasionally letting project timelines slip due to a laid‑back attitude toward strict scheduling.
  sports: Reda Jones, an outdoor‑oriented sports enthusiast, spends Saturdays hiking with the Upper Sandusky Trailblazers, follows the Cleveland Browns and Ohio State Buckeyes on game days, plays catch‑up
    softball in the Wyandot County Shiners league each summer, and they prefer low‑impact exercise like trail walking over intense gym workouts.
  arts: Reda Jones, a passionate patron of regional arts, devotes evenings to reading James A. Michener’s historical novels, attends live folk performances honoring John Prine, displays Grant Wood‑style
    paintings in their workshop, and they carve wooden figurines inspired by classic American literature, all of which enrich their sense of place and craftsmanship.
  travel: Reda Jones, a budget‑conscious explorer, enjoys weekend trips to Hocking Hills State Park and Ohio’s Amish Country, has traveled to historic Gettysburg and the Scottish Highlands, dreams of visiting
    the Blue Ridge Mountains and New Zealand’s Otago region, and they plan each journey around modest savings and the seasonal rhythm of their carpentry calendar.
  culinary: Reda Jones, a skilled home cook and garden‑to‑table advocate, loves preparing heirloom tomato and basil salad with fresh mozzarella, roasting beet and goat cheese medleys, baking sourdough loaves
    infused with rosemary and cracked pepper, and they occasionally whisk up pork chops with apple chutney, always sourcing many ingredients from their own vegetable patch.
  core: Reda Jones, a seasoned carpenter with a green‑building vision, balances meticulous craftsmanship, community mentorship, and heirloom gardening while navigating a laid‑back schedule, modest financial
    diligence, and a health‑focused routine, all punctuated by occasional tool‑obsessed over‑ordering and a habit of forgetting to floss, which they acknowledge with a wry smile.
background:
  cultural: Reda is a white Midwestern American who grew up in a multi‑generational Ohio family with German and Irish roots. Raised in the small‑town values of Upper Sandusky, she embodies a blend of hard‑working
    pragmatism and friendly hospitality characteristic of the region. Community events such as county fairs, church gatherings, and local history tours have shaped her appreciation for the area's cultural
    heritage, including the Wyandot County Native American legacy. Her upbringing emphasized cooperation, self‑reliance, and respect for tradition, which continue to influence her personal and professional
    life.
attributes:
  skills: '[''Framing'', ''Cabinetmaking'', ''Custom furniture design'', ''Historic home restoration'', ''Blueprint reading'', ''Tool maintenance'', ''Advanced joinery (mortise‑and‑tenon, dovetail, pocket‑hole)'',
    ''Sustainable material selection'', ''Project budgeting'', ''Safety compliance'', ''Apprentice mentorship'', ''Client communication'']'
  hobbies: '[''Gardening'', ''Wood carving'', ''Historical fiction reading'', ''Habitat for Humanity volunteering'', ''Nature hikes'', ''Community festivals'', ''Farm‑to‑table cooking'', ''Quilting'']'
  career_goals: Reda aims to expand her modest carpentry business into a boutique workshop that specializes in sustainable, reclaimed‑wood furniture and the preservation of historic structures in Wyandot
    County. She plans to earn a green‑building certification to deepen her expertise in eco‑friendly construction, and she hopes to launch a series of evening classes for local women and seniors interested
    in basic woodworking skills. Mentoring the next generation of craftsmen remains a priority, and she envisions transitioning to a consulting and teaching role over the next five years while still taking
    on select, personally rewarding projects.
