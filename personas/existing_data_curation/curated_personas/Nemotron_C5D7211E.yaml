personas:
  professional: A ten‑year‑old aspiring civil engineer, Jesse Collard builds intricate LEGO cityscapes, applying their methodical planning and love of routine to design realistic streets and bridges.
  sports: Jesse Collard plays midfield for the local community soccer team, favoring strategic play and organizing teammates, and they admire FC Dallas and the Mexico national team while also participating
    in the youth club Little Kickers United, reflecting their organized, team‑first mindset.
  arts: Jesse Collard draws cartoons inspired by Bill Watterson’s Calvin and Hobbes and sketches LEGO vehicles after watching the LEGO Movie, and they binge‑watch Adventure Time and listen to the upbeat
    tunes of They Might Be Giants, which fuels their creative side.
  travel: Jesse Collard enjoys meticulously planning family road trips, having visited Carlsbad Caverns and the San Antonio River Walk, and they dream of exploring the LEGO House in Billund, Denmark, while
    balancing budget constraints with a love for adventurous learning.
  culinary: Jesse Collard helps bake chocolate chip cookies, always measuring ingredients to the gram and adding a pinch of sea salt for crunch, and they favor pizza with extra pepperoni and homemade mac & cheese,
    showing a blend of precise cooking and kid‑friendly tastes.
  core: Jesse Collard is a methodical, LEGO‑loving ten‑year‑old who balances routine‑driven projects with soccer teamwork, budgets allowance with care, and sketches lively cartoons in spare moments.
background:
  cultural: Jesse comes from a white Anglo-American family living in Roma, Texas, a town on the U.S.–Mexico border with a vibrant Hispanic community. While his household celebrates typical American holidays
    and traditions, he regularly participates in local events such as the Fiesta de la Rosa, enjoys Mexican foods like tacos, and knows enough Spanish to greet neighbors. The blend of South Texas ranch
    culture, community festivals, and cross-border influences gives him a bicultural perspective that values family, cooperation, and practical skills.
