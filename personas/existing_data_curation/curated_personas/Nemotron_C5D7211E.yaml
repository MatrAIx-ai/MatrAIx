  career_goals: Jesse aims to finish middle school with strong grades in math and science so he can join a high school robotics or engineering club. He dreams of becoming a firefighter because he admires
    the routine, teamwork, and community service the job provides. He also hopes to study civil engineering later, to design safe buildings and help his hometown improve infrastructure. In the short term,
    he wants to earn the Boy Scout rank of Tenderfoot and volunteer at his local fire station’s open house.
