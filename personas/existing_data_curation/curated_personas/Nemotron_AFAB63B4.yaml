  hobbies: '["digital illustration", "watercolor painting", "reading fantasy and historical fiction", "bullet journaling", "hiking local nature trails", "listening to indie/alternative music", "crocheting",
    "visiting art galleries and museums"]'
  career_goals: Holly aims to complete her high school education—either by re‑enrolling or obtaining a GED—so she can pursue an associate degree in graphic design or museum studies at a community college.
    Long‑term, she envisions a career that blends her love of art with service to others, such as working as a museum education coordinator, a community art program director, or eventually an art therapist.
    She also hopes to one day open a modest community art space in the Lynchburg area where teens can explore creativity in a supportive, low‑pressure environment.
