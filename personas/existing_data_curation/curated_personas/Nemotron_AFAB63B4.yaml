personas:
  professional: An aspiring museum education coordinator, Holly Vogel combines her proficiency in Procreate and Photoshop with meticulous bullet‑journal organization to design engaging visual programs for
    teenagers, leveraging her empathetic listening and calm mediation skills to foster inclusive, low‑pressure art experiences.
  sports: Holly Vogel enjoys low‑impact fitness, joining the local Shenandoah Hiking Club for weekend trail walks, cheering for the Lynchburg Hillcats minor league baseball team and the Virginia Cavaliers
    basketball squad, and practices yoga twice a week to balance her sedentary art sessions.
  arts: Holly Vogel immerses herself in creative expression, drawing inspiration from Frida Kahlo’s vibrant self‑portraits, the atmospheric worlds of Hayao Miyazaki’s Studio Ghibli films, and the haunting
    melodies of indie artists like Phoebe Bridgers and Alt‑J, while regularly visiting the Lynchburg Museum of Fine Arts and curating mixed‑media collages that blend watercolor with digital overlays.
  travel: Holly Vogel favors well‑planned, nature‑centric getaways, having explored Shenandoah National Park and taken a road trip to Asheville’s art scene, while dreaming of a solo trip to Kyoto’s historic
    temples and Florence’s Renaissance galleries, always mapping itineraries in her bullet journal and budgeting carefully for each adventure.
  culinary: Holly Vogel loves preparing simple yet colorful meals such as avocado toast topped with radish slices, sushi rolls with cucumber and avocado, and occasional mac & cheese comfort food, favoring
    fresh ingredients like cherry tomatoes, basil, and matcha powder, and enjoys sampling indie coffee shop lattes while listening to alternative music.
  core: Holly Vogel is a detail‑oriented teen artist who balances meticulous planning, occasional anxiety, and a love for low‑pressure creative community spaces.
background:
  cultural: Holly was raised in a middle‑class, White Southern family in Lynchburg, Virginia, with strong ties to the local Methodist congregation and community events such as the Virginia Apple Festival
    and local farmers' markets. Her upbringing emphasized hospitality, modesty, and close family relationships, while also exposing her to the region’s rich artistic traditions—including Appalachian folk
    art, quilting, and regional craftsmanship. The town’s small‑city atmosphere offers a blend of conservative community values and emerging creative spaces, which has nurtured Holly’s appreciation for
    both tradition and unconventional artistic expression.
attributes:
  skills: '["digital illustration (Procreate)", "basic Photoshop editing", "traditional sketching and mixed‑media collage", "research using library databases", "bullet‑journal planning and time‑management",
