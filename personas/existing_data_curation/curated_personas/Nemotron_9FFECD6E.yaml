personas:
  professional: Janet Harrison, a full‑stack software developer proficient in JavaScript, React, Node.js, Python, and AWS, channels her imaginative flair and methodical mindset into creating art‑infused
    digital experiences while they mentor junior teammates with calm, organized guidance.
  sports: Janet Harrison, an avid participant in Zumba classes and weekend hikes along the Michigan Trail, proudly supports the Detroit Lions and the Detroit Pistons, and they belong to the local “Great
    Lakes Hiking Club” where they organize monthly group treks and friendly squash matches after work.
  arts: Janet Harrison, whose weekends are spent painting oil canvases inspired by the works of Frida Kahlo and contemporary digital artist Bee Bee Mullin, frequents Detroit’s museum district to study pieces
    by Diego Rivera, attends live shows by The Motown Revival, and they regularly contribute illustrations to community art zines, blending classic and modern influences.
  travel: Janet Harrison, a lover of both organized road trips and spontaneous cultural escapes, has explored the historic streets of Savannah, ventured to the art festivals of Lisbon, and they dream of
    a panoramic retreat in Kyoto’s Arashiyama bamboo grove, always planning itineraries that balance creative inspiration with budget-conscious choices.
  culinary: Janet Harrison, an experimental home chef who enjoys mastering dishes like Thai green curry, Ethiopian injera with spiced lentil stew, and classic Italian risotto alla Milanese, skillfully blends
    flavors while they often source fresh herbs from local farmer’s markets and occasionally treat friends to themed dinner parties featuring vinyl‑record‑backed playlists.
  core: Janet Harrison, a methodical dreamer who merges code with canvas, balances a disciplined financial strategy with vibrant social rituals, and navigates life with calm resilience and a penchant for
    spontaneous art‑themed adventures.
background:
  cultural: Janet grew up in a middle‑class family in the Detroit suburbs, with German and Irish ancestry that shaped a Midwestern sensibility of modesty, community focus, and appreciation for cultural
    events like county fairs and regional art festivals. Her white American background, combined with a liberal arts education, fosters a blend of traditional values—reliability and cooperation—and a curiosity
    for novelty and abstract ideas. She and her spouse actively participate in local volunteer initiatives and celebrate multicultural traditions through food, music, and community gatherings.
