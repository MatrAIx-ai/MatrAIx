  hobbies: '["Oil painting", "Digital illustration", "Museum visits", "Speculative fiction reading", "Board games", "Community tech mentorship", "Hiking in Michigan", "Live music concerts", "Cooking experimental
    dishes", "Yoga", "Group fitness classes"]'
  career_goals: Janet aims to progress into a senior engineering or tech‑lead role where she can guide multidisciplinary teams to create innovative, art‑infused digital experiences such as immersive AR/VR
    installations or interactive media platforms. She aspires to champion inclusive design practices, mentor women and underrepresented groups in tech, and eventually launch a startup that bridges technology
    and contemporary art. Balancing ambition with personal well‑being, she also seeks opportunities to contribute to open‑source projects that empower creative coders.
