  hobbies: '["softball league", "bowling nights", "volunteer fire department runner", "woodworking", "vintage motorcycle restoration", "hiking local trails", "fishing trips", "landscape photography", "BBQ
    cooking for friends", "card games (poker)", "live music concerts", "exploring delivery tech apps"]'
  career_goals: Thomas aims to leverage his extensive on‑the‑ground experience into a more strategic role within the regional logistics network before retirement. He plans to earn a commercial driver’s
    license (CDL) to expand his driving options to larger trucks and higher‑pay routes, while also exploring opportunities to become a senior route planner or dispatcher where he can apply his practical
    knowledge to optimize schedules for his colleagues. He enjoys teaching, so he hopes to formalize a mentorship program for new couriers, sharing best practices and safety protocols. At the same time,
    he is interested in the emerging technologies shaping last‑mile delivery—such as drone drop‑offs and AI‑driven routing—and wants to become an early adopter, possibly piloting a small side business that
    offers specialized local deliveries for boutique merchants using electric vehicles. Ultimately, Thomas’s goal is to secure a steady income that offers flexibility, allows him to stay active in his community,
    and gives him the financial cushion to enjoy a comfortable retirement while remaining socially engaged.
