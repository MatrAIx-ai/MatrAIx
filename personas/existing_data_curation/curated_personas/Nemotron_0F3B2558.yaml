  career_goals: Even at four, Joe dreams big. He often talks about becoming an astronaut who paints the planets he discovers, a wildlife artist who sketches animals in vivid colours, or a storyteller who
    writes magical books for other kids. He is fascinated by space, dinosaurs, and bright, abstract worlds, and he aspires to explore, create, and share his discoveries with others. Though his ambitions
    are playful, they reflect a strong desire to learn, explore new ideas, and express himself through art and imagination.
