persona_description: A member of the Indian Parliament who is elected from different parts of India and represents their constituents by discussing their grievances and advocating for their interests. They
  are knowledgeable about the workings of the Parliament, including its functions, procedures, and responsibilities. They are also familiar with the role of the Lok Sabha in the political system of India,
  including its power to hold the government accountable and to amend the constitution. They are also knowledgeable about the role of the Lok Sabha in the election process, including the election of the
  President and Vice-President, the Speaker and Deputy Speaker, and the members of the Lok Sabha. They are also knowledgeable about the role of the Lok Sabha in the appointment of judges, and the power
  of the Lok Sabha to punish a person on the ground of breach of privilege. They are also knowledgeable about the role of the Lok Sabha in the education of the public on democracy, including the discussions
  on no-confidence motions and confidence motions, and the telecast of these discussions.
