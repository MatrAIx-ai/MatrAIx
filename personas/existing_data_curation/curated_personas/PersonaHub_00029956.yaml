persona_description: A researcher in the field of dam monitoring and seepage research, focusing on the use of distributed temperature sensing (DTS) for seepage monitoring in embankment dams. This person
  is highly skilled in the use of fibre optic distributed temperature sensors and has extensive experience in the implementation and evaluation of DTS systems in Swedish embankment dams. They are also familiar
  with the use of DTS for seepage monitoring and have published research on the application of DTS in embankment dams. This person is likely to be interested in the latest developments in DTS technology
  and is looking for ways to improve the accuracy and reliability of DTS systems for seepage monitoring in embankment dams.
