personas:
  professional: Gabriela Mangual is a seasoned special‑education teacher who designs data‑driven IEPs, leads multidisciplinary teams, and leverages bilingual communication to champion equity, while their
    blend of curiosity and pragmatic flexibility lets them constantly experiment with new interventions yet keep classroom routines grounded, even if their desk often looks like a pleasant chaos, and they
    thrive in that organized disarray.
  sports: Gabriela Mangual enjoys weekend hikes in the Tennessee foothills, cheers for the Nashville Predators and the Tennessee Titans, jogs a few miles on a flexible schedule with their local running
    club, and prefers low‑impact yoga over rigid gym routines, though they sometimes forget to log workouts.
  arts: Gabriela Mangual immerses themselves in cultural arts by attending live performances of Los Lobos and the mariachi ensemble at the local festival, curating a home collection of Frida Kahlo prints,
    and finding inspiration in the novels of Isabel Allende and the soulful ballads of Juan Luis Guerra, while they occasionally binge‑watch reality TV for a quick unwind.
  travel: Gabriela Mangual favors road trips that blend nature and heritage, having explored the Blue Ridge Parkway, the historic streets of Santa Fe, and the vibrant Day of the Dead celebrations in Oaxaca,
    but they prioritize budget‑friendly stays and often delay booking until the last minute, reflecting a relaxed planning style.
  culinary: Gabriela Mangual is a confident home cook who perfects mole negro with dark chocolate, ancho chilies, and fresh cilantro from their garden, crafts hand‑rolled tamales for family gatherings,
    and delights in pairing them with homemade pozole, yet they occasionally order take‑out sushi when pressed for time.
  core: Gabriela Mangual balances relentless advocacy and meticulous lesson planning with a restless curiosity, a discreet competitive streak, and a constant undercurrent of anxiety that fuels both their
    drive and occasional disorganization, and they often find solace in quiet moments of mindfulness.
background:
  cultural: Gabriela Mangual is a first‑generation Mexican‑American who grew up in a bilingual household that celebrated Día de los Muertos, Cinco de Mayo, and family gatherings centered around food and
    faith. Her parents instilled values of hard work, respect for community, and a deep sense of cultural pride. Living in Germantown, Tennessee, she bridges her Mexican heritage with the Southern community,
    often acting as a cultural liaison for Spanish‑speaking families in the school district. Her teaching philosophy is rooted in culturally responsive pedagogy, emphasizing the importance of honoring students'
    linguistic and cultural identities while delivering rigorous, evidence‑based instruction. Gabriela's experiences navigating two cultural worlds have fostered a competitive drive to succeed and a healthy
    skepticism that fuels her advocacy for equitable educational opportunities.
attributes:
  skills: '["IEP development", "Differentiated instruction", "Behavior Intervention Planning", "Assistive technology integration", "Spanish-English bilingual communication", "Collaborative team leadership",
    "Creative curriculum design", "Flexible classroom management", "Data‑driven student assessment", "Advocacy for students with disabilities"]'
  hobbies: '["Cooking traditional Mexican dishes", "Gardening", "Reading contemporary fiction and educational psychology", "Practicing yoga and mindfulness", "Participating in local Mexican cultural festivals",
    "Volunteering at community centers for bilingual families", "Exploring hiking trails in the Tennessee foothills", "Listening to Latin music", "Attending special education conferences"]'
  career_goals: Gabriela aims to advance to a district‑level leadership role, such as Special Education Coordinator, where she can shape inclusive policies and mentor new teachers. She plans to pursue a
    master's degree in Special Education or Educational Leadership to deepen her expertise. Her ambition includes establishing a bilingual outreach program that supports Spanish‑speaking families navigating
    special‑education services. Gabriela also hopes to become a speaker at national conferences, publishing research on culturally responsive practices and innovative, flexible instructional strategies
    that balance curiosity with practicality. On a personal level, she seeks to develop stronger coping mechanisms for anxiety and emotional distress, integrating mindfulness techniques into her daily routine
    to enhance her well‑being and professional resilience.
