  hobbies: '[''Gardening'', ''Cooking'', ''Walking'', ''Community events'', ''Bingo'', ''Reading mystery novels'', ''Watching classic movies'']'
  career_goals: Patricia aims to move beyond the cashier role into a supervisory position, such as lead cashier or shift manager, where she can apply her practical expertise to schedule planning and staff
    coaching. She plans to earn her GED and pursue a short certification in retail management, which would qualify her for an assistant store manager role. Long‑term, she envisions opening a small neighborhood
    convenience store that offers flexible hours and a community gathering spot, allowing her to blend her love of practical work with entrepreneurial independence.
