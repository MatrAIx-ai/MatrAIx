    games'']'
  career_goals: At 60, Henry is aiming to transition from full‑time floor work to a senior advisory role where he can pass on his practical knowledge to younger engineers. He hopes to obtain a Certified
    Maintenance & Reliability Professional (CMRP) credential, lead a small maintenance team, and eventually shift to part‑time consultancy that focuses on improving equipment reliability through simple,
    routine‑driven processes. He also wishes to be recognized for developing a cost‑saving preventive‑maintenance program at his plant before he retires.
