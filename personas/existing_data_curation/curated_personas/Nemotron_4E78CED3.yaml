  hobbies: '[''Recreational soccer'', ''Community theater'', ''Volunteer reading programs'', ''Gardening (herbs and vegetables)'', ''Cooking and recipe experimentation'', ''Hosting dinner gatherings'',
    ''Knitting and crocheting'', ''Hiking in local parks'', ''Historical tours and museum visits'']'
  career_goals: Rowen aims to turn her community involvement into a part‑time or freelance role. She plans to enroll in a community‑college certificate program in early childhood education or community
    health, with the goal of becoming a family services aide or community outreach coordinator. Long‑term, she hopes to launch a home‑based event planning and catering business that leverages her organizational
    skills and love of cooking. She also aspires to serve on a local advisory board for youth programs, building leadership experience while staying close to her family and community.
