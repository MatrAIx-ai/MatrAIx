personas:
  professional: Rowen Brock, a part‑time community outreach coordinator in training, leverages their knack for event coordination, budgeting, and interpersonal facilitation to design inclusive family‑focused
    programs while balancing meticulous planning with the flexibility needed for spontaneous community needs.
  sports: Rowen Brock, a regular on the co‑ed Tewksbury soccer league and a frequent hiker in Middlesex Fells, supports the Boston Red Sox, the New England Patriots, and the Boston Celtics, and they combine
    team sports with solo trail runs to stay fit and socially engaged.
  arts: Rowen Brock immerses themselves in community theater productions, both onstage and behind the scenes, while drawing artistic inspiration from the folk melodies of Fleet Foxes, the paintings at the
    Museum of Fine Arts, Boston, and weekend workshops on Shakespearean monologues, and they often blend performance practice with DIY set design.
  travel: Rowen Brock prefers weekend road trips to New England gems like Acadia National Park, the historic streets of Salem, and the quaint cafés of Burlington, VT, and they plan itineraries around local
    festivals but occasionally postpone longer getaways due to family commitments and budget constraints.
  culinary: Rowen Brock delights in crafting herb‑infused dishes such as rosemary‑roasted chicken, fresh basil pesto pasta, and classic New England clam chowder, and they balance a confident home‑cooking
    skill set with a habit of over‑seasoning and frequent late‑night snack runs for artisanal chocolate.
  core: Rowen Brock is a sociable, curiosity‑driven planner who blends meticulous organization with spontaneous creativity, and they often juggle community projects, garden experiments, and the occasional
    over‑commitment to weekend events.
background:
  cultural: Rowen grew up in a middle‑class, white New England family with deep roots in the Tewksbury area. Her upbringing reflects typical New England cultural values such as a strong emphasis on education,
    civic participation, and seasonal outdoor activities. Family traditions include Thanksgiving and holiday gatherings, community fairs, and a respect for local history. While she identifies with mainstream
    American culture, she also embraces the region’s progressive attitudes, community spirit, and pragmatic work ethic.
attributes:
  skills: '[''Community event coordination'', ''Budgeting and household finance'', ''Basic office software proficiency'', ''DIY home maintenance'', ''Cooking and meal planning'', ''Child and elder caregiving'',
