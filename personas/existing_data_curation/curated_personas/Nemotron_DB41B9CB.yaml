personas:
  professional: Juliana Delatorre, a 36-year-old graphic and UI/UX designer with a deep art-historical foundation, leverages Adobe Creative Cloud, Figma, and Sketch to craft culturally resonant brand identities,
    applying a methodical project-management mindset and assertive communication that blends curiosity with reliable delivery.
  sports: Juliana Delatorre hikes the Sandia Mountains year-round, runs 5k races with the Albuquerque Trail Runners club, and supports the New Mexico United soccer team, balancing cardio workouts with weekend
    yoga sessions.
  arts: Juliana Delatorre paints in the style of Frida Kahlo and Joan Mitchell, frequents exhibitions featuring local artist James Mercer, enjoys concerts by Lila Downs and the Albuquerque Symphony, and
    draws inspiration from the choreography of Carlos Martinez's folklorico troupe.
  travel: Juliana Delatorre plans purposeful trips that blend research and leisure, having recently returned from a two-week cultural immersion in Oaxaca, Mexico and a weekend road-trip to Santa Fe, New
    Mexico, while keeping a travel bucket list that includes Buenos Aires and Patagonia, preferring boutique guesthouses over chain hotels.
  culinary: Juliana Delatorre, an adept home chef, regularly prepares New Mexican green chile stew, hand-rolled tamales, and chile relleno, experimenting with roasted pinon, corn masa, and Ancho chile while
    hosting family gatherings that showcase evolving plating skills and occasional over-salted salsa.
  core: Juliana Delatorre is a methodical creative who blends curiosity with cultural depth, channeling organized design work into vibrant art, hearty meals, and purposeful travels, while juggling a penchant
    for late-night sketching and occasional over-commitment to volunteer events.
background:
  cultural: Juliana identifies as a Mexican‑American Latina who grew up in a bilingual household in New Mexico. Her family traditions, such as Día de los Muertos altars, posadas during Christmas, and weekly
    homemade tamales, have instilled a strong sense of cultural pride. Living in Albuquerque, she is constantly surrounded by a blend of Hispanic, Pueblo, and Southwestern influences, which she weaves into
    her design work through color palettes, patterns, and motifs that honor both her Mexican heritage and the local Indigenous aesthetics. Her cultural fluency informs her collaborative style, allowing
    her to bridge diverse perspectives in creative projects.
attributes:
  skills: '[''Graphic design'', ''UI/UX design'', ''Brand identity development'', ''Typography'', ''Layout and composition'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Figma'', ''Sketch'',
    ''Bilingual communication (Spanish/English)'', ''Art historical research'', ''Illustration'', ''Print production'', ''Project management'']'
  hobbies: '[''Visiting art galleries and museums'', ''Painting and sketching'', ''Pottery and ceramics'', ''Cooking New Mexican and Latin American cuisine'', ''Hiking and nature photography'', ''Reading
    contemporary fiction and poetry'', ''Practicing folklorico dance'', ''Traveling to explore cultural heritage sites'', ''Attending design meetups and workshops'', ''Journaling and creative writing'']'
  career_goals: Juliana aims to advance to a senior art director role within a forward‑thinking agency and eventually to launch her own boutique studio that specializes in culturally resonant design for
    Hispanic and Indigenous communities in the Southwest. She hopes to mentor emerging designers, lead interdisciplinary teams, and receive recognition for integrating traditional motifs with contemporary
    digital experiences. Long‑term, she envisions her studio becoming a hub for socially conscious design projects that celebrate her heritage while driving innovative branding solutions.
