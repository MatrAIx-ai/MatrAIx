  hobbies: '[''Hiking'', ''Wildlife photography'', ''Stargazing'', ''Watercolor painting'', ''Digital collage'', ''Visiting art galleries'', ''Attending indie‑music shows'', ''Board‑game nights'', ''Reading
    science‑fiction'', ''Cooking Alaskan seafood dishes'', ''Volunteering at community art programs'']'
  career_goals: Her short‑term goal is to deepen her expertise in data science by pursuing a master’s degree in applied mathematics or data analytics while leading a research project on climate impact modeling
    for Alaskan communities. Long‑term, she aspires to a senior data scientist or research lead position where she can shape policy‑relevant analyses, mentor emerging women in STEM, and develop data‑driven
    artistic installations that communicate scientific findings to the public. She seeks roles that offer flexibility, a collaborative culture, and opportunities to integrate her love for art and community
    outreach.
