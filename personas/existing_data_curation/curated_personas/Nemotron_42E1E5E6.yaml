  career_goals: Betty aims to progress to a senior full‑stack engineer role within the next two years and then transition into a technical lead position where she can shape product strategy at the intersection
    of technology, art, and environmental stewardship. She plans to earn an AWS Solutions Architect certification and deepen her expertise in interactive media and generative design, eventually leading
    multidisciplinary teams to create immersive digital experiences for public spaces and sustainable tech initiatives. Long‑term, Betty envisions founding a boutique consultancy that combines software
    development, creative design, and community‑focused projects, while also mentoring women and underrepresented groups in tech and cultivating personal resilience through ongoing stress‑management practices.
