personas:
  professional: Betty Soileau, a 32‑year‑old full‑stack engineer in Portland, weaves Python, TypeScript, and cloud infrastructure with a designer’s eye to lead agile squads that ship responsive React front‑ends
    and data‑rich visualizations, and they channel their curiosity and assertive collaboration into hackathon projects that fuse generative art with sustainable tech solutions.
  sports: Betty Soileau spends spring and summer trekking the Columbia River Gorge with the Gorge Hiking Group, paddling the Clackamas River as a member of the Oregon Kayak Club, cheering for the Portland
    Timbers and Trail Blazers on game days, and joining casual weekend soccer kick‑abouts at Portland’s Providence Park.
  arts: Betty Soileau expresses creativity by painting oil canvases reminiscent of Monet’s misty waters, sketching downtown Portland street scenes, generating interactive p5.js installations inspired by
    Zach Lieberman, performing improv at Portland ImprovStation, hosting board‑game nights featuring Catan, and attending festivals headlined by Sufjan Stevens.
  travel: Betty Soileau prefers meticulously planned excursions that blend adventure and artistic inspiration, from hiking the alpine vistas of Banff to kayaking New Zealand’s Fiordland, and from wandering
    Parisian museums to refine French cooking techniques, while budget constraints keep overseas trips to once‑a‑year splurges and they always return eager to showcase photo‑rich stories at Portland gatherings.
  culinary: Betty Soileau treats the kitchen as both laboratory and studio, mastering salmon en croûte with foraged Oregon mushrooms and gradually perfecting Coq au Vin after countless trial‑and‑error evenings,
    yet still delights in local oyster bars, occasional vegan ramen bowls, and thoughtfully pairs meals with a crisp Burgundy or a glass of Oregon Pinot Noir.
  core: Betty Soileau is a 32‑year‑old tech‑savvy adventurer who melds coding, canvas, and outdoor thrills into a hyper‑curious, socially vibrant lifestyle, while battling a tendency to over‑worry and a
    habit of staying up late perfecting the next generative art piece.
background:
  cultural: Betty Emma Soileau comes from a white, French‑Canadian lineage; her family name traces back to the Acadian settlement in Canada, and she grew up hearing stories of that heritage. Raised in a
    modest, middle‑class household in the Pacific Northwest, she internalized the region’s strong connection to the outdoors, environmental stewardship, and progressive community values. Her upbringing
    combined traditional family gatherings—often featuring French‑influenced cuisine and an appreciation for storytelling—with frequent exposure to Portland’s diverse arts scene, fostering an open‑minded,
    eclectic worldview. This blend of heritage and local culture informs her curiosity, collaborative spirit, and commitment to creating tech solutions that respect both people and the environment.
