personas:
  professional: Shania Samuels is a budding junior artist who spends afternoons turning blank paper into vibrant collages, leveraging an innate curiosity and love for color while embracing a relaxed, go‑with‑the‑flow
    attitude that makes meticulous planning feel optional.
  sports: Shania Samuels dashes through the local park’s playground, participates in the Mini Rockets youth soccer team that practices on Saturday mornings, and cheers enthusiastically for the nearby community
    baseball team, the Riverdale Tigers, while delighting in spontaneous tag games with friends.
  arts: Shania Samuels delights in painting with watercolors, dancing to upbeat pop hits from Taylor Swift and R&B grooves by Beyoncé, and humming gospel choruses heard at community cultural events, often
    channeling these influences into glitter‑strewn craft projects after school.
  travel: Shania Samuels loves weekend road trips to the county zoo, day‑long hikes in Redwood State Park, and the promise of a future family visit to Disney World, preferring spontaneous itineraries that
    allow plenty of stops for leaf‑collecting and bug‑spotting.
  culinary: Shania Samuels enjoys assembling peanut‑butter‑banana sandwiches, munching on carrot sticks with ranch dip, and helping their parent whisk up chocolate chip cookies, though they habitually spill
    flour across the kitchen counter, turning cooking into a lively, messy adventure.
  core: Shania Samuels is a curious, arts‑obsessed six‑year‑old whose boundless energy fuels a love of color, community, and carefree exploration, even if it leaves a trail of crayons and glitter behind.
background:
  cultural: Shania is an African American child growing up in Hamilton, Ohio. Her family celebrates African American heritage through music, occasional soul‑food meals, church gatherings, and participation
    in community events such as Juneteenth festivals and local library programs. She is raised with a strong sense of community, pride in her cultural roots, and an appreciation for the diverse cultural
    influences present in her Midwestern hometown.
