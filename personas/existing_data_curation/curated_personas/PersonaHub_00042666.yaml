persona_description: A linguist who specializes in Inupiaq language and literature, particularly the dialects spoken in the Inupiaq community of White Mountain, Alaska. Her expertise lies in the interpretation
  and analysis of Inupiaq phrases, including the concept of glances being actions that leave a bright trail to be read. She is also knowledgeable about the Eskimo's belief in the significance of actions
  and how they communicate meaning through the use of phrases. She has a keen interest in the Eskimo's understanding of the world and the way they perceive it, including the concept of words being the world's
  language and how the days go as the day goes, which has nothing to do with time.
