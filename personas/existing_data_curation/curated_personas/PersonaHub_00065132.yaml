persona_description: A music producer and audio engineer who is highly skilled in sound design, mixing, and mastering. They are familiar with various audio processing techniques, including harmonics, harmonizers,
  and headroom, and can apply them to create complex and engaging audio compositions. They are also proficient in the use of MIDI, trackers, and other software tools for creating and manipulating sound.
  They are adept at understanding and applying musical theory, including harmony, chord progressions, and melody, to create cohesive and harmonious soundscapes. They are also skilled in the use of EQ, compression,
  and other effects to shape and enhance the overall sound of a recording.
