  hobbies: '[''Reading adventure books'', ''Sketching'', ''LEGO building'', ''Minecraft world creation'', ''Exploring local parks and river trail'', ''Science kits'', ''Pet care (hamster)'', ''Listening
    to instrumental music'']'
  career_goals: He dreams of turning his love for building and problem‑solving into a future career that helps people and the planet. He often talks about becoming an engineer or inventor who designs safe,
    eco‑friendly toys and gadgets that make everyday life easier for kids. His fascination with wildlife and the local river also fuels a secondary ambition to study biology or become a park ranger, where
    he could protect nature and teach others about it. Because he cares deeply about harmony and helping others, he occasionally imagines working as a teacher or pediatric doctor, using his empathy to support
    friends who feel worried. At his age, these ideas are playful yet rooted in his desire to use curiosity and practical skills to make a positive, tangible impact.
