  career_goals: John aims to advance from industrial production manager to plant manager within the next five years, eventually stepping into a regional director of operations role. He is eager to champion
    sustainable manufacturing practices, such as zero‑waste initiatives and renewable energy integration, positioning his facility as a benchmark for environmental stewardship. Simultaneously, he plans
    to complete a bachelor's degree in industrial engineering to deepen his technical expertise. Long‑term, John envisions founding a consulting firm that helps midsize manufacturers adopt Industry 4.0
    technologies while preserving a people‑first culture.
