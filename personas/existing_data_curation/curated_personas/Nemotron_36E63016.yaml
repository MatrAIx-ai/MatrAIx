personas:
  professional: John Cosby is a 35‑year‑old production manager who leverages lean manufacturing expertise and a keen design sense to optimize shop‑floor workflows, channeling their curiosity, meticulous
    planning, and collaborative spirit into data‑driven continuous‑improvement projects while mentoring cross‑functional teams to blend efficiency with aesthetic workplace layouts.
  sports: John Cosby stays active by playing forward for the Albuquerque Adventure Soccer Club, tackling weekend rides with the Albuquerque Cycling Club on Sandia trails, hiking the Sandia Mountains each
    spring, and cheering on New Mexico United and the Colorado Rockies, while tracking personal performance metrics in a Strava log that they update religiously after each session.
  arts: John Cosby regularly visits the New Mexico Museum of Art, draws creative spark from Ansel Adams’ Black Mountain photographs and Georgia O'Keeffe’s New Mexico canvases, attends live shows by the
    indie band The Shins, and sharpens improvisational skills at The Curtain Club’s weekly improv workshops, allowing their artistic curiosity to inform both personal projects and workplace design choices.
  travel: John Cosby plans weekend road trips with a detailed spreadsheet, often cruising Route 66 to Flagstaff for red‑rock hikes before tasting Hatch‑infused dishes in Santa Fe, and dreams of a future
    journey to Kyoto to explore cherry‑blossom festivals and traditional tea ceremonies, all while balancing travel costs within a modest savings plan they monitor each month.
  culinary: John Cosby, a self‑taught home chef, fuses roasted Hatch green chilies with Thai lemongrass and cumin to create signature dishes like chile‑infused pho broth and smoky mole‑marinated pork tacos,
    delights friends at potluck gatherings with their famous Hatch‑and‑chipotle salsa, and, despite a habit of taste‑testing every spoonful that can delay dinner service, consistently explores global flavor
    pairings in the kitchen.
  core: John Cosby is a methodical production leader whose curiosity drives weekend hikes, improv jam sessions, and relentless experimentation with green‑chile‑infused recipes, even as their habit of over‑checking
    spreadsheets sometimes steals moments from the people they love.
background:
  cultural: John grew up in suburban Albuquerque, raised in a middle‑class, white Anglo‑American family with deep roots in the Southwest. His upbringing blended traditional Midwestern values with the multicultural
    tapestry of New Mexico, exposing him to Hispanic traditions, especially the region’s cuisine and festivals. This multicultural exposure nurtured his appreciation for diverse artistic expressions and
    community-oriented activities. While his family’s background emphasized hard work and reliability, the vibrant local culture encouraged curiosity and openness to new ideas, shaping John’s balanced outlook
    that fuses methodical professionalism with creative exploration.
