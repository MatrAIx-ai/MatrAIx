  hobbies: '[''Tai chi'', ''Chinese calligraphy'', ''Mahjong'', ''Gardening'', ''Reading historical novels'', ''Cooking traditional dishes'', ''Traveling'', ''Volunteering at community center'', ''Attending
    local theater performances'', ''Listening to classical Chinese music'']'
  career_goals: In retirement, Young Qin Le aims to leverage his technical background by mentoring underrepresented youth in STEM, particularly Asian‑American students, through local after‑school programs
    and university partnership initiatives. He aspires to serve on advisory boards of tech incubators in the Bellevue area, offering strategic guidance rooted in his industry experience. Additionally, he
    plans to develop interdisciplinary workshops that blend traditional Chinese art forms—such as calligraphy and music—with modern engineering concepts, fostering intergenerational and cross‑cultural dialogue.
    Volunteering as a community liaison at the senior center, he hopes to help older adults navigate digital services and maintain a sense of purpose and connection.
