  career_goals: Mitchell dreams of becoming the star of his Little League team and eventually a professional baseball player, envisioning daily practice routines that sharpen his skills. He also imagines
    winning tournaments as an esports competitor, perhaps streaming his gameplay to an audience that enjoys his lively commentary. In the longer term, he hopes to combine his love for practical work and
    community recognition by opening his own garage where he can repair bikes and cars, allowing him to showcase his hands‑on expertise while being known locally.
