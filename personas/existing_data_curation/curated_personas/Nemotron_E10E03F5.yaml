personas:
  professional: Mitchell Johnson is a budding sports analyst who spends afternoons crunching baseball statistics on a spreadsheet, turning their love of routine into detailed player cards while leading
    neighborhood baseball scorekeeping contests, showcasing a competitive edge and a natural flair for being the center of attention.
  sports: Mitchell Johnson is a baseball‑enthusiast who plays catch after school, follows the New York Yankees on TV, cycles around the neighborhood for cardio, and organizes weekly backyard games where
    they coach friends with the same competitive fire that drives their video‑game tournament play.
  arts: Mitchell Johnson is a charismatic stage‑ready performer who loves rehearsing magic tricks and dance routines for school talent shows, idolizes pop icons like Taylor Swift and BTS, and channels that
    spotlight energy into choreographing impromptu lip‑sync battles during neighborhood game nights.
  travel: Mitchell Johnson is an adventure‑curious kid who plans family road trips to nearby baseball stadiums such as Fenway Park, dreams of a future Disney World vacation, and prefers short, budget‑friendly
    stays that allow plenty of time for bike rides and card trading with new friends.
  culinary: Mitchell Johnson is a picky‑eater who favors pepperoni pizza, chicken nuggets, and builds elaborate snack platters with LEGO‑shaped fruit slices, while occasionally experimenting with homemade
    nachos topped with jalapeños after watching a cooking YouTube channel.
  core: Mitchell Johnson blends routine‑loving LEGO construction with the spotlight of talent shows, the competitiveness of baseball and gaming, and a sociable charm that makes every neighborhood gathering
    an arena for friendly rivalry.
background:
  cultural: Mitchell was raised in a white, Southern family in Kinston, North Carolina. His upbringing reflects the town’s blend of small‑town hospitality, strong community ties, and a respect for tradition.
    Family meals often feature Southern comfort foods, and holidays are marked by gatherings that include church picnics, Fourth of July fireworks, and local county fair activities. The community places
    a high value on sports, especially baseball and high‑school football, which influences his daily life. While his family encourages practical skills—like chores, bike maintenance, and cooking—there’s
    also an appreciation for local history and storytelling, which he hears from older relatives. This cultural mix nurtures his preference for routine, practicality, and his outgoing, competitive spirit.
