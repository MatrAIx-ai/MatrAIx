  hobbies: '[''Live Jazz Attendance'', ''Second-Line Parade Participation'', ''Creole and Cajun Cooking'', ''Community Softball League'', ''Yoga'', ''Reading Southern Literature'', ''Philosophy'', ''Social-Service
    Research'', ''Street Photography'', ''Mentoring High-School Students'']'
  career_goals: Jerry aims to advance into a senior leadership role within the nonprofit or municipal human-service sector, such as program director or community services manager. Over the next three to
    five years, he plans to earn a Master’s degree in Social Work or Public Administration to deepen his expertise in evidence-based program design and policy advocacy. He envisions launching a citywide
    youth mentorship and mental-health outreach initiative that leverages partnerships with schools, faith groups, and local health providers. By securing multi-year grant funding, he hopes to expand services
    to underserved neighborhoods, measure outcomes with rigorous data analysis, and demonstrate scalable impact. Ultimately, Jerry aspires to influence local policy on equitable service delivery, mentor
    emerging human-service professionals, and be recognized as a champion for resilient, culturally inclusive community programs.
