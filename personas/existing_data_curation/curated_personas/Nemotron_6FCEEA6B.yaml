personas:
  professional: Jerry Harsch is a social‑human‑service assistant whose disciplined, data‑driven case management, meticulous grant writing, and calm crisis mediation reflect their organized curiosity and
    sociable nature, enabling them to turn intricate resource networks into seamless community programs while ambitiously pursuing a master’s degree to segue into senior nonprofit leadership.
  sports: Jerry Harsch plays third base for a community softball league at City Park, attends weekly yoga classes at a local studio, and avidly supports the New Orleans Saints and Pelicans, often tailgating
    with friends and incorporating a morning jog along the Mississippi River trail into their fitness routine.
  arts: Jerry Harsch captures the vibrant street life of the French Quarter through photography while regularly attending live jazz sets by Wynton Marsalis at Preservation Hall and flamboyant second‑line
    parades led by the Rebirth Brass Band, and finds inspiration in Southern literary giants like Tennessee Williams and contemporary philosophers such as Slavoj Žižek.
  travel: Jerry Harsch prefers group‑oriented road trips to Gulf Coast towns like Lafayette and Biloxi, leverages airline miles for occasional flights to music‑rich cities such as Kansas City and Paris,
    plans itineraries around culinary workshops and live music venues, and balances the love of spontaneous weekend getaways with the practical budgeting of a full‑time nonprofit professional.
  culinary: Jerry Harsch is an enthusiastic home cook who masters Creole gumbo with andouille sausage, okra, and filé powder, perfects jambalaya using saffron rice, and often experiments with beignets dusted
    in powdered sugar, while occasionally over‑salting dishes in their fervent pursuit of authentic flavor.
  core: Jerry Harsch blends a razor‑sharp organizational instinct with a love for communal jazz celebrations, turning every case file into a rhythmic composition while quietly battling a habit of over‑booking
    their calendar with community events.
background:
  cultural: Jerry was raised in a middle-class white family in the Gulf Coast region of Louisiana, spending his early years in suburban Lafayette before moving to New Orleans for his undergraduate studies
    in humanities. Immersed in the city’s French-Creole heritage, he developed a lifelong appreciation for jazz, zydeco music, and the distinctive cuisine of the area. His family emphasized Southern hospitality,
    community involvement, and a strong work ethic, values that shaped his cooperative and service-oriented outlook. Living and working in New Orleans for over a decade has deepened his cultural competence,
    allowing him to navigate the city’s diverse neighborhoods and respect the African-American, Haitian, Latino, and indigenous influences that define the local social fabric. This blend of Southern upbringing
    and urban multicultural exposure informs his inclusive approach to human-service work.
