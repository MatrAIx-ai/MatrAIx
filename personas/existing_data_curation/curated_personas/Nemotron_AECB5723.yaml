  hobbies: '[''Visiting art galleries and museums'',''Sketching and casual painting'',''Cooking traditional Mexican cuisine'',''Backyard herb gardening'',''Attending community cultural festivals'',''Folk‑art
    workshops (e.g., papel picado)'',''Practicing yoga and meditation'',''Collecting vintage truck memorabilia'',''Photography classes'']'
  career_goals: Teresa aims to move into a supervisory role within her transportation company, eventually overseeing a small fleet of drivers and managing client accounts. She plans to obtain a commercial
    driver's license endorsement for hazardous materials to broaden her service options. In the longer term, she dreams of launching a boutique courier service that specializes in delivering artwork and
    cultural goods for local galleries, merging her love of art with her driving expertise. Reducing work‑related stress by delegating administrative tasks and incorporating stress‑management practices
    into her routine is also a priority.
