personas:
  professional: Mary Eaton is a seasoned occupational therapist with three decades of experience in rural North Carolina, who blends meticulous functional assessments with art‑based interventions, leads
    interdisciplinary teams, mentors junior clinicians, and strives to launch a community‑wide senior art‑therapy program while pursuing a Certified Occupational Therapy Specialist credential, and they
    are known for their calm, organized demeanor.
  sports: Mary Eaton is an avid fan of the Carolina Hurricanes and the UNC Tar Heels women's soccer team, regularly participates in a senior softball league at the Pender County community center as co‑captain,
    joins a weekly sunrise hike at Mason Lake Wildlife Preserve, and they enjoy birdwatching excursions that double as low‑impact cardio sessions.
  arts: Mary Eaton immerses themselves in watercolor landscapes of the Outer Banks, captures historic lighthouse photography, volunteers as set designer for the local community theater, and regularly attends
    the North Carolina Folklife Festival where they admire performances by bluegrass bands and the works of folk musician Doc Watson.
  travel: Mary Eaton prefers relaxed road‑trip itineraries along the Atlantic coast, having explored historic Savannah, Georgia, the charm of Charleston’s historic district, and the mountain vistas of Asheville,
    while dreaming of a pottery workshop in Seville, Spain, and they often travel with a modest RV to visit family reunions in nearby Piedmont towns.
  culinary: Mary Eaton delights in preparing Southern‑style shrimp and grits, collard greens sautéed with garden tomatoes, and peach cobbler baked with fresh fruit from their own garden, while also experimenting
    with Mediterranean herb‑infused grilled fish, and they never miss the annual Lowcountry seafood festival where they sample crab cakes and gumbo.
  core: Mary Eaton combines steadfast community dedication, a disciplined work ethic, and a lifelong love for art and gardening, peppered with a habit of collecting vintage brushes and an occasional sweet
    tooth for homemade peach ice cream, and they often share their creations at neighborhood potlucks.
background:
  cultural: Mary grew up in a small coastal town in North Carolina during the 1960s and 1970s, immersed in the values of Southern hospitality, community service, and respect for nature. Her family has deep
    roots in the region, with generations participating in church activities, local volunteer groups, and regional festivals. While identifying as white, Mary acknowledges the cultural diversity of her
    community, which includes African‑American, Hispanic, and Indigenous influences that shape local traditions, folk art, music, and cuisine. These experiences fostered her appreciation for varied perspectives
    and unconventional ideas, informing both her professional practice and personal interests. She maintains strong ties with extended family and lifelong friends across the state, routinely attending reunions,
    neighborhood potlucks, and seasonal celebrations that underscore her commitment to communal harmony and shared heritage.
attributes:
  skills: '["Clinical functional assessment", "Individualized treatment planning", "ADL and IADL training", "Cognitive and fine‑motor rehabilitation", "Art‑based therapeutic interventions", "Meticulous
    documentation and EMR management", "Program development and scheduling", "Team leadership and mentorship", "Group therapy facilitation", "Interdisciplinary collaboration", "Patient education and advocacy",
    "Telehealth delivery", "Evidence‑based practice implementation"]'
  hobbies: '["Watercolor painting", "Art gallery visits", "Photography", "Gardening (vegetables and flowers)", "Book club (historical fiction & memoirs)", "Volunteer work at senior centers and health fairs",
    "Community theater set design", "Hiking and birdwatching", "Cooking Southern cuisine for gatherings", "Quilting", "Pottery"]'
  career_goals: Mary aims to move into a supervisory or director role within a community health center, where she can shape services for underserved populations in Pender County. She envisions creating
    a regional program that blends occupational therapy with visual arts to enhance the well‑being of seniors. Mentorship is a priority; she plans to develop a structured training pathway for emerging occupational
    therapists and assistants in the area. Additionally, Mary is committed to advocating for policy changes that expand insurance coverage for OT services in rural settings and hopes to publish case studies
    on her innovative art‑therapy approaches. To solidify her expertise, she is considering pursuing a Certified Occupational Therapy Specialist credential.
