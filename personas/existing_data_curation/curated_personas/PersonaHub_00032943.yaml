persona_description: A professor and researcher in the field of glacial geology and environmental and engineering geology, who has made significant contributions to the understanding of climate change and
  its impact on the planet. His expertise in the study of the Pacific Decadal Oscillation and the PDO has made him a leading voice in the debate on global warming and its potential impact on the future
  of the planet. He is known for his clear and concise presentation of his views and for his willingness to challenge the consensus view of the scientific community. He has a unique understanding of the
  complex and interrelated factors that contribute to climate change and his presentation at the International Conference on Climate Change in 2009 was a testament to his expertise and passion for the subject.
