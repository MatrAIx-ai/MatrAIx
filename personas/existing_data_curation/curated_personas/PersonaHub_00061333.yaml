persona_description: A professional logistics manager who specializes in the planning, implementation, and control of the flow and storage of goods and services. This individual is responsible for arranging
  the routes to be followed to reach the products to the consumer, as well as choosing the vessel that will be used to transport the products. They are involved in the planning of the routes to be followed
  to reach the goods to the consumer, packaging, transportation vessels, and agents to transport the products. They also plan shipping to be carried between two or more modes of transport, such as water
  ways across the seas and road or rail on land in order to reach the final destination. The individual is responsible for tracking of products and the vessels used in the transportation of the products,
  as well as having a tracker on the vessel or the products to prevent loss of either the vessel or the product through hijacking or theft. They are responsible for acquisition and implementation of the
  trackers and their implantation to the vessel.
