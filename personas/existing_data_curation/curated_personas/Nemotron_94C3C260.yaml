  hobbies: '[''Gardening (Vegetables & Herbs)'', ''Model‑Train Building'', ''Birdwatching'', ''Historical Non‑Fiction Reading'', ''Acoustic Guitar Playing'', ''Book‑Club Participation'', ''Volunteering
