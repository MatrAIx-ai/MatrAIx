  career_goals: John aims to translate his lifelong skills into meaningful part‑time consultancy for small nonprofits, helping them manage finances and plan community projects. He is also motivated to complete
    his associate degree in Business Administration, finally finishing the coursework he began in college. In parallel, John hopes to launch a modest custom‑furniture venture from his home workshop, blending
    his woodworking expertise with his love for functional design. On a personal level, he seeks certification as a peer‑support specialist to better understand and manage his anxiety, and to offer informal
    emotional support to others facing similar challenges.
