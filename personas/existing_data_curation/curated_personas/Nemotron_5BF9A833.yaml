  hobbies: '[''Soccer'', ''Robotics (LEGO Mindstorms, Scratch)'', ''Reading adventure books'', ''LEGO construction'', ''Nature hikes'', ''Community garden volunteering'', ''Educational video games'']'
  career_goals: George dreams of becoming an astronaut or a scientist who invents tools that help people, inspired by space documentaries and his love for building things. He also imagines being a teacher
    one day so he can share his curiosity, or a firefighter to protect his community, reflecting his compassionate yet assertive nature.
