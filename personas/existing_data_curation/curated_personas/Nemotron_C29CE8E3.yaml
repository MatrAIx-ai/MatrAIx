  hobbies: '[''Vegetable Gardening'', ''Scale Ship Modeling'', ''Reading (Biographies & History)'', ''Chess'', ''Beach Walking'', ''Bird Watching'', ''Craft Workshops'', ''Community History Talks'', ''3D
    Printing Projects'', ''Volunteer Tutoring'']'
  career_goals: Though officially retired, Vladimir aims to remain active by volunteering as a mentor for the engineering technology program at the local community college, contributing his expertise to
    preserve historic waterfront structures in Vero Beach, and authoring a practical guide on sustainable home maintenance for seniors. He also aspires to support his grandchildren's education, stay physically
    healthy, and continue learning emerging technologies such as 3D printing and renewable energy systems.
