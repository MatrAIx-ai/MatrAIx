  skills: '[''Oil Painting'', ''Watercolor'', ''Digital Photography'', ''Community Arts Workshop Facilitation'', ''Event Coordination'', ''Gardening'', ''Creative Writing'', ''Public Speaking'']'
  hobbies: '[''Painting'', ''Collage Art'', ''Book Club Participation'', ''Historical Fiction Reading'', ''Herb Gardening'', ''Heirloom Tomato Cultivation'', ''Local Theater Attendance'', ''Community Dancing'',
    ''Cooking International Recipes'', ''Visiting Art Fairs'']'
  career_goals: Although officially retired, Brittany aims to deepen her involvement in the cultural life of North Ridgeville. She dreams of establishing a senior‑focused art collective that offers free
    workshops, traveling exhibitions, and intergenerational mentorship opportunities. She also hopes to publish a memoir that weaves together her love of art, family stories, and observations of Midwestern
    life, and to serve on the board of the local historical society to preserve regional heritage. These goals reflect her desire to stay intellectually curious, nurture community harmony, and leave a lasting
    creative legacy.
