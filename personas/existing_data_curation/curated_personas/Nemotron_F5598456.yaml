  career_goals: Debra aims to advance into senior executive leadership, such as Director of Operations or VP of Innovation, where she can drive large‑scale digital transformation and sustainability initiatives
    in manufacturing. She hopes to spearhead cross‑functional projects that integrate emerging technologies with design thinking, positioning her organization at the forefront of industry creativity. Long‑term,
    she envisions founding a consultancy that helps midsize companies adopt eco‑friendly, art‑inspired production processes, leveraging her blend of technical acumen and imaginative vision.
