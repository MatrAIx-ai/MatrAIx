personas:
  professional: Lolita Perez leverages their natural charisma and knack for connecting people as a community outreach coordinator, using event‑planning experience, Canva design skills, and budgeting know‑how
    to organize health workshops while completing a public‑health degree and a Community Health Worker certification, and they thrive on the collaborative energy of each project.
  sports: Lolita Perez enjoys dancing to R&B and hip‑hop as daily cardio, plays pickup basketball at the community center on Saturdays, cheers for the Atlanta Hawks and the Georgia Bulldogs, follows the
    Atlanta United soccer team for weekend motivation, and they view every game as a chance to bond with friends.
  arts: Lolita Perez immerses themselves in contemporary African‑American literature, often citing Toni Morrison and Ta‑Nehisi Coates, while they curate playlists featuring Beyoncé, Anderson .Paak, and
    gospel choir recordings that inspire their DIY home décor projects.
  travel: Lolita Perez loves weekend road trips to historic Southern towns like Savannah and New Orleans, dreams of exploring the jazz scene in New Orleans again, hopes to snorkel in the Caribbean islands
    of the Bahamas after saving enough for a modest vacation, and they balance travel ambitions with a tight budget.
  culinary: Lolita Perez puts a creative spin on classic Southern comfort by adding kimchi to collard greens, infusing rosemary into their buttermilk biscuits, topping shrimp and grits with a drizzle of
    hot honey, sharing these dishes on Instagram alongside step‑by‑step reels, and they relish the feedback from followers.
  core: Lolita Perez is a talkative, community‑focused 24‑year‑old with a flair for turning Southern comfort food into Instagram‑ready art, while juggling anxiety‑driven perfectionism and a dream of launching
    a DIY lifestyle brand, and they thrive on the buzz of social connection.
background:
  cultural: 'Lolita is a Black woman raised in the Atlanta metropolitan area, specifically Marietta, GA. Her upbringing reflects Southern African‑American traditions: strong ties to family, church, and
    community; a deep appreciation for soul food, gospel music, and storytelling. She participates in local Juneteenth celebrations and values the history of civil‑rights activism taught by her elders.
    These cultural roots influence her warm hospitality, collaborative spirit, and commitment to uplifting her community. While she embraces modern digital culture, she also honors the oral and culinary
    traditions passed down through generations, blending them into her everyday life.'
attributes:
  skills: '["interpersonal communication", "event planning", "social media content creation", "community outreach coordination", "basic bookkeeping", "conflict resolution", "cooking (Southern and fusion)",
    "DIY home projects", "basic digital literacy (MS Office, Google Suite, Canva)"]'
  hobbies: '["attending church and community events", "dancing to R&B, hip‑hop, and gospel music", "cooking and recipe sharing (Southern cuisine with creative twists)", "herb gardening", "DIY home décor
    and crafting", "scrapbooking", "reading African‑American literature and self‑help books", "volunteering as a mentor for youth programs"]'
  career_goals: Lolita aims to re‑enter the workforce in a role that leverages her people‑skills and community focus, such as a community outreach coordinator for a local nonprofit or a public‑health agency.
    She plans to finish her bachelor’s degree in public health or social work while completing a Community Health Worker certification, positioning herself for flexible, part‑time work that accommodates
    her marriage. In the longer term, she envisions launching a small online venture—perhaps a blog or shop featuring her recipes and DIY home décor tutorials—allowing her to blend creativity with entrepreneurship.
    She also hopes to develop mentorship programs for teens in her neighborhood, using her natural leadership and empathy.
