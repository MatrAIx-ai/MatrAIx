personas:
  professional: Jaedon Hall, an 82-year-old community arts curator, leverages a lifelong curiosity for culture and a pragmatic small-business background to orchestrate intergenerational art programs and
    heritage walks in Neptune, often juggling a flexible, sometimes disorganized schedule while they fiercely compete in senior bridge tournaments and mentor younger artists with a skeptical eye toward
    new ideas.
  sports: Jaedon Hall stays active by walking his Labrador twice daily, joining the Neptune Senior Walking Club for weekend strolls, cheering on the New York Giants on football Sundays, and occasionally
    playing pick-up tennis at the community center, though their competitive spirit shines brightest in the bridge tournaments where they regularly contend for the local title.
  arts: Jaedon Hall, a devoted watercolorist of the New Jersey shoreline, draws inspiration from Claude Monet's pastel hues and Georgia O'Keeffe's bold compositions, while their evenings are filled with
    improvisations on jazz standards by Miles Davis and Duke Ellington, and they regularly volunteer at the Montclair Art Museum's senior art classes, where they discuss the works of Frida Kahlo with fellow
    enthusiasts.
  travel: Jaedon Hall prefers purposeful travel to historic landmarks, having explored Colonial Williamsburg, Philadelphia's Independence Hall, and Boston's Freedom Trail, and they dream of a senior-discounted
    pilgrimage to the Louvre and the Uffizi, often planning trips with meticulous research but allowing spontaneous detours for local art galleries.
  culinary: Jaedon Hall enjoys translating fresh garden harvests into Mediterranean-style dishes such as ratatouille and caprese salad, favoring ripe tomatoes, zucchini, and fragrant basil, while they also
    relish the occasional New Jersey clam chowder and pepperoni pizza, a culinary balance that showcases both their modest cooking confidence and love for comforting flavors.
  core: Jaedon Hall is a curious, socially vibrant octogenarian who curates community art, overcommits to bridge tournaments, occasionally misplaces his glasses, and thrives on spontaneous creativity tempered
    by a gentle, competitive edge, all while they remain eager to share stories with anyone who will listen.
background:
  cultural: Jaedon is an African American of the Great Migration generation, raised in a close‑knit Black community in the Northeast. His upbringing was shaped by the church, gospel music, and the civil‑rights
    era, fostering a deep respect for African‑American artistic and cultural traditions. He remains engaged with local Black historical societies and celebrates his heritage through storytelling, music,
    and community involvement.
