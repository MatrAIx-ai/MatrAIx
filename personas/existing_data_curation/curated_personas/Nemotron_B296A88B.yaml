  career_goals: Jaedon aims to remain an active contributor to the Neptune community by curating intergenerational art programs, mentoring younger artists, and leading heritage walks. He plans to author
    a memoir documenting his life and experiences during the civil‑rights era, travel occasionally to major art museums, and stay engaged in senior competitions such as bridge tournaments and community
    debate clubs.
