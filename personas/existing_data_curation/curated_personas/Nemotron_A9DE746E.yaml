  hobbies: '[''building LEGO sets'', ''playing soccer'', ''exploring nature trails'', ''reading adventure and science‑fiction books'', ''tinkering with robotics kits'', ''playing Minecraft'', ''drawing
    cartoons'', ''practicing drums'', ''volunteering at community events'']'
  career_goals: Calvin aspires to turn his curiosity about how things work into a future career in engineering, ideally mechanical or aerospace engineering, where he can design and build new technologies.
    He also envisions serving his community as a firefighter or emergency‑services professional, leveraging his calm under pressure and teamwork skills. In the near term, he aims to lead his school’s robotics
    club, win science‑fair awards, and deepen his coding abilities to lay a solid foundation for his long‑term engineering ambitions.
