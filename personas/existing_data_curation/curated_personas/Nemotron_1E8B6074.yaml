  career_goals: Brian aims to advance to a senior compliance director role where he can shape an enterprise‑wide compliance strategy for a multinational corporation. He aspires to integrate AI‑driven monitoring
    tools to increase efficiency and proactively address regulatory changes. Beyond promotion, he seeks to become a recognized thought leader by speaking at industry conferences, publishing articles on
    innovative compliance practices, and mentoring the next generation of compliance professionals. He also plans to earn the CIPP/US and CISA certifications to deepen his expertise in privacy and information
    systems security.
