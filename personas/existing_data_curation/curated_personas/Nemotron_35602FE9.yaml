personas:
  professional: Alma Barreto, a seasoned IT support specialist with hands‑on expertise in hardware repair, network troubleshooting, and bilingual tech communication, they blend practical curiosity with
    a relaxed, occasionally disorganized workflow to craft clear step‑by‑step solutions while assertively mentoring junior staff and pursuing CompTIA certifications.
  sports: Alma Barreto, who counts the rhythmic steps of bachata and merengue as their primary workout, they also root for the New York Knicks, the New York Yankees, and New York City FC, regularly play
    pickleball with the Washington Heights Community Center league in summer, and rely on yoga during winter to stay flexible.
  arts: Alma Barreto, a passionate photographer and salsa enthusiast, they capture street life in Washington Heights with a Leica camera while listening to classic salsa legends like Celia Cruz and modern
    bachata stars such as Juan Luis Guerra, and unwind by devouring Agatha Christie mysteries before bed.
  travel: Alma Barreto, a flexible traveler who prefers last‑minute plans and modest budgets, they have explored the historic streets of Santo Domingo and the vibrant markets of Cartagena, dream of a cultural
    retreat in Oaxaca, and often weekend‑escape to the Catskills for a quiet recharge.
  culinary: Alma Barreto, a seasoned home cook, they expertly prepare mangú with sautéed onions, hearty sancocho brimming with yucca and plantains, and golden pastelitos filled with ricotta, always seasoning
    with sofrito and sharing the meals at neighborhood celebrations.
  core: Alma Barreto navigates life with practical curiosity, they juggle tech troubleshooting, nightly mystery novels, and spontaneous dance sessions, while battling stress‑induced worry and a penchant
    for occasional disorganization.
background:
  cultural: Alma is a first‑generation Dominican‑American who grew up in a close‑knit Dominican community in New York City’s Washington Heights. She speaks fluent Spanish and English and retains cultural
    traditions such as celebrating Carnaval, Día de los Reyes, and patron saint festivals with music, dance, and family meals. The rhythm of merengue and bachata, the flavors of Dominican cooking, and the
    strong oral storytelling tradition shape her identity. Her cultural background also informs her commitment to give back to the Dominican diaspora by providing bilingual tech assistance and mentoring
    youth from similar backgrounds.
