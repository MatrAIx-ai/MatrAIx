  career_goals: Alma aims to formalize her technical expertise by earning CompTIA A+, Network+, and Security+ certifications within the next two years. She hopes to progress to a senior IT support specialist
    role, where she can mentor junior staff and lead troubleshooting initiatives. In the longer term, she dreams of launching a boutique tech consulting firm that provides affordable IT services and bilingual
    support to small Dominican‑owned businesses in New York City. She also plans to complete a GED and take evening courses toward an associate degree in information technology, balancing her practical
    work experience with formal credentials.
