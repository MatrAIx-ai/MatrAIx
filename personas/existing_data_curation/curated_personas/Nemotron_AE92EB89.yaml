  hobbies: '[''Sketching'', ''Digital painting'', ''Photography of local scenery'', ''Playing acoustic guitar'', ''Songwriting'', ''Reading YA novels focused on mental health'', ''Participating in online
    art communities'', ''Sharing artwork on Instagram'', ''Church youth group activities'', ''Mindfulness and yoga'']'
  career_goals: In the short term, Brittany aims to expand her art portfolio, attend a summer art camp in nearby Huntsville, and grow a modest Instagram following where she shares her illustrations and
    mental‑health reflections. She also hopes to start a teen‑focused blog that combines her artwork with coping‑strategy posts to help peers manage anxiety. Long‑term, she dreams of earning a scholarship
    to an art‑focused college such as Savannah College of Art & Design or the University of North Alabama, where she can study illustration and visual storytelling. Ultimately, Brittany envisions a career
    as a professional illustrator for books and video games, and she is intrigued by the possibility of becoming an art therapist to blend her creative talents with her passion for supporting emotionally
    vulnerable youth.
