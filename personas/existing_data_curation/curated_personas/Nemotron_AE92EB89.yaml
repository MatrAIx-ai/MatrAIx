personas:
  professional: An aspiring visual artist and content creator, Brittany Douglass blends hand‑sketched character studies with digital painting on a tablet, channels intense emotions into acoustic songwriting,
    and curates an Instagram feed where they share their evolving portfolio while balancing school responsibilities with a disciplined yet flexible creative schedule.
  sports: Brittany Douglass, a weekend hiker and high‑school track enthusiast, straps on running shoes for early‑morning jogs across the rolling limestone hills, participates in the local youth soccer program
    with the Limestone Lancers, and passionately follows the Alabama Crimson Tide football team on Saturdays while also cheering for the Atlanta Braves during spring training and keeping an eye on the New
    Orleans Pelicans in the NBA season.
  arts: Brittany Douglass, a multimedia art enthusiast, fills sketchbooks with whimsical characters inspired by Studio Ghibli’s “Spirited Away,” strums acoustic renditions of Ed Sheeran’s “Photograph” while
    weaving in church gospel harmonies, writes original lyrics echoing the confessional style of Taylor Swift, and hones technique through YouTube tutorials by Proko and Draw with Jazza, regularly attending
    the local church youth choir and community art fairs that celebrate regional storytelling.
  travel: Brittany Douglass, a small‑town wanderer, has road‑tripped with family to Gulf Shores for beach sunsets and taken a school‑organized field trip to Washington, D.C., where they explored the National
    Gallery and monuments; they dream of backpacking through the Scottish Highlands and attending the Austin City Limits music festival, preferring to plan trips with parents’ guidance but also craving
    spontaneous photo‑ops in historic towns like Savannah and Charleston.
  culinary: Brittany Douglass, a budding home cook with regional flavor roots, often perfects their grandma’s fried chicken using a secret buttermilk brine, mixes a batch of fluffy biscuit dough with honey
    butter, experiments with a quick shrimp étouffée after watching a YouTube tutorial, and balances these hearty meals with teen‑favorite avocado toast topped with poached eggs and a splash of sriracha,
    showcasing a mix of classic comfort food and contemporary snack cravings.
  core: Brittany Douglass, a fifteen‑year‑old digital artist from a close‑knit community, channels intense anxiety into vivid sketches, lives on a steady supply of sketchbooks and sugary midnight snacks,
    and habitually scrolls Instagram late into the night despite early‑morning jogs.
background:
  cultural: Brittany Elizabeth Douglass grew up in a predominantly white, Southern, middle‑class family in Toney, Alabama, a small community within Limestone County. Her upbringing blends traditional Southern
    values—regular attendance at a local Baptist church, participation in community fairs, and appreciation for regional music such as country and gospel—with contemporary influences from the internet and
    social media. Family gatherings often feature classic Southern cuisine like fried chicken and barbecue, and she enjoys the storytelling tradition of the South, which complements her love for the arts.
    While rooted in her locality, Brittany also draws inspiration from broader cultural sources, allowing her to navigate both the familiar rhythms of small‑town life and the global artistic community she
    engages with online.
