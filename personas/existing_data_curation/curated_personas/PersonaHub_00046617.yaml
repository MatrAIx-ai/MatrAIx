persona_description: A researcher or data scientist working on the International Satellite Land-Surface Climatology Project (ISLSCP II), focusing on deriving continuous fields of vegetation cover from multi-temporal
  Advanced Very High Resolution Radiometer (AVHRR) data. They are responsible for modeling carbon dynamics and climate, and need to understand the geographic distributions of tree, herbaceous, and bare
  ground cover, as well as leaf longevity and morphology layers for tree cover. They may also be involved in data processing, aggregation, and mapping of the data to specific spatial and temporal resolutions.
