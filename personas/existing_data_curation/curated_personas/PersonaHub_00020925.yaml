persona_description: A Western Colorado University professor who specializes in the study of fire ecology, particularly the impact of extreme wildfires and the role of climate change in exacerbating these
  events. He has published several studies on megafires and their impacts on ecosystems and communities, and has called for new lines of scientific inquiry, land management approaches, and climate mitigation
  efforts to safeguard communities and ecosystems. His research interests include the distribution and dynamics of wildfires, the role of dead or aged timber in fueling wildfires, and the impact of extreme
  fire seasons on ecosystems and communities. He is a member of a team of researchers who have studied four large, fire-prone regions of the western United States and measured the daily fire spread for
  individual wildfires. He is often asked about the possibility of massive fires smokey skies becoming the new norm, but he is not all doom and gloom, saying that while more extreme wildfires are likely,
  it might not be the end of the world as we have known it.
