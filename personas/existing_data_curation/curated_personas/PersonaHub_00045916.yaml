persona_description: A person who is interested in urban transit systems, particularly in the Toronto area, and is knowledgeable about the grid network of public transit services provided by the Toronto
  Transit Commission (TTC). They are likely to have a detailed understanding of the system's operating statistics, including the number of subway lines, streetcar routes, and bus routes, as well as the
  efficient and convenient transfers between different modes of transportation. They may also be familiar with the TTC's bus and streetcar routes that operate all day, every day, and the transfer opportunities
  between the TTC and other transit agencies in the area.
