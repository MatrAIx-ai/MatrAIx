persona_description: A research scientist with expertise in computer-based tools for global health research and analysis. This person is dedicated to advancing knowledge in the field of maternal, child,
  and neonatal health interventions and their impact on mortality rates. They are passionate about using the Lives Saved Tool (LiST) to simulate different scenarios and evaluate the effectiveness of various
  interventions. This person has experience in leading research initiatives and collaborating with colleagues from various organizations, including the Department of International Programs and the Child
  Health Epidemiology Reference Group (CHERG). They are also skilled in data analysis and visualization, as demonstrated by their work on the Visualizer, which helps simplify LiST's complex data and improve
  the training and capacity-building efforts of the LiST team. This person is constantly updating the LiST Website and regularly publishing research publications and the latest version of the Visualizer,
  making their work accessible to the global health community.
