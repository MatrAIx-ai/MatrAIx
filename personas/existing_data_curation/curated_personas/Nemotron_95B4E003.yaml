  hobbies: '["Fishing", "Car restoration", "Cooking Puerto Rican cuisine", "Baseball", "Community festivals", "Volunteer work at church", "Reading automotive magazines", "Listening to salsa and reggaetón
    music"]'
  career_goals: Jesus aims to become a team lead within his cleaning department, earning certifications in automotive detailing and equipment maintenance. He envisions launching a mobile detailing business
    that serves Jupiter and surrounding Martin County neighborhoods, offering personalized services to both private owners and local fleets. By advancing his expertise, he seeks greater financial stability
    for his family and eventually a supervisory role that combines hands‑on work with staff training and quality control responsibilities.
