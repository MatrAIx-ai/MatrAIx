  career_goals: Martinez aims to advance to a lead custodian or facilities supervisor role where he can oversee a team and implement more efficient maintenance schedules. He plans to obtain a certification
    in building maintenance to formalize his expertise and secure a stable pension and health benefits as he approaches retirement. Additionally, he hopes to mentor younger janitorial staff, sharing his
    practical knowledge, and eventually transition to a part‑time handyman side business that would allow him to stay active while enjoying greater flexibility.
