  hobbies: '[''Visiting art galleries and museums'', ''Attending theater and live music events'', ''Collecting vintage Mexican folk art'', ''Cooking Mexican‑Texan fusion dishes'', ''Reading non‑fiction
    (psychology, history, business)'', ''Hiking in the Texas Hill Country'', ''Mindfulness meditation'', ''Playing acoustic guitar'', ''Hosting dinner gatherings'']'
  career_goals: Jose aims to advance to a senior leadership position such as Director of Development for a regional hospital or university, overseeing a multimillion-dollar fundraising portfolio. He plans
    to earn the Certified Fundraising Executive (CFRE) credential and increase his organization's donor base by 30% over the next five years. Leveraging his appreciation for art, he aspires to launch a
    dedicated arts philanthropy program and create a scholarship fund for Mexican-American students pursuing higher education. Additionally, Jose seeks to mentor emerging fundraisers, introduce data-driven
    fundraising innovations, and embed culturally resonant storytelling into donor communications.
