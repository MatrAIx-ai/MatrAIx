personas:
  professional: Emma Shepherd is an aspiring certified nursing assistant who channels their natural empathy, conflict‑resolution talent, and love for routine into volunteer shifts at the community center
    while juggling a part‑time café job, even if occasional disorganization sometimes throws off their schedule.
  sports: Emma Shepherd plays forward on the Eastside Strikers youth soccer team, cheers on the local high‑school girls’ squad, follows the US Women’s National Team in the World Cup, and is a devoted fan
    of Manchester United, often organizing weekend pick‑up games with friends.
  arts: Emma Shepherd lights up the school drama club stage as a versatile performer, curates TikTok sketches set to Ariana Grande and BTS tracks, binge‑watches sitcoms like "Friends" and "The Office,"
    and draws inspiration from pop icons Taylor Swift and Billie Eilish for their creative projects.
  travel: Emma Shepherd enjoys weekend road trips to the nearby state park for hiking, has visited the historic district of Savannah on a family vacation, and dreams of backpacking through Paris and Barcelona
    after graduating, preferring group travel that blends Instagram‑ready spots with budget‑friendly hostels.
  culinary: Emma Shepherd loves whipping up chocolate chip cookies, banana bread, and no‑bake peanut‑butter bars, often adding a dash of sea salt or espresso powder for a twist, and they proudly serve these
    treats at family gatherings and drama‑club rehearsals.
  core: Emma Shepherd blends a love for routine with a bubbly social streak, obsessively planning group events while occasionally misplacing school assignments, and fights anxiety with playlists and cookies.
background:
  cultural: Emma was raised in a middle‑class, predominantly white working‑class neighborhood in Bayonne, New Jersey. Her family observes typical northeastern American traditions such as Thanksgiving, Christmas,
    and Fourth of July celebrations, often gathering at the Hudson River waterfront during summer. Community involvement through local churches and the town’s recreation department has reinforced values
    of practicality, responsibility, and cooperation. Growing up near the New York metropolitan area, she has been exposed to a wide range of pop culture influences and a multicultural environment, while
    her household maintains a focus on routine, kindness, and supporting others.
