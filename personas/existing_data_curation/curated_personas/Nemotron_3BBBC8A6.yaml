  career_goals: Emma hopes to earn her GED within the next two years and then pursue a Certified Nursing Assistant (CNA) program, aiming for a stable, routine‑oriented role in the healthcare support staff
    at a nearby hospital. In the meantime, she plans to take a part‑time job at a local café to develop her customer‑service skills and earn extra income. Long‑term, she envisions a career that combines
    her love of helping others with a predictable work environment, possibly advancing into medical administrative work or a supervisory position in a community health setting.
