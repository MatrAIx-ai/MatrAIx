    in local history society meetings'']'
  career_goals: Although officially retired, Kendall aims to remain an active contributor to her community's educational landscape. She aspires to volunteer as a mentor for aspiring teachers, serve on the
    board of a local nonprofit focused on after-school enrichment, and develop a guidebook on integrating traditional teaching practices with modern digital tools. She also hopes to document oral histories
    of longtime Beltsville residents, fostering intergenerational connections and preserving local heritage.
