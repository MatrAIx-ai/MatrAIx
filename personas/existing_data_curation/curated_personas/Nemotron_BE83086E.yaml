  hobbies: '[''gardening'', ''cooking traditional Mexican dishes'', ''quilting and knitting'', ''volunteering at senior center'', ''participating in church choir'', ''walking/hiking in Hill Country'', ''birdwatching'',
    ''reading historical fiction'', ''learning new technology (tablet, digital photography)'', ''community cultural festivals'']'
  career_goals: Though approaching retirement, Cristina aims to leave a lasting legacy by formalizing a mentorship program for new office staff and creating a community partnership model that links local
    schools with small businesses for student internships. She hopes to transition into a part‑time consulting role for non‑profits, offering her expertise in administrative efficiency and cultural competency.
    Additionally, she aspires to volunteer as a cultural liaison for the city’s Hispanic heritage festivals, ensuring that traditions are preserved while encouraging intergenerational participation.
