personas:
  professional: Janice Goodwin, a retired community organizer and aspiring museum docent, channels their methodical planning, critical eye for folk art, and sociable energy into coordinating charity events,
    leading quilting workshops, and mentoring younger volunteers while mastering digital photography to document local history, and they relish the chance to share stories with museum visitors.
  sports: Janice Goodwin, a member of the local senior walking club and an avid follower of the Kansas City Royals baseball team and the Kansas City Chiefs football team, enjoys daily walks in the park
    for low-impact fitness and occasionally plays bridge tournaments that double as mental exercise, and they take pride in keeping a steady stride despite mild osteoarthritis.
  arts: Janice Goodwin, a watercolor hobbyist who frequents the Kansas City Repertory Theatre and the annual Midwest Folk Art Festival, finds inspiration in the works of Mary Cassatt, they listen to Thelonious
    Monk's jazz recordings while painting, and offers sharp, appreciative critiques of regional folk art exhibitions.
  travel: Janice Goodwin, who prefers well-planned group trips and leisurely sightseeing, has visited the historic Ellis Island immigration museum, the tranquil gardens of the Sunken Gardens in Kansas City,
    and dreams of a relaxed cruise along the Mississippi River, while their limited mobility leads them to favor short drives and accessible hotels, and they often bring a sketchpad to capture scenes on
    the journey.
  culinary: Janice Goodwin, an adept home cook who grows heirloom tomatoes and sweet corn in their garden, loves preparing classic Kansas pot roast with carrots and potatoes, they bake apple pie with a
    buttery crust, and enjoy experimenting with fresh herb-infused vinaigrettes for salads.
  core: Janice Goodwin, an 88-year-old quilting, jazz-loving, garden-tending historian, blends critical skepticism with boundless curiosity, they turn every community gathering into a meticulously planned
    yet lively celebration.
background:
  cultural: Janice was raised in a mid‑Midwestern white family in Kansas, with a Protestant (Methodist) upbringing that emphasized community service, modesty, and self‑reliance. The agricultural and small‑town
    environment of Goddard and the broader Sedgwick County fostered a strong sense of neighborliness, hospitality, and appreciation for local traditions. While rooted in these values, her curiosity and
    openness to art and new ideas reflect a broader American cultural tapestry that values lifelong learning, civic engagement, and personal expression.
attributes:
  skills: '[''Event planning and coordination'', ''Volunteer management'', ''Budgeting and financial oversight'', ''Basic computer and internet navigation'', ''Genealogy research'', ''Art appreciation and
    critique'', ''Gardening and horticulture'', ''Cooking and recipe development'', ''Sewing and quilting'', ''Community history documentation'']'
  hobbies: '[''Quilting'', ''Gardening'', ''Reading historical fiction'', ''Community theater attendance'', ''Watercolor painting'', ''Listening to jazz music'', ''Walking in local parks'', ''Bridge and
    card games'', ''Genealogy research'', ''Volunteer work at the historical society'']'
  career_goals: Although retired, Janice aims to remain intellectually vibrant and socially engaged. She hopes to become a volunteer docent at the Sedgwick County Historical Museum, sharing her knowledge
    of local history and art with visitors. She also plans to compile and publish a family memoir that weaves her personal stories with the broader narrative of Kansas life. Additionally, she wants to lead
    a community quilting workshop, mentor younger volunteers, and continue learning digital photography to document community events.
