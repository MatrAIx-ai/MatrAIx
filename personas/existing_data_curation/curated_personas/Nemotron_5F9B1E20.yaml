  hobbies: '[''Gardening (balcony vegetable garden)'', ''Cooking Korean cuisine'', ''Solving Sudoku and logic puzzles'', ''Attending Korean cultural festivals'', ''Practicing tai chi'', ''Mindfulness meditation'',
