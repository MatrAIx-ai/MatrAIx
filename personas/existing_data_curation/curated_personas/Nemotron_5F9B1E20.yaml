  career_goals: Lan aims to move into a supervisory position such as Surveillance Team Lead or Safety Coordinator, where she can mentor newer officers and shape training programs that balance procedural
    rigor with compassionate patron care. She plans to obtain a California State Security Officer certification and complete a crisis‑intervention workshop to strengthen her ability to support colleagues
    facing job‑related stress. Over the longer term, she envisions transitioning to a part‑time consultancy focused on improving security protocols and fostering inclusive, culturally sensitive workplace
    practices, while securing a stable retirement.
