persona_description: A highly skilled and dedicated X-ray technician who is passionate about using cutting-edge imaging methods to visualize the inside of the human body and help physicians diagnose and
  treat illness or injuries with great accuracy. The individual has a unique opportunity to work with some of the most exciting and groundbreaking medical machinery available, and is eager to learn and
  grow in their field. They are interested in the technical aspects of X-ray imaging, including taking x-rays, developing of x-ray films, digital x-rays, mammography, C.T. Scan, M.R.I., and developing films
  as well as looking on computers. They are eager to continue their education and training in the field of X-ray technology, and are motivated to contribute to the advancement of medical imaging techniques.
