  career_goals: He aims to become a senior engineering manager or director of engineering within the next five years, leading large-scale renewable energy projects in the Midwest. He plans to obtain a master's
    degree in engineering management and earn additional certifications such as PMP and Six Sigma Black Belt. He also aspires to mentor the next generation of engineers, particularly from underrepresented
    backgrounds, by establishing a local STEM mentorship program. Long-term, he envisions founding a consultancy focused on sustainable power solutions for small businesses and community organizations.
