personas:
  professional: Kimberly Fleischman, a 78‑year‑old veteran carpenter and construction manager with decades of hands‑on framing, drywall, and heavy‑equipment expertise, channels her meticulous organization,
    critical eye, and love of aesthetics into mentoring apprentices and championing green retrofits for historic Meade County homes.
  sports: Kimberly Fleischman enjoys low‑impact morning walks through their garden, participates in a senior bowling league at the Louisville Community Center, and roots for the Louisville Cardinals and
    Kentucky Wildcats during the college basketball season, treating these gentle activities as both social engagement and a counterbalance to their anxieties.
  arts: Kimberly Fleischman, who paints watercolors of rolling Kentucky hills and collects prints by contemporary artist Howardena Pindell, regularly attends Louisville gallery openings featuring works
    by local painter Sarah Whitaker, and channels their competitive spirit into winning the senior center’s annual “Best Stitch” quilting award.
  travel: Kimberly Fleischman prefers carefully planned, leisurely trips that combine heritage sites and nature, having recently visited the historic district of Savannah, Georgia, and the Great Smoky Mountains
    for birdwatching, while dreaming of a future river cruise along the Danube to explore European castles.
  culinary: Kimberly Fleischman enjoys cooking simple farm‑to‑table meals, favoring fresh heirloom tomatoes, basil, and locally sourced bourbon‑glazed chicken, while their modest cooking skill leads them
    to perfect a signature herb‑infused tomato soup and an occasional over‑spiced jambalaya that sparks amused complaints from their visiting grandchildren.
  core: Kimberly Fleischman blends a lifelong builder’s precision with an artistic curiosity, tackling each day with a competitive edge, an anxiety‑driven need for routine, and a sly habit of hiding extra
    paint tubes in the garden shed for late‑night inspiration.
background:
  cultural: Kimberly was born and raised in Meade County, Kentucky, in a family that has lived in the area for several generations. Her upbringing reflects the rural Southern work ethic of self‑reliance
    and community interdependence typical of the Kentucky foothills, while her brief college experience broadened her perspective beyond the region. She grew up attending a local Baptist church, which instilled
    a sense of modesty and service, yet her natural curiosity led her to explore artistic and unconventional ideas beyond traditional expectations. The cultural fabric of small‑town Kentucky—its folk music,
    quilting traditions, and appreciation for practical craftsmanship—has shaped her values, while her lifelong exposure to construction work gives her a pragmatic view of the built environment that she
    now marries with an artistic sensibility.
