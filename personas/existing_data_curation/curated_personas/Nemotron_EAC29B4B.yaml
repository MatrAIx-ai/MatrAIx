personas:
  professional: Joan Hardin is a detail-oriented vehicle cleaning specialist who leverages her keen aesthetic sense and eco‑friendly expertise to deliver polished results, while they serve as a natural
    liaison between customers and the shop, and they aspire to lead a team and launch a mobile detailing venture featuring artistic customizations.
  sports: Joan Hardin fuels their energetic routine with Zumba classes at the local community center, cheering on the Cleveland Browns on game day, and they join a seasonal hiking club that explores Hocking
    Hills in spring, while also participating in a weekend volunteer clean‑up crew that doubles as cardio, and they occasionally catch a Cavaliers game with friends at the arena.
  arts: Joan Hardin immerses themselves in the visual arts scene, regularly attending exhibitions at the Akron Art Museum and scouting street murals inspired by Banksy and Shepard Fairey, while they support
    community theater productions like a local rendition of Our Town and enjoy listening to indie acts such as The National and Phoebe Bridgers during sketching sessions.
  travel: Joan Hardin prefers affordable, adventure‑focused trips, having road‑tripped to Hocking Hills and a weekend getaway in Portland to explore its thriving eco‑art scene, and they cherish a musical
    weekend in New Orleans, while they dream of a solo yoga retreat in Bali and a cultural immersion in Lisbon's vibrant mural districts, often planning itineraries on a spreadsheet and booking via Airbnb.
  culinary: Joan Hardin enjoys crafting farm‑to‑table meals with an intermediate skill set, frequently swapping zucchini noodles topped with pesto, roasted beet quinoa bowls with chickpeas, and seasonal
    carrot‑ginger soups made from produce snagged at the local farmers market, and they relish experimenting with fresh basil, thyme, and smoked paprika to add bold flavor.
  core: Joan Hardin blends a meticulous eye for automotive polish with a fervent love of street art, channeling anxiety into yoga and spontaneous sketching, yet they often over‑organize their schedule and
    forget to take a break.
background:
  cultural: Joan was raised in Akron, Ohio, in a middle‑class, predominantly white Midwestern community with roots tracing back to German and Irish ancestry. The region’s industrial heritage and strong
    emphasis on hard work shaped her practical approach to employment, while the local art scene and community fairs nurtured her curiosity and appreciation for creativity. She grew up attending public
    school events, local church gatherings, and seasonal festivals, which fostered a sense of community, resilience, and respect for diverse perspectives within her hometown.
attributes:
  skills: '["Vehicle interior detailing", "Exterior washing and polishing", "Eco-friendly cleaning chemicals usage", "Safety and compliance protocols", "Time management", "Customer service and communication",
    "Inventory tracking", "Basic mechanical troubleshooting", "Aesthetic evaluation for presentation"]'
  hobbies: '["Visiting art galleries and street murals", "Sketching and drawing classes", "Community theater attendance", "Group fitness classes (Zumba, aerobics)", "Volunteer environmental clean-up events",
    "Cooking and trying new recipes", "Yoga and mindfulness practice", "Attending local music festivals"]'
  career_goals: She aims to become a team lead or supervisor in a professional detailing shop within the next three years, seeking certification in advanced automotive detailing and eco‑sustainable cleaning
    practices. Ultimately, she hopes to open her own mobile detailing business that emphasizes environmentally responsible methods and offers artistic customizations such as vinyl wraps or interior decor
    packages. She also wants to further her education by obtaining an associate degree in facilities management to broaden her career options.
