    Cyrillic calligraphy'', ''Participating in gentle yoga classes'']'
  career_goals: Although she is 77, Kifayat aims to keep her coffee lounge vibrant and culturally resonant. She plans to mentor a younger colleague to eventually take over the host role, ensuring the shop
    retains its warm, community‑focused atmosphere. She hopes to launch a quarterly “Tea & Tales” evening that features Central Asian pastries, storytelling, and live music, turning the space into a cultural
    hub. Kifayat also wants to document her family’s recipes in a community cookbook and obtain a small‑business license to open a modest tea house that blends Central Asian hospitality with California’s
    coffee culture. Finally, she aspires to be recognized by the Orange County Hospitality Association for outstanding service and community engagement.
