personas:
  professional: Milagros Cepedahernandez, a budding marine explorer, merges curiosity with practicality by sketching tide‑pool critters, building LEGO habitats, and coding simple ocean‑themed games, showcasing
    early scientific thinking and collaborative teamwork; they often share their discoveries with classmates.
  sports: Milagros Cepedahernandez, a spirited member of the Port Hueneme Strikers youth soccer league, drills dribbling after school, cheers for the LA Galaxy during weekend matches, and swaps soccer cleats
    for a beach volleyball at the pier during summer afternoons; they love the feeling of sand between their toes after a game.
  arts: Milagros Cepedahernandez, an enthusiastic illustrator, fills sketchbooks with detailed tide‑pool creatures inspired by field guides and the bold colors of Frida Kahlo’s paintings, while dancing
    to the lively cumbia rhythms of Los Ángeles Azules and singing along to the soundtrack of Disney’s Coco; they often trade art tips with friends during playdates.
  travel: Milagros Cepedahernandez, an eager explorer, plans weekend excursions to the tide pools of Monterey Bay and day trips to Santa Barbara’s historic beachfront, dreams of a family vacation to the
    colorful streets of Oaxaca, and balances their adventurous itinerary with a modest allowance saved from chores; they keep a scrapbook of beach shells as a travel diary.
  culinary: Milagros Cepedahernandez, a budding chef, loves whisking fresh cilantro, lime juice, and diced tomatillos into a bright salsa verde for taco nights, shaping masa into tiny tamales while sprinkling
    queso fresco, and proudly perfects avocado guacamole with ripe Hass avocados and a pinch of sea salt; they often let siblings be the official taste‑testers.
  core: Milagros Cepedahernandez, a curious and organized beach‑lover, balances LEGO builds, soccer games, and salsa cooking while habitually misplacing their favorite shells in the sand and remembering
    to check their piggy bank every night; they are known for humming cumbia tunes while drawing.
background:
  cultural: Milagros grows up in a Mexican‑American household in Port Hueneme, where Spanish is spoken at home and English at school, giving her a bicultural perspective. Her family celebrates Mexican traditions
    such as Día de los Muertos, Cinco de Mayo, and family gatherings centered around homemade tacos, tamales, and salsa. These cultural practices instill values of family solidarity, community respect,
    and a love for sharing food and stories. Living near the California coast, she also embraces the local beach culture, blending her Mexican heritage with the diverse, outdoor‑oriented lifestyle of Ventura
    County.
