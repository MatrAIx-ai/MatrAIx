  hobbies: '[''Collecting shells and studying tide pools'', ''Sketching marine animals'', ''Reading adventure and animal books (bilingual)'', ''Playing soccer with friends'', ''Dancing folkloric Mexican
    dances'', ''Building LEGO sets'', ''Coding simple games in Scratch'', ''Helping in the family kitchen'', ''Exploring local parks and nature trails'']'
  career_goals: Milagros dreams of becoming a marine biologist or a marine conservationist, inspired by the tide pools and ocean life she explores at Port Hueneme. She wants to use her bilingual abilities
    to teach her community about protecting coastal ecosystems and to eventually work on projects that safeguard sea turtles and other marine species. Milagros also imagines helping animals as a veterinarian,
    combining her love for animals with her practical, caring nature.
