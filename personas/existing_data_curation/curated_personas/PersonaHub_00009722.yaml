persona_description: An investor or collector interested in rare and historically significant bank notes. This persona is specifically drawn to the National Bank of Lancaster and the series of 1875 and
  1882 bank notes, as well as the 1902 red seal bank notes. They appreciate the historical and cultural significance of these notes and are drawn to the rare and unique characteristics of each series. They
  may also be interested in the technical aspects of bank note printing, such as the design, printing process, and the rarity of the notes.
