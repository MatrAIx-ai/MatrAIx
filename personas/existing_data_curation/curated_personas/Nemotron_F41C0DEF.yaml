  career_goals: Although retired, Aditi aims to remain active by mentoring younger members of her community, sharing her family’s recipes, and leading workshops on senior health and financial planning.
    She aspires to publish a modest cookbook featuring cherished family dishes, document her family’s oral histories for future generations, and travel to India and Pakistan to reconnect with relatives
    and explore cultural heritage sites.
