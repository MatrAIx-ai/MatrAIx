  career_goals: Elijah dreams of a future where he can help others every day. He often talks about becoming a doctor because he wants to heal sick people, especially those in his community. He also imagines
    being a teacher to share his love of learning and to support kids who need extra help. Occasionally, he expresses interest in being an engineer or architect, inspired by his LEGO building, hoping to
    design safe playgrounds or community spaces. His ambition is guided by his desire to make a positive, compassionate impact.
