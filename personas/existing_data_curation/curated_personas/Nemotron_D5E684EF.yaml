  career_goals: Tammy aims to leverage her managerial experience into a regional supervisory role or to transition into managing a community art space or boutique that blends retail with cultural programming.
    She plans to earn a certification in nonprofit management and to mentor younger managers within her current company. Over the next five years, she hopes to launch a small business—perhaps a gallery‑café—where
    she can bring together her passion for art, food, and community engagement, while maintaining the flexibility she values.
