  hobbies: '[''Watercolor Painting'', ''Abstract Art'', ''Gallery and Museum Visits'', ''Jazz & R&B Listening'', ''Zumba Classes'', ''Philosophy & Literature Book Club'', ''Data‑Driven Art Projects'', ''Financial
    Literacy Volunteering'', ''Traveling'', ''Cooking Soul Food'']'
  career_goals: Sarah aims to advance to a senior audit manager or partner role, specializing in forensic accounting to uncover financial fraud while establishing a boutique consulting practice focused
    on sustainability and ESG reporting for nonprofit and cultural institutions. Over the next five years she plans to earn the Certified Fraud Examiner (CFE) credential, deepen her expertise in ESG standards,
    and expand her mentorship of emerging Black accountants through local CPA chapter initiatives and community outreach programs.
