personas:
  professional: Sarah Sweeting merges her rigorous audit expertise and inventive data‑visualization flair, leading forensic accounting engagements with a methodical, skeptical eye while channeling her imaginative
    side to design ESG reporting frameworks for cultural nonprofits, and they leverage their competitive drive to mentor junior accountants and vie for partner promotion.
  sports: Sarah Sweeting enjoys Zumba classes at a downtown community center, follows the Boston Celtics and Boston Red Sox passionately, joins a local kayaking club on Lake Winnipesaukee in summer, and
    they hit the cross‑country ski trails in winter, though competitive stress sometimes causes them to miss a session.
  arts: Sarah Sweeting spends weekends at the Museum of Fine Arts admiring Kandinsky and Rothko, collects vintage jazz records from Miles Davis and John Coltrane, attends Boston Shakespeare Company productions,
    and they channel that inspiration into abstract watercolor landscapes after each gallery opening.
  travel: Sarah Sweeting has trekked the cliffs of Iceland, savored street food in Marrakech, explored the temples of Kyoto, and revisits Cape Cod each autumn, while they plan a future road trip along the
    Pacific Coast Highway, balancing travel desires with their demanding audit schedule.
  culinary: Sarah Sweeting delights in cooking soulful dishes like collard greens, black‑eyed peas, and gumbo alongside New England clam chowder, mastering the balance of smoky paprika, thyme, and fresh
    lemon zest, and they consider themselves an intermediate home chef who frequently experiments with seasonal farm‑to‑table ingredients.
  core: Sarah Sweeting blends forensic precision with artistic whimsy, obsessively double‑checks every spreadsheet while sketching watercolor swirls on meeting notes, and their competitive edge fuels both
    career ambition and a habit of nightly jazz listening, even if it means late‑night insomnia.
background:
  cultural: Sarah’s cultural background is rooted in African‑American heritage, with family origins in the Southern United States that migrated to New England during the Great Migration. Growing up in New
    Haven County, she was actively involved in the local Black church, where gospel music, communal storytelling, and civic engagement shaped her values. She celebrates traditions such as soul‑food cooking,
    Juneteenth, and Kwanzaa, and participates in the Connecticut NAACP and Black Women in Business networks. Her experiences navigating professional and community spaces as a Black woman inform her resilient
    outlook and commitment to mentorship and advocacy within the African‑American community.
