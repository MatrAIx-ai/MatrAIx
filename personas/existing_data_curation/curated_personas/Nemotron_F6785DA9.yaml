personas:
  professional: Rup Swanson, a 28‑year‑old deputy sheriff in Tuscaloosa County, leverages his obsessive attention to detail and structured investigative toolkit to process crime scenes with forensic precision,
    while they employ a skeptical interrogation style and data‑driven reporting to turn raw evidence into airtight case briefs.
  sports: Rup Swanson, an avid target‑shooter and weekend runner, belongs to the Tuscaloosa Shooting Club and logs regular jogs with the local running group, while they root for the Alabama Crimson Tide
    football team and follow the Birmingham Barons baseball club.
  arts: Rup Swanson, a true‑crime aficionado, devours podcasts like "Serial" and "My Favorite Murder" and reads investigative books by Michelle McNamara, while they occasionally attend the Tuscaloosa Community
    Theatre's noir productions and admire the work of documentary filmmaker Errol Morris.
  travel: Rup Swanson, a methodical traveler, prefers detailed itineraries that mix work‑related tours of forensic labs in Washington D.C. with weekend getaways to historic New Orleans for its jazz heritage,
    and they keep a notebook of crime‑scene‑inspired sites they hope to visit, such as the 1885 Jack the Ripper Museum in London.
  culinary: Rup Swanson, a pragmatic cook, favors high‑protein meals like grilled blackened catfish with collard greens and quinoa, meticulously measures portions for optimal fitness, yet they indulge in
    a nightly slice of pecan pie as a calculated cheat.
  core: Rup Swanson, a 28‑year‑old deputy, blends forensic rigor with a competitive edge, obsessively logs every metric—from crime evidence to personal expenses—while battling chronic stress and a penchant
    for late‑night caffeine.
background:
  cultural: Rup grew up in a middle‑class white family in Tuscaloosa, Alabama, immersed in Southern hospitality and a strong sense of community responsibility. Raised in a Protestant (Baptist) milieu, he
    internalized values of personal accountability, respect for authority, and self‑reliance. The University of Alabama’s vibrant campus culture and the local passion for Crimson Tide football shaped his
    appreciation for regional traditions and competitive spirit. His high‑school education provided a pragmatic, every‑day outlook, while the surrounding rural and urban blend exposed him to a spectrum
    of socioeconomic issues that fuel his drive to maintain law and order in the South.
