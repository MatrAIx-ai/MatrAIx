  hobbies: '[''target shooting'', ''performance tracking'', ''jigsaw puzzles'', ''competitive chess'', ''true‑crime podcasts'', ''true‑crime books'', ''jogging'', ''outdoor runs'', ''youth mentorship'',
    ''investigative thinking workshops'']'
  career_goals: Rup aims to advance to senior detective within the Tuscaloosa County Sheriff's Office, leading a specialized homicide and violent‑crime unit. He plans to attend the FBI National Academy
    and earn a certification in criminal profiling to transition into a forensic psychologist liaison role. Long‑term, he envisions establishing a statewide cold‑case task force that leverages data analytics
    and inter‑agency collaboration, positioning himself as a thought leader in investigative best practices across Alabama.
