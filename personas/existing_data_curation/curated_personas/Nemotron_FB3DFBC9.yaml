  career_goals: Luciano aims to move from front‑line support to a supervisory role within the next two years, targeting a Team Lead or Training Specialist position where he can coach new agents and design
    customer‑experience initiatives. He plans to earn a Certified Customer Service Professional (CCSP) credential and enroll in part‑time courses toward an Associate’s degree in Business Administration.
    Long‑term, he hopes to combine his passion for art and community by leading outreach programs for local cultural institutions, possibly managing a community‑center art space that serves both the Honduran
    diaspora and the broader Georgetown community. His competitive nature drives him to become a top performer, earn employee‑of‑the‑month recognitions, and eventually influence company policy on service
    quality.
