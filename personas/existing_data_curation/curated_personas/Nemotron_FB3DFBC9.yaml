  hobbies: '[''Visiting Art Galleries'', ''Sketching'', ''Listening to Eclectic Music'', ''Cooking Honduran Cuisine'', ''Hiking'', ''Fishing'', ''Reading Graphic Novels'', ''Reading Philosophy'', ''Board‑Game
