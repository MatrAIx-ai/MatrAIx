  career_goals: Kate aims to transition from a senior financial manager to a chief financial officer role within a mid‑size technology or sustainable‑energy firm, where she can shape long‑term financial
    strategy and champion responsible investment practices. She also envisions creating an internal arts‑and‑culture grant program that supports employee creativity and community outreach. On a personal
    level, she seeks to refine her organizational habits to balance flexibility with efficiency, while maintaining the calm, resilient mindset that defines her leadership style.
