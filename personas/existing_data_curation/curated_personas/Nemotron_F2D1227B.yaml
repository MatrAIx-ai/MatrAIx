    at community art programs'', ''listening to jazz/neo‑soul/hip‑hop music'']'
  career_goals: Alisha aspires to pursue a career in visual storytelling, aiming to become a multidisciplinary artist who blends traditional drawing with digital media. She plans to attend a high school
    with a strong arts program, followed by a college degree in Graphic Design or Fine Arts. In the long term, she hopes to work as a creative director for a social‑impact organization, using her art to
    amplify underrepresented voices. She also dreams of curating community art exhibitions and eventually launching an online platform where young Black creators can share their work and connect. While
    she values formal education, she remains open to apprenticeships and mentorships that allow her to experiment with emerging technologies like AR and VR art installations.
