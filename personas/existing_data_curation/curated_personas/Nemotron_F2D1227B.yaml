personas:
  professional: Alisha Fernando is an aspiring digital illustrator and junior animator who blends traditional sketching with Scratch programming, using their curiosity and disciplined work ethic to build
    a portfolio that could launch a future career in visual storytelling.
  sports: Alisha Fernando enjoys casual weekend runs in Rock Creek Park, follows the Washington Capitals and Washington Wizards on TV, and participates in the school’s after‑school yoga club, preferring
    low‑key, community‑oriented fitness activities over competitive sports.
  arts: Alisha Fernando draws inspiration from artists like Frida Kahlo, Yayoi Kusama, and Studio Ghibli, frequently visits the Smithsonian American Art Museum and the Hirshhorn, and immerses themselves
    in jazz legends such as Miles Davis, neo‑soul vocalist SZA, and hip‑hop lyricist Kendrick Lamar while creating graphic‑novel‑style sketches and crocheting amigurumi.
  travel: Alisha Fernando loves weekend road trips to the Shenandoah Valley for hiking and photography, dreams of a spring visit to the Louvre in Paris, and meticulously plans each outing with a travel
    sketchbook, balancing family constraints with a desire for cultural immersion.
  culinary: Alisha Fernando favors quick, vibrant meals like avocado toast with chili flakes, enjoys making homemade sushi rolls with fresh cucumber and smoked salmon, and delights in sipping matcha lattes
    at local cafés while experimenting with seasoning blends for occasional family‑cooked quinoa bowls.
  core: Alisha Fernando is a curious, shy yet assertive teen who channels artistic energy into digital and hand‑drawn creations, budgets art supplies while occasionally splurging, and balances disciplined
    routines with spontaneous bursts of creativity.
background:
  cultural: Alisha identifies as Black and was raised in Woodbridge, Virginia, a suburb with a growing African‑American population and a mix of cultures from the greater Washington, D.C. region. Her family
    maintains traditions rooted in Southern African‑American culture, such as weekend church gatherings, soul‑food cooking, and storytelling nights that celebrate family history. At the same time, she is
    exposed to the diverse cultural landscape of Prince William County, including Juneteenth celebrations, local African diaspora festivals, and community art initiatives that highlight Black artists. These
    experiences nurture her appreciation for cultural heritage and inform her artistic voice, prompting her to incorporate themes of identity, community resilience, and personal empowerment into her work.
