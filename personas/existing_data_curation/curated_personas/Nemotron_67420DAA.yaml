personas:
  professional: Donald Nottingham is a veteran master plumber and pipefitter who leverages four decades of high‑pressure steam expertise, meticulous project scheduling, and lean workflow optimization to
    create custom decorative plumbing installations that blend functional engineering with abstract art, and they channel their disciplined, competitive nature into every blueprint.
  sports: Donald Nottingham follows the Cleveland Browns, the Cleveland Guardians, and the Cleveland Cavaliers, and they stay active by playing weekly matches with the Cleveland Senior Pickleball Club and
    participating in the Ohio Steam Engine Modelers Association’s charity run.
  arts: Donald Nottingham spends evenings painting abstract canvases inspired by Jackson Pollock, photographing rusted factories in the style of Edward Burtynsky, and attending live shows by The Black Keys
    at Beachland Ballroom, while they also curate a collection of Andy Warhol prints and design decorative pipe sculptures reminiscent of Antoni Gaudí.
  travel: Donald Nottingham prefers meticulously planned road trips, having driven the historic Route 66 to the Henry Ford Museum in Dearborn, explored the National Railway Museum in York, and toured the
    Ruhr industrial sites of Germany, while they dream of visiting the steam heritage of the Cotswold Steam Museum in England and the traditional crafts district of Kanazawa, Japan, all on a modest budget
    using their aging RV.
  culinary: Donald Nottingham enjoys cooking hearty Ohio-style beef and barley stew seasoned with thyme, sage, and bay leaf, paired with cornbread made from stone‑ground cornmeal, and occasionally treats
    themselves to smoked pork ribs rubbed with paprika, brown sugar, and cumin, and they relish the process of hand‑crafting cutting boards for the kitchen.
  core: Donald Nottingham blends a disciplined, competitive work ethic with a boundless artistic imagination, juggling high‑pressure plumbing projects, anxiety‑fighting meditation, and a penchant for vintage
    steam models, and they never miss a trivia night.
background:
  cultural: Donald grew up in Lima, Ohio, within a working‑class Midwestern community rooted in the manufacturing heritage of the Mahoning Valley. His family’s background reflects a Protestant work ethic,
    self‑reliance, and a deep respect for craftsmanship. He identifies strongly with local union culture, valuing practical skill, solidarity among tradespeople, and a straightforward, no‑nonsense communication
    style. While embracing the region’s modest, community‑focused values, he also draws inspiration from the folk art traditions and industrial history that characterize Ohio’s cultural landscape, blending
    them into his own unique creative expressions.
