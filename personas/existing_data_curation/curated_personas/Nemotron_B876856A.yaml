    festivals'', ''Playing indie video games'', ''Reading science-fiction and philosophy'', ''Participating in hackathons'', ''Cycling'', ''Cooking experimental dishes'', ''Meditation and mindfulness'']'
  career_goals: He aims to become a senior full‑stack engineer within the next three years and transition to a technical lead role where he can steer product strategy at the intersection of software and
    interactive art. In the long term, Michael aspires to launch his own startup that creates immersive AR/VR experiences for cultural institutions and tourism venues in the Coachella Valley. He also seeks
    to earn AWS Solutions Architect certification, mentor junior developers, and share his knowledge through conference talks and open‑source contributions.
