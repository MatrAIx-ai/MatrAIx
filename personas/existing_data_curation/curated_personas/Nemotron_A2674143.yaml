  hobbies: '[''Hiking'', ''Gardening'', ''Quilting'', ''Cooking traditional recipes'', ''Book club (historical fiction)'', ''Yoga'', ''Volunteering at museum'', ''Community potlucks'', ''Photography of
    nature'', ''Attending local theater'']'
  career_goals: Jennifer aims to establish a lasting seniors' dance program in Monument that integrates health and creative expression, secure ongoing funding through grants, and produce an annual community
    dance festival that showcases regional traditions. She seeks a leadership role on the local arts council to advocate for dance education, and aspires to mentor a new generation of choreographers, ensuring
    the continuity of her choreographic voice. Ultimately, she hopes to produce a documentary film that chronicles Colorado's folk dance heritage, preserving it for future generations.
