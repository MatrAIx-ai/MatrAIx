  hobbies: '[''Sketching'', ''Photography'', ''Visiting Art Galleries'', ''DIY Crafts'', ''Hiking'', ''Kayaking'', ''Reading Contemporary Fiction'', ''Playing Board Games'', ''Volunteering at Community
    Events'', ''Attending Local Music Shows'']'
  career_goals: Erica aims to complete her high‑school equivalency (GED) within the next year and enroll in a community‑college program in Business Administration or Fine Arts. In the short term, she seeks
    promotion to assistant manager at her current store, using her reliable and organized work style to lead a small team. Over the next five years, she envisions transitioning into visual merchandising
    for a regional retailer or an art‑focused boutique, where she can blend her retail expertise with her love of design. Long‑term, Erica hopes to open a community‑oriented pop‑up shop that showcases locally
    made crafts, sustainable products, and emerging artists, turning her passion for art, entrepreneurship, and community building into a sustainable career.
