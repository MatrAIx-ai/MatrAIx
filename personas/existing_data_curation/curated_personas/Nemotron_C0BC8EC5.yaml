personas:
  professional: Erica Jacks is a retail sales associate who leverages their methodical approach to visual merchandising, turning store aisles into artful displays while managing POS systems, inventory,
    and social‑media promotion, and they apply the same organized enthusiasm to weekend DIY projects.
  sports: Erica Jacks enjoys weekend hikes on the Willamette Trail, kayaking with the local Oregon River Explorers club, and cheering on the Oregon State Beavers while they occasionally play ultimate frisbee
    with the Aurora community league.
  arts: Erica Jacks spends afternoons sketching landscapes inspired by Ansel Adams and listening to Bon Iver, regularly attends Portland Art Museum exhibitions by contemporary Indigenous artists, and they
    curate playlists featuring indie folk and lo‑fi beats for their gatherings.
  travel: Erica Jacks plans travel with a mix of spontaneous road trips and meticulous budgeting, having already explored the Oregon Coast's Cannon Beach, a weekend in Seattle’s Pike Place Market, and they
    dream of a summer backpacking adventure through the Canadian Rockies.
  culinary: Erica Jacks loves farm‑to‑table meals, often prepping kale‑avocado salad with toasted pumpkin seeds, experimenting with homemade matcha latte, and they treat friends to weekend brunches featuring
    eggs Benedict with sriracha hollandaise.
  core: Erica Jacks blends a small‑town community ethic, a love for the outdoors, and a curiosity for art into a disciplined yet spontaneous lifestyle, and they occasionally overcommit to social events,
    juggling retail responsibilities, creative projects, and eco‑focused ambitions.
background:
  cultural: Erica is a second‑generation white American raised in Aurora, a small town in Marion County, Oregon. Her family’s roots trace back to Midwestern settlers, and they maintain traditions such as
    Thanksgiving gatherings, holiday decorations, and a strong emphasis on community support. Growing up in the Pacific Northwest, Erica has been shaped by the region’s love of the outdoors, environmental
    stewardship, and an appreciation for the natural landscape. Although the area is predominantly white, she has been exposed to the heritage of the Confederated Tribes of Grand Ronde and values learning
    about local indigenous cultures. This blend of modest, small‑town upbringing, a commitment to sustainability, and an openness to diverse artistic influences informs her worldview and daily life.
attributes:
  skills: '[''Customer Service'', ''Point-of-Sale System Operation'', ''Cash Handling'', ''Inventory Management'', ''Visual Merchandising'', ''Interpersonal Communication'', ''Conflict Resolution'', ''Time
