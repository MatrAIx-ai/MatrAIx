  hobbies: '["Cooking Honduran cuisine","Salsa and cumbia dancing","Volunteering at community centers","Gardening","Reading self‑development books","Watching and supporting local soccer"]'
  career_goals: Lourdes aims to open a family‑owned barbershop in Fort Worth that doubles as a training hub for at‑risk youth, offering paid apprenticeships and certified courses. She plans to integrate
    her educational expertise by creating a structured curriculum that blends traditional barbering techniques with modern styling trends, while preserving culturally relevant grooming practices. Long‑term,
    she hopes to expand the shop into a small chain that provides comprehensive wellness services, including hair care products sourced from Central America, and to become an active leader in the Texas
    Barber Association advocating for community‑focused professional development.
