personas:
  professional: Lourdes Hernandez, a veteran educator‑turned‑barber with fifteen years of precision haircutting, bilingual client consultations, and curriculum design, they channel their methodical organization
    and compassionate, sociable nature into running a meticulously scheduled barbershop that doubles as a mentorship hub for at‑risk youth.
  sports: Lourdes Hernandez, an avid supporter of the Dallas Cowboys, Texas Rangers, and FC Dallas, they join a local co‑ed recreational soccer league each spring, blend salsa dancing as cardio into their
    fitness routine, and enjoy weekend hikes in the Texas Hill Country to stay active and balanced.
  arts: Lourdes Hernandez, whose evenings often feature salsa and cumbia nights to the rhythms of Celia Cruz, Marc Anthony, and Carlos Vives, they attend live performances at Bass Performance Hall, collect
    prints by Frida Kahlo, and occasionally savor community theater productions that celebrate multicultural stories.
  travel: Lourdes Hernandez, who prefers structured road trips with a mix of cultural immersion and culinary exploration, they have road‑tripped through the Texas Hill Country, ventured to Mexico City to
    sample street tacos, and dream of a guided tour of Barcelona’s modernist architecture, all while budgeting trips around the barbershop’s cash flow.
  culinary: Lourdes Hernandez, an accomplished home cook, regularly prepares traditional baleadas with refried beans, crema, and crumbled cheese, hearty tamales wrapped in corn husks, and rich sopa de mondongo
    flavored with hominy and cilantro, they also experiment with fusion dishes that incorporate avocado, plantains, and smoked paprika.
  core: Lourdes Hernandez merges meticulous barbering expertise with a love for community cooking, they juggle a disciplined schedule and occasional coffee‑break procrastination to keep both scissors and
    soufflés perfectly timed.
background:
  cultural: Lourdes grew up in a close‑knit Honduran family before moving to the United States as a teenager, bringing with her a strong sense of community, Catholic traditions, and pride in her Central
    American heritage. In Fort Worth’s diverse environment, she maintains bilingual fluency, celebrates holidays such as Semana Santa and Día de la Madre with extended family, and actively participates
    in Hispanic cultural festivals. Her cultural roots inform her compassionate approach to client service, her desire to support immigrant and minority youth, and her commitment to preserving Honduran
    customs through food, music, and community gatherings.
