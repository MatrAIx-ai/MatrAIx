personas:
  professional: Mayra Santanasanchez, an 18‑year‑old junior compensation analyst, leverages strong interpersonal communication, bilingual fluency, and curiosity‑driven research to transform complex job‑evaluation
    data into clear benefit recommendations, while their relaxed, talkative nature makes them a natural connector in vendor negotiations and team presentations.
  sports: Mayra Santanasanchez stays active by dancing merengue and bachata at the Miami Urban Dance Club three nights a week, attends yoga sessions at Flow Yoga Studio, and passionately follows the Miami
    Heat and Miami Dolphins, although they sometimes skip a workout when a late‑night karaoke session runs over.
  arts: Mayra Santanasanchez spends weekends crafting poetry inspired by the lyrical storytelling of Lin‑Manuel Miranda and the vibrant pop sensibilities of Ricky Martin, belts out karaoke classics from
    Beyoncé and Marc Anthony, dives into contemporary novels by Sally Rooney and Yaa Gyasi, and captures bustling street scenes with their camera in a style reminiscent of Vivian Maier’s intimate street
    photography.
  travel: Mayra Santanasanchez prefers spontaneous, budget‑friendly trips, having already explored the vibrant streets of San Juan, the sun‑kissed beaches of Jamaica, and a weekend music festival in Cartagena,
    while dreaming of backpacking through Barcelona’s art districts and attending a reggae concert in Kingston, balancing adventure with a student‑level budget.
  culinary: Mayra Santanasanchez, an enthusiastic home‑chef, regularly prepares plantain‑based dishes such as mangú with sautéed onions, arroz con pollo seasoned with sofrito and achiote, and savory yuca
    al mojo, while they also love sampling spicy tacos al pastor with pineapple and fresh cilantro at local food trucks.
  core: Mayra Santanasanchez blends infectious charisma, a love for rhythmic dance and spontaneous karaoke nights, with a laid‑back, occasionally disorganized approach to finances and appointments, making
    them a vibrant yet sometimes forgetful 18‑year‑old dreamer.
background:
  cultural: Mayra was raised in a close‑knit Dominican family in Freeport, NY, where Spanish is spoken at home and Dominican traditions are celebrated. She grew up with a strong sense of community, enjoying
    holidays like Dominican Independence Day and sharing foods such as mangú, sancocho, and pastelitos. This heritage influences her warm, expressive communication style and her commitment to cultural inclusion.
    While fully integrated into American society, she remains proud of her Caribbean roots and actively participates in local Dominican cultural events.
