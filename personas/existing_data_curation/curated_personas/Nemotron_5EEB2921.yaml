  career_goals: Mayra aims to become a senior compensation and benefits analyst within five years, pursuing certifications such as SHRM‑CP and Certified Compensation Professional. She wants to lead the
    design of equitable pay structures and innovative benefit offerings that support workforce diversity. Long‑term, she envisions a strategic HR business‑partner role where she influences company policy,
    mentors emerging talent, and champions inclusion initiatives that reflect her Dominican heritage.
