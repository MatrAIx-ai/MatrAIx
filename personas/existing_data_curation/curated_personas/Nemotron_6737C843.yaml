personas:
  professional: Demetrius Mubarak, a 28‑year‑old electrical and systems engineer in Los Angeles, they blend rigorous hardware prototyping for renewable‑energy IoT devices with agile project leadership,
    leveraging a practical curiosity that balances cutting‑edge sensor analytics and machine‑learning integration while mentoring underrepresented students through engineering outreach.
  sports: Demetrius Mubarak, an avid fitness enthusiast, they fuel weekend fitness by shooting hoops at a local court and hiking the Griffith Park trails, root for the Los Angeles Lakers and the LA Galaxy,
    and follow a disciplined yet flexible routine that mixes cardio with strength work, though they sometimes neglect recovery after intense basketball games.
  arts: Demetrius Mubarak, a synth creator, they channel creative energy into electronic music production on a Moog Sub 37, drawing inspiration from Flying Lotus, Kaytranada, and Janelle Monáe while also
    devouring speculative fiction by N.K. Jemisin and Neal Stephenson, which together shape a soundscape that fuses futuristic synth textures with soulful gospel‑inflected vocal samples.
  travel: Demetrius Mubarak, a purposeful explorer, they mix purposeful exploration and cultural immersion, having trekked in Joshua Tree, savored street tacos in Mexico City, and plotted future trips to
    Reykjavik to study geothermal energy and to Accra to connect with family roots, always balancing travel budgets with a meticulous savings plan.
  culinary: Demetrius Mubarak, a kitchen experimenter, they experiment with dishes like Jollof‑inspired shrimp and grits and spicy collard‑green stew seasoned with suya spice, berbere, smoked paprika, and
    fresh ginger, showcasing moderate cooking skill that blends Southern comfort food with West‑African flavor profiles while frequently sourcing organic produce at local farmers’ markets.
  core: Demetrius Mubarak, a curiosity‑driven engineer, they balance ambitious sustainable tech projects with a love for synth music, fusion cooking, and mindful wellness, all while wrestling with anxiety‑fuelled
    perfectionism and a penchant for late‑night gadget tinkering.
background:
  cultural: Demetrius grew up in a multicultural Los Angeles neighborhood with strong ties to the African‑American community. His parents, who immigrated from Ghana, instilled a deep appreciation for both
    their West African heritage and the broader African‑American cultural legacy. He celebrates holidays such as Kwanzaa and Juneteenth, participates in church gatherings that blend gospel music with contemporary
    R&B, and maintains connections to the local black professional network through the National Society of Black Engineers. This blend of cultural influences informs his worldview, his commitment to community
    service, and his interest in bringing diverse perspectives to engineering challenges.
