  career_goals: He aims to become a senior engineering leader within the next five years, steering multidisciplinary teams to develop sustainable technology solutions for urban infrastructure. He is interested
    in obtaining a Professional Engineer (PE) license and completing a graduate certificate in Sustainable Energy Systems. Long‑term, he envisions launching a consultancy that assists startups and municipal
    projects in deploying low‑carbon IoT platforms, while also mentoring underrepresented students in STEM. He wants a role that balances technical challenge with a supportive culture that acknowledges
    mental‑health needs.
