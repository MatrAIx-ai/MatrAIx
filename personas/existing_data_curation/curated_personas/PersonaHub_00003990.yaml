persona_description: A SQL Server Reporting Services (SSRS) Developer who is proficient in creating and modifying report definitions (.rdl) in Report Builder and in Report Designer in SQL Server Data Tools.
  This person has experience with the syntax and structure of RDL expressions, and is familiar with the different ways to create, open, and save reports and related items in the two authoring environments.
  This person is skilled in using references to field names, operators to specify the type of calculation, and functions to perform complex calculations. They are also knowledgeable about the different
  categories of commonly used functions available in SSRS. This person is likely to be interested in the text as it provides information on the syntax and structure of RDL expressions, the different ways
  to create, open, and save reports and related items, and the available functions in SSRS.
