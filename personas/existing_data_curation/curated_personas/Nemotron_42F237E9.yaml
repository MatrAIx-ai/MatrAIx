personas:
  professional: Christie Miller is an aspiring event coordinator and social media content creator who leverages their strong interpersonal skills, knack for spontaneous planning, and practical curiosity
    to organize community festivals while crafting upbeat TikTok videos that showcase teen fashion and DIY hacks.
  sports: Christie Miller energizes their Saturdays playing forward for the Fort Wayne United Soccer Club, follows the Fort Wayne TinCaps baseball games for inspiration, and mixes in dance cardio classes
    at the community center to stay fit, balancing team camaraderie with personal stamina goals.
  arts: Christie Miller channels their love of live music by attending shows by local acts like The Rain Farm and streaming favorites such as Billie Eilish and Olivia Rodrigo, while their TikTok reels often
    feature quick edits set to trending tracks and occasional nods to indie filmmaker Greta Gerwig's teen movies.
  travel: Christie Miller plans spur‑of‑the‑moment road trips to nearby Lake Michigan beaches, day trips to Chicago for concerts, and dreams of a future backpacking adventure across Japan’s urban and rural
    landscapes, preferring budget‑friendly hostels and group travel itineraries that allow for Instagram‑ready photo ops.
  culinary: Christie Miller enjoys whipping up quick pasta carbonara and avocado‑toast breakfast bowls for friends, peppers these meals with fresh basil and crushed red pepper flakes, and swaps cheap microwave
    meals for DIY taco nights featuring seasoned ground beef, corn tortillas, and a splash of lime.
  core: Christie Miller is a sociable teen who thrives on spontaneous group outings, balances a love for digital trends with occasional disorganization, and never leaves home without a phone fully charged
    for the next TikTok clip.
background:
  cultural: Christie grew up in a middle‑class white family in Fort Wayne, Indiana, where Midwestern values such as friendliness, community involvement, and modesty are emphasized. Her family participates
    in regional traditions like the Three Rivers Festival, Fourth of July fireworks, and local church youth groups, which shape her sense of belonging. The suburban‑small‑town mix of Fort Wayne provides
    an environment that balances quiet residential life with vibrant community events, giving Christie a strong connection to her local community and its cultural rhythms.
attributes:
  skills: '["Interpersonal communication", "Group event facilitation", "Basic digital literacy", "Creative problem solving", "Team sports participation", "Volunteer coordination", "Empathy and listening",
