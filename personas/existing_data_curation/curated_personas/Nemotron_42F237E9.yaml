  hobbies: '["Hanging out with friends at local hangouts", "Playing soccer", "Dance classes at community center", "Creating short videos for TikTok", "Attending concerts and local music events", "Volunteering
    at community festivals", "DIY crafts and clothing customization", "Cooking simple meals with friends", "Exploring nature trails around Fort Wayne", "Watching teen drama series"]'
  career_goals: Christie is focused on completing her GED within the next year, followed by enrolling in a community college program in hospitality management or marketing communications. She envisions
    a career that blends her love for social interaction and practical organization, aiming to become an event coordinator for community festivals and cultural events in the Fort Wayne area. At the same
    time, she wants to leverage her digital fluency and outgoing personality to build a personal brand on platforms like TikTok and Instagram, creating lifestyle and fashion content for fellow teens. Her
    long‑term ambition is to turn that online presence into a full‑time career as a social media influencer or brand strategist, while also maintaining a role that allows her to contribute to local community
    initiatives.
