  career_goals: Curtis plans to earn his GED within the next year, then secure a scholarship to study computer science or software engineering at a university. He aims to land an internship at a tech company
    to gain real‑world experience, eventually becoming a full‑stack developer or founding his own startup focused on AI‑driven educational tools. He is motivated to create practical, impactful technology
    and to mentor other self‑taught learners, hoping to lead a development team that bridges the gap between formal education and hands‑on skill acquisition.
