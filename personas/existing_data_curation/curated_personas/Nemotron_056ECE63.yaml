personas:
  professional: Curtis Pavlich is a self‑taught 17‑year‑old full‑stack developer who leverages strategic thinking honed in RTS and FPS esports to architect web applications and custom gaming rigs, while
    using Trello and Notion to schedule every line of code and hardware modification with military‑grade organization.
  sports: Curtis Pavlich hits the community gym for disciplined weightlifting sessions three times a week, shoots hoops with friends at the local park while cheering on the Atlanta Hawks and the Georgia
    Tech Yellow Jackets, and follows the Atlanta United MLS team, treating each practice like a strategic match that blends competition with personal progress.
  arts: Curtis Pavlich immerses themselves in synthwave and chiptune soundtracks from artists like Kavinsky, Perturbator, and Anamanaguchi while streaming classic game OSTs, enjoys the visual storytelling
    of director Wes Anderson and the sci‑fi aesthetic of The Matrix, and occasionally contributes pixel‑art assets to indie game jams under the pseudonym ‘PixelStrategist.’
  travel: Curtis Pavlich plans trips with a spreadsheet, favoring tech‑centric destinations such as a weekend visit to Orlando’s DreamHack convention, a competition trip to New York for a FIRST Robotics
    tournament, and dreaming of a future backpacking adventure through Tokyo’s Akihabara district to explore cutting‑edge hardware, while balancing these ambitions against a modest budget and family commitments.
  culinary: Curtis Pavlich prefers quick, protein‑rich meals like chicken teriyaki bowls, homemade ramen with added soft‑boiled eggs, and occasional spicy chicken wings, cooks with a basic but efficient
    setup in their parents’ kitchen, and relies on a well‑organized grocery list in Notion to keep a steady stock of rice, noodles, and pre‑marinated meats for post‑workout refueling.
  core: Curtis Pavlich blends relentless discipline with competitive curiosity, building PCs, coding apps, and mentoring peers while maintaining a cool, methodical demeanor and an occasional overclocking
    obsession that keeps both their hardware and life humming at peak performance.
background:
  cultural: Curtis grew up in a middle‑class, white family in Covington, Georgia, where Southern hospitality, community involvement, and self‑reliance are core values. His upbringing emphasized hard work,
    respect for tradition, and a pragmatic outlook, while his local church reinforced a sense of responsibility and service. Proximity to the Atlanta metropolitan area exposed him to a blend of classic
    Southern customs and contemporary tech culture, shaping his balanced perspective of curiosity and practicality.
