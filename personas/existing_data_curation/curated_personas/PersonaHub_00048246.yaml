persona_description: A scientist or researcher who is interested in the study of malaria and the impact of HIV-1 on the immune system, particularly in the context of the phagocytosis of micro-organisms
  and the effect of such pathogens on HIV-1 replication. They are interested in the development of new techniques to investigate the interactions between the malaria parasite and HIV-1 in different relevant
  human primary cell populations and are looking for a simple and effective method to monitor the impact of P. falciparum-infected erythrocytes on the replication of HIV-1 in human primary monocyte-derived
  macrophages. They are also interested in the cytoadherence phenotypes of the pRBC and the ability of clinical isolate cultures to clump in vitro, and are looking for a method to investigate these aspects.
