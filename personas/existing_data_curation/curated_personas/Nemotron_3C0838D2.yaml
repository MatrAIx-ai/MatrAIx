  hobbies: '[''Reading science-fiction novels'', ''Jazz improvisation on the saxophone'', ''Cooking soul-food recipes'', ''Trail hiking in Shaw Park'', ''Meditation and journaling'', ''Volunteering for
    STEM mentorship programs'', ''Participating in local hackathons'', ''Playing strategy board games'']'
  career_goals: Over the next three years Valencia aims to become a senior full‑stack engineer and then transition into a technical lead role where she can shape product strategy and mentor junior developers.
    She is driven to champion diversity in tech, planning to organize coding workshops for under‑represented youth in St. Louis and to partner with local nonprofits on STEM outreach. Recognizing her sensitivity
    to stress, she also aspires to cultivate a balanced work‑life rhythm by advocating for flexible remote work policies and promoting mental‑wellness practices within her team. Ultimately, she envisions
    a future where she can blend technical leadership with community impact, perhaps moving into a product‑focused position that aligns technology solutions with social equity goals.
