personas:
  professional: Soledad Gutierrez, an aspiring junior environmental scientist, is already applying their practical mindset and love for community gardening to school projects while their sociable nature
    helps them lead group LEGO engineering challenges—even though they sometimes leave their materials scattered.
  sports: Soledad Gutierrez, a forward on the White Mills Youth Soccer Club, loves weekend matches, cheers for the Philadelphia Eagles during fall football, sleds down local hills in winter, and practices
    dance routines for fun, but they occasionally neglect their stretching routine.
  arts: Soledad Gutierrez, an enthusiastic LEGO architect and sketch artist, often draws animals after watching nature documentaries, dances to the pop beats of Taylor Swift and Billie Eilish, and spends
    evenings watching Pixar films like "Toy Story" for inspiration, yet they sometimes scratch out their sketches in frustration when a piece doesn’t fit.
  travel: Soledad Gutierrez enjoys family road trips to Hersheypark and the Poconos, has visited New York City’s Central Park for a picnic, dreams of seeing the Grand Canyon, and prefers traveling with
    a detailed checklist, though they sometimes forget to pack their favorite LEGO set.
  culinary: Soledad Gutierrez loves helping in the community garden, enjoys topping homemade pizza with pepperoni and fresh basil, can whip up a quick mac and cheese with cheddar and a sprinkle of paprika,
    but they often leave the sink messy after cooking.
  core: Soledad Gutierrez, a lively nine‑year‑old who blends their love of structure with playful spontaneity, thrives on group activities, community service, and creative building, yet sometimes misplaces
    their organized plans.
background:
  cultural: Soledad grows up in White Mills, a small rural community in Wayne County, Pennsylvania, within a predominantly White American cultural setting. Her family observes typical American holidays
    such as Thanksgiving, Christmas, and Fourth of July celebrations, often joining community events like the county fair and local church gatherings. While her surname reflects a Spanish linguistic heritage,
    the day‑to‑day cultural practices are shaped by the close‑knit, neighborly atmosphere of her town, emphasizing cooperation, outdoor recreation, and community service.
