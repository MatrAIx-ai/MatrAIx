persona_description: A healthcare professional who is interested in evidence-based clinical and public health practice, and is looking to improve their understanding of systematic reviews and meta-analysis
  methodologies. They are also interested in learning about network meta-analysis, which is an extension of conventional meta-analysis that allows the simultaneous synthesis of data from networks of trials.
  This persona is likely to be familiar with the basics of evidence-based medicine and health care practice, and is seeking to enhance their knowledge and skills in these areas. They may have some experience
  in conducting systematic reviews, but are looking to expand their knowledge and understanding of the methods and techniques involved. This persona is also likely to be interested in learning about the
  potential bias and limitations of different research designs, as well as the statistical methods and methodological aspects involved in conducting and reporting meta-analyses.
