  career_goals: Richard aims to move from cashier to shift supervisor within the next year, then to store manager within three to five years. He plans to complete an associate’s degree in business administration
    to strengthen his understanding of retail management and supply-chain logistics. His long-term ambition is to manage multiple store locations or transition into a district-manager role for a regional
    retailer, eventually leveraging his experience to open his own small-scale convenience store in Pendleton. He values clear, structured career progression and seeks recognition for meeting performance
    targets.
