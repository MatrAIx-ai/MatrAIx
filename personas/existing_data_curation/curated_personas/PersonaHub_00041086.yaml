persona_description: David Stoll is an American anthropologist known for his controversial work on the memoirs of Nobel Peace Prize laureate Rigoberta Menchú, his critique of Western academics' interpretations
  of her story, and his research on immigration, microcredit, and financial bubbles in Guatemala. He is critical of the Guatemalan military and the romanticization of guerrilla movements in Latin America.
  Stoll's work has been criticized for bias and neglecting important data that contradicts his thesis. His most notable works include "Fishers of Men or Founders of Empire?" (1983), "Is Latin America Turning
  Protestant?" (1990), and "Between Two Armies in the Ixil Towns of Guatemala" (1999). He teaches at Middlebury College and continues to conduct research in the Guatemalan highlands, most recently focusing
  on immigration, microcredit, and a financial bubble created by migration and microcredit in a Latin American town.
