personas:
  professional: Angela Armstrong, a seasoned medical billing and posting clerk, channels her analytical precision and vivid imagination into designing visual, art‑inspired workflow guides while offering
    calm, assertive mentorship to younger staff, despite a laid‑back approach to strict scheduling.
  sports: Angela Armstrong enjoys brisk early‑morning beach walks, occasionally joining the Miami Beach Fitness Walking Club, follows the Miami Heat and Miami Dolphins with casual enthusiasm, and attends
    a small Latin dance class that doubles as gentle cardio, preferring low‑impact activity over intense competition.
  arts: Angela Armstrong immerses herself in abstract oil painting inspired by Miami sunrise, frequently studies the work of Mark Rothko and contemporary muralist RETNA at Wynwood Walls, reads Cuban poet
    José Martí, listens to Nina Simone’s jazz, and participates in a small, informal art‑making circle that discusses the philosophies of Kandinsky, shaping both her creativity and analytical problem solving.
  travel: Angela Armstrong favors thoughtful, low‑stress travel, spending her retirement savings on slow‑paced trips to culturally rich locales like Oaxaca, Cuba, and the historic streets of Savannah, while
    also relishing weekend drives to the Everglades for bird‑watching, usually planning itineraries loosely and allowing spontaneous detours.
  culinary: Angela Armstrong enjoys crafting simple yet flavorful dishes such as grilled mahi‑mahi tacos with cilantro‑lime slaw, basil‑pesto linguine, and rosemary‑roasted sweet potatoes, often harvesting
    basil, oregano, and mint from her herb garden, and she delights in savoring a cup of café cubano after dinner.
  core: Angela Armstrong blends a seasoned medical‑billing career with a vibrant inner world of abstract art, bird‑watching, and mindful strolls, relying on calm resilience and a laid‑back, improvisational
    approach to both work and life, even if occasional disorganization lapses threaten deadlines.
background:
  cultural: Angela's cultural background is rooted in mainstream White American traditions, reflecting a mid‑Atlantic upbringing that emphasized self‑reliance, community participation, and an appreciation
    for the arts. Her adult life in Miami has woven in the city's vibrant multicultural tapestry, exposing her to Cuban and Caribbean music, bilingual signage, and diverse culinary flavors. While she identifies
    primarily with Anglo‑American cultural norms—celebrating holidays such as Thanksgiving and the Fourth of July—she also values the relaxed, community‑focused rhythm of South Florida, often attending
    local art festivals and small cultural gatherings. This blend of a conventional American upbringing with the cosmopolitan flavor of Miami informs her worldview and personal aesthetics.
attributes:
  skills: '[''Medical billing and coding'', ''Journal entry posting'', ''Accounts payable/receivable management'', ''Data entry and validation'', ''QuickBooks and Epic/Meditech software proficiency'', ''Advanced
    Microsoft Excel (pivot tables, macros)'', ''Analytical problem solving'', ''Creative workflow design'', ''Clear written communication'', ''Collaborative teamwork and assertive negotiation'', ''Basic
    Spanish for documentation'']'
  hobbies: '[''Abstract oil painting'', ''Short story and poetry writing'', ''Contemporary art gallery visits'', ''Bird watching'', ''Experimental photography'', ''Morning beach walks'', ''Herb garden cultivation'',
    ''Mindfulness meditation'', ''Small‑group Latin dance lessons'', ''Basic Spanish language study'']'
  career_goals: Approaching retirement, Angela aims to transition from a full-time clerk to a mentor‑consultant role, sharing her extensive billing knowledge with younger staff and small medical practices.
    She hopes to design a flexible, part‑time training program that blends her love of abstract concepts with hands‑on workflow improvements, using visual aids and simple art‑based explanations. Completing
    the remainder of her college degree in business administration is another personal milestone. In the longer term, she envisions establishing a boutique consulting service that offers streamlined, creative
    billing solutions for independent clinics, allowing her to continue learning novel regulatory changes while preserving time for her artistic pursuits.
