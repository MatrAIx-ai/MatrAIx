  hobbies: '[''Visiting art museums and galleries'', ''Sketching and botanical illustration'', ''Photography of nature and cityscapes'', ''Maintaining a personal vegetable and flower garden'', ''Reading
    art history and horticulture books'', ''Listening to podcasts on design and sustainability'', ''Hiking in Forest Park'', ''Woodworking (birdhouses, small furniture)'', ''Meditation and mindfulness practice'',
    ''Volunteering in community garden projects'']'
  career_goals: Vincent aims to advance from a hands‑on landscaper to a supervisory role within the city’s parks department, where he can influence sustainable maintenance practices and integrate native
    plantings into public spaces. Over the next five years, he plans to obtain certifications in horticulture and landscape design, lead larger community‑garden projects, and eventually launch his own boutique
    landscaping firm that specializes in eco‑friendly garden designs that incorporate artistic installations and educational elements for neighborhood residents.
