  hobbies: '[''Historical Non-Fiction Reading'', ''Solo Hiking'', ''Woodworking'', ''Model Railroad Building'', ''Chess Puzzles'', ''Craft Beer Brewing'', ''Landscape Photography'', ''Bird-Watching'']'
  career_goals: Anthony aims to transition into a clinical pharmacy specialist role within a regional health system, focusing on chronic disease management and medication safety for underserved populations
    in Montana. He plans to earn board certification in ambulatory care, develop telepharmacy services to reach remote patients, and eventually lead a pharmacy department that emphasizes evidence-based
    practice and continuous process improvement. He also aspires to mentor younger pharmacists, publish research on rural medication adherence, and eventually open a boutique pharmacy that integrates personalized
    medication counseling with community health education, while preserving the structured, low-stress environment he values.
