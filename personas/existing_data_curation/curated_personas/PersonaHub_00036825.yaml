persona_description: A conservation biologist who specializes in the study of the status of hornbills in the north-eastern states of India. She has conducted extensive field surveys in 16 Protected Areas,
  collecting information on hunting and other threats to the species, and has documented a significant decline in hornbill habitat-use intensity and detection probability of all hornbill species in most
  states in north-east India. Her research interests include the conservation of wildlife and the protection of natural habitats.
