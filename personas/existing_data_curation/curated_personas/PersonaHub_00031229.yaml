persona_description: An environmental conservationist who is passionate about the Chinese giant salamander and its conservation. They are dedicated to raising awareness about the endangered status of the
  species and working towards sustainable management of wild populations. They are committed to implementing an environmental education programme and funding an EDGE Fellow to collect more data on the population
  ecology, behaviour, and threats to the species. They also want to establish a long-term monitoring programme for the species, which includes many locations across the fragmented range of the Chinese giant
  salamander, starting with the main project focus region of the Qinling Mountains.
