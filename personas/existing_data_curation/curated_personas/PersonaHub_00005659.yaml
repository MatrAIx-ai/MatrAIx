persona_description: A scholar and author of She'iltot (Questions) and She'elata (Sheilata), a Jewish legal text that combines halakhic and aggadic material, and was written after the close of the Talmud.
  His works are known for their unique approach to halakhic and aggadic material, and his method of connecting decisions of the Oral Law with the Written Law. He is likely to be interested in Jewish law,
  halakhic literature, and the development of Jewish legal thought.
