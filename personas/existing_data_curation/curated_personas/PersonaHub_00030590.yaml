persona_description: A historian who specializes in the study of the Opium Wars between Qing-dynasty China and Britain in the 19th century. They are interested in the ideological differences between the
  two sides, the economic and political cultures that led to the conflicts, and the complex reactions of ordinary Chinese to the British and the war. They are also interested in the examination of Chinese
  materials, the split court on the question of an anti-opium crackdown, the chaotic and absent-minded Qing's military and diplomatic response, and the political complexity of ordinary Chinese reactions
