  hobbies: '[''vegetable gardening'', ''quilting'', ''historical nonfiction reading'', ''family cooking'', ''community garden volunteering'', ''walking/hiking'', ''jigsaw puzzles'', ''church choir singing'']'
  career_goals: She aims to move from her current production‑worker role into a supervisory position within the next two years, leveraging her reliability and methodical approach to lead a shift team. Over
    the longer term she plans to obtain a bachelor’s degree in Business Management and qualify for a plant‑manager role, where she can champion continuous‑improvement projects and mentor a more diverse
    workforce. Hellen also hopes to establish a mentorship program that connects local high‑school students, especially those from under‑represented backgrounds, with manufacturing career pathways.
