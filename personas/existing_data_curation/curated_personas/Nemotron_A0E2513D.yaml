personas:
  professional: A teenage muralist and budding community artist, Wenceslao channels folklore-inspired sketches into bold color experiments, routinely planning detailed mural concepts for local festivals
    while balancing schoolwork and a part‑time tutoring gig that funds their art supplies; their curiosity pushes them to research mythic symbols, their organized nature keeps project timelines tight, and
    their sociable energy helps rally classmates for collaborative workshops.
  sports: A member of the school soccer team and regular at the neighborhood basketball court, Wenceslao trains twice weekly with the under‑12 league and plays pickup games with the local Street Hoops crew,
    cheering for the city’s professional soccer club, the Red Tigers, while maintaining a personalized fitness journal to track progress and set weekly goals.
  arts: An avid sketcher and music enthusiast, Wenceslao frequents the downtown art gallery to study works by contemporary muralists, draws inspiration from folk legends for both visual art and songwriting,
    and delights in listening to traditional corridos alongside indie bands like The Strokes and My Chemical Romance, often humming melodies while refining color palettes for future murals.
  travel: Passionate about exploring vibrant cultural hubs, Wenceslao has visited the historic old town market where they sampled street‑food tacos, dreams of trekking the ancient stone ruins of Chichen
    Itza, and prefers spontaneous weekend trips with friends over meticulously planned vacations, though a limited budget sometimes curtails longer journeys.
  culinary: From helping prepare tacos al pastor with pineapple and chipotle‑marinated pork to rolling tamales with masa and fresh salsa featuring tomatillo, cilantro, and jalapeño, Wenceslao enjoys experimenting
    with homemade salsas and occasionally sneaks extra guacamole onto their plate, while their cooking skill remains at a confident home‑chef level.
  core: A creatively curious, organized teen who balances sketching folklore creatures, soccer drills, and family cooking sessions, Wenceslao channels boundless energy into community art projects while
    occasionally neglecting sleep and overspending on video‑game extras.
background:
  cultural: Wenceslao grows up in a Mexican household in Indianapolis, where Spanish is spoken at home and Mexican customs are celebrated year‑round. His family observes traditions such as Día de los Muertos,
    Día de la Independencia, and festive gatherings featuring Mexican cuisine and music. He attends a local Catholic parish that hosts cultural events, and his parents keep close ties with the city’s Mexican‑American
    community center, fostering a strong sense of collective identity. This bicultural upbringing shapes his artistic interests—particularly in vibrant folk art, mural storytelling, and music—and his bilingual
    abilities enable him to navigate both his heritage community and broader American society with ease.
attributes:
  skills: '[''Bilingual (Spanish–English) communication'', ''Digital literacy (Word, Excel, Canva, GIMP)'', ''Project planning and organization'', ''Team collaboration and leadership'', ''Visual arts (drawing,
    sketching, mural concepts)'', ''Basic guitar playing and music theory'', ''Soccer team coordination'', ''Research and information synthesis'']'
  hobbies: '[''Sketching and drawing'', ''Playing acoustic guitar'', ''Composing music'', ''Minecraft and creative video games'', ''Soccer and street basketball'', ''Cooking traditional Mexican dishes'',
    ''Attending local art exhibitions'', ''Volunteering for cultural workshops'']'
  career_goals: Wenceslao aims to study graphic design or visual communications in college, with a long‑term ambition to become a muralist or art director for a nonprofit that promotes multicultural art
    education. In the near term, he wants to join his high school’s art club, win a regional youth art competition, and secure a summer internship at a local design studio. He also envisions using his bilingual
    skills to develop community workshops that teach Mexican‑American visual traditions to younger students.
