persona_description: A network engineer who is knowledgeable about various layers of the OSI model and the concepts of protocol data units (PDU). They are familiar with the TCP protocol and its role in
  breaking data into segments that can be handled by different layers of the network. They have experience with IP packet and frame structures and understand the importance of the IP header in maintaining
  the integrity of data packets. They are skilled in troubleshooting network issues and have a deep understanding of the principles of network protocols and their implementation. They are also knowledgeable
  about the various layers of the OSI model and the importance of understanding the data flow in a network.
