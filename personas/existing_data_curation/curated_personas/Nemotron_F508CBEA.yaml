  hobbies: '[''senior‑center dance nights'', ''bingo'', ''knitting circle'', ''garden club'', ''river trail walks'', ''bird‑watching'', ''historical fiction reading'', ''local history research'', ''listening
    to classic jazz'', ''cooking family recipes'', ''watercolor painting'', ''church choir'']'
  career_goals: Although retired, Lisa remains driven to make a meaningful impact. Her primary goals are to continue volunteering at the local senior center, mentor younger community members, and preserve
    her family’s history by compiling a memoir and recording oral histories of longtime Niagara residents. She also aspires to stay active and independent, learn to use video‑calling technology to keep
    in touch with distant relatives, and occasionally travel with a small group to nearby attractions such as the Niagara Gorge State Park.
