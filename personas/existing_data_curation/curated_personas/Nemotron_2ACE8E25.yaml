  career_goals: Although retired, Avery aims to channel her experience into lasting contributions to her community and family. She aspires to compile a comprehensive family history and local oral‑history
    archive for the Sheridan Historical Society, preserving the stories of African‑American families in Clinton County. She also hopes to mentor younger relatives in practical life skills—budgeting, cooking,
    and basic computer literacy—ensuring they inherit both her curiosity and pragmatic mindset. Additionally, Avery dreams of publishing a small cookbook featuring traditional soul‑food recipes adapted
    for modern, health‑conscious cooking, which would serve as both a legacy project and a source of personal fulfillment.
