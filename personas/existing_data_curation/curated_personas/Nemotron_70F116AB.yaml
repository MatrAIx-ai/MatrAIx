  career_goals: He aims to transition into a detective role within the next two years, focusing on forensic or cybercrime specialization, leveraging his STEM background. Long-term, he seeks promotion to
    sergeant and eventually lieutenant, aspiring to lead a department-wide data analytics unit that integrates technology into policing. He plans to attend the FBI National Academy and obtain a master's
    degree in criminal justice or forensic science. He is also interested in developing community outreach programs that use data-driven strategies to reduce crime while maintaining public trust. Ultimately,
    he hopes to influence policy at the state level, advocating for modernized policing practices.
