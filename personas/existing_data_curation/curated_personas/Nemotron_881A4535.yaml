  hobbies: '["Weight training","Running","Recreational basketball","Cooking Indian dishes","Hosting community block parties","Reading true‑crime literature","Solving Sudoku and crossword puzzles","Hiking
    Catskill trails","Playing tabla","Participating in cultural festivals"]'
  career_goals: Sachit aims to be promoted to Sergeant within the next three years, focusing on improving community relations and mentoring junior officers. In the longer term, he aspires to serve as a
    Police Lieutenant or Chief, leading strategic initiatives for transparency, cultural competency, and community‑based policing. He intends to develop a neighborhood watch program and to create a departmental
    training module on cultural sensitivity, leveraging his South Asian heritage. To support his leadership ambitions, he plans to obtain a GED and pursue an associate degree in criminal justice.
