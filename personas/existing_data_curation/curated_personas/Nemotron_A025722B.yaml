personas:
  professional: Dzung Bunjang, a seasoned landscape professional with two decades of hands‑on experience in the Pacific Northwest, leverages meticulous project scheduling, sustainable horticultural practices,
    and a calm, methodical leadership style to guide a small crew while mentoring apprentices and pursuing a CLP credential.
  sports: Dzung Bunjang, an avid badminton enthusiast, competes twice weekly with the Tacoma Badminton Club, they support the Seattle Seahawks and Seattle Mariners, and spend weekends hiking the trails
    of Mount Rainier, capturing wildlife photography along the way.
  arts: Dzung Bunjang enjoys cultural arts by attending performances of the Rainier Repertory Theater, listening to the timeless ballads of Trịnh Công Sơn, and they collect vintage botanical illustration
    prints that inspire their garden designs.
  travel: Dzung Bunjang prefers purposeful travel, having visited Ho Chi Minh City to study traditional market ingredients, and they dream of a tranquil week in Kyoto’s bamboo forests while balancing family
    responsibilities and a modest travel budget.
  culinary: Dzung Bunjang delights in crafting authentic pho broth simmered for hours with star anise and charred ginger, they slice crispy bánh mì with pâté and pickled daikon, and roll fresh spring rolls
    stuffed with jasmine rice noodles, herbs, and shrimp harvested from the Nisqually River.
  core: Dzung Bunjang blends methodical craftsmanship with a sociable spirit, they harmonize garden stewardship, community mentorship, and a penchant for bamboo water features while quietly battling mild
    health niggles.
background:
  cultural: Dzung was born to Vietnamese immigrant parents who settled in the Seattle‑Tacoma region after the Vietnam War. Growing up in a close‑knit Vietnamese‑American community, he learned to speak Vietnamese
    at home and celebrated traditional festivals such as Tet (Lunar New Year) and the Mid‑Autumn Festival with his extended family. The values of respect for elders, harmony, and hard work were emphasized
    throughout his upbringing, shaping his cooperative and considerate nature. Family gatherings often centered around shared meals, and the art of Vietnamese cooking—balancing flavors and using fresh herbs—instilled
    in him an appreciation for detail and practicality. Although he pursued some college coursework in horticulture, much of his knowledge comes from hands‑on experience, echoing the pragmatic, routine‑focused
    mindset common in his cultural background. He incorporates elements of his heritage into his landscaping work, such as bamboo screens, lotus ponds, and the use of symbolic plants, while also adapting
    to the Pacific Northwest climate. Dzung remains connected to his roots through regular visits to the local Vietnamese Buddhist temple, participation in cultural events, and maintaining relationships
    with friends and relatives both in Washington and overseas.
