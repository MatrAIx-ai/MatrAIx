    practices'', ''Native plant selection for Pacific Northwest'', ''Cultural garden design (Vietnamese‑inspired)'', ''Safety compliance (OSHA)'', ''Inventory management'']'
  hobbies: '[''Community gardening'', ''Vietnamese cooking'', ''Badminton'', ''Hiking in local parks'', ''Fishing'', ''Cycling'', ''Reading horticulture magazines'', ''Volunteering with youth garden programs'',
    ''Collecting heirloom seeds'', ''Building bamboo water features'']'
  career_goals: While Dzung values the stability of his current role, he is driven to advance into a supervisory position where he can shape larger landscaping projects and set standards for quality and
    sustainability. His short‑term goal is to obtain a Certified Landscape Professional (CLP) credential and become the grounds manager for a municipal park or a large corporate campus in the Tacoma area.
    Long‑term, he aspires to launch his own boutique landscaping firm that blends eco‑friendly practices with Southeast Asian garden aesthetics, offering services such as bamboo water features, koi ponds,
    and culturally themed planting schemes. He also hopes to create a community‑garden partnership that provides training and mentorship for young workers and local residents, reinforcing his commitment
    to cooperation and harmony.
