personas:
  professional: Tammy Bell is a senior full‑stack developer turned freelance creative‑tech consultant whose curiosity fuels the blend of three decades of Python, JavaScript, and .NET expertise with a passion
    for acrylic painting and interactive installations, guiding a small interdisciplinary team while championing flexible, collaborative workflows despite a habit of juggling multiple projects on a loosely
    organized schedule.
  sports: Tammy Bell enjoys sunrise beach walks and occasional paddle‑boarding on the Atlantic, supports the Miami Dolphins and the Florida Panthers, participates in a local senior yoga class, and joins
    a casual bird‑watching walk club that meets weekly at Hugh Taylor Birch State Park.
  arts: Tammy Bell spends weekends painting vivid acrylic seascapes inspired by Georgia O'Keeffe, curates a personal photo series of Florida wildfowl, frequents the Pérez Art Museum Miami and the Bass Museum
    of Art, and cites Brian Eno and The Velvet Underground as soundtrack staples while mentoring young coders in community art‑education programs.
  travel: Tammy Bell prefers flexible, low‑key getaways, often booking last‑minute flights to the Bahamas and Aruba, relishes cultural trips to Barcelona for Gaudí’s architecture, and dreams of a road trip
    along the Pacific Coast, all while balancing a modest travel budget funded through freelance consulting earnings.
  culinary: Tammy Bell loves cooking fresh grouper ceviche with lime, mango, and cilantro harvested from their garden, enjoys making homemade sweet‑potato gnocchi topped with sage‑brown butter, and, despite
    a casual approach to meal planning, frequently experiments with tropical fruit smoothies and local farmer‑market finds.
  core: Tammy Bell is a curiosity‑driven senior technologist who fuses art and code, lives a relaxed, slightly disorganized lifestyle, and balances solitary creativity with small‑group mentorship while
    managing health, finances, and a love for coastal life.
background:
  cultural: Tammy grew up in a middle‑class white American family in the Midwest, where a strong emphasis on education and self‑reliance shaped her early values. As a woman entering the tech field in the
    1980s, she was influenced by the feminist and civil‑rights movements that encouraged independence and advocacy. Relocating to Deerfield Beach in her later years, she embraced the laid‑back coastal lifestyle
    and the multicultural vibrancy of South Florida, while maintaining a classic American cultural identity rooted in community service, respect for personal space, and a love for the arts.
attributes:
  skills: '[''Full-stack web development'', ''Python programming'', ''JavaScript (React, Node.js)'', ''C#/.NET development'', ''Cloud computing (AWS, Azure)'', ''Software architecture'', ''Agile and Kanban
    project management'', ''UI/UX design principles'', ''Data analysis and visualization'', ''Mentoring junior developers'', ''Open-source contribution'', ''Creative coding for art installations'']'
  hobbies: '[''Acrylic and watercolor painting'', ''Nature and street photography'', ''Visiting art galleries and museums'', ''Beach walks and shell collecting'', ''Birdwatching'', ''Reading science‑fiction
    and speculative fiction'', ''DIY electronics (Arduino, Raspberry Pi) for interactive art'', ''Gardening native Florida plants'', ''Yoga and mindfulness meditation'', ''Participating in small coding
    meet‑ups'', ''Volunteering at community art programs'']'
  career_goals: Tammy aims to leverage her technical expertise and artistic sensibility to lead a small interdisciplinary team that creates technology tools for community arts initiatives. She is interested
    in transitioning to part‑time consulting and freelance work that allows flexible scheduling, enabling her to mentor emerging women developers and write a guide on creative coding for seniors. Ultimately,
    she hopes to launch a local tech‑art hub in Deerfield Beach that offers workshops, open‑source projects, and mentorship programs.
