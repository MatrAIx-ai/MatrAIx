  hobbies: '[''Fishing'', ''Vintage motorcycle restoration'', ''Woodworking'', ''Model railroading'', ''Metal sculpture'', ''Volunteer fire equipment maintenance'', ''Local historical society involvement'',
    ''Attending Cambria County Fair'', ''Classic rock listening'']'
  career_goals: Although approaching retirement, Zachariah aims to transition from full‑time shop work to a part‑time consultant role, offering his expertise to local manufacturers and community workshops.
    He plans to earn a Certified Welder credential, develop a small‑business line producing custom metal art and tool repair kits, and volunteer to teach welding basics at the community college's adult
    education program. He also hopes to document his trade knowledge in a concise guide for future generations.
