personas:
  professional: Manh Cash, the budding LEGO architect, translates their love for predictable pieces into intricate toy constructions, approaching each build with practical focus and a willingness to improvise
    when plans go awry.
  sports: Manh Cash, a lively member of the Little Tigers Soccer Club, dribbles the ball across the local park field with the same enthusiasm they reserve for cheering on FC Barcelona’s youth matches, and
    proudly wears their team’s blue jersey during weekend games.
  arts: Manh Cash, who delights in upbeat jazz classics like Louis Armstrong’s 'What a Wonderful World' and the playful hip‑hop beats of Kid Cudi, often bursts into spontaneous dancing after listening,
    and fills spare time sketching cartoon animals inspired by picture books.
  travel: Manh Cash, an avid junior explorer, spends Saturdays trekking short trails up Mount Ridgeview with a mini‑backpack, dreaming of future adventures to Yellowstone’s geysers and the sunny beaches
    of Okinawa.
  culinary: Manh Cash, a self‑appointed kitchen assistant, loves assembling cheese pizza slices topped with pepperoni and extra mozzarella, munching on crunchy carrot sticks with hummus, and proudly boasts
    a perfect record for not spilling milk during breakfast.
  core: Manh Cash balances a meticulous love for building Lego castles with a carefree penchant for splashing in puddles, making them a pleasant blend of orderly creator and spontaneous explorer.
background:
  cultural: Manh comes from an African‑American family that values community, storytelling, and music. His parents teach him about the heritage of Black musicians, civil‑rights history, and family recipes
    passed down through generations. Growing up in Colorado Springs, he experiences a blend of mountain culture and urban diversity, attending a multicultural elementary school and participating in local
    celebrations such as Juneteenth events and community picnics. His family often gathers for church services and family meals that combine Southern comfort food with Colorado’s fresh produce, fostering
    a sense of belonging and cultural pride.
