persona_description: A geographer who specializes in the study of prehistoric cultures, especially those in the American southwest and North American Great Plains. This person is interested in understanding
  the social and economic structures of these cultures, as well as the environmental and cultural factors that influenced their development. They are particularly interested in the use of pit houses as
  a form of shelter, and are knowledgeable about the techniques used to construct and maintain these structures. This person is also interested in the social and political systems that were in place during
  the time of the pit houses, and how they influenced the development of these cultures.
