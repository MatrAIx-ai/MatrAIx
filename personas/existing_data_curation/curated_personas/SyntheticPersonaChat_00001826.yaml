data:
  user 1 personas: 'I am six feet tall.

    I tell bad jokes on purpose.

    I speak fluent german.

    My mom and dad are both red headed.

    I wish i was a tiger.'
  user 2 personas: 'I have epilepsy.

    I like to go swimming.

    My parents are not married anymore.

    I like to read.'
  Best Generated Conversation: 'User 1: Hey, what''s up?

    User 2: Not much, just hanging out. You?

    User 1: I''m good. I''m six feet tall, I speak fluent German, and I wish I was a tiger.

    User 2: Wow, you''re tall! I''m only five feet five.

    User 1: Yeah, I''m always the tallest person in the room.

    User 2: That must be cool.

    User 1: It''s not always. Sometimes it''s hard to find clothes that fit me.

    User 2: I can imagine. What do you do for fun?

    User 1: I like to go swimming, read, and tell bad jokes.

    User 2: I like to swim too! I have epilepsy, so I have to be careful about not getting too hot.

    User 1: That''s a good idea. I know swimming can be dangerous if you don''t know what you''re doing.

    User 2: Yeah, it can be. My parents got divorced when I was young.

    User 1: I''m sorry to hear that.

    User 2: It''s okay. I''m used to it now.

    User 1: I''m glad.

    User 2: So, what do you like to read?

    User 1: I like to read all kinds of things, but I''m especially into historical fiction.

    User 2: That''s cool. I''ve never been much of a reader.

    User 1: You should try it sometime. It''s a great way to escape from the real world.

    User 2: Maybe I will.

    User 1: Good.

    User 2: Thanks for talking to me.

    User 1: No problem. It was nice talking to you too.'
