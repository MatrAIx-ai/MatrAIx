  career_goals: Shanique aims to deepen her impact within the Chicago community by taking on a leadership role in senior services. She envisions becoming a volunteer coordinator at a local senior center,
    where she can design and oversee programs that promote nutrition, social connection, and health education. She is interested in obtaining a certification in geriatric care counseling to formalize her
    peer‑support work. Additionally, she hopes to start a community garden project focused on providing fresh produce to low‑income households and to compile oral histories of longtime African‑American
    residents into a small exhibition that celebrates their contributions to the city’s cultural fabric.
