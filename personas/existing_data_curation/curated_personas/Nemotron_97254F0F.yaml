  career_goals: Even at 83, John seeks to shift from daily management to a mentorship and advisory role, helping local schools, churches, and small businesses adopt secure, user‑friendly technology solutions.
    He aims to develop a community digital‑literacy program for seniors, document best practices for technology‑driven education, and ensure that his legacy of reliable, compassionate service continues
    through the professionals he guides.
