personas:
  professional: John Ohara, a veteran IT strategist with a graduate degree in education, spends his days translating complex cybersecurity concepts into practical workshops for local schools and churches,
    relying on his methodical, organized approach and curiosity to balance new tech trends with proven methods, while his sociable nature makes him a trusted mentor who often worries about staying ahead
    of emerging threats.
  sports: John Ohara, an avid angler who casts lines on the nearby Willow River each spring, participates in the senior bowling league at the community center, supports the hometown Riverton Tigers football
    team, and joins a weekly walking club to stay fit, while still keeping a modest collection of vintage fishing lures.
  arts: John Ohara, a baritone in his church choir who enjoys singing Bach cantatas and classic folk ballads by Woody Guthrie, spends weekends building small wooden toys, devours historical biographies
    by David McCullough and Doris Kearns Goodwin, and attends the community theater’s productions of "Our Town" and "The Miracle Worker", finding solace in both music and craftsmanship.
  travel: John Ohara, a measured traveler who favors road trips over air travel, has driven the scenic Pacific Coast Highway to visit the Redwood National Park, spent a week exploring the historic sites
    of Washington, D.C., dreams of seeing the cherry blossoms in Kyoto, and prefers destinations that offer gentle walks and opportunities to fish.
  culinary: John Ohara, a garden-to-table home chef, loves preparing grilled trout with lemon-dill butter harvested from his own catch, a rustic ratatouille of zucchini, tomatoes, and fresh basil from his
    vegetable garden, and baking sourdough loaves with a crusty, caramelized crumb, while peppering meals with garlic, rosemary, and a dash of smoked paprika.
  core: John Ohara blends decades of IT leadership, community mentorship, and garden-fresh cooking into a meticulously organized, curiosity-driven lifestyle, tempered by a persistent worry about staying
    ahead of technology changes and health concerns.
background:
  cultural: Raised in the Deep South of Mississippi, John embodies a Southern cultural identity rooted in strong family ties, community service, and respect for tradition. His upbringing in a Christian
    household emphasized hospitality, modesty, and cooperation, values he carries into his personal and professional life. While his surname hints at a multigenerational connection to Japanese ancestry,
    his primary cultural heritage is European‑American, and he blends this background with a lifelong commitment to education, technology, and community involvement.
