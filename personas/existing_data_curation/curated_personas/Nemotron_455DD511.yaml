  hobbies: '[''Exploring woods and tide pools'', ''Birdwatching'', ''Fishing with family'', ''Building LEGO and model kits'', ''Programming simple games on Scratch'', ''Reading sci‑fi and nature books'',
    ''Playing acoustic guitar'', ''Sketching wildlife'', ''Playing strategy board games'']'
  career_goals: He aims to pursue high‑school science electives focused on environmental science and marine biology, with a long‑term ambition to become a coastal ecologist or marine conservation specialist
    protecting Maine’s lobster and seabird habitats. Christopher envisions integrating technology, such as data‑collection apps and simple coding scripts, to monitor water quality and marine health. He
    also hopes to share his knowledge through community outreach education, valuing calm, purposeful work that benefits both his local community and the natural world.
