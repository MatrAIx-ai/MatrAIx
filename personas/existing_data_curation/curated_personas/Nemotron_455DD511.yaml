personas:
  professional: Christopher Belisle, an aspiring junior programmer and budding marine explorer, blends his curiosity for wildlife with practical engineering skills from LEGO builds, creating simple Scratch
    games that simulate tide-pool ecosystems, while his laid-back yet cooperative nature makes him a reliable team member in his school's science club.
  sports: Christopher Belisle enjoys casting lines on the town lake, plays for the local youth baseball league that feeds into the Portland Sea Dogs development program, and cheers on the Boston Red Sox
    while favoring low-intensity outdoor pursuits like hiking and occasional pick-up soccer with friends.
  arts: Christopher Belisle expresses his love for the coast through detailed wildlife sketches inspired by John James Audubon, strums acoustic guitar chords echoing John Denver after school, and composes
    short stories while listening to Jack Johnson's mellow folk tunes.
  travel: Christopher Belisle, who has explored Bar Harbor's rugged cliffs in Acadia National Park and taken a family road trip to historic Boston, now hopes to trek Iceland's coastal puffin colonies, favoring
    modest, nature-focused trips planned around weekend beach cleanups and budget-friendly camping.
  culinary: Christopher Belisle favors classic New England fare, often pan-frying fresh cod caught with his dad using lemon and thyme, savoring hearty clam chowder with potatoes and bacon, and mastering
    blueberry pancake stacks on Saturday mornings, though his kitchen experiments sometimes result in slightly overcooked fish and a lingering burnt pancake aroma.
  core: Christopher Belisle is a calm, nature-driven teen who balances LEGO engineering and Scratch coding with tide-pool explorations, yet habitually misplaces his fishing gear and procrastinates on school
    assignments until the final hour.
background:
  cultural: Christopher was raised in Lincolnville, a small coastal community in Waldo County, Maine, where the majority of residents share a New England heritage. His family has lived in the region for
    generations, with stories of lobster fishing, boat building, and town fairs passed down through grandparents. The local culture emphasizes self‑reliance, modesty, and a strong connection to the sea
    and forests, values that are reflected in his respect for nature and community harmony. He participates in school and town events such as the annual harvest festival and volunteer beach cleanups, and
    he speaks with the soft Maine accent typical of the area. These experiences shape his identity as a pragmatic, considerate, and nature‑oriented young person.
attributes:
  skills: '[''Computer troubleshooting'', ''Basic coding (Scratch)'', ''DIY woodworking and small tool use'', ''Observational biology'', ''Logical puzzle solving'', ''Reading comprehension and summarization'',
