personas:
  professional: Sarah Vaughn, an aspiring young coder who creates Scratch games about ecosystems, blends her love of sketching flora and fauna with methodical project planning, and dreams of someday turning
    her LEGO habitats into real‑world conservation designs.
  sports: Sarah Vaughn enjoys playing soccer with the Newtown Square Youth Soccer Club in the fall, follows the Philadelphia Eagles in the NFL and the Philadelphia Phillies in the MLB, and incorporates
    weekend bike rides through local parks as their primary fitness routine.
  arts: Sarah Vaughn spends Saturdays sketching animals inspired by Monet’s water lilies and Studio Ghibli’s fantastical creatures, attends art workshops where they experiment with acrylics under guidance
    from local artist Maria Alvarez, and frequently listens to the music of Hans Zimmer while browsing the Philadelphia Museum of Art’s impressionist galleries.
  travel: Sarah Vaughn prefers meticulously planned weekend getaways with their family, cherishes annual visits to Philadelphia’s historic sites like Independence Hall and the Science Center, and dreams
    of exploring the castles of Scotland and the vibrant streets of Tokyo during a future school exchange.
  culinary: Sarah Vaughn enjoys assembling their own pepperoni pizza with fresh mozzarella and basil, bakes chocolate chip cookies using dark chocolate chunks and sea salt, and loves experimenting with
    strawberry shortcake topped with whipped cream and fresh berries during weekend cooking sessions with their mom.
  core: Sarah Vaughn is a methodical dream‑er who fills notebook margins with intricate animal sketches, meticulously tracks every allowance cent, yet can be stubbornly resistant to trying new foods without
    a trusted recipe.
background:
  cultural: Sarah is raised in a white, middle‑class family in suburban Newtown Square, Delaware County, Pennsylvania. Her family celebrates traditional American holidays such as Thanksgiving, Christmas,
    and the Fourth of July, and they attend a local Protestant church where community service and fellowship are emphasized. The proximity to Philadelphia provides easy access to diverse cultural venues—including
    art museums, science centers, and theater—which nurture her appreciation for creative and unconventional ideas. Her parents, who have German and Irish ancestry, place a high value on education and encourage
    her curiosity through extracurricular activities like museum visits, science camps, and local art workshops.
