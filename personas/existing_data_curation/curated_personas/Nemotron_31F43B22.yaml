  career_goals: Sarah hopes to blend her love of art and science by pursuing a career as a wildlife illustrator or an environmental researcher. In the near term, she aims to excel in her middle‑school science
    fair, join the art club, and earn a badge in a local scouting program that emphasizes leadership and community service. Long‑term, she envisions attending a STEM‑focused high school, studying biology
    and ecology, and later working on conservation projects where she can document ecosystems through both scientific research and visual art.
