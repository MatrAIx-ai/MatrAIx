  career_goals: Tina aims to transition into a lead medical assistant or clinic supervisor role within the next two years, where she can mentor younger staff and shape patient‑experience protocols. She
    plans to earn the Certified Medical Assistant (CMA) credential and pursue additional training in health‑education and community outreach. Long‑term, she envisions establishing a permanent art‑therapy
    corner in her clinic and launching a community health‑education program that blends medical information with creative workshops. While she looks forward to a phased retirement, she hopes to remain active
    as a consultant, sharing her expertise in patient engagement and clinic workflow optimization.
