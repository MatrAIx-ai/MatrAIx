personas:
  professional: A seasoned medical office professional, Tina Whitchurch leverages decades of clinical and administrative mastery—including patient intake, phlebotomy, EMR optimization, and infection-control
    compliance—to orchestrate seamless clinic operations while they inject creative flair through art‑therapy initiatives and mentorship ambitions.
  sports: An enthusiastic member of the Columbia Women’s Bowling League, Tina Whitchurch rolls strikes on Thursday nights, follows the South Carolina Gamecocks football team with seasonal fervor, and supplements
    these activities with sunrise power‑walks in the local park, balancing competitive spirit with community camaraderie.
  arts: Immersed in the vibrant arts scene of Columbia, Tina Whitchurch attends openings of works by regional painters like Emily Smith, hones watercolor techniques under instructor Carlos Ramos, graces
    the stage in community theater productions of Tennessee Williams, and belts harmonies in the local women’s choir that reveres classics from Aretha Franklin to contemporary folk artist Brandi Carlile,
    all while they nurture a keen curiosity for unconventional artistic expression.
  travel: A cultural explorer at heart, Tina Whitchurch has road‑tripped to New Orleans for Mardi Gras, meandered through Savannah’s historic squares during the St. Patrick’s Day Parade, and plans a future
    pilgrimage to Asheville’s Folklife Festival, always booking budget‑friendly B&Bs and favoring destinations where they can sample regional cuisines and attend local art fairs.
  culinary: A Southern‑style culinary alchemist, Tina Whitchurch cultivates basil, rosemary, and thyme in a well‑tended herb garden that flavors their signature shrimp étouffée, buttermilk fried chicken,
    and collard‑green casserole, yet they have a guilty habit of devouring the last spoonful of homemade pecan pie before guests arrive.
  core: Tina Whitchurch blends clinical precision with artistic flair, navigating clinic leadership, competitive bowling, and herb‑infused Southern cooking while they juggle a strategic eye on retirement
    and a skeptical yet curious outlook on life.
background:
  cultural: Tina grew up in a close‑knit Southern family in the Columbia area, where church gatherings, family reunions, and neighborhood barbecues shaped her sense of community and hospitality. Her upbringing
    emphasized respect for tradition while encouraging curiosity and education, fostering her appreciation for both the region’s rich cultural heritage and emerging artistic expressions. Though her roots
    are firmly planted in Southern values of warmth, resilience, and communal support, she embraces the region’s evolving diversity, often attending multicultural festivals and supporting local artists
    who challenge classic norms. This blend of traditional Southern upbringing and open‑minded engagement informs her worldview, her interactions with patients, and her passion for integrating art into
    health care.
