  hobbies: '[''Classic car restoration'', ''Woodworking'', ''Hiking the Tennessee foothills'', ''Blues drumming'', ''Community theater'', ''STEM mentorship programs'', ''Barbecue cooking'', ''Gardening'']'
  career_goals: Looking ahead, Orpheus aims to transition into senior consulting, focusing on sustainable product design and renewable‑energy projects that benefit his community. He plans to establish a
    boutique engineering firm that partners with local manufacturers to improve efficiency and reduce environmental impact. Additionally, he is committed to mentoring the next generation of Black engineers
    through outreach programs and guest lecturing at regional universities, ensuring his legacy extends beyond his own projects.
