  hobbies: '[''Sketching'', ''Watercolor painting'', ''Photography'', ''Yoga'', ''Journaling'', ''Hiking'', ''Visiting art galleries'', ''Volunteering for community design workshops'', ''Listening to design
    podcasts'', ''Participating in online design critique groups'']'
  career_goals: Jennifer aims to transition from a junior designer role to a senior position within the next three to five years, eventually taking on creative‑lead responsibilities for multi‑disciplinary
    projects. She is focused on expanding her expertise in UI/UX design, leading a small team of designers, and building a portfolio that showcases both brand strategy and digital product work. Long‑term,
    she aspires to become a creative director or to launch her own boutique studio that emphasizes data‑driven design decisions while fostering a collaborative, high‑standard work culture. She also plans
    to earn a professional certification in Interaction Design to solidify her credibility.
