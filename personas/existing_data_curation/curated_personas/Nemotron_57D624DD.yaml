  hobbies: '[''fishing'', ''hunting'', ''gardening'', ''woodworking'', ''church volunteer work'', ''county fair organization'', ''card playing'', ''reading historical nonfiction'', ''watching classic western
    movies'', ''spending time with his cat Whiskers'']'
  career_goals: Billy’s career ambition is to move into a supervisory position where he can apply his decades of hands‑on experience to improve team efficiency and safety. He aims to become a senior shift
    supervisor or safety officer, earning a certification in occupational safety and health to strengthen his qualifications. In the longer term, he plans to transition to a part‑time mentoring or consulting
    role that allows him to share his knowledge while freeing up time for family, community service, and his woodworking hobby. Financially, he is focused on securing a stable retirement and possibly launching
    a small side business making custom wooden furniture for neighbors and friends.
