persona_description: A researcher and engineer who specializes in the design and fabrication of micro- and nanoscale devices, particularly those related to MEMS and MEMS-based technologies. They have a
  background in materials science and have experience in the use of micro-engines and micro-fuel-cells. They are skilled in the use of precision fabrication techniques and have a keen interest in the implications
  of MEMS and other precision fabrication techniques on the design and fabrication of mechanical and energy systems. They are also interested in the potential for miniaturization in fuel cells and the implications
  of this for power density.
