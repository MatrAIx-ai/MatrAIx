  hobbies: '["PC building and upgrading", "Competitive gaming (Valorant, League of Legends)", "Mountain biking", "Woodworking projects", "Hiking in the Cascades", "Basketball (playing and watching)", "Listening
    to alternative/indie music", "Reading science-fiction novels"]'
  career_goals: In the short term, Galyn aims to secure an apprenticeship with a local automotive shop or a tech repair service, leveraging his hands‑on abilities while completing an associate’s degree
    in mechanical engineering technology. He also hopes to launch a side venture building custom gaming PCs for fellow enthusiasts, using his competitive gaming insights to tailor performance rigs. Long‑term,
    he envisions becoming a certified automotive technician or a mechanical engineer who designs ergonomic tools for outdoor recreation, ultimately blending his love for practical engineering with his passion
    for the Pacific Northwest’s outdoor culture.
