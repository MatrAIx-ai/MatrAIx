personas:
  professional: An aspiring automotive technician and tech repair apprentice named Galyn Hathaway leverages their hands‑on expertise in PC assembly, Python automation, and OBD‑II diagnostics to troubleshoot
    complex problems, while their competitive gaming mindset drives them to meticulously document each repair in detailed spreadsheets despite occasionally missing deadlines due to spontaneous tinkering.
  sports: An avid mountain biker and pick‑up basketball player named Galyn Hathaway rides the Cascades with the Cascades Trail Riders club, follows the Seattle Kraken for hockey and the Portland Trail Blazers
    for basketball, and channels their competitive spirit into weekly bike races and weekend basketball scrimmages, though they sometimes skip scheduled team practices due to spontaneous gaming events.
  arts: Galyn Hathaway’s creative palate spins to the sounds of Arctic Monkeys, Bon Iver, and Phoebe Bridgers while they craft custom furniture, and they unwind with science‑fiction epics like Neuromancer
    and The Three‑Body Problem, often quoting lines from these novels during gaming sessions, which reflects their love for alternative narratives.
  travel: When not tinkering at home, Galyn Hathaway prefers weekend escapes to the misty trails of Olympic National Park, the rugged vistas of Mount Rainier, and occasional urban forays to Seattle’s tech
    conferences, planning trips with a hybrid of spontaneous road trips and spreadsheet‑mapped itineraries, though a modest student budget sometimes limits the frequency of their adventures.
  culinary: Galyn Hathaway enjoys high‑protein meals that fuel their rides, often cooking spicy ramen with miso broth, grilled salmon topped with pine nuts, and craft coffee—grind and brew measured precisely
    with a digital scale—while their woodworking hobby influences a penchant for assembling DIY pizza ovens, even if they sometimes over‑season dishes in a burst of experimental flair.
  core: Galyn Hathaway is a competitively‑driven 18‑year‑old tinkerer who balances disciplined hands‑on engineering with spontaneous gaming marathons, often trading structured plans for impromptu builds
    and late‑night code.
background:
  cultural: Galyn grew up in Snohomish, a suburb of the greater Seattle area in Washington State, where a close‑knit community and proximity to the tech hub shape his outlook. His family background is predominantly
    Midwestern white, emphasizing self‑reliance, hard work, and practical problem‑solving. The Pacific Northwest’s outdoors‑oriented lifestyle—hiking, biking, and an appreciation of the natural environment—influences
    his recreational choices. At the same time, the region’s tech culture and progressive attitudes toward education have encouraged him to pursue college courses in engineering and computer science. He
    identifies with mainstream American cultural traditions, celebrating holidays like Thanksgiving and the Fourth of July, while also embracing the local emphasis on sustainable living and community events
    such as county fairs.
attributes:
  skills: '["Computer assembly and troubleshooting", "Basic Python scripting", "Automotive maintenance and diagnostics", "Woodworking and custom bike frame building", "Strategic competitive gaming", "Data
