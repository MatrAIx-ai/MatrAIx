  hobbies: '[''fishing'', ''vegetable gardening'', ''traditional Mexican cooking'', ''reading mystery novels'', ''playing chess'', ''attending local soccer matches'', ''volunteering at Día de los Muertos
    events'', ''woodworking'']'
  career_goals: Approaching retirement, Reydel aims to transition into a mentorship role where he can train the next generation of counselors and publish a practical guide on bilingual career guidance.
    He also envisions launching a regional partnership program that links local businesses with high‑school graduates, creating measurable pathways to employment for the Hispanic community. Ultimately,
    he hopes to leave a legacy of structured yet adaptable counseling services that empower students to achieve competitive outcomes in the job market.
