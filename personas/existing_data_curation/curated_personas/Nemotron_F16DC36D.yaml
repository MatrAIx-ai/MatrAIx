    communication'']'
  hobbies: '[''Hiking and trail exploration'', ''Kayaking on the Skagit River'', ''Nature photography'', ''Home brewing craft beer'', ''Adult softball league'', ''Woodworking projects'', ''Guitar playing
    and jam sessions'', ''Local history reading'', ''Community volunteer work'', ''Data visualization side projects'']'
  career_goals: Gary aims to become the senior editor of his regional newsroom, leading a dedicated data‑journalism team that produces in‑depth, investigative series on the Pacific Northwest’s environmental
    and socio‑economic challenges. He aspires to mentor emerging reporters, integrate advanced data‑visualization tools into everyday news production, and secure a statewide reputation for breaking high‑impact
    stories. Ultimately, he envisions authoring a book that chronicles the interplay between regional policy decisions and community resilience, while also exploring opportunities to teach journalism workshops
    at local colleges.
