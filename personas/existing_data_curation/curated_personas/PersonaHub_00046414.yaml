persona_description: Lynn Mandarano, PhD, City and Regional Planning from the University of Pennsylvania, is Associate Professor in the Department of Community and Regional Planning in Temple University’s
  School of Environmental Design. She researches the impacts of regional environmental collaborative planning and management on our natural resources and governance capacities. Her research interests include
  the use of Internet tools to enhance traditional public participation processes and to build a new form of social capital—digital social capital. She is interested in the digital age’s influence on communication
  and how digital technologies in planning can be used to assess digital social capital. Her expertise lies in the field of regional planning, specifically in the areas of environmental collaborative planning
  and management. She is interested in the disenfranchised populations and the challenges of reaching diverse audiences through digital media.
