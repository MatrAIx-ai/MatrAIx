  hobbies: '[''Soccer (community league)'', ''Cooking Mexican cuisine'', ''Listening to regional Mexican music'', ''Participating in Día de los Muertos festivities'', ''Acrylic and mural painting as a hobby'',
    ''Mindfulness meditation'', ''Hiking in Angeles National Forest'', ''Car restoration and mechanical tinkering'']'
  career_goals: Francisco aims to become a certified lead painter within the next two years, earn an EPA Lead‑Safe Renovation certification, and eventually launch his own painting contracting business focused
    on sustainable, low‑environmental‑impact finishes. He wants to master decorative techniques such as faux plaster and glazing, obtain a Project Management Professional (PMP) credential to handle larger
    commercial projects, and achieve a stable six‑figure income that will allow him to purchase a home and support his aging parents. Reducing the stress of unpredictable work schedules, he also plans to
    mentor apprentices, creating a supportive work environment that balances teamwork with clear expectations.
