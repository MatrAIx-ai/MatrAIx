personas:
  professional: Francisco Vega, a bilingual painter with five years of hands‑on experience in interior and exterior projects across the Greater Los Angeles area, combines their curiosity for low‑VOC and
    epoxy coatings with a practical eye on budgets, translates technical details fluently in both English and Spanish, and is actively pursuing lead‑paint and PMP certifications to eventually launch their
    own sustainable painting contracting firm.
  sports: Francisco Vega plays forward for a community amateur soccer league every Saturday, follows the LA Galaxy with fervor, shoots hoops at the local YMCA during the off‑season, and they regularly hike
    the trails of the Angeles National Forest to maintain endurance and relieve stress.
  arts: Francisco Vega spends evenings mixing acrylics on canvas, drawing inspiration from the vibrant murals of Diego Rivera and the storytelling rhythms of traditional folk music, and they volunteer to
    help paint community Día de los Muertos altars that blend time‑honored motifs with contemporary graffiti.
  travel: Francisco Vega enjoys planning weekend road trips along the Pacific Coast Highway, dreams of wandering the historic streets of Oaxaca to sample its famed mole, and they balance their wanderlust
    with a realistic budget that still reserves evenings for family gatherings.
  culinary: Francisco Vega is a confident home cook who rolls masa into perfect tortillas, slow‑cooks pork for authentic tamales, skins chiles rellenos with cheese and poblano peppers, and they pair their
    meals with fresh salsa made from jalapeños, cilantro, and ripe tomatoes.
  core: Francisco Vega balances a diligent work ethic with a restless curiosity, juggling the stress of certification deadlines, a penchant for late‑night vintage car tinkering, and they habitually over‑plan
    weekends only to get sidetracked by spontaneous hiking trips.
background:
  cultural: Francisco grew up in a Mexican‑American household in Pomona, where family ties, respect for elders, and a strong sense of community are central values. He is fluent in Spanish and English, and
    celebrates cultural traditions such as Día de los Muertos, Cinco de Mayo, and weekly family meals featuring homemade tortillas and tamales. The vibrant Latino neighborhoods of Los Angeles County have
    shaped his identity, giving him an appreciation for Mexican art, music, and cuisine. He often volunteers at local community centers, assisting with bilingual workshops and neighborhood clean‑up events,
    reflecting his blend of compassion and practical dedication to his roots.
attributes:
  skills: '[''Surface preparation and repair'', ''Brush, roller, and spray applications'', ''Color mixing and matching'', ''Low‑VOC and eco‑friendly paint knowledge'', ''Safety compliance (OSHA)'', ''Basic
