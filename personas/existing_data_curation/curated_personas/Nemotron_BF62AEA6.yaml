personas:
  professional: Jonathan Myrick, a veteran metal assembly specialist with CNC operation, MIG/TIG welding, and lean manufacturing expertise, channels his love of order and competitive drive into driving
    zero‑defect production lines and mentoring junior assemblers toward promotion.
  sports: Jonathan Myrick, a weekend hiker on the Ozark trails, a regular angler on the Missouri River, and a devoted fan of the Kansas City Chiefs and St. Louis Cardinals, maintains a disciplined weight‑training
    routine at the local gym to offset the physical demands of welding, and belongs to the Boone County Bowmen’s archery club for focused target practice.
  arts: Jonathan Myrick, a meticulous woodworker, draws creative inspiration from blues guitarist John Fahey and the rugged storytelling of Clint Eastwood’s westerns, frequently visits the Missouri History
    Museum’s vintage car exhibit, and collects original engineering sketches by Charles R. Tilley to fuel his model‑building hobby.
  travel: Jonathan Myrick, who plans excursions with spreadsheet precision, spends long weekends road‑tripping to the historic Hermann Wine Trail in Missouri, makes an annual pilgrimage to the Techno Classica
    classic‑car showcase in Essen, Germany, and schedules occasional fishing retreats on the remote backwaters of the Mississippi Delta, all while keeping travel costs within a tight budget.
  culinary: Jonathan Myrick, an accomplished grillmaster, prefers smoky Missouri‑style barbecued pork ribs, pan‑seared catfish seasoned with dill and lemon, and a hearty beef stew with carrots, potatoes,
    and bay leaves cooked for one after a shift, yet treats himself to a prime‑age ribeye steak at a downtown steakhouse on retirement‑anniversary milestones.
  core: Jonathan Myrick blends veteran metal‑fabrication mastery with a spreadsheet‑driven, solitary lifestyle, punctuated by competitive precision, disciplined budgeting, occasional tool‑shop splurges,
    and a love for quiet fishing mornings.
background:
  cultural: Jonathan grew up in the Midwestern United States, shaped by a traditional white, working‑class culture that values hard work, reliability, and community. His family’s roots include German and
    Irish ancestry, reflecting the ethnic mix common in Missouri. He embraces Midwestern values of practicality, modesty, and a strong sense of duty to family and local community, often participating in
    church activities and neighborhood events.
attributes:
  skills: '[''CNC machine operation'', ''Blueprint interpretation'', ''MIG/TIG welding'', ''Quality inspection and defect detection'', ''Lean manufacturing implementation'', ''Equipment troubleshooting'',
    ''OSHA safety compliance'', ''Inventory management'', ''ERP system operation (SAP)'', ''Team training and mentorship'']'
  hobbies: '[''Woodworking'', ''Scale model building'', ''Vintage car restoration'', ''Fishing'', ''Hiking'', ''Reading historical non-fiction'', ''Mentoring youth in trade apprenticeships'']'
  career_goals: He aims to become a shift supervisor and eventually a plant manager, securing a senior leadership role where he can drive process improvements and achieve zero-defect production metrics.
    He also plans to earn a Certified Production Technician (CPT) credential and eventually transition into a consulting role or part‑time instructor at a community college to share his expertise before
    retirement.
