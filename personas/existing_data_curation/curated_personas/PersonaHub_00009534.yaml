persona_description: A farmer and educator who specializes in composting and soil health, particularly in the use of green waste and animal manure. Conwell's method for making compost involves turning the
  pile three times in 4 to 6 months, adding water if necessary, and using a compost thermometer to check the temperature. He collects his brown matter from plants and animal products, and uses straw from
  a feed store for his green matter.
