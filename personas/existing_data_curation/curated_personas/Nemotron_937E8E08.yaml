  hobbies: '[''Visiting art galleries and museums'', ''Sketching and digital illustration'', ''Photography'', ''Live music attendance (jazz, R&B, hip‑hop)'', ''Dancing'', ''Reading contemporary fiction
    and poetry'', ''Blogging about art and culture'', ''Volunteering with youth art programs'', ''Yoga'', ''Cooking and exploring soul‑food cuisine'']'
  career_goals: Alicia aims to complete a bachelor’s degree in marketing or arts management within the next three years, leveraging her curiosity for new ideas and her sociable nature. She aspires to transition
    into a community arts coordinator role, where she can design inclusive programming that highlights underrepresented artists in West Orange and the broader Newark area. Long‑term, she envisions becoming
    a social‑media strategist for a local gallery or museum, or launching her own boutique that sells handcrafted art and merchandise, combining her love for art, entrepreneurship, and community empowerment.
