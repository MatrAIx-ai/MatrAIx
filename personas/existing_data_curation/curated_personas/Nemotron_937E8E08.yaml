personas:
  professional: Alicia Pollard, a 22‑year‑old cashier, blends their talent for POS efficiency, digital illustration, and social‑media storytelling to energize store promotions, while they plot a transition
    to a community arts coordinator role that amplifies under‑represented creators.
  sports: Alicia Pollard, an avid yoga practitioner who attends Wednesday night classes at the local community center, cheers the New York Knicks in winter and the New York Giants in fall, joins a casual
    intramural basketball league, and runs with the Morris County Runners to keep a balanced fitness routine.
  arts: Alicia Pollard, whose Instagram feed showcases the vibrant murals of Shepard Fairey, the portraiture of Kehinde Wiley, live performances by Kamasi Washington, and spoken‑word poetry by Danez Smith,
    they spend weekends sketching at the Newark Museum of Art, attending jazz nights featuring Esperanza Spalding, and crafting digital illustrations that blend modern graphics with soulful motifs.
  travel: Alicia Pollard, a DIY travel planner on a student budget, has explored the historic jazz streets of New Orleans, tasted Caribbean flavors in Jamaica, and dreams of strolling Berlin’s contemporary
    art districts, while they also relish spontaneous day trips to the Hudson River Valley for scenic hikes.
  culinary: Alicia Pollard, a proficient home cook rooted in soul‑food traditions, they expertly whip up collard greens simmered with smoked turkey, honey‑buttered cornbread, jalapeño‑infused mac & cheese,
    and love discovering ramen bowls at trendy Essex County noodle bars.
  core: Alicia Pollard, a 22‑year‑old art‑obsessed community advocate, balances relentless curiosity with impulsive splurges on murals, late‑night sketching marathons, and a habit of juggling multiple projects
    while thriving on social interaction.
background:
  cultural: Alicia is an African‑American woman raised in West Orange, New Jersey, within a close‑knit, middle‑class family that values community, church, and cultural heritage. She grew up immersed in
    the rich tapestry of the Newark metropolitan area, attending local festivals that celebrate the African diaspora, such as Caribana and Juneteenth events. Her upbringing blends traditional soul‑food
    traditions, gospel music, and contemporary Black art influences, shaping a strong sense of identity and a commitment to uplifting under‑represented voices in the arts.
attributes:
  skills: '[''Cash handling'', ''POS operation'', ''Customer service'', ''Conflict resolution'', ''Basic bookkeeping'', ''Digital media editing (Photoshop, Canva)'', ''Social media content creation'', ''Event
