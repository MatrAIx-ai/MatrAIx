  hobbies: '[''sketching and watercolor painting'', ''digital illustration'', ''photography (street and portrait)'', ''cooking traditional South Asian dishes'', ''volunteering at community centers'', ''reading
    contemporary fiction and philosophy'', ''listening to world music and Bollywood soundtracks'', ''practicing yoga and meditation'', ''exploring local art galleries'']'
  career_goals: Manoj aims to turn his artistic talent and community‑focused mindset into a career as a junior graphic designer, eventually moving into a role that blends design with social impact, such
    as a community arts program coordinator or art therapist for a nonprofit. He plans to enroll in a local community college’s graphic design certificate program, build a professional portfolio, and secure
    an apprenticeship at a design studio that values diverse perspectives. In the longer term, he hopes to lead workshops that empower immigrant youth through visual storytelling and to use his bilingual
    abilities to bridge cultural gaps in creative projects.
