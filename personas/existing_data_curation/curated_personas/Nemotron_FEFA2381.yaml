personas:
  professional: Manoj Singh, a 22‑year‑old aspiring junior graphic designer, merges proficiency in Adobe Photoshop and Procreate with a compassionate, community‑focused mindset, delivering design work that
    blends visual storytelling with social impact while keeping an organized yet flexible workflow.
  sports: Manoj Singh enjoys a mix of low‑impact fitness, practicing yoga five times a week, jogging along the river trail on weekends, and playing midfield for the Townsville Community Soccer Club, while
    cheering for Manchester City in the Premier League.
  arts: Manoj Singh spends evenings sketching watercolor studies of urban scenes inspired by the street works of Banksy and the vibrant colors of Frida Kahlo, curates a personal digital illustration portfolio
    featuring collaborations with indie filmmaker Rohit Bhattacharya, and regularly attends indie film screenings showcasing the works of directors like Wong Kar‑wai.
  travel: Manoj Singh favors purposeful travel, often weekend‑hopping to nearby historic towns to photograph colonial architecture, while dreaming of a solo backpacking trip through Kyoto’s temples and
    Bali’s rice terraces, planning each adventure on a modest budget using hostels and community‑run homestays.
  culinary: Manoj Singh, an enthusiastic home chef, masters the art of simmering spiced lentil stew (dal), crafting buttery paneer masala, rolling fresh roti, and perfecting crisp samosa fillings, often
    experimenting with aromatic spices like cumin and garam masala while occasionally over‑seasoning to the point of fiery heat.
  core: Manoj Singh is a quietly driven visual storyteller who balances artistic ambition with a heartfelt desire to uplift his community, all while navigating occasional budget splurges and a habit of
    over‑seasoning his meals.
background:
  cultural: Manoj comes from a South Asian family with roots in India, where cultural traditions, language, and communal values play a central role in his upbringing. Growing up in Charlotte, NC, he balances
    his Indian heritage with American influences, celebrating festivals such as Diwali and Holi while also participating in local multicultural events. He speaks Hindi at home and English in public, and
    he enjoys Indian classical music, Bollywood films, and contemporary South Asian pop. Family gatherings often feature traditional cuisine like biryani and samosas, which he also prepares for community
    events. This bicultural experience shapes his worldview, fostering a strong sense of responsibility toward his community and a desire to bridge cultural gaps through art and mentorship.
