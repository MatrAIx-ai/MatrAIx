  hobbies: '[''Hiking and nature photography'', ''Reading (classic lit, sci‑fi, tech nonfiction)'', ''Participating in writers’ workshop'', ''Morning jogging for stress relief'', ''Analog photography'',
    ''Chess'', ''Songwriting and guitar playing'']'
  career_goals: 'German aims to turn his self‑guided writing career into a sustainable, recognized author brand. In the next three years he wants to secure a publishing contract for a debut novel that fuses
    his curiosity about technology and Midwestern life. Parallel to that, he plans to build a steady freelance income stream through articles for regional magazines, technical manuals for local manufacturers,
    and paid blogging. He also dreams of launching a small independent press focusing on under‑represented voices from the Rust Belt, where he can apply his editorial and project‑management expertise. Ultimately,
    German seeks a balance: creative fulfillment from publishing a bestseller while maintaining reliable, market‑oriented writing work that supports his independent lifestyle.'
