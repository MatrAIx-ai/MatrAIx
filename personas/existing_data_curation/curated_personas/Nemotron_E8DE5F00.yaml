personas:
  professional: German Haney, a 24‑year‑old freelance writer and aspiring novelist, blends long‑form narrative craft with pragmatic project‑management tools, delivering research‑rich nonfiction pieces for
    regional magazines while meticulously tracking deadlines in Trello and applying a skeptical eye to source reliability.
  sports: German Haney, an avid jogger who belongs to the Jackson Runners club and attends Detroit Lions games every fall, hikes the Kalamazoo River trails in summer, and squeezes in a seasonal pickup basketball
    game at the community center, while his competitive streak fuels a disciplined fitness routine.
  arts: German Haney channels his creative energy into analog photography of the Great Lakes shoreline, writes song lyrics inspired by Bruce Springsteen and The War on Drugs, and finds solace in rereading
    the works of Herman Melville, Margaret Atwood, and classic Midwestern folk tales during off‑hours.
  travel: German Haney plans meticulous road trips, having already driven to Chicago’s Art Institute, spent a weekend exploring the Sleeping Bear Dunes, and now dreams of photographing the aurora borealis
    in Iceland while balancing his modest freelance income and desire for a break from the rust‑belt grind.
  culinary: German Haney enjoys cooking simple comfort dishes like pan‑seared trout with lemon‑dill butter, homemade chicken pot pie, and a sourdough starter that he tends to on weekends, while he often
    snacks on cheese curds and a slice of apple pie while reviewing drafts.
  core: German Haney is a methodical, curiosity‑driven writer who wrestles with anxiety, budgets every cent, and can’t resist a good hike or a perfectly timed punchline in his lyrics.
background:
  cultural: German grew up in Jackson, Michigan, a small Midwestern city marked by its manufacturing legacy and close‑knit community values. His upbringing reflects the region’s emphasis on practicality,
    hard work, and modesty, which complements his methodical personality. While his family background is ethnically white and largely Protestant‑cultural, he was exposed to a mix of blue‑collar and service‑industry
    perspectives that shaped his respect for both manual labor and intellectual pursuits. Local traditions—high school football weekends, county fairs, and the rhythm of the Great Lakes seasons—have imbued
    him with a sense of place that often surfaces in his writing. The region’s cultural narrative of resilience amid economic change fuels his competitive drive and his skepticism toward authority, while
    the Midwestern propensity for community engagement inspires his occasional participation in local writers’ circles.
attributes:
  skills: '[''Narrative storytelling'', ''Research and fact‑checking'', ''Copywriting'', ''Editing for structure and style'', ''Scrivener and Microsoft Word proficiency'', ''WordPress content management'',
