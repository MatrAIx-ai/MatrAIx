  career_goals: Jacob aims to transition into a principal technical architect role where he can shape the strategic direction of enterprise platforms while mentoring the next generation of engineers. He
    also aspires to build a boutique consultancy focused on helping mid‑size companies modernize legacy systems with cloud‑native solutions, allowing him to leverage his practical experience in a more autonomous
    setting. Maintaining a healthy work‑life balance and developing leadership competencies are key milestones for the next five years.
