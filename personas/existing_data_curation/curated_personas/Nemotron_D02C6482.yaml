  career_goals: Julissa's ambition is centered on personal fulfillment and cultural preservation rather than traditional employment. She plans to complete the remaining credits toward an associate's degree
    in culinary arts or history, allowing her to formalize her lifelong interests. She aims to write a memoir that intertwines her family's migration story from Spain with recipes and garden chronicles,
    hoping to self-publish a book that serves both as a cultural archive and a cookbook. In addition, she aspires to organize an annual Spanish heritage festival in Mission, Kansas, bringing together local
    residents for music, dance, and food. A long-held dream is to travel to Spain, particularly Andalusia and Catalonia, to visit ancestral towns and attend regional festivals. Finally, she wishes to mentor
    younger community members in cooking, gardening, and genealogy, passing on her practical knowledge while fostering intergenerational connections.
