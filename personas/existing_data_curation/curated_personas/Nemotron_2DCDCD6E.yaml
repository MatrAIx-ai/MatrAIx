  hobbies: '["Gardening", "Birdwatching", "Quilting", "Reading historical fiction", "Local art museum visits", "Genealogy research", "Cooking traditional Midwestern dishes", "Volunteering at senior center"]'
  career_goals: Although retired from formal employment, Erica aims to deepen her impact on Ellis’s senior community. She aspires to lead a weekly intergenerational art workshop that blends her love of
    painting and quilting with storytelling, preserving local history through oral interviews. She also wishes to master new digital tools—such as tablets and social‑media platforms—to stay connected with
    distant family and to archive her genealogy research online. Ultimately, Erica hopes to author a small memoir of her life on the Kansas plains, contributing a personal perspective to the town’s collective
    memory.
