personas:
  professional: Erica Jackson is a retired volunteer coordinator who channels their meticulous organizational talent into orchestrating senior‑center events, managing modest budgets, and facilitating intergenerational
    art workshops, all while juggling a gentle worry about deadlines.
  sports: Erica Jackson is a devoted fan of the Kansas City Chiefs and the Ellis High School basketball team, attends the seasonal high school football games at the local field, and participates in a senior
    walking club that meets twice a week at the county park, where they keep modest fitness goals and avoid overexertion.
  arts: Erica Jackson is an avid quilter and budding painter who draws inspiration from the warm Kansas sunsets, admires the works of Georgia O'Keeffe and Claude Monet, regularly visits the Ellis County
    Historical Museum’s art exhibit, and shares stories of local history through craft sessions at the senior center.
  travel: Erica Jackson prefers low‑key road trips, having driven to historic rail towns like Abilene and to the Colorado Springs Garden of the Gods, dreams of a gentle river cruise along the Mississippi,
    and always plans itineraries weeks in advance, packing extra medication and a notebook for birdwatching stops.
  culinary: Erica Jackson loves cooking classic Midwestern comfort foods such as chicken pot pie, cornbread, and a slow‑cooked beef stew, while also preserving the family’s heirloom tomato sauce and sprinkling
    fresh herbs like basil and dill, and they delight in baking apple crumble for church potlucks.
  core: Erica Jackson is a community‑centered elder whose curiosity about local history, methodical planning, and quiet nervousness blend into a life of steadfast service, creative quilting, and careful
    stewardship of health and money.
background:
  cultural: Erica grew up in a modest, white, Protestant family on the outskirts of Ellis, Kansas. Her upbringing was steeped in Midwestern values of self‑reliance, community service, and humility. The
    town’s annual county fair, the historic one‑room schoolhouse, and the local church have shaped her sense of belonging. Cultural influences from her German ancestry appear in family recipes and holiday
    traditions. Throughout her life, she has been part of close‑knit community circles—church groups, the senior center, and the local craft guild—where mutual support and shared heritage are celebrated.
    These experiences have fostered her appreciation for art, her dedication to collective well‑being, and her resilient yet sometimes anxious outlook.
attributes:
