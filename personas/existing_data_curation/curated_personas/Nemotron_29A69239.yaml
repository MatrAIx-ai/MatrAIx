  hobbies: '[''drawing and coloring'', ''building with LEGO Duplo'', ''jigsaw puzzles'', ''listening to music (jazz, R&B, children’s songs)'', ''story‑time at the library'', ''nature walks in local parks'',
    ''toddler art class at the community center'']'
  career_goals: David frequently talks about wanting to become an astronaut who explores space, a museum curator who cares for art, or an inventor who creates new gadgets. He is also fascinated by scientists
    who solve mysteries, reflecting his love of new ideas and unconventional thinking. Although he is only four, he sets small, concrete goals—like mastering reading simple books, building taller LEGO towers,
    and completing larger puzzles—that he believes will help him reach his big dreams.
