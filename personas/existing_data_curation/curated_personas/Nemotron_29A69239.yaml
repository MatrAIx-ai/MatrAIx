personas:
  professional: David Foushee, a curious four-year-old "junior architect" who meticulously stacks blocks into towering cityscapes, they plan each construction session on a tiny whiteboard, and they insist
    on following their own strict building rules before any playdate begins.
  sports: David Foushee, a lively four-year-old soccer enthusiast, they kick the ball for the Little Tigers Soccer Club, they cheer for the Washington Capitals during family game nights, and they prefer
    one-on-one drills over chaotic scrimmages, often competing with a determined grin to out-score a practice partner.
  arts: David Foushee, a four-year-old budding artist, they love to doodle colorful scenes after visits to the local history museum, they sing along to gospel classics by Mahalia Jackson, and they dance
    to upbeat tracks by Beyoncé while proudly displaying a crayon-filled sketchbook of family-inspired stories.
  travel: David Foushee, a four-year-old explorer, they have delighted in a day trip to the Smithsonian National Air and Space Museum in Washington, D.C., they spent a sunny afternoon building sandcastles
    at Virginia Beach, and they daydream about a future family cruise to the Caribbean islands where they can taste mangoes and see turquoise waters.
  culinary: David Foushee, a four-year-old food adventurer, they delight in creamy macaroni-and-cheese, they devour golden chicken nuggets with a side of honey-glazed carrots, and they proudly help stir
    banana-strawberry smoothies, insisting on adding a splash of vanilla yogurt for extra sweetness.
  core: David Foushee, a four-year-old with a methodical mind, they blend fierce curiosity, competitive play, and a deep appreciation for family traditions into a world of organized building, careful saving,
    and vibrant artistic expression.
background:
  cultural: David is raised in an African‑American family embedded in the vibrant community of Prince George’s County. His parents nurture a strong sense of heritage, celebrating Black History Month, attending
    church services with gospel music, and sharing stories of ancestors from the Southern United States and the Caribbean. The family often participates in local cultural events, such as museum visits,
    community festivals, and dance workshops that highlight African‑American art and music. Living in College Park, near the University of Maryland, gives David exposure to a diverse, academic environment,
    reinforcing values of curiosity, education, and cultural pride.
