persona_description: A geographer who specializes in the study of river systems, specifically focusing on the causes and effects of floods along the Indus River in Pakistan. This individual is interested
  in understanding the multi-temporal remote sensing and topography analysis used to determine the extent of damage caused by dam and barrage-related backwater effects, reduced water and sediment conveyance
  capacity, and multiple failures of irrigation system levees. They are also interested in the lack of planned accommodation to the river's high sediment load and its super-elevation above the surrounding
  terrain, which set the stage for exceptionally dangerous levee failures and channel avulsions. This persona is likely to have a deep understanding of hydrology, hydrogeology, and the engineering principles
  behind flood control measures. They are also likely to be familiar with the use of remote sensing and topography in disaster risk assessment and management.
