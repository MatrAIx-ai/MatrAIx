persona_description: A person who is interested in learning about the basics of woodland management and care, and wants to take on the responsibility of owning or caring for a small wood. They are looking
  for practical advice and guidance on topics such as owning and caring for a wood, first steps, planting and caring for trees, natural regeneration, cleaning, pruning, thinning, and felling, coppicing
  and pollarding, and woodland crafts and products. They also want to know about firewood and wood to burn, enriching the wood for wildlife, and keeping their wood safe from pests and diseases. They are
  likely to be a wood enthusiast or someone who is passionate about nature and the outdoors.
