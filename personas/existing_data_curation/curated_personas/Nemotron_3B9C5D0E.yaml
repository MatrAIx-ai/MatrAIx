personas:
  professional: Kimberly Bacon, a 21‑year‑old school bus driver in rural Wyoming, combines meticulous route planning, First Aid/CPR certification, and a psychology background to keep students safe while
    quietly creating digital illustrations for district newsletters, and they dream of mentoring new drivers and transforming buses into mobile art studios for rural children.
  sports: Kimberly Bacon enjoys solitary hikes on the Medicine Bow Trail, belongs to a local hiking club that meets monthly, follows the Denver Broncos on Sundays, and they support Hartville High School’s
    basketball team, while practicing yoga a few times a week to stay flexible for long driving shifts.
  arts: Kimberly Bacon immerses themselves in creative expression, sketching Wyoming landscapes for community newsletters, drawing inspiration from Ansel Adams’ photography and Georgia O’Keeffe’s abstract
    canvases, reading speculative fiction by Neil Gaiman, and they strum an acoustic guitar while listening to Sufjan Stevens during twilight meditation.
  travel: Kimberly Bacon prefers low‑key solo road trips to national parks like Yellowstone and Grand Teton, planning routes with paper maps and a vintage compass, and they dream of photographing the aurora
    borealis over Iceland’s volcanic terrain while staying within a modest budget.
  culinary: Kimberly Bacon favors hearty ranch‑style meals such as bison burgers and elk stew, balances them with vegetarian quinoa salads topped with roasted beets and local huckleberries, and they spend
    weekend evenings baking sourdough bread, occasionally treating themselves to a chicken‑fried steak as a guilty pleasure.
  core: Kimberly Bacon, a 21‑year‑old solitary driver‑artist, blends methodical responsibility with vivid imagination, they quietly nurture students, animals, and the land while saving for a mobile art
    bus and occasionally succumbing to late‑night speculative‑fiction marathons.
background:
  cultural: Kimberly grew up in a multi‑generational white family in rural Hartville, Wyoming, where values of self‑reliance, community service, and respect for the natural environment are deeply rooted.
    Her ancestry includes German and Scandinavian forebears who settled the region in the early 1900s, and family stories often highlight the balance between hard work on the family ranch and the importance
    of quiet reflection. The close‑knit community emphasizes modest celebrations, shared storytelling, and support for local schools and charities. While she cherishes this Western American heritage, Kimberly
    also embraces broader cultural influences through her love of global literature, abstract art, and an appreciation for the local Native American history, which she studies to better understand the region's
    diverse cultural tapestry.
attributes:
  skills: '["Safe large‑vehicle operation", "Route planning and schedule management", "First Aid/CPR certification", "Child supervision and safety", "Organizational record‑keeping", "Digital illustration",
    "Sketching and basic graphic design", "Creative problem solving", "Conflict mediation", "Time management"]'
  hobbies: '["Digital illustration", "Sketching landscapes", "Photography", "Reading speculative fiction and philosophy", "Creative writing (short stories and poetry)", "Acoustic guitar playing", "Solo
    hiking", "Volunteering at animal shelter", "Meditation and mindfulness", "Attending art gallery openings"]'
  career_goals: Kimberly aims to advance within the school transportation system by obtaining a Class B Commercial Driver's License and completing advanced child‑safety training. In the next few years she
    hopes to become a senior driver and mentor new drivers, eventually moving into a transportation coordinator role where she can apply her organizational and planning strengths. Parallel to her transportation
    career, she plans to finish an associate degree in early‑childhood education or social work, positioning her for a future transition into a school counseling or community outreach position that combines
    her compassion, intellectual curiosity, and love for supporting youth. Long‑term, Kimberly envisions creating a mobile art program that uses school buses as traveling studios to bring creative experiences
    to children in rural communities.
