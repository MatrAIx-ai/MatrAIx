personas:
  professional: Sonia Martin, an aspiring astronaut‑artist, merges disciplined LEGO rocket constructions with vivid space‑themed drawings, channeling their imaginative curiosity and meticulous focus into
    early science‑art projects.
  sports: Sonia Martin, a member of the Little Kickers Soccer Club, eagerly attends weekly practices, they cheer for the Chicago Cubs while watching games with family, and they burst with energy during
    weekend mini‑tournaments, always insisting on a post‑match ice‑cream reward.
  arts: Sonia Martin, whose evenings are filled with spontaneous dance routines to Disney’s ‘Frozen’ soundtrack, they spend afternoons sketching galaxies inspired by Hayao Miyazaki’s films, and they eagerly
    collect illustrated picture books by Eric Carle, letting vibrant colors shape their imagination.
  travel: Sonia Martin, whose dream itinerary includes a family trip to the Kennedy Space Center in Florida and an imaginative visit to a local science museum’s planetarium, they balance their yearning
    for outer‑space adventures with weekend outings to the nearby city park’s splash pad, while their parents budget for a future vacation to Paris to see the Eiffel Tower.
  culinary: Sonia Martin, who adores mac and cheese with extra cheddar, they build mini pizzas topped with pepperoni, pineapple, and bell peppers, proudly mix fruit smoothies using banana, strawberry, and
    orange juice, and occasionally sneak extra marshmallows into dessert.
  core: Sonia Martin blends boundless imagination with child‑like discipline, filling their days with vibrant space art, meticulous LEGO creations, and energetic group play, while they occasionally hoard
    glitter stickers and forget to tidy up their art supplies.
background:
  cultural: Sonia is a white American child raised in Houston, Texas, a vibrant, multicultural city. Her family embraces Southern Texan traditions—celebrating holidays such as Thanksgiving, the Fourth of
    July, and occasionally attending the Houston Livestock Show and Rodeo—while also enjoying the diverse cultural festivals that reflect the city’s rich ethnic tapestry. She is exposed to a blend of cultures,
    from Spanish language greetings in the neighborhood to multicultural art exhibits at local museums. Her upbringing emphasizes education, community involvement, and the value of sharing and kindness,
    shaping her respectful and cooperative outlook.
