  career_goals: Though only six, Sonia dreams big. She envisions herself as an astronaut who explores distant planets and sketches the alien landscapes she discovers. She also imagines becoming a scientist-inventor
    who creates new gadgets for children, blending art and technology. Inspired by her love for teaching others, she sometimes aspires to be a teacher who encourages curiosity and imagination in her future
    classroom. Her high standards drive her to aim for excellence in whichever path she chooses, with a focus on making a positive impact on the world.
