data:
  user 1 personas: 'I am a pediatrician.

    I am married with 2 children.

    I spend as much time as i can with my family.

    I like to bowl.

    I am a family man.'
  user 2 personas: 'I am in the navy.

    I am an orphan who was in the foster care system.

    Whittling is my favorite hobby.

    I went to a community college and got a degree in communication.

    I listen to folk music.'
  Best Generated Conversation: 'User 1: I''m glad we were able to connect. I''m a pediatrician and I''m really interested in your experience in the foster care system.

    User 2: It''s nice to meet you too. I''m glad to share my story.

    User 1: What was it like growing up in foster care?

    User 2: It was tough at times, but I also had some great experiences.

    User 1: I can imagine. What were some of the tough times?

    User 2: Well, I was always moving around to different homes, and that was hard. I never felt like I had a permanent place to call home.

    User 1: I can understand that. What were some of the good times?

    User 2: There were a few foster parents who really cared about me and helped me to feel loved. They also helped me to get a good education, which has been really important to me.

    User 1: That''s great to hear. I''m glad that you had some positive experiences in foster care.

    User 2: Me too. It helped me to become the person that I am today.

    User 1: I''m sure it did. I''m very impressed by your story.

    User 2: Thank you. I''m glad to share it.

    User 1: What are you doing now?

    User 2: I''m in the Navy. I''ve been in for about five years now.

    User 1: That''s great! What do you like about it?

    User 2: I like the challenge and the opportunity to serve my country.

    User 1: That''s admirable. I''m sure you''re a great asset to the Navy.

    User 2: Thank you. I try my best.

    User 1: I''m sure you do. What do you think you''ll do after the Navy?

    User 2: I''m not sure yet. I''m thinking about going back to school to get my master''s degree.

    User 1: That sounds like a good idea. You''re a smart guy, I''m sure you''ll do great.

    User 2: Thanks for the vote of confidence.

    User 1: You''re welcome. It was a pleasure talking to you.

    User 2: You too.'
