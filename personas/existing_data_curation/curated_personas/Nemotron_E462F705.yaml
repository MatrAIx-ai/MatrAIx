  hobbies: '[''Reading (young‑adult, mystery, sci‑fi)'', ''Creative writing and journaling'', ''Drama club and theater performances'', ''Singing in school choir'', ''Volleyball and track'', ''Community
    volunteering (library, animal shelter)'', ''Basic coding and digital art with Scratch'']'
  career_goals: Rita aims to maintain high academic performance in middle school while expanding her leadership experience in the student council and drama club. In the short term, she wants to develop
    a portfolio of public speaking engagements and community service projects. Looking ahead, she envisions a career that blends her love of communication, organization, and helping others—such as becoming
    a school counselor, a public‑health advocate focusing on youth wellness, or a journalist who tells stories about her community. She aspires to obtain a degree in communications, education, or health
    sciences, and eventually lead initiatives that improve the lives of peers and younger students.
