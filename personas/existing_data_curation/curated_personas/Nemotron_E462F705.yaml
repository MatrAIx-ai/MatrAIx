personas:
  professional: Rita Baixauli is an aspiring digital storyteller who blends their love of sci-fi novels with systematic Scratch programming and stage-craft experience, delivering short interactive games
    while they leverage their organized planning and talkative confidence to lead school tech workshops.
  sports: Rita Baixauli plays volleyball for the Brookside Middle School Lady Vipers, trains for the 200-meter dash with the school's track club, and they avidly follow the Seattle Seahawks and the U.S.
    women's national volleyball team during off-season.
  arts: Rita Baixauli dazzles audiences in the school drama club's productions of A Midsummer Night's Dream, sings alto in the choir performing songs by Lin-Manuel Miranda, and they fuel their imagination
    with novels by Sarah J. Maas and the music of Billie Eilish.
  travel: Rita Baixauli prefers weekend road trips to nearby state parks, has already visited the interactive science museum in San Jose, and they dream of touring the Harry Potter Studio Tour in London
    and the neon streets of Tokyo, always planning each adventure in a detailed spreadsheet despite limited vacation days.
  culinary: Rita Baixauli loves homemade pepperoni pizza topped with mozzarella and fresh basil, frequently bakes chocolate chip cookies with semi-sweet chocolate chips, and they enjoy experimenting with
    simple digital-art inspired food plating using colorful fruit and edamame.
  core: Rita Baixauli is a talkative, organized teen who juggles storytelling, coding, and performance while they constantly worry about the next deadline and occasionally stay up late scrolling through
    fan forums.
background:
  cultural: Rita grew up in Athens, Georgia, a small Southern city known for its strong sense of community and vibrant arts scene. Her family’s cultural background reflects typical Southern values such
    as hospitality, close family ties, and participation in local events like county fairs and community concerts. While her household is predominantly white and shares many of the region’s traditions—church
    gatherings, family barbecues, and support for school activities—Rita also experiences a growing diversity through school clubs, friendships, and the influence of the nearby University of Georgia. These
    experiences have fostered an appreciation for both traditional Southern customs and the broader cultural mix of contemporary small‑town America.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Public speaking'', ''Effective verbal communication'', ''Collaboration and teamwork'', ''Leadership in student organizations'', ''Practical
