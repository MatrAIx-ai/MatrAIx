persona_description: A person who is concerned with the health and well-being of their heart, particularly those who have had a heart attack or are at risk of having one. They are aware of the symptoms
  of a heart attack, the risk factors that can lead to a blockage in the coronary arteries, and the treatments available to manage and prevent heart attacks. They are interested in learning more about the
  causes of a heart attack, the different types of blood vessels in the body, and the importance of maintaining a healthy lifestyle to reduce the risk of heart disease. They are likely to be a patient,
  health-conscious individual who is motivated to take steps to protect their heart and prevent future heart attacks.
