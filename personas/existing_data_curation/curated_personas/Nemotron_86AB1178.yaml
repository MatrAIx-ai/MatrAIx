  career_goals: John aims to secure a stable, structured role that leverages his analytical and organizational strengths, such as an operations manager or project manager position within a midsize technology
    or renewable‑energy firm in the Santa Barbara area. Over the next 12 months he plans to earn a Project Management Professional (PMP) certification and complete a Lean Six Sigma Green Belt course to
    enhance his credentials. He also aspires to launch a part‑time consulting side business helping local small businesses streamline workflows and adopt data‑driven decision‑making. Ultimately, John wants
    a balanced career that provides predictable routines, professional growth, and the financial security needed to reduce his chronic worry about future stability.
