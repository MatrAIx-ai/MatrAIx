  career_goals: Justin aims to move from a crew position to a shift supervisor or assistant manager role within the next few years, focusing on enhancing his leadership and operational oversight abilities.
    He plans to enroll in a state‑approved Food Safety Manager certification to qualify for higher‑responsibility duties and to secure a more predictable schedule as he approaches retirement. Additionally,
    he hopes to mentor younger employees and explore a modest side venture, such as a weekend stand selling his homemade sauces at the local farmer’s market.
