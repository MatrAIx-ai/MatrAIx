  career_goals: Jarrod aims to position his church as a model of faith‑informed scientific literacy and community wellbeing. In the next five years he plans to launch a weekly Faith & Science lecture series
    that invites local scientists and theologians to dialogue with the congregation. He intends to expand the church’s digital presence by developing a high‑quality livestream platform and a podcast that
    reaches a regional audience. Recognizing the need for youth engagement, he will establish a STEM mentorship program partnered with area schools, offering a robotics club and summer coding camps. Professionally,
    Jarrod is pursuing a Doctorate in Theology with a concentration on the intersection of science and religion, and hopes to publish a book on that theme. He aspires to become a senior pastor overseeing
    multiple congregations within his denomination, using his organizational acumen to foster growth, increase weekly attendance by 20 %, and develop a mental‑health ministry that offers counseling and
    stress‑management workshops for members.
