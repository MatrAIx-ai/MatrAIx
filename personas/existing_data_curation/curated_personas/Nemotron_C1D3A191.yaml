personas:
  professional: Jarrod Lafferty, a 41‑year‑old senior pastor‑in‑training, blends rigorous scientific analysis with biblical exegesis, crafting sermons that weave astrophysics insights into theological narratives
    while they oversee church administration, digital outreach, and a strategic STEM mentorship program with the precision of a data‑driven project manager.
  sports: Jarrod Lafferty, a devoted Ohio outdoorsman, participates in a weekend pick‑up basketball league at the local YMCA, supports the Cleveland Browns and Cleveland Cavaliers, hikes the trails of Wayne
    National Forest, and they are an occasional member of the Ohio Trail Runners club for long‑distance treks.
  arts: Jarrod Lafferty, an avid acoustic guitarist, finds creative solace in playing folk classics by John Denver and contemporary worship songs by Chris Tomlin, while also curating a personal photography
    collection inspired by Ansel Adams and they regularly attend performances by the Columbus Symphony Orchestra.
  travel: Jarrod Lafferty, an avid hiker and family traveler, has explored the Great Smoky Mountains, the Oregon Columbia River Gorge, and the Scottish Highlands, and they dream of trekking Iceland’s Laugavegur
    trail and photographing the aurora borealis over Lapland.
  culinary: Jarrod Lafferty, a garden‑to‑table enthusiast, loves whipping up roasted beet and goat‑cheese salads, zucchini lasagna, and sourdough bread infused with rosemary from their backyard, though
    they sometimes let their experimental streak produce over‑spiced chili that the congregation politely enjoys.
  core: Jarrod Lafferty is a meticulous pastor‑scientist who channels worry into disciplined ministry, data‑driven projects, and experimental cooking, while they balance a love for hiking, basketball, guitar,
    and a quest for scientific‑theological harmony.
background:
  cultural: Jarrod was raised in a middle‑class, white, Midwestern family in Warren County, Ohio, where church life formed a central part of his upbringing. He identifies with a mainline Protestant tradition—specifically
    the United Methodist Church—and values the Midwest’s emphasis on community, modesty, and hard work. His parents encouraged both academic achievement and spiritual devotion, leading him to pursue a STEM
    graduate degree before feeling called to ordained ministry. The cultural fabric of Dayton and surrounding county—farmers markets, county fairs, high‑school sports, and strong volunteer networks—shapes
    his worldview. He respects traditional values, such as family responsibility and civic duty, while also embracing progressive ideas that integrate scientific understanding with faith. This blend of
    cultural heritage and educational background informs his inclusive, organized, and service‑oriented approach to both his clerical role and everyday life.
