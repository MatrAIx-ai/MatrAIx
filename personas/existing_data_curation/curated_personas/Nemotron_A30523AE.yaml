  career_goals: David aims to advance to a senior engineering role within the next three to five years, with aspirations to lead a small, collaborative development team where he can mentor junior developers
    while still contributing code. He is interested in shaping product architecture that balances innovative features with reliable, maintainable solutions. Over the longer term, he envisions transitioning
    into a tech‑lead position that allows him to influence project direction while maintaining the flexibility to pursue personal coding experiments and possibly a side venture focused on niche productivity
    tools.
