  hobbies: '["Traditional Mexican cooking","Fishing at Lake Houston","Backyard gardening (tomatoes, chilies, herbs)","Crossword puzzles","Chess","Attending small family gatherings and local cultural festivals","Volunteering
    at church food pantry"]'
  career_goals: Alejandro aims to transition into an inventory control supervisor role within the next two years, leveraging his disciplined approach to lead a team in achieving sub‑1% inventory variance.
    He plans to obtain the Certified Supply Chain Professional (CSCP) credential to formalize his expertise and to spearhead the adoption of RFID tagging across the warehouse to boost accuracy and traceability.
    Additionally, he intends to mentor younger associates, documenting his processes to ensure a smooth handover before retirement, and to explore part‑time consulting for small logistics firms in the Houston
    area after he steps down.
