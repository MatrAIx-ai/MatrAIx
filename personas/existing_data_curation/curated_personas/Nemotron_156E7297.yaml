personas:
  professional: Phil Wright, a diligent middle-school tech enthusiast, blends a love for Minecraft building mechanics with a budding curiosity for coding, and they often tinker with simple Python scripts
    to automate game mods while balancing homework obligations with a relaxed, sometimes chaotic schedule.
  sports: Phil Wright, a devoted fan of the Tennessee Titans and the local Mount Juliet High School Tigers, spends Saturday evenings cheering in the living room while also logging regular weekend fishing
    outings at Percy Priest Lake and hiking the Shelby Ridge Trail for fitness, and they often skip warm‑ups before intense hikes.
  arts: Phil Wright, an aspiring acoustic guitarist, spends evenings mastering classic country hits by artists like George Strait and Miranda Lambert, attends occasional Nashville concerts featuring Luke
    Combs, and they express their creativity further by meticulously assembling model car kits of vintage Chevrolet convertibles.
  travel: Phil Wright, who prefers short road trips over long flights due to parental constraints, enjoys weekend getaways to the Great Smoky Mountains for trail hikes and plans a future family pilgrimage
    to Nashville’s Country Music Hall of Fame, and they dream of a cross‑country road trip to visit the Grand Canyon.
  culinary: Phil Wright, a self‑taught low‑key chef, loves grilling their freshly‑caught catfish with lemon‑pepper seasoning, whipping up classic Southern comfort dishes like chicken and dumplings and slathering
    biscuits with honey butter, yet they frequently forget to eat breakfast before school, relying on quick cereal grabs.
  core: Phil Wright is a structure‑loving yet laid‑back teen who juggles Minecraft builds, country guitar riffs, and Titans fandom while habitually forgetting chores, and they treat midnight gaming marathons
    as their de‑facto routine.
background:
  cultural: Phil grew up in Old Hickory, a close‑knit suburb of Nashville, Tennessee, steeped in Southern traditions. His family values Southern hospitality, frequent barbecues, and Sunday church attendance,
    which have taught him politeness, cooperation, and a strong sense of community. The local culture of high‑school football, country music, and outdoor recreation like fishing and hiking shapes his leisure
    choices. He identifies with the regional pride in Tennessee’s music heritage and the emphasis on helping neighbors, reflecting the typical white Southern upbringing of his area.
attributes:
  skills: '[''Computer literacy (Word, Excel, Google Docs)'', ''Strategic video gaming and quick decision-making'', ''Following structured instructions for model building'', ''Cooperative teamwork and informal
    conflict mediation'', ''Basic mechanical tinkering (bike, car)'', ''Fundamental football and baseball skills'', ''Simple household chores and cooking'']'
  hobbies: '[''Video gaming (Minecraft, Fortnite)'', ''Playing acoustic guitar (country music)'', ''Fishing at Percy Priest Lake'', ''Hiking local nature trails'', ''Attending Nashville country music concerts'',
    ''Participating in church youth group activities'', ''Collecting and building model car kits'', ''Watching NFL and high-school football games'']'
  career_goals: He hopes to graduate high school and enroll in a technical college to become a certified automotive technician, aiming to work at a reputable repair shop in the Nashville area where he can
    combine his mechanical interests with his desire to help people. He also dreams of staying involved in his community, perhaps volunteering as a youth sports coach or helping out at his church’s outreach
    programs. For fun, he occasionally imagines turning his gaming talent into a small streaming channel, but his primary ambition stays grounded in a stable, hands-on career that lets him see immediate
    results.
