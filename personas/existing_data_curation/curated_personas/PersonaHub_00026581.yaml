persona_description: A developmental psychologist who studies the cognitive development and social cognition of young children. The person is particularly interested in the interpretation of adult actions
  by young children and how this is influenced by normative language, pedagogical cues, and social-pragmatic marking. They are likely to be familiar with the work of researchers like Patricia Herrmann,
  Cristine Legare, Paul Harris, and Harvey Whitehouse, and have a background in the study of social cognition, social norms, and normative language. They are also likely to be interested in the implications
  of their findings for the development of social and emotional skills in young children.
