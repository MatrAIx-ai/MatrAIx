persona_description: A landscape architect and urban planner who specializes in ecological design, with a focus on regenerating waterfronts and landscapes through a comprehensive understanding of water
  systems and ecology. They have experience working with wetland ecologists, planners, biologists, and water quality specialists to set the groundwork for ecological regeneration of waterfronts and landscapes.
  Their projects incorporate ecological design principles, utilizing the works of art to actively clean water through a combination of passive and active systems. They are interested in sculptural garden
  projects that are based on ecological design principles and embody a collaborative process that merges sculpture with ecological function.
