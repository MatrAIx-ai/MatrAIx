  career_goals: Christina aims to advance from a front‑line maintenance worker to a senior technician and eventually to a shift supervisor or maintenance manager within the next five to seven years. She
    plans to earn the Certified Maintenance & Reliability Technician (CMRT) credential and take associate‑level courses in industrial automation to deepen her PLC and robotics knowledge. Her ambition includes
    leading a maintenance team that consistently achieves the lowest equipment downtime in the plant, earning performance awards, and gaining a reputation for reliability and cost‑saving initiatives. Long‑term,
    she envisions starting her own small‑scale mechanical service business that provides on‑site repairs for local manufacturers, giving her the flexibility to balance work and community involvement while
    securing a stable income to purchase a home in Lawrence.
