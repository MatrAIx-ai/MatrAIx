  career_goals: Approaching retirement, Dennis aims to transition his extensive operational knowledge to the next generation by establishing a mentorship program within his company and consulting for small
    logistics firms. He is passionate about integrating sustainable transportation solutions—such as electric vehicle fleets and carbon‑reduction initiatives—into regional distribution networks. Additionally,
    he hopes to author a memoir that chronicles the evolution of the Midwest freight industry and to be recognized as a thought leader in supply‑chain excellence.
