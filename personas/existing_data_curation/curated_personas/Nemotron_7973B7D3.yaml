personas:
  professional: Henrietta Prenderville, a disciplined facilities cleaning professional, blends rigorous sanitation protocols, meticulous inventory control, and lean scheduling with her curiosity for art,
    using digital photography to document exhibit setups and championing eco‑friendly practices as she works toward the Certified Professional Cleaner credential.
  sports: Henrietta Prenderville is a dedicated hiker who explores the Ozark National Forest’s spring ridge treks, holds membership in the Baxter County Trail Club, follows the Arkansas Razorbacks basketball
    team and the St. Louis Cardinals baseball club, and participates in weekly low‑impact strength classes at the senior center to support joint health.
  arts: Henrietta Prenderville immerses herself in the art world by painting Ozark landscapes in oil and watercolor, attending regional fairs featuring works by Claude Monet, Georgia O'Keeffe, and local
    folk artist Mary Tillery, and devouring art‑history volumes that deepen her appreciation for Impressionist and American Regionalist styles.
  travel: Henrietta Prenderville favors scenic road trips that blend nature and culture, having driven the Blue Ridge Parkway in the fall, trekked the Great Smoky Mountains, and recently explored Oaxaca’s
    vibrant art festivals, while she dreams of a quiet retreat to the Canadian Rockies for winter sketching.
  culinary: Henrietta Prenderville enjoys crafting inventive comfort food, such as rosemary‑infused chicken and dumplings paired with heirloom tomato stew, often seasoning dishes with fresh thyme, sage,
    and wildflower honey harvested from her garden, while her cooking skill sits comfortably at an intermediate level.
  core: Henrietta Prenderville is a meticulous cleaner‑turned‑artisan whose disciplined checklists coexist with a restless curiosity for paint, plants, and pristine spaces, occasionally letting perfectionism
    spill into both work and hobby.
background:
  cultural: Henrietta was raised in a small farming community in northern Arkansas, where values of hard work, self‑reliance, and community participation were deeply ingrained. Her family attended a Methodist
    church and celebrated regional traditions such as folk music, storytelling, and Southern cuisine. While she identifies with mainstream White American culture of the area, she has cultivated an openness
    to broader cultural experiences through travel, museum visits, and her love of diverse artistic expressions. This blend of regional heritage and a curiosity for new ideas informs her perspective on
    both work and leisure.
attributes:
  skills: '[''Commercial cleaning and sanitation'',''Floor care (stripping, polishing, carpet cleaning)'',''Hazardous material handling and OSHA compliance'',''Inventory management and supply ordering'',''Shift
    scheduling and workflow optimization'',''Team training and performance monitoring'',''Basic facilities maintenance (light plumbing, electrical bulb replacement)'',''Quality control auditing'',''Documentation
    and record‑keeping'',''Sustainable cleaning practices'',''Art installation support and space preparation'',''Digital photography for documentation'']'
  hobbies: '[''Oil painting'',''Watercolor sketching'',''Visiting art fairs and galleries'',''Reading art‑history books'',''Gardening (native wildflowers and herbs)'',''Birdwatching'',''Jigsaw puzzles'',''Woodworking
    small projects'',''Cooking inventive comfort‑food meals'',''Hiking in Ozark National Forest'',''Volunteering at senior arts program'']'
  career_goals: Henrietta aims to earn the Certified Professional Cleaner (CPC) credential within the next year and use it to introduce lean, efficiency‑driven cleaning processes at her current workplace.
    Her medium‑term ambition is to move into a facilities‑manager or operations‑supervisor role overseeing multiple sites in Baxter County, where she can champion safety, sustainability, and high‑standard
    upkeep. Long‑term, she envisions launching a boutique consultancy that provides specialized cleaning and aesthetic‑maintenance services to local businesses and arts venues, merging her expertise in
    meticulous cleaning with her passion for art and community spaces. She also hopes to volunteer as a caretaker for the Gassville historical museum’s exhibits, applying her organizational skills to preserve
    local heritage.
