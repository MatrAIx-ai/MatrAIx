personas:
  professional: Rashelle Hedlund, a veteran retail stocker with over 20 years mastering inventory control, cycle counts, and visual merchandising, blends meticulous barcode scanning expertise with an artistic
    eye for store displays, and they are pursuing an APICS CPIM certification while aiming to become an Inventory Control Lead.
  sports: Rashelle Hedlund, a fervent Orlando Magic supporter and Orlando City SC season ticket holder, participates in a local adult swim league during summer, joins weekend yoga sessions at a community
    studio, and completes quarterly 5K charity runs, and they favor low‑impact activities that accommodate joint stiffness.
  arts: Rashelle Hedlund immerses themselves in the arts by frequenting the Orlando Museum of Art, collecting prints from contemporary visionary Yayoi Kusama, studying Georgia O'Keeffe's nature studies
    for inspiration, and curating monthly digital illustration workshops that blend speculative fiction motifs with abstract color theory, and they often share these creations with local youth groups.
  travel: Rashelle Hedlund combines structured planning with spontaneous curiosity, often weekend‑hopping to the Florida Keys for sunrise hikes, exploring the historic streets of Savannah, Georgia, and
    dreaming of a future pilgrimage to Kyoto's zen gardens and Iceland's surreal landscapes, all while budgeting travel through a points‑earned credit card.
  culinary: Rashelle Hedlund delights in cooking Mediterranean‑inspired meals, especially grilled branzino with lemon‑herb quinoa and fresh avocado‑lime salsa, while their succulent garden supplies herbs
    like rosemary and thyme they sprinkle liberally over dishes, despite a lingering habit of over‑seasoning.
  core: Rashelle Hedlund is a creatively disciplined inventory specialist who transforms warehouse precision into vibrant art, balances spreadsheets with watercolor splashes, and occasionally gets lost
    in a puzzle or a coffee‑driven brainstorming session.
background:
  cultural: Rashelle grew up in a middle‑class, predominantly white suburb of Central Florida, with family roots in the Midwest that instilled a strong work ethic blended with Southern hospitality. Raised
    in a Protestant community, holiday traditions like Thanksgiving and Christmas were central to family life. Living in Orlando’s tourism‑driven, multicultural environment exposed her to diverse cultural
    influences—especially Latin American and Caribbean music, cuisine, and public art—which sparked her love for storytelling and visual spectacle. These experiences enrich her appreciation for both practical
    reliability and creative expression, leading her to value community service, such as volunteering at local youth art programs, while maintaining mainstream American values of self‑reliance and teamwork.
attributes:
  skills: '[''Inventory management'', ''Order fulfillment'', ''Warehouse safety compliance'', ''Barcode scanning systems'', ''Retail WMS software (e.g., NetSuite, SAP)'', ''Training and mentoring of new
    staff'', ''Physical material handling'', ''Problem‑solving in logistics'', ''Visual merchandising basics'', ''Adaptability to new technology'']'
  hobbies: '[''Acrylic and watercolor painting'', ''Landscape and theme‑park photography'', ''Reading speculative fiction and art theory'', ''DIY home décor and upcycling projects'', ''Gardening (succulents,
    native plants)'', ''Puzzle solving (crosswords, Sudoku, jigsaw puzzles)'', ''Attending art galleries and museum events'', ''Digital illustration and graphic design tutorials'', ''Exploring Florida nature
    trails'']'
  career_goals: Rashelle aims to advance into a supervisory role such as Inventory Control Lead or Logistics Coordinator within her current retailer, leveraging her hands‑on experience to oversee a team
    and streamline supply‑chain processes. She plans to earn an APICS CPIM certification through evening courses to strengthen her analytical credentials. Parallel to her career progression, she aspires
    to launch a small side business offering custom art prints and framing services, merging her logistical expertise with her creative passions. She also hopes to volunteer as an arts mentor for local
    youth, using her combined skills to teach project planning and artistic techniques.
