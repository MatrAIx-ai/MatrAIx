persona_description: A cardiologist with expertise in atrial fibrillation treatment, who has been involved in the development of national guidelines for the management of this condition. They are familiar
  with the latest research findings and have a deep understanding of the treatment options available for patients with atrial fibrillation. The cardiologist is likely to be interested in the specifics of
  the new guidelines, such as the changes in the recommended treatment approach for patients who have failed medical therapy, and the new anti-arrhythmic agent dronedarone. They may also be interested in
  the potential advantages and disadvantages of different treatment strategies, such as the use of catheter ablation versus medication therapy.
