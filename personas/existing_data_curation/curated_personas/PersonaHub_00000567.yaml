persona_description: A space scientist who studies the effects of microgravity on microorganisms, particularly on the biofilm formation of Pseudomonas aeruginosa. They are interested in understanding how
  changes in the environment, such as gravity and flow, affect the growth and architecture of biofilms and how this can impact long-term spaceflight missions and human health. They have conducted experiments
  in microgravity and have published results showing that spaceflight can trigger changes in biofilm growth and architecture, which may have detrimental impacts on spaceflight missions and human health.
