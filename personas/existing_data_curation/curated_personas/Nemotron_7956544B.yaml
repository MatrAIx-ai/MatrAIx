personas:
  professional: John Orcutt is a freelance handyman and tech‑repair specialist who leverages his woodworking, automotive know‑how, and Arduino tinkering to offer quick, reliable fixes to suburban clients,
    while using their GIS mapping skills to plan efficient service routes and eyeing a future maker brand of modular outdoor kits.
  sports: John Orcutt fuels their fitness through weekend hikes in the Rockies, follows the Colorado Rockies baseball team, roots for the Denver Broncos as a casual fan, and occasionally joins a local climbing
    gym’s rope‑work class, preferring solo endurance over team sports.
  arts: John Orcutt captures alpine vistas with a DSLR inspired by Ansel Adams, curates a playlist of indie folk like Fleet Foxes for evenings of Arduino tinkering, and enjoys tactical board games such
    as Terraforming Mars with a tight‑knit group of friends, seeing these artistic pursuits as both a mental reset and a showcase for their problem‑solving flair.
  travel: John Orcutt prefers spontaneous, nature‑focused trips, having already tackled Rocky Mountain National Park, Yellowstone, and a weekend road‑trip to Banff, while dreaming of a rugged trek through
    Patagonia’s Torres del Paine and an Icelandic road‑trip that balances low‑cost camping with breathtaking scenery, and they often map routes using open‑source GIS tools.
  culinary: John Orcutt experiments with home‑brew batches of hoppy IPA using Cascade hops and adjusts malt ratios for flavor balance, while also mastering grilled salmon with lemon‑dill sauce and a side
    of roasted sweet potatoes seasoned with smoked paprika, reflecting a palate that values both bold hops and wholesome comfort food, and they share their latest brew with a small circle of friends during
    board‑game nights.
  core: John Orcutt is a solitary, curiosity‑driven maker who blends rugged outdoor pursuits with DIY tech, competes strategically in gaming, occasionally splurges on gadgets, and balances a laid‑back approach
    to obligations with a relentless drive to prove competence.
background:
  cultural: John is a White American raised in Parker, Colorado, a suburban community on the edge of the Denver metro area. His family lineage traces back to German and Irish immigrants who settled in the
    American West during the early 20th century. Growing up near the Rockies, he internalized a blend of middle‑class suburban values and the frontier spirit of self‑reliance, practicality, and respect
    for nature. The local culture emphasizes DIY projects, outdoor recreation, and an understated independence, which resonates with his personal worldview. While he shares broader American cultural norms,
    his identity is shaped by the mountain‑region ethos that prizes hands‑on skill, modest competition, and a healthy skepticism toward authority and rigid structures.
attributes:
  skills: '[''Basic carpentry and woodworking'', ''Automotive maintenance and repair'', ''Computer hardware assembly and troubleshooting'', ''Introductory GIS mapping and spatial data handling'', ''DIY
    electronics with Arduino/Raspberry Pi'', ''Outdoor navigation and map reading'', ''Basic plumbing and electrical repairs'', ''Data analysis with Excel and beginner Python'', ''Problem solving and critical
    thinking'']'
  hobbies: '[''Hiking and trail exploration'', ''Landscape and wildlife photography'', ''Reading non‑fiction (engineering, survival, self‑improvement) and science fiction'', ''DIY electronics projects with
    Arduino/Raspberry Pi'', ''Competitive online video gaming (strategy games)'', ''Home brewing craft beer'', ''Attending maker‑space workshops'', ''Small‑group board‑game nights with tactical focus'']'
  career_goals: John aims to translate his practical skill set into a sustainable, flexible livelihood that honors his preference for autonomy and modest competition. In the short term he plans to complete
    the remaining credits toward an associate degree in environmental technology, which will solidify his GIS knowledge and open doors to part‑time contract work with local park services or trail‑maintenance
    groups. Simultaneously, he is drafting a business plan for a freelance handyman and tech‑repair service targeting neighbors in Parker and the surrounding suburbs, emphasizing quick, reliable fixes for
    home improvement, basic automotive needs, and computer troubleshooting. Over the next five years he envisions expanding this venture into a small "maker" brand that sells custom outdoor accessories—such
    as modular shelter kits and DIY electronics kits—leveraging his woodworking and electronics background. Ultimately, he seeks a career path that provides financial independence, the freedom to choose
    projects, and opportunities to demonstrate his competence in a competitive, client‑focused market.
