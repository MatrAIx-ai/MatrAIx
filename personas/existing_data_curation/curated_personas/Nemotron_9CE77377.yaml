  career_goals: Deandre aims to transition from a high‑performing individual contributor to a regional sales manager within the next three years, guiding a team of reps while maintaining his personal sales
    quota. He aspires to earn industry certifications (e.g., Certified Sales Leader) and eventually step into a director‑level role where he can shape sales strategy for emerging service offerings. A long‑term
    ambition is to launch his own boutique consulting firm focused on helping small businesses adopt digital service solutions, leveraging his deep network in Chicago’s business community. Throughout, he
    seeks to balance career advancement with a sustainable work‑life rhythm that supports his family and mental well‑being.
