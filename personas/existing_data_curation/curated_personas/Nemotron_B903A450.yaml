personas:
  professional: Elana Reynolds works as a seasoned mental health counselor who blends trauma-informed care with watercolor art‑therapy techniques, leveraging her curiosity and flexible approach to craft
    personalized treatment plans while occasionally juggling disorganized scheduling.
  sports: Elana Reynolds enjoys weekend hikes on the Laurel Highlands trails, participates in a local walking club, watches the Pittsburgh Steelers on Sundays from her living room, and attends weekly yoga
    sessions at a community center, preferring low‑key, small‑group activities over large stadium crowds.
  arts: Elana Reynolds spends her evenings sketching watercolor scenes of the Allegheny River, attending performances at the Pittsburgh Repertory Theatre, and reading philosophy works by Nietzsche and Jung,
    while drawing inspiration from artists like Monet, O'Keeffe, and local folk painter Mary H. Gaskill.
  travel: Elana Reynolds loves exploring the rolling hills of the Laurel Highlands, has taken a road trip to the historic town of Marquette, Michigan, dreams of a quiet retreat in Kyoto’s Zen gardens, and
    plans future visits to European villages that echo the communal festivals of her own upbringing, all while balancing travel costs with a modest savings plan.
  culinary: Elana Reynolds enjoys cooking hearty stews with root vegetables from her garden, frequently prepares fresh rosemary‑infused roasted chicken, savors a perfectly brewed pour‑over coffee, and delights
    in pairing meals with locally brewed craft beers, though she occasionally over‑indulges in midnight chocolate truffles.
  core: Elana Reynolds is a reflective, art‑infused counselor who balances a love for quiet creativity with occasional forgetfulness and a steadfast commitment to nurturing both her clients and her own
    well‑being.
background:
  cultural: Elana grew up in a middle‑class, Irish‑German suburb of the Pittsburgh metropolitan area, raised in a Catholic household that emphasized community service and modesty. The industrial heritage
    and resilient spirit of Allegheny County shaped her appreciation for hard work and solidarity. As an adult, she embraced a more eclectic worldview, drawing on regional folk traditions, local folk art,
    and the diverse cultural tapestry of Western Pennsylvania. Her cultural identity blends a respect for her European ancestry with a deep connection to the rhythms and artistic expressions of her hometown.
attributes:
  skills: '[''Active Listening'', ''Empathy and Self‑Awareness'', ''Crisis Intervention'', ''Trauma‑Informed Care'', ''Individual Counseling'', ''Small‑Group Facilitation'', ''Case Management'', ''Psychological
