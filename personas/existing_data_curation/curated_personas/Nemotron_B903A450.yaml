  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Small‑Group Theater'', ''Philosophy and Psychology Reading'', ''Reflective Journaling'', ''Hiking Local Trails'', ''Gardening'', ''Yoga
    and Mindfulness'', ''Volunteering at Community Art Workshops'']'
  career_goals: Elana aims to obtain full licensure as a Professional Counselor (LPC) and eventually open a private practice that emphasizes art‑infused therapy for adults navigating life transitions, such
    as divorce and career changes. She aspires to develop community workshops that blend mindfulness, creative expression, and resilience building, and to mentor newer counselors in incorporating unconventional
    therapeutic techniques. Long‑term, she hopes to author a guidebook on integrating artistic practices into mental health counseling and to present her work at regional mental‑health conferences.
