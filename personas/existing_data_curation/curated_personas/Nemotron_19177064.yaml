  career_goals: Rose aims to advance to a regional Visual Merchandising Manager role within the next three years, overseeing multiple store locations across the Midwest. She wants to develop a mentorship
    program for junior display artists, champion eco‑friendly display materials, and eventually launch a consulting side‑business that helps independent boutiques create compelling window installations.
    Her long‑term ambition is to leave a legacy of innovative yet practical visual storytelling that drives both sales and community pride.
