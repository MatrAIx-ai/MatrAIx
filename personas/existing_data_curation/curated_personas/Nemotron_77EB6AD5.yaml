personas:
  professional: Johnnie Henley, a 74‑year‑old community organizer in Woodson, uses their practical yet curious mindset to mediate conflicts, write concise grant proposals, allocate scarce resources, and
    sustain senior assistance and community garden programs while they mentor volunteers and navigate funding challenges with a skeptical, competitive edge.
  sports: Johnnie Henley enjoys early‑morning fishing on the nearby lake, follows the Arkansas Razorbacks men's basketball team and the St. Louis Cardinals baseball club, participates in a senior‑center
    walking club, and occasionally joins a casual 8‑man softball league, showing they blend low‑impact activity with loyal fanhood.
  arts: Johnnie Henley, a devoted church choir member, finds comfort in classic country legends like Johnny Cash, Dolly Parton, and Southern gospel groups such as The Martins, while also reading Arkansas
    history books and appreciating folk art at the local heritage museum, and they let music and storytelling shape their quiet evenings.
  travel: Johnnie Henley prefers short road trips to nearby historic sites like the Ozark National Forest and the Memphis blues scene, dreams of a pilgrimage to the National Civil Rights Museum, and they
    balance travel plans with limited mobility and a modest budget.
  culinary: Johnnie Henley, an avid gardener, delights in cooking garden‑fresh meals such as fried catfish with corn succotash, collard greens seasoned with smoked ham hocks, and peach cobbler, and they
    often share recipes at community potlucks, though they sometimes over‑salt dishes out of habit.
  core: Johnnie Henley is a pragmatic, curious elder who blends community leadership with quiet garden reflection, competitive bridge play, and a gentle, skeptical charm, and they inspire both confidence
    and healthy skepticism in those around them.
background:
  cultural: Johnnie’s cultural background is rooted in the Southern Appalachian and Deep South traditions of rural Arkansas. Raised in a Protestant family, he grew up with a strong emphasis on community
    solidarity, self‑reliance, and respect for older generations. The local customs of woodcraft, share‑food gatherings, church‑based service, and a love for the outdoors have shaped his values and his
    approach to community work.
