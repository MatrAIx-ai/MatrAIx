personas:
  professional: Dolores Stone, a psychiatric technician with a meticulous eye for documentation and a calm, routine-driven approach, leverages her crisis-intervention expertise and community-resource knowledge
    to keep her rural unit running like a well-oiled machine while aspiring to lead and later supervise the mental-health team.
  sports: Dolores Stone enjoys gentle hikes along the prairie trail, participates in a seasonal line-dancing group that doubles as a low-impact cardio class, cheers on the Kansas City Chiefs on Sundays,
    and holds a membership in the Sully County Birdwatchers' Society, which satisfies her love for quiet, routine-based outdoor activity.
  arts: Dolores Stone immerses herself in cozy mystery novels by Agatha Christie and classic Midwestern literature like Willa Cather's My Antonia, while winding down to the soothing strums of John Prine
    and Dolly Parton, and she finds artistic solace in knitting to folk-bluegrass playlists that mirror her love for steady, structured creativity.
  travel: Dolores Stone prefers meticulously planned road trips to nearby prairie preserves and historic small towns like Lindsborg, balances her love for relaxation with occasional adventurous hikes in
    the Rocky Mountains, and dreams of a quiet cultural pilgrimage to the rolling green countryside of Ireland, all while budgeting her travel around her modest income and volunteer commitments.
  culinary: Dolores Stone enjoys preparing hearty comfort dishes such as chicken pot pie, beef stew with root vegetables, and homemade cornbread, skillfully seasoning with rosemary, thyme, and a dash of
    paprika while occasionally indulging in a slice of apple crumble after her quilting sessions.
  core: Dolores Stone blends disciplined routine with gentle creativity, turning patient care, quilting, and community service into a harmonious, if sometimes worry-laden, rhythm of purpose.
background:
  cultural: Dolores is a white Midwesterner with likely German‑Scandinavian ancestry, raised in a small farming community in South Dakota. Her cultural upbringing emphasizes self‑reliance, practicality,
    modesty, and strong community ties. She identifies with conservative, traditional values, participates in a Protestant (likely Lutheran) church, and values volunteerism, neighborly support, and a deep
    connection to the land. This background fosters a respect for routine, a preference for familiar practices, and a commitment to harmonious relationships within her rural setting.
attributes:
  skills: '[''Patient observation and documentation'', ''Medication administration and monitoring'', ''Crisis intervention and de‑escalation'', ''Therapeutic communication'', ''Facilitation of small therapeutic
    groups'', ''Electronic health record management'', ''Collaboration with multidisciplinary teams'', ''Routine scheduling and treatment plan implementation'', ''Basic counseling and emotional support'',
    ''Knowledge of rural community mental‑health resources'']'
  hobbies: '[''Gardening (vegetable garden)'', ''Quilting and knitting'', ''Reading cozy mystery novels'', ''Cooking Midwestern comfort foods'', ''Attending church social events'', ''Volunteering at community
    food bank'', ''Birdwatching'', ''Prairie trail walks'', ''Line dancing'', ''Journaling for stress management'', ''Crossword puzzles'', ''Listening to country and folk music'']'
  career_goals: Dolores aims to become a Lead Psychiatric Technician within the next three years, completing her associate’s degree and obtaining the Certified Psychiatric Rehabilitation Practitioner (CPRP)
    credential. She hopes to transition to a Licensed Practical Nurse (LPN) role to broaden her clinical responsibilities. Long‑term, she aspires to develop a peer support program for patients in Sully
    County and eventually take on a supervisory position overseeing mental‑health services at the regional community health center, ensuring consistent, high‑quality care for the rural population.
