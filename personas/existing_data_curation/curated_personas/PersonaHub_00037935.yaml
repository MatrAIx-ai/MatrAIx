persona_description: A climate scientist who specializes in studying tropical cyclones and their impacts on the environment, particularly in the Indian Ocean and southern Africa. She is currently working
  on a study that examines the changes in tropical cyclone activity and their movement patterns in the region over the past 66 years, and is also investigating the impact of global warming on citrus trees
  in Iran. She is concerned about the potential for increased damage from tropical cyclones in southern Africa and the impact of global warming on citrus crops in South Africa and Iran.
