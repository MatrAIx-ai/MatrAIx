personas:
  professional: Kwang Xiong is a budding LEGO architect who merges boundless curiosity with a practical eye for following instructions, and they stay reliably attentive to school assignments while flexibly
    improvising new builds, balancing a cooperative spirit with occasional assertiveness when sharing creations.
  sports: Kwang Xiong loves kicking a soccer ball at the neighborhood park and playing on the Philly Mini Kickers youth league, they eagerly follow the Philadelphia Union's matches on weekends, and they
    balance energetic practice with short, playful breaks to stay focused and avoid overexertion.
  arts: Kwang Xiong eagerly draws favorite cartoon heroes like Elsa from Frozen and Woody from Toy Story, they spend afternoons sketching in a bright notebook, they enjoy listening to pop tunes by BTS alongside
    the folk melody "Jasmine Flower" during calligraphy practice, and they occasionally mimic the brush strokes of classic masters they see in family videos.
  travel: Kwang Xiong dreams of future trips to see the Great Wall and Tokyo's vibrant streets, they have already explored the Franklin Institute in Philadelphia and the National Air and Space Museum in
    Washington, D.C., and they prefer family‑planned weekend getaways that blend playful discovery with a touch of cultural learning.
  culinary: Kwang Xiong delights in making simple jiaozi dumplings with their mother and loves devouring pepperoni pizza, they often request cheesy fried rice with peas and carrots at home, and they proudly
    snack on apple slices while practicing their tiny hands at rolling out dough.
  core: Kwang Xiong is a curious, organized six‑year‑old who builds intricate LEGO worlds, saves pennies in a pink piggy bank, dashes off to soccer practice, practices calligraphy with careful strokes,
    yet sometimes forgets to tidy their crayons, and they turn their bedroom into a colorful, chaotic masterpiece.
background:
  cultural: Kwang is raised in a Chinese immigrant family in Philadelphia. At home, Mandarin and English are spoken, and cultural traditions such as Lunar New Year celebrations, dumpling making, and giving
    red envelopes are observed. He participates in local Chinese community events in Chinatown and attends a public elementary school where his classmates are culturally diverse. His parents emphasize respect
    for elders, the value of education, and balancing heritage with American life, which shapes his daily routines and outlook.
attributes:
