  hobbies: '[''LEGO building'', ''Drawing'', ''Reading picture books'', ''Soccer'', ''Educational tablet apps'', ''Basic Chinese calligraphy'', ''Listening to music'', ''Attending community festivals'']'
  career_goals: Kwang dreams of becoming an engineer or scientist who designs useful inventions, such as household robots, and he is fascinated by space exploration, hoping one day to work as an astronaut.
    In the short term, he aims to improve his reading and math skills, learn to code simple programs on a tablet, and become proficient in Mandarin so he can converse fluently with his grandparents.
