  career_goals: Inspired by her curiosity about how things work and a desire to give back to her community, Uriel aims to pursue a career in civil engineering with a focus on sustainable infrastructure.
    She envisions earning a degree in engineering or environmental science, then designing eco-friendly public works that serve diverse neighborhoods in Rockford. Alongside this technical path, she hopes
    to mentor bilingual students through after-school programs, combining her technical expertise with her cultural background.
