personas:
  professional: Uriel Baerga, a 14‑year‑old aspiring robotics designer, blends curiosity with methodical planning to lead the school robotics club’s programming tasks, while maintaining a reliable schedule
    that balances weekly guitar practice and digital art sessions to keep the creative spark alive.
  sports: Uriel Baerga enjoys Saturday morning hikes with the local Adventure Club, plays on the middle‑school soccer team, cheers for the Los Angeles Galaxy, follows the Los Angeles Lakers for basketball,
    and watches the LA Dodgers in baseball, all while adhering to a structured weekly fitness plan that balances cardio and flexibility.
  arts: Uriel Baerga channels creative energy by sketching digital fan art inspired by Beeple, crafting short sci‑fi stories reminiscent of N.K. Jemisin, strumming guitar to a playlist that mixes early‑era
    folk singers like José Alfredo Jiménez with modern indie rock bands like Arctic Monkeys, and rehearsing folkloric Mexican dance on weekends, letting cultural rhythm shape their artistic expression.
  travel: Uriel Baerga plans trips with meticulous checklists, favoring a blend of adventure and relaxation—having hiked the Grand Canyon and explored the historic streets of Guanajuato, they now dream
    of wandering Kyoto’s temples and Iceland’s glaciers on a future family vacation, while budgeting each outing in their journal.
  culinary: Uriel Baerga loves cooking traditional Mexican dishes such as mole poblano, pork‑filled tamales, and chiles en nogada with roasted poblano peppers, walnuts, and pomegranate seeds, confidently
    handling complex sauces yet still experimenting with simple avocado toast when time runs short.
  core: Uriel Baerga is a methodical teen who balances a passion for robotics, art, and Mexican folk traditions with a stubborn habit of checking the fridge for snacks while procrastinating on school projects.
background:
  cultural: Uriel comes from a Mexican-American family that maintains strong ties to its heritage. She speaks Spanish at home and celebrates cultural traditions such as Dia de los Muertos, quinceanera preparations,
    and Mexican holiday foods. Her family's values emphasize close-knit relationships, respect for elders, and community involvement, which she experiences through local Catholic parish events and neighborhood
    gatherings. Living in Rockford, she blends these traditions with Midwestern culture, participating in school and community activities while preserving her bilingual identity.
