persona_description: A historian who specializes in the history of the Spanish conquest of the American Southwest, particularly focusing on the interactions between the Spanish colonizers and the indigenous
  populations. Their research interests include the cultural and social impacts of the Spanish presence, the impact of the Spanish conquest on the indigenous populations, and the development of the Spanish
  colonial administration in the region. They are particularly interested in the role of the indigenous populations in the Spanish conquest and the impact of the Spanish conquest on the indigenous societies.
