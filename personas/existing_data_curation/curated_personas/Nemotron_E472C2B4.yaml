personas:
  professional: Jose Duenas, a budding social media coordinator in training, merges bilingual communication, meticulous event planning, and a flair for graphic design to amplify community arts initiatives,
    channeling their curiosity, organized nature, and sociable energy into campaigns that resonate across diverse audiences.
  sports: Jose Duenas, a fervent supporter of LA Galaxy and midfielder for the local amateur club Corona United, devotes weekend evenings to pickup soccer matches and weekly spin classes, treating fitness
    as a communal ritual that fuels their sociable spirit.
  arts: Jose Duenas, an avid follower of the Southern California mural scene, spends weekends photographing large‑scale works by artists like Nina Pandolfo and JR, while their acoustic guitar sessions echo
    the rhythms of Vicente García and Café Tacvba, and they frequent indie film screenings featuring directors such as Alejandro González Iñárritu.
  travel: Jose Duenas prefers spontaneous weekend road trips to coastal escapes like Santa Barbara and Tulum, yet meticulously budgets each journey using travel‑planning apps, dreaming of a future backpacking
    trek through the Andes to Machu Picchu.
  culinary: Jose Duenas, an enthusiastic home cook, recreates cherished family dishes such as pork pozole, chicken tamales, and chilaquiles with a moderate skill level, often experimenting with fresh cilantro,
    roasted chilies, and homemade salsa verde while also enjoying street‑taco nights with friends.
  core: Jose Duenas blends a restless curiosity and organized mind with a penchant for anxiety‑driven budgeting, turning community art, guitar, and soccer into both creative outlets and social glue.
background:
  cultural: Jose is a first‑generation Mexican‑American raised in Corona, CA, within a bilingual household where Spanish is spoken at home and English at school. He celebrates Mexican traditions such as
    Día de los Muertos, Cinco de Mayo, and family gatherings featuring tamales, pozole, and other regional dishes. His upbringing emphasizes strong family bonds, respect for elders, and community involvement.
    Influenced by Southern California's rich Hispanic culture, he values artistic expression, especially through murals and music, and maintains a deep connection to his Mexican heritage while navigating
    a diverse, multicultural environment.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Social media content creation'', ''Event coordination'', ''Basic graphic design (Canva, Photoshop)'', ''Photography'', ''Community outreach and
