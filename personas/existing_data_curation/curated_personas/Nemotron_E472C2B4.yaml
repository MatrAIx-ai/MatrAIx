  hobbies: '[''Visiting art galleries and mural tours'', ''Playing acoustic guitar'', ''Cooking Mexican cuisine'', ''Playing soccer'', ''Photography (street and portrait)'', ''Reading about philosophy,
    science, and new ideas'', ''Volunteering at community events and festivals'', ''Exploring new cafés and restaurants'', ''Watching independent films'', ''Social gaming with friends'']'
  career_goals: Jose aims to enroll in a community college program in marketing or communications to formalize his skills and secure a stable entry‑level position as a social media coordinator for a local
    cultural organization. He envisions progressing to a community outreach director role where he can blend his passion for art, cultural events, and bilingual communication to strengthen community ties.
    Long‑term, he hopes to launch his own small venture—perhaps a pop‑up shop or food‑truck featuring Mexican cuisine—while maintaining a work‑life balance that mitigates his stress and anxiety.
