personas:
  professional: Brittany Marty is a budding marine‑science communicator who blends her curiosity about oceanography with practical advocacy, using her talent for digital illustration, debate skills, and
    TikTok storytelling to raise awareness while maintaining a disciplined yet adaptable approach to organizing beach clean‑ups and school projects.
  sports: Brittany Marty rides Pacific waves with her high‑school surf club, seasons her fitness routine with early‑morning surf sessions in summer, snorkeling trips in fall, and follows the San Diego Wave
    FC women's soccer team while occasionally joining weekend beach‑volleyball pick‑ups at the local community center.
  arts: Brittany Marty channels her love of marine life into vivid digital illustrations inspired by artists like Loish and photographer Brian Skerry, curates a TikTok gallery of seaside sketches set to
    Jack Johnson’s acoustic tracks, and unwinds with sci‑fi series such as "The Expanse" while listening to Ramin Djawadi’s scores.
  travel: Brittany Marty dreams of snorkeling the coral gardens of the Great Barrier Reef and catching sunrise surf at Hawaii’s Waimea Bay, typically mapping trips on a shared family spreadsheet, balancing
    school commitments with weekend getaways to nearby coastal towns like Santa Cruz and Monterey.
  culinary: Brittany Marty favors ocean‑inspired cuisine— from fresh poke bowls brimming with ahi tuna, avocado, and seaweed to homemade fish tacos seasoned with lime and cilantro— but when exam stress
    peaks, she impulsively raids the pantry for bags of chips and sugary soda.
  core: Brittany Marty is a curiosity‑driven teenage surfer who blends meticulous, eco‑focused activism with a habit of stress‑induced video‑game binges and nightly mindfulness journaling.
background:
  cultural: Brittany is a white American teen raised in the affluent, coastal suburb of Corona del Mar in Orange County, California. Her family reflects typical middle‑class Southern‑California values,
    emphasizing education, community involvement, and an active outdoor lifestyle. Growing up near the Pacific, she has internalized a beach‑oriented culture that celebrates surfing, environmental stewardship,
    and a laid‑back yet responsibility‑driven ethos. While her immediate cultural environment is predominantly white, the broader Orange County community’s diversity has exposed her to a range of cultural
    perspectives, fostering an open‑minded attitude toward multicultural interactions and global environmental concerns.
attributes:
  skills: '[''Computer literacy (Google Workspace, Microsoft Office)'', ''Introductory HTML/CSS coding'', ''Creative writing and journaling'', ''Project organization and time‑management'', ''Basic smartphone
    photography and editing'', ''Science‑fair model construction (environmental focus)'', ''Team collaboration in school clubs'']'
  hobbies: '[''Surfing and ocean activities'', ''Beachcombing and snorkeling'', ''Drawing and digital illustration'', ''Reading science‑fiction and marine science articles'', ''Volunteer beach clean‑ups'',
    ''School debate club'', ''Strategic video gaming'', ''Journaling and mindfulness practices'', ''Creating short TikTok/Instagram content'']'
  career_goals: Brittany envisions a future that lets her combine her love of marine ecosystems with tangible problem‑solving. She aims to study marine biology or environmental science at a university,
    focusing on coral‑reef conservation and climate‑impact research. She hopes to work in a research or policy role where she can translate scientific findings into practical solutions for coastal communities.
    In the meantime, she plans to deepen her coding knowledge to eventually contribute to data analysis and citizen‑science platforms, and she seeks leadership opportunities in her school’s environmental
    club to build the organizational experience she values.
