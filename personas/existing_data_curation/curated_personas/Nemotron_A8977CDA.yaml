personas:
  professional: Iris Mann, a seasoned facilities management veteran with over 25 years steering Chicago corporate campuses, merges methodical risk assessments, data‑driven preventive maintenance, and aggressive
    cost‑control with a competitive drive to champion IoT‑enabled sustainability initiatives and mentor emerging talent toward regional leadership.
  sports: Iris Mann spends her weekends walking the quiet lakeside trails of the Chicago Lakefront, supplements her routine with gentle yoga at a nearby studio, proudly holds season tickets for the Chicago
    Cubs, and belongs to the Chicago Trail Runners club, preferring low‑impact endurance over team sports.
  arts: Iris Mann cultivates a solitary artistic outlet through nature photography reminiscent of Ansel Adams, regularly attends Chicago Symphony Orchestra performances of Mahler, and finds solace in vinyl
    records of folk legend Bob Dylan, weaving these influences into her own reflective aesthetic.
  travel: Iris Mann favors meticulously planned, low‑key escapes that blend sustainability with scenery, having explored the Oregon Coast’s lighthouse trails, the Scottish Highlands’ misty lochs, and the
    meticulously curated gardens of Kanazawa, Japan, always opting for train travel or carbon‑offset flights to align with her eco‑conscious values.
  culinary: Iris Mann, an adept home chef, transforms her garden’s seasonal bounty into dishes like rosemary‑infused roasted carrots, fresh basil pesto over whole‑grain pasta, and heirloom tomato gazpacho,
    often finishing meals with locally sourced goat cheese and a splash of heirloom balsamic vinegar.
  core: Iris Mann combines a quietly competitive edge with an obsessive love for order, spending evenings cataloguing garden data, tweaking IoT sensors, and methodically solving 1,000‑piece puzzles, all
    while shunning social gatherings that disrupt her meticulously balanced routine.
background:
  cultural: Iris was raised in a suburban community just outside Chicago, in a family of German and Irish descent that emphasized hard work, modesty, and self‑reliance—values typical of the Midwestern work
    ethic. The region's appreciation for practicality, community responsibility, and the natural landscape has shaped her worldview. While she respects traditional holidays and family gatherings, she prefers
    low‑key, quiet celebrations and values personal space and solitude, reflecting the balance of curiosity and practicality that defines her personality.
attributes:
  skills: '[''Facilities Operations Management'', ''Preventive Maintenance Planning'', ''Budgeting & Cost Control'', ''Vendor Contract Negotiation'', ''Regulatory Compliance (OSHA, ADA)'', ''Energy Management
    & Sustainability'', ''Project Management'', ''Risk Assessment'', ''Space Planning'', ''Team Leadership'', ''Data Analysis & Reporting'']'
  hobbies: '[''Reading (historical non-fiction)'', ''Gardening'', ''Birdwatching'', ''Nature photography'', ''Hiking in forest preserves'', ''Jigsaw puzzles'', ''Cooking seasonal meals'', ''Podcast listening'']'
  career_goals: Iris aims to advance to a regional facilities director position within the next three to five years, where she can oversee multiple locations and champion organization‑wide sustainability
    programs, such as achieving LEED certification and implementing Net‑Zero energy goals. She is also interested in mentoring emerging facilities professionals and, later in her career, transitioning into
    a consulting role that leverages her expertise in cost‑efficient building operations and strategic facility optimization.
