personas:
  professional: Tina Christman, a 17‑year‑old GED candidate, leverages her self‑directed learning to master HTML/CSS, digital photography, and basic automotive repairs, channeling her competitive yet reserved
    nature into a clear plan to become an environmental technician or park ranger.
  sports: Tina Christman’s athletic routine centers on solo hikes along the Mount Shasta trail network and seasonal cross‑country runs, while they cheer for the Sacramento River Cats and belong to a local
    youth climbing club that meets on weekends.
  arts: Tina Christman expresses creativity through landscape photography inspired by Ansel Adams, upcycling furniture with a DIY aesthetic reminiscent of Joanna Gaines, and playlists that feature Sufjan
    Stevens, The National, and local folk singer‑songwriter bands.
  travel: Tina Christman prefers low‑key, self‑planned adventure trips, having trekked through Lassen Volcanic National Park and dreaming of a solo backpacking journey through the Canadian Rockies, always
    mapping routes offline to avoid reliance on cellular service.
  culinary: Tina Christman enjoys simple, hearty meals like campfire‑grilled trout seasoned with rosemary and thyme, makes homemade granola bars with oats, honey, and dried berries, and is comfortable fixing
    a one‑pot pasta but usually skips elaborate recipes.
  core: Tina Christman is a solitary, curiosity‑driven teen who turns solitary hikes into photo essays, saves every spare dollar for future gear, and stubbornly refuses to ask for help even when they could
    benefit from it.
background:
  cultural: Tina comes from a white, middle‑class family with mixed German and Irish ancestry that has lived in Redding for several generations. Her upbringing reflected the Pacific Northwest’s emphasis
    on self‑reliance and outdoor recreation; family weekends often involved camping, fishing, and attending local county fairs. While her family celebrates mainstream American holidays, they also maintain
    a modest tradition of seasonal community gatherings at the Shasta County historical museum. Growing up in a region marked by forest industries and a strong conservation ethic has shaped her respect
    for nature and her desire to work in environmental stewardship. Though she left formal schooling before ninth grade, she was exposed to community‑based programs that encouraged practical skill building
    and independent learning.
attributes:
  skills: '["Basic computer operation and troubleshooting", "Simple HTML/CSS web page creation", "Digital photography (composition and editing)", "Orienteering and map reading", "Basic automotive maintenance
    (oil change, tire checks)", "Hand‑sewing and clothing repair", "Basic woodworking and DIY upcycling"]'
  hobbies: '["Solo hiking and trail photography", "Science article blogging", "Strategic video games (e.g., puzzle and simulation titles)", "Small‑group board games (chess, Scrabble)", "Journaling for self‑reflection",
    "DIY upcycling and basic carpentry"]'
  career_goals: Tina aims to complete her GED within the next year and enroll in a community college program focused on environmental technology or wildlife management. She hopes to earn certifications
    in land‑management and eventually work as a park ranger or environmental technician protecting the forests and waterways around Shasta County. Because she enjoys competitive environments, she also plans
    to pursue an apprenticeship in automotive technology, where she can blend her hands‑on skills with a clear performance ladder, ultimately moving toward a supervisory role.
