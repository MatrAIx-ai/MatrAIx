persona_description: Keri Heilman, a Ph.D. candidate at the University of North Carolina, Chapel Hill, is conducting a research project funded by the Australian Childhood Foundation (ACF) to evaluate the
  effectiveness of the Safe & Sound Protocol (SSP) in children with a trauma history. The SSP is a neuromuscular exercise designed to rehabilitate and normalize the acoustic transfer function of the middle
  ear structures by using acoustic stimulation to exercise neural regulation of the middle ear structures. The current study aims to evaluate the efficacy and feasibility of the SSP using objective measures
  such as changes in acoustic transfer function, auditory processing skills, physiological state regulation, and sensory symptoms.
