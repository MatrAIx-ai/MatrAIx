  career_goals: Adriene aims to finish her GED and enroll in a community college program for graphic design or fine arts. She dreams of becoming a professional visual artist who creates murals and community
    art projects that reflect Detroit’s culture and inspire neighborhood pride. Long‑term, she hopes to launch a youth arts workshop that gives other teens a creative outlet and mentorship, while also exploring
    opportunities in digital media production.
