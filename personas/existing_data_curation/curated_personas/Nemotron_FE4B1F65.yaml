  hobbies: '[''Sketching abstract cityscapes'', ''Low‑light street photography'', ''Reading philosophy and science‑fiction'', ''Writing reflective poetry'', ''Mindfulness meditation'', ''Journaling'', ''Playing
    piano (classical)'', ''Early‑morning running'', ''Indoor rock climbing'', ''Experimenting with Dominican cooking'']'
  career_goals: Giancarlo is determined to channel his curiosity and analytical strengths into a specialized investigative career. Within the next three to five years he plans to complete a bachelor’s degree
    in criminal justice and pursue a master’s in forensic psychology, positioning himself for promotion to detective in the West Haven Police Department’s major crimes or cyber‑crime unit. He aspires to
    lead advanced investigations that integrate data analytics, behavioral profiling, and creative hypothesis generation. Parallel to his professional advancement, Giancarlo aims to develop a community‑based
    arts outreach program that uses visual art and storytelling to engage Dominican‑American youth, fostering trust between law enforcement and the community. Long‑term, he envisions influencing departmental
    policies on mental‑health‑aware policing and mentoring officers on stress resilience.
