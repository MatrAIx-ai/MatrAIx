    Bash)","ITIL incident and request handling"]'
  hobbies: '["Calligraphy","Sketching","Visiting museums and cultural festivals","Cooking Asian‑fusion recipes","Hiking and biking in local trails","Board‑game evenings with friends","Reading contemporary
    fiction","Raspberry Pi tinkering and basic coding"]'
  career_goals: In the next three to five years, Foram aims to earn CompTIA A+ and Network+ certifications and deepen her understanding of ITIL service management. She aspires to advance to a senior support
    specialist or team lead role, where she can mentor new agents and shape support procedures. Leveraging her humanities background, she plans to specialize in user‑experience‑focused technical documentation
    and training, eventually moving into a product support manager or UX researcher position that bridges technical reliability with customer satisfaction. Balancing her career growth with her family life,
    she also hopes to contribute to community tech‑education initiatives in Irvine.
