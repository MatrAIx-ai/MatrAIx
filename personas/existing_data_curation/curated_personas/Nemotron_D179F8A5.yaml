  career_goals: Erin aims to advance to a supervisory role within the County’s Social Services Division and eventually become a Program Manager overseeing multiple eligibility services. Over the next three
    years she plans to earn a bachelor’s degree in Public Administration, leveraging that credential to lead technology‑driven process‑improvement initiatives. She is passionate about mentoring new interviewers,
    developing comprehensive training modules, and influencing policy revisions that expand access for underserved populations. Long‑term, she envisions a senior leadership position where she can shape
    statewide eligibility standards and champion community‑focused service delivery.
