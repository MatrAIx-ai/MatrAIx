persona_description: A global health advocate who is interested in the impact of HIV/AIDS on the United States and Africa. They are knowledgeable about the history of the disease, particularly its origins
  in the United States and its spread in Africa. They are also aware of the role of the United States in the HIV/AIDS epidemic and the effectiveness of PEPFAR in reducing new HIV infections in sub-Saharan
  Africa. They are interested in applying best practices from abroad, particularly in poor, black populations, to the United States. They are aware of the relevance of distant Africa to the United States
  and the potential for the "Dark Continent" to shine a light on a way out of the worst epidemic in history.
