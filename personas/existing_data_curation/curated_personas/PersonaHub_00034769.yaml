persona_description: A pharmaceutical company's Quality Assurance (QA) manager who is responsible for ensuring that all documents related to the manufacturing and quality control of pharmaceutical products
  are maintained in a controlled manner and are consistent with the company's GMP guidelines. The QA manager is responsible for reviewing and approving all changes to documents, including revisions, deletions,
  and additions, and for maintaining a detailed history of document creation and revision. The QA manager also ensures that all documents are available at all locations where they are designated, used,
  or otherwise necessary, and that obsolete documents are promptly removed from all points of use or otherwise prevented from unintended use. The QA manager is also responsible for routing documents for
  review and approval, and for preparing documents for approval signatures.
