personas:
  professional: Susan Daniels, a veteran metal assembler and fabricator in a Midwestern plant, combines twenty‑plus years of MIG/TIG welding, CNC milling, and lean‑manufacturing expertise with a balanced
    curiosity and meticulous safety focus, making her a natural mentor and champion for continuous‑improvement as she pursues a lead‑assembler promotion.
  sports: Susan Daniels stays active by walking the Fall Creek Trail five times weekly with the local Fall Creek Walking Club, enjoys seasonal recreational softball games with community‑center teens, and
    follows the Cleveland Guardians baseball and Detroit Pistons basketball teams for a dash of hometown pride.
  arts: Susan Daniels indulges her love of mystery by devouring novels from Agatha Christie and Gillian Flynn, listens to folk‑rock legends like John Prine and The Avett Brothers while woodworking, and
    attends occasional community‑theatre productions of classic detective plays starring local actors.
  travel: Susan Daniels prefers low‑key road trips, having explored the Chicago Art Institute, Milwaukee’s breweries, and the Indiana Dunes, and she dreams of attending a metal‑fabrication expo in Munich
    and a 3D‑printing convention in Tokyo next summer.
  culinary: Susan Daniels enjoys cooking Midwestern comfort foods such as chicken pot pie, creamy mac & cheese, and honey‑glazed pork tenderloin, frequently incorporating sweet corn, sharp cheddar, and
    fresh rosemary from her garden, and she experiments with 3D‑printed cookie cutters to add a modern twist, though she sometimes over‑salts the dishes.
  core: Susan Daniels is a detail‑oriented fabricator who quietly merges metalwork, gardening, and mystery novels into a practical, frugal lifestyle punctuated by occasional coffee‑fueled overwork.
background:
  cultural: Susan grew up in a working‑class family in the Indianapolis area, where generations of relatives have been employed in manufacturing and trades. Her upbringing reflects typical Midwestern values
    of hard work, self‑reliance, and community responsibility. Though not strongly religious, she participates in neighborhood events and values the modest, straightforward culture of the Heartland. Her
    white American heritage and long‑standing ties to the local industrial community have shaped a pragmatic worldview, a respect for dependable relationships, and an appreciation for incremental progress
    over radical change.
attributes:
  skills: '["MIG/TIG welding", "CNC milling and turning", "Blueprint reading", "Quality assurance inspection", "Machine maintenance", "Lean manufacturing methods", "Safety compliance", "ERP inventory management",
    "Mechanical troubleshooting", "Basic CAD modeling"]'
  hobbies: '["Gardening", "Woodworking", "Jigsaw puzzles", "Reading mystery novels", "Walking local trails", "Cooking Midwest comfort food", "Volunteering at community center", "Learning 3D printing"]'
  career_goals: Susan aims to transition into a lead‑assembler or shift‑supervisor role within the next few years, leveraging her on‑the‑floor expertise to mentor newer workers and champion continuous‑improvement
    projects. She is planning to earn an AWS welding certification and a CNC programming credential to broaden her technical qualifications. Long‑term, she envisions starting a small custom metal‑fabrication
    side business that blends her practical skills with her curiosity for innovative design, providing a steady supplemental income as she approaches retirement.
