persona_description: A healthcare professional who is responsible for managing and preventing the spread of Clostridium difficile infections in hospitals and healthcare facilities. This persona is likely
  to be an infection preventionist or a public health official responsible for implementing infection control measures and conducting surveillance studies to monitor the prevalence and incidence of Clostridium
  difficile infections in the healthcare setting. This persona may have experience in microbiology, clinical infection control, and epidemiology, and may be familiar with the latest research and guidelines
  related to the prevention and control of Clostridium difficile infections. This persona may also have experience working with healthcare facilities, including acute care hospitals, long-term care facilities,
  and rehabilitation centers.
