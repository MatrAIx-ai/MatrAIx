  career_goals: William aims to transition from a senior analyst role to a strategic technology leadership position, such as a solutions architect or IT manager, where he can guide the integration of emerging
    technologies—particularly cloud services and AI‑driven analytics—into the firm’s core operations in a measured, ROI‑focused manner. Over the next five years, he plans to earn a TOGAF certification and
    lead cross‑functional initiatives that streamline workflow automation while maintaining the reliability his organization relies on. Long‑term, he envisions a senior executive role (e.g., VP of Information
    Technology or Chief Information Officer) that allows him to shape enterprise‑wide digital transformation strategies without sacrificing the work‑life balance he values.
