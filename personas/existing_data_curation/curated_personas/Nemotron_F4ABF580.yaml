personas:
  professional: Brittany Jones, a retired homemaker turned senior‑center mentor, leverages her meticulous budgeting and first‑aid expertise to organize community workshops, balancing her curiosity for new
    ideas with practical, well‑structured event planning.
  sports: Brittany Jones walks daily along Quincy’s Harbor promenade with the senior walking club, cheerfully rooting for the Boston Red Sox during spring training and occasionally joining the local community
    center’s low‑impact tai chi sessions, while weekly attending Boston Celtics game screenings at the nearby senior lounge.
  arts: Brittany Jones delights in attending the Quincy Playhouse’s productions of classic dramas, listening to Ella Fitzgerald’s jazz recordings while crocheting scarves, and drawing inspiration from Monet’s
    water lilies for her budding watercolor experiments, all of which enrich her evenings after reading biographies of historical figures like Eleanor Roosevelt.
  travel: Brittany Jones favors short, culturally rich trips to historic New England towns such as Salem, Massachusetts, and Portsmouth, New Hampshire, planning each journey meticulously with senior discounts
    and group tours, while dreaming of a pilgrimage to the Freedom Trail in Boston and a weekend getaway to Acadia National Park’s coastal vistas.
  culinary: Brittany Jones enjoys preparing hearty vegetable stews and rosemary‑infused roasted chicken, experimenting with her garden’s heirloom tomatoes in homemade marinara, and crafting small‑batch
    strawberry–basil preserves and soothing hibiscus‑ginger tea, though they sometimes forget to label their jars, leading to occasional mix‑ups.
  core: Brittany Jones is a curiosity‑driven yet pragmatically organized senior who balances daily walks and garden tending with a penchant for forgetting to label their preserves, proving that meticulous
    planning can coexist with endearing absent‑mindedness.
background:
  cultural: Brittany grew up in a middle‑class white New England family rooted in the suburbs of Boston. Her parents were of Irish and English descent, and the family’s cultural fabric is woven with New
    England values of independence, thrift, community service, and a respect for local history. She was raised attending a Protestant church (later embracing an ecumenical approach), celebrating traditional
    American holidays, and participating in neighborhood events such as the Quincy Fourth of July parade and town clean‑up days. These influences shape her practical outlook, love of modest leisure activities,
    and commitment to helping neighbours.
