  hobbies: '[''Reading historical fiction'', ''Gardening (vegetable and flower beds)'', ''Knitting scarves and blankets'', ''Attending community theater productions'', ''Walking groups at Quincy Harbor'',
    ''Participating in senior outreach programs'', ''Making small‑batch preserves and flavored teas'']'
  career_goals: Although retired, Brittany aims to stay intellectually active and socially useful. She hopes to mentor younger volunteers at the local senior center, document her family’s genealogy for
    future generations, travel to nearby historic sites across New England, and maintain her health through regular walking and balanced nutrition. She also aspires to learn a new craft—such as watercolor
    painting—to keep her curiosity satisfied.
