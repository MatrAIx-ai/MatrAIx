  career_goals: Brandon hopes to combine his love of building and his desire to help his community by pursuing a career in engineering, particularly civil or environmental engineering, where he can design
    safe and sustainable infrastructure for towns like Anderson. He also dreams of developing educational technology tools that make learning interactive and fun for younger students, drawing on his coding
    experience and enthusiasm for mentorship. In the near term, he plans to excel in advanced math and science courses, join the high school robotics team, and take on leadership positions in student government
    to prepare for a future as an engineer, educator, or community innovator.
