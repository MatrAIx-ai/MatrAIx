persona_description: A scientist who is interested in genetic research and personalized medicine. This person is likely to be a researcher or a physician who is passionate about understanding the genetic
  basis of diseases and how they can be personalized to provide better care. They are interested in using advanced genetic sequencing techniques, such as HaploSeq, to analyze a patient's genetic makeup
  and determine the likelihood of inheriting a disease. They may also be interested in using this information to assess an individual's risk for disease and to determine the source of a genetic mutation.
  This person is likely to be knowledgeable about molecular biology, computational biology, and genetic sequencing techniques.
