  career_goals: Uyen aims to leverage her associate degree in Business Administration to pursue a role as a project coordinator or administrative specialist within a local manufacturing or logistics company
    in the Calhoun area. She plans to enroll in a bachelor’s program in Business Management within the next two years to qualify for supervisory positions. Long-term, she hopes to combine her organizational
    skills and entrepreneurial curiosity by launching an online boutique featuring locally sourced crafts, balancing practical income generation with creative expression.
