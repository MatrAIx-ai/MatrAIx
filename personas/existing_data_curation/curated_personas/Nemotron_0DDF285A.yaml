  hobbies: '[''Drawing and coloring'', ''Watercolor painting'', ''Modeling with clay'', ''Collecting shells and pebbles at the beach'', ''Listening to children’s music and singing'', ''Storytime and picture‑book
    reading'', ''Pretend play with dolls and stuffed animals'', ''Exploring the backyard garden'']'
  career_goals: Although still very young, Vickey frequently talks about becoming a painter who paints the sea, an animal keeper who looks after sea turtles, or a storyteller who tells adventures. Her early
    fascination with art and marine life steers her imagined future toward creative or nature‑focused occupations, and she enjoys imagining herself in those roles during pretend play.
