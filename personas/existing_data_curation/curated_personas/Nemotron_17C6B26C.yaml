personas:
  professional: Mary Brown is a budding young coder who creates simple games and animations on Scratch, using their love for structure to meticulously plan each project while allowing flexibility to experiment,
    and their competitive streak drives them to share their creations in the after-school reading club's tech showcase.
  sports: Mary Brown enjoys playing on a community soccer team during the spring, practices ice skating in the winter at a local rink, cheers for the New York Yankees and the New York Knicks on game nights,
    and prefers short, high-energy activities over long training sessions.
  arts: Mary Brown immerses themselves in fantasy worlds by rereading J.K. Rowling's Harry Potter series, draws inspiration from LEGO designer Nathan Sawaya's builds, and curates a personal playlist that
    includes Disney's Frozen soundtrack and Taylor Swift's pop hits, all of which shape their creative sketches of wildlife during nature walks.
  travel: Mary Brown loves family road trips to the Adirondack Mountains for hiking and to Washington, D.C. for museum visits, dreams of exploring the Harry Potter Studio Tour in London, and prefers carefully
    planned itineraries that balance adventure with the comfort of familiar routines.
  culinary: Mary Brown favors classic kid-friendly meals like mac and cheese and pizza, enjoys helping their mom bake chocolate chip cookies with generous chocolate chunks, and has recently started experimenting
    with simple sushi rolls using avocado and cucumber after watching a cooking tutorial on YouTube.
  core: Mary Brown is a structured yet flexible ten-year-old who balances a love for solitary LEGO building and chess with occasional spontaneous splurges on fantasy books, all while navigating school life
    with a competitive edge and a relaxed attitude toward chores.
background:
  cultural: Mary grows up in a white, middle-class family in Uniondale, a suburban community in Nassau County, New York. Her household reflects mainstream American middle-class values, emphasizing education,
    participation in school-based extracurricular activities, and the celebration of holidays such as Thanksgiving, Christmas, and the Fourth of July. While her immediate family roots include European ancestry—primarily
    Irish and German—she attends a diverse public school where she interacts with peers from many ethnic backgrounds, fostering an appreciation for multicultural perspectives alongside her own family traditions.
attributes:
  skills: '[''Reading comprehension'', ''Creative writing'', ''Mental arithmetic'', ''Scratch programming'', ''LEGO construction'', ''Small-group project coordination'']'
  hobbies: '[''Reading fantasy novels'', ''LEGO building'', ''Scratch coding'', ''Chess'', ''Nature walks'', ''Journaling'', ''Small group reading club'']'
  career_goals: Mary aspires to become a biomedical engineer, a career that blends her love for solving practical problems with her interest in technology and health. In the short term, she aims to lead
    her junior robotics team to a regional competition win, develop an interactive Scratch game about animal care, and earn top marks in science to qualify for a specialized STEM program in high school.
    Long-term, she envisions studying biomedical engineering in college, securing internships in research labs, and eventually designing medical devices that improve patient care, all while maintaining
    the structured yet flexible work environment she values.
