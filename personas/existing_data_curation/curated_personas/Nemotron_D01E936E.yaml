  hobbies: '[''Abstract Painting'', ''Landscape Photography'', ''Blues & Jazz Listening'', ''Harmonica Playing'', ''Speculative Fiction Reading'', ''Herb Gardening'', ''Bar Trivia Hosting'', ''Dart & Pool
    Competition'', ''Experimental Cooking'', ''Local History Research'', ''Hiking'']'
  career_goals: Carl aims to transform his deep love of drinks and art into a flagship bar that doubles as a local art gallery and performance space, showcasing emerging Black artists from the region. He
    plans to develop a signature line of bitters and infused spirits that reflect Texas herbs and African‑American culinary traditions, eventually licensing the brand for wider distribution. In the next
    five years he hopes to win a state‑level mixology competition, mentor aspiring bartenders through workshops at the community college, and publish a small illustrated guide of his most inventive cocktail
    recipes. Ultimately, Carl envisions owning and operating his own independent lounge where creativity, community, and culture intersect.
