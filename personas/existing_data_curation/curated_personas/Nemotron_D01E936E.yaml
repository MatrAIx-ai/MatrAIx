personas:
  professional: An experienced mixologist and bar manager, Carl Brice, who leverages three decades of spirits expertise, an imaginative abstract‑painting mindset, and systematic inventory control, they
    craft visually striking cocktails, mentor staff, orchestrate community‑focused themed nights, and pursue the competitive goal of a state‑level mixology title while planning a flagship lounge that doubles
    as an art gallery.
  sports: An avid participant in local leisure sports, Carl Brice, they dominate weekly darts matches with the Hill Country Darts League, hold a steady spot in the Fredericksburg Pool Club, trek the Edwards
    Plateau trails on weekends for cardio, and root passionately for the Dallas Cowboys and San Antonio Spurs, balancing competitive spirit with community camaraderie.
  arts: An abstract painter and photographer, Carl Brice, they draw inspiration from the bold textures of Jackson Pollock, the lyrical light captured by Ansel Adams, immerse themselves in speculative works
    by Octavia Butler and the music of John Coltrane and B.B. King, and even slip a harmonica into informal jam sessions, weaving these artistic threads into cocktail garnish designs and bar ambiance.
  travel: An enthusiastic road‑tripper, Carl Brice, they have explored the vineyards of Fredericksburg, the historic charm of Paris, Texas, and the jazz‑filled streets of New Orleans while dreaming of a
    cultural pilgrimage to Barcelona’s Picasso Museum and a desert retreat in Santa Fe, favoring meticulously planned weekend getaways that blend culinary discovery with photographic opportunities.
  culinary: Carl Brice, a seasoned home chef, they cultivate mint, basil, and rosemary to infuse both cocktails and dishes such as herb‑crusted salmon, rosemary‑scented lamb stew, and Tex‑Mex shrimp tacos
    topped with a cilantro‑lime crema, experimenting with flavor pairings that mirror their cocktail innovations and showcasing an intermediate‑to‑advanced cooking skill set.
  core: At 56, Carl Brice blends mixology mastery with a painter’s eye, they host trivia nights while humming blues, yet they often lose track of time perfecting a garnish, turning each drink into a miniature
    artwork.
background:
  cultural: Carl grew up in a close‑knit Black community in East Texas, where church gatherings, soul food kitchens, and blues music were daily staples. His family traces its roots to the Great Migration,
    bringing Southern traditions and a strong sense of resilience to the Texas plains. In Paris, he participates actively in community events such as Juneteenth festivals, church choirs, and neighborhood
    potlucks that celebrate African‑American heritage. He balances pride in his cultural lineage—honoring the storytelling, rhythmic creativity, and culinary flavors of his ancestors—with the broader Texan
    identity of hospitality and entrepreneurship. This blend of Southern Black culture and regional Texan influences informs both his professional approach behind the bar and his personal artistic pursuits.
attributes:
  skills: '[''Mixology & Cocktail Creation'', ''Spirits Knowledge'', ''Flavor Pairing & Infusion'', ''Customer Service'', ''Bar Management & Inventory Control'', ''Event Planning'', ''Staff Training & Mentorship'',
