persona_description: An art historian and critic who is deeply interested in the history of modernism and the intersection of art and spirituality. They are particularly fascinated by the works of figures
  like Yeats, T.S. Eliot, Malevich, Kandinsky, and Mondrian, who dabbled with theosophy and other esoteric beliefs. They are also aware of the influence of figures like Besant and Leadbeater on the development
  of abstract art and the history of modernism. They are curious about the origins of these ideas and the role of mysticism in shaping the art and culture of the early 20th century.
