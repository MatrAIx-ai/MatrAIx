personas:
  professional: Brigitte Boyd, a budding junior architect in training, spends hours constructing elaborate LEGO cityscapes while organizing neighborhood play groups, turning their love for structure and
    predictability into collaborative projects despite occasionally letting the spontaneous chaos of kids' imagination take over.
  sports: Brigitte Boyd dashes around the local park every Saturday, captaining the Little Lions Youth Soccer Club in spring and joining organized kick‑ball games in the fall, while proudly wearing a River
    Raptors baseball jersey to cheer on the hometown professional team.
  arts: Brigitte Boyd fills sketchbooks with lively drawings of classmates, Disney princesses, and favorite cartoon heroes, hums along to songs from Frozen and Moana, and draws inspiration from the vibrant
    illustrations of Mary Blair, weaving these influences into their own colorful creations.
  travel: Brigitte Boyd loves family road trips to sweet destinations like Hershey’s Chocolate World and dreams of wandering through Orlando’s Disney World and the historic streets of London, preferring
    short, well‑planned itineraries that leave room for a calming coloring break.
  culinary: Brigitte Boyd delights in gooey chocolate chip cookies, cheesy pepperoni pizza, and building snack plates of carrot sticks, celery, and hummus, often pretending to be a chef by layering strawberries,
    blueberries, and granola into a simple fruit parfait.
  core: Brigitte Boyd is a hyper‑social, structure‑loving seven‑year‑old who balances a penchant for spontaneous LEGO chaos with a deep‑seated need for calming colors whenever anxiety creeps in.
background:
  cultural: Brigitte is a white American raised in Hershey, Pennsylvania, a small town known for its chocolate heritage and close‑knit community. Her family participates in local festivals, school events,
    and seasonal celebrations typical of the region, such as the Hershey Harvest Festival and holiday parades. She attends a public elementary school where community values of cooperation, respect, and
    volunteerism are emphasized, shaping her compassionate and cooperative outlook.
