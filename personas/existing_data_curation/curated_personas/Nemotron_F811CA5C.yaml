  skills: '["reading", "basic arithmetic", "LEGO building", "conflict mediation", "team collaboration", "routine adherence"]'
  hobbies: '["soccer", "kickball", "LEGO building", "drawing", "reading picture books", "visiting Hershey''s Chocolate World", "listening to music", "coloring"]'
  career_goals: Brigitte dreams of a future where she can help other children learn and feel safe. She often says she wants to become a teacher or a school counselor because she enjoys organized learning
    environments, likes to nurture harmony, and wants to support friends who feel worried or stressed. She also imagines helping animals as a veterinarian, reflecting her compassionate nature.
