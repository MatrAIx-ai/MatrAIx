  hobbies: '[''Woodworking'', ''Gardening'', ''Reading African-American history'', ''Genealogy research'', ''Soul-food cooking'', ''Chess'', ''Fishing'', ''Small‑group church choir participation'', ''Volunteer
    work at community garden'']'
  career_goals: Luther aims to complete the remaining coursework toward a bachelor's degree in Business Administration and obtain a Project Management Professional (PMP) certification. He envisions launching
    a small home‑renovation consulting business that offers affordable upgrades for families in his neighborhood, leveraging his hands‑on repair skills and project‑management expertise. He also aspires
    to mentor local youth through a community mentoring program, sharing his practical knowledge and encouraging academic perseverance.
