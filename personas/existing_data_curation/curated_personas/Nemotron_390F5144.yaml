personas:
  professional: Luther Hunter, a seasoned home‑renovation consultant, blends meticulous project‑management expertise with hands‑on carpentry, plumbing, and electrical know‑how, channeling an organized,
    methodical nature and community‑service values into affordable upgrades for local families while they mentor youth.
  sports: Luther Hunter enjoys weekend fishing on the Patuxent River, follows the Washington Commanders, occasionally joins a church‑organized pick‑up basketball game at the local YMCA, and they track the
    DC United season with modest fan enthusiasm.
  arts: Luther Hunter, a member of his church’s small‑group choir, finds solace singing hymns popularized by Mahalia Jackson, while evenings are filled with the novels of Toni Morrison and classic jazz
    of Miles Davis, and they view this creative outlet as a vital balance to their methodical daily routine.
  travel: Luther Hunter prefers low‑key road trips, having driven the historic Blue Ridge Parkway in the fall and spent a weekend in Charleston savoring Lowcountry cuisine, while they keep a bucket list
    that includes a cultural pilgrimage to New Orleans for Mardi Gras and a family vacation to the Great Smoky Mountains.
  culinary: Luther Hunter, an avid home cook, perfects soul‑food staples such as fried catfish with hush‑pudding, collard greens simmered with smoked turkey, sweet potato pie, and experiments with smoked
    paprika in their weekly gumbo, while they often round meals off with freshly baked cornbread for neighbors.
  core: Luther Hunter, a methodical DIY enthusiast with quiet confidence, balances a love for community service, meticulous project planning, and soulful cooking, while they have a habit of pulling all‑night
    reruns that often delays bedtime.
background:
  cultural: Luther was born and raised in Upper Marlboro, Prince George's County, a suburb with a large, thriving African‑American middle‑class community. His family has deep roots in the area and attended
    a historic African‑American Baptist church, where he learned the value of community service, gospel music, and oral storytelling. The legacy of the civil‑rights movement and the strong emphasis on family,
    education, and self‑reliance in his neighborhood shaped his identity. He celebrates cultural traditions such as Juneteenth, the Maryland African American Heritage Festival, and enjoys soul‑food cooking
    that connects him to his Southern roots.
attributes:
  skills: '[''Project planning'', ''Budget management'', ''Carpentry'', ''Plumbing repairs'', ''Electrical troubleshooting'', ''Computer literacy (Microsoft Office)'', ''Community outreach coordination'',
