persona_description: A healthcare attorney who specializes in creating and modifying healthcare documents, such as health care power of attorney and living wills. They are experienced in navigating complex
  legal and medical issues related to capacity, decision-making, and the rights of patients and their families. They have a deep understanding of the nuances of capacity, including the role of medical professionals,
  statutes, and documents in determining capacity. They are skilled in creating custom documents that meet the needs of their clients, while also ensuring that they are fully informed and protected in the
  event of incapacity.
