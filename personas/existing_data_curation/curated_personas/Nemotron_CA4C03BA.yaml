personas:
  professional: Doraida Oliveras is a seasoned automotive service technician with over 30 years of hands‑on experience, known for her methodical diagnostics, meticulous record‑keeping, and bilingual communication;
    they mentor junior staff while preparing for ASE Master Technician certification and plan to launch a community‑focused repair shop.
  sports: Doraida Oliveras enjoys regular evening walks with the Charlestown Waterfront Walking Club, follows the Boston Red Sox and New England Patriots for seasonal excitement, and participates in a weekend
    recreational softball league for senior players; they find the combination of gentle cardio and team sport balances their active lifestyle.
  arts: Doraida Oliveras immerses herself in mystery novels by Agatha Christie and Gillian Flynn, listens to traditional folk music featuring accordion and percussion that echo their family's heritage,
    and occasionally attends performances by the Boston Symphony Orchestra; they consider narrative and melody a soothing balance after a day in the garage.
  travel: Doraida Oliveras prefers meticulously planned road trips in her restored classic car, having driven the Pacific Coast Highway and explored historic towns in Spain; they now dream of a summer journey
    through the Andean highlands and a relaxed family cruise to the Caribbean islands.
  culinary: Doraida Oliveras, an adept home chef, regularly prepares bandeja paisa, sancocho, and crisp arepas, balancing spices like cumin, coriander, and a touch of ají, while experimenting with seasonal
    garden vegetables such as chard, carrots, and heirloom tomatoes; they view cooking as a precise, creative ritual that connects them to their heritage.
  core: Doraida Oliveras is a precise automotive veteran who blends methodical garage work with garden‑fresh cooking and classic‑car restoration, yet they sometimes let a gripping mystery novel keep them
    up past their usual bedtime.
background:
  cultural: Doraida was born in Colombia and moved to the United States as a teenager, settling in the Boston area. She maintains strong ties to her Colombian identity through language, cuisine, and community
    celebrations such as Carnaval de Barranquilla and Día de la Independencia. While she has integrated into the multicultural fabric of Charlestown, she frequently visits the local Colombian diaspora network,
    attends church services in Spanish, and supports cultural events that showcase Colombian music and dance. Her bicultural experience informs her respectful, cooperative demeanor and her desire to create
    inclusive spaces both at work and in her community.
attributes:
  skills: '[''Automotive diagnostics'', ''Engine repair and rebuilding'', ''Transmission overhaul'', ''Brake and suspension maintenance'', ''Electrical system troubleshooting'', ''Hybrid and electric vehicle
    servicing'', ''Use of OBD-II scan tools'', ''Preventive maintenance scheduling'', ''Parts inventory management'', ''Safety compliance (OSHA standards)'', ''Bilingual communication (Spanish-English)'']'
  hobbies: '[''Balcony vegetable gardening'', ''Cooking traditional Colombian recipes'', ''Classic car restoration projects'', ''Reading mystery novels'', ''Evening walks along the Charlestown waterfront'',
    ''Listening to and dancing to Colombian folk music'', ''Volunteering at a local community center'']'
  career_goals: Doraida aims to earn the ASE Master Technician certification within the next two years to formalize her extensive hands-on knowledge. She also aspires to become a senior mentor for younger
    technicians, leading a small, tightly-coordinated team that values precision and workplace harmony. Long-term, she dreams of opening a modest, family-run auto-repair shop in Charlestown that emphasizes
    structured service processes, environmentally-friendly practices, and a welcoming atmosphere for Spanish-speaking customers. Financial stability for a comfortable retirement and the ability to give
    back to the local Colombian community are central to her ambition.
