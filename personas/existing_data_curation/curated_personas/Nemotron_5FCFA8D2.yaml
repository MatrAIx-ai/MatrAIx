  hobbies: '[''Landscape photography'', ''Sketching and mixed-media art'', ''Reading philosophy and science fiction'', ''Playing chess and strategy board games'', ''Woodworking'', ''Personal journaling'',
    ''Attending local art exhibitions'', ''Exploring coastal hiking trails'', ''Experimental cooking with multicultural influences'']'
  career_goals: Youssef is determined to leverage his disciplined work ethic into progressive leadership within retail. In the next two to three years, he aims to secure a shift‑lead or assistant manager
    position, enhancing store efficiency through data‑driven scheduling and tighter loss‑prevention measures. He plans to complete a Retail Management certification at a nearby community college, which
    will equip him with formal training in budgeting, staff development, and supply‑chain fundamentals. Ultimately, his ambition is to open a small boutique that blends his love for local art, sustainable
    goods, and thoughtful visual merchandising, positioning himself as a recognized small‑business entrepreneur in the Monroe area.
