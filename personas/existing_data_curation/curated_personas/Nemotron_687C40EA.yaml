  career_goals: Javonta aims to progress to a senior audit manager role within the next five years, positioning herself for eventual advancement to a CFO position. She plans to obtain her CPA and CISA certifications,
    integrate data analytics and automation more deeply into audit practices, and lead a diverse, high‑performing audit team. Recognizing her sensitivity to stress, she prioritizes establishing sustainable
    work‑life balance initiatives for herself and her colleagues. Long‑term, she hopes to mentor younger accountants, especially women of color, and contribute to community financial‑literacy programs in
    Newark and the broader New Castle County area.
