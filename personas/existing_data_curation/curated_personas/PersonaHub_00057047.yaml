persona_description: A historian who specializes in the study of Japanese history, particularly the period from the Sengoku period to the Edo period. His research interests include the development of the
  ninja as a secretive group of agents, their roles as spies, scout, surprise attacker, and agitator, and the evolution of espionage techniques. He is also interested in the role of the ninja in the wider
  context of Japanese history, including their emergence as mercenaries, recruitment as spies, raiders, arsonists, and terrorists, and their impact on the society of the time.
