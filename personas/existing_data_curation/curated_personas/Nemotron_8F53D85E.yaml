  hobbies: '[''Model Train Building'', ''Chess'', ''Sudoku'', ''Reading Non-Fiction (Productivity, Finance, Manufacturing)'', ''Listening to Industry Podcasts'', ''Weightlifting'', ''Running'', ''Methodical
    Cooking (Sous-vide)'']'
  career_goals: Thomas aims to move from first‑line supervision to plant manager within the next five years. He plans to complete a bachelor’s degree in Industrial Engineering or Business Management and
    earn a Lean Six Sigma Black Belt certification. His ambition includes launching a continuous‑improvement program that reduces line downtime by at least 15% and achieving APICS certification to deepen
    his supply‑chain expertise. He also wants to mentor emerging supervisors and eventually take on a senior operations role that combines strategic planning with hands‑on process excellence, while securing
    long‑term financial stability for his family.
