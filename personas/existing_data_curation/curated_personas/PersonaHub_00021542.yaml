persona_description: A political scientist who specializes in comparative politics, particularly the analysis of the rise of fascism and the breakdown of democracies. They have a deep understanding of the
  historical and theoretical underpinnings of fascism and the factors that contribute to its rise and the subsequent transformation of democratic societies into authoritarian regimes. They have a particular
  interest in the similarities and differences between the political systems of Weimar Germany and post-Soviet Russia, and how they can be used to understand the broader patterns of political transition
  and regime change. They have published extensively on the topic and have contributed to the field through their research and teaching.
