personas:
  professional: Carlito Figueroa, a 34‑year‑old licensed electrician, leverages a competitive, meticulously organized approach to excel in residential and commercial wiring, solar photovoltaic integration,
    and bespoke smart‑home automation, rigorously testing every new IoT device before deployment while they use their bilingual fluency to navigate contractor‑client negotiations and constantly question
    the motives of subcontractors to ensure safety and code compliance.
  sports: Carlito Figueroa, a 34‑year‑old enthusiast, fuels their love for soccer by cheering for Phoenix Rising FC and following Liga MX’s Club América, participates in weekly pickup games at their local
    community field, maintains fitness through disciplined desert‑trail hikes in the early mornings, and balances a competitive edge on the pitch with a laid‑back weekend yoga stretch routine to offset
    their job‑site strain.
  arts: Carlito Figueroa, a 34‑year‑old musician‑hobbyist, channels their cultural rhythm into weekend acoustic‑guitar sessions, often covering classics by Carlos Santana and Los Tigres del Norte, while
    attending local mariachi festivals and savoring the storytelling of director Guillermo del Toro’s documentaries, which together deepen their sense of identity and provide a creative escape from the
    demands of their trade.
  travel: Carlito Figueroa, a 34‑year‑old traveler, prefers meticulously planned trips that blend adventure with family time, having hiked the Grand Canyon, explored the historic streets of Mexico City
    and the culinary markets of Oaxaca, and now dreaming of a solar‑powered retreat in Patagonia’s Torres del Paine while they balance their wife’s schedule and their business’s cash‑flow considerations.
  culinary: Carlito Figueroa, a 34‑year‑old home chef, shines when they meticulously prepare mole poblano with roasted chiles, chocolate, and spices, hand‑roll tamales using nixtamalized corn masa and a
    blend of ancho and pasilla chilies, and experiment with modern sous‑vide techniques for carnitas, all while proudly showcasing their skill level as an avid cook who still occasionally over‑salts their
    salsas in the excitement of a new recipe.
  core: Carlito Figueroa, a 34‑year‑old driven professional, is a detail‑obsessed electrician who balances a relentless pursuit of technical mastery with a deep‑rooted love for community traditions, often
    wrestling with stress‑induced worries while they find solace in guitar strings, desert hikes, and the comforting aroma of simmering mole.
background:
  cultural: Carlito is a second‑generation Mexican American who grew up in a bilingual household in Arizona. His family places a strong emphasis on hard work, close‑knit relationships, and community involvement.
    Traditions such as Día de los Muertos, Día de la Independencia, and communal cooking gatherings are central to his identity. He remains active in local Mexican community events, celebrates holidays
    with extended family, and incorporates Mexican culinary flavors into his everyday cooking. This cultural foundation shapes his work ethic, sense of responsibility, and the pride he takes in representing
    his heritage in both his professional and personal life.
