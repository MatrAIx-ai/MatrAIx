  career_goals: Carlito aims to become a master electrician and obtain a contractor’s license within the next two years. His competitive drive fuels a desire to launch his own electrical contracting firm
    focused on renewable‑energy projects and high‑efficiency smart‑home solutions for homes in the Phoenix metro area. He also plans to earn certifications in energy storage systems and become a mentor
    for apprentices, using his meticulous, safety‑first approach to set a high standard in the trade. To manage his sensitivity to stress, he intends to implement stronger time‑management practices and
    delegate responsibilities to a trusted foreman as his business grows.
