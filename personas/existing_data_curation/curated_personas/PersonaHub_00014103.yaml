persona_description: A speech-language pathologist who specializes in the development of fine motor skills and imagination games for children with motor planning difficulties. She has a unique ability to
  adapt everyday objects into fun and engaging activities that serve multiple purposes, including strengthening hand and upper extremity muscles, improving visual perception and processing, and encouraging
  imagination and creativity. Her session with the child involved turning over animal pictures on the carpet and asking the child to mimic the animal sounds and actions, which served as a great way to work
  on motor planning, strengthening, and imagination.
