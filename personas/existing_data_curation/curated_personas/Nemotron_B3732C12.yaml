personas:
  professional: Arletis Tejada is a budding junior coder who builds simple Scratch projects, balancing a curiosity for new digital tools with a practical penchant for step‑by‑step documentation, making
    them a surprisingly reliable contributor to their after‑school coding club.
  sports: Arletis Tejada plays on the town’s Little League baseball team, idolizing the New York Yankees and channeling a competitive spirit into weekly batting practice, yet prefers a small group of teammates
    over large, noisy crowds.
  arts: Arletis Tejada loves drawing characters from the animated series 'Adventure Time' and singing along to Disney’s 'Frozen' soundtrack, especially the song 'Let It Go', blending a practical habit of
    keeping a sketchbook organized with a deep curiosity for storytelling.
  travel: Arletis Tejada enjoys family road trips to the seaside boardwalk in Virginia Beach, but dreams of seeing the Eiffel Tower in Paris, favoring meticulously planned itineraries that balance adventurous
    sandcastle building with quiet moments at the hotel.
  culinary: Arletis Tejada favors cheesy macaroni, chicken nuggets with honey mustard, and fruit smoothies made with banana and strawberry, often insisting on adding extra cheddar to their pizza, while
    proudly 'helping' stir the pot under close supervision.
  core: Arletis Tejada is a quietly competitive five‑year‑old who blends curiosity with practicality, prefers small, orderly circles, and tackles challenges with steady calm and a hint of skeptical independence.
background:
  cultural: Arletis comes from a Mexican‑American household where Spanish is spoken alongside English, and family traditions such as celebrating Día de los Muertos and sharing homemade tamales are part
    of her weekly routine. Her parents blend Mexican cultural values—respect for family, appreciation of music and dance, and a love of food—with the sunny, outdoor lifestyle of Titusville, Florida. This
    bicultural upbringing gives her a strong sense of identity, an early exposure to bilingual communication, and a blend of Mexican customs and Floridian community activities.
