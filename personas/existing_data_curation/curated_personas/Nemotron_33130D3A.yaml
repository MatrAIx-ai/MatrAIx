  career_goals: As she approaches retirement age, Tracy aims to formalize her legacy by establishing a small boutique carpentry firm that specializes in historic preservation projects in Hampton and surrounding
    historic districts. She plans to obtain her GED to qualify for state‑approved apprenticeship certification, which will enable her to teacher‑train the next generation of women carpenters through a community
    vocational program. Additionally, Tracy hopes to take a leadership role in the local historic preservation society, where she can combine her practical skills with her passion for the region’s architectural
    heritage.
