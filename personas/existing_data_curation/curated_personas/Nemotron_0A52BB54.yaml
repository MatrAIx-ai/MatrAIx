  career_goals: Joshua aims to transition into a senior executive role, such as chief financial officer, within the next five to eight years. He seeks to lead his organization through a digital transformation,
    leveraging predictive analytics and AI-driven tools to enhance decision-making while maintaining flexibility to innovate financial processes. He is committed to fostering a workplace culture that prioritizes
    employee well‑being and mental health, reflecting his own experience with anxiety. To support these goals, he plans to earn the FRM certification and complete an executive MBA focused on leadership
    and ESG finance. Additionally, he aims to mentor emerging finance professionals and launch a community program that promotes financial literacy and stress‑management techniques.
