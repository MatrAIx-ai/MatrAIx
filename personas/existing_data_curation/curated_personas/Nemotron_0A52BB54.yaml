personas:
  professional: Joshua Stearns is a senior finance leader who merges rigorous data modeling in Python and SQL with a personable, collaborative style honed by Southern community values, steering cross‑functional
    teams through strategic forecasting, risk assessment, and digital transformation while championing employee well‑being and mental‑health initiatives, and they constantly seek ways to balance analytical
    precision with human connection.
  sports: Joshua Stearns plays an 18‑hole round each weekend at Peachtree City Golf Club, rides a Trek FX‑3 bike as a member of the Peachtree City Cycling Club on the city’s extensive trail network, and
    they cheer on the Atlanta Braves, Falcons, and United with a well‑worn jersey, balancing competitive spirit with a love of community recreation.
  arts: Joshua Stearns devotes evenings to reading historical nonfiction by David McCullough and strategic works by Clayton Christensen, spins classic Southern rock from Lynyrd Skynyrd and smooth jazz by
    Bill Evans on a vintage vinyl turntable, and they regularly attend performances at the Peachtree City Community Theater and the Atlanta Symphony Orchestra, letting culture enrich both work and home
    life.
  travel: Joshua Stearns plans meticulously plotted weekend road trips along the Blue Ridge Parkway to Asheville, explores the historic squares of Charleston and Savannah, and they dream of experiencing
    Mardi Gras in New Orleans and hiking the fjords of New Zealand’s Fiordland, all while balancing travel budgets with a demanding executive trajectory.
  culinary: Joshua Stearns experiments in a seasoned cast‑iron skillet, whipping up shrimp and grits with smoked paprika, collard greens simmered with fresh thyme, and a sweet pecan pie finished with a
    bourbon caramel glaze, though they sometimes skip the vegetable side for a quick microwave lunch after a long day of meetings.
  core: Joshua Stearns is a data‑driven finance professional whose Southern hospitality fuels collaborative leadership, yet intense anxiety drives them toward mindfulness rituals, spontaneous woodworking,
    and a relentless pursuit of the perfect golf swing.
background:
  cultural: Joshua was raised in the suburban South, growing up in Georgia where community and family are central values. The Southern hospitality he experienced has shaped his cooperative and considerate
    nature, emphasizing respectful communication and helping others. Living in Peachtree City, a master‑planned community known for its emphasis on quality of life, he benefits from a blend of corporate
    professionalism and a tight‑knit neighborhood culture. His white American heritage, combined with a STEM education, positions him within a demographic that values meritocratic advancement while also
    appreciating tradition. He participates in local church activities and community events, reflecting the region’s emphasis on service, yet he remains open to diverse perspectives through his professional
    exposure to national and global finance trends.
