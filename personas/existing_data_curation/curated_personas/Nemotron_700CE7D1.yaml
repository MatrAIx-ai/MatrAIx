personas:
  professional: Maria Botia, a retired machinist with over fifty years of hands-on CNC and manual metalworking experience, blends razor-sharp technical precision (interpreting complex engineering drawings,
    setting up lathes and mills, and troubleshooting safety hazards) with their bilingual communication skills to mentor apprentices, write clear work instructions, and foster collaborative crews, embodying
    a balance of relentless curiosity and practical reliability.
  sports: Maria Botia, an enthusiastic participant in low-impact community fitness, walks the Waikiki shoreline five times a week, joins water-aerobics classes at the Honolulu Aquatic Club, plays casual
    beach volleyball with the Honolulu Women's Volleyball Club during summer, and cheerfully supports the University of Hawaii Rainbow Warriors football team and the Golden State Warriors, reflecting their
    sociable, energetic nature.
  arts: Maria Botia, a lifelong lover of both Mexican folk and Hawaiian cultural arts, attends local hula performances and traditional zapateado showcases, finds inspiration in the paintings of Frida Kahlo
    and Diego Rivera, sings along to Israel Kamakawiwo'ole's 'Somewhere Over the Rainbow/What a Wonderful World,' and weaves stories and crocheted blankets at the senior center, integrating creativity into
    their community-focused life.
  travel: Maria Botia, who favors leisurely, culturally immersive trips, has explored her ancestral roots in Oaxaca, Mexico, trekked the volcanic landscapes of Maui’s Haleakalā, savored the delicate gardens
    of Kyoto, Japan, and dreams of visiting Bali’s terraced rice fields, always planning trips with family or group tours to accommodate their mobility and budget constraints.
  culinary: Maria Botia, a culinary bridge between Mexican heat and Hawaiian sweetness, delights relatives with taco al pastor made with kalua pork, crafts a spicy pineapple-habanero salsa featuring fresh
    cilantro and lime, prepares poke burritos that fuse ahi tuna with chipotle-marinated rice, and seasons coconut-lime arroz con pollo with chilies from their garden, all while proudly showcasing their
    garden-grown herbs and succulents.
  core: Maria Botia, an 88-year-old former machinist who channels relentless curiosity into mentoring, blends Mexican and Hawaiian flavors in the kitchen, walks the beach despite joint aches, and occasionally
    splurges on rare kitchen tools while never missing a storytelling circle at the senior center.
background:
  cultural: Maria was born in Mexico and moved to Oahu with her parents as a child, growing up in a close-knit Mexican-American community in Honolulu. She retained strong ties to Mexican traditions - celebrating
    Día de los Muertos, cooking family recipes, speaking Spanish at home, and participating in local Mexican festivals. Over the decades she also embraced Hawaiian culture, appreciating the Aloha spirit,
    attending luaus, learning basic hula steps, and adopting island customs such as beach gatherings and respect for the natural environment. This blended heritage informs her worldview, culinary experiments,
    community involvement, and her warm, cooperative personality.
attributes:
  skills: '[''Manual lathe operation'', ''CNC milling'', ''Blueprint reading'', ''Precision measurement (micrometer, caliper)'', ''Tool maintenance and sharpening'', ''Quality inspection'', ''Safety compliance'',
    ''Troubleshooting mechanical issues'', ''Mentoring apprentices'', ''Technical documentation'', ''Bilingual communication (Spanish/English)'', ''Basic engineering mathematics'', ''Project planning and
    organization'']'
  hobbies: '[''Mexican-Hawaiian cooking'', ''Gardening tropical herbs and succulents'', ''Community dance (hula and folk dance)'', ''Volunteering at senior center'', ''Storytelling and oral history sessions'',
    ''Reading historical fiction'', ''Crocheting and knitting'', ''Attending cultural festivals (Día de los Muertos, Hawaiian festivals)'', ''Beach walks'', ''Genealogy research'']'
  career_goals: Now retired from full-time work, Maria's primary goal is to pass on her wealth of machining knowledge to younger workers through mentorship at local community workshops and by documenting
    her techniques in a handwritten guide. She aspires to learn emerging additive manufacturing basics as a hobby, integrate that with her metal-fabrication skills, and perhaps create small art pieces.
    Maria also hopes to stay active in her community by volunteering at the senior center, preserving Mexican culinary traditions for her grandchildren, and maintaining her health through regular walking
    and group activities.
