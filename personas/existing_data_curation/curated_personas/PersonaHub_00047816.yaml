persona_description: A scientist who specializes in the development and testing of new mosquito repellents, particularly those that use negative pseudo-azeotrope compounds. She has a multidisciplinary approach
  to research, combining knowledge from different fields such as chemistry, biology, and engineering to create novel and effective repellents. Her research has led to the development of a new formula that
  is better at repelling mosquitoes and killing them if they make contact with it, and has opened the door to new mosquito repellent formulations that can improve the armoury against malaria.
