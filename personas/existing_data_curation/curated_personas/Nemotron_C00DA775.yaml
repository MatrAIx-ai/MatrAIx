personas:
  professional: Michelle Andros, a preschool architect in training, builds intricate block towers while questioning each design’s stability, meticulously arranges her play‑area for efficient building sessions
    yet flexibly reshapes plans when new pieces appear, and eagerly competes to be the first to complete a puzzle, showcasing a blend of curiosity, practicality, and competitive spirit, and they often share
    their ideas in a moderately talkative manner during group play.
  sports: Michelle Andros dashes across the playground as a spirited member of the River Rapids Youth Soccer Club, eagerly practices basic dribbling drills in the spring, splashes in the community pool
    during summer swim lessons, and proudly wears a Harbor Hawks cap while cheering for the team’s home runs, reflecting a balanced love of organized team sports and spontaneous active play.
  arts: Michelle Andros spends afternoons drawing vibrant scenes of Disney’s Frozen castle, passionately sings along to Idina Menzel’s 'Let It Go' while twirling to the rhythm of the Pixar soundtrack, and
    eagerly watches Sesame Street’s Elmo to emulate his expressive storytelling, letting these beloved artists shape her imaginative play and leisure time.
  travel: Michelle Andros loves family road trips to the Grand Canyon, where they marvel at the red rocks and collect smooth stones, enjoys the magical chaos of Disneyland in California as a splashy adventure,
    and dreams of visiting Paris to see the Eiffel Tower, all while preferring day‑long excursions over lengthy flights due to short attention spans.
  culinary: Michelle Andros delights in crunchy carrot sticks with hummus, spreads peanut butter and jelly on whole‑grain bread with precise finger movements, confidently stirs batter for banana pancakes
    under Mom’s supervision, and savors cheesy macaroni with a dash of paprika, showcasing a budding culinary confidence tempered by a picky palate.
  core: Michelle Andros is a fiercely curious five‑year‑old who balances organized play with spontaneous invention, competes eagerly in every game, and navigates the world with a skeptical yet enthusiastic
    eye toward new experiences.
background:
  cultural: Michelle was raised in a white, middle-class family in Columbia, South Carolina. Her upbringing includes Southern traditions such as attending Sunday school, celebrating local festivals like
    the Columbia Festival of the Arts, enjoying regional foods like fried chicken and peach cobbler at family gatherings, and participating in community activities at the local library and park. These cultural
    influences shape her polite manners, love for community events, and appreciation for both the familiar and the new.
