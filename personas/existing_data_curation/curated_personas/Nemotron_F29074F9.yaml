  career_goals: Marcus aims to move into a senior software architect role where he can lead multidisciplinary teams that merge technology and art. He dreams of launching a boutique studio that creates interactive
    digital installations for museums, galleries, and community spaces. He also wants to become a mentor and speaker, sharing his knowledge of creative coding at conferences and workshops. Ultimately, he
    seeks a remote‑first position that gives him the flexibility to travel the Pacific Northwest, continue his personal art projects, and maintain a balanced, low‑stress lifestyle.
