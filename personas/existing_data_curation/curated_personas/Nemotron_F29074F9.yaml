personas:
  professional: Marcus Proctor is a full‑stack developer turned aspiring software architect who blends Python and JavaScript prowess with a designer’s eye, crafting clean code and interactive generative
    art that reflects his meticulous yet imaginative approach to leading multidisciplinary remote teams.
  sports: Marcus Proctor hikes the Columbia River trail with the Northwest Hiking Club, follows the Portland Trail Blazers, practices weekend catch‑and‑release trout fishing, and occasionally joins a local
    recreational tennis group, balancing active pursuits with their occasional desk‑bound days.
  arts: Marcus Proctor creates generative visual pieces inspired by Bee Beeple and Refik Anadol, attends Seattle’s monthly art walk, collects prints from James Turrell, and relaxes listening to the soundtrack
    of indie games like *The Last of Us* and *Journey*, letting these influences shape their digital installations.
  travel: Marcus Proctor prefers self‑planned, remote‑work friendly trips that interlace Pacific Northwest hikes with cultural stops, having explored Vancouver, the San Juan Islands, and dreaming of Iceland’s
    Northern Lights and Kyoto’s tea houses, all while budgeting to keep travel costs in line with their lifestyle goals.
  culinary: Marcus Proctor cooks pan‑seared trout with lemon‑dill butter and cedar‑plank salmon, enjoys crafting artisan coffee blends, and often snacks on trail mix with dried apricots and almonds during
    hikes, though they sometimes overindulge in local craft beers after gallery openings.
  core: Marcus Proctor navigates life with a coder’s precision, an artist’s imagination, and a chronic worry that fuels disciplined routines and occasional splurges in art‑centric hobbies.
background:
  cultural: Marcus grew up in Kettle Falls, a small town in eastern Washington nestled along the Columbia River. His family’s roots trace back to early settlers of the Pacific Northwest, embodying the region’s
    values of self‑reliance, community support, and a deep appreciation for the outdoors. The rugged landscape and seasonal change fostered his love for hiking, fishing, and quiet reflection. Exposure to
    Seattle’s burgeoning tech scene during his early career added a forward‑thinking, innovative layer to his worldview. He identifies with mainstream American white middle‑class culture, emphasizing hard
    work, modesty, and a down‑to‑earth demeanor, while also respecting the local Native American heritage of the Chelan and Methow peoples, often participating in community events that celebrate regional
    history and environmental stewardship.
