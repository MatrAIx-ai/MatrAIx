  hobbies: '[''Bullet journaling'', ''Track and field (sprinting)'', ''Chess'', ''Sudoku'', ''Piano playing'', ''Cooking/Baking'', ''Math tutoring (volunteer)'']'
  career_goals: Trina aims to complete her high-school education, either by earning a GED or by enrolling in an alternative credit program, and then pursue an Associate’s degree in Business Administration
    with a focus on Operations Management at a local community college. She envisions a career in logistics or project coordination within Ohio’s manufacturing sector—ideally at a plant such as the nearby
    Honda or other automotive facilities—where she can apply her organizational talents and love of structured processes. In the longer term, she aspires to obtain a certification as a Certified Associate
    in Project Management (CAPM) and eventually move into a supervisory role overseeing supply-chain operations.
