  career_goals: Ricardo aims to leave a lasting impact on his organization by institutionalizing a mentorship program that prepares the next generation of managers, while continuing to refine operational
    efficiency through data‑driven initiatives. In the next five years he plans to spearhead a sustainability project that reduces energy consumption in the facility, positioning the site as a model for
    environmentally responsible logistics in the region. As he approaches retirement, he envisions transitioning to a part‑time advisory role, offering consulting services to small businesses in Dodge City
    on lean operations, and possibly authoring a practical guide on managing mid‑size warehouses.
