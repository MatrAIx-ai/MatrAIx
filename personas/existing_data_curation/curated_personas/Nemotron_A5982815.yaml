personas:
  professional: Maria Orellana, a 12‑year‑old aspiring digital illustrator and budding environmental researcher, combines her curious, organized nature and competitive streak to craft meticulously storyboarded
    animated narratives that showcase science‑fair projects on sustainable farming.
  sports: Maria Orellana, an energetic member of the neighborhood under‑12 soccer squad that practices at the community field, balances her competitive drive on the pitch with a disciplined weekly routine
    of physical stretches, while cheering for the city’s professional soccer club "Los Toros" and idolizing its forward star during televised matches.
  arts: Maria Orellana, a self‑taught cartoonist who spends afternoons sketching characters inspired by the whimsical style of local comic creators and animating short stories set to the folk rhythms of
    musicians like Lila Downs and Los Tigres del Norte, channels her curiosity into original graphic novels that blend ecological themes with traditional folklore.
  travel: Maria Orellana, who prefers meticulously planned weekend getaways over spontaneous trips, enjoys exploring historic stone city ruins like Palenque and the colorful murals of a nearby colonial
    town, while dreaming of a summer road‑trip to the coastal seaside of the Pacific shore, balancing family budget constraints with her love for immersive cultural festivals.
  culinary: Maria Orellana, an avid junior cook who modestly masters the art of hand‑shaping corn masa for tamales and seasoning rich mole with dried chilies, cacao, and spices, often spends Saturday afternoons
    helping her family prepare festive dishes like pozole and churros, while experimenting with fresh herbs such as epazote to personalize flavors.
  core: Maria Orellana, a fiercely curious 12‑year‑old who blends meticulous planning with a competitive edge, spends her days sketching cartoons, farming eco‑projects, and hoarding a secret stash of candy
    behind her school locker.
background:
  cultural: Maria comes from a Mexican‑American family that balances the traditions of her grandparents’ homeland with life in Salinas. At home she speaks Spanish, celebrates Día de los Muertos, enjoys
    mariachi music, and helps prepare tamales during holidays. Her family’s involvement in the local agricultural community gives her a strong sense of the land and its workers. These cultural roots shape
    her identity, instill a respect for community and family, and inspire her artistic interests in Mexican folklore and the stories of the Central Coast.
