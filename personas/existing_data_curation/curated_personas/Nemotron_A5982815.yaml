  hobbies: '[''drawing'', ''digital art'', ''reading graphic novels'', ''listening to Mexican folk music'', ''cooking traditional Mexican dishes'', ''science fair projects'', ''strategic board games'',
    ''soccer'', ''attending cultural festivals'']'
  career_goals: Maria dreams of becoming a multimedia artist and visual storyteller who highlights Mexican‑American culture and environmental themes. In the long term she aims to study graphic design and
    environmental science at a university, work for a creative agency or as an independent illustrator, and use her art to raise awareness about sustainable agriculture in Salinas. In the short term she
    wants to win her middle school art contest, build a strong portfolio, join a coding club, and earn a scholarship that supports her artistic ambitions.
