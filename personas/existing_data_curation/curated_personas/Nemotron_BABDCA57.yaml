  career_goals: Although retired from formal employment, Hewell aims to leave a lasting legacy within his community. He intends to write and self‑publish a memoir that documents his life in Tuscaloosa and
    the broader Black Southern experience, to mentor his grandchildren and local youths in practical trades, and to expand his church’s outreach program by establishing a weekly community garden that supplies
    fresh produce to low‑income families. He also hopes to travel to visit distant relatives and attend cultural‑heritage festivals in the Southeast while his health allows.
