personas:
  professional: Hewell Ferguson, a retired steel mill worker turned community mentor, leverages decades of carpentry, logistics, and volunteer coordination to lead his church's outreach initiatives and
    mentor youth in practical trades, balancing a curiosity for new DIY methods with reliable, tried‑and‑true craftsmanship.
  sports: Hewell Ferguson follows the Alabama Crimson Tide football team with fervent loyalty, enjoys watching regional college baseball, and spends weekend mornings fishing on the Black Warrior River,
    while occasionally joining the community center’s senior walking club to stay active.
  arts: Hewell Ferguson is an active member of his church’s gospel choir, delights in listening to classic R&B legends like Otis Redding and Aretha Franklin, and regularly participates in local storytelling
    circles where elders share memories, allowing them to weave personal history into communal narratives.
  travel: Hewell Ferguson dreams of road‑tripping to the Savannah historic district, attending the New Orleans Jazz & Heritage Festival, revisiting family roots at Charleston’s Gullah celebration, and taking
    short river cruises on the Tennessee, all while balancing health considerations and a modest travel budget.
  culinary: Hewell Ferguson cooks soulful Southern dishes such as fried catfish, collard greens with smoked ham hocks, peach cobbler, and sweet potato casserole, experimenting with fresh herbs like thyme
    and basil from his garden, while perfecting the balance of spices—cayenne, paprika, and a dash of molasses—in his weekend family meals.
  core: Hewell Ferguson blends seasoned craftsmanship with community devotion, juggling a love for gardening, gospel music, and storytelling while navigating the quirks of aging.
background:
  cultural: Hewell grew up in the historic Black community of Tuscaloosa during the era of segregation and the civil‑rights movement. His family’s roots trace back to the Great Migration, and his upbringing
    was steeped in Southern Black church life, gospel music, and strong communal ties. He carries the customs of family gatherings centered around soul food, the oral tradition of storytelling, and the
    reverence for church as a social anchor. His experiences reflect both the challenges and resilience of Black Alabamians, shaping his values of harmony, cooperation, and pragmatic optimism.
attributes:
  skills: '["Woodworking", "Home repair", "Gardening", "Southern cooking", "Volunteer coordination", "Basic mechanical troubleshooting", "Logistics planning", "Mentoring"]'
