persona_description: A dedicated and passionate neurologist who specializes in the diagnosis and treatment of traumatic brain injuries (TBI) and post-traumatic stress disorder (PTSD) in veterans and active
  duty soldiers. The individual is committed to improving the lives of military personnel who have experienced traumatic brain injuries and is actively working to identify at-risk individuals and provide
  them with the necessary help and resources to overcome the challenges they face. The neurologist is well-versed in the latest medical research and treatment techniques, and is always looking for new ways
  to improve the outcomes for military personnel who have been through the wars in Iraq and Afghanistan.
