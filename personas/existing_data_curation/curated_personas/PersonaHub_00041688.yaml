persona_description: A global public health expert with a focus on drowning prevention, specifically in low- and middle-income countries. This individual is passionate about reducing the global burden of
  drowning, which is a leading cause of death for children and young people. They are well-versed in the latest scientific research and have implemented successful drowning prevention projects in various
  countries. They are also knowledgeable about the underlying factors that contribute to drowning, such as access to water, safety measures, and public awareness. They are committed to making drowning prevention
  an integral part of national and local policy-making processes and are dedicated to sharing their knowledge and expertise to save lives.
