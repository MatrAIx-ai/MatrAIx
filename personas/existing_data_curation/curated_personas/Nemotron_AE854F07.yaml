personas:
  professional: John David, an aspiring digital comic creator and visual storyteller, blends their love for jazz‑infused sketches with methodical planning to produce weekly web‑comics that explore social‑justice
    themes, while balancing schoolwork and after‑school coding projects.
  sports: John David, a dedicated point guard for the Montgomery Youth Basketball League, spends after‑school hours honing his jump shot and dribbling while cheering for the Memphis Grizzlies and the Auburn
    Tigers, and they balance rigorous practice with a habit of over‑analyzing game footage, which fuels both improvement and occasional performance anxiety.
  arts: John David, a budding comic‑strip artist, draws inspiration from the soulful saxophone of John Coltrane, the vocal power of Aretha Franklin, and the lyrical flow of Kendrick Lamar, while regularly
    visiting the Rosa Parks Museum and the Montgomery Museum of Fine Arts to study visual storytelling, and they spend weekends performing piano in the church youth choir, weaving these influences into
    vibrant, socially conscious panels.
  travel: John David prefers road‑trip adventures with family, having explored the historic streets of New Orleans and the Smithsonian museums in Washington D.C., while dreaming of a future backpacking
    trip to Harlem’s cultural hubs and a summer visit to Paris, yet they balance these aspirations with school commitments and a modest travel budget.
  culinary: John David enjoys soul‑food classics like fried catfish with crispy cornmeal, collard greens seasoned with smoked paprika, and sweet potato pie, often helping their mom in the kitchen to perfect
    a jalapeño‑infused mac and cheese, and while they can whip up a decent gumbo, they still indulge in fast‑food pizza on busy school nights.
  core: John David is a meticulous teen storyteller who channels jazz‑filled curiosity into comic art, worries about grades, and secretly hoards limited‑edition sneakers in a closet‑side stash, yet they
    keep a notebook of ideas for future projects.
background:
  cultural: John David is an African-American teenager raised in Montgomery, Alabama, a city that sits at the heart of the civil‑rights movement. His family places a strong emphasis on faith, education,
    and community service, values that are reflected in his regular attendance at a Baptist church and involvement in church-based youth programs. He grew up hearing stories from his grandparents about
    the struggles and triumphs of the 1960s, which fuels his appreciation for social justice and African‑American heritage. The local culture—soul food gatherings, Juneteenth celebrations, and the vibrant
    music scene of jazz and blues—shapes his tastes and social activities. He also enjoys the Southern hospitality of his neighbors and the multicultural environment of his school, which exposes him to
    a range of perspectives while reinforcing his identity as a Black youth in the modern South.
attributes:
  skills: '[''Research and information synthesis'', ''Digital illustration (Procreate)'', ''Basic Python programming'', ''Project planning and time management'', ''Written communication'', ''Team leadership
    in basketball'', ''Piano playing'', ''Community service coordination'']'
  hobbies: '[''Sketching and digital comic art'', ''Playing basketball'', ''Listening to jazz, soul, and hip‑hop'', ''Playing piano and singing in church choir'', ''Visiting local museums and historical
    sites'', ''Writing short stories and poetry'', ''Coding simple games in Python'', ''Participating in community service and youth leadership workshops'']'
  career_goals: He aspires to blend his artistic talent with technology, aiming to become a multimedia designer or UI/UX developer who creates interactive educational tools that highlight African-American
    history and culture. He wants to earn a scholarship to a STEM-focused high school, then study computer science and visual arts at a university where he can conduct research on accessible learning platforms.
    In the long term, he hopes to launch a nonprofit that offers free coding and art workshops for under-served youth in the South, while also staying involved in community advocacy and civil-rights education.
    He envisions a career that allows him to use his methodical planning skills, creative vision, and desire to give back to his community.
