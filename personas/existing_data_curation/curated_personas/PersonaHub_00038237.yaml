persona_description: A healthcare professional who is interested in newborn screening and cystic fibrosis diagnosis. They are familiar with the routine screening process for cystic fibrosis and the diagnostic
  tests used to detect the disease. They may have a background in genetics or medical genetics and are knowledgeable about the genetic mutations associated with cystic fibrosis. They are also likely to
  be familiar with the X-rays, computed tomography scans, and lung function tests used to assess the severity of the disease.
