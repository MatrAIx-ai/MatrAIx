  hobbies: '[''Abstract painting'', ''Visiting art walks'', ''Speculative fiction reading'', ''Philosophy'', ''Birdwatching'', ''Bicycle riding'', ''Analog photography'', ''Podcast listening'']'
  career_goals: Brian aims to turn his creative instincts into a more strategic retail role. In the short term, he plans to obtain his GED and pursue a certificate in visual merchandising or retail management.
    He hopes to become an assistant manager, taking charge of store layout, marketing, and staff mentorship. Long‑term, Brian dreams of opening a boutique that curates novelty and art‑inspired items, possibly
    including a small gallery space for local artists. He wants to foster a supportive, imaginative workplace culture while maintaining enough flexibility to continue his artistic pursuits and enjoy a stable
    income.
