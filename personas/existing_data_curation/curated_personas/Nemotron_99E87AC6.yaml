  career_goals: John aims to leave a lasting legacy by institutionalizing a regional training curriculum for retail supervisors and mentoring younger managers. He plans to earn his Certified Retail Manager
    credential, author a practical guidebook on effective store supervision, and transition into part‑time consulting for independent retailers. Additionally, he hopes to serve on the Plainfield Chamber
    of Commerce board to shape local business policy, while gradually scaling back his hours to enjoy more family time and his personal projects.
