  hobbies: '["Volleyball", "Hiking", "Science podcasts", "Community theater", "Cooking healthy meals", "Yoga", "Volunteer work at senior center", "Reading popular science books", "Photography"]'
  career_goals: Rachael aims to advance from her current nursing‑assistant role to a registered nurse position by enrolling in an accelerated BSN program within the next two years. She is driven to specialize
    in geriatrics or community health, where her empathy and cooperative style can improve patient outcomes. Long‑term, she envisions leading a quality‑improvement team or pursuing a Master's in Health
    Informatics to combine her analytical STEM background with clinical practice. She also hopes to mentor new nursing assistants, using her organized approach to develop clear training protocols. Balancing
    curiosity with practicality, she plans to stay current with evidence‑based practices while building a stable, rewarding career in healthcare.
