  career_goals: Jerry dreams of becoming an aerospace engineer because he loves learning about space and building things, but he also talks about wanting to be a veterinarian to help animals he discovers
    during nature walks. He imagines designing robots that can assist wildlife rescue teams. At school, he aspires to be class president, hoping to organize fun activities for his classmates and make sure
    everyone's voice is heard. His goals combine his curiosity for new ideas, his practical desire to solve real problems, and his passion for caring for others.
