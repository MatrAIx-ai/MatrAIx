personas:
  professional: Jerry Styga is an aspiring junior engineer who channels their organized curiosity into designing futuristic LEGO vehicles and leading collaborative soccer drills after school, demonstrating
    practical problem‑solving, teamwork, and an assertive yet cooperative spirit.
  sports: Jerry Styga thrives as a forward for the Gaffney Youth Soccer Club, devoting after‑school hours to drills and weekend matches while cheering for the Carolina Panthers and the South Carolina Gamecocks,
    and balances structured practice with spontaneous backyard games that keep their energy high.
  arts: Jerry Styga channels creative energy into sketching comic panels inspired by Spider‑Man and drawing vivid characters while listening to pop hits from Taylor Swift and acoustic tunes by Ed Sheeran,
    and loves building imaginative LEGO spacecraft that echo their love for science‑fiction adventure novels.
  travel: Jerry Styga prefers impromptu weekend camping trips to the nearby Blue Ridge Mountains, where they collect insects and map the forest floor, and dreams of a summer family adventure to the Kennedy
    Space Center to see rockets and experience zero‑gravity simulations.
  culinary: Jerry Styga enjoys crafting homemade macaroni and cheese with sharp cheddar and hidden peas, savoring pepperoni pizza topped with extra cheese while humming pop choruses, and occasionally roasting
    marshmallows for s’mores over a campfire during woodland excursions.
  core: Jerry Styga is a curiosity‑driven, socially energetic eight‑year‑old who balances organized LEGO engineering and cooperative soccer leadership with bouts of anxiety that they soothe through music,
    nature walks, and a disciplined allowance routine.
background:
  cultural: Jerry is a white boy growing up in Gaffney, South Carolina, a small town in Cherokee County known for its close‑knit community and Southern traditions. His family embraces Southern hospitality,
    often gathering for meals centered on regional dishes like biscuits, fried chicken, and peach cobbler. He attends a local church where community service and youth events are a regular part of life.
    The area’s history includes Appalachian influences and proximity to Cherokee heritage, though his upbringing reflects a contemporary, middle‑class Southern environment that values education, respect
    for elders, and participation in school and town activities such as football games and county fairs. These cultural elements shape his social interactions, values, and sense of belonging.
