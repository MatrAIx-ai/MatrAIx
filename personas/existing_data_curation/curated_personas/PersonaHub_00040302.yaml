persona_description: A cardiologist or a physiologist who is interested in understanding the cardiovascular system and its functions, particularly the stroke volume and its impact on cardiac output and
  ejection fraction. This person is likely to have a background in echocardiography and cardiovascular magnetic resonance imaging, and may have expertise in stroke volume measurement and its physiological
  implications. They may also be familiar with the reference values for stroke volume and its relationship with heart rate, body surface area, and other parameters.
