personas:
  professional: Jorge Iracheta is a budding Lego architect who relishes step‑by‑step building guides, methodically sorting bricks by color and size to construct detailed models, yet sometimes leaves the
    set in disarray when an imaginative idea prompts a spontaneous redesign, and they often double‑check the instruction booklet before starting.
  sports: Jorge Iracheta is an enthusiastic youth soccer player who joins a small Saturday morning kick‑around at the local park, idolizes the nearby professional club's blue‑white team, and balances friendly
    competition with moments of solitary cloud‑watching on the sidelines, while they cheer loudly after a good pass.
  arts: Jorge Iracheta expresses his creativity through bright, festival‑inspired drawings that burst with reds and golds while humming the lively folk tunes his family plays on the kitchen radio, often
    dancing his own improvisational steps between coloring sessions, and they love to show their artwork to friends.
  travel: Jorge Iracheta loves family road trips to the sunny seaside town where he builds sandcastles shaped like his Lego creations, dreams of exploring the historic plaza with its vividly painted buildings,
    and prefers trips packed with a clear itinerary yet leaves room for spontaneous beach discoveries, because they enjoy both structure and surprise.
  culinary: Jorge Iracheta enjoys helping his mom assemble tacos and quesadillas, carefully sprinkling cheese and fresh cilantro, and delights in tasting the tangy salsa verde while proudly claiming the
    title of 'official taste‑tester' during dinner preparation, and they make sure to lick the spoon clean after each batch.
  core: Jorge Iracheta is a structured yet whimsical six‑year‑old who methodically builds Lego worlds, anxiously guards their allowance, battles seasonal sniffles, scores goals at the park, colors with
    festival flair, and proudly critiques every taco they help create.
background:
  cultural: Jorge comes from a Mexican‑American family living in the Bronx, where Spanish is spoken at home and English is used at school and in the neighborhood. His family celebrates Día de los Muertos
    and Cinco de Mayo with colorful altars, traditional foods like tamales and mole, and lively music. They attend a local Catholic church, where community events reinforce a strong sense of belonging.
    The multicultural environment of the Bronx has exposed Jorge to diverse foods, languages, and festivals, shaping a bicultural identity that blends Mexican traditions with the fast‑paced urban life of
    New York City. Family gatherings often involve storytelling, shared meals, and teaching Jorge Portuguese phrases from relatives, further enriching his cultural tapestry.
attributes:
  skills: '[''Basic literacy (reading and writing)'', ''Basic numeracy (counting and simple addition)'', ''Bilingual in Spanish and English (conversational)'', ''Puzzle solving (jigsaw puzzles, Lego building)'',
