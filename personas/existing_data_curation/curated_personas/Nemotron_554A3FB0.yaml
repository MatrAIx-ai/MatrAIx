  hobbies: '[''Building with Lego bricks'', ''Drawing and coloring'', ''Playing soccer at the local park'', ''Listening to traditional Mexican music'', ''Reading picture books in English and Spanish'',
    ''Playing educational tablet games (matching, simple puzzles)'', ''Helping mom in the kitchen (making tacos, stirring)'']'
  career_goals: Although still young, Jorge often talks about growing up to be a firefighter because he admires the clear rules, teamwork, and the way firefighters keep the community safe—a career that
    feels both structured and beneficial. He also imagines being a teacher one day, enjoying the idea of sharing knowledge in a predictable classroom setting while helping other kids learn. Occasionally,
    he mentions building things like bridges or towers, hinting at a budding interest in engineering. Overall, his ambitions revolve around roles that provide stability, protect others, and allow him to
    apply his practical skills in a supportive environment.
