persona_description: A medical statistician who specialized in the field of public health, particularly in the analysis of death rates and the spread of infectious diseases. William Farr was a pioneer in
  the use of medical statistics and his work laid the foundation for modern epidemiology. He was particularly interested in the causes of death and the environmental factors that contributed to disease
  transmission. His statistical calculations on the causes of death and the spread of cholera helped to establish the link between land elevation and cholera mortality rates, which was later proven by John
  Snow. Farr's work on the causes of death and the spread of infectious diseases has had a lasting impact on the field of public health and continues to be studied and referenced today.
