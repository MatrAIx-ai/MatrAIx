persona_description: A wildlife biologist who specializes in the study of river otters, particularly their behavior, habitat, and conservation. They are particularly interested in the otter's role in maintaining
  a natural balance among species and improving conditions for game fish. They are passionate about the otter's ability to hunt and eat undesirable introduced species, and are dedicated to the restoration
  of river otters in New Mexico. They have a strong interest in the otter's complex social behavior and the development of their young. They are skilled in using scientific research and data to inform conservation
  efforts and are committed to protecting the otter's habitat and ensuring their survival.
