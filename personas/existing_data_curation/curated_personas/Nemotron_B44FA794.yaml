  career_goals: Kinuko aspires to earn a scholarship to a top university where she can major in computer science or biomedical engineering, fields that blend her interests in technology and health science.
    In the short term, she aims to obtain certifications in Python and robotics, win a regional STEM competition, and secure a summer internship at a tech start‑up. She also hopes to improve her Japanese
    proficiency and maintain her Korean language skills, ultimately positioning herself for a career that bridges East Asian and American markets while developing accessible medical devices or innovative
    software solutions.
