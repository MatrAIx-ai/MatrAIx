personas:
  professional: Kinuko Bae, a fifteen‑year‑old aspiring robotics and indie‑game developer, blends their passion for digital manga illustration with hands‑on engineering, often sketching concept art before
    coding simple platformers for school hackathons.
  sports: Kinuko Bae enjoys weekend hikes along Jacksonville’s beaches and the Timucuan Ecological Preserve, occasionally joins a local youth soccer club that competes under the Jacksonville Armada FC banner,
    and cheers for the Jacksonville Jaguars while keeping a casual beach‑volleyball routine with friends.
  arts: Kinuko Bae immerses themselves in the worlds of anime like 'Attack on Titan' and 'My Hero Academia', listens to K‑pop groups such as BTS and BLACKPINK, crafts manga‑style illustrations on Clip Studio
    Paint, and plays the violin in the school orchestra, often performing Vivaldi’s 'Winter' concerto.
  travel: Kinuko Bae prefers short, well‑planned road trips to nearby attractions such as Orlando’s theme parks and the historic streets of Savannah, while dreaming of a future backpacking adventure through
    Tokyo and Seoul to experience anime studios and Korean street food firsthand.
  culinary: Kinuko Bae enjoys cooking at home, expertly preparing bibimbap with gochujang, kimchi jjigae, and bulgogi alongside their family, while also experimenting with matcha‑infused desserts and savoring
    classic American pizza on movie nights.
  core: Kinuko Bae is a tech‑savvy teen who balances robotics, manga art, and K‑pop fandom, all while navigating high‑school life with a notebook of reflections, a love for the beach, and a habit of staying
    up late gaming.
background:
  cultural: Kinuko comes from a mixed Korean‑Japanese household. Her father, a first‑generation Korean immigrant, runs a small Asian grocery store in Jacksonville, while her mother, born in Japan, works
    as a school librarian. The family celebrates both Korean and Japanese traditions, such as Seollal (Lunar New Year), Chuseok, and Japanese Obon, while preparing foods like kimchi, bibimbap, and takoyaki.
    Korean is spoken at home, and she attends Saturday Korean language school; Japanese lessons are taken on weekends with her mother. Growing up in Jacksonville, she also embraces Southern beach life,
    local community events, and mainstream American school culture, creating a bicultural identity that blends East Asian values of family respect, academic diligence, and communal harmony with the diverse,
    individualistic environment of Florida.
