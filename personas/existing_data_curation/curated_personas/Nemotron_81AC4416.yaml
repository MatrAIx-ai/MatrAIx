  hobbies: '["Drawing animals and nature scenes", "Collecting leaves, pine cones, and stones", "Building LEGO and wooden block structures", "Listening to and singing nursery rhymes and Hindi lullabies",
    "Reading picture books (English and Malayalam)", "Playing memory matching card games", "Exploring the backyard and nearby park", "Using educational tablet apps for alphabet and number learning"]'
  career_goals: Even at five, Pallavi is already dreaming about what she might become. Her endless questions about how things work fuel a fascination with science and engineering, so she often says she
    wants to be a scientist or inventor who explores nature and builds simple machines. She also loves stories and picture books, leading her to imagine becoming a teacher or children's author who can share
    knowledge and imagination with other kids. Occasionally she mentions caring for animals and pictures herself as a veterinarian after visiting a local farm. These ambitions reflect her blend of curiosity,
    practical problem-solving, and a quiet competitive drive to succeed.
