persona_description: A scientist or agronomist who is interested in the study of bacterial wilt caused by Ralstonia solanacearum and its control through soil amendments. This person is likely to have expertise
  in plant physiology, microbiology, and soil science. They would be interested in understanding the mechanisms of bacterial wilt, the effects of soil amendments on bacterial survival and disease control,
  and the potential of calcium carbonate as a soil amendment. They would also be interested in conducting laboratory experiments to investigate the effects of pH and Ca2+ on the survival of R. solanacearum
  and the growth of the bacteria.
