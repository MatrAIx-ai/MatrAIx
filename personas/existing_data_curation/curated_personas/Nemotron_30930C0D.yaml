  hobbies: '[''Pickup basketball'', ''Barbecue cooking'', ''Classic rock music'', ''Car restoration projects'', ''Attending local sports events'', ''Community volunteering'', ''Jogging/fitness'', ''DIY
    home improvement'']'
  career_goals: Yone aims to move into a supervisory role such as fleet manager or logistics coordinator, where he can oversee a team of drivers, implement efficiency improvements, and mentor newcomers.
    He plans to obtain additional certifications, including a hazardous materials endorsement and a small‑business management course at a community college, with the long‑term ambition of founding his own
    independent delivery service that leverages his driving and sales experience. Ultimately, he seeks financial stability to purchase a home for his family and provide a secure future for his children.
