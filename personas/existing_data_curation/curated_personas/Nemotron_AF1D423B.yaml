personas:
  professional: Irma Camacho, a 40‑year‑old elementary and middle‑school teacher in East Wenatchee, blends bilingual project‑based learning with tech tools while wrestling with her love of spontaneity that
    often leaves lesson plans scattered, yet she leverages data‑driven assessment to push students toward academic equity and eyes a district curriculum‑leadership role.
  sports: Irma Camacho, an avid hiker of the Cascades and a player on the local adult recreational soccer team the East Wenatchee Rovers, follows the Seattle Seahawks and Seattle Sounders with competitive
    zeal, squeezing weekly trail runs into her schedule to balance fitness with her love of the outdoors.
  arts: Irma Camacho, a community‑oriented acoustic guitarist, often serenades family gatherings with songs by José González and traditional folk ballads, while her book club debates historical fiction
    like Ken Follett’s *Pillars of the Earth* and she regularly attends performances at the East Wenatchee Community Theater featuring plays by August Wilson.
  travel: Irma Camacho, who blends meticulous planning with spur‑of‑the‑moment road trips, has explored Oaxaca’s markets for authentic mole, lingered on a weekend hike in Banff National Park, and dreams
    of visiting the historic gardens of Kyoto, balancing family visits across the border with solo retreats in the Pacific Northwest.
  culinary: Irma Camacho, a passionate home cook, perfects tacos al pastor with pineapple‑infused pork, crafts pozole using fresh hominy from her garden, and experiments by adding smoked poblano and heirloom
    corn tortillas, always pairing meals with lime, cilantro, and a side of salsa verde.
  core: Irma Camacho is a spontaneously creative educator who juggles bilingual teaching, gardening, and fierce competition in both the classroom and on the soccer field, all while battling a chronic last‑minute
    habit.
background:
  cultural: Irma is a first‑generation Mexican‑American whose family roots trace back to the state of Jalisco. Raised in a bilingual household, she speaks fluent Spanish and English and grew up celebrating
    Mexican holidays such as Día de los Muertos, Cinco de Mayo, and Las Posadas with extended family gatherings. These traditions instilled a strong sense of community, family loyalty, and respect for cultural
    heritage. After moving to the Pacific Northwest, she blended her Mexican upbringing with the local culture, participating in community festivals, farm‑to‑table events, and the regional emphasis on outdoor
    recreation. Irma integrates her cultural background into her teaching by incorporating Mexican folklore, bilingual resources, and culturally responsive examples into lessons, fostering an inclusive
    classroom environment that honors both her heritage and the diverse community of East Wenatchee.
attributes:
  skills: '[''Curriculum design'', ''Project‑based learning'', ''Differentiated instruction'', ''Bilingual education (Spanish‑English)'', ''Educational technology integration (Google Classroom, SmartBoard)'',
    ''Student assessment and data analysis'', ''Classroom behavior management'', ''Parent and community communication'', ''Lesson planning with flexibility'', ''Collaborative teaching and mentoring'']'
  hobbies: '[''Gardening (vegetables and orchard trees)'', ''Hiking in the Cascades'', ''Cooking traditional Mexican cuisine'', ''Playing acoustic guitar'', ''Reading historical fiction and educational
    research'', ''Participating in a local book club'', ''Volunteering at community literacy programs'', ''Exploring new educational technology tools'', ''Practicing yoga'', ''Evening journaling'']'
  career_goals: Irma aims to transition into a leadership role where she can shape curriculum and teacher development at the district level. She plans to earn a Master’s degree in Educational Leadership
    within the next three years, with a focus on culturally responsive pedagogy and bilingual education. Her short‑term goal is to design a district‑wide professional‑development series on integrating project‑based
    learning with technology. Long‑term, she envisions establishing an after‑school STEM enrichment program that serves both English‑speaking and Spanish‑speaking students in East Wenatchee, fostering equity
    and hands‑on inquiry. Additionally, she is committed to strengthening her organizational skills to become a mentor teacher for new educators, helping them balance creativity with structure.
