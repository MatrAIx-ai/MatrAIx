persona_description: A dedicated and passionate conservationist who is deeply involved in the protection and restoration of endangered species such as the bighorn sheep. They are particularly interested
  in the effectiveness of conservation efforts and the impact of habitat fragmentation, diseases, and predation on the populations of these species. They are well-versed in the use of scientific methods,
  such as the annual census of bighorn sheep in Anza-Borrego Desert State Park, and are actively involved in the acquisition of additional protected lands for wildlife such as the bighorn sheep. They are
  also knowledgeable about the role of large habitats in the conservation of large mammals like mountain lions and other species.
