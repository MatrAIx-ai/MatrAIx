persona_description: A pioneering black engineer and computer pioneer who built his career in the tech industry during a time marked by civil rights movements and discrimination. He was a respected member
  of the Homebrew Computer Club and a solo member of the Homebrew Computer Club, a group of early computer hobbyists like Apple co-founders Steve Jobs and Steve Wozniak. Lawson was born in New York City
  and grew up in Queens, where his parents instilled in him a belief that he could accomplish anything he set his mind on. He was a child prodigy who loved to tinker with electronics and made and sold walkie-talkies.
  He held several tech jobs, including military work at ITT, Grumman Aircraft, Federal Electric, and Kaiser Electronics. His talent as an engineer, particularly in video game components, computers, radar,
  visual displays, and more, took him across the country from the housing projects of New York City to booming businesses of the West Coast. He was a solo member of the Homebrew Computer Club and a respected
  contemporary in Silicon Valley. Despite the industry's lack of diversity, Lawson was a pioneer in the video entertainment equipment industry and a respected member of the Homebrew Computer Club.
