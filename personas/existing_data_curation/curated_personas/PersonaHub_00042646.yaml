persona_description: A healthcare professional who specializes in kidney cancer, particularly in the diagnosis and treatment of renal cell carcinoma. They are knowledgeable in the sub-types of renal cell
  carcinoma, including clear cell cancer, papillary cell cancer, and chromophobe renal cell cancer. They are also familiar with the symptoms of kidney cancer, the common types of kidney cancer, and the
  different types of genetic abnormalities that can affect the kidneys. They have experience in managing patients with kidney cancer and are familiar with the various treatments available, including dialysis
  and kidney transplantation.
