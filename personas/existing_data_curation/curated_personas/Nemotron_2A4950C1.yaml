  hobbies: '[''Watercolor painting'',''Pottery'',''Creative writing'',''Hiking in Pine Ridge'',''Bird‑watching'',''Historical fiction book club'',''Community theater set design'',''Gardening prairie natives'']'
  career_goals: Approaching retirement, Kristen aims to transition into a district‑wide curriculum specialist role where she can shape arts‑infused teaching frameworks for all grade levels. She is interested
    in establishing a community‑center partnership that offers after‑school workshops in painting, storytelling, and environmental education. Additionally, she hopes to mentor emerging educators through
    a formal apprenticeship program and to contribute articles on imaginative pedagogy to regional education journals.
