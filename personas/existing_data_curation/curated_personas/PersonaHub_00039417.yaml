persona_description: A group of CU-Boulder students who are passionate about engineering and are working towards bringing sustainable solutions to communities facing health-related concerns in Nepal, Rwanda,
  and Peru. They are using their engineering skills to design and implement safe drinking water systems, wireless local networks, and potable water systems, and are working alongside the communities to
  design and implement solutions. They are also actively involved in the national nonprofit Engineers Without Borders, which is one of the many ways the college is offering hands-on, active learning and
  design experiences to enhance the engineering curriculum.
