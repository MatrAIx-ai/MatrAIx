  career_goals: Anthony aims to move from a front‑line surveillance officer to a senior security manager within a major casino, where he can lead a team, integrate AI‑driven monitoring tools, and develop
    robust training programs for new guards. He seeks certification as a Certified Protection Professional and hopes to eventually act as a security consultant, offering risk‑assessment services to hospitality
    venues across South Florida. Additionally, he plans to champion a wellness initiative for security staff that addresses stress management, leveraging his own experiences to create a healthier work environment.
