personas:
  professional: Michael Fajardo, a meticulous kindergarten classroom helper, they organize daily routines, lead group activities, and ensure classmates share nicely, reflecting an early knack for reliable
    leadership.
  sports: Michael Fajardo, a lively five‑year‑old, they join the neighborhood soccer league as a forward for the Little Tigers, attend Saturday swimming lessons, and cheer enthusiastically for the city’s
    baseball team, the Raptors, embodying group play and boundless energy.
  arts: 'Michael Fajardo, who loves drawing dinosaurs after watching Jurassic World: Camp Cretaceous, they enjoy singing along to the Frozen soundtrack and frequently mimic the dance moves of Baby Shark,
    showing that creative expression fuels their daily play.'
  travel: Michael Fajardo, an adventurous preschooler, they love weekend trips to the local zoo, relish family vacations to Disney World, and dream of exploring the Grand Canyon, balancing short excursions
    with a thirst for new sights.
  culinary: Michael Fajardo, a picky yet curious eater, they adore mac and cheese, chicken nuggets, and apple slices, help stir pancake batter on weekend mornings, and occasionally sneak a bite of carrots
    from the kitchen counter, reflecting a developing palate and playful cooking habit.
  core: Michael Fajardo, a five‑year‑old who blends meticulous classroom leadership, disciplined savings, and boundless compassion, they navigate daily life with predictable routines, cheerful teamwork,
    and a sweet tooth that sometimes outruns their orderly habits.
background:
  cultural: 'Michael is a second‑generation Mexican‑American raised in Reading, PA. His household blends Mexican traditions with American life: he speaks English fluently and knows basic Spanish, celebrates
    holidays such as Día de los Muertos and Cinco de Mayo with family, and enjoys Mexican foods like tacos and tamales. The strong family‑centered values, emphasis on community harmony, and the blend of
    bilingual environment shape his compassionate and cooperative personality.'
