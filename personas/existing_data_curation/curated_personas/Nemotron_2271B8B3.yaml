personas:
  professional: Bridgette Wolf, a retired civil engineer, merges her practical structural analysis acumen with a curiosity‑driven desire to mentor, applying meticulous bridge design, GIS mapping, and Python
    modeling to guide youth robotics teams while flexibly adapting to community sustainability projects, all anchored by her compassionate, steady temperament.
  sports: Bridgette Wolf stays active by walking the Tallahassee Boardwalk Trail with the local Senior Walking Club, joining a community pickleball league each spring, and cheering on the Florida State
    Seminoles football team every fall.
  arts: Bridgette Wolf weaves artistic inspiration from the quilts of Faith Ringgold and the piano works of Claude Debussy, regularly attending performances by the Tallahassee Symphony Orchestra and savoring
    the timeless vocals of Ella Fitzgerald during her church community events.
  travel: Bridgette Wolf favors thoughtfully planned road trips that blend birdwatching in the Everglades National Park with historic tours of Savannah, Georgia, while dreaming of a serene pilgrimage to
    the ancient temples of Kyoto, Japan, though limited health considerations keep most journeys within the Southeast.
  culinary: Bridgette Wolf delights in cooking Southern comfort dishes such as shrimp and grits, fried green tomatoes, and sweet potato pie, expertly seasoning with fresh thyme, smoked paprika, and locally
    sourced pecans, while she enjoys occasional outings to farm‑to‑table restaurants that feature heirloom tomatoes and collard greens.
  core: Bridgette Wolf is a pragmatic yet curious lifelong engineer who balances methodical planning with spontaneous quilting marathons, habitually checks her birdwatching log at breakfast, and often over‑commits
    to community projects, sacrificing some well‑deserved downtime.
background:
  cultural: Bridgette grew up in a multigenerational white Southern family in rural Georgia, where values of hospitality, community service, and respect for tradition were emphasized. After earning her
    engineering degree at Florida State University, she settled in Tallahassee, where she and her husband have been active members of their local Baptist church and longtime participants in neighborhood
    associations. Her cultural upbringing blends a deep appreciation for Southern customs—such as seasonal family reunions and church potlucks—with a progressive outlook that embraces education, mentorship,
    and civic engagement.
attributes:
  skills: '[''Structural Engineering'', ''Bridge and Roadway Design'', ''Environmental Impact Assessment'', ''Project Management'', ''Data Analysis (Python, R)'', ''GIS Mapping'', ''Grant Writing'', ''STEM
