  hobbies: '[''Birdwatching'', ''Native‑Plant Gardening'', ''Historical Fiction Reading'', ''Quilt Making'', ''Piano Playing'', ''Cooking Southern Cuisine'', ''Volunteer STEM Workshops'', ''Walking Tours
    of Tallahassee'']'
  career_goals: Although formally retired, Bridgette aims to expand her influence in the local STEM ecosystem by serving on the board of a regional nonprofit that promotes engineering careers for young
    women. She plans to develop a mentorship program linking senior engineers with high‑school robotics clubs, and she hopes to author a memoir that chronicles her journey as a woman in a traditionally
    male‑dominated field. Additionally, she is eager to deepen her knowledge of renewable‑energy infrastructure through short courses, and she aspires to lead a citizen‑science project that monitors water
    quality in the surrounding wetlands.
