persona_description: A successful and influential African-American businessman who made significant contributions to the development of African-American-owned businesses and supported education and philanthropy
  in the African-American community. He was a member of the North Carolina Industrial Association and later became its vice-president, treasurer, and president. His major contribution was the organization
  of the Coleman Manufacturing Company, the nation's first African-American-owned and operated textile factory, which he helped found and supported. He also supported African-American education at Howard
  University, Livingstone College, and Shaw University, and assisted in the development of the Coleman School in Welford, South Carolina. His philanthropy extended to the Zion Hill Church and Price Memorial
  Temple in Concord.
