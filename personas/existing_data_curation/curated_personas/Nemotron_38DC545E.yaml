  career_goals: Though officially retired, Edwin aims to stay purposeful by volunteering at the local veteran’s association and the community center, where he can mentor youth in practical trade skills.
    He aspires to complete an ambitious scale model of a historic Newport News ship, preserving local naval heritage. Maintaining his family's financial security through careful budgeting and health insurance
    management is a priority, as is establishing a consistent daily routine that supports his mental well‑being. He also hopes to become an advocate for seniors' mental‑health resources in his neighborhood.
