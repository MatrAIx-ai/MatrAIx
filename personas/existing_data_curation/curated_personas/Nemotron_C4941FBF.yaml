    tracking'', ''Schedule coordination'', ''Conflict resolution'', ''Basic electrical wiring'', ''Welding'', ''Environmental regulation adherence'', ''First‑aid certification'']'
  hobbies: '[''Fly fishing'', ''Hunting (deer and elk)'', ''Backpacking and hiking'', ''Woodworking (furniture making and tool restoration)'', ''Acoustic guitar playing'', ''Volunteer home‑repair projects'',
    ''Collecting vintage construction equipment models'']'
  career_goals: At 54, Wayne aims to transition from day‑to‑day site supervision to a senior supervisory or consulting role that leverages his depth of practical knowledge while offering a more predictable
    schedule for his family. He plans to earn a Project Management Professional (PMP) certification to broaden his project‑leadership credentials, and he envisions eventually launching a modest contracting
    business focused on small‑scale remodeling and site‑prep projects in the Okanogan Valley. Mentoring the next generation of tradespeople is a core ambition, and he hopes to formalize an apprenticeship
    program through the local union to pass on his structured yet adaptable work ethic.
