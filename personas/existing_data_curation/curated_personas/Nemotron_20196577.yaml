    structured routines"]'
  hobbies: '["DIY woodworking projects", "Succulent and herb gardening", "Cooking traditional Mexican cuisine", "Hiking Sierra Nevada trails", "Playing chess", "Attending Mexican cultural festivals", "Volunteering
    for wood‑safety workshops"]'
  career_goals: Michael aims to advance to a senior finisher or production supervisor role within the next five years, securing a Master Finisher certification from a recognized trade organization. He hopes
    to lead a small, stable team in Reno that delivers consistently high‑quality custom finishes, while integrating sustainable, low‑VOC products. Ultimately, he envisions opening his own boutique finishing
    studio that blends his technical expertise with traditional Mexican craftsmanship, providing mentorship to apprentices and creating a reliable source of income that supports his long‑term financial
    security.
