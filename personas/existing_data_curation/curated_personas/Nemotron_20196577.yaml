personas:
  professional: Michael Sotolongo, a meticulous furniture finisher in Reno, blends their systematic STEM training with hands‑on craftsmanship, overseeing surface preparation, colour matching, and VOC‑compliant
    finishing while employing detailed checklists, digital job tracking, and empathetic client communication to maintain high‑quality standards.
  sports: Michael Sotolongo hikes the Sierra trails with the Reno Outdoor Club during weekends, follows the Reno Aces baseball team and the Golden Knights hockey franchise, and occasionally joins a neighborhood
    basketball league to balance cardio with social interaction.
  arts: Michael Sotolongo immerses themselves in the tactile art of woodworking while also enjoying the folk melodies of Los Tigres del Norte, the vibrant murals of Diego Rivera, and the storytelling of
    classic Mexican cinema, often attending local cultural festivals to connect with these artistic influences.
  travel: Michael Sotolongo prefers well‑planned trips that blend work and leisure, such as a recent workshop tour in Toronto’s design district, a culinary pilgrimage to Oaxaca’s bustling markets, and weekend
    getaways to Lake Tahoe for hiking, always using a detailed itinerary app to stay within a modest budget.
  culinary: Michael Sotolongo delights in crafting authentic tamales, fresh salsa with ripe tomatillos, and slow‑cooked mole using heirloom chilies, cilantro, and masa, balancing a moderate cooking skill
    level with a penchant for experimenting with traditional spice blends and farm‑to‑table ingredients.
  core: Michael Sotolongo is a routine‑driven finisher whose methodical mind fuels meticulous craftsmanship, yet their chronic worry and occasional neglect of self‑care create a paradox of high productivity
    and hidden stress.
background:
  cultural: Michael is a second‑generation Mexican‑American who grew up in a bilingual household where Spanish was spoken alongside English. Family gatherings centered around shared meals, music, and stories
    of his grandparents' artisan roots in Mexico, instilling a deep respect for craftsmanship and hard work. He maintains close ties with his extended family, celebrates Día de los Muertos and other Mexican
    holidays, and often incorporates Mexican motifs into his personal woodworking projects. While he embraces the practical, routine‑oriented values of his upbringing, he also values the communal spirit
    and hospitality that are hallmarks of Mexican culture, which influence his considerate and cooperative approach both at work and in his community.
attributes:
  skills: '["Wood finishing techniques", "Surface preparation and sanding", "Stain & veneer colour matching", "Spray gun operation", "Finish chemistry & VOC compliance", "Equipment maintenance & calibration",
