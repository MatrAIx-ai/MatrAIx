persona_description: A faculty member who is committed to setting and maintaining standards of academic integrity in their educational setting. This individual is likely to be a seasoned educator who has
  a deep understanding of the importance of ethical deliberation and behaviours in creating a strong climate of academic integrity. They are aware of the potential consequences of academic dishonesty and
  the importance of community-based reasons for expecting academic integrity from their College culture in general. They are skilled in using specific practices in their academic facilitation to prevent
  academic dishonesty, such as modelling appropriate actions, speaking directly about the importance of integrity, and by openly addressing academic dishonesty using professionalism and consistency in applied
  ethical standards.
