  hobbies: '[''Cooking (soul food and healthy meals)'', ''Reading (fiction and African American history)'', ''Volunteering at community youth center'', ''Yoga'', ''Jogging'', ''Photography'', ''Gardening'',
    ''Crafting (knitting, scrapbooking)'', ''Attending local blues and jazz concerts'']'
  career_goals: Dachelle aims to complete her bachelor's degree in Communications or Public Health within the next two years, followed by a certification in Project Management (CAPM). She envisions securing
    a role as a Community Program Coordinator for a nonprofit organization in the Wyandotte County area, where she can leverage her organizational expertise and passion for youth empowerment. In the longer
    term, she hopes to launch a culturally inspired catering and nutrition education venture that provides healthy meals rooted in African American culinary traditions while offering community workshops
    on wellness and financial literacy.
