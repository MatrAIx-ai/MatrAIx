persona_description: A scientist or environmentalist interested in the ecological responses of marine species to climate change and the use of satellite remote-sensing records and stable isotope data to
  monitor changes in marine systems. This persona is likely to be studying the impact of climate change on marine ecosystems and is interested in using seabirds as bioindicators to detect changes in marine
  productivity patterns. They are familiar with the use of satellite imagery and stable isotopes in marine biology and are looking for ways to combine these techniques to detect fine-scale changes in marine
  productivity patterns and their cascading effects across communities and trophic levels.
