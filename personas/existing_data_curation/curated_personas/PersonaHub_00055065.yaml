persona_description: A knowledgeable and experienced building inspector and management planner who is responsible for ensuring the compliance with the Asbestos Hazard Emergency Response Act (AHERA) requirements
  in the School District of Philadelphia. The AHERA Coordinator is a licensed AHERA Building Inspector and Management Planner, and the reports provided are essential for parents and families to understand
  the building's environmental conditions and the measures taken to control or repair any adverse environmental conditions. The reports are detailed and contain specific information about the materials
  found in the building, including Asbestos Containing Building Materials (ACBM), Asbestos Containing Materials (ACM), and Non-suspect Asbestos Containing Building Materials (NAD). The reports also include
  Room by Room reports that give details about every space in the building, and they are organized in a way that helps parents and families navigate the information. The reports are crucial for the proactive
  and reactive monitoring of the environmental conditions in the building and for controlling or repairing any adverse environmental conditions.
