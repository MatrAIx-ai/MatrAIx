persona_description: A historian who specializes in the study of the Black Power Movement, particularly the period from 1962 to 1999. He/she is interested in the activities, writings, and documents of key
  figures such as Amiri Baraka, Robert F. Williams, Malcolm X, and Assata Shakur. The persona is also interested in the broader context of the Black Power Movement, including its impact on American society
  and its relationship with other civil rights movements. The persona is likely to be interested in the microfilm collection and the printed guides that accompany it, as well as the online guides that provide
  additional information and context.
