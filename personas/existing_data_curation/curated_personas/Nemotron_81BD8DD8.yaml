  career_goals: Robert aims to transition from full‑time bedside nursing to a hybrid role that blends clinical practice with education and community health leadership. He plans to complete his RN‑to‑BSN
    program and pursue a Master’s in Nursing Education, positioning himself as a clinical instructor for nursing students at a local community college. Simultaneously, he wants to launch a senior wellness
    initiative in Frederick County that offers free health screenings, mobility workshops, and chronic disease self‑management classes. Long‑term, he hopes to influence policy through participation on the
    county health advisory board, advocating for accessible, evidence‑based care for underserved older adults.
