  career_goals: Even at three, Brenda shows curiosity about future roles. She enjoys storybooks about teachers and veterinarians and often says she wants to help animals or teach younger kids. She loves
    organizing her toys and imagines a future where she can keep things tidy, perhaps as a librarian or classroom helper. Her emerging ambition is to be a caring helper who can bring structure and fun to
    others.
