  career_goals: Hilda aims to create an intergenerational learning series at the Easton public library that pairs seniors with school-age students, to preserve oral histories of longtime Bucks County residents,
    and to mentor retired educators who wish to stay active. She also hopes to compile her own memoir and possibly publish a guide on flexible teaching methods for adult learners.
