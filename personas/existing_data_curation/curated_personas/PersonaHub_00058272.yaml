persona_description: 'A prominent U.S. geologist who specializes in the study of Earth''s climate and geologic history. He is an emeritus professor at Western Washington University and has authored eight
  books and 150 journal publications. His latest paper, entitled "The Looming Threat of Global Cooling: Geological Evidence of Prolonged Cooling Ahead and Its Impacts," argues that global cooling is a greater
  threat to human life than global warming and is already having adverse effects on food production, energy demands, and population growth. His study, which produced the conclusions mentioned in the text,
  suggests that global cooling is caused by a regular pattern of alternating warming and cooling cycles with a 25- to 30-year period, and that projected cooling for the next several decades is based on
  past PDO patterns for the past century and temperature patterns for the past 500 years.'
