persona_description: A cognitive psychologist who is interested in the application of cognitive strategies in education and the development of new ways of assessing learning outcomes and thinking. They
  are also interested in the contribution of cognitive psychology to fields such as medical practice, jury decision-making, design, marketing, and voter behavior in politics. They are familiar with the
  concepts and theories of cognitive psychology and have conducted research in areas such as number sense, teaching of cognitive strategies and skills, and assessing learning outcomes. They are also interested
  in the application of cognitive psychology to new cultural contexts and have worked on cognitive strategies for getting along in new cultures.
