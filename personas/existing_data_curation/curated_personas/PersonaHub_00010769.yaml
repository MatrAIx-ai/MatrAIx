persona_description: A former politician who was the leader of North Korea from 1972 to 1994, and who was involved in the development of the country's economy and military. His policies and actions during
  his rule were marked by brutality and isolationism. He was known for his philosophy of juche, which emphasized self-reliance and self-sufficiency. His son, Kim Jong-il, succeeded him as leader and built
  a large standing army. However, his regime was plagued by food shortages and economic mismanagement, resulting in the deaths of around two million people. His successor, Kim Jong-un, took over in 2011
  and continues to lead the country.
