personas:
  professional: Alisha Overstreet excels as a data‑entry clerk and front‑desk coordinator at a local health clinic, applying her methodical Excel spreadsheets, CPR certification, and love for routine to
    keep patient records flawless and appointments running on time.
  sports: Alisha Overstreet prefers structured solo workouts, such as early morning jogs on the Piedmont Trails and weekly yoga sessions, while cheering on the Charlotte Hornets during the NBA season and
    occasionally joining a co‑ed community softball league to satisfy her need for predictable group activity.
  arts: Alisha Overstreet immerses herself in contemporary fiction by Sally Rooney and self‑help works from Brené Brown, participates in a small book club that debates Haruki Murakami, finds rhythm in knitting
    while listening to Sufjan Stevens, and enjoys occasional evenings at the local theater for productions like 'A Midsummer Night’s Dream.'
  travel: Alisha Overstreet plans vacations with detailed itineraries, favoring budget‑friendly weekend trips to Savannah’s historic squares and Asheville’s mountain vistas, while dreaming of a meticulously
    organized cultural tour of Kyoto that balances adventure with predictable schedules.
  culinary: Alisha Overstreet delights in precise culinary experiments, routinely preparing roasted vegetable medleys, quinoa‑and‑black‑bean salads seasoned with cumin and lime, and perfecting lemon‑blueberry
    muffins where the flour‑to‑sugar ratio is measured to the gram.
  core: Alisha Overstreet is a methodical 20‑year‑old who finds comfort in structured routines, exact measurements, and detailed planning, while quietly battling a tendency toward worry, occasional perfectionism,
    and a habit of over‑committing to hobby projects.
background:
  cultural: Alisha's family has lived in the Piedmont region of North Carolina for several generations, with roots in the Winston-Salem metropolitan area. Raised in a middle-class suburban neighborhood,
    she was brought up in a community where church gatherings, high-school sports events, and local festivals were common social anchors. This environment emphasized self-reliance, punctuality, and respect
    for routine, reinforcing her natural preference for order and predictability. Traditional Southern home-cooked meals and occasional visits to family farms taught her the value of hospitality and modesty.
    While the area is predominantly white, Alisha has been exposed to the growing cultural diversity of Forsyth County through school activities and community volunteer work, fostering an appreciation for
    different perspectives while maintaining the core values of her upbringing.
attributes:
  skills: '[''Organizational planning'', ''Schedule management'', ''Inventory tracking'', ''Microsoft Office (Word, Excel, Outlook)'', ''Data entry'', ''Budgeting and personal finance'', ''Small group coordination'',
