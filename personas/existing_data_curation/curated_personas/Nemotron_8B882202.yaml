  hobbies: '[''Journaling'', ''Reading contemporary fiction and self-help books'', ''Puzzle solving (crosswords, Sudoku)'', ''Gardening (vegetable patch)'', ''Knitting and crocheting'', ''Cooking and baking'',
    ''Small-group book club participation'', ''Nature walks on local trails'']'
  career_goals: Short-term, Alisha plans to complete her GED within the next year and enroll in a community-college certificate program in office administration. She aims to secure a part-time data entry
    or front-desk position at a local health clinic or non-profit organization, where she can apply her organizational strengths in a predictable, structured environment. In the medium term, she hopes to
    obtain certification as a medical office administrator and transition to a full-time role managing patient records and appointment scheduling. Long-term, Alisha envisions a stable career as a program
    coordinator for a community health outreach program, blending her methodical work style with her desire to provide compassionate support while maintaining clear, routine-driven processes. Throughout
    her career path, she also intends to develop stress-management techniques to sustain her well-being.
