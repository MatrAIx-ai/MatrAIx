personas:
  professional: Hari Mercadoacevedo, a retired mechanical engineer with solid CAD, statistical analysis, and Python skills, now channels their hands‑on ingenuity into mentoring underserved youth who share
    their bilingual heritage through informal STEM workshops, while simultaneously restoring a 1965 Chevrolet and crafting fine wooden furniture in a backyard workshop.
  sports: Hari Mercadoacevedo spends early mornings birdwatching in local parks and attends low‑impact cardio classes at the Montville Senior Fitness Club, while passionately rooting for the New Jersey
    Devils and the New York Yankees, and they occasionally participate in a community senior chess tournament that serves as their mental sport.
  arts: Hari Mercadoacevedo finds artistic fulfillment in fine woodworking and model ship building while absorbing the rich tapestries of Beethoven’s Symphony No. 9 and the vibrant beats of the plena group
    Los Pleneros de la 21, and they regularly attend lectures at the local historical society to deepen their appreciation of Latin American narratives.
  travel: Hari Mercadoacevedo favors spontaneous, low‑key getaways such as a sunrise drive to the historic lighthouse at Cape Cod, leisurely tours of the colonial streets of Cartagena, and occasional weekend
    visits to the nearby Adirondack retreats, often planning itineraries on the fly while balancing a modest travel budget and health considerations, and they prefer to keep travel plans flexible to accommodate
    occasional health checks.
  culinary: Hari Mercadoacevedo enjoys cooking modest, flavor‑rich meals like arroz con gandules seasoned with sofrito, crispy plantain fritters, and rosemary‑infused roasted vegetables harvested from their
    own garden, and they approach the kitchen with a competent but relaxed style that mirrors their hands‑on woodworking ethos.
  core: Hari Mercadoacevedo, a curious 72‑year‑old retiree who blends meticulous craftsmanship with spontaneous learning, prefers solitary reflection under the stars, quietly mentors youth, delicately balances
    frugality with occasional indulgences, and navigates life with steady composure and a dash of organized chaos, all while they remain deeply rooted in their bilingual heritage.
background:
  cultural: Born and raised in Puerto Rico, Hari grew up immersed in a bilingual, Catholic household that celebrated feasts such as Nochebuena and the rhythms of bomba and plena. He moved to the mainland
    United States in his early twenties to pursue a STEM education, first in New York City and later settling in Montville, New Jersey. While he never married, he remains closely connected to an extended
    family on the island, visiting regularly and maintaining strong ties through phone calls and shared cultural practices. In his New Jersey community, Hari participates in occasional Puerto Rican cultural
    events, supports a local Latinx library program, and preserves his heritage through storytelling, cooking, and the occasional hymn in Spanish during festive gatherings.
