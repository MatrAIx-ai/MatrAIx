  hobbies: '[''Amateur astronomy (telescope)'', ''Birdwatching'', ''Model ship building'', ''Woodworking'', ''Gardening (vegetable plot)'', ''Reading historical non‑fiction'', ''Playing chess'', ''Listening
    to classical and Puerto Rican folk music'', ''Cooking traditional Puerto Rican cuisine'']'
  career_goals: Although retired, Hari aims to leave a legacy of curiosity and practical skill. He plans to mentor underserved Puerto Rican youth in the Montville area, offering informal STEM workshops
    that emphasize hands‑on learning over rigid curricula. He also hopes to complete a personal restoration project—reviving a 1965 Chevrolet and building a small greenhouse in his backyard. Additionally,
    Hari aspires to write a memoir documenting his journey from Puerto Rico to New Jersey, preserving cultural stories for future generations while contributing articles to the local historical society.
