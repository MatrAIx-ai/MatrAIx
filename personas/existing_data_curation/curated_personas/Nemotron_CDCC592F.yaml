personas:
  professional: Joseph Kleitz is a registered nurse whose clinical expertise in assessment, IV therapy, wound care, and ACLS is amplified by a genuine curiosity and sociable nature, and they weave watercolor
    painting and acoustic guitar sessions into patient interactions to foster therapeutic communication and interdisciplinary collaboration.
  sports: Joseph Kleitz is an active hobbyist who hikes the Uwharrie foothills each spring, follows the Carolina Panthers and Charlotte Hornets loyally, and they join a weekend pickup basketball league
    at the local community center to stay fit while balancing work shifts.
  arts: Joseph Kleitz is an avid art enthusiast who frequents the Wayne County Arts Council gallery, paints watercolors of Appalachian landscapes, strums acoustic covers of Bill Monroe and Mumford & Sons
    at open‑mic nights, and they regularly participate in a community theater improv troupe that hones their quick‑witted, talkative flair.
  travel: Joseph Kleitz is a curious traveler who enjoys spontaneous weekend road trips to Asheville’s Blue Ridge trails and short flights to New Orleans for jazz festivals, and they dream of backpacking
    through Oaxaca’s markets and hiking Scotland’s Highlands while usually budgeting trips through a simple spreadsheet and sharing plans with friends over board games.
  culinary: Joseph Kleitz is a food‑lover with an intermediate cooking level who delights in whipping up shrimp and grits with a dash of hot sauce, experimenting with homemade gnocchi and kimchi, and they
    often balance home‑cooked meals with takeout from local taco trucks after long nursing shifts.
  core: Joseph Kleitz is a sociable, art‑infused nurse who blends compassionate care with creative therapies, balances disciplined finances with occasional splurges, and pursues a vibrant life of music,
    hiking, and community engagement despite occasional sleep deprivation and impulsive spending.
background:
  cultural: Joseph grew up in Dudley, a close‑knit town in Wayne County, North Carolina, within a working‑class family of German ancestry. The Southern hospitality of his community, coupled with regular
    church involvement, instilled values of compassion, cooperation, and service. Exposure to the region’s folk traditions—bluegrass music, storytelling, and local crafts—shaped his appreciation for the
    arts. Living in a diverse county with significant African‑American and growing Latino populations broadened his cultural awareness and reinforced his commitment to inclusive, culturally sensitive care.
