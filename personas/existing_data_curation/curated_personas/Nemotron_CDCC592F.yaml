  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Acoustic guitar and singing'', ''Street photography'', ''Hiking North Carolina trails'', ''Bluegrass and folk music concerts'',
    ''Exploring global cuisines'', ''Community theater and improv'', ''Volunteering at health fairs and soup kitchens'', ''Yoga and meditation'', ''Reading psychology and medical literature'', ''Trivia
    nights and board‑game gatherings'']'
  career_goals: Joseph aims to obtain a Bachelor of Science in Nursing (BSN) within the next two years to qualify for advanced practice roles. He aspires to become a Family Nurse Practitioner or Psychiatric‑Mental
    Health Nurse Practitioner, blending his clinical expertise with his passion for mental wellness and creative therapies. He envisions leading community health initiatives in Wayne County that fuse art,
    health education, and preventive care. Long‑term, Joseph hopes to serve as a clinical educator or nurse manager, mentoring new nurses and championing patient‑centered, culturally sensitive care while
    possibly founding a nonprofit that offers free art‑therapy workshops for underserved populations.
