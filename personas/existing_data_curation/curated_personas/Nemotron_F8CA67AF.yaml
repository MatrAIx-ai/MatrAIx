personas:
  professional: Comer Broadhurst, a budding technologist, they blend a love for science‑fiction reading with hands‑on tinkering on Arduino projects, approaching each mini‑invention with curiosity tempered
    by a practical urge to see it work.
  sports: Comer Broadhurst plays Saturday soccer matches with friends at the local park, they follow the Philadelphia Union with fervor, occasionally tune into Eagles games for weekend excitement, and balance
    a relaxed fitness routine with a preference for spontaneous bike rides over regimented workouts.
  arts: Comer Broadhurst drums in the school band, they capture Harrisburg’s historic architecture through a beginner’s DSLR, binge‑watch classic sci‑fi films like Blade Runner, and draw inspiration from
    musicians such as Daft Punk, Tame Impala, and video‑game composer Jeremy Soule.
  travel: Comer Broadhurst prefers short, spontaneous road trips—often to Philadelphia’s museums or Hershey’s Chocolate World—while they dream of a future solo adventure to San Diego for Comic‑Con and a
    school‑organized field trip to the Grand Canyon’s vast canyons.
  culinary: Comer Broadhurst favors pepperoni pizza, cheesy ramen, and chicken nuggets, they occasionally attempt to bake a simple margherita pizza from scratch, and treat gaming sessions with a steady
    supply of snack‑size pretzels and soda.
  core: Comer Broadhurst is a curious, tinkering teen who balances LEGO builds and soccer kicks, they habitually misplace school assignments while dreaming of futuristic worlds.
background:
  cultural: Comer grew up in a middle‑class, white family in Harrisburg, Pennsylvania, a city with a blend of historic heritage and modern government presence. His cultural upbringing reflects typical suburban
    American traditions—celebrating holidays like Thanksgiving, Christmas, and the Fourth of July, attending local community events, and participating in school‑based activities. He is exposed to a mix
    of Mid‑Atlantic values such as a pragmatic work ethic, respect for public service, and a love for outdoor recreation along the Susquehanna River. While his family’s heritage includes European roots
    (primarily German and Irish ancestry), his day‑to‑day life is shaped by contemporary American teen culture, popular media, and the civic atmosphere of the state capital.
