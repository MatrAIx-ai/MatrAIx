  career_goals: Comer is drawn to fields that combine his curiosity with practical outcomes. He dreams of becoming a mechanical or robotics engineer, envisioning a future where he designs functional machines
    that improve everyday life. He also entertains the idea of working for the state’s Department of Transportation or a local technology firm in Harrisburg, where he can apply his problem‑solving skills
    to community projects. Short‑term, he aims to expand his coding abilities, participate in his high school’s robotics club, and earn certifications in basic electronics, setting a clear pathway toward
    a college degree in engineering.
