personas:
  professional: Kamil Thomas is an imaginative future architect who builds elaborate LEGO cities with bright colors, channeling their curiosity and competitive spirit into detailed design challenges while
    maintaining a balance between organization and flexibility.
  sports: Kamil Thomas cheers for the Metro Hawks baseball team, participates in the River City Rovers youth soccer club, and attends a weekend gymnastics program that emphasizes balance and flexibility,
    reflecting their competitive yet organized approach to physical activity.
  arts: Kamil Thomas delights in sketching inspired by Dr. Seuss’s whimsical lines and Pixar’s vibrant animations, while often humming the soundtrack of “Frozen” as they paint bold, unexpected subjects
    using bright colors.
  travel: Kamil Thomas has explored the nearby botanical garden, taken a family road trip to the Grand Canyon, and dreams of visiting Tokyo’s Akihabara district to collect more LEGO sets and experience
    neon‑lit streets.
  culinary: Kamil Thomas loves crafting peanut butter and jelly sandwiches, assembling colorful fruit kebabs with grapes, strawberries, and melon, and enjoys a cheesy pepperoni pizza topped with extra mozzarella.
  core: Kamil Thomas is a bright, competitively curious six‑year‑old who blends artistic flair with a methodical love for building, constantly seeking colorful challenges and mastering small‑scale projects
    while occasionally hoarding snacks.
background:
  cultural: Kamil grows up in a suburban neighborhood of Toledo, Ohio, within a middle‑class family that celebrates typical American holidays such as Thanksgiving, Christmas, and Halloween. The family often
    visits local cultural sites like the Toledo Museum of Art and the Toledo Zoo, and they attend community events like the annual Art Fair. Their household reflects a blend of European ancestry traditions
    and Midwestern values, emphasizing friendliness, independence, and a love for local arts, nature, and community involvement.
