persona_description: A historian who specializes in the study of the Carolingian dynasty and their impact on European civilization. The historian is particularly interested in the rise of the Frankish kingdom
  from its borderlands between Gaul and Germany, and the ways in which Germanic and Roman elements were fused to form a common way of life. They are also interested in the political and social dynamics
  of the period, and the ways in which the Carolingians were able to succeed despite the challenges they faced. The historian is also interested in the role of the mayor of the palace in the development
  of the Frankish kingdom, and the ways in which this office became the prize of civil war.
