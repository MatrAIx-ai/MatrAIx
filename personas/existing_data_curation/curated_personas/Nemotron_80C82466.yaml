personas:
  professional: Brooke Handy, a diligent retail cashier with a talent for inventory management and conflict de-escalation, leverages her love of structure and calm resilience to excel in multitasking and
    is steadily working toward a supervisory role while completing a Business Administration associate's degree.
  sports: Brooke Handy enjoys weekend hikes on the nearby Cumberland Trail, supports the Tennessee Titans and Nashville Predators, and participates in a local adult softball league, balancing moderate cardio
    with community-oriented team sports.
  arts: Brooke Handy finds creative solace in knitting with her women’s circle, attends live performances by country legends like Dolly Parton, reads mystery novels by Agatha Christie and historical fiction
    by Ken Follett, and occasionally watches classic films starring Morgan Freeman.
  travel: Brooke Handy prefers structured road trips to nearby Southern gems such as Asheville, Savannah, and New Orleans, planning itineraries around historic districts and culinary hotspots while saving
    for a future pilgrimage to Ireland.
  culinary: Brooke Handy's cooking showcases Southern comfort staples like buttermilk fried chicken, collard greens with smoked ham hocks, and homemade pecan pie, seasoned with garden-fresh thyme and basil,
    and she balances traditional recipes with occasional experimental dishes such as quinoa-crusted catfish.
  core: Brooke Handy blends Southern hospitality with a calm, organized mindset, turning everyday routines—from juggling cash registers to perfecting pecan pie—into a steady rhythm punctuated by a love
    of gardening, mystery novels, and community service.
background:
  cultural: Brooke was raised in a middle‑class Southern family in Tennessee, with roots in European (primarily Irish and German) ancestry. The cultural environment emphasized hospitality, close‑knit family
    ties, and community involvement typical of small‑town Southern life. Regular attendance at her local Baptist church fostered values of service, modesty, and perseverance. Southern traditions such as
    holiday gatherings, country music, and regional cuisine are integral parts of her identity. While she identifies as white American, she embraces the blend of Southern customs and broader American cultural
    influences, which shape her practical outlook, calm resilience, and sense of responsibility.
attributes:
  skills: '[''Cash handling'', ''POS system operation'', ''Inventory management'', ''Time management'', ''Customer service'', ''Conflict de‑escalation'', ''Basic bookkeeping'', ''Team coordination'']'
  hobbies: '[''Cooking'', ''Gardening'', ''Reading mystery novels'', ''Knitting'', ''Hiking'', ''Volunteer work at food pantry'']'
  career_goals: Brooke aims to advance within the retail sector by moving into a supervisory or assistant manager role at her store. She plans to complete her associate’s degree in Business Administration
    within the next two years, which will give her the credentials needed for a full management position. Long‑term, she envisions transitioning to a store manager role or possibly opening a small community‑focused
    grocery outlet that emphasizes local products and personalized service. Her ambition is to balance career growth with family stability, ensuring a predictable income while maintaining the flexibility
    to support her husband and any future plans.
