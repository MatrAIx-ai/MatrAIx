persona_description: A neuroscientist who specializes in the study of the central nervous system and its functions, particularly in the context of neurotransmission and the development of withdrawal syndromes.
  They are interested in understanding the adaptive changes in neurons and the physiologic adaptations to the presence of xenobiotics, and how these changes contribute to the development of withdrawal syndromes.
  They are also interested in the role of neurotransmitters and their interactions in the development of these syndromes, and the mechanisms by which these syndromes can be treated.
