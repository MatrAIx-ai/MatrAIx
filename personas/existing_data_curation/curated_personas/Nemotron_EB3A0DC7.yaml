personas:
  professional: Kevin Lark is a veteran stationary engineer with three decades of boiler operation expertise, skilled in safety compliance, PLC monitoring, welding, and apprentice mentorship, and they are
    channeling their curiosity toward earning a Certified Stationary Engineer license and leading a shift‑supervisor team that champions sustainable retrofits.
  sports: Kevin Lark is a devoted Buffalo Bills supporter who watches every game, follows the Buffalo Sabres, belongs to the Lake Erie Fishing Club, and they combine light weightlifting, weekend fishing
    trips, and pick‑up basketball at the community center into a relaxed but consistent fitness routine.
  arts: Kevin Lark immerses themselves in Buffalo’s thriving art scene by frequenting exhibitions at Albright‑Knox, admiring murals by local artist Maya Rios, and they channel that creative energy into
    drumming for a neighborhood jazz‑funk ensemble while collecting vintage industrial posters.
  travel: Kevin Lark prefers road‑trip adventures that blend fishing on Lake Erie’s islands with tours of historic industrial sites in upstate New York, and they dream of exploring Portugal’s Douro Valley
    vineyards, though budgetary constraints keep most getaways within the Northeast corridor.
  culinary: Kevin Lark enjoys cooking soul‑food with inventive twists—such as maple‑glazed fried chicken, smoked collard greens, and cedar‑plank Walleye—using ingredients like smoked paprika, hot sauce,
    and fresh garden herbs, and they regularly showcase these dishes at family barbecues and community potlucks.
  core: Kevin Lark blends a pragmatic engineering mindset with a love for drumming, woodworking, and community storytelling, navigating life with curious optimism, occasional over‑commitments, and a habit
    of late‑night BBQs.
background:
  cultural: Kevin is an African‑American who grew up in Buffalo’s East Side, a tight‑knit working‑class community rooted in church, family, and mutual support. His upbringing emphasized resilience, storytelling,
    and the celebration of Black cultural traditions such as Juneteenth, Kwanzaa, and soulful music genres—from blues to contemporary hip‑hop. He maintains strong ties to local Black institutions like the
    Buffalo Urban League and the local historical society, often contributing to community mural projects that honor the city’s industrial legacy. His cultural identity informs his collaborative spirit,
    his commitment to mentorship, and his appreciation for art that reflects collective histories.
attributes:
  skills: '[''Boiler operation & maintenance'', ''Stationary engine troubleshooting'', ''Mechanical systems diagnostics'', ''Safety & compliance (OSHA, NFPA)'', ''Preventive maintenance planning'', ''Welding
    (MIG/TIG)'', ''Pipefitting and rigging'', ''Energy efficiency optimization'', ''Basic PLC monitoring'', ''Team leadership & training'', ''Problem solving under pressure'', ''Adaptable workflow management'']'
  hobbies: '[''Visiting Buffalo art galleries and murals'', ''Playing drums in a local jazz‑funk ensemble'', ''Woodworking and restoring vintage tools'', ''Fishing on Lake Erie'', ''Watching Buffalo Bills
    football games'', ''Cooking and experimenting with soul‑food recipes'', ''Volunteering to teach basic mechanics to youth'', ''Attending live music concerts'', ''Participating in neighborhood block parties'']'
  career_goals: Kevin aims to obtain his Certified Stationary Engineer (CSE) license and transition into a shift‑supervisor role where he can lead a team of operators and shape plant safety culture. He
    aspires to mentor younger apprentices, develop a formal safety‑training program, and eventually move into a consulting niche focused on retrofitting older boilers for greener fuels such as bio‑gas or
    combined‑heat‑and‑power systems. He also hopes to contribute to community projects that celebrate Buffalo’s industrial heritage while promoting sustainable practices.
