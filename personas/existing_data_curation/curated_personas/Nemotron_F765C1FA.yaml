  career_goals: With retirement on the horizon, Candice aims to steward a seamless leadership transition by mentoring her successor and instituting a robust succession framework. She intends to pivot her
    executive acumen toward board service on regional economic development and sustainability initiatives, championing renewable energy projects that align with North Dakota's agricultural base. Additionally,
    she plans to establish a scholarship fund for women pursuing STEM fields, thereby extending her legacy of practical empowerment. Maintaining financial health of her company while fostering community
    partnership remains a central ambition.
