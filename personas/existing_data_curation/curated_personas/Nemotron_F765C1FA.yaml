  hobbies: '[''Gardening'', ''Reading Historical Nonfiction'', ''Crossword Puzzles'', ''Woodworking'', ''Hiking'', ''Community Theater'', ''Volunteer Tutoring'', ''Baking'', ''Genealogy Research'', ''Landscape
