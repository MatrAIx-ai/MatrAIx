personas:
  professional: Candice Thomasson, a veteran chief executive with a STEM background, leverages her data‑driven strategic planning and operational expertise to shepherd her company through a seamless leadership
    transition while preparing for board roles that champion renewable energy and regional economic development, and they inspire confidence with their calm, assertive demeanor.
  sports: Candice Thomasson, an avid hiker of the rolling prairie trails, keeps fit with weekly walks in the state park, follows the North Dakota State Bison football team each fall and cheers for the Fargo
    Moorhead RedHawks during summer baseball, and they enjoy a balanced approach to fitness that mixes low‑impact activity with spirited fandom.
  arts: Candice Thomasson channels her appreciation for the arts through a weekly book club dissecting works by Doris Kearns Goodwin, volunteers as a lighting technician for community theater productions
    of Arthur Miller’s 'Death of a Salesman,' and unwinds listening to folk storytelling by Bob Dylan and the piano concertos of Lang Lang, and they find creative fulfillment in both behind‑the‑scenes technical
    work and literary discussion.
  travel: Candice Thomasson favors meticulously planned road trips that blend scenic prairie drives with visits to natural wonders such as Yellowstone and the Badlands, while saving for a future cultural
    tour of historic sites in England and Scotland, and they balance wanderlust with a fixed retirement budget and family responsibilities.
  culinary: Candice Thomasson delights in crafting baked classics like apple crisp and sourdough bread using heirloom tomatoes, fresh basil, and locally harvested honey from her garden, often pairing these
    home‑cooked meals with a glass of regional Riesling, and they occasionally indulge in a steak frites at a downtown bistro as a treat.
  core: Candice Thomasson is a methodical former CEO who blends a love for orderly gardens, precise puzzles, and community service with a quiet ambition to empower future women in STEM, and they occasionally
    let perfectionism prolong their gardening tasks.
background:
  cultural: Candice was raised in a small Midwestern town in North Dakota and traces her ancestry to German and Scandinavian (primarily Swedish) immigrants who settled the region in the early 20th century.
    The cultural values of self-reliance, modesty, punctuality, and a strong community ethic shaped her worldview. Family gatherings, Thanksgiving, county fairs, and the Lutheran church have provided a
    steady rhythm to her life. This heritage informs her practical outlook, respect for tradition, and commitment to contributing to the well-being of her local community.
