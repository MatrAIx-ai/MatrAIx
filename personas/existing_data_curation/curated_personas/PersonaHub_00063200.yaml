persona_description: 'Dr. Frank Ascione, a renowned researcher and author, is likely to read the above text. Dr. Ascione has published numerous articles on the development of antisocial and prosocial behavior
  in children, and has co-edited two books on the topic. He has also authored Safe Havens for Pets: Guidelines for Programs Sheltering Pets for Women Who Are Battered, which addresses the challenges faced
  by survivors of intimate partner violence who want to escape violence but are concerned about how such a departure might affect the welfare of their pets. Additionally, Dr. Ascione is an internationally-renowned
  researcher and author who has received a $1.5 million grant from the National Institute of Child Health and Human Development and the Waltham Foundation to study children exposed to intimate partner violence
  and to animal abuse.'
