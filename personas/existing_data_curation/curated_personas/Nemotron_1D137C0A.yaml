  hobbies: '[''Softball League'', ''Pick‑up Basketball'', ''Recreational Fishing'', ''DIY Woodworking'', ''Barbecuing'', ''Listening to Classic Rock and Country Music'', ''Carpenter’s Guild Participation'',
