personas:
  professional: Sharon Lilly, a retired mechanical engineer, now channels their disciplined, data‑driven mindset and competitive spirit into mentoring high‑school robotics teams, serving on a science outreach
    board, and authoring technical articles on sustainable design, all while they maintain meticulous documentation and high standards.
  sports: Sharon Lilly enjoys low‑impact workouts at the local senior fitness center, participates in weekly walking groups that explore the historic trails of Chester County, and follows the Philadelphia
    Eagles and Phillies with fervent loyalty, often attending community sports trivia nights and cheering from the sidelines of the high‑school varsity games they volunteer to sponsor.
  arts: Sharon Lilly expresses their creative side through digital photography—capturing sunrise over the garden and historic town squares with their drone—and finds inspiration in the works of Ansel Adams,
    the folk tunes of Joan Baez, and the classic novels of Jane Austen, which they discuss enthusiastically at their book club gatherings.
  travel: Sharon Lilly plans meticulous road‑trip itineraries with their husband, favoring colonial‑era towns such as Williamsburg, Virginia; St. Augustine, Florida; and the Brandywine Battlefield in Pennsylvania,
    balancing a love of cultural immersion with a modest retirement budget and a penchant for staying in boutique bed‑and‑breakfasts they adore.
  culinary: Sharon Lilly delights in farm‑to‑table cooking, often transforming fresh tomatoes, basil, and heirloom carrots from their vegetable plot into classic Pennsylvania Dutch chicken pot pie and apple
    crumble, while experimenting with homemade sauerkraut and pumpkin soup, showcasing a moderate cooking skill level that shines during neighborhood potluck gatherings they help organize.
  core: Sharon Lilly blends engineering rigor with community spirit, turning meticulous organization into mentorship, gardening, and a competitive love of trivia, all while they navigate retirement with
    disciplined finances and a playful curiosity for new tech.
background:
  cultural: Sharon comes from a longstanding white, middle‑class family rooted in the Chester County region of Pennsylvania, with ancestral ties to German and Irish immigrants who settled the area in the
    late 19th century. Raised in a Protestant (Methodist) household, she grew up valuing hard work, self‑reliance, and community involvement, traditions that were reinforced by participation in local church
    activities and county fairs. Her upbringing emphasized both respect for established customs and an openness to innovation, shaping her balanced outlook on new ideas and proven methods. Throughout her
    life, she has maintained strong connections to local heritage societies, regional culinary traditions, and the close‑knit social fabric of Coatesville.
