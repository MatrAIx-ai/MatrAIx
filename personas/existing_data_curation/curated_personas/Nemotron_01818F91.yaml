  hobbies: '["Bingo nights at the senior center", "Bridge club", "Church choir singing", "Weekly knitting circle", "Vegetable gardening", "Baking pies and cookies", "Reading historical novels", "Watching
    classic movies", "Walking the Verde River trail", "Hosting family gatherings"]'
  career_goals: Although she is officially retired, Kimberly’s ambition is to remain a vibrant contributor to her community and family. She plans to expand her volunteer role at the Payson senior center
    by leading weekly craft sessions and mentoring new volunteers. She also aspires to compile a handwritten family cookbook and oral history booklet for her grandchildren, preserving traditions for future
    generations. Maintaining her health through regular walks on local nature trails and continuing her garden’s seasonal cycles are also central goals, as is fostering harmony in her household by keeping
    a calm, organized environment that eases her occasional worries.
