  hobbies: '[''Morning gardening (vegetables and native plants)'', ''Traditional Mexican cooking (tamales, menudo, salsa)'', ''Listening to ranchera and mariachi music'', ''Afternoon walks in Hemet parks'',
    ''Playing Lotería/cards with friends'', ''Attending Sunday mass'', ''Reading the local newspaper'', ''Watching classic western movies'']'
  career_goals: Although officially retired, Freddy aims to stay actively involved in the logistics community by mentoring younger drivers at the local freight company, sharing his knowledge of safe driving
    practices and paperwork management. He wants to maintain his health and independence so he can continue supporting his grandchildren’s education and help his wife with household needs. Freddy also hopes
    to volunteer at the senior center in Hemet, offering free workshops on basic vehicle maintenance and road safety, while documenting his life stories to preserve his family’s Mexican heritage for future
    generations.
