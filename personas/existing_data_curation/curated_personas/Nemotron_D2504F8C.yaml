personas:
  professional: An aspiring writer and visual storyteller, Horace Merritt blends sci‑fi and fantasy narratives with comic‑strip art, and they leverage their methodical planning and natural stage presence
    from the drama club to craft polished storyboards and pitch ideas to peers.
  sports: An avid cyclist and weekend participant in the school’s track club, Horace Merritt roots for the Washington Wizards and the Virginia Cavaliers, and they enjoy local pickup basketball games at
    the community center.
  arts: A dynamic drama‑club performer and home‑studio beatmaker, Horace Merritt draws inspiration from gospel choir harmonies, the lyrical storytelling of Kendrick Lamar, and graphic novels like "Saga",
    and they weave these influences into their comics and lyrical compositions.
  travel: A curious explorer, Horace Merritt has biked historic Orange County neighborhoods, taken family road trips to Washington, D.C.’s National Museum of American History, and they long to visit New
    Orleans for its music and culinary scene.
  culinary: A budding home chef, Horace Merritt loves cooking collard greens with smoked turkey, experimenting with mango‑chili salsa, and baking chocolate brownies with a pinch of cayenne, though they
    sometimes skip the veggies when time is tight.
  core: Horace Merritt is a 15‑year‑old imaginative storyteller who balances beat‑making, comic art, disciplined budgeting, and a well‑kept skincare regimen while they fuel their creativity with bike rides
    through historic streets.
background:
  cultural: Horace is a Black teenager raised in Spotsylvania, Virginia, a region steeped in Civil War history and a vibrant African‑American heritage. His family maintains strong ties to the local Black
    church, where gospel music and storytelling traditions have shaped his appreciation for rhythm and oral narratives. He grew up listening to his grandparents share stories about the Great Migration and
    the civil‑rights activism of Richmond and nearby communities, which deepened his awareness of social justice and cultural pride. The multicultural environment of his school, combined with community
    events celebrating African‑American art and history—such as the annual Spotsylvania Freedom Festival—has fostered in him a desire to honor his roots while exploring contemporary artistic expressions.
    This cultural tapestry informs his creative work, prompting him to integrate historical themes and modern Black experiences into his storytelling and visual art.
attributes:
  skills: '[''creative writing'', ''digital illustration (Procreate, Photoshop)'', ''basic Python programming for interactive storytelling'', ''public speaking'', ''event planning and club organization'',
