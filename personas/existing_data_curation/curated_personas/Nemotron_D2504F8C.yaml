  hobbies: '[''speculative fiction and poetry writing'', ''digital comic illustration'', ''beat making and lyric writing'', ''learning new art software'', ''school drama club (acting and set design)'',
    ''volunteering at community center for tutoring and arts workshops'', ''biking around local historic sites for inspiration'']'
  career_goals: Horace envisions a future where he merges his artistic passion with community impact. He aims to earn a scholarship to study visual storytelling, digital media, or film production at a university
    known for its arts programs. Long‑term, he hopes to become a multimedia artist and content creator who produces inclusive narratives—perhaps directing short films or graphic novels that highlight underrepresented
    voices. He also dreams of establishing a community arts workshop in Spotsylvania that offers free classes in digital art, creative writing, and coding for local youth, fostering a collaborative space
    that celebrates cultural diversity and encourages innovative expression.
