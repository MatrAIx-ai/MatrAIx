personas:
  professional: Herodes Guzman, a 4‑year‑old budding engineer, demonstrates an uncanny ability to meticulously plan elaborate block constructions, eagerly incorporates new building ideas while adhering
    to tried‑and‑true techniques, and channels a friendly competitiveness into leading peer play‑building sessions.
  sports: Herodes Guzman delights in running around the neighborhood park playing soccer with the “Little Strikers” youth club, proudly wears a Manchester United jersey and mimics the moves of Cristiano
    Ronaldo, shows a competitive spirit by trying to out‑run friends in races, and mirrors the team’s disciplined training routine in daily playground games.
  arts: Herodes Guzman is enchanted by the melodies of Disney’s Frozen performed by Idina Menzel, loves to draw colorful pictures of Pixar’s Toy Story characters, eagerly recites lines from the animated
    series Bluey, and integrates these artistic influences into daily pretend‑play adventures.
  travel: Herodes Guzman prefers family road trips that blend the excitement of a beach day in Miami with the wonder of seeing giraffes at the local zoo, dreams of a future visit to Disneyland Resort in
    Anaheim and hopes to point at the Eiffel Tower in Paris, yet each travel plan is shaped by parents’ schedules and a modest allowance for souvenirs.
  culinary: Herodes Guzman delights in scooping up creamy macaroni and cheese laced with cheddar, enthusiastically spreads peanut butter on a jelly sandwich, picks at mini pepperoni pizza topped with mozzarella,
    and insists on a side of banana slices drizzled with honey, proudly claiming to be a “chef” after mastering the art of stirring batter with a plastic spoon.
  core: Herodes Guzman is a meticulously organized yet exuberant 4‑year‑old whose love for building block fortresses, cheeky sticker trading, and competitive playground races reveals a blend of curiosity,
    practicality, and a touch of skeptical charm.
background:
  cultural: Herodes is raised in a Mexican‑American household where Spanish is spoken alongside English, and cultural traditions are woven into daily life. His family celebrates Día de los Muertos and Cinco
    de Mayo with altars, marigold decorations, and traditional foods such as tacos, tamales, and aguas frescas. He learns classic Mexican lullabies and dances, and his grandparents share stories about Mexico,
    fostering a strong bicultural identity. Living in Sacramento’s vibrant Latino community, he attends a multicultural preschool that reflects the city’s diversity, and he often participates in local events
    such as the Sacramento Mexican Fiesta. This blend of Mexican heritage and Californian environment shapes his worldview, language use, and appreciation for both community gatherings and individual achievement.
