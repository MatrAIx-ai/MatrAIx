  career_goals: Herodes often talks about becoming an astronaut because he loves looking at the stars, and about being a firefighter to help people in a practical way. He also dreams of building things
    like a little engineer, and thinks about being a soccer player because he enjoys competition. While still very young, his aspirations are shaped by his curiosity about how things work and his desire
    to be reliable and helpful.
