  career_goals: Although retired, Jeremy aims to leverage his business acumen to support local cultural and economic vitality. He aspires to mentor small-business owners and aspiring artists in Jefferson
    City, serve on the board of the Missouri State Museum, and spearhead a senior-focused art outreach program that brings workshops and gallery visits to older adults. He also plans to document his professional
    journey and community experiences in a memoir, and to travel to regional art festivals to stay inspired by new ideas.
