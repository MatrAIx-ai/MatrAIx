  career_goals: Anna dreams of a future where she can combine her love of learning and helping others. She envisions becoming a science teacher or a community health advocate, roles that let her explore
    new ideas while applying practical solutions. She also imagines caring for animals as a veterinarian, reflecting her kindness and interest in the natural world. In the short term, she aims to lead school
    projects and participate in science fairs, building a foundation for her long‑term ambitions.
