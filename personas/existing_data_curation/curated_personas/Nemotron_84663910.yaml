personas:
  professional: Anna Brienza is a budding problem‑solver who channels her love for LEGO construction and Scratch animations into school projects, eagerly organizing group assignments with reliable attention
    to detail while they dream of becoming a future game designer.
  sports: Anna Brienza kicks the ball for the Windsor Youth Soccer Club, cheers for the New England Revolution during family watching parties, and spends crisp New England winters ice skating at the town
    rink while they maintain an energetic, team‑oriented approach to fitness.
  arts: Anna Brienza loves dancing to Disney’s ‘Frozen’ soundtrack, sketches characters from adventure books alongside sketches of their favorite Disney princesses, and admires the whimsical illustrations
    of Eva Cassidy’s children’s picture books, letting these artistic influences shape their creative play.
  travel: Anna Brienza’s most treasured trips include a weekend apple‑picking adventure in the nearby orchards of Connecticut, a family road‑trip to the historic Freedom Trail in Boston, and a dream of
    visiting the interactive LEGO Discovery Center in Philadelphia, and they prefer itineraries that mix nature hikes with hands‑on museum fun.
  culinary: Anna Brienza enjoys the comforting taste of homemade mac and cheese, helps bake apple crumble using fresh orchard apples and a dash of cinnamon, and experiments with making simple fruit smoothies,
    though they often sneak an extra spoonful of chocolate chips into the batter.
  core: Anna Brienza is an exuberant explorer who blends curiosity with a practical streak, leading neighborhood games, saving diligently for LEGO dreams, and indulging in a sneaky extra slice of pizza
    when no one’s looking.
background:
  cultural: Anna grows up in Windsor, Connecticut, a suburban town in New England with a strong sense of community. Her family reflects a typical American white upbringing, with roots in various European
    ancestries that are celebrated through holiday traditions, summer barbecues, and local festivals. She attends a public elementary school where community values like teamwork, respect for nature, and
    civic participation are emphasized. Local activities such as library reading programs, town fairs, and seasonal apple picking outings shape her cultural experiences, fostering an appreciation for both
    her local heritage and a broader American identity.
