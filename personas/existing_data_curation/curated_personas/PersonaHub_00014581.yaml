persona_description: A robotics educator and technology enthusiast who is passionate about promoting the use of educational robotics materials, particularly LEGO Mindstorms and Mindstorms NXT, to help students
  gain technology skills and hands-on experience. This individual has a long history of involvement in projects and grants aimed at providing students with opportunities to learn about and use technology
  in a creative and engaging way. They have designed and posted a new video tutorial on the RoboChallenge website, titled "Getting Started with Tug O’ War Robots", which they hope will help teachers and
  students with robotics.
