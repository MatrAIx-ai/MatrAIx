personas:
  professional: A budding young engineer named Danh Van channels their curiosity into building intricate LEGO structures, experimenting with Snap‑Circuit kits, and designing redstone contraptions in Minecraft,
    while they apply strategic thinking from chess to solve practical problems with a relaxed, flexible mindset.
  sports: A competitive yet solitary 9‑year‑old athlete named Danh Van plays forward for the local youth soccer club Riverdale Rovers, practices swimming laps twice a week for personal stamina, follows
    the Los Angeles Lakers in basketball and Manchester United in soccer, and they prefer short, intense solo workouts like indoor rock‑climbing over large team drills.
  arts: A creatively inclined 9‑year‑old named Danh Van spends free time sketching original comic panels inspired by Stan Lee’s superheroes, devouring science‑fiction novels by Isaac Asimov, listening to
    Imagine Dragons while building LEGO worlds, and they watch Studio Ghibli films such as Spirited Away for artistic inspiration.
  travel: An adventurous 9‑year‑old named Danh Van loves family road trips to places like the Grand Canyon and a summer visit to Tokyo, dreams of touring the LEGO House in Billund, Denmark, plans itineraries
    more by imagination than strict schedules, and they balance a love for hands‑on exploration with the comfort of a familiar home base.
  culinary: A budding 9‑year‑old chef named Danh Van enjoys kneading dough for chocolate‑chip cookies, assembling layered spaghetti Bolognese with fresh basil, and helping stir fragrant broth for a homemade
    chicken pho, using exact measurements learned from family recipes while they often add a playful pinch of extra cheese for fun.
  core: A curious, calm, and competitively minded 9‑year‑old named Danh Van transforms solitary imagination into LEGO marvels, Snap‑Circuit inventions, and strategic chess victories, all while they navigate
    life with relaxed organization and an unwavering resilience.
background:
  cultural: Danh is a second‑generation Vietnamese‑American living in Rosenberg, Texas. At home, his family speaks Vietnamese, celebrates Tet and other Vietnamese festivals, and prepares traditional foods
    such as pho, bánh mì, and spring rolls. He attends a weekend Vietnamese language school and participates in community events organized by the large Vietnamese community in Fort Bend County. While rooted
    in his heritage, he also enjoys typical Texan activities—like watching baseball, eating barbecue with friends, and exploring the multicultural music scene of the Houston area—blending both cultures
    in his everyday life.
