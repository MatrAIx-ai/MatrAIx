  hobbies: '[''Building LEGO models'', ''Playing Minecraft and creating redstone contraptions'', ''Learning and playing chess'', ''Creating Scratch projects'', ''Reading science‑fiction books'', ''Drawing
    comics and storyboards'', ''Practicing Vietnamese language through storytelling'', ''Assembling Snap‑Circuit kits'']'
  career_goals: Although still young, Danh dreams of becoming a creator who builds useful tools. He hopes to design robots or simple machines that can help his family and community, aiming toward a future
    in mechanical engineering or robotics. He also imagines developing video games that teach problem‑solving, setting short‑term goals like mastering Scratch, winning a local chess tournament, and entering
    a school robotics competition.
