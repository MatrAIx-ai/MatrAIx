personas:
  professional: Tearsa Santiago is a seasoned health services manager with over 15 years of experience in strategic planning, EHR optimization, and community outreach, who blends data‑driven curiosity with
    pragmatic execution, champions health equity initiatives, and mentors emerging leaders, and they are actively pursuing a CHAE credential and an executive MBA to accelerate toward a senior executive
    role.
  sports: Tearsa Santiago follows the Washington Wizards and DC United, joins a neighborhood walking club that meets each Saturday morning, incorporates regular yoga sessions for flexibility, and when the
    summer heat spikes they reluctantly skip the gym, preferring a cool rooftop garden stroll.
  arts: Tearsa Santiago is a dedicated member of a DC jazz appreciation club, regularly attending performances featuring legends like Miles Davis and Ella Fitzgerald, enjoys exploring street‑art murals
    by local artists such as JR, and makes time to attend the annual DC Jazz Festival, though they sometimes stay up late listening to vinyl records, which interferes with their early morning yoga routine.
  travel: Tearsa Santiago’s travel style blends purposeful community visits with leisure exploration, having spent summers on a Jamaican aunt’s farm learning to prepare jerk chicken, they cherish trips
    to historic Savannah and New Orleans for their architecture, and they dream of a future pilgrimage to the UK to walk the sites of the historical fiction novels they adore.
  culinary: Tearsa Santiago cooks with a confident intermediate skill, often preparing soul‑food staples like collard greens, smoked turkey, and sweet‑potato pie alongside Caribbean dishes such as jerk
    chicken, plantain mofongo, and scotch‑bonnet‑spiced rice, they relish hosting intimate dinner gatherings where they pair meals with homemade cranberry‑ginger tea, yet they admit to over‑seasoning with
    garlic when stressed.
  core: Tearsa Santiago is a data‑driven health executive who balances a relentless drive for equity with a love of jazz, soulful cooking, and yoga, even as they wrestle with chronic worry and a habit of
    late‑night coffee indulgences.
background:
  cultural: Tearsa identifies as African American with deep roots in the Washington, DC metropolitan area. Her family history includes grandparents who migrated north during the Great Migration and an aunt
    who brought Caribbean cultural traditions to family gatherings. These influences have shaped her appreciation for soul food, vibrant music, and communal solidarity. Active in her local Baptist church,
    she participates in outreach programs that address food insecurity and preventative health, reflecting a lifelong commitment to uplifting Black communities while honoring the diverse cultural tapestry
    of her heritage.
attributes:
  skills: '[''Strategic planning'', ''Budgeting and financial management'', ''Quality improvement methodologies (Lean, Six Sigma)'', ''EHR system implementation and optimization'', ''Regulatory compliance
    (CMS, DC Health Authority)'', ''Risk management and patient safety'', ''Team leadership and staff development'', ''Data analysis and performance reporting'', ''Community health outreach'', ''Grant writing
    and fundraising'', ''Cultural competency and diversity initiatives'']'
  hobbies: '[''Reading historical fiction and public health literature'', ''Cooking Southern and Caribbean cuisine'', ''Yoga and mindfulness meditation'', ''Rooftop gardening'', ''Community health education
    volunteering'', ''Jazz club membership'', ''Urban walking tours and photography'']'
  career_goals: Tearsa aims to transition into a senior executive role—such as Director of Clinical Operations or Vice President of Population Health—within the next five years, where she can shape system‑wide
    strategies that reduce health disparities in the District. She is pursuing a Certified Healthcare Executive (CHAE) credential and plans to enroll in an executive MBA program to deepen her business acumen.
    A core ambition is to launch a telehealth equity program that expands access for underserved neighborhoods, and to mentor emerging Black and Latina leaders in health administration, thereby amplifying
    representation at the highest levels of healthcare leadership.
