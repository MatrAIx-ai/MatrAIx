  career_goals: Edna aims to transition into a supervisory or consulting role within facility management, leveraging her extensive cleaning expertise to train the next generation of custodial staff and
    implement sustainable cleaning practices. She plans to obtain a certification in green cleaning and possibly lead a pilot program for eco‑friendly waste reduction in her building. In the longer term,
    she hopes to volunteer her time at local senior centers, offering guidance on maintaining safe living environments for older adults. While mindful of her age, she remains committed to staying active
    and contributing meaningfully to her community.
