persona_description: A passionate environmental educator who is dedicated to promoting awareness and understanding of wetlands in urban areas through hands-on learning experiences. They are skilled in delivering
  cross-curricular programs that are authentic, practical, and engaging, allowing students to acquire a diverse range of viewpoints to understand environmental issues. They are also experienced in utilizing
  information, communication technologies to connect Urrbrae Wetland with outside schools, universities, and other organizations, encouraging the sharing of information to achieve better sustainable and
  conservation outcomes for the wetland. They are highly knowledgeable and skilled in the field of environmental education, with a special interest in the values, functions, and benefits of wetlands in
  urban areas.
