  career_goals: Although retired from formal employment, Charles aims to channel his expertise into mentorship and community service. He plans to lead workshops at the local maker space, guiding high-school
    students through hands-on aerospace projects and encouraging interdisciplinary thinking that bridges engineering and art. He also aspires to complete and self-publish a reflective memoir that explores
    the evolution of the U.S. space program through a personal lens, while highlighting the role of creativity in technical problem-solving. Additionally, he hopes to travel to historic art centers in Europe,
    using those experiences to inform his own artistic practice and to enrich the cultural programming he supports back home.
