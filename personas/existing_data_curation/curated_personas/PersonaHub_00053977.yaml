persona_description: An early 14th-century English scholar and forger, known for his expertise in the art of forging letters, documents, and other writings, and his innovative use of the word "forged" to
  describe the process of forging money. His knowledge of the forging process and the mechanics of creating fake documents was both practical and theoretical, and he likely played a significant role in
  the development of the modern concept of forgery. His work likely had a significant impact on the legal and social structures of the time, and his legacy can still be felt in the modern understanding
  of forgery and its consequences.
