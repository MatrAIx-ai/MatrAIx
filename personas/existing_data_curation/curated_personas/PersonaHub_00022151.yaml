persona_description: A healthcare professional who is a practicing infectious disease physician. This individual is knowledgeable in the diagnosis, treatment, and management of invasive fungal diseases.
  They are familiar with the epidemiology, pathogenesis, and pathophysiology of these diseases, and are skilled in the use of antifungal therapy to treat and prevent them. They may also be involved in the
  development and implementation of infection control policies and practices, as well as the training of other healthcare providers in the recognition and management of invasive fungal infections.
