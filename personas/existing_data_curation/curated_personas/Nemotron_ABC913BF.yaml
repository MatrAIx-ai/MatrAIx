  career_goals: Kathryn aims to earn a Master of Library and Information Science within the next two years to qualify for senior leadership roles. She envisions becoming a Head of Community Programs at
    a major public library, where she can design inclusive, arts‑focused educational initiatives that blend traditional library services with contemporary digital experiences. Long‑term, she hopes to spearhead
    a regional partnership between libraries, schools, and local art institutions to create interdisciplinary learning hubs that foster lifelong learning and cultural appreciation. Additionally, she aspires
    to mentor emerging librarians and contribute scholarly articles on library pedagogy and community engagement.
