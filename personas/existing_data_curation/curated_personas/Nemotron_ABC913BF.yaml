personas:
  professional: Kathryn Perry, a 33-year-old information literacy instructor and curriculum designer, leverages her curiosity, meticulous organization, and compassionate mediation skills to create inclusive,
    tech-enhanced art programs at her municipal library, and they regularly champion collaborative projects that bridge community members with local cultural institutions.
  sports: Kathryn Perry, an enthusiastic weekend hiker and road cyclist who belongs to the Bay Area Cycling Club, tracks her mileage on Strava, supports the Golden State Warriors and San Francisco Giants,
    and they incorporate yoga sessions twice a week to maintain flexibility, although they sometimes skip a long ride when a new gallery opening demands their attention.
  arts: Kathryn Perry, a watercolor enthusiast who fills sketch journals with scenes inspired by the vivid abstractions of Mark Rothko and the immersive installations of Olafur Eliasson, regularly attends
    openings at local contemporary art spaces, curates a personal blog that references authors like Hilary Mantel and musicians such as Bon Iver, and they find solace in the creative process, even though
    they sometimes procrastinate on starting new pieces until the next exhibition arrives.
  travel: Kathryn Perry, a meticulous planner with a penchant for cultural immersion, designs week-long itineraries that combine museum tours at the Guggenheim in New York and street-food adventures in
    Chiang Mai, schedules weekend hikes in Yosemite’s valleys, and they often book budget-friendly Airbnb stays to stretch their modest travel fund, though they sometimes overpack their sketch journals
    with more supplies than they can carry.
  culinary: Kathryn Perry, an adventurous home cook with intermediate skill, loves creating experimental dishes like miso-glazed eggplant with fermented kimchi, saffron risotto infused with sumac, and turmeric-spiced
    chickpea falafel, and they pair their meals with eclectic playlists, although they sometimes over‑season their experiments, leading to a kitchen filled with aromatic chaos.
  core: Kathryn Perry, a curiosity‑driven librarian‑artist hybrid, balances meticulous library work with spontaneous watercolor sessions, often loses track of time while sketching in galleries, and they
    habitually hoard vintage art catalogues that clutter their apartment.
background:
  cultural: Kathryn grew up in a middle‑class suburban family in the Chicago metropolitan area, with roots tracing back to German and Irish ancestry. The Midwest emphasis on community, humility, and a strong
    work ethic shaped her values, while frequent family trips to Chicago's world‑class museums and theaters ignited her lifelong appreciation for the arts. Living in Des Plaines exposes her to a diverse,
    culturally rich environment where she engages with neighbors from varied backgrounds, fostering an inclusive outlook. Her cultural identity blends traditional Midwestern values—punctuality, reliability,
    and communal responsibility—with an openness to multicultural experiences, directly influencing her collaborative and compassionate professional approach.
