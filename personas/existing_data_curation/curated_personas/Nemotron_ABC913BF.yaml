  hobbies: '[''Art Gallery Visits'', ''Museum Exploration'', ''Watercolor Painting'', ''Sketch Journaling'', ''Reading Historical Fiction'', ''Literary Non‑fiction'', ''Personal Essay Blogging'', ''Hiking'',
