  hobbies: '[''Hiking'', ''Birdwatching'', ''Landscape Photography'', ''Native Plant Gardening'', ''Reading Science & History'', ''Chess'', ''Woodworking'', ''Mediterranean Cooking'', ''Community Book Club'',
    ''Sustainable Living Workshops'']'
  career_goals: Although retired, David wants to stay intellectually engaged by volunteering as a mentor for local high‑school robotics teams and offering his engineering insight to community sustainability
    projects, such as neighborhood solar micro‑grids. He hopes to author a guidebook that blends practical DIY energy solutions with clear scientific explanations, and to serve on the advisory board of
    the Santa Barbara Museum of Natural History’s STEM outreach program. Ultimately, his ambition is to leave a legacy of knowledge sharing that honors his late wife's commitment to community service while
    satisfying his own curiosity about emerging technologies.
