  career_goals: Richard dreams of blending his love for art and technology to become a video game designer or interactive storyteller. He envisions creating games that let players explore imaginative worlds,
    and hopes to one day lead a youth art‑tech club at his school where friends can experiment with drawing, coding, and building. In the longer term, he aims to attend a specialized high‑school program
    in visual design and eventually study game development or digital media in college.
