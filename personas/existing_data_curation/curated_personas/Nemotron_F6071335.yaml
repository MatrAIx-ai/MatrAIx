personas:
  professional: Richard Kontos is an aspiring game designer who builds intricate custom maps in Minecraft and Roblox, turning their love for doodling and LEGO construction into early-level level design
    skills, while their curious, relaxed approach lets them experiment freely without rigid deadlines.
  sports: Richard Kontos spends afternoons on the soccer field with the local Wasatch United youth team, cheering for Real Salt Lake and the Utah Jazz, while also joining weekend hikes with the Wasatch
    Hikers Club to explore the foothills.
  arts: Richard Kontos channels their artistic spark into doodling comic-style characters, attending community art workshops where they experiment with watercolor, and they regularly jam to indie bands
    like Arcade Fire and classic rock legends such as The Beatles while devouring graphic novels like Amulet and Bone.
  travel: Richard Kontos loves day-trips to Yellowstone's geysers and weekend camping in Moab's red rock canyons, dreams of exploring Tokyo's anime districts, and typically plans trips with the family using
    Google Maps, favouring adventure over luxury.
  culinary: Richard Kontos prefers pizza topped with pepperoni and extra cheese, homemade mac-and-cheese, and the occasional sushi roll with avocado and cucumber, but their cooking skill is limited to whisking
    batter and assembling easy snack plates.
  core: Richard Kontos is a curious, sociable eleven-year-old who stitches together worlds of digital maps, doodles, and soccer drills, yet often misplaces homework in the back of their LEGO box.
background:
  cultural: Richard was raised in Mapleton, a suburban town in Utah County known for its close‑knit, largely white community and strong emphasis on outdoor recreation. His family participates in local traditions
    such as county fairs, community picnics, and occasional church gatherings, providing him with a blend of modest Mid‑Western values and the expansive natural landscape of the Intermountain West. The
    region’s culture encourages independence, teamwork, and appreciation for both the arts through school programs and local galleries, and the outdoors through easy access to trails, ski resorts, and national
    parks, shaping his open‑minded and resilient outlook.
