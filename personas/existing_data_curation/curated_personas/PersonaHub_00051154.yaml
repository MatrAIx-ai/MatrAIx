persona_description: A mental health professional who specializes in treating post-traumatic stress disorder (PTSD) and has a special interest in the psychological impact of warfare and random acts of violence.
  She has experience treating individuals who were already psychologically vulnerable and can develop somatic symptom disorders if they do not receive proper psychological help. Her expertise extends to
  understanding the brain's control over every inch of a person's body and the importance of dealing with feelings to prevent stress from going to the organs. She is also knowledgeable about the effects
  of pre-existing vulnerabilities and the recovery process, which can take years for some individuals.
