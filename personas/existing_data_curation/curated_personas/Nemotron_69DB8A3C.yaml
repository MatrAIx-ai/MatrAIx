  career_goals: Alain aspires to become an engineer—preferably civil or environmental—who designs practical, sustainable solutions for water management and agriculture, reflecting the needs of his community
    in the Central Valley. He dreams of developing low‑cost irrigation monitoring tools that help local farms conserve water while maintaining productivity. In parallel, he hopes to mentor younger students
    by teaching basic coding and problem‑solving skills through after‑school programs or community workshops. He aims to secure a scholarship to study engineering at a university, where he can combine his
    technical curiosity with a commitment to service and community improvement.
