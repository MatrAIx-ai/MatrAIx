  career_goals: Kristen envisions a future where she works as a veterinarian, attracted by the hands‑on, practical nature of caring for animals and the reliable routine of a clinic, which she believes will
    help manage her worries. At the same time, she dreams of playing soccer competitively at the high‑school level and eventually coaching younger kids, merging her love of sport, competition, and teamwork.
    She plans to study animal science in college as a stable, respected path that aligns with her practical values and desire for a predictable career schedule.
