personas:
  professional: Kristen Juliano, an ambitious middle‑school coder who leads their school’s after‑school Scratch club, blends their love for building Lego structures with a competitive streak to design simple
    games, yet often leaves project deadlines to the last minute because they prefer spontaneous play over rigid schedules.
  sports: Kristen Juliano, a dedicated goalkeeper for their elementary soccer team and an avid supporter of the Cleveland Browns and Cavaliers, spends their Saturdays at the local community field, often
    challenging friends to impromptu penalty shootouts after practices, while occasionally neglecting their homework for extra drills.
  arts: Kristen Juliano, a mystery‑novel enthusiast who participates in the library’s book club and curates themed movie nights featuring directors like Steven Spielberg and actors such as Tom Holland,
    merges their love of storytelling with their Lego creations, yet they can be overly critical of plot holes in the films they watch with friends.
  travel: Kristen Juliano, who loves family trips to the lakefront for Fourth of July fireworks and dreams of visiting Disney World and the historic Rock & Roll Hall of Fame, plans short weekend getaways
    around school breaks but often forgets to pack their soccer cleats, reflecting their routine‑loving yet disorganized nature.
  culinary: Kristen Juliano, a budding home chef who enjoys making buttery mac and cheese, pepperoni pizza, and chocolate chip cookies with the help of their mom, prefers simple dishes that can be rehearsed
    nightly, yet they frequently binge on snack‑size chips while playing Super Smash Bros., revealing a sweet‑tooth habit.
  core: Kristen Juliano is a routine‑loving, competitively spirited pre‑teen who dazzles friends with soccer tricks and LEGO builds while juggling a knack for spontaneous fun and occasional worry‑filled
    overthinking.
background:
  cultural: Kristen grew up in Rocky River, a middle‑class, predominantly white suburb of Cleveland, Ohio. Her family embodies typical Midwestern values of hard work, politeness, and community involvement.
    She participates in local traditions such as Fourth of July fireworks at Lake Erie, Thanksgiving family dinners, and church youth group activities. The strong regional sports culture, especially support
    for the Cleveland Browns and Cavaliers, influences her enthusiasm for soccer and team competition. Her upbringing emphasizes practicality, routine, and a respectful, modest approach to life, reflecting
    the cultural norms of her community.
