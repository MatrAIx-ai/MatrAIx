personas:
  professional: Lamar Leggett, a 24‑year‑old utility field technician in Houston, combines meticulous meter‑reading expertise with a natural flair for community outreach, using their organized, talkative
    nature to train new hires, streamline route optimization, and champion safety protocols while dreaming of a future sustainability coordinator role.
  sports: Lamar Leggett fuels fitness by playing in a downtown Houston 3‑on‑3 basketball league, attending weekly hip‑hop dance workshops, and cheering on the Houston Rockets and Astros while maintaining
    a disciplined routine of early‑morning runs along Buffalo Bayou Park.
  arts: Lamar Leggett immerses themselves in the arts by snapping street‑level photos at Houston's vibrant mural tours, curating playlists that weave together Miles Davis, Parliament‑Funkadelic, and Kendrick Lamar,
    and collaborating on a community mural inspired by visual storyteller Shepard Fairey.
  travel: Lamar Leggett favors spontaneous weekend road trips to culturally rich cities like New Orleans and Austin, while dreaming of a future European art pilgrimage to Berlin’s street‑art districts and
    a summer immersion in Tokyo’s tech‑savvy neighborhoods, balancing a modest budget with strategic use of travel‑credit points.
  culinary: Lamar Leggett, an avid home chef, experiments with soul‑food classics like smoked brisket and collard greens spiced with West African berbere, frequently hosting potluck nights where dishes
    such as jollof‑style shrimp étouffée and sweet potato soufflé steal the spotlight.
  core: Lamar Leggett channels their insatiable curiosity and sociable energy into weaving technical precision with artistic flair, though a habit of juggling too many side projects often leaves their inbox
    overflowing and their sleep schedule in disarray.
background:
  cultural: Lamar grew up in Houston’s East End, a culturally rich, predominantly African-American neighborhood where family, church, and community events play a central role. His family’s roots trace back
    to the Southern Deep South, bringing traditions of soul food, gospel music, and storytelling into his home. Attending a local historically Black church, he participated in choirs and community service
    projects, which instilled a strong sense of collective responsibility and resilience. Annual celebrations such as Juneteenth and the Houston Black Arts Festival have deepened his appreciation for African-American
    artistic expression. The city’s multicultural landscape also exposed him to a blend of Latino, Caribbean, and Asian influences, broadening his world view. These cultural experiences shape his values
    of hospitality, perseverance, and a desire to uplift his community through both technical expertise and creative endeavors.
