  hobbies: '[''Visiting art galleries and street murals'', ''Street photography'', ''Playing basketball'', ''Hip-hop dancing'', ''Volunteering at community youth programs'', ''Cooking and experimenting
    with Southern and African recipes'', ''Reading sci-fi and social-justice non-fiction'', ''Learning basic coding (Python)'']'
  career_goals: Lamar aims to advance within the utility industry by first obtaining certifications such as the Certified Utility Technician and an associate degree in electrical engineering technology.
    In the next three to five years, he hopes to move into a senior field technician role, leading a small team of meter readers and taking responsibility for route optimization and safety training. His
    longer-term ambition is to transition into a community outreach or sustainability coordinator position, where he can blend his technical knowledge with his passion for art, education, and community
    engagement to promote energy-efficiency programs and renewable initiatives across Houston. He also envisions launching a community-based art project that highlights the intersection of energy consumption
    and cultural expression, using his growing graphic design skills to raise awareness.
