persona_description: A scientist and astrobiologist who specializes in the study of Europa, the moon of Jupiter. Greenberg's research focuses on the possibility of life existing on Europa, and he has proposed
  that the moon's combination of factors, including the presence of liquid water, tidal stresses, and periodic surface exposure, could create a habitable environment for life. He has been studying the images
  sent from the Galileo spacecraft for over 10 years and has proposed that the surface of Europa is evidence of exposure to the oceans, which could provide a stable but changing environment for life. Greenberg's
  research has led to the development of two proposals for future missions to Europa and Jupiter's moons, with the first orbiter scheduled for launch in the decade following the Galileo mission.
