  career_goals: Even in retirement Travis aims to preserve his legacy and contribute to the community. He plans to record a series of oral‑history interviews for the Peoria Historical Society, documenting
    the experiences of older Black residents. He also hopes to mentor younger members of his church’s youth group, sharing life skills and cultural traditions. Learning to use a tablet for video calls and
    digital archiving is a personal goal that blends his curiosity with practicality. Travis wants to stay physically active through gardening and walking, while maintaining his mental well‑being by participating
    in support groups that help manage his anxiety. Ultimately, he aspires to leave a written memoir for his grandchildren that blends personal stories with the broader history of Black Midwestern life.
