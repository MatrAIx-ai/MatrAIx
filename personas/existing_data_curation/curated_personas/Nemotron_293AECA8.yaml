  career_goals: Even though he is no longer part of the formal workforce, Jesse remains driven to contribute to his hometown. His primary ambition is to document and share the history of McLeansboro through
    a series of recorded interviews and a modest memoir, ensuring the town’s legacy endures. He also hopes to expand the senior‑center’s weekly social programs, introducing new activities such as inter‑generational
    craft workshops and local history discussion groups. Maintaining his health and independence is a personal goal, so he works to stay physically active through daily walks and light gardening. Finally,
    he wishes to travel occasionally to visit his children and grandchildren, especially during family reunions, and to attend the annual county fair despite his age.
