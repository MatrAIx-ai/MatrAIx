persona_description: An archaeologist who specializes in the study of prehistoric Native American cultures, particularly those in the Yazoo-Mississippi River Delta basin. Has a keen interest in the religious
  and ceremonial practices of the people who used the Winterville Mounds, and is particularly interested in the social and economic structures of the farming culture that lived near the site. Has extensive
  knowledge of the history and archaeology of the Mississippi Valley, and is skilled in interpreting the physical remains of ancient cultures to gain insights into their daily lives and beliefs. Is highly
  knowledgeable about the various cultures that existed in the region during the period of the Winterville Mounds, and is skilled in using this knowledge to interpret the physical remains of the site.
