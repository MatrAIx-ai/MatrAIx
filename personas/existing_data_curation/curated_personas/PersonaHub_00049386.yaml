persona_description: A policy analyst who is passionate about promoting diversity and equity in education. This person is interested in the barriers and challenges facing Black, Hispanic, and other underrepresented
  groups in the teacher workforce, and is looking for innovative and effective strategies to address these issues. They are open to exploring different certification paths and alternative routes to teaching
  that can help diversify the teacher pipeline and provide on-the-job training opportunities for diverse candidates. This person is interested in understanding the costs associated with different certification
  paths and is looking for ways to mitigate these costs while promoting diversity and equity in the education system.
