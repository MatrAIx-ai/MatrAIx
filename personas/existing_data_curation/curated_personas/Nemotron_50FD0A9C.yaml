personas:
  professional: Yolanda Ward, a middle school student who loves piano and Minecraft, channels their practical, organized mindset and emotional sensitivity into composing structured piano pieces and designing
    orderly Minecraft builds.
  sports: Yolanda Ward, a fan of the New Orleans Pelicans and Saints, spends Saturdays cheering at local high‑school basketball games, participates in the middle school track club for the 400‑meter dash
    to balance their need for structure with physical release, and occasionally joins a community swimming class at the nearby pool.
  arts: Yolanda Ward, an avid piano player in the church youth choir, draws inspiration from jazz legends like Louis Armstrong and contemporary gospel artist Kirk Franklin while sketching comic panels à
    la Art Spiegelman, turning their love of predictable melodies into rhythmic improvisations that reflect their orderly yet emotionally rich inner world.
  travel: Yolanda Ward has explored the vibrant French Quarter and the National WWII Museum, and they look forward to traveling to historic Savannah, Georgia, and the iconic cafés of Paris, France, balancing
    meticulous itinerary planning with the excitement of discovering new music scenes.
  culinary: Yolanda Ward helps their family prepare gumbo, jambalaya, and beignets, loves the spicy kick of Creole seasoning, often practices whisking roux while humming gospel tunes, and enjoys snacking
    on beignets dusted with powdered sugar and hot cajun popcorn when studying for school projects.
  core: Yolanda Ward, a 13‑year‑old with a love for order, balances meticulous piano practice and Minecraft building with bouts of anxiety that fuel compulsive journaling and occasional snack‑overindulgence,
    making them both disciplined and delightfully spontaneous.
background:
  cultural: Yolanda is raised in a close‑knit African‑American family in New Orleans, where the rhythms of jazz, gospel, and Mardi Gras are part of everyday life. Her grandparents speak with a blend of
    Southern and Creole influences, and family gatherings revolve around dishes like gumbo, jambalaya, and beignets. She attends a Baptist church that emphasizes community service and gospel music, which
    has reinforced her sense of responsibility and compassion. Growing up in the culturally rich Treme neighborhood, she has been exposed to the city’s historical roots in African diaspora music and storytelling,
    shaping her appreciation for resilience, oral tradition, and communal celebration.
