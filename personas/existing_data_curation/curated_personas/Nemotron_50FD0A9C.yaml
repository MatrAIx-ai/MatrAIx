  hobbies: '[''Playing piano'', ''Journaling'', ''Reading mystery novels'', ''Drawing comics'', ''Minecraft building'', ''Youth choir singing'', ''Cooking Creole dishes with family'', ''Watching Mardi Gras
    parades'']'
  career_goals: Yolanda hopes to graduate high school with strong grades, earn a scholarship, and eventually study psychology or social work so she can become a counselor who supports other teens dealing
    with anxiety. In the shorter term, she aims to join the school marching band and volunteer as a peer mentor, building the structured environment she values while helping peers.
