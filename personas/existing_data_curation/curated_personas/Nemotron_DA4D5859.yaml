personas:
  professional: Lyudmila Poole is a veteran manufacturing floor leader who blends hands-on machinery expertise, lean-process curiosity, and a naturally sociable style to mentor apprentices, champion safety,
    and steer modest automation projects while keeping morale high.
  sports: Lyudmila Poole joins the local walking club for brisk morning strolls, cheers on the hometown minor‑league baseball team the Springfield Sluggers, and participates in gentle bird-watching hikes
    organized by the county park, keeping active without intense competition.
  arts: Lyudmila Poole delights in community theater, often performing in productions of classic plays while singing karaoke renditions of songs by Dolly Parton and Frank Sinatra, and she spends evenings
    quilting to the soft background of Enya’s instrumental albums.
  travel: Lyudmila Poole favors relaxed road trips to historic small-towns like Savannah, Georgia, and charming European locales such as Prague, where she can wander cobblestone streets and sample local
    markets, but she always returns home in time for her garden’s planting season.
  culinary: Lyudmila Poole cherishes cooking hearty borscht, delicate pelmeni, and fresh salad of heirloom tomatoes with dill, often using home-grown carrots and beets, and she enjoys sharing these dishes
    at church potlucks and neighborhood gatherings.
  core: Lyudmila Poole is a gregarious, garden-loving mentor who balances a practical, safety-first work ethic with a zest for storytelling, karaoke, and preserving family recipes, even if she occasionally
    forgets to take her blood pressure meds on a busy day.
background:
  cultural: Lyudmila was born to Russian‑American parents who settled in Florida after World II. She grew up speaking both English and Russian, celebrating Orthodox holidays such as Easter, Christmas, and
    the feast of St. Nicholas, while also embracing Southern customs like Thanksgiving, church picnics, and community festivals. Her identity blends Slavic heritage with the warm, community‑oriented spirit
    of Ocala, and she remains active in the local Russian Orthodox congregation, the senior center volunteer network, and neighborhood social groups.
