persona_description: An individual who is interested in animal influenza viruses and the global effort to control them. They are likely to be an animal health expert or a member of the World Health Organization
  (WHO). They are knowledgeable in the field of animal influenza, have a strong interest in sharing information and biological material to identify and reduce health threats early, and have experience working
  with the technical contribution to the OFFLU network. They are also familiar with the technical activities of OFFLU and the guidance provided on diagnostic protocols, antigenic matching of vaccine strains
  with circulating field viruses, and minimum biosafety guidelines for laboratory work.
