  hobbies: '[''Fly fishing'', ''Motorcycle restoration'', ''Woodworking'', ''Watching Steelers football'', ''Historical biographies reading'', ''Crossword puzzles'', ''Gardening'', ''Veterans volunteer
    work'']'
  career_goals: Despite being close to retirement age, William aims to transition into a consulting role where he can mentor emerging managers and help local businesses adopt efficient operational practices.
    He hopes to leave a lasting legacy by documenting the best practices he’s refined over his career, and possibly author a handbook on pragmatic management for the Rust Belt manufacturing sector. He also
    aspires to secure financial stability for his retirement while staying engaged in community projects.
