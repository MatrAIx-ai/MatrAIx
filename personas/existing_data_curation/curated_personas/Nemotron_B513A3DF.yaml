personas:
  professional: Tawanna Curry, a seasoned nursing assistant with thirty years of hands‑on patient care, blends a methodical, organized approach with a compassionate drive to mentor newcomers, and they aim
    to transition into a certified nursing assistant trainer and community health coordinator role.
  sports: Tawanna Curry enjoys the rhythm of early morning walks in Austell's Cherokee Park, silently cheers on the Atlanta Falcons during football season, and they occasionally join a senior‑friendly Pilates
    class at the local community center while keeping an eye on the Atlanta Braves' spring training updates.
  arts: Tawanna Curry finds solace in gospel voices like Mahalia Jackson and the improvisational brilliance of Miles Davis, while their book club delves into historical fiction and African American literature,
    and they occasionally sketch floral patterns for quilts.
  travel: Tawanna Curry prefers low‑key, purpose‑driven travel, savoring weekend getaways to historic Savannah, day trips to the scenic Blue Ridge Mountains, and dreaming of a pilgrimage to Washington,
    D.C.'s National Museum of African American History, and they plan each journey with meticulous itineraries and budget spreadsheets.
  culinary: Tawanna Curry loves cooking comforting dishes like simmered collard greens, roasted sweet potatoes with cinnamon, and homemade cornbread, often experimenting with garden herbs such as rosemary
    and thyme, yet they admit to a guilty habit of over‑indulging in buttery biscuits while watching jazz performances on TV.
  core: Tawanna Curry blends a meticulous, organized mind with a quiet creative spirit, navigating late‑life career ambitions and chronic anxiety through routine, quilting, and gentle community engagement,
    while they occasionally let a sweet tooth and sleepy‑eyed patience slip into indulgence.
background:
  cultural: Tawanna was raised in a close‑knit African American community in the Atlanta metropolitan area. The traditions of Southern hospitality, church involvement, and family gatherings shaped her values
    of community service and mutual support. She draws on the rich oral history of the Black South, celebrating gospel music, soul food, and storytelling. Her experiences navigating both the opportunities
    and challenges of being a Black woman in Georgia have fostered resilience, a strong sense of identity, and a commitment to uplifting others through mentorship and health advocacy.
attributes:
  skills: '[''patient care'', ''vital sign monitoring'', ''wound care'', ''infection control'', ''medication assistance'', ''medical documentation'', ''care coordination'', ''staff training'', ''patient
