  hobbies: '[''quilting'', ''knitting'', ''gardening'', ''reading historical fiction'', ''African American literature'', ''small book club'', ''gospel music'', ''jazz music'', ''walking in parks'', ''journaling'',
    ''gentle yoga'']'
  career_goals: Tawanna aims to transition into a supervisory or educator role within the healthcare setting, such as a certified nursing assistant trainer or a patient care coordinator, leveraging her
    experience to mentor newcomers. She plans to complete her associate degree in nursing to qualify for an LPN certification, focusing on geriatric and hospice care. Additionally, she hopes to develop
    a community outreach program that provides health education and support for seniors in Cobb County, emphasizing preventive care and mental health resources.
