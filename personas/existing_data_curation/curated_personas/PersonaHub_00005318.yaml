persona_description: A scientist and researcher who is working on developing indices to better understand the influence of physiological condition on the survival of Pacific halibut in relation to seasonal
  spawning, migration, disease response, and post-capture release survival. They are involved in studies investigating the types and relative levels of injuries and stresses that fish are exposed to during
  the discarding process in relation to the biological characteristics of the fish, with the goal of developing better estimates for the probability of survival (or mortality) during the entire discarding
  process. Their research interests include the development of methods that assess the nutritional and physiological statuses of living organisms, particularly focusing on the influence of body conditions
  on the performance of the organism. They have expertise in ecological studies and are actively involved in developing better estimates for the probability of survival (or mortality) during the entire
  discarding process.
