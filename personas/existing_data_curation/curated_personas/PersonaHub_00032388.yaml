persona_description: A scientist or engineer specializing in magnetic force microscopy (MFM) technology. They have expertise in the design, development, and application of MFM systems for low temperature
  and high magnetic field applications. They are proficient in the use of cantilever-based MFM techniques and have experience with the AC modulation technique for achieving the highest detection sensitivity.
  They are skilled in using classical lock-in techniques to measure frequency shifts due to the magnetic interaction between the MFM tip and sample. They are also familiar with the two commonly used techniques
  for separating magnetic information from other influences in MFM, constant height mode and constant distance mode. Their research interests include the application of MFM technology in various fields
  such as materials science, electronics, and biomedical engineering.
