personas:
  professional: John Southern, a budding robotics enthusiast and high school sophomore, combines his love for building LEGO models and coding to lead his school's robotics club, where they apply practical
    problem‑solving and structured project management to design competition‑ready autonomous bots.
  sports: John Southern, a member of the Phoenixville Youth Basketball League and the community soccer club, avidly follows the Philadelphia 76ers and Eagles, practices drills three times a week at the
    local gym, and they balance competitive play with regular fitness runs along the Schuylkill River Trail.
  arts: John Southern, the resident drummer for his junior high band, draws inspiration from drummers like Travis Barker and The Beatles, while they also immerse themselves in science‑fiction series like
    Ender's Game and listen to tech podcasts such as The Vergecast during creative downtime.
  travel: John Southern dreams of a family road trip to the Appalachian Trail’s overlook at Shenandoah, has already visited Washington D.C.’s Smithsonian museums and New York’s Times Square, and they hope
    to someday explore the historic castles of Bavaria on a future exchange program.
  culinary: John Southern favors classic pizza with extra mozzarella, chicken nuggets with honey mustard, and mac & cheese, often attempting to recreate backyard barbecue sauces with a dash of smoked paprika,
    while they occasionally indulge in midnight snack runs for nachos after gaming sessions.
  core: John Southern is a structured, sociable teen who balances robotics projects and drum practice with a penchant for video‑game spending sprees and an occasional forgetfulness about dentist appointments,
    and they often juggle schoolwork with extracurricular commitments.
background:
  cultural: John comes from a family of third‑generation residents of Montgomery County, Pennsylvania, with primarily German‑Irish ancestry. His household observes typical American holidays such as Thanksgiving,
    Christmas, and the Fourth of July, often celebrating with community fireworks and backyard barbecues. The family values suburban, middle‑class traditions, including participation in the local farmers’
    market, support for the town’s high school sports teams, and involvement in church and neighborhood events. Growing up in Phoenixville, John is exposed to a mix of modest cultural diversity and strong
    community ties that shape his collaborative and reliable nature.
