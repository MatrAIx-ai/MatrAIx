  career_goals: John aims to attend a high school with robust STEM programs, pursue a degree in civil engineering or computer science, and eventually work as a project manager overseeing community infrastructure
    or technology initiatives. He is motivated to combine his practical problem‑solving skills with his love for teamwork, and he hopes to mentor younger students in robotics and sports as part of his long‑term
    contribution to his hometown.
