persona_description: A researcher who specializes in the study of the eyes of animals, particularly the compound eyes of the mantis shrimp. Her research interests include the anatomy, function, and evolution
  of these eyes, as well as their potential applications in technology and medicine. She is particularly interested in the unique features of the mantis shrimp's eyes, such as their trinocular vision and
  their ability to see circularly polarised light. She is also interested in the potential of these eyes for biotechnology and artificial intelligence.
