personas:
  professional: Regis Farmer is a building cleaner turned aspiring facilities manager who leverages meticulous cleaning logs, OSHA compliance expertise, and a budding knowledge of art preservation to pursue
    a supervisory role at a museum, methodically charting certifications and business‑administration coursework while they competitively position themselves for promotion.
  sports: Regis Farmer is a regular participant in a community basketball league, a dedicated fan of the North Dakota State Bison football and the Minnesota Vikings, and they often join local ice‑fishing
    tournaments on frozen lakes during winter, while also hiking the trails of the Sheyenne River Valley to stay active.
  arts: Regis Farmer frequently visits the North Dakota Museum of Art to study works by Ansel Adams and contemporary prairie painter Kay Walkingstick, volunteers as a stagehand for community theater productions,
    captures prairie landscapes with a DSLR, and they play acoustic guitar at regional folk music festivals, drawing creative inspiration for their woodworking projects.
  travel: Regis Farmer prefers road‑trip adventures that blend scenic drives across the Great Plains with stops at art galleries in Minneapolis and craft breweries in Boise, they have already explored Yellowstone
    National Park and aim to visit Glacier National Park and the historic fishing villages of Iceland for future inspiration.
  culinary: Regis Farmer enjoys cooking regional dishes such as Knoephla soup, fried perch with lemon butter, and homemade rye bread, they experiment with brewing craft beer using barley, hops, and rye
    malt, and they take pride in adding smoked paprika and fresh dill to their signature fish tacos.
  core: Regis Farmer is a detail‑obsessed, art‑loving cleaner who balances competitive ambition with a lingering worry habit, often found juggling cleaning schedules, camera gear, and a half‑finished brew.
background:
  cultural: Regis is a white Midwesterner raised in the Great Plains, with family roots tracing back to German and Scandinavian immigrants. He grew up in a small‑town environment that emphasized Protestant
    (likely Lutheran) values, hard work, self‑reliance, and community involvement. The cultural fabric of Fargo, with its growing arts scene and progressive attitudes, has broadened his appreciation for
    unconventional ideas while reinforcing the modest, polite, and cooperative norms of the region. Traditional local traditions such as county fairs, ice‑fishing, and holiday gatherings remain central
    to his family life, and his blue‑collar background instills a strong work ethic and a pragmatic outlook on life.
attributes:
  skills: '["Commercial cleaning techniques", "Floor care and maintenance (strip, wax, buff)", "Hazardous material handling", "Basic plumbing and electrical troubleshooting", "HVAC filter replacement",
    "Health and safety compliance (OSHA)", "Inventory management", "Scheduling and time management", "Budgeting and expense tracking", "Customer service and communication", "Team coordination and shift
    leadership", "Conflict resolution", "Basic art preservation knowledge", "Digital photography"]'
  hobbies: '["Visiting art galleries and museums", "Digital photography", "Community basketball league", "Hiking and exploring prairie trails", "Attending local live music and folk festivals", "Reading
    non-fiction (psychology, technology)", "Volunteering as a stagehand for community theater", "Home brewing craft beer", "DIY woodworking projects", "Cooking regional recipes", "Podcast listening (art
    history, personal development)"]'
  career_goals: Regis aspires to transition from a building cleaner to a facilities management role, ideally within a cultural institution such as a museum or university where his love for art can intersect
    with his operational expertise. He plans to complete his associate degree in business administration, earn certifications from the International Sanitary Supply Association and OSHA, and secure a supervisory
    position within the next three years. Long term, he hopes to start his own boutique cleaning service that specializes in art galleries and historic buildings, allowing him to blend his professional
    skills with his artistic interests while providing a stable, higher earning career for his family. His competitive drive pushes him to pursue promotions quickly, while his organized nature ensures he
    meets each milestone with detailed planning.
