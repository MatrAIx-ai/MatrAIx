  hobbies: '["Community Gardening", "Cooking and Baking", "Walking Groups", "Bridge", "Quilting and Crafting", "Book Club", "Genealogy Research", "Church Activities", "Volunteer Service", "Painting"]'
  career_goals: Although retired from formal employment, Linda Ann aims to deepen her impact on the Chesterfield community. She plans to launch a "Senior Garden" initiative that transforms a vacant lot
    into a shared horticultural space for neighbors, seeking grant funding and volunteer support. She wants to become a certified volunteer trainer, helping other seniors develop leadership and organizational
    abilities. Linda is also eager to mentor high‑school students through a life‑skills program, sharing her experience in budgeting, cooking, and community service. Preserving family history is a personal
    passion; she intends to collaborate with the local historical society to create a searchable family‑history archive. Physically, she is training for the annual St. Louis Senior Walkathon, hoping to
    lead a team and raise funds for a local hospice.
