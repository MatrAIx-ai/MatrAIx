personas:
  professional: Michael Lewis, a 17‑year‑old tech enthusiast from Garner, merges his methodical problem‑solving and hands‑on tinkering by repairing family computers, designing simple Raspberry Pi utilities,
    and supporting his church’s youth group, all while preparing for an IT apprenticeship that will eventually evolve into a community‑focused repair service.
  sports: Michael Lewis enjoys regular hikes on the trails of William B. Umstead State Park, follows the Carolina Hurricanes and NC State Wolfpack football with devoted enthusiasm, and spends Saturday mornings
    with a local bike‑maintenance club that meets at the community center, preferring low‑key cardio over competitive team sports.
  arts: Michael Lewis, an avid fan of classic rock icons like Led Zeppelin and The Who, spends evenings immersed in Isaac Asimov’s science‑fiction novels while meticulously assembling scale model airplanes,
    and occasionally attends community theater productions of classics such as *Our Town*.
  travel: Michael Lewis prefers well‑planned road trips, having explored Washington, D.C.’s historic museums and the Appalachian vistas of Asheville, while dreaming of future visits to Seattle’s tech hubs
    and the majestic landscapes of Yosemite National Park.
  culinary: Michael Lewis, who gravitates toward Southern comfort foods like pulled pork, collard greens, and homemade mac and cheese, enjoys cooking straightforward meals seasoned with smoked paprika,
    cheddar, and fresh garden herbs, though he often under‑cooks vegetables in his rush to finish projects.
  core: Michael Lewis blends earnest curiosity with disciplined pragmatism, tackling tech projects and model‑building with quiet focus while occasionally sacrificing sleep for late‑night coding sessions.
background:
  cultural: Michael was raised in a middle‑class, white family in Garner, a suburban community in Wake County, North Carolina. His upbringing reflects Southern values of modesty, self‑reliance, and community
    hospitality. He grew up attending a Methodist church, where family meals, Sunday worship, and participation in local events such as the county fair were routine. The region’s emphasis on practical skills
    and a strong work ethic shaped his appreciation for hands‑on learning, while the predominantly white demographic of his neighborhood gave him a grounded perspective on the social fabric of the area.
    These cultural influences inform his focus on stability, cooperation, and contributing positively to his community.
