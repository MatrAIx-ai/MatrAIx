  hobbies: '["Reading science-fiction novels", "Building scale model kits (airplanes, cars)", "Programming simple Python scripts and Raspberry Pi projects", "Playing chess (online and in person)", "Hiking
    at William B. Umstead State Park", "Listening to classic rock music", "Volunteering at community clean-up events", "Assisting with youth group activities at his church"]'
  career_goals: Michael aims to secure his GED within the next year and then pursue a technical apprenticeship in information technology or a skilled trade such as electrical work. He envisions working
    in a supportive environment where he can apply his methodical problem‑solving skills, eventually earning certifications like CompTIA A+ and an apprentice credential in electrical work. Long‑term, he
    hopes to launch a small community‑focused repair service that provides affordable computer and electronic maintenance to neighbors, blending his desire for stability, self‑reliance, and community contribution.
