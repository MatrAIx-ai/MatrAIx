  hobbies: '[''Acrylic painting'', ''Digital illustration'', ''Sketching cityscapes'', ''Reading speculative fiction'', ''Poetry writing'', ''Yoga'', ''Herb gardening'', ''Jazz and blues listening'', ''Community
    art volunteering'', ''Design blog writing'']'
  career_goals: Looking ahead, Sandra aims to transition from a strict drafting role into a hybrid position that blends technical precision with artistic design. She aspires to become a senior design consultant
    or independent freelancer, offering imaginative architectural concepts and custom visual presentations for residential projects in the Texas Hill Country. Building on her love for novelty, she plans
    to develop a portfolio of sustainable, artistically inspired home designs that incorporate cultural motifs. Sandra also hopes to mentor the next generation of Black women entering the drafting and design
    fields, perhaps by leading workshops at local community colleges or trade schools. In the longer term she envisions launching a small studio where she can balance client work with personal art projects,
    providing herself with the flexible schedule she values while securing a steady income for retirement.
