personas:
  professional: Sandra Teme, a veteran drafter with three decades mastering AutoCAD, Revit, and SolidWorks, now channels her abstract acrylic sensibility into hybrid design consulting, blending meticulous
    construction documentation with bold, sustainable visual concepts for Texas Hill Country homes while they mentor junior staff through informal, spontaneous coaching sessions.
  sports: Sandra Teme enjoys low‑impact fitness, attending sunrise yoga classes at the local community center, walking her dog along the Waco Brazos River trail, and cheering for the Waco Royals baseball
    team while they occasionally join a casual weekend softball league for recreation.
  arts: Sandra Teme’s artistic life weaves abstract acrylic canvases inspired by Wassily Kandinsky, digital illustrations echoing James White’s neon palette, and a deep affinity for jazz legends like Miles
    Davis, blues icon B.B. King, and soul powerhouse Aretha Franklin, all of which they share on a blog of reflective essays on design and personal growth.
  travel: Sandra Teme favors purposeful road trips, having explored the Hill Country vineyards of Fredericksburg, the art‑laden streets of Santa Fe, and the jazz‑rich neighborhoods of New Orleans, while
    they dream of a future study tour of Barcelona’s modernist architecture and a quiet retreat in the Japanese garden of Kyoto.
  culinary: Sandra Teme cooks with a farmer‑market mindset, frequently infusing fresh basil, rosemary, and thyme from her herb garden into Mediterranean dishes like pesto‑laden pasta, aromatic grilled chicken,
    and herb‑steeped teas, while they occasionally indulge in smoky Texas brisket at local BBQ joints.
  core: Sandra Teme fuses technical precision with vibrant imagination, balancing a love for solitary art creation with an anxious knack for budgeting and health monitoring, all while they sprinkle their
    days with jazz, yoga, and spontaneous mentorship.
background:
  cultural: Sandra was born and raised in Waco, Texas, to a working‑class African‑American family with deep roots in the local Black community. Her upbringing was shaped by the traditions of Southern Black
    culture—church gatherings with gospel music, family cookouts featuring soul food infused with Texan flavors, and storytelling sessions that celebrated African‑American heritage. The values of resilience,
    communal support, and artistic expression were reinforced by her mother's love of quilting and her father's interest in mechanical trades. Growing up, Sandra attended a historically Black elementary
    school and later a predominantly white high school, experiences that heightened her awareness of both cultural pride and the challenges of representation in male‑dominated fields like drafting. She
    frequently draws inspiration from African‑American visual artists and the Black Arts Movement, incorporating subtle motifs and color palettes into her personal artwork. Sandra remains actively involved
    in local cultural events, such as the Janine Mason African American Heritage Festival, and she mentors young Black students interested in STEM and design, hoping to broaden future opportunities for
    her community.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''SolidWorks'', ''hand sketching'', ''technical drawing'', ''spatial visualization'', ''creative conceptual design'', ''digital illustration'', ''building code interpretation'',
