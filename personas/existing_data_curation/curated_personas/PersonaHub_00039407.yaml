persona_description: A computer science professor at Brown University who specializes in natural language processing and machine learning, particularly in the field of computer games and artificial intelligence.
  She has a background in linguistics and has published research on the use of machine learning systems to automatically create algorithms for computer games and robotic systems. Her work has been supported
  by the National Science Foundation and she is currently working on a project to develop a computer system that can automatically decipher ancient languages using exploratory interaction with their environments.
  She is known for her ability to extract useful information from manual data and her interest in using machine learning to improve online translation software.
