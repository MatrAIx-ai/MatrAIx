  hobbies: '[''Pickup basketball'', ''Listening to jazz and classic R&B'', ''Southern cooking'', ''DIY home improvement projects'', ''Fishing at Jordan Lake'', ''Reading historic architecture'', ''Community
    clean‑up volunteering'']'
  career_goals: Joseph aims to move from laborer to crew foreman within the next two years by earning a formal OSHA 30‑hour certification and completing a state‑approved carpentry apprenticeship. He wants
    to develop stronger project‑management skills so he can eventually supervise larger residential remodels. Long‑term, Joseph envisions launching his own small subcontracting business focused on custom
    home renovations, offering reliable, community‑oriented service. He also hopes to give back by establishing a mentorship program for young workers in High Point, helping them acquire trade skills while
    reinforcing the balance of curiosity and practicality that has guided his own career.
