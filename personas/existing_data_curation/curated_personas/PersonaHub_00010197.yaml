persona_description: A political economist who is passionate about the concept of full employment and the need for fiscal policy to achieve it. They are deeply concerned about the historical and current
  challenges of economic instability and the need for a more robust and sustainable economic system. They are well-versed in the theory of public debt and the potential pitfalls and benefits of different
  approaches to managing public debt. They are also knowledgeable about the history of economic thought and the role of intellectual ideas in shaping public policy. They are dedicated to advancing the cause
  of full employment and believe that fiscal policy should be a key tool in achieving it.
