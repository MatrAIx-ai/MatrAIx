persona_description: A coastal scientist and planner who specializes in the management and protection of coastal areas. They have extensive experience in implementing and monitoring managed retreat projects,
  including the restoration of salt marsh habitats and the mitigation of erosion. They are knowledgeable about the factors that contribute to salt marsh loss, such as coastal squeeze and the need for equivalent
  replacement habitat. They are also aware of the challenges and uncertainties associated with managed retreat, including the low levels of monitoring and the unpredictability of results.
