personas:
  professional: Betty Palacios, a seasoned housekeeping professional with three decades of eco‑friendly cleaning expertise, balances meticulous organization with flexible problem‑solving and now pursues
    a hospitality‑management certification to move into a supervisory role in a local senior‑living facility, where she can mentor staff and integrate her DIY décor flair.
  sports: Betty Palacios, a devoted follower of the Mississippi Braves minor‑league baseball team and the Ole Miss Rebels football squad, enjoys weekly line‑dancing sessions at the community hall, walks
    the local nature trail each morning, and participates in a senior‑friendly tennis club at the municipal recreation center.
  arts: Betty Palacios, an avid participant in regional art fairs and occasional gallery openings, draws inspiration from blues legends like B.B. King and gospel choirs, admires contemporary Southern painter
    Larry Miller, and weaves this aesthetic into her quilting designs and DIY home‑decor projects.
  travel: Betty Palacios, an enthusiastic road‑tripper who prefers weekend getaways to historic towns such as Natchez, Savannah, and New Orleans, plans trips around art festivals and farm‑to‑table experiences,
    yet balances travel aspirations with a modest retirement budget and family responsibilities.
  culinary: Betty Palacios, a Southern‑style cook who perfects fried catfish, cornbread, and collard greens while experimenting with a rosemary‑infused quinoa salad inspired by her herb garden, enjoys sourcing
    fresh produce at the weekly farmers market, and occasionally indulges in Cajun jambalaya for special occasions.
  core: Betty Palacios, a community‑oriented, competitively spirited quilter and green‑cleaning expert in her early fifties, balances a love of tradition with a curiosity for new ideas, often juggling bustling
    volunteer schedules with ambitions for a boutique business, all while occasionally skipping health check‑ups in favor of a quilting session.
background:
  cultural: Betty’s cultural background is rooted in the rural Southern traditions of Mississippi. Raised in Lexington, she grew up surrounded by the values of Southern hospitality, strong church involvement,
    and community festivals that celebrate local music, food, and crafts. Her family’s focus on hard work and self-reliance shaped her practical approach to life, while her curiosity led her to embrace
    a broader appreciation for art and new ideas through community programs. Though she identifies with the white, southwestern cultural heritage of the region, she maintains an openness to diverse influences,
    integrating the rhythms of blues and gospel music, regional cuisine, and a love for local storytelling into her everyday life.
attributes:
  skills: '[''Deep cleaning'', ''Eco-friendly cleaning methods'', ''Time management'', ''Customer service'', ''Basic home maintenance'', ''Organizational planning'', ''Laundry and fabric care'', ''Stain
    removal'', ''DIY home décor creation'', ''Cooking basics'']'
  hobbies: '[''Quilting'', ''Knitting'', ''Community choir volunteer work'', ''Attending art fairs'', ''Southern cooking'', ''Gardening'', ''Nature walking'', ''Line dancing'', ''Book club'', ''Craft competitions'']'
  career_goals: Betty aims to leverage her extensive cleaning experience into a supervisory or managerial role within a local hotel, senior living facility, or a larger housekeeping operation, where she
    can train and mentor new staff. She also aspires to launch her own boutique cleaning and home-organization business that incorporates sustainable cleaning solutions and occasional home-staging advice,
    allowing her to blend her practical skills with her artistic interests. To support these ambitions, she plans to obtain a hospitality-management certification through a community college and to attend
    workshops on green cleaning technologies, ultimately securing financial independence for a comfortable retirement while continuing to engage in community work.
