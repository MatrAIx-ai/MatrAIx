persona_description: A historian who specializes in the study of the American West, particularly the role of African American soldiers in the American frontier during the late 19th century. Their research
  interests include the history of the Buffalo Soldiers, their training and deployment, and the impact of their service on the American West. They are also interested in the interactions between the Buffalo
  Soldiers and American Indians and outlaws, and the role of discipline and bravery in their service.
