personas:
  professional: Joel Mcclean, a retired mechanical and automotive technician who now serves as the senior‑center’s go‑to project organizer, applies their methodical repair mindset and budget‑keeping precision
    to coordinate woodworking workshops, garden initiatives, and community volunteer efforts with calm, predictable efficiency.
  sports: Joel Mcclean routinely watches the Amarillo Sod Poodles minor‑league baseball games and supports the Texas Rangers, participates in the senior‑center’s weekly walking club, and enjoys occasional
    shuffleboard matches with bridge teammates, all while preferring low‑impact activities that fit their structured routine.
  arts: Joel Mcclean enjoys reading historical nonfiction about Texas ranching, attends community theater productions at the Amarillo Little Theatre, listens to classic country legends like Willie Nelson
    and Roy Rogers, and finds quiet pleasure in arranging bridge cards as a form of strategic artistic expression.
  travel: Joel Mcclean prefers carefully planned road trips, having driven to the historic Pioneer Plaza in Dallas and the art‑laden Santa Fe Plaza, they dream of a quiet fishing weekend at Lake Powell
    and a cultural immersion in Bandera’s cowboy festivals, but health considerations keep most journeys within a few hours of home.
  culinary: Joel Mcclean favors hearty Texas comfort foods such as chili con carne, smoked pork ribs, and fresh garden‑to‑table salads featuring tomatoes, zucchinis, and bell peppers, they skillfully bake
    cornbread and rehearse making tamales for holiday gatherings, yet occasionally neglect to label leftovers, leading to mysterious fridge discoveries.
  core: Joel Mcclean is a disciplined, hands‑on elder who blends meticulous order with gentle creativity, juggling gardening, woodworking, and community service while occasionally misplacing their glasses
    and forgetting to water a few plants.
background:
  cultural: Joel comes from a multi‑generational Anglo‑American family rooted in the Texas Panhandle. His upbringing reflected the traditional values of self‑reliance, neighborly assistance, and modest
    conservatism common in rural Texas. A lifelong member of a Protestant congregation, he integrates faith‑based service into his daily routine. The regional culture of cattle ranching, oil industry influence,
    and close‑knit small‑town communities has shaped his practical outlook, respect for routine, and commitment to community harmony.
