  hobbies: '[''Hiking'', ''Nature photography'', ''Watercolor painting'', ''Reading architecture and design books'', ''Small-group book club'', ''Attending local art exhibitions'', ''Volunteering at community
    DIY workshops'']'
  career_goals: Doris aims to transition from being a skilled tradesperson to a certified contractor and eventually open her own boutique finishing company that blends functional construction with artistic
    design elements. Over the next five years she plans to earn her Montana contractor's license, complete a certification in sustainable building practices, and develop a client base for custom acoustic
    and decorative ceiling solutions. She also hopes to mentor apprentices, especially women entering the trade, and to contribute to community projects that incorporate public art into functional spaces.
