personas:
  professional: Doris Garcia, a 38‑year‑old drywall specialist with fifteen years of hands‑on experience, blends meticulous code‑compliant installations with a painter’s eye for texture, leverages their
    knack for reading construction drawings to create custom acoustic and ornamental ceiling solutions, and is steadily working toward a Montana contractor’s license and sustainable‑building certification
    while mentoring aspiring women tradespeople.
  sports: Doris Garcia, an avid hiker who tackles the open landscapes of southeastern Montana on weekends, is a member of the Missoula Trail Club, follows the Montana Grizzlies football team and the Seattle
    Seahawks for their resilient play, occasionally joins a local women’s soccer league for friendly matches, and balances outdoor endurance with weekly yoga sessions to maintain flexibility.
  arts: Doris Garcia, a solitary watercolorist and nature photographer, draws inspiration from Ansel Adams and Georgia O'Keeffe, attends intimate gallery openings at the Missoula Art Museum, participates
    in a monthly book club that discusses modern architects like Frank Lloyd Wright, and curates a personal sketchbook filled with studies of light and texture that inform their finishing work.
  travel: Doris Garcia prefers low‑key road trips that let them explore national treasures such as Glacier National Park in early summer and the geothermal pools of Yellowstone in autumn, dreams of photographing
    Iceland’s waterfalls in off‑season solitude, and plans each journey with a spreadsheet to maximize scenic drives while keeping costs within their modest travel budget.
  culinary: Doris Garcia, a home‑cooking enthusiast, loves preparing wild‑huckleberry quinoa salads, pan‑seared trout with lemon‑dill butter, and mastering the perfect sip of pour‑over coffee, while occasionally
    treating themselves to farm‑to‑table dinners at The Kitchen in Missoula, and they always keep a stash of fresh rosemary and smoked paprika for spontaneous seasoning experiments.
  core: Doris Garcia, a detail‑obsessed drywall veteran with a painter’s soul, balances solitary artistry, sustainable building ambitions, and disciplined budgeting while quietly mentoring the next generation
    of women in construction.
background:
  cultural: Born and raised in Ashland, Montana, a small town nestled in Rosebud County, Doris grew up within a tight‑knit, predominantly white, rural community where self‑reliance, hard work, and neighborly
    cooperation are core values. Her family’s roots trace back to Midwestern farming families, while her surname reflects a Hispanic lineage that has subtly influenced her appreciation for diverse cultural
    expressions, particularly in music and visual arts. The wide open plains and the region’s Native American artistic heritage have fostered her love for natural beauty and nuanced design, informing both
    her personal interests and the aesthetic touches she brings to her construction work. Doris’s cultural identity balances the straightforward, pragmatic ethos of the American West with an openness to
    the broader artistic world she encounters through books, galleries, and community events.
