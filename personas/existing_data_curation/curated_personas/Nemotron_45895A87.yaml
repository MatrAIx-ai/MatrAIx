  career_goals: Damien often dreams of becoming an astronaut or a civil engineer because he loves building things and exploring how the world works. He imagines designing rockets or constructing bridges
    that follow exact plans. He also expresses interest in being a teacher, hoping to share his love for order and learning with other children. Even at five, his goal‑driven mindset shows in his practice
    of writing his name neatly and completing puzzles without assistance, indicating early ambition toward careers that reward precision, responsibility, and the ability to help others.
