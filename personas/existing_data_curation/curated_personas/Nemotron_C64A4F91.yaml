  career_goals: Even in retirement, Blake aims to leave a lasting cultural imprint on his community. He plans to compile his oral histories into a published memoir that celebrates Villa Park’s mid‑century
    evolution. He hopes to become a volunteer docent at the local art museum, guiding visitors with his enthusiastic, unconventional perspectives. Blake also aspires to organize an intergenerational art
    walk that pairs seniors with youth artists, fostering creativity and social bonds. Maintaining his health and mental sharpness is a personal priority, so he intends to keep learning new artistic techniques—especially
    watercolor painting—and to stay actively engaged in senior‑center activities. Ultimately, his ambition is to ensure that his curiosity and love for varied experiences continue to inspire others.
