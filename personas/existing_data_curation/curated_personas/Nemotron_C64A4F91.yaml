personas:
  professional: Blake Pearce, a retired community historian turned volunteer docent at the Art Institute of Chicago, channels their deep knowledge of visual arts, genealogy, and improvisational facilitation
    into lively museum tours, while their spontaneous nature sometimes leads to missed planning deadlines and they occasionally forget to file appointment slips.
  sports: Blake Pearce embraces low‑impact fitness through weekly tai chi at the senior center, brisk walks with the Villa Park Senior Walking Club, and cheering for the Chicago Cubs at Wrigley Field, while
    they also dabble in occasional bridge tournaments that double as mental sport.
  arts: Blake Pearce, an avid watercolorist, finds inspiration in the bold brushstrokes of Georgia O’Keeffe and the immersive installations at the Art Institute of Chicago, sings jazz standards by Ella
    Fitzgerald with the Villa Park Community Choir, attends productions at the Lookingglass Theatre Company, and they strum a ukulele to the folk melodies of Harry Chapin whenever a creative spark strikes.
  travel: Blake Pearce favors spontaneous weekend road trips, having explored the historic streets of Milwaukee, the scenic cliffs of Starved Rock State Park, and the sandy shores of Indiana Dunes, while
    nurturing a longtime dream of visiting Hawaii to walk the beaches that inspired their late wife’s recipes, and they often carry a stack of vintage postcards for spontaneous trades.
  culinary: Blake Pearce delights in preparing family recipes such as kalua pork, lomi salmon, and haupia inspired by their wife’s Hawaiian heritage, complements these dishes with classic Chicago deep‑dish
    pizza and rose‑petal infused salads, and they occasionally forget to refrigerate leftovers, leading to a few culinary mishaps.
  core: Blake Pearce is a fiercely curious, socially vibrant 87‑year‑old who weaves art, history, and community storytelling into every aspect of life, while they battle a persistent worry‑driven need for
    control that fuels both their relentless creativity and occasional disorganization.
background:
  cultural: Blake was raised in a middle‑class white family in the Chicago suburbs during the post‑World War II boom. The values of hard work, community involvement, and modest ambition typical of Midwestern
    culture shaped his outlook. Growing up in Villa Park exposed him to a gradually diversifying population, sparking his lifelong curiosity about art, different traditions, and unconventional ideas. His
    middle name, "Kekoa," was given by his late wife, who had Hawaiian ancestry, reflecting his personal affection for Hawaiian culture—a connection he honors through occasional ukulele playing and a small
    collection of Hawaiian artifacts. Blake identifies with his Christian upbringing, attending a local church for decades, while also embracing secular cultural pursuits such as museum visits, theater,
    and music.
