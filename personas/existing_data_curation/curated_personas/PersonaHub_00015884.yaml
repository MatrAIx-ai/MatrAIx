persona_description: A military historian who specializes in the history of Fort Brady, including its construction, move to Ashmun Hill, and subsequent use as a military reservation and training facility
  during the 19th and 20th centuries. His research interests include the military history of the United States, the history of military forts and military reservations, and the role of military forts in
  shaping the nation's history. He is particularly interested in the role of military forts in the development of the United States, including their use as training facilities, military installations, and
  as a symbol of national power.
