    User 1: That''s so nice of you! I would love that.

    User 2: Sure! Here''s my favorite recipe for chocolate chip cookies.

    User 1: Oh, my gosh! I love chocolate chip cookies!

    User 2: I know, right? They''re the best!

    User 1: Thanks so much for sharing your recipe! I can''t wait to try it.

    User 2: You''re welcome! I hope you like it.

    User 1: I''m sure I will! I love chocolate chip cookies.

    User 2: Good! I''m glad to hear it.

    User 1: So, what''s your favorite thing to do in New York City?

    User 2: I love to go to the theater. There are so many great shows to see.

    User 1: Me too! I love Broadway shows.

    User 2: Me too! I love to go to the theater with my friends.

    User 1: That sounds like so much fun! I''m glad to hear you have such a great time in New York City.

    User 2: Thanks! I love it here.'
