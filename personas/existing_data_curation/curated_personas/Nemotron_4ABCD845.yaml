personas:
  professional: Tony Curley, a 38‑year‑old aspiring home‑based handyman, merges their practical curiosity and steady temperament to deliver reliable repairs, while leveraging their budgeting savvy and conflict‑mediation
    experience to build trust within the Lyndon community.
  sports: Tony Curley, an avid fisherman and weekend hiker who follows the Kansas City Royals and Kansas City Chiefs, participates in the local senior softball league, and stays fit through trail runs on
    Osage County paths and occasional push‑ups while gardening.
  arts: Tony Curley, a woodworking enthusiast rooted in prairie folk traditions, enjoys listening to Bob Dylan, Count Basie’s Kansas City jazz, and solving online chess puzzles with friends, while regularly
    attending the regional history museum’s pioneer craft exhibits.
  travel: Tony Curley, a modest‑budget road‑tripper, prefers weekend drives to historic Midwestern sites such as Fort Leavenworth and Santa Fe, and dreams of a springtime fishing expedition to the Boundary
    Waters in Minnesota.
  culinary: Tony Curley, a garden‑to‑table cook, often prepares fresh corn succotash, Kansas‑style barbecue ribs with a smoked paprika‑brown sugar rub, and hearty vegetable stew using home‑grown tomatoes,
    sweet corn, and carrots, while occasionally indulging in a slice of homemade apple pie.
  core: Tony Curley, a steady‑handed handyman‑hopeful with a green thumb, a love for Kansas history, and a quiet compassion that fuels both their work and weekend hobbies, consistently balances curiosity
    with practicality, though they sometimes neglect their own rest.
background:
  cultural: Tony grew up in a multigenerational white, Midwestern family rooted in small‑town Kansas. His upbringing emphasized self‑reliance, modesty, and a strong sense of community responsibility. Traditional
    values such as helping neighbors, attending church socials, and participating in local fairs shaped his worldview. While he appreciates modern ideas, he remains grounded in the practical, down‑to‑earth
    lifestyle characteristic of Osage County.
attributes:
  skills: '[''DIY home repairs'', ''automotive maintenance'', ''gardening'', ''basic computer troubleshooting'', ''conflict mediation'', ''first aid'', ''budgeting'', ''community organizing'']'
  hobbies: '[''fishing'', ''hiking'', ''vegetable gardening'', ''Kansas historical reading'', ''woodworking'', ''online chess'', ''volunteering at food pantry'']'
  career_goals: Tony aims to translate his practical skills and community‑service experience into a modest home‑based handyman business, offering affordable repairs and maintenance to his neighbors in Lyndon.
    He also plans to complete his GED and enroll in a vocational carpentry program to broaden his service offerings. Long‑term, he hopes to become a trusted liaison for local senior‑citizen assistance programs,
    coordinating volunteers and resources to foster a supportive environment for older residents.
