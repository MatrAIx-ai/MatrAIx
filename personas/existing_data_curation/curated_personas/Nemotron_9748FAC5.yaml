    ''Leadership and team coordination'']'
  hobbies: '[''Cooking traditional Puerto Rican cuisine'', ''Gardening herbs and vegetables'', ''Yoga and mindfulness practice'', ''Walking on Chester County trails'', ''Reading historical and biographical
    books'', ''Participating in a local book club'', ''Volunteering at Puerto Rican cultural festivals'']'
  career_goals: Karina aims to secure a leadership role such as Medical Director within her community health practice, where she can formalize routine protocols and improve patient outcomes. She aspires
    to launch a culturally focused outreach program that provides free preventive screenings and health education to the growing Puerto Rican community in Chester County. Long‑term, she hopes to open a
    family‑medicine clinic that blends evidence‑based care with culturally responsive services, allowing her to mentor future physicians while preserving a predictable, well‑structured work environment.
    She also intends to complete a further fellowship in geriatrics to broaden her expertise, but she remains mindful of balancing professional ambition with her own mental‑health needs.
