persona_description: A public defender or ombudsman who is responsible for protecting citizens' rights and freedoms in the Slovak Republic. Their role involves drawing attention to violations and proposing
  recommendations to remedy shortcomings in the actions, decision-making, or inactivity of public administration bodies. They do not have the power to change decisions but use soft power and arguments to
  persuade authorities to accept the recommendations. The person has been elected as Public Defender of Rights by the parliament of the Slovak Republic and assumed their position by taking the oath in the
  hands of the Speaker of the National Council of the Slovak Republic.
