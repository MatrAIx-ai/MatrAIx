personas:
  professional: Robin Brunner, an aspiring young scientist‑in‑training who blends a love of reading science books with hands‑on LEGO engineering and creative‑mode Minecraft building, showcases early problem‑solving
    skills and a practical curiosity that hints at a future in engineering or environmental science.
  sports: Robin Brunner, an enthusiastic member of the local Junior Rangers soccer club in the fall, loves swimming at the community pool during summer, eagerly follows the national women's soccer team
    on TV, and also enjoys ice skating in winter, balancing team play with solo physical activities.
  arts: Robin Brunner, a dedicated piano student who practices Mozart’s sonata arrangements alongside original improvisations, frequently sketches animals and landscapes inspired by wildlife artist John
    James Audubon, and enjoys watching Studio Ghibli films like “My Neighbor Totoro” for artistic inspiration, blending classic and contemporary influences in their creative life.
  travel: Robin Brunner, who loves exploring nearby nature trails and has visited the state park’s waterfall with their family, dreams of camping in Yellowstone National Park and hopes to see the coral
    reefs of the Great Barrier Reef one day, preferring family‑guided trips that combine adventure with hands‑on learning.
  culinary: Robin Brunner, who favors cheesy pizza slices and homemade banana pancakes for breakfast, enjoys assembling carrot sticks with hummus as a snack, occasionally indulges in sugary cereal after
    school, and likes helping their parents bake chocolate chip cookies, showcasing a simple but varied palate.
  core: Robin Brunner, a curious yet laid‑back nine‑year‑old who juggles LEGO builds, nature journals, and piano practice, often forgets to tidy up but always finds wonder in small discoveries.
background:
  cultural: Robin grows up in a middle‑class White family in Livonia, Michigan, a suburban community in the American Midwest. Her household celebrates typical American holidays such as Thanksgiving and
    the Fourth of July, participates in local library and community programs, and values modesty, self‑reliance, and community involvement. The region’s emphasis on education, outdoor recreation, and practical
    skills shapes her interests in science, nature, and hands‑on activities.
