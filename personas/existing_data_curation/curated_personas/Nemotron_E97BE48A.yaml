  hobbies: '[''Gardening'', ''Bridge (card game)'', ''Volunteer STEM tutoring'', ''Reading African American history'', ''Church and community events'', ''Cooking (soul food)'', ''Model building (trains,
    electronics)'', ''Mindfulness/meditation'', ''Walking/dog walking'']'
  career_goals: Trevor’s primary ambition in retirement is to translate his technical expertise into lasting impact for the next generation, especially black youth interested in STEM. He plans to volunteer
    as a mentor for local high‑school robotics clubs, serve on the advisory board of the community college’s engineering program, and develop a series of “STEM history” talks that link scientific progress
    with African‑American contributions. He also hopes to author a memoir that chronicles his journey from the segregated neighborhoods of mid‑century Hartford to a senior engineering role, offering insights
    on perseverance and the importance of representation. By staying organized and setting incremental goals, Trevor aims to keep his mind sharp while reducing the stress that sometimes accompanies his
    natural tendency to worry. He envisions his later years as a period of purposeful service, community leadership, and personal growth.
