personas:
  professional: Trevor Carter, a retired senior systems and electrical engineer who spent three decades designing complex aerospace and defense electronics, applies their methodical, reliable mindset and
    curiosity for emerging technologies to mentor high‑school robotics teams, lead community STEM workshops, and meticulously document their memoir project.
  sports: Trevor Carter stays active through daily walks with their dog as a member of the Avon Senior Walking Club, follows the New England Patriots in the fall, cheers the Boston Celtics during basketball
    season, and enjoys occasional outings to watch the Hartford Yard Goats minor‑league baseball team.
  arts: Trevor Carter regularly attends local jazz concerts featuring the Wynton Marsalis Ensemble, savors the timeless recordings of John Coltrane and Miles Davis at home, and supports the Avon Community
    Theatre’s productions of classic American dramas, finding both music and drama essential to their soulful leisure.
  travel: Trevor Carter favors carefully planned road trips to historic U.S. sites like Washington, D.C. and New Orleans for its jazz heritage, occasionally saving for a once‑in‑a‑lifetime voyage to Kyoto,
    Japan, while balancing a modest retirement budget and the desire to travel with family.
  culinary: Trevor Carter enjoys cooking hearty soul‑food classics such as gumbo with okra, collard greens seasoned with smoked paprika, and sweet‑potato pie, while also experimenting with contemporary
    dishes like seared scallops with pomegranate reduction, displaying a confident home‑chef skill set that blends tradition and curiosity.
  core: Trevor Carter combines a lifelong curiosity for technology with a disciplined, methodical routine, yet their tendency to over‑plan and worry often leads them to double‑check garden rows, budget
    spreadsheets, and code snippets late into the night.
background:
  cultural: Trevor was born in 1947 in Hartford, Connecticut, into a close‑knit African‑American family. His father worked as a machinist at a local manufacturing plant, and his mother was a schoolteacher
    who emphasized academic achievement and community responsibility. Growing up during the civil‑rights era, he witnessed both the challenges of segregation and the power of collective action, experiences
    that shaped his determination to succeed in fields where black representation was scarce. He earned his bachelor’s degree in electrical engineering from the University of Connecticut and later completed
    a master’s in systems engineering at a historically Black university, where he forged lifelong friendships with other pioneering scholars. Throughout his life, Trevor has remained active in the black
    church, the local NAACP chapter, and cultural events celebrating African‑American heritage. He takes pride in passing on his cultural legacy to his grandchildren, often sharing stories of the movement’s
    leaders and the importance of perseverance in both personal and professional realms.
