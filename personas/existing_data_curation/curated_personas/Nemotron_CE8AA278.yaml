  hobbies: '[''Model Aircraft Building'', ''Birdwatching with Field Notes'', ''Solitary Hiking'', ''Puzzle Solving (Sudoku, Crosswords)'', ''Reading Technical Nonfiction and Classic Literature'', ''Journal
    Writing'', ''Macro Photography'', ''Routine Cooking of Comfort Foods'', ''Small Local Writers’ Circle'']'
  career_goals: Brian aims to become a senior technical author within a leading aerospace or defense contractor, where he can lead the development of high‑impact manuals and training materials. He aspires
    to author a bestselling nonfiction book that demystifies emerging technologies for a broad readership, establishing himself as a trusted science communicator. To support his competitive drive, he plans
    to win regional writing contests and secure a regular column in a respected science magazine. Ultimately, he seeks a stable, routine‑oriented career path that offers predictable deadlines, opportunities
    for mentorship, and the ability to influence industry standards through precise, practical writing.
