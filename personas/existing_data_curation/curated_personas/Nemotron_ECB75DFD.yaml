  career_goals: Although retired, Kellie aims to stay engaged as a lifelong learner and community mentor. She hopes to volunteer as a literacy tutor for seniors and adults, lead a small garden club that
    blends sustainable gardening with intergenerational learning, and compile her family's genealogy into a memoir. She also wishes to explore new technologies that can help her share knowledge with a broader
    audience while maintaining flexibility in her schedule.
