  career_goals: Tracy aims to become a partner at her firm by leading a specialized practice that focuses on art law, cultural heritage, and intellectual‑property issues. She envisions establishing a boutique
    advisory service for artists and creative enterprises, publishing scholarly articles on the intersection of law and the visual arts, and teaching as an adjunct professor in a law school humanities program.
    Additionally, she is committed to fostering a supportive workplace culture that prioritizes mental‑wellness, and she hopes to mentor emerging female attorneys to help them navigate high‑stress legal
    environments.
