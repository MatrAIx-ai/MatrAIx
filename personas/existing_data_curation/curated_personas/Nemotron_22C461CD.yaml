  career_goals: Looking ahead, Jo Ann hopes to transition into a supervisory role—such as shift supervisor or front‑of‑house manager—where she can leverage her experience to mentor younger employees and
    streamline service flow. She aims to secure a schedule that offers more flexibility to manage health concerns and family commitments, reducing the stress of unpredictable shifts. In the longer term,
    she dreams of opening a modest neighborhood café or a home‑based bakery that showcases the seasonal produce she loves to grow, allowing her to blend her curiosity for new recipes with a practical, community‑focused
    business model.
