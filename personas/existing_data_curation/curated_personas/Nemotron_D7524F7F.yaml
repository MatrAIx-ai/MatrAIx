  hobbies: '[''Hosting dinner parties'', ''Book club leadership'', ''Improv comedy'', ''Hiking'', ''Yoga'', ''Photography'', ''Food bank volunteering'', ''Mentoring youth'']'
  career_goals: Dlorah aims to progress from store manager to district manager within the next five years, using an MBA to deepen her strategic and financial acumen. She aspires to develop a reputation
    as a champion of inclusive workplace culture, mentoring junior staff and championing diversity initiatives. Long‑term, she envisions opening her own boutique that merges her love of design, community
    engagement, and sustainable sourcing, while also serving as a hub for local artists and volunteers.
