persona_description: A political analyst who specializes in the selection of materials for mobile phone components. They have extensive knowledge of the factors that influence the choice of material for
  each part of a mobile phone, including weight, cost, political considerations, and manufacturer preferences. They are also aware of the importance of insulating the inner components of the phone from
  electrical damage and the need for a casing that is not brittle. They are well-versed in the use of plastic and silicone rubber in making the casing and keypad, as well as the use of paper, polyester
  foam, rubber, and coltan in making the microphone and speaker. They have a keen interest in political issues that affect the selection of materials for mobile phone components, particularly in the Democratic
  Republic of Congo, where coltan is mined.
