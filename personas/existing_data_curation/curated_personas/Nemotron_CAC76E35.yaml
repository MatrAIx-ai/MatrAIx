personas:
  professional: Deborah Sopp, an aspiring young coder who creates simple games and animations in Scratch, blends their curiosity for new ideas with a practical, methodical approach, and they turn every
    project into a collaborative adventure with friends while meticulously documenting each step to ensure reliability.
  sports: Deborah Sopp, a spirited member of the Walla Walla Youth Soccer Club, eagerly follows the Washington State Cougars football team and the Seattle Seahawks, spends weekends hiking the Columbia River
    Gorge to stay fit, and they organize neighborhood pickup games where their organized nature ensures everyone gets a turn.
  arts: Deborah Sopp, a budding comic‑strip artist, draws inspiration from the whimsical worlds of J.K. Rowling and the vibrant panels of Bill Watterson, while they also enjoy listening to Taylor Swift’s
    storytelling songs and rehearse short skits with friends after school.
  travel: Deborah Sopp, an adventurous planner, loves weekend trips to the Columbia River Gorge’s waterfalls, dreams of exploring the Oregon Coast’s tide pools, and hopes to someday camp in Yellowstone
    National Park, and they always map routes in a notebook while packing snacks meticulously.
  culinary: Deborah Sopp, a proficient junior baker, delights in making chocolate‑chip cookies with oats and raisins for school fundraisers, enjoys preparing fresh salmon tacos with avocado and lime for
    family dinners, and they often experiment with adding a pinch of cinnamon to their macaroni‑and‑cheese for a sweet twist.
  core: Deborah Sopp is an inquisitive, organized, and socially vibrant 11‑year‑old who balances wilderness hikes and creative coding with a knack for planning, yet they constantly fret over details and
    occasionally over‑commit to activities.
background:
  cultural: Deborah is a white American growing up in Walla Walla, Washington, a small agricultural community in the Pacific Northwest. Her family has deep roots in the region, with generations of involvement
    in farming and local community events such as the annual Walla Walla Fair. The town’s close‑knit atmosphere, emphasis on self‑reliance, and appreciation for the outdoors influence her daily life. She
    participates in typical American traditions—celebrating holidays like Thanksgiving and Fourth of July with family gatherings—and also attends a multicultural community center where she learns about
    the local Native American heritage. The school's emphasis on civic engagement and environmental stewardship further shapes her sense of responsibility and practicality.
