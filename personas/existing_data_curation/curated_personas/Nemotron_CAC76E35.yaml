  career_goals: Deborah aspires to become a science teacher or a veterinarian, combining her love of learning, her curiosity about the natural world, and her desire to help others. She wants to continue
    developing leadership skills by taking on roles such as class monitor or club officer, and eventually study biology or environmental science at university. She also hopes to use her organizational talents
    to coordinate community projects that improve local parks and support animal shelters. In the long term, she envisions a career that allows her to balance practical problem‑solving with caring for people
    and animals.
