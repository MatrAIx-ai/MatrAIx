persona_description: A person who is interested in the impact of the environment on mental health and seeks to understand how coastal environments can contribute to improving health and wellbeing. They
  are likely to be a researcher, a psychologist, or a health professional who is interested in studying the relationship between mental health and the environment. They are also likely to be familiar with
  the Health Survey for England and its data, as well as the Health and Place journal. They may have a background in geography or environmental science and may be interested in the policy implications of
  their findings.
