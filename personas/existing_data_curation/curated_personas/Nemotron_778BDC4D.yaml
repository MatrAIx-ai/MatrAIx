  career_goals: He aims to transition into a leadership role within his hospital, such as charge nurse or nurse manager, where he can institutionalize data-driven protocols and foster a resilient, predictable
    work environment. Over the next five years, James plans to earn a Master’s in Nursing Administration, achieve certification in Nursing Quality and Safety (CNS, CPHQ), and lead a rural health quality-improvement
    project focused on chronic disease management. He also aspires to mentor emerging nurses, advocate for telehealth expansion in Appalachian communities, and develop stress-reduction programs for staff
    to mitigate the high-pressure environment he finds challenging.
