persona_description: A visionary engineer with expertise in the fields of surface mount technology, 3-D assembly, and the integration of solder-free and 3-D manufacturing processes. He/she is optimistic
  about the potential benefits of these technologies in transforming the electronic industry and bridging the performance and density gaps required to extend Moore's Law. The engineer is interested in the
  practical implications of these technologies for various industries, including industrial control applications and assembly lines, and is willing to make tradeoffs to ensure that the implementation of
  smart machines is feasible.
