personas:
  professional: Walter Jordan is a bilingual secondary school teacher who leverages their organized, methodical approach to craft TEKS‑aligned English and Spanish lessons, integrates Google Classroom and
    interactive whiteboards, leads a community soccer team, and orchestrates cultural events, all while assertively championing culturally responsive pedagogy and mentoring newer colleagues.
  sports: Walter Jordan plays forward for the Fort Worth Community Soccer League, cheers on the Dallas Cowboys and Texas Rangers, participates in the local hiking group that explores the Texas Hill Country
    every spring, and maintains fitness through weekly morning runs that double as a mental warm‑up for lesson planning.
  arts: Walter Jordan immerses themselves in Fort Worth’s live‑music scene, often catching performances by Los Lobos and regional folk singer‑songwriters, practices acoustic guitar after school while listening
    to Selena, and finds literary inspiration in contemporary Latin American authors like Valeria Luiselli and Junot Díaz.
  travel: Walter Jordan prefers meticulously planned weekend road trips to Hill Country vineyards, long‑term backpacking adventures across Mexico City and Oaxaca when school breaks allow, and has a bucket‑list
    destination of Seville, Spain, where they hope to combine a music festival with a cooking class.
  culinary: Walter Jordan’s cooking skill sits at an enthusiastic intermediate level, regularly preparing tamales, mole poblano with dried chilies and chocolate, and experimenting with chiles en nogada,
    while sourcing fresh epazote and masa from local farmers’ markets and pairing dishes with craft cerveza.
  core: Walter Jordan blends organized ambition with a love for community, juggling bilingual teaching, soccer coaching, and culinary experiments while occasionally over‑scheduling themselves and forgetting
    to pause for a quiet night in.
background:
  cultural: Walter identifies as Mexican‑American and was raised in a bilingual household where Spanish and English were spoken interchangeably. He celebrates Mexican holidays such as Día de los Muertos,
    Cinco de Mayo, and Mexico's Independence Day with family gatherings, traditional foods, music, and storytelling. His upbringing emphasized familismo, community involvement, and respect for elders, which
    shape his inclusive teaching style and commitment to culturally responsive education. Walter maintains close ties to the local Mexican community in Fort Worth, regularly attending events at the Mexican
    Cultural Center and collaborating with community leaders to support student families.
attributes:
  skills: '[''Classroom Management'', ''Bilingual Instruction (Spanish/English)'', ''Curriculum Development'', ''Lesson Planning'', ''Student Assessment'', ''Educational Technology Integration'', ''Extracurricular
