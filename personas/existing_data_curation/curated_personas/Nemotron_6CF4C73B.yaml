  hobbies: '[''Soccer'', ''Cooking Mexican Cuisine'', ''Live Music and Concerts'', ''Hiking'', ''Acoustic Guitar'', ''Volunteering Tutoring'', ''Reading Latin American Literature'', ''Cultural Festival
    Participation'']'
  career_goals: Walter aims to complete a bachelor's degree in Education within two years, followed by a master's in Curriculum and Instruction. He aspires to become a department lead for World Languages,
    develop a school-wide bilingual program, and eventually transition into an administrative role such as Assistant Principal or Curriculum Coordinator. Additionally, he wants to mentor new teachers, champion
    culturally responsive pedagogy, and contribute to district-wide professional development initiatives.
