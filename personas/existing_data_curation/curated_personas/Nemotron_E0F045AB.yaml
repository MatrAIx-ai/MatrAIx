  hobbies: '["Abstract painting", "Digital illustration", "Creative writing", "Coastal nature walks", "Marine photography", "Scuba diving", "Astronomy and stargazing", "Chess and crosswords", "Mexican-fusion
    cooking", "Meditative yoga"]'
  career_goals: Irma aims to advance her nursing career by becoming a Certified Nurse‑Practitioner with a focus on adult primary care while also pursuing a specialization in health informatics. She plans
    to obtain certifications in wound care and diabetes education and to lead a hospital-wide quality-improvement project that incorporates patient-centered, culturally responsive practices. In the longer
    term, she hopes to design and implement a community-based wellness program that blends evidence-based medical care with artistic and mindfulness activities, positioning herself as a bridge between clinical
    science and holistic health innovation.
