personas:
  professional: Irma Abanto, a registered nurse with a STEM background, leverages meticulous patient assessment and health informatics expertise to craft data‑driven care protocols, while their vivid imagination
    fuels art‑infused therapeutic interventions that set them apart in acute care settings.
  sports: Irma Abanto fuels their love of the ocean by diving with the Jensen Beach Dive Club and enjoys coastal dune hikes, while cheering on the Miami Dolphins during football season and participating
    in a weekend pickleball league at the local community center, balancing low‑key movement with occasional competitive bouts.
  arts: Irma Abanto channels their philosophical curiosity into abstract watercolor canvases inspired by Kandinsky, digital illustrations echoing James R. Eads, and speculative short stories that nod to
    Octavia Butler, often immersing themselves in midnight stargazing while listening to ambient composer Brian Eno.
  travel: Irma Abanto prefers meticulously planned solo getaways that blend marine exploration and celestial observation, having snorkeled the reefs of Bonaire, trekked the starlit Atacama Desert, and scheduled
    a future pilgrimage to the Aurora Borealis in Tromsø, while balancing modest travel budgets with a desire for immersive experiences.
  culinary: Irma Abanto, a confident home chef, experiments with Mexican‑fusion cuisine, crafting dishes like chipotle‑marinated salmon tacos with cacao‑lime crema and quinoa‑corn salsa, and delights in
    sourcing fresh avocados, heirloom tomatoes, and smoked paprika to impress their close‑knit family circle.
  core: Irma Abanto is a data‑driven nurse‑practitioner‑in‑training who retreats into solitary art and stargazing, balances disciplined budgeting with impulsive art‑supply splurges, and can be fiercely
    competitive yet often forgets to take breaks, leading to occasional caffeine‑fueled insomnia.
background:
  cultural: 'Irma was born to Mexican parents and grew up bilingual, retaining fluency in Spanish and a deep appreciation for Mexican traditions. She celebrates Día de los Muertos, Mexican Independence
    Day, and family gatherings centered around homemade tamales and mole. Her cultural identity informs her nursing practice: she provides culturally competent care to Hispanic patients, incorporates traditional
    health concepts such as herbal remedies when appropriate, and uses storytelling—a hallmark of Mexican oral tradition—to enhance patient education. Though she now lives in Jensen Beach, Florida, Irma
    stays connected to her roots through regular visits to Mexico, participation in a local Mexican cultural association, and sharing Mexican art and music with her community.'
attributes:
  skills: '["Patient assessment", "IV therapy", "Wound management", "Emergency response", "Health informatics", "Clinical data analysis", "Patient education", "Quality improvement initiatives", "Creative
