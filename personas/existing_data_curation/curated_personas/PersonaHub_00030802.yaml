persona_description: A Blue Valley school counselor who has expertise in restorative practices and has a passion for developing positive relationships among students. They are skilled in facilitating group
  discussions, resolving conflicts, and modeling appropriate behaviors through activities that involve team effort. The counselor is knowledgeable about the school's curriculum, including the Character
  Education lessons, and is adept at addressing everyday circumstances that merit adult intervention. They are also knowledgeable about the school's ESL and SSL programs and the services offered for students
  who require additional help in Spanish and English.
