personas:
  professional: Leilani Gonzalez is a versatile mechanical and systems engineer who merges CAD‑driven product design with an artistic aesthetic, they lead cross‑functional Agile and Lean teams, mentor junior
    engineers, and translate complex technical concepts into compelling narratives for non‑technical stakeholders, all while channeling a competitive drive toward national engineering competitions.
  sports: Leilani Gonzalez stays active through beach volleyball with the Coastal Spikers club, salsa dancing at the Midtown Latin Night weekly, and cheering for the San Diego Padres and LA Galaxy, they
    balance high‑energy group workouts with disciplined early‑morning runs and yoga to maintain flexibility, reflecting their sociable, energetic personality and competitive spirit.
  arts: Leilani Gonzalez enriches their creative side by urban sketching in city parks, attending exhibitions of street artists like Banksy and installation works by Olafur Eliasson at the downtown gallery,
    listening to guitar virtuoso Carlos Santana and avant‑garde pop icon Björk, and drawing inspiration from theatre productions such as Lin‑Manuel Miranda’s Hamilton for their design projects, showcasing
    their curiosity and appreciation for unconventional ideas.
  travel: Leilani Gonzalez prefers meticulously planned, design‑focused getaways, having explored the vibrant street art of Mexico City, the modernist architecture of Barcelona, and the serene temples of
    Kyoto, while dreaming of future trips to Reykjavik for the Northern Lights and the Patagonian fjords for hiking, they book flights through a points‑maximizing travel app yet leave room for spontaneous
    hackathon detours, reflecting their balance of organization and flexibility.
  culinary: Leilani Gonzalez delights in cooking Mexican classics like tacos al pastor with pineapple and a mole‑poblano ramen fusion, expertly handling ingredients such as chipotle, fresh cilantro, and
    miso paste, and frequently hosts dinner parties where friends sample these experimental dishes alongside curated wine pairings, though they sometimes over‑spice a sauce in pursuit of bold flavor, revealing
    a playful yet exacting culinary temperament.
  core: Leilani Gonzalez blends an engineer’s analytical precision with a vibrant artistic curiosity, channeling competitive vigor into both professional challenges and lively salsa nights, while occasionally
    battling impulse gadget purchases and a stubborn tendency to over‑schedule their calendar.
background:
  cultural: Leilani grew up in a Mexican‑American household in Texas, speaking both Spanish and English at home. Her family celebrates Día de los Muertos, Mexican Independence Day, and traditional Catholic
    holidays, infusing her life with rich cultural rituals, music, and cuisine. She maintains strong ties to her extended family in Mexico, often traveling to visit relatives and bringing back regional
    culinary techniques. Leilani’s Mexican heritage informs her artistic sensibility—she incorporates vibrant colors and folk motifs into her personal projects—and fuels her dedication to supporting other
    Latinx professionals in engineering through mentorship and community networking.
