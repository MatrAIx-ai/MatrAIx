  career_goals: Leilani aims to become a senior engineering manager within the next five years, leading innovative product development teams that integrate sustainability and artistic design. She plans
    to pursue a master's degree in engineering management to sharpen her strategic decision‑making. Long‑term, she envisions founding a boutique consultancy that helps startups bring technically sound,
    aesthetically distinctive products to market while mentoring underrepresented students in STEM. She also aspires to represent her company in national engineering competitions, leveraging her competitive
    drive to showcase cutting‑edge solutions.
