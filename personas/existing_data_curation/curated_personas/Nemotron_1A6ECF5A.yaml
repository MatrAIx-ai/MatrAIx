  career_goals: Although approaching retirement, Matthew aims to transition into a supervisory or consulting role where he can mentor younger janitorial staff and champion greener cleaning methods. He plans
    to earn a Certified Facility Manager (CFM) credential and help his employer adopt sustainable, cost‑effective cleaning solutions. In the longer term he hopes to start a small boutique cleaning service
    that serves local businesses, churches, and community centers, allowing him to stay active, financially secure, and socially connected while maintaining a balanced, low‑stress schedule.
