personas:
  professional: Matthew Gates is a veteran facilities maintenance professional who leverages decades of hands‑on cleaning, floor‑care, and small‑scale repairs to mentor junior staff, champion eco‑friendly
    cleaning protocols, and guide his employer toward sustainable operations as he works toward a Certified Facility Manager credential.
  sports: Matthew Gates is a devoted follower of the LSU Tigers football team and the New Orleans Saints, attends the local high‑school football tailgate each Friday with a pot of jambalaya, and spends
    his spare time in a community fishing club that meets at the bayou for early‑morning catch‑and‑release outings.
  arts: Matthew Gates finds solace in classic rock legends like The Rolling Stones, Led Zeppelin, and Fleetwood Mac, often playing their vinyl records while cooking gumbo, and occasionally attends free
    community concerts by the Baton Rouge Symphony.
  travel: Matthew Gates prefers low‑key road trips, revisiting the historic river towns of Natchez and Vicksburg, planning a future pilgrimage to Gettysburg’s battlefields, and occasionally cruising the
    Gulf Coast’s honey‑colored sunsets on his modest boat, all while keeping travel costs within his modest retirement budget.
  culinary: Matthew Gates excels at homemade Cajun cuisine, especially simmered crawfish étouffée, blackened catfish, and a peppery roux for his gumbos, often using fresh herbs like thyme, oregano, and
    cayenne peppers harvested from his own garden, and delights friends with a signature side of buttery corn paillard.
  core: Matthew Gates blends a pragmatic, eco‑savvy work ethic with a lively social spirit, channeling his love of community, classic rock, and Cajun cooking into a purposeful retirement punctuated by careful
    budgeting, health vigilance, and a penchant for early‑morning fishing.
background:
  cultural: Matthew grew up in a working‑class, Anglo‑American family in central Louisiana, where Southern Baptist traditions, hospitality, and a strong sense of community were central to daily life. The
    culture of Holden and Livingston Parish blends rural values—such as a love for fishing, hunting, and strong family ties—with a rich culinary heritage that includes Cajun and Creole influences. His upbringing
    emphasized hard work, practical problem‑solving, and respect for both tradition and modest innovation, shaping a pragmatic yet curious outlook that continues to guide his personal and professional choices.
