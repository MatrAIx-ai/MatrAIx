personas:
  professional: Ileana Caballero is a senior construction engineer who leverages bilingual communication and rigorous safety standards to lead multi‑million‑dollar projects, while they mentor emerging Hispanic
    women and integrate LEED‑aligned sustainable practices into every build.
  sports: Ileana Caballero enjoys low‑impact fitness through weekly hikes with a small retirees’ group in the Wasatch foothills and stays loyal to the Utah Jazz, while they occasionally join a senior softball
    league for light competition.
  arts: Ileana Caballero finds creative renewal in pottery inspired by folk motifs, attends the annual Fiesta del Sol to enjoy traditional music, and they participate in a bilingual book club that discusses
    works by Isabel Allende and Sandra Cisneros.
  travel: Ileana Caballero prefers carefully planned trips that blend cultural immersion—such as an annual pilgrimage to their family’s hometown in Jalisco—with scenic road‑trips through Utah’s national
    parks, while they occasionally allow a spontaneous weekend getaway to Santa Fe for its art scene.
  culinary: Ileana Caballero delights in preparing authentic mole with dried chiles, cacao and spices, hand‑rolling tamales using masa and pork, and simmering pozole with hominy and pork shoulder, they
    often share the recipes and techniques with family and friends.
  core: Ileana Caballero blends meticulous engineering precision with a spontaneous love for xeriscape gardening and weekend cooking, acting as a linguistic bridge on construction sites while they quietly
    champion sustainable, culturally resonant senior housing.
background:
  cultural: 'Ileana was raised in a bicultural Mexican‑American household in Utah, speaking Spanish at home and English at school. Her parents immigrated from Jalisco, bringing a rich tapestry of customs—celebrations
    of Día de los Muertos, family‑style meals, and a strong emphasis on community support. As an adult, she continues to honor these traditions through seasonal cooking, participation in Salt Lake City’s
    annual Fiesta del Sol, and by mentoring younger Mexican‑American professionals in the construction sector. Her Catholic upbringing coexists with the predominantly LDS environment of Salt Lake County,
    fostering respect for diverse religious practices. This cultural duality informs her inclusive leadership style: she values harmony, seeks to amplify underrepresented voices on her job sites, and often
    serves as a linguistic bridge between English‑speaking project managers and Spanish‑speaking labor crews.'
attributes:
  skills: '[''Project management and budgeting'', ''Construction safety and OSHA compliance'', ''Blueprint reading and structural analysis'', ''Bilingual communication (English/Spanish)'', ''Team leadership
    and conflict resolution'', ''Sustainable building practices (LEED basics)'', ''BIM and AutoCAD proficiency'', ''Microsoft Project scheduling'', ''Advanced Excel financial modeling'', ''Procurement and
    vendor negotiations'', ''Quality control and inspections'', ''Knowledge of Utah building codes and regulations'', ''On‑site adaptive problem solving'']'
  hobbies: '[''Xeriscape gardening with native succulents'', ''Hiking in the Wasatch Mountains'', ''Traditional Mexican cooking'', ''Bilingual book club participation'', ''Volunteering for DIY home‑repair
    workshops for seniors'', ''Pottery and folk‑art ceramics'']'
  career_goals: Ileana aims to transition from day‑to‑day site management to a mentorship‑focused role over the next two years, leveraging her decades of experience to guide the next generation of Hispanic
    women in construction. She plans to earn her Project Management Professional (PMP) certification and become a LEED Accredited Professional before retiring, positioning herself as a consultant on sustainable
    projects. A key personal ambition is to spearhead a community‑driven affordable‑housing development for seniors in Salt Lake County, integrating culturally resonant design elements that reflect her
    Mexican heritage. Simultaneously, she seeks a healthier work‑life balance, reducing overtime by delegating routine scheduling tasks to emerging leaders she has trained, while continuing to act as an
    advisor on safety and quality for her firm’s flagship projects.
