personas:
  professional: Carolyn Clark, a seasoned cashier of fifteen years, leverages her meticulous cash‑handling expertise, skeptical eye for discrepancies, and competitive drive to seek a supervisory role, balancing
    her love for structured procedures with a flexible approach to team leadership.
  sports: Carolyn Clark enjoys walking the trails of Darby’s Park three times a week, is a loyal fan of the local minor‑league baseball team, the River City Bears, and roots for the state’s college basketball
    squad, the Wildcats, while occasionally joining a weekend recreational tennis league.
  arts: Carolyn Clark finds solace in classic R&B and soul, regularly spinning vinyl from Marvin Gaye, Aretha Franklin, and Al Green while cooking, participates in her church choir, and indulges her creative
    side in craft workshops that produce handmade jewelry inspired by vintage designs.
  travel: Carolyn Clark favors budget‑friendly road trips to historic Southern towns like Savannah and Charleston, dreams of hiking the Great Smoky Mountains, and plans weekend getaways that combine scenic
    drives with visits to local music festivals, always balancing travel costs with her savings goals.
  culinary: Carolyn Clark, an intermediate home cook, specializes in Southern comfort dishes such as fried chicken, collard greens, and sweet‑potato casserole, seasoning with buttermilk, hot sauce, and
    smoked paprika, while experimenting with new twists after listening to classic soul playlists.
  core: Carolyn Clark is a detail‑oriented, competitive retail veteran who channels her love for structure into budgeting battles, soulful music, and community choir, yet wrestles with stress‑induced health
    worries and a tendency to procrastinate on long‑term planning.
background:
  cultural: Carolyn was raised in Darby, Pennsylvania, within a close‑knit African‑American community that values family, faith, and resilience. Growing up, she attended a historically Black church where
    music, oral storytelling, and community service were central. The cultural rhythms of Philadelphia’s Black neighborhoods—through food, gospel, and the legacy of civil‑rights activism—shaped her worldview,
    fostering a strong sense of pride and a pragmatic approach to life’s challenges. Her background influences her preference for structure in work, her competitive spirit, and her dedication to supporting
    her community through volunteerism and cultural expression.
