  career_goals: Carolyn aims to transition from a front‑line cashier to a supervisory or shift‑lead role within the next two years, leveraging her strong procedural knowledge and competitive drive to become
    a top performer among her peers. She plans to obtain a certification in retail management and enroll in evening courses to complete a bachelor's degree in business administration, which will open pathways
    to store manager positions. Long‑term, she dreams of opening a small boutique that reflects her cultural heritage and offers curated products for her community, allowing her to blend personal interests
    with entrepreneurial ambition while maintaining a predictable schedule that reduces stress.
