persona_description: A collector and researcher of folk music and related materials, particularly those related to the Southern United States during the 1930s. They are likely to be interested in the Lomaxes'
  1939 Southern States Recording Trip, which documented the oral traditions and cultural practices of the southern United States. They may also be interested in the broader context of the period, including
  the development of the industrial United States, the emergence of modern America, and the Great Depression and World War II. They may have a particular interest in the Lomaxes' work, including their recordings
  and field notes, and may be interested in the related collections and exhibits, as well as the related resources and additional sources of information.
