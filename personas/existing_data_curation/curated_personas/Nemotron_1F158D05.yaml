  hobbies: '[''LEGO building'', ''Journaling'', ''Piano practice'', ''Competitive swimming'', ''Reading marine life books'', ''Visiting the aquarium'', ''Girl Scouts badge earning'', ''Sketching animals'',
    ''Scratch coding projects'']'
  career_goals: Virginia hopes to become a marine biologist, focusing on marine conservation and caring for sea creatures. She aims to deepen her science knowledge through school projects, science fairs,
    and summer marine biology camps. Her long‑term ambition includes working at an aquarium or research institute, where her organized, methodical nature can contribute to field studies. As a backup option,
    she is interested in becoming a teacher to share her love of structured learning with younger students.
