  career_goals: Charlon aims to combine his artistic talent and technical acumen by pursuing a career in interactive media design, such as video game development or UI/UX engineering. He envisions attending
    a specialized STEM high school, then earning a degree in Computer Science with a minor in Fine Arts. In the long term, he hopes to work on projects that merge environmental data visualization with engaging
    user experiences, leveraging his love for nature and technology. His competitive spirit also drives him to excel in coding competitions and potentially contribute to open‑source software communities.
