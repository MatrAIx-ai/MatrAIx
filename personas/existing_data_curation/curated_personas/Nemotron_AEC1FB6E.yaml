  hobbies: '[''Fishing'', ''Gardening'', ''Card games'', ''Watching sports'', ''Church community events'', ''DIY home improvement'', ''Reading documentaries'', ''Cooking seafood recipes'', ''Attending local
    festivals'']'
  career_goals: David aims to step into a supervisory role, such as shift manager or assistant store manager, where he can mentor newer cashiers while maintaining a flexible schedule that lets him continue
    his fishing and gardening hobbies. He plans to complete a short retail‑management certification offered by a local community college to strengthen his leadership skills. Long‑term, he hopes to secure
    enough savings to retire comfortably and perhaps open a small convenience shop near the harbor, leveraging his knowledge of local products and customer service experience. He also envisions occasional
    consulting for other small retailers on cash handling best practices, allowing him to stay engaged without a full‑time commitment.
