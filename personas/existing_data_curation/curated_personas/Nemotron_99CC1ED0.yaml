  hobbies: '[''Cooking Creole and Soul Food'', ''Church Choir Participation'', ''Food‑Bank Volunteering'', ''Yoga and Mindfulness'', ''Zumba Classes'', ''Backyard Gardening'', ''Quilting'', ''LSU Tigers
    Football Fandom'', ''Attending Mardi Gras Parades'', ''Community Festival Participation'']'
  career_goals: Michelle aims to advance to a supervisory role within the next two years, targeting a shift‑lead position where she can formalize safety protocols and mentor a larger team. She plans to
    earn a Certified Production Technician (CPT) credential and complete an associate degree in Industrial Technology to solidify her technical knowledge. Long‑term, she envisions moving into plant management,
    championing continuous‑improvement projects that boost productivity while maintaining a supportive work environment. Additionally, she hopes to leverage her experience to eventually start a community‑focused
    cooking workshop that teaches job‑ready skills to local youth.
