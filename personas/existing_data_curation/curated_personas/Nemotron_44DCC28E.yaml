personas:
  professional: Genesis Staudt, a 21‑year‑old manufacturing technologist, combines SolidWorks expertise, CNC milling fluency, and PLC programming with an artist’s eye for aesthetic design, and they channel
    their curiosity and organized flexibility into leading process‑improvement projects at a forward‑thinking firm.
  sports: Genesis Staudt, an avid hiker and cyclist who regularly rides with the Lima Trail Riders, follows the Cleveland Browns in the fall and the Guardians in summer, and they incorporate weekly group
    rides and weekend hikes into a balanced fitness routine that offsets the sedentary demands of the shop floor.
  arts: Genesis Staudt, a budding oil painter and photographer who captures industrial landscapes with a soft, Van Gogh‑inspired palette and frames them like Ansel Adams, strums the ukulele in a folk quartet
    that covers Bob Dylan and local songwriters at the downtown coffee house, and they regularly attend community theater productions starring regional talent.
  travel: Genesis Staudt, who balances meticulous spreadsheet planning with spontaneous day‑trips, has explored the art museums of Chicago, biked the Great River Trail to Wisconsin, and they dream of a
    summer road‑trip through the German Ruhr Valley to study industrial design and a future visit to Kyoto for its historic temples and serene gardens.
  culinary: Genesis Staudt, an enthusiastic home cook who perfects a buttery corn casserole and sizzles homemade chicken‑and‑dumpling bowls with a dash of smoked paprika, enjoys slicing fresh basil on a
    Margherita pizza and experimenting with craft coffee using beans from a local roastery, and they often pair meals with a playlist of folk tunes while sketching new painting ideas.
  core: Genesis Staudt, a curious 21‑year‑old technologist who seamlessly blends art and engineering, lives by a habit of meticulously labeling every tool in the maker space while humming folk songs during
    CNC runs, and they chase efficiency with a dash of creative flair.
background:
  cultural: Genesis grew up in Lima, Ohio, in a white, middle‑class Midwestern family that values hard work, community participation, and modesty. Her upbringing was shaped by the rhythms of small‑town
    life—attending local fairs, supporting high‑school sports, and participating in church and community service events. While her family encouraged academic achievement and practical skills, they also
    exposed her to the region's modest arts scene, including community theater and gallery openings. This blend of pragmatic Midwestern values and an appreciation for creative expression informs her balanced
    outlook on both professional and personal pursuits.
attributes:
  skills: '[''SolidWorks CAD'', ''AutoCAD drafting'', ''CNC machining (milling & turning)'', ''G-code programming'', ''PLC programming (Allen‑Bradley, Siemens)'', ''Ladder logic development'', ''Python
    for data analysis'', ''Technical documentation'', ''Preventive maintenance'', ''Team leadership'', ''Quality assurance coordination'']'
  hobbies: '[''Oil painting'', ''Photography (portrait & landscape)'', ''Playing ukulele'', ''Hiking local trails'', ''Cycling'', ''Community maker space projects (Arduino, 3D printing)'', ''Board game
    nights'', ''Volunteer STEM outreach for middle school students'']'
  career_goals: Genesis aims to complete her bachelor's degree in Mechanical Engineering Technology within the next two years while earning certifications such as the Certified Manufacturing Technologist
    (CMfgT). She aspires to lead process‑improvement projects that blend efficiency with aesthetic design, eventually moving into a senior manufacturing engineer role at a forward‑thinking company specializing
    in additive manufacturing or advanced automation. Long‑term, she hopes to mentor junior technicians and develop community STEM outreach programs that showcase how engineering can intersect with creative
    arts. Her curiosity and appreciation for unconventional ideas drive her ambition to pioneer solutions that are both functional and visually engaging.
