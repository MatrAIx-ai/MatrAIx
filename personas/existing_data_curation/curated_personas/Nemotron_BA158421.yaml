  hobbies: '[''Gardening (vegetables and native Arkansas plants)'', ''Birdwatching'', ''Reading (historical fiction and popular science)'', ''Genealogy research'', ''Quilting for charity'', ''Volunteering
    at community STEM workshops'', ''Cooking Southern comfort food'']'
  career_goals: Although retired from formal employment, Mamie aims to channel her expertise into community mentorship. She plans to lead a local STEM outreach program for middle‑school students, support
    her grandchildren’s education through tutoring, and author a series of easy‑to‑follow guides on home maintenance and gardening for seniors. She also hopes to complete a personal memoir that weaves together
    her love of science, family history, and Southern heritage.
