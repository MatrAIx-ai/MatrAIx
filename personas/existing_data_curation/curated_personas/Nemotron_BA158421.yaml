personas:
  professional: Mamie Abdallah, a retired high‑school mathematics teacher, leverages their curiosity and practical mindset to create hands‑on community STEM workshops, using their skill in translating complex
    concepts into everyday language and their organized yet flexible approach to keep volunteers and learners engaged.
  sports: Mamie Abdallah enjoys gentle morning walks along the river trail, participates weekly in the Greenbrier Senior Bowling League, and faithfully cheers for the Greenbrier High School Wildcats football
    team each autumn, balancing light cardio with occasional water‑aerobics classes at the community center.
  arts: Mamie Abdallah weaves quilts inspired by William Morris’s vibrant patterns while listening to Dolly Parton’s storytelling songs and reciting Maya Angelou’s poetry, and they regularly attend Sunday
    choir rehearsals where they admire the arrangements of the local gospel choir led by Pastor James Whitaker.
  travel: Mamie Abdallah prefers well‑planned, leisurely road trips to historic towns such as Savannah, Georgia, and Williamsburg, Virginia, while dreaming of a gentle cruise along the Mississippi River
    to explore river towns, balancing a modest travel budget with a love of scenic gardens and family visits.
  culinary: Mamie Abdallah delights in preparing Southern comfort dishes like collard greens simmered with smoked turkey hocks, creamy shrimp and grits, and peach cobbler spiked with a hint of bourbon,
    often incorporating garden‑fresh tomatoes, basil, and zucchini into inventive pastas, and they enjoy occasional meals at the local farm‑to‑table bistro where rosemary‑infused chicken is a favorite.
  core: Mamie Abdallah blends a lifelong love of STEM with garden wisdom, using spreadsheets to track plant growth while occasionally forgetting to water their orchids because they become engrossed in genealogy
    research.
background:
  cultural: Mamie comes from a white, Southern Appalachian background rooted in rural Arkansas values. Raised in the post‑World War II era, she experienced a strong emphasis on self‑reliance, church community,
    and intergenerational family ties. Her cultural identity blends traditional Southern hospitality, an appreciation for local history and folk crafts, and a progressive respect for education and scientific
    inquiry, shaping her balanced and adaptable worldview.
attributes:
  skills: '[''Mathematics instruction'', ''Basic science teaching'', ''Computer literacy (MS Office, spreadsheet analysis, introductory Python)'', ''DIY home repairs and plumbing'', ''Budgeting and financial
