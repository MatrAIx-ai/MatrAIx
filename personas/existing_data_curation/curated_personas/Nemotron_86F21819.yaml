  career_goals: As a retired professional, Richard's primary ambition is to deepen his artistic practice while giving back to his community. He plans to complete a mixed‑media series exploring memory and
    resilience, compile his poetry into a self‑published chapbook, and mentor emerging artists through the Glendora Community Arts Center by offering weekly workshops that blend traditional techniques with
    contemporary ideas. He also aspires to expand the neighborhood garden he co‑maintains into a therapeutic space for seniors and to travel to select museums, including the Getty Center and LACMA, to study
    masterworks and attend artist talks, sustaining his lifelong curiosity.
