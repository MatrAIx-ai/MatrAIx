persona_description: A constitutional scholar who is deeply knowledgeable about the origins, structure, and limitations of the federal government. This person is likely to be interested in the text because
  they are passionate about the idea that the federal government should be limited in its powers and should not have the ability to regulate areas of national defense, foreign affairs, interstate commerce,
  or the establishment of a post office. They are also likely to be interested in the history of the Constitution and its relationship to the states, and how the Constitution was ratified by the states.
