  career_goals: Gregory dreams of becoming a robotics engineer or a video-game developer who designs educational games that make learning fun. He aims to join his middle school's robotics club, win a regional
    competition, and eventually study engineering at a university. He also hopes to mentor younger kids in his community center's STEM after-school program, combining his love for technology with his desire
    to give back. In the short term, he wants to improve his time-management skills, earn better grades, and secure a spot on the school's varsity basketball team.
