personas:
  professional: Gregory Awuah is an aspiring game developer and junior robotics enthusiast who blends curiosity with practicality, building elaborate Minecraft worlds, scripting simple mods, and assembling
    LEGO Mindstorms creations with motors and sensors; they work in a relaxed, flexible manner that can become disorganized but are assertive when troubleshooting challenging code.
  sports: Gregory Awuah spends afternoons shooting hoops at the neighborhood park, where they often join pick‑up games and play for the Northside Hoops Club in the city’s youth basketball league, while
    rooting for the Los Angeles Lakers and balancing a laid‑back attitude toward practice that occasionally leads to missed drills.
  arts: Gregory Awuah immerses themselves in graphic novels by creators such as Junji Ito and fantasy series by Neil Gaiman, while the Afrobeat rhythms of Burna Boy and hip‑hop beats from Kendrick Lamar
    fuel their LEGO builds and Minecraft architecture, and they find this blend shapes a vibrant personal aesthetic.
  travel: Gregory Awuah loves weekend trips to the city’s science museum and family camping adventures at Eagle Creek State Park, and they dream of a future visit to the Kennedy Space Center to see real
    rockets, balancing a thirst for exploration with the practical reality that all travel depends on school schedules and family budgets.
  culinary: Gregory Awuah enjoys cooking with family, mastering the aromatic blend of tomatoes, bell peppers, and spices for jollof rice, chopping fresh cilantro for salads, and experimenting with homemade
    pizza dough topped with mozzarella and pepperoni, and they develop a modest yet enthusiastic cooking skill set that mirrors their hands‑on approach to building.
  core: Gregory Awuah is a curiosity‑driven 12‑year‑old who intertwines digital world‑building, LEGO mechanics, spontaneous basketball games, and a vivid imagination, while they wrestle with occasional
    worry and a relaxed, disorganized approach to obligations.
background:
  cultural: Gregory is a Black American boy raised in Reynoldsburg, Ohio, in a household that blends Ghanaian traditions with Midwestern U.S. culture. His parents immigrated from Ghana, so he grew up hearing
    bits of Twi, celebrating Ghanaian Independence Day, and enjoying dishes such as jollof rice and plantain alongside classic American meals. At school and in the local church youth group, he experiences
    African-American cultural practices, including gospel music, community service events, and celebrations like Juneteenth. This hybrid cultural background shapes his values of family, community, resilience,
    and a curiosity that bridges his African roots with his American surroundings.
