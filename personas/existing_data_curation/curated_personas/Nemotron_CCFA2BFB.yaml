  career_goals: Although still a toddler, Dominique already shows a budding curiosity about the world that hints at future aspirations. As she grows, she hopes to explore creative expression through dance
    and music, share stories and art with others, and become someone who brings people together in her community. Her long‑term ambition may involve becoming an artist, community organizer, or educator
    who celebrates cultural heritage and encourages others to embrace diverse ideas.
