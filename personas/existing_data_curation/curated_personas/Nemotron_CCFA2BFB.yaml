personas:
  professional: Dominique Johnson, a budding community storyteller even at 1 year old, shows early talent for organizing playtime scenes, using their curious and sociable nature to lead mini‑gatherings
    of stuffed‑animal audiences while balancing a surprisingly organized approach to scattered toys.
  sports: Dominique Johnson, a lively infant who loves crawling across the community park’s grass and has a growing attachment to the Philadelphia Eagles, regularly joins a parent‑led baby gym where gentle
    tumble‑and‑roll activities double as their first fitness routine.
  arts: Dominique Johnson, a bright‑eyed toddler who bursts into giggles whenever soaring gospel chants echo alongside Ella Fitzgerald’s swing at neighborhood church gatherings, spends afternoons tapping
    a xylophone toy and dreams of one day joining a junior choir that celebrates the city’s cultural festivals.
  travel: Dominique Johnson, a curious explorer who has already taken stroller‑sized trips to the Adventure Aquarium in Camden, the Please Touch Museum in Philadelphia, and family reunions in Baltimore,
    now hopes to experience the sandy beaches of the Jersey Shore before turning two.
  culinary: Dominique Johnson, a picky but adventurous eater who delights in the smooth texture of mashed sweet potatoes, the cheesy stretch of homemade mac and cheese, and the occasional dab of banana
    puree, often waving a plastic spoon like a conductor while crumbs clatter.
  core: Dominique Johnson, a wide‑eyed infant who balances boundless energy with an unexpected streak of worry, often pauses mid‑crawl to stare pensively at the family photo wall before sprinting toward
    the next toy.
background:
  cultural: Dominique comes from an African American family living in Gloucester City, New Jersey, a community with deep roots in the broader Philadelphia‑Baltimore corridor. Her family participates in
    local cultural traditions, including church gatherings that feature gospel music and communal storytelling. The neighborhood celebrates African American heritage through festivals, food, and music,
    exposing Dominique to jazz, hip‑hop, and soul rhythms from an early age. Community centers and local libraries host art and music programs that reinforce a sense of pride in her cultural identity, while
    the proximity to the rich historical tapestry of Camden County provides a backdrop of resilience and community solidarity.
