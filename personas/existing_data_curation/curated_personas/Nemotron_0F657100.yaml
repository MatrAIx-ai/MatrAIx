personas:
  professional: Adamina Medina is a meticulous custodian with OSHA‑certified safety expertise, bilingual communication skills, and a methodical approach that translates her organized, solitary nature into
    flawless facility management, while her curiosity about art fuels her ambition to become a lead custodian who also curates visual narratives in workplace spaces.
  sports: Adamina Medina enjoys solitary morning runs along the Arroyo Seco, attends gentle yoga classes at a nearby mindful movement studio, and follows the Los Angeles Dodgers, Los Angeles Lakers, and
    LA Galaxy, while occasionally joining a community indoor climbing group for low‑key strength training.
  arts: Adamina Medina, an avid sketcher and art‑history enthusiast, spends quiet weekdays at the Claremont Museum of Art absorbing works by Frida Kahlo, Diego Rivera, and Monet, while listening to folk
    singers like Chavela Vargas and classical composers such as Debussy, and channels her creative impulse into poetry written in Spanish that reflects both personal anxiety and communal traditions.
  travel: Adamina Medina’s travel style blends meticulous planning with a yearning for cultural immersion, having trekked the colonial streets of Antigua, explored the vibrant markets of Oaxaca, and longing
    to wander Barcelona’s Gothic quarter and Kyoto’s Zen gardens, all while budgeting trips through a dedicated travel spreadsheet that balances work obligations and family support.
  culinary: Adamina Medina, a competent home cook, frequently prepares pupusas stuffed with queso fresco and loroco, braises pescado a la veracruzana using fresh cilantro and tomato sauce, and infuses her
    meals with plantains and corn masa, savoring the ritual of cooking as both a therapeutic outlet and a way to honor family traditions, though she occasionally over‑spices dishes when stress spikes.
  core: Adamina Medina is a quietly driven, art‑obsessed custodian whose disciplined routine, intense anxiety, and love for solitary creativity shape a life that balances meticulous work, careful budgeting,
    and heartfelt cultural expression, even as they sometimes over‑indulge in coffee and procrastinate on medical appointments.
background:
  cultural: Adamina’s family emigrated from a rural region of Central America, bringing with them a strong work ethic, Catholic values, and a deep reverence for communal traditions such as Día de los Muertos
    and local folklore. Growing up in a bilingual household, she retained fluency in Spanish and an appreciation for the culinary and musical heritage of her ancestors. Living in Claremont, she balances
    assimilation into American culture with preserving family customs, often celebrating cultural holidays with homemade foods and sharing stories of her homeland. This bicultural identity informs her curiosity
    about art, her resilience in the face of emotional challenges, and her desire to create a quiet, orderly life that honors both her roots and her present community.
attributes:
  skills: '[''Meticulous cleaning'', ''Facility maintenance'', ''Inventory control'', ''Time management'', ''Safety compliance (OSHA)'', ''Bilingual communication (English/Spanish)'', ''Art research and
    appreciation'', ''Self-directed learning'', ''Journaling and reflective writing'']'
  hobbies: '[''Sketching'', ''Visiting art galleries'', ''Reading art history'', ''Urban gardening'', ''Meditation and mindfulness'', ''Cooking traditional Central American dishes'', ''Learning Spanish
    poetry'', ''Listening to classical and folk music'']'
  career_goals: Adamina aims to leverage her reliability and methodical nature into a supervisory role in facilities management, such as becoming a lead custodian or building operations coordinator. She
    plans to obtain a green‑cleaning certification and a community college certificate in building systems to broaden her technical knowledge. Parallel to her professional aspirations, she hopes to enroll
    in part‑time art history courses at a local college, eventually curating small community exhibitions that reflect her Central American roots. A long‑term ambition is to achieve financial stability that
    allows her to support her family while maintaining a quiet, structured work environment that minimizes stress triggers.
