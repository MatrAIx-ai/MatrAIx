personas:
  professional: An interdisciplinary professor of art history and visual culture, Mustafa Katabi designs dynamic, multimedia‑rich syllabi, leverages advanced LMS tools, and energetically leads workshops
    and panels, channeling their curiosity, meticulous organization, and talkative charisma into fostering critical dialogue and community‑engaged scholarship.
  sports: A tennis‑enthusiast and avid hiker, Mustafa Katabi plays weekly at the Natick Community Center's tennis courts, belongs to the Natick Tennis Club, tackles weekend hikes in the Charles River Reservation,
    and follows the Boston Celtics, New England Patriots, and Boston Red Sox, integrating disciplined training with seasonal sports fandom.
  arts: An active arts‑aficionado, Mustafa Katabi frequents contemporary galleries showcasing artists like Banksy, Yayoi Kusama, and Theaster Gates, performs improv with the Boston Improvisers troupe, curates
    eclectic playlists featuring John Coltrane, Kamasi Washington, and Aphex Twin, practices street photography of urban architecture, and contributes poetry to literary journals, reflecting a curious,
    sociable, and expressive outlook.
  travel: A meticulous traveler, Mustafa Katabi plans annual trips to culturally rich cities such as Florence, Berlin, and Marrakech—often mapping museum openings, local art residencies, and historic walking
    tours—while also exploring Kyoto’s temples and Barcelona’s modernist architecture, balancing structured itineraries with spontaneous culinary explorations and occasional budget constraints.
  culinary: A culinary enthusiast, Mustafa Katabi regularly prepares Mediterranean dishes like grilled sea bass with lemon‑herb vinaigrette, spanakopita, and shakshuka, sources fresh herbs from the local
    farmer’s market, and hosts dinner parties where they pair meals with curated wine selections and curate playlists, all while their organized kitchen routine sometimes leads to over‑prepping and a lingering
    habit of tasting every sauce before serving.
  core: Mustafa Katabi blends disciplined scholarship, vibrant sociability, and a relentless curiosity into a life of art‑filled lectures, curated playlists, tennis matches, and meticulously planned travels,
    all while occasionally over‑committing to projects and relying on copious coffee to keep pace.
background:
  cultural: Mustafa is a white American raised in the Boston suburbs of Natick, Massachusetts. His family background includes Mediterranean roots, reflected in his given name and occasional family traditions
    such as cooking regional dishes and storytelling about ancestral heritage. Growing up, he was immersed in New England cultural norms—celebrating Thanksgiving, participating in community fairs, and attending
    public schools—while also being exposed at home to diverse cultural narratives and cuisine. This blend of local and transnational influences fostered an early curiosity about art and culture beyond
    his immediate environment. Mustafa actively engages with Boston’s vibrant arts scene, regularly attending exhibitions at the Museum of Fine Arts, participating in cultural festivals, and collaborating
    with community art organizations. His hybrid cultural experience informs his interdisciplinary academic perspective and his openness to varied ideas and unconventional thinking.
