  hobbies: '[''Visiting Art Galleries and Museums'', ''Improvisational Theater'', ''Tennis'', ''Hiking'', ''Traveling to Cultural Destinations'', ''Poetry Writing'', ''Jazz Listening'', ''Mediterranean
