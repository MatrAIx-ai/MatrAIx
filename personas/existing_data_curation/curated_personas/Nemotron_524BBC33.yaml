    outreach'']'
  hobbies: '[''Reading technical and historical firefighting literature'', ''Building scale model fire trucks'', ''Long-distance running'', ''Weightlifting'', ''Urban architecture photography'', ''Strategy
    video gaming'', ''Electronics repair and basic coding'']'
  career_goals: Aveyon aims to advance to the role of Fire Lieutenant within the next five years, with a long‑term ambition of becoming a Fire Captain who leads a specialized investigative unit. He plans
    to pursue additional certifications in fire investigation and paramedicine to broaden his expertise. Leveraging his curiosity and analytical mindset, he intends to develop a data‑driven fire prevention
    program for Baltimore County, positioning the department as a model for proactive safety. Ultimately, he hopes to mentor younger firefighters, especially those from underrepresented backgrounds, and
    to be recognized as a leader who blends practical skill with innovative thinking.
