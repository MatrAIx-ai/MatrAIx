personas:
  professional: Aveyon Barkley is a methodical firefighter with an associate degree in fire science, excelling in fire suppression, hazardous materials response, and data‑driven incident command while constantly
    refining SOPs and aspiring to a lieutenant role within five years.
  sports: Aveyon Barkley runs with the Baltimore Road Runners club, trains for half‑marathons and the annual Baltimore Marathon, lifts regularly at a local CrossFit box, and follows the Baltimore Ravens,
    the Washington Wizards, and D.C. United for a mix of football, basketball, and soccer inspiration.
  arts: Aveyon Barkley captures the stark geometry of Baltimore’s brick warehouses through monochrome photography inspired by Berenice Abbott, listens to post‑rock bands like Explosions in the Sky while
    editing images, and unwinds by reading the fire‑history volumes of Samuel Green, which shape their aesthetic sensibility.
  travel: Aveyon Barkley plans solo trips with meticulous itineraries, has visited the historic fire stations of Boston and the architectural marvels of New York’s High Line, dreams of photographing Kyoto’s
    temples and the London Fire Brigade Museum, and balances travel costs with a modest savings plan.
  culinary: Aveyon Barkley favors high‑protein meals such as grilled salmon with rosemary, quinoa bowls with roasted sweet potatoes and garlic, crafts protein shakes with whey and almond milk, cooks at
    a moderate skill level, and occasionally indulges in a craft IPA after a long run.
  core: Aveyon Barkley is a solitary, data‑driven firefighter who channels curiosity into precision firefighting, disciplined fitness, and a relentless pursuit of perfect fire‑prevention analytics, all
    while battling a tendency to over‑plan and skip social downtime.
background:
  cultural: Aveyon is an African‑American raised in Towson, Maryland, whose family has deep roots in the Baltimore County community. Growing up, he was influenced by a strong tradition of public service
    and resilience within his extended family, many of whom served in the military and local emergency services. He regularly participates in community events that celebrate Black culture and history, such
    as Juneteenth gatherings and local heritage festivals. His cultural identity shapes his commitment to serve as a role model for young Black residents, fostering pathways into fire service and encouraging
    representation within the department. Aveyon also values the collective experiences of his community, using them to inform his dedication to equity and safety in his professional life.
attributes:
  skills: '[''Fire suppression'', ''Emergency medical response (EMT)'', ''Hazardous materials handling'', ''Fire investigation'', ''Incident command system (ICS) coordination'', ''Equipment inspection and
