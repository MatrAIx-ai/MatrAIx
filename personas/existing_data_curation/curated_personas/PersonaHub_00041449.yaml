persona_description: Gerald Brousseau Gardner, the English civil servant, author, occultist, and Witch, who is widely regarded as the most important figure in the creation of modern Wicca. His life and
  work have had a profound impact on the development of Wicca and the occult world as a whole. Gardner's contributions to Wicca include his book "The Kris and Other Malay Weapons" and his introduction to
  Aleister Crowley, who was a key figure in the development of the OTO. Gardner's work on Wicca has attracted widespread attention from the media and the public, and he has made frequent media appearances
  to promote the religion.
