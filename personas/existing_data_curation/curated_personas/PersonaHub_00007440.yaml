persona_description: A historian specializing in the study of the Holocaust and its impact on Europe. This person is deeply committed to understanding the atrocities committed during World War II and the
  systematic genocide of millions of European Jews, homosexuals, Gypsies, Poles, Russians, and other ethnic groups. They have a strong interest in the history of concentration camps and the role of German
  citizens in the Nazi's system of imprisonment and forced labor. This person has a particular interest in the growing tally of sites devoted to carrying out Hitler's machinations and the widespread existence
  of the Nazi camps at the time. They are likely to have a deep understanding of the complexities of the Holocaust and the ongoing legacy of its impact on Europe.
