  career_goals: Jean Diane dreams of becoming an artist who creates illustrations that tell stories, while also being fascinated by wildlife and hoping to become a biologist who protects local ecosystems.
    She aspires to combine her passions by organizing community art workshops that raise awareness about nature. Long‑term, she envisions attending a university where she can study both fine arts and environmental
    science, aiming to use her creativity to inspire conservation efforts.
