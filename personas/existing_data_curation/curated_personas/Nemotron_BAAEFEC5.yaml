personas:
  professional: Jean Patton, an aspiring junior illustrator who pairs a vivid imagination fueled by fantasy books with a knack for simple scientific experiments, demonstrates an early blend of artistic
    creativity, analytical curiosity, reliable organization, and an infectious enthusiasm for collaborative projects.
  sports: Jean Patton, an energetic participant in the Boone County Youth Soccer League who proudly dons the green jersey of the local Cyclones youth academy, enjoys after‑school games with friends, drills
    regularly on the school field, and looks up to the Iowa State Cyclones football team for inspiration while balancing competitive drive with a cooperative spirit.
  arts: Jean Patton, a budding painter who spends weekends sketching scenes inspired by the vivid colors of Van Gogh’s Starry Night and the gentle brushwork of Claude Monet, frequently visits the Ames Art
    Walk to view local exhibits, and delights in listening to the whimsical piano pieces of Yiruma while practicing their own piano basics.
  travel: Jean Patton, an adventurous explorer who loves trekking the rolling trails of Boone County’s Gray’s Lake Park, dreams of visiting the natural wonders of Yellowstone National Park and the ancient
    castles of Europe, and cherishes family road trips to the Iowa State Fair in Des Moines as a blend of excitement and comforting routine.
  culinary: Jean Patton, who enjoys devouring homemade mac and cheese topped with a sprinkle of paprika, proudly helps their family bake chocolate chip cookies with extra dark chocolate chunks, and loves
    experimenting with fresh garden herbs like basil and mint when crafting simple salads or smoothie bowls.
  core: Jean Patton, a curious ten‑year‑old whose imagination roams between paint‑splattered canvases and backyard experiments, balances eager sociability with a quiet worry that fuels both meticulous planning
    and occasional over‑thinking, making them a gentle yet determined explorer of ideas and worlds.
background:
  cultural: Jean Diane was raised in a middle‑class white family in Ames, Iowa, where suburban living blends with the agricultural traditions of Boone County. Her parents emphasize education, community
    service, and Midwestern hospitality. The family regularly attends local events such as the Ames Art Walk, county fairs, and school volunteer activities, providing her with exposure to both creative
    and rural cultures. Proximity to Iowa State University offers access to museum trips, science outreach programs, and cultural performances, nurturing her curiosity, appreciation for varied ideas, and
    openness to unconventional thinking.
