    at the community library'', ''Attending church choir concerts'']'
  career_goals: Although retired from formal employment, Tina pursues a series of personal and community‑focused goals. She aims to complete a cohesive collection of abstract watercolors for an upcoming
    exhibition at the local senior center, and to produce a small gallery of her quilt designs for the town’s historical museum. She wants to finish writing and self‑publishing a memoir that intertwines
    her family’s genealogy with reflections on the changing landscape of McAlester. Tina plans to lead a quarterly quilting workshop for seniors, sharing her skills while fostering social connection. She
    hopes to expand the community herb garden she started with her husband, adding medicinal and pollinator‑friendly plants. Finally, she intends to enroll in evening art classes at the community college
    to explore digital photography and experiment with mixed media.
