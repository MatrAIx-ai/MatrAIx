personas:
  professional: Tracie Salvatore, a budding junior naturalist, channels their curiosity about wildlife and meticulous drawing skills into detailed field journals, using practical, organized methods to catalog
    each animal and rock they discover, while their competitive nature pushes them to outperform peers in school science fairs.
  sports: Tracie Salvatore, who attends weekly basic horseback riding lessons at the Meadowbrook Stables, enjoys riding practice with a focused, solitary approach, and follows the professional equestrian
    sport of show jumping, as well as cheering for the local minor league baseball team, the River City Raptors, while occasionally participating in school’s after‑school track club to run around the field.
  arts: Tracie Salvatore, an avid drawer of animals and landscapes, finds inspiration from the classic illustrations of Beatrix Potter and the wildlife paintings of John James Audubon, enjoys reading adventure
    stories by author C.S. Lewis, and spends evenings copying scenes from Studio Ghibli films, integrating these influences into meticulous LEGO dioramas.
  travel: Tracie Salvatore has explored the nearby creek and state park on family hikes, camped under the night sky at a rural campground where they identified the Orion and Cassiopeia constellations, has
    taken a road trip to the Grand Canyon National Park with a school field trip, and dreams of visiting the Aurora Borealis in Norway, balancing a penchant for adventure with the practical limits of school
    schedules and parental safety concerns.
  culinary: Tracie Salvatore prefers simple, hands‑on meals, enjoys assembling homemade pizza slices with extra cheese and pepperoni, snacking on carrot sticks with hummus, and proudly makes a peanut‑butter‑and‑jelly
    sandwich, yet they have a habit of hoarding gummy bears in their backpack and occasionally overindulging in sugary cereal before bedtime.
  core: Tracie Salvatore is a solitary, curiosity‑driven 7‑year‑old who balances meticulous nature‑obsession with a competitive streak, turning quiet explorations into detailed collections while navigating
    typical childhood quirks.
background:
  cultural: Tracie comes from a white, rural Texan family in Ropesville, Hockley County. Her upbringing reflects the values of independence, self-reliance, and practicality common in West Texas communities.
    Family gatherings often involve county fair traditions, backyard barbecues, and church services, which expose her to a close-knit community atmosphere. The local school emphasizes both academic achievement
    and participation in agricultural youth programs, shaping her respect for hard work and connection to the land.
attributes:
  skills: '[''Reading'', ''Basic Math'', ''Organizing'', ''Puzzle Solving'', ''Educational Software Use'', ''Basic Coding (Block-based)'', ''Household Chores Assistance'']'
  hobbies: '[''Reading'', ''Drawing'', ''LEGO Building'', ''Nature Exploration'', ''Rock Collecting'', ''Science Experiments'', ''Horseback Riding'', ''Stargazing'']'
  career_goals: Tracie aspires to become a veterinarian, inspired by her love for horses and farm animals she sees around Ropesville. She dreams of studying biology and animal care, hoping to help animals
    stay healthy. In the short term, she aims to excel in school, win the upcoming science fair, and become a top reader in her class. She also imagines herself one day working in a research lab, combining
    her curiosity with practical problem-solving skills.
