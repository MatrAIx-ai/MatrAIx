  hobbies: '[''Soccer (adult league)'', ''Fishing on Galveston Bay'', ''Classic car restoration'', ''DIY electronics projects'', ''Cooking Mexican cuisine'', ''Attending cultural festivals'', ''Video gaming'',
    ''Watching crime drama series'']'
  career_goals: Alvaro aims to re‑enter the workforce within the next year by securing a stable position in a skilled trade, such as HVAC technician or welder, and obtaining the relevant certifications.
    He wants to leverage his practical skills and growing organizational abilities to move into a supervisory role, where he can mentor newer workers while managing job schedules. Long‑term, he envisions
    launching his own small maintenance and repair service focused on the Baytown community, blending his hands‑on expertise with his desire for independent, structured business operations.
