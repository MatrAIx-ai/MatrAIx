personas:
  professional: Samuel Herbert, a 44-year-old high school science teacher, blends hands-on experiments with Arduino kits and data-driven assessments, leveraging their practical curiosity and outgoing nature
    to lead clubs, mentor students, and improvise lesson plans when schedules get chaotic.
  sports: Samuel Herbert, a 44-year-old desert outdoors enthusiast, jogs the Yuma River trail, captains a co-ed soccer team in the Yuma County community league, cheers for the Arizona Cardinals on Sundays,
    and spends their weekends hiking the Colorado River floodplain to stay fit.
  arts: Samuel Herbert, an avid guitarist and board-game aficionado, strums folk-rock covers of Bob Dylan and John Mayer at Yuma County open-mic nights, trades strategies over Settlers of Catan with friends,
    and they cite Wes Anderson’s whimsical cinematography as a source of creative inspiration for classroom projects.
  travel: Samuel Herbert, a 44-year-old adventure seeker, enjoys spontaneous road trips across Arizona’s desert towns, has already hiked the Grand Canyon and visited Santa Fe’s art districts, and they dream
    of backpacking through Patagonia’s Torres del Paine during a future summer.
  culinary: Samuel Herbert, a backyard grill master, season-rocks chipotle-lime chicken and hand-makes smoky tomato-coriander salsa for family gatherings, experiments with prickly-pear margaritas, occasionally
    forgets to defrost meat in time, and they treat every cookout as an informal science demonstration.
  core: Samuel Herbert, a 44-year-old science teacher whose practical curiosity fuels endless Arduino projects and community guitar jams, navigates life with an improvisational streak that makes them a
    beloved collaborator and a chronic late-planner.
background:
  cultural: Samuel is a white American who grew up in a small Midwestern town before moving to the Southwest for his teaching career. Living in Yuma, a border city with a strong Hispanic presence, he has
    embraced the region’s desert landscape, bilingual community events, and local customs such as Cinco de Mayo celebrations and traditional Southwestern cuisine. His upbringing emphasized self‑reliance
    and practical problem‑solving, which aligns with his pragmatic curiosity. He values inclusivity and often incorporates multicultural perspectives into his classroom to reflect the diverse student body.
attributes:
  skills: '[''Classroom management'', ''STEM curriculum design'', ''Project-based learning facilitation'', ''Educational technology integration'', ''Data analysis for student assessment'', ''Differentiated
    instruction'', ''Collaborative group dynamics'', ''Science lab safety and experiment design'', ''Mentorship and coaching of students'', ''Community outreach coordination'']'
  hobbies: '[''Hiking and desert trail exploration'', ''Birdwatching'', ''DIY electronics and Arduino tinkering'', ''Acoustic guitar playing'', ''Community sports (softball league)'', ''Board-game nights
    with friends'', ''Volunteering for STEM outreach at the library'', ''Southwestern cooking (grilling, salsa)'']'
  career_goals: Samuel aims to expand his impact beyond his classroom by becoming a STEM program coordinator for the district, developing interdisciplinary curricula that link math, science, and engineering
    with local environmental themes. He intends to pursue a master's degree in educational leadership, lead professional development workshops on project‑based learning, and eventually become a curriculum
    specialist or assistant principal focused on innovative teaching. Additionally, he hopes to establish a makerspace that partners with local businesses and community organizations, giving students real‑world
    problem‑solving opportunities.
