  career_goals: Candie dreams of becoming an artist who creates beautiful illustrations of the Alaskan wilderness or an explorer who studies wildlife and protects the Arctic. She also imagines teaching
    younger kids about art and nature, and hopes one day to travel to see the Northern Lights and share her experiences with friends.
