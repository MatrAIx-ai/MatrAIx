personas:
  professional: Shevonne Gaines is a meticulous dental and ophthalmic laboratory technician; they excel at digital CAD/CAM design, stringent infection‑control, and regulatory compliance, and they are driven
    to lead a boutique interdisciplinary lab while mentoring junior staff and championing inclusive STEM outreach.
  sports: Shevonne Gaines enjoys weekend hikes on the Walnut Creek trail, follows the Dallas Cowboys for hometown pride, and participates in a local adult recreational soccer league as a defensive midfielder,
    balancing fitness with a preference for low‑key social sport.
  arts: Shevonne Gaines immerses themselves in jazz legends like Miles Davis, gospel choirs such as the Houston Mass Choir, and contemporary R&B artists like H.E.R., often listening while knitting or woodworking,
    and dedicates evenings to mystery novels by Agatha Christie, which fuels their love for narrative puzzles.
  travel: Shevonne Gaines favors short, purpose‑driven getaways, having explored Austin’s food scene, the Hill Country wineries, and New Orleans for its jazz heritage, while dreaming of a future volunteer
    trip to Cape Town to combine community health outreach with cultural exchange.
  culinary: Shevonne Gaines blends classic Southern comfort foods—smoked collard greens, shrimp and grits, and sweet‑potato pie—with garden‑fresh heirloom tomatoes and modern twists like quinoa‑stuffed
    okra, cooking at a skill level that lets them confidently craft a perfectly braised brisket while still experimenting with sous‑vide techniques.
  core: Shevonne Gaines is a methodical, community‑focused technologist who balances a love for Southern culinary traditions and quiet hobbies with an ambitious drive to lead an interdisciplinary lab, all
    while wrestling with a tendency toward worry and occasional over‑planning.
background:
  cultural: Shevonne is a Black woman raised in Texas, deeply rooted in Southern African‑American cultural traditions. Family and church have been central pillars, fostering values of resilience, community
    service, and collective uplift. She maintains close ties with extended relatives and participates in cultural celebrations such as Juneteenth and church picnics, which reinforce a sense of identity
    and belonging. Living in Argyle, a predominantly white suburb, she navigates the dual experience of preserving her cultural heritage while integrating into a diverse professional environment. This background
    fuels her commitment to mentoring minority youth and advocating for greater representation of Black professionals in the medical‑technology field.
attributes:
  skills: '[''Digital Dental CAD/CAM design'', ''Ophthalmic prosthesis fabrication'', ''Materials testing and selection'', ''Precision instrumentation and equipment maintenance'', ''Sterile technique and
    infection control'', ''Regulatory compliance (HIPAA, OSHA)'', ''Quality assurance and documentation'', ''Patient communication and interdisciplinary collaboration'', ''Data analysis and report generation'',
    ''Technical troubleshooting'']'
  hobbies: '[''Reading scientific journals and mystery novels'', ''Gardening and growing heirloom vegetables'', ''Cooking traditional Southern and soul food dishes'', ''Jazz and gospel music appreciation'',
    ''DIY woodworking and crafting'', ''Macro nature photography'', ''Volunteering as a STEM mentor for local youth'', ''Hiking local nature trails with spouse'']'
  career_goals: Shevonne aims to advance to a senior technologist or supervisory position within the next five years, where she can lead a team, refine lab processes, and mentor junior staff. She plans
    to obtain the Certified Dental Technician (CDT) credential and a specialized certification in Ophthalmic Technology to deepen her technical authority. Long‑term, she envisions opening a boutique interdisciplinary
    lab that integrates digital dentistry and custom ocular prosthetics, allowing her to innovate new biomaterials and provide personalized patient care. She also hopes to partner with local community colleges
    to develop outreach programs that encourage more Black youth to pursue STEM careers in medical technology.
