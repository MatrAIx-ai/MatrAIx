personas:
  professional: Carmen Ramnaraine, a 20‑year‑old packaging technician, blends bilingual communication, hands‑on maintenance expertise, and a practical curiosity to keep the production line humming while
    proposing modest, data‑driven process improvements and pursuing a shift‑supervisor certification within two years.
  sports: Carmen Ramnaraine spends weekends scaling the San Bernardino peaks, carving at Big Bear ski runs through the Big Bear Ski Club, paddling Big Bear Lake, follows the LA Dodgers and LA Lakers, and
    trains with the San Bernardino Trail Runners to stay fit and social.
  arts: Carmen Ramnaraine captures sunrise vistas on a DSLR, strums a guitar in casual backyard jams, dances salsa and cumbia at community festivals, and finds inspiration in the music of Carlos Santana,
    Beyoncé, and John Mayer, weaving these artistic threads into a vibrant personal identity.
  travel: Carmen Ramnaraine prefers spontaneous, budget‑friendly road trips to nearby natural wonders like Lake Tahoe, Yosemite, and Sedona, while dreaming of a longer trek through Patagonia once a consulting
    business is established.
  culinary: Carmen Ramnaraine delights in cooking family recipes such as corn‑masa tamales, mole with roasted chilies, and chilaquiles, skillfully balancing spice and flavor while hosting lively dinner
    gatherings that feature fresh cilantro, avocado, and homemade salsa.
  core: Carmen Ramnaraine, a 20‑year‑old outdoor enthusiast and aspiring maintenance supervisor, blends practical curiosity with a love for salsa rhythms, often juggling spare parts and dance steps while
    occasionally forgetting to file receipts.
background:
  cultural: Carmen is a second‑generation Mexican‑American who grew up in a bilingual household in Southern California. Her family celebrates Mexican holidays such as Día de los Muertos, Día de la Independencia,
    and Las Posadas, and she regularly prepares traditional dishes like tamales, pozole, and aguas frescas. This cultural foundation emphasizes close family ties, hospitality, and communal celebrations,
    which she brings to her friendships and community involvement in Big Bear. At the same time, living in a mountain resort town has blended her Mexican heritage with a love for outdoor recreation and
    a laid‑back Californian lifestyle.
attributes:
  skills: '[''Packaging machine operation'', ''Filling machine tender duties'', ''Basic mechanical troubleshooting'', ''Preventive maintenance'', ''Safety and OSHA compliance'', ''Inventory tracking'',
