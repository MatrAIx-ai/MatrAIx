  hobbies: '[''Hiking in the San Bernardino mountains'', ''Skiing/snowboarding at Big Bear Ski Resort'', ''Kayaking on Big Bear Lake'', ''Mexican cuisine cooking'', ''Salsa and cumbia dancing'', ''Outdoor
    photography'', ''Volunteering at local community events'', ''Playing guitar'', ''DIY home projects'']'
  career_goals: Carmen aims to earn a certified industrial maintenance technician credential within the next two years and leverage that qualification to move into a shift‑supervisor role on the production
    floor. She plans to enroll in an associate’s program in industrial technology at a community college near San Bernardino to deepen her technical knowledge. Long‑term, she envisions advancing to a plant‑manager
    position or launching a small logistics and packaging consulting business that helps local manufacturers improve efficiency while maintaining employee safety and morale.
