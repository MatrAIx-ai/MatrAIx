  hobbies: '[''Visiting art galleries'', ''Attending community theater'', ''Knitting and quilting'', ''Gardening'', ''Birdwatching'', ''Cooking family recipes'', ''Participating in senior center dance classes'',
    ''Volunteering at local library events'', ''Joining church choir'', ''Exploring food festivals'']'
  career_goals: Melba aims to transition into a supervisory or trainer role where she can mentor younger operators, share her practical knowledge, and champion a culture of safety and teamwork. She also
    hopes to secure a stable part‑time schedule that allows her to pursue her artistic interests and spend more time with family. Over the next few years, she plans to obtain certification in OSHA safety
    and explore opportunities to contribute to community art projects that combine her packaging experience with design.
