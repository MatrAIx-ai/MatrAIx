persona_description: A political scientist who specializes in comparative politics and international relations, particularly in the context of transitional justice and post-conflict governance. Their research
  interests include the comparative effectiveness of different transitional justice mechanisms, the role of international institutions in post-conflict governance, and the dynamics between government and
  opposition in post-conflict states. They are particularly interested in understanding the factors that influence the likelihood of governments pursuing former opponents in courts, as well as the implications
  of centralized opposition structures for their ability to resist and remobilize.
