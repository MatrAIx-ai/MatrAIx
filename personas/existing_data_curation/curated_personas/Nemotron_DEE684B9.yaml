  hobbies: '[''Banda and norteño music'', ''Acoustic guitar playing'', ''Cooking Mexican cuisine'', ''Watching and attending soccer matches'', ''Fishing on Laguna Madre'', ''Gardening native Texas plants'',
    ''Volunteer work at local church'', ''Road trips to nearby towns'', ''Reading about truck technology'']'
  career_goals: Radames aims to transition from pure driving to a supervisory role within the logistics field, such as a fleet coordinator or depot manager, where he can mentor younger drivers and apply
    his practical knowledge to improve safety and efficiency. He is interested in learning about emerging electric truck technologies and hopes to acquire a hazardous‑materials endorsement, balancing his
    curiosity with the practical need for job security. Ultimately, he wishes to achieve a stable, higher‑earning position that provides financial security for his family and allows a gradual move toward
    semi‑retirement while maintaining a flexible schedule that respects his need for occasional downtime.
