personas:
  professional: German Medina, an aspiring junior game developer, channels his methodical, structure‑loving mindset into designing balanced gameplay mechanics while applying his manga drawing skills to
    create compelling character art for indie projects.
  sports: German Medina, playing for the San Antonio FC U‑15 academy, trains twice weekly on the soccer field, follows the San Antonio Spurs, and spends weekend afternoons skateboarding at the local skate
    park to keep his agility sharp.
  arts: German Medina, a manga enthusiast, sketches characters inspired by Naoki Urasawa and Studio Ghibli, listens to norteño and Tejano while drawing, and regularly visits community art fairs showcasing
    local muralists.
  travel: German Medina, who favors budget‑friendly adventures, has visited the Grand Canyon on a school field trip, dreams of exploring Tokyo’s Akihabara district to experience manga culture, and plans
    a summer road‑trip to Port Aransas with his family.
  culinary: German Medina, an avid home cook, perfects his family's salsa by experimenting with chipotle, cilantro, and roasted tomatillos, loves whipping up homemade quesadillas with queso fresco, and
    can quickly assemble a ramen bowl for late‑night gaming sessions.
  core: German Medina, a structure‑driven teen who expertly balances soccer, skateboarding, manga art, and meticulous budgeting, yet still forgets to tidy his room and occasionally overindulges in video‑game
    microtransactions.
background:
  cultural: German’s family is rooted in Mexican traditions while living on the U.S. side of the Rio Grande. He grew up bilingual, speaking Spanish at home and English at school, which shapes his daily
    interactions and cultural perspective. Family gatherings are centered around shared meals, especially tacos, tamales, and festive dishes prepared during holidays like Día de los Muertos and Christmas.
    He participates in local Laredo festivals that blend Mexican folkloric music, dance, and art, reflecting a bicultural identity. The proximity to the border has exposed him to cross‑border commerce,
    making him aware of both Mexican and American work ethics and community values. While he respects the Catholic customs observed by his relatives, such as attending Mass on Sundays, he also embraces
    the diverse secular influences of his peers. This cultural blend informs his practical outlook, sense of responsibility, and aspiration to bridge his two worlds through career and community involvement.
attributes:
  skills: '[''bilingual Spanish-English communication'', ''basic automotive maintenance'', ''computer troubleshooting and repair'', ''time management and organization'', ''cooking traditional Mexican dishes'',
