  hobbies: '[''playing soccer in a youth league'', ''online multiplayer strategy gaming'', ''skateboarding at the local park'', ''drawing manga‑style illustrations'', ''cooking traditional Mexican dishes
    and experimenting with salsas'', ''listening to norteño and Tejano music'', ''volunteering as a tutor at the local library'']'
  career_goals: German is focused on completing his high‑school education and then enrolling in a vocational technical program to become a certified automotive technician. He aims to deepen his mechanical
    knowledge to eventually open a small, family‑run auto‑repair shop that serves both U.S. and Mexican customers across the border. In the longer term, he envisions managing a cross‑border logistics service
    where his language skills and technical expertise would be valuable. He also hopes to develop a side hobby of creating a food blog that showcases his cooking, combining his interests in culinary arts
    and community storytelling.
