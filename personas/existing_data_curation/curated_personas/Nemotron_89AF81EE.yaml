personas:
  professional: Edgardo Socorro, a veteran broadcast announcer and DJ with over three decades on air, leverages their meticulous scheduling, bilingual voice modulation, and outgoing interview style to keep
    the station’s programming reliably on track while they nurture younger talent through hands‑on mentorship.
  sports: Edgardo Socorro stays active through weekend doubles matches at the San Diego Tennis Club, maintains fitness with those sessions, and passionately cheers on the San Diego Padres at Petco Park
    while they occasionally catch LA Galaxy soccer games to satisfy a love of community‑rooted sports.
  arts: Edgardo Socorro’s evenings often revolve around spinning vintage records from The Rolling Stones, Los Lobos, and borderland folk groups, attending the annual Fiesta del Pueblo where they admire
    mariachi performances and local muralists, and savoring the storytelling power of classic radio dramas.
  travel: Edgardo Socorro prefers meticulously planned road trips, frequently crossing the border to explore family towns in Baja California and dreaming of a culinary pilgrimage to Oaxaca, while they budget
    for weekend getaways to Napa Valley and occasional cruises that fit their retirement timeline.
  culinary: Edgardo Socorro boasts a seasoned hand at crafting mole poblano, tamales wrapped in corn husks, and salsa verde with fresh poblano peppers, often pairing their homemade feasts with a glass of
    regional red wine while they reserve weekend brunches at local fish‑taco joints for a relaxed palate.
  core: Edgardo Socorro blends disciplined routine with a love of spontaneous vinyl discoveries, guiding a community voice by day while they secretly hoard a secret stash of collectible records that they
    never admit to anyone.
background:
  cultural: Edgardo was raised in a Mexican‑American household in the San Diego area, where Spanish was spoken at home and community celebrations like Día de los Muertos and Cinco de Mayo were integral
    to family life. His parents instilled a strong sense of respect for heritage, music, and communal responsibility. This bicultural upbringing has shaped his identity, giving him fluency in both Spanish
    and English and a deep appreciation for Mexican folk music, culinary traditions, and the values of hospitality and perseverance. Living near the U.S.–Mexico border, he maintains close ties to his extended
    family in Baja California, regularly visiting and bringing those experiences into his on‑air storytelling.
attributes:
