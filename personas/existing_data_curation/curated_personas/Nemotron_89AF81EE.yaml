    outreach'', ''Time‑management and schedule coordination'']'
  hobbies: '[''Traditional Mexican cooking (mole, tamales)'', ''Collecting vintage vinyl records'', ''Walking along the San Diego waterfront'', ''Volunteering at a senior center (radio workshops)'', ''Participating
    in Fiesta del Pueblo festival'', ''Casual tennis'', ''Following San Diego Padres baseball'']'
  career_goals: Edgardo aims to transition from daily on‑air duties to a mentorship and leadership role within his station. He hopes to develop a weekly syndicated podcast that showcases stories of Mexican‑American
    families in Southern California, while also seeking a promotion to program director where he can shape the station’s overall content strategy. Long‑term, he aspires to establish a community‑focused
    media hub that offers training for aspiring broadcasters from under‑represented backgrounds and to be recognized as a trusted voice for the local Latino community.
