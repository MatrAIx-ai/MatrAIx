  hobbies: '[''Visiting Art Galleries'', ''Attending Live Performances'', ''Street Art Exploration'', ''Urban Photography'', ''Reading Contemporary Fiction'', ''Art History'', ''Yoga'', ''Hosting Game Nights'',
    ''Potluck Dinners'', ''Hiking'', ''Cooking International Cuisine'']'
  career_goals: Jessica aims to secure a full‑time role that leverages her love for art and her organizational talent, such as an arts administrator, community program manager, or event coordinator for
    a cultural institution. In the next five years she hopes to obtain a bachelor’s degree in arts management or communications, obtain professional certifications in event planning, and eventually lead
    a team that designs and delivers public art initiatives and educational workshops. She also dreams of launching a freelance consultancy that helps local nonprofits curate and promote community‑based
    art events.
