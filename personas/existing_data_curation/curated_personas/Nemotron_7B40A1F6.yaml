  career_goals: Ray dreams of turning his curiosity for technology into a career as a software developer or game designer, hoping to one day build apps that help kids in his community learn. He also envisions
    contributing to local youth programs, using his love for mentorship to guide younger kids. While he enjoys basketball, he sees it more as a lifelong hobby than a professional path.
