personas:
  professional: Ray Sams is a budding robotics enthusiast and aspiring game modder who blends curiosity‑driven tinkering with practical problem solving during after‑school STEM club sessions, and they often
    turn their Minecraft creations into prototype code.
  sports: Ray Sams shoots hoops at the neighborhood community center, loves the fast‑break style of the Oklahoma City Thunder, and participates in the local youth basketball league while also joining a
    seasonal intramural soccer team in the spring, balancing competitive play with casual pick‑up games, and they thrive on the camaraderie of teamwork.
  arts: Ray Sams sketches comic strips inspired by the storytelling of Art Spiegelman and the vibrant art of Lynette Yiadom‑Boakye, while their music playlists feature Kendrick Kendrick and H.E.R., and
    they spend weekend afternoons at the library discovering graphic novels by Brian K. Vaughn.
  travel: Ray Sams enjoys weekend outings to the Tulsa River Parks and the historic Route 66 museum, dreams of a family road trip to the Grand Canyon, and hopes to someday explore New Orleans' jazz heritage,
    preferring low‑cost, adventure‑filled travel over luxury stays, and they often map out routes on a hand‑drawn notebook.
  culinary: Ray Sams helps their family perfect Southern comfort dishes like fried chicken, collard greens seasoned with smoked paprika, and peach cobbler, showing a budding cooking skill level that mixes
    hands‑on experimentation with occasional over‑salting, and they relish the aroma of fresh cornbread baking in the kitchen.
  core: Ray Sams is a curious, community‑rooted teen who toggles between Minecraft modding and basketball, balancing creative bursts with spontaneous spending, and they navigate occasional allergy flares
    while cultivating a love for soulful R&B.
background:
  cultural: Ray grew up in Tulsa’s historic east side, a neighborhood that carries the legacy of Black Wall Street and strong community ties. His family maintains traditions from the Southern African American
    experience, including church gatherings, storytelling, and soulful music that shape his identity. The resilience of his community, coupled with the support of local mentors and family, informs his outlook
    on collaboration, mutual aid, and the importance of preserving cultural heritage.
