  career_goals: Lazara aims to transition from her managerial role into a senior executive position such as Chief Financial Officer, where she can shape financial strategy at an organizational level. She
    is driven to lead finance transformation initiatives that integrate sustainability and social responsibility, particularly projects that support Latin‑American entrepreneurship and cultural institutions.
    Mentoring emerging female finance professionals and building a network that bridges corporate finance with the arts are also central to her long‑term vision. Ultimately, she hopes to launch a boutique
    consultancy that offers culturally informed financial advisory services to underserved communities in Denver and beyond.
