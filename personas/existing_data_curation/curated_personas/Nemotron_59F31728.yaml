    and documentation'', ''Art history knowledge'', ''Digital photography for evidence collection'']'
  hobbies: '[''Visiting art galleries and museums'', ''Reading art history and philosophy books'', ''Street and documentary photography'', ''Playing chess'', ''Hiking in local forest preserves'', ''Attending
    live music and theater performances'', ''Cooking experimental recipes'', ''Volunteering at community art programs'']'
  career_goals: David aims to progress from a frontline surveillance officer to a senior security manager overseeing multiple gaming venues, eventually directing a regional security operations center. He
    plans to obtain certifications in advanced security management and regulatory compliance, while also exploring opportunities that blend his security expertise with his passion for the arts—such as leading
    security for museums or cultural institutions. In the long term, he envisions establishing a consultancy that advises gambling establishments and cultural sites on integrated risk mitigation and visitor
    safety, leveraging his unique interdisciplinary background.
