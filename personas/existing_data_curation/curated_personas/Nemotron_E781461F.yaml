personas:
  professional: Abraham Berry, a veteran construction manager with three decades of experience, leverages meticulous project scheduling, rigorous budget control, and OSHA‑compliant safety standards while
    integrating BIM technology; they apply their methodical, organized mindset to keep every site running like a well‑tuned chess board and quietly champion mentorship and sustainable design as they transition
    toward consulting.
  sports: Abraham Berry, an avid walker and weekend pick‑ball player, maintains fitness by strolling the Inner Harbor promenade each morning and joining a local senior recreation club that sponsors a weekly
    pick‑ball league; they cheer for the Baltimore Ravens and follow the Orioles, but prefer low‑impact activities over high‑intensity sports.
  arts: Abraham Berry, a devoted fan of live jazz and blues, regularly attends intimate sets at Baltimore’s historic Keystone Bar featuring artists like Wynton Marsalis and Norah Jones, while their personal
    collection includes recordings of B.B. King, Miles Davis, and Aretha Franklin, and they unwind by photographing architectural details of historic row houses, occasionally experimenting with charcoal
    sketches of the cityscape.
  travel: Abraham Berry, a meticulous planner who values both cultural immersion and relaxation, favors short road trips to historic Southern towns such as Charleston and Savannah for their soulful music
    scenes, has already explored the cobblestone streets of Dublin on a recent overseas adventure, and dreams of a leisurely cruise through the Caribbean while budgeting carefully to preserve retirement
    savings.
  culinary: Abraham Berry, a modest home chef with a green thumb, delights in preparing herb‑infused grilled salmon, collard greens seasoned with smoked turkey, and homemade cornbread using tomatoes and
    basil from their urban garden, while their skill level allows them to restore vintage kitchen tools and occasionally indulge in a fine‑dining tasting menu featuring seared duck breast and wild mushroom
    risotto.
  core: Abraham Berry, a methodical construction veteran who worries about every detail, balances a disciplined work ethic with a quiet love for jazz, woodworking, and community mentorship, all while occasionally
    splurging on vintage tools and struggling to unwind, and they often find themselves double‑checking project plans late into the night.
background:
  cultural: Abraham was raised in a predominantly African‑American neighborhood in Baltimore during the post‑civil‑rights era. His grandparents migrated from the Jim Crow South during the Great Migration,
    bringing Southern gospel traditions, storytelling, and a resilient work ethic. The local church community shaped his values of perseverance, collective uplift, and service. As a Black professional in
    a historically white‑dominated construction industry, he faced systemic barriers and therefore joined networks such as the National Association of Minority Contractors and local advocacy groups promoting
    equitable hiring. His cultural identity is reflected in his deep appreciation for jazz, blues, and soul music; his commitment to mentoring the next generation of Black tradespeople; and his pride in
    contributing to the built environment of his city while honoring his family’s heritage.
attributes:
