  hobbies: '[''Woodworking'', ''Reading historical non-fiction'', ''Gardening'', ''Chess'', ''Jazz and blues listening'', ''Community volunteering (Habitat for Humanity)'', ''Genealogy research'', ''Urban
    photography'']'
  career_goals: At 61, Abraham aims to transition from day‑to‑day site management to a consulting and mentorship role. He plans to earn a LEED Accredited Professional credential and champion sustainable
    building practices across Baltimore County projects. He is driven to influence local building codes to incorporate green standards and to develop a mentorship program for young Black construction professionals,
    partnering with trade schools and minority contractor networks. Abraham also hopes to author a practical guide on efficient project delivery for mid‑size contractors, ensuring his legacy of safety culture,
    methodological rigor, and increased industry diversity before a phased retirement.
