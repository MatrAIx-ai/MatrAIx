persona_description: A professional geologist who is responsible for developing and implementing groundwater monitoring plans for specific aquifers, focusing on the assessment of long-term water quality
  and potential threats to well-field water quality. This person has extensive experience in groundwater flow modeling, particle-tracking analysis, and water-quality data collection. They are skilled in
  determining the source contributions to monitoring wells and supply wells, as well as selecting monitoring wells for annual sampling based on groundwater travel times and contributing recharge areas.
  This individual is responsible for providing an estimate of the maximum potential lead time available for remedial action, while minimizing sample redundancy.
