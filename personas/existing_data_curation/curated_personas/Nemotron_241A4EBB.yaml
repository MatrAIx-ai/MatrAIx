  hobbies: '["Vegetable Gardening", "Birdwatching", "Historical Fiction Reading", "Knitting", "Quilting", "Southern Cooking and Canning", "Crossword Puzzles", "Hiking in Carvers Creek State Park", "Model
    Train Collecting", "Visiting Local Historical Sites"]'
  career_goals: As she approaches retirement, Tina aims to cement her legacy by formalizing the best‑practice manuals she has refined over decades, ensuring a smooth transition for her successor. She plans
    to obtain a Certified Supply Chain Professional (CSCP) credential to validate her expertise before stepping back into a part‑time consulting role, helping nearby small businesses adopt efficient logistics.
    Tina also hopes to champion sustainable practices within her organization, such as reducing fuel consumption and integrating electric vehicles into the fleet, and to mentor a younger generation of women
    in the traditionally male‑dominated field of transportation management.
