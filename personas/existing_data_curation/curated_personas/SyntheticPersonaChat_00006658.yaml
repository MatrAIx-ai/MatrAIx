    User 1: So, what''s your favorite genre of music to play?

    User 2: I love playing jazz. It''s the most expressive genre of music, in my opinion.

    User 1: I''ve never really listened to jazz before, but I''m always open to new things.

    User 2: You should definitely give it a try! I think you''ll like it.

