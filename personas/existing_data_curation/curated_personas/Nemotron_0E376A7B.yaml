personas:
  professional: Tania Ocampo, a seasoned business operations manager, leverages their 15 years of process optimization, supply-chain coordination, and data-driven performance monitoring to streamline workflows
    while balancing a pragmatic, organized approach with occasional curiosity-driven innovations, using their bilingual fluency to unite diverse teams and drive collaborative success.
  sports: Tania Ocampo fuels their energetic lifestyle through weekly Zumba sessions at the Riverwalk Fitness Club, follows the Tampa Bay Buccaneers and Lightning with seasonal enthusiasm, and participates
    in a community soccer league, embracing group fitness as a social and motivational outlet.
  arts: Tania Ocampo embraces artistic expression by dancing to the vibrant rhythms of Celia Cruz and Carlos Vives at local Latin clubs, attending live performances by the Tampa Symphony, and admiring the
    murals of Diego Rivera during museum visits, weaving music, dance, and visual art into their weekly leisure.
  travel: Tania Ocampo favors culturally immersive, well-planned trips, having explored Cartagena’s historic old town, the culinary markets of Oaxaca, and the sun-kissed beaches of the Florida Keys, while
    dreaming of a road adventure through the American Southwest’s national parks.
  culinary: Tania Ocampo delights in cooking traditional dishes such as arepas with fresh cornmeal, empanadas filled with seasoned beef and plantain, and a hearty bandeja paisa featuring red beans, chorizo,
    pork belly, and a sunny-side-up egg, always finishing with a splash of aji picante and a cup of Colombian coffee.
  core: Tania Ocampo blends a data-driven operations mindset with a lively salsa spirit, channels anxiety into meticulous budgeting and nightly journaling, yet often overcommits to social events, leaving
    little room for quiet downtime.
background:
  cultural: Tania was born and raised in Colombia before moving to the United States as a young adult. Her upbringing was steeped in Colombian traditions—family gatherings centered around music, dance,
    and hearty meals, with an emphasis on hospitality and communal support. The vibrant rhythms of cumbia, vallenato, and salsa shaped her love for dance, while the flavors of her homeland influence her
    cooking. As a member of the Colombian diaspora in Saint Petersburg, FL, she maintains strong ties to her cultural community through local festivals, a Colombian cultural club, and by speaking Spanish
    at home. This bicultural experience fuels her adaptable mindset and her desire to bridge Latino and broader American business networks.
