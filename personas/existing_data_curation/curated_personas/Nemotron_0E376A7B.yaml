  career_goals: Tania aims to advance into a senior operations manager role within the next three years, where she can lead larger strategic initiatives and mentor emerging talent. She is also interested
    in spearheading digital transformation projects that integrate automation and analytics into everyday workflows, while maintaining the human touch she values. Long‑term, she envisions launching a consultancy
    focused on helping small businesses in the Tampa Bay area improve operational efficiency, especially those owned by fellow Latino entrepreneurs. Balancing career growth with personal well‑being, she
    plans to incorporate regular mindfulness practices to manage her emotional reactivity.
