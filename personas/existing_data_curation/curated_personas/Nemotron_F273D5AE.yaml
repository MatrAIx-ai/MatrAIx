personas:
  professional: Ketty Asencio, a veteran administrative specialist with over three decades of experience orchestrating office operations, leverages bilingual fluency, mastery of Microsoft Office, Google
    Workspace, and digital signature platforms to streamline executive schedules, while their relaxed attitude toward strict filing occasionally leaves a stray memo or two on the floor.
  sports: Ketty Asencio enjoys gentle fitness through daily park walks, joins the Alburtis Senior Fitness Club for low‑impact yoga, cheers for the Philadelphia Eagles on Sundays and follows the Philadelphia
    Phillies during baseball season, while also taking part in spirited domino tournaments at the community center.
  arts: Ketty Asencio finds artistic fulfillment humming along with the church choir, listening to classics like Celia Cruz, Simón Díaz, and Juan Luis Guerra, losing themselves in Agatha Christie mysteries
    and historical novels, and knitting scarves while recalling the melodies of traditional folk songs.
  travel: Ketty Asencio favors relaxed road trips and occasional short flights, having savored the Mardi Gras revelry in New Orleans, the coastal breezes of the Dominican Republic, and the historic charm
    of Cartagena, Colombia, while dreaming of a future pilgrimage to the colonial towns of Iberia that blend their love of history and culture.
  culinary: Ketty Asencio’s kitchen is a hub of flavor, regularly preparing arepas stuffed with queso fresco, hallacas brimming with olives, raisins, and capers, and sweet cachapas drizzled with melted
    butter, all complemented by garden‑fresh cilantro, plantains, and a dash of ají dulce, which they share generously with neighbors and church friends.
  core: Ketty Asencio blends decades of administrative expertise, a relaxed curiosity, and a generous spirit into a lively retirement focused on community, music, cooking, and mentoring.
background:
  cultural: Born in Venezuela, Ketty grew up immersed in the vibrant traditions of her homeland—family gatherings centered around shared meals, celebrations of Carnaval, and the rhythmic sounds of joropo
    and salsa. She emigrated to the United States in her early thirties, eventually settling in Alburtis, Pennsylvania, where she blended her Latin heritage with the quiet Mid‑Atlantic lifestyle. Bilingual
    in Spanish and English, she preserves Venezuelan customs by cooking beloved recipes, celebrating national holidays like Independence Day (5 July) and Día de la Madre, and participating in local Latino
    community events. Her Catholic upbringing influences her involvement in the church’s charitable activities. While fully integrated into American society—observing holidays such as Thanksgiving and Fourth
    of July—she maintains a strong connection to her roots, using her cultural perspective to foster inclusivity and harmony in both her professional and community engagements.
attributes:
  skills: '["Office administration", "Microsoft Office Suite", "Bilingual communication (Spanish/English)", "Scheduling and calendar management", "Travel coordination", "Data entry and record keeping",
