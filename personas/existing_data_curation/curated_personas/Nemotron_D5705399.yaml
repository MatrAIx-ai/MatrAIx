personas:
  professional: Trini Richardson is a diligent host at a boutique restaurant in Paso Robles, where their strong customer‑service instincts, meticulous POS and reservation management, and calm demeanor during
    peak hours reflect a deep preference for routine and reliable performance, while their modest competitive drive fuels a steady push toward supervisory responsibilities.
  sports: Trini Richardson enjoys weekend hikes along the Paso Robles vineyards and is a member of the local hiking club, while they follow the San Luis Obispo Breakers baseball team and occasionally join
    a community yoga class that doubles as a low‑impact fitness routine.
  arts: Trini Richardson spends quiet evenings reading contemporary fiction by authors such as Sally Rooney and listening to indie folk musicians like Phoebe Bridgers, while they regularly visit the Paso Robles
    Wine & Arts Festival to admire local painters and attend acoustic performances by regional singer‑songwriters.
  travel: Trini Richardson prefers low‑key road trips that blend scenic vineyard tours with small‑town charm, having explored Santa Barbara’s coastline and Napa Valley’s wineries, and they dream of a future
    backpacking tour through Tuscany’s vineyards once they finish their hospitality certification.
  culinary: Trini Richardson enjoys baking classic chocolate‑chip cookies and rustic apple pie for friends, balances that with a knack for whipping up simple lemon‑garlic pasta using fresh local herbs,
    and they relish pairing their creations with a glass of Paso Robles Zinfandel.
  core: Trini Richardson is a routine‑loving, quietly competitive small‑town host who blends a love for simple baking, solitary hikes, and meticulous budgeting into a steady, dependable lifestyle, though
    they sometimes over‑schedule themselves to prove reliability.
background:
  cultural: Trini grew up in the small‑town atmosphere of Paso Robles, California, within a predominantly white, middle‑class community where the wine and agricultural industries shape daily life. Her family
    traces its roots to Midwestern American heritage, emphasizing practicality, modesty, and community involvement. The region’s close‑knit social fabric, occasional exposure to Spanish language and culture
    due to nearby Hispanic communities, and a strong local focus on hospitality have influenced her values and outlook, reinforcing her preference for routine, reliability, and modest competition.
attributes:
  skills: '[''Customer service'', ''Reservation management'', ''POS operation'', ''Cash handling'', ''Basic food safety'', ''Time management'', ''Attention to detail'', ''Conversational Spanish'', ''Conflict
