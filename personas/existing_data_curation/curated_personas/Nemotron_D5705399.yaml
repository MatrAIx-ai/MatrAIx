  hobbies: '[''Reading contemporary fiction'', ''Journaling'', ''Baking desserts'', ''Hiking local trails'', ''Photography of vineyards'', ''Yoga'', ''Small‑group wine tasting'']'
  career_goals: Trini aims to advance within the hospitality field by first obtaining a supervisory role as a shift lead or assistant manager within the next two to three years. She plans to enroll in a
    community‑college hospitality program to gain formal credentials, with the long‑term ambition of managing a boutique restaurant or opening her own coffee shop that emphasizes a welcoming, routine‑oriented
    atmosphere. Her competitive drive pushes her to seek promotions that recognize her reliability and practical skill set.
