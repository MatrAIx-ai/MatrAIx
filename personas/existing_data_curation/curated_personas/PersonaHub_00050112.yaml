persona_description: A global advocate for gender equality and women's rights, particularly in the context of sub-Saharan Africa. This person is passionate about promoting legislation and policies that
  support women's freedom of movement, equal access to employment, and marriage rights. They are also committed to addressing the legal gender gaps in Africa by supporting reforms that protect women from
  violence and discrimination in employment, and help them access credit and entrepreneurship opportunities. This person believes that legal restrictions on women's ability to make economic decisions can
  have far-reaching consequences and is dedicated to helping governments level the playing field so women can seize economic and other opportunities.
