  career_goals: Robert aspires to a career that combines his desire to help others with a stable, routine‑oriented environment. He dreams of becoming a school counselor or a pediatric nurse, positions where
    he can provide emotional support and practical assistance to children. He is also intrigued by the idea of designing simple digital tools that promote mental well‑being for his peers, imagining a future
    where he might study psychology or social work and integrate technology to create supportive resources. He hopes to attend college, earn a degree in a caring profession, and later work in an environment
    that values community harmony.
