personas:
  professional: Robert Ivey, a 12-year-old budding coder, spends his afternoons turning fantasy stories into simple Scratch games and LEGO-inspired animations, channeling his love for routine and compassionate
    storytelling into projects that encourage cooperative play, and they relish the sense of order each completed level brings.
  sports: Robert Ivey, a fan of the San Francisco Giants and the Golden State Warriors, participates in the Palo Alto Youth Soccer Club's after-school practice and maintains a weekend habit of walking along
    the Baylands Trail, using physical activity as a soothing counterbalance to his worry, and they feel more relaxed after each walk.
  arts: Robert Ivey, who devours Harry Potter and Artemis Fowl series, draws daily comic strips inspired by the expressive style of Bill Watterson, listens to C418's Minecraft soundtrack while building
    LEGO architecture, and enjoys rewatching Studio Ghibli films like Spirited Away, channeling his routine-driven creativity into rich visual storytelling, and they often share their comics with friends
    at school.
  travel: Robert Ivey, who has visited Yosemite's granite cliffs and Disneyland with his family, dreams of exploring Kyoto's historic temples and the LEGO House in Billund, Denmark, favoring trips that
    are meticulously planned with daily schedules and low-stress activities such as nature walks and library tours, and they always pack a sketchbook for each trip.
  culinary: Robert Ivey, who favors comfort foods like pepperoni pizza, creamy mac and cheese, and homemade banana muffins spiced with cinnamon, occasionally experiments with avocado toast topped with sesame
    seeds and tries simple sushi rolls after watching cooking videos, though they often forget to stay hydrated.
  core: Robert Ivey is a routine-loving, compassionate 12-year-old who channels his solitary interests—LEGO building, Scratch coding, and comic sketching—into orderly creative outlets, balances careful
    savings with occasional snack splurges, and while they navigate daily worries with a mix of meticulous planning and gentle self-acceptance, they also find comfort in quiet moments of imagination.
background:
  cultural: 'Robert is a White American growing up in Palo Alto, a suburb of Silicon Valley. His family belongs to the middle‑class, with parents who work in the tech industry and value education, environmental
    stewardship, and community involvement. The region’s culture emphasizes innovation, sustainability, and inclusivity, exposing him to a diverse population yet his household retains traditional suburban
    values: respect for routine, personal responsibility, and a modest, pragmatic outlook. He celebrates mainstream American holidays and participates in community events like neighborhood clean‑ups, reflecting
    a blend of local tech‑savvy culture and conventional American upbringing.'
