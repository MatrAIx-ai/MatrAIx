  hobbies: '["Visiting art galleries and museum exhibitions", "Playing acoustic guitar in jam sessions", "Weekly basketball league", "Digital street photography", "Board-game nights", "Hiking in state parks",
    "Exploring local food markets", "Volunteering at community food bank"]'
  career_goals: Micheal aims to earn his GED within the next year and enroll in a community-college certificate program in arts administration or digital media. He aspires to secure a full-time position
    as a community arts coordinator for a local non-profit or municipal arts council, where he can blend his passion for art, event planning, and community engagement. In the longer term, he hopes to launch
    a small pop-up gallery-café that showcases emerging Midwestern artists and provides a social hub for creative collaboration. He also seeks mentorship opportunities that will help him turn his competitive
    drive into measurable achievements in the cultural sector.
