    to experience new cultures'']'
  career_goals: Kelly aims to move from a front‑line representative role into a supervisory or team‑lead position where she can coach agents, refine service workflows, and spearhead training initiatives.
    She plans to obtain a Customer Experience Management certification and enroll in business courses at a community college to gain formal credentials. In the short term she wants her team to become the
    highest‑scoring unit in the region and to win internal performance contests. Long‑term, she dreams of launching a small boutique that offers authentic Puerto Rican baked goods and catering for community
    events, leveraging her culinary passion, bilingual abilities, and network within Chicago’s Puerto Rican diaspora.
