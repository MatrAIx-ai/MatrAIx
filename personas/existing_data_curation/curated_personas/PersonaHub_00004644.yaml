persona_description: A medical expert who specializes in eye health and is particularly concerned about the potential long-term effects of electronic cigarettes on the eye. Dr. Nigel Best, a renowned ophthalmologist,
  warns that some types of e-cigarettes can cause irritation in the form of dry eye, and studies have shown that e-cigs can have potentially five to 15 times more formaldehyde than traditional cigarettes.
  He advises smokers to avoid vaping and to use common sense when purchasing e-cigarettes.
