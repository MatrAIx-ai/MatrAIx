    art program'']'
  career_goals: Sherry dreams of becoming a multimedia artist who blends illustration, animation, and interactive technology. She aims to earn a scholarship to a competitive arts-focused high school and
    eventually pursue a degree in visual arts or game design. Her competitive spirit drives her to win state art contests and coding challenges, while she also hopes to use her talents to create community
    art projects that celebrate African American heritage in Texas.
