personas:
  professional: Sherry Heyward, an aspiring teen visual artist, leverages their curiosity and methodical planning to master sketching, digital illustration, and community workshop facilitation, while their
    competitive edge drives them to perfect each piece and their skepticism ensures they critique feedback rigorously.
  sports: Sherry Heyward, a forward for the Lakeside Youth Soccer Club who avidly follows City United FC, combines competitive drive with methodical training—tracking detailed practice logs, joining seasonal
    track meets in spring, and keeping summer fitness high with swimming laps at the community pool.
  arts: Sherry Heyward, an emerging visual storyteller, fills sketchbooks with characters inspired by Alison Bechdel’s memoirs, Stan Lee’s superheroes, and Hayao Miyazaki’s fantastical worlds, while experimenting
    with Procreate, curating playlists of Anderson .Paak and jazz for creative flow, and mentoring younger kids at the community center’s after‑school art program.
  travel: Sherry Heyward loves weekend road trips to Washington, D.C.’s National Air and Space Museum and summer visits to Orlando’s theme parks, while dreaming of a spring pilgrimage to Tokyo’s Akihabara
    to explore manga boutiques, always planning trips with school permission forms and parental budget limits in mind.
  culinary: Sherry Heyward, a budding home chef, prefers margherita pizza, miso ramen and avocado toast, skilfully whipping up chocolate chip pancakes on Saturday mornings with fresh mozzarella, seaweed
    flakes and matcha powder, though they often over‑season in excitement before tasting.
  core: Sherry Heyward is a curious, competitive teen artist who channels meticulous planning, social energy, and occasional anxiety into sketching, soccer, and fearless exploration of new ideas.
background:
  cultural: Sherry is a Black teenager raised in Frisco, Texas, where she balances the traditions of her African American family—such as church gatherings, Juneteenth celebrations, and family storytelling—with
    the multicultural environment of a rapidly growing suburb. Her family has roots in the Southern United States, and she often shares stories of her grandparents' migration from the Mississippi Delta.
    This heritage informs her appreciation for Black art and music, and she actively participates in local cultural events that celebrate both her community's history and the diverse fabric of Texas.
