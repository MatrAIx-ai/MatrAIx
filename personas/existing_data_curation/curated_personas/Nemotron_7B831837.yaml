  hobbies: '[''landscape sketching'', ''nature photography'', ''philosophy and art theory reading'', ''hiking'', ''birdwatching'', ''woodworking (miniature cabins and furniture)'', ''journaling'', ''mindfulness
    meditation'', ''listening to ambient music and classical piano'']'
  career_goals: Calvin aspires to build a career that merges his love for art, research, and independent work. In the short term he plans to complete a certificate in museum studies and secure an internship
    at the Redwood County Historical Society, where he can curate small exhibitions that highlight the region’s agricultural heritage and contemporary art. Over the next five years he hopes to earn a Master’s
    degree in Curatorial Studies and become a professional curator or archivist for a regional museum or cultural nonprofit, designing exhibitions that encourage reflective, solitary experiences for visitors.
    Concurrently, he intends to develop a freelance portfolio of digital illustrations and nature photography, eventually publishing a photobook that documents the prairie landscapes of southwestern Minnesota.
    His long‑term ambition is to combine curatorial practice with independent visual storytelling, allowing him to work largely autonomously while contributing to the cultural preservation of his community.
