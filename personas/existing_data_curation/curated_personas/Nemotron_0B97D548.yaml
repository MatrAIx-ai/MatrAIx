  career_goals: As she transitions toward the final phase of her career, Kayla aims to leverage her extensive knowledge to give back to both her organization and the broader community. Her primary ambitions
    include developing and implementing an ESG-focused investment strategy within her firm, establishing a financial-literacy outreach program for seniors and young adults in Westmoreland County, and moving
    into a senior advisory role where she can mentor emerging finance talent. Kayla also plans to author a practical guide on retirement planning for baby-boomers, and to serve on the board of the local
    arts council, aligning her professional expertise with her longstanding passion for the arts and community service.
