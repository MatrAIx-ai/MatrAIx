  career_goals: Although retired, Wilson aims to continue contributing to his community by leading the annual Lancaster Harvest Festival, establishing a mentorship program for high school students interested
    in trades, and documenting the oral histories of longtime residents. He also seeks to maintain his physical health through daily walks and to learn digital photography to capture local landscapes.
