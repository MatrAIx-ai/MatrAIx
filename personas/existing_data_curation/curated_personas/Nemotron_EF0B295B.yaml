personas:
  professional: Wilson Coon, a retired farm manager turned community events coordinator, applies their lifelong carpentry, budgeting, and volunteer leadership expertise to meticulously orchestrate the Lancaster
    Harvest Festival, imposing a disciplined routine while energizing volunteers with an assertive, sociable flair.
  sports: Wilson Coon stays active through daily walks with the local seniors' walking club, enjoys seasonal fishing expeditions on Lake Logan, and roots for the nearby Lancaster County Lions football team
    while participating in the town’s senior bowling league every Thursday night.
  arts: Wilson Coon, a regular tenor in the church choir, finds solace in singing hymns by Thomas Moore and folk ballads by Johnny Cash, while also attending the regional community theater’s productions
    of classic plays starring local actor Margaret Hayes, and collects prints of Norman Rockwell’s Americana scenes.
  travel: Wilson Coon prefers well‑planned, short‑drive road trips to historic sites such as Gettysburg and the Shenandoah Valley, enjoys organized senior group tours to the Blue Ridge Parkway, and dreams
    of a low‑key pilgrimage to the Grand Canyon but keeps it on the back‑burner due to budget constraints.
  culinary: Wilson Coon delights in cooking garden‑fresh ratatouille, preparing a signature rosemary‑infused roast chicken, and perfecting a tangy apple‑cider glaze for barbecued pork ribs, showcasing a
    confident intermediate‑to‑advanced skill set while often over‑seasoning dishes with a generous dash of salt.
  core: Wilson Coon blends disciplined routine with a gregarious spirit, meticulously planning community events while never missing a bridge game, yet habitually misplaces their glasses and can’t resist
    a second slice of pie at every barbecue.
background:
  cultural: Wilson grew up in the rural Midwest, raised in a family with Irish and English ancestry that settled in Hocking County generations ago. He embodies traditional Midwestern values—self‑reliance,
    practicality, and a strong sense of community—shaped by his lifelong involvement in local church, the volunteer fire department, and agricultural life. His worldview reflects a blend of Protestant ethics,
    a love for seasonal farming cycles, and a commitment to preserving the small‑town heritage of Lancaster, Ohio.
