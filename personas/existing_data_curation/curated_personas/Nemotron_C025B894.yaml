personas:
  professional: Jailene Velez is a veteran secondary STEM educator with over thirty years designing rigorous, standards-aligned curricula, integrating learning management systems and robotics projects,
    and mentoring bilingual classrooms, whose preference for structure and competitive drive fuels their ambition to become district STEM coordinator and secure grant-funded engineering programs for under-represented
    students.
  sports: Jailene Velez enjoys sunrise walks along the Miami Beach shoreline, participates in a senior-friendly tennis club at a local community center, closely follows the Miami Heat and Miami Marlins,
    and they use weekend yoga sessions as a competitive way to improve flexibility, preferring small-group fitness activities over large crowds.
  arts: Jailene Velez draws artistic inspiration from Monet’s impressionist landscapes, Bill Evans’ jazz piano, and the poetry of Pablo Neruda, regularly visits the Miami Art Deco museum, and they engage
    in a modest book club that blends science nonfiction with occasional screenings of Christopher Nolan’s films.
  travel: Jailene Velez plans trips with a blend of detailed research and spontaneous detours, favoring sunrise-lit Key West and the architectural wonders of Barcelona, and they budget modestly for family
    visits while preferring small-group guided tours that allow personal reflection.
  culinary: Jailene Velez cultivates a thriving balcony herb garden of cilantro, oregano, and mint, which they incorporate into family dishes such as roasted chicken with salsa verde and homemade corn tortillas,
    demonstrating their confident home‑cook level that enjoys experimenting with spice blends and occasional visits to gourmet food festivals.
  core: Jailene Velez blends a structured, competitive spirit with a love for solitary puzzles, garden herbs, and modest DIY tech projects, and they navigate life with pragmatic flexibility, a touch of
    skepticism, and steady emotional stability.
background:
  cultural: Jailene was raised in a Mexican-American household where Spanish was spoken daily and family gatherings centered around food, music, and Catholic traditions. She celebrates Día de los Muertos
    and incorporates Mexican cultural themes into classroom projects, such as designing math problems based on traditional crafts. Her bilingual fluency allows her to connect with Hispanic families in Miami-Dade
    County, and she often uses culturally relevant examples to make STEM concepts relatable. While she embraces her Mexican heritage, she also appreciates the multicultural vibrancy of Miami Beach, blending
    these influences in her teaching and community involvement.
attributes:
  skills: '[''Advanced mathematics instruction (Algebra, Geometry, Calculus)'', ''Physics teaching (Mechanics, Electricity & Magnetism)'', ''STEM curriculum development'', ''Educational technology integration
