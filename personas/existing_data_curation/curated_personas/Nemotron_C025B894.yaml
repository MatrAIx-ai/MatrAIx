    and peer coaching'', ''Project-based learning facilitation (Robotics, Engineering design)'', ''Professional development facilitation'']'
  hobbies: '[''Herb gardening'', ''Cooking Mexican cuisine'', ''Morning beach walks'', ''Sudoku and logic puzzles'', ''DIY electronics (Arduino projects)'', ''Science nonfiction reading'', ''Small-group
    book club'', ''Volunteer tutoring'', ''Photography of nature and architecture'']'
  career_goals: She aims to become the lead STEM coordinator for her district, shaping curriculum standards and securing grant funding for after-school robotics and engineering programs that target under-represented
    Hispanic youth. Jailene also seeks recognition as a Teacher of the Year and plans to publish articles on culturally responsive STEM instruction in educational journals. In the longer term, she envisions
    moving into an administrative role, such as assistant principal, where she can champion data-informed decision-making and expand mentorship pipelines for new educators.
