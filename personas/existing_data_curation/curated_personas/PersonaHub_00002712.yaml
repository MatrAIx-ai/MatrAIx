persona_description: 'A Brazilian scientist who has dedicated almost 30 years to the study of marine algae, particularly focusing on the Benthic Marine Algae of the calls, a diverse group of plants that
  includes five divisions: Cyanophyta, Chrisophyta, Rhodophyta, Phaeophyta, and Chlorophyta. The scientist has published over 130 papers in the field, but has yet to produce a comprehensive study that brings
  together the knowledge of several publications scattered to make a synthesis of the results already achieved. The scientist is interested in analyzing the Brazilian marine flora as its relations with
  other floras known, their character, and their phytogeographical origin probable.'
