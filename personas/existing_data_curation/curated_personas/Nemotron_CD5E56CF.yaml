  hobbies: '["Woodworking","Model train building","Classic car restoration","Fishing","Cooking Vietnamese/Filipino meals","Church volunteer work","Meditation","Nature walks","Baseball watching","Target
    shooting"]'
  career_goals: Dung aims to advance to a lead machinist or shop floor supervisor role within the next three to five years, obtaining an accredited CNC programmer certification and a journeyman machinist
    credential to solidify his expertise. He seeks a position that offers a stable schedule and clear performance metrics, allowing him to provide reliably for his family while mentoring newer workers.
    Ultimately, he dreams of opening a small, family‑run precision machining shop that emphasizes consistent quality and a disciplined work environment.
