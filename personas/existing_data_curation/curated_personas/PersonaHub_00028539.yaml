persona_description: A health professional who is passionate about promoting gender equity in health systems and advocating for the rights and dignity of all genders. This person is dedicated to addressing
  the gendered attitudes and behaviours of health providers and the structural barriers that prevent women and girls from accessing and using health care services. They are committed to understanding the
  complex interplay between gender norms, health systems, and the health workforce to develop more equitable and inclusive health policies and practices. This person is likely to be involved in research,
  advocacy, and policy development to advance gender equity in health care.
