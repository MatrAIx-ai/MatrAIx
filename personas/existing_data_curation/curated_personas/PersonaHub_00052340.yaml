persona_description: A geologist or hydrologist who is interested in studying drainage systems and their relationship with valley-bottom gradient. This person is likely to have expertise in using data from
  fieldwork and laboratory experiments to analyze the characteristics of drainage systems, including the relationship between catchment area and valley-bottom gradient. They may have experience working
  with large datasets, such as those used in the analysis of the plots in the text, and may have a background in computer science or statistics to help interpret and visualize the data. They may also have
  an interest in the role of debris flows in the erosion of drainage systems.
