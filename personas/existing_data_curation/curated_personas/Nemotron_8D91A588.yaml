personas:
  professional: Milagros Au, a 36-year-old postsecondary educator at Lake-Sumter State College, blends their graduate training in curriculum design with mental-health first-aid expertise to craft inclusive,
    emotionally responsive courses while flexibly adapting lesson plans on the fly to meet adult learners' anxieties.
  sports: Milagros Au enjoys weekend hikes with the Suwannee Trail Club, tracks bird sightings at Lake Okeechobee, and attends Orlando Magic games to unwind, while they also practice weekly Vinyasa yoga
    at a local studio and occasionally join a community softball league.
  arts: Milagros Au immerses themselves in contemporary fiction by authors like Zadie Smith, devours philosophy texts by Martha Nussbaum, finds inspiration in Yo-Yo Ma's cello performances, and channels
    their creativity into crocheting blankets for shelters, often listening to the ambient soundscapes of Brian Eno while stitching.
  travel: Milagros Au prefers thoughtfully planned nature-focused trips, having explored the historic squares of Savannah, trekked the bamboo groves of Kyoto, and set their sights on bird-watching in Costa
    Rica's Monteverde Cloud Forest, while balancing travel costs with a modest savings plan.
  culinary: Milagros Au experiments with Asian-fusion Southern cuisine, regularly preparing miso-glazed catfish with collard greens, lemongrass-infused gumbo, and Thai-basil chicken tacos topped with peach
    chutney, while their herb garden yields fresh basil, cilantro, and rosemary that they sprinkle liberally—sometimes to the point of over-seasoning.
  core: Milagros Au is a compassionate, hyper-empathic educator who balances meticulous planning with spontaneous creativity, channeling anxiety into community service, yoga, and a garden of herbs that
    fuels experimental cooking.
background:
  cultural: Milagros was born to immigrant parents from Taiwan who settled in Florida in the early 1990s. She grew up bilingual in English and Mandarin, celebrating Lunar New Year, the Mid‑Autumn Festival,
    and other traditional customs alongside typical Southern celebrations such as Fourth of July barbecues and local church gatherings. Her Asian heritage emphasizes respect for education, family cohesion,
    and community service, values that she weaves into her teaching philosophy. At the same time, the laid‑back, nature‑focused lifestyle of Lake Placid influences her love for outdoor activities and a
    community‑oriented outlook. This blend of Asian and Floridian cultural influences informs her approach to fostering inclusive classrooms, encouraging cross‑cultural dialogue, and promoting holistic
    well‑being among her students.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Technology Integration'', ''Adult Learning Theory'', ''Student Advising and Counseling'', ''Cross-cultural Communication'', ''Assessment
    Design'', ''Collaborative Learning Facilitation'', ''Emotional Intelligence and Support'', ''Mentorship and Peer Coaching'']'
  hobbies: '[''Reading contemporary fiction'', ''Gardening herbs and native plants'', ''Cooking Asian‑Fusion meals'', ''Yoga and meditation'', ''Journaling'', ''Hiking in state parks'', ''Birdwatching at
    Lake Okeechobee'', ''Volunteering at literacy programs'', ''Crocheting for community shelters'']'
  career_goals: Milagros aims to secure tenure and eventually become a department chair at Lake‑Sumter State College, where she can shape policy for inclusive and emotionally responsive pedagogy. She intends
    to design and lead a campus‑wide mental‑health initiative that equips faculty and students with tools to manage anxiety and stress. Her research agenda focuses on the impact of emotional reactivity
    on student learning outcomes, with plans to publish in peer‑reviewed journals. She also aspires to mentor new teachers, develop culturally responsive curricula, and integrate more experiential learning
    opportunities that connect classroom concepts with the local community and natural environment.
