  career_goals: Michael aims to re‑enter the workforce in a structured, leadership‑focused role such as Operations Manager for a regional retail or logistics company, where he can apply his systematic planning
    and analytical skills. He plans to obtain a PMP certification within the next year to solidify his credentials. In parallel, he envisions launching a small import‑export business that brings Honduran
    artisanal goods to the Alabama market, leveraging his bilingual ability and cultural connections. Ultimately, Michael aspires to become a recognized community business leader, speaking at local business
    forums and mentoring young Latino entrepreneurs while achieving financial stability and professional recognition.
