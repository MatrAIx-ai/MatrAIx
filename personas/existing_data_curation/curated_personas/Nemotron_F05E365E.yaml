personas:
  professional: Michael Revueltas is a methodical operations manager‑in‑training who leverages their bilingual communication, meticulous project planning, and charismatic public‑speaking to streamline regional
    retail logistics while championing community partnerships.
  sports: Michael Revueltas plays weekly recreational basketball with the Decatur Community League, follows the Atlanta Hawks and Atlanta Falcons avidly, and maintains a disciplined fitness routine tracked
    through a Fitbit, including monthly hikes in the Blue Ridge Mountains; they prioritize consistency over intensity.
  arts: Michael Revueltas enjoys jazz fusion like Snarky Puppy, Latin pop from Juan Luis Guerra, and regularly attends performances at the Atlanta Symphony Orchestra; they often quote inspirational lines
    from their favorite business podcasts during discussions of the arts.
  travel: Michael Revueltas prefers structured trip planning, booking weekend retreats to the Blue Ridge Mountains with their hiking group while saving for an ambitious spring break to Cartagena, balancing
    a love for cultural immersion with budget constraints.
  culinary: Michael Revueltas is an intermediate home chef who delights in preparing traditional corn‑tortilla baleadas, yucca mash, and tamale‑style fillings, seasoning with cilantro and lime, and often
    hosts potluck gatherings where friends trade recipes; they view cooking as both a creative outlet and a networking opportunity.
  core: Michael Revueltas blends analytic rigor with infectious sociability, constantly refining PowerBI dashboards between Toastmasters rehearsals, yet they habitually stay up late playing chess against
    themselves when deadlines loom.
background:
  cultural: Michael is a first‑generation American of Honduran descent. He grew up in a bilingual household, celebrating Honduran holidays such as Día de la Independencia and Semana Santa while also participating
    in typical American traditions. The values of family solidarity, community service, and respect for hard work, deeply ingrained in Honduran culture, shape his outlook. Michael maintains strong ties
    to the local Hispanic community in Decatur, often acting as a cultural liaison in business settings. His Catholic upbringing influences his appreciation for community gatherings and charitable activities.
    This bicultural identity gives him a unique perspective that he leverages both personally and professionally.
