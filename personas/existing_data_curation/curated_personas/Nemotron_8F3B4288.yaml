  hobbies: '[''Rotary club participation'', ''Community event organization'', ''Gardening'', ''Woodworking (furniture making)'', ''Classic car restoration'', ''Boston Red Sox fan gatherings'', ''Local theater
    attendance'', ''Volunteer work with Habitat for Humanity'', ''Cooking traditional New England seafood dishes'']'
  career_goals: 'As he approaches retirement, Joshua aims to cement his legacy by mentoring junior architects at his firm and completing a signature project: the restoration and adaptive reuse of a historic
    neighborhood library into a community hub for seniors. He also hopes to win a regional design competition for a small‑scale affordable housing development, showcasing his competitive spirit while reinforcing
    his commitment to practical, community‑focused architecture. Ultimately, he envisions transitioning to a senior advisory role where he can share his routine‑driven, client‑centric approach without the
    day‑to‑day pressures of project management.'
