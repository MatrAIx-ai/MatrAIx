personas:
  professional: Ibrahim Mompremier, a seasoned insurance underwriter, blends his STEM‑grounded analytical rigor, mastery of Excel, SQL, and Python predictive models, and a calm demeanor under pressure to
    rapidly assess complex risk scenarios while they flexibly adjust underwriting guidelines to align with evolving market conditions and pursue a goal of leading a data‑centric underwriting team.
  sports: Ibrahim Mompremier jogs daily through Central Park as part of his fitness regimen, follows the New York Knicks and New York Mets avidly, and belongs to the local NYC Road Runners club, which they
    join for occasional group runs and the annual New York City Marathon.
  arts: Ibrahim Mompremier finds solace in jazz, playing saxophone at intimate gatherings while listening to legends like Miles Davis, John Coltrane, and contemporary innovators such as Kamasi Washington,
    and they frequently visit the Blue Note in Greenwich Village for live performances that fuel their creative side.
  travel: Ibrahim Mompremier prefers flexible, low‑key travel itineraries that blend cultural immersion and relaxation, having explored the vibrant streets of New Orleans, the serene beaches of a nearby
    island where Creole celebrations are held, and they are planning a future trip to Reykjavik to witness the northern lights while balancing their work schedule.
  culinary: Ibrahim Mompremier enjoys experimenting with traditional island dishes such as griyo, legume stew, and diri ak djon djon, skillfully using Scotch bonnet peppers, plantains, and coconut milk,
    while their cooking skill sits at an enthusiastic home‑chef level, often sharing meals during small community gatherings.
  core: Ibrahim Mompremier is a data‑driven underwriter with a love for jazz, solitary runs, and spontaneous cooking, and they balance a structured professional life with a relaxed, occasionally disorganized
    personal routine.
background:
  cultural: Ibrahim identifies as Black with Haitian-Caribbean roots, a heritage reflected in his surname Mompremier. He grew up in a tight‑knit Black community in Brooklyn, where family gatherings, Creole
    language, and Afro‑Caribbean traditions were central to his upbringing. In New York City he stays connected to his cultural background by celebrating Haitian Independence Day, participating in community
    festivals, and supporting local Black-owned businesses. His cultural identity informs his values of resilience, community support, and appreciation for music and cuisine, which he blends seamlessly
    into his professional and personal life.
