  career_goals: Steven envisions a future where he can blend his love for art and structure, aspiring to become an architect who designs innovative, aesthetically striking buildings. He is also fascinated
    by illustration and video game design, hoping to create vivid characters and interactive worlds. Over the next few years, he intends to deepen his drawing, coding, and project management skills to prepare
    for these ambitions.
