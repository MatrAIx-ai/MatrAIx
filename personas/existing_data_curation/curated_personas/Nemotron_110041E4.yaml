personas:
  professional: Steven Platt is a budding technologist who designs simple interactive games in Scratch, builds elaborate LEGO inventions, and approaches each project with methodical planning and boundless
    imagination, turning playtime into a miniature engineering lab.
  sports: Steven Platt rides their bike through the neighborhood each afternoon, plays forward for the Greenfield Rangers Youth Soccer Club, and cheers loudly for the Seattle Seahawks during football season,
    balancing active play with organized team practice.
  arts: Steven Platt spends weekends sketching fantastical landscapes inspired by Studio Ghibli films, listens to violinist Lindsey Stirling while building LEGO scenes, and eagerly reads the graphic novels
    of Jim Henson, letting these artistic influences shape their creative storytelling.
  travel: Steven Platt enjoys family road trips to the nearby state park for nature hikes, has visited the Smithsonian’s National Air and Space Museum on a school field trip, and dreams of exploring the
    magical realms of Universal Studios Orlando and the castles of Edinburgh during future vacations.
  culinary: Steven Platt favors pepperoni pizza, spaghetti Bolognese, and sushi rolls made with cucumber and avocado, enjoys making perfectly toasted grilled cheese sandwiches at home, and often adds a
    sprinkle of parmesan to their favorite mac and cheese, while occasionally sneaking extra chocolate chips into cookie batter.
  core: Steven Platt blends boundless imagination with meticulous planning, turning every hobby from LEGO building to Scratch coding into a mini adventure while juggling a love for fantasy stories and occasional
    impulse spending.
background:
  cultural: Steven grew up in North Haven, a suburban community in New Haven County, Connecticut, where his family follows many traditional American customs such as celebrating Thanksgiving, Christmas,
    and the Fourth of July. His White Anglo-Saxon heritage is reflected in family values that emphasize reliability, modesty, and community involvement. The New England environment, with its strong focus
    on education, access to cultural institutions like the Yale Art Gallery, and a love for outdoor activities, shapes his interests in reading, art, and exploring nature.
