  hobbies: '[''Vegetable gardening'', ''Cooking traditional Southern meals'', ''Knitting and crocheting'', ''Quilting'', ''Listening to gospel and soul music'', ''Reading historical biographies'', ''Walking
    in local parks'', ''Small church tea gatherings'']'
  career_goals: Tiffany's main ambition is to stay healthy, engaged, and useful within her community while preserving the calm routine she values. She hopes to continue volunteering at her church, mentoring
    younger women in cooking and quilting, and passing family recipes to her grandchildren. She also wants to maintain her walking routine, attend occasional health workshops for seniors, and compile a
    short memoir of her life and cultural heritage to share with her family. Travel is limited, but she looks forward to visiting her children and grandchildren during holidays.
