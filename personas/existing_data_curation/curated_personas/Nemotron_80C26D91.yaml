  hobbies: '[''competitive video gaming'', ''basketball'', ''fishing'', ''model car building'', ''Arduino electronics tinkering'', ''reading science and tech magazines'', ''hiking'', ''high school football
    fan'', ''acoustic guitar playing'']'
  career_goals: Joseph aims to turn his hands-on skills into a career as a certified diesel mechanic, planning to earn ASE certifications during high school and pursue an apprenticeship after graduation.
    He envisions eventually opening his own auto-repair shop where he can apply his organized work ethic and competitive drive. Simultaneously, his passion for eSports fuels a secondary goal of qualifying
    for regional competitive gaming tournaments, dreaming of a possible career as a professional gamer or streamer. Long-term, he is intrigued by the disciplined environment of the U.S. Army’s mechanical
    division or the offshore oil industry, viewing them as pathways that combine structure, technical expertise, and clear advancement opportunities.
