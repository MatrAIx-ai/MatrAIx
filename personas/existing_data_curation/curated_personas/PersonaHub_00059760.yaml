persona_description: A wildlife biologist who specializes in the study of CWD, particularly the transmission and impact of the disease on deer populations. Their research interests include, but are not
  limited to, the epidemiology of CWD, the impact of the disease on deer health and behavior, and the development of strategies for controlling and managing the disease in deer populations. They have conducted
  extensive research in Ohio and have published several papers on the topic.
