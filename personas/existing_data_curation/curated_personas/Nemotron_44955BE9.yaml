  hobbies: '[''Visiting Art Galleries'', ''Community Mural Projects'', ''Reading Biographies and Economics'', ''Speculative Fiction'', ''Hiking in Lake Tahoe'', ''Yoga'', ''Cooking Traditional Mexican Cuisine'',
    ''Organizing Día de los Muertos Events'', ''Cultural Education Workshops'']'
  career_goals: Zoila aims to transition into a senior executive role, such as Chief Financial Officer, within a large educational nonprofit or a socially responsible corporation. She plans to spearhead
    initiatives that integrate sustainable fiscal practices, leverage AI‑based financial analytics, and promote financial literacy among educators. Additionally, she aspires to mentor emerging finance professionals,
    especially women and members of underrepresented communities, and eventually launch her own consultancy that offers strategic financial advisory services to schools and cultural organizations. Her long‑term
    ambition includes establishing a scholarship fund that supports Mexican‑American students pursuing higher education in finance and education.
