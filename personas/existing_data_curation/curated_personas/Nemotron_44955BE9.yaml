personas:
  professional: Zoila Delarosa, a bilingual senior financial strategist in the nonprofit education sector, blends meticulous budgeting, risk assessment, and AI‑enhanced analytics with a curiosity for unconventional
    solutions, channeling their competitive drive and calm under pressure into leading cross‑functional teams toward high‑impact fiscal sustainability.
  sports: Zoila Delarosa embraces the outdoors by trekking Lake Tahoe’s Alpine trails with the Sierra Pacific Trail Club, practices yoga three times weekly for mindfulness, follows the Reno Aces baseball
    team in spring and the Vegas Golden Knights in hockey season, and they occasionally join a local senior volleyball league for social fitness.
  arts: Zoila Delarosa regularly visits Reno’s Art District galleries, volunteers on community mural projects inspired by vibrant Día de los Muertos motifs, and draws creative fuel from artists such as
    Banksy, Yayoi Kusama, and contemporary Latin American painter Carlos Almaraz, letting this eclectic visual palate inform both personal style and professional presentations.
  travel: Zoila Delarosa prefers meticulously planned itineraries that balance adventure and cultural immersion, favoring hikes in Yosemite and the Sierra Nevadas, weekend getaways to Lake Tahoe’s wineries,
    and annual trips to the historic streets of Oaxaca for Día de los Muertos workshops, while dreaming of trekking Patagonia’s glaciers and exploring Kyoto’s temples with a flexible, budget‑conscious approach.
  culinary: Zoila Delarosa is an adept home cook who transforms classic corn‑based stews, carnitas tacos with beet‑infused salsa verde, and grilled elote topped with Cotija and locally harvested cherry
    tomatoes into vibrant meals, routinely sourcing fresh Nevada strawberries for a seasonal sorbet, and they relish dining at farm‑to‑table eateries that spotlight seasonal produce.
  core: Zoila Delarosa, a 50‑year‑old bilingual finance strategist driven by competitive ambition, balances razor‑sharp spreadsheet precision with a habit of over‑booking yoga classes, an unapologetic love
    for vintage art catalogues, and a skeptical eye that keeps both colleagues and budgets in check.
background:
  cultural: Zoila’s Mexican heritage is a central part of her identity. Raised in a bilingual household, she grew up celebrating Mexican holidays, music, and cuisine, which fostered a deep respect for family
    and community. The values of perseverance and collective responsibility she learned from her parents influence her collaborative approach at work and her commitment to mentoring others. Living in Reno,
    she maintains strong ties to the local Mexican community through cultural festivals, Spanish‑language book clubs, and culinary gatherings, blending her Mexican roots with the diverse cultural landscape
    of the Pacific Northwest.
attributes:
  skills: '[''Financial Analysis'', ''Strategic Budgeting'', ''Risk Management'', ''Portfolio Management'', ''Data‑Driven Decision Making'', ''Curriculum Alignment'', ''Instructional Leadership'', ''Bilingual
