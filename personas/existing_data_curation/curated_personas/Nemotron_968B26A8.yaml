  hobbies: '[''Scale model building'', ''Chess'', ''Fishing'', ''Herb gardening'', ''Traditional Salvadoran cooking'', ''Photography of woodworking projects'', ''Collecting vintage hand tools'', ''Attending
    woodworking webinars'']'
  career_goals: As a disciplined and competitive professional, Osley aims to transition his freelance work into a boutique custom‑furniture studio that serves upscale clients in the DC metropolitan area.
    He plans to acquire a dedicated workshop space within the next two years, expand his portfolio with sustainable, locally sourced hardwood lines, and obtain the National Association of the Remodeling
    Industry (NARI) Master Craftsman certification. Osley also aspires to mentor a cohort of apprentices through an accredited apprenticeship program, publish a technical guide on efficiency‑driven woodworking,
    and win regional trade awards that recognize craftsmanship excellence.
