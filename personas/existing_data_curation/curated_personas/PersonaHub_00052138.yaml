persona_description: A historian who specializes in the study of Korean history, particularly focusing on the period from the establishment of the Korean Empire in 1897 to its annexation by Japan in 1910.
  His research interests include the history of Korea during this period, the role of the Korean Empire in the larger history of East Asia, and the impact of foreign pressures and threats on the Korean
  state. He is particularly interested in the Gwang-Mu Reform and the abolition of the traditional Korean class/status system.
