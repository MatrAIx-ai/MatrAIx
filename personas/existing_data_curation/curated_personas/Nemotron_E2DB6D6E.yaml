personas:
  professional: Mohammad Singh, a veteran sales engineer specializing in industrial and manufacturing equipment, employs their meticulous organization and calm, data‑driven negotiation style to translate
    complex specifications into clear value proposals, while mentoring underrepresented engineers as they transition toward a consulting role.
  sports: Mohammad Singh follows the Chicago Bears in football, attends Chicago Cubs baseball games in summer, competes in a senior tennis league at the Rockford Community Center, and maintains a daily
    routine of brisk garden walks, believing low‑impact activity sustains both physical health and mental tranquility.
  arts: Mohammad Singh immerses themselves at the Rockford Art Center, mastering watercolor techniques inspired by intricate South Asian motifs while attending live jazz performances by Wynton Marsalis
    and classical Indian recitals featuring sitar virtuoso Ravi Shankar, and they showcase a modest collection of prints by Vincent van Gogh and Anselm Kiefer in their study.
  travel: Mohammad Singh prefers purposeful travel, balancing family reunions in Punjab during major religious celebrations with weekend road trips to historic Midwestern towns such as Galena, Illinois,
    favoring well‑planned itineraries, comfortable boutique hotels, and occasional guided tours of the Taj Mahal when they venture abroad.
  culinary: Mohammad Singh enjoys harvesting fresh cilantro, mint, and fenugreek from their garden to flavor classic Punjabi dishes like sarson da saag with makki di roti and butter chicken, while also
    experimenting with watercolor‑inspired plating for a seasonal zucchini‑rosemary soup served at community gatherings.
  core: Mohammad Singh blends engineering precision with artistic curiosity, habitually cataloguing garden herbs in spreadsheets while indulging late‑night tinkering on vintage radios, a quirk that reflects
    their love for disciplined order and occasional spontaneous creativity.
background:
  cultural: Mohammad was born into a Sikh Punjabi family in the Punjab region of India. He grew up speaking Punjabi and Hindi at home, celebrating festivals such as Vaisakhi and Diwali, and participating
    in community service through the local Sangat. After moving to the United States in his early twenties, he blended his heritage with Midwestern American culture, maintaining daily prayers and attending
    the Gurdwara in Rockford while also embracing local traditions like Thanksgiving. His cultural identity informs his values of humility, service, and perseverance, which he carries into both his professional
    and personal life.
