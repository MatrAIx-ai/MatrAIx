  career_goals: Approaching retirement, Mohammad aims to shift from full‑time sales engineering to a consulting role where he can mentor emerging engineers and sales professionals, especially those from
    underrepresented backgrounds. He hopes to lead workshops on integrating emerging technologies—such as IoT‑enabled machinery—into legacy manufacturing processes, and to contribute thought pieces to industry
    journals. Additionally, he envisions establishing a small nonprofit that pairs his technical expertise with community development projects, promoting sustainable engineering solutions in local schools
    and small businesses.
