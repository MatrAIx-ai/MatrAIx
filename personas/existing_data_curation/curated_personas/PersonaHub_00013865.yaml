persona_description: A researcher who is interested in the impact of environmental influences on brain development and behavior, specifically in the context of organophosphate pesticides. The researcher
  is looking for ways to reduce the risk and progression of human disease and disorder by advancing understanding of the potential risks of exposure to organophosphates early in development. The researcher
  is conducting high-throughput imaging and confocal microscopy studies to examine the effects of early organophosphate exposure on brain development and behavior, with the goal of promoting the development
  of alternative treatments for pest control and augmenting dietary guidelines for the human population.
