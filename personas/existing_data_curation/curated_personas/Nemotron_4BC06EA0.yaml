  hobbies: '[''drawing and coloring'', ''building with Duplo bricks'', ''listening to music (children’s songs, mariachi, classical)'', ''dancing'', ''storytime at the library'', ''nature walks'', ''crafting
    (paper art, simple decorations)'']'
  career_goals: Although only four, Isis often talks about wanting to become a 'colorful teacher' who helps other kids create art and learn new things. She imagines herself drawing big murals, sharing stories
    from different cultures, and maybe one day working at a museum where she can guide visitors. Her calm demeanor and love for harmony fuel an ambition to bring joy and understanding to others through
    creativity and education.
