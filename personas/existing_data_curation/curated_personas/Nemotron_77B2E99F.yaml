personas:
  professional: Teresa Telese, a pint‑sized sandbox “CEO” who runs a sticker‑trading business, uses their natural curiosity and sociable energy to negotiate trades, while their laid‑back attitude lets them
    adapt when a play‑partner forgets the rules.
  sports: Teresa Telese, a three‑year‑old who dashes around the Millwood park on a tiny red bike, thrives in T‑ball with the Millwood Little Sprouts and cheers loudly for the New York Yankees during family
    game nights, blending boundless energy with a carefree, group‑play mindset.
  arts: Teresa Telese, a three‑year‑old who sings along to the upbeat tunes of Andrea Bocelli and the playful jingle of the “Frozen” soundtrack while twirling in the living room, loves finger‑painting bright
    dinosaurs and dancing to the rhythms of classic Broadway numbers, letting music and art shape her everyday play.
  travel: Teresa Telese, a three‑year‑old who delights in weekend trips to Van Cortlandt Park’s playgrounds and the Bronx Zoo’s petting area, now dreams of a family adventure to Disney World’s Magic Kingdom
    and a sunny day at the Hamptons’ boardwalk, favoring spontaneous outings over meticulous itineraries.
  culinary: Teresa Telese, a three‑year‑old who enthusiastically slurps spaghetti with marinara sauce and crumbles mozzarella on homemade mini‑pizzas, delights in spreading peanut butter on celery sticks,
    and proudly claims the title of “official sauce stirrer” in the kitchen, even if the countertop ends up speckled with flour.
  core: Teresa Telese, a curious and sociable three‑year‑old who flips between whirlwind energy and laid‑back flexibility, habitually leaves a trail of stickers on every surface while fiercely protecting
    her glitter‑filled piggy bank.
background:
  cultural: 'Teresa comes from a White, Italian‑American family that lives in Millwood, a suburban community in Westchester County, New York. Her household celebrates a blend of American and Italian traditions:
    holiday gatherings with Christmas lights and Easter egg hunts, family meals featuring pasta, pizza, and homemade sauces, and frequent visits to local parks and community events. The multicultural environment
    of the Greater New York area exposes her to diverse languages, foods, and celebrations, while her immediate family’s heritage emphasizes close family ties, storytelling, and a love of music and dance.'
