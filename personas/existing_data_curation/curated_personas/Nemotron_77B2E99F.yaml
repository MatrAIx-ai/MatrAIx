  career_goals: At three years old, Teresa’s ambitions surface through imaginative play and the stories she hears. She frequently says she wants to be a teacher because she loves storytime at the local
    library and enjoys helping friends learn new songs. She also dreams of becoming a veterinarian after caring for the family cat and watching animal shows, and she imagines performing on stage, dancing
    and singing, reflecting her energetic and outgoing personality.
