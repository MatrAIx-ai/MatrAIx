personas:
  professional: An aspiring teen engineer, Masiel Cotera blends their love for Arduino tinkering with a methodical, solution‑oriented mindset, channeling their curiosity into designing low‑cost modular
    shelters that could one day revitalize their neighborhood’s housing.
  sports: Masiel Cotera excels as a forward on their local youth soccer club, the Pacoima Thunder, idolizing LA Galaxy’s Chicharito and training twice weekly at the neighborhood park, though they often
    push themselves to the point of sore calves, balancing competition with a healthy dose of friendly rivalry.
  arts: Masiel Cotera sketches elaborate comic‑book heroes inspired by classic Marvel artists like Jack Kirby while vibing to regional Mexican bands such as Los Tigres del Norte, and they regularly re‑watch
    the sci‑fi series The Expanse, letting those influences color their imaginative YouTube channel content.
  travel: Masiel Cotera dreams of visiting the historic colonial towns of Puebla for a cultural immersion and has already taken weekend trips to the Griffith Observatory and San Diego’s Balboa Park, preferring
    organized itineraries that mix learning with the occasional surf session, and they always double‑check travel plans on a shared spreadsheet.
  culinary: Masiel Cotera loves perfecting family tamales and enchiladas, hand‑rolling masa and seasoning pork with cumin and ancho chilies, while experimenting with a side of cilantro‑lime rice, and they
    occasionally attempt homemade pineapple‑chipotle salsa for their YouTube followers.
  core: Masiel Cotera is a methodical teen tinkerer who balances a competitive drive with community‑focused engineering, disciplined budgeting, vigilant health tracking, soccer passion, and a love for comic
    art and family recipes, and they constantly seek ways to merge creativity with practical problem‑solving.
background:
  cultural: Masiel is a second‑generation Mexican‑American raised in Pacoima, a vibrant, multicultural neighborhood of Los Angeles. She grew up in a bilingual household where Spanish is spoken daily, and
    family traditions such as Día de los Muertos, quinceañeras, and weekend tamale‑making remain central to her life. The close‑knit community, combined with the challenges of an underserved urban environment,
    has shaped her practical outlook and desire to give back through engineering solutions that improve local housing and public spaces. Her Catholic upbringing also influences her values of responsibility
    and service.
attributes:
  skills: '[''project planning'', ''basic Python and Scratch programming'', ''bilingual communication (Spanish/English)'', ''graphic design with Canva/Photoshop'', ''basic math and physics problem solving'',
    ''community cooking and recipe sharing'']'
  hobbies: '[''sketching comic‑book art'', ''building Arduino projects'', ''playing soccer'', ''reading science‑fiction'', ''listening to regional Mexican music'', ''cooking traditional Mexican dishes'']'
  career_goals: Masiel aims to earn a scholarship to study civil engineering at a University of California campus, with a long‑term goal of designing affordable, sustainable housing for underserved neighborhoods
    like Pacoima. She hopes to combine her love for technology and practical problem‑solving by participating in robotics competitions and internships with local engineering firms. In the meantime, she
    plans to obtain her high school diploma, improve her GPA, and take advanced STEM courses to strengthen her college application.
