  hobbies: '["home improvement reading", "DIY woodworking", "gardening", "quilting", "hiking", "listening to folk and classic rock music", "small book club", "antique hunting", "cooking", "personal acrylic
    painting"]'
  career_goals: Amanda aims to solidify her reputation as a trusted painting contractor in Wichita by obtaining a formal certification from the Paint Contractors Association and expanding her services to
    specialize in historic home restorations using eco‑friendly paints. She plans to build a modest, family‑run business that can eventually transition to a consulting and estimating role as she reduces
    physically demanding work. Mentoring a younger apprentice is a key ambition; she wants to pass on her craftsmanship before retirement. Financially, she seeks a stable client base of repeat residential
    and small commercial contracts that provide security without overwhelming stress. Occasionally, she hopes to showcase personal acrylic artworks at local community events, integrating her artistic side
    into her professional identity.
