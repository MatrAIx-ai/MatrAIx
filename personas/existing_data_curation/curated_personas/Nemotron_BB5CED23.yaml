personas:
  professional: Amanda Fox, a seasoned interior painter and paperhanger, combines decades of hands‑on craftsmanship with a competitive, pragmatic mindset to deliver eco‑friendly historic restorations across
    Wichita, and they meticulously manage project logistics while mentoring a younger apprentice for future succession.
  sports: Amanda Fox enjoys low‑impact fitness through regular hikes in the Flint Hills and occasionally joins a local walking club, while they cheer for the Wichita State Shockers and the Kansas City Chiefs,
    and they keep a modest membership at the Riverfront Recreation Center for yoga and light strength training.
  arts: Amanda Fox curates a modest vinyl collection featuring folk icons like Bob Dylan and classic rock legends such as Neil Young, dabbles in acrylic painting for personal satisfaction, and they find
    meditative focus in quilting intricate patterns inspired by traditional Midwestern designs, all while hunting antique hardware that sparks creative ideas.
  travel: Amanda Fox prefers road‑trip adventures that blend quiet reflection with cultural discovery, often traveling to the Santa Fe art scene and the historic towns of the Missouri River Valley, and
    they meticulously plan each itinerary around budget constraints and a desire for off‑peak tranquility, while dreaming of a future weekend getaway to the Canadian prairies.
  culinary: Amanda Fox delights in Midwestern comfort cooking, regularly preparing chicken‑fried steak, creamy mashed potatoes, and herb‑infused soups made from garden herbs like rosemary and thyme, and
    they occasionally experiment with seasonal corn succotash, showcasing a practical yet adventurous palate.
  core: Amanda Fox is a detail‑obsessive, pragmatic painter‑craftsperson whose competitive drive and quiet anxiety fuel a solitary creative life filled with woodworking, quilting, folk vinyl, and a relentless
    quest for perfect finishes.
background:
  cultural: Amanda grew up in a white, mid‑Midwestern family in the Wichita suburbs, likely with Germanic or Anglo‑American roots. Her upbringing emphasized the Kansas values of hard work, self‑reliance,
    and modest community involvement. While she may have been raised with Protestant (or Catholic) traditions, her daily life is rooted more in practical daily routines and local customs than in formal
    religious practice. Exposure to both urban Wichita life and the surrounding agricultural landscape fostered a balanced perspective—practicality from farming communities and curiosity from the city’s
    commercial growth. She celebrates regional holidays such as Thanksgiving and Independence Day with close family, preferring intimate gatherings. This cultural backdrop reinforces her pragmatic, no‑nonsense
    work ethic while allowing space for personal curiosity and quiet reflection.
