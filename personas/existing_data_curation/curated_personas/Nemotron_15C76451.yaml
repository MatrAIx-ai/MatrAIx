  hobbies: '["Gardening (native Florida flora)", "Birdwatching", "Book club", "Playing bridge", "Cooking (Southern and Mediterranean cuisines)", "Walking on the beach", "Church volunteer work", "Crocheting
    and knitting", "Senior fitness classes", "Community dance events"]'
  career_goals: Although retired, Helene aims to deepen her impact as a senior ambassador at the local community center, leading workshops on digital literacy for older adults and mentoring new volunteers.
    She hopes to publish a memoir of her family’s history, travel to historic Florida sites such as St. Augustine and the Everglades, and maintain her health through regular fitness classes and walking
    along the Gulf Coast. Continuing to learn—particularly in photography and botanical illustration—is also a personal ambition.
