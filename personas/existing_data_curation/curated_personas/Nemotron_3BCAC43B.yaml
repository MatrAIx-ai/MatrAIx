personas:
  professional: Donnie Lawson, a 28‑year‑old farm manager, blends methodical planning with hands‑on leadership, using GPS‑guided tractors, rigorous herd health protocols, and detailed financial reporting
    to drive a sustainable, community‑focused operation while regularly speaking at Michigan Farm Bureau events, and they emphasize collaborative decision‑making with their crew.
  sports: Donny Lawson is a devoted fan of the Detroit Tigers and Detroit Red Wings, rides with the West Bloomfield Mountain‑Bike Club on summer weekends, and participates in local deer‑hunting outings
    and community softball leagues, and they make a point to volunteer as a coach for youth baseball during the off‑season.
  arts: Donnie Lawson enjoys playing acoustic guitar at church potlucks, covering songs by Johnny Cash, The Avett Brothers, and local folk artist Bobby Bare, and regularly visits the Ann Arbor Art Fair
    to support regional painters and craftspersons, and they often swap stories about farm life through song.
  travel: Donnie Lawson prefers a mix of structured road trips and spontaneous getaways, having explored Michigan’s Mackinac Island and Door County, taken a weekend hike in the Upper Peninsula, and plans
    an agritourism tour of Napa Valley once their solar project is funded, and they always pack a cooler stocked with farm‑grown snacks for the journey.
  culinary: Donnie Lawson is an intermediate‑level BBQ enthusiast who marinates pork ribs in a homemade cherry‑infused glaze, grills corn on the cob with fresh butter from their herd’s cows, and whips up
    pickled cucumbers and apple cider from farm‑grown produce, and they love experimenting with new rubs on the weekend.
  core: Donnie Lawson is a structured, community‑driven farmer who balances meticulous planning with a love for the outdoors, a habit of over‑cooking on the grill, and an occasional tendency to procrastinate
    on dental appointments, and they never miss a chance to share a song at a gathering.
background:
  cultural: Donnie grew up in a midwestern farming family in Michigan, steeped in the values of hard work, self‑reliance, and community cooperation. His ancestry is predominantly English and German, common
    among white farming communities in the Great Lakes region. He was raised in the cultural milieu of West Bloomfield and surrounding Oakland County, where suburban growth meets rural tradition. This background
    fostered a strong sense of local pride, participation in church and community events, and a pragmatic approach to life that blends traditional agricultural practices with an openness to modern technology.
attributes:
  skills: '[''Livestock management'', ''Crop production planning'', ''Precision agriculture technology'', ''Farm equipment maintenance'', ''Agricultural budgeting'', ''Regulatory compliance'', ''Record‑keeping'',
