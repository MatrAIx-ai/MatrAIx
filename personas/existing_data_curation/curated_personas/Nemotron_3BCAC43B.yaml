  hobbies: '[''Fishing'', ''Hunting'', ''Mountain biking'', ''Barbecue cooking'', ''Playing guitar'', ''Woodworking'', ''Volunteering at 4‑H'', ''Farmers‑market participation'', ''DIY farm equipment projects'',
    ''Gardening'']'
  career_goals: Donnie aims to expand his farm into a diversified, sustainable operation that integrates organic certification and agritourism. Over the next five years, he plans to invest in renewable
    energy systems—such as solar panels—to reduce operating costs and environmental impact. He also wants to develop a community‑supported agriculture (CSA) program that connects directly with local consumers,
    and to become a regional spokesperson for modern farming practices through the Michigan Farm Bureau. Ultimately, he envisions managing a larger multi‑site agribusiness that balances profitability with
    stewardship of the land.
