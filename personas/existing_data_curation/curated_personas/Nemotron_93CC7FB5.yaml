  hobbies: '[''Watercolor painting'', ''Coastal photography'', ''Gallery visits'', ''Reading contemporary fiction'', ''Philosophy'', ''Native plant gardening'', ''Mediterranean cooking'', ''Small game nights'',
    ''Walking tours of public art'']'
  career_goals: Kayla aims to deepen her contributions to the Oceanside arts community by serving as a volunteer docent at the local museum, designing a series of curated walking tours that highlight coastal
    public art, and publishing a personal memoir that intertwines her life story with reflections on art history. She also aspires to master advanced watercolor techniques, eventually mounting a solo exhibition
    of her own work, and to establish a small mentorship circle for aspiring artists, fostering a supportive environment where critical thinking and artistic exploration are encouraged.
