persona_description: A teacher or educator who is interested in using digital cameras and video production in the language classroom to enhance learning and provide educational resources. This persona is
  likely to be knowledgeable about digital cameras, video production, and the use of technology in the classroom. They may have experience teaching in a foreign language and be interested in developing
  their own educational segments, mini documentaries, and news reports. This persona may also be interested in using video to support the learning of other languages and to provide opportunities for students
  to use video cameras in linguistic production.
