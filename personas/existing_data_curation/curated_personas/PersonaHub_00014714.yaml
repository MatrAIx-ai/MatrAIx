persona_description: A scientist and engineer in the food industry who is interested in the electrical properties of food materials, particularly in their dielectric behavior, moisture content, and temperature.
  They are particularly interested in the use of microwave power for heating foods and in using RF and microwave instruments for measuring moisture content and other quality characteristics of food materials.
  They are also interested in improving efficiency for producers and processors and in improving food products for consumers. They are likely to read about the dielectric properties of several food materials
  with a wide range of moisture content and their frequency- and temperature-dependent dielectric behavior, as presented in the text.
