personas:
  professional: Allison Kollcaku is an aspiring junior multimedia creator who blends drawing, storytelling, and introductory Scratch programming into playful digital comics, channeling their curiosity and
    organized yet flexible approach into projects they share with classmates and through family art nights, while sometimes forgetting to label their files because excitement overtakes meticulousness.
  sports: Allison Kollcaku plays forward on the neighborhood youth soccer league, practices twice a week in the community park, cheers for the Georgia Bulldogs women's soccer team at University of Georgia
    games, and occasionally watches Atlanta United matches on TV, balancing team drills with a love for spontaneous pick‑up games that satisfy their energetic, sociable nature.
  arts: Allison Kollcaku immerses themselves in drawing whimsical characters inspired by Dr. Seuss and Pixar’s ‘Inside Out’, participates in school drama club productions of ‘Peter Pan’ and ‘The Little
    Mermaid’, delights in listening to Ariana Grande and the upbeat tunes of Disney soundtracks, and eagerly explores the murals at the local art museum, allowing these artistic influences to fuel their
    vivid imagination and collaborative storytelling.
  travel: Allison Kollcaku enjoys weekend family road trips to Savannah’s historic squares and the Georgia coast’s Tybee Island beaches, plans itineraries by sketching colorful maps on notebook paper, dreams
    of visiting Walt Disney World in Florida and the Smithsonian museums in Washington DC, but balances wanderlust with limited pocket money and school homework constraints.
  culinary: Allison Kollcaku favors classic comfort foods like pepperoni pizza, creamy mac and cheese, and peach cobbler made with fresh Georgia peaches, can skillfully spread peanut butter and jelly on
    toast and occasionally mixes batter for chocolate chip cookies at the kitchen table, often adding a sprinkle of cinnamon for extra flavor.
  core: Allison Kollcaku is a bright, energetic doodler who habitually carries a glitter‑studded sketchbook, forgets to finish homework when a new craft idea sparks, and can’t resist sneaking an extra slice
    of strawberry shortcake at birthday parties.
background:
  cultural: Allison comes from a white, middle‑class family in Athens, Georgia. Her upbringing blends Southern hospitality and community traditions with a strong appreciation for the local arts scene. Family
    outings often include town festivals, University of Georgia cultural events, and visits to regional museums, shaping her curiosity, love for group activities, and openness to unconventional ideas.
