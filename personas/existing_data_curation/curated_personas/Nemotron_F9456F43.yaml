personas:
  professional: David Stephenson, an 88‑year‑old retired maintenance specialist, leverages his decades‑long mechanical, carpentry and budgeting expertise, along with his calm, collaborative nature, to mentor
    volunteers, preserve local history for the Bossier City historical society, and keep his own home in top shape.
  sports: David Stephenson, who enjoys gentle walks along the Red River trail and tending his garden, stays active through the Bossier City Senior Walking Club, follows the New Orleans Saints in football
    and the New Orleans Pelicans in basketball, and practices low‑impact tai chi classes at the community center each week.
  arts: David Stephenson finds daily comfort in the classic jazz of Louis Armstrong, the deep blues of B.B. King, and the soulful storytelling of author Margaret Mitchell, integrating these musical and
    literary treasures into his evenings as a quiet ritual that sustains his connection to regional heritage.
  travel: David Stephenson prefers low‑key, purpose‑driven trips, such as his annual pilgrimage to New Orleans to immerse himself in historic jazz clubs, weekend drives to the Texas Hill Country for bird‑watching,
    and an upcoming plan to explore Chartres, France, to trace distant ancestors, all organized with meticulous itineraries and modest budgets.
  culinary: David Stephenson enjoys preparing gumbo with fresh okra, shrimp, and Andouille sausage, serving homemade cornbread with honey butter, and tossing garden salads of heirloom tomatoes, basil, and
    vinaigrette, displaying modest cooking skills that shine during small dinner gatherings for friends and family.
  core: David Stephenson is an 88‑year‑old garden‑tending, bird‑spotting historian who meticulously records his family lineage, swears softly at stubborn bolts, and never skips his Sunday jazz hour, balancing
    quiet curiosity with practical resilience.
background:
  cultural: David is a lifelong white resident of Bossier City, Louisiana, raised in a working‑class family that prized hard work, community, and Protestant faith. Growing up in the post‑World War II South,
    he experienced the region’s transition from an agrarian economy to the oil and gas boom and felt the influence of the nearby Barksdale Air Force Base. The cultural fabric of the Red River area—its Southern
    hospitality, regional cuisine, and rich musical traditions—has shaped his worldview. While he deeply respects these traditions, his curiosity leads him to embrace new ideas and technologies, reflecting
    the balanced personality described.
attributes:
  skills: '[''Mechanical Troubleshooting'', ''Basic Carpentry'', ''Home Repair'', ''Budget Management'', ''Community Volunteer Coordination'', ''Gardening'', ''Local History Research'']'
