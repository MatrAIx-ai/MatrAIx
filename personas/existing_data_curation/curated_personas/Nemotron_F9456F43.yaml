  career_goals: Although retired, David’s primary ambition is to remain independent, healthy, and mentally engaged. He aims to compile a memoir and family genealogy for future generations, volunteer as
    a mentor for youth in his church and community center, and contribute his practical knowledge to the Bossier City historical society. He also hopes to maintain his home’s upkeep and support his grandchildren’s
    education through occasional tutoring and financial assistance.
