personas:
  professional: Lee Schacht, a 25-year-old metal and plastic fabricator, pairs a love for hands-on problem solving with a competitive edge, excelling at MIG/TIG welding, CNC milling and blueprint interpretation
    while habitually putting off paperwork and deadline tracking, driving them to pursue AWS welding and CNC programming certifications to bridge the gap between practical skill and formal organization.
  sports: Lee Schacht spends weekends hunting deer and turkey, casting lines on Lake Lanier, lifting weights at the local gym, and testing marksmanship at the range where they also join informal arm-wrestling
    matches; they root for the Atlanta Falcons, the Georgia Bulldogs, and the local high-school football team, while occasionally playing pickup football with former classmates.
  arts: Lee Schacht unwinds by strumming an acoustic guitar, favoring classic country ballads by Alan Jackson and southern gospel hymns learned at church, while also diving into first-person shooter video
    games like Call of Duty; they admire the craftsmanship of classic car shows and the storytelling of Stephen King's Southern-flavored novels.
  travel: Lee Schacht prefers road-trip adventures that blend hunting lodges in the Appalachian foothills, fishing cabins on Lake Lanier, and occasional visits to the National Museum of the United States
    Air Force in Dayton, while dreaming of a future aerospace trade show in Seattle and a hunting expedition in the Rockies.
  culinary: Lee Schacht delights in Southern comfort cooking, often grilling smoked brisket, frying catfish, and turning venison from his hunts into a hearty stew seasoned with paprika, cayenne, and fresh
    thyme, and he prides himself on mastering buttery corn bread as the perfect side.
  core: Lee Schacht is a self-reliant, competitively driven fabricator who balances hands-on craftsmanship with spontaneous tool splurges, outdoor pursuits, and Southern-rooted community ties.
background:
  cultural: Lee grew up in a modest, working‑class family on the outskirts of Warner Robins, Georgia. The town’s Southern roots, strong community ties, and proximity to Robins Air Force Base infused his
    upbringing with a mix of patriotic, military‑influenced events and traditional Southern values such as self‑reliance, practicality, and hospitality. Local high‑school football games, church gatherings,
    and community festivals shaped his social world, while his family’s emphasis on hard work and hands‑on trades guided his career path in metal and plastic fabrication.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''CNC milling operation'', ''Blueprint reading'', ''Machinery troubleshooting'', ''Safety compliance'', ''Equipment maintenance'', ''Basic CNC programming'',
    ''Precision assembly'', ''Team training'']'
  hobbies: '[''Hunting'', ''Fishing'', ''Hiking'', ''Classic car restoration'', ''Weightlifting'', ''Acoustic guitar'', ''Video gaming (FPS)'', ''Shooting range'', ''Arm‑wrestling'', ''Community volunteering'']'
  career_goals: Lee aims to earn an AWS Certified Welding Specialist credential and a CNC programming certification within the next two years, positioning himself for a shift‑supervisor role at his current
    plant. Long‑term, he dreams of launching his own custom metal‑fabrication shop that serves aerospace and automotive clients in the Georgia region. To achieve this, he plans to enroll in evening courses
    at a community college for an associate degree in manufacturing technology, improve his organizational habits, and build a network of local suppliers and clients.
