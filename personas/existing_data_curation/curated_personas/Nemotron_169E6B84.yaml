  hobbies: '[''Sketching landscapes'', ''Visiting art galleries'', ''Reading philosophy and theology'', ''Gardening'', ''Playing acoustic guitar at local jam sessions'', ''Hiking Piney Woods trails'', ''Woodworking
    workshops for seniors'', ''Cooking Southern cuisine with multicultural twists'']'
  career_goals: John aims to channel his lifelong curiosity and artistic sensibility into a legacy of mentorship and cultural enrichment. He plans to publish a memoir‑styled collection of sermons that explore
    the intersection of faith and art, hoping to inspire both clergy and laypeople. He intends to establish a modest community arts program within his church, offering workshops in painting, music, and
    storytelling for seniors and youth alike. Additionally, he seeks to serve as a regional chaplain for hospice services, providing spiritually grounded support to those confronting end‑of‑life decisions.
    Pursuing an honorary theological certification from a nearby seminary would formalize his expertise and enable him to teach part‑time at a local community college. Ultimately, he wishes to be remembered
    for fostering a church environment where unconventional ideas are welcomed and artistic expression is woven into worship.
