  designs. They are fascinated by the idea of a tilted square and the ways in which it can be constructed. They are interested in the ways in which different pieces of the tangram can be rearranged to create
  different shapes. They are intrigued by the ways in which patterns can be observed, hypothesized, and experimentally tested. They are interested in the ways in which patterns can be used to create art
  and design.
