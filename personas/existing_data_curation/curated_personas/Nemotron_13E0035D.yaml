personas:
  professional: Leslie Poole is an aspiring junior robotics enthusiast who blends a love for trail exploration, Minecraft world-building, and sketching into a practical problem-solving mindset, often improvising
    code in the after‑school robotics club while sidestepping strict schedules.
  sports: Leslie Poole enjoys weekend hikes along the Blue Ridge, plays on the Asheville Elementary soccer team, and cheers for the Carolina Panthers, preferring low‑key, nature‑centered fitness over regimented
    training, yet sometimes forgets to stretch before games.
  arts: Leslie Poole sketches mountain vistas with colored pencils, strums folk‑pop tunes on a ukulele, and draws inspiration from J.K. Rowling’s wizarding world and Jack Johnson’s acoustic songs, weaving
    these influences into the blocky architecture of their Minecraft creations.
  travel: Leslie Poole loves spontaneous family road trips to nearby state parks like Great Smoky Mountains and dreams of a summer adventure in Yellowstone, favoring flexible itineraries that allow for
    extra time exploring hidden trails and collecting local rocks.
  culinary: Leslie Poole frequently bakes chocolate chip cookies and assembles homemade pepperoni pizza with fresh basil, mastering simple recipes that blend family traditions with the occasional experiment
    of adding pineapple toppings for fun.
  core: Leslie Poole is a curious 11‑year‑old who balances mountain hikes, Minecraft world-building, and ukulele melodies with a relaxed, often disorganized schedule, turning spontaneity into creative adventure.
background:
  cultural: Leslie was raised in a suburban neighborhood of Asheville, North Carolina, a city known for its blend of Appalachian mountain heritage and a vibrant arts and sustainability scene. Her family,
    of primarily European descent, embraces Southern hospitality and community involvement, regularly attending local farmers' markets, seasonal festivals, and volunteer events. The region's emphasis on
    outdoor recreation, environmental stewardship, and appreciation for local crafts has shaped Leslie's values, encouraging a balance of respect for tradition and openness to new ideas.
