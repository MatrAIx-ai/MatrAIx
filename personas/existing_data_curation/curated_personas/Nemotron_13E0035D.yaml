  career_goals: Leslie dreams of combining her love of the outdoors with her curiosity about technology. She aspires to become a wildlife biologist or park ranger who can use digital tools to document animal
    behavior, and she also entertains the idea of creating educational videos that blend her drawing skills with simple animations. In the short term she plans to deepen her coding abilities, take leadership
    roles in her school's environmental club, and earn a junior ranger badge offered by the nearby national forest.
