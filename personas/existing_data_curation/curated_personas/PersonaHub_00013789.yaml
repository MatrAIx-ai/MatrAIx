persona_description: A scientist who specializes in crop and soil science, particularly in the study of nitrogen fertilization and its impact on corn crops for ethanol production. She has a strong interest
  in quantifying the full environmental and economic impact of corn nitrogen management and is looking for ways to improve the efficiency of corn residues for cellulosic ethanol production. She is interested
  in the biochemical pathways involved in lignin production and the impact of nitrogen fertilization on these pathways. She is also interested in the environmental impact of over-fertilization of corn residues
  and the potential for reducing this impact through the use of alternative fertilization practices.
