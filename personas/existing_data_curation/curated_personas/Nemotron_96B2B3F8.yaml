personas:
  professional: Whitney Milhouse, a licensed structural engineer and LEED Green Associate in Chicago, blends meticulous BIM-driven design with an abstract painter’s eye, leading multidisciplinary teams
    to craft high‑rise projects that balance carbon‑reduced performance with bold public‑art installations.
  sports: Whitney Milhouse enjoys early‑morning yoga at a local studio, runs with the Windy City Runners club in preparation for the Chicago Marathon, and rallies behind the Chicago Bulls and Chicago Fire,
    occasionally joining a community pick‑up basketball game on weekend afternoons.
  arts: Whitney Milhouse cultivates abstract painting and cityscape sketching, draws inspiration from Mark Rothko, Yayoi Kusama, and Jacob Lawrence, frequents the Art Institute of Chicago and the Museum
    of Contemporary Art, and fuels creativity by listening to Miles Davis, Erykah Badu, and Kamasi Washington.
  travel: Whitney Milhouse prefers architecture‑centric travel, having explored Barcelona’s Sagrada Família, Copenhagen’s Ørestad district, and Singapore’s Marina Bay sustainable skyline, while also enjoying
    weekend getaways to Milwaukee’s historic breweries and Detroit’s revitalized riverfront.
  culinary: Whitney Milhouse indulges in Southern soul food, perfecting crispy fried chicken, collard greens seasoned with smoked turkey, peach cobbler with a buttery crust, and a sweet‑spicy bourbon BBQ
    glaze, often experimenting with heirloom cornmeal and sweet‑potato mash.
  core: Whitney Milhouse fuses rigorous engineering precision with an unbridled artistic imagination, methodically advancing sustainable design while habitually losing track of time in vibrant creative
    pursuits.
background:
  cultural: Whitney grew up on Chicago's South Side in a close‑knit African‑American family. Her mother, a schoolteacher, nurtured her love for reading and visual art, while her father, an electrician,
    introduced her to hands‑on problem solving. She earned her undergraduate degree in civil engineering at Howard University, immersing herself in Black cultural history and community activism, and completed
    her graduate studies at the University of Illinois Urbana‑Champaign, where she became acutely aware of systemic inequities in urban infrastructure. This background shapes her commitment to equitable,
    culturally resonant design, the inclusion of African‑American artistic motifs in public projects, and her dedication to mentoring the next generation of Black women engineers.
