  hobbies: '[''Abstract painting'', ''Architectural photography'', ''Sketching cityscapes'', ''Reading speculative fiction'', ''Visiting contemporary art galleries'', ''Digital fabrication at maker spaces'',
    ''3D printing'', ''Solving puzzles'', ''Yoga'', ''Cooking Southern soul food'', ''Listening to jazz and neo‑soul'', ''Short story writing'']'
  career_goals: Whitney aims to become a senior project manager and eventually a director of sustainable infrastructure within a leading Chicago engineering firm. She seeks to lead a multi‑disciplinary
    team on a landmark green skyscraper that achieves LEED Platinum certification and incorporates community‑driven public art. Over the next five years, she plans to earn her Chartered Professional Engineer
    status, obtain a LEED Accredited Professional credential, and publish research on low‑carbon construction materials. Long‑term, she aspires to launch her own boutique consultancy focused on equitable,
    culturally resonant urban design, mentor Black women in STEM, and influence municipal policy to address infrastructure disparities in historically underserved neighborhoods.
