persona_description: A healthcare professional with extensive knowledge in respiratory and pulmonary medicine, particularly in the management of patients with respiratory distress due to inhalation injuries,
  burns, and other respiratory tract injuries. They are skilled in the use of bronchodilators, nitric oxide, inhaled heparin, and N-acetylcysteine, and have experience in aggressive treatment with aerosolized
  bronchodilators and hyperbaric chambers for carbon monoxide poisoning. They are also familiar with the use of hydroxocobalamin in the management of cyanide poisoning and have experience with the management
  of burns involving 15 to 20% TBSA, including the use of intraosseous access and central lines.
