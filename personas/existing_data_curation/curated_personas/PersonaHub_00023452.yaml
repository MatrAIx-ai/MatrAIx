persona_description: A researcher and educator who is passionate about bridging the gap between the humanities and the sciences through the exploration of the vast past, specifically focusing on the unifying
  characteristics that can bridge the intellectual chasm between the humanities and the sciences. This individual is dedicated to creating an educational tool, ChronoZoom, that is not only a tool for the
  classroom but also a research tool for academics. They are actively seeking feedback from other Big History, humanities, and science professors around the world to create an all-new version of ChronoZoom
  that is easy to use in the classroom and also has features that can help students, educators, and researchers understand the history of everything. This individual is a member of the Outercurve Foundation's
  Research Accelerators Gallery, which supports the collaborative development of software in open-source communities, yielding faster results and improved community development for organizations and research
  groups worldwide.
