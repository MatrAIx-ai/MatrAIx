  hobbies: '[''Pickup basketball'', ''Trivia night'', ''Board games'', ''Smart-home DIY projects'', ''Cycling on Canal Trail'', ''Hiking in Eagle Creek Park'', ''Barbecue cooking'', ''Volunteer dental outreach'',
