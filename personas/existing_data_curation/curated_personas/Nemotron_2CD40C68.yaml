  career_goals: Shawn plans to leverage his practical experience by completing an associate’s degree in dental hygiene within the next two years, with the long-term aim of becoming a licensed dental hygienist.
    He also aspires to move into practice management, eventually taking on a dental office manager role where he can combine his organizational strengths with his people-focused mindset. In addition, he
    hopes to develop a community outreach program that provides free oral-health screenings in underserved neighborhoods of Indianapolis, aligning his cooperative nature with a desire to give back. Staying
    current with digital dentistry innovations is a personal ambition, and he intends to become a go-to resource in his office for new technology adoption.
