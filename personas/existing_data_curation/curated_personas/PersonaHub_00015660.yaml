persona_description: A researcher in the field of climate science, particularly interested in the assessment and prediction of possible futures for various sectors of society. This persona is likely to
  be involved in long-term planning and requires a deep understanding of the uncertainties associated with climate change and the tools and techniques used to quantify and integrate model projections in
  multi-model ensembles. This person is likely to be familiar with the concepts of ensembles of opportunity, ensembles of models, and the importance of taking into account model errors and biases in making
  formal risk assessments. They are likely to have a strong background in mathematics and statistics, and a keen interest in developing new methods for quantifying and integrating model projections in multi-model
  ensembles.
