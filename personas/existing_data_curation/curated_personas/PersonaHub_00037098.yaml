persona_description: Jonathan Wilker, a researcher at Purdue University, who specializes in the study of biological materials and their applications. He is known for his discovery that iron is the key binding
  agent in the super-strong glues of the common blue mussel, Mytilus edulis. Wilker's research interests include the development of safer alternatives for surgical and household glues, as well as the use
  of biological materials for combating invasive species.
