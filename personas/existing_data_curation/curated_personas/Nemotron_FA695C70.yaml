personas:
  professional: Alla Moore, a retired art historian and community project manager, leverages her deep knowledge of 19th‑century American and European movements, meticulous organization, and passionate imagination
    to curate traveling folk‑art exhibits, digitize regional archives, and volunteer as a docent at the Stones River National Battlefield Museum, where they delight in guiding small groups through nuanced
    historical narratives.
  sports: Alla Moore, a dedicated early‑morning walker who joins the Murfreesboro Parks & Trails walking club, practices gentle yoga at the local senior center, and avidly follows the Tennessee Titans,
    Nashville Predators, and Nashville Sounds, while they occasionally play pickleball on the community courts during the spring.
  arts: Alla Moore, an abstract painter and mixed‑media collage artist who studies the works of Georgia O'Keeffe, Jackson Pollock, and local folk master William Harlan while frequenting the MTSU Art Museum,
    they spend evenings composing poetry inspired by Wallace Stevens and listening to Yo‑Yo Ma’s cello suites, thereby weaving visual and literary arts into their daily life.
  travel: Alla Moore, a meticulous planner who prefers small‑group guided tours, spends her travel budget on leisurely visits to historic Southern gems such as Savannah, Georgia, Charleston, South Carolina,
    and the National Civil War Museum in Appomattox, Virginia, while still dreaming of a spring pilgrimage to the Asheville mountain art colonies for creative inspiration, and they always prepare a detailed
    itinerary before each trip.
  culinary: Alla Moore, an avid gardener and competent home cook, delights in preparing Southern classics like shrimp and grits with fresh garden cilantro, peach cobbler spiced with cinnamon and nutmeg,
    and slow‑roasted collard greens flavored with smoked ham hocks, while occasionally splurging on a bottle of Tennessee bourbon to complement a warm pecan pie, and they relish sharing these dishes at
    community potlucks.
  core: Alla Moore, a disciplined yet whimsically imaginative septuagenarian, blends her love of abstract art, garden meditation, and meticulous record‑keeping into a quiet legacy‑building mission, even
    if they sometimes obsess over aligning garden rows to the golden ratio.
background:
  cultural: Alla grew up in a middle‑class, white Southern family in the Murfreesboro area, steeped in the traditions of Middle Tennessee’s modest Protestant community. Her upbringing blended a respect
    for Southern hospitality and community service with a strong emphasis on education and cultural enrichment. Family gatherings often featured folk music, regional cuisine, and storytelling, fostering
    an appreciation for local history and crafts that continues to shape her interests and values.
