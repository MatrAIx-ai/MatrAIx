  hobbies: '[''Abstract painting'', ''Mixed media collage'', ''Poetry composition'', ''Reading classic literature'', ''Visiting art museums'', ''Gardening'', ''Bird-watching'', ''Knitting'', ''Traveling
    to historic sites'', ''Volunteer docent work'']'
  career_goals: Although retired, Alla is driven to leave a lasting cultural legacy in Murfreesboro. She aims to author a memoir that intertwines personal history with reflections on Southern art, curate
    a traveling exhibit of regional folk art, and establish a small scholarship for local high‑school students pursuing the humanities. She also hopes to become a volunteer docent at the Stones River National
    Battlefield Museum, sharing her knowledge with visitors in intimate tours.
