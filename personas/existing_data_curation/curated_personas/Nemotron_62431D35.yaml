  career_goals: Marquies aims to expand his presence from supporting roles to leading performances in film and television, with a particular interest in narratives that highlight the African-American experience
    in urban settings. Leveraging his technical background, he plans to transition into producing and directing, developing projects that integrate emerging technologies such as virtual production and motion-capture
    storytelling. He aspires to establish a boutique production company in Baltimore that will mentor emerging Black talent, produce original content for streaming platforms, and bring community-driven
    stories to a global audience. Additionally, he hopes to earn recognition through awards for both his acting and his contributions to inclusive media.
