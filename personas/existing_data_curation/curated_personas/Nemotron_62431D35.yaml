personas:
  professional: Marquies Duncan is a versatile actor‑engineer who fuses method acting with technical set design, leveraging their Python‑driven audition tracking and DIY lighting rig skills to bring authentic
    urban stories to screen, even as their spontaneous nature sometimes clashes with strict production deadlines, and they constantly seek collaborative environments that value both creativity and practical
    problem‑solving.
  sports: Marquies Duncan energizes weekends with pickup basketball at the Baltimore Community Court and mountain biking along the Patapsco River trail, while cheering for the Baltimore Ravens and following
    the Orioles, yet they reluctantly join the local adult league when the schedule fits their erratic calendar, and they use a smartwatch to track performance metrics despite occasional neglect of data
    entry.
  arts: Marquies Duncan channels improvisational flair into jazz saxophone sessions at the Arlington Yard, captures the soul of Baltimore’s festivals through street photography inspired by Gordon Parks,
    and studies performances of John Coltrane and Viola Davis, balancing these passions with an occasional habit of hoarding obscure vinyl records, and they often overlay soundscapes onto their photographs
    for experimental installations.
  travel: Marquies Duncan prefers flexible, deep‑dive trips, often backpacking through New Orleans for its music heritage, road‑tripping to the Blue Ridge Mountains for biking, and dreaming of a future
    immersive workshop in Reykjavik’s digital arts scene, yet their budget constraints keep international travel to occasional weekend getaways like Charleston, and they typically plan itineraries using
    a spreadsheet that allows for spontaneous detours.
  culinary: Marquies Duncan cooks Southern comfort dishes—soulful shrimp and grits, collard greens seasoned with smoked turkey, and sweet potato pie—using heirloom recipes from their grandmother, skillfully
    combining fresh market finds with a penchant for experimenting with hot sauce blends, though they sometimes over‑salt the simmered beans when multitasking between a rehearsal and a recording session,
    and they keep a notebook of flavor adjustments taped to the fridge.
  core: Marquies Duncan blends an engineer’s analytical mind with an artist’s spontaneous soul, they juggle jazz saxophone, street photography, and DIY tech projects while navigating an ever‑shifting schedule
    that leaves both budgets and health appointments in a delicate balancing act.
background:
  cultural: Marquies grew up in the historic East Baltimore neighborhood, a vibrant hub of African-American culture and resilience. Raised in a close-knit family rooted in church and community service,
    he absorbed the rhythms of gospel, jazz, and hip-hop that permeated the streets. His grandparents migrated from the rural South during the Great Migration, bringing culinary traditions and a strong
    work ethic that shaped his values. He attended a Historically Black College and University for his undergraduate STEM degree before pursuing graduate studies, an experience that reinforced his commitment
    to representation and mentorship within Black professional circles. The legacy of Baltimore’s civil‑rights activism and the city’s artistic renaissance inform his perspective, motivating him to tell
    stories that reflect the complexity and pride of his community.
