  hobbies: '[''Watercolor painting'', ''Nature photography'', ''Gardening'', ''Visiting art galleries'', ''Attending folk music concerts'', ''Reading art history and sustainable agriculture books'', ''Journaling'',
    ''Community workshops'', ''Exploring local hiking trails'']'
  career_goals: Aimee aims to combine her agricultural background with her artistic interests by pursuing a degree in sustainable agriculture or agronomy, focusing on community‑based farming initiatives
    that integrate art and education. She hopes to become a farm manager or agritourism coordinator, creating immersive experiences that teach visitors about food production, ecological stewardship, and
    creative expression. In the longer term, she dreams of establishing her own organic farm that doubles as an outdoor studio and learning space for local artists and students.
