personas:
  professional: Aimee Stetson, a budding agritourism coordinator-in-training, blends hands‑on crop cultivation and livestock care with watercolor artistry to design immersive farm‑based workshops, leveraging
    their meticulous organizational talent and open‑minded curiosity to foster community harmony while navigating the inevitable uncertainties of seasonal farming.
  sports: Aimee Stetson, a weekend trail‑runner with the Austin Trail Club and an avid supporter of the Dallas Cowboys and Texas Longhorns football, balances a love for the outdoors with occasional community
    volleyball games, using sunrise hikes to clear their mind and counteract anxiety.
  arts: Aimee Stetson, a watercolor enthusiast who channels the soft palettes of Claude Monet and the expansive landscapes of Thomas Moran into their Texas countryside scenes, frequents local galleries
    showcasing contemporary artist Stacy Rison, and finds solace in the folk sounds of Kacey Musgraves and the storytelling of Gillian Welch.
  travel: Aimee Stetson, an adventurous yet budget‑conscious traveler, spends holidays exploring Hill Country vineyards and the art festivals of Santa Fe, dreams of joining a sustainable farming exchange
    in Oaxaca, Mexico, and keeps a Pinterest board of serene Japanese garden tours in Kyoto.
  culinary: Aimee Stetson, a fledgling farm‑to‑table chef, delights in harvesting heirloom tomatoes, purple carrots, and fresh basil to whip up bright heirloom tomato gazpacho and grilled corn tacos with
    cilantro‑lime slaw, while occasionally treating themselves to a decadent slice of peach cobbler made with home‑grown fruit.
  core: Aimee Stetson, a 20‑year‑old farm‑artist hybrid, weaves together sustainable agriculture, watercolor creativity, and empathetic community outreach, all while navigating intense anxiety and a penchant
    for spontaneous seed‑shopping sprees.
background:
  cultural: Aimee grew up in Henderson, a small town in East Texas, where agriculture and close‑knit community life are central. Her family has deep roots in the region's farming tradition, which instilled
    in her a respect for the land and a strong work ethic. At the same time, she was exposed to a vibrant local arts scene through school programs, county fairs, and community events, fostering an appreciation
    for creativity and unconventional ideas. She identifies with the values of Southern hospitality, cooperation, and a love of nature, while also drawing inspiration from broader artistic and environmental
    movements.
attributes:
  skills: '[''Crop cultivation'', ''Livestock handling'', ''Farm equipment operation'', ''Irrigation system management'', ''Basic pest management'', ''Watercolor painting'', ''Nature photography'', ''Creative
