    toys'']'
  career_goals: Jack is just beginning to form ideas about the future. He loves to pretend to be a painter, a musician, or a firefighter, often saying he wants to help people and make beautiful things.
    He dreams of leading a parade someday, inspired by the colorful Mardi Gras celebrations in his town. Though his interests shift quickly, his underlying ambition is to explore, create, and share his
    ideas with friends.
