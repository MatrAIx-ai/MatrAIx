personas:
  professional: Jack Centeno, a curious 3‑year‑old future storyteller who transforms play‑time Lego constructions into a makeshift engineering lab, shows imaginative problem‑solving and quick social collaboration,
    yet their spontaneous resistance to any imposed routine often leaves towers unfinished and projects abandoned.
  sports: Jack Centeno, an energetic 3‑year‑old who dashes across the playground, belongs to the local toddler soccer group Mini Kickers, repeatedly shouts support for the Metro United soccer team on TV,
    enjoys impromptu sprint races with friends in summer, and loves building snow forts in winter, showing a spontaneous, joy‑driven approach to staying active.
  arts: Jack Centeno, a 3‑year‑old whose eyes light up at The Wiggles' upbeat songs, devours storytime with Dr. Seuss books, enjoys painting with Crayola crayons while imitating the bold colors of Van Gogh's
    Starry Night in his finger‑painting, and bursts into giggles during Pixar's Toy Story movies, weaving these artistic experiences into his daily play.
  travel: Jack Centeno, a curious 3‑year‑old who revels in spontaneous trips to the nearby Santa Monica beach for sandcastle building, enjoys weekend visits to Grandma's farm in Iowa, dreams of seeing the
    Eiffel Tower in Paris, and prefers laid‑back car rides with familiar stuffed toys over rigid itineraries, reflecting an adventurous yet comfort‑seeking travel style.
  culinary: Jack Centeno, a 3‑year‑old with a penchant for cheesy macaroni, crunchy chicken nuggets, and strawberry‑banana smoothies, proudly stirs pancake batter alongside Mom, proudly declares a love
    for peanut butter‑banana sandwiches, yet constantly refuses broccoli, turning meals into a playful negotiation of flavors.
  core: Jack Centeno, a hyper‑curious 3‑year‑old who bursts into spontaneous song at grocery aisles, hoards glittery stickers in a secret stash, worries over bedtime shadows, and flips every puzzle piece
    upside down before fitting them together.
background:
  cultural: Jack was born and raised in Gonzales, Louisiana, a small city steeped in Cajun culture. His family, of white Cajun descent, traces its roots to French‑Acadian settlers, and French language phrases
    and traditional recipes are common at home. He regularly experiences community events such as the Jambalaya Festival and Mardi Gras celebrations, where zydeco music, dancing, and colorful parades are
    part of his world. Catholic traditions, church gatherings, and close‑knit neighborhood friendships also shape his early sense of community and belonging.
