persona_description: A community leader and advocate for the preservation and sustainability of water resources in the Borrego Valley, particularly in Anza Borrego Desert State Park. Suzanne Lawrence is
  a resident of Borrego Springs, a town that serves as the hospitality hub for the park and is heavily dependent on water resources. She has co-founded the Borrego Valley Stewardship Council (BVSC) to ensure
  that the town survives and benefits from the GSP process for the Borrego Valley Groundwater Basin. Lawrence is passionate about the work being done to generate a Groundwater Sustainability Plan (GSP)
  for the region and is optimistic about the potential benefits for the local economy. She is particularly concerned about the vulnerability of severely disadvantaged communities in the Borrego Valley,
  including older agricultural workers, and is working to acquire funds to buy out farms from willing sellers to reacquire access to 70% of the basin's water supply.
