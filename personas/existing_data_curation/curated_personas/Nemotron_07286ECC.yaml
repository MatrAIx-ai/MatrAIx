  hobbies: '[''Gardening'', ''Golf'', ''Reading Historical Non-Fiction'', ''Woodworking'', ''Playing Chess'', ''Volunteer at Local Historical Society'', ''Attending Community Theatre'']'
  career_goals: Approaching retirement, Michael aims to cement a lasting legacy by leading a department‑wide digital transformation that streamlines onboarding, performance tracking, and benefits administration.
    He also seeks to mentor the next generation of HR leaders, ensuring a smooth succession plan, and hopes to transition to part‑time consulting for nonprofit organizations in the Fairfax County area where
    he can apply his practical expertise to strengthen their workforce practices.
