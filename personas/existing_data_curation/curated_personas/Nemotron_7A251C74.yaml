  career_goals: Hai aims to pursue a post‑secondary path that merges his love for technology with outdoor recreation. He plans to enroll in a community college program in mechanical engineering or renewable
    energy technology, with the long‑term goal of working in the design and maintenance of equipment for ski resorts or national parks. He is also open to apprenticeships in automotive or HVAC trades, valuing
    practical, hands‑on learning that can quickly translate into a stable career. Ultimately, he hopes to launch a small business offering gear repair services for local outdoor enthusiasts while staying
    connected to the mountain community he loves.
