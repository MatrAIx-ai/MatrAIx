personas:
  professional: Hai Koretz is an aspiring mechanical engineering student who merges hands‑on drone construction and snow‑gear maintenance with Python automation, applying a curious yet pragmatic mindset
    to solve technical problems and lead volunteer projects while staying reliably organized, and they balance schoolwork with weekend adventures.
  sports: Hai Koretz spends weekends carving the Wasatch slopes with the Wasatch Snowboard Club, hiking the Alpine Ridge trail while mapping new routes, and avidly follows the Utah Jazz and Real Salt Lake,
    occasionally joining local pickup basketball games with friends, and they enjoy the camaraderie of team sports as much as solo pursuits.
  arts: Hai Koretz captures alpine vistas with a DSLR, drawing inspiration from Ansel Adams and contemporary photographer Chris Burkard, while unwinding to the music of Mitski and The Strokes and binge‑watching
    sci‑fi cinema by Christopher Nolan, often citing Neil Gaiman’s novels as a creative spark for their own photography projects, and they regularly curate photo series that blend natural light with urban
    edge.
  travel: Hai Koretz prefers a blend of meticulous planning and spontaneous detours, having skied Hokkaido’s powder in Japan after a well‑budgeted trip to Park City, and now eyeing a backpacking adventure
    through New Zealand’s South Island to photograph untouched trails, while balancing school commitments and a modest travel fund, and they plan each journey with a spreadsheet and a sense of wanderlust.
  culinary: Hai Koretz enjoys cooking simple yet hearty meals like wild mushroom risotto seasoned with thyme and parmesan, a bison burger topped with caramelized onions and arugula, and occasionally whipping
    up pho using star anise, ginger, and fresh basil, while mastering the art of quick, nutrient‑dense trail mix featuring almonds, dried apricots, and dark chocolate, and they love tweaking flavors to
    suit their adventurous palate.
  core: Hai Koretz is a curiosity‑driven tinkerer who balances the rush of snowboarding with methodical drone building, juggling a disciplined work ethic and a penchant for late‑night gaming, and they navigate
    occasional knee strains and impulsive gear splurges with a blend of pragmatism and playful optimism.
background:
  cultural: Raised in Heber City, Utah, Hai grew up in a close‑knit, predominantly white community where outdoor recreation and family gatherings are central to daily life. His family values self‑reliance,
    community service, and a blend of traditional and modern perspectives. While the region has a strong presence of folk and religious traditions, Hai integrates these cultural influences with his own
    curiosity, balancing respect for local customs with an eagerness to explore new ideas and technologies.
