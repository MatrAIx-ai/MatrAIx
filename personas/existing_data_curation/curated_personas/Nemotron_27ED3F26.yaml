personas:
  professional: Eugene Cole, a 62‑year‑old business administration veteran, translates his data‑driven analytical acumen and strategic planning expertise into part‑time consulting for Columbus startups,
    while leveraging his refined eye for visual arts to curate community exhibitions that teach artists financial fundamentals, reflecting his critical yet open‑minded curiosity.
  sports: Eugene Cole, a 62‑year‑old Columbus resident, avidly follows the Columbus Blue Jackets and Ohio State Buckeyes, participates in the Scioto Mile Walking Club’s twice‑weekly evening strolls, and
    occasionally joins a casual senior bowling league, preferring low‑impact, solitary activities over competitive sports.
  arts: Eugene Cole immerses himself in the arts by curating pop‑up shows that echo the color fields of Mark Rothko and the activist installations of Ai Weiwei, attends intimate lectures on philosophy,
    produces ambient tracks inspired by Miles Davis and Max Richter in his home studio, and regularly revisits classic cinema like "The Godfather" and contemporary documentaries by Ava DuVernay, allowing
    these diverse influences to inform his reflective essays.
  travel: Eugene Cole prefers meticulously planned cultural trips, having explored the Uffizi Gallery in Florence and the Getty Center in Los Angeles, while dreaming of a solo pilgrimage to the Louvre in
    Paris and a weekend retreat in Ohio’s Amish country, balancing his modest travel budget with his love for immersive museum experiences.
  culinary: Eugene Cole, an avid home‑brewer, perfects an amber IPA using Cascade hops and caramel malt, whips up a hearty Beef Bourguignon with red wine, thyme, and pearl onions on weekends, savors a simple
    rosemary‑roasted chicken paired with a vintage pinot noir, and occasionally treats himself to sushi rolls featuring toro and uni, always accompanied by a rotating selection of classic vinyl records.
  core: Eugene Cole is a disciplined yet inquisitive 62‑year‑old who balances data‑driven consulting with midnight vinyl listening, habitually postpones his annual health check‑up, and finds solace in solitary
    walks and craft‑beer brewing.
background:
  cultural: Eugene grew up in a close‑knit African‑American community in Columbus, Ohio, where church, family, and neighborhood solidarity were central values. The civil‑rights era shaped his awareness
    of both systemic challenges and collective resilience. He carries forward a deep respect for African‑American artistic traditions, from jazz and blues to contemporary visual arts, and feels a responsibility
    to uplift Black creators and entrepreneurs in his region. His cultural identity informs his appreciation for storytelling through art, his dedication to community service, and his nuanced perspective
    on navigating professional spaces as a Black man in the Midwest.
attributes:
  skills: '["Financial analysis", "Strategic planning", "Budgeting", "Market research", "Project management", "Community outreach", "Art evaluation and curation", "Mentoring", "Data visualization", "QuickBooks
