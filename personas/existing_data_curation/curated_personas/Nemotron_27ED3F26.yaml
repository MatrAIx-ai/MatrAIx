  hobbies: '["Visiting art galleries and museums", "Reading art history and philosophy", "Playing chess", "Collecting vintage vinyl records", "Home brewing craft beer", "Walking in nature", "Writing personal
    essays", "Mentoring youth in entrepreneurship", "Experimenting with VR art installations"]'
  career_goals: Eugene aims to channel his business expertise into part‑time consulting for local startups, with a focus on supporting Black‑owned enterprises in the Columbus area. He hopes to curate a
    small community art space that bridges commerce and creativity, offering workshops that teach artists basic financial management. Additionally, he seeks to mentor younger professionals through nonprofit
    programs, publish a series of essays on the intersection of art and entrepreneurship, and maintain financial independence to support his grandchildren’s education.
