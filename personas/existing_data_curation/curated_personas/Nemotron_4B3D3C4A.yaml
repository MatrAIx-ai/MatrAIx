personas:
  professional: Alethea Butler is a 20‑year‑old construction laborer specializing in concrete finishing, framing, and skid‑steer operation, whose competitive drive and sociable charisma keep crews motivated
    while their preference for structure helps impose order on otherwise chaotic job sites.
  sports: Alethea Butler organizes weekly basketball pick‑up games at the community park, follows the Miami Heat and Florida State Seminoles men's basketball teams, and follows a disciplined weight‑lifting
    routine at the local gym that mixes free weights and resistance bands.
  arts: Alethea Butler channels a love for hip‑hop and R&B by dancing to Beyoncé, Drake, and Megan Thee Stallion at local clubs, producing TikTok construction tutorials set to catchy beats, and attending
    live street‑art performances that inspire their creative side.
  travel: Alethea Butler prefers spontaneous weekend getaways, often driving to the Gulf Coast for beach relaxation or to Orlando for theme‑park thrills, while dreaming of a future construction tour of
    New York City skyscrapers and a road‑trip across the Southwest to explore diverse building styles.
  culinary: Alethea Butler enjoys cooking comfort dishes like shrimp and grits, spicy jambalaya, and protein‑packed smoothies, frequently grilling extra portions to share at community get‑together gatherings,
    yet admits to overindulging in sugary post‑workout snacks.
  core: Alethea Butler is a talkative, competitive construction apprentice who balances weekend basketball, TikTok fame, and spontaneous fun with a practical focus on career advancement and financial stability.
background:
  cultural: Alethea is a Black woman raised in Tallahassee’s historically African‑American neighborhoods. Her family’s roots trace back to the Great Migration, and she grew up hearing stories of civil‑rights
    activism at local churches and community centers. She celebrates Southern Black culinary traditions—like fried chicken, collard greens, and sweet tea—while also enjoying the vibrant music scene that
    blends gospel, hip‑hop, and jazz. The presence of Florida A&M University and the annual Tallahassee Black History Month events have reinforced her pride in Black history and her commitment to give back
    to the community through mentorship and service.
attributes:
  skills: '[''Concrete finishing'', ''Framing carpentry'', ''Operating skid steer'', ''Reading basic construction drawings'', ''OSHA safety compliance'', ''Team coordination'', ''On-site conflict resolution'',
