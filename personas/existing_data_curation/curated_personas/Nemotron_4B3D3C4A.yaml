  hobbies: '[''Hip-hop dancing'', ''Playing basketball'', ''TikTok content creation'', ''Weight‑lifting'', ''Mentoring youth in construction'', ''Cooking Southern comfort food'', ''Attending live music
    events'']'
  career_goals: Alethea aims to move from laborer to crew lead within the next two years, seeking OSHA 30‑hour certification and a journeyman apprenticeship in carpentry or concrete. She envisions becoming
    a foreman and ultimately a project manager who can oversee larger commercial builds. Long‑term, she hopes to launch a construction firm that prioritizes hiring and training other young people from her
    community, especially those from underrepresented backgrounds.
