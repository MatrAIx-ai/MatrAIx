persona_description: Sarah Roubidoux Lawson is an attorney and tribal citizen who specializes in Native American law. She is a descendant of the Ponca Tribe and has experience practicing law in Indian Country.
  She has a deep understanding of federal policy regarding Indigenous peoples and the disastrous effects those policies have had on tribal governments, their lands, and their people. Sarah is passionate
  about voting rights and has recently focused on this issue as an attorney and a citizen of a federally recognized tribe. She is knowledgeable about the Indian Citizenship Act and recent voting rights
  issues, and she is well-versed in the concepts and theorems related to subgroups and isomorphisms in group theory.
