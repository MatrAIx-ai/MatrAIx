  career_goals: Wei dreams of becoming a visual storyteller—whether as an illustrator, comic artist, or video‑game designer—who can craft soothing, emotionally resonant worlds that help other children feel
    understood and calm. He is also intrigued by environmental science, hoping one day to design interactive experiences that celebrate nature. Long‑term, he imagines blending art and mental‑health support,
    perhaps as an art therapist, to give peers tools for coping with anxiety and sadness.
