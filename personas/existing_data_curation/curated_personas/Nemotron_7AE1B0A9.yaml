personas:
  professional: Wei Liou, a budding graphic storyteller, channels curiosity and love for quiet reflection into detailed manga-inspired sketches, often using LEGO constructions as storyboards and practicing
    calligraphy to develop a unique visual narrative style that blends traditional brushwork with modern panel design.
  sports: Wei Liou, preferring solitary movement, spends weekends exploring local nature trails and practicing gentle park yoga, occasionally joining a community kids' swimming class, while cheering quietly
    from home for the local soccer team, the City Rapids, during televised matches.
  arts: Wei Liou, an avid lover of visual arts, devotes free hours to reading graphic novels like "Attack on Titans" and sketching narrative panels in a well-kept notebook, studies traditional brush-and-ink
    calligraphy inspired by classic masters, and finds solace listening to piano works by Ludovico Einaudi while assembling intricate LEGO dioramas.
  travel: Wei Liou, an introverted explorer, delights in weekend trips to nearby botanical gardens and forested parks for inspiration, dreams of visiting the historic library in Kyoto and the sprawling
    LEGO Discovery Center in Chicago, and prefers meticulously planned short itineraries to avoid overwhelming social settings.
  culinary: Wei Liou, who enjoys a modest palate, favors simple yet comforting dishes like sesame-tahini noodles, vegetable rice bowls, and matcha-flavored pastries, occasionally attempts homemade sushi
    rolls with parental help, and delights in tasting fresh strawberries while sipping a warm hibiscus tea during reading sessions.
  core: Wei Liou blends quiet curiosity with artistic ambition, navigates intense emotions through creative outlets and meditation, spends allowance on art supplies while dreaming of future travels, and
    often drifts between meticulous organization and delightful disarray.
background:
  cultural: Wei is a second‑generation Chinese‑American raised in Sun Valley, California. At home, his parents speak Mandarin and celebrate traditions such as Lunar New Year, the Mid‑Autumn Festival, and
    the practice of tea ceremony. This bilingual environment has given him fluency in both Mandarin and English. He attends a public elementary school where he interacts with a diverse student body, yet
    he often retreats to solitary spaces to recharge. Wei's artistic style is heavily influenced by traditional Chinese ink painting and contemporary anime, reflecting the blend of his cultural heritage
    and his curiosity for new artistic ideas. The values of harmony, respect, and consideration emphasized by his family resonate strongly with his kind, cooperative personality.
