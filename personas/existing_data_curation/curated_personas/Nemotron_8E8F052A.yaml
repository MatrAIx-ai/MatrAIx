  hobbies: '[''Cooking Mexican cuisine'', ''Desert hiking'', ''Community volunteering'', ''Gardening'', ''Reading about world cultures'', ''Mentoring youth'', ''Vintage electronics restoration'', ''Listening
    to music'', ''Mindfulness meditation'']'
  career_goals: Looking ahead, Cristian aims to transition into a strategic sourcing consultant role where he can leverage his decades of experience to mentor the next generation of buyers. He is passionate
    about championing sustainable and ethical procurement practices, and hopes to lead initiatives that connect local producers—particularly small Mexican‑owned farms—with regional retailers. By joining
    a trade association or forming a small consulting practice, he plans to advocate for transparent supply chains and develop training programs that emphasize compassion, cooperation, and cultural sensitivity
    in business. Ultimately, Cristian wants to leave a legacy of humane, resilient purchasing that benefits both the community and the environment.
