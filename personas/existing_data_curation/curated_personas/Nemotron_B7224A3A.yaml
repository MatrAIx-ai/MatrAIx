  hobbies: '[''Gardening'', ''Walking/Hiking'', ''Book Club'', ''Quilting'', ''Cooking/Baking'', ''Volunteering at Senior Center'', ''Bridge (Card Game)'', ''Community Theater'', ''Weekend Travel'']'
  career_goals: As she approaches retirement, Susan aims to transition into a part‑time mentorship and training role where she can share her extensive knowledge with newer staff. She hopes to obtain a formal
    certification in Customer Experience Management and explore opportunities to consult for small local businesses seeking to improve their client‑service processes. Balancing work with family time, Susan
    also plans to reduce her hours gradually while remaining an active, valued contributor to her organization’s culture of service excellence.
