personas:
  professional: Shaena Kelly, a three‑year‑old budding architect who spends hours arranging Lego bricks in precise, symmetrical patterns, showcasing an early love for structure, reliability, and a skeptical
    eye toward chaotic play, and they quietly prefer solitary construction over group projects.
  sports: Shaena Kelly attends a local toddler gymnastics class at Tiny Tots Gymnastics Club, enjoys watching the Seattle Seahawks on TV, and occasionally roots for the Seattle Mariners during family outings,
    they prefer structured practice sessions over chaotic playground games.
  arts: Shaena Kelly delights in watching Sesame Street episodes, sings along to Raffi’s “Baby Beluga,” and is fascinated by the colorful paintings of Mary Blair in Disney’s classic films, they often draw
    quietly with a set of pastel crayons they meticulously line up before use.
  travel: Shaena Kelly loves family trips to the nearby aquarium in Monterey Bay, has a growing collection of postcards from Orlando’s Disney World, and dreams of a future visit to the Grand Canyon, they
    favor well‑planned itineraries with familiar routines over spontaneous adventures.
  culinary: Shaena Kelly favors creamy macaroni and cheese, sweet strawberry banana smoothies, and peanut butter and jelly sandwiches, they show a budding preference for mild flavors and often insist on
    arranging their food on the plate in neat sections, though they’re reluctant to try spicy foods.
  core: Shaena Kelly turns everyday play into a meticulous project, saves their coins in tidy stacks, handles health routines with calm precision, and they quietly prefer solo puzzles to noisy playdates,
    embodying a structured yet gentle spirit.
background:
  cultural: Shaena is being raised in a predominantly white, middle‑class neighborhood in Jefferson County, Birmingham, Alabama. Her family embraces Southern cultural traditions, including regular attendance
    at a local Baptist church, structured family meals, and community events like church picnics and library storytimes. These routines reinforce her love of predictability and order. The household values
    politeness, modesty, and a strong sense of responsibility toward family, aligning with her reserved and dependable nature. She is exposed to regional customs such as Southern cuisine, country and gospel
    music, and storytelling that emphasize community, respect, and self‑reliance.
