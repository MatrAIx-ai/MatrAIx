  career_goals: Even at three, Shaena often declares she wants to become a teacher, a veterinarian, or a firefighter—careers she associates with order, responsibility, and helping others. These aspirations
    mirror her preference for structured environments, her competitive streak to be "the best" at tasks, and her desire to be reliable and dependable in the future.
