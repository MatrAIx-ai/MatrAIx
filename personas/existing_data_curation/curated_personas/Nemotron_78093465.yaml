  career_goals: Although officially retired, Leanne aims to remain a vibrant intellectual presence in her community. She plans to publish a collection of reflective essays that blend personal history with
    insights on art and education, and to create a modest online blog where she can share reviews of exhibitions and commentary on abstract concepts. She hopes to mentor budding teachers through a local
    Teachers‑After‑Retirement program, and to lead a quarterly art‑and‑storytelling workshop at the Bloomfield library. Long‑term, she envisions establishing a small scholarship for students pursuing arts‑focused
    majors at nearby colleges, and to volunteer as a docent at the Greene County Historical Museum.
