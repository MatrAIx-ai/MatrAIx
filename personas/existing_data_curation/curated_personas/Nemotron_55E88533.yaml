  career_goals: Keara aims to transition from her current household focus into a freelance creative professional. In the short term, she plans to launch a boutique visual‑consulting service that offers
    photography, branding, and custom home‑decor design for small businesses, artists, and community organizations in Mesa. To bolster credibility, she intends to enroll in a community‑college certificate
    program in visual arts and digital media. Over the next five years, she envisions opening a hybrid gallery‑café that showcases local desert‑inspired artwork while providing a retail space for her own
    mixed‑media creations and handcrafted décor. Her ultimate ambition is to become a recognized cultural catalyst in the Southwest, blending artistic innovation with entrepreneurial success.
