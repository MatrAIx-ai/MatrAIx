persona_description: A music teacher who specializes in the study of flute and flute technique. The teacher has adapted Charles Nicholson's School for the Flute to the modern flute, and has made significant
  changes to the fingering of the exercises and illustrations. The teacher is committed to preserving the old system of fingering while adhering to the new principles of flute design. The teacher is confident
  that the new edition of Nicholson's work will be well-received and will free them from the charge of presuming to add to or take away from the book.
