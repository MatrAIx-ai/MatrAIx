personas:
  professional: Randall Gaspard is an aspiring robotics engineer who channels their curiosity and disciplined organization into designing and programming simple robots for the school robotics club, often
    leading group projects while balancing creative problem‑solving with tried‑and‑true building methods.
  sports: Randall Gaspard is a member of the Pine Grove Junior Basketball team, practicing three times a week and joining Saturday family hikes along the Cedar Ridge Trail where they relish the challenge
    of steep climbs while cheering on their teammates and tracking personal improvement stats on a smartwatch, and they root for the Chicago Bulls during televised games.
  arts: Randall Gaspard fuels their imagination by devouring science‑fiction novels such as 'Ender’s Game' and 'The Hitchhiker’s Guide to the Galaxy', listening to iconic video‑game soundtracks like 'The
    Legend of Zelda' and 'Minecraft', and constructing elaborate LEGO dioramas that double as personal art installations, often sharing their creations on a family‑run YouTube channel.
  travel: Randall Gaspard prefers a blend of rugged adventure and family bonding, hiking the Blue Ridge Trail on weekend getaways, planning a future road trip to the Grand Canyon, and dreaming of an overseas
    visit to Tokyo’s Akihabara district to explore its anime and gaming culture, and they keep a scrapbook of maps and postcards from each outing.
  culinary: Randall Gaspard enjoys the simple comfort of homemade pepperoni pizza and mac‑and‑cheese, has honed a beginner’s skill in making smooth strawberry‑banana smoothies with fresh fruit, frequently
    experiments with LEGO‑themed cake decorations for birthday parties, and they occasionally help their parents prepare sushi rolls for family gatherings.
  core: Randall Gaspard embodies a hyper‑organized, curiosity‑driven middle‑schooler who balances a love for teamwork in basketball and robotics with a penchant for meticulous allowance budgeting and occasional
    forgetfulness about staying hydrated.
background:
  cultural: He is a white American growing up in Saratoga Springs, a small community in Utah County, Utah. The region is characterized by a close‑knit, family‑oriented environment with strong emphasis on
    outdoor recreation, such as hiking, skiing, and community festivals. His family participates in local traditions like seasonal fairs, community service days, and school events, fostering a sense of
    responsibility and cooperation. The cultural atmosphere blends contemporary American youth culture—technology, sports, and media—with the values of the Utah mountain communities that prioritize education,
    self‑reliance, and community involvement.
