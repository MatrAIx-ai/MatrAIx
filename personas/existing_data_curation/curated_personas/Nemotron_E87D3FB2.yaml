  career_goals: Randall envisions a future where he contributes to both scientific discovery and his community. He is fascinated by space exploration and hopes to become a NASA astronaut or an aerospace
    engineer, combining his curiosity for new ideas with practical engineering skills. He also aspires to pursue civil engineering to design sustainable infrastructure in his hometown, reflecting his desire
    to apply practical solutions to real-world problems. Alongside these ambitions, he aims to take on leadership roles in student organizations, championing collaborative projects and encouraging peers
    to achieve high standards.
