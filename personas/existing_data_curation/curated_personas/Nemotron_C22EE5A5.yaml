personas:
  professional: Michael Morgan is an aspiring robotics enthusiast who blends the hands‑on problem‑solving learned from farm chores with a curiosity for code, regularly tinkering in the school’s coding club
    and building functional birdhouse prototypes that showcase both practicality and creative flair, and they maintain a competitive edge on the field.
  sports: Michael Morgan plays wide receiver on the Crossville High football team and guard on the varsity basketball squad, trains year‑round with a disciplined routine that mirrors the community’s competitive
    spirit, roots for the Alabama Crimson Tide and the Nashville Predators, and they also enjoy cheering at the annual county fair’s tractor pull, embodying the town’s blend of high‑school pride and rural
    tradition.
  arts: Michael Morgan enjoys listening to country‑pop artists like Luke Bryan and mainstream pop stars such as Taylor Swift while crafting wooden birdhouses, attends the local community theater’s yearly
    production of 'Oklahoma!', and they sketch comic‑style illustrations of favorite video‑game heroes, letting music and visual art shape their creative downtime.
  travel: Michael Morgan favors weekend road trips to the Talladega National Forest for hiking, cherishes family vacations to the Gulf Coast’s white‑sand beaches, dreams of a spring‑break museum tour in
    Washington, D.C., and they plan each journey on a simple spreadsheet that balances school duties, sports practice, and a modest travel budget.
  culinary: Michael Morgan prefers Southern comfort foods such as fried chicken, buttery biscuits, and grilled corn on the cob, can competently whip up a skillet mac and cheese using cheddar, cream cheese,
    and breadcrumbs for teammates after games, experiments with homemade BBQ sauce that blends smoky paprika, brown sugar, and a splash of apple cider vinegar, and they often share their culinary creations
    with family and friends after practice.
  core: Michael Morgan is a competitively spirited, calm 14‑year‑old who merges a love for football, coding, and carpentry into a pragmatic worldview, tempered by a skeptical edge, and they have a habit
    of staying up late perfecting robot programs.
background:
  cultural: Michael was raised in Crossville, a tight‑knit rural community in DeKalb County, Alabama. His family follows typical Southern customs, attending the local church, participating in community
    events like county fairs, and valuing self‑reliance and neighborly support. The town’s strong high‑school sports culture and emphasis on hands‑on work—whether on farms or in small workshops—have shaped
    his practical mindset and competitive spirit, while the close‑family environment fosters his calm resilience and sociable demeanor.
attributes:
  skills: '[''Collaborative problem‑solving'', ''Basic programming (Scratch)'', ''Woodworking and basic carpentry'', ''Event planning and organization'', ''Public speaking and presentation'']'
  hobbies: '[''Football'', ''Basketball'', ''School coding club'', ''Robotics kit projects'', ''Woodworking (birdhouses, small furniture)'', ''Multiplayer strategy video games'', ''Farm chores with grandparents'']'
  career_goals: Michael aims to become a mechanical engineer or a robotics technician, blending his love for building things with his curiosity about how machines work. He envisions joining a high‑school
    robotics team, earning scholarships for STEM programs, and eventually designing innovative tools that help his community. He also dreams of playing varsity football and possibly pursuing a leadership
    role on the team, reflecting his competitive drive and desire to be recognized for both athletic and technical achievements.
