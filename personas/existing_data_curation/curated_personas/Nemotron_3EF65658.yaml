  hobbies: '[''Pow‑wow drumming and dancing'', ''Community storytelling evenings'', ''Gardening (traditional crops)'', ''Card games with friends'', ''Woodworking projects'', ''Attending local basketball
    games'', ''Yoga for relaxation'', ''Listening to classical Indian music'']'
  career_goals: Even in retirement, Rafael is driven by a desire to leave a lasting legacy for his tribe and family. He aims to compile a written and audio collection of oral histories from elders, ensuring
    that younger generations have access to authentic narratives. He plans to establish a small cultural center in Shiprock that offers workshops in traditional crafts, language classes, and health education.
    Additionally, Rafael hopes to launch a modest family‑run venture selling handcrafted furniture and woven goods, providing both income for his grandchildren and a platform to showcase Navajo artistry.
    He also seeks to advocate for increased funding for tribal health programs, using his community‑organizing experience to influence local policy.
