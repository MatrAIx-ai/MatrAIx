personas:
  professional: Rafael Srinivasan is a retired master carpenter and community organizer whose decades‑long expertise in woodworking, traditional dwelling construction, and multilingual storytelling enable
    them to mentor youth while balancing curiosity about modern problem‑solving with a practical, organized approach to launching a cultural center and a family‑run furniture venture.
  sports: Rafael Srinivasan enjoys attending local basketball games of the New Mexico State Aggies, participates in weekly low‑impact yoga sessions, and occasionally joins community pick‑up basketball,
    balancing their energetic social nature with a competitive edge that sometimes turns friendly matches into heated contests.
  arts: Rafael Srinivasan finds solace in listening to the classical Indian ragas of Ravi Shankar and the sitar improvisations of Ustad Zakir Hussain while also appreciating the poetry of Maya Angelou and
    the brushwork of contemporary watercolorist Mary Whyte, integrating these influences into their own woodworking designs and storytelling sessions.
  travel: Rafael Srinivasan prefers carefully planned road trips to culturally rich sites like the Grand Canyon, Machu Picchu, and Varanasi, balancing a love for adventure with the practicality of limited
    mobility and a modest travel budget, and they often bring back seeds or art supplies for their garden and workshop.
  culinary: Rafael Srinivasan enjoys cooking hearty dishes such as corn‑bean succotash, spiced dal makhani, and roasted root vegetables seasoned with sage and cumin, displaying intermediate cooking skills
    that blend traditional flavors with occasional experimental twists, though they sometimes over‑salt dishes when stressed.
  core: Rafael Srinivasan is a sociable, competitive elder who weaves cultural traditions into woodworking and community projects, yet worries constantly, occasionally over‑commits, and harbors a skeptical
    eye toward new ideas while staying curious.
background:
  cultural: Rafael is a proud member of the Navajo Nation, raised in Shiprock, NM, where he grew up immersed in Diné traditions, language, and ceremonies such as the Blessing Way. His paternal lineage traces
    back to South Indian (Tamil) ancestors, which explains his middle name, Christian, and surname, Srinivasan. This dual heritage gives him a unique perspective, allowing him to blend Navajo cultural practices
    with elements of Indian philosophy, like yoga and mindfulness. Fluent in English, Diné Bizaad, and conversational Hindi, he serves as a cultural liaison, fostering understanding between his Navajo community
    and broader multicultural initiatives. His marriage to a fellow Navajo woman has reinforced his commitment to tribal customs, and together they raise grandchildren who are taught to honor both their
    Navajo roots and the broader tapestry of their family’s history.
