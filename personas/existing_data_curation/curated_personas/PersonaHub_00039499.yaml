persona_description: A prominent academic leader and researcher at the University of Queensland (UQ), known for his significant contributions to the fields of biomedical and clinical health sciences, technology,
  engineering, biological sciences, chemical sciences, environmental sciences, and physical sciences. He is a member of the UQ research team that has received funding from the Australian Cancer Research
  Foundation and has taken the lead in numerous areas of cancer research. His research has been recognized with awards and grants from major donors, and his work has been highly rated in broad fields by
  the Excellence in Research for Australia 2012 National Report. He is also known for his leadership in expanding and growing UQ, and for his role in the establishment of the University's Gatton and Ipswich
  campuses.
