personas:
  professional: James Rawls is a seasoned facilities maintenance specialist with three decades of hands-on HVAC, plumbing, electrical, and carpentry expertise, whose curiosity for smart-home tinkering and
    love of art lighting fuels an unconventional, sometimes disorganized approach to leading a maintenance team and launching a boutique consultancy for historic homes and galleries.
  sports: James Rawls enjoys early-morning fishing on the Estero River and the Gulf, is a member of the Fort Myers Rod and Reel Club, watches the Tampa Bay Buccaneers on weekends, follows the Miami Dolphins,
    occasionally joins a local senior softball league, and participates in a community walking group for gentle cardio.
  arts: James Rawls frequents the Gulf Coast Museum of Art and the downtown contemporary gallery, collects vintage postcards and limited-edition art prints, builds custom lighting for his woodworking projects,
    finds inspiration in classic rock legends like The Rolling Stones and blues icons such as B.B. King, and attends performances at the Fort Myers Community Theatre.
  travel: James Rawls prefers spontaneous road trips along Florida's Gulf Coast, often stopping in Naples for fresh seafood, wandering the historic streets of Savannah for its art scene, and exploring the
    quirky eateries of Key West, balancing his love of new culinary experiences with a flexible, low-budget planning style that accommodates his occasional retirement-related anxiety.
  culinary: James Rawls cooks with a moderate skill level, regularly grilling Gulf snapper and shrimp tacos seasoned with garden-grown cilantro and lime, loves a well-made key-lime pie, and delights in
    pairing meals with craft beers while occasionally indulging in a hearty steak when dining out in coastal towns.
  core: James Rawls is a curious, art-loving maintenance veteran who blends hands-on problem solving with a love of fishing, vintage collectibles, and occasional financial worry, juggling a flexible work
    style and a penchant for spontaneous coastal road trips.
background:
  cultural: James grew up in a middle‑class white family in central Florida, absorbing the relaxed Gulf‑Coast lifestyle and Southern hospitality. His upbringing featured regular Methodist church attendance,
    community volunteerism, and family barbecues centered around outdoor activities. The multicultural flavor of Southwest Florida—particularly Hispanic culinary influences and a strong boating culture—shaped
    his palate and leisure pursuits. He carries a practical, hands‑on work ethic common among trades families in the region, while his appreciation for art reflects the diverse cultural scene of Fort Myers
    and nearby Naples. He values independence, self‑reliance, and the freedom to explore varied experiences, blending traditional American values with the eclectic, laid‑back vibe of the Florida Gulf Coast.
attributes:
  skills: '[''HVAC maintenance and repair'', ''Plumbing troubleshooting and pipe replacement'', ''Electrical wiring and circuit repair'', ''Carpentry and furniture restoration'', ''Appliance repair'', ''Preventive
    maintenance planning'', ''OSHA safety compliance'', ''EPA refrigerant handling certification'', ''Building codes interpretation'', ''DIY smart home automation'', ''Technical schematics reading'', ''Root‑cause
    analysis'', ''Basic microcontroller programming'', ''Art lighting and display maintenance'']'
  hobbies: '[''Visiting art galleries and museums'', ''Fishing in Estero River and Gulf waters'', ''Vegetable gardening'', ''Woodworking hobby projects'', ''Collecting vintage postcards and art prints'',
    ''Arduino and Raspberry Pi tinkering'', ''Listening to classic rock and blues music'', ''Attending community theater'', ''Reading mystery novels and self‑help books'', ''Exploring new restaurants and
    road trips'']'
  career_goals: James aims to obtain a Certified Maintenance Manager (CMM) credential within the next two years and transition into a supervisory facilities‑manager role overseeing multiple residential
    and commercial properties in the Fort Myers area. He hopes to launch a part‑time boutique maintenance consultancy that specializes in historic homes and small art galleries, merging his trade expertise
    with his love of art. Mentoring a junior apprentice is a key personal goal, as is building a reliable income stream to ease retirement‑related anxiety. He also plans to implement more structured maintenance
    schedules and delegate tasks to reduce workplace stress and improve work‑life balance.
