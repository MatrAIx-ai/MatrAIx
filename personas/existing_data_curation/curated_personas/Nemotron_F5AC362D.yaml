personas:
  professional: Angelo Motley is a 25‑year‑old carpenter who blends hands‑on ingenuity with practical safety standards, excels at framing and custom furniture fabrication, and leverages their spontaneous
    problem‑solving to lead small crews despite a chronic struggle with meeting project deadlines.
  sports: Angelo Motley fuels fitness through weekly pickup basketball games with the Sunset Park Pick‑up Squad, quietly roots for the Las Vegas Aces and Raiders while avoiding crowded arenas, and punctuates
    the summer with hikes in Red Rock Canyon whenever a project deadline eases.
  arts: Angelo Motley finds inspiration in the moody improvisations of Miles Davis, the soulful riffs of B. B. King, and the modern vibe of Erykah Badu while crafting furniture, spends evenings sketching
    design concepts to the soundtrack of Kamasi Washington, and occasionally attends live performances at the Smith Center to recharge their creative spirit.
  travel: Angelo Motley prefers low‑key road trips that blend nature and design, having driven to Zion and the Grand Canyon for photography, planning a future pilgrimage to Copenhagen’s Scandinavian furniture
    fairs, and dreaming of a study tour in Japan’s traditional joinery workshops—all on a modest budget balanced with their savings goals.
  culinary: Angelo Motley enjoys cooking simple yet nutritious meals like quinoa‑fruit salad with lemon‑dressed grilled salmon, nails a rosemary‑infused focaccia using reclaimed wheat flour, and relishes
    weekend brunch featuring avocado toast topped with smoked salmon, while usually brewing a single‑origin pour‑over coffee to accompany their woodworking sessions.
  core: Angelo Motley is a 25‑year‑old carpenter whose curiosity‑driven projects are tempered by chronic deadline anxiety, a habit of hoarding reclaimed wood, and a relentless quest for sustainable design.
background:
  cultural: Angelo grew up in a predominantly African‑American neighborhood of North Las Vegas, where community ties and church gatherings were central to family life. His grandparents worked in manual
    trades, passing down a respect for craftsmanship and the value of hard work. The cultural rhythm of soul music, community barbecues, and storytelling has shaped his collaborative spirit and his desire
    to give back. Living in the desert Southwest has also exposed him to a blend of traditional Southwestern architecture and modern tourism‑driven design, influencing his appreciation for both classic
    building methods and innovative, eco‑friendly approaches.
attributes:
  skills: '["Framing", "Finish Carpentry", "Custom Furniture Fabrication", "Blueprint Reading", "Tool Maintenance", "On‑site Problem Solving", "Small‑Team Coordination", "Safety Compliance"]'
  hobbies: '["Woodworking Projects", "Guitar Building", "Vintage Furniture Restoration", "Listening to Jazz/Blues", "Podcasts on Carpentry and Sustainable Design", "Reading Science & Tech Articles", "Sketching
    Design Ideas", "Hiking", "Pickup Basketball", "Volunteer Teaching Woodworking"]'
  career_goals: Angelo aspires to become a master carpenter and eventually open his own boutique woodworking studio that specializes in sustainable, handcrafted furniture for the Las Vegas community. He
    wants to earn a certified journeyman credential, learn advanced green building techniques, and develop stronger project‑management skills to overcome his difficulty with deadlines. Long‑term, he hopes
    to mentor at‑risk youth through a local trade apprenticeship program, using his trade as a pathway to economic stability.
