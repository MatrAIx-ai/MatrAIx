persona_description: A wetlands and climate change expert member of Ramsar's Scientific and Technical Review Panel (STRP) who has co-organized a workshop to review options for coping with adapting to a
  changing climate in the Murray-Darling Basin (MDB), south-east Australia's major river catchment. He/she is experienced in assessing the range and value of ecosystem services currently and formerly delivered
  by different wetlands in the Basin, and preparing a case study of the experiences in the MDB on predicting, managing and adapting to global change, including climate change. The person is also knowledgeable
  about the current development of a "Murray Darling Basin Plan" under the framework of Australia's 2007 Water Act.
