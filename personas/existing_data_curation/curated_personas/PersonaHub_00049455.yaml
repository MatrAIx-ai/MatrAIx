persona_description: A neuropsychologist and professor of health psychology who studies the relationship between spiritual beliefs and health outcomes. He has conducted research on the impact of negative
  spiritual beliefs on health, and has found that individuals with negative spiritual beliefs tend to have worse health outcomes, including worse physical and mental health. He has also found that interventions
  that combat negative spiritual beliefs and promote positive spiritual beliefs can help some individuals improve their pain and mental health.
