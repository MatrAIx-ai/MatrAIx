  career_goals: Aundra aims to advance to a senior operations leadership role where she can shape organizational strategy and drive sustainable process improvements across the company. She hopes to mentor
    the next generation of operations specialists, implement eco‑friendly initiatives within the supply chain, and eventually transition into a consulting capacity that allows her to share best practices
    with non‑profit organizations in the Cuyahoga County area. Balancing professional growth with personal well‑being remains a central ambition.
