  hobbies: '["sketching street murals", "digital illustration", "reading graphic novels", "strategy video gaming (Civilization, Minecraft)", "playing acoustic guitar", "hiking and nature walks", "photography"]'
  career_goals: Nelson aims to pursue a technical college program in graphic design or industrial design, eventually becoming a professional illustrator or UI/UX designer for video games and apps. He also
    dreams of creating culturally resonant artwork that blends Mexican motifs with contemporary digital media. Over the long term, he hopes to launch his own freelance studio where he can mentor other young
    artists from his community and integrate his love of technology and design.
