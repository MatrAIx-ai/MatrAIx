personas:
  professional: An aspiring digital illustrator and burgeoning game designer, Nelson Castrillon channels a methodical, curiosity‑driven approach into meticulously planning pixel‑perfect murals and strategic
    gameplay maps, while their competitive streak pushes them to refine every brushstroke and puzzle solution.
  sports: A casual yet competitive athlete, Nelson Castrillon joins a small school cross‑country team, participates in Saturday pickup soccer with the Mission Hawks, roots for the Dallas Cowboys and Houston
    Astros, and analyzes game tactics like a strategist, though they prefer solo jogs over crowded gym sessions.
  arts: A dedicated creative, Nelson Castrillon spends afternoons sketching Mission’s vibrant street murals before digitizing them, devours graphic novels like *Saga* and *Sandman*, strums acoustic guitar
    with a penchant for folk‑rock artists such as Iron & Wine, and captures everyday border‑land moments through photography, often citing Banksy and Moebius as stylistic influences.
  travel: A curious wanderer, Nelson Castrillon has trekked the Texas Hill Country, explored San Antonio’s River Walk, dreams of visiting Barcelona’s street art districts and Kyoto’s manga cafés, plans
    trips with meticulous itineraries on Google Sheets, yet balances wanderlust with school responsibilities, favouring weekend getaways over extended vacations.
  culinary: A budding home chef, Nelson Castrillon whips up grilled chicken fajitas with fresh cilantro and chipotle, experiments with sushi rolls using avocado and seaweed after watching online tutorials,
    enjoys spicy chiles rellenos at local taquerías, but admits to over‑seasoning dishes because they love bold flavors more than precise measurements.
  core: Nelson Castrillon blends a meticulous, competitive mind with a love for art and nature, yet frequently trades sleep for late‑night brush‑pack downloads and skips flossing in the rush of schoolwork.
background:
  cultural: Nelson is a first‑generation Mexican‑American who grew up in Mission, Texas, a city shaped by its proximity to the Mexico‑U.S. border. He speaks Spanish at home with his parents and grandparents,
    preserving familial traditions, while using English at school and in his wider community. His family celebrates Mexican holidays such as Día de los Muertos and Cinco de Mayo, and he often helps with
    the preparation of traditional dishes like tamales and tacos de barbacoa. The cultural blend of Tex‑Mex cuisine, local music, and cross‑border commerce informs his artistic perspective, prompting him
    to incorporate vibrant colors, folkloric symbols, and border‑region narratives into his creative work.
