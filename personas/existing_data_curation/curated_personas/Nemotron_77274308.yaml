  career_goals: Kaitlin often talks about growing up to be an elementary school teacher because she loves helping younger children learn in a calm, well‑structured environment where everyone feels safe
    and respected. She also imagines caring for animals as a veterinarian, reflecting her gentle nature and desire to relieve stress for both pets and their owners. Ultimately, she hopes to combine her
    love for organization and kindness by creating supportive spaces for children, whether in a classroom or a community program.
