personas:
  professional: Kaitlin Ronan, an aspiring junior botanist, leverages her love for gardening and meticulous nature to document plant growth in an organized journal, applying the same careful planning she
    uses for LEGO sets while balancing a desire for structure with occasional creative improvisation demanded by school science projects.
  sports: Kaitlin Ronan enjoys brisk nature‑trail walks in Fort Bend County, participates in the local Girls’ Soccer Club (FC Brazos), cheers for the Houston Astros and Houston Dynamo, and balances her
    active outings with occasional Saturday morning swim lessons at the community center.
  arts: Kaitlin Ronan immerses herself in the fantastical worlds of J.K. Rowling’s Harry Potter series, Rick Riordan’s Percy Jackson, and The Chronicles of Narnia, while she practices vocal pieces from
    Disney’s Frozen soundtrack and sketches detailed scenes inspired by the animation style of Hayao Miyazaki.
  travel: Kaitlin Ronan eagerly explores the pine‑scented trails of Stephen F. Austin State Park, takes family road trips to the Gulf Coast beaches of Galveston, longs to visit the magical realms of Disneyland
    in California and the castles of Scotland, and prefers meticulously planned itineraries with plenty of time for nature walks and snack breaks.
  culinary: Kaitlin Ronan delights in assembling her own healthy snack plates, favoring crunchy carrot sticks with hummus, homemade mac and cheese with a sprinkle of cheddar, and occasionally attempts to
    bake chocolate chip cookies under her mother’s guidance, proudly watching the butter melt into the dough.
  core: Kaitlin Ronan is a detail‑oriented 9‑year‑old who balances a love for structured LEGO builds and garden care with a vivid imagination for fantasy tales, yet often battles worrying thoughts that
    lead her to double‑check school assignments and stash extra pennies in secret jars.
background:
  cultural: 'Kaitlin comes from a white, primarily Anglo‑American family that has lived in the Richmond area of Fort Bend County for generations. Her upbringing blends typical suburban Texas life with Southern
    hospitality: family gatherings often feature homemade barbecue, Fourth of July fireworks, and celebrations of holidays like Thanksgiving and Christmas. Though the community is increasingly diverse,
    her family maintains traditions such as attending a local Protestant church, participating in school and neighborhood events, and valuing education and community service. These cultural influences shape
    her respect for order, teamwork, and caring for others.'
