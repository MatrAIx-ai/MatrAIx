persona_description: A school leader who is passionate about implementing restorative practices and believes in the effectiveness of restorative practices in promoting positive school environments and decreasing
  problem behaviors. This person has a deep understanding of the 11 Essential Elements of the Whole-School Change Program and is committed to applying professional development towards graduate credit. They
  are experienced in working with staff teams, developing customized plans, and supporting the implementation of restorative practices. This person is also interested in conducting research projects and
  has a unique understanding of the RAND Corporation's SaferSanerSchools program and the Johns Hopkins University School of Education's randomized controlled study on the effectiveness of restorative practices
  on school climate and discipline.
