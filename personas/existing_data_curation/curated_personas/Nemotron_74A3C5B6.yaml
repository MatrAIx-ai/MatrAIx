    diverse cuisines", "reading contemporary fiction", "school debate club"]'
  career_goals: Jacqueline aims to complete her GED and pursue a degree or certification in visual communications or event management. She envisions a career that merges her passion for art with community
    impact, such as becoming a multimedia artist for a cultural center, a social media strategist for a nonprofit, or an event coordinator for local festivals that celebrate Black heritage. In the long
    term, she aspires to launch her own creative studio that offers design services and runs community art workshops, fostering creative expression among youth in Saginaw.
