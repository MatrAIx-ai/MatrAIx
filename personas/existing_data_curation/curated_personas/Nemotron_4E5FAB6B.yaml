  hobbies: '[''Visiting art galleries and museums'', ''Attending live music and theater'', ''Photography'', ''Playing acoustic guitar'', ''Cooking Caribbean and Southern dishes'', ''Reading contemporary
    fiction and poetry'', ''Gardening'', ''Meditation and mindfulness'', ''Road trips to cultural festivals'', ''Mentoring youth in community programs'']'
  career_goals: Andrew aspires to shape a regional career‑development program that centers on creative industries and equitable access for underserved Black youth. He aims to earn a senior leadership credential
    such as a Certified Career Development Practitioner and eventually become director of a university counseling center where he can mentor new counselors. Long‑term, he envisions launching a nonprofit
    that offers free career‑exploration workshops, mentorship, and scholarships for students pursuing arts‑related pathways. He also plans to author a guidebook on navigating non‑traditional career routes
    that fuse art, technology, and entrepreneurship.
