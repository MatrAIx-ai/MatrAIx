personas:
  professional: Andrew Celus is a career counselor who blends humanities insight with creative facilitation, designing workshops that use visual arts and music to help students and adult learners map out
    non‑traditional career paths, while their empathetic, flexible style lets them navigate the chaos of grant paperwork and curriculum development with a laid‑back, improvisational flair.
  sports: Andrew Celus enjoys Saturday morning jogs along the BeltLine and plays midfield for a community rec soccer league, roots for the Atlanta Falcons and Atlanta Braves, and attends occasional yoga
    classes at a local studio to counterbalance their love of late‑night concerts.
  arts: Andrew Celus frequents the High Museum exhibitions, especially works by Kehinde Wiley and contemporary photographer Carrie Mae Weems, plays acoustic guitar to the tunes of Joni Mitchell and Amy
    Winehouse, and participates in a community theater troupe that stages August Wilson dramas, finding personal resonance in stories of artistic struggle.
  travel: Andrew Celus prefers weekend road trips to culturally vibrant festivals, having explored Savannah’s Savannah Music Festival, Charleston’s Spoleto Festival USA, and dreaming of a spring pilgrimage
    to New Orleans’ Mardi Gras and a summer visit to the historic streets of Cartagena, Colombia.
  culinary: Andrew Celus experiments with Caribbean‑inspired dishes like jerk chicken with mango salsa, curried goat stew, and plantain chips, honing a moderate cooking skill that blends fresh herbs like
    thyme and scotch bonnet peppers, while they relish dining out at farm‑to‑table bistros for seasonal salads with quinoa and roasted beet.
  core: Andrew Celus is a 43‑year‑old career counselor who turns every counseling session into an artistic jam session, lives for spontaneous road trips, forgets to file taxes on time, and believes that
    a well‑timed coffee break can solve most of life’s puzzles.
background:
  cultural: Andrew grew up in a predominantly Black neighborhood in central Florida, where church gatherings, soul music, and community events fostered a strong sense of identity and mutual support. His
    family's emphasis on education as a pathway to advancement, combined with exposure to African‑American literature, jazz, and the vibrant cultural tapestries of nearby Caribbean communities, shaped his
    worldview. These roots inform his commitment to equity, his appreciation for artistic expression, and his drive to empower the next generation of Black creators and professionals. While he honors Southern
    traditions, he also embraces the broader African diaspora, integrating its histories and values into his counseling practice.
attributes:
  skills: '[''Career counseling'', ''Academic advising'', ''Career assessment (Strong Interest Inventory, MBTI)'', ''Individual and group facilitation'', ''Curriculum development'', ''Program evaluation'',
