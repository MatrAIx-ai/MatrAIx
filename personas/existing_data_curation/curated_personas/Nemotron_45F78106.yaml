personas:
  professional: Cyrus Sapp, a radiologic technologist who blends meticulous radiation safety protocols with a pragmatic curiosity, leverages precise patient positioning, digital imaging expertise, and real‑time
    troubleshooting while navigating fast‑paced clinical teams with organized flexibility and occasional assertive leadership.
  sports: Cyrus Sapp, an intramural basketball enthusiast and avid hiker on the Little Miami River trail, supports the Cincinnati Bengals and follows the Ohio State Buckeyes during college football season,
    while maintaining a flexible fitness regimen that alternates between court drills, weekend trail runs, and occasional yoga to counterbalance his competitive edge.
  arts: Cyrus Sapp, a guitar‑playing photographer who trades open‑mic nights at local cafés for urban architecture shoots, draws inspiration from indie rockers like Tame Impala and the visual storytelling
    of photographer Annie Leibovitz, and weaves his love of music and imagery into collaborative art projects with friends.
  travel: Cyrus Sapp, a weekend explorer who prefers spontaneous road trips to Ohio’s state parks and has already trekked the Hocking Hills, dreams of capturing the Northern Lights in Iceland and the cherry
    blossoms in Kyoto, and balances his travel cravings with a modest budget that prioritizes affordable hostels and group tours.
  culinary: Cyrus Sapp, an experimental home chef who enjoys crafting sous‑vide steak tacos, miso‑glazed carrots, and honey‑sriracha chicken wings, often sourcing fresh herbs from the local farmers’ market
    and testing bold flavor combos while occasionally burning the toast in late‑night gaming sessions.
  core: Cyrus Sapp, a sociable 22‑year‑old radiologic tech who fuses scientific precision with creative pursuits, juggling basketball courts, guitar strings, camera lenses, and a disciplined yet flexible
    approach to life—though prone to late‑night snack binges and occasional over‑commitment.
background:
  cultural: Cyrus was raised in the suburban neighborhoods of Dayton, Ohio, within a family of German‑Irish descent that values Midwestern modesty, hard work, and community involvement. His upbringing emphasized
    practical problem‑solving, a love for outdoor activities, and a friendly, outgoing demeanor typical of the region. He participates in local traditions such as Thanksgiving gatherings, neighborhood barbecues,
    and supporting the Cincinnati Bengals. The cultural emphasis on reliability and teamwork aligns with his collaborative nature, while the pragmatic Midwestern ethos reinforces his balance of curiosity
    and practicality in both his professional and personal life.
