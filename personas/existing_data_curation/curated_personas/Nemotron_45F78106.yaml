  career_goals: Cyrus aims to become a lead radiologic technologist within the next five years, securing advanced certifications such as the ARRT, CT, and MRI credentials. He plans to pursue a master’s
    degree in medical imaging or health physics to deepen his technical expertise and eventually specialize in interventional radiology, focusing on dose‑reduction protocols and patient‑centered care. In
    the longer term, he envisions transitioning into a supervisory or educational role, mentoring new technicians and contributing to department quality‑improvement initiatives. He also hopes to volunteer
    his skills by offering radiation‑safety workshops at community health fairs and, one day, launching a small consulting service for imaging workflow optimization.
