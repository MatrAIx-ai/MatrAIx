persona_description: A user interested in accessing and visualizing global climate data, particularly from the Global Historical Climatology Network (GHCN) and other related datasets. This user is likely
  to be a geographer, climatologist, or researcher who is interested in studying long-term climate patterns and trends around the world. They may be interested in using the GLOBE Visualization System to
  analyze and visualize these data, as well as in using the National Centers for Environmental Information (NCEI) data sets for further analysis. They may also be interested in using the GLOBE OGC Web Map
  Service Documentation to explore the mapping tools available for visualizing and analyzing the data.
