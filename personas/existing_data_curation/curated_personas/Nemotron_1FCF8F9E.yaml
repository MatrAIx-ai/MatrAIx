personas:
  professional: Evens Simmons is a seasoned casino surveillance officer who expertly manages multi-camera CCTV systems, conducts meticulous video analysis, and drafts precise incident reports, and they
    leverage their structured, detail‑oriented mindset and empathetic approach to mentor minority colleagues and champion equitable treatment.
  sports: Evens Simmons jogs along the West Palm Beach shoreline each sunrise, participates in a local beach‑volleyball league during summer, follows the Miami Dolphins and Miami Heat loyally, and they
    incorporate weekly yoga sessions at a community studio to maintain flexibility and mental calm.
  arts: Evens Simmons curates a growing collection of vintage vinyl, favoring classic R&B legends like Marvin Gaye and Anita Baker as well as jazz greats such as John Coltrane, and they unwind by binge‑watching
    detective series like "Columbo" and "True Detective," reflecting a deep appreciation for soulful storytelling.
  travel: Evens Simmons enjoys meticulously planned getaways that blend cultural immersion and relaxation, favoring destinations like New Orleans for its music heritage, the Bahamas for beach retreats,
    and a dream trip to Paris to explore historic jazz clubs, and they balance this with a mid‑life schedule and family commitments.
  culinary: Evens Simmons excels at preparing soulful dishes such as smoked collard greens, seasoned fried chicken, and shrimp‑and‑grits, frequently seasoning with smoked paprika and hot sauce, and they
    delight in hosting friends for potluck‑style meals that showcase their love for homemade flavor and communal dining.
  core: Evens Simmons is a detail‑driven security professional who balances a structured work ethic with a passion for vintage music, and they manage high emotional reactivity through yoga and occasional
    impulsive splurges on record collections.
background:
  cultural: Raised in a close‑knit African‑American family in South Florida, Evens carries a strong sense of Black cultural identity that shapes her worldview. She grew up celebrating traditions such as
    Juneteenth, Kwanzaa, and family cookouts, and she remains active in the West Palm Beach Black Professionals network and her local historically Black church. Her upbringing emphasized resilience, community
    support, and the importance of education, values she brings to her security role by advocating for equitable treatment and cultural sensitivity within the casino environment. Being a Black woman in
    a predominantly white security field, she is aware of the unique challenges that can arise, and she uses her lived experience to foster inclusive communication and to mentor other minority colleagues.
    This cultural grounding also influences her leisure activities, from the music she enjoys to her involvement in community outreach programs.
attributes:
  skills: '[''CCTV operation and monitoring'', ''Incident response and reporting'', ''Conflict de‑escalation'', ''Risk assessment'', ''Knowledge of Florida gambling regulations'', ''Use of surveillance
    software (e.g., Genetec, Axon)'', ''First aid and CPR certification'', ''Structured record‑keeping and compliance documentation'', ''Training and mentorship of new security staff'']'
  hobbies: '[''Listening to R&B and jazz'', ''Cooking soul‑food meals'', ''Yoga and meditation'', ''Jogging on the beach'', ''Reading mystery and true‑crime novels'', ''Volunteering at a youth center (self‑defense
    classes)'', ''Attending church services'', ''Collecting vintage vinyl records'', ''Watching detective TV series'']'
  career_goals: Evens aims to move into a supervisory role within casino security over the next three to five years, leveraging her detail‑oriented style and desire for predictable structures. She plans
    to earn a Certified Security Supervisor (CSS) credential and complete an associate’s degree in criminal justice, which will equip her for a security manager position overseeing a team of surveillance
    officers. Long‑term, she envisions becoming a security consultant for hospitality venues, focusing on developing comprehensive surveillance protocols and training programs that incorporate mental‑health
    awareness for staff. She also hopes to advance her expertise in digital forensics to support investigations of cheating and fraud.
