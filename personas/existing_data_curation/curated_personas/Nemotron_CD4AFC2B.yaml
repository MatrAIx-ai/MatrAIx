  career_goals: 'As she approaches retirement, Jessica aims to shift from full‑time HR management to a part‑time consultancy role where she can help small and mid‑size companies integrate data‑driven people
    practices without sacrificing the human touch. She aspires to mentor emerging HR professionals, especially those transitioning from liberal arts backgrounds, by offering workshops on balancing innovative
    HR tech with proven policies. Beyond consulting, she hopes to author a practical handbook titled “Human Resources: Bridging Curiosity and Pragmatism,” which captures her blended approach. A long‑term
    ambition is to lead a community‑based initiative that provides pro‑bono HR support to nonprofit organizations in Fairfield County, reinforcing her competitive drive to achieve measurable impact.'
