  career_goals: He aims to continue contributing to his community by curating exhibitions at the Natick Public Library and serving on the advisory board of the local museum. He wishes to mentor younger
    volunteers and share his experience. He plans to write a memoir that interweaves his personal stories with Natick's history, and to enroll in a watercolor painting class at the community center. Furthermore,
    he hopes to champion mental‑health awareness within senior groups, using his own experiences with anxiety and sadness to support peers.
