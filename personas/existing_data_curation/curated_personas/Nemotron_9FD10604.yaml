personas:
  professional: Josephine Guerrero, an eight‑year‑old budding junior artist and community organizer in the making, channels her meticulous planning and love for teamwork into leading her school’s art club
    projects, where she sketches vibrant scenes with colored pencils and orchestrates group murals.
  sports: Josephine Guerrero dashes across the fields of Pinellas Park as a forward for the Firebirds U‑9 soccer club, cheers on the Tampa Bay Rays during baseball season, and spends weekend afternoons
    tagging with friends at the local park, always keeping a water bottle handy for after‑practice hydration.
  arts: Josephine Guerrero fills her sketchbook with colorful illustrations inspired by the whimsical worlds of Dr. Seuss and the bold strokes of Picasso, while salsa rhythms from legends like Celia Cruz
    fuel her spontaneous kitchen‑dance sessions and spark her imagination for the adventure books she devours.
  travel: Josephine Guerrero loves weekend road trips to Clearwater Beach to hunt for seashells and explore tide pools, dreams of a family cruise to a Caribbean island where the streets echo with lively
    brass bands, and meticulously maps each adventure in a hand‑drawn travel journal.
  culinary: Josephine Guerrero enjoys helping to fry sweet plantains, stir simmering arroz con frijoles, and mash yuca with a splash of coconut milk, often seasoning dishes with lime zest and cilantro,
    and proudly serves her family her own version of mango salsa made with diced mango, red onion, and a pinch of habanero.
  core: Josephine Guerrero is an eight‑year‑old whirlwind of colored pencils, soccer socks, and seashell treasures, who meticulously plans her art projects yet habitually forgets to brush her teeth after
    a game, embodying a blend of creativity, community spirit, and adorable quirks.
background:
  cultural: Josephine comes from a Cuban‑American family that celebrates its heritage through language, music, and food. Spanish is spoken at home, and family gatherings feature traditional dishes such
    as plantains, arroz con frijoles, and yuca. She learns classic Cuban dances from her parents and feels a strong sense of community within Pinellas Park's vibrant Cuban diaspora, which influences her
    values of kindness, cooperation, and pride in her cultural roots.
