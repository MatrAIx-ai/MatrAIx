persona_description: A political theorist who specializes in the study of social contracts, particularly those related to the mechanisms by which communities trade individual liberty for community restraint.
  They are interested in the idea of a social contract and the role it plays in shaping political and social systems. They are knowledgeable about the history of social contract theory and its application
  in contemporary political and social contexts. They are also interested in the impact of technological developments on political and social systems, and how they might be used to re-imagine social contracts.
  They are interested in the potential for universal basic income to reshape political and social systems, and the role it might play in achieving a more just and equitable society.
