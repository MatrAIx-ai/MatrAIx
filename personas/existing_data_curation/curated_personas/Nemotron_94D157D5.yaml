  career_goals: Although retired from formal employment, Mikaela aims to channel her expertise into volunteer leadership at the Oxford Historical Museum, where she plans to develop a rotating community‑driven
    art exhibit and a series of lecture‑based workshops on local history and art appreciation. She hopes to publish a memoir that interweaves personal reflections with the cultural heritage of Preble County,
    and to secure a small endowment to fund a scholarship for high‑school students pursuing the visual arts. Additionally, she aspires to travel to major art institutions in New York, Chicago, and European
    capitals, documenting her experiences in a blog that bridges her love of art, storytelling, and community engagement.
