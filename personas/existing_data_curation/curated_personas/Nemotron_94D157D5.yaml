  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Reading Literature'', ''Blog Writing'', ''Rose Gardening'', ''Hosting Dinner Parties'', ''Community Theater Volunteering'', ''Book Club
