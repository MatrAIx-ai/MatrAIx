personas:
  professional: Mikaela Bethea, a retired humanities scholar turned volunteer curator at the Oxford Historical Museum, leverages their encyclopedic art‑history knowledge, meticulous event‑planning skill,
    and a competitive drive to out‑shine past exhibits into a community‑driven rotating gallery and a series of incisive lecture workshops, while their skeptical eye keeps donor proposals honest and their
    sociable flair makes them the unmistakable centerpiece of every museum gathering, and they often lead workshop series that invite community voices to shape the narrative.
  sports: Mikaela Bethea cheers avidly for the Cleveland Browns and the Cincinnati Reds, joins the local senior walking club each Saturday morning for brisk river‑front strolls, competes in a Wednesday
    pickleball league at the community center, and they treat the occasional charity 5K as another arena for their competitive spirit.
  arts: Mikaela Bethea spends afternoons watercoloring the rolling hills of Ohio, draws inspiration from Monet’s soft light and Georgia O’Keeffe’s bold forms, volunteers as stage manager for the community
    theater’s productions of Shakespeare and contemporary playwrights, and curates their own mini‑exhibitions that feature works by local Ohio artist Jane Gano, weaving art into every facet of their social
    life, and they often host informal discussion circles after each show.
  travel: Mikaela Bethea meticulously plans their art‑focused pilgrimages, using travel reward points to stay in boutique hotels while visiting New York’s MoMA, Chicago’s Art Institute, and the Louvre in
    Paris, and they chronicle each journey on their blog with vivid sketches and reflections, balancing their competitive budgeting mindset with the desire for immersive cultural experiences.
  culinary: Mikaela Bethea, a modest home chef, often harvests their own heirloom tomatoes and rosemary to create rustic rosemary‑roasted chicken served with a rose‑petal jam tart, pairs their meals with
    Earl Grey tea and homemade scones at weekly tea‑time gatherings, and occasionally indulges in the rich decadence of chocolate mousse when their competitive fundraising events run late, and they sometimes
    experiment with lavender‑infused tea for a soothing finish.
  core: Mikaela Bethea blends a meticulous, competitive planner’s mind with a sociable, talkative heart, using art and community as both playground and proving ground, while a touch of skepticism and an
    occasional forgetful habit keep them grounded and they often spend evenings debating the finer points of art history over tea.
background:
  cultural: Mikaela is a white Midwestern American whose family traces its ancestry to German and Irish immigrants who settled in Ohio during the 19th century. Raised in a close‑knit small‑town environment,
    she was immersed in community values, church activities, and local folk traditions. Her upbringing emphasized self‑reliance, volunteerism, and appreciation for regional history and craft art. This cultural
    foundation, combined with a liberal arts education, fostered her love for art, storytelling, and active civic engagement, shaping her identity as a sociable, organized, and curious lifelong learner.
