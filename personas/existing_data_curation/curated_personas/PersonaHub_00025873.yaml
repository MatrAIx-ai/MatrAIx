persona_description: A space debris expert who is responsible for monitoring and protecting ESA's 10 satellites in low Earth orbit from the swarm of human-made debris that now surrounds our planet. He uses
  radar stations to track 18,000 objects in orbit and estimates the number of objects larger than 1mm, 10cm, 1m, and 100cm. He is concerned about the potential for catastrophic debris strikes and the growing
  problem of space debris. He is a member of the ESA Space Debris Office and has experience with the Kessler syndrome, a nightmare scenario where frequent collisions exponentially increase the amount of
  space debris, leading to many more collisions, leading to much more debris until we lose the use of certain orbits because anything we put there would certainly be hit.
