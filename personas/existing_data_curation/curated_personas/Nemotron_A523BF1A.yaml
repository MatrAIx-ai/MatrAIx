personas:
  professional: Mary Courtney is a preschool teacher who blends play‑based curriculum design with data‑driven assessment, using interactive whiteboards and her competitive drive to constantly refine classroom
    practices while effortlessly rallying parents and colleagues through her talkative, community‑focused style.
  sports: Mary Courtney is a member of the Bloomington Hiking Club, plays on a co‑ed softball league, practices yoga twice a week, and loyally follows the Indiana Pacers and Indianapolis Colts while tracking
    local high‑school soccer scores.
  arts: Mary Courtney fuels her love for literature through a weekly book club that dives into Jane Austen and Toni Morrison, sings along to folk‑rock favorites like The Avett Brothers and soul classics
    by Aretha Franklin, and regularly attends community‑theater productions starring local talent such as Kevin McAllister.
  travel: Mary Courtney plans her getaways with the same meticulous eye she brings to lesson plans, taking weekend road trips to Brown County and Chicago, dreaming of a pilgrimage to a historic European
    capital celebrated for its literary traditions and a forested region famed for its folklore, and hoping to trek through Yellowstone, all while balancing family duties and a modest travel budget.
  culinary: Mary Courtney cultivates basil, rosemary, and thyme in her backyard garden and uses them to flavor herb‑infused chicken pot pie, a crisp breaded chicken cutlet, a hearty root‑vegetable stew,
    and a quinoa‑and‑roasted‑vegetable bowl, while also perfecting an apple‑cider glaze for weekend pork‑tenderloin dinners.
  core: Mary Courtney is a community‑oriented preschool educator whose competitive curiosity drives innovative play‑based learning, strategic budgeting, and a bustling social life filled with trivia nights,
    DIY projects, and garden‑to‑table meals.
background:
  cultural: Mary was raised in a small town in Indiana, part of a multi‑generational white Midwestern family with German and Irish roots. Her upbringing emphasized community involvement, self‑reliance,
    and modesty—values that still shape her approach to teaching and family life. She celebrates traditional Midwestern holidays such as Thanksgiving and local county fairs, while also honoring her family’s
    heritage through occasional cultural recipes and storytelling. The region’s strong support for public education and volunteerism has reinforced Mary’s commitment to civic engagement and lifelong learning.
