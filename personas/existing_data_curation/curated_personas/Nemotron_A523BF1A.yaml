  hobbies: '[''Book club participation'', ''Trivia night hosting'', ''Community festival organization'', ''Gardening'', ''Yoga'', ''Hiking'', ''DIY home‑improvement projects'', ''Cooking and hosting dinner
    parties'']'
  career_goals: Eager to deepen her knowledge, Mary plans to earn an associate’s degree in early childhood education within the next two years, followed by a bachelor’s. She aims to become a lead teacher
    and curriculum specialist at her current preschool, eventually moving into a director role where she can shape district‑wide early‑learning standards. Mary also dreams of opening a boutique, play‑based
    preschool that blends STEM exploration with community‑focused projects. Her competitive drive pushes her to seek Teacher‑of‑The‑Year awards, secure grant funding for innovative classroom resources,
    and mentor new teachers to raise overall instructional quality.
