  career_goals: Linda aims to advance to a regional facilities operations manager role within the next five years, overseeing multiple properties and integrating sustainable cleaning practices. She plans
    to earn a master's degree in educational leadership to design a proprietary training program for housekeeping professionals. Long‑term, she envisions launching her own consulting firm that blends efficient
    facility management with aesthetic upgrades, helping hotels and hospitals create cleaner, more welcoming environments.
