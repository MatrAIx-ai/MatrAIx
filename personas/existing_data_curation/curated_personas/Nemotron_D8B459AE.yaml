personas:
  professional: A facilities operations specialist with a flair for aesthetics, Linda Doherty leverages her training expertise, meticulous SOP design, and art‑inspired upgrades to drive clean, welcoming
    environments across hospitality properties while they mentor staff with charismatic, talkative leadership.
  sports: A community‑oriented fitness enthusiast, Linda Doherty supports the San Antonio Spurs, plays recreational volleyball at a local gym, joins a weekend running club that meets at the River Walk,
    and they balance her love for outdoor hikes in the Hill Country with occasional yoga classes for flexibility.
  arts: An avid culture seeker, Linda Doherty tours the San Antonio Museum of Art, follows street‑art festivals featuring works by local muralist Alex Blanco, grooves to blues guitarist Gary Clark Jr. at
    The Granary, and they discover indie folk performances by Iron & Wine at intimate venues like The Friendly Spot.
  travel: A curious traveler, Linda Doherty enjoys weekend road trips to historic Texas towns such as Fredericksburg, Gruene, and Marfa for art installations, collects points to visit New Orleans’ music
    scene, and they dream of exploring the colonial streets of Cartagena, Colombia, while juggling her master’s studies and family commitments.
  culinary: A food‑adventurer with a decent home‑cooking skillset, Linda Doherty delights in crafting shrimp tacos with fresh cilantro, savoring brisket at The Granary’s BBQ nights, sampling from the Saturday
    Market’s tamales, yet sometimes they overindulge on deep‑fried jalapeño poppers after gallery openings.
  core: Linda Doherty blends art‑infused facility leadership with a gregarious, organized spirit, and they balance disciplined budgeting and health routines with spontaneous cultural outings and a penchant
    for vintage décor.
background:
  cultural: Linda grew up in a middle‑class, white Texan family in the San Antonio metro area, where Southern hospitality and a strong sense of community are core values. Although her family’s cultural
    roots are primarily Anglo‑American, the multicultural environment of San Antonio, with its vibrant Hispanic influence, shaped her appreciation for diverse traditions, bilingual communication, and regional
    cuisine. Her education degree exposed her to varied student backgrounds, reinforcing her inclusive outlook and her respect for cultural diversity.
