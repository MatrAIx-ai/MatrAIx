  hobbies: '["Hip‑hop dancing", "Step dancing", "Cooking soul‑food", "Community STEM mentoring", "Church choir singing", "Yoga and meditation", "Journaling", "Hiking", "Attending jazz concerts", "Reading
    about sustainability"]'
  career_goals: Mary aims to earn a bachelor's degree in industrial engineering and become a certified safety professional within the next few years. She plans to lead safety improvement projects that integrate
    innovative, sustainable solutions while fostering an inclusive safety culture. Her long‑term ambition is to advance to a health‑and‑safety manager role, where she can mentor diverse junior engineers
    and eventually develop community outreach programs that teach workplace safety in local schools and community centers.
