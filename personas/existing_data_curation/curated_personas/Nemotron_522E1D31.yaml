personas:
  professional: An aspiring industrial engineer, Mary Redding blends a solid grasp of risk assessments, ergonomic evaluations, and lean process analysis with a spontaneous, people‑focused approach that
    lets them mediate conflicts and foster harmonious work environments, even as they wrestle with staying organized and meeting tight deadlines.
  sports: An energetic fitness enthusiast, Mary Redding mixes weekly step‑dance classes and weekend hikes on the Cherokee Trail with loyal support for the Louisville Cardinals basketball team and the Kentucky
    Wildcats football squad, while also joining a community yoga group that helps temper their high‑energy lifestyle.
  arts: An avid arts lover, Mary Redding sings in their church choir blending gospel with contemporary arrangements of songs by Beyoncé and John Legend, spends evenings vibing to Kendrick Lamar’s hip‑hop
    beats, and regularly attends jazz performances by Wynton Marsalis at the Louisville Waterfront Park Jazz Series, all of which fuel their creative spirit.
  travel: A budget‑aware explorer, Mary Redding has already taken spontaneous weekend trips to New Orleans for its vibrant music scene and a historic tour of Savannah, while meticulously planning a future
    spring backpacking journey to Ghana to connect with their heritage roots and to a sustainability‑focused conference in Copenhagen.
  culinary: A passionate home cook, Mary Redding skillfully reimagines classic soul‑food dishes like collard greens with smoked paprika, sweet‑potato and black‑eye pea casserole, and baked catfish with
    a quinoa‑corn side, infusing them with nutrient‑dense ingredients like kale, avocado, and turmeric while balancing their love for indulgent flavors with health‑conscious twists.
  core: Mary Redding, a 20‑year‑old industrial‑engineering student, channels boundless curiosity, spontaneous spirit, and deep sense of community into safety innovation, soulful cooking, and expressive
    dance, even as they battle intense anxiety and occasional disorganization.
background:
  cultural: Mary is an African‑American woman raised in Louisville, Kentucky, where Southern Black culture influences her daily life. She grew up in a close‑knit family with strong ties to the local church,
    which shaped her values of community, harmony, and service. Traditions such as celebrating Juneteenth, listening to gospel, blues, and hip‑hop, and cooking family recipes are central to her identity.
    The rich history of civil‑rights activism in Louisville inspires her commitment to equity and safety in the workplace. Mary draws pride from the achievements of Black engineers and activists, and she
    integrates that legacy into her professional aspirations and community involvement.
attributes:
