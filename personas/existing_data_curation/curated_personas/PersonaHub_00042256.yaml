persona_description: A researcher in economics who focuses on understanding the distribution of opportunities and the implications of inequality of opportunity for both individuals and societies. They are
  particularly interested in the impact of education and health disparities on life expectancy and infant mortality rates, and the role of education in reducing inequality. They are dedicated to developing
  robust data bases and conducting studies on joint distributions of income, education, and health, and are committed to better definitions and understanding of equal opportunity in a global context.
