  hobbies: '[''Backyard gardening'', ''Home cooking and recipe experimentation'', ''Reading mystery novels'', ''Knitting and crocheting'', ''Hiking and walking in local parks'', ''Volunteering with church
    community clean‑up programs'', ''Participating in seasonal craft fairs'', ''Hosting intimate game nights with friends'']'
  career_goals: Kristin aims to leverage her extensive housekeeping experience to launch a small, locally‑focused residential cleaning business in Orange County. She plans to specialize in eco‑friendly,
    green‑cleaning methods and obtain professional certifications in sustainable cleaning practices. Over the next five years, she hopes to build a reliable client base, hire and mentor a team of fellow
    housekeepers, and eventually expand to offer specialized services such as move‑in/out deep cleaning and organization consulting. Simultaneously, Kristin is interested in completing a short business‑management
    course to strengthen her entrepreneurial skills and secure financial stability for her family as she approaches retirement age.
