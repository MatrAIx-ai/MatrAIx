  career_goals: As he approaches retirement, William aims to leave a lasting legacy by establishing a formal mentorship program for emerging managers, integrating mental‑health awareness into the company
    culture, and spearheading a community‑outreach initiative that strengthens the organization’s local ties. He also hopes to transition into a part‑time consulting role that allows him to share his practical
    expertise while giving him more time for volunteer work and personal pursuits.
