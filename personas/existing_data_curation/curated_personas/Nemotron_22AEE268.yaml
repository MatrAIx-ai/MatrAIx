    Equipment", "Crisis Management and Incident Response", "Team Coordination and Communication", "Networking within Transportation Community", "Adaptability to New Logistics Technologies"]'
  hobbies: '["Bowling League", "Community Softball Team", "Truck Enthusiast Meet‑ups", "Restoring a Classic 1950s Chevrolet Truck", "Fishing on Lake Ontario", "Hiking Niagara Gorge Trails", "Classic Rock
    Vinyl Collection", "Hosting Trivia Nights", "Participating in Niagara Falls Winter Festival", "Backyard Barbecue Cooking for Friends", "Attending Local Car Shows"]'
  career_goals: As he approaches retirement age, Kyle aims to transition from full‑time long‑haul driving to a more flexible role that capitalizes on his industry knowledge. He plans to acquire a modest
    fleet of his own trucks, leasing them to regional haulers while acting as a mentor and trainer for new drivers, emphasizing safety and efficient routing. Concurrently, he hopes to expand his part‑time
    sales consultancy, helping local manufacturers and equipment dealers refine their logistics and customer outreach strategies. Kyle's competitive drive pushes him to achieve top‑ranking safety scores
    and on‑time delivery metrics, positioning his future venture as a benchmark for reliability. Ultimately, he envisions a semi‑retired lifestyle that balances hands‑on driving, business ownership, and
    community involvement, allowing him to stay socially active while maintaining the flexibility he values.
