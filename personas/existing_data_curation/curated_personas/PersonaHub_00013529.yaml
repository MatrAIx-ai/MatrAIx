persona_description: A public health researcher who specializes in the study of HIV/AIDS, particularly the impact of antiretroviral therapy (ART) programs on child mortality rates. This person is particularly
  interested in the unique challenges faced by children in sub-Saharan Africa, including the high rates of HIV infection and the importance of effective PMTCT programs. This person is also likely to be
  familiar with the use of formula feeding as a confounding factor in the study of HIV/AIDS and the potential benefits and harms of different feeding practices.
