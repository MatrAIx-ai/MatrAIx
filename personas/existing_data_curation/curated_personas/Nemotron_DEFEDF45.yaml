personas:
  professional: Eduardo Silvarrey, a 12‑year‑old budding game developer, builds interactive stories in Scratch and simple Python scripts, blending a pragmatic engineering mindset with a vivid sci‑fi imagination
    while staying organized yet flexible enough to iterate quickly on projects.
  sports: Eduardo Silvarrey, a member of the local Desert Trail Explorers club, enjoys solo hiking on spring desert trails to birdwatch, supports the Arizona Diamondbacks and Los Angeles Lakers from the
    comfort of home, and prefers low‑intensity activities that align with their love of solitude and steady fitness.
  arts: Eduardo Silvarrey, an acoustic‑guitar hobbyist, spends evenings strumming folk tunes inspired by Sufjan Stevens and folk‑rock guitarist John Mayer while listening to video‑game scores from Koji
    Kondo, and also sketches desert landscapes, drawing creative energy from both music and visual art.
  travel: Eduardo Silvarrey favors quiet, nature‑focused trips, planning weekend family outings to places like the Grand Canyon and Monument Valley and dreaming of a solo backpacking adventure through Iceland’s
    volcanic terrain, balancing careful budgeting with a desire for immersive solitude.
  culinary: Eduardo Silvarrey enjoys simple home‑cooked meals such as spaghetti carbonara and vegetable‑filled quesadillas, experiments with assembling quinoa bowls with bell peppers and avocado, and loves
    snacking on mango‑smoothie popsicles while occasionally trying sushi rolls with soy sauce.
  core: Eduardo Silvarrey, a curious 12‑year‑old introvert who mixes methodical coding with solitary nature walks, balances practical budgeting with a love for indie music and sketching, and occasionally
    forgets to bring glasses on hikes.
background:
  cultural: Eduardo grows up in a Mexican‑American household in Calexico, a vibrant border community. His family practices traditions such as Dia de los Muertos, celebrating ancestors with altars and shared
    meals. He enjoys Mexican cuisine like tacos, tamales, and aguas frescas, and values the strong family ties that emphasize respect and responsibility. Bilingualism is a daily reality, as he switches
    between Spanish at home and English at school. The cross‑cultural environment enriches his perspective, fostering a blend of Mexican heritage and American influences that shape his worldview, community
    involvement, and aspirations.
