    baking tools'']'
  career_goals: At 72, Sarah aims to preserve her family bakery as a community cornerstone. She plans to document her most beloved recipes in a handwritten archive and eventually a modest cookbook, mentor
    a younger baker to ensure continuity, and modestly expand the shop into a small café that offers occasional baking workshops for a handful of neighbors. Her ambition is to transition ownership to a
    trusted apprentice while keeping the bakery’s welcoming, low‑key atmosphere alive.
