  career_goals: James dreams of a future where he can blend his love for art and nature. He envisions becoming a wildlife illustrator, creating detailed drawings of animals and habitats, or a video game
    designer who crafts peaceful, story‑driven adventures. He also imagines working as an environmental educator, using his calm presence and artistic talent to inspire others about conservation. His overarching
    ambition is to make the world a more beautiful and harmonious place while staying true to his curiosity and love for solitary creative work.
