    local art shows'', ''Craft fairs'', ''Small‑group board game nights'']'
  career_goals: He aims to earn advanced certifications in welding and CNC machining, become a lead fabricator, and eventually launch his own boutique workshop that blends functional metalwork with artistic
    sculpture. He also hopes to deepen his design skills, perhaps completing a formal certificate in industrial design, so he can create custom pieces for local businesses and art galleries. Long‑term,
    he envisions mentoring a small team and establishing a reputation as a go‑to craftsman in the Upstate region.
