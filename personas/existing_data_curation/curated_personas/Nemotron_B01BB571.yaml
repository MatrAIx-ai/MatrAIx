personas:
  professional: Anthony Tisdale is a lead fabricator in a regional manufacturing shop whose expertise in MIG/TIG welding, CNC machining, and sheet‑metal design lets them translate complex blueprints into
    functional art, while their calm, solution‑focused demeanor and love for mentoring apprentices keep the workshop humming even when deadlines loom, despite their occasional struggle to keep project timelines
    organized.
  sports: Anthony Tisdale is a weekend hiker who climbs the trails around Lake Keowee with the local Keowee Trail Association, joins the South Carolina Amateur Anglers Club for seasonal fishing tournaments,
    supports the Greenville Drive baseball team and the Carolina Panthers, and occasionally squeezes in a pickup basketball game at the maker space, preferring low‑impact cardio over gym routines.
  arts: Anthony Tisdale channels their artistic curiosity into metal sculpting inspired by Ai Weiwei and the kinetic works of Theo Jansen, frequents intimate craft fairs featuring makers like Leah Barry,
    curates a personal playlist of Explosions in the Sky and Bon Iver while designing new pieces in SolidWorks, and unwinds with indie games such as Hades and Celeste that mirror their love for narrative
    and design.
  travel: Anthony Tisdale plans travel like a project brief—spontaneous weekend road trips to Asheville’s art scene or the Blue Ridge Parkway for inspiration, a carefully budgeted spring tour of Iceland’s
    volcanic landscapes for photography, and a long‑awaited summer visit to Kyoto’s traditional workshops, all balanced against their modest savings and the occasional need to return home for a new equipment
    order.
  culinary: Anthony Tisdale enjoys cooking over a backyard smoker, perfecting cedar‑plank grilled trout with fresh dill and lemon, whipping up a creamy butternut squash risotto seasoned with sage, and pairing
    meals with locally brewed craft beers, while their go‑to snack after a long day in the shop is a spicy pepper‑jack cheese quesadilla with avocado slices.
  core: Anthony Tisdale is a hands‑on innovator who fuses metalwork and art, thrives on spontaneous creation, occasionally forgets to file invoices on time, and finds peace in solitary hikes and the hum
    of a 3D printer.
background:
  cultural: Born and raised in the foothills of the Blue Ridge near Seneca, Anthony grew up in a working‑class, blue‑collar family where manual trades were valued. The region’s Southern hospitality, strong
    sense of community, and appreciation for outdoor recreation shaped his practical outlook and cooperative nature. While the local culture emphasizes modesty and self‑reliance, his curiosity has led him
    to seek out diverse artistic influences beyond the region, blending the grounded ethic of his upbringing with an openness to new ideas.
