persona_description: Andrew Wyatt is a government affairs consultant who works exclusively in the wildlife sector. He specializes in changing hearts and minds on vital wildlife issues and has a unique knowledge
  and expertise in endangered species conservation, particularly in the context of black rhino conservation in Namibia. Andrew is well-versed in the intricacies of the wildlife sector and has a strong understanding
  of the political and social factors that influence conservation efforts. He is known for employing campaign-style tactics to influence public opinion and policy decisions related to wildlife conservation.
  Andrew is a dedicated advocate for the protection and preservation of endangered species, particularly black rhinos, and is committed to ensuring that the survival of these critically endangered animals
  is not held hostage to special interest politics.
