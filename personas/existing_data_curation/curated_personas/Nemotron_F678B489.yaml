  career_goals: Although formally retired, Anh seeks to deepen her contribution to her community and personal growth. She aims to curate a small intergenerational exhibition that showcases senior artists,
    document and publish a memoir of her family's migration story, and learn digital photography techniques to create a visual archive of local cultural festivals. She also hopes to travel to Vietnam to
    reconnect with extended family and bring back culinary inspirations, and she aspires to mentor younger members of the Vietnamese-American community in cooking, language, and cultural arts.
