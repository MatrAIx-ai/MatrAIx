personas:
  professional: Jerlean Lackey is a budding freelance illustrator and self‑taught graphic designer who turns abstract ideas into whimsical visual narratives for indie publishers, balancing meticulous project
    planning with spontaneous creative bursts as she builds a portfolio through an online design certificate.
  sports: Jerlean Lackey enjoys gentle weekend hikes on the nearby Greenway, supports the Tennessee Titans and Nashville Predators, and occasionally joins the Franklin Running Club’s Saturday 5K runs to
    keep a light cardio routine without the pressure of competitive sports.
  arts: Jerlean Lackey draws inspiration from the fluid brushwork of John Singer Sargent, the bold geometry of Wassily Kandinsky, and the soulful grooves of Erykah Badu, Miles Davis, and H.E.R., often listening
    to these musicians while sketching or crocheting and regularly visiting the local art museum’s contemporary installations.
  travel: Jerlean Lackey plans trips like a quiet curator, favoring serene nature retreats such as the Great Smoky Mountains and Asheville’s Blue Ridge trails, having already explored Charleston’s historic
    districts, and dreaming of a contemplative journey to Kyoto’s bamboo groves, always drafting detailed itineraries in their journal while balancing a modest travel fund.
  culinary: Jerlean Lackey delights in farm‑to‑table cooking, frequently preparing ratatouille with heirloom tomatoes, basil, and zucchini, crafting quinoa bowls drizzled with herb‑infused olive oil, and
    sipping lavender‑honey tea, while their moderate cooking skill lets them experiment confidently but sometimes over‑season dishes in pursuit of bold flavor.
  core: Jerlean Lackey, a 25‑year‑old watercolor‑obsessed introvert, balances imaginative art‑making with meticulous budgeting, trading late‑night sketch sessions for overdue dentist appointments and a
    penchant for collecting vintage journals.
background:
  cultural: Jerlean proudly embraces her African‑American heritage rooted in the deep South. Growing up in Franklin, GA, she was shaped by the close‑knit bonds of her extended family, church community,
    and local traditions that celebrate storytelling, music, and collective resilience. The rhythmic influence of gospel and soul music permeates her artistic sensibility, while community gatherings—often
    centered around food, music, and shared experiences—have taught her the value of harmony and cooperation. Her cultural identity informs her creative expression, her commitment to uplifting others, and
    her aspiration to contribute positively to the vibrant tapestry of Black Southern culture.
attributes:
  skills: '["Digital illustration", "Mixed‑media art", "Creative writing", "Basic graphic design (Canva, Photoshop)", "Word processing and spreadsheet management", "Household budgeting", "Event coordination
