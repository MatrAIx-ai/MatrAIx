  hobbies: '["Watercolor painting", "Digital illustration", "Speculative fiction reading", "Philosophical journaling", "Listening to soul and jazz music", "Knitting and crocheting", "Gardening", "Volunteering
    at community art programs"]'
  career_goals: Jerlean aspires to transform her passion for art and storytelling into a sustainable career. In the next few years, she aims to enroll in an online certificate program for graphic design
    or illustration, building a portfolio that can attract freelance commissions. She also envisions launching a small online boutique where she sells original prints, handcrafted journals, and custom greeting
    cards. Ultimately, her ambition is to blend her creative work with community service by offering art workshops for local youth, nurturing imagination and self‑expression in a supportive environment.
