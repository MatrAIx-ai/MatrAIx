personas:
  professional: A seasoned carpenter with three decades of hands‑on experience, Sandra Saffari leverages their mastery of advanced joinery, historic home restoration, and sustainable timber sourcing to
    design boutique custom furniture, while balancing meticulous project management with a flexible, curiosity‑driven approach to new eco‑friendly techniques.
  sports: Sandra Saffari channels their love of the Idaho outdoors into seasonal hiking trips along the Sawtooth foothills and occasional trail running, while cheering on the Boise State Broncos football
    team and supporting the Boise Hawks minor‑league baseball club; they balance fitness with a low‑impact routine that respects their arthritic knees.
  arts: Sandra Saffari expresses creativity through intricate quilt patchwork, acoustic guitar jams at family gatherings, and wildflower photography, drawing inspiration from folk legends like Emmylou Harris,
    the photographic mastery of Ansel Adams, and the literary worlds of Cormac McCarthy’s American West, while regularly attending local theater productions and community art fairs.
  travel: Sandra Saffari prefers thoughtfully planned road trips that blend scenic hiking and cultural stops, having explored Yellowstone, Glacier National Park, and the historic rail towns of Montana,
    while they keep a bucket‑list spot for a woodworking pilgrimage to Japan’s Hida region, balancing limited workshop time and a modest travel budget.
  culinary: Sandra Saffari delights in cooking seasonal farm‑to‑table meals, often featuring Idaho potatoes, freshly caught trout, huckleberry jam, and garden herbs like rosemary and thyme, and they boast
    a strong skill set in preparing rustic stews, wood‑fired breads, and herb‑crusted chicken, yet they occasionally over‑salt their dishes in the enthusiasm of experimentation.
  core: Sandra Saffari, a 63‑year‑old master carpenter turned boutique furniture designer, blends a disciplined work ethic with a love of quilting, wildflower photography, and weekend hikes, all while juggling
    a pragmatic retirement plan, occasional health neglect, and a habit of humming folk tunes while sanding a new table.
background:
  cultural: Sandra grew up in a small Midwestern town before relocating to Idaho in her early thirties. As a white American with deep roots in rural communities, she embodies a pragmatic work ethic, self‑reliance,
    and a strong sense of local stewardship. Her upbringing emphasized community participation, church involvement, and respect for the natural environment, which later shaped her commitment to sustainable
    building practices. Living in Saint Maries, she has adopted the regional appreciation for outdoor recreation and locally sourced materials, while also honoring the cultural heritage of the area through
    collaborations with indigenous artisans to learn traditional wood‑working motifs. Her marriage and long‑standing community ties reinforce values of cooperation, modest ambition, and balanced independence.
