  career_goals: Sandra aims to transition her workshop into a boutique custom‑furniture studio that emphasizes reclaimed local timber and eco‑friendly finishes. She hopes to establish a formal apprenticeship
    program to pass her knowledge to the next generation of woodworkers in Boise County. Additionally, she aspires to collaborate with community organizations to create a shared tool library and offer free
    woodworking classes for seniors and youth, blending her practical skills with a desire to give back. Over the next five years she plans to gradually reduce full‑time labor while focusing on design,
    consulting, and mentorship.
