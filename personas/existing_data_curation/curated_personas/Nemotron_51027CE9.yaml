personas:
  professional: Frankie Small, a 34-year-old master stylist, blends precision cutting, advanced coloring, and texture-specific coily hair expertise with a practical curiosity that drives them to experiment
    on mannequins while maintaining a relaxed, slightly disorganized schedule that favors flexible appointments and client-centered consultations.
  sports: Frankie Small enjoys gentle yoga sessions at a local studio, participates in a small community walking club that meets at sunrise, and they root for the Vegas Golden Knights and the Las Vegas
    Raiders while quietly following the seasonal tennis tour, preferring low-key, flexible activity over competitive sports.
  arts: Frankie Small finds inspiration while crocheting scarves to the sounds of Nina Simone, Erykah Badu, and Miles Davis, devours novels by Toni Morrison and James Baldwin, and they regularly attend
    intimate coffee-shop poetry readings and local jazz nights, letting soulful music and literary depth shape their creative outlook.
  travel: Frankie Small favors low-stress, short-haul trips that blend relaxation with cultural immersion, such as weekend getaways to Asheville's art-filled downtown, a spring retreat in Sedona's red-rock
    yoga resorts, and they dream of exploring the spice markets of Marrakech while balancing a modest travel budget and family commitments.
  culinary: Frankie Small loves cooking comfort dishes like Southern-style fried chicken with Nevada-grown herb-infused quinoa, collard greens tossed with rosemary from their indoor garden, and sweet potato
    pie spiced with cinnamon and nutmeg, and they consider themselves an intermediate home cook who experiments with flavor pairings while occasionally relying on ready-made sauces for convenience.
  core: Frankie Small is a curious yet practical master stylist who balances meticulous hair artistry with a laid-back, slightly disorganized lifestyle, constantly juggling client care, creative product
    development, and a quiet love for yoga, literature, and crochet while wrestling with chronic worry.
background:
  cultural: Frankie’s cultural background is rooted in African‑American heritage, shaped by a family history that traces back to the Southern United States before settling in Nevada. Growing up in a close‑knit
    Black community in North Las Vegas, she was immersed in the traditions of church gatherings, soul music, and a strong emphasis on personal appearance as a form of cultural expression. This background
    informs her deep respect for the history of Black hair care, from the natural‑hair movement to contemporary styling trends. She participates in local cultural events such as Juneteenth celebrations
    and Black History Month panels, and she often incorporates elements of her heritage—like the use of natural oils and protective styling—into her professional practice. Her marriage reflects shared values
    of family, mutual support, and community involvement, and she maintains close ties with extended relatives and friends who serve as both a source of inspiration and a support network.
attributes:
  skills: '[''Hair cutting'', ''Precision layering'', ''Creative color techniques'', ''Black hair texture styling'', ''Curly hair care'', ''Client consultation'', ''Product knowledge and formulation'',
    ''Sanitation and health compliance'', ''Salon software management'', ''Retail product sales'']'
  hobbies: '[''Reading beauty journals'', ''African‑American literature'', ''Listening to R&B and jazz'', ''Styling practice on mannequins'', ''Cooking comfort foods'', ''Yoga'', ''Guided meditation'',
    ''Indoor herb gardening'', ''Crocheting'', ''Attending small coffee‑shop meetups'', ''Volunteering at community hair‑care workshops'']'
  career_goals: Frankie aims to become a recognized master stylist specializing in healthy black hair care, and to open a modest boutique salon that offers a calm, personalized environment for small groups.
    She hopes to design a line of natural, low‑chemical hair products tailored to coily textures, leveraging her curiosity about formulation and her practical approach to sourcing ingredients. She also
    plans to earn advanced certifications in color theory and texture management, and to mentor younger stylists through quarterly workshops at local community centers. While ambitious, she prioritizes
    maintaining a flexible schedule that allows her to nurture her marriage and manage stress, so she envisions gradual growth rather than rapid expansion.
