  career_goals: Rachel aims to advance within the hospitality sector by leveraging her operational experience and associate's degree to transition into a kitchen supervisor or sous‑chef position. She plans
    to enroll in a culinary certification program to deepen her cooking skills and eventually become a kitchen manager, where she can mentor staff and implement efficient, sustainable practices. Long‑term,
    she hopes to open a small community café that showcases local art and provides a welcoming gathering space, merging her passions for food, creativity, and community building.
