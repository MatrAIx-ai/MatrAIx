personas:
  professional: A diligent car wash detailer at a bustling Texas facility, Michelle Allen, 22, combines methodical cleaning expertise with strong customer service, using precise chemical handling and inventory
    management to ensure spotless results while they eye a Certified Automotive Detailer credential and future shift‑supervisor role.
  sports: A weekend hiker and local sports fan, Michelle Allen, 22, trails the Belton Lake perimeter with the Hill Country Outdoor Club, roots for the Dallas Cowboys and Texas Rangers, and occasionally
    joins a community soccer league, balancing active outdoor pursuits with casual team loyalty while they schedule these activities around their work shifts.
  arts: A photography enthusiast and music lover, Michelle Allen, 22, captures vintage trucks and sprawling Texas sunsets while listening to classic rock legends like Led Zeppelin and country stars such
    as Miranda Lambert, weaving visual and auditory inspiration into their daily routine as they edit their shots.
  travel: An adventurous road‑tripper, Michelle Allen, 22, plots weekend getaways to Austin’s live‑music scene, the Hill Country’s wineries, and occasionally the historic Alamo, preferring budget‑friendly
    drives that blend cultural stops with their love for Texas landscapes as they map each route on a handheld GPS.
  culinary: A budding Southern chef, Michelle Allen, 22, perfects chicken fried steak, smoky brisket, and pimento cheese biscuits, experimenting with homemade BBQ rubs and fresh herbs like rosemary, while
    they proudly showcase these dishes at community events and family potlucks.
  core: Michelle Allen, 22, is a methodical detailer with a green‑tech dream, a hiking soul, and a habit of over‑organizing their schedule while they occasionally neglect self‑care.
background:
  cultural: Michelle was raised in Killeen, Texas, within a working‑class white family that values Southern hospitality and community ties. Growing up near Fort Hood, she was exposed to a diverse mix of
    cultures and a strong sense of service. Her upbringing includes regular attendance at a local Methodist church, participation in community events like county fairs and rodeos, and an appreciation for
    the blend of traditional Texan values with the youthful, dynamic atmosphere of a military‑influenced town.
attributes:
  skills: '["Vehicle detailing", "Equipment cleaning", "Chemical handling", "Safety compliance", "Customer service", "Time management", "Inventory tracking", "Basic mechanical awareness", "Team coordination",
