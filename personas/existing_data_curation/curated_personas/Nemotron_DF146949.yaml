  hobbies: '["DIY home projects", "Basic automotive repair", "Hiking", "Cooking", "Country music listening", "Volunteer work", "Vehicle photography", "Attending local fairs", "Reading self‑improvement books",
    "Yoga"]'
  career_goals: Michelle aims to earn her GED within the next year and pursue a Certified Automotive Detailer credential. In the medium term, she hopes to become a shift supervisor at the car wash where
    she works, mentoring new staff and overseeing quality control. Her long‑term ambition is to launch a mobile detailing business that incorporates eco‑friendly cleaning technologies, allowing her to blend
    her curiosity for new methods with practical, community‑focused service.
