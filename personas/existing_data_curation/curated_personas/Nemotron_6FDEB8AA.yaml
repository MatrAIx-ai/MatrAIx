  career_goals: Kelly aims to transition from employee to entrepreneur by establishing her own boutique cleaning service in the Phoenix-Surprise area. She plans to specialize in high-end residential cleaning
    and art-gallery maintenance, leveraging her appreciation for art and her expertise in delicate fabric care. To support this, she will complete her associate degree in business administration, obtain
    Certified Professional Cleaner (CPC) credentials, and acquire certification in art-handling safety. Over the next five years, she envisions hiring a small team of trusted cleaners, offering eco-conscious
    cleaning packages, and providing workshops on home organization for the local community. Kelly also hopes to build a modest retirement fund and eventually mentor younger women entering the cleaning
    and hospitality fields.
