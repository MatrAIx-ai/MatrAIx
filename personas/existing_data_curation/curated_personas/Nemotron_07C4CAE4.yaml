personas:
  professional: Devon Athanasopoulos is a seasoned arts manager who leverages fifteen years of strategic planning, budget oversight, and digital media production to design innovative community art programs,
    while their curiosity and cooperative nature help them navigate the fluid workflows of curatorial work despite a occasionally relaxed attitude toward strict deadlines.
  sports: Devon Athanasopoulos enjoys weekend hikes with the Hill Country Trekkers, follows the Dallas Cowboys and Texas Rangers for a dose of Texan sports spirit, and incorporates low‑impact yoga classes
    at the downtown studio into their fitness routine, favoring a relaxed, enjoyment‑first approach over rigorous training schedules.
  arts: Devon Athanasopoulos curates a personal collection of limited‑edition prints by contemporary artists such as Julie Mehretu and Kehinde Wiley, frequents exhibitions at the Modern Art Museum, sketches
    in the quiet corners of local galleries, and finds inspiration in the soundscapes of composer Ólafur Arnalds and the performances of actress Greta Gerwig.
  travel: Devon Athanasopoulos favors thoughtfully planned road trips through the Texas Hill Country’s vineyards and occasional spontaneous weekend getaways to Mediterranean coastal towns like Amalfi and
    Santorini, balancing a love for cultural immersion with low‑stress itineraries that accommodate their unpredictable work calendar.
  culinary: Devon Athanasopoulos experiments with Mediterranean cuisine, whipping up lentil‑infused moussaka and herb‑laden grilled sea bass seasoned with capers and olives, while also savoring a weekly
    Sunday market haul of fresh figs, feta, and extra‑virgin olive oil that fuels both home cooking and casual dining outings.
  core: Devon Athanasopoulos is a curiosity‑driven arts strategist who balances meticulous program design with a delightfully relaxed, sometimes scatter‑brained approach to life, finding solace in yoga,
    spontaneous hikes, and the occasional over‑indulgence in Mediterranean culinary experiments.
background:
  cultural: Devon was raised in a small town in Central Texas, surrounded by the tight‑knit, community‑focused values of the region. While she identifies as white American, her family background includes
    Greek ancestry, which introduced her to classical art, music, and Mediterranean culinary traditions. The blend of Southern hospitality, respect for local customs, and an appreciation for global artistic
    perspectives shapes her worldview, fostering an open‑minded yet grounded cultural identity.
attributes:
  skills: '["Strategic planning", "Team leadership", "Project management", "Budget oversight", "Art curation", "Community outreach", "Event coordination", "Creative problem solving", "Conflict mediation",
