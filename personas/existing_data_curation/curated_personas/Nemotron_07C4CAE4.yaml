  hobbies: '["Visiting art galleries", "Sketching and drawing", "Curating personal art collection", "Reading contemporary literature", "Philosophy discussions", "Hiking in Texas Hill Country", "Yoga and
    meditation", "Cooking Mediterranean cuisine", "Volunteering at community art workshops", "Attending local theater performances"]'
  career_goals: She aims to transition into a senior leadership role that merges her managerial expertise with her passion for the arts, such as becoming a museum director or leading a regional arts nonprofit.
    Devon wants to develop community‑based art programs that increase accessibility, secure sustainable funding, and foster inclusive creative spaces. Additionally, she seeks a healthier work‑life balance,
    intends to implement stress‑reducing practices, and hopes to mentor emerging arts professionals as she advances in her career.
