  hobbies: '[''Drawing and sketching'', ''Digital art and illustration'', ''Creative writing'', ''Improv theater'', ''Playing acoustic guitar'', ''Photography of rural scenery'', ''Volunteering at the library'',
    ''Participating in school art clubs'']'
  career_goals: Robert aspires to turn his love for art and abstract concepts into a career in visual communication. He dreams of attending an art or design college where he can study illustration, game
    concept art, or graphic design, eventually working for a studio that creates interactive media or educational content. He also hopes to combine his compassion with his creative skills by designing socially
    impactful campaigns or volunteering as a youth mentor, using art to foster community cohesion and support mental wellbeing among his peers.
