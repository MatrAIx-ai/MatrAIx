  hobbies: '[''Rotary Club involvement'', ''Volunteer health‑education workshops'', ''Golf'', ''Fishing'', ''Walking group'', ''Cooking southern cuisine'', ''Reading historical nonfiction'', ''Reading medical
    journals'']'
  career_goals: Looking ahead, Adrian aims to cement his legacy by expanding community‑focused health initiatives that improve access for underserved seniors in Jacksonville. He plans to mentor emerging
    health services managers, champion a hospital‑wide patient‑centered care model, and earn the Fellow of the American College of Healthcare Executives (FACHE) credential. Within the next three years,
    he hopes to transition into a consultant role that allows him to share his expertise while gradually reducing his day‑to‑day responsibilities as he prepares for a phased retirement.
