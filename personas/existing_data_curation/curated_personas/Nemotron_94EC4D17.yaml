  career_goals: Scott aspires to turn his creativity into a career that merges artistic vision with community engagement. He aims to become a creative director or experiential marketing strategist for a
    cultural organization or a forward-thinking brand, designing immersive events, campaigns, and installations that blend art, technology, and social interaction. Over the next several years, he plans
    to build a portfolio of collaborative projects, pursue a Master of Fine Arts to deepen his conceptual practice, and eventually launch his own interdisciplinary studio that produces public art installations,
    pop-up experiences, and digital storytelling initiatives while mentoring emerging creators.
