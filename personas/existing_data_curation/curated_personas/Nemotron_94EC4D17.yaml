personas:
  professional: Scott Houston, a 24‑year‑old aspiring creative director, blends conceptual illustration, Adobe design expertise, and improv‑honed quick thinking to craft immersive brand experiences, though
    their spontaneous nature sometimes collides with tight deadlines.
  sports: Scott Houston, a 24‑year‑old avid hiker and weekend member of the Madison Mountain Bike Club, enjoys cheering on the Milwaukee Brewers, the Wisconsin Badgers, and the Green Bay Packers while casually
    joining pick‑up soccer games at the local park to stay fit.
  arts: Scott Houston, a 24‑year‑old regular at Madison’s MMoCA and The Comedy Lab, draws inspiration from street‑level artists like Banksy, indie musicians such as The Strokes, and speculative fiction
    writer Ted Chiang, channeling these influences into sketchbooks, analog photographs, and community mural collaborations.
  travel: Scott Houston, a 24‑year‑old fan of spontaneous weekend road trips, frequently explores nearby lakes like Mendota and the Apostle Islands, and harbors a bucket‑list dream of hiking Iceland’s waterfalls
    on a modest budget, often planning itineraries on a whim with friends via a shared Google Doc.
  culinary: Scott Houston, a 24‑year‑old experimental home cook, loves crafting sourdough pizza topped with kale, goat cheese, and smoked paprika, perfecting spicy kimchi tacos, and pairing each dish with
    local craft brews from The Great Dane Brewing Co.
  core: Scott Houston, a 24‑year‑old imagination‑driven creative who thrives on spontaneous art collaborations, occasional deadline chaos, and a habit of sketching every coffee shop they visit, embodies
    a blend of Midwestern community spirit and avant‑garde curiosity.
background:
  cultural: Scott comes from a white, Midwestern American background, with family roots in German and Irish ancestry common to the Madison region. Raised in a suburban community near Dane County, he grew
    up with a blend of small-town values—self-reliance, community participation, and an appreciation for the outdoors—while also being immersed in the progressive, college-town culture of Madison. This
    mix shapes his open-mindedness, love for collaborative endeavors, and curiosity toward new artistic expressions.
