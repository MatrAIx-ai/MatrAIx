persona_description: A highly successful businessman who rose from working in his father's tobacco company to becoming the president of the American Tobacco Company. He is known for his innovative marketing
  and advertising campaigns, particularly for the Lucky Strike brand, which helped to revolutionize the cigarette industry. He is also known for his early sponsorship of Frank Sinatra, Ethel Smith, and
  Lawrence Tibbett, and his investment in radio air time. His success in the industry led to his total salary being more than $2,000,000 during the Great Depression.
