personas:
  professional: Kenneth Clark, a 37‑year‑old construction professional, uses their OSHA certification, precise blueprint reading and methodical scheduling to streamline crew workflows while they constantly
    experiment with reclaimed‑lumber designs and eco‑friendly building methods, reflecting their artistic curiosity and competitive drive.
  sports: Kenneth Clark, a 37‑year‑old coastal runner and occasional kayaker, follows the Boston Celtics and New England Patriots religiously, they train at the local YMCA CrossFit box three times weekly,
    and they join a seasonal community baseball league to stay active during summer.
  arts: Kenneth Clark, a 37‑year‑old art enthusiast, spends weekends at the Museum of Fine Arts Boston admiring Andrew Wyeth and Shepard Fairey, they capture New England light with a Canon EOS 5D reminiscent
    of Ansel Adams, and they unwind at live venues listening to Miles Davis and Kendrick Lamar, weaving these influences into their custom woodwork designs.
  travel: Kenneth Clark, a 37‑year‑old traveler, meticulously plans weekend road trips to coastal Maine towns like Portland and historic sites such as Savannah, they allocate an annual budget for an eco‑focused
    vacation to Copenhagen’s sustainable design district, and they occasionally squeeze in spontaneous weekend getaways to Barcelona’s modernist architecture for visual inspiration.
  culinary: Kenneth Clark, a 37‑year‑old food lover, prefers fresh New England seafood like lobster rolls and clam chowder, they enjoy crafting seared scallops with citrus beurre blanc on reclaimed‑wood
    boards and rosemary‑infused focaccia for friends, yet they often indulge in late‑night pizza deliveries as a stress‑relief habit.
  core: Kenneth Clark, a 37‑year‑old construction foreman‑in‑training, fuses meticulous building expertise with artistic curiosity while battling chronic worry and a midnight pizza habit.
background:
  cultural: Kenneth is an African‑American who grew up in the Boston metropolitan area before settling in Scituate, MA. His family emphasized resilience, community involvement, and pride in Black heritage,
    often through church gatherings, cultural festivals, and mentorship programs. He draws inspiration from Black artists and architects who blend tradition with modernity, and he actively participates
    in local African‑American heritage initiatives, such as the Plymouth County Black History tours and youth apprenticeship programs in the trades. His cultural background informs both his work ethic and
    his creative pursuits, fostering a commitment to uplift his community.
