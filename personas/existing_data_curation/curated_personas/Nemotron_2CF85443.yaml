  career_goals: He aims to advance from laborer to foreman within the next three years, completing a certified foreman program and obtaining a bachelor's degree in construction management. His long‑term
    ambition is to launch his own boutique construction firm that specializes in green building and historic renovation projects, integrating artistic elements such as custom woodwork and reclaimed‑material
    designs. He also seeks to become a licensed contractor, build a reputation for quality and innovation, and eventually mentor other Black tradespeople to increase representation in the industry.
