persona_description: A researcher and psychologist who specializes in the study of self-control and impulse control, and how these processes are influenced by language and verbal communication. They are
  interested in understanding how talking to oneself can help in exercising self-control and preventing impulsive decisions. They have conducted research on the use of self-control tasks and have found
  that people who chat to themselves are better at exercising self-control in stressful situations.
