personas:
  professional: Darvin Todd, an 18‑year‑old aspiring supply‑chain analyst, blends meticulous inventory‑control expertise from his stocker job with a passion for visual arts to craft organized, art‑friendly
    logistics solutions, while their methodical nature and curiosity drive them to pursue certifications and internships in sustainable operations.
  sports: Darvin Todd channels competitive energy into weekend basketball games with friends at a local community center, follows the Houston Rockets and Texas Longhorns football team, and complements the
    routine with weight‑training at a gym where they track progress in a spreadsheet, balancing spring league intensity with relaxed summer swim sessions.
  arts: Darvin Todd immerses themselves in visual creativity by sketching charcoal portraits and producing digital illustrations inspired by Basquiat and Kehinde Wiley, curates playlists that blend Kendrick
    Lamar, Kamasi Washington, and Erykah Badu, and regularly attends First Friday Art Walks to discuss works by local Houston artist Chris McGarry.
  travel: Darvin Todd prefers meticulously planned art‑focused trips, having explored the mural‑laden streets of Austin and the historic galleries of New Orleans, while dreaming of a summer study tour in
    Barcelona’s vibrant art districts, balancing limited college‑fund budgets with occasional spontaneous weekend road‑trips to nearby Hill Country vineyards.
  culinary: Darvin Todd enjoys a balanced palate that alternates between spicy Tex‑Mex tacos al pastor, homemade ramen with miso broth, and occasional charcoal‑grilled veggie burgers, cooking at an intermediate
    skill level using a digital recipe app, yet often forgets to stock up on pantry staples, leading to last‑minute takeout orders.
  core: Darvin Todd is an organized, art‑obsessed eighteen‑year‑old who meticulously tracks inventory and workouts but habitually postpones bill payments and hoards museum postcards as a quirky reminder
    of visited galleries.
background:
  cultural: Darvin grew up in Houston’s vibrant African-American community, where Southern traditions, soulful music, and strong family ties shaped his worldview. He was raised with the values of church
    gatherings, Juneteenth celebrations, and community picnics that emphasized solidarity and cultural pride. The city’s rich blend of cultures exposed him to a wide range of cuisines, from classic soul
    food to Tex-Mex, and to artistic expressions found in local murals, jazz clubs, and museum districts. These experiences fostered his appreciation for both the history and the evolving contemporary art
    scene, while his Black heritage reinforced a resilient, collaborative spirit that he carries into his work and personal pursuits.
attributes:
  skills: '["Inventory Management", "Order Fulfillment", "Stock Rotation", "Barcode Scanning", "Microsoft Excel", "Data Entry", "Time Management", "Attention to Detail", "Product Merchandising", "Customer
    Service", "Basic Spanish", "Art Terminology Knowledge", "Creative Problem Solving", "Independent Research"]'
  hobbies: '["Sketching", "Digital Illustration", "Museum Visits", "First Friday Art Walks", "Reading Science Fiction", "Reading Historical Fiction", "Hip-hop and Jazz Listening", "Basketball", "Gym Workouts",
    "Arduino Projects", "Documentary Watching", "Youth Mentorship Volunteering"]'
  career_goals: Darvin aims to leverage his experience in retail logistics to pursue a degree in Supply Chain Management or Business Administration, with the long-term goal of becoming a supply-chain analyst
    and eventually an operations manager for a company that values sustainable practices. He also hopes to integrate his passion for the arts by working in logistics for galleries or museums, or by managing
    the distribution of art-related products. In the next three years he plans to obtain a forklift certification, complete an APICS certification, and secure an internship in a corporate logistics department.
    Ultimately, he envisions opening a community-focused art supply store that provides affordable materials and workshops for local youth.
