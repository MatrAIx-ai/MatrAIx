  hobbies: '[''Hiking desert trails'', ''Foraging for wild herbs'', ''Home brewing and fermentation'', ''Reading culinary literature'', ''Food photography'', ''Woodworking for kitchen tools'', ''Target
    shooting'', ''Listening to classic rock'', ''Cooking experimental dishes for small gatherings'']'
  career_goals: Adam aims to open a modestly sized restaurant that showcases modern Southwestern cuisine built around locally sourced desert ingredients, allowing him to blend his curiosity for new flavors
    with proven classic techniques. He plans to earn a Certified Chef de Cuisine credential to formalize his expertise despite his limited formal schooling. Competing in regional chili‑cook‑off and barbecue
    contests satisfies his competitive nature and provides recognition that could attract investors. In the longer term he envisions mentoring a small group of aspiring cooks through workshops and possibly
    consulting for other eateries seeking to incorporate sustainable sourcing and efficient kitchen operations.
