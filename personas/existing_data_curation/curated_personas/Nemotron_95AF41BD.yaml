  hobbies: '["Fishing", "Hunting", "Woodworking", "Acoustic guitar", "Country and classic rock music listening", "Reading (health, personal development, DIY)", "Community volunteering", "Hiking", "Gardening"]'
  career_goals: Markus aims to build on his nursing‑assistant experience by earning an Associate’s Degree in Nursing within the next two years and obtaining his Registered Nurse (RN) licensure. He is particularly
    interested in geriatric and community health settings, where he can provide stable, predictable care to the aging population in his hometown. Over the longer term, he envisions moving into a charge‑nurse
    or supervisory role, mentoring new nursing assistants, and possibly pursuing a certification in wound‑care management. He also hopes to achieve greater financial security, which would allow him to purchase
    a modest home and start a small side business offering in‑home health support to rural families.
