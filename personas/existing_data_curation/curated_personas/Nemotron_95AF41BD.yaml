personas:
  professional: Markus Knight is a diligent nursing assistant in a community health clinic, excelling at vital signs, wound care, and basic phlebotomy while applying a meticulous, organized approach to
    infection control and patient documentation, and they are known for their calm under pressure.
  sports: Markus Knight follows the Oklahoma City Thunder and the Tulsa Roughnecks, participates in a local 4‑H hunting club’s seasonal archery contests, and maintains a regular cardio routine of early‑morning
    walks around Lake Eufaula, which they use to stay fit for the physical demands of their nursing duties.
  arts: Markus Knight finds solace in strumming an acoustic guitar to the sounds of Garth Brooks, Johnny Cash, and Lynyrd Skynyrd, and they regularly attend church hymn nights and community barn‑dance gatherings
    that keep their connection to country and classic rock traditions alive.
  travel: Markus Knight enjoys short road trips to nearby natural attractions such as the Wichita Mountains Wildlife Refuge, Lake Texoma, and the Ozark National Forest, and they dream of a longer adventure
    through the Grand Canyon and New Mexico’s Bandelier National Monument once their savings goal is reached.
  culinary: Markus Knight prefers hearty, home‑cooked meals like chicken fried steak, pork chops with applesauce, and bean chili, seasoning with smoked paprika and herbs from their garden, and they often
    craft custom cutting boards in their woodworking shop to enhance their cooking experience.
  core: Markus Knight balances a structured nursing career with a love for outdoor pursuits, guitar, and community service, yet they wrestle with lingering worry and occasional splurges on gear, making
    them a reliable yet quietly self‑critical small‑town professional.
background:
  cultural: Markus grew up in Porum, a small town in McIntosh County, Oklahoma, where the community blends rural Great Plains values with a strong sense of local tradition. His family’s ancestry includes
    German‑American roots, and the household emphasized hard work, modesty, and self‑reliance. The region’s cultural landscape is shaped by close‑knit church communities, country music, and outdoor pursuits
    such as fishing and hunting. These influences fostered a practical, organized outlook and a preference for reliable, predictable environments. While the wider area is part of the historic Cherokee Nation,
    Markus’s upbringing has been largely reflective of a predominantly white, working‑class, Mid‑Southern milieu that values loyalty to family, community service, and perseverance in the face of economic
    challenges.
attributes:
