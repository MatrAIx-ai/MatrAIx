persona_description: A crop pathologist and geneticist who specializes in the management and reduction of greenhouse gas emissions in irrigated croplands in the western United States. This individual has
  conducted research on the impact of crop management practices on soil organic carbon sequestration and carbon dioxide emissions from various cropping systems, including irrigated and dryland wheat, corn,
  and other crops. They have also explored the effects of nitrogen fertilization and irrigation on nitrous oxide emissions and have developed mitigation strategies based on the available data.
