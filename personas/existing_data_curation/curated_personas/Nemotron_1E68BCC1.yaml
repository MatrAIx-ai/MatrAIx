    at community garden (art events)"]'
  career_goals: Mary aspires to forge a career that intertwines her passion for art with community engagement. In the near term, she aims to work as a community arts coordinator or curator for a nonprofit
    gallery, designing inclusive programs that amplify underrepresented voices. Over the longer horizon, she envisions launching a mobile art studio that travels across Chicago neighborhoods, offering workshops
    in visual storytelling and creative expression. She values flexibility and seeks project‑based roles that allow her to balance personal exploration with collaborative artistic initiatives.
