personas:
  professional: Mary Adams, a budding community arts coordinator, merges her visual storytelling skill set—photography, sketching, and Adobe Lightroom expertise—with her curiosity and collaborative nature
    to curate inclusive pop‑up exhibitions that amplify underrepresented voices, though her love of flexibility sometimes results in last‑minute schedule juggling.
  sports: Mary Adams enjoys casual fitness, sprinting along Chicago’s Lakefront Trail with the Lakeshore Running Club in summer, joining spontaneous pickup basketball games at the West Loop community center,
    cheering on the Chicago Bears and the Chicago White Sox on game nights, and treating yoga sessions as both relaxation and gentle strength training, preferring flexible, low‑pressure routines over strict
    regimens.
  arts: Mary Adams immerses herself in the city’s cultural pulse, frequenting the Museum of Contemporary Art Chicago and the Art Institute’s special exhibitions, sketching in cafés while looping playlists
    that feature Bon Iver, Sufjan Stevens, and experimental group Animal Collective, curating pop‑up shows that spotlight emerging artists like Kerry James Marshall and Yayoi Kusama, and volunteering to
    lead art‑themed workshops at the community garden, all of which reinforce their belief that art should be accessible and dialogic.
  travel: Mary Adams prefers spontaneous, budget‑friendly trips, taking weekend Amtrak rides to explore Milwaukee’s vibrant gallery scene and the Indiana Dunes for sunrise photography, dreaming of a summer
    immersion in Santa Fe’s Pueblo‑style art districts, and occasionally splurging on a boutique B&B in New Orleans during Mardi Gras to capture the city’s festive street art, all while keeping a rolling
    travel journal on their phone.
  culinary: Mary Adams delights in an eclectic palate, savoring Chicago deep‑dish pizza topped with mozzarella, caramelized onions, and pepperoni, crafting vegan quinoa bowls with avocado, black beans,
    and smoked paprika for quick meals, and occasionally preparing homemade Thai pad thai with shrimp, tamarind sauce, and fresh Thai basil, reflecting their love of both comfort foods and adventurous flavors.
  core: Mary Adams, a 23‑year‑old art‑obsessed explorer, channels boundless curiosity into community‑focused creativity while juggling a delightfully disorganized schedule, a love for indie folk, and a
    penchant for spontaneous coffee‑shop sketching.
background:
  cultural: Mary grew up in the suburbs of Chicago before moving to the city for college, where she was immersed in the region’s vibrant, multicultural arts scene. Her family background is Irish‑American,
    with traditions of storytelling and music that nurtured her early appreciation for the arts. The city’s diverse neighborhoods exposed her to a wide array of cultural expressions—from African American
    blues to Latin American mural festivals—shaping an inclusive worldview and fueling her desire to use art as a bridge between communities.
