  career_goals: He aims to obtain a Certified Nursing Assistant (CNA) credential within the next year, and eventually transition into a supervisory role overseeing a small team of home‑care aides. James
    is interested in establishing a boutique home‑care service that emphasizes personalized, art‑enriched experiences for clients, such as curated museum visits, in‑home art workshops, and therapeutic music
    sessions. He also hopes to mentor younger aides, sharing his knowledge of patient safety and his passion for integrating creativity into caregiving. Long‑term, he envisions volunteering his expertise
    to develop community outreach programs that connect seniors with local cultural institutions.
