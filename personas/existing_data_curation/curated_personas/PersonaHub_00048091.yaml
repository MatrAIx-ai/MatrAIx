persona_description: A researcher or scientist who specializes in the field of neuroscience, specifically in the study of spinal cord function and potential for rehabilitation. This individual is interested
  in understanding the mechanisms underlying voluntary and involuntary movement, and has conducted research on the use of electromyography (EMG) and spinal electromyography (SEM) to investigate the effects
  of electrical stimulation on the spinal cord. This researcher is likely to be familiar with the use of SEMS for spinal cord stimulation and has conducted preliminary studies on its potential for inducing
  involuntary movements in non-injured individuals.
