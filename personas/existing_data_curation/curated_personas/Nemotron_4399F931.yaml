personas:
  professional: Christian Santiago is a diligent metal fabricator who excels at CNC operation, MIG/TIG welding, and quality inspections while leveraging bilingual communication and a strong focus on OSHA
    safety, aspiring to earn AWS welding certification and a CNC programming credential as stepping stones toward a lead assembler or shift supervisor role, yet occasionally lets a relaxed attitude toward
    scheduling cause minor workflow hiccups, which they counter with meticulous daily checklists.
  sports: Christian Santiago plays forward for the Little Rock Community Soccer League's River Rangers, tunes in to the Arkansas Razorbacks football team and the St. Louis Cardinals baseball club, and spends
    weekends hiking the Ouachita trails or fishing at Lake Ouachita to maintain cardio fitness, which they prioritize over gym routines.
  arts: Christian Santiago unwinds to the sounds of Los Tigres del Norte, Vicente Fernández, and The Rolling Stones, strums an acoustic guitar when inspiration strikes, and attends local Día de los Muertos
    celebrations and spring folk festivals, integrating music and hands‑on woodworking as creative outlets that they cherish after long shifts.
  travel: Christian Santiago enjoys spontaneous road trips to the Texas Hill Country and the Grand Canyon, has weekended in Santa Fe to explore art markets, and dreams of trekking Patagonia’s glacial lakes,
    planning trips around work schedules and family budgets while they use a travel app to scout budget‑friendly cabins and campsites.
  culinary: Christian Santiago loves cooking mole with chilhuacle peppers, tacos al pastor with pineapple, and tamales wrapped in banana leaves, often using a cast‑iron skillet and a home‑made wood‑smoked
    grill, experimenting with plating techniques that mirror their woodworking precision, and they proudly share these dishes with family during weekend gatherings.
  core: Christian Santiago is a structure‑oriented yet easy‑going metal fabricator who blends hands‑on craftsmanship with family‑centric cooking, wrestles with chronic worry, and balances work stress with
    outdoor pursuits, music, and spontaneous DIY projects, which they pursue to maintain mental equilibrium.
background:
  cultural: Christian is a first-generation Mexican American who grew up in a bilingual household, speaking Spanish at home and English at school. His family maintains strong ties to Mexican traditions—celebrating
    Día de los Muertos, Christmas posadas, and sharing regional foods—while also embracing the Southern hospitality and community spirit of Arkansas. As a practicing Catholic, he finds meaning in church
    gatherings and community service. This blend of Mexican heritage and Arkansas lifestyle informs his values of family, cooperation, and respect for both cultural roots.
attributes:
  skills: '[''Manual metal assembly'', ''CNC milling and turning operation'', ''MIG/TIG welding'', ''Blueprint interpretation'', ''Basic electrical wiring for machinery'', ''Quality control inspection'',
    ''OSHA safety compliance'', ''Mechanical troubleshooting'', ''Bilingual communication (English/Spanish)'', ''ERP/MRP computer proficiency'']'
  hobbies: '[''Fishing at Lake Ouachita'', ''Hiking in Ouachita National Forest'', ''Playing soccer in a community league'', ''Cooking traditional Mexican dishes'', ''Listening to mariachi and norteña music'',
    ''Playing acoustic guitar'', ''DIY woodworking and small metal projects'', ''Volunteering at church food pantry'', ''Attending cultural festivals (e.g., Día de los Muertos)'']'
  career_goals: Christian aims to formalize his technical abilities by obtaining AWS welding certification and a CNC programming credential within the next year. He seeks to move into a lead assembler or
    shift supervisor position to gain more structure in his workday and provide a stable income for his family. Over the longer term, he dreams of opening a small custom metal-fabrication shop that serves
    local construction and decorative markets, allowing him to blend his hands‑on skills with entrepreneurial ambition while mentoring younger workers.
