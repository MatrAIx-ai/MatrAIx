  hobbies: '[''Book club participation'', ''Hiking and trail walking'', ''Biking'', ''Theater attendance'', ''Museum visits'', ''Watercolor painting'', ''Yoga'', ''Community gardening'', ''Literacy volunteering'',
    ''Personal essay writing'', ''Genealogy research'']'
  career_goals: Marilyn aims to progress to a senior managing editor role where she can shape the editorial vision of a mid-size publishing house and mentor emerging editors. She plans to deepen her expertise
    in digital publishing by completing a master's in publishing and leading a cross-platform content initiative that blends print, e-books, and multimedia storytelling. Over the next five years she hopes
    to champion inclusive acquisition lists, launch at least two award-winning series, and eventually publish a nonfiction book on the craft of editing. She also envisions establishing a consulting practice
    that helps independent publishers adopt data-informed editorial workflows.
