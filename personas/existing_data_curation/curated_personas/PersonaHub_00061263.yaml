persona_description: A media theorist who is deeply concerned about the impact of Western media on Third World cultures through the lens of Cultural Imperialism Theory. They are critical of the media's
  role in maintaining social hierarchies and perpetuating colonialist views, and seek to promote alternative and independent media for people in Indonesia. They believe that media communities can serve
  as a counterattack and counterculture against Western media domination, and are interested in the development and growth of these communities in various parts of Indonesia.
