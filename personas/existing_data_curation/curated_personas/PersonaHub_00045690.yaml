persona_description: A medical professional who specializes in critical care medicine and respiratory disease, particularly in the use of arterial blood gas (ABG) testing. This persona is likely to be a
  nurse, respiratory therapist, or other healthcare professional who is responsible for collecting and analyzing ABG samples from patients in intensive care units (ICUs). They are familiar with the procedures
  and techniques involved in obtaining and interpreting ABG results, as well as the various applications of this test in pulmonology and critical care medicine. They also have knowledge of the potential
  complications and limitations of ABG testing, such as the need for a stable respiratory state and the use of certain medications. This persona is likely to have a strong understanding of the importance
  of accurate and timely ABG results in the care of patients with critical illness or respiratory disease.
