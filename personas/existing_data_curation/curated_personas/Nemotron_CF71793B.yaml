  hobbies: '[''Birdwatching'', ''Watercolor painting'', ''Reading poetry and historical fiction'', ''Quilting and knitting'', ''Seafood cooking experiments'', ''Genealogy research'', ''Small book‑club participation'',
    ''Community volunteering at the local library'', ''Listening to classical music'', ''Cultivating a native‑plant garden'']'
  career_goals: Although retired, Annie is driven to deepen her knowledge and give back. She aims to enroll in a local community college course on digital photography, compile a volume of Reedville elders'
    stories, and publish a memoir reflecting her life and the town’s evolution. She also hopes to mentor younger volunteers in craft and heritage preservation, and to co‑lead a neighborhood native‑plant
    garden that supports local pollinators.
