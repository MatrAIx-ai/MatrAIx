  career_goals: Looking ahead, Vernon aims to transition from full‑time supervision to a mentorship and consulting role, focusing on helping small‑business owners and emerging retail managers in the Kansas
    City area. He hopes to develop community‑based training workshops that blend practical sales skills with interpersonal development, reflecting his commitment to compassion and cooperation. As he nears
    retirement, Vernon also aspires to volunteer with local job‑readiness programs, offering guidance to young adults seeking entry‑level positions, and perhaps one day opens a modest community‑focused
    boutique that showcases local artisans and provides a supportive employment environment.
