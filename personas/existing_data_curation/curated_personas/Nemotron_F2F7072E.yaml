  career_goals: Stacey dreams of turning her love for art and nature into a future career. She imagines herself as an artist who captures the sweeping Alaskan landscapes on canvas, or as a wildlife biologist
    exploring the behaviors of marine mammals along the coast. She also hopes to win school art contests and eventually become a teacher who can share her curiosity and encourage other children to ask big
    questions. Underlying these aspirations is a desire for personal recognition and a supportive environment that helps her manage strong emotions.
