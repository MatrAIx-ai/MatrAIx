personas:
  professional: Stacey Austin, a budding wildlife illustrator at age seven, channels their meticulous drawing skills and curiosity about the Alaskan wilderness into detailed sketches, and they push themselves
    to perfect every line despite occasional self‑doubt.
  sports: Stacey Austin loves winter snowshoeing with their family, occasionally hops on the local youth hockey program affiliated with the Anchorage Aces, and they proudly wear a Seawolves cap while cheering
    on the University of Alaska Anchorage basketball team, turning each brisk walk into a mini‑fitness challenge.
  arts: Stacey Austin channels their love for the Alaskan wilderness into watercolor paintings reminiscent of Ansel Adams' stark landscapes, often incorporates motifs from indigenous artist Pitseolak Ashoona,
    and they hum along to Jewel's acoustic folk melodies while attending after‑school art workshops.
  travel: Stacey Austin prefers small, family‑led road trips that blend scenic nature stops like Denali National Park and Kenai Fjords with brief city adventures in Seattle, and they dream of one day exploring
    Iceland's glacial lagoons after watching a documentary about northern lights.
  culinary: Stacey Austin delights in devouring fresh Alaskan salmon sushi rolls and blueberry pancakes, enjoys helping their Mom whisk together a simple wild berry smoothie with honey, but they often sneak
    extra chocolate chips into the batter, revealing a mischievous sweet tooth.
  core: Stacey Austin is a curious, art‑obsessed seven‑year‑old who balances a fierce competitive edge with a shy, anxiety‑prone temperament, and they turn every walk into a treasure hunt while each sketch
    becomes a window onto the wild.
background:
  cultural: Stacey comes from a family of Anglo-American heritage living in Anchorage, Alaska. Her cultural upbringing blends typical American traditions—celebrating holidays such as Thanksgiving, Christmas,
    and the Fourth of July—with the unique Alaskan environment that shapes her daily life. Through school and community events, she has been exposed to Indigenous Alaskan arts and stories, fostering an
    appreciation for the region’s native cultures. The long winter months and access to outdoor activities like snowshoeing and wildlife viewing also influence her sense of place and connection to nature.
