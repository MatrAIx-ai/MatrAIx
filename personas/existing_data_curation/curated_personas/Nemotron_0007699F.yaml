personas:
  professional: Tommy Johnson, an aspiring robotics enthusiast, combines disciplined LEGO engineering with Scratch game coding to prototype simple autonomous bots, and they often lead his school’s robotics
    club by assigning clear tasks and presenting polished demos to classmates.
  sports: Tommy Johnson, a member of the Riverside Rovers youth soccer league, practices drills at the local park after school, cheers for the national team’s midfield star, and they balance competitive
    play with a love for the Chicago Cubs baseball games on television, yet often forget to stretch before matches.
  arts: Tommy Johnson, a budding pianist who dazzles family gatherings with “Fur Elise,” devours sci‑fi novels like “Ender’s Game,” and collects posters of composer Hans Zimmer and singer Taylor Swift,
    finding creative release in both music and building narratives for Scratch games.
  travel: Tommy Johnson plans weekend hikes with meticulous checklists, has explored the nearby Red Rock Preserve and day‑tripped to the Grand Canyon, dreams of backpacking through the Appalachian Trail,
    yet they tend to overpack snacks and forget the sunblock.
  culinary: Tommy Johnson enjoys mastering the perfect cheese‑stretch pizza, whipping up chocolate chip brownies with just the right amount of cocoa, and swapping recipes for tacos al pastor at family cook‑outs,
    although they sometimes over‑salt the sauce when experimenting.
  core: Tommy Johnson is a hyper‑organized, sociable 11‑year‑old who blends a love for robotics, soccer, and piano with a penchant for worry‑driven perfectionism, often juggling structured schedules and
    spontaneous bursts of creative energy.
background:
  cultural: 'Tommy grew up in a middle‑class, white family in suburban Wauconda, Illinois, with roots in German and Irish ancestry. His upbringing reflects classic Midwestern values: hard work, politeness,
    community involvement, and a strong sense of civic duty. He attends the local public middle school, participates in the Boy Scouts and the town’s Little League, and regularly joins church‑based youth
    programs. Family weekends often involve backyard barbecues, trips to nearby Lake County parks, and celebrating holidays like Thanksgiving and the Fourth of July with community parades and fireworks,
    all of which reinforce his cooperative nature and love for structured, shared experiences.'
