  hobbies: '[''Soccer'', ''LEGO Building & Robotics'', ''Scratch Coding'', ''Science‑Fiction Reading'', ''Beginner Piano'', ''Community Volunteering'', ''Hiking'', ''Baseball Card Collecting'']'
  career_goals: Tommy dreams of a career that blends his love of structure, community service, and leadership. He aspires to become a civil engineer, designing safe roads, bridges, and public spaces for
    towns like Wauconda, while also seeing himself as a future youth mentor or middle‑school teacher who can guide classmates through projects and help them stay organized. He plans to graduate high school
    with top grades, earn a scholarship to an engineering program, and eventually contribute to sustainable infrastructure projects that improve everyday life in the Midwest.
