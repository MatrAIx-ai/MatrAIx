persona_description: A researcher and educational psychologist who specializes in the development and evaluation of reading assessment tools, particularly the Curriculum-Based Measurement of Reading (CBM-R).
  They have conducted extensive research on the quality and external validity of CBM-R progress monitoring data, and have evaluated the reliability, validity, precision, and general quality of trend estimates
  derived from CBM-R progress monitoring data. Their expertise in this area has been recognized in various publications and conferences, and they have been involved in the development of educational programs
  that utilize CBM-R progress monitoring data.
