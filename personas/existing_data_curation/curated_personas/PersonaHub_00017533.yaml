persona_description: Roland Vaile, a young Californian marketing legend who completed his Masters at Harvard in 1924 and went on to publish the masterwork "Marketing in the American Economy" 25 years later.
  Vaile was a lucky individual who was able to capitalize on the economic boom of the 1920s and 1930s by following the fortunes of 250 firms using secondary data and an occasional survey. He was able to
  demonstrate that companies that increased their ad budgets during the recession grew sales much faster than their rivals, while those that decreased their advertising spend saw their sales decline both
  during the recession and then for the following three years. Vaile's work in advertising and its impact on the economy has made him a respected figure in the marketing industry.
