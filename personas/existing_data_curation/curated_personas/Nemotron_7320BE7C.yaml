personas:
  professional: Bryant Woods is an aspiring young robotics enthusiast who applies methodical problem‑solving and boundless curiosity to designing LEGO machines, leading his school's robotics club projects
    with reliable organization and a collaborative yet assertive style.
  sports: Bryant Woods plays midfield on the Eastside Elementary soccer team, practices drills after school, and follows Manchester United and the U.S. Women’s National Soccer Team for inspiration, while
    also cheering for the local minor‑league baseball club the River Runners.
  arts: Bryant Woods draws mechanical designs inspired by the fantastical machines of Hayao Miyazaki, the intricate LEGO builds in The LEGO Movie, and the futuristic concepts of Syd Mead, often listening
    to the energetic scores of Hans Zimmer while sketching.
  travel: Bryant Woods prefers hands‑on trips, having explored the local science museum’s planetarium and the nearby state park’s dinosaur exhibit, and he dreams of visiting the Kennedy Space Center in
    Florida and the Jurassic‑Park‑inspired theme park at Universal Studios Singapore, planning each outing with a checklist of must‑see exhibits.
  culinary: Bryant Woods loves pepperoni pizza, chicken nuggets, and building his own mini‑tacos with cheddar, salsa, and avocado; he can whip up a simple cheese quesadilla on the stovetop, but often adds
    extra cheese despite his parents' reminders to balance nutrition.
  core: Bryant Woods channels a relentless curiosity into LEGO and robotics while constantly fretting over unfinished projects, often forgetting to finish homework before diving into another build.
background:
  cultural: Bryant comes from a middle‑class, suburban white American background in Great Neck, New York, a community known for its emphasis on education, extracurricular enrichment, and civic involvement.
    His family values academic achievement, participation in organized activities such as sports leagues, scouting, and after‑school clubs, and encourages a balance of independence and teamwork. Growing
    up in Nassau County provides him access to public libraries, science museums, and technology resources, fostering his curiosity and practical skills. The local culture blends traditional American suburban
    values with a diverse, affluent environment, shaping Bryant's identity as a socially engaged, organized, and ambitious young person.
attributes:
