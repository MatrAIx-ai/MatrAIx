  hobbies: '[''LEGO building'', ''Soccer'', ''Reading science books'', ''Scratch coding'', ''Minecraft exploration'', ''Robotics club participation'', ''Drawing mechanical designs'', ''Strategic board games'']'
  career_goals: Bryant dreams of a future where he can combine his curiosity for how things work with practical problem‑solving. He aspires to become a civil engineer or architect, inspired by his love
    for building sturdy LEGO structures and his fascination with bridges and skyscrapers. He also imagines exploring space as an astronaut, drawn to the challenge of designing solutions for extreme environments.
    Ultimately, he wants to lead projects that create safe, innovative spaces for his community—whether designing playgrounds, helping construct sustainable buildings, or contributing to space technology—reflecting
    his blend of curiosity, practicality, and desire to make a tangible impact.
