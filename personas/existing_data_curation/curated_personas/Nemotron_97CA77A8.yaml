  career_goals: Approaching retirement, Jorge aims to solidify his legacy by attaining a senior partner role within his firm, leading the integration of data‑analytics tools into the audit practice, and
    establishing a niche consulting service for small Latino‑owned businesses in Southern California. He also plans to mentor the next generation of accountants, pursue a Certified Internal Auditor (CIA)
    credential, and eventually transition to part‑time advisory work while supporting community financial‑literacy programs.
