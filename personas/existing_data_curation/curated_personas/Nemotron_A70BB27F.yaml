    theater attendance'', ''Walking for fitness'']'
  career_goals: Agnes aims to convert her extensive organizational and community‑building experience into a part‑time entrepreneurial venture that offers event‑consulting and catering services for local
    families and small businesses. She also plans to obtain a certificate in non‑profit management so she can assume a leadership role on the Holland Community Center board, and she is considering a run
    for a seat on the school board to influence local education policy. Her long‑term ambition is to become a recognized community leader while maintaining the flexibility to manage her household and nurture
    her family.
