personas:
  professional: Roman Atkins, a retired process engineer with 35 years of experience in food‑manufacturing, channels their data‑driven lean‑manufacturing expertise, SolidWorks mechanical design skill, and
    PMP project‑leadership into mentoring local engineers and guiding community robotics initiatives, fuelled by a competitive streak that drives them to quantify every improvement.
  sports: Roman Atkins enjoys weekend fishing on the Kalamazoo River, hikes the dunes of Indiana Dunes State Park, follows the Detroit Tigers and Michigan Wolverines with a loyal fan’s enthusiasm, and participates
    in the Kalamazoo Senior Walking Club’s weekly treks, balancing low‑impact exercise with their competitive desire to log personal bests on trail maps.
  arts: Roman Atkins finds artistic fulfillment in crafting bespoke furniture inspired by the clean lines of Charles and Ray Eames, listening to the folk storytelling of Bob Dylan and the jazz improvisations
    of Miles Davis, and attending community theater productions like ‘Our Town,’ which together shape their appreciation for both functional design and narrative performance.
  travel: Roman Atkins favors meticulously planned road trips in their classic RV, having explored the rugged canyons of Grand Canyon National Park and the historic streets of Charleston, South Carolina,
    while dreaming of a future pilgrimage to the castles of the Scottish Highlands and the vineyards of Tuscany.
  culinary: Roman Atkins, an adept home cook, relishes grilling fresh‑caught trout with a rosemary‑lemon glaze, perfecting their own hot sauce using habanero and smoked paprika, and often pairs their meals
    with a glass of Michigan‑crafted craft cider, while occasionally indulging in a buttery apple pie for special occasions.
  core: Roman Atkins is a methodical, curiosity‑driven former engineer who blends competitive precision with hands‑on craftsmanship, community mentorship, and a measured appetite for risk in both finances
    and hobbies, and they constantly seek quantifiable ways to leave a lasting impact.
background:
  cultural: Roman is a second‑generation Midwestern American born and raised in Michigan. His family traces its roots to German and Irish immigrants who settled in the Great Lakes region in the early 20th century.
    He grew up attending a local Methodist church, where community service and self‑reliance were emphasized. The cultural values of hard work, practicality, and modest independence that characterize the
    broader white, middle‑class culture of Battle Creek have shaped his worldview and his balanced, pragmatic approach to life.
attributes:
  skills: '[''Process engineering and lean manufacturing'', ''Statistical data analysis (R, Python)'', ''Mechanical design and CAD (SolidWorks)'', ''Project management (PMP certified)'', ''Industrial equipment
    troubleshooting'', ''Mentorship and STEM education'', ''Woodworking and home renovation'']'
  hobbies: '[''Woodworking'', ''Model railroading'', ''Fishing'', ''Hiking'', ''Reading non‑fiction (science & history)'', ''Playing chess'', ''Mentoring robotics club'']'
  career_goals: Although officially retired, Roman aims to stay intellectually active and make a measurable impact in his community. He plans to volunteer as a mentor for the local high‑school robotics
    team, serve on an advisory board for the community college’s engineering program, and author a concise guide on lean manufacturing for small producers. He also intends to deepen his data‑science skills
    through online coursework and to showcase his woodworking projects in regional craft exhibitions. Driven by a competitive streak, he seeks recognition for these contributions while maintaining a pragmatic,
    results‑oriented approach.
