  career_goals: As an 11‑year‑old, Samantha already envisions a future where she can apply her love for animals and the natural world. She aims to become a veterinarian or wildlife biologist, motivated
    by a desire to care for animals and protect ecosystems. She also dreams of designing community education programs that teach younger children about science and environmental stewardship, combining her
    practical problem‑solving abilities with her calm, resilient personality. In the long term, she sees herself leading collaborative projects that blend hands‑on work with teamwork.
