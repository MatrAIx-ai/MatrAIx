personas:
  professional: Samantha Mccabe, an 11‑year‑old budding programmer and interactive story creator, merges her love for fantasy novels with disciplined project planning to build detailed Scratch adventures
    while volunteering at the community library, showcasing a calm, resilient, and organized approach to learning.
  sports: Samantha Mccabe, an 11‑year‑old midfielder for the Greenfield Tigers youth soccer team, trains twice weekly, idolizes the national women’s soccer team and the local MLS club the City FC, and spends
    weekends bird‑watching in Oakridge Park while occasionally joining a junior running club for fun cardio.
  arts: Samantha Mccabe, an 11‑year‑old fantasy‑book fan and nature illustrator, fills sketchbooks with detailed botanical drawings inspired by Maria Sibylla Merian, practices piano pieces by Debussy and
    Yiruma, and draws creative inspiration from the animated worlds of Studio Ghibli’s “Princess Mononoke” and the music of Taylor Swift’s “Folklore” album.
  travel: Samantha Mccabe, an 11‑year‑old weekend explorer, has trekked the Redwood Trail Park, visited the Smithsonian National Air and Space Museum on a family trip to Washington D.C., and dreams of snorkeling
    the Great Barrier Reef to catalogue marine life, always planning trips with a mix of educational guides and free‑form adventure.
  culinary: Samantha Mccabe, an 11‑year‑old kitchen enthusiast, loves assembling rainbow fruit kebabs with strawberries, kiwi, blueberries, and a drizzle of honey, helps her mom bake banana‑nut bread on
    Saturdays, and occasionally skips the school lunch veggies in favor of her favorite pizza slice, revealing a playful but health‑mindful palate.
  core: Samantha Mccabe is a calm, curious 11‑year‑old who balances meticulous organization with imaginative storytelling, blends solitary creativity with community kindness, and navigates life with a resilient,
    practical optimism and a few endearing quirks like over‑collecting stickers and forgetting to water her plant.
background:
  cultural: Samantha comes from a White American family rooted in the Midwest‑South region of the United States. Growing up in Tulsa, Oklahoma, she experiences a blend of Southern hospitality and Midwestern
    practicality. Her family participates in local traditions such as the Tulsa State Fair, community service events at the Gathering Place park, and seasonal church gatherings that emphasize togetherness
    and service. The cultural environment values education, community involvement, and a respect for the natural landscape of Oklahoma’s prairie and river ecosystems, all of which influence her interests
    and values.
