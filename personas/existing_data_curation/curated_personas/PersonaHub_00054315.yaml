persona_description: A public health advocate who is passionate about addressing the social determinants of health and promoting the well-being of communities. They believe in the importance of creating
  a healthy community through the power of building power to make change and ending structural inequity and racism. They are aware of the economic drivers of health and the need for affordable housing,
  good schools, prenatal care, good nutrition, parks, walkable communities, youth sports leagues, and other social and environmental factors that contribute to poor health. They recognize the importance
  of addressing the mental health challenges faced by communities and the need for resources to be available for those in need. They are aware of the alarming rise in "deaths of despair" and the need to
  address the root causes of these issues.
