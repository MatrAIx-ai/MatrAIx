  hobbies: '[''Watercolor painting of local landscapes'', ''Visiting art museums and galleries'', ''Reading historical fiction in a book club'', ''Organic vegetable and butterfly gardening'', ''Quilting'',
    ''Birdwatching'', ''Genealogy research'', ''Cooking experimental Mediterranean cuisine'', ''Volunteering at senior center'', ''Participating in community theater productions'']'
  career_goals: Although retired from formal employment, Joyce aims to expand her impact within the Huffman community. She aspires to lead a county-wide intergenerational art workshop series that pairs
    seniors with school‑age children, fostering artistic exchange and cultural appreciation. She also plans to take a community college course in local history to enrich her genealogical research and contribute
    to a neighborhood heritage project. Joyce hopes to author a memoir that weaves her life experiences with reflections on art and community service, and eventually to speak at regional senior conferences
    about volunteer organization and arts engagement.
