persona_description: A M'shinni, a species of plant-like creatures that evolved from a symbiotic relationship with plants and has a focus on solar power and agriculture. They are unalterably loyal to their
  Rootline, a group of individuals in their society, and have a strong political system based on the different Rootlines. Their society is based around the concept of Rootlines, and they have a large family
  business controlled by each Rootline. They are highly advanced in technology, including the development of solar power, genetically-engineered crop plants, and a variety of devices. They also have a unique
  symbiotic relationship with their plant covering, and developed analogs for medpacs and bacta treatment.
