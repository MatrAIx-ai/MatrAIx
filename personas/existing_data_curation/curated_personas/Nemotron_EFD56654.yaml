personas:
  professional: Sean Reed, an aspiring young game creator and builder, merges curiosity with disciplined project planning by designing simple Scratch Jr. games and constructing detailed LEGO models, always
    aiming to turn imaginative stories into concrete realities.
  sports: Sean Reed, a spirited 7-year-old basketball fan, dominates weekend pick-up games at the local park, models moves after LeBron James and cheers for the Los Angeles Lakers, while also practicing
    shooting drills with a junior league team.
  arts: Sean Reed, a lively youth choir member and budding comic-artist, sings hymns with his church choir, sketches superhero-style characters inspired by Stan Lee and Mo Willems, devours graphic novels
    like 'The Amazing Spider-Man' and hums Disney soundtracks such as 'Let It Go' from Frozen.
  travel: Sean Reed, an adventurous 7-year-old who loves science, dreams of visiting the Smithsonian National Air and Space Museum in Washington, D.C., plans trips with his family using colorful maps, prefers
    weekend road trips over long flights, and saves allowance for a future visit to a theme park like Disneyland.
  culinary: Sean Reed, a picky yet curious eater, favors pizza slices, chicken nuggets, and mac & cheese, loves sprinkling extra parmesan on spaghetti, helps parents make grilled cheese with a perfect golden
    crust, and secretly enjoys the sweet tang of mango-flavored gummies.
  core: Sean Reed, a disciplined yet playful 7-year-old, balances heroic LEGO builds, Scratch Jr. game design, and basketball competitiveness with a secret stash of candy hidden under the couch.
background:
  cultural: Sean is raised in a Black family in Gary, Indiana, where community, family, and church play central roles. His parents emphasize the importance of education, resilience, and staying connected
    to African‑American cultural traditions, including music, storytelling, and community service. He attends a local Baptist church where gospel music and youth activities reinforce his cultural identity.
    The city’s strong basketball culture, local blues and soul music scenes, and neighborhood community programs (such as the Boys & Girls Club) shape his everyday experiences. Family gatherings often include
    cooking soulful dishes like collard greens and cornbread, sharing stories of the civil‑rights era, and celebrating holidays with a blend of African‑American and Midwestern customs.
attributes:
  skills: '["Reading comprehension (2nd‑grade level)", "Basic arithmetic (addition & subtraction)", "Following multi‑step instructions", "LEGO and construction kit assembly", "Basic block coding (Scratch Jr.)",
