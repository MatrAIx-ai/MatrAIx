  hobbies: '["Reading adventure books and graphic novels", "Playing basketball with friends", "Building LEGO and construction kits", "Creating games and stories with Scratch Jr.", "Singing in church youth
    choir", "Drawing comics and sketches", "Participating in school science club"]'
  career_goals: Sean often talks about what he wants to be when he grows up, and his ambitions blend his love of problem‑solving, teamwork, and helping others. He dreams of becoming an astronaut or a civil
    engineer so he can design things that people use, and he also imagines being a professional basketball player because of his passion for the sport. More broadly, he aspires to hold a role where he can
    lead groups, solve challenges, and give back to his community, such as a future teacher, community organizer, or fire‑fighter.
