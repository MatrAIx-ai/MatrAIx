persona_description: A scientist at GE Global Research (GRC) who specializes in computational fluid dynamics and simulations, focusing on the modeling and prediction of ice accumulation on wind turbine
  blades. The scientist is using supercomputers, such as Titan Cray XK7 at Oak Ridge National Laboratory, to study the growth and behavior of ice droplets on wind turbine blades. The scientist is also developing
  icephobic surfaces to prevent ice formation and build up. The scientist's research has applications in various industries, including wind energy and offshore oil and gas drilling and production rigs,
  where cold weather and ice accumulation can cause safety risks and financial losses.
