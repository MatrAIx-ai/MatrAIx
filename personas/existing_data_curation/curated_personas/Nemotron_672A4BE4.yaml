  hobbies: '["Watercolor painting","Reading historical fiction and biographies","Book club participation","Gardening (native plants)","Quilting","Crossword puzzles","Hiking and birdwatching in Shenandoah
    National Park"]'
  career_goals: As she approaches retirement, Rosie aims to transition into a mentorship and curriculum leadership role, seeking to become a department chair or curriculum specialist who can champion a
    school‑wide arts integration initiative. She is interested in securing grant funding to develop interdisciplinary projects that blend local history, environmental education, and visual arts. Additionally,
    she hopes to author a guide on organized, achievement‑focused teaching practices and to provide part‑time consulting for neighboring schools after she steps back from full‑time classroom duties.
