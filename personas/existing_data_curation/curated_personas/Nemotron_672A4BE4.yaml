personas:
  professional: Rosie Reese, a veteran elementary and middle‑school educator with over three decades of experience, blends meticulous lesson planning, data‑driven assessment, and a disciplined, achievement‑focused
    mindset with a curious openness to arts integration, while they quietly assert themselves as a mentor and curriculum leader championing community‑based, interdisciplinary projects.
  sports: Rosie Reese, a regular member of the Shenandoah Hiking Club and occasional participant in the Lee County Birdwatching Society, maintains fitness through weekly hikes along the Shenandoah trails
    and seasonal birdwatching walks, supports the Washington Commanders in the fall, follows the Washington Capitals during winter, and enjoys catching a Virginia Tech Hokies women's basketball game on
    a rare weekend outing, favoring steady, low‑impact exercise over high‑intensity sports, while they appreciate the camaraderie of small‑group outings.
  arts: Rosie Reese, an avid watercolorist who emulates the tonal subtlety of Andrew Wyeth and the vibrant brushwork of Georgia O’Keeffe, spends evenings quilting to folk patterns inspired by local heritage
    festivals, enjoys reading historical fiction by Libba Bray, and relaxes to the gentle crooning of Alison Krauss, while they occasionally attend community theater productions starring local talent.
  travel: Rosie Reese, a careful planner who prefers low‑key, culturally rich trips, has hiked the Blue Ridge Parkway and explored Shenandoah National Park close to home, taken weekend drives to historic
    Williamsburg and Washington, D.C., and dreams of a modest pilgrimage to Edinburgh to trace Celtic roots, always booking accommodations well in advance to stay within a modest travel budget, while they
    relish the quiet discovery of each new place.
  culinary: Rosie Reese, a competent home cook who favors Southern comfort fare such as fried chicken with collard greens and cornbread, enjoys crafting herb‑infused roasted vegetables using garden‑grown
    thyme and rosemary, often prepares shrimp and grits with a dash of smoked paprika, and treats herself to a slice of homemade apple pie spiced with cinnamon and nutmeg on Sunday afternoons, while they
    occasionally indulge in a splurge of exotic spices for a new recipe.
  core: Rosie Reese, a disciplined yet quietly curious educator, balances meticulous lesson planning with a love of watercolor painting, tends to worry about retirement and health, and can’t resist a late‑night
    crossword puzzle or a spontaneous splurge on new paint tubes, while they remain steadfastly committed to their students.
background:
  cultural: Rosie is a lifelong resident of rural Lee County, Virginia, raised in a family with deep Appalachian roots. Her upbringing emphasized community involvement, modesty, and respect for local traditions,
    while her curious nature encouraged an appreciation for the broader arts and new ideas. She maintains strong ties to her hometown through church activities, volunteer work at the county library, and
    participation in local heritage festivals, all of which inform her teaching philosophy and personal interests.
attributes:
  skills: '["Classroom management","Curriculum development","Differentiated instruction","Art integration in lessons","Educational technology (smartboard, LMS)","Student assessment and data analysis","Parent-teacher
