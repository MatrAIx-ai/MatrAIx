personas:
  professional: Evan Mctier, a market research analyst in Lake Havasu City, blends meticulous survey design, SPSS and Tableau expertise with his habit of planning every project down to the deadline, turning
    raw data into clear, action‑driven presentations that keep cross‑functional teams on track and clients feeling heard.
  sports: Evan Mctier follows the Arizona Diamondbacks and Phoenix Suns, joins the Lake Havasu City Softball League every Saturday, and hits the desert trails for sunrise hikes, balancing competitive team
    spirit with relaxed weekend fitness.
  arts: Evan Mctier spends evenings at the Lake Havasu Summerfest listening to The Eagles and local folk singer Sara Ramirez, captures the desert’s golden hour in their photography, and unwinds with mystery
    novels by Agatha Christie, letting storytelling inspire their creative side.
  travel: Evan Mctier plans weekend road trips to the Grand Canyon and Sedona for sunrise hikes, targets a summer fishing expedition to Cabo San Lucas, and dreams of a cross‑country drive to Yellowstone,
    always mapping routes in advance to fit around work commitments and the family’s budget.
  culinary: Evan Mctier favors grilling fresh lake fish for tacos with corn tortillas, cilantro, lime, and a dash of chipotle, dabbles in weekend BBQ pork ribs, and enjoys the town’s pepper‑corn steakhouse,
    though they often leave the grill a mess and rely on the dishwasher to rescue the kitchen.
  core: Evan Mctier is a methodical market‑research professional whose love for organized community projects, desert adventures, and meticulously planned finances makes them the reliable, sociable, and
    slightly perfection‑prone backbone of Lake Havasu’s civic life.
background:
  cultural: Evan comes from a middle‑class Anglo‑American family with deep roots in the American Southwest. He was raised in a suburban setting where community gatherings, outdoor recreation, and practical
    values were emphasized. His cultural influences include the laid‑back desert lifestyle of Arizona, a strong work ethic typical of Midwestern heritage, and a respect for tradition and self‑reliance.
    He identifies with mainstream American cultural norms while maintaining a connection to local customs such as lake boating, regional festivals, and volunteer service.
attributes:
  skills: '[''Survey design'', ''Focus group facilitation'', ''Quantitative data analysis'', ''Statistical software (SPSS, Excel)'', ''Data visualization (Tableau)'', ''Consumer segmentation'', ''Report
