  hobbies: '[''Boating on Lake Havasu'', ''Fishing'', ''Desert hiking'', ''Recreational softball'', ''Community potluck organization'', ''Food bank volunteering'', ''DIY home improvement'', ''Landscape
    photography'', ''Local music festivals'', ''Mystery novel reading'']'
  career_goals: Evan aims to become a Senior Market Research Manager within the next five years, leading a team of analysts to drive data‑driven marketing strategies for regional businesses. He plans to
    obtain the Professional Researcher Certification (PRC) and complete a bachelor's degree in Marketing or Business Analytics to solidify his expertise. Long‑term, he aspires to a director‑level role overseeing
    brand strategy while leveraging his analytical skills to support local non‑profits and contribute to community development initiatives in Lake Havasu City.
