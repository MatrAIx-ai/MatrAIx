personas:
  professional: Nicole Holmes is a curious 3‑year‑old preschooler who delights in exploring art projects and imaginative storytelling, often organizing crayons by color before letting creativity flow freely,
    and they cheerfully assist teachers with classroom responsibilities.
  sports: Nicole Holmes is an energetic toddler who attends a local Mini Kickers soccer practice, loves the splash of the neighborhood splash pad in summer, participates in a gentle toddler gymnastics class
    at Bright Beginnings Gym, and they cheer for the hometown baseball team, the City Cubs, during family outings.
  arts: Nicole Holmes is an enthusiastic mini‑artist who spends hours coloring pages of animals, sings along to Raffi’s 'Baby Beluga' while dancing in the living room, treasures a collection of glitter
    stickers, and they readily share crayons with friends during playdates to maintain harmony.
  travel: Nicole Holmes is an adventurous preschooler who has visited Disneyland with their family, enjoys short road trips to the nearby beach for sandcastle building, loves watching the world from the
    car’s front seat window, and they prefer trips where familiar routines, like bedtime stories, are maintained.
  culinary: Nicole Holmes is a picky but curious eater who adores macaroni and cheese, peanut butter on whole‑grain toast, and apple slices with cinnamon, often insists on arranging their food into smiley
    faces, and they occasionally sneak a chocolate chip cookie when no adult is watching.
  core: Nicole Holmes is a bright, art‑loving 3‑year‑old who balances playful organization with boundless curiosity, saves coins in a piggy bank, handles mild allergies with a brave smile, bursts with energy
    in toddler sports, creates glittery masterpieces, explores family trips with delight, and they turn every meal into a colorful adventure.
background:
  cultural: Nicole is part of a Black family rooted in the mid‑Midwest, living in Lambertville, Michigan. Her household celebrates African‑American cultural traditions through church services, gospel music,
    and family gatherings where soul food like fried chicken, collard greens, and cornbread are shared. Weekend visits to local community centers expose her to story‑telling circles, dance workshops, and
    art programs that highlight Black artists and history. Her parents emphasize the importance of community, respect, and resilience, often weaving tales of their ancestors’ journeys, which nurtures Nicole’s
    sense of identity and belonging.
attributes:
  skills: '["color recognition", "shape identification", "basic letter awareness", "counting to ten", "crayon drawing", "scribbling simple figures", "singing nursery rhymes", "basic rhythmic clapping",
    "sharing and turn‑taking", "basic empathy", "puzzle solving with large pieces", "building with blocks", "running and climbing", "observational curiosity"]'
  hobbies: '["coloring and crayon drawing", "finger‑painting", "listening to picture‑book stories", "singing and clapping to children’s songs", "dancing to simple rhythms", "playing a toy xylophone", "outdoor
    exploration (butterflies, leaves, garden)", "building with large blocks", "pretend play as a painter or storyteller"]'
  career_goals: Although Nicole is only three, she frequently talks about wanting to "make pictures for everyone" and imagines herself as a teacher who reads stories to friends. She expresses a budding
    ambition to help people, whether by drawing happy pictures, sharing toys, or later becoming a community helper like a teacher, artist, or nurse. Her current focus is on exploring new activities, asking
    questions, and learning through play, laying the groundwork for future aspirations centered on creativity and caring for others.
