persona_description: A historian who is interested in the study of American history, particularly the period from 1776 to 1900, and how new technologies have influenced this period. This person is likely
  to be interested in the work of John F. Kasson and his book "The Technology and Republican Values in America, 1776-1900", which explores the impact of new technologies on the drive for a republican civilization
  in America. This person may also be interested in the book "Fifty Years Later - The New Deal Evaluated", edited by Harvard University professor H. Sitkoff, which provides a thorough evaluation of the
  New Deal era.
