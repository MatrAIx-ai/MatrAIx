  hobbies: '[''Salsa Dancing'', ''Hiking'', ''Volleyball'', ''Cooking Mexican Cuisine'', ''Reading Business Biographies'', ''Mentoring STEM Students'', ''Attending Networking Events'']'
  career_goals: Iris aims to scale her company into a national leader with annual revenue exceeding $100 million and ultimately take the business public. She is focused on expanding into key Latin American
    markets, leveraging her cultural insights to build strategic partnerships abroad. A core ambition is to embed a robust diversity, equity, and inclusion program that lifts Mexican‑American women in tech,
    creating a mentorship pipeline that starts at high‑school and continues through senior leadership. Iris also seeks to embed sustainability initiatives across the supply chain, positioning the firm as
    an industry model for responsible growth.
