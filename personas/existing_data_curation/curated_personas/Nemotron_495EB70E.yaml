personas:
  professional: Iris Reza, a data‑driven product strategist at a fast‑growing tech firm, blends rigorous strategic planning, sophisticated financial modeling, and agile project management to lead cross‑functional
    teams through structured yet adaptable processes, leveraging their competitive edge and sociable networking style to forge high‑impact partnerships and mentor rising talent.
  sports: Iris Reza is a sports enthusiast who roots for the Dallas Mavericks and the Dallas Cowboys, competes in a co‑ed volleyball league on weekday evenings, and leads weekend hikes with the Dallas‑Fort Worth
    Trail Club, balancing competitive drive with sociable group dynamics.
  arts: Iris Reza finds artistic expression through weekly salsa dancing sessions, attending Klyde Warren Park concerts that feature the vibrant guitar of Carlos Santana and the soulful voice of Beyoncé,
    and devotes evenings to rereading biographies of Steve Jobs and Indra Nooyi, blending a love of rhythm, storytelling, and leadership inspiration.
  travel: Iris Reza approaches travel with meticulous planning, opting for weekend music‑filled escapes to Austin, a business‑cultural immersion trip to Buenos Aires last year, and dreaming of a future
    trek through Patagonia’s Patagonian Andes, all while balancing work commitments and a modest travel budget.
  culinary: Iris Reza’s culinary passion centers on crafting hand‑rolled corn tortillas, slow‑cooked mole with dried chilies, and fresh salsa verde using cilantro, lime, and jalapeños, skillfully juggling
    weekday meal prep with elaborate Sunday cooking sessions for friends, though they occasionally over‑salt dishes in their quest for bold flavor.
  core: Iris Reza balances a relentless drive for corporate growth with an energetic social life, channeling their competitive edge into structured leadership while occasionally overcommitting to networking
    events, and habitually juggling spreadsheets, salsa steps, and trail maps with equal fervor.
background:
  cultural: Iris’s cultural background is rooted in her Mexican heritage, shaped by a bilingual household in Grand Prairie, Texas. Her family maintains traditions such as celebrating Día de los Muertos,
    cooking authentic Mexican dishes, and emphasizing close family ties. Fluent in both Spanish and English, she bridges cultural contexts at work and in her community, often acting as a conduit between
    Mexican‑American networks and broader business circles. The multicultural environment of the Dallas‑Fort Worth metroplex has reinforced her appreciation for diversity, community involvement, and the
    entrepreneurial spirit common among Mexican‑American families.
