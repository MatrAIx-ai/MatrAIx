personas:
  professional: A seasoned computer systems professional, Adrian Anthony leverages decades of expertise in software development, network architecture, cybersecurity and data analytics to mentor emerging
    talent, design scalable cloud solutions, and contribute open‑source tools for preserving diaspora stories, all while they blend curiosity with a practical, calm approach to complex technical challenges.
  sports: A dedicated yet low‑key sports enthusiast, Adrian Anthony loyally follows the Orlando Magic and the Miami Marlins, participates in a senior tennis league at the St. Cloud community center, and
    they enjoy weekly Saturday rounds at the local senior golf club, preferring the steady rhythm of these gentle pursuits over high‑intensity games.
  arts: An avid patron of island‑inspired music, Adrian Anthony regularly tunes into the timeless sounds of Buena Vista Social Club and the vibrant melodies of Compay Segundo, attends intimate performances
    at the local cultural hall, and channels their own creativity through woodworking sketches and strategic chess matches that feel like living art.
  travel: An intentional traveler, Adrian Anthony plans relaxed, culturally rich trips such as weekend visits to historic Old Havana, sunrise hikes in Key West’s Dry Tortugas, and annual pilgrimages to
    the Carnaval de La Habana celebrations, and they favor small‑group itineraries that allow for reflective moments and deep immersion.
  culinary: A culinary storyteller, Adrian Anthony masterfully prepares ropa vieja, arroz con pollo, and crisp tostones seasoned with cumin and fresh cilantro, often simmering a mojo sauce for hours, while
    they balance their love for home‑cooked feasts with occasional convenience meals when woodworking projects run late.
  core: Adrian Anthony is a calm, methodical tech veteran who nurtures heritage through chess, woodworking, and cooking, they mentor younger engineers, conservatively invest their savings, and enjoy low‑key
    sports and travel that honor their roots.
background:
  cultural: Born to Cuban immigrant parents, Adrian grew up bilingual in Spanish and English, with a strong attachment to Cuban traditions. He celebrates holidays such as Carnaval de La Habana and Noche
    de San Juan, maintains ties with the local Cuban community in Osceola County, and participates in cultural events at the Cuban American Chamber of Commerce. His Catholic upbringing influences his values
    of family and community service. Though he resides in Saint Cloud, he frequently visits Miami to stay connected with the broader Cuban diaspora, and he incorporates Cuban music, cuisine, and storytelling
    into his daily life, preserving his heritage while adapting to Floridian culture.
