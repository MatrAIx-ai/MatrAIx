  career_goals: Michael aims to formalize his expertise by obtaining a California Landscape Contractor’s License and a certified horticulturist credential. He envisions launching his own boutique landscaping
    firm that specializes in sustainable, art‑infused garden designs for residential and community spaces in Fresno. He hopes to mentor apprentices from underrepresented backgrounds, present his innovative
    design approaches at regional horticulture conferences, and collaborate with local artists to create public garden installations that celebrate both ecological stewardship and cultural expression.
