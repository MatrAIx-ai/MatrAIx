personas:
  professional: Reina Rivera, an organized biochemist‑turned‑cosmetologist, runs a data‑driven boutique salon in the Denver metro area where she blends scientific skin analysis with vibrant, culturally
    inspired styling, relying on meticulous scheduling, bilingual communication, and a calm yet energetic client experience.
  sports: Reina Rivera, an avid hiker and member of the Rocky Mountain Trail Club, follows a structured weekly routine that includes sunrise treks on the Flatirons, occasional Saturday runs with the Denver
    Road Runners, and cheering for the Broncos and Nuggets as part of her community‑spirit fitness ritual.
  arts: Reina Rivera, a sociable lover of salsa dancing and bilingual literature, draws creative inspiration from the rhythms of Celia Cruz, the storytelling of Sandra Cisneros, and the vibrant murals of
    Frida Kahlo, often weaving these influences into her salon’s aesthetic and personal styling.
  travel: Reina Rivera, a planner who prefers curated trips that blend adventure with cultural immersion, has trekked the ruins of Oaxaca, explored the coastal hikes of Vancouver, and dreams of a summer
    trek through Patagonia’s glaciers while balancing travel budgets with her boutique’s financial goals.
  culinary: Reina Rivera, a confident home chef, regularly prepares modern twists on classic dishes such as mole‑infused quinoa bowls, agave‑glazed salmon with roasted chiles, and chiles en nogada using
    fresh herbs and locally sourced heirloom tomatoes, while enjoying occasional indulgence in artisanal dark chocolate.
  core: Reina Rivera, a detail‑obsessive yet worry‑prone creative, channels her love of structure into a thriving beauty boutique, while secretly hoarding stray hairs on her desk as a quirky reminder of
    her craft.
background:
  cultural: Reina was raised in a Mexican‑American household where family gatherings, music, and culinary traditions were central to daily life. Celebrating holidays like Día de los Muertos and sharing
    stories in both Spanish and English reinforced a strong bicultural identity. These roots influence her aesthetic sensibility, inspiring her to incorporate vibrant colors, indigenous textures, and natural
    ingredients into her work. Living in Arvada, Colorado, she blends this heritage with the outdoorsy, health‑focused lifestyle of the region, creating a unique perspective that honors her Mexican lineage
    while embracing the diversity of her community.
attributes:
  skills: '["Hair styling", "Makeup application", "Advanced skin analysis", "Cosmetic chemistry knowledge", "Client consultation", "Bilingual communication (Spanish/English)", "Appointment scheduling",
