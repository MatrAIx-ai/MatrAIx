  hobbies: '["Salsa dancing", "Cooking traditional Mexican cuisine", "Hiking in the Rocky Mountains", "DIY natural beauty product formulation", "Yoga and mindfulness meditation", "Volunteering at community
    health fairs", "Bilingual book club", "Photography"]'
  career_goals: Reina aims to open her own boutique salon in the Denver metro area that integrates scientific skin care with personalized styling, emphasizing natural ingredients rooted in Mexican tradition.
    She plans to develop a small line of cruelty‑free beauty products that highlight agave‑derived actives, leveraging her biochemistry background. In the next five years, she hopes to become a certified
    educator, offering workshops on evidence‑based beauty practices and mentoring aspiring stylists from underrepresented communities. Ultimately, Reina envisions her brand as a trusted source of holistic
    personal appearance services that balance structure, creativity, and cultural authenticity.
