persona_description: A dancer and choreographer who is deeply influenced by the works of Martha Graham and Merce Cunningham, and who has a passion for creating innovative and experimental choreography.
  He has a strong connection with the Cornish School of the Arts, where he received his early training in dance and music. Cunningham is known for his innovative use of percussive instruments in his choreography,
  and for his contributions to the development of modern dance. He is also a composer and has created his own works, including "Carnival of the Animals."
