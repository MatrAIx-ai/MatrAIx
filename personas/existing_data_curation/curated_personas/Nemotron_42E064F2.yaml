personas:
  professional: Katherine Schenk is an aspiring junior developer who channels their love for structured puzzle-solving, LEGO construction, and piano practice into creating methodical Scratch projects and
    leading small coding-club sessions, demonstrating reliability and quiet assertiveness.
  sports: Katherine Schenk is a regular participant in their school’s badminton club and weekend family hikes in the nearby state park, while cheering for the Chicago Cubs in baseball and supporting the
    Seattle Seahawks during football season, preferring low-pressure, small-group activities that allow steady progress.
  arts: Katherine Schenk immerses themselves in the imaginative worlds of J.K. Rowling, Brandon Sanderson, and Neil Gaiman, practices piano pieces by Yiruma and Ludovico Einaudi, and enjoys the visual storytelling
    of Studio Ghibli films, which together shape their creative outlet and leisure.
  travel: Katherine Schenk enjoys meticulously planning family road trips to nearby natural spots like the Great Smoky Mountains and cultural stops such as Washington, D.C., while dreaming of a future solo
    visit to the Harry Potter Studio Tour in London and a summer adventure at Disneyland.
  culinary: Katherine Schenk bakes chocolate chip and oatmeal raisin cookies with precise measurements, cultivates fresh basil and mint in their herb garden for homemade pesto, and delights in assembling
    simple pasta dishes with olive oil, garlic, and Parmesan, showcasing a moderate cooking skill level and a penchant for sweet-savory balance.
  core: Katherine Schenk is a quietly organized teen who blends methodical curiosity with creative hobbies, turning puzzles, coding, and piano into a disciplined yet imaginative life, while occasionally
    over-indulging in late-night cookie baking.
background:
  cultural: Katherine comes from a white, middle‑class family in Hartford, Connecticut. Her ancestry includes English and Irish roots common to many New England families. She was raised with typical American
    traditions such as celebrating Thanksgiving with a family turkey dinner, observing holiday parades in Hartford, and attending a local Protestant church where community service is emphasized. Growing
    up in a diverse city, she values both her family’s heritage and the broader cultural mosaic of Hartford, which influences her respect for community involvement and public resources like the library.
