  career_goals: In the short term, Katherine aims to maintain a strong GPA, lead a small study group for math and science, and continue her volunteer work at the Hartford Public Library. She also plans
    to deepen her coding skills in her after‑school club. Long‑term, she envisions a career that blends structure with service to others, such as becoming a pediatric nurse, an elementary school teacher,
    or a librarian. She hopes to attend a competitive high school, earn a scholarship, and pursue a degree that prepares her for a stable, community‑focused profession.
