  hobbies: '[''Hiking in the Sierra foothills'', ''Wine tasting at nearby vineyards'', ''Participating in local community theater'', ''Cooking and hosting dinner parties'', ''Volunteering at the Penryn
    library'', ''Cycling on local trails'', ''Fitness classes (Yoga, Zumba)'', ''Gardening'', ''Reading contemporary fiction'', ''Organizing neighborhood potlucks'']'
  career_goals: Karon aims to move from front‑line supervisor to store manager within the next two years, using her strong operational record to demonstrate readiness for broader responsibility. She plans
    to complete a bachelor's degree in business management part‑time, positioning herself for a future district‑manager role where she can influence multiple locations. In parallel, she seeks professional
    certification in retail management (e.g., the Retail Management Professional credential) and wants to lead a company‑wide initiative to integrate omni‑channel sales data, improving inventory turnover
    and customer experience. Ultimately, she envisions a career that blends hands‑on store leadership with strategic planning, while maintaining a healthy work‑life balance for her family.
