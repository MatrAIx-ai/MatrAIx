personas:
  professional: Juana Dominguez, a retired data analyst and statistical modeler, now volunteers as a data consultant for nonprofit health projects while designing a bilingual STEM mentorship program, using
    their graduate STEM background, bilingual fluency, and a balance of meticulous planning and flexible problem‑solving to bridge technical rigor with community outreach.
  sports: Juana Dominguez, a devoted fan of the Houston Astros and Houston Dynamo, spends mornings jogging along the Buffalo Bayou Trail with a local senior walking club, joins a winter yoga class for flexibility,
    and participates in a community pickleball league for light competition, balancing social interaction with solitary exercise.
  arts: Juana Dominguez channels their love of cultural expression by performing folkloric dance steps with a neighborhood troupe, crocheting intricate textiles inspired by traditional patterns while listening
    to the soulful music of Lila Downs, and attending museum exhibits featuring the works of Frida Kahlo and Diego Rivera, weaving artistic appreciation into community service.
  travel: Juana Dominguez prefers carefully planned weekend road trips, having explored Hill Country towns like Fredericksburg and Wimberley, and now dreams of a culinary pilgrimage to Oaxaca, balancing
    adventure with budget constraints and a desire for cultural immersion.
  culinary: Juana Dominguez, an avid home gardener, cultivates fresh cilantro, jalapeños, and epazote to reinvent classic pozole verde and chicken enchiladas with quinoa, experimenting with mole sauce enriched
    by dark chocolate and cocoa nibs, while sharing meals at book club gatherings and community potlucks.
  core: Juana Dominguez blends a lifelong love of data, gardening, and folkloric dance into a pragmatic curiosity, yet often loses track of time while crocheting, leading to missed tea appointments and
    occasional late‑night coffee binges.
background:
  cultural: Juana is a first‑generation Mexican‑American whose parents emigrated from Jalisco in the 1940s. Growing up in Houston’s vibrant East End, she was immersed in a bilingual household where Spanish
    was spoken at home and English at school. Family gatherings centered around shared meals, traditional music, and celebrations of Día de los Muertos and Las Posadas, reinforcing a deep sense of cultural
    identity. Her Catholic upbringing fostered values of community service and humility. Over the decades, Juana has blended her Mexican roots with Texan influences, maintaining strong ties to the local
    Hispanic community through church activities, neighborhood festivals, and mentorship of younger Mexican‑American families. This cultural heritage informs her approach to life, emphasizing relational
    harmony, respect for elders, and the transmission of traditions across generations.
