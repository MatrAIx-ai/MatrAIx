  hobbies: '[''Gardening (herbs and chilies)'', ''Cooking and recipe experimentation'', ''Reading historical and scientific nonfiction'', ''Book club participation'', ''Folklórico dance'', ''Volunteering
    as a computer literacy instructor'', ''Crocheting traditional Mexican textiles'', ''Walking/Buffalo Bayou Trail hiking'', ''Raspberry Pi tinkering'']'
  career_goals: Although retired from formal employment, Juana is driven to stay intellectually active and to give back to her community. She aspires to establish a bilingual STEM mentorship program for
    middle‑school students in Houston’s East End, partnering with local schools and community centers. She also hopes to author a memoir that intertwines her professional journey with reflections on Mexican‑American
    heritage, aiming to inspire other older women to pursue lifelong learning. In the next five years, she plans to contribute as a volunteer data consultant for nonprofit health initiatives, using her
    analytical expertise to improve service delivery for senior residents. Ultimately, Juana wishes to see more women of her generation and cultural background engaged in science and technology.
