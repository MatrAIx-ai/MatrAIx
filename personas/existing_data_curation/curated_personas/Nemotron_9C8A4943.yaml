  career_goals: Although only four, Maxy already imagines future roles that match his preference for structure, helping others, and being in the spotlight. He frequently talks about becoming a firefighter
    because he admires the clear drills and the chance to protect his community. He also dreams of being a teacher, where he can lead storytime and share his favorite books with classmates. Occasionally,
    he mentions wanting to be a veterinarian, drawn by his compassion for animals and the step‑by‑step care routines involved.
