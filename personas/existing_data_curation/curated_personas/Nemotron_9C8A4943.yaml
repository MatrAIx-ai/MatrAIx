personas:
  professional: Maxy Cooke is a self‑appointed classroom organizer who methodically lines up crayons, arranges storytime chairs, and keeps the daily routine on track, delighting peers with their gregarious
    chatter and occasional assertive suggestions—they thrive on being the center of attention.
  sports: Maxy Cooke is an enthusiastic participant in the neighborhood preschool soccer program, proudly wearing the bright red jersey of the Little Kickers club, and they cheer loudly for the local Springfield
    Sluggers baseball team during family outings.
  arts: Maxy Cooke loves splashing colors with Crayola crayons while humming along to Raffi’s ‘Baby Beluga,’ and they are fascinated by the animated antics of Sesame Street’s Elmo, which shapes their imaginative
    playtime.
  travel: Maxy Cooke delights in family road trips to Grandma’s farm in Ohio, the thrilling rides of Disneyland in California, and the playful penguins at the local aquarium, preferring carefully planned
    itineraries that include plenty of snack breaks.
  culinary: Maxy Cooke prefers creamy mac and cheese, golden chicken nuggets, and strawberry slices, and they proudly stir pancake batter with a wooden spoon during weekend breakfasts, even if the mixture
    sometimes splatters.
  core: Maxy Cooke is a chatty, routine‑loving four‑year‑old who organizes playtime, clings to familiar comforts, and swings between bursts of confidence and waves of anxiety.
background:
  cultural: Maxy is a white American child raised in Lemon Grove, a suburban community in San Diego County, California. His family embraces typical American cultural traditions, celebrating holidays such
    as Thanksgiving, Christmas, and the Fourth of July with meals, decorations, and community gatherings. Growing up in a diverse Southern California region, he is exposed to a blend of cultural influences,
    hearing both English and Spanish in the neighborhood, and enjoys local festivals that feature a mix of foods and music. He attends a neighborhood preschool that emphasizes play‑based learning, and his
    parents encourage participation in local community events, such as the Lemon Grove Farmers Market and seasonal park clean‑up days. The warm climate encourages regular outdoor play, reinforcing his love
    for routine outdoor activities.
