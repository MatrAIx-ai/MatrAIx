persona_description: A Louisiana emergency preparedness official responsible for managing and coordinating the response to natural disasters, particularly those related to water quality and public health.
  This official is highly trained and experienced in emergency management, water quality monitoring, and public health preparedness. They have extensive knowledge of the Mississippi River system and its
  surrounding areas, as well as the impact of drought and saltwater intrusion on public health. They are responsible for issuing advisories and warnings to residents and businesses, and for coordinating
  with other agencies to ensure the safety and well-being of the community. They are also responsible for developing and implementing emergency response plans and protocols to address potential public health
  risks associated with saltwater intrusion.
