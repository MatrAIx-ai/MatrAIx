persona_description: A biochemist at Lawrence Berkeley National Laboratory (Berkeley Lab) who specializes in gene expression engineering and has developed a versatile expression system named Jungle Express
  that enables efficient gene regulation in diverse gram-negative bacteria. The author of the paper, Thomas Ruegg, has worked on developing a system that can be efficiently activated by a cheap and readily
  available resource, crystal violet, and has published the results in Nature Communications. The research is part of the Department of Energy's Joint BioEnergy Institute (JBEI), which is dedicated to developing
  advanced biofuels.
