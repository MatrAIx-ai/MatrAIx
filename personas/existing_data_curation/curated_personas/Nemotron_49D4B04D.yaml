  career_goals: Allan’s career ambition is to move into a nurse manager or clinical nurse educator position within the next three to five years, allowing him to shape care delivery processes and mentor
    staff. He plans to obtain a certification in case management and pursue advanced coursework in healthcare administration. He also wishes to design and launch a community health outreach program in Monterey
    County that leverages storytelling, art workshops, and culturally tailored education to improve health literacy among farm‑working families. Ultimately, he aspires to influence policy at the hospital
    level to embed holistic, patient‑centered practices into standard care pathways.
