  hobbies: '[''Gardening (roses, lavender, vegetables)'', ''Hiking and birdwatching on local trails'', ''Quilting and craft circles'', ''Volunteering at the senior center'', ''Reading mystery novels'',
    ''Cooking family recipes (Polish cuisine)'', ''Attending community theater'', ''Singing in the church choir'']'
  career_goals: Nan aims to transition into a supervisory role where she can mentor newer staff and oversee office operations. She plans to earn a Certified Administrative Professional (CAP) credential
    and possibly complete a bachelor's degree in Business Administration through a local community college. Her long‑term ambition is to become an office manager for a nonprofit serving seniors, allowing
    her to combine her administrative expertise with her passion for community service. She also hopes to develop a small volunteer‑training program that equips senior citizens with basic computer skills.
