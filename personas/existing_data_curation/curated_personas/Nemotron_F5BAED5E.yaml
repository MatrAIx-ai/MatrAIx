  hobbies: '["Salsa and cumbia dancing","Cooking Mexican cuisine","Attending Cinco de Mayo and Dia de los Muertos festivals","Playing recreational soccer","Group fitness (Zumba)","Volunteering at church
    food pantry","Reading retail and business blogs","Listening to business podcasts","DIY home-decor projects"]'
  career_goals: Sandra aims to advance from first-line supervisor to store manager within the next two years, positioning herself for a future role as district manager. She plans to earn her GED and enroll
    in a community-college associate program in Business Administration, followed by a Retail Management Professional certification. Her ambition is to increase her store's year-over-year sales by at least
    15% through data-driven merchandising, improved staff performance, and the integration of omni-channel sales tools. She also hopes to mentor junior associates, champion a leadership development pipeline
    within her company, and eventually open a boutique that blends modern retail concepts with Mexican-inspired product lines.
