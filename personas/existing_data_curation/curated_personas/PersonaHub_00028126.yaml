persona_description: A healthcare professional who specializes in retinal imaging, particularly using Optical Coherence Tomography (OCT) to diagnose macular degeneration, macular holes, epi-retinal membrane,
  and glaucoma. They have a keen eye for detail and are skilled in interpreting OCT images to identify changes in the retina and optic nerve that may indicate glaucoma. They are also adept at using the
  inbuilt eye tracker in the Heidelberg OCT to compare images from year to year to detect any reduction in nerve fibre layer thickness, allowing for earlier identification of glaucoma.
