  hobbies: '[''Hiking and trail photography'', ''Chinese calligraphy and brush painting'', ''Culinary experimentation with Cantonese & Korean dishes'', ''Gardening (native wildflowers & herbs)'', ''Visiting
    galleries and museums'', ''Curating personal photo essays'', ''Mentoring young artists'', ''Reading art history and philosophy'', ''Attending live music performances'', ''Board games and chess'']'
  career_goals: Although retired from formal employment, Pyong remains driven by a desire to share his cultural heritage and artistic passions. He aims to launch a community cultural hub in Boulder that
    presents rotating exhibitions of East Asian art and serves as a workshop space for local makers. He hopes to develop a mentorship program pairing senior artists with at‑risk youth interested in visual
    arts and crafts. He plans to complete a certificate in art history and museum studies at the local community college, enhancing his docent role. He also aspires to write and self‑publish a memoir tracing
    his family’s migration from Guangdong and Jeollabuk‑do to the United States, preserving stories for future generations. Over the next few years, he looks forward to traveling with his wife to China
    and Korea to deepen his culinary and artistic practice, then sharing those experiences through public talks and cooking demonstrations.
