personas:
  professional: Pyong Chang, a retired furniture restorer and seasoned museum docent, blends meticulous restoration expertise with a curatorial eye, channeling their curiosity and balanced reliability into
    mentoring emerging artists and planning a community cultural hub.
  sports: Pyong Chang, an avid hiker who traverses the Flatirons each weekend with the Boulder Hiking Club, they occasionally join local cross‑country ski outings in winter, follow the Denver Broncos and
    Colorado Rockies, enjoy casual tennis at the Boulder Community Center, and balance a love for outdoor endurance with a relaxed approach to fitness.
  arts: Pyong Chang, a dedicated calligrapher and watercolor painter who volunteers as a docent at the Boulder Museum of Contemporary Art, draws inspiration from artists like Georgia O'Keeffe, Mark Rothko,
    and musician Joni Mitchell, and they infuse their modern compositions with brush calligraphy techniques and traditional folk motifs while mentoring emerging creators.
  travel: Pyong Chang, a thoughtful traveler who prefers meticulously planned itineraries blending cultural immersion with scenic hikes, has visited the historic streets of Guangzhou, the bustling markets
    of Seoul, and the vineyards of Tuscany, and they dream of future trips to Portugal’s Algarve cliffs and Patagonia’s national parks, always budgeting travel costs within their retirement fund.
  culinary: Pyong Chang, an enthusiastic home chef who regularly prepares steam‑filled dim sum, sizzling bibimbap with gochujang, and garden‑fresh herb salads featuring sage, oregano, and lemon thyme, balances
    meticulous technique with spontaneous flavor experiments, and they host occasional dinner evenings where friends sample his handcrafted dumplings and fermented sauces.
  core: Pyong Chang merges meticulous craftsmanship, artistic curiosity, and community spirit, all while they juggle a penchant for spontaneous spice experiments and an occasional habit of over‑watering
    garden herbs.
background:
  cultural: Pyong was born in the United States to parents who met as students in the 1970s. His father, Ming Chang, hailed from Guangdong, China, and his mother, Pyong Lee, came from the Jeolla region
    of South Korea. Raised in a bilingual household, he grew up speaking Mandarin and Korean and was steeped in both Cantonese culinary traditions and Korean cultural customs. Family gatherings centered
    around elaborate meals, Lunar New Year celebrations, and the Korean harvest festival of Chuseok. He attended Saturday Chinese school where he learned calligraphy, and participated in Korean drum classes,
    fostering a deep respect for both heritage cultures. After moving to Boulder in his thirties, he blended his East Asian roots with the outdoors‑oriented, progressive culture of Colorado, participating
    in multicultural events and serving as a cultural bridge within the local community.
attributes:
  skills: '[''Culinary arts (Cantonese & Korean cuisine)'', ''East Asian calligraphy and brush painting'', ''Woodworking and furniture restoration'', ''Art curation and museum guiding'', ''Gardening (native
