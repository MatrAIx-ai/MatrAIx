personas:
  professional: Tonya Nettles, a seasoned personal care aide with a meticulous eye for detail, leverages her methodical training and rigorous documentation skills to deliver reliable, structured care while
    mentoring new staff and pursuing CNA certification for a future supervisory role.
  sports: Tonya Nettles channels their competitive streak into regular walks with the Potomac River Trail senior walking club and a weekly low‑impact yoga class at the community center, while quietly cheering
    for the Washington Capitals during hockey season and the Washington Wizards during basketball, though they rarely attend games in person.
  arts: Tonya Nettles weaves intricate sweaters while listening to the serene cello recordings of Yo‑Yo Ma, solves crosswords in the style of the New York Times, and finds inspiration in the realist paintings
    of Andrew Wyeth and the historical biographies of Doris Kearns Goodwin, making the arts a quiet but vital thread of their daily routine.
  travel: Tonya Nettles prefers low‑stress, historically focused travel, planning meticulous day‑by‑day itineraries for weekend trips to colonial Williamsburg and the historic streets of Boston, while dreaming
    of a guided pilgrimage to Bath, England, and a leisurely river cruise along the Danube.
  culinary: Tonya Nettles delights in preparing garden‑fresh roasted carrots with thyme, heirloom tomato gazpacho, and a classic chicken pot pie, boasting a competent home‑cook level that blends their love
    of seasonal produce—like kale, zucchini, and sweet potatoes—with occasional indulgent treats such as buttery cinnamon rolls baked with premium local butter.
  core: Tonya Nettles blends a methodical, competitive drive with a quiet love for structured solitary pursuits, turning meticulous care work, garden calendars, and detailed knitting patterns into a steady
    rhythm that balances relentless self‑scrutiny with comforting routines.
background:
  cultural: Tonya grew up in a traditional white, Anglo‑American family in western Maryland, with deep roots in the Appalachian‑rim community of Hagerstown. Her ancestry includes German and Irish lineage,
    and she was raised in a modest Methodist household that emphasized self‑reliance, hard work, and community service. The regional culture—characterized by county fairs, farmers' markets, and close‑knit
    church gatherings—instilled in her a practical, no‑nonsense outlook and a respect for routine. Although she never married, her upbringing fostered a strong sense of independence and a value for personal
    responsibility, which is reflected in her organized approach to both work and life. Tonya’s cultural experience blends mid‑Atlantic sensibilities with a touch of Appalachian craftsmanship, shaping her
    preference for structured activities, small‑group interactions, and a steadfast commitment to serving her local community.
attributes:
  skills: '[''Comprehensive personal care (bathing, grooming, dressing)'', ''Medication reminder and administration coordination'', ''Detailed care documentation and HIPAA compliance'', ''Scheduling and
    time‑management for multiple client visits'', ''Operation of assistive devices (wheelchairs, lifts, restraints)'', ''Basic first aid and CPR certification'', ''Falls risk assessment and prevention'',
    ''Nutrition planning and meal preparation'', ''Training and mentorship of new aides'', ''Quality control and audit of care plans'']'
  hobbies: '[''Vegetable gardening with seasonal planting schedule'', ''Knitting complex patterns'', ''Crossword and Sudoku puzzles'', ''Birdwatching with field journal'', ''Reading historical biographies'',
    ''Attending small local history society meetings'', ''Walking the Potomac River trail'', ''One‑on‑one volunteering at senior center'']'
  career_goals: Tonya aims to formalize her expertise by obtaining a Certified Nursing Assistant (CNA) credential and eventually an associate degree in health administration, positioning herself for a supervisory
    role such as Home Health Aide Team Lead or Care Coordinator. She is driven by a competitive desire to be recognized for her high standards of care, hoping to earn a facility‑wide award for excellence
    in client safety. Balancing her ambition with her sensitivity to stress, Tonya also seeks a more predictable, fixed‑hour schedule that will allow her to manage worry while preparing for a gradual transition
    toward semi‑retirement. In the longer term, she envisions mentoring younger aides and possibly establishing a small, community‑focused care agency that reflects her structured, client‑first philosophy.
