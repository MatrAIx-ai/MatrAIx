  career_goals: Ashley hopes to turn her love of imagination into a career that lets her create worlds for other kids. She dreams of becoming a children's book author and illustrator, an animator for video
    games, or a concept artist for movies. She also expresses interest in designing interactive experiences that combine storytelling with technology, such as educational apps or simple games. Over the
    next few years she wants to develop her artistic skills, explore more coding tools, and participate in school art clubs to build a portfolio that could guide her future studies.
