personas:
  professional: An aspiring visual storyteller, Ashley Preston channels their vivid imagination into drawing fantastical creatures, sketching scenes from favorite books, and crafting mixed-media pieces
    in community art class, while their relaxed attitude toward obligations and love of flexibility let them experiment freely without being restrained by rigid structure.
  sports: Ashley Preston’s athletic interests lean toward outdoor exploration, like hiking the woods around Big Rapids and swimming in the nearby lake, with occasional participation in the Big Rapids Youth
    Soccer Club’s spring league, while they root for the Ferris State Bulldogs football team and cheer on the Detroit Tigers during summer baseball.
  arts: Ashley Preston’s artistic life bursts with drawing fantastical creatures inspired by Studio Ghibli’s Spirited Away, sketching scenes reminiscent of J.K. Rowling’s Hogwarts, listening to piano works
    by Yiruma while humming Taylor Swift’s Cardigan, and attending the local library’s monthly community theater performance of The Little Mermaid.
  travel: Ashley Preston prefers spur-of-the-moment family road trips, having explored Michigan’s Mackinac Island and the sand dunes of Sleeping Bear, while dreaming of a future visit to Paris’s Musée d’Orsay
    to see Monet’s water lilies and to Tokyo’s Akihabara for a hands-on anime art workshop.
  culinary: Ashley Preston loves crafting colorful snack plates with sliced apples, cheese cubes, and gummy-worm creatures, enjoys pizza topped with pineapple and jalapeños, and occasionally helps their
    parent bake cinnamon-sugar pretzels and blueberry muffins, though they often forget to wash their hands before cooking.
  core: Ashley Preston is an imaginative 11-year-old who blends art, storytelling, and LEGO engineering into daily adventures, yet frequently misplaces their sketchbooks and forgets homework in favor of
    creative projects.
background:
  cultural: Ashley comes from a white, Midwestern family living in Big Rapids, Michigan. Her upbringing reflects the values of a close‑knit small‑town community, where school events, local festivals, and
    outdoor activities are central. Her family celebrates seasonal traditions such as pumpkin carving in the fall, holiday crafts, and summer trips to nearby lakes. The region's natural surroundings—forests,
    rivers, and open fields—have fostered her appreciation for nature and exploration. While her cultural background is rooted in typical American Midwestern life, her parents encourage creative expression
    and support her involvement in community art programs and school clubs.
