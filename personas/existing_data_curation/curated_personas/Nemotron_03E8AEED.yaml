  hobbies: '[''LEGO building and robotics'', ''Minecraft and strategy video games'', ''Basketball'', ''Science-fiction reading'', ''Snap-circuit electronics tinkering'', ''Cycling along the waterfront'',
    ''Swimming at the harbor'', ''Baseball card collecting'', ''Tech podcasts listening'']'
  career_goals: Justin’s long‑term ambition is to become a robotics engineer or software developer who creates devices that solve everyday problems. In the near future, he aims to win his middle‑school
    science fair with a functional robot that can assist with simple household tasks, and he hopes to earn a scholarship to a STEM‑focused high school. He also dreams of designing his own video games and
    eventually opening a community makerspace where peers can collaborate on tech projects. His competitive streak drives him to seek leadership roles in school tech clubs and to pursue advanced coding
    courses in high school.
