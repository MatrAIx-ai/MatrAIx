personas:
  professional: An aspiring robotics tinkerer, Justin Roberson channels their boundless curiosity and practical mindset into designing LEGO constructions equipped with motors and sensors, showcasing early
    engineering prowess while they competitively refine strategies learned from video games like Minecraft and StarCraft.
  sports: On the court, Justin Roberson devotes weekend hours to shooting hoops with friends at the Long Island Hoops Youth Club, idolizes the New York Knicks and mimics their fast‑break strategies, while
    also swimming with the Long Island Sound Swim Team in the summer and cheering on the New York Yankees during baseball season, a routine they approach with a competitive edge by tracking personal stats.
  arts: Between building LEGO robots, Justin Roberson dives into the worlds of sci‑fi author Neal Stephenson, graphic novels like 'Saga' by Brian K. Vaughan, and tunes into the Lex Fridman Podcast, letting
    the imaginative storytelling and cutting‑edge tech discussions color their creative designs and sparking new invention ideas, which they eagerly share with friends.
  travel: Justin Roberson favors spontaneous day‑trips, having biked the Long Island waterfront and explored the museums of Boston and New York City, while dreaming of a future adventure to Tokyo's Akihabara
    district to hunt for rare LEGO sets and tech gadgets, balancing a limited family budget with an appetite for high‑tech cultural immersion, and they often map out itineraries using a simple spreadsheet.
  culinary: When it comes to food, Justin Roberson prefers pepperoni pizza, cheesy macaroni, and sushi rolls with avocado, can confidently whip up a batch of chocolate‑chip oatmeal cookies using a simple
    kitchen timer, but they often forget to clean the dishes, reflecting a laid‑back yet enthusiastic approach to cooking and a habit of leaving kitchen messes for later.
  core: Justin Roberson, an endlessly curious 11‑year‑old, blends LEGO engineering, strategic gaming, and basketball competition while they juggle a chaotic schedule, impulsive spending on hobby kits, occasional
    allergy flare‑ups, and a habit of leaving half‑finished projects on the table.
background:
  cultural: 'Justin grows up in Port Washington, a suburban community on Long Island with a predominantly white, middle‑class population. His family’s roots trace back to Northern European ancestry, and
    they embody typical suburban American values: emphasis on education, involvement in community sports leagues, and participation in summer camps. The coastal setting offers regular exposure to maritime
    activities and outdoor recreation, while proximity to New York City brings a blend of mainstream media, tech culture, and diverse cultural experiences. This environment shapes his practical outlook,
    curiosity about technology, and appreciation for both traditional community life and modern digital influences.'
attributes:
  skills: '[''Scratch programming'', ''LEGO robotics building'', ''Strategic board games (chess)'', ''Basic woodworking'', ''Snap circuits electronics'', ''Basketball fundamentals'', ''Mathematics problem
