  hobbies: '[''Acrylic painting'', ''Photography'', ''Visiting art galleries'', ''Cooking experimental cuisines'', ''Yoga'', ''Hiking'', ''Community garden volunteering'', ''Book‑club participation'', ''Board‑game
    nights'', ''Reading popular science and speculative fiction'']'
  career_goals: After a period dedicated to family and community involvement, Vicky plans to re‑enter the workforce in a role that unites her analytical background with her passion for art, education, and
    social impact. She intends to complete a certificate in science communication, leverage her project‑management experience, and pursue a position as a program manager for a museum or a nonprofit that
    designs STEM‑arts outreach programs for youth. Long‑term, she aspires to launch her own community‑center initiative that integrates coding workshops, maker‑space activities, and visual‑arts projects
    while maintaining a balanced life that supports her family.
