persona_description: A geotechnical engineer who specializes in the use of numerical methods to aid in the design and analysis of geotechnical and engineering geological problems. He/she is familiar with
  the advantages and disadvantages of analytical methods and the application of finite element methods to geotechnical and engineering geological problems. The geotechnical engineer has experience with
  commercial software and material models commonly used in FE modelling of geotechnical problems. He/she is knowledgeable in the use of rock mechanical methods for modelling fractured rocks. The geotechnical
  engineer has experience in studying the transport mechanism of pollutants in subsurface areas and understanding the conditions that influence their dispersion. He/she is knowledgeable in the legal regulation
  of environmental geological surveys and the geological constraints of environmental impact assessment of existing and planned engineering structures. The geotechnical engineer has experience in studying
  remediation techniques and the removal of pollutants from the geological environment. He/she has a special focus on mining-related pollution and site remediation. The geotechnical engineer is knowledgeable
  in waste disposal and pollution control. The geotechnical engineer is involved in exercise classes that help students learn environmental geological practice that helps in the sustainable operation and
  design of engineering structures. The geotechnical engineer provides perspectives on environmental pollution reduction and in cost-effective mitigation of polluted sites. The geotechnical engineer specializes
  in the use of EC7 and geotechnical categorization, types and contents of geotechnical documentations, and the structural design of piles for different loading types. He/she is knowledgeable in the use
  of commercial software and material models commonly used in FE modelling of geotechnical problems.
