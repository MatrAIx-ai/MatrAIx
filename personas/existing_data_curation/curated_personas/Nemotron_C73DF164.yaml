personas:
  professional: Gang Yang, a 26‑year‑old administrative support specialist, leverages their fluency in Mandarin and English, meticulous Excel reporting, and proactive curiosity to streamline office workflows
    while confidently bridging cultural communication gaps and positioning themselves for an office manager role.
  sports: Gang Yang, an avid participant in the Charlotte Badminton Club and a regular at weekend pick‑up basketball games, ardently supports the Charlotte Hornets and follows Charlotte FC, blending competitive
    play with a social, team‑oriented fitness philosophy.
  arts: Gang Yang captures the multicultural buzz of Charlotte through street and food photography inspired by the vivid storytelling of Brandon Stanton and the cinematic palette of Hayao Miyazaki, while
    their playlists range from Jay Chou to Billie Eilish and they regularly attend performances by the Charlotte Symphony and local indie bands.
  travel: Gang Yang plans travel with a mix of spontaneous weekend getaways to cities like New Orleans and Barcelona and longer cultural trips to Taipei and Tokyo, prioritizing culinary experiences and
    local festivals while balancing a modest budget and occasional family commitments.
  culinary: Gang Yang, an intermediate home chef with a passion for fusion cuisine, frequently crafts dishes like mapo tofu tacos, kimchi fried rice, and char siu pork buns using shiitake mushrooms, gochujang,
    and sriracha, while also indulging in Charlotte’s food‑truck scene and occasional late‑night ramen runs.
  core: Gang Yang, a 26‑year‑old sociable organizer, balances meticulous office efficiency with a restless curiosity for tech, photography, and cooking, though they sometimes stay up late binge‑watching
    cooking shows instead of sleeping.
background:
  cultural: Gang was born to parents who emigrated from Taiwan in the late 1990s. Growing up in a bilingual household in Charlotte, he was raised with a blend of traditional East Asian values—emphasis on
    education, family cohesion, and respect for elders—and the more individualistic, community‑oriented culture of the American South. He celebrates Lunar New Year with his family, partakes in moon‑cake
    making, and actively participates in local Asian cultural organizations. His Mandarin proficiency and understanding of cultural customs enable him to act as a bridge between his community and broader
    Charlotte society, especially during multicultural events and at his workplace where he often assists in translating materials or facilitating cross‑cultural communication.
attributes:
