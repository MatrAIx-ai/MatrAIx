  hobbies: '["Badminton", "Basketball pick-up games", "Exploring Charlotte’s food scene", "Cooking Asian-fusion dishes", "Street and food photography", "Attending cultural festivals (e.g., Charlotte Asian
    Festival)", "Volunteering for Mandarin tutoring programs", "Learning basic programming (Python)", "Yoga", "Board game nights with friends"]'
  career_goals: He aims to transition from a support role to an office manager or operations coordinator within the next three to five years. To achieve this, he plans to complete a bachelor’s degree in
    Business Administration, earn the Certified Administrative Professional (CAP) credential, and acquire a Project Management Professional (PMP) certification. He is motivated to lead a diverse administrative
    team, streamline processes using data‑driven solutions, and serve as a cultural liaison for the growing Asian‑American workforce in Charlotte. Long‑term, he envisions moving into a senior operations
    or human‑resources leadership role where he can shape organizational policies and mentor new staff.
