  hobbies: '[''Reading non‑fiction (history, urban planning, African‑American literature)'', ''Jazz and blues music'', ''Pickup basketball'', ''Cycling the lakefront trail'', ''Fishing on Lake Michigan'',
    ''Woodworking'', ''DIY home‑improvement projects'', ''Cooking soul food for family'', ''Attending theater and art exhibits'', ''Strategy board games (chess, Settlers of Catan)'', ''Volunteering with
    Habitat for Humanity'', ''Mentoring youth in construction trades'']'
  career_goals: Ronnie aims to advance to a senior executive role such as Director of Construction or VP of Operations, overseeing large‑scale mixed‑use developments in the Midwest. He wants to become a
    recognized advocate for sustainable building practices, obtaining LEED certification expertise and integrating innovative technologies like modular construction and smart building systems. Long‑term,
    he envisions founding his own construction consulting firm that mentors emerging Black professionals and partners with community development projects to revitalize Chicago neighborhoods. He also hopes
    to increase representation of Black leaders in the construction industry through speaking engagements and industry panels.
