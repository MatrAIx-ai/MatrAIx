personas:
  professional: Ronnie Boyd, a seasoned construction manager who leverages Procore and Primavera to orchestrate complex mixed‑use projects across Chicago, balances a practical, detail‑oriented schedule
    with a relaxed, sometimes disorganized office style, while their competitive drive and emotional stability keep crews motivated and deadlines met.
  sports: Ronnie Boyd, a devoted Chicagoan, joins weekday pickup basketball at a local park, cycles the lakefront trail every weekend, fishes on Lake Michigan during early mornings, and proudly roots for
    the Chicago Bulls, Bears, and Cubs while holding memberships in the Chicago Cycling Club and the Lake Michigan Anglers Association.
  arts: Ronnie Boyd immerses in the city’s cultural scene, regularly attending live jazz shows featuring Wynton Marsalis and blues legend Buddy Guy, frequenting the Steppenwolf Theatre for productions starring
    Frances McDormand, and curating road‑trip playlists that weave together classic Miles Davis solos with modern R&B, letting music and theater shape evening relaxation.
  travel: Ronnie Boyd balances family obligations and a moderate budget by planning cost‑effective road trips—such as weekend fishing excursions on Lake Michigan and historic tours of Detroit’s industrial
    districts—while dreaming of a longer cultural immersion in New Orleans’ French Quarter and a future sailing vacation in the Caribbean once his consulting firm stabilizes.
  culinary: Ronnie Boyd enjoys cooking soulful meals, often preparing dishes like chicken and waffles, shrimp étouffée, and collard greens seasoned with smoked paprika, mastering a moderate level of culinary
    skill that blends traditional Midwestern comfort food with Southern‑inspired flavors, while also savoring Chicago’s deep‑dish pizza and frequently sourcing fresh fish from Lake Michigan for grilled
    preparations.
  core: Ronnie Boyd is a competitively driven, slightly disorganized construction veteran who balances gritty hands‑on projects, jazz‑filled evenings, and a relentless curiosity for sustainable building,
    all while occasionally letting work chaos spill into personal routines.
background:
  cultural: Ronnie is a Black Chicago native whose upbringing was shaped by the vibrant African‑American communities of the South Side. Family gatherings centered around soulful meals, gospel music, and
    stories of civil‑rights activism, fostering a deep sense of community and cultural pride. He grew up attending local churches, celebrating events like the Chicago Blues Festival, and participating in
    neighborhood block parties. His bachelor's degree in humanities deepened his appreciation for the African diaspora, Black literature, and social history, which he brings into his leadership style and
    community involvement. Ronnie’s cultural identity influences his commitment to mentoring the next generation of Black construction professionals and his dedication to improving the built environment
    of Chicago’s historic neighborhoods.
