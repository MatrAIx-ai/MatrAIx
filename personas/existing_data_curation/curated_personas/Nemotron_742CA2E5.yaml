  career_goals: Kendrah’s primary career ambition is to secure reliable, flexible part‑time housekeeping work that supports her independence while allowing time for community involvement. She hopes to eventually
    launch a small, eco‑friendly cleaning side business serving neighbors and local businesses, and to mentor younger cleaners. In the longer term, she envisions dedicating more hours to volunteer coordination
    at the senior center, using her organizational skills to enrich local programs.
