persona_description: A student who attended the CORE Interracial Action Institute (MIAI) in Miami, Florida in 1959. The student was a participant in the sit-ins at Jackson’s-Byron’s and Grant’s Department
  Stores, and later in the Tallahassee sit-ins of 1960. The student's involvement in the sit-ins helped them gain valuable experience and skills in nonviolent direct-action, which they later applied in
  their work with the civil rights movement. The student's unique perspective on the impact of the MIAI on the civil rights movement is likely to be of interest to historians and scholars of the civil rights
  era.
