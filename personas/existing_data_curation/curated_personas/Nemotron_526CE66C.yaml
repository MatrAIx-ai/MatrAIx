  career_goals: Christopher aims to turn his creative and organizational abilities into a sustainable remote freelance career. He plans to develop a professional portfolio website showcasing his illustration,
    branding, and design work, and to obtain an Adobe Certified Associate credential to strengthen his marketability. Over the next two years he hopes to complete an associate degree or industry‑recognized
    certificate in visual communications through online coursework, while gradually acquiring paid clients for logo and marketing material design. Long‑term, he envisions establishing a small home‑based
    studio that produces custom artwork and nature‑inspired branding for local businesses, allowing him a flexible schedule that supports his mental‑health needs and preference for solitary work environments.
