  hobbies: '[''drawing and painting'', ''reading picture books'', ''crafting (friendship bracelets, collage)'', ''Lego building'', ''small-group board games'', ''nature walks and collecting natural items'',
    ''participating in community art workshops'', ''simple kitchen science experiments'', ''educational tablet games'']'
  career_goals: Although still young, Sara often talks about growing up to be an artist who can bring stories to life through illustrations, or a teacher who encourages curiosity and kindness in a classroom.
    She also expresses a love for animals and imagines becoming a veterinarian who cares for pets. Her ambitions are guided by her appreciation for art, her desire to help others, and her curiosity about
    the natural world.
