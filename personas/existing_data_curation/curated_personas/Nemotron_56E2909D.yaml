personas:
  professional: A budding engineering enthusiast who constructs intricate LEGO mechanisms, codes simple games in Scratch, and applies a methodical, competitive mindset to problem solving, James Warning
    shows early signs of a future mechanical engineer who values structure and precision.
  sports: An organized basketball player who competes in the local junior league, follows the NBA's Los Angeles Lakers, and participates in summer track and field events, James Warning balances a competitive
    drive with structured practice sessions and holds a membership at the community youth sports club.
  arts: A creative LEGO builder who enjoys moving models, a voracious reader of adventure series like Rick Riordan's Percy Jackson and sci-fi classics by Isaac Asimov, and a fan of pop singer Taylor Swift's
    storytelling lyrics, James Warning finds artistic expression through hands-on construction and imaginative literature.
  travel: An enthusiastic Boy Scout who loves weekend camping trips to Shenandoah National Park, dreams of exploring Japan's historic castles, and plans each outing with detailed checklists and merit-badge
    goals, James Warning blends curiosity with structured itineraries while respecting budget constraints.
  culinary: A practical home cook who frequently assembles peanut butter-jelly sandwiches, experiments with LEGO-themed cookie decorating, and favors comfort foods like creamy macaroni and cheese with extra
    cheddar, James Warning approaches meals with simplicity and occasionally treats themselves to pepperoni pizza.
  core: A methodical 11-year-old who balances a love for building, coding, and basketball with a competitive edge, a penchant for organized savings, and a habit of double-checking every detail, James Warning
    navigates childhood with structured curiosity and occasional stubbornness.
background:
  cultural: James was raised in Franklin, Indiana, a predominantly white, suburban Midwestern community known for its family‑oriented values and emphasis on practicality and reliability. Local traditions
    such as community fairs, Fourth of July parades, and school activities reflect a culture that rewards structure, teamwork, and respect—principles that resonate with James's personality.
