  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Visiting Art Galleries'', ''Philosophy & Astronomy Lectures'', ''Speculative Fiction Book Club'', ''Hiking'', ''Gardening'', ''Bluegrass Concerts'',
    ''Bourbon Tastings'']'
  career_goals: Katherine aims to leverage her disciplined work ethic and educational background to move into a supervisory or store‑manager role within the next two years, seeking certification in retail
    management to enhance her leadership credentials. Long‑term, she envisions creating a community‑based adult education program focused on artistic development and practical retail skills, blending her
    passion for abstract concepts with her desire to mentor others. She also hopes to author a locally‑focused guide to Kentucky’s folk art traditions, positioning herself as both a business leader and
    cultural advocate.
