  career_goals: She aspires to become a multidisciplinary artist who blends visual storytelling with community engagement, such as creating interactive murals that reflect the cultural mosaic of Queens.
    She also dreams of working as a museum educator or graphic designer, roles that would let her remain curious, flexible, and in touch with diverse ideas. Long‑term, she hopes to travel, learn new languages,
    and use her creativity to inspire peers and younger children.
