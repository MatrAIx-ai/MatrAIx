personas:
  professional: Jean Mckee is a budding visual storyteller who blends hand‑drawn comics with interactive Scratch animations, leveraging a curious, open‑minded outlook and a flexible, sometimes unstructured
    work style to collaborate with friends on school art projects, and they thrive on sharing their creations with classmates.
  sports: Jean Mckee is a lively member of the Queens Youth Soccer Club, devoting afternoons to weekend soccer matches while cheering for NYC FC and the New York Knicks, and occasionally joining after‑school
    basketball pick‑ups during winter, balancing a high‑energy play style with a relaxed attitude toward structured training, and they often organize impromptu kick‑around games with neighborhood friends.
  arts: Jean Mckee is a budding artist who fills sketchbooks with Van Gogh‑inspired landscapes, creates collage pieces reminiscent of Banksy’s street art, rehearses improv scenes inspired by Lin‑Manuel
    Miranda’s musical energy, and often listens to Taylor Swift while painting, and they love sharing their latest creations during school art shows.
  travel: Jean Mckee dreams of weekend getaways that blend spontaneous trips to Coney Island’s boardwalk, family visits to the Statue of Liberty, and occasional excursions to Niagara Falls, while also day‑dreaming
    about future adventures to Tokyo and London, preferring flexible itineraries over rigid schedules, and they often map out routes on crayon‑drawn maps for fun.
  culinary: Jean Mckee loves helping at the kitchen counter, eagerly whisking coconut milk into homemade pad Thai, sprinkling fresh basil on pizza Margherita, and assembling simple sushi rolls with soy
    sauce, showing a budding chef’s enthusiasm that outpaces their precision, and they proudly present their finished dishes to family members for taste‑testing.
  core: Jean Mckee is a curious, art‑obsessed ten‑year‑old who darts between sketchbooks, soccer fields, and Scratch coding bursts, often leaving half‑finished drawings around the house and indulging in
    impulsive snack purchases, and they balance a whirlwind of creative projects with occasional bouts of disorganization.
background:
  cultural: Jean Louise grew up in Woodside, Queens, a vibrant, multicultural neighborhood where Irish, Italian, Asian, and Latin American communities meet. Though her family identifies as white American
    and celebrates holidays like Christmas and Thanksgiving, she is daily exposed to a mosaic of languages, foods, and cultural events that shape her appreciation for diverse artistic expressions and ideas.
