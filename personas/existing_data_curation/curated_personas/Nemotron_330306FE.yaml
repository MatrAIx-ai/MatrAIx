personas:
  professional: Moon Tsang channels their statistical expertise in Bayesian inference, machine learning, and data visualization into clear business insights, while their curiosity and love for contemporary
    art drive a visually rich, collaborative storytelling style that balances meticulous organization with creative flexibility.
  sports: Moon Tsang enjoys weekend treks in the Santa Cruz Mountains with the Bay Area Hiking Collective, supports the San Jose Sharks in hockey, the Golden State Warriors in basketball, and plays in a
    co‑ed volleyball league, balancing solitary outdoor activity with light team sports.
  arts: Moon Tsang visits contemporary galleries showcasing works by Kehinde Wiley and Olafur Eliasson, attends indie film festivals featuring directors like Hirokazu Kore‑eda, and curates playlists that
    blend Björk's avant‑pop with traditional guzheng melodies, reflecting their open‑minded appreciation for both modern and cultural art forms.
  travel: Moon Tsang prefers carefully planned cultural trips, having explored Kyoto's temples, trekked Torres del Paine in Patagonia, and soon hopes to soak in Iceland’s geothermal lagoons, all while balancing
    travel with career commitments and a modest travel budget.
  culinary: Moon Tsang experiments with Asian‑fusion dishes such as miso‑glazed salmon tacos topped with pickled daikon and cilantro, perfects hand‑rolled rice‑paper spring rolls, and frequently pairs meals
    with a crisp Riesling, though they occasionally over‑salt sauces when multitasking between cooking and work emails.
  core: Moon Tsang merges statistical rigor with artistic curiosity, navigating data‑driven decisions, creative pursuits, and a habit of over‑planning that sometimes curtails spontaneous adventure.
background:
  cultural: Moon Tsang is a second‑generation East Asian American whose family heritage traces back to Taiwan. Raised in a bilingual household, she grew up balancing Mandarin (spoken at home) with English
    (used at school), internalizing Confucian values of harmony, respect for elders, and a strong emphasis on education. Living in San Jose's tech hub, she blends this cultural foundation with the innovative,
    individualistic spirit of Silicon Valley. Moon regularly celebrates Lunar New Year with family gatherings and traditional dim sum, participates in events at the local Chinese Cultural Center, and continues
    family cooking traditions. At the same time, she embraces the Bay Area's multicultural vibrancy, attending art walks, tech meet‑ups, and community dialogues on data ethics, reflecting an integration
    of her heritage and contemporary American experience.
attributes:
