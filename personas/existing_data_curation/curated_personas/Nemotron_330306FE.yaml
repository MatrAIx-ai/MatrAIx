  hobbies: '[''Contemporary Art Gallery Visits'', ''Independent Film Festival Attendance'', ''Urban Landscape Photography'', ''Hiking in the Santa Cruz Mountains'', ''Cooking Asian Fusion Dishes'', ''Yoga
    and Meditation'', ''Reading Science Fiction and Philosophy'', ''STEM Outreach Volunteering'', ''Cultural Festival Participation'', ''Learning Calligraphy'']'
  career_goals: Moon aims to advance to a senior data scientist or lead statistician role within a tech‑focused organization, where she can steer high‑impact research projects and mentor junior analysts.
    She plans to earn a Ph.D. in Statistics or a Certified Statistical Professional designation to deepen her expertise in causal inference and AI‑driven analytics. Moon is passionate about shaping data‑driven
    public policy, especially in health equity, and aspires to lead initiatives that embed ethical considerations into product development. Ultimately, she envisions launching a consultancy that helps startups
    implement inclusive, evidence‑based decision‑making frameworks.
