  hobbies: '[''Visiting Art Galleries'', ''Attending Live Music and Theater'', ''Salsa Dancing'', ''Cooking Cuban Cuisine'', ''Volunteering at Senior Centers (Art‑Therapy Workshops)'', ''Yoga and Mindfulness
    Meditation'', ''Gardening (Herb Balcony Garden)'', ''Reading (History & Creative Nonfiction)'', ''Traveling to Cultural Festivals'']'
  career_goals: Tatiana aims to transition into a senior advisory role where she can shape enterprise‑wide transformation projects and mentor emerging analysts. She is passionate about integrating cultural
    insights into business strategy, so she seeks opportunities to lead cross‑functional initiatives that connect the Hispanic market in South Florida with innovative product development. Over the next
    five years, she plans to obtain a Certified Management Consultant credential, spearhead a company‑wide sustainability program, and ultimately leave a legacy of inclusive, data‑driven decision making
    that supports both organizational performance and community well‑being.
