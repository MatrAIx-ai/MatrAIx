personas:
  professional: Tatiana Nunez, a seasoned management analyst with two decades of experience, leverages her quantitative expertise in Excel, SQL, Tableau, and Lean Six Sigma to redesign processes while infusing
    creative problem‑solving and bilingual communication, all driven by her methodical mindset and natural curiosity.
  sports: Tatiana Nunez cheers for the Miami Heat and Miami Marlins, participates in a weekly senior paddle‑tennis club at the municipal courts, walks her neighborhood’s beachfront promenade each morning,
    and incorporates salsa dancing lessons into her fitness routine to stay active.
  arts: Tatiana Nunez, a lifelong art enthusiast, frequents the Pérez Art Museum Miami, attends live performances by legendary salsa artists like Celia Cruz and Willie Colón, leads art‑therapy workshops
    at local senior centers, and devotes weekend evenings to reading contemporary Spanish‑language novels by Leonardo Padura.
  travel: Tatiana Nunez prefers thoughtfully planned trips that blend cultural immersion and relaxation, having explored historic Old Town Savannah, the vibrant streets of Madrid, and the art‑laden alleys
    of Barcelona, while her upcoming wish list includes a leisurely cruise through the Caribbean islands and a family reunion in Naples, Italy.
  culinary: Tatiana Nunez cooks traditional dishes such as ropa vieja, arroz con pollo, and yuca con mojo with a confident hand, seasoning them with fresh cilantro, oregano, and lime from her balcony garden,
    and relishes occasional evenings at Casa Café where she shares a plate of tostones and a glass of aged rum with friends.
  core: Tatiana Nunez blends analytical rigor with a deep artistic soul, balancing a disciplined work ethic and retirement planning against a lingering worry habit that fuels their constant pursuit of cultural
    enrichment and compassionate community service.
background:
  cultural: Tatiana grew up in a close‑knit Cuban‑American family in Miami, where Spanish was spoken at home and Cuban traditions were celebrated daily. Her upbringing blended the vibrant rhythms of salsa,
    the flavors of Cuban cooking, and the Catholic faith that shaped community gatherings. She maintains strong ties to the Cuban diaspora through participation in local cultural festivals, mentorship of
    younger immigrants, and active involvement in neighborhood associations that preserve heritage while fostering integration into broader American society.
attributes:
  skills: '[''Quantitative Data Analysis'', ''Strategic Planning'', ''Process Optimization'', ''Stakeholder Management'', ''Risk Assessment'', ''Lean Six Sigma Green Belt'', ''Bilingual Communication (English/Spanish)'',
