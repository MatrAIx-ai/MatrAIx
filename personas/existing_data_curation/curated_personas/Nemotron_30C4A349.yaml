personas:
  professional: Joshua Schrepfer is a budding robotics enthusiast who spends after‑school hours building and programming LEGO Mindstorms kits, applying a precise, structured mindset to mechanical design
    and coding, and they frequently lead their school’s math club in problem‑solving challenges.
  sports: Joshua Schrepfer is an avid weekend hiker and mountain‑bike rider on the Gilbert desert trails, they play on the local youth soccer team ‘Gilbert Meteors’, and they root for the Arizona Diamondbacks
    and Phoenix Suns, treating each practice as a tactical exercise.
  arts: Joshua Schrepfer enjoys devouring science‑fiction novels like Ender’s Game and The Expanse, they listen to Hans Zimmer soundtracks while building robots, and they attend monthly screenings at the
    Arizona Science Center, drawing inspiration for their own creative schematics.
  travel: Joshua Schrepfer prefers meticulously planned trips, they have already explored Sedona’s red rocks and the Grand Canyon, and they dream of joining a youth robotics competition in Japan, balancing
    their love of desert adventure with a curiosity for high‑tech cultural hubs.
  culinary: Joshua Schrepfer favors hearty snacks such as trail mix and homemade nachos while hiking, they enjoy cooking simple dishes like chili‑con‑carne and pizza with their mom, and they can always
    be heard requesting extra cheese on their favorite burritos.
  core: Joshua Schrepfer is a hyper‑organized 12‑year‑old who blends competitive robotics, strategic gaming, and desert outdoor pursuits, yet they habitually stay up late to fine‑tune code, often sacrificing
    sleep for perfection.
background:
  cultural: Joshua grows up in a middle‑class white family in Gilbert, Arizona, a suburban community known for its strong emphasis on education, extracurricular involvement, and community events. The local
    culture promotes self‑reliance, academic achievement, and participation in youth sports leagues and clubs. Seasonal desert activities, such as hiking and local festivals, shape his outdoor experiences.
    While his primary cultural identity aligns with mainstream suburban American values, he is also exposed to the diverse influences of the Greater Phoenix area, including a blend of Southwest traditions
    and a growing multicultural community.
