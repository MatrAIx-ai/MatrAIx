  career_goals: Gabriela aims to progress from senior systems analyst to lead systems architect, overseeing enterprise‑wide digital transformation projects that blend technology with creative design. She
    plans to earn TOGAF and PMP certifications within the next two years, positioning herself for a future chief technology officer role in a company that values innovation and cultural diversity. Mentoring
    emerging analysts, especially women and members of the Hispanic community, is a personal priority; she envisions building a cross‑functional innovation lab at her organization where art, AI, and user‑experience
    research converge. Additionally, Gabriela seeks to champion community outreach programs that teach coding and digital literacy to under‑served youth in Fairfield County, thereby honoring her Colombian
    roots while expanding her professional impact.
