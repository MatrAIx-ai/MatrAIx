persona_description: A cytogeneticist who specializes in the use of fluorescence in situ hybridization (FISH) to visualize and analyze chromosomal abnormalities in cancer cells. She is skilled in performing
  direct and indirect FISH approaches, including the use of metaphase and interphase preparations, and has extensive experience with the use of whole chromosome paint probes to determine the identity and
  copy number of extra chromosomes present in cancer cells. She is also proficient in assembling a genome-wide panel of canine BAC clones for use in FISH and has experience with the spatial separation of
  probes along the length of each chromosome using multicolor bar codes. Her work is focused on identifying and analyzing intrachromosomal structural changes and the use of these tools to develop a multicolor
  bar code for each chromosome.
