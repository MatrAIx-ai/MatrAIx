  career_goals: Lanye aims to transition into a senior supervisory role within the Santa Clara County Fire Department, where she can mentor the next generation of inspectors and shape county‑wide fire safety
    policies. She is passionate about creating a community‑focused fire prevention program that uses local artists and cultural narratives to develop engaging safety campaigns, especially targeting older
    housing stock and multi‑generational households. Over the next five years, she plans to lead a pilot project that blends visual art installations with fire‑safety education in schools and community
    centers. Additionally, Lanye hopes to contribute her expertise as a guest lecturer at the local community college’s fire science program and eventually shift to a part‑time consultancy role that allows
    her to focus on research and advocacy for smarter, technology‑enabled fire protection systems.
