  career_goals: Hilda aims to advance to an Office Manager position within her school district, where she can formalize her processes and lead a small team. She plans to earn the Certified Administrative
    Professional (CAP) credential to solidify her expertise. Passionate about mentorship, she hopes to develop a structured mentorship program for junior administrative staff and local high‑school students
    interested in education careers. Additionally, she wants to integrate wellness practices, such as brief mindfulness breaks, into the workplace to reduce stress for herself and her colleagues, ultimately
    transitioning to a part‑time community‑education facilitator role as she approaches retirement.
