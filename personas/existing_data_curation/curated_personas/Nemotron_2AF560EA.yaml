personas:
  professional: Maggie Felix is a front‑of‑house hospitality specialist at a bustling Los Angeles entertainment venue, leveraging her crystal‑clear communication, crowd‑control finesse, and meticulous scheduling
    ability to keep events running smoothly while energizing staff with her talkative, upbeat demeanor.
  sports: Maggie Felix is a passionate fan of the Los Angeles Lakers and Dodgers, plays weekly volleyball with the Silver Lake Social Volleyball Club, hikes the spring trails of Joshua Tree and Sequoia,
    and balances her team loyalty with personal fitness through regular yoga and pilates sessions.
  arts: Maggie Felix immerses herself in the Southern California arts scene, attending live concerts by the Red Hot Chili Peppers, Billie Eilish, and the LA Philharmonic, volunteering as a stagehand at
    the Community Theatre of Pasadena, and delighting in karaoke nights where she belts out classics by Queen and Dolly Parton.
  travel: Maggie Felix prefers semi‑planned getaways that blend adventure and relaxation, often spending long weekends hiking Sequoia’s giant forests or road‑tripping along the Pacific Coast Highway, while
    dreaming of a future cultural immersion trip to Kyoto to explore its temples and street food markets.
  culinary: Maggie Felix is a food‑enthusiast who perfects fish tacos with fresh cilantro, lime, and mango salsa, crafts avocado‑basil pesto pasta, savors Korean BBQ bibimbap bowls, and admits a habit of
    ordering extra dessert at upscale restaurants despite her otherwise balanced palate.
  core: Maggie Felix balances meticulous organization with a gregarious love of performance, turning every shift into a well‑orchestrated show, yet she can’t resist a third espresso and occasionally forgets
    to log her mileage for tax deductions.
background:
  cultural: Maggie grew up in a middle‑class, white family of mixed Irish and Italian ancestry in the Los Angeles metropolitan area. Her upbringing was steeped in mainstream American culture—celebrating
    holidays such as Thanksgiving and the Fourth of July, watching Hollywood movies, and listening to popular music. Living in a culturally diverse city exposed her to a wide array of traditions and cuisines,
    shaping an open‑minded yet rooted identity that values hard work, community interaction, and the vibrant entertainment scene of Southern California.
