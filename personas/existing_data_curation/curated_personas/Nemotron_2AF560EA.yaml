  career_goals: Maggie aims to advance from a front-line attendant to a senior shift manager at a major Los Angeles entertainment venue, overseeing staff scheduling, training, and operational logistics.
    She plans to earn a GED and complete a certificate in hospitality management within the next two years, positioning herself for a future role as an event director. In the longer term, she dreams of
    launching her own boutique event-planning consultancy that specializes in intimate concerts and private parties, leveraging her network and organizational expertise.
