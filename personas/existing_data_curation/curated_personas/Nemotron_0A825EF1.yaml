  hobbies: '[''Amateur soccer league'', ''Listening to and dancing to regional Mexican music'', ''Attending community festivals (e.g., Charro Days)'', ''Watching sports (NFL, Liga MX)'', ''Volunteer work
    at local church food drives'', ''Guided meditation'', ''Biking along the Rio Grande'', ''Cooking traditional Mexican dishes'']'
  career_goals: Francisco aims to move up to a regional sales supervisor position within the next three years, where he can mentor newer reps and shape service offerings for the McAllen area. To compensate
    for his limited formal education, he plans to earn a professional sales certification such as the Certified Professional Sales Person credential. In the longer term, he dreams of launching his own small
    service brokerage that bridges U.S. and Mexican customers, leveraging his bilingual skills and community ties. He also seeks a more predictable income stream to reduce financial anxiety and provide
    stability for his family.
