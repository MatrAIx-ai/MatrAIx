personas:
  professional: Francisco Rodriguez, a 26‑year‑old service sales representative in McAllen, leverages bilingual fluency, empathy‑driven listening, and CRM savvy to close deals swiftly, while juggling a
    loosely organized schedule and a drive toward the structured role of regional sales supervisor they aspire to within three years.
  sports: Francisco Rodriguez plays in a local amateur soccer league on weekends, passionately follows the Houston Texans and Club América, and proudly wears the McAllen Mustangs jersey while volunteering
    as a team captain, even though their disorganized schedule sometimes leads them to miss practice.
  arts: Francisco Rodriguez sways to norteña and banda at Charro Days, collects vinyl records of Los Tigres del Norte and Selena, and occasionally joins community dance circles where they showcase energetic
    steps, though they rarely carve out time for formal art classes.
  travel: Francisco Rodriguez prefers short road trips to nearby Texan hill country towns like Fredericksburg and cross‑border weekend getaways to Reynosa, planning travel on a whim with a flexible budget,
    yet they keep a mental bucket list that includes a pilgrimage to the historic Mission San José and a future road trip along the Pacific Coast Highway.
  culinary: Francisco Rodriguez loves cooking tamales and pozole for family gatherings, perfects the flavor with fresh ancho chilies and hominy, while also experimenting with fusion tacos that blend traditional
    spices with BBQ brisket, though they often over‑season their dishes in the heat of the moment.
  core: Francisco Rodriguez blends a charismatic sales style and community‑rooted spirit with a love for soccer, norteña beats, and spontaneous road trips, all while wrestling with anxiety‑driven over‑thinking
    and a habit of letting paperwork pile up.
background:
  cultural: Francisco grew up in McAllen, Texas, a city with a strong Mexican-American presence. His family maintains many Mexican traditions, such as celebrating Día de los Muertos, Cinco de Mayo, and
    Christmas with a blend of Catholic rituals and festive foods like tamales and pozole. He is bilingual, speaking Spanish at home and English at school and work, which gives him a bicultural identity
    that values both familismo and personalismo. The close‑knit community in Hidalgo County emphasizes respect for elders, collective well‑being, and mutual support, shaping his cooperative and kind disposition.
    While he identifies with his Mexican heritage, he also navigates the Texan environment, adopting elements of Southern hospitality and the fast‑paced service economy of the border region.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Customer relationship management (CRM) proficiency'', ''Persuasive sales and negotiation'', ''Service product knowledge'', ''Basic data entry
