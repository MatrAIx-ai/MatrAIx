persona_description: A legal scholar and expert in the field of criminal justice, particularly focusing on the impact of bias and prejudice on the legal system and verdicts. They have a deep understanding
  of the psychology behind jurors' decision-making processes and the potential effects of religious bias on verdicts. They are well-versed in the use of implicit biases and how they can be detected and
  addressed in the legal system. They are interested in the ongoing debate and controversy surrounding the case of Homaidan Al-Turki and the broader implications of implicit bias in the legal system.
