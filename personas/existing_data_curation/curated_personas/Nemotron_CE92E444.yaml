  career_goals: In the coming years Celestina’s primary ambition is to safeguard her independence and financial security while passing on the cultural heritage that defines her identity. She aims to complete
    a simple estate plan, continue her volunteer bookkeeping so the senior‑center can expand its programs, and mentor a small group of younger Puerto Rican women in traditional cooking and family history
    documentation. She also hopes to learn a new digital skill—organizing a virtual photo archive of her family’s stories—so that her grandchildren can stay connected to their roots.
