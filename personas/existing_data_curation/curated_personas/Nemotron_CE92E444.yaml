personas:
  professional: A meticulous community bookkeeper and genealogy enthusiast, Celestina Sotomayor leverages their lifelong budgeting expertise and basic digital tools to keep the senior center’s finances
    transparent, while mentoring younger neighbors in record‑keeping and traditional cooking.
  sports: Celestina Sotomayor enjoys low‑impact fitness through daily garden walks, occasional tai chi sessions at the senior center, and quietly cheers for the local baseball team, the Bay City Mariners,
    while also joining a weekly seniors’ bingo league that doubles as mental exercise.
  arts: Celestina Sotomayor finds solace in classic salsa and plena recordings by Celia Cruz and Héctor Lavoe, reads historical novels by Ken Follett, and weaves their emotions into hand‑knit scarves inspired
    by the vibrant rhythms of those songs.
  travel: Celestina Sotomayor prefers short, purposeful trips, having explored nearby coastal towns like Seaside Harbor and historic river towns such as Old Millchester, while dreaming of a quiet pilgrimage
    to the lavender fields of Provence to replenish their curiosity without the stress of large crowds.
  culinary: Celestina Sotomayor deftly prepares traditional island dishes like arroz con gandules, plantain mofongo, and black bean soup, while experimenting with new herb varieties such as lemon balm and
    fenugreek, and they delight in hosting small family meals where adobo‑spiced chicken is served with fresh cilantro rice.
  core: Celestina Sotomayor is a disciplined, curiosity‑driven senior who blends meticulous budgeting, gentle gardening, and solitary salsa listening into a quiet, yet occasionally worry‑laden, pursuit
    of independence and cultural legacy.
background:
  cultural: Celestina is a first‑generation Puerto Rican American whose family migrated to Florida during the mid‑20th century. She grew up speaking Spanish at home while learning English at school, giving
    her fluency in both languages. She was raised in a Catholic household and still attends Mass at the local parish, where she volunteers in the soup kitchen and helps organize the annual Puerto Rican
    Day celebration. Her culinary repertoire reflects island traditions—arroz con gandules, pasteles, lechón, and sweet breads— and she often shares these dishes with neighbors, preserving a sense of cultural
    continuity. Living in Hollywood, Broward County, she participates in community senior programs that celebrate Caribbean heritage, fostering connections between older and younger generations while upholding
    the values of familial loyalty, respect for elders, and the festive spirit of Puerto Rican culture.
