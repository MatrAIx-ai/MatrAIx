  hobbies: '["sketching", "watercolor painting", "mixed‑media art", "gallery visits", "photography", "playing acoustic guitar", "reading contemporary fiction", "hiking", "volunteering at art programs",
    "following design blogs"]'
  career_goals: Sandra aims to merge her love of art with technology, targeting a career in UI/UX design or as an art director for a forward‑thinking creative agency. In the short term, she plans to secure
    a design internship, build a polished portfolio, and graduate with a BFA in Visual Communication. Long‑term, she envisions founding a community art space in Bloomington that offers workshops, exhibitions,
    and mentorship for emerging artists, while also leading creative teams and influencing regional cultural initiatives.
