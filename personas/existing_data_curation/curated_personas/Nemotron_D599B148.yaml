personas:
  professional: Sandra Mcfarland, a 19-year-old visual communication major, blends meticulous project coordination with a fearless curiosity for unconventional design, using Photoshop, Illustrator, and
    InDesign to prototype user interfaces while their competitive edge drives them to secure a coveted UI/UX internship and ultimately shape an art‑led tech agency.
  sports: Sandra Mcfarland hits the Bloomington forest trails every Saturday for solo hikes, supports the Chicago Cubs and Chicago Bulls avidly, and belongs to a local trail‑running club that meets biweekly
    for weekend jogs along the Spoon River.
  arts: Sandra Mcfarland immerses themselves in contemporary art, drawing inspiration from digital illustrator Loish and painter Agnes Martin, attending indie shows featuring Bon Iver and Mitski, and curating
    mini‑exhibitions at the McLean County Museum of History to showcase emerging watercolor talents.
  travel: Sandra Mcfarland prefers curated weekend getaways, having explored Chicago’s art districts, taken a road trip to Nashville’s music scene, and dreaming of a spring visit to Florence to study Renaissance
    frescoes, always planning itineraries on a tight student budget yet keeping an eye on cheap Airbnb options.
  culinary: Sandra Mcfarland enjoys crafting avocado‑toast bowls with feta, cherry tomatoes, and a drizzle of balsamic glaze, cooking spaghetti carbonara with pancetta and Pecorino Romano on lazy evenings,
    and experimenting with matcha‑infused shortbread, though they often forget to restock pantry staples until the last minute.
  core: Sandra Mcfarland is a fiercely curious art‑tech hybrid who balances disciplined project planning with spontaneous sketch sessions, tends to doubt others’ motives, and occasionally over‑spends on
    creative supplies while neglecting routine chores.
background:
  cultural: Sandra grew up in Bloomington, Illinois, a Midwestern city where community ties and modest cultural offerings coexist with university‑driven artistic energy. Her family traces its roots to German
    and Irish ancestry and was raised in a Methodist household that valued education, self‑reliance, and civic involvement. The blend of rural Midwest values—politeness, pragmatic work ethic, and appreciation
    for local fairs—combined with exposure to campus art scenes and online creative communities has shaped her open yet discerning outlook on art and culture.
