  hobbies: '[''Sketching and drawing'', ''Digital illustration (Procreate)'', ''Photography of street art'', ''Listening to hip‑hop, jazz, R&B'', ''Journaling'', ''Reading YA fiction'', ''Podcast listening
    about art and tech'', ''School art club'', ''Community dance troupe'', ''Volunteering at after‑school tutoring'', ''Attending local cultural festivals'', ''Exploring food scene'']'
  career_goals: Daveeta aims to attend a specialized art program or university where she can refine her visual storytelling and illustration skills. In the short term, she plans to build a comprehensive
    portfolio, secure a summer internship at a local gallery or community art center, and launch a social‑media channel that combines her artwork with mental‑health advocacy for teens. Long‑term, she envisions
    becoming a professional illustrator or graphic designer who creates inclusive, culturally resonant visual content and leads youth art workshops that empower other adolescents dealing with anxiety and
    stress.
