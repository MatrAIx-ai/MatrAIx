  hobbies: '[''Basketball'',''Ice hockey'',''Trombone (school band)'',''Multiplayer video gaming (Minecraft, Fortnite)'',''Fishing'',''Camping'',''Hiking'',''Model building'',''Cooking Polish dishes (pierogies)'']'
  career_goals: Harold aims to graduate high school with strong grades in math and science, then pursue a degree in civil engineering at a university such as the University of Wisconsin–Madison. He is drawn
    to engineering because it combines his love of structure, practical problem solving, and community impact. In the long term he hopes to design safe, functional infrastructure for small towns like Amery,
    possibly working for a local construction firm or the state Department of Transportation. He also wishes to give back through public service, planning to earn a volunteer firefighter certification during
    high school and eventually join the Amery Fire Department. Short‑term, he plans to join the school's robotics club, earn a first‑aid certification, and secure a part‑time job at the local hardware store
    to gain hands‑on experience.
