personas:
  professional: Harold Borkowski, a high-school sophomore, they channel their love for structure and teamwork into aspiring to become a mechanical designer, using their trombone discipline to lead group
    projects and meticulously plan model-airplane builds while balancing schoolwork and sports.
  sports: Harold Borkowski, a dedicated athlete, they compete on the St. Croix North High School Wildcats basketball team, lace up for the community Twin Lakes Ice Hawks hockey league in winter, cheer for
    the Minnesota Timberwolves and the Minnesota Wild, and keep a routine of early-morning jogs on local trails.
  arts: Harold Borkowski, a budding musician, they play trombone in the school marching band, draw inspiration from jazz legend J.J. Johnson, enjoy listening to the cinematic scores of Hans Zimmer, and
    spend evenings crafting custom skins for Minecraft while humming the latest pop hits from artists like Billie Eilish.
  travel: Harold Borkowski, an adventurous teen, they favor family camping trips along the St. Croix River, have taken a school field trip to Chicago's Museum of Science and Industry, dream of hiking the
    Grand Canyon's South Rim and wandering the ancient streets of Rome, preferring itineraries that blend outdoor adventure with cultural discovery.
  culinary: Harold Borkowski, a kitchen enthusiast, they enjoy helping their family roll dough for pierogies filled with potato, cheese, and caramelized onions, season fresh-caught trout from the river
    with dill and lemon, and show a budding knack for cooking simple camping meals like foil-pack potatoes and marshmallow-topped s'mores.
  core: Harold Borkowski blends a meticulously organized mindset with a love for team sports, music, and video-game creation, yet they can't resist late-night snack raids and occasional procrastination
    on homework.
background:
  cultural: Harold comes from a Polish‑American family that has lived in Amery, Wisconsin for several generations. The community is predominantly white and Midwestern, with strong Catholic roots; his family
    regularly attends St. John’s Catholic Church and observes Polish traditions such as celebrating Dyngus Day and preparing pierogies for holidays. Growing up in a small‑town setting, Harold has been shaped
    by the values of hard work, modesty, and community involvement common in the region. Local events like the St. Croix County Fair, community center activities, and neighborhood potlucks reinforce his
    connection to both his Polish heritage and broader American Midwest culture.
