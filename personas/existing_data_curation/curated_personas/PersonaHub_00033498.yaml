persona_description: A technology entrepreneur and biomedical scientist who founded a company called Freenome, which develops early stage cancer screening tests using machine learning algorithms. Freenome's
  platform combines wet lab technologies with automation to analyze multiple signatures from a single blood collection tube, aiming to create the most accurate and effective early detection test possible.
  The company's technology is different from other companies in its focus on additivity and its ability to improve over time through machine learning.
