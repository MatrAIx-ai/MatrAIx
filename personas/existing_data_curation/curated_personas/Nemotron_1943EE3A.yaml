  hobbies: '[''Woodworking'', ''Gardening'', ''Fishing'', ''Hiking'', ''Reading about colonial architecture'', ''Sustainable building research'', ''Volunteering at Salem Historical Society'', ''Watching
    Boston Red Sox games'', ''Community potlucks'']'
  career_goals: Broderick aims to move into a crew foreman role within the next two years, leveraging his reliability and methodical approach to oversee larger projects. He plans to complete an OSHA 30‑hour
    certification and enroll in a part‑time construction management program at a community college to gain formal project‑management credentials. Ultimately, he hopes to launch his own small general‑contracting
    firm that specializes in energy‑efficient renovations of historic homes in the Salem area, combining his curiosity about sustainable building methods with his practical experience. He also wants to
    mentor apprentices, share his knowledge of safety and craftsmanship, and become an active member of the local union and the Salem Historical Society.
