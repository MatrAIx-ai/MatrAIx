  hobbies: '[''listening to R&B and hip‑hop music'', ''dance practice with friends'', ''sketching and drawing'', ''digital photography of daily life'', ''pickup basketball at the park'', ''volunteering
    at church food bank'', ''cooking simple Southern recipes'', ''binge‑watching streaming series'', ''online gaming'']'
  career_goals: Loretta aims to complete her high school education and obtain a GED, then pursue a career that blends her love for helping others with practical problem‑solving. She is intrigued by community
    health work or youth mentorship roles at local centers or clinics, where she can use her communication skills and compassion. She also dreams of studying culinary arts to eventually open a modest café
    offering healthy, affordable meals for teenagers in her neighborhood. Ultimately, she wants to become a trusted resource who supports the well‑being of her peers and community.
