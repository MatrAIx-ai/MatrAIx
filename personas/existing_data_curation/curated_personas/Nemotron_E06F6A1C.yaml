personas:
  professional: Loretta Law, a sixteen-year-old high-school junior, is an aspiring community-health advocate and future culinary entrepreneur who leverages their empathetic communication, practical problem-solving,
    and spontaneous creativity—evident in volunteer work at the food bank and their knack for turning simple Southern recipes into teen-friendly health-focused dishes, and they continuously seek ways to
    merge service with flavor.
  sports: Loretta Law enjoys playing pickup basketball at the neighborhood park and follows the Miami Heat and Atlanta Hawks, while also cheering on the local high-school varsity teams and occasionally
    participating in the school's track club for sprint drills, reflecting the fact that they love fast-paced, team-oriented sports and a laid-back, social approach to fitness.
  arts: Loretta Law immerses themselves in R&B and hip-hop playlists featuring Beyoncé, Anderson .Paak, and J. Cole while sketching characters from graphic novels such as 'Saga' and 'Ms. Marvel', and they
    practice dance routines with friends, turning music and visual storytelling into their primary outlets for creative expression.
  travel: Loretta Law’s travel style favors short, budget-friendly road trips to nearby Southern cities like Charleston, Savannah, and Atlanta—places they’ve visited with friends for music festivals and
    food tours—while dreaming of a future backpack adventure to New Orleans and a weekend getaway to Disney World, balancing their limited teen budget with a love for spontaneous discovery.
  culinary: Loretta Law enjoys experimenting in their modest kitchen, whipping up Southern staples like collard greens seasoned with smoked turkey and buttery cornbread, while also mastering quick teen-friendly
    meals like loaded nachos and mango-lime smoothies, showcasing their growing confidence as a home cook who values flavor, nutrition, and comfort, and they often share their creations with friends at
    after-school gatherings.
  core: Loretta Law is a curious, community-focused sixteen-year-old who blends spontaneous artistic flair—from sketching graphic novels to cooking collard greens—with a relaxed, occasionally disorganized
    lifestyle, and they consistently champion empathy and teen well-being.
background:
  cultural: Loretta is a Black teenager growing up in Charlotte’s Cabarrus County, immersed in a vibrant African‑American community that values family, faith, and local traditions. Her family observes Southern
    customs such as church gatherings, soulful gospel and contemporary music, and home‑cooked meals featuring dishes like fried chicken, collard greens, and sweet tea. She celebrates cultural events like
    Juneteenth and participates in neighborhood festivals that highlight the region’s rich history of resilience and community activism. This cultural tapestry influences her worldview, artistic interests,
    and desire to contribute positively to her community.
