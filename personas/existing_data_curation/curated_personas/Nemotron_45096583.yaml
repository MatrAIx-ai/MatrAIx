  career_goals: John’s primary ambition is to become a recognized expert in residential and commercial maintenance with a focus on energy‑efficiency upgrades. Over the next five years he plans to earn journeyman
    and EPA certifications, secure a lead‑technician position with a regional contractor, and launch a boutique smart‑home installation service. He aims to mentor apprentices, develop proprietary troubleshooting
    protocols, and eventually expand into a small franchise offering sustainable retrofitting solutions. He also hopes to showcase some of his woodworking creations at local craft fairs, merging his technical
    expertise with artistic expression.
