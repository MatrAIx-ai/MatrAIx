personas:
  professional: Miriam Rativa, a five-year-old aspiring architect, spends hours constructing elaborate block cities and carefully follows blueprint books, channeling their vivid imagination and strong sense
    of order into each miniature structure.
  sports: Miriam Rativa is a cheerful participant in the Little Trotters Soccer Club, idolizes the Chicago Cubs, and enjoys weekly playground tag, though the bustling energy sometimes fuels their anxious
    feelings.
  arts: Miriam Rativa spends afternoons painting swirling galaxies with watercolors, inspired by Eric Carle's vivid collages and Studio Ghibli's fantastical films, and they proudly display their glitter-glued
    paper dragons on the refrigerator.
  travel: Miriam Rativa loves family trips that blend adventure and structure, having explored the Children's Museum of Indianapolis, the sandy shores of Myrtle Beach, and dreaming of a future visit to
    Disney World's Magic Kingdom.
  culinary: Miriam Rativa favors creamy mac and cheese with extra cheddar, crunchy carrot sticks, and strawberry-banana smoothies, and they proudly 'help' stir the pancake batter, though they often sneak
    an extra spoonful of honey.
  core: Miriam Rativa is a wildly imaginative five-year-old whose love of novelty and art is balanced by a tender heart, and their emotions often spiral into intense anxious moments over the smallest setbacks.
background:
  cultural: Miriam is raised in a Mexican-American family in Des Moines, Iowa. At home, her parents speak both Spanish and English, and they celebrate cultural traditions such as Día de los Muertos, Las
    Posadas, and Mexican holidays with family gatherings, traditional foods like tamales and pan dulce, and colorful decorations. She learns Mexican folklore through stories and songs, while also participating
    in Midwestern community events like the Iowa State Fair and local library storytimes. This blend of Mexican heritage and Iowa community life gives her a strong sense of cultural pride and a welcoming,
    inclusive worldview.
attributes:
  skills: '[''drawing'', ''storytelling'', ''basic letter and number recognition'', ''singing'', ''organizing art supplies'', ''following multi-step craft instructions'', ''emotional expression through
