  hobbies: '[''drawing'', ''inventing stories'', ''building with blocks'', ''listening to bilingual songs'', ''dancing to Mexican folk music'', ''garden exploration'', ''reading picture books'', ''helping
    in the kitchen'']'
  career_goals: Miriam often imagines herself as a painter who creates beautiful pictures that make people smile, a storyteller who writes picture books, or an art teacher who helps other children feel
    safe and happy through art. She also dreams of exploring new worlds like an astronaut-explorer and sharing her discoveries in drawings. Her ambition is to combine her love of creativity with caring
    for others, perhaps one day becoming an artist who uses her work to comfort and inspire.
