  hobbies: '[''Abstract Painting'', ''Jazz Piano'', ''Speculative Fiction Reading'', ''Philosophy & Contemporary Thought'', ''Puzzle Solving (Cryptic Crosswords, Sudoku)'', ''Museum & Avant‑Garde Art Visits'',
    ''Coastal Hiking'', ''Birdwatching'', ''Nature Photography'']'
  career_goals: Looking ahead, Michael aims to transition from routine audit work to a thought‑leader role within the accounting community. He plans to publish a series of articles on the intersection of
    traditional auditing and emerging digital assets, and eventually launch a boutique advisory practice focused on tech startups and fintech firms in the San Diego region. He also seeks to attain a Certified
    Information Systems Auditor (CISA) credential to deepen his expertise in cyber‑risk assessment, and to mentor the next generation of accountants through local professional societies and community tax‑assistance
    programs.
