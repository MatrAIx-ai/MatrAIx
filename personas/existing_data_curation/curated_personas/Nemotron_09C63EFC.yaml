personas:
  professional: Michael Edwards, a seasoned CPA with four decades of audit experience, merges his meticulous analytical mindset with a vivid imagination to mentor junior staff while pioneering blockchain‑enabled
    audit frameworks for fintech startups in the San Diego tech scene.
  sports: Michael Edwards, an avid hiker who frequents the coastal bluffs of La Jolla for birdwatching and nature photography, follows the San Diego Padres with weekend game rituals, supports the local
    SeaPort Mariners indoor soccer team, and belongs to a community hiking club that tackles the Pacific Crest Trail once a year.
  arts: Michael Edwards, a dedicated abstract painter who mixes acrylics with digital collage tools, showcases jazz piano improvisations at the downtown Coffee House Collective, devours speculative fiction
    by Neal Stephenson and philosophy by Slavoj Žižek, and finds inspiration in the works of Jackson Pollock, Miles Davis, and Marina Abramović during avant‑garde performance art nights.
  travel: Michael Edwards, a meticulous planner with a taste for cultural immersion, has trekked the volcanic landscapes of Iceland, explored the museum‑laden streets of Barcelona, and dreams of attending
    the Venice Biennale while balancing trips around quarterly tax‑season deadlines and family commitments.
  culinary: Michael Edwards, a home‑cooking enthusiast who favors Mediterranean flavors, often prepares grilled octopus with smoked paprika, quinoa‑based salads with feta and pomegranate, and experiments
    with kombu‑infused broth for ramen, showcasing a cooking skill level that blends precise technique with artistic spontaneity.
  core: Michael Edwards blends a razor‑sharp accounting mind with an untamed creative spirit, channeling their curiosity into abstract art, jazz piano, and tech‑forward audit consulting, all while navigating
    occasional health warnings and a penchant for splurging on exotic coffee equipment.
background:
  cultural: Michael grew up in a middle‑class, Irish‑American household in the Midwest before relocating to San Diego in his thirties. His upbringing emphasized self‑reliance, hard work, and a respect for
    tradition, while his adult life in Southern California exposed him to a vibrant, multicultural environment, particularly the rich Mexican‑American heritage of the region. He celebrates his Irish roots
    through annual St. Patrick's Day gatherings with family friends, and embraces local customs such as attending community festivals, enjoying the coastal lifestyle, and sampling the diverse culinary scene
    that blends American, Mexican, and Asian influences.
attributes:
