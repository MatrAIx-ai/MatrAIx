  career_goals: Terry aims to become a head chef at a reputable farm‑to‑table restaurant within the next three years, then launch his own soulful modern eatery that showcases African American culinary traditions
    in a sustainable, seasonal format. He plans to complete a culinary management certification, earn a pastry chef credential, and develop a YouTube channel focused on cooking education and food culture.
