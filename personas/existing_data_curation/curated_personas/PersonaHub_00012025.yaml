persona_description: Dr. Foster H. Shannon, a prominent Christian theologian and author, who specializes in the study of church growth and Christian evidences. He is an ordained minister with a degree in
  Political Science from the University of California, Berkeley, and a Master of Divinity from Fuller Theological Seminary. He has authored seven books and a Sunday School curriculum, and is the President
  of Green Leaf Press, a non-profit Christian publishing company. He is known for his work in church growth and his insights on the principles of leadership and decision-making. He is also a pastor of True
  Light Presbyterian Church in Alhambra, CA, and enjoys riding his bicycle and swimming weekly.
