  career_goals: Jennifer aims to advance to a regional operations director role within the next five years, overseeing multiple sites and driving efficiency through lean management practices. She is focused
    on mentoring emerging leaders, implementing continuous‑improvement programs, and strengthening the company’s community ties. A long‑term ambition includes consulting for small‑business owners in Baraboo
    to help them modernize operations while preserving the town’s local character.
