persona_description: A scientist working at the Agricultural Research Service (ARS) Center for Medical, Agricultural and Veterinary Entomology (CMAVE) in Gainesville, Florida, who is researching the use
  of parasitic phorid flies as a vector for infecting fire ants with microsporidia. The scientist is collaborating with entomologists from CMAVE and the ARS South American Biological Control Laboratory
  in Hurlingham, Argentina, to test the effectiveness of this method of controlling fire ant populations. The scientist's research interests include the use of parasitic insects as biological control agents
  and the development of new strategies for controlling invasive species.
