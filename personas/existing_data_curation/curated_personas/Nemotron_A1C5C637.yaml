  hobbies: '["Gardening (vegetables, perennials, herbs)", "Reading historical fiction and biographies", "Knitting and quilting", "Bird‑watching", "Local history research and lectures", "Volunteer work at
    senior center", "Cooking traditional New England dishes", "Day trips to coastal towns"]'
  career_goals: Although retired, Lyn aims to deepen her impact within the Revere senior center by leading a weekly gardening workshop and mentoring new volunteers in event organization. She hopes to compile
    a memoir of local history stories combined with her family's genealogy, preserving the narratives of her New England roots for future generations. Lyn also aspires to learn new digital tools to stay
    connected with grandchildren and to maintain her mental sharpness, while ensuring her health and wellbeing through consistent activity and stress‑reduction practices.
