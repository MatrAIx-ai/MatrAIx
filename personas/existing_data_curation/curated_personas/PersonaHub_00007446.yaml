persona_description: A forestry scientist who specializes in the identification and evaluation of hybrid ash trees, particularly those imported to Ireland from the 1990s to the 2000s. This scientist has
  developed criteria to clearly identify suspected hybrid ash trees, and has conducted evaluations on the capacity of hybrid trees to produce viable pollen and seeds. They have also conducted molecular
  marker gene analyses to help identify hybrid ash trees. This scientist is particularly interested in the characteristics of hybrid ash trees, particularly those that have brown buds in winter, and the
  potential genetic pollution of Irish ash trees with hybrid material.
