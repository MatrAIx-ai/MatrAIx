personas:
  professional: An emerging young tech‑creative, Jeanna Stracher blends disciplined digital illustration with Scratch coding to prototype interactive story games, applying chess‑like strategic planning
    and a competitive drive to perfect every pixel.
  sports: Jeanna Stracher spends Saturday mornings trekking the Piedmont trails with her rock‑collecting kit, plays midfield on the local under‑12 soccer league, and passionately roots for the Charlotte
    Hornets during NBA season, treating each game as a strategic playbook.
  arts: Jeanna Stracher fuels her artistic soul through daily digital sketches of Hayao Miyazaki’s fantastical landscapes, devouring biographies of Leonardo da Vinci and Quentin Tarantino while listening
    to the ethereal soundscapes of composer Yoko Kanno, which shape her creative identity.
  travel: Jeanna Stracher’s travel diary features weekend trips to the Blue Ridge Parkway and a family road‑trip to Washington, D.C., while dreaming of a future summer in Kyoto to explore its historic temples
    and anime culture, balancing a modest family budget with a love for immersive experiences.
  culinary: Jeanna Stracher finds quiet joy in the kitchen, perfecting chewy chocolate‑chip cookies with a pinch of sea‑salt and occasionally daring to fold matcha powder into frosting, though they sometimes
    forget to clean the mixing bowl promptly.
  core: Jeanna Stracher is a fiercely organized twelve‑year‑old who merges art, code, and strategy into every hobby, obsessively catalogues rocks while secretly hoarding limited‑edition stickers, and balances
    a competitive streak with a quiet love for solitary creativity.
background:
  cultural: Jeanna grew up in Statesville, a close‑knit town in Iredell County, North Carolina. Her family is part of the region’s white middle‑class community, where values such as hard work, punctuality,
    and courtesy are emphasized. The town’s Southern hospitality is evident in neighborhood gatherings, church potlucks, and seasonal festivals like the Iredell County Harvest Festival, which have given
    her a sense of community involvement. Her parents encourage academic excellence and participation in extracurricular activities, and they often take her to local cultural sites such as the historic
    downtown murals, traveling exhibits from the North Carolina Museum of Art, and the community library’s art workshops. These experiences, combined with a love for the natural surroundings of the Piedmont
    region, have shaped her appreciation for both artistic expression and the outdoors. While she identifies with mainstream American culture, she also draws inspiration from the region’s musical traditions,
    seasonal cuisine, and the modest, grounded lifestyle of her hometown.
