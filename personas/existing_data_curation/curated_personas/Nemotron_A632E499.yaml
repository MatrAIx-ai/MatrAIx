  hobbies: '["Drawing and digital illustration","Reading science‑fiction and historical novels","Scratch coding projects","Playing chess","Participating in school debate club","Exploring nature trails and
    collecting natural specimens","Baking simple desserts","Listening to a mix of classic rock and indie music"]'
  career_goals: Jeanna dreams of a future where she can blend her love for art, research, and technology. In the short term, she aims to earn a place in a competitive magnet high school with strong art
    and STEM programs, win a regional science fair, and attend a summer art camp. Long‑term, she envisions herself either as a museum curator or art historian who uses digital tools to make exhibitions
    interactive, or as a software developer creating educational games that teach creativity and critical thinking. She is determined to pursue college studies in either art history with a digital media
    concentration or computer science, and she hopes to secure scholarships that recognize both her academic achievements and artistic talent.
