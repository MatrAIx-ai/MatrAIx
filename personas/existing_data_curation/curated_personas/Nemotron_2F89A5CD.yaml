personas:
  professional: Wanda Stokely, an aspiring junior scientist with a knack for organizing school science fairs, channels her curiosity and disciplined planning into hands‑on experiments and meticulous LEGO
    prototypes.
  sports: Wanda Stokely captains the Scottsville Strikers youth soccer team, organizes practice drills with the same precision she applies to LEGO builds, and cheers for the Buffalo Bills on game nights,
    balancing active play with community spirit.
  arts: Wanda Stokely shines in the school choir, delighting audiences with renditions of 'Let It Go' and 'A Whole New World,' while also loving the whimsical illustrations of Dr. Seuss and the energetic
    pop songs of Taylor Swift, which inspire her to design vibrant posters for the after‑school art club.
  travel: Wanda Stokely loves weekend nature walks through the rolling farms of Livingston County, has visited Niagara Falls on a school field trip, and dreams of exploring the coral reefs of the Great
    Barrier Reef and the Disney parks of Orlando, balancing curiosity with the practical constraints of family budgets.
  culinary: Wanda Stokely helps harvest tomatoes and peppers from the family garden, then enjoys assembling homemade pizza with fresh mozzarella, basil, and a drizzle of olive oil, while also favoring classic
    peanut butter‑banana sandwiches and the occasional chocolate chip cookie, though they sometimes forget to clean up the kitchen afterward.
  core: Wanda Stokely is a meticulously organized, sociable eight‑year‑old who juggles chemistry experiments, soccer captain duties, and a love for performing, yet often leaves LEGO pieces scattered around
    the living room.
background:
  cultural: Wanda is a white American raised in Scottsville, a small town in Livingston County, New York. The community blends rural farmland with tight‑knit neighborhood life, emphasizing school involvement,
    local traditions such as the county fair, and community service. Her family participates in a local church and values punctuality, hard work, and helping neighbors. These cultural influences nurture
    her practical mindset, strong organizational habits, and sociable disposition, encouraging her to take leadership roles in school and community activities while staying grounded in the town’s supportive
    environment.
attributes:
  skills: '[''Organizational planning'', ''Time management for school tasks'', ''Reading comprehension'', ''Creative writing'', ''Basic scientific experimentation'', ''Effective communication'', ''Leadership
    in group projects'', ''Problem solving'', ''Digital literacy (educational software)'', ''Event coordination'']'
  hobbies: '[''Reading adventure and science books'', ''Building LEGO models'', ''Conducting simple science experiments'', ''Playing soccer'', ''Singing in school choir'', ''Acting in classroom plays'',
    ''Gardening with family'', ''Nature walks and collecting specimens'', ''Designing posters for school art club'', ''Organizing after‑school events'']'
  career_goals: Wanda dreams of becoming a scientist who can discover new things about the natural world, a goal sparked by her love of simple experiments and her curiosity about how things work. She also
    envisions herself as a teacher, sharing knowledge with other children and leading engaging classroom projects. In the short term, she aims to win the school science fair, become the class leader of
    the STEM club, and earn top grades in math and science. Long‑term, she hopes to earn a college degree in a STEM field, conduct research that helps the community, and organize community outreach events
    such as local science workshops for younger kids.
