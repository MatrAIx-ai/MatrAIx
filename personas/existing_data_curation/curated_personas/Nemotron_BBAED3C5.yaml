  hobbies: '[''fishing'', ''hunting'', ''DIY woodworking'', ''home repair projects'', ''attending rodeos'', ''listening to country music'', ''watching Dallas Cowboys football'', ''weightlifting'', ''reading
    nonfiction (history, self-improvement)'']'
  career_goals: Mike aims to move into a supervisory role within the distribution center, such as a shift lead or warehouse manager, where he can apply his organizational strengths to larger teams. He plans
    to earn a Certified Logistics Associate certification and later pursue a Certified Professional in Supply Chain Management (CPSCM) credential. Over the next five years, he hopes to transition into a
    position overseeing safety compliance and training, leveraging his OSHA expertise. Ultimately, Mike aspires to start his own small freight brokerage or material‑handling service, providing reliable,
    structured solutions for regional businesses while securing financial stability for retirement.
