  career_goals: Linda dreams of future careers that let her explore her curiosity while applying practical solutions. She aspires to become a veterinarian because she loves animals and wants to help them
    stay healthy, and she also imagines herself as an astronaut or scientist, exploring the world and solving problems. Her competitive streak fuels a desire to win school science fair ribbons and excel
    in academic challenges, and she is motivated to study hard to make these ambitions a reality.
