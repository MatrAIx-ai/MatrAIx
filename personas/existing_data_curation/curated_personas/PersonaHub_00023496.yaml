persona_description: A neuroscientist and neurologist who specializes in the study of the brain and its functions, particularly in the treatment of neurological disorders such as stroke. He is currently
  involved in a clinical trial to test the safety and effectiveness of stem cells in treating stroke patients, using foetal cells as a source for the stem cells. He is a consultant neurologist at Southern
  General Hospital and a professor at Glasgow University.
