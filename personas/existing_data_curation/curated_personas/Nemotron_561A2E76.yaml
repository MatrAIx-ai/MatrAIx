  hobbies: '["Visiting art museums", "Painting", "Photography", "Playing piano", "Hiking", "Amateur astronomy", "Reading non‑fiction", "Collecting vintage eyeglass frames", "Cooking", "Attending local theater"]'
  career_goals: At 53, Charles aims to position his practice as the premier eye‑care provider in Lucas County by expanding services to include AI‑assisted retinal screening and a dedicated low‑vision clinic.
    He plans to mentor a younger associate optometrist to ensure continuity and foster a collaborative environment. He also seeks to publish case studies on innovative vision‑therapy techniques in professional
    journals, host quarterly community vision‑health workshops, and win regional business excellence awards. Long‑term, he envisions transitioning to a part‑time consulting role while maintaining a creative
    outlet through design of custom eyewear frames.
