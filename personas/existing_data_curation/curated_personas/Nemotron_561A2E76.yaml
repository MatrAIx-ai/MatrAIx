personas:
  professional: An experienced optometrist with a quarter-century of clinical practice, Charles Fuentes blends cutting-edge diagnostics like OCT and tele-optometry with an artist's eye for frame selection,
    leading his Lucas County clinic toward AI-assisted retinal screening while juggling a somewhat chaotic schedule and a fierce drive to outpace regional competitors.
  sports: A weekend hiker and occasional amateur astronomer, Charles Fuentes hits the Maumee River trail with the local River Guardians hiking club, roots for the Toledo Mud Hens in baseball, tracks the
    Cleveland Browns' season, and keeps a modest dumbbell routine at home, preferring low-key fitness over organized team sports.
  arts: An avid museum-goer and weekend painter, Charles Fuentes draws compositional inspiration from Monet's water lilies and Ansel Adams' chiaroscuro, curates a private collection of mid-century eyeglass
    frames, and often clocks in at community gatherings to play piano renditions of Lang Lang's Chopin variations.
  travel: An inquisitive traveler, Charles Fuentes has trekked the Alpine trails of Switzerland, explored the art-laden streets of Florence, and spent a starlit week in New Zealand's Canterbury region for
    astrophotography, while reserving future plans for a road-trip through the Pacific Northwest's volcanic landscapes.
  culinary: A culinary experimenter, Charles Fuentes whips up classic coq au vin with a twist of smoked paprika, perfects saffron risotto using heirloom Arborio rice, and indulges in seasonal farm-to-table
    fare such as roasted beet-goat cheese salads garnished with fresh basil and toasted walnuts.
  core: Charles Fuentes is a curious, art-infused optometrist who balances a high-tech practice with spontaneous vintage frame hunts, weekend hikes, and an ever-evolving kitchen, all while tolerating a
    disorganized schedule and a competitive streak that drives them to outshine peers.
background:
  cultural: Charles was raised in a small Midwestern town near Toledo, Ohio, in a middle‑class family of German and Irish ancestry. His parents, both public‑school educators, emphasized community service,
    self‑reliance, and a practical approach to life—values typical of the regional culture. Early exposure to school art programs and local cultural festivals sparked his lifelong appreciation for visual
    arts and unconventional ideas. While his heritage ties him to the broader White American experience, his upbringing in the heartland of Ohio blends modesty, independent thinking, and a deep connection
    to the local community.
attributes:
