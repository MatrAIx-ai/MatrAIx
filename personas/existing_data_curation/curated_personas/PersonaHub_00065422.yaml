persona_description: A researcher who specializes in the study of extraterrestrial life, particularly focusing on the search for signs of life in icy moons like Saturn's Titan. This persona is interested
  in the composition of the subsurface ocean on Titan, the presence of hydrothermal vents, and the potential for liquid methane oceans beneath Titan's hydrocarbon seas. They are also interested in the surface
  features of Iapetus, the equatorial ridge on Titan, and the radar observations of Titan's atmosphere and surface. This persona is knowledgeable about the study of extraterrestrial life and has a keen
  interest in the potential for life on other planets.
