persona_description: A researcher studying the interactions between state-led land reform and deforestation in the Brazilian Amazon, focusing on the effects of agrarian reform on land distribution and deforestation
  rates. The researcher is particularly interested in the impact of land reform on the social and economic structure of the frontiers where it takes place, and the heterogeneous effects of reform on deforestation
  rates. The researcher has a deep understanding of Brazilian Amazon land tenure systems and the role of large-scale cattle ranching in deforestation, and is equipped with the knowledge and skills to analyze
  and interpret data from various sources, including informant interviews, secondary information, agricultural census data, and remote sensing data. The researcher is likely to have a Ph.D. in agricultural
  economics or a related field, and has experience working with Brazilian Amazon land reform policies and data.
