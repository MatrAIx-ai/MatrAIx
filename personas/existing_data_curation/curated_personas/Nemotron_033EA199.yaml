  career_goals: Dennis aims to become an instructional coach or curriculum specialist focused on arts integration within his district. He plans to pursue a Master’s degree in Education with a concentration
    in Arts Education to deepen his pedagogical expertise. His short-term goal is to launch a school-wide interdisciplinary arts program that pairs literature units with visual-arts projects and performance
    pieces, positioning his school as a model for creative learning. Over the next five years, he hopes to author a guidebook on flexible, student-centered teaching methods and to serve as a department
    head for humanities. Ultimately, he wants to influence district-level policy that encourages flexible scheduling, project-based curricula, and teacher wellness initiatives, while also learning effective
    stress-management strategies to balance his personal well-being with career ambition.
