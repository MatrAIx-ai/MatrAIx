personas:
  professional: Loretta Swicegood, a 36‑year‑old visual arts and creative writing instructor, designs data‑driven adult curricula, utilizes digital platforms like Google Classroom and Canva, and leverages
    their charismatic public speaking to energize community workshops, while their competitive nature pushes relentless refinement of lesson plans.
  sports: Loretta Swicegood cheers for the Brunswick Dockers baseball team, participates in a weekend yoga class and sunrise runs along the salt marsh, and channels their competitive streak into heated
    Settlers of Catan tournaments at the local café, while staying mindful of a busy schedule.
  arts: Loretta Swicegood frequents the Coastal Museum of Art and the historic Savannah Historic District galleries, attends experimental theater productions at Emerging Voices, curates karaoke‑themed improv
    evenings, and draws creative inspiration from artists like Kehinde Wiley and musicians such as James Blake.
  travel: Loretta Swicegood prefers road‑trip explorations of coastal heritage sites, having toured Charleston’s historic district, Savannah’s riverfront, and the Outer Banks, and they dream of a solo cultural
    immersion in Lisbon to study its maritime traditions while budgeting carefully.
  culinary: Loretta Swicegood delights in perfecting low‑country shrimp and grits, she‑crab soup, and oyster po’boys, seasoning dishes with fresh lemon zest, smoked paprika, and locally sourced okra, and
    they often experiment with fusion twists like mango‑salsa shrimp tacos.
  core: Loretta Swicegood blends relentless curiosity, meticulous organization, and a sociable, competitive spirit, constantly channeling stress into yoga, board‑game challenges, and creative projects,
    while their habitual over‑thinking adds a quirky edge to community life.
background:
  cultural: Loretta was raised in a multigenerational white Southern family in Brunswick, Georgia, where the rhythm of coastal life and the warmth of Southern hospitality shaped her values. Her upbringing
    was steeped in Lowcountry traditions—from church gatherings and community picnics to the annual Shrimp Festival that celebrates the region’s maritime heritage. Growing up near the historic Gullah‑Geechee
    enclave, she developed an appreciation for the unique African‑American cultural expressions of the area, often incorporating Gullah storytelling and music into her classroom projects. The blend of coastal
    ecology, Southern cuisine (especially shrimp, grits, and collard greens), and a close‑knit community ethos informs her worldview and fuels her commitment to preserving and sharing local culture through
    education.
attributes:
  skills: '["Visual Arts Instruction", "Creative Writing Workshops", "Lesson Planning", "Curriculum Design", "Public Speaking", "Event Coordination", "Digital Learning Platforms", "Data-Driven Assessment",
    "Classroom Management", "Facilitation of Group Discussions", "Community Outreach", "Strategic Planning"]'
  hobbies: '["Visiting Art Galleries", "Exploring Historic Sites", "Contemporary Music and Experimental Theater", "Hosting Book Clubs", "Karaoke and Improv Sessions", "Strategic Board Games", "Puzzle Competitions",
    "Yoga", "Marshland Walks", "Reflective Journaling and Sketching", "Cooking Low‑Country Seafood", "Volunteering at Community Festivals"]'
  career_goals: Though Loretta currently holds a high school diploma, she is pursuing an associate’s degree in Liberal Arts with the goal of transferring to a bachelor's program in Education. She aims to
    become a lead instructor at the Brunswick Community College, where she can develop interdisciplinary courses that merge art, technology, and Lowcountry cultural heritage. Loretta also plans to launch
    a community makerspace that offers workshops in visual arts, digital media, and storytelling, fostering creative entrepreneurship in Glynn County. Over the next five years she hopes to present her innovative
    teaching methods at regional education conferences, publish articles in pedagogical journals, and eventually author a guidebook on integrating local cultural assets into classroom instruction.
