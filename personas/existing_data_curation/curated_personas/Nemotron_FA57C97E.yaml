  career_goals: Lucy aims to translate her extensive informal experience into a formal role within a nonprofit or community organization, ideally as a program coordinator or administrative assistant. She
    plans to obtain a GED and complete a short certification in nonprofit management or office administration within the next two years. Her long‑term ambition is to lead a local senior‑services program
    or a community garden initiative, using her organizational strengths to create sustainable, supportive environments for neighbors. She also hopes to eventually start a small home‑based catering service
    that leverages her cooking skills and love for community events.
