    and bird‑watching in state parks'', ''Listening to classic country music while driving'']'
  career_goals: Wanda aims to maintain a steady, dependable driving schedule through the next five years, targeting a perfect safety record that could earn her a company safety award. She plans to obtain
    an additional endorsement for hazardous‑material transport, enhancing her versatility while keeping her routine intact. Looking ahead to retirement, she hopes to transition into a mentorship role, training
    younger CDL candidates at the local community college or within her employer’s fleet program. Additionally, she is considering launching a small, part‑time local courier service that leverages her community
    connections and business knowledge, providing a reliable supplemental income while preserving her familiar schedule.
