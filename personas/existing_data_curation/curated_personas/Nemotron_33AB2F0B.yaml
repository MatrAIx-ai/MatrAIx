personas:
  professional: Shawn Araujo is a retired farmhand turned community historian who leverages decades of hands‑on repair and carpentry skills to preserve local stories, while they channel their curiosity
    into mastering digital photography for documenting everyday life.
  sports: Shawn Araujo enjoys early‑morning walks with their dog, seasonal fishing trips to nearby lakes, follows the Chicago Cubs and the local high school football team, and they participate in the Waverly
    Community Garden Club's weekend softball league, balancing low‑impact activity with light competition.
  arts: Shawn Araujo delights in classic country icons like Johnny Cash and folk storytellers such as Bob Dylan, savors historical nonfiction by Doris Kearns Goodwin, they experiment with digital photography
    of sunrise fields, and they attend church choirs where gospel hymns echo their love for communal art.
  travel: Shawn Araujo prefers relaxed road trips with their dog, having visited the historic streets of Savannah, the national museums of Washington, D.C., and the scenic trails of Shenandoah National
    Park, they are planning future visits to the Grand Ole Opry and a family reunion in Texas, all budgeted within a modest retirement fund.
  culinary: Shawn Araujo relishes cooking traditional dishes like cornbread, chicken and dumplings, smoked trout, and apple pie, often experimenting with garden‑fresh herbs and canning methods, though they
    sometimes over‑salt a stew or forget the timer, leading to a charred crust they laugh off at church potlucks.
  core: Shawn Araujo embodies a gentle, curiosity‑driven elder who blends hands‑on craftsmanship with a love for storytelling, technology, and community, while they occasionally misplace glasses and spoil
    a batch of jam.
background:
  cultural: Shawn grew up in the heart of Iowa’s agricultural region, in a family of German‑American descent that emphasized hard work, modesty, and community. His upbringing in Waverly, a close‑knit small
    town, was shaped by the values of Midwestern hospitality, a strong church presence, and a deep connection to the land. These cultural influences foster a pragmatic outlook, a respect for tradition,
    and a willingness to lend a helping hand to neighbors.
