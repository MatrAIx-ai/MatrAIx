  hobbies: '[''gardening'', ''woodworking'', ''birdwatching'', ''listening to classic country and folk music'', ''reading historical nonfiction'', ''walking his dog'', ''playing bridge'', ''fishing'', ''cooking
    traditional Midwestern recipes'', ''digital photography'']'
  career_goals: Although retired, Shawn aims to stay active, healthy, and mentally engaged. He hopes to document his family’s stories and the history of Waverly for future generations, learn digital photography
    to capture everyday moments, and continue supporting his church and community through volunteer work. He also aspires to keep improving his ability to use technology so he can remain close to his grandchildren.
