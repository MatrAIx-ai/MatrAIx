personas:
  professional: Tara Jordan, a seasoned meat department specialist at a regional supermarket chain, leverages their meticulous inventory expertise, USDA‑compliant butchery skills, and curiosity‑driven workflow
    redesigns to drive yield optimization while preparing for a ServSafe Manager certification and a future family‑owned charcuterie boutique.
  sports: Tara Jordan hits the Appalachian Trail on weekends with their local hiking club, roots for the West Virginia Mountaineers football team, and occasionally joins a co‑ed recreational softball league
    at the community center for light cardio.
  arts: Tara Jordan finds creative solace in quilting intricate patterns inspired by the folk art of Mary Ann Wilson, attends regional craft fairs featuring musicians like Gillian Welch and the Avett Brothers,
    and devours historical novels by Philippa Gregory and James A. Michener to fuel their storytelling imagination.
  travel: Tara Jordan prefers meticulously planned road trips that blend hiking in Shenandoah National Park, a weekend genealogy dive in Colonial Williamsburg, and a culinary pilgrimage to Barcelona’s La
    Boqueria market, while dreaming of a summer tour of the Scottish Highlands to trace ancestral roots.
  culinary: Tara Jordan excels at crafting house‑smoked pork shoulder with applewood, dry‑cured pancetta using sea salt, juniper berries, and black pepper, and hand‑rolled wild boar sausage seasoned with
    smoked paprika and sage, regularly experimenting with rosemary, honey‑glazed ham, and a peppercorn‑crusted ribeye.
  core: Tara Jordan blends methodical butchery precision with an insatiable curiosity for heritage foods, balancing community‑focused compassion and a penchant for weekend gardening, all while occasionally
    over‑scheduling themselves to the point of missed meals.
background:
  cultural: Tara was raised in a middle‑class, white Appalachian family in Huntington, West Virginia. Her upbringing reflects the region’s values of self‑reliance, strong family ties, community reciprocity,
    and a love for hearty, home‑cooked meals. Frequent exposure to church gatherings, local festivals, and close‑knit neighborhoods fostered her compassionate and cooperative nature, while the area's working‑class
    heritage shaped her practical, curiosity‑driven outlook.
attributes:
  skills: '["Butchering and meat cutting", "Meat processing equipment operation", "Food safety and sanitation compliance", "Inventory control and stock management", "Customer service and sales", "Yield
    optimization", "Basic culinary knowledge (charcuterie, sausage making)", "Team coordination and shift supervision", "Problem solving and workflow improvement", "Basic computer skills for inventory tracking"]'
  hobbies: '["Gardening", "Home cooking (smoked and cured meats)", "Hiking", "Quilting", "Reading historical fiction", "Volunteering at animal shelters", "Participating in community cooking workshops",
    "Genealogy research", "Attending local music and craft fairs"]'
  career_goals: Tara aims to advance to a department manager role within her current supermarket chain, securing a ServSafe Manager certification to strengthen her food safety expertise. She dreams of opening
    a family‑owned charcuterie boutique that sources locally and offers high‑quality smoked and cured meats to the Huntington community. Mentoring new employees, promoting sustainable sourcing practices,
    and leading community nutrition and cooking workshops are also central to her long‑term ambitions, while balancing her family responsibilities.
