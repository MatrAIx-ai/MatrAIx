persona_description: A political scientist who specializes in the study of urban planning and governance. They have a keen interest in the ways in which architecture and urban design are used to manipulate
  and control human behavior, and they are particularly interested in the ways in which this power is currently being used to exclude and displace the poorest and most vulnerable members of society. They
  are a vocal advocate for the need to question and challenge the coercive, unmediated power of architecture, and they are committed to using their knowledge and expertise to help shape a more equitable
  and just urban environment.
