persona_description: A scientist or engineer working in the field of sustainable construction materials, particularly focused on developing low-energy, high-performance building blocks from waste materials.
  He is passionate about reducing the environmental impact of building construction and has a unique vision for the future of the building industry. He is dedicated to using his knowledge and expertise
  to create a sustainable, low-energy replacement for concrete blocks that can be used to build model homes, reducing the amount of waste products that end up in landfills. He is also interested in exploring
  the potential of using waste vegetable oil to create a new type of building block, the "Vegeblock."
