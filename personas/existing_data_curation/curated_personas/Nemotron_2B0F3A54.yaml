personas:
  professional: Liam Dunn, a two-year-old who spends hours arranging colorful building blocks into structured towers, balances curiosity with practicality by testing each construction for stability before
    moving on, and they show an early appreciation for organized problem-solving while remaining flexible enough to dismantle and rebuild when the pieces don’t fit.
  sports: Liam Dunn, a regular participant in the neighborhood toddler soccer playgroup and a budding fan of the Springfield Cardinals baseball team, enjoys crawling after soft balls in the park, they prefer
    small team practices over large crowded games, and they often mimic the Cardinals' cheering chant during bedtime.
  arts: Liam Dunn, an avid admirer of bright picture books and the cheerful tunes of children's music stars like Raffi and The Wiggles, spends afternoons humming 'Baby Shark' while drawing crayon dinosaurs,
    they find comfort in the predictable rhythms of 'Sesame Street' and cherish the gentle storytelling of classic Disney animated shorts.
  travel: Liam Dunn, who has explored the local aquarium, taken a weekend family trip to a beachside town in the Pacific Northwest, and visited the nearby national park's visitor centre, prefers short,
    familiar excursions with one or two caregivers, they dream of seeing the giant pandas at a zoo abroad but feel anxious about long flights.
  culinary: Liam Dunn, a picky but appreciative eater, loves creamy mac and cheese with a sprinkle of cheddar, soft banana slices, and apple wedges dipped in smooth peanut butter, they can stir their own
    bowl of yogurt with a tiny spoon but insist on serving meals on a divided, colorful plate to keep foods separate.
  core: Liam Dunn, a meticulous two-year-old who balances boundless curiosity with cautious routine, hoards tiny coins, watches over block towers for wobble, and quietly worries about the unknown, all while
    they are gentle and considerate toward friends and family.
background:
  cultural: Liam is raised in a middle‑class white family in Willoughby, Ohio, reflecting the Midwestern cultural values of community, modesty, and politeness. His family celebrates typical American holidays
    such as Thanksgiving, Christmas, and the Fourth of July, and also honors their Irish heritage on St. Patrick’s Day, incorporating traditional music and meals. The local community emphasizes small‑group
    interactions, neighborhood playdates, and a strong sense of safety, aligning with Liam’s preference for intimate social settings. Exposure to the lake‑adjacent environment encourages an appreciation
    for nature and outdoor recreation, which is woven into his everyday experiences.
