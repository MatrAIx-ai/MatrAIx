  career_goals: Cynthia dreams of a future where she can combine her love of art with helping others. She often says she wants to be an art teacher who makes children happy with pictures, a community helper
    who organizes fun activities at the local library, or a kind‑hearted storyteller who shares tales with families. Her ambitions are simple and rooted in her desire to create beauty, bring joy, and support
    the people she cares about.
