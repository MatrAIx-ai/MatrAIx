personas:
  professional: Edrey Ramos, a two‑year‑old who transforms the family bookshelf into a meticulously arranged mini‑library during pretend‑play, demonstrates early organizational instincts by sorting picture
    books by color and size, insists on a daily schedule of 'work' that mirrors adult routines, and they revel in the satisfaction of completing each tidy‑up task before snack time.
  sports: Edrey Ramos, a two‑year‑old who attends the Tiny Tumble Gymnastics Club’s small‑group toddler class at the local community center, prefers the predictable routine of warm‑up circles and obstacle
    courses, demonstrates a competitive streak by trying to be first to complete each activity, and they avoid large, noisy play areas in favor of the calm indoor soft‑play zone.
  arts: Edrey Ramos, a two‑year‑old who delights in repetitive melodies by The Wiggles and lullabies from the Disney Princess soundtrack, spends daily art time drawing circles and stick figures with a dedicated
    set of crayons, routinely revisits the same picture books as part of a comforting routine, and they gently explore simple rhythms on a toy xylophone while maintaining a quiet, observant demeanor.
  travel: Edrey Ramos, a two‑year‑old who prefers travel that sticks to a familiar itinerary—weekly trips to the nearby city park, monthly visits to Grandma’s house in Springfield, and occasional family
    outings to the local aquarium—finds new foreign destinations like Paris overwhelming, so they rely on parents to plan short, predictable stays with plenty of nap time and familiar meals.
  culinary: Edrey Ramos, a two‑year‑old with a picky palate that favors banana pancakes, plain cheese cubes, and steamed carrots, insists on a strict mealtime routine where they sit at the high chair for
    exactly ten minutes before eating, displays a budding culinary habit of helping stir oatmeal with a tiny silver spoon, and they consistently turn away from any new spices or unfamiliar sauces.
  core: Edrey Ramos, a two‑year‑old whose life revolves around meticulous routines, quiet observation, and a quiet competitive edge, they navigate the world with a blend of practical orderliness and an
    early‑age wariness of change.
background:
  cultural: Edrey is raised in a Nicaraguan-American household in Los Angeles. Spanish is spoken at home alongside English, and family traditions such as celebrating La Purísima, preparing gallo pinto,
    and dancing to marimba music are part of his upbringing. His parents emphasize family cohesion, respect for elders, and the value of hard work, shaping his emerging worldview. The blend of Nicaraguan
    cultural practices with the multicultural environment of Los Angeles provides him with a rich bilingual and bicultural experience.
attributes:
  skills: '[''following daily routines'', ''shape and color matching'', ''stacking blocks orderly'', ''basic vocabulary for familiar objects'', ''fine-motor coordination for page turning'', ''early self-care
    tasks (teeth brushing with help)'']'
  hobbies: '[''arranging toy cars in rows'', ''simple wooden puzzles'', ''building block towers'', ''listening to repetitive lullabies'', ''reading picture books with predictable stories'', ''helping with
    family cooking of traditional Nicaraguan dishes'']'
  career_goals: Although only two years old, Edrey shows early fascination with occupations that have clear structure and reliability. He often points to police officers and firefighters in picture books,
    admiring their uniforms and the way they follow set procedures. His parents interpret this as an early inclination toward a future career that values organization, routine, and responsibility—such as
    a logistics coordinator, professional organizer, or a public safety role.
