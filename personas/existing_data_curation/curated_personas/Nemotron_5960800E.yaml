  career_goals: Phun aims to deepen his community involvement by assuming a leadership role in local non‑profits that support immigrant families and seniors in Zionsville. He plans to launch a weekend cooking
    workshop that shares his Southeast Asian culinary heritage, potentially developing it into a modest side business. He also seeks to mentor younger volunteers, helping them build organizational and interpersonal
    skills, and to offer part‑time consulting to nearby small businesses seeking process improvements.
