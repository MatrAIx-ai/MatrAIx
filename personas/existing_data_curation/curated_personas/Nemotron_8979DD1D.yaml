  career_goals: Jean aims to transition into a senior legal operations role, such as Legal Project Manager or Compliance Officer, where she can combine her business acumen with her legal expertise to improve
    firm efficiency. She is considering pursuing a Juris Doctor part‑time to eventually become an attorney, but she also sees a path to leadership within a corporate legal department overseeing contracts
    and risk management. Her competitive drive pushes her toward certifications like Certified Paralegal (CP) and Project Management Professional (PMP), and she aspires to mentor junior staff while spearheading
    technology‑driven workflow improvements.
