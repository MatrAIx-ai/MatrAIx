persona_description: A historian who specializes in the study of environmental movements and activism in the United States, particularly focusing on the 1970s and 1980s. Their research interests include
  the causes, effects, and strategies of environmental movements, the role of government and non-governmental organizations in environmental issues, and the impact of environmental policies on society.
  They are particularly interested in the intersection of environmental activism and population growth, and the ways in which environmental concerns have evolved and changed over time. They are also knowledgeable
  about the key figures, events, and organizations involved in these movements, such as the Chittenden County Chapter of ZPG, the Population Institute, and the Limits to Growth.
