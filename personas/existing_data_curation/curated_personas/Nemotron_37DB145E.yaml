personas:
  professional: Stacey Smith is a budding visual storyteller who spends hours sketching intricate nature scenes and fantasy worlds, while also experimenting with simple coding projects in Scratch; they
    demonstrate an early blend of artistic imagination and logical problem‑solving.
  sports: Stacey Smith follows the Brooklyn Nets and the New York Knicks on TV, enjoys occasional weekend bike rides through Prospect Park, and participates in a beginner’s after‑school yoga class for kids,
    preferring low‑pressure activities that let them move quietly.
  arts: Stacey Smith is an avid fan of graphic novels like Kazu Kibuishi’s Amulet, draws inspiration from Hayao Miyazaki’s animation and the detailed line work of Chris Riddell, and spends free time creating
    origami cranes, knitting simple scarves, and building detailed LEGO dioramas, all of which they consider essential outlets for their vivid imagination.
  travel: Stacey Smith loves exploring local sites such as the Brooklyn Museum’s children’s exhibition, the New York Botanical Garden, and a weekend trip to Coney Island, while dreaming of visiting the
    Grand Canyon and Kyoto’s Arashiyama bamboo forest, favoring itineraries that combine nature walks and art stops.
  culinary: Stacey Smith prefers quick, colorful meals like strawberry‑banana smoothies, cheese‑crusted quesadillas, and homemade granola bars with oats and honey, often helping their parents in the kitchen
    to practice measuring ingredients while snacking on apple slices during drawing sessions.
  core: Stacey Smith is a solitary, curiosity‑driven nine‑year‑old who weaves art, puzzles, and quiet exploration into a uniquely introspective world, and they occasionally stay up late to finish a graphic
    novel.
background:
  cultural: Stacey grew up in a vibrant Brooklyn neighborhood that blends many cultures and artistic influences. Her family, of European‑American heritage, celebrates traditional American holidays while
    also taking part in local community events such as street fairs, multicultural festivals, and museum workshops. The eclectic art scene of Brooklyn—murals, galleries, and the Brooklyn Museum—has nurtured
    her appreciation for visual arts. Access to public libraries, after‑school programs, and diverse classmates at her elementary school exposes her to a wide range of perspectives, reinforcing a blend
    of mainstream American culture with the borough’s dynamic, multicultural atmosphere.
