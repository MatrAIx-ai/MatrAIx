  career_goals: Stacey dreams of turning her love of art and curiosity about new ideas into a career as a visual storyteller—illustrator of children's books, concept artist for animated films, or designer
    of interactive museum exhibits. She hopes to create immersive experiences that let others explore creativity at their own pace, blending her independent work style with occasional collaborative projects.
    In the long term, Stacey aspires to inspire young people through art and technology while working in environments that support quiet, focused creation.
