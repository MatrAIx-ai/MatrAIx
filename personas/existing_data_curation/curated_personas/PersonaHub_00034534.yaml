persona_description: A clergyman, ornithologist, and early adopter of Darwinism, Henry Baker Tristram was born in 1822 and died in 1906. He was an Englishman who studied at Durham School and Lincoln College,
  Oxford. He was ordained as a priest in 1846, but his health forced him to live abroad. He was a parson-naturalist, exploring the Sahara desert, Palestine, and other lands, and was a founder and original
  member of the British Ornithologists' Union. He was appointed a fellow of the Royal Society in 1868 and accumulated an extensive collection of bird skins. He is known for his attempts to reconcile creation
  and evolution, and for naming several birds after himself.
