  career_goals: Meg aims to steer her company through the next phase of growth by integrating sustainable practices into the core business model and expanding into emerging markets. She is dedicated to
    establishing a robust succession plan that empowers the next generation of leaders, while also launching a philanthropic foundation focused on mental health awareness and environmental stewardship in
    Sonoma County. Her long‑term ambition includes positioning the organization as a benchmark for ethical leadership and employee well‑being, reflecting her commitment to both corporate success and societal
    impact.
