  hobbies: '[''Hackathons'', ''Maker-space projects'', ''Volleyball'', ''Ultimate frisbee'', ''Cycling along the Cuyahoga River'', ''Live music concerts'', ''Cooking experimental dishes'', ''Reading science-fiction'',
    ''Puzzle and escape-room games'', ''Improv comedy classes'']'
  career_goals: Jennifer aims to become a principal electrical engineer within the next five years, leading R&D projects that integrate renewable energy sources into smart-grid and IoT platforms. She plans
    to file at least two patents on power-management innovations, publish technical papers, and become a sought-after speaker at industry conferences. To broaden her impact, she intends to pursue a part-time
    master's in energy systems, mentor junior engineers, and eventually launch her own consultancy that helps manufacturers adopt flexible, low-cost electronics solutions.
