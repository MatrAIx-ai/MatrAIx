personas:
  professional: Jennifer Morrison, a 27‑year‑old electrical engineer who thrives in hackathon‑driven environments, leverages her expertise in analog and digital circuit design, PCB layout, and embedded
    firmware to prototype IoT power‑management solutions while balancing bold curiosity with pragmatic standards, and often leads informal brainstorming sessions that showcase her competitive edge and persuasive
    communication.
  sports: Jennifer Morrison plays co‑ed volleyball with the Cuyahoga Volleyball Club and ultimate frisbee with the Cleveland Ultimate team, cycles the lakefront trail after work as a weekend ritual, and
    cheers loudly for the Cleveland Browns, Cavaliers, and Guardians while occasionally joining local pick‑up basketball games.
  arts: Jennifer Morrison frequently attends live shows at the Beachland Ballroom, where she revels in the sounds of indie rock acts like The National and Arcade Fire, while unwinding at home with sci‑fi
    novels such as The Expanse and puzzle games like The Witness, which fuel her creative problem‑solving mindset.
  travel: Jennifer Morrison favors spontaneous weekend getaways, often biking to nearby Lake Erie islands or road‑tripping to the historic town of Niagara‑on‑the‑Lake, while dreaming of a future European
    bike tour through Amsterdam’s canals and Copenhagen’s design‑focused neighborhoods, all on a modest travel budget balanced with her professional expenses.
  culinary: Jennifer Morrison loves experimenting in the kitchen, frequently whipping up spicy Korean bibimbap with gochujang, lemon‑herb grilled salmon seasoned with fresh dill, and homemade sourdough
    loaf, and she enjoys pairing her meals with craft beers from local Cleveland breweries.
  core: Jennifer Morrison merges a restless curiosity for cutting‑edge electronics with a laid‑back, sometimes disorganized lifestyle, turning every hackathon into a competitive playground while occasionally
    forgetting to pay a bill on time.
background:
  cultural: Jennifer grew up in a middle-class white family in the suburbs of Cleveland, where the region's manufacturing legacy sparked her early fascination with electronics. Her upbringing blended Midwestern
    values of hard work and community participation with exposure to the city's multicultural festivals and vibrant maker scene. She regularly volunteers at local STEM outreach programs for high school
    students and is active in the IEEE Cleveland chapter, reflecting a cultural identity rooted in practicality, collaborative spirit, and an openness to new ideas while maintaining a healthy skepticism
    toward unproven trends.
