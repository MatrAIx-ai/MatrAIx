  hobbies: '[''Painting'', ''Reading historical biographies and African‑American literature'', ''Hiking and birdwatching'', ''Playing chess'', ''Gardening'', ''Woodworking'', ''Community theatre'']'
  career_goals: Although retired from formal employment, Thomas aims to deepen his impact on the Hurricane community by mentoring younger volunteers and helping establish a small local museum dedicated
    to regional and African‑American heritage. He aspires to author a memoir that intertwines his personal journey with the broader narrative of Black families who settled in rural Utah, preserving those
    stories for future generations. Additionally, Thomas hopes to collaborate with the county cultural affairs office to launch an annual art and history festival that showcases local talent and invites
    interdisciplinary exchange.
