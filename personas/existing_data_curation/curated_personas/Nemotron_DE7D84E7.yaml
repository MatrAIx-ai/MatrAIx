personas:
  professional: Trudy Keller, a seasoned retail veteran with three decades of experience, leverages meticulous inventory management, courteous customer service, and conflict‑resolution expertise to keep
    stores running like well‑oiled machines, and now channels that methodical edge into training new staff as they pursue a senior associate role.
  sports: Trudy Keller follows the Carolina Panthers during football season, enjoys occasional games of the local Marion Senior Fitness Club, and regularly walks the Blue Ridge Trail with the Blue Ridge
    Trail Walkers group to stay active.
  arts: Trudy Keller, an avid quilter, crafts patterned blankets inspired by traditional Southern designs, devotes monthly book‑club evenings to Charles Frazier and Barbara Kingsolver, and listens to the
    timeless guitar work of Doc Watson while tending their garden.
  travel: Trudy Keller prefers carefully planned road trips to historic towns such as Asheville, Thomasville, and Savannah, books charming B&Bs months in advance, balances wanderlust with a modest travel
    budget, and dreams of a leisurely pilgrimage to the Blue Ridge Parkway in autumn.
  culinary: Trudy Keller enjoys cooking classic Southern meals—fried chicken, collard greens seasoned with smoked turkey, and peach cobbler—using fresh garden produce like sweet potatoes and heirloom tomatoes,
    and while their cooking skill is solid, they sometimes over‑salt dishes in the pursuit of authentic flavor.
  core: Trudy Keller is a methodical, community‑oriented retiree whose love for quilting, gardening, and steady retail mentorship blends with a penchant for budgeting, health monitoring, and low‑key travel.
background:
  cultural: Trudy grew up in Marion, North Carolina, a town rooted in Appalachian and Southern traditions. Her upbringing emphasized community, hospitality, and a strong connection to the land. Family gatherings
    often centered around home‑cooked meals, church fellowship, and participation in local festivals such as the Rutherford County Farm Show. She was raised with a respect for modesty, personal responsibility,
    and the value of hard work—principles that continue to shape her interactions. While her ethnic background is white, she identifies closely with the cultural heritage of rural Western North Carolina,
    including an appreciation for Appalachian folk music, Southern storytelling, and a deep sense of place that informs her commitment to serving her neighbors.
attributes:
  skills: '["Customer Service", "Inventory Management", "POS System Operation", "Visual Merchandising", "Sales Data Analysis", "Cash Handling", "Loss Prevention", "Staff Scheduling", "Product Knowledge",
