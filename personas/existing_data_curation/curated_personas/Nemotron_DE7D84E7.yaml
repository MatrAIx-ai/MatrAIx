  hobbies: '["Gardening", "Quilting", "Reading Historical Fiction", "Birdwatching", "Nature Walks", "Crossword Puzzles", "Cooking Southern Cuisine", "Attending Church Services", "Volunteering at the Community
    Library", "Small Book Club"]'
  career_goals: Trudy aims to transition from front‑line sales to a mentorship role within the next two years. She hopes to become a senior associate or assistant manager, where she can train newer staff,
    streamline store processes, and contribute to strategic planning. Ultimately, she plans to reduce her hours as she approaches retirement, focusing on sharing her accumulated retail knowledge with the
    community—perhaps through part‑time consulting for local small businesses or volunteering to teach basic retail skills at the community college. She also wishes to ensure the store remains a stable,
    welcoming environment for Marion’s residents.
