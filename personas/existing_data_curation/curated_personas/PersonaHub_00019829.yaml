persona_description: A historian who specializes in the early history of Virginia, particularly the period from the arrival of the first settlers to the Revolutionary War. This person is interested in the
  religious and social changes that took place during this time, and the impact of the early settlers on the development of Virginia as a nation. They are knowledgeable about the history of the Scotch-Irish
  settlers in Virginia, and have a particular interest in the story of Selim, the Algerine who was taken in by the early settlers and later became a Christian. This person is also interested in the role
  of religion in the early history of Virginia, and how it shaped the development of the state's identity and culture.
