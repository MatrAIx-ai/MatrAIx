personas:
  professional: Sheri House is a budding marketing professional whose knack for event planning and social media design, combined with a competitive drive and skeptical eye, propels her to lead community
    outreach campaigns while juggling a part‑time degree.
  sports: Sheri House spikes a volleyball for the Racine Rough Riders league, hits the shoreline trails for sunrise hikes, and rallies for the Milwaukee Bucks and Green Bay Packers, blending team spirit
    with personal fitness goals.
  arts: Sheri House’s creative outlet includes capturing street scenes on a Canon EOS M50, binge‑watching Maya Rudolph’s sketches, dancing to Bad Bunny’s reggaeton, and admiring the photographic work of
    Vivian Maier, all of which fuel her event‑design aesthetic.
  travel: Sheri House prefers weekend road trips to Chicago’s museum district, a summer getaway to Door County’s apple orchards, and dreams of backpacking through Portugal’s coastal towns, always planning
    itineraries on Google Maps while budgeting with a travel spreadsheet.
  culinary: Sheri House enjoys crafting avocado toast topped with feta and chili flakes, savoring a perfectly pulled espresso‑driven latte, and whipping up quick stir‑fry chicken with broccoli, yet she
    admits to over‑ordering cheese curds during festival booths.
  core: Sheri House is a socially‑charged, competition‑driven twenty‑four‑year‑old who balances meticulous planning with spontaneous coffee breaks, always chasing the next event, playlist, or hike.
background:
  cultural: Sheri grew up in Racine, Wisconsin, a Midwestern city with strong German and Polish roots. Her family’s cultural traditions reflect typical Midwestern values of modesty, community involvement,
    and a work‑ethic inherited from generations of factory and agricultural workers. She was raised in a Protestant (United Church of Christ) household that emphasized church‑based service and participation
    in local festivals such as Racine’s Polish Days. The proximity to Lake Michigan instilled a love for outdoor activities and seasonal community gatherings, while the regional emphasis on practical education
    influenced her curiosity balanced with pragmatism.
