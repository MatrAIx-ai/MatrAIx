  career_goals: Sheri aims to transition from her current hiatus into a full‑time role in marketing or community outreach within the next year. She plans to complete her bachelor’s degree in Business Administration
    or Communications while gaining hands‑on experience as a marketing coordinator for a local business or nonprofit. Over the next five years, she aspires to advance to a senior marketing manager or project
    lead position, leveraging her competitive drive to lead campaigns and potentially launch her own event‑planning consultancy that focuses on Midwestern community festivals.
