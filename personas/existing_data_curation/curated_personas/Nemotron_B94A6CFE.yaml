personas:
  professional: Karen Lavigne, a veteran taxi driver with three decades of mastering the Rogue River Valley’s winding roads, blends meticulous GPS navigation with old‑school map reading, excels in defensive
    driving and routine vehicle upkeep, leverages sharp interpersonal skills to de‑escalate passenger tensions, and channels a competitive streak into consistently top‑rated on‑time performance while planning
    a mentorship program for new drivers.
  sports: Karen Lavigne, an avid hiker who tackles the Rogue River Valley’s trails each spring and fall, stays fit through weekly morning walks and occasional cross‑country skiing in the Cascades, cheers
    on the Oregon Ducks football team, and participates in the local “Trailblazers” hiking club, while preferring low‑impact activities due to knee soreness.
  arts: Karen Lavigne, a craft‑oriented creative who knits scarves to the rhythm of Led Zeppelin’s “Stairway to Heaven,” carves simple cedar tables while listening to The Rolling Stones, and volunteers
    at the town library where they champion readings of Pacific Northwest author Lew Wycznski, finds solace in tactile arts that balance their practical mindset.
  travel: Karen Lavigne, a road‑trip enthusiast who plots scenic drives through Oregon’s wine country and the Columbia River Gorge in meticulous spreadsheets, favors mid‑range motels over luxury hotels,
    and dreams of a pilgrimage to Canada’s Pacific Rim National Park, balancing a desire for adventure with a pragmatic retirement budget.
  culinary: Karen Lavigne, a modest home cook who harvests heirloom tomatoes, kale, and native marionberries from their garden to whip up rustic salmon‑and‑marionberry chowder, favors earthy flavors like
    sage and rosemary, and occasionally treats friends to hand‑knit napkins at dinner parties.
  core: Karen Lavigne, a fiercely competitive yet wary 59‑year‑old taxi veteran whose mornings begin with birdwatching, classic‑rock road trips, and a habit of double‑checking every spreadsheet before bedtime.
background:
  cultural: Karen is a white American whose family settled in Oregon’s Willamette Valley in the early 20th century. Growing up in a modest, self‑sufficient rural environment, she internalized values of
    independence, hard work, and respect for the natural world that characterizes the Pacific Northwest. Her upbringing emphasized practical, hands‑on problem solving and a strong sense of community belonging,
    reflected in her participation in local events and volunteer activities. While she acknowledges the region’s Indigenous heritage, her cultural identity centers on small‑town American traditions, a love
    of the outdoors, and a pragmatic approach to life.
attributes:
