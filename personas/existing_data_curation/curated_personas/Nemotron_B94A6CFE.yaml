  hobbies: '[''Hiking'', ''Birdwatching'', ''Gardening'', ''Reading Oregon history'', ''Knitting'', ''Woodworking'', ''Classic rock listening'', ''Volunteering at the library'']'
  career_goals: Karen is focused on securing a financially stable retirement within the next five years. She intends to upgrade her current taxi to a more fuel‑efficient hybrid and obtain a commercial driver’s
    license that will allow her to expand services to airport shuttles and regional deliveries, boosting her income. She also aspires to launch a mentorship program for new drivers, sharing her safety and
    efficiency expertise, and eventually co‑own a community‑run taxi cooperative that emphasizes fair wages and reliable service for Rogue River and surrounding towns. Her practical mindset drives her to
    set measurable targets for earnings, vehicle upgrades, and community impact.
