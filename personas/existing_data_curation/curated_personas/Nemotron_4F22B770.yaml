  hobbies: '[''Dominoes'', ''Community soccer'', ''Bomba and plena dancing'', ''Traditional Puerto Rican cooking'', ''Gardening'', ''Recreational fishing'', ''Woodworking'', ''Reading historical biographies'',
    ''Church gatherings and volunteer activities'']'
  career_goals: Andre aims to re‑enter the workforce in a part‑time or volunteer‑driven capacity that leverages his organizational strengths, such as serving as a coordinator for local festivals, assisting
    the municipal office with community outreach, or offering consulting services to small family‑owned businesses in Aguada. He plans to earn a certification in community project management (CAPM) within
    the next two years and to mentor younger residents, helping them develop similar practical skills. Ultimately, he wants to blend structured work with his sociable nature, ensuring a stable income while
    remaining actively engaged in his community.
