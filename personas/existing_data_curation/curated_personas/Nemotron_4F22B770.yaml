personas:
  professional: Andre Garces, a seasoned community project coordinator, leverages their methodical planning, bilingual communication, and love for organized festivities to streamline local events and support
    small family businesses, all while meeting tight deadlines with reliable, hands‑on execution.
  sports: Andre Garces, a regular participant in informal weekend soccer matches on Aguada’s municipal field, cheers for the Criollos de Caguas baseball team and follows the Capitanes de Arecibo basketball
    squad, while they maintain a modest personal fitness routine of early‑morning jogs along the coast.
  arts: Andre Garces, a devoted fan of traditional bomba and plena, frequently attends dance nights where the rhythms of legendary percussionist Tito Puente and the soulful voice of Ismael Rivera fill the
    ballroom, and they also enjoy classic films starring Rita Moreno that echo their island’s artistic heritage.
  travel: Andre Garces, who plans trips with meticulous checklists, favors relaxed beach escapes to Vieques and adventurous hikes in El Yunque, while they dream of a cultural pilgrimage to Seville’s Semana
    Santa and a weekend fishing charter off the Dominican Republic, balancing a modest travel budget with family obligations.
  culinary: Andre Garces, an avid home cook, delights in preparing arroz con gandules, pernil, and suflé de plátano using sofrito, sazón, and freshly harvested cilantro from their garden, and they never
    miss a chance to savor mofongo topped with garlic shrimp at local eateries.
  core: Andre Garces, a meticulous planner with a love for community celebrations, can be found juggling a calendar of festivals while they habitually forget to water their indoor potted plants, a quirk
    that leaves their living room a jungle of wilted succulents.
background:
  cultural: Andre identifies strongly with his Puerto Rican heritage, having grown up in Aguada, a town known for its coastal traditions, lively festivals, and close‑knit family networks. He is deeply rooted
    in Catholic customs, celebrating local patron saint festivals and participating in community processions. The Afro‑Caribbean rhythms of bomba and plena, as well as the Spanish colonial legacy, shape
    his musical and culinary tastes. Bilingual in Spanish and English, he navigates both local island culture and mainland influences, and he places a high value on family loyalty, communal support, and
    the preservation of island traditions.
