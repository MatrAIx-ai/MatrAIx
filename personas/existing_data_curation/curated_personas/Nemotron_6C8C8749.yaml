  hobbies: '[''Reading contemporary fiction'', ''Journaling'', ''Sketching'', ''Hiking local trails'', ''Yoga'', ''Meditation'', ''Baking'', ''Volunteering at community library'', ''Playing puzzle video
    games'', ''Listening to indie music'']'
  career_goals: Angela aims to build on her receptionist experience by earning an associate degree in Business Administration at a nearby community college, eventually moving into an office manager or administrative
    coordinator role. She hopes to develop leadership skills that allow her to mentor new staff while preserving the supportive, harmonious work environment she values. Long‑term, she envisions a career
    in health‑care administration or community services where she can combine her organizational talent with a genuine desire to help others, while also seeking a work setting that supplies resources for
    managing her anxiety and emotional well‑being.
