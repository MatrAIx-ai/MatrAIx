personas:
  professional: Angela Blair, an 18‑year‑old front‑desk associate at the Lathrop public library, leverages their courteous phone etiquette, rapid data entry, and empathetic de‑escalation skills to maintain
    a calm reception environment, while their curiosity drives them to automate scheduling processes and their occasional anxiety leads them to double‑check details for harmony.
  sports: Angela Blair enjoys weekend hikes on the Delta trails, attends a weekly yoga class at a community studio, and follows the Sacramento Kings (NBA) and San Jose Earthquakes (MLS) with fervor, while
    they also participate in a local hiking club and join casual frisbee games with friends each spring.
  arts: Angela Blair immerses themselves in contemporary fiction by Sally Rooney and Ocean Vuong, sketches watercolor scenes of local landscapes, and curates indie playlists featuring Phoebe Bridgers, Mitski,
    and The National, often sharing their drawings and baked treats at library events and coffee‑house open mics.
  travel: Angela Blair prefers low‑budget, meticulously planned weekend trips, having hiked Yosemite’s Half Dome, explored Portland’s record stores and food trucks, and yearning to backpack through the
    Canadian Rockies, balancing their love for adventure with the need for quiet spaces to manage anxiety.
  culinary: Angela Blair, a budding baker, frequently crafts chocolate‑chip oat cookies, lemon drizzle cake, and banana muffins using almond flour, honey, and fresh berries, modestly experiments with simple
    pantry recipes, and shares these treats at community library events and friends’ gatherings.
  core: Angela Blair is an empathetic, detail‑oriented 18‑year‑old who channels intense emotions into organized service work, creative hobbies, and disciplined budgeting, yet their anxiety often pushes
    them toward perfectionism, spontaneous snack binges, and occasional over‑checking of tasks.
background:
  cultural: Angela grew up in Lathrop, a small‑town community in California's Central Valley where agriculture, family‑run businesses, and a mix of long‑standing local traditions shape everyday life. Her
    family reflects a mainstream White American heritage common to many Mid‑western‑influenced settlers who moved west for opportunities; they emphasize hard work, neighborly kindness, and modest, community‑oriented
    values. While she participates in typical American holidays and school events, Angela is also aware of the region's diverse cultural fabric, which includes significant Hispanic and Asian influences,
    and she often engages in multicultural community activities that reinforce her inclusive and cooperative outlook.
