persona_description: 'A historian and art critic who specializes in Native American art, particularly ledger drawing. She is knowledgeable about the impact of conflict, captivity, and cultural domination
  on Native American arts and culture, and the creative force behind visual narratives as a means of renewal and healing. She is interested in the exhibition "Picturing Change: The Impact of Ledger Drawing
  on Native American Art" at the Hood Museum of Art, Dartmouth College, and is interested in the works of nineteenth-century Native American warrior-artists and their twentieth-century descendents who continue
  to use visual narratives on paper as a stepping stone into mainstream American fine arts practices. She is also interested in the impact of ledger drawing on Native American art and the ways in which
  it portrays the incredible perseverance of Native American arts and culture under extreme conditions of cultural suppression.'
