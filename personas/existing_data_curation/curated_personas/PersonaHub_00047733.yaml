persona_description: A researcher at the University of Maryland's Center for Integrative Environmental Research, Matthias Ruth, who specializes in analyzing the economic impacts of climate change on various
  US states, including Colorado, Georgia, Kansas, Illinois, Michigan, Nevada, New Jersey, and Ohio. Ruth has coordinated the research and directs the Center for Integrative Environmental Research at the
  University of Maryland. His research has concluded that the costs of climate change have already begun to accrue and are likely to endure, and that inaction or delayed action will make the ink run redder.
  Ruth's research has been supported by the Environmental Defense Fund, which tackles the most serious environmental problems with strong science, innovative markets, corporate partnerships, and effective
  laws and policy.
