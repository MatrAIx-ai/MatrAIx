  hobbies: '[''Woodworking'', ''Gardening'', ''Reading non-fiction (history, business, technology)'', ''Model railway building'', ''Cycling on local trails'', ''Fishing'', ''DIY home improvement projects'',
    ''Personal finance and investing'', ''Volunteer work at community food pantry (small‑group)'', ''Attending small church study groups'']'
  career_goals: Over the next few years, Justin aims to move into a store‑manager role where he can apply his organizational talent to improve operational efficiency and sales performance. He plans to earn
    a Certified Retail Management Professional credential and to deepen his data‑analytics skills, positioning himself for a future regional‑manager or retail‑operations consultant position. Ultimately,
    he envisions leveraging his expertise to advise small independent retailers on inventory control and customer‑experience strategies, or possibly opening a family‑run boutique that blends his love of
    practical products with his disciplined approach to business. All of his goals are anchored in achieving financial security for his family and leaving a legacy of professionalism and mentorship.
