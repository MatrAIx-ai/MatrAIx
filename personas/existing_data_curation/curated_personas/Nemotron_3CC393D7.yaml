personas:
  professional: Rafael Centenogonzalez is a self‑taught visual artist who blends hand‑drawn sketches, bold mural work, and spontaneous digital animation to breathe life into community spaces, using their
    outgoing nature to rally friends and local businesses for pop‑up projects while they work toward a GED and freelance sustainability.
  sports: Rafael Centenogonzalez fuels their weekend routine with pickup soccer matches at the local park, cheering on the Dallas Cowboys during football season and the Houston Astros in the summer, while
    also training at a community gym where they dabble in weightlifting but often skip scheduled sessions after a late‑night jam session.
  arts: Rafael Centenogonzalez spends evenings sketching vibrant characters inspired by the kinetic energy of banda music, iterating on digital illustrations with free apps like Procreate Pocket, and drawing
    influence from street‑art icons such as Banksy and local muralist Carlos Torres, while they jam on a classic Fender guitar near the Midland Art Center, finding inspiration in performers like Los Tigres
    del Norte and the visual storytelling of Pixar’s 'Coco'.
  travel: Rafael Centenogonzalez maps out trips that blend desert road trips to Big Bend National Park, spontaneous weekend getaways to the historic San Antonio River Walk, and occasional international
    escapades to the bustling street markets of Oaxaca for culinary research, with a long‑term dream of attending the vibrant colors of Holi Festival in India and exploring the mural scene in Berlin.
  culinary: Rafael Centenogonzalez experiments in the kitchen with homemade tacos al pastor, marinating pork in achiote, pineapple, and chipotle before grilling, perfects a silky mole sauce with chilhuacle
    chilies and dark chocolate, and films quick recipe reels for TikTok, while their cooking skill sits between confident street‑food hobbyist and occasional kitchen disaster when they over‑spice a batch
    of guacamole with too many serrano chilies.
  core: Rafael Centenogonzalez is a 23‑year‑old visual storyteller who blends vibrant street‑art aesthetics with community‑building energy, juggling spontaneous creativity, modest financial discipline,
    and a penchant for late‑night tacos and weekend soccer pick‑ups.
background:
  cultural: Rafael is a 23‑year‑old Mexican‑American raised in Midland, Texas. He grew up in a bilingual household where Spanish and English were spoken at home, and his family’s roots trace back to the
    Mexican state of Jalisco. Traditional Mexican customs, food such as tacos al pastor and mole, and music like banda and corridos were a regular part of his upbringing. Living in West Texas exposed him
    to a blend of Hispanic and Anglo influences, shaping a resilient, community‑oriented outlook. He often incorporates vibrant Mexican motifs and colors into his artwork while embracing the eclectic, modern
    vibe of his hometown.
attributes:
  skills: '["Creative storytelling", "Digital illustration", "Social media content creation", "Improvisational music", "Community event facilitation", "Basic handyman skills", "Rapid learning"]'
  hobbies: '["Sketching and mural painting", "Playing guitar and improvisational music", "Creating short videos for TikTok and Instagram", "Attending local music festivals", "Playing pickup soccer games",
    "Reading sci‑fi graphic novels", "Participating in community art workshops", "Experimenting with Mexican street‑food recipes"]'
  career_goals: Rafael aims to turn his artistic and social talents into a sustainable freelance career, focusing on mural commissions for local businesses, social‑media content creation for community events,
    and eventually opening a small collaborative studio that offers workshops for youth in Midland. He plans to earn a GED within the next year to broaden his opportunities and may enroll in community‑college
    art courses. His long‑term ambition is to become a recognized cultural bridge, using his Mexican heritage and West Texas experience to create vibrant public art that celebrates diversity.
