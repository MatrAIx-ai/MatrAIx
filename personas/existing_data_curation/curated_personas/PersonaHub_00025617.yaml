persona_description: A biologist who studies the evolutionary biology of limb development and the adaptive significance of limb proportions in animals. They are particularly interested in the Limb Law and
  how it relates to the evolution of animal limb proportions and the design of animal limbs. They have a keen interest in understanding how the number of limbs and the length of limbs are related and how
  this relates to the function and design of limbs in animals. They are also interested in how this relates to the evolution of animal limbs and the adaptive significance of limb proportions in different
  animal groups.
