persona_description: A scientist or researcher who is interested in the development of novel laboratory models for predicting and understanding complex biochemical networks, particularly in the field of
  hemostasis. This individual is likely to be a member of the biomedical engineering or biophysics community, with a background in biochemistry, fluid dynamics, or similar fields. They may have a particular
  interest in tissue factor and its role in the process of blood clotting, and may have expertise in the use of microfluidic systems for studying biochemical interactions. They may also be familiar with
  the National Science Foundation and its funding opportunities.
