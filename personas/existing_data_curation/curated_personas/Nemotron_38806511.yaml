personas:
  professional: Jorge Guerra, a disciplined web and digital interface designer with a robust STEM background, channels their expertise in UX research, information architecture, and modern frameworks like
    React and Vue into accessible, data‑driven products, while they methodically build a path toward a Design Director role that emphasizes inclusive design, mentorship, and strategic vision in a remote‑friendly
    setting.
  sports: Jorge Guerra, an avid hiker and yoga enthusiast, they regularly explore the Sierra Nevada foothills with the Central Valley Outdoors Club, follow the Fresno State Bulldogs baseball team and the
    Sacramento Kings, and occasionally join a community 5K run to keep their fitness routine balanced and predictable.
  arts: Jorge Guerra, a devoted classical guitarist who reveres the works of Andrés Segovia and occasionally joins Mariachi Los Camperos for weekend performances, they balance their creative impulse with
    woodworking inspired by Peter Korn and fuel their imagination through sci‑fi novels by Isaac Asimov while staying abreast of industry trends via the 99% Invisible and DesignBetter podcasts.
  travel: Jorge Guerra, a methodical planner who blends adventure with relaxation, they craft detailed itineraries that pair weekend hikes in Yosemite and Sequoia with longer journeys to vibrant coastal
    towns and historic inland markets, always budgeting time for yoga sessions and ensuring a reliable internet connection for remote work.
  culinary: Jorge Guerra, an enthusiastic home chef, they masterfully prepare tamales, mole, and ceviche using garden‑fresh cilantro, ripe tomatillos, and hand‑ground chilies, often hosting friends for
    feasts where they meticulously plate their creations, yet occasional over‑spicing becomes a friendly point of debate among their guests.
  core: Jorge Guerra, a meticulous designer and compassionate community mentor, balances structured work with mindful hobbies, battling anxiety through gardening, yoga, and music while nurturing inclusive
    digital experiences.
background:
  cultural: Jorge was born to Mexican immigrant parents and grew up in the Central Valley, where he was immersed in a bilingual Mexican‑American community. He speaks fluent Spanish and celebrates cultural
    traditions such as Día de los Muertos, Las Posadas, and Mexican Independence Day, often helping organize local festivities. His upbringing emphasized family loyalty, respect for elders, and a strong
    work ethic, shaping his compassionate and cooperative nature. While navigating the predominantly Anglo tech industry, he remains proud of his heritage and actively supports initiatives that increase
    representation of Hispanic creators in digital design. His Catholic upbringing influences his sense of community service and ethical responsibility.
attributes:
  skills: '[''UX Research'', ''Information Architecture'', ''Responsive Web Design'', ''HTML5'', ''CSS3'', ''JavaScript'', ''React'', ''Vue.js'', ''Figma'', ''Sketch'', ''Adobe XD'', ''Adobe Photoshop'',
    ''Adobe Illustrator'', ''Design Systems'', ''Wireframing'', ''Prototyping'', ''Usability Testing'', ''A/B Testing'', ''Data Visualization'', ''Agile Project Management'', ''Documentation'', ''Bilingual
    Communication (English/Spanish)'']'
  hobbies: '[''Gardening'', ''Hiking'', ''Yoga'', ''Mindfulness Meditation'', ''Cooking Mexican Cuisine'', ''Playing Classical Guitar'', ''Volunteering for Digital Literacy'', ''Reading Science Fiction'',
    ''Listening to Design Podcasts'', ''Woodworking'']'
  career_goals: At 50, Jorge aims to transition from hands‑on design work to a strategic leadership role where he can shape the overall user experience vision for an organization. He aspires to become a
    Design Director or Head of UX, mentoring junior designers and championing inclusive design practices that reflect the diversity of his community. He plans to launch a boutique consultancy focused on
    creating accessible digital products for small‑business owners and non‑profits in the Central Valley, especially those serving the Hispanic community. Jorge also seeks a more predictable, balanced schedule
    to manage his anxiety, favoring remote or hybrid work arrangements that allow dedicated focus time and regular wellness routines.
