persona_description: A tech enthusiast who is familiar with the workings of Apple's audio file format, M4A, and its superior quality over MP3. This individual is likely to be an Apple user who enjoys using
  the iTunes store for music purchases and enjoys exploring the various file formats available for audio files. They are also likely to be familiar with the QuickTime Player, iTunes, and other media players.
  This persona may be interested in learning more about the MPEG-4 codec and the ISO/IEC standard 14496-3, which the M4A file is based on. They may also be interested in learning more about the benefits
  of using M4A over MP3 and the specific features of the M4R file format.
