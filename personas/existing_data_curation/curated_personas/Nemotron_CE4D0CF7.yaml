  hobbies: '[''Gardening'', ''Book club (mystery & historical fiction)'', ''Volunteering at senior center (medication workshops)'', ''Line dancing'', ''Karaoke'', ''Antique shopping'', ''Genealogy research'',
    ''Socializing at local cafés'', ''Attending community festivals'']'
  career_goals: Whitney aims to become a lead pharmacy technician or assistant manager within the next three years, gaining supervisory responsibilities and overseeing staff scheduling to foster a more
    flexible work environment. She plans to obtain the Certified Pharmacy Technician (CPhT) credential and complete an immunization certification so she can administer flu shots and lead community vaccination
    drives. Long‑term, she dreams of opening a small wellness boutique that combines a pharmacy counter with health‑education workshops, leveraging her love for social interaction and curiosity about emerging
    health trends. She also hopes to develop stress‑management skills and mentor younger staff, creating a supportive, low‑stress workplace.
