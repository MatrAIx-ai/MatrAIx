personas:
  professional: James Grant is an aspiring graphic designer who leverages his sketching, digital illustration, and photography skills to craft social media content for local nonprofits, while his knack
    for event coordination and collaborative music jams informs his community‑focused design approach.
  sports: James Grant plays beach volleyball with the Andrews Sand Spikers during summer, cheers on the Carolina Panthers on Sundays, follows the Charleston Battery in the USL, and volunteers as a scoreboard
    assistant for the local high school basketball team, blending their love of teamwork with a laid‑back fitness routine.
  arts: James Grant immerses themselves in visual and musical arts, sketching inspirations from the surreal murals of Banksy, painting in the style of Georgia O'Keeffe, strumming acoustic covers of Bob
    Dylan while listening to Nina Simone, and attending weekly performances at the Charleston Music Hall, which collectively shape their creative identity.
  travel: James Grant prefers spontaneous weekend road trips along the South Carolina coast, having explored historic Charleston, the sandy dunes of Hilton Head, and the vibrant jazz scene of New Orleans,
    while dreaming of a spring backpacking adventure through the Scottish Highlands to study Celtic art.
  culinary: James Grant enjoys cooking Southern comfort foods such as shrimp and grits, fried chicken with collard greens, and sweet potato casserole, experimenting with spices like smoked paprika and hot
    sauce, while their modest cooking skill level often leads to over‑seasoned dishes and an occasional burnt batch of cornbread.
  core: James Grant is a curious, socially‑driven 19‑year‑old who blends art, music, and community spirit, yet habitually leaves unfinished sketches on their desk and forgets to turn off their phone before
    bed.
background:
  cultural: 'James grew up in a predominantly white, working‑class family in Andrews, a small town in Georgetown County, South Carolina. His upbringing was shaped by the traditions of the Lowcountry: frequent
    church attendance, family gatherings centered around Southern cooking, and community events such as the annual Lowcountry Festival. While his family maintains typical Southern customs, James is also
    aware of the region’s rich Gullah heritage, having participated in multicultural school programs that highlighted African‑American coastal history and music. He values the modest, neighborly ethos of
    his hometown, the emphasis on hospitality, and the close‑knit social fabric that encourages collaborative activities and mutual support.'
