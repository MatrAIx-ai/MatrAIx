  career_goals: James aspires to turn his artistic interests into a sustainable career. He aims to enroll in a community college program in graphic design or multimedia arts, building a professional portfolio
    that showcases his illustration, photography, and music. In the medium term, he hopes to work as a junior graphic designer or social media content creator for a local business or nonprofit, eventually
    leading community art projects that engage youth in his hometown. Long‑term, he dreams of establishing a community art studio in Georgetown County that offers workshops, collaborative murals, and performance
    space, while also pursuing further education to become a certified art teacher.
