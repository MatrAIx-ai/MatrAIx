personas:
  professional: Debbie Brown is a junior full‑stack web developer who leverages Python, Django, Node.js and React to build clean, test‑driven applications, applying their disciplined, organized workflow
    and compassionate mentoring style to lead code reviews and guide coding tutors at a community center, while aiming for a senior engineering role within three years.
  sports: Debbie Brown enjoys early morning runs with the North Miami Beach Running Club, follows the Miami Dolphins and Miami Hurricanes avidly, participates in weekly yoga sessions at the Miami Beach
    Yoga Collective, and practices beach volleyball casually during summer, all while maintaining a structured fitness routine that balances cardio and flexibility.
  arts: Debbie Brown finds creative release in strumming acoustic guitar to the folk stylings of John Mayer and the rhythmic vibes of Bad Bunny, immerses themselves in sci‑fi novels by N.K. Jemisin and
    contemporary non‑fiction by Malcolm Gladwell, and regularly attends local art gallery openings featuring works by contemporary Latin American painters like Beatriz Milhazes.
  travel: Debbie Brown prefers meticulously planned short getaways, having explored the Florida Keys, a weekend in New Orleans, and a solo backpacking trip to Cartagena, Colombia, while dreaming of a future
    cultural immersion in Kyoto, Japan, balancing a modest travel budget with a love for both coastal relaxation and vibrant urban festivals.
  culinary: Debbie Brown enjoys cooking a respectable level of home‑cooked meals, favoring dishes like grilled fish tacos with avocado‑lime salsa, Cuban‑style arroz con pollo, and a quinoa‑black bean salad
    sprinkled with cilantro and lime, while also delighting in weekend brunches that feature avocado toast and freshly brewed pour‑over coffee.
  core: Debbie Brown blends disciplined code craftsmanship with a quiet compassion, channeling their love of structured routines, occasional coffee‑induced late‑night debugging, and a habit of over‑organizing
    their balcony garden into a uniquely balanced, purpose‑driven life.
background:
  cultural: Debbie grew up in a predominantly white, middle‑class family in suburban North Miami Beach, Florida. While her immediate cultural heritage aligns with mainstream American values, her upbringing
    in South Florida exposed her to a vibrant, multicultural environment, including strong Latin influences in food, music, and community events. This blend of a traditional American upbringing and the
    diverse, coastal lifestyle of Miami‑Dade has shaped her open‑minded outlook, appreciation for community cohesion, and comfort navigating both English‑dominant and bilingual settings.
