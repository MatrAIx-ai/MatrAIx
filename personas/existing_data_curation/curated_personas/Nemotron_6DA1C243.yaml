  career_goals: Debbie aims to become a senior software engineer within the next three years, focusing on building accessible, socially impactful applications. She plans to obtain AWS Certified Solutions
    Architect certification and a master's degree in computer science or a related field to deepen her technical expertise. Long‑term, she aspires to a technical lead or software architect role where she
    can shape product vision, champion inclusive design practices, and mentor a diverse engineering team. She also hopes to contribute to open‑source projects that address community challenges, such as
    education and public health.
