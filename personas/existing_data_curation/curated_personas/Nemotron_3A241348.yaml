personas:
  professional: Lonnie Thomas, a 1‑year‑old, already shows a tiny taste for routine and order by arranging blocks in perfectly straight rows, hinting at a future path as a meticulous engineer or organizer,
    and today they delight in predictable feeding and nap schedules that satisfy their high standards for achievement.
  sports: Lonnie Thomas, a 1‑year‑old, enjoys baby gymnastics classes where they practice crawling obstacles, loves the Chicago Cubs cap that parents dress them in for stroller rides, and spends afternoons
    at the park’s toddler swing, blending seasonal outdoor play with a budding interest in organized sports.
  arts: Lonnie Thomas, a 1‑year‑old, is enchanted by the soothing melodies of Raffi’s “Baby Beluga” and the rhythmic verses of “The Wheels on the Bus,” often clapping along to Sesame Street songs while
    their parents read Dr. Seuss picture books, letting those artistic experiences shape their early identity.
  travel: Lonnie Thomas, a 1‑year‑old, has already experienced a family road trip to Yellowstone National Park, a beach stay in Florida, and a short flight to visit grandparents in Chicago, and they prefer
    stroller‑friendly itineraries and nap‑aligned schedules that balance adventure with the comfort of familiar routines.
  culinary: Lonnie Thomas, a 1‑year‑old, favors smooth pureed carrots, sweet apple sauce, and banana mash, proudly refuses green bean puree, and they often practice self‑feeding with a soft‑silicone spoon,
    occasionally spilling milk in a charming but messy display of growing independence.
  core: Lonnie Thomas, a 1‑year‑old, blends a love for routine with a curious, slightly assertive spirit, arranging toys, demanding consistent meals, and delighting in music, all while they navigate the
    world with baby‑size determination and occasional messy mischief.
background:
  cultural: Lonnie is part of an African American family rooted in Monkton, Maryland, within Baltimore County's vibrant Black community. His family values close-knit relationships, regular church gatherings,
    and cultural traditions such as soul-food meals, storytelling, and music ranging from gospel to R&B. He is exposed to community festivals, family reunions, and local celebrations that honor African
    American heritage, providing a rich cultural backdrop that shapes his early experiences.
