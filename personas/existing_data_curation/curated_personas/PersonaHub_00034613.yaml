persona_description: A prominent American rabbi, Zionist leader, and civil rights activist who played a pivotal role in the formation of the American Jewish Congress and the World Jewish Congress, and who
  advocated for a democratic and pro-Zionist Jewish community in the United States. Wise was a close friend of President Franklin D. Roosevelt and used his influence to rally public opinion against Nazism
  and promote a pro-Zionist stance. He founded the Stephen Wise Free Synagogue and Stephen S. Wise Temple, and was instrumental in the formation of the American Jewish Congress and the World Jewish Congress.
  Wise died in 1949 at the age of 75.
