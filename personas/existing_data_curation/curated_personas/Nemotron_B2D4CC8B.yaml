personas:
  professional: Javien Prewitt, a 30-year-old contemporary floral designer, blends academic arts training with hands-on horticultural expertise, using SketchUp and Adobe Illustrator to craft sustainable,
    culturally resonant arrangements for weddings, corporate events, and community installations, while meticulously managing budgets, inventory, and client timelines.
  sports: Javien Prewitt enjoys maintaining fitness through early-morning runs with the Jax Runners club, occasional pick-up basketball at the community center, fervently cheering for the Jacksonville Jaguars
    during football season and the Miami Heat in the NBA, and hiking the Timucuan Ecological and Historic Preserve on weekends to combine cardio with bird-watching.
  arts: Javien Prewitt channels a deep love for the arts by curating floral installations inspired by the lyrical improvisations of Kamasi Washington at Jacksonville's Beach Street Jazz Club, devouring
    novels by Toni Morrison and James Baldwin for narrative inspiration, snapping macro photographs of native blossoms to share on Instagram, and collaborating with local muralists on community art projects
    that celebrate storytelling and rhythm.
  travel: Javien Prewitt prefers meticulously planned getaways, having explored historic Savannah and Charleston on weekend road trips, trekked the Great Smoky Mountains for sunrise hikes, spent a relaxing
    island retreat in the Bahamas, and is eager to journey to Ghana to trace ancestral narratives, all while balancing a modest travel budget with a desire for cultural immersion.
  culinary: Javien Prewitt enjoys cooking at an intermediate level, perfecting Southern comfort staples like shrimp and grits, collard greens seasoned with smoked turkey, and sweet potato pie, while frequently
    incorporating heirloom tomatoes from their garden into fresh salads and experimenting with spice blends like smoked paprika and cayenne to give classic dishes a bold, contemporary twist.
  core: Javien Prewitt, a methodical creator who blends cultural storytelling with sustainable design, balances disciplined planning with spontaneous artistic bursts, and turns community heritage into vibrant
    floral art.
background:
  cultural: Javien was raised in a close‑knit African‑American family in Jacksonville, where church gatherings, community celebrations, and storytelling were central to his upbringing. His parents emphasized
    the importance of education and cultural pride, exposing him to the works of Black artists, musicians, and authors. The vibrant cultural scene of the South—its music, culinary traditions, and historic
    neighborhoods—shapes his aesthetic sensibility, leading him to incorporate bold colors, rhythmic patterns, and symbolic motifs rooted in African heritage into his floral designs. He stays connected
    to his community through local festivals, mentorship programs, and collaborative art projects that celebrate Black culture and resilience.
attributes:
  skills: '[''Floral arrangement'', ''Color theory'', ''Event design'', ''Sustainable sourcing'', ''Inventory management'', ''Budgeting and cost estimation'', ''Client consultation'', ''Computer‑aided design
    (CAD)'', ''Project planning and timeline management'', ''Team collaboration'', ''Effective communication'', ''Problem solving'', ''Attention to detail'']'
  hobbies: '[''Backyard gardening'', ''Reading African‑American literature'', ''Macro photography'', ''Attending jazz and blues concerts'', ''Volunteer flower donations'', ''Hiking in natural parks'', ''Cooking
    Southern cuisine'', ''Woodworking'']'
  career_goals: Javien plans to open his own boutique floral studio in Jacksonville within the next three years, offering bespoke sustainable designs that celebrate African‑American cultural motifs. He
    aspires to expand into corporate event styling and develop a line of ready‑to‑ship arrangement kits marketed online. He also wants to become a certified instructor, teaching floral design workshops
    at local community colleges and through non‑profit arts programs. Long‑term, he envisions establishing a regional "Floral Arts Collective" that mentors emerging designers, promotes environmentally responsible
    practices, and hosts annual public installations highlighting the cultural heritage of the Black community in the Southeast.
