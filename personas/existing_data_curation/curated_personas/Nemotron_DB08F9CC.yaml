  hobbies: '["Acrylic Painting", "Creating Papel Picado", "Visiting Museums and Galleries", "Cooking Traditional Mexican Cuisine", "Reading Contemporary Fiction", "Yoga", "Hiking Coastal Trails", "Volunteer
    Arts Workshops", "Bilingual Story‑time Sessions", "Attending Latinx Cultural Festivals"]'
  career_goals: Marissa envisions moving from store‑level supervision to a regional management role where she can shape training programs that emphasize creativity, cultural awareness, and inclusive leadership
    across multiple locations. She aims to launch a mentorship pipeline for Latinx youth interested in retail careers, partnering with local schools and community centers. Simultaneously, she dreams of
    opening a boutique-gallery that curates Mexican folk art and contemporary works, providing a platform for emerging artists while preserving family traditions. Continuous learning is also a priority;
    she plans to attend advanced workshops in art history and digital retail innovation to keep her approach fresh and forward‑thinking.
