  hobbies: '[''Fishing'', ''Woodworking'', ''Model train building'', ''Vegetable gardening'', ''Reading historical nonfiction'', ''Watching documentaries'', ''Volunteering at senior center'']'
  career_goals: In the coming years, Clifford aspires to shift from the physically demanding grind of the shop floor to a role where he can leverage his extensive experience to improve workplace safety
    and mentor the next generation of workers. He hopes to obtain an internal certification as a Safety and Health Officer at his plant, allowing him to lead safety briefings, conduct audits, and develop
    training modules that emphasize cooperation and harmony. Additionally, he is considering part‑time consulting for small manufacturing firms in the Detroit area, helping them streamline blending processes
    while maintaining strict quality standards. Ultimately, he wishes to secure a stable, less strenuous position that still lets him contribute meaningfully, while allowing more time for his personal interests
    and for supporting community volunteer initiatives.
