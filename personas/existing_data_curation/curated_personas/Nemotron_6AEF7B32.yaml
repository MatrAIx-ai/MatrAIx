    ''Digital photography'']'
  career_goals: Ricardo aims to earn his GED, pursue a certification in community health or social work, and secure a role as a community outreach coordinator at a local nonprofit, where he can blend his
    organizational talent, compassion, and love for cultural activities. He also hopes to eventually lead cultural workshops that showcase Puerto Rican art and cuisine, fostering intercultural connections
    within Orlando.
