personas:
  professional: Myong Tenn is a high‑school sophomore who channels her love for structured creativity into building intricate Minecraft worlds and mastering redstone engineering, often collaborating with
    friends while balancing school projects with her knack for practical problem‑solving.
  sports: Myong Tenn enjoys weekend soccer matches with the local youth league, cheers on the Los Angeles Dodgers and the LA Lakers, and practices K‑pop style dance cardio at home, viewing fitness as a
    flexible outlet rather than a strict regimen.
  arts: Myong Tenn sketches manga‑style characters inspired by Akira Toriyama and CLAMP, choreographs K‑pop routines to BTS and Blackpink, and streams a mix of Taylor Swift and IU on repeat, shaping a hybrid
    creative identity that blends Eastern comic art with Western pop music.
  travel: Myong Tenn dreams of exploring the bustling streets of Tokyo for its pop‑culture districts and the historic lantern festivals of a city along the Han River, while also planning annual family road
    trips to San Diego’s beaches and occasional weekend hikes in the Angeles National Forest, balancing adventure with budget limits.
  culinary: Myong Tenn helps bake sweet hotteok filled with cinnamon‑brown sugar and savory yakshik, perfects her grandmother’s fermented kimchi recipe, and experiments with kimchi fried rice topped with
    a fried egg, all while still craving classic American cheese pizza on study nights.
  core: Myong Tenn is a structured‑yet‑flexible teen who blends meticulous Minecraft engineering, vibrant K‑pop dance, and nostalgic cooking traditions into a lively, slightly disorganized routine punctuated
    by occasional acne‑focused skin‑care rituals.
background:
  cultural: Myong is a second‑generation Korean‑American raised in El Monte, California. Her parents emigrated from South Korea and speak Korean at home, so she grew up bilingual and participates in a weekend
    Korean language school. The family celebrates both Korean holidays such as Chuseok and Seollal and American traditions like Thanksgiving. She is active in a local Korean church youth group and frequently
    joins community events that showcase traditional music, dance, and food. The multicultural environment of Los Angeles County has shaped her identity, allowing her to blend Korean heritage with mainstream
    American culture in daily life, friendships, and personal interests.
