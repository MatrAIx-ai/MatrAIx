  career_goals: Myong aims to attend a specialized high‑school program that blends STEM and visual design, eventually pursuing a college degree in computer science or interactive media. She dreams of becoming
    a video‑game developer who can weave Korean cultural motifs into immersive experiences, while also keeping open the possibility of launching a small Korean‑inspired bakery or café after college. Her
    short‑term goals include excelling in AP Computer Science, earning leadership roles in the robotics and art clubs, and securing a summer internship at a local tech start‑up. She sees her future as a
    balance between structured technical expertise and the creative flexibility that lets her express her multicultural identity.
