personas:
  professional: Kebin Mejias, an 18‑year‑old groundskeeper in Goodyear, merges precise crew scheduling, bilingual communication, and a flair for xeriscaping with vibrant desert palettes to craft low‑water
    landscapes that reflect both practical efficiency and cultural celebrations.
  sports: Kebin Mejias, a weekend hiker and trail‑runner, cheers on the Phoenix Suns and Arizona Diamondbacks, trains with the Desert Sprinters running club, and joins pickup soccer matches at the community
    garden, balancing cardio endurance with occasional strength‑training sessions.
  arts: Kebin Mejias, a budding nature photographer, captures saguaro silhouettes inspired by Ansel Adams while listening to Tame Impala and traditional mariachi ensembles, and spends evenings sketching
    landscape concepts to the rhythm of contemporary indie rock.
  travel: Kebin Mejias, an adventure‑oriented student, prefers low‑cost road trips that blend desert exploration of Sedona’s red rocks and the Grand Canyon’s rim with cultural pilgrimages to Oaxaca’s culinary
    festivals, relying on camping gear and ridesharing to stay within his limited budget.
  culinary: Kebin Mejias, an enthusiastic home gardener, enjoys preparing chilies rellenos, amaranth‑based atole, and roasted nopales, combining fresh garden harvests with spices like cumin, lime zest,
    and epazote to recreate family‑tradition flavors in his modest kitchen.
  core: Kebin Mejias channels disciplined planning, cultural reverence, and a restless curiosity into sustainable landscaping while juggling anxiety‑driven perfectionism and a love for desert photography.
background:
  cultural: Kebin was born to Mexican parents who immigrated to Arizona in the early 2000s. He grew up speaking both Spanish and English at home, celebrating traditions such as Día de los Muertos, Las Posadas,
    and family reunions centered around Mexican cuisine. His family maintains strong ties to the broader Mexican community in Maricopa County, participating in cultural festivals at local plazas and supporting
    community initiatives that aid recent immigrants. The blend of Mexican heritage and the Southwest desert environment shapes his aesthetic sense—favoring vibrant colors, indigenous plant species, and
    a respect for water conservation rooted in both cultural values and the arid climate. He often incorporates these influences into his landscaping ideas, aiming to create spaces that honor his cultural
    roots while serving the local community.
attributes:
  skills: '["Landscaping equipment operation", "Irrigation system installation and maintenance", "Plant selection for desert climates", "Soil testing and amendment", "Xeriscaping and water-conservation
