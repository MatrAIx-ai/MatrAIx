  hobbies: '["Desert hiking", "Nature photography", "Home gardening (heirloom Mexican vegetables)", "Landscape sketching", "Listening to mariachi and indie music", "Strategy video gaming", "Volunteering
    at community garden", "Meditation and journaling"]'
  career_goals: Kebin aspires to move beyond entry‑level groundskeeping and become a certified landscape designer within the next three years. He plans to enroll in an Associate’s program in horticulture
    or landscape architecture at a community college in Phoenix, while pursuing professional credentials such as the ISA Certified Irrigation Technician. His long‑term ambition is to launch his own eco‑focused
    landscaping firm that provides sustainable, low‑water solutions for residential and commercial properties in the Southwest. He also hopes to mentor other young workers, especially those from immigrant
    backgrounds, and to use his bilingual ability to bridge cultural gaps in client relations. Recognizing his tendency toward worry, he intends to develop stress‑management techniques and seek mentorship
    to keep his high standards balanced with personal well‑being.
