  hobbies: '[''Visiting galleries and museums'', ''Watercolor painting'', ''Landscape photography'', ''Reading contemporary fiction and cultural essays'', ''Gardening'', ''Hiking in state parks'', ''Experimenting
    with Mid-Atlantic culinary recipes'', ''Participating in community theater'', ''Volunteering as a museum docent'', ''Journaling and sketching'']'
  career_goals: Kendal aims to re-enter the professional sphere in a part-time or consulting capacity that leverages her expertise in arts administration and community program development. She plans to
    complete a certificate in Museum Studies to deepen her curatorial knowledge, and she envisions launching a quarterly community-based art-education series at the Laurel Public Library. Over the next
    five years, she hopes to secure a board position with the Sussex County Historical Society, develop a grant-funded youth art mentorship program, and publish a memoir that interweaves her personal journey
    with the cultural history of her hometown. These goals reflect her desire for achievement, continued learning, and a lasting positive impact on her local community.
