personas:
  professional: Kendal Reynolds, a seasoned arts administrator and community program developer, leverages meticulous project management, grant writing, and digital curation to launch high‑impact local exhibitions
    while channeling their boundless curiosity and disciplined work ethic into a part‑time consulting practice that bridges museum studies insights with grassroots cultural education.
  sports: Kendal Reynolds, an avid hiker and weekend softball enthusiast, regularly joins the Laurel Trail Runners for sunrise treks through Caesar Rodney State Park, supports the Philadelphia Eagles and
    Philadelphia 76ers as her favorite professional teams, and balances a modest home‑gym routine of yoga and light resistance training to stay flexible for community projects.
  arts: Kendal Reynolds blends a love for watercolor landscapes inspired by Claude Monet and the tonal realism of Andrew Wyeth with a keen eye for Ansel Adams‑style photography, regularly volunteers in
    community theater productions of August Wilson’s plays, and finds solace in listening to folk legend Bob Dylan while sketching in the quiet of Laurel’s historic library.
  travel: Kendal Reynolds prefers thoughtfully planned road trips that blend coastal relaxation with cultural immersion, often spending long weekends exploring Cape May’s Victorian boardwalk and historic
    Philadelphia museums, while dreaming of a summer spent sketching the rolling hills of the Cotswolds and attending a traditional folk festival in Nova Scotia.
  culinary: Kendal Reynolds, an inventive home cook, routinely reimagines classic Maryland crab cakes by coating them in a crisp quinoa crust flavored with lemon zest and fresh dill, whips up a shrimp‑and‑stone‑crab
    bisque brightened with fennel and orange zest, and treats herself to occasional meals at The Farm House, where she savors farm‑to‑table dishes like roasted beet salad with goat cheese and pistachios.
  core: Kendal Reynolds, a disciplined arts administrator with a curiosity for every new medium, juggles grant writing, garden stewardship, and midnight watercolor experiments, yet admits to a habit of
    postponing dentist appointments while meticulously budgeting every hobby expense.
background:
  cultural: Kendal’s cultural roots trace back to English and Irish ancestors who settled in the Mid-Atlantic region of the United States. Growing up in Laurel, Delaware, she was immersed in a small-town
    atmosphere shaped by agricultural traditions, maritime heritage, and close-knit community institutions such as the local church and the public library. This environment fostered a strong sense of civic
    responsibility, appreciation for regional folk arts, and an openness to diverse cultural experiences encountered through travel and artistic exploration. While she identifies with mainstream American
    values of independence, self-improvement, and volunteerism, she also honors the local customs of Sussex County—seasonal festivals, seafood cuisine, and storytelling—integrating them into her personal
    and creative life.
