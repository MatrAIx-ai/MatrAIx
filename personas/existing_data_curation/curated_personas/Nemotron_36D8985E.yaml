    data handling'']'
  hobbies: '[''Reading mystery and historical non-fiction'', ''Sudoku and crossword puzzles'', ''Vegetable gardening'', ''Cooking and baking'', ''Knitting'', ''Nature walks along the Ohio River Trail'',
    ''Podcast listening (personal finance, American history)'', ''Board-game nights with close friends'']'
  career_goals: Brandy aims to advance beyond her current clerk position to become a senior billing specialist or accounting supervisor within the next three to five years. She plans to enroll in a community
    college to earn an associate degree in accounting, followed by the Certified Billing and Coding Specialist (CBCS) credential. Her competitive drive pushes her to lead process‑improvement projects that
    reduce billing cycle times and error rates, positioning her as a candidate for a team‑lead role. Ultimately, she envisions managing a small office or launching her own bookkeeping service for local
    businesses, combining her practical expertise with her curiosity for financial systems.
