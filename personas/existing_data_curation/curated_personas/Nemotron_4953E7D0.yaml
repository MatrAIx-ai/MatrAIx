personas:
  professional: Boyce Jobe is an aspiring aerospace hobbyist who blends meticulous planning with inventive curiosity, designing and launching model rockets while applying the same systematic approach to
    woodworking projects and strategic video games.
  sports: Boyce Jobe is a weekend angler who follows the Los Angeles Dodgers, rides with the Trail Blazers Cycling Club, and occasionally joins pick‑up basketball games at the local community center, balancing
    calm reflection on the water with the competitive drive of sprinting up hills.
  arts: Boyce Jobe immerses themselves in science‑fiction by devouring novels from Isaac Asimov and Philip K. Dick, listening to Pink Floyd’s progressive rock to fuel creative design, and sketching rocket
    schematics inspired by the visual style of Christopher Nolan’s 'Interstellar'.
  travel: Boyce Jobe prefers well‑planned short trips, such as family fishing outings to Lake Okeechobee, weekend cycling tours along the Appalachian Trail, and dreaming of a future visit to SpaceX’s Boca
    Chica launch site to witness rocket launches firsthand.
  culinary: Boyce Jobe enjoys cooking simple yet flavorful meals like grilled trout seasoned with lemon, dill, and smoked paprika, often following step‑by‑step video tutorials while occasionally experimenting
    with homemade wooden cookie cutters from their woodworking hobby.
  core: Boyce Jobe is a methodical, curiosity‑driven teen who balances competitive strategy games with quiet outdoor hobbies, meticulously tracks every detail, and occasionally forgets to floss while dreaming
    of building rockets that touch the stars.
background:
  cultural: Boyce grew up in Parsons, Kansas, a predominantly white, rural community in Neosho County where Midwestern values such as self‑reliance, modesty, and community involvement are emphasized. Family
    gatherings, local school events, and seasonal activities like county fairs and hunting trips shape his sense of belonging. The region's agricultural heritage and close‑knit neighborhood foster a strong
    work ethic and an appreciation for practical, hands‑on skills.
