personas:
  professional: Qingxia Yeon is a budding LEGO architect who spends afternoons drafting intricate cityscapes on paper before snapping bricks together, balancing the creative urge to build sprawling skylines
    with the practical habit of re-using leftover pieces, and they often lead group projects at the school’s maker club despite occasionally forgetting to bring the instruction booklet.
  sports: Qingxia Yeon is a spirited member of the Oxford Youth Soccer Association, playing forward for the team that proudly wears the blue jerseys of the Michigan United Soccer Club, cheering on the Detroit
    Lions on weekends, and they bring a competitive edge to every match, sometimes prioritizing scoring over passing, which can cause occasional friction with teammates.
  arts: Qingxia Yeon is an imaginative comic-book creator who sketches superhero-inspired characters after watching Studio Ghibli films and binge-watching K-pop music videos by BTS and BLACKPINK, losing
    herself in the art of origami while listening to Jay Chou, and they proudly display their hand-drawn panels at the school art fair, even if they sometimes misplace their coloured pencils.
  travel: Qingxia Yeon is a curious junior explorer who loves day trips to the Detroit Riverwalk and the historic town of Ann Arbor, has collected souvenirs from a family vacation to Seoul’s Gyeongbokgung
    Palace, and they dream of hiking the Upper Peninsula’s Pictured Rocks, preferring spontaneous picnics over meticulously planned itineraries, which sometimes leads to forgetting sunscreen.
  culinary: Qingxia Yeon is a budding kitchen experimenter who can fold simple dumplings with pork filling, toss kimchi fried rice using gochujang and sesame oil, and add a dash of soy sauce to their favourite
    spaghetti, and they delight in making edible slime with fruit juice for after-school snacks, though they often leave crumbs on the living room floor.
  core: Qingxia Yeon is an energetic eight-year-old who balances a fierce curiosity for building, coding, and sports with a laid-back, sometimes disorganized approach, turning every day into a playful competition
    while staying rooted in family traditions and community.
background:
  cultural: Qingxia comes from a mixed Chinese‑Korean heritage, raised in a bilingual home where Mandarin and Korean are spoken alongside English. Her family observes traditional holidays such as Chinese
    New Year and Korean Chuseok, preparing dishes like dumplings, mandu, and kimchi, and sharing stories that emphasize respect for elders and the value of education. Living in Oxford, Michigan, she blends
    these East Asian customs with Midwestern American life—attending public school, participating in community sports leagues, and enjoying local library programs. This hybrid cultural setting nurtures
    her curiosity about the world while grounding her in family‑centered traditions and a strong sense of community.
