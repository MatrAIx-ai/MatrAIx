  hobbies: '[''LEGO building'', ''Making slime'', ''Drawing and illustration'', ''Reading graphic novels'', ''Watching animated series'', ''Soccer'', ''Scratch coding club'', ''Nature exploration (collecting
    rocks, leaves)'', ''Origami'', ''Listening to K‑pop and Chinese pop music'', ''Celebrating Lunar New Year and Chuseok'']'
  career_goals: Qingxia dreams of becoming a creator‑engineer who designs robots or interactive gadgets that solve everyday problems, inspired by the way she builds and tweaks LEGO models. She also imagines
    herself as a marine biologist exploring the Great Lakes’ ecosystems, hoping to protect aquatic life. Her competitive spirit pushes her to aim for science‑fair awards and eventually a role as an astronaut,
    where curiosity and practicality can merge. At the same time, she wishes to share her love of technology by teaching younger kids in community workshops, blending her sociable nature with her future
    expertise.
