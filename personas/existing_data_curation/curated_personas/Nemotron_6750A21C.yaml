  career_goals: Tammy aspires to become a creative technologist who blends art and engineering, envisioning a future as a game designer or UX/UI designer for interactive educational tools. She plans to
    join a middle‑school robotics club, develop a portfolio of digital artwork, and ultimately pursue a degree in computer science or industrial design. Her competitive drive motivates her to win science
    fairs and art competitions, and she hopes to lead projects that bring innovative ideas to life.
