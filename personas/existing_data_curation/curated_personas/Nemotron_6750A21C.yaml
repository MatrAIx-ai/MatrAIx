personas:
  professional: Tammy Disanto is an aspiring junior robotics artist, blending their love for watercolor sketches, digital illustration, and LEGO Mindstorms engineering into innovative projects that they
    meticulously plan and showcase at school science fairs, where their competitive streak pushes them to outperform peers.
  sports: Tammy Disanto enjoys weekend hikes with the Riverside County Trail Explorers, tracks elevation gains in a digital log, follows the Los Angeles Dodgers and Los Angeles Lakers for inspiration, and
    maintains a disciplined routine of three weekly soccer practices with the Riverside Middle School team, where their methodical preparation and competitive drive keep them improving their stamina and
    footwork.
  arts: Tammy Disanto channels their admiration for Hayao Miyazaki’s whimsical animation, Claude Monet’s impressionist watercolors, and the vibrant digital brushwork of contemporary creator Loish, spending
    afternoons replicating these styles in sketchbooks, experimenting with Procreate, and curating a wall of favorite prints, while listening to the lo‑fi beats of Nujabes as background music for creative
    flow.
  travel: Tammy Disanto prefers meticulously planned family road trips, documenting each stop in a travel scrapbook; they have hiked the red rocks of Joshua Tree, explored the museums of San Diego, dream
    of wandering the neon streets of Tokyo and the historic castles of Edinburgh, and balance their love for adventure with school schedule constraints by scheduling vacations during winter and spring breaks.
  culinary: Tammy Disanto enjoys experimenting in the kitchen, confidently whipping up spaghetti carbonara with fresh Parmesan, crafting colorful fruit smoothies with mango, strawberry, and a splash of
    coconut milk, and has an emerging talent for decorating cupcakes with watercolor‑inspired icing swirls, though they sometimes neglect to clean up the kitchen after these creative culinary sessions.
  core: Tammy Disanto is a methodical, curiosity‑driven 11‑year‑old who balances fierce competition in robotics and chess with a quiet love for watercolor sketches, often doodling secret comic‑strip characters
    in school margins and meticulously tracking every hobby in a color‑coded planner.
background:
  cultural: Tammy comes from a white, middle‑class family that settled in the suburban community of Nuevo, California. Her upbringing reflects typical Southern California culture, including participation
    in local community events like the Riverside County Fair, weekend barbecues, and school sports. The diverse surroundings of Riverside County expose her to a multicultural environment, fostering an appreciation
    for varied artistic expressions. Family traditions such as celebrating Thanksgiving, the Fourth of July, and winter holidays blend with a love for outdoor activities in the nearby foothills, shaping
    her balanced view of individuality and community.
