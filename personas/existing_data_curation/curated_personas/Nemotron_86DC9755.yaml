  career_goals: Thien dreams of becoming a robotics or aerospace engineer who designs machines that explore space or help solve real‑world problems. He aims to join a STEM‑focused middle school program,
    compete in regional robotics competitions, and eventually earn a scholarship to a university with a strong engineering school. His competitive streak drives him to excel in science fairs, while his
    practical side ensures he values completing projects that have tangible results.
