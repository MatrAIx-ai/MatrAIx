personas:
  professional: Thien Thao, a budding LEGO architect who translates elaborate brick creations into early digital designs within Minecraft, balances meticulous step‑by‑step planning with spontaneous experimentation,
    and approaches every build with a curious yet practical mindset.
  sports: Thien Thao, a spirited forward for the Galveston Junior Soccer Club who idolizes the Houston Dynamo, spends weekend afternoons perfecting free kicks on the beach while collecting shells as trophies,
    and approaches matches with a competitive drive that often outweighs cooperative play.
  arts: Thien Thao, a budding pianist practicing simple folk melodies on a small keyboard, draws inspiration from Yiruma’s gentle piano pieces and LEGO Architecture’s block aesthetics, and loses themselves
    in adventure novels by Rick Riordan after a marathon Minecraft session.
  travel: Thien Thao, an enthusiastic beach explorer who favors spontaneous weekend trips to Galveston’s shoreline to hunt for unique shells, dreams of snorkeling the Great Barrier Reef, and balances family
    budget constraints by saving allowance for future travel adventures.
  culinary: Thien Thao, a curious junior chef who helps family prepare fragrant herb broth and rice‑paper rolls, enjoys adding lime and chili to grilled shrimp tacos, experiments with LEGO‑inspired food
    plating, yet sometimes neglects to clean the cutting board promptly.
  core: Thien Thao, a competitive LEGO builder and soccer enthusiast who blends curiosity with practical organization, thrives on challenges, and balances a love for beach‑side shell hunting with a healthy
    skepticism of shortcuts.
background:
  cultural: Thien is a second‑generation Vietnamese‑American. His parents immigrated from Vietnam and maintain cultural traditions such as celebrating Tet, speaking Vietnamese at home, and attending a weekend
    Vietnamese language school. Living in League City near the vibrant Houston Vietnamese community, he participates in local cultural festivals and visits family‑run Vietnamese eateries. While he embraces
    typical American childhood experiences—school, sports, and video games—he also values the family‑centered customs, respect for elders, and culinary practices that reflect his Southeast Asian heritage.
