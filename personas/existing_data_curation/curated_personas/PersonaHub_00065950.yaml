persona_description: A healthcare professional who is interested in the link between hormones and cancer, particularly progesterone and breast cancer. They are likely to be a researcher, scientist, or physician
  who is studying the effects of hormones on the body and how they may contribute to the development of breast cancer. They may be particularly interested in the role of progesterone in the development
  of breast cancer and the potential impact of physical activity and calorie intake on progesterone levels. They may also be interested in the use of progesterone as a treatment for breast cancer or as
  a preventative measure.
