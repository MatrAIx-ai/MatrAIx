    and design consultation'', ''Basic carpentry for trim and molding work'']'
  hobbies: '[''Fine‑art painting (acrylics and watercolors)'', ''Sketching and illustration'', ''Visiting art galleries and murals in Fresno'', ''Listening to R&B, hip‑hop, and gospel music'', ''Cooking
    and experimenting with soul‑food recipes'', ''Growing indoor succulents and a small vegetable garden'', ''Hiking in the Sierra foothills'', ''Volunteering for community mural projects'', ''Reading interior
    design and sustainable living blogs'', ''Thrift‑store hunting for vintage home décor'']'
  career_goals: Patsy aims to leverage her hands‑on expertise into a self‑run interior finishing business within the next three years, focusing on sustainable, low‑VOC paints and culturally resonant mural
    work for local schools and community centers. She plans to obtain a California contractor’s license and a certification in green building practices, and to mentor aspiring painters in Fresno. Long‑term,
    she hopes to combine her trade with her artistic passion by offering bespoke decorative painting services and to play a leadership role in a regional artisans’ collective, ensuring steady income while
    preserving creative flexibility.
