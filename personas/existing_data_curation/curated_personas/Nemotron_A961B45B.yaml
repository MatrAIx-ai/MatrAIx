personas:
  professional: Patsy Houston, a 26-year-old painter and paperhanger in Fresno, combines hands-on expertise in drywall repair, color mixing, and eco-friendly decorative finishes with a curious yet laid-back
    work style, often juggling client requests and crew schedules with a flexible, sometimes disorganized approach that leans on their cooperative nature to keep projects moving smoothly.
  sports: Patsy Houston stays active by hiking the Sierra foothills on weekends, attending Fresno State Bulldogs football games for the communal vibe, and occasionally joining a local recreational basketball
    league, preferring low-impact cardio over structured gym routines despite a relaxed attitude toward a strict workout schedule.
  arts: Patsy Houston fuels creative expression by painting acrylic murals inspired by the bold colors of Frida Kahlo and the streetwise wit of Banksy, while listening to Beyoncé, Kendrick Lamar, and Kirk
    Franklin, and they regularly attend gallery openings featuring emerging California artists to keep their artistic palate fresh.
  travel: Patsy Houston prefers weekend getaways that mix art and nature, having explored the mural scene in Portland, the coastal towns of Santa Barbara, and the culinary delights of New Orleans, while
    dreaming of a spring trip to Oaxaca to study Mexican tile work, all while balancing a modest freelance budget and a flexible planning style.
  culinary: Patsy Houston enjoys cooking soulful Southern dishes like fried chicken, collard greens simmered with smoked turkey, and cornbread with honey butter, often experimenting with a pinch of smoked
    paprika or a dash of hot sauce while listening to gospel, and they frequently source fresh herbs from their indoor garden to elevate the flavor.
  core: Patsy Houston blends a hands-on painter's eye with a love for sustainable design, juggling freelance projects with weekend hikes, thrift-store hunting, and a habit of leaving paintbrushes in the
    bathroom sink, all while humming R&B tunes and dreaming of an eco-friendly interior-finishing empire.
background:
  cultural: Patsy was raised in a close‑knit African‑American family with roots in the Southern United States, carrying traditions of gospel music, oral storytelling, and Southern soul cuisine. Growing
    up in Fresno's historically small Black community, she found cultural affirmation through the local Black church, community festivals, and the city’s modest but vibrant Afro‑centric arts scene. These
    experiences instilled a strong sense of collective responsibility, perseverance, and pride in Black artistic expression, which she weaves into her work—whether recommending color palettes that echo
    warm, earthy tones reminiscent of heritage kitchens or creating murals that celebrate local Black history. Her cultural background also informs her preference for collaborative projects that uplift
    the community and foster shared spaces.
