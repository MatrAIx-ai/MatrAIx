  career_goals: James aims to move into a supervisory role within casino security, pursuing certifications such as Certified Protection Officer (CPO) and Advanced Surveillance Technology (AST). He plans
    to complete an associate degree in criminal justice within the next three years, which will position him for a transition into private investigations or security consulting. Ultimately, he envisions
    launching his own boutique security consultancy that blends cutting-edge tech with creative problem-solving, allowing him to merge his analytical strengths with his appreciation for innovative ideas.
