  hobbies: '[''Abstract Painting'', ''Mixed Media Art'', ''Reading Philosophy and Science Fiction'', ''Piano and Ambient Music Composition'', ''Chess'', ''Hiking'', ''Gardening'', ''Volunteering at Community
    Shelter'']'
  career_goals: Raymond aims to channel his creativity and organizational talent into establishing a community arts hub in Meridian that offers workshops, exhibitions, and mentorship programs for youth
    and adults. He also plans to complete his bachelor's degree in Communications to qualify for a leadership role in a nonprofit focused on arts education. In the longer term, he envisions becoming a consultant
    who helps cultural organizations develop sustainable programs and secure funding, while also authoring a series of illustrated essays on the intersection of art and social harmony.
