personas:
  professional: Krystle Bean, a retired engineer turned community arts‑STEM facilitator, leverages her data analysis and project management expertise to orchestrate intergenerational garden‑gallery workshops,
    and her talkative, methodical nature ensures every detail is meticulously planned and enthusiastically presented to senior audiences.
  sports: Krystle Bean enjoys brisk morning walks across the prairie to spot migrating birds, participates in the senior center’s bridge league, proudly roots for the Nebraska Cornhuskers football team,
    and occasionally joins a local walking club linked to the Omaha Storm.
  arts: Krystle Bean immerses herself in painting watercolors of native prairie wildflowers, draws inspiration from Georgia O’Keeffe and Claude Monet, curates community exhibitions featuring local talent
    such as Jane Doe, and regularly attends performances by the Omaha Symphony.
  travel: Krystle Bean plans her travel around cultural festivals, having recently toured the Smithsonian American Art Museum, the Getty Center, and the annual Nebraska State Fair, while she dreams of attending
    the Luminara festival in New York City next spring.
  culinary: Krystle Bean delights in crafting seasonal meals such as roasted heirloom tomatoes with fresh basil, corn succotash with wild rosemary, and baked squash infused with sage, often cooking directly
    from her garden harvest and serving them in handcrafted pottery bowls.
  core: Krystle Bean, a 77‑year‑old curiosity‑driven bridge champion, blends meticulous engineering precision with boundless artistic flair, never missing a chance to chat, plan, or paint, even if it means
    forgetting her glasses on the kitchen counter.
background:
  cultural: Krystle grew up in the heartland of Nebraska, raised in a close‑knit, predominantly white Midwestern community where self‑reliance, church involvement, and volunteerism were core values. Her
    upbringing on a family farm instilled an appreciation for the outdoors, perseverance, and practical problem‑solving. Over the decades she embraced the cultural shifts of the post‑war era, developing
    an open‑minded curiosity for art, new ideas, and unconventional thinking while retaining the Midwestern ethic of community service and humility.
attributes:
  skills: '[''Data analysis'', ''Project management'', ''Public speaking'', ''Community event planning'', ''Computer literacy tutoring'', ''Art exhibition coordination'', ''Gardening and horticulture'',
    ''Volunteer coordination'', ''Grant writing'', ''Basic engineering troubleshooting'']'
  hobbies: '[''Painting'', ''Visiting art galleries'', ''Reading historical novels'', ''Bird watching'', ''Gardening'', ''Playing bridge'', ''Volunteer teaching basic computing'', ''Traveling to cultural
    festivals'', ''Pottery'', ''Puzzle solving'', ''Cooking'']'
  career_goals: Although retired, Krystle aims to become the catalyst for a regional Arts‑and‑STEM enrichment program that links seniors with youth through joint workshops, garden projects, and exhibition
    tours. She aspires to mentor fellow elders in using modern technology, author a memoir that intertwines her engineering background with her love of art, and secure sustainable funding for a community
    garden‑gallery hybrid space. Traveling to major U.S. museums and documenting local Nebraska history are also high on her personal ambition list.
