personas:
  professional: Lethia Steele, a 16‑year‑old high‑school junior, channels their natural knack for rallying peers, quick‑thinking conflict mediation, and budding TikTok video‑editing into a budding ambition
    to become a community youth coordinator who blends creative social‑media outreach with hands‑on mental‑health advocacy, even as their flexible, occasionally scatter‑shot planning sometimes clashes with
    the demands of future nursing or occupational‑therapy studies.
  sports: Lethia Steele drifts between the city’s community basketball courts and neighborhood soccer fields, cheering on the Cincinnati Bearcats and Bengals while playing in a mixed‑gender rec league that
    satisfies their love for team camaraderie and social energy, though their relaxed attitude sometimes leads to missed practice sessions.
  arts: Lethia Steele channels the rhythm of Drake and the swagger of Megan Thee Stallion into high‑energy hip‑hop dance videos for TikTok, while their sketchbook overflows with Virgil Abloh‑inspired streetwear
    concepts, and their evenings often include devouring urban‑fiction works by Tracy Brown, all of which shape their vibrant creative identity.
  travel: Lethia Steele prefers spontaneous weekend escapades, from buzzing Cincinnati neighborhood festivals and riverfront bike rides to planned day trips to Louisville’s music scene and future dreams
    of catching a spring fashion pop‑up in New York City, a travel style that balances their love for local culture with a wanderlust that’s often sparked by TikTok trends.
  culinary: Lethia Steele whips up family‑style soul‑food staples such as crispy fried chicken, buttery cornbread, and seasoned collard greens—often filming quick TikTok cooking demos that showcase their
    favorite hot‑sauce kick and a sprinkle of smoked paprika—while occasionally indulging in late‑night ramen bowls after a long dance session.
  core: Lethia Steele is a socially‑driven, creativity‑fueled teen who balances spontaneous TikTok fame and community dance battles with a scatter‑shot knack for budgeting and a lingering undercurrent of
    anxiety that fuels both their empathy and occasional overthinking.
background:
  cultural: Lethia is rooted in African‑American traditions that have been woven into her family’s life in Cincinnati’s West End. Her grandparents were part of the Great Migration, bringing Southern cultural
    practices, gospel music, and soulful cooking to Ohio. She regularly attends a local Baptist church where she participates in choirs and community service events. Family gatherings center around soul‑food
    dishes like fried chicken, collard greens, and sweet potato pie, and stories of civil‑rights activism in Ohio are shared during holidays. She proudly celebrates Juneteenth with community picnics, spoken‑word
    performances, and historical reflections, and she embraces the blend of modern urban culture and historic Black heritage that defines her identity.
