  hobbies: '[''hip hop dancing'', ''basketball and soccer with friends'', ''TikTok video creation'', ''fashion sketching'', ''church youth group volunteering'', ''cooking family soul‑food recipes'', ''listening
    to R&B and hip hop music'', ''reading urban fiction'', ''exploring local parks and riverfront trails'']'
  career_goals: Lethia dreams of turning her love for community and creativity into a career that lets her uplift other youths. She envisions becoming a community youth coordinator or a mental‑health advocate
    who uses social media to spread positivity and coping strategies. At the same time, she is drawn to the idea of a flexible, people‑focused profession like nursing or occupational therapy, where she
    can blend practical care with her natural empathy. Ultimately, she wants a role that lets her stay connected with friends, express herself creatively, and make a tangible difference in her neighborhood.
