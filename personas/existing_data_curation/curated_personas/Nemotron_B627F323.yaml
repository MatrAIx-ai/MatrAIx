  career_goals: Palak aspires to pursue a career in civil engineering, focusing on sustainable infrastructure that enhances safety and accessibility in her community. She intends to earn a scholarship to
    a reputable engineering program, where she can deepen her knowledge of structural design, environmental impact assessment, and project management. Long-term, she hopes to work on public-works projects
    such as safe pedestrian pathways and green school facilities in underserved neighborhoods. Alongside her professional ambitions, Palak aims to continue mentoring younger students through tutoring and
    STEM outreach, combining her technical interests with a desire to give back.
