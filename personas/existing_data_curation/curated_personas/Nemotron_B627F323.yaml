personas:
  professional: Palak Romano, a 14‑year‑old middle school student, channels their love of logic puzzles and meticulous organization into a junior volunteer librarian role where they catalog books, design
    puzzle‑based reading challenges for younger children, and keep precise records of community events.
  sports: Palak Romano enjoys playing recreational badminton at the community center, follows the local high‑school varsity soccer team the Riverdale Raiders, and they proudly wear a Metro Cubs baseball
    cap, integrating these interests into a structured fitness routine that balances team play with solo stretching after dance practice.
  arts: Palak Romano expresses creativity through beginner Bharatanatyam lessons, avidly reads mystery novels by Agatha Christie and R.L. Stine, and they find inspiration in the contemporary dance troupe
    'Rising Stars' and pianist Lang Lang, all of which shape their reflective journaling habit.
  travel: Palak Romano loves planning weekend excursions to the nearby Redwood State Park, and they dream of exploring Kyoto's historic temples and Lisbon's pastel de nata bakeries, preferring itineraries
    that blend structured sightseeing with spontaneous photo‑journal entries.
  culinary: Palak Romano enjoys cooking simple spiced lentil dal, vegetable pulao, and homemade roti with their mother, skillfully seasoning with cumin, turmeric, and fresh coriander, while they experiment
    with plating to make meals aesthetically pleasing for family dinners.
  core: Palak Romano is a detail‑oriented 14‑year‑old who balances puzzle‑solving, disciplined dance practice, and methodical budgeting, and they approach each task with a quiet sense of humor and a habit
    of double‑checking everything before moving on.
background:
  cultural: Palak is a second-generation South Asian American of Indian descent, raised in Clarksville, Maryland. Her household blends Indian cultural traditions with American suburban life. She celebrates
    Diwali, Holi, and other festivals with family gatherings, traditional foods, and occasional temple visits. At home, she hears Hindi and English, and she has learned basic conversational Hindi from her
    parents. Her family places a high value on education and community service, encouraging her to excel academically while staying connected to her heritage through dance, music, and cultural events at
    the local Hindu temple. Palak navigates a bicultural identity, embracing both her Indian roots and the diverse, inclusive environment of Howard County.
