persona_description: An ornithologist who is known for her work on the birds of the Matto Grosso region of Brazil, particularly her research on the birds collected by Theodore Roosevelt during his expedition
  to Brazil. She has published several articles and reports on her studies, including "The birds of Matto Grosso, Brazil" (1930), "Gazetteer and Maps Showing Collecting Stations Visited by Emil Kaempfer
  in Eastern Brazil and Paraguay" (1935), and "Studies of Birds from Eastern Brazil and Paraguay, Based on a Collection Made by Emil Kaempfer" (1937). She was married to Victor Reichenberger and later married
  Walter W. Naumburg.
