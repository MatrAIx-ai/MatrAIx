  hobbies: '["Seasonal recipe development","Food photography","Hiking in the Sierra foothills","Reading culinary literature","Visiting farmers markets","Listening to entrepreneurship and hospitality podcasts","Yoga
    and mindfulness practice","Board games with close friends","DIY home brewing"]'
  career_goals: Leveraging her competitive drive and practical mindset, Darlene aims to advance to a regional management role within the next five years, overseeing multiple locations and implementing efficiency
    initiatives across the chain. She plans to acquire advanced certifications in hospitality management and eventually launch her own boutique farm‑to‑table café that emphasizes sustainable sourcing and
    data‑driven menu innovation. Her long‑term ambition includes mentoring emerging food‑service professionals while maintaining a reputation for operational excellence.
