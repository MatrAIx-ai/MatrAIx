  career_goals: Claude plans to earn his GED within the next year, then enroll in a community‑college program focused on business administration or construction management. His long‑term ambition is to
    become a project manager for a local construction firm or to launch his own landscaping business. He also hopes to serve his community, considering roles such as a volunteer firefighter, police officer,
    or enlisting in the Army National Guard to gain structured training and benefits.
