personas:
  professional: Claude Davis, a disciplined teenage organizer who coordinates his church youth group events and community-center basketball leagues, leverages his strong time-management, conflict-mediation,
    and public-speaking abilities to lay the groundwork for a future career as a construction project manager or a landscaping business owner.
  sports: Claude Davis, a 17-year-old basketball enthusiast who plays weekly pickup games at the local community center and follows the Los Angeles Lakers, also supports the Dallas Cowboys during football
    season, and is a member of the town's youth fishing club that doubles as a low-key cardio routine in the summer.
  arts: Claude Davis, an avid streamer who produces multiplayer gaming content inspired by creators like Markiplier and Pokimane, enjoys listening to Kendrick Lamar and Taylor Swift while editing videos,
    and finds creative release through journaling and occasional sketching of comic-book characters.
  travel: Claude Davis, a budget-conscious teen who has fished with his dad on Lake Tahoe, dreams of hiking the Grand Canyon and visiting the Canadian Rockies for a summer fishing trip, and prefers meticulously
    planned road trips over spontaneous flights, often using discount travel apps to stretch his limited funds.
  culinary: Claude Davis, a competent home cook who loves grilling salmon for his family, whipping up mac and cheese on study nights, and experimenting with homemade fish tacos seasoned with cilantro, lime,
    and jalapeno, while still indulging in late-night pizza deliveries after gaming sessions.
  core: Claude Davis blends razor-sharp organization with high-energy socializing, battling anxiety through journaling while juggling teen responsibilities, tech hobbies, and dreams of leading construction
    projects or a landscaping venture.
background:
  cultural: Claude grew up in Livingston, a small town in East Texas, within a working‑class white family that has deep roots in the region. The community is predominantly Southern Baptist, emphasizing
    church involvement, family ties, and neighborly support. Local traditions such as high‑school football, country music, hunting, fishing, and Saturday barbecues shape his worldview. He identifies with
    modest, community‑oriented values common to Polk County, respects rural life, conservative social norms, and the importance of personal responsibility.
