personas:
  professional: A meticulous budding systems administrator, Carlos Garcia applies Python automation and SQL basics to streamline network tasks, while their love of structure and solitude fuels a preference
    for solo troubleshooting and detailed technical documentation.
  sports: Carlos Garcia enjoys solo trail runs on the nearby mesas, tracks the New Mexico State Aggies football team for college spirit, keeps an eye on the Denver Broncos as their NFL favorite, and participates
    in the Otero County Hiking Club, where they methodically log each mile with a GPS watch.
  arts: Carlos Garcia spends evenings editing digital photographs of desert nightscapes, draws inspiration from Ansel Adams' black‑and‑white landscapes and the synthwave soundscapes of Boards of Canada,
    and sharpens strategic thinking by playing Terraforming Mars, a board game that mirrors their love of competitive problem solving.
  travel: Carlos Garcia prefers meticulously planned solo trips, having already trekked White Sands National Park and stargazed in Chile’s Atacama Desert, and they now dream of a low‑budget overland adventure
    across Iceland’s volcanic Highlands while balancing a modest savings pool.
  culinary: Carlos Garcia enjoys simple, protein‑rich meals like grilled chicken fajitas with fresh salsa and homemade guacamole, and they often experiment with quinoa bowls topped with black beans, avocado,
    and a dash of chipotle, though their culinary skill remains at a pragmatic home‑cooking level.
  core: Carlos Garcia is a solitude‑driven, methodical 18‑year‑old who balances a competitive edge in coding and board games with a disciplined approach to finances and health, even as they struggle with
    occasional back aches and impulsive tech gadget splurges.
background:
  cultural: Carlos grows up in a Mexican‑American household in Chaparral, New Mexico, where Spanish is spoken at home and family traditions such as Día de los Muertos and Mexican culinary customs are celebrated.
    His upbringing blends the close‑knit community values of his Mexican heritage with the practical, independent spirit of the Southwestern frontier. This bicultural environment has fostered his bilingual
    abilities and a respect for both collective family ties and personal self‑reliance.
attributes:
  skills: '["Python programming", "Basic data analysis (Excel, SQL)", "Mechanical troubleshooting", "Bilingual communication (Spanish/English)", "Technical writing", "Circuit prototyping", "Digital video
    editing"]'
  hobbies: '["Coding personal projects", "Reading science-fiction", "Hiking", "Stargazing (amateur astronomy)", "Digital photography", "Solo strategy board games"]'
  career_goals: Carlos aims to complete an associate’s degree in Computer Science and transition to a full‑time role as a network or systems administrator, where he can apply his methodical problem‑solving
    skills in a stable, structured environment. In the longer term, he envisions launching a freelance tech consulting service for small businesses in the Otero County area, leveraging his practical expertise
    while maintaining a predictable work schedule that respects his need for solitude.
