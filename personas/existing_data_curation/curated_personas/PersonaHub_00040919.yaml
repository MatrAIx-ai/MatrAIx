persona_description: A policy expert who advocates for economic diversity in education and is passionate about promoting equity and access to higher education for all students, regardless of their socioeconomic
  background. They have a deep understanding of the challenges faced by low-income students in traditionally segregated schools and are committed to finding solutions that help them overcome these barriers.
  This person is well-versed in the implementation and evaluation of integrated primary school systems and has a proven track record of successfully implementing such initiatives in various settings. They
  are also skilled at identifying the root causes of economic inequality and advocating for policies that address these issues.
