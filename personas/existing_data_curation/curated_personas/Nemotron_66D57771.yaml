  hobbies: '["Hip‑hop dance", "School cheerleading", "Club soccer", "Volunteer tutoring at community center", "Journaling", "Reading young‑adult fiction", "Listening to R&B and soul music", "Participating
    in youth empowerment workshops", "Yoga for stress relief", "Organizing study groups"]'
  career_goals: Emma is determined to complete her high school education, either by graduating on schedule or obtaining a GED if necessary, and then pursue a community‑college degree in health sciences.
    Her long‑term ambition is to become a registered nurse who specializes in adolescent mental health, allowing her to combine her structured, caring nature with her personal experience of anxiety. She
    also hopes to serve as a mentor for younger students in her community, eventually taking on leadership roles in health outreach programs that address the needs of under‑served Black youth.
