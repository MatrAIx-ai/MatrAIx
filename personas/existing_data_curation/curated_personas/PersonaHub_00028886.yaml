persona_description: A professional with expertise in conservation and management of Arctic flora and fauna, particularly in the context of seabird harvest and its impact on the Arctic ecosystem. This person
  is likely to be a scientist, environmentalist, or a conservationist who has conducted research and analyzed the impacts of human activities on Arctic seabird colonies. They may have a background in marine
  biology, ecology, or related fields, and have experience in monitoring and assessing seabird harvest in the Arctic. This person is likely to be knowledgeable about the circumpolar region and the different
  seabird harvest regimes in different countries, and has a deep understanding of the ecological and conservation implications of these activities.
