personas:
  professional: Levy Bailey, a 53-year-old aspiring home-based handyman, combines a methodical, organized approach with a curiosity for practical solutions, leveraging their carpentry, gardening, and budgeting
    skills to plan a modest service while coordinating church volunteer schedules and mentoring neighbors.
  sports: Levy Bailey enjoys seasonal fishing on the Ochlockonee River, follows the Jacksonville Jaguars and the Florida Gators, and participates in a weekend bowling league at the local community center,
    where they often cheer loudly.
  arts: Levy Bailey sings baritone in their church choir, draws inspiration from classic blues musicians like B.B. King and gospel legends such as Mahalia Jackson, and reads historical biographies of figures
    like Abraham Lincoln and Eleanor Roosevelt for leisure, often sharing favorite passages with friends.
  travel: Levy Bailey prefers road-trip itineraries, having visited Savannah’s historic district and the Gulf Coast for fishing, dreaming of a future drive through the Great Smoky Mountains while balancing
    a modest travel budget and family responsibilities, and they plan each itinerary meticulously.
  culinary: Levy Bailey enjoys cooking Southern comfort dishes such as fried catfish, hushpuppies, collard greens seasoned with smoked turkey, and sweet potato pie, and they often experiment with fresh
    garden produce like okra, tomatoes, and herbs, rating their cooking skill as competent but occasionally over-salting.
  core: Levy Bailey is a methodical, community-oriented handyman-in-training who balances a love of gardening, fishing, and choir singing with a disciplined budget, yet occasionally forgets to stretch after
    a long day of carpentry, and they strive to improve their wellness habits.
background:
  cultural: Levy’s cultural identity is rooted in the African‑American experience of the Florida Panhandle. He grew up immersed in the traditions of gospel music, church fellowship, and Southern hospitality.
    Family stories of the civil‑rights era and the Great Migration echo through his household, shaping a deep respect for community solidarity and self‑reliance. The cuisine he prepares—collard greens,
    cornbread, smoked fish—reflects a lineage that blends West‑African culinary roots with Southern farm‑to‑table practices. His participation in local church festivals, church‑sponsored neighborhood clean‑ups,
    and Juneteenth celebrations in Crawfordville highlight a continual engagement with both his heritage and the broader regional culture.
attributes:
  skills: '[''Carpentry'', ''Basic plumbing and electrical repair'', ''Home gardening'', ''Budgeting and household financial management'', ''Community organizing and event planning'', ''Southern cooking'',
