personas:
  professional: Quest Carbo is a veteran experimental physicist and educator who leverages precision spectroscopy and computational modeling to design sustainable energy materials, while methodically building
    interdisciplinary curricula and mentoring diverse graduate students, balancing curiosity with pragmatic grant‑writing and a competitive drive to secure federal funding.
  sports: Quest Carbo devotes weekends to hiking Presque Isle State Park with the Presque Isle Hiking Club, sails on Lake Erie with the Erie Sailing Association during summer, joins the local senior dance
    evenings for low‑impact cardio, follows the Buffalo Bills and Sabres fervently, and in winter swaps trails for cross‑country skiing on nearby state forest tracks.
  arts: Quest Carbo frequents intimate folk concerts featuring the Erie Folklore Band, contributes lively discussion to a neighborhood book club that tackles biographies of pioneering scientists and popular‑science
    works such as 'The Gene', and occasionally volunteers to lead art‑science workshops that blend photography of local birdlife with scientific annotation.
  travel: Quest Carbo plans travel with meticulous itineraries, favoring adventure‑heavy outings like hiking the Adirondacks, sailing to Put‑in‑Bay on Lake Erie, and scenic drives to Niagara Falls, has
    already explored Acadia National Park and hopes to chase the Northern Lights in Iceland once retirement fully allows.
  culinary: Quest Carbo cultivates heirloom tomatoes, rosemary, and basil in a thriving garden and channels that bounty into rustic dishes such as heirloom tomato bruschetta, rosemary‑infused lamb stew,
    and basil‑pesto pasta, while also indulging in seasonal herb‑scented salads and occasionally preserving pickled cucumbers for potluck feasts.
  core: Quest Carbo blends scholarly rigor with community spirit, turning a lifetime of experimental physics into collaborative, sustainable solutions while navigating retirement with a competitive edge,
    a love for the outdoors, and a habit of occasionally over‑watering the garden.
background:
  cultural: Quest was raised in a middle‑class family of German‑Polish descent in Erie County, Pennsylvania. The region’s industrial‑agricultural heritage and close‑knit community values shaped her pragmatic
    outlook and strong work ethic. Growing up she experienced the blend of Midwestern modesty, respect for education, and a tradition of community service that is characteristic of north‑east Pennsylvania’s
    small towns. She maintains ties to her cultural roots through participation in local heritage festivals, involvement with the Lutheran church’s outreach programs, and a love for regional foods such
    as lake‑caught fish and farm‑fresh produce. These influences, combined with a lifelong curiosity about the natural world, underpin her balanced approach to science and education.
attributes:
  skills: '["Experimental physics", "Instrumentation (spectroscopy, microscopy)", "Computational modeling", "Statistical analysis (R, Python)", "Scientific writing", "Grant writing", "Curriculum development",
