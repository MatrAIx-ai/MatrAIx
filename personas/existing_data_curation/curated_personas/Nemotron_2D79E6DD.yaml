  hobbies: '["Hiking in Presque Isle State Park", "Birdwatching and nature photography", "Science outreach volunteering", "Gardening (heirloom tomatoes, roses, herbs)", "Bridge club", "Hosting potluck dinners",
    "Folk music concerts", "Book club (historical biographies & popular science)", "Sailing on Lake Erie"]'
  career_goals: Looking ahead, Quest aims to lead an interdisciplinary research hub at her university that focuses on sustainable energy materials, leveraging her expertise in spectroscopy and computational
    modeling to bridge fundamental physics with real‑world applications. She plans to secure a multi‑year federal grant to develop next‑generation photovoltaic composites, establish a regional fellowship
    to support underrepresented students in STEM, and author a textbook merging physical‑science principles with innovative pedagogical strategies. In the longer term she aspires to serve as department
    chair or institute director, influencing science policy at the state level to expand STEM outreach in Erie County and ensure her research has lasting economic and educational impact.
