personas:
  professional: Adolfo Perez is a certified journeyman electrician who excels at interpreting blueprints, installing NEC‑compliant residential and light commercial wiring, and integrating smart‑home and
    solar technologies, applying a methodical, safety‑first mindset while they coordinate crew schedules with the reliability of a project planner.
  sports: Adolfo Perez is a forward for the South Beach Strikers amateur soccer team, spikes serve after serve in beach volleyball games at South Beach, and follows the Miami Heat, Inter Miami CF, and Miami
    Marlins, while they blend competitive play with regular workouts at a local CrossFit box to stay in peak condition.
  arts: Adolfo Perez immerses themselves in Miami’s vibrant nightlife by dancing to salsa playlists featuring Marc Anthony and Celia Cruz, curates spontaneous dance‑off sessions with friends, and attends
    live performances by local Latin jazz trio Bomba Casino, while they also stream hits from Bad Bunny and J Balvin to fuel their competitive FIFA sessions.
  travel: Adolfo Perez prefers weekend getaways that mix adventure and cultural immersion, planning spontaneous road trips to the Everglades and Key West while dreaming of future trips to Cartagena’s historic
    old town and Medellín’s coffee regions, and they balance travel costs with a modest savings plan that allocates a fixed monthly amount for airfare and lodging.
  culinary: Adolfo Perez enjoys cooking arepas stuffed with shredded cheese and black beans and preparing hallacas layered with plantain, pork, and olives, while also experimenting with Miami’s famed Cuban
    sandwich and fresh ceviche, and they showcase an intermediate skill level that blends traditional corn masa techniques with a love for bold citrus and cilantro flavors.
  core: Adolfo Perez blends an energetic social life—organizing salsa nights, leading beach volleyball games, and gaming friends in fierce FIFA battles—with a meticulous work ethic that drives their electrician
    career, and they have a penchant for occasional impulsive spending on tech gadgets.
background:
  cultural: Adolfo is the son of Venezuelan immigrants who moved to Miami when he was a child. He grew up speaking Spanish at home while navigating American school life, creating a bicultural identity that
    blends Caribbean-Latin warmth with the fast-paced Southern vibe of South Florida. Family traditions such as celebrating Carnaval, preparing hallacas during Christmas, and listening to Venezuelan folk
    music like joropo remain important to him. He remains active in the local Venezuelan community, attending events at the Cuban-Venezuelan Cultural Center and participating in charity drives for recent
    arrivals. This heritage informs his values of family solidarity, hospitality, and a strong work ethic, while also motivating him to give back to both his ethnic community and the broader Miami neighborhood.
attributes:
  skills: '[''Residential wiring and fixture installation'', ''Conduit bending and cable management'', ''NEC code interpretation and compliance'', ''Electrical troubleshooting and diagnostics'', ''Smart-home
    device integration (e.g., Philips Hue, Nest)'', ''Solar PV system wiring and inverter setup'', ''EV charging station installation'', ''Blueprint and schematic reading'', ''Use of power tools and test
    equipment'', ''Bilingual communication (Spanish/English)'']'
  hobbies: '[''Amateur soccer (local league)'', ''Beach volleyball'', ''Salsa dancing'', ''Cooking Venezuelan dishes (arepas, hallacas)'', ''DIY electronics/IoT projects with Arduino and Raspberry Pi'',
    ''Attending multicultural festivals'', ''Playing video games (FIFA, Call of Duty)'', ''Exploring Miami’s food scene'']'
  career_goals: He aims to earn his master electrician license within the next three years, followed by obtaining a state-approved contractor’s license. Adolfo plans to specialize in renewable-energy installations,
    particularly residential solar and EV charging infrastructure, to position himself at the forefront of Miami’s green-building boom. In the long term, he envisions launching his own electrical contracting
    firm that employs other young immigrants and offers training programs. He also hopes to complete an associate degree in electrical engineering technology to deepen his technical expertise and eventually
    serve as a mentor or instructor for apprentices.
