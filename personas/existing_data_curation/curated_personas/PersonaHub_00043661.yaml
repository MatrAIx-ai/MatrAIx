persona_description: A developmental psychologist who specializes in the study of critical periods in development, particularly in the areas of language development, fetal alcohol syndrome, and schizophrenia.
  She is interested in understanding the mechanisms behind the development of these disorders and the role of early experiences in shaping cognitive and neural functions. She is also interested in the use
  of animal models to study critical periods and the potential implications for human development.
