personas:
  professional: John Grossman, a meticulous graphic designer with a disciplined workflow, leverages Adobe Creative Suite, typography, and systematic design processes to deliver clean brand identities and
    packaging for Great Lakes businesses, and they mentor introverted designers while pursuing Adobe Certified Expert credentials.
  sports: John Grossman, an avid hiker of the Lake Michigan shoreline and a dedicated fan of the Milwaukee Brewers, Green Bay Packers, and Milwaukee Bucks, joins a local trail club for weekend treks, keeps
    a modest cardio routine focused on brisk walks, and they prefer solitary exercise over team sports, though they cheer loudly during televised games.
  arts: John Grossman, a digital illustration enthusiast who draws inspiration from minimalist artists like Agnes Martin and ambient composers such as Brian Eno, regularly reads Print and Eye magazines,
    curates a personal collection of black-and-white landscape photographs, and they spend evenings crafting wooden models while listening to ambient soundscapes.
  travel: John Grossman, a planner-oriented traveler, maps out weekend road trips to Door County, the Apostle Islands, and occasionally to Chicago's Art Institute, favors meticulously scheduled itineraries
    with pre-booked lodging and photography spots, and they balance a modest budget with a desire to capture serene lake vistas for their portfolio.
  culinary: John Grossman, a modest home cook who enjoys preparing cedar-plank salmon, butter-rich mac and cheese, and classic apple pie using fresh dill, sharp cheddar, and seasonal apples, frequents local
    diners for a cheese-curd platter and craft beer, and they appreciate meals that blend comfort with precision, though they sometimes over-salt dishes in pursuit of flavor.
  core: John Grossman, a disciplined introvert with a penchant for clean design, meticulous budgeting, and structured hobbies, channels perfectionist tendencies into graphic projects while navigating occasional
    back pain and a competitive edge.
background:
  cultural: John grew up in a middle‑class, predominantly white neighborhood in Kenosha, Wisconsin, a city shaped by its industrial and lake‑front heritage. His family’s lineage includes German and Polish
    immigrants who settled in the region during the early 20th century, imparting values of hard work, practicality, and modest living. Local traditions such as summer festivals, community art programs,
    and the regional love for lake recreation and classic American diners have influenced his sense of identity. The Midwestern cultural emphasis on self‑reliance, punctuality, and order aligns with his
    preference for structure and his methodical approach to both work and personal pursuits.
