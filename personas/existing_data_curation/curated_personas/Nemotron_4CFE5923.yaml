  career_goals: John aims to become a senior graphic designer or art director within the next five years, focusing on brand identity and packaging projects for regional businesses in the Great Lakes area.
    He plans to deepen his expertise in systematic design processes, earn Adobe Certified Expert credentials, and build a portfolio that showcases his clean, functional aesthetic. Ultimately, he hopes to
    launch a boutique freelance studio that offers structured, high-quality design solutions to small-to-mid-size companies, allowing him to work independently while mentoring other introverted designers.
