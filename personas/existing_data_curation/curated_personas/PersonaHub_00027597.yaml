persona_description: 'A policy analyst and advocate for social justice in the Arctic, who is interested in developing indicators to track changes in human development and cultural practices over time. This
  person is knowledgeable about the AHDR and its limitations, and seeks to fill the gap by devising a limited set of indicators that reflect key aspects of human development in the Arctic. They are interested
  in the six domains of Arctic social indicators: Fate control, cultural integrity, contact with nature, material well-being, education, and health/demography, and aim to develop indicators for each domain
  that are tractable in terms of measurement and can be monitored over time. They are familiar with the IASSA newsletter and the ASI project, and are eager to contribute to the development of Arctic social
  indicators.'
