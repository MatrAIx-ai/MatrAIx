  career_goals: Margaret aims to translate her extensive home and volunteer management experience into a part‑time, home‑based catering and event‑planning business that serves local churches and community
    groups. To support this, she plans to enroll in a bachelor’s program in nonprofit management, with the longer‑term goal of becoming a program coordinator for a regional nonprofit focused on community
    development and youth services. She also hopes to develop leadership skills that will allow her to mentor fellow volunteers and advocate for resources that improve local family support services.
