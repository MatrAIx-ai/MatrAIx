  career_goals: Elida aims to complete a bachelor’s degree in Business Management within the next two years to deepen her strategic expertise. Her short‑term goal is to advance from first‑line supervisor
    to store manager, where she can implement employee‑wellness initiatives and introduce art‑focused visual merchandising that reflects her creative curiosity. Long‑term, she aspires to become a regional
    manager overseeing multiple locations, championing inclusive hiring practices, bilingual training programs, and community partnership projects that support local Mexican‑American families. In parallel,
    she dreams of opening a boutique that blends contemporary fashion with traditional Mexican craftsmanship, providing a platform for emerging artisans while maintaining a welcoming, harmonious shopping
    environment.
