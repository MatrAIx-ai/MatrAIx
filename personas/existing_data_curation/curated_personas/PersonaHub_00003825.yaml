persona_description: A scientist and researcher who focuses on the study of cancer and its metastatic processes, particularly using the zebrafish as a model organism. Richard White's work has contributed
  to our understanding of the role of adipocytes in the tumor microenvironment and the ways in which these cells can promote cancer cell growth and metastasis. He is interested in developing new therapeutic
  strategies to treat metastatic cancer.
