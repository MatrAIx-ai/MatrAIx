personas:
  professional: Josefa Curbelo is a bilingual TSA security screener with expertise in X‑ray imaging, walk‑through metal detectors, and explosive trace detection, who leverages their sharp observational
    abilities and outgoing personality to de‑escalate tense passenger interactions, compensates for their natural disorganization with rigorous checklists, and satisfies their competitive curiosity by staying
    ahead of emerging security technologies.
  sports: Josefa Curbelo energizes weekends with Zumba classes, hikes through Red Rock Canyon as a member of the Desert Trail Hikers Club, and passionately supports the Las Vegas Golden Knights and Las
    Vegas Aces, all while adapting their fitness routine to a fluctuating shift schedule.
  arts: Josefa Curbelo channels their love for rhythm into salsa nights dancing to the classics of Celia Cruz and Marc Anthony, enjoys live productions featuring Lin‑Manuel Miranda, and curates a personal
    playlist that blends Diana Krall's smooth jazz with Juan Luis Guerra's vibrant Caribbean beats.
  travel: Josefa Curbelo favors short, well‑planned getaways that combine cultural immersion and outdoor adventure, such as recent weekend trips to Santa Fe's art markets, a hiking expedition in Sedona's
    red rocks, and a future plan to explore Cartagena's historic walled city, all while navigating the constraints of irregular work hours and a tight travel budget.
  culinary: Josefa Curbelo's culinary repertoire showcases mastery of hearty island‑inspired dishes like mofongo stuffed with chicharrón, arroz con gandules simmered with sofrito, and tender pork al horno,
    while they also relish upscale dining experiences featuring a perfectly seared ribeye steak topped with truffle butter.
  core: Josefa Curbelo thrives on vibrant social connections and high‑energy work, channels their competitive curiosity into mastering security tech, yet their emotional reactivity often sparks spontaneous
    spending and occasional lapses in routine.
background:
  cultural: Josefa identifies strongly with her Puerto Rican heritage, having grown up in a bilingual household where Spanish was spoken alongside English. She maintains close ties to the vibrant Puerto
    Rican community in Las Vegas, participating in annual festivals such as Noche de San Juan and supporting cultural organizations that preserve traditional music, dance, and cuisine. Her cultural values
    emphasize family connections, communal support, and a love for lively celebrations, which she integrates into her daily life through cooking, dancing, and community outreach. While she navigates the
    fast‑paced, multicultural environment of an international airport, she draws on her cultural background to bridge gaps between travelers and staff, offering a sense of familiar hospitality to Spanish‑speaking
    passengers.
attributes:
  skills: '[''X-ray baggage inspection'', ''Metal detector operation'', ''Explosive trace detection'', ''Bilingual communication (Spanish/English)'', ''Customer service and conflict de-escalation'', ''Situational
