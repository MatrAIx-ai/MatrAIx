  hobbies: '[''Salsa and merengue dancing'', ''Zumba and group fitness classes'', ''Hiking in Red Rock Canyon'', ''Cooking Puerto Rican cuisine'', ''Hosting cultural potluck gatherings'', ''Mindfulness
    meditation and journaling'', ''Volunteering at a senior center (computer/safety workshops)'', ''Following security technology forums and true-crime podcasts'']'
  career_goals: Josefa aims to advance from her current screener role to a supervisory position within the Transportation Security Administration, such as Lead Screener or Shift Supervisor, where she can
    mentor newer agents and influence procedural improvements. She plans to complete the TSA Advanced Explosives Detection Officer certification and attend leadership workshops to strengthen her managerial
    skills. Additionally, she hopes to develop a community outreach program that educates local Puerto Rican residents about travel security and personal safety, leveraging her bilingual abilities and passion
    for helping others. Reducing the stress associated with irregular schedules is also a priority, so she seeks a more predictable shift pattern that supports her emotional well‑being.
