persona_description: A scientist who specializes in renewable energy, particularly solar thermal power plants. They are interested in the environmental impacts of these projects and the economic feasibility
  of solar thermal power compared to other forms of power production. They are concerned about the potential for bird deaths and are advocating for a moratorium on new permits for solar thermal projects
  until an annual survey of bird deaths can be undertaken. They are also interested in the economic implications of solar thermal power projects and the potential for diverting funds from other means of
  power production.
