personas:
  professional: Louie Torres, a budding mini-game developer and future-oriented student, blends vivid imagination with emerging Scratch coding skills to turn abstract ideas into playable prototypes while
    they balance school responsibilities with creative play.
  sports: Louie Torres, an energetic after-school soccer enthusiast, dribbles for the Greenfield Youth Soccer Club, idolizes Manchester United’s midfield maestros, and they keep fit by biking through nearby
    forests on weekends.
  arts: Louie Torres, a sketch-loving dreamer, fills sketchbooks with dragons inspired by James Gurney’s Dinotopia, riffs on the soundtrack of The Legend of Zelda, and they draw influence from Pixar’s animated
    storytelling while rehearsing scenes from Harry Potter in drama club.
  travel: Louie Torres, a curious explorer, has biked to the local county fair, visited the Grand Canyon on a family road trip, and they dream of trekking the Redwoods of California and wandering the ancient
    castles of Scotland.
  culinary: Louie Torres, a budding kitchen experimenter, favors pepperoni pizza, spaghetti carbonara with pancetta, and they build their own chicken quesadillas, often perfecting chocolate chip cookies
    with extra dark chocolate chunks.
  core: Louie Torres is a ten-year-old imagination powerhouse who channels fantasy sketches into LEGO fortresses, rides a bike through forests, and they balance school chores with endless game-design experiments,
    though they sometimes hoard spare change for the next big set.
background:
  cultural: Louie grew up in a middle‑class family in Beaverton, Oregon, a suburban community in Washington County that values outdoor recreation, environmental stewardship, and a progressive public‑school
    system. His household celebrates typical American holidays such as Thanksgiving and Christmas, and often takes weekend trips to nearby parks and forests. The Pacific Northwest’s multicultural atmosphere
    and his school’s emphasis on creativity and collaboration have shaped his open‑minded, community‑oriented outlook.
attributes:
  skills: '[''Drawing and illustration'', ''Storytelling and creative writing'', ''Block‑based programming (Scratch)'', ''Collaborative project leadership'', ''Public speaking'', ''Organizational skills
    for school tasks'', ''LEGO building and spatial design'']'
  hobbies: '[''Sketching and drawing'', ''LEGO building'', ''Cycling and nature hikes'', ''Minecraft and Scratch game creation'', ''Reading fantasy books'', ''Drama club performances'', ''Soccer'']'
  career_goals: Louie dreams of becoming a video game designer and digital artist, hoping to create his own animated stories and interactive worlds. He also aspires to publish his own comic book series.
    Additionally, he is intrigued by environmental education and imagines developing games that teach kids about nature and conservation.
