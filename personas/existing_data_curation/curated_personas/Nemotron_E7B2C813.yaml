    inventory software)"]'
  hobbies: '["Street photography", "Sketching and digital drawing", "Cooking Indian and fusion cuisine", "Listening to eclectic music (Bollywood, indie rock, world beats)", "Visiting art galleries and murals",
    "Watching independent films", "Volunteering in community theatre", "Hiking in Griffith Park", "Surfing at local beaches", "Basic video editing"]'
  career_goals: Rajeshwar aims to advance from the shop floor to a supervisory or lead role within the production environment, ideally in a company that supports the entertainment or media sectors where
    his artistic interests intersect with manufacturing. He plans to earn certifications in CNC programming and occupational safety, and to enroll in community college courses on industrial engineering
    or set construction. In the longer term, he envisions transitioning into set design or prop fabrication for film and television, leveraging his production knowledge and growing artistic skill set. He
    also hopes to build a professional network within the Los Angeles creative community, positioning himself for collaborative projects that blend technical expertise with visual storytelling.
