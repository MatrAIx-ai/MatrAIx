  career_goals: Jeanette dreams of a future where she can blend her love for art with her desire to help others. She aspires to study graphic design or art therapy in college, aiming to create inclusive
    visual campaigns that promote mental‑health awareness for youth. She also hopes to become a community mentor, leading art workshops for younger children in her neighborhood, and eventually working with
    nonprofit organizations that support immigrant families and mental‑well‑being. Her long‑term ambition is to leverage her creative skills to foster empowerment and healing in diverse communities.
