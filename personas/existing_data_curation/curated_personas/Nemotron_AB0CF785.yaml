personas:
  professional: Jeanette Valdez, a budding visual artist and school art club coordinator, blends curiosity and compassion by leading community mural projects that fuse digital illustration with social themes,
    while staying organized with weekly planning yet flexible enough to incorporate spontaneous ideas.
  sports: Jeanette Valdez, a member of the school’s after‑school dance club specializing in salsa and bachata, also plays on the varsity soccer team, follows the local baseball team the Springfield Storm
    and the NBA's Boston Celtics, and approaches fitness by combining daily dance practice with weekend jogs, treating movement as both creative expression and stress relief.
  arts: Jeanette Valdez, an avid creator who fills sketchbooks with charcoal studies and tablet‑rendered fantasy scenes, draws inspiration from Frida Kahlo’s bold self‑portraits, Basquiat’s street‑art energy,
    and the lyrical storytelling of indie folk duo The Paper Kites, while their playlists swing from Bad Bunny’s reggaetón beats to Celia Cruz’s salsa classics and Bon Iver’s acoustic serenades, shaping
    their artistic voice.
  travel: Jeanette Valdez, a curious traveler who dreams of wander‑lust adventures in Barcelona’s Gothic Quarter, the vibrant street markets of Mexico City, and the sun‑kissed beaches of Cartagena, yet
    balances family budget constraints by planning low‑cost road trips to nearby state parks and weekend cultural festivals, preferring spontaneous day‑long outings over long‑haul vacations.
  culinary: Jeanette Valdez, a novice cook who loves whipping up tacos al pastor with pineapple, cilantro, and chipotle sauce, experiments with homemade plantain chips seasoned with sea salt, and treats
    avocado toast with a drizzle of lime‑infused olive oil as a canvas for artistic plating, often pairing meals with playlists that match the cuisine’s rhythm.
  core: Jeanette Valdez, a compassionate teen artist who channels curiosity into colorful creations, worries about perfection, and balances organized plans with spontaneous sketches, all while humming reggaetón
    tunes in the kitchen.
background:
  cultural: Jeanette was raised in a bilingual Puerto Rican household in Rock Hill, South Carolina. Her family kept traditions alive by celebrating festivals like Noche Buena and Día de los Reyes, cooking
    dishes such as arroz con gandules and flan, and playing música bomba and plena during gatherings. Being fluent in both Spanish and English, she navigates two cultural worlds, which nurtures her appreciation
    for community, family loyalty, and the importance of helping others. These cultural influences shape her values of compassion, cooperation, and a strong sense of identity, while also inspiring her artistic
    expression and desire to give back to her community.
