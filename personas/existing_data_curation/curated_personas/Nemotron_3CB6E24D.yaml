  hobbies: '[''Painting'', ''Photography'', ''Model kit building'', ''Woodworking'', ''Gardening'', ''Cooking Mexican cuisine'', ''Attending art fairs'', ''Live music and cultural festivals'', ''Fishing'',
    ''Volunteering at community center'']'
  career_goals: Jose aspires to advance into a supervisory role where he can lead a maintenance team for a large property management company or a public facility such as a community center or museum. He
    aims to obtain certifications in green building maintenance and facilities management (e.g., LEED accreditation) to integrate eco‑friendly solutions into his work. In the long term, he hopes to start
    his own small maintenance consultancy that also offers community workshops on home repair and energy efficiency, allowing him to share his knowledge and support neighbors. He also wants to improve his
    stress‑management skills and create a healthier work‑life balance.
