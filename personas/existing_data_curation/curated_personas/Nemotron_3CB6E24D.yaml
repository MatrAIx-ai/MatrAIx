personas:
  professional: Jose Ortiz, a seasoned building‑maintenance technician with over 20 years of hands‑on experience in electrical, plumbing, HVAC, and carpentry, channels his curious problem‑solving mindset
    and compassionate, cooperative nature into diagnosing complex equipment failures, implementing sustainable maintenance practices, and mentoring junior staff as he works toward a supervisory role.
  sports: Jose Ortiz follows the Tampa Bay Buccaneers and the Miami Marlins, plays weekly pick‑up volleyball at the community center, and treats his weekend Gulf‑Coast fishing trips as low‑intensity cardio,
    preferring a flexible fitness routine that balances moderate gym sessions with restorative yoga to counteract work‑related stress.
  arts: Jose Ortiz channels his curiosity into painting seascapes inspired by the light of J.M.W. Turner and photographing folk motifs reminiscent of Frida Kahlo, while regularly attending live shows by
    Mariachi Vargas de Tecalitlán and Los Lobos, integrating these artistic influences into his own creative projects.
  travel: Jose Ortiz favors well‑planned road trips that mix cultural festivals—such as New Orleans Mardi Gras and San Antonio’s Fiesta—with relaxed Gulf‑Coast getaways to Key West and occasional weekend
    escapes to the wine country of Napa, balancing a moderate travel budget with a desire for immersive, low‑stress experiences.
  culinary: Jose Ortiz, an intermediate home chef, loves preparing mole poblano with roasted chilies, chocolate, and spices, grilling fresh snapper for fish tacos topped with cilantro, lime, and avocado,
    and crafting hand‑made corn tortillas, all while savoring the aromas of cumin, coriander, and roasted tomatillos.
  core: Jose Ortiz is a detail‑driven maintenance veteran who balances a creative love for painting and fishing with a compassionate, stress‑prone nature that fuels both meticulous work and community‑focused
    generosity.
background:
  cultural: Jose was born to Mexican immigrant parents and grew up bilingual, weaving Spanish and English into daily life. His family traditions—celebrating Día de los Muertos, preparing mole and tamales,
    and participating in church gatherings—remain central to his identity. Living in Palmetto, Florida, he blends his Mexican heritage with the coastal, multicultural environment, which influences his culinary
    tastes, music preferences, and respect for community solidarity. The strong work ethic and emphasis on family responsibility instilled by his parents shape his compassionate approach at work and his
    commitment to helping neighbors. He also embraces the rich visual language of Mexican folk art, which informs his appreciation for color, pattern, and craft in both his hobbies and professional projects.
attributes:
  skills: '[''Electrical troubleshooting'', ''Plumbing repairs'', ''HVAC maintenance'', ''Carpentry and woodworking'', ''Preventive maintenance scheduling'', ''Safety compliance (OSHA)'', ''Inventory management'',
