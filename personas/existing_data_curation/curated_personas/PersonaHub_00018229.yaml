persona_description: A forensic anthropologist or archaeologist who specializes in the study of ancient human butchery practices and the analysis of projectile impact marks. They are skilled in examining
  stone points and arrowheads to determine the method of weapon use and the time period in which the weapons were used. They are particularly interested in the use of projectile weapons and have developed
  a method of identifying them through microscopic analysis. They are also knowledgeable about the earliest evidence of human carnivory and have used this knowledge to identify the oldest direct evidence
  for the use of projectile weapons.
