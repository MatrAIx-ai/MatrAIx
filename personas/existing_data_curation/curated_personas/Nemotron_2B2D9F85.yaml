  hobbies: '[''Gardening'', ''Hiking'', ''Book club facilitation'', ''Community theater acting'', ''Trivia competitions'', ''Yoga'', ''Journaling'', ''Cooking Southern cuisine'', ''Organizing game nights'',
    ''Volunteering at local library'']'
  career_goals: Summer aims to earn her Georgia Professional Educator (GPE) endorsement and complete a master's degree in Educational Leadership. She aspires to transition into a curriculum specialist role
    within the Gwinnett County School District, where she can design district‑wide interdisciplinary programs that integrate technology while maintaining rigorous standards. She is motivated to lead professional
    development workshops, mentor new teaching assistants, and eventually become an instructional coordinator. Additionally, she envisions launching a community tutoring center focused on at‑risk youth,
    combining her competitive drive with a desire to make a measurable impact on local education outcomes.
