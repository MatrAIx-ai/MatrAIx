persona_description: A public health researcher who specializes in the study of the impact of dementia on mortality rates in the United States. She has conducted extensive research on the underreporting
  of dementia deaths in death records and has developed a blood test that can accurately detect Alzheimer's disease. Her work has led to the discovery of racial and ethnic disparities in dementia mortality
  and has sparked hope for finding a simple, affordable, and widely available new form of diagnosis.
