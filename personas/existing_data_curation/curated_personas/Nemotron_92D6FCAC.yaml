personas:
  professional: Michael Altman is a retired program coordinator and volunteer storyteller, now channeling his lifelong expressive writing and abstract watercolor expertise into a self‑published memoir and
    intergenerational art workshops, using his imaginative, spontaneous nature to craft fluid narratives while they often wrestle with deadlines and organization.
  sports: Michael Altman follows the Detroit Tigers and the Detroit Pistons, participates in weekly senior‑center chess tournaments as mental sport, joins a local walking club that meets for brisk hikes
    at the Huron River Trail during spring, and enjoys occasional pick‑up games of bocce with neighbors, treating casual activity as a social ritual more than rigorous training, and they relish the camaraderie
    of group walks.
  arts: Michael Altman admires the watercolors of Georgia O’Keeffe, the jazz piano of Bill Evans, the experimental films of Maya Deren, and Lin‑Manuel Miranda’s musical Hamilton, integrating these influences
    into his abstract canvases and storytelling sessions at the library, and they often reference these artists when guiding workshop participants.
  travel: Michael Altman prefers slow‑paced trips, having explored the historic streets of Florence, the cherry blossoms of Washington, D.C.’s Tidal Basin, and the serene Isle of Skye, while planning future
    visits to the Japanese gardens of Kyoto for inspiration, balancing modest travel budgets with a love for cultural immersion, and they always bring a sketchbook to capture new vistas.
  culinary: Michael Altman enjoys cooking simple Mediterranean dishes—like grilled halloumi with lemon‑oregano drizzle, fresh caprese salads, and hearty lentil soup with rosemary—while occasionally indulging
    in a slice of tiramisu, and they cherish the ritual of sourcing heirloom tomatoes from their own garden for fresh sauces.
  core: Michael Altman is a 69‑year‑old dreamer who blends watercolor, storytelling, and community spirit, juggling chronic worry and a penchant for spontaneity while nurturing gardens, birds, and the next
    generation of artists, and they often lose track of time in the process.
background:
  cultural: Michael grew up in the Detroit metropolitan suburbs as a third‑generation American of German‑Polish descent. His family’s cultural heritage emphasized modesty, hard work, and a strong sense
    of community, values reinforced by the Catholic parish and neighborhood gatherings that marked his childhood. The multicultural tapestry of Sterling Heights—shaped by waves of immigrant neighbors, Motown’s
    musical legacy, and a tradition of volunteerism—instilled in him a deep appreciation for diverse artistic expressions and collective responsibility. Seasonal celebrations like Thanksgiving, Christmas,
    and local ethnic festivals reinforce his connection to Midwestern traditions while his personal curiosity drives him to explore broader cultural ideas.
