  hobbies: '[''Abstract watercolor painting'', ''Reading speculative fiction and philosophy'', ''Chess'', ''Organic gardening (tomatoes, roses)'', ''Bird watching'', ''Volunteer storytelling at the library'',
    ''Attending community theater and music performances'', ''Amateur photography'']'
  career_goals: Although retired from formal employment, Michael aims to channel his imagination into a tangible legacy. He is working on a manuscript of short stories and memoir sketches that blend personal
    history with philosophical musings, hoping to self‑publish within the next two years. He also aspires to launch a monthly intergenerational art workshop at the local community center, providing a creative
    outlet for both seniors and teenagers. Serving on the board of the Sterling Heights Art Society to help shape inclusive programming is another ambition. Ultimately, his goal is to foster empathy and
    artistic curiosity in his community while preserving his emotional wellbeing through purposeful activity.
