  hobbies: '[''Reading (fiction, biographies, self-help)'', ''Journaling'', ''Drawing/sketching'', ''Watercolor painting'', ''Gardening (vegetable plot, heirloom tomatoes)'', ''Cooking and baking'', ''Birdwatching'',
    ''Hiking local trails'', ''Playing acoustic guitar'', ''Listening to folk/country music'', ''Volunteering at animal shelter'', ''Participating in community clean-up events'']'
  career_goals: Linette aims to complete her GED within the next year, then enroll in a community college program in nursing or health sciences, with a long-term ambition to become a registered nurse serving
    her rural community. She is also drawn to sustainable farming and hopes to combine her healthcare aspirations with community gardening initiatives, possibly establishing a small outreach program that
    teaches nutrition and basic health to local families. In the short term, she plans to acquire a Certified Nursing Assistant (CNA) credential and volunteer at the local health clinic, gaining practical
    experience while continuing to develop her organizational and interpersonal skills.
