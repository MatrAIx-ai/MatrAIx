personas:
  professional: Linette Burgess, an aspiring nursing aide with a keen eye for detail and a naturally empathetic demeanor, channels their practical curiosity and organizational knack into volunteer work
    at the local health clinic and animal shelter, where they coordinate small health‑education gatherings and mediate peer conflicts while honing the research and first‑aid skills essential for their future
    as a registered nurse serving their rural community.
  sports: Linette Burgess enjoys low‑impact outdoor fitness, spending weekends hiking the rolling hills of Cheatham County and playing casual volleyball at the community center, while cheering on the Tennessee
    Titans in football season and the Nashville Predators in hockey, balancing modest athletic pursuits with loyal support for their regional teams.
  arts: Linette Burgess expresses their creativity through watercolor sketches of the Tennessee countryside and strums acoustic guitar to folk storytellers like John Prine, Emmylou Harris, and The Avett
    Brothers, while their reading palate favors contemporary novels by Celeste Ng and historical biographies such as Doris Kearns Goodwin's Team of Rivals, weaving artistic appreciation into daily reflection.
  travel: Linette Burgess prefers thoughtfully planned weekend getaways to nearby natural retreats like the Great Smoky Mountains and Asheville's Blue Ridge Parkway, and their travel bucket list includes
    a culinary road trip through New Orleans and a cultural pilgrimage to Savannah's historic squares, balancing modest budgets with a yearning for authentic Southern experiences.
  culinary: Linette Burgess delights in preparing classic Southern biscuits, fried chicken, and peach cobbler, while also baking lemon bars and blueberry muffins using fresh heirloom tomatoes, basil, local
    honey, and farm‑grown strawberries, showcasing a modest yet confident home‑cook's dedication to seasonal, garden‑inspired flavors.
  core: Linette Burgess is a quietly ambitious teen who blends Southern hospitality with pragmatic curiosity, turning garden‑grown tomatoes into heart‑warming pastries, obsessively annotating every book
    in a well‑kept journal, and juggling a frugal budget that still leaves room for spontaneous visits to the local animal shelter.
background:
  cultural: She grew up in Clarksville, Cheatham County, in the heart of Middle Tennessee, immersed in Southern culture that values hospitality, community ties, and modesty. Her family has deep roots in
    the region, with a tradition of church attendance at a local Baptist congregation, participation in community fairs, and a love for Southern cuisine—think biscuits, fried chicken, and homemade pies.
    The rural setting fosters a close relationship with the land, reflected in her interest in gardening and appreciation for the outdoors. While she respects traditional values, she also embraces a pragmatic
    outlook, balancing curiosity about broader ideas with the practical sensibilities of her community. This blend of Southern heritage, modest rural life, and a supportive small-town network shapes her
    worldview and personal identity.
