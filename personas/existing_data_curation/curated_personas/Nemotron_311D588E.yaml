personas:
  professional: Carlos Arteaga, a seasoned construction professional with three decades of hands‑on experience in framing, drywall, concrete and equipment operation, leverages bilingual fluency and a curiosity
    for sustainable retrofits to coordinate crews and troubleshoot on‑site issues, though they often favor flexibility over strict planning as they pursue a foreman role and future renovation business.
  sports: Carlos Arteaga follows Club América in international soccer while cheering the Portland Timbers during the MLS season and the Portland Trail Blazers in the NBA playoffs, complements their fandom
    with a weekly neighborhood bowling league and quiet morning trips fishing on the Willamette River, and they approach personal fitness with a competitive yet relaxed mindset.
  arts: Carlos Arteaga immerses themselves in cultural arts by dancing to live mariachi ensembles featuring music from Los Tigres del Norte and classic salsa rhythms at the annual Salem festival, while
    also enjoying classic rock road trips to the tunes of Led Zeppelin, The Rolling Stones, and Fleetwood Mac, and occasionally catching a community theater production of 'West Side Story', and they find
    the blend of traditions energizes their social gatherings.
  travel: Carlos Arteaga prefers road‑trip adventures that combine fishing on the Willamette River with stops at the Oregon Coast and occasional weekend escapes to nearby Portland’s food scene, yet dreams
    of a longer overseas journey to the historic plazas of San Miguel de Allende and the vineyards of Napa Valley, and they balance these aspirations against a modest retirement budget and family responsibilities.
  culinary: Carlos Arteaga showcases a strong cooking skill set by preparing traditional dishes such as tamales wrapped in corn masa, slow‑braised carnitas seasoned with ancho chile and orange, and hearty
    pozole simmered with hominy and pork, often pairing these meals with fresh cilantro, lime, and radish garnishes at their popular weekend barbecues, and they proudly share the dishes with friends and
    neighbors.
  core: Carlos Arteaga, a charismatic, talkative foreman‑in‑training with a love for vintage tools, spontaneous barbecues, and classic‑rock road trips, balances a competitive streak and occasional skepticism
    with a relaxed, sometimes disorganized lifestyle that values community, cultural pride, and the occasional overindulgence in rich, home‑cooked meals.
background:
  cultural: Carlos was born in Michoacán, Mexico, and moved to Oregon with his family at age ten. He grew up in a bilingual household that preserved Mexican traditions such as Día de los Muertos altars,
    Las Posadas during Christmas, and weekly family meals featuring mole, tamales, and freshly made tortillas. While he has embraced the Pacific Northwest lifestyle—enjoying hiking, fishing, and the region’s
    seasonal festivals—he stays connected to his roots through the local Mexican community, church celebrations, and regular visits with his parents and younger relatives where Spanish remains the language
    of daily conversation. His identity blends Mexican familial values, a strong sense of community, and the independent, outdoors‑oriented spirit of the Oregon Valley.
attributes:
  skills: '[''Framing and structural carpentry'', ''Drywall installation and finishing'', ''Concrete mixing and finishing'', ''Roof shingling and repairs'', ''Siding installation'', ''Basic plumbing and
