    level'', ''On‑site problem solving'', ''Team coordination and informal foremanship'', ''Knowledge of sustainable retrofits'']'
  hobbies: '[''Cooking traditional Mexican cuisine'', ''Playing and watching Mexican soccer'', ''Organizing community barbecues'', ''Participating in trivia night competitions'', ''Fishing at the Willamette
    River'', ''Restoring vintage power tools'', ''Attending the Salem Mexican Festival'', ''Dancing to mariachi and salsa music'', ''Bowling league participation'', ''Listening to classic rock during drives'']'
  career_goals: Carlos is aiming to transition into an official foreman position within the next two years, using his experience to lead a crew and improve site efficiency. His longer‑term ambition is to
    launch a small residential‑renovation business that specializes in energy‑efficient upgrades for middle‑income families in the Salem area. To solidify his credentials he plans to earn an OSHA 30‑hour
    certification and a heavy‑equipment operator license. Financially, he wants to build a comfortable retirement nest egg and fully pay off the mortgage on his family home. He also hopes to become a recognized
    mentor within the local Mexican‑American construction community, passing on both trade skills and cultural pride to younger workers.
