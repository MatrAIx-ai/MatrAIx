persona_description: Harry Ettlinger is a retired department director who has a deep interest in history and specifically in the protection of cultural treasures from destruction during the Holocaust. He
  has a unique skill set as a former interpreter for the Nuremberg war trials and as a former member of the Monument Men, a group that worked to protect European monuments and other cultural treasures from
  destruction. Ettlinger has a passion for history and a deep understanding of the Holocaust, which he shares through his speaking engagements and through his work as a museum curator and educator. He is
  also a dedicated individual who is committed to preserving the memory of the Holocaust and to ensuring that the stories of the Monument Men are not forgotten.
