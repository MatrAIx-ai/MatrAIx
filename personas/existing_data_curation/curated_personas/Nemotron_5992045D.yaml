personas:
  professional: A veteran transportation service attendant named Aurora Bonilla blends three decades of route coordination, bilingual customer care, and hands‑on safety expertise with a natural curiosity
    for emerging mobility tech; they use their calm, organized yet flexible style to mentor new staff and champion community‑focused service improvements as they strive for a supervisory role.
  sports: Aurora Bonilla stays active by dancing bomba at summer festivals, joining a senior walking club that follows the coastal promenade, cheering for the local baseball squad the Cangrejeros, and occasionally
    playing casual volleyball with neighbors; they prefer low‑impact cardio that complements their joint concerns.
  arts: Aurora Bonilla immerses herself in the town’s cultural rhythm, performing in the parish choir, swirling to salsa classics by Tito Puente and modern hits by Marc Anthony, devouring biographies of
    figures like Isabel González, and collecting vinyl records of folk legends such as Juan Luis Guerra; they find that these artistic pursuits shape their vibrant social gatherings.
  travel: Aurora Bonilla favors purposeful trips that blend family, heritage, and relaxation, often returning to the historic streets of Old San Juan, planning weekend getaways to the lush mountains of
    the interior, dreaming of wandering the plazas of Seville, and budgeting yearly visits to her nieces in Miami; they coordinate travel through their bus network contacts to keep costs low.
  culinary: Aurora Bonilla’s kitchen is a celebration of island flavors—she expertly whips up arroz con gandules, golden empanadillas, and sweet plantain pastelón using homemade sofrito, adobo, and fresh
    papaya from her garden, while their intermediate cooking skills shine during community potlucks where they trade secret spice blends with neighbors.
  core: Aurora Bonilla is a talkative, dance‑loving transit veteran whose calm resilience fuels community projects, meticulous budgeting, and a garden‑fueled cuisine, even as they occasionally skip physiotherapy
    for a choir rehearsal.
background:
  cultural: Aurora’s identity is deeply rooted in the Puerto Rican heritage of Guayama, a town known for its sugar‑cane legacy and close‑knit community. Raised in a bilingual, Catholic household, she grew
    up listening to plena and bomba rhythms that still inspire her love for dance. Family bonds, respect for elders, and a strong sense of communal responsibility shape her worldview. Her Puerto Rican background
    informs her hospitality, her appreciation for island cuisine, and her commitment to improving local public services, reflecting the island’s tradition of resilience and collective progress.
attributes:
  skills: '[''Bilingual Customer Service (Spanish/English)'', ''Route Planning and Scheduling'', ''Ticketing and Fare Management'', ''Safety and Emergency Protocols'', ''Conflict Resolution'', ''Public
    Relations'', ''Team Mentoring'', ''Basic Vehicle Inspection'', ''Use of Mobile Ticketing Systems'']'
  hobbies: '[''Salsa and Bomba Dancing'', ''Cooking Traditional Puerto Rican Cuisine'', ''Rooftop Gardening'', ''Reading Biographies of Puerto Rican Historical Figures'', ''Volunteering at Parish Choir
    and Community Events'', ''Organizing Neighborhood Clean-ups'', ''Traveling to Rural Corners of the Island'']'
  career_goals: Aurora aims to transition from front‑line attendant to a supervisory role within the Puerto Rico Metropolitan Bus Authority, where she can implement technology‑driven solutions that streamline
    rider experience. She plans to obtain a certification in Logistics Management and eventually oversee a depot, mentoring younger employees and championing community‑focused service improvements, such
    as senior‑friendly shuttle routes. Ultimately, she envisions establishing a small community transit cooperative that provides reliable transportation for the elderly in Guayama.
