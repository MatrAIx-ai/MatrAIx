persona_description: A anthropologist who specializes in the study of hunter-gatherer societies and their political strategies, conflicts, and interactions with nation-states. They are interested in the
  ecological niches occupied by these societies and their impact on the environment. They are also interested in the global vision of anthropology and its empirical foundations, as well as the relevance
  of these societies to contemporary issues such as human rights, ethnic conflict, grassroots development, and environmental topics. They have a background in anthropology and have worked with indigenous
  communities and scholars in an exchange that is often referred to as "south-north."
