personas:
  professional: Amanda Drummond, a seasoned maintenance technician with two decades of expertise in electrical, plumbing, HVAC, and metal‑working, channels her vivid imagination and love for novelty into
    crafting up‑cycled solutions while informally mentoring junior staff, even as their relaxed approach to planning sometimes leads to spontaneous, on‑the‑fly scheduling, and she is currently pursuing
    CMRP certification to step into a supervisory facilities‑manager role.
  sports: Amanda Drummond enjoys vibrant weekend hikes with the Appalachian Trail Club, follows the Nashville Predators for occasional ice‑hockey excitement, occasionally cheers on the Tennessee Titans
    during football season, and practices gentle yoga at a community studio, keeping fitness casual and fluid rather than regimented, which mirrors their flexible attitude toward obligations.
  arts: Amanda Drummond, an avid abstract watercolorist inspired by the fluid palettes of Georgia O’Keeffe and the experimental vibes of David Bowie, also sculpts in pottery echoing Joan Miró’s whimsical
    forms, frequents community theater productions of Tennessee Williams’ plays, and spends evenings photographing the rolling hills while listening to Brian Eno’s ambient compositions, weaving artistic
    expression into every facet of daily life.
  travel: Amanda Drummond prefers low‑key, curiosity‑driven trips—she’s trekked the Great Smoky Mountains, wandered the ancient streets of Kyoto, chased the northern lights in Iceland, and dreams of stargazing
    in Chile’s Atacama Desert—always planning loosely and leaving room for spontaneous detours that satisfy her love of novelty.
  culinary: Amanda Drummond, a competent home cook who harvests heirloom tomatoes, beans, and aromatic basil from her garden, delights in crafting rustic ratatouille and smoked quinoa salads with rosemary
    and lemon zest, and occasionally splurges on farm‑to‑table brunches featuring poached eggs with avocado toast, balancing her love of fresh, sustainable flavors with indulgent moments at the local BBQ
    joint.
  core: Amanda Drummond is a creatively wired maintenance veteran who transforms discarded wood into art, juggles a flexible work schedule with occasional disorganization, and can’t resist a midnight stargazing
    session even if it means missing a morning meeting.
background:
  cultural: Amanda grew up in middle‑Tennessee, where the rhythms of small‑town Southern life shaped her values of hospitality, community, and self‑reliance. Her family traditions include church gatherings,
    home‑cooked Southern meals, and a strong work ethic rooted in the region's agricultural and manufacturing heritage. These cultural influences fostered her cooperative nature and respect for harmony,
    while her exposure to local folk music, storytelling, and regional crafts sparked an early appreciation for artistic expression. Living in Hendersonville and navigating life as a divorced mother has
    deepened her independent spirit and connected her to a network of community volunteers and neighborly support typical of Sumner County.
attributes:
  skills: '[''Electrical troubleshooting and minor wiring'', ''Plumbing diagnostics and repairs'', ''HVAC filter and component maintenance'', ''Carpentry and basic framing'', ''Power tool operation and
    safety compliance'', ''Interpretation of building plans and schematics'', ''Creative up‑cycling and restoration'', ''Mentoring and team communication'', ''Preventive maintenance scheduling'']'
  hobbies: '[''Abstract watercolor painting'', ''Pottery and ceramic crafting'', ''DIY up‑cycling and furniture restoration'', ''Reading science‑fiction and philosophy'', ''Stargazing and astrophotography'',
    ''Gardening heirloom vegetables'', ''Hiking in Sumner County trails'', ''Visiting community theater and art fairs'', ''Volunteering at local food bank and adult‑literacy program'']'
  career_goals: Looking ahead, Amanda aims to formalize her technical expertise by earning a Certified Maintenance & Reliability Professional (CMRP) credential and completing advanced HVAC and renewable‑energy
    training. She envisions transitioning into a supervisory facilities‑manager role within a larger institution where she can implement sustainable maintenance practices and lead a diverse team. Parallel
    to these professional goals, she plans to launch a modest side business offering eco‑friendly, artistic renovation and up‑cycling services, while mentoring aspiring tradeswomen and sharing her knowledge
    through community workshops.
