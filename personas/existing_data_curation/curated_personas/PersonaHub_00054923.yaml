persona_description: A clinician who specializes in the assessment and management of obesity. They are familiar with the criteria for obesity, the regional distribution of body fat, and the medical consequences
  of obesity. They have experience with the evaluation and treatment of individuals with obesity-related complications and are knowledgeable about the indications and workup for bariatric surgery. They
  have a strong interest in understanding the metabolic and surgical implications of obesity and are committed to providing comprehensive care to patients with obesity.
