personas:
  professional: Michael Weathers, an experienced construction tradesperson with two decades of framing, concrete finishing, demolition, and heavy‑equipment operation, embraces a blend of pragmatic craftsmanship
    and curiosity for eco‑friendly retrofits, frequently mentors new crew members, and is working toward a foreman role and OSHA certification despite occasional struggles with project deadlines.
  sports: Michael Weathers plays pickup basketball at the local community center, cheers on the Cleveland Cavaliers and Ohio State Buckeyes, and spends summer evenings fishing on Lake Erie with the Toledo
    Sportfishing Club, preferring casual weekend outings over regimented gym routines.
  arts: Michael Weathers fills their home with soul legends like Marvin Gaye, jazz icons such as Miles Davis, and hip‑hop classics from A Tribe Called Quest while grilling, joins Juneteenth block parties
    and local jazz jam sessions, and channels a creative spark into DIY furniture builds inspired by artisan craftsmanship.
  travel: Michael Weathers favors spontaneous road trips in their restored classic car, taking weekend escapes to Niagara Falls and the Upper Peninsula’s Porcupine Mountains, while harboring a dream to
    attend New Orleans’s Jazz & Heritage Festival, balancing a modest travel budget with a love for open‑air adventure.
  culinary: Michael Weathers cooks slow‑smoked Texas‑style brisket, honey‑glazed ribs, and corn on the cob seasoned with smoked paprika, often using hickory wood chips and a secret bourbon‑infused BBQ sauce,
    all while curating a soundtrack of 1970s soul and contemporary hip‑hop.
  core: Michael Weathers is a practical builder with a green‑building curiosity, a passion for classic cars and backyard BBQs, and a habit of juggling deadlines while mentoring crews and savoring soul‑filled
    music.
background:
  cultural: Michael was raised in a close‑knit African‑American community on Toledo’s north side, where his parents worked in manufacturing and local healthcare. The neighborhood church served as a cultural
    anchor, providing mentorship, music, and communal support. He celebrates family traditions like Juneteenth and Thanksgiving feasts, and he values storytelling and oral histories shared through church
    gatherings and family reunions. This cultural grounding reinforces his cooperative nature, respect for communal harmony, and desire to give back by supporting younger members of his community.
