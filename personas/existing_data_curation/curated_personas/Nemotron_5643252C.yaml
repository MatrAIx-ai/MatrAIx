  hobbies: '[''basketball'', ''car restoration'', ''fishing'', ''DIY home projects'', ''listening to soul and hip‑hop music'', ''church community events'', ''barbecue cooking'', ''attending neighborhood
    block parties'']'
  career_goals: Michael aims to move into a foreman or crew‑lead role within the next few years, earn formal OSHA certification, and eventually start his own small subcontracting business that focuses on
    residential renovations and eco‑friendly retrofits. He hopes to blend his practical experience with a deeper knowledge of green building practices, and he wants to mentor younger workers from his community,
    helping them find stable, rewarding careers in construction.
