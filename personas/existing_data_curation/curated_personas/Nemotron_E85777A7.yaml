personas:
  professional: Jennifer Velez, a seasoned nurse with over thirty years of acute and community care experience, merges meticulous patient assessments, bilingual communication, and creative health‑education
    techniques inspired by her love of watercolor and photography, while her relaxed approach to scheduling often leaves her shift board a bit chaotic, and her sociable, caring nature drives her mentorship
    of junior staff despite the occasional worry‑induced stress.
  sports: Jennifer Velez stays active by joining weekly Zumba and yoga classes, hiking the scenic trails of Buffalo Bayou Park, proudly cheering for the Houston Astros and Texans while wearing her favorite
    team cap, and participating in a community running club that meets at the park for social fitness.
  arts: Jennifer Velez channels her curiosity and love for unconventional expression through watercolor painting, photography outings, regular visits to the Museum of Fine Arts Houston and the Menil Collection,
    drawing inspiration from artists like Frida Kahlo and Georgia O'Keeffe, while she unwinds to the vibrant sounds of Santana and Celia Cruz during community salsa nights.
  travel: Jennifer Velez favors flexible, culturally immersive trips, having explored the colonial charm of San Miguel de Allende, relaxed on the Gulf Coast’s Galveston beaches, taken a spontaneous road
    trip to Austin’s music scene, and dreaming of trekking the cloud forests of Monteverde in Costa Rica, all while always leaving room for an impromptu local art festival.
  culinary: Jennifer Velez loves cooking traditional baleadas, tamales, and arroz con pollo, expertly layering refried beans, cheese, avocado, cilantro, and lime on corn tortillas, and she often showcases
    these flavorful dishes at neighborhood potlucks where she also experiments with plantain fritters and fresh salsa verde.
  core: Jennifer Velez, a 54‑year‑old nurse with a passion for art and community, balances meticulous patient care with a love for spontaneous art supplies, a habit of misplacing paperwork, and a persistent
    worry that fuels both her compassion and nightly yoga practice.
background:
  cultural: Jennifer grew up in a Honduran immigrant household in Houston, where Spanish was the primary language at home and traditional customs—such as celebrating Día de los Muertos, exchanging homemade
    baleadas, and listening to Punta and Marimba music—were integral to family life. This bicultural upbringing instilled in her a deep sense of community, hospitality, and respect for elders. Living in
    the multicultural landscape of Harris County, she blends Central American values with Texan openness, allowing her to navigate diverse social settings with ease. Her heritage informs her nursing practice,
    as she consistently provides culturally sensitive care to Hispanic patients and actively participates in local Honduran festivals and community organizations that celebrate Latin American traditions.
attributes:
  skills: '[ ''Patient assessment'', ''Medication management'', ''IV therapy'', ''Wound care'', ''Health education and counseling'', ''Bilingual Spanish-English communication'', ''Cultural competency'',
