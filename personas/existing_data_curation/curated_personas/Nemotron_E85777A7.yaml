  hobbies: '[ ''Visiting galleries and museums'', ''Watercolor painting'', ''Photography'', ''Cooking Honduran cuisine'', ''Salsa dancing'', ''Community choir participation'', ''Volunteering at health fairs'',
    ''Hiking in Buffalo Bayou Park'', ''Reading contemporary fiction'', ''Book club membership'', ''Yoga and journaling'' ]'
  career_goals: Jennifer aims to transition into a leadership role as a charge nurse or clinical educator within the next two years, leveraging her extensive bedside experience to mentor junior staff and
    improve patient‑centered care. She plans to enroll in an RN‑BSN program to deepen her theoretical knowledge and qualify for nursing administration positions. Inspired by her appreciation for art, she
    hopes to develop an interdisciplinary art‑therapy program for chronic‑illness patients at her hospital, integrating creative expression into healing. Jennifer also seeks to expand community outreach
    initiatives that address health disparities among the Honduran and broader Hispanic communities in Houston. On a personal level, she intends to adopt regular stress‑management practices to sustain her
    emotional wellbeing.
