persona_description: A musician and musicologist who specializes in the study of Baroque music and its performance practice. Peter Croton is a performer on guitar and lute, and he has published extensively
  on the topic of historical performance practice. He has written a comprehensive handbook that brings together the best of both worlds - a wealth of period sources and universal musical knowledge as well
  as specific reference to lute, Baroque guitar, and other plucked instruments and composers of the era. Croton's book offers guitarists a legitimate source of information on historical performance practice
  and puts Baroque music into perspective.
