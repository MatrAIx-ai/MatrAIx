  career_goals: Although retired, Anna aims to deepen her impact within the Antioch community. She plans to lead a weekly cooking class for teens at the local senior center, mentor younger volunteers in
    organizing neighborhood clean‑ups, and document the town’s oral history for the public library archive. Maintaining her independence and health is also a priority, so she seeks regular fitness walks
    and attends wellness workshops. Long‑term, she hopes to travel with her grandchildren to family reunions in the Midwest while continuing her volunteer service.
