  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Hand‑crafted jewelry making'', ''Cooking South Asian cuisine with contemporary variations'', ''Gardening'', ''Calligraphy'', ''Mechanical
    puzzles and model building'', ''Small‑group book club (historical fiction & art history)'', ''Participating in local cultural festivals'']'
  career_goals: Although approaching retirement, Chona aims to transition from full‑time production to a mentorship role, establishing a community makerspace in Champaign where senior artisans and curious
    novices can collaborate on art‑focused fabrication projects. She hopes to lead a series of interdisciplinary workshops that merge traditional South Asian metal‑craft techniques with modern digital fabrication,
    thereby preserving cultural craftsmanship while embracing new technology. In the longer term, she aspires to author a practical guide on sustainable fabrication practices for small workshops, and to
    serve as a volunteer technical advisor for local schools, encouraging STEM interest among underrepresented students.
