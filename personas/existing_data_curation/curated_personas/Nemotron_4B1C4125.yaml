personas:
  professional: A veteran fabricator and educator, Chona Garcia channels three decades of hands‑on mechanical assembly, CNC routing, and welding expertise into meticulously structured adult‑learning workshops,
    where their critical, skeptical mindset and love of artistic experimentation guide apprentices through systematic troubleshooting and inventive metal‑craft projects.
  sports: A low‑impact fitness enthusiast, Chona Garcia participates in weekly senior walking groups around the university campus, enjoys occasional bridge tournaments, and proudly follows the Illinois
    Fighting Illini basketball team, favoring individualized activity over high‑intensity sports while still cheering loudly at home games.
  arts: A dedicated creator and patron, Chona Garcia spends afternoons painting watercolor landscapes of the Illinois prairie, designing hand‑crafted jewelry from reclaimed metal, attending the University
    of Illinois Art Museum to study works by Georgia O’Keeffe and Anish Kapoor, and performing traditional dance at community festivals, merging their curiosity for unconventional art with disciplined practice.
  travel: A meticulous planner, Chona Garcia favors weekend trips to historic Midwestern towns like Galena and seasonal pilgrimages to Jaipur to study metal‑craft techniques, balancing careful budgeting
    with a desire for immersive cultural experiences, while relying on detailed itineraries and a trusted travel journal to navigate each journey.
  culinary: A culinary experimenter, Chona Garcia reimagines classic South Asian dishes such as biryani and dal makhani with locally sourced vegetables from their garden, infusing them with unexpected ingredients
    like smoked paprika and fresh basil, and enjoys serving the meals on reclaimed copper platters while sharing stories with a close circle of friends.
  core: Chona Garcia is a curious, meticulous 72‑year‑old artisan‑educator who blends metal‑craft expertise with artistic flair, preferring small, purposeful gatherings, disciplined budgeting, and a skeptic’s
    eye on health, all while nurturing a quiet competitive spirit.
background:
  cultural: Born to South Asian parents (her family hails from the Gujarat region of India), Chona grew up immersed in a household where Hindi and Gujarati were spoken, and where festivals such as Diwali,
    Navratri, and Holi were celebrated with vibrant rituals and communal meals. After immigrating to the United States in her early twenties, she settled in the Midwest, marrying a partner of Hispanic heritage
    (hence the surname Garcia) and weaving together South Asian, Hispanic, and Midwestern cultural threads. In Champaign, she remains active in the local South Asian association, participates in cultural
    events, and preserves traditional practices—like rangoli art and classical dance—while also embracing the regional values of self‑reliance, community volunteering, and modest living. This blend of cultures
    informs her artistic sensibilities and her commitment to mentorship within a diverse community.
