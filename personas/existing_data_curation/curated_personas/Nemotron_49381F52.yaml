personas:
  professional: Ameera Sosasantos is a dedicated elementary and middle school STEM teacher whose meticulously organized lesson plans, bilingual communication, and data‑driven instruction reflect their disciplined
    curiosity, while they quietly lead curriculum workshops and mentor new teachers with assertive yet collaborative flair.
  sports: Ameera Sosasantos enjoys early‑morning jogs along the Susquehanna River Trail, practices yoga twice weekly with the Harrisburg Mindful Movement group, cheers for the Philadelphia Eagles in the
    fall and the Philadelphia Phillies during baseball season, and participates in the Harrisburg Cycling Club’s weekend rides, balancing a low‑key fitness routine with their preference for small‑group
    activities.
  arts: Ameera Sosasantos finds solace in the visual and musical arts, frequently admiring Frida Kahlo’s self‑portraits, attending indie‑film screenings of director Guillermo del Toro’s work, and listening
    to the piano compositions of Ludovico Einaudi while they unwind after grading, all of which enrich their creative spark for classroom projects.
  travel: Ameera Sosasantos prefers meticulously planned short trips that combine scientific curiosity and cultural immersion, having explored the Monterey Bay Aquarium’s marine exhibits, wandered the historic
    streets of Cartagena, Colombia, and attended a robotics conference in Austin, Texas, while dreaming of a solo hike through Iceland’s Golden Circle, always balancing a modest travel budget with family
    commitments.
  culinary: Ameera Sosasantos is a capable home chef who expertly prepares arroz con gandules using sofrito, annatto oil, and pigeon peas, lovingly rolls pasteles wrapped in plantain leaves, experiments
    with quinoa and roasted root vegetable salads seasoned with cilantro and epazote from their garden, and enjoys pairing their meals with a glass of chilled sauvignon blanc.
  core: Ameera Sosasantos blends disciplined curiosity with quiet creativity, turning lesson plans into robotics marvels, garden harvests into culinary feasts, and late‑night puzzle sessions into personal
    brain‑training rituals, all while juggling a steadfast coffee habit and an occasional perfectionist pause.
background:
  cultural: Ameera is a first‑generation American of Puerto Rican descent. Raised bilingual, she grew up speaking Spanish at home and English in school, which gave her a deep appreciation for both cultures.
    Family gatherings are centered around music, salsa, and shared meals, reinforcing values of community, respect for elders, and celebration of heritage. She participates in local Puerto Rican festivals
    in Harrisburg, such as the annual Fiesta Puertorriqueña, and she incorporates culturally relevant examples—like Puerto Rico’s tropical ecosystems or its contributions to aerospace—into her science lessons.
    Her cultural identity also informs her commitment to equity, ensuring that Latino students see themselves reflected in the curriculum and have access to supportive resources.
attributes:
  skills: '[''STEM curriculum design'', ''Standards-aligned lesson planning (Common Core, NGSS)'', ''Inquiry-based science instruction'', ''Mathematics problem-solving strategies'', ''Technology integration
    (Google Classroom, interactive whiteboards, educational apps)'', ''Data analysis for student performance'', ''Differentiated instruction'', ''Classroom management with positive behavior supports'',
    ''Educational assessment creation'', ''Bilingual communication (English-Spanish)'', ''Parent-teacher collaboration'', ''Mentoring and coaching of new teachers'', ''Professional development facilitation'',
    ''Project-based learning coordination'', ''Time management and organizational systems'', ''Leadership in school improvement teams'']'
  hobbies: '[''Reading popular science and education books'', ''Exploring educational technology (edtech apps, online courses)'', ''Arduino and DIY robotics projects'', ''Solving puzzles (Sudoku, crosswords)'',
    ''Maintaining a vegetable garden'', ''Cooking traditional Puerto Rican cuisine'', ''Blogging about STEM experiments and cooking'', ''Participating in small-group STEM tutoring/volunteer sessions'']'
  career_goals: She aims to become a district STEM coordinator, shaping curriculum and professional development for a whole network of schools while maintaining high academic standards. In the next five
    years, she plans to lead an after‑school robotics and coding program that serves underserved Puerto Rican and Latino youth in Harrisburg. She also intends to earn a master's degree in Educational Leadership
    to prepare for a future role as principal, where she can champion equity, data‑driven instruction, and culturally responsive pedagogy.
