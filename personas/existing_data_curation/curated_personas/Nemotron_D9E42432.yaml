  career_goals: Hae aims to ascend to a senior executive position—such as Chief Information Officer or VP of Technology—within the next five years, steering large‑scale digital transformation initiatives
    that balance cutting‑edge innovation with pragmatic risk management. She is committed to fostering diversity and inclusion in the tech workforce, mentoring emerging female leaders, and establishing
    sustainable, resilient IT infrastructures for community‑focused organizations in Southern California. To support these goals, she plans to earn advanced certifications (PMP, CISSP, AWS Solutions Architect),
    deepen expertise in emerging technologies (AI/ML, edge computing), and potentially launch a boutique consultancy that helps midsize enterprises adopt cloud and cybersecurity solutions while maintaining
    operational stability.
