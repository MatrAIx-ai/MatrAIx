personas:
  professional: Steven Mobley is a certified pharmacy technician whose meticulous attention to detail, mastery of inventory management software like PioneerRx and QS/1, and habit of documenting SOPs translate
    into a workflow that is both efficient and compliant, while they apply their practical, structured mindset to pursue a PharmD and eventually manage a community pharmacy serving underserved neighborhoods
    in Iowa.
  sports: Steven Mobley is a disciplined runner who logs his miles on a Strava plan, they supplement cardio with weekly pick‑up basketball at the community center, and they cheer on the Iowa Hawkeyes football
    team in the fall while also following the Des Moines Menace soccer club during the summer season.
  arts: Steven Mobley is an avid listener of hip‑hop and R&B, drawing daily motivation from Kendrick Lamar’s lyricism and H.E.R.’s soulful melodies, they attend occasional concerts at the Des Moines Civic
    Center featuring artists like Anderson .Paak, and they unwind with board‑game nights featuring strategic titles such as Terraforming Mars, which reflect their methodical mindset.
  travel: Steven Mobley plans trips with meticulous itineraries, favoring short‑term road trips to culturally rich cities like New Orleans for its music and cuisine, weekend hikes in Rocky Mountain National
    Park, they dream of an overseas study tour to Copenhagen to explore European pharmacy practices, yet budget constraints keep most excursions domestic and well‑researched.
  culinary: Steven Mobley enjoys cooking, experimenting with heart‑healthy twists on classic dishes such as baked catfish with a mustard‑herb crust, collard greens sautéed in olive oil with smoked turkey,
    and quinoa‑based stuffing, they favor ingredients like kale, sweet potatoes, and smoked paprika, and they meticulously follow recipes from the New York Times Cooking and the Whole30 program.
  core: Steven Mobley is a methodical, anxiety‑prone pharmacy technician who balances disciplined running, puzzle‑solving, meticulous budgeting, and a love for hip‑hop, soulful cooking, and community service.
background:
  cultural: Steven grew up in a Black family that relocated from the Southern United States to the Midwest when he was a child. His parents emphasized education, community service, and the importance of
    cultural heritage. In Urbandale, he is part of a small but close‑knit African‑American community that celebrates events such as Juneteenth, Black History Month, and church gatherings. His cultural identity
    influences his musical tastes, culinary preferences, and his commitment to serving underserved populations. He often draws on stories of resilience from older family members and mentors, shaping his
    desire to become a healthcare professional who can provide culturally competent care. While navigating a predominantly white environment, Steven values both assimilation and preserving his cultural
    roots, contributing to local Black organizations and mentoring younger Black students interested in health careers.
attributes:
  skills: '[''Prescription verification'', ''Medication compounding'', ''Inventory management'', ''Pharmacy management software (PioneerRx, QS/1)'', ''Dosage calculation'', ''Regulatory compliance (HIPAA,
    DEA)'', ''Controlled substance handling'', ''Insurance claim processing'', ''Customer service and patient counseling'', ''Process improvement and SOP documentation'', ''Team training and mentorship'',
    ''Data entry and record‑keeping'', ''Quality assurance'']'
  hobbies: '[''Running'', ''Puzzle solving (Sudoku, crosswords)'', ''Cooking (healthy soul food)'', ''Listening to hip‑hop and R&B music'', ''Attending local concerts'', ''Volunteering at health fairs and
    church food pantry'', ''Reading non‑fiction (personal development, pharmacy)'', ''Watching documentaries'', ''Board game nights with friends'']'
  career_goals: Steven aims to advance his pharmacy career by becoming a licensed pharmacist. Over the next three years he plans to complete a bachelor’s degree in pharmaceutical sciences, earn his Certified
    Pharmacy Technician credential, and then apply to a PharmD program. He is motivated to work in a community pharmacy setting where he can improve patient safety through workflow optimization and medication
    therapy management. In the longer term, he aspires to assume a pharmacy manager or supervisory role, potentially opening his own independent pharmacy that serves underserved Black communities in Iowa.
    He also wishes to become a certified immunizer to expand services. To support these goals, he is focused on gaining leadership experience, pursuing certifications such as Certified Immunizer (CPhI)
    and Pharmacy Management (CPM), and building a professional network through state pharmacy associations.
