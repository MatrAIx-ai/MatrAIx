  hobbies: '[''Abstract painting'', ''Mixed‑media sculpture'', ''Photography'', ''Book club (contemporary fiction & philosophy)'', ''Community theater'', ''Marimba playing'', ''Gardening (herbs and heirloom
    tomatoes)'', ''3D printing'', ''Virtual reality art'']'
  career_goals: Although retired from full‑time work, Adalberto aims to leverage his technical background and creative inclinations by mentoring underrepresented youth in STEM through local after‑school
    programs and by co‑founding a community art‑science studio that hosts free workshops. He also aspires to author a illustrated memoir that weaves together his Mexican heritage, his lifelong curiosity
    for abstract ideas, and his experiences in engineering, hoping to inspire others to pursue interdisciplinary passions.
