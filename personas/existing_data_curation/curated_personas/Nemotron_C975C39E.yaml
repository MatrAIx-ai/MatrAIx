  hobbies: '[''fly-fishing'', ''backcountry hiking'', ''wildlife photography'', ''woodworking'', ''volunteering at local food bank'', ''church outreach'', ''reading Western history'', ''gardening'']'
  career_goals: He aims to advance to a regional sales manager position where he can mentor younger sales staff, implement structured training initiatives, and expand the company’s reach into underserved
    rural markets. Over the next five years, Luke also hopes to launch a consulting side‑business that helps small local businesses develop sustainable sales strategies, balancing professional growth with
    maintaining a stable family life.
