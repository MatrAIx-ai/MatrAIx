persona_description: A researcher at the Knoblich lab, passionate about understanding the mechanisms behind the assembly and function of the human brain, particularly through the analysis of its simple
  nervous system and the cerebral organoid system. Their expertise lies in neurogenesis and neuron differentiation, as well as the study of defects in these processes that can lead to tumor formation. They
  have collaborated with clinical research groups to derive three-dimensional culture models for neuro-psychiatric disorders and analyze their developmental origin in a deeply mechanistic manner.
