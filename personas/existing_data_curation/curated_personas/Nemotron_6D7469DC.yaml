  career_goals: Clyde aims to advance to a regional sales manager role within the next two years, overseeing a team of sales engineers across the Gulf Coast. He is focused on mentoring junior reps, developing
    a structured training program, and expanding his expertise in emerging sustainable marine technologies such as electric propulsion and solar‑assisted vessels. He also plans to earn the Certified Professional
    Sales Leader (CPSL) credential and, after retirement, launch a consultancy that helps small‑scale marine businesses adopt energy‑efficient solutions while supporting local arts initiatives.
