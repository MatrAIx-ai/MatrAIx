  hobbies: '["gardening", "birdwatching", "knitting/crocheting", "reading classic literature", "beach walks", "listening to music", "church attendance", "social coffee outings"]'
  career_goals: At 94, Tracy’s primary ambition is to preserve her family’s legacy and remain emotionally and physically active. She aims to compile a handwritten memoir of her life’s experiences, especially
    the wartime and post‑war era, and to pass down her cherished recipes and craft patterns to her grandchildren. She also hopes to continue volunteering at the senior center, offering companionship and
    practical assistance, while maintaining her health through gentle exercise and regular medical check‑ups. Tracy desires to foster intergenerational connections, ensuring that her knowledge and stories
    remain a living part of her community.
