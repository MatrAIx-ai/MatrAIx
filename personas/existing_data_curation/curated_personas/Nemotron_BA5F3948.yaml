  hobbies: '["Street and nature photography","Sketching and drawing","Listening to lo‑fi hip‑hop while reading","Reading sci‑fi and fantasy novels","Journaling for creative expression and emotional processing","Cooking
    Southern comfort foods with family","Visiting the local library for quiet study","Playing narrative single‑player video games","Meditation and guided breathing exercises"]'
  career_goals: Taliyah aspires to build a career that blends her creative talents with her desire for flexibility and solitude. She aims to develop a robust portfolio of graphic design and photography
    work, eventually securing freelance projects or a remote position with a nonprofit focused on uplifting Black voices in the South. In the longer term, she hopes to earn a certificate in digital media
    or a community‑college associate degree, followed by a bachelor's in visual communication. Parallel to her creative ambitions, Taliyah is interested in mental‑health advocacy, planning to pursue training
    in counseling or peer support so she can help peers navigate anxiety and emotional distress. Her overarching goal is to create meaningful visual narratives while maintaining a work environment that
    respects her need for quiet, autonomy, and emotional well‑being.
