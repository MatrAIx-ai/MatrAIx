personas:
  professional: Taliyah Weekes is a budding visual storyteller who fuses her self‑taught graphic design skills in Canva and Photoshop with her quiet, reflective DSLR photography to build a modest freelance
    portfolio aimed at remote nonprofit projects that amplify under‑represented voices, and they thrive on the flexibility of working from solitary spaces.
  sports: Taliyah Weekes prefers solitary fitness activities like early‑morning jogs through the Edisto River nature trail and weekend kayaking, and they occasionally cheer for the Charleston Battery soccer
    team and the Clemson Tigers football squad when friends gather.
  arts: Taliyah Weekes immerses herself in the arts by sketching urban scenes while listening to lo‑fi hip‑hop producer Nujabes and soulful singer Jorja Smith, studying the graphic novels of Junji Ito for
    visual storytelling inspiration, and attending occasional community theater performances at the historic Dock Street Theatre, and they often share their creations on a private Instagram page.
  travel: Taliyah Weekes enjoys low‑key travel, planning spontaneous day trips to Charleston’s historic district, the marshes of the ACE Basin, and the nearby islands of Sullivan’s Island, while dreaming
    of a future solo backpacking trip to New Orleans to explore its music scene once she saves enough from her part‑time gigs, and they keep a handwritten map journal of each place visited.
  culinary: Taliyah Weekes loves cooking simple Southern comfort meals such as shrimp and grits with fresh Gulf shrimp, buttery corn muffins, and collard greens seasoned with smoked turkey, often experimenting
    with adding a dash of hot sauce or fresh thyme to personalize family recipes, and they enjoy sharing these dishes with relatives during Sunday church gatherings.
  core: Taliyah Weekes is a quietly curious teen who balances a love for solitary visual storytelling with an anxious streak, thriving on flexible freelance work while occasionally slipping into disorganized
    habits, and they value quiet reflection above all.
background:
  cultural: Taliyah is a Black teenager raised in North Charleston, South Carolina, a city steeped in Lowcountry heritage and Gullah cultural influences. Her family honors African‑American traditions through
    church gatherings, storytelling, and cooking dishes like shrimp and grits that blend coastal flavors with familial recipes. The community’s legacy of resilience—shaped by civil‑rights history and the
    vibrant arts scene of the Charleston area—has fostered her appreciation for Black narratives and visual representation. While she experiences contemporary urban culture, she maintains a strong connection
    to the region’s historical roots, which informs her artistic perspective and desire to uplift underrepresented voices through her creative work.
