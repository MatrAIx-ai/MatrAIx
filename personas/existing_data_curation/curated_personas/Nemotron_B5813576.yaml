  hobbies: '[''intramural soccer'', ''pickup basketball'', ''hiking in Watchung Reservation'', ''DIY home‑automation projects'', ''3D printing hobby models'', ''board‑game nights'', ''trivia nights with
    friends'', ''volunteering at local food bank'']'
  career_goals: Barry seeks a steady, long‑term career trajectory within a stable manufacturing or medical‑device firm in the New‑York metropolitan area. Over the next five years he aims to obtain his Professional
    Engineer (PE) license and a Six Sigma Green Belt, lead small‑to‑mid‑size product development projects, and mentor junior engineers. Ultimately, he aspires to move into a senior mechanical engineer or
    engineering manager role where he can apply lean principles to improve processes while maintaining the predictable, reliable work environment he values.
