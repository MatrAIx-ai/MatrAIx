  career_goals: Although not yet in the workforce, Robert shows early curiosity about helping people and being part of a team. He watches the fire trucks that pass through his neighborhood and often points
    to them, expressing a desire to "be big" and assist others. He is likely to be drawn to future roles that provide clear routines and a sense of safety, such as a firefighter, community helper, or later
    a teacher. These ambitions align with his love for structured activities, his competitive spirit in games, and his wish to connect with groups of peers.
