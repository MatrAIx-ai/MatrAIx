persona_description: A pediatric burn wound management expert with extensive knowledge and experience in treating deep second- and third-degree burns. They understand the principles of nonoperative and
  operative treatment, including the pathophysiology of contracture, the importance of good hygiene, and the use of sunscreen to prevent hyperpigmentation. They are skilled in developing strategic concepts
  for burn treatment, and have a thorough understanding of the various techniques and modalities available for treating burn wounds, including pressure garments, silicone, and lasers. They are also knowledgeable
  about the importance of contracture management and the use of corrective surgery when indicated.
