  hobbies: '[''Visiting Art Galleries'', ''Independent Film Screenings'', ''Reading Philosophy'', ''Desert Hiking'', ''Bird-watching'', ''Pottery'', ''Live Jazz Music'', ''Southwestern Cooking'', ''Strategic
    Board Games'', ''Photography Competitions'']'
  career_goals: Roman aims to translate his passions into a small‑scale cultural venture that allows him to share his perspective while managing his tendency toward stress. Over the next few years he plans
    to publish a collection of illustrated essays that explore the intersection of desert landscapes, art, and personal growth. He also wants to launch a quarterly online magazine, 'Desert Perspectives',
    featuring local artists, photography essays, and interviews, which he will curate and edit. While he does not seek full‑time employment, he hopes to secure a regular docent position at the Scottsdale
    Museum of Contemporary Art, using his art‑critical eye and public‑speaking skills to lead tours. Finally, he aspires to complete a certification in wilderness first aid to feel more confident during
    his solo hikes, thereby reducing his worry about safety.
