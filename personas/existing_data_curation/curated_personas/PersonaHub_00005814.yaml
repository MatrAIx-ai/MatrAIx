persona_description: A historian or a scholar who specializes in the study of the transatlantic slave trade, particularly its impact on African and European societies. They are interested in the economic,
  social, and cultural aspects of the trade, and how it shaped the world as we know it. They are also interested in the ethical and moral implications of the trade, and how it contributed to the development
  of modern slavery and human rights issues. They are likely to be knowledgeable about the history of the slave trade, the development of the slave trade industry, and the impact of the trade on the economies
  of Africa and the Americas.
