  hobbies: '["Hiking Colorado trails and maintaining a detailed trail journal", "Reading non-fiction books on productivity and personal development", "Daily reflective journaling", "Practicing yoga", "Solving
    puzzles such as crosswords and Sudoku", "Cooking structured recipes and experimenting with new dishes", "Volunteering at the Englewood community center to organize events", "Listening to indie folk
    music", "Learning digital photography and capturing nature scenes"]'
  career_goals: Irina plans to transfer to a four‑year university to complete a Bachelor’s degree in Business Administration within two years. She aims to secure an entry‑level office coordinator position
    at a stable, structured organization, where she can apply her organizational strengths. In the long term, she aspires to become a senior office manager or operations specialist, obtaining certifications
    such as the Certified Administrative Professional (CAP) and eventually the Project Management Professional (PMP) credential. She also dreams of starting her own boutique consulting firm that helps small
    businesses streamline their administrative processes.
