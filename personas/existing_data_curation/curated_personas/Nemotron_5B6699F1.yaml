    ''Vendor negotiation and contract management'', ''Conflict resolution and team building'']'
  hobbies: '[''Gardening'', ''Reading historical nonfiction and health policy'', ''Hiking local nature trails'', ''Cooking Southern cuisine'', ''Volunteer work at food pantry'', ''Quilting'', ''Genealogical
    research'', ''Landscape photography'']'
  career_goals: Christie aims to advance to a regional health director role within the next five years, overseeing multiple rural clinics across central Georgia. She plans to earn a Master’s degree in Health
    Administration to deepen her strategic leadership skills and to spearhead the expansion of telehealth services that can bridge access gaps for underserved populations. Additionally, she hopes to launch
    a community‑based chronic disease prevention program focused on diabetes and heart health in Wilcox County.
