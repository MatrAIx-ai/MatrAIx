persona_description: A researcher and scientist with expertise in immunology, specifically the study of immune response and the role of immune cells in cancer treatment. The individual is interested in
  exploring new treatments for ovarian cancer and has a particular interest in the use of small molecule inhibitors to target cancer-promoting pathways, such as the interaction between PD-L1 and immune
  cells. The researcher is also interested in the use of computerised tests to accurately predict survival rates in women with ovarian cancer. The individual has published research in journals such as Cancer
  Research and has received funding from the National Institutes of Health and the Ovarian Cancer Research Fund.
