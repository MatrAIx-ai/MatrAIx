personas:
  professional: Jane Harrell is a budding digital illustrator and experimental storyteller who channels her curiosity for fantasy worlds into nightly Scratch projects and mural‑size sketches, while maintaining
    a careful schedule to balance schoolwork, art practice, and personal journaling.
  sports: Jane Harrell is a member of the Cleveland Metroparks Aquatics Club where they practice lap swimming twice a week for personal fitness, occasionally attend weekend yoga sessions at a local studio,
    and they cheer on the Cleveland Cavaliers during basketball season as a quiet spectator.
  arts: Jane Harrell immerses themselves in the arts by creating digital illustrations inspired by the surreal palettes of Yayoi Kusama, penning gritty sci‑fi poetry reminiscent of Octavia Butler, attending
    weekly workshops at the Cleveland Museum of Art, and unwinding to the nocturnes of Frédéric Chopin on a vintage piano.
  travel: Jane Harrell enjoys carefully planned weekend getaways to places like Cuyahoga Valley National Park for quiet hikes, the Detroit Institute of Arts for immersive exhibits, and dreams of a future
    family vacation to Kyoto’s cherry‑blossom season, favoring low‑key exploration over crowded attractions.
  culinary: Jane Harrell expresses their love for flavor by experimenting with homemade cauliflower crust pizza topped with fresh basil and mozzarella, crafting strawberry‑banana smoothies using Greek yogurt,
    and occasionally attempting ramen from scratch, though they often forget to set a timer and burn the garlic.
  core: Jane Harrell is a quietly intense 13‑year‑old who translates restless imagination into digital art and poetry, finds solace in solitude, yet wrestles daily with waves of anxiety that both fuel and
    fray their creative drive.
background:
  cultural: Jane was raised in Broadview Heights, a suburban community in Cuyahoga County, Ohio. Her cultural background reflects typical Midwestern values—an emphasis on education, community participation,
    and appreciation for local cultural institutions such as the Cleveland Museum of Art. Her family's European ancestry and celebration of holidays like Thanksgiving and Christmas shape a familiar, supportive
    environment that encourages both artistic exploration and academic diligence.
attributes:
  skills: '[''digital illustration'', ''sketching'', ''creative writing'', ''research and fact‑finding'', ''basic programming (Scratch)'', ''personal schedule organization'', ''critical thinking'', ''self‑reflection
