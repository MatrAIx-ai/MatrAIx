  hobbies: '[''drawing'', ''digital illustration'', ''creative writing (poetry, short stories)'', ''reading fantasy and sci‑fi novels'', ''visiting art museums'', ''listening to classical piano music'',
    ''journaling'', ''nature walks'', ''basic coding in Scratch'']'
  career_goals: Jane aspires to attend a specialized high school for the arts and eventually pursue a career as a museum curator or concept artist, where she can blend her love of visual art, research,
    and solitary work. She also hopes to develop art‑based therapeutic programs for anxious teens, so she plans to study psychology or art therapy after college to merge her creative talents with a desire
    to help others.
