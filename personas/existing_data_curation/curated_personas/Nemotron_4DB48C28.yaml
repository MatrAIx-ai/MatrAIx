  career_goals: Johnny aims to leverage his practical skill set into a small, locally-owned contracting business that offers home renovation and maintenance services in Hartsville. He plans to obtain his
    GED while pursuing certifications in carpentry and HVAC, positioning himself for long‑term financial stability and the ability to support his family. Over the next five years he hopes to become a recognized
    community leader, organizing local events and youth programs, while also building a reputation for high‑quality workmanship and reliable service.
