  hobbies: '[''Gardening'', ''Woodworking'', ''Historical reading'', ''Genealogy'', ''Playing bridge'', ''Church volunteering'', ''Listening to classic country music'']'
  career_goals: At 90, Raymond’s primary ambition is to leave a lasting legacy by mentoring local youth interested in STEM, documenting and sharing his family's genealogy, and contributing his knowledge
    to the Columbus historical society. He aims to maintain his health and independence, support his wife in their daily routines, enhance the community garden he helps manage, and ensure a smooth transition
    of his home and assets to his children.
