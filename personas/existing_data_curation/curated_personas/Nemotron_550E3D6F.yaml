personas:
  professional: Adam Abbagnoro, a budding digital artist and robotics hobbyist, channels their methodical planning and curiosity into designing intricate LEGO machines and creating sleek graphics in software,
    often leading school projects with reliable organization and a willingness to explore unconventional design solutions.
  sports: Adam Abbagnoro, an avid participant in the local youth soccer league and a regular hiker at nearby state parks, supports the Seattle Seahawks and the New York Knicks, balances structured training
    sessions with spontaneous weekend bike rides, and prefers low‑impact cardio to avoid overexertion.
  arts: Adam Abbagnoro, an enthusiastic sketcher, draws inspiration from the whimsical worlds of Studio Ghibli’s Hayao Miyazaki, the vibrant comic art of Jeff Smith’s Bone, and the melodic piano pieces
    of Ludovico Einaudi, often blending these influences into custom character designs.
  travel: Adam Abbagnoro loves planning weekend getaways that mix adventure and relaxation, having camped under the stars in Yellowstone National Park, explored the historic streets of Boston, and dreaming
    of a future trip to Tokyo’s anime districts to experience the culture that fuels their imagination.
  culinary: Adam Abbagnoro enjoys experimenting with simple recipes, favoring homemade pepperoni pizza with fresh basil and mozzarella, crafting smooth banana‑smoothie bowls with chia seeds, yet their cooking
    skill is still emerging, leading to occasional burnt crusts.
  core: Adam Abbagnoro is a curious, organized teen who balances artistic ambition with a diligent savings habit, carefully tracks health, and channels stress into creative projects while occasionally indulging
    in impulsive splurges.
background:
  cultural: Adam lives in the suburban community of Garden City, New York, a diverse part of Nassau County. His family is of Italian-American heritage, and they maintain some cultural traditions such as
    making homemade pasta and celebrating holidays like Christmas and Thanksgiving with family gatherings. Growing up in a middle-class household, he has been encouraged to value education, community involvement,
    and artistic expression. The multicultural environment of the greater New York area, with its museums, galleries, and cultural festivals, has broadened his appreciation for varied artistic styles and
    ideas.
