  hobbies: '["Watercolor and Acrylic Painting", "Desert Landscape Photography", "Reading Speculative and Literary Fiction", "Hiking in the Sonoran Desert", "Yoga and Mindfulness Practice", "DIY Electronics
    with Arduino and Raspberry Pi", "Small Book Club Participation", "Attending Intimate Art Gallery Openings", "Xeriscape Gardening (Succulents)", "Listening to Jazz and Classical Music"]'
  career_goals: Carmen aims to become a department head or curriculum coordinator, championing innovative STEAM initiatives across her district. She aspires to secure grant funding to establish a state‑of‑the‑art
    makerspace, publish research on interdisciplinary teaching methods, and mentor a cohort of teachers in integrating art and technology. Over the next five years, she intends to present at national education
    conferences, develop a published guide for project‑based STEAM lessons, and implement a school‑wide mindfulness program to support student well‑being. Ultimately she hopes to leave a lasting legacy
    of a sustainable, creativity‑driven STEM program before retiring.
