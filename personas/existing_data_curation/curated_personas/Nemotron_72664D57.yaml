personas:
  professional: Carmen Hampson is a veteran secondary STEM educator and curriculum developer, leveraging advanced expertise in biology and physics to design interdisciplinary STEAM programs that blend scientific
    rigor with artistic expression, while their imaginative curiosity and organized yet flexible approach enable them to champion innovative makerspace initiatives within their district.
  sports: Carmen Hampson enjoys low‑impact hiking on local Sonoran trails, follows the Arizona Diamondbacks baseball team and the Phoenix Suns basketball team, and participates in a weekly senior yoga class
    at the community center, preferring personal fitness over competitive sports.
  arts: Carmen Hampson spends evenings painting desert sunrise scenes in watercolor and attending intimate art gallery openings that showcase regional photographers, drawing inspiration from artists like
    Ansel Adams and contemporary painter Georgia O'Keeffe, while their small‑group book club discussions often revolve around speculative fiction authors such as Octavia Butler and Ted Chiang.
  travel: Carmen Hampson prefers carefully planned trips that blend solitude and artistic discovery, favoring weekend getaways to Sedona’s red rock vistas, a month‑long photography expedition in Patagonia,
    and a dream pilgrimage to the Japanese Zen gardens of Kyoto, balancing a limited travel budget with their yearning for quiet inspiration.
  culinary: Carmen Hampson enjoys crafting simple yet vibrant meals that echo the desert, favoring grilled nopales, quinoa salads with pomegranate, and spiced prickly pear sorbet, while their intermediate
    cooking skills often result in experimental dishes that sometimes over‑season but always reflect their love for bold colors and textures.
  core: Carmen Hampson is a 54‑year‑old imaginative STEM teacher turned STEAM visionary, who weaves desert‑inspired art into science curricula, worries about future funding, and finds balance through yoga,
    gardening succulents, and tinkering with Arduino gadgets.
background:
  cultural: Carmen comes from a predominantly white, middle‑class American background, with family roots in the Midwest that emphasized education and community service. Relocating to Phoenix in her early
    thirties, she has embraced the Southwest’s multicultural atmosphere, appreciating the region’s Native American heritage, Mexican influences, and desert ecology. Her cultural identity blends mainstream
    American values with a strong appreciation for the local arts scene, regional cuisine, and the diverse perspectives of her students, informing both her teaching philosophy and personal interests.
attributes:
  skills: '["Curriculum Development", "STEAM Integration", "Educational Technology", "Differentiated Instruction", "Project-Based Learning", "Data Analysis", "Experimental Design", "Grant Writing", "Classroom
