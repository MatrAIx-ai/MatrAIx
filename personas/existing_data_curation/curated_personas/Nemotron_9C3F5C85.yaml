    literature'']'
  career_goals: Salih aims to channel his lifetime of experiences into legacy projects that benefit his community and his own emotional well‑being. He plans to author a memoir that blends personal stories
    with reflections on the art and history he loves. He is committed to volunteering as a mentor for younger adults interested in woodworking and local history, offering hands‑on workshops at the Greenwood
    community center. He hopes to deepen his digital fluency by learning to edit videos, enabling him to create short documentaries of local heritage. Salih also seeks to advocate for senior mental‑health
    awareness, collaborating with local health providers to organize support groups that address anxiety and grief. Finally, he wishes to travel to at least three regional art museums in the next five years,
    broadening his artistic exposure.
