personas:
  professional: Salih Bo, an 82‑year‑old community‑center facilitator and master woodworker, blends their lifelong carpentry skill, horticultural knowledge, and art‑history enthusiasm to lead senior workshops
    on woodworking, garden design, and local history, while adapting plans on the fly with empathetic listening and assertive guidance.
  sports: Salih Bo enjoys low‑impact fitness through weekly walks with the Greenwood senior walking club, occasional tai chi sessions at the community center, and passionately follows the Indianapolis Colts
    in the fall and the Indiana Pacers during the NBA season, cheering from their living‑room armchair while keeping a modest collection of vintage baseball cards.
  arts: Salih Bo paints tranquil Indiana landscapes in watercolors reminiscent of Albert Bierstadt, curates a personal photo series of garden blooms inspired by Ansel Adams’ tonal mastery, and finds solace
    listening to Bob Dylan and the works of poet Robert Frost during evening reading sessions.
  travel: Salih Bo prefers carefully planned, short‑duration trips to regional art museums such as the Indianapolis Museum of Art, the Cleveland Museum of Art, and the Art Institute of Chicago, balancing
    their love of cultural immersion with limited mobility and a modest travel budget, and they often travel with their adult granddaughter as a guide.
  culinary: Salih Bo delights in cooking garden‑fresh heirloom tomatoes into a rustic Caprese salad, slow‑roasting carrots and parsnips with rosemary, and occasionally bakes homemade apple pie using locally
    sourced apples, while their modest culinary skill is punctuated by a habit of over‑salting dishes that they humorously correct with a squeeze of lemon.
  core: Salih Bo is a curious, art‑loving octogenarian who tends a thriving vegetable garden, sketches sunsets, meticulously journals birds, yet often forgets to take their anxiety medication after lengthy
    museum visits, balancing a gentle stubbornness with an earnest desire to leave a lasting community legacy.
background:
  cultural: Salih was born in 1943 in Indianapolis, Indiana, into a white, Midwestern family of European descent. His parents were members of a mainline Protestant congregation, and he was raised with the
    values of modesty, hard work, and community responsibility typical of the post‑World War II Midwest. Growing up during the economic boom of the 1950s, he experienced the expansion of suburban life,
    the rise of automobile culture, and the early civil‑rights movement, which shaped his open‑minded yet cautious worldview. As a member of the Silent Generation, he embodies a mix of traditional etiquette
    and a quiet curiosity for new ideas, especially in art and culture. Over the decades, Salih has remained deeply connected to the small‑town character of Greenwood and Johnson County, while also embracing
    broader artistic influences through travel and lifelong learning.
