personas:
  professional: An emerging arts administrator, Nishi Yi merges meticulous project-management skills, Adobe Photoshop and Illustrator mastery, and charismatic public-speaking to design inclusive community
    workshops and campus cultural events that blend visual storytelling with social impact.
  sports: A dedicated ultimate frisbee enthusiast, Nishi Yi competes with the West Lafayette Flyers intramural team, attends Purdue Boilermakers basketball games for camaraderie, and balances high-energy
    matches with daily sunrise yoga sessions at the campus quad to maintain flexibility and focus.
  arts: A passionate contemporary art explorer, Nishi Yi spends weekends at the Contemporary Arts Center, sketches installations inspired by Ai Weiwei, Yayoi Kusama, and local muralists, and curates open-mic
    nights featuring world-music icons such as Fela Kuti, Angelique Kidjo, and Tinariwen to fuse visual and auditory expression.
  travel: A meticulous weekend traveler, Nishi Yi maps day trips on a shared spreadsheet, favors short getaways to Chicago’s museum district and the historic art fair town of Marquette, while pinning a
    future Kyoto itinerary for immersive cultural art study once their scholarship fund expands.
  culinary: A budding home chef, Nishi Yi perfects traditional East Asian dishes like mandu dumplings, mapo tofu, and bibimbap, using ingredients such as miso, gochujang, and Sichuan pepper, while sourcing
    fresh greens from the West Lafayette farmers market and occasionally exploring local food trucks for fusion experiments.
  core: Nishi Yi is a calm, curiosity-driven art organizer who balances meticulous planning with spontaneous sketches, daily yoga, and a budget-conscious wanderlust.
background:
  cultural: Nishi is a second‑generation East Asian American with family roots in Korea, raised in a bilingual household that celebrates Lunar New Year, traditional foods, and cultural performances. Growing
    up in West Lafayette, Indiana, she has blended her ancestral traditions with Midwestern American life, participating in local community fairs and college town activities. Her upbringing emphasized respect
    for education, collective well‑being, humility, and harmony, shaping her compassionate, cooperative, and resilient personality.
attributes:
  skills: '[''Project Management'', ''Graphic Design'', ''Digital Illustration'', ''Public Speaking'', ''Event Planning'', ''Peer Mentorship'', ''Community Outreach'', ''Research and Analysis'', ''Intercultural
