  hobbies: '[''Visiting art galleries'', ''Sketching'', ''Digital illustration'', ''Yoga'', ''Volunteer projects'', ''Organizing cultural events'', ''Reading philosophy and sci‑fi'', ''Open‑mic performances'',
    ''Cooking East Asian cuisine'', ''Ultimate frisbee'']'
  career_goals: Nishi aims to combine her love for art with her commitment to helping others by pursuing a career in arts education or nonprofit arts administration. She plans to complete her bachelor's
    degree in Art History or Community Development, followed by a master's in Arts Management or Social Work. Her long‑term ambition is to become a program director for a community arts center that offers
    inclusive, therapeutic art programs for youth and marginalized groups, and eventually to launch her own nonprofit that uses art as a catalyst for social cohesion and mental well‑being.
