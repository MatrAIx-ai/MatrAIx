personas:
  professional: Terry Shell, an aspiring junior architect who transforms LEGO bricks into intricate, fantastical structures while sketching mythical creatures in a notebook, blends a curious, organized
    mind with a love of solitary play and a competitive streak that sometimes clashes with collaborative school projects.
  sports: Terry Shell, a devoted little fan of the Milwaukee Brewers and Milwaukee Bucks, participates in the Milwaukee Youth Soccer Association’s under‑seven program for a few minutes each week, but mostly
    channels their energy into solo park runs where they chase a rubber ball, treating fitness as a quiet, self‑paced activity that satisfies their competitive curiosity.
  arts: Terry Shell, who delights in the vibrant colors of the Milwaukee Art Museum’s contemporary wing, often re‑creates scenes inspired by Van Gogh’s Starry Night and the animated worlds of Studio Ghibli’s
    Spirited Away, while humming to the catchy tunes of The Wiggles and singing along to the Disney classic soundtrack of Frozen.
  travel: Terry Shell, who has explored the Milwaukee County Zoo, splashed along the shoreline of Lake Michigan, and eagerly anticipates a family trip to Disney World in Florida to meet beloved characters
    and experience the thrills of Space Center Houston’s astronaut exhibits, prefers trips planned with parents for a sense of security, and dreams of visiting the grand arches of Washington, D.C.’s monuments.
  culinary: Terry Shell, who loves the taste of golden cheese curds and buttery pretzels at neighborhood block parties, frequently devours a simple grilled cheese sandwich with tomato soup, enjoys building
    mini‑salads with strawberries, carrots, and cucumber slices, and, while still mastering basic kitchen tasks, proudly helps stir pancake batter on weekend mornings.
  core: Terry Shell, a quietly inquisitive six‑year‑old who channels a fierce curiosity into solitary LEGO masterpieces, grapples with intense anxiety, and balances a love of local traditions with an ever‑growing
    imagination.
background:
  cultural: Terry is raised in a white, Midwestern family with deep roots in the Milwaukee area, where German and Polish heritage influence family traditions such as celebrating Oktoberfest, enjoying cheese
    curds, and attending local parades. His household values independence, self‑reliance, and a strong work ethic, while also encouraging artistic expression. He frequently visits the Milwaukee Art Museum
    and the local public library, experiences the seasonal rhythms of Wisconsin winters and summers, and shares in community customs like neighborhood block parties and volunteer clean‑up days.
attributes:
  skills: '["Detailed drawing and sketching","Puzzle solving and spatial reasoning","Basic visual coding with block‑based apps","Observational recall of nature and science facts","Expressive art as emotional
    regulation"]'
  hobbies: '["Coloring and sketching in a personal sketchbook","Building complex LEGO models","Reading picture books about animals, dinosaurs, and space","Quiet nature walks for observation and sketching","Playing
    educational puzzle and coding games on a tablet"]'
  career_goals: Terry dreams of becoming a wildlife illustrator who can capture the secret lives of animals in quiet, detailed artwork. He is also fascinated by space and imagines himself as a future astronaut‑scientist
    who designs experiments on distant planets. His competitive streak fuels a desire to be the best at creating imaginative drawings and solving complex puzzles, and he hopes to one day lead a solo research
    project that mixes art and science.
