  career_goals: Jason aims to transition into a senior executive role—such as Director of Data Strategy or Chief Data Officer—within the next five years. He plans to earn an executive MBA part‑time to deepen
    his strategic and financial acumen while continuing to lead high‑impact data initiatives that inform policy decisions at the federal level. He is also committed to building a mentorship program for
    early‑career technologists in his organization and championing data‑driven decision‑making across government agencies. Long‑term, he envisions shaping large‑scale digital transformation efforts that
    improve public services while maintaining a sustainable work‑life balance for his family.
