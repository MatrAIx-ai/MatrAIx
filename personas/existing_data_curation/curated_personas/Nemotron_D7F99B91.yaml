personas:
  professional: Jason Wilson is a data analytics manager in the federal sector, leveraging Python, SQL, Tableau, and Agile methods to turn raw data into policy‑shaping insights, and their preference for
    structure means every project is driven by a meticulously documented roadmap and clear stakeholder checkpoints.
  sports: Jason Wilson logs early morning runs along the Capital Crescent Trail, participates in the Potomac Trails Running Club’s weekly long‑distance hikes, and follows the Washington Capitals, Washington
    Wizards, and D.C. United with a structured game‑day routine that balances cardio sessions and post‑game analysis.
  arts: Jason Wilson curates a personal archive of street photographs inspired by Vivian Maier and Henri Cartier‑Bresson, frequents exhibitions at the Smithsonian American Art Museum, and unwinds by listening
    to folk‑rock icons like Fleet Foxes and the lyrical storytelling of Bob Dylan.
  travel: Jason Wilson prefers meticulously planned weekend getaways that blend outdoor adventure and cultural immersion, having recently hiked Shenandoah’s Old Rag and toured Boston’s Freedom Trail, while
    they keep a travel bucket list that includes Kyoto’s historic temples and the coastal villages of Croatia.
  culinary: Jason Wilson delights in tackling complex step‑by‑step recipes such as homemade ramen broth, Paella Valenciana, and Beef Wellington, favoring ingredients like saffron, miso, fresh thyme, and
    a dash of smoked paprika, even if the meticulous prep sometimes clashes with their tightly‑scheduled evenings.
  core: Jason Wilson is a data‑driven strategist who runs, cooks elaborate meals, and snaps street photos, all while obsessively fine‑tuning spreadsheets and occasionally over‑booking their calendar, proving
    that a love for structure can coexist with creative chaos.
background:
  cultural: Jason grew up in a middle‑class, white, Anglo‑American household in the Mid‑Atlantic region, where an emphasis on education, civic responsibility, and community involvement shaped his values.
    Moving to Washington, DC for his career, he has been immersed in a multicultural environment that broadened his perspective on public service and diversity. While he maintains traditional American celebrations
    such as Thanksgiving and the Fourth of July, he also participates in local cultural events, museum exhibitions, and neighborhood festivals that reflect the city’s rich tapestry. His upbringing instilled
    a respect for individual achievement and collective progress, which informs both his professional ethos and personal life.
