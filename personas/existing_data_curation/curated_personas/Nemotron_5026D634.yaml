  career_goals: Chinyere aspires to turn her love for visual storytelling and technology into a career as a multimedia designer or creative technologist. She envisions creating interactive art installations
    that merge digital media, social commentary, and community engagement. In the short term, she aims to build a robust portfolio of illustrations, collaborate on school tech projects, and earn a scholarship
    that will allow her to study graphic design and computer science in college. Ultimately, she hopes to lead a creative studio that mentors young artists from underrepresented backgrounds and uses art
    to spark dialogue on social issues.
