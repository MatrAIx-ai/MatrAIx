personas:
  professional: Carmen Taylor is an aspiring little entrepreneur who runs a pretend "toy store" where they practice counting, sorting, and customer service, demonstrating early knack for organization, practical
    thinking, and a balance of structure and flexibility.
  sports: Carmen Taylor enjoys preschool soccer, loves watching the local MLB team the Chicago Cubs, and participates in a Sunday swim class at the community pool, showing a practical, organized approach
    to training and a love for teamwork.
  arts: Carmen Taylor loves drawing animated characters in a Scribble‑Saurus style, is fascinated by the melodies of Disney’s classic soundtracks, and sings along to Sesame Street songs, often imitating
    the choreographed moves of the favorite TV show "Bluey."
  travel: Carmen Taylor prefers trips that follow a clear itinerary—like the recent weekend getaway to the zoo and a beach day at Clearwater—yet they are excited about upcoming plans to visit a theme park,
    balancing the thrill of new sights with the comfort of familiar routines.
  culinary: Carmen Taylor adores peanut butter and jelly sandwiches, mac and cheese, and strawberry yogurt, and can assemble a simple fruit salad with banana slices and blueberries, though they sometimes
    sneak peas onto the floor as a cheeky snack‑time game.
  core: Carmen Taylor navigates the world with a love for order, a secret stash of crayons, occasional candy‑induced tantrums, and a habit of arranging pillows into perfect rows before bedtime.
background:
  cultural: Carmen is raised in Cayey, Puerto Rico, in a bilingual household where Spanish and English are spoken daily. Her family celebrates local traditions such as the Fiestas de San Juan, enjoys Puerto
    Rican dishes like mofongo and arroz con gandules, and listens to bomba, plena, and salsa music. She participates in community events, helps with holiday preparations, and learns cultural stories from
    her grandparents, fostering a strong sense of Puerto Rican identity and family closeness.
