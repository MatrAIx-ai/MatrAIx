  career_goals: Although only four, Carmen imagines future roles such as a teacher who shares stories, a veterinarian who cares for animals, and a dancer who performs at community celebrations. She wishes
    to help her family, learn more about her Puerto Rican heritage, and become someone who can bring joy to others through music and caring.
