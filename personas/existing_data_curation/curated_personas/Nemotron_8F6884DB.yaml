  career_goals: Mairelys aims to advance into senior operational leadership, targeting roles such as Operations Manager or Administrative Services Manager within the next five years. She plans to earn professional
    certifications like PMP and Six Sigma Green Belt to deepen her project management and process‑improvement expertise. Additionally, she is exploring a part‑time MBA to broaden strategic and financial
    acumen. Her long‑term ambition is to lead cross‑functional initiatives that drive digital transformation and improve departmental efficiency while mentoring emerging leaders and supporting community
    outreach programs for Hispanic professionals.
