    and Peer Support'', ''Conflict Mediation'', ''Event Planning for Small Gatherings'', ''Document Preparation'']'
  hobbies: '[''Visiting art galleries'', ''Acrylic painting'', ''Digital illustration'', ''Reading (science popular books, contemporary fiction, poetry)'', ''Online courses in photography and coding'',
    ''Mindfulness meditation'', ''Journaling'', ''Cooking Southern comfort food with a modern twist'', ''Gardening'', ''Nature walks in local parks'', ''Coffee meet‑ups with close friends'', ''Small book
    club'']'
  career_goals: Nancy aims to transition from an office clerk to an office manager or operations coordinator within the next three years, focusing on improving workflow efficiency and fostering a supportive
    workplace culture. She plans to earn the Certified Administrative Professional (CAP) credential and complete a project management certification (CAPM) to broaden her leadership capabilities. Long‑term,
    she envisions leveraging her analytical background to move into a data analyst role for a nonprofit organization, where she can combine her technical skills with her passion for helping others and promoting
    community well‑being. She also hopes to champion mental‑health initiatives at her workplace, creating resources and training programs for colleagues.
