personas:
  professional: Cleo Lewis, a 29‑year‑old master carpenter, merges meticulous blueprint reading and sustainable material sourcing with an outgoing, hands‑on leadership style as they chart a path toward
    certified lead foreman and eco‑friendly woodworking specialist.
  sports: Cleo Lewis, an energetic 29‑year‑old, stays fit through Zumba and boot‑camp sessions, plays in a co‑ed weekend volleyball league, and passionately supports the Atlanta Hawks and Atlanta Falcons,
    often watching games with friends as part of their social routine.
  arts: Cleo Lewis, an avid creative, blends the kinetic energy of dance workshops set to pulsating world‑beat music with a deep appreciation for jazz legends like John Coltrane, the indie pop stylings
    of Haim, and the sculptural forms of architect Zaha Hadid, all of which inspire the distinctive flair of their custom furniture.
  travel: Cleo Lewis favours curated weekend getaways that marry architectural exploration with outdoor adventure—planning sunrise hikes in Sedona, strolling the modernist streets of Barcelona, and soaking
    in the coastal charm of Savannah—while using off‑peak flight deals and meticulous budgeting to keep travel affordable.
  culinary: Cleo Lewis, a confident home cook, delights in grilling lemon‑herb salmon, whipping up quinoa‑pistachio salads, and baking artisan sourdough with walnut‑rosemary swirls, while relishing the
    occasional indulgence of spicy chicken tikka masala and fresh mango salsa.
  core: Cleo Lewis, 29, navigates life with a meticulously organized mind, a boundless social energy, and an ever‑present undercurrent of anxiety that fuels both spontaneous late‑night online shopping sprees
    and a relentless drive to mentor others in sustainable carpentry.
background:
  cultural: Cleo grew up in a close‑knit African‑American family in the Phoenix metropolitan area, where cultural traditions such as soulful music, community gatherings, and storytelling were central to
    her upbringing. The values of resilience, mutual support, and pride in heritage have shaped her identity and her approach to her trade, motivating her to break barriers as a Black woman in carpentry.
    She draws inspiration from the rich legacy of African‑American craftsmanship and blends it with the desert aesthetics of the Southwest, creating works that honor both her cultural roots and her regional
    environment. Her community involvement reflects a commitment to uplifting others, particularly through mentorship and collaborative projects that celebrate cultural diversity.
attributes:
  skills: '[''Framing'', ''Finish carpentry'', ''Custom furniture design'', ''Blueprint reading'', ''Precise measurement'', ''Material selection'', ''Sustainable building techniques'', ''OSHA safety compliance'',
    ''Project scheduling'', ''Team coordination'', ''Client communication'', ''Problem solving'']'
  hobbies: '[''Dance workshops'', ''Community fitness classes'', ''Architecture tours'', ''Home‑improvement expos'', ''DIY woodworking projects'', ''Yoga and mindfulness'', ''Journaling'', ''Youth mentorship
    in carpentry'']'
  career_goals: Cleo aims to become a certified lead foreman within the next three years, leveraging her technical expertise and leadership abilities to oversee larger residential and commercial projects.
    She aspires to earn advanced certifications in green construction and CNC machining, positioning herself as a specialist in eco‑friendly custom woodworking. Long‑term, she dreams of launching her own
    boutique carpentry firm that prioritizes mentorship for women of color in the trades, creating a supportive community that blends her passion for craftsmanship with her desire to give back. Additionally,
    she hopes to develop a portfolio of signature pieces that reflect a fusion of African‑American cultural motifs and Southwestern design.
