  hobbies: '[''Classic car restoration'', ''Attending car shows and automotive club meetings'', ''Off‑road trail riding'', ''Hunting and fishing'', ''Woodworking and DIY furniture'', ''Home improvement
    projects'', ''Grilling and barbecue'', ''Reading automotive technology articles'', ''Arduino and electronics tinkering'']'
  career_goals: Frank aims to become a master technician with advanced ASE Master Specialist credentials in hybrid and performance vehicles. Over the next five years, he plans to open his own boutique automotive
    shop in McClain County that focuses on high-performance builds and electric vehicle conversions, while offering a small tool rental service for DIY enthusiasts. He also aspires to become a certified
    instructor at the local community college, sharing his practical knowledge and critical approach with the next generation of technicians.
