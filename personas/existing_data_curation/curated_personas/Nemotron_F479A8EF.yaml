  career_goals: Long-term, William aims to transition from sales floor responsibilities to leadership roles within retail. In the next 2-3 years he plans to become an assistant store manager, gaining experience
    in staff scheduling, budgeting, and performance coaching. His ultimate ambition is to become a store manager and eventually a district manager overseeing multiple locations in the Mid-Atlantic region.
    To support these goals, he intends to complete his bachelor's degree in Business Administration, with a focus on retail management, and to deepen his e-commerce knowledge so he can lead omni-channel
    initiatives. He also dreams of one day opening his own boutique that blends contemporary lifestyle products with a curated customer experience, leveraging both his practical retail background and his
    curiosity for emerging trends.
