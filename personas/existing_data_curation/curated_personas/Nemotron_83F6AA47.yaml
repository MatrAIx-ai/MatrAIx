  career_goals: Charmaine aims to step into a senior leadership role—such as Director of Operations or Vice President of Operations—where she can shape organizational culture to value both efficiency and
    creativity. She hopes to build an innovation hub within her company that integrates artistic initiatives with operational excellence, fostering employee engagement and community outreach. In the longer
    term, she envisions launching her own consultancy that helps organizations design flexible, human‑centered processes while embedding cultural and artistic programming into their core strategies.
