  career_goals: Ricky aspires to turn his artistic talent into a sustainable career. He plans to enroll in a community college or technical institute that offers a graphic design or visual arts program,
    where he can deepen his digital illustration and layout skills. After gaining formal credentials, he envisions working as a freelance illustrator for local businesses, publishing houses, or community
    organizations, and eventually opening a modest studio that doubles as a workshop space for youth art programs. He also hopes to combine his interest in technology with art by designing interactive displays
    for the Decatur public library or the local historical society. His long‑term ambition includes mentoring younger students and fostering a supportive creative environment in his hometown.
