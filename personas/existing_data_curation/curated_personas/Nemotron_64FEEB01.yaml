personas:
  professional: Ricky Jordan is an aspiring visual artist who merges traditional sketching, digital illustration on free software, and basic web design to craft narrative-driven projects, while using their
    curious, organized yet flexible mindset to mediate group collaborations and aim for a freelance illustration career after attending a community college graphic design program.
  sports: Ricky Jordan enjoys casual walks along the White River, plays pick‑up basketball with friends after school, follows the Decatur High School Wildcats football team, seasonally joins the community’s
    youth soccer league in the spring, and maintains a low‑key fitness routine that balances outdoor activity with the occasional missed workout during intensive art deadlines.
  arts: Ricky Jordan immerses themselves in speculative fiction, drawing inspiration from graphic novelist Jeff Lemire, the surreal paintings of H.R. Giger, the indie film 'Moonlight', and the folk‑indie
    sounds of Sufjan Stevens while regularly attending the local book club’s discussions of 'Saga' and experimenting with charcoal and digital brushes to develop a distinctive, narrative‑rich artistic voice.
  travel: Ricky Jordan prefers budget‑friendly weekend getaways, having explored Hoosier National Forest’s trails and taken a road trip to Nashville's music scene, while dreaming of a spring visit to Kyoto's
    temples and a summer surf in New Zealand, planning trips via detailed spreadsheet itineraries that balance school commitments, parental permission, and limited savings.
  culinary: Ricky Jordan enjoys cooking simple yet creative meals such as avocado toast topped with poached eggs, homemade ramen with miso broth, and blueberry pancakes, showcasing an intermediate kitchen
    skill set that blends experimentation with a love for fresh herbs like rosemary and occasional indulgence in craft soda from the local farmers market.
  core: Ricky Jordan is a quietly driven teen who channels curiosity and meticulous organization into evolving art projects, balances disciplined saving for creative tools with occasional late‑night coffee‑fueled
    sketch marathons, and cherishes small‑group connections while occasionally procrastinating on deadlines.
background:
  cultural: Ricky grew up in Decatur, a small town in Allen County, Indiana, where Midwestern values of modesty, self‑reliance, and community service are deeply ingrained. His family has agricultural roots,
    and weekend activities often revolve around local fairs, high school sports events, and church gatherings, although he personally prefers quieter, reflective pursuits. The region’s emphasis on practicality
    coexists with his exposure to broader cultural currents through the internet, giving him a balanced perspective that blends local traditions with contemporary artistic trends.
