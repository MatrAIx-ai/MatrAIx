  career_goals: Elizabeth aims to step into a senior technology leadership role—such as Director of Engineering or VP of Product—where she can shape product strategy, champion innovative, design‑driven
    solutions, and foster an inclusive team culture. Parallel to this, she envisions launching her own SaaS platform that leverages AI to democratize digital art creation, merging her passion for technology
    and visual expression. She is committed to mentoring women and under‑represented groups in tech, speaking at industry conferences on the intersection of business strategy and creative technology, and
    contributing to open‑source projects that enable artistic experimentation. Her ideal career path balances structured leadership responsibilities with the flexibility to explore novel ideas.
