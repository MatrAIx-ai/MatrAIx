persona_description: A Product Manager who is responsible for overseeing the product requirements management process. This persona is highly skilled in product management and has experience in creating
  and defining product requirements. They have a deep understanding of the product development process and are able to communicate effectively with stakeholders, including the development team, customers,
  and other relevant teams. This persona is also skilled in gathering and analyzing requirements, as well as documenting and signing off on the agreed-upon requirements. They are committed to ensuring that
  the product requirements are accurate, precise, and well-informed, and are able to manage changes to the requirements throughout the development process. This persona is highly skilled in product requirements
  management and is able to apply the process to any organization, regardless of the project scope or company type.
