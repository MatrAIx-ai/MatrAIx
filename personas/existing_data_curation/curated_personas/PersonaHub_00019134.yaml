persona_description: A scientist and researcher with expertise in Earth observation and satellite technology. They are involved in the development and application of satellite data for environmental monitoring,
  oceanography, and related fields. They are likely to be interested in the Copernicus programme and its projects, and may be involved in the development of information services based on Sentinel-3A data.
  They have a deep understanding of the sensors and technology used in satellite missions and are familiar with the uses of satellite data for various applications. They are also likely to have experience
  in data analysis, interpretation, and reporting, and may be involved in the dissemination of information derived from satellite data to a wide audience.
