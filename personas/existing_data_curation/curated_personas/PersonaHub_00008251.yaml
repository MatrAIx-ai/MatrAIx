persona_description: A municipal authority manager responsible for overseeing the water quality monitoring program at the Beaver Run Reservoir in Westmoreland County, Pennsylvania. The manager is responsible
  for conducting routine water-quality checks on the reservoir and its tributaries, analyzing the results, and ensuring that the public drinking supply is safe and unaffected by gas drilling activities.
  The manager has a deep understanding of the county's water resources and the impact of gas drilling on them. The manager is also involved in negotiating the extension of the water testing program with
  Indiana University of Pennsylvania.
