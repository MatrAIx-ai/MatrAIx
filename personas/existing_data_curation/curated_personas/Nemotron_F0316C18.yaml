  hobbies: '[''visiting art galleries and museums'', ''digital photography'', ''reading (fiction, science‑fiction, art history)'', ''experimental cooking'', ''gardening'', ''road trips to the Finger Lakes'',
    ''board game evenings with friends'', ''DIY woodworking'']'
  career_goals: Christopher aims to progress from his current stocker role to a supervisory position within the next three years, targeting a Warehouse Supervisor or Logistics Coordinator title. He plans
    to earn a certified supply chain credential (e.g., APICS CPIM) and eventually complete a bachelor’s degree in Business Administration or Logistics, building on his associate’s degree. Leveraging his
    passion for art, he also envisions a future where he could combine his logistics experience with a role in a museum store or gallery inventory department, or launch a small e‑commerce venture that sells
    locally crafted artworks and handmade goods.
