  hobbies: '[''Reading (science non‑fiction, literary fiction)'', ''Solo hiking and bird‑watching'', ''Mindfulness meditation'', ''Journaling'', ''DIY electronics (Arduino projects)'', ''Cooking (Asian
    and fusion cuisine)'', ''Puzzle solving (Sudoku, crosswords)'', ''Listening to instrumental music'']'
  career_goals: Ling aspires to transition into a research‑oriented data scientist or analyst role within a biotech or sustainable‑technology firm where she can conduct independent analysis while contributing
    to collaborative projects. She plans to enroll in a part‑time Master’s program in Data Science to deepen her expertise in advanced machine‑learning techniques and big‑data pipelines. Over the next five
    years, her ambition is to lead a project that translates scientific insights into market‑ready solutions, publish at least one peer‑reviewed paper, and eventually mentor junior researchers who share
    her balance of curiosity and practicality.
