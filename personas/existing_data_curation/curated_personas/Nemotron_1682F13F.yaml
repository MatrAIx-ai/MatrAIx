personas:
  professional: Ling Ho is a data‑driven engineer transitioning toward a research‑oriented data scientist role in biotech, leveraging Python, R, MATLAB, and machine‑learning fundamentals to turn experimental
    data into actionable insights while applying their methodical yet adaptable mindset to balance curiosity with practical project delivery.
  sports: Ling Ho maintains fitness through solo hikes along the Huron River, seasonal trail runs with the Ann Arbor Trail Runners Club, occasional cross‑country skiing in Michigan winters, and stays emotionally
    connected to local teams such as the Detroit Lions and the Detroit Tigers.
  arts: Ling Ho finds artistic balance by immersing in literary fiction, classic philosophy, and scientific non‑fiction while listening to instrumental compositions by Max Richter and Philip Glass, attending
    occasional gallery openings featuring contemporary Asian‑inspired artists, and drawing inspiration for DIY electronics from the aesthetic of Bauhaus design.
  travel: Ling Ho prefers meticulously planned, low‑key getaways, spending weekends exploring Michigan’s Sleeping Bear Dunes and the Upper Peninsula’s Pictured Rocks before dreaming of a solitary trek along
    the Camino de Santiago in Spain, budgeting each trip to accommodate both adventure and the constraints of a part‑time master’s program.
  culinary: Ling Ho experiments with regional Asian dishes like Korean bibimbap, Malaysian laksa, and Japanese okonomiyaki, often fusing them with Mediterranean ingredients such as sumac and preserved olives,
    enjoys perfecting a miso‑infused ramen broth, and balances cooking skill with a penchant for sourcing fresh herbs, gochujang, and saffron at local farmer’s markets.
  core: Ling Ho is a solitary yet curiosity‑driven data enthusiast who channels meticulous analysis into both scientific research and culinary experiments, all while navigating the quiet tension between
    disciplined budgeting and occasional indulgent splurges.
background:
  cultural: Ling’s family traces its roots to East Asia, with her parents having immigrated to the United States from Taiwan in the early 1990s. Growing up in a bilingual household, she is fluent in English
    and Mandarin, and her upbringing blended traditional values—emphasis on education, humility, and communal harmony—with the Midwestern American experience of independence and self‑reliance. Ling participates
    in cultural celebrations such as Lunar New Year and the Mid‑Autumn Festival, where she helps prepare family dishes and share stories of her heritage. At the same time, she has embraced the inclusive,
    multicultural environment of Ann Arbor, engaging with diverse community events and incorporating both her cultural heritage and local customs into her daily life.
attributes:
  skills: '[''Python programming'', ''R statistical analysis'', ''MATLAB modeling'', ''Experimental design'', ''Laboratory techniques (PCR, spectrophotometry)'', ''Technical writing'', ''CAD modeling (SolidWorks)'',
