  career_goals: She aspires to become a senior director of development or vice president of communications for a regional nonprofit that addresses food insecurity and environmental stewardship in the Pacific
    Northwest. Over the next five years, she plans to earn a bachelor’s degree in nonprofit management and secure professional certifications (APR, CFRE). She wants to lead a multi‑million‑dollar capital
    campaign, expand her organization’s donor base, and mentor emerging fundraisers, ultimately making a lasting impact on her community.
