  hobbies: '[''Sketching and watercolor painting'', ''Digital art and Scratch programming'', ''Reading fantasy and adventure books'', ''Visiting art museums (e.g., Scottsdale Museum of Contemporary Art)'',
    ''Playing soccer'', ''Dancing (hip‑hop and jazz)'', ''Hiking and exploring desert nature'', ''Collecting rocks and shells'', ''Yoga and mindfulness breathing'', ''Crafting with LEGO and clay'']'
  career_goals: Carol dreams of a future where she can combine creativity with caring for others. She imagines becoming a visual artist who runs art workshops for children, or a teacher who inspires curiosity
    and kindness in the classroom. She is also intrigued by the idea of studying psychology or counseling to help peers cope with strong emotions, aiming to create safe, supportive spaces for kids to express
    themselves.
