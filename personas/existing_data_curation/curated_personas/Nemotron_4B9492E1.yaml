personas:
  professional: Carol Blanchard, a 10‑year‑old aspiring digital artist and budding Scratch game creator, blends their boundless curiosity and methodical organization into vibrant desert‑inspired sketches
    and simple interactive games that they proudly showcase at school art fairs.
  sports: Carol Blanchard thrives as a forward for the Scottsdale Wildcats youth soccer club, spends Saturdays cheering on the Arizona Cardinals, and balances high energy with weekend desert hikes that
    keep them fit and connected to the local landscape.
  arts: Carol Blanchard immerses themselves in desert‑inspired creativity, frequently sketching at the Scottsdale Museum of Contemporary Art and drawing inspiration from Georgia O’Keeffe, Frida Kahlo, and
    the playful street murals of Banksy, while their craft sessions are soundtracked by Billie Eilish and Taylor Swift.
  travel: Carol Blanchard eagerly plans family road trips to the red rocks of Sedona, the sweeping vistas of the Grand Canyon, and dreams of a summer adventure at Disneyland, favoring itineraries that blend
    guided museum tours with spontaneous desert treasure hunts.
  culinary: Carol Blanchard’s palate delights in homemade chicken tacos topped with fresh cilantro, lime, and avocado, snack‑time trail mix of almonds, dried apricots, and chocolate chips, and they love
    experimenting with simple smoothies featuring mango, spinach, and a splash of orange juice.
  core: Carol Blanchard is a curious, organized, and socially vibrant ten‑year‑old who channels artistic energy into desert‑themed sketches, balances anxiety with yoga breathing, saves allowance methodically,
    and constantly seeks new adventures on the soccer field and hiking trails.
background:
  cultural: Carol was raised in a middle‑class suburban home in Scottsdale, Arizona, within a family that celebrates typical American holidays and embraces aspects of Southwestern culture. She attends a
    public elementary school where diversity and community events, such as the Scottsdale ArtWalk and local desert festivals, are part of her experience. The regional influence of the desert landscape and
    Native American-inspired art is reflected in her appreciation for nature and artistic motifs, while her upbringing emphasizes kindness, cooperation, and academic curiosity.
attributes:
  skills: '[''Drawing and watercolor painting'', ''Digital art using tablet apps'', ''Reading comprehension and story analysis'', ''Scratch programming basics'', ''Project planning and organization'', ''Team
