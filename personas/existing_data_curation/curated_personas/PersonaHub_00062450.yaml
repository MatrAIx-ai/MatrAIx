persona_description: A researcher and public health official who specializes in the study of infectious diseases, particularly tuberculosis (TB). They are particularly interested in understanding the burden
  of TB in young populations, including adolescents, and how it affects their productivity. They are aware of the stigma surrounding TB and are committed to addressing it to improve treatment access and
  effectiveness. They are also interested in exploring the social factors that contribute to the high risk of TB in adolescents and how these factors can be addressed to prevent TB transmission.
