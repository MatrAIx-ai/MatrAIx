  hobbies: '[''Beach volleyball'', ''Pickup basketball'', ''Kayaking'', ''Online multiplayer gaming'', ''Fantasy football leagues'', ''Improvisational comedy'', ''Science podcasts'', ''Skeptics club meet‑ups'']'
  career_goals: Abdallah aims to transition from a nursing assistant to a fully licensed registered nurse within the next two years by enrolling in an accelerated RN program to earn his associate degree.
    He plans to specialize in emergency or critical care to leverage his enjoyment of fast‑paced, high‑stakes environments. Long‑term, he envisions becoming a charge nurse or unit manager, pursuing a BSN,
    and eventually obtaining a nurse practitioner qualification. He also hopes to mentor new nursing assistants, helping them balance structure and flexibility in patient care.
