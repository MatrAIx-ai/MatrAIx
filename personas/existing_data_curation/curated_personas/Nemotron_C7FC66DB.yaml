personas:
  professional: Tracy Burnham is an aspiring junior activity coordinator at preschool who meticulously arranges block stations by color and size, and they love guiding peers through familiar daily routines
    while upholding high standards for tidy play areas.
  sports: Tracy Burnham is an energetic member of the Tiny Tigers T‑ball team, proudly wearing a Chicago Cubs cap while cheering for the Chicago Bulls during basketball season, and they often reenact a
    pitcher’s wind‑up in the backyard after practice.
  arts: Tracy Burnham delights in belting out The Wiggles' 'Fruit Salad', reenacting scenes from Disney's Frozen with a beloved stuffed Olaf, and they eagerly watch Peppa Pig episodes, often mimicking the
    characters' voices during playtime.
  travel: Tracy Burnham prefers family trips with a clear itinerary, enjoys revisiting the local zoo and Disneyland where they repeat their favorite rides, and they dream of exploring the Grand Canyon's
    rim someday, though their parents limit long flights until they're older.
  culinary: Tracy Burnham loves scooping steaming mac and cheese with a bright red fork, spreads peanut butter and jelly on whole‑grain bread for lunch, and they obsessively sprinkle extra shredded cheddar
    on tacos, even when they sometimes neglect their broccoli side.
  core: Tracy Burnham is an organized, routine‑loving five‑year‑old who balances boundless energy with meticulous habits, occasionally overindulging in sweets while leading peers through structured play.
background:
  cultural: Tracy grows up in Hermitage, a suburban community in Davidson County, Tennessee. Her family follows typical Southern U.S. customs, celebrating holidays with family gatherings, attending church,
    and participating in community events. She is exposed to regional folk music, Southern hospitality, and a strong emphasis on family values and polite manners. This cultural environment reinforces her
    love of routine, organization, and community participation.
