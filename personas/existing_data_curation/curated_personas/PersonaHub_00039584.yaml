persona_description: A law professor with expertise in criminal law and criminal procedure, particularly focusing on racial disparities in capital punishment. The individual is interested in understanding
  the production of capital homicides and the administration of the death penalty, and how social and demographic characteristics of the county in which homicides take place affect clearance rates. The
  persona is likely to have a deep understanding of statistical methods and data analysis, as well as knowledge of the criminal justice system and its processes. They may also have experience working with
  large datasets and conducting research on complex legal issues.
