  hobbies: '[''Cooking traditional Indian dishes'', ''Knitting and crochet'', ''Herb gardening'', ''Listening to Indian music'', ''Reading mystery novels'', ''Crossword puzzles'', ''Senior center dance
    nights'', ''Card games with friends'', ''Cultural association meetings'', ''Volunteering at food bank'']'
  career_goals: Even at 84, Varsha aims to deepen her legacy by mentoring younger volunteers at the local senior center, preserving and sharing her family's culinary heritage through a community cookbook,
    and establishing a small intergenerational garden that brings together seniors and schoolchildren. She also hopes to learn a new digital skill—using tablet apps for photo archiving—to create a digital
    memoir for her descendants, while maintaining her health and reducing stress through gentle yoga and mindfulness practices.
