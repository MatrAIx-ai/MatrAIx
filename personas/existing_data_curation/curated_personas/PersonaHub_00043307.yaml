persona_description: A social scientist who is interested in the intersection of education and social justice, particularly in the context of how educational policies and practices impact marginalized communities.
  They are likely to be familiar with key figures and ideas in education and social theory, such as Paulo Freire, Angela Davis, James Baldwin, and Aimé Césaire. They may also be interested in the ways in
  which economic and political contexts shape educational opportunities and outcomes. Additionally, they may be interested in the work of scholars like Ta-Nehisi Coates and Lame Deer, who have written about
  race, education, and the role of police in communities of color.
