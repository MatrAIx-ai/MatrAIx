personas:
  professional: Julio Hernandez leverages their bilingual literary analysis, meticulous project coordination, and love for solitary research to assist curators at the Tampa Museum of Art, where they blend
    rigorous scholarship with thoughtful community programming.
  sports: Julio Hernandez finds solace on Tampa’s nature trails, joining the local hiking club for weekend treks, while cheering for the Tampa Bay Buccaneers in the NFL and the Miami Heat in the NBA, and
    occasionally playing pickup soccer with friends when they feel socially comfortable.
  arts: Julio Hernandez immerses themselves in the arts by writing bilingual poetry, strumming acoustic guitar to traditional folk rhythms, attending gallery openings featuring muralist Alejandro Cruz,
    photographing street art by The Urban Canvas collective, and drawing inspiration from contemporary Colombian novelists such as Juan Gabriel Vásquez and classic world literature like Gabriel García Márquez.
  travel: Julio Hernandez prefers carefully curated trips that combine cultural immersion with scenic hiking, having explored the historic streets of Cartagena, trekked the Andes of Quito, and dreaming
    of a road trip along Chile's Pacific coast and a pilgrimage to the art museums of Florence, all while budgeting travel expenses through a spreadsheet.
  culinary: Julio Hernandez experiments in the kitchen with homemade corn cakes and a hearty stew, perfects a pour‑over brew using freshly ground beans, enjoys sourcing ingredients from Tampa’s farmer’s
    market, yet occasionally forgets to clean the coffee grinder promptly.
  core: Julio Hernandez is a solitary yet socially conscious cultural enthusiast whose curiosity fuels a disciplined blend of literary scholarship, culinary experimentation, and community outreach, all
    tempered by a pragmatic streak and occasional late‑night insomnia.
background:
  cultural: Julio was born to Colombian immigrant parents who settled in Tampa when he was a child. He grew up speaking Spanish at home and English in school, giving him a bicultural fluency that shapes
    his worldview. Family traditions such as celebrating Carnaval de Barranquilla, Día de los Muertos, and sharing Colombian culinary customs like perfecting his own arepa recipes are central to his identity.
    He participants in the local Colombian community’s events, attending church festivals and cultural gatherings that keep him connected to his heritage. His upbringing blends Colombian values of family
    cohesion and hospitality with the pragmatic, multicultural atmosphere of Tampa, fostering a deep appreciation for cultural exchange and representation.
attributes:
  skills: '[''Critical literary analysis'', ''Bilingual translation (Spanish-English)'', ''Research methodology'', ''Digital archiving'', ''Content creation for cultural blogs'', ''Basic project management'',
    ''Community event coordination'', ''Interpersonal communication'', ''Conflict facilitation'']'
  hobbies: '[''Reading contemporary Colombian fiction'', ''Writing poetry and short stories'', ''Acoustic guitar playing'', ''Photography of street art'', ''Cooking Colombian cuisine'', ''Specialty coffee
    brewing'', ''Exploring Tampa arts scene'', ''Hiking nature trails'', ''Narrative-driven video games'']'
  career_goals: Julio aims to leverage his humanities background and bilingual skills to work in cultural preservation and community outreach. In the next two years, he plans to secure an internship at
    the Tampa Museum of Art or a local Latin American cultural organization, where he can assist with curatorial projects and bilingual programming. He aspires to launch a bilingual podcast exploring Colombian
    literature and diaspora experiences, and eventually pursue a master's degree in Cultural Studies or Museum Studies. His long‑term ambition is to become a curator or cultural program director who bridges
    Colombian heritage with the broader Tampa community, creating inclusive educational initiatives.
