persona_description: A University of Michigan astronomer who specializes in the study of dwarf galaxies and their black holes, particularly those at the center of nearby dwarf galaxies. Her research interests
  include the measurement of the mass of black holes in dwarf galaxies, the study of the properties of their nuclear black holes, and the application of these techniques to other black holes. She is also
  interested in the mechanism through which supermassive black holes were assembled when the universe was in its infancy.
