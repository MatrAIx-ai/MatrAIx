  career_goals: Karim aims to move from his current sales representative role to a senior account manager or sales team lead within the next three years, focusing on service sectors that intersect with
    creative industries such as cultural events, digital media, and art institutions. He plans to earn a business management certification to strengthen his strategic planning and leadership capabilities.
    In the long term, Karim envisions launching his own consultancy that helps Bronx‑based artists and small businesses monetize their services through tailored sales and marketing strategies. He also hopes
    to mentor other young professionals from his community, promoting inclusive economic growth and cultural empowerment.
