    Photoshop, Canva)'']'
  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Urban photography'', ''Reading contemporary fiction and philosophy'', ''Yoga and guided meditation'', ''Hiking in the Catskills'',
    ''Participating in small‑group book clubs'', ''Solving jigsaw puzzles'', ''Browsing vintage record stores'']'
  career_goals: Laurine aims to move from a frontline representative to a supervisory role within the next two years, targeting a Customer Experience Team Lead position where she can shape service standards
    and mentor peers. Long‑term, she hopes to transition into a Customer Experience Strategy or UX Research role, blending her analytical strengths with her passion for art and design. To support this trajectory,
    she plans to complete a certification in User Experience Design and pursue a bachelor’s degree in Business Administration or Communications, while continuing to refine her leadership competencies.
