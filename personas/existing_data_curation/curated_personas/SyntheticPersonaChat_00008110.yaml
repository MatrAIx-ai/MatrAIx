    User 2: It is! I always feel better after a run.

    User 1: Do you have any pets?

    User 2: I have a dog named Toby. He''s a golden retriever.

    User 1: I love golden retrievers! They''re so friendly.

    User 2: They are! Toby is the best dog ever.

    User 1: I''m sure he is!

    User 2: So, what do you do for fun?

    User 1: I like to go to concerts, play video games, and hang out with my friends.

    User 2: That sounds like a lot of fun! I love concerts too.

    User 1: Me too! I''ve been to a lot of concerts this year.

    User 2: Nice! Who have you seen?

    User 1: I''ve seen Panic! At The Disco, Twenty One Pilots, and The Killers.

    User 2: Oh, that''s awesome! I''ve seen Twenty One Pilots too. They''re so good live.

    User 1: They are! I love their energy.

    User 2: So, what are you up to today?

    User 1: I''m just hanging out at home. What are you doing?

    User 2: I''m working on a story. I''m trying to finish it by the end of the week.

    User 1: Good luck! I''m sure it will be great.

    User 2: Thanks! I hope so.'
