personas:
  professional: Dominick Freeman is an aspiring junior digital illustrator and budding coder, merging their love for drawing fantastical landscapes with Scratch programming to animate stories, while their
    meticulous yet flexible nature keeps their creative projects organized yet open to spontaneous ideas.
  sports: Dominick Freeman enjoys weekend soccer with the neighborhood youth league, volunteers for a local community swimming club during summer, faithfully follows the New York Yankees and the Chicago
    Bulls, and balances active play with low‑key exercise like bird‑watching hikes that keep them fit without the pressure of competitive sports.
  arts: Dominick Freeman spends afternoons sketching vistas inspired by Claude Monet and drawing comic heroes reminiscent of Stan Lee, practices piano pieces by Ludwig van Beethoven and modern scores from
    Hans Zimmer, devours fantasy novels by J.K. Rowling and Neil Gaiman, and lets these influences shape their own short stories and imaginative journal entries.
  travel: Dominick Freeman loves planning modest family road trips to national parks like Yellowstone and local bird‑watching excursions in the nearby state forest, dreams of visiting Iceland's misty hills
    and Scotland's historic castles for artistic inspiration, yet their travel style stays budget‑conscious and school‑year constrained, favoring short getaways over long vacations.
  culinary: Dominick Freeman enjoys pepperoni pizza with extra mozzarella, tinkers with homemade mac and cheese using sharp cheddar and a splash of cream, and occasionally tries sushi rolls with cucumber
    and avocado after watching cooking videos, though they often burn the edges of pancakes when experimenting with maple syrup drizzles.
  core: Dominick Freeman is a curious, quietly determined 12‑year‑old who blends art, code, and storytelling while juggling anxiety‑driven worries with a diligent habit of saving allowance for creative
    pursuits.
background:
  cultural: Dominick was raised in Colesburg, a small rural town in northeastern Iowa, within a predominantly white, Midwestern farming community. His family attends a local Protestant church and takes
    part in community traditions such as the county fair, church potlucks, and school volunteer events. The region’s values of modesty, self‑reliance, and close‑knit neighborliness have shaped his cooperative
    nature and respect for harmony. At the same time, the limited exposure to broader cultural experiences has fueled his curiosity for art, new ideas, and unconventional thinking, leading him to seek out
    books, online resources, and school clubs that broaden his perspective.
