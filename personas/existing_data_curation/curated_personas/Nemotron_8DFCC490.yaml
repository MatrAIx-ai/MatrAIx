  career_goals: Dominick dreams of becoming an illustrator for children's books or a concept artist for video games, where he can merge his love of art and storytelling. He is also drawn to environmental
    science and hopes to study wildlife biology to protect the natural landscapes he cherishes. In the near term, he aims to improve his drawing technique, win a state art competition, attend a summer art
    camp, and create more sophisticated Scratch projects that tell interactive stories.
