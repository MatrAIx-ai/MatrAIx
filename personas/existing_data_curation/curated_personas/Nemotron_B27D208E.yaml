personas:
  professional: Deana Gunter, a seasoned food‑service supervisor in Bellevue, blends their strong leadership in fast‑paced kitchens with a curiosity for the arts, using creative problem‑solving and compassionate
    mediation to steer multiple teams toward seamless dining experiences while dreaming of a café‑gallery that doubles as a community art hub.
  sports: Deana Gunter follows Seattle’s sports scene avidly, cheering for the Seahawks on weekends and occasionally watching the Seattle Kraken, while they belong to the Bellevue Trail Crew hiking club
    for Saturday morning hikes in the Cascades and join a local yoga studio’s weekly Vinyasa class to stay fit.
  arts: Deana Gunter spends weekends wandering Bellevue’s art galleries, admiring works by local painter Maya Lin and the timeless watercolors of Claude Monet, attending performances by the Seattle Repertory
    Theatre starring Hannah Waddingham, and they slip into evening concerts featuring indie folk duo The Milk Carton Kids.
  travel: Deana Gunter prefers unstructured, low‑key trips, often hopping on a short ferry to Vancouver or driving up to the Oregon coast for weekend getaways, while they keep a bucket list that includes
    a quiet retreat in the Japanese Alps of Nagano and a culinary tour of Tuscany’s small agriturismos.
  culinary: Deana Gunter loves crafting seasonal dishes such as pan‑seared salmon with miso glaze paired with a roasted beet‑and‑goat‑cheese salad, and they experiment with foraged mushrooms in a wild‑rice
    risotto, though their kitchen organization sometimes suffers from their occasional disarray.
  core: Deana Gunter blends culinary leadership with artistic curiosity, navigating life with a relaxed, compassionate yet occasionally chaotic rhythm that fuels their dream of a community café‑gallery.
background:
  cultural: Deana identifies with mainstream American culture, rooted in a suburban Midwestern upbringing that emphasized education and community service. Her humanities degree broadened her appreciation
    for global artistic traditions, and living in the diverse Seattle metropolitan area—specifically Bellevue—has deepened her engagement with multicultural culinary and artistic scenes, blending her Western
    heritage with a genuine curiosity for world cultures.
attributes:
  skills: '[''Team leadership and staff supervision'', ''Food safety and sanitation compliance'', ''Menu planning and recipe development'', ''Customer service excellence'', ''Conflict resolution and mediation'',
