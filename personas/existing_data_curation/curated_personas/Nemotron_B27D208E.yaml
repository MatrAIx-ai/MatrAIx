  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Experimental cooking and recipe development'', ''Attending local theater and live music performances'', ''Volunteer work at
    a community kitchen'', ''Yoga and meditation'', ''Hiking and nature walks in the Pacific Northwest'', ''Reading contemporary literature'']'
  career_goals: Deana aims to advance to a regional culinary operations manager role, overseeing multiple kitchen sites while integrating artistic elements into dining experiences. She plans to earn a hospitality
    management certification and eventually open a community‑focused café‑gallery that showcases local artists, provides inclusive gatherings, and offers nutritious, creatively crafted meals.
