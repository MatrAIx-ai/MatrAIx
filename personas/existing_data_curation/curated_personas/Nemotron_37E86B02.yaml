personas:
  professional: Peggy Sanders, a seasoned construction veteran with three decades of experience operating heavy machinery and mastering framing, drywall, and basic carpentry, is shifting toward a part‑time
    supervisory safety coordinator role where they combine a practical, hands‑on problem‑solving mindset with a curiosity for eco‑friendly building practices, mentoring younger crews while still volunteering
    to patch up temporary structures at the local harvest festival.
  sports: Peggy Sanders enjoys weekend fishing trips to nearby lakes such as Lake Mille Lacs, follows the Minnesota Vikings and the Minnesota Golden Gophers with loyal enthusiasm, and participates in a
    casual community walking group organized through the local senior center, preferring low‑impact activity over competitive sports.
  arts: Peggy Sanders relaxes with Agatha Christie mystery novels, attends a local church choir that sings traditional hymns, volunteers at the historical society’s storytelling evenings featuring regional
    folk tales, and cherishes the sounds of folk singer Bob Dylan and the paintings of Grant Wood, which together shape their modest yet meaningful artistic life.
  travel: Peggy Sanders favors low‑key road trips in a reliable sedan, often driving to the Boundary Waters Canoe Area or the serene shores of Lake Superior, dreams of a summer visit to Yellowstone National
    Park, but balances these wanderlust wishes with a modest retirement budget and the occasional family gathering in Chicago.
  culinary: Peggy Sanders loves cooking fresh garden harvests into hearty chicken vegetable stew, pan‑frying their catch of walleye with lemon and dill, preparing classic Minnesota hotdish with tater tots,
    and baking a spiced apple pie using orchard apples, though they sometimes over‑indulge on the sugary desserts offered at church potlucks.
  core: Peggy Sanders blends seasoned construction know‑how with a community‑centric, curious spirit, balancing practical mentorship and modest indulgences while they navigate a relaxed, sometimes disorganized
    approach to life’s obligations.
background:
  cultural: Peggy’s upbringing in the Midwest has instilled a strong sense of community, self‑reliance, and respect for hard work. Growing up in a small-town, white Protestant family, she learned the value
    of modesty, neighborly aid, and faith‑based service. The cultural backdrop of Wright County emphasizes practical problem‑solving, seasonal outdoor activities, and seasonal celebrations like county fairs
    and harvest festivals. These traditions have shaped her appreciation for modest gatherings, hands‑on craftsmanship, and the harmony of balancing personal independence with collective responsibility.
    While she embraces the conventional values of her heritage, her lifelong curiosity drives her to explore new ideas within that familiar framework, such as adopting sustainable building practices and
    participating in community education programs.
attributes:
  skills: '[''Heavy machinery operation'', ''Framing and carpentry'', ''Drywall installation'', ''Concrete work'', ''Interpretation of building codes'', ''Workplace safety compliance (OSHA)'', ''Material
