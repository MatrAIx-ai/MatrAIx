  hobbies: '[''Gardening'', ''DIY home improvement projects'', ''Reading (DIY guides and mystery novels)'', ''Bridge (card game) club'', ''Church potluck gatherings'', ''Fishing at local lakes'', ''Driving
    scenic routes in rural Minnesota'', ''Volunteering at the historical society'']'
  career_goals: Peggy hopes to transition from full‑time labor to a part‑time supervisory role where she can share her decades of experience with younger crews. She is interested in earning a certification
    in construction safety to formalize her knowledge and possibly become a site safety coordinator. As she approaches retirement, she also wants to volunteer with local Habitat for Humanity projects, offering
    her skills to help families in need while staying connected to the building community. Ultimately, she aims to balance a lighter workload with meaningful mentorship and community service, ensuring a
    smooth financial transition into her golden years.
