  hobbies: '[''Visiting art museums and galleries'', ''Sketching and drawing'', ''Playing bongos at community events'', ''Cooking Puerto Rican cuisine'', ''Hosting dinner gatherings'', ''Attending live
    salsa and Latin music performances'', ''Reading about emerging technologies and sustainable manufacturing'', ''Volunteering at cultural festivals'', ''Mentoring youth in STEM'', ''Hiking in Ocala National
    Forest'']'
  career_goals: Looking ahead, Armando aims to transition from a senior inspector role to a supervisory or managerial position within quality assurance, such as Quality Assurance Lead or Process Improvement
    Manager. He plans to earn a Six Sigma Green Belt and become a certified ISO auditor within the next two years, positioning himself to drive larger‑scale initiatives that blend rigorous quality standards
    with creative problem‑solving. In the longer term, he envisions consulting for small‑to‑mid‑size manufacturers in the Orlando area, helping them build robust inspection protocols while integrating sustainable
    practices. Personal aspirations also include leveraging his social strengths to mentor younger technicians and to serve as a liaison between the quality department and executive leadership, ensuring
    that his team's contributions receive recognition across the organization.
