personas:
  professional: Bertha Corrales is a Certified Registered Nurse Anesthetist known for meticulous patient assessment, precise dosing, calm crisis management, and bilingual communication; they blend their
    curiosity for innovative art‑based pre‑operative therapies with a methodical, organized approach to leadership and mentorship.
  sports: Bertha Corrales enjoys early‑morning runs with the Pine Creek Running Club, participates in seasonal community softball leagues, follows the Carolina Hurricanes and North Carolina Tar Heels fervently,
    and maintains a balanced fitness regimen that combines yoga at a local studio with weekend paddle‑boarding on the coastal marshes; they find that this mix of team spirit and solo activity helps them
    stay grounded.
  arts: Bertha Corrales spends her weekends photographing the pine‑forested marshes inspired by Ansel Adams, strums traditional folk guitar melodies echoing the sounds of Bob Dylan and Nina Simone, and
    discusses historical fiction novels by Hilary Mantel and Ken Follett at a lively community book club; they view each creative outlet as a way to weave storytelling into their daily life.
  travel: Bertha Corrales prefers meticulously planned road trips that blend nature and culture, having explored the historic streets of Charleston, the mountain arts scene of Asheville, and a vibrant weekend
    in New Orleans, while dreaming of an immersive visit to the Catalan architecture of Barcelona, the serene temples of Kyoto, and the wildlife‑rich Galápagos Islands; they balance careful itinerary planning
    with spontaneous detours to local festivals.
  culinary: Bertha Corrales is an intermediate home chef who loves crafting spice‑rich Southern fusion dishes such as chipotle‑marinated pork tacos on corn‑cob tortilla flatbreads topped with black bean‑peach
    salsa and collard greens, while also perfecting sweet‑potato gnocchi drenched in a smoky poblano cream, and she frequently dines at farm‑to‑table eateries to source fresh herbs, heirloom tomatoes, and
    locally raised pork; they delight in experimenting with bold flavors and often host modest dinner gatherings for friends and family.
  core: Bertha Corrales blends meticulous anesthetic precision with a curious love for art, juggling a thriving garden, a habit of collecting mismatched socks, and a steadfast commitment to community‑focused
    healthcare; they never miss a chance to share a fresh‑picked tomato from their backyard.
background:
  cultural: Born to Mexican immigrant parents, Bertha grew up in a bilingual household where celebrations such as Día de los Muertos and Mexican Independence Day were interwoven with Southern customs. Her
    heritage instilled a strong sense of family, community responsibility, and respect for artistic expression, which she channels into her patient‑centered care and community involvement. Fluent in Spanish,
    she often serves as a cultural liaison, reducing language barriers for Spanish‑speaking patients. Bertha’s Mexican roots and North Carolina upbringing combine to shape a compassionate, culturally aware
    professional who values both tradition and innovation.
attributes:
  skills: '["Advanced airway management","Patient-controlled analgesia","Perioperative assessment","Pharmacology of anesthetic agents","Crisis resource management","Clinical documentation and EHR navigation","Quality
    improvement and safety initiatives","Mentoring and teaching of nursing staff","Bilingual communication (English/Spanish)","Community health outreach"]'
  hobbies: '["Landscape photography","Cooking Mexican‑Southern fusion dishes","Reading historical fiction","Visiting art galleries and community murals","Gardening vegetables and herbs","Volunteering at
    local health fairs","Learning and playing traditional Mexican folk songs on guitar","Hiking the Duplin County wetlands","Participating in a book club"]'
  career_goals: Bertha aims to transition into a leadership role within her hospital’s anesthesia department, overseeing protocol development and staff mentorship. She plans to pursue certification in pain
    management to expand services for chronic‑pain patients in rural Duplin County. Driven by her curiosity for new ideas, she hopes to collaborate on research that integrates art‑based therapeutic interventions
    into pre‑operative preparation, improving patient comfort and satisfaction. Long‑term, Bertha envisions establishing a regional training hub for aspiring nurse anesthetists, especially those from underrepresented
    backgrounds, to strengthen access to high‑quality peri‑operative care.
