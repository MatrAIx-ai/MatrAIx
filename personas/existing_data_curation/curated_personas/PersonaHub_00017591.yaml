persona_description: A physicist working on the development of new methods for generating intense, attosecond flashes of light using relativistic mirrors. They are part of an international team of researchers
  who have used a laser pulse to create a "relativistic mirror" that can reflect light in the extreme ultraviolet range. Their findings could pave the way for new methods of intense, attosecond pulse generation
  and could offer a new technique for exploring elementary processes in nature.
