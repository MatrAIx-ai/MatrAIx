  hobbies: '[''Reading non‑fiction (productivity, finance, business)'', ''Puzzle solving (Sudoku, crosswords)'', ''Strategic board games (chess, Go)'', ''Solo jogging and gym workouts'', ''Cooking Panamanian
    dishes'', ''Personal finance budgeting'', ''Assembling model kits'', ''Listening to tropical music'']'
  career_goals: Luis aims to move from front‑line sales to a sales operations or team‑lead role within the next three years. He plans to earn a Certified Professional Sales Leader (CPSL) credential and
    complete an associate degree in business administration to strengthen his strategic management skills. In the longer term, he envisions founding his own consultancy that helps service firms streamline
    their sales processes, using his analytical mindset and competitive drive while preserving a predictable, structured work environment.
