personas:
  professional: Wilmarie Farfan, a 13‑year‑old aspiring community organizer, channels her disciplined, organized nature into coordinating youth soccer practices, choreographing local folkloric dance sessions,
    and running after‑school homework clubs, always ensuring schedules stay predictable and tasks meet high standards.
  sports: Wilmarie Farfan plays left midfield for the City United youth soccer team, roots for the 'LA Galaxy', and maintains a disciplined fitness regimen that includes after‑school conditioning drills,
    weekend matches, and a habit of logging performance stats in a neat notebook, merging their love for teamwork with a practical, achievement‑driven mindset.
  arts: Wilmarie Farfan devours graphic novels such as 'Saga' and 'Ms. Marvel', crafts friendship bracelets while humming piano pieces by Ludovico Einaudi, and admires the storytelling of Neil Gaiman, weaving
    these creative outlets into an organized daily routine that satisfies both their artistic curiosity and need for structure.
  travel: Wilmarie Farfan plans vacations with a spreadsheet, favoring road trips to nearby state parks like Yosemite, an annual family visit to 'Disney World', and dreaming of a meticulously organized
    backpacking adventure through Costa Rica’s rainforests, balancing their desire for exploration with a need for predictability.
  culinary: Wilmarie Farfan enjoys assembling crunchy tacos al pastor with fresh cilantro and lime, slurping miso‑flavored ramen, and whipping up quick banana‑berry smoothies, though they sometimes forget
    to rinse their guitar‑shaped water bottle after lunch, reflecting a competent but occasionally scattered kitchen style.
  core: Wilmarie Farfan blends disciplined organization with a love for community rhythm, turning every soccer drill, dance rehearsal, and graphic‑novel page into a structured yet joyful expression of teamwork.
background:
  cultural: Wilmarie's family emigrated from Honduras to the United States, and she was raised in a bilingual household in Lorton, VA. Spanish is spoken at home, and she celebrates Honduran traditions such
    as Día de la Independencia with family gatherings, traditional foods like baleadas, and cultural events at the local Honduran community center. Her upbringing blends Honduran heritage—music, dance,
    and a strong sense of community—with the multicultural environment of Fairfax County, fostering a deep appreciation for both her roots and her American surroundings.
attributes:
  skills: '["Organizational planning","Time management","Bilingual communication (English/Spanish)","Collaborative leadership in group projects","Digital literacy (Google Classroom, Scratch)","Peer tutoring
    and study support"]'
  hobbies: '["Soccer (team sport)","Honduran folkloric dance","Reading graphic novels","Crafting friendship bracelets","Volunteering at after‑school program","Beginner piano"]'
  career_goals: Wilmarie aspires to pursue a career that combines her love for structure, helping others, and cultural pride. She dreams of becoming an elementary school teacher or a community health educator,
    where she can create organized learning environments and support bilingual students. She envisions herself studying education or public health in college, eventually returning to Fairfax County to mentor
    younger students and promote health awareness within the Honduran‑American community.
