persona_description: A researcher who is interested in studying the dynamics and structure of ecological networks, particularly focusing on the interactions between species and their ecosystem functions.
  This researcher is particularly interested in the analysis of community structure, functional trait diversity, and trophic networks across spatially coupled blue and green ecosystems at two scales. They
  are conducting this study in Switzerland, where they will be analyzing the structure of aquatic and terrestrial food webs at a finely resolved scale in a catchment representative of many rivers in Switzerland,
  and also at larger landscape-scales.
