personas:
  professional: Phyllis Demitraszek, a three‑year‑old mini‑architect, translates a love of order into meticulously planned block towers, displaying early project‑management skills and a competitive edge
    that drives they to out‑build peers while maintaining a practical focus on immediate stability.
  sports: Phyllis Demitraszek enjoys swinging a mini bat in the backyard and attending Little Rascals Soccer Club sessions, frequently cheering for the Metro City Mariners while favoring solo play that
    satisfies their competitive streak over large team drills.
  arts: Phyllis Demitraszek delights in the bright melodies of The Wiggles and the whimsical illustrations of Eric Carle, often recreating his tiger scenes with crayons while preferring quiet art sessions
    to group performances.
  travel: Phyllis Demitraszek loves short, predictable trips, having explored the city zoo and Grandma’s countryside farm, and they dream of a sensory‑rich adventure at Disneyland while their parents plan
    every detail to keep the journey structured.
  culinary: Phyllis Demitraszek, a budding picky eater, prefers soft macaroni and cheese spiked with hidden peas, enjoys dipping apple slices in peanut butter, and, despite limited cooking skill, insists
    on stirring the pot at bedtime snack time, demonstrating a practical yet structured approach to meals.
  core: Phyllis Demitraszek, a three‑year‑old with a fierce love for order, competes with peers in block building, hoards coins in a piggy bank, and occasionally refuses bedtime without a meticulously arranged
    story line, embodying a charming blend of competitiveness and solitude.
background:
  cultural: Phyllis comes from a white, Midwestern American family with Polish ancestry reflected in her surname Demitraszek. Raised in Merrill, Wisconsin, she experiences small‑town Midwest culture, including
    community events, church gatherings, and seasonal traditions such as Easter egg hunts and holiday meals featuring Polish dishes like pierogi. Her family values routine, politeness, and modest celebrations.
attributes:
  skills: '[''fine motor coordination'', ''color and shape identification'', ''basic counting (to ten)'', ''simple puzzle assembly'', ''following daily routines'', ''basic vocabulary (~300 words)'', ''turning
    pages of books'']'
  hobbies: '[''building blocks'', ''age‑appropriate puzzles'', ''coloring'', ''listening to storytime books'', ''singing children’s songs'', ''watching educational TV'', ''exploring the backyard'']'
  career_goals: Phyllis has begun forming simple ideas about her future, expressing a wish to become a teacher or a librarian when she grows up because she enjoys organized environments and helping others
    learn. In play she also imagines roles like firefighter or doctor, reflecting a desire for responsible, structured occupations.
