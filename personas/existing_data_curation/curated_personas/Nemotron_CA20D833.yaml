personas:
  professional: David Davydova, an aspiring junior engineer who loves building intricate LEGO creations, channels their curiosity and disciplined organization into leading school science club projects and
    dreaming of designing a soccer‑driven automation system.
  sports: David Davydova stars as a forward for the Darlington County Youth Soccer Association's under‑8 team, follows the Carolina Panthers' season for inspiration, and balances weekend nature hikes with
    daily drills to stay fit and disciplined.
  arts: David Davydova expresses emotion through drawing vivid comic panels and conquering rhythm challenges on the tablet game Osu! while listening to Imagine Dragons and Taylor Swift, which fuels their
    creative bursts after a tough day.
  travel: David Davydova enjoys weekend camping trips to Great Smoky Mountains National Park and day outings at Myrtle Beach, and dreams of a future school‑organized excursion to the Eiffel Tower in Paris,
    blending love for nature with curiosity about far‑away landmarks.
  culinary: David Davydova prefers pepperoni pizza, homemade macaroni and cheese, and can reliably whip up a grilled cheese with sharp cheddar and whole‑grain bread, while delighting in assembling fruit
    kebabs of strawberries, grapes, and banana slices for snack‑time creativity.
  core: David Davydova is a highly organized, socially energetic 9‑year‑old whose love for LEGO and soccer is balanced by intense anxiety that sometimes drives them toward candy splurges and a relentless
    quest for perfection.
background:
  cultural: David grew up in Darlington, South Carolina, where Southern hospitality and close‑knit community values are prominent. His family participates in local church gatherings, school fairs, and seasonal
