  career_goals: Ana aims to progress from front‑line driving to a supervisory role within a logistics firm, such as fleet manager or operations coordinator. She plans to obtain a freight broker certification
    and pursue additional safety and efficiency training to qualify for a management track. In the long term, she dreams of launching her own small transportation and delivery business that blends her driver
    expertise with her sales acumen, allowing her to serve local businesses and a broader regional market while mentoring other drivers from underrepresented backgrounds.
