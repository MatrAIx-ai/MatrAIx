  hobbies: '[''Basketball'', ''Skateboarding'', ''Snorkeling'', ''Hip‑hop and R&B music'', ''Video gaming (Minecraft, Fortnite)'', ''Digital art and video editing'', ''LEGO building'', ''Graphic novels'',
