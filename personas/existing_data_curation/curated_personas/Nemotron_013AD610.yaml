  career_goals: Damion dreams of becoming a civil engineer who designs sustainable, coastal infrastructure to protect his community from rising sea levels. He envisions studying engineering at a university
    that offers scholarship opportunities for underrepresented students and hopes to lead a student robotics or coding club to mentor younger peers. In the longer term, he aspires to combine his technical
    expertise with his desire to give back, perhaps by volunteering his engineering skills for community projects like building safe playgrounds or improving local park facilities. His organized, practical
    mindset drives him to set clear milestones—maintaining a high GPA, earning certification in CAD software, and securing an internship with a local engineering firm.
