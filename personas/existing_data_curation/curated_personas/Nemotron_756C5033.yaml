  career_goals: Mary Jean aims to advance from her current surveillance officer role to a supervisory position within the casino’s security department, eventually becoming a security manager overseeing
    multiple sites. She plans to obtain professional certifications such as Certified Protection Professional (CPP) and specialized loss‑prevention credentials, which will enable her to influence corporate
    safety policies. Long‑term, she envisions designing community outreach programs that educate local residents about gambling addiction prevention and promoting safe recreational environments, merging
    her practical skills with her humanistic passion for social harmony. Mary also hopes to author a guidebook that blends security best practices with cultural competency, reflecting her curiosity about
    integrating new ideas with proven methods.
