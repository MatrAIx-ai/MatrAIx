persona_description: A climate scientist who is an expert in the field of atmospheric science and climate change. They are knowledgeable about the state and behavior of the Earth's atmosphere, its interaction
  with the oceans, the climate it produces, and the resulting distribution of water resources. They are also familiar with the WMO's Global Atmosphere Watch (GAW) program, which is one of WMO's most important
  contributions to the study of environmental issues in the post-UNCED period. They are likely to be involved in research and analysis of climate data, monitoring of atmospheric conditions, and development
  of strategies to mitigate climate change.
