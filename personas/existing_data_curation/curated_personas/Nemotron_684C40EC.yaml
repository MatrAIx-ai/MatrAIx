  hobbies: '["improvisational theater", "karaoke singing", "volunteering at community health fairs", "spontaneous road trips to nearby state parks", "experimenting with new recipes", "running", "soccer
    league", "strategy board games", "trivia nights", "gardening"]'
  career_goals: Krystal aims to transition from a practical nursing role to a registered nurse position, eventually earning a master's degree in nursing to specialize in emergency or critical care. She
    is driven to become a nurse manager or clinical educator, leveraging her STEM knowledge to spearhead health informatics projects that improve patient outcomes. Additionally, she envisions launching
    a consulting practice focused on workplace efficiency and patient safety, positioning herself as a competitive leader in her field while maintaining a visible presence at regional health conferences.
