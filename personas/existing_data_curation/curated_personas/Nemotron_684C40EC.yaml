personas:
  professional: Krystal Rhodes is a licensed practical nurse with a sharp STEM edge, excelling in IV therapy, health data analytics, and crisis triage while channeling their competitive drive and love of
    spotlight into leading multidisciplinary teams and mentoring junior staff.
  sports: Krystal Rhodes kicks off weekends playing forward for the River City Strikers in a co‑ed soccer league, roots for the Seattle Seahawks and LA Lakers, and they combine competitive match play with
    regular 5k runs and a membership at the local community gym.
  arts: Krystal Rhodes lights up the stage at improv nights with The Second City workshop, dominates karaoke with Journey’s “Don’t Stop Believin’”, curates board‑game strategy sessions featuring Catan and
    Terraforming Mars, and they draw creative inspiration from Robin Williams' spontaneity.
  travel: Krystal Rhodes favors last‑minute road trips to state parks like Shenandoah and Red River Gorge, enjoys the freedom of a packed cooler over hotels, and they keep a growing bucket list that includes
    hiking the Grand Canyon rim and a weekend retreat in Sedona, Arizona.
  culinary: Krystal Rhodes experiments with dishes such as spicy chickpea curry, pan‑seared salmon with lemon‑dill sauce, and garden‑fresh basil pesto, balances a modest cooking skill with a love for trying
    Korean BBQ tacos at food trucks, yet they often overindulge in sugary karaoke snacks after performances.
  core: Krystal Rhodes blends a high‑energy social swagger with a competitive, sometimes chaotic streak, turning nursing precision into improv spontaneity while occasionally letting spontaneity derail their
    perfectly planned budgets and health routines.
background:
  cultural: Krystal grew up in the heart of the Midwest, embodying the region's strong work ethic, community orientation, and value of self‑reliance. As a white Missourian from Leavenworth County, she was
    influenced by Midwestern traditions such as close‑knit family ties, participation in local churches, and a respect for pragmatic problem‑solving. Living in Kansas City, KS, she balances a modest, down‑to‑earth
    lifestyle with a desire for personal achievement, reflecting both the cultural modesty and the competitive drive typical of her Midwestern roots.
