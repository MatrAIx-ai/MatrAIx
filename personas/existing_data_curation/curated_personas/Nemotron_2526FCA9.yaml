  career_goals: Although retired, David aims to stay intellectually active and contribute to his community. He plans to curate a modest local art exhibition that highlights emerging regional artists, mentor
    high‑school students in art appreciation, and complete a memoir chronicling his life in rural Maine. He seeks to achieve advanced proficiency in digital photography with the goal of publishing a small
    photo book of the state’s seasonal landscapes. He also intends to enroll in a community‑college art‑history course, join a senior chess league, and maintain his health through regular walking and stress‑management
    practices.
