personas:
  professional: David Cosby, they are a retired carpenter‑artist who combines their woodworking expertise, sharp budgeting skills, and critical eye for composition to curate modest local art exhibitions
    and mentor high‑school students, approaching each project with meticulous organization tempered by a competitive drive to showcase unconventional talent.
  sports: David Cosby, they are an avid walker and weekend hiker who follows the New England Patriots and Boston Red Sox with a critical eye for strategy, participates in the Maine Outdoor Explorers Hiking
    Club and the Portland Sea Dogs fan forum, and maintains fitness through daily 5‑mile coastal walks and occasional fishing trips with the local Maine Maritime Fishing Club.
  arts: David Cosby, they are an enthusiastic patron of visual arts who spends weekends dissecting the works of Andrew Wyeth and Ansel Adams, curates their own photography portfolio inspired by the Maine
    coastline, and regularly attends gallery openings featuring emerging artists like Lydia Marks while listening to Bob Dylan’s folk catalog as background while they paint.
  travel: David Cosby, they are a meticulous planner who favors low‑key, photography‑focused trips, has explored Acadia National Park and the historic town of St. Andrews, New Brunswick, and hopes to venture
    to the Scottish Highlands to trace their New England ancestors while capturing the dramatic seasonal light.
  culinary: David Cosby, they are a competent home cook with a penchant for traditional New England fare who regularly prepares creamy New England clam chowder, baked lobster rolls with fresh garden herbs,
    and blueberry crumble featuring wild Maine blueberries, while occasionally indulging in a well‑aged local cheddar.
  core: David Cosby, they are a quietly competitive, curiosity‑driven retiree who channels their love of wood, light, and lineage into meticulous art projects while grappling with an ever‑present undercurrent
    of worry.
background:
  cultural: David comes from a long‑standing white New England background rooted in the rural communities of Kennebec County, Maine. His family lineage traces back to early Puritan settlers, and he was
    raised with the region’s values of self‑reliance, modesty, and a deep respect for the natural environment. Growing up in a small town, he was immersed in a close‑knit community that balances traditional
    New England customs—such as seasonal festivities, local church involvement, and cooperative neighborly aid—with a quiet appreciation for the arts and craftsmanship. This cultural setting, combined with
    his high‑school education and lifelong exposure to the rugged Maine landscape, has shaped his practical skill set, love of solitary pursuits, and his desire to preserve and share the region’s heritage.
