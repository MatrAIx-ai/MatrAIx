  career_goals: Sarah aims to evolve into a senior solutions architect or chief technology strategist, driving innovation at the intersection of technology and the arts. She plans to earn certifications
    such as TOGAF and PMP to solidify her leadership credentials, and to spearhead interdisciplinary projects that embed humanistic insights into digital products—especially for cultural institutions and
    creative enterprises. Long‑term, she envisions launching her own consultancy that helps museums, galleries, and media firms implement user‑centric digital transformations, while also mentoring the next
    generation of analysts to think beyond traditional tech silos.
