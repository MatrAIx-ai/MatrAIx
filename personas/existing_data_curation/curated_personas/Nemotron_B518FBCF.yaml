personas:
  professional: Tatiana Santos, a 26‑year‑old engineering graduate, leverages her bilingual fluency, quantitative analysis expertise, and meticulous project documentation skills to deliver reliable, data‑driven
    solutions in Detroit’s automotive sector while championing structured processes and clear communication across cross‑functional teams.
  sports: Tatiana Santos, an avid hiker with a local mountain‑trail club membership, follows the Detroit Lions and Detroit Pistons, attends weekly yoga sessions at a downtown studio, and signs up for seasonal
    community runs, balancing cardio endurance with structured strength training to maintain a disciplined fitness regimen.
  arts: Tatiana Santos finds creative rejuvenation attending Detroit’s Mexican cultural festival, dancing to performances by Carlos Santana and contemporary choreographer Akram Khan, and decorating their
    journal with sketches inspired by Frida Kahlo’s vivid palette, while they also binge‑watch indie films by directors like Alfonso Cuarón for artistic inspiration.
  travel: Tatiana Santos prefers meticulously planned trips, having recently explored the canyon trails of Sedona, backpacked through Banff’s glacial valleys, savored street food in Oaxaca, and dreams of
    a sustainable tourism volunteer stint in Costa Rica, all while balancing a modest travel budget and work commitments.
  culinary: Tatiana Santos, who rates herself a competent home chef, perfects classic dishes such as mole poblano and chiles en nogada, experiments with quinoa‑taco fusion, relies on fresh cilantro, roasted
    chilies, and homestead corn, and occasionally hosts dinner parties that blend traditional flavors with modern plating techniques.
  core: Tatiana Santos blends disciplined engineering precision with a love for puzzle‑solving hikes, mindful yoga, and experimental cooking, all while juggling a meticulous budget and a penchant for late‑night
    Sudoku marathons.
background:
  cultural: Tatiana was raised in a Mexican immigrant family that emphasizes close family ties, respect for tradition, and a strong work ethic. Bilingual from childhood, she celebrates Día de los Muertos,
    Mexican Independence Day, and other cultural holidays with food, music, and storytelling, which reinforce a sense of community responsibility and resilience. These experiences have shaped her values
    of reliability, cooperation, and self‑advocacy, allowing her to bridge cultural gaps by translating for Spanish‑speaking neighbors and actively participating in local Latinx community events while also
    navigating her American upbringing in Michigan.
attributes:
  skills: '["Python programming", "MATLAB", "SolidWorks CAD", "Data analysis and statistical modeling", "Project planning and timeline management", "Bilingual Spanish‑English communication", "Technical
    report writing", "Laboratory research methods", "Electrical circuit design", "Process optimization"]'
  hobbies: '["Hiking in local nature preserves", "Cooking traditional Mexican dishes and experimenting with fusion recipes", "Practicing yoga and mindfulness meditation", "Participating in community STEM
    outreach for middle‑school students", "Reading non‑fiction books on technology and personal development", "Solving puzzles such as Sudoku and escape‑room style brain teasers", "Attending local cultural
    festivals and dance workshops", "Volunteering at the New Baltimore food bank during holidays"]'
  career_goals: Tatiana seeks an entry‑level engineering position within the automotive or manufacturing sector of the Detroit metropolitan area, where she can leverage her technical skill set and structured
    work style. Over the next three to five years she plans to earn a Project Management Professional (PMP) certification, transition into a project coordination role, and ultimately advance to a senior
    engineer or engineering manager position that allows her to lead cross‑functional teams while maintaining clear processes and predictable outcomes. She is also motivated to deepen her expertise in sustainable
    product design and to contribute to projects that have measurable community impact.
