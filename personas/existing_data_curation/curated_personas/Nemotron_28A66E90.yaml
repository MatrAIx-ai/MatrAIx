personas:
  professional: Pilar Herrera, an experienced IT support specialist with two decades of hands‑on troubleshooting, network configuration, and cybersecurity basics, blends their curiosity for new tech with
    a practical, people‑first communication style, and now channels a competitive drive toward a Service Desk Manager role while they mentor junior technicians.
  sports: Pilar Herrera stays active by leading salsa and bomba sessions that double as cardio workouts, hiking the rugged coastal trails near their hometown, cheering passionately for the Indios de Mayagüez
    baseball team, and playing occasional pickup games with the Añasco Thunder women's basketball club, all while they enjoy the occasional sunrise jog on the beach.
  arts: Pilar Herrera cherishes the sounds of Marc Anthony, the vibrant paintings of José Campeche, and the modern sculptures of Ana Martínez, regularly attends community theater productions starring local
    actors, and often incorporates the rhythmic storytelling of traditional bomba songs into their own creative expression, though they sometimes dominate conversations about art to share their insights.
  travel: Pilar Herrera prefers short road trips to nearby coastal villages and the historic colonial quarter of the island’s capital city, has explored the cobblestone streets of Barcelona, dreams of hiking
    Costa Rica’s cloud forests, and always plans journeys around community events to balance adventure with family responsibilities, even when they over‑pack in anticipation of every possible need.
  culinary: Pilar Herrera delights in cooking mofongo stuffed with chicharrón, alcapurrias filled with seasoned beef, and pastelón layered with ripe plantains, seasoning each with recaito, culantro, and
    a pinch of achiote, and while their intermediate cooking skills shine at weekend gatherings, they sometimes over‑salt dishes in the excitement of hosting.
  core: Pilar Herrera is a tech‑savvy community champion who fuses a love for dance, cooking, and mentorship with a competitive edge and a habit of over‑analyzing every detail, often leaving them worrying
    about the smallest hiccup, and they constantly seek ways to improve.
background:
  cultural: Pilar was born and raised in Añasco, a close‑knit municipality on Puerto Rico’s west coast. She grew up in a bilingual household where Spanish is the dominant language, but her bachelor's degree
    in a STEM field required fluency in English, giving her a comfortable bridge between both cultures. Her family roots reflect Puerto Rico’s rich tapestry of Taíno, Spanish, and African ancestry, which
    influences her love for music, dance, and communal celebrations such as the Fiesta Patronal de Nuestra Señora de la Asunción. Strong family ties, a deep respect for community elders, and a willingness
    to help neighbors are central to her identity. While she honors traditional customs—like preparing holiday feasts and participating in church events—she also embraces modern technology and encourages
    her community to adopt digital tools that enhance daily life and preserve cultural heritage.
attributes:
  skills: '["Hardware troubleshooting", "Network configuration (wired & wireless)", "Windows, macOS, and Linux support", "Remote desktop and assistance tools (TeamViewer, AnyDesk)", "Ticketing system management
    (ServiceNow, Zendesk)", "Basic cybersecurity awareness (phishing prevention, password hygiene)", "IT asset inventory and lifecycle management", "PowerShell and Bash scripting for automation", "Technical
    documentation and knowledge‑base authoring", "User training and onboarding workshops", "Customer service and conflict de‑escalation", "Problem‑solving under pressure"]'
  hobbies: '["Salsa and bomba dancing", "Cooking traditional Puerto Rican cuisine", "Raspberry Pi and Arduino DIY projects", "Home automation tinkering", "Reading mystery and thriller novels", "Crossword
    and Sudoku puzzles", "Hiking coastal trails in western Puerto Rico", "Volunteering as a computer literacy instructor for seniors"]'
  career_goals: Pilar aims to transition from frontline support to a leadership role where she can shape service delivery and mentor younger technicians. She plans to earn ITIL Foundation and CompTIA Security+
    certifications within the next year to bolster her credentials for a Service Desk Manager or IT Operations Lead position. Long‑term, she envisions launching a community‑focused tech consultancy that
    helps small businesses and local nonprofits in western Puerto Rico modernize their IT infrastructure, improve cybersecurity resilience, and train staff. Her sociable nature also drives her to become
    a regular speaker at regional technology meet‑ups and to organize workshops that bridge the digital divide for seniors and under‑served neighborhoods.
