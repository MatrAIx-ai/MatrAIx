personas:
  professional: Amanda Todd, a miniature event planner, arranges her playdates with the same meticulous precision a seasoned coordinator uses, and they showcase early talent for scheduling, logistics, and
    people‑centred organization that foreshadows a future in event management.
  sports: Amanda Todd, an energetic toddler gym‑goer, loves crawling obstacle courses at the Little Cubs Play Center, claps along to the Atlanta Falcons’ Sunday broadcasts and proudly wears a miniature
    red jersey of the local high school basketball team, and they thrive on the rhythmic movement that mirrors the lively community spirit.
  arts: Amanda Todd, a budding rhythm‑lover, sways to the soulful sounds of Mavis Staples and gospel choirs during family Sunday services, delights in the bright illustrations of Faith Ringgold’s picture
    books, and they giggle at the local puppet theater’s performances, showing how music and storytelling shape her early creative identity.
  travel: Amanda Todd, a curious little explorer, enjoys car‑seat rides to the bustling farmers market in Atlanta, weekend outings to the misty trails of the Great Smoky Mountains, and dreaming about future
    trips to historic Savannah, and they absorb each new landscape with wide‑eyed wonder.
  culinary: Amanda Todd, a tiny food enthusiast, eagerly smears creamy mac & cheese on her bib, giggles when spoon‑feeding mashed sweet potatoes seasoned with a dash of cinnamon, and they love the sweet
    aroma of peach cobbler baking in the kitchen, displaying a budding palate for comforting Southern flavors.
  core: Amanda Todd, a one‑year‑old with an uncanny knack for organizing toys, stashing pennies, and dancing to gospel beats, they blend infant curiosity with disciplined, community‑rooted habits that hint
    at a future driven by structure and soulful rhythms.
background:
  cultural: Amanda is part of an African American family residing in Talking Rock, GA, a rural community in Gordon County. Her cultural upbringing blends Southern African American traditions, with strong
    ties to the local church, family gatherings, and community events. She is exposed to Southern cuisine, storytelling, gospel music, and the supportive, close-knit networks typical of many African American
    families in the rural South. These influences shape her values of community, resilience, respect for elders, and a love for rhythmic music and dance.
