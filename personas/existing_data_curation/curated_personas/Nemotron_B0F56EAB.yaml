  career_goals: May dreams of becoming an architect who designs spaces that blend artistic beauty, sustainable technology, and cultural heritage. She also imagines exploring robotics engineering to create
    interactive art installations, and hopes to continue learning languages so she can share her creations with a global audience. Her long‑term ambition is to combine creativity with methodical problem‑solving
    to make environments that inspire curiosity in others.
