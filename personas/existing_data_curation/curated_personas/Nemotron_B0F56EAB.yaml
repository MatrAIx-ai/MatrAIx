personas:
  professional: A budding LEGO architect and junior coder, May Xu designs intricate brick structures with meticulous planning, uses Scratch to animate their builds, and consistently shares project updates
    during class show-and-tell, reflecting their organized, curious, and calm demeanor.
  sports: May Xu enjoys kick‑starting the day with soccer drills at the Katy Thunder Soccer Club, cheerfully watches the Houston Astros on weekends, and explores the local nature trails with a small backpack,
    approaching fitness with playful curiosity and a steady, organized routine.
  arts: May Xu immerses themselves in watercolor painting inspired by Claude Monet, follows the whimsical animation of Hayao Miyazaki, and enjoys listening to Lin‑Manuel Miranda’s Broadway tunes, eagerly
    attending community art exhibitions featuring local muralists, allowing their open‑minded curiosity and meticulous attention to detail to flourish.
  travel: May Xu has explored the Houston Space Center, road‑tripped to Austin’s live‑music scene, visited a sea‑life aquarium in San Antonio, and dreams of traveling to Kyoto to see cherry blossoms and
    to Beijing for the Great Wall, balancing family‑oriented trips with an adventurous imagination.
  culinary: May Xu delights in hand‑rolling pork and chive dumplings during Lunar New Year, loves the smoky flavor of Texas brisket tacos topped with cilantro, relishes fresh watermelon cubes, and experiments
    by mixing soy sauce with a hint of honey for a sweet‑savory dip, showcasing a playful culinary curiosity.
  core: May Xu is a calm, methodical eight‑year‑old who builds towering LEGO castles, sketches vibrant watercolors, meticulously saves allowance, and never skips a chance to celebrate both Lunar New Year
    and Fourth of July with equal gusto.
background:
  cultural: May comes from a Chinese‑American family that preserves many traditions, including speaking Mandarin at home, celebrating Lunar New Year with red envelopes and festive meals, and preparing dishes
    like dumplings and spring rolls. Living in Katy, Texas, she also experiences a multicultural community, participates in local school events, enjoys Texan foods such as barbecue and tacos, and interacts
    with peers from diverse backgrounds, giving her a blended cultural perspective that values both her heritage and the broader American milieu.
