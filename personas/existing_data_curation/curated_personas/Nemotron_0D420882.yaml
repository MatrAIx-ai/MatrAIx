personas:
  professional: David Jackson is a senior full‑stack software engineer who blends cloud‑native development, data‑driven design, and a design‑thinking mindset to create intuitive user experiences while championing
    inclusive, low‑stress team dynamics through agile mentorship and strategic product vision.
  sports: David Jackson follows the Seattle Seahawks in football, the Seattle Sounders FC in soccer, participates in the Seattle Hiking and Outdoor Club’s weekend treks, and fits in bi‑weekly yoga classes
    to counterbalance long hours at the desk.
  arts: David Jackson curates digital paintings in Procreate inspired by Van Gogh’s bold colors, Olafur Eliasson’s immersive light work, and the ambient textures of Brian Eno, regularly visits gallery openings
    at the Frye Art Museum, and draws creative spark from indie filmmaker Charlie Kaufman’s narrative experiments.
  travel: David Jackson prefers meticulously planned trips that merge art and nature, having photographed Berlin’s street murals, trekked Iceland’s fjords, wandered the temples of Kyoto, and now saves for
    a sailing adventure through the Greek Islands.
  culinary: David Jackson loves experimental cooking, mastering sous‑vide salmon, fermenting kimchi, crafting lavender‑infused panna cotta, and perfecting mole sauce, often pairing these creations with
    a rotating selection of natural wines and locally sourced heirloom tomatoes.
  core: David Jackson is a curiosity‑driven technologist who balances meticulous code craftsmanship with nightly urban photo walks, quietly worries about looming deadlines, and hoards vintage camera lenses,
    sometimes at the expense of a tidy living space.
background:
  cultural: David grew up in a middle‑class suburban family in the Kansas City metropolitan area. His upbringing blended Midwestern values of modesty, community responsibility, and a strong work ethic with
    exposure to a broad range of cultural influences through school, college, and the tech industry. While his family’s cultural roots are ethnically European‑American, he developed an appreciation for
    diverse artistic expressions through university art electives and local gallery visits. Living in Overland Park, he participates in community volunteer events, values collaborative harmony, and balances
    a pragmatic Midwestern outlook with a progressive curiosity for new ideas and unconventional thinking.
