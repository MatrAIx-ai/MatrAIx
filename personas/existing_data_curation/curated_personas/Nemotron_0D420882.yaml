  career_goals: He aims to transition into a technology‑lead or engineering‑manager role where he can shape product vision while fostering an inclusive, low‑stress team culture. Over the next five years,
    David plans to earn a cloud‑architect certification and deepen his expertise in AI‑driven user experiences, ultimately launching a side venture that merges interactive digital art with data‑visualisation
    tools. He also aspires to mentor emerging developers and contribute to open‑source projects that promote accessible design.
