persona_description: A teacher who is a proponent of the "split the difference" strategy in teaching and learning. They use this strategy to encourage their students to balance their time between playing
  games and taking notes, which they believe is crucial for their students' personal and academic success. They also use the School of One online dashboard to monitor real-time student progress on digital
  content, and approach specific students for one-on-one Targeted Interventions to correct misconceptions in real time. They believe that planning is an essential part of a blended teacher's practice, and
  they are particularly well-suited for middle grades, where they need an increased sense of agency to work independently.
