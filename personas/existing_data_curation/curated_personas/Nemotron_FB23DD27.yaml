personas:
  professional: Nydia Santiago spearheads interdisciplinary cultural projects with a blend of humanities insight and agile project management, leveraging a sharp analytical eye and a competitive drive to
    deliver high‑impact outcomes while navigating a preference for flexible structures.
  sports: Nydia Santiago spends weekends tackling the El Yunque foothills with the local hiking club, plays casual beach volleyball with a small co‑op team, and follows the Caribbean professional basketball
    franchise Bayamón Bairros while maintaining a self‑directed fitness routine that balances cardio hikes with brief yoga sessions.
  arts: Nydia Santiago curates a personal library of contemporary Caribbean literature featuring poets like Giannina Braschi, translates experimental verses into visual sketches, studies the street murals
    of local artist Kaïa Hernández, and draws inspiration from acoustic performances by singer‑songwriter Noel Arístides, weaving these influences into their own digital illustration practice.
  travel: Nydia Santiago favors spontaneous, low‑cost travel itineraries that blend hiking and cultural immersion, often backpacking through the rainforests of Costa Rica and the colonial streets of Old
    San Juan, while dreaming of photographing street art in Berlin’s Kreuzberg district and attending a poetry festival in Lisbon, all while balancing a modest travel budget and occasional family obligations.
  culinary: Nydia Santiago experiments with traditional island dishes such as mofongo and arroz con gandules, reinventing them by infusing smoked paprika, miso‑glazed pork, and fresh cilantro, while they
    regularly prepare weekend brunches featuring avocado‑lime toast topped with pickled onions and a side of plantain‑based fritters.
  core: Nydia Santiago blends relentless curiosity with a calm, competitive edge, juggling spontaneous art‑hunts and meticulous project planning while habitually misplacing their vintage film rolls and
    obsessively reorganizing digital folders.
background:
  cultural: Born and raised in Rio Grande, Puerto Rico, Nydia grew up immersed in the island’s rich blend of Spanish colonial heritage, Afro‑Caribbean rhythms, and vibrant coastal traditions. Her family
    values community resilience, a trait reinforced by the collective recovery efforts after Hurricane Maria. Fluent in both Spanish and English, she navigates local customs and global perspectives with
    ease. She cherishes the oral storytelling traditions of the barrio, the sensual flavors of Puerto Rican cuisine, and the island’s evolving contemporary art scene. This cultural tapestry informs her
    professional ethos, driving a commitment to elevate Puerto Rican artistic expression on broader platforms while honoring her roots.
attributes:
  skills: '[''Agile & Hybrid Project Management'', ''Creative Problem Solving'', ''Stakeholder Engagement'', ''Risk Assessment & Mitigation'', ''Cross‑Disciplinary Team Coordination'', ''Resource Allocation'',
    ''Data‑Driven Decision Making'', ''Bilingual Communication (Spanish/English)'', ''Facilitation of Artistic & Cultural Projects'']'
  hobbies: '[''Street art exploration'', ''Film photography'', ''Sketching and digital illustration'', ''Reading contemporary Puerto Rican literature'', ''Mindfulness meditation'', ''Cooking traditional
    Puerto Rican cuisine with modern twists'', ''Hiking in El Yunque foothills'', ''Attending intimate bomba and plena concerts'', ''Participating in small‑group community storytelling workshops'']'
  career_goals: Nydia aims to become a senior project leader who spearheads innovative cultural initiatives across Puerto Rico and the broader Caribbean. She aspires to launch her own consultancy that merges
    art, technology, and community development, helping local artists and nonprofits execute high‑visibility projects with sustainable impact. In the next five years, she plans to obtain a PMP certification,
    deepen expertise in digital project tools, and cultivate a boutique team of creative professionals who share her vision for unconventional, socially resonant outcomes. Ultimately, she dreams of influencing
    public policy to support arts‑driven economic revitalization on the island.
