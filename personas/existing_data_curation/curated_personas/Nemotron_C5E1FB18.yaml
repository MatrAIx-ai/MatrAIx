  hobbies: '[''Sketching in city parks'', ''Collecting vintage art books and photography'', ''Reading avant‑garde literature and speculative philosophy'', ''Experimenting with generative art and Python
    scripts'', ''Journaling and essay writing'', ''DIY woodworking'', ''Indoor herb gardening'']'
  career_goals: Carmen aspires to transition her creative pursuits into a sustainable independent practice. She aims to launch an online portfolio and boutique gallery that showcases her experimental artwork
    and curated collections of vintage prints, targeting niche audiences appreciative of avant‑garde aesthetics. By monetizing digital prints, limited‑edition releases, and commissioned pieces, she hopes
    to achieve financial autonomy while preserving the flexibility she values. Long‑term, she envisions authoring a series of essays blending art criticism with philosophical speculation, possibly publishing
    a modestly sized press book. Her ultimate ambition is to create a quiet, private studio space in Philadelphia where she can work uninterrupted and host intimate, invitation‑only viewings for fellow
    art enthusiasts.
