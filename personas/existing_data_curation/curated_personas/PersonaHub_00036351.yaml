persona_description: A Chinese researcher in the field of materials science and engineering, specifically focusing on the development and application of thin-film barium strontium titanate (BST) capacitors
  for high-frequency microwave applications. He has received support from grants from China's National Basic Research Program, the Shanghai Rising-Star Program, and the Hundred Talent Project of the Chinese
  Academy of Sciences. His research has led to the successful creation of ultrathin titanium oxide seed layers that enhance the microwave properties of BST films, paving the way for the realization of high-frequency
  microwave applications using thin-film BST capacitors.
