  career_goals: Although retired, Noheli aims to leave a lasting legacy for her family and community. She plans to write a memoir that documents her family's journey from rural Mexico to Iowa, preserving
    cultural traditions and lessons learned. She hopes to mentor younger Mexican-American youth at the local senior center, teaching cooking, storytelling, and craft techniques. She aspires to curate a
    multigenerational art exhibition that blends traditional Mexican folk art with contemporary pieces created by local students. Additionally, she wants to contribute her oral-history recordings to the
    Johnson County Historical Society and continue learning genealogical tools to map her ancestry. Maintaining her independence and health so she can see these projects through remains a priority.
