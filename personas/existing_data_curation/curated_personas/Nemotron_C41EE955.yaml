personas:
  professional: Noheli Acosta, a retired community organizer and oral historian, channels their bilingual translation expertise, meticulous budgeting talent, and a subtly competitive curiosity into curating
    multigenerational art exhibitions, mentoring local youth in cooking and crafts, and preserving family narratives, while they balance structured planning with an adaptable, open‑minded approach.
  sports: Noheli Acosta enjoys gentle morning walks in the community park, they participate in the senior center’s low‑impact chair yoga class, follow the Iowa Hawkeyes football team and the Des Moines
    baseball club with avid enthusiasm, and belong to a local walking club that meets weekly, embracing a steady yet modest fitness routine.
  arts: Noheli Acosta spends afternoons painting watercolors in the Des Moines Art Center’s studio, they draw inspiration from Frida Kahlo’s self‑portraits, watch classic cinema such as Cantinflas comedies,
    and curate playlists that weave traditional mariachi brass with modern Latin pop icons like Shakira, letting the arts shape their daily rhythm and creative output.
  travel: Noheli Acosta plans trips with detailed itineraries, they favor short, accessible journeys to historic towns like Santa Fe and family visits in Texas, while dreaming of a pilgrimage to the historic
    city of San Miguel de Allende, balancing a love for cultural immersion with the practicalities of mobility, medication schedules, and a cautious travel budget.
  culinary: Noheli Acosta’s kitchen is a fragrant workshop where they craft mole with dried chilies, slow‑cook pozole on Sundays, hand‑roll tamales, and season everything with fresh cilantro, oregano, and
    garden‑grown marigolds, while also experimenting with fusion recipes that blend regional Midwest ingredients with traditional flavors, sharing the results with neighbors during informal potlucks.
  core: Noheli Acosta, a 96‑year‑old archivist‑chef, they channel a competitive curiosity into preserving family stories, crafting intricate Day of the Dead altars, and mentoring youth, while juggling a
    cautious wallet, health worries, and a lifelong love for watercolor sunsets.
background:
  cultural: Noheli was born in a small town in Jalisco, Mexico, and migrated to the United States with her family in the early 1950s, eventually settling in Coralville, Iowa. Her upbringing was steeped
    in Catholic traditions, vibrant festivals, and a strong emphasis on family cohesion. Throughout her life, she has preserved Mexican customs such as Día de los Muertos, quinceañeras, and traditional
    cuisine, while also adapting to Midwestern culture. Her bilingual fluency allows her to bridge generations, and she actively participates in the local Mexican-American community, helping to organize
    cultural celebrations and language workshops. She values the resilience and ingenuity of her heritage, often reflecting on it when sharing stories or cooking. Though she respects her new home, she remains
    skeptical of narratives that overlook immigrant contributions, and she channels that caution into advocacy for accurate representation of Mexican heritage in local history.
