persona_description: A school administrator responsible for managing and maintaining educational buildings, particularly those in a warm climate. This person is responsible for ensuring that the buildings
  are comfortable for students, staff, and visitors, while also meeting the energy efficiency and thermal comfort standards set by the Building Regulations. This person must be familiar with the principles
  of passive and active thermal comfort, as well as the use of ventilation systems and thermal mass management. They must also be able to work with architects, engineers, and contractors to ensure that
  the buildings meet the required standards and guidelines.
