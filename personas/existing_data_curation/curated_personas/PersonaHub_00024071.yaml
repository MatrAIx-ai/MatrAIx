persona_description: A scientist who specializes in the study of ecosystems and their health, particularly in marine environments. This person is interested in the assessment of ecosystem integrity and
  the impacts of human activities on the sanctuary's resources. They are knowledgeable about the ecosystem's structure, function, and variability, and have experience in using the best available science
  and most recent data to evaluate the status and trends of the sanctuary's ecosystem. This person is interested in using the sanctuary's data to inform management efforts and focus on the sanctuary's health,
  rather than solely on abundance and diversity of wildlife.
