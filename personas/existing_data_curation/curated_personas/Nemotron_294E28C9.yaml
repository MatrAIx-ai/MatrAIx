personas:
  professional: Lory Sanroman, an experienced New York City shuttle driver, blends defensive driving mastery, a business administration associate's degree, bilingual service, and a deep appreciation for
    contemporary art to provide punctual, culturally enriched rides while they plot the launch of a boutique chauffeuring company that curates small-group art and culinary tours.
  sports: Lory Sanroman, a fan of the New York Knicks and New York Rangers, they participate in early-morning yoga at a downtown studio, join the Queens Bridge Running Club for weekend jogs, and enjoy occasional
    pickleball matches at a community center, balancing low-impact exercise with a modest enthusiasm for local sports teams.
  arts: Lory Sanroman, an avid visitor of MoMA, the Whitney, and neighborhood murals, they capture street scenes with a vintage Leica camera, draw inspiration from artists like Ai Weiwei, Jeff Koons, and
    Frida Kahlo, and listen to Colombian folk legends such as Carlos Vives and Juanes while discussing exhibitions with fellow art enthusiasts in intimate discussion groups.
  travel: Lory Sanroman, who plans trips with detailed itineraries, they prefer cultural immersion over luxury, have explored Cartagena and Medellin during past visits, dream of strolling the streets of
    Barcelona and the markets of Oaxaca, and balance travel cravings with a limited budget by selecting off-season flights and staying in boutique B&Bs.
  culinary: Lory Sanroman, an intermediate home cook, they lovingly prepare arepas de queso, beef empanadas, and sancocho, season dishes with fresh cilantro, oregano, and a pinch of cumin from their balcony
    herb garden, and enjoy occasional dinner outings at authentic Latin eateries like La Casa del Mojito, while occasionally over-salting recipes in pursuit of bold flavor.
  core: Lory Sanroman blends a disciplined shuttle-driving career with a passionate, art-centric lifestyle, they sprinkle Colombian cultural flavors into every ride, budget, and hobby, yet they occasionally
    overcommit to projects and forget medication doses.
background:
  cultural: Lory was raised in a Colombian immigrant household in Queens, where Spanish was spoken at home and Colombian traditions such as celebrating Carnaval de Barranquilla, Semana Santa, and Independence
    Day were observed. She maintains strong ties to the local Colombian community through church gatherings, cultural festivals, and family-oriented cooking events, often serving as a cultural bridge for
    English-speaking acquaintances. Bilingual in English and Spanish, she blends the warmth, music, and culinary heritage of Colombia with the independent, professional ethos of American life, embodying
    a bicultural identity shaped by the vibrant multicultural environment of Rego Park and the broader Queens borough.
attributes:
  skills: '[''Defensive driving'', ''Route planning with real-time traffic management'', ''Vehicle maintenance basics'', ''Customer service and client confidentiality'', ''Bilingual communication (English/Spanish)'',
    ''First aid/CPR certification'', ''Knowledge of NYC art and cultural venues'', ''Schedule coordination and time management'', ''Conflict de-escalation and assertive communication'', ''Basic bookkeeping
    and invoicing for self-employment'', ''Proficient use of GPS and ride-hailing platforms'', ''Appreciation of diverse artistic experiences to enhance passenger journeys'']'
  hobbies: '[''Visiting museums and contemporary galleries'', ''Photography of cityscapes and street life'', ''Cooking traditional Colombian dishes'', ''Dancing cumbia and salsa at community events'', ''Reading
    historical fiction and travel memoirs'', ''Practicing yoga for mindfulness'', ''Maintaining a balcony herb garden'', ''Participating in small book clubs or art discussion groups'']'
  career_goals: Lory aspires to evolve from individual shuttle driving to establishing a boutique chauffeuring business that offers curated cultural tours for small groups, highlighting Manhattan's art
    museums, Queens' historic neighborhoods, and authentic Colombian culinary experiences. She plans to obtain a commercial driver's license with a passenger endorsement and pursue additional certification
    in hospitality management, positioning herself as both a driver and a cultural concierge. In the medium term, she aims to lead a team of trusted drivers, mentor newcomers, and create a reputation for
    personalized, art-focused itineraries that blend professional reliability with the warmth of her Colombian heritage.
