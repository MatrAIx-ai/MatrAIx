  career_goals: John's primary ambition is to leave a lasting legacy of creativity and community service. He hopes to complete a memoir that weaves together his life experiences with reflections on art,
    nature, and the passage of time, and to publish a small collection of short stories that explore abstract concepts. He aspires to organize a community art exhibition at the Reno Art Museum that showcases
    works by senior artists, fostering inter‑generational dialogue. Additionally, John wishes to mentor younger volunteers at the senior center, sharing his organizational know‑how and passion for lifelong
    learning. Maintaining his health and staying intellectually active are central goals, prompting him to enroll in local university lectures on philosophy and astronomy.
