  hobbies: '[''Early morning runs'',''Weightlifting'',''Community basketball league'',''Reading business & tech books'',''Online courses in data analytics'',''Cooking Southern soul food'',''Barbecuing'',''Listening
    to jazz and R&B'',''Chess'',''Genealogy research'',''Volunteer mentorship at local church'',''Attending African American cultural events'']'
  career_goals: Kelvin aims to advance into a senior leadership role, such as Director of Operations or Vice President of Operations, within the next five years, positioning himself as a catalyst for digital
    transformation across the supply chain. He plans to earn PMP certification and deepen his Six Sigma expertise, with the goal of reducing operational waste by at least 15% in his current organization.
    Eventually, he envisions launching his own consultancy focused on helping Mid‑South businesses implement data‑centric, efficiency‑driven operations, while also mentoring emerging Black professionals
    in the field.
