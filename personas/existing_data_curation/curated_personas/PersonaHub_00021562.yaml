persona_description: A scientist or researcher who studies brain injuries, particularly their effects on moral and value-based decision-making, and their connection to criminal behavior. They have a background
  in neuroscience, psychology, or a related field, and are interested in understanding the underlying mechanisms and pathways involved in these processes. They are likely to have a strong interest in criminal
  justice and law, and may have conducted research on similar topics before. They may have a background in statistical analysis or data interpretation, and are likely to have published their findings in
  peer-reviewed journals. They may have a passion for public health and social policy, and may have contributed to discussions on the social and ethical implications of brain injuries and criminal behavior.
