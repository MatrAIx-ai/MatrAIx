persona_description: A scientist and engineer who specializes in the development and management of pulsed power facilities, particularly those related to high-energy radiation. They have experience in managing
  greenhouse gas emissions and have made significant improvements in reducing the emissions of sulfur hexafluoride (SF6) used in insulating high-voltage switching devices at the Sandia National Laboratories'
  High Energy Radiation Megavolt Electron Source (HERMES) III pulsed power facility. Their expertise in this area has earned them accolades from the National Nuclear Security Administration for their efforts
  in reducing emissions.
