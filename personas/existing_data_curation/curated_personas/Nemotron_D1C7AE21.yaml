personas:
  professional: Susan Marshall, an experienced museum front‑line specialist, blends her calm empathy, crowd‑flow intuition, and basic audio‑visual troubleshooting to keep patrons safe and satisfied while
    eyeing a supervisory role that will let her mentor new staff and craft inclusive experiences.
  sports: Susan Marshall enjoys low‑impact fitness by joining a local walking club that meets at the Milwaukee lakefront, cheering the Milwaukee Brewers during summer games and the Milwaukee Bucks in basketball
    season, and occasionally participating in community yoga classes to keep flexible.
  arts: Susan Marshall immerses herself in Milwaukee’s cultural life, frequenting the Milwaukee Art Museum to admire works by Georgia O'Keeffe, attending live performances by local jazz ensembles such as
    the John Kessler Trio at the Pabst Theater, and channeling her creativity through watercolor paintings of lake scenes and quilting inspired by folk artist Faith Ringgold.
  travel: Susan Marshall prefers leisurely weekend getaways, having explored Door County’s historic lighthouses, the Apostle Islands’ sea caves, and a memorable art‑focused trip to Florence, Italy, while
    balancing her travel plans around a modest budget and a desire for low‑stress itineraries.
  culinary: Susan Marshall delights in cooking farm‑to‑table meals, often preparing roasted beet and goat cheese salad, pan‑seared Lake Superior trout with fresh dill, and vegetable soups flavored with
    rosemary and thyme harvested from her own garden, while occasionally treating herself to a classic Wisconsin cheese‑curd platter at local eateries.
  core: Susan Marshall is a calm, curiosity‑driven senior who weaves science and art into community service, favors flexible routines, and balances modest financial prudence with occasional creative indulgences.
background:
  cultural: Susan grew up in a multigenerational, middle‑class family in Milwaukee. Her ancestry is primarily German and Polish, reflecting the city’s historic immigrant roots. She was raised in a community‑oriented
    environment that prized modesty, reliability, and friendliness—values that continue to shape her interpersonal style. Family gatherings often centered around traditional foods, seasonal celebrations
    such as German Fest and Summerfest, and local breweries, giving her a strong sense of the city’s cultural tapestry. Her education at public schools and a later STEM degree at the University of Wisconsin-Milwaukee
    reinforced a pragmatic yet curious outlook, while her lifelong involvement in local arts and volunteer activities reflects the Midwestern tradition of civic engagement and support for community institutions.
attributes:
  skills: '["Customer service", "Ticket scanning and POS operation", "Crowd management", "Conflict de-escalation", "Basic audio-visual troubleshooting", "First aid/CPR", "Accessibility assistance", "Knowledge
    of local arts and cultural venues", "Science communication", "Improvisational problem-solving"]'
  hobbies: '["Visiting art museums and galleries", "Attending live theater and music performances", "Reading popular science books and magazines", "Listening to art, philosophy, and science podcasts", "Walking
    the Milwaukee lakefront and city parks", "Tending a vegetable garden", "Watercolor painting", "Quilting and other DIY crafts", "Volunteering as a docent at the Milwaukee Public Museum", "Organizing
    neighborhood art walks"]'
  career_goals: Susan hopes to leverage her decades of front‑line experience to move into a supervisory or training role within the venue, where she can mentor new staff and design more inclusive, accessible
    visitor experiences. She is interested in earning a certificate in museum education or community arts coordination, and envisions volunteering as a docent at the Milwaukee Public Museum. Long‑term,
    she would like to curate a small series of talks that blend science and art for senior citizens, combining her STEM background with her love of the arts, while maintaining a flexible schedule that respects
    her desire for balance and low‑stress work.
