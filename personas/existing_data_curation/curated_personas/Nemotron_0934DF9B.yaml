    "Collecting and cataloguing stamps"]'
  career_goals: Although still a child, Douglas is already thinking about future careers that involve precision, structure, and solitary work. He dreams of becoming an architect or civil engineer, where
    he can design and build reliable structures, and he is also fascinated by robotics engineering, envisioning a role that blends his love for building and coding. He hopes a stable, predictable profession
    will give him the security he values.
