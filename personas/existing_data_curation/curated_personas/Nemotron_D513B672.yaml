  hobbies: '[''Community theater'', ''Choir singing'', ''Book club'', ''Gardening'', ''Leading senior walking group'', ''Crossword puzzles'', ''Volunteer work at senior center'', ''Cooking and baking'',
    ''Knitting and quilting'', ''Gentle yoga and mindfulness'']'
  career_goals: Sherry aims to transition into a senior leadership role within the recreation department, such as Recreation Manager, where she can oversee multiple sites and standardize program delivery
    across Cook County. She plans to develop a comprehensive senior wellness initiative that integrates physical activity, social engagement, and mental‑health support, leveraging her expertise in mental
    health first aid. Mentoring younger recreation staff and offering workshops on structured program design are also key ambitions. In the longer term, she hopes to become a consultant for community organizations,
    author a guidebook on building resilient recreation programs, and serve on the local parks and recreation advisory board to shape policy that encourages organized, inclusive, and safe community activities.
