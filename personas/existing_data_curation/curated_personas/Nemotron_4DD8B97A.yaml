  hobbies: '[''Watercolor painting'', ''Attending art workshops'', ''Visiting museums and historic sites'', ''Gardening native plants'', ''Birdwatching'', ''Hiking at Pinnacle Mountain'', ''Knitting'',
    ''Baking Southern desserts'', ''Volunteering at community arts center'', ''Participating in neighborhood theater troupe'', ''Recycling metal and plastic into art projects'']'
  career_goals: Merida aims to advance into a production supervisor or lead trainer role where she can implement sustainable manufacturing practices and mentor the next generation of skilled workers, especially
    women entering the trades. She plans to earn a Certified Welder credential and a Six Sigma Green Belt to deepen her expertise in process improvement. Parallel to her technical career, she dreams of
    launching a small boutique that sells handcrafted metal and recycled‑plastic art pieces, merging her craftsmanship with her love for unconventional creativity. Continuing education in industrial design
    or fine arts is also a goal, as is cultivating a work‑life balance that supports her mental well‑being.
