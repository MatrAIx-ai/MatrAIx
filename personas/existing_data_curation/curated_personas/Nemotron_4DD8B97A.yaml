personas:
  professional: Merida Galvis, a veteran CNC machinist and certified welder, applies her methodical planning and curiosity for sustainable processes to drive lean production improvements while they mentor
    and empower junior team members.
  sports: Merida Galvis enjoys early‑morning hikes on Pinnacle Mountain, follows the Arkansas Razorbacks football and baseball teams, participates in a senior bowling league with the Little Rock Rangers,
    and maintains a disciplined walking routine to stay fit, though they occasionally skip workouts when anxiety spikes.
  arts: Merida Galvis channels her curiosity into watercolor paintings inspired by Alvaro Castagnet’s vivid palettes, volunteers at the Little Rock Arts Center, performs in a community theater troupe staging
    classic Southern dramas, and collects folk art by regional artisans such as Susan Wilson, while they sometimes hoard paint tubes and scrap metal for future projects.
  travel: Merida Galvis prefers leisurely road trips that include stops at historic sites along the Natchez Trace Parkway, weekend escapes to the Great Smoky Mountains, and occasional overseas journeys
    to Florence, Italy, balancing their love for cultural immersion with a modest travel budget, and they often schedule extra rest days to accommodate health considerations.
  culinary: Merida Galvis delights in baking buttery pecan pie and hummingbird cake, perfects Southern biscuits with fresh buttermilk, experiments with garden‑harvested rosemary and native greens in salads,
    and occasionally treats themselves to sushi rolls featuring avocado and pickled ginger, though they have a habit of over‑seasoning dishes when anxious.
  core: Merida Galvis is a meticulous metal‑fabrication veteran turned watercolor hobbyist who balances disciplined schedules with bouts of anxiety that fuel both a compulsive collection of art supplies
    and an unwavering commitment to mentoring the next generation of tradeswomen, and they never miss a chance to share a freshly baked treat.
background:
  cultural: Merida is a white Southern American who grew up in Arkansas, raised in a family with deep roots in manufacturing and a respect for hard work. The region’s traditions of Southern hospitality,
    community involvement, and appreciation for local crafts have shaped her values. She takes pride in regional customs such as celebrating Arkansas Arts Festival and Riverfest, while also embracing the
    diverse cultural offerings of Little Rock’s museums and galleries. Her background blends a respect for Southern heritage with an openness to new ideas, reflecting both her stable upbringing and her
    lifelong curiosity.
attributes:
  skills: '[''CNC machining'', ''MIG/TIG welding'', ''Plastic injection molding'', ''Blueprint reading'', ''Quality control inspection'', ''Equipment maintenance'', ''Lean manufacturing'', ''OSHA safety
