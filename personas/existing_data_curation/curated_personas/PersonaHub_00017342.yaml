persona_description: A scientist who specializes in climate change research, holds a PhD in geological research and the history of science, and has conducted a survey to assess the views of 3000 earth scientists
  on the topic. The scientist is known for analyzing 928 abstracts from articles published between 1993 and 2003 in refereed scientific journals listed in the ISI Web of Science database with the keywords
  "global climate change" and has found that 82% of scientists believe that human activity is a significant contributing factor in changing mean global temperatures. The scientist is critical of the Oreskes
  survey and the 929th abstract that might well have included a skeptical position, but of those in the sample, they didn't exist, meaning they are very, very rare. The scientist is also aware of the Schulte
  survey and the controversy surrounding it.
