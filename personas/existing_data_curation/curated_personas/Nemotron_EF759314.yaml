  hobbies: '[''gardening'', ''cooking and baking'', ''bird watching'', ''genealogy research'', ''reading historical fiction'', ''knitting'', ''volunteering at senior center'', ''walking'', ''attending community
    theater'']'
  career_goals: Even though Nicole is retired from the formal workforce, she channels her ambition into enriching her community and personal growth. She aims to become the lead coordinator for the intergenerational
    gardening program at the Van Wert senior center, bringing together seniors and school‑age children to share horticultural knowledge. Nicole also hopes to compile an oral‑history collection of longtime
    Van Wert residents, digitizing recordings for the county historical society. She plans to sharpen her digital photography skills to document her garden, family milestones, and local events, and eventually
    create a small photo‑book that will be shared at community gatherings. On a personal level, Nicole aspires to maintain her health through regular walking, gentle yoga for seniors, and to complete a
    heritage trip to her ancestors’ village in Germany, deepening her connection to family roots.
