  career_goals: Maximus wants to turn his compassion and practical skill set into a formal role that supports his community. He aims to become a certified community health worker or peer‑support specialist,
    planning to earn a short‑term mental‑health first‑aid certification and pursue a community‑service credential. Additionally, he dreams of launching a small nonprofit that offers flexible volunteer opportunities
    for people with varied schedules, allowing him to stay socially active while maintaining a low‑stress, adaptable work structure.
