  hobbies: '[''Visiting art galleries and museums'', ''Community theater participation'', ''Senior travel club outings'', ''Gardening'', ''Quilting'', ''Cooking classes (multicultural cuisine)'', ''Volunteer
    reading program at the public library'']'
  career_goals: Jane aims to transition from cashier duties to a supervisory role that leverages her education expertise, such as becoming a training coordinator for new employees at her retail location.
    She also aspires to volunteer as a docent or program facilitator at the local art museum, designing community art‑education workshops for seniors. In the longer term, she hopes to collaborate with the
    Rochester public school system to develop after‑school art enrichment programs, merging her passion for education and the arts.
