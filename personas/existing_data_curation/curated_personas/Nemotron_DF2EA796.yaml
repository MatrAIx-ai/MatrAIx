personas:
  professional: Jane Neal, a seasoned retail cashier with graduate expertise in adult learning, leverages her methodical reliability and sociable charisma to coordinate employee onboarding, design interactive
    training modules, and curate art‑focused educational workshops for senior staff, positioning herself for a supervisory training coordinator role.
  sports: Jane Neal enjoys low‑impact fitness like weekly yoga at the Rochester Center for Seniors, plays Thursday night pickleball at the Rochester Racquet Club, follows the Rochester Red Wings baseball
    team and the Buffalo Bills with enthusiastic game‑day gatherings, and participates in the local senior walking group that meets at Highland Park each spring.
  arts: Jane Neal, an avid patron of the Detroit Institute of Arts and Rochester’s community theater, finds inspiration in the surrealist works of Frida Kahlo, the jazz stylings of Miles Davis, and the
    folk melodies of Joan Baez, often volunteering backstage while curating informal art‑education tours that blend storytelling with visual analysis.
  travel: Jane Neal prefers organized group tours offered by senior travel clubs, has already explored culturally rich destinations like Santa Fe’s Pueblo art scene, Kyoto’s historic temples, and Florence’s
    Renaissance galleries, and dreams of a future river cruise along the Danube, balancing adventure with the comfort of familiar itineraries.
  culinary: Jane Neal, an enthusiastic home chef, masters multicultural dishes such as miso‑glazed salmon with fresh ginger, Spanish paella featuring saffron and chorizo, and Thai green curry with lemongrass
    and coconut milk, while perfecting her sourdough starter and often swapping recipes at the Rochester Public Library’s cooking class.
  core: Jane Neal blends a curious love for art with methodical organization, turning senior community involvement into vibrant educational experiences, all while juggling a penchant for multilingual cooking,
    modest but strategic finances, and a carefully balanced health routine.
background:
  cultural: Jane is a white Midwestern American with German and Irish ancestry, raised in Michigan. Her upbringing reflects the region's emphasis on community, modesty, and a strong work ethic. Exposure
    to the Detroit Institute of Arts during her youth sparked a lifelong appreciation for visual arts, while the state's public education system shaped her commitment to lifelong learning. She values familial
    ties, neighborly support, and civic involvement, integrating these cultural traits into her personal and professional life.
attributes:
