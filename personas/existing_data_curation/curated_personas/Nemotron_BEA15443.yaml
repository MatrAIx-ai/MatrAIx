  career_goals: Philip aims to transition into a senior executive role such as Chief Financial Officer or Vice President of Finance within a technology‑driven company, where he can lead finance transformation
    initiatives that incorporate AI and advanced analytics. He aspires to champion sustainable finance practices, develop innovative financial products that support creative industries, and mentor the next
    generation of finance professionals. In the long term, he envisions founding a boutique consultancy that advises tech startups and artistic ventures on financial strategy, fostering interdisciplinary
    collaboration and promoting harmony between finance and the arts.
