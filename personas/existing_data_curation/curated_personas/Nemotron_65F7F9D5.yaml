  hobbies: '[''Museum and gallery visits'', ''Gardening (roses, herbs)'', ''Reading historical biographies and mystery novels'', ''Genealogy research'', ''Knitting and quilting'', ''Attending chamber music
    concerts'', ''Community theater outings'', ''Day trips to New England art fairs'', ''Gentle yoga for seniors'', ''Reflective journaling'']'
  career_goals: Although retired from formal employment, Mary Ann aims to deepen her impact on the local arts and senior community. She aspires to launch a small intergenerational art program at the Cos Cob
    community center, where seniors mentor youth in painting and crafts. She also hopes to complete a series of oral‑history recordings of longtime Fairfield County residents, preserving their stories for
    the town's archives. Continuing her personal education, Mary plans to enroll in a university‑offered art‑history course on modern American painters, and to attend workshops on digital storytelling to
    share her curated content online. A personal ambition is to maintain her emotional well‑being through regular therapy groups and to model healthy coping strategies for peers facing anxiety and depression.
