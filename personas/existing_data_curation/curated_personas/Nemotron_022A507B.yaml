  hobbies: '[''Watercolor painting'', ''Lake photography'', ''Visiting art museums'', ''Book club participation'', ''Hosting themed dinner parties'', ''Organizing community potlucks'', ''Gardening native
    perennials'', ''Yoga practice'', ''Journaling'', ''Volunteering at the library'']'
  career_goals: Pauline aims to re‑enter the workforce by first completing her GED and obtaining a certification in community development or arts administration. Her long‑term ambition is to secure a full‑time
    role as a community outreach coordinator or program manager at the Marblehead Cultural Center, where she can blend her organizational talent with her love for the arts. She also dreams of launching
    a small boutique gallery‑café on the lakefront, showcasing local artists and hosting interactive workshops, providing both a creative outlet and a modest income stream. Personal growth, financial stability,
    and a sense of purposeful contribution to her lakeside community drive her career aspirations.
