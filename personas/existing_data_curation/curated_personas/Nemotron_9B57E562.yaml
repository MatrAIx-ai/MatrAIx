  hobbies: '[''Preparing traditional Mexican dishes for gatherings'', ''Walking along Monterey Bay shoreline'', ''Participating in senior center dance classes'', ''Gardening'', ''Knitting blankets for charity'',
    ''Reading historical novels about Mexican heritage'', ''Listening to boleros and mariachi music'', ''Volunteering with a local mariachi group'']'
  career_goals: Although retired, Elizabeth continues to set personal goals that center on preserving her cultural heritage and enriching her community. She aims to compile a family-recipe cookbook that
    she will donate to the local library, expand the Mexican Cultural Center's outreach programs for seniors, mentor bilingual youth in storytelling and cooking, and learn advanced digital tools to create
    short video documentaries of her family's history. She also hopes to serve as an informal advisor to the Monterey senior center, helping design health-promoting activities, and to maintain a vibrant
    social calendar that keeps her connected with friends and family.
