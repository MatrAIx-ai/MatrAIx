personas:
  professional: Jamia Walters, a diligent 15‑year‑old high‑school student and vice‑president of the debate club, channels their routine‑oriented mindset into methodical research, persuasive argumentation,
    and a budding interest in engineering, blending meticulous planning with confident public speaking to excel academically.
  sports: Jamia Walters, an avid weekend basketball player, competes in the local community center’s co‑ed league, follows the Memphis Grizzlies in the NBA, and adheres to a disciplined training schedule
    that mirrors their love for routine, while their competitive edge occasionally fuels spirited rivalries on the court.
  arts: Jamia Walters showcases artistic flair by singing in the church youth choir, curating playlists featuring H.E.R., Kendrick Lamar, Alicia Keys, and classic R&B, and occasionally writing heartfelt
    journal entries inspired by lyrical storytelling, reflecting a blend of structured reflection and soulful spontaneity.
  travel: Jamia Walters prefers meticulously planned family road trips to historic sites like Washington, D.C., and nature retreats such as the Great Smoky Mountains, balancing a desire for adventure with
    comfort in familiar settings, while dreaming of a future cultural immersion in New Orleans’ music scene.
  culinary: Jamia Walters, an aspiring home cook, perfects cherished family dishes like fried chicken, collard greens, buttery cornbread, and creamy mac and cheese every weekend, experimenting with spice
    blends while proudly serving sweet tea alongside, demonstrating a love for comforting flavors and a methodical approach to mastering classic Southern‑style cuisine.
  core: Jamia Walters is a routine‑driven teen who blends methodical planning with a competitive spirit, thriving on debate, basketball, soulful music, and family‑rooted cooking, all while navigating occasional
    procrastination and health hiccups typical of high‑school life.
background:
  cultural: Jamia is a Black teenager raised in Houston’s vibrant African‑American community. Her family’s roots trace back to the Southern diaspora, and she grew up immersed in traditions of Southern‑style
    soul food, gospel music, and church gatherings that emphasize communal support and resilience. The multicultural fabric of Houston, with its rich blend of Caribbean, African, and Texan influences, informs
    her appreciation for diverse music, food, and celebrations. Her parents emphasize education as a pathway to stability, and they encourage involvement in community service, especially through the local
    church’s youth programs. While she values the practical, down‑to‑earth outlook that has guided her family’s generations, she also draws strength from the broader Black cultural emphasis on perseverance,
    mentorship, and collective uplift.
attributes:
