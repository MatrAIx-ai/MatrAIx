  hobbies: '[''Reading contemporary fiction'', ''Science & engineering nonfiction'', ''Journaling'', ''Cooking family recipes'', ''Debate club participation'', ''Basketball at community center'', ''Listening
    to R&B and hip‑hop music'', ''Church youth choir singing'', ''Digital planner organization'', ''Participating in local STEM outreach'']'
  career_goals: Jamia aspires to become a civil engineer, focusing on resilient infrastructure projects that protect Houston’s neighborhoods from flooding and improve public transportation. She plans to
    secure a scholarship to a university with a strong engineering program, leveraging her disciplined work ethic and strong math background. In the short term, she aims to maintain high grades in STEM
    subjects, participate in a local engineering summer camp, and seek mentorship or an internship with a Houston engineering firm. She also envisions volunteering with a youth STEM outreach program in
    her community, combining her desire for practical impact with a commitment to helping others succeed.
