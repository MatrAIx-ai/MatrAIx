  career_goals: Although retired, Harry aims to remain a central figure in his community by mentoring younger volunteers at the local senior center and preserving Brookhaven’s history through a volunteer-led
    archive. He hopes to complete a memoir that intertwines his family genealogy with the town’s evolution, and to organize an annual intergenerational storytelling night that fosters connection between
    seniors and youth. He also aspires to continue learning—especially in digital tools—to stay socially engaged and support his grandchildren’s education.
