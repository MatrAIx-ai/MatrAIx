  career_goals: Evelyn aims to elevate her company into a market leader by expanding its product portfolio and entering new regional markets within the next five years. She is committed to embedding ESG
    (environmental, social, governance) principles into the core strategy, positioning the firm as a model of responsible growth. Additionally, she plans to diversify her leadership experience by securing
    board seats at two nonprofit organizations focused on workforce development and women's entrepreneurship. Long‑term, Evelyn envisions authoring a book on pragmatic innovation in corporate settings and
    eventually transitioning to a senior advisory role where she can mentor the next generation of CEOs.
