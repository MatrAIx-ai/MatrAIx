  career_goals: Although officially retired, Brandon’s ambition is to leave a lasting contribution to his community. He aims to complete a handwritten memoir that weaves together his family’s Irish‑Portuguese
    heritage with the industrial history of Cleveland, and to donate a collection of recorded oral histories from his senior‑center peers to the local historical society. He also hopes to launch a mentorship
    program that pairs senior volunteers with young artists, fostering inter‑generational creativity. Maintaining his health so he can continue participating in museum tours and community events is a personal
    goal, as is learning advanced digital editing to preserve his photography of local murals.
