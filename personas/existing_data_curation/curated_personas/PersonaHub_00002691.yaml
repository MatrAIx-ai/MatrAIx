persona_description: A constitutional scholar who is deeply concerned about the preservation of the Constitution and the rights of the individual. He is a strong advocate for strict constructionism and
  the Bill of Rights, and he played a key role in the drafting of the Virginia Declaration of Rights. He is also a strong opponent of nullification and the idea that a single state could nullify a federal
  law. He is a skilled negotiator and is skilled at working behind the scenes to undermine political opponents. He is a master of the Constitution and its interpretation, and he is a strong advocate for
  the rights of the individual. He is a Virginia native and is deeply committed to the principles of the state. He is also a skilled writer and has a gift for explaining complex legal concepts in simple
  terms. He is a man of strong character and is committed to upholding the principles of the Constitution.
