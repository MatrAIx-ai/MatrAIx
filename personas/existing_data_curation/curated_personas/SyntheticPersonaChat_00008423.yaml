    User 1: So, what do you do for fun?

    User 2: I like to go to the movies, hang out with my friends, and play video games.

    User 1: Me too! I love going to the movies. What''s your favorite movie?

    User 2: I don''t know if I have a favorite movie, but I really like the Lord of the Rings trilogy.

    User 1: Me too! That''s a great series. I''m excited for the new one.

    User 2: Me too! I''m hoping it''s good.

