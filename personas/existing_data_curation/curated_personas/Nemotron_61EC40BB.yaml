  career_goals: Tuong Thi aims to transition from contract work to owning a boutique painting studio that offers both high‑quality finishing services and artistic mural commissions for local businesses,
    schools, and community centers. She dreams of securing a grant to develop a neighborhood mural program that engages youth in public art, allowing her to mentor aspiring artists while preserving cultural
    narratives. Long‑term, she hopes to host workshops on decorative painting techniques and to curate a small gallery space where Southeast Asian‑inspired artworks can be exhibited alongside Texan folk
    art, establishing herself as a cultural bridge in the Pearland area.
