personas:
  professional: Tuong Nguyen is a seasoned painter and paperhanger with over thirty years of hands‑on experience, blending meticulous surface preparation with a vivid artistic eye, and leverages their spontaneous,
    people‑focused approach to build client rapport while pursuing the launch of a boutique studio that marries high‑quality finishing services with commissioned murals.
  sports: Tuong Nguyen enjoys cheering on the Houston Astros and Rockets, participates in a local senior softball league with the Pearland Softball Association, and keeps fit through weekend hikes in Sam
    Houston National Forest, favoring low‑impact activities over intense competition.
  arts: Tuong Nguyen frequents the Museum of Fine Arts, Houston and the Contemporary Arts Museum, draws inspiration from artists like Vincent van Gogh and Banksy, and regularly hosts informal storytelling
    evenings while immersing themselves in live blues and jazz performances by legends such as B.B. King and Miles Davis.
  travel: Tuong Nguyen prefers short, soulful getaways, often traveling to Austin for its music scene, exploring the Texas Hill Country vineyards, and occasionally venturing abroad to Paris for its art
    museums, balancing travel budgets with the desire to gather cultural material for their murals.
  culinary: Tuong Nguyen loves preparing family‑inspired broth‑based noodle soup and fragrant herb‑infused broths alongside Southern staples like gumbo and collard greens, experimenting with cilantro, lemongrass,
    smoked paprika, and rosemary, and takes pride in hosting communal meals that blend comforting flavors.
  core: Tuong Nguyen is a charismatic, art‑driven craftsman who thrives on spontaneous creativity, community interaction, and vibrant color palettes, even when their schedule resembles an improvised masterpiece.
background:
  cultural: Tuong Thi was born in Vietnam and moved to the United States with her family in her early teens, eventually settling in the Greater Houston area where a vibrant Vietnamese community thrives.
    She grew up bilingual, speaking both Vietnamese at home and English in school, which has given her a fluid cultural identity. Traditions such as celebrating Tet, honoring ancestors, and participating
    in local Buddhist festivals remain central to her life, while she also embraces Texan customs like barbecue gatherings and county fairs. This blend of Southeast Asian heritage and Southern American
    lifestyle informs her aesthetic sensibilities—bright, harmonious color palettes and intricate patterns often appear in her murals and personal artwork. Her cultural background also shapes her community-oriented
    outlook, prompting her to give back through art education and neighborhood beautification projects.
