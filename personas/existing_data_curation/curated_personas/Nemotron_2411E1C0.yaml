personas:
  professional: Yeng Soo is an experienced library assistant with decades of cataloging expertise, who integrates their bilingual fluency, love of routine, and spontaneous flair for community events to
    craft a welcoming research hub while eyeing a supervisory role to expand local‑history outreach.
  sports: Yeng Soo is a dedicated amateur angler and fan of the Mississippi Braves, spending early mornings casting on the Yazoo River, joining a local senior softball league each summer, and following
    Ole Miss Rebels basketball on Sundays to maintain low‑key yet consistent fitness.
  arts: Yeng Soo is an avid reader of classic literature and participant in the church choir, reveling in the works of Dickens, the blues of B.B. King, occasional performances of traditional Chinese opera,
    and mahjong evenings that blend strategic play with cultural camaraderie.
  travel: Yeng Soo is a lover of spontaneous getaways, frequently road‑tripping to Natchez for historic tours, exploring the piney woods of Tishomingo State Park, and dreaming of a heritage trip to Beijing
    to trace family genealogy roots, balancing short outings with larger travel aspirations.
  culinary: Yeng Soo is a home chef who melds Chinese family recipes like steamed dumplings with Southern staples such as fried catfish and collard greens, experimenting with ginger‑infused jambalaya and
    using garden herbs like cilantro and basil to craft flavorful fusion dishes for potluck gatherings.
  core: Yeng Soo is a routine‑oriented librarian who seamlessly weaves spontaneous community events, bilingual outreach, and culinary experiments into a lively, habit‑driven life punctuated by occasional
    impulsive indulgences.
background:
  cultural: Yeng is a first-generation American of Chinese descent. His parents emigrated from Taiwan in the 1970s and settled in the Deep South, where Yeng grew up in a bilingual household in Mississippi.
    He was raised with traditional Chinese values—respect for elders, emphasis on family cohesion, and practical approaches to problem-solving—while also absorbing Southern hospitality and community spirit.
    He celebrates Lunar New Year with his family, preparing traditional dishes and sharing red envelopes, and he participates fully in local customs such as Thanksgiving, church gatherings, and community
    festivals. This blend of East Asian heritage and Southern culture shapes his worldview, giving him a unique perspective that he brings to his work and community involvement.
attributes:
  skills: '[''Cataloging'', ''Reference assistance'', ''Interlibrary loan coordination'', ''Customer service'', ''Basic computer troubleshooting'', ''Dewey Decimal System knowledge'', ''Community program
    organization'', ''Bilingual communication (English and Mandarin)'', ''Record management'', ''Event planning for library programs'']'
  hobbies: '[''Reading historical nonfiction and local Mississippi history'', ''Genealogy research'', ''Playing mahjong'', ''Cooking traditional Chinese meals'', ''Community potluck gatherings'', ''Gardening
    herbs and vegetables'', ''Fishing on the Yazoo River'', ''Volunteering at church choir'', ''Spontaneous road trips to nearby towns and state parks'']'
  career_goals: Yeng aims to transition into a supervisory role within the library, focusing on enhancing community outreach and preserving local history. He wants to develop a permanent local-history archive
    that captures oral histories from longtime residents of Bentonia and Yazoo County. He hopes to mentor younger staff and interns, sharing his practical knowledge while encouraging spontaneous, creative
    programming. Over the next three to five years, he plans to secure a stable position that balances his preference for routine with opportunities to organize spontaneous events, such as pop-up reading
    clubs or cultural festivals. After reaching these milestones, he intends to retire while continuing as a volunteer advisor to ensure the library remains a vibrant community hub.
