  career_goals: Frances plans to attend a community college in Twin Falls to earn an associate’s degree in Business Administration with a focus on hospitality and event management. Her short‑term goal is
    to secure an internship at the local convention center, gaining hands‑on experience in organizing community festivals. Long‑term, she aspires to launch her own event‑planning company that specializes
    in family‑friendly gatherings and local cultural celebrations, while also mentoring other young women in her community.
