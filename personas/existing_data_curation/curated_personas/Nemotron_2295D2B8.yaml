personas:
  professional: A budding event coordinator, Frances Henderson leverages their student council leadership, meticulous budgeting skills, and first‑aid certified teamwork to orchestrate campus activities
    with upbeat energy and pragmatic structure, and they always keep a detailed checklist on hand.
  sports: An enthusiastic volleyball player, Frances Henderson competes with the Boise Youth Volleyball Club during the spring, hits the hiking trails in the Idaho mountains for cardio in summer, and follows
    the Boise State Broncos football and Idaho Steelheads hockey teams for weekend inspiration, while they maintain a balanced fitness routine anchored by weekly group volleyball games.
  arts: A music‑savvy guitarist, Frances Henderson riffs along to folk‑rock tunes by The Lumineers, pop anthems from Taylor Swift, and local Boise acts like Nate Morrison, while they also indulge in indie
    film marathons starring Saoirse Ronan and draw inspiration from personal‑development author Brené Brown.
  travel: A budget‑conscious road‑tripper, Frances Henderson maps out weekend getaways to the Boise foothills and nearby Sun Valley before saving for a spring backpacking adventure to Yellowstone and a
    future trip to Lisbon's historic Alfama district, balancing meticulous planning with a love for spontaneous photo stops, and they relish the freedom of the open road.
  culinary: A budding home chef, Frances Henderson whips up crowd‑pleasing baked mac and cheese, flaky blueberry muffins with lemon zest, and seasonal grilled salmon drizzled with honey‑soy glaze, showcasing
    their comfort with fresh herbs like basil and their experimental flair for sweet‑savory pairings, and they love sharing the dishes with friends at weekend potlucks.
  core: Frances Henderson blends meticulous organization with a zest for group fun, juggling spreadsheets, volleyball spikes, and midnight snack raids, all while they occasionally forget to water their
    houseplants during exam weeks.
background:
  cultural: Frances grew up in a middle‑class, white family in Twin Falls, Idaho, where community ties and outdoor activities are central to daily life. Her upbringing emphasized self‑reliance, respect
    for the agricultural roots of the region, and participation in local traditions such as county fairs and 4‑H club events. A modest, faith‑influenced environment encouraged volunteering and civic engagement,
    shaping her practical outlook and strong sense of responsibility.
