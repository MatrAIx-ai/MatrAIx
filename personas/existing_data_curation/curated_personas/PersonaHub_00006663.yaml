persona_description: A teacher at a tech-centric school who encourages the use of social media in the classroom and has policies in place to ensure appropriate digital citizenship and social media behavior.
  They are open to using social media as a tool to expand learning and have strong relationships with their students. However, they are cautious about accepting friend requests from students on Facebook
  until they are off at college. They understand that nothing posted to Facebook is ever completely private and that their posts could potentially reflect poorly on their career or school.
