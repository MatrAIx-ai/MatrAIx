  career_goals: Jamie aims to build a career that moves beyond entry‑level reception work toward senior administrative leadership. In the short term she plans to earn a Certified Administrative Professional
    (CAP) credential and take advanced courses in project coordination and office management. Over the next three to five years she hopes to be promoted to Office Manager or Executive Assistant within a
    healthcare or nonprofit organization in Memphis, where she can apply her methodical approach to improve operational efficiency. Long‑term, Jamie envisions supervising a small administrative team, contributing
    to organizational strategy, and possibly pursuing a bachelor’s degree in Business Administration to broaden her qualifications.
