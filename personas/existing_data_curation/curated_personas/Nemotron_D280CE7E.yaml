personas:
  professional: Alphonso Burton is a seasoned fabricator on the shop floor, blending hands‑on expertise in MIG and TIG welding, CNC routing, and troubleshooting with a mentor’s drive; they often improvise
    solutions on the fly while resisting overly rigid schedules.
  sports: Alphonso Burton dominates pickup basketball games at Curtis Playground on weekends, rooting for the New York Knicks and the Brooklyn Nets while also playing in a local adult league that runs through
    the summer, and they unwind with occasional fishing trips to Great Kills Park where they enjoy early‑morning casts.
  arts: Alphonso Burton grooves to classic R&B legends like Aaliyah and Marvin Gaye as well as contemporary hip‑hop artists such as Nas and Kendrick Lamar, often streaming their tracks while grilling barbecues,
    and they occasionally attend community block parties featuring local jazz quartets and graffiti art showcases.
  travel: Alphonso Burton favors spontaneous weekend getaways, having explored the Outer Banks, enjoyed a fishing charter in the Hamptons, and dreaming of a culinary tour of New Orleans and a tech‑focused
    trip to Osaka, yet they typically plan trips around family obligations and a modest travel budget, opting for drive‑away itineraries over long‑haul flights.
  culinary: Alphonso Burton is a backyard barbecue aficionado who masters smoky pork ribs seasoned with brown‑sugar, paprika, and cayenne, pairs them with grilled corn on the cob and tangy coleslaw, and
    they love tinkering with a custom‑built smoker while swapping seasoning recipes with neighbors at community potlucks.
  core: Alphonso Burton is a pragmatic creator who balances spontaneous hands‑on projects with a deep sense of community, though they often fight deadlines and occasionally splurge on gadgets, all while
    staying grounded by family barbecues and weekend basketball.
background:
  cultural: Alphonso is an African American who grew up on Staten Island, surrounded by the vibrant blend of Black urban culture and the quieter suburban life of Richmond County. His family roots trace
    back to the Southern migration of his grandparents, bringing traditions of soul food, gospel music, and strong church ties. He values the communal spirit of his neighborhood—block parties, neighborhood
    watch groups, and the local church—where he often volunteers to mentor youth in basic trades. His cultural identity is reflected in his love for hip‑hop, his respect for elders, and his commitment to
    supporting his family and community while navigating the broader challenges faced by many Black workers in the trades.
attributes:
  skills: '[ ''MIG welding'', ''TIG welding'', ''metal fabrication'', ''CNC machine operation'', ''blueprint reading'', ''electrical troubleshooting'', ''basic CAD design'', ''quality inspection'', ''team
    mentorship'', ''OSHA safety compliance'' ]'
  hobbies: '[ ''Pickup basketball'', ''Home improvement projects'', ''Community gardening'', ''Fishing at Great Kills Park'', ''DIY electronics repair'', ''Listening to hip‑hop & R&B'', ''Barbecue cooking'',
    ''Attending local festivals'' ]'
  career_goals: Alphonso aims to earn a Certified Welding Inspector (CWI) credential and move into a lead fabricator or foreman role where he can influence workflow without being stuck in overly rigid schedules.
    He wants to hone his CNC programming skills to design and produce custom metalwork for local small businesses. Long‑term, he dreams of opening a modest workshop that blends his curiosity for new fabrication
    techniques with practical, client‑focused projects, allowing him to be his own boss while still providing steady support for his family.
