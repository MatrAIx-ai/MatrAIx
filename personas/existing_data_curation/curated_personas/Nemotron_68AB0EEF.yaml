    competency and empathy'', ''Physical fitness and stamina'', ''Rehabilitation program coordination'', ''Data entry and record management'']'
  hobbies: '[''CrossFit group workouts'', ''Community yoga sessions'', ''Hiking the Chain of Lakes and state parks'', ''Book club focused on history and social issues'', ''Cooking and hosting dinner gatherings'',
    ''Volunteering at a community legal-aid clinic'', ''Listening to true-crime podcasts'', ''Attending live music events'']'
  career_goals: Patricia aims to advance into supervisory roles within the correctional system, targeting a Lieutenant position within the next three years and eventually the role of Facility Captain. She
    plans to pursue a master's degree in Criminal Justice or Public Administration to deepen her understanding of rehabilitation policy. Her long-term ambition is to design and implement evidence-based
    reentry programs that combine her passion for social justice with her operational expertise, ultimately influencing state-wide correctional practices. She also aspires to become a training coordinator,
    using her organized nature to mentor new officers and promote best practices.
