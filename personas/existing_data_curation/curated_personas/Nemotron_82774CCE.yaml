  hobbies: '[''Hiking in the Bighorn Mountains'', ''Landscape photography'', ''Plein-air sketching and painting'', ''Acoustic guitar playing'', ''Reading science-fiction and art-history books'', ''Visiting
    local art galleries and community art events'', ''Camping and wildlife observation'', ''Woodworking small projects'', ''Listening to independent music and travel podcasts'', ''Journaling and meditation'']'
  career_goals: Over the next several years Charles aims to translate his hands‑on delivery experience into a broader logistics career. He plans to enroll in a community‑college program or online certification
    in supply‑chain management, which will equip him with the analytical tools needed for route optimization, inventory control, and team coordination. His immediate goal is to secure a supervisory or dispatch
    role within his current courier firm, where he can mentor newer drivers and improve operational efficiency. Looking further ahead he dreams of launching a modest community‑focused delivery service that
    emphasizes eco‑friendly transport such as electric bikes or small cargo vans and offers flexible options for the many remote households and small businesses of Big Horn County. Throughout this progression
    he intends to maintain a balanced schedule that leaves ample time for his artistic interests, using his creative eye to shape the branding and visual storytelling of his future venture.
