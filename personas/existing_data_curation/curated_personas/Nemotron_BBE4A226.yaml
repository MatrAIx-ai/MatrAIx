  hobbies: '[''Reading science‑fiction and graphic novels'', ''Exploring Everglades wetlands (bird‑watching, photography)'', ''Strategic video gaming and chess'', ''Robotics club projects'', ''Bilingual
    blogging (school, recipes, environment)'', ''Sketching manga characters'', ''Curating music playlists (bomba, reggaetón)'']'
  career_goals: Rosario dreams of attending a specialized STEM high school and eventually pursuing a career as a biomedical engineer focused on creating affordable health‑monitoring devices for underserved
    Latino communities. She is motivated by the practical impact such technology could have on families like her own, and she hopes to combine her coding skills, scientific curiosity, and cultural insight
    to design solutions that bridge language barriers and improve community health outcomes. In the long term, she aspires to lead research projects that integrate engineering with public health, positioning
    herself as a competitive and innovative professional in the field.
