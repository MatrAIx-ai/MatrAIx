personas:
  professional: Rosario Saez, a budding technologist who thrives in their robotics club, blends curiosity with practicality by designing simple machines, channels analytical thinking from strategy games
    like Civilization and chess into meticulous project planning, prefers close‑knit teamwork over large crowds, and they consistently balance organization with flexible problem solving.
  sports: Rosario Saez, an avid participant in the Homestead Hurricanes U12 soccer team and a member of the local swim squad, follows the Miami Heat and Miami Dolphins closely, spends weekends bird‑watching
    in the Everglades for cardio, and they combine competitive drive with a preference for small‑group practice sessions over large team drills.
  arts: Rosario Saez, who sketches manga characters inspired by Osamu Tezuka and Makoto Shinkai, curates playlists that blend bomba drums with Bad Bunny’s reggaetón, binge‑watches anime such as My Hero
    Academia, and they find artistic identity in the theatrical flair of Lin‑Manuel Miranda’s Hamilton.
  travel: Rosario Saez, who dreams of returning to San Juan to explore family roots and also loves weekend excursions to the Everglades for bird photography, has visited Orlando’s theme parks and hopes
    to see the museums of Washington, D.C., and they favor a mix of carefully planned itineraries and spontaneous detours, balancing adventure with family budget constraints.
  culinary: Rosario Saez, an enthusiastic home cook who skillfully prepares arroz con gandules, pasteles, and tembleque for family gatherings, experiments with plantain‑based mofongo and coconut‑infused
    desserts, and they relish sharing recipes on their bilingual blog while occasionally burning toast when distracted by a new graphic novel.
  core: Rosario Saez navigates adolescence with competitive curiosity, balancing a love for robotics, manga, and birdwatching while they guard a secret stash of saved allowance for future tech gadgets.
background:
  cultural: Rosario was born to Puerto Rican parents who immigrated to Homestead, Florida, and she grew up in a bilingual household where Spanish and English flow interchangeably. Family gatherings often
    feature traditional dishes like arroz con gandules, pasteles, and tembleque, and celebrations such as Three Kings Day and the Puerto Rican Festival in Miami‑Dade County are central to her cultural identity.
    She regularly hears bomba, plena, and modern reggaetón, which shape her musical tastes. Frequent visits to Puerto Rico during school breaks allow her to connect with extended family, reinforce cultural
    traditions, and maintain fluency in the island’s dialect. The close‑knit Puerto Rican community in Homestead provides a supportive network that values education, resilience, and cultural pride, all
    of which influence Rosario’s daily life and future aspirations.
