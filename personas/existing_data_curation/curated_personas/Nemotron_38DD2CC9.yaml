personas:
  professional: A community historian and volunteer event coordinator, Maegan Gibbs blends meticulous organization with a lifelong curiosity to preserve Greentown’s family narratives, curate library programs,
    and lead garden‑themed fundraisers, all while they mentor younger volunteers with patient kindness.
  sports: A devoted fan of the Indianapolis Colts and Indiana Pacers, Maegan Gibbs enjoys low‑impact activities such as leisurely birdwatching walks, occasional senior bowling league matches at the community
    center, and weekly gentle yoga classes to maintain flexibility, and they relish cheering on the teams during televised games.
  arts: An avid participant in folk‑art workshops, Maegan Gibbs knits intricate blankets while humming Billie Holiday, curates a collection of Grandma Moses prints, and devotes evenings to reading poetry
    by Maya Angelou and listening to Woody Guthrie’s folk melodies, and they often share these creations at local art fairs.
  travel: Preferring well‑planned, short‑duration trips, Maegan Gibbs has explored Indiana’s Brown County State Park, taken a weekend train ride to Chicago’s Art Institute, and dreams of a guided tour of
    the Smithsonian in Washington, D.C., always traveling with family or a trusted companion, and they keep detailed travel journals to capture each adventure.
  culinary: A culinary adventurer who balances classic Midwestern comfort foods like chicken pot pie and fresh cornbread with experimental dishes such as Thai green curry, Maegan Gibbs relishes using heirloom
    tomatoes from her garden to season homemade sauces and frequently preserves jams and pickles for the winter, and they often trade recipes with neighbors at potluck gatherings.
  core: A tireless storyteller and garden‑gazing yarn aficionado, Maegan Gibbs stitches memories into quilts, solves daily crossword puzzles, and occasionally hoards extra skeins of yarn they never use,
    all while they navigate new digital tools with cautious curiosity.
background:
  cultural: Maegan was born and raised in a small Midwestern town in Indiana, part of a white, predominantly Protestant community with deep roots in the region. Her family’s ancestry traces back to early
    19th‑century settlers who moved westward to farm the fertile lands of Miami County. Growing up, she embraced Midwestern values of hospitality, self‑reliance, and community service, attending church
    regularly and participating in local fairs, county picnics, and volunteer groups. Her upbringing emphasized modesty, hard work, and respect for tradition, while also fostering an appreciation for American
    folk art, regional music, and the natural landscape of Indiana. These cultural influences shape her outlook, activities, and her desire to preserve local heritage.
