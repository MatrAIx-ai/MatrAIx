personas:
  professional: Rosa Lee is an industrious 18‑year‑old housekeeper in Jamestown who excels at deep cleaning, inventory management, and training new staff, leveraging a meticulous eye for detail and a cooperative
    yet assertively compassionate approach to client service while pursuing an associate’s degree in hospitality management and dreaming of launching an eco‑friendly cleaning business, and they plan to
    become a supervisor within the next few years.
  sports: Rosa Lee enjoys solitary jogs along the Sheyenne River trail, follows the University of Jamestown Jimmies baseball team, participates in a local recreational soccer league on Saturdays, is a devoted
    fan of the North Dakota State Bison football, cheering from a modest tailgate, and they balance a modest fitness schedule with a busy work calendar.
  arts: Rosa Lee spends evenings curled up with contemporary novels like Sally Rooney’s 'Normal People' and classic works by Jane Austen, knits while listening to folk artists such as The Avett Brothers
    and Iron & Wine, occasionally attends the Jamestown community theatre's production of 'Our Town,' and they find that music and literature shape their reflective, quiet evenings.
  travel: Rosa Lee prefers road‑trip adventures during summer breaks, having explored Theodore Roosevelt National Park and the Badlands of South Dakota, dreams of hiking the Olympic Peninsula’s Hoh Rainforest,
    plans trips on a modest budget, often aligning travel with school holidays and using discount lodging platforms, and they seek new vistas while staying financially grounded.
  culinary: Rosa Lee loves brewing herbal teas with rosemary and mint from their balcony garden, enjoys cooking simple comfort dishes like chicken noodle soup and homemade biscuits seasoned with fresh thyme,
    occasionally bakes a batch of oatmeal raisin cookies to share with friends, and they admit to neglecting meals when a cleaning shift runs late.
  core: Rosa Lee is a detail‑driven teen housekeeper with a love for quiet reading, herb‑filled tea rituals, budget‑savvy habits, and a budding ambition to turn eco‑friendly cleaning into a small business
    while navigating anxiety and a penchant for solitary river walks, and they constantly juggle structure with a desire for flexibility.
background:
  cultural: Rosa Ann was born and raised in Jamestown, North Dakota, a predominantly white, Midwestern community with deep German‑Scandinavian roots. Her grandparents were immigrants from Germany who settled
    on farms in the region in the early 1900s, and her family has retained a strong work ethic, modesty, and a respect for routine that are characteristic of that heritage. The town's close‑knit, volunteer‑oriented
    culture emphasized self‑reliance and community support, shaping Rosa’s practical outlook and cooperative nature. Growing up in a Protestant household, she was taught the value of honesty, humility,
    and helping neighbors, which informs her compassionate yet self‑interested approach to work and relationships.
attributes:
  skills: '[''Residential deep cleaning'', ''Laundry and fabric care'', ''Floor care (vacuuming, mopping, polishing)'', ''Cleaning chemical safety and usage'', ''Inventory and supply management'', ''Client
    communication and service etiquette'', ''Basic maintenance and repairs'', ''Digital scheduling and time management'', ''Budget tracking and expense reporting'', ''Training of junior cleaning staff'']'
  hobbies: '[''Reading contemporary fiction and classic literature'', ''Herb and flower balcony gardening'', ''Knitting and crocheting'', ''Small‑group crafting circles'', ''Solo walks along the Sheyenne
    River trail'', ''Listening to folk and acoustic music'', ''Volunteering at the local animal shelter'']'
  career_goals: Rosa Ann hopes to leverage her hands‑on experience to advance into supervisory roles within the hospitality or property‑management sector. Over the next few years she intends to complete
    her associate's degree in hospitality management, earn the Certified Professional Housekeeper credential, and take on responsibilities such as scheduling staff, overseeing quality control, and managing
    supply budgets. Her longer‑term ambition is to open a small, environmentally‑focused cleaning business serving homes and small businesses in Jamestown, allowing her to set her own schedule while providing
    reliable service to the community. She also aims to develop stronger stress‑management techniques so she can maintain a healthy work‑life balance.
