personas:
  professional: Shaquaila Neal, a senior fiber‑optic telecommunications technician with over thirty years of experience, blends meticulous schematics reading and crew coordination with a passion for mentoring
    young women in the trades, leveraging emerging 5G and IoT knowledge while they maintain an organized yet adaptable work style.
  sports: Shaquaila Neal, a member of the Warner Robins senior walking club, enjoys low‑impact cardio through daily morning walks, plays casual pickleball at the community center, cheerfully follows the
    Atlanta Braves and Atlanta Falcons, and they occasionally join the local senior volleyball league during the summer months.
  arts: Shaquaila Neal, an avid participant at Warner Robins ArtSpace, spends weekends sketching downtown skylines, paints watercolor scenes of the Georgia countryside inspired by Claude Monet, sings soprano
    in the church choir, attends blues performances by the B.B. King Tribute Band and jazz nights featuring Wynton Marsalis when they tour nearby Atlanta, and they quilt intricate blankets that blend traditional
    motifs with contemporary designs.
  travel: Shaquaila Neal, a road‑trip enthusiast, prefers short drives to historic Southern towns such as Savannah, Charleston, and Helen, has toured New Orleans for Mardi Gras, dreams of a scenic railway
    journey through the Canadian Rockies, and they plan trips that balance family commitments with a modest senior travel budget.
  culinary: Shaquaila Neal, a home gardener and kitchen experimenter, loves whipping up heirloom tomato salads with fresh basil and burrata, savors Southern staples like fried catfish with collard greens,
    frequently bakes peach cobbler using garden‑grown peaches, and they occasionally indulge in a spicy Sichuan stir‑fry for variety.
  core: Shaquaila Neal merges a seasoned telecom career with a vibrant artistic and community life, juggling fiber‑optic expertise, quilting motifs, and garden‑fresh meals, all while staying organized,
    sociable, and unapologetically curious about new technology and culture.
background:
  cultural: Shaquaila grew up in a close-knit Black family in the rural South during the civil‑rights era, where church, family gatherings, and community resilience were pillars of daily life. Southern
    hospitality, soul‑food cooking, and the oral storytelling tradition shaped her worldview. Her faith in the Baptist church remains a core component of her identity, providing both spiritual grounding
    and a social network. She embraces African‑American artistic expressions—from gospel music to modern visual art—and actively supports local cultural festivals like the Southern Heritage Celebration
    in Warner Robins. The experience of being a Black woman in a traditionally male-dominated trade has reinforced her commitment to mentorship, advocacy, and the preservation of her cultural heritage.
attributes:
  skills: '[''Cable and Fiber Optic Installation'', ''Splicing and Termination'', ''Network Fault Diagnosis'', ''Electrical Safety (OSHA) Compliance'', ''Reading Blueprints and Schematics'', ''Conduit Bending'',
    ''Use of Hand and Power Tools'', ''Signal Testing and Measurement'', ''Project Planning and Crew Coordination'', ''Apprentice Training and Mentorship'', ''Customer Communication'', ''Adaptation to Emerging
    Telecom Technologies (5G, IoT)'', ''Problem Solving'', ''Organizational Flexibility'']'
  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Church Choir Singing'', ''Quilting'', ''Gardening'', ''STEM Mentorship'', ''Attending Blues/Jazz Concerts'', ''Community Dance Nights'', ''Senior Card
    Club'', ''Reading Tech and Art Journals'', ''Online Webinars on Emerging Technologies'', ''Local Art Exhibitions'']'
  career_goals: Her immediate career goal is to secure a senior technician/lead position within the local telecom provider, where she can oversee larger fiber-to-the-home projects and formalize a mentorship
    program for young Black women entering the trades. She plans to earn a BICSI Installer‑Designer certification and stay abreast of 5G and smart-city infrastructure trends. In the longer term, Shaquaila
    envisions transitioning to a part-time consulting role, offering specialized fiber-optics troubleshooting services to small businesses and schools, while also establishing a community-based STEM outreach
    workshop that introduces high-school students to telecommunications careers.
