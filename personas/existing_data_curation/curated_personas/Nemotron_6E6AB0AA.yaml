  hobbies: '[''Gardening'', ''Birdwatching'', ''Quilting'', ''Knitting'', ''Reading historical fiction'', ''Nature photography'', ''Hiking'', ''Playing bridge'', ''Volunteering with Meals on Wheels'', ''Genealogy
    research'', ''Crossword puzzles'']'
  career_goals: Although retired, Katie aims to deepen her community involvement and create a lasting personal legacy. She plans to expand her garden into a small "seed exchange" that supports neighbors
    and local food banks, compile a family cookbook featuring traditional New England recipes with her own twists, and mentor younger volunteers at the senior center in quilting and gardening. She also
    wishes to learn more about digital photography to preserve the seasonal beauty of Hyde Park and to produce a modest photo‑essay for the town's historical society. Writing a memoir that interweaves her
    family’s Irish‑Italian heritage with stories of the town’s evolution is another long‑term ambition, motivated by her desire to stay mentally active and to avoid isolation.
