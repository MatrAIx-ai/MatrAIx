persona_description: A philosopher who specializes in the study of the nature of reality and the relationship between belief and reality. They are interested in the differences between perception and reality,
  and how the brain generates models of the 'territory' based on what we glimpse through our senses. They believe that scribbling on the map does not change the territory, and that the strategy that normally
  gives most control over reality is one where the 'map' is aligned to match the 'territory' as closely as possible. They are also interested in the impact of beliefs on reality, and how our sense of beauty
  is shaped by the sky being blue. They believe that the sky was not made to fit our sense of beauty, but rather we have a sense of beauty that evolved to fit the sky because the sky happened to be blue!
