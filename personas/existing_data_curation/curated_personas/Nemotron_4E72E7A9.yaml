  hobbies: '["Metal sculpture", "Fishing on the Chattahoochee River", "Woodworking", "Acoustic guitar playing", "Gardening", "Reading science-fiction novels", "Attending local art fairs", "Cooking Southern
    BBQ", "Volunteer community service", "Photography of river landscapes"]'
  career_goals: Mohammed aims to formalize his extensive practical knowledge by obtaining American Welding Society certifications, including Certified Welder and Certified Welding Inspector, and to complete
    a GED to broaden his educational credentials. He aspires to advance into a supervisory role as a shop foreman, where he can shape workflow and mentor younger workers. Simultaneously, he dreams of launching
    a boutique metal‑art studio that offers custom decorative pieces for homes and local businesses, merging his technical expertise with his artistic passions. He also hopes to volunteer as a mentor in
    regional vocational programs to bring his love of craftsmanship and curiosity for new ideas to the next generation.
