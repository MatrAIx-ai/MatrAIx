persona_description: A pediatrician who specializes in the diagnosis and treatment of non-alcoholic fatty liver disease (NAFLD) in children. He is interested in developing non-invasive diagnostic tools
  to identify the presence of liver fibrosis in children with NAFLD. His expertise lies in the use of clinical features and laboratory exams to predict liver fibrosis in children with NAFLD, and he has
  invested his expertise in the field of NAFLD into a new non-invasive diagnostic index, the Pediatric NAFLD Fibrosis Index (PNFI), which uses age, waist circumference, and triglycerides to predict the
  likelihood of fibrosis.
