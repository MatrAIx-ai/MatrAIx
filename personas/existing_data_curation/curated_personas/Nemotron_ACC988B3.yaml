  career_goals: Dana aims to establish her own boutique interior finishing and art studio that blends traditional painting with bespoke decorative paper work. She plans to obtain advanced certifications
    (e.g., NACE Certified Painter), expand her portfolio with large-scale murals for community spaces, and launch a series of workshops teaching both trade skills and creative painting techniques. Over
    the next five years she envisions her studio becoming a respected source for high-quality, artistically driven interior solutions in the Atlanta metro area, while also contributing to local Black arts
    initiatives.
