personas:
  professional: Timothy Ard is a heavy‑vehicle technician who blends meticulous diesel engine expertise with a curiosity for telematics, leveraging a competitive streak and sociable leadership to mentor
    apprentices and drive efficient fleet maintenance in Detroit’s bustling transportation sector.
  sports: Timothy Ard plays midfield for the Motor City Midfielders, lifts at Rack City Gym, competes in iRacing tournaments, and roots for the Detroit Lions and Detroit Red Wings, channeling competitive
    energy into both real‑world and virtual sports while staying fit.
  arts: Timothy Ard expresses creativity by customizing drones to the rhythm of AC/DC’s riffs, curates playlists featuring The White Stripes and Muddy Waters while working on trucks, and visits the Detroit
    Institute of Arts for shows by contemporary street artists, letting music and visual art fuel his hands‑on projects.
  travel: Timothy Ard prefers hands‑on weekend road trips in his restored semi‑tractor, having already driven to Mackinac Island, the Upper Peninsula’s Pictured Rocks, and a rainy Chicago getaway, and now
    dreams of a summer European tour of German and Italian automotive museums while balancing a modest travel budget.
  culinary: Timothy Ard enjoys cooking hearty meals such as smoked brisket glazed with maple‑brown sugar, spicy chicken wings seasoned with cayenne and paprika, and a weekend batch of chili con carne loaded
    with beans and sweet potatoes, often pairing the dishes with a cold craft brew after a day in the shop.
  core: Timothy Ard is a pragmatic tinkerer who fuses competitive drive, sociable teamwork, and skeptical attention to detail into every diesel repair, drone build, and community project, often sacrificing
    sleep for the next hands‑on challenge.
background:
  cultural: Timothy grew up in Hamtramck, Michigan, a historically Polish enclave within the Detroit metropolitan area. He is a third‑generation Polish‑American, raised in a Catholic household where family
    gatherings often featured traditional Polish meals and community festivals. The working‑class ethos of Hamtramck—shaped by generations of auto‑industry laborers—instilled in him a strong sense of responsibility,
    practicality, and pride in skilled trades. While he embraces his heritage, Timothy also values the neighborhood’s multicultural fabric, interacting daily with neighbors from diverse backgrounds and
    participating in local cultural events.
attributes:
  skills: '["Diesel Engine Repair", "Hydraulic Systems Maintenance", "Electronic Diagnostics", "Preventive Maintenance Scheduling", "Safety Compliance (OSHA)", "Fleet Management Software", "Team Training
