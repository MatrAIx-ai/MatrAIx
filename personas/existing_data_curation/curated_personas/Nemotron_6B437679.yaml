  hobbies: '["Semi‑truck restoration", "City soccer league", "Competitive video gaming (racing sims)", "Drone piloting", "DIY electronics projects", "Weightlifting", "Community volunteering at local auto
    shows"]'
  career_goals: Timothy aims to earn ASE Master Technician and EPA Diesel Technician certifications within the next three years, positioning himself for a lead‑technician role at a regional fleet operator.
    He plans to complete the remainder of his associate degree in automotive technology, specialize in telematics integration for connected trucks, and eventually launch his own mobile equipment service
    business serving the Detroit‑Wayne County area. Long‑term, he envisions becoming a trusted advisor for fleet managers on efficiency and emissions compliance.
