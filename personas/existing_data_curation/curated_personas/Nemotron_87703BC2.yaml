  hobbies: '[''Reading historical fiction'', ''Gardening (roses, heirloom vegetables)'', ''Birdwatching'', ''Crocheting and knitting'', ''Cooking homemade meals'', ''Small group Bible study'', ''Local history
    research'', ''Volunteering at the library'', ''Nature walks'', ''Listening to folk and classic rock music'']'
  career_goals: Although retired from formal employment, Rosa aims to deepen her engagement with the community by volunteering as a mentor for youth volunteers at the local historical society and by learning
    digital photography to document community events. She is interested in taking a community‑college class on genealogy to preserve her family’s history, and she hopes to author a memoir that captures
    stories from her generation. Her goals reflect a blend of curiosity and practicality, focusing on lifelong learning and contributing to the cultural continuity of Lapeer.
