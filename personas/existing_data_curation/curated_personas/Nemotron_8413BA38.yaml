  hobbies: '[''Reading (Science Fiction, Popular Science)'', ''Puzzle Solving (Crosswords, Sudoku)'', ''Indoor Plant Care'', ''Journaling'', ''Photography (Landscape)'', ''Coding Personal Projects (Python)'',
    ''Mindfulness Meditation'', ''Solo Hiking on Quiet Trails'', ''Listening to Ambient Music'', ''Following Astronomy News'']'
  career_goals: Azra aims to move from general office support into a data‑focused role, such as a junior data analyst or research data coordinator within a biotech or engineering firm that values clear,
    structured tasks and offers a quiet work environment. Over the next two years she plans to earn certifications in SQL and Tableau, deepen her Python skills, and eventually pursue a master's in applied
    statistics. She wants a position that allows remote or low‑interaction work, giving her space to manage stress while contributing to meaningful projects like clinical trial data management or sustainability
    analytics. Long‑term, she hopes to lead a small team responsible for data quality assurance, combining her technical expertise with her cooperative yet assertive communication style.
