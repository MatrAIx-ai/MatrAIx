personas:
  professional: Azra Rothstein, a data‑focused administrative specialist with a STEM background, leverages strong Excel and Python scripting abilities to streamline lab documentation while quietly excelling
    in independent, detail‑oriented tasks, and their preference for predictable workflows translates into meticulous data quality checks in a biotech setting.
  sports: Azra Rothstein, an occasional solo hiker who prefers quiet Wasatch trails over crowded gyms, follows the Utah Jazz for off‑season stats and entertains the idea of joining a local weekend trail‑running
    club, yet generally keeps fitness low‑intensity with weekly yoga sessions and a seasonal focus on snowshoeing during winter.
  arts: Azra Rothstein, an avid listener of ambient composers like Brian Eno and Tycho, occasionally sketches minimalist digital illustrations inspired by sci‑fi book covers, and enjoys re‑watching classic
    episodes of "Black Mirror" to explore dystopian themes, which subtly informs their creative outlook.
  travel: Azra Rothstein, a methodical planner who prefers off‑peak trips, has solo‑visited Bryce Canyon and Iceland’s Golden Circle for their stark landscapes, and dreams of a remote research retreat in
    the Scottish Highlands, balancing a modest travel budget with a deep yearning for solitude in nature.
  culinary: Azra Rothstein, a modest home cook who favors simple, nutrient‑dense meals, frequently prepares quinoa bowls with roasted sweet potatoes, chickpeas, and tahini drizzle, masters a reliable matcha
    latte, and occasionally treats themselves to a well‑crafted sushi roll at a local Japanese restaurant.
  core: Azra Rothstein, a quietly ambitious data enthusiast who channels worry into meticulous spreadsheets, finds solace in solitary hikes, and occasionally neglects their plant watering schedule in favor
    of late‑night coding marathons.
background:
  cultural: Azra grew up in Provo, Utah, within a predominantly white, middle‑class family that emphasized education, self‑reliance, and modesty. The local culture, shaped by the academic atmosphere of
    BYU and the growing tech scene of Silicon Slopes, fostered her practical, structured outlook and interest in STEM. Community values of politeness, quiet reserve, and appreciation for the outdoors are
    reflected in her preference for solitude and low‑key recreation. While not deeply religious, she absorbed the regional emphasis on hard work, humility, and a balanced lifestyle that blends academic
    ambition with respect for Utah’s natural landscapes.
attributes:
  skills: '[''Microsoft Office Suite'', ''Data Entry'', ''Spreadsheet Analysis (Excel)'', ''Basic Python Programming'', ''Statistical Analysis (R)'', ''Technical Writing'', ''Research Assistance'', ''Project
