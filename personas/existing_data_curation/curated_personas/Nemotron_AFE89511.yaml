personas:
  professional: Hong Huang, a 28‑year‑old Dallas waiter, blends their people‑skills and practical curiosity to build rapport with a diverse clientele, improvises under pressure, leverages bilingual fluency
    to smooth service for both English‑speaking diners and East‑Asian visitors, and they aim to become a shift supervisor soon.
  sports: Hong Huang joins weekly pick‑up basketball games at the local community center, roots for the Dallas Mavericks and Dallas Cowboys, follows the Texas Rangers in baseball season, participates in
    occasional weekend runs with the Dallas Running Club, and they consider joining a recreational volleyball league when time permits.
  arts: Hong Huang unwinds by binge‑watching Studio Ghibli films and K‑drama series like 'Crash Landing on You,' sings karaoke classics from BTS and beloved Mandarin-language hits at local bars, attends
    Dallas cultural festivals where they appreciate live folk performances and street art, and they occasionally create fan‑art sketches inspired by anime characters.
  travel: Hong Huang prefers spontaneous weekend road trips to nearby gems like Austin, New Orleans, and Big Bend National Park, while dreaming of a future culinary pilgrimage to Kyoto and Shanghai once
    savings allow for an overseas adventure, and they often map out itineraries on a coffee‑stained notebook.
  culinary: Hong Huang, an intermediate home chef, experiments with fusion creations such as Sichuan‑spiced brisket tacos, gochujang‑glazed pork belly bao, and honey‑garlic chicken wings seasoned with smoked
    paprika, regularly sampling and critiquing Dallas’s ever‑evolving food‑truck scene for inspiration, and they often host potluck gatherings to share their latest culinary experiments.
  core: Hong Huang, a sociable 28‑year‑old hospitality professional, balances boundless curiosity and a relaxed, sometimes disorganized approach, channeling foodie passion, basketball energy, and nightly
    meditation to temper a persistent worry, and they constantly seek ways to turn their eclectic interests into a future restaurant concept.
background:
  cultural: Hong Yip Huang is of Chinese descent; his parents immigrated to the United States before he was born, and he grew up in a bilingual household in Texas. He celebrates traditional Chinese holidays
    such as Lunar New Year and the Mid‑Autumn Festival, often preparing family‑style meals that feature dishes like dumplings and mooncakes. At the same time, he embraces Texan customs, enjoying barbecue,
    football gatherings, and the state's multicultural fabric. His cultural identity blends respect for collectivist values—emphasizing harmony, courtesy, and family cohesion—with the individualistic, open‑minded
    spirit of his Dallas community. This dual heritage informs his courteous service style, his love of group activities, and his desire to create a culinary space that reflects both his East Asian roots
    and his Texan upbringing.
attributes:
  skills: '["Customer service and rapport building", "Multilingual communication (English, Mandarin)", "Accurate order taking and memory", "Basic mixology and beverage preparation", "Food safety knowledge
