    and K‑dramas", "Multiplayer video gaming", "Mindfulness meditation", "Volunteer work at community events"]'
  career_goals: In the near term, Hong aims to become a shift supervisor, gaining experience in staff scheduling, inventory control, and on‑the‑job training. He plans to enroll in a community‑college hospitality
    certification program to solidify his managerial foundation. Looking further ahead, he envisions earning an associate degree in hospitality management or culinary arts, then stepping into a restaurant
    manager role. His ultimate ambition is to open a small, family‑friendly eatery that blends East Asian flavors with Texas barbecue influences, creating a space where cultural harmony and practical comfort
    intersect. Throughout this journey, he hopes to develop stronger stress‑management skills and a more organized work style to support his leadership responsibilities.
