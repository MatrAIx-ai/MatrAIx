personas:
  professional: A dedicated community program developer, Sarah Vanvoorthuijsen leverages her three decades of volunteer coordination and arts advocacy experience to design inclusive workshops, mediate intergenerational
    conflicts, and mentor emerging volunteers, balancing meticulous planning with the flexibility to adapt to participants’ creative needs, and they always greet each new project with curiosity.
  sports: An avid low‑impact exerciser, Sarah Vanvoorthuijsen walks the Gwynns Falls trail five times a week, participates in the Baltimore County Senior Walkers club, enjoys birdwatching excursions at
    the Patapsco Valley State Park, follows the Baltimore Orioles with quiet enthusiasm, prefers gentle yoga over high‑intensity workouts, and they treat each walk as a mindfulness practice.
  arts: A regular visitor to the Baltimore Museum of Art, Sarah Vanvoorthuijsen delights in Monet’s water lilies, studies the geometric compositions of Mondrian, spends weekends painting delicate watercolors
    of her garden, draws inspiration from biographies of Eleanor Roosevelt and Vincent van Gogh, attends chamber music concerts featuring Bach, enjoys local theater productions starring community actors,
    and they often share insights from these experiences in their senior book club.
  travel: Combining careful itinerary planning with spontaneous curiosity, Sarah Vanvoorthuijsen has toured the Rijksmuseum and Van Gogh Museum during a recent ancestral pilgrimage to the Netherlands, enjoys
    weekend getaways to Shenandoah National Park for hiking and birdwatching, explores historic Charleston, South Carolina for cultural enrichment, and they always keep a sketchbook handy to capture fleeting
    impressions.
  culinary: An enthusiastic home cook, Sarah Vanvoorthuijsen prepares traditional stamppot with kale and smoked sausage and crunchy bitterballen for community potlucks, crafts fresh garden salads featuring
    beets, goat cheese, and basil, bakes a hearty apple crumble in a Dutch oven, and they take pride in sourcing ingredients from the local farmers’ market whenever possible.
  core: Sarah Vanvoorthuijsen blends relentless curiosity with steadfast compassion, leading volunteer art programs, perfecting watercolors, and collecting vintage exhibition catalogs, even as they occasionally
    forget to water their spring bulbs until the last minute.
background:
  cultural: Sarah is of Dutch descent; her great‑grandparents immigrated from the Netherlands to Maryland in the early 20th century. Raised in suburban Baltimore County, she grew up within a family that
    emphasized community service, modesty, and a deep appreciation for the arts—a blend of Mid‑Atlantic American customs and the egalitarian, pragmatic values of her Dutch heritage. This cultural mix has
    shaped her open‑minded worldview, her love of collaborative initiatives, and her respect for both tradition and new ideas.
