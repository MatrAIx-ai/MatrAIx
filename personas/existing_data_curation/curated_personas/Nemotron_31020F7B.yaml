  hobbies: '[''Hiking Torrey Pines trails'', ''Reading science‑fiction and technology books'', ''Cooking Vietnamese cuisine'', ''Strategic board games'', ''Personal coding projects'', ''Landscape photography'',
    ''Yoga'', ''Volunteer tutoring in math and programming'']'
  career_goals: Thieu aims to translate his analytical abilities into a full‑time role as a data analyst or junior software engineer within a tech or biotech firm in San Diego. Over the next year he plans
    to obtain an AWS Cloud Practitioner certification and complete a professional project management course (PMP) to broaden his qualifications. In the medium term he envisions leading small, interdisciplinary
    teams where he can design data‑driven solutions while maintaining structured workflows and high reliability. He also considers launching a freelance consulting practice that offers process‑improvement
    services to local startups, allowing him to leverage his methodical approach and technical expertise on his own terms.
