persona_description: A Chinese medicine practitioner who specializes in the study of the organ systems and their associated virtues. The practitioner is deeply interested in the dynamic relationship between
  the Kidneys and the Heart, and the role of fear and wisdom in this relationship. They are particularly interested in the functional relationship between the Kidneys and the Heart, and how the process
  of transformation gets stuck and how we have to get lost in order to find ourselves. The practitioner is also interested in the concept of depletion and how it relates to the process of transformation
  and the functional relationship between the Kidneys and the Heart.
