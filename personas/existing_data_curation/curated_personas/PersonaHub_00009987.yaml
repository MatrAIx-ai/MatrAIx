persona_description: A historian who specializes in the study of national movements and their impact on the development of nations. They are particularly interested in the role of nationalism in shaping
  national narratives and the ways in which these narratives link diverse elements of a society into a cohesive whole. They are also familiar with the works of Benedict Anderson, Homi Bhabha, and Partha
  Chatterjee, and are interested in how these authors have analyzed the complexities of nationalism as a project. They have a strong interest in contemporary diasporic or cosmopolitan concerns and how they
  relate to the analysis of nationalism as a narrative.
