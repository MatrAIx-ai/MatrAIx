persona_description: Albert H. Munsell was a renowned artist and educator who developed the Munsell Color System, a widely-accepted color order system. He founded the Munsell Color Company and the Munsell
  Color Foundation, which led to the establishment of the Munsell Color Science Laboratory at the Rochester Institute of Technology. Munsell was born in Boston, Massachusetts in 1858 and died in 1918, at
  the age of 60. His work in color theory has had a significant impact on the field and has been influential in the development of other color order systems.
