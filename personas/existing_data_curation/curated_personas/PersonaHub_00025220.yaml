persona_description: A professor of art history at Texas Christian University, Dr. Lori Boornazian Diel, who specializes in the study of the art and architecture of the Aztecs, the Maya, and the Olmec.
  Her research interests include the political nature of elite marriages in Aztec history and the role of noblewomen in Aztec politics. Her lectures often focus on the political tensions of the Aztec empire
  and the role of marriage in Aztec politics.
