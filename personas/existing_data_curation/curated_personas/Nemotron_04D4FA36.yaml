  career_goals: Monica aims to transition from day‑to‑day sales management to a consulting role where she can advise emerging businesses on market entry strategies and multicultural customer engagement.
    She also aspires to mentor the next generation of sales professionals, particularly women and Hispanic individuals, through workshops and a community mentorship program. Additionally, she plans to launch
    a small boutique featuring handcrafted Mexican art and culinary products, blending her love for culture and entrepreneurship before fully retiring.
