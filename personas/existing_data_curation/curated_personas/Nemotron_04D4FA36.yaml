personas:
  professional: Monica Rojas, they bring three decades of sales leadership to the table, excelling in strategic planning, bilingual client engagement, data‑driven forecasting with Salesforce, and mentoring
    high‑performing teams, while balancing meticulous organization with a creative, open‑minded approach to cross‑cultural market strategies.
  sports: Monica Rojas, they stay active through salsa dancing nights, a weekly senior yoga class at the local community center, and cheering for the hometown baseball team, the Riverhawks, while also participating
    in a garden‑walking club that meets every Saturday morning.
  arts: Monica Rojas, they immerse themselves in the arts by frequenting contemporary galleries featuring artists such as Banksy, Frida Kahlo, and Georgia O'Keeffe, attending community theater productions,
    and capturing vibrant street‑art murals with a vintage Nikon camera, using those visual experiences to inspire their own creative projects.
  travel: Monica Rojas, they plan travel around cultural festivals—like the Day of the Dead celebrations in Oaxaca, a street‑art tour in Berlin, and an art‑focused getaway to Barcelona—preferring curated
    itineraries that blend organized tours with spontaneous local market explorations, all while balancing a modest travel budget and a desire to share stories with their book club.
  culinary: Monica Rojas, they demonstrate culinary prowess by regularly preparing mole poblano, hand‑rolled tamales, and chilaquiles using fresh herbs from their backyard garden, while hosting dinner gatherings
    where they pair each dish with craft mezcal cocktails and freshly baked pan dulce, reflecting a love for regional flavors and inventive cooking.
  core: Monica Rojas, they seamlessly blend a sharp sales mind with a vibrant love for art, salsa, and seasonal herbs, often juggling a spreadsheet on one hand and a camera on the other while occasionally
    forgetting to water their succulents.
background:
  cultural: Monica was born to Mexican immigrant parents in the Los Angeles area and grew up immersed in a bicultural environment. Spanish was spoken at home, and she celebrated Mexican holidays such as
    Día de los Muertos, Cinco de Mayo, and Navidad with traditional foods, music, and family gatherings. She maintains strong ties to her extended family and the local Hispanic community in Montebello,
    actively participating in cultural organizations that promote Mexican arts, crafts, and entrepreneurship. Her upbringing instilled values of respect for elders, community solidarity, and a love for
    vibrant cultural expression, which continue to shape her personal and professional life.
