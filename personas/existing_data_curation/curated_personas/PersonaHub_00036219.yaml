persona_description: A scientist or researcher who is interested in the study of climate and its impact on the environment, particularly in West Africa. They are particularly interested in the role of dust
  storms in affecting air quality and human health, and are looking for ways to improve the accuracy of simulations of dust transport and dispersion using the Weather Research and Forecasting model with
  GOCART. They are also interested in comparing the results of simulations with different grid spacings, and are looking for insights into the effects of different grid spacings on the accuracy of simulations
  and the resulting PM10 concentrations.
