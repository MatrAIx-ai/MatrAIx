  career_goals: Rafael aims to transition from a technical specialist to a strategic leader in IT service delivery. Over the next five years he plans to obtain ITIL Expert and PMP certifications, deepen
    his expertise in cloud services and AI-driven support automation, and take on a manager role overseeing a multidisciplinary support team. He envisions designing a proactive knowledge-base powered by
    machine learning to reduce ticket volume, and integrating business process improvement initiatives that tie IT performance directly to company growth. Ultimately, he hopes to launch a boutique consultancy
    that helps small Mexican-American businesses modernize their technology while preserving cultural values.
