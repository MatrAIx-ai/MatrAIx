persona_description: A medical professional who specializes in orthopedics and radiology, particularly in the diagnosis and treatment of cleidocranial dysplasia. They have extensive knowledge of radiographic
  images and their importance in diagnosing the condition. They have experience with surgical correction and craniofacial surgery to correct skull defects, and have treated patients with coxa vara and brachial
  plexus irritation. They are aware of the potential for short medial fifth phalanges and spinal abnormalities. They are familiar with the clinical and radiological features of the condition, as well as
  the treatment options available.
