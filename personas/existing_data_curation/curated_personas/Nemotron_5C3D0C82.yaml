  hobbies: '[''Street photography'',''Saxophone playing in community jazz group'',''Visiting art galleries and street‑art tours'',''Hiking in the Blue Ridge Mountains'',''Volunteer tutoring at community
    center'',''Hosting weekly game‑night gatherings'',''Reading speculative fiction'',''Cooking soul‑food recipes'']'
  career_goals: Henry aims to advance from field meter reader to a supervisory role within the utility company, eventually becoming a Meter Data Analyst or Energy Efficiency Coordinator. He is working toward
    obtaining his GED and certifications such as Certified Utility Professional (CUP) and a basic Energy Management certification. Long‑term, he envisions leading a team that implements renewable‑energy
    projects in the Appalachian region, while also serving as a community educator on energy‑conservation practices. His desire to meet high standards drives him to seek leadership development programs
    and to mentor younger workers, especially those from under‑represented backgrounds. Parallel to his professional growth, Henry hopes to combine his artistic interests with his career by creating visual
    reports and community workshops that blend data, sustainability, and local culture.
