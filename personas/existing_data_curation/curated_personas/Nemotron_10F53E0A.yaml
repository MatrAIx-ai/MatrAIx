personas:
  professional: An experienced municipal front‑desk specialist, Tiger Tolden uses his meticulous scheduling, conflict‑resolution talent, and community‑oriented interpersonal style to streamline visitor
    services while cultivating a supportive team environment as he works toward an Office Manager position.
  sports: A weekend basketball enthusiast, Tiger Tolden organizes pickup games with the Harrisburg Hoops league, while cheering on the Philadelphia Eagles each Sunday, a tradition he shares with his family
    and friends.
  arts: A devoted blues and jazz aficionado, Tiger Tolden frequents the Harrisburg Playhouse to hear B.B. King tributes and Miles Davis‑inspired sets, using the music as a lively soundtrack for his cooking
    experiments.
  travel: A planned‑but‑adventurous traveler, Tiger Tolden enjoys well‑organized weekend road trips to destinations like Asheville’s Blue Ridge Mountains and Virginia Beach, balancing outdoor recreation
    with family time while staying within a modest travel budget.
  culinary: A Southern‑comfort food maestro, Tiger Tolden perfects crispy fried chicken, buttery collard greens, and cheesy cornbread, and experiments with smoked‑paprika shrimp étouffée and fresh garden‑grown
    okra for his family gatherings.
  core: Tiger Tolden blends structured efficiency with community energy, juggling Excel spreadsheets, basketball rebounds, and soulful blues, yet habitually puts off dentist appointments for the love of
    a good steak.
background:
  cultural: Tiger is an African-American who grew up in a multigenerational household with roots in the Southern United States, reflecting the legacy of the Great Migration that brought many families to
    Pennsylvania. Raised in a close-knit church community in Harrisburg, he values family, communal support, and cultural traditions such as celebrating Juneteenth and soul‑food gatherings. His cultural
    identity informs his commitment to service, his love of music, and his desire to mentor younger members of the Black community, while also integrating the broader Mid-Atlantic lifestyle of the Harrisburg
    area.
