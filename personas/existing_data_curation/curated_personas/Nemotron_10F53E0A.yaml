  career_goals: Tiger aims to advance to an Office Manager or Administrative Supervisor role within the next three years, leveraging his practical experience to improve service efficiency. He plans to earn
    a Bachelor’s degree in Business Administration to broaden his managerial skill set and become proficient in modern digital office platforms such as CRM and document-management systems. He also aspires
    to lead initiatives that enhance visitor experience at the municipal office, mentor younger staff—particularly from underrepresented backgrounds—and eventually transition into a community-outreach position
    where he can blend his administrative expertise with his passion for public service.
