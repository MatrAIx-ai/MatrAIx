personas:
  professional: Maria Alford, a 39-year-old elementary and middle-school teacher in the Charlotte district, combines a meticulous approach to instructional design with pragmatic flexibility, using Google
    Classroom and bilingual curriculum resources to create culturally responsive lessons while they assertively advocate for expanded Spanish-language programming.
  sports: Maria Alford, a 39-year-old hiking enthusiast, spends weekend mornings trekking the Blue Ridge Mountains, participates in the Charlotte Trails Running Club’s 5K events, follows Charlotte FC soccer
    matches, and they prefer low‑impact exercise over competitive sports.
  arts: Maria Alford, a 39-year-old literary aficionado, devotes evenings to a small book club discussing works by Colson Whitehead and Chimamanda Ngozi Adichie, attends occasional performances by the Charlotte
    Symphony Orchestra, and they find inspiration in Frida Kahlo’s paintings for their classroom décor.
  travel: Maria Alford, a 39-year-old traveler, meticulously plans weekend road trips to Asheville’s Blue Ridge Parkway and occasionally dreams of exploring the Monteverde Cloud Forest Reserve, balancing
    a love for nature with a desire for cultural immersion in places like Lisbon and Oaxaca, while they keep travel costs within a tight budget.
  culinary: Maria Alford, a 39-year-old home chef, passionately prepares gallo pinto with black beans, rice, and cilantro, crafts fresh ceviche using lime, local snapper, and diced mango, and they frequently
    harvest basil, oregano, and peppermint from their backyard herb garden to enhance their dishes.
  core: Maria Alford, a 39-year-old reflective educator, balances meticulous planning with spontaneous creativity, channels their worry‑driven diligence into nurturing bilingual classrooms, mindful self‑care,
    and soulful home cooking, even if they sometimes over‑think budget spreadsheets.
background:
  cultural: Maria was born to Costa Rican parents who immigrated to the United States when she was a child. Her household emphasized bilingualism, respect for nature, and a strong sense of community—values
    rooted in Costa Rica's "pura vida" philosophy. Growing up, she celebrated traditional festivals such as Día de la Madre and learned about the country's biodiversity, which sparked her love for environmental
    education. In Charlotte, Maria blends her Latin American heritage with Southern cultural norms, often sharing Costa Rican narratives and culinary traditions with her students and coworkers, fostering
    cross‑cultural understanding and pride in multicultural identities.
attributes:
  skills: '[''Classroom management'', ''Differentiated instruction'', ''Bilingual education (Spanish‑English)'', ''Curriculum development'', ''Assessment design'', ''Technology integration (Google Classroom,
    interactive whiteboards)'', ''Parent communication'', ''Student counseling basics'', ''Project‑based learning'', ''Community outreach'']'
  hobbies: '[''Cooking Costa Rican cuisine'', ''Reading literary fiction and biographies'', ''Yoga and mindfulness meditation'', ''Hiking'', ''Gardening (herbs and native plants)'', ''Community literacy
    tutoring'', ''Small book club participation'']'
  career_goals: Maria aims to deepen her leadership role within the Charlotte school district by pursuing a master's degree in Educational Leadership within the next three years. She envisions becoming
    a curriculum coordinator for a bilingual program, where she can expand Spanish‑language offerings and embed Costa Rican cultural perspectives into the standards. In the longer term, she aspires to serve
    as an assistant principal, focusing on creating supportive structures that reduce student and teacher stress, and championing professional‑development workshops on trauma‑informed teaching and collaborative
    classroom practices.
