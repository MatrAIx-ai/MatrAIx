  career_goals: Keiron is focused on re‑entering the workforce with a stable, skill‑based position that leverages his hands‑on abilities. He plans to enroll in a vocational training program, such as an
    HVAC or electrical certification course, to formalize his practical knowledge and improve his job prospects. In the longer term, he hopes to launch his own small handyman service, allowing him to combine
    his love of practical problem‑solving with a desire to serve his Tampa community. He also aspires to mentor local youth interested in trades, using his own experience to guide them toward sustainable
    career paths while maintaining financial stability for his future family.
