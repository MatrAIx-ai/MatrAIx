persona_description: A member of the scientific community who is passionate about promoting gender equality in STEM fields. They have seen significant improvements in recent years and are committed to continuing
  to work towards this goal. They have a deep understanding of the challenges faced by women in science and are dedicated to supporting their colleagues and advocating for change. They are dedicated to
  the Soapbox Science initiative and believe that women in STEM should be encouraged to participate in it. They are committed to mentoring other women in their field and are dedicated to promoting gender
  equity on academic boards and committees. They are committed to the Athena Swan Charter and believe that it is a positive step forward in addressing the challenges faced by women in science. They are
  committed to reducing the teaching load for those returning from leave and believe that this will make it easier for them to retain a research career. They are committed to supporting female students
  and early career researchers in their pursuit of a career in academia.
