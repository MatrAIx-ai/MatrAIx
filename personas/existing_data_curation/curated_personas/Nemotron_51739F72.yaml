personas:
  professional: Jason Leyva, an aspiring diesel‑engine mechanic in his senior year of high school, leverages a hands‑on hobbyist background in automotive repair, PC building, and 4‑H robotics to blend curiosity
    with practicality, channeling a competitive drive toward an apprenticeship at the local garage while they maintain organized project planning and flexible problem‑solving.
  sports: Jason Leyva, an avid outdoors enthusiast, spends weekends fishing on Lake Charlevoix and playing pick‑up basketball at the community gym, while cheering for the Detroit Red Wings and following
    the Michigan State Spartans football team, and they embody a competitive yet community‑rooted sports spirit.
  arts: Jason Leyva, a classic‑rock aficionado, fills his workshop with the sounds of Led Zeppelin, Foo Fighters, and Nirvana, occasionally strums a second‑hand electric guitar and attends local theater
    productions, letting music and performance art shape his creative downtime as they find rhythm in both work and leisure.
  travel: Jason Leyva, a budget‑conscious teen, prefers short road trips to Michigan’s Upper Peninsula for camping and snowmobile trails, dreams of a future cross‑country drive to the Pacific Northwest
    to test diesel rigs, and they balance adventure with family obligations.
  culinary: Jason Leyva, a self‑taught cook, favors hearty meals like homemade chili with kidney beans, grilled perch seasoned with lemon and dill, and enjoys experimenting with simple woodworking to build
    a custom grill, but they often over‑cook steak while debugging code.
  core: Jason Leyva blends a competitive, hands‑on mindset with a love for classic rock, balancing pragmatic career goals with occasional late‑night gaming marathons and a habit of saving every spare dollar
    for future tools, and they never miss a chance to tinker.
background:
  cultural: Jason grew up in a predominantly white, working‑class Midwestern community in East Jordan, Michigan. His family’s ancestry includes German and Polish immigrants who settled the area in the early
    20th century. The local culture emphasizes self‑reliance, seasonal outdoor recreation, and close‑knit community institutions such as church, high‑school sports, and the 4‑H club. These influences have
    shaped his pragmatic outlook, his appreciation for hands‑on work, and his modest but competitive approach to social interactions.
attributes:
  skills: '["Mechanical troubleshooting (cars & snowmobiles)", "Basic computer hardware assembly and repair", "Woodworking and small‑scale carpentry", "Outdoor navigation and fishing techniques", "Team
    sports strategy (basketball)", "Problem‑solving under pressure", "Effective communication in group projects", "Time‑management and self‑directed learning"]'
  hobbies: '["Fishing and fly‑casting", "Hiking and wildlife observation", "Competitive multiplayer gaming", "PC building and hardware modding", "Pickup basketball", "4‑H robotics projects", "Snowmobile
    maintenance as a hobby", "Listening to classic rock and alternative music"]'
  career_goals: Jason plans to earn his GED within the next year and then secure an apprenticeship in automotive technology at a local garage or the regional community college. His long‑term ambition is
    to become a certified diesel‑engine mechanic and eventually open a small shop that offers seasonal maintenance for cars, snowmobiles, and lake‑front boats. As a backup path that aligns with his competitive
    nature, he is also considering enlisting in the U.S. Army's mechanical or signal corps, where he can gain structured training and leadership experience.
