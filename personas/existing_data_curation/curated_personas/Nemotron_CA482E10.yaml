  hobbies: '[''Vegetable gardening'', ''Cooking Vietnamese dishes'', ''Reading historical biographies'', ''Woodworking'', ''Crossword puzzles and Sudoku'', ''Tai chi practice'', ''Walking along the Providence
    River'', ''Attending small cultural celebrations'', ''Senior‑center film nights'']'
  career_goals: Although retired, Phuc aims to mentor younger members of the Vietnamese community in Providence, sharing his practical skills and cultural stories. He hopes to author a short memoir documenting
    his family's migration and adaptation, and to help establish a community garden that blends traditional herbs with local produce. He also plans to improve his digital literacy to assist peers at the
    senior center, and to serve as an informal advisor for budgeting and home‑repair workshops.
