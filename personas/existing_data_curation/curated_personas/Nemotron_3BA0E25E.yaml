  career_goals: Marie Louise aspires to rise to a senior leadership role such as Director of Strategic Projects within the next five years, steering large-scale, sustainability-focused initiatives that
    blend technology, art, and viticulture. She plans to earn a PMP certification and pursue an executive MBA to deepen her strategic acumen. Ultimately, she envisions launching her own consultancy that
    helps luxury brands orchestrate innovative, experiential projects while mentoring emerging project managers.
