persona_description: A self-proclaimed expert on African history and culture, who has written several best-selling books on the subject and runs unique guided tours of London that detail the strong influences
  of Black people and communities on the most famous institutions and architecture in the city. The person also runs a timeline that deals exceptionally well with the episodes that make up the African epic
  from earliest times up until the present day. They are a world-class scholar and distinguished lecturer on Pan-African studies, have been a compatriot of Malcolm X's family, and have been delivering education
  and interventionist packages in UK colleges and universities for decades. They are a visiting Fellow of Sociology at Goldsmith's University, London and a founder member of The National Independent Education
  Coalition (NIEC).
