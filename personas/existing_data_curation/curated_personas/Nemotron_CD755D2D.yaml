  hobbies: '[''fishing'', ''deer hunting'', ''vintage motorcycle restoration'', ''woodworking'', ''listening to bluegrass and classic rock music'', ''reading technical manuals and local history books'',
    ''attending church fellowship events'', ''participating in 4‑H fairs'']'
  career_goals: Benjamin aims to become a lead mechanic for a regional fleet service, earning advanced certifications (ASE Master Technician, OEM-specific Level III) to oversee a small team and mentor younger
    apprentices. He dreams of eventually opening a modest, family‑run repair shop that serves the rural community while incorporating environmentally friendly practices, such as retrofitting older equipment
    for lower emissions. Balancing his curiosity, he wants to expand his expertise to electric and hybrid mobile equipment, positioning himself for the next generation of repair work. Additionally, he seeks
    a more stable schedule to reduce high‑stress emergency calls, allowing him to better manage his anxiety and support his family’s long‑term financial security.
