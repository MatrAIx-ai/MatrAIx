persona_description: A senior care pharmacist who specializes in the provision of pharmaceutical care to the elderly population, with a focus on geriatrics, geriatric pharmacotherapy, and the unique medication-related
  needs of the senior population. They apply their specialized knowledge in geriatrics, geriatric pharmacotherapy, and the unique medication-related needs of the senior population to ensure that the older
  patient's medication regimen is not contributing to common geriatric problem areas that may lead to excess disability, loss of independence, and decreased quality of life. They take responsibility for
  their patients' medication-related needs by ensuring that their patients' medications are the most appropriate, the most effective available, the safest possible, and are used correctly. They are knowledgeable
  in diseases and conditions common in the senior population, geriatric syndromes or problem areas, medication-related problems that can cause, aggravate, or contribute to common geriatric problems, and
  the role of the caregiver and health consequences of caregiving. They are committed to lifelong learning and formalize their competency in geriatrics, geriatric pharmacotherapy, and the unique medication-related
  needs of the senior population through recognized certification and credentialing programs.
