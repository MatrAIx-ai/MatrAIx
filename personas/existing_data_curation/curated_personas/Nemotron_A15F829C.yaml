  hobbies: '[''Hiking in the Great Smoky Mountains'', ''Biking the Knoxville Greenway'', ''Swing dancing'', ''Improv comedy'', ''Volunteering at animal shelter'', ''Community clean‑up events'', ''Cooking
    experimental dishes'', ''Hosting potluck dinners'', ''DIY home décor crafts'', ''Playing volleyball'', ''Attending live music shows'']'
  career_goals: Laura aims to enroll in a community college program in communications or public relations within the next year. She hopes to combine her love of group activities and her practical mindset
    by working as a community outreach coordinator for a local nonprofit or as an event coordinator for regional festivals like the Dogwood Arts Festival. In the longer term, she envisions launching her
    own small business—a coffee‑shop‑style community hub where people can gather, share ideas, and enjoy locally sourced food. She also wants to develop leadership skills to eventually mentor younger teens
    in volunteer programs.
