  hobbies: '[''Acrylic painting'', ''Sketching and illustration'', ''Nature photography'', ''Reading speculative fiction'', ''Attending local art fairs'', ''Yoga and meditation'', ''Journaling'', ''Playing
    acoustic guitar'']'
  career_goals: Lillie aims to advance from her current managerial role to a regional store manager position for a boutique that blends art, design, and retail. She envisions launching her own concept shop
    that showcases emerging local artists while offering curated lifestyle products. To achieve this, she plans to pursue part‑time coursework in business administration and continue building expertise
    in visual merchandising and brand storytelling. Ultimately, she hopes to be recognized as an innovative leader who injects novelty into the retail sector while maintaining a sustainable, community‑focused
    business model.
