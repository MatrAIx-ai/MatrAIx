personas:
  professional: Lillie Brown blends her managerial acumen at a boutique retail shop with a flair for visual storytelling, turning inventory reports into eye‑catching window displays while using persuasive
    one‑on‑one chats to motivate staff, even though she often resists rigid schedules and occasionally forgets to file paperwork on time.
  sports: Lillie Brown hikes the rolling hills near Unionville with the local Trailblazers Club, catches Saturday night Nashville Predators games on TV, and participates in a casual Sunday morning pick‑up
    volleyball league at the community center, even though she prefers solo outdoor cardio over structured gym routines.
  arts: Lillie Brown paints whimsical acrylic canvases inspired by Tim Burton’s gothic flair, snaps moody landscape photos on weekend treks, strums acoustic renditions of Joni Mitchell songs at friends’
    gatherings, and draws creative energy from browsing works by Yayoi Kusama at regional art fairs.
  travel: Lillie Brown favors spontaneous road trips to the Great Smoky Mountains for sunrise photography, dreams of wandering the cobblestone streets of Edinburgh for its fantasy literature festivals,
    and plans budget‑friendly weekend getaways by scrolling Instagram hashtags rather than booking far‑ahead, balancing a desire for adventure with her modest student‑loan constraints.
  culinary: Lillie Brown craves regional comfort foods like shrimp and grits and pimento cheese on warm biscuits, but also experiments with avocado toast topped with hot sauce and fresh basil, often cooking
    elaborate meals for herself while occasionally neglecting to prep healthy snacks, leading to late‑night snack raids on pantry cookies.
  core: Lillie Brown is a restless imaginative soul who mixes warm community hospitality with a relentless drive to infuse novelty into retail, yet she constantly battles procrastination, worry, and a habit
    of impulsive art‑supply splurges.
background:
  cultural: 'Lillie grew up in Unionville, a close‑knit community in Rutherford County, Tennessee. Her upbringing reflects typical Southern small‑town values: strong family ties, a sense of hospitality,
    and an appreciation for local traditions such as community gatherings and regional cuisine. While she respects these roots, her curiosity and internet exposure have broadened her perspective, allowing
    her to blend traditional Southern sensibilities with contemporary artistic and entrepreneurial influences.'
attributes:
  skills: '[''Creative brainstorming'', ''Visual merchandising'', ''Digital media editing (Canva, basic Photoshop)'', ''Team leadership'', ''Customer service'', ''Conflict resolution'', ''Critical analysis'',
