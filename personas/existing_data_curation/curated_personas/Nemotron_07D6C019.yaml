  hobbies: '[''gardening (vegetables and native flowers)'', ''southern cooking and recipe experimentation'', ''knitting and quilting'', ''reading historical fiction and local history'', ''birdwatching'',
    ''church choir participation'', ''volunteering at the food bank'', ''participating in community garden projects'']'
  career_goals: Although retired from formal employment, Courtney aims to deepen her impact within the Hampton community. She aspires to lead a multi‑generational community garden that provides fresh produce
    to local seniors and food‑insecure families. She hopes to compile and publish a handwritten cookbook that blends cherished Southern recipes with her own innovative twists, preserving family culinary
    heritage. Courtney also wishes to serve on a senior advisory council to advocate for better elder services and to mentor younger volunteers through storytelling workshops that weave together local history
    and personal experience. Her overarching ambition is to foster harmony, resilience, and shared knowledge among her neighbors while maintaining a flexible and low‑stress lifestyle.
