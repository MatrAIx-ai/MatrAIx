personas:
  professional: Courtney Woerner, a retired community volunteer coordinator, leverages their gardening expertise, quilting talent, and gentle mediation skills to orchestrate multi‑generational projects
    like a senior‑focused garden, while preferring flexible schedules over rigid planning.
  sports: Courtney Woerner enjoys low‑impact activities such as morning bird‑watching walks and occasional pickleball matches at the local senior center, cheering for the Atlanta Braves and following the
    Georgia Bulldogs football season, while preferring gentle stretching over high‑intensity workouts.
  arts: Courtney Woerner attends community‑center watercolor classes, finds inspiration in the works of Georgia O'Keeffe and the folk paintings of Grandma Moses, and weaves storytelling into quilting circles,
    often humming hymns from their church choir during creative sessions.
  travel: Courtney Woerner favors relaxed road trips to historic Southern towns like Savannah and Charleston, planning trips around family gatherings and church events, while also dreaming of a serene garden‑tour
    in England's Cotswolds, balancing travel with the comfort of home.
  culinary: Courtney Woerner delights in pairing garden‑fresh tomatoes, okra, and heirloom collards with classic Southern staples like shrimp and grits or fried green tomatoes, experimenting with spice
    blends from Cajun to Creole, and often shares their handwritten recipe cards with friends over potluck dinners.
  core: Courtney Woerner blends a calm, garden‑centered lifestyle with a generous spirit, quietly leading community projects, savoring Southern flavors, and weaving history into every conversation, all
    while embracing a flexible, low‑pressure rhythm.
background:
  cultural: Courtney’s cultural background is rooted in the Southern United States, specifically rural Georgia. She was raised in a close‑knit, predominantly White community where values such as hospitality,
    respect for tradition, and a strong sense of family were emphasized. Her upbringing included regular church attendance at a Baptist congregation, which fostered community service and musical involvement.
    While she honors the culinary and horticultural traditions passed down through generations, her curiosity has led her to blend these with new ideas, reflecting a balanced respect for heritage and openness
    to change. Growing up during the social changes of the 1960s and 1970s, she developed a calm, resilient outlook that informs her collaborative and harmonious approach to community life.
