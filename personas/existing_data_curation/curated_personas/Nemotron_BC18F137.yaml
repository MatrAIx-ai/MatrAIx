  career_goals: Michael aims to become an executive producer who champions socially relevant, tech‑enhanced storytelling. He envisions producing documentary series that translate complex scientific concepts
    into compelling visual narratives, often incorporating AR/VR elements. Over the next five years, he plans to launch a boutique production studio in the Greater Boston area that partners with local research
    institutions and indie filmmakers. He also seeks mentorship roles to nurture emerging talent, secure regular screenings at festivals such as Sundance and Tribeca, and earn recognition for innovative,
    interdisciplinary work that bridges science and art.
