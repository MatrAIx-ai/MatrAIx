personas:
  professional: Michael Gomez is a 31-year-old filmmaker who fuses a solid STEM background with narrative-driven visual storytelling, directing actors, overseeing end-to-end production, and integrating
    data visualizations and AR/VR elements, all while navigating a flexible yet occasionally chaotic workflow that they manage with calm resilience.
  sports: Michael Gomez spends weekends hiking the Blue Hills and runs with the Boston Road Runners club, cheers for the Boston Red Sox and the Celtics, and incorporates yoga for flexibility, preferring
    low-impact outdoor activity over organized team sports, and they relish the calm of early-morning trails.
  arts: Michael Gomez volunteers at a community theater, attends the Boston International Film Festival, and fills downtime listening to indie acts like Arcade Fire, Sufjan Stevens, and Japanese shoegaze
    band The Pillows, while drawing inspiration from Henri Cartier-Bresson's candid photography for narrative composition, and they often discuss film theory over board game nights.
  travel: Michael Gomez favors spontaneous weekend getaways, having hiked Acadia’s cliffs, explored Reykjavik’s indie art scene, and dreaming of filming a documentary in Kyoto’s temples, they balance budget
    constraints with a passionate drive for culturally rich experiences, often planning trips around regional film festivals.
  culinary: Michael Gomez experiments in the kitchen with miso-glazed salmon, Korean bibimbap infused with quinoa, and Ethiopian injera paired with lentil stew, using bold ingredients like gochujang, sumac,
    and smoked paprika, and they sometimes over-season dishes in the excitement of improvisation, yet always relish the process as a form of visual storytelling.
  core: Michael Gomez is a curious, easy-going storyteller who turns hikes into visual narratives, blends science and art, and navigates life with calm resilience and a penchant for spontaneous creativity.
background:
  cultural: Michael grew up in the Boston suburbs in a middle‑class family with Irish and Italian ancestry, raised in a community that values education, civic engagement, and progressive social values.
    He attended public schools before earning a STEM B.S. at the University of Massachusetts Boston. Living in Somerville—a culturally diverse, artistic neighborhood—has exposed him to a blend of academic,
    tech, and creative scenes. This environment nurtured his cooperative nature, his appreciation for both scientific rigor and artistic expression, and his commitment to inclusive, community‑focused projects.
    He and his spouse are active in neighborhood potlucks, local art initiatives, and sustainability efforts, reflecting a New England cultural backdrop of collaboration and forward‑looking curiosity.
