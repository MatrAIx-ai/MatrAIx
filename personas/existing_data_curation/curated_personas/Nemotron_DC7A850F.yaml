personas:
  professional: Joanne Thomas, a meticulous dental hygienist at a busy Pensacola practice, leverages her analytical STEM background and love for structured workflows to deliver precise periodontal care
    while quietly mentoring junior staff toward evidence‑based protocols, and they consistently uphold exacting infection‑control standards.
  sports: Joanne Thomas, a dedicated early‑morning beach walker, follows the Tampa Bay Buccaneers and the New Orleans Pelicans religiously, joins a local yoga club for flexibility training, and participates
    in a seasonal beach volleyball league with a small group of friends, all while they schedule workouts in a color‑coded calendar.
  arts: Joanne Thomas, a lover of quiet evenings, enjoys the melodic storytelling of Johnny Cash, the coastal landscapes painted by Winslow Homer, and the classic films of Audrey Hepburn, often attending
    docent‑led tours at the Pensacola Museum of Art on weekends, and they keep a journal of reflections inspired by these works.
  travel: Joanne Thomas, a planner at heart, prefers structured weekend getaways, having mapped out trips to the historic streets of Savannah, the lively Mardi Gras festivities of New Orleans, and a sunrise
    hike in the Gulf Islands National Seashore, while they budget carefully and reserve longer vacations for future visits to the Scottish Highlands.
  culinary: Joanne Thomas, an exacting baker, delights in perfecting a flaky shrimp étouffée and a tangy key lime pie, measuring each spice to the gram, and they routinely cultivate fresh herbs in their
    garden to add to precise homemade sourdough loaves and a beloved crab bisque.
  core: Joanne Thomas blends Southern hospitality with a disciplined, detail‑oriented mindset, turning routine into purpose, even if that means obsessively checking dental charts or sneaking an extra slice
    of key lime pie after a perfect crossword puzzle.
background:
  cultural: Joanne was raised in a middle‑class Southern family in Pensacola, where values of hospitality, community, and a strong work ethic are deeply ingrained. Her cultural upbringing includes participation
    in local traditions such as Gulf Coast seafood cuisine, Mardi Gras celebrations, and church gatherings, reflecting a blend of Protestant values and regional customs. This background fosters her appreciation
    for close‑knit family ties, respect for tradition, and a commitment to serving her community.
attributes:
  skills: '[''Dental prophylaxis'', ''Periodontal assessment'', ''Dental radiography'', ''Patient education'', ''Infection control'', ''Dental software (Dentrix) operation'', ''Data entry and record-keeping'',
    ''Time management'', ''Team communication'', ''Basic research and evidence-based practice'', ''Organization and scheduling'']'
  hobbies: '[''Reading (historical non-fiction)'', ''Gardening'', ''Yoga'', ''Baking'', ''Crossword puzzles'', ''Morning beach walks'', ''Volunteer at community health fairs'', ''DIY home organization projects'']'
  career_goals: Joanne aims to advance to a senior or supervisory dental hygienist role within the next five years, leveraging her leadership and organizational strengths. She plans to pursue a Master’s
    in Public Health or Dental Hygiene to specialize in community oral health initiatives and periodontal therapy. Ultimately, she hopes to become a clinical educator or develop a mobile dental outreach
    program that serves underserved populations along the Gulf Coast, combining her commitment to patient care with her passion for structured, evidence‑based practice.
