  hobbies: '["Fishing", "Gardening", "Woodworking", "Reading historical nonfiction", "Acoustic guitar", "Volunteer firefighting", "Community potluck participation", "Journaling", "Landscape photography",
    "Model train building"]'
  career_goals: Christopher aims to build a career rooted in service to his rural community, seeking a stable, routine‑based position where he can apply his practical skills and compassionate nature. Over
    the next few years, he plans to complete a bachelor's degree in public health or social work and secure a role as a community health worker or outreach coordinator for a nonprofit organization serving
    agricultural families. He envisions long‑term growth into program management, where he can design and oversee regular wellness programs, food‑security initiatives, and youth mentorship projects, ensuring
    sustainable support for his neighbors.
