persona_description: A wildlife biologist and extension specialist with expertise in the ORV program in Virginia, focusing on rabies control and management of wildlife populations. Parkhurst has extensive
  experience in wildlife management, disease prevention, and public health. He is well-versed in the methods and strategies used to vaccinate wildlife populations against rabies, including the use of aircraft
  and car releases. Parkhurst is also knowledgeable about the potential risks and ethical considerations associated with translocation of wildlife, particularly in the context of rabies control.
