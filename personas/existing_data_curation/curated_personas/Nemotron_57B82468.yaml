personas:
  professional: Ricardo Castro is an aspiring comic artist and young designer, channeling their meticulous planning and creative curiosity into hand‑drawn cartoon adventures and LEGO‑modeled houses, often
    leading group projects in the school art club with organized enthusiasm.
  sports: Ricardo Castro dazzles on the sandlot soccer field, idolizing the Phoenix Suns for their teamwork, cheering for the Arizona Diamondbacks during weekend baseball outings, and playing for the Buckeye
    Youth Soccer Club where they practice drills after school with the same disciplined energy they bring to LEGO builds.
  arts: Ricardo Castro immerses themselves in the whimsical panels of Moebius, the humor of Calvin and Hobbes, and the vibrant sketches of Frida Kahlo, while humming along to the mariachi classics of Vicente
    Fernández and the pop ballads of Luis Miguel during art sessions, shaping a creative identity that blends classic illustration with lively musical rhythm.
  travel: Ricardo Castro dreams of desert hikes through the Grand Canyon and a family road trip to the historic streets of Oaxaca, while their recent school field trip to the Arizona State Museum sparked
    a love for local archaeology, balancing the desire for adventure with the practical constraints of school schedules and parental permission.
  culinary: Ricardo Castro loves the bright flavor of tacos al pastor, the comforting steam of tamales wrapped in corn husks, and enjoys experimenting by adding cilantro and lime to homemade guacamole,
    though their cooking skill is limited to safely spreading salsa on tortillas under their grandma’s watchful eye.
  core: Ricardo Castro is a curious, organized nine‑year‑old who balances a passion for drawing comic adventures and building LEGO towns with a tendency to worry about every detail, often humming mariachi
    tunes while sketching and occasionally forgetting to finish a school project until the last minute.
background:
  cultural: Ricardo comes from a Mexican‑American family that maintains strong cultural traditions. At home he speaks Spanish with his parents and grandparents, and celebrates holidays such as Día de los
    Muertos, Cinco de Mayo, and Las Posadas with colorful altars, traditional foods like tamales and pozole, and music. His family’s roots trace back to Jalisco, and he has learned folk crafts like papel
    picado and basic guitar chords. Living in Buckeye, Arizona, he also experiences the desert landscape of the Southwest and occasionally participates in local community events that blend Mexican heritage
    with regional influences, such as the annual Southwest Fiesta. This bicultural environment shapes his identity, giving him a deep appreciation for Mexican art, cuisine, and community values while also
    adapting to the broader American context.
