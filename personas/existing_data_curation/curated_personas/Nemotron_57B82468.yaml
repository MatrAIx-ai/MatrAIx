  career_goals: Hoping to blend his love for art, sustainability, and cultural heritage, Ricardo dreams of becoming an architect or designer who creates environmentally friendly homes that incorporate Mexican
    artistic motifs. He also imagines using technology—like interactive digital art and coding—to share stories about his culture with other kids. Over the long term, he aspires to lead community projects
    that combine creativity, science, and heritage, possibly mentoring younger students to explore art and technology.
