  hobbies: '[''Line dancing'', ''Gardening'', ''Quilting'', ''Church outreach volunteering'', ''Senior women’s book club'', ''Cooking Southern cuisine'', ''Walking the dog'', ''Local history society meetings'',
    ''Country music concerts'']'
  career_goals: Donna aims to progress from first‑line supervisor to district manager, where she can implement technology‑enhanced sales strategies and champion employee wellbeing across multiple stores.
    She aspires to develop a mentorship program for younger retail staff, leveraging her STEM background to introduce data‑driven decision making at the store level. Long‑term, she envisions transitioning
    to a part‑time consulting role for small local businesses, while remaining active in community volunteer projects and achieving a healthier work‑life balance to reduce stress.
