personas:
  professional: Donna Cheaves, a 59‑year‑old veteran retail supervisor, combines a solid STEM background with two decades of frontline store management, using advanced Excel and occasional SQL to drive
    data‑driven performance improvements while leveraging their natural knack for mediating conflicts and fostering employee wellbeing; their preference for structured processes is balanced by a flexible,
    people‑first leadership style that keeps the sales floor humming.
  sports: Donna Cheaves stays active through weekly line‑dancing classes and community barn‑dance gatherings, complements the rhythm with morning walks on rural trails alongside their dog, and roots for
    the regional baseball squad, the River Valley Tigers, as a devoted fan of their Saturday games, and they occasionally join the County Senior Fitness Club’s low‑impact aerobics sessions.
  arts: Cultural pursuits find Donna Cheaves curled up with Agatha Christie mysteries at the senior women’s book club, admiring the intricate patterns of a "Log Cabin" quilt while listening to classic country
    icons like Dolly Parton and Ronnie Miller during concerts, and they draw inspiration from the storytelling of local historian Sandra Collins, weaving literature, music, and textile art into a vibrant
    personal tapestry.
  travel: Donna Cheaves prefers relaxed, road‑trip style vacations that blend cultural immersion with familiar comforts, planning scenic drives to historic towns such as Savannah and Charleston, savoring
    Southern hospitality, while also budgeting for occasional weekend pilgrimages to Nashville’s Grand Ole Opry for classic country concerts, and they savor the balance between frugal planning and spontaneous
    musical delights.
  culinary: In the kitchen, Donna Cheaves excels at whipping up Southern comfort staples like crispy fried chicken, buttery mashed potatoes, slow‑cooked collard greens, and sweet peach cobbler, often seasoning
    with a dash of cayenne and a splash of buttermilk, while balancing a modest culinary skillset that thrives on family gatherings and the occasional potluck contribution, and they often delight guests
    with generous slices of peach cobbler.
  core: Donna Cheaves blends a data‑driven, structured retail mind with a warm, socially‑oriented heart, juggling community leadership, Southern cooking, and a penchant for line‑dancing while they wrestle
    with occasional worry and a love for flexible routines.
background:
  cultural: Donna was raised in a small Southern town in Arkansas, where values of hospitality, community, and faith are central. Growing up as a white woman in a predominantly rural setting, she attended
    local churches and participated in neighborhood events like county fairs and church picnics. Her decision to pursue a STEM bachelor’s degree was atypical for her region, shaping a pragmatic and analytical
    outlook that she blends with traditional Southern sensibilities. This cultural mix informs her emphasis on teamwork, courtesy, and a desire to give back to her tight‑knit community while embracing modern,
    data‑driven approaches to work.
attributes:
  skills: '[''Team Leadership & Coaching'', ''Retail Operations Management'', ''Inventory Control & Stock Forecasting'', ''Data Analysis (Excel, Basic SQL)'', ''POS System Integration'', ''Visual Merchandising'',
