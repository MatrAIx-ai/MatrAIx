persona_description: A researcher from the Johns Hopkins Bloomberg School of Public Health who specializes in the study of pre-packaged oral rehydration solutions for treating children with cholera and
  other forms of severe acute diarrhea. The researcher has experience with using freshly ground rice in ORS in hospitals in Bangladesh and has developed a new pre-packaged rice-based ORS that outperforms
  the current recommended pre-packaged ORS. The researcher is also interested in finding ways to improve the effectiveness of ORS treatment in developing countries.
