  career_goals: Alan aims to expand his professional footprint by obtaining the Certified Residential Specialist (CRS) and Real Estate Negotiation Expert (RENE) designations within the next two years. He
    plans to launch a boutique brokerage that specializes in Savannah’s historic homes and offers tailored services for Spanish‑speaking buyers and sellers, bridging his Mexican heritage with Southern charm.
    Alan also envisions creating a quarterly education series for first‑time homeowners that covers sustainable housing, tech‑enhanced buying processes, and preservation of historic architecture. Long‑term,
    he aspires to mentor emerging agents, become a recognized thought leader on integrating technology into traditional real‑estate practice, and contribute to local historic‑preservation councils.
