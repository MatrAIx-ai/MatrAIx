personas:
  professional: Michael Hoyos, a budding LEGO architect, channels his curiosity and practical problem‑solving into complex builds, often improvising when pieces are missing and competing with friends to
    finish models fastest, foreshadowing a future in engineering.
  sports: Michael Hoyos, a forward on the Riverdale Kids Soccer Club, idolizes the City Stars professional team and practices dribbling on weekends, balancing competitive matches with occasional unstructured
    kicks at the local park.
  arts: Michael Hoyos, an enthusiastic fan of LEGO‑themed animation, loves watching The LEGO Movie and enjoys the energetic tunes of Imagine Dragons, often humming “Believer” while constructing sets.
  travel: Michael Hoyos, who has explored the nearby state nature reserve and visited the Grand Canyon on a family road trip, dreams of traveling to the Kennedy Space Center to see real rockets and to trek
    the forests of Finland's Lapland for a winter adventure.
  culinary: Michael Hoyos, who adores cheesy pepperoni pizza, hearty spaghetti Bolognese, and banana‑strawberry smoothies, can confidently whip up a peanut‑butter‑jelly sandwich and occasionally attempts
    scrambled eggs, though he sometimes forgets to wash his hands before cooking.
  core: Michael Hoyos is a curiosity‑driven LEGO builder who balances competitive spirit with a laid‑back, slightly disorganized approach, occasionally splurges on impulse purchases, and proudly wears mismatched
    socks as a quirky trademark.
background:
  cultural: Michael is part of a white, middle‑class family in Florham Park, New Jersey. He grows up in a suburban setting with access to public parks, community libraries, and after‑school programs. Family
    traditions include weekend outings to nearby nature reserves, Sunday family meals, and participation in local community events. His upbringing blends typical American values of independence, curiosity,
    friendly competition, and a balanced mix of social interaction and personal downtime.
