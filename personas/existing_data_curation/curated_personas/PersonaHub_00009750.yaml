persona_description: A physician who specializes in the treatment of bone metabolism disorders, particularly hyperparathyroidism and hypoparathyroidism. They are skilled in diagnosing and managing these
  conditions through surgical removal of the affected parathyroid glands, monitoring calcium levels in blood, and providing advice on driving safety. They are also knowledgeable about the symptoms and treatment
  options for both conditions, including muscle spasms, carpopedal spasms, and intracranial hypertension.
