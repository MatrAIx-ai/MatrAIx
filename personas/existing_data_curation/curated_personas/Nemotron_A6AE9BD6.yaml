  career_goals: Betty aims to progress from senior software engineer to a technical leadership role, such as engineering manager or principal architect, where she can shape product strategy and drive innovation.
    She is passionate about leading diverse, collaborative teams to deliver high‑impact solutions, particularly in AI‑enabled services and sustainable tech. In the long term, she envisions founding a startup
    that leverages cloud and machine‑learning technologies to solve real‑world problems, while maintaining a healthy work‑life balance for herself and her family.
