personas:
  professional: Betty Crowley is a senior full‑stack developer who designs scalable cloud‑native applications on AWS, leads Scrum ceremonies, mentors junior engineers, and translates complex technical challenges
    into clear, business‑focused solutions, all while balancing curiosity for new AI tools with a practical, methodical work style.
  sports: Betty Crowley fuels her fitness routine with weekend hikes in the Alameda County hills, rides the Bay Trail as a member of the Bike the Bay Club, and roots for the Golden State Warriors, Oakland
    Athletics, and San Jose Earthquakes, balancing structured training with enthusiastic support for local teams.
  arts: Betty Crowley immerses herself in the Bay Area’s cultural scene by performing improv with the Bay Area Improv Troupe, attending Berkeley Rep productions, drawing inspiration from Lin‑Manuel Miranda’s
    musical storytelling, and enjoying the ambient electronic sounds of Tame Impala while curating a personalized sci‑fi reading list that fuels her creative expression.
  travel: Betty Crowley plans her travels with spreadsheet precision, favoring a mix of adventure and relaxation such as hiking the Tongariro Alpine Crossing in New Zealand, exploring the historic streets
    of Kyoto, and weekend road trips to Napa Valley, while navigating budget constraints that keep long‑term family goals in mind.
  culinary: Betty Crowley delights in crafting experimental dishes like miso‑glazed salmon with crisped basil, sous‑vide pork belly paired with kimchi, and harissa‑infused shakshuka, often sourcing ingredients
    like miso paste, smoked paprika, and fresh heirloom tomatoes at local farmers’ markets for collaborative potluck feasts.
  core: Betty Crowley blends a methodical engineering mindset with vibrant social energy, chasing leadership in tech while juggling hikes, yoga, improv, experimental cooking, and the occasional lower‑back
    ache that reminds her to pace herself.
background:
  cultural: Betty grew up in a middle‑class suburban environment in Northern California, with a family heritage that traces back to Irish and English ancestors. She values the American ideals of individualism,
    hard work, and community service that were emphasized in her upbringing. Celebrating traditional holidays such as Thanksgiving, Fourth of July barbecues, and Christmas with extended family remains important
    to her, while living in Fremont has broadened her cultural perspective through daily exposure to diverse Asian, Latino, and international communities. She incorporates this multicultural awareness by
    participating in local cultural festivals and supporting inclusive initiatives at work.
