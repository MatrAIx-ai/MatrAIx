personas:
  professional: Stephanie Kelliker is a retired data analyst and scientific writer who now curates interdisciplinary art‑science exhibitions at the Cecil County Museum, leveraging her Python and statistical
    modeling expertise alongside a deep knowledge of art history, while applying a meticulous, organized, and skeptically curious approach to every project.
  sports: Stephanie Kelliker enjoys low‑impact fitness through daily nature‑trail walks, weekly senior‑center yoga, and occasional birdwatching hikes, they are a member of the Cecil County Walking Club,
    and they cheer on the Baltimore Ravens and the Baltimore Orioles while also volunteering as a timekeeper for local high‑school track meets.
  arts: Stephanie Kelliker channels her love of visual art by painting watercolors of the Chesapeake Bay inspired by Winslow Homer and John James Audubon, curates museum exhibitions featuring works by regional
    artists like John O’Neill, and they unwind to the piano sonatas of Claude Debussy while sipping tea.
  travel: Stephanie Kelliker plans her trips with a meticulous notebook, preferring leisurely road‑drives to nearby historic towns like Annapolis and the Shenandoah Valley, has already visited Washington
    DC and Dublin for genealogy research, and they dream of a guided birdwatching expedition to the Galapagos Islands.
  culinary: Stephanie Kelliker delights in cooking fresh Chesapeake crabcakes seasoned with Old Bay, herb‑roasted chicken with rosemary and thyme from their garden, and a buttery apple‑cinnamon pie using
    locally grown apples, and they occasionally over‑salt a dish when engrossed in a crossword puzzle.
  core: Stephanie Kelliker, a 79‑year‑old curious polymath, blends watercolor painting, data analysis, and genealogy, navigating life with a skeptical eye, a penchant for meticulous organization, and they
    occasionally forget birthdays.
background:
  cultural: Stephanie was raised in a middle-class, German-Irish American family in the Chesapeake Bay region of Maryland. Her upbringing emphasized education, self-reliance, and community service, with
    Methodist values that encouraged modesty and civic involvement. Growing up in the 1940s and 1950s, she witnessed the post-war economic boom and the early civil-rights movement, experiences that shaped
    her competitive spirit and occasional skepticism of authority. The proximity to the Bay fostered a lifelong appreciation for nature, while frequent visits to regional art galleries and museums nurtured
    her love for the visual arts. These Mid-Atlantic cultural influences continue to inform her identity and outlook.
