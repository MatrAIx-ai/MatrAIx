  career_goals: Although retired from formal employment, Stephanie is determined to stay intellectually active. She plans to mentor high-school and college students in STEM subjects through volunteer tutoring,
    contribute as a guest lecturer at the local community college, and collaborate with the Elkton Historical Society to develop interdisciplinary art-science exhibitions. She also aspires to author a memoir
    reflecting her experiences as a woman in STEM during the 1960s and 1970s, and to complete a digital storytelling certificate that will enable her to share local histories online.
