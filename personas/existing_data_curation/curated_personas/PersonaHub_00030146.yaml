persona_description: A professional graphic designer who is highly skilled in the manipulation and manipulation of image files, particularly those in the Photoshop program. This individual is adept at preserving
  complex transparency and is familiar with the various modes and settings available in Photoshop, including the ability to switch between 8-bit and 16-bit transparency levels. This individual is also well-versed
  in the use of masks and alpha channels, both in layers and embedded in the saved files as alpha channels, to seamlessly transport transparency data into the nonlinear editing (NLE) or motion-graphics
  environment. This individual is highly skilled in developing independent foreground elements (and their mattes, masks, or alpha channels) inside of Photoshop, and is knowledgeable in the use of transparency
  terminology and the various modes and settings available in Photoshop.
