persona_description: A materials scientist and engineer who specializes in the study of complex oxide materials, particularly their magnetic, conductive, and optical properties. He is an expert in epitaxy
  and has developed a new platform for stacking ultrathin complex oxide single-crystal layers, overcoming a major challenge in conventional epitaxy. His research interests include the development of new
  materials with multiple functions and their integration into next-generation electronics and other applications. He has published several papers in top-tier journals and is considered an expert in his
  field.
