  career_goals: Although currently not in the formal workforce, Teresa aims to turn her social strengths into a meaningful role within her community. She hopes to launch a monthly pop‑up art workshop in
    a local community center, volunteer as a cultural liaison for the Brooklyn Historical Society, and eventually become a part‑time docent at a nearby museum. On a personal level, she wants to develop
    stronger organizational habits and learn stress‑reduction techniques so she can sustain long‑term involvement.
