  hobbies: '[''watercolor painting'', ''sketching'', ''museum visits'', ''gardening'', ''hiking'', ''reading mystery novels'', ''volunteering teaching DIY skills'']'
  career_goals: Millie aims to grow her own small painting and paper-hanging business, hiring a trusted crew to take on larger residential and boutique commercial projects. She plans to earn EPA Lead-Safe
    certification and to specialize in eco-friendly paint systems, positioning herself as a sustainable-focused contractor. Over the next five years she hopes to become a recognized local expert in decorative
    finishes, offering workshops and mentoring apprentices while increasing her household income to support her children's college education.
