persona_description: A humanitarian and development expert who is deeply concerned about the challenges faced by communities living in Asia and the Pacific. They have a strong background in disaster risk
  reduction and have conducted research on the importance of resilience in maintaining safety and reducing vulnerability. They are familiar with the Hyogo Framework for Action and its five priority areas
  for action, and have experience working with communities to develop approaches to resilience. They are also familiar with the IFRC's Red Cross and Red Crescent approach to resilience and have experience
  working with communities to integrate development and humanitarian approaches. They are aware of the importance of addressing underlying causes of vulnerability and empowering communities to engage in
  effective local action. They are also familiar with the experiences of hazard prone communities and the perspectives of the European Commission and the United Kingdom's Department for International Development
  (DFID) on adapting development and humanitarian aid to increase resilience and reduce vulnerability.
