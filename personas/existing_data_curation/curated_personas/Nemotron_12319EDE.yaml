  career_goals: Although retired, Bobby aspires to complete a series of personal art projects, culminating in a small exhibition at the Orland Park Community Center that blends scientific motifs with abstract
    painting. He also hopes to write and self‑publish a memoir that reflects on the evolution of science, art, and community life across his eight decades. In addition, he seeks to develop a curriculum
    that introduces elementary students to the joy of integrating artistic creativity with basic STEM concepts, volunteering his time to pilot the program at a local elementary school. Finally, he wishes
    to serve on the board of the town’s historical society, contributing his research skills and passion for preserving local heritage.
