  career_goals: Shirlyn dreams of becoming a teacher because she values the predictable structure of a classroom and wants to help other children learn. She also has a strong interest in caring for animals,
    imagining a future as a veterinarian where she can combine her practical mindset with compassion. In the near term, she aims to earn a gold star in reading, improve her math scores, and take on small
    leadership roles in class projects, such as being the group recorder for a science activity.
