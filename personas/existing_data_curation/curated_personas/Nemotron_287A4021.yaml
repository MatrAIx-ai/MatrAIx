personas:
  professional: Ilon Sankar is an aspiring master automotive technician who blends hands‑on expertise in brake, transmission and hybrid vehicle repair with a competitive drive to be the top tech in Pierre,
    while mentoring apprentices and planning a community‑focused shop that doubles as a training hub.
  sports: Ilon Sankar rides dirt bikes with the Dakota Trail Riders Club, follows the Denver Broncos and Minnesota Wild, competes in local Missouri River bass tournaments, and watches the Indy 500 and Formula 1
    for inspiration on high‑performance engineering.
  arts: Ilon Sankar drums at powwows, reveres the rhythms of traditional drummer Robert Tree Cody, is a fan of Bruce Springsteen’s storytelling lyrics, occasionally binge‑watches the series “Drive to Survive,”
    and finds creative release in restoring vintage car parts as a form of kinetic art.
  travel: Ilon Sankar loves road‑tripping in a hybrid SUV through the Badlands and Custer State Park, has visited Detroit’s Henry Ford Museum and Norway’s Oslo EV Expo, and dreams of touring Japan’s automotive
    hubs of Tokyo and Yokohama to study cutting‑edge electric technology.
  culinary: Ilon Sankar enjoys grilling catfish tacos with fresh cilantro and lime, cooking bison chili seasoned with smoked paprika and jalapeños, and experimenting with homemade BBQ rubs while occasionally
    swapping recipes with fellow mechanics at the shop’s lunch table.
  core: Ilon Sankar is a 24‑year‑old tech‑savvy gearhead who balances competitive ambition with community service, tinkers with vintage cars, respects tribal traditions, and lives for the thrill of the
    open road.
background:
  cultural: Ilon is a member of the Lakota Nation, raised in the Pierre area where tribal traditions are woven into daily life. He grew up hearing stories of the plains, participating in seasonal powwows,
    and learning the value of self-reliance and respect for the land. His family maintains the Lakota language and engages in community ceremonies, fostering a strong sense of identity. This heritage influences
    his work ethic, emphasizing practical skill, communal responsibility, and a balanced respect for both modern technology and ancestral knowledge.
attributes:
  skills: '["Engine diagnostics", "Brake system repair", "Transmission overhaul", "Hybrid vehicle maintenance", "Electrical troubleshooting", "Parts inventory management", "Customer service", "DIY automotive
    workshops"]'
  hobbies: '["Off-road motorcycling", "Fishing", "Scale model car building", "Traditional drum playing", "Powwow participation", "Automotive restoration projects", "Motorsports watching", "Competitive racing
    video games", "Community volunteer work"]'
  career_goals: Ilon aims to become a certified master automotive technician (ASE Master) within the next three years, focusing on electric and hybrid vehicle technology. He plans to earn additional credentials
    in advanced diagnostics and diesel engine repair to broaden his skill set. Long-term, he envisions opening a community-focused auto repair shop in Pierre that offers high-quality service, apprenticeships
    for young American Indian enthusiasts, and mobile maintenance for rural customers. His competitive nature drives him to be recognized as the top technician in the region, and his curiosity fuels a desire
    to stay ahead of emerging automotive trends.
