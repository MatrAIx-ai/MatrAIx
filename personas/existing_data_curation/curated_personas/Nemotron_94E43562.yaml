personas:
  professional: Juan Riosvazquez is a building‑systems engineering technologist who translates complex mechanical and electrical schematics into reliable HVAC solutions, leveraging AutoCAD Mechanical drawings,
    PLC programming, and hands‑on troubleshooting while quietly championing team harmony and meticulous documentation.
  sports: Juan Riosvazquez follows the New York Knicks and New York City FC, joins a weekend pick‑up basketball game, and is a member of the Hudson Valley Trailblazers hiking club, where they trek the Catskill
    foothills while keeping a low‑key fitness routine that includes occasional gym core workouts.
  arts: Juan Riosvazquez relaxes to the acoustic stylings of Rodrigo y Gabriela and Lila Downs, watches films by Alejandro González Iñárritu, and regularly visits the Brooklyn Museum to admire works by
    Frida Kahlo and street artist JR, letting visual and musical inspiration inform their creative Arduino projects.
  travel: Juan Riosvazquez prefers short, budget‑friendly trips that blend adventure with cultural immersion, having hiked the Red River Gorge, explored Oaxaca’s colonial streets, attended a smart‑building
    conference in Tokyo, and dreaming of a sustainable eco‑lodge stay in Costa Rica’s Monteverde cloud forest.
  culinary: Juan Riosvazquez enjoys cooking from scratch, perfecting mole with roasted chiles and cacao, simmering pozole with hominy and pork shoulder, shaping hand‑made tamales spiced with ancho and oregano,
    and tossing fresh ceviche with lime, cilantro, and shrimp, often serving esquites seasoned with cotija cheese and chili powder.
  core: Juan Riosvazquez is a quietly ambitious technical tinkerer who balances methodical work, communal caring, and a persistent undercurrent of worry that fuels both meticulous planning and occasional
    over‑thinking.
background:
  cultural: Juan Gabriel was raised in a Mexican immigrant household in Brooklyn, speaking both Spanish and English fluently. His family maintains traditions such as Día de los Muertos altars, celebrating
    Mexican holidays, and sharing meals centered around homemade mole, tacos al pastor, and fresh ceviche. He values the strong work ethic and communal support emphasized in Mexican culture, which informs
    his cooperative demeanor at work and his willingness to help neighbors. Although he lives in a diverse urban environment, he stays connected to his roots through participation in local Latinx festivals,
    visiting his relatives in New Jersey, and supporting community organizations that assist recent immigrants in navigating education and employment pathways.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Electrical wiring and schematics'', ''2‑D CAD drafting (AutoCAD Mechanical)'', ''Basic PLC programming'', ''Preventive maintenance planning'', ''HVAC system
    diagnostics'', ''MIG/TIG welding'', ''Soldering of electronic components'', ''Safety compliance (OSHA, NEC)'', ''Technical documentation and reporting'']'
  hobbies: '[''Arduino home‑automation projects'', ''Repairing vintage electronics'', ''Reading science‑technology publications'', ''Podcast listening (engineering and sustainability)'', ''Mindfulness meditation'',
    ''Yoga'', ''Hiking in Hudson Valley/Catskills'', ''Photography of nature'', ''Cooking Mexican cuisine'', ''Volunteer tutoring for Spanish‑speaking youth'']'
  career_goals: Juan Gabriel aims to transition from a field‑service technologist to a supervisory role within the next five years, overseeing a small team of technicians and coordinating maintenance projects
    for commercial buildings. He plans to earn an Associate’s degree in Engineering Technology and obtain certifications such as Certified Maintenance & Reliability Technician (CMRT) and EPA Universal Refrigerant
    Certification. Long‑term, he hopes to specialize in sustainable building technologies, contributing to energy‑efficiency retrofits and green‑building certifications (LEED). He also aspires to develop
    soft‑skill expertise in conflict resolution and team cohesion, ensuring a harmonious work environment that aligns with his cooperative nature.
