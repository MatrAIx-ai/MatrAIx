personas:
  professional: A budding tech tinkerer, Richard Forbes channels their curiosity into designing Arduino and Raspberry Pi projects, balancing innovative ideas with pragmatic problem‑solving, while they often
    act spontaneously, leading to last‑minute modifications and occasional missed deadlines.
  sports: An outdoor‑oriented youth, Richard Forbes hikes the Yakima River Canyon with the local Mountain Trail Club, follows the Yakima Pippins baseball team, and they play informal soccer matches with
    a small group of classmates at their middle school.
  arts: A visual storyteller, Richard Forbes captures insects and wildflowers with a DSLR, sketches nature scenes inspired by John James Audubon, reads Brandon Sanderson’s fantasy epics, and they enjoy
    the atmospheric sounds of Tame Impala while editing their short stories.
  travel: A curious explorer, Richard Forbes has camped in the Cascades, visited Seattle’s Museum of Pop Culture, dreams of wandering the streets of Tokyo to see cutting‑edge tech, and they prefer spontaneous
    weekend road trips over meticulously planned vacations.
  culinary: A budding kitchen experimenter, Richard Forbes loves whipping up homemade ramen with miso broth, topping it with fresh bok choy, shiitake mushrooms, and a soft‑boiled egg, while they also snack
    on trail mix made of almonds, dried cranberries, and dark chocolate.
  core: Richard Forbes is a solitary, curiosity‑driven teen who blends tech tinkering, nature observation, and storytelling into a uniquely inventive, albeit sometimes disorganized, worldview, and they
    often find solace in quiet reflection.
background:
  cultural: Richard grew up in a predominantly White, agricultural community in Yakima, Washington. His family has deep ties to the region’s fruit‑growing and hop‑producing heritage, and he has participated
    in local 4‑H and farm‑related events. The Pacific Northwest’s emphasis on self‑reliance, environmental stewardship, and community fairs shapes his outlook. While most of his immediate cultural experience
    is rural American, school curricula expose him to the broader cultural mosaic of Yakima County, including the histories of the Yakama Nation and a growing Hispanic farming community, fostering a modest
    awareness of cultural diversity.
attributes:
  skills: '["Basic programming (Scratch, Python fundamentals)", "Digital media editing (photo and video)", "DIY electronics and hardware troubleshooting", "Bike and tool maintenance", "Seasonal agricultural
