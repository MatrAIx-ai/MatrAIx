  hobbies: '["DIY electronics and robotics projects", "Strategic video gaming (e.g., Civilization, Minecraft)", "Reading sci‑fi and fantasy books", "Hiking and bird‑watching", "Nature photography", "Sketching
    and drawing", "Creative writing and journaling"]'
  career_goals: Richard hopes to blend his curiosity for technology with the practical needs of his community. He aims to study engineering, preferably mechanical or robotics, with a focus on sustainable
    agriculture equipment. In the short term he plans to take advanced STEM courses in high school, join a local robotics club, and earn a summer apprenticeship on a farm that uses automated harvesting
    tools. Long‑term, he envisions designing affordable, eco‑friendly machines that help small farms increase efficiency while staying grounded in real‑world constraints.
