  hobbies: '["Gardening", "Reading Historical Fiction", "Knitting", "Birdwatching", "Walking on Trails", "Cooking", "Volunteering at Food Bank", "Bible Study"]'
  career_goals: Candice aims to advance to an HR Manager role within her organization, eventually stepping into a senior HR Director position that oversees multiple sites across the region. She plans to
    earn the SHRM Senior Certified Professional (SHRM‑SCP) credential, mentor junior HR colleagues, and lead initiatives that enhance work‑life balance, employee well‑being, and inclusive workplace culture.
    In the longer term, she envisions consulting for small businesses in her community, helping them build fair and effective HR practices.
