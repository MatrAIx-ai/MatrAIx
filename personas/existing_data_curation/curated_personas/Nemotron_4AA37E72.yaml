personas:
  professional: Chue Cheung, a seasoned aircraft maintenance professional with expertise in airframe structural repair, hydraulic and pneumatic servicing, avionics troubleshooting, and non‑destructive testing,
    leverages their methodical, organized nature and calm under pressure to lead junior technicians and coordinate seamlessly with pilots, engineers, and airport operations while meticulously adhering to
    FAA regulations and CMMS protocols.
  sports: Chue Cheung, a dedicated cyclist, spends weekend mornings riding the Brooklyn waterfront bike path and participates in the local New York Road Runners club’s 5K events, while cheering on the New
    York Knicks basketball team and the New York Mets baseball team, and they occasionally join a community softball league for friendly competition.
  arts: Chue Cheung, an avid lover of traditional calligraphy and modern cinema, practices brush‑stroke calligraphy after work, attends screenings of Wong Kar‑wai films and classic Hollywood dramas starring
    Meryl Streep, and enjoys listening to jazz pianist Herbie Hancock while model‑building, finding that both art forms balance their analytical mind with creative serenity.
  travel: Chue Cheung, a meticulous planner, prefers purpose‑driven trips that blend aviation history with cultural immersion, such as a guided tour of the Smithsonian National Air and Space Museum in Washington,
    D.C., a weekend retreat to the historic aviation town of Kitty Hawk, North Carolina, and occasional family visits to Hong Kong during Lunar New Year to reconnect with extended relatives.
  culinary: Chue Cheung, a competent home chef, frequently prepares classic Cantonese dim sum like shui jo (shrimp dumplings) and char siu (roast pork) using fresh ginger, scallions, and soy sauce, while
    also exploring New York’s diverse food scene by sampling artisanal sourdough pizza from Lombardi’s and savoring Ethiopian injera at local restaurants, balancing their love for tradition with an adventurous
    palate.
  core: Chue Cheung, a 46‑year‑old aircraft maintenance veteran, fuses meticulous precision with a quiet curiosity, channeling their love for model aircraft, calligraphy, and community mentorship into a
    steady, harmony‑driven life that balances careful budgeting, disciplined health routines, and a steady stream of Brooklyn cycling adventures.
background:
  cultural: Chue was born to immigrant parents from Hong Kong and grew up in a bilingual Cantonese‑English household in Brooklyn. His upbringing emphasized respect for elders, a strong work ethic, and the
    value of community harmony—principles that continue to shape his professional reliability and cooperative nature. While he maintains close ties to his heritage through family traditions, holiday celebrations,
    and the local Chinatown community, he also embraces the multicultural fabric of New York City, blending Eastern values of humility and collective well‑being with Western individual initiative.
attributes:
  skills: '[''Airframe structural repair'', ''Hydraulic and pneumatic system maintenance'', ''Avionics troubleshooting'', ''Non‑destructive testing (NDT)'', ''Technical documentation and compliance (FAA)'',
