  hobbies: '[''Scale model aircraft building'', ''Woodworking'', ''Cycling along Brooklyn waterfront'', ''Cooking Cantonese cuisine'', ''Volunteering in youth STEM programs'', ''Participating in cultural
    festivals'', ''Reading aerospace journals'', ''Calligraphy'']'
  career_goals: Chue aims to earn his Airframe and Powerplant (A&P) certification and transition into a lead maintenance supervisor role at a major airline operating out of the New York area. Over the next
    five years, he hopes to spearhead a safety‑innovation program that integrates emerging electric‑propulsion maintenance techniques. In the longer term, he envisions opening a boutique aircraft‑maintenance
    workshop that offers apprenticeships for underserved communities, blending his technical expertise with a commitment to mentorship and community development.
