personas:
  professional: Rosalina Rojas, a 63‑year‑old meat‑processing veteran whose three‑decade track record in precise butchering, HACCP compliance, and staff mentorship combines with a methodical, compassion‑driven
    leadership style, positions them to reshape safety standards as they move toward a senior supervisory role.
  sports: Rosalina Rojas, a devoted fan of the Dallas Cowboys and the Texas Rangers who incorporates daily neighborhood walks, weekly senior‑center bowling sessions, and seasonal backyard soccer games with
    grandchildren into their fitness routine, embraces a low‑impact but consistent approach to staying active.
  arts: Rosalina Rojas, whose evenings are colored by a love of Frida Kahlo’s vibrant paintings, the lively horns of Mariachi Vargas de Tecalitlán and corridos by Vicente Fernández, and a passion for quilting
    intricate talavera‑inspired patterns, weaves cultural heritage into both their home décor and community cultural festival participation.
  travel: Rosalina Rojas, who plans her modest travel adventures with the same precision she applies to garden planting, enjoys annual road trips to the Texas Hill Country wineries, weekend family reunions
    in Oaxaca, and dreams of a cultural immersion tour of San Miguel de Allende, balancing a fixed travel budget with the occasional splurge on a historic boutique hotel.
  culinary: Rosalina Rojas, a seasoned home chef who transforms garden‑grown cilantro, epazote, and roasted chilies into authentic tamales, pozole, and carne asada, meticulously follows traditional recipes
    while occasionally experimenting with mole negro, and delights in serving family‑style feasts that blend precise technique with heartfelt hospitality.
  core: Rosalina Rojas blends meticulous organization, compassionate mentorship, and a lifelong devotion to traditional cooking and community, turning every day into a carefully seasoned mix of structure
    and warmth that they cherish.
background:
  cultural: Rosalina is a first‑generation Mexican‑American whose grandparents immigrated from Jalisco. She grew up in a bilingual household, celebrating Día de los Muertos, Cinco de Mayo, and other Mexican
    holidays with colorful altars, festive meals, and music. Her Catholic faith has been a cornerstone of her life, guiding her community involvement and family rituals. In Garland, Texas, she blends Mexican
    culinary traditions with Texan influences, maintaining strong ties to extended family both locally and in Mexico through regular calls and annual visits. This rich cultural tapestry shapes her values
    of family loyalty, hospitality, and a deep respect for hard work.
attributes:
  skills: '["butchery", "meat processing", "food safety compliance", "HACCP certification", "inventory management", "training and mentoring", "equipment maintenance", "quality control", "bilingual communication
    (Spanish/English)", "workplace safety protocols"]'
  hobbies: '["gardening", "traditional Mexican cooking", "quilting", "volunteering at food banks", "walking", "reading historical novels", "listening to mariachi music", "attending community cultural festivals",
    "playing dominoes", "DIY home improvement"]'
  career_goals: Rosalina aims to step into a senior supervisory or lead trainer role within the next two years, leveraging her extensive experience to shape safety and quality standards across the plant.
    She plans to obtain her ServSafe certification to formalize her food‑safety expertise and to develop a structured onboarding program for apprentices. Long‑term, she hopes to mentor younger workers in
    the community and possibly launch a small specialty meat market that highlights traditional Mexican cuts and recipes, allowing her to blend her professional skills with cultural heritage while staying
    connected to her local neighborhood.
