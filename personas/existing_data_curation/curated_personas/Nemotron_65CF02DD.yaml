    management'', ''Integrating art therapy concepts into patient care'', ''Quality improvement and evidence‑based practice'', ''Leadership and mentorship'']'
  hobbies: '[''Surfing'', ''Coastal hiking'', ''Street photography'', ''Acoustic guitar'', ''Cooking Mexican cuisine with modern twists'', ''Attending art exhibitions'', ''Community mural projects'', ''Reading
    non-fiction (psychology, philosophy, healthcare)'', ''Mindfulness meditation'', ''Volunteering at community garden'']'
  career_goals: Sergio aims to broaden his impact on underserved Mexican‑American communities by establishing a community‑based health clinic in the Central Coast that integrates conventional primary care
    with culturally resonant wellness programs, including art‑therapy workshops and nutrition education. He plans to complete a Doctor of Nursing Practice (DNP) degree within the next three years, earn
    certification as a Psychiatric‑Mental Health Nurse Practitioner, and eventually assume a clinic director role. Additionally, he aspires to develop telemedicine services that reach rural patients, publish
    articles on culturally sensitive care, and mentor the next generation of nurse practitioners.
