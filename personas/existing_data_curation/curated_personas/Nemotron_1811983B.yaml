personas:
  professional: Libardo Monet, an aspiring junior coder and budding astronomer, merges quiet curiosity with practical problem‑solving by building elaborate LEGO models and creating interactive Scratch projects
    that blend imagination and methodical design.
  sports: Libardo Monet enjoys watching the Tennessee Titans and Nashville Sounds while quietly practicing soccer drills with the Nashville Soccer Academy Under‑9 team during early‑morning sessions that
    suit their preference for solitary, focused activity.
  arts: Libardo Monet weaves imaginative narratives from fantasy novels into detailed animal sketches, finds calm listening to Yo‑Yo Ma’s cello suites and traditional mariachi tunes, and channels that inspiration
    into intricate LEGO creations.
  travel: Libardo Monet dreams of weekend stargazing trips to Great Smoky Mountains National Park, has explored Asheville’s folk festivals, and hopes to journey to Oaxaca to witness vibrant Día de los Muertos
    celebrations, balancing family budget constraints with a yearning for immersive cultural experiences.
  culinary: Libardo Monet, a novice cook, delights in helping prepare tamales and arroz con pollo with fresh herbs from the family garden, assembles homemade guacamole with ripe avocados and tomatoes, and
    proudly masters perfectly toasted pepperoni pizza slices.
  core: Libardo Monet is a quiet, curiosity‑driven 9‑year‑old who builds LEGO galaxies, sketches wildlife, saves pennies for a telescope, yet often drags out homework after late‑night stargazing.
background:
  cultural: Libardo is raised in a Hispanic/Latino household with family origins in Mexico, where Spanish is spoken alongside English at home. His family celebrates cultural traditions such as Día de los
    Muertos and Las Posadas, and they enjoy foods like tamales and arroz con pollo. These customs emphasize respect for elders, community cooperation, and a love for music and storytelling, which shape
    his considerate and cooperative nature. Living in Nashville, North Carolina, he blends his Latino heritage with the local Southern community, participating in school multicultural events and appreciating
    both cultural influences.
