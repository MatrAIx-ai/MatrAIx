persona_description: A public historian and radical intellectual who is deeply interested in the meaning of black group identity as interpreted through the stories and experiences of African American people
  over time. He has a passion for exploring the larger-than-life figure of Malcolm X, a prophet who "spoke the uncomfortable truths that no one else had the courage or integrity to broach." Marable is known
  for his meticulous research and methodical approach to history, and he is eager for the discussion that his book is bound to set off.
