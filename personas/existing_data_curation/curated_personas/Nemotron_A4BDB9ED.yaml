  hobbies: '[''Visiting art museums'', ''Attending gallery openings'', ''Listening to jazz and gospel music'', ''Reading biographies and history'', ''Gardening'', ''Cooking Southern-inspired meals'', ''Volunteer
    health‑literacy tutoring'', ''Playing chess'', ''Book club participation'', ''Writing poetry'']'
  career_goals: Even in his late seventies, John remains focused on leaving a lasting impact on the health‑care system and his community. He aims to establish a mentorship fellowship that supports young
    Black professionals pursuing careers in health administration, providing them with guidance and networking opportunities. John seeks to expand his pilot arts‑in‑recovery program to multiple inpatient
    units, rigorously measuring its effect on patient satisfaction and healing outcomes. He plans to partner with local public‑health agencies to broaden chronic‑disease screening and education in Cincinnati’s
    underserved neighborhoods, targeting hypertension and diabetes disparities. Additionally, John aspires to author a memoir that chronicles the evolution of health‑care delivery from the 1970s to today,
    highlighting the intersection of business acumen and compassionate service. He also intends to endow a scholarship for minority students studying business or health‑administration at regional universities,
    reinforcing his commitment to equity and education.
