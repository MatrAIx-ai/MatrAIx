personas:
  professional: John Carmon is a seasoned health services executive who leverages Lean Six Sigma, strategic budgeting, and data-driven planning to transform hospital operations while mentoring emerging
    administrators through a structured fellowship and integrating arts programs that uplift patient experience.
  sports: John Carmon is a lifelong Cincinnati Reds fan who attends Sunday games when possible, plays weekly pickleball at the local YMCA, and joins a senior walking club that meets at Eden Park to keep
    active during the mild Ohio seasons.
  arts: John Carmon regularly visits the Cincinnati Art Museum, attends live performances by jazz legends such as Miles Davis and local ensembles at The Blue Wisp, and finds inspiration for poetry in the
    works of visual artists like Georgia O'Keeffe and contemporary muralists.
  travel: John Carmon prefers carefully planned itineraries that balance cultural immersion and comfort, having explored New Orleans for its music heritage and Florence for Renaissance art, while keeping
    future trips to Paris and the National Gallery in London on a well-budgeted wish list.
  culinary: John Carmon enjoys Southern-inspired home cooking, perfecting dishes like tomato-basil gazpacho, kale-collard greens sautéed with smoked ham, and herb-crusted baked fish served alongside cornbread,
    drawing on fresh garden harvests.
  core: John Carmon blends a disciplined, data‑driven mind with a quiet love for jazz, garden-fresh meals, and mentorship, while quietly battling a stubborn habit of collecting too many books and refusing
    to declutter.
background:
  cultural: John is an African American who grew up during the civil‑rights era, witnessing the transformative power of community activism and education. Raised in a close‑knit Black neighbourhood in the
    Midwest, he internalized values of resilience, mutual support, and a deep respect for learning, which guided his pursuit of a graduate degree in business. He maintains lifelong ties to his local Black
    church, where he has served on health‑ministry committees and celebrates cultural milestones such as Juneteenth and Kwanzaa with family and friends. His heritage informs his professional commitment
    to reducing health disparities that disproportionately affect Black residents in Cincinnati, driving his focus on equity‑focused health initiatives. John also embraces African American artistic traditions—jazz,
    blues, and visual arts—both as personal enjoyment and as inspiration for community health programming. He proudly identifies with a lineage that has contributed to the city’s cultural fabric and aims
    to mentor future generations through advocacy and education.
attributes:
  skills: '[''Strategic planning'', ''Financial budgeting and analysis'', ''Regulatory compliance (HIPAA, CMS)'', ''Operational oversight'', ''Quality improvement (Lean Six Sigma)'', ''Patient safety initiatives'',
