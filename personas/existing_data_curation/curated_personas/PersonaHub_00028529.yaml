persona_description: A historian or film historian who is interested in the history of India and its transition to independence, particularly the events leading up to the Mountbatten’s arrival in India
  and the subsequent negotiations that led to the granting of independence. They are familiar with the archives of the India Office and have a keen interest in the role of the War Staff in the decision-making
  process. They have a particular interest in the strategies and decisions made during the negotiations and the impact of these decisions on India's future. They are also interested in the personal stories
  and experiences of the key officials involved in the negotiations.
