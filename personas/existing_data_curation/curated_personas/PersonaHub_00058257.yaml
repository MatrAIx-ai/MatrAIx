persona_description: A policy analyst who specializes in the analysis of energy policy and regulation. This person is knowledgeable in the fields of renewable energy, particularly wind and natural gas power,
  and has experience with the EIA's Clean Power Costs calculations. They are familiar with the potential for off-site infrastructure costs and the need for new NGCT peaking power capacity to maintain stable
  power grid operations. They are also aware of the importance of paying all shutdown coal plant stranded capital expenses and the potential for increased costs in replacing all existing coal power with
  new natural gas and wind power.
