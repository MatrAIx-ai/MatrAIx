personas:
  professional: Evelyn Brunson, an aspiring young engineer, channels her love for step‑by‑step LEGO builds and mystery novels into a budding fascination with how things work, often mapping out household
    objects with crayons before disassembling them, and they dream of one day designing a perfectly organized playground.
  sports: Evelyn Brunson, a dedicated member of the Birmingham Youth Soccer Club, enjoys weekly practices that blend teamwork with the excitement of cheering for the Alabama Crimson Tide during football
    season, and they often wear a junior New Orleans Saints cap for good luck.
  arts: Evelyn Brunson, a budding pianist who practices scales with the same precision she applies to her LEGO instructions, also spends free time sketching scenes from Disney movies like 'Moana' and listening
    to classic piano pieces by Beethoven while humming Taylor Swift choruses, merging structured music with imaginative visuals.
  travel: Evelyn Brunson loves family road trips that follow a clear itinerary, such as the annual Mardi Gras parade visit to Mobile and weekend camping at Oak Mountain State Park, and they prefer destinations
    with predictable schedules over spontaneous beach outings.
  culinary: Evelyn Brunson delights in helping her mom bake chocolate chip cookies, savoring the buttery crumble of buttermilk biscuits and the crispy crunch of fried chicken at Sunday gatherings, and they
    often experiment by adding a dash of cinnamon to the cookie dough for a personal twist.
  core: Evelyn Brunson blends a love for structured play, diligent saving, and Southern hospitality into a reliable, slightly sticker‑obsessed eight‑year‑old who never misses a soccer practice or a piano
    scale, yet sometimes forgets to water her houseplants.
background:
  cultural: Evelyn is a White Southern American growing up in Birmingham, Alabama. Her family participates in local church activities, attending Baptist Sunday school where she learns community values and
    Southern hospitality. She celebrates regional traditions such as Mardi Gras parades in nearby Mobile and enjoys classic Southern foods like biscuits and fried chicken at family gatherings. The community
    emphasizes close family ties, respect for elders, and a love of outdoor activities, all of which shape Evelyn’s everyday life and outlook.
