  hobbies: '[''Reading adventure/mystery books'', ''Drawing and coloring'', ''LEGO building'', ''Soccer practice'', ''Piano lessons'', ''Baking cookies with family'', ''Nature walks'', ''Collecting stickers'']'
  career_goals: Evelyn imagines a future where she can help others in a structured, caring role. She dreams of becoming a teacher because she loves sharing knowledge and creating organized learning environments.
    She also expresses interest in caring for animals, wondering if she might one day be a veterinarian. In the meantime, she hopes to volunteer at her school library and participate in community service
    projects that let her use her organizational skills.
