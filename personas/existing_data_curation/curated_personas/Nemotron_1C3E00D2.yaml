personas:
  professional: Administrative veteran Lori Perez, a seasoned clerk in Alamosa County’s small-town government office, leverages three decades of mastery in filing, scheduling, and QuickBooks to keep operations
    humming, while their love of routine leads to meticulous record‑keeping, their occasional disorganization pushes them to adapt quickly, and their competitive streak drives them to exceed performance
    benchmarks.
  sports: Energetic Lori Perez joins the Monte Vista Walking Club’s Saturday trail hikes, roots for the Denver Broncos football team and the Colorado Rockies baseball club during seasonal games, and incorporates
    light resistance training to manage knee osteoarthritis while also competing in bridge tournaments at the senior center for mental stamina.
  arts: Artistically inclined Lori Perez sings in St. Mary’s choir with the tender strains of John Denver’s “Take Me Home, Country Roads,” weaves scarves while listening to Etta James, and delights museum
    visitors with stories about Albert Bierstadt’s landscapes, a blend of harmonious creativity and competitive presentation.
  travel: Travel‑curious Lori Perez favors relaxed road trips to Colorado’s Great Sand Dunes National Park and the historic town of Durango, plans outings around church holidays to accommodate their pension
    budget, yet dreams of a pilgrimage to San Antonio’s River Walk to savor its famed tortilla soup.
  culinary: Culinary enthusiast Lori Perez excels at baking a classic apple‑cinnamon pie and a hearty shepherd’s pie using fresh carrots, potatoes, and home‑grown tomatoes, crafts weekly quinoa‑black bean
    salads seasoned with cilantro and lime, and loves swapping recipes at community potlucks while sharing their garden‑fresh bounty.
  core: Routine‑loving yet sociable retiree Lori Perez channels a competitive spirit into community service, finds solace in knitting and gardening, and navigates life’s anxieties with the blend of prudent
    budgeting and spontaneous generosity.
background:
  cultural: 'Lori is a second‑generation resident of Monte Vista, Colorado, raised in a family with deep roots in the San Luis Valley. Though identified as white, her Perez surname reflects the blend of
    Anglo and Hispanic heritage common in the region. She grew up with the values of small‑town western America: self‑reliance, community involvement, and a respect for the outdoors. Her upbringing emphasized
    traditional family roles, church participation, and seasonal community events such as the annual Fiesta Days. This cultural mix influences her practical outlook, love for routine, and strong commitment
    to local institutions and neighborly support.'
