  career_goals: As she approaches retirement age, Lori aims to transition into a part‑time senior administrative consultant role, offering her expertise to local nonprofits and the Alamosa County government
    on streamlining office procedures. She plans to earn the Certified Administrative Professional (CAP) credential within the next year to formalize her skills. In the longer term, she hopes to mentor
    a younger generation of office staff, perhaps leading a small training program at the community college. Maintaining financial stability is a priority, so she seeks a modest raise or stipend that will
    supplement her pension. While she values routine, she also wishes to introduce a modest wellness initiative—such as a weekly mindfulness session—for office staff to help manage stress, reflecting her
    own experience with anxiety.
