persona_description: A sanitation engineer with a passion for developing innovative solutions to address the sanitation crisis. Kellner and his team at WASAZA are dedicated to creating a toilet that separates
  human waste into two components, urine and solid matter, so they can be processed into two different forms of manure. They are piloting a system called a "fertiliser-producing toilet" which focuses on
  re-use of solid waste. This toilet, once integrated into gardening, will never fill up.
