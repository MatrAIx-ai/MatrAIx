personas:
  professional: Devante Tigner, a 22‑year‑old aspiring IT support specialist, leverages a solid grounding in hardware troubleshooting, network configuration, and basic scripting to translate tech jargon
    into plain language for end‑users, blending curiosity‑driven exploration of emerging tools with a pragmatic, organized approach that makes them the dependable problem‑solver friends call on, even when
    tight deadlines stir their anxiety.
  sports: Devante Tigner hits the courts at the Nashville Community Center for pick‑up basketball, where they sharpen quick‑reaction skills while cheering on the Memphis Grizzlies during the NBA season
    and the Nashville Predators in the NHL, balancing high‑energy cardio with occasional Sunday jogs around the local park.
  arts: Devante Tigner immerses themselves in Nashville’s vibrant live‑music scene, regularly catching R&B sets by H.E.R., hip‑hop showcases featuring local acts like D Smoke, and occasional performances
    at the historic Ryman Auditorium, which fuels their creative thinking and provides social connection.
  travel: Devante Tigner prefers cost‑effective road trips to musical hubs like New Orleans and Austin, loves spontaneous playlists for the drive, but dreams of a budget‑friendly backpacking stint through
    Europe’s vibrant capital cities such as Berlin and Barcelona, while balancing limited savings and a desire to stay close to family.
  culinary: Devante Tigner, a self‑taught home chef, perfects a grandmother‑style collard greens recipe seasoned with smoked turkey, apple cider vinegar, and a pinch of red pepper flakes, experiments week‑by‑week
    with shrimp and grits, and enjoys swapping their own creations for a plate of Nashville hot chicken at local eateries.
  core: Devante Tigner is a tech‑savvy, music‑obsessed 22‑year‑old who balances an insatiable curiosity for emerging tools with a restless mind that jumps between gaming marathons, basketball pick‑ups,
    and nightly collard greens experiments, all while wrestling with occasional anxiety and a habit of leaving the lights on.
background:
  cultural: Devante is an African‑American raised in Nashville, steeped in Southern Black cultural traditions. His upbringing includes regular church attendance, strong family ties, and community gatherings
    that celebrate gospel music, storytelling, and soul food. He identifies with the city’s historic Black neighborhoods and participates in local cultural festivals that honor African‑American heritage.
    This cultural backdrop informs his values of resilience, communal support, and a love for music, all of which shape his outlook and daily life.
