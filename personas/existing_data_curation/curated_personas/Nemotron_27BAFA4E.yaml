  hobbies: '[''Listening to hip‑hop and R&B music'', ''Attending live concerts'', ''Playing basketball'', ''Video gaming (strategy/RPG)'', ''Cooking Southern cuisine'', ''Tech tutoring/volunteering'', ''Exploring
    new tech gadgets'']'
  career_goals: He aims to secure a full‑time entry‑level IT support position within a reputable company in Nashville, where he can apply his practical curiosity to solve real‑world problems. In the medium
    term, Devante plans to pursue a bachelor's degree in Computer Science or Information Systems to broaden his expertise, with a long‑term ambition of becoming a network administrator or a cybersecurity
    analyst. He also hopes to start a side venture offering tech tutoring and device repair services for the local community, enabling him to give back while achieving financial stability. Managing stress
    and maintaining work‑life balance are central to his career vision.
