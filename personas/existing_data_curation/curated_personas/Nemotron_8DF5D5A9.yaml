  hobbies: '[''Watercolor painting'', ''Photography'', ''Hiking'', ''Gardening (vegetable and herb)'', ''Cooking eclectic dishes'', ''Visiting art galleries and museums'', ''Volunteering for STEM outreach'',
    ''Reading contemporary fiction and science non‑fiction'', ''Playing piano (casual)'', ''Attending community theater workshops'']'
  career_goals: Angela aims to progress into senior leadership, such as Director of Operations or Vice President of Innovation, where she can steer large‑scale transformation initiatives and mentor the
    next generation of engineers and managers. She intends to deepen her expertise in emerging technologies, earn a Lean Six Sigma Black Belt, and possibly pursue an executive MBA to broaden her strategic
    perspective. Parallel to her professional aspirations, she is passionate about championing diversity in STEM, especially supporting programs for girls and underrepresented groups in the Boston‑West
    Townsend region. Ultimately, she wants to leave a legacy of modernized, sustainable processes and a culture that values both analytical rigor and creative exploration.
