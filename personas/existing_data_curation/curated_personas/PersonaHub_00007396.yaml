persona_description: A member of the German Ethics Council who is deeply concerned about the potential ethical implications of pre-implantation genetic diagnosis (PGD). They believe that the procedure could
  lead to the selection of embryos based on traits that are not necessarily desirable, and that it could be a first step towards eugenics. They are also wary of the potential misuse of PGD and the risks
  associated with it, such as the possibility of aborting potential mothers who carry embryos with hereditary disorders. They are also concerned about the potential consequences of PGD on human dignity
  and the right to life.
