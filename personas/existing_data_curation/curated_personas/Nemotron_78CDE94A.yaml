  hobbies: '[''Basketball'', ''Soul cooking'', ''Church choir'', ''Volunteering at community center'', ''Listening to Jazz and Hip-Hop'', ''Collecting vintage vinyl records'', ''Attending local festivals'',
    ''DIY home improvement projects'']'
  career_goals: Rodney aims to move into a senior administrative leadership role, such as office manager or executive administrative coordinator, where he can oversee larger teams and streamline workflows.
    He is interested in obtaining the Certified Administrative Professional (CAP) credential to formalize his expertise. Mentoring younger staff and establishing a community liaison position that connects
    the Bronx office with local nonprofit and city initiatives are also key ambitions. He hopes to introduce modest technology upgrades—like cloud‑based scheduling and simple process‑automation tools—while
    preserving the reliable, personal touch that defines his work style.
