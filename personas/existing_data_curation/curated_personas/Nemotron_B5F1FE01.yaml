personas:
  professional: John Knight, a retired small‑business manager with four decades of corporate administration experience, now channels their meticulous budgeting and project‑coordination expertise into mentoring
    aspiring entrepreneurs at the local Small Business Development Center, offering data‑driven spreadsheets and calm conflict‑resolution advice.
  sports: John Knight follows the Cleveland Browns, Guardians, and Cavaliers with steady devotion, participates in a senior walking club that meets thrice weekly at the Cuyahoga Valley, and enjoys occasional
    bowling nights at the local league, balancing low‑impact exercise with loyal fandom.
  arts: John Knight finds solace in listening to folk legends like Woody Guthrie and modern storytellers such as John Prine, attending the Cleveland Orchestra’s seasonal concerts, and browsing exhibits
    at the Akron Art Museum, where their appreciation for both classic and contemporary works informs their creative woodworking projects.
  travel: John Knight prefers organized, short‑haul trips, having taken rail journeys to Chicago and a guided tour of Washington, D.C., while dreaming of a winter visit to a German Christmas market and
    a pilgrimage to Dublin to connect with family traditions, all within a budget-conscious itinerary that respects their mobility.
  culinary: John Knight enjoys preparing hearty Midwestern dishes like beef stew, cabbage rolls, and apple crisp using fresh vegetables from their garden, skillfully seasoning with caraway and sage, and
    relishes occasional meals at the local diner where the signature fried chicken is a beloved indulgence.
  core: John Knight blends disciplined organization, community‑centric kindness, and a quiet love for garden‑fresh meals into a steady, purpose‑driven rhythm that fuels their mentorship, frugal finances,
    and modest adventures.
background:
  cultural: 'John is a lifelong Midwesterner of primarily German‑Irish descent, raised in post‑war Akron, Ohio. His upbringing reflects classic Midwestern values: modesty, self‑reliance, community service,
    and a respect for order and predictability. He was brought up in a Protestant tradition, which emphasized cooperation and caring for others, shaping his considerate and harmony‑seeking disposition.
    The cultural environment of the Rust Belt—with its strong emphasis on hard work and civic engagement—has deeply informed his practical outlook and his commitment to giving back to his local community.'
