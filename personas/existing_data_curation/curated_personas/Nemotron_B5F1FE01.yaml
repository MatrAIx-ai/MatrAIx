  career_goals: Although retired, John wishes to remain active and purposeful. His primary goals are to mentor aspiring entrepreneurs at the local Small Business Development Center, lead budgeting workshops
    for seniors at the community center, and continue strengthening his health through regular walks and preventive care. He also aims to preserve the practical knowledge he has accumulated by writing a
    concise guide on household finance management for his grandchildren and other younger relatives.
