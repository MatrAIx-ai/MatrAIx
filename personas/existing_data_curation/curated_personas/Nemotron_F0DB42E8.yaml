personas:
  professional: Markus Aguilar, a senior civil engineer with thirty‑plus years in structural design, water resources management, and coastal resilience, channels his imaginative spark and sociable leadership
    into community‑focused projects that weave heritage‑infused mosaics into hurricane‑proof infrastructure, though his spontaneous work style sometimes clashes with tight deadlines.
  sports: Markus Aguilar follows the Miami Heat and Miami Dolphins passionately, plays weekend beach volleyball with the Broward Beach Volleyball Club, sails with the South Florida Sailing Club during the
    winter months, and keeps fit through daily sunrise jogs along the Atlantic, balancing competitive spirit with community camaraderie.
  arts: Markus Aguilar immerses themselves in abstract painting inspired by Pablo Picasso and Jackson Pollock, strings the tres while echoing the rhythms of vibrant Caribbean folk music, and attends salsa
    nights where they channel the energy of charismatic performers on screen, blending visual and musical artistry into daily life.
  travel: Markus Aguilar prefers loosely planned coastal getaways, having already sailed to the Bahamas and explored historic streets abroad, while dreaming of photographing sunrise over Barcelona’s beaches
    and trekking volcanic landscapes in Iceland, balancing a modest retirement budget with occasional splurges on culturally immersive trips.
  culinary: Markus Aguilar, an adept home cook, whips up classic ropa vieja and arroz con pollo seasoned with cumin, cilantro, and a squeeze of lime, experiments with plantain mofongo for family gatherings,
    and delights in occasional fine‑dining outings where they savor seafood paella with saffron, reflecting a palate that blends comfort flavors with occasional culinary adventure.
  core: Markus Aguilar is a visionary civil engineer and passionate artist who channels community spirit into resilient infrastructure, yet often wrestles with deadline anxiety and spontaneous spending
    on cultural experiences.
background:
  cultural: Markus is a first‑generation American of Cuban descent, fluent in both Spanish and English. Growing up in a close‑knit immigrant household in South Florida, he internalized the Cuban values
    of family loyalty, community solidarity, and a love for music and art. These cultural threads influence his professional ethos, prompting him to integrate Cuban artistic motifs into engineering projects
    and to prioritize inclusive, community‑oriented solutions. He regularly celebrates Cuban holidays, participates in local Hispanic organizations, and serves as a cultural bridge between his heritage
    and the diverse population of Broward County.
