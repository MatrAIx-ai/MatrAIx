  career_goals: Markus aims to spearhead flagship climate‑resilient projects that blend engineering rigor with artistic expression, such as park‑bridge hybrids featuring Cuban-inspired mosaics. He seeks
    a senior leadership role where he can mentor emerging engineers, champion sustainable design standards, and advocate for community‑driven development. In the long term, he envisions establishing a boutique
    consultancy that offers integrated engineering and public‑art services, positioning South Florida as a model for resilient, culturally vibrant infrastructure. Throughout his career, he hopes to leave
    a legacy of safer neighborhoods, greener coastlines, and spaces that celebrate his heritage.
