  career_goals: Andres aspires to combine his practical engineering curiosity with his disciplined work ethic to pursue a career in civil or mechanical engineering, focusing on sustainable infrastructure
    for desert communities. He aims to attend a university with strong engineering programs, obtain a degree in civil engineering, and eventually work on projects such as water‑conservation systems, renewable
    energy installations, or off‑road vehicle design that benefit his hometown and similar environments. In the shorter term, he plans to graduate high school with honors, secure an internship or mentorship
    in a local engineering firm, and earn certifications related to CAD and basic mechanics.
