personas:
  professional: Andres Soto, a budding teenage engineer, channels their curiosity and practicality through hands‑on projects like customizing model cars and programming autonomous robots in the school's
    robotics club, leveraging their disciplined organization to meet strict design deadlines while balancing solitary tinkering with cooperative teamwork.
  sports: Andres Soto, a midfielder on the middle‑school soccer team and an avid hiker of the Barstow desert, supports the Los Angeles Galaxy and the Los Angeles Rams, regularly training with the local
    Soccer Academy club while planning weekend treks to explore geological formations, and they enjoy blending team strategy with solitary endurance runs.
  arts: Andres Soto captures stark desert vistas through the lens of a DSLR, drawing inspiration from Ansel Adams and the ambient soundscapes of C418 and Hans Zimmer, and they spend spare time sketching
    mechanical designs that blend artistic flair with engineering precision.
  travel: Andres Soto dreams of weekend expeditions from Barstow to Death Valley’s salt flats, the towering monoliths of Joshua Tree, and, when possible, cross‑border trips to Tijuana, balancing their curiosity
    for geological wonders with parental curfews and school schedules, and they meticulously plot routes using topographic maps.
  culinary: Andres Soto, an aspiring home‑cook, often whips up spicy tacos al pastor and jalapeño‑filled grilled cheese using fresh cilantro and desert‑grown sage, while honing their ramen‑making skills
    after watching popular YouTube chefs, though they sometimes burn the toast when distracted by robotics tinkering.
  core: Andres Soto is a disciplined teen tinkerer whose keen curiosity fuels innovative projects, yet their constant worry and perfectionism often lead to late‑night work sessions and occasional impulsive
    gaming splurges.
background:
  cultural: Andres grew up in a bicultural Mexican‑American household in Barstow, California. At home, Spanish is spoken regularly, and family traditions such as celebrating Día de los Muertos, preparing
    tamales during holidays, and listening to regional Mexican music are integral parts of his life. His parents emphasize the values of hard work, respect for elders, and community involvement, which blend
    with the rugged, independent spirit of the high‑desert environment. This cultural blend influences his disciplined approach to school, his interest in practical, hands‑on projects, and his desire to
    give back to his community through engineering solutions that improve local quality of life.
