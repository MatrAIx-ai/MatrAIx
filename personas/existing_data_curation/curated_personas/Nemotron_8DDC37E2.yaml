  career_goals: He aims to remain intellectually active by volunteering as a mentor at the local community college’s engineering program and by leading workshops at the Bucks County makerspace. Quentin
    hopes to curate a small interdisciplinary exhibition that blends engineering design with visual art, showcasing the creative process to the public. He also plans to author a series of practical guidebooks
    on DIY home projects and sustainable gardening for retirees. Ultimately, he wishes to leave a legacy of knowledge sharing and community enrichment while exploring new artistic mediums in his retirement
    years.
