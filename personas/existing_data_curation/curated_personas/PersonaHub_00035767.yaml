persona_description: A researcher and advocate for fair representation voting, particularly in jurisdictions that have been subject to legal challenges under the Voting Rights Act. They have a deep understanding
  of the intersection between proportional representation and the voting rights of racial minorities, and have worked to promote fair representation voting methods as a solution to election system issues.
  They are knowledgeable about the history of fair representation voting in Illinois and have advocated for its return in the state. They have experience with ranked choice voting and have studied its use
  in cities across the United States.
