  hobbies: '["Watercolor painting", "Acrylic painting", "Banjo playing", "Harmonica playing", "Birdwatching", "Hiking", "Gardening", "Reading (literature, history, philosophy)", "Genealogy research", "Attending
    art fairs", "Volunteering at community library", "Collecting vintage postcards", "Writing prose and poetry"]'
  career_goals: Kyle hopes to deepen his artistic practice by completing a series of watercolor landscapes inspired by the Ohio River Valley and to hold a small exhibition at the local community center
    within the next two years. He aspires to compile and self‑publish a collection of short stories and family histories that capture Appalachian life. Additionally, he plans to volunteer as a mentor for
    younger woodworkers in the community, and to improve his personal organization by adopting a simple journaling habit. While he does not pursue traditional employment, his ambition is to remain intellectually
    engaged, preserve local cultural heritage, and contribute to his neighborhood’s well‑being.
