personas:
  professional: Michaeal Farooq, a retired handyman turned community mentor, leverages decades of carpentry, mechanical, and basic trade expertise to run weekly woodworking workshops at the tribal center,
    where they combine methodical instruction with lively storytelling that reflects both practical skill and cultural heritage.
  sports: Michaeal Farooq enjoys hiking the Ouachita trails, fishing the Little River, and follows the Oklahoma City Thunder and Dallas Cowboys, while they belong to a local senior walking club that meets
    twice weekly for low‑impact cardio.
  arts: Michaeal Farooq combines an eye for landscape photography inspired by Ansel Adams with a love for traditional woodworking, regularly attends drum circles featuring musicians like R. Carlos Nakai,
    and finds inspiration in the paintings of Georgia O'Keeffe and the folk songs of Gillian Welch.
  travel: Michaeal Farooq prefers road trips that blend natural scenery and historic sites, having explored the historic town of Guthrie, camped at Broken Bow Lake, and dreaming of a cultural pilgrimage
    to Santa Fe to study Pueblo architecture and Southwest art.
  culinary: Michaeal Farooq favors cooking fresh garden produce into dishes such as roasted corn succotash with sage, pan‑fried catfish seasoned with paprika, and hearty chicken‑fried steak with homemade
    cornbread, relishing the aroma of rosemary and thyme while often using heirloom tomatoes from their own garden.
  core: Michaeal Farooq embodies a pragmatic curiosity, weaving hands‑on craftsmanship, storytelling, and a love of nature into daily life, yet they occasionally hoard vintage tools they never fully restore.
background:
  cultural: Michaeal is a lifelong member of the Muscogee (Creek) Nation, born and raised in Okmulgee, the historic capital of the Nation in Oklahoma. Raised in a multigenerational household, he was immersed
    in Creek language, ceremonies, and oral storytelling from an early age. His upbringing emphasized community service, respect for the land, and the preservation of cultural traditions. He regularly participates
    in seasonal tribal events, contributes his practical skills to community projects such as housing repairs and garden maintenance, and supports initiatives aimed at reviving the Creek language among
    younger members. His American Indian heritage shapes his values, fostering a practical connection to the natural world, a collaborative spirit, and a balanced curiosity about the broader world.
