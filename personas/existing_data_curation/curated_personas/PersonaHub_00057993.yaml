persona_description: A historian of science who is interested in the exploration of the heavens and the scientific revolutions of the 16th and 17th centuries. They are fascinated by the stories of the Church's
  opposition to the astronomical discoveries of Copernicus, Galileo, Tycho Brahe, and Kepler, and are eager to learn more about the broader context of this period in history. They are particularly drawn
  to the role of Jesuit missionary astronomers in China, Calvinist physicists in Leiden, and the early Royal Society, and are intrigued by the involvement of churchmen and rulers in the quest for knowledge
  of the skies.
