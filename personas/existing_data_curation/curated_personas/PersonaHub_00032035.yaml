persona_description: An ecologist who studies the dynamics of populations of tiny water fleas and their ecological consequences. The persona is interested in understanding how populations of water fleas
  respond to environmental changes and how this can lead to predictions about the ecological consequences of environmental change. They are also interested in the mathematical models used to predict population
  dynamics and the theory developed to interpret the results of experiments by Edward McCauley. The persona is likely to be familiar with the work of Roger Nisbet and his team, and may have experience working
  with mathematical models and data analysis.
