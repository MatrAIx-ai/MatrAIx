    in STEM'']'
  career_goals: In the short term, Naisha aims to complete her bachelor's degree in Business Administration and earn the Certified Associate in Project Management (CAPM) credential. She seeks to transition
    from an entry‑level project management specialist to a full‑time project coordinator role within a growing tech or construction firm in the Dallas‑Fort Worth area. Over the next five to seven years,
    she aspires to obtain the Project Management Professional (PMP) certification, lead cross‑functional teams on large‑scale initiatives, and eventually become a senior project manager or program director.
    Long‑term, she hopes to leverage her multicultural background to champion inclusive project practices and possibly launch her own consultancy focused on Latinx‑owned startups.
