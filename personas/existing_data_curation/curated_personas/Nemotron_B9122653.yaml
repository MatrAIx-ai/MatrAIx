personas:
  professional: David Brown, a 13‑year‑old aspiring digital illustrator and budding game strategist, blends the disciplined work ethic learned from school projects with a relentless curiosity for new ideas,
    channeling their competitive streak into elaborate Minecraft builds and meticulously shading characters on a tablet after homework, while they constantly experiment with emerging drawing apps.
  sports: David Brown, a 13‑year‑old pickup basketball enthusiast, dribbles at the local community park after school, competes on the Bryant Middle School junior league team, avidly follows the Arkansas
    Razorbacks men’s basketball squad, and tunes in to every Saturday night high‑school football game, while they occasionally let a competitive edge turn friendly matches into intense showdowns.
  arts: David Brown, a 13‑year‑old sketcher and digital art hobbyist, fills sketchbooks with comic‑style heroes, follows indie rock acts like Tame Impala and classic country legend George Strait for creative
    inspiration, draws influence from YouTuber Loish’s lo‑fi visuals, and spends weekends at the community art fair admiring local watercolorists, while they occasionally stay up late editing a short animation
    for a school project.
  travel: David Brown, a 13‑year‑old adventurer with a love for nature trails around Saline County lakes, has taken day trips to Hot Springs National Park and a family weekend in Nashville for a music festival,
    dreams of backpacking through Japan’s anime districts after high school, and prefers planning trips with a detailed spreadsheet on their phone, while they occasionally worry that school workload will
    limit future travel.
  culinary: David Brown, a 13‑year‑old who relishes Southern comfort foods like smoked brisket, fried catfish, and buttery biscuits, also experiments with making sushi rolls after watching online tutorials,
    frequently adds hot sauce to mac and cheese for extra kick, and occasionally sneaks a slice of pepper‑jack cheese into their lunchbox, while they sometimes forget to balance indulgent meals with healthier
    options.
  core: David Brown, a curious 13‑year‑old who balances sketchbooks and a video‑game controller, worries about upcoming tests, competes fiercely on the basketball court, and secretly hoards leftover pizza
    crusts for midnight doodles, while they often replay their favorite indie tracks to unwind.
background:
  cultural: David grew up in Bryant, Arkansas, a suburban community near Little Rock characterized by a close‑knit, middle‑class Southern atmosphere. His family participates in community events, church
    gatherings, and local high‑school sports traditions, which instill values of family, responsibility, and community pride. While rooted in regional customs such as Southern cuisine, country music, and
    weekend football games, his parents also encourage creative exploration, exposing him to art classes, digital media workshops, and technology clubs at school. This blend of traditional Southern upbringing
    and modern digital influences shapes his worldview, fostering both an appreciation for local heritage and an openness to unconventional, innovative ideas.
