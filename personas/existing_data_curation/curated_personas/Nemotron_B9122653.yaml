  career_goals: David dreams of turning his love for art and technology into a career as a game developer or concept artist, ideally studying graphic design and computer science at a university with strong
    STEM and arts programs. He aims to create immersive, story‑driven games that blend visual creativity with innovative mechanics. He also hopes to develop leadership skills to eventually captain a sports
    team or lead a creative project group, using his competitive spirit to inspire teammates while learning to manage stress and anxiety more effectively.
