  hobbies: '[''Gardening'', ''Cooking and baking'', ''Reading DIY home‑improvement blogs'', ''Watching nature documentaries'', ''Yoga and mindfulness'', ''Hiking'', ''Knitting'', ''Listening to folk music'',
    ''Volunteering at senior center'']'
  career_goals: Grace aspires to transition from an individual cleaner to a supervisory role, eventually earning a certified cleaning specialist credential and leading a small team of housekeepers. She
    hopes to start her own eco‑conscious cleaning service that offers personalized, flexible schedules for clients, providing her with greater financial stability and the ability to set boundaries that
    help manage her anxiety. In the longer term, she is interested in offering training workshops on sustainable cleaning practices and possibly moving into property‑management support for local senior‑living
    facilities.
