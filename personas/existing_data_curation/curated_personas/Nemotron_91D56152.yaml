personas:
  professional: Grace Salinas is a seasoned residential housekeeper with a knack for eco‑friendly deep‑cleaning, combining meticulous floor maintenance, stain‑removal expertise, and a calming client‑service
    style that balances curiosity about new sustainable products with a practical, hands‑on approach, even as their relaxed attitude sometimes leads to a loosely organized schedule.
  sports: Grace Salinas enjoys light outdoor exercise, regularly hiking the Lake Huron shoreline trail and occasionally joining a community softball league, while cheering on the Detroit Tigers and Detroit
    Lions, and they prefer low‑impact activities that fit their flexible schedule over competitive training.
  arts: Grace Salinas finds creative release in knitting folk‑inspired scarves while listening to Bob Dylan, The Avett Brothers, and local folk band The Lanes, and they often attend the historic Sanilac
    County theater's monthly folk‑music nights, integrating these artistic touches into their life.
  travel: Grace Salinas prefers relaxed, nature‑focused getaways, having road‑tripped to Mackinac Island and a weekend retreat in Asheville’s Blue Ridge Mountains, yet they budget carefully, opting for
    off‑season travel and often using Airbnb stays to balance their love for exploring new landscapes with financial constraints.
  culinary: Grace Salinas blends Midwestern comfort with family’s Hispanic flavors, frequently cooking herb‑infused chicken enchiladas, rosemary‑garlic cornbread, and baking spiced apple crisp, while experimenting
    with homemade cleaning solutions using lavender, thyme, and citrus peels, showcasing a culinary curiosity that mirrors their eco‑conscious mindset.
  core: Grace Salinas is a compassionate, eco‑savvy housekeeper whose curiosity fuels a love for sustainable living, yet their anxiety and relaxed planning sometimes spin them into last‑minute scrambles
    and occasional disorganization.
background:
  cultural: Grace is a white American with a Hispanic surname; her paternal grandparents emigrated from Mexico, while her maternal side has German‑Midwestern roots. Raised in the small town of Kingston,
    Michigan, she grew up with a blend of Midwestern values—hard work, community reliance, and modest living—and family traditions that include both Catholic holidays like Christmas and culturally specific
    celebrations such as Día de los Muertos. Bilingual exposure gave her a basic familiarity with Spanish, which she occasionally uses when preparing traditional dishes or chatting with Spanish‑speaking
    clients. The local culture, shaped by agriculture, manufacturing, and close‑knit community events, has reinforced her cooperative nature and appreciation for practical, hands‑on skills.
attributes:
  skills: '[''Residential cleaning'', ''Deep cleaning'', ''Stain removal'', ''Laundry and fabric care'', ''Floor care (hardwood, tile, carpet)'', ''Eco‑friendly cleaning methods'', ''Basic home maintenance'',
