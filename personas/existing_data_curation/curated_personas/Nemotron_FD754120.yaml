personas:
  professional: Andrew Haskett, a CNC production worker known for meticulous equipment maintenance and data‑driven quality inspections, leverages his organized, methodical nature and outgoing teamwork skills
    to champion lean process improvements, while assertively mentoring new hires toward safer, more efficient shop floor practices.
  sports: Andrew Haskett fuels his energetic lifestyle through intramural basketball at the community center, Tuesday spin classes at the local YMCA, weekly hikes in Pisgah National Forest, and fervent
    fandom for the Charlotte Hornets (NBA) and the Carolina Panthers (NFL).
  arts: Andrew Haskett dives into the Asheville arts circuit by attending gallery openings that showcase emerging talents like Kehinde Wiley, catching community theater productions at the Bascom Center,
    and curating his own digital art series inspired by Yoko Ono's conceptual work.
  travel: Andrew Haskett prefers short, budget‑friendly road trips that combine nature and culture—weekend hikes to Pisgah, a craft‑brewery weekend in Asheville, and a long‑awaited spring wander through
    Barcelona's street‑art districts and the Dalí Museum in Figueres.
  culinary: Andrew Haskett relishes cooking smoked paprika‑rubbed ribs with a side of kale‑quinoa salad, perfects avocado‑lime salsa for taco nights, and treats himself to craft IPA pairings with aged cheddar
    while experimenting with sous‑vide salmon for flawless texture.
  core: Andrew Haskett balances a methodical, detail‑oriented work ethic with a restless curiosity for art and the outdoors, often sprinting between CNC shifts, late‑night gallery openings, and impromptu
    hikes.
background:
  cultural: Andrew grew up in the American South, specifically in the Fayetteville area of North Carolina, a region known for its blend of military influence, Southern hospitality, and a growing appreciation
    for the arts. His family background reflects typical Mid‑Atlantic and Southern roots, with values emphasizing community involvement, reliability, and respect for tradition. While he embraces the local
    customs of friendliness and collective support, his curious nature and exposure to diverse ideas through college and the vibrant Fayetteville cultural scene have shaped a broader, open‑minded outlook.
    He identifies with the broader white American cultural heritage of the region, balancing it with an enthusiasm for contemporary artistic expression and progressive workplace practices.
