  career_goals: Andrew aims to advance from his current production role to a supervisory position within the next two to three years, focusing on lean manufacturing and process improvement. He plans to
    complete his associate degree in Industrial Technology and pursue certifications in Six Sigma and CNC programming. Long‑term, he aspires to become a plant manager or manufacturing engineer, where he
    can blend his curiosity for new ideas with his organizational strengths to drive innovation on the shop floor. He also envisions leveraging his appreciation for art and design by contributing to product
    development that balances functionality with aesthetic appeal.
