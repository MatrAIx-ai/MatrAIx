persona_description: A constitutional lawyer who specializes in the interpretation and application of the Constitution of India, particularly the provisions related to the powers of the Central and state
  governments. They have extensive knowledge of the history and development of the Indian Constitution, and are well-versed in the principles of federalism and centralism. They are knowledgeable about the
  relationship between the state and agriculture, and have a deep understanding of the issues related to the regulation of markets by states for the sale and purchase of agricultural produce. They are skilled
  in drafting and interpreting legislation, and are experienced in handling constitutional cases.
