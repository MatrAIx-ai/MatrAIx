personas:
  professional: Naya Mack is a precocious three‑year‑old who loves arranging puzzles and building strict block towers, often imposing her own rules on playmates and feeling uneasy when routines shift, revealing
    an early organizer with a competitive edge.
  sports: Naya Mack participates in little‑league soccer at the neighborhood community center, enjoys swinging on the playground, and watches the Birmingham Barons minor‑league baseball games with grandparents,
    though she prefers the gentle rhythm of a swing set over competitive matches.
  arts: Naya Mack delights in singing gospel hymns with the church’s children’s choir, drawing vibrant family reunion scenes with crayons, and spontaneously dancing to rhythmic clapping at Sunday gatherings,
    channeling her curiosity into colorful artistic expression.
  travel: Naya Mack loves family road trips to the Gulf Shores’ sandy beaches where she collects seashells from tide pools and occasional visits to historic Montgomery, favoring the comfort of her car seat
    and familiar playlists over unfamiliar far‑away destinations.
  culinary: Naya Mack enjoys sweet pumpkin puree, soft cornbread, and butter‑slicked chicken strips, often helping stir the pot with a plastic spoon while leaving a faint floury trail on the kitchen floor,
    yet she insists on smearing extra gravy on her collard greens.
  core: Naya Mack is a curious, slightly anxious three‑year‑old who blends competitive block building, gospel singing, secret piggy‑bank hoarding, shell‑collecting road trips, and a stubborn reluctance
    to share her crayons.
background:
  cultural: Naya is raised in an African‑American family in Alabaster, Alabama, where Southern traditions blend with Black cultural heritage. Her family attends a local Baptist church, where she participates
    in Sunday school and enjoys the choir’s gospel music. Community gatherings often feature soul food dishes like collard greens, cornbread, and fried chicken, and stories about family history and the
    civil‑rights movement are shared at family reunions. Her parents encourage curiosity, art, and resilience, teaching her to appreciate both the artistic expressions of her community and the importance
    of staying grounded amidst stress. These cultural influences shape her love for music, storytelling, and a strong sense of community.
attributes:
  skills: '[''Fine‑motor coordination (crayon drawing, building blocks)'', ''Basic vocabulary and sentence formation'', ''Color and shape identification'', ''Simple counting (1‑10)'', ''Basic puzzle solving'',
    ''Following simple routines (tidying toys, hand washing)'', ''Observational skills'', ''Early self‑care abilities'']'
  hobbies: '[''Coloring and drawing with crayons'', ''Listening to stories and bedtime tales'', ''Dancing to gospel and children’s music'', ''Exploring backyard nature (leaves, insects, butterflies)'',
    ''Building towers with wooden blocks'', ''Solving simple wooden puzzles'', ''Singing along to nursery rhymes'']'
  career_goals: Naya dreams of becoming someone who creates and shares beauty, envisioning a future as an artist who paints bright pictures or a teacher who tells stories and helps other children explore
    their imaginations. She also shows a budding fascination with the stars, sometimes saying she wants to be an astronaut to see the whole world from above. Her competitive streak pushes her to want to
    be the best at drawing or storytelling in her class, and she hopes to lead group projects when she grows older.
