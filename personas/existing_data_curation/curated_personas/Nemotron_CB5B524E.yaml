personas:
  professional: Andreas Cogdill, an early‑career mechanical‑electrical engineer specializing in product design and rapid prototyping, brings a methodical planning mindset and a vivid imagination to sustainable
    technology projects, bridging complex simulations in MATLAB with hands‑on 3D‑printed feasibility models.
  sports: Andreas Cogdill embraces active outdoors, logging weekend trail runs on the Withlacoochee State Trail, kayaking the Suwannee River, and joining a local university drone‑racing club that doubles
    as a cardio workout, all while cheering for the Tampa Bay Lightning (NHL) and Miami Dolphins (NFL).
  arts: Andreas Cogdill channels creativity through digital illustration inspired by James Jean’s surrealism and synth compositions echoing Aphex Twin and Jon Hopkins, while regularly attending live electronic
    sets at the local The Ritz venue and binge‑watching indie films by Sofia Coppola and Gregory Houdini.
  travel: Andreas Cogdill prefers low‑key, nature‑centric travel, having camped in the Everglades, trekked the Appalachian Trail’s McAfee Knob, and dreaming of an eco‑retreat in Iceland’s Westfjords where
    renewable energy demos meet dramatic fjord scenery.
  culinary: Andreas Cogdill operates at a budding chef level, frequently preparing avocado toast topped with feta, sumac, and a side of mango salsa, mastering Pad Thai’s balanced sweet‑sour profile, and
    grilling fresh mahi‑mahi with lemon‑herb butter, while savoring the occasional craft coffee from a local roastery.
  core: Andreas Cogdill is a 21‑year‑old engineer‑artist hybrid who meticulously plans sustainable prototypes, hoards synth patches like trophies, forgets to floss, and never skips a sunrise bird‑watch
    session.
background:
  cultural: Andreas grew up in a middle‑class white family in central Florida, shaped by the laid‑back, outdoor‑oriented culture of the region and the value placed on community involvement and self‑reliance.
    His upbringing combined elements of Southern hospitality, an appreciation for Florida’s natural environment, and exposure to a broad American educational system that encouraged curiosity in science
    and the arts. He identifies with a multicultural blend of traditional American values and a growing awareness of environmental stewardship, reflected in his personal and professional choices.
