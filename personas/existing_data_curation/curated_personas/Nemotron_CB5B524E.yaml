  career_goals: He aims to join a forward‑looking engineering firm focused on sustainable technologies, where he can contribute to the development of energy‑efficient products. In the next five years, he
    plans to become a lead product engineer, leading cross‑functional teams, and to obtain certifications such as PMP and a professional engineer (PE) license. Long‑term, he envisions founding his own start‑up
    that integrates renewable energy systems with smart home automation, leveraging his imagination for novel, environmentally conscious solutions.
