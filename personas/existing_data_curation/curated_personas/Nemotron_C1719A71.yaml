personas:
  professional: Shiloh Brown, a seasoned aerospace engineer specializing in lightweight composite airframes and avionics integration, leverages their curious yet pragmatic mindset to mentor junior engineers
    while navigating project timelines with a relaxed, flexible approach that sometimes leads to last‑minute sprint sessions, and they enjoy translating complex technical concepts for non‑technical audiences.
  sports: Shiloh Brown spends weekends hiking the Loess Hills, volunteers as a guide for the local seniors’ walking club, cheers on the Iowa Hawkeyes football team, and has a casual membership in the Panama
    Town cycling club, though they often forget to log their miles.
  arts: Shiloh Brown sings in the town choir performing works by Mozart and Carl Orff, joins folk‑dance gatherings that feature traditional ballads like Dolly Parton’s 'Jolene,' and immerses themselves
    in mystery novels by Agatha Christie, which fuels their love of narrative storytelling, and they often lead song selections at rehearsals.
  travel: Shiloh Brown prefers road‑trip adventures to places like Badlands National Park and the Star‑Gazing Festival in Flagstaff, dreams of traveling to Chile’s Atacama Desert for its clear skies, and
    occasionally splurges on weekend getaways to historic Bruges, balancing travel with family budget constraints, while they keep a travel journal to record each stargazing night.
  culinary: Shiloh Brown enjoys cooking garden‑fresh dishes such as roasted heirloom carrots with thyme, kale quinoa salad, and pan‑seared trout with lemon‑dill sauce, swapping recipes with fellow choir
    members while occasionally opting for take‑out pizza on busy evenings, and they take pride in preserving extra produce by canning it for winter.
  core: Shiloh Brown blends seasoned aerospace expertise with a community‑centric spirit, juggling curiosity, relaxed planning, and occasional worry, all while nurturing a garden, a choir, and a stargazing
    hobby, and they constantly seek ways to mentor the next generation.
background:
  cultural: Shiloh grew up in a Midwestern farming community in Iowa, where values of hard work, self‑reliance, and neighborly support were emphasized. Her family had deep roots in the region, attending
    a Protestant church and participating in town fairs and school events. This upbringing instilled a strong sense of community responsibility and humility, which she carries into her professional life.
    Though her career took her into the high‑tech world of aerospace engineering, she remains connected to her local culture through support of the county’s agricultural fairs, volunteering at the community
    center, and celebrating regional traditions such as the annual Iowa State Fair.
attributes:
  skills: '["Structural design", "Composite material analysis", "Avionics integration", "SolidWorks", "CATIA", "ANSYS finite element analysis", "MATLAB modeling", "Prototyping", "Quality assurance", "Technical
    communication", "Team facilitation"]'
  hobbies: '["STEM outreach volunteering", "Town choir", "Folk‑dance gatherings", "Hiking", "Gardening", "Yoga", "Reading mystery novels", "Book club", "Amateur astronomy", "Community events"]'
  career_goals: Shiloh aims to leverage her decades of experience to mentor the next generation of engineers, especially women and underrepresented groups in aerospace. She hopes to lead a small multidisciplinary
    team focused on developing sustainable, low‑emission propulsion concepts for regional aircraft. While she values the flexibility to balance family life, she also wants to stay engaged with emerging
    technologies such as electric and hybrid propulsion, contributing to research collaborations with local universities. Ultimately, she envisions a transition into a consulting role where she can advise
    on project risk management and design optimization, allowing her to maintain a more relaxed schedule.
