persona_description: A microbiologist who specializes in the study of lactic acid bacteria, particularly lactobacilli. His research interests include the benefits of probiotics, the interactions between
  lactic acid bacteria and other microorganisms in the intestinal microbiome, and the development of new mechanisms of action for probiotics. He is also interested in the importance of lactic acid bacteria
  in food fermentation and their role in reinforcing intestinal integrity.
