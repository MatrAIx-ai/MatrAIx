personas:
  professional: Douglas Edwards is a high‑school‑age tech enthusiast who blends solid computer‑troubleshooting know‑how, budding graphic‑design talent in GIMP, and natural peer‑mediation skills into part‑time
    freelance IT support gigs and community‑center digital‑art workshops, where their curiosity‑driven yet laid‑back style fuels creative problem‑solving even as a tendency toward disorganization sometimes
    leaves deliverables scattered.
  sports: Douglas Edwards cycles through local parks like a pro, belongs to the Charlotte Bike Club, roots for the Charlotte Hornets during NBA season, and joins seasonal pickup soccer games at the community
    field in spring, yet their relaxed attitude toward structured workouts means they often skip formal training in favor of spontaneous rides and casual ball‑games.
  arts: Douglas Edwards channels a love for indie rock bands like Arctic Monkeys and hip‑hop artists such as Kendrick Lamar into sketching sci‑fi characters and crafting digital art in GIMP, while regularly
    attending weekend street‑festival performances by local graffiti crews and catching indie film screenings at the community theater, which together shape a hybrid aesthetic that blends futuristic visuals
    with rhythm‑driven storytelling.
  travel: Douglas Edwards prefers short weekend bike‑trips to nearby state parks like the Great Smoky Mountains and occasional school‑organized excursions to Washington, D.C., but dreams of a future solo
    trip to Kyoto to explore its gaming cafés and anime culture, balancing the excitement of adventure with the financial reality of a teen budget and parental permission.
  culinary: Douglas Edwards favors a mix of comfort foods such as pepperoni pizza and ramen bowls, enjoys experimenting with quick‑fire kitchen hacks like Sriracha‑glazed chicken wings and avocado toast,
    yet admits to a habit of ordering takeout after late‑night gaming sessions, reflecting a cooking skill level that hovers between enthusiastic microwaver and budding home chef.
  core: Douglas Edwards is a curiosity‑driven teen who toggles between coding, sketching, and bike rides, battles intense anxiety with a love for gaming, and often forgets to finish homework while secretly
    hoarding limited‑edition game merch.
background:
  cultural: Douglas grew up in Charlotte, North Carolina, a city that blends Southern traditions with a growing urban, multicultural atmosphere. His family belongs to the middle‑class suburban community,
    with roots in the region’s historic agricultural background and later migration to city jobs in retail and service sectors. He was raised with Southern hospitality—emphasizing politeness, respect for
    elders, and community involvement—while also being exposed to the city’s diverse cultural scene, including festivals, varied cuisines, and a vibrant music landscape. The local emphasis on sports, especially
    college football and the Charlotte Hornets, along with the presence of large tech firms, has shaped his aspirations toward both practical trades and creative technology fields. Occasional church attendance
    reinforced values of kindness, cooperation, and service to others.
