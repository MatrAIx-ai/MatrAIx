  hobbies: '[''Video gaming (Minecraft, RPGs, sandbox games)'', ''Sketching and digital art'', ''Listening to music (indie rock, hip‑hop, pop)'', ''Biking around local parks'', ''Journaling'', ''Volunteering
    at community center'', ''Following Charlotte Hornets basketball'']'
  career_goals: In the short term, he aims to earn his GED and obtain a certification in IT support or automotive technology to secure a practical skill set and stable income. Long‑term, he dreams of working
    in video game development or as a user‑experience designer, where he can blend his love of technology with creative design. He also hopes to study psychology or counseling later, motivated by his own
    experiences with anxiety, so he can help other teens navigate emotional challenges and promote mental‑health awareness.
