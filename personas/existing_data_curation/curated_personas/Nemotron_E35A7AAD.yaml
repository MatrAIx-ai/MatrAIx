  hobbies: '[''Reading (historical fiction and leadership)'', ''Gardening (vegetable and native plants)'', ''Cooking and Baking'', ''Nature Walks and Hiking'', ''Yoga and Meditation'', ''Knitting/Crocheting'',
    ''Volunteer Work at Local Food Bank'', ''Landscape Photography'', ''Puzzle Solving (crosswords, Sudoku)'', ''Journaling'']'
  career_goals: Mindy aims to transition into senior leadership within the next five to seven years, targeting roles such as Director of Operations or Vice President of Business Services. She envisions
    building a department that balances efficiency with employee well‑being, introducing structured mentorship programs and comprehensive wellness initiatives. To support this trajectory, she plans to obtain
    a PMP certification and pursue Six Sigma Black Belt training, deepening her expertise in project execution and process excellence. Long‑term, she hopes to leverage her experience to consult small businesses
    in the Atlanta region, helping them adopt sustainable, people‑centric operational models, and eventually establishing a non‑profit that offers business training and resources to underserved communities.
