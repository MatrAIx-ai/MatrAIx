  career_goals: Thuy dreams of becoming a creator who blends art and science. She aspires to be a museum curator who designs interactive exhibits, or an illustrator who brings stories to life. She also
    imagines herself as a future STEM researcher, perhaps an astronaut or a biologist studying marine life, because she loves discovering new ideas. She wants to attend a top elementary school that offers
    advanced arts and science programs, and eventually a university where she can study both fine arts and environmental science.
