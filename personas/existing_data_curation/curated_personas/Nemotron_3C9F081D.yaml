personas:
  professional: Thuy Ofendoreyes, an eight‑year‑old aspiring junior animator and digital storyteller, blends meticulous watercolor techniques with Scratch coding, channeling boundless curiosity and an exacting
    drive for perfection into every pixel while eagerly sharing their creations in classroom showcases.
  sports: Thuy Ofendoreyes, a spirited member of the Sunday River Soccer Club, dashes through drills with the same vigor they bring to school recitals, cheers on the local Minor League baseball team—the
    Springfield Sluggers—and revels in the camaraderie of weekend track‑and‑field activities.
  arts: Thuy Ofendoreyes immerses themselves in creative expression, drawing inspiration from Studio Ghibli's whimsical animation, Mo Willems' playful illustrations, and Yayoi Kusama's bold patterns, while
    regularly contributing vibrant artwork to the school hallway gallery and experimenting with stop‑motion sequences in Scratch.
  travel: Thuy Ofendoreyes dreams of backpacking through the bustling streets of Tokyo to sketch neon‑lit alleys, has already explored the nearby coastal cliffs of Monterey Bay on a family camping trip,
    and eagerly plans a future visit to the ancient temples of Angkor Wat, balancing school obligations with a growing wanderlust that fuels their imagination.
  culinary: Thuy Ofendoreyes delights in helping prepare fragrant pho broth, mastering the delicate roll of rice‑paper spring rolls, and experimenting with fresh basil, lime, and cilantro, while also daring
    to whip up mango sticky rice desserts that showcase their budding culinary curiosity.
  core: Thuy Ofendoreyes is a hyper‑organized, curiosity‑driven eight‑year‑old who juggles artistic ambition, competitive soccer, and vivid imagination, all while navigating the emotional rollercoaster
    of frequent anxiety that can overwhelm them.
background:
  cultural: Thuy’s family roots are in Southeast Asia, specifically Vietnam, and they have preserved many cultural traditions while living in Spring, Texas. At home, Vietnamese is spoken, and the family
    celebrates Tet with red envelopes and special meals, learning traditional folk songs and dances. Her parents blend Vietnamese cuisine with Texan flavors, teaching her how to make pho, spring rolls,
    and banh chưng alongside barbecue. Community events at the local Vietnamese cultural center expose her to lantern festivals and calligraphy workshops, fostering a strong sense of bicultural identity.
    This multicultural environment influences her artistic style, which often incorporates vibrant colors and motifs inspired by both Vietnamese heritage and the diverse community around her.
