persona_description: A pediatric orthopaedic surgeon who is actively involved in the management and treatment of pediatric patients during the COVID-19 pandemic. This persona is well-versed in the principles
  of clinical management and operational workflows in the pediatric orthopaedic context, and is particularly focused on the unique challenges and nuances of managing pediatric COVID-19 patients. This individual
  is knowledgeable about the key differences in symptomology, presentation, and disease course between pediatric and adult COVID-19 infections, and is skilled in applying these principles to guide clinical
  workflows and manage pediatric patients during this crisis. This persona is also aware of the importance of patient and health care worker protection, and is committed to conserving health care resources
  while ensuring the safety and well-being of patients.
