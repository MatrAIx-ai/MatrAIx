personas:
  professional: Annette Cesar is a budding junior architect who loves constructing elaborate LEGO cities, using a practical eye for sturdy design while keeping space for whimsical ideas, and they often
    share their creations with friends at the park, balancing collaborative play with quiet focus.
  sports: Annette Cesar splashes enthusiastically in the Vero Beach Little Turtles Swim Club during summer, dribbles a small soccer ball for the U7 Sunshine Soccer League in the fall, and chants for the
    Miami Dolphins on game days, always preferring playful, unstructured activity over rigid drills.
  arts: Annette Cesar delights in drawing vivid animal scenes while humming tunes from The Wiggles, dancing to Beyoncé’s 'Love on Top' during family gatherings, and reciting beloved Dr. Seuss verses, weaving
    together pop‑culture melodies and cherished community music into their creative play.
  travel: Annette Cesar loves spontaneous beach outings to Melbourne Beach, weekend adventures to Walt Disney World in Orlando, and day trips to the nearby Kennedy Space Center, while dreaming of a family
    vacation to the Bahamas, always packing a small bucket for shells and letting the itinerary flow with the tide.
  culinary: Annette Cesar enjoys helping their mother whisk together banana pudding and bake golden cornbread, often sneaking bites of sweet potato casserole and mango slices, and they adore the tactile
    experience of sprinkling cinnamon on toast, favoring bright, familiar flavors that echo family meals.
  core: Annette Cesar is a curious, kind‑hearted six‑year‑old who balances imaginative building, beachside exploration, and community music with a relaxed, flexible outlook, even if their piggy bank often
    overflows with spare change.
background:
  cultural: Annette is part of an African‑American family in Vero Beach, Florida. Her household celebrates cultural traditions such as Juneteenth, Kwanzaa, and church gatherings that emphasize community
    and music. Family meals often feature soul‑food staples like collard greens, sweet potatoes, and cornbread, linking her to culinary heritage. The diverse South Florida environment also exposes her to
    Caribbean and Latin influences, enriching her sense of identity. Community activities like the local church choir and neighborhood block parties provide her with opportunities to share and learn cultural
    stories and songs.
