  career_goals: Annette dreams of becoming a teacher who can make learning fun and supportive for other children, reflecting her caring nature and desire for harmony. She also imagines caring for animals
    as a future veterinarian, inspired by her love for pets and empathy. Occasionally, she talks about exploring space as an astronaut, blending her curiosity for new ideas with a practical fascination
    for how things work.
