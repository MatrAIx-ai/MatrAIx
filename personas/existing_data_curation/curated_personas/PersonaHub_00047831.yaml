persona_description: A scientist who specializes in the field of molecular biology, particularly in the areas of RNA and DNA analysis and manipulation. She has a background in genetics and genomics and
  has worked on various projects related to miRNA quantitation and genome-wide screening of miRNA targets using the Target ID Library. She is experienced in developing and implementing novel methods for
  high-throughput sequencing of small RNA molecules, and has published research on the development of a small RNA ligation method that resolves biases introduced by RNA ligation in miRNA quantitation. She
  is also skilled in maintaining Wolbachia in cell-free medium and has demonstrated the ability to purify Wolbachia symbionts out of cultured mosquito cells and maintain them in cell-free medium.
