personas:
  professional: Lina Bonilla, a 30‑year‑old operations research analyst, leverages linear programming, stochastic simulation, and Python‑driven visual dashboards to untangle complex supply‑chain puzzles,
    while her innate curiosity and relaxed approach sometimes lead her to adopt unorthodox, out‑of‑schedule brainstorming sessions that spark breakthrough solutions.
  sports: Lina Bonilla hikes the Hudson Valley Trail Network with the Hudson Valley Hiking Club, practices yoga thrice weekly at a local studio affiliated with the New York Knicks fan community, and roots
    for the New York Yankees, though she often forgets a water bottle on longer treks due to her relaxed planning habit.
  arts: Lina Bonilla frequents the Metropolitan Museum and contemporary galleries, sketching fleeting impressions while sipping espresso, and draws inspiration from artists like Ai Weiwei and musicians
    such as Celia Cruz and Juan Luis Guerra, weaving those influences into her weekend creative notebooks.
  travel: Lina Bonilla prefers semi‑spontaneous trips, having explored Lisbon’s street art, Kyoto’s temples, and Cartagena’s historic quarter, while she eyes Reykjavik for its Northern Lights and Patagonia
    for elusive trekking challenges, balancing a modest travel fund with occasional last‑minute flight deals.
  culinary: Lina Bonilla experiments with fusion dishes like plantain‑crusted fish tacos, Mofongo‑styled ramen, and coconut‑lime ceviche, boasting a moderate cooking skill set that thrives on Saturday‑morning
    market hauls and occasional half‑finished sauces left on the counter during a busy week.
  core: Lina Bonilla combines analytical rigor with artistic wanderlust, juggling data models, sketchpads, and spontaneous hikes while occasionally misplacing her planner and overindulging in culinary experiments.
background:
  cultural: Lina is a first‑generation Dominican‑American, raised in a bilingual household where Spanish and English intertwine. Family and community bonds are central to her identity, and she regularly
    celebrates Dominican holidays such as Independence Day and Día de los Reyes. The vibrant rhythms of merengue, bachata, and salsa, as well as the flavors of traditional dishes like sancocho and mangú,
    shape her cultural palate. While she embraces her Caribbean heritage, she also feels rooted in the diverse fabric of the New York tri‑state area, participating in local cultural festivals and bridging
    her cultural perspective with her professional work through inclusive, data‑driven storytelling.
attributes:
  skills: '[''Linear programming'', ''Integer optimization'', ''Stochastic simulation'', ''Python programming'', ''R statistical analysis'', ''SQL querying'', ''Data visualization (Tableau, Power BI)'',
    ''Supply chain network design'', ''Workforce scheduling'', ''Process improvement'', ''Critical thinking'', ''Creative problem solving'', ''Technical communication'']'
  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Sketching and painting'', ''Experimental cooking (Dominican and fusion cuisine)'', ''Hiking and nature photography in the Hudson Valley'',
    ''Yoga and mindfulness meditation'', ''Reading contemporary fiction and philosophy'', ''Board‑game nights and puzzles'', ''Volunteering to teach basic computer skills'', ''Traveling to explore new cultures'',
    ''Attending live merengue and salsa performances'']'
  career_goals: She aims to become a senior operations research manager within the next five years, leading multidisciplinary teams to solve high‑impact logistical challenges. She plans to deepen her expertise
    in machine learning‑augmented optimization, pursue a graduate certificate in data science, and eventually transition into a strategic consulting role where she can apply analytical insights to public‑policy
    and sustainability projects. Long‑term, Lina envisions founding her own boutique analytics consultancy that blends rigorous operations research with user‑centered design and visual storytelling.
