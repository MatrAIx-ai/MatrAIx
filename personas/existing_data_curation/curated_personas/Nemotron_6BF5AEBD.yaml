  hobbies: '[''Reading adventure books'', ''LEGO building'', ''Drawing animals and landscapes'', ''Collecting rocks and insects'', ''Jigsaw puzzles'', ''Scratch Jr. coding'', ''Quiet playdates with small
    groups'', ''Attending library storytime'']'
  career_goals: Matthew dreams of becoming a wildlife biologist or environmental engineer, fields that let him explore nature while applying practical problem‑solving skills. He also imagines one day teaching
    younger children, sharing his love of science and organized learning in a calm, supportive classroom. His long‑term ambition is to contribute to protecting his community’s natural spaces and to help
    others understand the world around them.
