  career_goals: Jessica aims to advance from a senior software developer to a technical lead within the next three years, focusing on architectural design and mentoring junior engineers. She plans to earn
    an AWS Solutions Architect certification and deepen her expertise in cloud-native development. Long-term, she envisions founding a small consultancy that helps local small businesses adopt affordable
    technology solutions, while also contributing to open-source projects that align with her interest in sustainable software practices.
