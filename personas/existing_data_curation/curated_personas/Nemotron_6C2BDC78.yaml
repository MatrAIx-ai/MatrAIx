personas:
  professional: Jessica Kicklighter is a senior full‑stack developer who combines expert JavaScript, React, Node.js, and Python skills with a test‑driven, performance‑focused mindset, leading agile teams
    while mentoring junior engineers and designing cloud‑native architectures that prioritize maintainability and sustainability.
  sports: Jessica Kicklighter is a weekend trail‑runner and avid hiker who belongs to the Seattle Street Runners club, follows the Seattle Seahawks and Portland Timbers for a dose of local rivalry, and
    balances their fitness regimen with low‑impact yoga sessions at a community studio.
  arts: Jessica Kicklighter captures the misty forests with a DSLR echoing Ansel Adams' tonal mastery, relaxes to the indie folk of Fleet Foxes and the soaring scores of Hans Zimmer, and leads board‑game
    evenings featuring Terraforming Mars while regularly attending productions at the Seattle Repertory Theatre, especially classics like Shakespeare performed by local actors such as Mackenzie Phillips.
  travel: Jessica Kicklighter favors meticulous, low‑budget road trips that blend adventure and relaxation, such as hiking the Hoh Rainforest in Olympic National Park, exploring the volcanic landscapes
    of Iceland's Golden Circle, and savoring cherry blossoms in Kyoto, while always reserving a weekend to volunteer at a local community garden back home.
  culinary: Jessica Kicklighter is a novice baker who perfects sourdough loaves with wild‑fermented starter, enjoys adding heirloom grains like spelt and rye, sprinkles fresh rosemary and sea salt on roasted
    salmon, and indulges in weekend brunches at a neighborhood coffee shop serving single‑origin beans from the Pacific Northwest.
  core: Jessica Kicklighter is a pragmatic tech leader who balances curiosity with community, turning code, bread, and hikes into a sustainable, collaborative lifestyle punctuated by occasional perfectionist
    quirks.
background:
  cultural: Jessica grew up in a suburban community in the Pacific Northwest, with her family tracing roots back to German and British immigrants who settled in Washington state in the early 20th century.
    Her upbringing emphasized self-reliance, community involvement, and an appreciation of the region’s outdoors. This cultural backdrop contributes to her practical approach at work, her love of nature,
    and her commitment to giving back through local volunteer initiatives.
