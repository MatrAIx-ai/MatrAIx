persona_description: A business owner or manager who is concerned about the health and safety of their employees in the workplace. They are interested in conducting regular workplace assessments and monitoring
  for chemicals, dusts, fumes, and other potential hazards. They are looking for advice on how to implement effective engineering and administrative controls to mitigate exposure to hazardous substances.
  They are also interested in ensuring compliance with relevant laws and regulations such as the Health and Safety Employment Act and the WorkSafe NZ Workplace Exposure Standards. They seek a thorough and
  fact-based report that outlines the exposure levels and potential health effects of the contaminants, and provides recommendations for control measures. They value expert advice and are willing to invest
  in the necessary resources to ensure the safety and well-being of their team.
