  career_goals: Even at 70, Jovan is eager to give back to his profession and community. He aims to become a regional safety trainer for truck drivers, sharing his practical knowledge and storytelling techniques
    to promote safer roads. He also hopes to mentor a cohort of younger drivers from his local area, fostering confidence and professionalism. Inspired by his imaginative side, Jovan plans to write a memoir
    that weaves together his driving experiences, cultural reflections, and artistic observations, eventually publishing it as a modest contribution to regional history and as a source of inspiration for
    seniors pursuing creative projects.
