personas:
  professional: Diana Betancur, a bilingual elementary and middle‑school teacher in Austin, designs interdisciplinary lesson plans that stitch visual art, literature, and cultural history into core curricula,
    and they leverage interactive whiteboards, Google Classroom, and data‑driven assessment while channeling a competitive spirit to champion arts integration across STEM subjects district‑wide.
  sports: Diana Betancur stays active by jogging along Lady Bird Lake each morning, attends weekly Vinyasa yoga classes, plays casual indoor volleyball with friends, and they fervently support Austin FC
    and the Texas Longhorns, balancing their competitive nature with a love for community recreation.
  arts: Diana Betancur immerses themselves in Austin’s vibrant arts scene, painting murals inspired by the bold strokes of Banksy, sketching street art reminiscent of Kehinde Wiley, attending gallery openings
    featuring contemporary artists like Amy Sherald, performing poetry at open‑mic nights, and mentoring younger participants in community theater productions.
  travel: Diana Betancur prefers road‑trip adventures that blend scenic drives through the Texas Hill Country with weekend stays in Santa Fe’s art districts, seeks out music festivals in New Orleans, dreams
    of exploring the historic streets of Oaxaca for culinary inspiration, and they plan their trips around a modest budget and limited vacation days.
  culinary: Diana Betancur delights in crafting fusion dishes such as carnitas tacos with pineapple salsa, chilaquiles verde topped with queso fresco, and smoky chipotle‑infused mac & cheese, employing
    fresh cilantro, lime, and roasted corn, and they host themed dinner parties where homemade guacamole and horchata flow alongside locally sourced craft beers.
  core: Diana Betancur’s restless curiosity, methodical organization, sociable energy, and competitive drive propel a vibrant, community‑focused life that they navigate while often being shadowed by worry‑induced
    perfectionism.
background:
  cultural: Diana grew up in a Mexican‑American household where Spanish was spoken daily and cultural traditions such as Día de los Muertos, quinceañeras, and menudo gatherings were central to family life.
    Her parents emigrated from Jalisco, bringing a rich repertoire of folk music, storytelling, and culinary heritage that she proudly shares with her students through bilingual literature and art projects.
    While rooted in Mexican customs, she also embraces the eclectic, progressive culture of Austin, blending hybrid identities by participating in both local festivals and Mexican community events. This
    bicultural perspective informs her teaching philosophy, emphasizing cultural responsiveness, inclusion, and the celebration of diverse narratives.
attributes:
  skills: '[''Bilingual English‑Spanish instruction'', ''Arts‑integrated curriculum design'', ''Classroom management and behavior tracking'', ''Educational technology proficiency (Google Classroom, interactive
    whiteboards, Kahoot)'', ''Data‑driven student assessment'', ''Public speaking and workshop facilitation'', ''Lesson planning and curriculum alignment'', ''Conflict resolution and mediation'', ''Event
    planning for school exhibitions'', ''Creative problem‑solving'']'
  hobbies: '[''Painting and mural work'', ''Visiting art galleries and museums'', ''Reading contemporary fiction and philosophy'', ''Cooking Mexican and Tex‑Mex cuisine'', ''Hosting themed dinner gatherings'',
    ''Yoga and mindfulness meditation'', ''Maintaining a teaching blog'', ''Participating in community theater and open‑mic poetry nights'', ''Hiking in the Texas Hill Country'', ''Volunteer tutoring at
    local community centers'']'
  career_goals: Diana aims to become a lead teacher or curriculum specialist within the Austin Independent School District, focusing on expanding arts‑based learning across STEM subjects. She plans to pursue
    a Master’s degree in Curriculum and Instruction with a concentration in bilingual education, positioning herself to develop district‑wide bilingual art programs. In the long term, she envisions founding
    a community after‑school studio that offers free art workshops for under‑served Mexican‑American youth, while also serving as an educational consultant who helps schools integrate culturally responsive
    teaching practices. Her competitive drive pushes her to seek leadership roles, such as chairing the district’s Arts Integration Committee, and to publish articles on innovative teaching methods in professional
    journals.
