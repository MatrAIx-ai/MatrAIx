personas:
  professional: Loida Blancorodriguez is an organized, bilingual arts-management student who channels their curiosity and assertive communication style into designing eye-catching promotional graphics with
    Adobe Photoshop and Illustrator, orchestrating campus cultural-club events, and securing internships at Vega Baja's museum to gain hands-on curatorial experience.
  sports: Loida Blancorodriguez thrives on active weekends, playing beach volleyball with the Vega Baja Beach Volleyball Club, cheering for the Cangrejeros de Santurce during basketball season, and matching
    their dance cardio with salsa-night workouts at local clubs, while occasionally joining a hiking group to explore mangrove trails.
  arts: Loida Blancorodriguez expresses their creativity through acrylic canvases inspired by Frida Kahlo's vivid self-portraiture, street-art wanderings that echo Banksy's political satire, and a budding
    guitar practice that strums along to the melodies of Bad Bunny and J Balvin, while curating a weekly Instagram series that showcases emerging local photographers.
  travel: Loida Blancorodriguez prefers spontaneous weekend getaways, often planning trips to nearby gems like Culebra's Flamenco Beach and Old San Juan's historic forts via Instagram guides, while dreaming
    of a cultural immersion tour through Cartagena and Barcelona, balancing a modest student budget with a love for sun-kissed coastlines and vibrant street markets.
  culinary: Loida Blancorodriguez cooks with a lively flair, mastering mofongo with crispy plantains, alcapurrias stuffed with seasoned pork, and ceviche with fresh lime, cilantro, and red onion, while
    experimenting with fusion twists like mango-infused arroz con gandules, and they occasionally over-salt the sauces in their enthusiasm to impress friends during dinner parties.
  core: Loida Blancorodriguez blends relentless curiosity with disciplined planning, turning every canvas, playlist, and community event into a colorful experiment, even if they sometimes forget to water
    their potted succulents.
background:
  cultural: Loida was born and raised in Vega Baja, a coastal municipality in Puerto Rico known for its vibrant festivals and close‑knit community. Her upbringing is steeped in the island’s Afro‑Caribbean
    rhythms, Spanish language, and Catholic traditions, which shape her worldview and daily life. Family gatherings centered around music, food, and storytelling have instilled in her a deep appreciation
    for Puerto Rican folklore and culinary heritage. She actively participates in local celebrations such as the San Sebastián Street Festival, where she helps organize youth art installations. The blend
    of modest seaside living, multicultural influences, and a strong sense of community responsibility informs her identity and fuels her desire to preserve and promote Puerto Rican culture through the
    arts.
attributes:
  skills: '["Spanish (fluent)", "English (proficient)", "Adobe Photoshop", "Adobe Illustrator", "Event planning", "Social media management", "Public speaking", "Research and analytical thinking", "Team
