  hobbies: '["Painting", "Photography", "Salsa dancing", "Street art tours", "Volunteering at community festivals", "Coastal hiking", "Reading contemporary fiction", "Cooking Puerto Rican dishes", "Learning
    guitar", "Socializing with friends"]'
  career_goals: Loida aims to complete a Bachelor of Arts in Communications with a concentration in Arts Management. She plans to secure internships at local museums or cultural centers in Puerto Rico,
    gaining hands‑on experience in curating exhibitions and coordinating community outreach. Her long‑term ambition is to become a cultural program director, creating inclusive arts initiatives that celebrate
    Puerto Rican heritage and provide platforms for emerging artists. She also envisions launching a youth‑focused nonprofit that offers workshops in visual arts, digital media, and entrepreneurship, fostering
    creative expression and professional skills among local teenagers.
