persona_description: A teacher or educational researcher who specializes in task-based language teaching (TBLT), particularly in the context of grammar instruction in the foreign language (L2) classroom.
  They are knowledgeable about the Long's triadic model of forms/meaning/form and the complementary triadic model of non-interface/interface/weak interface for grammar instruction, and they are interested
  in the integration of meaning-embedded grammar instruction for developing communicative proficiency. They are also familiar with the use of feedback during and after task performance, and they are aware
  of the importance of C-R tasks for objective focus on grammatical form. They are aware of the challenges that L2 learners may face in receiving both implicit and explicit attention to form, and they are
  curious about the potential solutions to these challenges.
