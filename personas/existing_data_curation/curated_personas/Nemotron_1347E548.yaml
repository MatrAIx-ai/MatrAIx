personas:
  professional: Robert Baggett is a logistics‑savvy order clerk who translates their knack for improvisation and skeptical eye for inefficiency into streamlined SAP Business One workflows, while also curating
    workplace socials and community meetups with the same charisma that makes them the life of any improv troupe.
  sports: Robert Baggett is a devoted fan of Greer High School Friday night football and the Clemson Tigers, regularly catches Greenville Drive baseball games, and squeezes in weekend pick‑up basketball
    with the Greer Athletic Club, though their loose scheduling sometimes causes them to miss practice.
  arts: Robert Baggett pours their imagination onto abstract acrylic canvases inspired by Rothko and Pollock, strums acoustic guitar at open‑mic nights featuring The Allman Brothers and Daft Punk covers,
    and hones quick wit in a local improv troupe that draws inspiration from Jim Carrey’s physical comedy and the experimental electronica of Boards of Canada.
  travel: Robert Baggett prefers spur‑of‑the‑moment road trips to off‑beat spots like the South of the Border’s kitschy roadside attractions, the folk art town of Asheville, and the neon‑lit streets of
    New Orleans for jazz, often booking last‑minute Airbnb stays despite occasionally forgetting the charger.
  culinary: Robert Baggett’s palate swings between classic Southern BBQ—smoked pulled pork and shrimp‑and‑grits—and adventurous flavor labs where they blend habanero hot sauce with smoked gouda mac and cheese,
    all while savoring a craft IPA from the local microbrewery and spinning vinyl while cooking.
  core: Robert Baggett thrives at the intersection of logistics precision and artistic chaos, juggling spreadsheet efficiency by day, abstract painting by night, and a lifelong quest for novelty through
    music, improv, and unplanned road adventures.
background:
  cultural: 'Robert grew up in the suburban outskirts of Greer, South Carolina, in a middle‑class white family with deep ties to the region’s church and community life. His upbringing blended traditional
    Southern hospitality—family barbecues, high school football Saturdays, and church choir singing—with a curiosity for broader cultural currents. Exposure to local art festivals and the nearby Greenville
    arts scene nurtured his appreciation for visual and performance art. While he respects the region’s emphasis on community and modesty, his intellectually curious nature pushed him toward eclectic influences,
    from Southern rock and blues to indie electronic music and contemporary abstract art. This dual heritage shapes his worldview: a respect for local traditions paired with a drive to seek novelty and
    creative self‑expression.'
attributes:
  skills: '[''Order entry and inventory control'', ''Inventory tracking and reconciliation'', ''ERP/warehouse management system proficiency (SAP, NetSuite)'', ''Customer service and conflict resolution'',
