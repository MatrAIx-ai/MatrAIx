    solving'', ''Vendor liaison and negotiation'']'
  hobbies: '[''Abstract painting'', ''Flash fiction and poetry writing'', ''Street photography'', ''Improv comedy'', ''Acoustic guitar and open‑mic performances'', ''Trivia nights'', ''Virtual reality art
    experimentation'', ''Vinyl record collecting'', ''Spontaneous road trips to off‑beat destinations'']'
  career_goals: Robert aims to leverage his logistics experience into a supervisory or operations manager role within the next five years, while simultaneously developing a side career as a freelance visual
    storyteller—creating illustrations and short video pieces for local businesses and cultural events. He dreams of curating a small community art space in Greer that also serves as a venue for pop‑up
    markets, blending his competitive drive to become a recognized local entrepreneur with his love for novelty and artistic expression.
