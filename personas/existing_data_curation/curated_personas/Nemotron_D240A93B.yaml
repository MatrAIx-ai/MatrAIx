  hobbies: '[''Gardening'', ''Quilting'', ''Crocheting'', ''Reading classic literature'', ''Church attendance and choir'', ''Bingo'', ''Birdwatching'', ''Listening to classic country music'']'
  career_goals: Although retired, Christie Jo aims to stay active and independent. Her primary goals are to maintain her health through regular walks and balanced nutrition, to document and preserve her
    family’s recipes and quilting patterns for future generations, and to mentor younger members of her church’s senior ministry. She also hopes to learn to use a smartphone and video calling to stay connected
    with her grandchildren, and to contribute occasional articles to the local historical society newsletter about life in Savoy during the mid‑20th century.
