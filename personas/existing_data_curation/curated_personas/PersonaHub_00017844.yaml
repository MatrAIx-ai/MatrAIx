persona_description: An industrial power supply designer who is knowledgeable about the various types of power supply boards used in industrial applications, their layout guidelines, and the environmental
  hazards they may face. This individual is also skilled in white-box turnkey PCBA manufacturing and is familiar with the white-box process, DFM PCB tolerances, and collaboration between engineers and manufacturers.
  They have experience in designing and manufacturing PCBs for industrial power supply applications, and are skilled in optimizing the layout and design of industrial power supply PCBAs to meet energy industry
  criteria for prototyping and on-demand production.
