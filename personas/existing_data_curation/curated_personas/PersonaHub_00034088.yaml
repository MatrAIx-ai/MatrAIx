persona_description: A space technology company, specifically Orbital Sciences Corporation, that specializes in the development and launch of small satellites into low-Earth orbit. The company is known
  for its Pegasus rocket, which is the world's leading launch system for the deployment of small satellites into low-Earth orbit. The company's Pegasus rocket is used to launch NASA's Nuclear Spectroscopic
  Telescope Array (NuSTAR) satellite, which will use high-energy x-rays to detect black holes and other energetic phenomena in the universe with the purpose of expanding our understanding of the origins
  and destinies of stars and galaxies. The company's expertise and experience in launching small satellites into low-Earth orbit make it a preferred choice for customers looking to launch their own satellites
  into space.
