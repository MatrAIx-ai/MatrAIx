personas:
  professional: Lisandra Escorcia is a freelance visual storyteller in Los Angeles who leverages her mastery of both digital and analog photography, studio and natural lighting, and Adobe Creative Cloud
    to craft conceptually layered images that blend contemporary narratives with heritage‑inspired motifs, while her competitive drive pushes her to chase gallery representation and grant funding despite
    a habit of loosely organized project timelines.
  sports: Lisandra Escorcia finds balance through early morning yoga sessions at Echo Park and occasional runs with the community LA Hoops Run Club, while cheering for the Los Angeles Lakers in basketball,
    the Dodgers in baseball, and the LA Galaxy in soccer, reflecting a laid‑back yet competitive spirit in both personal fitness and team allegiance.
  arts: Lisandra Escorcia immerses herself in the Los Angeles street‑art scene, drawing inspiration from the murals of Shepard Fairey and the surreal installations of Yayoi Kusama, while attending indie
    shows featuring bands like Alvvays and a Latin‑fusion group, blending abstract painting, mixed‑media collages, and occasional performances on the ten‑string guitar to shape a multidimensional artistic
    identity.
  travel: Lisandra Escorcia prefers spontaneous, photo‑driven adventures, often packing a camera and sleeping bag for overnight trips to Joshua Tree’s dark skies or the high deserts of Sedona, while also
    dreaming of future pilgrimages to the night‑lit streets of Reykjavik and the luminous fjords of Norway, balancing a love for novelty with a modest travel budget.
  culinary: Lisandra Escorcia is an experimental home cook who reimagines heritage‑inspired dishes—like corn‑based pupusas with smoked chocolate sauce or rosemary‑infused mole‑styled braised pork—combining
    bold flavors with modern plating techniques, often sourcing fresh ingredients from the Hollywood Farmers' Market and testing recipes while watching indie music videos.
  core: Lisandra Escorcia is a fiercely imaginative visual artist who mixes disciplined technical skill with a relaxed, novelty‑seeking lifestyle, channeling competitive energy into both art and finance
    while occasionally letting disorganization and spontaneous cravings shape her daily rhythm.
background:
  cultural: Lisandra’s Mexican roots profoundly shape her worldview and artistic voice. Raised in a bilingual household, she grew up celebrating Día de los Muertos, listening to regional folk music, and
    learning traditional crafts from her grandparents. These cultural experiences inspire her use of vivid colors, symbolic motifs, and storytelling traditions in her photography. Living in San Bernardino,
    a city with a vibrant Latinx community, she stays connected to cultural events, local mural projects, and community activism. Her work often reflects themes of identity, migration, and resilience, blending
    Mexican heritage with contemporary Californian influences.
