  hobbies: '[''Street Art Exploration'', ''Abstract Painting'', ''Mixed‑Media Collage'', ''Live Music Attending'', ''Guitar Playing'', ''Yoga'', ''Amateur Astronomy'', ''Night‑Sky Photography'', ''Experimental
    Cooking (Mexican Fusion)'', ''Hiking'']'
  career_goals: Lisandra aims to transition from freelance assignments to a recognized conceptual photographer with her own studio in Los Angeles, showcasing work in galleries that explore Mexican heritage
    through contemporary visual narratives. She seeks to secure a grant for a long‑term personal project documenting migrant stories, win awards in national photography competitions, and collaborate with
    fashion and tech brands that value artistic innovation. She also plans to teach workshops on experimental lighting techniques and mentor emerging photographers, leveraging her competitive drive to set
    industry standards.
