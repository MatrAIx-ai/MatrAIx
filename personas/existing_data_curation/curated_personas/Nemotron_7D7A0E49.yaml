  hobbies: '[''Visiting art galleries and museums'', ''Reading contemporary literature'', ''Writing essays and short stories'', ''Improvisational theater and open‑mic nights'', ''Volunteering at community
    festivals'', ''Biking along the Bay Trail'', ''Practicing yoga'', ''Playing strategy board games'', ''Cooking experimental dishes'', ''Hosting a cultural podcast'']'
  career_goals: Lamar aims to transition from his current informal engagements into a leadership role that merges his passion for the arts with community development. In the short term, he plans to secure
    a part‑time position as a program coordinator for a local arts nonprofit, building a portfolio of successful community‑focused events. Over the next five years, he intends to launch his own cultural‑events
    consulting firm that partners with museums, galleries, and community centers across the Bay Area. To support this trajectory, he is considering a master’s degree in arts administration or nonprofit
    management, with the long‑term ambition of becoming a director of an interdisciplinary arts hub that champions inclusive, socially‑engaged programming.
