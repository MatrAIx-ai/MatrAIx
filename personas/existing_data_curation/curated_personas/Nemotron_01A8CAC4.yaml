personas:
  professional: Francia is a 25-year-old mechanical assembler whose precision with hand and power tools, ability to read blueprints, and knack for troubleshooting equipment keep production lines humming,
    while their curiosity drives them toward CNC machining certification and their cooperative spirit fuels a long-term goal of mentoring apprentices in their own custom metal-fabrication shop.
  sports: Francia stays fit by jogging along the Savannah Riverwalk three times a week, roots for the Savannah Bananas during summer baseball and the Atlanta Falcons in the NFL season, and plays in a community-run
    women's softball league that meets on Saturdays, a routine they cherish for its blend of competition and camaraderie.
  arts: Francia immerses themselves in soulful R&B from icons like Alicia Keys, Marvin Gaye, and Aretha Franklin, finds inspiration for their quilting designs during church choir rehearsals, and unwinds
    with the lyrical storytelling of country-rock artist Chris Stapleton.
  travel: Francia favors budget-friendly road trips that mix historic charm and natural scenery, having already explored Charleston's cobblestone streets and the misty vistas of the Blue Ridge Parkway,
    and they dream of a weekend retreat to Asheville's vibrant arts district.
  culinary: Francia, an enthusiastic home-cook, perfects their grandmother's fried chicken by brining it in buttermilk and crisping it with a cornmeal crust, pairs it with collard greens simmered with smoked
    turkey, apple cider vinegar, and a pinch of red pepper flakes, and regularly harvests basil, thyme, and oregano from their herb garden to freshen their Southern-style meals.
  core: Francia blends hands-on ingenuity with soulful rhythms, tackling metal assemblies by day and quilting vibrant patterns by night, while never missing a Sunday choir rehearsal or a chance to nurture
    a tiny herb garden on their balcony.
background:
  cultural: Francia grew up in Augusta, Georgia, within a close‑knit African‑American community that values faith, family, and perseverance. Her cultural identity is shaped by Southern Black traditions—church
    gatherings, gospel music, soulful cooking, and community festivals like Juneteenth celebrations. Stories of civil‑rights activism in Richmond County and the resilience of her elders inform her sense
    of responsibility and her desire to give back. She embraces the rich oral history, music, and culinary heritage of the Black South while navigating contemporary life with a blend of respect for tradition
    and openness to new ideas.
attributes:
  skills: '["Mechanical assembly", "Blueprint reading", "Hand and power tool operation", "Quality inspection", "Basic welding", "Equipment troubleshooting", "Safety compliance", "Team collaboration", "Time
    management"]'
  hobbies: '["DIY home improvement", "Quilting", "Listening to R&B, soul, and gospel music", "Cooking Southern cuisine", "Walking along the Savannah Riverwalk", "Reading personal development books", "Volunteering
    at community center", "Gardening"]'
  career_goals: Francia aims to advance beyond her current assembler role by earning a CNC machining certification and completing an associate degree in Industrial Technology at a local community college.
    She hopes to transition into a CNC operator position, eventually moving into a production supervisory role where she can mentor new workers and help improve workflow efficiency. Long‑term, she dreams
    of opening a small fabrication shop that offers custom metalwork and provides apprenticeships for youth in her community.
