  career_goals: Tatianna aims to become a recognized leader in interdisciplinary engineering projects that blend technology with visual and experiential art. She aspires to head R&D teams focused on interactive
    installations, wearable tech, and sustainable energy solutions, securing patents for innovative designs. Over the next five years, she plans to launch her own boutique consultancy that serves museums,
    galleries, and performance artists, providing custom electronics solutions while maintaining a flexible schedule that protects her mental wellbeing. She also seeks to improve her organizational habits,
    develop systematic stress‑management practices, and mentor other underrepresented engineers in the Black community.
