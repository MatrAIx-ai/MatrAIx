personas:
  professional: Tatianna Dix, an interdisciplinary electrical engineer in their early thirties, merges circuit design, embedded systems, and signal processing with an avant‑garde aesthetic; they lead R&D
    projects that blend interactive installations and wearable tech while navigating a relaxed approach to deadlines and a penchant for spontaneous creativity.
  sports: Tatianna Dix, a modestly active fan of Norwich City Football Club and occasional member of the Norfolk Trail Running Club, prefers low‑key weekend jogs along the River Wensum over crowded gyms,
    and they indulge in watching Premier League matches as a solitary ritual.
  arts: Tatianna Dix, an avid patron of avant‑garde culture, frequents exhibitions by Olafur Eliasson and installations at the Sainsbury Centre, they immerse themselves in the experimental electronic sounds
    of Aphex Twin and Brian Eno, and they draw digital illustrations inspired by contemporary performance art at the Royal Court Theatre.
  travel: Tatianna Dix curates a travel wishlist that balances solitary city escapes—like wandering the narrow alleys of Lisbon’s Alfama district and the neon‑lit streets of Tokyo—with occasional art‑focused
    trips to the Bauhaus sites in Dessau and the immersive light show at the Harpa concert hall in Reykjavik; they favor carefully mapped itineraries but leave room for spontaneous detours.
  culinary: Tatianna Dix, a culinary experimenter, blends modern soul‑food flavors by pairing smoked paprika‑seasoned collard greens with miso‑glazed shrimp, perfects a deconstructed shrimp and grits using
    sous‑vide techniques, and they enjoy crafting these dishes while listening to ambient synth textures.
  core: Tatianna Dix is a 30‑year‑old engineer‑artist who fuses high‑tech circuitry with experimental music; they navigate life with a relaxed, sometimes chaotic schedule, battle persistent anxiety, and
    find solace in solitary creative pursuits.
background:
  cultural: Tatianna is an African‑American woman whose roots run deep in Norfolk's vibrant Black community. Growing up, she was immersed in stories of the Great Migration and the legacy of pioneering Black
    engineers like Mary Jackson. Family gatherings often featured soulful music, cooking, and communal support, instilling a strong sense of cultural pride. She actively participates in local Black arts
    initiatives, volunteers at the Harriet Tubman Museum, and celebrates Juneteenth and Black History Month through both community events and personal reflection. While she values her independence, she
    remains connected to her extended family and mentors younger Black students interested in STEM, seeking to broaden representation and celebrate the intersection of her cultural heritage with her technical
    career.
