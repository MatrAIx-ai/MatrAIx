persona_description: A Ghanaian government official who is responsible for disaster management and reduction efforts. The individual is passionate about promoting disaster prevention and preparedness, and
  is committed to reducing the impact of disasters on vulnerable communities. They are aware of the Sendai Framework and its goals to significantly reduce disaster-related deaths and economic losses, and
  are actively involved in implementing disaster risk management plans and strategies. They are also aware of the importance of raising awareness and promoting behavioural change towards disaster risk management,
  and work to ensure that the public discourse on disaster risk reduction is inclusive and gender-sensitive.
