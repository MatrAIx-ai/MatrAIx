personas:
  professional: Tung Do, a 22‑year‑old engine and machine assembler in the Bay Area, merges a solid foundation in CNC milling, MIG/TIG welding, and blueprint reading with a natural flair for informal peer
    training and rapid‑prototype tinkering, constantly pushing production metrics while their spontaneous, talk‑heavy personality sometimes leaves their workstation cluttered as they chase the next robotics
    kit on the path to a lead‑technician role.
  sports: Tung Do spikes in energy on the local park courts playing pickup basketball with the San Francisco Hoops Club, roots for the Golden State Warriors during NBA season, and follows the San Jose Earthquakes'
    matches while they maintain a competitive, high‑intensity workout routine that blends street dribbling drills and weekend motorcycle rides as cross‑training.
  arts: Tung Do lights up community karaoke nights belting out BTS and Ed Sheeran tracks, devours the latest Marvel releases starring Chris Evans, and immerses in Lunar New Year performances that showcase
    traditional drum ensembles, while they channel this artistic energy into a vibrant social identity.
  travel: Tung Do fuels a love of spontaneous road trips, often riding their motorcycle along the Pacific Coast Highway to Santa Cruz and Redwood National Park, while they also snap photos of neon Tokyo
    and historic Berlin on last‑minute budget flights, blending adventure with a preference for quick, experience‑focused itineraries.
  culinary: Tung Do, a decent home cook, favours slurping steaming bowls of pho with fresh basil and star anise, whipping up spicy kimchi fried rice using gochujang and garlic, and indulging in late‑night
    sushi rolls topped with avocado and wasabi, while they often treat friends to craft coffee made with single origin beans at local cafés.
  core: Tung Do is a talkative, motorcycle‑obsessed 22‑year‑old who thrives on social competition, chases the latest tech gadgets, and they frequently leave projects half‑finished and burn the midnight
    oil on gaming marathons.
background:
  cultural: Tung Chan Do is a second‑generation East Asian American, with parents who immigrated from Taiwan. He grew up in the multicultural Bay Area, speaking Mandarin at home while being fully immersed
    in American school and work culture. Family gatherings emphasize respect for elders, hard work, and education, values that complement his practical, hands‑on career path. He celebrates traditional holidays
    such as Lunar New Year and the Mid‑Autumn Festival, often sharing homemade dumplings and mooncakes with friends. At the same time, he embraces the diverse, innovation‑driven spirit of Silicon Valley,
    blending his heritage’s emphasis on diligence with a curiosity for new technologies and communal experiences.
attributes:
  skills: '["Mechanical assembly", "Blueprint and schematic reading", "CNC machine operation", "MIG/TIG welding", "Basic electrical wiring", "Troubleshooting and diagnostics", "Quality inspection", "Safety
    compliance", "Precision hand‑tool usage", "Rapid prototyping (3D printing)", "Fundamental SolidWorks CAD", "Lean manufacturing principles", "Interpersonal communication", "Team coordination (competitive
    focus)", "Bilingual: English and Mandarin"]'
  hobbies: '["Pickup basketball", "Karaoke nights", "Competitive online gaming (FPS shooters)", "Motorcycle maintenance and riding", "Tech meet‑ups and robotics hobbyist groups", "3D‑printing personal projects",
    "Attending cultural festivals (Lunar New Year)", "Socializing at local cafés and open‑mic events"]'
  career_goals: In the next 2–3 years, Tung aims to be promoted to lead technician, overseeing a small crew of assemblers and taking responsibility for high‑precision engine builds. He plans to earn CNC
    programmer certification and pursue additional coursework in advanced machining to qualify for complex aerospace and high‑performance automotive projects. Long‑term, he aspires to transition into a
    technical management role, directing production lines and mentoring new talent, or eventually launching his own boutique performance‑engine workshop that blends cutting‑edge technology with hands‑on
    craftsmanship.
