persona_description: A scientist who specializes in soil and plant nutrition, particularly in the field of nitrogen fertilization. This scientist has expertise in using balance-sheet methods to calculate
  nitrogen fertilization recommendations, and has designed tools to help farmers adjust fertilization during crop growth. They have experience with using plant measurements to make more reliable predictions
  of plant nitrogen requirements, and have used plant measurements to monitor crops and adjust fertilization during crop growth. This scientist is likely to be working in a research or agricultural institution,
  and has a strong interest in sustainable nitrogen management.
