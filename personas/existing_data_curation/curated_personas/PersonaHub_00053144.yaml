persona_description: A United States Commissioner who specialized in the enforcement of specific laws such as the Fugitive Slave Act of 1850, the Civil Rights Act of 1866, and the Chinese Exclusion Act
  of 1888. He had a background in law and served as the city attorney and mayor of Fort Smith before being appointed as the United States Commissioner. He held the title until Congress abolished the job.
