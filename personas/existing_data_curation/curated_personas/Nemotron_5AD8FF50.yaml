personas:
  professional: Addison Carreno is a pragmatic yet innovative food‑service operations manager who leverages data analytics, lean scheduling, and competitive market analysis to streamline staff rosters,
    curb waste, and craft profitable menus, all while juggling a relaxed approach to planning and a critical eye that pushes their team toward continuous improvement.
  sports: Addison Carreno pedals the Wilmington Riverfront with the River Riders cycling club, tackles weekend hikes at Brandywine Creek State Park, and joins casual tennis matches at a local park, while
    cheering on the Philadelphia Eagles, the 76ers, and the Union, reflecting a competitive spirit that extends from the field to the kitchen.
  arts: Addison Carreno channels a love of visual storytelling into food photography for their blog, drawing inspiration from photographers like David Loftus, while also curating playlists featuring Fleetwood Mac
    and indie folk artist Iron & Wine, and they occasionally attend the Wilmington Arts Festival to soak up local performance art.
  travel: Addison Carreno favors spur‑of‑the‑moment road trips to culinary hotspots such as Asheville’s farm‑to‑table scene, Newport’s seafood shacks, and Charleston’s historic taverns, budgeting travel
    expenses through a dedicated Foodie Adventures fund, and they dream of a future retreat in Kyoto to study sustainable dining concepts.
  culinary: Addison Carreno experiments with comfort‑food classics like buttermilk fried chicken with a pomegranate glaze, heirloom tomato bruschetta topped with microgreens, and tempeh‑infused beet risotto,
    showcasing a high intermediate cooking skill set and a penchant for documenting each dish with meticulously styled food photography on their blog.
  core: Addison Carreno blends data‑driven operational savvy with a restless curiosity for food, cycling routes, and spontaneous travel, all while juggling a laid‑back planning style and a competitive edge.
background:
  cultural: Addison is a second-generation American of mixed English and Spanish heritage. Raised in a middle-class family in suburban Delaware, she grew up helping in her parents' neighborhood diner, where
    she absorbed the values of hard work, hospitality, and community. Her family's Spanish roots are reflected in family recipes and occasional gatherings that celebrate traditional cuisine, while her upbringing
    in the Mid-Atlantic exposed her to a diverse American food culture. This blend of cultural influences, combined with a pragmatic mindset shaped by her community-college education, informs her approach
    to both her professional and personal life.
