  career_goals: Addison aims to advance from managing a single location to overseeing multiple sites as a regional operations manager within the next five years. She plans to earn a bachelor's degree in
    business administration and obtain certifications such as ServSafe Manager and Lean Six Sigma Yellow Belt. Her ambition is to champion data-driven decision making, develop innovative service models
    that improve customer experience, and mentor emerging leaders in the hospitality field. Long-term, she envisions launching her own boutique café that blends modern sustainability practices with the
    comfort food traditions she grew up with.
