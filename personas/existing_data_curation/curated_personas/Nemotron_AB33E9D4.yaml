  career_goals: Jeannette aims to re‑enter the workforce in a part‑time administrative role at a local nonprofit or community organization where her organizational talents and familiarity with budgeting
    can be leveraged. She also hopes to eventually launch a small home‑based catering service that offers traditional soul‑food dishes for community events, providing a steady routine and a modest entrepreneurial
    outlet while maintaining flexibility for family responsibilities. Further education, such as completing a bachelor's degree in Management, is a long‑term ambition to solidify her credentials.
