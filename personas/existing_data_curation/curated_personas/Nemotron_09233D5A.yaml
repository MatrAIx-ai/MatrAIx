personas:
  professional: Christian Craig, a seasoned plant operations manager with over a decade of experience in small-town manufacturing, leverages his Lean and Six Sigma know-how, advanced Excel analytics, and
    steady, structure-loving demeanor to streamline production schedules, tighten inventory control, and calmly resolve team conflicts while occasionally obsessing over minute efficiency metrics.
  sports: Christian Craig, an avid early-morning fisherman and weekend weight-lifter, follows the St. Louis Cardinals and Kansas City Chiefs religiously, coaches his son’s Little League team in the spring,
    and belongs to a local gym’s CrossFit-style weight-lifting club that he visits three times a week, while occasionally joining a regional “Mud Run” for a change of pace.
  arts: Christian Craig, who relaxes after a long shift by listening to classic rock legends like Lynyrd Skynyrd and The Eagles, watches country-themed dramas such as “Friday Night Lights,” admires the
    craftsmanship of furniture designer James Krenov, and occasionally attends local community theater productions of “Our Town,” though they rarely pick up a paintbrush themselves.
  travel: Christian Craig, who prefers practical road trips over pricey vacations, enjoys weekend getaways to the Ozark foothills for fishing and a yearly pilgrimage to the Texas Hill Country’s bluebonnet
    trail, dreams of driving the historic Route 66 to the Pacific coast, and plans a family vacation to the Great Smoky Mountains once the rental property investment secures steady income.
  culinary: Christian Craig, a competent home cook who favors hearty Midwestern fare, regularly grills river-caught catfish seasoned with Cajun spice, bakes cornbread with buttermilk and honey, tends a
    vegetable garden yielding tomatoes, zucchini, and sweet corn for his family’s meals, and indulges in a nightly serving of steak-and-potatoes on Saturdays, though they sometimes over-salt the beans in
    the chili.
  core: Christian Craig, a pragmatic 39‑year‑old who blends disciplined work ethic with a quiet love for fishing, woodworking, and classic cars, habitually checks inventory spreadsheets before bed yet can’t
    resist an extra slice of pie after dinner.
background:
  cultural: Christian was raised in a working-class, white family in rural Missouri, where community ties, church involvement, and a strong work ethic were emphasized. His upbringing centered on modest
    living, self-reliance, and respect for local traditions, including annual county fairs and church potlucks. He continues to identify with Midwestern values such as honesty, hospitality, and a pragmatic
    approach to problems. These cultural influences shape his emphasis on reliability, responsibility, and a preference for small, close-knit social circles.
