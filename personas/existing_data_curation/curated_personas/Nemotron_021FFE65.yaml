personas:
  professional: Bethzaida Santos, a retired community volunteer with a flair for art curation, blends bilingual communication and self‑taught visual‑art expertise to guide intimate museum tours, while their
    relaxed approach to obligations lets them improvise exhibit narratives, and their emotional sensitivity fuels empathetic storytelling.
  sports: Bethzaida Santos enjoys low‑impact fitness, joining the Cape Coral senior walking club for mangrove strolls, practicing gentle yoga, and cheering on the Tampa Bay Buccaneers and the Florida Panthers,
    while they avoid high‑intensity sports due to joint discomfort.
  arts: Bethzaida Santos spends afternoons sketching watercolor seascapes of the Gulf Coast, curating small exhibitions of Caribbean artists at the local museum, and listening to classic boleros and salsa
    rhythms that echo their family's celebrations, which together shape their identity as a quiet yet passionate advocate for vibrant visual culture.
  travel: Bethzaida Santos plans their travel with a slow‑paced, culturally immersive style, favoring short trips to Miami’s Little Havana and the Florida Keys, and dreaming of a future pilgrimage to the
    island of their ancestors where they hope to explore historic plazas and family roots, all while budgeting carefully to accommodate their fixed retirement income.
  culinary: Bethzaida Santos delights in preparing traditional dishes from their family's heritage such as arroz con pollo, ropa vieja, and lechón asado, often infusing them with fresh cilantro, ripe plantains,
    and a pinch of cumin, while their kitchen doubles as an experimental studio where they mix tropical fruit sauces, though they sometimes over‑seasones out of enthusiastic enthusiasm.
  core: Bethzaida Santos is a curious, soft‑spoken senior who balances a love for watercolor, the rhythms of their heritage, and community storytelling with a tendency toward disorganization and a vivid
    emotional life that fuels both their artistic spark and occasional anxiety.
background:
  cultural: Bethzaida was raised in a Cuban‑immigrant household in Florida, where Spanish was spoken at home and Cuban traditions were celebrated daily. Family gatherings centered around music, dance, and
    the preparation of classic dishes such as lechón asado and picadillo, embedding a strong sense of community and resilience. These cultural roots influence her artistic tastes, culinary passions, and
    her commitment to preserving Cuban heritage within the Cape Coral area. She stays connected to the broader Cuban diaspora through local cultural clubs, Spanish‑language radio, and occasional visits
    to Miami's Little Havana, where she participates in festivals like Carnaval Miami. Her Cuban identity informs her values of familial loyalty, communal support, and a love for vibrant, expressive art
    forms.
attributes:
  skills: '["Spanish fluency (English/Spanish)", "Basic computer and internet proficiency", "Art appreciation and informal curation", "Cooking traditional Cuban cuisine", "Community event coordination",
