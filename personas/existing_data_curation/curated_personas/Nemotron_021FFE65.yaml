  hobbies: '["Sketching and watercolor painting", "Reading historical fiction and memoirs", "Listening to Cuban music (salsa, son, bolero)", "Gardening, especially tropical flowers", "Cooking and sharing
    Cuban dishes", "Visiting local art galleries and museum exhibits", "Nature walks in local mangroves or parks", "Participating in senior community craft circles", "Practicing mindfulness, gentle yoga,
    and breathing exercises"]'
  career_goals: Although retired from formal employment, Bethzaida aims to deepen her engagement with the arts and her community. She wishes to become a volunteer docent at Cape Coral's local art museum,
    curating small, intimate exhibitions that showcase Cuban and Caribbean artists. She also plans to write and self‑publish a memoir of her family's migration story, preserving their legacy for future
    generations. A personal ambition is to reconnect with her roots by traveling to Cuba for a cultural immersion trip. Additionally, she seeks to launch a weekly art discussion group for seniors, fostering
    creative expression while also maintaining her mental wellness through mindfulness practice.
