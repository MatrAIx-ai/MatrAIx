  hobbies: '[''sketching design concepts'', ''abstract photography'', ''reading philosophy and design theory'', ''model kit building'', ''chess'', ''listening to ambient/electronic music'', ''attending
    small art gallery openings'', ''gardening for future wood resources'', ''wood carving as art'', ''home brewing'', ''volunteering to teach basic carpentry'']'
  career_goals: Behzad aims to transition from contract work to owning a boutique studio that focuses on artistic, limited‑edition furniture pieces and wood sculptures that reflect his love of abstract
    concepts. He plans to establish a modest apprenticeship program to pass his craft and problem‑solving mindset to a new generation of woodworkers. Over the next five years, he hopes to gain recognition
    within the Denton art community, collaborate with local visual artists, and publish a guide that merges practical carpentry techniques with design theory. While pursuing these ambitions, he seeks a
    balanced workload and clear client boundaries to mitigate his natural tendency toward worry and stress, ultimately securing a steady income that supports a comfortable retirement while keeping his creative
    curiosity alive.
