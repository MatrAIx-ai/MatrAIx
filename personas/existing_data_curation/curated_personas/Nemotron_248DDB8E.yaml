  hobbies: '[''gardening'', ''traditional cooking'', ''reading (history and agriculture)'', ''listening to bomba, plena, and boleros'', ''walking in nature'', ''fishing'', ''woodworking'', ''tinkering with
    radios'']'
  career_goals: Although retired, Felipe aims to preserve and pass on his cultural heritage. He plans to compile a handwritten memoir of his life in San Lorenzo, documenting family recipes, oral histories,
    and anecdotes about the town’s evolution. He also aspires to mentor his grandchildren and local youth, teaching them gardening techniques, cooking traditions, and basic DIY skills. Felipe hopes to contribute
    to the community by volunteering occasionally at the local historical society, assisting with the preservation of historical documents and photographs. On a personal level, he wishes to stay mentally
    active by learning to use a tablet to communicate with relatives abroad and to explore online resources about sustainable agriculture.
