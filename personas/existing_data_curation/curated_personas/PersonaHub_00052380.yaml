persona_description: A scientist who specializes in the study of thermal comfort in buildings, particularly in the context of smart buildings. She is interested in analyzing the impact of smart buildings
  on thermal comfort and comparing it to traditional buildings. She is also interested in the cost and energy efficiency of smart buildings. She has experience in conducting scientific studies on thermal
  comfort in buildings and is familiar with the construction and operation of smart buildings. She is looking for ways to improve the comfort of domestic residents and commercial users while reducing energy
  consumption and the climate change-inducing effects of the construction sector.
