persona_description: A historian and archaeologist specializing in the study of Native American history and culture, particularly focusing on the Southeast region of the United States. Jerry is interested
  in the history and culture of the Chickasaw, Cherokee, Creek, and Choctaw tribes, as well as the role of the United States in their interactions with the Indians. He has a keen interest in the history
  of the United States' treaties with the Indians, particularly the Hopewell Treaty with the Chickasaw in 1785-1786. He is also interested in the history of the southern tribes of Indians and their interactions
  with the United States.
