  career_goals: Stephanie aims to secure a full‑time position as a software engineer or data scientist within a defense‑related firm or a technology startup that focuses on applied research for maritime
    and aerospace systems. She is targeting roles where she can lead small, high‑impact projects, leverage her analytical strengths, and contribute to product development cycles. In the longer term, she
    envisions pursuing a master’s degree in robotics or systems engineering to deepen her expertise and position herself for senior technical leadership or research and development management positions.
