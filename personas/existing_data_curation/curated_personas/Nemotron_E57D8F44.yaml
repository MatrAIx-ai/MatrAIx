  career_goals: Viviam aims to move into senior leadership within the next three years, targeting a Director of Marketing role that focuses on multicultural brands. She plans to oversee regional expansion
    into Latin America, apply advanced analytics to fuel growth, and eventually launch her own boutique consultancy helping Latino-owned startups scale. She also seeks to mentor women in marketing, sharpen
    her strategic planning to offset her natural disorganization, and integrate wellbeing practices to better manage workplace stress.
