personas:
  professional: Viviam Diaztorres is a seasoned marketing manager who fuses data‑driven rigor with narrative flair, steering cross‑functional teams in Los Angeles while navigating their natural flexibility
    and occasional disorganization to meet aggressive KPIs, all with a competitive edge that fuels their ambition to become a director overseeing multicultural brand expansion into Latin America.
  sports: Viviam Diaztorres stays active by cheering on the Los Angeles Lakers and LA Galaxy, joining a Saturday morning pick‑up basketball league at Echo Park, attending a Thursday Vinyasa yoga class at
    a downtown studio, and occasionally running in community 5 K events organized by the local park district, balancing a competitive spirit with a flexible, sometimes haphazard, workout schedule.
  arts: Viviam Diaztorres captures downtown LA’s street rhythm through a Leica M10, channeling inspiration from Henri Cartier‑Bresson and Alex Webb, while unwinding with mystery novels by Tana French and
    dancing to salsa classics by Celia Cruz and Marc Anthony at neighborhood clubs.
  travel: Viviam Diaztorres plans trips like mini‑campaigns, favoring culturally immersive itineraries such as a culinary tour of Oaxaca, a street‑art exploration in Medellín, and a weekend escape to Barcelona’s
    Gothic Quarter, balancing limited vacation days and a strict budget spreadsheet with a craving for both adventure and relaxation.
  culinary: Viviam Diaztorres, an intermediate home chef, reinvents classic Mexican fare by making quinoa‑infused chiles en nogada, smoked‑chipotle shrimp tacos with pineapple salsa, and artisanal mole
    using dried ancho, pasilla, and a splash of mezcal, always keeping fresh cilantro, roasted poblano peppers, and heirloom corn tortillas on hand for spontaneity.
  core: Viviam Diaztorres blends relentless curiosity with a habit of leaving spreadsheets half‑filled, turning marketing challenges into storytelling adventures while wrestling with a constant undercurrent
    of anxiety that fuels both their ambition and occasional overthinking.
background:
  cultural: Viviam grew up in East Los Angeles as the daughter of Mexican immigrants from Jalisco. She is bilingual in Spanish and English and was raised on family traditions such as Día de los Muertos,
    quinceañeras, and weekend tamale-making. Her bicultural upbringing gave her a deep awareness of both Mexican heritage and mainstream American culture, shaping her passion for connecting brands with
    diverse audiences. Though never married, she maintains close ties to her extended family and the local Latino community, frequently collaborating on community events and celebrating cultural holidays
    that keep her roots alive.
