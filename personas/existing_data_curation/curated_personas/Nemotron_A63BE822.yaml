personas:
  professional: Myung Kim, a 29‑year‑old elementary and middle‑school teacher in Queens, blends graduate humanities training with five years of classroom experience to craft interdisciplinary, project‑based
    lessons that weave art, literature, and cultural history, while their relaxed planning style sometimes leads to a loosely organized lesson‑plan folder.
  sports: Myung Kim, a casual runner who joins the Queens Bridge Running Club for weekend 5K runs, follows the New York Knicks and New York Yankees avidly, and prefers low‑intensity yoga sessions over competitive
    sports, though they occasionally skip a workout when a new gallery opening conflicts with the schedule.
  arts: Myung Kim, an avid participant in Queens’ street‑art scene, frequently sketches murals inspired by the vibrant works of Banksy, the dynamic installations of Ai Weiwei, and the emotive photography
    of Nan Goldin, while also attending open‑mic nights featuring spoken‑word poets like Rupi Kaur and musicians such as Mitski, and they often incorporate the rhythm of spoken word into their mixed‑media
    pieces.
  travel: Myung Kim, a spontaneous traveler who favors short, budget‑friendly trips, has explored the bustling night markets of Bangkok, the historic alleys of Lisbon, and the serene fjords of Norway, and
    they dream of a month‑long art pilgrimage across Italy’s lesser‑known galleries in Florence and Bologna.
  culinary: Myung Kim, a self‑taught home cook who loves blending fermented chili paste, miso, and lemongrass, regularly whips up fusion stir‑fries like miso‑glazed tofu with spicy chili glaze and aromatic
    lemongrass‑infused ramen, and they also indulge in eclectic Queens eateries that serve everything from Ethiopian injera to Peruvian ceviche.
  core: Myung Kim, a curious yet laid‑back educator‑artist, constantly juggles lesson planning, calligraphy, and spontaneous art outings, often misplacing paperwork but never missing a chance to turn a
    hallway wall into a canvas, and they pride themselves on turning constraints into creative opportunities.
background:
  cultural: Myung is a second‑generation Korean‑American raised in New York City. His family maintains Korean traditions such as Chuseok celebrations, hanbok festivals, and Korean language use at home,
    while also embracing the multicultural fabric of Queens. Growing up in a diverse immigrant neighborhood, he developed fluency in both Korean and English and an appreciation for the various Asian cultures
    represented in his community. This bicultural perspective informs his teaching style, allowing him to incorporate Asian artistic motifs and historical narratives into his classroom, and to act as a
    cultural liaison between school and families.
