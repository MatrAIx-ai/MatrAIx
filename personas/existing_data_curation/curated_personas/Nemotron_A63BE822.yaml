  career_goals: Myung aims to become a curriculum specialist focused on integrating the arts across core subjects, eventually shaping district‑wide programs that promote creative inquiry. He plans to pursue
    a Master's in Educational Leadership to move into an instructional coach role, where he can mentor teachers in flexible, student‑centered practices. Additionally, he hopes to launch a community art
    hub in Queens that offers after‑school workshops and cultural exchange events, bridging his artistic passions with his commitment to local families.
