  hobbies: '[''Playing soccer'', ''Building LEGO constructions'', ''Coding simple games with Scratch'', ''Reading science‑fiction'', ''Hiking Hill Country trails'', ''Drawing and sketching'', ''Journaling
    for stress management'', ''Cooking traditional Guatemalan dishes with family'']'
  career_goals: Looking ahead, Eduardo hopes to combine his love of building things with his desire to help people. He dreams of becoming a civil engineer or a software developer who designs safe, sustainable
    infrastructure or user‑friendly tools that make school life easier for younger students. He imagines creating a mobile app that helps classmates organize homework and track stress‑relief activities,
    reflecting his practical mindset and his personal experience with worry. In the longer term, he also sees himself mentoring other kids in his community, sharing his bilingual skills and encouraging
    them to pursue STEM pathways.
