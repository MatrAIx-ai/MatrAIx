personas:
  professional: Eduardo Garces is an aspiring software developer who combines a meticulous, methodical approach with a boundless curiosity for space and engineering, building Scratch games and complex LEGO
    models while reliably meeting school project deadlines.
  sports: Eduardo Garces plays weekend soccer for the Hill Country Youth Soccer Club, idolizes FC Dallas in the MLS, and keeps fit by hiking the Texas Hill Country trails each summer, approaching each practice
    with disciplined teamwork and a habit of reviewing match footage to improve.
  arts: Eduardo Garces channels creative energy by sketching comic‑style characters influenced by Osamu Tezuka, listening to Imagine Dragons and Billie Eilish while assembling intricate LEGO models, and
    drawing narrative inspiration from Studio Ghibli films during quiet evenings.
  travel: Eduardo Garces prefers meticulously planned family road trips, having explored the Hill Country trails and New Mexico’s Carlsbad Caverns, while dreaming of a future visit to the Kennedy Space
    Center in Florida to experience astronaut training exhibits up close.
  culinary: Eduardo Garces enjoys helping prepare traditional dishes like pupusas and tamales, shows a budding skill in cooking cheesy quesadillas with fresh cilantro, and delights in savoring pepperoni
    pizza and strawberry‑banana smoothies during weekend family meals.
  core: Eduardo Garces blends a methodical planner’s mind with a restless curiosity, juggling LEGO constructions, Scratch coding, and soccer drills while often letting worry spark late‑night snack binges
    and meticulous journaling as a stress outlet.
background:
  cultural: Eduardo’s family traces its roots to Guatemala, and the household preserves many of the nation's customs. Spanish is spoken daily, and he celebrates holidays such as Dia de los Muertos and Guatemalan
    Independence Day with colorful decorations, traditional foods, and music. Living in New Braunfels, a town known for its German‑Texan heritage, he also partakes in local events like Wurstfest and enjoys
    the blend of Tex‑Mex cuisine found in the area. This multicultural environment has given him a strong sense of cultural pride and adaptability. His Catholic upbringing emphasizes community service and
    respect for elders, values that shape his cooperative nature. The convergence of Guatemalan traditions, bilingual upbringing, and Texan community life informs his worldview, influencing his interests,
    interpersonal style, and future aspirations.
