    animal shelter"]'
  career_goals: Leslie dreams of turning her love for animals and her careful, practical nature into a career as a veterinarian, ideally working with farm animals in a rural setting. She plans to stay focused
    on a clear educational pathway—earning good grades in science and math, securing a scholarship for a pre‑veterinary program, and eventually attending veterinary school. Her ambition is driven by a desire
    to bring order to animal care, protect the health of her community's livestock, and use her methodical strengths to diagnose and treat with precision.
