personas:
  professional: Leslie Donahue, a diligent ten-year-old junior volunteer at the local animal shelter, channels their love of routine and meticulous cataloging into caring for rescued kittens and keeping
    detailed logs of feeding schedules, and they aspire to become a wildlife caretaker.
  sports: Leslie Donahue, a member of the Franklinton Jr. Soccer Club, thrives on structured practices and weekend matches, champions the Carolina Hurricanes in the NHL, and they regularly volunteer to
    coach younger teammates in basic drills, showing their competitive yet methodical sports mindset.
  arts: Leslie Donahue devotes free time to building LEGO models from step-by-step instructions, folding origami cranes inspired by Akira Yoshizawa, and reading the "Magic Tree House" series, while they
    delight in listening to "Taylor Swift"'s upbeat songs during chores, weaving creative expression into their organized routine.
  travel: Leslie Donahue enjoys family road trips to the Great Smoky Mountains for leaf-collecting hikes, has visited Washington, D.C. to see the monuments, and they dream of a Disney World vacation, preferring
    itineraries mapped out in advance and modest spending constraints set by parents.
  culinary: Leslie Donahue loves baking Grandma's classic sugar cookies with a pinch of cinnamon, frequently cooking simple Southern dishes like chicken-and-dumplings and sweet-potato casserole, and they
    pride themselves on cataloging favorite recipes in a notebook like a LEGO instruction manual.
  core: Leslie Donahue is a routine-driven ten-year-old who blends competitive soccer, meticulous rock-collecting, and a love of structured creativity into a life of organized curiosity, and they often
    indulge in cookie-baking as a sweet reward.
background:
  cultural: Leslie lives in Franklinton, a small town in Franklin County, North Carolina, where Southern traditions shape everyday life. Her family participates in church gatherings, community potlucks,
    and the annual county fair, events that emphasize hospitality, modesty, and a strong sense of neighborly responsibility. The region’s agricultural roots are evident in the prevalence of family farms
    and a close connection to the outdoors, influences that nurture Leslie’s interest in animals and nature. Her cultural background reflects a blend of Anglo‑American heritage common to the area, with
    values that prize practicality, routine, and community service.
