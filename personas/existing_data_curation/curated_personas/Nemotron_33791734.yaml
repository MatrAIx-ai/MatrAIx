  career_goals: Although approaching retirement, Sierra aims to transition into a part‑time role as a financial‑literacy volunteer at her local community center, where she can share her banking knowledge
    with seniors and young adults. She hopes to create a simple budgeting workshop series, help her grandchildren secure scholarships, and stay current with digital banking tools. Maintaining a sense of
    purpose and financial security for herself and her family remains her primary ambition, as does leaving a legacy of responsible money management in her community.
