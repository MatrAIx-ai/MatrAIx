    Media)'', ''Mentorship & Coaching'']'
  hobbies: '[''Abstract Painting (Watercolor, Acrylic)'', ''Creative Writing (Poetry, Short Vignettes)'', ''Book Club (Contemporary Fiction & Philosophy)'', ''Hiking & Nature Photography'', ''Native Plant
    Gardening'', ''Volunteer Reading Mentor'', ''Community Theater Set Design'', ''Senior Arts Craft Circles (Modern Knitting)'', ''Attending Local Art Exhibitions'', ''Learning Museum Studies'']'
  career_goals: As a retired educator, Andrea channels her imaginative curiosity toward lifelong‑learning projects that bridge art and community. She aims to author a memoir‑styled collection of poems and
    reflective essays that chronicles her teaching journey and artistic evolution, and to exhibit a series of abstract mixed‑media works in Fort Collins galleries, highlighting the creative potential of
    seniors. Andrea plans to launch an intergenerational arts mentorship program that pairs retired teachers with middle‑school students for collaborative projects, securing grant funding to sustain it.
    She also seeks to complete a certificate in museum studies to deepen her curatorial expertise and serve on the board of a local non‑profit arts organization, where she can influence policy that supports
    creative aging. Ultimately, Andrea envisions a vibrant senior‑led public art installation along the Cache la Poudre River corridor, combining visual art, poetry, and environmental stewardship—an embodiment
    of her calm resilience and collaborative spirit.
