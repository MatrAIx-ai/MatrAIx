  hobbies: '[''Visiting art galleries and museums'', ''Painting and watercolor'', ''Photography'', ''Reading contemporary fiction and psychology'', ''Yoga and mindfulness meditation'', ''Running or jogging
    along the St. Lucie River'', ''Volunteer art workshops for youth'', ''Cooking experimental recipes'', ''Traveling to explore new cultures'', ''Attending community theater productions'']'
  career_goals: Driven by a competitive spirit and a desire for high achievement, Lauri aims to ascend to an executive leadership role within a regional nonprofit or to launch her own community‑focused
    social enterprise that fuses arts and mental‑health services. She seeks to secure sustainable funding streams, expand program reach across St. Lucie County, and become recognized as an innovator in
    community‑based art therapy. Long‑term, she plans to mentor emerging service managers, influence public policy on community health, and publish thought‑leadership pieces on integrating creative practices
    into social services, all while developing personal strategies to manage stress and maintain work‑life balance.
