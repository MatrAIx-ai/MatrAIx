personas:
  professional: Megan Goodman is a budding visual storyteller who spends afternoons sketching comic panels, experimenting with mixed‑media collages at the school art club, and dreaming of designing interactive
    graphic novels that blend puzzle‑solving gameplay with vibrant illustrations, while they maintain a relaxed attitude toward deadlines and relish unconventional ideas.
  sports: Megan Goodman kicks the ball for the after‑school team at Riverside Soccer Club, idolizes the attacking flair of FC Barcelona’s youth academy, spends weekends playing informal beach soccer with
    friends, and prefers the competitive thrill of scoring a winning goal over cooperative drills, which aligns with their more competitive than cooperative nature.
  arts: Megan Goodman dives into graphic novels by Alan Moore, experiments with bold colors inspired by Van Gogh’s Starry Night in mixed‑media pieces, reenacts scenes from Studio Ghibli’s Spirited Away
    during art club, and constantly seeks unconventional techniques, reflecting their curious and open‑minded artistic stance.
  travel: Megan Goodman enjoys spontaneous weekend trips to coastal towns like Monterey Bay to hunt for seashells, dreams of snorkeling at the Great Barrier Reef and exploring the ancient ruins of Machu
    Picchu, yet typically travels with a loose itinerary that leaves plenty of time for beachcombing and sketch‑book doodling, mirroring their love of flexibility over rigid planning.
  culinary: Megan Goodman prefers bright, simple meals such as avocado toast topped with cherry tomatoes, loves making fish tacos with fresh lime and cilantro after beach outings, and crafts strawberry‑banana
    smoothies that double as a quick snack between art projects, while they sometimes neglect balanced nutrition in favor of quick, tasty treats.
  core: Megan Goodman is a curious ten‑year‑old who blends competitive soccer energy with a love for experimental art, constantly juggling a scattered schedule, a piggy bank full of LEGO money, and a notebook
    brimming with seashell sketches.
background:
  cultural: Megan grew up in Wilmington, a suburban community in Los Angeles County, where the sunny Southern California lifestyle fuels her love for outdoor activities and beach culture. Her family is
    white, middle‑class American, and she participates in local community events such as seasonal festivals, art fairs, and school cultural showcases. The multicultural environment of the region exposes
    her to diverse artistic styles and ideas, enriching her creative outlook.
attributes:
  skills: '[''basic drawing and painting'', ''digital illustration'', ''LEGO building'', ''basic Scratch programming'', ''creative writing'', ''public speaking'', ''problem solving'']'
  hobbies: '[''drawing'', ''painting'', ''LEGO building'', ''exploring nature'', ''reading graphic novels'', ''video game puzzles'', ''soccer'', ''art club'']'
  career_goals: Megan dreams of blending her love for nature and visual storytelling, hoping to become an environmental artist or wildlife documentary filmmaker. She also aspires to lead a school science‑fair
    team and eventually study marine biology. In the near term, she wants to win art competitions, create her own simple video game, and design interactive art installations that inspire others.
