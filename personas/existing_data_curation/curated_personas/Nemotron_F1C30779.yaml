personas:
  professional: Lupe Rogers, a 42‑year‑old master stylist and salon manager, merges razor‑sharp precision cutting and balayage expertise with an abstract‑inspired artistic flair, orchestrates her team’s
    schedule with meticulous flexibility, relentlessly pursues top client satisfaction while skeptically evaluating new product hype, and thrives on the social buzz of salon life.
  sports: Lupe Rogers roots for the Dallas Cowboys, follows the Houston Astros, and joins a weekly co‑ed volleyball league at the local community center, while keeping fit through sunrise yoga at an Austin‑based
    studio and Pilates classes that counterbalance the physical demands of standing behind the salon chair.
  arts: Lupe Rogers channels the speculative worlds of N.K. Jemisin’s The Fifth Season into bold abstract canvases, draws inspiration from the street‑art provocations of Banksy and the vibrant patterns
    of Yayoi Kusama, revels in live sets by Tame Impala at the Parish venue, and studies fashion photography by Tim Walker to translate runway drama into avant‑garde hair art.
  travel: Lupe Rogers fuels curiosity by jetting to the Marfa Contemporary Art Fair, spending week‑long adventures at Burning Man, and exploring the Venice Biennale, while also squeezing in weekend trips
    to Austin’s SXSW and regional cultural fairs, carefully coordinating travel around salon duties and a modest budget.
  culinary: Lupe Rogers, an adventurous palate, delights in Korean‑BBQ tacos from a downtown food‑truck, savors Sichuan peppercorn noodles at pop‑up eateries, crafts truffle‑infused mushroom flatbread at
    home, and perfects matcha‑avocado toast while treating plating like a runway presentation.
  core: Lupe Rogers, a 42‑year‑old salon virtuoso who sketches hair concepts on coffee napkins while humming sci‑fi soundtracks, balances a competitive edge with a love for abstract painting, yoga‑induced
    calm, and occasional impulsive splurges on limited‑edition art supplies.
background:
  cultural: Lupe grew up in a small Texas town and embraces the Southern hospitality and strong sense of community typical of the region. While her ethnic background is white, she has absorbed the multicultural
    flavor of Bryan's growing arts scene, blending traditional Texan values—family gatherings, local festivals, and a love for outdoor activities—with a passion for avant‑garde art and contemporary culture.
    This mix informs her inclusive client approach, her appreciation for diverse styles, and her drive to infuse local heritage into innovative hairstyling.
