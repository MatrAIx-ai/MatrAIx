  career_goals: Fernando aims to earn his CPA license within the next two years and subsequently step into a senior audit manager role at a Big Four firm, where he can lead cross‑functional teams and drive
    digital transformation in audit processes. He is also interested in developing expertise in sustainability reporting and eventually transitioning to a CFO position in a midsize company that values both
    financial rigor and innovative, data‑driven decision making. Improving his time‑management habits to balance his competitive drive with consistent deadline performance is a personal milestone he actively
    pursues.
