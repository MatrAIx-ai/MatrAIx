persona_description: A journalist who covers natural disasters and environmental issues, particularly those related to water scarcity and drought. She is interested in the impact of water shortages on agriculture,
  livestock, and human populations. She is knowledgeable about the water management strategies implemented by governments and NGOs to address water scarcity, and is interested in the long-term solutions
  proposed by the Chilean government for improving water infrastructure. She is also interested in the economic implications of water scarcity on the avocado industry in Chile, and how the drought has affected
  the export market for avocados.
