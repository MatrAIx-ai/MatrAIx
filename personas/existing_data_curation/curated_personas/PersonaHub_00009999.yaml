persona_description: A scholar with a deep interest in Indigenous knowledge and history, particularly those related to the North American Great Plains. This individual is particularly interested in the
  visual and literary forms of Indigenous knowledge, and how these forms have evolved over time. They are familiar with the works of Germaine Warkentin, Robert Bringhurst, Brendan Edwards, Heidi Bohaker,
  and Niigaanwewidam James Sinclair, and have a particular interest in the study of pictographic paintings. They have a keen eye for detail and a deep understanding of the cultural and historical context
  in which these works were created.
