  career_goals: Chanroutie aims to advance into a strategic HR Business Partner role within a technology or renewable-energy organization in Hawaii, where she can shape talent-acquisition strategies and
    drive data-informed workforce decisions. She plans to earn the SHRM-CP certification and deepen her expertise in HR analytics, eventually leading a small HR team focused on employee experience, flexible
    work policies, and culturally responsive inclusion programs. Long-term, she envisions consulting for small businesses on building resilient, people-centric cultures, while mentoring other women entering
    the HR field.
