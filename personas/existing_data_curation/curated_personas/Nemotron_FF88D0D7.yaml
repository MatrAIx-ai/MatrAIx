  career_goals: Evol dreams of becoming a teacher one day so she can inspire younger children to love learning, especially in subjects like science and reading. She also imagines herself as a community
    organizer who can plan events that bring her neighborhood together. Occasionally, she fantasizes about being an astronaut or an engineer, building robots and exploring space, reflecting her curiosity
    about new ideas. Her practical side leads her to set short‑term goals such as winning the school spelling bee, leading a class project, and mastering a new coding challenge.
