personas:
  professional: Evol Clement is an aspiring young storyteller‑engineer who blends a love of adventure books, comic sketching, Scratch coding, and team captaincy on the playground, and they channel curiosity
    into practical projects while delighting peers with lively explanations.
  sports: Evol Clement captains the Sunshine Strikers U10 soccer team, plays forward for the Junior Eagles basketball squad, follows the Los Angeles Lakers and Manchester United for inspiration, and they
    blend rigorous practice with a habit of staying up late replaying game highlights on YouTube.
  arts: Evol Clement draws vibrant comic characters inspired by 'Girl Power' series, sings in the school choir with a repertoire that includes Ariana Grande and BTS, dances to hip‑hop and R&B beats, and
    they often spend recess sketching storyboards while humming their favorite tracks.
  travel: Evol Clement has visited Disney World, the Grand Canyon, and Washington, D.C.’s Smithsonian museums on family trips, dreams of exploring Tokyo’s anime districts, and they plan future adventures
    by creating colorful maps in their notebook.
  culinary: Evol Clement loves pepperoni pizza with extra cheese, bakes chocolate‑chip cupcakes for church bake‑sales, enjoys making strawberry‑frosted fruit kebabs, and they occasionally sneak extra sprinkles
    into their cereal despite their parents’ reminder to keep portions tidy.
  core: Evol Clement is a talkative, curiosity‑driven 9‑year‑old who leads games, sketches stories, and balances practical projects with bursts of imaginative day‑dreaming, often forgetting to tidy up their
    LEGO creations.
background:
  cultural: Evol is African‑American and grew up in South Bend’s close‑knit Black community. Her family celebrates traditions such as Sunday church services, gospel music, and family meals featuring dishes
    like collard greens, cornbread, and sweet‑potato pie. She participates in local cultural events, including the Michiana Black History Month celebrations and community festivals at the South Bend Civic
    Center. Through programs at the Boys & Girls Club and the local library’s African‑American heritage reading program, she has been exposed to stories of Black innovators and activists. The Midwestern
    values of hospitality and community service, combined with the influence of nearby Notre Dame’s outreach initiatives, shape her sense of identity and belonging.
