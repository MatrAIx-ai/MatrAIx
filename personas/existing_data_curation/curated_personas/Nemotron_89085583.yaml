  career_goals: Douglas aims to advance from his current role as a parts salesperson to a supervisory or managerial position within the next three to five years, obtaining ASE certification and deepening
    his expertise in emerging electric‑vehicle components. He envisions leading a high‑performance parts team, optimizing inventory through data‑driven practices, and expanding the shop’s online presence.
    Long‑term, he aspires to become a regional sales manager for a national automotive parts distributor, championing sustainable sourcing and innovative product lines. He also hopes to blend his artistic
    interest with his career by designing engaging visual displays and marketing campaigns that fuse technical detail with creative storytelling.
