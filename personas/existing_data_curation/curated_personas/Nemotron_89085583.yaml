personas:
  professional: Douglas Higgins is an automotive parts salesperson whose deep product knowledge, customer‑service flair, and data‑driven inventory expertise combine with a love for creative storytelling
    to drive sales, negotiate confidently, and envision a fast‑track path toward a supervisory role and eventual regional management.
  sports: Douglas Higgins dominates the community parks in Ypsilanti, playing intramural soccer with the Ypsilanti Soccer Club and basketball at the Ann Arbor Recreation Center, follows the Detroit Lions,
    the Michigan Wolverines, and the Detroit Tigers, and supplements team sports with weekly hikes along the Huron River trail, viewing fitness as a social, low‑pressure outlet.
  arts: Douglas Higgins frequents Ann Arbor’s Artspace Gallery openings, performs with the improvisational troupe “The Sputters,” and celebrates indie acts like The Dear Hunter, Wolf Parade, and Detroit‑based
    singer‑songwriter Lola Knuckles, while they also curate personal mixtapes that blend synth‑pop with classic Motown motifs, feeding their creative drive.
  travel: Douglas Higgins prefers spur‑of‑the‑moment road trips that blend adventure and cheap eats, such as weekend drives to Mackinac Island for bike tours, a spontaneous weekend in Austin, Texas for
    live music, and a dream itinerary to Lisbon, Portugal for its maritime history, always planning itineraries on a shared Google Sheet and budgeting carefully to fit their student‑like paycheck.
  culinary: Douglas Higgins delights in cooking experimental dishes like chipotle‑glazed pork ribs, miso‑infused ramen bowls, and smoked paprika‑spiced burgers topped with blue‑cheese crumbles, wielding
    a mid‑range sous‑vide and a growing collection of spice jars, yet they often burn midnight oil over a leftover pizza when a new parts order arrives.
  core: Douglas Higgins is a 22‑year‑old automotive parts enthusiast who blends a calm, resilient mindset with a nonstop social calendar, a penchant for DIY car projects, indie art scene outings, and a
    habit of juggling budgets that oscillates between meticulous spreadsheets and impulsive concert splurges.
background:
  cultural: Douglas grew up in a middle‑class, predominantly white suburban community in Ypsilanti, Michigan, where Midwestern values of hard work, reliability, and community engagement are deeply rooted.
    The proximity to the University of Michigan and Detroit’s rich automotive heritage exposed him to both academic and manufacturing cultures, fostering an appreciation for innovation and technical expertise.
    Participation in school art programs and local community theater introduced him to diverse artistic influences, while family traditions reflected a blend of Irish and German ancestry common in the region.
    This cultural mix instilled in Douglas a pragmatic outlook balanced with an openness to new ideas, and a strong sense of regional pride combined with a curiosity about broader artistic and technological
    trends.
