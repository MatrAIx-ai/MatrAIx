  hobbies: '["Woodworking", "Gardening", "Model train building", "Classic car restoration", "Reading historical nonfiction", "Bridge (card game)", "Fishing", "Volunteer work at church and senior center"]'
  career_goals: Although no longer in the formal workforce, Jared aims to stay active and useful in his community while preserving his independence. He plans to mentor teens and adults interested in automotive
    repair at the local community college workshop program, lead the neighborhood’s annual summer gardening fair, and complete a personal project of restoring a 1967 Chevrolet Impala to its original condition.
    He also hopes to travel to see his grandchildren in Florida each summer, and to deepen his digital literacy by learning photo‑editing software to document his restoration work and share it online. These
    goals reflect his blend of practicality, curiosity, and desire to contribute constructively.
