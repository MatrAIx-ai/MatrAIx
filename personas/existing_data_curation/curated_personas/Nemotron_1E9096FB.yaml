personas:
  professional: Jared Tesh, a retired automotive and manufacturing veteran, now mentors community‑college students and local hobbyists in engine repair and woodworking, blending classic hand‑tool precision
    with modern diagnostic software, and they bring a calm, resilient, cooperative approach that balances structure with flexibility.
  sports: Jared Tesh, an enthusiastic supporter of the Detroit Lions, Tigers, and Red Wings, spends weekends fishing on Lake St. Clair with the Lake St. Clair Anglers Club, participates in the Detroit Seniors
    Outdoor Walking Group, and they approach fitness through low‑stress, structured activities that complement their love of detail‑oriented hobbies.
  arts: Jared Tesh, an avid listener of classic rock legends like The Rolling Stones and Johnny Cash, a collector of Norman Rockwell prints, and a regular attendee of Detroit Repertory Theatre productions,
    frequently integrates artistic appreciation into his woodworking designs, and they let music and visual art shape their creative outlook and leisure time.
  travel: Jared Tesh, who travels each summer to Orlando, Florida to visit his grandchildren, dreams of driving his restored 1967 Chevrolet Impala along Route 66 to the Grand Canyon, and plans occasional
    trips to Stuttgart, Germany to tour the Mercedes‑Benz Museum, and they favor relaxed, family‑centric itineraries balanced with modest adventure, all while budgeting travel expenses within their fixed
    retirement income.
  culinary: Jared Tesh, who enjoys preparing garden‑fresh vegetable stew with carrots, potatoes, and tomatoes, cooking Detroit‑style pizza topped with pepperoni and fresh basil, and smoking trout caught
    during his fishing outings, has a solid home‑cooking skill set and they relish both the comfort of classic American dishes and the satisfaction of crafting meals from ingredients they grow or catch
    themselves.
  core: Jared Tesh, a calm, resilient 73‑year‑old with a toolbox mindset, channels lifelong curiosity into restoring classic cars, mentoring neighbors, and savoring quiet fishing trips, and they occasionally
    lose track of appointments while obsessively polishing every piece of wood they create.
background:
  cultural: Jared was raised in the suburbs of Detroit, Michigan, in a family of Midwestern roots with German and Irish ancestry. The region’s strong automotive heritage and community‑oriented values shaped
    his work ethic and practical mindset. He grew up during the post‑War boom, witnessing both the prosperity and later challenges of the manufacturing sector, which fostered a balanced view of innovation
    and tradition. As a white, middle‑class American, his cultural identity emphasizes self‑reliance, neighborly cooperation, and modesty. His long‑standing marriage and involvement in local churches and
    community groups reinforce a sense of belonging and a commitment to giving back, while his calm, resilient temperament reflects the stoic, no‑drama approach often associated with the broader Michigan
    cultural landscape.
attributes:
