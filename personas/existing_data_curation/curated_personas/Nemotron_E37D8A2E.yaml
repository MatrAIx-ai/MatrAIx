personas:
  professional: Cintia Rojas, an aspiring young illustrator who spends afternoons sketching murals and crafting papel picado, merges a curious eye for detail with a relaxed approach to deadlines, turning
    school art projects into vibrant community displays, and they often channel their assertive bursts of creativity into helping organize local library events.
  sports: Cintia Rojas, a fan of the Houston Astros and Dallas Cowboys, spends weekends playing forward for the Sullivan City Youth Soccer Club and enjoys casual basketball at the local park, preferring
    informal, low‑pressure activity over structured training, and they cheer enthusiastically during community sports festivals.
  arts: Cintia Rojas, who devours graphic novels and Mexican folklore stories, draws inspiration from Frida Kahlo’s vivid self‑portraits and Hayao Miyazaki’s whimsical worlds while listening to Lila Downs
    and contemporary pop, channeling that love into hand‑crafted papel picado, vibrant murals, and occasional sketches for her school’s art club, and they often share their creations with friends.
  travel: Cintia Rojas dreams of exploring the historic River Walk in San Antonio and the bustling markets of Mexico City, but for now they savor weekend trips to nearby brushlands for birdwatching and
    occasional family visits to Laredo, balancing a love for adventure with their parents’ budget constraints.
  culinary: Cintia Rojas, who can expertly roll masa for tamales and garnish tacos al pastor with fresh cilantro and lime, enjoys experimenting with bright salsa recipes and often designs decorative papel
    picado to accompany family meals, showcasing a budding culinary flair, and they take pride in helping prepare dishes for Día de los Muertos celebrations.
  core: Cintia Rojas blends a boundless curiosity for art and nature with a delightfully disorganized schedule, often losing track of school assignments while meticulously collecting smooth stones for their
    next mural.
background:
  cultural: Cintia is a first‑generation Mexican‑American growing up in Sullivan City, Texas, a tight‑knit border community where Spanish is spoken at home and English at school. Her family celebrates Día
    de los Muertos, the Feast of Our Lady of Guadalupe, and incorporates Mexican culinary traditions like tamales and tacos into daily life. She attends a local elementary school with a predominantly Hispanic
    student body, which reinforces her bilingual identity and cultural pride. The community’s strong emphasis on family, faith, and cultural festivals shapes Cintia’s worldview, encouraging her to blend
    her Mexican heritage with the broader American cultural landscape.
