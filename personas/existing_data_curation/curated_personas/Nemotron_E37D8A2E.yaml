  career_goals: Cintia dreams of becoming a visual storyteller who blends traditional Mexican art forms with modern digital media. She envisions studying graphic design or animation in high school and later
    creating interactive exhibitions that celebrate Mexican heritage and contemporary ideas. She is also interested in community outreach, hoping to lead art workshops for younger children in her town,
    and she aspires to travel to explore different cultures and artistic techniques, all while maintaining the flexibility to follow unconventional creative paths.
