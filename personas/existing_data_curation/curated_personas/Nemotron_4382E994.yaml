  career_goals: Although retired from formal employment, Leonard aims to channel his expertise into community service by leading a financial‑literacy workshop series for seniors and small‑business owners
    in Will County. He also hopes to serve on the board of the Lockport Art Center, helping to curate exhibitions that blend traditional and contemporary works. Leonard envisions establishing a modest scholarship
    fund for local high‑school students interested in business or the arts, thereby leaving a lasting legacy that reflects his lifelong commitment to learning and generosity.
