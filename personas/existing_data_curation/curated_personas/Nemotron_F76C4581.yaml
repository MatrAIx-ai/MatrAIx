  hobbies: '[''Watercolor painting'', ''Quilting'', ''Reading historical fiction and biographies'', ''Attending community theater'', ''Singing in church choir'', ''Gardening (heirloom tomatoes, wildflowers)'',
    ''Visiting art galleries'', ''Folk music festivals'', ''Craft fair vending'']'
  career_goals: Laura Mae aims to move into a supervisory or lead‑technician role within the next two years, leveraging her deep practical knowledge to oversee a shift and become the primary point of contact
    for safety audits. She plans to earn a certified safety officer credential through a community college program, which would allow her to transition into a less physically demanding position while still
    contributing to the plant’s efficiency. Ultimately, she envisions a gradual shift toward part‑time work that combines mentoring younger workers with pursuing her passion for art, perhaps by teaching
    basic drawing or craft workshops at the local community center after retirement.
