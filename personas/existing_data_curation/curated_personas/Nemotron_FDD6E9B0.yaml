  career_goals: 'Although officially retired, Lewana remains driven by a desire to leave a lasting legacy for her family and community. She aims to compile a memoir that weaves together her personal experiences,
    the history of Milwaukee’s Black neighborhoods, and the stories of the elders she has mentored. Lewana also hopes to expand her digital literacy by learning photography and video editing to preserve
    family moments and share them online. Volunteering remains a central ambition: she plans to continue assisting at the local senior center, advocate for more age‑friendly services in Milwaukee, and lead
    intergenerational workshops on cooking and crafting. Maintaining her health and independence is another priority, so she sets modest fitness goals such as regular walks along the lakefront and attending
    community exercise classes.'
