  career_goals: Mark aims to progress from his current junior financial manager role to senior finance leadership within a technology or fintech company. He envisions becoming a CFO or head of finance,
    where he can shape strategic financial planning, lead fundraising initiatives, and integrate data‑driven decision making. He plans to pursue an MBA with a focus on entrepreneurship and sustainable finance
    to broaden his strategic skill set. Mark is also passionate about bridging finance and the arts, hoping to develop corporate social responsibility programs that support creative ventures and cultural
    institutions. Long‑term, he aspires to mentor emerging finance professionals and eventually launch his own venture capital fund that backs innovative, culturally‑focused startups.
