personas:
  professional: Alecia Zeigler leverages her years of cash‑register expertise, meticulous inventory management, and passion for visual storytelling to excel as a floor supervisor, where her competitive
    drive and skeptical eye for customer motives blend with her creative problem‑solving to train new staff and keep the store humming.
  sports: Alecia Zeigler kicks off her day with sunrise beach walks along Fernandina, attends weekly yoga sessions at the community center, and cheerfully supports the Jacksonville Jaguars and Orlando Magic,
    while occasionally joining a local beach‑volleyball league that satisfies her competitive streak.
  arts: Alecia Zeigler spends weekends sketching historic downtown scenes at Amelia Island’s art galleries, revels in soul legends like Nina Simone and Miles Davis at the annual Art Fair, and curates a
    rotating mini‑exhibit of emerging local painters in her home, letting curiosity steer her artistic explorations.
  travel: Alecia Zeigler prefers road‑trip itineraries that blend cultural immersion—like the Juneteenth parade in Savannah and the jazz heritage tours of New Orleans—with moments of quiet reflection on
    secluded beaches, budgeting her travel fund carefully to fund both family visits and solo retreats.
  culinary: Alecia Zeigler’s kitchen is a laboratory where collard‑green‑infused mac and cheese meets shrimp‑and‑grits with a dash of smoked paprika, and while she confidently recreates family recipes,
    she sometimes forgets the oven timer while multitasking between art projects and grocery runs.
  core: Alecia Zeigler is a meticulous retail professional and budding entrepreneur whose curiosity, competitive edge, and love for community art are balanced by a lingering worry about finances and health,
    driving her to seek order through disciplined routines and creative expression.
background:
  cultural: Alecia identifies as African-American and grew up in a close-knit Black community in Northeastern Florida. Her family traditions are steeped in Southern hospitality, church fellowship, and the
    storytelling legacy of the civil-rights era. She cherishes gospel music, soul, and the culinary heritage of Southern comfort dishes passed down through generations. Participation in local cultural festivals,
    such as the Black History Month celebration and Amelia Island's Juneteenth events, reinforces her connection to the broader African-American experience in the South. This cultural tapestry informs her
    values of resilience, community service, and pride in celebrating Black artistry.
attributes:
  skills: '[''Customer Service'', ''Cash Handling'', ''POS System Operation'', ''Inventory Management'', ''Problem Solving'', ''Conflict Resolution'', ''Multitasking'', ''Time Management'', ''Basic Bookkeeping'',
    ''Training & Mentoring'', ''Art Appreciation'', ''Creative Thinking'']'
  hobbies: '[''Visiting Art Galleries'', ''Sketching'', ''Reading'', ''Cooking Southern Cuisine'', ''Gardening'', ''Beach Walking'', ''Yoga'', ''Listening to Podcasts'', ''Community Volunteering'']'
  career_goals: Alecia aims to move into a supervisory or store-manager position within the next few years, seeking formal training in retail management and leadership. She plans to complete an associate's
    degree in business administration at a community college while continuing to work. Long-term, she hopes to combine her passion for art and community by opening a small boutique-café that showcases local
    Black artists and offers handcrafted items. Achieving these milestones would provide greater financial stability for her family, honor her competitive drive, and allow her to give back to Fernandina
    Beach's cultural scene.
