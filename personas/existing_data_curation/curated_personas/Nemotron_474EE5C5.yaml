  career_goals: Inspired by his love of space, discovery, and building, David aspires to become an astronaut or aerospace engineer, dreaming of designing rockets and exploring other planets. He also envisions
    a future as an architect or inventor, merging his artistic talent with his disciplined approach to create functional, beautiful structures. His ambition includes leading collaborative projects that
    solve real‑world problems, reflecting his desire to make a measurable impact.
