personas:
  professional: David Spivey, an organized budding game creator, channels their boundless curiosity into Scratch projects that echo the sci‑fi worlds they love and translates their LEGO set designs into
    ambitious digital adventures.
  sports: David Spivey, a lively member of the Riverdale Junior Soccer Club, thrives in weekly Saturday matches for the local youth team, cheers for LA Galaxy, and spends weekend hikes in the nearby foothills,
    where they collect rocks and spot deer while staying active.
  arts: David Spivey, a passionate young artist, fills sketchbooks with cartoons inspired by Calvin and Hobbes, paints landscapes echoing Monet’s light, crafts mixed‑media collages with LEGO bricks, idolizes
    Hayao Miyazaki’s animation and Banksy’s street art, and eagerly shares their creations with classmates, who often commend they imagination.
  travel: David Spivey, an adventurous eight‑year‑old, has hiked the Grand Canyon’s rim, explored Disney World’s Magic Kingdom with family, dreamed of visiting the Ghibli Museum in Tokyo, and eagerly plans
    a school‑organized field trip to the natural history museum in Washington, D.C., while they keep a scrapbook of sketches from each trip.
  culinary: David Spivey, a budding chef in the family kitchen, loves pepperoni pizza, macaroni‑and‑cheese, and strawberry‑banana smoothies, often helps slice fruit for colorful kebabs using pineapple,
    mango, and blueberries, and enjoys arranging pancake art shaped like rockets from their favorite sci‑fi books, while they proudly serve their creations to friends who rave about they flavor.
  core: David Spivey mixes disciplined LEGO engineering with imaginative Scratch coding, they save pocket money in a piggy bank while navigating occasional candy cravings, tackle soccer drills with team
    spirit, and never let a blank page stay empty, often doodling in the margins of schoolwork.
background:
  cultural: David is a white American growing up in Idaho Falls, Idaho, a small city in the Mountain West with a strong sense of community and a connection to the outdoors. His family values education,
    self‑reliance, and involvement in local traditions such as county fairs, fishing trips, and winter sports. The regional culture emphasizes appreciation for natural landscapes—mountain vistas, rivers,
    and open plains—encouraging activities like hiking, camping, and wildlife observation. Community gatherings at school and local churches foster a supportive, collaborative environment, shaping his sociable
    and cooperative nature.
