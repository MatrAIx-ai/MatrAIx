personas:
  professional: Gary Cavalcante, an aspiring IT support technician, blends hands‑on troubleshooting of consumer electronics with beginner‑level Python and JavaScript scripting to automate daily chores,
    and leans on a naturally cooperative, curiosity‑driven mindset that lets them explain fixes in plain language while preferring flexible, on‑the‑fly scheduling over rigid corporate routines.
  sports: Gary Cavalcante enjoys low‑impact cardio by walking the New River Trail, unwinds with occasional fishing trips on the Intracoastal Waterway, and follows the Carolina Hurricanes and Jacksonville
    Jaguars while cheering for the local Onslow County youth soccer club on weekends.
  arts: Gary Cavalcante finds creative solace in building scale aircraft models, strumming a beginner acoustic guitar while listening to Nick Dean and Joni Mitchell, and devouring science‑fiction novels
    by Isaac Asimov and Andy Weir, which together color their imagination and inspire their solitary gaming adventures.
  travel: Gary Cavalcante prefers low‑budget solo getaways that blend tech curiosity and nature, such as weekend road trips to the Outer Banks for tide‑pooling, a scheduled visit to Seattle’s tech museums,
    and a dream of a future trip to Japan to attend a model‑kit expo, all planned with a flexible itinerary that leaves room for spontaneous detours.
  culinary: Gary Cavalcante, a self‑taught beginner cook, favors coastal flavors like grilled shrimp with garlic‑lemon butter, hearty fish tacos topped with cabbage slaw, and the occasional New Orleans‑style
    jambalaya, while experimenting with Old Bay seasoning and a modest pantry of fresh basil, cilantro, and canned beans.
  core: Gary Cavalcante is a quietly curious tech tinkerer who balances hands‑on problem‑solving with a laid‑back lifestyle, often juggling model kits, fishing lines, and a growing stash of programming
    snippets, all while occasionally forgetting to file receipts.
background:
  cultural: Gary comes from a Portuguese‑American family that settled in the southeastern United States. While his household maintains some Portuguese traditions—such as occasional family meals featuring
    bacalhau and celebratory gatherings for Festa da Nossa Senhora da Conceição—he was raised within the broader Southern white culture of North Carolina. This blend gives him a modest appreciation for
    both his ancestral heritage (including a few Portuguese phrases and Catholic customs) and the local community values of self‑reliance, neighborly support, and an affection for the coastal environment.
