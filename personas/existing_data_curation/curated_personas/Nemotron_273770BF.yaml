  career_goals: Gary aims to secure a stable technical role that balances hands‑on work with opportunities to learn new tools. He envisions starting as an IT support technician or a field service assistant
    for a local engineering firm, eventually earning certifications in networking or cloud services. Long‑term, he hopes to combine his practical skills with his curiosity by working on projects that improve
    community infrastructure, such as supporting the IT needs of Onslow County schools or contributing to renewable‑energy installations along the coast.
