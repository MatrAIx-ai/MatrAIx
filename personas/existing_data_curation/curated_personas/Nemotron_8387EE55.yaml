personas:
  professional: Anna Fitzpatrick, a retired educator turned community arts facilitator, leverages their watercolor and digital illustration expertise along with a generous dose of imagination to lead senior
    art workshops that prioritize flexible, experiential learning over rigid curricula.
  sports: Anna Fitzpatrick enjoys early‑morning birdwatching walks along the Gulf shoreline, takes part in a senior yoga class at the local community center, and follows the Tampa Bay Rays and Miami Dolphins
    with enthusiasm, sometimes attending a game when the schedule permits.
  arts: Anna Fitzpatrick immerses themselves in the arts by painting seascapes inspired by Monet and O’Keeffe, attending the Bradenton Art Festival to admire works by muralist Carlos Vega, and listening
    to Joni Mitchell and Norah Jones while sketching in a downtown café.
  travel: Anna Fitzpatrick prefers leisurely, culturally rich trips, having explored the botanical gardens of Kyoto and the historic alleys of Seville, while dreaming of a month‑long pilgrimage through
    Italy’s Renaissance museums, all planned with flexible itineraries that allow spontaneous detours.
  culinary: Anna Fitzpatrick blends Southern comfort with Mediterranean flair, regularly cooking shrimp and grits seasoned with preserved lemon and olives, experimenting with hibiscus‑infused sauces for
    brisket, and perfecting paella that features fresh rosemary, saffron, and smoked paprika.
  core: Anna Fitzpatrick is a free‑spirited, 66‑year‑old artist who swaps rigid schedules for spontaneous brushstrokes, a penchant for herb‑laden cooking, and a habit of misplacing their keys while daydreaming
    about the next museum visit.
background:
  cultural: Anna is a white American of primarily Irish and German ancestry, raised in a small town in Ohio where community gatherings and church events shaped her early sense of belonging. Moving to Bradenton
    in her early 50s, she embraced the coastal Southern lifestyle, integrating local traditions such as seafood cuisine, outdoor living, and the region’s lively arts festivals into her personal identity.
    She values the blend of Midwestern work ethic with the relaxed, creative spirit of Florida’s Gulf Coast, and participates in multicultural events like the annual Manatee County Art Festival, while maintaining
    family traditions of holiday storytelling and homemade pastries.
