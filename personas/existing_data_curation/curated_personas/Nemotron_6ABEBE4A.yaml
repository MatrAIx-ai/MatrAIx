    for friends'']'
  career_goals: Christopher aims to complete a bachelor's degree in Business Administration or Marketing within the next two years. He intends to secure a competitive internship in a fast‑growing tech startup
    or consulting firm, where he can apply his organizational and communication strengths. His long‑term ambition is to become a marketing manager or product manager, leading cross‑functional teams and
    driving measurable growth. He also dreams of launching his own boutique event‑planning consultancy that leverages his knack for structure and his sociable personality, positioning himself as a go‑to
    strategist for high‑profile community and corporate events.
