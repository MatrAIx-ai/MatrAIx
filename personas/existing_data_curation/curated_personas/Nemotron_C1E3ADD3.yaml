personas:
  professional: Lorrene Goncalves, a licensed electrician with a specialty in residential wiring and solar retrofits, leverages their methodical planning, curiosity for design, and assertive mentorship
    style to deliver code‑compliant, energy‑efficient solutions while fostering a collaborative apprenticeship program.
  sports: Lorrene Goncalves hikes the Blue Ridge foothills with their local women’s hiking club, plays recreational softball on the White County Women’s League in spring, follows the Tennessee Titans football
    and Nashville Predators hockey teams, and incorporates weekly yoga sessions to maintain flexibility for their DIY projects.
  arts: Lorrene Goncalves frequents the downtown art gallery to admire Ansel Adams prints, volunteers as a set designer for the Little River Community Theater, paints hand‑crafted ceramics inspired by Georgia
    O’Keeffe’s palette, and relaxes listening to folk duo Old Crow Medicine Show while watercoloring landscapes in the style of Bob Ross, reflecting their blend of technical precision and artistic curiosity.
  travel: Lorrene Goncalves prefers scenic road trips, having explored the Blue Ridge Parkway, the historic streets of Charleston, and the lavender fields of Provence, while planning future voyages to the
    Amalfi Coast and Kyoto’s bamboo forests for a blend of natural beauty and cultural immersion, showcasing their love of both familiar horizons and far‑off adventures.
  culinary: Lorrene Goncalves, an adept home cook, perfects Southern comfort foods like smoked collard greens with ham hocks and shrimp‑and‑grits, experiments with baked brie topped with figs and honey,
    and delights friends with their signature sweet tea brewed with fresh lemon zest and a dash of hibiscus.
  core: Lorrene Goncalves blends meticulous craftsmanship, artistic curiosity, and community stewardship into a vibrant life that balances sustainable electrical work, creative pursuits, and spirited social
    engagement, and they approach each day with thoughtful determination.
background:
  cultural: 'Lorrene was born and raised in a small town near Clarkesville, GA, in a family of Portuguese descent that settled in the American South in the 1950s. Growing up in a Southern, predominantly
    Protestant community, she internalized values of hospitality, self‑reliance, and community service. Her family maintained cultural traditions such as celebrating Portuguese holidays, cooking dishes
    like caldo verde, and listening to fado music, while also embracing the rhythm of Southern life—church gatherings, high school football, and county fairs. This blend of Southern and Portuguese heritage
    informs her outlook: she values hard work, respects craftsmanship, and enjoys sharing diverse cultural experiences with friends. The close‑knit nature of White County encourages active participation
    in local events, volunteer projects, and neighborhood networks, all of which shape her identity as a community‑oriented, culturally curious individual.'
attributes:
  skills: '["Residential wiring", "Commercial electrical systems", "Solar panel installation", "Electrical code compliance (NEC)", "Troubleshooting and diagnostics", "Project planning and scheduling", "Apprentice
