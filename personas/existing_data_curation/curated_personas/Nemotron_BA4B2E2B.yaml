personas:
  professional: Devon Byrum, a 15‑year‑old high school sophomore, is cultivating a budding career as a visual storyteller, blending analog photography with digital editing; their methodical nature drives
    meticulous composition, and their competitive edge fuels participation in school photography contests and chess tournaments, where strategic thinking informs their artistic decisions.
  sports: Devon Byrum channels physical energy into weekend hikes along the Cascade foothills, often tackling the Mount McLoughlin trail, and participates in a local youth cross‑country club, while cheering
    for the Seattle Seahawks and Portland Trail Blazers from home; they also belong to an outdoor climbing group that meets monthly at a nearby crag.
  arts: Devon Byrum immerses themselves in visual and auditory arts, drawing detailed wildlife sketches inspired by Ansel Adams, curating a growing analog photography portfolio featuring black‑and‑white
    forest scenes, and listening to indie musicians like Sufjan Stevens, Fleet Foxes, and Japanese shoegaze band Chai; they regularly attend Klamath Falls Museum of Art exhibitions and contribute a quarterly
    piece to the school art zine.
  travel: Devon Byrum prefers meticulously planned trips that balance adventure with budget, spending summer holidays hiking the Columbia River Gorge, dreaming of photographing Iceland’s waterfalls, and
    having already visited Portland’s food cart pods and San Francisco’s Golden Gate Park; they favor backpacking over luxury stays and use a detailed itinerary spreadsheet for each outing.
  culinary: Devon Byrum enjoys simple, hearty meals such as smoked salmon bagels, homemade mushroom risotto using foraged Oregon chanterelles, and late‑night ramen, while experimenting with espresso‑based
    coffee drinks; their cooking skill sits at an intermediate level—enough to whip up a reliable pasta sauce but still relying on microwavable snacks for quick study breaks.
  core: Devon Byrum is a methodical teen photographer with a competitive streak, who balances solitary artistic pursuits with rugged hikes, strict budgeting, and a cautious approach to health, all while
    nurturing a quiet curiosity about the world.
background:
  cultural: Devon was raised in a white, middle‑class family in Klamath Falls, Oregon. Her upbringing emphasized self‑reliance, appreciation of the surrounding natural landscape, and participation in the
    community’s school and arts programs. Although her family’s traditions are rooted in typical Pacific Northwest small‑town life, she has been exposed to broader artistic influences through school art
    classes, online creative communities, and occasional visits to regional museums. This blend of rural Oregon values and a curiosity for diverse creative expressions shapes her worldview.
