  career_goals: Devon aims to pursue a career that merges creativity with technology, such as UI/UX design, interactive media, or indie game development. In the short term she plans to build a robust portfolio
    of digital artwork and develop a functional website or app for a school club. Long term, she hopes to study graphic design or computer science at a university, work on interdisciplinary creative projects,
    and eventually lead teams that explore unconventional design solutions.
