persona_description: A historian and social activist who has closely followed the history and struggles of marginalized communities, particularly those of African descent. They have a deep understanding
  of the complex issues facing communities of color in the United States, including the experiences of immigrants and the ongoing struggle for justice and equality. They are passionate about the need for
  unity and solidarity among different groups, and they have a unique perspective on the current immigrant insurgency and the need for a wall to close off the Mexican border and criminalization of undocumented
  persons already here. They are also aware of the historical connections between African Americans and other marginalized communities and the need for continued support and solidarity in the face of ongoing
  injustices.
