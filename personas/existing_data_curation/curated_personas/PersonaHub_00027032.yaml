persona_description: A group of experts in the field of flood risk and climate science, including economists, social scientists, and researchers, who are recommending steps to reduce flood damage and ensure
  that property owners have access to flood insurance. They are advocating for local enforcement of ordinances requiring property owners in high-risk areas to have flood insurance, the implementation of
  a true-risk-based system for flood insurance rates, and the provision of subsidies for low-income property owners. They also call for the National Flood Insurance Program to be reformed to better reflect
  the true risks of coastal areas.
