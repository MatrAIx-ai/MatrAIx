  career_goals: As he approaches retirement, Sahadeo aims to transition from full‑time operation to a part‑time advisory role where he can share his decades of field knowledge. He plans to obtain an OSHA‑authorized
    trainer certification so he can conduct safety workshops for younger workers in the Camden County construction community. He also hopes to mentor at least two apprentices to ensure a smooth handover
    of his equipment‑operating expertise. Financially, he wants to secure a comfortable retirement for his family while staying engaged in occasional on‑call equipment inspections for local contractors.
    Community‑wise, he would like to volunteer his time to help maintain the local Hindu temple’s grounds and assist with cultural events.
