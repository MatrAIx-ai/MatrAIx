personas:
  professional: John Mayo is a dedicated industrial and refractory machinery mechanic with six years of hands‑on experience diagnosing hydraulic, pneumatic and heat‑resistant systems, who blends a practical
    curiosity for emerging diagnostic tools with a methodical, lean‑maintenance mindset, making them a reliable problem‑solver poised to lead a maintenance engineering team.
  sports: John Mayo cycles with the Sonoma County Cycling Club along the Pacific Coast Highway in the spring, follows the San Francisco Giants and Golden State Warriors through the season, and joins a weekend
    pickup soccer game with friends, balancing a pragmatic fitness routine with a competitive edge.
  arts: John Mayo spends evenings listening to The Avett Brothers and Neil Young while tinkering in the garage, attends local art fairs showcasing Ansel Adams‑inspired photography, and squeezes in occasional
    live shows at the Sonoma Chill concert series, letting music and visual art fuel their creative problem‑solving.
  travel: John Mayo prefers low‑key road trips, having explored the vineyards of Napa, the rugged Oregon coast, and a week hiking in Utah’s Zion National Park, while dreaming of a future cycling tour through
    New Zealand’s South Island, planning each outing with a blend of spontaneity and a detailed checklist.
  culinary: John Mayo enjoys mastering grill techniques, regularly cooking rosemary‑garlic lamb chops, smoked brisket with a dry rub of smoked paprika, and pairing them with a home‑brewed amber ale, while
    also whipping up fresh farm‑to‑table salads featuring heirloom tomatoes, avocado, and feta.
  core: John Mayo blends a mechanic’s precision with a maker’s curiosity, obsessively fine‑tuning tools between coffee sips, yet often procrastinates paperwork in favor of a weekend bike ride.
background:
  cultural: John grew up in a multigenerational, middle‑class family in Northern California, with roots tracing back to the Pacific Northwest and the Midwest. His household blended a pragmatic work ethic
    common among American “blue‑collar” families with an appreciation for the local agricultural and viticultural traditions of Sonoma County. He celebrates the region’s harvest festivals, values environmental
    stewardship, and embeds the mix of individualism and community responsibility into his daily life.
attributes:
  skills: '["Mechanical troubleshooting", "Hydraulic system maintenance", "Pneumatic system maintenance", "Welding (MIG, TIG, Stick) of refractory components", "Blueprint and schematic interpretation",
    "Preventive maintenance scheduling", "Equipment calibration", "Root cause analysis (RCA)", "Safety compliance and OSHA standards", "Diagnostic software (e.g., VFD programming)", "Team training and mentorship",
    "Continuous improvement (Kaizen)"]'
  hobbies: '["Hiking and wine tasting in Sonoma", "Cycling coastal routes", "Woodworking and furniture building", "Vintage motorcycle restoration", "Home brewing", "Grilling and barbecue", "DIY electronics
    projects", "Reading maker and engineering magazines"]'
  career_goals: John aims to become a lead maintenance engineer within the next three years, earn Certified Maintenance & Reliability Technician (CMRT) and Certified Welding Engineer qualifications, and
    ultimately transition into a consultancy role where he can design maintenance strategies for high‑temperature processing plants, especially those adopting renewable‑energy‑driven technologies. He is
    also interested in supervising a small team that pioneers efficiency projects and contributes to the growing green manufacturing industry in the Bay Area.
