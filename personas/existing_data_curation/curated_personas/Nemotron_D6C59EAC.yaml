personas:
  professional: Troylyn Washington, a community oral historian and master quilter, shares civil‑rights stories and stitches intricate narrative quilts, using their gentle mediation style and relaxed scheduling
    to inspire younger generations.
  sports: Troylyn Washington enjoys gentle morning walks with the Selma Seniors Stroll, attends the Alabama Crimson Tide football games when possible, and participates in weekly low‑impact yoga at the community
    center, keeping active without competitive pressure.
  arts: Troylyn Washington, a devoted gospel choir member, finds inspiration in Mahalia Jackson, Louis Armstrong, and the vibrant folk art of the Selma Craft Cooperative, channeling that passion into quilts
    that echo the rhythms of jazz and spoken‑word recordings.
  travel: Troylyn Washington prefers relaxed day trips to historic sites like the National Voting Rights Museum in Montgomery and occasional weekend getaways to New Orleans for jazz festivals, planning
    trips by phone with grandkids and using senior discounts to stretch a modest travel budget.
  culinary: Troylyn Washington savors collard greens seasoned with garden‑grown basil, sweet potato pie, and fried catfish, skillfully blending traditional Southern recipes with fresh herbs from her modest
    vegetable patch, while indulging occasionally in a slice of pecan cake at the local diner.
  core: Troylyn Washington weaves quiet resilience into every quilt, story, and garden bloom, balancing a gentle forgetfulness with a steadfast devotion to preserving community memory.
background:
  cultural: Troylyn Washington is a lifelong resident of Selma, Alabama, and her identity is deeply rooted in African‑American Southern culture. Born in the mid‑1930s, she grew up during segregation and
    witnessed the pivotal moments of the civil‑rights movement that reshaped her city. The Black church has been a central pillar in her life, providing spiritual sustenance, community support, and a venue
    for musical expression. Oral storytelling, passed down from elders, informs her sense of history and her dedication to preserving family memory. Traditional Southern cuisine, especially dishes rooted
    in the African diaspora, connects her to generations of cooks before her. Her appreciation for quilting reflects both a creative outlet and a cultural tradition that intertwines practicality with artistic
    storytelling. Throughout her life, she has navigated challenges with quiet resilience, drawing strength from communal bonds, faith, and an enduring love for the arts.
attributes:
  skills: '[''Oral history narration'', ''Quilting and textile arts'', ''Community mediation'', ''Gardening'', ''Traditional Southern cooking'', ''Basic digital literacy'', ''Creative writing and memoir
    drafting'', ''Art appreciation and informal critique'', ''Empathetic listening and small‑group facilitation'']'
  hobbies: '[''Reading historical narratives'', ''Quilting'', ''Gardening'', ''Attending church services and choir singing'', ''Listening to gospel and jazz music'', ''Walking historic sites in Selma'',
    ''Writing memoirs and reflections'', ''Exploring contemporary art exhibitions'', ''Learning basic digital photography'']'
  career_goals: Although retired, Troylyn aspires to preserve her personal and communal history for future generations. She aims to complete a written memoir that will be donated to the Selma Historical
    Museum, mentor young community members interested in storytelling or quilting, and volunteer as a guide for school groups visiting historic sites. She also wishes to deepen her understanding of contemporary
    art, attending exhibitions at the Montgomery Museum of Fine Arts, and to learn simple digital photography techniques to document everyday life in Selma. Ultimately, her ambition is to leave a tangible
    legacy of the cultural resilience and artistic spirit of her community.
