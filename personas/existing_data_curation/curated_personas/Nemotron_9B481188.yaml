  hobbies: '[''Vintage radio restoration'', ''Robotics hobby projects'', ''Reading technology history'', ''Reading African-American memoirs'', ''Fishing on the Ohio River'', ''Gardening'', ''Chess'', ''Jazz
    appreciation group'']'
  career_goals: Kelvin aims to attain advanced certifications in automated financial service systems and to transition into a supervisory role where he can mentor younger technicians, leveraging his competitive
    drive to raise team performance standards. He is also interested in exploring entrepreneurship by launching a small, community‑focused repair shop that offers rapid, reliable service while incorporating
    the latest security and IoT upgrades for ATMs. His long‑term ambition includes contributing to industry standards committees, using his skeptical, detail‑oriented mindset to improve reliability metrics
    across the field.
