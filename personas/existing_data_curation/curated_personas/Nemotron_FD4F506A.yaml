  career_goals: He aspires to work with animals and technology, dreaming of becoming a wildlife biologist who uses data tools to protect local habitats, or a game developer who creates educational games
    that help other kids learn, reflecting his curiosity about nature, love of problem solving, and desire to make a positive impact on his community.
