  hobbies: '[''Gardening (herbs, chilies)'', ''Cooking traditional and fusion Mexican dishes'', ''Walking on the beach'', ''Reading historical fiction'', ''Journaling and gratitude practice'', ''Crochet
    and knitting'', ''Small bilingual book club'', ''Participating in intimate community cultural celebrations'']'
  career_goals: Approaching retirement, Liza aims to stay active in both work and her community. She hopes to transition into a mentorship role within the store, training new associates while fostering
    a low‑stress, cooperative environment. She also dreams of launching a modest home‑based venture selling handcrafted Mexican‑inspired decorative items, allowing her practical creativity to flourish without
    overwhelming her routine. Additionally, Liza wishes to volunteer at the local senior center, offering workshops on budgeting and basic computer skills for fellow seniors, blending her business background
    with her desire to help others. Maintaining her health and emotional wellbeing remains central, so she plans regular mindfulness practice and participation in a weekly support group for widowed seniors.
