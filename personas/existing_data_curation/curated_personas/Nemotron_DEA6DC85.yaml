personas:
  professional: Liza Herrera, a seasoned retail sales veteran with three decades of bilingual customer service, point‑of‑sale expertise, inventory management, and visual merchandising, leverages their practical
    curiosity and empathetic conflict‑resolution style to mentor new associates while quietly refining store layouts to boost shopper calm.
  sports: Liza Herrera, a dedicated early‑morning boardwalk walker and occasional yoga participant, follows the Los Angeles Dodgers and Los Angeles Lakers from their porch while belonging to the Huntington
    Beach Senior Walkers club, preferring low‑impact activity that eases their joints.
  arts: Liza Herrera, an avid reader of historical fiction and participant in a bilingual book club, draws creative inspiration from the paintings of Georgia O'Keeffe and the soothing melodies of traditional
    folk guitarists, while crocheting blankets that echo the intricate patterns they admire in community craft fairs.
  travel: Liza Herrera, a thoughtful traveler who prefers carefully planned, low‑stress outings, has explored Catalina Island and Santa Barbara by train and dreams of a serene retreat to the gardens of
    a historic monastery in Spain, balancing their love for the ocean with a curiosity for distant cultural heritage sites.
  culinary: Liza Herrera, a confident home cook who nurtures a modest herb garden of cilantro, oregano, and assorted chilies, delights family and neighbors with their signature slow‑simmered chicken stew
    spiced with roasted pepper purée and fresh lime, and experiments with fusion twists like quinoa‑stuffed poblano peppers, while occasionally indulging in a slice of lemon‑infused cheesecake at local
    cafés.
  core: Liza Herrera, a quietly curious 74‑year‑old who balances meticulous budgeting, daily gratitude journaling, and a penchant for late‑night herb‑snacking, navigates life with gentle mindfulness despite
    a lingering worry about losing control of their routines.
background:
  cultural: Liza’s identity is shaped by her Mexican heritage and decades of life in Southern California. Raised in a Mexican‑American household, she grew up speaking Spanish at home and celebrating traditions
    such as Día de los Muertos, Las Posadas, and family fiestas centered on food, music, and communal sharing. These customs instilled values of respect, hospitality, and strong family cohesion that guide
    her everyday interactions. Living in Huntington Beach, she blends these traditions with Orange County’s multicultural vibe, supporting local Mexican businesses, attending community events, and preserving
    her culinary roots through home cooking. Her bilingual fluency enables her to act as a cultural bridge at work and within her community, respectfully integrating Mexican customs into her daily life
    while embracing the diverse environment around her.
