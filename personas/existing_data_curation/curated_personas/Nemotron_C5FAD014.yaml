personas:
  professional: Ivan Morgan, a budding game designer who channels the leadership skills honed during Fortnite battles into creating structured Minecraft mods while balancing spontaneous story ideas and
    a practical focus on immediate outcomes.
  sports: Ivan Morgan dribbles in pick‑up basketball games at the community park as part of the Northside Youth Basketball League, backs the Chicago Bulls, Chicago Cubs, and Chicago Bears, and swaps the
    court for Saturday soccer matches with the Riverdale Rangers, always eager to stay active despite occasional missed practice due to video‑game tournaments.
  arts: Ivan Morgan immerses themselves in pop hits from Taylor Swift and country tunes by Luke Bryan while devouring adventure novels by Rick Riordan and J.K. Rowling, creating LEGO dioramas inspired by
    story scenes, and performing improvised skits with friends during school talent shows.
  travel: Ivan Morgan loves spontaneous road trips to the nearby state park for camping, dreams of a summer visit to Disney World in Orlando and a future family cruise to the Caribbean, yet relies on parents
    for most travel planning and savings.
  culinary: Ivan Morgan enjoys pepperoni pizza, cheesy mac and cheese, chicken nuggets, and tacos topped with fresh avocado and lime, often trying his hand at making banana pancakes for breakfast but admits
    to over‑indulging in sugary cereal before bedtime.
  core: Ivan Morgan is a socially dynamic, structure‑seeking gamer who balances leadership in virtual battles with a love for spontaneous jokes, occasional impulsive spending, and a penchant for juggling
    schoolwork and endless LEGO projects.
background:
  cultural: 'Ivan was raised in Tomball, a suburban community in Harris County, Texas, that blends the slower‑pace of small‑town life with the cultural influences of nearby Houston. His family’s traditions
    reflect a typical White Texan upbringing: weekend visits to the local farmers’ market, attending community church events, cheering on the Houston Texans and high‑school football games, and participating
    in the annual Tomball Watermelon Festival. The region’s strong emphasis on hospitality and community involvement has shaped Ivan’s sociable nature, giving him many opportunities to interact with peers
    at after‑school programs and church youth groups. While he enjoys the local love of country music and barbecue, his school exposes him to the diverse cultural mix of the Greater Houston area, making
    him comfortable navigating both traditional Texan customs and the broader, multicultural environment.'
attributes:
