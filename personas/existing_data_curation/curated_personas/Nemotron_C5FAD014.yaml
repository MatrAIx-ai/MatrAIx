    pop and country music'', ''DIY science experiments'']'
  career_goals: Ivan imagines a future where he can blend his love of talking with his interest in sports and media. In the short term he wants to become the captain of his school debate or announcement
    team, start a weekly podcast with his friends, and maybe audition for the school drama club. Looking ahead, he hopes to work as a sports broadcaster or a TV host, a role that lets him prepare structured
    content while still delivering the spontaneous, lively commentary that his friends enjoy. He also keeps an open mind about becoming a content creator on platforms like YouTube, where he can share gaming
    tips and entertaining stories.
