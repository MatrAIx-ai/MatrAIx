  hobbies: '["Soccer","Cooking Mexican Cuisine","Hiking and Trail Walking","Reading Mexican History and Philosophy","Mentoring Bilingual Youth","Blogging about Education","Woodworking"]'
  career_goals: Javier aims to advance into instructional leadership, seeking a role as a curriculum coordinator or assistant principal where he can shape district‑wide bilingual programs and mentor teachers.
    He plans to pursue a master's in Educational Leadership within the next two years and to design after‑school STEM enrichment initiatives that serve under‑represented Latino students. Long‑term, he envisions
    advocating for equitable education policies and presenting his culturally responsive teaching model at national conferences.
