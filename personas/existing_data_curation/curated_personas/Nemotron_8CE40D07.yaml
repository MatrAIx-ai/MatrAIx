personas:
  professional: Bryce Rost, a 62‑year‑old woodworker and abstract painter, merges hand‑crafted furniture with philosophical storytelling, channeling a restless imagination into community‑center exhibitions
    while loosely managing deadlines and embracing a relaxed, disorganized workflow.
  sports: Bryce Rost enjoys a low‑key fitness routine of morning walks by the Ohio River, follows the Cincinnati Bengals with a loyal yet casual devotion, occasionally picks up a basketball at the local
    community center, and attends rowing club events as an appreciative spectator.
  arts: Bryce Rost’s artistic life orbits around painting abstract watercolors inspired by Mark Rothko, collecting vintage postcards of Midwestern river towns, listening to Miles Davis and Joan Baez at
    intimate coffee‑house gigs, and crafting furniture that doubles as sculptural statements.
  travel: Bryce Rost plans leisurely road trips to regional art fairs such as the Marfa Minimalist Art Festival and historic river towns like Louisville, cherishing spontaneous detours to antique shops
    and quiet riverfront cabins while budgeting modestly for fuel and boutique B&B stays.
  culinary: Bryce Rost cultivates an organic garden of heirloom tomatoes, basil, oregano, and peppers, brews seasonal home‑brewed ales, prepares rustic pasta with fresh tomato sauce seasoned with garden
    herbs, yet occasionally abandons balanced‑diet plans when a fresh batch of sourdough loaves or a new brewing experiment captures their attention.
  core: Bryce Rost, a 62‑year‑old river‑side dreamer with paint‑splattered hands, paradoxically juggles a wandering imagination and a delightfully messy schedule, finding meaning in solitary crafts, quiet
    mentorship, and spontaneous artistic indulgence.
background:
  cultural: Bryce grew up in a modest, white, middle‑class family in southern Indiana, where the rhythms of river‑side life and agricultural traditions shaped his outlook. His ancestry traces back to German
    and Irish immigrants who settled the region in the 19th century, and he was raised in a Protestant (Methodist) community that emphasized modesty, self‑reliance, and community service. The close‑knit
    nature of Rising Sun, with its historic river trade, local fairs, and folk‑art heritage, instilled in him an appreciation for craftsmanship, storytelling, and the natural landscape. While rooted in
    Midwestern values, Bryce’s curiosity has led him to explore broader artistic and intellectual currents, blending local sensibilities with a love for abstract and novel ideas.
