persona_description: A person who identifies as a rationalist and self-describes as such, but is also a member of a larger group of people who believe in the importance of empirical evidence and the senses
  in understanding reality. They may also hold beliefs about the existence of things like God, the soul, and moral law, but they are willing to acknowledge that these beliefs are not fully understood and
  may be subject to interpretation. They may also be critical of those who believe in ideas as the only way to judge reality, and may be willing to engage in discussions about the nature of reality and
  the limits of empirical evidence.
