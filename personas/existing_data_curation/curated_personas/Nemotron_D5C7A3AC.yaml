  career_goals: Richard dreams of becoming an astronaut who can explore space and draw the wonders he discovers. He also envisions himself as an inventor or engineer who designs imaginative machines, and
    as a writer‑illustrator for children’s books that combine science and fantasy. In the near term, he aims to win his school’s science fair with a creative project, earn recognition for his artwork, and
    one day help create a community art and science space in Peculiar, Missouri.
