personas:
  professional: A veteran Broward County bus driver, Latesa Walker blends meticulous route planning, calm conflict resolution, and a natural flair for mentorship to ensure punctual, safe service while consistently
    seeking opportunities to train and uplift new drivers.
  sports: A community‑spirit athlete, Latesa Walker participates in weekly Zumba sessions, cheers for the Miami Heat and Miami Dolphins, and joins a local recreational softball league each summer, balancing
    competitive drive with friendly camaraderie.
  arts: A devoted fan of classic soul, Latesa Walker spends evenings dancing to Aretha Franklin and Marvin Gaye at community halls, collects vintage vinyl, and loses herself in mystery novels by Agatha
    Christie, letting music and storytelling energize her social gatherings.
  travel: An organized explorer, Latesa Walker prefers structured weekend getaways, often revisiting the Florida Keys and dreaming of a Caribbean cruise to Jamaica and the Bahamas, planning trips around
    church events and budget constraints while packing a travel journal for each adventure.
  culinary: A kitchen virtuoso, Latesa Walker expertly blends Southern comfort with Caribbean boldness, crafting dishes like shrimp and grits with Scotch bonnet pepper, jerk chicken, and ripe mango salsa,
    while tending a modest garden of hot peppers and okra to freshen her recipes.
  core: Latesa Walker navigates life with a timetable in hand, a playlist of soul classics in the earbuds, and a garden of tropical herbs, never missing a bus stop nor a bingo night, yet occasionally losing
    track of time during Zumba marathons.
background:
  cultural: Latesa is an African‑American who grew up in the vibrant Black community of South Florida. Her family heritage traces back to the Great Migration, preserving Southern traditions, gospel music,
    and strong church ties. Living in Broward County, she blends these roots with the multicultural influences of the region, celebrating Creole and Caribbean flavors, participating in local cultural festivals,
    and valuing the communal support and resilience that define her identity.
attributes:
  skills: '[''Safe bus operation'', ''Route planning and navigation'', ''Customer service'', ''Conflict resolution'', ''Vehicle maintenance basics'', ''Time management'', ''Mentorship and training'', ''Compliance
    with transit regulations'', ''Record-keeping and reporting'', ''Community outreach'']'
  hobbies: '[''Dancing to soul and R&B music'', ''Cooking Southern and Caribbean cuisine'', ''Gardening tropical plants'', ''Volunteering at church outreach'', ''Beach boardwalk walking'', ''Reading mystery
    novels'', ''Participating in community bingo nights'', ''Attending Zumba fitness classes'']'
  career_goals: Latesa aims to advance to a senior driver trainer role within Broward County Transit, eventually moving into supervisory or dispatch management. She plans to earn certification as a Commercial
    Driver's License trainer, pursue a bachelor’s degree in transportation management, and contribute to initiatives that improve transit accessibility and equity for underserved communities.
