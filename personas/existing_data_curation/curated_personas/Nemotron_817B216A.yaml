  hobbies: '[''drawing with crayons'', ''building block constructions'', ''listening to storytime books'', ''nature walks and collecting leaves'', ''dancing to jazz, hip-hop, and gospel music'', ''interactive
    art workshops'', ''playing simple musical instruments'']'
  career_goals: Even at three, Arnold expresses whimsical yet focused ambitions that mirror his love for novelty, art, and abstract thinking. He often says he wants to become an astronaut to explore the
    unknown, an artist who creates colorful abstract paintings, or a storyteller who shares imaginative tales. He also shows an early desire to help others, envisioning roles like a firefighter or community
    helper, reflecting his assertive yet compassionate nature.
