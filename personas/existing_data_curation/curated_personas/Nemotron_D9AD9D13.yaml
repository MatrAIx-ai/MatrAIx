  career_goals: At 85, George’s primary ambition is to stay active, both mentally and physically, while giving back to his community. He aims to complete a series of lifelong‑learning courses on local history
    and emerging technology, document his family’s story in a memoir, and lead workshops at the senior center on budgeting and DIY repairs. He also hopes to mentor high‑school apprentices, support his wife
    in maintaining a comfortable and engaging retirement, and travel within Ohio to historic sites and natural areas he has long wanted to explore.
