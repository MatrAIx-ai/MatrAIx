persona_description: A panel of 17 experts from around the world collaboratively wrote guidelines outlining the safest way to drink water without going overboard, as a result of a tragic number of deaths
  attributed to drinking too much water or sports drinks during a physical activity. The guidelines are aimed at athletes, especially marathon runners, football players, and other athletes, who are particularly
  at risk of developing exercise-associated hyponatremia (EAH), a condition in which the kidneys become overwhelmed by the large quantity of liquid it’s forced to process. The panel recommends preventing
  hyponatremia by being in tune with your body and drinking when you’re thirsty, no more, no less, and using the innate thirst mechanism to guide fluid consumption. The guidelines also advise drinking 1.5
  to 2.5 extra cups of water to compensate for the fluid loss and drinking a sports drink that contains sodium to replace and balance out the increased water intake while reducing the chances of developing
  hyponatremia.
