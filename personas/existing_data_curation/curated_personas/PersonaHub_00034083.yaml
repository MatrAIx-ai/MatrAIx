persona_description: A textile industry expert and advocate, particularly associated with the Cotton Textile Institute (CTI) and its role in implementing the New Deal in North Carolina. The individual is
  knowledgeable about the history of the textile industry in the region, the impact of the Great Depression on the industry, and the role of CTI in addressing the crisis. They are familiar with the Code
  of Fair Competition for the cotton industry created by CTI and the Textile Labor Relations Board, and are aware of the collaboration between CTI and government agencies in implementing the National Industrial
  Recovery Act (NIRA) of 1933. This individual is likely to be interested in the intersection of industry, government, and labor in the South during the early 20th century, and may have a particular interest
  in the role of trade associations in shaping industry policy.
