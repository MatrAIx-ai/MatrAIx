  hobbies: '[''Scale model building'', ''Strategy video gaming'', ''Reading engineering non-fiction'', ''Playing piano'', ''DIY woodworking projects'', ''Bicycle riding'', ''Nature photography'']'
  career_goals: Jarid plans to complete his GED within the next year and then enroll in a local technical college to pursue a certificate in automotive technology. His short‑term goal is to secure an apprenticeship
    at a reputable garage, become a certified auto mechanic, and master the practical skills required for high‑quality vehicle repair. Over the next five to ten years, he aims to achieve journeyman status,
    possibly open his own repair shop, and apply his disciplined, detail‑oriented approach to managing staff and inventory. He also keeps open the option of joining the U.S. Navy or Army, attracted by the
    clear structure, training opportunities, and pathways for advancement they offer.
