persona_description: A multidisciplinary researcher with expertise in the study of the woolly mammoth and its life history, as well as the development of analytical techniques for isotope archaeological
  research. She is particularly interested in the isotopic compositions of ancient human and animal remains, and the use of these data to reconstruct past subsistence strategies and environmental conditions.
  Her project aims to develop new analytical techniques and data resources for isotope archaeological research in Finland, and to promote the field in general.
