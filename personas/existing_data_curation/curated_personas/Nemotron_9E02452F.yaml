  career_goals: Approaching retirement, George aims to transition from a full‑time shop role to a senior advisory position where he can mentor younger technicians and provide freelance prepress consulting
    for small businesses in Orange County. He plans to obtain a certification in digital printing technology to stay current with emerging workflows, and he hopes to build a modest side business that offers
    reliable, cost‑effective prepress services. Financial stability for his wife and maintaining a respected reputation in the local printing community are his primary motivations, while his competitive
    streak drives him to be recognized as a go‑to problem‑solver.
