persona_description: A marine biologist who specializes in the study of lobsters and their behavior, particularly in relation to their interactions with other marine organisms. They have conducted research
  on the phenomenon of lobster cannibalism, which has been found to be a result of the warming of the Gulf of Maine waters and the overfishing of cod. They have also studied the impact of climate change
  on the fishing industry in Maine, and how it has transformed the state's seafood industry by making it increasingly dependent on lobsters.
