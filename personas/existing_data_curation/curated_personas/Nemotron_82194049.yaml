  hobbies: '[''Urban Photography'', ''Art Gallery Visits'', ''Street‑Mural Tours'', ''Experimental Cooking'', ''Mexican‑Asian Fusion Cuisine'', ''Hiking'', ''Mindfulness Meditation'', ''Learning New Programming
    Languages'', ''Arduino Projects'', ''Strategic Board Games (Go, Chess)'', ''STEM Outreach Volunteering'']'
  career_goals: Virgilio aims to become a senior process engineer within the next three years, leading a team that develops sustainable, low‑carbon chemical processes for the specialty chemicals industry.
    He intends to obtain a Professional Engineer (PE) license and pursue a master’s degree focused on green chemistry or process intensification. Long‑term, he envisions stepping into a plant‑manager role
    where he can integrate cutting‑edge AI‑driven optimization and circular‑economy principles. He is also committed to mentoring underrepresented Mexican‑American students in STEM, publishing innovative
    research on waste‑reduction catalysts, and eventually launching a consultancy that bridges chemical engineering with design‑focused product development.
