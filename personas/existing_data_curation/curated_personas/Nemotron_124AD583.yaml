  career_goals: Joshua aspires to become a multidisciplinary creator who blends art and technology—specifically, he envisions a future career as an interactive media designer or video game developer, crafting
    immersive experiences that challenge conventional perspectives. He plans to attend a specialized high school focused on visual arts and computer science, pursue a college degree in digital arts or interactive
    design, and eventually work on projects that combine storytelling, visual aesthetics, and innovative gameplay mechanics. He is also interested in contributing to community art programs in Pittsburgh.
