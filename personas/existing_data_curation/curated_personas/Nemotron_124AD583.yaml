personas:
  professional: Joshua Mcleod is a budding programmer who builds interactive Scratch projects, helps design functional prototypes for his school's robotics club using LEGO engineering principles, and balances
    meticulous planning with spontaneous creativity in every challenge.
  sports: Joshua Mcleod follows the Pittsburgh Steelers and Penguins with spirited enthusiasm, plays forward on a neighborhood after‑school soccer team, and spends weekend afternoons cycling and trail‑running
    through Frick Park, blending team loyalty with personal fitness.
  arts: Joshua Mcleod immerses themselves in fantasy illustration inspired by artists like Brian Froud and Mike Mignola, devours graphic novels from creators such as Neil Gaiman and Marjorie Liu, and alternates
    between listening to classic rock staples like Led Zeppelin and ambient electronica by Brian Eno while sketching in the park.
  travel: Joshua Mcleod loves exploring local treasures like the Carnegie Museum of Art, Phipps Conservatory, and the historic bridges of downtown Pittsburgh, plans family weekend trips to nearby Niagara
    Falls, and dreams of one day wandering the castle ruins and lochside villages of a northern island, all while balancing schoolwork and a modest travel budget.
  culinary: Joshua Mcleod prefers comforting meals such as buttery mac and cheese, pepperoni pizza, and homemade shortbread cookies baked while bagpipe reels play in the background, occasionally experiments
    with simple sushi rolls using rice, nori, and fresh cucumber, and shows moderate kitchen confidence by assembling grilled cheese sandwiches for lunch.
  core: Joshua Mcleod is a curious 11‑year‑old who fills sketchbooks with fantasy worlds, codes playful Scratch games, saves spare change for LEGO sets, and hums holiday bagpipe tunes while tackling school
    projects.
background:
  cultural: Joshua comes from a family with Scottish roots, reflected in his surname Mcleod, and is raised in the diverse, industrial city of Pittsburgh, Pennsylvania. His household celebrates a mix of
    traditional Scottish customs—such as bagpipe music during holidays—and typical American middle‑class traditions, giving him an appreciation for both heritage and the multicultural milieu of his community.
    Frequent visits to local cultural landmarks like the Carnegie Museums, the Phipps Conservatory, and community festivals expose him to a broad spectrum of artistic and scientific influences, shaping
    his open and exploratory mindset.
