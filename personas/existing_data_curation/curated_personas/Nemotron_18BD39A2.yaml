  career_goals: Marvin's primary ambition is to deepen his impact on the Oklahoma City arts scene by establishing a community art studio that offers free workshops, mentorship programs, and exhibition space
    for emerging local artists. He aims to showcase his own work in regional galleries and secure a public art commission that reflects the spirit of the Great Plains. Beyond personal artistic achievement,
    Marvin aspires to expand his volunteer leadership, potentially directing a statewide arts-outreach initiative that brings creative programming to underserved neighborhoods and schools. He also hopes
    to compile a collection of poetry and essays inspired by his life experiences, and to travel to artist residencies that will broaden his creative perspective. Though he is no longer in the formal workforce,
    Marvin's career goals revolve around cultural contribution, mentorship, and leaving a lasting artistic legacy in his community.
