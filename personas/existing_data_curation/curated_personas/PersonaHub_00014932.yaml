persona_description: A heavy mining engineer who specializes in the design and operation of crushing and screening machinery. This person is skilled in the principles and operations of various types of
  crushers, including jaw, counterattack, vertical impact, hydraulic cone, type ring hammer, hammer, roller, composite, and cone crushers, as well as mobile crushers. They have experience with large-scale
  mine hard rock crushing and are familiar with the crushing ratio, particle size, and compressive strength requirements of various materials. They are also proficient in the use of heavy mining machinery
  and have a deep understanding of the different types of crushers and how they work.
