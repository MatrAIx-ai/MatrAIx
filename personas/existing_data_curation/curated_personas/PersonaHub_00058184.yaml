persona_description: A medieval theologian and philosopher who wrote extensively on the Holy Trinity, logical philosophy, and the Platonic view of the body and universals. Walter of Mortagne was educated
  in the schools of Tournai and taught at the School of St-Genevieve in Paris before becoming a bishop in Laon. His works include a treatise on the Holy Trinity, six "Opuscula," and a letter to Abelard.
  Walter's philosophy is notable for its protest against the exaggerated realism of William of Champeaux and its preparation for the moderate realism of the thirteenth century.
