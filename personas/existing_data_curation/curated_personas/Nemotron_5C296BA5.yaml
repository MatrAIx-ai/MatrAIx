personas:
  professional: Ting Kim, a budding software engineer, channels their analytical knack and methodical planning into Arduino-driven health tech prototypes, leveraging Python and Java strengths while competing
    in school robotics challenges, and dreams of leading AI-driven medical device teams.
  sports: Ting Kim follows the Boston Celtics and Boston Bruins avidly, plays competitive online League of Legends tournaments on weekends, and squeezes in occasional table tennis matches at the community
    center, preferring solo practice over team sports but respecting the strategic discipline it offers.
  arts: Ting Kim, an amateur pianist, practices Chopin nocturnes to hone discipline, devours Isaac Asimov’s novels, streams soundtracks by Hans Zimmer, and draws creative inspiration from indie game composer
    Yoko Shimomura, weaving these influences into occasional short‑story flash fiction.
  travel: Ting Kim enjoys structured travel, planning trips with detailed itineraries; they have visited Boston’s MIT Museum and Washington D.C.’s National Air and Space Museum, and they long to explore
    Tokyo’s Akihabara district and the scenic mountains of Hualien during Lunar New Year gatherings.
  culinary: Ting Kim prefers precise cooking, often scripting the timing of their home‑cooked dumplings in a custom Arduino timer, favoring dishes like jiaozi and beef noodle soup, while also appreciating
    the simplicity of pepperoni pizza and the occasional bubble tea stop after study sessions.
  core: Ting Kim blends a competitive, methodical mind with quiet curiosity, dutifully balancing rigorous coding projects, disciplined piano practice, and frugal budgeting, all while navigating teenage
    life with a hint of skepticism and occasional overcaffeinated marathon sessions.
background:
  cultural: Ting is a second-generation Chinese-American. Her parents emigrated from Taiwan in the early 2000s, and the family maintains Mandarin as a household language. Cultural values such as respect
    for elders, emphasis on education, and communal harmony influence her upbringing, while growing up in Malden exposes her to a diverse, multicultural environment. She celebrates Lunar New Year with family
    gatherings, enjoys traditional dishes like dumplings, and participates in local Chinese cultural events. At the same time, she navigates the American school system, blending her heritage with a contemporary
    U.S. teenage experience.
