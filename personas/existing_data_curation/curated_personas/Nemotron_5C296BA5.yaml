  hobbies: '[''Arduino and Raspberry Pi projects'', ''Chess puzzles'', ''Competitive online gaming (League of Legends)'', ''Reading science fiction and tech articles'', ''Writing technical blog posts'',
    ''Playing piano'', ''Robotics club'', ''Chinese cultural celebrations'']'
  career_goals: Ting aspires to attend a top-tier university for computer science or biomedical engineering. In the short term, she plans to graduate high school with a GPA above 3.8, win a regional science
    fair, and secure a summer internship at a local tech startup or research lab. Long term, she aims to become a software engineer specializing in AI-driven health-tech solutions, eventually leading a
    development team that creates accessible tools for underserved communities. She also envisions founding a nonprofit that bridges technology education gaps for immigrant youth.
