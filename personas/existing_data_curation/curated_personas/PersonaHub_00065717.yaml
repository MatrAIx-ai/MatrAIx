persona_description: A scientist who is interested in the impact of chronic nitrogen additions on forest ecosystems, particularly in the Midwestern and Northeastern U.S. and Europe. They are knowledgeable
  about the responses of forest ecosystems to N enrichment, the effects of chronic N additions on plant and soil properties, and the changes in soil respiration and microbial community structure. They are
  also interested in the long-term impacts of chronic N additions on ecosystem properties and processes, including net primary production, aboveground net primary productivity, and soil respiration. They
  have experience conducting research on chronic nitrogen additions at Harvard Forest and have published results from the first 15 years of this experiment in a special issue of Forest Ecology and Management.
