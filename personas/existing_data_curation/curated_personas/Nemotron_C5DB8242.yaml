personas:
  professional: Jose Macias, a retired automotive maintenance specialist, uses their bilingual, methodical skill set to mentor apprentices and coordinate community workshops, bringing meticulous record‑keeping
    and a healthy dose of skepticism to ensure every project meets exacting standards.
  sports: Jose Macias supports the Tampa Bay Rays and follows the local Lakeland Soccer Club, joins the Lakeland Lake Anglers Association for early‑morning fishing trips, and they maintain fitness through
    daily walks and a senior‑center bridge league that satisfies their competitive streak.
  arts: Jose Macias immerses themselves in plena and salsa playlists featuring Celia Cruz and Ismael Rivera, attends the annual Latin music festival at the Centro Puertorriqueño, and they read biographies
    of Caribbean revolutionaries, letting the rhythm influence their woodworking designs.
  travel: Jose Macias prefers low‑key weekend getaways to the Florida Keys and occasional trips to their family’s island home for Noche Buena celebrations, planning itineraries months ahead but leaving
    room for spontaneous fishing spots along the Gulf Coast, and they relish the balance of structured travel and unexpected discoveries.
  culinary: Jose Macias’s kitchen is a lab for traditional dishes like arroz con gandules and pasteles, seasoned with garden‑grown cilantro, recao, and sofrito, and they proudly perfect their lechón roast
    every holiday, though they admit to over‑salting their adobo on rare occasions.
  core: Jose Macias blends a disciplined, spreadsheet‑loving mind with a love for fishing, woodworking, and rhythmic salsa, navigating retirement with a competitive edge, a cautious wallet, and a steadfast
    commitment to preserving their island‑rooted customs.
background:
  cultural: Jose is a first‑generation American of Puerto Rican descent. His parents migrated to Florida in the 1960s, bringing with them vibrant traditions, Catholic faith, and Spanish as the family language.
    Growing up in Lakeland, Jose balanced the island customs—such as celebrating Noche Buena, dancing bomba and plena, and cooking festive dishes—with the broader Floridian culture. He remains fluent in
    both Spanish and English, often serving as a cultural bridge within the local Puerto Rican community. He participates in events at the nearby Centro Puertorriqueño, supports local Latin music festivals,
    and regularly visits the church where he maintains the cultural practice of attending Mass on Sundays.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Preventive maintenance planning'', ''Budget preparation and monitoring'', ''Project scheduling using Gantt charts'', ''Detailed record keeping and documentation'',
