personas:
  professional: A teenage DIY mechanic and aspiring model kit builder, Jonathan Abela applies their love of structured video‑game logic to methodically troubleshoot bike repairs, assemble detailed car models,
    and plan gaming strategies, while preferring routine over rigid schedules.
  sports: Jonathan Abela splits time between shooting hoops with friends at the local park—cheering for the Los Angeles Lakers and the Boston Celtics—and weekend fishing excursions at Lake Sunset with the
    town angling club, while also occasionally riding with the local bike club.
  arts: Jonathan Abela immerses themselves in graphic novels like ‘Spider‑Man’ and ‘Saga’, idolizes creators such as Stan Lee and Fiona Staples, and regularly watches DIY repair videos from YouTuber ChrisFix,
    seeing these visual media as both entertainment and practical instruction.
  travel: Jonathan Abela prefers short, family‑organized trips, having fished on Lake Sunset and camped in the nearby national forest, and dreams of a future road trip to the Grand Canyon and a gaming‑centric
    visit to Tokyo’s Akihabara district, balancing school obligations with a limited travel budget.
  culinary: Jonathan Abela favors simple, hearty fare such as grilled fish caught on dad’s fishing trips, homemade pizza topped with pepperoni and olives, and the occasional snack of cheesy nachos while
    gaming, and has a budding skill in assembling quick, one‑pot pastas.
  core: Jonathan Abela is a routine‑loving teen who channels curiosity into bike fixes and model kits, battles occasional anxiety with gaming distractions, and can’t resist a spontaneous graphic‑novel purchase
    despite a modest allowance.
background:
  cultural: Jonathan grew up in a predominantly white, middle‑class community in Elkhart, Indiana, a city known as the "RV Capital of the World." His family has deep Midwestern roots with a hint of Italian
    heritage, reflected in the surname Abela, and they attend a local Catholic church. The cultural environment emphasizes practicality, hard work, community involvement, and traditional American holidays
    such as Thanksgiving and Christmas. These values shape his routine‑oriented, pragmatic outlook and his desire for a stable, hands‑on career.
attributes:
  skills: '[''Routine task execution'', ''Basic mechanical repair'', ''Basic computer operation'', ''Visual programming (Scratch)'', ''Team sports (basketball)'', ''Cooperative communication'', ''Cooking
