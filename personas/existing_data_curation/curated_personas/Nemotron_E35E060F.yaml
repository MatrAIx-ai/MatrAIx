  hobbies: '[''Video gaming'', ''Basketball'', ''Fishing'', ''Bike tinkering'', ''Model kit building'', ''DIY repair videos'', ''Reading graphic novels'']'
  career_goals: Jonathan wants a steady, hands‑on career that offers a predictable schedule and lets him apply his practical skills. He plans to graduate high school and enroll in a local vocational program
    to become an automotive technician or welder, aiming for a certified position at an Elkhart RV factory or a community auto‑repair shop. Long‑term, he dreams of opening a small bike‑repair business where
    he can serve neighbors while maintaining a routine work environment. He values a job that provides financial stability to support his family and allows him to stay connected to his community.
