  career_goals: Claris aims to combine her love for community, sports, and digital media into a career that empowers other teens. She plans to attend a specialty high school focused on performing arts or
    athletics, then pursue a degree in communications or sports management. Her long‑term goal is to become a sports and youth content creator who produces engaging online videos highlighting local talent
    and promotes active, healthy lifestyles, while also mentoring younger students in her community.
