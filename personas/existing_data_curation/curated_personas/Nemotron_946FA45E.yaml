personas:
  professional: Claris Shah is an aspiring digital content creator who blends hip‑hop dance routines with everyday teen storytelling on TikTok, using a practical, schedule‑driven filming routine while leaving
    room for spontaneous improvisation, and channeling a competitive streak into out‑performing peers in online dance challenges.
  sports: Claris Shah dribbles with friends at the neighborhood park three afternoons a week, competes in the school’s intramural basketball league, and roots for the Golden State Warriors, channeling a
    competitive drive into sharpening a three‑point shot while occasionally volunteering to coach younger kids during community festivals.
  arts: Claris Shah blends kinetic storytelling in TikTok videos set to Kendrick Lamar, SZA, and Kirk Franklin, draws choreography inspiration from the Jabbawockeez, and devours teen fiction such as Angie
    Thomas’s The Hate U Give, shaping a vibrant artistic identity that fuses music, movement, and narrative.
  travel: Claris Shah prefers short, budget‑friendly road trips that fit around school, having explored nearby Savannah for its historic squares and spent a weekend at a music festival in New Orleans, while
    dreaming of a spring‑break visit to New York City’s Broadway district and a future cultural immersion in London’s street‑art scene.
  culinary: Claris Shah cooks family Southern comfort foods like crispy fried chicken seasoned with a secret blend of paprika and garlic, buttery collard greens slow‑cooked with smoked turkey, and experiments
    by marinating the greens in hot sauce, but frequently forgets to clean the kitchen promptly, leaving a lingering aroma that often draws neighbors in.
  core: Claris Shah is a competitively spirited teen who balances a love for structured routines in dance and budgeting with spontaneous TikTok bursts, thriving on community energy while occasionally letting
    disorganization and late‑night editing steal their sleep.
background:
  cultural: Claris grew up in Kaufman, Texas, within a close‑knit African‑American community where family, church, and music play central roles. Her upbringing blends Southern culinary traditions, gospel
    worship, and contemporary hip‑hop culture, fostering a strong sense of resilience, community solidarity, and cultural pride. She celebrates Black heritage through family gatherings, church events, and
    local festivals, and stays aware of broader social issues affecting Black youth, which influences her aspirations to uplift her peers through media and mentorship.
