  career_goals: Alina aims to transition into a senior HR business partner role within a technology‑focused organization, where she can champion data‑driven people strategies and champion diversity and
    inclusion for Latino employees. She plans to earn the SHRM‑SCP certification, mentor emerging HR professionals, and eventually establish a boutique consulting practice that assists small‑to‑mid‑size
    companies in building structured, culturally resonant talent programs.
