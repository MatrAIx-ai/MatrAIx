personas:
  professional: Alina Rubio is a data‑driven HR strategist with a solid STEM foundation who excels at talent acquisition for technical roles, leverages HRIS analytics to inform workforce planning, and they
    balance meticulous process improvement with empathetic employee relations, positioning them for a senior HR business partner role in a tech‑focused firm.
  sports: Alina Rubio hikes the Blue Ridge trails on weekends, belongs to the Virginia Outdoor Adventure Club, roots for the Washington Capitals in hockey, and they regularly join a local 5K run organized
    by the Fairfax Running Group each spring.
  arts: Alina Rubio attends the Wolf Trap National Park for the Performing Arts to enjoy symphonies, delights in Broadway revivals such as 'Hamilton', and they curate a small collection of folk‑art prints
    that adorn their home office.
  travel: Alina Rubio prefers organized itineraries that blend nature and culture, having explored the historic streets of Charleston, the vineyards of Napa Valley, and the hiking routes of the Canadian
    Rockies, while they dream of a spring trip to Kyoto’s cherry‑blossom gardens.
  culinary: Alina Rubio lovingly prepares traditional stuffed corn cakes with cheese and herbs, simmers hearty black bean soup seasoned with cumin and cilantro, and they experiment with heirloom tomato
    sauces, often sourcing fresh herbs from their own garden.
  core: Alina Rubio is a meticulously organized HR professional who balances a data‑centric career with a love for gardening, yoga, and community volunteering, yet they sometimes let work stress blur their
    bedtime routine.
background:
  cultural: Alina is a first‑generation Salvadoran‑American who grew up in a bilingual household in Virginia. Fluent in Spanish and English, she maintains close ties to the Salvadoran community through
    local cultural events, family gatherings, and traditional celebrations like Día de los Faroles. Her upbringing emphasized resilience, family cohesion, and a strong work ethic, values she brings to her
    collaborative yet assertive HR style. Alina often incorporates Salvadoran flavors and music into her home life and is actively involved in mentoring young professionals from similar cultural backgrounds.
