persona_description: A geologist or a researcher who is interested in the study of glacial history and bedform patterns. They are likely to be familiar with the concept of satellite imagery and its use
  in geological mapping. They have a keen interest in reconstructing past environmental changes and assessing the impact of millennial-scale changes in climate on glacial activity. They are likely to have
  a background in the study of ice flows and bedforms, and have experience in using satellite imagery to analyze large-scale geological patterns. They are also likely to be familiar with the concept of
  drumlinization and the role of pervasive sediment deformation in glacial systems.
