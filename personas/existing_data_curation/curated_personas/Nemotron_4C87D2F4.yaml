  career_goals: Maxwell aspires to advance to a supervisory role within the dispatch center, such as shift lead or operations manager, where he can mentor new dispatchers and shape procedural improvements.
    He plans to pursue certifications in emergency management and possibly complete a bachelor's degree in public administration to broaden his strategic influence. Long term, he hopes to integrate innovative
    technologies like AI assisted call triage to improve response times and develop community outreach programs that educate the public on emergency preparedness.
