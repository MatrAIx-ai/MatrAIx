    User 2: I love movies and concerts. I don''t read as much as I used to.

    User 1: What are some of your favorite movies?

    User 2: I love the Lord of the Rings trilogy, The Matrix, and The Dark Knight.

    User 1: Those are all great movies. I love the Lord of the Rings trilogy too.

    User 2: Me too. It''s so good.

    User 1: So, what are you up to today?

    User 2: Not much. Just working.

    User 1: Same here. I''m working on a car.

    User 2: Nice. What kind of car?

    User 1: It''s a Corvette.

    User 2: Oh, nice. I love Corvettes.

    User 1: Me too. They''re so beautiful and fast.

    User 2: Yes, they are.

    User 1: So, what are your plans for the weekend?

    User 2: I''m not sure yet. Maybe I''ll go hiking or biking.

    User 1: That sounds fun.

    User 2: Yeah, it does.

    User 1: Well, I''m going to get back to work. It was nice talking to you.

    User 2: You too. Have a nice day.

    User 1: You too.'
