persona_description: A scientist who specializes in the study of waste heat recovery and has developed a new method of capturing and using waste heat, particularly in the form of water vapor. This method
  relies on the use of a polytetrafluoroethylene membrane and relies on the principle of vapor condensation to increase the volume of the cooler liquid. The device has the potential to generate up to 400
  bars of pressure and generate 3.5 Watts per square meter of membrane with a 40°C temperature difference.
