persona_description: A historian or archaeologist who is interested in the history and culture of ancient Greece, particularly the period from the 18th to the 17th centuries B.C. They are curious about
  the origins of significant elements of European history and are eager to learn more about the New Palace period of Crete, the wall paintings of Akrotiri, the Shaft Grave period of the Greek mainland,
  and the political changes on Cyprus. They are also interested in the broader implications of the new chronology for the study of early Mediterranean history.
