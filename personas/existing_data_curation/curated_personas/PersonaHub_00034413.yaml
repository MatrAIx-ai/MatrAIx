persona_description: A dairy and food laboratory researcher or technician who is responsible for conducting quality assurance testing on various dairy and food products, including testing for alcohol and
  acidity, butterfat content, freezing point, and more. They work in QA/QC labs, which are on-site facilities that are responsible for ensuring the quality of milk, cheese, yogurt, and other dairy products.
  These researchers and technicians use microscopes to examine samples for bacterial growth and counts, and epoxy and stainless steel workstations to ensure easy access to running water and plumbing. They
  are skilled in performing various quality assurance tests on dairy products, and are familiar with the phases of dairy testing, including farmyard sample testing, tanker sample testing, production testing,
  shelf-life testing, and microscope tables and epoxy and stainless steel lab sinks. They are detail-oriented and meticulous in their work, and are dedicated to ensuring the quality and safety of dairy
  products.
