personas:
  professional: A budding junior community helper, Su Harmon volunteers at the local library’s storytime, showcasing organized planning, reliable follow‑through, and a natural knack for coordinating group
    activities that mirrors their love for routine and teamwork.
  sports: An enthusiastic youth soccer player, Su Harmon plays forward for the Troy Tigers Soccer Club, attends regular practices after school, cheers on the Buffalo Bills in football season, and joins
    a local ice‑skating class in winter, embodying a love for structured team sports and community spirit.
  arts: A lively choir participant, Su Harmon sings in the Troy Community Choir, delights in performing songs by Taylor Swift and Disney’s Frozen soundtrack, spends weekends crafting friendship bracelets
    inspired by Billie Eilish’s style, and idly sketches scenes from classic children’s books, weaving music and handmade art into their social identity.
  travel: A curious family traveler, Su Harmon has explored the Finger Lakes during a summer camping trip, visited the historic Erie Canal museum, yearns to see the Statue of Liberty in New York City, and
    prefers trips with a clear itinerary that balance educational stops and playful downtime.
  culinary: A budding baker, Su Harmon enjoys mixing batter for chocolate chip cookies, vanilla cupcakes topped with rainbow sprinkles, and helps stir in cinnamon and nutmeg for homemade apple crisp, demonstrating
    a methodical approach to cooking that mirrors their love for predictable steps and sharing treats with friends.
  core: Su Harmon is a routine‑loving, socially vibrant ten‑year‑old who blends organized reliability with a compassionate drive to help others, often juggling soccer drills, choir rehearsals, and cookie
    baking with cheerful precision.
background:
  cultural: Su comes from a typical middle‑class white family in Troy, New York. Her family has deep roots in the upstate New York region, with ancestors who settled during the 19th‑century Erie Canal era.
    The household reflects mainstream American cultural values such as punctuality, respect for tradition, community involvement, and a modest, practical lifestyle. Her family participates in local community
    events, supports the public school system, and occasionally attends a local Protestant church where service and harmony are emphasized. Growing up in a small‑city environment, she experiences a blend
    of historical heritage and contemporary suburban life, shaping her appreciation for routine, cooperation, and practical contribution.
