  career_goals: Su dreams of a future where she can combine her love of routine, practicality, and helping others. She aspires to become an elementary school teacher because she enjoys creating structured
    learning environments that support young children. She also imagines working as a school counselor or community health aide to provide emotional support and practical assistance to peers and neighbors.
    Her long‑term plan includes graduating high school with honors, earning a degree in education or social work, and building a career that fosters harmony, reliability, and tangible positive impact.
