  hobbies: '[''Cooking traditional Puerto Rican dishes'', ''Watching baseball and soccer'', ''Fishing'', ''Cycling'', ''Reading historical biographies'', ''Listening to salsa/reggaetón music'', ''Playing
    video games'', ''Socializing at weekend barbecues'']'
  career_goals: Juan aims to move into a senior sales leadership role within the next five years, targeting a position as Sales Manager or Regional Sales Director for his wholesale manufacturing division.
    He wants to deepen his expertise in industrial supply chains, expand the company's footprint in Hispanic markets, and build a high‑performing team of reps who follow clear, repeatable sales processes.
    Balancing ambition with family stability, he plans to secure a reliable income stream that supports his marriage and future children. In the long term, Juan hopes to mentor new talent and possibly launch
    his own consulting practice focused on bilingual B2B sales strategy.
