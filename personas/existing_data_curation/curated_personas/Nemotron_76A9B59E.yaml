  hobbies: '[''Visiting art galleries and museums'', ''Sketching and watercolor painting'', ''Digital illustration'', ''Photography'', ''Reading art history and contemporary fiction'', ''Attending community
    theater'', ''Hiking in state parks'', ''Yoga and mindfulness practice'', ''Volunteering at community art programs'', ''Cooking Southern and Bulgarian dishes'', ''Playing ukulele in a folk band'']'
  career_goals: Ashley plans to attend a four-year university to major in visual arts and communications, with a minor in psychology. She aspires to work as an art curator or community arts program director,
    where she can combine her love of art, her organizational talents, and her desire to foster inclusive cultural experiences. She also considers a path in art therapy, aiming to help others manage stress
    through creative expression. In the short term, she hopes to secure an internship at a local museum or a graphic design studio, and to build a portfolio of her artwork and event planning projects.
