personas:
  professional: Ashley Robinson, an 18‑year‑old aspiring visual arts and communications major, channels their curiosity, organized event‑planning talent, and strong digital illustration skills into crafting
    compelling museum exhibit proposals and community art programs, while they ensure every project deadline is met with inventive flair.
  sports: Ashley Robinson, a weekend hiker in their state’s Blue Ridge Park and member of a local youth yoga circle, they also root for the River Valley Rams minor‑league baseball team and join occasional
    community soccer pick‑ups, balancing active pursuits with a love for relaxed outdoor strolls.
  arts: Ashley Robinson, a devoted follower of contemporary art, immerses themselves in exhibitions by Ai Weiwei and Kerry James Marshall, sketches reinterpretations of Monet’s water lilies, captures candid
    street moments with a DSLR, strums Bob Dylan’s 'Blowin’ in the Wind' on ukulele in their folk band, and they never miss the community theater’s rendition of 'Our Town'.
  travel: Ashley Robinson, having explored New York City’s Chelsea galleries, Washington D.C.’s Smithsonian museums, and the Appalachian Trail sections near home, they now dream of wandering Florence’s
    Uffizi Gallery and traveling to Sofia to study Bulgarian culinary traditions firsthand.
  culinary: Ashley Robinson, a budding home chef, masters Southern comfort staples like buttermilk fried chicken, collard greens, and peach cobbler while also perfecting Bulgarian banitsa and Shopska salad,
    they delight friends with the buttery crunch of homemade biscuits and the tangy zest of roasted red peppers.
  core: Ashley Robinson, an 18‑year‑old art aficionado, balances meticulous planning with bouts of anxiety, they often juggle midnight sketch sessions, spontaneous museum visits, and a habit of over‑checking
    their budget spreadsheet before sleep.
background:
  cultural: Ashley grew up in Chauncey, a tight‑knit town in Laurens County, Georgia, where Southern hospitality, church fellowship, and community events shape daily life. Her family blends Southern American
    traditions—such as Thanksgiving feasts, gospel music, and high school football Saturdays—with a touch of Eastern European heritage, reflected in her grandmother’s Bulgarian recipes and occasional cultural
    celebrations. This multicultural upbringing nurtured Ashley’s appreciation for diverse artistic expressions and community‑oriented values.
attributes:
  skills: '[''Digital illustration (Adobe Photoshop, Illustrator)'', ''Photography and photo editing'', ''Event planning and coordination'', ''Public speaking and debate'', ''Written communication and creative
