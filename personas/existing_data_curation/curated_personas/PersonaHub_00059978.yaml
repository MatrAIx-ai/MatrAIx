persona_description: A creative artist who is interested in exploring different drawing techniques and combining them with nature inspiration. They enjoy using different media and paper types and are interested
  in developing abstract pieces. They also enjoy using collage to combine different elements and exploring different styles and techniques. They have a unique talent for using pastel and chalk to document
  human form and movement, and are inspired by artists like Chagall and Richard Diebenkorn. They are also interested in exploring the link between mood and color, and responding to music. They have a special
  interest in using wet on wet and wax resist techniques, and are skilled in layering different marks and textures. They are also interested in landscape painting, and have a passion for exploring the different
  marks and textures that can be made with acrylic, using palette knife and scratching, layering, and highlighting elements using pastel and chalk. They are also interested in marbling and have a keen interest
  in exploring different marks and patterns, using knowledge of warm/cool colors, and using the dried marble paper to create collage landscapes. They are also interested in using cutting and ripping techniques
  to explore edges and lines in compositions.
