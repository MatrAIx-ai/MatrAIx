    resource creation'', ''Group facilitation'', ''Inclusive classroom management'', ''Cross-disciplinary collaboration'', ''Creative problem solving'', ''Adaptability'', ''Bilingual communication (English,
    Khmer)'']'
  hobbies: '[''Digital illustration'', ''Watercolor painting'', ''Photography'', ''Improv comedy'', ''Southeast Asian folk dance'', ''Cooking traditional recipes'', ''Board games'', ''Escape rooms'', ''Hiking'',
    ''Science-fiction reading'', ''Short story writing'', ''Yoga'', ''Meditation'', ''Journaling'']'
  career_goals: Blia aims to transition from her current teaching‑assistant role to a tenure‑track faculty position where she can lead interdisciplinary research at the intersection of STEM and the arts.
    She plans to pursue a Ph.D. in Science Education or a related field within the next two years, focusing her dissertation on how visual storytelling and creative design improve student engagement in
    undergraduate labs. Over the medium term, she envisions developing a signature curriculum that blends computational biology with digital illustration, securing grant funding from agencies such as the
    National Science Foundation to scale the program nationally. She also hopes to mentor first‑generation and underrepresented students, create community outreach workshops that celebrate Southeast Asian
    scientific contributions, and eventually launch an ed‑tech startup that provides interactive, culturally responsive STEM learning modules. Balancing professional ambition with personal well‑being, she
    is committed to building habits that mitigate stress and sustain her imaginative spark.
