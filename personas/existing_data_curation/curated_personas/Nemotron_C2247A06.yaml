personas:
  professional: Blia Vang, a molecular biologist and data analyst who now works as a teaching assistant, fuses their talent for digital illustration and bilingual fluency to transform complex concepts such
    as PCR, fluorescence microscopy, and bioinformatics pipelines into vivid visual narratives for students, yet their spontaneous, highly imaginative temperament often leads them to wrestle with strict
    academic deadlines.
  sports: Blia Vang enjoys weekend hikes in the Pocono Mountains, practices yoga for flexibility, occasionally joins a local adult recreational soccer league, and cheers on the Philadelphia Flyers and Eagles,
    preferring low‑impact, socially‑oriented activities over strict gym routines.
  arts: Blia Vang blends a love for digital illustration inspired by artists like James Jean with watercolor sessions reminiscent of Georgia O'Keeffe, captures street moments on camera à la Henri Cartier‑Bresson,
    performs improv comedy with a troupe that riffs on Maya Angelou's narratives, and dances to traditional Southeast Asian folk rhythms while cooking family recipes, all of which fuel their eclectic creative
    identity.
  travel: Blia Vang prefers spontaneous, budget‑friendly trips that mix cultural immersion—such as a weekend exploring the historic streets of Hoi An and a fall road‑trip through Shenandoah National Park—with
    occasional longer adventures like a two‑week trek across the Canadian Rockies, always sketching a travel journal before returning to a demanding academic schedule.
  culinary: Blia Vang, an adept home cook, often prepares aromatic family dishes like lemongrass‑infused chicken broth with rice noodles, spicy mango sticky rice topped with fresh coconut flakes, and experimental
    ramen‑style soups featuring kombu broth and miso, while also experimenting with vegan pastries that blend avocado oil and almond flour.
  core: Blia Vang is a 33‑year‑old molecular biologist‑turned educator whose boundless imagination fuels daily creativity—illustrating labs, improvising comedy, and planning hikes—yet their spontaneous
    spirit and chronic worry often leave them scrambling to meet deadlines and occasionally overindulging in art‑supply shopping sprees.
background:
  cultural: Blia is the daughter of Cambodian immigrants who settled in the tri‑state area before moving to Monroe County, Pennsylvania. She grew up bilingual, speaking Khmer at home while attending English‑medium
    schools. Her family places a high value on education, a principle that guided her pursuit of a STEM graduate degree. Cultural traditions remain central to her identity; she celebrates Khmer New Year
    (Chaul Chnam Thmey) with festive meals, traditional music, and dancing, and she maintains ties to the local Khmer Buddhist temple. The communal ethos of her heritage informs her collaborative teaching
    style, while her exposure to both Eastern and Western artistic aesthetics fuels her interest in fusing visual art with scientific instruction. She regularly volunteers at community centers, teaching
    basic coding and science workshops to recent immigrant youth, and she incorporates motifs from Cambodian textile patterns and folklore into her classroom visuals, creating a bridge between her cultural
    roots and her professional passion.
