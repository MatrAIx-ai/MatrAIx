personas:
  professional: Leonor Soto, a bilingual office administrator in Riverside with a talent for fine‑tuning calendars, travel itineraries, and multi‑line phone systems, blends practical reliability with a
    curiosity for new productivity apps, and they keep a bustling nonprofit’s front office running smoothly while fostering a friendly, collaborative atmosphere.
  sports: Leonor Soto keeps fit by jogging along Riverside’s riverwalk at sunrise, playing midfield for the co‑ed Riverside Runners soccer club on weekends, and cheering on the Los Angeles Dodgers and Lakers,
    and they treat salsa dancing as a high‑energy cardio session that satisfies both social and athletic cravings.
  arts: Leonor Soto fuels their creative side with salsa nights to the lively sounds of Celia Cruz and Marc Anthony, occasional trips to the Riverside Community Theatre for locally penned productions, and
    nightly reads of personal‑development books such as James Clear’s Atomic Habits, which they credit for blending structure with inspiration.
  travel: Leonor Soto plans travel with a mix of spreadsheet precision and spontaneous flair, favoring weekend escapes to Big Bear Lake for snowboarding, sunrise hikes in Joshua Tree, and relaxed ferry
    trips to Catalina Island, while pinning dreams of exploring Andalusia’s historic towns, all booked through travel‑budgeting apps that keep their finances in check.
  culinary: Leonor Soto’s kitchen showcases homemade tamales wrapped in corn husks, rich mole simmered with dried chilies, chocolate, and spices, and fresh salsa verde crafted from garden‑grown cilantro
    and tomatillos, reflecting a skilled home cook who merges family‑passed recipes with a love for native California herbs, and they often experiment with new herb blends to keep each dish vibrant.
  core: Leonor Soto is a socially magnetic office professional who balances meticulous organization with spontaneous salsa nights, garden‑scented cooking, and a relentless quest for personal growth—and
    they occasionally trade sleep for a night of dance.
background:
  cultural: Leonor grew up in a Mexican‑American household in Riverside, where Spanish was spoken at home and Mexican customs such as Día de los Muertos, quinceañeras, and communal cooking were central
    to family life. Her upbringing emphasized hospitality, respect for elders, and a strong sense of community, values she brings to both her work and volunteer activities. Being bilingual, she often acts
    as an informal translator and cultural bridge in her workplace and community events. The vibrant Mexican diaspora in Riverside provides her with a supportive network of extended family, neighborhood
    festivals, and community organizations that reinforce her identity and inform her collaborative, considerate approach.
attributes:
  skills: '[''Microsoft Office Suite (Word, Excel, Outlook, PowerPoint)'', ''Bilingual communication (Spanish‑English)'', ''Calendar and travel coordination'', ''Meeting facilitation and minute taking'',
    ''Customer service and front‑desk reception'', ''Basic bookkeeping and invoice processing'', ''Document management and filing'', ''Event planning and logistics'', ''Data entry and database maintenance'',
    ''Problem solving and process improvement'']'
  hobbies: '[''Salsa and folklórico dancing'', ''Preparing and sharing Mexican cuisine'', ''Volunteering at the Riverside Hispanic Resource Center'', ''Attending local festivals and cultural events'', ''Gardening
    with native California plants'', ''Walking or biking along the Riverside River Trail'', ''Reading self‑improvement and motivational literature'']'
  career_goals: Leonor aims to obtain a Certified Administrative Professional (CAP) credential and move into an office manager role within the next three years. She plans to earn her GED and enroll in an
    associate’s program in Business Administration at a community college, expanding her knowledge of finance and human resources. Ultimately, she hopes to blend her administrative expertise with community
    outreach, securing a position such as a community liaison or program coordinator for a nonprofit serving Riverside's Latino population.
