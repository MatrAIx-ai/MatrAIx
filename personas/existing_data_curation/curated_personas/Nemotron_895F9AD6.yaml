personas:
  professional: Eric Dupre, a 27‑year‑old healthcare operations manager in Jacksonville, blends sharp analytical abilities with meticulous organization to streamline multidisciplinary teams, while his sociable,
    calm demeanor makes him the go‑to mediator who keeps staff motivated and patients feeling heard.
  sports: Eric Dupre, a basketball enthusiast, organizes weekly pick‑up games at the Riverside Park courts and follows the Jacksonville Jaguars and the Jacksonville Jumbo Shrimp, while they keep fit with
    early morning jogs along the St. Johns River and a monthly participation in a local 5K charity run, though they sometimes skip rest days after an intense weekend of games.
  arts: Eric Dupre, a devoted fan of live jazz and soul, regularly attends concerts featuring the Charles Lloyd Quartet and the soulful stylings of Lizz Wright, while they unwind by watching classic performances
    by the original cast of Fiddler on the Roof and drop into open‑mic improv nights where they channel the quick‑witted spirit of Tina Fey and Keegan‑Michael Key.
  travel: Eric Dupre prefers spontaneous road trips along the Gulf Coast, often spending weekends hiking the Ocala National Forest and snapping sunrise shots at the St. Augustine lighthouse, while they
    have a bucket‑list entry for a music‑focused pilgrimage to New Orleans’ French Quarter and a dream of photographing the sunrise over the Grand Canyon in a future long‑term getaway.
  culinary: Eric Dupre, a confident home cook, often prepares Southern comfort staples such as smoked catfish, collard greens seasoned with smoked turkey, and buttery cornbread, while they love experimenting
    with a mango‑infused shrimp étouffée and a spicy sweet‑potato brownie, though their habit of forgetting to set a timer sometimes results in over‑charred crusts.
  core: Eric Dupre, a relentlessly organized yet sociable 27‑year‑old, balances a disciplined drive for healthcare equity with a love for impromptu jazz jams, weekend basketball marathons, and an occasional
    over‑zealous spreadsheet obsession that even their friends tease them about.
background:
  cultural: Eric is an African American raised in the Jacksonville metropolitan area. He grew up in a close‑knit church community that emphasized mutual support, oral storytelling, music, and soulful cuisine.
    The Southern Black cultural heritage—marked by resilience, collective responsibility, and a strong sense of identity—shapes his values of kindness, cooperation, and harmony. Living in a diverse Floridian
    environment, he is comfortable navigating multicultural settings and is committed to addressing health disparities affecting Black and other minority populations in his community.
attributes:
  skills: '[''Healthcare Operations Management'', ''Team Leadership'', ''Strategic Planning'', ''Budget Management'', ''Quality Improvement'', ''Data Analysis'', ''EMR Systems'', ''Regulatory Compliance'',
    ''Patient Experience Optimization'', ''Community Health Outreach'']'
  hobbies: '[''Basketball'', ''Live Jazz and Soul Concerts'', ''Cooking Southern Comfort Food'', ''Reading Nonfiction (History, Technology, Leadership)'', ''Podcasts on Healthcare Innovation'', ''Community
    Volunteering (Health Fairs)'', ''Traveling to Visit Family'', ''Photography'', ''Hiking in Local Parks'', ''Improv Comedy'']'
  career_goals: Eric aims to advance to a senior leadership position—such as Director of Operations or Vice President of Health Services—within the next five years. He plans to earn an MBA or a Master’s
    in Healthcare Administration to deepen his strategic expertise. He is driven to develop innovative, technology‑enabled care models that improve access for underserved communities in Duval County, and
    to become a champion for health equity. Long‑term, he envisions launching his own consultancy focused on operational excellence for community health centers, while mentoring emerging Black healthcare
    professionals.
