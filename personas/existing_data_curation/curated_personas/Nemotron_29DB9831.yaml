  hobbies: '[''Community Volunteering'', ''Hiking'', ''Gardening'', ''Cooking and Recipe Experimentation'', ''Book Club (Historical Fiction)'', ''Bowling League'', ''Bridge Club'', ''Photography'', ''DIY
    Home Projects'']'
  career_goals: Riham aims to advance into a supervisory role within the logistics department, such as Shipping/Receiving Supervisor or Inventory Control Manager, where she can lead a team and drive efficiency
    initiatives. She plans to earn a professional certification—like the APICS Certified in Production and Inventory Management (CPIM) or a Certified Supply Chain Professional (CSCP)—to solidify her expertise.
    Riham also hopes to implement a measurable accuracy improvement program that reduces inventory discrepancies by at least 15% within the next year. Long‑term, she envisions transitioning into a regional
    logistics coordinator position, overseeing multiple facilities while maintaining a balanced work environment that supports her emotional well‑being.
