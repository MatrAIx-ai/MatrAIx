persona_description: A person who is deeply involved in the conservation and management of freshwater fisheries, particularly in the Danube River Basin, and is passionate about the conservation of sturgeon
  species. This individual has extensive knowledge and experience in ichthyology, fisheries management, and conservation biology, and has contributed to various publications and initiatives related to these
  fields. They are also knowledgeable about the impact of non-native fish species on freshwater ecosystems and have been actively involved in the management of freshwater fisheries on bordering rivers.
  Additionally, they are knowledgeable about the management of freshwater fisheries in the Danube and Sava Rivers through joint policy development and institutional strengthening.
