  programming and are willing to reach out to teachers and schools to build relationships and create a Veteran's Day program. They are skilled in connecting with local military bases, units, and veteran's
  groups and are willing to provide resources and support to teachers to build a great Veteran's Day program. They are also knowledgeable about Veteran's Day resources to use in school and at home and are
  willing to share their knowledge and expertise with others.
