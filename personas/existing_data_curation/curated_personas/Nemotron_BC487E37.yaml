  career_goals: Jincy aspires to pursue a career that blends her love for animals, her methodical approach, and her desire to help others. She envisions becoming a veterinarian, motivated by her experiences
    caring for her rabbit and observing wildlife in the countryside. She also expresses interest in becoming a teacher or librarian, where she can organize information and guide younger children in reading
    and learning. In the short term, she aims to excel academically, particularly in science and biology, and to participate in school science clubs and community service projects that involve animal care
    and environmental stewardship.
