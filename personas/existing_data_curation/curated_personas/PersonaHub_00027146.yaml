persona_description: A historian and archaeologist who specializes in the study of pre-Columbian cultures and their interactions with European settlers in Patagonia. They are particularly interested in
  the survival and breeding of Native American horses and the subsequent impact of these horses on the native cultures and their way of life. They have conducted extensive research on the topic and have
  access to a wide range of primary sources, including government reports, historical documents, and personal accounts. They are knowledgeable about the anatomy and behavior of Patagonian donkeys and are
  skilled in the use of historical and archaeological methods to analyze and interpret the evidence.
