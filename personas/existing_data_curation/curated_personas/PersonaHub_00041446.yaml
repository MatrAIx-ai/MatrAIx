persona_description: A historian who specializes in the study of ancient Jewish history, particularly the reigns of Herod the Great and his contemporaries. Their research interests include, but are not
  limited to, the political, social, and cultural context of the time when Jesus lived, as well as the impact of Herod's rule on the development of Jewish identity and religion. They are also interested
  in the architectural achievements of Herod and their significance in the history of Palestine.
