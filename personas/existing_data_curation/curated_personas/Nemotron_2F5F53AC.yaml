personas:
  professional: Raimy Hilaire is a budding architect who channels a methodical eye for structure into detailed sketches of natural landscapes and local buildings, balancing school projects with a disciplined
    bullet‑journal routine that keeps deadlines in check.
  sports: Raimy Hilaire thrives on the co‑ed soccer team at Davenport High, practicing twice weekly and idolizing the disciplined play of the Florida Gulf Coast Eagles, while also cheering on the local
    football squad, the Polk County Panthers, and following the Tampa Bay Rays for off‑season inspiration.
  arts: Raimy Hilaire spends afternoons sketching intricate riverbank scenes inspired by the works of Jean‑Michel Basquiat and Kehinde Wiley, often listening to Beyoncé and Janelle Monáe while visiting
    the local art museum’s teen exhibit, which fuels a growing interest in graphic storytelling.
  travel: Raimy Hilaire dreams of exploring the vibrant streets of Port‑au‑Prince during family reunions, the historic French‑Quarter of New Orleans for its music and cuisine, and the Everglades for a guided
    kayak adventure, planning each trip in their bullet‑journal while balancing school assignments and limited travel funds.
  culinary: Raimy Hilaire enjoys helping prepare griot, diri kole, and pikliz alongside a spicy mango salsa during weekend family gatherings, and has mastered the art of seasoning collard greens with smoked
    paprika, often experimenting with plantain‑based desserts like banana‑rum flan.
  core: Raimy Hilaire melds a love for structured planning with spontaneous bursts of artistic flair, juggling soccer drills, sketch‑filled journals, and family cooking sessions while occasionally succumbing
    to late‑night comic‑book binge‑reading marathons.
background:
  cultural: Raimy is an African‑American teen of Haitian descent living in Davenport, Florida. Her family maintains Haitian traditions, speaking French‑Creole at home, celebrating Haitian Independence Day,
    and preparing classic dishes such as griot, diri kole, and pikliz. They also participate in Southern and Floridian customs, attending weekly church services, joining local community festivals that feature
    country music, orange‑grove celebrations, and attending high school football games. Growing up in Polk County, Raimy experiences a multicultural environment with neighbors from diverse backgrounds,
    fostering an inclusive outlook. The Haitian community in central Florida provides a strong support network that emphasizes resilience, storytelling, and music, while broader African‑American cultural
    influences shape her pride, activism, and appreciation for contemporary Black art and literature. This blend of Caribbean heritage and Southern American culture influences her values, food preferences,
    and sense of identity.
