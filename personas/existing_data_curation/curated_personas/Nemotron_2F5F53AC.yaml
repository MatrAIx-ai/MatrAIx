  hobbies: '[''Reading (young‑adult and non‑fiction)'', ''Sketching and drawing'', ''Soccer'', ''Cooking Haitian dishes'', ''Volunteer at library reading program'', ''Bullet‑journaling'']'
  career_goals: Raimy aims to graduate high school with honors, securing a scholarship that will enable her to pursue a degree in a STEM field. She is particularly interested in civil engineering because
    she enjoys designing functional structures and sees it as a way to contribute to the development of her community in Davenport. She also keeps an open option of becoming a pediatric nurse, driven by
    her caring nature and desire to help others. To strengthen her college applications, she plans to volunteer at the local community health clinic and participate in youth mentorship programs. In the
    long term, she wants to combine her technical abilities with community service, either by working on infrastructure projects that improve local neighborhoods or by providing health care to underserved
    populations.
