personas:
  professional: Megan Nelson is a budding LEGO architect who thrives on step‑by‑step building challenges, using their practical eye and competitive drive to complete each set ahead of peers while remaining
    calmly resilient in the face of missing pieces.
  sports: Megan Nelson splashes through weekly beginner swimming lessons with the community SplashStars club, they cheer loudly for the local Dayton Dragons minor‑league baseball team with a foam finger,
    and during fall they join a neighborhood youth soccer league, often modeling their competitive mindset on the Seattle Seahawks playbook, illustrating a love for organized, rule‑driven sports.
  arts: Megan Nelson decorates their bedroom walls with hand‑drawn comic strips inspired by the whimsical adventures of Adventure Time and the Disney classic Frozen, they enjoy listening to Kidz Bop’s upbeat
    pop covers, and they spend Saturday mornings coloring detailed printable pages of Van Gogh’s Sunflowers, blending a love for structured coloring with vivid imagination.
  travel: Megan Nelson dreams of revisiting Legoland California, the Disney World resort in Florida, and exploring the towering dunes at Great Sand Dunes National Park, they prefer meticulously planned
    family itineraries that include a daily schedule but leave room for spontaneous ice‑cream stops, and their passport already bears stamps from a recent weekend road‑trip to the Grand Canyon.
  culinary: Megan Nelson favors creamy macaroni and cheese with sharp cheddar, crispy chicken nuggets dipped in honey mustard, strawberry yogurt parfaits layered with crunchy granola, and they proudly assemble
    homemade pepperoni pizza using pre‑made dough, tomato sauce, mozzarella, and a pinch of oregano, showcasing a palate for familiar comfort foods blended with a sprinkle of culinary independence.
  core: Megan Nelson is a six‑year‑old LEGO aficionado whose love for clear rules, calm resilience, and friendly competition shapes a structured yet flexible outlook, punctuated by an imaginative streak
    and the occasional over‑sorting of toys.
background:
  cultural: 'Megan grows up in a suburban, middle‑class environment in Chesterfield, a community in St. Louis County known for its well‑maintained neighborhoods, public schools, and family‑oriented activities.
    Her family’s cultural practices reflect mainstream American values typical of Midwestern white families: regular participation in community events such as local fairs, holiday celebrations (especially
    Thanksgiving and Fourth of July fireworks), and church gatherings. School life emphasizes punctuality, structured curricula, and extracurricular programs like soccer and swimming, which shape her routine.
    The region’s cultural touchstones—like an affection for the St. Louis Cardinals, a love of sweet tea, and a tradition of friendly neighborliness—form the backdrop of her everyday experiences.'
