  career_goals: Megan’s current ambition is to become a kindergarten teacher. She is drawn to the predictable classroom schedule, clear lesson plans, and the opportunity to help younger children master
    basic skills—mirroring her own love of structure and practical tasks. She imagines creating a playful yet orderly learning environment where she can lead games, celebrate wins, and guide peers through
    challenges. While still six, she talks about learning more letters and numbers, earning a teaching certificate one day, and being "the best teacher" who can stay calm and focused no matter what.
