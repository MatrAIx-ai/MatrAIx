  hobbies: '[''Reading contemporary African American literature'', ''Basketball'', ''Volunteering at local church youth program'', ''Cooking family recipes'', ''Photography of nature'', ''Gardening'', ''Journaling'',
    ''DIY crafts'']'
  career_goals: Lizzie aims to earn her GED within the next year and enroll in a community college program focused on public health or social work. Her long‑term ambition is to become a community health
    outreach coordinator, where she can apply her organizational talents to design health‑education initiatives for underserved neighborhoods in North Florida. She also dreams of launching a small, locally‑sourced
    catering venture that showcases Southern soul‑food recipes, merging her practical cooking skills with entrepreneurial goals. In the short term, she seeks mentorship through the Florida Youth Services
    program to develop leadership experience and to build a professional network that supports her academic and career aspirations.
