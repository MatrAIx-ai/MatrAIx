personas:
  professional: Lizzie Vital is a high‑school junior who channels their disciplined, organized nature into volunteer leadership at their church’s youth program, skillfully coordinating tutoring schedules,
    budgeting small‑scale community events, and drafting health‑education flyers with basic digital tools, all while nurturing a curiosity for public‑health concepts.
  sports: Lizzie Vital spends Saturday mornings shooting hoops at the Lake City Youth Basketball Club, follows the Orlando Magic and the Florida Gators for inspiration, and incorporates a disciplined, self‑made
    workout routine that balances cardio with strength training to stay game‑ready.
  arts: Lizzie Vital captures the misty sunrise over Suwannee River State Park with a vintage DSLR while listening to John Legend and Nina Simone, and finds inspiration in contemporary authors such as Jesmyn
    Ward and Ta‑Nehisi Coates, shaping their artistic lens through a blend of soulful music and powerful storytelling.
  travel: Lizzie Vital prefers budget‑friendly weekend getaways, having explored Savannah’s historic squares and New Orleans’ vibrant music scene with family, while dreaming of a road trip to Charleston
    and a cultural immersion in Nashville, always planning routes and accommodations in a shared Google Docs spreadsheet to maximize both adventure and savings.
  culinary: Lizzie Vital rolls their own cornbread, braises collard greens with smoked turkey and hot sauce, perfects sweet potato pie, and often adds a fresh twist of locally sourced okra to shrimp‑and‑grits,
    honing their intermediate cooking skills through weekly family gatherings and community potlucks.
  core: Lizzie Vital blends disciplined organization with a curious love for community storytelling, balancing a meticulous budget and health routine with occasional impulsive splurges on concert tickets
    and a penchant for late‑night photography sessions.
background:
  cultural: Lizzie grows up as a Black teenager in Lake City, Florida, immersed in a close‑knit Southern African‑American community. Her family values emphasize resilience, respect for elders, and collective
    responsibility, traditions rooted in the region’s civil‑rights history and church life. Weekly church services, gospel music, and community gatherings shape her worldview, fostering a strong sense of
    belonging and cultural pride. Southern culinary traditions—such as collard greens, cornbread, and sweet potato pie—are central to family gatherings, influencing her love for cooking. Lizzie’s cultural
    identity is further enriched by local storytelling, where oral histories of Black Floridians inspire her appreciation for perseverance and community activism. These influences inform her disciplined
    approach to life, her desire to give back, and her aspiration to uplift her community through health and education.
