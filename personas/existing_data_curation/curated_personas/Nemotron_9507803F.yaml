  hobbies: '[''Photography'', ''Digital illustration'', ''Indie game design'', ''Improv comedy'', ''Board-game nights'', ''Hiking'', ''Yoga'', ''Meditation'', ''Gallery visits'', ''Volunteer coding workshops'']'
  career_goals: Jean aspires to become a product tech lead who can blend her business acumen with her development expertise to build user‑centric, socially impactful digital experiences. She aims to lead
    interdisciplinary teams, champion inclusive design, and eventually launch her own startup focused on mental‑health and creativity platforms that help users manage anxiety through interactive storytelling.
    In the next five years she plans to earn a Scrum Master certification, deepen her knowledge of machine‑learning APIs for personalized content, and transition into a strategic role that still preserves
    the creative flexibility she values.
