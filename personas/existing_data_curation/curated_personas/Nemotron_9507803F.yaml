personas:
  professional: Jean Pitts, a 25‑year‑old full‑stack developer based in Los Angeles, leverages Python, Node.js, React, and AWS to build data‑rich web applications, infusing a keen artistic eye and business
    acumen into UI/UX prototypes, while they embrace a spontaneous, collaborative spirit and a relaxed attitude toward rigid planning that fuels rapid agile sprints and innovative product concepts.
  sports: Jean Pitts, an avid participant in the Santa Monica Hiking Club, spends weekends tackling trail routes in the Santa Monica Mountains, rallies with friends to watch LA Galaxy soccer matches, follows
    the LA Lakers, and they occasionally join a beach volleyball pick‑up game at Venice Beach to stay active.
  arts: Jean Pitts, immersed in Los Angeles’s vibrant art scene, frequents gallery openings at The Broad and Hauser & Wirth, follows street‑art icons like Shepard Fairey and local muralist Kelsey Montague,
    draws inspiration from indie game designer Toby Fox, and they practice digital illustration in the style of Studio Ghibli during late‑night coding breaks.
  travel: Jean Pitts, a spontaneous traveler, often packs a weekend bag for quick getaways to Santa Barbara or Joshua Tree, dreams of exploring Tokyo’s Akihabara district for anime culture, and they use
    airline points to plan a future trip to Iceland’s aurora‑lit landscapes, all while balancing a modest travel budget with occasional group Airbnb splurges.
  culinary: Jean Pitts, a moderately skilled home cook, loves whipping up avocado toast with microgreens, perfecting plant‑based tacos al pastor with pineapple salsa, experimenting with homemade ramen broth,
    and they regularly indulge in sushi rolls featuring tuna and mango at local spots like Sugarfish.
  core: Jean Pitts, a creatively restless 25‑year‑old tech enthusiast, blends code and canvas to design anxiety‑relieving digital experiences, juggling spontaneous art outings, impromptu hikes, and occasional
    financial splurges on limited‑edition prints, while they battle a habit of disorganization and intense emotional swings.
background:
  cultural: Jean grew up in Valley Village, a suburban enclave within Los Angeles County, where she was exposed to a blend of Southern‑Californian middle‑class values and the city’s rich multicultural arts
    and tech scenes. Her family’s Anglo‑American background emphasized education and self‑reliance, while her environment fostered an appreciation for diversity, openness, and creative expression, shaping
    her artistic tastes and collaborative work style.
