persona_description: A botanist who specializes in the study of tree carbon exchange, mycorrhizal fungi, and the role of these in forest ecosystems. His research interests include the interactions between
  trees and their surroundings, the role of symbiotic fungi in carbon cycling, and the potential implications of these interactions for forest health and biodiversity. He is likely to be interested in the
  findings of the University of Basel report and the implications of the discovery of carbon exchange among unrelated tree species.
