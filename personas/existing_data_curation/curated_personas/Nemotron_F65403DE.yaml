  hobbies: '[''Church Choir'', ''Community Block Party Planning'', ''Cooking Southern Cuisine'', ''Baking'', ''Volleyball'', ''Youth Mentoring'', ''Reading Fiction'', ''Entrepreneurship Podcasts'', ''Hiking'',
    ''Music Curation (R&B, Gospel, Hip‑hop)'']'
  career_goals: Shamika aims to secure an entry‑level position in community development or event coordination where she can leverage her organizational talent and people‑skills. In the next three years
    she hopes to become a program assistant for a non‑profit serving youth in Haywood County, then progress to a program manager role overseeing larger community initiatives. Long‑term, she envisions launching
    her own community‑focused boutique event‑planning service that highlights local culture and supports small businesses in rural Tennessee.
