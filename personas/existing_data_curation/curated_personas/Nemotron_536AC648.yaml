  hobbies: '["Community theater acting", "Toastmasters public speaking", "Organizing professional networking events", "Hiking in the Flint Hills", "Vegetable gardening", "Cooking Midwestern comfort food",
    "Strategy board games", "Half‑marathon training", "Volunteering at the regional food bank", "Mentoring high‑school math teams"]'
  career_goals: Her primary ambition is to lead a multidisciplinary analytics team within a regional corporation or a public‑sector agency, shaping strategic decisions on supply‑chain resilience and resource
    allocation across the Great Plains. Over the next five years she aims to earn a senior director title, publish research on combinatorial optimization in agricultural logistics, and obtain a Certified
    Analytics Professional credential. She also envisions launching a consulting boutique that partners with Kansas farms and logistics firms, leveraging her analytical expertise to drive efficiency while
    mentoring emerging women in STEM.
