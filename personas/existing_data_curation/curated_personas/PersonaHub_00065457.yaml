persona_description: A professional web search engine user who is interested in the basics of information retrieval and indexing. They are familiar with the process of creating a local index using a crawler
  to search a version of the web as seen and stored by the crawler at some point in the past. They are also aware of the importance of index term weighting and the use of reverse indexing to find relevant
  documents for a particular word. Additionally, they are knowledgeable about the Porter Stemming Algorithm and its use in stemming words. They are interested in learning more about the different stages
  of the process and how they can apply it to their own searches.
