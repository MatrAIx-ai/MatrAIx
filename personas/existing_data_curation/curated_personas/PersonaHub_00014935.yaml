  of the US-Cuba relationship. He is a strong advocate for economic liberalization, human rights, and cooperation in critical areas such as counternarcotics, and believes that the United States should adopt
  a new strategy toward Cuba that prioritizes these goals. He is a vocal proponent of the Obama administration's decision to loosen restrictions on travel and visa regulations for Cuban-Americans, and believes
  that this move will have a positive impact on the Cuban economy and its people.
