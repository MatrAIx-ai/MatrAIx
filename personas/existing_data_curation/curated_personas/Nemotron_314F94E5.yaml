personas:
  professional: Si Liang, a senior administrative professional with graduate-level STEM training, leverages advanced data management and statistical software to optimize office workflows while methodically
    pursuing CAP and PMP certifications for a future program manager role in a tech or biotech firm.
  sports: Si Liang hikes the Hudson Valley on weekends as a member of the Hudson Valley Hiking Collective, practices yoga and Pilates at Brooklyn Yoga Loft, and follows the New York Knicks, Yankees, and
    Rangers, while occasionally joining a local recreational softball league in the summer.
  arts: Si Liang studies Japanese calligraphy, enjoys science‑fiction novels by Liu Cixin and non‑fiction works on emerging technology, attends performances by the New York Philharmonic and indie concerts
    featuring Mitski, and draws inspiration from visual artists such as Yayoi Kusama and Ai Weiwei, weaving these influences into her creative downtime.
  travel: Si Liang prefers meticulously planned week‑long trips that balance adventure and relaxation, having explored Kyoto’s historic temples, the bustling streets of Singapore, and weekend escapes to
    the Catskills, while aspiring to trek the Inca Trail in Peru and using a spreadsheet to keep travel expenses within her limited vacation budget.
  culinary: Si Liang, an intermediate home chef, delights in crafting fusion dishes like mapo tofu tacos, Sichuan‑peppered ramen with bagel‑style broth, and dumplings stuffed with goat cheese and scallions,
    favoring ingredients such as gochujang, Sichuan peppercorn, miso, and fresh cilantro, though she occasionally over‑spices and burns her ginger.
  core: Si Liang blends analytical precision with creative curiosity, balancing methodical office mastery, disciplined finances, proactive health habits, and spontaneous culinary experiments while trekking
    the Hudson Valley and planning globetrotting adventures.
background:
  cultural: Si Liang is a second‑generation Chinese‑American. Raised in a bilingual household in New York, she grew up celebrating Lunar New Year, practicing traditional customs such as family reunions
    and respect for elders, while also embracing the multicultural vibrancy of the city. Her parents, immigrants from mainland China, instilled a strong emphasis on education and collective responsibility,
    values that continue to shape her professional diligence and community involvement. Fluent in Mandarin and English, she navigates both cultures effortlessly, participating in local Asian community events
    and integrating Western professional norms in her career.
