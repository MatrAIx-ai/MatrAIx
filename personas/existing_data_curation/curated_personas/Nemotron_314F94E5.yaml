  hobbies: '[''Yoga'', ''Pilates'', ''Hiking in the Hudson Valley'', ''Cooking fusion dishes'', ''Reading science fiction'', ''Reading non-fiction about technology'', ''Photography'', ''Chinese calligraphy'',
