  career_goals: Driven by a blend of curiosity and practicality, Si Liang aims to transition from a senior administrative assistant to an office manager within a technology or biotech company, where she
    can apply her STEM insights to streamline operations. Over the next three years she plans to earn her Certified Administrative Professional (CAP) credential and pursue Project Management Professional
    (PMP) certification, positioning herself for a program manager role that bridges scientific research and administrative efficiency. She also aspires to mentor other Asian‑American professionals and
    contribute to community outreach programs that support women entering STEM fields.
