personas:
  professional: Rebecca Degroat, a 19‑year‑old Whatcom County transit driver, combines a practical knack for safe‑driving and on‑the‑spot vehicle troubleshooting with a curious, flexible mindset, handling
    passenger conflicts calmly while maintaining a loosely organized schedule as she works toward supervisory certification and future transit planning.
  sports: Rebecca Degroat fuels her love of the outdoors with weekly hikes in the North Cascades, regular paddles with the Bellingham Kayak Club, occasional mountain‑bike rides with a local trail group,
    and is a devoted fan of the Seattle Seahawks, Seattle Sounders, and Seattle Kraken.
  arts: Rebecca Degroat winds down after her shifts by strumming acoustic covers of Sufjan Stevens and Phoebe Bridgers on her guitar, snapping city‑scape photos of Bellingham’s waterfront, and diving into
    science‑fiction novels by N. K. Jemisin while catching live shows at Brick & Mortar.
  travel: Rebecca Degroat prefers spontaneous, budget‑friendly road trips—like weekend getaways to Seattle’s Pike Place Market or a ferry ride to Vancouver—while dreaming of a future cycling tour of the
    Swiss Alps and a rail‑centric adventure across Japan’s Shinkansen network once her driver’s savings take shape.
  culinary: Rebecca Degroat, a modest home chef, often whips up protein‑packed quinoa bowls with grilled salmon, roasted rosemary potatoes, and avocado, and treats herself on weekends to Bellingham‑sourced
    fish tacos topped with mango salsa and cilantro.
  core: Rebecca Degroat is a restless, curiosity‑driven transit driver who swaps a penchant for last‑minute gear purchases with a disciplined habit of snapping city‑scape photos on every shift, embodying
    a blend of practical grit and spontaneous adventure.
background:
  cultural: Rebecca grew up in a middle‑class family of European descent in the Pacific Northwest. Her upbringing in Bellingham, Washington, combined a strong community ethic with a deep appreciation for
    the outdoors and environmental stewardship. Family gatherings often featured home‑cooked meals and stories about past generations who migrated from the Midwest. The region’s progressive, sustainability‑focused
    culture influences her values, and she embraces the blend of local traditions and modern, pragmatic outlooks common to the area.
attributes:
  skills: '[''Safe driving and navigation'', ''Passenger assistance and conflict resolution'', ''Basic vehicle maintenance'', ''Customer service communication'', ''First aid and emergency response'', ''Knowledge
    of local transit routes and schedules'', ''Digital ticketing and GPS system operation'', ''Environmental sustainability awareness'', ''Problem solving under time pressure'']'
  hobbies: '[''Hiking in North Cascades'', ''Kayaking on Bellingham Bay'', ''Acoustic guitar'', ''Reading science fiction'', ''Following transportation technology blogs'', ''DIY bike repair'', ''Live music
    shows'', ''Board game nights'', ''Cityscape photography'', ''Video gaming with friends'', ''Community clean-up volunteering'']'
  career_goals: Rebecca aims to obtain a full commercial driver’s license and a supervisory certification within the Whatcom County transit authority. She wants to become a lead driver trainer, then move
    into transit planning with a focus on sustainable transportation solutions, such as the adoption of electric buses. To support this, she plans to complete a bachelor’s degree in transportation engineering
    or urban planning while continuing to work as a driver to gain hands‑on experience.
