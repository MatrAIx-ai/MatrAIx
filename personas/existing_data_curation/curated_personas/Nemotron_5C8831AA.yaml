  career_goals: Amy aims to transition into a senior leadership role within her insurance firm, such as a Claims Operations Manager or Investigation Team Lead, where she can shape policy, drive efficiency,
    and mentor the next generation of adjusters. She plans to earn professional designations like the Chartered Property Casualty Underwriter (CPCU) and the Certified Professional Investigator (CPI) within
    the next three years. Amy also hopes to develop a specialized expertise in natural disaster claims, contributing to community resilience initiatives in Madison County. In the longer term, she envisions
    establishing a consulting practice that advises small insurers on claim-handling best practices and uses her analytical background to develop data-driven risk assessment tools.
