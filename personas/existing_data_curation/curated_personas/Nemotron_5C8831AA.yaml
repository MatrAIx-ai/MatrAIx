personas:
  professional: Amy Caravella, a veteran insurance claims adjuster with over twenty years of experience, blends their engineering curiosity and practical data‑analysis skills with a relaxed, people‑first
    mindset, excelling at complex property investigations, negotiating settlements, and mentoring junior staff while navigating the occasional chaos of a disorganized inbox.
  sports: Amy Caravella channels their energetic spirit into playing forward for a co‑ed softball league each summer, cheering on the Chicago Cubs during baseball season, hitting the local park for early‑morning
    jogs, and occasionally joining a community yoga class to balance their love for team competition with personal flexibility.
  arts: Amy Caravella enriches their leisure with mystery‑laden book club discussions of Agatha Christie and Hilary Mantel, occasional improv comedy workshops that echo the spontaneity of Tina Fey, and
    frequent visits to local art fairs where they admire works by contemporary painter Kehinde Wiley and the timeless melodies of Andrea Bocelli.
  travel: Amy Caravella prefers spontaneous, budget‑friendly road trips, often cruising the winding highways to Starved Rock State Park, the bluffs of Galena, and the wineries of southwestern Michigan,
    while dreaming of a future culinary pilgrimage to Italy’s Tuscany region after they secure their CPCU designation.
  culinary: Amy Caravella, an avid home chef, delights in crafting hand‑rolled gnocchi with ricotta, heirloom tomato‑basil sauce, and slow‑cooked osso buco, they often pair these dishes with locally sourced
    garlic, fresh mozzarella, and a bottle of Chianti during lively dinner parties for friends and neighbors.
  core: Amy Caravella is a curiosity‑driven insurance veteran who balances disorganized spontaneity with heartfelt community mentorship, they tackle claims with forensic rigor while never missing a chance
    to host a chaotic but beloved Italian dinner.
background:
  cultural: Amy is a third-generation Italian-American raised in the Midwestern town of O'Fallon, Illinois. Her family traditions blend the warmth of Italian heritage—such as weekly family meals centered
    around pasta, Sunday sauce, and festive holidays like Ferragosto—with the pragmatic, community-oriented values of the Midwest, including a strong emphasis on neighborliness, volunteerism, and modesty.
    She grew up attending a Catholic parish, participating in church socials and local charitable drives, which instilled a sense of cooperation and service. The region's seasonal rhythms—cold winters,
    warm summers, and the annual county fair—have shaped her appreciation for outdoor activities and seasonal gardening. Amy's cultural identity is reflected in her love for Italian cooking, her conversational
    Italian, and her active involvement in community events that celebrate both her ethnic roots and her hometown's Midwestern spirit.
