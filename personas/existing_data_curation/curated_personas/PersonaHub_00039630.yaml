  the use of the New York Convention and the potential impact of cultural differences on enforcement outcomes. They are committed to promoting cross-cultural understanding and cooperation in the field of
  international arbitration, and are dedicated to finding innovative solutions to the enforcement of foreign awards in Islamic countries.
