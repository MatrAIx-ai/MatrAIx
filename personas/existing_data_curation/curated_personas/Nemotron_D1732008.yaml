personas:
  professional: Ellen Cosner, a budding junior engineer who loves crafting functional LEGO machines and Scratch animations, applies her methodical planning and practical curiosity to transform imaginative
    ideas into tidy, working prototypes, often guiding her peers during library story‑time workshops.
  sports: Ellen Cosner enjoys swimming at the community pool twice a week, plays forward on the local youth soccer team the Forest Rangers, and avidly follows the nearby minor‑league baseball club the River
    City Rapids, preferring structured practice schedules that mirror her organized approach to school projects.
  arts: Ellen Cosner finds solace in playing Beethoven’s “Für Elise” on piano, sketching woodland creatures in her journal, devouring mystery series like “The Westing Game,” and admiring the whimsical illustrations
    of Beatrix Potter, while her volunteer stint at the library’s story‑time lets her share beloved tales with small groups.
  travel: Ellen Cosner loves weekend hikes through the nearby pine‑covered woods, dreams of visiting the Natural History Museum in London, and eagerly anticipates a family road trip to the Grand Canyon,
    always drafting meticulous packing lists and keeping a scrapbook of pressed leaves as souvenirs.
  culinary: Ellen Cosner delights in making spaghetti with meatballs, enjoys crunchy carrot sticks with hummus, and proudly bakes chocolate chip cookies from a simple recipe, often experimenting with adding
    a pinch of cinnamon, though she sometimes forgets to finish cleaning the kitchen after baking.
  core: Ellen Cosner melds relentless curiosity with methodical organization, turning mystery novels, LEGO builds, and piano practice into a disciplined yet playful routine, all while hoarding stray LEGO
    bricks as a quirky testament to her perfectionist streak.
background:
  cultural: Ellen grows up in a suburban New England community in Groton, Massachusetts. Her family follows mainstream American customs, celebrating holidays such as Thanksgiving, Christmas, and Fourth
    of July with local traditions. The region’s emphasis on education, community involvement, and respect for nature influences her daily life. She participates in library programs, school field trips to
    Boston museums, and occasional community festivals that highlight New England’s historical heritage while embracing contemporary suburban culture.
