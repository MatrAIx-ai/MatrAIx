  career_goals: Ellen dreams of becoming a marine biologist or environmental scientist, hoping to explore ocean ecosystems and contribute to conservation efforts. She also imagines designing sustainable
    structures as an engineer or inspiring other children as a science teacher. Her long‑term ambition is to apply her love of learning, problem‑solving, and organized approach to a career that makes a
    positive impact on the natural world and her community.
