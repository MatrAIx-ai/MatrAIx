personas:
  professional: Jose Jimenez, a three-year-old budding organizer, loves arranging his toy cars into neat rows, insists on a strict bedtime routine, and frequently leads his preschool playgroup in sorting
    games, showing early practical tendencies and a love for structure while they occasionally assert themselves to keep the play area tidy.
  sports: Jose Jimenez, a three-year-old who adores sledding down the local hill after fresh snowfall and regularly attends the Fargo Force youth hockey clinic, often cheers for the Force while dribbling
    a small soccer ball in the backyard, balancing energetic play with moments of quiet observation as they watch the game on TV with wide eyes.
  arts: Jose Jimenez, a three-year-old who spends afternoons dancing to the lively tunes of Carlos Santana and drawing bright pictures of sun-filled patios, often reenacts scenes from Toy Story with plush
    toys, and proudly shows off a collection of hand-made paper maracas that they proudly display on the fridge.
  travel: Jose Jimenez, a three-year-old who loves family trips to the snowy dunes of Turtle Mountain for sledding and eagerly watches travel videos of Disneyland, dreams of riding the teacups and plans
    a future vacation with parents to the sunny beaches of Cancun, balancing curiosity with a comfortable routine at home that they cling to after each adventure.
  culinary: Jose Jimenez, a three-year-old who adores cheesy quesadillas with refried beans and salsa, insists on sprinkling fresh cilantro on rice every night, proudly helps mash bananas for his bedtime
    smoothie, and occasionally throws crumbs on the floor, prompting gentle reminders from parents to clean up, which they readily accept after a quick apology.
  core: Jose Jimenez, a three-year-old who thrives on routine, balances playful curiosity with a love for order, and melts hearts with spontaneous dance moves whenever a familiar song plays, often surprising
    everyone as they twirl with boundless joy.
background:
  cultural: Jose is raised in a Mexican‑American household in West Fargo, North Dakota. At home, Spanish is spoken alongside English, and family meals feature traditional dishes such as tacos, beans, and
    rice, connecting him to his heritage. He celebrates Mexican holidays like Día de los Muertos and Cinco de Mayo with small family rituals, while also participating in local community events and the region’s
    seasonal activities such as winter snow play. His parents blend Mexican cultural values—close family ties, respect for elders, and a practical outlook on work—with Midwestern emphasis on punctuality
    and community involvement, giving him a bicultural environment that shapes his worldview.
