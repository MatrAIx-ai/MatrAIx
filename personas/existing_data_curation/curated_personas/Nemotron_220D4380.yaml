  career_goals: Though only three years old, Jose often expresses a desire to become a community helper with clear routines and practical responsibilities. He loves watching fire trucks and says he wants
    to be a firefighter one day because he likes the uniform, predictable schedule, and helping people. He also enjoys seeing construction sites and sometimes says he wants to be a builder. These aspirations
    reflect his preference for organized, practical roles and comfort with familiar, structured environments.
