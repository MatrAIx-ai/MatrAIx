personas:
  professional: Adonis Little, a 31‑year‑old precision tool and die fabricator, merges his CNC and CAD expertise with a magnetic, talk‑ative presence that turns production planning meetings into collaborative
    workshops, while they mentor apprentices and chart a path toward leading a high‑performance automotive supply team and eventually opening a boutique metal‑art studio.
  sports: Adonis Little, a 31‑year‑old basketball enthusiast, dominates summer pick‑up games at the downtown community center, attends Kansas City Royals baseball games for the off‑season, follows the NBA
    Chicago Bulls for inspiration, and maintains fitness through weekly strength‑training sessions at the local gym, all while they organize charity tournaments to support youth mentorship.
  arts: Adonis Little immerses themselves in the creative pulse of the city, frequenting gallery openings featuring Kehinde Wiley’s portraits, capturing urban scenes with a Leica M camera inspired by Henri
    Cartier‑Bresson, and losing themselves to live jazz by Christian Scott aTunde Adjuah and hip‑hop rhythms of Rapsody, which spark their own metal sculpture projects displayed at regional maker fairs.
  travel: Adonis Little plans trips with the same meticulous checklists used for CNC programming, favoring road‑trip pilgrimages to Marfa, Texas for its desert art installations, weekend jazz‑filled escapes
    to New Orleans, and dreaming of an immersive metal‑working tour through Italy’s Piedmont region, all while they balance travel costs against their growing savings goals.
  culinary: Adonis Little, an avid home cook, perfects Southern‑inspired comfort foods like crispy fried chicken, collard greens sautéed with smoked turkey, and sweet‑potato pie, while experimenting with
    Creole gumbo and mastering a slow‑smoked brisket, often pairing dishes with craft beers from Kansas City breweries and occasionally inviting friends over for impromptu jam‑session meals.
  core: Adonis Little is a charismatic, detail‑driven maker who turns every workshop project into a social showcase, yet habitually burns the midnight oil on last‑minute deadlines, leaving coffee mugs stacked
    like trophies on their workbench and occasionally forgetting to stretch before a basketball game.
background:
  cultural: Adonis grew up as a Black American in the Midwest, blending the rich traditions of African‑American culture with the values of Midwestern community life. Family gatherings often featured gospel
    music, soul food, and storytelling, reinforcing a strong sense of identity and resilience. He remains connected to his heritage through church attendance, celebrating holidays like Juneteenth, and participating
    in local cultural events that highlight Black history and arts. Living in Olathe, KS, he navigates both the broader cultural tapestry of the Kansas City area and the close‑knit networks of his neighborhood,
    shaping a worldview that values collaboration, artistic expression, and civic engagement.
attributes:
  skills: '[''CNC machining'', ''CAD/CAM design'', ''Blueprint reading'', ''Tool and die fabrication'', ''Precision metalworking'', ''MIG/TIG welding'', ''Machine maintenance and troubleshooting'', ''Production
    planning'', ''Apprentice training and mentorship'', ''Effective communication'']'
  hobbies: '[''Playing basketball'', ''Visiting art galleries and museums'', ''DIY woodworking projects'', ''Metal sculpture creation'', ''Urban landscape photography'', ''Participating in local maker fairs'',
    ''Listening to jazz and hip‑hop'', ''Mentoring youth in trade workshops'', ''Cooking Southern‑inspired dishes'', ''Community volunteering'']'
  career_goals: Adonis aims to become a master tool and die maker, earning advanced certifications through a local community college and trade union programs. He aspires to lead a high‑performance manufacturing
    team at a regional automotive supplier and eventually launch his own boutique shop that blends functional metal parts with artistic sculpture. He also wants to mentor young people from underrepresented
    backgrounds, helping them acquire skilled‑trade careers and fostering a more inclusive manufacturing workforce in Kansas.
