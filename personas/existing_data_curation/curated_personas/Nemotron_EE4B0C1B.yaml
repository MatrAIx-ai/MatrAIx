  career_goals: Looking ahead, Michael plans to transition from active sales to a mentorship and advisory role, establishing a boutique brokerage that specializes in historic and architecturally distinctive
    properties in Elyria and surrounding Lorain County. He aims to author a guidebook on buying and preserving mid-western historic homes, and to mentor a select group of younger agents, ensuring his expertise
    endures. Additionally, he wishes to deepen his involvement with local historic preservation societies, using his network to protect and promote the region’s heritage structures, while gradually reducing
    his day-to-day sales responsibilities.
