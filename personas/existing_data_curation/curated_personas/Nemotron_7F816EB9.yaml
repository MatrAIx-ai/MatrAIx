personas:
  professional: Barton Gabryluk is a budding game developer who codes simple Python and Scratch games, builds detailed model kits, and applies a methodical yet inventive approach to projects, reflecting
    a balance of curiosity and practicality while staying reliably organized.
  sports: Barton Gabryluk is an outdoor‑enthusiast who hikes the local state park trails, belongs to a junior cross‑country club, enjoys playing chess and Catan on weekends, and roots for the Seattle Seahawks
    and Seattle Kraken, yet prefers solitary nature walks over team sports.
  arts: Barton Gabryluk is a fledgling comic artist who sketches weekly strips inspired by Jim Lee’s dynamic style and the humor of Calvin and Hobbes, edits short videos set to Carpenter Brut’s synthwave
    tracks, and devours science‑fiction novels by Isaac Asimov and Becky Chambers, letting creative expression shape their identity.
  travel: Barton Gabryluk is a cautious traveler who plans weekend road trips to nearby national parks such as Yellowstone and the Great Smoky Mountains using a simple itinerary notebook, loves photographing
    wildlife, dreams of visiting Japan’s cherry‑blossom season, but balances travel aspirations with a modest allowance.
  culinary: Barton Gabryluk is a budding home chef who favors homemade pepperoni pizza, can whip up a quick ramen bowl with instant noodles, enjoys trail mix with dried apricots and sunflower seeds, and
    experiments with simple baked model‑kit themed cookies, but often forgets to eat breakfast.
  core: Barton Gabryluk is a curious, organized twelve‑year‑old who channels practicality into building model kits, saves allowance diligently, enjoys solitary creativity, yet occasionally stays up late
    and neglects hydration.
background:
  cultural: 'Barton comes from a middle‑class White family residing in Glendale, a suburban city in Los Angeles County. His upbringing reflects typical Southern Californian values: a strong emphasis on
