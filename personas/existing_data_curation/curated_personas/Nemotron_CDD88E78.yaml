personas:
  professional: Jennifer Merchant is an indie pop‑folk singer‑songwriter who blends experimental electronic textures, orchestrates her own recordings, books gigs at iconic NYC venues, and leverages their
    social‑media savvy and community‑organizing expertise to turn shows into collaborative art experiences.
  sports: Jennifer Merchant stays fit through modern dance classes at Astoria Dance Project, weekly yoga at Yoga Garden, and occasional pick‑up basketball games supporting the New York Knicks, while cheering
    on the New York City FC during the soccer season.
  arts: Jennifer Merchant immerses themselves in the arts by attending shows like Hadestown, listening to Björk and Sufjan Stevens for inspiration, collecting prints by Banksy, reading Murakami and Judith
    Butler, and performing improv at the Upright Citizens Brigade, which fuels their lyrical wit.
  travel: Jennifer Merchant plans music‑festival road trips with friends, having already road‑tripped to Austin for SXSW, trekked to the desert for Coachella, and dreaming of a spring visit to Berlin’s
    techno scene, while balancing limited funds by booking hostels and using points from a travel rewards credit card.
  culinary: Jennifer Merchant explores cuisines from street‑food tacos with charred salsa to experimental ramen workshops, enjoys cooking kimchi‑pancake brunches at home, and treats their pantry like a
    studio, constantly experimenting with sumac, miso, and smoked paprika despite occasional over‑spicing.
  core: Jennifer Merchant is a curiously organized musician‑activist who turns city life into collaborative art while juggling impromptu performance anxiety, budget‑tight finances, and a penchant for late‑night
    culinary experiments.
background:
  cultural: Jennifer was raised in Astoria, Queens—a neighborhood known for its cultural mosaic—by a family of European descent with Irish and Italian roots. Although her household celebrated traditional
    holidays like St. Patrick’s Day and Italian Christmas Eve dinners, her upbringing was immersed in the rich diversity of the borough, exposing her to Greek, Middle Eastern, and other world cultures from
    an early age. This multicultural environment nurtured her appreciation for varied artistic expressions and informed her eclectic musical style, which blends Western folk traditions with global rhythms.
    Her humanities education further deepened her understanding of cultural narratives, encouraging her to incorporate inclusive, socially aware themes into her songwriting.
