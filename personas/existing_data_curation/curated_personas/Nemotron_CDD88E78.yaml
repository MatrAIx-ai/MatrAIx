  career_goals: Her primary ambition is to release a critically acclaimed debut EP that fuses indie pop, folk, and experimental electronic textures, reflecting her curiosity for new artistic ideas. She
    aims to secure regular gigs at iconic NYC venues, build a regional touring circuit, and eventually sign with an independent label that supports artistic freedom. Jennifer also seeks to expand into music
    production for fellow artists, curate a quarterly community music showcase in Astoria, and mentor emerging musicians, using her organizational strengths to create sustainable platforms for creative
    collaboration. Long‑term, she envisions establishing a multidisciplinary arts space that integrates music, visual art, and social activism, positioning herself as both a creator and a cultural catalyst.
