personas:
  professional: Humberto Paz, a 41‑year‑old experimental physicist and engineer, blends meticulous experimental design, advanced data‑analysis coding, and bilingual outreach skills with their talkative,
    charismatic nature to lead multidisciplinary research teams that produce scientific visualizations as artistic installations.
  sports: Humberto Paz is an avid fan of the Chicago Cubs, Bears, and Bulls, regularly hikes with the Chicago Hiking Club on weekends, plays forward on a community soccer team, and squeezes in early morning
    runs to balance the sedentary demands of lab work.
  arts: Humberto Paz frequents the Art Institute of Chicago and downtown mural projects, draws inspiration from Frida Kahlo and Yayoi Kusama, strums guitar to traditional Mexican folk tunes and live jazz
    by Herbie Hancock, and enjoys salsa nights featuring Celia Cruz covers, weaving these influences into their scientific visualizations.
  travel: Humberto Paz balances meticulously planned research trips—such as a recent conference in Kyoto—with impromptu weekend getaways to art festivals in Oaxaca and the New Orleans French Quarter, and
    dreams of trekking Patagonia’s glaciers, reflecting a love for cultural immersion and adventurous spontaneity within their mid‑career budget.
  culinary: Humberto Paz enjoys cooking Mexican staples like mole poblano, chiles en nogada, and taco al pastor, often experimenting with fusion twists such as quinoa‑taco bowls, while mastering the use
    of fresh cilantro, chipotle, and lime in a moderately skilled home kitchen that doubles as a creative laboratory.
  core: Humberto Paz is a charismatic, curious 41‑year‑old physicist who turns lab data into art, splurges on guitars, hustles through grant proposals, and occasionally forgets to floss.
background:
  cultural: Humberto was raised in a Mexican‑American household where both Spanish and English were spoken daily. Family gatherings centered around traditional celebrations such as Día de los Muertos, Cinco
    de Mayo, and Catholic holidays, instilling a strong sense of community, respect for elders, and pride in Mexican heritage. Growing up in the Midwest, he also absorbed the values of Midwestern hospitality
    and pragmatism, which blend with his collectivist roots. He remains active in the local Mexican community in the Chicago suburbs, volunteering at cultural festivals, cooking for neighborhood events,
    and mentoring bilingual students. This bicultural experience informs his collaborative style, his appreciation for storytelling—whether through art, music, or scientific narrative—and his commitment
    to making science accessible across cultural boundaries.
attributes:
  skills: '[''Experimental design'', ''Computational modeling'', ''Data analysis and statistics'', ''Instrumentation and lab equipment maintenance'', ''Scientific writing and grant proposal development'',
