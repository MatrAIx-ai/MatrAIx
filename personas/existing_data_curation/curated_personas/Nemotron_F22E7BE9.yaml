personas:
  professional: Charles Harrison, a disciplined teenage digital artist and budding programmer, channels their curiosity and meticulous project planning into crafting UI mock‑ups, Python automation scripts,
    and freelance commissions, aiming to merge visual storytelling with functional design while maintaining high standards.
  sports: Charles Harrison enjoys solitary trail runs along the Hudson River and participates in a local cross‑country running club, roots for the New York Knicks and Albany Firebirds, and occasionally
    joins weekend pickup soccer games with friends from the community center, where they relish the brief camaraderie before returning to their preferred solo hikes, balancing a love of nature with modest
    team spirit.
  arts: Charles Harrison immerses themselves in the works of Hudson River School painter Thomas Cole, contemporary concept artist Feng Zhu, and pianist Ludovico Einaudi, frequently attending gallery openings
    at the Hudson Valley Art Center and dissecting comic panels from vintage Marvel issues, which fuels their own digital illustration practice.
  travel: Charles Harrison prefers meticulously planned road trips that blend scenic hikes in the Adirondacks with cultural stops in Boston and New York City, while dreaming of future study abroad experiences
    in Kyoto's historic temples and the minimalist design museums of Copenhagen, where they hope to discover fresh visual influences.
  culinary: Charles Harrison, though a novice cook, enjoys crafting farm‑to‑table meals such as apple‑cider glazed pork chops and roasted beet salads using fresh Hudson Valley produce, while indulging in
    occasional upscale dining at the local bistro for a perfectly seared salmon with lemon‑dill sauce, where they appreciate the subtle balance of flavors.
  core: Charles Harrison is a highly organized, curiosity‑driven teen who balances solitary artistic creation with disciplined freelance work, often oscillating between meticulous planning and spontaneous
    impulse buys that they sometimes regret.
background:
  cultural: Charles comes from a white, multi-generational American family rooted in the Hudson Valley. His paternal ancestors trace back to English settlers, while his maternal side includes Dutch and
    German immigrants who arrived in the 19th-century upstate farming communities. Growing up in Castleton-on-Hudson, a small town with a strong sense of community, he was exposed to the region's rich historical
    heritage, the natural beauty of the Hudson River, and a modest but vibrant local arts scene. The cultural values of self-reliance, hard work, and appreciation for both nature and the arts have shaped
    his worldview, feeding his curiosity and disciplined approach to personal growth.
attributes:
  skills: '[''Python programming'', ''Digital illustration (Photoshop, Procreate)'', ''Art history research'', ''Organizational & time-management skills'', ''Critical analysis'', ''Piano (intermediate)'']'
  hobbies: '[''Digital drawing and illustration'', ''Photography of Hudson Valley scenery'', ''Hiking and nature walks'', ''Reading sci-fi, philosophy, and art theory'', ''Playing piano'', ''Chess (small-group)'',
    ''Visiting local art galleries'', ''Collecting vintage comic books'', ''Personal blog writing'']'
  career_goals: He aims to re-enter a formal academic pathway by completing a GED and enrolling in a college that offers a combined program in Computer Science and Visual Arts. His long-term ambition is
    to become a freelance UI/UX designer and interactive media developer, creating aesthetically compelling, user-centric digital experiences. He also envisions founding his own independent studio that
    produces educational video games and digital art installations, leveraging his disciplined work ethic and curiosity about new ideas. In the interim, he plans to build a professional portfolio through
    freelance commissions and open-source contributions, positioning himself for remote software development roles.
