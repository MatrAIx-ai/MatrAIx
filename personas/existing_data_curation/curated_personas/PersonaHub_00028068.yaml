persona_description: A researcher who specializes in the field of materials science, particularly in the development of materials with the ability to absorb all colors of light and reflect none. This individual
  is known for their work on the creation of the darkest material on Earth, which has a total reflective index of 0.045 percent. The researcher is seeking a world's darkest material designation by Guinness
  World Records, and their work is likely to yield more than just bragging rights. The individual has expertise in the use of carbon nano-tubes, which are used in the creation of the material, and has tested
  the material on visible light only, but is interested in seeing how it fares against infrared and ultraviolet light, as well as other wavelengths used in communications systems.
