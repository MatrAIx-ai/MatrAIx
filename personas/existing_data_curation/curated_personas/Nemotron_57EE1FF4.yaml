personas:
  professional: Gloria Aguila, a 32‑year‑old packaging line operator, combines hands‑on mastery of mechanical troubleshooting, PLC basics, and OSHA safety with a bilingual edge and a pragmatic curiosity,
    positioning herself for a shift‑supervisor role while championing incremental efficiency tweaks.
  sports: Gloria Aguila enjoys weekend desert trail runs with the Albuquerque Trail Blazers club, follows New Mexico United soccer, roots for the Albuquerque Isotopes in baseball, and keeps fit through
    a mix of solo cardio hikes and occasional community volleyball games, favoring flexibility over structured gym routines.
  arts: Gloria Aguila immerses in folkloric dance rehearsals set to the rhythms of Lila Downs and Carlos Santana, delights in the graphic novels of Neil Gaiman, and regularly attends live performances at
    the KiMo Theatre featuring local mariachi ensembles and indie theater troupes.
  travel: Gloria Aguila prefers short road trips exploring the Southwest’s Monument Valley and White Sands, while dreaming of an immersive culinary tour of Oaxaca, and plans a future hike in Patagonia,
    balancing travel spontaneity with limited vacation days at work.
  culinary: Gloria Aguila’s culinary hobby revolves around mastering mole poblano with dried chilhuacle and chocolate, hand‑making tamales with masa and pork, experimenting with regional spices like epazote,
    and often hosts potluck nights where she pairs dishes with craft sodas or mezcal.
  core: Gloria Aguila blends a practical engineer’s mindset with a love for Mexican flavors, desert hikes, and board‑game battles, navigating life with a relaxed, competitive edge and a penchant for occasional
    disorganization.
background:
  cultural: Gloria was raised in a Mexican‑American household in Rio Rancho, NM, where both Spanish and English were spoken at home. She celebrates Mexican traditions such as Día de los Muertos, quinceañeras,
    and family gatherings, while also embracing New Mexican customs like chile festivals and community picnics. Her cultural upbringing emphasizes close family ties, respect for heritage, and a blend of
    Mexican and Southwestern U.S. influences that shape her values and daily life.
attributes:
  skills: '[''Packaging machine operation'', ''Mechanical troubleshooting'', ''Routine maintenance'', ''Quality control and inspection'', ''OSHA safety compliance'', ''Bilingual communication (Spanish/English)'',
    ''Basic PLC programming'', ''Process documentation'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Hiking desert trails'', ''Folkloric dance'', ''Electronics tinkering'', ''Board games'', ''Reading science fiction'']'
  career_goals: Gloria aims to advance to a shift supervisor or lead operator position within the next three years, seeking certification as a Certified Production Technician (CPT) and eventually completing
    a bachelor’s degree in industrial engineering. She hopes to combine her hands‑on expertise with formal training to spearhead efficiency projects, mentor new hires, and contribute to continuous improvement
    initiatives at her plant.
