  hobbies: '[''Hiking in the redwood forests'', ''Photography of nature and community events'', ''Social media video creation (TikTok, Instagram)'', ''School drama club'', ''Environmental club activities'',
    ''Acoustic guitar playing and songwriting'', ''Volunteering at the public library'', ''Organizing community food drives'', ''Baking cookies for friends and neighbors'', ''Reading YA novels'', ''Sketching
    and drawing'']'
  career_goals: Lorraine aims to graduate high school with strong academic standing and pursue a degree in environmental science or communications. She envisions a career as a community outreach coordinator
    for a local conservation nonprofit, using her social‑media savvy to raise awareness about redwood preservation and sustainable living. She also hopes to launch a YouTube channel or podcast that highlights
    youth perspectives on environmental stewardship and small‑town community life. In the longer term, Lorraine is open to becoming an educator or youth mentor, sharing her passion for harmony, cooperation,
    and practical problem‑solving with future generations.
