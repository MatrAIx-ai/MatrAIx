persona_description: An environmental scientist with expertise in stream ecology and water quality, particularly interested in the effectiveness of stream mitigation projects implemented in southern Appalachia
  for coal mining. This person is likely to be interested in the synthesis of information about 434 stream mitigation projects from 117 permits for surface mining in Appalachia, focusing on the ratio of
  lengths of stream impacted to lengths of stream mitigation projects, the implementation of mitigation on perennial streams versus impacts to ephemeral and intermittent streams, the assessment of project
  outcome with visual assessments being the most common, and the lack of biotic and chemical data provided in most projects. This person is also interested in the reported levels of selenium known to impair
  aquatic life in some of the projects that provided Se data, and the overall success of mitigation efforts being implemented in southern Appalachia for coal mining.
