  career_goals: Robert aims to advance from his current representative position to a senior account manager role within the next two years, focusing on high‑value industrial accounts. He plans to specialize
    in emerging technologies, such as automation equipment, to become a subject‑matter expert. Long‑term, he aspires to lead a regional sales team as a sales director and eventually launch his own niche
    wholesale business that blends his sales expertise with his passion for design, offering customized product solutions to manufacturers. He is motivated by competitive performance metrics and seeks to
    be recognized as a top‑performer in his company.
