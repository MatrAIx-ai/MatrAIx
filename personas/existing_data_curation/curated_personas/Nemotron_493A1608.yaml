  hobbies: '[''Car restoration'', ''Reading technical manuals'', ''Gardening'', ''Fishing'', ''Watching baseball games'', ''Visiting history museums'', ''Volunteer equipment maintenance'']'
  career_goals: Melvin aims to move into a lead‑technician or supervisory role where he can mentor younger workers and refine maintenance schedules for greater efficiency. He plans to obtain certifications
    in HVAC and electrical safety within the next two years to solidify his expertise and reduce job‑related stress. Long‑term, he envisions launching a small, locally focused maintenance service that offers
    reliable, flexible support to small businesses in Newark, allowing him greater control over his work environment while maintaining the structured routine he values.
