  hobbies: '[''building LEGO models'', ''reading picture books on space, wildlife, and detective mysteries'', ''drawing and sketching'', ''solving jigsaw puzzles'', ''using ScratchJr on tablet'', ''exploring
    local parks and collecting natural specimens'']'
  career_goals: Even at five, Gilbert dreams of becoming an astronaut or a mechanical engineer who designs rockets and robots. He aims to win his school's science fair by building a solar‑powered model
    rover, hoping to be recognized as the top builder among his peers. His competitive drive pushes him to master complex challenges on his own, and he aspires to one day work at NASA or a leading tech
    firm where he can turn his curiosity into real inventions.
