personas:
  professional: Leopoldo Santiago, a 41‑year‑old media collections specialist, blends fifteen years of archival preservation and bilingual outreach expertise with a charismatic, talk‑to‑anyone demeanor,
    turning grant proposals and community programming into lively collaborations, even if their relaxed attitude toward deadlines sometimes forces them to scramble at the last minute.
  sports: Leopoldo Santiago follows Austin FC with fervor, joins a community pickup soccer league every Saturday, and hikes the Texas Hill Country’s rolling hills—often tackling Enchanted Rock—while preferring
    low‑impact workouts like trail running, though they occasionally neglect formal gym sessions in favor of social gatherings after games.
  arts: Leopoldo Santiago plays casual mariachi‑style guitar at family gatherings, enjoys live performances by Los Lobos and the Austin City Limits festival, immerses themselves in historical fiction by
    Hilary Mantel and vintage first‑edition works by Gabriel García Márquez, and channels their talkative energy into leading spirited book‑club discussions that blend literature with cultural storytelling.
  travel: Leopoldo Santiago favors spontaneous road trips across Central Texas, relishing weekend hikes at Enchanted Rock, cultural excursions to the historic missions of San Antonio, and dreaming of an
    extended visit to a colonial‑style mountain city famed for its vibrant markets, balancing their love for adventure with a modest travel budget that prioritizes group experiences over luxury.
  culinary: Leopoldo Santiago is an avid home chef who expertly prepares tamales and mole, savoring the deep, smoky flavors of dried chilies, ancho and pasilla, while also experimenting with fresh corn
    masa and chocolate, often cooking in large batches for lively gatherings, though their habit of over‑seasoning can sometimes overwhelm the palate.
  core: Leopoldo Santiago is a sociable, talkative archivist who blends meticulous cultural preservation with a laid‑back, sometimes disorganized lifestyle, and they punctuate their days with a love for
    guitar, vintage books, and hearty home‑cooked meals.
background:
  cultural: Leopoldo was raised in a Mexican‑American household in Texas, speaking both Spanish and English at home. His family traditions include celebrating Día de los Muertos, Día de la Independencia,
    and local Texan holidays, creating a blend of Mexican and Southern cultural practices. He values close family ties, communal gatherings, and the rich culinary and musical heritage of Mexico. This bicultural
    identity fuels his passion for preserving Mexican-American stories within the library’s collections and for fostering inclusive community spaces that honor both his Mexican roots and his Texan upbringing.
attributes:
  skills: '[''Archival Management'', ''Digital Curation'', ''Metadata Standards (MARC, Dublin Core)'', ''Reference & Research Services'', ''Community Outreach & Programming'', ''Public Speaking & Facilitation'',
    ''Grant Writing & Funding Acquisition'', ''Bilingual Communication (Spanish-English)'', ''Event Planning and Coordination'', ''Collection Development and Acquisition'', ''Technology Integration (e-library
    platforms, digital repositories)'', ''Cultural Heritage Preservation'']'
  hobbies: '[''Playing guitar (Mariachi style)'', ''Cooking traditional Mexican dishes'', ''Reading historical fiction'', ''Photography (cultural events)'', ''Hiking the Texas Hill Country'', ''Attending
    local festivals and fairs'', ''Participating in community volunteer projects'', ''Soccer (watching and occasional playing)'', ''Collecting vintage books'', ''Joining book clubs and discussion groups'']'
  career_goals: Leopoldo aims to become the head librarian of a regional library system, where he can lead large‑scale digitization projects that preserve Mexican‑American heritage materials. He aspires
    to secure sustainable grant funding for community‑focused initiatives, expand bilingual and multicultural programming, and mentor emerging library professionals. Over the next five years, he plans to
    pursue a doctoral degree in Library and Information Science with a specialization in digital preservation, positioning himself as a thought leader at the intersection of technology, cultural heritage,
    and community engagement.
