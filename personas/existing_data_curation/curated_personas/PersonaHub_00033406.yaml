persona_description: A policy analyst who specializes in the analysis and projection of carbon emissions, particularly in the UK. This person is responsible for forecasting the country's carbon emissions
  and identifying the factors that are contributing to the decline in emissions. This person is also responsible for evaluating the effectiveness of current policies and proposing new policies to meet the
  UK's legally binding carbon targets. This person's expertise lies in the use of data analysis and statistical modeling to predict and understand the impact of climate change on the UK's economy and society.
