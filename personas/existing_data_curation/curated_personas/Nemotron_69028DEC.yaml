  career_goals: Saed aims to transition into a clinical pharmacy role, focusing on chronic disease management and mental health, and plans to earn board certification in those specialties. He is driven
    to develop innovative patient engagement programs that combine visual art and technology, such as interactive medication adherence apps and community workshops that use storytelling to explain health
    concepts. In the longer term, he envisions opening an independent boutique pharmacy that emphasizes holistic wellness, personalized care, and local art collaborations. Saed also hopes to pursue a Master’s
    in Public Health to broaden his impact on rural health policy and eventually become a guest lecturer at pharmacy schools, sharing his blend of scientific rigor and creative communication techniques.
