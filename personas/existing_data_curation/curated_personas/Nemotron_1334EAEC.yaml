personas:
  professional: Rodney Celestin, an aspiring cartoonist and junior inventor, blends a love of drawing, LEGO building, and hands‑on science kits into imaginative school projects, channeling their competitive
    edge and meticulous organization into vibrant comic strips that double as playful engineering blueprints.
  sports: Rodney Celestin charges onto the field for the Richmond Rockets youth soccer team, idolizing Manchester United’s Marcus Rashford and channeling a fiercely competitive drive that often challenges
    teammates’ tactics while thriving in after‑school drills and weekend matches.
  arts: Rodney Celestin dazzles peers in the school art club with bright comic sketches inspired by Mo Willems and Jillian Tamaki, while their playlists of local hip‑hop producer Jace Beats and Virginia
    jazz saxophonist Sarah Monroe fuel impromptu dance sessions during Virginia Museum of Fine Arts workshops.
  travel: Rodney Celestin’s travel log shines with family trips to Colonial Williamsburg’s historic reenactments, sun‑soaked days at Virginia Beach building sandcastles, and awe‑inspiring visits to Washington,
    D.C.’s Smithsonian museums, preferring meticulously planned itineraries that still leave room for spontaneous LEGO scavenger hunts.
  culinary: Rodney Celestin relishes cheesy pepperoni pizza and hearty mac and cheese while experimenting in the kitchen with banana split sundaes topped with rainbow sprinkles and crafting fruit‑loop trail
    mix, showcasing a budding culinary curiosity that often leaves crumbs on their LEGO creations.
  core: Rodney Celestin’s boundless energy turns every day into a canvas of LEGO marvels, comic adventures, and spontaneous dance moves, though they sometimes forget to tidy up the glitter trail they leave
    behind.
background:
  cultural: Rodney grows up in a close‑knit African‑American family in Richmond’s historic Northside neighborhood. His parents and grandparents share stories of the city’s civil‑rights legacy and instill
    pride in Black culture through church gatherings, family reunions, and local festivals. He frequently visits community centers that offer after‑school art programs and enjoys traditions such as listening
    to gospel music at Sunday services and sharing soul‑food meals like collard greens and sweet potato pie with relatives. Attending the Richmond Folk Fest and visiting the Virginia Museum of Fine Arts
    expose him to local Black musicians, visual artists, and storytellers, reinforcing his sense of identity and community responsibility.
