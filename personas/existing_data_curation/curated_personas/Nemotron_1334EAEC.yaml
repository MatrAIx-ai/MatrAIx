  career_goals: Rodney dreams of becoming an artist who creates his own comic‑book world, blending drawing with digital storytelling. He is fascinated by inventing small gadgets that could help his neighborhood,
    such as a mini recycling robot, and hopes to showcase his ideas at school science fairs. He wants to be a leader on his soccer team and win a local tournament, as well as earn recognition in an art
    competition at the community center. Ultimately, he aspires to inspire other kids in Richmond by sharing his creative projects and encouraging them to think outside the box.
