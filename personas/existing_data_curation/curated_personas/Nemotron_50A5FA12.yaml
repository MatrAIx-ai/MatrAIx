    animated series"]'
  career_goals: Lawford dreams of turning his love for performance and visual art into a career as a multimedia creator—ideally as a music video director, content producer for digital platforms, or a visual
    artist who curates community art projects. He aspires to study graphic design and media production in high school and later attend an arts-focused college. He also hopes to become a charismatic host
    for live events or podcasts that spotlight emerging Black artists.
