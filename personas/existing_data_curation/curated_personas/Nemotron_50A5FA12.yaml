personas:
  professional: Lawford Jones is an aspiring multimedia creator who fuses graffiti‑style mural sketches, beginner drum‑machine beats, and rap verses into collaborative projects for the school drama club,
    leveraging their charismatic, talkative nature to rally peers while their laid‑back attitude toward deadlines often leaves pieces half‑finished, and their fierce competitive streak constantly pushes
    them to outdo previous works.
  sports: Lawford Jones spends afternoons at Lake Harriet Skate Park perfecting skate tricks, joins the middle‑school intramural soccer league in the fall, cheers fervently for the Minnesota Vikings and
    Timberwolves, and enters local skateboarding contests where their competitive drive shines, though they often skip warm‑ups in favor of jumping straight into the action.
  arts: Lawford Jones draws inspiration from street‑art icons like Banksy and the vibrant colors of Keith Haring, the lyrical flow of Kendrick Lamar, and the whimsical storytelling of Adventure Time, channeling
    this mix into spoken‑word poetry at the drama club, large‑scale mural sketches after visits to the Minneapolis Institute of Art, and a growing personal playlist of rap beats produced on a beginner drum
    machine.
  travel: Lawford Jones prefers spontaneous weekend getaways to the Mall of America or family camp trips in the Boundary Waters, dreams of exploring the graffiti‑laden alleys of Berlin and the neon‑lit
    districts of Tokyo, and plans each adventure on the fly using social media recommendations rather than strict itineraries, balancing their limited teen budget with a craving for cultural immersion.
  culinary: Lawford Jones favors fast‑food staples like chicken nuggets and cheese pizza, but also loves assembling quick ramen bowls with sriracha, garlic, and a soft‑boiled egg, often swapping snack ideas
    with friends after gaming sessions and claiming a half‑hearted ambition to master flipping pancakes on a griddle despite limited kitchen skills.
  core: Lawford Jones is a 13‑year‑old artistic dynamo whose curiosity fuels mural sketches, drum‑machine beats, and rap verses, thrives on social buzz, wrestles with anxiety, and oscillates between impulsive
    sneaker splurges and spontaneous skate sessions.
background:
  cultural: Born and raised in Minneapolis's Northside neighborhood, Lawford is part of a close-knit African-American community that values music, visual storytelling, and social activism. His family blends
    traditions from the Southern Black diaspora with the city's vibrant hip-hop scene and rich arts institutions like the Walker Art Center and the Minneapolis Institute of Art. Community events such as
    Juneteenth festivals, youth art workshops, and church gatherings shape his cultural identity, fostering pride in his heritage and a desire to amplify Black creativity.
attributes:
  skills: '["Public speaking","Improvisational storytelling","Digital illustration","Basic Scratch coding","Peer networking","Event organization","Strategic gaming"]'
