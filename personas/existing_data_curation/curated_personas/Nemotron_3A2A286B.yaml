  career_goals: James dreams of becoming a problem‑solver who can uncover mysteries and invent new things—he imagines careers such as a young scientist, a tech innovator, or a detective who uses science
    to crack cases. He is motivated by the idea of competing in science fairs and creating inventions that help his friends and family, while also hoping to earn recognition for his artistic projects.
