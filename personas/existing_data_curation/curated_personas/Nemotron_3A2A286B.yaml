personas:
  professional: James Abernathy, an aspiring comic‑style illustrator and LEGO architect, merges their curiosity and competitive streak into detailed, story‑driven artwork that they meticulously plan yet
    allow spontaneous twists, showcasing early mastery of visual storytelling and problem‑solving.
  sports: James Abernathy, a competitive member of the U10 Metro City Youth Soccer Club who idolizes the Metro City Strikers and spends weekends hiking local trails, approaches fitness with a blend of disciplined
    practice and occasional bouts of over‑exertion when trying to outscore peers.
  arts: James Abernathy, a budding comic creator who draws inspiration from Stan Lee, Jim Lee, and Studio Ghibli, and expresses emotions through piano renditions of Ludovico Einaudi’s pieces, immerses themselves
    in vibrant visual and musical worlds that shape their daily imagination.
  travel: James Abernathy, whose travel style blends family‑budget road trips to destinations such as Yosemite National Park and Saturday outings at the Smithsonian in Washington, D.C., favors hands‑on
    exploration over luxury, often planning itineraries around interactive museum exhibits and nature hikes.
  culinary: James Abernathy, a budding home‑chef who delights in assembling pepperoni pizza, rolling simple sushi with cucumber and avocado, and baking chocolate‑chip cookies—though their impatient stirring
    sometimes leads to burnt edges—enjoys experimenting with fresh ingredients like basil, soy sauce, and dark chocolate.
  core: James Abernathy, a fiercely inquisitive nine‑year‑old whose competitive spirit fuels both elaborate LEGO constructions and obsessive puzzle‑solving, yet their tendency to over‑worry and forget bedtime
    chores reveals a charmingly imperfect balance of ambition and anxiety.
background:
  cultural: James grows up in a close‑knit family in Columbus, Georgia, where community gatherings, church youth groups, and local festivals shape his social world. He shares the Southern tradition of family
    barbecues and weekend trips to nearby rivers, while attending a public elementary school that celebrates both regional heritage and multicultural events. This environment blends a respect for local
    customs with exposure to diverse ideas, fueling his open‑minded curiosity and competitive spirit.
