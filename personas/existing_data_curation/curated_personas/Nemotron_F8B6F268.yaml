    to new technologies'']'
  hobbies: '[''Cooking traditional Ecuadorian dishes'', ''Playing acoustic guitar (Andean folk music)'', ''Model kit building (aircraft and vintage cars)'', ''Birdwatching'', ''Gardening native Texas plants'',
    ''Cycling on Sugar Land trails'', ''Mindfulness meditation'', ''Participating in community tech workshops'']'
  career_goals: Jason aims to transition from front‑line demo work to a strategic leadership role where he can shape how new products are introduced to market. Over the next five years he plans to earn
    a Certified Professional Technical Trainer (CPTT) certification, develop a consultancy that advises tech firms on senior‑friendly product launches, and author a guidebook on effective live demonstrations
    for older audiences. He also seeks to mentor a cohort of younger demonstrators, secure a speaking slot at a major industry conference such as CES, and achieve measurable sales growth through innovative
    demo formats that blend his practical engineering mindset with creative presentation techniques.
