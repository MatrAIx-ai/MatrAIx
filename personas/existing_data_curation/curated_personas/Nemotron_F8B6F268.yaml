personas:
  professional: Jason Botero, a veteran tech product demonstrator with a STEM graduate background, turns meticulous engineering precision and bilingual fluency into compelling live showcases, while their
    competitive streak and occasional skepticism push them to constantly refine demo formats for senior audiences, and they also mentor younger presenters.
  sports: Jason Botero, a dedicated member of the Sugar Land Cycling Club who logs weekend rides along the Arboretum Trails, follows the Houston Astros in baseball and the Texans in football with a respectful
    but competitive spirit, and supplements the cycling routine with low‑impact yoga sessions to manage anxiety, they illustrate a measured approach to fitness befitting a 63‑year‑old enthusiast.
  arts: Jason Botero, an avid acoustic‑guitar player who spends evenings mastering Andean pasillos and folk standards by artists like Bob Dylan, Simon & Garfunkel, and John Denver, often performs at small
    community gatherings, and they use music as a soothing counterbalance to their competitive, analytical mind.
  travel: Jason Botero, who prefers low‑key, purpose‑driven trips, has explored the Galápagos Islands for birdwatching, toured Kyoto’s zen gardens, sampled Texas Hill Country wines in Fredericksburg, and
    plans to visit Patagonia’s remote trails, and they meticulously budget each journey to avoid financial strain.
  culinary: Jason Botero, a confident home cook who blends coastal dishes such as ceviche, encebollado, and brisket‑filled empanadas with Texan staples like jalapeño, smoked paprika, and locally sourced
    cilantro, routinely stocks heirloom tomatoes, avocados, and fresh fish at the farmers market, and they delight in perfecting the balance of citrus acidity and smoky heat.
  core: Jason Botero merges meticulous engineering expertise with a quietly competitive streak, channels anxiety through mindful guitar strums and precision model‑kit builds, and they habitually check demo
    metrics obsessively late into the night.
background:
  cultural: Jason grew up in a bicultural household, the son of Ecuadorian immigrants who settled in Texas when he was a child. He was raised speaking Spanish at home and celebrating Ecuadorian customs
    such as Carnaval de Guaranda, Día de los Difuntos, and the annual feast of San Juan. Catholic traditions, strong family ties, and the communal spirit of his heritage shaped his values of respect, hospitality,
    and perseverance. Living in Sugar Land, he maintains connections with the local Latino community through church gatherings, cultural festivals, and a neighborhood kitchen where he often prepares and
    shares traditional meals. His Ecuadorian roots also influence his love for music, storytelling, and a pragmatic yet warm approach to work and relationships.
attributes:
  skills: '[''Technical product demonstration'', ''Bilingual communication (Spanish/English)'', ''Customer engagement'', ''Mechanical troubleshooting'', ''Electronics prototyping'', ''Presentation design'',
