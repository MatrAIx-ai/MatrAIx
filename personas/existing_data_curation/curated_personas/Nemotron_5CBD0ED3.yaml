personas:
  professional: Yijun Le, a seasoned construction manager who orchestrates multi‑million‑dollar NYC developments with meticulous budgeting, bilingual site coordination, and a collaborative, harmony‑focused
    approach that balances his love of structure with a flexible, sometimes relaxed attitude toward strict planning, making him adept at navigating code complexities and vendor negotiations.
  sports: Yijun Le stays fit by hitting the trails with the NYC Hiking Society during spring and fall, joining a weekday pick‑up basketball league to root for the New York Knicks, and occasionally checking
    in at a cross‑fit box to counterbalance long hours on construction sites.
  arts: Yijun Le captures the pulse of Manhattan’s neighborhoods through street photography inspired by Henri Cartier‑Bresson and Alex Webb, unwinds to the smooth improvisations of John Coltrane and Miles
    Davis, and frequents MoMA’s latest exhibitions to stay tuned to contemporary visual art.
  travel: Yijun Le prefers carefully planned trips that blend adventure hiking in places like Yellowstone and Sedona with cultural immersion in cities such as Copenhagen and Barcelona, often coordinating
    travel around project milestones to ensure both work commitments and family time are respected.
  culinary: Yijun Le, an avid home chef, perfects traditional Chinese dishes like xiao long bao, mapo tofu, and braised pork belly using Sichuan peppercorns and fermented black beans, while also experimenting
    with Mediterranean mezze on weekends, and enjoys hosting Mahjong evenings where they serve these culinary creations alongside a curated selection of tea.
  core: Yijun Le blends disciplined construction expertise with a laid‑back love for Mahjong nights, jazz vinyls, and spontaneous hikes, all while juggling occasional disorganization and a tendency to postpone
    personal errands until project deadlines ease.
background:
  cultural: Yijun is the son of Chinese immigrants who settled in Queens, New York. He grew up immersed in a multicultural neighborhood, speaking Mandarin at home and English at school. He celebrates Lunar
    New Year and the Mid‑Autumn Festival, maintains traditional culinary practices, and values the Confucian principles of respect, harmony, and collectivism. These cultural influences shape his considerate,
    cooperative approach both at work and in his community.
attributes:
  skills: '[''Project Management'', ''Construction Scheduling'', ''Budgeting and Cost Control'', ''Contract Negotiation'', ''Construction Safety Compliance'', ''NYC Building Codes & Regulations'', ''Vendor
