  hobbies: '[''Cooking (Chinese cuisine)'', ''Hiking (local trails)'', ''Mahjong'', ''Reading (business & leadership)'', ''Urban photography'', ''Jazz music appreciation'', ''Community gardening (volunteer)'',
    ''Watching NBA basketball'', ''Meditation'']'
  career_goals: Yijun aims to lead multi‑million‑dollar mixed‑use development projects that incorporate sustainable design and LEED certification. Within the next three years he plans to earn PMP and LEED
    AP credentials, positioning himself for a senior director role in a real‑estate development firm. Long‑term, he aspires to launch his own construction consulting practice focused on community‑friendly,
    environmentally responsible building, while mentoring junior managers to foster collaborative and resilient work cultures.
