persona_description: A team of researchers from the Materials Physics Center (CFM, CSIC-UPV/EHU joint centre), Donostia International Physics Center (DIPC), and the University of the Basque Country (UPV/EHU),
  who have made significant contributions to the discovery of magnetic topological insulators. The team includes Mikhail Otrokov (CFM Ikerbasque Research Fellow), Evgueni Chulkov (UPV/EHU, Euskadi Research
  Prize 2019), María Blanco Rey (UPV/EHU), and Pedro M. Echenique (UPV/EHU, DIPC President). They have successfully predicted the first intrinsic magnetic topological insulator, with the chemical formula
  MnBi2Te4. The research team has also coordinated the experimental confirmation of their theoretical prediction, involving experts from different countries. The team's work has been well-received by the
  international scientific community, and their findings are currently being studied in several research centers.
