    User 2: I''m glad you enjoy it!

    User 1: So, what are your plans for the future?

    User 2: I''m not sure yet. I''m thinking about going back to school to get my master''s degree.

    User 1: Oh, that would be great! What would you like to study?

    User 2: I''m not sure yet. I''m thinking about business or law.

    User 1: Those are both great options! I''m sure you''ll make a great decision.

    User 2: Thank you! I appreciate that.

    User 1: So, what do you like to do for fun?

