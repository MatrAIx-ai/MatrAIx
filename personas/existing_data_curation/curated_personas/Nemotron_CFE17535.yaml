  career_goals: 'Although fully retired, Jesus aims to channel his curiosity into a personal project: writing and self‑publishing a memoir that chronicles his family''s journey from Cuba to New Jersey and
    reflects on the evolution of Cuban art in the diaspora. He hopes to curate a modest exhibition at the Lodi community center featuring works by local Cuban‑American artists, providing a platform for
    younger creators. Additionally, he aspires to establish a small scholarship fund for high‑school students interested in visual arts, ensuring his love for creativity continues to inspire future generations.'
