personas:
  professional: Jesus Garcia, a retired arts scholar and bilingual translator, channels his lifelong expertise in Latin American visual arts and his curious, flexible nature into mentoring senior center
    art workshops and crafting a memoir, though his relaxed attitude toward strict deadlines often leads to last‑minute scrambling of materials.
  sports: Jesus Garcia enjoys low‑impact fitness through weekly walks with the Lodi Senior Center Walking Club and attends occasional senior yoga sessions, while cheering on the New York Mets in baseball
    and the New York Knicks in basketball from his living room.
  arts: Jesus Garcia delights in watercolor painting delicate street scenes while listening to Benny Moré’s Cuban son, Dizzy Gillespie’s modern jazz, and reading Pablo Neruda’s poetry, often referencing
    the works of Wifredo Lam and Frida Kahlo in conversations at museum visits, which fuels both his creative output and his mentorship of younger artists.
  travel: Jesus Garcia prefers spontaneous, short‑duration trips that blend cultural exploration and relaxation, having revisited Havana’s historic plazas, toured the museums of Madrid, and taken relaxed
    weekend getaways to the Hudson Valley, while still dreaming of a leisurely cruise through the Caribbean islands.
  culinary: Jesus Garcia enjoys preparing traditional dishes such as ropa vieja and picadillo, seasoning them with cumin, garlic, and adobo, and frequently experiments with fresh herbs from his garden like
    cilantro and oregano, displaying a competent home‑cooking skill that balances nostalgic flavors with occasional indulgent dessert experiments.
  core: Jesus Garcia is a curious, solitary retiree who blends art, music, and gardening into a tranquil yet occasionally disorganized life, channeling his passion for heritage into watercolor sketches
    and a memoir while navigating the challenges of aging with gentle humor.
background:
  cultural: Born and raised in Cuba, Jesus carries a vivid cultural legacy of Afro‑Cuban rhythms, Catholic traditions, and familial storytelling. After emigrating to the United States in his early thirties,
    he settled in Lodi, New Jersey, where he blended his Caribbean roots with the multicultural fabric of the Bergen County community. His household maintains Spanish as the primary language, celebrates
    Cuban holidays such as the Día de la Revolución and Carnaval, and preserves culinary customs through weekly family meals. Jesus actively participates in local Hispanic cultural events, shares Cuban
    folklore with grandchildren, and serves as a bridge between his generation's experiences and the younger, more diverse community around him.
