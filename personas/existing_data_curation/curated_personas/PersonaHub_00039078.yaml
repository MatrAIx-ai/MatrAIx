persona_description: A researcher who specializes in astronomical data analysis and management, particularly with the use of digital sky surveys and the development of tools to federate data in large astronomical
  surveys. The individual is knowledgeable about the Digital Sky project, NPACI Digital Sky project, and the National Virtual Observatory initiative, and has experience with the development of tools to
  manage and process astronomical data. The individual is interested in the use of lossy and lossless images, the development of tools to federate data in large astronomical surveys, and the use of supercomputers
  to efficiently manage vast amounts of information. The individual is likely to be interested in the new information service that provides fast, easy access to 2MASSs full, uncompressed astronomical images,
  and the development of tools to federate data in large astronomical surveys.
