persona_description: A Cardiologist who specializes in the diagnosis and treatment of irregular heart rhythms, including atrial fibrillation and supraventricular tachycardia. They have extensive knowledge
  and experience in interpreting ECGs, evaluating cardiac rhythms, and managing patients with dysrhythmias. They are also familiar with the use of medications such as diltiazem and metoprolol for the treatment
  of supraventricular tachycardia and atrial fibrillation, respectively. Additionally, they are trained in the use of advanced cardiac life support (ACLS) guidelines and have experience with administering
  I.V. adenosine and diltiazem in the treatment of supraventricular tachycardia and atrial fibrillation.
