  hobbies: '[''Hiking'', ''Wine Tasting'', ''Tai Chi'', ''Cooking Vietnamese Cuisine'', ''Reading Non-fiction'', ''Landscape Photography'']'
  career_goals: Over the next five years, Ok J Le aims to advance to a plant manager role, lead the adoption of sustainability and waste‑reduction initiatives across the facility, achieve Six Sigma Black
    Belt certification, and enroll in a part‑time MBA program to strengthen his strategic management skills. He also aspires to mentor junior engineers and eventually transition into operations consulting
    for small manufacturers in the Bay Area, helping them implement structured, efficient processes while maintaining a people‑first culture.
