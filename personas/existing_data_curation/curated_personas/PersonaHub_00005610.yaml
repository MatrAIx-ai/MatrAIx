persona_description: A scientist who specializes in planetary science, particularly the study of Europa, a moon of Jupiter. They have extensive experience with the Hubble Space Telescope and have conducted
  research on the detection of aural emissions from Europa. They are excited about the possibility of confirming the presence of subsurface water on Europa and have proposed a theory for the location of
  the cracks that emit the water. They have a keen interest in the study of tidal modeling and have conducted research on the detection of plumes on Europa.
