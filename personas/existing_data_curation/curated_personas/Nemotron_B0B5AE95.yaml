personas:
  professional: Flordeliza Vu, a data‑driven teaching assistant who leverages bilingual fluency and tech expertise to craft culturally responsive lesson plans, and they competitively pursue grant funding
    for innovative classroom projects.
  sports: Flordeliza Vu, an avid surfer at Waikiki Beach and dedicated hiker of Makapu’u Trail, who also follows the Rainbow Warriors football team and competes in the local surf club’s quarterly wave‑count
    challenge, and they regularly log tide times to squeeze extra practice into busy days.
  arts: Flordeliza Vu, a passionate photographer and avid reader of educational psychology, who immerses themselves in local hula performances, collects vinyl from island legends like Israel Kamakawiwo'ole
    and a local folk vocalist, and they draw creative inspiration from the vibrant colors of tropical festivals for classroom storytelling.
  travel: Flordeliza Vu, a blend of meticulous planner and spontaneous explorer, who has trekked the volcanic craters of the Big Island, surfed the north‑shore waves of Oahu, and journeyed to Hoi An for
    a cultural immersion, and they now dream of a community‑service trip to the coral reefs of Fiji while juggling family commitments.
  culinary: Flordeliza Vu, a skillful home chef who fuses island staples such as taro, coconut milk, and pineapple with aromatic fish sauce and lemongrass, known for crafting signature dishes like kalua
    pork bao, pineapple‑infused noodle soup, and a taro‑milk latte, and they often prepare these for friends after a surf session.
  core: Flordeliza Vu, a pragmatic yet curious educator who balances competitive ambition with island‑grown mindfulness, and they turn every grant proposal, surf session, and family recipe into a lesson
    in harmony and resilience.
background:
  cultural: Flordeliza is a first‑generation Hawaiian resident of Southeast Asian heritage, with her family roots tracing back to Vietnam. She grew up in a multilingual household where Vietnamese and English
    were spoken, and she was exposed to Hawaiian cultural traditions through community events and school programs. This blend of Asian family values—such as respect for elders, dedication to education,
    and communal responsibility—combined with the island’s emphasis on Ohana (family) and Aloha (love, compassion) shapes her worldview. She actively incorporates cultural narratives and inclusive practices
    into her teaching, honors both her Vietnamese lineage and Hawaiian surroundings, and participates in local festivals that celebrate the rich tapestry of Pacific Island cultures.
attributes:
  skills: '[''Lesson Planning'',''Classroom Management'',''Educational Technology (Google Classroom, Canvas)'',''Curriculum Development'',''Student Assessment Design'',''Data‑Driven Instruction'',''Bilingual
