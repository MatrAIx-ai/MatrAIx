    Materials'',''Time Management'',''Adaptability to Classroom Changes'']'
  hobbies: '[''Hiking and nature walks'',''Surfing and beach activities'',''Snorkeling'',''Strategic board games (Catan, Chess)'',''Reading educational psychology and self‑improvement books'',''Cooking
    fusion Vietnamese‑Hawaiian dishes'',''Photography'',''Yoga and mindfulness practice'',''Volunteering for adult‑literacy programs'',''Attending Hawaiian cultural events (hula, luau)'']'
  career_goals: Flordeliza aims to transition from a teaching assistant to a fully certified high‑school teacher within the next two years, followed by a master's degree in Educational Leadership. She aspires
    to become a curriculum specialist for the Honolulu County school system, where she can design culturally responsive, technology‑enhanced programs that improve student outcomes. Leveraging her competitive
    nature, she plans to secure district‑wide grants for innovative classroom projects and lead a team of educators in implementing evidence‑based practices. Long‑term, she envisions establishing a community
    tutoring center that offers bilingual support and after‑school enrichment for underserved families in Wahiawa, promoting equity and lifelong learning.
