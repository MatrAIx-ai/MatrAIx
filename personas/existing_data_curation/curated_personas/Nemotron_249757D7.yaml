  hobbies: '[''Community theater'', ''Hosting dinner parties'', ''Volunteering at senior center'', ''Volunteering at animal shelter'', ''Gardening (desert plants)'', ''Hiking in Red Rock Canyon'', ''Live
    music events'', ''Wine tasting'', ''Crocheting and quilting'', ''Bingo nights'', ''Reading romance and mystery novels'']'
  career_goals: Marion aims to advance to a Front Office Manager role within the next two to three years, pursuing a Certified Hospitality Supervisor credential to formalize her expertise. She hopes to
    design a staff mentorship program that emphasizes stress‑management techniques and exceptional customer service, reflecting her compassionate nature. Long‑term, she envisions transitioning into a regional
    guest‑relations consultancy, helping multiple properties improve guest satisfaction metrics. After a fulfilling career, Marion plans to co‑own a small boutique bed‑and‑breakfast with her husband, creating
    a personalized hospitality experience rooted in her love for structure, community, and personalized service.
