personas:
  professional: Sharon Dockery, a retired volunteer docent and budding historian, blends her meticulous spreadsheet skills, genealogical research expertise, and garden‑organizing flair into a methodical,
    competitive approach to community education and civic projects, always planning ahead and scrutinizing every detail.
  sports: Sharon Dockery, a devoted birdwatcher who joins early‑morning walks at the local park and follows the Florida State Seminoles football and Tallahassee Titans baseball teams, channels her competitive
    streak into friendly garden‑planting contests rather than high‑impact sports, while she keeps fit through gentle tai‑chi classes at the community center.
  arts: Sharon Dockery, an avid quilter and historical nonfiction reader, finds inspiration from the textile patterns of Anni Albers, the paintings of Winslow Homer, and the storytelling of author David
    McCullough, often staging small exhibitions of her quilts at the church hall and attending museum lectures she also leads.
  travel: Sharon Dockery, a meticulous planner of modest pilgrimages, prefers road trips to historic sites like Savannah’s squares, the Civil Rights Trail in Montgomery, and the Great Smoky Mountains, where
    she combines genealogy research at local archives with bird‑watching excursions, always budgeting the journey in her trusted spreadsheet.
  culinary: Sharon Dockery, a methodical Southern chef, perfects dishes such as shrimp and grits, collard greens seasoned with smoked turkey, heirloom tomato and sweet corn salad, and peach cobbler, measuring
    each ingredient like a scientist and sharing the results with her church potluck circle.
  core: Sharon Dockery balances a competitive love of organized gardening with a quiet devotion to history, always cataloguing life’s details while worrying about the next unexpected twist.
background:
  cultural: Sharon was raised in the Deep South during the civil-rights era, an experience that instilled a strong sense of resilience and community among African-American families. Her identity is shaped
    by the church's gospel traditions, Southern cuisine, and a rich oral history passed down through generations. She remains connected to the local black community in Tallahassee, participating in cultural
    events that celebrate African-American heritage, such as Juneteenth commemorations and church choir gatherings. Her upbringing informs her methodical approach to life, her competitive spirit in friendly
    community contests, and her cautious, skeptical outlook shaped by navigating a society that often questioned her intentions.
attributes:
  skills: '[''financial spreadsheet management'', ''budget planning'', ''record keeping'', ''genealogical research'', ''vegetable gardening'', ''recipe development'', ''quilting'', ''small-group event coordination'']'
  hobbies: '[''vegetable gardening'', ''genealogy research'', ''historical nonfiction reading'', ''southern cooking'', ''quilting'', ''birdwatching'', ''small-group Bible study'', ''museum docent volunteering'']'
  career_goals: Although retired, Sharon aims to complete her bachelor's degree in history, a goal she set after her recent interest in local civil-rights narratives. She plans to compile a comprehensive
    family genealogy and publish a memoir that reflects the resilience of her generation. She also seeks to mentor her grandchildren in practical life skills, such as budgeting and cooking, and to serve
    as a volunteer docent at the Tallahassee Museum, sharing her knowledge of local history with small visitor groups. Additionally, she aspires to lead a community garden project, using her competitive
    edge to organize friendly planting contests that foster neighborhood cohesion while ensuring careful stewardship of resources.
