  hobbies: '[''Museum visits'', ''Art festivals'', ''Nature hiking and sketching'', ''Gardening'', ''Reading historical fiction and art theory'', ''Cooking'', ''Yoga'', ''Community volunteering'']'
  career_goals: Peggy aims to open a boutique gallery in the Bloomington‑Norman region that showcases her own mixed‑media installations and emerging Midwestern artists. She seeks a residency that allows
    her to develop a signature series exploring memory and place, and hopes to secure a regular adjunct teaching position at a community college. Long‑term, she wants to lead large‑scale public art projects,
    publish a book on integrating folk traditions with contemporary practice, and build a sustainable income stream through online sales and commissions while maintaining a strong community outreach component.
