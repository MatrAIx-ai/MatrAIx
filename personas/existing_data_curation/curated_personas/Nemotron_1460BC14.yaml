personas:
  professional: Peggy Hofmann is a mixed‑media artist and curator who leverages her meticulous planning, competitive drive, and sociable energy to orchestrate community exhibitions, secure arts grants,
    and mentor adult learners while constantly seeking unconventional concepts for her boutique gallery vision.
  sports: Peggy Hofmann enjoys weekend hikes on local Bloomington trails with the Bloomington Trail Runners, supplements this with yoga sessions at the Norman Community Wellness Studio, and follows the
    Indiana Hoosiers basketball and Oklahoma City Thunder for their competitive spirit, treating fitness as a structured yet stress‑relieving routine.
  arts: Peggy Hofmann spends her free time absorbing the works of Georgia O'Keeffe and Ai Weiwei at museum visits, attending regional festivals featuring live performances by Lin‑Manuel Miranda and listening
    to Kendrick Lamar while sketching nature, and channeling those inspirations into mixed‑media installations that reflect her curiosity and competitive drive.
  travel: Peggy Hofmann prefers meticulously planned art pilgrimages, having already trekked the galleries of Santa Fe and the frescoes of Florence, while dreaming of a summer retreat on Mackinac Island
    to combine sketching the shoreline with a quiet garden, all balanced against the budget constraints of launching her boutique gallery.
  culinary: Peggy Hofmann, an avid home cook, often prepares seasonal dishes such as roasted beet and goat‑cheese salads, heirloom tomato bruschetta with fresh basil, and wild‑mushroom risotto using garden‑grown
    herbs, demonstrating a confident intermediate skill set that blends experimental plating with a love for locally sourced ingredients.
  core: Peggy Hofmann is a curiosity‑driven, hyper‑organized artist whose competitive edge fuels relentless exhibition planning, yet their chronic worry and habit of impulse‑buying art books keep their
    stress levels perpetually high.
background:
  cultural: Peggy was raised in a Midwestern white family in Illinois with German and Irish ancestry. Her upbringing emphasized community involvement, modesty, and a strong work ethic typical of the region.
    Growing up near farmland and small towns fostered an appreciation for local traditions, folk art, and seasonal celebrations, while her liberal arts education exposed her to broader cultural movements
    and contemporary artistic discourse.
