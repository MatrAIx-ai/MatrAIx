persona_description: An entomologist who specializes in the study of ticks, particularly the oldest representative of the order Parasitiformes and the oldest hard tick on record. He is known for his expertise
  in the fossil record of ticks and is currently working on a paper describing the oldest known hard tick. His research interests include the evolutionary history of ticks, their distribution and ecology,
  and their potential impact on human health.
