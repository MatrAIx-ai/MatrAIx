  career_goals: Juan loves to imagine his future. He often talks about becoming an artist who paints big, colourful pictures, or a builder who constructs tall towers with his hands. He is also fascinated
    by storybook heroes and says he might be a firefighter or a wildlife explorer. He likes the idea of a job that lets him stay creative, play with his hands, and discover new things, reflecting his curiosity
    and love for flexible, open‑ended activities.
