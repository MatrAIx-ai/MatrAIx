personas:
  professional: Juan Mesa is a preschool explorer who stacks colorful blocks into whimsical structures, turning the classroom into a mini‑gallery of imaginative architecture while they delight in spontaneous,
    unplanned play.
  sports: Juan Mesa loves watching the Los Angeles Dodgers on TV and proudly wears their cap, while they actively participate in the Green Sprouts preschool soccer club, where they chase the ball with boundless
    energy and occasionally argue over turn‑taking during scrimmages.
  arts: Juan Mesa is fascinated by the animated world of "Sesame Street" and enjoys drawing colorful pictures of Big Bird and Elmo, often humming songs by Disney composer Lin‑Manuel Miranda during art time
    while they explore new artistic ideas.
  travel: Juan Mesa recently visited the local zoo and the sandy beach in their hometown, dreaming of a future trip to Disney World and the Eiffel Tower after they heard stories and saw picture books about
    those far‑away places.
  culinary: Juan Mesa adores chicken nuggets, mac and cheese with extra cheddar, and strawberry‑banana smoothies, proudly helping stir the batter but occasionally sneaking extra grapes when no one’s watching,
    while they relish the bright flavors of each dish.
  core: Juan Mesa is a curious, art‑loving 4‑year‑old who balances playful chaos with gentle cooperation, while they save pennies for stickers and navigate seasonal allergies, brightening every room with
    spontaneous imagination.
background:
  cultural: Juan’s family maintains a strong Mexican cultural heritage while living in Madera, California. At home, he hears Spanish spoken alongside English, and he participates in family celebrations
    such as Día de los Muertos, where he helps arrange colourful papel picado and altar items. He enjoys traditional foods like tamales and quesadillas, and he’s familiar with Mexican folk music and dances,
    which he often imitates with his parents. Living in Madera’s agricultural community, he also experiences the rhythms of farm life, occasionally joining his family for visits to nearby orchards during
    harvest seasons. These cultural experiences shape his worldview and personal identity.
