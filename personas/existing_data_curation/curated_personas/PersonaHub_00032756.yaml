persona_description: A political activist who is deeply interested in the history and policies of the Civil War era, particularly the role of Radical Republicans in the abolition of slavery and the rights
  of freedmen. They are knowledgeable about the Joint Committee on the Conduct of War, the Wade-Davis Bill, and the issues of Union military losses and Confederate mistreatment of prisoners and Native Americans.
  They are also interested in the presidency and the political succession, particularly in the context of Andrew Johnson's impeachment trial.
