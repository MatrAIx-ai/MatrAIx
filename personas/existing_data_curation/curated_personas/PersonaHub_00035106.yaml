persona_description: An American nuclear chemist known for his work on isolating and identifying elements heavier than uranium, including the discovery of the elements americium (95), curium (96), berkelium
  (97), californium (98), einsteinium (99), fermium (100), mendelevium (101), nobelium (102), and unnilhexium (106). Seaborg was also the chairman of the Atomic Energy Commission from 1961 to 1971, and
  the American nuclear-power industry developed rapidly during that time. He returned to the University of California at Berkeley in 1971 and in 1994 the artificial element unnilhexium was tentatively named
  seaborgium in his honour.
