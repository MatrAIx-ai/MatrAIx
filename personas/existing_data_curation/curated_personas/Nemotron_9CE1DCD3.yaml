  career_goals: Diane aims to advance to a senior HR leadership role, such as HR Manager or Director, within the next five years. She plans to earn the SHRM‑CP certification and eventually complete a master's
    in Human Resources Management. Her ambition is to lead strategic workforce planning and develop inclusive culture programs that promote employee well‑being, retention, and harmony. She also seeks to
    mentor junior HR staff, champion flexible work policies that support work‑life balance, and influence organizational strategy at the executive level while maintaining a collaborative and people‑centered
    approach.
