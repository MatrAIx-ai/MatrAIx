  hobbies: '[''Restoring vintage radios and small appliances'', ''Fishing on local lakes'', ''Board-game nights with a close group of friends'', ''Karaoke of K‑pop and Vietnamese pop songs'', ''Cooking
    traditional East Asian dishes'', ''Attending Lunar New Year celebrations'', ''Volunteer work at community cultural center'']'
  career_goals: He aims to advance from a frontline maintenance technician to a supervisory role within the next three to five years, eventually becoming a Facility Operations Manager for a large institutional
    property such as a hospital or university campus in the Twin Cities. To achieve this, he plans to earn EPA 608 certification for refrigerants, obtain a journeyman electrician license, and complete a
    bachelor’s program in Facility Management. He also wants to deepen his expertise in building automation and sustainable retrofits, positioning himself as a go‑to resource for energy‑efficiency projects.
    In parallel, he hopes to mentor newer technicians, fostering a cooperative and supportive work environment that reflects his values of harmony and teamwork.
