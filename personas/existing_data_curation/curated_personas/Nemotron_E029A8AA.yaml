personas:
  professional: Lam Crealese leverages a decade of hands‑on maintenance expertise and an associate degree in Mechanical Systems Technology to efficiently diagnose and repair HVAC, electrical, and plumbing
    systems, while they prefer structured, predictable workflows and their cooperative spirit drives their ambition to become a Facility Operations Manager overseeing sustainable retrofits at a large institutional
    property in the Twin Cities.
  sports: Lam Crealese enjoys low‑key fitness through weekend fishing on Minnesota’s lakes, occasional pickup basketball at the local community center, and they fervently support the Minnesota Twins, Vikings,
    and Wild, showing loyalty through regular game attendance and seasonal apparel.
  arts: Lam Crealese finds artistic outlet in board‑game evenings and karaoke sessions featuring classic K‑pop hits from BTS and EXO alongside Vietnamese pop favorites like Son Tung M‑TP, and they weave
    these cultural melodies into intimate gatherings that reinforce camaraderie.
  travel: Lam Crealese prefers moderate planning for trips that blend nature and culture, having explored the Boundary Waters, visited Seoul for a K‑pop festival, trekked through Hanoi’s historic districts,
    and they now dream of a weekend retreat to Japan’s rural hot‑spring towns.
  culinary: Lam Crealese cooks at an intermediate skill level, regularly preparing pho with star anise and fish sauce, kimchi jjigae spiced with gochujang, and Chinese stir‑fry using soy sauce and sesame
    oil, and they share these dishes with family and neighbors as a way to celebrate heritage and community.
  core: Lam Crealese blends a methodical, hands‑on work ethic with solitary tinkering, quiet fishing, and low‑key cultural celebrations, and they balance a relaxed planning style with a deep commitment
    to harmony and practical problem‑solving.
background:
  cultural: Lam was born in St. Paul to immigrant parents—his father from Vietnam and his mother from South Korea—so he grew up in a bilingual household speaking both Vietnamese and Korean while also learning
    English at school. The family emphasized hard work, respect for elders, and communal harmony, values that continue to guide his approach to work and relationships. He celebrates both Tet (Vietnamese
    Lunar New Year) and Seollal (Korean New Year), and participates in local Asian cultural festivals that showcase traditional music, dance, and food. His upbringing in the diverse Twin Cities region has
    also exposed him to a broader Asian diaspora, fostering an appreciation for multicultural community life while maintaining strong ties to his East Asian heritage.
attributes:
  skills: '[''HVAC installation and repair'', ''Plumbing maintenance and fixture replacement'', ''Electrical wiring and circuit troubleshooting'', ''Preventive maintenance planning'', ''CMMS work order
