  hobbies: '["Reading mystery/science-fiction novels", "Chess", "Puzzle solving (crosswords, Sudoku)", "After-school robotics club (Scratch, LEGO Mindstorms)", "Journaling for stress management", "Beginner
    piano practice", "Sketching comic characters", "Community gardening with a small group"]'
  career_goals: Brenda aspires to a career that combines her love for structure, problem-solving, and helping others. She is fascinated by scientific research and hopes to become a biomedical engineer or
    forensic analyst, roles that require meticulous attention to detail. At the same time, she wants to support peers who struggle with stress, considering a future as a school counselor or youth mental-health
    advocate. Her competitive nature drives her to aim for academic excellence, with the ambition to attend a specialized STEM high-school program and later a university known for engineering or health
    sciences.
