personas:
  professional: Brenda Grant is a budding robotics programmer who, through their after‑school robotics club, applies their love of structure and strategic thinking to design and code LEGO Mindstorms challenges
    using Scratch, while their competitive streak drives them to perfect each build.
  sports: Brenda Grant is an avid supporter of the local junior soccer club, the Greenfield Tigers, follows the national women's basketball team, the Skyhawks, and participates in a small after‑school badminton
    group where they appreciate the clear rules and organized practice sessions over free‑form play.
  arts: Brenda Grant delights in reading mystery novels by Agatha Christie and sci‑fi works by Isaac Asimov, practices beginner piano pieces by Yiruma, sketches comic‑style characters inspired by Jeff Smith,
    and collects posters of the indie band Tame Impala, using these artistic outlets as structured channels for their imagination.
  travel: Brenda Grant enjoys day trips to the nearby state park for nature hikes, dreams of attending the International Robot Expo in Tokyo, and plans a family weekend getaway to the historic Williamsburg
    Colonial district, favoring itineraries with clear schedules and pre‑booked activities over spontaneous travel.
  culinary: Brenda Grant prefers classic grilled cheese sandwiches with cheddar and tomato soup, enjoys making simple sushi rolls with cucumber and avocado at home, and comfortably whips up a banana‑berry
    smoothie using frozen berries and honey, though they sometimes neglect to include vegetables at lunch.
  core: Brenda Grant is a methodical, puzzle‑loving pre‑teen who channels their competitive edge and structured mindset into robotics, chess, and meticulous journaling, while balancing a cautious approach
    to money, health, and leisure.
background:
  cultural: Brenda is an African-American youth growing up in Newark, New Jersey. Her family’s roots trace back to the Great Migration, and she was raised in a close-knit neighborhood where community churches,
    local festivals, and family gatherings emphasize resilience, education, and cultural pride. She regularly attends church services and takes part in community events that celebrate Black history and
    art, such as Juneteenth parades and museum workshops. The diverse cultural landscape of Newark—including its music scene, food traditions, and vibrant street art—has shaped her taste in R&B and hip-hop
    music and her love for soul cooking. Her parents encourage academic achievement and self-discipline, values that reinforce her structured, goal-oriented approach to life.
