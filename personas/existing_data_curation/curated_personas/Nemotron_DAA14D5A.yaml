  hobbies: '[''LEGO building'', ''Robotics club projects'', ''Reading science fiction & popular science'', ''Soccer'', ''Journaling'', ''Nature photography'', ''Puzzle solving (Sudoku, logic games)'']'
  career_goals: William aspires to become a mechanical engineer or robotics technician, designing functional machines that solve everyday problems. He is also intrigued by environmental engineering and
    hopes to contribute to sustainable technology solutions. He values stable, well‑defined career paths and aims to attend a STEM‑focused high school, followed by a university engineering program where
    he can earn certifications in programming, CAD design, and advanced robotics.
