personas:
  professional: William Owens is an aspiring robotics enthusiast who applies their methodical, organized approach from building LEGO moving models to designing small autonomous vehicles in the school robotics
    club, carefully planning each build step while balancing boundless curiosity with practical problem‑solving.
  sports: William Owens plays forward for the Avon Youth Soccer Club, trains three times a week, follows the New England Revolution with keen enthusiasm, and applies a practical, team‑oriented mindset learned
    from community volunteer drills to stay injury‑free and improve on‑field strategy.
  arts: William Owens immerses themselves in sci‑fi literature by authors such as Isaac Asimov and Arthur C. Clarke, enjoys LEGO artist Nathan Sawaya’s sculptural builds, frequently re‑watches Pixar classics
    like 'Wall‑E' and 'The Iron Giant', and lets these creative influences spark new ideas for their own LEGO and robotics projects.
  travel: William Owens has visited Boston’s Museum of Science and the White Mountains for stargazing, enjoys family road trips to historic New Haven, dreams of touring the Kennedy Space Center in Florida
    to see rocket technology up close, and hopes to join a future exchange program in Tokyo to explore cutting‑edge robotics labs.
  culinary: William Owens favors classic comfort dishes such as macaroni‑and‑cheese and pepperoni pizza, loves experimenting with homemade granola bars that blend oats, honey, and locally sourced apples,
    and often snacks on carrot sticks while building LEGO creations, balancing a love for hearty meals with a budding interest in healthier ingredients.
  core: William Owens is a diligent, curiosity‑driven twelve‑year‑old whose love for LEGO mechanics and robotics is tempered by a habit of worrying, a meticulous allowance‑saving routine, and an occasional
    sweet‑tooth indulgence.
background:
  cultural: William grew up in a suburban New England community in Avon, Connecticut, within a middle‑class white American family that emphasizes education, self‑reliance, and community involvement. The
    region's cultural focus on practicality, modesty, and civic responsibility shapes his outlook. Family traditions include holiday gatherings, participation in local volunteer events, and occasional church
    services, providing a blend of cultural stability and exposure to diverse perspectives throughout Hartford County.
attributes:
  skills: '[''Mathematics (pre-algebra & geometry)'', ''Scientific experimentation'', ''Basic robotics (Arduino, LEGO Mindstorms)'', ''Introductory coding (Scratch, Python basics)'', ''Organizational planning'',
