personas:
  professional: Cecil Yates, a budding robotics hobbyist and digital content creator, channels their curiosity and competitive edge into designing Arduino light displays, building complex LEGO Technic models,
    and editing fast-paced gaming highlight reels for friends, and they relish the instant feedback from online viewers.
  sports: Cecil Yates, a member of the local youth soccer club 'Maple Grove FC' and an avid skatepark regular, follows the MLS team Toronto FC and the NBA's Golden State Warriors, playing pickup basketball
    on weekends while they prioritize the thrill of competition over strict training regimens.
  arts: Cecil Yates, who loves making short video montages set to the beats of Billie Eilish, Lil Nas X, and Ariana Grande, often draws inspiration from YouTuber MrBeast's storytelling style while they
    binge-watch Marvel movies starring Chris Hemsworth.
  travel: Cecil Yates, who has already road-tripped to a nearby amusement park and hopes to attend the Tokyo Game Show in Japan next summer, prefers spontaneous weekend getaways over meticulously planned
    vacations, yet they save their allowance for airline tickets.
  culinary: Cecil Yates, a self-proclaimed snack connoisseur, can whip up a quick ramen bowl with miso paste, soft-boiled egg, and sliced scallions, but their cooking repertoire stops at microwave nachos
    topped with jalapeños and hot sauce, and they often forget to clean up afterward.
  core: Cecil Yates blends a competitive gamer's drive with a tinker's curiosity, juggling LEGO builds, Arduino experiments, and skate tricks while they occasionally neglect homework and forget to stretch.
background:
  cultural: Cecil grew up in Garland, Texas, a diverse suburb of Dallas County, where Southern hospitality and a strong community spirit are common. His family celebrates typical American holidays such
    as Thanksgiving, Fourth of July fireworks, and Halloween, often with backyard barbecues and neighborhood gatherings. The local culture blends Tex‑Mex cuisine, country and pop music, and a love for sports,
    especially football and basketball, which influences his social activities. While his household is primarily white and middle‑class, the multicultural environment of Garland exposes him to a variety
    of perspectives, fostering his curiosity and pragmatic approach to new ideas.
