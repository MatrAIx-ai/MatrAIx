  hobbies: '[''Hiking in Connecticut state parks'', ''Sailing on the Long Island Sound'', ''Landscape photography'', ''Cooking New England seafood dishes'', ''Volunteer financial‑literacy teaching'', ''Reading
    science‑fiction and technology non‑fiction'', ''Playing tennis'', ''Attending community theater'']'
  career_goals: Gocha aims to evolve his practice into a boutique wealth‑management firm that blends traditional advisory services with innovative, technology‑driven solutions like sustainable investing
    and fintech tools. He plans to obtain the Certified Financial Planner (CFP) designation, become a recognized speaker at regional FINRA and Connecticut banking seminars, and mentor emerging advisors.
    Long‑term, he envisions a legacy of financial literacy outreach within his community, launching a nonprofit program that empowers families in Hartford County to achieve economic stability.
