personas:
  professional: Herta Harter, a seasoned CNC machinist with four decades of hands‑on experience, blends meticulous blueprint reading and G‑code programming with a pragmatic curiosity that drives them to
    mentor apprentices, troubleshoot shop‑floor challenges, and prototype parts for local farms while envisioning a community workshop that democratizes modern metal‑working.
  sports: Herta Harter enjoys low‑impact fitness through gardening, Saturday walks along the Cedar County trail, and a friendly senior bowling league at Cedar Creek Lanes, while cheering for the Cedar County
    Rams high school football team and watching Iowa Hawkeyes football broadcasts on Sundays.
  arts: Herta Harter channels their creative side through quilting circles at church, where they stitch patterns inspired by historic novels, and attends local folk‑music gatherings featuring Bob Dylan
    and Emmylou Harris, while also admiring Norman Rockwell paintings displayed at the county museum.
  travel: Herta Harter prefers road‑trip adventures in their lovingly restored 1965 Chevrolet, taking weekend detours to historic river towns like Galena, Illinois, and dreaming of a future pilgrimage to
    the Black Forest region to trace ancestral roots, yet balances these trips with the practical constraints of a modest fixed income.
  culinary: Herta Harter delights in farm‑to‑table cooking, turning garden tomatoes, beans, and carrots into a hearty vegetable stew, perfecting homemade sauerkraut and rye bread, while occasionally burning
    the edges of a favorite apple pie due to an absent‑minded habit of chatting on the phone while checking the oven.
  core: Herta Harter, a talkative, curiosity‑driven CNC veteran who juggles community mentorship, garden‑to‑table meals, and classic‑car restoration, often worries about deadlines yet finds solace in quilting
    and nurturing local ties.
background:
  cultural: Herta was raised in a tight‑knit, white, German‑American family in rural Missouri, where Protestant values of hard work, self‑reliance and community service are deeply ingrained. Growing up
    on a family farm in Cedar County, she learned the importance of practicality and resourcefulness. The local culture emphasizes neighborly support, participation in church and civic events, and a respect
    for skilled trades. These influences shape her work ethic, her sociable nature, and her desire to give back through mentoring and community involvement.
attributes:
  skills: '["Manual milling", "CNC programming (G-code)", "Blueprint reading", "Precision measurement (CMM)", "Tool and die maintenance", "Welding (MIG/TIG)", "Troubleshooting mechanical systems", "Preventive
    maintenance", "Apprentice training", "Quality control and inspection", "Basic CAD design", "Small‑scale 3D printing"]'
  hobbies: '["Gardening", "Quilting", "Classic car restoration", "Cedar County Fair attendance", "Genealogy research", "3D printing as a hobby", "Reading historical fiction", "Participating in church women''s
    group", "Volunteering at local senior center"]'
  career_goals: Although approaching traditional retirement age, Herta aims to transition from daily shop‑floor work to a mentorship and consultancy role. She hopes to earn a certified CNC programmer credential,
    develop a part‑fabrication business serving local farms and small manufacturers, and establish a community workshop where she can teach youth and fellow retirees modern machining and basic metal‑working
    skills. She also wishes to document her decades‑long knowledge in a handbook for the Cedar County trades community.
