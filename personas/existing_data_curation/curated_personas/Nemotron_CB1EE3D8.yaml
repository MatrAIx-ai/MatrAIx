  career_goals: She aims to transition into a senior surveillance analyst role, leading a team that designs innovative security protocols for casino operations. She hopes to mentor younger guards, develop
    a training curriculum that incorporates both technical and creative thinking, and eventually consult for regional security firms on integrating emerging technologies such as AI‑powered video analysis.
    In the longer term, she envisions authoring a guidebook on imaginative approaches to security surveillance and possibly establishing a small consultancy that assists local businesses in creating low‑cost,
    effective monitoring solutions before retirement.
