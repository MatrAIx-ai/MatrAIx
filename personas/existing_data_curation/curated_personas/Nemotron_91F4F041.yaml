  hobbies: '["Gardening (citrus, roses)", "Birdwatching", "Fishing", "Woodworking", "Bridge and card games", "Church socials", "Community theater", "Genealogical research", "Walking and swimming for fitness"]'
  career_goals: Although retired, Steve aims to stay actively engaged by volunteering at the local senior center, leading a weekly gardening club, and contributing oral histories to the Manatee County Historical
    Society. He hopes to author a memoir that captures his life’s lessons, maintain his health through regular walks and swimming, and continue learning about emerging technologies so he can easily stay
    in touch with his grandchildren and support younger community members as a mentor.
