personas:
  professional: Luis Mejia runs a part‑time handyman service in Long Beach, where they apply decades of carpentry, electrical, plumbing, and automotive troubleshooting skills to manage home‑renovation projects
    with tight budgets and strict schedules, while their critical eye and competitive nature push them to out‑perform local contractors.
  sports: Luis Mejia follows both Mexican and American soccer fervently, cheering for Club América and the LA Galaxy while gathering at a local sports bar with friends, they also compete in a senior bowling
    league that meets every Thursday night at the Long Beach Ten Pin Alley and occasionally join a community pick‑up soccer game at the nearby park.
  arts: Luis Mejia immerses themselves in cultural festivals throughout Long Beach, appreciating the vibrant mural work of local artists and the traditional music of mariachi ensembles while also enjoying
    classic rock concerts by The Rolling Stones and art shows featuring Frida Kahlo reproductions, which inspire their own decorative carving projects.
  travel: Luis Mejia prefers meticulously planned road trips along the West Coast, having explored Catalina Island’s marine tours, the historic missions of San Diego, and frequent weekend getaways to Albuquerque
    for its Southwestern art fairs, while they balance travel ambitions with a modest budget and family obligations.
  culinary: Luis Mejia delights in preparing authentic dishes such as mole poblano, carnitas tacos, and chiles en nogada, often incorporating fresh cilantro, oregano, and chilies harvested from their garden,
    they experiment with fusion twists while occasionally over‑indulging in rich sauces that test their cholesterol management.
  core: Luis Mejia blends a carpenter’s precision with a soccer fan’s passion, mentoring younger tradespeople while competitively bowling, cooking feasts, and obsessively tracking tool costs, all underpinned
    by a pragmatic, structured mindset and a tendency to over‑spend on premium wood.
background:
  cultural: Luis grew up in a close‑knit Mexican‑American neighborhood in Long Beach, where family and community ties were central to daily life. His upbringing emphasized hard work, respect for tradition,
    and a strong sense of responsibility toward extended family. Bilingualism shaped his identity, allowing him to navigate both Mexican cultural practices—such as celebrating Día de los Muertos, preparing
    festive tamales, and attending local parades—and mainstream American customs. The vibrant Latino community in Los Angeles County reinforced values of mutual support and cultural pride, which Luis continues
    to express through his participation in cultural festivals, mentoring younger community members, and maintaining traditional cooking and celebratory practices.
