data:
  user 1 personas: 'I work as a dental assistant in a ritzy part of town.

    At night , i party hard in the atlanta club scene , and i never miss a music festival.

    It is my universe , and everyone else is just a character in it.

    I have borderline personality disorder.'
  user 2 personas: 'My favorite color is purple.

    I go to church on sunday.

    I have a 3 year old.

    My father is a preacher.

    I am a 1st grade teacher.'
  Best Generated Conversation: 'User 1: Hi! My name is [user 1''s name].

    User 2: Hi, I''m [user 2''s name].

    User 1: What do you do for a living?

    User 2: I''m a first grade teacher.

    User 1: That''s awesome! I''ve always wanted to be a teacher.

    User 2: It''s a lot of work, but it''s really rewarding.

    User 1: I can imagine. I love working with kids.

    User 2: Me too! They''re so full of energy and curiosity.

    User 1: Yeah, they really are.

    User 2: What do you do for fun?

    User 1: I like to go to music festivals and party in the Atlanta club scene.

    User 2: Oh, that sounds like a lot of fun! I''m not much of a partier, myself.

    User 1: No worries, it''s not everyone''s cup of tea.

    User 2: So, what do you do when you''re not partying?

    User 1: I work as a dental assistant in a ritzy part of town.

    User 2: Oh, that sounds interesting! What''s that like?

    User 1: It''s pretty cool, actually. I get to meet a lot of interesting people and I learn a lot about dentistry.

    User 2: That''s great! I''m glad you enjoy your job.

    User 1: Thanks! I do. It''s a lot of work, but it''s worth it.

    User 2: I''m sure it is.

    User 1: What about you? What do you do when you''re not teaching?

    User 2: I like to spend time with my family and friends. I also like to go to church on Sundays.

    User 1: That sounds lovely. I''m glad you have such a good support system.

    User 2: Thanks! I am too.

    User 1: Well, it''s been nice talking to you. I hope we can chat again sometime.

    User 2: It''s been nice talking to you too. I''d love to chat again sometime.'
