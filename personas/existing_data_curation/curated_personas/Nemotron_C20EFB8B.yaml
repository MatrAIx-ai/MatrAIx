personas:
  professional: Linda Severiano is a veteran carpenter who leverages three decades of custom furniture construction, meticulous blueprint interpretation, and rigorous safety compliance to run a methodical
    workshop, channeling her love of structure and predictability into detailed project plans while mentoring apprentices with a supportive, cooperative spirit despite occasional anxiety-driven perfectionism,
    and they consistently uphold safety standards.
  sports: Linda Severiano enjoys moderate desert hiking with the Sonoran Trail Club, follows the Arizona Cardinals and Phoenix Suns as a fan, and practices low‑impact cardio through weekly yoga sessions
    and bi‑weekly pickleball games at the local community center, blending structured activity with social connection, and they find these routines help mitigate stress.
  arts: Linda Severiano regularly visits Scottsdale’s weekly ArtWalk, where they admire the vibrant canvases of local painter Maya Ruiz and find inspiration in the soulful vocals of Etta James and the folk
    storytelling of Gregory Alan Isakov, letting these artistic experiences inform both their woodworking designs and personal reflections.
  travel: Linda Severiano prefers meticulously planned trips that combine scenic desert exploration with cultural immersion, having trekked the red rocks of Sedona, explored the historic streets of New
    Orleans, and dreaming of a future pilgrimage to Savannah’s historic squares, all while balancing travel costs with their retirement budget, and they cherish each journey as a chance to recharge.
  culinary: Linda Severiano delights in preparing soulful Southern fare such as fried chicken seasoned with smoked paprika, collard greens simmered with ham hocks, and buttery cornbread made with buttermilk
    and fresh honey, showcasing their high cooking skill, and they often over‑season in their enthusiasm to perfect flavor.
  core: Linda Severiano merges disciplined craftsmanship with community mentorship, navigating anxiety through structured routines, while savoring Southern cooking and desert hikes as anchors of their vibrant,
    purpose‑driven life, and they remain ever‑watchful for opportunities to build and inspire.
background:
  cultural: Linda’s cultural identity as a Black woman informs her values of resilience, community, and storytelling. She grew up attending a historically Black church where gospel music and fellowship
    emphasized mutual support. Family traditions of Southern cuisine and oral histories inspire her cooking and her appreciation for handcrafted objects. In her professional life, she navigates a predominantly
    male trade, drawing on a legacy of Black artisans who have historically used woodcraft as both economic empowerment and cultural expression. These influences shape her collaborative approach at work,
    her commitment to mentoring the next generation, and her active participation in local cultural events that celebrate African‑American heritage.
attributes:
  skills: '[''Custom furniture construction'', ''Framing and structural carpentry'', ''Blueprint interpretation'', ''Wood finishing and staining'', ''Tool maintenance and organization'', ''Project planning
    and scheduling'', ''Safety compliance'', ''Mentoring apprentices'']'
  hobbies: '[''Woodworking and carving'', ''Gardening desert succulents'', ''Reading historical fiction'', ''Cooking Southern soul food'', ''Yoga and guided meditation'', ''Church volunteering'', ''Community
    clean‑up events'', ''Hiking in the Sonoran Desert'', ''Attending local art exhibitions'']'
  career_goals: Linda aims to transition from full‑time construction work to a mentorship‑focused role, establishing a community woodworking studio in Scottsdale where she can train emerging carpenters,
    especially women and minorities. She plans to earn a formal certification in advanced carpentry to bolster her credibility and to develop a small line of handcrafted furniture sold online, providing
    a steady supplemental income for retirement. Additionally, she hopes to partner with local non‑profits to contribute her skills to affordable housing projects, combining her desire for structured work
    with a commitment to community harmony.
