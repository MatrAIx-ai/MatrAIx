  career_goals: Although retired from the formal workforce, Luis aims to channel his expertise into mentorship programs for Latino entrepreneurs and volunteer as a financial advisor for non‑profit organizations
    in Austin. He also aspires to co‑found a community‑focused social enterprise that provides micro‑loans and business training to underserved populations. Additionally, he seeks to author a guidebook
    on sustainable small‑business practices, sharing his blend of curiosity and practicality with a wider audience.
