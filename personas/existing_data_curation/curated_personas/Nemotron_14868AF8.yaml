personas:
  professional: Luis Cuyun is a retired strategic planning veteran who now mentors budding entrepreneurs, translating complex data into practical action plans while leveraging bilingual communication and
    a compassionate, community‑first mindset to bridge diverse stakeholder groups.
  sports: Luis Cuyun is an avid hiker of the Texas Hill Country, a seasonally enthusiastic supporter of Austin FC soccer and the Texas Longhorns football team, and a regular participant in community‑run
    walking groups that satisfy their energetic, sociable spirit.
  arts: Luis Cuyun regularly joins salsa nights at a downtown cultural center, enjoys listening to live mariachi sessions featuring violinist José Alberto, and attends Austin City Limits concerts, especially
    those by Carlos Santana, weaving their love of music and communal celebration into a vibrant artistic life.
  travel: Luis Cuyun favors immersive trips that blend family gatherings for Día de los Muertos in Oaxaca with heritage road‑trips to historic sites like the Alamo and the National Park Service’s San Antonio
    Missions, planning most journeys months ahead yet staying flexible for spontaneous local festivals.
  culinary: Luis Cuyun, an advanced home cook, lovingly prepares mole poblano with roasted chilies, achiote‑infused chicken tacos, and fresh guacamole enriched with ripe avocados and lime, while delighting
    in occasional indulgence of churros dusted with cinnamon sugar, reflecting a balanced palate and cultural pride.
  core: Luis Cuyun blends curiosity with practicality, turning community compassion into purposeful action while embracing lively traditions, disciplined finances, and a steady, energetic outlook on life.
background:
  cultural: Luis grew up in a bicultural Mexican‑American household, celebrating traditions such as Día de los Muertos, quinceañeras, and Mexican Independence Day while also embracing Texan customs. Fluent
    in Spanish and English, he carries forward a strong sense of familismo and respeto, which inform his compassionate approach to community work. His residence in Austin allows him to blend his Mexican
    heritage with the city’s vibrant multicultural scene, fostering connections across Latino, Southwestern, and broader American cultures.
