personas:
  professional: Tracy Hatten, a seasoned front‑of‑house specialist with razor‑quick order recall and a warm, attentive demeanor, blends meticulous service management with a curiosity for art—leveraging
    their organizational skillset and people‑first approach to mentor staff while plotting a path to shift supervision and, eventually, a café that doubles as a community art hub.
  sports: Tracy Hatten, a modestly active Charlotte resident, follows the Charlotte Hornets and Carolina Panthers with passionate game‑day rituals, spends Saturday mornings jogging through Freedom Park,
    participates in a local weekend cycling club, and practices gentle yoga to counterbalance long hours on their feet, though they often skip the optional spin class when a new gallery opening calls.
  arts: Tracy Hatten, an eager explorer of Charlotte’s burgeoning art scene, frequents the Mint Museum and pop‑up murals by local artist Alexia Zuniga, sketches urban landscapes in a leather‑bound sketchbook,
    captures street art through monochrome photography, draws inspiration from Yayoi Kusama’s installations and the music of Nick Drake, and channels that energy into a monthly free art‑craft workshop for
    children.
  travel: Tracy Hatten, an art‑driven traveler, has plotted weekend pilgrimages to Asheville’s River Arts District, a solo month‑long immersion in Santa Fe’s art markets, a dreamy visit to the Venice Biennale,
    and a nostalgic road‑trip along the Blue Ridge Parkway, yet they balance these wanderlust bursts with a tight budget, usually booking boutique B&Bs that favor quiet over crowds.
  culinary: Tracy Hatten, an inventive home cook with a modest herb garden, delights in creating rosemary‑infused lamb stew, pan‑seared salmon with dill and lemon zest, and a vibrant beet‑and‑goat‑cheese
    salad topped with fresh basil, while experimenting with fermented kimchi and occasionally over‑seasoning dishes when excitement gets the best of them.
  core: Tracy Hatten merges meticulous hospitality expertise with a quiet passion for art, saving diligently for a community café while nurturing a habit of sketching urban murals and occasionally over‑watering
    their herb garden.
background:
  cultural: Tracy is a white American raised in the suburban South of North Carolina. Her upbringing emphasized Southern hospitality, a strong work ethic, and community involvement, often centered around
    church gatherings and local festivals. Though she left high school early, she values self-directed learning and remains connected to her roots through family ties and regional traditions like comfort
    cooking and outdoor recreation. Living in Charlotte’s diverse urban environment has broadened her outlook, exposing her to a mix of Southern heritage and contemporary multicultural influences.
attributes:
  skills: '[''Customer Service'', ''Order Accuracy'', ''Cash Handling'', ''Food Safety Knowledge'', ''POS System Proficiency'', ''Conflict Resolution'', ''Team Coordination'', ''Basic Wine & Beer Knowledge'']'
  hobbies: '[''Visiting Art Galleries'', ''Sketching'', ''Photography'', ''Reading Art History'', ''Cooking Experimental Recipes'', ''Gardening'', ''Attending Small Live Music Shows'', ''Volunteer Art Workshops'']'
  career_goals: Tracy aims to advance from a server to a shift supervisor or floor manager within the next two years, gaining formal leadership experience and pursuing a GED to qualify for hospitality-management
    courses at a local community college. Long-term, she envisions opening a small café that doubles as a community art space where local artists can showcase work and host workshops, merging her love of
    service with her passion for the arts.
