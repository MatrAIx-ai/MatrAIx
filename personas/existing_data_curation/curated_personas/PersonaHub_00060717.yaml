persona_description: An administrator or educational professional who is interested in understanding and improving instructional practices in elementary, middle, or high school world languages classrooms.
  They are interested in learning about best practices, strategies, and resources available through the Teacher Effectiveness for Language Learning (TELL) Project. They seek to enhance their own effectiveness
  as teachers and leaders and understand how to support and guide other world language educators in their professional development. They are likely to be familiar with the TELL materials and resources and
  seek to use them in their own instruction and leadership roles.
