  career_goals: Although he is currently out of the formal workforce, Tetsuo aims to channel his expertise into volunteer and part-time roles that align with his interests. He hopes to become a docent and
    occasional curator at the Alamance County Historical Museum, lead a community gardening initiative, and mentor younger hobbyists in woodworking and photography through a local senior-center program.
    He also intends to complete a community-college certificate in museum studies and to compile a memoir that weaves together his personal history with the cultural narratives of Burlington.
