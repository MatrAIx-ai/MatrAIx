personas:
  professional: Tetsuo Mcwilliams, an aspiring volunteer docent and community event planner, leverages their woodworking, gardening, and photography expertise to curate local historical artifacts and mentor
    seniors, applying a methodical, competitive mindset to ensure meticulous project execution.
  sports: Tetsuo Mcwilliams enjoys low‑intensity weekend cycling on the Neuse River Trail, follows the Durham Bulls baseball season religiously, attends occasional Charlotte Hornets games, and participates
    in the Burlington Senior Walking Club, approaching fitness as a disciplined yet leisurely pursuit.
  arts: Tetsuo Mcwilliams frequents intimate gallery openings in the Durham Art District, collects prints by Edward Hopper and watercolors by Andrew Wyeth, curates personal exhibitions of historic Durham
    architecture photographs, and finds inspiration in the works of local plein‑air painter Linda Inglis, weaving visual art into daily life.
  travel: Tetsuo Mcwilliams prefers meticulously planned road trips to the Blue Ridge Parkway in autumn, weekend stays at a B&B in Asheville, seasonal visits to the Outer Banks for sunrise photography,
    and harbors a long‑standing wish to explore Japan’s historic gardens, all while balancing a modest travel budget.
  culinary: Tetsuo Mcwilliams, an enthusiastic home cook, harvests heirloom tomatoes, sweet corn, and herbs from their garden to whip up roasted vegetable medleys, Southern‑style collard greens spiced with
    smoked ham hocks, and occasionally indulges in making shrimp‑and‑grits with fresh grits and smoked paprika, though they sometimes over‑salt the greens.
  core: Tetsuo Mcwilliams balances a solitary, detail‑driven life with bursts of competitive zeal, from model ship contests to curating museum displays, all while guarding a skeptical streak that fuels
    both meticulous planning and occasional distrust of group projects.
background:
  cultural: Tetsuo is a white Southern American raised in the modest suburbs of Burlington, North Carolina. His upbringing was shaped by traditional Southern values, a close-knit Protestant church community,
    and a strong work ethic associated with the region's agricultural and manufacturing heritage. He grew up with a respect for local folk art, country music, and regional cuisine, while also developing
    an appreciation for broader artistic movements through high school art classes and community workshops. This blend of modest Southern roots and an open curiosity toward new ideas informs his worldview
    and personal pursuits.
