personas:
  professional: An organized preschooler named Diane Tompkins builds elaborate Lego structures, demonstrating early architectural thinking, meticulous planning, and a strong desire for order and achievement.
  sports: A budding soccer enthusiast named Diane Tompkins plays in the local "Tiny Tykes" soccer league, prefers structured drills over chaotic free play, and cheers for the nearby professional baseball
    team, the St. Louis Cardinals, while also attending gymnastics class on Saturdays.
  arts: A budding artist named Diane Tompkins loves finger painting bright suns, listening to the whimsical songs of "The Little Mermaid" soundtrack—especially Ariel’s "Part of Your World"—and also enjoys
    the animated works of Pixar and the colorful illustrations of Dr. Seuss.
  travel: A curious explorer named Diane Tompkins loves visiting the local zoo, remembers a family road‑trip to the Grand Canyon, dreams of a future visit to Disneyland Paris, and prefers well‑planned itineraries
    with clear schedules and frequent snack breaks.
  culinary: A tiny chef in training named Diane Tompkins prefers classic mac and cheese, crunchy carrot sticks, and sliced strawberries, enjoys helping stir pancake batter, and can name the ingredients
    of a simple veggie wrap, reflecting a love for predictable, comforting flavors.
  core: Diane Tompkins, a four‑year‑old with a love for order, compassion, and tiny adventures, balances meticulous routines with gentle kindness, often organizing crayons by color while sharing snacks
    with friends.
background:
  cultural: Diane is a White child raised in Tucson, Arizona, a region known for its desert landscape and blend of Southwestern and Mexican cultural influences. Her family participates in local community
    events such as Fourth of July parades and Dia de los Muertos festivities, exposing her to a mix of American and Hispanic traditions. The warm climate encourages outdoor activities like hiking and gardening,
    which she enjoys with her family. Growing up in a middle‑class suburban setting, she benefits from early childhood programs that emphasize routine, organization, and social cooperation.
