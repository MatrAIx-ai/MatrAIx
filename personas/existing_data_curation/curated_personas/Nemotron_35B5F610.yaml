  career_goals: Approaching retirement, David aims to transition from full‑time labor to running his own small painting contracting business that targets high‑end residential remodels in the Lakewood and
    broader Los Angeles area. He plans to obtain Certified Lead‑Safe Painter credentials, expand his client base through referrals, and develop a structured apprenticeship program to mentor the next generation
    of skilled tradespeople. His long‑term ambition is to build a reputation as the most reliable and detail‑oriented painter in his community, achieve financial security for his family, and eventually
    step back into a supervisory and consulting role while maintaining a modest hands‑on presence on select projects.
