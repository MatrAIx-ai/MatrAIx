persona_description: A zoologist and evolutionary ecologist at Stellenbosch University who specializes in the study of pollinators and their interactions with plants. His research focuses on the adaptation
  and evolution of pollinators to their flowers, particularly the Rediviva bee species and snapdragons. He is known for his work on the family tree of Rediviva species and the role of pollinators in generating
  and maintaining plant diversity.
