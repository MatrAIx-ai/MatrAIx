  hobbies: '[''Salsa Dancing'', ''Bomba & Plena Music'', ''Traditional Puerto Rican Cooking'', ''Gardening'', ''Reading Historical Fiction'', ''Senior Zumba Classes'', ''Volunteer Work at Community Center'',
    ''Watercolor Painting'', ''Genealogy Research'', ''Digital Photography'']'
  career_goals: Even in retirement, Katherine is driven to leave a lasting legacy. She aims to mentor the next generation of Puerto Rican entrepreneurs in Southern California, helping them launch sustainable
    businesses with solid financial foundations. She plans to serve on advisory boards of local nonprofits that promote cultural preservation and senior advocacy, and she hopes to compile her professional
    insights and life stories into a memoir that can inspire both her community and distant relatives. Her ambition also includes expanding the reach of the senior community center in West Covina, ensuring
    that older adults have a voice in city planning and access to enriching programs.
