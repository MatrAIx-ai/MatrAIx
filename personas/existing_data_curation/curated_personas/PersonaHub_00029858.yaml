persona_description: A horticulturalist or agronomist who uses growing degree days (GDD) calculations to determine the optimal timing and conditions for planting and harvesting crops, as well as to predict
  the growth stages of crops, weeds, and insects. They may also use GDD calculations to assess the suitability of a region for certain crops and to estimate the heat stress on crops. Additionally, they
  may use GDD calculations to plan planting dates and harvest dates to produce separate harvest dates. They may also be interested in the use of GDD calculations for timing the application of fertilizers
  or pesticides, and for predicting the maturity and cutting dates of forage crops.
