persona_description: Ania Wrona, a graduate student at the University of North Texas, who is studying the genetic structure and mating systems of suburban Red-shouldered Hawks, using molecular markers on
  blood samples acquired from adults and nestlings. Her research aims to gain a better understanding of the species' mating systems, breeding density, adult body size, and the number of young, and to determine
  the frequency of extra-pair paternity in Red-shouldered Hawks. Her study is crucial for ensuring the population's ability to persist as humans continue to change the habitat around them.
