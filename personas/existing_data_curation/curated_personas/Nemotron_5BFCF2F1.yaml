personas:
  professional: Gary La, a 36-year-old line cook in a bustling regional restaurant, melds solid classic techniques with a relentless curiosity for wild, locally sourced ingredients, using their precise
    knife work, competitive edge and skeptical eye for suppliers to lead a tight-knit team while balancing practicality with creative menu experimentation.
  sports: Gary La bolts on daily jogs across the prairie, cycles the bike trails on weekends, and regularly watches the Oklahoma City Energy soccer club and the University of Oklahoma Sooners football,
    sometimes organizing informal bike rides with the kitchen crew after service.
  arts: Gary La joins drumming circles at community powwows, captures the vivid colors of their dishes with a Nikon Z6, and draws creative rhythm from folk musicians such as Bob Dylan and modern instrumentalists
    like R. Carlos Nakai, letting the beats guide their plating cadence.
  travel: Gary La favors road-tripping adventures that blend hunting, foraging, and food photography, having trekked through the Arkansas Ozarks, the Flint Hills of Kansas, and dreaming of a culinary pilgrimage
    to Oaxaca, Mexico to study regional corn varieties, all while balancing a modest travel budget and family duties.
  culinary: Gary La delights in creating dishes like pan-seared duck breast with sautéed morel mushrooms and spruce-tip pesto, smoked river trout over cornmeal dumplings, and herb-crusted rabbit topped
    with sagebrush slaw, favoring wild herbs such as lamb's quarters and wild thyme, and they meticulously score each plate on a personal 1-10 scale before service.
  core: Gary La is a competitive, curiosity-driven line cook who fuses classic techniques with wild, locally foraged flavors, balancing a pragmatic budget mindset with a love for drumming, photography,
    and the open outdoors.
background:
  cultural: Gary identifies as a member of the Shawnee Nation, with family roots extending into the neighboring Pottawatomie community. Growing up in Shawnee, Oklahoma, he was immersed in a culture that
    places great importance on communal meals, stewardship of the land, and the transmission of traditional recipes from generation to generation. His grandparents taught him the preparation of staple dishes
    such as hominy, succotash, and smoked river fish, emphasizing the use of locally gathered corn, beans, squash, and wild herbs. Gary continues to observe tribal protocols around food, such as offering
    gratitude to the earth before cooking and sharing the harvest with elders and neighbors. He speaks some Shawnee language, which he incorporates into cooking instruction for youth, and he participates
    in cultural events that celebrate tribal identity through music, dance, and food. This cultural foundation informs his culinary style, driving him to blend time‑honored Indigenous flavors with contemporary
    techniques while honoring the values of community, respect for nature, and resilience.
