  hobbies: '[''Recipe experimentation'',''Foraging and harvesting wild edibles'',''Hunting and fishing'',''Participating in powwows and tribal drumming'',''Food photography'',''Reading food science and
    Indigenous culinary history'',''Woodworking'',''Community cooking workshops'',''Jogging and cycling'']'
  career_goals: Gary aims to advance from his current role as line cook to kitchen manager within the next two years, using his practical experience to oversee menu planning and staff training. He plans
    to enroll in a culinary certificate program to formalize his knowledge of modern techniques and food science. Ultimately, Gary envisions opening a restaurant that showcases a contemporary reinterpretation
    of Shawnee and Pottawatomie culinary heritage, offering dishes that blend traditional ingredients like wild corn and river fish with modern plating. He also hopes to earn recognition in regional cooking
    competitions, leveraging his competitive nature to bring visibility to Indigenous cuisine. In parallel, Gary wants to develop community cooking workshops that teach younger tribal members about both
    traditional and modern cooking methods, preserving cultural food practices while fostering new talent.
