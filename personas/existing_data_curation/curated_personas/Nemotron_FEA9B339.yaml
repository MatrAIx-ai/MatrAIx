  hobbies: '[''Reading adventure and nature books'', ''Drawing marine life'', ''LEGO building'', ''Exploring tide pools'', ''Nature journaling'', ''Family board games'', ''School science club'', ''Educational
    puzzle apps'']'
  career_goals: Anita dreams of becoming a marine biologist who studies and protects the tide pools and coastal wildlife around Newport. She also imagines writing children’s books that inspire curiosity
    and kindness. Balancing her love for discovery with a practical desire to help others, she aspires to volunteer in community clean‑up projects and, someday, become a teacher who fosters a supportive
    classroom environment.
