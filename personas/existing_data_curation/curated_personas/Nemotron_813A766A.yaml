  career_goals: As he approaches retirement, Sang aims to transition into a mentorship role, serving as a part‑time instructional coach for new teachers in Shelby County. He hopes to develop a district‑wide
    STEM enrichment program that incorporates hands‑on robotics and coding clubs for elementary students, and to author a practical guide on integrating culturally responsive teaching strategies into science
    lessons. Additionally, he is interested in volunteering with local community centers to run after‑school tutoring sessions and to preserve his family’s cultural heritage through informal education.
