personas:
  professional: Sang Vo, a veteran elementary and middle school STEM educator in Finchville, Kentucky, leverages three decades of classroom experience to design hands‑on experiments, integrate interactive
    whiteboards and coding platforms, mentor novice teachers, and craft a district‑wide robotics enrichment program with a calm, structured approach that balances practical realism and cultural responsiveness.
  sports: Sang Vo, an early‑morning fisherman at Lake Cumberland, also follows the Kentucky Wildcats basketball team and the Cincinnati Reds baseball club, participates in a local chess club on weekends,
    and prefers low‑impact activities like gentle walks along the lake trail that complement their reflective temperament.
  arts: Sang Vo spends Saturdays practicing brush calligraphy, attends folk‑storytelling evenings at the Finchville community center featuring local legends, and enjoys listening to Itzhak Perlman’s violin
    recordings, finding that these artistic pursuits enrich their classroom storytelling and provide a calm creative outlet.
  travel: Sang Vo favors low‑stress, well‑planned trips that blend natural scenery and heritage, such as a recent autumn road trip through the Shenandoah Valley and a planned pilgrimage to the ancestral
    village in Guangdong province for the Mid‑Autumn Festival, while keeping travel budgets modest and itineraries flexible.
  culinary: Sang Vo delights in cooking bok choy stir‑fry with garlic, handmade mooncakes filled with lotus‑seed paste, and Southern‑style collard greens, often using fresh tomatoes from their garden and
    sharing meals with family and friends as a way to celebrate both cultural and regional flavors.
  core: Sang Vo merges decades of STEM teaching with quiet garden rituals, calligraphic art, and steadfast cultural stewardship, navigating retirement with a structured yet adaptable mindset that balances
    practicality and tradition.
background:
  cultural: Sang’s family originates from the Guangdong province of China, and he grew up bilingual in Mandarin and English. His upbringing emphasized respect for elders, communal responsibility, and a
    strong work ethic, values he carries into his teaching. He celebrates Lunar New Year and the Mid‑Autumn Festival with his family, preparing traditional dishes and sharing cultural stories with his students
    to broaden their worldviews. Living in Finchville, Kentucky, he blends his heritage with Southern hospitality, often incorporating folk tales and local history into his lessons while maintaining a commitment
    to cultural preservation and intercultural dialogue.
