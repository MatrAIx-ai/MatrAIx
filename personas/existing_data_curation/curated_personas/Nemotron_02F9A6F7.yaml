personas:
  professional: Carmelina Marichal, a civil engineer specializing in structural design, blends meticulous AutoCAD, Revit, and GIS workflows with data‑driven Python scripts to deliver sustainable public
    infrastructure, while keeping a schedule‑centric, detail‑oriented approach that reflects their preference for structure and readiness to assertively lead multidisciplinary teams toward resilient transportation
    projects.
  sports: Carmelina Marichal, an avid trail‑hiker and member of the Austin Trail Runners club, completes weekly 10‑mile hikes in the Hill Country, attends yoga classes for flexibility, cheerfully roots
    for Austin FC and the Texas Longhorns, and incorporates strength training at a local CrossFit box to balance endurance with resilience.
  arts: Carmelina Marichal, an architectural photographer who captures Hill Country vistas through a blend of technical precision and artistic flair, draws creative energy from indie acts like Khruangbin
    and Tame Impala, frequently discusses the narrative layers of Gabriel García Márquez and the structural elegance of Zaha Hadid at their book club, and curates a personal gallery that interweaves engineering
    perspective with visual storytelling.
  travel: Carmelina Marichal, a methodical planner, favors road‑trip itineraries that merge hiking challenges with cultural immersion—having trekked the Grand Canyon’s North Rim, explored the vineyards
    of Mendoza, and budgeted for a future trek to Patagonia’s Torres del Paine—while reserving flexibility for spontaneous indie gigs in each destination.
  culinary: Carmelina Marichal, a competent home chef, reimagines classic mole poblano with smoked chipotle and quinoa, crafts tacos al pastor using fire‑roasted tomatillos, cilantro, and heirloom corn,
    experiments with sous‑vide pork carnitas, and hosts dinner gatherings where these dishes pair with craft brews from Austin’s microbreweries, all while meticulously logging recipes in a digital notebook.
  core: Carmelina Marichal, a structure‑obsessed civil engineer who balances meticulous spreadsheets, sunrise hikes, and nightly photo edits, fuels their days with espresso, occasional coffee‑shop linger‑overs,
    and a habit of cataloging every trail vista as if it were a load‑bearing diagram.
background:
  cultural: Carmelina is a first-generation Mexican-American who grew up in a bilingual household, fluent in both Spanish and English. Family traditions such as Dia de los Muertos celebrations and weekly
    Sunday meals have instilled a strong sense of familismo and cultural pride. Living in Austin's vibrant multicultural scene, she actively participates in local Mexican cultural festivals, volunteers
    with community organizations that support recent immigrants, and incorporates Mexican culinary techniques into her cooking. Her heritage informs her collaborative approach and her dedication to building
    inclusive, resilient infrastructure for diverse communities.
attributes:
  skills: '[''Structural analysis'', ''Concrete and steel design'', ''AutoCAD Civil 3D'', ''Revit BIM modeling'', ''GIS mapping'', ''Construction cost estimating'', ''Risk assessment'', ''Project management'',
    ''Sustainable design'', ''Building code compliance'', ''Python for data analysis'', ''Team collaboration'']'
  hobbies: '[''Hill Country hiking'', ''Architectural photography'', ''Cooking Mexican cuisine'', ''Yoga'', ''Book club participation'', ''STEM mentorship for high school girls'', ''Jigsaw puzzles'', ''Attending
    indie music concerts'']'
  career_goals: She aims to obtain her Professional Engineer (PE) license within the next two years and transition into senior project management, leading large-scale transportation or urban development
    projects that incorporate resilient and sustainable design. Carmelina aspires to influence municipal infrastructure policy in Austin, championing climate-responsive solutions for flood mitigation. In
    the longer term, she envisions launching a consultancy focused on sustainable community-centered construction, while mentoring underrepresented women in engineering.
