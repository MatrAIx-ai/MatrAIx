  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Live music and dancing'', ''Hiking'', ''Experimental home cooking'', ''Street and nature photography'', ''Co-ed softball'', ''Volunteering
    at food bank'', ''Reading contemporary fiction'', ''Attending open mic nights'']'
  career_goals: Carolyn aims to transition from dishwasher to line cook within the next two years, leveraging her associate's degree in Culinary Arts. She aspires to become a sous chef and eventually a
    restaurant manager, with a long‑term vision of opening a small café that doubles as a local art gallery where she can showcase her own artwork and host community events. To solidify her managerial skills,
    she plans to pursue a bachelor's degree in Hospitality Management. Financial stability and a supportive work environment are key goals, as they would help reduce her chronic worry and provide the flexibility
    she values.
