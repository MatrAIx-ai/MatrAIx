persona_description: A Ford engineer who specializes in developing innovative in-car health and wellness solutions. They have expertise in heart rate monitoring technology and are working with experts from
  Rheinisch-Westfalische Technische Hochschule (RWTH) Aachen University to develop a seat that can monitor a driver's heartbeat. Their research aims to provide real-time health information and alerts of
  imminent cardiovascular issues, and the seat sensor technology under development could initially be of most benefit to drivers known to have heart conditions primarily those in more mature age groups.
