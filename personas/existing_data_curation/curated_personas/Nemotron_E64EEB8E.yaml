  hobbies: '[''playing video games'', ''building and repairing small electronics'', ''fishing'', ''hiking on local trails'', ''listening to country and classic rock music'', ''reading science‑fiction novels'',
    ''volunteering at the community center'', ''participating in church youth activities'']'
  career_goals: Bounyong aims to obtain a GED and then enroll in a vocational program, ideally an automotive technology or electrical apprenticeship, where he can combine his mechanical curiosity with practical
    expertise. He hopes to secure a stable trade job that supports his family and eventually open a small, community‑focused repair shop. Long‑term, he envisions contributing to local infrastructure projects
    or mentoring younger teens in hands‑on skills through a youth workshop.
