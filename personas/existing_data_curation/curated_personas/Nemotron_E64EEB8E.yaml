personas:
  professional: Bounyong Heredia, a 17‑year‑old aspiring automotive and electrical apprentice, merges their hands‑on curiosity for gadgets with disciplined organization to excel at bike and small‑engine
    repairs, while their cooperative nature makes them a dependable teammate in community projects and school group assignments.
  sports: Bounyong Heredia, a member of their town’s 4‑H hiking and fishing crew, spends weekends casting lines along the nearby creek, trails the local forest paths on their mountain bike, and avidly supports
    the Kentucky Wildcats basketball team while occasionally joining the high‑school cross‑country practice for endurance.
  arts: Bounyong Heredia, who fills their evenings with classic rock legends like Led Zeppelin and country icons such as Dolly Parton, devours sci‑fi epics like Dune and Ender’s Game, and occasionally volunteers
    at the community center’s weekend theater performances, finds inspiration for their tinkering in the storytelling of their favorite authors.
  travel: Bounyong Heredia, who plans their adventures on a shoestring budget, has explored the Appalachian trails of the Great Smoky Mountains, taken a weekend road trip to Nashville’s music scene, and
    dreams of driving to Detroit’s Henry Ford Museum to see classic car restorations, all while balancing family responsibilities and schoolwork.
  culinary: Bounyong Heredia, an adept home‑cook who can whip up fried catfish, buttery biscuits, and a solid barbecue rib rub, enjoys pairing their meals with sweet tea and often experiments with grilling
    the trout they catch on their fishing trips, though they sometimes burn the toast when distracted by a game.
  core: Bounyong Heredia, a 17‑year‑old tinkering enthusiast who balances solitary creek fishing with a community‑first mindset, often forgets to do their laundry but never skips a chance to fix a broken
    gadget for a friend.
background:
  cultural: Bounyong grew up in Richmond, KY, a small town in Madison County with deep Appalachian and Southern roots. His family traditions emphasize community, self‑reliance, and a strong work ethic typical
    of rural Kentucky. Church attendance and local events are central to his social life, reflecting the region's values of hospitality and mutual support. While identifying as white American, he draws
    on the local cultural mix of agricultural heritage, southern folklore, and contemporary influences from media and technology.
