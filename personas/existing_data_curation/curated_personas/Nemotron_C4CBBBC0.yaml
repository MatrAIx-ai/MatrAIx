personas:
  professional: Johnny Everhart, a 15‑year‑old high‑school sophomore with a penchant for routine and hands‑on problem solving, channels their methodical mindset into the school robotics club where they
    design, program, and lead simple mechanical projects while also mentoring younger peers in building tailored solutions.
  sports: Johnny Everhart, an energetic teen who thrives on familiar routines, spends afternoons playing pickup basketball with the local park’s junior league, regularly practices skateboarding at the community
    skate park, volunteers as an assistant coach for the youth soccer league, and proudly roots for the Chicago Bulls while also cheering on their hometown high‑school basketball team.
  arts: Johnny Everhart, a creative builder at heart, spends weekends assembling intricate LEGO sets and model car kits while also enjoying the kinetic art of Nathan Sawaya and listening to bands like Imagine
    Dragons and Twenty One Pilots, finding inspiration that informs their design aesthetics in robotics.
  travel: Johnny Everhart prefers structured, short trips that fit into their school schedule, such as weekend road trips to the nearby national park for hiking, annual visits to the FIRST Robotics competition
    in Chicago, and dreams of a future cultural immersion in Japan to explore cutting‑edge technology and traditional tea ceremonies.
  culinary: Johnny Everhart, a practical eater with a fondness for comfort foods, often chooses pepperoni pizza, chicken nuggets, and homemade nachos for quick meals, can whip up a simple spaghetti Bolognese
    on their own, and reserves weekend experiments for building custom granola bars with oats, honey, and dried cranberries.
  core: Johnny Everhart blends methodical planning and a love for group activities, channeling their energy into robotics, basketball, and community service while constantly battling an undercurrent of
    worry that fuels their meticulous habits.
background:
  cultural: 'Johnny is a white, Southern‑California teen from a middle‑class, multi‑generational family rooted in the Inland Empire. He grew up in a suburban neighborhood of San Bernardino, attending the
    local public middle school and participating in community events typical of the region: Fourth of July fireworks, local high‑school football games, and church youth programs. His family’s values emphasize
    hard work, responsibility, and practical achievement, reflecting mainstream American cultural norms with a modest, pragmatic outlook. While he is exposed to the diverse cultural mosaic of the area,
    his household culture remains primarily Anglo‑American.'
