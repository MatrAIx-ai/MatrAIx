  career_goals: He wants a career that offers a clear routine, public service, and tangible results. His long‑term ambition is to join the San Bernardino Police Department or become a firefighter, which
    combines his desire to help the community with a structured, disciplined environment. In the meantime, he plans to earn his GED, enroll in a youth apprenticeship program in automotive technology, and
    eventually attend a police academy. He also hopes to obtain a certification in emergency medical response, giving him options in both law‑enforcement and fire service.
