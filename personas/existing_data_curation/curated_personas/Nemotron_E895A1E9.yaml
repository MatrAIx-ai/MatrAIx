  career_goals: Shawn aims to enroll in a community‑college program in hospitality and event management while earning a digital‑marketing certification. Within the next five years he hopes to secure a role
    as a community event coordinator for the Jackson Parish Cultural Center, where he can blend his love of art, music, and local traditions. Long‑term, he envisions launching a coworking and creative hub
    in Jonesboro that hosts art exhibitions, workshops, and live performances, while also offering freelance digital‑marketing services to small businesses in rural Louisiana. He is driven to become a recognized
    local influencer who promotes the region’s unique culture and attracts visitors to its festivals and natural attractions.
