personas:
  professional: Shawn Pawa is a community‑event coordinator‑in‑training who leverages their natural charisma, methodical budgeting skills, hands‑on carpentry experience, and persuasive sales techniques
    to design and run town fairs, festivals, and school fundraisers while simultaneously managing social‑media promotion for local businesses, and they thrive on being the lively center of attention at
    every planning meeting.
  sports: Shawn Pawa is an avid pickup basketball player at the local high‑school gym, a dedicated fan of the New Orleans Saints, the LSU Tigers football team, and the New Orleans Pelicans, and they also
    belong to the Jonesboro Fishing Club where weekend lake outings provide a low‑key fitness alternative and a chance to unwind.
  arts: Shawn Pawa is a freelance photographer, sketch artist, and occasional community‑theater performer who draws inspiration from blues legend B.B. King, zydeco group BeauSoleil, and country star Garth
    Brooks, curating Instagram showcases of bayou landscapes and historic architecture that attract a steady local following and fuel their curiosity for unconventional artistic expression.
  travel: Shawn Pawa prefers road‑trip adventures that blend natural scenery and cultural immersion, having explored the historic streets of Natchitoches, the swamps of Atchafalaya, and the live‑music venues
    of Austin, Texas, while dreaming of future weekend getaways to Montreal's jazz festivals and the turquoise beaches of Tulum, Mexico, and they meticulously plan each itinerary using travel forums and
    budgeting spreadsheets.
  culinary: Shawn Pawa enjoys cooking hearty Southern dishes like gumbo with Andouille sausage, okra, and a dark roux, as well as jambalaya spiced with cayenne, thyme, and fresh crawfish tails, and they
    often experiment with new ingredients while occasionally indulging in a greasy po'boy from a local deli as a quick lunch.
  core: Shawn Pawa is a charismatic, methodical 23‑year‑old who juggles community event planning, social‑media marketing, and bayou‑inspired art, all while balancing a tight budget, occasional allergy flare‑ups,
    and a love for basketball, fishing, and zydeco beats.
background:
  cultural: Shawn grew up in Jonesboro, a small, predominantly white town in Jackson Parish, northern Louisiana. His family belonged to the middle‑class working‑class, with his father employed in construction
    and his mother working as a school secretary. The community is centered around Southern hospitality, Baptist church gatherings, and local traditions like high‑school football, outdoor hunting, and fishing.
    While the area is primarily Southern in culture, proximity to Cajun regions has introduced him to zydeco music, Creole cuisine, and a blend of English and French linguistic influences, though he speaks
    only English fluently. Church and school events fostered a strong sense of community service and organized, methodical thinking. This cultural backdrop nurtured his appreciation for art, music, and
    varied experiences while grounding him in practical, reliable values.
attributes:
  skills: '["interpersonal communication", "event planning", "social media marketing", "public speaking", "basic carpentry", "budget management", "photography", "digital content creation", "team coordination",
