persona_description: A teacher or educational professional who is interested in implementing Universal Design for Learning principles in their teaching methods. They are also interested in learning how
  to design learning materials that can be used by a range of learners, including those with complex communication needs and learning profiles. They are likely to have experience with differentiated instruction
  and are familiar with the concept of universal design for learning. They may be looking for resources and information on how to implement these principles in their teaching, such as the Universal Design
  for Learning Module 8 handout.
