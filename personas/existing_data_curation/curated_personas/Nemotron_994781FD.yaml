  career_goals: Sang Ye aspires to become a senior project manager or principal engineer at a leading infrastructure firm in the Bay Area, overseeing large-scale sustainable urban projects such as transit-oriented
    developments and climate-resilient infrastructure. He plans to obtain his Professional Engineer (PE) license and Project Management Professional (PMP) certification within the next two years. He aims
    to integrate smart city technologies into civil projects, mentor junior engineers from underrepresented backgrounds, and eventually launch his own consultancy that bridges business strategy with engineering
    solutions. Additionally, he seeks to become a recognized speaker at industry conferences and contribute to policy discussions on sustainable city planning.
