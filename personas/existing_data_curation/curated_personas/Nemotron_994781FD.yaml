personas:
  professional: Sang Win, a 33‑year‑old senior civil engineer in the Bay Area, leverages their structural design expertise in AutoCAD, Revit, SAP2000, and ETABS alongside PMP‑level project management skills,
    using their talkative, collaborative nature to unite multidisciplinary teams while assertively navigating stakeholder negotiations and integrating sustainable, LEED‑focused solutions.
  sports: Sang Win cycles the Golden Gate Bridge with the San Francisco Cycling Club, competes in weekly badminton matches at the Chinatown Badminton Center, practices Taekwondo at a local martial arts
    academy, and fervently supports the Golden State Warriors and San Francisco Giants while balancing weekend hikes in the Marin Headlands to maintain a well‑rounded fitness routine.
  arts: Sang Win pursues urban photography inspired by Ansel Adams and Zaha Hadid, relaxes to the indie sounds of Mitski and the groove of Tame Impala, attends live comedy shows at the Punch Line, and occasionally
    participates in community theater workshops to explore performance art.
  travel: Sang Win blends meticulously planned weekend escapes to Yosemite with spontaneous trips to Tokyo for street‑food festivals, favors off‑peak travel to stretch a modest budget, and keeps a bucket
    list that includes the ancient temples of Bagan and the futuristic skyline of Singapore.
  culinary: Sang Win loves preparing aromatic mohinga with fish broth, ginger, lemongrass, and rice noodles, experiments with fusion tacos that blend gochujang‑marinated tofu and traditional Burmese spices,
    and routinely tops dishes with fresh basil, cilantro, and a squeeze of lime.
  core: Sang Win merges relentless curiosity with pragmatic leadership, thrives on late‑night hackathons and spontaneous bike rides, obsessively tracks emerging tech trends while forgetting to water houseplants,
    and transforms every social gathering into a brainstorming session.
background:
  cultural: Sang Ye Win is a first-generation East Asian American, with family roots in Myanmar and Korea. Growing up in a bicultural household, he was taught the values of hard work, respect for community,
    and the importance of education. His parents emphasized a balance between preserving cultural traditions—such as celebrating traditional festivals, cooking family recipes, and practicing martial arts—and
    adapting to American society. This dual perspective informs his professional approach, blending Eastern collectivist sensibilities with Western pragmatic problem‑solving. He remains active in the local
    Burmese and Korean diaspora communities, participating in cultural events, language exchange groups, and mentorship programs that support other immigrants pursuing STEM careers. His cultural background
    enhances his ability to navigate diverse stakeholder groups and bring a collaborative, inclusive mindset to his engineering projects.
