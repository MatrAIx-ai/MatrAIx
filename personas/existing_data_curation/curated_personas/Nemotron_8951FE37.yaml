  career_goals: George aims to pursue a bachelor’s degree in visual communication, user experience design, or integrated marketing at a university that encourages interdisciplinary study. He envisions building
    a career that fuses his creative talents with his strategic mindset, targeting roles such as UX/UI designer, brand strategist, or creative director within an advertising agency or tech startup. In the
    medium term, he plans to secure internships that allow him to lead design projects and refine his leadership abilities. Ultimately, he aspires to launch his own boutique creative studio that offers
    branding, digital content, and community‑focused art initiatives, and to contribute to Tulsa’s cultural scene by curating local art events that blend innovation with community engagement.
