    ''Bash scripting'', ''Backup and disaster‑recovery planning'', ''Technical documentation'', ''Mentoring and knowledge transfer'']'
  hobbies: '[''Reading historical non‑fiction'', ''Classic literature'', ''Woodworking'', ''Gardening'', ''Model train building'', ''Chess'', ''Hiking'', ''Fishing'', ''Photography'', ''Birdwatching'',
    ''Listening to jazz'', ''Writing memoirs'']'
  career_goals: William’s primary ambition is to transition into a part‑time consulting practice focused on network security and resilience for small businesses in Warren County, allowing him to maintain
    a steady income while reducing daily stress. He plans to earn the CISSP certification within the next year to formalize his security expertise and to deepen his credibility with clients. He also aims
    to create a comprehensive knowledge‑base for his current employer, ensuring a smooth handover before retirement. Mentoring younger technicians is a personal priority; he hopes to lead a small, tightly‑run
    team that values data‑driven decision making. Additionally, he aspires to author a guide that blends technical best practices with insights on clear communication, drawing on his humanities education.
