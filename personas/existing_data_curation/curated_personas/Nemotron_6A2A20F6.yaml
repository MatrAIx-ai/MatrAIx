  career_goals: In retirement, Mercedes aims to leverage her business acumen by mentoring emerging Salvadoran entrepreneurs in Little Rock, offering pro‑bono financial advisory services at the community
    center. She aspires to write a memoir that captures the immigrant experience of her generation and to organize an annual multicultural art showcase that blends Latin American and Mid‑Southern artists,
    fostering unconventional creative dialogue. Maintaining her health and emotional well‑being through regular yoga, mindfulness meditation, and journaling is also a core personal ambition.
