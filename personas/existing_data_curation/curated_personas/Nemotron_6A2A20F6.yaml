personas:
  professional: Mercedes Jimenez, a retired regional manager of a family‑owned import‑export firm, now channels their methodical budgeting, cash‑flow analysis, and conflict‑resolution expertise into mentoring
    emerging entrepreneurs in Little Rock, curating a multicultural art showcase, and offering pro‑bono financial advisory at the community center, all while balancing their reserved nature with a proactive,
    organized approach to supporting others.
  sports: Mercedes Jimenez, an ardent supporter of the Arkansas Razorbacks football and basketball teams, joins a local senior walking club for weekly hikes in Pinnacle Mountain State Park, practices gentle
    yoga three times a week to keep their joints nimble, and occasionally plays petanque at the senior center, blending low‑impact activity with community spirit.
  arts: Mercedes Jimenez, whose watercolor canvases echo the vivid stalls of market scenes and whose evenings are filled with folk recordings by Los Kjarkas and marimba performances of Marco Antonio Muñiz,
    regularly curates mini‑exhibitions featuring works by Frida Kahlo and Diego Rivera at Little Rock galleries, and draws inspiration from the storytelling of actress Dolores del Río.
  travel: Mercedes Jimenez, preferring meticulously planned road trips over spontaneous cruises, has explored the natural beauty of Arkansas’ Hot Springs National Park, revisited their hometown roots with
    a cultural tour of Antigua, Guatemala, and dreams of tasting the culinary scene of Oaxaca, Mexico, while balancing travel costs with a modest retirement budget.
  culinary: Mercedes Jimenez, a proficient home cook who blends tradition with garden freshness, regularly prepares pupusas stuffed with cheese and loroco, yuca con chicharrón with crisp pork rind, and
    a seasonal salad of heirloom tomatoes and basil from their vegetable garden, while occasionally indulging in a slice of homemade tres leches cake for family gatherings.
  core: Mercedes Jimenez, a curious yet cautious 69‑year‑old who balances a disciplined financial mind with a love for watercolor art, gentle yoga, and community mentorship, often worries about the future
    but finds solace in journaling, garden harvests, and the rhythmic sway of marimba music.
background:
  cultural: Mercedes was born in San Salvador and immigrated to the United States in her early twenties. She retains a deep connection to her Salvadoran heritage, speaking Spanish at home and celebrating
    holidays such as Semana Santa, Día de los Fieles Difuntos, and the annual Fiesta de la Palma. Her Catholic faith and close‑knit family network have shaped values of community, hospitality, and resilience.
    In Little Rock, she blends Salvadoran customs with local traditions, sharing homemade tamales at church gatherings, leading a bilingual cultural course at the public library, and participating in the
    city’s multicultural festivals, thereby acting as a cultural bridge between her roots and her adopted community.
