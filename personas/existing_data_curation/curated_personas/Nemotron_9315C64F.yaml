  hobbies: '[''singing'', ''dancing'', ''pretend play with dolls'', ''drawing'', ''block building'', ''listening to storybooks'', ''visiting the park'']'
  career_goals: Although only three, Manisha already expresses a vivid imagination about the future. She loves storytime and often says she wants to "be a teacher who reads to kids" or "sing on a stage,"
    reflecting her desire to share stories and music with others. Her ambition is to keep learning, making friends, and someday guide younger children in the same joyful way she experiences now.
