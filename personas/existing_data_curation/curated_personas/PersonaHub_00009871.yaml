persona_description: A professional engineer with expertise in hydrology, specifically in the field of hydraulic analysis and energy dissipation. This individual has extensive knowledge of the design and
  implementation of ski-jump energy dissipators for large dams, and is well-versed in the detailed design of downstream plunge pools to ensure the structural integrity of the permanent works during major
  floods. They have a deep understanding of the necessary documentation and guidelines for both conceptual and detailed design, as well as the dimensioning of the downstream plunge pools. This persona is
  highly skilled in the use of hydraulic analysis tools and software, and is adept at creating comprehensive and definitive guidelines for the safe and effective use of ski-jump energy dissipators in large
  dams.
