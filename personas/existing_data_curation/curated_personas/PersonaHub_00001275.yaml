persona_description: A scientist and engineer who specializes in the development and application of magnetohydrodynamic (MHD) propulsion systems, including beam-powered propulsion. They are known for their
  work on the Lightcraft concept, a hypersonic aircraft that combines MHD active flow control and beam-powered propulsion mechanisms. The persona is also interested in the development of non-rocket spacelaunch
  technologies and has experience in laser aerospike and PDE testing in the hypersonic wind tunnel. They have published research on MHD propulsion by absorption of laser radiation and have worked with companies
  like Lightcraft Technologies, Inc.
