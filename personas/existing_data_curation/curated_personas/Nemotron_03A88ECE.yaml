personas:
  professional: Austin Fewox, a full-stack web developer proficient in Python, JavaScript, and Java, leverages cloud‑native tools on AWS and a flair for creative coding to design visually striking applications
    while leading small agile teams with a calm, detail‑oriented demeanor.
  sports: Austin Fewox supports the Fargo‑Moorhead RedHawks and the Minnesota Vikings, runs with the Maple River Trail Running Club on weekend mornings, and joins the Fargo City Hoops crew for casual basketball
    games at the local community center.
  arts: Austin Fewox draws inspiration from the generative visuals of Joshua Davis, the immersive light installations of James Turrell, and the indie rock sounds of The National, regularly attending intimate
    shows at the Fargo Theatre and contributing digital paintings to the downtown art co‑op.
  travel: Austin Fewox prefers meticulously planned road trips, having captured sunrise over the Red River Valley, trekked the fjords of Norway, explored Reykjavik’s street art scene, and now dreams of
    a spring sojourn to Kyoto’s cherry blossoms while budgeting each adventure in a shared spreadsheet.
  culinary: Austin Fewox loves experimenting with global flavors, routinely cooking miso‑marinated salmon with sumac‑spiced quinoa, hand‑rolled ramen topped with fermented kimchi, and a side of harissa‑glazed
    carrots while sharpening knife skills on a Japanese santoku.
  core: Austin Fewox merges technical precision with artistic curiosity, balancing a solitary yet community‑oriented life through code, canvas, and curated experiences.
background:
  cultural: Austin grew up in West Fargo, a small Midwestern city in North Dakota with a strong sense of community and a heritage rooted in German and Scandinavian settlement. His family has lived in the
    area for several generations, and the region’s values of self‑reliance, modesty, and hard work have shaped his worldview. The wide open plains, harsh winters, and close‑knit neighborhoods of Cass County
    fostered an appreciation for simplicity, outdoor recreation, and local traditions such as the Fargo‑Dakota State Fair, hayrides, and community volunteerism. While the cultural environment leans toward
    conservatism, Austin’s curiosity has led him to seek out diverse artistic and intellectual experiences, blending the pragmatic Midwestern ethos with an openness to new ideas.
