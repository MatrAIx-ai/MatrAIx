  hobbies: '[''Digital painting (Processing, p5.js)'', ''Generative art'', ''Landscape photography'', ''Hiking'', ''Indie music concerts'', ''Science‑fiction reading'', ''Board‑game nights'', ''Experimental
    cooking'', ''Mentoring high‑school coders'', ''Attending local art co‑op events'']'
  career_goals: Austin aims to progress from a mid‑level developer to a senior software engineer and eventually a technical lead who can steer projects that fuse technology with artistic expression. Over
    the next three years he plans to obtain an AWS Solutions Architect certification, deepen his expertise in creative coding, and mentor junior developers in his current team. He envisions contributing
    to open‑source libraries that enable interactive visual art, and building a small boutique studio that creates immersive installations for community spaces, galleries, and regional festivals in the
    Upper Midwest. While he is open to a short‑term relocation to a larger tech hub such as Minneapolis or Seattle to accelerate his growth, he intends to maintain strong ties to West Fargo and give back
    through local tech meet‑ups and school outreach programs.
