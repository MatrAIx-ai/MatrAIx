  career_goals: Harry dreams of turning his curiosity and practical skills into a career that blends engineering with community needs. In the near term, he plans to join his high school’s robotics and engineering
    clubs, attend a summer STEM camp, and earn a varsity soccer scholarship. Over the long term, he hopes to study mechanical engineering at a university, focusing on designing efficient farm equipment
    or renewable‑energy devices that could benefit the rural region of Lancaster County. He also imagines one day leading a team of innovators, using his competitive drive and organizational instincts to
    bring new ideas to life.
