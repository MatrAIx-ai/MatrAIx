personas:
  professional: Regla Poggi, an emerging multimedia visual artist at South Bend High School, blends drawing, mixed‑media collage, and street‑level photography into experimental projects for the school art
    club while also contributing set designs for the community theater, leveraging their curiosity and collaborative spirit to push unconventional creative boundaries.
  sports: Regla Poggi, a spirited member of the South Bend Youth Soccer League’s co‑ed team and a regular attendee of Saturday hip‑hop dance classes at Silver Steps Dance Studio, channels their sociable
    energy into team drills and choreography while cheering on the South Bend Cubs minor‑league baseball team and the Chicago Bulls, often swapping game highlights with friends after practice.
  arts: Regla Poggi, a dedicated participant in the school art club, draws inspiration from Frida Kahlo’s vibrant self‑portraits, incorporates the abstract textures of Yayoi Kusama’s installations into
    their collages, and curates playlists featuring Phoebe Bridgers and Jack Johnson while playing ukulele, all of which shape their weekend visits to the South Bend Civic Theater’s productions of 'The
    Music Man' and 'A Midsummer Night’s Dream.'
  travel: Regla Poggi, an enthusiastic weekend explorer, loves day‑tripping to the Indiana Dunes for sunrise photography, has taken a family road‑trip to Chicago’s Millennium Park to sketch the 'Cloud Gate,'
    dreams of a spring backpacking adventure through the Appalachian Trail’s Shenandoah segment, and meticulously plans each outing on a shared Google Sheet, though they sometimes abandon the itinerary
    to chase unexpected street‑art murals in small towns.
  culinary: Regla Poggi, a budding home cook, favors avocado toast topped with radish slices, crafts spontaneous chickpea‑tahini wraps spiced with jalapeño and cilantro, enjoys the occasional cheesy pepperoni
    pizza from the local pizzeria 'Mazzoni’s,' and quizzes friends on the perfect ratio of soy sauce to mirin for Japanese stir‑fry, yet often binge‑eats sugary cereal straight from the box as a late‑night
    study snack.
  core: Regla Poggi, a curiosity‑driven teen artist who balances collaborative projects with spontaneous splurges on craft supplies, navigates mild skin issues with diligent care, and fuels their social
    energy through soccer, dance, and ukulele jam sessions, all while dreaming of capturing the world through both lens and sketchbook.
background:
  cultural: Regla comes from a white, likely Italian-American family in South Bend, Indiana. Her upbringing reflects Midwestern small-town values of community, family gatherings, and Catholic traditions.
    She grew up attending local festivals, helping with church activities, and enjoying family meals centered around Italian dishes like pasta and homemade biscotti. The blend of Italian heritage and the
    diverse cultural fabric of South Bend — including exposure to art programs at the Studebaker National Museum and community murals — has shaped her appreciation for both traditional and contemporary
    artistic expressions.
