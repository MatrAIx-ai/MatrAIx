  career_goals: Regla aims to combine her love for art with her desire to help others. In the short term, she plans to complete high school with a strong portfolio, take advanced art classes, and volunteer
    as a peer mentor in community art programs. She hopes to attend a visual-arts or art-therapy program in college, eventually becoming an art therapist or community arts coordinator who designs workshops
    that use creative expression to support mental health and foster social cohesion.
