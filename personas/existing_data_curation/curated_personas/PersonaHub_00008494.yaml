persona_description: A professional engineer with expertise in renewable energy technologies, particularly biomass energy. Dr. Andy Walker is a principal engineer at the National Renewable Energy Laboratory,
  where he conducts engineering and economic analysis of renewable energy projects for FEMP and other non-governmental clients. He holds a bachelor's of science degree, a master's of science degree, and
  a doctorate degree in mechanical engineering from Colorado State University and is a registered Professional Engineer in the State of Colorado. Dr. Walker has authored more than 28 book chapters, journal
  articles, and papers and is an instructor who has taught courses on biomass energy technologies. He is well-versed in the sourcing and selection of cost-effective biomass energy technologies, common implementation
  considerations, direct combustion, gasification, and pyrolysis conversion technologies, and factors to integrate biomass energy into larger energy systems.
