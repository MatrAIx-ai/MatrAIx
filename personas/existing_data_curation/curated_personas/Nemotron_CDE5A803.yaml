personas:
  professional: Drew Oliva is a hands‑on home repair specialist‑in‑training who uses his meticulous woodworking, basic plumbing and electrical skills, and systematic computer troubleshooting to deliver
    reliable, schedule‑driven services to Cherokee County homeowners, while also developing an online shop for custom wooden furniture.
  sports: Drew Oliva enjoys weekend fishing trips on Lake Allatoona, hikes the Appalachian foothills, supports the Gwinnett Stripers baseball team, and participates in a local senior bowling league, preferring
    low‑impact, scheduled activity over high‑intensity sports.
  arts: Drew Oliva immerses himself in historical non‑fiction by authors like David McCullough, listens to classic country and folk legends such as Johnny Cash and Dolly Parton, builds model trains for
    quiet enjoyment, and occasionally volunteers to construct sets for the community theater, finding creative fulfillment in structured, detail‑oriented pursuits.
  travel: Drew Oliva favors well‑planned road trips to nearby destinations like Asheville, NC and Savannah, GA, enjoys staying at family‑run B&Bs, balances adventure with a need for predictable itineraries,
    and dreams of a future weekend getaway to the Great Smoky Mountains for a weekend of hiking and fishing.
  culinary: Drew Oliva prefers Southern BBQ flavors, frequently grills ribs, smoked brisket, and peach cobbler using garden‑grown herbs, is adept at maintaining a smoker but often over‑seasones his dishes,
    and values sharing hearty meals at neighborhood potlucks.
  core: Drew Oliva blends Southern steady pragmatism with a meticulous, project‑oriented mind, finding comfort in structured hobbies while quietly battling a habit of over‑ordering supplies and a calm resolve
    to turn solitary craftsmanship into community service.
background:
  cultural: 'Drew grew up in a middle‑class family in the suburban environs of Woodstock, Georgia, a community that blends Southern traditions with a modern small‑town vibe. His upbringing was shaped by
    the values of self‑reliance, modesty, and a strong work ethic often associated with the region, as well as a respect for community and hospitality. Although he identifies as white, his cultural identity
    is rooted in the local customs of Southern Georgia: participation in neighborhood gatherings, appreciation for regional cuisine such as BBQ and peach dishes, and occasional attendance at church events
    that emphasize service and fellowship. His education at a nearby community college exposed him to a diverse peer group, fostering an appreciation for practical learning and collaborative problem‑solving.
    These influences inform his balanced outlook, blending traditional Southern steadiness with a pragmatic, forward‑looking mindset.'
attributes:
  skills: '[''Carpentry and woodworking'', ''General home maintenance'', ''Computer hardware troubleshooting'', ''Basic network configuration'', ''Data entry and spreadsheet management'', ''Project planning
    and scheduling'', ''Gardening and plant care'', ''Automotive basic maintenance'', ''Personal budgeting and finance management'']'
  hobbies: '[''Woodworking'', ''Fishing'', ''Hiking'', ''Reading historical non‑fiction'', ''Gardening'', ''Model train building'', ''Volunteer work at community garden'', ''Chess and puzzle solving'']'
  career_goals: Drew aims to achieve certification as a home repair specialist (e.g., NCCER or Home Advisor certified), enabling him to launch a small, reliable home maintenance service in Cherokee County.
    Alternatively, he is considering a transition into entry‑level IT support, where his systematic troubleshooting style can thrive. To support these ambitions, he plans to complete his associate degree
    in business administration at a local community college, focusing on project management and financial planning. Drew also hopes to develop a modest, structured side venture by selling handcrafted wooden
    items through an online marketplace, providing predictable income while aligning with his hands‑on interests. Throughout, he seeks roles that offer clear responsibilities, routine workflows, and the
    opportunity to apply his practical expertise in a calm, resilient manner.
