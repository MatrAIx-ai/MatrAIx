personas:
  professional: Jennifer Long, a budding architect of cardboard forts, demonstrates early spatial reasoning and a curiosity for unconventional designs by meticulously stacking blocks and adjusting layouts
    on the fly, and they balance a love of organization with fluid improvisation.
  sports: Jennifer Long, an enthusiastic playground regular, enjoys weekly parent-child soccer sessions with the Tiny Tacklers club, cheers for the Seattle Seahawks on a child-sized jersey, and they mix
    bursts of climbing and swing time with occasional nap intervals to maintain balanced energy.
  arts: Jennifer Long, a budding art explorer, loves finger-painting vivid swirls while listening to The Wiggles and watching Pixar’s Toy Story on weekend family movie nights, and they absorb these creative
    influences to fuel imaginative play and storytelling.
  travel: Jennifer Long, a mini explorer, enjoys short family road trips to nearby Grandma's countryside farm and the sunny beaches of San Diego, yet they also day-dream about future visits to Disneyland
    and Paris, preferring relaxed stroller-friendly itineraries over hectic tours.
  culinary: Jennifer Long, a picky but curious eater, adores smooth banana puree, soft cheese sticks, and chicken nuggets with a side of sweet potato fries, and they happily help stir oatmeal with a plastic
    spoon while rejecting mixed-texture foods like peas and carrots.
  core: Jennifer Long is a curious two-year-old who blends artistic fascination with flexible organization, balances chatty social moments with solo discovery, embraces playful saving habits, and they navigate
    tiny health hurdles with resilient spirit.
background:
  cultural: Jennifer is raised in a white family in the small community of Rogue River, Oregon. Her upbringing blends a quiet, rural lifestyle with a strong appreciation for the outdoors, local arts festivals,
    and community gatherings. Family traditions include weekend hikes along the river, attendance at local craft fairs, and participation in seasonal celebrations that emphasize environmental stewardship
    and creative expression. The cultural milieu values self‑reliance, respect for nature, and a supportive community atmosphere.
