persona_description: Brenda Brodie, a Durham community leader and founder of South Eastern Efforts Developing Sustainable Spaces (SEEDS), a non-profit organization that promotes community gardening and
  sustainable living in Northeast Central Durham. Brenda's vision of transforming neighborhoods and lives through gardening led to the co-founding of SEEDS with Annice Kenan in 1994. SEEDS has grown and
  developed over the years to meet the changing needs of the community, adding programs for children and youth and collaborating with the Latino community to host events. Brenda's dedication to the organization
  and her efforts to empower communities through gardening have made her an influential figure in the Durham community.
