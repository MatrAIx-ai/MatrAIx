  hobbies: '[''Watercolor painting'', ''Photography'', ''Digital illustration'', ''Reading science-fiction and non-fiction'', ''Solo hiking'', ''Yoga'', ''Puzzles (Sudoku, crosswords)'', ''Experimental
    cooking'', ''Playing piano'', ''Visiting art galleries'']'
  career_goals: Patricia aims to obtain her CPA license within the next two years and advance to a senior auditor role at a Big Four firm. She aspires to lead audit teams, integrate data‑analytics tools
    to modernize audit processes, and eventually specialize in forensic accounting. Long‑term, she envisions a transition into a finance leadership position, such as CFO, at a technology‑focused company,
    where she can combine her analytical expertise with her appreciation for creative problem‑solving.
