personas:
  professional: Patricia Whitted is a detail‑oriented accounting analyst who leverages GAAP expertise, SAP and Oracle Financials, and advanced Python‑driven data analytics to streamline audit processes,
    all while preparing for the CPA exam and aiming to lead forensic audit teams at a Big Four firm.
  sports: Patricia Whitted prefers solitary fitness, hiking local trails with the Sunset Hiking Club, follows the LA Lakers, LA Dodgers, and occasionally attends LA Galaxy matches, practices yoga at a downtown
    studio, and joins a weekend beach‑volleyball pick‑up at Venice Beach.
  arts: Patricia Whitted spends evenings painting watercolors of the Pacific coastline, curating digital illustrations inspired by the surrealist works of Salvador Dalí, capturing quiet sunrise shots in
    the style of Ansel Adams, practicing piano pieces by Debussy, and drawing creative inspiration from contemporary musicians like Björk and visual artists such as James Turrell.
  travel: Patricia Whitted favors solo, low‑key trips that blend nature and technology, having hiked the Pacific Crest Trail’s SoCal sections, explored the neon streets of Tokyo for inspiration, dreamed
    of photographing the aurora borealis over Iceland’s Vatnajökull glacier, and routinely plans weekend getaways to Joshua Tree using a meticulously drafted spreadsheet itinerary that balances flight costs
    and time off.
  culinary: Patricia Whitted enjoys experimental cooking at home, crafting dishes like miso‑glazed salmon with black garlic, saffron‑infused risotto topped with toasted hazelnuts, and vegan kimchi‑topped
    gnocchi, while sourcing ingredients such as quinoa, tempeh, and matcha powder from local farmers’ markets and pairing meals with a curated playlist of ambient instrumental music.
  core: Patricia Whitted is a quiet‑minded accountant‑analyst who blends analytical rigor with artistic curiosity, solves Sudoku while waiting for coffee, hoards obscure watercolor pigments, and constantly
    wrestles with the need for solitude versus the occasional urge to network.
background:
  cultural: Patricia was raised in a middle‑class, predominantly white family in La Mirada, Orange County. Her ancestry includes Irish and German roots, and family traditions emphasize education, hard work,
    and community service, often through church volunteer activities. Growing up in Southern California exposed her to a diverse cultural landscape, fostering an appreciation for multicultural arts and
    ideas while maintaining the values of her suburban upbringing. She celebrates holidays such as Thanksgiving and St. Patrick’s Day, and embraces the region’s blend of suburban tranquility and artistic
    vibrancy.
