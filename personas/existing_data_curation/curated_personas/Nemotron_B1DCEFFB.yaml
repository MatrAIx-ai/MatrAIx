  career_goals: At 84, Theresa aims to channel her competitive drive into legacy‑building projects. She plans to mentor emerging developers, especially women and seniors, through a community coding club
    in Fountain Hills. She is developing an open‑source application that helps widowed seniors manage health appointments and stay socially connected. Theresa also intends to author a memoir chronicling
    her journey from self‑taught programmer in the early computer era to a respected mentor, and to deliver guest lectures at regional tech meetups and senior centers, leaving a lasting impact on both the
    tech community and her local cultural scene.
