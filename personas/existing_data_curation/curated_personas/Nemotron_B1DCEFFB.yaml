personas:
  professional: Theresa Mccoy is a veteran full‑stack software developer who seamlessly blends legacy COBOL and Fortran expertise with modern Python, Java, and JavaScript, applies rigorous design patterns
    and Agile Scrum leadership to build accessible, data‑driven applications, and channels her competitive drive into mentoring senior and female coders through a community coding club and an open‑source
    health‑appointment app.
  sports: Theresa Mccoy prefers low‑impact fitness like weekly hikes on the nearby Sonoran Trail and participates in a senior walking group that roots for the Arizona Diamondbacks while she tunes into Phoenix
    Suns games for seasonal basketball excitement, often timing her steps to beat her personal best.
  arts: Theresa Mccoy frequents the Phoenix Art Museum and the Scottsdale Museum of Contemporary Art to admire southwestern contemporary artists such as James Turrell and Ed Mell, paints delicate watercolor
    desert horizons on evenings at home, and enjoys community theater productions featuring performances by local talents like Tim Blake Nelson, fitting these outings into her carefully organized weekly
    schedule.
  travel: Theresa Mccoy favors relaxed road trips to desert gems like Saguaro National Park, Sedona’s red rock vistas, and the historic town of Santa Fe, plans itineraries with meticulous checklists, travels
    in a small group of senior friends, and balances her wanderlust with a modest travel budget that prioritizes cultural festivals over luxury lodging.
  culinary: Theresa Mccoy delights in cooking succulent‑focused dishes such as roasted cactus paddles with chipotle glaze and prickly pear margaritas, enjoys simple homemade chicken tortilla soup, but admits
    to a quirky habit of over‑seasoning with dried oregano, and treats herself to weekly visits to a local coffee shop where she savors a dark roast pour‑over.
  core: Theresa Mccoy blends razor‑sharp technical discipline with a lifelong curiosity for art and nature, channeling her competitive spirit into mentoring seniors while balancing a disciplined budget,
    health routines, and a penchant for restoring vintage computers.
background:
  cultural: Theresa grew up in a mid‑20th‑century white American middle‑class family in the Midwest, where values of hard work, self‑reliance, and community service were emphasized. Her high‑school education
    laid the foundation, but her curiosity drove her to self‑teach programming during the early days of computing. In the 1970s she relocated to Arizona, drawn by the desert’s open spaces and emerging tech
    opportunities. Her cultural identity blends traditional American values with a deep appreciation for the Southwest’s native art, desert ecology, and inclusive community initiatives. This background
    informs her disciplined work ethic, love of varied experiences, and commitment to mentoring the next generation.
