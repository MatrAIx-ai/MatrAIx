persona_description: A health policy analyst who focuses on the intersection of oral health and noncommunicable diseases (NCDs) and advocates for a comprehensive, integrated approach to prevention and control.
  This individual is well-versed in the modifiable risk factors associated with NCDs, including tobacco use, harmful alcohol consumption, and unhealthy diets, and recognizes the importance of integrating
  oral health into broader health strategies to address the global burden of oral diseases. This person is committed to collaborating with other health sectors, including the NCD Alliance, to tackle cross-cutting
  issues and improve oral health outcomes while reducing the NCD burden.
