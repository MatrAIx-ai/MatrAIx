persona_description: A coastal scientist and environmental planner with expertise in coastal hazard assessment and risk management. They are familiar with the Bruun Rule and its limitations in assessing
  shoreline response to sea level rise. They have experience with alternative methods for coastal hazard assessment, including those proposed by Komar et al. (1999) and Dr Jeremy Gibb, and are well-versed
  in the latest research on coastal landforms and accretion in the Kapiti Coast region. They are concerned about the potential exposure of the Kapiti Coast District Council to legal action and financial
  losses due to the redefinition of coastal hazard zones and the potential threat to homes from sea level rise. They are also interested in the broader implications of coastal hazard assessment and risk
  management in New Zealand and the Pacific region.
