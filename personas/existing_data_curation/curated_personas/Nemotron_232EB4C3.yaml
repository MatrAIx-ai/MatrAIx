  hobbies: '[''Hiking in the Finger Lakes region'', ''Cycling along the Erie Canal trail'', ''Playing strategy and RPG video games'', ''Reading technology news and sci‑tech magazines'', ''DIY woodworking'',
    ''Photography (urban and nature)'', ''Volunteering at local food bank'', ''Community clean‑up events'']'
  career_goals: Allen aims to progress within the retail sector by moving into supervisory roles. Over the next three to five years, he plans to secure a shift supervisor position and then advance to a
    store manager role, leveraging his practical experience and growing interest in business operations. To support this, he intends to enroll in a Business Administration associate degree at Onondaga Community
    College and complete certifications such as the Retail Management Certificate offered by the National Retail Federation. He also seeks to develop expertise in omnichannel retail, integrating online
    sales with in‑store experiences, and hopes to eventually lead a team that implements innovative merchandising strategies while maintaining operational efficiency.
