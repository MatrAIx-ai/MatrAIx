personas:
  professional: Nancy Cummings is a budding junior inventor and coder who merges love for elaborate LEGO builds with Scratch programming, guiding Girl Scouts badge projects and orchestrating group build
    sessions, channeling her curiosity-practical mindset into hands-on problem solving while they ask friends for immediate feedback.
  sports: Nancy Cummings is an energetic midfielder for the Wasatch Valley Youth Soccer League, loves weekend tag games, hikes the nearby foothills with the local Bountiful Trail Club, rides a mountain
    bike on the Jordan River Parkway, and cheers passionately for Real Salt Lake during MLS broadcasts, and they often rally teammates during practice.
  arts: Nancy Cummings is a creative LEGO architect and cartoonist who draws daily strips inspired by Bill Watterson's Calvin and Hobbes, builds Minecraft worlds reminiscent of Percy Jackson mythic settings,
    and sings along to Kidz Bop pop hits while crafting, blending imaginative storytelling with hands-on artistry, and they often share their comic strips with friends.
  travel: Nancy Cummings favours spontaneous weekend road trips, has explored Yellowstone National Park and the Great Salt Lake with her family, dreams of a school field-trip to the Grand Canyon, and prefers
    the freedom of improvising picnic stops over rigid itineraries, and they enjoy spontaneous detours along the way.
  culinary: Nancy Cummings is a budding kitchen helper who loves assembling taco towers with seasoned beef, shredded cheese and fresh salsa, mixes fruit kebabs with yogurt for snack time, experiments with
    edible slime using gelatin and fruit juice, yet often leaves kitchen counters a mess before cleaning up, and they sometimes forget to wash the dishes afterward.
  core: Nancy Cummings, a ten-year-old whirlwind of curiosity and chill confidence, merges building, coding and outdoor adventure into a collaborative playground that they rarely let worry creep into.
background:
  cultural: Nancy grew up in Pleasant Grove, Utah, a suburban part of Utah County known for its tight‑knit community and love of the outdoors. As a white American family, her household celebrates typical
    American holidays—Thanksgiving, Christmas, Independence Day—and participates in local community events like county fairs and volunteer clean‑up days. The region’s cultural emphasis on family, service,
    and outdoor recreation has encouraged Nancy’s involvement in group activities, church youth groups, and nature outings. English is her primary language, and she has been exposed to the values of perseverance,
    modesty, and community spirit common in her area.
