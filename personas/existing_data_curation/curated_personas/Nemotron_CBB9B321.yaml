  career_goals: Although still in elementary school, Nancy dreams of a future where she can blend her love for animals, nature, and building things. She imagines becoming a wildlife veterinarian who helps
    rescue local wildlife, or an environmental engineer designing sustainable playgrounds and community gardens. She also sees herself as a teacher or community leader who can inspire other kids to explore
    science while working together on projects.
