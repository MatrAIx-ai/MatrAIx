  career_goals: Cheyenne aims to move from a general operations manager to a regional Director of Operations within the next five years, leveraging her competitive drive to lead larger, multi‑site teams.
    She plans to earn a Six Sigma Black Belt and complete a part‑time MBA to deepen her strategic planning skills. Long‑term, she envisions founding a consulting firm that helps small manufacturers in rural
    Kentucky improve efficiency and adopt sustainable practices, while also establishing a mentorship program for aspiring female leaders in the region.
