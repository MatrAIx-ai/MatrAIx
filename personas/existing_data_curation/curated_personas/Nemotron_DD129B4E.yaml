personas:
  professional: Cheyenne Lafayette, a 41‑year‑old operations manager, blends Lean‑Six Sigma expertise with a sociable, competitive edge, and they use strong conflict‑mediation and public‑speaking to keep
    multi‑site teams aligned while allowing flexible scheduling when the production floor demands it.
  sports: Cheyenne Lafayette plays on a local women’s softball league, logs weekly 5K runs with friends, cheers for the Kentucky Wildcats basketball team and the Louisville Cardinals football squad, and
    they mix competitive training with a relaxed approach to weekend pick‑up games at the community park.
  arts: Cheyenne Lafayette enjoys live country shows featuring Garth Brooks and Dolly Parton, curates playlists that also include emerging bluegrass artist Sierra Hull, and they host movie nights showcasing
    classic Southern dramas like ‘Coal Miner’s Daughter,’ reflecting a love for both tradition and fresh talent.
  travel: Cheyenne Lafayette prefers short, purposeful road trips—like a weekend drive to Mammoth Cave for a guided tour followed by a family dinner in Nashville—while dreaming of a longer cultural immersion
    in Savannah’s historic district, and they balance budget‑conscious planning with a craving for Southern‑flavored experiences.
  culinary: Cheyenne Lafayette excels at cooking Southern comfort foods, regularly whipping up fried chicken with a buttermilk brine, collard greens simmered with smoked turkey, and peach cobbler spiced
    with cinnamon, while they also experiment with farm‑to‑table salads featuring heirloom tomatoes and fresh basil.
  core: Cheyenne Lafayette, a 41‑year‑old operations pro with a competitive streak, balances structured budgeting with spontaneous indulgences, tackles health checks unevenly, and thrives on community gatherings
    that blend tradition with modern ambition.
background:
  cultural: Cheyenne grew up in La Grange, Kentucky, within a close‑knit white, Appalachian‑influenced community that values hospitality, church participation, and local traditions such as county fairs
    and high‑school sports. Her family roots trace back to multi‑generational small‑town residents who emphasized hard work, community service, and respect for regional customs. While she embraces these
    southern cultural values, Cheyenne also seeks to blend contemporary leadership ideas and progressive gender roles into her personal and professional life.
