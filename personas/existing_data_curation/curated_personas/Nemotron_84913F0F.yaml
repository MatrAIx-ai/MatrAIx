personas:
  professional: David Coffman, a 41‑year‑old restaurant frontline specialist, leverages his fast‑paced customer‑service expertise, meticulous cash handling, and hands‑on problem‑solving mindset to keep
    shifts running smoothly, while his competitive drive and preference for structure propel his pursuit of a shift‑lead certification and future food‑truck ownership.
  sports: David Coffman, an avid participant in a community softball league that competes for the Pine Creek Cup, follows the Atlanta Falcons in the NFL and the Atlanta Braves in MLB, and spends early mornings
    casting for bass on Lake Oconee, combining his competitive streak with a love for seasonal outdoor sports.
  arts: David Coffman, a devoted collector of classic‑rock vinyl, spins Led Zeppelin, The Rolling Stones, and Pink Floyd on his vintage turntable while grilling, and channels his creative instincts into
    modest woodworking projects that yield handcrafted coffee tables, reflecting a nostalgic yet hands‑on artistic sensibility.
  travel: David Coffman favors low‑key road trips that blend fishing excursions with culinary stops, often planning impromptu weekend getaways to the Florida Keys for tarpon fishing or a nostalgic drive
    through the Blue Ridge Mountains to sample Asheville’s craft breweries, balancing his love for structure in early‑morning departures with an appetite for spontaneous detours.
  culinary: David Coffman enjoys mastering Southern comfort food on his backyard grill, routinely preparing smoked brisket with hickory wood, bourbon‑glazed ribs, and buttery corn on the cob, while his
    modest cooking skill is enough to experiment with homemade BBQ rubs featuring brown sugar, paprika, and a dash of cayenne.
  core: David Coffman, a 41‑year‑old practical problem‑solver, balances a competitive edge with laid‑back flexibility, spending evenings surrounded by classic‑rock vinyl and the scent of smoked barbecue,
    all while chasing the next big bass bite at dawn.
background:
  cultural: David grew up in a small‑town Southern environment in Georgia, where community gatherings, church events, and local high‑school football games formed a backdrop to his upbringing. This setting
    fostered a strong appreciation for hospitality, Southern cuisine, and a work ethic rooted in practicality. While his cultural roots are tied to traditional Southern values, his college exposure and
    diverse workplace experiences have broadened his perspective, allowing him to blend respect for local customs with a pragmatic, forward‑looking mindset.
attributes:
  skills: '[''Customer Service'', ''Cash Handling'', ''Food Safety Compliance'', ''Inventory Management'', ''POS System Operation'', ''Team Training'', ''Basic Mechanical Repair'']'
  hobbies: '[''Bass Fishing'', ''Classic Rock Vinyl Collecting'', ''Barbecue Cooking'', ''Softball League'', ''Car Restoration'', ''DIY Woodworking'']'
  career_goals: David aims to leverage his reliable performance and competitive drive to move into a supervisory role within the restaurant industry. Over the next few years he plans to earn a certified
    food safety manager credential, complete his associate degree, and secure a shift‑lead position. Ultimately, he envisions managing a full‑service eatery or launching a modest food‑truck venture that
    combines his love for Southern comfort food with his entrepreneurial aspirations.
