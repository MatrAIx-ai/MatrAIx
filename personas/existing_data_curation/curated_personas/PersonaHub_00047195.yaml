persona_description: A researcher or scientist who is interested in the field of spectroscopy, particularly in the area of image processing and computer vision. They are looking to develop software algorithms
  for order sorting filters to reduce spectral overlap in spectrometer designs. They are familiar with the concept of spectral overlap and its impact on spectrometer performance, and are interested in using
  image processing techniques to quantify and compensate for this issue. They have experience with Raspberry Pi NoIR V2 cameras and the NoIR camera setup, and are familiar with the use of software for image
  processing and computer vision. They are interested in developing algorithms that can accurately capture and analyze the spectral images generated by the spectrograph, and are open to using 3D intensity
  profiles to gain insights into the spectral images.
