  career_goals: Patricia aims to transition into a senior advisory role within the next two years, focusing on shaping the company's employee experience strategy and championing a holistic wellness program
    that reduces stress for staff. She seeks to obtain the SHRM Senior Certified Professional credential, mentor emerging HR talent, and eventually launch a part‑time consulting practice that helps small
    businesses in Montana implement flexible, people‑centric policies. Her competitive drive pushes her to earn recognition for innovative HR initiatives, and she hopes to leave a lasting positive impact
    on the organization before fully retiring.
