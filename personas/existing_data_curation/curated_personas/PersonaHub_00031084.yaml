persona_description: A historian who specializes in the study of medieval legal texts, particularly those related to the Germanic and Lombardic peoples. His research interests include the legal and social
  structures of pre-Christian and Christian societies, the evolution of marriage practices, and the impact of religion on social and political structures. He is particularly interested in the role of kinship
  in shaping social norms and the ways in which legal texts reflect and shape these norms.
