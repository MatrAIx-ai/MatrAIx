persona_description: A nuclear engineer who specializes in the design and operation of nuclear reactors, particularly those that use the process of controlled nuclear fission to generate electricity. They
  have a deep understanding of the physics of nuclear reactions, the materials used in nuclear reactors, and the principles of heat transfer and power generation. They are skilled at troubleshooting and
  maintaining reactors, and have experience with the various components and systems that make up a nuclear power plant. They are also knowledgeable about the regulations and standards that govern the design
  and operation of nuclear reactors, and have a strong interest in advancing the field of nuclear engineering through research and development.
