  career_goals: Although retired from formal employment, Deon aims to create a memoir and short documentary chronicling the Black experience in Kern County, preserving stories of migration, civil‑rights
    activism, and agricultural labor for future generations. He hopes to curate a rotating exhibition of local Black artists at the Wasco community center, leveraging his art‑critique background. Deon also
    aspires to mentor his grandchildren academically, supporting them in college preparation and encouraging their own creative pursuits. He plans to join a senior‑citizen learning program at a nearby community
    college to study art history and digital media, eventually teaching a workshop on low‑tech photography for seniors. Additionally, he wants to spearhead a community garden project that promotes sustainable
    food practices and intergenerational collaboration.
