  hobbies: '[''Kayaking'', ''Gardening'', ''DIY craft fairs'', ''Habitat for Humanity volunteering'', ''Salsa dancing'', ''Exploring food markets'', ''Reading historical fiction'', ''Personal woodworking
    projects'', ''Beach walks'']'
  career_goals: Lisa aims to become a certified lead carpenter and eventually establish her own boutique woodworking studio that offers custom home interiors and community workshops. She plans to complete
    a construction management certification, expand her knowledge of green building practices, and mentor apprentices, while maintaining a healthy work‑life balance with her family.
