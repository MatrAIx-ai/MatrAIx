personas:
  professional: Lisa Williams is a seasoned carpenter and project coordinator who blends expert framing and finish carpentry with a passion for sustainable design, leading small crews through pragmatic
    curiosity that balances innovative green‑building techniques with reliable, time‑tested methods.
  sports: Lisa Williams paddles year‑round with the Gulf Coast Kayak Club, plays weekend pickup soccer while cheering for Orlando City SC, follows the Tampa Bay Buccaneers in the fall, the Miami Heat in
    the winter, and joins a local running group training for the Tampa Bay Half Marathon each spring.
  arts: Lisa Williams channels creative energy into woodworking inspired by master craftsman Sam Maloof, finds rhythm in salsa nights to Celia Cruz and Marc Anthony, devours historical fiction by Hilary
    Mantel and Ken Follett, and frequents the Tampa Museum of Art to admire contemporary pieces by Amy Sillman.
  travel: Lisa Williams prefers short Gulf‑coast road trips, having explored the Florida Keys, New Orleans’ French Quarter, and Savannah’s historic squares, while dreaming of a summer sailing adventure
    in the Greek Islands and a rugged trekking expedition through Patagonia’s Torres del Paine.
  culinary: Lisa Williams is a self‑taught cook who loves grilling fresh grouper with a citrus‑herb glaze, crafting shrimp and chorizo paella seasoned with saffron and smoked paprika, and tossing seasonal
    farm‑to‑table salads featuring heirloom tomatoes, basil, and locally sourced goat cheese.
  core: Lisa Williams is a green‑building carpenter, salsa‑loving social butterfly, meticulous planner who occasionally over‑orders craft supplies and forgets dentist appointments, yet always finds time
    for family, community volunteer work, and a weekend paddle.
background:
  cultural: Lisa grew up in a middle-class family in Central Florida, where Southern hospitality and a laid-back coastal lifestyle blend. Her white American heritage includes traditions such as celebrating
    Thanksgiving, Christmas, and the Fourth of July with family gatherings, while the regional culture of Palmetto emphasizes community involvement, outdoor recreation, and a respect for the natural environment.
    These cultural values have reinforced her work ethic, collaborative spirit, and appreciation for both tradition and innovation.
attributes:
  skills: '[''Framing'', ''Finish carpentry'', ''Cabinet making'', ''Custom furniture design'', ''Blueprint reading'', ''Building code compliance'', ''Project coordination'', ''Team leadership'', ''Power
