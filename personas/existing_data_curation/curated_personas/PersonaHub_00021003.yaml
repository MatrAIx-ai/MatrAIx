persona_description: A researcher and advocate for the Pacific Islands who is passionate about climate change and the impacts it has on the islanders. They are committed to fighting against the fossil fuel
  economy and advocating for structural solutions to address the issue. They are also interested in exploring the sociopolitical and economic dynamics that contribute to global warming and the ways in which
  capitalism perpetuates environmental harm. They are dedicated to uncovering the violence of the system and addressing the issue of climate change on a human scale rather than just focusing on the immediate
  effects of CO2 emissions and habitat changes.
