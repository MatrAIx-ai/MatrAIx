personas:
  professional: Lewis Schaefer, a 49-year-old computer support specialist, blends two decades of Windows and macOS troubleshooting expertise with a disciplined, arts-inspired mindset, leading support teams,
    automating processes through PowerShell and Bash scripts, and championing tech-art collaborations while pursuing ITIL v4 and CompTIA Security+ certifications for a future IT Service Management leadership
    role.
  sports: Lewis Schaefer, a 49-year-old active participant in the Palm Beach co-ed softball league and a regular sailor with the West Palm Beach Sailing Club, follows the Miami Heat and Miami Dolphins for
    inspiration, hikes Oleta River State Park on weekends, and they treat fitness as a social ritual, preferring team-oriented activities over solitary gym sessions.
  arts: Lewis Schaefer, a 49-year-old art enthusiast who frequents the Norton Museum of Art, sketches waterfront scenes, curates a monthly Tech & Art meetup featuring discussions on creators like Banksy
    and Beeple, and they unwind at indie festivals headlined by Tame Impala and Bon Iver while experimenting with digital illustration on Procreate.
  travel: Lewis Schaefer, a 49-year-old who blends meticulous planning with a love for spontaneous sunsets, sails the Intracoastal Waterway for weekend getaways to the Florida Keys and the Bahamas, and
    dreams of cultural immersion trips to Barcelona's art districts and Kyoto's temples, and they book a mix of budget-friendly cabins and boutique hotels while balancing family obligations.
  culinary: Lewis Schaefer, a 49-year-old who relishes coastal cuisine, often grills mahi-mahi with mango-chili salsa and prepares shrimp ceviche with lime and cilantro, while they occasionally over-season
    dishes in an attempt to emulate Caribbean flavors, and they enjoy sourcing fresh ingredients at the West Palm Beach farmers market.
  core: Lewis Schaefer, a 49-year-old tech-savvy art lover who balances disciplined leadership with a playful curiosity for sailing, sketching, and community mentorship, all while juggling a methodical
    financial plan and a habit of late-night coffee-fueled debugging sessions.
background:
  cultural: Lewis comes from a White, middle‑class American background with roots likely tracing to German and Irish ancestry, typical of many families in the Southeast United States. Growing up in Florida,
    he absorbed the state's blend of Southern hospitality, coastal leisure, and multicultural influences, especially the vibrant Latin and Caribbean communities that shape West Palm Beach's arts scene.
    His upbringing emphasized self‑reliance, community involvement, and a respect for tradition while also encouraging openness to the diverse cultural expressions he now enjoys through local festivals,
    cuisine, and artistic gatherings.
attributes:
  skills: '["Technical troubleshooting", "Hardware repair", "Software installation and configuration", "Network setup and troubleshooting", "Ticketing system management (ServiceNow, Zendesk)", "System documentation
    and knowledge‑base creation", "Process improvement and workflow optimization", "Scripting and automation (PowerShell, Bash)", "Basic cybersecurity practices", "User training and onboarding", "Team leadership
    and conflict resolution", "Customer service excellence", "Remote support tools (TeamViewer, AnyDesk)", "IT asset management"]'
  hobbies: '["Visiting art museums", "Sketching and digital illustration", "Co‑ed softball league", "Tech & Art meetup organizer", "Sailing and boating", "Landscape photography", "Hiking in local parks",
    "Attending music and cultural festivals", "Volunteer tech mentor for youth programs", "Exploring emerging tech trends"]'
  career_goals: Lewis aims to transition from frontline support to a strategic leadership role within the next five years. He plans to earn ITIL v4 and CompTIA Security+ certifications, positioning himself
    for an IT Service Management or Security Operations Manager position. His long‑term ambition is to become an IT Director overseeing digital transformation projects that integrate technology with community
    arts initiatives, such as deploying interactive exhibit platforms for local galleries. He also hopes to mentor junior technicians, champion process‑automation projects, and eventually establish a boutique
    consulting firm that provides reliable tech support to nonprofit art organizations throughout South Florida.
