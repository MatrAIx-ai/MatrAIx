personas:
  professional: An 84‑year‑old community storyteller, Janet Powell leverages her talent for oral history, watercolor painting, and event organization to keep Wauseon’s past alive, turning informal gatherings
    into vibrant intergenerational art exchanges while embracing a relaxed, improvisational approach to planning.
  sports: A line‑dancing enthusiast and occasional bowler in the senior league, Janet Powell cheers for the Toledo Mud Hens, walks daily through her garden, and participates in gentle aerobics at the community
    center, blending social fun with low‑impact exercise.
  arts: A watercolor painter inspired by the Ohio landscape, a devoted member of the town’s knitting circle, and an avid reader of Mary Oliver and contemporary fiction, Janet Powell routinely visits the
    Wexner Center in Columbus, curates mini‑exhibits at the senior center, and experiments with iPad sketching apps to merge tradition with digital media.
  travel: A weekend road‑tripper who favors short drives to Ohio’s Amish Country, the Henry County fair, and art museums in Cleveland and Indianapolis, Janet Powell prefers planning trips around family
    visits and community events, dreaming of a future pilgrimage to New York’s MoMA but staying within her modest budget.
  culinary: A garden‑to‑table chef who delights in harvesting heirloom tomatoes, beets, and basil for a beet‑and‑goat‑cheese salad, bakes fresh apple pie with a flaky crust, and honors beloved traditions
    by preparing Irish soda bread and sauerkraut from home‑grown cabbage, often sharing these dishes at local potluck gatherings.
  core: Janet Powell melds 84 years of Midwest resilience with boundless artistic curiosity, turning everyday chores into creative celebrations while occasionally misplacing her glasses and a few receipts.
background:
  cultural: Janet grew up in the agricultural heartland of northwestern Ohio, raised in a modest white, Protestant family whose roots trace back to German and Irish immigrants who settled Henry County in
    the late 19th century. Her childhood was shaped by the rhythms of farm life, the county fair, and the close‑knit community of Wauseon, where church gatherings, school events, and neighborhood picnics
    were central to social interaction. These Midwestern values of self‑reliance, neighborly cooperation, and an appreciation for seasonal cycles have left an indelible mark on her outlook. While her formal
    education concluded after high school, a lifelong curiosity propelled her toward the arts, literature, and local history, allowing her to blend regional traditions with an imaginative pursuit of new
    ideas.
