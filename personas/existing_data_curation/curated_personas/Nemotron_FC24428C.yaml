  career_goals: Although retired, Janet’s ambition is to remain a cultural catalyst in her community. She aims to compile a memoir that weaves her family’s migration story with the evolving narrative of
    Wauseon, preserving it for future generations. She also hopes to launch an intergenerational art exchange program that pairs senior artisans with local schoolchildren, fostering creativity across ages.
    Janet plans to learn basic digital photography to document community events and the seasonal changes of her garden, creating an online archive for the town’s historical society. Lastly, she wishes to
    continue hosting weekly arts‑and‑crafts gatherings, ensuring they stay vibrant and inclusive.
