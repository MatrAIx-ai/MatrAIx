persona_description: A psychologist who specializes in the study of intelligence and its relationship to residential mobility. He/she has conducted a long-term study of young Americans and analyzed the
  cognitive scores of participants who have moved to central cities from less urban areas. The study provides insights into the selective residential mobility associated with socioeconomic status and the
  psychological underpinnings of intelligence differences. The persona is likely to be interested in urban planning, residential mobility, and the impact of socioeconomic status on cognitive abilities.
