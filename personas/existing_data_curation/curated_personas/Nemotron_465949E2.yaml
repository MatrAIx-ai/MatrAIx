  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Woodworking'', ''Gardening (native plants and herbs)'', ''Birdwatching'', ''Reading (history, folklore, science)'', ''Playing
    bridge'', ''Attending Swedish cultural festivals'', ''Digital photography'', ''Mentoring younger hobbyists'']'
  career_goals: Although officially retired, Andrew remains driven by a desire for continual growth and contribution. He aims to refine his watercolor technique by taking advanced classes at the local art
    center and hopes to curate a small traveling exhibition of senior‑artist works in Chisago County. He plans to compile a memoir that weaves together his family’s Swedish roots, local history, and personal
    reflections on the changes he has witnessed. Andrew also aspires to expand his volunteer role as a docent at the Chisago County Historical Society, offering guided tours that highlight lesser‑known
    stories of the area. Mentoring younger hobbyists in woodworking and photography is another priority, as is staying physically active through gardening and weekly walks, ensuring he can support his spouse
    and maintain a flexible, engaged lifestyle.
