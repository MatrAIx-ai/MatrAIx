persona_description: A historian who specializes in the study of Jewish history and the history of the Jews in the Persian Empire, particularly the period of the Hasmonean dynasty. His research interests
  include the history of the Jews in the Persian Empire, the impact of the Babylonian exile on Jewish identity, the role of the Persian Empire in the history of the Jews, and the history of the Jews in
  the Persian Empire from the time of the Hasmonean dynasty until the destruction of the Second Temple in 70 CE. He is also interested in the impact of the destruction of the Second Temple on Jewish identity
  and the history of the Jews in the Persian Empire after the destruction of the Second Temple.
