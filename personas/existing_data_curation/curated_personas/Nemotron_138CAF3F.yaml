  hobbies: '[''Reading historical fiction and poetry'', ''Herb gardening'', ''Cooking Dominican cuisine'', ''Gentle yoga'', ''Morning walks along the Hillsborough River'', ''Crossword and Sudoku puzzles'']'
  career_goals: Blanca aims to leverage her two decades of front‑line experience into a supervisory or training role within the call‑center environment. She aspires to lead a small team, develop onboarding
    curricula for new representatives, and champion quality‑assurance initiatives that streamline call handling while preserving a personal touch. Long‑term, she hopes to transition into a part‑time consulting
    position focused on improving customer‑service workflows for local businesses in Tampa, allowing her more control over schedule and a quieter work setting.
