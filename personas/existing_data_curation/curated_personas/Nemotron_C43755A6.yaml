  hobbies: '["Cooking traditional Mexican dishes", "Hiking on local nature trails", "Playing acoustic guitar", "Journaling and creative writing", "Puzzle solving and escape rooms", "Volunteering at community
    health clinics", "Photography of natural landscapes"]'
  career_goals: Melvi aspires to pursue a career in biomedical research with a focus on developing accessible mental health diagnostics for underserved communities. She plans to enroll in a master's program
    in bioengineering to deepen her technical expertise while maintaining a structured learning pathway. In the longer term, she hopes to lead a research team that bridges cutting‑edge science with culturally
    competent outreach, allowing her to contribute to both scientific advancement and community well‑being. She values a work environment that offers clear expectations paired with the flexibility to explore
    innovative solutions.
