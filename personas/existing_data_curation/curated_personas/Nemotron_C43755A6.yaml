personas:
  professional: A budding biomedical researcher, Melvi Andrade blends rigorous data‑driven experimentation with a compassionate, bilingual communication style to design mental‑health diagnostic tools for
    underserved communities, thriving on clear project timelines while flexibly adapting to unexpected lab results.
  sports: An avid outdoor enthusiast, Melvi Andrade hikes local trails with the city’s Trailblazers Club, supports the regional soccer team the Rapids, follows the NBA’s Denver Nuggets for winter games,
    and squeezes in weekly yoga classes to maintain flexibility, while occasionally skipping workouts when anxiety spikes.
  arts: An emerging acoustic‑guitarist, Melvi Andrade composes folk‑style songs inspired by artists like John Mayer, Bon Iver, and T‑Bone Burnett, spends evenings listening to indie singer‑songwriters such
    as Phoebe Bridgers and Cuban‑American singer‑songwriter Lila Downs, and occasionally attends community open‑mic nights to share their heartfelt lyrics.
  travel: A budget‑conscious explorer, Melvi Andrade has undertaken weekend trips to the Grand Canyon and a solo backpacking adventure through Oaxaca’s colonial towns, dreams of trekking Patagonia’s Torres
    del Paine, and prefers meticulously planning itineraries via travel forums while leaving room for spontaneous detours, though limited finances sometimes curb longer journeys.
  culinary: A passionate home‑cook, Melvi Andrade masters traditional mole poblano and tinkers with vegan tacos al pastor, relishes using ingredients like ancho chiles, epazote, and masa harina, and balances
    cooking elaborate meals for friends with quick, health‑focused salads when study deadlines loom.
  core: Melvi Andrade is a detail‑oriented yet flexible biotech enthusiast who channels anxiety into creative guitar sessions, meticulously tracks finances while occasionally splurging on culinary experiments,
    and thrives on blending scientific rigor with heartfelt community service.
background:
  cultural: Melvi’s Mexican heritage is a central part of her identity, influencing her values of family cohesion, hospitality, and community orientation. Raised in a bilingual household in Allendale, Michigan,
    she celebrates holidays such as Día de los Muertos and Cinco de Mayo with both traditional rituals and local adaptations, blending Mexican customs with Midwestern sensibilities. Her family emphasizes
    respect for elders, collective wellbeing, and the importance of sharing cultural foods and stories. This dual cultural lens informs her compassionate approach to teamwork and her desire to create inclusive,
    culturally aware scientific solutions.
attributes:
  skills: '["Python programming", "Statistical data analysis (R, SPSS)", "Laboratory techniques (PCR, spectroscopy)", "Experimental design and documentation", "Project planning and timeline management",
