personas:
  professional: Christi Krul, a 45-year-old medical records specialist with over 15 years of experience in Epic and Cerner, leverages her arts‑humanities background to craft clear policies and guide multidisciplinary
    teams, and is methodically pursuing the RHIA credential and a future health informatics leadership role.
  sports: Christi Krul hikes the Chattahoochee River trails most weekends, practices yoga three times a week, cheers for the Atlanta Falcons and Braves, runs with a local spring 5K club, and occasionally
    joins friendly basketball pick‑ups at the community center.
  arts: Christi Krul frequents live jazz at the Fox Theatre—especially performances by Wynton Marsalis and Esperanza Spalding—explores the High Museum of Art, leads a historical nonfiction book club, and
    volunteers at the annual Atlanta Dogwood Festival where she curates a pop‑up gallery of local artists.
  travel: Christi Krul prefers meticulously planned weekend excursions to historic Southern locales like Savannah, Charleston, and Asheville, uses travel apps to map museum tours and garden walks, but occasionally
    books a last‑minute trip to New Orleans to catch a renowned jazz festival when her schedule permits.
  culinary: Christi Krul enjoys cooking Southern‑inspired meals such as fried chicken with collard greens, shrimp and grits, and peach cobbler, often harvesting herbs and okra from her community garden,
    and while her cooking skill is solid, she sometimes over‑salts dishes in her enthusiasm.
  core: Christi Krul blends precise organization with a love for community jazz, garden‑fresh Southern cooking, and a drive to lead health data governance, all while juggling mild hypertension and a penchant
    for spontaneous charity events.
background:
  cultural: Christi was raised in the Atlanta metropolitan area, growing up in a middle‑class white Southern family that valued hospitality, community service, and respect for tradition. Her Southern roots
    are reflected in her love for regional cuisine, music, and local festivals, while her graduate studies in arts and humanities have broadened her perspective, fostering an appreciation for diverse cultural
    expressions and a commitment to lifelong learning.
attributes:
  skills: '[''Electronic Health Record (EHR) system management'', ''Medical coding (ICD-10, CPT)'', ''HIPAA and health information privacy compliance'', ''Data quality auditing and reporting'', ''Process
    improvement and workflow optimization'', ''Technical writing and policy development'', ''Staff training and onboarding'', ''Interpersonal communication and team coordination'', ''Cultural competency
    and ethical decision‑making'']'
  hobbies: '[''Historical nonfiction book club'', ''Community garden volunteering'', ''Charity fundraiser organization'', ''Live jazz concerts'', ''Yoga'', ''Hiking'', ''Cooking Southern cuisine with friends'',
    ''Visiting art museums'', ''Exploring historic neighborhoods'']'
  career_goals: Christi aspires to earn the Registered Health Information Administrator (RHIA) credential and transition into a health informatics leadership role within a hospital system. She aims to lead
    a health information management department, drive data governance initiatives, mentor junior staff, and contribute to strategic projects that improve patient data integrity and support evidence‑based
    care. In the longer term, she envisions pursuing a master’s degree in health informatics to deepen her expertise in data analytics and interoperability.
