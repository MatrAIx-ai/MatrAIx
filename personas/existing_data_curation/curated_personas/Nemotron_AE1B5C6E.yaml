  hobbies: '[''Cooking Mexican cuisine'', ''Gardening'', ''Coastal walks'', ''Mexican folk music and dance'', ''Participating in Día de los Muertos celebrations'', ''Yoga and meditation'', ''Journaling'',
    ''Reading romance novels (English/Spanish)'', ''Volunteering at community tutoring program'']'
  career_goals: Priscilla aims to advance from first‑line supervisor to store manager within the next two years, seeking a role that offers greater stability and the opportunity to shape store culture.
    She hopes to implement structured wellness initiatives—such as regular de‑briefs and stress‑management workshops—to support her team’s mental health, reflecting her own experience with anxiety. Long‑term,
    she envisions moving into a district‑level training coordinator position where she can design culturally relevant onboarding programs for bilingual staff across the region, or perhaps opening a modest
    family‑owned boutique that showcases Mexican artisan goods and provides employment for local youths.
