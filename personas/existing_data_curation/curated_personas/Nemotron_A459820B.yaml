personas:
  professional: Shenita Alexandre, a 77‑year‑old retired community event planner, volunteers as the church potluck coordinator and quilting workshop leader, leveraging their practical curiosity and assertive
    compassion to orchestrate gatherings, though their love of flexibility sometimes results in spontaneous, last‑minute changes.
  sports: Shenita Alexandre stays active through a senior walking club that meets three times a week, cheerfully follows the Atlanta Braves and the local high school basketball team, and occasionally joins
    a community pickleball league for retirees, balancing gentle exercise with enthusiastic fandom.
  arts: Shenita Alexandre expresses artistic passion by singing Mahalia Jackson’s gospel hymns in the church choir, relishing classic films such as Casablanca and Sunset Boulevard, reading historical novels
    by Philippa Gregory, and collecting prints by Southern painter Clementine Hunter, allowing these influences to shape their storytelling.
  travel: Shenita Alexandre prefers low‑key travel, often joining senior tour groups to historic Southern towns like Charleston and Savannah, while dreaming of a relaxed cruise to the Bahamas and a pilgrimage
    to Gettysburg, and they balance careful budgeting with the desire for meaningful family visits.
  culinary: Shenita Alexandre excels at Southern home cooking, perfecting a buttery pecan pie with a splash of bourbon, reinventing collard greens with smoked turkey and chili flakes, and crafting garden‑fresh
    heirloom tomato basil soup, and they blend seasoned expertise with a childlike curiosity for new flavor twists.
  core: Shenita Alexandre is a curious, compassionate 77‑year‑old who weaves together gardening, gospel singing, quilting, and Southern cooking into a lasting legacy, even as their relaxed approach leads
    to occasional missed appointments and a lingering worry over finances.
background:
  cultural: Shenita's cultural identity is rooted in the African-American community of Jackson, Tennessee, a city with deep ties to Southern black traditions, church life, and the civil-rights movement.
    Growing up during segregation, she inherited a rich legacy of communal resilience, gospel music, soul-food cooking, and oral storytelling. Her family's history includes sharecropping and migration to
    the city for better opportunities, which informs her deep appreciation for homemade meals and handcrafted quilts. The local church has been a central hub for social support, celebration, and activism
    in her life, shaping her values of cooperation, compassion, and assertive advocacy when needed. These cultural influences are evident in her daily practices, from the dishes she prepares to the stories
    she preserves for future generations.
