    (crocheting, needlework)"]'
  career_goals: Even in retirement, Shenita aims to stay healthy and active, supporting her grandchildren's education and serving as a bridge between generations. She wants to complete a digital scrapbook
    of her family's oral histories, learning enough computer skills to preserve videos and photos. Shenita also hopes to mentor younger members of her church's women's ministry, sharing her cooking and
    quilting techniques while encouraging them to explore new ideas in a pragmatic way. Ultimately, she aspires to leave a tangible legacy of recipes, crafts, and stories that reflect both tradition and
    her lifelong curiosity.
