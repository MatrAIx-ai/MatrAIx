persona_description: A scientist or engineer specializing in hydrology, who is responsible for developing and implementing methods for estimating monthly mean streamflow at gaged sites and monthly streamflow
  duration characteristics at ungaged sites in central Nevada. They are skilled in using regression techniques to relate streamflow data at gaged sites to concurrent flows at nearby gaging stations, and
  they are also proficient in using basin and climatic variables to determine relations for ungaged basins for annual and monthly percent exceedence levels. They are highly knowledgeable in the field of
  hydrology and have a strong background in data analysis, regression modeling, and statistical methods. They are also adept at interpreting the reliability and limitations of the estimating methods.
