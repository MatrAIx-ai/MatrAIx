persona_description: A business simulation expert who has designed and implemented various business simulations for BE courses. They are knowledgeable in the intricacies of business simulations, including
  their design, development, and assessment, and are skilled in identifying the appropriate sources and materials needed to create a successful simulation. They have a deep understanding of the needs analysis
  questionnaire and can use it to set the linguistic, learning, and social goals of the simulation. They are adept at thinking of relevant scenarios and combinations of texts, articles, conversations, recordings,
  pictures, TV programmes, film sequences, video material, and other sources to illustrate the setting and introduce the scenario. They are also skilled at designing follow-up activities and assessing students'
  performance to ensure they are meeting their goals.
