personas:
  professional: Julieta, a budding teen programmer who volunteers as a math tutor and bilingual story‑time leader, blends the energy she brings as a forward on her co‑ed soccer team with the disciplined
    creativity of coding simple Scratch games, all while maintaining a practical approach to school projects and deadlines.
  sports: Julieta, a forward for the San Jose Union Soccer Club, idolizes the San Jose Earthquakes and the Golden State Warriors, trains three times a week, and caps her week with a Saturday morning jog
    while often forgetting to hydrate adequately during games.
  arts: Julieta, an avid manga‑style comic creator, spends evenings sketching characters inspired by Hayao Miyazaki and Osamu Tezuka, shares her work on a private Instagram page, and finds solace in listening
    to J‑pop while baking bánh bao with her grandmother, which fuels fresh story ideas.
  travel: Julieta dreams of exploring Hanoi’s historic Tet celebrations to deepen her dance roots, wandering Tokyo’s Akihabara for rare manga collectibles, and taking a family road trip to California’s
    Big Sur for a coastal escape, though her travel plans stay largely local due to budget constraints.
  culinary: Julieta, a budding baker, delights in crafting bánh bao and chè trôi nước with her grandmother, mixing sweet red bean paste and steamed rice flour, while also experimenting with fusion snacks
    like matcha‑infused cookies, often sharing the treats with teammates after practices.
  core: Julieta's blend of soccer dynamism, manga artistry, cultural baking, and a worry‑prone mind, coupled with a habit of late‑night study sessions, makes her a creative, socially‑driven teen constantly
    balancing energy and anxiety.
background:
  cultural: Julieta is a second‑generation Vietnamese‑American. Her parents emigrated from Ho Chi Minh City in the 1990s and settled in The Colony, Texas, where they opened a small Vietnamese grocery store.
    At home, Vietnamese is spoken alongside English, and family meals often feature pho, bánh mì, and fresh spring rolls. The household observes traditional celebrations such as Tet (Lunar New Year) and
    the Mid‑Autumn Festival, during which Julieta participates in lantern‑making and folk dances. The family's cultural values emphasize respect for elders, collective responsibility, and high educational
    attainment, which shape Julieta’s cooperative nature and her drive for academic success. Growing up in suburban Texas, she blends American school life—joining soccer teams and school clubs—with her
    Vietnamese heritage, creating a bicultural identity that informs her interests, social interactions, and future aspirations.
attributes:
  skills: '[''Bilingual communication (English & Vietnamese)'', ''Introductory Python and Scratch programming'', ''Robotics project coordination'', ''Event planning and schedule management'', ''Intermediate
    piano performance'', ''Illustration and graphic design'', ''Peer tutoring in mathematics'', ''Mindfulness stress‑management techniques'']'
  hobbies: '[''Soccer (forward, co‑ed team)'', ''Traditional Vietnamese dance'', ''Manga illustration and comic creation'', ''Playing intermediate piano'', ''Baking bánh bao and Vietnamese pastries with
    grandmother'', ''Reading fantasy novels (e.g., Harry Potter, Percy Jackson)'', ''Watching science documentaries'', ''Coding simple games in Scratch'', ''Volunteering: tutoring math and leading bilingual
    story‑time'', ''Yoga and guided breathing for stress relief'']'
  career_goals: Julieta aims to pursue a STEM career that satisfies both her curiosity and her desire to make a tangible difference. She is particularly drawn to biomedical engineering, hoping to design
    low‑cost prosthetic devices for children in underserved communities. She also envisions studying computer science to develop educational games that make science concepts engaging for middle‑school students,
    especially those from bilingual backgrounds. Long‑term, she wants to lead community outreach programs that blend technology with culturally sensitive health education, allowing her to give back to both
    her local Texas neighborhood and the broader Vietnamese diaspora. Her practical approach includes maintaining a strong GPA, seeking scholarships, and building a portfolio of projects that demonstrate
    both technical skill and social impact.
