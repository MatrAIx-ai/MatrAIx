persona_description: A researcher at the Technion-Israel Institute of Technology who specializes in the study of blood proteins and their effects on heart health. The researcher is particularly interested
  in the genetic variations in haptoglobin and their impact on heart disease. The researcher is conducting a study to determine whether certain vitamin doses designed to protect ailing hearts are beneficial
  or harmful to older women with diabetes. The researcher is conducting this study in post-menopausal women with at least partial blockage in one coronary artery.
