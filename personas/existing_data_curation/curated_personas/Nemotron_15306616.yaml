  career_goals: Daiva often talks about wanting to help animals and people when she grows up. She imagines becoming a veterinarian because she loves caring for her dog and learning about animals at the
    local farm. She also expresses interest in being a teacher, enjoying storytime with younger kids, and sees herself as a park ranger one day, exploring the woods around Perrinton. Her ambitions are fluid,
    driven by her curiosity for nature, creativity, and a desire to make a positive, practical impact in her community.
