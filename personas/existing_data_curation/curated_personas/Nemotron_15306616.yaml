personas:
  professional: Daiva Wright, a six-year-old budding naturalist, combines relentless curiosity with practical organization as they catalog leaves, rocks, and insects in a backyard field guide, showing early
    scientific inquiry skills.
  sports: Daiva Wright, a six-year-old energetic explorer, rides their pink bike to the neighborhood park for daily rides, plays on the Little Lions junior soccer team each spring, and cheers enthusiastically
    for the Seattle Mariners during baseball season, balancing structured play with spontaneous outdoor adventures.
  arts: Daiva Wright, a six-year-old budding artist, spends afternoons painting watercolor butterflies inspired by Eric Carle’s illustrations, draws whimsical woodland scenes after reading Beatrix Potter’s
    tales, and sings along to Raffi’s children’s songs while crafting paper collages, letting the arts fuel their imaginative play.
  travel: Daiva Wright, a six-year-old adventure-curious traveler, enjoys spontaneous family trips to the nearby state park's meadow and the annual county fair, while dreaming of a future vacation to the
    Great Barrier Reef's coral lagoons and a snowy weekend in Reykjavik, preferring hands-on exploration over long-distance flights limited by school schedules.
  culinary: Daiva Wright, a six-year-old budding chef, loves the cheesy comfort of homemade macaroni-and-cheese, delights in building strawberry shortcake layers with fresh strawberries and whipped cream,
    and often helps stir batter for banana-cinnamon pancakes, showing a growing confidence with simple kitchen tasks.
  core: Daiva Wright, a six-year-old explorer who meticulously catalogs backyard treasures while occasionally losing socks in their LEGO constructions, blends boundless curiosity with calm resilience, turning
    everyday moments into mini-adventures.
background:
  cultural: Daiva was raised in a middle‑class, white family in Perrinton, Michigan, where Midwestern values of community, modesty, and practicality are prominent. Her family maintains a subtle Lithuanian
    heritage reflected in occasional traditional dishes and folk songs passed down from grandparents, as her first name Daiva is of Lithuanian origin. They celebrate typical American holidays such as Thanksgiving,
    Christmas, and Fourth of July, often with community gatherings at the local church. This blend of Midwestern American culture and a touch of Lithuanian tradition shapes her worldview, providing a stable
    cultural foundation while fostering an openness to learning about diverse customs.
