  hobbies: '[''True‑crime reading and podcasts'', ''Lake fishing'', ''Hiking'', ''Archery'', ''Puzzle solving (crosswords, sudoku)'', ''Vintage analog photography'', ''Woodworking'', ''Gardening (raised‑bed
    vegetables)'', ''Small wine‑tasting gatherings'', ''Neighborhood watch volunteer work'']'
  career_goals: Katie aims to transition from a solo operative to the founder of a boutique investigative agency that specializes in corporate fraud, missing‑persons cases, and cyber‑enabled crimes within
    the Midwest. She plans to attain Certified Professional Investigator (CPI) and Professional Certified Investigator (PCI) credentials within the next two years, establishing her credibility with law‑enforcement
    agencies and corporate clients. Mentorship is a priority; she wants to create an apprenticeship program for emerging investigators in Kalamazoo County, fostering a pipeline of disciplined, ethical professionals.
    Long‑term, Katie envisions developing an in‑house forensic imaging lab and authoring a practical guide on integrating traditional investigative techniques with modern digital tools, positioning herself
    as a thought leader in the private investigation community.
