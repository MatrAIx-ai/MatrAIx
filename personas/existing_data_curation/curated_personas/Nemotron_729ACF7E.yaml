personas:
  professional: Katie Steinberg, a 46-year-old private investigator in Kalamazoo County, combines rigorous forensic document analysis and OSINT expertise with a disciplined, competitive Midwestern work
    ethic, delivering methodical, results‑driven investigations that balance traditional legwork with modern digital tactics.
  sports: Katie Steinberg enjoys lake trout fishing on Lake Michigan, regular hikes along the Kal‑Haven Trail, and weekly archery sessions at the Kalamazoo Archers Club, while cheering on the Detroit Tigers,
    Detroit Red Wings, and Green Bay Packers as their preferred professional sports teams.
  arts: Katie Steinberg cultivates a creative side through vintage analog photography inspired by Ansel Adams and Edward Hopper, hand‑crafts small furniture pieces in a Scandinavian style, relishes wine‑tasting
    evenings featuring Napa Valley vintages while listening to Bob Dylan and Sufjan Stevens, and occasionally attends community‑theater productions of classic plays such as Arthur Miller’s Death of a Salesman,
    reflecting their deep appreciation for quiet, thoughtful artistry.
  travel: Katie Steinberg prefers meticulously planned road trips that blend outdoor adventure with cultural curiosity, having explored Michigan’s Mackinac Island and Door County, taken weekend escapes
    to Chicago’s art districts, and dreaming of a future pilgrimage to Iceland’s volcanic landscapes and the historic vineyards of Tuscany, while they carefully balance a moderate travel budget with a yearning
    for immersive experiences.
  culinary: Katie Steinberg favors hearty Midwestern fare, regularly cooking lake trout fillets seasoned with dill and lemon, simmering a rustic beef and barley stew with carrots, parsnips, and rosemary,
    and baking sourdough bread with a sprinkle of rye flour, while indulging in wine‑paired cheese boards featuring sharp cheddar, aged gouda, and locally sourced apples, reflecting their love of seasonal,
    farm‑to‑table ingredients.
  core: Katie Steinberg is a fiercely analytical investigator whose disciplined, competitive nature coexists with a penchant for late‑night puzzle marathons, a reluctance to delegate tasks, and an occasional
    habit of obsessively checking case files at the expense of sleep, and they often forgo weekend plans to chase a fresh lead.
background:
  cultural: Katie grew up in a middle‑class white family in Kalamazoo County, Michigan, with German and English ancestry. Her father served as a police officer and her mother taught at a public elementary
    school, instilling a deep respect for law, order, and education. The family’s involvement in a local Lutheran congregation reinforced values of modesty, community service, and reliability. Raised amid
    the seasonal rhythms of the Great Lakes region, she developed a strong connection to outdoor activities like fishing and hiking. Midwestern cultural traits—self‑reliance, practical problem‑solving,
    politeness, and a preference for privacy—shape her worldview and professional demeanor. These influences, combined with a competitive spirit nurtured by her father’s law‑enforcement career, drive her
    dedication to meticulous, results‑oriented investigative work.
