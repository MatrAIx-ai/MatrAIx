  career_goals: Jose aims to move from a store manager role to regional operations director within the next five years, eventually opening his own boutique hotel or restaurant that blends Puerto Rican culinary
    traditions with the tourist market in Central Florida. He wants to strengthen his strategic planning and organizational skills to lead larger, multi‑site teams, and to be recognized for delivering consistently
    high guest satisfaction scores. He also hopes to mentor emerging talent, especially bilingual employees, and to become a voice for inclusive workplace culture.
