    "Community outreach and parent workshops"]'
  hobbies: '["Gardening (herbs and vegetables)", "Cooking traditional soul‑food dishes", "Church choir singing", "Volunteering for library story time", "Zumba fitness classes", "Quilting and knitting circles",
    "Book club (historical fiction & biographies)", "Journaling for emotional regulation", "Walking in local parks with friends", "Attending African‑American cultural festivals", "Traveling to visit family
    in the South", "Playing board games with community groups"]'
  career_goals: Elexis aims to transition into a lead teacher or curriculum coordinator role within her school district, where she can influence early learning standards and mentor a wider cohort of educators.
    She dreams of developing a district‑wide social‑emotional learning program that incorporates African‑American cultural narratives and music. While she values a gradual transition toward retirement,
    she hopes to establish a community‑run preschool that offers affordable, culturally responsive education to families in Prince George's County. Continuing professional development, such as pursuing
    a doctorate in early childhood education, remains on her long‑term agenda to deepen her impact.
