personas:
  professional: Elexis Harris, a seasoned early childhood educator, leverages her methodical curriculum design and inclusive teaching strategies to nurture young learners while championing a district-wide
    social‑emotional program that honors diverse heritage narratives through music and storytelling.
  sports: Elexis Harris, an avid Zumba participant, leads a neighborhood walking club through Rock Creek Park on weekends, cheers on the Washington Commanders and Capitals, and plays occasional recreational
    pickleball at the community center, balancing high‑energy group classes with low‑impact activities to stay fit.
  arts: Elexis Harris, a dedicated member of her church choir, sings gospel classics by Aretha Franklin and Marvin Gaye, enjoys quilting inspired by traditional patterns, and frequently discusses historical
    fiction by author Hilary Mantel and biographies of civil‑rights leaders at her book club, weaving music and literature into her social calendar.
  travel: Elexis Harris prefers organized group trips, favoring heritage‑rich destinations like Annapolis’s colonial waterfront, the Smithsonian museums in Washington, D.C., and an annual pilgrimage to
    New Orleans for live jazz and soul‑food festivals, while budgeting carefully to keep travel within a modest yearly allowance.
  culinary: Elexis Harris, an enthusiastic home cook, harvests basil, thyme, and oregano from her garden to flavor soulful dishes such as collard‑green gumbo, baked sweet‑potato casserole, and spiced fried
    chicken, and enjoys experimenting with seasonal vegetables in wholesome soups while occasionally indulging in store‑bought pastries.
  core: Elexis Harris blends a love of routine with vibrant community involvement, juggling organized teaching, lively choirs, Zumba, and gardening while managing occasional anxiety through journaling and
    a disciplined financial plan.
background:
  cultural: Elexis is an African‑American woman who grew up in the vibrant, historically Black communities of Prince George's County. Her upbringing was shaped by strong family ties, church participation,
    and a deep respect for education as a pathway to empowerment. She embraces the storytelling traditions, music, and culinary heritage of Black culture, often weaving gospel songs, African‑American folktales,
    and soul‑food themes into her classroom to foster a sense of identity and pride among her students. Community involvement is central to her life; she actively supports local cultural events, mentors
    younger teachers from similar backgrounds, and strives to create an inclusive learning environment that reflects the rich tapestry of her cultural roots.
attributes:
  skills: '["Early childhood curriculum development", "Classroom management and behavior guidance", "Child development assessment", "Lesson planning aligned with standards", "Parent‑teacher communication",
