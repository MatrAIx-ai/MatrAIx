  hobbies: '[''Bridge club'', ''Senior book club'', ''Gardening'', ''Traveling in Texas'', ''Volunteer work at food bank'', ''Genealogy research'', ''Cooking Texan cuisine'', ''Birdwatching'', ''Crossword
    puzzles'', ''Country music concerts'']'
  career_goals: Although retired, Marissa remains driven to make a lasting impact in her community. She aims to establish a senior mentorship program that pairs experienced volunteers with younger residents,
    publish a comprehensive family history book based on her genealogy research, and serve on the board of the Amarillo Community Center to shape inclusive programming. Additionally, she hopes to continue
    expanding her knowledge of sustainable gardening practices and to travel to historic sites across Texas with her grandchildren.
