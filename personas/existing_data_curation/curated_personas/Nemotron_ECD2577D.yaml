  hobbies: '[''Cooking traditional Mexican meals'', ''Playing recreational soccer with a small local group'', ''Listening to regional Mexican music (banda, mariachi)'', ''Strategy video gaming'', ''Watching
    Netflix series'', ''Volunteering at community cultural festivals'']'
  career_goals: Rolando aims to deepen his expertise in procurement and ascend to a senior buyer position within the next five years. He plans to earn a Certified Professional in Supply Management (CPSM)
    credential through online coursework while continuing on‑the‑job training. Building on his bilingual advantage, he hopes to specialize in sourcing products from Mexican manufacturers, creating a niche
    market for authentic goods in the Southeast. Ultimately, he envisions launching his own small‑scale wholesale operation that can supply local retailers while maintaining the reliable, routine‑driven
    processes he values. He also considers taking community college classes in business administration to broaden his managerial skills, ensuring he can responsibly support his family and contribute to
    his community.
