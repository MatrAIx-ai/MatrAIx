personas:
  professional: Jose Guede, a disciplined pipefitter whose methodical approach blends curiosity for emerging water‑conservation technology with a reliable, organized work ethic, ensures precise installations,
    and they quietly mentor apprentices despite occasional anxiety about meeting stringent safety standards.
  sports: Jose Guede, an avid fisherman along the Gila River and occasional desert‑trail hiker, follows the Phoenix Suns and Arizona Diamondbacks, trains at the local Desert Trail Club where they jog on
    cooler evenings, and they prefer low‑impact exercise that fits their solitary, methodical nature.
  arts: Jose Guede, a reserved fan of regional folk music, regularly listens to Lila Downs, Los Tigres del Norte, and classic mariachi recordings by Vicente Fernández, attends local community theater performances
    of folkloric plays, and they stream films by directors like Guillermo del Toro to satisfy their curiosity for cultural storytelling.
  travel: Jose Guede, a methodical planner who favors short, low‑stress road trips, has hiked the red rocks of Sedona, paddled in Lake Powell, and they dream of exploring Kyoto's temples and Copenhagen's
    sustainable design scene, always booking accommodations that offer quiet spaces for relaxation while maintaining a modest travel budget.
  culinary: Jose Guede, a competent home cook who delights in preparing traditional dishes like carnitas, chiles en nogada, and pozole using fresh corn masa, poblano peppers, and epazote, balances flavors
    with chipotle salsa, and they enjoy sharing these meals during family Día de los Muertos gatherings while occasionally splurging on a local taco truck for authentic street fare.
  core: Jose Guede blends meticulous pipefitting expertise with a solitary curiosity for DIY projects, manages anxiety through structured routines, and they find calm in fishing, folk music, and cooking
    family recipes, all while occasionally overindulging in high‑tech gadgetry.
background:
  cultural: Jose grew up in a Mexican-American household in the Phoenix area, speaking both Spanish and English at home. Family traditions, such as celebrating Día de los Muertos, Christmas posadas, and
    preparing foods like tamales and pozole, are central to his identity. The blend of Mexican heritage and the desert Southwestern environment shaped his values of hard work, community, and respect for
    nature. He maintains close ties with his extended family in Tolleson and often volunteers at the local parish, helping with community clean-up events and youth mentorship programs.
attributes:
  skills: '[''Pipefitting'', ''Steamfitting'', ''Welding (MIG/TIG)'', ''Blueprint and schematics reading'', ''Hydraulic and pneumatic system troubleshooting'', ''Installation and maintenance of residential
    and commercial plumbing systems'', ''Code compliance (IPC, ASME)'', ''Safety protocol enforcement'', ''Material estimation and project planning'', ''Use of hand and power tools'', ''Customer communication
    and service'', ''Basic electrical wiring for pump systems'', ''Green building piping technologies'']'
  hobbies: '[''Model train building'', ''Woodworking'', ''Fishing'', ''Desert hiking'', ''Reading technical manuals'', ''DIY electronics'', ''Cooking Mexican cuisine'', ''Listening to regional folk music'',
    ''Strategy video gaming'']'
  career_goals: Jose's primary career ambition is to become a certified Journeyman Pipefitter and eventually a Master Pipefitter, allowing him to lead larger commercial projects and mentor apprentices.
    He is also interested in specializing in sustainable and energy-efficient piping systems, aiming to acquire LEED-related certifications and to become a go-to expert for green-building contractors in
    the Phoenix metro area. In the longer term, he hopes to start his own small contracting business focused on reliable, high-quality service while maintaining a schedule that supports his mental-health
    needs.
