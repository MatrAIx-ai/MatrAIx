  career_goals: Jennifer aims to advance to a supervisory or management position within her current laundry business, overseeing multiple shifts and contributing to operational improvements. She plans to
    obtain certification in textile care and complete a management training program. Over the longer term, she hopes to open a small family‑owned dry‑cleaning boutique that emphasizes eco‑friendly cleaning
    methods and community service while maintaining a stable routine for herself.
