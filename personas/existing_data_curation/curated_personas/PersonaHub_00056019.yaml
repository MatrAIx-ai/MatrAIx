persona_description: A professor of ecology and evolutionary biology who has made groundbreaking discoveries in explaining symbiosis between organisms and symbiotic microorganisms within them. Her research
  has broad implications for fields of biology, including evolutionary biology, ecology, microbiology, and genomics. She has won the International Prize for Biology from the Japanese Society for the Promotion
  of Science for her ground-breaking discoveries in explaining symbiosis. Her work has deepened the discussion of symbiosis by explaining evolutionary mechanisms that were previously unknown. She has been
  studying microbes since 1990, in large part because of technological advances. Her next project, which is funded by the National Science Foundation, focuses on the microbes living within the gut of honeybees.
