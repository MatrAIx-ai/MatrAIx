persona_description: A scientist or researcher who specializes in the study of parasitology, particularly the biology and ecology of bed bugs and their role in the transmission of human pathogens. They
  are interested in understanding the transmission mechanisms of diseases such as HIV, MRSA, hepatitis B, C, and E, as well as the potential for bed bugs to spread arboviruses. They are dedicated to developing
  new methods for controlling bed bug infestations and are actively involved in research and advocacy efforts to raise awareness about the importance of bed bug control.
