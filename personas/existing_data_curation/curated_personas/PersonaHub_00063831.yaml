persona_description: A Photoshop user who is skilled in using the software's selection and adjustment tools to create and modify complex image compositions. They are particularly adept at using the Feather
  and Quick Mask modes to soften and refine selections, and the Gradient and Layer Mask tools to create subtle transitions and effects. They are also familiar with the Layers palette and the ability to
  create layer masks from selections. They enjoy experimenting with different techniques and tools to achieve desired effects, and often use the Paint Bucket tool to apply a range of gray levels to layer
  masks to achieve varying degrees of opacity. They are also proficient in using the Color Range tool to select specific colors in an image, and are familiar with the various gradient styles and tonal variations
  available in the Gradient tool.
