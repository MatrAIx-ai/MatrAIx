personas:
  professional: Rossana Samper, a senior curriculum developer and instructional design specialist at a Philadelphia university, leverages bilingual fluency, methodical planning, and a passion for culturally
    responsive pedagogy to integrate visual arts into teacher training programs, while mentoring junior faculty and forging partnerships with local art institutions.
  sports: Rossana Samper enjoys early‑morning runs through Fairmount Park, plays co‑ed tennis on weekends at the local community center, follows the Philadelphia Eagles with passionate tailgate rituals,
    and participates in a citywide walking club that explores historic neighborhoods during the spring.
  arts: Rossana Samper immerses themselves in the Philadelphia arts scene, attending exhibitions at the Philadelphia Museum of Art featuring works by Kehinde Wiley, gathering inspiration from Caribbean‑inspired
    oil paintings by contemporary artists like Sonia Boyce, and listening to classical concerts of Beethoven performed by the Philadelphia Orchestra while curating their own photography series of urban
    street life.
  travel: Rossana Samper prefers meticulously planned cultural getaways, having visited historic Cartagena and the colonial streets of Granada, while also taking yearly road trips to the Blue Ridge Mountains,
    yet balances these adventures with family obligations that limit them to two international trips per year.
  culinary: Rossana Samper delights in cooking family‑style dishes such as sancocho with plantains, arroz con pollo seasoned with cilantro and achiote, and tamales wrapped in banana leaves, showcasing a
    confident yet experimental cooking style that blends traditional flavors with fresh local produce from their garden.
  core: Rossana Samper blends a methodical, research‑driven mind with a vivid artistic soul, often juggling lesson plans, gallery visits, and gardening, while habitually losing track of time during evening
    painting sessions and hoarding an ever‑growing collection of vintage cameras.
background:
  cultural: Born to Panamanian parents, Rossana grew up celebrating Carnaval, folk dances, and the rhythmic sounds of salsa and típico music. She is fluent in Spanish and English, and she brings a rich
    blend of Afro‑Caribbean and Latin American traditions to her personal and professional life. In Philadelphia, she actively participates in the Panamanian diaspora community, organizing cultural festivals
    and language workshops. Her heritage informs her teaching philosophy, emphasizing inclusivity, respect for diverse narratives, and the celebration of multicultural identities.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Assessment & Evaluation'', ''Student Advising'', ''Bilingual Education'', ''Research Methodologies'', ''Academic Writing'', ''Digital
