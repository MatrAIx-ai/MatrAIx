  hobbies: '[''Oil Painting'', ''Visiting Art Galleries'', ''Reading Contemporary Fiction'', ''Exploring Historic Neighborhoods'', ''Cooking Panamanian Cuisine'', ''Community Volunteering'', ''Gardening'',
    ''Hiking'', ''Classical Music Appreciation'', ''Photography'']'
  career_goals: Rossana aims to attain a full professorship and eventually serve as department chair, where she can champion interdisciplinary programs that blend education theory with visual and performing
    arts. She plans to publish influential research on culturally responsive teaching for immigrant and Latino student populations, and to develop community outreach initiatives that bring university resources
    to Philadelphia's Panamanian diaspora. Additionally, she seeks to mentor junior faculty and lead curriculum innovation workshops that encourage unconventional, student‑centered learning experiences.
