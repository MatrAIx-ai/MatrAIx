  career_goals: Donna plans to graduate high school with a solid GPA, enroll in a community‑college program for medical office administration or accounting, and ultimately secure a stable, routine‑oriented
    role such as an office manager or medical records clerk. She is motivated by the prospect of using her organizational strengths to support a workplace while enjoying the predictability and reliability
    these positions offer.
