  hobbies: '[''Abstract Painting'', ''Digital Illustration'', ''Creative Writing (Poetry & Short Stories)'', ''Reading Speculative Fiction and Philosophy'', ''Visiting Art Galleries'', ''Photography (Nature
    & Lake Landscapes)'', ''Bullet Journaling'', ''Meditation & Yoga'', ''Board Games (Strategy)'', ''Volunteer Tutoring'', ''Puzzle Solving (Crosswords, Sudoku)'']'
  career_goals: Gayle aims to transition from her clerical role into a dedicated instructional design position within a forward‑thinking school district or educational technology firm. She plans to pursue
    a master's degree in Curriculum and Instruction to deepen her expertise, and ultimately hopes to become a curriculum specialist who blends artistic and abstract concepts into STEM subjects, creating
    STEAM‑focused learning experiences. In the long term she aspires to lead a team that develops innovative, high‑quality educational resources, and she envisions starting a community‑based nonprofit that
    provides arts‑integrated tutoring for under‑served students in the Lake County area.
