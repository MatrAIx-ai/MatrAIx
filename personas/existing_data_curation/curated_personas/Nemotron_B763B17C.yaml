  hobbies: '[''Gospel choir singing'', ''Cooking Southern cuisine'', ''Hosting brunches'', ''Tech gadget exploration'', ''Women’s book club'', ''Zumba classes'', ''Nature walks'']'
  career_goals: Vierra aims to transition from a billing clerk to a senior billing specialist within the next two years, and ultimately pursue a Revenue Cycle Management leadership role. She plans to complete
    a bachelor's degree in Health Information Management while obtaining certifications such as Certified Billing and Coding Specialist (CBCS) and Certified Revenue Cycle Professional (CRCP). She is motivated
    to spearhead process-optimization projects that reduce claim denials, mentor new staff, and contribute to strategic planning for her organization’s financial health.
