personas:
  professional: Erik Edwards, a 46‑year‑old senior heavy‑vehicle technician, leverages two decades of diesel engine repair, hydraulic diagnostics and meticulous maintenance planning to lead a workshop where
    their methodical logs and competitive drive push junior mechanics toward ASE Master certification while their sociable flair makes them a go‑to presenter at regional trade shows.
  sports: Erik Edwards avidly follows the Carolina Panthers and Atlanta Braves, plays in a local hunting club that fields a seasonal turkey‑hunting league, spends weekends fishing Lake Hartwell for bass,
    and maintains fitness through routine power‑lifting sessions at the community gym, balancing competitive team loyalty with personal outdoor pursuits.
  arts: Erik Edwards enjoys country‑music concerts featuring artists like Luke Bryan, Carrie Underwood and Blake Shelton, collects vintage pickup‑truck memorabilia that doubles as décor, and relaxes by
    watching classic Western films starring Clint Eastwood, letting their talkative nature shine when discussing lyrics or movie scenes.
  travel: Erik Edwards prefers road‑trip itineraries that blend work and leisure, having driven to Montana’s hunting grounds, a weekend fishing lodge in the Florida Keys, and a musical pilgrimage to Nashville,
    while they meticulously budget for fuel and lodging to fund their eventual mobile‑repair shop launch.
  culinary: Erik Edwards is a seasoned grill master who excels at smoked brisket, cedar‑plank trout, and a tangy Southern‑style barbecue sauce made with brown sugar, mustard, and chipotle, often cooking
    for church picnics and family gatherings, though they admit a habit of over‑seasoning with cayenne, earning them the nickname ‘the Spice King’.
  core: Erik Edwards, a 46‑year‑old diesel‑tech with a competitive edge, channels their structured, sociable energy into heavy‑equipment mastery, community grilling, and a relentless push toward entrepreneurship
    despite occasional stress‑driven over‑spending.
background:
  cultural: Erik grew up in a working‑class, white family in rural Pickens County, South Carolina, where community, family loyalty, and a strong work ethic are deeply valued. The region’s Southern heritage—characterized
    by hospitality, church involvement (he attends a local Baptist congregation), and a love of outdoor recreation—has shaped his worldview. Generations of his family have been involved in manual trades,
    giving him early exposure to mechanics and a respect for hands‑on problem solving. This cultural backdrop, combined with the close‑knit small‑town atmosphere, fuels his desire to give back through mentorship,
    community service, and local business ownership.
attributes:
  skills: '[''Diesel engine repair'', ''Hydraulic system diagnostics'', ''Preventive maintenance scheduling'', ''Parts inventory management'', ''Welding and metal fabrication'', ''Blueprint and schematic
    interpretation'', ''Heavy equipment safety compliance'', ''Customer service and communication'', ''Team training and mentorship'', ''Diagnostic software operation'']'
  hobbies: '[''Bass fishing on Lake Hartwell'', ''Deer and turkey hunting'', ''Barbecue grilling and recipe experimentation'', ''Restoring classic pickup trucks'', ''Country music concerts'', ''Volunteer
    fire department participation'', ''Toastmasters public speaking club'', ''Hiking the Blue Ridge Mountains'', ''Home woodworking projects'', ''Attending local high school football games'']'
  career_goals: Erik is driven to advance from a senior technician to a lead service manager, overseeing a team of mechanics at the regional dealership. He plans to earn ASE Master Technician certification
    and a Mobile Equipment Service Technician certification to solidify his expertise. Over the next five years, Erik hopes to open his own mobile repair shop that offers on‑site service for construction
    fleets, emphasizing quick turnaround and safety. He also aspires to develop a structured apprenticeship program for local youth, become a regular presenter at Southern automotive trade shows, and be
    recognized as a go‑to expert for complex heavy‑equipment diagnostics in the Pickens County area.
