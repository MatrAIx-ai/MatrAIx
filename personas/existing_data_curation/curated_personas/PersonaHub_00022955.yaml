persona_description: A rehabilitation professional who is bilingual in Spanish and English, fluent in Spanish, and has a contract with a translation service if needed. They have a deep understanding of
  neuropsychological testing and its application in the aftermath of a brain injury, and are knowledgeable about the different factors that influence cognitive skills. They are skilled in administering
  neuropsychological tests and are able to interpret results in a nuanced and objective manner. They are aware of the misconceptions that patients often have regarding neuropsychological testing and are
  able to provide clear and accurate information on the subject.
