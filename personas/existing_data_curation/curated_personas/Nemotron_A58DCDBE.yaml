personas:
  professional: Jiwoong Park, a seasoned construction supervisor with over 25 years on job sites, blends meticulous schedule planning with pragmatic flexibility that lets them swiftly adapt to on‑the‑fly
    challenges, while leveraging heavy‑equipment expertise, OSHA knowledge, and a natural talent for conflict resolution to keep crews safe and projects on budget, and they are actively pursuing a California
    contractor’s license to launch a specialty‑trade remodel business.
  sports: Jiwoong Park enjoys low‑intensity outdoor pursuits such as weekend hikes with the East Bay Hiking Club, seasonal fishing trips with the Sacramento River Anglers, and follows the Golden State Warriors,
    San Francisco 49ers, and Oakland Athletics, while they rarely join organized team sports beyond occasional pick‑up basketball games at the community center.
  arts: Jiwoong Park channels their creative side through meticulous scale model bridge building and woodworking—drawing inspiration from master craftsmen like Sam Maloof—while also appreciating the timeless
    melodies of Joni Mitchell and the expressive cello works of Yo‑Yo Ma, and they regularly attend local history museum exhibits featuring industrial-era engineering.
  travel: Jiwoong Park prefers thoughtfully planned road trips that blend history and nature, such as a weekend exploring the Pasadena historic districts, a fishing charter in the Columbia River, a wine‑tasting
    tour of Napa Valley, and they keep a bucket‑list destination of the fjords of Iceland, all balanced against family and financial constraints.
  culinary: Jiwoong Park is an enthusiastic home chef who perfects dishes like kimchi fried rice, spicy pork bulgogi, and Galbi (marinated short ribs) using homemade gochujang and fermented cabbage, while
    also experimenting with a cedar‑plank smoked salmon caught from the Delta, showcasing a high cooking skill level that often leads them to host intimate dinner gatherings, and they enjoy sharing the
    aromatic, spice‑rich meals with close friends.
  core: Jiwoong Park is a methodical yet adaptable craftsman‑supervisor who balances a disciplined work ethic with a passion for quiet, hands‑on hobbies, a penchant for occasional splurges on tools, and
    a steady march toward entrepreneurship, and they often spend evenings sketching new bridge designs.
background:
  cultural: Jiwoong is a second‑generation Korean‑American. His parents immigrated from South Korea in the 1970s and settled in the Bay Area, where he grew up bilingual in Korean and English. He observes
    Korean holidays such as Seollal (Lunar New Year) and Chuseok, and maintains cultural traditions like respect for elders and a strong work ethic. While fully integrated into American society, he remains
    connected to Korean community groups, enjoys Korean food, and occasionally watches Korean dramas and listens to traditional music.
attributes:
  skills: '[''Crew Coordination'', ''OSHA Safety Compliance'', ''Construction Blueprint Interpretation'', ''Heavy Equipment Operation'', ''California Building Code Knowledge'', ''Construction Management
    Software (Procore, Buildertrend)'', ''Budget Tracking'', ''Conflict Resolution'', ''Subcontractor Liaison'', ''Concrete Formwork'', ''Site Inspection'', ''Risk Assessment and Mitigation'', ''Adaptable
    Scheduling'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''Scale Model Building'', ''Korean Cooking'', ''Reading Historical Non‑Fiction'', ''Playing Go'', ''Hiking'', ''Volunteer Construction Projects'']'
  career_goals: His primary goal is to obtain a California contractor’s license within the next two years, positioning himself to launch a small specialty‑trade business focused on residential remodels.
    He also aims to become a certified safety trainer, sharing his extensive experience with new workers, and to serve as a mentor for younger crew members. Long‑term, he envisions moving into a senior
    project superintendent role at a larger firm, where he can influence safety culture and project efficiency on a broader scale.
