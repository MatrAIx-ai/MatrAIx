  career_goals: Israel aims to transition from his current general operations role into a senior leadership position where he can shape the culture and strategy of a creative‑focused organization. Within
    the next five years he hopes to become a Director of Operations for a museum, gallery network, or entertainment company that values artistic innovation. He also envisions launching a community‑driven
    arts incubator in East LA, leveraging his managerial skills and cultural knowledge to support emerging Mexican‑American artists. To solidify his credibility, he plans to earn a PMP certification and
    pursue workshops in mindful leadership to manage his anxiety while guiding larger teams.
