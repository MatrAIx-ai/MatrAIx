  career_goals: Although retired from formal employment, Eugene is determined to channel his lifelong curiosity into legacy projects. He aims to author a memoir that weaves personal anecdotes with reflections
    on technological change, and to produce a series of instructional videos on DIY electronics for senior learners. He also aspires to volunteer as a guest lecturer at local community colleges, sharing
    his experience in project management and fostering interdisciplinary thinking. His competitive streak drives him to complete a certification in digital photography, showcasing his artistic side alongside
    his technical skills.
