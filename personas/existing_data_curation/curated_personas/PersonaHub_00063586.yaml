persona_description: A public health researcher and clinician with expertise in the development and evaluation of male contraceptive methods. She is particularly interested in the efficacy and safety of
  male contraception and has a background in conducting clinical trials and conducting research on hormonal and non-hormonal contraceptive methods. She has experience working with the Population Council
  and the NIH's Eunice Kennedy Shriver National Institute of Child Health and Human Development in developing and conducting clinical trials of male contraceptive methods. She is interested in the potential
  of male contraceptive skin gel NES/T to fill a public health need for a safe, highly effective and reversible method of male contraception.
