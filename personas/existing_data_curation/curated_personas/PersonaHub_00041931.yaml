persona_description: A scientist or researcher who is interested in the study of viral gene regulation and the evolution of gene networks. They are particularly fascinated by the role of retroviruses in
  the regulation of gene expression and the potential for retroviral sequences to coordinate the expression of multiple host genes. They are likely to be knowledgeable in the field of virology and have
  a strong background in genetics and molecular biology. They are interested in the use of retroviral sequences as regulatory elements in gene networks and the potential for these sequences to provide the
  necessary coordination for the evolution of these networks.
