personas:
  professional: An experienced environmental and geoscience technician, Gerald Angulo leverages their GIS, Python, and drone‑imaging expertise to design meticulous water‑quality monitoring plans while using
    their organized, collaborative nature to keep multidisciplinary teams on schedule, even as they double‑check data for accuracy due to heightened anxiety.
  sports: An avid outdoors enthusiast, Gerald Angulo cycles weekly with the Lake Worth Cycling Club, joins a co‑ed softball team in the Dallas Metro Softball League during spring, hikes the North Texas
    hills in summer, and roots for the Dallas Cowboys and Dallas Mavericks while maintaining a pragmatic, routine‑driven fitness schedule, and they often log their workouts in a Strava account to track
    progress.
  arts: A reflective musician, Gerald Angulo strums acoustic guitar at weekend jam sessions while savoring live performances by artists such as John Mayer, Jason Isbell, and Texas‑born singer‑songwriter
    Kacey Musgraves, and they occasionally attend theater productions at the Dallas‑based Granada Theater to unwind from work stress.
  travel: A purposeful traveler, Gerald Angulo prefers meticulously planned road trips to nearby national parks like Big Bend and Guadalupe Mountains, interspersed with occasional overseas adventures to
    places such as Costa Rica’s cloud forests and Portugal’s historic towns, balancing a desire for outdoor discovery with family responsibilities and a modest travel budget, and they enjoy documenting
    each journey in a travel journal.
  culinary: A passionate home chef, Gerald Angulo excels at crafting vibrant Tex‑Mex meals—think sizzling chicken fajitas, smoky carne asada, homemade guacamole with ripe avocados, and tangy salsa verde—while
    hosting casual dinner gatherings where they experiment with fresh cilantro, ancho chilies, and a splash of lime.
  core: Gerald Angulo blends meticulous environmental expertise with a love for Texas outdoors, balancing relentless anxiety‑driven attention to detail with a habit of over‑packing hiking gear and a penchant
    for late‑night guitar serenades that they share with friends.
background:
  cultural: Gerald identifies as a white American with deep roots in the Midwestern United States, having moved to the Dallas‑Fort Worth metroplex in his early thirties. His cultural upbringing blends traditional
    suburban values—self‑reliance, punctuality, and a strong work ethic—with distinctive Texan hospitality and community spirit. He celebrates American holidays such as Independence Day and Thanksgiving,
    enjoys regional traditions like Texas BBQ and rodeos, and values the collaborative ethos of his local community. This background informs his pragmatic problem‑solving approach, appreciation for both
    individual initiative and collective action, and his commitment to environmental stewardship.
attributes:
  skills: '[''Groundwater sampling'', ''Surface water quality analysis'', ''Soil contamination assessment'', ''GIS and spatial analysis (ArcGIS, QGIS)'', ''Remote sensing and drone imagery'', ''Data analysis
    (Python, R, SQL)'', ''Laboratory QA/QC procedures'', ''Regulatory compliance (EPA, TCEQ)'', ''Technical report writing'', ''Project coordination'', ''Team leadership'', ''Community outreach and education'']'
  hobbies: '[''Hiking in Cedar Hill State Park'', ''Birdwatching in the Trinity River corridor'', ''Cycling around Lake Worth'', ''Softball league'', ''Volunteering with Habitat for Humanity'', ''Community
    environmental clean‑up events'', ''Playing acoustic guitar'', ''Attending live music concerts'', ''Mindfulness meditation'', ''Journaling'', ''Cooking Tex‑Mex cuisine'']'
  career_goals: Gerald aims to advance to a senior technician or field supervisor role within the next five years, leading large‑scale water‑quality monitoring projects and developing innovative, cost‑effective
    sampling protocols. He plans to obtain professional certifications such as Certified Environmental Professional and Hazardous Materials Technician, and eventually transition into an environmental consulting
    or policy advisory position where he can influence regional water management strategies. Recognizing his sensitivity to stress, he also seeks to cultivate a healthier work‑life balance, incorporate
    regular mindfulness practices, and mentor junior technicians to foster a supportive workplace culture.
