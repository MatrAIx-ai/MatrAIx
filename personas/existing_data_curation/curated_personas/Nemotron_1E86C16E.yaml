    and reporting'', ''Critical thinking'', ''Creative problem solving'', ''Cross‑functional collaboration (small teams)'']'
  hobbies: '[''Visiting art galleries'', ''Photography (nature & urban)'', ''Hiking Appalachian trails'', ''Playing acoustic guitar'', ''Reading non‑fiction (psychology, tech, sociology)'', ''Chess and
