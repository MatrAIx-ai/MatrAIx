persona_description: A professor who specializes in engineering education and is passionate about inspiring and excelling new generations of students in the field of complex systems. He believes that the
  environment in which students learn is just as important as the details of the curriculum and emphasizes the importance of offering students the skills they need to thrive in a constantly changing world.
  He is aware of the decline in the number of engineering degrees awarded in the United States and is determined to ensure that the United States remains a leader in technological innovation and product
  development. He is heartened by the federal government's efforts to encourage more young men and women to pursue degrees in science and engineering and believes that the United States cannot afford to
  fail.
