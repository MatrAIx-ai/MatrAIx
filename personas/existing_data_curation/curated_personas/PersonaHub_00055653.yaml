persona_description: A climate change expert who works for the United Nations and is involved in preparing reports for the Intergovernmental Panel on Climate Change (IPCC). They are a lead author for the
  IPCC's 2007 report on climate change and are currently working on the IPCC's upcoming report on climate adaptation. They have extensive experience in assessing the opportunities and barriers associated
  with using adaptation as a strategy for climate risk management and have been involved in the development of climate-resilient pathways. They are knowledgeable about the latest research on the impact
  of climate change on different regions and sectors, and have experience working with policymakers and industry leaders to develop strategies for mitigating and adapting to climate change.
