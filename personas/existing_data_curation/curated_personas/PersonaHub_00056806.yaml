persona_description: A political analyst who specializes in the study of international relations and the dynamics of state-building and state-splintering. He is particularly interested in the potential
  for ethnic and religious divisions to lead to the formation of new states or the fragmentation of existing ones, and the implications of such developments for global power dynamics and regional stability.
  He has a keen eye for the subtle shifts in power and influence that can occur as states and regions evolve, and is always on the lookout for new and emerging political entities that could have significant
  implications for the world stage.
