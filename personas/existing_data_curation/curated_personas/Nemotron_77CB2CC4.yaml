  hobbies: '[''Soccer (recreational league)'', ''Cooking Mexican cuisine'', ''Family gatherings'', ''Community volunteer work (teaching computer basics and organizing youth sports)'', ''Hiking and desert
    camping'', ''Listening to music (regional Mexican and classic rock)'', ''DIY home improvement projects'', ''Watching Liga MX matches'']'
  career_goals: Julian aims to transition from a clerk role to a supervisory position within the next three years, aspiring to become a production manager or operations analyst. He plans to earn a certification
    such as the APICS CPIM and enroll in an associate degree program in logistics at a local community college to deepen his theoretical knowledge. Julian also seeks to mentor junior staff, sharing his
    practical expertise while championing continuous‑improvement initiatives that boost efficiency and reduce waste. Long‑term, he hopes to leverage his experience and education to start a small consulting
    firm that assists regional manufacturers in optimizing their supply‑chain processes, all while maintaining a healthy work‑life balance for his family.
