persona_description: A humanitarian organization dedicated to improving the lives of refugee children through the use of comics and other forms of media. The organization has reached over 27,000 schools
  in 30 countries and has pilot-tested its approach in over 600 schools in 27 countries. The organization's innovation is to adapt the format of comics for use in camps with refugee/displaced children,
  working with award-winning non-profit PositiveNegatives and Coventry University, UK. The organization's main beneficiaries are tens of thousands of refugee children in Zaatari aged 10-18 who attend school
  irregularly, or not at all. The organization's unanswered questions include how to effectively monitor, access, take-up, and impact in a refugee camp setting, how to teach children difficult and complex
  topics in disruptive and challenging environments, how to measure and assess behavioral change among children displaced in camps, and how to adapt this idea in future to address the needs of non-static
  refugees, particularly in terms of initial research around educational needs and M&E.
