    Santa Maria Valley Fiesta (event coordination)"]'
  career_goals: Sheila aims to advance from her current clerk role to a senior production planner position and eventually become a logistics manager overseeing multiple facilities. Over the next two years
    she plans to earn the APICS Certified Production and Inventory Management (CPIM) credential and deepen her expertise in lean and Six Sigma methodologies. She wants to lead process‑improvement projects
    that reduce lead times and inventory waste, integrating data‑driven decision‑making into the scheduling workflow. Parallel to her operational ambitions, she hopes to blend her love of art with her career
    by moving into production planning for a creative studio or managing a community arts‑supply hub, where she can apply her logistical skills to support artistic projects. Long‑term, she envisions mentoring
    younger employees, especially women in manufacturing, and cultivating stronger organizational habits to mitigate her stress and worry.
