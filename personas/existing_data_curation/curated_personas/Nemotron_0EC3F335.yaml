    (certified)'', ''Customer communication and small-team coordination'']'
  hobbies: '[''Fishing at Lake Harris'', ''Hiking local nature trails'', ''Woodworking (birdhouses, garden benches)'', ''Reading horticulture and sustainability articles'', ''Listening to classic R&B, soul,
    and jazz music'', ''Cooking traditional soul-food recipes'', ''Playing strategy video games'']'
  career_goals: Corey aims to turn his years of hands‑on experience into a small, owner‑operated landscaping business that specializes in eco‑friendly yard makeovers for residential clients in Lake County.
    Over the next two to three years he plans to earn a certified horticulturist credential and a state pesticide applicator license, which will expand his service offerings. He also wants to improve his
    organizational habits so he can manage project schedules more efficiently and build a reliable crew of two to three workers. In five years, he envisions his company being recognized for high‑quality,
    low‑maintenance designs that incorporate native plants, and he hopes to mentor younger landscapers from his community, giving them a path into skilled trades.
