personas:
  professional: Corey Dean is a seasoned groundskeeper turned aspiring eco‑friendly landscaper, blending hands‑on expertise in irrigation, mowing, and native plant selection with a pragmatic yet curious
    mindset that drives them to out‑shine peers through meticulous, low‑maintenance designs while cautiously testing new sustainable methods.
  sports: Corey Dean enjoys early‑morning fishing on Lake Harris, belongs to a local anglers’ club, follows the Tampa Bay Buccaneers and Orlando Magic loyally, and joins a weekend softball league with a
    few close friends, blending solitary sport with light team competition.
  arts: Corey Dean’s artistic palate is set to timeless R&B and soul legends like Marvin Gaye and Aretha Franklin, interspersed with Miles Davis jazz sessions and weekly gospel choirs at the historic neighborhood
    church, while they unwind reading Fine Gardening and collect vintage vinyls that echo their love for rhythm and growth.
  travel: Corey Dean favors spontaneous road trips in a modest sedan, often heading to the Florida Keys for sunset fishing or the Everglades for kayaking, while dreaming of a soul‑stirring weekend in New
    Orleans during Jazz Fest, balancing low‑budget exploration with occasional longer getaways to Asheville for mountain hikes.
  culinary: Corey Dean’s kitchen is a blend of southern soul‑food comforts—collard greens sautéed with smoked turkey, crispy fried catfish, buttery cornbread, and sweet potato pie—crafted with modest culinary
    skill and a growing habit of planting fresh herbs to garnish their dishes, reflecting both tradition and a budding green palate.
  core: Corey Dean merges quiet curiosity with pragmatic craftsmanship, driving a competitive push toward eco‑friendly landscaping while navigating occasional disorganization, impulse tool splurges, and
    a love for solitary sunrise fishing.
background:
  cultural: As an African‑American raised in central Florida, Corey’s cultural identity is shaped by a blend of Southern Black traditions and the multicultural environment of Lake County. He grew up attending
    a historically Black church where gospel music, communal meals, and storytelling reinforced values of resilience, mutual support, and respect for elders. Family gatherings often featured soul‑food cooking,
    with dishes like collard greens, fried fish, and sweet potato pies that connect him to his roots. The local Black community’s emphasis on hard work and craftsmanship influenced his pride in skilled
    trades. Though he is comfortable in small social circles, he maintains a strong sense of cultural pride, celebrating Juneteenth and occasionally participating in neighborhood clean‑up events that reflect
    a commitment to community uplift.
attributes:
  skills: '[''Lawn mowing and edging'', ''Irrigation system troubleshooting and repair'', ''Plant selection for hot, humid climates'', ''Native and drought-tolerant landscaping'', ''Equipment operation
