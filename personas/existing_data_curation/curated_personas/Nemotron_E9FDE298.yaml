personas:
  professional: Brittany Frank, a proficient maintenance specialist, leverages their electrical, HVAC, and plumbing expertise along with meticulous preventive‑maintenance scheduling to keep commercial facilities
    humming, while their curiosity for smart‑home tech and methodical organization fuel a drive toward LEED‑certified facility management and a future eco‑friendly handyman business that mentors women in
    the trades.
  sports: An avid outdoors enthusiast, Brittany Frank tackles the Savannah River trails for weekend hikes, plays competitive badminton at the local community center, cheers for the Savannah Bananas baseball
    team and tunes into Atlanta Braves games, and belongs to the Savannah River Hiking Club, blending active recreation with community spirit.
  arts: With a flair for performance, Brittany Frank leads karaoke sing‑alongs at the neighborhood bar, shines on the line‑dancing floor to classics by Dolly Parton and Johnny Cash, and frequents craft
    fairs to collect quilting patterns, while also appreciating the soulful blues of B.B. King and the theatrical productions at the Savannah Playhouse.
  travel: A weekend‑trip planner, Brittany Frank prefers road‑tripping with friends using a detailed itinerary app, has explored historic Charleston, SC, and Asheville, NC, dreams of savoring New Orleans
    gumbo and touring Tuscany’s vineyards, and balances travel ambitions with a modest budget and responsibilities at work, often opting for eco‑friendly lodging and short‑duration stays.
  culinary: An enthusiastic home chef, Brittany Frank cultivates tomatoes, collard greens, and sweet potatoes in their garden, then whips up Southern‑style shrimp and grits, fried chicken with pepper‑corn
    gravy, and pecan pie using cast‑iron skillets, while experimenting with rosemary‑infused barbecue rubs and baking buttery biscuits, showcasing a solid intermediate cooking skill set.
  core: Brittany Frank blends hands‑on practicality with a charismatic social spark, juggling DIY home repairs, community karaoke, and eco‑forward ambitions while never missing a garden harvest or a chance
    to lead the line‑dance circle.
background:
  cultural: Brittany grew up in a close‑knit, middle‑class family in rural Georgia, attending the local public high school before entering the workforce. The Southern hospitality and strong community ties
    of the Evans area shaped her values of reliability, hard work, and friendliness. Regular church attendance and participation in neighborhood events reinforced a sense of togetherness and service. While
    she respects traditional customs, her natural curiosity drives her to explore new ideas and technologies, blending the region’s heritage with modern, practical solutions.
attributes:
  skills: '[''Electrical troubleshooting'', ''HVAC maintenance'', ''Plumbing repairs'', ''Preventive maintenance scheduling'', ''Tool inventory management'', ''Reading technical schematics'', ''Customer
    service'', ''Team coordination'', ''Safety compliance'', ''Basic carpentry'', ''Smart home system installation'']'
  hobbies: '[''Gardening'', ''DIY home improvement'', ''Cooking Southern cuisine'', ''Karaoke'', ''Community volunteer work'', ''Line dancing'', ''Hiking'', ''Playing badminton'', ''Quilting and crafting'',
    ''Attending craft fairs'']'
  career_goals: Brittany aims to transition from a hands‑on maintenance role to a supervisory or facility‑manager position within the next five years. She plans to earn certifications in HVAC (EPA), electrical
    safety (OSHA), and green building (LEED) to broaden her expertise. Her long‑term ambition is to lead a maintenance team for a commercial property or corporate campus, implementing efficiency‑focused
    preventive‑maintenance programs that cut downtime and energy costs. Eventually, she hopes to launch her own small‑scale handyman business that emphasizes eco‑friendly repairs and to mentor other women
    entering the skilled‑trade fields.
