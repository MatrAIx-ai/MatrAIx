persona_description: A software developer who is experienced in designing and implementing software solutions using various design patterns. They are familiar with the benefits and drawbacks of each pattern
  and can apply them appropriately in their projects. They have a deep understanding of the context and problem they are solving and are able to identify the core solution to the problem, which is the essence
  of the pattern. They are careful not to implement a pattern in the wrong situation or place, as it can lead to unnecessary complexity. They are also familiar with the different categories of design patterns
  and can identify the appropriate pattern for the problem they are solving.
