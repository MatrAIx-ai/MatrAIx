persona_description: A researcher or therapist who is interested in the study of autism and its neurological underpinnings, particularly in the context of repetitive behaviors and their impact on social
  functioning. They are particularly interested in understanding the brain systems involved in behavioral flexibility and how they may be altered in individuals with autism. Their research may involve functional
  magnetic resonance imaging (fMRI) to examine brain activity associated with behavioral flexibility and the use of behavioral studies to test hypotheses about the dysfunction of these systems. They are
  likely to have expertise in the cognitive model of impaired set-shifting and altered reward processes, and may be interested in exploring the implications of these theories in the context of autism.
