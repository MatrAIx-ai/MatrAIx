  career_goals: Although officially retired, Chau aims to remain intellectually active by mentoring under‑represented youth in STEM, contributing occasional code snippets to open‑source projects focused
    on low‑power devices, and documenting his professional journey in a memoir that blends technical insights with his immigrant experience. He also hopes to lead a small community workshop on basic electronics
    for seniors, fostering inter‑generational learning while preserving his practical curiosity.
