  career_goals: Though still early, William dreams of turning his love for art and the ocean into a career. He hopes to become a concept artist for video games or animated films that feature realistic marine
    environments, or alternatively to work as a marine researcher who communicates scientific findings through compelling visuals. He aims to win youth art competitions, develop a strong portfolio, and
    eventually study graphic design or environmental science in high school.
