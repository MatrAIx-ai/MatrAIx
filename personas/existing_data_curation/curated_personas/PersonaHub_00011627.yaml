persona_description: A Bulgarian historian who specializes in the study of medieval Bulgarian history, particularly the reign of Ivan Shishman. His research interests include the political, social, and
  cultural aspects of the Third Bulgarian State, as well as the legacy and impact of Ivan Shishman on Bulgarian history and culture. He is known for his critical assessments of Ivan Shishman's reign and
  for his contributions to the study of Bulgarian history and culture.
