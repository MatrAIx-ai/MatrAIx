personas:
  professional: Eagerly exploring the world of building blocks, Norman Mountford, a four-year-old preschooler, displays a methodical, organized approach to constructing Lego towers and pretends to be a
    junior engineer, balancing curiosity with practical problem-solving while proudly sharing his creations with a small circle of playmates.
  sports: Norman Mountford bursts onto the playground as a member of the 'Little Lions' preschool soccer squad, eagerly dribbling a size-2 ball, while also enjoying early-morning tumble-time at the community
    gymnastics club, and prefers watching the local professional baseball team, the City Cubs, on TV.
  arts: Norman Mountford finds joy in sketching bright dinosaurs and listening to the whimsical tunes of 'The Muppets', often humming the lullaby from Disney's 'Frozen' while arranging his crayons in rainbow
    order, and delights in watching animated films by Pixar.
  travel: Norman Mountford loves short family excursions, especially trips to the nearby zoo where he meticulously maps out the elephant enclosure, and dreams of visiting Disneyland's 'Fantasyland' someday,
    preferring well-planned itineraries over spontaneous adventures.
  culinary: Norman Mountford prefers comfort foods like cheesy macaroni and chicken nuggets, proudly sprinkling his own shredded mozzarella and occasionally sneaking broccoli florets into his plate, while
    his small hands deftly stir batter for pancake mornings, yet he often refuses peas, citing a 'bunny taste.'
  core: At four, Norman Mountford blends a curious, methodical mind with a shy, worry-prone heart, meticulously organizing toys, saving pennies, and navigating comfort zones with a blend of careful planning
    and occasional anxious bursts.
background:
  cultural: Norman lives in Elkhorn, a suburban community in Douglas County, Nebraska, where Midwestern values of modesty, friendliness, and community involvement are everyday norms. His family's white,
    largely European‑American heritage traces back to ancestors who settled the region's farms, bringing traditions of hard work, respect for the land, and seasonal celebrations such as county fairs, harvest
    festivals, and church gatherings. These cultural influences shape his appreciation for the outdoors, his habit of helping with simple chores, and his polite, considerate demeanor.
