    playdates'']'
  career_goals: Although still very young, Norman frequently talks about helping animals and building things that keep people safe. He dreams of becoming a veterinarian who cares for farm animals and pets,
    and he also imagines designing sturdy play structures as an engineer. These ambitions reflect his caring nature, love for order, and curiosity about how things work.
