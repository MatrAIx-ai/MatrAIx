personas:
  professional: Courtland Costa is a meticulous teenage illustrator who blends digital concept art with traditional sketching, leveraging their organized project‑planning skills and empathetic listening
    to create mood‑rich visuals for indie game prototypes while volunteering as a youth art mentor.
  sports: Courtland Costa enjoys weekend hikes with the Eagle Creek Trail Club, follows the Indiana Pacers and Indianapolis Colts with enthusiastic game‑day rituals, and balances solitary cardio sessions
    with occasional pick‑up basketball at the community center, prioritizing low‑impact activities that soothe anxiety.
  arts: Courtland Costa immerses in graphic novels by Marjane Satrapi, draws inspiration from illustrator Alan Lee and filmmaker Hayao Miyazaki, collects vinyl records from Sufjan Stevens and The National,
    and spends evenings strumming acoustic renditions of their favorite tracks while sketching character studies.
  travel: Courtland Costa prefers low‑key road trips to nearby Indiana Dunes and Chicago’s art districts, dreams of backpacking through the Irish countryside, and plans each adventure with meticulously
    drafted itineraries that balance photography opportunities with budget constraints.
  culinary: Courtland Costa favors cooking simple comfort foods like homemade mac & cheese with sharp cheddar and garlic, experiments with avocado toast topped with chili flakes and poached egg, and indulges
    in almond‑butter banana smoothies while savoring the occasional artisanal craft beer.
  core: Courtland Costa is a quiet, curiosity‑driven teen whose artistic talent, methodical nature, and deep empathy coexist with an undercurrent of anxiety that fuels both creative intensity and occasional
    self‑sabotage.
background:
  cultural: Courtland grew up in Zionsville, Indiana, a historic, affluent suburb of Indianapolis known for its small‑town charm and strong sense of community. His family is of German and Irish ancestry,
    reflecting the broader Midwestern European heritage common in the area. The local culture emphasizes modesty, hard work, and community involvement, values that were reinforced through participation
    in church youth groups, school‑based art clubs, and town events like the Zionsville Art Walk and county fair. While his environment is predominantly white and traditionally Midwestern, his parents encouraged
    exposure to diverse ideas and artistic expression, nurturing his curiosity about the wider world.
