  career_goals: Courtland aspires to attend a specialized art program where he can refine his illustration skills and eventually work as a concept artist for video games or an art therapist who uses creative
    techniques to support adolescents coping with anxiety. In the short term, he aims to build a strong portfolio, secure freelance commissions for local businesses, and volunteer as a youth art mentor.
    He also hopes to study psychology or counseling in college to combine his artistic talent with a desire to help others manage emotional distress.
