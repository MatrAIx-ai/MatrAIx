personas:
  professional: An experienced library and digital preservation specialist named Jose Pinon leverages their STEM background, Python scripting, and bilingual expertise to build open‑access archives of community
    heritage, while their spontaneous curiosity drives innovative outreach but often leads them to scramble deadlines without rigid structures.
  sports: Jose Pinon follows the Miami Heat and the Tampa Bay Rays, participates in a senior community walking club that meets twice weekly at a local nature preserve, enjoys weekend bird‑watching hikes,
    and occasionally joins low‑impact salsa fitness classes, though they rarely commit to a structured training regimen.
  arts: Jose Pinon plays conga drums at family gatherings, leads salsa evenings at the community center, treasures the works of Celia Cruz, Buena Vista Social Club, and contemporary visual artist Olafur
    Eliasson, and blends these influences when conducting art‑appreciation workshops for seniors, despite sometimes losing track of time during improvisational jam sessions.
  travel: Jose Pinon prefers immersive, music‑rich trips, having explored Havana's historic plazas, the vibrant streets of New Orleans, the Caribbean islands of Trinidad and Barbados, and the Florida Keys'
    coral reefs, often planning itineraries spontaneously while balancing a modest travel budget that prioritizes cultural festivals over luxury accommodations.
  culinary: Jose Pinon cooks traditional ropa vieja and picadillo with a twist—adding smoked paprika and local citrus zest—while experimenting with Caribbean‑Southern fusion dishes like plantain‑crusted
    catfish and mojo‑marinated pork, skillfully juggling a modest home kitchen but occasionally burning the garlic when they get distracted tending to their orchid garden.
  core: Jose Pinon is a curious, music‑loving librarian who fuses technology and heritage, spends impulsively on vintage audio, battles hypertension with home monitoring, and navigates life with spontaneous
    energy tempered by occasional disorganization.
background:
  cultural: Jose was born to Cuban immigrants who settled in Hialeah during the Mariel boatlift era. Growing up in a close‑knit Spanish‑speaking household, he absorbed the rhythms of Afro‑Cuban percussion,
    the aromas of home‑cooked meals, and the values of family loyalty and community solidarity. He celebrates Cuban traditions such as Carnaval on Calle Ocho, participates in local parades, and maintains
    strong ties with relatives in Cuba through regular video calls. Bilingualism is central to his identity; he effortlessly switches between Spanish and English, enabling him to serve both longstanding
    Cuban residents and newer, diverse patrons at the library. Jose’s cultural heritage informs his professional passion for preserving and sharing Cuban-American stories, and it fuels his commitment to
    creating inclusive spaces where art, history, and technology intersect.
attributes:
  skills: '[''Cataloguing'', ''Metadata Management'', ''Digital Archiving'', ''Digitization of Audio/Visual Media'', ''Python Scripting for Workflow Automation'', ''Integrated Library Systems (Koha, Evergreen)'',
    ''Digital Repository Development (Omeka)'', ''Bilingual Reference Services (Spanish/English)'', ''Information Literacy Instruction'', ''Community Outreach and Program Development'', ''Creative Exhibit
    Design'', ''Data Analysis for Collection Development'', ''Multimedia Equipment Operation'']'
  hobbies: '[''Playing conga drums'', ''Salsa dancing'', ''Cooking Cuban and fusion cuisine'', ''Reading science-fiction'', ''Exploring emerging technology (VR, AI)'', ''Restoring vintage audio equipment'',
    ''Gardening (citrus, orchids)'', ''Bird-watching in local nature preserves'', ''Volunteering at senior centers with art workshops'']'
  career_goals: Jose envisions transforming his library into a regional hub for digital preservation of Cuban-American cultural heritage. He aims to secure grant funding for a community oral‑history project
    that records the stories of older Cuban immigrants in Hialeah and Broward County, and to develop an open‑access digital archive for those recordings. Over the next five years, he hopes to lead a cross‑departmental
    team that integrates AI‑enhanced search tools into the library’s catalog, making resources more discoverable for patrons. He also aspires to mentor emerging librarians, particularly those from bilingual
    backgrounds, and to serve on the state’s library advisory board to advocate for inclusive, technology‑forward services. Ultimately, Jose wants to retire knowing he has left a lasting, innovative legacy
    that bridges technology, art, and his cultural roots.
