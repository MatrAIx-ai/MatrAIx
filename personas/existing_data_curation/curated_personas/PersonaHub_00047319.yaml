persona_description: A pediatric therapist who specializes in the development and growth of children, particularly focusing on the physical, social, emotional and intellectual realms. They have a deep understanding
  of the stages of development from infancy to age three and the importance of physical movement and development in this period. They are knowledgeable about the role of the environment in influencing the
  brain and body, and are skilled in working with children to facilitate their physical, social, emotional and intellectual growth. They are dedicated to promoting healthy development in children and are
  passionate about understanding the complex interplay between the body, brain and environment.
