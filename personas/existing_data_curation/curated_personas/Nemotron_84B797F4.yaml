  career_goals: Kumar aims to finish high school with strong grades, secure a scholarship in computer science, and eventually become a software engineer or developer. He envisions working on user-friendly
    applications that solve everyday problems, while also staying connected to his community through mentorship programs. Long-term, he hopes to start a tech-focused nonprofit that offers coding workshops
    for under-represented youth in South Florida.
