  career_goals: Although retired from formal employment, Bobby aims to leverage his business expertise to benefit local nonprofits and small enterprises. He aspires to serve on advisory boards for community
    organizations, mentor budding entrepreneurs, and lead fundraising initiatives for charitable causes. Bobby also hopes to author a practical guide on sustainable budgeting for seniors and to contribute
    to local historical societies by helping preserve and promote regional business heritage.
