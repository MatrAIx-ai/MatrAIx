persona_description: A veterinary behaviorist who specializes in understanding and treating neurological diseases in cats, particularly those associated with senility. Their expertise includes diagnosing
  and treating conditions such as senile behavior, azotemia-related restlessness, metabolic causes, cerebrovascular accidents, congenital anomalies, hepatic encephalopathy, and FIP. They also have knowledge
  and experience in treating seizures, compulsive circling, and altered behavior caused by neurological disease in cats.
