  career_goals: Long Eric aspires to leverage his extensive technical background to shape strategic technology initiatives that empower Alaska Native communities, focusing on sustainable digital infrastructure
    and the integration of traditional ecological knowledge into modern data systems. He aims to transition into a senior advisory or chief technology officer role within a public agency or non‑profit dedicated
    to indigenous tech empowerment, while continuing to mentor emerging developers and champion inclusive, collaborative cultures. Long also hopes to contribute to open‑source projects that address climate
    resilience and remote community connectivity in the Arctic region.
