personas:
  professional: Long Zaveri is a senior software architect specializing in distributed, cloud‑native systems for public‑sector infrastructure, leveraging three decades of Python, C++, and AWS expertise
    while blending a structured, detail‑oriented mindset with a spontaneous, collaborative flair that sometimes leads to missed deadlines but fosters innovative, community‑focused solutions, and they inspire
    their teams through mentorship and inclusive leadership.
  sports: Long Zaveri spends weekends hiking the Chugach Mountains, kayaking the Knik Arm, and fishing for salmon, and they root for the Seattle Seahawks in football, the Seattle Kraken in hockey, and belong
    to the Anchorage Canoe Club where they paddle with fellow enthusiasts.
  arts: Long Zaveri regularly drums in community circles, organizes traditional dance workshops for youth, and they find inspiration in the folk sounds of Sufjan Stevens, the storytelling of Lin‑Manuel
    Miranda’s musical Hamilton, and the evocative photographs of Ansel Adams, reflecting a deep appreciation for both heritage and contemporary art.
  travel: Long Zaveri prefers adventure‑laden yet thoughtfully planned trips, having kayaked through the Inside Passage in British Columbia, trekked Denali National Park, and dreams of exploring Iceland’s
    Westfjords and the remote archipelago of Svalbard, and they balance modest budgeting with occasional splurges on guided wildlife tours.
  culinary: Long Zaveri enjoys cooking grilled wild‑caught salmon with dill and lemon, simmering hearty halibut chowder with potatoes and seaweed, and whipping up huckleberry pancakes topped with locally
    sourced maple syrup, and they showcase a moderate cooking skill level enhanced by a love for fresh, sustainable ingredients.
  core: Long Zaveri is a pragmatic yet spontaneously generous technologist who blends a love for rugged Alaskan outdoors, community drumming, and open‑source development, and they occasionally forget to
    file tax receipts and battle a stubborn habit of over‑packing for weekend trips.
background:
  cultural: Long Eric identifies as an Alaska Native of Yup'ik heritage, raised in Anchorage but deeply connected to his family's village roots. Growing up, he was immersed in oral storytelling, subsistence
    practices, and the values of stewardship and collective well‑being that characterize his community. He actively participates in cultural preservation efforts, such as language revitalization programs
    and intergenerational knowledge sharing. By bridging his technical expertise with indigenous perspectives, he seeks to create solutions that benefit both his people and the broader Alaskan environment.
