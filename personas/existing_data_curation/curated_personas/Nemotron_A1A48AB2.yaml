personas:
  professional: Wanda Harness, a 96‑year‑old private investigator with six decades of experience, leverages meticulous paper records, analog photography, and a disciplined, low‑tech approach to surveillance,
    blending the self‑reliance and community responsibility she learned in her youth with a quiet, solitary focus that makes her a trusted mentor to younger detectives.
  sports: Wanda Harness, a lifelong fan of the Tampa Bay Buccaneers and the Florida Gators, enjoys leisurely morning walks on the Gulf Coast beach and participates in a senior walking club that meets twice
    a week, while occasionally joining local senior bowling nights for friendly competition.
  arts: Wanda Harness immerses herself in classic detective novels by Agatha Christie and Dashiell Hammett, listens to the crooning of Frank Sinatra and Ella Fitzgerald while knitting, and occasionally
    attends community theater productions of classic mystery plays, finding that the suspenseful narratives echo her own investigative mindset.
  travel: Wanda Harness, who has taken a nostalgic road trip to the Blue Ridge Mountains, a guided cruise to Bermuda, and a pilgrimage to Washington, D.C.’s National Archives, prefers meticulously planned
    itineraries that balance gentle sightseeing with ample rest stops, and dreams of a quiet riverboat tour of the Mississippi in her golden years.
  culinary: Wanda Harness delights in cooking shrimp and grits, fresh garden salads tossed with herbs from her garden, and baking key lime pie, favoring the simple comfort of homemade biscuits and sweet
    tea, while acknowledging a guilty pleasure for extra sugar in her evening tea.
  core: Wanda Harness, a 96‑year‑old solitary sleuth with a disciplined low‑tech methodology, frugal finances, proactive health habits, and a lifelong love for puzzles, roses, and classic mysteries, lives
    by a creed of self‑reliance and quiet dedication, even as occasional forgetfulness and a stubborn coffee habit color her days.
background:
  cultural: Born in the Midwest in 1929, Wanda grew up in a modest, Protestant household that emphasized self‑reliance, hard work, and community responsibility. Moving to Panama City, Florida, in her early
    adulthood, she assimilated the coastal Southern lifestyle, appreciating the region’s slower pace and respect for privacy. Her white American heritage, shaped by mid‑century social norms, fostered a
    strong sense of duty and respect for law and order, which later informed her career in private investigation. While she values Southern hospitality, she prefers the quiet of her own space, reflecting
    a lifelong balance between communal ties and personal solitude.
attributes:
  skills: '[''Surveillance and observation'', ''Interviewing techniques'', ''Case file organization'', ''Evidence gathering and preservation'', ''Report writing and documentation'', ''Knowledge of Florida
