  hobbies: '[''Reading classic detective novels'', ''Solving jigsaw puzzles'', ''Birdwatching'', ''Gardening (especially roses)'', ''Knitting'', ''Journaling'', ''Walking on the beach at sunrise'', ''Playing
    chess alone'']'
  career_goals: Even at 96, Wanda aims to leave a lasting professional legacy. She seeks to mentor a select group of emerging investigators, passing on her disciplined, structured approach to casework.
    She plans to author a memoir that chronicles notable investigations and the evolution of private detection, emphasizing ethical rigor. Additionally, she hopes to resolve lingering cold cases in Bay
    County, ensuring justice for victims and their families before she fully retires.
