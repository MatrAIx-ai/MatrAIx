    techniques'']'
  hobbies: '[''Cooking traditional Mexican dishes (with fusion twists)'', ''Learning acoustic guitar'', ''Sketching street scenes and cultural symbols'', ''Reading YA fiction and social-justice literature'',
    ''Hiking in the Franklin Mountains'', ''Volunteering at a community garden'', ''Mentoring middle-school students'', ''Mindfulness meditation and journaling'', ''Creating bilingual mental-health content
    for Instagram'']'
  career_goals: Oria aspires to earn a bachelor’s degree in Social Work or Community Health and eventually become a licensed clinical social worker specializing in mental‑health services for Latinx youth
    and immigrant families in the El Paso region. In the short term, she plans to transfer to a four‑year university, secure an internship with a local nonprofit that provides counseling and advocacy, and
    complete a certification in trauma‑informed care. Long‑term, she envisions opening a community‑center program that offers bilingual counseling, peer‑support groups, and culturally relevant workshops
    on stress management and resilience. She also hopes to combine her curiosity for research with practical impact by conducting community‑based studies on the mental‑health needs of border‑area adolescents,
    using the findings to inform policy and outreach strategies.
