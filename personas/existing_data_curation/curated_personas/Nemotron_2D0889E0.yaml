personas:
  professional: Oria Wingate is a bilingual community outreach volunteer whose skill set blends peer counseling, event planning, and digital storytelling, and whose compassionate, curiosity-driven yet relaxed
    approach lets them improvise solutions for youth mental-health initiatives while occasionally juggling multiple tasks in a disorganized but heartfelt way.
  sports: Oria Wingate hikes the Franklin Mountains most weekends with the Rio Grande Hiking Club, casually follows the El Paso Locomotive FC soccer team, and joins pick-up volleyball games at a community
    center, using these varied activities as primary outlets for stress relief and social connection.
  arts: Oria Wingate spends evenings teaching themselves acoustic guitar with folk classics by Bob Dylan and Joan Baez, sketches bustling street corners in a pocket notebook echoing Edward Hopper's urban
    scenes, and creates short bilingual Instagram reels that blend mental-health advice with lyrical storytelling, weaving music, visual art, and advocacy into their creative identity.
  travel: Oria Wingate prefers low-cost weekend road trips, often planning spur-of-the-moment getaways to nearby cultural hubs like Santa Fe for art markets, sunrise hikes in the Rio Grande Valley, and
    dreams of a future backpacking adventure through Oaxaca's culinary scene once a scholarship for a study-abroad program becomes available.
  culinary: Oria Wingate enjoys cooking family staples such as tamales, pozole, and mole, frequently adding Tex-Mex twists like chipotle-infused mole or queso fresco garnish, and while their kitchen skill
    sits between enthusiastic home-cook and budding chef, they meticulously blend dried chilies, masa harina, and fresh cilantro—though occasional rushed servings sometimes lead to a charred edge.
  core: Oria Wingate balances restless curiosity for social change with a laid-back, sometimes chaotic schedule, constantly juggling community projects, guitar practice, and spontaneous cooking experiments
    while battling a chronic worry that fuels both their compassion and occasional procrastination.
background:
  cultural: Oria was born and raised in El Paso, Texas, in a family that maintains strong ties to its Mexican roots. Her parents immigrated from Chihuahua, and Spanish is spoken at home alongside English,
    giving her a fluent bilingual fluency that she feels is central to her identity. Family gatherings are punctuated by celebrations of Día de los Muertos, La Posada, and quinceañeras, where traditional
    music, foods, and storytelling reinforce a sense of cultural pride. Growing up on the U.S.–Mexico border has exposed her to a blend of American and Mexican influences; she regularly crosses into Ciudad Juárez
    to visit relatives, shop at mercados, and attend cultural festivals. This bicultural environment has taught her the value of “familia” and “respeto,” and it fuels her commitment to serve the Latino
    community. She balances Catholic traditions with a more secular, community‑focused worldview, often participating in local church‑based service projects as well as secular nonprofit initiatives. The
    dynamic mix of languages, cuisines, and social expectations in El Paso shapes Oria’s worldview, fostering both her curiosity about diverse perspectives and her practical desire to bridge gaps between
    cultures.
