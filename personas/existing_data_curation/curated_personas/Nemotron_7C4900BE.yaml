personas:
  professional: An aspiring little architect, Marita Roberson meticulously assembles block towers and then joyfully deconstructs them into new designs, channeling their love for structure with their spontaneous
    playfulness while leading their friends in collaborative building sessions, and they thrive when their peers join the fun.
  sports: A lively sports enthusiast, Marita Roberson kicks balls at the Little Stars Soccer Club during spring, splashes through swim lessons in the summer, proudly wears a Chicago Cubs cap while cheering
    for the team on game days, and they always high-five teammates after a good play.
  arts: A creative little artist, Marita Roberson loves drawing bright dinosaurs, singing along to Raffi's 'Baby Beluga', and watching Pixar's 'Toy Story' featuring Tom Hanks, which fuels their imagination
    during playtime, and they often share their drawings with friends eager for a show-and-tell.
  travel: An adventurous traveler, Marita Roberson enjoys family trips to the local zoo, dreams of exploring Disney World in Florida, delights in building sandcastles on the beaches of Myrtle Beach during
    summer vacations, and they love collecting postcards from each destination.
  culinary: A budding foodie, Marita Roberson adores cheesy pizza slices, carefully spreads peanut butter and jelly on their own sandwiches, proudly sprinkles chocolate chips onto cupcakes they help bake,
    often insisting on adding fresh strawberries as a topping, and they taste-test each bite with a grin.
  core: Marita Roberson is a playful five-year-old who balances a love for orderly block towers with spontaneous dance breaks, hoards a secret stash of crayons, constantly shares stickers, and they occasionally
    forget to tidy up their toys.
background:
  cultural: Marita grows up in Saint Peters, a suburban community in St. Charles County, Missouri. Her family’s cultural background reflects typical Midwestern American values such as friendliness, community
    participation, and respect for routine. She celebrates national holidays like Thanksgiving, Christmas, and the Fourth of July with family gatherings, seasonal foods, and community events. Her household
    attends a local place of worship, which provides regular services and children’s programs that reinforce values of cooperation and kindness. She attends a public elementary school where multicultural
    lessons introduce her to diverse traditions, while her immediate family maintains traditions passed down through generations, such as birthday cakes baked at home and seasonal crafts. This blend of
    local community life, school experiences, and family customs shapes her sense of belonging and identity.
