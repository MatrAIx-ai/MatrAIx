  career_goals: Although she is only five, Marita already talks about the jobs she might want when she grows up. She dreams of becoming a teacher because she enjoys helping friends learn, likes the idea
    of a structured classroom, and feels proud when she can explain something clearly. She also imagines being a veterinarian, inspired by her love for animals she sees at the local park and in picture
    books, and she wants to care for pets that need help. Occasionally she mentions being an artist, reflecting her enjoyment of drawing and painting. Overall, her ambitions combine a desire to help others,
    a comfort with organized settings, and an interest in creative expression.
