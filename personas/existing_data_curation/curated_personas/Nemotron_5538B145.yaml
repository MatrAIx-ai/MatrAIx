  hobbies: '[''Hiking'', ''Kayaking'', ''Hula dancing'', ''Gardening'', ''Traditional cooking'', ''Volunteer work at cultural festivals'', ''Crossword puzzles'', ''Reading historical fiction'']'
  career_goals: Nympha aims to advance to a supervisory role, such as sergeant, within the next five years, where she can lead a team focused on community safety and cultural sensitivity. She plans to obtain
    advanced certification in crisis negotiation and to develop a dedicated outreach program that connects the Polynesian community in Pierce County with law‑enforcement resources. Mentoring new recruits
    and shaping departmental policies that promote equitable policing are long‑term ambitions, ultimately positioning her as a strategic advisor for community‑focused security initiatives.
