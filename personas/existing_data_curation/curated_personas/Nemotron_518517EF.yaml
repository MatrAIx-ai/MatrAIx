personas:
  professional: David Grace is a high‑school junior who channels a practical, team‑oriented mindset into leadership roles on the basketball court and volunteer projects, while they meticulously plan to
    earn a GED, pursue a vocational apprenticeship as an electrician, and keep a potential military pathway as a backup, leveraging their strong organizational skills and hands‑on problem solving to thrive
    in structured environments.
  sports: David Grace dominates pick‑up basketball games at Riverside Park, rides the downtown skatepark with the local crew dubbed ‘SkateSquad’, follows the NBA’s Chicago Bulls for inspiration, and spends
    summer afternoons training with the high‑school varsity basketball team, embodying a blend of competitive drive and community camaraderie.
  arts: David Grace fuels creativity by crafting hip‑hop beats on FL Studio, drawing inspiration from producers like Metro Boomin and rappers such as Kendrick Lamar, while winding down to R&B legends like
    H.E.R., and immerses themselves in graphic novels including 'Saga' and 'Maus' for storytelling ideas.
  travel: David Grace prefers short, budget‑friendly road trips, having explored the Grand Canyon and the historic streets of New Orleans, while dreaming of a study‑abroad stint in Berlin to experience
    its famed street‑art scene, balancing adventure with the constraints of school schedules and limited funds.
  culinary: David Grace enjoys cooking simple yet hearty dishes like chicken quesadillas with fresh cilantro, stovetop mac and cheese topped with bacon bits, and experimenting with spicy ramen using Sriracha
    and miso, showcasing a modest culinary skill set that impresses friends during late‑night study sessions.
  core: David Grace blends a restless love for basketball, beats, and community service with a disciplined eye on future trade training, yet battles recurring anxiety that fuels both diligent planning and
    occasional over‑cautiousness.
background:
  cultural: David grows up as a Black teenager in Lowell, MA, a city with a rich tapestry of immigrant and African‑American histories. His family maintains strong ties to church and local Black cultural
    traditions, including gospel music, community rallies, and celebrations of African American heritage. He participates in neighborhood events such as the Lowell African American History Month program
    and often hears stories of civil rights activism that shape his sense of identity. The blend of urban Boston‑area culture, the city's public school environment, and his family’s emphasis on resilience
    and community support informs his worldview and daily life.
attributes:
  skills: '[''Teamwork'',''Leadership'',''Time Management'',''Practical Problem Solving'',''Basic Computer Literacy'',''Event Coordination'']'
  hobbies: '[''Basketball'',''Hip‑hop music production'',''Skateboarding'',''Video gaming'',''Community volunteering'',''Graphic novel reading'',''Cooking'']'
  career_goals: He aims to earn his GED within the next two years and then enroll in a vocational apprenticeship program, ideally as an electrician or automotive technician, where he can apply his hands‑on
    skills in a stable, structured environment. He also sees the military as a possible path that offers clear hierarchy and discipline, and he hopes to eventually become a mentor for younger teens in his
    community, using his experience to guide them toward education and career success.
