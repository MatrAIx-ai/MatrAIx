  career_goals: Stephanie aspires to a career that blends her love of systematic problem‑solving with a desire to contribute meaningfully to society. She hopes to pursue a degree in environmental science
    or data analytics, eventually working as an environmental data analyst or conservation researcher. In this role she envisions analyzing ecological data to inform sustainable practices, often working
    independently in quiet labs or field stations. She is also considering a path in biomedical research, where her meticulous approach could support laboratory work. Regardless of the specific field, she
    aims for a position that offers structured, research‑oriented work while allowing her to apply practical solutions to real‑world challenges. She plans to earn scholarships, attend a university that
    values small‑class interaction, and later obtain professional certifications that enhance her analytical capabilities.
