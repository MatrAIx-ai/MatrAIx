personas:
  professional: Stephanie Grant, a 14‑year‑old budding environmental technologist, merges her love of nature walks with hands‑on Arduino projects to prototype low‑cost soil‑moisture sensors for her backyard
    garden, and they meticulously document each experiment in a research‑style journal to build a foundation for future work in sustainable agriculture.
  sports: Stephanie Grant stays active through the school’s cross‑country team in the fall, weekend hikes with a local birdwatching club, weekly youth yoga sessions at the community center, and they avidly
    follow the Carolina Panthers and South Carolina Gamecocks while cheering from home.
  arts: Stephanie Grant expresses creativity by sketching birds from her nature walks, writing introspective poetry inspired by classic literature, crocheting blankets to soothing piano pieces by Ludovico
    Einaudi and folk songs by Joni Mitchell, and they share their artwork on a personal blog.
  travel: Stephanie Grant prefers carefully planned, nature‑centric trips, having visited Charleston’s historic waterfront and the Great Smoky Mountains with family, and they dream of a solo backpacking
    adventure to Costa Rica’s Monteverde cloud forest, balancing a modest travel budget with a desire for quiet, immersive experiences.
  culinary: Stephanie Grant enjoys farm‑to‑table cooking, regularly preparing fresh tomato‑basil bruschetta, herb‑infused dressings using basil, mint, and oregano from her garden, and they occasionally
    forget to set the timer, resulting in over‑baked cookies when making lemon‑scented shortbread.
  core: Stephanie Grant, a methodical teen nature enthusiast, balances solitary curiosity with practical tech projects, saves every penny in a spreadsheet, monitors mild allergies, finds calm in low‑impact
    sports, crafts poetry and sketches, plans quiet adventures, and they cook garden‑fresh meals—though they occasionally skip post‑gardening stretches.
background:
  cultural: Stephanie was born and raised in Mullins, a small town in Marion County, South Carolina. Her family reflects a typical Southern upbringing, emphasizing close‑knit family ties, community involvement,
    and respect for local traditions. Regular attendance at a nearby Baptist church has fostered a sense of service and communal responsibility. The cultural landscape includes regional foods such as shrimp
    and grits, sweet tea, and weekend barbecues, which she enjoys with her family. Growing up in a predominantly white, rural environment has given her an appreciation for the natural surroundings of the
    Lowcountry — pine forests, wetlands, and agricultural fields. While she values these traditions, she also embraces new ideas through school projects and online learning, balancing the region’s heritage
    with a forward‑looking curiosity.
