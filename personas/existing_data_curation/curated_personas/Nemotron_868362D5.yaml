  career_goals: She aims to transition from senior developer to a technical leadership role—first as a lead engineer and eventually as an engineering manager or chief architect—where she can shape system
    strategy and mentor the next generation of developers, especially women and under‑represented groups in tech. Kyong plans to earn AWS Solutions Architect Professional and Certified Kubernetes Administrator
    credentials, then spearhead a project that applies AI‑driven analytics to personalized education platforms, merging her STEM background with her curiosity about learning technologies. Long‑term, she
    envisions launching her own startup that builds secure, privacy‑first educational tools tailored for bilingual families, leveraging her cross‑cultural insight.
