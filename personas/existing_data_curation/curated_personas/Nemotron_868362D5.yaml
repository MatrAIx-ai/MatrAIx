personas:
  professional: Kyong Wei is a senior full-stack software engineer who leverages deep expertise in Java, Python, and C++ to design scalable AWS micro-service systems, employs Docker and Kubernetes with
    a pragmatic eye for performance, and channels a competitive yet collaborative spirit into mentoring women developers while navigating the tension between rigorous organization and agile flexibility.
  sports: Kyong Wei is an avid hiker who trails the Blue Hills and joins the Boston Striders running club for weekend long runs, follows the New England Patriots and Boston Red Sox with a competitive edge,
    practices Tai Chi weekly at a community center for mindful movement, and balances cardio sessions with strength training at a local CrossFit gym while staying mindful of lower-back care.
  arts: Kyong Wei nurtures a love for speculative fiction, frequently devouring works by Neal Stephenson and Liu Cixin, enjoys unwinding with Lex Fridman's tech-focused podcasts, curates board-game nights
    featuring Catan and Terraforming Mars with colleagues, appreciates the ambient sounds of composer Ryuichi Sakamoto and the storytelling of actress Lupita Nyong'o, and occasionally participates in local
    calligraphy exhibitions, blending modern artistic tastes with traditional brushwork.
  travel: Kyong Wei favors a mix of structured planning and spontaneous detours, often escaping to coastal New England towns like Rockport for weekend retreats, has explored historic Kyoto and the bustling
    markets of Marrakech, aspires to trek Norway's fjords and traverse the Inca Trail in Peru, and balances travel budgets by leveraging credit-card points while still setting aside a modest fund for family
    visits to their parents' hometown.
  culinary: Kyong Wei enjoys mastering fermented flavors, regularly preparing kimchi, bibimbap with gochujang, and savory bulgogi using fresh radish and sesame oil at home, pairs these dishes with craft
    IPA ales, dines at upscale farm-to-table eateries for seasonal menus, and occasionally indulges in sushi rolls featuring uni and toro while perfecting their own hand-rolled dough for weekend bread.
  core: Kyong Wei blends relentless curiosity with strategic pragmatism, balancing a competitive drive in tech leadership with a quiet devotion to calligraphy, hiking, and artisanal kimchi, while habitually
    checking code panels and blood-pressure readings before bedtime, and occasionally losing sleep over unfinished board-game strategies.
background:
  cultural: Kyong Chi Wei is a first‑generation Korean‑American, raised in the Boston suburbs by immigrant parents who emphasized education, respect for elders, and community. Bilingual in Korean and English,
    she celebrates Chuseok, Seollal, and Lunar New Year with her extended family while actively participating in the vibrant Korean community of Boston’s Chinatown and nearby suburbs. Her upbringing blends
    Confucian‑derived values of diligence and collective responsibility with the American ethos of individual initiative, shaping her pragmatic yet innovative approach to problem‑solving. She remains connected
    to her heritage through language, traditional cuisine, and regular visits to her parents’ hometown in South Korea, while also embracing the multicultural fabric of Massachusetts.
