  System (GIMS) and its features, such as its development in India, server hosting within the country, and information stored in government-based cloud. They are looking for more information on the need
  for and significance of the platform, and its potential to be a safer alternative to popular messaging platforms like WhatsApp and Telegram. They are also interested in the recent controversy over the
  WhatsApp breach and how GIMS can be a safer bet.
