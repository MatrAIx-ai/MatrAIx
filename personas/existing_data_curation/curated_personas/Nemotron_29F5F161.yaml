personas:
  professional: Karina Solano, a dedicated therapist in Metairie, blends evidence‑based CBT, trauma‑informed care, and expressive art techniques to create culturally responsive counseling for Spanish‑speaking
    adults, while meticulously documenting cases and planning interventions with an organized, methodical approach.
  sports: Karina Solano maintains fitness through daily walks in Audubon Park and weekly gentle yoga sessions at a community studio, occasionally cheering for the New Orleans Saints during football season
    while preferring solitary exercise over team sports.
  arts: Karina Solano immerses herself in the arts by painting delicate watercolors of Louisiana wetlands inspired by the light of Claude Monet and the bold colors of Georgia O'Keeffe, attending monthly
    exhibition openings at the New Orleans Museum of Art where she discovers avant‑garde installations by emerging local artists like Maya Kinney.
  travel: Karina Solano favors contemplative travel, planning low‑key retreats to quiet destinations such as the Everglades National Park, the historic town of Oaxaca, and the serene lavender fields of
    Provence, where she stays in boutique inns and devotes mornings to sketching landscapes before returning to her Metairie office.
  culinary: Karina Solano, an adept home cook, regularly prepares authentic mole negro using ancho chilies, Mexican chocolate, and toasted sesame seeds, and hand‑rolled tamales seasoned with hoja santa,
    while supplementing her pantry with fresh cilantro, epazote, and herbs from her balcony garden.
  core: Karina Solano blends a solitary artistic soul with a meticulous therapist's mind, channeling curiosity into watercolor meditations, while a habit of hoarding vintage sketchbooks often threatens
    her otherwise orderly office.
background:
  cultural: Karina was raised in a Mexican‑American household where family gatherings, reverence for tradition, and bilingual communication were central. Her parents instilled values of respect, community,
    and perseverance, shaping her compassionate worldview. Celebrations like Día de los Muertos and Semana Santa remain meaningful, influencing her therapeutic emphasis on honoring personal narratives and
    cultural identity. Living in Metairie, she also navigates the rich blend of Creole, Southern, and Hispanic cultures, which deepens her appreciation for diversity and informs her inclusive, culturally
    sensitive counseling style.
attributes:
  skills: '[''Cognitive Behavioral Therapy (CBT)'', ''Trauma‑Informed Care'', ''Solution‑Focused Brief Therapy'', ''Art‑Integrated Counseling'', ''Bilingual Spanish‑English Communication'', ''Crisis Intervention'',
    ''Case Management and Documentation'', ''Client Advocacy'', ''Interdisciplinary Team Collaboration'', ''Cultural Competency in Latinx Mental Health'']'
  hobbies: '[''Watercolor painting'', ''Reading contemporary fiction and poetry'', ''Visiting art galleries and museums'', ''Cooking traditional Mexican cuisine'', ''Mindfulness meditation'', ''Nature walks
    in Audubon Park'', ''Herb gardening'', ''Exploring interdisciplinary art installations'']'
  career_goals: Karina aims to obtain a master’s degree in counseling to secure full licensure as a Licensed Professional Counselor (LPC) and expand her scope of practice. She envisions opening a private,
    tranquil office in Metairie where she can offer culturally tailored therapy and regular art‑therapy workshops for underserved Mexican‑American adults. Long‑term, she aspires to become a clinical supervisor
    and mentor younger therapists, develop community outreach programs that integrate mindfulness and expressive arts, and contribute research on the benefits of art‑based interventions for trauma survivors
    in the Gulf Coast region.
