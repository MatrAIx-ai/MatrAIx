personas:
  professional: Hee Aung is a healthcare administrator who leverages meticulous process‑optimization skills, deep knowledge of California health‑care regulations, and a skeptical, data‑driven mindset to
    streamline operations, manage budgets, and lead cross‑functional teams toward measurable quality improvements, all while planning their ascent to a senior director role.
  sports: Hee Aung enjoys solitary hikes along the Pacific coastline, participates in a local trail‑running club that trains for the San Francisco Marathon, follows the Golden State Warriors and the San Jose
    Sharks, and complements their cardio routine with weekly tai chi sessions to maintain flexibility and low‑impact strength.
  arts: Hee Aung cultivates creative expression through practicing calligraphy, reading contemporary literature by authors exploring diaspora experiences, writing health‑ethics essays, and attending performances
    by Yo‑Yo Ma, the San Francisco Symphony, and exhibitions at SFMOMA featuring James Turrell, allowing their analytical mind to explore emotional nuance.
  travel: Hee Aung plans meticulously for short, low‑stress getaways, favoring coastal road trips along California’s Highway 1, weekend retreats in Napa Valley, and occasional overseas visits to Kyoto for
    its historic gardens, always balancing travel expenses with their savings goals.
  culinary: Hee Aung experiments with fusion cuisine, blending traditional flavors from their family heritage—like miso, ginger, and chilies—with Californian ingredients such as avocado, heirloom tomatoes,
    and locally sourced seafood, often preparing dishes like miso‑glazed salmon with a kale‑avocado salad while perfecting homemade pickles for their indoor succulent garden.
  core: Hee Aung is a methodical, competition‑driven healthcare administrator who finds solace in solo calligraphy, data‑driven budgeting, and meticulously planned fusion meals, and they channel their disciplined
    yet occasional skeptical approach into precise, outcome‑focused endeavors.
background:
  cultural: Hee Aung is an East Asian American of Burmese-Korean descent, raised in a multicultural household in the San Francisco Bay Area. She grew up bilingual, speaking Burmese at home and learning
    Korean from extended family, while also mastering English in school. Her family maintains traditions such as celebrating the Lunar New Year and the Burmese Thingyan water festival, preparing family
    recipes, and emphasizing respect for elders and education. Living in Oakland's vibrant Asian community, she actively participates in cultural events and community networks, which inform her sensitivity
    to health equity issues affecting Asian-American populations. Her cultural heritage, combined with her American upbringing, gives her a nuanced perspective on both collectivist values and individual
    responsibility.
