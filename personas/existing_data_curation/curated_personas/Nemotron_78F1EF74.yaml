  career_goals: Hee aims to progress from her current managerial role to a senior director position overseeing a network of health facilities in the Bay Area, where she can shape system-wide policies that
    improve patient outcomes and operational efficiency. She aspires to obtain a Certified Professional in Healthcare Quality (CPHQ) credential and eventually enroll in a part-time Master's program in Healthcare
    Administration to deepen her expertise. A long-term ambition is to spearhead an equity-focused initiative that reduces health disparities for Asian American populations, leveraging her cultural insight
    and data-driven approach to design targeted community outreach and preventive care programs.
