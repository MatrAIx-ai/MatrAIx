  hobbies: '[''Visiting art museums'',''Watercolor painting'',''Reading biographies of artists and historical figures'',''Gardening'',''Cooking traditional Mexican dishes'',''Genealogy research'',''Knitting'',''Attending
    local cultural festivals'',''Listening to classical music'',''Nature walks'']'
  career_goals: Gregoria aims to preserve her family heritage by completing a digital archiving course, publishing a memoir and a small Mexican recipe book, and establishing a senior art circle in Washington,
    NC. She hopes to mentor young volunteers at the local library, exhibit her watercolor paintings in regional galleries, and organize an annual cultural showcase that highlights Mexican music and cuisine.
    Her ambition is to leave a lasting record of her life’s story for future generations.
