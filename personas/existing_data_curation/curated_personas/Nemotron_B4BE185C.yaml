  career_goals: Holding a long‑term vision for community wellbeing, Romeo aims to transition into a senior leadership role such as Residential Life Director or Community Services Manager for the municipality
    of Loíza. He plans to design and launch age‑friendly housing programs that blend structured support with flexible social activities for older adults. Additionally, he aspires to mentor the next generation
    of residential advisors, develop training curricula that emphasize practical problem solving and critical analysis, and collaborate with local government to strengthen housing policies and disaster
    preparedness in coastal communities.
