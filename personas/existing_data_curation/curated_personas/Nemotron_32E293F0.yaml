personas:
  professional: A budding digital illustrator and sci‑fi storyteller named Letis Williams blends sketching, Procreate, and basic Blender 3D work to craft vibrant characters inspired by community storytelling
    sessions, balancing inventive spontaneity with the disciplined schedule they maintain for school and library volunteer hours.
  sports: An enthusiastic member of the Lilburn Middle School soccer team, Letis Williams also stays tuned to the Atlanta Hawks and Atlanta United matches, juggling practice with weekend jogs at the local
    park and they often skip warm‑up routines when excitement takes over.
  arts: A passionate creator and fan of visual narratives named Letis Williams draws inspiration from manga series like 'One Piece', graphic novels such as 'Ms. Marvel', and the cinematic worlds of Hayao
    Miyazaki and Lin‑Manuel Miranda, while also singing along to soulful performances by Beyoncé and Kendrick Lamar during family gatherings, and they frequently experiment with sketching new characters
    while their piano practice loops in the background.
  travel: Letis Williams dreams of stargazing in the desert of Arizona’s Saguaro National Park after weekend trips to Atlanta’s historic district and a school‑organized field trip to Washington, D.C., and
    they carefully budget for future adventures to the ancient pyramids of Egypt.
  culinary: With a budding kitchen confidence, Letis Williams loves crafting soulful Southern dishes like collard greens seasoned with smoked paprika and sweet‑potato pie, while also experimenting with
    sushi rolls and spicy ramen bowls, and they often swap recipes with a cousin who teaches them how to infuse fresh basil into marinades.
  core: Letis Williams navigates teenage life as a vivid dreamer who sketches galaxies during piano interludes, hoards comic book covers, and they occasionally forget to charge their inhaler before soccer
    practice.
background:
  cultural: Letis comes from a close‑knit African‑American family rooted in Lilburn, GA, where community and church play pivotal roles. Family gatherings feature soulful music, storytelling, and traditional
    Southern cuisine, which have nurtured her appreciation for cultural narratives and rhythm. Her mother, a school counselor, encourages academic curiosity, while her older cousin, a college‑bound graphic
    designer, serves as a role model for leveraging heritage in creative work. The multicultural environment of Gwinnett County exposes Letis to a mosaic of cultures, reinforcing her respect for diversity
    and inspiring her to incorporate themes of identity and empowerment into her artistic pursuits.
