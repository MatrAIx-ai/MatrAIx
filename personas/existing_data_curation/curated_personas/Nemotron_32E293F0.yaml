    poetry slam participation", "Stargazing and astronomy", "Debate club" ]'
  career_goals: Letis aspires to blend art and technology, dreaming of a future as a multimedia artist, game designer, or visual storyteller. She envisions attending a specialized high‑school magnet program
    for visual arts and later studying graphic design or interactive media at a university. Her long‑term ambition includes creating culturally resonant content that celebrates Black heritage, possibly
    developing a comic series or an animated short that highlights community stories. She also hopes to mentor younger Black girls in STEM and the arts, fostering confidence and creativity.
