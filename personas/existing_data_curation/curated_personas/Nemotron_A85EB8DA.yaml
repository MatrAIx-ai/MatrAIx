  hobbies: '[''Painting'', ''Visiting art galleries'', ''Yoga'', ''Gardening'', ''Hiking'', ''Farm-to-table cooking'', ''Volunteer youth mentorship'', ''Line dancing'', ''Country music concerts'', ''Creative
    writing'']'
  career_goals: Christine aims to advance to a senior HR manager or director role within the next five years, overseeing a strategic HR function that integrates employee well‑being with organizational performance.
    She plans to earn the SHRM‑SCP certification, lead a company‑wide diversity, equity and inclusion program, and develop innovative art‑based employee engagement workshops that draw on her love for creativity.
    Long‑term, she envisions launching her own boutique HR consulting practice focused on small businesses in the Dallas‑Fort Worth area, helping them build supportive and inclusive workplace cultures.
