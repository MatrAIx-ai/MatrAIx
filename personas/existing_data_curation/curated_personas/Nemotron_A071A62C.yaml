personas:
  professional: Todd Hastings, a retired chief strategist with a graduate business degree, leverages decades of executive experience in strategic planning and corporate governance to mentor young entrepreneurs
    while applying his creative problem‑solving and art‑history knowledge to community historic‑preservation projects.
  sports: Todd Hastings, a lifelong fan of the Philadelphia Phillies and the Philadelphia Eagles, participates in a senior walking group along the Brandywine River and maintains a gentle fitness routine
    of daily garden walks, occasional low‑impact yoga at the West Chester Community Center, and occasional attendance at local senior softball games.
  arts: Todd Hastings, an avid watercolorist who paints the rolling hills of the Brandywine Valley, regularly attends chamber‑music recitals featuring ensembles like the Budapest String Quartet, frequents
    the Philadelphia Museum of Art to study works by Winslow Homer and John Singer Sargent, and draws inspiration from poets such as T.S. Eliot and Seamus Heaney.
  travel: Todd Hastings, who prefers meticulously planned road trips and leisurely train journeys, has explored historic towns like Colonial Williamsburg, Annapolis, and Gettysburg, and dreams of a quiet
    autumn visit to Bath, England, while balancing their travel budget with their philanthropic commitments.
  culinary: Todd Hastings, a modest home cook who delights in preparing garden‑fresh roasted carrots, herb‑infused chicken piccata, and apple‑cinnamon crumble, often pairs meals with a glass of locally
    produced Pennsylvania Riesling, and occasionally treats themselves to a fine‑dining tasting menu featuring chef‑crafted foie gras at a Philadelphia restaurant.
  core: Todd Hastings, a quietly imaginative senior who blends disciplined business acumen with a poetic love of art and history, channels their curiosity into mentorship, watercolor landscapes, and thoughtful
    generosity, all while occasionally indulging in nostalgic habits like rereading old memoirs and forgetting to water their succulents.
background:
  cultural: Todd was born in 1949 and raised in suburban Chester County, Pennsylvania, in a middle-class Anglo-American family with Protestant roots. His upbringing reflected post-war American values of
    hard work, education, community service, and modesty typical of the Mid-Atlantic region. While deeply connected to local traditions—such as historic preservation and community festivals—he also cultivated
    a broad cultural curiosity, embracing European art, literature, and philosophy, which together shape his balanced, harmonious cultural identity.
