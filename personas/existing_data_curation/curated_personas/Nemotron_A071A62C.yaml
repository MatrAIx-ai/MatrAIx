  career_goals: Although retired, Todd aims to continue sharing his knowledge by mentoring young entrepreneurs, supporting local arts and historic preservation projects, authoring a memoir that reflects
    his lifelong curiosity, establishing a scholarship for business students at his alma mater, and fostering intergenerational dialogue within his community to promote harmony and shared growth.
