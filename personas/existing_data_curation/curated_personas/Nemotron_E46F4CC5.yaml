  hobbies: '[''Coastal Hiking & Tide‑Pool Exploration'', ''Birdwatching'', ''Vegetable Gardening'', ''Knitting & Crochet'', ''Seafood Cooking'', ''Historical & Environmental Reading'', ''Community Garden
    Volunteering'', ''Local Food Pantry Assistance'', ''Small‑Group Book Club'', ''Mindfulness Meditation'', ''Journaling'']'
  career_goals: Karen aims to advance to a senior program leadership role where she can oversee multi‑year regional development projects that embed sustainability and community resilience. She seeks to
    mentor emerging project managers, share best‑practice frameworks with small‑town governments, and eventually launch a boutique consulting practice that assists coastal communities in navigating complex
    permitting and funding processes. Simultaneously, she is committed to cultivating a healthier work‑life balance, incorporating mindfulness practices into her routine, and championing mental‑health awareness
    within her organization.
