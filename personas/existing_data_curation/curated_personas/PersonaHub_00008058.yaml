persona_description: A NASA engineer who specializes in the development and operation of spacecraft, particularly those used for missions to Mars. They are responsible for designing, building, and testing
  the third stage of the spacecraft, which is responsible for providing the majority of the velocity change needed to leave Earth's gravitational pull and to inject the spacecraft onto a trajectory to Mars.
  They are also responsible for ensuring the spacecraft stays on course and that the motor flies in the same direction while it is thrusting, using a spin-stabilized approach.
