personas:
  professional: Bedford Romo, a senior‑level electrical engineer with two decades of analog and digital circuit design expertise, is positioning himself to lead a small R&D team that merges sustainable
    solar‑energy solutions with interactive art installations, leveraging his upcoming EE degree, CEM and PMP certifications, his habit of documenting projects meticulously, and his critical, evidence‑based
    yet unconventional problem‑solving style.
  sports: Bedford Romo fuels his fitness through early‑morning hikes along the Sierra foothills, rides with a local road‑bike club on weekends, and follows the Sacramento Kings and the Calaveras County
    high‑school football team, showing a preference for solitary endurance activities punctuated by community‑spirit sports fandom.
  arts: Bedford Romo curates a vibrant personal collection of talavera tiles and papel picado, draws inspiration from the bold murals of Diego Rivera and the acoustic textures of José González, and regularly
    showcases kinetic Arduino‑driven sculptures at the town’s makerspace and community art fairs, blending technical skill with a deep reverence for folk artistry.
  travel: Bedford Romo favors low‑key road trips that combine landscape photography and renewable‑energy tours, having recently captured sunrise over Oaxaca’s adobe streets, trekked the misty redwoods of
    Northern California, and explored Tokyo’s Akihabara electronics districts, all while planning each venture through a detailed spreadsheet that balances limited vacation days with modest travel budgets.
  culinary: Bedford Romo spends Saturday evenings perfecting mole poblano—simmering pasilla, mulato, and Mexican chocolate with toasted almonds and spices—and hand‑rolling tamales wrapped in hoja de maíz,
    complementing these dishes with freshly harvested cilantro and a side of roasted corn, while occasionally rewarding himself with a quick pizza after late‑night amplifier builds.
  core: Bedford Romo is a methodical tinkerer who fuses engineering rigor with artistic flair, channeling curiosity into solar‑powered installations, while habitually losing track of time over a simmering
    pot of mole and a stack of circuit boards.
background:
  cultural: Bedford is a Mexican‑American whose parents migrated to California’s Central Valley in the 1970s. He grew up bilingual, speaking Spanish at home and English at school, and maintains strong ties
    to Mexican traditions. He celebrates Día de los Muertos, Fiesta de la Virgen, and other Mexican holidays with his extended family, preparing traditional foods and setting up altars. His cultural identity
    is expressed through an appreciation for Mexican muralists and folk artisans, influencing his interest in vibrant, community‑focused art installations. While fully integrated into Wallace’s rural Californian
    lifestyle, he actively participates in local Mexican cultural festivals, supports community picnics, and mentors younger members of the Mexican diaspora, balancing his heritage with his professional
    pursuits.
attributes:
  skills: '["Analog circuit design", "Digital PCB layout (Altium, KiCad)", "Embedded systems programming (C/C++, Arduino, Raspberry Pi)", "PLC configuration and HMI development", "Industrial automation
