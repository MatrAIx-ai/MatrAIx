  hobbies: '["Custom audio amplifier building", "Arduino kinetic sculpture prototyping", "Landscape photography", "Solo hiking in Sierra foothills", "Collecting Mexican folk art", "Cooking traditional Mexican
    cuisine", "Playing acoustic guitar", "Visiting small art galleries", "Volunteering at community makerspace", "Reading science and technology publications", "Herb gardening", "Woodworking"]'
  career_goals: Bedford aims to transition into a senior leadership role where he can guide a small R&D team that blends sustainable engineering with artistic expression. He plans to complete a bachelor’s
    degree in Electrical Engineering and earn Certified Energy Manager (CEM) and Project Management Professional (PMP) credentials. His ambition includes publishing a paper on hybrid solar‑LED art installations,
    securing a patent for a modular lighting controller, and ultimately founding a consulting practice that offers energy‑efficient, aesthetically‑driven solutions to small businesses and community projects
    in Calaveras County. Additionally, he seeks to become an active IEEE member, mentor emerging engineers, and be recognized locally for innovative, eco‑friendly designs.
