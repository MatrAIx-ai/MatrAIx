  hobbies: '[''Hiking'', ''Ocean kayaking'', ''Hula dancing'', ''Cooking fusion cuisine'', ''Gardening'', ''Reading historical nonfiction'', ''Practicing yoga'', ''Volunteer fire safety education'', ''Collecting
    vintage fire helmets'']'
  career_goals: Yueying aims to advance to a battalion chief position where she can shape department strategy and mentor the next generation of firefighters, especially women and minorities. She plans to
    earn advanced certifications as a fire inspector and a paramedic, and to spearhead a specialized hazardous‑materials unit that integrates cutting‑edge technology such as AI‑driven fire risk modeling.
    Additionally, she seeks to expand community outreach by creating multilingual fire‑safety programs that reflect the cultural diversity of Mililani and surrounding neighborhoods, leaving a lasting legacy
    of safety, professionalism, and inclusive leadership.
