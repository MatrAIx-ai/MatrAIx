personas:
  professional: Yueying Yamauchi, a 51‑year‑old veteran firefighter and certified EMT, leads their crew with methodical precision, applying deep expertise in incident command, hazardous‑materials mitigation,
    technical rescue, and fire‑prevention education, and they competitively champion AI‑driven risk modeling to mentor the next generation of diverse firefighters.
  sports: Yueying Yamauchi tackles early‑morning hikes on the Koʻolau Range, rows ocean kayak sessions with the Mililani Kayak Club, practices yoga three times weekly for flexibility, avidly supports the
    Hawaii Rainbow Warriors football team and the Honolulu Seals basketball team, and they approach fitness with a competitive, schedule‑driven mindset.
  arts: Yueying Yamauchi expresses cultural pride through Hawaiian hula dancing at community festivals, finds inspiration in the music of Israel Kamakawiwo'ole and Jack Johnson, enjoys the theatrical performances
    of local storyteller Kumu Hula Leilani, and they routinely read historical nonfiction works by Doris Kearns Goodwin, weaving artistic appreciation into both personal leisure and community outreach.
  travel: Yueying Yamauchi prefers meticulously planned trips that blend adventure and cultural immersion, having hiked the volcanic trails of Maui, explored the historic streets of Kyoto, and kayaked the
    fjords of Norway, while they dream of a future voyage to New Zealand’s South Island, all balanced against a modest retirement savings plan and family responsibilities.
  culinary: Yueying Yamauchi experiments in the kitchen with fusion dishes such as miso‑glazed kalua pork bao, pineapple teriyaki sushi rolls, and taro‑infused ramen broth, favoring ingredients like shiso
    leaves, coconut milk, and fresh ginger, and while their cooking skill is intermediate, they relish the occasional kitchen mishap that leaves a lingering aroma of charred ginger.
  core: Yueying Yamauchi, a 51‑year‑old firefighter, blends disciplined competitiveness with a love for sunrise hikes, hula dancing, and vintage fire‑helmet collecting, though they sometimes overcommit
    to volunteer duties at the expense of personal downtime.
background:
  cultural: Yueying is a second‑generation East Asian American born in Mililani, Oahu, to a Chinese mother (surname Tu) and a Japanese father (surname Yamauchi). She grew up bilingual in English and Mandarin,
    with regular exposure to Japanese language and customs at home. The multicultural environment of Hawaiʻi, with its strong emphasis on community, outdoor life, and respect for diverse traditions, shaped
    her values of discipline, responsibility, and adaptability. She celebrates Lunar New Year and Obon while actively participating in Hawaiian events such as Makahiki and local hula gatherings. This blended
    heritage informs her inclusive approach in the fire department and her ability to communicate effectively with a wide range of residents.
attributes:
  skills: '[''Fire suppression'', ''Emergency medical services (EMT)'', ''Hazardous materials response'', ''Technical rescue'', ''Fire prevention education'', ''Equipment maintenance and inspection'', ''Use
