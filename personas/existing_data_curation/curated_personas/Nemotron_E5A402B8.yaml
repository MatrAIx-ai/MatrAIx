    (lean manufacturing fundamentals)'', ''Team collaboration and shift coordination'', ''Basic computer proficiency (MS Office, inventory software)'', ''Manual dexterity and precision'']'
  hobbies: '[''DIY home improvement projects'', ''Fishing and hiking in the Appalachians'', ''Attending local car shows and motor sports events'', ''Strategy video games (building and resource management)'',
    ''Listening to classic rock and bluegrass music'', ''Knitting and crocheting for relaxation'', ''Gardening (vegetable garden)'', ''Woodworking and small furniture making'', ''Participating in community
    volunteer events'']'
  career_goals: Rainy aims to earn a Journeyman Welder certification and a CNC programming credential within the next two years, positioning herself for a lead‑operator role on the shop floor. She hopes
    to transition into a shift‑supervisor position, where she can apply her competitive drive to improve productivity and mentor newer workers. Long‑term, she envisions starting a small side business offering
    custom metal and plastic pieces for local contractors and hobbyists, leveraging her practical skills while maintaining a stable schedule for her family.
