personas:
  professional: Rainy Sims, a 25‑year‑old metal and plastic fabricator, blends hands‑on CNC milling, welding, and injection‑molding expertise with a detail‑driven mindset, aiming to earn a Journeyman Welder
    certification and a CNC programming credential while eyeing a shift‑supervisor role that lets them channel competitive drive into productivity gains and mentor newcomers, all while planning a side hustle
    offering custom metal‑plastic parts for local contractors.
  sports: Rainy Sims fuels their love of the outdoors by fishing the Shenandoah River for rainbow trout, hiking the Appalachian Trail’s Bald Mountain section, cheering for the Pittsburgh Steelers, holding
    a season ticket for the local minor‑league baseball team, and joining a weekend pickup basketball league at the community center.
  arts: Rainy Sims’s creative side hums to classic rock legends like Led Zeppelin, bluegrass pioneers such as Bill Monroe, and country storytellers like Dolly Parton while they unwind knitting diamond‑pattern
    blankets for friends, and they occasionally attend small‑venue folk concerts in their hometown.
  travel: Rainy Sims prefers spontaneous, tool‑laden road trips on their classic Harley‑style motorcycle to scenic spots like the Great Smoky Mountains, while budgeting carefully for weekend camping excursions
    at Acadia National Park and saving for a future cross‑country bike tour to Colorado’s Rocky Mountain passes.
  culinary: Rainy Sims enjoys grilling smoked brisket, preparing trout almondine with fresh herbs, and whipping up hearty chili using a cast‑iron Dutch oven, often seasoning dishes with smoked paprika and
    hickory chips, reflecting solid home‑cooking skills and a palate tuned to smoky, robust flavors.
  core: Rainy Sims is a structured yet flexible 25‑year‑old fabricator who channels competitive energy into hands‑on projects, splurges on tools, and unwinds with music, fishing, and the occasional blanket‑knitting
    marathon, all while juggling a cautious budgeting style and a stubborn reluctance to schedule routine check‑ups.
background:
  cultural: Rainy grew up in Shinnston, West Virginia, within a close‑knit Appalachian community that values hard work, self‑reliance, and family ties. Her family’s European roots (primarily German and
    Irish) blend with the region’s folk traditions, fostering a love for local music, county fairs, and church gatherings. She was raised in a Protestant household where community service and modesty are
    emphasized. The rugged landscape and industrial heritage of Taylor County have shaped her practical outlook, while the region’s emphasis on neighborly support informs her collaborative yet competitive
    spirit.
attributes:
  skills: '[''Metal fabrication (welding, cutting, shaping)'', ''Plastic injection molding operation'', ''CNC machine operation and basic programming'', ''Blueprint reading and technical drawing interpretation'',
