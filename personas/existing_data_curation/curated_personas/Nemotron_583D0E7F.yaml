  career_goals: In the short term, Ronnie aims to maintain a strong academic record, earn a leadership position in the student council, and secure a spot on his high-school basketball team. He plans to
    complete a youth-leadership certification offered by his school's community service program and gain experience through volunteer tutoring. Looking ahead, he is interested in studying criminal justice
    or public administration, with the ambition to become a community outreach liaison or a police officer who can use his communication and organizational strengths to build trust. Ultimately, he envisions
    leading community programs that mentor at-risk teens and promote a safe, collaborative neighborhood environment.
