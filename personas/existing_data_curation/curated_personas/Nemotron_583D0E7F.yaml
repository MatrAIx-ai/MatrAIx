personas:
  professional: Ronnie Williams is a teen mentor and performer who channels their love of teamwork and spotlight into leading after‑school tutoring sessions at the neighborhood library while organizing
    weekly skate‑boarding workshops, blending structured lesson plans with the improvisational flair of drama club.
  sports: Ronnie Williams energizes weekends by shooting hoops at the local Providence park, cheering for the Boston Celtics and Boston Bruins, and rollerskates along the Providence bike paths with the
    community skate club, while also playing pickup basketball for the city's youth league.
  arts: Ronnie Williams thrives on stage in the school drama club, where they performed a monologue from Shakespeare's *Macbeth*, strums acoustic covers of Ed Sheeran and John Mayer on guitar, and creates
    comedic TikTok skits inspired by the humor of Bo Burnham and the timing of Jim Carrey.
  travel: Ronnie Williams loves day trips to Narragansett Beach and family road trips to Washington, D.C., while dreaming of a future adventure to New York City’s Broadway district and a summer vacation
    at Disneyland, planning each outing around school holidays and a modest allowance.
  culinary: Ronnie Williams enjoys crafting homemade pepperoni pizza with extra mozzarella, whipping up quick ramen bowls flavored with sriracha and soft‑boiled eggs, and snacking on nachos topped with
    jalapeños and guacamole while gaming, often experimenting with avocado toast for breakfast.
  core: Ronnie Williams is a socially vibrant teen who balances structured goals with spontaneous creativity, thriving on teamwork and audience applause while juggling school, sports, and digital adventures.
background:
  cultural: Ronnie grew up in a middle-class, predominantly white neighborhood of Providence, Rhode Island, immersed in typical New England values that emphasize community involvement, education, and civic
    responsibility. His family celebrates American holidays such as Thanksgiving, Christmas, and the Fourth of July, and they often attend local events like WaterFire, the Providence Holiday Parade, and
    seasonal community fairs. He attends a public middle school where he participates in extracurricular activities that reflect the city's diverse cultural fabric, and his upbringing has instilled a strong
    sense of local pride and respect for the region's historical heritage.
