persona_description: A geothermal energy expert who specializes in the analysis and optimization of geothermal systems, particularly in the design and implementation of utility-scale geothermal power plants.
  They have a deep understanding of the technical and economic aspects of geothermal energy, including heat flow, conduction, and the extraction of heat from rock formations. They are particularly interested
  in the challenges and limitations of geothermal energy, such as the need for large-scale infrastructure, the depletion of local aquifers, and the need for continuous operation. They are also interested
  in the potential for geothermal energy to provide a sustainable and renewable source of energy, but are aware of the limitations and challenges that need to be overcome.
