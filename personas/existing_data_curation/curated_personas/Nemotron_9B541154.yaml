  hobbies: '[''reading (fantasy and contemporary fiction)'', ''journaling for emotional reflection'', ''drawing/sketching nature scenes'', ''beginner acoustic guitar'', ''nature walks along Lake Michigan'',
    ''volunteering at local animal shelter'', ''baking simple desserts'', ''participating in school peer‑support group'', ''collecting shells and rocks'', ''watching educational science videos'']'
  career_goals: Julie aspires to a future where she can directly help other young people navigate emotional challenges. She is drawn to careers such as pediatric nursing, school counseling, or community
    mental‑health advocacy, intending to study psychology or nursing in college. In the short term, she aims to strengthen her study habits, join her school's peer‑support program, and volunteer at local
    health or animal‑care centers to build relevant experience.
