personas:
  professional: Julie Bender is an aspiring junior peer‑support volunteer who channels their compassionate nature into listening to classmates, balances curiosity about mental health with practical, low‑key
    strategies, and they often sketch calming nature scenes for classroom corners to help ease anxiety.
  sports: Julie Bender spends summer mornings swimming at the community lake, paddles a kayak along the shoreline, cheers for the Detroit Lions during NFL season, and they play forward for the Spring Lake
    Thunder U14 soccer club, balancing a love of water‑based activities with a laid‑back approach to fitness.
  arts: Julie Bender immerses themselves in fantasy novels by J.K. Rowling and contemporary teen fiction, sketches serene Lake Michigan sunsets inspired by John James Audubon, strums beginner chords on
    an acoustic guitar while humming Bob Dylan, and they occasionally watch Greta Gerwig’s indie films, letting these artistic pursuits shape their identity.
  travel: Julie Bender cherishes family road trips to Mackinac Island, weekend visits to Chicago’s Museum of Science and Industry, and they dream of hiking the dunes at Sleeping Bear Dunes and exploring
    Yellowstone National Park someday, keeping a scrapbook of shells collected from Lake Michigan as a reminder of each adventure.
  culinary: Julie Bender loves baking warm apple crumble and chocolate chip cookies with their family, enjoys pan‑searing lake trout with lemon, dill, and fresh Michigan blueberries, and they often experiment
    by adding local honey to desserts, reflecting a simple yet enthusiastic culinary style.
  core: Julie Bender is a compassionate, nature‑loving teen who balances restless curiosity with a relaxed, occasionally disorganized lifestyle, channeling intense emotions into journaling, art, and community
    service while navigating the ups and downs of early adolescence.
background:
  cultural: Julie is a white American growing up in Spring Lake, a small lakeside community in Muskegon County, Michigan. The region’s Midwestern values of community service, modesty, and appreciation for
    the natural environment shape her daily life, from family fishing trips on Lake Michigan to seasonal local fairs and church‑based youth groups. These traditions reinforce her compassionate outlook,
    encouraging her to help neighbors, engage in volunteer activities, and maintain harmony within her tight‑knit community.
