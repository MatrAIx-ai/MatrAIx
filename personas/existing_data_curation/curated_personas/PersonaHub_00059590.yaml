persona_description: A botanist who specializes in the study of clivia, particularly the variegation patterns found in their leaves. Their research has led them to discover and document the diversity of
  foliage variegation in clivia, including the most common striped form, the chance seedling mutation ‘Demeteria’, and the rare Japanese form with a creamy yellow base and normal green tip. They have also
  grown a batch of seedlings from self-pollinated flowers of an irregularly striped form and observed that the seedlings turned out lime green. The botanist is interested in the potential for variegation
  in seedlings from crosses with other clivia types and the possibility of reproducing the irregularly striped form through seed propagation. They are also curious about the possibility of finding a white
  variegated clivia in Australia and the rarity of white variegation in clivia.
