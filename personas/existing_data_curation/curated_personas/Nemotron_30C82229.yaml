personas:
  professional: An experienced casino security specialist, Livina Usher leverages her keen pattern‑recognition and training expertise to design incident‑response curricula, while her assertive yet compassionate
    style ensures new guards feel mentored and included.
  sports: An avid supporter of the Tampa Bay Buccaneers and a regular participant in the Hillsborough River Trail Walkers club, Livina Usher blends seasonal football enthusiasm with weekly hikes that balance
    cardio fitness and reflective solitude, and they treat each stride as a moving meditation.
  arts: A frequent patron of Franklin’s Jazz Club, Livina Usher delights in the soulful sounds of B.B. King, the timeless vocals of Aretha Franklin, and the compelling narratives of August Wilson, and they
    let music and theatre shape their evenings and community dialogues.
  travel: A thoughtful planner, Livina Usher prefers curated road trips to historic Southern towns like Savannah and Charleston, dreams of exploring the jazz‑rich streets of New Orleans, and saves for occasional
    Caribbean cruises that blend relaxation with cultural immersion, and they balance adventure with family responsibilities.
  culinary: A confident home cook, Livina Usher experiments with Southern classics such as shrimp and grits, collard greens seasoned with smoked turkey, and key‑lime pie, often harvesting rosemary, basil,
    and native citrus from her garden to infuse fresh flavor into each meal, and they relish sharing these dishes at community gatherings.
  core: Livina Usher balances a razor‑sharp security mind with a garden‑scented soul, often swapping a night‑shift briefing for a midnight jazz solo, and they occasionally forget to water a pot while perfecting
    a new spice rub.
background:
  cultural: Livina identifies as African-American and draws strength from the rich cultural traditions of Southern Black communities in Tampa. Family gatherings, church fellowship, and celebrations such
    as Juneteenth and Kwanzaa reinforce her sense of heritage. She values storytelling, soul food, and the rhythm of blues and jazz, which influence her social life and personal expression. Her cultural
    background informs her empathetic yet assertive approach at work, fostering inclusivity and mentorship for other under-represented professionals.
