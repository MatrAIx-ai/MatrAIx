  career_goals: Livina aims to advance into a supervisory role within casino security, where she can lead a team and shape policy. She aspires to design a comprehensive training program that blends her
    educational expertise with practical security tactics, especially targeting recruitment and development of women and Black professionals. Long-term, she envisions consulting for multiple gaming venues
    on risk management and compliance, and eventually launching a nonprofit that offers security-training scholarships and community safety workshops in Tampa.
