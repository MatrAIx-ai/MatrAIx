  career_goals: Although retired from formal employment, Souheil aims to deepen his involvement in community service by leading a local seniors' mentorship program, documenting the area's history for the
    county archive, and possibly publishing a memoir that blends personal anecdotes with reflections on art and culture. He also hopes to mentor younger volunteers in event organization and digital communication
    skills.
