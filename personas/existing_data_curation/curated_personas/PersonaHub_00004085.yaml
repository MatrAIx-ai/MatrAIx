persona_description: A public health researcher who specializes in the study of the health outcomes of vulnerable children and their risk factors, including young person-specific factors such as special
  educational needs and parent-related issues such as substance misuse. Her research interests include developing evidence-based interventions to prevent poor health outcomes in vulnerable children and
  improving the life chances of these children. She is also interested in the potential impact of disability on vulnerability and is working on a forthcoming disabled children’s needs assessment.
