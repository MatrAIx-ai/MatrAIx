personas:
  professional: A seasoned cashier with three decades of point‑of‑sale mastery, Aida Medina leverages bilingual fluency and meticulous transaction skills to mentor new staff, and they aspire to a supervisory
    role that fuses retail leadership with community art‑center coordination.
  sports: A 50‑year‑old culture‑enthusiast who cheers for the LA Lakers and LA Dodgers, Aida Medina also belongs to the Sierra Pelona Hikers Club, fits in weekly yoga sessions at a community center, and
    prefers trail walks over gym workouts.
  arts: A devoted art aficionado who roams the Getty and LACMA, connects with street mural legends like Shepard Fairey in the Arts District, volunteers to run youth workshops at the local community center,
    and occasionally captures sunrise hikes in delicate watercolor sketches, Aida Medina integrates visual literacy into daily life.
  travel: A spontaneous explorer who enjoys weekend drives to Santa Barbara and Catalina Island, dreams of a road trip along the Pacific Coast Highway to Seattle, and plans an art‑focused vacation to the
    Musée d'Orsay in Paris, Aida Medina balances wanderlust with family commitments and a modest travel budget.
  culinary: A passionate home chef who conjures tamales, rich mole poblano, and zesty fresh salsa from garden‑grown herbs like cilantro and epazote, Aida Medina proudly seasons dishes with ancho and chipotle
    chilies, and delights friends with spontaneous dinner parties that double as informal art talks.
  core: Aida Medina, a 50‑year‑old bilingual cashier and community art champion, balances a love of herb‑filled cooking and spontaneous gallery visits with occasional scheduling chaos, and they maintain
    a steadfast habit of daily meditation.
background:
  cultural: Aida is a first‑generation Mexican‑American whose parents immigrated from Jalisco in the 1970s. She grew up in a bilingual household in the San Fernando Valley, celebrating traditional Mexican
    holidays such as Día de los Muertos, Las Posadas, and Mexican Independence Day while also participating in broader American community events. Her upbringing emphasized family cohesion, respect for elders,
    and communal sharing of meals. Fluent in both Spanish and English, Aida navigates between the two cultures daily—using Spanish at home and with many customers, and English in the workplace and broader
    society. She maintains strong ties to the local Mexican community in Castaic and Los Angeles, often volunteering at cultural centers and helping organize neighborhood celebrations that showcase Mexican
    art, music, and cuisine. Her cultural identity informs her appreciation for vibrant visual expression, her cooking, and her desire to promote cross‑cultural understanding.
attributes:
  skills: '[''Cash handling'', ''Point-of-sale (POS) system operation'', ''Bilingual communication (English/Spanish)'', ''Customer service'', ''Conflict resolution'', ''Basic accounting'', ''Inventory management'',
