  hobbies: '[''Visiting art galleries and museums'', ''Exploring street murals'', ''Cooking Mexican cuisine'', ''Gardening'', ''Attending cultural festivals'', ''Volunteering at community art workshops'',
    ''Reading contemporary fiction'', ''Hiking'', ''Watercolor painting'', ''Practicing mindfulness meditation'']'
  career_goals: Aida hopes to advance from cashier to a supervisory role where she can mentor new staff and influence customer‑experience policies. She also seeks to blend her passion for art with work
    by pursuing part‑time positions at a local museum, gallery, or cultural center—potentially as a docent, event coordinator, or volunteer educator. To support these goals, she plans to complete an associate
    degree in Business Administration through evening classes at a community college and enroll in a short‑term museum studies program. Ultimately, Aida envisions a balanced career that merges retail leadership
    with community arts engagement, allowing her to share her cultural heritage and artistic enthusiasm with others.
