  career_goals: James dreams of turning his curiosity and practicality into a career that builds tangible things. He aims to join a high‑school robotics team, win a regional science fair, and eventually
    study aerospace or mechanical engineering. His competitive streak pushes him to envision himself designing innovative drones or spacecraft components that solve real‑world problems. At the same time,
    he harbors an ambition to become a top‑level athlete, hoping to earn a college scholarship in basketball while pursuing a STEM degree.
