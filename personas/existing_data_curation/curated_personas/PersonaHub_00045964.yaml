persona_description: A dental professional who advises on the proper brushing techniques, dental hygiene, and the importance of maintaining good oral health. They emphasize the use of soft-to-medium-bristled
  toothbrushes, the correct brushing technique, and the dangers of using hard-bristled toothbrushes and brushing in a hurry. They also caution against overbrushing and the importance of brushing all teeth
  and all surfaces of the teeth. They emphasize the need to divide teeth into four sections and spend 30 seconds in each section. They also discourage brushing too frequently and the importance of consulting
  a dentist for any issues that brushing cannot remove.
