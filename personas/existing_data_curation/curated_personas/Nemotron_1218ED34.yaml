personas:
  professional: Jose Ng is an aspiring junior marine artist and budding scientist who merges surf‑inspired sketches, tide‑pool cataloguing, and simple science experiments into school projects, channeling
    his curiosity while sometimes forgetting deadlines due to a laid‑back approach.
  sports: Jose Ng rides a small surfboard with the Kailua Kids Surf Club, enjoys weekend swell sessions, supports the local Pacific Dolphins youth swim team, and follows the Hawaii Rainbow Warriors basketball
    team for inspiration.
  arts: 'Jose Ng creates watercolor depictions of ocean waves, contributes to school murals celebrating island legends, devours graphic novels like Amulet and Avatar: The Last Airbender, and practices ukulele
    lullabies by artists such as Israel Kamakawiwo''ole.'
  travel: Jose Ng loves weekend excursions to nearby beaches such as Lanikai and a family road trip to Maui's Haleakalā crater, dreams of snorkeling at the Great Barrier Reef, and prefers spontaneous, low‑budget
    planning over strict itineraries.
  culinary: Jose Ng enjoys helping prepare poke bowls with fresh ahi, mixing taro leaves into laulau, and experimenting with pineapple‑coconut smoothies, but often leaves the kitchen a mess and forgets
    to clean up his utensils after cooking.
  core: A curious, surf‑loving 10‑year‑old who blends art, science, and music, yet frequently misplaces school supplies and worries about performance, turning everyday life into a colorful, slightly chaotic
    adventure.
background:
  cultural: Jose is rooted in a Polynesian heritage that blends traditional Hawaiian values with the broader Pacific Islander diaspora. His family traces its lineage to Samoa and native Hawaiian ancestors,
    and they live in Lahaina, a town rich with historic whaling, art galleries, and community festivals. From a young age, he has been taught the importance of 'ohana' (family) and 'aloha' (love, respect),
    and he participates in weekly Hawaiian language lessons where he learns words like 'kai' (sea) and 'aina' (land). He celebrates local customs such as Makahiki, attends hula performances, and helps create
    leis for celebrations, learning the stories behind each flower. The ocean is both a playground and a spiritual space for him, shaping his connection to nature and his desire to protect it. His cultural
    upbringing encourages curiosity, storytelling, and a deep respect for the environment, all of which influence his everyday life and future aspirations.
attributes:
  skills: '["Sketching and watercolor painting", "Basic ukulele chords", "Elementary reading and writing", "Basic arithmetic (addition, subtraction, multiplication)", "Introductory Scratch programming",
    "Knowledge of Maui''s marine life", "Fundamental surfing techniques", "Storytelling and oral tradition", "Puzzle solving and logical reasoning", "Cooperative group project participation"]'
  hobbies: '["Sketching marine scenes", "Surfing small waves", "Tide‑pool exploration", "LEGO building", "Simple science experiments", "Reading graphic novels", "Ukulele playing", "School art club projects",
    "Scratch programming", "Hula and lei‑making workshops"]'
  career_goals: Jose dreams of a future where he can blend his love of the ocean, art, and Polynesian culture. He hopes to become a marine biologist who documents reef life through detailed drawings, or
    an illustrated storyteller who preserves island myths and shares them with a global audience. He also imagines working as a cultural ambassador, creating interactive digital experiences that teach people
    about Pacific heritage. Above all, he wants a career that offers creative freedom, time outdoors by the sea, and the chance to protect the environment he cares deeply about, while allowing him to keep
    learning and exploring new ideas.
