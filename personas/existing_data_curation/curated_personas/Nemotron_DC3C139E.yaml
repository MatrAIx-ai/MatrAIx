  career_goals: Robin aims to leverage her hands‑on experience into a supervisory role within the warehouse or distribution center. She plans to pursue a certification in logistics or supply chain management,
    potentially through night classes at a community college to earn an associate degree in business. Her short‑term goal is to become a shift supervisor, where she can train new staff, streamline processes,
    and improve efficiency. Long‑term, she aspires to advance to a warehouse manager position, overseeing broader operational functions and contributing to strategic planning. Additionally, she is intrigued
    by e‑commerce fulfillment and may start a small online resale venture that utilizes her inventory expertise.
