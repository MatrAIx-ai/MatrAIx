personas:
  professional: Joelis Andrade is a budding mechanical tinkerer who channels a fascination for LEGO sets with moving parts into imaginative engineering play, merging curiosity with practicality while accepting
    a relaxed, sometimes disorganized approach to project planning.
  sports: Joelis Andrade enjoys playing soccer with the Prospect Park Junior Soccer Club, cheers for the New York Yankees and New York Knicks, participates in a weekly family salsa dance session that doubles
    as cardio, and prefers unstructured playground free‑play over organized sports practice, often forgetting to bring their water bottle.
  arts: Joelis Andrade loves sketching wildlife inspired by Disney movies like "Moana", sings loudly along to Disney classics such as "Let It Go" as well as Latin pop hits by Shakira and Bad Bunny, and
    attends community art workshops where they recreate scenes from Dr. Seuss, all of which shape a vivid, expressive imagination.
  travel: Joelis Andrade loves weekend trips to Central Park’s zoo, spends sunny days exploring Coney Island’s boardwalk, dreams of visiting the Grand Canyon and Disney World, prefers spontaneous family
    road trips over meticulously planned vacations, and often packs a small backpack with snacks and a sketchbook for on‑the‑go adventures.
  culinary: Joelis Andrade enjoys helping with family cooking, especially rolling out dough for empanadas and shaping pan de yuca, loves the cheesy stretch of melted mozzarella on pizza, experiments with
    snack bites that combine pineapple chunks and crushed pretzels, and eagerly tastes fresh mango slices with a squeeze of lime.
  core: Joelis Andrade is a curious, laid‑back seven‑year‑old who builds intricate LEGO machines, draws vivid animal scenes, dances to salsa riffs, saves allowance for new sets while occasionally forgetting
    school supplies, and balances a practical mindset with a charming dash of organized chaos.
background:
  cultural: Joel’s family originates from the coastal region of Ecuador, and she grows up in a bilingual household where Spanish is spoken at home and English at school. Traditional celebrations such as
    Carnaval, Día de los Difuntos, and Ecuadorian Independence Day are observed with family gatherings, music, and cuisine like ceviche, empanadas, and pan de yuca. Living in Brooklyn’s diverse neighborhoods,
    she participates in community events at the local Latino cultural center, sharing stories and customs with other Ecuadorian and Latin American families. Her identity blends the warmth and rhythms of
    Ecuadorian heritage with the urban multicultural energy of New York City.
attributes:
  skills: '["Reading comprehension (English and Spanish)", "Basic addition and subtraction", "Storytelling and creative writing", "Sketching and coloring", "Introductory coding with Scratch", "Bilingual
