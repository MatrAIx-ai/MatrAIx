  hobbies: '["LEGO building", "Drawing and coloring", "Reading adventure books", "Playing at Prospect Park", "Dancing to salsa and reggaeton", "Kids science experiment kits", "Listening to music (Latin
    pop, Disney)", "Cooking Ecuadorian dishes with family"]'
  career_goals: Joel dreams of becoming a marine biologist who protects the Pacific Ocean’s marine life, inspired by Ecuador’s coastal ecosystems and family stories. She also imagines designing interactive
    educational games for kids, merging her love for technology and teaching. In the near term, she aims to win the school science fair, learn to play a musical instrument, and share her cultural heritage
    through music and community projects.
