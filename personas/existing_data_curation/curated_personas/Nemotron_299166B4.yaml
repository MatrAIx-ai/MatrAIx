  career_goals: Manuel envisions a future where he can combine his love for art, technology, and community. He aspires to become a multimedia artist or creative technologist, creating interactive installations
    that reflect cultural narratives and urban experiences. In the short term, he hopes to build a strong portfolio of digital artwork, participate in local art workshops, and perhaps launch a YouTube channel
    where he shares tutorials and cultural stories in both Spanish and English. He also dreams of earning scholarships that will allow him to study graphic design or animation at a college that values interdisciplinary
    and socially engaged art.
