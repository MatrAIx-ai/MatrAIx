personas:
  professional: Manuel Rivas is an aspiring multimedia creator who fuses street art, comic drawing, and short animation to tell vibrant urban stories, channeling a curious, spontaneous mindset into collaborative
    jam sessions while often battling procrastination and missed deadlines.
  sports: Manuel Rivas spends afternoons at the Norwalk Skate Park as a member of the Norwalk Skate Collective, watches the New York Knicks and New England Patriots on weekends, and occasionally joins a
    community soccer league that fields the Norwalk Nomads, balancing high‑energy skate sessions with a love for basketball’s fast‑break rhythm.
  arts: Manuel Rivas immerses themselves in the world of street culture, drawing inspiration from artists like Banksy and Basquiat, vibing to Kendrick Lamar, J Balvin, and Bad Bunny, while contributing
    to school murals and impromptu freestyle performances that blend graffiti aesthetics with comic‑book storytelling.
  travel: Manuel Rivas prefers spontaneous weekend trips that blend urban exploration with cultural immersion, having trekked to the murals of Mexico City, the skate‑friendly alleys of Berlin, and the carnival
    atmosphere of New Orleans, while dreaming of a future road‑trip along the Pacific Coast Highway to capture sunrise surf spots.
  culinary: Manuel Rivas enjoys cooking simple Mexican‑style dishes at home, mastering tacos al pastor with pineapple, fresh guacamole seasoned with lime and cilantro, and cheesy quesadillas spiced with
    chipotle, while experimenting with cumin and smoked paprika to add depth to their family’s dinner table.
  core: Manuel Rivas, a 14‑year‑old skate‑savvy street‑artist, channels boundless curiosity into bold graffiti, comic sketches, and impromptu dance moves, even as they juggle impulsive spending, occasional
    ankle sprains, and a skeptical edge that fuels their relentless pursuit of the next creative challenge.
background:
  cultural: Manuel’s Mexican heritage is a central part of his identity. He grows up in a bilingual household where Spanish is spoken alongside English, which gives him a deep connection to Mexican customs
    and language. Family gatherings celebrate Día de los Muertos, quinceañera preparations, and traditional foods like tamales and pozole, fostering a strong sense of cultural pride. Living in Norwalk,
    he also participates in local Latino community programs, such as the 'Barrio Connections' youth center, where he mentors younger children in art and shares stories from his heritage. This blend of Mexican
    traditions and Connecticut’s multicultural environment shapes his worldview, fueling his curiosity about how cultures intersect in contemporary art.
