personas:
  professional: Roberto Sanchez, a 19‑year‑old agricultural technician, leverages his hands‑on expertise with drip‑irrigation, small‑engine maintenance, and bilingual communication to keep a desert greenhouse
    running on schedule, embodying his practical, structured approach and reliability.
  sports: Roberto Sanchez enjoys playing pickup soccer with the local mixed‑age league, cheering for the Las Vegas Lights FC, hiking Red Rock Canyon with the Red Rock Hiking Club during spring, and follows
    the Los Angeles Lakers for basketball during the NBA season.
  arts: Roberto Sanchez writes bilingual verses inspired by his family's heritage, listens to regional banda stalwarts like Los Tigres del Norte and Banda El Recodo while farming, and frequents the downtown
    art walk to admire desert‑inspired murals and street performances.
  travel: Roberto Sanchez prefers spontaneous road trips, spending weekends exploring nearby destinations such as Zion National Park and the Grand Canyon, while dreaming of a future trip to the country
    of his ancestors' culinary roots to experience the landscape that inspired his favorite dishes.
  culinary: Roberto Sanchez excels at cooking traditional dishes like chicken pozole with hominy and pork tamales, experimenting with heirloom peppers from his rooftop garden to create smoky salsas, and
    delights in using fresh cilantro, chipotle, and corn masa to craft authentic flavors.
  core: Roberto Sanchez, 19, blends a disciplined greenhouse routine with a love for banda music, strategic gaming, and weekly soccer, all while meticulously saving for his GED and future farm.
background:
  cultural: Roberto grew up in a Mexican‑American household where Spanish was spoken daily and family gatherings were centered around food, music, and Catholic traditions. He celebrates Día de los Muertos
    with altars honoring relatives, participates in Cinco de Mayo community events, and attends the annual Las Vegas Mexican Festival. Familismo and a strong work ethic, inherited from his parents who migrated
    for agricultural work, shape his sense of responsibility and community involvement. While he embraces the multicultural vibrancy of Las Vegas, he maintains a pride in Mexican heritage through cuisine,
    music, and the practice of traditional celebrations.
attributes:
  skills: '["Crop cultivation and harvesting","Irrigation system monitoring and adjustment","Basic equipment maintenance (tractors, sprayers, small engines)","Forklift operation","Inventory tracking and
