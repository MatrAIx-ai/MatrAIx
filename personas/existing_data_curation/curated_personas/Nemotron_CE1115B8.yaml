    (inventory software)"]'
  hobbies: '["Rooftop gardening (heirloom peppers, tomatoes)","Hiking in Red Rock Canyon","Pickup soccer league","Cooking Mexican cuisine (tamales, pozole)","Listening to banda and norteña music","Video
    gaming (strategy games)","Bilingual poetry writing","Attending local Mexican cultural festivals","Volunteer work at community garden","Fishing at Lake Mead"]'
  career_goals: Roberto aims to complete his GED within the next year and enroll in a community‑college program in horticulture or agricultural science. His short‑term goal is to earn a certified pesticide
    applicator credential and become a greenhouse manager at a commercial operation. In the longer term, he hopes to oversee a water‑efficient, sustainable farm that supplies fresh produce to local restaurants
    and farmers markets, eventually mentoring other young farmworkers and possibly launching his own small‑scale urban farm that incorporates traditional Mexican farming techniques.
