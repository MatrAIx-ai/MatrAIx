  career_goals: Andrew aims to complete a bachelor's degree in Information Technology within the next two years, positioning himself for a senior network administrator role. He aspires to lead a small IT
    team as an IT manager, focusing on process improvement and staff mentorship. Passionate about innovation, he plans to pilot AI‑powered chatbots and automation scripts in his current workplace to reduce
    ticket resolution times. Long‑term, Andrew envisions consulting for rural small businesses, helping them adopt cost‑effective tech solutions while also publishing a series of creative tech tutorials
    that blend his love for art and abstract concepts.
