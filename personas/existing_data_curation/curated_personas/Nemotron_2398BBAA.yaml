personas:
  professional: Andrew Shaver is a seasoned computer support specialist who translates complex tech issues into clear visual guides, crafts meticulous SOPs, and automates routine tasks with PowerShell and
    Bash, all while channeling his vivid imagination into abstract digital paintings that inspire innovative AI‑driven support solutions as they work toward a senior network administrator role.
  sports: Andrew Shaver is an avid hiker who spends weekends trekking sections of the Appalachian Trail with a local hiking club, occasionally joins a community 5K run for charity, and supports the Pittsburgh
    Steelers and Philadelphia Phillies as a dedicated fan, while also playing casual pick‑up basketball at the neighborhood recreation center during summer evenings.
  arts: Andrew Shaver immerses themselves in abstract digital painting on Procreate, drawing inspiration from artists like Refik Anadol and Gerhard Richter, while improvising piano pieces in the style of
    Ludovico Einaudi and Nils Frahm; they devour speculative fiction by Neal Stephenson and Ted Chiang, capture Pennsylvania’s foliage through landscape photography reminiscent of Ansel Adams, and share
    their love of tech‑art by teaching basic computer skills at the local library, often using Adobe Illustrator to create visually engaging tutorials.
  travel: Andrew Shaver crafts meticulously planned itineraries that blend solitary wilderness retreats with cultural hotspots—having hiked the Blue Ridge Parkway in Virginia, explored the historic streets
    of Kyoto during a cherry‑blossom festival, and attended a speculative‑fiction convention in Montreal—while budgeting trips around family obligations and preferring off‑peak travel to avoid crowds, they
    also schedule weekend getaways to nearby Gettysburg for history tours and to New York City for Broadway shows.
  culinary: Andrew Shaver enjoys experimenting with home‑brew craft beer, favoring hop varieties like Citra and Mosaic, while also cooking comfort meals such as mushroom risotto with fresh thyme, grilled
    flank steak with chimichurri, and a classic Philly cheesesteak topped with provolone; they possess an intermediate cooking skill set, often using a sous‑vide for precision, and savor pairing their brews
    with charcuterie boards featuring aged cheddar and smoked sausage.
  core: Andrew Shaver is a methodical tech support veteran whose vivid imagination fuels digital art, home‑brew experiments, and a relentless pursuit of efficiency, even as they grapple with a habit of
    over‑worry.
background:
  cultural: Andrew grew up in a small, predominantly white town in central Pennsylvania, rooted in a family tradition of Anglo‑American farming and manufacturing. His upbringing was shaped by modest, mainline
    Protestant values emphasizing hard work, community service, and self‑reliance. While he respects these local customs—participating in county fairs, supporting the high school tech club, and attending
    church gatherings—he also embraces a broader, global perspective through online art communities and tech forums. This blend of Mid‑Atlantic modesty with a curiosity for novelty and abstract ideas informs
    both his professional demeanor and his personal creative pursuits.
attributes:
  skills: '[''Technical troubleshooting'', ''Hardware diagnostics'', ''Network configuration'', ''Remote support tools'', ''Ticketing system management'', ''Documentation and SOP creation'', ''PowerShell
