  career_goals: Ashaela aims to transition from a front-line waiter to a supervisory role within the next two years, pursuing a hospitality management certificate at a local community college. Her long-term
    ambition is to open a small café that doubles as a gallery space, showcasing local Black and Indigenous artists while providing affordable meals and a welcoming community hub. She hopes to combine her
    organizational strengths, compassionate leadership style, and love for the arts to create a business that supports economic empowerment and cultural expression. Additionally, she intends to mentor younger
    staff and deepen her involvement with Seattle's food-security initiatives.
