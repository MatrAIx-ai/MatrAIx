  career_goals: She aims to become a senior director of sales within the next five years, overseeing regional operations for a tech or biotech firm, and to drive innovative, data-driven sales strategies
    that integrate emerging technologies. Trinh also aspires to mentor high-performing sales teams, earn industry recognition for exceeding revenue targets, and eventually launch her own consultancy that
    blends sales optimization with technology integration. Pursuing an MBA is on her horizon to broaden strategic business expertise.
