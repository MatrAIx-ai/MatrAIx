    ''Compassionate client advocacy'', ''Basic dementia care strategies'']'
  hobbies: '[''Cooking Dominican cuisine'', ''Herb gardening'', ''Crocheting'', ''Church choir participation'', ''Listening to merengue and bachata'', ''Dancing'', ''Playing dominoes'', ''Volunteering at
    community senior center'', ''Evening nature walks'', ''Reading romance novels'']'
  career_goals: Blanca aims to formalize her extensive experience by obtaining a Certified Nursing Assistant (CNA) credential and completing a geriatric care certification at a nearby community college.
    She hopes to transition into a supervisory role within her agency, where she can mentor new aides and develop structured training programs. In the longer term, Blanca dreams of establishing a small,
    culturally‑focused home‑care service that caters to Dominican seniors in Rockland County, ensuring they receive care that respects their language, traditions, and dietary preferences.
