personas:
  professional: Blanca Campa, a diligent personal care aide with over three decades of hands‑on experience, leverages bilingual fluency, CPR certification, and a methodical care‑plan mindset to reliably
    support seniors, and they pursue a supervisory position where they can mentor newcomers and champion structured training, reflecting their competitive drive and preference for predictability.
  sports: Blanca Campa enjoys brisk evening walks through the nearby woods, joins a senior walking club twice a week, dances energetically to merengue at community festivals, and remains a loyal fan of
    the New York Knicks and the New York Yankees, balancing low‑impact activity with spirited sports fandom.
  arts: Blanca Campa sings in her parish choir, sways to merengue and bachata tracks by Juan Luis Guerra, Aventura, and Romeo Santos, and frequently attends live performances at the local cultural center,
    weaving music into both sacred and social facets of her life.
  travel: Blanca Campa favors travel that blends family reunions with cultural immersion, having cherished trips to Puerto Rico and New York City, and they aspire to explore the historic streets of Seville,
    Spain, while carefully budgeting the journey within their modest pension.
  culinary: Blanca Campa delights in preparing robust sancocho, creamy mangú, and golden pastelitos, expertly seasoning them with home‑grown cilantro, oregano, and ají peppers, and they relish sharing these
    meals with family and neighbors during lively weekend gatherings.
  core: Blanca Campa is a structured, compassionate caregiver who balances meticulous care with a zest for cooking, crochet, and community rhythm, while navigating the quirks of retirement life.
background:
  cultural: Blanca was born in the Dominican Republic and moved to the United States as a teenager. Her upbringing emphasized close family ties, respect for elders, and a strong Catholic faith, all of which
    continue to shape her worldview. She maintains fluency in Spanish and English, allowing her to bridge cultural gaps for her clients. The rhythmic beats of merengue and bachata, the rich flavors of Dominican
    cuisine, and community celebrations like Carnaval have left an indelible mark on her identity. Blanca actively participates in local Dominican cultural events in Garnerville, fostering a sense of belonging
    while sharing her heritage with the broader Rockland County community.
attributes:
  skills: '[''Personal hygiene assistance'', ''Mobility and transfer support'', ''Medication management'', ''Vital sign monitoring'', ''Bilingual communication (Spanish/English)'', ''Care documentation
