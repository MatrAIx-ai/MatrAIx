  hobbies: '["Drawing and watercolor painting", "Coloring books and sketching", "Reading picture books", "Building LEGO structures", "Craft projects (glue, glitter, recycled materials)", "Exploring nature
    (collecting leaves, shells, stones)", "Listening to Zydeco and Cajun music", "Playing the recorder", "Attending local festivals (Mardi Gras parade)"]'
  career_goals: Scarlett dreams of becoming someone who can bring joy and comfort through creativity. She often says she wants to be an artist who paints stories for children or a teacher who helps kids
    discover their own imaginations. Influenced by her love for helping others, she also imagines working in a community center or museum where she can share art and cultural traditions with friends and
    family. Her long-term ambition is to combine her artistic talent with her caring nature to inspire harmony and kindness in others.
