personas:
  professional: Scarlett Nicholls, a budding junior LEGO architect and wildlife illustrator, channels their curiosity and love for nature into building intricate models of local fauna while using meticulous
    organization to keep their creations tidy, yet they remain flexible enough to embrace spontaneous glitter‑filled experiments, reflecting their quiet, kind nature.
  sports: Scarlett Nicholls enjoys playing forward for the Lafayette Youth Soccer Club's under‑8 team, practices dribbling after school, and they watch the Louisiana Ragin' Cajuns football games with family,
    embodying their reserved yet team‑oriented spirit and love for organized play.
  arts: Scarlett Nicholls spends afternoons sketching vivid scenes of local wildlife and Mardi Gras parades while they listen to the lively accordion sounds of Clifton Chenier and Buckwheat Zydeco, and
    their habit of embellishing crafts with glitter and recycled materials showcases a uniquely inventive artistic flair.
  travel: Scarlett Nicholls prefers family road trips that blend adventure with discovery, such as exploring New Orleans' French Quarter during Mardi Gras and collecting shells on Grand Isle's beaches,
    and they love decorating a travel journal with colorful stickers to map each visit.
  culinary: Scarlett Nicholls delights in the bold flavors of shrimp étouffée seasoned with cayenne and thyme, eagerly helps stir the pot with a plastic spoon, and they also perfect chocolate chip cookies
    topped with rainbow sprinkles, reflecting a palate that mixes local Cajun cuisine with classic kid‑friendly treats.
  core: Scarlett Nicholls is a quietly curious seven‑year‑old who blends meticulous LEGO building with spontaneous glitter crafts, savors the order of a neatly labeled craft drawer while they occasionally
    leave a trail of colored pencils across the living room floor.
background:
  cultural: Scarlett is raised in a white, Southern-American family living in Lafayette, Louisiana, a city known for its vibrant Cajun and Creole heritage. Her family participates in local traditions such
    as Mardi Gras celebrations, enjoys regional foods like gumbo and jambalaya, and occasionally attends the Catholic Mass that reflects the area’s historic religious roots. While her ancestry is primarily
    Anglo-American, she is exposed to the French-speaking Acadian culture through community events, school lessons, and occasional French phrases used in everyday conversation. This blend of Southern hospitality,
    community-oriented values, and the rhythmic sounds of Zydeco music shapes her appreciation for art, harmony, and cultural diversity.
