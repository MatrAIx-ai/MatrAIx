personas:
  professional: Brittany Todd, a six‑year‑old budding architect, transforms their love for intricate LEGO castles into miniature building projects, meticulously following hand‑drawn blueprints and treating
    each piece like a precision component in an imagined cityscape.
  sports: Brittany Todd, a six‑year‑old who prefers calm activity, enjoys swimming at the community pool after school and joins the local Minnehaha Trail nature walks with their family, cheers for the Minnesota
    Wild hockey team, and occasionally participates in a tiny‑tots soccer class that satisfies their love for structured play.
  arts: Brittany Todd, a six‑year‑old watercolor enthusiast, spends quiet afternoons sketching fantastical kingdoms while listening to Beethoven’s Symphony No. 5 and the folk tunes played at family holiday
    gatherings, and proudly assembles a handmade portfolio that they arrange alphabetically by theme.
  travel: Brittany Todd, a six‑year‑old explorer, loves weekend trips to Lake Harriet where they collect shells and rocks, dreams of wandering the bustling stalls of the Minnesota State Fair for its rides
    and treats, and has a growing wish list that includes a family road trip to historic Mackinac Island for its carriage tours.
  culinary: Brittany Todd, a six‑year‑old budding chef, delights in stirring hotdish casseroles with carrots and cheese alongside their parents, enjoys savoring warm apple crisp sprinkled with cinnamon,
    and can name the exact garnish—chopped parsley—they prefer on their grilled cheese.
  core: Brittany Todd, the precise dreamer, balances meticulous LEGO building and vivid watercolor imagination with a sensitive heart that sends them into anxiety when routines are broken.
background:
  cultural: Brittany was raised in a predominantly white, Midwestern American family in Shakopee, Minnesota. Her ancestry includes German and Scandinavian roots, reflected in family traditions such as holiday
    gatherings, folk music, and a love of outdoor activities like lake outings and hiking. The community places a strong emphasis on modesty, punctuality, and organized routines, which dovetails with Brittany’s
    disciplined nature. She celebrates typical American holidays—Thanksgiving, Christmas, and July 4th—while also participating in local events like the Minnesota State Fair and the town’s summer park concerts.
    The local school and church environments reinforce a culture of cooperation, personal responsibility, and encouragement of curiosity, shaping Brittany’s blend of creativity and structure.
