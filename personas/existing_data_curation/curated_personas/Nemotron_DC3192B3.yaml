  career_goals: Brittany dreams of turning her imaginative drawings and stories into published children’s books, hoping to become a celebrated author‑illustrator. She also envisions herself exploring scientific
    mysteries, perhaps as a future inventor or wildlife researcher who designs inventive tools. Guided by her high standards, she sets personal goals to master drawing techniques, improve her reading fluency,
    and build a portfolio of artwork that she can share with a small, supportive audience.
