    art workshops"]'
  career_goals: Alejandra hopes to move from a line worker to a supervisory role within the processing plant, gaining formal certification in food safety and taking a short community‑college course on production
    management. She also dreams of mentoring newer employees, especially those who share her Mexican heritage, and eventually leading a small team that focuses on innovative product ideas. Parallel to her
    career, she aspires to nurture her artistic side by joining a local art class and showcasing her watercolor pieces in community exhibitions, using creativity as a way to balance work stress.
