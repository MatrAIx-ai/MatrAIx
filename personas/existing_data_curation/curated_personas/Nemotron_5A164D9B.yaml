  career_goals: As he approaches retirement, Ian aims to transition into an EMS director role for the Gilbert‑Mesa area, focusing on improving response times and integrating advanced data‑driven strategies.
    He is passionate about establishing a comprehensive mental‑health support program for first responders and creating a city‑wide youth first‑aid curriculum. Over the next five years, he hopes to author
    a handbook on desert‑specific emergency care and mentor a new generation of paramedics through formal training workshops.
