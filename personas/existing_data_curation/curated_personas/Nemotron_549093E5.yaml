personas:
  professional: Paola Soto is a retired educator turned cultural liaison, using their organizational precision and boundless imagination to orchestrate bilingual storytelling evenings, art workshops, and
    intergenerational dance events that weave together local customs and global narratives, and they always greet participants with a warm smile.
  sports: Paola Soto is a devoted fan of the Syracuse Orange basketball and the New York Mets, participates in a local seniors walking club through Onondaga County parks, enjoys low-impact yoga classes
    at the community center, and they dabble in weekly pickleball matches at the senior center, maintaining a steady but gentle fitness routine.
  arts: Paola Soto immerses themselves in watercolor landscapes inspired by the rolling hills of upstate New York and the vibrant coastlines of their birthplace, draws artistic inspiration from Frida Kahlo
    and Georgia O'Keeffe, regularly attends exhibitions at the Everson Museum featuring works by contemporary painter Fernando Botero, and they sway to the rhythms of Carlos Vives, Shakira, and local folk
    group Los Gaiteros de San Jacinto while dancing salsa.
  travel: Paola Soto prefers organized group tours that blend cultural immersion with comfort, having revisited Cartagena and Medellin on nostalgic trips, explored New York City's museums, and they dreamed
    of strolling the streets of Oaxaca's markets and the historic alleyways of Granada, Spain, while balancing travel budgets with senior discounts and family responsibilities.
  culinary: Paola Soto loves preparing and sharing aromatic sancocho, crispy arepas, and sweet empanadas seasoned with cumin, cilantro, and plantain flour, skillfully balancing traditional family recipes
    with occasional experiments like quinoa-infused salads, and they relish dining at local farm-to-table bistros that feature seasonal produce such as heirloom tomatoes and fresh trout.
  core: Paola Soto blends a lifetime of storytelling, vibrant cooking, and community stewardship into a bright, organized, and compassionate presence that keeps cultural memories alive while they joyfully
    embrace new experiences.
background:
  cultural: Paola was born and raised in a small town near Medellín, Colombia, steeped in Catholic traditions, vibrant festivals, and a strong emphasis on family meals. She immigrated to the United States
    in her early twenties, eventually settling in Syracuse, NY, where she has lived for nearly five decades. Bilingual and bicultural, Paola maintains her Colombian identity through language, cuisine, music,
    and celebrations such as Carnaval de Barranquilla and Día de los Muertos (as observed in her hometown). She actively participates in the local Colombian community, helping organize cultural events that
    blend Colombian customs with the rhythms of Upstate New York. At the same time, she embraces American holidays and local traditions, creating a rich, interwoven cultural tapestry that she proudly shares
    with friends, neighbors, and family.
attributes:
  skills: '[''Community event planning'', ''Spanish language teaching'', ''Traditional Colombian cooking'', ''Storytelling and oral history preservation'', ''Watercolor painting and crafts'', ''Interpersonal
