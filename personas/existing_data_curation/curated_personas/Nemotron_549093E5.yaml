  hobbies: '[''Reading magical realism literature'', ''Watercolor painting'', ''Traditional Colombian cooking'', ''Cumbia and salsa dancing'', ''Community storytelling circles'', ''Garden horticulture'',
    ''Walking in local parks'', ''Board games with friends'', ''Knitting and crocheting'', ''Volunteering at senior center'']'
  career_goals: Even in retirement, Paola aims to leave a cultural legacy. She hopes to publish a memoir of her family's journey from Colombia to Syracuse, capturing the blend of traditions she has nurtured.
    Paola also dreams of establishing a quarterly “Colombian Culture Night” at the community center, featuring cooking workshops, music, and dance, and of becoming a mentor for younger volunteers, guiding
    them in event planning and community engagement. Ultimately, she wants to strengthen intergenerational ties and ensure that the rich flavors and stories of her heritage are celebrated in her adopted
    hometown.
