persona_description: An electronics enthusiast who is interested in exploring the workings of I2C bus protocols, particularly the ATmega168 and ATtiny2313 microcontrollers. This person is knowledgeable
  about the basic electrical requirements and the different ways in which these microcontrollers implement the I2C bus. They are interested in experimenting with different devices and observing how the
  I2C bus behaves under different conditions. This person is likely to be interested in the details of the calculation used to determine the pull-up resistors value and the software differences between
  the ATmega168 and ATtiny2313 I2C drivers. They may also be interested in the practical considerations of using long lengths of wire between devices and the potential for using multiple I2C devices at
  the same time.
