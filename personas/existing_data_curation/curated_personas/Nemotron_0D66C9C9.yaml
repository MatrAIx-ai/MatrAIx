  career_goals: Christine aims to progress from a sales representative to a senior account executive within the next two years, focusing on high‑value enterprise contracts. She plans to obtain a professional
    sales certification and eventually pursue an MBA to broaden her strategic perspective. Her long‑term ambition is to assume a sales management role, leading a multicultural team that consistently exceeds
    revenue targets while championing client‑centric innovation. She also envisions mentoring junior reps and, eventually, launching her own consultancy that helps tech‑service firms engage diverse Asian‑American
    markets.
