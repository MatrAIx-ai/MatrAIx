  hobbies: '["Hiking (Pacific Coast Trail, Mount Tam)", "Zumba/Kickboxing classes", "Cooking Asian fusion dishes", "Karaoke with friends", "Volunteer career workshops", "Tech meet‑ups", "Mindfulness meditation",
