  career_goals: Although retired, Daisy remains driven to leave a lasting cultural legacy and to continue personal growth. She plans to complete the undergraduate degree she began, focusing on art history
    or literature through a community college distance‑learning program. Daisy is drafting a memoir that weaves her family’s stories with the cultural evolution of the Arecibo‑Utuado area, hoping to publish
    it locally. She aims to curate a traveling exhibition of local artists’ works, leveraging her organizational strengths to secure venues and funding. Expanding her digital art skills, she intends to
    experiment with tablet‑based painting that merges traditional techniques with modern media. Volunteering as a cultural historian at the municipal archive, she aspires to document oral histories of elders,
    preserving the island’s intangible heritage. Additionally, she is committed to maintaining health and independence by setting goals for regular exercise, mindfulness practices to manage worry, and continuous
    learning.
