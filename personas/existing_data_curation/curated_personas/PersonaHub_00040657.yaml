persona_description: A healthcare professional who works in neurology or geriatrics, particularly in the diagnosis and management of secondary parkinsonism caused by various health problems such as brain
  injury, diffuse Lewy body disease, and other neurological conditions. They have expertise in assessing the symptoms, conducting physical exams, and ordering tests to confirm or rule out other underlying
  causes. They are also aware of the rare cases of secondary parkinsonism among IV drug users and the potential for side effects from treating the condition. They are highly skilled in monitoring patients
  taking medicines that can cause secondary parkinsonism and are careful to prevent the condition from developing.
