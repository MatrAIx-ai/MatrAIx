  hobbies: '["Soccer", "Cartoon drawing", "Reading graphic novels", "School performances (singing, dancing, storytelling)", "Building LEGO sets", "Cooking simple Ecuadorian dishes", "Playing video games
    (Mario Kart)"]'
  career_goals: Deven dreams of a career where he can combine his love of talking to people, sharing stories, and celebrating his culture. He imagines becoming a popular children's TV host or a sports broadcaster
    who can entertain and inspire kids while speaking both English and Spanish. He also thinks about playing professional soccer for a team that represents his community, or becoming a cartoon illustrator
    who creates characters that showcase Ecuadorian traditions. In the longer term, he hopes to help other children learn Spanish and feel confident about their cultural roots.
