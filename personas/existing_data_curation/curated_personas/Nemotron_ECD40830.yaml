personas:
  professional: A budding soccer organizer, Deven Hernandez runs a weekly kick‑around at the neighborhood park, preferring the familiar routine of set positions yet often improvising new drills on the fly,
    using their talkative charisma to rally teammates, and they sometimes neglect to keep track of scores.
  sports: A passionate soccer enthusiast, Deven Hernandez plays forward for the Yorba Linda Youth Soccer Club, idolizes LA Galaxy’s Cristian Roldan, follows the Dodgers’ baseball season, enjoys spontaneous
    park drills in the summer and organized weekend practices in the fall, and they often motivate teammates with their talkative nature while sometimes neglecting to stretch before games, leading to occasional
    sore calves.
  arts: A creative doodler, Deven Hernandez spends afternoons sketching comic‑style heroes such as Spider‑Man and Batman, devours graphic novels by Stan Lee, and when they perform in school talent shows
    they sing Shakira's Waka Waka and reenact scenes from Pixar's Toy Story, channeling their sociable energy into animated performances.
  travel: An adventurous weekend explorer, Deven Hernandez loves spontaneous road trips to the San Diego Zoo and the Grand Canyon, dreams of visiting the vibrant streets of Quito to see its famous volcanoes,
    prefers a mix of structured museum visits and unplanned beach play, and they often save allowance for family airfare while occasionally begging for a last‑minute trip to Disneyland when they hear a
    new ride announced.
  culinary: A budding junior chef, Deven Hernandez enjoys helping prepare cheese empanadas and sweet plantain fritters using corn flour, mashed ripe plantains, and a pinch of cinnamon, loves munching on
    pizza with extra mozzarella, and when they experiment with guacamole they often add too much salt in their excitement.
  core: Deven Hernandez is a talkative, routine‑loving 8‑year‑old who juggles spontaneous soccer drills with a habit of stashing allowance in a piggy bank, yet they frequently worry about missing a game
    or forgetting their inhaler, and they can’t resist adding extra cheese to any dish.
background:
  cultural: Deven comes from an Ecuadorian family that settled in Yorba Linda, California. At home, Spanish is spoken alongside English, giving him a bilingual upbringing. His parents maintain Ecuadorian
    traditions, celebrating holidays such as Carnaval, Día de la Independencia (August 10) and Semana Santa with music, dance, and traditional foods like ceviche, llapingachos, and plantains. He often attends
    community events hosted by local Hispanic cultural groups, where he learns traditional dances like salsa and learns the stories behind Ecuadorian folklore. Deven’s cultural identity is reinforced through
    family meals, Spanish language lessons, and occasional visits to Ecuadorian restaurants in Orange County, fostering a strong connection to his roots while also navigating the broader American culture
    of his neighborhood.
attributes:
  skills: '["Bilingual communication (English/Spanish)", "Reading comprehension", "Basic arithmetic", "Storytelling and public speaking", "Memorization of routines", "Soccer ball control and teamwork",
