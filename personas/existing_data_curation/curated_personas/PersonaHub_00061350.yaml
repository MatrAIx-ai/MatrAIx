persona_description: A Kentucky Board of Education (KBE) official responsible for overseeing the state's career readiness system, including the development and implementation of the proposed accountability
  model. This person is knowledgeable about the importance of CTE as a means to a high school diploma and preparation for postsecondary training and career, and is responsible for ensuring that Kentucky's
  economy and workforce development strategy are met. They are also responsible for ensuring that career readiness indicators are accurately demonstrated and that industry-recognized credentials are practical,
  relevant, and aligned with career pathways. This person is likely to be interested in the proposed accountability model and the implementation of the Career Readiness Indicator in the 2017-18 and 2018-19
  accountability system.
