personas:
  professional: Jessica Robertson, a community‑college business teaching assistant, blends her structured, practical mindset with warm sociability to design clear, engaging curricula, facilitate adult learning,
    and lead community workshops that balance rigorous financial analysis with supportive mentorship.
  sports: Jessica Robertson stays active through weekly beach yoga, a sailing club on the Intracoastal Waterway, and occasional beach‑volleyball matches, while cheering for the Miami Dolphins in fall football,
    the Miami Heat during winter basketball, and Inter Miami in spring soccer, balancing structured workouts with the flexibility of open‑water sailing.
  arts: Jessica Robertson enriches her cultural life by regularly attending live theater productions at the Broward Center—such as a recent staging of 'The Book of Mormon'—discussing historical fiction
    by Hilary Mantel with her book club, and listening to classic rock from Fleetwood Mac and contemporary jazz pianist Gregory Porter during relaxed evenings.
  travel: Jessica Robertson plans her travels with meticulous itineraries, favoring organized trips to Mediterranean Greece, Southern coastal Charleston, and weekend getaways to the Florida Keys, while
    dreaming of an immersive cultural retreat in Bali’s Ubud region, balancing budget awareness with a desire for enriching experiences.
  culinary: Jessica Robertson, an intermediate home chef, delights in preparing Mediterranean branzino with lemon‑oregano, Southern shrimp and grits seasoned with smoked paprika, and vibrant tabbouleh featuring
    fresh parsley, cucumbers, and bulgur, often sourcing local fish and heirloom tomatoes at the Fort Lauderdale farmer’s market.
  core: Jessica Robertson blends disciplined organization with a warm, community‑focused spirit, channeling her love for beach yoga, sailing, and potluck cooking into a purposeful life that balances strategic
    career ambitions with a penchant for spontaneous laughter and a habit of over‑watering her garden.
background:
  cultural: Jessica was raised in a middle‑class, white Anglo‑American family in the southeastern United States, with roots in Irish and English ancestry. Her upbringing emphasized the value of education,
    hard work, and community service, reflecting the cultural norms of a Protestant‑Christian background. Relocating to Fort Lauderdale in her early thirties exposed her to a multicultural environment,
    which she embraced through active participation in local cultural festivals and community initiatives. She identifies with mainstream American cultural values while also appreciating the diverse influences
    of South Florida’s Hispanic, Caribbean, and Caribbean‑American communities, which have shaped her inclusive outlook and cooking preferences.
attributes:
  skills: '[''Business fundamentals'', ''Financial analysis'', ''Strategic planning'', ''Curriculum development'', ''Instructional design'', ''Learning Management System (Canvas)'', ''Student advising'',
    ''Group facilitation'', ''Conflict resolution'', ''Project management'', ''Event planning'', ''Data visualization (PowerBI)'', ''Microsoft Excel (advanced)'', ''Public speaking'', ''Mentoring'']'
  hobbies: '[''Beach yoga'', ''Sailing'', ''Cooking Mediterranean cuisine'', ''Hosting potluck dinner parties'', ''Reading business and self‑development books'', ''Book club participation'', ''Mentoring
    youth entrepreneurs'', ''Volunteering at senior center'', ''Traveling'', ''Gardening'', ''Attending live theater'']'
  career_goals: Jessica aims to transition from her role as a teaching assistant to a full‑time faculty position within the next three years, seeking a tenure‑track role or a permanent adjunct appointment
    in business education. She plans to deepen her academic credentials by pursuing a master’s degree in Business Education or an MBA with a focus on teaching. Her long‑term ambition is to develop and lead
    a community‑focused business incubator program that offers continuing‑education workshops, mentorship, and networking opportunities for local entrepreneurs in Broward County. Additionally, she hopes
    to author a practical guide on small‑business financial management and to mentor new adult learners, emphasizing practical skills and ethical decision‑making.
