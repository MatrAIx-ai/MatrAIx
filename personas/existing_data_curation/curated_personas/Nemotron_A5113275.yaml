personas:
  professional: Jeannette Reid, a seasoned substance‑abuse and behavioral‑disorder counselor with graduate business training, leverages Motivational Interviewing, Cognitive‑Behavioral Therapy, and trauma‑informed
    care while applying methodical program development and grant‑writing expertise, and they channel their preference for structure into meticulously planned treatment pathways and assertive advocacy for
    community‑based services.
  sports: Jeannette Reid enjoys low‑impact fitness, walking weekly with the Dallas Arboretum seniors’ walking club, follows the Dallas Mavericks and Dallas Cowboys passionately, and they participate in
    a community softball league organized by their church during spring, while they schedule gentle yoga sessions at the local community center to balance strength and flexibility.
  arts: Jeannette Reid finds solace in the soulful harmonies of gospel legend Kirk Franklin, the modern jazz stylings of Wynton Marsalis, and the reflective storytelling of author Brit Bennett, and they
    weave these influences into their quilting practice inspired by Faith Ringgold, while regularly attending Dallas Jazz Nights featuring ensembles like the Marcus Roberts Trio.
  travel: Jeannette Reid prefers meticulously planned trips that blend family visits with cultural immersion, such as summer stays with their grandchildren in Austin, relaxed weekend getaways to the Hill
    Country’s Fredericksburg wineries, and a coveted pilgrimage to Senegal’s historic Goree Island, and they stay within a fixed retirement allowance while carefully researching itineraries.
  culinary: Jeannette Reid delights in preparing soul‑food classics like smoked turkey collard greens, sweet potato casserole, and peach cobbler, skillfully incorporating garden‑fresh tomatoes, okra, and
    smoked ham hocks, and they balance tradition with health by experimenting with quinoa‑based jambalaya, while occasionally indulging in a well‑earned slice of pecan pie.
  core: Jeannette Reid navigates life with methodical precision, a steadfast commitment to community, and a charming habit of pausing to stare at sunrise while the kettle whistles, even as they occasionally
    misplace their quilting needles.
background:
  cultural: Jeannette is an African‑American woman who grew up in Dallas during the civil‑rights era, immersed in a tight‑knit Black community centered around the church, family, and local activism. Her
    upbringing instilled a deep appreciation for resilience, storytelling, and collective support, which she weaves into her counseling practice by honoring clients’ cultural narratives and leveraging community
    strengths. She remains connected to Southern Black traditions, such as gospel music, soulful cuisine, and intergenerational mentorship, and she actively participates in local Black professional networks
    and cultural events that celebrate her heritage.
attributes:
  skills: '[''Motivational Interviewing'', ''Cognitive‑Behavioral Therapy'', ''Trauma‑Informed Care'', ''Crisis Intervention'', ''Comprehensive Client Assessment'', ''Relapse Prevention Planning'', ''Program
    Development'', ''Grant Writing'', ''Budget Management'', ''Data‑Driven Outcome Evaluation'', ''Multidisciplinary Team Coordination'', ''Culturally Competent Counseling'', ''Supervision and Mentorship'']'
  hobbies: '[''Gardening'', ''Reading African‑American literature'', ''Quilting'', ''Church outreach volunteering'', ''Attending jazz concerts'', ''Walking in the Dallas Arboretum'', ''Cooking soul‑food
    recipes'', ''Family travel'']'
  career_goals: Jeannette aims to transition into a senior leadership role, such as Director of Behavioral Health Services, where she can shape system‑wide policies and expand integrated treatment programs
    for co‑occurring disorders. She plans to secure multi‑year grant funding to launch a community‑based after‑care hub that combines substance‑abuse treatment with vocational training and family support.
    Additionally, she aspires to mentor the next generation of Black counselors, publish a handbook on culturally responsive addiction counseling, and serve on a regional advisory board to influence state‑level
    mental‑health legislation.
