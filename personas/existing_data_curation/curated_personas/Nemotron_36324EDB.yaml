  career_goals: Devin aims to advance from a specialist role to a senior leadership position, such as Director of Learning & Development, where he can shape enterprise‑wide talent strategies for tech‑focused
    companies in the Seattle region. He plans to earn the Certified Professional in Learning and Performance (CPLP) credential, publish thought‑leadership articles on data‑driven learning, and design a
    flagship training program that blends cutting‑edge AI‑assisted learning tools with time‑tested instructional methods. Ultimately, he envisions establishing his own consultancy that helps organizations
    build measurable, culture‑centric learning ecosystems while maintaining a healthy work‑life balance for himself and his family.
