personas:
  professional: An aspiring junior engineer named Adam Smith, age 9, channels curiosity and methodical planning into building complex LEGO creations, solving chess puzzles, and experimenting with basic
    coding kits, showcasing early problem‑solving expertise while balancing imaginative play with a pragmatic, step‑by‑step approach.
  sports: An energetic youth soccer player named Adam Smith competes on the local Junior Tigers U‑10 team, attends weekly swimming lessons at City Aquatics, enjoys weekend hikes on nearby nature trails,
    but tends to favor strategic play over team coordination, often rehearsing moves like a chess opening before games.
  arts: A creative sketcher named Adam Smith loves drawing original comic characters inspired by Stan Lee and watching Studio Ghibli films by Hayao Miyazaki, routinely visits the community art library to
    study manga techniques, and spends free time listening to classic rock tracks from The Beatles while designing storyboards.
  travel: A curious explorer named Adam Smith has visited Legoland Florida, trekked the Grand Canyon’s South Rim with his family, and toured London’s Science Museum, preferring trips that blend hands‑on
    science exhibits with structured itineraries, yet sometimes worries about getting lost in crowds, prompting him to map each outing in advance.
  culinary: A budding home‑cook named Adam Smith enjoys assembling simple dishes like spaghetti bolognese, chocolate chip pancakes, and rainbow fruit salad, demonstrates medium cooking skill by helping
    whisk batter and measure ingredients, favors crunchy carrot sticks and pepperoni pizza, but occasionally overindulges in sugary cereal after school.
  core: Adam Smith, a 9‑year‑old LEGO mastermind and chess strategist, balances competitive curiosity with anxiety‑driven caution, turning every project into a meticulously planned adventure.
background:
  cultural: Adam is raised in a middle‑class white family in Fredericksburg, Virginia, a city steeped in colonial and Civil War history. His cultural experiences include celebrating American holidays such
    as Thanksgiving and Independence Day, attending a public elementary school, and participating in community programs at the local library and historical museum. This regional heritage, combined with
    mainstream U.S. media and school curricula, shapes his worldview and daily life.
