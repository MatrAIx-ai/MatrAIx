  hobbies: '[''Chess'', ''Logic Puzzles (Sudoku, etc.)'', ''Science‑Fiction Reading'', ''Technical Blog Writing'', ''Hiking (Santa Monica Mountains)'', ''Raspberry Pi Projects'', ''Weightlifting'', ''Cooking
