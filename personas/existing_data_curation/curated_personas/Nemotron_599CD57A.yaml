personas:
  professional: Jessica Kianka is a seasoned registered nurse with advanced certifications in Critical Care and Quality Improvement who leverages meticulous organization, a competitive edge, and an analytical
    mindset to lead multidisciplinary teams, while her curiosity about art fuels a vision for integrating art‑therapy into patient recovery as she works toward a Nurse Manager role.
  sports: Jessica Kianka is a devoted fan of the New Orleans Saints and LSU Tigers, regularly competes in the Bossier Parish senior softball league, and balances her competitive nature with early‑morning
    birdwatching hikes and weekly yoga sessions at a community studio, viewing fitness as both a social outlet and a disciplined routine.
  arts: Jessica Kianka channels her artistic side through watercolor paintings of bayou sunsets, drawing inspiration from George Rodrigue’s vibrant palettes and the lyrical accordion of legendary Louisiana
    musician Clifton Chenier, while she also enjoys the soulful blues of B.B. King and the lively performances at the New Orleans Jazz & Heritage Festival.
  travel: Jessica Kianka has explored Savannah’s historic squares and Austin’s urban gardens, dreams of a deep‑south heritage road trip through Natchez, Mississippi, and hopes to someday visit Strasbourg,
    France, to trace the French roots of regional cuisine while balancing her travel plans with family commitments and a modest budget.
  culinary: Jessica Kianka enjoys experimenting in her kitchen, adeptly preparing authentic gumbo, crawfish étouffée, and shrimp jambalaya using fresh herbs from her garden, smoked andouille sausage, and
    a pinch of file powder, while she occasionally treats herself to beignets from Café du Monde and explores modern twists on traditional Louisiana recipes.
  core: Jessica Kianka is a purpose‑driven nurse‑leader who balances a fierce competitive streak with a love for bayou watercolor scenes, a disciplined budget, and a habit of hitting the snooze button twice
    each morning despite a packed schedule.
background:
  cultural: Jessica was raised in a close‑knit white Southern family in north west Louisiana, where community, church, and family gatherings are central. Growing up in Shongaloo, she absorbed the region’s
    blend of Southern hospitality, modesty, and a deep respect for tradition while also embracing the eclectic cultural flavors of Cajun and Creole heritage. These influences shape her values of hard work,
    perseverance, and a genuine appreciation for the arts and shared community experiences.
attributes:
  skills: '[''Patient Assessment'', ''IV Therapy'', ''Wound Care'', ''Electronic Health Records (EHR) Management'', ''Health Education'', ''Critical Care Nursing'', ''Quality Improvement Initiatives'',
