  hobbies: '[''Watercolor Painting'', ''Cajun and Creole Cooking'', ''Local History Research'', ''Volunteer at Parish Historical Museum'', ''Herb and Native Plant Gardening'', ''Yoga and Mindfulness'',
    ''Birdwatching in Wetlands'', ''Reading Contemporary Fiction'']'
  career_goals: Jessica aims to transition into a Nurse Manager role within the next three years, using her leadership and organizational talents to improve patient outcomes and staff satisfaction. She
    plans to complete a Bachelor of Science in Nursing (BSN) and eventually pursue a Master of Science in Nursing with a focus on Clinical Education, hoping to become a certified Nurse Educator. She also
    aspires to develop a community art‑therapy program that integrates creative expression into post‑operative recovery and chronic‑illness management, reflecting her love of art and her commitment to holistic
    patient care.
