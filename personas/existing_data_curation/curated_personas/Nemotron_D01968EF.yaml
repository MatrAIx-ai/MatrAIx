  career_goals: Although retired, Julie is focused on remaining an active and contributing member of her community. She aims to expand her volunteer leadership role at the local senior center, develop a
    weekly intergenerational craft workshop, and mentor younger volunteers in event planning and caregiving. She plans to deepen her digital literacy by mastering tablet use and social media to stay connected
    with grandchildren. Travel with her husband on a modest road‑trip series across the Upper Midwest is a personal ambition. She also hopes to compile family recipes and stories into a small memoir for
    future generations, preserving her family's heritage.
