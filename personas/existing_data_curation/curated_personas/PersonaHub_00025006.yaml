persona_description: A biomedical engineer who is interested in the development of human motor control and the effects of growth spurts on walking performance. She is particularly interested in the use
  of wearable inertial sensors to evaluate gait performance and the influence of segment growth on motor control during adolescence. She is looking for ways to deepen her understanding of how motor control
  builds up during growth and how sudden changes in body segment length affect movement performance in the analyzed population.
