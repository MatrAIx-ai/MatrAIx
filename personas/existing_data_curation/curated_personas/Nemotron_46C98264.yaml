  hobbies: '[''Reading fantasy and graphic novels'', ''Watercolor painting'', ''Pencil sketching'', ''LEGO building'', ''Nature walks'', ''Museum and science center visits'', ''Scratch coding for interactive
    stories'', ''Puzzle solving'', ''Small-group board games (chess, Scrabble)'', ''Creative writing in a diary'']'
  career_goals: Patricia dreams of turning her love for art and storytelling into a career where she can both create and educate. She aspires to become a children's book illustrator or a museum exhibit
    designer who uses visual media to make complex ideas accessible. Her interest in Scratch and interactive media leads her to envision a future as a digital media creator, crafting games or educational
    apps that blend art and technology. She aims to win regional art competitions and earn scholarships that support further study in visual arts and design. Ultimately, Patricia wants a career that lets
    her stay curious, experiment with unconventional ideas, and share her creations with small, engaged audiences.
