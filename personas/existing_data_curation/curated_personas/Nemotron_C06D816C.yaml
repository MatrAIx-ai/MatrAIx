  career_goals: Wilfredo is focused on establishing a stable, predictable routine that can alleviate his anxiety and provide a sense of purpose. His short‑term ambition is to obtain a General Educational
    Development (GED) credential, which he believes will open doors for part‑time or contract work. He hopes to secure a regular role as a handyman or maintenance aide at a senior community center serving
    the Spanish‑speaking population, where he can apply his repair skills while helping others navigate local services. In the longer term, Wilfredo dreams of launching a modest weekend food‑catering venture
    specializing in authentic Mexican street foods, allowing him to combine his culinary passion with a steady supplemental income. He also aims to build a small savings buffer to reduce financial stress
    and to maintain his independence.
