personas:
  professional: A 20‑year‑old aspiring lead fabricator named Joshua Courtenay merges solid mechanical assembly and CNC programming skills with a pragmatic, on‑the‑fly work style, excelling at MIG/TIG welding,
    interpreting technical drawings, and troubleshooting equipment while their love of structure is tempered by a relaxed attitude that sometimes leads to missed paperwork but fuels rapid problem‑solving.
  sports: A 20‑year‑old sports enthusiast named Joshua Courtenay hits the local community center courts with the intramural “Hudson Hoopers” basketball squad, lifts at the gym with barbell sessions, roots
    for the Oklahoma City Thunder and the Dallas Cowboys while cheering on the Tulsa Drillers during spring, and spends weekends fishing on Lake Hudson, treating each activity as both competition and social
    outlet, and they thrive on the camaraderie it builds.
  arts: Joshua Courtenay winds down after long shifts at the local bar by catching live‑music sets featuring The Black Keys or Chris Stapleton, playlists of classic rock on his truck’s stereo, and occasional
    late‑night indie film marathons starring Ryan Gosling, which together fuel their love for gritty, authentic performance art.
  travel: Joshua Courtenay favors spontaneous road trips in his aging pickup, charting weekend routes from Lake Hudson to Austin’s music scene, a yearly camping trek to the Grand Canyon, and a budget‑friendly
    backpacking stint in New Orleans, while they dream of an Alaskan fishing expedition and a future welding‑tech conference tour in Germany.
  culinary: Joshua Courtenay’s culinary comfort zone revolves around smoked brisket rubbed with brown sugar and paprika, battered catfish fresh from Lake Hudson, loaded nachos at backyard BBQs, and the
    occasional deep‑dish pizza, a skill set that ranges from competent grill master to occasional burnt‑on‑the‑bottom attempts at homemade chili, and they proudly claim the charcoal‑kissed flavor as a badge
    of honor.
  core: Joshua Courtenay is a socially driven, hands‑on tinkerer who balances a love for competition and camaraderie with a laid‑back, occasionally disorganized streak that fuels both his rapid problem‑solving
    and his habit of late‑night pizza runs, and they constantly seek the next challenge to tackle.
background:
  cultural: Joshua grew up in Warner, a close‑knit town in eastern Oklahoma, where Southern hospitality meets Midwestern practicality. His family values hard work, modesty, and community involvement, reflected
    in weekly high school football gatherings and church attendances. The regional mix of agriculture, oil industry, and the nearby Muscogee (Creek) Nation influences his appreciation for self‑reliance
    and cultural diversity, while his local community college experience reinforces a pragmatic, hands‑on approach to learning and career building.
attributes:
  skills: '["Mechanical assembly", "Blueprint reading", "MIG welding", "TIG welding", "CNC machine operation", "Quality inspection", "Safety compliance", "Troubleshooting", "Team coordination", "Basic CAD"]'
  hobbies: '["Intramural basketball", "Fishing at Lake Hudson", "Multiplayer video gaming", "Automotive tinkering", "Live‑music concerts", "Community volunteer work", "Gym workouts", "Board game nights"]'
  career_goals: Joshua aims to become a lead fabricator or shift supervisor within the next three years, earning certifications such as AWS Certified Welder and CNC programmer credentials. He plans to complete
    an associate degree in industrial technology to strengthen his technical foundation and eventually move into production management. Long‑term, he dreams of opening a small custom‑fabrication shop where
    he can blend his hands‑on skills with entrepreneurial ambition.
