  hobbies: '[''soccer'', ''cheerleading'', ''event planning for friends and school'', ''reading mystery novels'', ''journaling'', ''strategy video games (Minecraft, Fortnite)'', ''volunteering at the food
    bank'', ''church youth group activities'', ''DIY crafts (party decorations)'']'
  career_goals: Ashley aims to graduate high school with honors, earn a scholarship to a state university, and major in Business Administration or Sports Management. She envisions a career that blends her
    love for organization and people, such as becoming an event planner for large community festivals, a project manager in a corporate setting, or a sports team coordinator. Long‑term, she hopes to launch
    her own event‑planning company that specializes in youth sports tournaments and community gatherings, while also pursuing a coaching certification to stay connected to soccer.
