personas:
  professional: A teen event logistics enthusiast, Ashley Platt channels their organized, sociable nature into planning school dances, birthday parties, and community fundraisers, mastering scheduling software,
    delegating tasks with precision, and dreaming of a future career in event management.
  sports: A high‑school soccer and cheerleader, Ashley Platt thrives on team dynamics, playing forward for the Wildcats while performing intricate routines for the cheer squad, cheering on the local professional
    club City FC, and maintaining fitness through early‑morning drills, weekend matches, and weekly strength‑training sessions at the community gym.
  arts: A mystery‑novel aficionado and pop‑culture fan, Ashley Platt devours Agatha Christie and Gillian Flynn during school breaks, streams Adele and Taylor Swift playlists while studying, attends the
    annual community theater's production of Grease, and draws whimsical party‑decor sketches inspired by anime aesthetics.
  travel: A planner‑type teen traveler, Ashley Platt relishes structured getaways, having documented trips to Disneyland and the coastal town of Myrtle Beach, while day‑dreaming about a future adventure
    to Tokyo for its gaming arcades and Barcelona to tour Camp Nou, always crafting detailed itineraries on a travel app.
  culinary: A party‑snack specialist, Ashley Platt whips up crowd‑pleasing pepperoni pizza, loaded nachos, and chocolate brownies for school events, favors cheese, salsa, and garlic in their recipes, enjoys
    experimenting with taco bars, but habitually microwaves leftovers too long, leading to occasional burnt edges.
  core: Ashley Platt, a 15‑year‑old high‑school soccer and cheer star, blends relentless organization with a love for group fun, turning party‑planning into a mini‑career while juggling gaming splurges
    and teen‑size health quirks.
background:
  cultural: Ashley grew up in a middle‑class, white Southern family in Mobile, Alabama. Her upbringing is steeped in Southern hospitality, church involvement (Baptist youth group), and a strong sense of
    community. Family gatherings often feature Gulf Coast seafood and outdoor activities like beach outings and fishing trips. The local high school football culture, the nearby naval air station, and the
    close‑knit neighborhood have shaped her values of reliability, respect for tradition, and a competitive spirit. She speaks with a mild Southern drawl and embraces regional customs such as holiday parades,
    community barbecues, and seasonal festivals.
attributes:
  skills: '[''event planning'', ''team leadership'', ''time management'', ''digital literacy (Google Workspace, Microsoft Office)'', ''critical thinking'', ''basic coding (Scratch)'', ''soccer strategy
