personas:
  professional: Jacqueline Mills is an enthusiastic junior coder who blends her love for fantasy storytelling with Scratch programming, building interactive tale-based games while navigating school projects
    with a pragmatic, hands-on approach.
  sports: Jacqueline Mills darts onto the local soccer field after school, playing forward for the Brookside Juniors where they idolize women's national team star Alex Morgan, relish the camaraderie of
    post-match celebrations, and balance the sport with occasional weekend swimming lessons at the community pool.
  arts: Jacqueline Mills thrives in the school drama club, where they perform lead roles in musical adaptations of classic fairy tales, sing karaoke versions of Disney hits at family gatherings, and fill
    sketchbooks with vibrant cartoon characters inspired by Disney artist Glen Keane and anime creator Hayao Miyazaki.
  travel: Jacqueline Mills dreams of strolling through Edinburgh's historic Royal Mile to feel the magic of ancient castles, has already explored the Grand Canyon on a family vacation, and usually plans
    weekend zoo visits with a printable checklist, yet their curiosity sometimes leads them to slip away to the ice-cream stand without parental supervision.
  culinary: Jacqueline Mills loves colorful macaroni-and-cheese topped with rainbow sprinkles, enjoys assembling sushi rolls with cucumber and avocado after watching cooking videos, and frequently experiments
    with making homemade gummy treats, though they can be messy and occasionally forget to wash their hands before bedtime.
  core: Jacqueline Mills is a chatty, sticker-collecting soccer enthusiast who balances a vivid imagination with a love for structured LEGO builds while occasionally letting spontaneity derail their tidy
    routines.
background:
  cultural: Jacqueline is a white American growing up in Kansas City, Kansas, a Midwestern community that values family, neighborhood ties, and civic participation. Her family emphasizes modesty, cooperation,
    and community involvement, often attending local events such as the Kansas State Fair, community sports leagues, and seasonal celebrations like Fourth of July fireworks. She participates in school activities
    and youth programs like the Girl Scouts, which reinforce values of teamwork and service. These Midwestern cultural influences shape her friendly, considerate nature and her enjoyment of outdoor play,
    school sports, and sharing stories with friends.
