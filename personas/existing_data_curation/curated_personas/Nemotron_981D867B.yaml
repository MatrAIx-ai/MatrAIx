  hobbies: '[''Playing basketball'', ''Listening to Cuban salsa and timba music'', ''Cooking traditional Cuban dishes'', ''Biking on local nature trails'', ''Playing competitive video games'', ''Reading
    business and personal development books'', ''Volunteering at community cultural festivals'']'
  career_goals: Paulino aims to advance from his current supervisory role to store manager within the next two years, focusing on mastering full‑store financials and strategic merchandising. He plans to
    complete a bachelor’s degree in Business Administration to strengthen his managerial toolkit. Long‑term, he aspires to become a district manager and eventually a regional director, overseeing multiple
    locations and driving multi‑store profitability. He is also interested in integrating e‑commerce solutions into brick‑and‑mortar stores and eventually opening his own boutique that highlights Caribbean
    and Cuban products, leveraging his cultural heritage and competitive spirit to differentiate the business.
