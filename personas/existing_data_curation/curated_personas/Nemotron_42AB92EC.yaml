  hobbies: '[''Church choir participation'', ''Gardening'', ''Southern cooking'', ''Quilting'', ''Bridge (card game)'', ''Attending county fairs'', ''Country and gospel music listening'', ''Road trips with
    husband'', ''Reading historical biographies'']'
  career_goals: Denise aims to cement her legacy as the most effective fundraiser in White County by expanding the donor base for the local community foundation and establishing a sustainable endowment
    for scholarships. She plans to mentor the next generation of fundraisers, sharing her proven routines and competitive strategies while encouraging ethical stewardship. Over the next few years she hopes
    to achieve regional recognition, such as a community service award, and to transition gradually into a part‑time consulting role that lets her continue supporting local nonprofits without the full workload.
    Ultimately, she wants her work to create lasting financial support for youth education and health programs that reflect the values of self‑reliance and community care she grew up with.
