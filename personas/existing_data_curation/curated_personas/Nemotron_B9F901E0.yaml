  career_goals: Although retired, Carly’s ambition is to serve as a cultural catalyst in Bardstown. She hopes to launch a community‑driven oral‑history project that records the stories of senior residents
    and to curate a traveling exhibition of local folk art that visits schools and senior centers. She also dreams of establishing a monthly “Art & Storytelling” circle where teenagers and elders co‑create
    multimedia narratives. On a personal level, Carly aims to stay physically active through weekly garden walks, attend at least three major art exhibitions outside Kentucky each year, and complete a memoir
    that weaves her family’s genealogy with the town’s evolving heritage.
