personas:
  professional: Carly Rodgers is a retired community‑engagement specialist who leverages their self‑taught art‑history knowledge and natural charisma to organize neighborhood heritage events, mentor volunteers,
    and mediate conflicts with calm authority, all while navigating a delightfully haphazard schedule that reflects their love of flexibility.
  sports: Carly Rodgers enjoys low‑impact fitness through weekly garden walks, occasional senior yoga classes at the community center, and cheering on the Louisville Cardinals basketball team and Kentucky
    Wildcats football, while also treating their bridge club as a mental sport to keep their mind sharp.
  arts: Carly Rodgers dives into the world of folk art by attending local exhibitions featuring Grandma Moses–style painters, studying biographies of Mary Cassatt and Andrew Wyeth, singing Bill Monroe bluegrass
    standards in the senior choir, and crafting quilts inspired by the rolling hills of Kentucky, all of which shape their identity as a living repository of Southern artistic heritage.
  travel: Carly Rodgers prefers flexible, guided road trips that blend comfort with discovery, often planning spontaneous weekend escapes to historic sites like Williamsburg, Virginia or the French Quarter,
    while earmarking their modest travel fund for three annual pilgrimages to major art institutions such as the Museum of Modern Art in New York, the Art Institute of Chicago, and the Smithsonian American
    Art Museum, yet they sometimes forget to book accommodations ahead of time because of their relaxed planning style.
  culinary: Carly Rodgers delights in cooking Kentucky classics like bourbon‑pecan pie, hot brown open‑face sandwiches, and heirloom tomato jam, using locally sourced bourbon, sweet corn, and smoked ham,
    and while they can whip up a flawless dessert for a potluck, they often over‑spice their stews after a late‑night quilting session, a quirky habit their friends tease them about.
  core: Carly Rodgers is a vibrant 81‑year‑old cultural catalyst who blends love of folk art, garden‑fresh cooking, and community storytelling with a delightfully disorganized schedule and an unshakeable
    calm.
background:
  cultural: Carly was born and raised in the rolling hills of Nelson County, Kentucky, in a family with deep Southern roots dating back to early 19th‑century settlers of English and Scots‑Irish descent.
    Growing up in Bardstown—a town famed for its bourbon heritage, horse farms, and the historic St. Joseph’s Catholic Church—she internalized the values of Southern hospitality, community solidarity, and
    respect for tradition. The region’s vibrant folk arts, bluegrass music, and annual festivals such as the Kentucky Bourbon Festival shaped her appreciation for local culture. Though she completed only
    a high‑school education, Carly’s lifelong curiosity led her to explore art, literature, and world ideas, marrying the openness of modern perspectives with the grounding of her Appalachian‑influenced
    upbringing.
