persona_description: A geologist who specializes in studying the subsidence phenomenon in Mexico City and its impact on the city's infrastructure, particularly the metro network and sewer systems. Solano-Rojas
  has a unique perspective on the city's rapid sinking due to the geological phenomenon of subsidence, which he has observed firsthand while studying at the National Autonomous University of Mexico. He
  has also used satellite measurements to quantify the subsidence rates and the impact on the city's infrastructure.
