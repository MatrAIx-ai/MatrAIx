  hobbies: '[''Art History Reading'', ''Museum/Gallery Visits'', ''Sketching'', ''Vintage Postcard Collection'', ''Record Cataloguing'', ''Birdwatching'', ''Jigsaw Puzzles'', ''Indoor Succulent Gardening'',
    ''Reflective Writing'', ''Genealogy Research'']'
  career_goals: Edgar aims to ascend to a senior administrative leadership role where he can design and implement efficient office systems across multiple departments, leveraging his organizational discipline
    to raise overall productivity. He intends to mentor emerging administrative staff, imparting his calm, achievement‑driven work ethic while fostering a supportive, low‑stress environment. As he approaches
    retirement, he plans to transition into part‑time consulting, offering his expertise in records management and workflow design to small nonprofits and community arts organizations. Additionally, he
    hopes to curate a traveling exhibit that showcases Gulf Coast African‑American artists, merging his administrative skill set with his lifelong passion for art.
