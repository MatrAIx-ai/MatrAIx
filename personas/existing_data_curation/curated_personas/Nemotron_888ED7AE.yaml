  career_goals: Julio aims to transition from senior designer to a creative leadership role within the next five years. He envisions becoming a Creative Director for a technology or lifestyle brand that
    values sustainable and human‑centered design. He is driven to build and mentor high‑performing design teams, champion inclusive design processes, and expand his influence by launching a boutique studio
    focused on waterfront and community-oriented projects in the Pacific Northwest. In parallel, he hopes to publish a series of case studies that blend design thinking with the region’s environmental stewardship,
    positioning himself as a thought leader in responsible design.
