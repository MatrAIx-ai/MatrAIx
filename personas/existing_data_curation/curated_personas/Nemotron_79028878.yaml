  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Speculative fiction reading'', ''Contemporary art gallery visits'', ''Coastal hiking'', ''Yoga and meditation'', ''Piano playing'', ''Coding
    generative art projects'', ''Philosophy reading'', ''Fusion cooking'']'
  career_goals: Patricia aims to become a leading figure at the intersection of computational science and visual arts. In the next five years she plans to earn a PhD in Computational Humanities or a related
    field, leading research projects that develop algorithmic tools for generative art and cultural analytics. She aspires to mentor other women of color in STEM, establish a community workshop series in
    Torrance that blends coding with artistic practice, and eventually secure a senior research scientist role where she can shape interdisciplinary initiatives that marry data-driven insight with aesthetic
    expression.
