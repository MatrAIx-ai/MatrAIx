personas:
  professional: Manuel Triano, a detail‑oriented administrative professional in Madison, blends STEM curiosity with disciplined workflow mastery, wielding advanced Excel pivot tables, SQL queries, and Python
    scripts to automate reporting while leading meetings and mediating conflicts, all in pursuit of a senior operations role and CAP/PMP certifications.
  sports: Manuel Triano, an avid outdoors enthusiast, spends weekends kayaking on Lake Monona, cycling the Capital City Trail, hiking state parks, supports the Wisconsin Badgers football and Milwaukee Bucks
    basketball teams, and is a member of the Madison Kayak Club, occasionally joining local 5K runs for charity.
  arts: Manuel Triano, a lively participant in Madison’s community theater, shines in weekly improv workshops, draws inspiration from Lin‑Manuel Miranda and Tina Fey, regularly attends Broadway streaming
    events, and volunteers at a neighborhood art gallery to stay connected to the creative pulse.
  travel: Manuel Triano, a travel‑curious Midwesterner, enjoys weekend getaways to Door County’s vineyards, annual trips to Asheville’s craft breweries, dreams of Iceland’s waterfalls and Japan’s cherry‑blossom
    festivals, and balances meticulous itineraries with spontaneous detours, all while budgeting around family commitments.
  culinary: Manuel Triano, a self‑described “host‑chef,” regularly prepares roasted chicken with rosemary and garlic, homemade gnocchi with sage butter, and spiced lentil stew featuring saffron and chipotle,
    showcasing moderate cooking skill and a love for fresh basil and seasonal produce during monthly dinner parties.
  core: Manuel Triano, a meticulously organized, socially driven problem‑solver who worries about the little things while keeping the party alive, blends curiosity with disciplined efficiency.
background:
  cultural: Manuel was raised in the greater Madison area as a second‑generation American of Italian heritage. Growing up in a suburban Midwestern setting, he was taught the values of hard work, punctuality,
    and community engagement. Madison’s vibrant college town atmosphere exposed him to progressive ideas, environmental awareness, and a strong culture of civic participation, which shaped his inclusive
    outlook and his dedication to collaborative projects. Family gatherings often feature traditional Italian cuisine and an emphasis on hospitality, while the local emphasis on outdoor recreation and public
    forums reinforced his sociable and cooperative personality. This blend of traditional family roots and the liberal, nature‑oriented culture of Dane County informs his personal and professional identity.
