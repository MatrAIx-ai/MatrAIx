  career_goals: Manuel’s career ambition is to evolve from an administrative support role into a senior operations or office‑management position where he can drive organizational efficiency and mentor younger
    staff. He aims to obtain certifications such as the Certified Administrative Professional (CAP) and Project Management Professional (PMP) within the next three years, leveraging his analytical background
    to lead data‑driven process improvements. He envisions managing a multidisciplinary team, designing streamlined workflows, and fostering a supportive workplace culture that balances high performance
    with employee well‑being. Ultimately, he hopes to influence strategic decisions at the departmental level while maintaining the disciplined standards that define his work ethic.
