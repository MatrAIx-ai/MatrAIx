  hobbies: '[''Historical Non‑Fiction Reading'', ''Classic Literature'', ''Traditional Mexican Cooking'', ''Street Photography'', ''Running'', ''Strength Training'', ''Chess'', ''Volunteer Spanish Literacy
    Tutoring'']'
  career_goals: Alfredo aims to advance into a senior leadership role such as Director of Communications for a firm that serves multicultural audiences, where he can design rigorous, performance‑oriented
    communication programs. He is driven to build a structured team that consistently meets measurable KPIs, mentor junior staff in disciplined workflow practices, and champion strategic outreach to the
    Mexican‑American community in Chicago. Long‑term, he envisions launching his own consultancy focused on data‑backed, culturally resonant media campaigns for regional businesses.
