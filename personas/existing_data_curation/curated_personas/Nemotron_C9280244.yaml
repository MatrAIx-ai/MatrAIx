  hobbies: '["Visiting art galleries and museums","Watercolor painting","Hiking in Wasatch Mountains","Cooking Mexican cuisine","Volunteering at cultural festivals","Reading historical fiction","Attending
    indie‑music concerts"]'
  career_goals: Marisol aims to move beyond her current cashier role into a supervisory position, such as shift lead or assistant store manager, where she can mentor new staff and shape the store’s customer
    experience. She plans to complete an online retail management certificate to strengthen her leadership and business knowledge. Long‑term, she dreams of opening a small boutique that blends retail with
    a curated space for local Mexican‑American art and crafts, providing a platform for emerging artists while maintaining a community‑focused atmosphere.
