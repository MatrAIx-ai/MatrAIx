personas:
  professional: Marisol Leiva, a seasoned cashier with expertise in point‑of‑sale systems, bilingual customer service and inventory control, leverages a calm, empathetic conflict‑resolution style to mentor
    peers and aspires to become a shift lead while pursuing an online retail management certificate.
  sports: Marisol Leiva, an avid solo hiker on the Wasatch Trails and member of the Wasatch Hiking Club, enjoys winter snowshoeing, cheers for the Utah Jazz and Real Salt Lake, and occasionally joins a
    local volleyball league for social exercise.
  arts: Marisol Leiva, a watercolor enthusiast who captures Utah mountain vistas with hues inspired by Mexican folk motifs, frequents the Utah Museum of Fine Arts, discusses works by Frida Kahlo, Diego
    Rivera and Georgia O'Keeffe with equal passion, and attends intimate indie concerts featuring The Headgear and local folk singer Lila Rosa.
  travel: Marisol Leiva, a methodical planner who spends weekends exploring national parks like Arches and Yellowstone, has ventured to Oaxaca for culinary inspiration, dreams to wander the historic streets
    of Kyoto during cherry blossom season, and prefers trips that blend cultural immersion with opportunities to sketch landscapes.
  culinary: Marisol Leiva, a home‑cook who masterfully prepares chilaquiles, tamales, and mole‑infused trout, experiments with fusion dishes that marry traditional corn masa with Utah trout, and delights
    in sourcing fresh chilies, tomatillos, and locally sourced herbs for her weekly dinner parties.
  core: Marisol Leiva, a curious, organized solo‑hiker and watercolor painter, balances a meticulous cash‑handling job with a love for Mexican‑inspired cuisine, occasional coffee‑mug clutter, and a habit
    of hoarding vintage postcards in a drawer overflowing with art catalogues.
background:
  cultural: Marisol was raised in a Mexican‑American household where Spanish was spoken at home and family gatherings emphasized communal meals, music, and celebrations such as Día de los Muertos and Cinco
    de Mayo. Her upbringing instilled a respect for tradition, hospitality, and the value of community, which she carries into her work and social life. Living in Salt Lake City, she blends her heritage
    with the city’s growing multicultural scene, participating in local Hispanic cultural organizations and sharing Mexican culinary and artistic traditions with neighbors. This bicultural perspective shapes
    her worldview, creativity, and interpersonal approach.
attributes:
  skills: '["Cash register operation","Customer service","Bilingual communication (Spanish/English)","Inventory management","Point-of-sale software (Square, Lightspeed)","Basic bookkeeping","Conflict resolution","Time
