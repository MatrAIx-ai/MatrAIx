  hobbies: '[''Visiting Art Museums'', ''Digital Photography'', ''Cooking Puerto Rican Dishes'', ''Chess'', ''Reading Modern Art and Psychology Books'', ''Hiking'', ''Woodworking'', ''Volunteer Art Workshops'',
    ''Listening to Jazz and Salsa'', ''Gardening'']'
  career_goals: Alex is determined to re‑enter the professional workforce by completing a bachelor's degree in Arts Management or Business Administration within the next three years. He aspires to secure
    a leadership position in a nonprofit cultural organization where he can apply his disciplined, high‑standard approach to develop sustainable programs that celebrate Puerto Rican heritage. In the long
    term, he envisions founding a hybrid community center and online marketplace that showcases emerging Latino artists, offers workshops for local entrepreneurs, and attracts grant funding exceeding $150,000
    annually. His competitive drive pushes him to set measurable targets, such as increasing program participation by 25% each year and earning regional recognition for innovative cultural initiatives.
