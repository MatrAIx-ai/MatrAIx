  hobbies: '["Painting", "Experimental photography", "DIY electronics/kinaesthetic art", "Improv comedy", "Competitive board games", "Hiking", "Rock climbing", "Mountain biking", "Sketch journaling", "Mindfulness
    breathing"]'
  career_goals: Maria aims to transition from a hands-on technologist role to a senior R&D specialist, where she can lead multidisciplinary projects that merge engineering performance with artistic design.
    Over the next five years, she hopes to head a prototype development team focused on sustainable technologies such as solar-powered water filtration devices, while championing a culture of flexible,
    idea-driven work processes. Ultimately, she envisions launching her own boutique design-fabrication studio in Grand Junction that offers custom engineering solutions to local startups and artists, leveraging
    her competitive drive to secure high-impact contracts and her curiosity to stay at the cutting edge of emerging materials.
