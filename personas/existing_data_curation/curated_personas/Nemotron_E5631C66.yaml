personas:
  professional: Maria Sutcliffe is a 24‑year‑old engineering technologist who blends advanced SolidWorks and CNC machining expertise with a vivid imagination to craft kinetic, art‑infused prototypes, thriving
    in loosely structured R&D environments while they contend with occasional disorganization and a fiercely competitive drive to secure high‑impact contracts.
  sports: Maria Sutcliffe embraces the outdoors year‑round, climbing crags in summer, mountain‑biking with the Grand Junction Trailblazers in fall, and hiking the Rocky Mountains in winter, while they root
    for the Colorado Avalanche, Colorado Rockies, and Denver Broncos, and their competitive streak drives them to chase personal bests on every trail.
  arts: Maria Sutcliffe channels creative energy into abstract painting, experimental photography inspired by Ansel Adams, improv comedy workshops, and weekly board‑game meet‑ups, while they draw musical
    inspiration from Tash Sultana and The Shins and admire performances by the local Montezuma Players theater troupe.
  travel: Maria Sutcliffe prefers spontaneous road trips that prioritize rugged landscapes, having recently backpacked through Yosemite and explored Grand Mesa, while they plan future expeditions to Patagonia’s
    Andes, Japan’s art islands, and a sunrise hike in the Swiss Alps, balancing these adventures against a modest travel budget and occasional family obligations.
  culinary: Maria Sutcliffe enjoys crafting meals that blend mountain‑region flavors—grilled Colorado trout with lemon‑garlic quinoa, smoky chipotle black‑bean chili, and artisanal flatbread topped with
    local goat cheese and roasted beets—though they admit to relying on instant ramen during late‑night project crunches, rating themselves as a competent home cook who frequently experiments with kombucha
    fermentation.
  core: Maria Sutcliffe is a fiercely imaginative technologist whose competitive spark fuels groundbreaking prototypes, yet their perpetual worry and occasional disorganization keep them juggling brilliance
    with bouts of chaos.
background:
  cultural: Maria grew up in a middle-class family in the Mountain West, where the blend of Western independence and small-town community shaped her outlook. As a white American from Grand Junction, she
    was immersed in a culture that values self-reliance, outdoor recreation, and a pragmatic work ethic, while also exposing her to Colorado's growing arts scene and a diverse population that includes a
    significant Hispanic presence in Mesa County. Her educational journey at a regional university reinforced a secular, research-oriented worldview, but family traditions of weekend camping trips and local
    festivals instilled an appreciation for nature and communal celebration. This mix of pragmatic engineering culture and creative regional influences informs her identity and aspirations.
attributes:
  skills: '["Computer-Aided Design (SolidWorks)", "CNC machining setup", "3D printing prototyping", "Electronics troubleshooting", "Data analysis with Python", "MATLAB modeling", "Statistical process control",
