personas:
  professional: Maricely Santosmelendez, a seasoned mechanical engineer adept at CFD, finite‑element analysis, and additive manufacturing, leads cross‑functional renewable‑energy product teams with Six
    Sigma precision while they mentor underrepresented talent and steer projects toward sustainable outcomes.
  sports: Maricely Santosmelendez, an avid outdoor enthusiast in San Diego, rides the waves at Pacific Beach, hikes the Torrey Pines trails, joins the San Diego Surf Club for weekend sessions, and passionately
    follows the San Diego Padres and the San Diego Wave FC, often wearing their jerseys while they paddle.
  arts: Maricely Santosmelendez, a lively participant in the local salsa scene, dances to the rhythms of Marc Antonio and Celia Cruz at monthly nights, attends performances by the San Diego Symphony, and
    regularly visits the Museum of Contemporary Art San Diego to draw creative inspiration for DIY engineering projects, while they also support community art workshops.
  travel: Maricely Santosmelendez, a meticulous trip planner, has explored the culinary markets of Oaxaca, trekked the bamboo forests of Kyoto, visited renewable‑energy showcases in Copenhagen, and dreams
    of sailing along Iceland’s coast to study offshore wind farms, always balancing itinerary details with spontaneous detours to local food stalls, while they document each journey in a design‑focused
    travel journal.
  culinary: Maricely Santosmelendez, a passionate home cook, perfects classic tamales with masa harina, slow‑cooked mole enriched with ancho chilies and chocolate, and fresh ceviche tossed with lime, avocado,
    and serrano pepper, while they also experiment with quinoa‑based salads and occasionally over‑salt dishes when juggling a project deadline.
  core: Maricely Santosmelendez merges engineering rigor with surf‑side salsa, channels curiosity into sustainable design, and they never skip a night of homemade mole, even if it means a late‑night debugging
    session.
background:
  cultural: Born to Mexican‑American parents in San Diego, Maricely grew up immersed in a bilingual household that celebrated both Mexican traditions and Southern California culture. She fluently speaks
    Spanish and English, and family customs such as Día de los Muertos altars, quinceañera celebrations, and weekly Sunday meals have shaped her values of family cohesion, hospitality, and community service.
    The proximity to the U.S.–Mexico border and a vibrant local Chicano community has reinforced her pride in her heritage while encouraging a bicultural perspective that informs her collaborative work
    style and commitment to uplifting other Hispanic professionals in engineering.
attributes:
  skills: '[''SolidWorks'', ''AutoCAD'', ''CATIA'', ''ANSYS'', ''MATLAB'', ''Finite Element Analysis'', ''Computational Fluid Dynamics'', ''Additive Manufacturing'', ''Prototype Fabrication'', ''Thermal
    Analysis'', ''Fluid Dynamics'', ''Design for Manufacturability'', ''Project Planning'', ''Budget Management'', ''Lean Six Sigma'', ''Team Leadership'', ''Mentoring'', ''Bilingual Communication (English/Spanish)'',
    ''Technical Writing'']'
  hobbies: '[''Surfing'', ''Hiking'', ''Paddle‑boarding'', ''Cooking Mexican cuisine'', ''Salsa dancing'', ''STEM outreach mentorship'', ''Reading historical biographies'', ''Traveling'', ''DIY home improvement'']'
  career_goals: Maricely aims to advance into a senior engineering role where she can lead large‑scale product development projects focused on sustainable technologies such as electric‑vehicle powertrains
    or offshore wind turbine components. She plans to obtain her Professional Engineer (PE) license within the next two years and pursue a master’s degree in renewable energy engineering to deepen her technical
    expertise. Long‑term, she envisions transitioning to an engineering manager or principal engineer position, overseeing multidisciplinary teams while championing diversity and inclusion initiatives that
    increase Hispanic representation in STEM fields. She also hopes to establish a community outreach program that partners local schools with her company to provide hands‑on engineering experiences for
    under‑represented youth.
