  career_goals: Approaching retirement, Donny aims to transition into a mentoring or supervisory role where he can pass on his decades of machine‑operation knowledge to younger staff. He hopes to obtain
    a certified maintenance technician credential, lead safety‑training workshops, and help his plant implement continuous‑improvement projects. Ultimately, he wants a phased retirement that provides financial
    security for his wife while allowing him to pursue a small hobby‑farm and spend more time on personal interests.
