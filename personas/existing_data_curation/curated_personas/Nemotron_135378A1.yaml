personas:
  professional: Donny Hickey, a 64‑year‑old veteran of high‑speed packaging and filling equipment, leverages their hands‑on troubleshooting expertise, OSHA safety knowledge, and lean‑manufacturing insight
    to train new operators, champion continuous‑improvement projects, and pursue a certified maintenance technician credential as they transition toward a supervisory mentoring role.
  sports: Donny Hickey, a 64‑year‑old who favors low‑impact activity, walks the Big Sioux River trail each morning for cardio, participates in the Sioux Falls Trout Club’s seasonal fly‑fishing outings,
    joins a local 4‑H hunting league each fall, and casually follows the Sioux Falls Storm indoor football team while they eschew high‑intensity gym workouts.
  arts: Donny Hickey, a 64‑year‑old history enthusiast, spends quiet evenings listening to Bach’s cello suites and Johnny Cash’s storytelling songs, admires the realism of Andrew Wyeth’s paintings, builds
    detailed model trains, and attends quarterly performances at the Sioux Falls Community Theatre, especially classic American dramas, where they often sit in the balcony to appreciate acoustics.
  travel: Donny Hickey, a 64‑year‑old methodical planner, prefers short, well‑mapped road trips to nature‑rich spots such as the Badlands and Lake of the Woods for fishing, saves for a dream visit to Norway’s
    fjords to experience Atlantic salmon runs, and they avoid spontaneous backpacking due to their need for predictable itineraries and a comfortable pace.
  culinary: Donny Hickey, a 64‑year‑old who enjoys modest home‑cooking, regularly prepares garden‑fresh vegetable soup, pan‑fried walleye with lemon‑dill butter, and occasional venison stew seasoned with
    rosemary and garlic, while they cherish weekend trips to the local butcher for quality pork chops and sip a strong black coffee at the downtown diner.
  core: Donny Hickey, a 64‑year‑old pragmatic tinkerer, balances a structured work ethic with solitary passions for fishing, woodworking, and model trains, occasionally neglects physiotherapy for knee pain,
    and they plan a modest hobby‑farm for a steady, predictable retirement.
background:
  cultural: Donny is a third‑generation Midwestern white American from South Dakota, with family roots in German and Scandinavian immigrants who settled the region in the early 1900s. He grew up in a tight‑knit,
    rural community that values self‑reliance, hard work, and modesty. His upbringing emphasized Lutheran church traditions, community service, and a respect for agricultural heritage. These cultural influences
    shape his practical outlook, dedication to family, and preference for modest, community‑oriented activities.
