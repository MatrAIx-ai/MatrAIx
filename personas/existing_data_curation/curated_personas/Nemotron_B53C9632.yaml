personas:
  professional: Lam Mel, an aspiring robotics enthusiast, combines meticulous strategic thinking from StarCraft II with hands‑on building of LEGO and Arduino gadgets, volunteering in the school's robotics
    club where they take on the role of programmer and project manager, channeling a disciplined, structured approach to problem‑solving.
  sports: Lam Mel enjoys playing pick‑up basketball at the local community center and follows the Los Angeles Lakers and the LA Galaxy, occasionally joining school intramural soccer, preferring structured
    practice over large crowds, and using these sessions as a break from screen‑centric hobbies.
  arts: Lam Mel, a digital sketch enthusiast, draws inspiration from classic manga artists like Akira Toriyama and contemporary graphic novelists like Kieron Gillen, spends weekends creating iPad art of
    sci‑fi landscapes, and attends the annual Montebello Cultural Festival where they admire traditional lantern displays and modern street art.
  travel: Lam Mel loves organized family trips that blend cultural tradition and adventure, recalling a recent weekend visit to the Griffith Observatory and a cherished family reunion in Taiwan that featured
    moon‑cake tasting, while dreaming of a solo backpacking trip to Kyoto’s historic temples and a future spring break at Disneyland.
  culinary: Lam Mel enjoys a mix of comfort foods and culinary experiments, often munching on ramen and sushi after school, mastering a simple stir‑fry with tofu, broccoli, and soy sauce from online videos,
    and savoring mooncakes during Lunar New Year celebrations, though they sometimes skip breakfast in favor of extra gaming time.
  core: Lam Mel blends disciplined strategy with a love for digital creation, balancing careful budgeting and health routines with occasional impulsive gaming marathons and a penchant for moon‑cake nostalgia.
background:
  cultural: Lam is a second-generation East Asian American, with parents who immigrated from Taiwan. The family maintains Mandarin as a home language and observes traditional customs such as Lunar New Year
    celebrations, moon-cake gifting, and weekly family meals that emphasize respect for elders. Growing up in Montebello's multicultural environment, he balances the communal values of his heritage—like
    a strong emphasis on education and family cohesion—with the American focus on individual interests and extracurricular exploration. His cultural background influences his disciplined approach to schoolwork
    and his appreciation for both East Asian art forms and contemporary tech culture.
