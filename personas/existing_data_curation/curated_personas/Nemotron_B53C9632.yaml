  hobbies: '[''Strategic video gaming (e.g., StarCraft II)'', ''LEGO and model building'', ''Digital drawing and illustration'', ''Reading science-fiction and graphic novels'', ''Arduino and basic electronics
    projects'', ''Playing piano'', ''Journaling and language practice'', ''Robotics club activities'', ''Attending cultural festivals'']'
  career_goals: Lam aspires to pursue a career in technology, aiming to become a software engineer with a focus on game development or robotics. He plans to study computer science in college, secure summer
    internships at tech companies, and eventually create interactive applications that help students organize their study schedules. He also hopes to combine his love for design and engineering by contributing
    to user-friendly hardware projects, such as educational robotics kits, that blend structure with creativity.
