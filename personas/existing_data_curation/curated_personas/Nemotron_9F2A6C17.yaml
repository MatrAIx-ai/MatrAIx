  career_goals: Sophie envisions channeling her sociable nature and love of the arts into a part‑time role as a community arts coordinator for Westmoreland County, where she can curate local exhibitions,
    organize hands‑on workshops, and foster collaborations between artists and residents. She also hopes to develop a volunteer‑led heritage walking‑tour program that highlights the region’s colonial history
    and is considering completing a certificate in museum studies or nonprofit management to strengthen her ability to lead such initiatives. Long‑term, she dreams of opening a small multi‑purpose studio
    space that doubles as a gallery, crafts workshop, and gathering place for neighborhood book clubs and garden gatherings, allowing her to blend her creative interests with her talent for hospitality.
