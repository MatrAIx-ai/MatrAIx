persona_description: A member of the International Federation for Spina Bifida and Hydrocephalus (IF), a global umbrella organization for 50 national and regional spina bifida and hydrocephalus organizations.
  This person is actively involved in promoting the health benefits of folic acid, supporting mandatory food fortification with folic acid, and advocating for the prevention of spina bifida and hydrocephalus.
  This person is also committed to the development and implementation of global prevention policies, fortification, supplementation, or any other strategy to improve access to comprehensive multidisciplinary
  treatment and care services for individuals with spina bifida and hydrocephalus, and aims to increase inclusion in education and the workforce, as well as improve access to lifelong medical treatment
  and care.
