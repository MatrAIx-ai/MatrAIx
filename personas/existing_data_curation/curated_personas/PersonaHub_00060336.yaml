persona_description: A person who is interested in the study of power and its manifestation in various archaeological contexts, particularly in the context of the Hopewell culture in North America. They
  are interested in understanding the social hierarchy and power dynamics that were present in this culture, and how these power dynamics were structured and maintained through various means such as economic,
  military, and ideological power. They are also interested in the idea of power as a social construct, and how it can be used to create inequality and maintain control. They may have a background in archaeology,
  history, anthropology, or sociology, and have an interest in understanding how power is used and understood in different cultures and societies.
