  career_goals: Marangely aims to transition into a senior leadership role, such as Regional Sales Manager or Director of Service Sales, where she can mentor emerging talent and shape strategic sales initiatives
    across multiple markets. She also envisions launching a boutique consulting practice that helps small businesses in the Southeast develop structured sales pipelines and customer retention programs.
    Continuing education, including a certification in sales leadership, is part of her plan to enhance her managerial credentials and broaden her impact.
