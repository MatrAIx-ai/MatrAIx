personas:
  professional: Edward Hernandez, a budding LEGO architect and neighborhood chief storyteller, they blend curiosity with practicality by designing intricate builds for friends, they effortlessly lead impromptu
    soccer drills, stay flexible over strict planning, and use their kind, sociable nature to keep everyone's play in harmony.
  sports: Edward Hernandez, a spirited forward for the Port Isabel Pumas youth soccer club, they dash across the park each afternoon, cheer loudly for the Houston Astros during baseball season, and proudly
    don a Houston Rockets jersey for winter basketball, embodying a relaxed yet enthusiastic approach to staying active and staying connected with friends.
  arts: Edward Hernandez, an avid comic‑strip illustrator and backyard dancer, they groove to the cumbia beats of Los Ángeles Azules and the ranchera croons of Jorge Negrete, often mimicking those rhythms
    while sketching vibrant panels inspired by coastal adventures and lively family gatherings.
  travel: Edward Hernandez loves weekend getaways to South Padre Island’s pristine beaches; they collect shells and explore tide pools, while dreaming of a family road trip across the border to visit their
    grandparents’ seaside town, combining relaxed beach leisure with bursts of adventure during summer camping at Padre Island National Seashore.
  culinary: Edward Hernandez, a junior kitchen assistant, they enjoy assembling crispy fish tacos with lime, cabbage slaw, and chipotle mayo, munching on shrimp ceviche spiked with cilantro and jalapeños,
    and experimenting by sprinkling shredded cheese onto homemade quesadillas while listening to cumbia beats.
  core: Edward Hernandez, a talkative 7‑year‑old who toggles between building elaborate LEGO worlds and chasing Gulf shells, they thrive on energetic social play, occasional disorganization, a sweet tooth
    for fish tacos, and dancing to cumbia at every family fest.
background:
  cultural: Edward is a Mexican‑American raised in Port Isabel, Texas, a coastal community near the U.S.–Mexico border. His household is bilingual; he speaks Spanish with his grandparents and English at
    school. He participates in cultural traditions such as Día de los Muertos, Cinco de Mayo, and local festivals that celebrate Gulf Coast heritage. Family meals often feature tacos, tamales, and fresh
    Gulf seafood, and he feels a strong connection to the sea through fishing trips and beach outings. The close‑knit, family‑oriented values of his Mexican heritage blend with the laid‑back, outdoor lifestyle
    of the Texas Gulf coast, shaping his identity and daily experiences.
