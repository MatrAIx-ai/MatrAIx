persona_description: An experienced and skilled optical engineer who specializes in the manufacturing and testing of aspheric optical components. They have a deep understanding of optical design and have
  developed expertise in using computer-generated holograms (CGH) to accurately test aspheric optics. They have experience in working with the Police Command and Control System developed by ORNL for the
  Counterdrug Technology Assessment Center, and are familiar with the use of ORNL's metrology services. They are interested in the latest developments in optical technology and are eager to contribute to
  the commercialization of new and innovative products.
