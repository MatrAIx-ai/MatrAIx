  career_goals: Lisa aims to move from a support role into office management within the next two years, taking on supervisory responsibilities and leading a small team. She plans to earn the Certified Administrative
    Professional (CAP) credential and become proficient in emerging productivity platforms to stay ahead of industry trends. Long‑term, she envisions transitioning into operations management or launching
    a freelance consulting service that helps small businesses streamline their administrative processes, allowing her greater flexibility and reducing workplace stress. Improving her work‑life balance
    and mastering stress‑management techniques are also key personal goals.
