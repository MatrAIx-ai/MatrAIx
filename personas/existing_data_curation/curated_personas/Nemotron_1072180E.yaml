personas:
  professional: Paru Patel, a 19‑year‑old full‑stack developer, blends React and Node.js expertise with a burgeoning passion for inclusive UI/UX, delivering accessible web apps for community‑focused nonprofits
    while they mentor peers in agile sprint rituals.
  sports: Paru Patel, a yoga enthusiast who also joins a local co‑ed soccer league on Saturday mornings, follows the Houston Astros and the Houston Rockets, and they complete monthly 5K runs in Katy’s parks
    to maintain balance between cardio and flexibility.
  arts: Paru Patel, an avid digital painter who frequents contemporary galleries to study works by Yayoi Kusama and Banksy, sketches street scenes during photography walks, and they find inspiration in
    the synth‑rich soundscapes of Tame Impala and the narrative complexity of Christopher Nolan films.
  travel: Paru Patel, a budget‑conscious explorer, has road‑tripped to Austin, New Orleans, and San Diego during spring breaks, prefers curated itineraries that blend cultural festivals with local food
    tours, and they dream of backpacking through Kyoto’s temples, Iceland’s glaciers, and Barcelona’s modernist architecture.
  culinary: Paru Patel, an experimental home chef, masterfully crafts crisp dhokla and fragrant khandvi using chickpea flour and turmeric, relishes pairing them with tangy mango chutney, while they also
    perfect ramen broth and taco al pastor, and enjoys occasional dinner outings at farm‑to‑table bistros.
  core: Paru Patel, a curious tech‑savvy artist with a gentle compassionate streak, navigates the world through code, canvas, and community, juggling meticulous budgeting and occasional anxiety, all while
    they dream up inclusive digital solutions and perfect spice‑laden dishes.
background:
  cultural: Paru comes from a Gujarati Indian family that immigrated to the United States, preserving a blend of traditional customs and modern American life in Katy, Texas. She celebrates Diwali, Navratri,
    and regional festivals with her close‑knit extended family, often preparing festive meals and participating in community cultural events hosted by local Indian associations. Bilingual in English and
    Gujarati, she values education, community service, and the collaborative spirit inherited from her heritage, which informs her compassionate approach in both personal and professional realms.
