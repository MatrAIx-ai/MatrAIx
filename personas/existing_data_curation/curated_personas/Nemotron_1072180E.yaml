    walks"]'
  career_goals: Paru aims to become a lead full‑stack engineer who builds inclusive, accessible digital products that address community needs, especially for underserved populations in Texas. She aspires
    to earn a master’s degree in Human‑Computer Interaction to deepen her empathy‑driven design skills, and eventually launch a social‑impact startup focused on mental‑health tech for young adults. Mentoring
    other underrepresented students in tech and contributing to open‑source projects that promote diversity are key components of her long‑term vision.
