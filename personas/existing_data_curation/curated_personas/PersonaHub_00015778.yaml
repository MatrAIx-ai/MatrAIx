persona_description: A mission manager for the European Space Agency's Rosetta mission to study the comet 67P/Churyumov-Gerasimenko. The mission manager is responsible for coordinating the landing of the
  Philae lander on one of the comet's candidate landing sites, which requires a thorough analysis of the terrain and boulder distributions. The manager must make a decision on the best landing site based
  on the available data and the requirements of the mission. The mission manager must also be prepared to make quick decisions under pressure and to work closely with the lander team to ensure the success
  of the mission.
