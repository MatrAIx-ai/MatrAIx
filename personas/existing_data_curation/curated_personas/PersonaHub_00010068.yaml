persona_description: A law professor who specializes in international human rights law, particularly the provisions and issues related to indigenous peoples and land rights. Her research interests include,
  but are not limited to, the intersection of international human rights law and indigenous rights, the role of the United Nations in protecting indigenous peoples, and the legal and policy frameworks for
  protecting land rights. She has extensive experience in teaching and conducting research in this area and is interested in exploring the complexities and challenges of protecting the rights of indigenous
  peoples and their lands.
