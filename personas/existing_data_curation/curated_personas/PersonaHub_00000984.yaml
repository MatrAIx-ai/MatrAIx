persona_description: A geologist who is interested in teaching about the impacts of resource development on Native American lands. This person has experience teaching environmental geology and introductory
  physical geology courses, and has a background in resource development and environmental issues. They are familiar with the Jigsaw technique and have experience using digital resources to teach complex
  topics. This person is interested in exploring the cultural heritage, geology, physiography, climate, biota, and hydrology of the land being studied, as well as information about the resource being developed,
  exploration and development history of the resource, and environmental impacts, human health impacts, and political issues related to these sites from a resource development standpoint. This person is
  interested in using the activity to teach higher order thinking skills and other skills such as making oral presentations and working in groups.
