personas:
  professional: Michael Cuen, an aspiring automotive technician with hands‑on expertise in car maintenance, basic woodworking, and microcontroller programming, channels their curiosity and competitive spirit
    into meticulous custom modifications while embracing a relaxed, improvisational workflow that tolerates occasional disorganization.
  sports: Michael Cuen, a weekend hiker and avid solo fisherman who also follows the St. Louis Cardinals and the Arkansas Razorbacks, maintains fitness through functional strength training at the community
    gym and occasional trail runs, while holding a membership in the local Ozark Trail Club and a casual motorbike riding group that meets monthly.
  arts: Michael Cuen, who enjoys the gritty guitar riffs of Metallica, the synth‑driven soundtracks of John Carpenter, and the cinematic storytelling of documentaries like "The Social Dilemma" and "Jiro
    Dreams of Sushi," often streams these while working on car mods, and occasionally sketches vehicle designs inspired by the visual aesthetic of the anime "Akira."
  travel: Michael Cuen, a thrifty solo traveler who prefers short road trips to nearby fishing spots in the Ozarks and dreams of a DIY road‑trip across the U.S. to Detroit’s automotive museums, followed
    by a future venture to Japan’s Mount Fuji area to experience the Tōkaidō highway and Japanese car‑tuning scene.
  culinary: Michael Cuen, a modest home‑cook with a knack for grilling, frequently whips up smoked pork ribs seasoned with a homemade dry rub of paprika, brown sugar, and cayenne, and experiments with hearty
    beef chili using black beans, cumin, and a splash of craft beer.
  core: Michael Cuen, a competitive tinkerer who trades video‑game victories for custom car builds, thrives on solitary projects, and procrastinates on planning while never missing a chance to rev a freshly
    tuned engine.
background:
  cultural: Michael grew up in a middle‑class, Midwestern small‑town environment in Harrisonville, Missouri. His family has deep roots in the area, with generations involved in farming, local trades, and
    community service. The regional culture emphasizes self‑reliance, practicality, and a modest way of life. He was raised attending the local public school, participating in community events such as county
    fairs and youth sports, and learning a hands‑on approach to problem‑solving that reflects the values of his hometown.
attributes:
  skills: '[''Automotive maintenance'', ''Woodworking'', ''Computer hardware troubleshooting'', ''Robotics programming (Arduino, VEX)'', ''Basic electrical wiring'', ''Problem solving'']'
  hobbies: '[''Car and motorcycle modification'', ''Competitive video gaming (FPS/RTS)'', ''DIY electronics projects'', ''Fishing'', ''Hiking'', ''Documentary watching (Science and Technology)'']'
  career_goals: Michael aims to become a skilled automotive technician and eventually open his own garage specializing in custom modifications and electric‑vehicle conversions. He plans to enroll in a community‑college
    automotive technology program or pursue an apprenticeship to deepen his technical knowledge. Over time, he hopes to blend his curiosity for emerging technologies with practical work, possibly expanding
    into mechanical engineering or CNC machining as his expertise grows.
