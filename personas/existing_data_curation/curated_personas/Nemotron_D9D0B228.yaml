  career_goals: Sondra aims to complete her high school education, either by earning a diploma or obtaining a GED, and then enroll in a community college. She is interested in pursuing a nursing or allied
    health program, as she enjoys caring for others and values practical, service‑oriented work. In the meantime, she hopes to develop a small online boutique featuring her handmade crafts, using her social‑media
    skills to build a customer base. Long‑term, she envisions a career that blends community service with entrepreneurship, perhaps running a health‑focused community hub that offers wellness workshops
    and locally made products.
