personas:
  professional: Sondra Britt, a high-school senior with a natural gift for rallying friends and a budding flair for digital design, channels their outgoing energy into running a small Instagram-based boutique
    of handmade bracelets while shadowing local nurses to prep for a future in community health, all the while embracing a relaxed, sometimes disorganized approach to deadlines that leaves projects lingering.
  sports: Sondra Britt, a midfield enthusiast on the City Central High School girls' soccer team, spends weekends dancing hip-hop at the community center, hikes prairie trails for cardio, and roots for
    the nearby Wildcats basketball squad, combining team spirit with a love for outdoor fitness.
  arts: Sondra Britt, whose evenings echo with Taylor Swift's pop anthems and Phoebe Bridgers's indie chords, finds inspiration in crafting friendship bracelets while immersing themselves in John Green's
    contemporary teen novels and binge-watching Stranger Things, weaving these artistic threads into a vibrant personal aesthetic.
  travel: Sondra Britt, who prefers spontaneous weekend road trips over strict itineraries, has explored the rolling prairie trail at Whispering Pines State Park and dreams of a cross-country drive to Moab,
    Utah's red rock arches, balancing limited funds from a part-time babysitting gig with a desire for adventure beyond their rural hometown.
  culinary: Sondra Britt, a self-taught baker who delights in whipping up chocolate-chip cookies, banana-cream cupcakes, and occasional spicy buffalo chicken wings using cocoa powder, almond extract, and
    fresh sriracha, often forgets to set the timer for the perfect golden crust, yet always shares the sweet results with friends and church gatherings.
  core: Sondra Britt is a social, craft-loving teen who mixes entrepreneurial hustle with a caring heart, juggling worry‑induced stress and a relaxed, sometimes chaotic schedule while they dream of a health‑focused
    community hub.
background:
  cultural: Sondra is a white teenager raised in Abilene, Kansas, a small, close‑knit community in Dickinson County. Her family’s roots are in the Midwestern agricultural tradition, and she grew up with
    values of self‑reliance, modesty, and community service. Local customs such as county fairs, 4‑H projects, and church gatherings have shaped her sense of identity. While she respects these traditions,
    she also embraces broader cultural influences through the internet and social media, blending rural Midwestern values with contemporary youth culture.
