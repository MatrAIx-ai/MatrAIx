  hobbies: '[''Soccer'', ''Dancing'', ''Church youth group'', ''Crafting (friendship bracelets, custom T‑shirts)'', ''Baking'', ''Hiking'', ''Listening to music'', ''Journaling'', ''Reading teen novels'',
