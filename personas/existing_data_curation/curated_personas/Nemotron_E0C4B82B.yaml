  hobbies: '[''sketching'', ''watercolor painting'', ''collage art'', ''digital photography'', ''visiting local art galleries'', ''open‑mic nights'', ''volunteering at youth after‑school programs'', ''reading
    fiction and African-American poetry'', ''listening to art/history/social‑justice podcasts'', ''yoga and meditation'', ''journaling'', ''cooking Southern comfort food'', ''curating music playlists'']'
  career_goals: Migdalia aims to earn her GED within the next year and then enroll in a community‑college certificate program in graphic design or community arts coordination. She envisions working as an
    art‑program facilitator at a local community center or after‑school program, where she could combine her love for visual arts with her desire to mentor youth. In the longer term, she hopes to launch
    a small nonprofit that offers free art workshops for underserved neighborhoods in LaPorte County, creating safe spaces for creative expression and cultural celebration. She also wants to achieve financial
    independence and develop a stable career that reduces her stress and allows her to support her family.
