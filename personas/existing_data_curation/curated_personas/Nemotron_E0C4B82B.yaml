personas:
  professional: Migdalia Morrison is an aspiring community‑arts facilitator who blends their sketching, watercolor, and collage talents with basic graphic design and event‑planning skills to organize grassroots
    workshops, while diligently pursuing a GED and a community‑college certificate in graphic design, positioning themselves to eventually launch a nonprofit that offers free art programs for underserved
    neighborhoods in LaPorte County.
  sports: Migdalia Morrison cheerfully supports the Indiana Pacers and the South Bend Cubs, joins a seasonal beach‑volleyball league at the Indiana Dunes, participates in a community yoga group for flexibility,
    and occasionally plays intramural soccer at the local community center, balancing a love for team spirit with personal fitness routines.
  arts: Migdalia Morrison is a mixed‑media enthusiast who sketches everyday scenes, creates watercolor‑collage pieces, curates soulful playlists featuring Erykah Badu, John Coltrane, and Solange while painting,
    regularly attends openings at the Haymarket Center for the Arts, performs spoken‑word at open‑mic nights inspired by poets Rupi Kaur and Sarah Kay, and reads contemporary fiction alongside modern poetry,
    allowing the convergence of visual, auditory, and literary arts to shape their identity.
  travel: Migdalia Morrison enjoys weekend road trips to the Indiana Dunes for sunrise sketching, day‑long explorations of Chicago’s Art Institute, dreams of attending the New Orleans Jazz & Heritage Festival,
    yearns to study mural art in Asheville’s River Arts District, and hopes to one day immerse themselves in the vibrant street art scene of Barcelona, balancing a modest travel budget with a yearning for
    cultural immersion.
  culinary: Migdalia Morrison loves cooking Southern‑style comfort food such as fried chicken, collard greens, and sweet‑potato pie using family‑passed recipes, while also experimenting with fresh herbs
    like sage and thyme in homemade gumbo and trying new cuisines like Korean bibimbap, displaying a kitchen skill level that ranges from confident home‑cooking to adventurous culinary experimentation.
  core: Migdalia Morrison is a creatively restless 22‑year‑old whose anxiety fuels both meticulous budgeting and impulsive art‑supply splurges, blending soulful music, mixed‑media art, and community mentorship
    into a drive to uplift youth despite occasional sleepless nights.
background:
  cultural: Migdalia was raised in a close‑knit African‑American family in Michigan City, a city with a modest Black community that traces its roots to the Great Migration. Her family emphasizes church
    involvement, gospel music, storytelling, and community solidarity. Growing up attending a local Baptist church, she learned the value of service, vocal expression in the choir, and collective celebration.
    Cultural traditions such as soul cooking, family reunions, and participation in the annual African‑American Heritage Festival have shaped her worldview. She is aware of the systemic challenges faced
    by Black residents in the Midwest and feels a responsibility to uplift her community through art and mentorship. Her cultural background informs her artistic style, often incorporating themes of resilience,
    identity, and the natural beauty of the Great Lakes region.
