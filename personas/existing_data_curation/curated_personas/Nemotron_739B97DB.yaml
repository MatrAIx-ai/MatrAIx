  hobbies: '[''Art gallery visits'', ''Watercolor painting'', ''Gardening (native Floridian plants)'', ''Live music and theater attendance'', ''Traveling (especially to Europe)'', ''Hosting dinner parties'',
    ''Book club participation'', ''Volunteering at community senior center'', ''Playing bridge'', ''Yoga or Pilates'']'
  career_goals: Ashley aims to leverage her managerial expertise into a senior regional director role within the hospitality or senior‑living sector, where she can champion innovative service models and
    mentor emerging leaders. She is also passionate about establishing a community arts initiative that integrates creative workshops for seniors, hoping to serve on the board of the local arts council.
    In the longer term, she envisions launching a boutique consulting practice that helps small businesses in Sarasota County enhance customer experience through unconventional, art‑inspired strategies.
