personas:
  professional: Ashley Long, a seasoned hospitality manager in Sarasota, blends data‑driven strategic planning with an artist's curiosity to craft innovative senior‑living programs and mentor emerging leaders,
    leveraging charismatic public speaking and flexible, agile leadership while occasionally letting a relaxed, disorganized approach sideline strict deadlines, and they relish competitive boardroom battles
    where personal vision reigns.
  sports: Ashley Long stays active with sunrise walks on Siesta Key, a regular spot in the Sarasota Golf & Country Club senior golf league, and weekly tennis matches at the Siesta Key Tennis Club, all while
    cheering for the Tampa Bay Rays and catching Miami Heat games whenever they travel to Miami, reflecting a social yet competitive approach to fitness.
  arts: Ashley Long immerses themselves in Sarasota's cultural pulse, frequenting the Ringling Museum to admire Georgia O'Keeffe’s canvases, attending contemporary gallery openings featuring Kehinde Wiley,
    savoring Sarasota Opera's Puccini productions, and rocking out to Patti Smith and the local Preservation Hall Brass Band, experiences that inspire their own watercolor landscapes and drive their community
    arts initiative.
  travel: Ashley Long favors curated European cultural tours, having explored the art‑laden streets of Florence, the museums of Vienna, and the historic cafés of Paris, while also dreaming of a spring trip
    to Kyoto's temples, planning trips with a mix of meticulous itinerary spreadsheets and last‑minute spontaneity that balances their senior‑living responsibilities and love for immersive art experiences.
  culinary: Ashley Long, a confident home chef, delights in preparing Mediterranean dishes such as lemon‑ricotta gnocchi with fresh basil, grilled grouper ceviche topped with mango and lime, and a saffron‑infused
    paella brimming with shrimp and chorizo, while also savoring upscale dining at Sarasota's Indigenous restaurant for their locally sourced oysters and truffle risotto, reflecting a palate that blends
    health‑conscious flavors with occasional indulgent splurges.
  core: Ashley Long, a sociable, art‑driven 63‑year‑old with a competitive edge and a habit of juggling flexible plans over strict schedules, channels their curiosity into vibrant community initiatives
    while sometimes letting disorganization color their day‑to‑day life.
background:
  cultural: Raised in a middle‑class white family on Florida's Gulf Coast, Ashley embodies a blend of Southern hospitality and the eclectic, tourism‑driven culture of Sarasota County. Her upbringing emphasized
    community involvement, friendly conversation, and an appreciation for the arts, reinforced by proximity to institutions like the Ringling Museum and annual arts festivals. Exposure to a diverse mix
    of retirees, seasonal visitors, and vibrant cultural events broadened her worldview, fostering a curiosity for new ideas and unconventional thinking while maintaining core American cultural values.
