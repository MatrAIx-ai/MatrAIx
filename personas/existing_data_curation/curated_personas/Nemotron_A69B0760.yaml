  career_goals: Victor aims to turn his artistic passion into a sustainable career. He plans to earn a GED and enroll in a community college or art institute to study graphic design or visual arts. His
    long‑term ambition is to become a professional illustrator or muralist who can tell stories of the Venezuelan diaspora and broader social issues through public art. He hopes to freelance, maintain a
    flexible schedule that suits his spontaneous nature, and eventually collaborate with non‑profits on community‑outreach projects that combine art with activism.
