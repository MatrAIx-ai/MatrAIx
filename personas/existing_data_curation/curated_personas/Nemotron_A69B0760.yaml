personas:
  professional: Victor Lizama, a 17‑year‑old aspiring visual storyteller, blends street‑art techniques with free‑software digital illustration while channeling their curious, spontaneous imagination into
    community mural projects, yet they often struggle with deadlines due to a resistance to rigid structure.
  sports: Victor Lizama, a 17‑year‑old skateboarding enthusiast, spends weekends at the Chicago Park District skate park, roots for the Chicago Bulls in basketball season and the Chicago Blackhawks in hockey,
    and they prefer casual jogging along the Lakefront over structured gym workouts.
  arts: Victor Lizama, a 17‑year‑old aspiring muralist, devours graphic novels in cafés while drawing inspiration from street‑art legends like Banksy, hip‑hop icons such as Kendrick Lamar, and folk troubadours
    like Jorge Drexler, and they regularly perform original poetry at open‑mic nights.
  travel: Victor Lizama, a 17‑year‑old wanderer, prefers spontaneous weekend trips to nearby Chicago neighborhoods like Wicker Park and the Lakefront, has backpacked through New Orleans for its music scene,
    and they dream of a summer art‑focused pilgrimage to the colorful streets of Valparaíso, Chile.
  culinary: Victor Lizama, a 17‑year‑old hobby cook, alternates between ordering craft coffee and art‑themed cafés, while at home mastering corn‑based flatbreads stuffed with black beans, cheese, and avocado,
    and they experiment with plantain fritters seasoned with cumin and cilantro.
  core: Victor Lizama, a 17‑year‑old creative spark, blends street‑art grit with digital flair, worries about deadlines but thrives on spontaneous collaborations, and they can’t resist a late‑night coffee
    before sketching.
background:
  cultural: Victor is a first‑generation Venezuelan‑American. His family fled the economic crisis in Venezuela and settled in Chicago’s multicultural neighborhoods, where a vibrant Latino community provided
    a sense of belonging. He grew up speaking Spanish at home, celebrating Venezuelan holidays such as Día de la Independencia with traditional foods like arepas and hallacas, and listening to music ranging
    from gaita to modern reggaeton. The blend of his Venezuelan roots and the diverse fabric of Chicago shapes his worldview, making him sensitive to immigrant experiences and eager to bridge cultural gaps
    through art.
