  hobbies: '[''pretend play (superheroes, animals, astronauts)'', ''drawing and coloring with vivid crayons'', ''dancing to lively music'', ''building and toppling block towers'', ''interactive group games
    at the park'', ''watching videos with abstract shapes and bright colors'']'
  career_goals: Even at two, Luis dreams of becoming a superhero or astronaut, often saying he wants to "fly high" and "help people". He also imagines being a firefighter or police officer, roles that embody
    protection, leadership, and adventure—reflecting his love for novelty, competition, and being recognized by peers.
