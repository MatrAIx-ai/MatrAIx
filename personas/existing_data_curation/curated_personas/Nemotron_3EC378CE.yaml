  hobbies: '["Hiking", "Surfing", "Cooking (fusion Chinese‑Hawaiian cuisine)", "Karaoke", "Cultural festivals", "Reading personal finance", "Gardening", "Mindfulness meditation"]'
  career_goals: Junying aims to become a regional sales manager within the next three years, leading a high‑performing team that consistently exceeds sales targets. She plans to specialize in niche markets,
    such as life and health insurance for immigrant families, and to develop financial‑education workshops that complement her product offerings. In the longer term, she aspires to launch her own independent
    brokerage that blends traditional insurance services with personalized wealth‑management advice. To support these ambitions, she intends to obtain advanced credentials such as the Chartered Life Underwriter
    (CLU) and to deepen her expertise in risk management and estate planning, reflecting her competitive drive and pragmatic focus on sustainable growth.
