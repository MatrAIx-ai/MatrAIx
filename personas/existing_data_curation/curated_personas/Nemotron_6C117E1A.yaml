personas:
  professional: An aspiring community health worker and culinary student, Eliezer Jacobo leverages bilingual communication, meticulous organization, and a caring nature to support families in a structured,
    predictable work environment.
  sports: A pickup soccer enthusiast, Eliezer Jacobo spends weekends playing informal matches at local parks, supports the New England Revolution with fervor, and occasionally joins a community league that
    emphasizes teamwork and cultural camaraderie.
  arts: Passionate about rhythm, Eliezer Jacobo regularly dances to merengue and bachata tracks by artists like Romeo Santos and Juan Luis Guerra at community gatherings, while also curating playlists that
    blend contemporary Latin pop with classic salsa, shaping their social identity.
  travel: A modest traveler, Eliezer Jacobo prefers budget‑friendly weekend trips to nearby coastal towns like Block Island and cultural cities such as Boston, while dreaming of visiting the island where
    their family’s cherished recipes originated, balancing careful planning with occasional spontaneous road trips.
  culinary: A self‑taught home cook, Eliezer Jacobo delights in preparing family‑passed dishes such as fried plantain mash, seasoned rice with beans, and savory stew with root vegetables, experimenting
    with ingredients like cilantro, achiote, and lime, yet occasionally over‑spices in an effort to replicate beloved holiday flavors.
  core: Eliezer Jacobo is a bilingual, structure‑loving 22‑year‑old who channels their love for community, rhythm, and cooking into supportive health work while battling anxiety with journaling, meditation,
    and the occasional over‑cooked stew.
background:
  cultural: Eliezer was raised in a Dominican household in Providence, Rhode Island, where Spanish was spoken at home and English at school, fostering his bilingual fluency. His family values close-knit
    relationships, respect for elders, and shared celebrations such as Dominican Independence Day, Carnaval, and religious holidays rooted in Catholic traditions. The vibrant Dominican diaspora in New England
    influences his love for music, dance, and cuisine, while also reinforcing a strong sense of cultural pride. These traditions coexist with the broader New England community, shaping his perspective on
    multicultural collaboration and his desire to support fellow immigrants through culturally informed services.
