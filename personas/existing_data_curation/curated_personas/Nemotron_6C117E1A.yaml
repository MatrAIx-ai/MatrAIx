  career_goals: Eliezer aims to enroll in a community‑college program that offers an associate degree in social work or counseling, with the long‑term goal of becoming a community health worker or peer‑support
    specialist who can provide culturally competent assistance to Dominican families in Providence. He also sees value in earning a culinary certification to work in a structured kitchen environment where
    his love for cooking can translate into a stable career. Overall, he seeks a predictable, supportive work setting that offers clear advancement steps and allows him to make a positive impact on his
    community while accommodating his need for routine and emotional well‑being.
