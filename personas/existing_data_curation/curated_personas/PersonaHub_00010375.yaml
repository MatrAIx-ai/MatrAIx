persona_description: A scientist who specializes in the study of the Gulf of Mexico's hypoxic zone, specifically the causes and effects of nutrient runoff from the Mississippi River watershed. She is a
  leader in the Hypoxia Task Force and has conducted research to map and understand the trend of hypoxia in the Gulf, including the impacts on the ecosystem and the commercial and recreational Gulf fisheries.
  She is a dedicated and passionate scientist who is committed to protecting both resources and economies threatened by the problem.
