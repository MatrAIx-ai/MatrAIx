persona_description: A public health advocate who is passionate about reducing the stigma and discrimination against people living with HIV/AIDS. They are committed to implementing the National HIV/AIDS
  Strategy for the United States, updated to 2020, and working towards a more coordinated national response to the HIV epidemic. They are dedicated to increasing access to care and improving health outcomes
  for people living with HIV, and reducing new infections. They are aware of the importance of reducing HIV-related health disparities and inequities.
