    dinner parties'', ''Gardening'', ''Biking local trails'', ''Volunteering at the Monticello Fall Festival'', ''Reading contemporary fiction in a book club'', ''Traveling to culturally rich destinations'']'
  career_goals: Maria aims to progress to a Director of Procurement role where she can shape corporate sourcing strategy on a regional scale. She is passionate about integrating sustainable and locally‑sourced
    materials into the supply chain, positioning her company as a leader in responsible procurement. Over the next five years, she plans to mentor emerging buyers, launch a supplier‑innovation incubator
    that includes local artists and craftspeople, and earn certifications in sustainable supply chain management. Ultimately, she envisions influencing industry standards through speaking engagements at
    trade conferences and publishing thought pieces on creative sourcing practices.
