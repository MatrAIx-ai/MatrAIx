  career_goals: Colin aims to advance into a regional management role within his financial institution, overseeing multiple branches and shaping policy on responsible lending. He also wants to enhance financial
    literacy in Columbiana County by launching community workshops and partnering with local schools to teach budgeting and credit management. Over the next five years he plans to earn the Certified Financial
    Services Counselor (CFSC) designation, mentor a new generation of credit counselors, and eventually transition to part-time consulting to help small businesses navigate financing options while maintaining
    a flexible schedule for his personal pursuits.
