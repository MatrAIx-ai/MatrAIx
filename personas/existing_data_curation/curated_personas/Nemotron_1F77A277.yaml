  hobbies: '["Pickup basketball", "Community gardening", "Volunteer work at a Gullah cultural center", "Landscape photography", "Listening to hip‑hop, R&B, and jazz", "Cooking soul‑food with family", "Reading
    sustainable design literature", "Mindfulness and stress‑relief techniques"]'
  career_goals: Walter aims to advance his career by completing his associate degree in horticulture and earning certifications in landscape design and sustainable practices. He envisions becoming a licensed
    landscape architect, focusing on creating eco‑friendly public green spaces in Charleston. In the longer term, he hopes to launch his own community‑focused landscaping firm that provides job training
    for local youth and partners with neighborhood groups to revitalize underused urban areas. His drive to help others and maintain harmony guides his ambition to mentor apprentices and contribute to environmental
    justice projects.
