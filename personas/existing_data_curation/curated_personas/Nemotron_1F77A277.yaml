personas:
  professional: Walter Dowe, a 19‑year‑old aspiring landscape architect, blends hands‑on landscaping experience with horticulture coursework to design sustainable public green spaces in Charleston, leveraging
    his methodical project‑planning skills, strong communication, and compassionate drive to mentor youth while constantly balancing innovative ideas with proven practices.
  sports: Walter Dowe hits the local park for pickup basketball every Saturday, cheers on the Charleston Battery soccer team and follows the Charleston RiverDogs baseball games, and follows a structured
    fitness routine that mixes cardio with garden‑yard chores, though they sometimes skip workouts when stress spikes.
  arts: Walter Dowe captures the marshlands with a DSLR while listening to Kendrick Lamar, H.E.R., and Wynton Marsalis, attends Charleston’s monthly gallery nights featuring Southern artists, and draws
    creative inspiration from sustainable design books, yet they sometimes binge‑watch music videos late into the night, neglecting sleep.
  travel: Walter Dowe dreams of exploring coastal gardens from Savannah’s historic squares to Kyoto’s Zen landscapes, prefers budget‑friendly road trips with a detailed itinerary, yet they occasionally
    postpone trips due to school deadlines and family responsibilities.
  culinary: Walter Dowe whips up soul‑food classics like shrimp and grits, collard greens, and sweet tea using fresh herbs from the community garden, enjoys experimenting with vegan twists, but they often
    over‑season dishes in the excitement of cooking for friends.
  core: Walter Dowe is a meticulously organized 19‑year‑old who balances a passion for sustainable landscaping and photography with a chronic habit of over‑thinking, leading to occasional stress‑induced
    procrastination and a love for late‑night music playlists.
background:
  cultural: Walter was raised in Charleston, South Carolina, in a close‑knit African‑American family with deep ties to the city’s Gullah heritage. He grew up hearing stories of the Lowcountry’s rice‑planting
    history, the resilience of his ancestors, and the importance of community solidarity. Church gatherings, local festivals, and family cookouts have shaped his sense of identity and his emphasis on compassion
    and cooperation. The coastal environment, with its unique flora, frequent hurricanes, and ongoing efforts to preserve marshlands, has fostered his passion for sustainable landscaping and environmental
    stewardship. While he celebrates Southern traditions, he also embraces contemporary Black culture, balancing respect for his roots with a forward‑looking, curious outlook.
attributes:
  skills: '["Plant identification", "Landscape design and layout", "Soil preparation and amendment", "Irrigation system installation and troubleshooting", "Equipment operation and maintenance", "Safety
