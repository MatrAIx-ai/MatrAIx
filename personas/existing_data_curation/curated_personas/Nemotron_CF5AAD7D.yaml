personas:
  professional: Rodric Bowers is a 20‑year‑old aspiring diesel mechanic who blends hands‑on ranch maintenance experience with a growing digital skill set, using spreadsheets to track tool inventories while
    dreaming of launching a mobile repair service that will keep the rural backbones of southeastern Wyoming running, even though they sometimes let the lack of a rigid schedule lead to scattered project
    timelines.
  sports: Rodric Bowers is an avid hunter, fisherman, and ATV enthusiast who rides with the local Wyoming Trail Blazers club, follows the University of Wyoming Cowboys football and the Denver Broncos NFL
    team, and spends crisp autumn weekends tracking whitetail deer on the open plains while occasionally cheering on the nearby high‑school basketball games.
  arts: Rodric Bowers immerses themselves in classic country legends like Johnny Cash and Dolly Parton and hard‑rock icons such as AC/DC and Led Zeppelin, while also appreciating western folk ballads by
    Marty Robbins, attending the annual county‑fair rodeo performances, and expressing creativity through bike restoration and small‑scale woodworking projects.
  travel: Rodric Bowers favors DIY road trips that blend adventure with budget awareness, having explored Yellowstone and Grand Teton National Parks on weekend getaways, dreaming of a cross‑country drive
    to Banff, Canada, and planning a future summer visit to the Fort Worth Stock Show to experience larger‑scale ranch culture.
  culinary: Rodric Bowers delights in cooking hearty ranch‑style meals such as venison stew, grilled bison burgers with sweet‑potato fries, and a spicy Texas‑style chili topped with cornbread, often using
    fresh Wyoming beef, wild‑caught trout, and locally sourced beans and herbs while occasionally swapping recipes on online forums.
  core: Rodric Bowers is a pragmatic yet slightly disorganized frontier‑spirited 20‑year‑old who balances a love for hands‑on mechanics and solitude with an undercurrent of anxiety that fuels meticulous
    budgeting and an ever‑present urge to sprint toward the next outdoor adventure, even if they sometimes forget where they left their tools.
background:
  cultural: Rodric grew up in Veteran, a small town in Goshen County, Wyoming, where ranching, outdoor recreation, and a close‑knit community shape daily life. His family has deep roots in the local agricultural
    sector, participating in county fairs and 4‑H programs. He attended a local high school that emphasized practical skills, such as the Future Farmers of America (FFA) program, and he was involved in
    occasional church gatherings that reinforced values of self‑reliance, neighborly cooperation, and respect for the land. This Western frontier heritage, combined with a Midwestern work ethic, informs
    his worldview and daily habits.
attributes:
  skills: '[''Mechanical troubleshooting'', ''Basic carpentry'', ''Livestock handling'', ''Vehicle maintenance'', ''Digital literacy (social media, spreadsheets)'', ''Outdoor navigation (map reading, GPS)'',
    ''First aid basics'']'
  hobbies: '[''Hunting'', ''Fishing'', ''ATV riding'', ''Playing strategy video games'', ''Listening to country and classic rock music'', ''Bike restoration'', ''Casual woodworking projects'']'
  career_goals: Rodric aims to earn a certification in diesel mechanics at a nearby community college within the next two years and eventually launch his own mobile repair service that serves the rural
    communities of southeastern Wyoming. He also hopes to take agricultural courses to help modernize his family's ranch, blending traditional farming with sustainable practices. While he values a reliable
    schedule, he is drawn to the autonomy of entrepreneurship, believing it will give him enough structure to manage his anxiety while preserving the flexibility he enjoys.
