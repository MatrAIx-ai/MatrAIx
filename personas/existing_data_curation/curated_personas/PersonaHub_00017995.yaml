persona_description: A health professional with expertise in the management and treatment of asthma. This persona has a deep understanding of the complex interplay between asthma and other morbidities,
  including co-morbidities such as heart failure, sleep apnea, and obesity. They are skilled in identifying and addressing these factors to improve asthma control. This person is likely to have a background
  in respiratory medicine, pulmonology, or a related field. They are highly skilled in evaluating the impact of morbidities on asthma control, and are adept at developing treatment plans that address both
  asthma and the morbidities. They are also knowledgeable about the current classification of difficult-to-control asthma and the challenges of treating these patients. This person is likely to be involved
  in research in the area of asthma management and treatment, and is likely to have a strong interest in the development of new treatments for asthma.
