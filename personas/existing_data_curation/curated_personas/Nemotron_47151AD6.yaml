  career_goals: Although retired, Russ aims to stay actively engaged in his community and personal development. He plans to volunteer as a mentor for the local teen apprenticeship program, sharing his practical
    trade knowledge with younger learners. He also hopes to contribute to the Carlisle Historical Society by curating exhibits and helping preserve local heritage. Writing a memoir that intertwines his
    life story with the region’s history is another ambition, as is maintaining a regular schedule of physical activity through gardening and walking trails to support his health and resilience.
