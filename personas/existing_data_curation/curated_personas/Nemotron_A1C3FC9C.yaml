  career_goals: Jackie aims to advance to an office manager or senior administrative specialist position within the next five years, focusing on leading a small team of clerical staff and implementing process
    improvements that increase efficiency and employee well‑being. She plans to earn the Certified Administrative Professional (CAP) credential and complete an associate degree in Business Administration.
    Her long‑term ambition includes developing a training program for new hires and using her compassionate nature to foster a supportive, low‑stress workplace culture. Additionally, she hopes to transition
    into a role that supports community services, such as a coordinator for a local nonprofit, where she can apply her organizational expertise to benefit others.
