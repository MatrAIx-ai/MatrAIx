personas:
  professional: Tommy Carle is a middle‑school English teacher who blends meticulously structured lesson plans with spontaneous, arts‑infused activities, leveraging their expertise in differentiated instruction
    and conflict resolution while channeling their outgoing, sociable energy into collaborative classroom projects.
  sports: Tommy Carle is a loyal fan of the Louisville Cardinals and Kentucky Wildcats, plays weekly in the Louisville Hoops Club’s recreational basketball league, and hikes the Red River Gorge and other
    Kentucky state parks each spring, balancing competitive spirit with a laid‑back approach to fitness.
  arts: Tommy Carle immerses themselves in community theater as a stage manager, strums acoustic guitar to the folk‑rock sounds of Gillian Welch and Sturgill Simpson during jam sessions, and draws narrative
    inspiration from playwright Annie Baker, often weaving these influences into their board‑game nights that feature storytelling twists.
  travel: Tommy Carle prefers spontaneous road trips over rigid itineraries, having driven through Kentucky’s Red River Gorge and the Great Smoky Mountains, while dreaming of a literary pilgrimage to Dublin
    and a jazz‑filled weekend in New Orleans once their master’s program finances stabilize.
  culinary: Tommy Carle enjoys cooking Southern‑inspired dishes such as shrimp‑and‑grits with hot sauce, bourbon‑glazed pork chops, and pecan pie, confidently hosting dinner parties where they experiment
    with locally sourced collard greens, smoked paprika, and a splash of bourbon.
  core: Tommy Carle blends a love for structured lesson plans with a habit of over‑booking board‑game nights and occasionally forgetting to water houseplants, navigating life with disciplined optimism and
    a dash of impulsive creativity.
background:
  cultural: Tommy grew up in a middle‑class family on the outskirts of Louisville, where Southern hospitality and a strong sense of community were everyday norms. His white, Midwestern‑Southern heritage
    exposed him to regional traditions such as horse racing events, bourbon festivals, and local music scenes, while his university education in arts and humanities broadened his perspective on cultural
    diversity. This blend of regional pride and academic curiosity informs his teaching philosophy, emphasizing respect for local customs alongside an inclusive, globally aware curriculum.
attributes:
  skills: '[''Lesson planning'', ''Classroom management'', ''Differentiated instruction'', ''Arts integration'', ''Educational technology'', ''Social‑emotional learning facilitation'', ''Parent communication'',
    ''Conflict resolution'', ''Collaborative curriculum design'', ''Project‑based learning'']'
  hobbies: '[''Acoustic guitar'', ''Community theater'', ''Recreational basketball'', ''Hiking'', ''Cooking Southern cuisine'', ''Board-game nights'', ''Reading contemporary fiction'', ''Short story writing'']'
  career_goals: Looking ahead, Tommy aims to deepen his impact beyond his own classroom. He plans to earn a master's degree in educational leadership within the next three years, positioning himself for
    a role as a grade‑level chair or assistant principal. He also hopes to lead district‑wide initiatives that embed the arts into STEM subjects, mentor new teachers, and launch an after‑school program
    that combines creative writing and performance for middle‑school students. Ultimately, he envisions shaping school culture to balance structure with the flexibility that nurtures student curiosity.
