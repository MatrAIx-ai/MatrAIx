  career_goals: Gustavo aims to finish his high‑school equivalency (GED) within the next year and enroll in a community‑college automotive technology program. His goal is to obtain an ASE‑certified automotive
    technician credential, giving him a clear, structured career path with steady income. He also wants to explore a possible apprenticeship with a local auto shop where he can apply his hands‑on skills
    under a mentor. In the longer term, Gustavo hopes to open his own small auto‑repair garage to serve the Del Rio community, allowing him to combine his competitive drive with his desire for independence.
    He keeps an eye on the possibility of joining the U.S. Navy’s mechanical rating, attracted by the discipline and training it offers.
