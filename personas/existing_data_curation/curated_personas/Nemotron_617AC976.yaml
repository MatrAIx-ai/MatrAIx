personas:
  professional: Joann Rogers is an aspiring elementary educator who designs arts‑infused lesson plans that blend literacy, math, and watercolor projects, skillfully uses Google Classroom and Seesaw to personalize
    feedback, and collaborates with colleagues to support students with mild learning differences while balancing a structured yet flexible classroom vibe.
  sports: Joann Rogers enjoys occasional hikes in Tuskegee National Forest, follows the Alabama State Hornets basketball team and the Atlanta Falcons football team, and participates in a casual weekend
    running club that meets at the local park, though they prefer low‑impact activities and often skip the gym in favor of nature walks.
  arts: Joann Rogers devotes evenings to watercolor painting inspired by the rolling hills of Alabama, studies the compositions of Claude Monet and Georgia O'Keeffe, snaps black‑and‑white photographs of
    historic downtown architecture, reads poetry by Mary Oliver and Robert Frost, strums acoustic guitar renditions of Bob Dylan and Joni Mitchell, and attends monthly exhibitions at the Montgomery Museum
    of Fine Arts for fresh creative ideas.
  travel: Joann Rogers favours slow, reflective travel, having backpacked through New Orleans for its music and Creole cuisine, explored the historic streets of Savannah, GA, trekked the scenic trails of
    the Great Smoky Mountains, and dreams of a study abroad semester in Florence, Italy to see Renaissance masterpieces up close, all while planning trips on a modest budget and preferring off‑peak dates.
  culinary: Joann Rogers experiments with Southern twists on classic dishes, regularly cooking shrimp and grits infused with fresh lemon zest, fried green tomatoes drizzled with a honey‑chipotle glaze,
    pimento cheese grilled cheese with a dash of smoked paprika, and baking peach cobbler using locally sourced peaches, while honing a moderate cooking skill that balances precise measurements with intuitive
    flavor pairing.
  core: Joann Rogers is a quietly ambitious future educator who blends art, nature, and Southern flavors into a balanced, introspective life, occasionally over‑indulges in coffee and watercolor supplies,
    and keeps a meticulous leaf journal that sometimes gets lost in the chaos of campus life.
background:
  cultural: Joann grew up in Prattville, a small city in the heart of Alabama’s Wiregrass region, within a middle‑class, Protestant family that values community, hospitality, and modesty. Her upbringing
    was shaped by Southern traditions such as church involvement, family gatherings, and a respect for local history and folklore. Exposure to regional arts—like folk music, quilting, and Southern literature—instilled
    an appreciation for storytelling and craftsmanship. While identifying as white and American, Joann embraces the blend of traditional Southern values with a curiosity for broader cultural ideas, which
    informs both her teaching style and personal interests.
attributes:
  skills: '["Classroom Management", "Lesson Planning", "Differentiated Instruction", "Literacy Development", "Arts Integration", "Educational Technology", "Special Education Support", "Student Assessment",
    "Collaborative Teaching", "Creative Writing Guidance", "Project-Based Learning"]'
  hobbies: '["Reading (historical fiction, poetry)", "Sketching and watercolor painting", "Photography", "Visiting local art museums and galleries", "Hiking and nature walks", "Cooking and experimenting
    with recipes", "Gardening", "Journaling", "Playing acoustic guitar", "Participating in small book clubs", "Volunteer tutoring at the community library"]'
  career_goals: Joann aims to complete her bachelor's degree in Elementary Education and obtain full state certification within the next two years. She is eager to pursue a master's program focused on curriculum
    design, with a special interest in arts‑infused teaching methods. In the longer term, she envisions becoming a literacy coach or curriculum specialist for her district, helping other teachers integrate
    creative, student‑centered approaches. Joann also hopes to lead after‑school arts programs, mentor new teachers, and eventually take on a school leadership role such as assistant principal.
