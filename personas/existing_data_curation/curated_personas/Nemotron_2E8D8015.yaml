personas:
  professional: Jeremy Gomez, a budding junior coder and cartoonist, leverages his curiosity and methodical planning to craft Scratch interactive stories while using his sociable, talk‑heavy demeanor to
    showcase them in school assemblies, though he often frets over every pixel.
  sports: Jeremy Gomez, who plays on the Riverside Rangers youth soccer team, sharpens his footwork on Saturday games, roots for the Los Angeles Dodgers during baseball season and the New Mexico State Aggies
    in football, and cools off with weekly swims at the community pool to keep his energy up.
  arts: Jeremy Gomez, an avid doodler and budding painter, draws inspiration from the whimsical panels of Jeff Smith’s 'Bone', the vibrant landscapes of Claude Monet, and the storytelling rhythm of classic
    rock legends like The Rolling Stones and New Mexican folk group Al Hurricane, often performing impromptu sketches for his drama club audience.
  travel: Jeremy Gomez, who loves exploring the riverbanks near his home and has camped at Carlsbad Caverns with his family, dreams of hiking the Grand Canyon’s Rim Trail next summer and hopes to one day
    see the Northern Lights in Iceland, preferring trips that blend adventure with hands‑on nature studies.
  culinary: Jeremy Gomez, a budding chef who can confidently whip up cheese quesadillas with pepper jack and fresh salsa, loves the sweet tang of blueberry muffins, often experiments with adding crunchy
    carrots to his smoothies, and enjoys indulging in classic grilled cheese sandwiches with a side of tomato soup.
  core: Jeremy Gomez, a curious, organized nine‑year‑old who channels endless energy into drawing, coding, and team games while occasionally worrying about every detail and hoarding spare change in a secret
    drawer, epitomizes the blend of creativity and carefulness.
background:
  cultural: 'Jeremy grew up in Bosque, a small community in Socorro County, New Mexico, where the desert landscape and the nearby Rio Grande shape daily life. His family, of Anglo‑American heritage, embraces
    the spirit of the Southwest, participating in local traditions such as the annual Bosque Chili Cook‑off, community picnics, and church gatherings. He is exposed to a blend of cultures: the region’s
    Hispanic and Native American influences appear in the food he eats (green chile enchiladas, frybread), the Spanish phrases heard at school, and the art of local pueblos. These multicultural experiences
    broaden his appreciation for varied artistic expressions and fuel his curiosity about the world.'
attributes:
  skills: '[''Sketching and painting'', ''Basic digital illustration (Scratch)'', ''Organizational skills (homework and project planning)'', ''Public speaking and group facilitation'', ''Conflict mediation'',
    ''LEGO construction'', ''Basic coding and problem solving'']'
  hobbies: '[''Drawing cartoons'', ''Painting landscapes'', ''Scratch storytelling projects'', ''Exploring Bosque river and birdwatching'', ''Collecting rocks and fossils'', ''LEGO building'', ''Board games
    with friends'', ''School drama club'', ''Reading graphic novels'', ''Listening to classic rock and New Mexican folk music'']'
  career_goals: Jeremy dreams of turning his love of art and nature into a career. He imagines becoming a wildlife illustrator who creates educational posters for local schools, or a museum curator who
    showcases the art and ecosystems of the New Mexico high desert. He also entertains the idea of teaching art or science to younger children, combining his sociable personality with his enthusiasm for
    sharing new ideas. In the long term, he hopes to study at a university where he can blend graphic design, environmental science, and community outreach, hoping to inspire others just as he has been
    inspired.
