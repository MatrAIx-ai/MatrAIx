  hobbies: '[''Softball league'', ''Fishing trips'', ''Woodworking'', ''Model ship building'', ''Neighborhood barbecues'', ''Habitat for Humanity volunteering'', ''Coastal heritage festivals'', ''Historical
    reenactments'']'
  career_goals: Alex aims to transition into a supervisory role such as foreman or site manager within the next few years, leveraging his practical experience and associate degree. He plans to obtain a
    journeyman carpentry certification and pursue additional training in construction management to qualify for a small contracting license. His long‑term ambition is to establish a niche business focused
    on sustainable coastal renovation projects that address the unique weather‑resistant requirements of the Chesapeake Bay area. Alongside business goals, Alex is committed to mentoring at least three
    apprentices each year, passing on his emphasis on safety, reliability, and teamwork.
