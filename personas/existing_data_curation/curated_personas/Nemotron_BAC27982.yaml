  career_goals: Gary envisions a future where he merges his passion for art with technology. He aspires to attend a specialized high-school program in visual arts and later study game design or animation
    at a university. His goal is to become a concept artist for video games or a digital illustrator for graphic novels, aiming to create immersive worlds that challenge conventional storytelling. He also
    hopes to earn recognition in regional art competitions, leveraging his competitive nature to secure scholarships. Long-term, Gary dreams of using his design skills to contribute to his community—perhaps
    by creating murals or visual branding for local businesses, blending his love for creativity with his Midwestern roots.
