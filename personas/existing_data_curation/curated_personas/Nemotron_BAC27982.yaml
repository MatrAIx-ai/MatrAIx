personas:
  professional: Gary Torres is an aspiring digital and visual artist whose knack for translating Minecraft architecture into hand‑drawn sketches and stop‑motion videos demonstrates a blend of technical
    precision and creative storytelling, and they consistently channel their curiosity into building a personal portfolio that bridges traditional media and interactive design.
  sports: Gary Torres plays on the Rapid City Youth Basketball Club, idolizes the South Dakota State Jackrabbits men's basketball team, and spends weekends hiking the Black Hills where they capture landscape
    photos, balancing competitive court play with a love for endurance trekking.
  arts: Gary Torres devours graphic novels like “Saga” and “Watchmen,” draws inspiration from artists such as Hayao Miyazaki and Banksy, spends afternoons experimenting with charcoal, watercolors, and Procreate
    on a digital tablet, and channels that influence into stop‑motion videos that remix classic comic panels.
  travel: Gary Torres enjoys weekend camping trips to the Badlands and has dreamed of visiting the Louvre in Paris to see the original Mona Lisa, preferring road‑trip planning with a blend of spontaneous
    detours and carefully plotted hiking routes while saving a fraction of their allowance for future family vacations.
  culinary: Gary Torres favors quick‑fire meals like pepperoni pizza and ramen but also loves crafting homemade trail mix with dried cranberries, almonds, and dark chocolate during hikes, and they proudly
    showcase a hand‑carved wooden cutting board they made with family during a summer woodworking project.
  core: Gary Torres is a fiercely curious teen who blends art, tech, and competition, often juggling sketchbooks, Minecraft builds, basketball drills, and a penchant for collecting odd‑ball gadgets, all
    while occasionally losing track of sleep.
background:
  cultural: Gary grows up as a white teenager in the small, close-knit community of Piedmont, South Dakota, a town surrounded by the rolling plains and the foothills of the Black Hills. His family's heritage
    is primarily of European descent, though the Torres surname hints at a multicultural lineage that he embraces through stories passed down from grandparents. Life in Meade County centers on agriculture,
    community events like county fairs, and school sports, instilling values of self-reliance, hard work, and neighborly support. While he participates in typical Midwestern traditions—football games, Fourth
    of July picnics, and church gatherings—Gary also consumes national pop culture through the internet, exposing him to diverse artistic influences. This blend of rural Midwestern upbringing and global
    artistic exposure shapes his worldview and fuels his curiosity.
