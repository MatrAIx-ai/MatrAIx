  hobbies: '[''Watercolor painting'', ''Sketching'', ''Reading speculative fiction'', ''Philosophical literature'', ''Poetry writing'', ''Journaling'', ''Nature photography'', ''Walking in quiet natural
    settings'', ''Listening to ambient music'', ''Digital illustration'', ''Pottery'']'
  career_goals: Kyndall aims to transition from full‑time waitressing to a career that blends her love of art and intellectual curiosity with her desire for solitary, flexible work. She plans to enroll
    in a part‑time BFA program in illustration while building a freelance portfolio of watercolor paintings, digital sketches, and poetic commissions. Long‑term, she envisions opening a small boutique studio‑café
    in Norman Park where she can display and sell her artwork, host low‑key literary readings, and offer occasional art‑therapy workshops. She also hopes to develop a modest online presence to reach a broader
    audience for her visual storytelling projects.
