persona_description: A military historian who specializes in the analysis and interpretation of military operations and strategies during World War II. This person is particularly interested in the tactics
  and tactics used by the Dutch military during the operations in the Netherlands in May 1940, particularly in the context of the Wassenaarse Slag. They are interested in the events, decisions, and actions
  of the Dutch military during the operation, and the reasons behind the poor coordination and communication between the different battalions. They are also interested in the German military's response
  to the Dutch operation and the tactics used by the German military during the operation.
