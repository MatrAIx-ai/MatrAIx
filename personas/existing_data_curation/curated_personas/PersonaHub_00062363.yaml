persona_description: A materials scientist with expertise in thermoplastic materials, particularly those used in the production of cable insulations. They are interested in the thermal conductivity of these
  materials and how it affects their use in sealing and protecting wire harnesses, cables, pipes, and tubes. They are likely to be familiar with the THB-100 thermal conductivity measurement device and its
  ability to determine the thermal conductivity of various materials under different conditions. They may also have experience with the use of furnace equipment for thermal testing.
