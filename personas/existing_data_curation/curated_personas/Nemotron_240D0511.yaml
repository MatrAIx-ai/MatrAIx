personas:
  professional: Lavonne Johnson is a 23‑year‑old ASE‑certified diesel specialist who couples meticulous engine diagnostics with a teacher’s knack for breaking down complex systems, building systematic service
    logs, and designing on‑the‑job curricula as they work toward leading a regional transit maintenance team and eventually shaping vocational programs.
  sports: Lavonne Johnson enjoys weekly hikes on Harriman State Park trails with the Hudson Valley Trailblazers club, follows the New York Mets for baseball and the New York Rangers for hockey, and occasionally
    joins a local recreational Ultimate Frisbee league to stay active, and they cherish the quiet after‑hour moments on the trail.
  arts: Lavonne Johnson channels their creativity through rugged landscape photography inspired by Ansel Adams and industrial shots echoing Edward Burtynsky, while they unwind to the folk‑rock melodies
    of Gillian Welch and the contemporary jazz of Kamasi Washington during workshop breaks.
  travel: Lavonne Johnson prefers solo, meticulously planned road trips in their vintage diesel van, having explored the historic towns of Hudson, the Finger Lakes wine region, and the coastal lighthouses
    of Maine, while they budget for fuel and occasional campsite stays for a balanced adventure‑relaxation mix.
  culinary: Lavonne Johnson excels at home‑cooking soulful dishes like gumbo with Andouille sausage, collard greens seasoned with smoked paprika, and jambalaya, often referencing their grandmother’s handwritten
    recipes while they experiment with fresh okra and a homemade roux, and they enjoy pairing meals with a cold Brooklyn Farmhouse Ale.
  core: Lavonne Johnson is a methodical diesel enthusiast who blends a love of precision engineering with quiet curiosity, channeling that into detailed model builds, solo hikes, and disciplined budgeting,
    while they occasionally binge‑watch automotive repair shows late into the night.
background:
  cultural: Lavonne grew up in a close‑knit African‑American family that values education, self‑reliance, and community service. Her mother, a former elementary school teacher, instilled a love of learning
    and a respect for structured instruction, while her father, an auto‑body shop owner, introduced her to hands‑on problem solving at an early age. Family gatherings often revolve around church, soulful
    music, and traditional dishes that celebrate their Southern roots, such as fried chicken, cornbread, and collard greens. She participates in local Juneteenth commemorations and mentors youth through
    the Rockland County Black Youth Initiative, reflecting a commitment to giving back to the community that supported her. While she embraces the broader multicultural fabric of Spring Valley, her personal
    identity is anchored in the resilience and shared history of African‑American culture, which informs both her work ethic and her desire to open pathways for other Black women in the trades.
attributes:
  skills: '[''Diesel engine diagnostics'', ''Preventive maintenance planning'', ''ASE Certified Diesel Specialist'', ''EPA emissions compliance'', ''Hydraulic system repair'', ''MIG/TIG welding'', ''Blueprint
    and schematic interpretation'', ''Technical instruction and curriculum design'', ''Workshop inventory management'', ''Diagnostic software (e.g., JPRO, Fleetmatics)'']'
  hobbies: '[''Restoring vintage diesel engines'', ''Scale model kit building'', ''Landscape and machinery photography'', ''Hiking in Harriman State Park'', ''Cooking soul‑food dishes'', ''Listening to
    jazz and R&B'', ''Volunteer tutoring in math and science'', ''Puzzle solving'']'
  career_goals: Lavonne aims to become a lead diesel technician and eventually a shop manager at a regional transit agency, where she can shape maintenance policies and mentor a larger team of mechanics.
    She plans to earn a Master’s degree in Adult Education so she can transition into a technical instructor role at a community college or vocational institute, creating programs that attract more underrepresented
    youth to the trades. In the long term, she envisions launching her own mobile diesel‑service business that offers on‑site repairs and training workshops for small fleet owners in Rockland County. Throughout
    her career trajectory, she seeks additional certifications—such as the Certified Master Diesel Technician (CMDT) and a certification in Lean Six Sigma—to blend efficiency with technical excellence.
