persona_description: A team of researchers from the National Institute for Nanotechnology and the University of Alberta who are working on a new type of electron microscopes tip made of tungsten, which
  is the sharpest man-made object ever recorded in the Guinness World Records. The team includes Dr. Robert Wolkow, Dr. Jason Pitters, and Dr. Mohamed Rezeq, who have worked on the fabrication method for
  the tip and are interested in commercializing the product.
