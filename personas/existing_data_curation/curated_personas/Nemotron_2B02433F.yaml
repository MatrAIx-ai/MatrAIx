personas:
  professional: Arlene Lee is an aspiring wildlife illustrator and junior equine care enthusiast who merges a curiosity for nature with a practical, hands‑on approach to sketching animals and learning horse
    handling, even though they sometimes leave their sketchbook and riding gear scattered around the house.
  sports: Arlene Lee cheers for the Dallas Cowboys, follows Austin FC and the San Antonio Spurs, and personally rides with the Hill Country Riders Club while hiking local trails as part of their fitness
    routine, preferring low‑key, flexible exercise over rigid training schedules.
  arts: Arlene Lee spends spare time sketching prairie dogs in a style inspired by Beatrix Potter, listens to country legends like Johnny Cash alongside pop icons such as Taylor Swift, and creates friendship
    bracelets while admiring visual artist Shaun Tan, letting these influences color their creative notebook.
  travel: Arlene Lee prefers spontaneous weekend road trips through the Texas Hill Country to spots like Enchanted Rock and Big Bend, dreams of backpacking through the cherry blossoms of Kyoto, and balances
    these adventures with family budget constraints that limit trips to a couple of out‑of‑state vacations each year.
  culinary: Arlene Lee enjoys baking chewy chocolate‑chip cookies with a pinch of sea salt, whipping up garden‑fresh salads featuring heirloom tomatoes and basil, and occasionally helping their family grill
    tacos al pastor using fresh pineapple and cumin, showing a budding skill in both sweet and savory kitchen experiments.
  core: Arlene Lee is a nature‑driven, sketch‑loving teen who balances horseback riding and garden‑to‑table baking with a laid‑back, sometimes disorganized lifestyle, always leaving a trail of doodles,
    fresh herbs, and the occasional forgotten homework.
background:
  cultural: Arlene was raised in Spring Branch, a small, close‑knit community in Blanco County, Texas. Her family has deep roots in the Texas Hill Country, with a tradition of ranching and farming that
    shapes daily life. Community events like county fairs, rodeos, and neighborhood barbecues are common, and she grew up with the sounds of country music and the scent of open prairies. While she shares
    the rural heritage of her region, Arlene also engages with broader American teenage culture through school, social media, and popular media, giving her a blend of local tradition and contemporary influences.
attributes:
  skills: '["basic computer literacy", "internet safety", "visual coding with Scratch", "digital illustration using Procreate", "graphic design basics with Canva", "animal care (horses, dogs, livestock)",
    "gardening and plant care", "basic cooking and meal preparation", "team collaboration and communication", "public speaking in school settings"]'
  hobbies: '["horseback riding", "hiking", "sketching wildlife", "reading young‑adult novels", "listening to country and pop music", "playing multiplayer video games", "volunteering at animal shelter",
    "gardening", "crafting friendship bracelets", "baking cookies"]'
  career_goals: Arlene dreams of a future where she can combine her love for animals, the natural world, and helping others. She hopes to study biology in college and become a veterinarian, ideally working
    with farm animals and wildlife in rural Texas. She is also interested in environmental conservation, envisioning a role in protecting the Hill Country's ecosystems. While she enjoys creative pursuits,
    she sees graphic design as a possible side career that could allow her to create educational materials for animal shelters or community programs. Her long‑term ambition is to make a positive impact
    on her community while staying connected to the outdoors.
