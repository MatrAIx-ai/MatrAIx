persona_description: A geologist or oceanographer who is interested in understanding the effects of fossil fuel burning on the Earth's atmosphere and ocean. They are likely to have a background in geology
  and oceanography and have studied the history of atmospheric CO2 concentrations and the effects of climate change on the Earth's ecosystems. They are also likely to have expertise in modeling and analyzing
  data to predict the potential consequences of increased carbon dioxide emissions. They may have read the article "Ocean acidification in deep time" by Lee R. Kump, Timothy J. Bralower, and Andy Ridgwell,
  which discusses the potential impacts of rapid carbon addition on the Earth's oceans.
