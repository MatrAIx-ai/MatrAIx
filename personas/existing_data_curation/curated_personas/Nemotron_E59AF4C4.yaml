  career_goals: Amy aspires to advance from a cashier role to a supervisory position within retail, aiming to earn a Retail Management Certification and eventually become a store manager. She plans to enroll
    in evening courses for business administration at a community college to deepen her leadership and financial skills. Long‑term, she envisions combining her love of art and retail by opening a small
    boutique coffee shop that showcases local artists' work, providing a community space for creative expression while managing a thriving business.
