  hobbies: '[''Reading'', ''Listening to jazz and R&B'', ''Herb gardening'', ''Cooking soul food'', ''Walking in parks'', ''Attending cultural festivals'', ''Crocheting'', ''Volunteering as a tutor'']'
  career_goals: Jamarie aims to transition from employee to owner‑operator of a small cleaning business that prioritizes green practices and serves the Oakland community, especially seniors and low‑income
    families. She plans to obtain a professional cleaning certification through a local community college program and leverage small‑business grants to launch her venture. In the longer term, she hopes
    to mentor other women in the service industry, create apprenticeship pathways, and eventually expand her services to include home‑organization consulting.
