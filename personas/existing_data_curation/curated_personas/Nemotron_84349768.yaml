personas:
  professional: Jamarie Stansberry, a seasoned residential cleaning specialist, combines a methodical, eco‑friendly approach with compassionate client relations, using deep‑cleaning expertise, systematic
    organization, and staff mentorship to elevate green cleaning standards in Oakland.
  sports: Jamarie Stansberry enjoys regular walks around Lake Merritt, occasionally joins the Oakland Women’s Running Club for 5K events, roots for the Oakland Athletics during baseball season, and relaxes
    with weekend yoga sessions at a nearby community studio.
  arts: Jamarie Stansberry finds inspiration in the smooth vocals of Erykah Badu and the trumpet mastery of Miles Davis, regularly attends jazz nights at Yoshi’s in Oakland, and channels that creative energy
    into crochet projects while supporting community art workshops.
  travel: Jamarie Stansberry prefers low‑impact road trips that blend nature and culture, having explored the redwoods of Northern California and the eco‑lodges of Portland, while eyeing future visits to
    Costa Rica’s Monteverde cloud forest and the vibrant markets of Marrakech for inspiration.
  culinary: Jamarie Stansberry, an adept home cook, blends traditional soul‑food classics like smoked collard greens, fried chicken, and sweet potato pie with fresh basil, thyme, and cilantro from their
    balcony garden, creating flavorful, health‑conscious meals for family gatherings.
  core: Jamarie Stansberry balances a green‑cleaning empire dream with a love for jazz, a habit of nightly personal‑development reading, and a stubborn tendency to over‑schedule, often squeezing a late‑night
    crocheting session into an already packed day.
background:
  cultural: Jamarie is an African‑American who grew up in the East Oakland neighborhood, a region rich in Black cultural heritage and activism. Her family traces its roots to the Great Migration, and she
    maintains strong ties to the local church, where she participates in choir and community outreach. She celebrates Juneteenth and other cultural milestones, keeping African‑American traditions alive
    through music, storytelling, and food. Her upbringing in a close‑knit Black community has instilled a deep sense of solidarity, which informs both her compassionate work ethic and her desire to uplift
    others in her neighborhood.
attributes:
  skills: '[''Residential cleaning'', ''Deep-cleaning techniques'', ''Eco-friendly cleaning methods'', ''Home organization'', ''Time management and scheduling'', ''Customer relationship management'', ''Team
