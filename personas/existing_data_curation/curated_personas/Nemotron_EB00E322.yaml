  hobbies: '[''Gardening (vegetables, herbs)'', ''Cooking traditional Pakistani and fusion dishes'', ''Reading historical biographies and South Asian literature'', ''Walking/hiking (Lafayette Reservoir
    trail)'', ''Playing chess'', ''Volunteering at Walnut Creek public library (event organization)'', ''Attending cultural festivals (Eid, Diwali, local arts)'', ''Learning digital photography'']'
  career_goals: As he approaches the later stage of his life, Ashmeed’s ambitions focus on personal fulfillment, family support, and community contribution rather than conventional career advancement. He
    intends to complete a bachelor’s degree in Business Administration at Contra Costa College, turning his earlier college studies into a completed credential. He aspires to expand his volunteer work by
    becoming a regular mentor at the youth mentorship program of the local community college, using his experience to guide first‑generation college aspirants. Maintaining health is a priority; he plans
    to incorporate regular walks along the Lafayette Reservoir trail and continue gardening to stay active. To manage his tendency toward worry, he is interested in learning mindfulness and stress‑reduction
    techniques through a senior‑center wellness program. Financially, he aims to solidify his retirement savings and assist his adult children with mortgage planning. Additionally, he hopes to develop a
    modest hobby‑turned‑skill in digital photography, documenting family moments and community events.
