  hobbies: '[''Painting and sketching'', ''Attending art fairs and gallery openings'', ''Reading science and history books'', ''Gardening'', ''Fishing'', ''Listening to gospel and jazz music'', ''Cooking
    Southern soul food'', ''Digital photography'', ''Genealogy research'']'
  career_goals: His primary ambition is to leave a lasting legacy of knowledge and cultural heritage for his family and community. He aims to document his life story and family genealogy, mentor local youth
    in STEM and the arts, volunteer at the community center, and create a small oral‑history archive for future generations. He also hopes to continue learning, especially in digital photography and emerging
    technologies, and to travel to regional art museums and historic sites.
