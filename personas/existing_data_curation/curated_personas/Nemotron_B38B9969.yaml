personas:
  professional: Mario Montes, a senior maintenance specialist in the heavy‑industry sector, they blend expert welding, hydraulic diagnostics, and Fusion 360 CAD modeling with an artist’s eye for texture,
    delivering cost‑effective retrofits while thriving in solitary, unstructured problem‑solving environments.
  sports: Mario Montes spends his weekends trekking quiet forest trails and rides with the Riverside Cycling Club; they also follow the NFL's Dallas Cowboys and MLB's Chicago Cubs for game‑day relaxation,
    preferring low‑key, self‑paced workouts over team sports.
  arts: Mario Montes curates his artistic world through industrial photography inspired by Edward Burtynsky; they listen to experimental jazz from Brian Eno and Aphex Twin while sculpting woodpieces reminiscent
    of Brâncuși, letting these influences inform their functional designs.
  travel: Mario Montes plans his travel like a maintenance schedule, booking in advance for industrial heritage tours of Germany’s Ruhr Valley and Sheffield’s old steelworks; they also leave room for spontaneous
    weekend getaways to Patagonia’s Andes when project deadlines allow.
  culinary: Mario Montes approaches cooking as hands‑on craftsmanship, perfecting family‑passed tamales, slow‑braised pork shoulder with ancho chilies, and a fragrant corn‑based soup; they relish the tactile
    feel of masa between their fingertips despite occasionally burning the edges of their wooden spoon.
  core: Mario Montes is a solitary, mechanically gifted artisan who mixes precise industrial expertise with a restless curiosity for art; they often lose track of deadlines while perfecting a new CAD‑driven
    retrofit or a fresh batch of handmade tamales.
background:
  cultural: Mario grew up in a bilingual household with parents who emigrated from Central America, preserving strong Hispanic traditions while adapting to life in Florida. Spanish is spoken at home, and
    family gatherings center around cooking dishes such as tamales, arroz con pollo, and empanadas, accompanied by lively salsa and bachata music. He celebrates cultural holidays like Día de los Muertos
    and Carnaval, valuing the storytelling and communal cooking that accompany them. While he enjoys these shared moments, his introverted nature leads him to find personal meaning in the quieter aspects
    of his heritage—such as the craftsmanship of handmade objects, the visual storytelling in murals, and the reflective rituals of holiday observances. This blend of cultural pride and solitary appreciation
    shapes his identity and informs his creative pursuits.
