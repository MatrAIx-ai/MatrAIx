  career_goals: Mario aims to transition from a line‑mechanic role to a senior maintenance specialist position where he can lead complex refractory equipment projects and mentor younger technicians. He
    is driven to integrate predictive‑maintenance technologies—such as IoT sensors and data analytics—into the plant’s workflow, reducing downtime and improving efficiency. Over the next five years, he
    hopes to obtain an advanced certification in industrial automation and eventually launch his own boutique consultancy that offers custom retrofitting and aesthetic enhancements for industrial machinery,
    blending performance with visual design. Throughout, he seeks roles that preserve his autonomy and allow him to experiment with unconventional solutions without heavy bureaucratic constraints.
