personas:
  professional: Laura Cox, a retired community organizer and budding local historian, leverages her hands‑on household expertise, garden stewardship, and empathy‑driven mediation to mentor volunteers at
    the library and help craft museum exhibits, balancing curiosity with pragmatic problem‑solving.
  sports: Laura Cox enjoys low‑impact walking in her garden, occasionally joins a senior softball league, and is an avid fan of the Liberty County Wildcats high school football team and the Atlanta Falcons
    NFL team, while keeping a casual fitness routine of gentle stretching and light yard work.
  arts: Laura Cox spends her afternoons listening to Dolly Parton and Johnny Cash on her tablet, attending the Liberty County Museum's rotating exhibits on regional history, and indulging in classic films
    like Casablanca, while occasionally knitting and humming folk tunes by Joan Baez.
  travel: Laura Cox prefers low‑key, family‑oriented trips, often traveling by car to nearby historic towns such as Savannah, Georgia, and Washington, D.C., while dreaming of a guided tour of the English
    countryside and a gentle cruise to the Caribbean, balancing limited mobility with a love of scenic drives.
  culinary: Laura Cox is a seasoned home cook who excels at preserving seasonal produce, turning garden tomatoes into fresh salsa, and preparing classic comfort dishes such as chicken and dumplings, peach
    cobbler, and cornbread with buttermilk, while favoring ingredients like sweet potatoes, collard greens, and freshly baked biscuits.
  core: Laura Cox is an 85‑year‑old garden‑loving storyteller who balances a love of old‑fashioned quilting and digital genealogy with a relaxed, slightly disorganized approach to life, sprinkling her days
    with country melodies, bridge games, and occasional over‑indulgence in sweet desserts.
background:
  cultural: Laura was raised in mid‑20th‑century small‑town Texas, steeped in Southern hospitality, strong family ties, and Methodist religious values. Her upbringing emphasized community involvement, self‑reliance,
    and respect for tradition, which she blends with a pragmatic curiosity toward new ideas and technologies. While she cherishes family recipes, local fairs, and church gatherings, she also embraces modern
    tools that help her stay connected with loved ones and preserve her community’s heritage.
