persona_description: A geologist who specializes in the study of plate tectonics and the movement of the Earth's crust. She is particularly interested in the discovery of new volcanic activity in Antarctica
  and the implications it has for our understanding of the Earth's history and processes. She is also interested in the role of glacial processes in generating low-frequency seismic events and the potential
  for volcanic eruptions to contribute to the formation of ash layers in ice.
