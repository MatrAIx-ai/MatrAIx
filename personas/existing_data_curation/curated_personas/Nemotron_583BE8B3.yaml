  hobbies: '[''Gardening'', ''Cooking traditional Vietnamese dishes'', ''Volunteering at senior center'', ''Practicing tai chi'', ''Reading historical novels'', ''Attending community cultural festivals'',
    ''Walking in nature'', ''Playing Mahjong'']'
  career_goals: Although no longer employed, Trinh remains driven by a desire to give back. Her foremost ambition is to establish a small, scholarship‑based fund that supports Vietnamese‑American high school
    students pursuing STEM studies. She also aims to expand her volunteer mentorship at the local senior center, creating workshops that teach basic digital literacy and simple health‑monitoring skills.
    By fostering intergenerational harmony and cultural exchange, she hopes to preserve her family's legacy while ensuring her grandchildren and community members have the resources and guidance to thrive.
