  hobbies: '[''Drawing nature scenes'', ''Building LEGO models'', ''Collecting rocks and pinecones'', ''Reading picture books about nature and dinosaurs'', ''Playing board games with clear rules'', ''Visiting
    Hot Springs National Park'', ''Participating in a small Sunday school group'']'
  career_goals: At six, Phillip’s biggest ambition is to become a park ranger or a wildlife caretaker, drawn by his love for the nearby Hot Springs National Park and his desire for a job with clear rules
    and routines. He also dreams of building things, so he imagines working as a construction worker or a LEGO designer when he’s older. His goals reflect his desire for structured, predictable work environments
    and his interest in protecting the natural world he enjoys exploring.
