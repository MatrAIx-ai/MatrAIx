  hobbies: '[''Hiking the Appalachian trails'', ''Fly fishing on the Monongahela River'', ''Reading science and technology non‑fiction'', ''DIY woodworking projects'', ''Homebrewing craft beer'', ''Volunteering
    at community events'', ''Playing acoustic guitar'', ''Board gaming with friends'', ''Attending bluegrass concerts'']'
  career_goals: Crit aims to become a regional sales manager within the next three years, leading a high‑performing team while championing the integration of predictive analytics into the sales process.
    Long‑term, he aspires to launch his own boutique insurance agency that emphasizes personalized risk solutions and leverages technology to streamline client onboarding and policy management.
