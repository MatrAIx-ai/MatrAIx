    kitchen demands'']'
  hobbies: '[''Baking pies & pastries'', ''Preserving fruits & making jams'', ''Community garden volunteering'', ''Senior center dance classes'', ''Bingo and board‑game nights'', ''Cooking show marathons'',
    ''Mystery novel reading'', ''Bowling with friends'']'
  career_goals: Approaching retirement, Laura aims to shift into a part‑time mentorship role at her current workplace, passing on her extensive knowledge to younger cooks. She also hopes to launch a modest
    home‑based catering service that specializes in Midwestern comfort foods for local church gatherings and senior‑center potlucks, providing a steady supplemental income while preserving her love of routine
    cooking. Additionally, she plans to stay socially active by leading occasional cooking workshops for community groups, ensuring she remains connected and valued in her neighborhood.
