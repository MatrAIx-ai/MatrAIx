  career_goals: Obioha dreams of pursuing a career in engineering or architecture, fields that combine his love for structure, building, and systematic problem‑solving. He hopes to join a high‑school STEM
    program, earn a scholarship, and eventually design functional, community‑focused projects that improve the built environment of his hometown and beyond.
