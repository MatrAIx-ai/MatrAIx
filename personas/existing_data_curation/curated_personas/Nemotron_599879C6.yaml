personas:
  professional: Obioha Duncan is an aspiring young engineer who channels a love for LEGO construction, Sudoku puzzles, and strategic video games into designing intricate models and dabbling in beginner-level
    coding, while their organized, reliable nature ensures meticulous project planning and their sensitivity to stress makes them double‑check every detail.
  sports: Obioha Duncan plays forward for the Riverview Rangers youth soccer club, follows a structured training schedule three times a week to satisfy their need for predictability, and avidly supports
    the Chicago Cubs (MLB) and Chicago Bears (NFL), cheering them during games while they keep a detailed log of personal stats and game outcomes.
  arts: Obioha Duncan contributes their clear tenor to the church youth choir, immerses themselves in the cinematic scores of Hans Zimmer and the futuristic novels of Isaac Asimov, and enjoys listening
    to the instrumental pop of Lindsey Stirling and the storytelling lyrics of Taylor Swift, finding that these artistic experiences nurture both their cooperative spirit and their solitary creative moments.
  travel: Obioha Duncan prefers meticulously planned family trips, having explored the Grand Canyon, the National Air and Space Museum in Washington, D.C., and a weekend getaway to Niagara Falls, while
    dreaming of a future adventure to Tokyo’s robotics museums and the historic streets of London, balancing a love for discovery with a cautious approach to unfamiliar environments.
  culinary: Obioha Duncan enjoys building simple meals like spaghetti Bolognese with ground beef and fresh basil, crafting pepperoni pizza topped with mozzarella and pineapple on weekend family nights,
    and occasionally baking chocolate chip cookies, though they often forget to clean up after cooking, relying on a structured kitchen checklist to stay organized.
  core: Obioha Duncan is an organized, puzzle‑loving 11‑year‑old whose methodical mindset and quiet kindness coexist with a tendency to over‑worry and a secret habit of late‑night LEGO building.
background:
  cultural: Obioha is an African‑American boy raised in Lebanon, Missouri. His family has lived in the Midwest for several generations, blending Southern Black cultural traditions—such as celebrating Juneteenth,
    attending a Baptist church, and sharing stories of resilience—with the close‑knit, rural community life of Camden County. Family gatherings often feature soulful music, barbecues, and an emphasis on
    education, hard work, and mutual support, shaping his values of harmony, responsibility, and community service.
