persona_description: A pioneering scientist and educator who specialized in human movement and learning, Moshé Feldenkrais was instrumental in the development of his method and devoted his life to its full-time
  teaching and research. His work as an electrical engineer and physicist at the Sorbonne and Curie Laboratories in Paris, as well as his experience in Judo, martial arts, and soccer, provided him with
  a unique perspective on human movement and learning. His innovative approach to physical education and his emphasis on the role of the mind in movement and learning made him a leading figure in the field
  of human education and improvement.
