personas:
  professional: Brian Miller is a veteran electrician with three decades of experience in residential, commercial, and industrial wiring, certified in solar photovoltaic installations and home automation,
    who mentors apprentices, is on track to earn a Master Electrician license, and they plan to launch a community‑focused contracting firm that offers apprenticeship opportunities.
  sports: Brian Miller spends weekends fishing on Lake Ray Roberts, participates in the local hunting club during deer season, cheers for the Dallas Cowboys and Texas Rangers, and they are a member of the
    town’s softball league that practices at the community park.
  arts: Brian Miller channels his love of music by playing drums in a casual community band that covers classics from The Rolling Stones to Johnny Cash, gathers at local Oktoberfest events to enjoy folk
    performances, and they collect vintage vinyl records of country and classic rock legends.
  travel: Brian Miller prefers spontaneous road trips that blend outdoor adventure and cultural stops, such as weekend camping near Lake Ray Roberts, wine‑tasting tours in Texas Hill Country, annual visits
    to Nashville’s country music festivals, and they keep a long‑standing dream of touring Munich’s Oktoberfest when finances permit.
  culinary: Brian Miller is a passionate grill master who specializes in Texas‑style barbecue, regularly smoking brisket, ribs, and mesquite‑flavored chicken, often pairing his meals with homemade kielbasa
    and chili con carne, and they occasionally forget to marinate due to their laid‑back approach to preparation.
  core: Brian Miller blends hands‑on practicality with a love for community, outdoor pursuits, and spontaneous creativity, and they navigate life with a hint of disorganization that fuels a flexible, go‑with‑the‑flow
    lifestyle.
background:
  cultural: Brian grew up in Muenster, a small town in north‑central Texas with deep German roots. His family has been in the region for generations, maintaining traditions like the annual Oktoberfest and
    a devotion to community cooperation. Though identified as white and raised in a modest, working‑class household, he credits the town’s blend of Texan independence and German precision for shaping his
    practical problem‑solving style. He’s fluent in the regional dialect, enjoys German‑style foods such as bratwurst and pretzels, and participates in the local church’s outreach programs. His cultural
    upbringing emphasizes self‑reliance, teamwork, and the joy of gathering with friends and family around food and music.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical systems'', ''Industrial troubleshooting'', ''Solar PV installation'', ''Home automation integration'', ''Electrical code compliance (NEC)'', ''Blueprint
