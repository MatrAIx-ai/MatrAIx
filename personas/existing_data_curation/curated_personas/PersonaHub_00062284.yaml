persona_description: An intercultural linguist who specializes in the study of communication style differences between three Anglo Englishes (English English, American English, and Australian English) and
  has a keen interest in understanding the impact of cultural scripts and communication style differences on intercultural miscommunication. This persona is likely to be interested in researching and teaching
  English across cultures, and has a strong background in linguistics, pragmatics, and cross-cultural communication. They are likely to be familiar with the techniques of contrastive ethnopragmatics and
  have a deep understanding of the cultural and linguistic structures involved in intercultural communication.
