personas:
  professional: Everett Posey is an aspiring graphic designer and photographer who leverages Adobe Photoshop and Illustrator to create polished visual assets for local events, and they apply their meticulous
    organization and high standards to ensure every community workshop runs smoothly while their curiosity drives constant experimentation with new design techniques.
  sports: Everett Posey follows the Kansas City Chiefs in the fall, attends St. Louis Cardinals games in the spring, and joins the Mississippi River Running Club for early‑morning jogs, while they occasionally
    swap a workout for a weekend woodworking session, reflecting a disciplined yet art‑focused fitness routine.
  arts: Everett Posey frequently studies the bold brushwork of Vincent van Gogh and the serene compositions of Georgia O'Keeffe, listens to the folk guitar of Nick Drake, and they let these artistic influences
    shape their own sketchbook experiments and community workshop themes.
  travel: Everett Posey prefers meticulously planned weekend trips that blend sketching sessions on the riverbanks of New Orleans with quiet evenings in a boutique B&B in Savannah, while they dream of a
    summer backpacking adventure across the Scottish Highlands to capture moody landscapes.
  culinary: Everett Posey enjoys cooking moderate‑skill meals like Mississippi River catfish po' boy and garlic‑herb pesto pasta, often seasoning dishes with fresh basil and smoked paprika, and they relish
    occasional visits to local diners for a steaming bowl of gumbo, balancing their love for bold flavors with a disciplined approach to budgeting ingredients.
  core: Everett Posey is a disciplined, curiosity‑driven 21‑year‑old who blends art and organization, yet they sometimes binge‑watch sci‑fi series late into the night, sacrificing sleep for the next day's
    sketching inspiration.
background:
  cultural: Everett is a white Midwestern American raised in Fort Madison, Iowa, a small town on the banks of the Mississippi River. The community’s agricultural heritage and close‑knit social fabric instilled
    values of modesty, hard work, and neighborly cooperation. Growing up, he was exposed to local traditions such as river festivals, county fairs, and historic preservation efforts, which nurtured his
    appreciation for regional history and the arts. While his family emphasized education and self‑reliance, Everett’s path diverged after high school, leading him to pursue independent learning and community
    involvement. His cultural upbringing blends a pragmatic, self‑sufficient mindset with an openness to diverse artistic influences, reflecting both the grounded nature of the Midwest and his own curiosity‑driven
    outlook.
attributes:
  skills: '["Digital illustration", "Graphic design (Adobe Photoshop, Illustrator)", "Photography (studio and nature)", "Basic woodworking", "Event planning and coordination", "Organizational systems development",
