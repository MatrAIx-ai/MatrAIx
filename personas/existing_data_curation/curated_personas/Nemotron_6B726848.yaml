  hobbies: '["Sketching and painting", "Visiting local galleries and museums", "Nature photography (river, birds, landscapes)", "Reading art history, philosophy, and science fiction", "Playing acoustic
    guitar", "DIY woodworking projects", "Volunteer event coordination at community center"]'
  career_goals: Everett aims to earn his GED within the next year and then enroll in a community college program focused on graphic design or visual arts. He aspires to secure an apprenticeship or internship
    at a local art studio or museum, where he can apply his design and photography skills in a professional setting. Long‑term, he envisions working as a freelance graphic designer and illustrator, possibly
    launching a small business that sells prints, custom artwork, and handcrafted wooden décor. He also hopes to contribute to Fort Madison’s cultural scene by organizing community art workshops and exhibitions,
    fostering greater access to the arts for his neighbors.
