  hobbies: '[''Bridge club'', ''Community gardening'', ''Hiking in Lancaster County'', ''Historical society involvement'', ''Live music events'', ''Fitness classes (e.g., Zumba)'', ''Reading mystery novels'']'
  career_goals: Valentina aims to advance to a supervisory role within the dispatch center, such as Shift Supervisor or Training Coordinator, where she can shape operational standards and mentor a larger
    team. She plans to obtain certifications in the Incident Command System (ICS) and Emergency Management to broaden her expertise. Long‑term, she envisions moving into a municipal emergency management
    position, overseeing community preparedness programs and leading public safety initiatives for Lancaster County.
