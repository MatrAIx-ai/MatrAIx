  hobbies: '[''Gardening'', ''Cooking traditional Vietnamese dishes'', ''Reading historical and diaspora literature'', ''Attending community festivals and farmers’ markets'', ''Yoga and mindfulness meditation'',
    ''Journaling'', ''Photography'']'
  career_goals: Nhan aims to transition from a teaching assistant role to an adjunct lecturer position within the next three years, ideally teaching courses that explore Southeast Asian history and literature.
    She plans to pursue a master's in education to deepen her pedagogical expertise and to gain credentials for higher‑level instruction. Her long‑term ambition is to develop a community‑based humanities
    program that connects local high‑school students with university resources, fostering cultural awareness and critical thinking. She also hopes to design workshops on stress‑management and resilience
    for both students and faculty, reflecting her personal experience with anxiety and her desire to create supportive learning environments.
