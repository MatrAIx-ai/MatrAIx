  career_goals: Denise aims to achieve Journeyman Pipefitter certification within the next year and pursue Master Pipefitter credentials shortly thereafter. She envisions progressing to a foreman role,
    leading multi‑disciplinary crews on large commercial and industrial projects throughout the Detroit metropolitan area. Long‑term, she plans to specialize in sustainable and green building practices—such
    as low‑temperature HVAC and energy‑efficient steam systems—while obtaining LEED and advanced welding certifications. Ultimately, Denise aspires to launch her own plumbing and pipefitting contracting
    firm, creating apprenticeship opportunities for women and underrepresented groups in the trades.
