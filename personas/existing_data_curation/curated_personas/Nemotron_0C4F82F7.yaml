  hobbies: '[''co‑ed soccer league'', ''kayaking on Lake St. Clair'', ''hiking the Huron River Trail'', ''DIY automotive repairs'', ''cooking Mediterranean cuisine'', ''volunteering with Habitat for Humanity'',
