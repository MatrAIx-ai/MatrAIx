  career_goals: Michael aims to solidify his technical credentials by earning a GED and enrolling in an associate's program in Manufacturing Technology at a local community college. He plans to acquire
    National Institute for Metalworking Skills (NIMS) certification in Grinding and Polishing, followed by CNC Programming certification, positioning himself for a transition from operator to programmer
    or tool‑maker. Long‑term, he dreams of opening a boutique metal‑art studio where he can blend his machining expertise with his love for contemporary art, producing custom sculptures and functional art
    pieces for local galleries and surf‑culture markets. He also hopes to mentor other young workers from his community, sharing his hands‑on knowledge while championing a culture of continuous learning
    and healthy competition.
