  career_goals: Misty's career aim is to leverage her experience into a supervisory or specialist role that still respects her desire for routine and limited administrative burden. She hopes to become a
    shift lead or safety coordinator within the next two years, overseeing a small team and ensuring compliance with occupational health standards. Long‑term, she plans to transition to a less physically
    demanding position such as inventory control or quality assurance, allowing her to retire comfortably while still contributing to the workplace harmony she values. She also aspires to save enough to
    eventually cultivate a community garden and offer informal workshops on basic horticulture to neighbors.
