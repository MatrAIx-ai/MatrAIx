personas:
  professional: Misty Uppal is a seasoned helper production worker in a Fraser manufacturing facility, whose calm demeanor and love of routine make them a reliable line operator and trainer, and who now
    seeks a shift‑lead or safety coordinator role to blend their practical expertise with a modest supervisory responsibility.
  sports: Misty Uppal enjoys low‑impact fitness like gentle hikes on the Rockies and is a loyal fan of the Colorado Avalanche and Denver Broncos, while occasionally joining a local walking club that meets
    at the community center and supporting the Fraser High School softball team as a volunteer scorekeeper.
  arts: Misty Uppal finds creative fulfillment in knitting scarves and blankets while listening to John Denver and the folk duo The Avett Brothers, and they regularly attend the Grand County Arts Festival
    to admire works by regional painters such as local muralist Sarah Finch, and they quietly relish reading historical fiction by Philippa Gregory.
  travel: Misty Uppal prefers relaxed road trips to nearby natural gems like Yellowstone and Sedona, often camping in modest cabins, while dreaming of a future cultural visit to the Taj Mahal to connect
    with family roots, yet they keep travel plans modest due to budget constraints and a love for familiar, low‑stress itineraries.
  culinary: Misty Uppal delights in cooking comforting dishes like Colorado trout with roasted root vegetables, simple chicken pot pie, and the occasional family‑passed butter chicken served with homemade
    naan, blending rugged western flavors with subtle South Asian spices while using fresh herbs from their garden.
  core: Misty Uppal is a routine‑loving, steady‑handed production veteran who quietly knits, gardens, and day‑dreams of a community garden workshop, yet sometimes they let paperwork slip and prefer solitary,
    low‑key hobbies over bustling crowds.
background:
  cultural: Misty grew up in a predominantly white, middle‑class community in Grand County, Colorado. Her upbringing was steeped in the practical, outdoors‑oriented culture of the American West, emphasizing
    self‑reliance, respect for nature, and straightforward communication. Although her surname, Uppal, reflects Indian heritage in her family lineage, she was raised largely within the local white cultural
    milieu, celebrating typical Colorado traditions such as county fairs and summer festivals. Occasionally, family gatherings featured Indian culinary dishes, giving her a modest awareness of South Asian
    customs while her primary cultural identity aligns with the rural Colorado lifestyle.
