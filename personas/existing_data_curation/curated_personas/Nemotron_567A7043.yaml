  career_goals: Although retired from formal employment, Jose aims to remain active by volunteering at the local senior center, where he can share his practical skills and life experience. He hopes to lead
    workshops on traditional Mexican cooking and DIY home maintenance for younger residents, fostering intergenerational learning. Additionally, he aspires to mentor high‑school students interested in trades,
    helping them explore apprenticeship pathways. His long‑term ambition is to contribute to the preservation of Mexican cultural heritage in Antelope through community festivals and oral‑history projects.
