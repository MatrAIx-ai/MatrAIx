personas:
  professional: Jose Delgado, a retired handyman and community volunteer, leverages his bilingual fluency, carpentry and gardening skills, and knack for organizing neighborhood events to teach DIY home
    maintenance and traditional family cooking at the local senior center, while informally translating for older residents.
  sports: Jose Delgado stays active by joining the neighborhood senior walking club for early morning nature trail strolls, cheering on the Sacramento Kings during basketball season and supporting Sacramento
    Republic FC’s matches, while occasionally playing casual pickup soccer with friends at the local park.
  arts: Jose Delgado finds artistic fulfillment by playing acoustic guitar to the tunes of John Mayer and classic salsa hits by Celia Cruz, attending community theater productions featuring actors like
    Edward James Olmos, and admiring local folk art such as handcrafted Talavera tiles during cultural festivals.
  travel: Jose Delgado prefers low‑key, well‑planned road trips with his wife and a small group of friends, often exploring nearby gems like Lake Tahoe and the historic town of Santa Fe, while harboring
    a dream to wander the cobblestone streets of Barcelona and the cultural plazas of Seville.
  culinary: Jose Delgado, an enthusiastic home chef, regularly prepares family‑favored mole with dark chocolate, roasted chiles, and a blend of spices, hand‑rolled tamales stuffed with pork and masa, and
    fresh garden salads featuring heirloom tomatoes and cilantro, while delighting friends with his generous hospitality and occasional indulgence in churros with cinnamon sugar.
  core: Energetic, community‑centric, and a little delightfully disorganized, Jose Delgado blends a love for hands‑on projects, lively salsa nights, and generous home‑cooked feasts with a habit of misplacing
    his gardening gloves and forgetting to pay his utility bills on time.
background:
  cultural: Jose was raised in a Mexican‑American household in California, with deep ties to both his parents' Mexican roots and the broader Sacramento County community. He grew up bilingual, celebrating
    traditions such as Día de los Muertos, quinceañeras, and Sunday Mass, while also embracing American customs. His family places a strong emphasis on respect for elders, communal support, and the sharing
    of food and stories. This bicultural upbringing informs his values of hospitality, cooperation, and a pragmatic respect for both old and new ways of doing things.
