personas:
  professional: Carolyn Knighton, a 64‑year‑old molecular and cellular biologist at the University of South Carolina, leverages CRISPR‑Cas9 gene editing, high‑throughput cell assays, and advanced microscopy
    while weaving artistic visualizations into her research; despite a relaxed attitude toward rigid schedules, they channel boundless curiosity and collaborative spirit into mentoring under‑represented
    scholars and curating interdisciplinary exhibitions.
  sports: Carolyn Knighton, an avid birdwatcher and yoga enthusiast, spends crisp mornings strolling through Paris Mountain State Park cataloguing feathered species, cheers on the Charleston Battery soccer
    team and the Atlanta Braves with casual fandom, and joins a local senior walking club to stay fit without the pressure of competitive sport.
  arts: Carolyn Knighton paints acrylic canvases that echo confocal microscopy images while listening to Miles Davis and Thelonious Monk, immerses herself in speculative fiction by Ursula K. Le Guin and
    poetry by Sylvia Plath, and shares original verses at the community center’s poetry‑reading circle, weaving science and art into every creative pursuit.
  travel: Carolyn Knighton prefers thoughtfully planned, culturally rich getaways, from weekend explorations of Charleston’s historic district and the Blue Ridge Parkway’s vistas to year‑long dreams of
    revisiting Paris for its science‑art exhibitions and wandering Kyoto’s gardens, traveling with modest budgets that balance guided tours and spontaneous bird‑watching stops.
  culinary: Carolyn Knighton, a proficient home cook, delights in whipping up shrimp and grits topped with fresh heirloom tomatoes and basil, simmering collard greens seasoned with smoked turkey, and brewing
    lavender‑honey tea from garden‑grown herbs, often sprinkling edible wildflower petals to garnish dishes that celebrate seasonal Southern flavors.
  core: Carolyn Knighton, a curious 64‑year‑old molecular biologist, blends scientific rigor with acrylic brushstrokes, morning birdwatching, and community mentorship, all while navigating anxiety and a
    delightfully disorganized, flexible lifestyle.
background:
  cultural: Carolyn grew up in the African‑American community of Greenville County during the civil‑rights era, a context that forged her resilience and appreciation for collective storytelling. Her family
    maintains traditions rooted in Southern Black culture, including gospel music, soulful cooking, and oral history. She identifies strongly with the legacy of Black scientists who broke barriers, which
    fuels her advocacy for diversity in STEM. The Gullah‑influenced culinary practices of her grandmother, the church choir rehearsals she attended, and the neighborhood’s festivals celebrating African
    diasporic heritage have all left an imprint on her worldview. This cultural tapestry informs her interdisciplinary approach, prompting her to weave narratives that honor both scientific rigor and the
    aesthetic expressions of her community. She often incorporates elements of African‑American art, such as quilt patterns and jazz rhythm, into her scientific presentations and public outreach.
