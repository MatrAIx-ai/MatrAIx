  skills: '[''Molecular genetics'', ''CRISPR-Cas9 gene editing'', ''Cell culture & tissue engineering'', ''Advanced microscopy (confocal & electron)'', ''Flow cytometry'', ''Bioinformatics (R, Python)'',
