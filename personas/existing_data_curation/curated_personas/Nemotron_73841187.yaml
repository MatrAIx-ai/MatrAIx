  hobbies: '[''Visiting art galleries and museums'', ''Acrylic painting inspired by microscopy'', ''Birdwatching in local parks'', ''Native plant and heirloom gardening'', ''Reading speculative fiction
    and poetry'', ''Attending jazz concerts'', ''Poetry‑reading circle participation'', ''Yoga and mindfulness meditation'', ''Volunteering for youth STEM outreach with art integration'']'
  career_goals: Carolyn aims to leave a lasting interdisciplinary legacy before transitioning to emeritus status. Over the next five years she plans to establish a joint Science‑and‑Arts fellowship at the
    University of South Carolina that supports under‑represented graduate students to explore creative research pathways. She also hopes to author a book that weaves personal narratives of her scientific
    journey with reflections on African‑American artistic traditions, and to curate a traveling exhibit that visualizes recent discoveries in developmental biology through mixed‑media art. Mentorship remains
    central; she strives to mentor at least twenty emerging scientists from historically Black colleges, guiding them through grant acquisition and publication. Additionally, she seeks to secure funding
    for a community garden‑lab that engages local schoolchildren in hands‑on biology while celebrating the region’s cultural heritage.
