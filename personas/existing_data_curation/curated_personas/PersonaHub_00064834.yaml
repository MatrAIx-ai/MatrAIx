persona_description: Dr. Blaine Gracious is a psychiatrist and researcher who specializes in the treatment of mood disorders in adolescents. He has conducted several studies on the use of lithium and other
  medications in treating bipolar disorder, as well as the effects of valproate on reproductive endocrine changes in women. He has also studied the use of antipsychotics in treating ADHD in children and
  adolescents. His work has been published in peer-reviewed journals and he is an expert in the field of pediatric psychiatry.
