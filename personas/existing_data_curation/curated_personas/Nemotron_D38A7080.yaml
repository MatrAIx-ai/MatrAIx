  career_goals: He aims to turn his artistic and technical interests into a flexible, independent career. Arlington’s primary ambition is to become a freelance digital artist and indie game developer, creating
    immersive experiences that challenge conventional narratives. He plans to build an online portfolio, take self‑paced college courses in game design and visual arts, and eventually secure freelance contracts
    or launch his own small studio. He also envisions a side venture as a content creator, producing tutorials and commentary on art, game design, and strategy gaming, while maintaining the freedom to work
    remotely and set his own schedule.
