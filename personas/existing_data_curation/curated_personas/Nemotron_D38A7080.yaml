personas:
  professional: Arlington Starr is an aspiring freelance digital artist and indie game developer who blends self‑taught Python scripting, 3D modeling in Blender, and a love for experimental visuals into
    prototypes that challenge conventional narratives, while their competitive edge from strategy games drives a relentless push for innovative mechanics and immersive storytelling.
  sports: Arlington Starr is a solitary hiker who joins the Chester County Trail Club for weekend treks through the rolling farmland, follows the Philadelphia Eagles and the Philadelphia 76ers for their
    competitive spirit, and occasionally plays pickup basketball at the local high school gym during the spring, balancing a love for natural landscapes with a sporadic interest in team sports.
  arts: Arlington Starr is a digital art enthusiast who spends evenings sketching surreal landscapes inspired by James Turrell’s light installations, curates a small Instagram feed featuring their Blender
    renders, and draws inspiration from experimental musicians like Aphex Twin and Flying Lotus, while attending the annual Pennsylvania Folk Art Fair to mingle with local craftspeople.
  travel: Arlington Starr is an adventure‑curious teen who prefers spontaneous, budget‑friendly road trips to nearby historic towns such as Gettysburg and Lancaster, dreams of exploring Kyoto’s traditional
    tea houses for their ink‑wash aesthetics, and returns home refreshed after a weekend photo‑walk through Philadelphia’s Mural Arts program, always keeping a sketchbook ready for impromptu inspiration.
  culinary: Arlington Starr is a moderate‑level home cook who loves crafting farm‑to‑table meals like roasted beet salad with goat cheese, perfecting a flaky peach cobbler using heirloom fruit from a neighbor’s
    orchard, and indulging in a classic Philadelphia cheesesteak with provolone, while often ordering take‑out ramen when local food‑prep feels too time‑consuming.
  core: Arlington Starr channels a quiet, self‑reliant curiosity into digital art and indie game design, balancing a competitive streak with a laid‑back, sometimes disorganized lifestyle that values creative
    freedom above all.
background:
  cultural: Arlington is a white American from Elverson, a small town in Chester County, Pennsylvania. He grew up in a mixed rural‑suburban setting where family ties, community gatherings at local farms,
    and county fairs are common. The region’s proximity to Philadelphia provides occasional exposure to broader cultural events, such as museum exhibitions and indie music scenes, shaping his appreciation
    for art and unconventional ideas. His upbringing emphasizes self‑reliance, a pragmatic work ethic, and an appreciation for craftsmanship, while also valuing the quiet, solitary aspects of the countryside
    that align with his personality.
