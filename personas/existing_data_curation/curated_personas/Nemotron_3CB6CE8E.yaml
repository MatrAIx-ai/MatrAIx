personas:
  professional: Sabina Rodriguez, a 2‑year‑old with boundless curiosity, already plays pretend architect by stacking blocks into intricate towers, showcasing early spatial reasoning, creative problem‑solving,
    and a relaxed, flexible approach that hints at a future in design or engineering, and they often re‑arrange the structures when bored.
  sports: Sabina Rodriguez, a 2‑year‑old, bursts with energy at the local Tiny Tots Playgroup Soccer Club, chasing a soft foam ball while cheering for Manchester United FC on family TV, loves splashing
    in the kiddie pool during summer swim lessons, and they proudly display a tiny team jersey after each game.
  arts: Sabina Rodriguez, a 2‑year‑old, delights in painting with finger‑smeared watercolors, humming along to Raffi’s “Baby Beluga,” giggling at Sesame Street’s Elmo, and watching Disney’s Mickey Mouse
    cartoons, all of which feed their vivid imagination and love for bright, abstract visuals, and they often request a new crayon color after finishing a masterpiece.
  travel: Sabina Rodriguez, a 2‑year‑old, has explored the sandy shores of San Diego Beach and the colorful rides of Disney World in Orlando with family, dreams of toddling through Paris’s Louvre courtyard
    someday, prefers short, sensory‑rich trips over long tours, and they can’t wait to feel the tickle of sea foam again on their tiny toes.
  culinary: Sabina Rodriguez, a 2‑year‑old, favors chunky macaroni and cheese made with sharp cheddar, soft banana slices, and occasional avocado mash, often dumping the occasional peas on the plate, delights
    in the sweet aroma of fresh strawberry purée, and they stubbornly refuse broccoli regardless of how it’s dressed.
  core: Sabina Rodriguez, a 2‑year‑old imagination engine, mixes fearless curiosity with a blissful disregard for routine, turning every coin, crayon, and splash into a miniature adventure while occasionally
    scattering toys in organized chaos, and they giggle at the sound of rain on the patio.
background:
  cultural: Sabina is raised in a Mexican-American household in Mercedes, Texas, where Spanish and English are spoken interchangeably. Her family celebrates Mexican traditions such as Día de los Muertos,
    Christmas Posadas, and local festivals, filling her world with bright colors, lively music, and communal gatherings. The aroma of homemade tacos, tamales, and sweet churros is a constant backdrop, and
    she participates in family cooking and storytelling sessions that emphasize cultural heritage. Community events in Hidalgo County, such as parades and folkloric dance performances, provide her with
    a strong sense of identity and a deep appreciation for her cultural roots.
