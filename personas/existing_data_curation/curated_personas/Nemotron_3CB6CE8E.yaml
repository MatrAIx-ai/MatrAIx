  career_goals: Although she is only two, Sabina often talks about wanting to create beautiful things and help other children. She expresses a budding desire to become a teacher who can share stories and
    art, and she imagines herself as an artist who paints bright pictures. As she grows, she hopes to learn to read and write, explore new ideas, and someday use her imagination to inspire others.
