  hobbies: '[''Early Morning Beach Walks'', ''Snorkeling'', ''Reading Mystery Novels'', ''Journaling'', ''Photography'', ''Cooking Vietnamese Cuisine'', ''Tai Chi'', ''Model Kit Building'', ''Listening
    to Traditional Music'']'
  career_goals: Toan aims to advance to an Operations Supervisor role within the resort, eventually becoming a Facility Manager responsible for multiple entertainment venues. He plans to earn an associate’s
    degree in Hospitality Management and obtain certification in Disaster Preparedness and Safety Management. His long‑term ambition includes designing a quiet‑focus retreat program that blends Hawaiian
    natural settings with Vietnamese cultural elements, offering guests a meditative escape while leveraging his organizational strengths and compassionate service philosophy.
