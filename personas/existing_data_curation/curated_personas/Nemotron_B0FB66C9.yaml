  hobbies: '[''Reading historical non-fiction'', ''Street photography'', ''Exploring local museums and historic sites'', ''Writing a personal blog about bus experiences'', ''Listening to podcasts on urban
    planning and philosophy'', ''Volunteering at the local library'', ''Practicing mindfulness and yoga'', ''Hiking and fishing at Virginia Beach'', ''Playing strategy video games'']'
  career_goals: William aims to move from a front‑line driver role to a senior supervisory position within the Virginia Beach transit authority, eventually becoming a trainer for new drivers and a safety
    coordinator. He is exploring a part‑time master’s program in Urban Planning or Public Administration to combine his interest in community development with transit operations. Long‑term, he hopes to
    design and lead a “heritage route” that showcases the city’s historic sites, merging his love for local history with his professional expertise. Additionally, he seeks to develop strategies that support
    mental‑health resilience for transit staff, drawing on his own experiences with anxiety.
