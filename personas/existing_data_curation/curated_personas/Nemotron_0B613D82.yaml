  career_goals: As she continues her career, Ashley aims to become a senior interpreter specializing in educational policy and multilingual curriculum development for governmental and non‑profit organizations.
    She plans to earn a master’s degree in Applied Linguistics or TESOL to deepen her theoretical foundation. In the next five years she hopes to lead a multilingual learning platform that provides culturally
    responsive resources for K‑12 schools in New Jersey and beyond. Additionally, she envisions founding a boutique translation consultancy that partners with local school districts to adapt curricula for
    English language learners, integrating her artistic sensibility to produce engaging visual content. Her long‑term ambition is to influence language‑access policy and promote equity in education through
    her expertise.
