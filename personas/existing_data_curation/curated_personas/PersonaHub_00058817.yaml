persona_description: A journalist who specializes in investigating social issues related to migration and displacement, particularly in the context of the Indian tea industry. She is interested in exploring
  the narratives of aspiration and desperation among women workers in the Dooars tea plantations and how they are shaped by their migration experiences. She is also interested in understanding the migration
  strategies of women workers and how they differ across their life stages.
