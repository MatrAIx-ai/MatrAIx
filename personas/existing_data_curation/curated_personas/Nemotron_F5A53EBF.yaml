  career_goals: Herminia aims to progress from her current cashier role into a supervisory or store‑manager position within the next three to five years. She plans to enroll in a part‑time business management
    course to strengthen her leadership and operational skills, positioning herself competitively for promotion. Ultimately, she envisions using her retail experience to open a small neighborhood convenience
    store that blends efficient service with a curated selection of Mexican food staples, leveraging her cultural background and practical mindset.
