persona_description: A scientist who specializes in the study of sea anemones and their behavior, particularly in the context of deep-sea ecosystems. She is an assistant professor at Ohio State University
  and runs one of the few laboratories in the world equipped to study sea anemones. Her research interests include the evolutionary history of sea anemones, their role in deep-sea ecosystems, and their
  interactions with other marine organisms. She has conducted research on the distribution and behavior of sea anemones in deep-sea environments, particularly in Monterey Canyon. Her work has been published
  in the Journal of Natural History.
