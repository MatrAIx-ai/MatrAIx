  hobbies: '[''Sketching'', ''Watercolor Painting'', ''Reading Science‑Fiction & Philosophy'', ''Playing Acoustic Guitar'', ''Writing Short Stories'', ''Chess'', ''Puzzle Solving'', ''Hiking'', ''Bird‑watching'',
