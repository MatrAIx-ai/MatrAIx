  career_goals: He aims to advance within the department, attaining the rank of detective within the next five years with a focus on investigative work and forensic analysis. Joseph plans to pursue an associate
    degree in criminal justice followed by a bachelor's in forensic science, positioning himself for specialized units such as homicide or cybercrime. Long‑term, he hopes to develop a community outreach
    program that blends his artistic interests with public education on safety and conflict resolution, and eventually mentor new officers as a senior leader.
