personas:
  professional: An interior and exterior painter and paperhanger, Sandra Previtera combines meticulous surface preparation and precise color‑matching expertise with a spontaneous flair for specialty finishes,
    yet they often battle deadline anxiety despite a strong preference for routine, and they communicate clearly with clients while worrying about timelines.
  sports: An avid early‑morning jogger and yoga enthusiast, Sandra Previtera trails the Clayton County Pathway, supports the Atlanta Falcons, Atlanta Hawks, and Atlanta United FC, and participates in the
    local community center’s recreational tennis league during summer, preferring low‑impact activities to protect their back while they stay fit.
  arts: An accomplished watercolorist and craft‑fair aficionado, Sandra Previtera finds inspiration in Winslow Homer and contemporary watercolorist Alvaro Castagnet, spins classic rock vinyl by Led Zeppelin
    and Pink Floyd while sketching natural park scenes, and unwinds with mystery novels by Agatha Christie, all of which nurture their detail‑oriented yet tranquil creative spirit, and they often incorporate
    these influences into home décor projects.
  travel: A solo‑travel enthusiast, Sandra Previtera prefers meticulously planned weekend getaways to nearby gems such as the Blue Ridge Mountains, Savannah, and Asheville, while dreaming of an art‑focused
    pilgrimage to Florence, Italy, balancing modest travel budgets with the need to save for their upcoming painting‑business certification, and they often sketch travel scenes in watercolor during trips.
  culinary: A modest home chef, Sandra Previtera enjoys preparing herb‑infused roasted chicken with rosemary and thyme, fresh quinoa salads tossed with cherry tomatoes, feta, and garden‑grown basil, and
    experimenting with homemade pesto, while occasionally treating themselves to artisanal cheese plates discovered at craft fairs, and they frequently pair meals with a steaming cup of black coffee.
  core: Sandra Previtera is a diligent painter with a creative soul, quietly battling anxiety while balancing routine work, solitary artistic pursuits, and a budding ambition to launch a reliable, high‑quality
    painting business, and they approach each day with meticulous care.
background:
  cultural: Sandra grew up in a middle‑class white family in the suburban outskirts of Atlanta, with deep Southern roots traced to German and Irish ancestors. Raised in a modest, tradition‑oriented household,
    she attended a local church, participated in community picnics, and learned the value of practicality and hard work from her parents. The local culture of hospitality, Southern cuisine, and a strong
    sense of neighborhood camaraderie shaped her collaborative yet self‑reliant attitude, and she continues to honor these traditions through her work ethic and everyday rituals.
attributes:
  skills: '["Interior wall painting", "Exterior surface painting", "Wallpaper and paper hanging", "Surface preparation and sanding", "Color mixing and matching", "Use of hand and power tools", "Scaffolding
    assembly and safety compliance", "Customer communication", "Basic project estimation", "Attention to detail"]'
  hobbies: '["Watercolor painting", "Sketching", "Gardening", "Crocheting", "Reading mystery novels", "Listening to classic rock", "Attending craft fairs", "Morning coffee walks"]'
  career_goals: Sandra aims to become a certified journeyman painter within the next two years, gaining formal OSHA and lead‑safe work certifications. Long‑term, she hopes to launch a small, reliable painting
    and paperhanging business that serves residential clients in Clayton County, emphasizing punctual service and high‑quality workmanship. She envisions hiring a tight‑knit crew of trusted workers, offering
    both routine maintenance contracts and occasional custom decorative projects, while pursuing evening classes in small‑business management to confidently handle the administrative side of her venture.
