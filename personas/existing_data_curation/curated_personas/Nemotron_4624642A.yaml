  hobbies: '["Landscape photography", "Cascades hiking", "Digital painting (botanical themes)", "Mindfulness meditation", "Yoga", "Journaling and sketching", "Local design meetups", "Youth art mentorship
    volunteering", "DIY electronics kits", "Reading sci‑fi and design literature"]'
  career_goals: Shari’s immediate goal is to secure a senior visual designer position where she can lead design projects with clear processes and supportive team dynamics. She aspires to become an art director
    within five years, overseeing multidisciplinary teams, mentoring junior designers, and shaping brand strategies that balance aesthetic quality with user-centered functionality. Long-term, she dreams
    of launching a boutique consultancy that provides design services for mental‑health and wellness organizations, allowing her to apply her creative expertise to causes aligned with her personal experience
    of anxiety and emotional distress. Continuous learning is important to her, so she plans to obtain advanced certifications in UX research and data visualization.
