personas:
  professional: Shari Norris, a senior visual designer with eight years of graphic design experience, leverages her STEM background and mastery of Adobe Creative Suite, Figma, and Sketch to produce data-driven
    visual narratives, thriving in structured agile environments where her practical, reliability‑driven nature shines.
  sports: Shari Norris enjoys hiking the Cascades with the local Cascades Hiking Club, follows the Seattle Seahawks and Seattle Sounders FC religiously, and practices yoga and weekend trail runs, balancing
    her love of nature with a structured fitness schedule that includes a seasonal cross‑country skiing stint in winter.
  arts: Shari Norris finds creative solace in landscape photography inspired by Ansel Adams and digital paintings echoing the style of contemporary botanical artist Katie Daisy, regularly attends design
    meetups where she discusses the work of graphic storytelling pioneer Saul Bass and the ambient soundscapes of composer Ólafur Arnalds, melding visual and auditory influences into her artistic identity.
  travel: Shari Norris prefers curated, nature‑centric trips, having recently explored the alpine meadows of Banff National Park and the historic tea houses of Kyoto, while planning a future solo hike along
    the Camino de Santiago that aligns with her desire for reflective solitude.
  culinary: Shari Norris enjoys preparing simple, health‑focused meals like quinoa bowls with roasted kale, beetroot, and feta, often seasoning with fresh herbs such as basil and cilantro, but admits to
    an occasional habit of late‑night snacking on chocolate chip cookies while binge‑reading sci‑fi novels, revealing a playful indulgence amidst disciplined eating.
  core: Shari Norris is a structure‑loving visual designer who channels anxiety into disciplined creative rituals, balancing meticulous work habits with spontaneous bursts of DIY electronics and a relentless
    pursuit of nature‑inspired art.
background:
  cultural: Shari is a White American raised in the suburbs of Issaquah, Washington. Her family’s roots are primarily German and English, and she grew up amidst the Pacific Northwest’s strong emphasis on
    environmental stewardship, outdoor recreation, and a tech‑oriented creative community. The region’s blend of progressive social values and an appreciation for structured, data‑driven work has shaped
    her pragmatic yet collaborative outlook. While she identifies with mainstream American cultural norms, she also embraces the local culture’s focus on sustainability, community involvement, and a balanced
    lifestyle that integrates work, wellness, and artistic expression.
attributes:
  skills: '["Adobe Photoshop", "Adobe Illustrator", "Adobe InDesign", "Figma", "Sketch", "User Interface (UI) Design", "User Experience (UX) Research", "Typography", "Digital Illustration", "Data Visualization",
