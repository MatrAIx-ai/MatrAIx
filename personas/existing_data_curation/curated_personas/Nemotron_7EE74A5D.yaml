personas:
  professional: Renee Brown, a 30-year-old operations manager with a flair for the arts, leverages her curiosity and competitive edge to streamline museum workflows while injecting unconventional, creative
    problem-solving, even if her tendency toward flexible planning occasionally leads to a last-minute scramble.
  sports: Renee Brown, an avid hiker and casual sports fan, spends weekends exploring the trails of Mt. Airy and the Little Miami Scenic Trail while cheering the Cincinnati Bengals in the fall and supporting
    the Cincinnati Reds in the spring, and they prefer low-impact cardio over competitive team sports.
  arts: Renee Brown immerses herself in the visual and performing arts, frequenting the Contemporary Arts Center to view works by Kehinde Wiley, attending indie screenings of Chloe Zhao’s films, listening
    to Sufjan Stevens at local venues, and capturing urban street art through her camera lens, while they often share new finds at board-game nights.
  travel: Renee Brown favors thoughtful, art-centric getaways, planning weekend road trips to Asheville’s River Arts District and dreaming of a spring visit to Florence, Italy, yet they often book flights
    impulsively when work stress spikes and vacation days are limited.
  culinary: Renee Brown enjoys crafting seasonal meals, often preparing avocado toast with heirloom tomatoes and poached eggs for brunch, savoring Cincinnati chili topped with shredded cheddar, and experimenting
    with homemade ramen broth infused with kombu and miso, while they occasionally order take-out as a stress-relief shortcut.
  core: Renee Brown blends relentless curiosity and a competitive streak with a laid-back, sometimes scatter-shot approach to life, turning stress into creative energy while they constantly chase the next
    museum exhibit or sunrise hike.
background:
  cultural: Renee grew up in a middle‑class white family in suburban Ohio, steeped in Midwestern values of community, modesty, and hard work. Her upbringing combined a practical work ethic with exposure
    to cultural activities through school programs and family trips to regional museums. She pursued a graduate degree in the arts and humanities, which broadened her worldview and deepened her appreciation
    for diverse artistic expressions. Living in Cincinnati, she engages with the city’s vibrant arts scene while maintaining a connection to its Midwest roots, balancing a progressive, open‑minded outlook
    with a grounded, practical approach to everyday life.
