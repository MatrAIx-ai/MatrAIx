  hobbies: '[''Visiting art museums and galleries'', ''Attending live music and theater performances'', ''Reading contemporary literature and poetry'', ''Writing essays and poetry'', ''Practicing yoga and
    mindfulness'', ''Hiking in local parks'', ''Volunteer docent work at a museum'', ''Board‑game nights'', ''Photography of street art and urban scenes'', ''Exploring Cincinnati’s indie film festivals'']'
  career_goals: Renee aims to transition into a senior leadership role that merges her operational expertise with her passion for the arts, such as Director of Operations for a museum or a cultural nonprofit
    in the Cincinnati area. She envisions spearheading innovative programs that expand community engagement while improving organizational efficiency. In the longer term, she aspires to launch her own consulting
    boutique focused on helping creative institutions streamline their operations and enhance their cultural impact. She also seeks to develop stronger strategic planning skills to reduce workplace stress
    and improve overall work‑life balance.
