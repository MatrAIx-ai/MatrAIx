  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Poetry readings'', ''Reading speculative fiction'', ''Listening to science and tech podcasts'', ''Digital art experimentation'', ''Chess'',
    ''Puzzle solving'', ''Journaling'', ''Gardening'', ''River walks'']'
  career_goals: Although retired from formal employment, Annabel intends to remain intellectually vibrant by volunteering as a science mentor for local high‑school students and contributing guest articles
    to community newsletters that translate scientific concepts into everyday language. She aspires to compile her reflections on the intersection of art and science into a modestly priced book, and she
    hopes to lead a small citizen‑science project documenting the biodiversity of Perry County's wetlands. Her overarching ambition is to leave a legacy of curiosity and interdisciplinary appreciation within
    her community.
