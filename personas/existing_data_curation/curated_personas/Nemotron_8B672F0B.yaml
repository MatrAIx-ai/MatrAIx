personas:
  professional: Annabel Harbison, a retired STEM researcher turned citizen‑science coordinator, leverages her expertise in statistical modeling, Python, and technical writing to mentor high‑school students
    and lead a wetlands biodiversity survey, while her competitive streak drives her to constantly refine data visualizations and her skeptical nature keeps her questioning every methodological assumption.
  sports: Annabel Harbison enjoys low‑impact fitness by joining the Riverbend Senior Walking Club for regular Arkansas River trail strolls, participates in weekly chess‑themed cross‑fit sessions with friends,
    and passionately supports the Arkansas Razorbacks football team, while their competitive nature pushes them to log step counts and aim for personal milestones each season.
  arts: Annabel Harbison frequents the Arkansas Museum of Fine Arts, sketches watercolors of Ozark hills, reads speculative fiction by N. K. Jemisin, enjoys poetry readings by local poet Jane Doe, and draws
    inspiration from the music of Joni Mitchell and the paintings of Georgia O'Keeffe, while they experiment with digital art tools like Procreate to blend scientific diagrams with painterly textures.
  travel: Annabel Harbison prefers flexible, self‑guided road trips that balance curiosity with comfort, having recently explored the Okefenokee Swamp in Georgia, taken a weekend cruise on Lake Ouachita,
    and dreaming of a pilgrimage to Kyoto’s cherry‑blossom gardens, all while budgeting modestly and sometimes leaving itineraries open for spontaneous stops at art galleries.
  culinary: Annabel Harbison, an avid gardener, delights in cooking fresh garden salads with heirloom tomatoes, basil, and feta, prepares pan‑seared trout with lemon‑dill sauce, and occasionally treats
    themselves to Southern comfort foods like shrimp and grits, while they experiment with spices such as sumac and smoked paprika in their modest kitchen.
  core: Annabel Harbison is a curious, art‑loving former scientist whose competitive streak, occasional disorganization, and persistent worry shape a life that blends rigorous inquiry with creative escape.
background:
  cultural: Annabel grew up in a small Southern town in Arkansas, shaped by the region’s traditions of hospitality, community gatherings, and a strong emphasis on self‑reliance. Her family valued education,
    encouraging her to pursue a scholarship in engineering that took her to a state university. While maintaining ties to Southern customs—such as annual family potlucks, church festivals, and a love for
    regional cuisine—her academic experiences exposed her to diverse cultural perspectives and avant‑garde artistic movements. This blend of Southern roots and academic openness informs her worldview, fostering
    a respect for both local heritage and innovative, unconventional ideas.
attributes:
