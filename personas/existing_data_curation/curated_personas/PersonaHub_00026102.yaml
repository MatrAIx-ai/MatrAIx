persona_description: A University of Notre Dame economist who specializes in measuring the impact of highly skilled immigrants on native populations, particularly in smaller and more geographically isolated
  cities. Her research interests include the effects of immigration on labor markets, the impact of education on population changes, and the relationship between immigrants and native populations. Her study
  was the first to use city-level data from the American Community Survey, and she has published her findings in the Journal of Urban Economics.
