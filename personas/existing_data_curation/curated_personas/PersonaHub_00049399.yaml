persona_description: A development professional who is interested in understanding the effectiveness and impact of international development programs and interventions, particularly those related to the
  2030 Agenda and the Sustainable Development Goals (SDGs). They are curious about how to measure and assess success in development projects and programs, and are looking for ways to integrate economic,
  social, and environmental aspects of development. They are also interested in exploring the role of interdisciplinary research and intersectoral collaboration in achieving the SDGs and promoting progress
  for the "furthest behind first."
