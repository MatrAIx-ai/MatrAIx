  hobbies: '[''Drawing/sketching'', ''Digital painting'', ''Playing guitar'', ''Improvisational theater'', ''Story-driven video games'', ''Reading speculative fiction'', ''Live music shows'', ''Volunteer
    work at youth art club'', ''Creating short videos for social media'', ''Exploring local nature trails'']'
  career_goals: Edward plans to earn his GED within the next two years, then enroll in a community college art program or take online courses in illustration and game design. He aspires to become a concept
    artist for video games or an independent comic creator, and ultimately to run a community art workshop that offers a creative outlet for at‑risk youth in Decatur. He also hopes to combine his artistic
    skills with volunteer work, using art to foster social connection and positive change in his hometown.
