personas:
  professional: Edward Belmares, a budding concept artist who blends their vivid imagination with beginner‑level Photoshop and Procreate skills, crafts narrative‑rich digital sketches for indie games while
    navigating a relaxed attitude toward deadlines and a habit of leaving sketchbooks scattered across the bedroom floor, reflecting their sociable, compassionate nature.
  sports: Edward Belmares, an enthusiastic member of the Decatur youth basketball league, avidly follows the Chicago Bulls and Chicago Cubs, jogs along the Sangamon River trails on weekends, prefers low‑key
    group workouts over solo gym sessions, and frequently forgets to stretch after games.
  arts: Edward Belmares, a self‑taught digital illustrator and guitar hobbyist, draws inspiration from anime master Hayao Miyazaki, video‑game artist Jen Zee, and indie band The Wonder Years while regularly
    contributing to the Clarion Library’s art exhibits and posting sketch timelapses to TikTok.
  travel: Edward Belmares, a budget‑conscious teen explorer, spends summer holidays road‑tripping to Chicago’s art districts and the Cedar Rapids Music Festival, dreams of hiking the Columbia River Gorge
    in the Pacific Northwest and visiting Kyoto’s historic temples, and plans trips around school breaks and limited family funds.
  culinary: Edward Belmares, a casual kitchen experimenter, loves whipping up cheesy deep‑dish pizza slices, spicing up Chicago‑style hot dogs with neon‑green relish, and trying his hand at miso‑flavored
    ramen broth, often sharing tasty creations with friends at the youth center after art club.
  core: Edward Belmares, a wildly imaginative yet delightfully disorganized teenage artist, channels boundless curiosity into vibrant sketches while juggling spontaneous generosity, occasional procrastination,
    and a penchant for late‑night gaming marathons.
background:
  cultural: Edward grew up in Decatur, Illinois, a mid‑sized Midwestern city with a strong sense of community and modest, friendly values. His family has deep roots in the region’s agricultural and manufacturing
    history, and he was raised attending local churches and community events. He has been involved with programs at the Clarion Library, the Decatur Arts Council, and the local youth center, which have
    reinforced his cooperative spirit. While he shares many aspects of mainstream American culture—pop music, digital media, and a love for storytelling—he also embraces the Midwestern emphasis on civic
    engagement and helping others.
