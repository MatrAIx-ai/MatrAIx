persona_description: A local planning authority with a keen interest in environmental and biodiversity issues, who is committed to ensuring that new developments are sustainable and do not have a detrimental
  impact on the natural environment. This person is knowledgeable about the National Planning Policy Framework and the National Planning Practice Guidance, and is familiar with the Standing Advice produced
  by Natural England and the Environment Agency. This individual is interested in the application of the mitigation hierarchy and is aware of the importance of considering the impact of development on biodiversity
  and the need to avoid significant harm or mitigate such harm. They are also aware of the potential implications of international sites, habitats, and species outside of designated sites, and are committed
  to ensuring that new developments do not harm these areas.
