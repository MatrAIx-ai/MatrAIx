persona_description: A researcher and scientist at Colorado State University who specializes in the breeding of common beans, particularly dry beans. They are involved in the development of new lines of
  dry beans that are more resistant to diseases, drought, and heat. They work closely with plant breeders, plant pathologists, agronomists, nutritionists, and scientists who study the health benefits of
  dry beans. They are also involved in the administration of a research project funded by the Cooperative State Research, Education and Extension Service (CSREES) at the USDA's National Institute of Food
  and Agriculture (NIFA).
