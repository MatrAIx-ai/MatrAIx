  hobbies: '[''Visiting art galleries'', ''Collecting Mexican folk art'', ''Cooking traditional Mexican cuisine'', ''Playing acoustic guitar'', ''Reading about new ideas'', ''Woodworking'', ''Hiking'',
    ''Volunteering at community festivals'']'
  career_goals: Yasser aspires to move into a supervisory role, such as store manager or district supervisor, where he can mentor younger staff and shape the store’s visual identity. He dreams of eventually
    opening a boutique that showcases Mexican folk art and handcrafted goods, blending his retail expertise with his love for culture and creativity. To achieve this, he plans to enroll in evening business‑management
    courses at a community college and network with local artisans. Ultimately, he wants his business to become a community hub that celebrates cultural heritage while providing a flexible work environment
    for himself and his employees.
