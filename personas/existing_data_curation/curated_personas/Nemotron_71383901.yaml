  hobbies: '[''Sudoku'', ''Strategy board games (e.g., Settlers of Catan)'', ''Vegetable gardening'', ''Early‑morning running'', ''Reading nonfiction (logistics, self‑improvement, educational policy)'',
    ''Cooking family meals'', ''Automotive DIY projects'', ''Volunteer driver for community events'']'
  career_goals: Sandy’s career ambition is to move beyond the driver’s seat into a leadership role within school transportation. In the next three years she aims to earn a Class A CDL and complete an associate’s
    degree in logistics or operations management, positioning herself for promotion to Transportation Supervisor for Waco ISD. In that capacity she plans to oversee fleet scheduling, implement data‑driven
    route optimization, and launch a district‑wide safe‑bus initiative that could earn the Texas Safe Bus Award. She also hopes to formalize a mentorship program for new drivers, leveraging her experience
    to improve safety and retention. Long‑term, Sandy envisions becoming an Operations Manager for a private school‑district transportation firm, where she can apply her expertise in fleet management, regulatory
    compliance, and driver development on a larger scale.
