personas:
  professional: Sandy Buck, a seasoned school bus driver for Waco ISD, leverages eight years of Class B CDL expertise, precision route‑planning software skills, and a reputation for rigorous safety inspections
    to mentor new drivers, while channeling their competitive, organized nature toward a future role as transportation supervisor overseeing fleet optimization and a district‑wide safe‑bus initiative.
  sports: Sandy Buck, a dedicated early‑morning runner along the Brazos River and member of the Waco Running Club, follows the Dallas Cowboys for football, cheers the Texas Rangers during baseball season,
    and joins weekend flag‑football pick‑up games with fellow transportation staff.
  arts: Sandy Buck, an avid nonfiction reader, also draws inspiration from Ken Burns’ historical documentaries, the soothing cello performances of Yo‑Yo Ma, and the dynamic cinematography of Christopher
    Nolan, weaving these artistic influences into weekend dinner conversations and personal reflection.
  travel: Sandy Buck prefers meticulously planned road trips, having mapped out a scenic drive through the Texas Hill Country and a family vacation to New York City, while dreaming of a spring itinerary
    to Kyoto’s ordered gardens, balancing adventure with a structured budget and schedule.
  culinary: Sandy Buck, an exacting home chef, delights in preparing herb‑infused roasted chicken with rosemary and thyme, seasonal vegetable medleys like grilled zucchini and roasted carrots harvested
    from their own garden, and perfecting classic Texas‑style chili using ancho chilies and cumin, always following recipes step‑by‑step.
  core: Sandy Buck is a methodical bus driver turned logistics aspirant who channels competitive puzzle‑solving, disciplined garden‑care, and precise vehicle maintenance into a life orchestrated by schedules,
    spreadsheets, and a drive for operational excellence.
background:
  cultural: Sandy was raised in the central Texas town of Temple, within a middle‑class, white Anglo‑American family that valued hard work, punctuality, and community involvement. Her father worked as an
    auto mechanic and her mother as a school nurse, exposing her early to both practical skills and the importance of public service. Growing up in a region where football Saturdays and church gatherings
    were social anchors instilled a sense of local pride, while her parents’ emphasis on self‑reliance and personal responsibility shaped her competitive, achievement‑oriented mindset. Living in Waco, she
    embraces the blend of small‑town camaraderie and the pragmatic, no‑nonsense work ethic that characterizes much of Texas. These cultural influences combine with her personal drive to prioritize safety,
    efficiency, and measurable results in both her professional and personal life.
attributes:
  skills: '[''Safe bus operation'', ''Route planning & optimization'', ''Vehicle safety inspections'', ''Regulatory compliance'', ''Student supervision'', ''First Aid/CPR'', ''Incident reporting'', ''Time
