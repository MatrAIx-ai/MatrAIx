  hobbies: '[''Gardening'', ''Hiking local trails'', ''DIY home projects'', ''Cooking comfort meals'', ''Volunteering at the animal shelter'', ''Attending county fairs'', ''Reading mystery novels'', ''Listening
    to country music podcasts'']'
  career_goals: Chelsea aims to transition from an individual sales representative to a leadership role within the next three years. Her short‑term goals include achieving the top‑seller award for her region,
    earning the Certified Professional Salesperson (CPS) credential, and mastering advanced analytics to improve sales forecasting. Long‑term, she aspires to become a regional sales manager overseeing a
    team of representatives across Mayes and neighboring counties, and eventually launch her own consulting firm that helps small service businesses optimize their sales processes. Financial stability,
    a flexible schedule that accommodates her personal commitments, and a stronger work‑life balance are also key motivations.
