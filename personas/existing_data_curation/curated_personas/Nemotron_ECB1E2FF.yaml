personas:
  professional: Chelsea Hernandez is a seasoned field sales professional with 15+ years of experience leveraging Salesforce and HubSpot to drive consultative selling, who balances a love for structured
    pipelines with a flexible, hands‑on approach to problem‑solving, making her a top‑performer in the regional service‑sector market.
  sports: Chelsea Hernandez enjoys hiking the Ouachita foothills and playing pick‑up volleyball at the local community center, follows the Oklahoma City Thunder, the Oklahoma Sooners football team, and
    the Tulsa Oilers hockey club, and participates in the Inola County Fair’s 5K run, balancing a love for solo outdoor activity with community sports engagement.
  arts: Chelsea Hernandez immerses herself in country‑inspired podcasts and mystery novels, often listening to artists like Jason Aldean and Carrie Underwood while reading Sue Grafton, and she attends the
    annual Inola Community Theater productions featuring classics such as "Our Town," reflecting her blend of modern country culture and Midwestern storytelling.
  travel: Chelsea Hernandez prefers short, well‑planned road trips that combine outdoor adventure with family time, having explored the Arkansas Hot Springs and the Grand Canyon last summer, while dreaming
    of a spring visit to Santa Fe’s art district and a weekend getaway to Austin’s live‑music scene, always using a spreadsheet to track mileage and expenses.
  culinary: Chelsea Hernandez enjoys cooking comfort meals like chicken‑fried steak, homemade chili, and fresh salsa made from the tomatoes and peppers she grows, boasts a competent kitchen skill set inspired
    by The Pioneer Woman, and often finishes dishes with a dash of smoked paprika or fresh cilantro.
  core: Chelsea Hernandez is a down‑to‑earth sales leader who juggles a love for structured pipelines with spontaneous DIY projects, tends to procrastinate on dental appointments, and can’t resist a perfectly
    grilled rib with a side of home‑grown salsa.
background:
  cultural: Chelsea comes from a white American background rooted in the Midwest‑Southern culture of Oklahoma. Although her surname reflects some Hispanic heritage, she was raised in a predominantly Anglo‑American
    community where values such as self‑reliance, neighborly support, and practical optimism are emphasized. Growing up in Inola, she was exposed to rural traditions like county fairs, church potlucks,
    and outdoor recreation, which have shaped her down‑to‑earth perspective. Her cultural identity blends a respect for traditional family ties with an openness to the diverse influences of modern Oklahoma,
    including the growing Hispanic presence and the state's evolving service‑oriented economy.
