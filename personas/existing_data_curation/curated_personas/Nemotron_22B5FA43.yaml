personas:
  professional: David Christie, a ten‑year‑old budding technologist, channels their organized, methodical nature into building intricate LEGO models, coding Scratch projects, and leading small science experiment
    groups at school, often stepping into the role of informal project manager who thrives on the attention of peers.
  sports: David Christie, a social and talkative ten‑year‑old, spends afternoons with the Riverside Raptors youth soccer team and the Thunderbolts youth basketball club, while they also cheer for professional
    favorites like Manchester United and the Los Angeles Lakers during TV games, using structured practice schedules to channel their reliable, organized mindset.
  arts: David Christie, an enthusiastic drama club member, lights up school productions with energetic performances of classic scenes from Shakespeare's A Midsummer Night's Dream and modern numbers from
    Lin‑Manuel Miranda's Hamilton, while they idolize musicians such as Taylor Swift and animated storytellers like Studio Ghibli's Hayao Miyazaki.
  travel: David Christie, a curious explorer, prefers family trips that blend bright adventure with routine, having visited Disney World in Florida and the Natural History Museum in London, and dreaming
    of camping under the Northern Lights in Iceland, all while they plan itineraries with colorful charts and a touch of imagination.
  culinary: David Christie, an aspiring home chef, loves assembling homemade pizza topped with mozzarella, pepperoni, and fresh basil, enjoys crafting chocolate brownies with precise measurements, and frequently
    snacks on gummy bears while reading adventure novels, though they are prone to over‑indulging in sugary treats after a successful school performance.
  core: David Christie is an organized yet worry‑prone ten‑year‑old who turns curiosity into creative projects, thrives on social spotlight, and occasionally they hoard sweets and spare change.
background:
  cultural: David is a White American growing up in Southfield, Michigan, a suburban community in Oakland County. His upbringing reflects typical Midwestern values of reliability, community involvement,
    and practicality. He participates in local school activities, community center programs, and family traditions centered around holidays such as Thanksgiving, Fourth of July, and regional events. The
    diverse yet family-oriented environment of the Detroit metropolitan area exposes him to a mix of cultures while reinforcing the emphasis on education, organized extracurriculars, and friendly social
    interactions common in the region.
