  career_goals: David dreams of becoming a scientist-engineer who can design innovative solutions, while also enjoying the chance to share knowledge as a teacher or youth mentor. He aspires to lead school
    science fairs or robotics clubs, and envisions a future where he can combine his love for technology, teamwork, and public speaking to inspire peers. In the longer term, he imagines a career that blends
    creativity, practical problem-solving, and community leadership, such as a STEM educator, robotics engineer, or youth program coordinator.
