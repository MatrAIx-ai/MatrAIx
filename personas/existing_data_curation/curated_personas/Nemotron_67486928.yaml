  hobbies: '[''Watercolor painting'', ''Mixed‑media art'', ''Visiting local museums and galleries'', ''Nature walks and birdwatching'', ''Gardening with native Florida plants'', ''Reading historical fiction'',
    ''Listening to education and art podcasts'', ''Volunteering for community art workshops'', ''Cooking Southern comfort food'', ''Small‑group book clubs'']'
  career_goals: Melissa aims to earn her state teaching certification within the next two years and transition from teaching assistant to full‑time classroom teacher, with a focus on middle‑school humanities.
    She aspires to become a specialist in integrating visual arts into core subjects, designing interdisciplinary units that spark curiosity. In the longer term, she hopes to lead professional‑development
    workshops for fellow educators on creative instructional strategies and eventually move into an instructional coordinator role where she can shape district‑wide curriculum policies. Additionally, she
    dreams of establishing a community after‑school art program that provides creative outlets for underserved youth in Escambia County.
