  hobbies: '[''Traditional Mexican cooking'', ''Desert gardening and herb cultivation'', ''Reading historical fiction and biographies'', ''Knitting and crocheting'', ''Listening to regional Mexican music'',
    ''Attending church services and cultural events'', ''Community storytelling and oral history'', ''Walking and birdwatching in Gold Canyon trails'', ''Family genealogy research'']'
  career_goals: Marta aims to deepen her knowledge of Mexican culinary heritage by documenting family recipes and hopes to publish a modest cookbook for friends and the community. She wishes to expand her
    gardening skills to create a small herb and vegetable garden that can serve as a teaching space for her grandchildren. She aspires to become a regular volunteer mentor at the local senior center, helping
    newcomers adjust to life in Arizona and offering language support. Maintaining her health and independence is a core ambition, as is contributing meaningfully to her church’s cultural events, especially
    Día de los Muertos celebrations.
