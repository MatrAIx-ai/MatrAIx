persona_description: A researcher who specializes in the study of memory and its impact on brain systems, particularly the hippocampus. Her research interests include, but are not limited to, the effects
  of nicotine on memory, the effects of maternal incarceration and violence exposure on child behavior and emotional development, and the effects of adolescence on brain systems responsible for memory formation.
  Her work has been published in prestigious journals and her findings have been recognized with awards and grants.
