personas:
  professional: Cassandra Greathouse, a budding explorer of cause-and-effect, already shows a balance between curiosity and practicality by ingeniously stacking blocks while sometimes abandoning the structure
    for spontaneous play, and they often smile with a hint of skeptical appraisal when a new toy appears.
  sports: Cassandra Greathouse, a one‑year‑old who delights in baby yoga and toddles after a soft orange ball in the backyard, occasionally watches the Springfield Sluggers on TV, and participates in the
    neighborhood Toddler Play Club’s weekly mini‑soccer sessions, though they prefer the flexibility of free crawling over structured drills.
  arts: Cassandra Greathouse, a one‑year‑old who giggles at the soft crooning of lullaby artist Jewel, claps along to the playful tunes of Raffi, and watches the animated performances of Mister Rogers and
    the bright illustrations by Eric Carle, thereby weaving a colorful tapestry of early artistic appreciation, and they often point at the screen with their chubby finger.
  travel: Cassandra Greathouse, a one‑year‑old who enjoys stroller‑friendly outings to the local botanical garden and the zoo’s peacock enclosure, and whose parents dream of taking them to Disneyland and
    the sun‑kissed shores of Santorini, approaches travel with a relaxed, curiosity‑driven style that favors spontaneous discovery over rigid itineraries, and they often clap with delight at moving cars.
  culinary: Cassandra Greathouse, a one‑year‑old who relishes the creamy texture of mashed sweet potatoes seasoned with a pinch of cinnamon, reaches eagerly for soft banana slices and occasional avocado
    mash, and has a quirky habit of smearing pea purée across the high‑chair tray as a self‑styled culinary experiment, and they reflect a practical palate and love for simple, vivid flavors.
  core: Cassandra Greathouse, a curious yet delightfully disorganized one‑year‑old who balances a pragmatic clutch on favorite toys with a skeptical stare at new textures, and secretly hoards shiny objects
    like tiny treasures, and they often giggle at their own reflection.
background:
  cultural: Cassandra is an African‑American child raised in Newnan, Georgia, within a close‑knit family that celebrates Southern Black culture. Her upbringing is steeped in church traditions, gospel music,
    and family gatherings that emphasize storytelling, resilience, and community support. The local Black community’s cuisine, dialect nuances, and values of mutual respect and perseverance shape her early
    worldview, providing a foundation of cultural pride and identity that will influence her growth.
attributes:
  skills: '[''standing unaided'', ''cruising'', ''first independent steps'', ''grasping and transferring objects'', ''stacking two blocks'', ''turning pages of board books'', ''simple word utterances (mama,
