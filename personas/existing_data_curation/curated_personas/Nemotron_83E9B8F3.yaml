  hobbies: '[''soft plush toy squeezing'', ''knocking wooden blocks together'', ''shallow water play'', ''listening to rhythmic children’s songs (gospel influences)'', ''flipping through bright‑color picture
    books'', ''quiet solo book exploration'', ''outdoor park strolls and nature observation'']'
  career_goals: Although still in infancy, Cassandra’s caregivers nurture developmental goals that echo future ambitions. She is encouraged to become a confident walker, expand her vocabulary to simple
    sentences, and develop problem‑solving abilities through shape‑sorter toys. The family hopes she will grow into a learner who channels her curiosity into scientific exploration or creative expression,
    eventually pursuing an occupation where she can combine practical problem solving with innovative ideas—perhaps in fields such as engineering, design, or community arts.
