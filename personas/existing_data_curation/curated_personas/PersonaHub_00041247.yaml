persona_description: A healthcare professional who specializes in the diagnosis and treatment of meningitis, particularly bacterial meningitis. They have extensive knowledge and experience in the management
  of this life-threatening condition, including the use of antibiotics and supportive care. They are skilled in recognizing the signs and symptoms of meningitis, as well as the importance of early diagnosis
  and treatment to reduce the risk of death or complications. They may work in a hospital, clinic, or research setting and have a strong understanding of the latest research and treatment options available
  for meningitis.
