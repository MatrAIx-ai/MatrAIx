personas:
  professional: Anthony Ramirez, a seasoned graphic designer who blends traditional illustration with cutting‑edge digital tools, leads collaborative workshops with a methodical, organized workflow while
    leveraging their curiosity to explore emerging design trends and their compassionate nature to champion inclusive visual narratives for community clients.
  sports: Anthony Ramirez embraces active weekends hiking the Texas Hill Country with the Hill Country Trail Club, roots for the Houston Astros and Rockets, and participates in a local salsa‑dance fitness
    class that doubles as cardio, all while balancing a disciplined but sometimes inconsistent gym routine.
  arts: Anthony Ramirez channels artistic curiosity into mural painting that celebrates Día de los Muertos motifs, draws inspiration from Frida Kahlo, Diego Rivera, and contemporary street artist Shepard
    Fairey, and regularly supports local galleries featuring works by Ai Weiwei and Los Lonely Boys.
  travel: Anthony Ramirez plans travel with a blend of cultural immersion and family ties, taking annual trips to Oaxaca’s vibrant festivals, dreaming of a weekend in Barcelona’s Gothic Quarter, and scheduling
    short road‑trips to Austin’s music scene when budgeting and work commitments allow.
  culinary: Anthony Ramirez delights in cooking Tex‑Mex classics such as chilaquiles, carne asada tacos with cotija cheese, and smoky chipotle salsa, boasts a moderate cooking skill level refined through
    nightly experiments, and seeks out farmer’s markets for fresh cilantro, avocado, and fire‑roasted corn for authentic flavor.
  core: Anthony Ramirez is a methodical yet spontaneous creative who balances meticulous design work with nightly salsa dancing, a penchant for vintage design books, occasional anxiety‑driven over‑planning,
    and an unstoppable drive to blend cultural traditions into modern visual storytelling.
background:
  cultural: Anthony is a Mexican‑American raised in Houston's vibrant, multicultural environment. Bilingual in English and Spanish, he grew up celebrating traditions such as Día de los Muertos, quinceañeras,
    and local festivals like Fiesta Houston, which infuse his design aesthetic with bold colors, intricate patterns, and folk art symbolism. His family values emphasize collectivism, respect for elders,
    and community service, shaping his compassionate approach to collaborative projects. The blend of Mexican heritage and Texan influences informs his work, enabling him to create designs that resonate
    across diverse audiences while honoring his cultural identity.
attributes:
  skills: '["Adobe Photoshop", "Adobe Illustrator", "Adobe InDesign", "Adobe After Effects", "Figma (UI/UX prototyping)", "Typography & Lettering", "Motion graphics", "Brand identity development", "Print
    production & prepress", "Project management (Agile, Kanban)", "Collaborative workshop facilitation", "Inclusive design (accessibility, cultural storytelling)"]'
  hobbies: '["Community mural painting", "Salsa dancing", "Tex‑Mex cooking", "Hill Country hiking", "Street art photography", "Art gallery and museum visits", "Volunteering at youth art programs", "Collecting
    vintage design books", "Traveling to Mexico for cultural festivals", "Listening to Latin jazz"]'
  career_goals: Anthony aims to advance to a senior art director role at a boutique agency known for multicultural branding, where he can shape strategic visual campaigns that celebrate Latinx culture.
    He aspires to lead a diverse creative team, mentor junior designers, and embed structured, stress‑reducing workflows that balance creativity with reliability. Over the next five years, he plans to launch
    a consultancy focused on inclusive design for non‑profits and community initiatives, while also teaching part‑time at a local community college to share his expertise. A personal ambition is to publish
    a limited‑edition print series that fuses contemporary graphic design with traditional Mexican folk art motifs, reflecting his heritage and artistic curiosity.
