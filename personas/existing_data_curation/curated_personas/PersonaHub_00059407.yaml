persona_description: A scientist who is working on developing new cancer treatment methods using stem cells and nanoparticles. She is particularly interested in targeting and treating aggressive forms of
  breast cancer, such as triple-negative breast cancer, which is difficult to fight with existing therapies. Her work involves modifying neural stem cells to secrete an enzyme that activates a prodrug to
  become a powerful cancer-killing agent, and using this platform to deliver chemotherapy drugs to breast cancer-related metastases. She is a postdoctoral CIRM Scholar and a fellow in her lab's research,
  and her work has already been successful in preclinical models of brain tumors.
