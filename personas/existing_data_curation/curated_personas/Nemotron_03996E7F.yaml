  career_goals: Linda aims to obtain her GED within the next year and then enroll in a vocational program, such as a Certified Nursing Assistant (CNA) course or a culinary arts certification, to secure
    stable employment. She envisions a career that offers clear routines and tangible outcomes, allowing her to apply her organizational strengths. In the long term, she hopes to open a modest home‑based
    catering service, blending her love for cooking with her entrepreneurial drive while maintaining a predictable work schedule.
