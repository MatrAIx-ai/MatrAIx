personas:
  professional: Andrew Mcleod, a 17‑year‑old aspiring automotive technician, applies his methodical approach from model‑building and PC assembly to everyday garage work, relying on detailed manuals and
    checklists to ensure every oil change and brake replacement meets his exacting standards, and they aim to translate this precision into a future independent repair shop.
  sports: Andrew Mcleod balances weightlifting at the local gym's power‑lifting club with weekend hikes in the nearby state park, follows the New York Knicks for basketball and the Seattle Seahawks for
    football, and they treat each workout like a tactical mission, logging reps and routes in a journal to track progress.
  arts: Andrew Mcleod channels his love of precision into listening to progressive rock bands such as Rush and Pink Floyd, binge‑watching Christopher Nolan's films for their intricate narratives, and they
    occasionally sketch technical diagrams inspired by Leonardo da Vinci, finding creative release in the structured artistry of these influences.
  travel: Andrew Mcleod prefers meticulously planned trips, often spending long weekends at Yellowstone National Park for solitary hikes and dreaming of a future road‑trip tour of Germany's Porsche Museum
    in Stuttgart and Italy's historic Autodromo Nazionale Monza, and they balance travel costs by saving a portion of each allowance toward a dedicated travel fund.
  culinary: Andrew Mcleod enjoys cooking with a focus on precision, frequently preparing beef stew with carrots, potatoes, and thyme or making homemade pizza where they measure dough hydration to the gram,
    and they relish the tactile satisfaction of seasoning a perfectly grilled steak with sea salt and cracked black pepper.
  core: Andrew Mcleod is a 17‑year‑old control‑oriented planner who channels anxiety into structured hobbies, competitive gaming, and a relentless pursuit of mechanical perfection, even if that sometimes
    means hoarding model kits and over‑checking every detail.
background:
  cultural: Andrew grew up in Waunakee, a small, close‑knit town in Dane County, Wisconsin, in a family with deep Midwestern roots, tracing ancestry to German and Scandinavian immigrants. The community
    places a high value on hard work, self‑reliance, and modesty, with frequent participation in local events such as county fairs, high‑school sports, and church gatherings (he attends a Lutheran congregation).
    This environment fostered his preference for order, predictability, and a competitive spirit, especially evident in school and sports contexts. At the same time, the region’s supportive ethos has encouraged
    him to seek structured pathways—like vocational training—to achieve stability and personal growth despite his heightened emotional sensitivity.
attributes:
  skills: '[''Automotive maintenance'', ''Computer hardware troubleshooting'', ''Scale model assembly'', ''Strategic game analysis (chess)'', ''Basic carpentry'', ''Project scheduling and checklist creation'']'
  hobbies: '[''Scale model building'', ''Competitive online gaming (first‑person shooters, strategy games)'', ''Weightlifting and gym workouts'', ''Hiking in local parks'', ''Chess'', ''Journaling and reflective
    writing'']'
  career_goals: Andrew aims to earn his GED within the next year and then enroll in a community‑college automotive technology program where he can obtain certification as a mechanic. His long‑term ambition
    is to open a small independent repair shop that emphasizes meticulous service and transparent pricing, reflecting his desire for structure and reliability. He also hopes to develop a reputation for
    being a dependable professional who never cuts corners, which would help counteract his own anxiety about meeting expectations. In the meantime, he plans to take on part‑time internships at local garages
    to gain real‑world experience and build a network of trusted mentors.
