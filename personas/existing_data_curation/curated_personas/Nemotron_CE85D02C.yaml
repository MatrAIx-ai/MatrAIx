  career_goals: Although retired, John aims to continue sharing his business insight by mentoring young start‑ups through the local Chamber of Commerce and by serving on the board of the Kingston Community
    Arts Center. He hopes to write a memoir that captures the economic changes he witnessed in rural Tennessee, and to travel to major art museums in the Northeast and the Southwest. He also aspires to
    support his grandchildren’s education and to help launch a community garden that blends his love of nature with intergenerational collaboration.
