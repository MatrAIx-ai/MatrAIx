persona_description: Fiona Sampson, a Toronto lawyer and founder of The Equality Effect, a non-profit organization that aims to fight sexual violence and protect the rights of under-age rape victims. She
  has won a landmark ruling in Kenya, ordering the police to do their duty and protect no fewer than 160 under-age rape victims, some as young as 3. Ms. Sampson relies on the 1999 case of Jane Doe and the
  1983 reform of the Criminal Code's sexual violence provisions to fight for justice and accountability. Her work is an example of the power of legal action to bring about change and protect vulnerable
  populations.
