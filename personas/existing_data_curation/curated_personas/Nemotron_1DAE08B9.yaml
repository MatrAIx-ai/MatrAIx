personas:
  professional: Maria Pleasant, a 56‑year‑old electrical engineer and data analyst, leverages their Python, MATLAB, and circuit‑design expertise to provide flexible, outcomes‑focused consulting for local
    startups while channeling their spontaneous, curiosity‑driven mindset into launching a community makerspace that mentors under‑represented youth.
  sports: Maria Pleasant, a fan of the Dallas Cowboys and the Texas Rangers, enjoys weekend bird‑watching hikes with the Tyler Audubon Society as low‑impact cardio, swings a racquet for recreational tennis
    in the spring, and participates in the city’s community garden fitness circuit, preferring flexible, self‑paced activities over rigid gym routines that they find stifling.
  arts: Maria Pleasant, who channels their love for blues by playing harmonica at local jam sessions inspired by B.B. King and Stevie Ray Vaughan, devours mystery novels from Agatha Christie and Tana French,
    and attends occasional performances of the Dallas Symphony Orchestra, weaving artistic appreciation into evenings alongside DIY workshops.
  travel: Maria Pleasant, who favors a mix of planned road‑trips to Texas Hill Country vineyards and spontaneous weekend getaways to nearby state parks such as Big Bend, they also dream of a cultural immersion
    tour of Oaxaca, Mexico, but balance these aspirations with the financial realities of funding a community makerspace.
  culinary: Maria Pleasant, an avid tex‑mex fusion cook, they regularly experiment with chipotle‑lime grilled corn tacos, smoked pork carnitas topped with pineapple‑coriander salsa, and cilantro‑infused
    homemade salsa verde, balancing moderate culinary skill with a willingness to improvise and frequently sourcing heirloom vegetables from their own garden for fresh, flavor‑forward meals.
  core: Maria Pleasant blends analytical engineering precision with spontaneous DIY creativity, juggling a habit of impulsively buying garden seeds and woodworking tools while they relentlessly pursue community
    impact through mentoring and maker‑culture advocacy.
background:
  cultural: Maria was raised in a tight‑knit African‑American community in East Texas, where church, family gatherings, and storytelling were central to daily life. The legacy of the civil‑rights movement
    and the perseverance of her grandparents instilled a strong sense of responsibility to uplift her community. Living in Tyler, she blends Southern hospitality with the rich cultural expressions of Black
    Texans—spice‑laden cuisine, gospel and blues music, and a tradition of mentorship. Her identity as a Black woman in STEM shapes both her resilience and her commitment to creating pathways for future
    generations.
attributes:
  skills: '[''Python programming'', ''MATLAB'', ''Statistical analysis'', ''Electrical circuit design'', ''Technical troubleshooting'', ''STEM mentorship'', ''Data visualization'', ''Grant proposal writing'',
    ''Project ideation'']'
  hobbies: '[''Gardening'', ''Woodworking'', ''Cooking (Tex‑Mex fusion)'', ''Playing harmonica'', ''Listening to blues music'', ''Bird watching'', ''Reading mystery novels'', ''Attending science fairs'',
    ''DIY home improvement projects'']'
  career_goals: Maria aims to re‑engage with the STEM field on flexible terms, seeking part‑time consulting opportunities with local startups in Tyler and launching a community makerspace that offers hands‑on
    workshops for under‑represented youth. She aspires to become a speaker on diversity in engineering, sharing her story as a Black woman in tech, and to author a practical guide on applying data analysis
    for small businesses. Mentoring the next generation of Black women in technology remains a core ambition, complementing her competitive drive to be recognized as a leader in community‑focused innovation.
