  hobbies: '[''Beach volleyball'', ''Coastal hiking'', ''Live music concerts'', ''Community festivals'', ''Grilling and seafood cooking'', ''Barbecue gatherings'', ''Tech trend reading'', ''Volunteer museum
    guide'']'
  career_goals: Edward aims to transition from a receptionist role to a supervisory position in office administration within the next three years, seeking a managerial certification in office management
    to bolster his credentials. He aspires to lead a front‑desk team at a hospitality or community services organization, where he can implement process improvements and mentor junior staff. Long‑term,
    he envisions opening a small boutique guesthouse in San Clemente, merging his practical skills with his love for tourism and community engagement, while also offering local cultural experiences to visitors.
