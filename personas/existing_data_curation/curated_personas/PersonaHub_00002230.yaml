persona_description: A construction engineer who specializes in laying a good foundation for buildings. This person is responsible for ensuring that the ground can support the weight of the building, creating
  the necessary footers and foundation to hold the building's weight, and ensuring that the concrete foundation is poured correctly to distribute the weight of the higher floors and roof of the building
  throughout the foundation and into the ground. This person must have a strong understanding of the principles and techniques involved in laying a good foundation and must be able to apply these principles
  and techniques to create stable and secure foundations for buildings.
