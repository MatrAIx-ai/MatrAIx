personas:
  professional: Scott Little, a 21‑year‑old financial services sales associate, blends rigorous market research, precise Excel analysis, and polished presentation skills with a highly organized, goal‑driven
    work ethic to consistently exceed sales targets and build trusted client relationships while preparing for Series 7, Series 66, and CFP certification.
  sports: Scott Little, an enthusiastic member of the Grand Rapids Intramural Basketball League, regularly hikes the dune trails of Sleeping Bear Dunes State Park, supports the Grand Rapids Griffins and
    Detroit Pistons, and joins a weekend fishing club on Lake Michigan where they practice catch‑and‑release for lake trout.
  arts: Scott Little immerses themselves in Grand Rapids’ live music scene, frequently attending shows featuring local indie rock bands like The Accidentals and national acts such as Jack White, while also
    enjoying film screenings that showcase actors like Ryan Gosling and curating playlists that blend classic Motown with modern pop.
  travel: Scott Little plans summer road trips with friends to Chicago, Milwaukee, and the Upper Peninsula, favoring a mix of spontaneous detours to state parks and budget‑friendly lodging, yet they keep
    a spreadsheet of travel costs to ensure they stay within a modest student‑friendly budget.
  culinary: Scott Little enjoys cooking simple yet flavorful meals, favoring dishes like grilled lake trout with lemon‑dill sauce, Chicago‑style deep‑dish pizza with extra mozzarella, and quinoa bowls tossed
    with avocado, cherry tomatoes, and feta, while often experimenting with spice blends during weekend cooking sessions.
  core: Scott Little, a highly organized 21‑year‑old with a passion for finance and community, balances disciplined work routines with spontaneous basketball games, live concerts, and occasional gaming
    marathons that sometimes compromise their sleep.
background:
  cultural: Scott grew up in Holland, Michigan, a Midwestern town with deep Dutch‑American roots. His upbringing reflects the region’s emphasis on community, hard work, and modesty, blended with contemporary
    American values of independence and ambition. He celebrates local traditions such as Tulip Time and participates in community gatherings, while also embracing broader American culture through sports,
    music, and digital media. His family background is middle‑class, with parents who emphasized education and civic involvement, shaping his practical outlook and collaborative spirit.
