  career_goals: Scott aims to obtain his Series 7 and Series 66 licenses within the next year, followed by a Certified Financial Planner designation. He aspires to become a senior financial advisor, leading
    a high‑performing sales team and managing a sizeable portfolio of high‑net‑worth clients. In the longer term, he envisions launching his own boutique wealth‑management firm, leveraging his disciplined
    work ethic and network to provide personalized financial planning services.
