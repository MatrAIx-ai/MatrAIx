persona_description: A scientist who specializes in the development of novel therapeutic agents and the use of chemical approaches to overcome the limitations of short peptides as therapeutic compounds.
  They are particularly interested in the use of hydrocarbon stapling to stabilize and reinforce the shape of peptides and to improve their pharmacological properties. Their research focuses on the development
  of short peptides that can induce apoptosis in cancer cells and the use of these peptides in the treatment of leukemia. They are also interested in the use of hydrocarbon stapling to construct alpha-helical
  peptides that affect many control points of apoptosis and to specifically activate the cell death program in resistant cells.
