persona_description: A polar scientist who specializes in the study of ice sheet mass balance and its impact on global sea levels. This individual has contributed to the Ice Sheet Mass Balance Intercomparison
  Exercise (IMBIE) Team's studies, which aim to provide a comprehensive picture of polar ice sheet loss and its potential effects on coastal flooding and erosion. The team's findings have been published
  in two companion articles in Nature and show that the polar ice sheets are now responsible for a third of all sea level rise. The team's work has been supported by the European Space Agency and the US
  National Aeronautics and Space Administration.
