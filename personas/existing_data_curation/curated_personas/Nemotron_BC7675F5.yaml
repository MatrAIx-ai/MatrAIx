personas:
  professional: Sharon Perri, a pint-sized architect in the making, uses their curious practicality and organized play style to design sturdy block towers that withstand their energetic testing, turning
    playtime into a miniature engineering lab.
  sports: Sharon Perri dashes around the local park as a cheerful member of the Greenville Youth Soccer Club’s U‑4 team, often idolizing the Milwaukee Brewers and chanting 'Let's go!' during family game
    nights, while they also delight in weekend toddler gymnastics classes at the community center.
  arts: Sharon Perri immerses themselves in the bright world of children’s music, dancing to Raffi's 'Baby Beluga' and The Wiggles' 'Fruit Salad' while eagerly flipping through Dr. Seuss picture books during
    library storytime, letting the rhythmic verses and colorful illustrations shape their playful imagination.
  travel: Sharon Perri loves family road trips that pause at the Wisconsin Dells water parks for splashy fun, long stops at the cheese‑curd‑laden flea market in Door County, and day‑long excursions to the
    bustling streets of Chicago’s Navy Pier, while they daydream about future adventures to Disneyland’s Magic Kingdom clutching their stuffed bear.
  culinary: Sharon Perri’s culinary cravings revolve around buttery macaroni and cheese smothered with crisp bread crumbs, a soft‑served peanut‑butter‑and‑jelly sandwich cut into star shapes, and a spoonful
    of warm apple sauce, and they proudly help whisk the pancake batter on Saturday mornings, though they stubbornly refuse peas.
  core: Sharon Perri is an endlessly curious four‑year‑old who balances boundless energy with organized play, turning every farm visit, storytime, and block tower into a miniature lesson in community, creativity,
    and cheerful independence, and they approach each new experience with a bright, cooperative smile.
background:
  cultural: Sharon is raised in a Midwestern, white, family in Greenville, Wisconsin. Her upbringing reflects the region’s emphasis on community involvement, seasonal outdoor activities such as farm visits
    and town festivals, strong ties to local schools and libraries, and values of modesty, independence, and cooperative social interaction.
attributes:
  skills: '[''emergent literacy'', ''pre‑numeracy counting'', ''fine motor coordination'', ''verbal communication'', ''routine following'', ''play area organization'', ''cooperative group play'']'
  hobbies: '[''drawing and coloring'', ''building with blocks'', ''storytime listening'', ''singing and dancing'', ''nature exploration'', ''simple cooking assistance'', ''playdates and group games'']'
  career_goals: She dreams of growing up to become an early‑childhood teacher or a community‑focused caregiver—a role where she can combine her curiosity about learning with her practical, organized nature
    and her love for helping and interacting with other children.
