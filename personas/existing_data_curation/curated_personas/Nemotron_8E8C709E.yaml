  hobbies: '[''Exploring the woods'', ''Rock and pinecone collecting'', ''LEGO building'', ''Scratch programming'', ''Chess and checkers'', ''Playing the recorder'', ''Watercolor painting of Appalachian
    hills'', ''Baking cookies with mother'', ''Fishing on the Ohio River with dad'', ''Reading adventure books (e.g., Magic Tree House)'', ''Attending county fair and church youth group events'']'
  career_goals: Lisa dreams of a future where she works with her hands and helps living things. She hopes to become a veterinarian so she can care for animals in a practical, hands‑on way, and she also
    envisions herself as a carpenter or builder, constructing homes in her Appalachian community. A secondary ambition is to join a youth soccer team and win a state championship, reflecting her competitive
    drive. In the long term she wishes to combine her love for nature and practical skills by promoting environmental stewardship in rural West Virginia.
