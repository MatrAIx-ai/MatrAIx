  career_goals: Gloria aims to advance within the hospitality industry by first securing a front‑desk supervisory role, followed by a position as hotel operations manager within the next five years. She
    plans to complete her bachelor's degree in hospitality management, leveraging evening courses offered by a local community college. Long‑term, she aspires to open a boutique hotel or B&B that highlights
    Black art, music, and cuisine, creating a space where travelers can experience the rich cultural heritage of Austin’s African‑American community. Additionally, she seeks certification in event planning
    to broaden her skill set and to curate community‑focused cultural events at her future property.
