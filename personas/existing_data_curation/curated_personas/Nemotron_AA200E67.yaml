personas:
  professional: Gloria Thomas is a seasoned front‑desk clerk at a bustling Austin hotel, leveraging her meticulous record‑keeping, bilingual communication, and natural curiosity to craft personalized guest
    experiences while mentoring staff and preparing for a supervisory role.
  sports: Gloria Thomas follows Austin FC in MLS, cheers for the Texas Longhorns football team each fall, stays active by hiking Hill Country trails on weekends, cross‑training with the Austin Trail Club’s
    weekly runs, and practicing Vinyasa yoga to maintain flexibility and stress resilience.
  arts: Gloria Thomas immerses herself in Austin’s vibrant arts scene, attending gallery openings featuring local painters like Deborah Ellis, listening to live shows by Leon Bridges, dancing to the soulful
    rhythms of Beyoncé, and sharing Black history as a docent at the Texas African American Museum, which fuels her creative outlook.
  travel: Gloria Thomas blends meticulous itinerary planning with a love for spontaneous discovery, having explored the Hill Country wineries, attended a music festival in New Orleans, taken a cultural
    tour of Barcelona, and now dreams of a culinary pilgrimage to Dakar, Senegal while balancing travel costs with her savings goals.
  culinary: Gloria Thomas enjoys cooking at an advanced level, regularly crafting fusion dishes such as harissa‑spiced shrimp and grits, collard greens seasoned with Nigerian suya spice, and ginger‑infused
    sweet potato pie, while sourcing ingredients like smoked paprika and kamut at Austin’s farmers’ markets and curating themed dinner parties for friends.
  core: Gloria Thomas is a methodical hospitality professional whose curiosity for art and community intertwines with disciplined financial planning, active wellness habits, and a penchant for blending
    Southern comfort with African flavors, all while occasionally splurging on gallery nights and forgetting to schedule dentist appointments.
background:
  cultural: Gloria is an African‑American woman who grew up in a close‑knit Black community in Dallas before moving to Austin for work. Her cultural identity is shaped by Southern Black traditions, including
    gospel music, storytelling, and soul food, as well as a deep appreciation for the legacy of Black artists such as Romare Bearden and contemporary creators in Austin. She actively participates in local
    Juneteenth celebrations, Afro‑centric art festivals, and church gatherings, which reinforce her commitment to community service and hospitality. This cultural grounding influences her approach to guest
    relations, infusing her work with empathy, respect, and a desire to showcase the richness of Black heritage to visitors.
