  hobbies: '[''metal sculpture'', ''community art workshops'', ''drum circle/gospel music'', ''STEM mentorship'', ''hands-on robotics clubs'', ''jogging'', ''gardening'', ''Southern soul-food cooking'',
    ''attending local festivals'']'
  career_goals: Cree aims to step into a senior leadership role such as Lead Maintenance Supervisor or Plant Operations Manager within the next five years, where she can shape strategic maintenance programs,
    introduce new automation technologies, and champion a culture of safety and continuous improvement. She plans to earn the Certified Maintenance & Reliability Professional (CMRP) credential and enroll
    in a part-time Master's program in Engineering Management. Long term, she envisions establishing a mentorship pipeline for women of color in industrial trades and spearheading sustainability initiatives
    that reduce energy consumption in refractory processes.
