personas:
  professional: Cree Mariney is a veteran industrial maintenance specialist with three decades of expertise in high‑temperature machinery, advanced diagnostics, CNC programming, and TIG/MIG welding, whose
    methodical, organized mindset, critical eye for inefficiencies, and curiosity for artistic solutions drive continuous‑improvement projects and mentorship of junior technicians while they competitively
    pursue a senior leadership role in plant operations.
  sports: Cree Mariney jogs three times a week with the Warner Robins Running Club, plays summer softball in a community league, cheers on the Atlanta Falcons and Atlanta Braves, and stays fit with seasonal
    yoga sessions, all while channeling their competitive spirit into personal best times and friendly team rivalries.
  arts: Cree Mariney blends mechanical skill and creative vision by sculpting welded metal pieces displayed at the Warner Robins Cultural Arts Center, drumming in a gospel‑and‑jazz circle that honors Aretha
    Franklin and John Coltrane, and drawing inspiration from local artist Mike Madison, which fuels their curiosity and keeps them socially engaged at weekly art workshops.
  travel: Cree Mariney enjoys road‑tripping to New Orleans for its jazz heritage, hiking the Great Smoky Mountains, exploring Washington D.C.’s civil‑rights landmarks, and plans a future visit to Savannah’s
    historic squares, driven by curiosity to uncover lesser‑known cultural sites while balancing budget constraints with a desire for enriching experiences and using loyalty points for flights when possible.
  culinary: Cree Mariney loves cooking soul‑food classics such as collard greens, black‑eyed peas, fried catfish, and peach cobbler, often seasoning dishes with garden‑grown herbs and experimenting with
    a custom‑built metal grill, while they occasionally overindulge at Southern food festivals and admit to forgetting to stretch the dough for biscuits on busy weeks, a habit that reflects their sociable
    love of sharing meals despite occasional lapses in meticulousness.
  core: Cree Mariney is a disciplined, curiosity‑driven maintenance veteran who balances metal art, community mentorship, and soulful Southern traditions while competitively chasing leadership and quietly
    battling the occasional health and budgeting hiccup.
background:
  cultural: Cree grew up in a close-knit African American community in central Georgia, where church, family gatherings, and storytelling were central to daily life. The rich traditions of gospel music,
    soul food, and community resilience shaped her values of perseverance and collective support. Her grandparents' involvement in the civil-rights movement instilled a sense of pride and responsibility
    that fuels her advocacy for women and minorities in technical fields. While adapting to the diverse, military-influenced environment of Warner Robins, she blends Southern cultural customs such as Saturday
    barbecues and neighborhood potlucks with a progressive outlook, celebrating both her heritage and the new ideas she encounters through art and technology.
