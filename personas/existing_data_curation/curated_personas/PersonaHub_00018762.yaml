persona_description: A German architect who was a pioneer of the Gothic Revival in his homeland, known for his influential publications on Gothic architecture, particularly his work on the German timber-framed
  construction. His designs include churches and town and country houses, and his studies of German timber-framed buildings were published posthumously as folios in Berlin. His work had a significant influence
  on the development of Gothic architecture in Germany.
