personas:
  professional: Caesar Dedeaux, a meticulous handyman and part‑time community event coordinator, leverages their carpentry, plumbing, electrical troubleshooting, and budgeting expertise in a methodical,
    schedule‑driven approach that eases their anxiety while ensuring reliable, low‑stress service for neighbors.
  sports: Caesar Dedeaux passionately follows the Memphis Grizzlies and Redbirds, plays in a community adult softball league each spring, and carves out early‑morning jogs along the Mississippi River trail
    to offset their sedentary repair work, though their worry about injury often limits the intensity of their workouts.
  arts: Caesar Dedeaux frequently immerses themselves in the soulful sounds of B.B. King, Albert King, and the Preservation Hall Jazz Band at local blues venues, while also reading practical non‑fiction
    by authors like Tim Ferriss and James Clear to feed their strategic curiosity.
  travel: Caesar Dedeaux prefers meticulously planned road trips through the Southern music corridor, revisiting New Orleans for its historic jazz clubs, Nashville’s honky‑tonk bars, and Austin’s famed
    BBQ festivals, all while balancing a modest travel budget that prioritizes fuel, budget lodging, and culinary experiences over luxury, allowing them to satisfy both their love of music and their need
    for structured itineraries.
  culinary: Caesar Dedeaux is an advanced pitmaster who perfects Memphis‑style ribs using a signature rub of smoked paprika, brown sugar, and cayenne, masters brisket smoking with hickory chips, and often
    incorporates fresh heirloom tomatoes and sweet corn from their garden into vibrant side dishes.
  core: Caesar Dedeaux is a detail‑obsessed 48‑year‑old handyman whose love for blues, barbecue, and community is balanced by a persistent anxiety that drives their disciplined routines, occasional over‑cautiousness,
    and desire for solitary creativity.
background:
  cultural: Caesar is an African American who grew up in Memphis, Tennessee, and his identity is shaped by the city’s deep blues heritage, soul‑food traditions, and the strong communal bonds of the Black
    church. He carries forward family stories of the civil‑rights era and values the resilience and solidarity of his neighborhood. Seasonal community festivals, church gatherings, and shared meals featuring
    Memphis‑style barbecue are central cultural touchstones that inform his worldview and daily life.
attributes:
  skills: '[''Home repair (plumbing, electrical, carpentry)'', ''Automotive maintenance'', ''Community event coordination'', ''Budgeting and financial planning'', ''Computer literacy (Microsoft Office,
