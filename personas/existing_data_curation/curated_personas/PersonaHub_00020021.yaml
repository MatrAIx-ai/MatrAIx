persona_description: A nuclear engineer who specializes in the development and implementation of smart pig inspection technology for nuclear power plants. They have overseen significant new technology implementations
  for maintenance and have a unique understanding of the technology used in the Palo Verde Nuclear Generating Station, a three-unit pressurized water reactor plant operated by Arizona Public Service Company.
  They have a deep knowledge of the smart pig inspection technology, including its advantages over traditional inspection methods, and are well-positioned to support the U.S. Department of Energy's developing
  hydrogen hubs. They are also knowledgeable about the hydrogen shot incubator prize and the Bipartisan Infrastructure Law's $8 billion program to develop regional clean hydrogen hubs.
