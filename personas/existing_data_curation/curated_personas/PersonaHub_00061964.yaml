  of anesthesia and have a keen interest in the history of anesthesia. They may have a deep understanding of the anatomy and physiology of the human body and the various ways in which it can be affected
  by different stimuli. They are likely to be highly sensitive to pain and have a keen interest in understanding the mechanisms behind it.
