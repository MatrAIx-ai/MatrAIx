  career_goals: Angelo aims to obtain his Certified Public Accountant (CPA) license within the next two years, which he views as the gateway to senior‑level responsibilities. He aspires to move into an
    audit manager role, overseeing a small team of associates, and eventually transition to a finance director position within a regional corporation or a community bank. He is interested in deepening his
    expertise in forensic accounting and tax planning, allowing him to provide higher‑value advisory services to his clients. While career advancement is important, Angelo also seeks a role that offers
    a predictable schedule and the flexibility to maintain a healthy work‑life balance, especially as he navigates post‑divorce life. He envisions one day establishing his own boutique accounting practice
    that serves small businesses in Mineral County and the broader Appalachian region.
