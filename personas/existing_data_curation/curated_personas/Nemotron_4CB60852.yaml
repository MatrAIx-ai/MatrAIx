  hobbies: '[''Salsa and bachata dancing'', ''Volunteering at cultural center'', ''Cooking traditional Puerto Rican dishes'', ''Yoga and mindfulness meditation'', ''Reflective journaling'', ''Urban photography'',
    ''Reading contemporary Caribbean literature'', ''Exploring coffee shops with friends'']'
  career_goals: Carmen aspires to become a store manager within the next two years, aiming to lead a team with structure and empathy. She plans to enroll in a Retail Management certification program and
    attend workshops on leadership, strategic planning, and employee development. She wants to improve her data‑analysis skills to better track sales trends. In the longer term, she envisions opening a
    boutique that showcases Caribbean‑inspired fashion and crafts, creating a community hub that celebrates Puerto Rican culture. Additionally, she is interested in a role that merges retail expertise with
    community outreach, such as coordinating cultural events or mental‑health awareness programs for the Puerto Rican diaspora, leveraging her own experience with anxiety to support others.
