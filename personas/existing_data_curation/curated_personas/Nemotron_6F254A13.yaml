personas:
  professional: Khadijah Ott, a seasoned interior painter and paperhanger in Lancaster County, blends meticulous surface preparation and color consultancy with an infectious energy that rallies crews, while
    her love of structure keeps projects on schedule even as her spontaneous flexibility lets her adapt to client whims.
  sports: Khadijah Ott stays fit by attending weekly Zumba classes at the Lancaster Community Center, walking the countryside trails, and cheering on the Philadelphia Eagles and Philadelphia 76ers, while
    she also participates in a local line‑dancing club that meets every Thursday.
  arts: Khadijah Ott nurtures her artistic side through vibrant mural projects inspired by the works of Jacob Lawrence and Kehinde Wiley, sings gospel classics like 'Take My Hand, Precious Lord' in her
    church choir, and finds fresh visual ideas while listening to the soulful playlists of Janelle Monáe and Kendrick Lamar.
  travel: Khadijah Ott prefers weekend road trips that blend cultural immersion and culinary discovery, having explored the historic streets of Savannah, the jazz scene of New Orleans, and the farm‑to‑table
    markets of Asheville, while she dreams of a spring visit to the vineyards of Tuscany to study traditional fresco techniques.
  culinary: Khadijah Ott’s cooking revolves around soulful dishes like smoked collard greens with ham hocks, pan‑seared catfish with a cornmeal crust, and sweet potato pie spiced with ginger and nutmeg,
    often using heirloom tomatoes and fresh herbs from her own garden to elevate each family dinner.
  core: Khadijah Ott fuses a meticulous trade craft with a spontaneous love for music and community, often juggling multiple paint projects while forgetting to water her garden until the last minute, yet
    her boundless energy and assertive kindness keep both walls and relationships vividly alive.
background:
  cultural: Khadijah’s cultural roots trace back to the Great Migration, when her grandparents moved from the rural South to Pennsylvania seeking better opportunities. Growing up in Lancaster’s historic
    African‑American neighborhood, she was immersed in church life, gospel music, and community gatherings that emphasized mutual support and resilience. Family traditions include soulful cooking, story‑telling,
    and a deep respect for craftsmanship—values that naturally dovetailed with her chosen trade. She identifies strongly with Black womanhood in a predominantly male field, using that perspective to advocate
    for diversity in skilled trades. Local celebrations such as the Lancaster African‑American Heritage Festival and the annual Juneteenth parade reinforce her connection to cultural history, while contemporary
    Black art and music inspire her creative expression both on the job and in her personal artwork.
