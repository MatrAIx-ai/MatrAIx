  hobbies: '[''Church Choir'', ''Community Youth Art Volunteering'', ''Canvas Painting'', ''Mural Creation'', ''Line Dancing'', ''Salsa Dancing'', ''Soul Food Cooking'', ''Farm‑to‑Table Market Exploration'',
    ''Gardening'', ''Zumba Classes'', ''Countryside Walking'', ''Reading Contemporary Fiction'', ''Attending African‑American Cultural Festivals'']'
  career_goals: Khadijah aims to transition from employee to business owner, establishing her own painting and paper‑hanging company that serves Lancaster County and the surrounding region. She plans to
    obtain a Pennsylvania Home Improvement Contractor license and pursue certification in decorative finishes, such as faux painting and mural techniques. A long‑term ambition is to create a series of community
    murals that celebrate African‑American history in Lancaster, earning recognition for both artistic merit and cultural impact. She also wants to develop a mentorship program that encourages more women
    and people of color to enter skilled trades, providing on‑the‑job training and career guidance. Financially, she targets steady revenue growth that allows her to hire a small, diverse crew and expand
    services to include light residential renovations. Through networking with local unions and trade associations, she hopes to become a respected leader in the regional construction community.
