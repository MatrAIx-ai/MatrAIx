  career_goals: Driven by a competitive spirit and a love for new experiences, Hien aims to advance to a lead purser or flight‑attendant trainer role within the next three to five years, where she can mentor
    new crew members and shape safety and service standards. She plans to finish her bachelor's degree in hospitality or tourism management, leveraging her academic background to transition into an airline
    operations or customer‑experience management position that offers more structured schedules. Parallel to her professional trajectory, Hien is building a travel‑and‑art blog that showcases emerging artists
    and cultural sites she encounters, hoping to turn this creative outlet into a recognized portfolio that could open doors to freelance photography or cultural consultancy work.
