personas:
  professional: Madison Gletty is a diligent health information specialist who leverages in‑depth knowledge of Epic, Cerner, HIPAA compliance, ICD‑10 coding, and SQL reporting to streamline medical record
    workflows, while their curiosity for unconventional ideas and competitive drive fuels continuous process improvement and underpins ambitions to become a chief health information officer.
  sports: Madison Gletty enjoys solitary early‑morning runs through Lexington’s Oakwood Park, participates as an active member of the Lexington Road Runners club, follows the University of Kentucky Wildcats
    basketball season closely, and prefers low‑impact cardio over team sports, using running as a structured yet flexible outlet for both organization and stress relief.
  arts: Madison Gletty finds solace in sketching watercolors at Lexington’s Distillery District, drawing inspiration from contemporary painter Yayoi Kusama’s bold motifs and Sufjan Stevens’s lyrical folk
    sounds, while regularly attending gallery openings featuring emerging Canadian artists and engaging in a modest book club that discusses works by Haruki Murakami and Simone de Beauvoir.
  travel: Madison Gletty plans travel meticulously, favoring weekend art‑focused trips such as a museum‑laden visit to Washington, D.C., and a solo retreat in Asheville’s Blue Ridge Mountains, while dreaming
    of a cultural immersion in Kyoto, Japan, balancing post‑graduation budget constraints with a love for low‑cost hostels, public transit, and detailed itineraries.
  culinary: Madison Gletty enjoys crafting simple yet flavorful dishes like quinoa‑basil salad topped with roasted cherry tomatoes and grilled salmon, experimenting with seasonal ingredients such as butternut
    squash in a creamy risotto, and frequently treating themselves to artisanal coffee and matcha lattes at Lexington’s third‑wave cafés, though late‑night puzzle sessions sometimes lead to skipped meals
    and takeout sushi orders.
  core: Madison Gletty is a quietly ambitious health informatics enthusiast who balances solitary watercolor painting, puzzle‑solving, and a competitive drive to master data, yet occasionally sacrifices
    sleep for late‑night crosswords.
background:
  cultural: Madison grew up in a middle‑class suburban neighborhood of Lexington, Kentucky, immersed in the region’s blend of Southern hospitality and a progressive college‑town vibe thanks to the University
    of Kentucky’s cultural influence. Her family’s values reflect a mix of traditional Kentucky customs—such as appreciation for local horse racing events and community gatherings—combined with a modern,
    skeptical outlook that encourages independent thinking. While she was raised in an environment that emphasizes self‑reliance and modest social circles, she also benefitted from Lexington’s growing arts
    scene, which nurtured her appreciation for unconventional ideas and artistic expression.
attributes:
  skills: '[''Electronic Health Record (EHR) management'', ''HIPAA compliance'', ''Medical coding (ICD-10 and CPT)'', ''Data entry and quality assurance'', ''Health information systems analysis'', ''Patient
    data confidentiality protocols'', ''Office administration'', ''Analytical problem solving'', ''Basic SQL querying'']'
  hobbies: '[''Sketching and watercolor painting'', ''Visiting local art galleries'', ''Reading contemporary fiction and philosophy'', ''Solving jigsaw puzzles and crosswords'', ''Exploring indie podcasts
    on science and culture'', ''Running in the park'', ''Volunteer work at animal shelter'', ''Attending small book club meetings'']'
  career_goals: Madison aims to deepen her knowledge of health informatics by pursuing an RHIA certification and an associate degree in health information management. She aspires to transition into a health
    data analyst role where she can apply her curiosity for new ideas to develop data‑driven solutions that improve patient care. In the long term, she sees herself leading a medical records department
    or becoming a chief health information officer, leveraging her competitive drive to implement innovative record‑keeping technologies and streamline information flow across the hospital network.
