personas:
  professional: Ramon Andrade is a budding digital artist and TikTok content creator who merges hand‑sketched doodles with animated beats, leveraging his curiosity to experiment with visual storytelling
    while often juggling schoolwork and art projects in a delightfully disorganized fashion.
  sports: Ramon Andrade is a lively soccer enthusiast who joins pick‑up games at the local park, plays for a youth league team affiliated with the Inter Miami CF academy, and roots for the Miami Heat during
    basketball season, while also following the MLS season and dreaming of a future scholarship.
  arts: Ramon Andrade is a sketch‑loving teen who spends weekends exploring Wynwood’s vibrant street‑art murals, channels the bold colors of artists like Banksy and the rhythmic flair of reggaeton stars
    such as J Balvin and Bad Bunny into his digital illustrations, and curates short TikTok videos set to Colombian cumbia and modern urban beats.
  travel: Ramon Andrade dreams of weekend getaways to Miami Beach’s art deco district, road trips to the Everglades for wildlife photo ops, and hopes to one day backpack through Cartagena’s historic streets
    and Buenos Aires’ tango salons, balancing his school schedule and family budget with careful trip planning.
  culinary: Ramon Andrade is a budding home chef who helps his family make crunchy empanadas filled with beef and sweet arepas de queso, enjoys experimenting with chorizo‑spiced tacos al pastor and mastering
    the art of salsa verde, yet often forgets to clean the kitchen promptly, leading to a cluttered countertop that fuels his next culinary experiment.
  core: Ramon Andrade, a 15‑year‑old art‑obsessed, soccer‑driven, and flavor‑curious teen, blends a curious, sociable spirit with a relaxed, sometimes chaotic approach to creativity, finances, and health.
background:
  cultural: Ramon is a first‑generation Colombian‑American raised in Hialeah, Florida. His parents emigrated from Medellín and keep many Colombian traditions alive at home—celebrating Carnaval de Barranquilla,
    cooking family recipes such as sancocho, arepas, and empanadas, and speaking Spanish daily. Growing up in a vibrant Hispanic neighborhood, he navigates a bicultural identity that blends his Colombian
    heritage with the broader Afro‑Latino influences of Miami‑Dade County. He regularly attends local Colombian community events, participates in church celebrations, and feels a strong connection to the
    rhythms of vallenato, salsa, and reggaeton. This hybrid cultural upbringing gives him a unique lens for appreciating art, music, and social interactions.
