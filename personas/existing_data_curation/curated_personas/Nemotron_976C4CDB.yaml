  hobbies: '[''Sketching'', ''Digital art creation'', ''TikTok video production'', ''Soccer'', ''Listening to Colombian music'', ''Cooking Colombian dishes'', ''Exploring street murals'', ''Learning guitar'']'
  career_goals: Ramon hopes to turn his passion for visual art, music, and community into a career in multimedia storytelling. He plans to pursue a college degree in graphic design or digital media, building
    a portfolio that blends Colombian motifs with contemporary urban style. In the long term, he envisions working as a freelance illustrator, videographer, or cultural event coordinator, collaborating
    with local nonprofits, schools, and music festivals to create murals, promotional videos, and digital campaigns. He also keeps open the possibility of playing soccer at the collegiate level, seeing
    athletics as a way to stay connected with friends and his community while maintaining flexibility in his professional path.
