persona_description: A poet and essayist who is known for her sharp-tongued humor and cleverly amusing prose, Dorothy Parker was a prolific writer who accomplished more in her lifetime than the general
  public could hope for in one year. Her poetry consists of tributes to loves lost and life lessons. Her poem "Men" is a collaboration of all of Dorothy Parker's thoughts and experiences with males, and
  overall how she has become a stronger person for realizing and admitting this in the line "They make of you another person."
