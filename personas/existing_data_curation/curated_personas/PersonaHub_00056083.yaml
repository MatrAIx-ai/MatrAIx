persona_description: A developmental psychologist who specializes in the study of attachment and containment processes in infancy and childhood, particularly how early experiences of containment enable
  children to think and manage raw experience and emotion. They are interested in the neurobiological underpinnings of these processes and how disruptions to containment can affect all areas of development.
  They have a deep understanding of the similarities between attachment and containment processes and use language in their discussions that reflect the human experience of uncontainment.
