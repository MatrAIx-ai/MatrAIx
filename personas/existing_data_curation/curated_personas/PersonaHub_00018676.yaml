persona_description: A historian and curator who specializes in the study of American houses and gardens, with a particular interest in the work of Frances Benjamin Johnston and her collection of photographs.
  They have a strong interest in the history of gardening and the evolution of American gardens from the early 1900s to the present day. They have spent years digging through libraries and archives to track
  down the details of the Johnston's collection and have a deep understanding of the challenges and techniques of early 20th century gardeners. They are also an expert on the use of water and energy in
  early 20th century gardens and have a unique perspective on the intersection of art and science in the field of gardening.
