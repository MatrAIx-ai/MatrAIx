personas:
  professional: Miguel Santos, a 27‑year‑old CNC and welding specialist at a mid‑size manufacturing plant, channels their routine‑driven discipline into leading the shift’s quality‑control protocols, troubleshooting
    CNC milling and MIG/TIG welding operations, mentoring bilingual crews, and preparing for Six Sigma and CNC programming certifications.
  sports: Miguel Santos captains a local adult soccer team in the North County Amateur League, rushes to Fenway Park to cheer on the Boston Red Sox whenever a home game aligns with their weekend, and maintains
    a disciplined strength‑training routine at a downtown CrossFit box where they log deadlifts and squats five times a week.
  arts: Miguel Santos immerses themselves in salsa nights featuring Victor Manuelle, enjoys the rhythmic poetry of Calle 13, and never misses the annual Boston Calling Music Festival where they catch emerging
    indie acts alongside favorite Latin pop stars.
  travel: Miguel Santos prefers short road trips to nearby coastal towns like Cape Cod and the historic streets of Portsmouth, New Hampshire, has visited the vibrant markets of San Juan for a weekend, and
    dreams of a future workshop‑tour in Monterrey, Mexico, while balancing travel plans with a modest budget and a tight work schedule.
  culinary: Miguel Santos often crafts mofongo with fried green plantains, chicharrón, and a garlic‑rich sofrito, pairs it with arroz con gandules seasoned with sazón and annatto oil, and hones their kitchen
    skills by experimenting with homemade tostones and a smoky charcoal‑grilled pork shoulder, revealing a talent for traditional flavors and a penchant for occasional over‑seasoning.
  core: Miguel Santos blends relentless routine‑driven craftsmanship with a love for spontaneous salsa nights, never lets a missed deadline slip, yet secretly hoards vintage vinyl records on the back shelf
    of their garage workshop.
background:
  cultural: Miguel is a first‑generation American of Puerto Rican descent. Raised in Springfield’s vibrant Latino community, he grew up bilingual in Spanish and English and maintains strong family ties.
    Puerto Rican traditions—such as celebrating Nochebuena, enjoying salsa, reggaetón, and bomba music, and sharing meals like arroz con gandules—shape his social life and values. His cultural heritage
    emphasizes community, hard work, respect, and hospitality, which he integrates into his daily routines, teamwork at the shop, and volunteer activities.
attributes:
  skills: '["CNC machining", "MIG/TIG welding", "Metal fabrication", "Blueprint reading", "Injection molding operation", "Mold maintenance", "Quality control and inspection", "Lean manufacturing principles",
    "OSHA safety compliance", "Equipment troubleshooting", "Inventory management", "Team leadership and training", "Bilingual communication (Spanish/English)"]'
  hobbies: '["Soccer (local league)", "Salsa dancing", "Cooking Puerto Rican cuisine", "DIY metalworking projects", "Gym/weight training", "Volunteer mentoring at youth center", "Attending community festivals",
    "Watching baseball (Boston Red Sox)"]'
  career_goals: Miguel aims to obtain certifications in CNC programming and welding supervision within the next two years, positioning himself for a shift‑supervisor role. He plans to lead process‑improvement
    initiatives, earn a Six Sigma Green Belt, and eventually manage a production team that consistently meets high‑quality standards. Long‑term, he aspires to open his own small‑scale metal and plastic
    fabrication shop that serves the local community, combining his technical expertise with his desire for stable, routine‑driven work and a reputation for craftsmanship.
