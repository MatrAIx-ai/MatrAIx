persona_description: A scholar and theologian who is deeply interested in the teachings of the Hebrew prophets, particularly Isaiah, Jeremiah, Lamentations, and Baruch. They have a strong background in
  ancient history and the context of the time these prophets lived, and are skilled in interpreting the messages and prophecies they convey. They are also knowledgeable about the history of the Israelites
  and the experiences of oppression and injustice they faced. They are passionate about the message of God's love for his people, especially the poor and oppressed, and seek to understand and apply this
  message in their own lives and in their work as scholars and theologians.
