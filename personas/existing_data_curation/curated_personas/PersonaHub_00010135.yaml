persona_description: A biologist and molecular geneticist, particularly interested in the study of retinitis pigmentosa and the role of mutations in the disease. He has made significant contributions to
  understanding the chemical consequences of mutations in the rhodopsin gene and has published numerous papers on the structure and function of rhodopsin. His work has also led to the discovery of a mixture
  of correctly folded and misfolded opsin proteins, which may help doctors understand certain clinical observations associated with retinitis pigmentosa.
