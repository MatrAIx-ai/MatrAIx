personas:
  professional: Kevin Brown, an aspiring junior astronomer who builds LEGO rockets, sketches vivid space scenes, and devours picture books about planets, channels his boundless curiosity and love of unconventional
    ideas into early scientific exploration.
  sports: Kevin Brown, a member of the neighborhood under‑8 soccer squad and an ardent fan of the River City Raptors baseball team, spends his afternoons sprinting in games of tag, hopping through hopscotch
    grids, and warming up by collecting rocks for a quick handheld workout.
  arts: Kevin Brown, a regular at weekend art workshops at the local library, loves drawing bright, fantastical creatures, constructing intricate LEGO sculptures, and drawing inspiration from the playful
    illustrations of Dr. Seuss and the bold patterns of Yayoi Kusama, often translating those styles into his homemade slime experiments.
  travel: Kevin Brown, who delights in family road trips to places like Redwood Forest National Park and the sandy shores of Seaside Beach, prefers hands‑on exploration over guided tours, often collecting
    rocks and insects as souvenirs, and dreams of one day visiting the Kennedy Space Center to see rockets up close.
  culinary: Kevin Brown, an enthusiastic young chef who can reliably assemble a peanut‑butter‑and‑jelly sandwich, relishes dinosaur‑shaped chicken nuggets, strawberry‑banana smoothies, and carrot sticks
    dipped in hummus, and occasionally experiments with edible slime made from gelatin and fruit juice.
  core: Kevin Brown, a curiosity‑driven 7‑year‑old who turns backyard rock hunts into art projects, hoards colorful slime jars, forgets to tidy up his LEGO builds, and lives by the motto ‘Why not?’.
background:
  cultural: Kevin was raised in Fresno, a small community in Brazoria County, Texas, within a family that values Southern hospitality, community gatherings, and a modest rural lifestyle. His upbringing
    includes celebrating traditional holidays such as Thanksgiving and Fourth of July fireworks, attending weekly church services, and participating in local events like the county fair and community picnics.
    Through school and family trips, he has been exposed to regional art programs and occasional visits to Houston museums, which nurture his appreciation for creativity while grounding him in the friendly,
    collaborative spirit of his Texas hometown.
