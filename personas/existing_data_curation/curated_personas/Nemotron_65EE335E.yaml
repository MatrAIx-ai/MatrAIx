  career_goals: Kevin dreams of a future where he can blend his love of art and discovery. He often talks about becoming an astronaut‑artist who paints the planets he visits, a comic‑book illustrator who
    tells adventurous stories, or a creative inventor who designs fun toys and games for other kids. He also hopes to share his passion for art by teaching younger children in a community center someday.
