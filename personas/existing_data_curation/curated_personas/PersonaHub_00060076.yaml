persona_description: A history professor who is fascinated by the life and teachings of Gottschalk of Orbais, a ninth-century religious outlaw who was considered a troublemaker by the Carolingian church.
  His research interests include the theological underpinnings and assumptions shaping people's lives in the Carolingian Empire, and the study of group theory and subgroups in the context of the Carolingian
  Empire's religious endeavors. He is known for his fascination with the life of Gottschalk of Orbais, and his research has led him to explore the strange and disturbing aspects of Carolingian thought.
