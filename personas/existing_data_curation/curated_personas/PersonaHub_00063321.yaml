persona_description: Lisa Perry, a Registered Dietitian Nutritionist, who specializes in creating recipes that promote healthy lifestyle choices, including diet choices, life choices, and planet choices.
  Her goal is to achieve zero hunger worldwide through healthier communities, and she encourages readers to add fruits, vegetables, and whole grains, limit highly processed foods, eat more meals at home,
  exercise more often, learn to read labels, eat more local and sustainable foods, eat sustainably sourced fish, and store food properly to keep it safe and waste less.
