personas:
  professional: Paola Depaz is a meticulous criminal investigator with a forensic science degree who excels at evidence collection, digital forensics using SQL and Python, and courtroom testimony, applying
    her organized, routine‑driven mindset to keep case files impeccably documented and her interview techniques culturally sensitive.
  sports: Paola Depaz hikes the Santa Cruz Mountains on weekends, runs with the Silicon Valley Runners club for her 5K training, and cheers for the San Jose Earthquakes and the Golden State Warriors while
    fitting yoga sessions into her weekly routine.
  arts: Paola Depaz immerses herself in crime novels by Michael Connelly, enjoys the soulful guitar of Carlos Santana, admires the vibrant paintings of Frida Kahlo, and attends performances at the San Jose
    Repertory Theatre, often discussing the stories over homemade pozole with friends.
  travel: Paola Depaz plans trips with detailed itineraries, has explored Napa Valley’s vineyards, trekked Yosemite’s Mist Trail, spent a weekend sampling street food in Oaxaca, and dreams of wandering
    Kyoto’s historic temples, balancing solo adventures with occasional family reunions.
  culinary: Paola Depaz perfects hand‑made tamales, mole poblano, and hearty pozole using dried chilies, epazote, masa harina, and roasted pumpkin seeds, cooks at a professional level in her backyard kitchen,
    enjoys occasional sushi at La Mar, but occasionally indulges in late‑night pizza after a demanding shift.
  core: Paola Depaz merges forensic precision with a passion for traditional cooking, solves puzzles before bedtime, adheres to strict budgets, yet can’t resist a late‑night slice of pizza when the case
    files are closed.
background:
  cultural: Paola is a first‑generation Mexican‑American who grew up in a bilingual household in the Bay Area. Her family places strong emphasis on close‑knit relationships, respect for elders, and Catholic
    traditions, celebrating holidays like Día de los Muertos and Las Posadas with vibrant customs and home‑cooked meals. This cultural foundation instilled in her a deep sense of community responsibility
    and empathy for immigrant and Spanish‑speaking populations. Fluent in both Spanish and English, Paola often serves as a cultural liaison in investigations, ensuring clear communication and culturally
    sensitive handling of cases. Her Mexican heritage influences her values of hard work, practicality, and loyalty, which she integrates into her professional life as a detective committed to justice and
    public service.
attributes:
  skills: '[''Forensic evidence collection'', ''Crime scene documentation'', ''Digital forensics'', ''Data analytics (SQL, Python)'', ''Interviewing and interrogation'', ''Case management'', ''Report writing'',
