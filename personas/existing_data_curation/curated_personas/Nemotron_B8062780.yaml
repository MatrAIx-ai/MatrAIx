  hobbies: '[''Cooking traditional Mexican dishes'', ''Gardening'', ''Hiking in local trails'', ''Puzzle solving (crosswords, Sudoku, escape rooms)'', ''Reading crime novels'', ''Yoga and meditation'',
    ''Participating in cultural festivals'']'
  career_goals: Paola aims to advance to a senior detective or lead investigator position within the Santa Clara County Sheriff's Office, focusing on cybercrime and digital forensics where her technical
    expertise can be maximized. She plans to obtain certifications such as Certified Crime Scene Investigator (CCSI) and Certified Computer Examiner (CCE) to deepen her specialized skill set. In the medium
    term, she hopes to mentor new investigators, develop streamlined investigative protocols, and lead community outreach programs that build trust with Spanish‑speaking residents. Long‑term, she envisions
    a supervisory role in a forensic laboratory or a transition into a criminal justice educator, allowing her to share practical knowledge while maintaining a stable routine that supports her family life.
