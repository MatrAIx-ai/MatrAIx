personas:
  professional: Vijaya Wardhawala, a two-year-old, takes on the role of an eager junior storyteller, using bright picture books and imaginative play to connect peers, showcasing early leadership, empathy,
    and a love for narrative that foreshadows a future in early childhood education.
  sports: Vijaya Wardhawala, a two-year-old, splashes through toddler swimming lessons at the Glenview Community Center, giggles in mini-soccer circles with the local Glenview Tots Soccer Club, and watches
    the Chicago Cubs on TV with dad, preferring low-key, playful activity over structured competition.
  arts: Vijaya Wardhawala, a two-year-old, loves finger-painting to the lively beats of A.R. Rahman's 'Jai Ho' and the 'Sesame Street' theme, mimics dance moves from Disney's 'Moana' starring Auli'i Cravalho,
    and often pretends to be a tiny actress reenacting scenes from 'Finding Nemo' with a plastic fish.
  travel: Vijaya Wardhawala, a two-year-old, eagerly hops into the family car for trips to the Chicago Children's Museum, squeals with delight at the zoo's giraffes, dreams of a future adventure to Rajasthan's
    desert festivals, and loves the cozy seaside stay at Great Wolf Lodge with Grandma.
  culinary: Vijaya Wardhawala, a two-year-old, adores buttery naan brushed with ghee, slurps creamy mac-and-cheese, giggles while smearing mango puree on toast, and proudly 'helps' stir the simmering dal,
    leaving a trail of flour on the countertop.
  core: Vijaya Wardhawala, a two-year-old, blends boundless curiosity, gentle compassion, and a delightfully messy love for art and food into a calm, flexible toddler who rarely loses a smile.
background:
  cultural: Vijaya is raised in a South Asian household in Glenview, Illinois, where Gujarati (or Hindi) and English are spoken at home. Family traditions include celebrating Diwali with lights and sweets,
    observing modest rituals such as rangoli and storytelling, and enjoying Indian cuisine like dal and roti alongside Midwestern foods. This bicultural environment nurtures her curiosity about diverse
    arts, music, and community values.
