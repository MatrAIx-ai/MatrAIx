  career_goals: Although retired, Renita aims to cement her legacy by establishing a scholarship fund for women pursuing STEM degrees at her alma mater, expanding the local Girls Who Code chapter, and publishing
    a memoir that chronicles her experiences as a female engineer in the 1970s and 80s. She also plans to complete advanced online courses in artificial intelligence to stay intellectually engaged, serve
    on the advisory board of the Everett community technology lab, and mentor at least ten high-school students in engineering projects over the next five years.
