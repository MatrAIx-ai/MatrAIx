personas:
  professional: Tiffany Bourque is a CSP‑candidate occupational health and safety specialist with over fifteen years of experience conducting risk assessments, ergonomics evaluations, and OSHA compliance
    audits for federal facilities, leveraging data‑analysis tools such as Intelex and SAP EHS to drive measurable injury‑prevention programs while channeling her competitive nature into achieving zero‑recordable
    incident goals and mentoring emerging safety professionals.
  sports: Tiffany Bourque enjoys weekend hikes along the Blue Ridge trails with the Blue Ridge Trailhikers Association, competes in a local tennis league, follows the Washington Capitals for hockey, practices
    morning yoga for flexibility, and champions a disciplined, solitary fitness routine that balances her competitive drive with a love for nature.
  arts: Tiffany Bourque expresses her curiosity through nature photography inspired by Ansel Adams, unwinds to Yo‑Yo Ma’s cello suites, admires Van Gogh’s Starry Night, regularly attends performances at
    the regional theater, and reads scientific biographies, integrating artistic appreciation into her methodical, solitary lifestyle.
  travel: Tiffany Bourque plans trips with meticulous itineraries, favors solo cultural immersion such as hiking Spain’s Camino de Santiago, exploring Greek islands like Santorini for Mediterranean culinary
    inspiration, and a scheduled trek in Japan’s Japanese Alps, all while balancing a modest budget that prioritizes authentic experiences over luxury accommodations.
  culinary: Tiffany Bourque experiments with Mediterranean‑inspired cuisine, frequently preparing grilled branzino with sumac, Greek lentil soup (Fakes), roasted vegetable couscous featuring Kalamata olives
    and fresh herbs, and incorporates home‑grown zucchini and tomatoes from her garden, while occasionally splurging on artisanal feta and high‑quality extra‑virgin olive oil.
  core: Tiffany Bourque blends analytical rigor with solitary curiosity, driving a disciplined career in occupational safety, methodical finances, proactive health management, and a quiet yet competitive
    pursuit of personal mastery.
background:
  cultural: Tiffany is a White American of French‑Canadian ancestry, raised in the suburban communities of Fairfax County, Virginia. Her family observed traditional American holidays such as Thanksgiving
    and the Fourth of July, and maintained a modest Catholic upbringing that emphasized community service and personal responsibility. Growing up near Washington, D.C., she was exposed to a multicultural
    environment and a strong emphasis on public policy, which later influenced her career in occupational health and safety. She earned her STEM degree at Virginia Tech, where she developed a pragmatic,
    data‑driven mindset. The historic charm of Alexandria and the diversity of the metropolitan area have nurtured her appreciation for both established practices and innovative ideas.
