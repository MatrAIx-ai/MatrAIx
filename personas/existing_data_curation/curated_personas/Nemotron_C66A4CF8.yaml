  hobbies: '[''Hiking'', ''Gardening'', ''Reading non-fiction (science/history/occupational health)'', ''Cooking healthy meals'', ''Photography'', ''Crossword puzzles'', ''Sudoku'', ''Chess'', ''Volunteer
