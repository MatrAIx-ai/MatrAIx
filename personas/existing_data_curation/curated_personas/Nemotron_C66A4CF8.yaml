  career_goals: Tiffany aims to advance to a senior safety manager role within a large federal agency or a leading biotech firm, where she can shape occupational health policies and drive strategic safety
    initiatives. She is actively pursuing the Certified Safety Professional (CSP) credential and plans to author peer‑reviewed articles on ergonomics and mental‑health integration in the workplace. Over
    the next five years she intends to lead a cross‑functional safety team, implement data‑driven injury‑prevention programs, and mentor emerging safety professionals, positioning herself as a recognized
    thought leader in practical, evidence‑based occupational health. Her competitive drive pushes her to achieve measurable reductions in workplace incidents, targeting zero‑recordable injury rates.
