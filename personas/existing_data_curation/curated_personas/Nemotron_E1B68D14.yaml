  hobbies: '[''Community Basketball'', ''Hiking'', ''Southern BBQ Cooking'', ''Church Volunteer Outreach'', ''Atlanta Braves Fan'', ''Live Music Concerts'', ''Strategy Video Gaming'']'
  career_goals: Joshua aims to move beyond his current cashier role into retail management. Over the next few years he plans to obtain an associate degree in Business Administration, leveraging his some‑college
    coursework to qualify for a shift‑lead or assistant manager position. His long‑term ambition is to become a store manager, where he can apply his practical curiosity to improve store operations, mentor
    new staff, and contribute to community‑focused retail initiatives. He also envisions someday opening a small family‑run boutique or coffee shop in Woodstock, integrating his interest in local culture
    and customer connection with entrepreneurial goals.
