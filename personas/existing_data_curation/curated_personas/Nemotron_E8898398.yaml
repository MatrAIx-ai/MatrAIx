personas:
  professional: Jacqueline Headrick is a seasoned property claims adjuster whose analytical rigor, GIS mapping skills, and mastery of Xactimate are balanced by a cooperative, empathetic style, and she aspires
    to lead a supervisory team while shaping fair wildfire and flood loss policies within a routine‑driven workflow that comforts her need for predictability.
  sports: Jacqueline Headrick enjoys hiking the Lake Tahoe and Sierra Nevada foothill trails with the Lake Tahoe Hikers Association, follows the Nevada Wolf Pack football team for community spirit, and
    participates in a casual weekend running club that meets at the local park, preferring low‑impact activities that complement her routine and love of solitude.
  arts: Jacqueline Headrick is an active member of a mystery‑fiction book club that discusses Agatha Christie and classic literature, regularly watches classic American films starring Cary Grant, and often
    hosts board‑game nights that double as social gatherings, reflecting her cooperative nature and appreciation for timeless storytelling.
  travel: Jacqueline Headrick prefers road trips that balance scenic outdoor stops with modest lodging, having recently driven the Pacific Coast Highway to explore Big Sur’s cliffs and planning a future
    visit to Utah’s national parks such as Zion and Bryce Canyon, all while budgeting travel around her family’s routine and limited vacation days.
  culinary: Jacqueline Headrick enjoys preparing comfort food like meatloaf, mashed potatoes, and homemade apple pie, often incorporating fresh tomatoes and basil from her garden, and she frequently volunteers
    to cook hearty soups for the local food bank, reflecting her hands‑on cooking style and love for classic American flavors.
  core: Jacqueline Headrick blends a love of routine, gardening, and community service with a tendency to worry and occasional disorganization, carving a steady yet flexible path through her career and
    personal life.
background:
  cultural: Jacqueline is a Caucasian American who grew up in the suburban neighborhoods of Reno, Nevada. Her family ancestry includes Midwestern and Northern European roots, with grandparents who migrated
    from the Midwest in the mid‑20th century. Raised in a modest, two‑parent household that valued practicality, self‑reliance, and community service, she experienced the blend of Western frontier ethos
    and traditional American holidays. The Great Basin environment fostered her appreciation for the outdoors, while local cultural institutions—such as the community college and volunteer fire department—reinforced
    a cooperative, pragmatic worldview that aligns with her personal values.
