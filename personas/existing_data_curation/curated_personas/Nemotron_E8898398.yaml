  career_goals: Jacqueline aspires to move into a senior supervisory role within her insurance firm, where she can lead a team of adjusters and mentor new investigators. She plans to earn the Chartered
    Property Casualty Underwriter (CPCU) designation and develop specialized expertise in catastrophic loss assessment, particularly for wildfire and flood events common in Nevada. Her long-term ambition
    is to shape policy and procedural improvements that enhance fairness for claimants while preserving operational efficiency, all while maintaining a steady routine that supports her family life.
