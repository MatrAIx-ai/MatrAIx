  hobbies: '[''historic district exploration'', ''photography'', ''video editing'', ''speculative fiction reading'', ''debate'', ''competitive swimming'', ''chess'', ''coding simple games'', ''beach clean‑up
    volunteering'']'
  career_goals: Teresa aims to pursue a career in environmental science or marine biology, focusing on coastal conservation and data‑driven research. She plans to attend a university with a strong marine
    research program, secure scholarships through her competitive STEM achievements, and eventually lead interdisciplinary projects that combine fieldwork, technology, and community outreach to protect
    Florida’s marine ecosystems.
