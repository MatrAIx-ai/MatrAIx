personas:
  professional: Teresa Brown is a budding environmental researcher who leverages their analytical mind, digital media talents, and competitive drive to create data-driven short documentaries on coastal
    ecosystems, while balancing curiosity with pragmatic project planning and community outreach.
  sports: Teresa Brown competes in high school swimming for the St. Augustine Aquatic Club, follows the Florida Gators and Miami Dolphins with avid enthusiasm, and applies the strategic mindset honed in
    chess tournaments to both pool laps and board play.
  arts: Teresa Brown finds creative inspiration in speculative fiction authors N.K. Jemisin and Margaret Atwood, studies the oceanic cinematography of James Cameron and the photographic compositions of
    Ansel Adams, and relaxes to the ambient sounds of Tame Impala while editing their short documentaries.
  travel: Teresa Brown favors meticulously planned coastal road trips, having explored the historic streets of St. Augustine, snorkeled the Florida Keys, and now dreams of conducting field research in the
    Galápagos and Iceland, balancing school commitments and a limited teen budget with detailed itineraries.
  culinary: Teresa Brown enjoys preparing bright, citrus-laden dishes such as shrimp tacos with lime-cotija slaw, key-lime pie, and grilled mahi-mahi, favoring fresh cilantro, chilies, and a splash of orange
    juice while still polishing their beginner kitchen skills.
  core: Teresa Brown blends relentless curiosity for marine science with disciplined competition, a calm resilience that rarely yields anxiety, a habit of over-editing footage late into the night, and a
    quirky tendency to hoard spare camera batteries for future shoots.
background:
  cultural: Teresa is a white American teen raised in St. Augustine, Florida, a city famed for its Spanish colonial heritage and vibrant coastal culture. Her family traces its roots to Northern European
    immigrants, and she grew up participating in local traditions such as the Nights of Lights festival and the annual Pirate & Treasure Festival. The multicultural, historic, and environmentally conscious
    atmosphere of her community shapes her values of resilience, practicality, and a strong sense of civic responsibility.
