persona_description: 'A geologist who specializes in the study of the Earth''s geological history and the processes that shaped the landscape of the Hudson Valley during the Ice Age. Robert Titus and Johanna
  Titus are well-known columnists for Kaatskill Life and other newspapers, and they recently published a delightful book called The Hudson Valley in the Ice Age: A Geographical History and Tour. They are
  also experts in the field of popular science and are skilled in the art of travel writing. They have a unique perspective on the landscape of the Hudson Valley during the Ice Age and are interested in
  the geological formations that are still visible today. They are also concerned about the potential threats posed by landslides and other geological hazards in the Valley.'
