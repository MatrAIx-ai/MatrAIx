personas:
  professional: Chang Asadi is a seasoned cost estimator who blends rigorous budgeting and Excel modeling with a creative, sustainability‑focused mindset, leveraging their curiosity and strong communication
    skills to mentor junior staff while navigating the occasional disorganization that comes from a love of spontaneous art projects.
  sports: Chang Asadi enjoys hiking the Ouachita hills with the local Trailblazers Club, unwinds fishing on Lake Murray, follows the Oklahoma City Thunder basketball team, and participates in casual Saturday
    morning pickup soccer games at the community park.
  arts: Chang Asadi spends weekends painting watercolors inspired by Georgia O'Keeffe, experimenting with photography in the style of Ansel Adams, attends local gallery openings featuring emerging artists,
    and relaxes to the sounds of Miles Davis as well as traditional drum circles at regional powwows.
  travel: Chang Asadi favors spontaneous road trips through the Ozarks, has already explored Santa Fe’s art markets and the historic pueblos of New Mexico, dreams of trekking the Great Smoky Mountains,
    and often books last‑minute stays that balance adventure with a limited vacation budget.
  culinary: Chang Asadi enjoys cooking hearty barbecue brisket with a homemade spice rub, perfecting cornbread with jalapeño, and experimenting with fresh herbs from the community garden, while also appreciating
    the occasional upscale dinner featuring seared salmon with citrus beurre blanc.
  core: Chang Asadi is a detail‑driven estimator with a free‑spirit love for art and the outdoors, whose organized mind occasionally surrenders to spontaneous creativity, worry‑induced stress, and a penchant
    for late‑night jazz listening sessions.
background:
  cultural: Chang Lee Asadi is an American Indian with deep roots in the Muscogee (Creek) Nation of Oklahoma. Raised in Coweta, he grew up immersed in tribal traditions such as storytelling, language preservation,
    and participation in powwows. His family values community service, respect for the natural environment, and the intergenerational transmission of cultural knowledge. While fully integrated into mainstream
    American society—holding a business degree and working as a cost estimator—he maintains a strong connection to his heritage, regularly attending tribal ceremonies, supporting indigenous art initiatives,
    and incorporating culturally relevant perspectives into his professional projects. His marriage reinforces shared values of cultural participation and community involvement, and he often acts as a bridge
    between his workplace and local tribal communities.
