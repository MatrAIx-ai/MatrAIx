  hobbies: '[''Painting'', ''Photography'', ''Attending Art Exhibitions'', ''Hiking'', ''Fishing'', ''Participating in Powwow Drumming'', ''Dancing'', ''Community Gardening'', ''Hosting Potluck Gatherings'',
    ''Reading Historical Fiction'', ''Reading Non-fiction on Indigenous Cultures'', ''Playing Poker'', ''Listening to Jazz'', ''Volunteering at Cultural Center'']'
  career_goals: Chang aims to advance to a senior cost‑management role where he can lead a multidisciplinary estimating team and shape innovative, sustainability‑focused estimation practices. He envisions
    developing cost‑estimation methodologies that incorporate environmentally responsible materials and respect tribal design principles, especially for infrastructure projects benefiting Native American
    communities in Oklahoma. Mentoring the next generation of estimators and eventually launching his own consultancy focused on culturally sensitive construction projects are long‑term ambitions. Additionally,
    he seeks to refine his workflow processes to reduce stress, achieve a healthier work‑life balance, and continue contributing to his community through volunteer leadership.
