  hobbies: '[''Painting (oil and watercolor)'', ''Landscape photography'', ''Xeriscape gardening'', ''Reading (historical fiction, poetry, local history)'', ''Volunteer work at senior center'', ''Hiking
    (Red Rock Canyon, local trails)'', ''Quilting'', ''Attending art festivals and community fairs'', ''Creative writing (memoir, journal)'']'
  career_goals: Although she is no longer part of the formal workforce, Selena aims to deepen her impact on Pahrump’s cultural life. Her primary ambition is to establish a community art sanctuary that offers
    free workshops, intergenerational storytelling sessions, and a rotating exhibit space for local artists. She also hopes to launch a mentorship program that connects seniors with high‑school students
    through collaborative art projects, preserving oral histories while fostering creative expression. In the longer term, she envisions authoring a collection of illustrated memoirs that capture the unique
    history and natural beauty of the Nevada desert, and to secure modest grants that sustain these community initiatives.
