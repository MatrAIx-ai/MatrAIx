personas:
  professional: Selena Delvillar, a retired social‑science student turned community arts facilitator, channels her curiosity and organizational flair into coordinating free painting workshops, xeriscape
    garden projects, and intergenerational storytelling events that weave Nevada’s desert heritage into vibrant communal experiences.
  sports: Selena Delvillar enjoys leisurely hikes through Red Rock Canyon and joins a senior walking club that cheerfully roots for the Las Vegas Golden Knights and Nevada Wolf Pack football, while they
    occasionally dabble in low‑impact aqua aerobics at the community pool to keep joints supple.
  arts: Selena Delvillar—an avid painter of desert sunrise canvases, a photographer of wildflower crowns, and a quilt maker who reveres the textile narratives of Faith Ringgold—spends weekends at the Pahrump
    Art Festival, swapping stories with fans of Ansel Adams and Georgia O’Keeffe, a practice that fuels their creative pulse.
  travel: Selena Delvillar prefers meticulously planned road trips that balance discovery with comfort, revisiting the tranquil canyons of Sedona, the red dunes of Great Sand Dunes National Park, and dreaming
    of a future pilgrimage to the historic streets of Santa Fe, all while keeping travel costs within their modest grant‑sponsored budget.
  culinary: Selena Delvillar delights in cooking low‑water xeriscape‑inspired meals, frequently preparing grilled trout with rosemary, quinoa‑cactus salad drizzled with lime, and prickly pear jam, yet they
    have a guilty pleasure for store‑bought pepperoni pizza, which they indulge in after late‑night art sessions.
  core: Selena Delvillar blends desert‑inspired artistry with compassionate community leadership, navigating life’s challenges with organized curiosity and a quirky penchant for midnight lavender tea.
background:
  cultural: Selena was raised in a small Midwestern town where community gatherings, church events, and local fairs shaped her early worldview. The values of self‑reliance, neighborly support, and an appreciation
    for simple, honest work were ingrained in her upbringing. In her thirties she moved to Pahrump, Nevada, drawn by the expansive desert landscape and the tight‑knit spirit of a rural town. The Southwest’s
    emphasis on outdoor living, respect for the desert’s fragile ecology, and the blend of cultures—ranging from Native‑American heritage to a growing Hispanic presence—have broadened her cultural perspective.
    While she identifies as a white American, she actively embraces Nevada’s multicultural fabric, often incorporating diverse artistic motifs into her own work and championing inclusive community projects.
attributes:
  skills: '[''Community event planning'', ''Art workshop facilitation'', ''Basic grant writing'', ''Conflict mediation'', ''Mentorship and counseling'', ''Xeriscape gardening'', ''Beginner watercolor instruction'',
