  career_goals: Kendall aims to advance into a supervisory role within casino security, targeting a position as Surveillance Manager where she can lead a team, design training programs, and implement advanced
    analytics for fraud prevention. She plans to obtain the Certified Protection Professional (CPP) credential and pursue specialized coursework in cyber‑surveillance. Long‑term, she envisions establishing
    a boutique security consulting firm that serves cultural institutions such as museums and galleries, merging her security expertise with her passion for the arts. She also hopes to reduce the high‑stress
    aspects of her current shift by negotiating a more predictable schedule that supports her community involvement.
