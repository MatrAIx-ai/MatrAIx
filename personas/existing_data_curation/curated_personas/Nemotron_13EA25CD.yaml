personas:
  professional: Marisha Griffin, a 26‑year‑old industrial engineer in the Bay Area, they blend Six Sigma green‑belt expertise with a keen eye for visual aesthetics to craft lean, ergonomic manufacturing
    processes that champion sustainability and safety.
  sports: Marisha Griffin, a 26‑year‑old outdoor enthusiast, they hike the Sierra foothills every Saturday, run trail runs in the spring, practice yoga with a local Bay Area studio, and avidly follow the
    Golden State Warriors and San Francisco Giants, joining a community cycling club for occasional weekend rides.
  arts: Marisha Griffin, a 26‑year‑old creative soul, they spend afternoons at SFMOMA sketching in quiet corners, attend intimate poetry readings featuring Rupi Kaur and Ocean Vuong, curate playlists of
    Miles Davis and Erykah Badu while working on digital illustrations in Procreate, and collect limited‑edition prints from emerging visual artists.
  travel: Marisha Griffin, a 26‑year‑old wanderer, they plan trips with meticulous spreadsheets, have trekked Yosemite’s Mist Trail, explored Kyoto’s Arashiyama bamboo grove, savored a weekend wine tour
    in Napa Valley, and dream of a month‑long sustainable design volunteer project in Marrakech, while balancing a modest travel budget with occasional splurges on boutique hostels.
  culinary: Marisha Griffin, a 26‑year‑old experimental cook, they fuse global flavors by preparing kimchi‑infused ramen broth, harissa‑marinated tofu tacos with tahini drizzle, and lavender‑scented shortbread,
    favoring ingredients like miso, gochujang, sumac and fresh herbs sourced from the local farmer’s market.
  core: Marisha Griffin, a 26‑year‑old detail‑oriented engineer, they fuse art and analytics, worry about perfection, and habitually turn every work challenge into a canvas for sustainable, human‑centered
    design.
background:
  cultural: Marisha is an African‑American woman raised in Sacramento’s culturally diverse neighborhoods. Her family’s roots trace back to the Southern United States, and she grew up hearing stories of
    resilience, community solidarity, and the civil‑rights movement. These narratives fostered a strong sense of identity and a commitment to uplifting her community. She celebrates Juneteenth, participates
    in local Black History Month events, and is an active member of the National Society of Black Engineers (NSBE). Her cultural heritage influences her appreciation for Black art, music, and storytelling,
    and she often incorporates these elements into both her professional collaborations and personal creative pursuits.
