  career_goals: Marisha aims to advance to a senior industrial engineering role where she can lead sustainability and safety initiatives within a forward‑thinking manufacturing or tech company in the Bay
    Area. She plans to earn a Certified Safety Professional (CSP) credential and pursue a master’s degree—either in industrial engineering or business administration—to broaden her strategic impact. Additionally,
    she is passionate about mentoring underrepresented women in STEM, championing diversity and inclusion policies, and contributing thought leadership on merging artistic creativity with engineering design
    to foster innovative, human‑centered workplaces.
