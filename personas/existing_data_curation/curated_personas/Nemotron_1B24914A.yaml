  career_goals: Gladys aims to transition from her current managerial role to a senior leadership position—ideally Director of Operations or Vice President of Strategy—within the next five years. To support
    this trajectory, she plans to enroll in an executive MBA program focused on strategic innovation and diversity leadership. She also seeks to spearhead a company‑wide diversity, equity, and inclusion
    initiative, mentoring emerging talent from underrepresented backgrounds and shaping policies that foster an inclusive workplace culture.
