  career_goals: Kenneth aims to enroll at Purdue University to study mechanical engineering or a related technology field, where he can merge his curiosity for new ideas with a practical, hands‑on learning
    style. He envisions a career that balances technical expertise with people‑focused roles, such as a project manager in the tech or manufacturing sector, or eventually launching his own small‑scale custom
    furniture or handyman business. He also hopes to stay involved in community initiatives, using his cooperative spirit to lead local volunteer projects while maintaining the flexibility to explore emerging
    technologies.
