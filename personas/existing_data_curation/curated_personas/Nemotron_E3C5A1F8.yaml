personas:
  professional: Kenneth, an aspiring mechanical engineering student at Purdue University, combines his hands‑on tinkering with Arduino and DIY woodworking with a natural talent for rallying teammates, making
    them the go‑to project coordinator for the campus maker‑club's hackathons and group builds.
  sports: Kenneth, a 19‑year‑old intramural basketball and soccer player at the West Lafayette Recreation Center, follows the Purdue Boilermakers and the Indianapolis Colts, spends Saturday mornings fishing
    at Lake Wabash, and they prefer casual group workouts over regimented gym routines.
  arts: Kenneth, a 19‑year‑old hobby guitarist who drops into community jam sessions, enjoys covering songs by John Mayer and The Beatles, streams indie video‑game soundtracks by Austin Wintory, and they
    binge‑watch the Marvel Cinematic Universe for narrative inspiration.
  travel: Kenneth, a 19‑year‑old who plans his trips on a whim, has road‑tripped to Chicago’s music scene, camped in the Great Smoky Mountains, and they dream of backpacking through the German Alps and
    the Irish countryside to explore his family’s ancestral traditions.
  culinary: Kenneth, a 19‑year‑old who can whip up a mean pepperoni pizza and a holiday gingerbread loaf, loves the smoky flavor of pulled pork, and they experiment with an Arduino‑controlled sous‑vide
    to achieve precise temperature control in their kitchen.
  core: Kenneth, a 19‑year‑old perpetual tinkerer with a penchant for late‑night gaming marathons and a habit of leaving toolboxes half‑filled, balances curiosity and a laid‑back approach to life while
    they rarely feel anxious.
background:
  cultural: Kenneth grew up in a middle‑class, predominantly white suburb of West Lafayette, Indiana, where Midwestern values of humility, community involvement, and hard work are emphasized. His family’s
    heritage includes German and Irish roots, reflected in occasional cultural traditions such as holiday baking and participation in community parades. The region’s strong emphasis on public education,
    support for local sports, and access to Purdue University’s resources have shaped his outlook, fostering a blend of curiosity, practicality, and a collaborative spirit that is characteristic of the
    local culture.
