  hobbies: '[''coding small games'', ''basketball'', ''skateboarding'', ''bike repair'', ''listening to hip‑hop & jazz'', ''reading graphic novels'', ''competitive video gaming'', ''puzzle solving'', ''community
    tutoring'']'
  career_goals: Charlie aims to graduate high school with a focus on STEM, earn a scholarship to study computer science or computer engineering, and eventually work as a software developer creating games
    or apps that reflect his community. He also wants to play college basketball, using his competitive drive to secure a sports scholarship and combine athletics with academics. In the short term, he plans
    to join the school’s coding club, help his team win the district basketball tournament, and develop a mobile app that helps local teens find free after‑school resources.
