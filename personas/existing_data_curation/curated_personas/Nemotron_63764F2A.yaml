personas:
  professional: Charlie Johnson is a budding high‑school coder who builds small programs and designs graphics, channeling a competitive streak and pragmatic curiosity into every line of code they write.
  sports: Charlie Johnson shoots hoops for the Riverdale Middle School Tigers, roots for the Chicago Bulls, and rolls with the local skateboarding club at the community center, treating each practice as
    a tactical puzzle they must dominate.
  arts: Charlie Johnson curates a mixtape of Kendrick Lamar, Miles Davis, and J‑Cole while sketching graphic‑novel‑style art inspired by Art Spiegelman and the vibrant panels of 'Saga,' letting these creative
    currents shape both their coding aesthetics and everyday outlook.
  travel: Charlie Johnson dreams of swapping skate‑park sessions for a sunrise hike in Zion National Park and a week‑long anime tour of Tokyo’s Akihabara district, planning trips meticulously with their
    parents to stretch a limited budget while still craving the thrill of new horizons.
  culinary: Charlie Johnson, a self‑taught kitchen rookie, whips up pepperoni pizza with extra cheddar and experiments with chicken ramen seasoned with soy sauce and a dash of sriracha, always hunting for
    the perfect balance between quick snack fuel for bike repairs and a cheeky indulgence in boba tea.
  core: Charlie Johnson is a 15‑year‑old tech‑savvy tinkerer whose competitive edge fuels relentless coding challenges, yet they often procrastinate stretching after skate sessions, leading to occasional
    injuries.
background:
  cultural: Charlie grew up in a predominantly African‑American neighborhood in North St. Louis, where family, church, and local community centers play central roles. His parents, both high school graduates,
    instilled pride in their heritage, sharing stories of the city’s jazz and blues legacy and encouraging participation in neighborhood events like the annual Juneteenth celebration. Exposure to gospel
    music at his Baptist church, hip‑hop from local artists, and the city’s rich history of civil‑rights activism have shaped his worldview. He identifies strongly with the collective values of perseverance,
    shared responsibility, and celebrating Black culture, while also navigating the challenges of a community facing socioeconomic pressures.
