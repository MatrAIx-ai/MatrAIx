personas:
  professional: Arian Burgos is a highly organized early childhood educator who leverages their bilingual fluency, meticulous curriculum planning, and love for routine to create structured, culturally inclusive
    preschool environments, while they ambitiously pursue a lead teacher or curriculum coordinator role.
  sports: Arian Burgos regularly attends high‑energy Zumba classes, joins a local hiking club that tackles the nearby mountain trails each weekend, participates in a folkloric dance troupe for cardio fitness,
    and they cheer on the Austin FC soccer team while occasionally playing recreational softball with colleagues.
  arts: Arian Burgos engages in folkloric dance performances, knits intricate scarves while listening to classic pop and folk music, devours early childhood literature by authors like Dr. Seuss and Margaret
    Wise Brown, and they find inspiration in community theater productions and local art fairs.
  travel: Arian Burgos prefers well‑planned trips that balance cultural immersion and relaxation, has explored historic Santa Fe and the coastal streets of Monterey, enjoys hiking in the Sierra Nevada with
    friends, and they dream of a family vacation to the ancient ruins of Machu Picchu, budgeting carefully around work commitments.
  culinary: Arian Burgos delights in preparing traditional dishes such as tamales and mole, skillfully balancing corn masa, ancho chilies, and dark chocolate, while they also experiment with fresh garden
    herbs, often hosting communal meals that showcase their love for hand‑crafted sauces and festive flavors.
  core: Arian Burgos is a routine‑driven, sociable educator who channels their meticulousness into structured teaching, community involvement, and culinary traditions, while they wrestle with persistent
    worry and occasional over‑spending on beloved hobbies.
background:
  cultural: Arian was raised in a bicultural Mexican‑American household in Arizona. Her parents immigrated from Jalisco, and she grew up fluent in both Spanish and English, celebrating traditions such as
    Día de los Muertos, Las Posadas, and quinceañeras. The Mexican emphasis on family, community, and respect for elders shaped her values and teaching style, fostering a warm, inclusive classroom atmosphere.
    Living in Sierra Vista, she blends her heritage with the desert Southwestern culture, partaking in regional customs like rodeos and appreciating the local wildlife. Her cultural identity drives her
    commitment to bilingual education and preserving Mexican cultural narratives within early childhood curricula.
attributes:
  skills: '["Early Childhood Education", "Curriculum Design", "Bilingual Instruction (Spanish/English)", "Classroom Management", "Lesson Planning", "Arts Integration", "Developmental Assessment", "Parent
