  hobbies: '["Zumba Fitness", "Folkloric Dance", "Community Gardening", "Hiking", "Mexican Cooking", "Journaling", "Reading (self‑help & early childhood literature)", "Knitting", "Board Games", "Volunteer
    Teaching (after‑school programs)", "Participating in local cultural festivals"]'
  career_goals: Arian aims to progress to a lead teacher or curriculum coordinator role within her district, where she can shape instructional standards that emphasize routine, practicality, and cultural
    relevance. She plans to earn a Master’s degree in Early Childhood Education and acquire additional certifications such as Early Childhood Specialist and Autism Spectrum Disorder. Her long‑term ambition
    includes developing a bilingual preschool program that serves Mexican‑American families with high‑quality, structured learning environments, mentoring new teachers, and presenting at regional conferences
    on effective routine‑based teaching strategies.
