persona_description: Sunita Narain, a director general of the Centre for Science and Environment (CSE), who is responding to the latest urban air quality database 2016 released by the World Health Organization,
  and who is advocating for urgent intervention to implement the National Clean Air Action Plan with a strong compliance strategy to meet clean air standards in all cities. She is also concerned about air
  pollution becoming a national public health crisis and is calling for state governments to ensure action plans are implemented with stringency and aggression.
