  hobbies: '[''reading adventure books'', ''building Lego models'', ''nature sketching and journaling'', ''Girl Scouts badge projects'', ''playing keyboard'', ''baking simple recipes'', ''collecting and
    preserving leaves'', ''coloring for relaxation'']'
  career_goals: Though only eight, Lynn already envisions a future where her love of learning and need for structure combine. In the short term she aims to excel in third‑grade reading and math, win a school
    science‑fair project on plant growth, and earn a leadership badge in her community group. Long‑term, she dreams of a career that lets her help living things while following clear, organized processes—she
    is drawn to becoming a wildlife veterinarian or an environmental scientist who studies animal health and habitat preservation. She also mentions an interest in teaching, where she could share her methodical
    approach with younger children. Lynn’s ambitions are guided by her desire for reliability, her curiosity about the natural world, and a wish for a stable, well‑defined path that eases her anxiety about
    the unknown.
