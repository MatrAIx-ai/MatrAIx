personas:
  professional: Lynn Hulin, an aspiring young engineer who loves building intricate Lego sets, channels their methodical planning and reliable nature into designing custom structures during school STEM
    clubs, while their balanced curiosity drives them to experiment with both classic building techniques and imaginative new concepts.
  sports: Lynn Hulin, a budding soccer enthusiast who trains with the River Valley Soccer Club and cheers for the Los Angeles Dodgers during weekend games, balances short, high-energy play sessions and
    nature hikes to stay active, though they sometimes skip practice when anxiety spikes.
  arts: Lynn Hulin, a budding artist who fills their sketchbook with rabbits and squirrels inspired by Eric Carle's wildlife illustrations, sings along to Taylor Swift's 'Shake It Off' while practicing
    piano renditions of Disney's 'Let It Go' from Frozen, and watches the animated adventures of Adventure Time for creative storytelling.
  travel: Lynn Hulin, who prefers short, family-friendly trips with a detailed itinerary, has explored the nearby state park's hiking trails and the Children's Museum in Chicago, dreams of visiting the
    Eiffel Tower in Paris and the Great Barrier Reef in Australia, and always packs a nature journal to record observations.
  culinary: Lynn Hulin, a meticulous junior baker who confidently measures flour, butter, and chocolate chips to whip up classic chocolate chip cookies, enjoys snack plates of apple slices with peanut butter,
    and delights in customizing mini pizzas topped with mozzarella, pepperoni, and pineapple, all while humming the kitchen timer tune.
  core: Lynn Hulin blends a methodical love for building, sketching, and baking with an anxious heart that seeks calm in coloring books, turning every new project into a carefully planned adventure.
background:
  cultural: 'Lynn grows up in a middle‑class, predominantly white suburb of Fishers, Indiana. Her family reflects typical Midwestern values: emphasis on hard work, community involvement, and polite civility.
    Weekends often include visits to local parks, attendance at a nearby United Methodist church, and participation in school and neighborhood events such as the annual Fishers Festival. The community holds
    a strong appreciation for school athletics, library programs, and volunteerism, all of which shape Lynn’s sense of belonging. Family traditions celebrate national holidays with classic American customs—thanksgiving
    meals, Fourth of July fireworks, and winter holiday decorating—while also encouraging personal responsibility, such as helping with chores and maintaining her personal space. This cultural setting blends
    practical, organized living with opportunities for curiosity‑driven exploration.'
