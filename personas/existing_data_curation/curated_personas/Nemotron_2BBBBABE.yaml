  skills: '[''Basic bookkeeping'', ''Data entry'', ''Microsoft Office Suite (Word, Excel, PowerPoint)'', ''Customer service'', ''Basic home repair'', ''Meal planning and cooking'', ''Adaptable problem solving'']'
