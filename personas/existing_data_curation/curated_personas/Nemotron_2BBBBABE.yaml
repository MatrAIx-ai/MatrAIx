  career_goals: Angela intends to build on her associate's degree by completing a bachelor's in Business Administration through a combination of online coursework and community college classes. Her long‑term
    ambition is to launch a small e‑commerce boutique that sells handcrafted home‑decor items she creates herself, allowing her to blend creative freedom with a structured business model. She values a work
    schedule that offers flexibility for spontaneous outings and personal projects, and she aims to develop leadership skills that balance assertiveness with collaborative teamwork.
