  hobbies: '[''Art museum visits'', ''Gallery tours'', ''Piano playing'', ''Jazz club attendance'', ''Photography'', ''Lake Michigan shoreline hiking'', ''Running club participation'', ''Wine‑tasting group'',
    ''Community theater volunteering'', ''Cooking international dishes'', ''Science‑fiction reading'', ''European art‑focused travel'']'
  career_goals: John aims to become a senior partner leading a multidisciplinary technology and art law practice within his firm, positioning himself as a thought leader on the legal implications of AI
    and digital art. He plans to mentor junior attorneys, develop continuing‑education seminars on the intersection of law, science, and culture, and author a book that explores how legal frameworks can
    nurture artistic innovation. In the public sphere, he seeks a seat on the board of the Art Institute of Chicago to champion access to the arts, and he intends to expand pro bono services for under‑represented
    creators and inventors in the Chicago area.
