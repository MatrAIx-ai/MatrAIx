personas:
  professional: Rigoberto Santiago, a 22‑year‑old HR assistant, blends bilingual fluency, Excel‑SQL analytics, and Python automation to streamline onboarding, benefits administration, and DEI reporting,
    all while embracing a relaxed, slightly disorganized work style that lets curiosity guide data‑driven improvements.
  sports: Rigoberto Santiago belongs to a local hiking club that tackles the Cascades on weekends, tracks runs with a Strava‑linked Garmin, roots for the Seattle Seahawks during football season, and occasionally
    catches a Seattle Sounders FC match with a small group of friends.
  arts: Rigoberto Santiago unwinds by strumming acoustic guitar to the rhythms of Los Tigres del Norte and cumbia legend Celso Piña, dives into speculative fiction by N.K. Jemisin and Liu Cixin, and occasionally
    attends community poetry slams featuring spoken‑word artists like Danez Smith.
  travel: Rigoberto Santiago prefers low‑key, self‑planned trips that blend hiking with cultural immersion, having backpacked through Olympic National Park and explored the historic center of Mexico City,
    while dreaming of trekking Patagonia’s Torres del Paine and wandering Kyoto’s temples on a modest budget.
  culinary: Rigoberto Santiago enjoys crafting homemade tacos al pastor with pineapple‑marinated pork, fresh cilantro, and smoky chipotle sauce, as well as perfecting a week‑old pozole rojo seasoned with
    dried ancho chilies and hominy, showcasing a competent but still learning home‑cook level.
  core: Rigoberto Santiago’s world mixes meticulous spreadsheet wizardry with relaxed spontaneity, evident in their habit of scripting Python automations at midnight while perpetually misplacing hiking
    boots until the moment they’re needed.
background:
  cultural: Rigoberto grew up in a Mexican‑American household; his parents emigrated from Jalisco, and Spanish is spoken at home alongside English. Family celebrations of Día de los Muertos, quinceañeras,
    and holiday tamales are important cultural touchstones. While adapting to life in Richland, WA, he blends Mexican hospitality and collectivist values with the Pacific Northwest’s love for outdoor recreation.
    This bicultural perspective fuels his inclusive attitude at work, his love for community service, and his willingness to share Mexican culinary traditions with friends.
attributes:
  skills: '["HRIS administration (Workday, BambooHR)", "Data analysis (Excel, SQL)", "Python scripting for HR reporting", "Employee onboarding", "Benefits administration", "Talent sourcing and recruitment",
    "Performance management", "Conflict resolution", "Cross‑cultural communication (English/Spanish)", "DEI initiatives support"]'
  hobbies: '["Science‑fiction reading", "Strategy video gaming", "Trail hiking in the Cascades", "DIY electronics (Arduino, Raspberry Pi)", "Cooking Mexican cuisine", "Listening to cumbia and regional Mexican
    music", "Playing acoustic guitar", "Volunteering at the local food bank", "Organizing small community gatherings"]'
  career_goals: Rigoberto aims to transition from an HR assistant role to an HR Analyst position where he can apply his technical background to improve people‑analytics and strategic workforce planning.
    He plans to earn the SHRM‑CP certification within two years and eventually become an HR Business Partner who designs flexible, data‑informed policies that promote work‑life balance and inclusive culture.
    Long‑term, he envisions leading a small HR team in a tech‑focused company, championing employee well‑being while maintaining a relaxed, adaptable work environment.
