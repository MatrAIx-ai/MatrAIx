personas:
  professional: A budding marine explorer, Abraham blends their curiosity about Gulf marine life with a knack for mechanical LEGO builds and Scratch programming, using their competitive yet structured mindset
    to chart a future path toward marine biology.
  sports: Abraham throws right‑handed for the Panama City Youth Baseball League, idolizes the Tampa Bay Rays and the Jacksonville Jaguars, and tackles every pick‑up game at the community park with a fiercely
    competitive spirit that pushes them to practice extra innings despite occasional disorganization in tracking their gear.
  arts: Abraham channels their creativity into building complex LEGO Technic models and crafting animated Scratch stories, while they unwind listening to Billie Eilish and watching Marvel’s Guardians of
    the Galaxy, letting the vivid narratives shape their imaginative play.
  travel: Abraham dreams of snorkeling along the Florida Keys and exploring the marine exhibits at the Smithsonian in Washington, D.C., preferring spontaneous weekend trips with family that balance affordable
    beach outings with the occasional adventurous road trip to a theme park like Disney World, though a limited allowance sometimes curtails longer journeys.
  culinary: Abraham prefers the fresh taste of shrimp tacos with lime, cilantro, and a dash of hot sauce, enjoys crunchy fish‑and‑chips at local seafood festivals, and can whip up a quick grilled cheese
    with cheddar and a side of apple slices, though they often neglect vegetables unless a favorite sauce is involved.
  core: Abraham is a beach‑savvy, competition‑driven pre‑teen who balances a love for marine mysteries and LEGO mechanics with occasional worry‑filled journaling and a habit of misplacing their baseball
    glove.
background:
  cultural: 'Abraham grew up in a middle‑class white family in Panama City, Florida, where Southern hospitality mixes with coastal Gulf culture. His household celebrates typical American holidays—Thanksgiving,
    Christmas, and Fourth of July barbecues—while also embracing local traditions like seafood festivals and beach clean‑up days. Attending a public middle school, he participates in community events organized
    through the local church and youth sports leagues. The region’s relaxed, outdoors‑oriented lifestyle, combined with the practical, straightforward values of his parents, has shaped his outlook: practical,
    community‑focused, and proud of his coastal hometown.'
