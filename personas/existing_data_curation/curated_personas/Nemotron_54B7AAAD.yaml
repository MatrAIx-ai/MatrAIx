  career_goals: Abraham dreams of turning his love for baseball into a future as a professional player, eventually coaching a youth team in his hometown. He also sees himself studying engineering or computer
    science in high school and college, hoping to design reliable, practical devices—perhaps a high‑performance fishing drone that helps local anglers. He wants a career that blends the clear structure
    of a team sport with the tangible outcomes of engineering, allowing him to set measurable goals and see immediate results. While he worries about competition, he is motivated by the idea of earning
    respect through skill and dedication.
