persona_description: A scientist who specializes in the study of exoplanets, particularly the detection and imaging of exoplanets using the GPI instrument. He has a background in astrophysics and is currently
  working on a research project to directly image and study exoplanets. He is interested in understanding how exoplanets form and the potential differences between exoplanets and the giant planets in our
  solar system. He is also interested in the potential for exoplanets to have atmospheres and features similar to those of Jupiter.
