  hobbies: '[''Morning walks in Point Defiance Park'', ''Indoor herb gardening'', ''Cooking traditional Korean dishes'', ''Reading classic Korean and Western literature'', ''Small‑group book club'', ''Hangul
    calligraphy'', ''Jigsaw puzzles'', ''Crossword puzzles'', ''Playing Go'', ''Volunteering at a community cultural center'']'
  career_goals: Hyeyoung aims to advance to a senior operations director role within the next five years, where she can lead a stable, high‑performing unit and shape organization‑wide efficiency initiatives.
    She plans to earn a Six Sigma Black Belt and a PMP certification to formalize her practical expertise. Her ambition includes mentoring emerging managers, establishing clear, repeatable processes, and
    influencing company policy to promote sustainable, work‑life‑balanced practices. While competitive, she also seeks recognition for delivering measurable results and maintaining operational excellence
    in a consistent, routine‑focused environment.
