  hobbies: '[''Yoga'', ''Mindfulness Meditation'', ''Journaling'', ''Cooking Vietnamese Cuisine'', ''Gardening'', ''Volunteering at Health Fairs'', ''Reading Self‑Help Books'', ''Book Club'', ''Karaoke
    with Friends'']'
  career_goals: Sophear aims to advance to a senior leadership position—such as Director of Operations for a community health center—where she can oversee integrated mental health services and drive system‑wide
    quality initiatives. She plans to earn a bachelor's degree in health administration and acquire the Certified Medical Manager credential, while also championing staff well‑being programs that address
    workplace stress and burnout.
