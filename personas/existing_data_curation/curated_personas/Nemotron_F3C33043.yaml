  hobbies: '[''Gardening'', ''Hiking'', ''Reading Poetry'', ''Philosophy'', ''Local Folk Music'', ''Community Theater'', ''Cooking Seasonal Meals'', ''Collecting Vintage Postcards'', ''Yoga'', ''Meditation'',
    ''Gratitude Journaling'']'
  career_goals: Sarah aspires to expand her home studio into a shared creative space that can host artist residencies and community workshops, fostering a supportive network for local makers. She aims to
    secure a regional arts fellowship that will fund a series of interdisciplinary projects exploring the intersection of nature, memory, and mental wellness. Over the next five years, she hopes to exhibit
    her work in at least three state‑wide juried shows, publish an illustrated monograph that combines her paintings with personal essays, and develop a modest line of limited‑edition prints to achieve
    greater financial stability without compromising artistic freedom. Simultaneously, she wants to deepen her role as a mentor, establishing a youth art mentorship program that emphasizes empathy, collaboration,
    and stress‑relief through creative expression.
