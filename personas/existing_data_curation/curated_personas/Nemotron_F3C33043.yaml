personas:
  professional: Sarah Chitty, a 47‑year‑old multidisciplinary visual artist, blends oil painting, intaglio printmaking, and digital illustration to create concept‑driven works that reflect their curiosity
    and cooperative spirit, while their relaxed approach to planning lets them adapt quickly in community workshops and grant writing.
  sports: Sarah Chitty, a dedicated but leisurely fitness enthusiast, embraces movement by joining the Illinois River Valley Hiking Club for weekend treks, attending community yoga sessions, and cheerfully
    rooting for the Chicago Cubs and Chicago Bears while occasionally playing in a co‑ed softball league at the local fairgrounds, and they appreciate the gentle camaraderie of these activities.
  arts: Sarah Chitty immerses themselves in folk‑music evenings featuring artists like Gillian Welch and The Avett Brothers, draws inspiration from regional painters such as Grant Wood and contemporary
    printmaker Julie Mehretu, and regularly attends community theater productions starring local actor James Whitaker, all of which shape their own mixed‑media practice and reflective visual narratives.
  travel: Sarah Chitty favors low‑key, nature‑focused trips, often planning weekend getaways to the nearby Shawnee National Forest and annual visits to the historic town of Galena, while dreaming of a summer
    pilgrimage to the Irish countryside and a spring adventure exploring the lavender fields of Provence, and they balance modest travel budgets with a desire for quiet cultural immersion.
  culinary: Sarah Chitty, an enthusiastic home cook, crafts seasonal dishes such as heirloom tomato basil bruschetta, roasted beet and goat‑cheese salad, and apple‑cinnamon crumble using vegetables from
    their garden, confidently experiments with a sourdough starter and farm‑to‑table ingredients like smoked ham and fresh sage, and they delight in sharing meals at intimate pot‑luck gatherings with neighbors.
  core: Sarah Chitty blends a gentle Midwestern humility with restless curiosity, turning worry‑driven over‑thinking into richly layered artwork, while habitually misplacing paint brushes and forgetting
    appointments, yet they always find solace in a daily gratitude journal and a fresh sprig of rosemary from their garden.
background:
  cultural: Sarah grew up in a small Midwestern town in central Illinois, immersed in the rhythms of rural community life—family gatherings, church picnics, county fairs, and a strong ethos of neighborly
    support. Her ancestry traces back to German and Irish immigrants, which has cultivated an appreciation for folk crafts, seasonal traditions, and modest, hands‑on making. The cultural values of the Midwest—self‑reliance,
    humility, and a deep respect for communal harmony—inform her collaborative art practice and her commitment to nurturing local talent. While she identifies with the broader white American cultural context,
    her personal worldview is shaped by the down‑to‑earth sensibility, quiet resilience, and appreciation for simple, experiential learning that characterize life in rural Illinois.
