data:
  user 1 personas: 'I am 25 years old.

    My boyfriend is unemployed.

    I have a 7 year old daughter.

    We live in an apartment.

    I take her to the park.'
  user 2 personas: 'Its important to me to make my clients happy.

    I work in sales.

    I always answer my cellphone.

    When things go wrong , i do everything i can to make it right.

    I take fridays off in the summer.'
  Best Generated Conversation: 'User 1: Hi!

    User 2: Hi! What''s up?

    User 1: Not much, just hanging out with my daughter.

    User 2: That sounds fun! How old is she?

    User 1: She''s 7 years old.

    User 2: Wow, she''s getting so big!

    User 1: I know, it''s crazy.

    User 2: Do you have any other kids?

    User 1: No, she''s my only one.

    User 2: That''s nice. Do you like working in sales?

    User 1: It''s okay, I guess.

    User 2: What do you like about it?

    User 1: I like the challenge of meeting new people and learning about their businesses.

    User 2: That makes sense. What don''t you like about it?

    User 1: I don''t like the pressure to make a sale every time I meet with someone.

    User 2: I can understand that. What do you do to make your clients happy?

    User 1: I try to listen to them and understand their needs. I also try to offer them the best possible solution for their problems.

    User 2: That sounds like a good approach. What''s the best thing about being a sales person?

    User 1: I love the feeling of closing a deal. It''s really satisfying to know that I''ve helped someone solve a problem.

    User 2: That makes sense. I''m sure it''s a great feeling. What''s the worst thing about being a sales person?

    User 1: The worst thing is probably the rejection. It can be tough to get turned down over and over again.

    User 2: I can understand that. It''s important to not let it get to you.

    User 1: I know, it''s just hard sometimes.

    User 2: What do you do when you get rejected?

    User 1: I try to take a step back and relax. I also try to learn from the experience so I can do better next time.

    User 2: That sounds like a good approach. I''m sure you''ll get better at it with time.'
