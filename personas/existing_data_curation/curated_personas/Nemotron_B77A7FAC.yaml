personas:
  professional: Anthony Richards, a seasoned wildlife rehabilitator with fifteen years of hands‑on experience, leverages a vivid imagination and deep compassion to create custom enrichment devices and reclaimed‑material
    habitats while delivering heartfelt educational talks, all while juggling a relaxed, sometimes disorganized approach to deadlines as he pursues certification and a future role as lead rehabilitation
    coordinator.
  sports: Anthony Richards joins a regional bird‑watching club that partners with the local wildlife center, hikes the Northwoods trails weekly, and follows the Milwaukee Brewers for a dash of community
    spirit, but prefers low‑impact activities like kayaking over high‑intensity gym sessions.
  arts: Anthony Richards channels their creative energy into watercolor wildlife scenes, mixed‑media collages featuring feathers and bark, and melodies on a battered acoustic guitar inspired by forest sounds,
    regularly showcasing work at the Dells Craft Fair alongside fellow artists like folk singer-songwriter Sufjan Stevens and painter Agnes Martin.
  travel: Anthony Richards delights in weekend road trips to the Upper Peninsula’s remote lakes for sketching and mushroom foraging, has a bucket‑list destination of the Pacific Northwest’s rainforests,
    and plans travel around the blooming seasons to capture new flora for art, often improvising itineraries rather than adhering to strict schedules.
  culinary: Anthony Richards experiments with wild foraged ingredients, favoring dishes like chanterelle‑infused risotto, nettle pesto pasta, and cedar‑smoked trout, while modestly mastering the art of
    farm‑to‑table cooking in a small kitchen that doubles as a studio for occasional pop‑up tastings at local fairs.
  core: Anthony Richards blends an artistic soul with a heart for wildlife, juggling improvised financial habits, seasonal health fluctuations, and a love for nature‑infused travel while often letting creativity
    trump strict planning.
background:
  cultural: Anthony grew up in a small Midwestern town in Wisconsin, steeped in the region’s farming and outdoor traditions. His white, European-American heritage aligns with the cultural values of self-reliance,
    close-knit community, and a deep respect for the land that are common in the Upper Midwest. He was raised attending local church gatherings and community fairs, where storytelling, folk music, and seasonal
    celebrations reinforced a sense of belonging. These experiences fostered his appreciation for nature, practicality, and mutual support—traits that continue to shape his outlook on work, family, and
    civic involvement.
