  hobbies: '[''Watercolor painting'', ''Mixed-media art'', ''Birdwatching'', ''Wildlife photography'', ''Acoustic guitar'', ''Folk songwriting'', ''Mushroom foraging'', ''Seasonal cooking'', ''Craft making'',
    ''Community gardening'']'
  career_goals: Anthony aims to earn certification as a wildlife rehabilitator and eventually become the lead rehabilitation coordinator at the regional wildlife center. He hopes to complete his bachelor’s
    degree in environmental science, focusing on animal behavior and conservation art, to blend his scientific knowledge with his artistic passion. In the long term, he dreams of establishing a small sanctuary
    that doubles as an outdoor studio where he can create nature-inspired artworks and host community workshops on compassionate animal care. He also aspires to publish a children’s picture book that weaves
    imaginative stories about rescued animals, hoping to inspire empathy in the next generation.
