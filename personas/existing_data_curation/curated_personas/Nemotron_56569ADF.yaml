personas:
  professional: Mariane Henderson, an aspiring junior wildlife illustrator, channels their curiosity and love for fantasy creatures into detailed sketches, often organizing their notebook with color‑coded
    sections and dreaming of publishing a picture book that blends scientific accuracy with magical storytelling.
  sports: Mariane Henderson, an energetic participant in the Jacksonville YMCA swimming program, cheers for the Jacksonville Jaguars on game days, occasionally kicks a ball with the Armada FC junior soccer
    squad, and delights in exploring tide pools for crabs and starfish, merging aquatic curiosity with sports fandom.
  arts: Mariane Henderson, a passionate doodler, admires the wildlife illustrations of Beatrix Potter, the fantasy worlds of James Gurney, and listens to the smooth sounds of Miles Davis, the lyrical flow
    of Kendrick Lamar, and the uplifting gospel of Mahalia Jackson, letting these influences shape their vivid drawings and imaginative play.
  travel: Mariane Henderson, a curious day‑tripper, loves weekend adventures to the historic streets of St. Augustine, occasional family drives to the Everglades for airboat rides, and sunny beach outings
    along the Jacksonville Riverwalk and nearby tide pools, preferring relaxed, nature‑focused outings over crowded amusement parks.
  culinary: Mariane Henderson, a budding foodie, savors crunchy fish sticks with tartar sauce, builds peanut‑butter‑and‑jelly sandwiches shaped like sea creatures, delights in shrimp tacos topped with fresh
    cilantro, and enjoys mixing mango chunks into their yogurt, often pairing meals with a splash of lemonade.
  core: Mariane Henderson blends a vivid imagination, meticulous organization, and a gentle worry about the world into playful art, careful saving, attentive health habits, steady sports enthusiasm, eclectic
    musical tastes, nature‑rich travel, and tasty, creative meals.
background:
  cultural: Mariane is raised in a Black family in Jacksonville, Florida, where the vibrant African‑American cultural landscape shapes her everyday life. She participates in community traditions such as
    Juneteenth celebrations, local church gatherings, and the annual Jacksonville Beach Afro‑Caribbean Festival. Her household values stories of resilience and pride, sharing African‑American literature,
    oral histories, and music ranging from gospel to jazz and hip‑hop. Southern soul food, family barbecues, and seasonal neighborhood events reinforce her cultural identity, while her parents encourage
    her to explore both her roots and broader artistic and scientific worlds.
attributes:
  skills: '["reading comprehension", "basic arithmetic", "drawing and illustration", "observational skills", "following multi-step instructions", "basic digital navigation", "storytelling"]'
  hobbies: '["drawing", "reading books", "nature walks and tide‑pool exploration", "LEGO building", "puzzle solving", "museum and science‑center visits", "listening to music", "collecting seashells", "small
    group playdates"]'
  career_goals: Mariane dreams of one day becoming an artist who can bring stories to life on canvas, a wildlife biologist exploring animal habitats, or a teacher who shares her love of art and science
    with younger children. She hopes to combine creativity with curiosity, perhaps creating murals that celebrate her community’s heritage. Although she sometimes worries about making mistakes, she is motivated
    to keep learning, improve her skills, and eventually make a positive contribution to her neighborhood.
