persona_description: A scientist or researcher interested in food safety and health, particularly in the field of food mutagens and their impact on human health. They are interested in developing better
  models to assess the health risks associated with harmful substances in food, and are likely to have expertise in molecular biology, enzymology, and animal models. They are interested in the effects of
  heat-processing on food and the formation of carcinogenic substances, and are likely to have experience with laboratory mice and their use in research. They are also interested in the use of animal models
  in human health research and the potential for overestimating health risks in humans due to the differences in metabolism between mice and humans.
