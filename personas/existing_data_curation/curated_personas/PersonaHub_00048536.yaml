persona_description: A student who is interested in the Earth and Environmental Sciences field, particularly in the study of the way underlying geological processes affect the ecological systems of our
  planet and the impact upon human activity. They are engaged with concepts surrounding the internal and external processes of planet Earth, and the natural and man-made hazards which threaten to alter
  these processes in ways unfavourable to human beings and other animals. These are of course global issues, with a truly universal importance. Due to the interconnected nature of ecological processes,
  Environmental Science is a holistic concept in which the biosphere, atmosphere, hydrosphere, and geosphere are seen to be indivisible in terms of function – the health of the one relates to that of the
  other, each connected in an all-encompassing causal chain. Scholarly composition on Earth and Environmental Sciences, accordingly, addresses the wide-ranging multidisciplinary aspects of ecological study
  while relating these broader issues back to core concerns of geology and geography, the Earth's surface and interior.
