  hobbies: '[''Reading (mystery & non-fiction)'', ''Cooking Mexican & Tex-Mex cuisine'', ''Herb gardening'', ''Knitting'', ''Nature walks'', ''Wildlife photography'', ''Calligraphy'', ''Documentary watching'',
    ''Learning basic Python coding'']'
  career_goals: Mariaceleste aims to transition from front‑line sales to a supervisory role focused on inventory and back‑office efficiency. She plans to complete her GED and pursue a certification in retail
    management or supply chain logistics, positioning herself for a store manager or regional inventory coordinator position. Long‑term, she envisions leveraging her calm leadership style to improve operational
    processes at a distribution center and may eventually launch a small online boutique that curates culturally inspired products.
