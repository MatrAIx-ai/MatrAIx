personas:
  professional: Mariaceleste Prieto is a seasoned retail associate who excels at POS systems, inventory tracking, and bilingual customer service, and they leverage their calm, resilient demeanor and curiosity‑driven
    detail orientation to train new staff and streamline back‑office processes while aspiring to a supervisory role in inventory management.
  sports: Mariaceleste Prieto maintains fitness through early morning walks around Lake Austin, follows the Dallas Cowboys for football, participates in a community yoga class at the local recreation center,
    and they join a casual softball league with colleagues on weekends.
  arts: Mariaceleste Prieto immerses themselves in creative pursuits—devouring Agatha Christie mysteries and David McCullough histories, practicing elegant calligraphy, capturing wildlife with a Nikon D3500,
    knitting scarves while listening to Norah Jones, and they draw inspiration from the photography of Ansel Adams and the music of Ludovico Einaudi.
  travel: Mariaceleste Prieto favors quiet, nature‑centric travel, meticulously planning solitary getaways to places like Big Bend National Park and Santa Fe, balancing a modest budget with a love for local
    arts markets, and they dream of a future trip to the historic streets of Seville to source inspiration for a culturally‑inspired online boutique.
  culinary: Mariaceleste Prieto enjoys experimenting with intermediate‑level cooking of traditional Mexican and Tex‑Mex dishes such as chiles en nogada, carne asada tacos, and homemade guacamole, seasoning
    them with fresh cilantro, oregano, and lime from their balcony herb garden, and they often pair these meals with a chilled Michelada or a craft cerveza from a local brewery.
  core: Mariaceleste Prieto is a quietly curious, highly organized problem‑solver who blends meticulous retail expertise with a love for mystery novels, herb‑filled balconies, and they have a habit of overwatering
    plants.
background:
  cultural: Mariaceleste is a first‑generation Mexican‑American who grew up immersed in both Mexican traditions and Texas Southern culture. She is bilingual, celebrates Día de los Muertos and Christmas
    posadas with family, and frequently prepares classic dishes like tamales and pozole for community gatherings. Her heritage influences her strong sense of harmony, cooperative spirit, and love for quiet
    reflection, while also fostering a deep appreciation for Mexican music, folklore, and communal values.
attributes:
  skills: '[''POS System Operation'', ''Inventory Tracking'', ''Cash Handling'', ''Bilingual Communication (Spanish/English)'', ''Customer Service'', ''Merchandising'', ''Conflict Resolution'', ''Time Management'',
