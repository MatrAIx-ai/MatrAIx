personas:
  professional: David Woo is a seasoned sales professional in the automotive and industrial supply sectors, and they leverage their curiosity and data-driven mindset with Salesforce, HubSpot, Excel and
    Tableau to build client relationships, negotiate persuasively, and lead strategic account initiatives while balancing meticulous organization with the flexibility to adapt on the fly.
  sports: David Woo is an occasional weekend hiker of Tuskegee National Forest who participates in a local cross-country running club that meets for early-morning runs, roots for the Atlanta Falcons and
    the Birmingham Barons, and incorporates strength-training sessions at the community gym twice a week to offset back issues.
  arts: David Woo frequents the Birmingham Museum of Art and the Space One Eleven gallery, where they admire works by contemporary painter Amy Sherald and performance pieces by the local collective Half-Baked
    Circus, and they often reference the kinetic sculptures of Alexander Calder in book-club discussions, finding artistic innovation a source of creative fuel.
  travel: David Woo plans trips with a semi-structured itinerary that balances curiosity for history and nature, favoring weekend getaways to Asheville's Blue Ridge Mountains and cultural excursions to
    Charleston's historic district, while dreaming of a longer adventure to the Scottish Highlands and an artistic pilgrimage to the museums of Paris, all while budgeting to ensure travel does not disrupt
    family financial stability.
  culinary: David Woo enjoys Southern comfort foods such as smoked pork ribs, shrimp and grits, and homemade ginger-infused barbecue sauce, has an intermediate skill level in the kitchen where they often
    experiment with sourdough starter and fresh herbs like thyme and rosemary, and they relish dining at farm-to-table restaurants that feature locally sourced heirloom tomatoes and artisanal cheese.
  core: David Woo blends a data-driven sales career with restless curiosity for art and nature, often juggling worry-induced over-analysis with spontaneous woodworking projects, while occasionally neglecting
    sleep during intense work periods.
background:
  cultural: David grew up in Talladega, Alabama, a small‑town community that values Southern hospitality, close‑knit relationships, and a strong sense of place. As a white American in the region, his upbringing
    was shaped by local traditions such as church gatherings, high school football Friday night rituals, and community festivals celebrating the area's agricultural and industrial roots. While he embraces
    these cultural touchstones, his professional experiences in sales exposed him to diverse markets and ideas, nurturing his openness to unconventional thinking and broader artistic influences. This blend
    of Southern community values and a curiosity for new perspectives informs his worldview, balancing a respect for tradition with a drive to explore beyond his immediate environment.
attributes:
  skills: '["Client relationship building", "Sales negotiation", "Strategic account management", "CRM platforms (Salesforce, HubSpot)", "Data analysis (Excel, Tableau)", "Product knowledge in automotive
    and industrial supplies", "Public speaking and trade show presentations", "Event and campaign coordination", "Adaptability to market shifts"]'
  hobbies: '["Visiting art galleries and performance art events", "Reading non‑fiction on psychology, creativity, and business", "Hiking in Tuskegee National Forest", "Woodworking", "Participating in a
    community book club", "Volunteering at the Talladega historical museum"]'
  career_goals: David aims to progress into a regional sales manager role, leading a cross‑functional team while shaping sales strategies that blend data‑driven insights with creative problem‑solving. He
    aspires to mentor junior sales staff, fostering a culture of continuous learning and open dialogue. Ultimately, he envisions launching his own boutique consultancy focused on helping small manufacturers
    in the Southeast market improve their sales processes and customer engagement, allowing him to merge his business acumen with his appreciation for innovative ideas. Balancing professional growth with
    improved stress management is a central personal ambition, prompting him to seek leadership positions that also prioritize employee well‑being.
