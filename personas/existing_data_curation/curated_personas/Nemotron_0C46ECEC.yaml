  career_goals: Rayner aims to advance from his current role as a food service manager to a regional manager within a reputable hospitality group, leveraging his operational expertise and cultural insight.
    He aspires to complete a bachelor's degree in hospitality management or culinary arts, then launch his own fusion restaurant that marries Salvadoran culinary traditions with the vibrant food scene of
    Los Angeles. Long‑term, he envisions becoming a concept developer for a national chain, authoring a cookbook that showcases modern takes on classic pupusas and other Salvadoran dishes, and mentoring
    aspiring young chefs from the Salvadoran community.
