personas:
  professional: Lam Xie is a senior insurance strategist who leverages two decades of risk‑assessment expertise, data‑driven sales tactics, and bilingual communication to guide high‑performing agents, balancing
    a practical, organized work style with a curiosity for digital‑first underwriting solutions.
  sports: Lam Xie plays every Thursday night in the Manhattan Hoops League, hikes the Palisades and Hudson River Park trails on weekends, supports the New York Knicks, Giants, and Yankees, and adds seasonal
    yoga sessions to counterbalance the intensity of basketball.
  arts: Lam Xie hosts lively board‑game nights featuring Settlers of Catan, streams classic Ang Lee films, fills the home with John Coltrane jazz and Vampire Weekend indie pop, and occasionally enjoys Broadway
    productions such as Hamilton.
  travel: Lam Xie prefers family‑friendly weekend road trips to the Catskills and Boston’s historic Freedom Trail, while planning a summer adventure to Iceland’s volcanic landscapes, balancing meticulous
    itineraries with spontaneous stops at local diners.
  culinary: Lam Xie expertly crafts family‑style dumplings stuffed with pork, shrimp, ginger, and scallions for Chinese New Year, masters a fiery Sichuan mapo tofu, and occasionally indulges in a perfectly
    seared ribeye seasoned with rosemary and sea salt.
  core: Lam Xie blends data‑driven ambition with a love for community basketball, board games, and late‑night coffee, juggling a drive for leadership with a restless curiosity for tech and family traditions.
background:
  cultural: Lam is the son of Chinese immigrants who settled in the New York metropolitan area in the early 1980s. Raised in a bilingual household, he grew up celebrating Lunar New Year, the Mid‑Autumn
    Festival, and participating in local Chinese cultural associations. The family places a strong emphasis on education, respect for elders, and collective well‑being, values that inform his meticulous
    work ethic and collaborative style. While fully integrated into American society—evident in his community involvement and professional network—he retains a connection to Chinese heritage through language,
    cuisine, and regular visits to his parents' hometown, blending both cultures in his daily life.
attributes:
  skills: '[''Insurance product knowledge'', ''Customer relationship management'', ''Sales negotiation'', ''Risk assessment'', ''Data analysis'', ''CRM software proficiency (e.g., Salesforce)'', ''Public
