  career_goals: Robert aims to expand interdisciplinary STEM programs that integrate sustainability and real‑world engineering challenges, positioning his department as a leader in community‑engaged education.
    He seeks to secure larger research grants to develop collaborative projects with local energy and maritime industries, providing students with experiential learning opportunities. Over the next five
    years, he plans to mentor a cohort of emerging educators, contribute to statewide curriculum standards, and enhance outreach initiatives that inspire K‑12 students in Galveston County to pursue STEM
    pathways. Ultimately, he envisions retiring with a legacy of robust, student‑centered programs and a strengthened bridge between academia and the regional economy.
