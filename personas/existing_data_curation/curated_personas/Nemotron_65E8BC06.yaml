  career_goals: William aims to open a community-focused boutique fitness studio in Newark that blends modern training methods with culturally resonant programming for the city's Latinx population. He plans
    to earn an advanced certification such as the Certified Strength and Conditioning Specialist (CSCS) to deepen his technical knowledge, and eventually launch a signature "Andean Power" class that incorporates
    Peruvian rhythms and movement concepts. Over the next five years, he hopes to become a recognized advocate for accessible health education, partnering with local schools and nonprofits to promote active
    lifestyles among underserved youth.
