personas:
  professional: Domingo Wright, a civil engineer turned project strategist, leverages his Lean Six Sigma expertise, meticulous scheduling, and data‑driven budgeting to deliver multimillion‑dollar infrastructure
    projects on time, while they favor structure and cooperative teamwork that keep multidisciplinary teams aligned and habitually double‑check every compliance detail to ease their underlying worry.
  sports: Domingo Wright, an avid cyclist who logs weekly rides on the Manassas Trail with the Northern Virginia Cycling Association, roots for the Washington Commanders and Washington Capitals, and joins
    a seasonal adult softball league each spring for camaraderie and structured exercise, which they view as a predictable way to stay fit.
  arts: Domingo Wright, a woodworking hobbyist who crafts furniture as functional art, frequently attends live jazz at the Kennedy Center featuring Miles Davis tributes and blues gigs honoring B.B. King,
    and collects vinyl records of Ella Fitzgerald and Muddy Waters, and they find the improvisational music a soothing counterbalance to their structured work life.
  travel: Domingo Wright, a methodical planner who prefers trips with clear itineraries, has explored historic sites in Washington D.C. and the Blue Ridge Mountains, dreams of visiting Kyoto’s sustainable
    gardens and Copenhagen’s bike‑friendly streets, and chooses family‑oriented vacations that blend educational tours with low‑impact accommodations, which they arrange months in advance to minimize stress.
  culinary: Domingo Wright, a competent home chef, enjoys preparing roasted vegetable medley with heirloom tomatoes, zucchini, and basil from their garden, pairs it with a citrus‑infused quinoa salad, and
    occasionally indulges in classic Southern shrimp étouffée featuring Andouille sausage and okra, while they favor fresh, locally sourced ingredients and view cooking as a structured, rewarding routine.
  core: Domingo Wright is a detail‑oriented civil engineer who balances meticulous project work, structured gardening, and disciplined budgeting with a love for jazz, cycling, and a gentle habit of over‑checking
    every box, which they do to keep anxiety at bay.
background:
  cultural: Domingo was raised in a close‑knit African‑American community in Virginia, where church gatherings, family reunions, and neighborhood block parties were central to his upbringing. His heritage
    includes Southern culinary traditions, gospel and jazz music, and a strong emphasis on collective responsibility and mutual support. Growing up in Manassas, he has been shaped by the area's rich civil‑rights
    history and the diverse cultural tapestry of the Washington‑DC metropolitan region. He incorporates these influences through participation in local Juneteenth celebrations, mentoring programs for Black
    youth, and a commitment to preserving the community’s cultural legacy while navigating a professional environment that values both tradition and progress.
attributes:
  skills: '[''Project Management'', ''Civil Engineering Design'', ''Budgeting & Cost Control'', ''Regulatory Compliance'', ''Risk Assessment & Mitigation'', ''Team Leadership'', ''Lean Six Sigma Process
    Improvement'', ''Data Analysis (Excel, MATLAB)'', ''Technical Writing'', ''Stakeholder Communication'', ''Strategic Planning'', ''Quality Assurance'']'
  hobbies: '[''Home gardening'', ''Woodworking'', ''Cycling on local trails'', ''Reading non-fiction (history, leadership, self‑improvement)'', ''Volunteer STEM tutoring'', ''Attending jazz and blues concerts'',
    ''Family fishing trips'', ''Exploring historic sites in Virginia'', ''Cooking Southern‑inspired meals'', ''Practicing mindfulness meditation'']'
  career_goals: Domingo aims to move into senior leadership within the engineering sector, targeting a role as Engineering Manager or Director of Infrastructure within the next three years. He plans to
    obtain his Professional Engineer license and a PMP certification to reinforce his credibility. Long‑term, he envisions establishing a consulting firm focused on sustainable, community‑centered infrastructure
    projects in Northern Virginia, creating mentorship pipelines for Black and under‑represented engineers. He also hopes to influence corporate policy toward more inclusive hiring and development practices,
    while maintaining a stable work‑life balance to manage his stress.
