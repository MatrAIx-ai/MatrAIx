  career_goals: Even at six, Justin has begun dreaming about how he might spend his future. Growing up on a farm in Lidgerwood, he is fascinated by the rhythm of agricultural life and often imagines himself
    working on a family ranch, managing livestock, and maintaining equipment. He also expresses a quiet curiosity about animals, hoping one day to become a veterinarian who uses precise tools to help them,
    combining his love for animals with his methodical nature. While his aspirations are still playful, they are grounded in the practical, responsibility‑focused outlook shaped by his environment and personality.
