  career_goals: Although she is only one year old, Rosalinda’s family encourages her nascent desire for structure and achievement. She looks forward to enrolling in a bilingual preschool where she can expand
    her language skills and develop early academic habits. Her long‑term ambition, as imagined by her parents, is to become a diligent student who excels in science and the arts, eventually pursuing a career
    that allows her to contribute to her Venezuelan community in Miami.
