  career_goals: Even at this tender age, Ricky's parents observe a budding fascination with how things work—watching adults manipulate tools and instantly trying to imitate them. This practical curiosity
    hints at a future ambition to become an engineer or a hands‑on problem solver who blends inventive thinking with reliable, methodical approaches. He also shows gentle compassion toward animals, suggesting
