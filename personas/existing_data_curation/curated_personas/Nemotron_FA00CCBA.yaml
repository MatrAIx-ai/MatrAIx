  hobbies: '["Basketball", "Flag football with friends", "Video gaming (Fortnite, Minecraft)", "Fishing and outdoor exploring", "Woodworking projects", "Playing guitar", "Boy Scouts/Community service"]'
  career_goals: Alston hopes to earn a high school sports scholarship, ideally in basketball or football, and eventually play at the collegiate level. Inspired by his love for building things, he also dreams
    of studying mechanical engineering or automotive technology after college, aiming to work on high‑performance vehicle design or become a skilled technician. He envisions a career that blends competition,
    teamwork, and hands‑on problem solving, allowing him to stay active while creating tangible results.
