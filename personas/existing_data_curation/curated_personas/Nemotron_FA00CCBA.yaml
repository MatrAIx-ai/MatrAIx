personas:
  professional: Alston is an aspiring eSports competitor and budding junior carpenter, merging his love for video‑gaming tournaments with hands‑on woodworking projects while applying his practical, structure‑seeking
    mindset to both digital and physical arenas.
  sports: Alston dominates the local park’s basketball court after school, plays flag‑football with the community league’s "Eagle Hawks" team, follows the Chicago Bulls and Seattle Seahawks for professional
    inspiration, and maintains a flexible fitness routine that alternates between pickup games, weekend fishing trips, and occasional hunting trips during season.
  arts: Alston strums an acoustic guitar to the tunes of Bob Dylan and John Mayer, often humming along to the soundtrack of the movie ‘Guardians of the Galaxy’, and finds inspiration in the comic‑book art
    of Stan Lee while sharing their own doodles on the Scout troop’s bulletin board.
  travel: Alston’s travel style mixes spontaneous weekend camping at nearby Lake Martin for fishing and hunting with dreams of attending the gaming convention in Austin, Texas and exploring the rugged landscapes
    of Banff National Park, though family budget constraints usually keep trips short and local.
  culinary: Alston gravitates toward hearty fare like grilled cheese with tomato soup, BBQ chicken wings seasoned with smoked paprika, and fish tacos made from their own catch, often cooking on a portable
    camp stove with simple ingredients such as lime, cilantro, and corn tortillas, while proudly claiming their secret "sauce" as a dash of hot sauce and a pinch of brown sugar.
  core: Alston is a competitive, structure‑loving teen who blends outdoor adventure with video‑gaming prowess, yet can be delightfully disorganized, always juggling a secret stash of cash and a guitar case.
background:
  cultural: Alston grew up in Hardy, a small, rural town in Sharp County, Arkansas, where Southern hospitality, close‑knit community ties, and conservative values shape everyday life. His family attends
    a local evangelical church, and they regularly take part in community events such as county fairs, football games, and seasonal hunting trips. The region’s agricultural roots and emphasis on self‑reliance
    influence his practical skills and love for outdoor pursuits, while the school’s strong sports culture fosters his competitive spirit.
attributes:
