  career_goals: Although Jermel is not currently part of the formal workforce, he aims to stay purposefully engaged in his community. He plans to formalize his mentorship role by offering free handyman
    workshops for local youth, documenting his family’s history in a memoir, and completing a GED program to broaden his learning options. He also hopes to cultivate a small side venture offering gardening
    advice and modest landscaping services, allowing him to blend his curiosity for new horticultural techniques with his practical skill set, all while preserving his need for quiet, focused work.
