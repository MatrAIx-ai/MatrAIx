  career_goals: Julianna dreams of becoming an artist who creates colorful murals that bring joy to her neighborhood or a teacher who inspires children to explore their creativity. She also imagines exploring
    the outdoors as a wildlife photographer or a young scientist, using her curiosity to learn new things. She values flexibility and hopes to keep her options open, exploring different creative paths as
    she grows.
