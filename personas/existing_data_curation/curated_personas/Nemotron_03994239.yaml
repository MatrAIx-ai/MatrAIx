personas:
  professional: Julianna Whittall, a budding kindergarten activity coordinator, channels her curiosity and love for group play into leading simple art and storytime projects, showing early leadership and
    improvisational skills.
  sports: Julianna Whittall dashes around the neighborhood playground, loves being a forward on Little Sprouts Soccer Club, cheers for the San Antonio Spurs on TV, and enjoys weekend family bike rides.
  arts: Julianna Whittall lights up when drawing with Crayola crayons, mimics characters from Disney's Frozen, and sings along to the rhythms of Pixar soundtracks, often staging impromptu dance shows for
    friends.
  travel: Julianna Whittall embraces family road trips to the beach and adventure‑packed days at Disneyland, while dreaming of a future visit to the Eiffel Tower in Paris.
  culinary: Julianna Whittall prefers chicken nuggets with honey mustard dip, loves mac and cheese topped with cheddar, and proudly pretends to bake chocolate chip cookies with her dad, often sprinkling
    extra chocolate chips for fun.
  core: Julianna Whittall is an exuberant five‑year‑old who mixes boundless curiosity with a penchant for spontaneous group games, occasional mess‑making, and an ever‑growing stash of glittery stickers.
background:
  cultural: Julianna comes from a White American family living in the suburban community of Murrieta, California. Her upbringing reflects typical middle‑class Californian values, with an emphasis on family
    gatherings, celebrating holidays such as Thanksgiving and Fourth of July, and participation in local community events. Her parents encourage curiosity, creativity, and exposure to the arts, often taking
    her to nearby museums, art classes, and park activities. The diverse cultural environment of Southern California provides her with a broad awareness of different traditions while her household maintains
    core American customs.
attributes:
  skills: '[''basic literacy (letter recognition, phonemic awareness)'', ''counting to 20'', ''coloring and drawing with imagination'', ''creative storytelling'', ''basic tablet navigation for educational
