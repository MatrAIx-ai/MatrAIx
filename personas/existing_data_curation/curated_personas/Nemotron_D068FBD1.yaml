personas:
  professional: Alonso Duarte is a seasoned television and film production specialist who leverages a decade of camera operation and editing expertise—mastering Arri Alexa, RED, and DaVinci Resolve—while
    channeling his curiosity and relaxed, flexible approach to lead crews through tight schedules and collaborative storytelling.
  sports: Alonso Duarte fuels his energetic social life by playing forward for a local amateur soccer league, cheering on FC Dallas during the MLS season, and joining weekend hikes with friends in the Texas
    Hill Country, where they prioritize fun and camaraderie over strict training regimens.
  arts: Alonso Duarte devotes evenings to dissecting films by directors such as Christopher Nolan and the Coen brothers while attending live shows ranging from indie rock acts like The Strokes to regional
    folk‑rock group The Flatlanders, and they regularly capture street scenes with a Sony A7, sharing the work in community galleries and workshops.
  travel: Alonso Duarte embraces spontaneous road trips to music festivals in Austin and cultural fairs in Santa Fe, preferring last‑minute flight deals and flexible itineraries that balance family commitments
    with a craving for both adventure and relaxation.
  culinary: Alonso Duarte experiments in the kitchen, mastering regional Tex‑Mex dishes such as chicken fajitas and chiles rellenos while fusing chipotle‑spiced ramen with a southwestern twist, and they
    enjoy cooking with ingredients like cilantro, chipotle peppers, and masa, though they occasionally over‑salt their creations in the excitement of trying new flavor combos.
  core: Alonso Duarte is a charismatic visual storyteller who juggles a passion for cameras, soccer, and spontaneous road trips, all while habitually misplacing lenses, procrastinating on paperwork, and
    never missing a Sunday concert.
background:
  cultural: Alonso was raised in a bicultural Mexican-American household in central Texas. His parents emigrated from Veracruz, and the family maintains traditions such as preparing tamales, celebrating
    Dia de los Muertos, and speaking Spanish at home. Growing up bilingual, Alonso navigates both Mexican heritage and the Texan milieu, which informs his artistic sensibility and community involvement.
    He actively participates in local Latino cultural events, supports Mexican-American musicians, and draws upon his roots to bring authentic perspectives to his visual work.
attributes:
  skills: '[''Digital camera operation (Arri Alexa, RED, Sony A7)'', ''Video editing (Premiere Pro, Avid Media Composer, DaVinci Resolve)'', ''Cinematography and lighting design'', ''Color grading'', ''Storyboarding
    and shot planning'', ''On-set communication and crew coordination'', ''Audio sync and basic sound editing'', ''Post-production workflow management'', ''Visual storytelling & narrative analysis'', ''Bilingual
    production coordination (English/Spanish)'']'
  hobbies: '[''Playing soccer'', ''Live music concert attendance'', ''Hill Country hiking'', ''Street and landscape photography'', ''Cooking Mexican and Tex-Mex cuisine'', ''Volunteer teaching camera workshops'',
    ''Film appreciation and critique'', ''Reading Mexican literature'', ''Traveling to cultural destinations'', ''Participating in community festivals (Dia de los Muertos, Cinco de Mayo)'']'
  career_goals: Alonso aims to transition from camera operation and editing to a full-time Director of Photography on feature-film and high-profile streaming projects. He intends to build a reputation for
    visual storytelling that highlights Mexican-American experiences, eventually directing his own independent documentaries. Within five years he hopes to launch a boutique production company that mentors
    emerging Latino talent and produces culturally resonant content. He also seeks a stable position that affords him flexibility to support his family and maintain work-life balance.
