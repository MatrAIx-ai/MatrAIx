persona_description: A researcher or physician specializing in the study of brain tumors, particularly meningiomas. This persona is likely to be interested in the etiology and pathology of meningiomas,
  as well as the classification and grading of these tumors using the World Health Organization (WHO) scale. They may also be interested in the molecular alterations or damages that lead to meningioma formation
  and the genetic factors associated with meningiomas, such as the NF2 gene. Additionally, they may be interested in the pathologic characteristics of meningiomas, including their aggressiveness and how
  they affect patient outcomes.
