  career_goals: Beatriz dreams of becoming an artist who creates vibrant illustrations and stories that celebrate Colombian folklore and everyday adventures. She also imagines herself as a teacher who inspires
    creativity and curiosity in other children. Fascinated by nature, she hopes to explore marine biology one day to protect ocean life. Beyond specific careers, she aspires to travel, learn about different
    cultures, and organize fun workshops that help friends feel confident and less stressed.
