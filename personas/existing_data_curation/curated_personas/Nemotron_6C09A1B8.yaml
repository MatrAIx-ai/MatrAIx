personas:
  professional: Beatriz Pizarro is an aspiring digital storyteller who blends watercolor illustrations of mythic characters with Scratch-coded interactive adventures, channeling her curiosity and love of
    group collaboration while often juggling school projects with a relaxed, improvisational approach.
  sports: Beatriz Pizarro enjoys playing soccer with the neighborhood kids at the local Riverside Park league, cheering on the hometown team River City FC, and sometimes joins the after‑school gymnastics
    club to keep her energy flowing.
  arts: Beatriz Pizarro delights in creating vibrant watercolor scenes of legendary forest spirits while listening to upbeat cumbia rhythms by Los Gaiteros de San Jacinto and pop hits from Ariana Grande,
    and she often crafts friendship bracelets inspired by the intricate patterns of traditional folk art.
  travel: Beatriz Pizarro loves weekend hikes along the misty trails of the nearby Sierra Verde reserve, dreams of visiting the historic coastal town of Santa María, and hopes to explore the bustling streets
    of Barcelona next summer.
  culinary: Beatriz Pizarro favors bright, finger‑friendly foods like fruit‑topped mini pancakes, cheesy empanadas, and mango smoothies, and she enjoys helping her family prepare simple pastelitos during
    weekend cooking sessions.
  core: Beatriz Pizarro is a curious, art‑obsessed nine‑year‑old who balances boundless creativity and social energy with occasional worry‑driven disorganization and a never‑ending appetite for colorful
    adventures.
background:
  cultural: Beatriz is a first‑generation Colombian‑American raised in a bilingual household where Spanish is spoken at home and English at school. Her family celebrates Colombian holidays such as Independence
    Day and Carnaval with music, dancing, and traditional foods like arepas and empanadas. She participates in school multicultural events, sharing Colombian stories and crafts with classmates. Living in
    Bay Shore, NY, she enjoys the diverse cultural landscape of Suffolk County, blending Colombian traditions with American customs, and navigates both identities with curiosity and pride.
