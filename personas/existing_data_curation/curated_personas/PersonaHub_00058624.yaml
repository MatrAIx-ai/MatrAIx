persona_description: A scientist who studies retinogenesis in mouse retinas, specifically the effects of Notch signaling pathway inhibitors on retinal development and neuronal differentiation. They are
  interested in the role of Notch signaling in retinal progenitor cell proliferation and differentiation, and have previously used conditional genetic approaches to study the impact of Notch1 deletion on
  mouse retinal development. They are currently experimenting with pharmacological inhibitors of Notch signaling in mouse retinas to determine their effect on neuronal differentiation and retinal development.
