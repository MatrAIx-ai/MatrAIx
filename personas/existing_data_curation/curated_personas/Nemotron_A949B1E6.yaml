personas:
  professional: Gabriel Mcmillian is a field hydrologist who blends rigorous groundwater modeling, GIS spatial analysis, and water‑quality lab work with community‑focused storytelling, turning complex data
    into vivid visual reports that rally local stakeholders while navigating a spontaneous, less‑structured work style.
  sports: Gabriel Mcmillian is an avid trail runner and kayaker who trains with the Willamette River Runners club, follows the Portland Timbers and Trail Blazers, and carves out weekly hikes in the Columbia
    River Gorge, balancing fitness with community river‑cleanup volunteer days.
  arts: Gabriel Mcmillian channels a love for landscape painting and photography into weekend expeditions where they capture Willamette River sunsets reminiscent of Ansel Adams, study works by Thomas Moran,
    and unwind listening to Lila Downs’ folk rhythms and The Shins’ indie rock at Portland’s Roots Festival.
  travel: Gabriel Mcmillian favors spontaneous road trips that blend rugged outdoor adventure with cultural immersion, having biked the Pacific Coast Highway, trekked the alpine trails of the Cascades,
    and dreaming of exploring the historic stone towns and vibrant marketplaces of southern Central America’s coastal regions.
  culinary: Gabriel Mcmillian delights in cooking aromatic dishes like pork‑marinated tacos with pineapple, rich mole sauce spiced with chilies, chocolate, and nuts, and hand‑rolled corn tortillas, pairing
    them with fresh cilantro, epazote, and lime while inviting friends over for communal feasts that echo family celebrations.
  core: Gabriel Mcmillian is a 43‑year‑old field hydrologist who fuses scientific rigor with artistic storytelling, driven by spontaneous energy, community harmony, and a habit of occasionally over‑indulging
    in gear and spice.
background:
  cultural: Gabriel was raised in a close‑knit Mexican family that upheld traditions of communal gatherings, respect for nature, and a deep appreciation for storytelling through art and music. His bilingual
    ability and love for Mexican cuisine keep his heritage alive, while living in Sherwood, Oregon, he has blended these roots with the Pacific Northwest's outdoors‑oriented culture. This bicultural perspective
    shapes his worldview, fostering a strong sense of responsibility toward both his local environment and the broader community, and influencing his collaborative, harmony‑seeking approach in both professional
    and personal realms.
attributes:
  skills: '[''Groundwater modeling'', ''GIS spatial analysis'', ''Remote sensing interpretation'', ''Field sampling and well installation'', ''Water‑quality laboratory analysis'', ''Hydrogeologic data management'',
    ''Environmental impact assessment'', ''Community outreach and education'', ''Project coordination'', ''Mentoring and peer training'']'
  hobbies: '[''Landscape painting'', ''Nature photography'', ''Hiking'', ''Kayaking'', ''Trail running'', ''Cooking Mexican cuisine'', ''Social dancing'', ''Attending music festivals'', ''River clean‑up
    volunteering'', ''STEM outreach for youth'']'
  career_goals: Gabriel aims to transition from a technical specialist to a community‑driven water resources leader in the Pacific Northwest. He plans to earn a professional geoscientist certification while
    completing a bachelor's degree in environmental science through part‑time study. His long‑term ambition is to launch a regional citizen‑science program that empowers residents to monitor local aquifers
    and stream health, integrating artistic visualizations to make data more engaging. He also hopes to publish interdisciplinary research that bridges hydrology with cultural narratives, and eventually
    serve as an advisor on municipal water policy to promote sustainable and equitable water management practices.
