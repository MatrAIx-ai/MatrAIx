  hobbies: '[''Soccer'', ''Mexican Cooking'', ''Youth Outreach Volunteering (Woodworking Workshops)'', ''Fishing'', ''Gardening'', ''Acoustic Guitar Playing'', ''Mexican Folk Music Listening'', ''Dancing
    at Cultural Festivals'']'
  career_goals: Luis aims to transition from working as a journeyman carpenter to owning a small, family-run construction firm that specializes in sustainable, energy-efficient homes. Over the next five
    years he plans to obtain his Texas contractor's license, hire and mentor two apprentices, and develop a niche market for handcrafted wood features that reflect his Mexican-American heritage. He also
    hopes to secure a stable retirement plan that allows him to continue occasional consulting work while spending more time with his family and community.
