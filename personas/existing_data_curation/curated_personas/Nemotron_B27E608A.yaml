personas:
  professional: Luis Perez, a seasoned carpenter with over thirty years of hands‑on experience, combines a methodical, blueprint‑driven approach with bilingual communication to lead remodel projects, while
    strategizing the launch of a family‑run construction firm focused on sustainable, energy‑efficient homes.
  sports: Luis Perez stays active by playing forward in a local soccer league, cheering on a Texas MLS team in the summer, and fishing on nearby lakes during the off‑season, while also maintaining a membership
    at the community gym where he does light weight training to support his back health.
  arts: Luis Perez adds a melodic thread to community events by playing acoustic guitar, drawing inspiration from folk icons like Los Lobos, Lila Downs, and Silvio Rodriguez, and enjoys dancing at cultural
    festivals where traditional rhythms keep his spirit lively.
  travel: Luis Perez prefers road trips that blend family reunions with cultural immersion, having recently explored historic plazas in Granada, Spain, the coastal charm of the Amalfi Coast, and the scenic
    wineries of Oregon's Willamette Valley, while planning a future pilgrimage to folk‑music festivals in the Andes.
  culinary: Luis Perez delights in preparing tamales, mole, and home‑cured salsa using fresh corn masa, assorted dried chilies, and garden‑grown cilantro, while his cooking skill ranges from expert hand‑rolled
    tortillas to modest attempts at artisanal cheese, often sharing meals with friends at neighborhood potlucks.
  core: Luis Perez is a structured, talkative craftsman who weaves community, tradition, and meticulous planning into every board he cuts, every song he strums, and every financial spreadsheet he balances,
    all while wrestling with occasional worries about health and the future.
background:
  cultural: Luis was born to Mexican immigrant parents who settled in Texas when he was a child. He grew up bilingual, speaking Spanish at home and English at school, and was raised with strong family values,
    respect for elders, and a work ethic rooted in his heritage. Traditional celebrations such as Dia de los Muertos, Cinco de Mayo, and Christmas posadas remain central to his family life. The fusion of
    Mexican customs with Texan community life is reflected in his culinary preferences, religious practices (Catholic), and his dedication to preserving Mexican craftsmanship through his carpentry. Luis
    often incorporates Mexican design motifs, like hand-carved ornamental patterns, into his projects, and he actively participates in local cultural events that celebrate Hispanic heritage.
