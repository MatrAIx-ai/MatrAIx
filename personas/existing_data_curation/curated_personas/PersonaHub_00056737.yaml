persona_description: A business owner who operates a manufacturing company that produces a certain product, and is currently experiencing financial difficulties due to high costs and low profits. The company
  is currently using 50,000 workers to produce 200,000 units of output per day, and the daily wage per worker is $80. The price of the firm’s output is $25, and the cost of other variable inputs is $400,000
  per day. The total fixed cost of the company is $1,000,000. The company is considering shutting down when the total fixed cost equals $3,000,000, and is seeking to determine the optimal number of workers
  to keep or lay off in order to break even.
