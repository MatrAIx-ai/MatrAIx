personas:
  professional: Harriet Petty is an emerging arts‑communication enthusiast who leverages their knack for storytelling and social‑media savvy to curate engaging content for local galleries and community
    nonprofits, while their relaxed approach to deadlines often leads them to juggle multiple event projects with improvisational flair.
  sports: Harriet Petty enjoys weekend hikes along the Niagara River Gorge and casual volleyball at the Buffalo YMCA, cheers loudly for the Buffalo Bills and Buffalo Sabres, and occasionally joins the community’s
    5K “Erie Canal Run” while preferring a laid‑back fitness routine over regimented training.
  arts: Harriet Petty spends afternoons sketching watercolor studies in the Albright‑Knox, captures candid street moments for Instagram, follows contemporary novelist Sally Rooney and visual artist Banksy,
    and regularly attends live shows by local indie band The Gaison Band at The Tralf, all of which fuel their eclectic creative identity.
  travel: Harriet Petty prefers spontaneous road trips to nearby gems like Letchworth State Park, a weekend skate through Toronto’s Distillery District, and the occasional backpacking adventure in Berlin’s
    museum islands, planning on a whim via last‑minute deals and often forgetting to pack their sketchbook until the last moment.
  culinary: Harriet Petty loves indulging in Buffalo‑style chicken wings with cayenne‑garlic glaze, savoring farm‑fresh avocado toast topped with heirloom tomatoes, and experimenting with homemade miso‑glazed
    salmon while modestly prepping meals at home using a well‑worn cast‑iron skillet and a flourishing collection of locally sourced herbs.
  core: Harriet Petty is an 18‑year‑old, art‑driven social butterfly who thrives on spontaneous creativity, an ever‑growing network of friends, and a habit of leaving their planner at home.
background:
  cultural: Harriet grew up in Lancaster, a small town in Erie County, New York, where the steady pace of Midwestern life meets the cultural energy of nearby Buffalo. Her family, rooted in the region’s
    middle‑class, values education, community involvement, and seasonal celebrations such as Thanksgiving and the Erie County Fair. The proximity to Buffalo’s vibrant art scene—museums, galleries, and live‑music
    venues—has nurtured her appreciation for creative expression, while the natural landscapes along the Erie Canal and Lake Erie have fostered a love for outdoor recreation. While identifying with a broadly
    mainstream American white cultural heritage, she actively engages with the diverse artistic and cultural currents that flow through Western New York.
