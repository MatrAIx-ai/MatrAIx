  hobbies: '[''Visiting art galleries'', ''Sketching'', ''Watercolor painting'', ''Photography'', ''Live music'', ''Improvisational comedy'', ''Dancing'', ''Reading contemporary fiction'', ''Hiking'', ''Volunteering
    at community arts projects'']'
  career_goals: Harriet aims to complete a bachelor’s degree in Communications or Arts Management, building on her current college coursework. She envisions a career that combines her love for the arts
    with her sociable nature, such as working in public relations for a museum, developing community outreach programs for arts nonprofits, or managing cultural events in the Buffalo region. Long‑term,
    she hopes to cultivate a personal brand as a content creator who spotlights emerging artists and cultural experiences, and she is open to traveling to broaden her perspective and bring new ideas back
    to her hometown community.
