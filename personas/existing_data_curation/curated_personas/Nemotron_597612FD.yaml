  hobbies: '[''Motorcycle restoration'', ''DIY furniture building'', ''Electronic hobby kits'', ''Mexican soccer (Liga MX) fandom'', ''Cooking traditional Mexican cuisine'', ''Watching documentary series
    on engineering and technology'']'
  career_goals: Jose is determined to re‑enter the formal labor market by obtaining a recognized certification in automotive technology or commercial construction. He aims to secure a stable, full‑time
    position that provides health benefits and a reliable income to support his family. He also dreams of eventually opening a modest auto‑repair shop or a home‑renovation side business that could serve
    the local community in Hawthorne. In the short term, he plans to enroll in a community college vocational program, complete a GED, and build a portfolio of completed projects to demonstrate his competence
    to prospective employers.
