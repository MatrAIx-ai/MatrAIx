personas:
  professional: Linda Simpkins is a budding robotics hobbyist who blends their vivid imagination with meticulous planning to craft Scratch games and intricate LEGO mechanisms, while their sociable nature
    shines in collaborative school projects.
  sports: Linda Simpkins laces up for the Rio Rancho Youth Soccer League every Thursday, emulating the midfield instincts of New Mexico United's star players, practices ball control with clear, methodical
    drills, and during summer months trades the soccer field for breezy trail runs with friends, all while cheering for the Denver Broncos on NFL Sundays.
  arts: Linda Simpkins sketches sweeping desert panoramas reminiscent of Georgia O'Keeffe's palette, joins the elementary children's choir where they often perform classic Disney numbers like 'Let It Go',
    doodles comic strips inspired by the witty humor of Calvin and Hobbes, and avidly collects stickers of pop icons such as Billie Eilish and Zendaya, all of which nurture a vivid artistic identity that
    blends classic painting, modern music, and playful illustration.
  travel: Linda Simpkins plans family weekend getaways with a tidy checklist, frequently explores nearby trails in the Sandia Mountains and the Petroglyph National Monument, dreams of visiting the Grand
    Canyon's rim next summer, and looks forward to a future trip with their parents to Disneyland in California for a blend of adventure and enchantment.
  culinary: Linda Simpkins loves the bold flavors of cheddar cheese quesadillas with freshly sliced jalapeños, enjoys assembling easy spaghetti with tomato sauce and basil, occasionally attempts a student-friendly
    prickly pear sorbet using the desert fruit, and while their cooking skill is still beginner-level, they take pride in chopping vegetables safely under parental guidance.
  core: Linda Simpkins is a spirited ten-year-old who merges meticulous LEGO engineering with dreamy desert doodles, but they often forget to finish their homework when a new comic idea sparks, leaving
    a trail of unfinished worksheets on their desk.
background:
  cultural: Linda is a white‑American child raised in the suburban community of Rio Rancho, New Mexico, near Albuquerque. The region’s southwestern atmosphere—characterized by desert landscapes, a mix of
    Hispanic and Pueblo Native American influences, and vibrant local festivals—shapes her daily life. She celebrates typical American holidays while also participating in community events such as the Albuquerque
    International Balloon Fiesta and school activities that introduce Spanish language basics. Her family values education, community involvement, and appreciation for regional foods like green chile, all
    of which contribute to her broad cultural perspective.
