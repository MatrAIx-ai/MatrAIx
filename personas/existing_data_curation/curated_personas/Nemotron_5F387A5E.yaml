  career_goals: Linda dreams of becoming an astronaut who can explore the stars, a wildlife biologist who protects animals in desert habitats, or an illustrator who brings fantastical worlds to life in
    books. She aspires to combine her love of science and art by leading a school science club that creates visual projects, and eventually hopes to teach younger children how to imagine and experiment.
    Her ambition is to use her creativity and organization to inspire others and make a positive impact on the world.
