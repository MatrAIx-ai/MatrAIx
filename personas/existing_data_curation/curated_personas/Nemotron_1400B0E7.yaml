personas:
  professional: Anamaria Cromwell is an inquisitive LEGO architect in training, blending their love for hands‑on circuitry with a practical eye for sturdy builds, while their relaxed attitude toward deadlines
    lets them improvise when a project goes awry, and their competitive streak drives them to out‑engineer classmates’ creations.
  sports: Anamaria Cromwell bolts around the neighborhood field every Saturday with the Eastside Junior Soccer Club, channeling the competitive drive of their idol Lionel Messi, while they cheer for Manchester
    United on TV and secretly hope to make the varsity squad at their elementary school.
  arts: Anamaria Cromwell spends quiet afternoons sketching animals in the style of Beatrix Potter, loses themselves in Nancy Drew mysteries, and they get pumped by the catchy beats of Billie Eilish, all
    of which shape a vivid artistic world that fuels both their LEGO designs and storytelling games.
  travel: Anamaria Cromwell prefers spontaneous weekend road trips to nearby state parks like Yosemite, where they hunt for interesting rocks, but they dream of a future family vacation to Tokyo’s Akihabara
    to explore tech museums and collect exclusive Pokémon cards, balancing adventurous curiosity with the comfort of staying close to home.
  culinary: Anamaria Cromwell delights in baking chocolate chip cookies with extra rainbow sprinkles, experiments with shaping dough into tiny LEGO bricks, and they order pepperoni pizza topped with pineapple,
    all while proudly declaring their favorite snack is a crunchy apple with caramel dip.
  core: Anamaria Cromwell is a curiosity‑driven 9‑year‑old who builds moving LEGO contraptions, worries about perfect scores, thrives on friendly rivalry, and can often be found juggling a sketchbook and
    a half‑finished cookie batch in equal measure.
background:
  cultural: Anamaria grows up in a middle‑class white family in Lewisville, Texas, a suburban community that blends traditional Texan hospitality with modern suburban life. Her family celebrates holidays
    like Thanksgiving and Christmas with classic Southern dishes, and they often attend the local Fourth of July fireworks and community picnics. Sundays are spent at a nearby Methodist church, where she
    participates in youth activities and learns the value of service, such as volunteering at the local animal shelter. Her school district’s emphasis on bilingual exposure introduces her to basic Spanish
    phrases, adding a modest multicultural layer to her upbringing. These cultural experiences shape her practical outlook, love for community events, and a balanced mix of independence and cooperation.
