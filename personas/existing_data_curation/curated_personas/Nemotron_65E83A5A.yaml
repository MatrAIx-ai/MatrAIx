personas:
  professional: Jordan Yanulavich, an aspiring junior cartoonist and LEGO architect, channels boundless curiosity and a competitive edge into detailed watercolor sketches and ambitious brick constructions,
    while balancing meticulous planning with spontaneous bursts of creativity.
  sports: Jordan Yanulavich, a lively participant in the Fort Worth Youth Soccer League and a passionate fan of the Dallas Cowboys, embraces competition on the field by often taking the lead in drills and
    goal‑scoring attempts, yet learns to collaborate during team strategies in seasonal league play.
  arts: Jordan Yanulavich, a budding visual storyteller, draws inspiration from Dr. Seuss’s whimsical line work, Studio Ghibli’s vibrant palettes, and Pixar’s character‑driven narratives, channeling this
    admiration into weekly group art workshops where they eagerly experiment with watercolors and sketch comic panels.
  travel: Jordan Yanulavich, a curious explorer with a love for family road trips, frequently revisits the Fort Worth Botanic Garden, dreams of standing before the Grand Canyon’s red cliffs, and hopes to
    someday trek the Smithsonian National Air and Space Museum in Washington, D.C., favoring itineraries that blend educational stops with playful outdoor adventures.
  culinary: Jordan Yanulavich, who delights in crafting cheesy pepperoni pizza slices paired with pineapple chunks and blending bright strawberry‑banana smoothies, proudly assists in the kitchen despite
    a habit of splattering sauce on countertops, and often experiments with drawing edible doodles on pancake batter.
  core: Jordan Yanulavich, an eight‑year‑old whirlwind of curiosity and creativity, balances a competitive streak and vivid imagination with moments of intense anxiety, turning every doodle, LEGO build,
    and soccer sprint into a personal quest for discovery.
background:
  cultural: Jordan grows up in a middle‑class neighborhood of Fort Worth, Texas, where a blend of traditional Southern hospitality and modern urban influences shapes his daily life. His family's roots trace
    back to European ancestry, and they celebrate American holidays such as Thanksgiving, Fourth of July, and Christmas with gatherings that feature roast meals, fireworks, and shared desserts. The vibrant
    local culture—ranging from the historic Fort Worth Stockyards and rodeo heritage to the city’s thriving art scene—provides regular exposure to live music, public murals, and community festivals. In
    school, he participates in multicultural events that introduce him to basic Spanish phrases and Tex‑Mex cuisine, reflecting the region's diverse fabric. These experiences foster an openness to varied
    ideas, a strong sense of community involvement, and an appreciation for both the frontier spirit of Texas and the broader artistic world.
