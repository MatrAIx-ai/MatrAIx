  career_goals: Jordan dreams of turning his curiosity into a future of discovery and creativity. He frequently talks about becoming an astronaut to explore space and study planets, while also imagining
    himself as a professional artist who can tell stories through paintings. He is fascinated by wildlife and hopes to work as a biologist protecting animals and ecosystems. At the same time, Jordan wants
    to be a supportive mentor—perhaps a teacher or youth leader—who helps other kids build confidence and cope with anxiety. His ambitions blend a love of science, art, and compassion, aiming for a career
    that lets him share his enthusiasm and inspire others.
