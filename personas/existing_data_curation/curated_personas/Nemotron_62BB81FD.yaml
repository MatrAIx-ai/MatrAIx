  hobbies: '[''Morning Trail Runs'', ''Weight Training'', ''Hiking Desert Trails'', ''Swimming and Water Rescue Drills'', ''Target Shooting at Local Range'', ''Puzzle Solving (Crosswords, Sudoku)'', ''Reading
    True‑Crime and Forensic Literature'', ''Police Athletic League Basketball'', ''Community Clean‑up Volunteering'']'
  career_goals: Tara aims to advance to detective status within the Mohave County Sheriff's Office, focusing on investigative work and case analysis. She plans to complete a part‑time associate degree in
    criminal justice to support her promotion to Sergeant within the next five to seven years. Long‑term, she aspires to lead a specialized unit—such as K‑9, SWAT, or water‑rescue—obtain advanced certifications,
    and eventually become a training instructor who shapes procedural standards for new officers.
