  hobbies: '["Gardening", "Baking", "Quilting", "Reading (mystery & historical fiction)", "Walking/hiking", "Church choir", "Volunteer work at food bank", "Journaling", "Yoga/meditation"]'
  career_goals: Catherine aims to move beyond her current cashier role into a supervisory or assistant manager position within the next two years, leveraging her strong interpersonal skills and growing
    knowledge of retail operations. She plans to enroll in part‑time business courses at a community college to earn an associate degree in Business Administration, which will support her long‑term ambition
    of eventually managing a small family‑owned store or opening a neighborhood boutique. Balancing career advancement with a stable schedule for her family and her own mental‑health practices remains a
    central focus of her ambition.
