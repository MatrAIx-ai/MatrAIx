  career_goals: James dreams of a future where he can blend his love for art with his desire to help others. He imagines becoming a community muralist who creates vibrant public art that brings neighbors
    together, or a teacher who uses visual storytelling to foster empathy and harmony in the classroom. He is also intrigued by designing safe, creative play spaces for children, reflecting his organized
    mindset and compassion. Ultimately, his ambition is to make a positive impact through creativity and caring for his community.
