  to advance the interests of the modern statesman. He is a skilled negotiator and a skilled strategist, and he is able to see the big picture and to anticipate the future with great accuracy. He is also
  a strong advocate for the interests of the middle class, and he is committed to the idea that the social combinations which must arise under the new order of things are already discernible. He is also
  a strong believer in the power of the current forces, and he is committed to using them to advance the interests of the modern statesman.
