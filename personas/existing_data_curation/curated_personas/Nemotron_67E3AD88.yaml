personas:
  professional: Elizabeth Conley, a retail operations manager with a Business degree, leverages their proficiency in Agile, Lean, and ERP systems to streamline multi-site processes, while their methodical
    planning and competitive drive ensure targets are exceeded and their talkative, sociable nature energizes cross‑functional teams.
  sports: Elizabeth Conley competes in a co‑ed tennis league at the Omaha Tennis Club, cheers loudly for the Nebraska Cornhuskers football team each fall, and volunteers as a mentor for the Gretna Youth
    Sports Association, balancing strenuous workouts with networking opportunities on the court.
  arts: Elizabeth Conley, an improv comedy troupe regular, draws inspiration from comedians like Tina Fey and Jim Gaffigan, enjoys live performances by the Omaha Symphony, and unwinds by reading business
    strategy books from authors such as Jim Collins, they often quote favorite lines in casual conversations.
  travel: Elizabeth Conley prefers meticulously planned weekend getaways to nearby destinations like the Sandhills for hiking, Napa Valley for wine tasting, and occasional city trips to Chicago for theatre,
    while daydreaming about a future solo trek through Iceland’s fjords.
  culinary: Elizabeth Conley, an avid home baker, perfects sourdough loaves and corn‑pudding desserts using precise measurements from their bullet‑journal, they favor seasonal ingredients like fresh Nebraska
    corn, rosemary, and local honey, and relish pairing meals with curated wine selections at community tastings.
  core: Elizabeth Conley is a competitive, structure‑loving manager who blends methodical planning with a talkative, community‑driven spirit, occasionally over‑committing to social events while obsessively
    tracking every expense and workout.
background:
  cultural: 'Elizabeth was raised in a mid-western white family in the Omaha metro area, where values of hard work, community involvement, and modesty are emphasized. Her family attended a Methodist church,
    fostering a sense of service and fellowship that she continues through local volunteer work. Growing up in Sarpy County, she developed an appreciation for Nebraska''s agricultural heritage, the annual
    county fair, and the local passion for Cornhusker football. These cultural threads blend with her modern professional identity: a career-focused manager who respects tradition, embraces structured planning,
    and remains socially engaged in community and civic organizations.'
attributes:
  skills: '[''Operational Management'', ''Financial Planning & Budgeting'', ''Project Management (Agile, Lean)'', ''Data Analysis'', ''ERP System Utilization (NetSuite, Microsoft Dynamics)'', ''Team Leadership
