  hobbies: '[''Bullet-Journaling'', ''Home Baking'', ''Improv Comedy'', ''Competitive Tennis'', ''Hiking in the Sandhills'', ''Wine-Tasting Events'', ''Youth Sports Board Membership'', ''Reading Business
    Strategy'', ''Genealogy Research'']'
  career_goals: Elizabeth aims to move from her current managerial role into a regional director position within the next five years, overseeing multiple store locations in the Midwest. She plans to lead
    a company-wide lean transformation initiative that cuts waste and improves profit margins. Long-term, she envisions founding a boutique consulting firm that helps small-to-mid-size retailers in Nebraska
    adopt data-driven operational practices. Along the way, she wants to earn a professional certification such as PMP or Six Sigma Black Belt, expand her executive network through the Omaha Chamber of
    Commerce, and serve as a mentor for women aspiring to leadership in the retail sector.
