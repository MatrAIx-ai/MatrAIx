  hobbies: '[''sketching'', ''digital painting'', ''skateboarding'', ''surfing'', ''sandbox video gaming'', ''improv comedy'', ''photography'', ''reading graphic novels'', ''listening to music'', ''creating
    short animated loops'']'
  career_goals: Calvin aims to turn his passion for visual storytelling into a career as a concept artist or storyboard illustrator for video games and animated films. Over the next few years he plans to
    develop a professional portfolio, seek mentorship or an apprenticeship with a San Diego‑based game studio, and eventually enroll in a portfolio‑focused art program to refine his technical skills. He
    also dreams of founding a youth‑led art collective that creates murals and digital projects reflecting the diverse culture of his community.
