personas:
  professional: A budding graphic designer, Yolanda Gomez leverages her bilingual fluency and self‑taught mastery of Adobe Photoshop and Canva to craft culturally resonant visual content for local nonprofits
    while meticulously building a portfolio that balances freelance commissions with community‑focused exhibition projects.
  sports: A casual athlete, Yolanda Gomez enjoys weekend hikes in the San Bernardino mountains, participates in a local sunrise yoga class, and cheers for the Los Angeles Rams and Lakers while occasionally
    joining a community running club for 5‑k races.
  arts: An avid explorer of visual culture, Yolanda Gomez frequents Inland Empire galleries and street murals—particularly works by the anonymous urban artist reminiscent of Banksy—while drawing inspiration
    from Frida Kahlo, Yayoi Kusama, and local muralist Carlos Gonzalez, and she shares her watercolor experiments and digital illustrations on Instagram under the handle @gomez_artistry.
  travel: A thoughtful wanderer, Yolanda Gomez favors budget‑friendly road trips to Joshua Tree and weekend stays in Santa Barbara, cherishes a nostalgic family visit to San Salvador for its markets and
    murals, and dreams of a cultural immersion tour of Oaxaca to study traditional textiles and contemporary street art.
  culinary: Yolanda Gomez enjoys cooking wholesome twists on classic Salvadoran dishes, such as quinoa‑filled pupusas with avocado salsa and sweet‑potato tamales seasoned with cumin and cilantro, while
    also experimenting with fresh heirloom tomatoes, roasted chayote, and a dash of lime in her weekday salads.
  core: Yolanda Gomez is a detail‑oriented art enthusiast who channels her worry into meticulous sketchbooks, balances solo creative sessions with community‑center activism, and habitually brews late‑night
    coffee while scrolling through design tutorials.
background:
  cultural: Yolanda was raised in a close‑knit Salvadoran family in San Bernardino, where Spanish was spoken at home and English at school, giving her a bicultural perspective. Her parents arrived in the
    United States as immigrants and instilled in her a strong sense of family loyalty (familismo), respect for elders, and pride in Salvadoran traditions such as celebrating Día de los Farolitos, Semana
    Santa, and the annual Feria de la Pupusa. Regular visits to the local Salvadoran church and community gatherings reinforced communal values and a love for folk music (cumbia, marimba) and culinary heritage.
    This cultural backdrop informs her artistic interests, community‑oriented goals, and the blend of resilience and sensitivity she brings to everyday life.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Digital illustration'', ''Graphic design (Canva, Adobe Photoshop)'', ''Photography (composition & basic editing)'', ''Small-event planning and
    coordination'', ''Research and academic writing'', ''Social media content creation'']'
  hobbies: '[''Visiting art galleries and street murals'', ''Sketching and digital illustration'', ''Watercolor painting'', ''Cooking Salvadoran cuisine (pupusas, tamales)'', ''Guided meditation and yoga
    for stress relief'', ''Reading philosophy, psychology, and speculative fiction'', ''Volunteering at community center youth workshops'']'
  career_goals: Yolanda aspires to build a career that merges her passion for visual art with her commitment to her Salvadoran community. She plans to enroll in a community college program in graphic design
    or visual communication, with the goal of later transferring to a four‑year university for a BFA. In the short term, she aims to develop a professional portfolio of digital illustrations and photography,
    secure freelance commissions, and obtain a part‑time internship at a local cultural nonprofit where she can assist with exhibition planning and community outreach. Long‑term, she envisions becoming
    a community arts coordinator or visual communication specialist, designing public art projects and educational workshops that celebrate Latino heritage while providing stable employment and creative
    fulfillment.
