persona_description: A healthcare professional with expertise in the diagnosis and treatment of mental health disorders, particularly those related to personality and cognitive function. They have experience
  working with patients who exhibit Capgras syndrome and are skilled in providing individual therapy to address delusions and improving patient's condition. They may also be familiar with the research and
  theories surrounding the disorder, and have experience with therapeutic methods such as reality testing and antipsychotic therapy. They are empathetic, determined, and able to provide support and understanding
  to patients who are struggling with the reality of their loved ones' condition.
