personas:
  professional: Adalberto Alamilla, a seasoned postsecondary STEM educator, merges their meticulous curriculum design skills with a vibrant bilingual teaching approach, delivering engineering math and computer
    science courses that integrate hands‑on labs, educational technology, and community‑focused projects, while their organized, structured nature ensures grant proposals and departmental initiatives are
    executed on schedule.
  sports: Adalberto Alamilla, an avid outdoor enthusiast, spends spring and summer tackling the Wasatch Range on hikes and mountain‑bike rides with the Wasatch Riders Club, supports the Utah Jazz and Real
    Salt Lake as a loyal fan, and they fit in weekly strength‑training circuits to balance their adventurous pursuits with joint health.
  arts: Adalberto Alamilla, a devoted acoustic guitarist, strums folk classics by Pete Seeger and contemporary ballads by John Denver at community cultural festivals, sings traditional songs at local events,
    and they regularly join salsa nights to dance to the rhythms of Celia Cruz and Marc Anthony.
  travel: Adalberto Alamilla, a meticulous planner, maps out multi‑day trips using spreadsheets, favoring adventurous destinations like the Grand Canyon, the historic streets of Oaxaca, and the limestone
    cliffs of Hoi An, while they balance travel budgets with a modest allowance for family visits and occasional wellness retreats.
  culinary: Adalberto Alamilla, a passionate home chef, masters dishes such as tamales, mole poblano, and grilled carne asada, carefully selecting fresh corn masa, ancho chilies, and ripe avocados, and
    they host monthly dinner gatherings where the aroma of simmering chipotle broth draws neighbors together.
  core: Adalberto Alamilla, a structured yet sociable 63‑year‑old, blends disciplined planning with a love for community‑centered music, mountain adventures, and vibrant cooking, though they occasionally
    procrastinate on dental check‑ups and indulge in extra guacamole during festive meals.
background:
  cultural: Adalberto was raised in a tight‑knit Mexican family that emphasized respect, hard work, and celebration of traditions. He grew up bilingual, speaking Spanish at home and English at school, which
    shaped his inclusive teaching style. Mexican holidays such as Día de los Muertos, Las Posadas, and Mexican Independence Day remain central to his family life, and he often incorporates cultural references
    into his classroom examples. His Catholic upbringing instilled a sense of community service, leading him to mentor students from similar backgrounds. Since moving to Utah, he has blended his heritage
    with the local culture, participating in both Mexican community events and broader Utah activities, fostering cross‑cultural connections throughout his personal and professional life.
