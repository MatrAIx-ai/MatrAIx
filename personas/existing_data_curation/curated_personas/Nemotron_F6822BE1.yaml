  career_goals: Adalberto aims to expand interdisciplinary STEM programs that blend engineering, data science, and emerging technologies, with a focus on increasing participation of underrepresented Mexican‑American
    students. He plans to secure external funding for innovative teaching labs, publish research on inclusive pedagogy, and mentor junior faculty. Within the next five years, he hopes to assume a department
    leadership role, such as Director of Undergraduate Studies, to shape curriculum policy and strengthen community‑college partnerships before transitioning toward a phased retirement.
