  career_goals: Erica aims to expand her one‑person carpentry business into a small boutique workshop that produces handcrafted furniture for the Portland market. She wants to earn a Master Carpenter certification
    through the local trade union, mentor apprentices, and develop a line of eco‑friendly reclaimed‑wood pieces. Over the next five years she hopes to secure contracts for historic home restorations and
    to host community workshops on basic carpentry and DIY home repair, balancing her professional growth with family time.
