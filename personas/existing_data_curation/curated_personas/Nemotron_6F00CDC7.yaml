personas:
  professional: Erica Barnidge, a seasoned carpenter with over twenty years of hands‑on experience in residential framing, custom cabinetry, and furniture restoration, blends a pragmatic, structure‑oriented
    mindset with a flexible, relaxed approach to scheduling, allowing them to troubleshoot on‑site challenges while gradually building a boutique workshop that emphasizes reclaimed‑wood pieces and apprenticeships.
  sports: Erica Barnidge, an avid kayaker on Casco Bay and frequent hiker on the coastal trails of Acadia, also follows the Portland Sea Dogs baseball team and participates in a local kayaking club that
    meets each summer, while in winter they enjoy cross‑country skiing on nearby trails.
  arts: Erica Barnidge, who crafts small wooden trinkets for local craft fairs, finds artistic inspiration in maritime historian Nathaniel Philbrick’s books, enjoys historical fiction by Bernard Cornwell,
    and regularly joins folk music jam sessions featuring artists like The Wailin’ Jennys and Odetta, and they also knit patterned blankets inspired by traditional New England designs.
  travel: Erica Barnidge, after kayaking the San Juan Islands and hiking the Cape Breton Highlands, dreams of traveling to Norway’s fjords to study traditional timber construction, and they plan a summer
    road trip through the Pacific Northwest to visit reclaimed‑wood workshops in Oregon and Washington.
  culinary: Erica Barnidge, who tends a vegetable garden that yields heirloom tomatoes and kale, cooks hearty New England clam chowder with fresh clams, roasted potatoes, and thyme, often pairs it with
    homemade sourdough bread, and they enjoy making maple‑glazed roasted carrots and pickled beets for friends at potlucks.
  core: Erica Barnidge blends a steady, structure‑loving work ethic with a delightfully disorganized flair for spontaneous craft projects, and they balance a disciplined carpentry business with a love of
    kayaking, folk music, and occasional overspending on vintage lumber.
background:
  cultural: Erica identifies with a New England working‑class heritage rooted in the coastal towns of Maine. Raised in a family of tradespeople, she embraces the region’s values of self‑reliance, modesty,
    and community stewardship. Her cultural identity reflects the traditions of Maine’s white, Yankee population—an appreciation for the outdoors, a practical approach to life, and a strong sense of local
    loyalty, which is evident in her commitment to preserving historic homes and supporting neighborhood initiatives.
