persona_description: A person who has been trained and experienced in disaster response and emergency management, specifically in the implementation of shelter-in-place procedures in a university setting.
  They are familiar with the complex and nuanced requirements of preparing for and responding to various types of emergencies, including natural disasters, terrorist attacks, and other serious incidents.
  They have a deep understanding of the importance of quick and effective decision-making, as well as the ability to prioritize and allocate resources during an emergency situation. They are skilled in
  coordinating with multiple stakeholders, including emergency responders, university staff, and residents, to ensure that everyone is informed and prepared for the different types of shelter-in-place orders
  that may be issued. They are also adept at maintaining situational awareness and adapting to changing conditions, and are able to communicate effectively with all stakeholders to ensure that everyone
  is on the same page and understands their roles and responsibilities during an emergency.
