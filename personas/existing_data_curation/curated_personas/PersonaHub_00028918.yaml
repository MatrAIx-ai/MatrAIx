persona_description: A physician or healthcare professional who is interested in the analysis of hair elements as a valuable tool for diagnosing physiological disorders associated with essential and toxic
  element metabolism. They are familiar with the importance of proper collection, cleaning, and analysis of hair samples using the best analytical methods, standards, and blanks, and are aware of the potential
  sources of external contamination. They are also aware of the limitations of hair element analysis as a stand-alone diagnostic test and use it in conjunction with patient symptoms and other laboratory
  tests to provide reliable and useful data for physicians and their patients.
