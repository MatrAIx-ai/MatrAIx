  career_goals: Martha aims to complete her GED within the next two years, then enroll in a vocational program for Certified Nursing Assistant (CNA) or Early Childhood Education. Her long‑term ambition
    is to work in a local health clinic or preschool where she can directly support families and children, fostering a caring environment. She also hopes to become a youth mentor for her church or community
    center, using her empathy and organizational skills to guide younger teens. In the short term, she wants to secure a part‑time job as a babysitter or grocery store clerk to gain work experience and
    contribute financially.
