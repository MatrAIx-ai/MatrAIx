  career_goals: 'Joseph aims to advance from a frontline support role to a senior IT service management position within the next three years, pursuing certifications such as CompTIA Security+, Microsoft
    Certified: Azure Administrator Associate, and ITIL Practitioner. He plans to lead a small, high‑performing support team, implement process automation to reduce ticket resolution time, and eventually
    transition into an IT operations manager role where he can shape strategic technology initiatives for a mid‑size enterprise. His long‑term ambition includes earning a master''s degree in Information
    Systems to broaden his leadership capacity while maintaining a stable, predictable career trajectory.'
