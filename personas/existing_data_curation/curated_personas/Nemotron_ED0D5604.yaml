personas:
  professional: Mary Stains leverages eight years of frontline retail experience and a knack for streamlining point‑of‑sale operations by using detailed spreadsheet audits and conflict‑resolution skills
    to keep store floors humming, while channeling their energetic, sociable nature into motivating staff and creating a welcoming customer environment as they pursue a store‑manager position and eventually
    a community‑focused boutique café.
  sports: Mary Stains stays active through beach volleyball at Turtle Beach, participates in a weekday morning yoga class at the local community center, and rallies with friends to watch the Carolina Hurricanes
    during hockey season, blending coastal recreation with team spirit to maintain fitness.
  arts: Mary Stains draws creative energy from live music nights featuring folk‑rock acts like The Avett Brothers and jazz guitarist Gary Clark Jr., while also crafting seasonal home decorations and occasionally
    practicing Latin dance steps learned in their community ballroom class.
  travel: Mary Stains prefers meticulously planned road trips recorded in a spreadsheet, targeting coastal gems such as the Outer Banks, historic Charleston, and a weekend escape to Bermuda, yet always
    leaves room for spontaneous beach detours with friends when the tide calls.
  culinary: Mary Stains experiments with coastal cuisine, from blackened mahi‑mahi tacos and shrimp‑and‑grits to pesto pasta, favoring fresh cilantro, lemon zest, and garlic, and while their cooking skill
    sits at confident home‑chef level, they often over‑sauce dishes in pursuit of bold flavor.
  core: Mary Stains is a detail‑driven, community‑oriented retail professional who balances meticulous planning with beach‑side spontaneity, using disciplined organization and lively social energy to shape
    every facet of their life.
background:
  cultural: Mary Ann comes from a middle‑class white Southern family rooted in the coastal North Carolina region. Her upbringing was shaped by Southern hospitality, a strong sense of community, and the
    relaxed, outdoor lifestyle of the Outer Banks and Brunswick County. She embraces local traditions such as seafood festivals, community volunteerism, and a deep appreciation for the coastal environment,
    while also valuing broader American cultural values of independence and self‑improvement.
attributes:
  skills: '[''Customer Service'', ''Cash Handling'', ''POS System Management'', ''Inventory Management'', ''Conflict Resolution'', ''Time Management'', ''Organizational Skills'', ''Basic Accounting'', ''Microsoft
