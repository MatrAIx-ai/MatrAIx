  hobbies: '[''Dancing'', ''Beach Walks'', ''Gardening'', ''Volunteer Reading Program'', ''Cooking'', ''Live Music Events'', ''Crafting'', ''Social Media Content Creation'', ''Local History Clubs'']'
  career_goals: Mary Ann aspires to advance into supervisory roles, aiming to become a store manager within the next two years. She plans to leverage her associate degree and on‑the‑job experience to pursue
    a bachelor's degree in Business Administration, positioning herself for district‑level management or the eventual ownership of a small boutique or community coffee shop that blends her love for organization
    and community engagement.
