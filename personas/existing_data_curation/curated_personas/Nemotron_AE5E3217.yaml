    Sigma'']'
  hobbies: '[''Gardening (vegetable and herb)'', ''Reading New England history and historical fiction'', ''Small‑group book club'', ''Crossword and Sudoku puzzles'', ''DIY home repair and woodworking'',
    ''Birdwatching at local nature reserves'', ''Journaling and reflective writing'', ''Mindfulness breathing exercises'']'
  career_goals: Jewell aims to advance to a supervisory role within the packaging department, eventually becoming a shift lead or continuous‑improvement coordinator. She plans to pursue certifications in
    Lean Six Sigma and advanced safety management to enhance process efficiency and reduce workplace stress for herself and her team. Over the next five years, she hopes to mentor new packers, contribute
    to the adoption of eco‑friendly packaging solutions, and balance her career progression with her family responsibilities while maintaining a manageable stress level.
