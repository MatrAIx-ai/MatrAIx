personas:
  professional: Veronica Jenkins is a self‑taught graphic design enthusiast who blends her knack for HTML/CSS, GIMP editing, and analytical mindset to create eye‑catching flyers and web layouts for community
    events, while they push themselves to seek freelance gigs and mentorships that will launch their independent digital studio.
  sports: Veronica Jenkins follows the Rochester Red Wings baseball team and the New York Knicks, participates in a local youth basketball league every Saturday, enjoys winter snowshoeing at High Falls,
    and they treat their weekly pick‑up games as strategic practice similar to their favorite civilization‑style video games.
  arts: Veronica Jenkins frequently sketches while listening to lo‑fi hip‑hop beats, draws inspiration from visual artists like Kehinde Wiley and Basquiat, attends open‑mic poetry nights featuring spoken‑word
    poets such as Rupi Kaur, and they curate digital collages that blend sci‑fi aesthetics with nostalgic soul‑music album covers.
  travel: Veronica Jenkins prefers budget‑friendly road trips, has explored Toronto’s multicultural neighborhoods and the waterfalls of Niagara, dreams of a cultural immersion tour of New Orleans’s music
    districts, books trips using spreadsheet itineraries, and they balance travel ambitions with a tight student‑loan savings plan.
  culinary: Veronica Jenkins experiments with soul‑food staples—collard greens, cornbread, and jerk‑seasoned rice—by adding modern twists like collard‑green smoothies and cornbread‑crusted avocado toast,
    enjoys cooking while listening to lo‑fi playlists, and they rate dishes on a personal flavor‑scale spreadsheet.
  core: Veronica Jenkins is a driven teen who fuses tech‑savvy design skills with a love for community art, balances disciplined budgeting with occasional splurges, and they channel their competitive, skeptical
    nature into creative projects and solo adventures.
background:
  cultural: Veronica is a Black teenager raised in Rochester’s historic African‑American community. Her family maintains cultural ties through music, such as soul, R&B, and hip‑hop, and through food traditions
    that include collard greens, cornbread, and occasional Caribbean dishes from her mother’s side. She grew up attending the local church and participating in community programs at the Rochester Center
    for Opportunity, which exposed her to Black history curricula and local activist gatherings. These experiences fostered a strong sense of identity and an awareness of the challenges faced by Black youth.
    She values representation and often seeks out Black‑authored literature and media, while also supporting neighborhood initiatives that celebrate African‑American art and entrepreneurship.
attributes:
  skills: '[''Photo editing (GIMP)'', ''Basic HTML/CSS web design'', ''Personal finance budgeting'', ''Creative writing and journaling'', ''Critical digital media literacy'', ''Time management and organization'']'
  hobbies: '[''Exploring technology and software tutorials'', ''Sketching and digital illustration'', ''Strategy video gaming (e.g., Civilization)'', ''Reading science‑fiction literature'', ''Cultivating
    indoor houseplants'', ''Journaling personal reflections'', ''Listening to lo‑fi hip‑hop'', ''Participating in local open‑mic poetry sessions'']'
  career_goals: Veronica aims to earn her GED within the next year and enroll in a community‑college certificate program in graphic design or web development. She envisions building a freelance portfolio
    that showcases custom digital artwork and website layouts, eventually turning it into a small online business selling print‑on‑demand merchandise. Her competitive drive pushes her to seek internships
    or mentorships that will give her real‑world experience, and she hopes to achieve financial independence to support herself and contribute to her family. Long‑term, she aspires to become a recognized
    content creator who merges her artistic vision with tech skills while advocating for representation of Black youth in the digital media space.
