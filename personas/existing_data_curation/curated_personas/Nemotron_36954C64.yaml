personas:
  professional: An aspiring junior comic storyteller, Francisco Alcantara channels their boundless imagination and methodical planning into weekly comic strips featuring underwater adventures, while their
    talkative, center‑stage energy makes them the driving force behind school theater set designs and collaborative storytelling workshops.
  sports: Francisco Alcantara, an avid soccer enthusiast, spends weekends scoring goals with the Lajas Junior Soccer Club while cheering for the professional team San Juan FC and occasionally joining the
    local youth swim team during summer, approaching fitness with enthusiastic energy and a competitive spirit that fuels their talkative encouragement of teammates.
  arts: Francisco Alcantara, who devotes free evenings to drawing comics inspired by Art Spiegelman and Raina Telgemeier, sways to the rhythmic beats of the traditional Bomba group Bomba y Plena de la Isla,
    the reggae‑infused hits of Bad Bunny, and the melodic tunes of Luis Fonsi, and lights up school stage productions by channeling the charismatic energy of Lin‑Manuel Miranda.
  travel: Francisco Alcantara, a curious explorer, spends holidays collecting shells on the sun‑kissed shores of Lajas and wandering through Old San Juan’s colorful streets, while dreaming of future adventures
    to the Great Barrier Reef, the ancient ruins of Machu Picchu, and the snowy peaks of Iceland’s volcanic landscapes, preferring carefully mapped itineraries that blend beachcombing with cultural discovery.
  culinary: Francisco Alcantara, an enthusiastic foodie with budding kitchen skills, loves assembling colorful taco bowls with seasoned ground beef, fresh cilantro, lime, and crunchy tortilla chips, enjoys
    savoring sweet plantain fritters and peppered shrimp ceviche, and occasionally attempts to bake chocolate chip cookies, though they often get distracted drawing comic panels before the dough is fully
    mixed.
  core: Francisco Alcantara, a relentlessly imaginative nine‑year‑old with a penchant for meticulous planning, thrives on being the spotlight’s center while juggling a secret stash of comic books and an
    occasional worry‑induced pencil‑biting habit.
background:
  cultural: 'Francisco grows up in Lajas, a coastal town in the Cabo Rojo municipality of Puerto Rico. His family maintains many Puerto Rican traditions: celebrating the annual patron saint festival with
    música bomba, danza plena, and communal feasts featuring arroz con gandules and lechón. He attends a public elementary school that offers bilingual instruction, reflecting the island’s Spanish‑English
    heritage. Close family ties mean grandparents often share stories of island history and Afro‑Caribbean roots, fostering a deep sense of community. The surrounding mangroves, coral reefs, and nearby
    Boquerón Bay instill a respect for the natural environment, influencing his interest in marine life and conservation.'
attributes:
  skills: '[''Sketching'', ''Storytelling'', ''Project organization'', ''Basic coding (Scratch)'', ''Reading comprehension'', ''Bilingual communication'', ''Observational nature skills'', ''Soccer teamwork'']'
  hobbies: '[''Drawing comics'', ''LEGO building'', ''Beachcombing'', ''Soccer'', ''Reading adventure books'', ''Listening to Bomba and Reggaeton'', ''Scratch programming'', ''School drama performances'']'
  career_goals: Francisco dreams of merging his love for art and science by becoming a marine biologist who creates illustrated guides about coral reefs, or an animator who brings his imaginative stories
    to life. He aspires to study at a marine research institute, later producing educational cartoons that promote environmental stewardship. In the near term, he aims to win his school’s science fair,
    lead the class drama club, and develop his own interactive story game using Scratch.
