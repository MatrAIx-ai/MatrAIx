personas:
  professional: Mariela Montesdeoca, a 9‑year‑old elementary student, channels her curiosity into sketching vivid comic‑style illustrations and conducting hands‑on science experiments, and they use their
    competitive spark and relaxed planning to lead class projects with a flair for bright, festival‑inspired visuals.
  sports: Mariela Montesdeoca runs on the Sunset Soccer Club's U‑10 team during the spring, cheers for the LA Galaxy and the Los Angeles Lakers, and they keep fit by biking to the local park, though they
    sometimes skip the recommended stretches before games.
  arts: Mariela Montesdeoca avidly sketches scenes inspired by Frida Kahlo's bold colors, draws panels after reading Raina Telgemeier's 'Smile', collects stickers of Carlos Santana in concert, and they
    let these influences shape their vibrant DIY papel picado creations.
  travel: Mariela Montesdeoca has visited Disneyland and the Grand Canyon with her family, dreams of exploring the ancient ruins of Teotihuacan and hiking in Yosemite, and they prefer road trips with spontaneous
    stops over rigid itineraries, even though school schedules sometimes limit travel time.
  culinary: Mariela Montesdeoca loves helping in the kitchen, especially rolling fresh masa for sweet corn tamales with chilies and cilantro, mashing ripe avocados for guacamole with lime and jalapeño,
    and they often burn the toast while multitasking with art projects.
  core: Mariela Montesdeoca is a bright‑eyed, competitive sketcher who balances a love for vibrant festival art and science experiments with a habit of forgetting to tidy up their craft space, and they
    often leave crayons scattered across the floor.
background:
  cultural: Mariela is a first‑generation Mexican‑American raised in La Habra, California. Her household blends Mexican traditions with Southern California lifestyle; she speaks Spanish at home and English
    at school. Family gatherings feature Día de los Muertos altars, música ranchera, and homemade tamales, which inspire her art with bright colors and symbolic motifs. She attends a local public elementary
    school where diversity is celebrated, and she participates in community events such as the annual Fiesta Mexicana, where she learns folk dances and art techniques. Her bicultural upbringing fuels her
    curiosity, critical perspective, and appreciation for varied experiences.
attributes:
  skills: '[''drawing'', ''digital illustration'', ''basic coding (Scratch)'', ''creative writing'', ''bilingual communication (Spanish/English)'', ''puzzle solving'', ''critical thinking'']'
  hobbies: '[''sketching'', ''crafting (papel picado, papier-mâché)'', ''cooking Mexican dishes'', ''reading graphic novels'', ''watching animated series'', ''playing adventure video games (Minecraft, Mario
    Kart)'', ''collecting rocks and insects'', ''participating in school science club'']'
  career_goals: Mariela dreams of becoming an animator or video game designer who can bring her unique, culturally infused worlds to life. She envisions creating a cartoon series that mixes magical realism
    with modern technology, where characters explore scientific mysteries. She also hopes to develop interactive educational games that challenge her peers, reflecting her competitive spirit. In the long
    term, she aspires to attend a specialized art and technology high school, earn a scholarship, and eventually work at a studio that values innovative, interdisciplinary storytelling.
