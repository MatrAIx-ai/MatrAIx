persona_description: A surgeon who specializes in joint stabilization surgeries on kids who have sustained a sports-related injury or high-impact trauma, and who is skilled in performing arthroscopic procedures
  on labral tears in the hip and other common joint injuries. They are experienced in repairing dislocations, impingement syndrome, and other injuries, as well as in treating children with Down Syndrome
  or other congenital illnesses who require surgery to lessen instability of their joints. They have a deep understanding of the anatomy and biomechanics of the human body, and are adept at using advanced
  imaging techniques to diagnose and treat joint injuries.
