personas:
  professional: Anthony Bratton, a 46‑year‑old master carpenter, they blend hand‑tool craftsmanship with CNC routing and SketchUp to turn abstract concepts into bespoke furniture, leading a small, improvisational
    crew with a talkative, mentorship‑focused style that values flexibility over strict schedules.
  sports: Anthony Bratton, a fan of the Tampa Bay Buccaneers and Tampa Bay Lightning, they spend weekends sailing with the local yacht club, fishing off the Gulf, and joining pick‑up beach volleyball games,
    while keeping a casual routine of early morning jogs along the shoreline to stay fit.
  arts: Anthony Bratton, an avid acoustic‑guitar player, they regularly jam to B.B. King and Miles Davis, paint abstract canvases inspired by reclaimed wood grain, and volunteer for community theater improv
    nights, drawing creative energy from the soulful rhythms and vivid colors that echo their storytelling roots.
  travel: Anthony Bratton, they prefer spontaneous road trips along the Gulf Coast, with a love for the historic streets of New Orleans and the quiet charm of Savannah, while dreaming of a Mediterranean
    sailing adventure around the Amalfi Coast, balancing a modest travel budget with occasional splurges on boutique inns.
  culinary: Anthony Bratton, they cook Southern‑style BBQ, mastering smoked brisket and pulled pork, while also perfecting Gulf shrimp étouffée with fresh crab, heirloom tomatoes, okra, and a dash of Cajun
    spice, often experimenting with a homemade herb‑infused barbecue rub.
  core: Anthony Bratton, they are a creatively restless carpenter who trades structured plans for spontaneous art, chats endlessly while shaping wood, and occasionally forgets to file receipts, yet always
    finds time to mentor the next generation.
background:
  cultural: Anthony is an African‑American who grew up in the Southern United States before settling in Punta Gorda, Florida. His upbringing was shaped by a close‑knit family, church community, and regional
    traditions that value craftsmanship, oral storytelling, and communal support. He draws on the rich heritage of Black artisans in the South, where resourcefulness and hand‑made skill have long been celebrated,
    while also embracing the multicultural coastal vibe of Florida’s Gulf Coast. This blend of cultural influences informs his respect for sustainable practices, his love of soulful music, and his commitment
    to mentoring youth within his community.
