  career_goals: Anthony aims to transform his solo carpentry practice into a boutique studio that offers bespoke, environmentally‑friendly furniture and integrates artistic elements inspired by abstract
    concepts. He envisions opening a community workshop space where he can teach woodcraft, host collaborative art‑building events, and mentor the next generation of craftsmen. Long‑term, he hopes to secure
    contracts for eco‑conscious home renovations and public art installations in Punta Gorda, earn certifications in green building and occupational safety, and perhaps author a guidebook that blends woodworking
    technique with creative design philosophy.
