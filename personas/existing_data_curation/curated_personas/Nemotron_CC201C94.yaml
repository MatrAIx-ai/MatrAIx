personas:
  professional: Simin Munoz, a construction supervisor with a business degree, leverages operational leadership, BIM expertise, and a keen eye for aesthetic design to streamline multimillion‑dollar projects,
    and they often balance rigorous budgeting with a relaxed attitude toward strict deadlines.
  sports: Simin Munoz, an avid outdoors enthusiast based near Pokagon State Park, spends weekends hiking, mountain biking with the Northern Indiana Mountain Bikers Club, and camping, while cheering on the
    Indianapolis Colts and Indiana Pacers, and they regularly join a local pickup basketball league to stay active.
  arts: Simin Munoz, a regular at regional art museums and community theater, sketches urban landscapes after shows, volunteers backstage, follows indie musicians like Phoebe Bridgers and The National,
    admires street artist Banksy, and they often experiment with improvisational comedy inspired by the Upright Citizens Brigade.
  travel: Simin Munoz, a spontaneous road‑trip planner, has explored the Upper Peninsula of Michigan and the Colorado Rockies for mountain‑bike adventures, enjoys weekend escapes to Door County’s lakeside
    cabins, dreams of visiting Barcelona’s Gaudí architecture and Kyoto’s temples, and they balance these wanderlust pursuits with a modest travel budget and occasional family obligations.
  culinary: Simin Munoz, a modest home chef, loves crafting wood‑fired pizza topped with fresh basil and smoked mozzarella, perfecting ramen broth with kombu and miso, experiments with woodworking to build
    cutting boards, and they often indulge in craft beer pairings while occasionally grabbing fast‑food burritos when time runs short.
  core: Simin Munoz blends a construction manager’s pragmatic mindset with an artist’s curiosity, they juggle project deadlines, spontaneous hikes, and late‑night jam sessions, all while occasionally forgetting
    to file expense reports on time.
background:
  cultural: Simin grew up in Ashley, a small town in Steuben County, Indiana, where Midwestern values of community, hard work, and modesty shaped his upbringing. Though identified as white, his family's
    surname, Munoz, reflects a mixed heritage that brought occasional Hispanic cultural traditions into the household, such as celebrating Dia de los Muertos with a local church and enjoying family recipes
    passed down from a grandmother of Mexican descent. This blend of Midwestern and Latino influences gives Simin a broadened perspective, fostering an appreciation for both local folk art and broader cultural
    expression. He remains close to his extended family, participates in community events like county fairs, and feels a strong connection to the region's agricultural roots and small-town social life.
attributes:
  skills: '[''Project scheduling'', ''Construction site safety compliance'', ''Team leadership'', ''Budget management'', ''Subcontractor coordination'', ''Blueprint interpretation'', ''BIM and mobile field-management
