  hobbies: '[''Visiting art museums'', ''Sketching urban landscapes'', ''Woodworking'', ''Community theater involvement'', ''Hiking'', ''Mountain biking'', ''Camping'', ''Live music shows'', ''Improv comedy
    meetups'', ''Photography'']'
  career_goals: He aims to earn his Certified Construction Manager (CCM) credential and a Project Management Professional (PMP) certification within the next three years. Simin envisions moving from first-line
    supervision to a senior project manager role overseeing multi-million-dollar commercial builds, with a particular interest in projects that incorporate sustainable materials and artistic architecture.
    Long-term, he dreams of launching his own construction consultancy that fuses lean construction practices with creative design consulting, allowing him to combine his business background, technical
    expertise, and love of visual arts.
