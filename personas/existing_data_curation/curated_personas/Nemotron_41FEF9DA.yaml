    and organization"]'
  hobbies: '["Gardening", "Hiking", "Reading historical fiction", "Chinese calligraphy", "Cooking fusion cuisine", "Yoga", "Wine tasting", "Volunteering (English as a Second Language tutoring)", "Attending
    local arts and cultural events", "Puzzle solving (crosswords, Sudoku)"]'
  career_goals: Chunlin aims to become the leading boutique broker in Ulster County, expanding her client base and establishing a team of agents focused on heritage and sustainable properties. She plans
    to earn the Certified Residential Specialist designation, open her own agency within five years, mentor junior agents, and build a personal portfolio of historic homes. Additionally, she seeks to contribute
    to community development by volunteering for local affordable‑housing initiatives and promoting environmentally responsible real‑estate practices.
