persona_description: A researcher and scientist who specializes in studying the effects of climate change on marine pelagic phenology and the ability of fish and planktonic communities to adapt to warming.
  They are interested in the sensitivity of physiological development to temperature and the potential for genetic adaptations within species populations to cope with changes in climate. They are looking
  for empirical evidence and information on climate impact and vulnerability to inform their research and work.
