personas:
  professional: Deowattie Chestnut is a network and system administrator who designs and maintains resilient IT infrastructure for small organizations, leveraging Cisco, Windows Server, and virtualization
    expertise, while their calm, patient demeanor and community‑focused mindset turn technical challenges into collaborative learning moments and empower non‑technical users.
  sports: Deowattie Chestnut joins local pickup basketball games at the community center and drums in a weekend drumming circle, roots their fitness in the camaraderie of team play, cheers for the Phoenix
    Suns and Arizona Diamondbacks, and balances occasional cardio runs with stretch routines to keep their knees healthy.
  arts: Deowattie Chestnut captures sunrise over red‑rock canyons in photographs inspired by Ansel Adams and shares the images at community storytelling evenings, while their drumming style echoes the rhythms
    of classic percussive grooves and they unwind listening to Bon Iver and blues legend B.B. King.
  travel: Deowattie Chestnut prefers spontaneous road trips that combine hiking in the Grand Canyon and photographing Monument Valley at dawn, has already explored Sedona and Canyon de Chelly, and hopes
    to attend the AWS re:Invent conference in Las Vegas next year while scouting new desert vistas for future shoots.
  culinary: Deowattie Chestnut enjoys cooking southwestern dishes like green chile enchiladas and chipotle grilled chicken, boasts an intermediate skill set that lets them grill for basketball post‑games
    and experiment with homemade salsa using fresh tomatillos and jalapeños, and never says no to a spicy chimichanga after a long tech meet‑up.
  core: Deowattie Chestnut blends a pragmatic tech mind with an outgoing, community‑first spirit, juggling occasional disorganization and a love for high‑performance PC builds while staying remarkably calm
    and compassionate.
background:
  cultural: He identifies as an American Indian of Hopi descent, raised in the Whiteriver community within Navajo County, Arizona. Growing up on the reservation, he was immersed in Hopi language, rituals,
    and a collective respect for the land and its resources. These cultural roots shape his worldview, fostering a strong sense of communal responsibility and a dedication to preserving tribal heritage.
    Deowattie actively participates in seasonal ceremonies, tribal council meetings, and educational outreach programs, often serving as a bridge between the community's traditional values and modern technology.
    His cultural perspective informs his professional ethos, emphasizing harmony, sustainability, and the empowerment of Indigenous peoples through digital inclusion.
attributes:
  skills: '[''Network troubleshooting'', ''Cisco routing and switching (CCNA/CCNP level)'', ''Microsoft Windows Server administration'', ''Linux system administration (Ubuntu, CentOS)'', ''Virtualization
    (VMware, Hyper-V)'', ''Cloud services (AWS, Azure) basics'', ''Network security (firewall configuration, VPN)'', ''Scripting (PowerShell, Bash)'', ''Hardware maintenance and repair'', ''Help desk support
    and user training'', ''Project coordination'', ''Cross-cultural communication'']'
  hobbies: '[''Basketball pick-up games'', ''Traditional Hopi drumming circle'', ''Hiking in the Kaibab Plateau'', ''Digital photography of landscapes and ceremonies'', ''DIY PC building'', ''Community
    gaming nights'', ''Storytelling gatherings'', ''Cooking traditional dishes'']'
  career_goals: His primary career ambition is to become a senior network architect who leads the design of resilient, secure networks for tribal enterprises and community services. Deowattie aims to obtain
    advanced certifications such as CCNP, AWS Solutions Architect, and CompTIA Security+, and to spearhead a broadband expansion project that connects remote households on the Hopi reservation. He also
    aspires to establish a local technology training program that equips younger tribal members with IT skills, blending his technical knowledge with his compassionate drive to uplift his community. Long-term,
    he envisions a role where he can influence policy on digital equity for Indigenous peoples while continuing to mentor and support colleagues.
