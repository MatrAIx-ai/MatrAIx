personas:
  professional: Sohee Waheed, a diligent high‑school junior, channels their love for structured problem‑solving into the school robotics club, where they meticulously document designs, collaborate in small
    teams, and aim to pursue a future in mechatronics engineering.
  sports: Sohee Waheed stays fit through weekly sessions with the Riverdale Rangers U‑14 soccer team in the fall, occasional swimming laps at the community pool, and follows the tactical play of Manchester
    United and the athleticism of Serena Williams, preferring a structured routine that balances team practice with solo workouts.
  arts: Sohee Waheed devotes evenings to literary worlds of contemporary YA authors like Sarah J. Maas and John Green, while their playlist alternates between Billie Eilish’s moody pop and the classical
    scores of Ludovico Einaudi, and they enjoy re‑watching Studio Ghibli films such as Spirited Away, letting these artistic influences shape their reflective journal entries.
  travel: Sohee Waheed prefers meticulously planned travel itineraries, as shown by their organized two‑week family trip to Kyoto, Japan, where they kept a daily travel journal, and they dream of a solo
    backpacking adventure through the historic neighborhoods of Prague and the serene lakes of New Zealand, balancing structured schedules with moments of spontaneous discovery.
  culinary: Sohee Waheed enjoys cooking biryani and samosas with fragrant turmeric, cumin, and cardamom alongside family, while also experimenting with homemade ramen broth and mastering the perfect pepperoni
    pizza dough, reflecting a blend of cultural heritage and youthful culinary curiosity.
  core: Sohee Waheed is a methodical teen who journals daily and thrives on structured routines, yet secretly indulges in midnight cereal raids that leave the kitchen a colorful mess.
background:
  cultural: Sohee is a second‑generation South Asian American; her parents immigrated from Pakistan and maintain cultural traditions at home. She grew up speaking Urdu alongside English, celebrates Eid
    with family gatherings, and participates in local South Asian community events in Monmouth Junction. The family places high value on education, family cohesion, and respect for elders, which shapes
    her cooperative and harmony‑seeking demeanor. While she embraces American suburban life—participating in school clubs and community service—she also retains strong ties to South Asian customs, music,
    and cuisine, creating a blended bicultural identity.
