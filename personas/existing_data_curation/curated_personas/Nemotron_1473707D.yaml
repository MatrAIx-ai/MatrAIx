  hobbies: '[''Reading YA fiction'', ''Journaling'', ''Robotics club'', ''Cooking family recipes'', ''Community gardening'', ''Mindfulness meditation'', ''Sketching'']'
  career_goals: She aims to attend a reputable high school with strong STEM programs and eventually pursue a degree in biomedical engineering or nursing, fields that blend her interest in science with helping
    others. In the short term, she plans to earn certifications in coding and first aid, and to secure a summer internship or volunteer position at a local hospital or research lab. She also hopes to become
    a mentor for younger students in her community, promoting academic confidence and cultural pride.
