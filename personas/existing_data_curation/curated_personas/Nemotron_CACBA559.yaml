personas:
  professional: Damian Dunning is an aspiring IT support specialist who leverages their disciplined approach, detail‑oriented PC‑building hobby, and strategic mindset from competitive gaming to troubleshoot
    hardware issues and excel in structured vocational training.
  sports: Damian Dunning devotes their afternoons to shooting hoops at the community park, competes in the local youth league that fields the Fort Lauderdale Lions, idolizes the Miami Heat’s Jimmy Butler
    for his work ethic, and supplements their training with strength‑building routines at the nearby recreation center.
  arts: Damian Dunning curates playlists that blend Kendrick Lamar’s lyrical flow with H.E.R.’s soulful R&B, attends open‑mic freestyle nights at the neighborhood cultural center, and treats PC customization
    as a form of kinetic art, often showcasing their rig builds on a YouTube channel.
  travel: Damian Dunning dreams of a summer road trip along the Florida Keys before saving enough to fly to Kingston, Jamaica for a family reunion, while their recent weekend getaways include a day in Miami’s
    Art Deco district and a visit to the historic Little Havana neighborhood to sample its music scene.
  culinary: Damian Dunning’s go‑to meals are a spicy jerk‑seasoned chicken sandwich with mango salsa, a bowl of rice and peas seasoned with allspice, and a late‑night mac and cheese with hot sauce, which
    they cook on their own stove after assembling PC parts, and they never say no to a side of fried plantains from the local food truck.
  core: Damian Dunning is a meticulously organized teen who channels competitive energy into basketball and gaming, obsessively budgets their earnings, battles anxiety with structured routines, and finds
    catharsis in building custom PCs, even if it sometimes leads to late‑night screen time.
background:
  cultural: Damian grows up as a Black teenager in Fort Lauderdale, immersed in a vibrant African-American community that celebrates hip-hop, basketball, and church life. The area's diverse cultural mix—including
    strong Caribbean and Haitian influences—has broadened his musical tastes and culinary experiences. Family gatherings and local community events emphasize mutual support, perseverance, and pride in heritage,
    shaping his identity and reinforcing his drive for personal achievement and stability.
attributes:
  skills: '["Time-management", "Goal setting", "Basic computer operation", "Strategic video-gaming", "Basketball fundamentals", "Manual electronics repair", "Basic budgeting"]'
  hobbies: '["Basketball", "Competitive online gaming", "Hip-hop and R&B music", "PC building and customization", "Personal-finance journaling", "Youth mentorship volunteering"]'
  career_goals: Damian aims to earn his GED within the next year and then enroll in a vocational program that offers certifications in information-technology support or electrical work. He is driven to
    obtain CompTIA A+ or an electrician apprenticeship, with a long-term ambition to secure a stable, well-paid technical role—ideally as a network technician or licensed electrician—so he can achieve financial
    independence for himself and support his family. In the short term, he hopes to find a part-time mentorship or youth-center position where he can apply his organizational strengths and help peers with
    basic computer skills.
