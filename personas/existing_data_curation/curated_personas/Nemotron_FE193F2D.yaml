personas:
  professional: Dijon Simons, a seasoned project manager and nonprofit strategist, channels their meticulous budgeting, grant‑writing prowess, and charismatic public speaking into building sustainable arts‑education
    programs for Detroit youth, while their competitive edge keeps them vigilant against any partnership missteps.
  sports: Dijon Simons, a regular on the Motor City Hoops adult basketball league, tracks their fitness with disciplined strength‑training sessions, avidly follows the Detroit Pistons and never misses a
    Detroit Tigers game at Comerica Park, and they join the local running club for community charity runs each spring.
  arts: Dijon Simons curates a personal photography collection inspired by Gordon Parks, spends their weekends debating Kehinde Wiley’s canvases at the Detroit Institute of Arts, fills their playlists with
    Miles Davis, The Supremes, and emerging Detroit hip‑hop artists such as Sada Baby, and they organize monthly community art talks to bridge visual and musical expression.
  travel: Dijon Simons prefers purposeful travel that blends cultural immersion with community service, having led art‑workshop volunteers in New Orleans’ French Quarter, taken weekend trips to the Museum
    of Modern Art in New York, and they now dream of attending the Venice Biennale to study global contemporary art trends.
  culinary: Dijon Simons, an experimental soul‑food cook, loves perfecting collard greens simmered with smoked turkey, mastering the sweet‑heat balance of their signature maple‑glazed fried chicken, and
    they frequently incorporate fresh heirloom tomatoes from their community garden into vibrant side dishes.
  core: Dijon Simons blends disciplined project‑management precision with a restless curiosity for art and community, yet they can’t resist obsessively reviewing budget spreadsheets at dinner parties and
    seizing any chance for a spontaneous trivia showdown.
background:
  cultural: Born and raised in Detroit, Dijon is a second‑generation African‑American whose family arrived during the Great Migration from the Deep South. He grew up in a close‑knit church community and
    was shaped by the city’s automotive legacy, Motown sound, and vibrant street‑art culture. His upbringing emphasized self‑reliance, collective uplift, and a deep appreciation for Black artistic expression.
    He actively participates in local cultural events—Detroit Jazz Festival, African World Festival, and neighborhood block parties—and sees his heritage as a source of pride and a catalyst for his community‑focused
    ambitions.
