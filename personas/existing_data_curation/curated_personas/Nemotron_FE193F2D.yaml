  career_goals: He aims to channel his disciplined, achievement‑driven mindset into creating a sustainable nonprofit arts education program for Detroit youth, leveraging his project management and fundraising
    expertise. He plans to earn a nonprofit management certification and secure a seat on the board of a local cultural institution, such as the Detroit Institute of Arts. Longer‑term, he hopes to be recognized
    as a community leader who bridges art, education, and economic development, while also mentoring emerging entrepreneurs.
