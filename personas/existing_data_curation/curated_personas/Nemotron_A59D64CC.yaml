  hobbies: '[''Softball League'', ''Church Potlucks & Barbecues'', ''Fishing Trips on Sunflower River'', ''Karaoke Nights'', ''Competitive Online Gaming (e.g., FPS shooters)'', ''Truck Restoration'', ''Listening
    to Classic Country & Southern Rock'']'
  career_goals: Richard aims to build on his data‑entry foundation by completing his associate degree in information technology and moving into a data‑analysis or office‑management role within the next
    three years. He wants to become the go‑to expert for data integrity at his organization, earning certifications such as Microsoft Office Specialist and basic SQL. A competitive drive fuels his ambition
    to be recognized as the fastest and most accurate typist in the county, and he hopes to mentor newer employees, eventually supervising a small team that maintains the county’s records and digital archives.
    Balancing his desire for routine with a need for flexibility, he also dreams of one day starting a modest consulting firm that offers data‑cleaning services to local small businesses, allowing him to
    provide a stable income for his family while staying rooted in his community.
