  hobbies: '[''Gardening (heirloom vegetables and organic practices)'', ''Birdwatching'', ''Woodworking and furniture repair'', ''Model train building and scenery crafting'', ''Reading historical biographies
    and local archives'', ''Crossword puzzles and Sudoku'', ''Listening to classic country and folk music'', ''Writing personal memoirs'', ''Photographing rural Indiana landscapes'']'
  career_goals: Although retired, Alex aims to preserve his family’s legacy by writing a memoir that weaves personal anecdotes with the broader history of Crawfordsville. He hopes to formalize a small woodworking
    studio in his backyard where he can craft items for local charity auctions. He also aspires to become a regular volunteer docent at the Montgomery County Historical Museum, sharing his knowledge of
    Midwestern agricultural heritage. Staying physically independent is a priority, so he plans to continue gardening and engage in low‑impact fitness routines. Finally, Alex wants to master using a tablet
    to stay connected with his grandchildren and manage his health records digitally.
