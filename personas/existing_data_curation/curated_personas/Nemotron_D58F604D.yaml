  hobbies: '[''Contemporary art gallery visits'', ''Street art photography'', ''Reading philosophy & literature'', ''Creative writing (poetry)'', ''Listening to jazz & hip‑hop'', ''Chess'', ''Urban gardening'',
    ''Cooking fusion cuisine'', ''Volunteer youth mentorship'', ''Indie video gaming'', ''Hiking in Appalachian foothills'']'
  career_goals: Elmore aims to re‑enter the workforce in a role that bridges his business acumen with his passion for art and culture, such as a marketing coordinator for a local museum or cultural nonprofit.
    Simultaneously, he is laying the groundwork for an entrepreneurial venture—a boutique online platform that showcases and sells African‑inspired art, fashion, and crafts created by Black artists in Charlotte
    and beyond. To achieve this, he plans to earn certifications in Google Analytics and advanced digital marketing, build a professional portfolio of campaigns, and secure mentorship from Black business
    leaders. Long‑term, he envisions a self‑sustaining social enterprise that generates revenue while providing mentorship, micro‑grants, and a marketplace for emerging Black creatives.
