personas:
  professional: Elmore Ashiru, a 28‑year‑old market‑researcher‑turned‑creative‑strategist, blends business acumen with a love for Charlotte’s art scene, using their knack for graphic‑design and strategic
    planning to craft compelling museum marketing campaigns while juggling the occasional disorganized timeline.
  sports: Elmore Ashiru enjoys hiking the Blue Ridge foothills in spring, follows the Charlotte Knights baseball team, and occasionally joins a local pick‑up basketball league, preferring solitary trail
    runs over organized fitness classes.
  arts: Elmore Ashiru immerses themselves in Charlotte’s vibrant arts community, photographing murals in NoDa, attending contemporary exhibits at the Mint Museum, and drawing inspiration from jazz legends
    like Miles Davis, hip‑hop innovators such as Kendrick Lamar, and afrobeats pioneer Fela Kuti while crafting poetry that reflects philosophical musings.
  travel: Elmore Ashiru favors low‑key, culturally rich trips, having explored Asheville’s craft breweries, taken a weekend road‑trip to Savannah’s historic squares, and planning a future solo adventure
    to Lisbon to study azulejo tiles, balancing a modest travel budget with a love for spontaneous photo walks.
  culinary: Elmore Ashiru experiments in the kitchen by marrying West African spices—like berbere and suya rubs—with Southern staples such as collard greens and fried chicken, often plating a spicy jollof‑style
    gumbo or pepper‑infused shrimp étouffée while tending to herbs like basil and cilantro on their balcony garden.
  core: Elmore Ashiru is a curious, art‑obsessed strategist who lives in a blend of spontaneous creativity and occasional disorganization, fueling their days with jazz, philosophy, and a garden of herbs
    on a tiny balcony.
background:
  cultural: Elmore is a second‑generation American whose father emigrated from Nigeria (Yoruba heritage) and whose mother is rooted in the African‑American community of Charlotte. He grew up bilingual,
    speaking Yoruba at home and English in school, and celebrated a blend of traditions—from New Yam festivals and West African storytelling to Southern church gatherings and family barbecues. This dual
    heritage fostered a deep appreciation for Black cultural expression, evident in his love for gospel music, afrobeats, and hip‑hop. He actively participates in local Black‑artisan collectives and mentors
    aspiring entrepreneurs, drawing on both the communal spirit of his African roots and the resilience of the Southern Black experience. His identity is a tapestry of diasporic influences that shape his
    worldview, artistic taste, and commitment to uplifting his community.
attributes:
  skills: '[''Market research'', ''Financial analysis (basic)'', ''Strategic planning'', ''Creative brainstorming'', ''Graphic design (Adobe Photoshop, Canva)'', ''Social media content curation'', ''Community
