personas:
  professional: Diane Alexander is a seasoned graphic designer with advanced Adobe Creative Cloud mastery, a deep grounding in educational theory, and a competitive, detail‑oriented mindset that drives
    her to craft data‑driven visual strategies for community‑focused environmental campaigns while meticulously managing project timelines.
  sports: Diane Alexander blends a competitive spirit with outdoor enthusiasm, tackling seasonal mountain biking in the summer, snowshoeing and cross‑country skiing in the winter, cheering for the Wyoming
    Cowboys football team and the Colorado Rockies, while being an active member of the Lander Trail Riders club.
  arts: Diane Alexander immerses themselves in creative expression through watercolor landscapes inspired by Ansel Adams, set design for Lander Community Theater productions, and occasional performances
    of classic monologues, while their playlist frequently features the acoustic folk of Sufjan Stevens and the cinematic scores of Hans Zimmer.
  travel: Diane Alexander prefers meticulously planned road trips that balance adventure and relaxation, such as a summer drive to Glacier National Park for alpine photography, a fall weekend hiking the
    Canadian Rockies, and a dream to explore the temperate rainforests of the Pacific Northwest, all while budgeting around their boutique studio launch.
  culinary: Diane Alexander enjoys cooking with fresh, seasonal ingredients from farmers markets, favoring dishes like roasted beet and goat cheese salad with locally foraged wild herbs, elk stew spiced
    with juniper berries, and a weekend habit of perfecting sourdough bread, reflecting a moderate-to-high skill level in the kitchen.
  core: Diane Alexander is a methodical, community‑driven creative who channels competitive curiosity into design, outdoor pursuits, and a balanced, if occasionally indulgent, lifestyle.
background:
  cultural: 'Diane grew up in a middle‑class, predominantly white Midwestern town where education and community involvement were emphasized. After earning a bachelor''s degree in education, she relocated
    to Lander, Wyoming, drawn by its striking natural scenery and vibrant small‑town arts scene. The blend of Midwestern work ethic and the independent, outdoors‑oriented culture of the Intermountain West
    has shaped her values: self‑reliance, respect for the environment, and a commitment to civic engagement. She actively participates in local traditions such as the Lander Summer Arts Festival, the Fremont
    County Fair, and volunteer initiatives that support youth arts education. Her cultural identity reflects a synthesis of her Midwestern upbringing and the frontier spirit of her current community.'
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Figma'', ''Sketch'', ''UI/UX design'', ''Branding and identity'', ''Typography'', ''Print and digital layout'', ''Digital illustration'',
    ''Instructional design'', ''Curriculum visual development'', ''Project management'', ''Client communication'', ''Design critique and quality assurance'', ''Team leadership and mentorship'']'
  hobbies: '[''Hiking in the Wind River Range'', ''Mountain biking'', ''Landscape photography'', ''Watercolor painting'', ''Community theater acting and set design'', ''Strategic board games (Catan, Terraforming
    Mars)'', ''Competitive escape rooms'', ''Volunteering to teach digital art to youth'', ''Reading science-fiction novels'', ''Native-plant gardening'', ''Participating in the Summer Arts Festival'',
    ''Cooking with local produce from farmers markets'']'
  career_goals: Diane aims to move into a senior creative director role where she can shape the visual strategy for community‑focused campaigns, especially those promoting environmental stewardship and
    education in the Intermountain West. She plans to launch a boutique studio that merges graphic design with instructional content, helping regional schools and nonprofits adopt modern visual learning
    tools. Over the next five years, she hopes to earn recognition in state‑wide design competitions, publish a handbook on visual communication for educators, and secure a part‑time teaching position at
    the local community college to mentor emerging designers. Embracing her curiosity, she is also exploring AR/VR platforms to create immersive educational experiences, positioning herself at the intersection
    of design innovation and practical learning outcomes.
