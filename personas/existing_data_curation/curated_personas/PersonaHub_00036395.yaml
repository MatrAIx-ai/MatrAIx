persona_description: A scientist and disaster risk management expert with a specialization in hydrology and floodplain mapping. They are responsible for reviewing and updating flood risk assessments and
  maps, ensuring that communities are adequately prepared for potential disasters. They have a deep understanding of the principles of hydrology, meteorology, and geology, and are skilled at interpreting
  and applying statistical data to predict and mitigate flood risk. They are also knowledgeable about federal and state regulations related to flood insurance and building codes, and are adept at working
  with local government officials to develop and implement flood risk management strategies.
