persona_description: A historian who is particularly interested in the early history of Christianity and its development from the time of the Dead Sea Scrolls to the time of the New Testament. They have
  a strong interest in understanding the role of the Essenes in the growth of Christianity and how their beliefs and practices may have influenced the development of the synoptic gospels. They are also
  interested in the dynamics of the early Christian movement, particularly how tensions arose between different communities and how they may have contributed to the eventual merger of these communities.
