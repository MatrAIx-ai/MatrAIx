personas:
  professional: A veteran wholesale sales strategist, Rosheda Sutton leverages three decades of market insight and deep cultural fluency to forge trust with diverse retailers, consistently exceeds targets,
    and now mentors new reps while shaping a multicultural training curriculum aimed at launching a boutique distribution venture that amplifies under‑represented makers, and they relish the opportunity
    to mentor.
  sports: An enthusiastic community athlete, Rosheda Sutton plays in a local co‑ed softball league, roots for the Miami Heat and Miami Dolphins, jogs along the Bayfront Park promenade during winter, and
    participates in weekend beach volleyball tournaments, using these activities as a lively counterbalance to their office routine.
  arts: A passionate arts aficionado, Rosheda Sutton attends weekly gospel choirs at their church, revels in live jazz sets featuring artists like Christian McBride and Esperanza Spalding at the Wynwood
    Walls, explores street murals by local muralist Shepard Fairey, and finds inspiration in the socially conscious films of Ava DuVernay, weaving these experiences into their personal quilting designs.
  travel: A curious traveler, Rosheda Sutton plans annual trips that blend organized family visits to historic Savannah and spontaneous weekend getaways to the Florida Keys, while dreaming of a cultural
    immersion tour of Cartagena, Colombia and a Caribbean sailing adventure to Barbados, always reserving a day to explore local street festivals wherever they land.
  culinary: A creative home chef, Rosheda Sutton masterfully blends island‑inspired flavors, regularly preparing jerk chicken with scotch bonnet peppers, plantain mofongo, and spicy callaloo soup, while
    experimenting with fresh cilantro, allspice, and coconut milk in their quinoa salads, and treats neighbors to potluck‑style gatherings that showcase their love of bold spices.
  core: A vibrant community advocate, Rosheda Sutton balances a relentless drive to uplift local businesses with a habit of late‑night mystery novel binges and occasional over‑commitment that fuels both
    their creative spark and their lingering worries.
background:
  cultural: Rosheda is a Black woman who grew up in a working‑class neighborhood of Miami, shaped by the rich tapestry of African‑American and Caribbean cultures that define South Florida. Her upbringing
    was marked by close ties to the local church, gospel music, and community gatherings that emphasized mutual support. She identifies with the legacy of the civil‑rights movement and the resilience of
    Black entrepreneurs who forged opportunities despite systemic barriers. Miami’s multicultural environment has infused her identity with elements of Cuban, Haitian, and Jamaican rhythms, cuisine, and
    celebrations—particularly the vibrant street festivals and the annual Juneteenth observances. This blend of heritage informs her worldview, her appreciation for diverse artistic expression, and her
    commitment to uplifting her community through both her professional and personal endeavors.
attributes:
  skills: '[''Customer relationship management'', ''Negotiation'', ''Product knowledge (wholesale manufacturing)'', ''Effective communication'', ''Problem solving'', ''Time management'', ''Team collaboration'',
