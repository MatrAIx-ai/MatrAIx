personas:
  professional: Theodore Borgersen, a budding LEGO architect, they arrange blocks by size and color with the precision of a mini engineer, always planning the next structure before playtime begins.
  sports: Theodore Borgersen, an enthusiastic member of the local Little League baseball team, they follow a strict practice schedule, proudly wear a Boston Red Sox cap, and cheer for the Boston Celtics
    during family game nights.
  arts: Theodore Borgersen, a budding storyteller, they spend afternoons drawing vibrant dinosaur and superhero scenes, adore watching Pixar’s "Toy Story", and can recite the full lyrics of "Let It Go"
    from Frozen with perfect pitch.
  travel: Theodore Borgersen, an imaginative explorer, they map out trips with crayons, dream of visiting Disneyland and the Grand Canyon, yet currently enjoy weekend outings to the nearby botanical garden
    accompanied by their favorite stuffed bear.
  culinary: Theodore Borgersen, a picky yet adventurous eater, they insist on crunchy apple slices with a dash of cinnamon, love homemade cheese pizza topped with pepperoni, and proudly stir batter for
    chocolate chip cookies using a bright yellow spoon.
  core: Theodore Borgersen, a methodical five-year-old, they balance a love for orderly play with bursts of competitive spirit, often organizing toys by color while racing friends in soccer, yet occasionally
    succumb to impulsive snack cravings.
background:
  cultural: Theodore was born and raised in Greenville, a small town in Outagamie County, Wisconsin, within a family that traces its roots to Norwegian immigrants, as reflected in the Borgersen surname.
    His parents maintain a blend of Midwestern American and Scandinavian traditions. They attend a local Lutheran preschool where he learns about community values and seasonal celebrations. The family observes
    holidays such as Norwegian Constitution Day, preparing traditional foods like lefse and serving root‑vegetable soups. Outdoor activities are a regular part of his upbringing; weekend trips to nearby
    lakes for fishing or pond skating are common. He also participates in community events such as the Outagamie County Fair, which emphasize local agriculture and small‑town camaraderie. This cultural
    mix instills in Theodore a respect for punctuality, hard work, and communal responsibility.
