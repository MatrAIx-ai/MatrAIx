  hobbies: '["Building with Duplo bricks", "Solving matching and sorting puzzles", "Coloring and drawing with defined outlines", "Participating in preschool circle time and storytime", "Playing organized
    games like Simon Says and tag", "Playing with wooden train sets", "Visiting the local library for storytime", "Attending community fairs and events"]'
  career_goals: Theodore is fascinated by jobs that involve clear routines, teamwork, and the chance to help others. He often says he wants to become a firefighter because he admires the orderly training,
    the predictable shift schedules, and the teamwork required to keep the community safe. He also enjoys watching trains and imagines himself as a train conductor who operates on a strict timetable, reflecting
    his love for structure.
