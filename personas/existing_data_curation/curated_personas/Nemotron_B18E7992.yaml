  career_goals: Nixon dreams of one day becoming a teacher or a youth sports coach so he can share his love of learning and teamwork with other kids. He is also fascinated by video games and hopes to learn
    how they are made, imagining a future where he designs his own games or creates interactive stories. These ambitions combine his desire for a structured, supportive environment with his passion for
    community and creative expression.
