personas:
  professional: Nixon Perry is a budding junior robotics enthusiast who delights in assembling LEGO and coding simple robots, applying their practical, structure‑loving mindset to clear‑cut challenges while
    they also embrace the free‑form creativity of Minecraft builds.
  sports: Nixon Perry is an energetic participant in basketball and soccer at the local park, cheering for the Virginia Cavaliers and DC United while playing for the Charlottesville Youth Soccer Club, and
    they eagerly attend local games to absorb team strategies, balancing structured drills with the spontaneous fun of pick‑up matches.
  arts: Nixon Perry is a creative comic‑drawer who listens to Kendrick Lamar, Beyoncé, and Kirk Franklin while sketching superhero adventures, spends weekends building intricate LEGO sets, and dives into
    Minecraft and Roblox worlds to experiment with storytelling, all of which shape their vibrant artistic identity, and they love sharing their creations with friends.
  travel: Nixon Perry is a curious traveler who has visited Washington, D.C.'s National Museum of African American History, taken family trips to Shenandoah National Park for hiking, dreams of exploring
    the historic streets of London and the bright lights of Tokyo, and typically plans outings with their parents using colorful maps and YouTube video guides, while they relish the blend of adventure and
    learning these trips provide.
  culinary: Nixon Perry is a budding home chef who can whip up a decent grilled cheese sandwich with American cheese, loves mac and cheese baked with sharp cheddar, enjoys pizza topped with pepperoni and
    extra cheese, often snacks on chocolate chip cookies, and they favor ingredients like peanut butter, bananas, and honey for quick energy bites.
  core: Nixon Perry is a sociable, structure‑loving ten‑year‑old who balances organized LEGO builds and robotics with spontaneous basketball games, all while they juggle allowance savings and mild allergies
    with a blend of enthusiasm and occasional forgetfulness.
background:
  cultural: Nixon is a Black boy raised in Charlottesville, Virginia, where his family keeps close ties to the local African American community. He participates in church gatherings that blend gospel music,
    storytelling, and communal meals, and his family celebrates cultural milestones such as Juneteenth and Black History Month with educational activities and traditional foods. Growing up near the University
    of Virginia and Virginia Commonwealth University, he is exposed to diverse perspectives and historic sites on the city's African American Heritage Trail. His parents encourage pride in his heritage,
    sharing stories of civil-rights leaders from Virginia and promoting a sense of responsibility to his community. These experiences shape his values, social connections, and aspirations.
