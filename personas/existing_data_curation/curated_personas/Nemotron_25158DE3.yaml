  career_goals: Approaching retirement, Venus aims to transition into a supervisory and mentorship role that leverages her high standards and critical eye for safety. She seeks to develop a comprehensive
    training manual for new attendants that integrates both modern aviation protocols and traditional Iñupiaq practices. Additionally, she aspires to become a safety auditor for the regional airline, ensuring
    rigorous compliance and advocating for improved working conditions. Securing a stable pension while leaving a lasting professional legacy for younger Alaska Native employees is a central ambition.
