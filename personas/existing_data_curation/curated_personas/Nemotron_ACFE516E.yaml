personas:
  professional: Michele Mcneese, a 52‑year‑old food‑service operations expert, blends two decades of restaurant management with Lean Six Sigma, statistical forecasting, and ERP integration to drive data‑centric
    inventory control and sustainable menu engineering, while their outgoing, team‑focused leadership style balances meticulous organization with flexible, community‑driven problem solving.
  sports: Michele Mcneese competes in a local pickleball league, hikes the White Mountain trails every weekend, avidly follows the Boston Red Sox, and organizes a senior‑friendly soccer circle, merging
    their competitive spirit with a love for community‑oriented physical activity.
  arts: Michele Mcneese enjoys salsa dancing on Thursday nights, regularly attends productions at the Lexington Community Playhouse, spends evenings immersed in science non‑fiction by Malcolm Gladwell,
    and draws creative inspiration from folk singer Gillian Welch and culinary storyteller Alice Waters.
  travel: Michele Mcneese favors meticulously planned escapes that pair outdoor adventure with culinary indulgence, such as a fall foliage road trip through Vermont’s Green Mountains, a wine‑tour weekend
    in Napa Valley, and an annual immersion in Tuscany’s agriturismo farms, balancing family responsibilities with the financial prudence needed to fund a future consulting venture.
  culinary: Michele Mcneese designs seasonal, low‑waste menus featuring locally harvested apples, fresh Atlantic cod, and heirloom tomatoes, expertly pairs a crisp New England Chardonnay with apple‑cider‑glazed
    pork, leads community cooking workshops that teach waste‑reduction techniques, and occasionally over‑prepares ingredients to avoid any perceived waste, revealing a perfectionist streak in the kitchen.
  core: Michele Mcneese fuses data‑driven precision with vibrant community energy, steering restaurant efficiency with spreadsheets while salsa‑dancing through life’s challenges, even as they occasionally
    binge‑purchase the latest DIY electronics kits.
background:
  cultural: Michele grew up in a suburban New England setting with an Anglo‑Celtic heritage that emphasizes education, self‑reliance, and community service. Her family traditions include weekly Sunday meals
    featuring classic American dishes, active participation in town meetings, and seasonal celebrations such as apple picking and pumpkin festivals. She values punctuality, volunteerism, and a pragmatic
    approach to life, while also enjoying the region's strong connection to local agriculture and the outdoors.
attributes:
  skills: '[''Data-driven inventory control'', ''Cost budgeting and financial analysis'', ''Menu engineering with nutritional science'', ''Food safety compliance (HACCP, ServSafe)'', ''Statistical forecasting'',
    ''Lean Six Sigma process improvement'', ''POS and ERP system integration'', ''Team leadership and staff training'', ''Customer experience design'', ''Sustainable sourcing and waste reduction'']'
  hobbies: '[''Community cooking workshops'', ''Volunteering at local food banks'', ''Hiking in New England woods'', ''Salsa dancing'', ''Pickleball competition'', ''Wine tasting club'', ''Reading science
    and technology non-fiction'', ''DIY electronics projects'', ''Attending local theater productions'', ''Solving crossword puzzles'']'
  career_goals: Michele aims to transition from managing a single location to a regional director role overseeing multiple restaurants, where she can scale data‑focused operational excellence and embed
    sustainability into the core of food service. She plans to earn Certified Food Scientist credentials and launch a consultancy that helps independent eateries reduce waste and improve margins through
    technology. Long‑term, she hopes to mentor emerging female leaders in hospitality and spearhead a community program that promotes locally sourced, low‑waste menus across the Lexington area.
