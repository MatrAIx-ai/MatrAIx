  hobbies: '[''Gardening'', ''Woodworking'', ''Cooking Honduran cuisine'', ''Reading historical non-fiction'', ''Chess'', ''Church study groups'', ''Spanish conversation circle'', ''Walking club'', ''Genealogy
    research'']'
  career_goals: Although retired, Douglas is driven to stay purposeful by volunteering at the local senior center, mentoring younger members of the Honduran community in financial literacy, and preserving
    his family's history through a written memoir. He aspires to learn new digital tools to keep in touch with his grandchildren, to organize an annual cultural celebration of Honduran heritage in Orland
    Park, and to maintain his health through regular walking and gardening.
