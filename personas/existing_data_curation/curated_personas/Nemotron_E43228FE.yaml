personas:
  professional: Douglas Cordero, a retired municipal office manager turned senior‑center volunteer, blends decades of financial administration expertise with their methodical, detail‑oriented nature to
    mentor small‑business owners and guide community projects with quiet confidence.
  sports: Douglas Cordero, a devoted member of the Orland Park Senior Walking Club, enjoys daily garden walks and weekly pickleball matches at the community center, and loyally follows the Chicago Cubs,
    the local high‑school basketball team the Orland Park Knights, and the Chicago White Sox during spring training.
  arts: Douglas Cordero, who finds inspiration in the classical guitar of Andrés Segovia, the vibrant murals of Diego Rivera, and the literary storytelling of Gabriel García Márquez, regularly attends local
    Spanish‑language concerts featuring mariachi groups and visits the Art Institute of Chicago to view works by Georgia O’Keeffe.
  travel: Douglas Cordero, who favors relaxed, small‑group travel, has trekked through the historic streets of Antigua, Guatemala, enjoys annual family trips to the sunny beaches of Gulf Shores, Alabama,
    and dreams of a leisurely pilgrimage to the centuries‑old monasteries of Andalusia, Spain.
  culinary: Douglas Cordero, an accomplished home‑cook, delights in preparing their family’s traditional corn‑based tamales, slow‑cooked black beans spiced with cumin and achiote, and succulent plantain
    fritters harvested from their garden, often pairing meals with a refreshing glass of homemade horchata.
  core: Douglas Cordero is a methodical garden‑to‑table storyteller who balances quiet curiosity with steadfast reliability, occasionally forgetting to water new seedlings while never missing a community
    meeting.
background:
  cultural: Douglas grew up in a rural town near Tegucigalpa, Honduras, where Catholic traditions, family solidarity, and communal celebrations were central to daily life. He immigrated to the United States
    in his early thirties, settling in the Chicago suburbs. He retains fluency in Spanish and celebrates Honduran holidays such as Día de la Independencia and Semana Santa, often sharing folk music like
    punta and marimba with his community. His cultural identity is reflected in his emphasis on family, hospitality, and the value placed on hard work and mutual support.
