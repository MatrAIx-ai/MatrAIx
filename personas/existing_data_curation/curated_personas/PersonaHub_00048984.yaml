persona_description: A healthcare provider who is concerned about the health and well-being of their patients, particularly those in high-risk groups such as men who have sex with men. They are aware of
  the importance of regular HIV testing and want to ensure that all adults, regardless of their risk factors, are screened for the disease. They are committed to reducing stigma associated with HIV testing
  and want to ensure that their patients feel comfortable and informed about the process. They are likely to be knowledgeable about the latest research and guidelines for HIV testing and are eager to share
  their expertise with their patients.
