  career_goals: Although officially retired, Brittney aims to leave a lasting legacy within her community and family. She plans to mentor younger volunteers at the local senior center, document her family's
    genealogy for future generations, and contribute articles on local history to the Johnstown Historical Society's newsletter. Maintaining her health and supporting her husband remain top priorities,
    as does occasionally showcasing her handcrafted quilts at regional craft fairs to share her expertise and preserve traditional techniques.
