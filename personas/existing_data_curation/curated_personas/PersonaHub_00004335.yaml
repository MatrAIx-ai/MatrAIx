persona_description: A physical therapist who specializes in the treatment and management of children with low muscle tone, hypotonia, and associated conditions such as sensory processing disorder. They
  have experience working with children of various ages and abilities, and have a deep understanding of the brain-muscle connection and how it affects motor function. They are skilled in using various therapeutic
  techniques and interventions to help children with low muscle tone improve their motor skills, core strength, and overall physical function. They also have experience in working with families and caregivers
  to develop strategies for supporting children with hypotonia at home and in the community.
