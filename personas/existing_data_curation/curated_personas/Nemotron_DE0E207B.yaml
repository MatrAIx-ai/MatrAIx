personas:
  professional: Lawrence Harris is a diligent automotive service technician who leverages systematic diagnostic expertise, engine rebuilding mastery, and emerging hybrid vehicle knowledge to lead their
    shop’s workflow, while they chase ASE Master certification and dominate regional repair contests.
  sports: Lawrence Harris is a devoted fan of the Mississippi State Bulldogs football team, tailgates with a full grill before home games, plays pickup basketball at the community center, and regularly
    joins friends for deer hunting and bass fishing excursions, embodying a competitive yet camaraderial sports spirit.
  arts: Lawrence Harris finds artistic inspiration in classic car culture, attending hot‑rod shows while humming to country legends like Alan Jackson, rocking out to AC/DC during garage work, and enjoying
    the visceral storytelling of the film 'Bullitt' starring Steve McQueen.
  travel: Lawrence Harris prefers road‑trip itineraries that mix mechanical pilgrimage with leisure, having driven the classic‑car‑laden streets of Detroit’s Motor City, the coastal vibes of the Pebble
    Beach Concours d’Elegance, and planning a future fishing getaway to Lake Tahoe’s crystal‑clear waters.
  culinary: Lawrence Harris is a weekend grill master who perfects a signature dry rub of paprika, brown sugar, and cayenne on pork ribs, cooks shrimp étouffée with a dash of Creole seasoning, and never
    serves a meal without a side of buttery corn on the cob and sweet tea.
  core: Lawrence Harris blends a methodical, hands‑on professional drive with a love for classic‑car competition, community sports, and hearty backyard gatherings, all tempered by a lingering worry for
    perfection and a habit of over‑caffeinating during late‑night repairs.
background:
  cultural: Lawrence grew up in a close‑knit, working‑class family in rural Mississippi. His white Southern heritage is reflected in his appreciation for community gatherings, church involvement, and regional
    traditions such as BBQ, country music, and football fandom. The values of self‑reliance, practicality, and a strong work ethic were reinforced by his upbringing in Vancleave, where neighborly support
    and a respect for established routines are common. While he embraces modern automotive technologies, he maintains a deep respect for the region's agricultural and transportation roots, often helping
    neighbors with truck repairs and participating in local civic events.
attributes:
  skills: '["Automotive diagnostics (OBD‑II)", "Engine rebuilding", "Transmission repair", "Electrical system troubleshooting", "Preventive maintenance scheduling", "Customer communication and service",
    "Inventory and parts management", "Welding and metal fabrication", "HVAC (car AC) service", "Hybrid/electric vehicle maintenance", "Team coordination and time management"]'
  hobbies: '["Classic‑car restoration", "Fishing trips", "Hunting excursions", "Tailgating at football games", "Barbecue cooking", "Pickup basketball", "DIY home improvement projects", "Drag racing at local
    strip", "Car club meetings"]'
  career_goals: Lawrence aims to become a Master Technician and obtain his ASE Master Certification within the next three years. He envisions advancing to a foreman or service manager role at his current
    shop, where he can mentor apprentices and implement structured workflow improvements. Long‑term, he aspires to open a small independent garage that specializes in diesel truck repair and emerging electric
    vehicle services, providing a reliable income stream for his family and a reputable standing in Harrison County. His competitive streak drives him to win regional automotive repair competitions, while
    his desire for stability pushes him to secure certifications that buffer against economic uncertainty.
