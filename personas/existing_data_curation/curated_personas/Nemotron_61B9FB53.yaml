personas:
  professional: Esther Giroir, a 30‑year‑old artisan woodworker, merges meticulous hand‑tool joinery with CNC precision to craft limited‑edition, art‑inspired furniture while leveraging their organized,
    competitive mindset to pursue a Certified Woodworker credential, expand into mixed‑media sculpture, and cultivate a boutique studio that attracts Mid‑Atlantic collectors.
  sports: Esther Giroir, an avid hiker who roots for the Philadelphia Eagles, the Washington Capitals, and the Baltimore Orioles, spends weekends trekking with the Susquehanna Trail Hiking Club and sometimes
    joins a local adult softball league to balance solitary river walks with light competition.
  arts: Esther Giroir, who finds inspiration in Ansel Adams’ black‑and‑white river photography, Monet’s impressionist landscapes, and the handcrafted elegance of George Nakashima, delights in playing folk
    standards by Bob Dylan and Joan Baez on a vintage guitar, and frequently visits the Philadelphia Museum of Art to explore contemporary mixed‑media installations.
  travel: Esther Giroir, preferring self‑planned, journal‑filled itineraries, has trekked the artistic stalls of Asheville’s Mountain Craft Fair, dreamt of studying timber traditions in Portland, Oregon,
    relishes weekend getaways to the historic streets of Gettysburg, and hopes to one day attend a Japanese joinery symposium in Kyoto, balancing modest budgets with a desire for authentic, low‑pressure
    experiences.
  culinary: Esther Giroir, an intermediate home cook who cultivates rosemary, thyme, and mint in a small garden, enjoys crafting roasted beet and goat‑cheese salads, herb‑infused focaccia, and wild mushroom
    risotto using locally foraged ingredients, and treats themselves to a hearty apple‑cinnamon crumble after long studio sessions.
  core: Esther Giroir, a 30‑year‑old woodcraft perfectionist, channels intense curiosity, methodical planning, and a competitive spark into boutique furniture while wrestling with bouts of anxiety that
    fuel both their creativity and occasional self‑critical paralysis.
background:
  cultural: Esther comes from a white, Northern European lineage with roots tracing back to French‑Canadian settlers who migrated to Pennsylvania in the early 20th century. Raised in Northumberland, PA,
    she grew up in a close‑knit, working‑class community that values self‑reliance, craftsmanship, and a deep respect for the natural environment of the Appalachian foothills. Her upbringing blended modest
    Protestant values with a local appreciation for historic woodworking traditions, fostering a strong work ethic and an innate curiosity about artistic expression. This cultural backdrop informs her dedication
    to sustainable practices, her reverence for artisanal heritage, and her preference for intimate, community‑oriented interactions.
attributes:
  skills: '[''Custom furniture design'', ''Hand and power tool operation'', ''Wood joinery (mortise and tenon, dovetail)'', ''CNC routing and programming'', ''Woodturning'', ''Finishing (oil, wax, lacquer)'',
    ''SketchUp and Fusion 360 basics'', ''Project planning and budgeting'', ''Tool maintenance and safety compliance'', ''Sustainable material sourcing'', ''Client communication and custom order management'',
    ''Small business bookkeeping'']'
  hobbies: '[''Landscape sketching'', ''Nature photography'', ''Reading art history'', ''Hiking in the Susquehanna River Valley'', ''Gardening'', ''Vintage tool collecting'', ''Playing folk guitar'', ''Journaling'',
    ''Meditation'', ''Baking artisanal breads'']'
  career_goals: Esther aims to transform her modest home workshop into a recognized boutique studio that produces limited‑edition, art‑inspired wood pieces for collectors across the Mid‑Atlantic. She aspires
    to earn a Certified Woodworker credential, expand her product line to include mixed‑media sculptural works, and secure a regular presence at regional craft fairs and galleries. Long‑term, she envisions
    offering intimate, hands‑on workshops for a few dedicated apprentices, allowing her to share her craft while maintaining a controlled, quality‑focused environment that aligns with her competitive drive
    and need for reliable outcomes.
