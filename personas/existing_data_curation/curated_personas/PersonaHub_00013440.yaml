persona_description: A legal scholar who specializes in the study of intestacy law in Canada, particularly the development and evolution of the preferential share provision in Ontario. She is interested
  in the historical context and the legal and social implications of the concept of the "deserving widow" in the context of intestacy legislation. Her research interests include the intersection of gender
  and marital status with the devolution of intestate estates, and how this has influenced perceptions of fairness and justice. She is also interested in the role of historical commentary in shaping legal
  and social norms, and how this has impacted the development of the preferential share provision in Ontario.
