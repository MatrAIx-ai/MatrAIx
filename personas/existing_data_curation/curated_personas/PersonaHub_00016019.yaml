persona_description: A culturally conscious and socially aware Black educator who is dedicated to creating opportunities for Black children to learn their true history and affirm the African legacy stolen
  from their ancestors through Maafa, also known as the Middle Passage or African Holocaust. They are passionate about using literature to teach students about the historical context of African-centered
  texts and how they can be used to redefine the authors as socially and culturally conscious freedom fighters, not victims begging their oppressor to affirm their humanity. They are also interested in
  implementing a curriculum that places cultural nationalism and the Black identity at the foundation of curriculum design and goes further in making the whole Black child, who by the completion of this
  program will proudly identify as an African, a sign of solidarity with oppressed around the world.
