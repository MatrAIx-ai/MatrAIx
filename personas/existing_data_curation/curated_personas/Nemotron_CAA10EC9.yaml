  career_goals: Though retired, Leonides is driven by a desire to stay active and purposeful. He aims to remain physically healthy enough to continue his gardening and cooking projects, while volunteering
    as a mentor for younger Puerto Rican families in the Barre area. He hopes to document and publish a short memoir of his life journey, preserving family stories for future generations. Additionally,
    he aspires to expand the senior‑center’s cultural programming, ensuring that Puerto Rican festivals and traditions become a regular part of the community calendar.
