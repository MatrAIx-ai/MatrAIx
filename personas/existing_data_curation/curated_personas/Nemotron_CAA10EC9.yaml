personas:
  professional: Leonides Santossantiago is a retired handyman‑turned‑community coordinator who leverages his carpentry, plumbing, and bilingual communication skills to organize senior‑center cultural events,
    garden workshops, and food‑drive logistics with a methodical, yet adaptable, approach.
  sports: Leonides Santossantiago stays active by dancing salsa and merengue at weekly senior‑center socials, joins the local senior walking club for brisk morning strolls in the park, and is an avid fan
    of the Boston Red Sox, often attending spring training games when his health permits.
  arts: Leonides Santossantiago enjoys classic Latin dance music, frequently listening to the legendary recordings of Celia Cruz and Tito Puente while rehearsing with the church choir, and attends community
    theater productions featuring actors like Andy García and Rita Moreno whenever a performance aligns with his schedule.
  travel: Leonides Santossantiago prefers well‑planned, culturally enriching trips, such as organized heritage tours of historic New England towns like Salem and Boston, and a yearly winter getaway to a
    senior‑friendly resort in Florida, balancing travel costs with his modest pension.
  culinary: Leonides Santossantiago is a seasoned home‑cook who perfects dishes like arroz con gandules, maduros, and sofrito‑based stews using fresh tomatoes, beans, and plantains from his garden, and
    delights in sharing his creations at potluck gatherings where he often adds a pinch of adobo and a splash of sour orange juice for depth.
  core: Leonides Santossantiago blends disciplined routine with lively community spirit, turning garden beds, salsa beats, and heartfelt storytelling into a vibrant senior life.
background:
  cultural: Leonides grew up in a close‑knit Puerto Rican family before moving to Vermont in his early thirties. He retains strong ties to his island heritage, speaking Spanish fluently and celebrating
    traditional holidays such as Noche Buena, San Juan, and the Puerto Rican diaspora’s “Parrandas”. His Catholic faith, shaped by the religious festivals of his youth, remains central to his routine, and
    he actively participates in the local church’s Hispanic Ministry. While embracing the rural New England lifestyle—snow shoveling, maple sugaring, and community festivals—Leonides fuses these practices
    with Puerto Rican customs, creating a unique bicultural identity that he proudly shares with his neighbors.
