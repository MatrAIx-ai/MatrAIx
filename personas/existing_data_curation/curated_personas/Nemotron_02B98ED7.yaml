personas:
  professional: Natalie Wheeler runs a pretend lemonade stand in the backyard, blending curiosity about flavors with practical budgeting, meticulously counting coins while challenging friends to see who
    can sell the most cups.
  sports: Natalie Wheeler thrives on the Baxter Springs Pee Wee soccer team in spring, idolizing the Kansas City Chiefs and the Kansas City Royals, and after school they practice dribbling with a weather‑proof
    ball while also joining the community youth skating club in winter.
  arts: Natalie Wheeler delights in drawing cartoon animals inspired by classic Disney movies, singing along to “You Are My Sunshine,” and eagerly attending the local library’s storytime featuring Dr. Seuss,
    where they mimic the rhythm of the storyteller and collect stickers as creative trophies.
  travel: Natalie Wheeler’s favorite road‑trip memory is the family weekend in St. Louis to see the Gateway Arch and eat corn dogs, and they dream of someday visiting the magical worlds of Disneyland in
    California and the historic castles of Europe after hearing tales from grandparents’ vacation photo albums.
  culinary: Natalie Wheeler loves the comfort of cheesy macaroni and chicken nuggets, eagerly helps grandma roll out dough for a traditional apple pie during the autumn harvest festival, and insists on
    sprinkling cinnamon on their oatmeal, showcasing a blend of familiar kid‑favorites and seasonal, home‑cooked treats.
  core: Natalie Wheeler is a curious, organized five‑year‑old who balances competitive play with a practical streak, often questioning others’ motives while sprinkling a dash of stubborn independence into
    everyday adventures.
background:
  cultural: Natalie grows up in Baxter Springs, a small town in Cherokee County, Kansas, steeped in Midwestern values of community, practicality, and modesty. Her family’s heritage traces back to European
    (German and Irish) roots, reflected in family gatherings that feature traditional foods and seasonal celebrations. The local culture emphasizes outdoor activities, school involvement, and close‑knit
    neighborhood ties, which shape her sense of responsibility, curiosity about the natural world, and appreciation for both new ideas and tried‑and‑true ways.
attributes:
  skills: '[''Letter recognition (A‑Z)'', ''Counting to 20'', ''Basic phonics'', ''Fine motor skills (cutting, drawing)'', ''Puzzle solving'', ''LEGO building'', ''Following multi‑step instructions'', ''Simple
    science experimentation'', ''Turn‑taking and basic conflict negotiation'']'
  hobbies: '[''Drawing and painting'', ''LEGO building'', ''Backyard nature exploration (collecting leaves, rocks, insects)'', ''Memory matching and simple board games'', ''Preschool music class'', ''Reading
    picture books'', ''Educational app games (letters, numbers)'']'
  career_goals: While still early in her education, Natalie often talks about becoming someone who discovers new things and helps others, such as a scientist or a veterinarian. She imagines working in a
    lab where she can test ideas and use practical tools, and she also dreams of caring for animals, reflecting her love for nature and her organized, goal‑oriented mindset. In the short term she aims to
    master reading and math so she can progress confidently toward those future roles.
