personas:
  professional: Carolina Santana is a 28‑year‑old computer systems analyst with a business degree who excels at turning messy stakeholder requirements into clean system specifications, leveraging bilingual
    communication, meticulous process mapping, and SQL‑driven data analysis to deliver low‑stress, well‑structured solutions for small cross‑functional teams, all while eyeing senior analyst or IT project
    manager roles and pursuing CBAP, PMP, and ITIL certifications.
  sports: Carolina Santana enjoys hiking the steep trails around Cidra almost every weekend, often joining the local Cidra Hiking Club, follows the San Juan baseball team Cangrejeros de Santurce and the
    basketball squad Capitanes de Arecibo on TV, and practices yoga three times weekly to keep flexibility, while they avoid high‑intensity gym workouts preferring low‑impact cardio that eases stress.
  arts: Carolina Santana plays the cuatro at intimate family gatherings, finds solace in the rhythmic storytelling of Caribbean folk music, and regularly reads historical fiction by authors such as Maryse
    Condé and Junot Díaz; their playlist includes classics from Rubén Blades, Celia Cruz, and contemporary indie singer Bomba Estéreo, and they unwind by solving crosswords and Sudoku in the evenings.
  travel: Carolina Santana prefers low‑key, well‑planned getaways, often organizing weekend road trips to the coastal town of Fajardo or a spa retreat in the mountainous region of Orocovis, has explored
    the historic streets of Old San Juan, visited Havana for a cultural immersion, and dreams of trekking the Blue Mountains in Jamaica, all while fitting travel into a tight work calendar and a modest
    travel budget.
  culinary: Carolina Santana relishes cooking island staples like mofongo, arroz con gandules, tostones, and pernil, using a secret sofrito blend of cilantro, annatto, and garlic; they rate themselves an
    intermediate home chef, love sourcing fresh plantains at the local farmer’s market, but often over‑season dishes when stressed and have a guilty habit of snacking on leftover empanadillas late at night.
  core: Carolina Santana blends analytical precision with island‑rooted creativity, balancing meticulous spreadsheets and meditative hikes while wrestling with chronic worry and a penchant for over‑seasoned
    cooking.
background:
  cultural: Carolina was raised in Cidra, a central mountainous municipality of Puerto Rico known as the "City of Eternal Spring." Her family embodies strong Puerto Rican traditions, including bilingual
    communication, Catholic celebrations, and close‑knit community gatherings during fiestas patronales. She values "familismo" and "respeto," which shape her cooperative and harmony‑seeking nature. Carolina's
    cultural identity is reflected in her love for Puerto Rican cuisine, music such as bomba and plena, and the resilient, pragmatic spirit of her island community. These influences inform her work ethic,
    emphasizing practicality, collective well‑being, and a preference for intimate, harmonious social interactions.
attributes:
  skills: '["Business Process Analysis", "Requirements Gathering", "Data Modeling", "SQL Querying", "System Documentation", "Risk Assessment", "Bilingual Communication (Spanish/English)", "Project Coordination",
    "Process Improvement", "Power BI Data Visualization", "ERP System Familiarity (SAP/Oracle)", "Microsoft Office Suite Proficiency", "Attention to Detail", "Structured Problem Solving"]'
  hobbies: '["Cooking traditional Puerto Rican dishes", "Hiking mountain trails around Cidra", "Yoga and mindfulness meditation", "Reading historical fiction", "Playing the cuatro (Puerto Rican string instrument)",
    "Solving puzzles (crosswords, Sudoku)", "Attending small coffee gatherings with friends", "Volunteering at community events"]'
  career_goals: Carolina aims to advance to a senior systems analyst or IT project manager position within the next five years, focusing on leading small, well‑structured teams that deliver efficient business
    solutions. She plans to obtain professional certifications such as CBAP, PMP, and ITIL to formalize her expertise. Her long‑term ambition is to specialize in optimizing operational processes for local
    Puerto Rican enterprises, fostering both organizational efficiency and community well‑being. Carolina also seeks to mentor junior analysts, creating a supportive environment that reflects her cooperative
    nature while maintaining a balanced, low‑stress work life.
