  hobbies: '[''Watercolor painting'', ''Birdwatching'', ''Photography'', ''Reading art and history books'', ''Gardening'', ''Local history research'', ''Attending small music performances'', ''Volunteer
    art workshops'', ''Walking in Redwood forests'', ''Cooking seafood dishes'']'
  career_goals: Although retired from formal employment, Shawn aims to stay purposefully engaged in his community. He hopes to become a regular volunteer guide at the Humboldt County Museum, where he can
    share his knowledge of local art, history, and natural environment with small groups of visitors. He also aspires to organize a monthly “Redwood Sketch Walk” that encourages seniors to draw and photograph
    the forest, fostering both artistic expression and social connection. On a personal level, Shawn is working on a memoir that weaves his life story with the cultural and ecological changes he has witnessed
    in Eureka over the past six decades. He plans to take online art‑history courses to deepen his understanding of contemporary art movements, and he seeks to maintain his health and emotional well‑being
    through regular garden work and mindfulness practices.
