  hobbies: '[''Gardening'', ''Reading Historical Fiction'', ''Church Choir Participation'', ''Quilting'', ''River Walks'', ''Volunteering at Senior Center'', ''Attending Local Heritage Festivals'', ''Cooking
    Southern Soul Food'']'
  career_goals: Briana aims to leverage her extensive experience to transition into a mentorship role within her company, helping newer sales representatives refine their client‑engagement skills. She aspires
    to attain a regional team lead position, guiding a small cohort of reps across the Mississippi Delta while maintaining a balanced workload that allows her to stay involved in community activities. Additionally,
    she plans to develop a part‑time consulting practice focused on helping local small businesses design customer service strategies, ensuring she leaves a lasting professional legacy before fully retiring.
