  career_goals: Roy dreams of turning his artistic talents into a career that blends visual art with technology. He aims to build a strong portfolio that could lead to a scholarship at an art-focused high
    school or a future program in game concept art or graphic design. He is also intrigued by software development and would like to explore a career as a UI/UX designer or indie game developer, envisioning
    a flexible path that allows him to experiment with new ideas rather than follow a rigid career ladder. His competitive nature pushes him to seek recognition for his work, such as winning local art contests
    or contributing to online art communities.
