personas:
  professional: Derrick Watkins is a budding digital illustrator and content creator who blends his love for sketching, TikTok video making, and school media club projects, applying his curious mindset
    and sociable energy to collaborate on school newsletters and community event posters.
  sports: Derrick Watkins is a point guard on the left‑handed high school basketball team, the Riverside Eagles, practices three times a week, cheers for the NBA’s Los Angeles Lakers, and spends weekends
    hiking the nearby Green Valley Trail or fishing at Lake Oak, showing his love for teamwork and outdoor activity.
  arts: Derrick Watkins creates charcoal sketches of urban scenes, experiments with Procreate for digital illustrations inspired by graphic novelists like Neil Gaiman and Mike Mignola, shares short music‑driven
    TikTok clips featuring tracks from Kendrick Lamar, John Coltrane, and gospel choir harmonies, and participates in his church choir, reflecting his eclectic artistic palette.
  travel: Derrick Watkins enjoys spontaneous day trips to the regional state park for hiking, recalls a memorable family vacation to Orlando’s Disney World, and dreams of backpacking through Kyoto to explore
    anime culture, balancing limited teen budget constraints with a love for discovering new environments.
  culinary: Derrick Watkins favors quick comfort foods like spicy chicken tacos with avocado, homemade mac and cheese, and occasionally experiments with baking chocolate chip cookies using dark cocoa and
    sea salt, but often skips meals when absorbed in gaming marathons, illustrating his love for flavorful, easy‑to‑make dishes.
  core: Derrick Watkins is a socially vibrant teen who fuses artistic curiosity with a knack for digital storytelling, balancing school responsibilities, basketball, and a love for music, while occasionally
    battling impulsive spending and snack‑skipping habits.
background:
  cultural: Derrick is a Black teenager growing up in Homer, a small town in Claiborne Parish, Louisiana. He is part of a close‑knit Black community where family, church, and local traditions shape daily
    life. Sunday services at the historic Black Baptist church, where gospel singing and community fellowship are central, have nurtured his love for music and storytelling. Family gatherings frequently
    feature soul food meals and oral histories that connect him to broader African‑American experiences in the South, including stories of resilience from the Great Migration. The surrounding rural environment
    exposes him to Louisiana’s rich musical heritage, from blues to zydeco, and community events like the parish fair provide platforms for artistic expression. This cultural backdrop influences Derrick’s
    artistic style, his collaborative spirit, and his desire to celebrate and amplify Black voices through his creative pursuits.
