  hobbies: '["Sketching and drawing", "Digital illustration", "Photography", "Listening to music (hip‑hop, jazz, gospel)", "Playing basketball", "Singing in the church choir", "Creating TikTok videos",
    "Playing video games (Minecraft, Roblox)", "Reading graphic novels", "Exploring nature (hiking, fishing)", "Attending community cultural events", "Participating in school theater"]'
  career_goals: Derrick aims to pursue a career that merges his artistic passion with his love for community storytelling. He dreams of attending a college with a strong visual arts program, eventually
    working as a graphic designer, multimedia storyteller, or digital content creator. He hopes to produce short documentaries or animated projects that highlight Black experiences and the unique culture
    of his hometown. In the longer term, Derrick also envisions taking on a mentorship role—perhaps leading youth arts workshops or community events—to inspire other young people in his region to explore
    creativity and self‑expression. He is motivated to secure scholarships that will support his education and to travel beyond Louisiana to broaden his artistic perspective.
