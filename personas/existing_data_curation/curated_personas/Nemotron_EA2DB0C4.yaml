  hobbies: '[''hiking'', ''fishing'', ''track and field sprinting'', ''acoustic guitar'', ''reading mystery novels'', ''strategy video games'', ''volunteering at animal shelter'', ''photography'']'
  career_goals: Patricia aims to complete her GED within the next year, then pursue a two‑year associate degree in business administration at Treasure Valley Community College. She aspires to work in operations,
    logistics, or supply chain management for a regional retailer, eventually rising to a supervisory role. She is also considering training as an EMT to combine her interest in first aid with a stable,
    community‑focused career. Her long‑term ambition is to manage a small family‑owned business, applying her strong organizational skills and competitive drive to improve efficiency and profitability.
