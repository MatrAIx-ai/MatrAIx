personas:
  professional: Erick Souto, a 26‑year‑old construction laborer in South Florida, relies on their routine‑driven work ethic and meticulous safety focus to read and interpret blueprints, operate jackhammers
    and compactors, and coordinate crew tasks, while their sociable nature makes them the informal mentor who keeps team morale high during tight project schedules.
  sports: Erick Souto, a 26‑year‑old basketball enthusiast, joins local pickup games at the community center, cheers for the Miami Heat, occasionally plays beach volleyball at South Beach, and caps off
    each week with a sunrise jog along the Atlantic shoreline to clear their mind.
  arts: Erick Souto, 26, finds rhythm at community festivals where they dance salsa and merengue to the sounds of Marc Anthony, Victor Manuelle and Daddy Yankee, while also streaming classic Latin film
    performances by Pedro Almodóvar to unwind after a long workday.
  travel: Erick Souto, a 26‑year‑old who balances routine with a love for sun‑kissed horizons, often plans weekend trips to the Bahamas and Cuba for beach fishing and cultural festivals, and dreams of a
    deeper cultural immersion in Old San Juan, all while keeping a tight travel budget to safeguard their future business venture.
  culinary: Erick Souto, 26, channels creativity into the kitchen by preparing traditional Puerto Rican dishes—arroz con gandules flavored with sofrito, crispy tostones made from green plantains, and hand‑rolled
    pasteles stuffed with seasoned pork—occasionally pairing meals with fresh fish caught during their Atlantic fishing outings.
  core: Erick Souto, 26, merges a routine‑centric construction career with vibrant community dance, meticulous cooking, cautious budgeting, and occasional stress‑driven splurges, all while managing a persistent
    undercurrent of anxiety that fuels both their diligence and their need for social outlets.
background:
  cultural: Erick was raised in a bilingual Puerto Rican household in Lake Worth, where Spanish was spoken at home and English at school and work. His parents immigrated from the island in the early 1990s,
    bringing with them traditions such as celebrating Noche de San Juan, sharing music from jíbaro and contemporary reggaetón, and preparing family‑style meals on holidays. The vibrant Puerto Rican community
    in Palm Beach County provides him with cultural anchors—local festivals, church gatherings, and neighborhood events—that reinforce values of family cohesion, respect for elders, and mutual support.
    These cultural influences shape his practical, cooperative approach to both his job and personal life, fostering a strong sense of responsibility to his community while honoring the customs and rhythms
    of his heritage.
attributes:
  skills: '["Blueprint reading", "Framing and carpentry", "Concrete finishing", "Power‑tool operation", "Site safety inspections", "Team coordination", "Equipment maintenance", "Material handling", "Basic
