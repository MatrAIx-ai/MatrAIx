  hobbies: '["Pickup basketball", "Salsa and merengue dancing", "Cooking Puerto Rican cuisine", "Fishing", "Beach walks", "Co‑op multiplayer video gaming", "Model kit building"]'
  career_goals: Erick aims to advance from laborer to certified journeyman carpenter within the next two years, then move into a foreman or site‑supervisor role where he can lead crews and oversee larger
    residential projects. He plans to complete an associate degree in construction management and earn OSHA and NCCER certifications to strengthen his qualifications. Long‑term, he dreams of launching his
    own small contracting business focused on building affordable housing and community renovation projects in South Florida, providing stable employment for other workers from his cultural community. Throughout
    his career progression, he seeks to balance steady income and a predictable schedule with opportunities to mentor younger teammates and give back to his neighborhood.
