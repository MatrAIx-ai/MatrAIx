  career_goals: Although retired from the workforce, Janice aims to maintain financial independence and ensure her household remains economically secure. She plans to document her family's genealogy and
    write a memoir that captures her life experiences, preserving her legacy for future generations. Janice also hopes to expand her small garden into a boutique micro‑farm, possibly selling surplus produce
    and handcrafted quilts at local farmers’ markets. Additionally, she aspires to support her spouse by managing household logistics, staying physically active, and volunteering her analytical skills to
    assist a local senior center with budgeting, all while preserving her autonomy and personal interests.
