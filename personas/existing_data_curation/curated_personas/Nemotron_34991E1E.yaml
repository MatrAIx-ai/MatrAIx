  career_goals: Ana aims to become a senior compensation and total rewards manager within the next five years, leading a cross‑functional team in a mid‑sized technology firm. She plans to obtain the Certified
    Compensation Professional (CCP) designation and SHRM‑SCP certification, spearhead the development of innovative, data‑driven total‑rewards strategies that integrate cultural and wellness benefits, and
    eventually transition into a consulting role that advises small businesses on equitable compensation. She also hopes to mentor emerging HR professionals, particularly those from underrepresented backgrounds.
