  hobbies: '[''Sketching and architectural drawing'', ''Industrial photography'', ''Reading (architecture, philosophy, urban studies)'', ''3D modeling with SketchUp'', ''Woodworking and model building'',
    ''Strategy video games'', ''Visiting art museums and galleries'', ''Listening to jazz and hip‑hop'', ''Urban exploration of Pittsburgh’s historic sites'', ''Journaling and mindfulness meditation'']'
  career_goals: Anthony aims to transition from laborer to a supervisory role within the next three to five years, pursuing a bachelor's degree in construction management or a related field. He envisions
    becoming a site supervisor who integrates rigorous organization with an artistic eye for design, eventually moving into project management where he can oversee whole builds that prioritize sustainability
    and community impact. Long‑term, he hopes to start his own small‑scale construction consulting firm that offers design‑build services tailored to underserved neighborhoods in Pittsburgh, blending his
    technical expertise with his passion for inclusive, aesthetically thoughtful environments.
