personas:
  professional: A diligent construction laborer aiming for supervision, Anthony Morris blends his concrete‑finishing know‑how, precise inventory control, and passionate sketching of Pittsburgh’s historic
    façades to quietly enforce safety standards while championing design aesthetics on every job site, where they constantly seek to merge function with form.
  sports: A low‑key fitness enthusiast, Anthony Morris follows the Pittsburgh Steelers, Penguins, and Pirates with hometown pride, plays pick‑up basketball at a neighborhood gym each week, and tackles weekend
    hikes along the Great Allegheny Passage, where they favor steady cardio over high‑intensity workouts to balance work fatigue.
  arts: A reflective creator and appreciator, Anthony Morris spends evenings sketching the Cathedral of Learning, listens to Miles Davis, Aretha Franklin, and Kendrick Lamar while editing photos of abandoned
    steel mills, and regularly visits the Carnegie Museum of Art to study works by contemporary photographer Andreas Gursky, which they cite as inspiration for their own composition style.
  travel: A detail‑oriented explorer, Anthony Morris plans weekend road trips to historic industrial sites like the Henry Ford Museum in Dearborn and international voyages to Barcelona for its modernist
    architecture, yet they often prioritize budget‑friendly stays at boutique B&Bs in the Pittsburgh South Side before setting off on a meticulously mapped itinerary.
  culinary: A pragmatic home cook, Anthony Morris favors hearty dishes such as smoked trout pâté, pierogi stuffed with potato and cheddar, and caramelized onion‑infused ribeye, often using locally sourced
    beef and craft beer for marinades, while they occasionally experiment with a DIY wood‑fired pizza oven in their garage.
  core: Anthony Morris, a solitary yet organized 22‑year‑old construction laborer with a passion for sketching and sustainable design, constantly balances meticulous site discipline with an underlying anxiety
    that drives them to over‑plan every facet of life.
background:
  cultural: Anthony grew up as part of Pittsburgh’s vibrant African‑American community, a lineage shaped by the Great Migration and a strong tradition of resilience and mutual support. Family gatherings
    often centered around soulful cooking, storytelling, and music, fostering a deep appreciation for the Black cultural heritage in the city—from gospel choirs at the local church to the rich jazz scene
    that thrives in the Hill District. Community events like the Three Rivers Arts Festival and local Black History Month celebrations have reinforced his connection to both the artistic and activist strands
    of his culture. This background instills in him a sense of responsibility to give back, influencing his desire to improve neighborhood infrastructure and provide opportunities for other young Black
    workers in the trades.
attributes:
