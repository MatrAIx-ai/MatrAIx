  career_goals: Brandy aspires to become an elementary school teacher or community youth mentor, driven by her love for helping others and her enjoyment of structure. She also dreams of influencing her
    community through organized events such as after‑school clubs or neighborhood clean‑up projects. Long‑term, she imagines a career that blends education, leadership, and creativity, perhaps as a school
    counselor or youth program director, where she can use her organizational talents and friendly personality to support other children.
