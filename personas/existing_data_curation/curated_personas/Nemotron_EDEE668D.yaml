personas:
  professional: An aspiring game developer, Brandy Clark designs Scratch games for their friends, carefully mapping out each level in advance, proudly presenting the finished product at school tech fairs,
    and feeling anxious whenever a last‑minute bug threatens to delay the demo.
  sports: An energetic soccer enthusiast, Brandy Clark plays midfield for the Maplewood Youth Soccer Club, drills three times a week after school, cheers for the New York Knicks during basketball season,
    and stays fit by doing quick hip‑hop dance warm‑ups before matches.
  arts: A vibrant performer, Brandy Clark dances to the beats of Cardi B and Bruno Mars, sings gospel tunes by Kirk Franklin in the church youth choir, sketches cartoon characters inspired by Adventure
    Time and Studio Ghibli, and collects stickers of Ariana Grande, their favorite pop star.
  travel: An adventurous explorer, Brandy Clark loves weekend road trips to the nearby state park, remembers their first trip to Disneyland with wide‑eyed excitement, dreams of seeing Niagara Falls in summer,
    and prefers itineraries that balance scheduled activities with spontaneous playtime.
  culinary: A budding foodie, Brandy Clark enjoys homemade pizza topped with mozzarella, pepperoni, and fresh basil, whips up quick peanut butter‑banana smoothies for after‑practice snacks, experiments
    with simple frosting recipes for birthday cupcakes, though they often forget to clean up the kitchen afterwards.
  core: A socially vibrant ten‑year‑old who thrives on organized fun, Brandy Clark balances meticulous planning with spontaneous dance breaks, occasionally frets over unfinished projects, and never misses
    an opportunity to host a movie marathon for friends.
background:
  cultural: Brandy comes from a Black family in Memphis, Tennessee, a city renowned for its blues, soul, and hip‑hop heritage. Her family and community place a strong emphasis on church life, music, and
    close‑knit family ties. She grew up attending community events such as the Memphis Music Festival and local Juneteenth celebrations, enjoying dishes like fried chicken, collard greens, and barbecue.
    The rich musical legacy of Memphis— from blues clubs to gospel choirs—has shaped her love for rhythm and performance, while the city’s history of civil‑rights activism instills in her a sense of community
    responsibility and pride in her cultural identity.
