  highly knowledgeable about the legal and ethical considerations surrounding challenging behavior, and is able to provide guidance and support to healthcare teams in managing such behavior effectively.
  They are likely to be familiar with various tools and techniques for reporting and managing challenging behavior, and are equipped with the skills to ensure that the appropriate measures are taken to
  ensure the safety and well-being of the individuals involved.
