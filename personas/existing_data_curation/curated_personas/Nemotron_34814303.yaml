personas:
  professional: Laila Guevarareyes drives operational excellence as a store manager in a fast‑paced NYC retail setting, using meticulous scheduling, bilingual communication, and data‑driven inventory control
    while weaving artful visual displays into merchandising to reflect their curiosity and high standards.
  sports: Laila Guevarareyes stays fit through early‑morning yoga sessions and weekend pick‑up basketball at a community court, cheers for the New York Knicks and Yankees, and participates in a co‑ed recreational
    soccer league that meets at a local park in the Bronx.
  arts: Laila Guevarareyes curates a personal blog that spotlights under‑represented Caribbean‑influenced artists like Tania Bruguera and Jorge Pineda, reveres street‑art icons such as JR and the enigmatic
    works of Banksy captured through their own lens, and frequents live merengue and bachata nights featuring groups like Grupo Clave Huaracina.
  travel: Laila Guevarareyes prefers short, immersive getaways that blend cultural discovery with budget consciousness, having explored the historic streets of Cartagena, the culinary markets of Oaxaca,
    and weekend retreats to the Catskill Mountains, while dreaming of visiting the vibrant neighborhoods of Lisbon for their street‑art scene.
  culinary: Laila Guevarareyes lovingly prepares traditional dishes such as mangú (mashed plantains) with sautéed onions, sancocho brimming with yuca and plantain, and arroz con pollo infused with annatto,
    while experimenting with fusion twists like plantain tacos topped with mango salsa and cilantro‑lime crema.
  core: Laila Guevarareyes melds disciplined retail leadership with an artistic soul, balancing meticulous spreadsheets and bilingual teamwork with late‑night gallery strolls and experimental kitchen experiments,
    all while occasionally binge‑watching art documentaries and forgetting to update the blog.
background:
  cultural: Laila is a first-generation Dominican-American raised in the Bronx. She grew up in a bilingual household where Spanish was spoken at home and English at school. Her family traditions include
    celebrating Dominican holidays such as Dia de la Constitucion and Dominican Independence Day, cooking sancocho and mangu, and dancing to merengue and bachata. The vibrant Dominican community in the
    Bronx, with its churches, bodegas, and cultural festivals, has shaped her values of family solidarity, hard work, and pride in her heritage. While fully integrated into the multicultural fabric of New
    York City, Laila remains deeply connected to her roots, often sharing her cultural experiences through food, music, and community involvement.
attributes:
  skills: '[''Operations Management'', ''Team Coordination'', ''Inventory Management'', ''Budgeting and Financial Planning'', ''Data Analysis'', ''Bilingual Communication (Spanish/English)'', ''Conflict
