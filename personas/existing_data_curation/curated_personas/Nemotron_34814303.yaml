  hobbies: '[''Visiting art galleries and museums'', ''Writing an art blog'', ''Cooking Dominican cuisine'', ''Photography of street art'', ''Yoga and meditation'', ''Listening to merengue and bachata music'',
    ''Small-group book club'', ''Exploring local coffee shops'', ''Attending live music performances'', ''Participating in community cultural festivals'']'
  career_goals: Laila aims to progress from store manager to district manager within the next five years, eventually targeting a regional leadership role where she can shape corporate culture and champion
    community-focused initiatives. She plans to pursue a bachelor's degree in Business Administration and obtain professional certifications in supply chain management. Long-term, she envisions launching
    her own boutique that blends Dominican cultural art with contemporary design, creating a platform for emerging Latino artists while maintaining operational excellence.
