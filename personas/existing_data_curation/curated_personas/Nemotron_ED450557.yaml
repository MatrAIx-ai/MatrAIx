personas:
  professional: Orlando Jimenez, a budding junior architect, builds intricate Lego structures with meticulous attention to detail, channeling their love for structure, practicality, and cooperative nature
    into every creation.
  sports: Orlando Jimenez, a spirited participant in the Milwaukee Youth Soccer Association, spends afternoons dribbling a soccer ball at the local park, cheers for the Milwaukee Bucks during basketball
    season, and dreams of one day trying out for the junior league of the Milwaukee Brewers' kid baseball camp.
  arts: Orlando Jimenez draws inspiration from Mo Willems' vivid picture books, sings along to the cheerful tunes of Raffi, and delights in practicing the traditional dances taught by community elders at
    the cultural center.
  travel: Orlando Jimenez loves weekend family trips to the Milwaukee County Zoo and a magical stay at Disneyland, and they dream of exploring the ancient ruins of Machu Picchu in Peru and skiing down the
    snow‑capped slopes of the Swiss Alps.
  culinary: Orlando Jimenez, an eager little chef, enjoys helping set the table and assembling cheese‑and‑chicken mini sandwiches, savoring spaghetti topped with hearty marinara sauce, and blending banana‑strawberry
    smoothies with a splash of orange juice.
  core: Orlando Jimenez balances a love for order—lining up LEGO bricks by color—with bursts of spontaneous creativity, yet they often forget to tidy up toys before bedtime, prompting gentle reminders from
    parents.
background:
  cultural: Orlando comes from a Mexican family that preserves cultural traditions while living in Milwaukee, Wisconsin. At home, Spanish is spoken alongside English, and the family celebrates holidays
    such as Día de los Muertos, Cinco de Mayo, and Christmas with Mexican customs and foods like tamales and quesadillas. He attends a public kindergarten that reflects the Midwestern American environment,
    and he regularly visits a local Hispanic community center where he learns about Mexican dances, stories, and crafts. This bicultural upbringing gives Orlando a strong sense of belonging to both his
    Mexican heritage and his American surroundings, fostering respect for diversity and community.
