  career_goals: Orlando’s aspirations are shaped by his desire to be helpful, organized, and to interact positively with others. He often talks about wanting to become a teacher because he likes sharing
    what he knows, a construction worker because he enjoys building things with blocks, or a firefighter because they provide safety and structure to the community. He also hopes to become fluent in both
    Spanish and English so he can assist his family and friends in bilingual settings.
