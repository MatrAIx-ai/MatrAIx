  career_goals: Joyce aims to leverage her technical and creative skill set to become a user‑experience researcher for a health‑tech startup, focusing on designing accessible digital tools for underserved
    rural communities. She also dreams of launching a community makerspace in Bear Lake County that offers coding workshops, 3D‑printing labs, and art‑technology residencies for local youth. To deepen her
    expertise, she plans to pursue a master’s degree in Human‑Computer Interaction while building a portfolio of freelance UI/UX projects that give her flexibility and allow her to manage her stress by
    setting her own schedule. Long‑term, she hopes to contribute to open‑source projects that improve environmental monitoring tools and to travel internationally to learn diverse design practices.
