personas:
  professional: Joyce Stribble, a budding UI/UX researcher with a computer‑science major and visual‑arts minor, blends Python, JavaScript, and C++ expertise with strong UI/UX design skills in Figma to turn
    complex health‑tech ideas into intuitive prototypes, thriving in collaborative workshops where their talkative, sociable nature shines, even as their relaxed approach to deadlines sometimes forces last‑minute
    sprint sessions.
  sports: Joyce Stribble finds fitness in the outdoors, hiking Bear Lake’s scenic trails with the local Bear Lake Trailblazers club, playing casual weekend volleyball at the community center, and cheering
    on the Utah Jazz during basketball season while occasionally joining a summer kayaking group on the Great Salt Lake.
  arts: Joyce Stribble channels a love for sci‑fi narratives and visual storytelling by playing ukulele covers of Jason Mraz and The Beatles at open‑mic nights, curating photography showcases inspired by
    Ansel Adams, and drawing creative fuel from authors like Octavia Butler and installations by James Turrell.
  travel: Joyce Stribble prefers spontaneous, budget‑friendly adventures—backpacking the Pacific Northwest, exploring Portland’s street art, and dreaming of a design‑focused study trip to Kyoto, Japan—while
    avoiding over‑planned itineraries that feel restrictive to their creative flow.
  culinary: Joyce Stribble enjoys whipping up vibrant meals such as pan‑seared trout with lemon‑dill sauce, avocado toast topped with poached egg, and occasional miso ramen bowls with nori and scallions,
    often improvising with fresh local herbs, yet still relies on late‑night pizza delivery when inspiration wanes.
  core: Joyce Stribble is a curious, socially energized 19‑year‑old who blends tech and art, juggling spontaneous creativity with occasional disorganization and a persistent undercurrent of worry.
background:
  cultural: 'Joyce grew up in Montpelier, a small town in Bear Lake County, Idaho, where the community is largely white and has strong ties to agriculture and the Latter‑Day Saint tradition. Her family
    participated in local church youth groups, county fairs, and seasonal farming activities, giving her a deep appreciation for rural life and the region’s natural beauty. At the same time, she has been
    drawn to broader cultural currents through online platforms, college exposure, and visits to nearby art galleries in Logan and Boise. This blend of small‑town, community‑focused values and a curiosity
    for contemporary art and technology shapes her worldview: she values close‑knit relationships, collaborative effort, and the chance to bring new ideas into a place that often feels isolated from mainstream
    cultural hubs.'
