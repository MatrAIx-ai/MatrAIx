  career_goals: Alexander aims to transition into a part‑time consultant role, advising local small businesses on growth and sustainability. He aspires to mentor emerging entrepreneurs through a regional
    business incubator and to help launch a community makerspace that blends art, technology, and entrepreneurship. Serving on the board of the Wichita Art Museum and curating collaborative exhibitions
    are also key ambitions. Additionally, he plans to author a guide on creative business leadership and to travel periodically to study global art movements while remaining anchored in his family and community.
