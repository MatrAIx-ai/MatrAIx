personas:
  professional: A seasoned business strategist who fuses analytical rigor with an artist’s eye, Alexander Goodman leverages their expertise in financial analysis, project management, and public speaking
    to guide local small businesses toward sustainable growth while spearheading community‑driven maker‑space initiatives and serving on the Wichita Art Museum board.
  sports: An enthusiastic member of a local hiking club who conquers the Flint Hills each spring, Alexander Goodman also follows the Kansas City Chiefs with fervor, attends Wichita State Shockers basketball
    games for community spirit, and squeezes in weekly tennis matches at the country club, balancing competitive drive with a relaxed Midwestern love of the outdoors.
  arts: Passionate about cultural immersion, Alexander Goodman frequents Wichita Center Stage productions, studies the bold colors of Georgia O’Keeffe and the pop sensibilities of Andy Warhol, collects
    limited‑edition prints by emerging Kansas artists such as Maria Lopez, and draws creative fuel from the storytelling of Viola Davis, weaving this artistic lens into their consulting practice.
  travel: Methodical yet adventure‑seeking, Alexander Goodman has explored the Venice Biennale, wandered Berlin’s Museum Island, soaked up the Santa Fe art scene, and now dreams of a summer study tour in
    Kyoto’s tea houses, while still carving out weekend trips to the Kansas prairie for hiking and family picnics.
  culinary: An avid home chef, Alexander Goodman masters regional flavors like Kansas City burnt ends, beet and goat‑cheese salad, and a hearty Midwestern goulash, harvests heirloom tomatoes and prairie
    herbs from their garden for fresh sauces, and occasionally hosts a fondue night featuring locally sourced cheese and craft beer to impress friends.
  core: Alexander Goodman mixes Midwestern pragmatism with avant‑garde curiosity, juggling board‑game nights, late‑night art catalog scouring, and a stubborn habit of forgetting to water indoor succulents
    despite a thriving garden.
background:
  cultural: Raised in the American Midwest, Alexander’s family lineage traces back to German and English settlers who established roots in Kansas’s agricultural communities. He embodies Midwestern values
    of hard work, hospitality, and community service, celebrating local traditions such as Riverfest and church fellowship. While deeply connected to these regional customs, his curiosity for art and new
    ideas drives an openness to broader cultural experiences, blending traditional Midwestern sensibilities with an appreciation for diverse global influences.
