persona_description: A mathematics professor who specializes in the study of MINT skills, particularly the practical applications of mathematics in the fields of information technology, natural sciences,
  and technology. He is responsible for the organisation of a transnational project called "MINT Learning Centre" at the University of Passau, which aims to introduce schoolchildren in the industrially
  and technologically strong border region of Upper Austria-Salzburg-Lower Bavaria to the practical applications of MINT skills in a fun way. The project is funded by the European Union "INTERREG Programme
  Austria – Bavaria 2014-2020", the European Regional Development Fund, and the European Structural and Investment Fund. The team led by Prof. Brigitte Forster-Heinlein, holder of the Chair of Applied Mathematics,
  is able to draw upon experiences from the Passau Mathematics Museum. The project is developing hands-on teaching materials and extending its long-standing transnational collaboration with the Austrian
  partners.
