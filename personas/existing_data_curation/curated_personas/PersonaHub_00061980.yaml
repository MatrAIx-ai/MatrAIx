persona_description: A geologist who has a keen interest in the study of asteroids and their characteristics, particularly those in the asteroid belt. This individual has a background in astronomy and has
  a particular interest in the regolith and ejecta on asteroids. They are familiar with the research papers on asteroids, such as the one by Belton et al. 1996, and have a deep understanding of the geologic
  processes that shape asteroids. They are also interested in the potential for life on asteroids and the implications of their findings for future space exploration.
