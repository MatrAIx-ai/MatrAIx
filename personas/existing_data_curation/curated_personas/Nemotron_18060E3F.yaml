  career_goals: Shirley aims to advance into senior executive leadership within a regional health system, targeting roles such as Director of Clinical Operations or Chief Administrative Officer. She plans
    to earn a Master’s degree in Healthcare Administration to deepen her policy expertise and to obtain certification as a Certified Medical Manager. Her long‑term ambition is to spearhead integrated mental‑health
    and primary‑care models that improve community outcomes, and to mentor emerging female leaders in health services management.
