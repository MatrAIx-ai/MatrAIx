  career_goals: Sandra aims to transition from full‑time home management to a part‑time career that leverages her organizational strengths. In the next two years she plans to earn a GED and complete a community‑college
    certification in project management or professional home organization. She envisions launching a boutique home‑staging service for the Fredericksburg area, using her eye for detail, budgeting skills,
    and design sense to generate supplemental income. Sandra also hopes to take a leadership role on the Stafford County Volunteer Services Board, formalizing her experience coordinating community events.
    Long‑term she aspires to become a certified professional organizer and eventually run her own consulting practice helping families create structured, low‑stress home environments.
