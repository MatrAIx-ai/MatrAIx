  career_goals: Although retired, Cory aims to continue contributing to the STEM community by mentoring students, developing open‑source tools that blend technology and art, and volunteering as a guest
    lecturer for local workshops. He aspires to publish a series of essays on the intersection of scientific innovation and abstract art, and to establish a small makerspace in Laguna Niguel that encourages
    collaborative, hands‑on learning for hobbyists and seniors alike.
