personas:
  professional: Cory Givens, a retired electrical engineer and computer scientist turned maker‑mentor, leverages decades of analog and digital circuit design, embedded systems, and Python‑driven algorithmic
    art to guide hobbyists in a coastal Laguna Niguel makerspace where structured project management meets spontaneous creative exploration.
  sports: Cory Givens, a dedicated member of the Laguna Beach Yacht Club who sails weekly on a 30‑foot sloop, also logs sunrise hikes among Los Angeles County tide‑pools, supports the Los Angeles Dodgers
    and the LA Lakers from the comfort of home, and maintains gentle fitness through daily coastal walks and occasional low‑impact yoga to counterbalance their osteoarthritis.
  arts: Cory Givens channels the geometric dynamism of Wassily Kandinsky and the color field serenity of Mark Rothko onto large‑scale canvases while experimenting with AI‑driven generative art inspired
    by Refik Anadol, routinely attends ambient concerts by Brian Eno, quotes Philip K. Dick in poetry circles, and curates a modest personal library of Isaac Asimov, Ursula K. Le Guin, and Friedrich Nietzsche
    to fuel their contemplative creative practice.
  travel: Cory Givens favors purposeful, low‑stress trips that blend astrophotography with coastal relaxation, such as night‑scape excursions to Joshua Tree National Park, sunrise sailing along the Channel
    Islands, and occasional pilgrimages to Mauna Kea’s observatories, planning each journey months ahead while balancing a modest travel budget and the desire to share experiences with their small sailing
    crew.
  culinary: Cory Givens blends a seasoned palate for Pacific coastal cuisine with experimental techniques, frequently preparing sous‑vide salmon with miso‑foam, spherified citrus caviar using agar‑agar,
    and lavender‑infused airy custards crafted with liquid nitrogen, all while sourcing fresh shrimp from local fish markets and citing Ferran Adrià’s Molecular Gastronomy as inspiration.
  core: Eccentric yet methodical, Cory Givens navigates life like a well‑tuned circuit—balancing the precision of engineering with the fluid spontaneity of abstract art, all while habitually sketching star
    charts on napkins during sailing trips.
background:
  cultural: Cory grew up in post‑war suburban America, shaped by the optimism of the Space Race and the rise of Silicon Valley. He was educated within the mainstream U.S. school system and pursued higher
    education in STEM during the era of rapid technological advancement. Living now in Laguna Niguel, his cultural identity blends a traditional American work ethic with the relaxed, outdoor‑oriented lifestyle
    of Southern California's coastal communities. He values self‑reliance, community service, lifelong learning, and an appreciation for both scientific progress and artistic expression.
