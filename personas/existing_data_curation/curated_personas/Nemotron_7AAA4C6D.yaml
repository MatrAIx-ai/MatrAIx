  career_goals: Ashley aspires to a career that combines her love for structured problem‑solving with helping others. She dreams of becoming a pediatric surgeon, motivated by her interest in biology and
    desire to make a tangible difference in children's lives. She also entertains the possibility of a future in engineering, particularly civil engineering, to design sustainable infrastructure for growing
    desert communities. Her short‑term goal is to win a regional science fair and earn a leadership position on the school soccer team, building a strong foundation for her long‑term ambitions.
