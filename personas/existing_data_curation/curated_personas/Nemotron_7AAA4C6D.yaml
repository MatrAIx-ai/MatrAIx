personas:
  professional: Ashley Borowski is a disciplined forward on their school soccer team who channels their love of structure and competitive drive into leading coordinated plays, while also excelling in the
    science club and chess team, where they apply meticulous planning and strategic thinking to every challenge.
  sports: Ashley Borowski is a forward on Kingman United Youth Soccer who drills five times a week, follows the Arizona Cardinals for football inspiration, supports the Phoenix Suns during winter, and spends
    weekend hikes on the Mojave trails to build endurance, and they treat fitness as a disciplined routine and a competitive outlet.
  arts: Ashley Borowski channels their creative side by crafting interactive Scratch stories inspired by the narrative twists of Nancy Drew and the lyrical vibes of Taylor Swift, while also enjoying mystery
    novels by J.K. Rowling and sketching characters during soccer breaks, making the arts a structured yet imaginative escape.
  travel: Ashley Borowski plans family trips with a spreadsheet-style itinerary, preferring adventure hikes in the Grand Canyon and Zion National Park over long beach stays, yet dreams of a future vacation
    to Maui's volcanic beaches and a cultural tour of London's museums once their savings reach the earmarked goal.
  culinary: Ashley Borowski enjoys whipping up quick desert-inspired meals like prickly pear smoothies, chicken tacos topped with fresh cilantro and lime, and perfecting chocolate chip cookies, though they
    are still at the beginner level, often relying on step-by-step YouTube tutorials.
  core: Ashley Borowski is a hyper-organized, competitive 11-year-old who obsessively plans every soccer drill and allowance budget, yet they battle an undercurrent of worry that fuels nightly journaling
    and occasional forgetfulness of their inhaler.
background:
  cultural: Ashley is a White American growing up in Kingman, Arizona, a small city nestled in the Mojave Desert. Her family values education, community involvement, and outdoor activities typical of the
    Southwest, such as hiking and respecting the desert’s natural beauty. The local school culture emphasizes teamwork and personal achievement, which aligns with her competitive yet sociable nature. She
    is exposed to a blend of regional traditions, from county fairs and local festivals to broader American pop culture through school and media, shaping a balanced cultural identity that appreciates both
    her hometown’s close‑knit community and the wider world.
