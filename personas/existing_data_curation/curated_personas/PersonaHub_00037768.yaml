persona_description: A wildlife biologist who studies the effects of prescribed burning on bison and black-tailed prairie dogs in Wind Cave National Park, South Dakota. They are interested in the interaction
  between these two species and the potential for prescribed burning to mitigate their impacts on each other. They are likely to have a background in ecology, wildlife management, and environmental science.
  They are curious about the specific details of the study, such as the impact of the burn on bison and prairie dog use of the grassland, and the potential for prescribed burning to be effective in mitigating
  bison impacts on prairie dog colonies.
