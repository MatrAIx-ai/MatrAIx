  career_goals: William imagines a future where he can help others directly, aspiring to become a firefighter or a pediatric nurse because he loves protecting and caring for people. He also enjoys the idea
    of teaching younger kids how to play games and solve puzzles, so becoming a classroom aide or youth sports coach appeals to him. In the short term, he aims to join his school's buddy program to assist
    new classmates and to earn a badge in his community service club.
