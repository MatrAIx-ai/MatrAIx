personas:
  professional: Michael Harrell blends hands‑on millwright expertise with a data‑driven curiosity, leading small crews on complex hydraulic and CNC projects while they rigorously apply OSHA standards and
    push for IoT‑enabled predictive maintenance, all driven by a competitive desire to outpace peers and a skeptical eye on unproven tech.
  sports: Michael Harrell spends winter snowmobiling on the Kettle Moraine trails, hunts deer in the forests of Dane County, casts flies for trout on Lake Mendota, and roots for the Milwaukee Bucks and
    Wisconsin Badgers football while they coach a local youth 4‑H hunting club.
  arts: Michael Harrell unwinds after a day in the shop by listening to Bon Iver and John Prine on his vintage turntable, curating a modest collection of folk‑rock vinyl, and contributes handmade wooden
    furniture to the Madison Artisans' Fair, where they also admire the works of local sculptor Bethany Thomas.
  travel: Michael Harrell favors practical two‑day road trips that combine outdoor adventure and craft‑beer tasting, having explored Door County's lighthouses, fished in Montana’s Madison River, and planned
    a future pilgrimage to Bavaria’s beer halls after years of saving, while they balance these getaways with work responsibilities.
  culinary: Michael Harrell is a competent home‑brewer who favors copper‑pot kettle ales infused with Cascade hops, enjoys grilling venison with a rosemary‑garlic rub, and frequently cooks classic Midwestern
    fish fry featuring perch fillets and cornmeal batter, and they experiment with seasonal ingredients to keep the palate interested.
  core: Michael Harrell is a competitively spirited millwright whose love for precision welding, craft beer, and midnight fly‑fishing reveals a blend of methodical practicality and restless curiosity, tempered
    by a skeptical view of shortcuts that they apply to every project.
background:
  cultural: Michael was raised in a small town in Dane County, Wisconsin, in a family with German‑Scandinavian roots common to the region. The Midwestern values of hard work, self‑reliance, modesty, and
    community involvement have shaped his outlook. He grew up attending a local Lutheran church, celebrating county fairs and cheese festivals, and developing a practical, no‑nonsense attitude. While he
    respects traditional customs, his curiosity drives him to explore new technologies and ideas, reflecting the blend of heritage and forward‑thinking that characterizes many Wisconsinites.
attributes:
  skills: '[''Blueprint reading'', ''Hydraulic system maintenance'', ''Pneumatic troubleshooting'', ''CNC machine installation and calibration'', ''Welding (MIG/TIG)'', ''Rigging and hoisting'', ''Preventive
    maintenance scheduling'', ''Root cause analysis'', ''Industrial safety compliance (OSHA)'', ''Team training and mentorship'', ''Process optimization (Kaizen)'', ''IoT-based predictive maintenance implementation'']'
  hobbies: '[''Fly fishing'', ''Deer hunting'', ''Snowmobiling'', ''Hiking'', ''Woodworking'', ''Classic car restoration'', ''Home brewing'', ''Reading technical journals'', ''Strategy video games (Factorio,
    Kerbal Space Program)'', ''Maker club participation'']'
  career_goals: Michael aims to become a lead millwright or maintenance supervisor at a larger manufacturing facility in the Madison area within the next five years. He plans to earn certifications such
    as Certified Maintenance & Reliability Technician (CMRT), advanced welding credentials, and an OSHA Trainer designation. Parallel to his competitive drive, he intends to pursue a bachelor’s degree in
    mechanical engineering to broaden his managerial prospects and to champion the adoption of digital maintenance technologies like sensor‑based condition monitoring. Ultimately, he envisions either advancing
    to a plant maintenance manager role or launching his own specialized maintenance contracting business that blends hands‑on expertise with innovative solutions.
