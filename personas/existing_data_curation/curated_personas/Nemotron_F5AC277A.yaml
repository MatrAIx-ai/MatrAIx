personas:
  professional: Hannah Garcia is a budding game coder who crafts simple Scratch projects with organized, methodical steps, channeling their sociable energy by sharing creations with classmates and the Girl
    Scouts, and they blend curiosity with practicality to debug and iterate efficiently.
  sports: Hannah Garcia guards the midfield for her middle school soccer team, idolizes the Sacramento Republic FC and follows their matches, while also joining a Saturday hiking club that explores the
    Sierra foothills, and they maintain a disciplined fitness regimen that mixes drills, trail runs, and weekend scrimmages.
  arts: Hannah Garcia shines on stage in her drama club, channeling the expressive flair of Lin‑Manuel Miranda and the emotional depth of Zendaya, and they often incorporate storytelling techniques from
    their favorite sci‑fi novels into improvisations, while also curating a personal playlist of Billie Eilish and JoJo Siwa for inspiration.
  travel: Hannah Garcia loves weekend hikes in the Sierra foothills and dreams of camping in Yosemite National Park, while also planning a family road trip to the historic Gold Rush towns of California
    and a future exchange program in Japan to explore anime culture, balancing adventure with the budgeting constraints of a teen allowance.
  culinary: Hannah Garcia enjoys cooking simple comfort foods like homemade mac and cheese and grilled cheese sandwiches, experimenting with fresh herbs such as basil and cilantro, and they relish sharing
    taco nights with Girl Scouts after volunteer shifts, though they occasionally over‑season their sauces.
  core: Hannah Garcia blends organized curiosity with compassionate teamwork, turning every soccer drill, drama rehearsal, and coding session into a collaborative adventure while juggling teen responsibilities.
background:
