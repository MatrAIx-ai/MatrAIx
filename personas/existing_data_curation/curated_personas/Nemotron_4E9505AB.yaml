  career_goals: Courtney envisions a future in broadcast media, aiming to become a local television or radio host who delivers community news and lifestyle segments on a reliable daily schedule. She is
    drawn to the routine of a morning show while still enjoying the spotlight and interaction with a live audience. Long‑term, she hopes to study communications or journalism in college, pursue a role as
    a news anchor or podcast producer, and perhaps launch her own youth‑focused media brand that blends practical advice with entertaining content. Her competitive streak also fuels an ambition to explore
    professional content creation or esports commentary as a secondary path.
