personas:
  professional: Courtney Mclellan is a 14‑year‑old high‑school sophomore who blends their sociable, talkative nature with a practical mindset by producing and editing short TikTok videos and leading improv
    sketches in the school drama club, treating each routine rehearsal as a rehearsal for a future career in digital entertainment.
  sports: Courtney Mclellan is a devoted fan of the Cincinnati Bengals, attending home games at Paycor Stadium whenever possible, joining local watch parties at the mall food court, and casually playing
    in the school’s recreational soccer league on weekends.
  arts: Courtney Mclellan channels their talkative charisma into improv performances with the school drama club and crafts snappy TikTok edits set to the latest hits from Ariana Grande, Billie Eilish, and
    Doja Cat, while also binge‑watching sitcoms like Brooklyn Nine‑Nine for comedic inspiration.
  travel: Courtney Mclellan prefers spontaneous weekend trips within a few hours’ drive, such as a family outing to the Cincinnati Zoo, a day‑long adventure in Amish Country farms, or a quick visit to Indianapolis
    for a concert, balancing low‑budget constraints with a craving for fresh TikTok backdrops.
  culinary: Courtney Mclellan enjoys whipping up quick family favorites like cheesy pepperoni pizza, creamy mac and cheese, and fluffy banana pancakes, relying on staple ingredients such as cheddar cheese,
    pepperoni, and avocado to add a trendy twist to classic comfort dishes.
  core: Courtney Mclellan is a sociable, routine‑loving teen who blends competitive gaming and pop culture with a practical yet relaxed approach to life, thriving on the buzz of social interaction and creative
    expression.
background:
  cultural: Courtney was raised in a middle‑class, predominantly white neighborhood of Cincinnati, Ohio, where Midwestern values of hard work, community involvement, and modesty are emphasized. Family traditions
    include regular weekend barbecues, holiday gatherings, and attendance at local events such as the Cincinnati Zoo’s summer concerts. The city’s blend of urban and suburban culture exposes her to both
    mainstream American media and regional customs like the famous Cincinnati chili and the annual Oktoberfest celebration. These influences shape her practical outlook, love of routine, and appreciation
    for community‑centered activities.
