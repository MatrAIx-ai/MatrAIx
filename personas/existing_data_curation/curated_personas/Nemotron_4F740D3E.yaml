personas:
  professional: Carmen Perez, a 36‑year‑old industrial fabricator and aspiring custom metal‑art designer, leverages MIG/TIG welding, CNC operation, and CAD drafting to solve workshop challenges with creative
    problem‑solving, while fostering a collaborative, low‑hierarchy environment that mirrors their preference for flexibility over rigid structures.
  sports: Carmen Perez enjoys kayaking the winding Buffalo Bayou, hikes the pine‑grove trails of Brazos Bend State Park, and roots for the Houston Astros and Houston Rockets, while participating in a casual
    weekend hiking club that meets at the Memorial Park trailhead.
  arts: Carmen Perez fills free evenings sketching Houston’s skyline in watercolor, studies the bold, industrial aesthetics of Anish Kapoor, and curates a modest collection of metal‑sculpted furniture inspired
    by local indie exhibitions at the Contemporary Arts Museum Houston.
  travel: Carmen Perez favors spontaneous road trips across Texas—like the hill country road to Austin’s live‑music scene and the culinary delights of San Antonio’s River Walk—while dreaming of a future
    craft‑focused pilgrimage to Japan’s Hida region to learn centuries‑old metal‑working techniques.
  culinary: Carmen Perez delights in melding Southern barbecue traditions with multicultural flavors, often grilling brisket seasoned with smoked paprika and mesquite wood while pairing it with cilantro‑lime
    salsa and homemade collard greens, and they occasionally experiment with crafting sourdough starters and mastering shrimp étouffée.
  core: Carmen Perez weaves industrial precision into artistic metal creations, embraces community harmony and calm spontaneity, but wrestles with a habit of disorganized scheduling and impulsive tool purchases.
background:
  cultural: Carmen grew up in a middle‑class, Anglo‑American family in the Houston suburbs during the late 1980s and 1990s. Her upbringing combined traditional Southern hospitality—family barbecues, country
    music, and a strong work ethic—with the multicultural vibrancy of Houston’s diverse neighborhoods. Exposure to Mexican, African‑American, and Asian cultural festivals in the city nurtured her openness
    to varied experiences and artistic expressions. Although she identifies as white, she embraces the city’s melting‑pot culture, often borrowing motifs from different traditions in her personal projects.
    This blend of Southern values and urban multiculturalism reinforces her kindness, cooperative nature, and appreciation for harmony within her community.
attributes:
  skills: '[''Welding'', ''CNC machine operation'', ''Blueprint reading'', ''Metal fabrication'', ''Quality inspection'', ''Troubleshooting'', ''Hand tool proficiency'', ''Basic CAD'', ''Creative problem
