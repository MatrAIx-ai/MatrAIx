  hobbies: '[''Sketching'', ''Watercolor painting'', ''Metal sculpting'', ''DIY woodworking'', ''Electronics tinkering'', ''Photography'', ''Visiting art galleries'', ''Reading science-fiction'', ''Hiking'',
    ''Kayaking'', ''Board game nights'']'
  career_goals: Carmen aims to move beyond line assembly toward a lead fabricator or custom metal‑art designer role that blends her technical expertise with her love of art. Over the next few years she
    plans to earn CNC programming and advanced welding certifications, deepen her CAD skills, and begin creating functional art pieces such as sculptural furniture and decorative metalwork. She seeks a
    position with flexible scheduling that values collaboration and mentorship, allowing her to guide newer teammates and foster a harmonious workshop environment. Ultimately, she dreams of opening a small
    maker studio in Houston where she can run workshops in welding, 3D printing, and DIY crafts, connecting the industrial and creative communities while maintaining a manageable work‑life balance.
