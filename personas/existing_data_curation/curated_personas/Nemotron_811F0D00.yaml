  hobbies: '["Hiking", "Fishing", "Seasonal hunting", "Woodworking", "Tool restoration", "Reading construction trade publications", "Home‑brewing craft beer", "BIM software exploration (as a hobby)"]'
  career_goals: He aims to transition from first‑line supervisor to senior superintendent overseeing multi‑million‑dollar infrastructure projects, eventually earning Certified Construction Manager (CCM)
    credentials. He is also interested in launching a small consulting firm that advises regional contractors on safety optimization and sustainable building practices. Financially, he plans to secure a
    comfortable retirement by investing in a property he can convert into a vacation cabin he designs himself.
