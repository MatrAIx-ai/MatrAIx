personas:
  professional: Hung Bjornstad, a seasoned construction supervisor with OSHA‑30 certification, blends hands‑on blueprint reading and heavy‑equipment operation with a curiosity for modular building and BIM,
    while maintaining a competitive edge that drives crews to meet multi‑million‑dollar project deadlines.
  sports: Hung Bjornstad stays fit by hiking the Catskills’ Devil’s Path, fishing the Neversink River, participating in seasonal deer hunting through the Ridgefield Hunting Club, and rooting for the New
    York Mets while occasionally joining local pickup basketball games.
  arts: Hung Bjornstad expresses creativity through woodworking fine‑grain furniture, home‑brews craft IPAs inspired by The Avett Brothers’ folk rhythms, and finds relaxation listening to Bob Dylan and
    John Denver while browsing the Hudson Valley folk arts market.
  travel: Hung Bjornstad prefers low‑key, nature‑focused trips, spending weekends camping in the Adirondacks, planning a future spring visit to Iceland’s volcanic terrain for inspiration, and dreaming of
    a weekend getaway to the historic fishing villages of Nova Scotia.
  culinary: Hung Bjornstad enjoys hearty meals like pan‑seared trout with almond‑herb crust, slow‑cooked lamb stew flavored with rosemary, and often experiments with homemade stout‑based barbecue sauce
    while brewing a seasonal Belgian‑style ale.
  core: Hung Bjornstad is a solitary, detail‑driven construction boss who balances vintage‑engine tinkering and craft brewing with a competitive drive, steady health discipline, and a methodical plan for
    a self‑designed cabin retirement.
background:
  cultural: Hung’s cultural background is rooted in a white, working‑class American upbringing in rural upstate New York, with familial ties to Norwegian heritage suggested by his surname. He was raised
    in a close‑knit community that values self‑reliance, modesty, and hands‑on craftsmanship. The region’s seasonal outdoor culture and the legacy of post‑industrial towns shape his appreciation for practical
    skills, a strong work ethic, and a respect for nature.
attributes:
  skills: '["Construction site supervision", "Blueprint reading", "Heavy equipment operation", "Safety compliance and training", "Project scheduling", "Cost estimation", "Crew leadership and conflict resolution",
