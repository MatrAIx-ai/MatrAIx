persona_description: A highly skilled and experienced automation engineer with expertise in 3D machine vision, specifically in the measurement of cell stacking height. This individual has a deep understanding
  of the importance of accurate gauging of critical dimensions for ensuring the proper functioning of EV battery cells. They are skilled in using Cognex DS1000 3D sensors to measure height differences between
  aluminum pouches and compute the gap width between the two vertical edges, ensuring that the cells are stacked evenly and in perfect alignment. This expertise is valuable for automating the packaging
  process and ensuring quality control.
