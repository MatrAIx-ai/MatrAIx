  career_goals: Although currently not in the workforce, Bradley aims to turn his expertise into a small, independent consultancy that advises homeowners on historic preservation and custom woodworking
    projects. He aspires to publish a locally‑focused historical monograph that blends his research with visual documentation, positioning himself as a recognized authority on Pender County heritage. He
    also hopes to establish a modest boutique where he sells restored furniture and limited‑edition photographic prints, allowing him to generate supplemental income while maintaining his solitary, method‑driven
    work style. Long‑term, he envisions mentoring a select few apprentices, passing on his meticulous techniques without compromising his preference for quiet, controlled environments.
