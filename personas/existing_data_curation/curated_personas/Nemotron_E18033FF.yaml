  hobbies: '["Visiting art galleries and studios", "Sketching landscapes", "Reading historical biographies", "Listening to jazz and classical music", "Gardening", "Writing memoirs", "Hiking in the Columbia
    River Gorge", "Volunteering as a museum docent", "Attending small book club meetings", "Participating in community storytelling events"]'
  career_goals: Even in retirement, Brent aims to nurture lifelong learning and artistic curiosity in his community. He plans to mentor emerging teachers through a local apprenticeship program, develop
    a small oral‑history podcast that highlights unconventional educational ideas, and volunteer as a docent at the Portland Art Museum to share his passion for art. He also hopes to complete a personal
    memoir that intertwines his teaching career with his love of art and travel, and to visit at least three major art museums abroad in the coming years.
