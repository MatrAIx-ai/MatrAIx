personas:
  professional: Brent Weis, a retired graduate teacher turned community education facilitator, applies his curriculum design mastery and art‑critique acumen to craft interdisciplinary museum workshops and
    mentor novice teachers, while his curiosity and easygoing, flexible nature let him improvise lessons on the fly and keep the sessions lively.
  sports: Brent Weis, a member of the Columbia River Hiking Club, enjoys weekly morning walks along the Gorge in spring and autumn, follows the Portland Timbers soccer team and the Portland Trail Blazers
    basketball team, and participates in low‑impact yoga classes at the local senior center to stay flexible.
  arts: Brent Weis, a devoted sketcher of Columbia River scenery, frequents modest galleries showcasing works by Emily Carr and Ansel Adams, regularly listens to Miles Davis and Beethoven while critiquing
    exhibits at the Portland Art Museum, and volunteers as a docent sharing stories about local artist Katherine Spline.
  travel: Brent Weis prefers leisurely, small‑group art‑focused trips, has already visited the Louvre in Paris and the Uffizi in Florence, and dreams of exploring the Rijksmuseum in Amsterdam next year,
    planning each outing loosely around garden schedules and occasional train deals.
  culinary: Brent Weis, an enthusiastic heirloom vegetable gardener, cooks moderately well, often preparing roasted heirloom tomatoes with basil, grilled salmon with dill, and a hearty lentil‑kale stew,
    and delights in the earthy flavor of locally sourced mushrooms and fresh sourdough bread.
  core: Brent Weis, the 74‑year‑old garden‑toting museum docent, blends lifelong curiosity for art with a laid‑back, slightly chaotic planning style, preferring quiet sketching sessions and small book clubs
    over large gatherings, and habitually forgets appointments while never missing his garden watering routine.
background:
  cultural: Brent is a white American who grew up in the Midwest before relocating to the Pacific Northwest in his early adulthood. His upbringing emphasized self‑reliance, community service, and an appreciation
    for nature. Living in Portland, Clackamas County, has deepened his connection to progressive, environmentally conscious values while retaining a respect for traditional family bonds. His marriage and
    long‑standing involvement in local cultural institutions reflect a blend of classic American values and the eclectic, art‑focused spirit of the region.
attributes:
  skills: '["Curriculum development", "Classroom instruction", "Adult education facilitation", "Mentoring and tutoring", "Public speaking", "Art critique and appreciation", "Workshop facilitation", "Community
