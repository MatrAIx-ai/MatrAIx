persona_description: A school administrator who advocates for the implementation of restorative justice practices and positive school culture in DC schools. They support legislation that limits suspensions
  and ensures that students with special needs, low-income students, and students of color are not disproportionately affected by punitive discipline. They believe in the importance of prevention over punishment
  and have a strong understanding of the costs and benefits of different disciplinary approaches. They are committed to supporting schools in implementing Restorative Justice Models and Positive School
  Culture Fund initiatives to improve student outcomes and school climate.
