personas:
  professional: Luisa Rodriguezmartinez, a 19‑year‑old occupational therapy student, blends meticulous assessment skills and bilingual communication with a vivid imagination to design art‑infused sensory
    interventions, and their empathetic, cooperative nature fosters strong therapeutic rapport with pediatric clients.
  sports: Luisa Rodriguezmartinez enjoys hiking the trails of Hillsborough County with the local Hillsborough Hiking Collective, follows the Tampa Bay Buccaneers, Lightning, and Rays avidly, and they fit
    in occasional beach volleyball games with friends to balance cardio and social interaction.
  arts: Luisa Rodriguezmartinez immerses herself in acrylic painting and mixed‑media collage inspired by the bold colors of Frida Kahlo and the playful patterns of Yayoi Kusama, plays ukulele during family
    gatherings where bomba and plena rhythms echo, and they regularly attend the Gasparilla Arts Festival to support emerging artists.
  travel: Luisa Rodriguezmartinez plans weekend getaways to the Everglades and occasional trips to the Caribbean islands, using a handwritten travel journal to map itineraries that blend adventure hiking
    with cultural immersion, yet they balance these dreams with a tight student budget and family commitments.
  culinary: Luisa Rodriguezmartinez cooks island‑inspired dishes such as arroz con pollo, plantain mofongo, and sofrito‑spiced beans, enjoys experimenting with fresh cilantro and lime, and they often host
    potluck evenings where friends sample these flavors while sharing stories of their own culinary roots.
  core: Luisa Rodriguezmartinez, a 19‑year‑old OT student, channels a vivid imagination into art‑based healing, battles persistent anxiety, and never misses a chance for late‑night sketching sessions fueled
    by caffeine.
background:
  cultural: Luisa grew up in a bilingual household where Puerto Rican heritage was celebrated through music, storytelling, and cuisine. Family gatherings often featured bomba drums, plena rhythms, and dishes
    like arroz con gandules and pasteles, reinforcing a strong sense of cultural identity. She participates in local Puerto Rican festivals in Tampa, such as the annual Three Kings Day parade and the San
    José Festival, where she volunteers to teach children traditional crafts. Her connection to the island's vibrant artistic scene informs her therapeutic perspective, inspiring her to blend cultural art
    forms with occupational therapy techniques. Luisa also values the close-knit community values of respect, shared responsibility, and mutual support that are central to many Puerto Rican families, and
    she strives to reflect these values in her professional practice.
attributes:
  skills: '[''Occupational therapy fundamentals'', ''Patient assessment and outcome measurement'', ''Creative therapeutic activity design'', ''Bilingual communication (Spanish/English)'', ''Documentation
    and treatment planning'', ''Time management and scheduling'', ''Team collaboration and interdisciplinary coordination'', ''Basic mental‑health coping techniques'']'
  hobbies: '[''Painting and mixed‑media collage'', ''Journaling and poetry'', ''Yoga and mindfulness meditation'', ''Reading speculative fiction'', ''Book club participation'', ''Hiking and nature sketching'',
    ''Ukulele playing'', ''Bomba and plena dancing'', ''Cooking traditional Puerto Rican cuisine'']'
  career_goals: Luisa aims to complete her Bachelor's degree in Occupational Therapy within the next year and secure a competitive internship in a pediatric clinic that emphasizes sensory integration and
    art‑based therapy. Her short‑term goal is to obtain licensure as an OT and develop a specialty in using creative arts to support children with developmental delays and anxiety disorders. Long‑term,
    she envisions establishing a community‑based wellness center in Tampa that offers culturally responsive OT services, integrates Puerto Rican artistic traditions, and provides mentorship programs for
    aspiring therapists from underrepresented backgrounds. She also wishes to contribute to research on the effectiveness of art‑infused occupational interventions for emotional regulation.
