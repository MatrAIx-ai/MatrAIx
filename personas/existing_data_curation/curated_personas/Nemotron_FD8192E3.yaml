  hobbies: '["Model kit building", "Erhu practice", "Coding simple games (Scratch, Python)", "Study journaling", "Reading graphic novels", "Hiking", "Robotics club", "Manga illustration", "Library volunteer"]'
  career_goals: She aspires to a career that blends her love for structure, helping others, and scientific curiosity. Xiaoying hopes to pursue a degree in biomedical engineering or medicine, aiming to become
    a pediatric researcher who designs child‑friendly medical devices. As a secondary path, she considers becoming an educational technologist or school counselor, using her organizational strengths to
    support students and improve learning environments.
