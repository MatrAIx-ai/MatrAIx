personas:
  professional: Xiaoying Bau, a diligent middle‑school robotics enthusiast, blends their love for structured model building and simple game coding to contribute methodical solutions to the school's robotics
    club, often leading project documentation and timeline management.
  sports: Xiaoying Bau enjoys hiking the coastal trails of the Bay Area with a family‑run outdoor club, follows the San Francisco Giants and Golden State Warriors closely, and participates in the middle
    school track team’s cross‑country season, keeping a meticulous training log and setting structured performance goals.
  arts: Xiaoying Bau expresses creativity through erhu practice, drawing manga‑style illustrations inspired by artists like Akira Toriyama and Studio Ghibli’s Hayao Miyazaki, regularly reads graphic novels
    such as 'Watchmen' and 'Saga', and volunteers at the local library’s story‑time program where they share favorite picture books.
  travel: Xiaoying Bau prefers well‑planned family trips, having hiked Yosemite’s Mist Trail and visited the Exploratorium in San Francisco, and dreams of attending the Tokyo International Comic‑Con, balancing
    school commitments with a modest travel budget that emphasizes educational experiences.
  culinary: Xiaoying Bau enjoys cooking simple dishes like chicken teriyaki, veggie sushi rolls, and chocolate chip pancakes, experimenting with fresh ingredients such as bell peppers, soy sauce, and cocoa
    powder, while also savoring take‑out pizza and ramen during study breaks.
  core: Xiaoying Bau is a methodical teen who balances a love for robotics, erhu, and manga illustration with a tendency toward worry, meticulously planning hobbies, finances, and fitness while occasionally
    indulging in spontaneous snack runs.
background:
  cultural: Xiaoying comes from an East Asian family with Chinese heritage; her parents are immigrants who preserve traditions such as celebrating Lunar New Year, cooking dim sum, and emphasizing academic
    achievement. Growing up in San Francisco's multicultural neighborhoods, she balances these cultural values with American school life, attends weekend Chinese language school, participates in community
    cultural festivals, and navigates the expectations of both her heritage and her peers.
attributes:
