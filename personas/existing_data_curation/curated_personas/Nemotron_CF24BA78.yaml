  hobbies: '[''Community Book Club'', ''Gardening'', ''Cooking/Baking for Family Gatherings'', ''Bridge (Card Game)'', ''Walking/Hiking in Albany Parks'', ''Volunteering at Local Senior Center'', ''Yoga
    for Stress Management'', ''Participating in Seasonal Town Festivals'']'
  career_goals: Amberly aspires to transition into a senior executive role—such as Chief Financial Officer—for a mid‑size nonprofit organization or a municipal agency in the Capital Region, where she can
    leverage her routine‑focused discipline to build resilient, transparent financial systems. She is motivated to champion digital transformation of financial reporting to reduce manual workload and associated
    stress, while also establishing a mentorship program to guide emerging finance professionals. Ultimately, she seeks to leave a legacy of fiscal stability and ethical stewardship that supports community
    well‑being and aligns with her collaborative, harmony‑driven outlook.
