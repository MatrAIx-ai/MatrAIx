  career_goals: Ronda aims to advance into senior management within the next five years, targeting a regional operations director role. She plans to complete her bachelor's degree in business administration,
    obtain a Project Management Professional (PMP) certification, and lead a major process‑improvement initiative that reduces costs while boosting employee engagement. Long‑term, she envisions launching
    a consulting boutique that helps small New England businesses streamline operations while preserving their community values.
