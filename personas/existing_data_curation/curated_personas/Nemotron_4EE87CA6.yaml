  hobbies: '[''Hiking'', ''Cross‑Country Skiing'', ''Apple‑Picking'', ''Book Club'', ''Volunteer Work at Farmer’s Market'', ''Gardening'', ''Photography'', ''Knitting'', ''Cooking New England Cuisine'',
