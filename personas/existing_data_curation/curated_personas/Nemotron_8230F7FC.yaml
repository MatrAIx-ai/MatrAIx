personas:
  professional: Eric Gooden, a veteran personal care aide with three decades of hands‑on experience, channels their obsessive organization into meticulous documentation and rigorous infection‑control protocols,
    and they mentor future aides with a coaching style that demands flawless safety standards.
  sports: Eric Gooden, a devoted fan of the Philadelphia Eagles and the York Revolution minor‑league baseball club, spends Saturday mornings strolling around the lake after sunrise fishing and they join
    a low‑impact senior yoga class each winter to keep joints limber while maintaining a competitive tally of personal bests on their home‑made step‑counter.
  arts: Eric Gooden, who spends evenings fine‑tuning handcrafted shelves while listening to Bob Dylan’s folk ballads and attending his Lutheran church’s choir performances of Handel’s Messiah, also immerses
    themselves in American Civil War documentaries narrated by Ken Burns, and they let the historical narratives shape a personal aesthetic rooted in tradition and meticulous detail.
  travel: Eric Gooden, who prefers structured road trips to historic sites, has driven to Gettysburg and Antietam to walk battlefield trails and they dream of sailing the French Normandy coast to explore
    D‑Day landing museums, yet their travel plans are tempered by saving for a future home‑care business and family obligations.
  culinary: Eric Gooden, a garden‑to‑table enthusiast, harvests zucchini, heirloom tomatoes, and rosemary to craft roasted vegetable medleys, grills freshly caught trout with lemon and dill, and they occasionally
    bake a crusty sourdough loaf, all while measuring ingredients with the same precision they apply to woodworking projects.
  core: Eric Gooden, a meticulous 58‑year‑old caregiver, blends routine‑driven caregiving, disciplined gardening, and exacting woodworking into a life where precision meets a quietly competitive streak,
    and they never miss a chance to perfect a crossword puzzle before bed.
background:
  cultural: Born and raised in the rural outskirts of York County, Pennsylvania, Eric grew up in a white, working‑class family with German‑Irish roots. The community emphasized self‑reliance, modesty, and
    a strong work ethic, reinforced by a Lutheran faith that values consistency and service to others. Local traditions—county fairs, church potlucks, and a respect for practical, hands‑on skills—have shaped
    his pragmatic worldview and his dedication to reliable, routine‑driven caregiving.
attributes:
  skills: '[''personal hygiene assistance'', ''mobility support'', ''medication reminders'', ''vital signs monitoring'', ''infection control'', ''care documentation'', ''schedule coordination'', ''time
