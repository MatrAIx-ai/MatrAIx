  hobbies: '[''vegetable gardening'', ''woodworking'', ''fishing'', ''crossword puzzles'', ''Sudoku'', ''church community events'', ''American Civil War documentaries'']'
  career_goals: He aims to formalize his expertise by earning a Certified Nursing Assistant (CNA) credential and, within the next five years, move into a supervisory role overseeing a team of home‑care
    aides in York County. Eric also aspires to develop a training program that emphasizes rigorous documentation and safety standards, positioning himself as a benchmark for high‑quality personal care in
    the region. Ultimately, he hopes to launch a small, family‑run home‑care business that reflects his commitment to reliability and professionalism.
