  career_goals: Antonio frequently talks about becoming a firefighter because he wants to help people, and he also imagines being a teacher who can share stories and teach his friends. He dreams of playing
    soccer on a team, reflecting his love for teamwork and physical activity. His short‑term ambition is to learn to read more picture books, count higher, and be a kind friend who can solve little problems
    for his classmates.
