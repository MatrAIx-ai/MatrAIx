  career_goals: Alyssa aims to earn an Office Manager certification within the next two years and transition into an office manager role at a cultural institution such as a local museum or community arts
    center. She plans to develop event‑coordination expertise to lead community art events and workshops. Continuing her education, she intends to complete an associate's degree in business administration
    or arts management while taking part‑time courses in project coordination. Ultimately, she aspires to become a program coordinator or cultural liaison, blending her administrative strengths with her
    passion for the arts and new ideas.
