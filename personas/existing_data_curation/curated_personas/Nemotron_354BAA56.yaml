  hobbies: '[''Visiting art galleries and murals'', ''Playing acoustic guitar'', ''Outdoor photography'', ''Intramural softball'', ''Gulf Coast fishing'', ''Barbecue cooking'', ''DIY home improvement'',
    ''Reading about modern art and sustainable gardening'', ''Volunteering for community clean-ups and gardens'']'
  career_goals: He aims to turn his passion for artistic landscaping into a boutique business that offers custom, eco-friendly designs for residential and small-commercial clients in the Gulf Coast area.
    Over the next three to five years he plans to obtain a certified horticulturist credential, expand his service portfolio to include sustainable rain-garden installations and event-site styling, and
    build a small crew he can mentor. He hopes to be recognized locally for integrating contemporary art concepts into outdoor spaces and eventually to open a community workshop where he can teach DIY landscaping
    and gardening.
