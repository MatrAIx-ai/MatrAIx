  career_goals: Mary Kay aims to transition from a frontline receptionist role to a supervisory position, such as Office Manager or Senior Administrative Coordinator, within the next three to five years.
    She plans to obtain a Certified Administrative Professional (CAP) credential and to develop modest leadership responsibilities, mentoring newer staff while maintaining the orderly, low‑stress environment
    she values. Her ambition balances a desire for career advancement with a need for stability and manageable stress levels, allowing her to apply her systematic approach to broader office operations.
