  hobbies: '[''Cooking Mexican cuisine'', ''Salsa and folkloric dancing'', ''Community volunteering'', ''Gardening'', ''Hiking local trails'', ''Attending cultural festivals'', ''Reading self-development
    books'', ''Listening to regional music'', ''Playing card games'']'
  career_goals: Oriana aims to translate her practical expertise into a supervisory role within her current store, seeking a shift-lead or assistant manager position within the next two years. She plans
    to enroll in a part-time management certification program at a local community college to complement her associate's degree. Long-term, she dreams of opening a small family-run market that highlights
    Mexican specialty foods and locally sourced produce, combining her love for her cultural cuisine with entrepreneurial ambition. Her competitive drive pushes her to exceed sales targets and become a
    top performer, positioning her for future leadership opportunities.
