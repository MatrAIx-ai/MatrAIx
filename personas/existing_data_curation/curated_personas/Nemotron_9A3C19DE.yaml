personas:
  professional: Shana Edge, a retired community organizer in Fort Fairfield, leverages her budgeting expertise, conflict‑resolution skill, and love of intergenerational storytelling to lead senior‑center
    initiatives while balancing meticulous planning with spontaneous community input, reflecting her curious yet practical mindset and her assertive, reliable nature.
  sports: Shana Edge enjoys low‑impact morning birdwatching walks at Aroostook State Park, spirited bridge games at the senior center, and avidly follows the Portland Sea Dogs baseball team and the Maine
    Celtics basketball squad, while avoiding high‑intensity workouts due to joint discomfort.
  arts: Shana Edge channels creative energy into quilting, crocheting, singing in the church choir, and performing in local theater productions such as “A Raisin in the Sun,” while drawing inspiration from
    folk painter Grandma Moses and singer‑songwriter Joni Mitchell, balancing cooperative collaboration with assertive artistic vision.
  travel: Shana Edge prefers short road trips to nearby coastal towns like Bar Harbor for lobster‑laden stews and historic lighthouses, occasionally plans longer pilgrimages to New Orleans to explore Southern
    culinary roots, but her travel budget and caregiving duties keep most vacations within a day’s drive, reflecting her blend of careful planning and spontaneous curiosity.
  culinary: Shana Edge fuses Southern soul food with Maine seafood, regularly preparing dishes like shrimp‑and‑grits with fresh scallops, maple‑glazed sweet potatoes, collard greens sautéed with bacon,
    and lobster‑rich chowders, while drawing garden‑to‑table flavors from kale, carrots, potatoes, rosemary, and maple syrup harvested from her own plot.
  core: Shana Edge is a socially vibrant, worry‑prone retiree who blends community leadership, quilting, gardening, and culinary experimentation, balancing meticulous planning with spontaneous kindness
    and occasional self‑neglect.
background:
  cultural: Shana was raised in the South, where family gatherings, church participation, and soulful cooking shaped her early identity. In her early thirties she relocated to Fort Fairfield, Maine, bringing
    with her a rich African‑American cultural heritage that she has woven into the fabric of this predominantly white, rural community. She celebrates Juneteenth and Black History Month with potlucks and
    storytelling sessions, fostering awareness and solidarity. Her involvement in the local NAACP chapter and church outreach programs reflects a commitment to advocacy and community building. Shana’s cultural
    perspective blends Southern traditions—such as oral histories, gospel music, and comfort food—with the rhythms of New England life, creating a unique, resilient outlook that informs her community work
    and personal passions.
