  career_goals: Although retired from formal employment, Shana aims to deepen her impact as a volunteer leader in Fort Fairfield. She aspires to chair the senior center’s advisory board, launch an intergenerational
    storytelling program that records the histories of local African‑American families, and mentor young women interested in community service. Shana also hopes to refine her digital photography skills
    to document neighborhood events and cultural traditions, and she plans to curate a small cookbook that melds Southern soul food with New England seafood, preserving her family’s culinary heritage for
    future generations.
