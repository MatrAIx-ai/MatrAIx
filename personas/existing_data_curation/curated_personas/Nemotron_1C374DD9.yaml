  career_goals: William aims to enroll in a high school with a robust STEM curriculum and later pursue a degree in civil engineering or computer science. He envisions a career designing sustainable infrastructure
    for mountain communities, where his attention to detail and desire for predictable outcomes can make tangible contributions. To support this path, he plans to earn certifications in project management
    and GIS mapping, seeking roles that offer clear responsibilities, structured processes, and a stable work environment to help manage his anxiety. Ultimately, he hopes to become a project lead who combines
    technical expertise with a disciplined, organized approach to problem‑solving.
