personas:
  professional: Sang Do, an aspiring marine biologist, merges a love for beach shell collection with precise sketching and intricate LEGO reef constructions, embodying a curious yet relaxed mindset that
    favors spontaneous exploration over strict scheduling.
  sports: Sang Do loves swimming at the local beach in summer, plays for a neighborhood soccer team that idolizes the LA Galaxy, and cheers on the Los Angeles Dodgers during baseball season, approaching
    fitness with a fun-first, unstructured mindset rather than regimented training.
  arts: Sang Do dives into the whimsical worlds of Studio Ghibli films, imitates Bob Ross’s color-mixing techniques in sketchbooks, and strums simple ukulele chords inspired by Jack Johnson, letting these
    creative influences color their imaginative play and shell-drawing sessions.
  travel: Sang Do prefers spontaneous beach getaways, dreaming of building sandcastle forts on Bali’s Kuta Beach and exploring the tide pools of Monterey Bay, yet family budget constraints often steer them
    toward weekend trips to nearby coastal towns.
  culinary: Sang Do delights in helping roll pork-and-vegetable dumplings for Lunar New Year, enjoys blending mango and kiwi into bright smoothies, and favors simple cheesy macaroni, showing a budding palate
    that loves hands-on cooking and vivid flavors.
  core: Sang Do is a curious beach-shell collector who sketches with a splash of color, builds sprawling LEGO kingdoms, and occasionally forgets to put money in their piggy bank, embodying a playful, slightly
    disorganized spirit that treasures spontaneous discovery.
background:
  cultural: 'Sang Hua is part of an East Asian (Chinese) family living in Paia, Hawai‘i. At home, Mandarin is spoken alongside English, and the family celebrates Chinese festivals such as Lunar New Year
    with customs like dumpling making and red envelope gifting. Living in Hawai‘i, he also embraces local traditions: he uses the word "aloha," participates in community hula and ukulele classes, learns
    about the Hawaiian respect for land and sea (kuleana), and enjoys island foods like mangoes and poi. This blend of Chinese family customs and Hawaiian community culture shapes his worldview, fostering
    respect for diversity, love of nature, and a strong sense of ohana (family).'
