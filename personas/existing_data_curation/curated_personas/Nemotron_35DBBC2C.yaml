  career_goals: Although currently not in the formal workforce, Jason aims to launch a small home‑based studio that produces custom furniture and limited‑edition photographic prints, targeting local boutiques
    and the regional arts market. He hopes to exhibit his photography in community galleries and to become a mentor for younger craft enthusiasts through workshops at the local community center. Long‑term,
    he envisions taking a leadership role in a township arts council, helping shape cultural programming while continuing to refine his own artistic practice.
