  career_goals: Victor aims to advance from his current role to a shift supervisor position within the next year, leveraging his strong organizational skills and track record of meeting performance goals.
    He plans to complete a Certified Food Protection Manager (CFPM) course and participate in the company's management development program to qualify for a store manager role. Long-term, Victor is ambitious
    about opening a small, community-focused eatery that blends soulful Southern flavors with contemporary presentation, reflecting his appreciation for art and unconventional ideas. He also hopes to mentor
    at-risk youth in York County through cooking workshops, providing both career pathways and positive role models.
