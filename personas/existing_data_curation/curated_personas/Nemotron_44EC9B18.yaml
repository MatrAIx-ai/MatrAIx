personas:
  professional: Victor Manora, a seasoned fast‑food operations specialist, leverages their meticulous, data‑driven mindset to streamline kitchen workflows, mentor new teammates, and consistently exceed
    sales targets, all while channeling a competitive drive toward a supervisory role.
  sports: Victor Manora, a regular participant in the York Community Center’s adult basketball league, maintains fitness through thrice‑weekly pick‑up games, follows the Philadelphia 76ers and Eagles for
    inspiration, and rounds out the routine with evening walks that double as solitary reflection.
  arts: Victor Manora, an avid explorer of urban street art, spends weekends sketching murals and drawing creative fuel from artists like Banksy, Kehinde Wiley, and photographer Vivian Maier, while also
    immersing in sci‑fi and mystery novels by N.K. Jemisin and Tana French.
  travel: Victor Manora, a meticulous planner, favors short road trips to historic towns such as Gettysburg and Asheville, yet dreams of a culinary pilgrimage to Oaxaca, Mexico, balancing a modest travel
    budget with a craving for immersive cultural experiences.
  culinary: Victor Manora, an enthusiastic home cook, experiments with fusion dishes like miso‑glazed shrimp and grits, loves incorporating smoked paprika, collard greens, and fresh thyme, but often over‑seasons
    and occasionally burns the edges of a roast while chasing bold flavors.
  core: Victor Manora is a methodical, art‑driven fast‑food professional whose competitive edge fuels night‑time sketching, basketball hustle, and a relentless quest to launch a community eatery, even if
    they occasionally binge‑watch sci‑fi marathons into the early hours.
background:
  cultural: Victor is an African-American who grew up in the close-knit black community of York, Pennsylvania. His family maintains Southern culinary traditions, church fellowship, and a deep appreciation
    for music ranging from gospel to jazz and hip-hop. He draws strength from the resilience and creativity of his ancestors, and his cultural identity informs his love for soulful food, rhythmic expression,
    and community activism. Victor regularly participates in local Juneteenth celebrations and community festivals, which reinforce his connection to African-American heritage and inspire his artistic and
    culinary pursuits.
