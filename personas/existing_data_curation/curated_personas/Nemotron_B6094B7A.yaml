  career_goals: Mayle aspires to turn her passion for art and community into a future career. In the short term, she plans to build a portfolio of digital and traditional artwork, attend summer art programs,
    and take advanced art classes in high school. Her long‑term ambition is to study visual communications and cultural studies in college, eventually working as a graphic designer or museum education coordinator
    who creates inclusive programs that celebrate Mexican heritage and empower youth. She also envisions using her organizational talents to lead community art projects and cultural events.
