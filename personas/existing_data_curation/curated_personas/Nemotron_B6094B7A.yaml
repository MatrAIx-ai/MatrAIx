personas:
  professional: Mayle Rodas, a budding visual artist and digital illustrator, blends curiosity with methodical planning to create layered watercolor scenes and iPad artwork, while their outgoing, cooperative
    nature drives collaborative projects in the school cultural club.
  sports: Mayle Rodas, a midfield enthusiast for the high school soccer squad, also trains with Riverside Youth Soccer club, tracks the national women's soccer league, and passionately supports the city’s
    professional team, the River City Rangers, balancing competitive matches with neighborhood pick‑up games.
  arts: Mayle Rodas fuels their creativity by sketching in cafés, drawing inspiration from Frida Kahlo’s vibrant self‑portraits, the street‑wise humor of Banksy, and the haunting melodies of Billie Eilish,
    while regularly attending contemporary art exhibitions at the local Modern Art Museum and participating in folk dance workshops.
  travel: Mayle Rodas eagerly plans weekend getaways to the historic downtown of their neighboring city, delights in imagined wanderings through Berlin’s vibrant street‑art scene and the ancient terraces
    of Machu Picchu, favors itineraries that include sketch‑stop spots, yet school budget constraints keep most adventures within day‑trip range.
  culinary: Mayle Rodas, an enthusiastic home‑cook with a medium skill level, loves preparing tamales using masa, pork shoulder, and ancho chilies, whipping up enchiladas drenched in rojo sauce, and experimenting
    with avocado toast drizzled with lime and chili flakes, all while documenting the process on a small vlog that mixes cooking tips with personal anecdotes.
  core: Mayle Rodas blends boundless artistic curiosity with a meticulous habit of mapping every project in color‑coded notebooks, yet occasionally forgets homework while staying up late perfecting digital
    brush strokes.
background:
  cultural: Mayle grows up in a bilingual Mexican‑American household in Grand Prairie, Texas. Her parents emigrated from Jalisco, and Spanish is spoken at home alongside English, fostering a strong sense
    of bicultural identity. Family gatherings are centered around traditional celebrations such as Día de los Muertos, Cinco de Mayo, and religious holidays, where she learns the values of respeto, familia,
    and comunidad. The vibrant Mexican community in Dallas County provides her with access to cultural festivals, Mexican cuisine, and a network of extended family. Her upbringing blends Mexican traditions
    with the broader Texan environment, influencing her artistic sensibilities, community‑oriented mindset, and appreciation for multicultural experiences.
