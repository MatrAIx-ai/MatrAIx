personas:
  professional: Aliya Profit, a 20‑year‑old school‑bus safety supervisor, harnesses a blend of curiosity and practicality to keep riders calm, de‑escalate conflicts with calm communication, perform routine
    vehicle checks, and nurture a supportive environment while aspiring to become an elementary counselor who brings trauma‑informed care into everyday school life.
  sports: Aliya Profit, an avid hiker of Hill Country trails, joins the Trail Runners SA club for weekend runs, supports the San Antonio Spurs in basketball, follows the San Antonio FC soccer team, and
    participates in casual pickup volleyball at community parks, favoring low‑intensity outdoor exercise over gym competition.
  arts: Aliya Profit spends afternoons sketching in the Pearl’s boutique cafés, drawing inspiration from jazz legends like Nina Simone and modern R&B artists such as H.E.R., often unwinds listening to gospel
    choirs, hip‑hop poet Mick Jenkins, and Latin singer Lila Downs, and attends the annual Fiesta de la Cultura for community art showcases.
  travel: Aliya Profit favors spontaneous road trips through the Texas Hill Country, has explored New Mexico’s Taos Pueblo and San Antonio’s Market Square, dreams of backpacking through Oaxaca, Mexico,
    and tends to plan trips loosely using a shared Google map, balancing budget constraints with a love for culturally rich destinations.
  culinary: Aliya Profit, an intermediate home cook, blends soul‑food staples with Tex‑Mex flair, regularly prepares collard greens seasoned with smoked paprika and chorizo, makes homemade carne asada tacos
    with fresh cilantro, lime, and queso fresco, and experiments with corn‑based tamales on weekends, mastering the balance of bold spices and comforting textures.
  core: Aliya Profit navigates life with gentle curiosity, balancing community‑driven compassion and a laid‑back, occasionally scattered routine that still leaves room for soulful cooking and reflective
    journaling.
background:
  cultural: Aliya belongs to a close‑knit African‑American family that has deep roots in the Southern United States, with grandparents who migrated to Texas during the Great Migration. Growing up in San
    Antonio, she was immersed in a multicultural environment where African‑American traditions intersect with the rich Latino heritage of the city. Church gatherings, gospel music, and community festivals
    have shaped her sense of identity and communal responsibility. She celebrates Black History Month with local workshops, values the storytelling tradition passed down through generations, and often incorporates
    elements of both Southern cuisine and Tex‑Mex flavors into her cooking. Her bilingual exposure to Spanish through neighborhood interactions adds an extra layer of cultural fluency, allowing her to connect
    with students from diverse backgrounds.
attributes:
  skills: '["Child safety supervision", "Conflict de‑escalation", "Effective communication", "Basic first aid", "Route knowledge of San Antonio schools", "Empathy‑driven mentorship", "Adaptable problem
    solving", "Basic vehicle safety inspection", "Cultural competency", "Teamwork"]'
  hobbies: '["Reading contemporary fiction", "Journaling", "Cooking soul‑food and Tex‑Mex dishes", "Hiking in Hill Country", "Sketching in coffee shops", "Listening to jazz, R&B, and hip‑hop", "Volunteering
    for after‑school tutoring", "Exploring local art exhibits"]'
  career_goals: Aliya aims to leverage her bachelor's degree in education to transition into an instructional support role, eventually becoming an elementary school counselor or a special‑education teacher.
    She plans to pursue a Master of Education within the next five years, focusing on inclusive pedagogy and trauma‑informed care. Long‑term, she hopes to develop a community youth outreach program in Bexar
    County that combines academic tutoring with mental‑health resources, fostering a safe and nurturing space for at‑risk students.
