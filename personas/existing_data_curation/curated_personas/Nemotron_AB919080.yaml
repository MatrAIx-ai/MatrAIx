  career_goals: Michelle dreams of a future where she can blend her love for art and animals. She hopes to become a veterinarian who can also illustrate veterinary manuals and create educational cartoons
    about animal care. She is also interested in using her storytelling skills to raise awareness about environmental issues and hopes one day to lead youth workshops that combine art, science, and community
    service. While she keeps many possibilities open, her core ambition is to pursue a career that lets her stay creative, help others, and stay connected to her community.
