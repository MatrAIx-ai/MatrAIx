personas:
  professional: Michelle Burgos, a budding illustrator who merges sketching and watercolor techniques, channels their curiosity and love for unconventional ideas into vibrant character designs while they
    thrive on collaborative art workshops and the supportive energy of friends.
  sports: Michelle Burgos, an enthusiastic member of the Montgomery County Thunder U12 soccer team who spends weekends sprinting across the local park, cheers for the Washington Capitals during hockey season,
    and they approach fitness with a playful, team‑oriented mindset that values fun over rigorous training.
  arts: Michelle Burgos, a passionate sketcher of characters from the graphic novel series Amulet and a watercolor hobbyist, draws inspiration from artists such as Hayao Miyazaki and Claude Monet, regularly
    attends community art workshops at the Montgomery County Library, and they let their imagination shape both their drawings and the cookies they bake.
  travel: Michelle Burgos, an adventurous 11‑year‑old who enjoys spontaneous weekend trips to the Smithsonian in Washington DC, family camping outings in Shenandoah National Park, and dreaming of a future
    visit to the Grand Canyon, prefers flexible itineraries over rigid schedules, balancing school obligations with family travel, and they often pack a sketchbook to capture scenery on the go.
  culinary: Michelle Burgos, a budding home baker who loves whisking up chocolate chip cookies with butter, brown sugar, a pinch of sea salt, and vanilla extract, enjoys experimenting with simple watercolor‑inspired
    cupcakes topped with fresh strawberries, can skillfully melt chocolate for s’mores, and they sometimes over‑mix batter, resulting in a dense crumb.
  core: Michelle Burgos, a curious, art‑obsessed, soccer‑loving 11‑year‑old who juggles sketchbooks, cookie dough, and a scattered stash of crayons while they thrive on flexible plans and group fun.
background:
  cultural: Michelle is an African‑American girl raised in the suburban community of Damascus, Maryland, within Montgomery County’s diverse cultural landscape. Her family celebrates African‑American traditions
    such as Juneteenth, honors church gatherings, and enjoys music ranging from gospel to contemporary hip‑hop and R&B. Growing up near Washington, D.C., she frequently visits museums like the National
    Museum of African American History and Culture, which deepens her appreciation for Black history and artistic expression. Her parents encourage participation in local cultural events, including the
    Montgomery County African‑American Heritage Day, and she often helps organize school projects that highlight diverse voices. These experiences shape her identity, fostering a strong sense of community,
    pride in her heritage, and an eagerness to share her culture through art and storytelling.
