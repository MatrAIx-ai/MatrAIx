personas:
  professional: Percy Zina, a disciplined high‑school junior with a knack for hands‑on problem solving, blends a love for garden stewardship and school robotics to design simple irrigation controllers while
    aiming for a future in sustainable agriculture or an IT support apprenticeship.
  sports: Percy Zina, an avid mountain‑bike rider on the Redwood trails and a member of the Santa Rosa Cycling Club, follows the San Francisco 49ers for football and the Golden State Warriors for basketball,
    and supplements rides with weekend pickup soccer at the local YMCA.
  arts: Percy Zina, a budding acoustic guitarist who practices nightly and draws inspiration from folk artists such as The Lumineers and Gillian Welch, devours science‑fiction graphic novels like Saga and
    Descender, and captures the rolling vineyards in soft‑focus photos that often appear in the community garden’s newsletter.
  travel: Percy Zina, a detail‑oriented planner who favors short, budget‑friendly road trips, has explored the Napa Valley wine route, camped among the redwoods of Mendocino, and dreams of touring New Zealand’s
    Marlborough wine region while balancing school responsibilities.
  culinary: Percy Zina, a pragmatic home‑cook with a farm‑to‑table mindset, frequently prepares roasted vegetable medleys with heirloom tomatoes, basil pesto pasta using garden‑grown herbs, and a hearty
    chili con carne topped with locally sourced cheddar.
  core: Percy Zina, a structured teen who balances bikes, gardening, and guitar practice with disciplined saving and strategic planning, all while navigating the occasional acne flare‑up and school workload.
background:
  cultural: Percy grew up in a middle-class white family in Santa Rosa, part of the broader Sonoma County community known for its vineyards and outdoor lifestyle. His family has roots in European farming
    traditions, and he has been exposed to the region's agricultural heritage, local farmers' markets, and environmental initiatives. The multicultural atmosphere of the Bay Area has also introduced him
    to diverse perspectives, while his upbringing emphasizes a pragmatic work ethic, respect for nature, and participation in community events such as the Sonoma County Fair.
attributes:
  skills: '[''Basic computer literacy (Windows, Google Workspace)'', ''Time management and organization for personal projects'', ''Mechanical aptitude for bike repair and household fixes'', ''Basic horticultural
    knowledge from assisting on a family vineyard'', ''Effective communication and teamwork from school group projects and youth club'', ''Introductory coding skills (Python) through online tutorials'',
    ''First-aid certification (American Red Cross)'']'
  hobbies: '[''Biking on Redwood trails'', ''Maintaining a personal garden plot'', ''Playing acoustic guitar'', ''Landscape photography of vineyards and nature'', ''Participating in school robotics club'',
    ''Playing strategy video games'', ''Reading sci-fi graphic novels'', ''Volunteering at community garden'']'
  career_goals: He aims to complete his high-school equivalency, then pursue an associate degree or apprenticeship in horticulture or sustainable agriculture, with the long-term goal of managing a vineyard
    or working in a farm-technology firm. He also keeps an eye on a backup path in IT support, planning to earn industry certifications such as CompTIA A+ to secure a stable, structured career.
