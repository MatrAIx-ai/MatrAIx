  career_goals: Although retired, Bradley aims to stay mentally sharp by mentoring younger teachers through occasional volunteer tutoring at the local senior center and by documenting his family's genealogy
    for future generations. He also hopes to compile a small guide on sustainable gardening practices in the Allegheny region and to maintain his health through regular walks and light woodworking projects.
