persona_description: A scientist and researcher who is passionate about studying the impact of cover crops on soil moisture retention and biomass production, specifically in the context of grain crop production
  in South Carolina. He is focused on identifying water-use-efficient cover crops and improving the efficiency of utilization of water, aiming to reduce irrigation costs and improve soil health and cropping
  system diversity. His research interests include the effects of cover crops on soil nutrient availability and carbon-and-nitrogen-mineralizing-enzymes’ activity, and he is a member of a team that won
  a seed grant from the Clemson Caribbean I.
