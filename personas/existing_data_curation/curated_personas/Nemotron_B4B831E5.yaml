  hobbies: '["Line Dancing","Gardening","Book Club","Quilting","Crossword Puzzles","Birdwatching","Cooking Tex-Mex","Traveling to Historical Sites","Bridge League"]'
  career_goals: Although officially retired, Agnes intends to remain an active leader in her community. She is working on a memoir that intertwines her personal journey with the cultural evolution of Dallas,
    hoping the book will inspire younger generations. A primary ambition is to secure a board seat with the Dallas Historical Society, where she can shape preservation initiatives and mentor volunteers.
    She also plans to launch a mentorship program at the local community college, guiding new educators and senior volunteers in effective teaching and grant‑writing techniques. Another goal is to develop
    a series of hands‑on workshops that teach seniors how to write compelling grant proposals and manage small‑scale projects. Finally, Agnes aspires to travel to historic sites across the United States,
    documenting each visit with detailed journals and photography, and sharing those stories through community presentations.
