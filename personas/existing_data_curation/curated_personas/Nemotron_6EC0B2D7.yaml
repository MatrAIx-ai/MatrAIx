personas:
  professional: Mariana Martinez is a seasoned financial manager who leverages advanced Excel modeling, PowerBI dashboards, and ERP expertise in SAP and Oracle to deliver precise financial statements, multi‑year
    forecasts, and streamlined month‑end closes, while their methodical, organized nature ensures rigorous internal controls and proactive risk mitigation.
  sports: Mariana Martinez enjoys regular walks along the Huron River trail, participates in a seasonal kayaking group on Lake Erie in summer, and joins the Ann Arbor Trailwalkers Club for guided nature
    walks, while cheering on the Detroit Tigers in baseball and the Detroit Lions in football, though they rarely attend live games, preferring to watch broadcasts at home.
  arts: Mariana Martinez immerses themselves in the arts by reading historical fiction by Ken Follett, biographies of business leaders by Walter Isaacson, and contemporary novels that explore identity,
    while listening to classic jazz recordings of John Coltrane, attending occasional community theater productions of Shakespeare, and collecting vintage oil paintings of rural landscapes.
  travel: Mariana Martinez prefers thoughtfully planned, low‑key trips that blend cultural immersion with natural scenery, such as a weekend getaway to Asheville, North Carolina’s Blue Ridge Mountains and
    a week‑long exploration of the historic towns of Tuscany, Italy, while keeping a wish list that includes the cherry‑blossom festivals in Kyoto, Japan, and a road‑trip along the Pacific Coast Highway,
    often balancing travel budgets with contributions to their retirement fund.
  culinary: Mariana Martinez enjoys cooking with garden‑fresh tomatoes, bell peppers, basil, and cilantro, often preparing herb‑marinated grilled fish, roasted tomato‑basil soup, and quinoa‑stuffed bell
    peppers, showcasing a competent home‑cook level that blends comfort food with family‑style recipes, while they also relish tasting street‑food‑inspired dishes at local markets.
  core: Mariana Martinez is a meticulous finance veteran who balances a love for garden‑grown meals and quiet reflection with a persistent worry that drives them to plan every detail, from budgets to weekend
    walks.
background:
  cultural: 'Mariana was born and raised in the United States to Mexican immigrant parents, growing up in a bilingual household where Spanish was spoken daily and Mexican customs were celebrated alongside
    American holidays. Her family’s emphasis on hard work, respect for elders, and close‑knit community ties shaped her strong sense of responsibility and compassion. She actively participates in cultural
    events such as Día de los Muertos and Mexican Independence Day celebrations organized by the local Hispanic community association, often contributing by preparing traditional foods or assisting with
    event logistics. This bicultural upbringing informs her professional ethos: she values clear, respectful communication, draws on diverse perspectives when solving problems, and frequently mentors younger
    Hispanic professionals to help them navigate the corporate environment. Her identity as a Mexican‑American also motivates her involvement in community outreach programs that promote financial empowerment
    and educational opportunities for underserved Latino families in Michigan.'
attributes:
  skills: '[''financial reporting'', ''budget development'', ''forecasting and financial modeling'', ''risk management'', ''regulatory compliance'', ''team leadership'', ''process improvement'', ''data
