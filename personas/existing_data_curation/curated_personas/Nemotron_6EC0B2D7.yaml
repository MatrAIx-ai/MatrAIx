  hobbies: '[''gardening (vegetables and herbs)'', ''reading (historical fiction, biographies, Mexican literature)'', ''cooking traditional Mexican dishes'', ''walking/hiking on local trails'', ''yoga and
    mindfulness journaling'', ''volunteering for financial-literacy workshops (Spanish-speaking community)'', ''small-group dinner gatherings'']'
  career_goals: Mariana’s primary ambition is to advance into a senior finance leadership role, such as Director of Finance or Chief Financial Officer, within the next five years. She aims to spearhead
    a company-wide digital finance transformation that integrates automated reporting, predictive analytics, and cloud-based budgeting tools, thereby reducing cycle times and enhancing decision-making speed.
    Recognizing the importance of mentorship, she plans to formalize a mentorship program for emerging female and Hispanic professionals in finance, leveraging her experience to broaden representation in
    the field. She also intends to complete a professional certification—either the CPA or CFA—to solidify her technical credentials and to position herself as a trusted advisor on strategic investments.
    Balancing her drive with personal well-being, Mariana seeks to implement stress-reduction practices at work, such as structured work-life boundaries and mindfulness sessions, to ensure sustainable performance
    as she approaches retirement.
