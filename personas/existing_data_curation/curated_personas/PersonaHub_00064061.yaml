persona_description: A paleoanthropologist who specializes in the study of ancient human settlements and their environments, particularly focusing on the rise and fall of ancient lakes and their impact
  on the distribution of early human populations. Their research interests include the analysis of paleoindian projectile points and their geochronological controls, the study of ancient shorelines and
  their relationship to the rise and fall of ancient lakes, and the development of dune-and-slough topography in response to episodic wetting and drying during the early Holocene. They have expertise in
  the analysis of lake levels and their effect on the distribution of ancient human populations, and have a keen interest in understanding how ancient lakes shaped the development of human societies.
