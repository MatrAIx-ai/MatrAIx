  career_goals: Jonathan intends to pursue a bachelor's degree that bridges visual communication and interaction design, likely at a liberal‑arts college within New York State or the broader Northeast.
    His short‑term goal is to build a portfolio that showcases his photography, graphic design, and coding projects, positioning him for internships in user experience (UX) design or digital media. Long‑term,
    he aspires to become a UX designer or creative director for a company focused on socially responsible technology, while also contributing to his hometown by curating community art exhibitions and leading
    youth workshops that blend technology and creativity.
