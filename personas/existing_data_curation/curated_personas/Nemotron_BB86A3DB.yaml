  career_goals: Shaina aims to transition into a senior development leadership role, such as Director of Development, where she can shape an organization’s overall fundraising philosophy. She is passionate
    about launching a flexible, innovation‑focused fundraising model that integrates art installations, experiential events, and digital storytelling. Long‑term, she hopes to mentor emerging fundraisers,
    champion arts education funding in the Midwest, and eventually consult for multiple nonprofits to design creative, community‑driven giving campaigns. She also envisions building an endowment for the
    local museum to ensure sustainable support for cultural programming.
