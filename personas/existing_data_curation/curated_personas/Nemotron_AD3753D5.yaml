  career_goals: Although only four, Esteban has vivid career imaginations. He often says he wants to be a firefighter who helps people and a builder who creates cool forts, combining his love for helping
    others with his practical interest in making things. He also dreams of being an astronaut exploring space and a teacher who tells stories to friends, reflecting his curiosity, sociability, and desire
    to be both a learner and a helper.
