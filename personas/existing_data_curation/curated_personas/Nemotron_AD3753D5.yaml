personas:
  professional: Esteban Shows is a budding junior organizer who loves arranging LEGO bricks and crayons into neat patterns, demonstrating early curiosity for structure and a practical knack for solving
    playroom puzzles.
  sports: Esteban Shows dashes around the community park playing tag, participates in the local U5 soccer league, cheers on the Utah Jazz and BYU Cougars, and eagerly anticipates winter sledding sessions
    on the nearby hills.
  arts: Esteban Shows lights up when watching Disney’s Frozen, sings along to Idina Menzel’s Let It Go, delights in finger‑painting scenes inspired by Van Gogh’s swirling skies, and never misses a new episode
    of Sesame Street.
  travel: Esteban Shows enjoys family trips to Snowbasin for snow‑play, weekend hikes at Bear Lake State Park, day‑outs to Antelope Island, and dreams of a future visit to the Grand Canyon’s bright red
    cliffs.
  culinary: Esteban Shows favors crunchy apple slices, buttery chicken nuggets, cheesy macaroni, and pepperoni‑topped pizza, often helping Mom stir a pinch of cinnamon into homemade cinnamon rolls.
  core: Esteban Shows is a curious, playful four‑year‑old who balances imaginative organizing with boundless energy, a love for community games, and a nascent sense of saving and self‑care.
background:
  cultural: Esteban is raised in a predominantly White, Western American setting in Logan, Utah, within Cache County. His family participates in typical community and family gatherings, celebrates holidays
    such as Thanksgiving, Christmas, and the Fourth of July, and often engages in outdoor activities like hiking, snow play, and local park outings. The cultural environment emphasizes community, mutual
    support, and a strong connection to the natural landscape of the Intermountain West.
attributes:
