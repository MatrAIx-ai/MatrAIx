  career_goals: Mary Lynn aims to progress to a senior systems analyst role within the next two years, building expertise in enterprise architecture and cloud integration. She plans to obtain the CBAP and
    PMP certifications, and eventually transition into a solutions architect or IT manager position where she can lead large‑scale digital transformation initiatives for her organization. Her competitive
    drive pushes her to achieve measurable performance improvements, such as reducing system downtime by 15% and streamlining requirements gathering processes. She also aspires to mentor junior analysts,
    fostering a collaborative yet results‑focused team culture.
