personas:
  professional: An ambitious systems analyst, Mary Surujbali leverages her solid foundation in computer systems analysis, SQL and Python to translate business requirements into clear technical specifications
    while navigating stakeholder dynamics with a skeptical eye and a competitive drive for measurable performance gains.
  sports: An energetic team player, Mary Surujbali competes in the Fort Worth co‑ed volleyball league, dances salsa three nights a week, hikes the Cedar Ridge Trail on weekends, and roots for the Dallas
    Cowboys while cheering on the Texas Rangers during baseball season.
  arts: A culturally engaged enthusiast, Mary Surujbali frequents Fort Worth’s live‑music venues to catch performances by The Texas Horns and indie band The Static, devours contemporary sci‑fi novels by
    Neal Stephenson, and indulges in strategic board‑game nights featuring titles like Terraforming Mars and Catan.
  travel: A weekend adventurer, Mary Surujbali has explored the Hill Country vineyards, trekked the Guadalupe Mountains, and dreams of attending the Tokyo Game Show to combine tech meetups with Japanese
    street food, all while balancing travel costs against her savings goals.
  culinary: A self‑taught kitchen experimenter, Mary Surujbali loves whipping up spicy carne asada tacos, homemade guacamole with fresh cilantro and lime, and occasionally tries a fusion dish like chipotle‑infused
    pad thai, yet often orders a quick burrito when a deadline looms.
  core: Mary Surujbali, a 27‑year‑old systems analyst, blends competitive curiosity with social energy, juggling volleyball, salsa, and tech meetups while meticulously tracking finances and health, yet
    sometimes overcommits to extracurriculars at the expense of rest.
background:
  cultural: Mary Lynn grew up in the Dallas‑Fort Worth metroplex as a white American and now lives in Fort Worth, Texas. Her upbringing reflects a blend of Midwestern practicality and the distinctive Texan
    value of community hospitality. She participates in regional traditions such as Texas rodeos, BBQ gatherings, and Fourth of July celebrations, while also embracing a broader American culture of individualism
    and continual self‑improvement. The local tech community and diverse social scene have further shaped her openness to new ideas balanced with a respect for established practices.
