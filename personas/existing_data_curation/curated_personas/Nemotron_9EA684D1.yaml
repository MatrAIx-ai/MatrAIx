  hobbies: '[''Chess'', ''Model train building'', ''Gardening'', ''Bird watching'', ''Reading historical nonfiction'', ''Pueblo Balloon Fiesta attendance'', ''Classic rock vinyl collection'', ''Landscape
    photography'', ''Community fire watch volunteering'']'
  career_goals: Eugene aims to stay active in the security field while prioritizing his health and his marriage. He plans to mentor younger guards, compile a concise handbook on casino surveillance best
    practices, and keep up with emerging digital surveillance technologies. He also hopes to volunteer for Pueblo’s community safety workshops, attend a national security conference within the next two
    years, and gradually transition to a part‑time consulting role that lets him share his decades of experience without the demands of full‑time shift work.
