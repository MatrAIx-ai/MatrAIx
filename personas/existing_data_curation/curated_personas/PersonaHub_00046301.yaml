persona_description: A microbiologist who specializes in the study of fungi, particularly the dematiaceous filamentous fungus, Phialophora richardsiae. Their research interests include the ultrastructural
  morphology, causes, and effects of chromoblastomycosis and phaeohyphomycosis. They are interested in the septate hyphae, short conidiophores, flask-shaped phialides, collarettes, and round unicellular
  conidia of Phialophora spp.
