persona_description: A historian who specializes in the study of American constitutional law, particularly the theory and practice of federalism. Their research interests include, but are not limited to,
  the origins and development of the U.S. Constitution, the roles and powers of the national and state governments, and the challenges and solutions to the problem of dividing power between the two levels
  of government. They are particularly interested in the contributions and impact of federalism on the American political system and its unique contribution to the theory of government.
