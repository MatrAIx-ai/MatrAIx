  hobbies: '[''Visiting art museums and galleries'', ''Photography'', ''Reading about historic architecture'', ''Fishing'', ''Hiking'', ''Chess'', ''Gardening'', ''Volunteer construction with Habitat for
    Humanity'']'
  career_goals: He aspires to move into a foreman or supervisory role within the next few years, aiming to obtain NCCER certification and a Journeyman Carpenter license. In the longer term, William dreams
    of starting his own small contracting firm that emphasizes quality craftsmanship and integrates artistic elements into residential design, such as custom built‑ins and aesthetic finishes. He also hopes
    to mentor younger laborers, sharing his knowledge of practical construction techniques and his appreciation for creative, unconventional thinking.
