  career_goals: Spencer aims to transition from a senior developer role to a technology architect position where he can shape the strategic direction of innovative products, especially those that blend
    technology with artistic expression such as interactive installations or immersive AR experiences. He hopes to lead a small, agile team that embraces unconventional problem‑solving and values continuous
    learning. In the next five years, he plans to contribute to open‑source projects in the AI and creative coding space, and eventually launch a boutique consultancy that helps cultural organizations digitize
    their heritage through custom software solutions. He also aspires to become a recognized mentor within the local tech community, offering workshops that merge coding with creative thinking.
