persona_description: A medical device manufacturer who is looking for a dry lubricant coating process for their disposable medical devices, especially catheters, cutting tools, staplers, hypo tubes, and
  other "surface to surface" assemblies that slide, shear, pivot, rock, or twist. The manufacturer is interested in using a fluoropolymer powder suspension in a high-purity, nonflammable carrier fluid to
  coat the parts with a thin, dry, fluoropolymer coating that minimizes friction, reduces actuation forces by 25-30%, and is easy to apply in-house and incorporate into the assembly process. The manufacturer
  is also looking for a dry lubricant coating process that is compatible with most plastics and metals, conforms to virtually any surface, and readily penetrates into complex shapes and internal surfaces.
