persona_description: A data protection officer who works for a company that processes personal data for various purposes, including marketing, customer service, and compliance with data protection regulations.
  This individual is responsible for ensuring compliance with the General Data Protection Regulation (GDPR) and other relevant data protection laws, and for implementing and overseeing the implementation
  of data protection policies and procedures. The persona is knowledgeable about the requirements of the GDPR, including the transparency and modalities requirements, and is skilled in providing clear and
  concise information to data subjects regarding their rights under the GDPR. They are also aware of the importance of providing free and reasonable charges for certain types of requests, and are committed
  to ensuring that data subjects are aware of these requirements and their rights.
