    if left out of a game, prompting they ask for a turn.
  arts: Eric Fugate, an animated fan of the show 'Bluey' and the music of Ryan Adams, often sings loudly in the living room, draws vivid pictures of dinosaurs with crayons, and eagerly reenacts favorite
    scenes, yet they get upset if someone interrupts his performance.
  travel: Eric Fugate, a curious explorer who adored the family vacation to Disney World in Orlando and the beach camp at Gulf Shores, now dreams of visiting the Grand Canyon, prefers hands‑on activities
    like climbing sand dunes, and they ask endless questions that keep their parents on their toes.
  culinary: Eric Fugate, a picky eater who delights in creamy mac and cheese, chicken nuggets with honey‑mustard dip, and sliced strawberries arranged in neat rows, but they staunchly refuse broccoli, often
    negotiating for extra ketchup to calm their palate.
  core: Eric Fugate, a talkative three‑year‑old whose relentless curiosity, competitive spirit, and emotional intensity, they channel into a world of playful leadership, meticulous snack rituals, and frequent
    mood swings.
