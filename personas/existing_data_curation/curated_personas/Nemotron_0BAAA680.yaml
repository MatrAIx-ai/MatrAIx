  career_goals: Matteo’s primary career goal is to become a senior software architect and eventually a chief technology officer within a company that develops technology solutions for agriculture. He aims
    to lead cross‑functional teams, define technical roadmaps, and drive the adoption of scalable cloud‑native architectures. To support this ambition, he plans to earn the AWS Solutions Architect Professional
    certification and a Project Management Professional (PMP) credential. Matteo also hopes to mentor junior developers, improve his leadership and communication skills, and eventually launch his own SaaS
    platform that helps Midwestern farmers optimize irrigation and crop yields using IoT sensor data. He balances these ambitions with a commitment to maintain a healthy work‑life balance and to manage
    stress through regular exercise and mindfulness practices.
