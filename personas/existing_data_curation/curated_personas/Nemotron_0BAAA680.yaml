personas:
  professional: Matteo Affleck, a 32‑year‑old full‑stack developer renowned for his methodical approach to building cloud‑native solutions on AWS, leverages his strong Python, Java, and JavaScript skills,
    rigorous Agile Scrum discipline, and competitive mindset to lead code reviews and architect scalable micro‑services that align with his ambition of becoming a CTO in agritech.
  sports: Matteo Affleck, an avid outdoors enthusiast, spends weekends hiking the Ozark Trail and fishing the Missouri River, supports the Kansas City Chiefs and the Royals, drills at the local Missouri
    River Anglers Club, and maintains a disciplined home‑gym routine that blends functional training with occasional slack‑line balance work.
  arts: Matteo Affleck, a science‑fiction aficionado, devours the works of Neal Stephenson and Liu Cixin, attends monthly indie sci‑fi film screenings at Cinema 12, relaxes to synth‑wave artists like Kavinsky,
    and immerses himself in strategic board‑game nights featuring Settlers of Catan and Terraforming Mars, reflecting his love for narrative depth and tactical complexity.
  travel: Matteo Affleck, who balances his tech‑focused career with a wanderlust for both rugged landscapes and cultural immersion, has trekked the Appalachian Trail, toured Oregon’s Willamette Valley vineyards,
    and dreams of kayaking the fjords of Norway, always preferring meticulously planned itineraries that accommodate his need for downtime and occasional remote‑work sessions.
  culinary: Matteo Affleck, a competent home‑cook, gravitates toward hearty Midwestern fare like smoked brisket, pierogies, and farm‑fresh corn chowder, yet also experiments with high‑tech sous‑vide techniques
    to perfect miso‑glazed salmon, often sourcing heirloom tomatoes and fresh basil from the local farmer’s market.
  core: Matteo Affleck, a 32‑year‑old methodical coder with a competitive edge, channels his curiosity into cloud‑native agritech dreams while managing stress through outdoor hikes, meticulous budgeting,
    and a relentless quest for the perfect board‑game strategy, even if occasional worry‑driven tech splurges and anxiety linger.
background:
  cultural: Matteo grew up in a middle‑class white family in Marshall, a small town in Saline County, Missouri. His parents worked in agriculture and local manufacturing, which instilled a practical work
    ethic and a strong sense of community. The Midwestern values of modesty, reliability, and self‑reliance shaped his worldview, while the region’s high school sports culture and church involvement gave
    him a sense of fellowship. He attended the University of Missouri, earning a bachelor’s degree in Computer Science, and his college experience broadened his perspective beyond the rural setting, fostering
    his curiosity. Matteo identifies with the broader Midwestern cultural identity—friendly, straightforward, and grounded—while also embracing the national tech culture that prizes innovation and continuous
    learning.
