persona_description: A proud member of the Kainai Nation – a band of the Blackfoot Confederacy – the Chickasaw and the Yankton Sioux Nations, Deloria Many Grey Horses is a Canadian urban First Nation's
  woman who is dedicated to creating change and advocating for Indigenous Rights through her work as a human rights activist and community leader. She is known for her advocacy against the forced renaming
  of Indigenous people's names and for her efforts to educate the public on the importance of cultural identity and the unique significance of Indigenous names.
