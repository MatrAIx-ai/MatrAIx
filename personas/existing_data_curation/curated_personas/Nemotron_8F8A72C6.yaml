personas:
  professional: Ariel Pardo, a veteran IT support specialist with three decades of hands‑on experience in Windows, macOS, and Linux environments, blends deep technical troubleshooting, networking basics,
    and cybersecurity awareness with a business‑savvy, customer‑focused mindset, and they now channel their curiosity‑driven practicality into mentoring junior staff and designing streamlined support workflows
    as a senior advisor, preferring flexible schedules over rigid planning.
  sports: Ariel Pardo enjoys daily walks along the Rio Grande River trails, is an avid supporter of the Houston Astros baseball team, and participates as a member of the local senior walking club Riverwalk
    Seniors, where they occasionally join friendly pickleball and low‑impact aerobic classes that complement their effort to stay active despite occasional knee stiffness.
  arts: Ariel Pardo immerses themselves in the arts by singing in the church choir, attending community festivals featuring folk musicians such as Bob Dylan tributes and local brass ensembles, and spending
    evenings listening to classic singer‑songwriters like Leonard Cohen and Joan Baez, which nourishes their love for storytelling and reinforces their gentle, cooperative nature.
  travel: Ariel Pardo prefers relaxed, low‑key trips, having explored the dramatic canyons of Big Bend National Park and enjoyed weekend getaways to South Padre Island, and they now dream of a leisurely
    road‑trip through the historic streets of Savannah, Georgia, followed by a guided cruise along the Caribbean islands, balancing their love for nature with a desire for new cultural experiences.
  culinary: Ariel Pardo delights in preparing homemade salsa with ripe tomatoes, jalapeños, fresh cilantro, and lime, as well as a comforting roasted pepper and herb soup seasoned with oregano and garlic,
    showcasing a competent home‑cooking style that blends practicality with a deep respect for family‑passed recipes, and they often experiment with garden‑grown herbs to add a personal flourish.
  core: Ariel Pardo is a seasoned IT mentor who cultivates a thriving garden, cooks vibrant salsa, and nurtures community ties, all while navigating life with a relaxed schedule, occasional forgetfulness,
    and a steadfast curiosity about practical solutions.
background:
  cultural: Ariel was raised in a Mexican-American household in the Brownsville area, where family bonds and community rituals play a central role. She grew up bilingual, speaking Spanish at home and English
    at school, which shaped her ability to bridge cultural gaps in professional settings. Her upbringing infused a strong appreciation for Mexican culinary traditions, music, and celebrations such as Día
    de los Muertos and Cinco de Mayo, which she continues to observe with her extended family. The close-knit nature of the Rio Grande Valley community, combined with a respect for both Mexican heritage
    and American civic life, informs her collaborative, harmony-seeking approach in the workplace and her commitment to giving back through local volunteer work.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software installation and configuration'', ''Remote desktop support'', ''Network basics (router & Wi-Fi setup)'', ''Cybersecurity awareness training'', ''Customer
