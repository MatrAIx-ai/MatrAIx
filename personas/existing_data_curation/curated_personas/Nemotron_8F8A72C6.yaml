  hobbies: '[''Gardening (vegetables and herbs)'', ''Cooking traditional Mexican cuisine'', ''Walking along Rio Grande River trails'', ''Attending local festivals and cultural events'', ''Reading historical
    fiction'', ''Crossword puzzles'', ''Participating in church choir'', ''Volunteering at community food pantry'']'
  career_goals: Approaching retirement, Ariel aims to shift from day-to-day ticket resolution to a mentorship and community-focused role. She hopes to formalize a quarterly workshop series for small-business
    owners in Cameron County, teaching basic computer maintenance and cybersecurity. Within her organization she would like to become a senior advisor who designs support workflows and trains new hires,
    leveraging her business background to improve efficiency. Outside of work, she is interested in volunteering with local senior centers to help older residents become comfortable with smartphones and
    online services, ensuring they stay connected with family and essential resources.
