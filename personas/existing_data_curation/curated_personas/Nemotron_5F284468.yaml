  career_goals: Van aims to pursue a college degree in engineering technology or a related field, with a short‑term goal of earning an associate’s degree and a certification in automotive technology. He
    plans to secure an apprenticeship after high school to gain hands‑on experience, eventually becoming a licensed mechanic or a project engineer. Long‑term, he envisions leading a small engineering firm
    or an auto repair shop that emphasizes sustainable practices. Van also wishes to contribute to his community by volunteering with local emergency services and mentoring younger students in STEM.
