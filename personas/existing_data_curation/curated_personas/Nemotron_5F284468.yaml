personas:
  professional: Van Jordan, an aspiring automotive technician and future engineering‑technology student, they leverage their methodical project‑planning abilities and Python automation hobby to streamline
    diagnostic workflows, while their reliable, checklist‑driven mindset ensures every repair meets exacting standards.
  sports: Van Jordan spends weekday evenings shooting hoops with the Baltimore Youth Sports Club while admiring the disciplined play of the Washington Wizards, and on weekends they hike the Patuxent River
    trails using a structured workout plan organized on a Trello board.
  arts: Van Jordan unwinds by devouring science‑fiction novels from Isaac Asimov and Neal Stephenson, binge‑watching the cyberpunk classic Blade Runner, and they listen to the progressive rock of Rush,
    which fuels their imagination for engineering solutions.
  travel: Van Jordan prefers meticulously planned road trips, having already explored the historic monuments of Washington D.C. and the coastal trails of the Outer Banks, while they dream of a future backpacking
    adventure through Japan’s automotive museums in Tokyo and Osaka.
  culinary: Van Jordan favors hearty, protein‑rich meals such as homemade grilled chicken thighs marinated in garlic and rosemary, paired with fresh salad greens harvested from the community garden, and
    they can quickly assemble a satisfying ramen bowl using bok choy, soft‑boiled egg, and miso paste.
  core: Van Jordan blends a meticulous, project‑manager mindset with a restless curiosity for how things work, often juggling model rockets while they secretly hoard spare screws for future repairs.
background:
  cultural: Van grew up in Newburg, Maryland, a predominantly white, suburban‑rural community in Charles County. His family’s cultural roots trace back to European ancestry, primarily English and German,
    and they uphold typical Mid‑Atlantic American values such as self‑reliance, community involvement, and respect for personal space. He celebrates national holidays like Thanksgiving and Independence
    Day with family barbecues and local fireworks, attends a nearby Protestant church on occasion, and participates in community events such as the county’s annual fall festival. The proximity to the Chesapeake
    Bay region has fostered an appreciation for outdoor activities like fishing, hiking, and environmental stewardship.
