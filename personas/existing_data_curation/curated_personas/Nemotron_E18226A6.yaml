  career_goals: Sunny aims to progress from cashier to store supervisor within the next two years, ultimately targeting a regional manager position that allows her to shape retail strategies across multiple
    locations. She hopes to complement her retail trajectory with a certification in visual merchandising, merging her love for art with business. In the longer term, Sunny envisions opening a small community
    gallery‑café that showcases local artists while offering curated retail products, leveraging her competitive drive to create a unique cultural hub in Blue Lake.
