  hobbies: '[''Beach volleyball'', ''Zumba classes'', ''Spin classes'', ''Open‑mic nights'', ''Karaoke'', ''Live concerts'', ''Board‑game meet‑ups'', ''Trivia nights'', ''Journaling'', ''Mindfulness breathing
    exercises'', ''Reading self‑help books'', ''True‑crime podcasts'', ''Volunteering at community center'']'
  career_goals: Pinar aims to secure a full‑time position in hospitality or community event management within the next two years. She plans to enroll in a bachelor’s program in Business Administration with
    a focus on hospitality management to complement her associate degree. Her short‑term goal is to become a shift supervisor at a local resort or a community‑center events coordinator, gaining leadership
    experience. In the long term, she dreams of opening a boutique coffee‑shop and co‑working space in Largo that also serves as a venue for workshops, live music, and networking events, allowing her to
    create a structured yet flexible environment that reflects her practical outlook.
