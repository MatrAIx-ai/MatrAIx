personas:
  professional: Janet Taniguchi, a budding young artist and Scratch game developer, blends meticulous planning with boundless curiosity to craft river‑inspired digital illustrations and interactive stories
    for her school art club.
  sports: Janet Taniguchi enjoys hiking Eagle Creek State Park in the summer, playing forward on the Alton youth soccer team in the fall, and proudly follows the Chicago Cubs and Chicago Bears while cheering
    them on during family game nights.
  arts: Janet Taniguchi immerses herself in visual arts, sketching Mississippi River sunsets after admiring Monet’s water lilies and Van Gogh’s starry skies, while listening to Billie Eilish and the piano
    works of Beethoven during her practice sessions.
  travel: Janet Taniguchi loves planning family road trips that blend outdoor adventure with cultural stops, favoring weekend outings to Chicago’s Museum Campus and day hikes in Eagle Creek, while dreaming
    of future journeys to the Grand Canyon and the Louvre in Paris.
  culinary: Janet Taniguchi delights in cooking simple dishes like spaghetti carbonara with fresh basil and Parmesan, enjoys apple slices with caramel dip, and proudly bakes blueberry muffins from scratch
    whenever she has a free afternoon in the kitchen.
  core: Janet Taniguchi is a curious, organized twelve‑year‑old who channels her love for river landscapes into art and code, hoards stickers in a secret drawer, and carefully budgets allowance for creative
    projects.
background:
  cultural: Janet comes from a mixed German‑Irish heritage typical of many Midwestern families in Illinois. Raised in Alton, she has been immersed in the community’s river‑town culture, which values neighborliness,
    seasonal festivals, and an appreciation for regional folk art. Her family celebrates traditional holidays such as Thanksgiving and Christmas with multi‑generational gatherings, and they often attend
    the annual Alton Art Fair and Riverfest, experiences that have deepened her interest in visual arts and community storytelling. This background blends a respect for tradition with an openness to new
    ideas, shaping her curious yet organized personality.
attributes:
  skills: '[''Organizational planning'', ''Digital drawing (Procreate)'', ''Basic graphic design (Canva)'', ''Elementary programming (Scratch)'', ''Research and information synthesis'', ''Public speaking
