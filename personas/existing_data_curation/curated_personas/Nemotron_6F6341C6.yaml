  hobbies: '[''Drawing and painting'', ''Visiting local museums and art exhibits'', ''Reading fantasy and science magazines'', ''Creative writing/journaling'', ''Art club & science club participation'',
    ''Scratch programming'', ''Origami crafting'', ''Hiking local nature trails'', ''Playing piano'']'
  career_goals: Janet envisions a future where she can combine her love for art and her methodical nature. She aspires to become an exhibit designer for a museum or a graphic novelist, creating visually
    compelling stories that educate and inspire. In the medium term, she aims to attend a specialized summer illustration camp, build a robust portfolio of artwork, and take advanced art classes in high
    school. Ultimately, she hopes to study art history and museum studies at university, leading to a career that allows her to curate engaging exhibitions and educational programs.
