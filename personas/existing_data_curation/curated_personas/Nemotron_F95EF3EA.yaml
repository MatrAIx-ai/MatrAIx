  career_goals: Catherine aims to complete a bachelor’s degree in psychology or social work within the next two years, followed by a certification in mental‑health counseling. In the short term, she seeks
    a part‑time administrative role or internship at a nonprofit that serves Asian American youth, allowing her to apply her organizational talents while gaining direct experience in support services. Long‑term,
    she envisions becoming a program director for a community‑based organization that provides culturally sensitive mental‑health resources and advocacy for immigrant families, blending her love for structured
    project management with her commitment to fostering emotional well‑being.
