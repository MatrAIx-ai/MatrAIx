personas:
  professional: Catherine Magcalas, an aspiring mental‑health program coordinator and psychology student, merges her detail‑oriented event‑planning expertise, bilingual communication skills, and empathetic
    peer‑support style to streamline nonprofit operations while pursuing certification in counseling.
  sports: Catherine Magcalas stays fit by joining lively Zumba and yoga sessions, hitting the trails of Tacoma’s parks on weekends as a member of the Cascade Hiking Club, and cheering on the Seattle Seahawks
    during football season.
  arts: Catherine Magcalas channels creative energy into digital illustration on Canva, nostalgic scrapbooking, and weekend karaoke where they belt out tracks by Ariana Grande and Ed Sheeran, while drawing
    inspiration from illustrator Loish and indie filmmaker Chloe Zhao.
  travel: Catherine Magcalas balances a love for spontaneous weekend hikes in the Pacific Northwest with carefully planned getaways to Portland’s food scene and a dream itinerary that includes a cultural
    immersion trip to Kyoto, all organized through a blend of budget‑friendly apps and a detailed travel journal.
  culinary: Catherine Magcalas showcases culinary skill by preparing comforting adobo chicken, tangy pork sinigang with tamarind, and savory pancit bihon for friends, seasoning each dish with soy sauce,
    ginger, and a pinch of bay leaf, while also experimenting with fusion twists like kimchi‑topped ramen.
  core: Catherine Magcalas blends structured ambition with vibrant social energy, juggling meticulous planning, a deep empathy for mental health, and a penchant for karaoke, yet often battles anxiety that
    fuels both their drive and occasional over‑commitment.
background:
  cultural: Catherine is a second‑generation Filipino‑American raised in Tacoma’s diverse Asian community. Her parents emigrated from the Philippines, preserving traditions such as fiesta celebrations,
    Simbang Gabi, and family meals centered on dishes like adobo and lumpia. Growing up bilingual, she speaks Tagalog at home while navigating mainstream American culture at school and college. The collectivist
    values of her heritage—respect for elders, emphasis on family cohesion, and communal responsibility—shape her cooperative personality and her desire to give back to her community. She remains actively
    involved with a local Filipino cultural association, where she helps organize cultural events and mentorship programs for youth.
