  hobbies: '[''sketching and digital illustration'', ''street‑art exploration'', ''guitar playing and songwriting'', ''salsa dancing'', ''attending art galleries and mural tours'', ''participating in Mexican
    cultural festivals'', ''reading speculative fiction and philosophy'', ''cooking traditional Mexican dishes'', ''watching indie films'', ''improv comedy workshops'']'
  career_goals: Erik aims to turn his creative passions into a sustainable freelance career, focusing on branding and visual storytelling for local Mexican‑American businesses and cultural festivals. He
    plans to enroll in a community‑college graphic design certificate program to formalize his skills while building a professional portfolio that showcases mural concepts, album artwork, and multimedia
    campaigns. Over the next five years, he hopes to open a collaborative studio space in San Antonio that serves as a hub for artists, hosts workshops, and commissions public art projects that celebrate
    his heritage. Ultimately, he wants to be recognized as a creative director who bridges contemporary design with traditional Mexican motifs.
