personas:
  professional: Erik Cuevas, a freelance visual storyteller, leverages their self‑taught mastery of Photoshop, Illustrator, and Premiere Pro to craft branding and multimedia campaigns for local businesses,
    while their competitive edge and strategic problem‑solving drive them to pitch concepts with bold, culturally resonant narratives.
  sports: Erik Cuevas follows the San Antonio Spurs and San Antonio FC with avid enthusiasm, participates in a local adult basketball league and weekend salsa‑dance cardio sessions, and treats the annual
    Texas Hill Country 5K as their primary fitness benchmark.
  arts: Erik Cuevas immerses themselves in the city’s mural tours and galleries, draws inspiration from street‑art legends like Banksy and contemporary visualists such as Ai Weiwei, jams on acoustic guitar
    to the sounds of Tame Impala and Rodriguez, and hones improvisational wit at local improv workshops.
  travel: Erik Cuevas plans spontaneous road trips that blend artistic pilgrimage with adventure, having already explored Austin’s live‑music scene, the colorful murals of Los Angeles, and the historic
    adobe streets of Santa Fe, while dreaming of a creative residency in Barcelona’s Gothic Quarter.
  culinary: Erik Cuevas enjoys cooking family‑style tamales and street‑taco al pastor, experiments with mole and roasted chilies in fusion dishes like kimchi‑taco, and rates their own skill as a passionate
    home chef who often burns the first batch of tortillas while perfecting the salsa verde.
  core: Erik Cuevas, a restless imagination fueled by neon‑bright sketches and salsa rhythms, balances relentless creativity with a habit of binge‑watching indie films at midnight, often forgetting to water
    their houseplants until the next creative sprint.
background:
  cultural: Erik grew up in a Mexican‑American household in San Antonio, speaking both Spanish and English at home. His family celebrates Día de los Muertos, Semana Santa, and Mexican holidays with vibrant
    decorations, traditional foods, and music from banda and norteña genres. He draws inspiration from Mexican folk art—such as papel picado, Talavera tiles, and mural traditions—and from the rich tapestry
    of Texan culture. This blend of Mexican heritage and Southwestern U.S. influences informs his artistic aesthetic, community involvement, and personal identity.
attributes:
  skills: '[''digital illustration'', ''graphic design'', ''photo editing'', ''video editing'', ''social media content creation'', ''community event planning'', ''bilingual communication'', ''basic web
