    photography", "Mentoring small groups of finance professionals"]'
  career_goals: Looking ahead, Cara aims to transition from day‑to‑day financial operations to a senior advisory and mentorship role that blends her finance expertise with her passion for adult education.
    She plans to join the finance board of a regional arts nonprofit, championing sustainable investment practices and financial transparency. Over the next three years she intends to earn a certification
    in Sustainable Finance, publish a guide on integrating instructional design into corporate financial training, and cultivate a legacy of ethically grounded, data‑driven decision‑making while securing
    a comfortable, anxiety‑resilient retirement.
