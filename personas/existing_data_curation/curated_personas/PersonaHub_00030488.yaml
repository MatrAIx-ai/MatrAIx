persona_description: A health policy researcher who studies the disparities in vaccination rates among different ethnic and socioeconomic groups, particularly focusing on the barriers that prevent young
  African-American, Hispanic, and poor women from completing the HPV vaccination series. The persona is interested in developing solutions to address these disparities and improving health equity. They
  are knowledgeable about the role of public health policies, such as vaccination programs, in addressing health disparities and are looking for ways to improve the uptake of HPV vaccines in vulnerable
  populations.
