  career_goals: Daysi aims to advance to a senior executive role—such as Director of Operations or Vice President of Innovation—where she can spearhead digital transformation projects that blend technology
    and the arts in New Orleans. She also aspires to mentor Hispanic women in STEM, develop a nonprofit that bridges tech education with cultural heritage, and influence organizational culture toward greater
    inclusivity and community engagement.
