personas:
  professional: Maria Almestica is a budding preschool architect who arranges Lego bricks into elaborate structures, demonstrating methodical planning, reliable follow‑through, a curious appetite for new
    design ideas, and a competitive spark when her creations are presented to classmates.
  sports: Maria Almestica plays Little League T‑ball with the Houston Astros Jr. program, attends gymnastics classes at the community center, cheers for the Houston Rockets and Texas Rangers, and approaches
    each practice with organized routines and a competitive drive.
  arts: Maria Almestica loves singing gospel hymns with the Sunday church choir, dancing to Beyoncé’s Love on Top, and drawing Disney characters from Moana, channeling the lively rhythms and bright colors
    of family gatherings into creative expression.
  travel: Maria Almestica enjoys family road trips to Galveston Beach for sandcastle building, weekend visits to the Houston Museum of Natural Science, and dreams of experiencing New Orleans’ Mardi Gras
    parade, balancing familiar local adventures with a budding curiosity for cultural festivals.
  culinary: Maria Almestica favors collard greens and cornbread at church potlucks, loves mac and cheese for lunch, and eagerly helps stir gumbo with a wooden spoon, while often sneaking an extra pinch
    of hot sauce onto their plate, reflecting a bold yet exploratory palate.
  core: Maria Almestica is a curious, methodical five‑year‑old who blends competitive play with organized creativity, mixing community traditions with an independent streak.
background:
  cultural: Maria Celeste is an African-American child growing up in Houston’s diverse Harris County. Her family celebrates African-American cultural traditions through Sunday church gatherings, listening
    to gospel and R&B music, cooking dishes such as collard greens and cornbread, and taking part in community events like Juneteenth celebrations and local festivals, which together shape her sense of
    identity and community.
