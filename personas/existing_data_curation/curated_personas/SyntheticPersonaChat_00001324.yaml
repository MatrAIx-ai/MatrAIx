    User 2: That sounds like a lot of fun! I love to travel too, but I''m not very good at gardening or building things.

    User 1: I''m not very good at gardening either, but I enjoy it. And I''m learning how to build things.

    User 2: That''s great! I''m sure you''ll be a great builder.

