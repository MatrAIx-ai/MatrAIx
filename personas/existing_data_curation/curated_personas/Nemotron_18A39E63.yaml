personas:
  professional: Erin Hayes is a veteran teaching assistant in Oakland public schools, leveraging over two decades of curriculum design, tech‑savvy classroom management, and a knack for integrating abstract
    art into lesson plans, while their methodical nature ensures every project meets detailed learning objectives.
  sports: Erin Hayes enjoys low‑impact fitness, regularly walking the Oakland shoreline and participating in a weekly yoga class at the community center, while cheering on the Golden State Warriors and
    supporting the local Oakland Athletics with a season ticket that they attend only when the schedule aligns with their quiet evenings.
  arts: Erin Hayes is an abstract painter who finds inspiration in the vibrant murals of downtown Oakland, frequently studying works by Jackson Pollock and Yayoi Kusama, and attends gallery openings featuring
    artists like Kerry James Marshall, while also curating a personal poetry collection that blends speculative fiction themes.
  travel: Erin Hayes prefers contemplative travel, often planning weekend retreats to the Redwood forests, a yearly pilgrimage to Kyoto’s Zen gardens, and occasional visits to the French Provence countryside,
    arranging trips months in advance to ensure quiet accommodations and affordable train tickets.
  culinary: Erin Hayes enjoys cooking Mediterranean-inspired meals, favoring dishes such as grilled salmon with lemon‑dill sauce, quinoa tabbouleh with fresh parsley and mint, and roasted heirloom tomatoes,
    while their modest cooking skill allows confident sautéing but occasional over‑salting, a habit they correct with a pinch of citrus.
  core: Erin Hayes blends methodical organization with boundless imagination, channeling solitary creative pursuits into community art programs while managing finances prudently, health proactively, and
    a quiet love for nature‑infused travel.
background:
  cultural: Erin is a white American who was raised in the culturally diverse and politically progressive environment of Oakland, California. Growing up amidst the city’s vibrant mural tradition, eclectic
    music scene, and strong community activism, she developed a deep appreciation for artistic expression and social harmony. Her family’s roots trace back to the Midwest, but the Bay Area’s multicultural
    atmosphere shaped her worldview, fostering respect for varied cultural perspectives and a commitment to inclusive community involvement. While her primary cultural identification is with mainstream
    American culture, she actively engages with Oakland’s artistic and social networks, supporting local initiatives that promote creativity, education, and equity.
attributes:
  skills: '["Lesson‑plan preparation", "Curriculum alignment", "Classroom management", "Educational technology (Google Classroom, Canvas)", "Data entry and assessment tracking", "Visual arts facilitation",
    "Abstract concept integration", "One‑on‑one tutoring in literature and art", "Quiet‑environment student support", "Mentoring and peer cooperation"]'
  hobbies: '["Abstract painting", "Sketching", "Digital photography", "Reading speculative fiction", "Philosophy and art theory", "Poetry writing", "Journal writing", "Gardening", "Birdwatching", "Nature
    walks", "Meditation", "Puzzle solving", "Crossword puzzles", "Volunteer art project participation"]'
  career_goals: Erin aims to complete her GED and obtain a paraprofessional certification within the next two years, enabling her to take on a larger instructional role. She aspires to design and lead a
    community‑based after‑school art program that blends abstract visual art with literary exploration, providing a quiet creative space for youth in Oakland. Long‑term, she hopes to become a certified
    special‑education aide or adjunct instructor, championing inclusive, imaginative curricula that support students who thrive in solitary or low‑stimulus environments.
