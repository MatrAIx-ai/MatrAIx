persona_description: A neuroscientist who studies the brain reward system and its role in the development and maintenance of eating disorders, such as bulimia nervosa. This individual is particularly interested
  in the specific brain regions involved in the reward circuitry and their response to eating behavior, as well as the potential use of specific medications to target these abnormalities. The persona is
  likely to be familiar with the concept of brain dopamine and its role in regulating behavior such as learning and motivation, and has conducted research on the relationship between brain function and
  eating disorders. They are likely to have a strong interest in the potential treatment targets for bulimia nervosa and have published their findings in a respected scientific journal.
