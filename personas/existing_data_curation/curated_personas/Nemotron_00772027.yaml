  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction'', ''Cooking Southern cuisine'', ''Church choir singing'', ''Genealogy research'', ''Walking in nature trails'', ''Online learning
    (new tech courses)'', ''Journaling and mindfulness'']'
  career_goals: Lawanda aims to channel her curiosity and practical skills into community service. She hopes to volunteer as a STEM mentor for local middle and high schools, helping students explore science
    while providing structured yet flexible guidance. She also aspires to develop a small neighborhood garden where seniors and youth can collaborate, fostering intergenerational learning. Additionally,
    she is interested in documenting her life story and family history, possibly publishing a memoir that reflects both personal resilience and the broader African‑American experience in Georgia. Finally,
    she wants to take a short certification in peer support to better assist others coping with anxiety and emotional distress.
