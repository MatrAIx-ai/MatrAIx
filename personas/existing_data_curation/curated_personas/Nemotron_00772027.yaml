personas:
  professional: Lawanda Mcdonald, a retired data analyst who now volunteers as a community STEM mentor, leverages her Excel, R, and SPSS expertise to design hands‑on science workshops while her natural
    curiosity and relaxed, flexible planning style keep projects adaptable and engaging.
  sports: Lawanda Mcdonald walks the shaded trails of Oak Hill Park several times a week, follows the Atlanta Falcons football and the Georgia Tech Yellow Jackets basketball teams on TV, and participates
    in a senior walking club that meets every Saturday, valuing gentle, routine activity over intense workouts.
  arts: Lawanda Mcdonald sings soprano in her church choir, performing both classic hymns and contemporary gospel arrangements, devotes evenings to quilting intricate geometric patterns inspired by Bauhaus
    design, and escapes into historical fiction novels such as Ken Follett’s World Without End and Philippa Gregory’s The Other Boleyn Girl.
  travel: Lawanda Mcdonald enjoys spontaneous road trips through Georgia’s historic towns like Savannah and scenic retreats in the Blue Ridge Mountains, while day‑dreaming about a leisurely literary tour
    of England’s Stratford‑upon‑Avon and Bath, preferring loosely planned itineraries that allow her curiosity to dictate stops yet still accommodate her occasional anxiety about strict schedules.
  culinary: Lawanda Mcdonald prepares Southern comfort dishes such as buttermilk‑fried chicken, smoked‑turkey collard greens, and peach cobbler with a buttery crust, often incorporating fresh garden herbs
    like thyme, basil, and rosemary, and she relishes experimenting with seasonal vegetables like heirloom tomatoes and sweet corn to add a personal twist.
  core: Lawanda Mcdonald is a curiosity‑driven, garden‑loving mentor who blends analytical skill with a relaxed, sometimes disorganized lifestyle, yet their heightened anxiety fuels a habit of over‑journaling
    and occasional procrastination on health appointments.
background:
  cultural: Lawanda is an African‑American woman rooted in the Southern traditions of Stone Mountain, Georgia. Her cultural identity is shaped by a strong church community, family gatherings featuring soul
    food and storytelling, and a deep appreciation for the region's civil‑rights legacy. She values intergenerational connections, often sharing recipes and oral histories passed down through her family.
    While embracing modern influences, she maintains respect for the customs and resilience of the Black community in Gwinnett County, balancing heritage with a willingness to explore new ideas.
