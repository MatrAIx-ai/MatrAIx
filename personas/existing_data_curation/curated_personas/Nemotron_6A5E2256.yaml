  career_goals: Brenda aims to achieve an advanced certification in security management and obtain a mental health first aid certification to better support herself and colleagues in high‑stress situations.
    She hopes to transition into a supervisory role where she can mentor younger guards and shape safety policies. Additionally, she plans to use her education degree to volunteer as a literacy tutor and
    to lead community workshops on personal safety and stress management, thereby leaving a legacy of safety, empowerment, and emotional resilience.
