personas:
  professional: Freya Burcher, a disciplined young coder, creates polished Scratch games that blend mystery storylines with adventurous puzzles, applying their meticulous organization and love for reading
    to design clear game logic and detailed graphics.
  sports: Freya Burcher, an enthusiastic member of the local junior soccer team and a regular participant in the Sunrise Hiking Club for kids, follows a structured after-school workout schedule, roots for
    the national women's soccer team, and enjoys tracking their progress on a colorful fitness chart.
  arts: Freya Burcher, a keen illustrator and budding pianist, draws intricate animal sketches inspired by the works of Beatrix Potter, practices Mozart's Sonata No. 16 on the piano each evening, and follows
    the YouTube channel Art for Kids Hub for new drawing techniques.
  travel: Freya Burcher, a methodical young explorer, plans family weekend trips with detailed checklists, loves hiking the Appalachian Trail's kid-friendly sections, and dreams of visiting the giant redwoods
    of California after completing a school project on ecosystems.
  culinary: Freya Burcher, an enthusiastic garden-to-table chef, enjoys harvesting cherry tomatoes and carrots from their grandparents' vegetable patch to make fresh garden salads with balsamic vinaigrette,
    and frequently attempts homemade pizza topped with mozzarella, basil, and sliced mushrooms.
  core: Freya Burcher blends meticulous organization with boundless curiosity, turning every mystery book, LEGO set, and nature hike into a structured adventure while occasionally hoarding stickers and
    forgetting to hydrate.
background:
  cultural: Freya was raised in a close‑knit, predominantly white community in Milan, Tennessee. Her family values Southern hospitality, community involvement, and religious traditions, often attending
    a local Methodist church and participating in youth groups. She celebrates holidays with traditional Southern customs such as family gatherings, BBQs, and county fairs, and enjoys local activities like
    outdoor hikes and community service. This upbringing has fostered her sense of responsibility, politeness, teamwork, and a practical, achievement‑focused mindset.
