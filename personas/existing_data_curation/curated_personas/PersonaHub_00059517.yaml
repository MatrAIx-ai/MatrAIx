persona_description: A historian who is interested in the history of architecture and urban planning, particularly in the aftermath of major disasters such as natural disasters and catastrophic events.
  This person is knowledgeable about the work of Sir Christopher Wren and his designs for the rebuilding of London after the Great Fire of 1666, and is interested in the alternative plans proposed to rebuild
  the city. This person is also interested in the work of architects and urban planners who have proposed alternative designs for rebuilding cities after disasters, and is interested in the implications
  of these designs for the future of urban planning and reconstruction.
