personas:
  professional: Osniel Manjarres, a four‑year‑old budding architect in play, builds meticulously organized block towers while constantly asking “what if” questions, balancing a vivid curiosity for new designs
    with a disciplined, step‑by‑step approach that satisfies their innate need for achievement, and they often pause to check that each block aligns perfectly before adding the next.
  sports: Osniel Manjarres, a four‑year‑old who splashes through toddler swim lessons on weekday afternoons and dribbles a size‑2 soccer ball for the Little Lions Youth Soccer Club, cheers quietly for the
    City Tigers baseball team on television, prefers the focused routine of short, playful drills over large, noisy group games, and they love the predictable schedule of each session.
  arts: Osniel Manjarres spends afternoons drawing vibrant crayon scenes of Elsa from Frozen and Elmo from Sesame Street, singing along to Disney’s ‘Let It Go’ and the ‘Sesame Street’ theme, and they proudly
    perform impromptu puppet shows for their stuffed animal audience, reflecting a gentle yet organized creative spirit.
  travel: Osniel Manjarres, a four‑year‑old who loves meticulously planned family outings, has already explored the city zoo’s reptile house and Disneyland’s Fantasyland, dreams of a beach trip to the Gulf
    Coast, and prefers short, well‑scheduled excursions where they can carry their favorite plush companion and know exactly when snack time arrives.
  culinary: Osniel Manjarres, a four‑year‑old with a budding love for simple comfort foods, proudly assembles peanut‑butter‑and‑jelly sandwiches with precise spreading technique, savors cheese‑filled pizza
    slices, delights in dipping carrot sticks in hummus, and they often insist on arranging their plate by color, turning mealtime into a miniature organizational challenge.
  core: Osniel Manjarres, a meticulously organized four‑year‑old, balances boundless curiosity with a practical, worry‑prone mind, and they turn even playtime into a structured quest for harmony and achievement.
background:
  cultural: Osniel is raised in a Mexican‑American household in Laredo, Texas. At home, Spanish is spoken alongside English, giving him bilingual fluency. He participates in cultural traditions such as
    Día de los Muertos altars, posadas during Christmas, and enjoying Mexican foods like tacos and tamales. Community events at the local plaza expose him to mariachi music and folkloric dances, reinforcing
    a strong sense of pride in his Mexican heritage while also navigating the multicultural environment of the U.S. border city.
