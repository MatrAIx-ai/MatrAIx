  career_goals: Although only four, Osniel often talks about his future as someone who helps others and builds useful things. He imagines becoming a doctor to care for sick people, a teacher who guides
    children through learning, or an engineer who designs safe playgrounds. His curiosity about how things work and his disciplined approach drive him to set simple, achievable milestones, such as mastering
    reading simple sentences or learning to tie his shoes, which he sees as stepping stones toward his long‑term ambitions.
