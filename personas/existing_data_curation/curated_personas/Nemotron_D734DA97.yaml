personas:
  professional: An aspiring young creator named Quynh Duong blends fantasy illustration with Scratch programming, meticulously plans each project timeline and fiercely competes for top spots in their school’s
    art showcase, and they often revise their work until it meets their exacting standards.
  sports: Quynh Duong enjoys hiking the winding trails of Forest Park, volunteers as a junior trail guide for the local Girl Scouts, supports the Portland Timbers and the Trail Blazers, they also play on
    a community soccer team where they channel their competitive spirit into scoring decisive goals.
  arts: Quynh Duong immerses themselves in the works of Hayao Miyazaki, Frank Frazetta, and contemporary street artist Banksy, they spend afternoons after school sketching futuristic cityscapes in their
    art club, and they curate a personal playlist featuring the orchestral scores of Hans Zimmer to fuel their creative sessions.
  travel: Quynh Duong prefers weekend getaways to nature‑rich destinations like the Columbia River Gorge and coastal Oregon beaches, they dream of exploring the historic temples of Kyoto with their family,
    and they plan each trip with a detailed itinerary and a carefully budgeted savings plan, balancing school commitments and a modest allowance.
  culinary: Quynh Duong enjoys the aromatic broth of pho, the layered flavors of bánh chưng, and the crisp freshness of sushi rolls, they often experiment with drawing edible designs on rice cakes, and
    they proudly bake homemade chocolate chip cookies while occasionally over‑salting their stir‑fry in a quest for the perfect taste.
  core: Quynh Duong is an imaginative, methodical 11‑year‑old who channels competitive curiosity into art, coding, and trail‑hiking, yet sometimes lets perfectionism turn into late‑night work marathons
    and occasional forgetfulness about simple chores.
background:
  cultural: Quynh is a second‑generation Vietnamese‑American living in Portland’s vibrant multicultural community. At home, her family speaks Vietnamese and celebrates traditions such as Tet, preparing
    dishes like bánh chưng and pho during holidays. This bicultural upbringing blends the emphasis on education and family respect from her heritage with Portland’s progressive, artistic environment. She
    often attends community events at the Vietnamese Cultural Center, while also embracing local customs like visiting farmers' markets and participating in the city’s annual art walks. This dual exposure
    shapes her worldview, fueling both her imaginative pursuits and her organized, diligent approach to learning.
