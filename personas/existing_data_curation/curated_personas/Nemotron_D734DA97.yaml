    Scratch'']'
  career_goals: Quynh dreams of becoming a concept artist and interactive storyteller, creating visual worlds for video games or educational apps. She hopes to attend a specialized arts high school in Oregon,
    win a regional science‑fair prize with a project that merges art and renewable‑energy design, and eventually develop her own graphic‑novel series that explores futuristic concepts. Her competitive nature
    drives her to aim for top honors in school art competitions and coding contests, while her curiosity pushes her toward interdisciplinary innovation.
