    ''Mentoring and training'']'
  hobbies: '[''Historical reading'', ''Genealogy research'', ''Hiking'', ''Gardening'', ''Bridge'', ''Volunteering at food bank'', ''Woodworking'', ''Attending local history talks'']'
  career_goals: James aims to transition into a senior total rewards advisory role where he can shape compensation and benefits frameworks for multiple organizations, particularly mid‑size companies seeking
    to modernize their reward systems. He plans to earn the SHRM Senior Certified Professional (SHRM‑SCP) credential, publish thought‑leadership articles on emerging compensation trends, and develop a mentorship
    program for younger HR professionals in his region. Additionally, he is interested in consulting on workforce development initiatives that align fair compensation with community economic growth in Kentucky.
