  career_goals: Looking ahead, Kenneth aims to transition from full‑time trucking to a mentorship and safety‑training role within his current company, where he can share his practical knowledge with younger
    drivers. He also plans to gradually reduce his time on the road by focusing on local deliveries and eventually managing a small fleet of vehicles on a part‑time basis. Parallel to his professional goals,
    he hopes to launch a community‑focused venture that offers guided tours of Fort Wayne’s art museums and cultural sites for seniors, combining his passion for art with his desire to give back.
