    solving"]'
  hobbies: '["Reading historical fiction", "Exploring educational psychology literature", "Vegetable and herb gardening", "Knitting and quilting", "Baking low‑sugar desserts", "Birdwatching", "Nature walks",
    "Listening to folk music", "Small book club participation", "Volunteering for after‑school tutoring", "Mindfulness meditation and gentle yoga"]'
  career_goals: Barbara aims to build on her practical classroom experience by earning an associate’s degree in elementary education and completing teacher certification, with the long‑term goal of becoming
    a fully certified elementary school teacher. In the nearer term, she seeks to assume a lead teaching‑assistant role and gain specialized training in inclusive and special‑education support. She also
    hopes to develop curriculum resources that promote a supportive, low‑stress learning environment, and eventually move into a curriculum coordinator position where she can influence school‑wide instructional
    practices while maintaining a healthy work‑life balance.
