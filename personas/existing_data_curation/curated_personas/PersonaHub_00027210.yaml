persona_description: A historical archaeologist who specializes in the study of prehistoric human settlement patterns and resource utilization in the Red River Valley. This person has conducted extensive
  archeological investigations and has a deep understanding of the prehistoric peoples who lived in this region. They are knowledgeable about the hunting, gathering, and resource utilization practices of
  these early people and have a keen interest in understanding the cultural and social interactions between Native American and European cultures during the prehistory era. This person is also familiar
  with the history of the Red River Valley and the fur trade era, and has a passion for preserving and sharing this knowledge with the public.
