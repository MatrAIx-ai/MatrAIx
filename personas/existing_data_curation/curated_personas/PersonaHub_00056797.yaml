persona_description: A planetary scientist with expertise in the study of Titan, the largest moon of Saturn. She is particularly interested in the moon's outer ice shell and its potential for rigid structures.
  Her research interests include the mechanics of Titan's ice shell, the relationship between gravity and topography, and the implications of these findings for the moon's geology and potential for ice
  volcanoes. She is also knowledgeable about the geology and geophysics of Saturn's system and its moons.
