  hobbies: '["Gardening", "Quilting", "Historical Fiction Reading", "Community Volunteering", "Hiking", "Woodworking Club", "Church Activities"]'
  career_goals: Kimberley aims to achieve state‑recognized Master Carpenter certification within the next two years, solidifying her reputation as a regional expert. She plans to open a modest workshop
    that offers bespoke furniture and restoration services, providing a space where she can train a new generation of women carpenters through an apprenticeship program. Additionally, she aspires to author
    a guidebook on sustainable, low‑waste carpentry practices tailored to Midwestern homeowners, and to partner with the local historical society on preserving heritage structures. As she approaches retirement,
    Kimberley hopes to transition into a mentorship and consultancy role, ensuring that her knowledge continues to benefit the community.
