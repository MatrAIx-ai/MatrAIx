personas:
  professional: Sam Trevino is a 31‑year‑old medical assistant who channels their imagination into patient education, using digital illustration and improv‑honed communication skills to demystify clinical
    procedures while eyeing a future as a lead MA and eventually a physician assistant.
  sports: Sam Trevino is an avid weekend hiker who tackles Diablo Range trails, occasionally joins a local climbing gym in Oakland, roots for the San Jose Earthquakes in MLS, and balances cardio with spontaneous
    pickup basketball games at the community center.
  arts: Sam Trevino immerses themselves in abstract painting, digital illustration on Procreate, and experimental concerts featuring artists like Aphex Twin and Tame Impala, while also performing improv
    comedy at the Bay Area's ComedySportz, drawing inspiration from Kandinsky and the surreal narratives of David Lynch.
  travel: Sam Trevino prefers spontaneous, short‑haul trips, having backpacked through Yosemite, road‑tripped to Portland for indie music festivals, and dreamed of a culinary pilgrimage to Oaxaca, all while
    staying budget‑conscious enough to use points from a travel rewards credit card.
  culinary: Sam Trevino is a moderately skilled home chef who loves crafting fusion dishes such as kimchi‑taco bowls and miso‑glazed pork belly dumplings, often experimenting with chipotle, gochujang, and
    fresh herbs while tolerating a messy kitchen and occasional burnt sauces.
  core: Sam Trevino is a creatively restless medical assistant who blends artistic flair with patient advocacy, juggling spontaneous hobbies, budget‑flexible finances, and a habit of leaving projects half‑finished
    in pursuit of the next novelty.
background:
  cultural: Sam grew up in a predominantly white, middle‑class suburb of the East Bay, shaped by the progressive, health‑conscious milieu of the Bay Area. While his surname hints at Hispanic roots, his
    family traditions largely reflect mainstream American customs—celebrating holidays like Thanksgiving and the Fourth of July—yet they occasionally incorporate familial recipes such as tamales into gatherings.
    Living in Concord, CA, he is exposed to a mosaic of cultures, which has fostered an appreciation for diversity and a comfortable ease navigating multicultural settings. Sam identifies with a blend of
    Midwestern work ethic and West Coast openness, valuing community engagement, artistic expression, and forward‑thinking approaches to both personal life and professional practice.
attributes:
  skills: '[''Patient intake and triage'', ''Vital signs measurement'', ''Phlebotomy'', ''Basic wound care'', ''Injection administration'', ''Electronic health record management (Epic)'', ''Medical billing
    and insurance verification'', ''Medical terminology knowledge'', ''Strong verbal communication'', ''Public speaking'', ''Creative problem solving'', ''Digital illustration'', ''Improv comedy performance'']'
  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Experimental music listening'', ''Live improv comedy'', ''Tabletop role‑playing games'', ''Hiking in the East Bay'', ''Reading speculative
    fiction and philosophy'', ''Cooking fusion dishes'', ''Volunteering at community art and health events'']'
  career_goals: Sam aims to advance within the healthcare field by first becoming a lead medical assistant, then pursuing certification as a physician assistant or nurse practitioner. He envisions blending
    his clinical expertise with his artistic flair to create engaging health‑education content—such as illustrated guides, short videos, and community workshops—that demystify medical concepts for diverse
    audiences. Long‑term, Sam hopes to launch a community‑focused telehealth platform that leverages interactive media to improve patient engagement. He also seeks recognition as a patient advocate who
    brings a fresh, creative perspective to care delivery and fosters collaborative, innovation‑driven clinic environments.
