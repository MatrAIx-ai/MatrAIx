    practice'']'
  career_goals: Andrew aims to transform his hands‑on driving and sales experience into a regional logistics management position within the next three to five years. He plans to finish his associate degree
    in Business Administration and earn a Certified Transportation Professional (CTP) credential. Long‑term, he envisions launching his own small fleet focused on eco‑friendly deliveries for local artisans
    and galleries across New England, integrating his love of art with sustainable logistics. He also wants to mentor new drivers, lead community road‑safety initiatives, and eventually create a boutique
    delivery service that offers curated, behind‑the‑scenes experiences for customers visiting regional art events.
