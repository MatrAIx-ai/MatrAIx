  career_goals: Approaching retirement, Ian aims to transition into a senior advisory role where he can shape enterprise‑wide initiatives, particularly around digital transformation and operational excellence
    in the region's manufacturing and agribusiness sectors. He seeks to lead cross‑functional teams, mentor the next generation of analysts, and eventually establish a boutique consulting practice that
    supports local small businesses. Balancing ambition with his desire for predictability, he wants to create a lasting professional legacy while maintaining a workload that allows him to manage stress
    effectively.
