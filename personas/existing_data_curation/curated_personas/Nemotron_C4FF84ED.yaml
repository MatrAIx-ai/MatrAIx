personas:
  professional: Christine Wooten, a 35‑year‑old information security analyst, blends deep technical expertise in network security, SIEM tuning, and cloud architecture with an imaginative flair for visual
    storytelling, making complex risk concepts accessible while driving collaborative, agile security initiatives.
  sports: Christine Wooten hikes the Ozark trails, paddles the Current River on weekends, practices group yoga, and cheers for the St. Louis Cardinals and Kansas City Chiefs while training with the local
    “Ozark Trailblazers” running club.
  arts: Christine Wooten devotes evenings to abstract painting and digital illustration, draws inspiration from artists like Banksy and musicians such as Björk, and regularly attends speculative‑fiction
    readings and live performances by the St. Louis Repertory Theatre.
  travel: Christine Wooten blends careful itinerary planning with spontaneous weekend road trips, favoring destinations like Asheville’s art scene, New Orleans’ jazz festivals, and Kyoto’s temples, while
    balancing travel costs against her family’s budget.
  culinary: Christine Wooten cooks experimental dishes ranging from Korean kimchi‑fried rice to Ethiopian injera with lentil stew, enjoys experimenting with saffron and sumac, yet often over‑spices her
    sauces, and she loves dining at farmers’ markets for fresh ingredients.
  core: Christine Wooten fuses Midwestern community spirit with a restless imagination, balancing high‑stakes cybersecurity leadership with vibrant artistic pursuits while constantly wrestling with stress
    and the desire for purposeful mentorship.
background:
  cultural: Christine grew up in a small Midwestern town in Missouri, absorbing the region's values of community, hospitality, and practicality. Her family maintains a strong work ethic and an active involvement
    in local church and neighborhood events, such as county fairs and community service projects. While rooted in these Midwestern traditions, she was encouraged to pursue higher education in STEM, which
    broadened her exposure to national and global perspectives. This blend of hometown solidarity and academic ambition shapes her worldview, fostering both a collaborative spirit and a drive for innovative
    problem‑solving.
attributes:
  skills: '[''Network Security'', ''Vulnerability Assessment'', ''Risk Management'', ''Incident Response'', ''SIEM Configuration and Tuning'', ''Threat Modeling'', ''Cloud Security (AWS, Azure)'', ''Python
