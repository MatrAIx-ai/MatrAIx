    ''Digital Forensics'']'
  hobbies: '[''Abstract Painting'', ''Digital Illustration'', ''Speculative Fiction Reading'', ''Live Music & Theater'', ''Hiking'', ''Kayaking'', ''Group Yoga & Meditation'', ''Puzzle Solving'', ''Escape
    Rooms'', ''Capture-the-Flag Competitions'', ''Experimental Cooking'', ''STEM Outreach Volunteering'']'
  career_goals: Christine aims to advance to a senior security architect role within the next three years, eventually stepping into a chief information security officer (CISO) position where she can shape
    enterprise‑wide security strategy. She is pursuing CISSP, CISM, and AWS Security Specialty certifications to deepen her expertise in cloud and governance. Passionate about innovation, she plans to develop
    AI‑driven threat detection tools and contribute to open‑source security projects. Mentorship is also a priority; she envisions establishing a regional cybersecurity mentorship program for women and
    under‑represented students. Balancing her ambition with family life, she seeks a leadership role that supports flexible work arrangements while allowing her to drive community outreach initiatives that
    teach cyber hygiene to local schools and small businesses.
