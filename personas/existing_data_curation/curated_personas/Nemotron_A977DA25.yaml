  hobbies: '[''Gardening'', ''Cooking Vietnamese cuisine with Californian influences'', ''Reading historical biographies'', ''Fishing'', ''Attending cultural festivals'', ''Meditation and tai chi'', ''Woodworking'']'
  career_goals: Approaching retirement, Thong aims to transition into a senior advisory role focused on community liaison and mental‑health advocacy within the department. He plans to design a mentorship
    program for new officers that emphasizes cultural competence and emotional resilience. He also hopes to complete a Master’s in Public Administration to influence policy on officer wellness and community
    trust. After his formal service, he envisions opening a modest café that showcases Vietnamese and Latino family recipes, creating a cultural bridge for his community while maintaining strong family
    ties.
