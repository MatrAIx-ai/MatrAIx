personas:
  professional: Jeffrey Couto, a 21‑year‑old physical therapy student with a knack for meticulous patient evaluation and evidence‑based orthopedic rehab, leverages his structured mindset, competitive drive,
    and love of precise documentation to design outcome‑focused treatment plans while quietly aspiring to lead a high‑performance sports medicine team.
  sports: Jeffrey Couto, an avid weight‑lifter and calisthenics practitioner who spends Saturday mornings at the community CrossFit box and Sunday afternoons hiking with the Indiana Trail Club, follows
    the Indiana Pacers and Indianapolis Colts closely, and channels his competitive spirit into tracking personal PRs on a Strava board, while rarely joining team sports due to a preference for solo challenges.
  arts: Jeffrey Couto, a solitary puzzle enthusiast who assembles classic car scale models while listening to Hans Zimmer soundtracks and Explosions in the Sky, enjoys the occasional live performance of
    the local symphony, collects vintage jigsaw puzzles featuring historic scenes, and reads narrative non‑fiction by Malcolm Gladwell, integrating these artistic touches into his reflective downtime.
  travel: Jeffrey Couto, a methodical planner who spends his free weekends trekking the Hoosier National Forest and has taken a road‑trip through the Great Smoky Mountains, dreams of visiting Lisbon to
    experience the vibrant festas of his ancestors while also eyeing a future solo trek along the Appalachian Trail, all on a modest student budget.
  culinary: Jeffrey Couto, an intermediate home chef who favours lean protein meals such as grilled chicken with quinoa, complements them with occasional bacalhau à Brás and pastéis de nata as a nod to
    family traditions, meticulously meal‑preps on Sundays, experiments with spice blends while assembling model kits, but still succumbs to late‑night pizza deliveries during exam periods.
  core: Jeffrey Couto, a detail‑obsessed, competitively driven yet solitary 21‑year‑old who balances meticulous planning with an undercurrent of anxiety and a relentless pursuit of personal excellence.
background:
  cultural: Jeffrey grew up in Leo, a small town in Allen County, Indiana, within a Midwestern community that values hard work, reliability, and modesty. His family traces its roots to Portuguese ancestry,
    and occasional cultural traditions—such as celebrating festas, enjoying Portuguese cuisine, and attending Catholic Mass—have been part of his upbringing. The blend of Midwestern values and his heritage
    has instilled a strong sense of responsibility, a practical work ethic, and a respect for community service, shaping both his personal and professional outlook.
attributes:
  skills: '[''Patient assessment'', ''Therapeutic exercise programming'', ''Manual therapy techniques (soft tissue mobilization, joint mobilization)'', ''Use of physical therapy modalities (ultrasound,
    electrical stimulation)'', ''Medical documentation and EMR management'', ''HIPAA compliance'', ''Anatomy and kinesiology knowledge'', ''Functional movement analysis'', ''Equipment maintenance and inventory
    control'', ''Professional patient communication'']'
  hobbies: '[''Weight‑lifting and calisthenics'', ''Reading non‑fiction (psychology, self‑improvement, movement science)'', ''Puzzle solving (jigsaw puzzles, logic games)'', ''Solo hiking in Indiana state
    parks'', ''Model kit building (scale car replicas)'', ''Journaling for stress management'', ''Listening to health and productivity podcasts'']'
  career_goals: Jeffrey aims to complete his bachelor’s degree in Physical Therapy and obtain licensure as a Physical Therapist within the next three years. He plans to specialize in orthopedic and sports
    rehabilitation, earning certifications such as Certified Orthopedic Manual Therapist (COMT) and Sports Certified Specialist (SCS). He aspires to work in a high‑performance sports medicine clinic where
    he can apply his competitive drive to help athletes recover efficiently. Ultimately, he hopes to lead a multidisciplinary rehabilitation team, contribute to evidence‑based practice, and possibly open
    his own clinic focused on structured, outcome‑driven treatment protocols.
