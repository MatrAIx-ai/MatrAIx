  career_goals: At 72, Kirk aims to transition gradually toward mentorship and community contribution while maintaining a light consulting workload that allows flexibility. He wants to become a senior technical
    advisor for local startups and non‑profits, help preserve legacy systems for regional businesses, and lead a volunteer coding club for senior citizens in Springfield. He also hopes to author a memoir/technical
    guide about the evolution of software development, and perhaps develop a passion project—a home automation system for his garden using Raspberry Pi. Financially, he seeks to secure stable part‑time
    contracts that respect his preferred work‑life balance and give him room for spontaneous creative pursuits.
