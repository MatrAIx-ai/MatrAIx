  career_goals: Gangadai aims to transition from frontline cabin duties to a senior training and safety leadership role within her airline. She plans to obtain FAA Safety Management System certification
    and complete an advanced aviation safety analyst program, leveraging her STEM background to develop data‑driven safety initiatives. Over the next five years she hopes to lead a cabin crew training department,
    mentor junior attendants, and position herself for a future move into corporate flight operations or airline safety consulting. Her competitive drive pushes her to earn top‑performer awards and to be
    recognized for exemplary crisis management.
