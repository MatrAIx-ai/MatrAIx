  hobbies: '[''Gardening (vegetable and flower cultivation)'', ''Quilting and sewing'', ''Reading historical fiction and folklore'', ''Church choir singing'', ''Playing piano at community events'', ''Volunteer
    craft workshops at the library'', ''Walking and birdwatching'', ''Attending farmer’s markets'', ''Documenting local oral histories'']'
  career_goals: Even though she is retired from formal employment, Mary sees her role as a community elder as a lifelong calling. She aims to expand the senior‑led mentor program at her church, formalizing
    workshops on gardening, budgeting, and digital literacy for both seniors and teenagers. She hopes to document Oglethorpe County’s oral histories by conducting interviews and compiling a small anthology
    that preserves local stories for future generations. Mary also aspires to lead a county‑wide historical preservation committee to protect historic farmsteads, and to launch a small cooperative of local
    artisans—including quilters and gardeners—to sell handcrafted goods and produce, with proceeds supporting the local senior center. Finally, she wishes to maintain her personal health, continue attending
    weekly exercise classes, and remain an active participant in the community.
