personas:
  professional: Mary Nelson, a retired homemaker turned community elder, uses her meticulous budgeting, garden design, and event‑organizing skills to spearhead senior mentor workshops, historic preservation
    committees, and artisan cooperatives, and they approach each initiative with pragmatic curiosity and steadfast reliability.
  sports: Mary Nelson enjoys walking the Oglethorpe County trails, birdwatching at sunrise, cheering on the Georgia Bulldogs football team, and participates in a local senior walking club that meets after
    the church service, while they occasionally join a community softball game for fun.
  arts: Mary Nelson sings in the church choir, plays piano for community gatherings, quilts intricate patterns inspired by traditional folk motifs, reads works by Eudora Welty and Southern folklore, and
    they find inspiration in the music of Dolly Parton, Emmylou Harris, and the storytelling of Johnny Cash.
  travel: Mary Nelson prefers organized day trips to historic towns like Savannah and Athens, appreciates guided tours of antebellum plantations, enjoys weekend getaways to the Blue Ridge Mountains with
    their grandchildren, and they dream of a leisurely cruise along the Gulf Coast when health allows.
  culinary: Mary Nelson excels at cooking classic Southern fare, mastering dishes such as collard greens simmered with smoked ham hocks, fried chicken with buttermilk brine, shrimp and grits, and peach
    cobbler made from garden‑grown peaches, while they also experiment with heirloom tomatoes and fresh herbs from their garden.
  core: Mary Nelson blends Southern hospitality with methodical curiosity, balancing diligent budgeting, community leadership, and a penchant for heirloom seeds, all while humming choir hymns and occasionally
    forgetting to take their blood pressure medication.
background:
  cultural: Mary Brooke Nelson was raised in the rural South, deeply rooted in the traditions of Oglethorpe County, Georgia. Her family’s heritage is grounded in small‑farm life, Southern hospitality, and
    a strong Methodist (now broadly ecumenical) church community. The culture she embodies values self‑reliance, close‑knit community ties, and reverence for the land. She grew up with Southern cuisine,
    folk music, and a storytelling tradition that celebrates local history and family lineage. Although she attends a contemporary, intergenerational church, she maintains classic Southern customs such
    as seasonal potlucks, garden festivals, and quilting circles that serve both social and charitable purposes. Her worldview blends respect for long‑standing customs with a willingness to incorporate
    new ideas, reflecting the balance she achieves between curiosity and practicality.
