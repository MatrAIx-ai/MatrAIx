personas:
  professional: Edith Budnick, a retired humanities scholar turned community art mentor, leverages their deep analytical skills, meticulous event planning, and gentle mediation to enrich the Twin Cities’
    cultural scene as a museum docent and traveling exhibition coordinator.
  sports: Edith Budnick stays active through low‑impact hiking on the Mississippi River trail and regular walks with the St. Paul Senior Walking Club, cheering on the Minnesota Twins and Wild while maintaining
    a gentle fitness routine suited to their age.
  arts: Edith Budnick spends afternoons painting watercolors of perennials, studying Monet’s brushwork, attending museum talks on Frida Kahlo, and reading poetry by Mary Oliver, which together shape a vibrant
    artistic identity rooted in both classic and contemporary influences.
  travel: Edith Budnick prefers meticulously planned small‑group trips that blend art and nature, such as a week‑long painting retreat in Provence’s lavender fields and annual weekend getaways to Duluth’s
    historic waterfront and the North Shore’s lighthouse trails.
  culinary: Edith Budnick delights in preparing herb‑infused roasted salmon with fresh dill from their garden, baking apple‑cinnamon crumble, and assembling goat cheese with locally foraged wild berries,
    while occasionally treating themselves to a fine‑dining experience at the Minneapolis Sculpture Garden café.
  core: Edith Budnick is a curious, softly resilient art lover who balances meticulous planning with spontaneous creativity, occasionally procrastinates on paperwork, and finds solace in birdwatching, knitting,
    and a well‑tended garden.
background:
  cultural: Edith is a White American raised in suburban Minnesota, with German‑Scandinavian ancestry that shaped her family’s Lutheran traditions and community‑oriented values. Growing up near the Twin
    Cities, she was exposed to a vibrant regional arts scene and seasonal outdoor life that fostered an appreciation for both cultural and natural heritage. Her upbringing emphasized modesty, a strong work
    ethic, and service to others, which continue to influence her collaborative and considerate approach to relationships and community involvement.
