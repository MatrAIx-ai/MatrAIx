personas:
  professional: A young robotics enthusiast and debate strategist, Natalie Brown harnesses their meticulous organization and fierce competitiveness to lead the school’s robotics team while captivating classmates
    with persuasive arguments in the debate club.
  sports: A sprint-focused track athlete who also rides a bike around Metairie’s leafy streets, Natalie Brown trains with the Metairie Track Club, cheers for the New Orleans Saints and Pelicans, and channels
    competitive energy into weekly speed drills while occasionally skipping cooldowns after a tough practice.
  arts: A choir member and budding pianist, Natalie Brown frequently performs classics from Beyoncé and Harry Styles, delights in the jazz improvisations of Louis Armstrong on family gatherings, and channels
    their sociable, attention-seeking nature into lively TikTok music mashups.
  travel: An adventure-seeking teen who loves short road trips, Natalie Brown has explored the historic French Quarter during Mardi Gras, taken a family weekend to Gulf Shores, and dreams of visiting Paris
    to practice French phrases, all while meticulously planning itineraries on a shared family calendar.
  culinary: A confident junior cook, Natalie Brown enjoys whipping up spicy jambalaya, sweet beignets with powdered sugar, and gumbo seasoned with Andouille sausage, often experimenting with extra cayenne
    for a kick, yet sometimes forgets to clean up the kitchen in their rush to record a TikTok recipe.
  core: Natalie Brown is a hyper-organized, competitive teen who thrives on public attention, worries about every detail, and balances robotics, debate, and cooking while occasionally letting stress drive
    them to skip sleep.
background:
  cultural: Natalie grew up in the suburban community of Metairie, Louisiana, a culturally rich area near New Orleans. Her family follows Southern Catholic traditions and celebrates local customs such as
    Mardi Gras parades and Creole festivals. She was raised on a blend of Southern hospitality and Louisiana’s distinctive culinary heritage, often helping prepare dishes like jambalaya and pralines. Exposure
    to the French‑Creole influences of the region gave her a basic familiarity with French phrases and an appreciation for the music and folklore of the Gulf Coast. While identifying as white, Natalie’s
    worldview reflects the multicultural tapestry of Jefferson Parish, emphasizing community involvement, respect for tradition, and an openness to diverse ideas.
