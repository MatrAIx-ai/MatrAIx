  career_goals: Natalie aims to attend a top university where she can major in biomedical engineering or a related STEM field. She envisions developing medical devices that improve pediatric care, merging
    her scientific curiosity with her desire to make a tangible impact. In the short term, she plans to win regional science fairs, secure scholarships, and assume leadership roles such as student body
    president. She also hopes to launch a youth STEM outreach program in her community, using her public‑speaking strengths to inspire younger students. Ultimately, she aspires to become a researcher‑entrepreneur
    who can combine rigorous research with advocacy, while maintaining a platform to share knowledge through media.
