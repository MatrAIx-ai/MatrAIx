    tech integration'']'
  hobbies: '[''Digital illustration'', ''Abstract painting'', ''Reading speculative fiction'', ''Playing acoustic guitar'', ''Hiking local trails'', ''DIY electronics projects'', ''Journaling'', ''Meditation'',
    ''Small group tabletop RPG sessions'', ''Collecting vintage safety equipment'']'
  career_goals: Darrell aims to become a senior safety manager or regional director for a major aerospace or manufacturing firm in the Huntsville‑Madison corridor, leading a multidisciplinary safety team.
    He aspires to champion the adoption of AI‑driven predictive safety platforms that reduce workplace injuries before they occur. He plans to earn Certified Safety Professional (CSP) and Certified Safety
    Hazard Officer (CSHO) credentials, contribute research on human‑factors engineering to professional journals, and serve on a state occupational health advisory board to influence policy. Additionally,
    he hopes to mentor emerging safety technicians and build a reputation as a thought leader who bridges technical rigor with creative safety innovation.
