personas:
  professional: An experienced occupational health and safety specialist, Darrell Molea combines a master's degree in industrial engineering with a flair for creative problem-solving, delivering data-driven
    hazard assessments, ergonomic analyses, and AI-enabled predictive safety models while balancing meticulous organization with the flexibility to prototype novel wearable sensor solutions, and aspiring
    to a senior safety manager role that champions industry-wide safety innovation.
  sports: A weekend trail enthusiast and regional sports fan, Darrell Molea regularly hikes the Monte Sano State Park and joins the Madison County Trail Club for group treks, plays pick-up basketball at
    the University of Alabama in Huntsville gym, and follows the Alabama Crimson Tide football team, the Huntsville Havoc hockey squad, and the Atlanta Falcons with season tickets for home games.
  arts: A digitally inclined creator, Darrell Molea spends evenings illustrating futuristic workplaces and painting abstract landscapes, strums acoustic guitar while covering classic country hits by Luke
    Bryan and listening to ambient compositions from Brian Eno, and immerses himself in speculative fiction novels by Neal Stephenson and Margaret Atwood, often drawing inspiration from local art exhibits
    at the Huntsville Museum of Art.
  travel: An inquisitive traveler who balances tech curiosity with nature appreciation, Darrell Molea has road-tripped to New Mexico's White Sands, explored the volcanic fields of Iceland, toured NASA's
    Johnson Space Center in Houston, and hopes to visit Kyoto's blend of tradition and robotics, always planning trips around a modest budget and preferring off-peak weekdays to avoid crowds.
  culinary: A modest home chef with a taste for comfort and experimentation, Darrell Molea often cooks shrimp and grits, biscuits with honey butter, and pecan pie for family gatherings, while also experimenting
    with quinoa salads, kimchi, and smoked paprika-seasoned tofu, boasting a solid intermediate skill level that shines during small dinner parties where he pairs dishes with locally brewed craft beer.
  core: Darrell Molea blends analytical precision with artistic imagination, worries about the future yet finds calm through meditation, and directs his life with a balance of disciplined routine and spontaneous
    creativity.
background:
  cultural: Darrell grew up in Madison, Alabama, in a middle‑class family with deep Southern roots. His upbringing blended traditional Southern values—hospitality, community, and a strong work ethic—with
    exposure to the high‑tech aerospace environment of nearby Huntsville, where the Redstone Arsenal and NASA facilities dominate the regional economy. He attended the University of Alabama in Huntsville,
    earning a master's degree in Industrial Engineering. This combination of rural heritage and cutting‑edge technology shapes his pragmatic yet inventive outlook. He retains a fondness for regional customs
    such as country music, local cuisine, and outdoor gatherings, while also embracing the progressive, STEM‑driven community that defines the Huntsville‑Madison area.
attributes:
  skills: '[''Hazard identification and risk assessment'', ''OSHA & ANSI regulatory compliance'', ''Ergonomic and industrial hygiene assessments'', ''Safety program development and implementation'', ''Incident
