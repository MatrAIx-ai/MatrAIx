persona_description: A molecular biologist who specializes in the study of cell division and the mechanisms that control it, particularly the processes of mitosis and cytokinesis. She is particularly interested
  in the role of taxol in disrupting microtubule formation during mitosis and its effects on the cell cycle. Her research focuses on understanding the molecular and cellular mechanisms that regulate the
  progression of the cell cycle and the cell cycle checkpoint pathways. She is also interested in the role of spindle microtubules in the movement of chromosomes during mitosis and the effects of drugs
  that disrupt spindle microtubule function.
