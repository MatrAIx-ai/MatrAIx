    ''Basic computer and email proficiency'']'
  hobbies: '[''Watercolor painting'', ''Traditional Mexican cooking'', ''Reading Mexican literature and art books'', ''Attending small gallery openings and community theater'', ''Gardening (herbs and flowers)'',
    ''Listening to classical music and folk songs'', ''Traveling to Mexico for cultural immersion'', ''Participating in a small book club'']'
  career_goals: Although retired from formal work, Sabrina aims to preserve and share her cultural heritage. She plans to curate a small traveling exhibit of Mexican folk art and family recipes for local
    schools and senior centers in Nashville. She is working on a memoir that intertwines her migration story with reflections on art, food, and resilience. Sabrina also hopes to mentor younger volunteers
    in documenting oral histories, to learn advanced digital photography techniques, and to contribute a monthly column to a community newsletter that celebrates Mexican‑American traditions and new artistic
    ideas.
