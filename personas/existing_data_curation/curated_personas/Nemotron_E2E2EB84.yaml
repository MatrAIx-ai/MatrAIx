personas:
  professional: Maria Rosa is a budding private investigator in California who leverages bilingual Spanish‑English interview skills, discreet surveillance, and basic digital forensics to build a reputation
    for serving immigrant families with missing‑person and fraud cases while working toward a state license.
  sports: Maria Rosa enjoys weekend hikes in the Sierra foothills, follows the Sacramento Kings basketball team and the San Francisco Giants baseball squad, and trains with the local women’s trail‑running
    club, where they prepare for seasonal half‑marathons while continuing self‑defense practice at a community gym.
  arts: Maria Rosa channels creative energy through acoustic guitar, often playing folk tunes by José González and Natalia Lafourcade, while curating a personal photography portfolio inspired by Ansel Adams
    and attending community theater productions that deepen their observational skills for case work.
  travel: Maria Rosa favors road trips to the Monterey Peninsula and Sedona for landscape photography, dreams of exploring the historic streets of Oaxaca to study local markets, and plans modest, itinerary‑driven
    journeys that blend spontaneous stops at farmers markets with careful budgeting for future agency travel.
  culinary: Maria Rosa delights in cooking traditional tamales, pozole, and fresh guacamole, carefully balancing spices like cumin, oregano, and chipotle, often incorporating heirloom corn from their garden,
    yet they occasionally over‑salt the broth when juggling case notes.
  core: Maria Rosa fuses relentless curiosity with disciplined practicality, solving puzzles by day, plotting investigations by night, never missing a sunrise hike, and despite a habit of hoarding unfinished
    crossword books, they procrastinate on filing paperwork.
background:
  cultural: Maria is a second‑generation Mexican American raised in Kerman, a close‑knit agricultural town in Madera County. Her family speaks Spanish at home and celebrates Mexican traditions such as Día
    de los Muertos and traditional holiday foods. Growing up around farmworkers and a supportive Hispanic community instilled a strong work ethic, deep respect for family ties, and an empathy for the challenges
    faced by migrant families. These cultural roots shape her compassionate yet pragmatic approach to investigative work, driving her desire to serve both her local community and broader immigrant populations.
attributes:
  skills: '[''Surveillance and covert observation'', ''Interviewing and interrogation'', ''Bilingual Spanish‑English communication'', ''Report writing and documentation'', ''Basic digital forensics'', ''Evidence
    collection and preservation'', ''Self‑defense and firearms safety'', ''Knowledge of California criminal law'', ''Local geography and mapping'', ''Analytical reasoning'', ''Case management'']'
  hobbies: '[''Reading true crime books'', ''Solving puzzles (crosswords, Sudoku)'', ''Hiking in Sierra foothills'', ''Nature photography'', ''Cooking Mexican cuisine'', ''Playing acoustic guitar'', ''Yoga
    and meditation'', ''Volunteering at local cultural festivals'']'
  career_goals: Maria aims to obtain her California private investigator license within the next year and to build a reputation for handling missing‑person, fraud, and domestic‑case investigations, especially
    for underserved immigrant families. Over the next five years she plans to start her own boutique investigative agency in the Central Valley, pursue an associate degree in criminal justice, and mentor
    other young women interested in law enforcement careers. Long‑term, she hopes to expand into cyber investigations and serve as a consultant for local law‑enforcement agencies while maintaining a balanced,
    community‑focused practice.
