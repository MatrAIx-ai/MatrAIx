  career_goals: Eugenio aims to move into an executive-level role such as Director of Operations or VP of Supply Chain within the next five years, where he can shape regional strategy and drive measurable
    efficiency gains. He is also exploring the possibility of launching his own consulting practice focused on lean process improvement for small-to-mid-size manufacturers, allowing him greater control
    over his schedule and the ability to pick projects that align with his personal interests. Achieving industry recognition through certifications and speaking at niche conferences is a further ambition.
