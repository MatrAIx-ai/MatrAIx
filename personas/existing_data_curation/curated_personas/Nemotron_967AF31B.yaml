  hobbies: '[''Reading mystery and true‑crime books'', ''Gardening (vegetables and flowers)'', ''Crocheting and knitting'', ''Jigsaw puzzles and sudoku'', ''Cooking Southern comfort food'', ''Birdwatching'',
