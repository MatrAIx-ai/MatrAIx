  career_goals: Martha aims to advance to a senior legal administrative or office manager position within her firm, where she can lead a small team of assistants and implement efficiency‑boosting workflows.
    She plans to obtain a paralegal certification to broaden her expertise and increase her value to the practice. Long‑term, she hopes to be recognized as a go‑to resource for process improvement, helping
    the firm adopt newer legal technologies while maintaining the reliable, structured support she values.
