personas:
  professional: Martha Kelley, a meticulous legal secretary with a decade of case‑file management experience, leverages their calm, competitive nature to streamline office workflows using Clio and MyCase,
    while balancing a love for predictable processes with a flexible approach that tolerates occasional disorganization as they work toward a senior office manager role.
  sports: Martha Kelley enjoys low‑impact fitness through birdwatching walks in the nearby countryside, occasional community yoga classes, and follows the New Orleans Saints (NFL) and Memphis Grizzlies
    (NBA) while participating in a small local walking club that meets twice a week, preferring solitary or small‑group activity over crowded gyms, which aligns with their personal comfort zone.
  arts: Martha Kelley indulges in mystery novels by Gillian Flynn, true‑crime books by Michelle McNamara, and listens to Dolly Parton and Brandi Carlile while crocheting and knitting for family, attends
    quiet historic society tours, and occasionally joins a small book‑club gathering, embodying their reserved yet critically discerning appreciation for storytelling and music.
  travel: Martha Kelley prefers low‑stress, well‑planned getaways such as weekend trips to the Blue Ridge Mountains, bird‑watching excursions at Audubon Wildlife Refuge, and culinary explorations in New Orleans,
    using travel agents to handle logistics while budgeting modestly and avoiding crowded tourist hotspots, which fits their desire for predictable, yet flexible, travel experiences.
  culinary: Martha Kelley excels at cooking Southern comfort dishes like fried catfish, collard greens simmered with smoked turkey, and pecan pie, often seasoning them with fresh herbs from their garden
    and a pinch of Cajun spice, while occasionally relying on pre‑made mixes when time is scarce, reflecting their love for tradition and practical flexibility.
  core: Martha Kelley is a calm, detail‑oriented legal professional who balances a love for solitary puzzles and gardening with a competitive drive for process improvement, even as they sometimes let their
    relaxed approach to planning cause minor disorganization.
background:
  cultural: 'Martha grew up in Yazoo County, a close‑knit, predominantly white community in the Deep South. Her upbringing reflects traditional Southern values: strong family ties, regular church attendance,
    hospitality, and a pragmatic work ethic. The region’s emphasis on self‑reliance, modesty, and community support informs her daily life, while her high‑school education and long‑term residence in the
    area give her a deep familiarity with local customs, Southern cuisine, and the historical context of Mississippi.'
