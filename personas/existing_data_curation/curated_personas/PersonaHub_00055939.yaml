persona_description: A historian who specializes in the study of political parties and their responses to historical challenges, particularly the impact of war on party systems. He/she is an expert in using
  extensive local and national-level records of major political parties to explore how parties sustained their organization during wartime and assess the varying impacts of war on each party and over time,
  between different regions and areas of Britain. The persona has unique knowledge and skills in analyzing the complex and multifaceted nature of political party organization and its impact on electoral
  outcomes and party development in modern British politics.
