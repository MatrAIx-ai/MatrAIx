personas:
  professional: Edith Meador, a budding mini‑architect, meticulously arranges building blocks into precise structures, balancing curiosity about new designs with a practical, disciplined approach, and quietly
    offers help to classmates who need assistance building their own creations.
  sports: Edith Meador enjoys solo swimming lessons at the community pool, quietly perfects her freestyle strokes, and occasionally cheers from the sidelines for the local Little League Tigers, preferring
    the rhythmic solitude of the water over noisy team games.
  arts: Edith Meador loves drawing detailed scenes of forests with crayons, listens to Beethoven’s Symphony No. 6 for inspiration, and watches animated films starring Tom Hanks, finding calm and creative
    expression in quiet artistic pursuits.
  travel: Edith Meador favors calm outings like a weekend nature walk through the nearby state park, has visited the aquarium in her hometown, and dreams of exploring the serene gardens of Kyoto, always
    planning trips with her parents’ careful itineraries to avoid overwhelming crowds.
  culinary: Edith Meador delights in assembling simple fruit salads of sliced apple, banana, and blueberries, enjoys the creamy comfort of mac and cheese, and occasionally helps stir batter for chocolate
    cupcakes, preferring foods that are both tidy and familiar.
  core: Edith Meador, a quiet, highly organized four‑year‑old, blends relentless curiosity with disciplined precision, finding joy in solitary creativity and compassionate sharing while rarely feeling anxious
    or sad.
background:
  cultural: Edith was born and raised in Sunnyside, Queens, a diverse neighborhood in New York City. Her family is of European-American (white) descent, with roots in the mid‑Atlantic region, and they uphold
    a traditional work ethic and emphasis on education. Growing up in a multicultural urban environment, she has been exposed to a variety of languages, foods, and celebrations, such as community block
    parties, Thanksgiving, and Christmas, while maintaining her family’s values of discipline, humility, and community service. This blend of a close‑knit family culture with the vibrant, diverse surroundings
    of Queens shapes her worldview and daily experiences.
