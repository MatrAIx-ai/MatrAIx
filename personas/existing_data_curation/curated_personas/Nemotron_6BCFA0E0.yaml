  career_goals: Even at four, Edith imagines a future where she can help others in calm, orderly environments. She expresses interest in becoming a teacher or a pediatric nurse, roles that combine her desire
    to care for people with her love of organization. She also dreams of working in a quiet, structured setting such as a library or museum, where she can maintain order and share knowledge. In the longer
    term, she hopes to lead community projects that promote kindness and tidiness.
