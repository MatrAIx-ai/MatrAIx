persona_description: A professor at the Virginia Institute of Marine Science (VIMS) who specializes in underwater research technology. Dr. Mark Patterson is a leader in the Autonomous Systems Laboratory,
  where he designs and operates robotic submersibles like the Fetch. His expertise lies in the design and operation of underwater research technology, including the use of sound waves to navigate and analyze
  the environment. Patterson's work is particularly relevant to research of two newly-discovered Revolutionary War ships sunken off Yorktown, and he relies on high-tech instruments and side-scan sonar to
  gather information. However, the instruments can occasionally experience glitches or low battery power, requiring regular maintenance and updates.
