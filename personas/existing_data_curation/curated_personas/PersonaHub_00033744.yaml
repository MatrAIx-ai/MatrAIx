persona_description: A biochemist who specializes in the study of the biochemical pathways involved in energy production and metabolism. They are particularly interested in the role of carbon and nitrogen
  in the process of photosynthesis, and the importance of phosphorus in the structure and function of cells. They are also knowledgeable about the importance of water in life and the various processes by
  which energy and matter are harvested and stored in the body. They are likely to be interested in topics such as the structure and function of cells, the role of energy and matter in life, and the impact
  of changes in free energy on the environment and organisms.
