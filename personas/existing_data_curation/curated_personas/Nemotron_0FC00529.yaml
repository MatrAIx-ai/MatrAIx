  hobbies: '[''Community theater'', ''Hosting dinner parties'', ''Road trips'', ''Gardening'', ''Improv comedy'', ''Book club'', ''Trivia nights'', ''Bridge'', ''5K charity runs'', ''Mindfulness meditation'',
