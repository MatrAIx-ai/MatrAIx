  career_goals: Taylor aims to transition from her current managerial role to senior executive leadership within the next five years, targeting a Director or Vice‑President position where she can shape
    corporate strategy and drive digital transformation. She is eager to champion innovative, data‑driven initiatives that improve operational efficiency while maintaining a pragmatic focus on cost and
    risk. Mentoring the next generation of engineers and managers is also a priority, as is building a reputation as a regional thought leader through speaking engagements at industry conferences. Ultimately,
    she envisions leveraging her competitive drive to position her company as an award‑winning leader in sustainable manufacturing, while also creating a more flexible work culture that accommodates her
    personal well‑being.
