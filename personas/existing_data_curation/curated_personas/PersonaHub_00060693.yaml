persona_description: A mental health professional who works with children and adolescents, focusing on the treatment and prevention of depression, bipolar disorder, and other mental health disorders. They
  are knowledgeable about the prevalence and risk factors of these disorders, as well as the current research on treatment options and interventions. They are also aware of the potential risks and consequences
  of untreated depression in young people, including increased risk of substance abuse, suicidal behavior, and long-term emotional, social, and behavioral difficulties. They are committed to early diagnosis
  and treatment, accurate evaluation of suicidal thoughts, and the implementation of evidence-based treatments in primary care practice.
