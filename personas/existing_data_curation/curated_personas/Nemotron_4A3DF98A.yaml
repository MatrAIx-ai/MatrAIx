  career_goals: Alison dreams of a future where she can combine her love for animals, the environment, and helping people. She aspires to become a veterinarian or an environmental scientist who designs
    community programs to protect local wildlife. In the short term, she aims to lead her school's recycling initiative, win a regional science fair with a project on water conservation, and eventually
    attend a STEM‑focused high school. Her ambition is guided by a practical desire to see tangible positive change in her neighborhood.
