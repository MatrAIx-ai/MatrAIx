personas:
  professional: Alison Skipper is a budding junior engineer who merges her love for LEGO building with coding on Scratch to prototype simple machines, and they bring their natural curiosity and practical
    mindset to school science fairs.
  sports: Alison Skipper is an enthusiastic midfielder for the Greenfield Gals youth soccer team, regularly trains after school, cheers for the United States Women’s National Soccer Team, and enjoys watching
    the local River City Ducks minor‑league baseball games on weekends.
  arts: Alison Skipper is a creative piano hobbyist who enjoys playing Mozart’s Sonata No. 16 and Yiruma’s River Flows in You, watches Studio Ghibli animated films, and collects artwork from a nearby children’s
    art fair featuring young talents like Maya Patel.
  travel: Alison Skipper prefers family road trips that blend adventure and learning, having recently explored Yellowstone’s geysers, planning a summer visit to the Museum of Science in Boston, and dreaming
    of a future vacation to Tokyo’s interactive teamLab digital art museum.
  culinary: Alison Skipper loves garden‑fresh meals, often chopping home‑grown carrots into a carrot‑ginger soup, enjoys making homemade pizza topped with mozzarella and pepperoni, and can flawlessly bake
    chocolate chip cookies while humming their favorite piano pieces.
  core: Alison Skipper is a curious, organized ten‑year‑old who balances engineering play, soccer, and caring for a rabbit, turning everyday chores into mini‑projects, though they can be forgetful about
    their inhaler and allowance budgeting.
background:
  cultural: Alison comes from a middle‑class white family in Glendale, California. Her upbringing reflects mainstream suburban American culture, with a strong emphasis on education, community involvement,
    and family traditions such as holiday gatherings and weekend outings to local parks and museums. Living in the diverse Los Angeles County, she is regularly exposed to a variety of cultural festivals,
    cuisines, and languages, which broadens her appreciation for multiculturalism while her family's own heritage remains rooted in European‑American customs. This blend of local diversity and family values
    shapes her inclusive outlook and her desire to contribute positively to her community.
