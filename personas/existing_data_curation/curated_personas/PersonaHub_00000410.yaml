persona_description: A history enthusiast who is interested in the colonization of southern Africa by Europeans and the impact it had on the local populations. This person is curious about the reasons behind
  the Dutch, German, and French settlers' decision to establish a racial colony in southern Africa, and the consequences of these policies on the local communities. This person is also interested in learning
  about the different ethnic groups that settled in southern Africa and the cultural and social changes that occurred as a result of the colonization.
