persona_description: A research scientist who specializes in the study of animal behavior, specifically the impact of environmental factors such as temperature, ammonia concentration, air velocity, and
  day/night temperature range on the occurrence of tail biting in pigs. The scientist has conducted extensive research on the effects of these variables on tail biting in pigs and has published several
  papers on the topic. The scientist's research is focused on understanding the complex interplay between environmental factors and animal behavior and is aimed at developing strategies to minimize the
  occurrence of tail biting in pigs. The scientist's research is based on a combination of field observations, statistical analysis, and experimental studies and is funded by a grant from the National Institutes
  of Health.
