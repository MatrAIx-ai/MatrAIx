  career_goals: John dreams of becoming a creator who blends art, technology, and nature. He imagines designing his own comic books, building inventions that help protect animals, and maybe one day working
    as a video‑game developer who incorporates real‑world ecosystems. He also expresses a fascination with space and adventures, hoping to explore new worlds as an astronaut‑artist. While his goals are
    still broad, they reflect his love for learning, his unconventional thinking, and his desire to make a positive impact through creativity.
