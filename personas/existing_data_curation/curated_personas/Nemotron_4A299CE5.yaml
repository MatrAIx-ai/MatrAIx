  career_goals: Haneen aims to advance from her current managerial role to a senior executive position such as Director of Operations or Vice President of Business Development within the next five years.
    She is driven to lead large‑scale transformation projects that blend innovative thinking with measurable business outcomes. To support this trajectory, she plans to pursue an executive MBA and deepen
    her expertise in emerging technologies like AI and analytics. In the longer term, she envisions launching her own boutique consultancy that helps fast‑growing companies cultivate creative cultures while
    achieving aggressive growth targets, allowing her to leverage both her competitive drive and her passion for unconventional ideas.
