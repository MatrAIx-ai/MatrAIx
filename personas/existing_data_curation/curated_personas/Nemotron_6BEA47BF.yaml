personas:
  professional: An experienced casino surveillance specialist, Dorothy Starr blends meticulous CCTV expertise, advanced video analytics, and deep knowledge of Missouri gambling regulations to design robust
    security protocols, and they now aim to lead senior surveillance management by integrating AI-driven anomaly detection and mentoring junior officers while pursuing the Certified Protection Professional
    credential.
  sports: A solitary fitness enthusiast, Dorothy Starr hikes the Ozark foothills on weekday mornings, participates intermittently with a local trail‑running club, and is a fervent supporter of the St. Louis
    Cardinals and St. Louis Blues, often watching games alone while sipping craft soda.
  arts: An avid museum‑goer, Dorothy Starr spends weekends sketching contemporary pieces at the St. Louis Art Museum, draws inspiration from Jackson Pollock and Mark Bradford, attends avant‑garde theater
    performances featuring works by Sarah Kane, and immerses themselves in the improvisational sounds of Miles Davis at local jazz venues.
  travel: Preferring solitary, well‑planned itineraries, Dorothy Starr has trekked Iceland’s volcanic landscapes, explored Florence’s art galleries, and taken weekend road trips to the Ozark National Forest,
    while dreaming of a future cultural immersion in Tokyo’s galleries and sushi alleys.
  culinary: Culinary curiosity leads Dorothy Starr to craft mushroom risotto with fresh porcini and a splash of dry white wine, savor homemade smoked paprika chicken wings, and occasionally treat themselves
    to a bourbon‑glazed pork chop, though they admit a weakness for midnight slices of pepperoni pizza that they rarely share.
  core: Dorothy Starr channels Midwestern self‑reliance into a detail‑obsessed surveillance career, solitary art pursuits, disciplined finances, and a quietly competitive streak that fuels constant personal
    improvement.
background:
  cultural: Dorothy is a White American who grew up in a middle‑class, working‑class family in the city of St. Louis, Missouri. Her heritage blends German and Irish ancestry common to the region, and she
    was raised in a community that valued hard work, self‑reliance, and modesty—qualities reflected in the Midwestern Protestant work ethic. Regular visits to the St. Louis Art Museum, the Missouri History
    Museum, and the local jazz and blues venues shaped her early appreciation for the arts. While she never completed a college degree, she attended courses in criminal justice at a community college, integrating
    that practical education with the city’s diverse cultural influences.
