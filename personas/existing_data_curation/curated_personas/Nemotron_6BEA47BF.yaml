  career_goals: Driven by her curiosity and disciplined mindset, Dorothy aims to advance into a senior surveillance management position within a major casino or security consultancy. She seeks to lead the
    integration of AI-driven anomaly detection systems, streamline operational workflows, and mentor junior officers while maintaining a high standard of performance. In the long term, she plans to obtain
    the Certified Protection Professional (CPP) credential and eventually establish her own consulting practice focused on innovative security solutions for the gambling industry.
