  hobbies: '[''Digital illustration'', ''Generative art coding'', ''Tabletop RPGs'', ''Hiking'', ''Journaling'', ''Meditation'', ''Community tech workshops'', ''Indie game streaming'', ''Sci‑fi reading'',
