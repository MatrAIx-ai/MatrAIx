  career_goals: Stephen aims to formalize his expertise by earning CompTIA A+ and Network+ certifications within the next year, eventually progressing to a Certified Systems Administrator credential. He
    envisions launching a boutique IT consulting firm that serves rural communities across Okanogan County, offering on‑site support and remote services. Parallel to his technical aspirations, Stephen is
    developing an indie video game that blends abstract visual art with narrative storytelling, hoping to release a prototype within two years. He also strives to improve his emotional resilience through
    ongoing therapy and to become an advocate for mental‑well‑being among tech professionals in isolated regions.
