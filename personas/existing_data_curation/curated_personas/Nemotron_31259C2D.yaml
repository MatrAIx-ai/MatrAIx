personas:
  professional: Stephen Sangi, a 25‑year‑old self‑taught computer technician, leverages strong hardware diagnostics, network configuration, and creative coding in Python and Bash to build custom PCs and
    automate workflows for small businesses, while they translate abstract ideas into functional solutions and their empathetic communication style makes them a sought‑after community IT consultant and
    emerging indie game developer.
  sports: Stephen Sangi channels their energetic sociability into seasonal outdoor pursuits, joining the Okanogan Trail Runners club for weekend hikes and trail runs, playing pick‑up soccer with the Grand
    Coulee Strikers, and cheering for the Seattle Seahawks and Seattle Sounders FC on game nights, while they relish the camaraderie of group activities as a source of motivation.
  arts: Stephen Sangi immerses themselves in creative expression by crafting pixel art reminiscent of early 90s video game sprites, experimenting with generative scripts inspired by Vektroid and H.R. Giger,
    hosting tabletop RPG sessions that echo the narrative style of Matt Mercer, and drawing artistic inspiration from indie game soundtracks by Jeremy Soule and the whimsical worlds of Studio MDHR, while
    they constantly seek novel visual concepts to fuel their next project.
  travel: Stephen Sangi prefers low‑key, budget‑conscious travel, having trekked the Pacific Crest Trail segment near Okanogan, explored Seattle’s indie art districts, taken a weekend road‑trip to Vancouver’s
    mountains, and dreaming of a solo pilgrimage to the Japanese cherry‑blossom festivals of Kyoto and the fjord hikes of Norway’s Lofoten Islands, while they balance adventure with the financial constraints
    of launching a consulting startup.
  culinary: Stephen Sangi enjoys the flavors of the Pacific Northwest, routinely grilling cedar‑plank salmon with a honey‑mustard glaze, savoring miso ramen bowls, baking pixel‑shaped cookies topped with
    cacao nibs, and whipping up simple stir‑fry meals that showcase locally sourced vegetables and artisanal coffee, while they occasionally indulge in noisy late‑night coffee runs as a coping ritual for
    anxiety.
  core: Stephen Sangi is a 25‑year‑old tech‑savvy artist whose boundless imagination fuels both pixel‑perfect creations and community IT support, yet their intense anxiety and habit of biting nails during
    code debugging reveal a heart constantly balancing creative fire with emotional turbulence, and they often swing between hyper‑focus and procrastination.
background:
  cultural: Stephen grew up in Tonasket, a tight‑knit agricultural community in Okanogan County, Washington. His family traces its roots to German and Scandinavian immigrants who settled the Pacific Northwest
    in the early 20th century, fostering a cultural emphasis on self‑reliance, hard work, and community support. The rural setting shaped his appreciation for the outdoors and the value of practical skills,
    while limited formal schooling prompted a self‑directed learning path through online resources. Although raised in a non‑denominational Christian household, Stephen’s worldview is largely secular, yet
    he respects the region’s Indigenous heritage and acknowledges the historical presence of the Okanogan and Wenatchee peoples on the land. His marriage and involvement in local volunteer initiatives reflect
    the communal ethos typical of small‑town American life.
