  hobbies: '[''Soccer (co-ed league)'', ''Hiking'', ''Board Games'', ''Trivia Nights'', ''Craft Beer Tasting'', ''Volunteer Food Bank Work'', ''Home Brewing'', ''Photography'', ''Cooking (Scandinavian-American
    fusion)'']'
  career_goals: Dale aims to transition from a general office clerk role to a supervisory position such as Office Manager or Administrative Team Lead within the next three to five years. He plans to complete
    a Bachelor’s degree in Business Administration, focusing on operations management, to broaden his strategic understanding. He is interested in leading projects that streamline office workflows and implement
    digital tools to increase efficiency. Long-term, Dale envisions a career in operations coordination, where he can combine his practical skills with his curiosity for new technologies, possibly overseeing
    multiple departmental functions in a mid-size organization. He also hopes to earn certifications such as Certified Administrative Professional (CAP) and Project Management Professional (PMP) to solidify
    his expertise.
