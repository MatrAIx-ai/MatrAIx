personas:
  professional: Simone Jackson, an aspiring visual artist and teenage digital illustrator, channels meticulous sketching routines and a love for jazz-inspired aesthetics into a growing online portfolio,
    while they apply the strategic discipline honed in chess to craft compelling compositions.
  sports: Simone Jackson, a member of the Amelia Court House Youth Swim Club who trains twice weekly, channels their competitive drive into disciplined interval workouts while supporting the Washington
    Nationals in baseball and staying tuned to the Washington Wizards for occasional inspiration.
  arts: Simone Jackson, a dedicated sketcher and digital painter, draws creative fuel from classic jazz album covers by Miles Davis and modern portraits by Kehinde Wiley, studies the poetry of Langston
    Hughes and Nikki Giovanni, and shares critiques on online forums, where they often reference the emotive brushwork of Jean‑Michel Basquiat.
  travel: Simone Jackson, preferring quiet weekend getaways, plans annual family trips to Shenandoah National Park for serene hikes and dreams of a solo pilgrimage to New Orleans to soak up its historic
    jazz scene, balancing careful budgeting with a yearning for cultural immersion, and they meticulously map each journey in a travel journal.
  culinary: Simone Jackson, a beginner cook who enjoys crafting simple dishes like avocado toast sprinkled with lemon zest and vanilla‑infused pancakes topped with fresh blueberries, experiments with adding
    a pinch of smoked paprika to mac and cheese, and delights in sipping herbal tea while sketching, though they sometimes forget to clean the kitchen afterward.
  core: Simone Jackson blends a fiercely organized mind and a competitive streak with a deep artistic soul, using daily journaling to navigate anxiety while they meticulously curate a sketchbook that captures
    the rhythm of jazz and the quiet of solitary walks.
background:
  cultural: Simone was raised in a close‑knit African American family in Amelia Court House, Virginia, a community with deep roots in the historic Black experience of the South. Family gatherings often
    revolve around soulful music, oral storytelling, and traditional Southern dishes, reinforcing a strong sense of identity and heritage. Her parents and grandparents emphasize the importance of education,
    resilience, and community service, values reflected in her church involvement and local volunteer activities. Growing up near historic sites related to the Civil Rights Movement and African American
    plantation history, Simone frequently visits museums and historic markers, sparking her fascination with Black art and history. These cultural influences shape her artistic vision, motivating her to
    create work that honors her ancestors while exploring contemporary Black experiences.
