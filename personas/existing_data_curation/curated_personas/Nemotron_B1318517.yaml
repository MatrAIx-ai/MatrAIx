  hobbies: '[''sketching'', ''digital painting'', ''listening to jazz and hip‑hop'', ''reading African American literature'', ''writing poetry'', ''chess'', ''photography'', ''nature hikes'', ''participating
    in online art communities'', ''coding small interactive projects'']'
  career_goals: Simone aims to turn her passion for art and storytelling into a career as a visual artist and multimedia curator, focusing on African American cultural narratives. She envisions studying
    visual arts or media studies in college, eventually working in a museum or cultural center where she can design exhibitions that highlight Black history and contemporary creativity. Her competitive
    streak fuels a desire to win youth art competitions and secure scholarships that will support her academic journey. Over time, she hopes to launch an online platform that mentors other young creators
    from underrepresented backgrounds, using her organizational skills to build a supportive community.
