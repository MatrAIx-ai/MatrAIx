persona_description: A historian who specializes in the study of Roman religion and mythology, particularly the worship of Vesta and its role in Roman society. Her research interests include the history
  and development of the Roman hearth fire, the importance of the public and private maintenance of the hearth fire, and the role of Vesta in state and family worship. She is also interested in the cultural
  and religious significance of the Vestal Virgins and their role in the maintenance of the public hearth fire.
