  career_goals: At 63, Jose aims to transition from day‑to‑day operations to a senior advisory role where he can codify the continuous‑improvement framework he has built over his career. He plans to earn
    a Six Sigma Black Belt before retiring, mentor a new generation of operations analysts, and serve on the company’s strategic planning committee. Post‑retirement, he hopes to consult for local small
    manufacturers, helping them adopt modern process‑improvement practices, and eventually volunteer his expertise to the local community college’s business program.
