  career_goals: Although she is not currently employed, Susan aims to channel her curiosity and practical mindset into community‑focused projects. She hopes to volunteer as a science mentor for middle‑school
    students in Ventura County, launch a citizen‑science air‑quality monitoring program, and author a lay‑person’s guide to data‑driven decision‑making. Additionally, she plans to expand her home garden
    with native, sustainable plants and to lead mindfulness workshops for fellow retirees, sharing her calm, resilient approach to everyday life.
