  hobbies: '[''Video gaming (soccer simulators)'', ''Watching live football (soccer) matches'', ''Listening to regional Mexican music'', ''Cooking traditional Mexican cuisine'', ''Weight training at the
    gym'', ''DIY home repairs and projects'', ''Reading Spanish‑language literature'', ''Small‑group community volunteering'']'
  career_goals: Francisco aims to earn his high‑school equivalency (GED) within the next year and enroll in part‑time community‑college courses focused on facilities management. He plans to obtain an OSHA
    10‑hour certification and a Certified Professional Cleaner credential, positioning himself for a supervisory or facilities‑coordinator role at a larger property. Over the longer term, he hopes to launch
    his own small cleaning business serving local businesses in the Central Valley, offering reliable, culturally attuned services while retaining the flexibility he values.
