personas:
  professional: Francisco Guerrero, a 22‑year‑old commercial cleaning specialist, leverages bilingual communication and hands‑on expertise in chemical safety, inventory management, and minor facility repairs
    to keep large properties running smoothly, balancing a preference for predictable workflows with a relaxed, adaptable attitude that lets them pivot when priorities shift.
  sports: Francisco Guerrero, 22, channels his love for soccer into weekend matches at the local community field and follows the San Jose Earthquakes and the San Francisco 49ers, supplementing his routine
    with weight training at Gold’s Gym to maintain stamina for his physically demanding cleaning job.
  arts: Francisco Guerrero, 22, finds artistic solace in listening to norteño and banda groups like Los Tigres del Norte while cooking, and unwinds by reading Spanish‑language novels such as Carlos Ruiz
    Zafón’s *La sombra de la viento*, occasionally attending local cultural festivals that celebrate traditional music and dance.
  travel: Francisco Guerrero, 22, prefers spur‑of‑the‑moment road trips over detailed itineraries, often loading his car for weekend getaways to Yosemite for hiking, Lake Tahoe for snowboarding, and occasionally
    traveling south to experience the vibrant Day of the Dead celebrations in Oaxaca, balancing his modest student budget with a love for cultural immersion.
  culinary: Francisco Guerrero, 22, enjoys cooking traditional dishes like tacos al pastor with pineapple‑marinated pork, rich chicken mole infused with chilies, and homemade salsas featuring tomatillos
    and serrano peppers, proudly mastering these recipes in his small kitchen while occasionally treating himself to a local taco truck for a quick bite.
  core: Francisco Guerrero, a 22‑year‑old practical yet laid‑back cleaning professional, blends a disciplined work ethic with spontaneous gaming marathons, occasional budget laxity, and a quiet devotion
    to family traditions and DIY projects.
background:
  cultural: Francisco is a first‑generation Mexican‑American born to parents who immigrated from Jalisco. He grew up in a bilingual household, speaking Spanish at home and English at school, and retains
    strong ties to Mexican traditions such as Día de los Muertos, Las Posadas, and family gatherings centered around food. His cultural identity shapes a strong work ethic, respect for family and community,
    and a love for Mexican cuisine and music. Living in Tracy, California, he participates in the vibrant local Latino community, attending cultural festivals and supporting fellow immigrants while balancing
    his American surroundings.
