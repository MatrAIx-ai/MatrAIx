personas:
  professional: Alexia Hasberry, a veteran police officer with three decades of experience, leverages data‑driven investigative interviewing, meticulous evidence collection, and calm crisis negotiation
    to lead training on procedural integrity while using their business acumen to secure grants and manage precinct budgets.
  sports: Alexia Hasberry enjoys low‑impact fitness through routine nature walks along the Congaree River, participates in a local walking club that meets on Saturday mornings, and ardently follows the
    University of South Carolina Gamecocks football and baseball teams, the Columbia Fireflies minor league baseball club, and occasionally attends Carolina Panthers games when traveling to Charlotte.
  arts: Alexia Hasberry weaves cultural stories into vivid quilts inspired by traditional folk art while singing as a soprano in their church choir, where they frequently perform hymns popularized by Mahalia
    Jackson, enjoy listening to contemporary gospel singer Tasha Cobbs, appreciate the poetry of Maya Angelou, and unwind with historical biographies by David W. Blight.
  travel: Alexia Hasberry prefers purposeful travel that blends historical learning with natural serenity, having explored the Civil Rights Trail in Montgomery, visited the historic district of Savannah,
    trekked the Blue Ridge Parkway, and plans a future pilgrimage to the coastal marshland heritage sites of the Lowcountry to deepen their genealogical research.
  culinary: Alexia Hasberry, an avid home cook, delights in crafting herb‑infused dishes such as rosemary‑garlic roasted chicken, lemon‑basil shrimp étouffée, and collard greens simmered with smoked turkey,
    while experimenting with fresh mint, thyme, and chilies harvested from their garden, though they often over‑spice recipes in pursuit of bold flavors.
  core: Alexia Hasberry balances methodical policing with nurturing quilting and gardening pursuits, constantly jotting notes in a pocket notebook, and despite a steady calm, tends to over‑schedule community
    commitments, turning organization into both a strength and an occasional source of stress.
background:
  cultural: Alexia grew up in a close‑knit African‑American community in the Midlands of South Carolina, where church, family, and storytelling were central pillars of daily life. Her grandparents were
    part of the Great Migration, instilling a strong sense of perseverance and pride in her heritage. She identifies with the Gullah/Geechee cultural legacy, valuing oral history, traditional crafts, and
    the communal spirit of Southern Black neighborhoods. Throughout her career, Alexia has drawn on this cultural foundation to bridge gaps between law enforcement and the community, emphasizing empathy,
    respect, and collaborative problem‑solving. Her marriage and long‑standing ties to the local church further reinforce a worldview rooted in collective responsibility, resilience, and the pursuit of
    social justice.
attributes:
  skills: '[''Investigative interviewing'', ''Evidence collection'', ''Crisis negotiation'', ''Firearms proficiency'', ''Tactical driving'', ''Community policing'', ''Budget management'', ''Strategic planning'',
