  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical biographies'', ''Church choir participation'', ''Mentoring at‑risk youth'', ''Genealogy research'', ''Nature walks'']'
  career_goals: Alexia aims to advance to a senior supervisory role, such as Lieutenant, where she can shape department policy and champion data‑driven policing initiatives that strengthen trust between
    law enforcement and the Black community in Richland County. She is passionate about developing a community outreach program focused on youth mentorship and crime prevention, leveraging her organizational
    skills to secure funding and build partnerships with local churches and schools. Long‑term, she envisions transitioning into a consultancy role after retirement, advising municipalities on equitable
    policing practices and offering guest lectures at the University of South Carolina’s criminal justice program. Throughout, she remains committed to fostering an inclusive workplace that values compassion
    and resilience.
