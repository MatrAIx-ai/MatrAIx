  hobbies: '[''Industrial Photography'', ''Visiting Art Galleries'', ''Community Theater'', ''Model Ship Building'', ''Woodworking'', ''Acoustic Guitar'', ''Fishing'', ''Documentary Watching'']'
  career_goals: David aims to transition from skilled labor to a supervisory role within the next five years, pursuing a foreman certification and OSHA trainer credentials. He hopes to mentor apprentices
    and eventually start his own small contracting firm that combines his love of steelwork with design aesthetics, offering custom metal art installations for residential and commercial projects. He is
    also interested in learning basic architectural drafting to bridge the gap between engineering and artistic expression.
