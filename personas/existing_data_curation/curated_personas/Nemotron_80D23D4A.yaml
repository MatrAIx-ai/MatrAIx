personas:
  professional: David Clegg is a seasoned structural steel specialist with over three decades of hands‑on experience in MIG/TIG welding, blueprint reading, and crane operation, who blends meticulous safety
    compliance with a burgeoning artistic vision, mentoring apprentices while preparing for foreman certification and dreaming of a boutique contracting firm that fuses metalwork with custom art installations.
  sports: David Clegg enjoys weekend fishing at the nearby Reservoir Park, is a loyal fan of the Pittsburgh Steelers, follows the Cleveland Browns during football season, supports the Pittsburgh Penguins
    for hockey, and belongs to the local Mid‑Ohio Fly Fishing Club, while occasionally joining a senior pick‑up basketball league for light cardio.
  arts: David Clegg is an avid photographer of abandoned factories and historic shipyards, draws inspiration from Ansel Adams and the Becher twins, frequents the Cleveland Museum of Art and community theater
    productions like Our Town, strums acoustic guitar versions of Bob Dylan classics, and meticulously builds scale model ships such as the USS Constitution.
  travel: David Clegg plans his travel with a photographer’s eye, having journeyed to Sheffield’s steel museums, the Ruhr Valley’s industrial heritage sites, and the historic shipyards of Nantes, while
    also logging weekend road trips to the Adirondack lakes for fishing, and he dreams of a future study tour of Barcelona’s modernist architecture to spark his drafting ambitions.
  culinary: David Clegg prefers hearty, fish‑focused meals; he often grills freshly caught trout with dill and lemon, crafts smoky salmon pâté for brunch, seasons a rustic lamb stew with rosemary and garlic,
    and enjoys perfecting a crisp fish‑and‑chips recipe using locally sourced cod, all while experimenting with occasional Vietnamese pho for a global twist.
  core: David Clegg merges steel‑craft mastery with a photographer’s curiosity, balancing disciplined work safety, modest finances, modest health quirks, and a passion for fishing, model ships, and artistic
    expression into a uniquely industrious yet reflective life.
background:
  cultural: David grew up in Bethlehem, Pennsylvania, a former steel-town that shaped his work ethic and community values. His family is rooted in the region’s multi-generational, working-class culture,
    with a blend of German and Irish ancestry common in Lehigh County. He identifies with the Mid-Atlantic industrial heritage, valuing self-reliance, craftsmanship, and collective responsibility. Despite
    the decline of the steel industry, he remains connected to local traditions—such as the annual Steel Heritage Festival—and maintains ties to his neighborhood church, which emphasize solidarity and service.
