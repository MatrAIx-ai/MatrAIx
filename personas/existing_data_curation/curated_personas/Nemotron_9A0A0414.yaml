personas:
  professional: An organized community arts facilitator, Karen Sweatman leverages their methodical event‑planning skills, boundless imagination, and sociable charisma to design inclusive workshops, coordinate
    volunteer art fairs, and mentor emerging creators in Pensacola.
  sports: A devoted fan of the Tampa Bay Buccaneers and Rays, Karen Sweatman blends casual fitness with community dance by joining line‑dancing classes at the local community center, taking weekly beachfront
    jogs during summer, and participating in a Saturday morning yoga club at Pensacola Beach, all scheduled with their trademark precision.
  arts: An eclectic arts enthusiast, Karen Sweatman paints abstract Gulf‑Coast landscapes inspired by the color palettes of Mark Rothko, quilts intricate designs while humming harmonies from the Philadelphia
    Boys Choir, devours poetry by Ocean Vuong, and finds inspiration in the storytelling of Neil Gaiman and the music of Alabama Shakes.
  travel: A meticulous planner with a love for cultural immersion, Karen Sweatman has explored New Orleans’ jazz festivals, strolled the historic streets of Savannah, voyaged to Seville for its vibrant
    flamenco scene, and now dreams of a road trip along the Pacific Northwest coast, balancing short weekend getaways with a future week‑long retreat in the Scottish Highlands.
  culinary: A seasoned home chef, Karen Sweatman whips up Southern comforts like shrimp étouffée, fried catfish with hush‑puppy batter, and creamy grits seasoned with garden‑grown thyme and cayenne, while
    experimenting with add‑on flavors from smoked paprika to bourbon caramel, delighting guests at potluck gatherings and documenting recipes on a vibrant Instagram feed.
  core: Karen Sweatman is a hyper‑social, creatively wired planner who often channels late‑night paint‑fueled bursts into community projects, yet sometimes overbooks their calendar, sacrificing sleep for
    the next big art fair.
background:
  cultural: Karen was raised in a tight‑knit, middle‑class family in Pensacola, Florida, where Southern hospitality and Gulf Coast traditions shaped her worldview. Her upbringing was steeped in community
    values, with frequent involvement in church activities, neighborhood block parties, and local festivals celebrating seafood and maritime heritage. The presence of the nearby Naval Air Station introduced
    a respectful attitude toward service and discipline, while the region's coastal environment fostered a love for outdoor pursuits like gardening and beach walks. These cultural influences combine with
    her personal emphasis on harmony, creativity, and social connection to inform her community‑focused lifestyle.
attributes:
