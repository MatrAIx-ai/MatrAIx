    Speaking'']'
  hobbies: '[''Painting'',''Quilting'',''Poetry Writing'',''Choir Singing'',''Gardening'',''Southern Cooking'',''Potluck Hosting'',''Line Dancing'',''Book Club Participation'',''Attending Music Festivals'']'
  career_goals: Karen aims to obtain her GED within the next year and subsequently enroll in a community college program focusing on arts administration. She envisions transitioning into a part‑time role
    as a community art facilitator, where she can design workshops, organize local art fairs, and mentor younger participants. In the longer term, she aspires to launch a small home‑based boutique selling
    handcrafted home décor and to eventually manage a community center that offers creative and educational programs for families in Pensacola.
