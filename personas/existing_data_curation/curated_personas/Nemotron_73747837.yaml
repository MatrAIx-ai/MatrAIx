  career_goals: Jessica aims to advance from her current counter role to shift supervisor within the next 12 months, then to restaurant manager within three years. Her long‑term ambition is to own a neighborhood
    café or food‑truck that blends classic comfort foods with experimental twists, leveraging her curiosity for new culinary ideas while maintaining practical operations. She plans to enroll in a bachelor’s
    program in hospitality management to deepen her expertise, and aspires to become a mentor and trainer for front‑of‑house staff, shaping a supportive workplace culture that values employee well‑being.
