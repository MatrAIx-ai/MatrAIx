persona_description: John Edel, an American entrepreneur who founded The Plant, a vertical farm initiative on Chicago's South Side. Edel is passionate about sustainable food production and has developed
  a concept for urban agriculture, using techniques such as hydroponics and aquaponics. He aims to create a zero-waste farm that produces food sustainably and offers tours and lectures to educate the public
  and local community on how to grow food in urban environments.
