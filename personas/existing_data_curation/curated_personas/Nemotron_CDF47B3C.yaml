  career_goals: At 60, Holland aims to shift from daily construction work toward a legacy‑building phase. She plans to open a modest community workshop where she can produce limited‑edition reclaimed‑wood
    furniture, teach hands‑on woodworking classes, and mentor the next generation of carpenters. Holland also wants to incorporate some modern technology, such as a small CNC router, to blend traditional
    craft with contemporary design. Over the next five years she hopes to become a certified home‑remodeling contractor, expand her client base in the Quincy area, and participate in regional historic‑preservation
    projects, all while maintaining a flexible schedule that allows her time for family and community activities.
