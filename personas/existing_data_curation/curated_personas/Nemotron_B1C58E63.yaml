personas:
  professional: Jose Rodriquez, a 16‑year‑old visual storyteller, leverages their graffiti roots, bilingual fluency, and self‑taught digital illustration skills to craft eye‑catching social media content
    while channeling a competitive drive that keeps them constantly tweaking designs despite a laid‑back, sometimes disorganized workflow.
  sports: Jose Rodriquez spends weekends skateboarding at downtown skate parks, tags the local high school basketball team – the Long Island Titans – as their favorite, follows the New York Knicks and New
    York Islanders for professional inspiration, and they prefer spontaneous street sessions over regimented gym routines.
  arts: Jose Rodriquez fuses graffiti tags, digital illustration, and rapid‑fire rap verses into TikTok clips, drawing sonic influence from Bad Bunny, Kendrick Lamar, and The Strokes, while their love for
    graphic novels like "Saga" fuels a visual language that blends bold colors, urban grit, and the nostalgic flavors of family‑cooked pupusas and tamales, and they often experiment with new analog drawing
    tools to keep the process fresh.
  travel: Jose Rodriquez dreams of a low‑budget road trip to the vibrant murals of Mexico City and the street art districts of Berlin, but currently explores hidden corners of Long Island’s coast on a borrowed
    bike, and they plan trips on a mix of spontaneous Instagram finds and a modest savings stash that forces them to balance adventure with family responsibilities.
  culinary: Jose Rodriquez whips up handmade pupusas stuffed with queso fresco and curtido alongside arroz con pollo on weekend family nights, proudly calling themselves a budding home‑cook who can perfectly
    season corn masa with achiote and lime, yet they often burn toast while multitasking between sketching murals and editing videos.
  core: Jose Rodriquez is a 16‑year‑old street‑art enthusiast whose competitive spark fuels nonstop creation, even as their relaxed, sometimes disorganized habits lead to missed deadlines, impulsive spending,
    and occasional allergy flare‑ups, and they often juggle multiple projects at once.
background:
  cultural: Jose was raised in a close‑knit Salvadoran household in Rockville Centre, where Spanish is spoken at home and family gatherings revolve around traditional foods like pupusas, tamales, and arroz
    con pollo. Celebrations such as Día de los Faroles and Salvadoran Independence Day are marked with music, dance, and community potlucks, reinforcing his sense of cultural pride. While he navigates the
    suburban environment of Nassau County, his heritage informs his artistic palette, leading him to incorporate vibrant Central American motifs into his graffiti and digital designs. This blend of Salvadoran
    roots and American suburban life shapes his worldview, fueling both his curiosity about diverse artistic expressions and his competitive drive to stand out.
