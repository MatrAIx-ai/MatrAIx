  hobbies: '[''sketching'', ''creating TikTok videos'', ''skateboarding'', ''listening to hip‑hop and reggaeton'', ''cooking Salvadoran dishes'', ''exploring street art'', ''collecting vinyl records'']'
  career_goals: Jose aims to turn his artistic curiosity into a career as a graphic designer or digital content creator who blends urban street aesthetics with his Salvadoran heritage. He dreams of gaining
    a portfolio that could secure an apprenticeship at a local design studio or a scholarship to a specialized art program after high school. Long‑term, he hopes to launch a community art space in Rockville
    Centre where teens can explore unconventional media, collaborate on murals, and learn basic tech skills, aligning his competitive drive with a desire to give back to his neighborhood.
