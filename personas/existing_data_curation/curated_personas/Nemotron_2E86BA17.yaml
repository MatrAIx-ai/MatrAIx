personas:
  professional: Autumn Johnson, a 26‑year‑old skilled tradesperson specializing in electrical, HVAC, and plumbing systems, blends meticulous troubleshooting with a cooperative, community‑first mindset,
    making them a reliable lead on complex installations and a natural mentor for apprentices.
  sports: Autumn Johnson spends weekends hiking the Kankakee River State Park trails, training with the Illinois Trail Running Club for seasonal 5K races, rooting for the Chicago Cubs and the Chicago Bulls,
    and balancing outdoor enthusiasm with off‑season indoor rock‑climbing at a local gym.
  arts: Autumn Johnson regularly attends the Prairie Theatre’s community productions, curates a modest vinyl collection featuring John Prine, The Avett Brothers, and Miranda Lambert, and spends quiet evenings
    painting rural landscapes while listening to folk‑rock playlists, allowing artistic expression to complement their hands‑on DIY pursuits.
  travel: Autumn Johnson prefers meticulously planned road trips that blend scenic hikes with cultural stops, having explored Mackinac Island’s historic sites, taken a culinary weekend in Nashville, and
    dreaming of a cross‑country adventure to Banff National Park, all while budgeting carefully to keep travel costs within a modest yearly allowance.
  culinary: Autumn Johnson enjoys experimenting with farm‑to‑table dishes, mastering a rustic roasted beet and goat‑cheese salad, an occasional homemade sourdough loaf, and a hearty Midwest pot roast with
    heirloom carrots and thyme, showcasing an intermediate cooking skill level that balances precise recipe adherence with creative improvisation.
  core: Autumn Johnson is a pragmatic DIY enthusiast who can’t resist a Saturday‑morning power‑tool sale, but often forgets to water the garden until the last minute, revealing a blend of industriousness
    and endearing absent‑mindedness.
background:
  cultural: Autumn grew up in a small, predominantly white Midwestern town in Illinois, where community ties, modesty, and a strong work ethic are deeply valued. Her upbringing emphasized self‑reliance,
    neighborly cooperation, and pragmatic problem‑solving, traits reflected in her practical approach to both work and leisure. The local culture’s blend of agricultural roots and small‑town industry shaped
    her appreciation for hands‑on skills and collaborative community involvement.
attributes:
  skills: '[''Electrical wiring'', ''HVAC system installation'', ''Plumbing repairs'', ''Preventive maintenance'', ''Equipment diagnostics'', ''Blueprint reading'', ''Safety compliance'', ''Use of hand
    and power tools'', ''Customer communication'', ''Time management'', ''Team coordination'', ''Documentation and reporting'']'
  hobbies: '[''Vegetable gardening'', ''Home cooking'', ''DIY home improvement'', ''Hiking'', ''Community volunteering'', ''Reading technical manuals'', ''Puzzle solving'']'
  career_goals: Autumn aims to earn her journeyman electrician license and become a certified HVAC technician within the next two years. She aspires to take on lead technician roles, overseeing larger projects
    and training new apprentices. Long‑term, she hopes to establish her own Midwest‑based service company specializing in energy‑efficient installations, allowing her to balance professional growth with
    a stable schedule to support her personal life.
