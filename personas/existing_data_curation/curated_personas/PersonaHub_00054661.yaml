persona_description: A paramedic who works in an emergency department and is responsible for assessing and treating patients in a high-pressure environment. They are trained to recognize and respond to
  the signs and symptoms of injuries sustained during motor vehicle accidents, particularly those related to airbag deployment. They are also knowledgeable about the mechanisms of action and deployment
  of airbags and their potential risks and benefits. They are familiar with the importance of proper positioning of the driver and passenger in the event of an airbag deployment and the need for appropriate
  imaging to rule out serious chest wall injuries.
