  career_goals: Gerald aims to move into an IT management role within the next three to five years, where he can combine his technical expertise with his talent for leading people. He plans to earn industry
    certifications such as CompTIA Network+, Security+, and Cisco CCNA to solidify his credentials. In the longer term, he envisions launching a boutique IT consultancy that offers structured, proactive
    support to small businesses in Brooklyn, leveraging his desire for predictability and his strong community ties. He also seeks to build a supportive team environment that reduces workplace stress and
    promotes professional growth for his staff.
