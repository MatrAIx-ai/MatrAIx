    volunteering'']'
  career_goals: Although retired from formal teaching, Sonmi aims to stay intellectually active by documenting her life story in a memoir that weaves together personal history, art, and culinary traditions.
    She plans to curate a modest traveling exhibition of her calligraphy and family recipes for local senior centers and community festivals in Queens. Sonmi also hopes to volunteer as a mentor for emerging
    Asian‑American artists, lead small‑group art‑therapy sessions, and eventually travel to her ancestral hometown in Hong Kong to deepen her cultural roots and share her experiences with her grandchildren.
