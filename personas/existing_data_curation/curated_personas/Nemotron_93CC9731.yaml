personas:
  professional: Sonmi Shiu, a retired language‑arts teacher, leverages three decades of curriculum design and bilingual expertise to lead community workshops that blend brush calligraphy, tea ceremony,
    and strategic board games, channeling a calm yet competitive spirit into every lesson.
  sports: Sonmi Shiu supports the New York Knicks and the New York Yankees, participates in a senior walking club that meets at Flushing Meadows‑Corona Park each Saturday, and enjoys gentle matches of Go
    and chess at the community center, seeing these low‑impact activities as both mental and physical exercise.
  arts: Sonmi Shiu immerses themselves in modern contemporary art from the Pacific region, savoring installations by Takashi Murakami, the minimalist brushwork of Zao Wou‑Ki, and the vibrant canvases of
    Wang Guangyi, while also finding solace in the lyrical piano compositions of Ludovico Einaudi and the storytelling of stage actress Jane Alexander.
  travel: Sonmi Shiu cherishes leisurely trips to nearby cultural spots like the Brooklyn Museum and historic neighborhoods of Old Town Queens, has journeyed to Kyoto and Florence for their art scenes,
    and dreams of a pilgrimage to Hong Kong to explore their ancestral hometown and capture street life through their camera lens.
  culinary: Sonmi Shiu delights in crafting fusion recipes that marry traditional dim sum staples—steamed shrimp har gow, soy‑glazed bok choy—with contemporary twists such as miso‑infused carrots and quinoa‑filled
    buns, often seasoning dishes with ginger, star anise, and toasted sesame oil while documenting each experiment in a handwritten notebook.
  core: Sonmi Shiu is a curious, calm octogenarian who blends teaching wisdom, artistic pursuits, and strategic games into a life of quiet competition, occasional disarray, and a steadfast love for tea,
    brush calligraphy, and mindful creativity.
background:
  cultural: Sonmi was born in Hong Kong in 1946 and emigrated to the United States in the early 1970s after completing a bachelor's degree in education in Taiwan. She grew up in a multilingual household
    speaking Cantonese, Mandarin, and English, and she maintains strong ties to the vibrant Chinese diaspora in Queens, New York. Sonmi celebrates Lunar New Year, the Mid‑Autumn Festival, and other traditional
    customs, and she upholds values of filial piety, community service, and respect for artistic heritage. Her upbringing immersed her in tea culture, calligraphy, and the culinary arts, which continue
    to shape her personal and community engagements.
