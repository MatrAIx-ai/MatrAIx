personas:
  professional: Sharon Morris is an aspiring preschool teacher who loves storytime at the Germantown Library, using her curiosity about dinosaurs and space, her practical knack for organizing LEGO structures,
    and her friendly, cooperative nature to lead pretend classroom games with classmates.
  sports: Sharon Morris thrives on outdoor games like tag and hide‑and‑seek at the local park, proudly wears a Germantown Tigers youth soccer jersey, cheers for the Memphis Grizzlies and Tennessee Titans
    on family TV nights, and treats every swing set session as a mini‑fitness routine.
  arts: Sharon Morris expresses creativity through drawing dinosaurs, building LEGO castles, dancing to Taylor Swift’s pop‑country hits and Raffi’s children’s songs, and eagerly participates in art‑and‑craft
    workshops at the library where they admire the works of Disney’s animators.
  travel: Sharon Morris loves family road trips to the Memphis Zoo and the Great Smoky Mountains, dreams of visiting Walt Disney World in Orlando and the Eiffel Tower in Paris, and prefers itineraries that
    blend picnic barbecues with plenty of playground time, though trips are always planned by their parents.
  culinary: Sharon Morris delights in homemade barbecue ribs, buttery cornbread, apple pie slices, and mac and cheese, often helps stir batter for chocolate chip cookies, and insists on adding a splash
    of honey to their strawberry‑shortcake dessert.
  core: Sharon Morris is a curious, energetic six‑year‑old who thrives on group play, loves dinosaurs and LEGO, and occasionally misplaces their school supplies.
background:
  cultural: Sharon grows up in Germantown, Tennessee, a suburban community near Memphis known for its family‑friendly atmosphere and Southern hospitality. Her family embraces local traditions such as weekend
    barbecues, homemade pies and cornbread, and regular attendance at a nearby Methodist church. Community events like the Germantown Greenway festivals, summer concerts, and library storytimes shape her
    love for music, outdoor activities, and shared learning experiences. These influences blend mainstream American childhood experiences with regional Southern values of neighborliness, family togetherness,
    and a warm, inclusive community.
