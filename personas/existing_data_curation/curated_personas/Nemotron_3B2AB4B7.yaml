  career_goals: Even at six, Sharon loves dreaming about the future. She often says she wants to become a veterinarian because she cares for the neighborhood kittens and dogs she meets at the park. She
    also imagines being a teacher, inspired by her enjoyment of storytelling and helping friends learn new games. Occasionally, she talks about being a chef, eager to assist her parents in the kitchen and
    create tasty treats. These aspirations blend her curiosity, kindness, and practical desire to make a positive difference.
