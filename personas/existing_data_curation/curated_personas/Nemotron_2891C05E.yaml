personas:
  professional: Sylvia Ponce, an aspiring mini-architect, channels her meticulous organization and boundless imagination into building elaborate LEGO cityscapes that demand flawless symmetry and novel designs.
  sports: Sylvia Ponce, a devoted fan of the New York Knicks and New York Yankees, spends Saturday mornings at a local kids' soccer club where she rigorously practices dribbling drills, preferring solo
    skill challenges over team play and relishing the competitive thrill of scoring the winning goal.
  arts: Sylvia Ponce, a budding storyteller and sketch artist, immerses herself in vibrant illustrations of Carnival masks and sings along to the lively rhythms of Juan Luis Guerra and Daddy Yankee, drawing
    inspiration from family folklore to create elaborate picture books.
  travel: Sylvia Ponce dreams of exploring the bustling streets of Manhattan's Little Italy and the colorful markets of San Juan, enjoys planning family trips with meticulously drawn itineraries, but balances
    her wanderlust with a preference for short, child-friendly adventures that fit within her parents' schedule.
  culinary: Sylvia Ponce delights in the sweet taste of mango-filled empanadas and the savory comfort of mangú with sautéed onions, often helps her mother mash plantains with a wooden spoon while sprinkling
    a pinch of cilantro, yet she stubbornly refuses to try broccoli, insisting it ruins the perfect flavor balance.
  core: Sylvia Ponce is a disciplined little dreamer who lines up her crayons by hue, insists on flawless drawings before showing them, and quietly competes with siblings for bedtime story supremacy, all
    while staying calm when plans go awry.
background:
  cultural: Sylvia is raised in a Dominican household in New York City. She speaks both Spanish and English at home and celebrates Dominican traditions such as Independence Day and Carnival. Family meals
    often feature dishes like mangú and arroz con habichuelas, and her parents share Dominican folklore and music, which enrich her imagination and inspire many of her stories and artworks.
attributes:
  skills: '["early reading comprehension", "counting to 20", "vivid storytelling", "detailed drawing and color mixing", "organizing toys and art supplies", "building with blocks", "solving age‑appropriate
    puzzles"]'
  hobbies: '["drawing and coloring", "building with LEGO and wooden blocks", "reading picture books", "listening to music (including merengue and children''s songs)", "exploring Central Park", "collecting
    stickers", "pretend play with dolls and action figures"]'
  career_goals: Sylvia dreams of becoming a storyteller or visual artist who creates worlds that surprise and delight people. She often says she wants to draw pictures that come to life, write books with
    magical characters, or design whimsical buildings. She is competitive about winning school art contests and hopes to be recognized for her creativity and high standards.
