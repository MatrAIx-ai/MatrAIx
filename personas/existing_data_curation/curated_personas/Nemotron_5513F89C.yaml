  career_goals: Vijay aspires to turn his passion for visual storytelling into a professional career. He envisions attending a specialized art‑and‑technology program—such as a BFA in Concept Art or a degree
    in Interactive Media—where he can refine his portfolio and learn industry pipelines. In the short term, he aims to win national digital‑art contests, secure freelance commissions, and launch an indie
    game prototype that showcases his own concept art and generative‑design tools. Long‑term, he hopes to work as a senior concept artist for a major game studio or to become an independent creator who
    publishes graphic novels and experimental interactive experiences under his own brand. His competitive drive pushes him to set measurable milestones, such as earning a scholarship for a summer art residency
    and growing a Patreon community of supporters who appreciate his unique aesthetic.
