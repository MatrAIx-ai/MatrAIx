personas:
  professional: Antonio Tadesse runs a low‑key neighborhood handyman service, leveraging decades of carpentry, plumbing, electrical and automotive repair skills, while their curious yet pragmatic mindset
    lets them devise cost‑effective fixes, even if their loosely organized schedule sometimes forces last‑minute improvisations.
  sports: Antonio Tadesse tracks the Cleveland Guardians’ baseball season and rallies for the Cavaliers, while staying fit by joining a weekend adult softball league and hitting the lakeshore for early‑morning
    fishing sessions that double as low‑impact cardio.
  arts: Antonio Tadesse unwinds to live jazz at Cleveland’s historic clubs, relishing sets by artists like Miles Davis and B.B. King, while their woodworking hobby crafts decorative pieces inspired by the
    improvisational rhythms they hear.
  travel: Antonio Tadesse prefers spontaneous road trips across the Midwest, routinely weekend‑hopping to Lake Erie’s fishing spots and the historic streets of Niagara, while dreaming of a summer bike‑tour
    through the vineyards of Tuscany when finances allow.
  culinary: Antonio Tadesse experiments in the kitchen, seasoning classic Southern fried chicken and collard greens with fragrant spices like smoked paprika and a hint of berbere, producing a signature
    comfort‑food fusion that reflects their moderate cooking skill and love for bold flavors.
  core: Antonio Tadesse blends a handyman’s practicality with a restless curiosity, juggling tool‑shelf chaos, a love for late‑night jazz, and a skeptical, competitive edge that keeps them constantly improving.
background:
  cultural: Antonio is a second‑generation Ethiopian American who grew up in Cleveland’s Old Brooklyn neighborhood. His family maintains Ethiopian traditions such as the coffee ceremony, Amharic language
    use, and celebration of Orthodox Christian holidays, while he also embraces the broader African‑American culture of the city, participating in church activities, local soul‑food gatherings, and community
    festivals. This dual heritage shapes his worldview, giving him a deep appreciation for both Ethiopian customs and the rich cultural tapestry of Cleveland’s Black community.
