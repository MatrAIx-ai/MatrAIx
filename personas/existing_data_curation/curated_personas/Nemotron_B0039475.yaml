  career_goals: Although not currently employed, Antonio aims to channel his practical expertise into a low‑key neighborhood handyman service, offering affordable repairs and renovations to seniors and
    low‑income families. He hopes to earn a certification in residential solar panel installation so he can promote sustainable energy in his community. Additionally, he aspires to start a community garden
    where he can teach gardening, budgeting, and basic carpentry to local youth, eventually establishing a nonprofit that provides hands‑on skill training and mentorship.
