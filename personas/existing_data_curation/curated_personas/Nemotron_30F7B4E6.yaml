  hobbies: '[''Zumba'', ''Pottery'', ''Community Volunteering'', ''Coffee Shop Hopping'', ''Reading Contemporary Romance'', ''Community Theater'', ''Gardening'']'
  career_goals: Barbara aims to leverage her practical experience and curiosity for improvement into a supervisory role within office administration. Over the next three years, she plans to complete an
    associate degree in Business Administration at a local community college and obtain a Certified Administrative Professional (CAP) credential. She hopes to become an Office Manager or Front‑Desk Supervisor,
    eventually expanding into operations coordination where she can lead process‑improvement projects, introduce digital tools, and mentor new reception staff. She also envisions participating in community
    outreach programs through her employer, blending her sociable nature with professional growth.
