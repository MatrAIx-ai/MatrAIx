personas:
  professional: David Bourgeault, a veteran residential painter and paperhanger, leverages three decades of mastery in surface preparation, color consultancy, and precise application while their routine‑oriented
    yet flexible mindset fosters meticulous client communication and a relaxed approach to crew scheduling.
  sports: David Bourgeault stays active through daily dog walks, Saturday fishing trips on Cayuga Lake, occasional pick‑up basketball games at the town community center, and cheers for the Rochester Red
    Wings and Buffalo Bills, favoring functional recreation over formal gym routines.
  arts: David Bourgeault expresses creativity through woodworking birdhouses and small furniture while listening to classic rock icons like The Eagles and folk storytellers such as Bob Dylan, and they regularly
    attend local church concerts and the annual Cayuga County Craft Fair for artistic inspiration.
  travel: David Bourgeault prefers low‑key, purpose‑driven trips, often combining weekend fishing excursions to the Adirondacks with visits to Finger Lakes wineries, and their travel bucket list includes
    a nostalgic Route 66 road trip and a folk‑music pilgrimage to the Edinburgh Festival in Scotland.
  culinary: David Bourgeault delights in cooking garden‑fresh vegetable medleys, pan‑seared trout from their lake catches, and classic comfort dishes like chicken pot pie, seasoning with rosemary and basil
    from their herb garden, and they occasionally host backyard barbecues featuring locally sourced pork ribs.
  core: David Bourgeault is a routine‑loving, community‑focused painter who blends practical craftsmanship with a quiet passion for gardening, fishing, and classic folk music, occasionally misplacing tools
    but never missing an opportunity to lend a hand, and they always greet neighbors with a warm smile.
background:
  cultural: David descends from a French‑Canadian‑American lineage; the Bourgeault name traces back to Quebec settlers who migrated to upstate New York in the early 20th century. Raised in the rural towns
    of Cayuga County, he grew up in a close‑knit, predominantly white, working‑class community where Catholic traditions, seasonal harvest celebrations, and a strong ethic of neighborly help were central.
    These cultural roots reinforce his practical, routine‑driven outlook and his deep desire to support his community.
attributes:
  skills: '[''Residential interior painting'', ''Exterior painting and siding preparation'', ''Wallpaper installation and removal'', ''Drywall repair and patching'', ''Surface preparation including sanding
