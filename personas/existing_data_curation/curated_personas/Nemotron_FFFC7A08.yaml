    and service'', ''Team coordination and apprentice mentorship'', ''Basic carpentry for trim and molding'']'
  hobbies: '[''Gardening'', ''Fishing at Cayuga Lake'', ''Woodworking (birdhouses, small furniture)'', ''Playing cards with friends and family'', ''Listening to classic rock and folk music'', ''Reading
    home‑improvement and DIY magazines'', ''Volunteering for community painting projects'', ''Attending local church events'', ''Walking his dog'', ''Seasonal pumpkin carving'']'
  career_goals: David aims to solidify a steady client base that provides predictable work throughout the year, expand his use of eco‑friendly paints, and launch a modest mentorship program for younger
    tradespeople in Cayuga County. Over the next five years he hopes to earn a Green Painter certification, incorporate a small supply corner for local DIYers, and gradually shift toward advisory and community‑service
    projects, ensuring a smooth transition to retirement while keeping the business running for his family.
