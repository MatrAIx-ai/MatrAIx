  career_goals: Monica aims to secure a full‑time administrative role within a community‑focused organization where she can apply her structured approach and reliable work ethic. She seeks a position that
    offers clear responsibilities, a predictable schedule, and opportunities to support program operations for families and underserved neighborhoods. Over the next five years she plans to complete a bachelor’s
    degree in Human Services, moving toward a program coordinator or manager role that blends her organizational strengths with her passion for community advocacy and empowerment. Financial stability and
    the ability to provide for herself and her extended family are also central motivations.
