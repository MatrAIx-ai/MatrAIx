  hobbies: '["Exploring food trucks", "Cooking Vietnamese cuisine", "DIY electronics (Arduino, Raspberry Pi)", "Home lighting automation projects", "Yoga", "Hiking in San Jacinto Mountains", "Community
    dance workshops"]'
  career_goals: Phuong aims to become a master electrician within the next five years, pursuing additional licensing and certifications in renewable energy and advanced low‑voltage systems. She envisions
    eventually launching her own small contracting firm that specializes in eco‑friendly retrofits and smart‑home integrations for homeowners in Riverside County. While ambitious, she is mindful of her
    tendency toward stress and seeks to build a business model that offers flexible scheduling, collaborative crews, and regular time for self‑care.
