personas:
  professional: Phuong Huynh, a certified journeyman electrician in Southern California, leverages their hands‑on expertise in residential wiring and the California Electrical Code to deliver efficient
    installations while constantly tinkering with smart‑home prototypes, though they often wrestle with tight project deadlines due to their spontaneous workflow.
  sports: Phuong Huynh enjoys weekend hikes in the San Jacinto Mountains with the Riverside Trailblazers club, follows the Los Angeles Lakers for basketball and the LA Rams for football, and balances cardio
    sessions with occasional yoga flow to counter the physical toll of long hours on ladders.
  arts: Phuong Huynh frequently attends community dance workshops that fuse modern K‑pop hits by BTS with traditional folk steps, curates playlists featuring Sia, Bad Bunny, and indie band Vampire Weekend
    while occasionally catching indie film screenings at the Riverside Art House.
  travel: Phuong Huynh prefers spontaneous road trips over rigid itineraries, has explored the street food stalls of Tokyo and the coastal cliffs of Big Sur, and dreams of a summer backpacking adventure
    through New Zealand’s South Island, all while balancing a modest travel budget with occasional weekend getaways.
  culinary: Phuong Huynh delights in cooking pho broth simmered with star anise and ginger, assembling bánh mì with crisp pickled carrots, cilantro, and charred pork, while also scouting LA food trucks
    for Korean‑style tacos and experimenting with avocado‑lime salsa in their home kitchen.
  core: Phuong Huynh is a 26‑year‑old electrician who blends a love for smart‑home tinkering with a fierce appetite for street‑food adventures, yet their spontaneous nature often clashes with deadline pressure,
    leading to occasional stress‑induced coffee binges.
background:
  cultural: Phuong is a second‑generation Vietnamese‑American whose parents immigrated to California in the early 1990s. She grew up in a tight‑knit Vietnamese community in Inland Empire, celebrating holidays
    like Tet and observing customs such as offering respect to elders. Bilingual in English and Vietnamese, she balances the collectivist values of her heritage—family loyalty, modesty, and community support—with
    the individualistic, pragmatic mindset nurtured by her work as an electrician. This blend informs her pragmatic curiosity, her desire to give back through reliable electrical services, and her occasional
    struggle to reconcile personal stress with cultural expectations of resilience.
