  career_goals: Krystal aims to leverage her practical experience and business education to move into retail management. Over the next three years, she plans to obtain an assistant manager position, where
    she can apply her organizational skills to oversee store operations, staff scheduling, and loss‑prevention strategies. Long‑term, she aspires to become a store manager or district supervisor, and she
    intends to complete a bachelor’s degree in business administration to broaden her strategic expertise. Additionally, she is interested in creating a community‑focused retail space that showcases local
    Detroit artisans and provides mentorship opportunities for youth.
