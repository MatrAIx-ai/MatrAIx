persona_description: A researcher and cognitive scientist who studies how people represent and process spatial information, particularly focusing on the mental representation of navigable environments.
  She is interested in understanding how people form and maintain spatial memories and how these memories differ from more traditional maps. Her study suggests that people may store spatial information
  in a more fragmented and localized manner, rather than a single, comprehensive representation of the environment. She is interested in how this difference in spatial representation might affect the development
  of navigational aids and the way people navigate their environment.
