    management'', ''Cross‑cultural storytelling'', ''Team leadership and mentorship'']'
  hobbies: '[''Documentary photography'', ''Reading contemporary Colombian literature'', ''Cooking traditional Colombian dishes'', ''Hiking in New Jersey state parks'', ''Attending art exhibitions and film
    festivals'', ''Playing acoustic guitar'', ''Rooftop gardening'', ''Volunteering at community cultural events'', ''Traveling to Colombia to visit family'']'
  career_goals: Idolidia aims to launch her own independent production company that champions Latinx voices, beginning with a feature‑length documentary chronicling Colombian immigrant experiences across
    the U.S. She aspires to secure a first‑look deal with a major streaming platform, win recognition at festivals such as Sundance and the Cartagena Film Festival, and build a mentorship program for mid‑career
    women directors. Long‑term, she envisions expanding into interactive media projects that blend documentary storytelling with immersive technology, while maintaining a reputation for delivering high‑quality,
    socially resonant content.
