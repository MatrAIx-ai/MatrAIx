personas:
  professional: Idolidia Alfonso is a seasoned film producer and director who leverages meticulous budgeting, bilingual fluency, and a curiosity for unconventional narratives to lead multicultural crews,
    champion underrepresented voices, and mentor emerging creators, while they apply a methodical, competitive drive to keep projects on schedule and within budget.
  sports: Idolidia Alfonso enjoys weekly hikes with the Garden State Hiking Association, follows the New York Giants, New York Knicks, and New Jersey Devils, and plays in a co‑ed recreational soccer league,
    balancing the competitive drive they bring to the field with the solitary renewal they find on rugged trails.
  arts: Idolidia Alfonso immerses themselves in the arts by curating visits to local galleries showcasing installations inspired by Wes Anderson, attending the New Jersey Film Festival to see works by Greta Gerwig
    and Jane Campion, and finding inspiration in the music of Leonard Cohen and Bob Dylan while they strum acoustic folk songs on their guitar.
  travel: Idolidia Alfonso plans trips with meticulous itineraries, favoring immersive cultural experiences such as photographing the Andean highlands of Peru, wandering the historic streets of Lisbon,
    and eagerly awaiting a future solo expedition to capture the fjords of Norway, all while they balance budget constraints and family commitments.
  culinary: Idolidia Alfonso delights in cooking traditional dishes like arepas and sancocho, seasoning them with cilantro, cumin, and lime harvested from their rooftop garden, while they also experiment
    with Mediterranean recipes such as bruschetta topped with fresh basil and heirloom tomatoes, showcasing a blend of comfort and culinary curiosity.
  core: Idolidia Alfonso blends a methodical, competitive mindset with deep curiosity for storytelling, balancing high‑pressure production demands with solitary hikes, rooftop gardening, and acoustic folk
    music, all while they navigate occasional health nags and a disciplined financial plan.
background:
  cultural: Idolidia was raised in a Colombian immigrant household that preserved deep ties to the rhythms, flavors, and traditions of her native country. Fluent in both Spanish and English, she navigates
    a bicultural identity that informs her storytelling sensibility. Family gatherings are marked by the music of cumbia and vallenato, festive celebrations of Colombian holidays, and the sharing of home‑cooked
    meals that echo the culinary landscapes of Bogotá and the Caribbean coast. While she embraces the suburban lifestyle of Wenonah, New Jersey, she remains actively involved in local Latino community organizations,
    bridging her Colombian roots with the diverse cultural fabric of the Greater Philadelphia region. This blended heritage fuels her artistic curiosity and drives her commitment to amplify under‑represented
    narratives.
attributes:
  skills: '[''Film production management'', ''Directing actors and crew'', ''Script development and storyboarding'', ''Budgeting and financial oversight'', ''Scheduling and logistics coordination'', ''Bilingual
