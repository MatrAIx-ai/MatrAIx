  hobbies: '[''Pickup Basketball'', ''Chess'', ''Microcontroller DIY Projects (Arduino, Raspberry Pi)'', ''Drone Building'', ''IoT Sensor Development'', ''Hiking (Huron River, Kalamazoo State Game Area)'',
    ''Jazz and Soul Music Appreciation'', ''Modern Southern Cooking'']'
  career_goals: Vernon aims to advance to a senior engineering role within the next five years, targeting positions that blend technical leadership with strategic product development. He plans to earn his
    Professional Engineer (PE) license and deepen his expertise in sustainable design, positioning himself to lead projects that reduce environmental impact while optimizing performance. In the longer term,
    he envisions founding a boutique engineering consultancy that serves startup manufacturers and promotes diversity in STEM. Vernon also wants to serve as a mentor for Black and underrepresented engineering
    students, leveraging his competitive drive to help them achieve measurable career milestones. Ultimately, he seeks recognition for delivering high‑impact, data‑driven solutions that improve operational
    efficiency and drive market competitiveness.
