personas:
  professional: Vernon Obrien, a 26‑year‑old mechanical engineer, blends expert SolidWorks and finite‑element analysis skills with Six Sigma and Agile project management, using their competitive, structure‑loving
    mindset to rigorously validate every design and they mentor NSBE peers through meticulously planned development cycles.
  sports: Vernon Obrien fuels their competitive edge on Ann Arbor’s Victory Park pickup basketball courts, backs the Detroit Pistons and Michigan Wolverines, participates in a weekly pick‑up chess tournament
    that doubles as mental conditioning, and they hit the trails with the Kalamazoo State Game Area running club during spring months to keep a balanced fitness regimen.
  arts: Vernon Obrien finds creative rejuvenation at Ann Arbor’s jazz nights, especially performances of John Coltrane and Miles Davis standards, delights in soul classics from Aretha Franklin and modern
    reinterpretations by H.E.R., and occasionally volunteers as stage crew for the Ann Arbor Symphony, letting their love of storytelling through music shape both their hobby projects and professional presentations,
    and they often draw inspiration for engineering schematics from rhythmic improvisation.
  travel: Vernon Obrien plans trips with a blend of meticulous itinerary spreadsheets and spontaneous side‑hikes, having explored New Orleans’ culinary scene, trekked the glaciers of Iceland, and now earmarks
    a tech‑focused Tokyo visit, while balancing limited budget constraints by leveraging travel credit points for weekend getaways to Michigan’s Upper Peninsula, and they prioritize experiences that combine
    cultural immersion with networking opportunities.
  culinary: Vernon Obrien, an intermediate‑level chef, reimagines Southern staples like shrimp‑and‑grits and smoked brisket by infusing smoked paprika, jalapeño honey glaze, and locally sourced Michigan
    heirloom tomatoes, treating each cooking session as a structured experiment akin to a prototype build, and they meticulously document flavor tweaks in a lab‑style notebook.
  core: Vernon Obrien is a competitively driven engineer who transforms every hobby—from chess to cooking—into a disciplined project, yet occasionally sacrifices sleep for the next prototype or a perfect
    jazz improv solo, and they constantly chase the next measurable improvement.
background:
  cultural: Vernon grew up in a tight‑knit Black family in the Detroit metro area before moving to Ann Arbor for college. His upbringing emphasized educational attainment, self‑reliance, and community solidarity—values
    that continue to shape his professional ethic and personal aspirations. He participated in church youth groups and the local Boys & Girls Club, where mentors encouraged his interest in engineering and
    science. The Black community’s strong tradition of storytelling and music influenced his love for jazz and soulful culinary heritage, which he honors by cooking Southern comfort food with contemporary
    twists. In Ann Arbor, Vernon is an active member of the National Society of Black Engineers (NSBE) chapter, contributing to outreach programs that expose middle‑school students to STEM fields. He also
    volunteers with local organizations that address economic disparities and promote inclusive hiring practices, recognizing the importance of representation in technical industries. His cultural identity
    fuels both his competitive ambition and his commitment to giving back, creating a balance between personal success and collective uplift.
attributes:
