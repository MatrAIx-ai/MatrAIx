persona_description: A historian who specializes in the study of the Indian Mutiny of 1857-1858, particularly the context and causes of the Sepoy Rebellion. He is knowledgeable about the complex layers
  and colored by class, caste, and region factors that led to the uprising, and how it was seen as an inevitable outcome of the way the British ruled India. He has a deep understanding of the external and
  internal factors that contributed to the Uprising and how it reflects the historical background of India's change from the 1820s through the 1850s. He is also an expert on the economic and political grievances
  that contributed to the discontent of the Indian soldiers and cultivators, and how it affected the agrarian economy. He is also knowledgeable about the symbolism of alien rule and the Company's most militant
  expansionism, and how it contributed to the Uprising. He has a keen interest in understanding the causes and consequences of the Uprising and how it reflects the history of British India.
