personas:
  professional: Tuan Lim is an aspiring marine ecologist and budding electronics maker who spends weekends mapping tide‑pools in the Inside Passage with a DIY Arduino sensor suite, blending their love of
    nature with practical engineering skills.
  sports: Tuan Lim is a dedicated kayaker who rows with the Inside Passage Kayak Club, follows the Vancouver Canucks on ice, and spends weekends hiking with the junior trail crew of the North Shore Hiking
    Society, prioritizing endurance over competition.
  arts: Tuan Lim captures birdlife through a Canon EOS M50, drawing inspiration from wildlife photographer Art Wolfe and channeling folk influences of Nick Drake and John Denver while strumming acoustic
    guitar at intimate gatherings.
  travel: Tuan Lim prefers carefully planned weekend excursions along the Inside Passage—having trekked the fjords of Vancouver Island, paddled around Juneau, and camped in temperate rainforests—while harboring
    a long‑term dream of snorkeling the coral reefs of the Galápagos, balancing adventure with budget‑friendly family logistics.
  culinary: Tuan Lim enjoys assisting in the family kitchen, expertly simmering broth for pho and flipping bánh xèo while tweaking herbs and chilies to perfect the balance of sweet, salty, and umami, and
    occasionally experiments with local seafood to fuse coastal flavors into the classic recipes.
  core: Tuan Lim is a curious yet pragmatic teen who blends a love for wilderness exploration, electronics tinkering, and gentle creativity, balancing solitary pursuits with close‑knit friendships while
    maintaining a steady, organized, and emotionally resilient approach to life.
background:
  cultural: As a second‑generation Vietnamese‑American, Tuan grew up in a bilingual household where Vietnamese traditions intertwine with the Alaskan lifestyle. He celebrates Tet with family gatherings,
    prepares traditional dishes, and respects the values of filial piety and community harmony. At the same time, he embraces the outdoors culture of Ketchikan, participating in local fishing trips and
    community events. His cultural identity is shaped by the resilience of immigrant experience, the emphasis on education, and the appreciation for both his heritage and the natural environment around
    him.
attributes:
  skills: '[''Digital literacy (Microsoft Office, internet research)'', ''Basic programming (Python, Scratch)'', ''GPS and map navigation'', ''Fishing and marine life identification'', ''First aid certification'',
    ''Bilingual communication (Vietnamese and English)'', ''Team collaboration (Robotics club)'', ''Problem solving'']'
  hobbies: '[''Kayaking and fishing'', ''Hiking and nature photography'', ''Arduino and drone building'', ''Reading science‑fiction and marine documentaries'', ''Cooking Vietnamese cuisine'', ''Acoustic
    guitar playing'', ''Participating in school robotics club'']'
  career_goals: His ambition is to pursue a career that merges his love for the ocean with technology. He aims to study marine biology or environmental science in college, eventually working as a marine
    researcher or a sustainability engineer developing tools for sustainable fisheries. He also hopes to serve as a cultural liaison, promoting awareness of Southeast Asian heritage within Alaskan communities.
    In the short term, he plans to obtain a high school diploma, attend a summer marine science program, and deepen his coding skills to build simple data-collection apps for local fishermen.
