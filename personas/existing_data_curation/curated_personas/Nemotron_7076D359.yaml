  career_goals: Yudith hopes to translate her experience into a part‑time mentorship role, guiding Dominican‑American teenage girls toward STEM careers through workshops at the local community college.
    She also plans to launch a modest home‑based catering venture that offers traditional Dominican dishes for neighborhood events, allowing her to blend her love of cooking with her practical organization
    skills. In the longer term, she is interested in gaining a certification in health‑coaching for seniors, so she can combine her stability under pressure and cooperative nature to support older adults
    in maintaining active, healthy lives while still preserving a flexible schedule that respects her preference for routine.
