  hobbies: '[''painting'', ''calligraphy'', ''philosophical reading'', ''bonsai gardening'', ''organic vegetable gardening'', ''Korean cooking'', ''attending art exhibitions'', ''playing Go'', ''historical
    society volunteering'']'
  career_goals: Though retired, Wei aspires to curate a solo exhibition of his artwork at the Roseville Community Center, documenting his journey through abstract and cultural themes. He aims to author
    a memoir that intertwines his family's migration story with reflections on art and philosophy. Additionally, he plans to establish a small scholarship fund for local seniors who wish to explore creative
    arts, and to mentor younger volunteers in organizing Korean cultural festivals.
