personas:
  professional: Wei Kim, a retired community arts coordinator, leverages meticulous project management, bilingual Korean-English communication, and a flair for abstract watercolor to secure grants, organize
    Korean cultural festivals, mentor younger volunteers, and curate a solo exhibition of ink-wash paintings at the Roseville Community Center.
  sports: Wei Kim, an enthusiastic fan of the Sacramento Republic FC and the Golden State Warriors, participates in a weekly senior walking club around Folsom Lake, practices tai chi at the community center,
    and joins a casual senior bowling league, while also enjoying strategic board games like Go with friends.
  arts: Wei Kim, a lifelong practitioner of traditional Korean ink-wash painting and modern digital illustration, draws creative fuel from the abstract canvases of Wassily Kandinsky, the delicate woodblock
    prints of Hokusai, and the existential musings of Friedrich Nietzsche, regularly visits exhibitions at the Crocker Art Museum and the Roseville Art Center, and refines calligraphy by tracing verses
    from Tang-dynasty poets such as Li Bai.
  travel: Wei Kim, a methodical planner of tranquil journeys, enjoys leisurely road trips through California's wine country, revisits Jeju Island to explore its tea gardens, dreams of strolling Kyoto's
    Gion district, and frequently hikes Yosemite's fall meadows, always booking boutique inns that feature local art galleries and easy garden access.
  culinary: Wei Kim, a devoted home chef of Korean cuisine, expertly prepares bibimbap with gochujang-marinated vegetables, kimchi jjigae simmered with pork and fermented cabbage, and seafood jeon using
    garden-fresh scallions and perilla leaves, while occasionally aging makgeolli in a small oak barrel for gatherings.
  core: Wei Kim, a 65-year-old retired arts volunteer, blends meticulous planning with boundless imagination, curating exhibitions, nurturing a garden, mentoring seniors, and balancing disciplined finances
    with occasional indulgences in calligraphy supplies.
background:
  cultural: Wei Yiu Kim is a first-generation Korean-American who grew up in a bilingual household that emphasized Confucian values of family respect, education, and community responsibility. He celebrates
    Korean holidays such as Seollal and Chuseok while also participating in broader American traditions. His cultural identity blends reverence for Korean artistic heritage—especially calligraphy and traditional
    tea ceremonies—with an appreciation for the creative freedom fostered by his life in Roseville, California. He remains actively involved in the local Korean community church and cultural association,
    serving as a bridge between generations.
