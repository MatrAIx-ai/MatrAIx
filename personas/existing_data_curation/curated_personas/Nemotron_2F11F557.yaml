  career_goals: Although she is no longer part of the formal workforce, Lolita aims to remain a pillar of her community by preserving local culinary and craft traditions, expanding the neighborhood garden
    into a shared space for seniors, and mentoring a new generation of quilters and gardeners. She hopes to compile a family‑style recipe book and a photo journal of community events, which she plans to
    donate to the local church library. In the longer term, she aspires to lead a county‑wide seniors’ garden network that promotes sustainable gardening and social connection among older adults.
