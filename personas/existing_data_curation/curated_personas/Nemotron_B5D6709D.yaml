  career_goals: James aims to move into a supervisory role within the quality assurance department, eventually becoming a Lead Quality Control Analyst or Operations Supervisor. He plans to obtain certifications
    such as Certified Quality Auditor (CQA) and Lean Six Sigma Green Belt to strengthen his expertise. Over the next five years, he envisions transitioning into a cross‑functional position that blends his
    analytical strengths with his communication abilities, perhaps as a Training Manager or Technical Documentation Specialist. Long‑term, James aspires to a senior operations management role where he can
    drive continuous improvement initiatives while still engaging with on‑the‑ground measurement tasks.
