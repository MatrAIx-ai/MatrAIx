  career_goals: In the short term, Latoya aims to earn her New York State teaching certification and secure substitute teaching assignments that fit around her cashier schedule. She also plans to pursue
    a shift‑supervisor role at her current workplace, leveraging her organizational strengths and reliability to lead a small team. Long‑term, she envisions a transition to a full‑time teaching position
    in a Brooklyn public school, eventually moving into program coordination for after‑school youth initiatives, where she can blend her educational background with community outreach. Throughout her career
    path, she prioritizes stable, routine‑oriented roles that allow incremental growth and a balanced work‑life schedule.
