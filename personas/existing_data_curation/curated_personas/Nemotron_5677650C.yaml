    with family'']'
  career_goals: Shawn dreams of turning his love for building and technology into a career. He is fascinated by aircraft and rockets, so he hopes to study aerospace engineering and eventually design spacecraft.
    At the same time, his enjoyment of creating games on Scratch makes him consider a future as a video‑game developer, where he could blend his practical problem‑solving skills with imaginative storytelling.
