personas:
  professional: A budding tech tinkerer, Shawn Miller spends afternoons after school soldering Arduino circuits in a community robotics club, where their practical mindset and love for predictable build
    steps blend with a relaxed attitude toward deadlines, resulting in inventive but sometimes unfinished projects.
  sports: An avid cyclist on the Fairfax County W&OD Trail, Shawn Miller also roots for the Washington Capitals and the Washington Nationals, joining weekend pickup soccer games with friends while preferring
    the predictable rhythm of a bike ride over chaotic team drills.
  arts: Shawn Miller sketches whimsical inventions inspired by sci‑fi graphic novels like "Saga" and "Ms. Marvel", sharing doodles on a school art board and occasionally mimicking the epic scores of composer
    Hans Zimmer while building digital worlds in sandbox games, merging visual creativity with a love for narrative depth.
  travel: Shawn Miller enjoys spontaneous weekend trips to nearby Washington D.C., where they explore the National Air and Space Museum and the Smithsonian, dreaming of a future summer visit to Orlando's
    theme parks, and prefers flexible itineraries that let them pause for a quick bike ride or a snack break.
  culinary: Shawn Miller favors easy comfort foods such as pepperoni pizza, mac and cheese, and fresh garden tomatoes harvested from their parents’ plot, often helping stir the sauce while experimenting
    with adding quirky toppings like pineapple or jalapeños, reflecting their playful curiosity in the kitchen.
  core: Shawn Miller is a structure‑loving yet laid‑back 11‑year‑old who builds digital worlds, pedals the local trails, and juggles a pocket‑money habit that oscillates between impulsive game buys and
    pragmatic savings for bike gear.
background:
  cultural: Shawn comes from a typical middle‑class white family in Chantilly, Virginia. He grew up attending Fairfax County public schools and participates in community activities such as the local library’s
    reading program and a Boy Scouts troop. His family celebrates mainstream American holidays—Thanksgiving, Christmas, and the Fourth of July—accentuated by backyard barbecues and neighborhood fireworks.
    He occasionally attends a Methodist church with his family, where he learns about service and community involvement. The diverse, suburban environment of Fairfax County has exposed him to a variety
    of cultures, yet his household maintains the traditions of his European‑American ancestry.
