  career_goals: Although still in elementary school, Ashraf dreams of a future where he can combine his curiosity with practical problem‑solving. He is fascinated by animals and the outdoors, so he envisions
    becoming a wildlife biologist or a park ranger who protects natural habitats. He also enjoys watching space documentaries and imagines a role as an engineer or astronaut who designs tools for exploration.
    Ultimately, he wants a career that lets him help others, stay connected to nature, and apply his reliable, organized approach to real‑world challenges.
