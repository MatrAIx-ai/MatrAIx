  hobbies: '["Book Club (Southern Literature)", "Church Choir", "Senior Center Volunteering", "Gardening (vegetables and native plants)", "Southern Cooking and Recipe Development", "Quilting and Sewing",
    "Genealogy Research", "Community Festival Attendance", "Birdwatching", "Weekend Road Trips to Historic Sites"]'
  career_goals: Although retired from formal employment, Jean Christine aims to deepen her impact on local nonprofit boards, aspiring to serve as a strategic advisor for the Dorchester County Food Bank.
    She wishes to launch a series of free workshops on sustainable gardening and heritage cooking for seniors, using her practical curiosity to integrate new techniques with time‑tested methods. Long‑term,
    she dreams of compiling a community cookbook that celebrates regional recipes and family stories, and hopes to travel to historic sites across the Southeast to enrich her cultural storytelling.
