  hobbies: '[''Sketching'', ''Ukulele playing'', ''Video creation for TikTok/YouTube'', ''Reading YA fiction'', ''Exploring local parks and beaches'', ''Baking cupcakes'', ''Volunteer tutoring at community
    library'', ''Skateboarding'']'
  career_goals: Eulalia aims to complete her GED within the next year and then enroll in a community‑college program focusing on graphic design or youth counseling, fields that blend creativity with her
    desire to help others. In the short term, she plans to grow a small YouTube channel that offers mental‑wellness tips for teenagers, using her video editing skills and personal experience with stress.
    Ultimately, she hopes to secure a flexible career—perhaps as a freelance designer or a community‑center youth mentor—that provides both financial stability and the freedom to pursue her varied interests.
