personas:
  professional: Eulalia Mills, an aspiring teen graphic designer and peer mentor, channels their spontaneous problem‑solving and deeply empathetic listening into bite‑sized TikTok videos and freelance poster
    designs that blend bright visuals with mental‑wellness tips, even as they constantly battle the pressure of looming deadlines.
  sports: Eulalia Mills, an occasional skateboarder who frequents the Staten Island Boardwalk and the St. George Skate Crew on weekends, follows the New York Yankees and the New York Islanders with fervor,
    and joins a seasonal beach volleyball pick‑up group during the summer months.
  arts: Eulalia Mills, a sketch‑loving indie‑pop enthusiast, fills the pages of a battered notebook to the sounds of Clairo, Phoebe Bridges, and Wallows while strumming a ukulele and flipping through contemporary
    YA novels by authors like Becky Albertalli and Emily Henry, often drawing inspiration from the emotive lyricism for their digital art.
  travel: Eulalia Mills, who prefers low‑budget, last‑minute planning, spends weekends exploring hidden corners of Staten Island such as Snug Harbor and the North Shore beaches, dreams of a solo backpacking
    trip to Kyoto’s cherry‑blossom alleys, and hopes to one day surf the indie‑music vibe of Portland, Oregon during a summer break.
  culinary: Eulalia Mills, a self‑taught baker, regularly whips up batch after batch of red‑velvet cupcakes topped with cream‑cheese frosting and a dash of vanilla bean, experiments with matcha‑infused
    buttercream for a pop‑culture twist, and balances her sugar cravings with quick stir‑fry dinners featuring chicken, broccoli, soy sauce, and a sprinkle of sesame seeds.
  core: Eulalia Mills, a 17‑year‑old sketch‑obsessed TikTok creator, balances a burst of spontaneous creativity with chronic over‑thinking, often staying up late perfecting cupcakes while missing school
    deadlines.
background:
  cultural: Eulalia is a white American teenager raised in the suburban‑urban mix of Staten Island, New York. Her family values community involvement, kindness, and cooperation, and she grew up attending
    neighborhood events, holiday gatherings, and local volunteer programs. The multicultural atmosphere of the borough has exposed her to a range of cultural influences—food, music, and social customs—while
    her home environment emphasizes traditional American family traditions. This blend of local New York diversity and her family’s emphasis on harmony shapes her sense of identity and her approach to relationships.
