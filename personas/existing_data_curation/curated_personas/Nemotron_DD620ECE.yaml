  hobbies: '[''Cooking Salvadoran cuisine'', ''Reading Latin American literature'', ''Hiking in Hudson River Valley'', ''Gardening'', ''Book club participation'', ''Volunteer music mentorship'', ''Watercolor
    painting'', ''Travel to El Salvador for cultural immersion'']'
  career_goals: Nahiomy aims to produce a debut solo album that fuses Salvadoran folk rhythms with modern acoustic pop, targeting release within the next 24 months. She plans to secure a regional arts grant
    to fund a series of quarterly workshops for emerging musicians in Westchester, focusing on songwriting, performance, and cultural storytelling. Long‑term, she aspires to establish an annual Salvadoran‑heritage
    music festival in Rye, positioning the community as a cultural hub for the diaspora. She also seeks a part‑time teaching position in music or cultural studies at a local college, where she can integrate
    her research background into the curriculum. In parallel, she hopes to collaborate with established Latin American artists to expand her network and achieve broader artistic recognition.
