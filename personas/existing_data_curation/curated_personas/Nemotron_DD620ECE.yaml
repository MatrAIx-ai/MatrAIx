personas:
  professional: Nahiomy Roque, a 53‑year‑old bilingual vocalist, composer, and music educator, channels their organized and methodical mindset into crafting a debut album that blends traditional folk rhythms
    with contemporary acoustic pop while simultaneously coordinating grant‑driven workshops, negotiating collaborations with established Latin American artists, and securing a part‑time faculty position
    at a local college.
  sports: Nahiomy Roque, a keen hiker of the Hudson River Valley, participates in a local walking club, follows the New York Yankees during baseball season, enjoys occasional cross‑country skiing trips
    in winter, and maintains a methodical fitness routine that balances solitary trail runs with occasional team‑spirit games, reflecting their competitive yet balanced nature.
  arts: Nahiomy Roque immerses themselves in the literary world of Roberto Bolaño and Claribel Alegría, paints tranquil Hudson Valley watercolors inspired by Winslow Homer and Georgia O'Keeffe, and draws
    vocal inspiration from folk icons like Joan Baez, intertwining these artistic influences into a personal narrative that fuels both their music and community workshops.
  travel: Nahiomy Roque plans meticulously for annual journeys to their ancestral homeland in Central America to reconnect with family and explore regional musical traditions, while also seeking culturally
    rich destinations like New Orleans for jazz festivals, Buenos Aires for tango, and the historic streets of Granada, balancing adventure with a practical budgeting mindset despite occasional late‑night
    rehearsal‑induced flight delays.
  culinary: Nahiomy Roque delights in preparing hand‑pressed corn masa pockets and steamed dough parcels with inventive fillings like smoked cheese, chayote, and chipotle‑marinated plantains, showcasing
    a proficient kitchen skill set that blends time‑honored family recipes with contemporary culinary twists and a penchant for experimenting with fresh cilantro, panela, and locally sourced herbs.
  core: Nahiomy Roque fuses methodical discipline with a restless curiosity, turning every garden, studio, and hiking trail into a laboratory for cultural storytelling, while occasional perfectionist procrastination
    and a skeptical edge keep them both driven and grounded.
background:
  cultural: Born to Salvadoran immigrant parents, Nahiomy grew up in a bicultural household where Spanish was spoken daily and Salvadoran customs—such as festive dances, folk music, and religious holidays—were
    celebrated alongside American traditions. Her upbringing in the Salvadoran diaspora instilled a strong sense of community responsibility, prompting her involvement in local cultural organizations. She
    identifies with the rich musical heritage of El Salvador, especially the rhythmic patterns of cumbia, marimba, and folk ballads, and she often incorporates these elements into her own compositions.
    While she embraces her Salvadoran roots, she also appreciates the multicultural environment of Westchester County, blending the two worlds in her artistic and social endeavors.
attributes:
  skills: '[''Vocal performance (folk, pop, jazz)'', ''Songwriting and composition'', ''Music arrangement'', ''Piano'', ''Acoustic guitar'', ''Music theory and analysis'', ''Digital audio production (Ableton
