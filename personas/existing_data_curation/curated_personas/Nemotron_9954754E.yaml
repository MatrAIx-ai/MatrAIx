  hobbies: '[''Fishing'', ''Hiking'', ''Gardening'', ''Woodworking'', ''Motorcycle restoration'', ''Cooking traditional Latino dishes'', ''Listening to acoustic folk and Latin guitar music'', ''Breathing
    exercises for stress relief'', ''Participating in community Hispanic events'']'
  career_goals: Eager to transition from laborer to supervisory positions, Miguel plans to obtain a Heavy‑Equipment Operator certification within the next 12 months and enroll in an associate‑level Construction
    Management program at a nearby community college. He aims to become a foreman or crew lead, where his natural organization and reliability can improve team efficiency and safety. In five years, he hopes
    to secure a stable, higher‑pay role that offers benefits and the financial foundation for starting a family, and he is considering eventually launching his own small contracting firm that focuses on
    residential remodels in Cassia County.
