personas:
  professional: Miguel Carrasquillo is a construction laborer with five years of on‑site experience who leverages hand and power tools, small heavy‑equipment operation, blueprint reading, and bilingual
    communication to keep projects on schedule, and their methodical, organized nature ensures safety checks are never missed.
  sports: Miguel Carrasquillo enjoys weekend fishing at Minidoka Reservoir, hikes the Snake River foothills, follows the Boise State Broncos football team and the Idaho Vandals basketball squad, and they
    belong to a local amateur softball league that meets after work.
  arts: Miguel Carrasquillo finds solace in acoustic folk and Latin guitar melodies, regularly listening to artists such as José González, Victor Jara, and John Denver while woodworking, and they occasionally
    attend live performances at the local community center featuring traditional dance troupes.
  travel: Miguel Carrasquillo prefers low‑key road trips to natural sites like Yellowstone and the Columbia River Gorge, dreams of exploring historic towns in New Mexico, and they plan each journey around
    work schedules and modest budgets, often opting for camping over hotels.
  culinary: Miguel Carrasquillo cooks traditional dishes like tacos al pastor, sopes, and empanadas using fresh Idaho tomatoes, peppers, and herbs from their garden, balancing a modest kitchen setup with
    precise seasoning, and they relish sharing meals with friends at the community pantry.
  core: Miguel Carrasquillo is a methodical, worry‑prone builder who finds calm in fishing, woodworking, and cooking, yet can’t resist a late‑night impulse to buy a new tool or a gourmet spice.
background:
  cultural: Miguel grew up in a bilingual household in southern Idaho; his parents emigrated from Mexico in the early 1990s and worked in the agricultural sector. Spanish was spoken at home, and he learned
    English at school, giving him a bicultural identity. Family life centered around food, music, and Catholic celebrations such as Christmas, Easter, Día de los Muertos, and local fiestas, reinforcing
    values of hard work, respect, and community support. Living in Rupert, a small town with a modest Latino community, Miguel maintains close ties with his extended family through regular visits, shared
    meals, and participation in community events like Cinco de Mayo celebrations. He blends Mexican cultural traditions with the pragmatic, independent spirit of the American West.
attributes:
  skills: '[''Construction site operations'', ''Hand and power tool proficiency'', ''Basic heavy-equipment operation'', ''Blueprint reading'', ''Concrete finishing'', ''Framing and basic carpentry'', ''Inventory
