  career_goals: Alex aims to transition from active frontline duties to a leadership role in fire prevention and training, ideally as a fire marshal or training officer for Rockwall County. He seeks to
    integrate his creative interests by developing immersive, art‑driven fire safety education programs for schools and community groups in the Dallas‑Fort Worth metro area. He also plans to mentor the
    next generation of firefighters through a formal apprenticeship program and to author a reflective memoir that explores the intersection of service, resilience, and imagination.
