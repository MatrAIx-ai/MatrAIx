  hobbies: '[''Gardening'', ''Crocheting and quilting'', ''Cooking Southern cuisine'', ''Reading mystery novels'', ''Church volunteer work'', ''Walking in local parks'']'
  career_goals: Looking ahead, Jessica aims to preserve a stable, predictable work schedule that balances her professional responsibilities with personal well‑being. She plans to transition gradually to
    part‑time shifts over the next few years, allowing more time for family and community activities. She is interested in earning a Certified Geriatric Nurse credential so she can better serve the growing
    senior population in Coweta County, and she hopes to take on a formal mentorship or nurse‑educator role that leverages her practical expertise without the pressure of high‑stress administration. Her
    long‑term ambition is to retire comfortably while ensuring a smooth handover of her duties to younger staff.
