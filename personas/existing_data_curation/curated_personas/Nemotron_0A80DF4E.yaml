personas:
  professional: Jason Rawls, a 70‑year‑old emeritus engineering professor in Cincinnati, merges deep expertise in mathematics, electronics prototyping, and interdisciplinary curriculum design with an open,
    curiosity‑driven mindset, creating community workshops where watercolor art meets Arduino robots, though they often resist strict schedules and end up pulling all‑nighters to finish a prototype.
  sports: Jason Rawls follows the Cincinnati Bengals and Cincinnati Reds with loyal enthusiasm, they enjoy low‑impact fitness like morning walks along the riverfront and occasional pickleball matches at
    the senior club, and they maintain a relaxed approach to exercise, preferring consistency over competitive intensity.
  arts: Jason Rawls paints watercolor river scenes inspired by Claude Monet’s Impressionist light, they regularly attend Cincinnati Symphony Orchestra concerts featuring Beethoven’s Ninth Symphony, and
    they volunteer at the museum curating interactive STEM exhibits that showcase the kinetic sculptures of Alexander Calder, reflecting a seamless blend of visual and auditory appreciation.
  travel: Jason Rawls prefers short, well‑planned road trips to historic Midwest towns such as Marietta, Ohio, and day‑long excursions to German‑heritage festivals in Frankenmuth, Michigan; they dream of
    a leisurely summer visit to Munich’s Oktoberfest and have already enjoyed a week‑long holiday in Asheville, North Carolina, balancing a modest travel budget with a love for cultural immersion.
  culinary: Jason Rawls relishes cooking his signature Cincinnati chili topped with shredded cheddar, they frequently harvest fresh tomatoes, zucchini, and herbs from their patio garden to toss into a summer
    ratatouille, and they pair meals with locally brewed amber ales and occasional craft IPA, showcasing a blend of regional comfort food and garden‑to‑table creativity.
  core: Jason Rawls is a retired engineering educator who fuses art and technology in community workshops, budgets frugally yet splurges on craft beer, manages hypertension with a disciplined routine, enjoys
    low‑impact exercise, paints like Monet, travels to historic towns, and habitually starts projects without a strict schedule, often pulling all‑nighters to finish them.
background:
  cultural: Jason was raised in a middle‑class German‑American family in the Cincinnati suburbs, attending a Methodist church and internalizing Midwestern values of community service, modesty, and practicality.
    The region’s strong German heritage, its seasonal festivals, and the city’s rich arts scene shaped his appreciation for both tradition and innovation. He earned his undergraduate STEM degree at the
    University of Cincinnati and completed a graduate program at Ohio State University before returning to Cincinnati to teach. His cultural identity blends Midwestern pragmatism with a lifelong commitment
    to education, local heritage, and the region’s culinary traditions such as chili and craft beer.
attributes:
  skills: '[''Curriculum development for interdisciplinary STEM‑art courses'', ''Project‑based learning facilitation'', ''Hands‑on electronics prototyping (Arduino, Raspberry Pi)'', ''Data analysis and
    statistical modeling'', ''Mentoring and coaching of early‑career educators'', ''Public speaking and community workshop delivery'']'
  hobbies: '[''Watercolor painting'', ''Electronic tinkering and Arduino projects'', ''Urban gardening'', ''Reading contemporary science fiction'', ''Playing chess in a small club'', ''Spontaneous day‑trips
    to historic towns'', ''Volunteering at local museums for exhibit design'']'
  career_goals: Jason aims to launch a community‑focused workshop series that merges art and engineering, fostering creative problem‑solving among adult learners and high school students. He plans to author
    a book on experiential STEM education, securing a small grant to establish a maker‑space at a local community college. In addition, he seeks an emeritus or adjunct role at Cincinnati State Technical
    and Community College where he can continue mentoring, develop interdisciplinary course modules, and collaborate with the Cincinnati Museum of Art on interactive exhibits.
