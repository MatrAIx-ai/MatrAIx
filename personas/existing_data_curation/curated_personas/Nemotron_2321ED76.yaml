personas:
  professional: Wilma Thomas, a preschool “mini‑architect” who builds meticulously organized block cities and leads the Tuesday story‑time circle, channels their curiosity and methodical nature into early
    learning projects.
  sports: Wilma Thomas joins the neighborhood “Little Sprinters” soccer club, cheers for the Chicago Cubs on game days, and spends rainy afternoons practicing balance on a toddler‑sized gymnastics mat.
  arts: Wilma Thomas, an avid little artist, spends afternoons drawing fantastical creatures inspired by Dr. Seuss and listening to The Wiggles and Disney soundtracks, often arranging crayons in rainbow
    order before creating spontaneous doodles.
  travel: Wilma Thomas loves family trips to Orlando’s Disney World and weekend visits to the seaside town of Cape May, preferring structured itineraries with picture‑book guides and short, soothing car
    rides that end with a snack stop at a familiar ice‑cream shop.
  culinary: Wilma Thomas enjoys helping stir batter for banana muffins, delights in cheesy macaroni, and happily munches on apple slices with peanut butter, though they sometimes refuse vegetables unless
    presented as “dinosaur trees.”
  core: Wilma Thomas is a methodical yet imaginative four‑year‑old who arranges crayons by hue, builds flawless block towers, and quietly explores the world with a gentle curiosity that balances order and
    wonder.
background:
  cultural: Wilma’s family celebrates African‑American traditions rooted in the Atlanta community. She participates in church preschool activities, enjoys soul music and gospel songs, and learns about Black
    history through library programs and family storytelling. Community gatherings such as family barbecues and cultural festivals in Forsyth County reinforce a sense of pride in her heritage while also
    exposing her to the diverse multicultural environment of Alpharetta.
