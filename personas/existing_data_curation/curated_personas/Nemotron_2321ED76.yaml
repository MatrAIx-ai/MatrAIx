  career_goals: Although only four, Wilma often talks about what she wants to be when she grows up. She dreams of becoming a teacher who can share stories and art with children, an artist who creates bright
    pictures that make people smile, and a veterinarian who cares for animals. These aspirations echo her caring nature, love of learning, and desire to help others.
