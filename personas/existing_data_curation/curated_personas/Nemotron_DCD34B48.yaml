personas:
  professional: Angela Favela, a budding young scientist, channels their relentless curiosity and meticulous organization into leading school science club projects, building accurate LEGO replicas of real
    machines, and maintaining a detailed journal of flora and fauna observations.
  sports: Angela Favela, a member of the Wallkill Youth Soccer League who also enjoys weekend hikes on local nature trails, keeps a personal fitness journal, and passionately roots for the New York Yankees
    and New York Knicks, demonstrating their competitive spirit and disciplined training habits.
  arts: Angela Favela, an avid fan of the animated series 'The Magic School Bus' and the music of Imagine Dragons, brings their curiosity to life by crafting LEGO dioramas inspired by Vincent van Gogh’s
    starry night skies and National Geographic photography, melding science and art in their free time.
  travel: Angela Favela, who meticulously plans family road trips with printable maps and a travel journal, delights in exploring historic Washington, D.C., hiking the Catskill Mountains nearby, and dreams
    of trekking the Grand Canyon’s South Rim after school, reflecting a balance of structured adventure and imaginative wanderlust.
  culinary: Angela Favela, a budding kitchen helper, loves assembling homemade mini pizzas topped with mozzarella, pepperoni, and fresh basil, as well as layering fruit parfaits with Greek yogurt, granola,
    and strawberries, showing a growing confidence in simple cooking while still favoring familiar kid‑friendly flavors.
  core: Angela Favela is a precision‑driven nine‑year‑old explorer who balances fierce curiosity with disciplined organization, cataloguing every leaf and LEGO piece while quietly out‑scoring classmates
    in chess.
