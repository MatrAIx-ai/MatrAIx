  career_goals: Even in retirement, Sean aims to stay active and purposeful. He wants to expand his volunteer role at the Mayville senior center, mentoring younger volunteers and organizing a community
    garden that brings together neighbors of all ages. He also hopes to master digital photography so he can document family history and local heritage. Maintaining his health and independence is a priority,
    so he plans regular walking, fishing outings, and strength‑building exercises. He would like to travel occasionally to visit grandchildren, but most of his ambition is to leave a lasting, practical
    legacy in his hometown.
