personas:
  professional: David Proulx is a seasoned interior painter and paperhanger who leverages a decade of expertise in surface preparation, color consultation, and low‑VOC finishes, pairing his practical, no‑nonsense
    problem‑solving with a curious drive to experiment on the job, and his sociable, cooperative nature shines through in client interactions and community volunteer projects, even when his relaxed attitude
    sometimes leaves his schedule a bit haphazard.
  sports: David Proulx is an active member of the South Yarmouth Admirals Softball Club and the Cape Cod Bay Sailing Club, frequently joins spontaneous fishing outings for cardio, and follows the Boston
    Red Sox and New England Patriots, embracing a laid‑back fitness routine that values community play over strict training schedules.
  arts: David Proulx enjoys the melodic storytelling of Bob Dylan, the soulful pop of Lake Street Dive, and the maritime canvases of Andrew Wyeth, often attending Cape Cod Playhouse productions and local
    art fairs, where his appreciation for regional culture fuels his own DIY painting workshops.
  travel: David Proulx favors flexible, short‑haul getaways such as sailing to Nantucket, road‑tripping to Acadia National Park, and microbrewery tours in Vermont, planning most trips on a whim while keeping
    an eye on business expenses and the need to be home for community events.
  culinary: David Proulx loves classic New England fare, especially lobster rolls, clam chowder, and grilled octopus, cooks with moderate skill on a hand‑carved wooden cutting board, pairs meals with local
    Cape Cod ales like Cape Cod Lager, and delights in experimenting with herb‑infused low‑VOC paints as seasoning metaphors.
  core: David Proulx is a pragmatic, community‑oriented painter whose curiosity drives sustainable DIY projects, whose relaxed scheduling makes him a spontaneous sailor and craft‑beer enthusiast, and whose
    sociable, kind nature keeps him at the heart of South Yarmouth’s neighborhood gatherings.
background:
  cultural: David grew up in a close‑knit, working‑class family in South Yarmouth, rooted in classic New England Cape Cod culture. His family’s surname reflects French‑Canadian ancestry, and he was raised
    with a blend of Yankee pragmatism and the warmth of a Catholic community. The maritime heritage of the region, the seasonal tourism economy, and the tight social fabric of Cape Cod have shaped his values
    of hard work, neighborly cooperation, and an appreciation for the coastal environment.
