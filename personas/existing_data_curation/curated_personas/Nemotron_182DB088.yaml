  hobbies: '[''Softball'', ''Sailing'', ''Fishing'', ''Barbecues'', ''DIY Home Projects'', ''Woodworking'', ''Craft Beer Tasting'', ''Community Volunteering'', ''Sustainable Living Workshops'']'
  career_goals: David aims to expand his freelance painting work into a reputable small contracting firm that serves the Cape Cod region. He plans to obtain a professional painting contractor license, hire
    a reliable crew, and specialize in sustainable, low‑VOC finishes. He hopes to build a portfolio of historic home restorations, become a trusted resource for heritage property owners, and eventually
    open a community workshop offering DIY painting and finishing classes. His ambition balances his desire for business growth with his practical interest in learning new techniques.
