  hobbies: '[''Desert Gardening'', ''Traditional Mexican Cooking'', ''Community Volunteering'', ''Quilting'', ''Reading Historical Fiction'', ''Hiking'', ''Celebrating Cultural Festivals'']'
  career_goals: Heidi aims to leverage her experience to advance into a supervisory or office manager position within the next two to three years. She plans to complete her associate degree in Business
    Administration, attend leadership workshops, and obtain certification in office management. She also aspires to develop a community outreach program that offers bilingual assistance to seniors and non‑English
    speakers in Lea County, and eventually explore opening a small family‑run catering business featuring traditional Mexican dishes.
