personas:
  professional: Heidi Feliz, a bilingual front‑desk coordinator renowned for turning chaos into order, leverages meticulous record‑keeping, Microsoft Office mastery, and a calm‑under‑pressure demeanor to
    keep a busy community health clinic running smoothly; with her upcoming associate degree in Business Administration, she aims to step into an office manager role within three years while also laying
    groundwork for a bilingual outreach program and a family‑run catering venture, and they consistently apply structured workflows to achieve these goals.
  sports: Heidi Feliz fuels her love of the outdoors by hiking the Guadalupe Mountains each spring and fall, joins a local adult softball league with the Hobbs Hurricanes for friendly competition, and never
    misses a New Mexico State Aggies men’s basketball game on Saturdays, cheering loudly for the team while maintaining a disciplined weekly yoga routine to balance the physical strain of gardening, and
    they enjoy tracking steps with a smartwatch to stay accountable.
  arts: Heidi Feliz weaves stories into fabric as a dedicated quilter, often stitching vibrant patterns inspired by the murals of Diego Rivera and the desert palettes of Georgia O’Keeffe, while evenings
    are spent savoring the novels of Hilary Mantel and listening to the soulful strings of Los Lobos; they also volunteer to coordinate Día de los Muertos altars, where they blend artistic tradition with
    community remembrance.
  travel: Heidi Feliz’s wanderlust is guided by a desire to sample authentic regional cuisines and explore historic towns, leading them to recent trips across the high desert of Santa Fe, the colonial charm
    of Puebla, and a serene weekend in the Sonoran Desert; their next bucket‑list destination is a cultural pilgrimage to Oaxaca’s markets, followed by a scenic drive along the Pacific Coast to catch sunrise
    at Big Sur, and they meticulously plan each itinerary with a blend of spontaneity and structure.
  culinary: Heidi Feliz’s kitchen is a fragrant workshop where they expertly prepare tamales de mole, slow‑cooked carnitas, and chiles en nogada, using fresh herbs like epazote, cilantro, and oregano from
    their succulent garden, while their culinary skill ranges from mastering masa dough to improvising a smoky chipotle sauce—yet they occasionally over‑salt dishes in their zeal to amplify flavor, a quirk
    their family lovingly teases them about.
  core: Heidi Feliz balances meticulous organization with vibrant cultural traditions, turning everyday routines into purposeful community‑building moments while navigating life with a pragmatic, nurturing
    spirit and a penchant for over‑seasoned sauces; they thrive on turning structure into celebration.
background:
  cultural: Heidi is a second‑generation Mexican‑American who grew up speaking Spanish at home while fully integrating into the broader New Mexican community. Her family maintains strong ties to Mexican
    customs, Catholic traditions, and the celebrations of Día de los Muertos and Cinco de Mayo. She values family cohesion, hospitality, and the intergenerational transmission of culinary and craft skills.
    Living in Hobbs, she blends her Mexican heritage with the local oil‑town culture, fostering connections across diverse community groups.
attributes:
