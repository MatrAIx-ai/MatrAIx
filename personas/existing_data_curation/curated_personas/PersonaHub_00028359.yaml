persona_description: A person who possesses a unique skill set and expertise in a specific field, such as a specialist in the armed forces or an IT Manager. They have developed their skills through years
  of training and possess a deep understanding of their field. They are respected and admired by others, and their advice is sought after. They wield power as a result of their expertise and have the ability
  to influence others in a positive way. They are likely to be interested in organisational and group goals, and are driven by a desire to achieve and influence change. They are also likely to have a strong
  sense of personal identity and values, and use their power to support and promote those values within their organisation.
